</span><h2 data-dcnode-id="1518"><span class="mw-headline" data-dcnode-id="1526" id="Life"><span data-dcnode-id="1527" instrument_node="">Life</span></span><span class="mw-editsection" data-dcnode-id="1519"><span class="mw-editsection-bracket" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">[</span></span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaurice_Koechlin%26action%3Dedit%26section%3D1" title="Edit section: Life"><span data-dcnode-id="1523" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1517" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1511" role="note"><span data-dcnode-id="1514" instrument_node="">See also: </span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koechlin_family" title="Koechlin family"><span data-dcnode-id="1513" instrument_node="">Koechlin family</span></a></div><span data-dcnode-id="1510" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1501"><div class="thumbinner" data-dcnode-id="1502" style="width:222px;"><a class="image" data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg"><img alt="" class="thumbimage" data-dcnode-id="1509" data-file-height="1086" data-file-width="750" decoding="async" height="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/220px-Maurice_koechlin_pylone.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/330px-Maurice_koechlin_pylone.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/53/Maurice_koechlin_pylone.jpg/440px-Maurice_koechlin_pylone.jpg 2x" width="220"></a><span data-dcnode-id="1507" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1503"><div class="magnify" data-dcnode-id="1505"><a class="internal" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaurice_koechlin_pylone.jpg" title="Enlarge"></a></div><span data-dcnode-id="1504" instrument_node="">Koechlin's first drawing for the Eiffel Tower</span></div></div></div><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1499" instrument_node="">A member of the renowned Alsatian </span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Koechlin_family" title="Koechlin family"><span data-dcnode-id="1498" instrument_node="">Koechlin family</span></a><span data-dcnode-id="1496" instrument_node="">, he was born in </span><a data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buhl%2C_Haut-Rhin" title="Buhl, Haut-Rhin"><span data-dcnode-id="1495" instrument_node="">Buhl, Haut-Rhin</span></a><span data-dcnode-id="1493" instrument_node="">, the son of Jean Koechlin and his wife Anne Marie (Anaïs), née Beuck. He was the first cousin once removed of </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Koechlin" title="André Koechlin"><span data-dcnode-id="1492" instrument_node="">André Koechlin</span></a><span data-dcnode-id="1490" instrument_node="">, and the great-grandfather of actress </span><a data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalki_Koechlin" title="Kalki Koechlin"><span data-dcnode-id="1489" instrument_node="">Kalki Koechlin</span></a><span data-dcnode-id="1487" instrument_node="">.
</span></p><p data-dcnode-id="1474"><span data-dcnode-id="1485" instrument_node="">When France lost the </span><a class="mw-redirect" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-Prussian_war" title="Franco-Prussian war"><span data-dcnode-id="1484" instrument_node="">Franco-Prussian war</span></a><span data-dcnode-id="1482" instrument_node=""> to Prussia in 1870/1871 the entire Koechlin family decided to become citizens of Switzerland and thus dropped French citizenship. After the defeat of the </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="1481" instrument_node="">German Empire</span></a><span data-dcnode-id="1479" instrument_node=""> in 1918, however, the Koechlin family again applied for French citizenship.</span><sup class="reference" data-dcnode-id="1476" id="cite_ref-1"><a data-dcnode-id="1477" href="#cite_note-1"><span data-dcnode-id="1478" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1475" instrument_node="">
</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1473" instrument_node="">Maurice attended the lycée in </span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mulhouse" title="Mulhouse"><span data-dcnode-id="1472" instrument_node="">Mulhouse</span></a><span data-dcnode-id="1470" instrument_node="">, then between 1873 and 1877 studied </span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_engineering" title="Civil engineering"><span data-dcnode-id="1469" instrument_node="">civil engineering</span></a><span data-dcnode-id="1467" instrument_node=""> at the </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ETH_Zurich" title="ETH Zurich"><span data-dcnode-id="1466" instrument_node="">Polytechnikum Zürich</span></a><span data-dcnode-id="1464" instrument_node=""> under </span><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Culmann" title="Carl Culmann"><span data-dcnode-id="1463" instrument_node="">Carl Culmann</span></a><span data-dcnode-id="1461" instrument_node="">. In 1876 he became a citizen of Zurich ("</span><i data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Zürcher Bürger</span></i><span data-dcnode-id="1458" instrument_node="">")</span><sup class="reference" data-dcnode-id="1455" id="cite_ref-2"><a data-dcnode-id="1456" href="#cite_note-2"><span data-dcnode-id="1457" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1454" instrument_node="">
Between 1877 and 1879 he worked for the French railway company "</span><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Chemin de Fer de l'Est</span></i><span data-dcnode-id="1451" instrument_node="">".
</span></p><p data-dcnode-id="1442"><span data-dcnode-id="1449" instrument_node="">Much of his work was done for </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="1448" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1446" instrument_node="">'s "Compagnie des établissements Eiffel", which Koechlin joined in 1879. In 1886 Maurice married Emma Rossier (1867-1965). They had six children: three sons and three daughters. Maurice and Emma were lifelong members of the </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plymouth_Brethren" title="Plymouth Brethren"><span data-dcnode-id="1445" instrument_node="">Plymouth Brethren</span></a><span data-dcnode-id="1443" instrument_node="">.
</span></p><p data-dcnode-id="1421"><span data-dcnode-id="1441" instrument_node="">In 1887 he started work on his plans for the </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="1440" instrument_node="">"</span><i data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Tour de 300 mètres</span></i><span data-dcnode-id="1437" instrument_node="">"</span></a><span data-dcnode-id="1435" instrument_node=""> in Paris, along with his younger brother Henri Koechlin and </span><a data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_engineer" title="Civil engineer"><span data-dcnode-id="1434" instrument_node="">civil engineer</span></a><span data-dcnode-id="1432" instrument_node=""> </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Nouguier" title="Émile Nouguier"><span data-dcnode-id="1431" instrument_node="">Émile Nouguier</span></a><span data-dcnode-id="1429" instrument_node="">. Maurice Koechlin became the Managing Director of Eiffel's company when Eiffel retired from the engineering profession in 1893. The company was renamed </span><i data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Société de construction de Levallois-Perret</span></i><span data-dcnode-id="1426" instrument_node="">.</span><sup class="reference" data-dcnode-id="1423" id="cite_ref-3"><a data-dcnode-id="1424" href="#cite_note-3"><span data-dcnode-id="1425" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1422" instrument_node="">
</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1420" instrument_node="">Maurice Koechlin died in 1946 in </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veytaux" title="Veytaux"><span data-dcnode-id="1419" instrument_node="">Veytaux</span></a><span data-dcnode-id="1417" instrument_node="">, </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Switzerland" title="Switzerland"><span data-dcnode-id="1416" instrument_node="">Switzerland</span></a><span data-dcnode-id="1414" instrument_node=""> in a house built by himself in 1900.</span><sup class="reference" data-dcnode-id="1411" id="cite_ref-4"><a data-dcnode-id="1412" href="#cite_note-4"><span data-dcnode-id="1413" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1410" instrument_node="">
</span></p><span data-dcnode-id="1408" instrument_node="">
</span><h2 data-dcnode-id="1398"><span class="mw-headline" data-dcnode-id="1406" id="Major_designs"><span data-dcnode-id="1407" instrument_node="">Major designs</span></span><span class="mw-editsection" data-dcnode-id="1399"><span class="mw-editsection-bracket" data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">[</span></span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaurice_Koechlin%26action%3Dedit%26section%3D2" title="Edit section: Major designs"><span data-dcnode-id="1403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Major structural designs include:
</span></p><span data-dcnode-id="1394" instrument_node="">
</span><ul data-dcnode-id="1372"><li data-dcnode-id="1390"><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Garabit_viaduct" title="Garabit viaduct"><span data-dcnode-id="1393" instrument_node="">Garabit viaduct</span></a><span data-dcnode-id="1391" instrument_node="">, (1880–1884);</span></li><span data-dcnode-id="1389" instrument_node="">
</span><li data-dcnode-id="1378"><span data-dcnode-id="1388" instrument_node="">Armature for the </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty" title="Statue of Liberty"><span data-dcnode-id="1387" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="1385" instrument_node=""> (</span><i data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Liberty Enlightening the World</span></i><span data-dcnode-id="1382" instrument_node="">) - in collaboration with </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fr%25C3%25A9d%25C3%25A9ric_Auguste_Bartholdi" title="Frédéric Auguste Bartholdi"><span data-dcnode-id="1381" instrument_node="">Frédéric Auguste Bartholdi</span></a><span data-dcnode-id="1379" instrument_node="">, (1884); and</span></li><span data-dcnode-id="1377" instrument_node="">
</span><li data-dcnode-id="1373"><a data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="1376" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="1374" instrument_node="">, (1887–1889).</span></li></ul><span data-dcnode-id="1371" instrument_node="">
</span><h2 data-dcnode-id="1361"><span class="mw-headline" data-dcnode-id="1369" id="Honours_and_legacy"><span data-dcnode-id="1370" instrument_node="">Honours and legacy</span></span><span class="mw-editsection" data-dcnode-id="1362"><span class="mw-editsection-bracket" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">[</span></span><a data-dcnode-id="1365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaurice_Koechlin%26action%3Dedit%26section%3D3" title="Edit section: Honours and legacy"><span data-dcnode-id="1366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1360" instrument_node="">
</span><ul data-dcnode-id="1354"><li data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">Officer of the </span><a class="mw-redirect" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9gion_d%27honneur" title="Légion d'honneur"><span data-dcnode-id="1358" instrument_node="">Légion d'honneur</span></a><span data-dcnode-id="1356" instrument_node="">.</span></li></ul><span data-dcnode-id="1353" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1344"><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node=""> Though named after a project of Gustave Eiffel, the Eiffel Tower&nbsp;– symbol of Paris&nbsp;– has its structural concept and form from the responsible chief engineer Maurice Koechlin.
Koechlin was an engineer of outstanding ingenuity and well versed in the structural techniques of his time. He possessed therefore the best qualifications for evolving such technically innovative conceptions for which Eiffel and his firm were renowned. </span></p><div class="templatequotecite" data-dcnode-id="1345"><span data-dcnode-id="1348" instrument_node="">— </span><cite data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Trautz (2002)</span></cite></div></blockquote><span data-dcnode-id="1343" instrument_node="">
</span><h2 data-dcnode-id="1333"><span class="mw-headline" data-dcnode-id="1341" id="Descendants"><span data-dcnode-id="1342" instrument_node="">Descendants</span></span><span class="mw-editsection" data-dcnode-id="1334"><span class="mw-editsection-bracket" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">[</span></span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaurice_Koechlin%26action%3Dedit%26section%3D4" title="Edit section: Descendants"><span data-dcnode-id="1338" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1332" instrument_node="">
</span><ul data-dcnode-id="1319"><li data-dcnode-id="1328"><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kalki_Koechlin" title="Kalki Koechlin"><span data-dcnode-id="1331" instrument_node="">Kalki Koechlin</span></a><span data-dcnode-id="1329" instrument_node="">, an Indian film actress, through her father Joël, is a descendant of Maurice Koechlin</span></li><span data-dcnode-id="1327" instrument_node="">
