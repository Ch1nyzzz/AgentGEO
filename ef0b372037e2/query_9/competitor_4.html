</span><p data-dcnode-id="3809"><strong data-dcnode-id="3810"><em data-dcnode-id="3811"><span data-dcnode-id="3814" instrument_node="">Deadline for Application for 2021 are now over.</span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">
You are welcome to apply in April 2022&nbsp;for next academic year 2022-2023.&nbsp;</span></em></strong></p><span data-dcnode-id="3808" instrument_node="">
</span><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">The International Master’s in Business Administration (IMBA), taught entirely in English, is a&nbsp; unique opportunity&nbsp;to study management in Paris in an international and stimulating environment.&nbsp;</span></p><span data-dcnode-id="3805" instrument_node="">
</span><p data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">The IMBA is a very selective and&nbsp; challenging full-time program in management. It gathers students from diverse academic, professional and national backgrounds (more than 80% international students), and is designed to provide skills in the core areas of business administration as well as an in-depth understanding of concepts, techniques and professional applications in various management disciplines.</span></p><span data-dcnode-id="3802" instrument_node="">
</span><p data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">The curriculum includes advanced courses that enable students to make optimal management decisions in an ever more complex business environment. It offers participants the opportunity to gain international transferable skills for the workplace.</span></p><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">The Master 2 is divided in two tracks :&nbsp;A French Track for French Speakers Engineers, Architects, Lawyers seeking a dual competence (International MBA - MAE) and an English Track intended for non french speaking students with at least a Bachelor’s Degree over four years (or 240 ECTS credits) in Management, Economics or Social Sciences, as well as students in other disciplines (Engineering, Life, Sciences, Law, Political Sciences, etc.) or junior managers who wish to advance their career.</span></p><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3793" instrument_node="">
</span><h4 data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">After the first year:</span></h4><span data-dcnode-id="3790" instrument_node="">
</span><p data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">According to their grades, at the end of this first year, students can specialize themselves in one of the Second Year Master’s of any French IAE programs. They have also access to other specialized curriculum in France (Universities, "Grandes Ecoles") or abroad:</span></p><span data-dcnode-id="3787" instrument_node="">
</span><ul data-dcnode-id="3755"><span data-dcnode-id="3786" instrument_node="">
</span><li data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">IAE Eiffel, Master Gestion de Portefeuille, Master GHR, Master Marketing Chef de Produit, Master Innovation, Design et Luxe, Master Logistique et Achats Internationaux...</span></li><span data-dcnode-id="3783" instrument_node="">
</span><li data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">UC Berkeley, Californie Master in&nbsp;Health Management&nbsp;</span></li><span data-dcnode-id="3780" instrument_node="">
</span><li data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">ESSEC&nbsp;</span></li><span data-dcnode-id="3777" instrument_node="">
</span><li data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Dauphine M2 en Marketing</span></li><span data-dcnode-id="3774" instrument_node="">
</span><li data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Dauphine M2 en Gestion de Projet</span></li><span data-dcnode-id="3771" instrument_node="">
</span><li data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Paris II Panthéon Assas</span></li><span data-dcnode-id="3768" instrument_node="">
</span><li data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">CNAM, Master Project Management and Business Engineering</span></li><span data-dcnode-id="3765" instrument_node="">

</span><p data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">Students can continue in the second year of the International MBA either in the French or English Track</span></p><span data-dcnode-id="3751" instrument_node="">
</span><p data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Students can also directly choose to work in France or abroad. Below are some of the positions now held by IMBA alumni:</span></p><span data-dcnode-id="3748" instrument_node="">

</span><div class="field__item" data-dcnode-id="3632"><h4 data-dcnode-id="3685"><strong data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Skills and Jobs</span></strong></h4><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Students will enhance their ability to analyse complex situations and contribute to strategic decisions with a more holistic view on doing business and greater confidence to take on additional responsibilities. They will become reliable professionals with a hands-on mentality and analytical, digital and intercultural social skills.</span></p><span data-dcnode-id="3681" instrument_node="">
</span><p data-dcnode-id="3679"><span data-dcnode-id="3680" instrument_node="">More specifically Master’s will lead to:</span></p><span data-dcnode-id="3678" instrument_node="">
</span><ul data-dcnode-id="3664"><span data-dcnode-id="3677" instrument_node="">
</span><li data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">Broadening and deepening general knowledge in Management and Finance</span></li><span data-dcnode-id="3674" instrument_node="">

</span><div class="field__item" data-dcnode-id="3543"><h4 data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Teaching</span></h4><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3594"><strong data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Organization</span></strong></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">The program covers two academic years. Students can choose to apply to Master 1 or to Master provided they fullfil the requirements.</span></p><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3589" instrument_node="">Master 1: From September until April</span><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">
Master 2 (English Track): From September until February / (French Track) : From September until December</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">In Master 2 there are&nbsp;a joint courses between both tracks and more specialized courses for each track.</span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Class size is limited to 25 students. Classes include students from around the world (more than 16 different nationalities).</span></p><span data-dcnode-id="3579" instrument_node="">
</span><h4 data-dcnode-id="3576"><strong data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">Master 1</span></strong></h4><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3571"><strong data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Professional Experience: </span></strong><span data-dcnode-id="3572" instrument_node="">An elective 3-month work placement in France or abroad</span></p><span data-dcnode-id="3570" instrument_node="">
</span><h4 data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Master 2</span></h4><span data-dcnode-id="3567" instrument_node="">
</span><p data-dcnode-id="3563"><strong data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Professional Experience: </span></strong><span data-dcnode-id="3564" instrument_node="">6-month work placement in France or abroad</span></p><span data-dcnode-id="3562" instrument_node="">
</span><p data-dcnode-id="3560"><span data-dcnode-id="3561" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3556"><strong data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Teaching Method</span></strong></p><span data-dcnode-id="3555" instrument_node="">
</span><p data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">The teaching method and the small size of the class foster strong student involvement, through active participation, personal involvement and team work. Emphasis is placed on the development of analytical skills, critical thinking, and digital and social skills.</span></p><span data-dcnode-id="3552" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3551" instrument_node="">All courses consist of a mix of lectures, discussions, conferences, projects, learning expeditions, presentations, academic readings, case studies and online courses from </span><em data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Harvard Business Publishing</span></em><span data-dcnode-id="3548" instrument_node="">.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><p data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">Faculty members are international Professors, Researchers, Managers, Entrepreneurs and Senior Lecturers who all enthusiastically share their vision and expertise.</span></p></div><span data-dcnode-id="3542" instrument_node="">

</span><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">Admission Requirements: 180 ECTS credits (European credit transfer system) in the context of a Bachelor’s degree or equivalent diploma (BA/BSc&nbsp; Honours)</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">How to Apply: Written application with a minimum English test score for admissibility (90 TOEFL IBT, 850 TOEIC, 7 IELTS – Native English-speaking candidates and candidates holding a Bachelor degree fully taught in English are exempt from this requirement)&nbsp; and interview for admission.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><h4 data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">Master 2</span></h4><span data-dcnode-id="3499" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">Admission Requirements: 240&nbsp;ECTS credits (European credit transfer system) in the context of a Bachelor’s degree or equivalent diploma (BA/BSc honours, Bachelor or equivalent)</span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">How to Apply: Written Application with a minimum English test score for admissibility (90 TOEFL IBT, 850 TOEIC, 7 IELTS – Native English-speaking candidates and candidates holding a Bachelor degree fully taught in English are exempt from this requirement)&nbsp; and interview for admission</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3487"><strong data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">For&nbsp;&nbsp;2022-2023, both&nbsp;universites (University Paris Est Créteil and University Gustave Eiffel) will allow all international students applying to Master's degree to pay the same registration fees as French or European Union students, in accordance with the executive board decision&nbsp;and according to all the legal procedures for fees waiver. </span></strong></p><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3478"><span data-dcnode-id="3485" instrument_node="">Please note that at UPEC, international candidates as well as French candidates&nbsp;</span><strong data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">who interrupted their studies</span></strong><span data-dcnode-id="3482" instrument_node=""> are considered in the track of Continuous Education which require additional fees (check&nbsp;</span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iae-eiffel.fr/en/fees-continuous-education"><span data-dcnode-id="3481" instrument_node="">here</span></a><span data-dcnode-id="3479" instrument_node="">).</span></p></div><span data-dcnode-id="3476" instrument_node="">
