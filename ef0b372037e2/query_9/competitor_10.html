</span><h1 data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Third floor of the Eiffel tower</span></h1><span data-dcnode-id="1331" instrument_node="">
</span><br data-dcnode-id="1330"><span data-dcnode-id="1329" instrument_node="">
</span><section data-dcnode-id="677"><span data-dcnode-id="1328" instrument_node="">

</span><div class="pull-right" data-dcnode-id="1315" style="width: 300px; height: 600px"><span data-dcnode-id="1325" instrument_node="">

</span><span data-dcnode-id="1316" instrument_node="">
</span></div><span data-dcnode-id="1314" instrument_node="">
</span></div><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The 3rd floor of the Eiffel Tower is the highest floor accessible to the public. From high up, there is little more than the technical installations dedicated to the radio and tele-diffusion. It is a floor on 2 levels, there is a closed room and above, a gallery around the monument and some curiosities.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">How to go up to the 3rd floor of the Eiffel Tower? What is the price of the ticket ? What is there to see on the 3rd floor? These are all questions whose answers are below.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><br data-dcnode-id="1305"><span data-dcnode-id="1304" instrument_node="">
</span><h2 data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">How to go upstairs</span></h2><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1300" instrument_node="">To access the 3rd floor, you have no choice: You will have to take the elevator. Indeed it's been years that the staircase has been condemned for everyday use, our day it serves only as an emergency exit. You must take the ticket on the ground floor, it must include the climb to the top, otherwise it is a standard ticket only allowing the climb to the 2nd. When you're in 2</span><sup data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">nd</span></sup><span data-dcnode-id="1297" instrument_node="">, I think you will not be able to buy tickets for the summit, it will be too late.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1292"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Without elevators:</span></strong></p><span data-dcnode-id="1291" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Adult: 7,00 €</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Child: 5,00 €</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Special rate: 3,00 €</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1279"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">With elevators:</span></strong></p><span data-dcnode-id="1278" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Adult: 17,00 €</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Child (12-24): 14,50 €</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Special rate: 10,00 €</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">The lifts for the 3rd floor are taken from the 2nd, it is not possible to go directly from the ground to the 3rd floor. 

﻿



</span></p><div data-dcnode-id="1222" style="float:left"><span data-dcnode-id="1266" instrument_node="">

</span><p class="imgModalLegende" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">The 3rd floor of the Eiffel Tower, seen from the Trocadero</span></p><span data-dcnode-id="1231" instrument_node="">
</span></div><span data-dcnode-id="1229" instrument_node="">
</span></div><span data-dcnode-id="1227" instrument_node="">
</span></div><span data-dcnode-id="1225" instrument_node="">
</span></div><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">

		
		This is the very structure of the Eiffel Tower which is like that, the lifts start from the ground and climb to the 2nd with a stop at the 1st, and from there you take another elevator that goes up vertically to the 3rd. (The first lifts being oblique, they follow the curve of the tower) In fact, there are 4 elevators rising at the top, two double-cabins. While one climbs to the top and the other goes down, they work in pairs. One is red, the other yellow.</span><p data-dcnode-id="1220"></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1218" instrument_node="">The cabins are rectangular, real boxes of sardines, and the comparison is quite fair by high affluence. The poor liftier is as tight as the visitors, when there are people, despite his protection bar. The elevators are glazed, which allows to see the landscape that rises more and more. By being attentive we see the passage at </span><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Intermediate-floor.php"><span data-dcnode-id="1217" instrument_node="">the intermediate floor</span></a><span data-dcnode-id="1215" instrument_node="">, which it does not stop of course. The view is very regularly cut by the beams of the caissons format the tower, as well as by the spacers, but it is not really annoying for the sight. The climb is done in a few seconds, about thirty or so. Arrived at the top, the ports open directly into the room of the third floor, unique room on this level.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">
</span><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The lower level</span></h2><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">The 3rd floor is, like the 2nd, double. There is a lower level and a higher one. The elevators lead to the lower level, they open into the main hall, a square room of 16m 50 side with slightly truncated angles. The central part is occupied by the arrival of the 4 cabins of elevators, but also by technical installations, the departure of the staircase, and by the very structure of the Eiffel tower, that is to say the 4 pillars which start from the 2nd and climb to the top, although these pillars, we do not really see them.

﻿



</span></p><div data-dcnode-id="1161" style="float:right"><span data-dcnode-id="1205" instrument_node="">
</span><img alt="Coursive of the 3rd floor" class="img-responsive pull-right imgAgrandissable" data-dcnode-id="1204" data-modal="0400-Coursives-du-3e-etage" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Vignettes/Visites/0400-Coursives-du-3e-etage-V.jpg&amp;raw" style="margin-left: 8px"><span data-dcnode-id="1203" instrument_node="">
</span><em data-dcnode-id="1199"><small data-dcnode-id="1200"><p class="text-center" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Coursive of the 3rd floor</span></p></small></em><span data-dcnode-id="1198" instrument_node="">
</span><span data-dcnode-id="1196" instrument_node="">

		The space between the central part and the outer walls is 3m25, which leaves a lot of room to walk, even if, by high attendance, it is still the crowd. By a simple calculation, we deduce that the central part is 10m side, 100m</span><sup data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">2</span></sup><span data-dcnode-id="1157" instrument_node="">.</span><p data-dcnode-id="1156"></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1154" instrument_node="">The walls are equipped with large windows that offer a panoramic view of Paris and its region. The view is very far, the </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Visibility-from-the-top.php"><span data-dcnode-id="1153" instrument_node="">visibility of the top of the Eiffel Tower</span></a><span data-dcnode-id="1151" instrument_node=""> was calculated accurately and confirmed by the observations. Here, we do not have a sensation of height because we are in a closed room, we feel like we are safe. Above the windows there is an interesting 360 ° path leading to the main cities of the world, as well as the most emblematic monuments: The </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Taj-Mahal"><span data-dcnode-id="1150" instrument_node="">Taj Mahal</span></a><span data-dcnode-id="1148" instrument_node="">, the </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Statue-of-Liberty"><span data-dcnode-id="1147" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="1145" instrument_node="">, the </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Christ-the-Redeemer"><span data-dcnode-id="1144" instrument_node="">Corcovado</span></a><span data-dcnode-id="1142" instrument_node="">, etc.</span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node="">In each corner there are signs showing old photos. They are related to the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/History-of-the-Eiffel-tower.php"><span data-dcnode-id="1138" instrument_node="">history of the tower</span></a><span data-dcnode-id="1136" instrument_node="">. There is, for example, a cliché of the principal engineers, the personalities who visited the tower, the </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Scientific-applications-of-the-Eiffel-tower.php"><span data-dcnode-id="1135" instrument_node="">scientific experiments</span></a><span data-dcnode-id="1133" instrument_node=""> which allowed the survival of the monument, etc.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">At two places in this room there is a staircase to the upper level. Protected by a full glass racks, they cause a small flow of air unpleasant but preventive, because it denotes the weather above: The colder it is here, the colder you get up there! Formerly these </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Stairs-of-the-Eiffel-tower.php"><span data-dcnode-id="1129" instrument_node="">stairs</span></a><span data-dcnode-id="1127" instrument_node=""> did not exist, we used the spiral staircase leading to the office of Mr Eiffel, upstairs , which still exists but is doomed.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
</span><h2 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">The upper level</span></h2><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">The upper level is the highest public open area of the Eiffel Tower. You are almost 300m from the ground, and there, the impression of height is strong. When approaching the edge do not be too dizzy because the view can carry down, while in the room below, it is not possible.

		The four galleries that run around are protected by a normal railing, but surmounted by a thick mesh with wide mesh (to let the eye) that passes over and is anchored in the walls of the tower. Thus we are completely locked in a cage of wire, which makes it possible to avoid the accidents. The view is not affected too much.</span><p data-dcnode-id="1071"></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node=""> The gallery is not very wide, about a meter and a half, it varies according to the places. The air is cool, the wind can be strong, pay attention. All around there are telescopes on feet, as on the lower floors. This level is pretty well equipped with items to discover. There is, pell-mell:</span></p><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1038"><span data-dcnode-id="1066" instrument_node="">
</span><li data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">A model of the top of the tower in 1889 </span></li><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Mr Eiffel's office. </span></li><span data-dcnode-id="1060" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">A 3D representation of the installation of the </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Free-air-pressure-gauge.php"><span data-dcnode-id="1058" instrument_node="">air pressure gauge</span></a><span data-dcnode-id="1056" instrument_node="">. It refers to the </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Scientific-applications-of-the-Eiffel-tower.php"><span data-dcnode-id="1055" instrument_node="">scientific experiments</span></a><span data-dcnode-id="1053" instrument_node=""> that were made on the tower.</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The champagne bar </span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">A commemorative plaque during the liberation of Paris in 1944 </span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Information about radio broadcasting, and how it was born here </span></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The toilet</span></li><span data-dcnode-id="1039" instrument_node="">
</span></ul><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">All of these are described below, but by going around you will not fail to look up to see the technical installations of radio and television broadcasting of the tower. From there you are just a few meters below, and there is another room above, but it is inaccessible to the public, it contains the devices for the proper functioning of multiple antennas. The top is bristling, there are really a lot of parables, cylinders, and various wires up there, and that's where you look.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Another surprising element is the lightning rods. There are 4 important at the top of the tower, we can hardly see them looking up, but there are 8 others around the 3rd floor, more simple. These are slashes terminated by 8 very sharp points, arranged 2 by 2 on each side. They complete the 4 main lightning conductors and are regularly struck by lightning, which justifies the closure of the 3rd floor in case of storm.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Before going on to the description of each element, here is the text written by Gustave Eiffel in 1900 describing the 3rd floor of his tower. It is quite technical, but explains well how was this floor to its construction.</span></p><span data-dcnode-id="1028" instrument_node="">

</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">First of all here are the technical plans of the 3rd floor, they were the ones who served for the realization of the monument. (All the planks are available </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Maps-of-the-Eiffel-tower.php"><span data-dcnode-id="1006" instrument_node="">here on this site</span></a><span data-dcnode-id="1004" instrument_node="">.</span></p><span data-dcnode-id="1002" instrument_node="">

</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Map of the third floor (Figure 2) :</span></p><span data-dcnode-id="997" instrument_node="">

</span><h5 data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">XIV. Panel 29 and third floor</span></h5><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Another board describing an 'assembly detail'. Here, Gustave Eiffel describes the techniques to assemble the upper part of his tower. It shows the description of the beam of the third floor, the one that supports the pulleys of the elevator, as well as the entire gallery of the 3rd floor. There is even, above the third floor, a room reserved for the engineer. The left part of this plate gives the dimensions of various beams of this upper part, as well as the description of the railing, etc.</span></p><span data-dcnode-id="983" instrument_node="">

</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Plate XVIII is probably the most interesting of all. It contains the interior arrangements of the pillars and the first floor, it is on this board that we see where the theater was, the two restaurants (one French, the other Russian, locker rooms, local guardian of night, etc.). It is a little technical board, despite the fact that there are still ribs, of course.</span></p><span data-dcnode-id="960" instrument_node="">

</span><div class="row" data-dcnode-id="934"><span data-dcnode-id="950" instrument_node="">

</span><h5 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">XIX. Floors and upper parts. Exterior elevations and amenities</span></h5><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">This board, the 19th, is very interesting too. It shows the 1st and 2nd floors of the tower as they were at the time of the construction of the tower. We can see the shape of the pavilions, the pavilions, the decorations. The summit part is as well described. These drawn elements are less technical elements than a general representation with mentions about what is involved. There are also few ribs.</span></p><span data-dcnode-id="937" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span><br data-dcnode-id="932"><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">The third platform has its floor at +309.63; it forms a closed room, whose central part is occupied by the Edoux elevator, and by the four pillars which extend to the lower part of the large diagonal beams of the summit. The square occupied by these four pillars is 10 m wide. On the periphery reigns a corbelled promenade-gallery with sloping angles, 3.25 m wide, supported by the large consoles of the coronation. The width is 16,50 m and the surface is 251 m</span><sup data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">2</span></sup><span data-dcnode-id="927" instrument_node="">.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">The floor is made of contiguous 0.08 m planks placed on iron joists and covered with asphalt. The promenade gallery was raised by 0.18 m with joists and a 25 mm parquet floor covered with linoleum.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The perimeter is occupied by a wall of wood and iron, forming a railing 1.20 m high, surmounted by openings that receive movable windows that can be raised or lowered depending on who wants to be or not preserved from the wind that usually prevails at this height. It is through these openings that visitors can contemplate the panorama in front of them and whose perspective drawings placed above the openings represent the most remarkable points.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">The layout is complemented by small shops arranged between the pillars and the elevator shaft, in which souvenirs of the Tower are sold. The ceiling is formed by the underside of the floor of the reserved pavilion and the upper gallery, which is accessed by a small winding staircase. The ceiling height is 2.50 m.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The upper part consists of a square wooden pavilion of 10.50 m side, surrounded by a gallery with slabs 2.77 m wide. This open-air tunnel, located at the elevation 312.21, is equipped with an up-to-date railing and a skeleton floor; it receives the way Decauville, used to move the two projectors Mangin, and is filled with benches, from which one can enjoy all the beauty of the immense horizon.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">The pavilion includes, in addition to the location of the extended elevator shaft, a reception room with bathroom, kitchen and water closet, as well as four small laboratories for the scientific experiments of electricity, meteorology, physics and physiology (see Plate XIX, Fig. 6). The height is 2.27 m; the roof, almost horizontal, is filled with lead. The walls are double and fitted with mineral cotton inside for the apartments to be protected from the weather. From the gallery, the staircase leads to the campanile and the lighthouse.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">All this part was not accessible to the public during the Exhibition; Since then, Mr. Eiffel has, on certain days, given free access to the public, and a special staircase has been recently set up for this purpose. Along the gutter which reigns around the gallery are inclined paragliders; a beak of gas in frosted globes illuminated the upper part of the Tower. The water supply was through a small tank that ended up driving the spring water Worthington pump. The inner dwellings were lit by electricity, and a telephone connected the apartment to the central telephone of the Tower which communicated itself with the public network.</span></p><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
</span></div><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span></div><span data-dcnode-id="895" instrument_node="">
</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
</span><h2 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">What is there to see on the 3rd floor of the Eiffel Tower?</span></h2><span data-dcnode-id="890" instrument_node="">
</span><span data-dcnode-id="888" instrument_node="">
</span><h3 data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">The view of Paris and its surroundings</span></h3><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="884" instrument_node="">The highest point of Paris, the 3rd floor of the Eiffel Tower is of course the ideal place for the view of Paris and its region. From here the view is up to about 85Kms, but in theory, we should be able to see points at 126.5 Kms, if there were at an altitude of 300m high.
		
		But as there is none, we must be satisfied with a visibility 85Kms, which is not bad. You have a study on the </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Visibility-from-the-top.php"><span data-dcnode-id="883" instrument_node="">view range</span></a><span data-dcnode-id="881" instrument_node=""> of the top of the Eiffel Tower, accessible on this site.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">On the 3rd floor there are two observatories. The first is in the lower room, the windows all around are large and allow to see Paris, while staying warm. The disadvantage is that we are limited to see the foot of the Eiffel Tower, the view is blocked. The other place is the upper gallery, where we are in the open air. From there you can see almost at the foot of the tower, and that's probably the most impressive point of view.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">On a clear day we can see the Paris region, the inhabitants will be happy to identify their cities, but the most interesting is also to find the main monuments of Paris. Some are obvious, like the triumphal arch or the Sacred Heart, but finding the Pantheon is already more difficult. You have spotting scopes (paid) to help you.</span></p><span data-dcnode-id="873" instrument_node="">
</span><span data-dcnode-id="871" instrument_node="">
</span><br data-dcnode-id="870"><span data-dcnode-id="869" instrument_node="">
</span><h3 data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">The geographical frieze</span></h3><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">It is a frieze running around the lower level room, it is placed above windows so that we can see it from everywhere, without having to be near the windows. It shows the direction and distance of the main cities of the world, as well as the main monuments. As this frieze goes around the room, we have a 360 ° description of the horizon, scanning the whole Earth.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">It's informative and fun, but it's still not that original.</span></p><span data-dcnode-id="860" instrument_node="">
</span><span data-dcnode-id="858" instrument_node="">
</span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node="">
</span><h3 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">The model of the summit</span></h3><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">This model is in a glazed space behind a staircase leading to the lower level. It measures approximately 80cm in height and what strikes the first approach is its red-brown color which is the original color of the tower, in 1889. Then we see that it does not have any shape at all that we know. The summit was at the time formed by two semicircular arches intersecting at 90 ° supporting three successive platforms, the last leading to the flagpole. The most attentive will notice that the level where they are is much narrower than at the time, it is due to the various later arrangements which reduced the space to circulate. Moreover this space was occupied, as it is said in the book of Gustave Eiffel reproduced just above ("Description of the 3rd floor in 1900, by Gustave Eiffel"), the gallery was occupied by a way Decauville, a kind small railroad to move Mangin projectors on trolley.
		

		These projectors were very powerful, they had the ability to illuminate a large area around the tower. The current lighthouses that sweep the Parisian sky at night are a tribute to this historic system.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The model also has the merit of showing that the Eiffel Tower is made of caissons. A caisson is an empty cube whose sides are made of beams. Other beams, called spacers, consolidate the whole by connecting the angles between them. The Eiffel tower is a stack of boxes, there are 29 layers, the first 5 on the 1st floor, the next 12 on the 2nd, the other amount on the 3rd. On the model we see the 27th, 28th and 29th caissons.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Otherwise, the appearance of the third floor has not really changed since the nineteenth century, especially its summit has been changed. To note the presence right next to a descriptive panel of the model, it takes again the elements which I just described bringing some precisions, like the number of shops of the time, namely, 6. It also indicates the place where were the meteorological instruments (On the penultimate platform).</span></p><span data-dcnode-id="844" instrument_node="">
</span><span data-dcnode-id="842" instrument_node="">
</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
</span><h3 data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">The office of Mr Eiffel</span></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">The office of Mr Eiffel is a room he had reserved at the top of the tower, to welcome visitors for example. It is a rectangular room large enough that he had arranged in office. It was equipped with a bathroom with toilet, which was not that common at the time.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The current representation does not fully conform to what existed in 1900. Visible from the outside only, the office has been truncated to gain space for other functions. It is decorated in the fashion of the nineteenth century, and has 3 mannequins. One of Eiffel, represented in discussion with Thomas Edisson, and the third is the daughter of Mr Eiffel, Claire, represented standing with a fan. This scene is the reproduction of a real encounter, a day in 1889 during which Thomas Edisson offered Eiffel a copy of his invention, the phonograph. This phonograph present in the scene, it is placed on a dresser, between the two men. In the scene there is also a small piece of furniture which one can reasonably believe that it belonged to Eiffel, the two armchairs, and three frames on the wall. One represents the viaduct of Garabit, the other the dome of the observatory of Nice, two major works of Eiffel and the last is written in Asian ideogram, I do not know its meaning.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Various period objects occupy the space. The carpets and tapestries are of the style of the nineteenth century, very loaded, but true to what it was at the time. Claire is in front of a couch that we see quite badly, partly because of the double-sloped beams that cross the room in front of him.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">This scene is visible only from the outside through 3 relatively small windows, it's a shame because the interest is both historical and entertaining. It should be noted that the office was larger and perfectly rectangular at the time, nowadays it is truncated and smaller, the rest of the space being used for other isntallations.</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Although little emphasized this office is interesting to see and, I imagine, surprising for those unaware of its presence at 300m from the ground.</span></p><span data-dcnode-id="822" instrument_node="">
</span><br data-dcnode-id="821"><span data-dcnode-id="820" instrument_node="">
</span><div class="row" data-dcnode-id="812"><span data-dcnode-id="819" instrument_node="">
</span><div class="col-md-6" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">
</span></div><span data-dcnode-id="816" instrument_node="">
</span><div class="col-md-6" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span><span data-dcnode-id="809" instrument_node="">
</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><h3 data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">The champagne bar</span></h3><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">And yes, there is a champagne bar on the 3rd floor of the Eiffel Tower. This is only a fairly simple counter behind which officiates a server offering two varieties of champagnes only: A white and a rosé. This is a selection of Alain Ducasse. In 2015 the prices were as follows:</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">It's very expensive for 10 cl, but what do you want, we do not take a glass of champagne on the 3rd floor every day ...</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Otherwise the champagne bar is quite small. Modern orange-dominant, the bottles are aligned on shelves in the back of the server. The latter draws his goods in cartons under the counter, but we must admit that at the end of the day it becomes a little messy. In addition the communication door, behind him, is sometimes open, which spoils a little class style that gives this bar. It is not a big deal, however, those who want it can not sit down, there are no tables here (for lack of space), so amateurs wander in the galleries, or even down to the lower level , to keep warm.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">So it's quite fun to see many people cutting by hand, walking around the galleries. Note that the flashy sign of this bar is illuminated at night. We must be able to see it from the ground if we move away from the tower. When the bar is closed the sliding doors are simply closed, but they allow you to see the interior, there are panes of the same style as those of the other elements present here</span></p><span data-dcnode-id="792" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
</span><br data-dcnode-id="789"><span data-dcnode-id="788" instrument_node="">
</span><h3 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">The plaque commemorating the liberation of Paris</span></h3><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">This plaque was affixed to remind the establishment of the tricolor flag on the Eiffel Tower in August 1944, Paris being released. Here is the full text.</span></p><span data-dcnode-id="782" instrument_node="">
</span><blockquote data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">
			Here, August 25, 1944 under the orders of Captain SARNIGUET, Sergeants Henri DURIAUX, Pierre NOEL, corporal Charles ROUARD, sappers Marcel CONVERSY, André TAILLEFER, of the regiment of fire-fighters of PARIS hoisted the tricolor flag in the capital still busy.
		</span></blockquote><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">This text is engraved on a plaque next to the coat of arms of the firefighters of the city of Paris, which represents the ship on the coat of arms of Paris on a badge of firemen, classic. For the anecdote, this flag was made with 3 sheets of 3 colors, sheets sewn roughly.</span></p><span data-dcnode-id="776" instrument_node="">
</span><span data-dcnode-id="774" instrument_node="">
</span><br data-dcnode-id="773"><span data-dcnode-id="772" instrument_node="">
</span><h3 data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Broadcasting information</span></h3><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">It is a panel of 5 columns, each presenting a great date in the history of telecommunications. He is bilingual, and here is his text.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Introduction: From the outset the telecommunication antenna function saved the tower from programmed destruction and has continued to develop until today.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">1898: E. Ducretet and E. Roger make the first link of TSF from the top of the Tower. Industrial and scientific French specialist in the construction of physics instruments, E. Ducretet participated actively in the development of the T.S.F.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">1904: On proposal of G. Ferrié the direction of the Engineering authorizes the post of T.S.F. of the tower thus officialisatnt the military role of the Tower.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">1925: After a first broadcasting experience (1921) and the installation of a temporary studio in the North Pillar (1922) Mr Privat begins in the "spoken newspaper", the first radio show.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">1935: Installation of a television transmitter at the top of the tower and 1st transmission. From 60 lines at the beginning we go to 441 lines in 1945.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p class="PuceRouge" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">2000: The tower reaches 324m after the work done by TDF on the UHF antenna. The current 120 antennas allow the diffusion on Paris and Ile-de-France of 41 television channels and 32 radio stations.</span></p><span data-dcnode-id="748" instrument_node="">
</span><span data-dcnode-id="746" instrument_node="">
</span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">
</span><h3 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Historical images</span></h3><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">In several places in the lower room there are illuminated panels with some pictures from the late nineteenth and early twentieth centuries, sometimes even more recently. We see for example the engineers who designed the tower, Gustave Eiffel the contractor, the architect Sauvestre, Emile Nouguier, the designer, etc. There are panels presenting the great of this World who came to visit the tower during the World Fair of 1889, with Buffalo Bill, the Shah of Persia Nasser-Eddin, the king of the Nallous and his family Dinah Salifou, the tzarevitch Nicola II, the Spanish kidney Isabelle II, etc. Another light panel shows the scintifical experiences that have been made on the tower. They were the ones who saved the monument, which was to be destroyed in 1909. But as the army had found a military interest, it was kept. But this interest was the boom in television broadcasting, which began here, during an interesting radio link between the 3rd floor of the tower and the Pantheon.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">All these panels are visible in the 3rd floor room, there are none on the galleries.</span></p><span data-dcnode-id="735" instrument_node="">
</span><br data-dcnode-id="734"><span data-dcnode-id="733" instrument_node="">
</span><h3 data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">And also...</span></h3><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">All these are not the only things to see on the 3rd floor of the Eiffel Tower. There is also a sign explaining how the </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Inauguration-of-the-Eiffel-tower.php"><span data-dcnode-id="728" instrument_node="">inauguration of the tower</span></a><span data-dcnode-id="726" instrument_node=""> took place, in 1889, the opportunity to see up close the technical installations at the top of the tower, the stairs going up to Mr Eiffel's office, the lightning conductors that go around the building, etc.</span></p><span data-dcnode-id="724" instrument_node="">
</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
