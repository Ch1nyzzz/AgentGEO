</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Whether you're lucky enough to have visited Paris or have only ever dreamed of going there, chances are you know of the French capital's most beloved landmark: the Eiffel Tower.</span></p><div class="ad-unit" data-dcnode-id="2512" id="ad-unit-1"></div><p data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">The Eiffel Tower, La Tour Eiffel in French, was the main exhibit of the Paris Exposition — or World's Fair — of 1889. It was constructed to commemorate the centennial of the French Revolution and to demonstrate France's industrial prowess to the world.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2509" data-feat-ref="hawk-id-2" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="4515920681645187600" data-widget-type="seasonal"></aside><p data-dcnode-id="2504"><span data-dcnode-id="2508" instrument_node="">"Although at the beginning it was seen as 'the ugliest building in Paris,' soon it became the symbol of the city," said Tea Gudek Snajdar, an Amsterdam-based art historian, museum docent and a blogger at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2506" data-url="http://culturetourist.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//culturetourist.com/"><span data-dcnode-id="2507" instrument_node="">Culture Tourist</span></a><span data-dcnode-id="2505" instrument_node="">.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2459" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2460" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2461"><div data-dcnode-id="2462"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2463" id= ass="unmute__icon" data-dcnode-id="1917"><svg data-dcnode-id="1918" height="74" preserveAspectRatio="xMidYMid meet" viewBox="0 0 100 74" width="100" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1919" fill="#212121"><path d="M47.535 2.916L22.708 19.791l-.002.002-2.48 1.685v29.736l7.249 4.935 20.062 13.665c1.363.928 2.479.338 2.479-1.312V4.229c0-1.65-1.117-2.24-2.48-1.313zM10.063 21.478H4c-2.2 0-4 1.8-4 4v21.736c0 2.2 1.8 4 4 4h10.074V21.478h-4.011zM74.5 11.85a3.7 3.7 0 10-5.232 5.232c5.125 5.125 7.947 11.938 7.947 19.185 0 7.246-2.822 14.058-7.947 19.182a3.7 3.7 0 105.232 5.233c6.523-6.522 10.115-15.193 10.115-24.415 0-9.224-3.592-17.895-10.115-24.417z" data-dcnode-id="1921"></path><path d="M85.266 1.084a3.7 3.7 0 10-5.232 5.232c16.513 16.514 16.513 43.385 0 59.899a3.7 3.7 0 105.232 5.232c19.4-19.4 19.4-50.964 0-70.363zM64.176 22.174a3.7 3.7 0 00-5.233 5.232 12.449 12.449 0 013.67 8.86 12.44 12.44 0 01-3.67 8.856 3.701 3.701 0 005.233 5.233 19.792 19.792 0 005.837-14.088 19.8 19.8 0 00-5.837-14.093z" data-dcnode-id="1920"></path></g></svg></div></div><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1905"><div class="jw-icon jw-reset" data-dcnode-id="1911"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="1912" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="1913"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1906"><div class="jw-error-text jw-reset-text" data-dcnode-id="1907" data-nosnippet="" dir="auto"><span data-dcnode-id="1910" instrument_node="">This video file cannot be played.</span><span class="jw-break jw-reset" data-dcnode-id="1909"></span><span data-dcnode-id="1908" instrument_node="">(Error&nbsp;Code:&nbsp;224003)</span></div></div></div></div></div></div></div></div></div></div></div><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Kochlin and Nouguier were the chief engineers for the Compagnie des Etablissements Eiffel — Gustave Eiffel's engineering firm. Together with Eiffel and a French architect, Stephen Sauvestre, the engineers submitted their plans to a contest that would determine the centerpiece for the 1889 World's Fair in Paris.</span></p><div class="ad-unit" data-dcnode-id="1894" id="ad-unit-2"></div><p data-dcnode-id="1889"><span data-dcnode-id="1893" instrument_node="">The Eiffel company's design won, and construction of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1891" data-url="https://www.livescience.com/29263-iron.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/29263-iron.html"><span data-dcnode-id="1892" instrument_node="">wrought-iron tower</span></a><span data-dcnode-id="1890" instrument_node=""> began in July 1887. But not everyone in Paris was thrilled with the idea of a giant metal monument looming over the city.&nbsp;</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Even to contemporary eyes, the Eiffel Tower is unique. But in the late 19th century, nothing had been seen like it. "Modern architecture was emerging slightly in Paris before the Eiffel Tower. But it was doing it in a very shy way," said Gudek Snajdar. Iron, which was newly popular as a building material because of the Industrial Revolution, became a cornerstone of modern architecture. But in 1887, it had only appeared internally, as support structures, or in unimportant buildings like hothouses, factories and bridges.&nbsp;</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">"The biggest problem was that they still didn't know how to make something aesthetically appealing with the new material. When they were using it, they would try to repeat historic stone structures. It's very visible on — for example, pillars in the Bibliotheque Ste.-Genevieve in Paris," explained Gudek Snajdar. "However, with the Eiffel Tower they changed completely the way they were using the new material. The structure, its appearance is completely new and modern."</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">When construction of the tower began on the Champs de Mars, a group of 300 artists, sculptors, writers and architects sent a petition to the commissioner of the Paris Exposition, pleading him to halt construction of the "ridiculous tower" that would dominate Paris like a "gigantic black smokestack."</span></p><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">But the protests of Paris' artistic community fell on deaf ears. Construction of the tower was completed in just over two years, on March 31, 1889.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1880" data-feat-ref="bordeaux-feat-id-68" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1879" data-feat-ref="bordeaux-feat-id-70" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="1858"><div class="image-full-width-wrapper" data-dcnode-id="1870"><div class="image-widthsetter" data-dcnode-id="1871" style="max-width:1000px;"><p class="vanilla-image-block" data-dcnode-id="1872" style="padding-top:66.40%;"><picture data-dcnode-id="1873"><source alt="A 2011 light show at the Eiffel Tower used 20,000 bulbs. Overall, the tower is lined with 5 billion lights." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1878" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Asv6dZpeLGYHoX6ZCumBd8.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.n tent.chatnoir.eu/?index=cw22&amp;url=https%3A//shutterstock.7eer.net/c/221109/42119/1305%3FsubId1%3Dlivescience-us-4321422258192087000%26sharedId%3Dlivescience-us%26u%3Dhttp%253A%252F%252Fwww.shutterstock.com%252Fgallery-2422p1.html%253Fcr%253D00%2526pl%253Dedit-00" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1866" instrument_node="">Nick K.</span></a><span data-dcnode-id="1864" instrument_node=""> / </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="5332455889132498000" data-dcnode-id="1862" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Shutterstock.com" data-merchant-id="199728" data-merchant-name="shutterstock.com" data-merchant-network="ImpactRad" data-merchant-url="shutterstock.com" data-placeholder-url="https://shutterstock.7eer.net/c/221109/42119/1305?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=http%3A%2F%2Fwww.shutterstock.com%2F%3Fcr%3D00%26pl%3Dedit-00" data-url="http://www.shutterstock.com/?cr=00&amp;pl=edit-00" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shutterstock.7eer.net/c/221109/42119/1305%3FsubId1%3Dlivescience-us-5332455889132498000%26sharedId%3Dlivescience-us%26u%3Dhttp%253A%252F%252Fwww.shutterstock.com%252F%253Fcr%253D00%2526pl%253Dedit-00" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1863" instrument_node="">Shutterstock.com</span></a><span data-dcnode-id="1861" instrument_node="">)</span></span></figcaption></figure><h2 data-dcnode-id="1856" id="construction-of-the-eiffel-tower"><span data-dcnode-id="1857" instrument_node=""> Construction of the Eiffel Tower</span></h2><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Each of the 18,000 pieces used to build the tower was calculated specifically for the project and prepared in Eiffel's factory on the outskirts of Paris. The wrought-iron structure is composed of four immense arched legs, set on masonry piers that curve inward until joining in a single, tapered tower.</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Building the tower required 2.5 million thermally assembled rivets and 7,300 tons of iron. To protect the tower from the elements, workers painted every inch of the structure, a feat that required 60 tons of paint. The tower has since been repainted 18 times.</span></p><h2 data-dcnode-id="1850" id="eiffel-tower-fun-facts"><span data-dcnode-id="1851" instrument_node=""> Eiffel Tower fun facts</span></h2><ul data-dcnode-id="1820"><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Gustave Eiffel used latticed wrought iron to construct the tower to demonstrate that the metal could be as strong as stone while being lighter.</span></li><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Eiffel also created the internal frame for the Statue of Liberty.</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Construction of the Eiffel Tower cost 7,799,401.31 French gold francs in 1889, or about $1.5 million.</span></li><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">The Eiffel Tower is 1,063 feet (324 meters) tall, including the antenna at the top. Without the antenna, it is 984 feet (300 m).</span></li><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">It was the world's tallest structure until the Chrysler Building was built in New York in 1930.</span></li><li data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">The tower was built to sway slightly in the wind, but the sun affects the tower more. As the sun-facing side of the tower heats up, the top moves as much as 7 inches (18 centimeters) away from the sun.</span></li><li data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">The sun also causes the tower to grow about 6 inches.</span></li><li data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">The Eiffel Tower weighs 10,000 tons.</span></li><li data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">There are 5 billion lights on the Eiffel Tower.</span></li><li data-dcnode-id="1827"><span data-dcnode-id="1831" instrument_node="">The French have a nickname for the tower: </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">La Dame de Fer</span></em><span data-dcnode-id="1828" instrument_node="">, "the Iron Lady."</span></li><li data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">The first platform is 190 feet above the ground; the second platform is 376 feet, and the third platform is almost 900 feet up.</span></li><li data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">The Eiffel Tower has 108 stories, with 1,710 steps. However, visitors can only climb stairs to the first platform. There are two elevators.</span></li><li data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">One elevator travels a total distance of 64,001 miles (103,000 kilometers) a year.</span></li></ul><h2 data-dcnode-id="1818" id="a-hallmark-of-modern-architecture"><span data-dcnode-id="1819" instrument_node=""> A hallmark of modern architecture</span></h2><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">The Eiffel Tower is unquestionably modern in its shape, which is distinct from the Neo-Gothic, Neo-Renaissance and Neo-Baroque styles that were popular in the 18th and 19th centuries, according to Gudek Snajdar. But its material truly made it stand out.&nbsp;</span></p><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">"The Eiffel Tower was one of the first examples of the modern architecture because of the iron," said Gudek Snajdar. "And the fact that the building didn't have any purpose in particular." It existed purely to demonstrate French architectural creativity and skill with materials to the world; it was imbued with meaning but not utility.</span></p><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">The Eiffel Tower is also a more democratic, and therefore modern, structure than other monuments of the time, according to Gudek Snajdar. Gustave Eiffel insisted that elevators be included in the tower, but they had to be imported from an American company because no French company could meet the quality standards, Gudek Snajdar said. "Because of the escalators, the building could be used as a tower from which Parisians and their visitors could enjoy a view on their city. That was something that was before only accessible to a few wealthy people that could afford flying in a hot air balloon. But now, it was rather cheap and anyone could enjoy the view on a city from it," she explained.&nbsp;</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">"That's why it's a great example of a modern architecture. It's democratic and not only available to a few of a wealthy people. But people of a different social background could use it and enjoy it."</span></p><h2 data-dcnode-id="1808" id="uses-of-the-tower"><span data-dcnode-id="1809" instrument_node=""> Uses of the tower</span></h2><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">The tower was intended as a temporary structure that was to be removed after 20 years. But as time passed, people no longer wanted to see the tower go.&nbsp;</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">"After seeing the success of the tower during and after the World Exhibition, many of the former enemies of the project publicly apologized. By the time the Exhibition was over, most Parisians were proud of the structure," said Iva Polansky, a Calgary-based novelist and historian at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1803" data-url="https://victorianparis.wordpress.com" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//victorianparis.wordpress.com/"><span data-dcnode-id="1804" instrument_node="">Victorian Paris</span></a><span data-dcnode-id="1802" instrument_node="">. "Although there remained a few die-hards like the novelist Guy de Maupassant, who continued to loathe the sight of it."</span></p><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Gustave Eiffel was also not keen on seeing his favorite project dismantled, and so he set about making the tower an indispensable tool for the scientific community.</span></p><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Just days after its opening, Eiffel installed a meteorology laboratory on the third floor of the tower. He invited scientists to use the lab for their studies on everything from gravity to electricity. Ultimately, however, it was the tower's looming height, not its laboratory, that saved it from extinction.&nbsp;</span></p><p data-dcnode-id="1792"><span data-dcnode-id="1796" instrument_node="">In 1910, the city of Paris renewed Eiffel's concession for the tower because of the structure's usefulness as a wireless telegraph transmitter. The French military used the tower to communicate wirelessly with ships in the Atlantic Ocean and intercept enemy messages during </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1794" data-url="https://www.livescience.com/16827-anzac-wwi-battlefield-turkey.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/16827-anzac-wwi-battlefield-turkey.html"><span data-dcnode-id="1795" instrument_node="">World War I</span></a><span data-dcnode-id="1793" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">The tower is still home to more than 120 antennas, broadcasting both radio and television signals throughout the capital city and beyond.</span></p><div class="bordeaux-slot" data-dcnode-id="1789" data-feat-ref="bordeaux-feat-id-69" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1788" data-feat-ref="bordeaux-feat-id-71" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="1767"><div class="image-full-width-wrapper" data-dcnode-id="1779"><div class="image-widthsetter" data-dcnode-id="1780" style="max-width:1000px;"><p class="vanilla-image-block" data-dcnode-id="1781" style="padding-top:66.70%;"><picture data-dcnode-id="1782"><source alt="View of the Paris skyline from the Eiffel Tower." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1787" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="View of the Paris skyline from the Eiffel Tower." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1786" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/DHKBer62VsD3NUKAsRuRni.jpg" data-s cnode-id="1778" instrument_node="">View of the Paris skyline from the Eiffel Tower. </span></span><span class="credit" data-dcnode-id="1769" itemprop="copyrightHolder"><span data-dcnode-id="1776" instrument_node="">(Image credit: </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="4682205111483043000" data-dcnode-id="1774" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="imantsu" data-merchant-id="199728" data-merchant-name="shutterstock.com" data-merchant-network="ImpactRad" data-merchant-url="shutterstock.com" data-placeholder-url="https://shutterstock.7eer.net/c/221109/42119/1305?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=http%3A%2F%2Fwww.shutterstock.com%2Fgallery-143326p1.html%3Fcr%3D00%26pl%3Dedit-00" data-url="http://www.shutterstock.com/gallery-143326p1.html?cr=00&amp;pl=edit-00" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shutterstock.7eer.net/c/221109/42119/1305%3FsubId1%3Dlivescience-us-4682205111483043000%26sharedId%3Dlivescience-us%26u%3Dhttp%253A%252F%252Fwww.shutterstock.com%252Fgallery-143326p1.html%253Fcr%253D00%2526pl%253Dedit-00" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1775" instrument_node="">imantsu</span></a><span data-dcnode-id="1773" instrument_node=""> / </span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="5332455889132498000" data-dcnode-id="1771" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Shutterstock.com" data-merchant-id="199728" data-merchant-name="shutterstock.com" data-merchant-network="ImpactRad" data-merchant-url="shutterstock.com" data-placeholder-url="https://shutterstock.7eer.net/c/221109/42119/1305?subId1=hawk-custom-tracking&amp;sharedId=hawk-prefix&amp;u=http%3A%2F%2Fwww.shutterstock.com%2F%3Fcr%3D00%26pl%3Dedit-00" data-url="http://www.shutterstock.com/?cr=00&amp;pl=edit-00" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shutterstock.7eer.net/c/221109/42119/1305%3FsubId1%3Dlivescience-us-5332455889132498000%26sharedId%3Dlivescience-us%26u%3Dhttp%253A%252F%252Fwww.shutterstock.com%252F%253Fcr%253D00%2526pl%253Dedit-00" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1772" instrument_node="">Shutterstock.com</span></a><span data-dcnode-id="1770" instrument_node="">)</span></span></figcaption></figure><h2 data-dcnode-id="1765" id="the-tower-today"><span data-dcnode-id="1766" instrument_node=""> The tower today</span></h2><p data-dcnode-id="1760"><span data-dcnode-id="1764" instrument_node="">The Eiffel Tower is still the centerpiece of Paris' cityscape. More than 7 million people visit this iconic tower every year, according to the attraction's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1762" data-url="http://www.tour-eiffel.fr/en/everything-about-the-tower/the-eiffel-tower-at-a-glance.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tour-eiffel.fr/en/everything-about-the-tower/the-eiffel-tower-at-a-glance.html"><span data-dcnode-id="1763" instrument_node="">official website</span></a><span data-dcnode-id="1761" instrument_node="">. Since the tower's 1889 opening, 250 million people from around the world have enjoyed all that the Eiffel Tower has to offer.</span></p><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">And it has a lot to offer. The tower's three platforms are home to two restaurants, several buffets, a banquet hall, a champagne bar and many unique gift shops. Educational tours of the tower are available for children and tourist groups.</span></p><p data-dcnode-id="1753"><span data-dcnode-id="1757" instrument_node="">The tower is open to visitors 365 days a year, with visiting times varying by season. From June to September, the tower remains open until after midnight. Rates vary, but visitors can expect to pay between $13 (10 euros) and $19 (14.5 euros) per person for access to the tower's three public lifts and 704 stairs. Tickets, including group-discounted tickets, can be purchased </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1755" data-url="http://ticket.toureiffel.fr/index-css5-sete-pg1-lgen.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ticket.toureiffel.fr/index-css5-sete-pg1-lgen.html"><span data-dcnode-id="1756" instrument_node="">online</span></a><span data-dcnode-id="1754" instrument_node=""> or at the ticket office at the foot of the tower.</span></p><h2 data-dcnode-id="1751" id="legacy"><span data-dcnode-id="1752" instrument_node=""> Legacy</span></h2><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">The Eiffel Tower "provided Paris with the most distinguishable silhouette," said Polansky. Its distinct look has made it an enduring symbol of Paris.&nbsp;</span></p><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">But according to Gudek Snajdar, more than just its striking shape makes it an icon of the city. "Paris was a center of modern art and painting at the time [late 1800s], home to democracy, and hosting the first world exhibition," she said. "It was meant to be a birthplace of modern architecture, too."</span></p><p data-dcnode-id="1744"><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Additional reporting by Jessie Szalay, Live Science contributor.</span></em></p><span data-dcnode-id="1743" instrument_node="">
