</span><p data-dcnode-id="1977"><span data-dcnode-id="2002" instrument_node="">The </span><b data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Maria Pia Bridge</span></b><span data-dcnode-id="1999" instrument_node=""> (in Portuguese </span><i data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Ponte de D. Maria Pia</span></i><span data-dcnode-id="1996" instrument_node="">, commonly known as </span><i data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Ponte de Dona Maria Pia</span></i><span data-dcnode-id="1993" instrument_node="">) is a railway bridge built in 1877, and attributed to </span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="1992" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1990" instrument_node="">, situated over the </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portugal" title="Portugal"><span data-dcnode-id="1989" instrument_node="">Portuguese</span></a><span data-dcnode-id="1987" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norte_Region%2C_Portugal" title="Norte Region, Portugal"><span data-dcnode-id="1986" instrument_node="">northern</span></a><span data-dcnode-id="1984" instrument_node=""> municipalities of </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porto" title="Porto"><span data-dcnode-id="1983" instrument_node="">Porto</span></a><span data-dcnode-id="1981" instrument_node=""> and </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vila_Nova_de_Gaia" title="Vila Nova de Gaia"><span data-dcnode-id="1980" instrument_node="">Vila Nova de Gaia</span></a><span data-dcnode-id="1978" instrument_node="">. 
</span></p><p data-dcnode-id="1966"><span data-dcnode-id="1976" instrument_node="">Part of the Linha Norte system of the national railway, the </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wrought_iron" title="Wrought iron"><span data-dcnode-id="1975" instrument_node="">wrought iron</span></a><span data-dcnode-id="1973" instrument_node="">, double-hinged, crescent arch spans 353&nbsp;m (1,158&nbsp;ft), 60&nbsp;m (200&nbsp;ft) over the </span><a class="mw-redirect" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douro_River" title="Douro River"><span data-dcnode-id="1972" instrument_node="">Douro River</span></a><span data-dcnode-id="1970" instrument_node="">. At the time of its construction, it was the longest single-arch span in the world; today, it is no longer used for rail transport and was replaced by a modern structure in 1991. It is often confused with the </span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dom_Lu%25C3%25ADs_I_Bridge" title="Dom Luís I Bridge"><span data-dcnode-id="1969" instrument_node="">D. Luís Bridge</span></a><span data-dcnode-id="1967" instrument_node="">, which was built nine years later and is located 1 kilometre (0.62&nbsp;mi) to the west, but resembles the structure, albeit with two decks.

</span><p data-dcnode-id="1832"><span data-dcnode-id="1869" instrument_node="">In 1875, the </span><a class="new" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRoyal_Portuguese_Railway_Company%26action%3Dedit%26redlink%3D1" title="Royal Portuguese Railway Company (page does not exist)"><span data-dcnode-id="1868" instrument_node="">Royal Portuguese Railway Company</span></a><span data-dcnode-id="1866" instrument_node=""> announced a competition for a bridge to carry the Lisbon to Porto railway across the river Douro.</span><sup class="reference" data-dcnode-id="1863" id="cite_ref-IGESPAR_1-0"><a data-dcnode-id="1864" href="#cite_note-IGESPAR-1"><span data-dcnode-id="1865" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1862" instrument_node=""> This was very technically demanding: the river was fast-flowing, its depth could be as much as 20&nbsp;m (66&nbsp;ft) during times of flooding and the riverbed was made up of a deep layer of gravel. These factors ruled out the construction of piers in the river, so that the bridge would have to have a central span of 160m (525 ft).</span><sup class="reference" data-dcnode-id="1859" id="cite_ref-FOOTNOTELoyrette198560_2-0"><a data-dcnode-id="1860" href="#cite_note-FOOTNOTELoyrette198560-2"><span data-dcnode-id="1861" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1858" instrument_node=""> At the time the </span><a class="mw-redirect" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_the_largest_arch_bridges" title="List of the largest arch bridges"><span data-dcnode-id="1857" instrument_node="">longest bridge span</span></a><span data-dcnode-id="1855" instrument_node=""> was the 158.5m (520 ft) of the </span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eads_Bridge" title="Eads Bridge"><span data-dcnode-id="1854" instrument_node="">bridge</span></a><span data-dcnode-id="1852" instrument_node=""> built by </span><a class="mw-redirect" data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_B._Eads" title="James B. Eads"><span data-dcnode-id="1851" instrument_node="">James B. Eads</span></a><span data-dcnode-id="1849" instrument_node=""> over the </span><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mississippi_River" title="Mississippi River"><span data-dcnode-id="1848" instrument_node="">Mississippi</span></a><span data-dcnode-id="1846" instrument_node=""> at </span><a class="mw-redirect" data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Louis" title="St Louis"><span data-dcnode-id="1845" instrument_node="">St Louis</span></a><span data-dcnode-id="1843" instrument_node="">. When the project was approved, João Crisóstomo de Abreu e Sousa, member of the </span><i data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Junta Consultiva das Obras Públicas</span></i><span data-dcnode-id="1840" instrument_node=""> (</span><i data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Consultative Junta for Public Works</span></i><span data-dcnode-id="1837" instrument_node="">) considered that the deck should have two lanes.</span><sup class="reference" data-dcnode-id="1834" id="cite_ref-SIPA_3-0"><a data-dcnode-id="1835" href="#cite_note-SIPA-3"><span data-dcnode-id="1836" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1833" instrument_node="">
</span></p><p data-dcnode-id="1824"><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="1831" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1829" instrument_node="">'s design proposal, priced at 965,000 French francs, was the least expensive of the four designs considered, around two thirds of the cost of the nearest competitor.</span><sup class="reference" data-dcnode-id="1826" id="cite_ref-FOOTNOTELoyrette198560_2-1"><a data-dcnode-id="1827" href="#cite_note-FOOTNOTELoyrette198560-2"><span data-dcnode-id="1828" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1825" instrument_node=""> Since the company was relatively inexperienced, a commission was appointed to report on their suitability to undertake the work. Their report was favorable, although it did emphasise the difficulty of the project:
</span></p><span data-dcnode-id="1823" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="1818"><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">"The complete study of a structure of this size presents great difficulties. The methods of calculation known up until now can only be applied in practise with the aid of hypotheses which depart from established fact to a greater or lesser extent, and thus render the projected results uncertain."</span></p></blockquote><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1816" instrument_node="">Responsibility for the actual design is difficult to attribute, but it is probable that a large part was played by </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Th%25C3%25A9ophile_Seyrig" title="Théophile Seyrig"><span data-dcnode-id="1815" instrument_node="">Théophile Seyrig</span></a><span data-dcnode-id="1813" instrument_node="">, Eiffel's business partner, who presented a paper on the bridge to the Société des Ingénieurs Civils in 1878. Eiffel, in his account of the bridge, which accompanied the 1:50 scale model exhibited at the </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281878%29" title="Exposition Universelle (1878)"><span data-dcnode-id="1812" instrument_node="">1878 World's Fair</span></a><span data-dcnode-id="1810" instrument_node="">, credited Seyrig, along with </span><a class="new" data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHenry_de_Dion%26action%3Dedit%26redlink%3D1" title="Henry de Dion (page does not exist)"><span data-dcnode-id="1809" instrument_node="">Henry de Dion</span></a><span data-dcnode-id="1807" instrument_node="">, with work on the calculations and drawings.
</span></p><p data-dcnode-id="1780"><span data-dcnode-id="1805" instrument_node="">Construction started on 5 January 1876, and work on the abutments, piers and approach decking was complete by September. Work then paused due to winter flooding, and the erection of the central arch span was not re-started until March 1877.</span><sup class="reference" data-dcnode-id="1802" id="cite_ref-FOOTNOTELoyrette198560_2-2"><a data-dcnode-id="1803" href="#cite_note-FOOTNOTELoyrette198560-2"><span data-dcnode-id="1804" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1801" instrument_node=""> Construction was completed on 1 October 1877. By 28 October 1877, the platform was mounted and concluded, with the work on the 1,500 tonnes (3,300,000&nbsp;lb) bridge executed using a complement of 150 workers finishing on 30 October 1878.</span><sup class="reference" data-dcnode-id="1798" id="cite_ref-SIPA_3-1"><a data-dcnode-id="1799" href="#cite_note-SIPA-3"><span data-dcnode-id="1800" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1797" instrument_node=""> Tests were performed between 1 and 2 November, leading to the 4 November inauguration by King D. </span><a class="mw-redirect" data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_I_of_Portugal" title="Louis I of Portugal"><span data-dcnode-id="1796" instrument_node="">Louis I</span></a><span data-dcnode-id="1794" instrument_node=""> and Queen </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maria_Pia_of_Savoy" title="Maria Pia of Savoy"><span data-dcnode-id="1793" instrument_node="">Maria Pia of Savoy</span></a><span data-dcnode-id="1791" instrument_node=""> (the </span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eponym" title="Eponym"><span data-dcnode-id="1790" instrument_node="">eponym</span></a><span data-dcnode-id="1788" instrument_node=""> of the bridge).</span><sup class="reference" data-dcnode-id="1785" id="cite_ref-IGESPAR_1-1"><a data-dcnode-id="1786" href="#cite_note-IGESPAR-1"><span data-dcnode-id="1787" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="1782" id="cite_ref-SIPA_3-2"><a data-dcnode-id="1783" href="#cite_note-SIPA-3"><span data-dcnode-id="1784" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1781" instrument_node="">
</span></p><span data-dcnode-id="1779" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1770"><div class="thumbinner" data-dcnode-id="1771" style="width:222px;"><a class="image" data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APonte_Maria_Pia_e_Semin%25C3%25A1rio_Maior_do_Porto_crop.jpg"><img alt="" class="thumbimage" data-dcnode-id="1778" data-file-height="1114" data-file-width="1500" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Ponte_Maria_Pia_e_Semin%25C3%25A1rio_Maior_do_Porto_crop.jpg/220px-Ponte_Maria_Pia_e_Semin%25C3%25A1rio_Maior_do_Porto_crop.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Ponte_Maria_Pia_e_Semin%C3%A1rio_Maior_do_Porto_crop.jpg/330px-Ponte_Maria_Pia_e_Semin%C3%A1rio_Maior_do_Porto_crop.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Ponte_Maria_Pia_e_Semin%C3%A1rio_Maior_do_Porto_crop.jpg/440px-Ponte_Maria_Pia_e_Semin%C3%A1rio_Maior_do_Porto_crop.jpg 2x" width="220"></a><span data-dcnode-id="1776" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1772"><div class="magnify" data-dcnode-id="1774"><a class="internal" data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APonte_Maria_Pia_e_Semin%25C3%25A1rio_Maior_do_Porto_crop.jpg" title="Enlarge"></a></div><span data-dcnode-id="1773" instrument_node="">Another view between 1900 and 1910, showing the anchorages in cliffside of Seminário</span></div></div></div><span data-dcnode-id="1769" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1760"><div class="thumbinner" data-dcnode-id="1761" style="width:222px;"><a class="image" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APorto%2C_Domingos_Alv%25C3%25A3o_90_%289292229432%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="1768" data-file-height="800" data-file-width="1067" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Porto%252C_Domingos_Alv%25C3%25A3o_90_%289292229432%29.jpg/220px-Porto%252C_Domingos_Alv%25C3%25A3o_90_%289292229432%29.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/43/Porto%2C_Domingos_Alv%C3%A3o_90_%289292229432%29.jpg/330px-Porto%2C_Domingos_Alv%C3%A3o_90_%289292229432%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/43/Porto%2C_Domingos_Alv%C3%A3o_90_%289292229432%29.jpg/440px-Porto%2C_Domingos_Alv%C3%A3o_90_%289292229432%29.jpg 2x" width="220"></a><span data-dcnode-id="1766" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1762"><div class="magnify" data-dcnode-id="1764"><a class="internal" data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APorto%2C_Domingos_Alv%25C3%25A3o_90_%289292229432%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="1763" instrument_node="">The boats along the river in sight of the Maria Pia</span></div></div></div><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1758" instrument_node="">Between 1897 and 1898 there was some concern by technicians about the integrity of the bridge; its 3.1 metres (10&nbsp;ft) width, the interruption of principal beams, its lightweight structure resulted in an elastic nature.</span><sup class="reference" data-dcnode-id="1755" id="cite_ref-SIPA_3-3"><a data-dcnode-id="1756" href="#cite_note-SIPA-3"><span data-dcnode-id="1757" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1754" instrument_node=""> In 1890, in Ovar, the </span><i data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Oficina de Obras Metálicas</span></i><span data-dcnode-id="1751" instrument_node=""> (</span><i data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Metal Works Office</span></i><span data-dcnode-id="1748" instrument_node="">) existed to support the work to reinforce and repair those structures.</span><sup class="reference" data-dcnode-id="1745" id="cite_ref-SIPA_3-4"><a data-dcnode-id="1746" href="#cite_note-SIPA-3"><span data-dcnode-id="1747" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1744" instrument_node=""> As a consequence, restrictions were placed on transit over the structure between 1900 and 1906: weight limited to 14 tons per lane and velocity to 10 kilometres (6.2&nbsp;mi) per hour.</span><sup class="reference" data-dcnode-id="1741" id="cite_ref-SIPA_3-5"><a data-dcnode-id="1742" href="#cite_note-SIPA-3"><span data-dcnode-id="1743" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1740" instrument_node=""> Alterations to the deck of the bridge were performed under the initiatives of Xavier Cordeiro in 1900. These were followed between 1901 and 1906 by improvements to the triangular beams were performed by the Oficina of Ovar.</span><sup class="reference" data-dcnode-id="1737" id="cite_ref-SIPA_3-6"><a data-dcnode-id="1738" href="#cite_note-SIPA-3"><span data-dcnode-id="1739" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1736" instrument_node=""> Consulting with a specialist in metallic structures (the French engineer Manet Rabut) in 1907, the Oficina concluded that the arch and the works performed on the bridge were sufficient to allow circulation.</span><sup class="reference" data-dcnode-id="1733" id="cite_ref-SIPA_3-7"><a data-dcnode-id="1734" href="#cite_note-SIPA-3"><span data-dcnode-id="1735" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1732" instrument_node=""> But, this did not impede further work on the fore- and aft-structural members to make the bridge more accessible and to reinforce the main pillars.</span><sup class="reference" data-dcnode-id="1729" id="cite_ref-SIPA_3-8"><a data-dcnode-id="1730" href="#cite_note-SIPA-3"><span data-dcnode-id="1731" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1728" instrument_node="">
</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1726" instrument_node="">In 1916, a commission was created to study the possibility of a secondary transit between Vila Nova de Gaia and Porto.</span><sup class="reference" data-dcnode-id="1723" id="cite_ref-SIPA_3-9"><a data-dcnode-id="1724" href="#cite_note-SIPA-3"><span data-dcnode-id="1725" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1722" instrument_node="">
</span></p><p data-dcnode-id="1715"><span data-dcnode-id="1720" instrument_node="">By 1928, the bridge was already an obstacle to transit.</span><sup class="reference" data-dcnode-id="1717" id="cite_ref-SIPA_3-10"><a data-dcnode-id="1718" href="#cite_note-SIPA-3"><span data-dcnode-id="1719" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1716" instrument_node="">
</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1714" instrument_node="">In 1948, engineer João de Lemos executed several studies to evaluate the bridge's condition: study of the deck (including structural members); analysis of the continuous beams and the arch's structural supports.</span><sup class="reference" data-dcnode-id="1711" id="cite_ref-SIPA_3-11"><a data-dcnode-id="1712" href="#cite_note-SIPA-3"><span data-dcnode-id="1713" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1710" instrument_node=""> The analysis of the stability of the bridge was handled by the Laboratório Nacional de Engenharia Civil (LNEC), that resulted in the injection of cement and repair of the masonry joints and pillars, that connected with metallic structures. At the same time, flaking paint was removed from the structure and issues with corrosion were treated during the work, that included repainting with new metallic paint.</span><sup class="reference" data-dcnode-id="1707" id="cite_ref-SIPA_3-12"><a data-dcnode-id="1708" href="#cite_note-SIPA-3"><span data-dcnode-id="1709" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1706" instrument_node=""> These projects resulted from the need to improve the structure for the beginning of CP service across the bridge with improved Series 070 locomotives on 1 November 1950.</span><sup class="reference" data-dcnode-id="1703" id="cite_ref-SIPA_3-13"><a data-dcnode-id="1704" href="#cite_note-SIPA-3"><span data-dcnode-id="1705" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1702" instrument_node=""> Following a decade of service, an analytic study in 1966 began to analyze upgrading service to electrical locomotives (Bò-Bó), leading to the end of the electrification of the Linha Norte. Verification, </span><i data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">in loco</span></i><span data-dcnode-id="1699" instrument_node="">, determined stressed tests for the structure in 1969.</span><sup class="reference" data-dcnode-id="1696" id="cite_ref-SIPA_3-14"><a data-dcnode-id="1697" href="#cite_note-SIPA-3"><span data-dcnode-id="1698" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1695" instrument_node="">
</span></p><p data-dcnode-id="1685"><span data-dcnode-id="1693" instrument_node="">In 1998, there was a plan to rehabilitate and illuminate the bridge, resulting in the establishment of a tourist train attraction between the </span><i data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Museu dos Transportes</span></i><span data-dcnode-id="1690" instrument_node=""> and the area that included the wine cellars of Porto, a route that included 1.8 kilometres (1.1&nbsp;mi), using a tunnel formerly closed under the historic centre of Porto.</span><sup class="reference" data-dcnode-id="1687" id="cite_ref-SIPA_3-15"><a data-dcnode-id="1688" href="#cite_note-SIPA-3"><span data-dcnode-id="1689" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1686" instrument_node="">
</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1684" instrument_node="">In 1990, the bridge was classified by the </span><a data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Society_of_Civil_Engineers" title="American Society of Civil Engineers"><span data-dcnode-id="1683" instrument_node="">American Society of Civil Engineers</span></a><span data-dcnode-id="1681" instrument_node=""> as an  </span><a class="mw-redirect" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historic_Civil_Engineering_Landmark" title="Historic Civil Engineering Landmark"><span data-dcnode-id="1680" instrument_node="">International Historic Civil Engineering Landmark</span></a><span data-dcnode-id="1678" instrument_node="">. But in 1991, rail service over the bridge ended because there was only one track and speed restrictions, limiting transit to 20 kilometres (12&nbsp;mi) per hour, or cargo.</span><sup class="reference" data-dcnode-id="1675" id="cite_ref-SIPA_3-16"><a data-dcnode-id="1676" href="#cite_note-SIPA-3"><span data-dcnode-id="1677" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1674" instrument_node=""> The rail functions were transited in 1991 over the </span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ponte_de_S%25C3%25A3o_Jo%25C3%25A3o" title="Ponte de São João"><span data-dcnode-id="1673" instrument_node="">São João Bridge</span></a><span data-dcnode-id="1671" instrument_node=""> (designed by engineer </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edgar_Cardoso" title="Edgar Cardoso"><span data-dcnode-id="1670" instrument_node="">Edgar Cardoso</span></a><span data-dcnode-id="1668" instrument_node="">).
</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h2 data-dcnode-id="1656"><span class="mw-headline" data-dcnode-id="1664" id="Architecture"><span data-dcnode-id="1665" instrument_node="">Architecture</span></span><span class="mw-editsection" data-dcnode-id="1657"><span class="mw-editsection-bracket" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">[</span></span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMaria_Pia_Bridge%26action%3Dedit%26section%3D2" title="Edit section: Architecture"><span data-dcnode-id="1661" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1655" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1647"><div class="thumbinner" data-dcnode-id="1648" style="width:222px;"><a class="image" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaria_Pia_Bridge_detail.jpg"><img alt="Maria Pia Bridge detail.jpg" class="thumbimage" data-dcnode-id="1654" data-file-height="3000" data-file-width="4000" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Maria_Pia_Bridge_detail.jpg/220px-Maria_Pia_Bridge_detail.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Maria_Pia_Bridge_detail.jpg/330px-Maria_Pia_Bridge_detail.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Maria_Pia_Bridge_detail.jpg/440px-Maria_Pia_Bridge_detail.jpg 2x" width="220"></a><span data-dcnode-id="1652" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1649"><div class="magnify" data-dcnode-id="1650"><a class="internal" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMaria_Pia_Bridge_detail.jpg" title="Enlarge"></a></div></div></div></div><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1645" instrument_node="">The bridge is in an urban cityscape, over the </span><a class="mw-redirect" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douro_River" title="Douro River"><span data-dcnode-id="1644" instrument_node="">Douro River</span></a><span data-dcnode-id="1642" instrument_node="">, connecting the mount of Seminário, in the municipality of Porto, to the Serra do Pilar, in the lightly populated section of the municipality of Vila Nova de Gaia.</span><sup class="reference" data-dcnode-id="1639" id="cite_ref-SIPA_3-17"><a data-dcnode-id="1640" href="#cite_note-SIPA-3"><span data-dcnode-id="1641" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1638" instrument_node="">
</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1636" instrument_node="">The structure consists of a deck 354.375&nbsp;m (1,162.65&nbsp;ft) long, supported by two piers on one side of the river and three on the other, with a central arch with a span of 160&nbsp;m (520&nbsp;ft) and a rise of 42.6&nbsp;m (140&nbsp;ft).</span><sup class="reference" data-dcnode-id="1633" id="cite_ref-IGESPAR_1-2"><a data-dcnode-id="1634" href="#cite_note-IGESPAR-1"><span data-dcnode-id="1635" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="1630" id="cite_ref-SIPA_3-18"><a data-dcnode-id="1631" href="#cite_note-SIPA-3"><span data-dcnode-id="1632" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1629" instrument_node=""> It is supported on three pillars in Vila Nova da Gaia and by two pillars in Porto. Two shorter pillars support the arch.</span><sup class="reference" data-dcnode-id="1626" id="cite_ref-SIPA_3-19"><a data-dcnode-id="1627" href="#cite_note-SIPA-3"><span data-dcnode-id="1628" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1625" instrument_node=""> The five, interlaced support pillars are constructed of a pyramidal format over granite masonry blocks, over six veins, three of which are 37.390 metres (122.67&nbsp;ft) on the Gaia side and 37.400 metres (122.70&nbsp;ft) on the Porto side.</span><sup class="reference" data-dcnode-id="1622" id="cite_ref-SIPA_3-20"><a data-dcnode-id="1623" href="#cite_note-SIPA-3"><span data-dcnode-id="1624" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1621" instrument_node="">
</span></p><p data-dcnode-id="1615"><span data-dcnode-id="1619" instrument_node="">Another innovation was the method of construction used for the central arch. Since it was impossible to use any </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falsework" title="Falsework"><span data-dcnode-id="1618" instrument_node="">falsework</span></a><span data-dcnode-id="1616" instrument_node="">, the arch was built out from the abutments on either side, their weight being supported by steel cables attached to the top of the piers supporting the deck. The same method was also used to build the decking, temporary tower structures being built above deck level to support the cables. This technique had been previously used by Eads, but its use by Eiffel is a good example of his readiness to use the latest engineering techniques.
</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1614" instrument_node="">The design uses a </span><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parabolic_arch" title="Parabolic arch"><span data-dcnode-id="1613" instrument_node="">parabolic arch</span></a><span data-dcnode-id="1611" instrument_node="">.</span><sup class="reference" data-dcnode-id="1608" id="cite_ref-Ponte_Maria_Pia_Bridge_4-0"><a data-dcnode-id="1609" href="#cite_note-Ponte_Maria_Pia_Bridge-4"><span data-dcnode-id="1610" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1607" instrument_node="">
</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1605" instrument_node="">Over the bridge are painted ironwork guardrails over granite masonry.</span><sup class="reference" data-dcnode-id="1602" id="cite_ref-SIPA_3-21"><a data-dcnode-id="1603" href="#cite_note-SIPA-3"><span data-dcnode-id="1604" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1601" instrument_node="">
</span></p><span data-dcnode-id="1599" instrument_node="">
