</span><div class="post" data-dcnode-id="3207" id="post-14626"><span data-dcnode-id="3302" instrument_node="">
</span><h2 data-dcnode-id="3299"><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/why-americas-national-parks-are-still-great/" rel="bookmark" title="Permanent Link to Why America’s National Parks Are (Still) Great"><span data-dcnode-id="3301" instrument_node="">Why America’s National Parks Are (Still) Great</span></a></h2><span data-dcnode-id="3298" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="3287"><span data-dcnode-id="3297" instrument_node="">Posted 
				</span><span data-dcnode-id="3295" instrument_node="">
				on April 20, 2022, 11:19 am, 
				</span><span data-dcnode-id="3293" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="3291" instrument_node="">
				under </span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/locations/" rel="category tag"><span data-dcnode-id="3290" instrument_node="">Locations</span></a><span data-dcnode-id="3288" instrument_node="">.
				</span></div><span data-dcnode-id="3286" instrument_node="">
</span><div class="entry" data-dcnode-id="3221"><span data-dcnode-id="3285" instrument_node="">
					Almost thirty years ago, what drew me personally to America’s national parks was its diversity of natural environments. On the occasion of this year’s National Parks Week, I reflect on what generally made America’s national parks so special and if contemporary changes, especially in visitation, have affected any of that. 

</span><p data-dcnode-id="3281"><span data-dcnode-id="3284" instrument_node="">
</span><img data-dcnode-id="3283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-pacific/yose1263.large.jpeg&amp;raw"><span data-dcnode-id="3282" instrument_node="">
</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">
</span></p><h4 data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">The first national parks </span></h4><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">
To begin with, America’s national parks were the first fully realized expression of an idea as uniquely American as the Declaration of Independence and just as radical: that the most special places in the nation should be preserved, not for royalty or the rich, but for everyone and for all time.
</span></p><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">

Nature reserves had been maintained in Europe for centuries to protect hunting grounds for use by kings, nobles, and later the rich and well-connected. By contrast, national parks are a fundamentally democratic idea. They are administered by the government but belong to all citizens. The 20th century even saw many examples of wealthy people donating land to the government for the purpose of establishing or expanding a national park. The establishment of the first national parks was a pivotal moment in the story of how we, the American people, made the decision to keep nearly one-third of our land in our collective ownership as public lands. Yet, the vast majority of the public lands could use stronger protections.  
</span></p><p data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">

 While the idea of resource protection – be it wildlife or even hot waters –  predates the national parks, the protection of Yosemite and Yellowstone marks the recognition that there is value in preserving the land itself in its natural state instead of developing it. This year marks the 150th anniversary of the establishment of Yellowstone as the first national park. However, it was an accident of history that made Yosemite a state park in 1864 and Yellowstone a national park in 1872. Those public land protections mark the start of the modern conservation movement. Today, as the world is urbanizing at an accelerating pace, we need breathing spaces and nature more than ever. We also need to keep lands and waters in their natural state to combat climate change.

</span></p><p data-dcnode-id="3266"><span data-dcnode-id="3269" instrument_node="">
</span><img data-dcnode-id="3268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-rockies/yell0517.large.jpeg&amp;raw"><span data-dcnode-id="3267" instrument_node="">
</span></p><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">
</span></p><h4 data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">The best national parks? </span></h4><span data-dcnode-id="3261" instrument_node="">

The national parks may or may not be “America’s Best Idea” depending on one’s perspective, but there is no doubt that they were a very good idea that has been adopted worldwide. More than a hundred countries have national parks. What makes the system of national parks of America so special among the world’s offerings? There are three factors. 
</span><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">
</span></p><p data-dcnode-id="3254"><span data-dcnode-id="3258" instrument_node="">
</span><b data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Timing</span></b><span data-dcnode-id="3255" instrument_node="">.  Europe had cathedrals and castles, but America was a blank slate. National parks would become America’s national landmarks and provide its citizens with a sense of pride. They are a focus of domestic tourism, and especially of that quintessentially American experience, the road trip.  When the first national parks were established, the continent was still being explored and largely unsettled. We still had the historic opportunity to set large wild areas apart. The longer nature is left alone, the more it thrives. Yellowstone was preserved for the hydrothermal features, but wildlife is now very abundant, more than when the park was established. In the 1930s, when few lands were available in the East compared to the West, parks were made of reclaimed lands. They have now reverted to wilderness. A park unit established as late as Cuyahoga Valley National Recreation Area (1974) has seen a drastic transformation from an environmental disaster area to a vibrant restored landscape.
</span></p><p data-dcnode-id="3249"><span data-dcnode-id="3253" instrument_node="">
</span><b data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Geography</span></b><span data-dcnode-id="3250" instrument_node="">. America’s Park system is at a scale of a continent. All the landforms you can imagine are there: coastlines, mountains, canyons, plains. The geological diversity is tremendous. All climate zones are represented: from tropics to arctic, from rainforest to desert (even in the same park). This leads to great biological diversity. Each park is a unique ecosystem, yet they are all interrelated. All the national parks established prior to Acadia National Park (1919) were in the West. Over the course of the 20th century, they would encompass more of the continent and include more samples of each of its corners, but there are still major ecoregions missing among the designed national parks. 
</span></p><p data-dcnode-id="3241"><span data-dcnode-id="3248" instrument_node="">
</span><b data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Management</span></b><span data-dcnode-id="3245" instrument_node="">. Those two natural advantages alone would not have been enough. The example of Yosemite had shown that back in the 19th the state of California was not a very good caretaker. Activists such as John Muir urged the conversion of Yosemite into a national park (1890) with the promise that the federal government would be a better caretaker.  Yet, at first, enforcement of national park protections was rather inconsistent. To remedy that situation, the National Park Service (NPS) was established (1916) as a government agency with the mission: to “conserve the scenery and the natural and historic objects and the wildlife therein and…leave them unimpaired for the enjoyment of future generations.” It is a dual mission with contradictory objectives: conservation and providing access, but the NPS has done a very good job. Protections are strong, with no high-impact activities allowed. Most areas are maintained as wilderness. In other areas, there is excellent visitor infrastructure for mass tourism. The National Park Service pioneered concepts now taken for granted and copied anywhere else such as visitor center, park ranger (professional, knowledgeable, friendly), official park brochure (looking at their </span><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/national-park-service-visitor-guides-a-brief-history/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/national-park-service-visitor-guides-a-brief-history/');"><span data-dcnode-id="3244" instrument_node="">design history</span></a><span data-dcnode-id="3242" instrument_node=""> gives an idea of the sophistication), interpretive programs, scenic drive, overlooks with interpretive signs. As a result, the parks have this rare combination: they are mostly pristine but quite accessible. It is partly because everybody can easily visit that the parks have developed a constituency. The resulting wide popular support across the political spectrum is what keeps them funded and protected. 
</span></p><p data-dcnode-id="3237"><span data-dcnode-id="3240" instrument_node="">
</span><img data-dcnode-id="3239" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-rockies/yell0533.large.jpeg&amp;raw"><span data-dcnode-id="3238" instrument_node="">
</span></p><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">
</span></p><h4 data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Are the national parks loved to death?</span></h4><span data-dcnode-id="3232" instrument_node="">

Maybe the most significant change from the early days of the national parks is the growth in visitation – from 5,000 annual visits at the beginning of the 20th century to 5 million in 2016 for Yosemite alone.  
National Park Week not only highlights our well-deserved appreciation for the National Park Service but also encourages people to connect with their national parks. Is that a good idea, at a time when the press and social media are filled with stories about overcrowded parks?
</span><p data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">
First, we have to ask what is negatively impacted. For the developed areas of the parks, despoilation has already taken place irremediably when the park infrastructure was built. More infrastructure built for mass tourism actually mitigates global impact. Official trails reduce the impact of cross-country travel and user trail networks; restrooms and garbage cans prevent toilet paper from flying everywhere and waste from littering the landscape. Past a million visitors, it isn’t clear that another half-million is going to harm the environment that much more. What is most degraded, rather than the park, is the visitor experience. However, are visitors really concerned about crowding? They certainly keep coming to the more popular parks despite the well-publicized visitation numbers, and despite the fact that less popular national parks and other public lands are available to them. For the most popular areas, the NPS is extending the practice of requiring advance reservations for entry, and while inside the park, of using shuttles rather than private cars – another example of infrastructure reducing global impact. While this removes the spontaneity of trips, I think the overall improvement in visitor experience makes it a sustainable compromise. Other measures in the same vein can be taken to mitigate adverse consequences of visitation, but what we need for them to happen is above all increased funding. 
</span></p><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">
When I see crowds, part of me is pleased to see that people are loving and visiting their parks. I do not feel frustrated because in most parks, I could find ways to avoid the crowds, be it by timing, hiking, or going to less popular areas. There are many parks that do not suffer from over-visitation, and even within popular parks, there are often quiet parts. More importantly, a place of great power almost by definition cannot be easily stripped of its power. If you feel that sharing the beauty of a landscape with a mass of people diminishes its beauty, doesn’t it imply that such beauty wasn’t that powerful in the first place? On the other hand, doesn’t the fact that you can appreciate the beauty of a landscape through a photograph indicate that you can separate the experience of taking in the landscape with that of standing alongside many? Even on that most popular of walks, the Lower Yosemite Falls Trail, standing on the bridge in the wet mist of the spring runoff still feels raw and wild. The increase in visitation of our national parks does require some mitigation measures, but rather than threatening their core mission, it is a measure of their success, and something worth celebrating this week.    
</span></p><p data-dcnode-id="3224"><span data-dcnode-id="3227" instrument_node="">
</span><img data-dcnode-id="3226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-rockies/yell8774.large.jpeg&amp;raw"><span data-dcnode-id="3225" instrument_node="">
</span></p><p data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">
</span></p></div><span data-dcnode-id="3220" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="3209"><span data-dcnode-id="3219" instrument_node="">
				Tags: </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/tag/conservation/" rel="tag"><span data-dcnode-id="3218" instrument_node="">conservation</span></a><span data-dcnode-id="3216" instrument_node="">, </span><a data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/tag/national-parks/" rel="tag"><span data-dcnode-id="3215" instrument_node="">national parks</span></a><br data-dcnode-id="3213"><span data-dcnode-id="3212" instrument_node=""> </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/why-americas-national-parks-are-still-great/%23respond"><span data-dcnode-id="3211" instrument_node="">No Comments »</span></a></div><span data-dcnode-id="3208" instrument_node="">

</span><div class="post" data-dcnode-id="3011" id="post-14564"><span data-dcnode-id="3205" instrument_node="">
</span><h2 data-dcnode-id="3202"><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/are-composite-photographs-truthful/" rel="bookmark" title="Permanent Link to Are Composite Photographs Truthful?"><span data-dcnode-id="3204" instrument_node="">Are Composite Photographs Truthful?</span></a></h2><span data-dcnode-id="3201" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="3190"><span data-dcnode-id="3200" instrument_node="">Posted 
				</span><span data-dcnode-id="3198" instrument_node="">
				on March 31, 2022, 4:54 pm, 
				</span><span data-dcnode-id="3196" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="3194" instrument_node="">
				under </span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/esthetics/" rel="category tag"><span data-dcnode-id="3193" instrument_node="">Esthetics</span></a><span data-dcnode-id="3191" instrument_node="">.
				</span></div><span data-dcnode-id="3189" instrument_node="">
</span><div class="entry" data-dcnode-id="3018"><span data-dcnode-id="3188" instrument_node="">
					Assembling parts of two or more images into a photograph is a long-established technique that I have occasionally used for technical purposes.
This piece looks at the history of composite photographs and details my own approach to composites. Finding my own finished photographs composited into a new one in a </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/qt-luongs-work-in-the-usa-expo-pavilion/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/qt-luongs-work-in-the-usa-expo-pavilion/');"><span data-dcnode-id="3187" instrument_node="">USA Pavilion Expo exhibit</span></a><span data-dcnode-id="3185" instrument_node=""> was something different and led me to wonder about the truthfulness of the result. 

</span><p data-dcnode-id="3181"><span data-dcnode-id="3184" instrument_node="">
</span><img data-dcnode-id="3183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-drto-by-cece.jpg&amp;raw"><span data-dcnode-id="3182" instrument_node="">
</span></p><p data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">
</span></p><h4 data-dcnode-id="3177"><span data-dcnode-id="3178" instrument_node="">Composites are nearly as old as photography</span></h4><span data-dcnode-id="3176" instrument_node="">

In popular culture, the practice of compositing images is associated with digital techniques (“she photoshopped him into the picture”), but many photographers are familiar with the work of Jerry Ueslmann which was created entirely in the traditional darkroom starting from the 1960s. Its surrealistic imagery is powerful, yet it is hardly technically pioneering. Composite photography had already reached a sophisticated stage of development in the 1850s, just a few decades after the invention of photography, so it is a practice rooted in the traditions of the medium.
</span><p data-dcnode-id="3167"><span data-dcnode-id="3175" instrument_node="">
</span><img data-dcnode-id="3174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/Watkins-Yosemite_Valley_from_Inspiration_Point_1865.jpg&amp;raw"><span data-dcnode-id="3173" instrument_node="">
</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node="">
</span><i data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">Carleton Watkins, Yosemite Valley from Inspiration Point, 1865</span></i><span data-dcnode-id="3168" instrument_node="">
</span></p><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">
</span></p><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">
 Most modern black-and-white films are panchromatic, meaning that they are sensitive to all wavelengths of visible light, reproducing a scene close to what it appears to the eye, obviously minus the color. The film’s primary sensitive components, silver halide crystals, are naturally sensitive to the blue portion of the spectrum. It wasn’t until the early 20th century that dyes were added to extend the silver halide crystal sensitivity into the green and red portions of the spectrum. Before, 19th-century emulsions were orthochromatic –  overly sensitive to blue and less sensitive to colors like yellow and red. The extra sensitivity to blue resulted in skies being overexposed compared to the landscape. As a result, photographs made on the survey expeditions of the 1860s and 1870s had a recognizable esthetic. Gustave Le Gray is credited with making two different exposures on two different negatives and then printing them together on a single sheet in order to create a realistic rendering of the sky. Through the 19th century, most landscape photographers, including Eadweard Muybridge and Peter Henry Emerson, have resorted to compositing in order to expose properly both the land and sky. 
</span></p><p data-dcnode-id="3154"><span data-dcnode-id="3162" instrument_node="">
</span><img data-dcnode-id="3161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/Muybridge-Valley_of_the_Yosemite_from_Mariposa_Trail_1873.jpg&amp;raw"><span data-dcnode-id="3160" instrument_node="">
</span><br data-dcnode-id="3159"><span data-dcnode-id="3158" instrument_node="">
</span><i data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">Eadweard Muybridge, Valley of the Yosemite from Mariposa Trail, 1873</span></i><span data-dcnode-id="3155" instrument_node="">
</span></p><p data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">
</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3151" instrument_node="">
From there, it was a short matter of time before photographers used a different sky. As Henry Peach Robinson writes in </span><i data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Pictorial Effect in Photography (1869)</span></i><span data-dcnode-id="3148" instrument_node="">:
</span></p><blockquote data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">
It rarely happens that a sky quite suitable to the landscape occurs in the right place at the time it is taken […] These difficulties are got over by combination printing […]  the result will depend, to a very great degree, upon the art knowledge of the photographer in selecting a suitable sky…
</span></blockquote><span data-dcnode-id="3144" instrument_node="">
In landscape photography, only two photographs needed to be joined in
a fairly simple way, at the horizon, but composites in people
photography are more complicated. Even today, when I make a group
photograph, obtaining a consistent good pose and pleasant expression
for each individual remains a challenge, when a single blink can marr
the entire photograph. Imagine how hard it must have been in the days
when slow film required sitters to remain still during the long exposure
times, not to mention the depth of field issues associated with large
format cameras. What started first as a way to alleviate those technical
problems turned for photographers such as William Notman, Henry Peach
Robinson, and Oscar Gustave Rejlander into a new creative endeavor, as
exemplified by Rejlander’s </span><i data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Two Ways of Life</span></i><span data-dcnode-id="3141" instrument_node="">, a photograph that combined over thirty captures to create a complex allegorical tableau. Naturally, at that time, heated debates rose about manipulation and truthfulness. This </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artforum.com/print/197807/composite-imagery-and-the-origins-of-photomontage-part-i-the-naturalistic-strain-35931" onclick="javascript:pageTracker._trackPageview('/outgoing/www.artforum.com/print/197807/composite-imagery-and-the-origins-of-photomontage-part-i-the-naturalistic-strain-35931');"><span data-dcnode-id="3140" instrument_node="">article on Artform</span></a><span data-dcnode-id="3138" instrument_node=""> offers a thorough discussion of composite imagery in the 19th century. 
</span><p data-dcnode-id="3129"><span data-dcnode-id="3137" instrument_node="">
</span><img data-dcnode-id="3136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/31/Oscar-gustave-rejlander_two_ways_of_life.jpg/800px-Oscar-gustave-rejlander_two_ways_of_life.jpg&amp;raw"><span data-dcnode-id="3135" instrument_node="">
</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">
</span><i data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">Oscar Gustave Rejlander, Two Ways of Life, 1857</span></i><span data-dcnode-id="3130" instrument_node="">
</span></p><p data-dcnode-id="3115"><span data-dcnode-id="3128" instrument_node="">
In the early 20th century, Surrealists used photo montages to create disturbing images that clearly didn’t represent reality. Starting at the end of that century, digital technology 
enabled more complex compositing. In photomosaics, a great number of images are assembled by software to create a new pattern when viewed globally, while the component images remain identifiable in a close-up view. The technique is often used for commercial imagery, but Chris Jordan’s </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chrisjordan.com/gallery/rtn/" onclick="javascript:pageTracker._trackPageview('/outgoing/chrisjordan.com/gallery/rtn/');"><i data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">Running the Numbers</span></i></a><span data-dcnode-id="3124" instrument_node=""> is maybe the best-known art project using it. Another favorite innovative use of digital compositing is the 
</span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stephenwilkes.com/fine-art/day-to-night/"><span data-dcnode-id="3123" instrument_node="">
</span><i data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Day to Night</span></i></a><span data-dcnode-id="3119" instrument_node=""> series of Stephen Wilkes, which seamlessly juxtaposes moments from 24 hours. In all those images, the compositing is obvious to the viewer. The rest of the article is about composite photographs crafted to make them appear as realistic images. Photographers such as </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marcadamus.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.marcadamus.com');"><span data-dcnode-id="3118" instrument_node="">Marc Adamus</span></a><span data-dcnode-id="3116" instrument_node=""> popularized the approach in nature landscape photography. For the past few years, mainstream photo-editing software such as Photoshop offer the option to replace the sky with a stock image by a single click, therefore automating a technique discovered more than a century and half ago. 

</span></p><h4 data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Technical composites</span></h4><span data-dcnode-id="3112" instrument_node="">

A first category of composites aims to overcome the technical limitations of cameras in order to produce a higher-quality picture. While the resulting image shows more detail than a single shot, it could have been created as a single shot of technically lower quality. I consider them to be a part of the evolving photographic process. Yet, in the context of photojournalism, they are not considered acceptable, even though black and white photography, despite purposely erasing content by removing information, is. In this section, I am surveying each of the main techniques and my approach to it. 
</span><p data-dcnode-id="3107"><span data-dcnode-id="3111" instrument_node="">
</span><b data-dcnode-id="3109"><span data-dcnode-id="3110" instrument_node="">Exposure composites</span></b><span data-dcnode-id="3108" instrument_node=""> capture a range of light that is too large for a single exposure by merging the best-exposed parts of a series of photographs where the only variation is exposure. High Dynamic Range (HDR) is one algorithmic way to do it by creating an HDR file with more bits than the standard eight representing colors on digital devices, then “tone mapping” it back to an eight-bit file. For some photographers, the effect resulting from tone mapping is part of the technique’s appeal, but their unrealistic appearance never resonated with me. Instead, I made frequent use of exposure blending, which instead relies on manual local selections to get the best-exposed parts, and when done carefully, achieves a more natural appearance. With the advent of high-dynamic-range sensors pioneered by Sony, a single exposure is sufficient to capture the entire range of light except maybe in some situations with the light source included in the image. However, brightening the shadows can introduce noise, so if the goal is the best possible tonal quality in a print, exposures composites are still a useful tool. 
</span></p><p data-dcnode-id="3103"><span data-dcnode-id="3106" instrument_node="">
</span><img data-dcnode-id="3105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/france/fran42188.large.jpeg&amp;raw"><span data-dcnode-id="3104" instrument_node="">
</span></p><p data-dcnode-id="3095"><span data-dcnode-id="3102" instrument_node="">
</span><b data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Focus stacks</span></b><span data-dcnode-id="3099" instrument_node=""> extend the depth of field beyond what is possible with a single exposure. Images otherwise identical but focused at different depths in the scene are merged by selecting the best-focused parts of each. Modern high-resolution sensors reveal imperfectly focussed areas more than earlier, lower-resolution sensors. The higher resolving power also means that the loss of resolution caused by diffraction when stopping down lenses occurs at larger apertures. In the 2000s, I rarely resorted to focus stacking, with the exception of my 
</span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/the-hidden-beauty-of-sand-grains/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/the-hidden-beauty-of-sand-grains/');"><span data-dcnode-id="3098" instrument_node="">Sand Grains series</span></a><span data-dcnode-id="3096" instrument_node="">, but nowadays I find it essential in order to take advantage of the full resolution modern sensors have to offer. However, this is not to say that the resulting photograph is not possible without focus stacking. You’d be able to make the same picture, but you couldn’t enlarge it as much before the viewer would notice that some parts are out of focus.
</span></p><p data-dcnode-id="3091"><span data-dcnode-id="3094" instrument_node="">
</span><img data-dcnode-id="3093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/us-sw/usut67099.large.jpeg&amp;raw"><span data-dcnode-id="3092" instrument_node="">
</span></p><p data-dcnode-id="3083"><span data-dcnode-id="3090" instrument_node="">
</span><b data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Panoramas</span></b><span data-dcnode-id="3087" instrument_node=""> merge images taken consecutively from the same viewpoint to create a wider view. As implied by the name, they are usually in an elongated, panoramic format, not only for esthetic reasons but also because it is technically easier to create panoramas made of a single row of images. Images with extreme angle of views (from 180 degrees up to </span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/how-to-make-360-degrees-spherical-panoramas/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/how-to-make-360-degrees-spherical-panoramas/');"><span data-dcnode-id="3086" instrument_node="">360 degrees</span></a><span data-dcnode-id="3084" instrument_node="">) must be rendered with a non-planar projection such as a cylindrical or spherical projection, in which some lines in the scene will be rendered as curves in the image. Those could not be created with single-shot cameras and lenses. However, most of the panoramas have a smaller field of view and could be captured by photographing with a rectilinear wide-angle lens (angle of view up to 135 degrees for a 9mm lens) or fish-eye lens (angle of view up to 180 degrees) and then cropping to a panoramic format. For instance the foremost competition dedicated to panoramas, the Epson Pano Awards, accepts anything with an aspect ratio exceeding 2:1. Cropping an image doesn’t feel as satisfying as extending it, since panoramic images feel inherently more complex. The reason they are assembled by merging longer focal length images is to increase the resolution – up to so-called gigapixel images. Although tedious compared to large-format photography, the technique has the potential to produce even more detailed images. If mere resolution is what I am after, given the savings in costs, impact, and burden, I find it a workable alternative.   
</span></p><p data-dcnode-id="3079"><span data-dcnode-id="3082" instrument_node="">
</span><img data-dcnode-id="3081" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-rockies/grte80097.large.jpeg&amp;raw"><span data-dcnode-id="3080" instrument_node="">
</span></p><p data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">
Sometimes, what appears to the user as single captures are in fact image composites because cameras implement compositing without user intervention. Many phone cameras (including Apple iPhone and Google Pixel) automatically create an exposure composite from a quick burst of images when they sense a high-contrast scene. They are also capable of creating a panorama in real-time by scanning the scene. Frame averaging is a lesser-known type of composite, in which almost-identical images are combined pixel by pixel in order to reduce high-ISO noise. The technique is most often deployed by astrophotographers in order to allow shutter speeds fast enough to capture point stars, with a bit of realignment to compensate for Earth’s motion between frames. However, the Google Pixel phones implement it automatically in a sophisticated way with their “Night Sight” technology. As computational photography’s capabilities grow, we can expect an increasing number of single captures to be in-camera composites.

</span></p><h4 data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Compositing across places: the Dry Tortugas image</span></h4><span data-dcnode-id="3074" instrument_node="">

I find it useful to make a distinction between the composites discussed above, and the second category of composites where elements of images captured at different times or viewpoints are merged together. Such creations circumvent a fundamental attribute of photography: that an exposure captures a specific place at a specific point in time. The goal goes beyond creating a simply technically better picture. Let me illustrate the discussion with a particular example. The image of Dry Tortugas National Park that was displayed in the 
</span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/qt-luongs-work-in-the-usa-expo-pavilion/"><span data-dcnode-id="3073" instrument_node="">
Expo USA Pavilion</span></a><span data-dcnode-id="3071" instrument_node=""> definitively belonged in that category. It was assembled out of three images made during a trip </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-summer-visit-to-dry-tortugas-national-park/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/a-summer-visit-to-dry-tortugas-national-park/');"><span data-dcnode-id="3070" instrument_node="">detailed here</span></a><span data-dcnode-id="3068" instrument_node="">.  
</span><p data-dcnode-id="3064"><span data-dcnode-id="3067" instrument_node="">
</span><img data-dcnode-id="3066" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-tropics/drto56333.large.jpeg&amp;raw"><span data-dcnode-id="3065" instrument_node="">
</span></p><p data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">
Upon arriving at Loggerhead Key at midday, we anchored the boat a few hundred yards from the pier on the south side of the islet, and I immediately photographed the Loggerhead Light, well lit with the sun in my back. I framed the striking lighthouse with the 24-105mm zoom set to a short telephoto focal length (75mm).
</span></p><p data-dcnode-id="3058"><span data-dcnode-id="3061" instrument_node="">
</span><img data-dcnode-id="3060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-tropics/drto56472.large.jpeg&amp;raw"><span data-dcnode-id="3059" instrument_node="">
</span></p><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">
We landed at the pier with a dinghy, walked across the island to the north side, and snorkeled at the Little Africa Reef, which had the densest density of corals at a shallow depth I’ve seen so far. My underwater housing doesn’t let me adjust the focal length of the lens, and by default, I had set it at 24mm.   
</span></p><p data-dcnode-id="3052"><span data-dcnode-id="3055" instrument_node="">
</span><img data-dcnode-id="3054" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-tropics/drto56366.large.jpeg&amp;raw"><span data-dcnode-id="3053" instrument_node="">
</span></p><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">
After returning to the boat, while the others relaxed, I got back in the water with my housing and lens still set to 24mm to experiment with under/over water images. By then, it was mid-afternoon. The sun was illuminating the lighthouse from the side –  Note its size in the picture. It didn’t penetrate into the water as much as before, and at the spot where we had safely anchored, the water was deep, both factors resulting in no visible corals.
</span></p><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">
At the time I had licensed the images to the USA Pavilion designers, I was a bit puzzled that they had picked three views from Dry Tortugas National Park, as it is the third less-visited national park in the continental US. When I saw the exhibit panel, past the initial surprise, it made perfect sense from a design viewpoint. Combining two vertical frames and a transition section achieves a vertical resolution roughly equivalent to that of the highest megapixel medium format cameras. Moreover, the composite image holds visual interest from the very bottom to the top. This matters because it is the only image in the exhibit where visitors can have a close look at the bottom, from the base of the staircase, and at the top, from the second floor of the room. 
</span></p><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">
</span></p><h4 data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Fiction or Truth?</span></h4><span data-dcnode-id="3043" instrument_node="">

While I have made many composites, they are almost all “technical” and very few are of the second category. One way their degree of manipulation could be characterized is by how much time has elapsed between the exposures, and how disparate their locations are. In my continued pursuit of truthfulness, I have limited myself to composites with a stationary camera and exposures separated by a short amount of time. 

</span><p data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">
The composite Dry Tortugas image used photographs that were taken at three separate points in time, over the course of three hours, at two distinct locations on each side of the island, and using two different focal lengths. There is no location on Loggerhead Key from which you could see exactly what it depicts, so it does not correspond to a real experience. It is therefore a fiction. 
</span></p><p data-dcnode-id="3037"><span data-dcnode-id="3040" instrument_node="">
</span><img data-dcnode-id="3039" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-drto-by-cece-top.jpg&amp;raw"><span data-dcnode-id="3038" instrument_node="">
</span></p><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">
However, I thought that the composite image did a better job at representing what that national park is about than any of the single-capture images alone. Dry Tortugas National Park is an unusual national park, as it is 99% underwater (100 square miles). At the junction of the Atlantic Ocean, Caribbean Sea, and the Gulf of Mexico, its corals are particularly diverse and vibrant. The tiny islets (100 acres) called “keys” are home to remarkable structures. Most of Garden Key is occupied by Fort Jefferson, the largest brick structure in Western Hemisphere. Loggerhead Light is inactive, but was said to be “a greater distance from the mainland than any other light in the world” and once housed the brightest light in America. Although the park is biologically rich, the structures are the primary reason why the national park (initially Fort Jefferson National Monument) was established. 
</span></p><p data-dcnode-id="3033"><span data-dcnode-id="3034" instrument_node="">
Human visual perception does not work like a simple camera, but is  inherently computational, creating effortlessly “technical composites”. The brain can merge seamlessly and dynamically a vast dynamic range of light, far and near objects, minute details and broad field of view. Could it be the case that the same could be said of memories and places? We don’t take in everything in one glance. We absorb parts at a time and build the whole in our mind. Time and time again, great literature shows that fiction can get at the truth even when stories are all made up, that it can convey a greater sense of truth than the truth itself. 
</span></p><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">
As a photographer, I can happily rely on multiple images in a sequence to tell a place’s story, but the exhibit – among other use scenarios – called for a single image per park, and a composite made ample sense. Yet unanswered questions arise. Should such composites be labeled so? Do viewers even expect the image not to be a composite? If they learned so, would they feel deceived? Would a visitor who, inspired by the composite image has made the arduous trip to Loggerhead Key, be disappointed not to be able to observe exactly the scene depicted even though they experience each of its components? Can composites be truthful?
</span></p><p data-dcnode-id="3026"><span data-dcnode-id="3030" instrument_node="">
I’d appreciate to hear your thoughts, but if you prefer, you can also answer a </span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//surveynuts.com/surveys/take%3Fid%3D240105%26c%3D7593080537HVDD"><span data-dcnode-id="3029" instrument_node="">
multiple-choice poll</span></a><span data-dcnode-id="3027" instrument_node="">. 


</span></p><p data-dcnode-id="3021"><span data-dcnode-id="3025" instrument_node="">
</span><i data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Thank you to Cecilia for the picture of the Dry Tortugas panel</span></i><span data-dcnode-id="3022" instrument_node="">
</span></p><p data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">
</span></p></div><span data-dcnode-id="3017" instrument_node="">

</span><div class="post" data-dcnode-id="2845" id="post-14480"><span data-dcnode-id="3009" instrument_node="">
</span><h2 data-dcnode-id="3006"><a data-dcnode-id="3007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/qt-luongs-work-in-the-usa-expo-pavilion/" rel="bookmark" title="Permanent Link to QT Luong’s Work in the USA Expo Pavilion"><span data-dcnode-id="3008" instrument_node="">QT Luong’s Work in the USA Expo Pavilion</span></a></h2><span data-dcnode-id="3005" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="2994"><span data-dcnode-id="3004" instrument_node="">Posted 
				</span><span data-dcnode-id="3002" instrument_node="">
				on March 11, 2022, 9:18 pm, 
				</span><span data-dcnode-id="3000" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="2998" instrument_node="">
				under </span><a data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/announcements/" rel="category tag"><span data-dcnode-id="2997" instrument_node="">Announcements</span></a><span data-dcnode-id="2995" instrument_node="">.
				</span></div><span data-dcnode-id="2993" instrument_node="">
</span><div class="entry" data-dcnode-id="2868"><span data-dcnode-id="2992" instrument_node="">
					As national pavilions are how each of the countries at 
</span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-glimpse-of-expo-2020/"><span data-dcnode-id="2991" instrument_node="">
Expo 2020</span></a><span data-dcnode-id="2989" instrument_node=""> presents itself to the world, I am so honored that the </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-tour-of-the-usa-pavilion-at-expo-2020-dubai/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/a-tour-of-the-usa-pavilion-at-expo-2020-dubai/');"><span data-dcnode-id="2988" instrument_node="">USA Pavilion</span></a><span data-dcnode-id="2986" instrument_node=""> featured nine of my national park photographs as one of the exhibits and invited me to talk about my work there.
</span><p data-dcnode-id="2982"><span data-dcnode-id="2985" instrument_node="">
</span><img data-dcnode-id="2984" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69539.large.jpeg&amp;raw"><span data-dcnode-id="2983" instrument_node="">
</span></p><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">
Exhibit 5 (“America the Beautiful”) may appear at odds with the rest of a pavilion that emphasizes American innovations until you remember that national parks were also a most consequential American innovation. 
</span></p><p data-dcnode-id="2975"><span data-dcnode-id="2979" instrument_node="">
 Thomas Jefferson’s personal copy of the Quran was one of the pavilion’s special artifacts. I learned during a Expo 2020 lecture by scholar Andrew O’Shaughnessy that America’s Founding Father and third President, a talented self-taught architect, was fascinated by octagons and built a house based on an octagonal plan at Poplar Forest. That house was an inspiration for the room housing the mural-size panels that form the exhibit. I believe the </span><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-tour-of-the-usa-pavilion-at-expo-2020-dubai/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/a-tour-of-the-usa-pavilion-at-expo-2020-dubai/');"><span data-dcnode-id="2978" instrument_node="">previous entry</span></a><span data-dcnode-id="2976" instrument_node=""> depicted that exhibit as well as I could do with four photographs. However, capturing the entirety of such a space with regular photography is challenging, as a super-wide-angle lens (the opening image was photographed at 13mm) introduces wild distortions, yet includes only a small portion of the space. Because the center of the space is occupied by the elevator, no viewpoint conveyes that the octagon has equal sides. With this caveat, here is another attempt to depict the space using non-planar projections:   
</span></p><p data-dcnode-id="2971"><span data-dcnode-id="2974" instrument_node="">
</span><img data-dcnode-id="2973" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-circle3.jpg&amp;raw"><span data-dcnode-id="2972" instrument_node="">
</span></p><p data-dcnode-id="2967"><span data-dcnode-id="2970" instrument_node="">
</span><img data-dcnode-id="2969" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-pano-lower.jpg&amp;raw"><span data-dcnode-id="2968" instrument_node="">
</span></p><p data-dcnode-id="2963"><span data-dcnode-id="2966" instrument_node="">
</span><img data-dcnode-id="2965" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-pano-middle.jpg&amp;raw"><span data-dcnode-id="2964" instrument_node="">
</span></p><p data-dcnode-id="2959"><span data-dcnode-id="2962" instrument_node="">
</span><img data-dcnode-id="2961" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/exhibit5-pano-upper1.jpg&amp;raw"><span data-dcnode-id="2960" instrument_node="">
</span></p><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">
At the center of the pavilion, the room serves as a transition space between the first floor and the second floor. Since the room is two-story-tall and the panels fit each of the equal octagonal sides, five of them are cropped to a banner-like aspect ratio of 2.5: 13 feet wide (4m) by 33 feet tall (10m). They feel well-proportioned because the ratio between the room’s width and its sides is almost the same – making it almost a cube, like Poplar Forest. The staircase and upper floor divide the room vertically. Because of that, rather than splitting images, on two of the eight sides, four panels of approximately square dimensions cover half of the height of the room. The two remaining half-sides are the entrance and exit – the latter with a quarter-side panel above.
</span></p><p data-dcnode-id="2949"><span data-dcnode-id="2956" instrument_node="">
Even though two of my images have been reproduced larger (50 feet wide) before in an </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/photos/%3Fd%3Dsmall%26q%3Dfresno%2Bairport"><span data-dcnode-id="2955" instrument_node="">
airport</span></a><span data-dcnode-id="2953" instrument_node="">, this time I was stunned by the immersive effect of the wall-to-wall towering panels. The 5×7 transparencies held up well to the enlargements. By default, I have them drum-scanned to a file size of 300MB (about 12,000 pixels in the largest dimension), but for mural reproduction, they are generally rescanned to a 2GB file (approximately 30,000 pixels in the largest dimension). As it climbs up, the staircase partly hides some of the panels. The one at its beginning is visible at its full height. For it, the designers from </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thinkwellgroup.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/thinkwellgroup.com');"><span data-dcnode-id="2952" instrument_node="">Thinkwell</span></a><span data-dcnode-id="2950" instrument_node=""> created a composite out of three photographs made in the same location, the Loggerhead Key of Dry Tortugas National Park. 
</span></p><p data-dcnode-id="2945"><span data-dcnode-id="2948" instrument_node="">
</span><img data-dcnode-id="2947" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69541.large.jpeg&amp;raw"><span data-dcnode-id="2946" instrument_node="">
</span></p><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">
The choice of images conveyed the geographic extent of the national park system from east to west and north to south (Acadia/Joshua) as well as its diversity of natural environments. It was also a nice mix of iconic locations (the most popular trail in Yosemite, three well-known parks on the Colorado Plateau: Grand Canyon, Bryce, Arches) and lesser-known areas conducive to adventure, like Voyageurs, Glacier Bay, and Dry Tortugas, which are all explored on water.
</span></p><p data-dcnode-id="2939"><span data-dcnode-id="2942" instrument_node="">
</span><img data-dcnode-id="2941" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/sign-5-1.jpg&amp;raw"><span data-dcnode-id="2940" instrument_node="">
</span></p><p data-dcnode-id="2930"><span data-dcnode-id="2938" instrument_node="">
</span><span data-dcnode-id="2936" instrument_node="">


The US Department of State invited me to Expo 2020 to speak about my work in the national parks. The visit was initially planned for early January, but my heart sank when it was canceled due to the Omicron surge. Fortunately, it eventually took place in mid-February. I did a quick book signing. Given the venue’s extreme distance to the national parks and that any buyer would have to walk around with the 9 lbs book, it was not a given that copies of </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//treasuredlandsbook.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/TreasuredLandsBook.com');"><span data-dcnode-id="2935" instrument_node="">Treasured Lands</span></a><span data-dcnode-id="2933" instrument_node=""> at the Rocket Store would sell, so I was pleased to see that even there they were a best-selling book and only a few of them were left to sign. The main goal of the visit was to deliver talks about the national parks and my work in them. Below is a photo with Commisioner General Bob Clark in front of the Arches National Park panel.
</span><span data-dcnode-id="2931" instrument_node="">
</span></p><blockquote class="twitter-tweet" data-dcnode-id="2908" data-partner="tweetdeck"><p data-dcnode-id="2912" dir="ltr" lang="en"><span data-dcnode-id="2929" instrument_node="">The </span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/USAPavilion%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/USAPavilion?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2928" instrument_node="">#USAPavilion</span></a><span data-dcnode-id="2926" instrument_node=""> features a series of majestic images by American photographer QT Luong. We are proud to host him as a guest speaker this week.  </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/terragalleria%3Fref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/terragalleria?ref_src=twsrc%5Etfw');"><span data-dcnode-id="2925" instrument_node="">@terragalleria</span></a><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/USAExpo2020%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/USAExpo2020?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2923" instrument_node="">#USAExpo2020</span></a><span data-dcnode-id="2921" instrument_node=""> </span><a data-dcnode-id="2919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Expo2020%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/Expo2020?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2920" instrument_node="">#Expo2020</span></a><span data-dcnode-id="2918" instrument_node=""> </span><a data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Dubai%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/Dubai?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2917" instrument_node="">#Dubai</span></a><span data-dcnode-id="2915" instrument_node=""> </span><a data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/7svBPo32kZ" onclick="javascript:pageTracker._trackPageview('/outgoing/t.co/7svBPo32kZ');"><span data-dcnode-id="2914" instrument_node="">pic.twitter.com/7svBPo32kZ</span></a></p><span data-dcnode-id="2911" instrument_node="">— USA Expo 2020 (@USAExpo2020) </span><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/USAExpo2020/status/1493556995282333697%3Fref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/USAExpo2020/status/1493556995282333697?ref_src=twsrc%5Etfw');"><span data-dcnode-id="2910" instrument_node="">February 15, 2022</span></a></blockquote><span data-dcnode-id="2907" instrument_node="">
</span><span data-dcnode-id="2905" instrument_node="">

The first talk was a non-technical introduction to landscape photography as an event for a group of Youth Ambassadors. Those friendly and enthusiastic college-age men and women are the human faces of the USA pavilion. They serve in different roles that include greeting visitors, guiding them through exhibits, and also assisting official guests like me through the day. I am grateful to all, but particularly to Katrina, Salsabila, Cecilia, and Taty for helping me in various ways to make the most of my short time at Expo 2020. 
</span><p data-dcnode-id="2901"><span data-dcnode-id="2904" instrument_node="">
</span><img data-dcnode-id="2903" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/expo-2020-rocket-garden-with-katrina.jpeg&amp;raw"><span data-dcnode-id="2902" instrument_node="">
</span></p><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">
The second talk took place at the Rocket Garden of the USA Pavilion, right after Andrew O’Shaughnessy’s talk. I discussed the idea of national parks and what makes those in America special before commenting on my  photographs in the pavilion with a small print of each as a visual aid. The event continued with a Q&amp;A session moderated by Katrina.
</span></p><p data-dcnode-id="2895"><span data-dcnode-id="2898" instrument_node="">
</span><img data-dcnode-id="2897" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/uaem69495.jpg&amp;raw"><span data-dcnode-id="2896" instrument_node="">
</span></p><p data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">
The third talk took place at the Terra Auditorium of the Sustainability Pavilion and was a visual presentation introducing the incredible diversity and beauty of America’s national park system through photographs of each of them. I am thankful to Adel Dekinesh, Nadia Ziyadeh, Maya Nadao-Fall and the rest of the team at the US Consulate General in Dubai for this opportunity to present my work to a global audience, and for all the excellent arrangements during this visit.

</span></p><p data-dcnode-id="2886"><span data-dcnode-id="2892" instrument_node="">
 I often start my talks by pointing out that I was an unlikely person to have photographed the US national parks. I suppose that I am no longer an unlikely person to turn to for photographs of them. The past photographers seen below happen to be the four mentioned by Dayton Duncan in the 
</span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treasuredlandsbook.com/TREASURED_LANDS_5th_0_pp1-13_FM.pdf"><span data-dcnode-id="2891" instrument_node="">
foreword to </span><i data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Treasured Lands</span></i></a><span data-dcnode-id="2887" instrument_node="">.   
</span></p><p data-dcnode-id="2882"><span data-dcnode-id="2885" instrument_node="">
</span><img data-dcnode-id="2884" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/google-national-parks-photographer-6.jpg&amp;raw"><span data-dcnode-id="2883" instrument_node="">
</span></p><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">
I am grateful to the US Department of State and Thinkwell for selecting my work for the USA Pavilion and displaying it so beautifully in such a high-profile venue. I am so proud that it was deemed worthy of representing the best of what America can offer to the world. 
</span></p><p data-dcnode-id="2869"><span data-dcnode-id="2879" instrument_node="">

</span><h2 data-dcnode-id="2840"><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-tour-of-the-usa-pavilion-at-expo-2020-dubai/" rel="bookmark" title="Permanent Link to A Tour of the USA Pavilion at Expo 2020 in Photos"><span data-dcnode-id="2842" instrument_node="">A Tour of the USA Pavilion at Expo 2020 in Photos</span></a></h2><span data-dcnode-id="2839" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="2828"><span data-dcnode-id="2838" instrument_node="">Posted 
				</span><span data-dcnode-id="2836" instrument_node="">
				on March 5, 2022, 5:51 pm, 
				</span><span data-dcnode-id="2834" instrument_node="">

</span><div class="entry" data-dcnode-id="2608"><span data-dcnode-id="2826" instrument_node="">
					The </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-glimpse-of-expo-2020/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/a-glimpse-of-expo-2020/');"><span data-dcnode-id="2825" instrument_node="">previous entry</span></a><span data-dcnode-id="2823" instrument_node=""> took you on a quick tour of Expo 2020. This one concentrates on a particular building, the USA pavilion, showing you all of its public spaces. Most Expo pavilions are ephemeral, so my hope is that this series of photographs will help memorialize the USA Pavilion at Expo 2020 Dubai. The construction was going to be done in six months, but the postponement due to the pandemic afforded a welcome additional year. Although the final cost has not been published, it has been </span><a data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenationalnews.com/uae/heritage/expo-2020-us-pavilion-to-be-completed-in-november-after-getting-dh220-million-funding-from-uae-1.1081561%3Fgclid%3DCjwKCAiAsYyRBhACEiwAkJFKoqO7MNxLxTApfCUVnlYRbM5pDPJrjF3ozQR1CwtDilSIfNppR7IMXxoCHdwQAvD_BwE" onclick="javascript:pageTracker._trackPageview('/outgoing/www.thenationalnews.com/uae/heritage/expo-2020-us-pavilion-to-be-completed-in-november-after-getting-dh220-million-funding-from-uae-1.1081561?gclid=CjwKCAiAsYyRBhACEiwAkJFKoqO7MNxLxTApfCUVnlYRbM5pDPJrjF3ozQR1CwtDilSIfNppR7IMXxoCHdwQAvD_BwE');"><span data-dcnode-id="2822" instrument_node="">reported</span></a><span data-dcnode-id="2820" instrument_node=""> that the UAE contributed $60 million. 
</span><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">
With a large number of pavilions present, the visitor’s attention span is necessarily short. I spent many hours photographing the pavilion, but prior to that, to appreciate the quality of the experience, I did a quick walkthrough at the pace of a regular visitor, which took less than half an hour. I found the exhibits cohesive, enjoyable, educational, and effective at conveying the theme of world-changing innovation thriving in an environment enabled by freedom.


</span></p><h4 data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Entrance</span></h4><span data-dcnode-id="2815" instrument_node="">

The pavilion’s facade is covered by an overhanging roof screen for shade during hot days. It is decorated with interlocking metal stars that evoke the American flag and form a leitmotif through the pavilion. At night, the space between the stars and the wall makes possible a light show with colors shifting from white, red, and blue to create dynamic patterns. Past the pavilion’s motto “Life, Liberty, and the Pursuit of the Future” and a welcome video featuring Vice-President Harris, visitors step onto the “travellator”, a people mover similar to those found at airports winding around the first three exhibits. That approach provides a perfect flow, as the exhibits are perfectly synchronized with the pace of motion.

</span></p><h4 data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Exhibit 7/8: Lift-off</span></h4><span data-dcnode-id="2660" instrument_node="">

Exiting the building, as they walk down a ramp, visitors come face-to-face with a replica of the SpaceX Falcon 9 rocket booster, stationed on its landing legs. I may have missed the explanation of its significance as the first reusable orbital rocket and the most-flown in the United States. Even though, it is an impressive display, as its 137 feet (14 stories) make it the tallest structure in a national pavilion at Expo 2020 (overall second tallest) and an apt conclusion for a pavilion that heavily showcases US leadership in space exploration. Because the replica is life-size and has even a patina of soot to make it look like it’s been on a flight, I initially thought it was the real thing. At night, the rocket is a canvas for a one-minute projection telling the story of American space travel. Beneath the rocket is a patio called the Rocket Garden where visitors can dine on American fast food bought at the Rocket Dinner while enjoying performances taking place on the Rocket Stage before maybe purchasing souvenirs at the Rocket Store.

</span></p><h4 data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node=""> Photographing the pavilion </span></h4><span data-dcnode-id="2627" instrument_node="">

The observant reader may have noticed that many of the photos above are devoid of visitors. It was not for lack of popularity. Between its opening hours from 10 am to 10 pm, there was consistently a long line to get inside the pavilion, sometimes exceeding an hour – another element of expos reminiscent of theme parks. 
</span><p data-dcnode-id="2622"><span data-dcnode-id="2626" instrument_node="">
I was grateful for the opportunity to photograph the pavilion on assignment for </span><a "https:="" data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog" thinkwellgroup.com"=""><span data-dcnode-id="2625" instrument_node="">Thinkwell Group</span></a><span data-dcnode-id="2623" instrument_node="">, the firm that had designed and produced it as a turnkey solution for the US State Department. Because they wanted from me mostly “clean” shots of the designs without people, I did most of the work before opening hours, from 6 am to 10 am. I am thankful to all the staff at the USA Pavilion for making me feel welcome and for their great job in facilitating the architectural photoshoot. They provided me full access, including to the “attic” above exhibit 4 and to private VIP areas not pictured in this article. The opening photograph was made at dawn. The night before, the staff had removed the blue queue stanchions in front of the building. 
</span></p><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">

				</span></div><span data-dcnode-id="2573" instrument_node="">
</span><div class="entry" data-dcnode-id="2435"><span data-dcnode-id="2572" instrument_node="">
					Expo 2020 is what brought me to </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-photo-tour-of-dubai-in-a-day/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/a-photo-tour-of-dubai-in-a-day/');"><span data-dcnode-id="2571" instrument_node="">Dubai</span></a><span data-dcnode-id="2569" instrument_node=""> in 2022. My first time at a world fair was enjoyable. What does a world fair have to offer?  
</span><p data-dcnode-id="2565"><span data-dcnode-id="2568" instrument_node="">
</span><img data-dcnode-id="2567" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69515.large.jpeg&amp;raw"><span data-dcnode-id="2566" instrument_node="">
</span></p><p data-dcnode-id="2557"><span data-dcnode-id="2564" instrument_node="">
World fairs also referred to as </span><i data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Universal Expositions</span></i><span data-dcnode-id="2561" instrument_node=""> or </span><i data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Expos</span></i><span data-dcnode-id="2558" instrument_node=""> for brevity, have taken place since the 19th century. The Eiffel Tower was built as a temporary structure for the Exposition Universelle of 1889 in Paris. Closer to home, the Palace of Fine Arts in San Francisco and the Space Needle in Seattle are legacies of Expos for which they were built. The interval between Expos has fluctuated, but as of late they are held every 5 years. Cities bid to become hosts, like for the Olympics. Due to their duration, which is now typically six months, Expos are the most attended international events, with the record set by Expo 2010 in Shanghai at more than 70 million visitors. 
</span></p><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">
Expos are a global showcase of human achievement and a great opportunity to improve your understanding of the world. While the first Expos were focused on industrialization and technological innovations, they are nowadays a platform for participating countries to project a favorable image through their pavilions. The bulk of the fair is made of a collection of national pavilions. In the past, joint pavilions have provided space to countries that can’t afford to participate in an Expo. At Expo 2020, for the first time, each of the countries had its own. Showcasing the country’s sights, culture, and achievements, they often feature striking architecture, original art and historic pieces, and quirky features that make them a delight to visit and be surprised.
</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">
Expo 2020 was to begin in October 2020 (hence the name), avoiding the Dubai hot season from May to September when average high temperatures top 100F, but was postponed one year due to the pandemic. Not surprisingly given the host city, Expo 2020 is the largest ever, with 192 countries represented and three times the acreage of Expo 2015. Consistent with its policy to build bold attractions to secure its status as the newest world city and boost tourism, Dubai spent $7 billion on this project. When they won the bid in 2013, the site was nothing but bare desert. It now has its own metro station and 80% of the infrastructure is intended to be converted into a sustainable city. Due to lack of space, Expo 2025 in Osaka, Japan will scale down to 150 countries, comparable to Expo 2015 in Milan with 145 countries. 
</span></p><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">

</span><img data-dcnode-id="2480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69487.large.jpeg&amp;raw"><span data-dcnode-id="2479" instrument_node="">
</span></p><p data-dcnode-id="2473"><span data-dcnode-id="2477" instrument_node="">

The closest experience I had to visit an Expo is the Disney EPCOT theme park, part of Disney World near Orlando, Florida, where one can also see national pavilions and technology exhibits. This is no coincidence, as Disney had contributed many exhibits and rides to Expo 1964 in New York City, then moved them to Disneyland and duplicated several at Disney World. However, a real Expo is more fun to visit. Cultural diversity and sensitivity is higher, and not only because you see more visitors from around the world. Since the national pavilions are each built and staffed by their respective nations, they offer cultural authenticity and opportunities to taste different cuisines. However, the food is quite expensive, like in a theme park, and there can be long lines for popular pavilions. Because nations compete to offer the most memorable visitor experiences, you can see a lot of different cutting-edge and extravagant designs within a walkable space. I didn’t have much free time at Expo 2020, but I’ve included photos from three of my favorite pavilions above. All of them can be visited virtually through </span><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//virtualexpodubai.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/virtualexpodubai.com/');"><span data-dcnode-id="2476" instrument_node="">interactive 360 panoramas</span></a><span data-dcnode-id="2474" instrument_node="">. The Saudi Arabia pavilion was the largest, at 141,000 square feet. Although I am partial, despite its modest size of 36,000 square feet, USA was no slouch, but that will be the subject of the next post. Like in downtown Dubai, photography at Expo 2020 was regulated, with tripods quickly drawing security’s attention. All bags were x-rayed, and on one occasion, I was asked if I had permission to bring in what they dubbed to be professional equipment, even though I had official credentials. However, with one exception, I didn’t try to photograph Expo 2020, instead, I tried to enjoy myself and just made those images along the way.  


</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">
In addition to the national pavilions, Expo 2020 featured three thematic pavilions built by the host, and corresponding to its three subthemes of opportunity, mobility, and sustainability, linked by a central plaza called Al Wasl’s. Rising at 220 feet, its steel trellis, designed by the firm responsible for the Burj Khalifa, is the world’s largest free-standing dome and doubles as the largest 360-degree theater, where images projected by lasers are visible both from within and outside the dome, making it a great outdoor venue for performances. 

</span></p><p data-dcnode-id="2467"><span data-dcnode-id="2470" instrument_node="">
</span><img data-dcnode-id="2469" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69475.large.jpeg&amp;raw"><span data-dcnode-id="2468" instrument_node="">

</span></p><p data-dcnode-id="2455"><span data-dcnode-id="2458" instrument_node="">
</span><img data-dcnode-id="2457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69516.large.jpeg&amp;raw"><span data-dcnode-id="2456" instrument_node="">
</span></p><p data-dcnode-id="2451"><span data-dcnode-id="2454" instrument_node="">
</span><img data-dcnode-id="2453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69510.large.jpeg&amp;raw"><span data-dcnode-id="2452" instrument_node="">
</span></p><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">
I felt that Expo provided an international experience full of ideas and solutions from around the globe. Expo 2020 was historic not only as the largest Expo ever  , but also as the first held in the Arabic World. However, that made it a long trip from California. The time difference was exactly 12 hours, meaning that it is the opposite northern hemisphere location on the globe – the flight route was straight north over the pole. 
</span></p><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">
My trip also took place during the pandemic. It was safer than it would appear. First, contrary to widespread opinion, chances of catching the virus on a plane are low. There is no statistical evidence that airline crews have gotten more infections than other occupations.  Masks are worn most of the time. In the cabin, the air does not circulate around, but instead enters the cabin from vents above the seats and exits from vents below the seats in a laminar pattern. The ventilation is strong enough that the entire volume of air inside a plane is completely replaced every few minutes by air that is either fresh from outside or filtered to HEPA standards (99.97% of all particles). On international flights, all passengers need to present a negative PCR test taken within 2 to 3 days of boarding. Second, the UAE had one of the lowest rates of COVID-19 in the world. Maybe, there is a correlation with strict public health measures: at Expo 2020, almost everybody wore masks, even outdoors, something I never saw in the San Francisco Bay Area. Staff needed to take PCR tests every two days. Yet, there was the risk of testing positive and being stuck abroad. In addition, I was told that if I extended my stay beyond my official programmed time and I was to test positive, I’d be entirely on my own. In the next post, we’ll see why I visited this particular Expo under those circumstances. Stay tuned!
</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2446" instrument_node="">

</span><h2 data-dcnode-id="2410"><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/a-photo-tour-of-dubai-in-a-day/" rel="bookmark" title="Permanent Link to A Photo Tour of Dubai in a Day"><span data-dcnode-id="2412" instrument_node="">A Photo Tour of Dubai in a Day</span></a></h2><span data-dcnode-id="2409" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="2398"><span data-dcnode-id="2408" instrument_node="">Posted 
				</span><span data-dcnode-id="2406" instrument_node="">
				on February 22, 2022, 11:00 pm, 
				</span><span data-dcnode-id="2404" instrument_node="">
