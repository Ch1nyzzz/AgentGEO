				</span><span data-dcnode-id="2402" instrument_node="">
				under </span><a data-dcnode-id="2400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/locations/" rel="category tag"><span data-dcnode-id="2401" instrument_node="">Locations</span></a><span data-dcnode-id="2399" instrument_node="">.
				</span></div><span data-dcnode-id="2397" instrument_node="">
</span><div class="entry" data-dcnode-id="2158"><span data-dcnode-id="2396" instrument_node="">
					Besides my impressions from a whirlwind trip to Dubai, this article serves as a tour guide to ten of the city’s most famous and photogenic locations that one could see and photograph in a single long day. 
</span><p data-dcnode-id="2392"><span data-dcnode-id="2395" instrument_node="">
</span><img data-dcnode-id="2394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/middle-east/uaem69422.large.jpeg&amp;raw"><span data-dcnode-id="2393" instrument_node="">
</span></p><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">
It was my first time in the Arabic world, and despite my short stay, I could understand why Dubai has been rising as a top international travel destination. The city is as futuristic as any on earth. It is a place of superlatives, with the tallest building in the world (Burj Khalifa), the largest shopping center (Dubai Mall), the largest Ferris wheel (Ain Dubai), the tallest hotel (Burj Al Arab), and a few others that I have missed. It is home to some of the most remarkable contemporary architecture. High-rises can sometimes look all the same, but in Dubai, most feature a distinctive design. At the same time, Dubai has retained an unmistakable Arabic flair, visible not only in the numerous mosques, prayer calls more melodious than I imagined, and building designs but also in the everyday dress of some. All of this makes Dubai a city that defines modern sophistication with an exotic touch. 
</span></p><p data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">
As Dubai aimed to become a tourist destination, the first-rate Emirates airlines initially enticed travelers to stop-overs. Thanks to its location at the crossroads of Asia, Europe, and Africa, its hub at Dubai International Airport is  </span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/travel/airline-news/2022/02/22/dubai-busiest-airport-world/6891061001/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.usatoday.com/story/travel/airline-news/2022/02/22/dubai-busiest-airport-world/6891061001/');"><span data-dcnode-id="2388" instrument_node="">at the time of this writing</span></a><span data-dcnode-id="2386" instrument_node=""> the busiest airport in the world in terms of passenger traffic. From a practical point of view, Dubai is an easy destination thanks excellent touristic infrastructure and one of the best safety records of any large city – violent crime is extremely rare. Covid-19 PCR tests results were delivered by SMS in less than five hours. The shopping and dining are some of the best in the world. The latter can be explained by the city’s population, which is 80% immigrant, resulting in a rich melting pot of cultures that contribute to a cosmopolitan character. I was surprised by the diversity of city’s mix of attractions.

</span></p><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">
</span></p><h4 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Jumeirah</span></h4><span data-dcnode-id="2380" instrument_node="">

My first destination was Palm Jumeirah, a set of artificial islands that from the air take the shape of a palm tree – there is another set of offshore artifical islands shaped like the world. A promenade near the eastern tip on the external shore offers a distant view of the city over the Persian Gulf waters. It is the only place from which one can include Dubai’s two most famous buildings, Burj Khalifa and Burj Al Arab in the same frame. Designed to be Dubai’s landmark and put the city on the global map in 1999, Burj Al Arab was once the tallest hotel in the world (321 meters, four other hotels in Dubai are now taller) and according to some, the only 7-star hotel. At dawn, buildings are dark, so the evening would have been preferable, but I had another destination in mind.  On the mainland, nearby Sunset Beach, one of the public beaches near Burj Al Arab, used to have some of the best views of the iconic hotel, but it is now blocked by a new building under construction – seen on the first picture. Things change fast in Dubai! However, there are still two spots with an excellent view. The first is Madina Jumeirah, a lush resort village whose landscaped garden and waterways make you forget you are in one of the aridest deserts on earth, with only about 1 to 2 days of rain per year. The palatial hotels and souk recreate an Arabic atmosphere with traditional wind towers. The second is the Jumeira Beach Hotel. From afar, it resembles a wave complementing the famous sail-like shape of Burj Al Arab. A rooftop bar with an outdoor terrace provides a great view extending from the landmark hotel to downtown Dubai. The Jumeira Mosque, a fine midday destination, is one of the few in this part of the world to be open to non-muslim people through two daily guided tours.

</span></p><h4 data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Downtown</span></h4><span data-dcnode-id="2343" instrument_node="">

The star of downtown is no doubt the Burj Khalifa, the world’s tallest building (half a mile high, 828m), which was completed in 2010 and amazingly built in six years. Due to limited time, I skipped the trip to the world’s highest outdoor observation deck (148th floor) and instead looked for views from the ground. In the morning, I found distant views with reflections in Dubai Creek at two waterside promenades: Business Bay and Al Jaddaft Walk where the farther point of view lent to a better relative sense of scale of the towers. For close views, it is hard to beat the fountain pool within Souk Al Bahar at the base of the tower even though the fountains do not play in the morning. However, the Palace Reflecting Pool provides an attractive alternative. You will need a very wide lens to capture Burj Khalifa from near. The widest perspective-control lens, the Canon 17mm TS-E, was barely enough to include it all. Instead of visiting the nearby Dubai Mall, I strolled the Mall of the Emirates. I was hoping for a glimpse of the largest indoor ski area (in the middle of the desert!) but instead spent much time looking for water to stay energized, not a given in a maze of luxury shops. Note that I’ve been strongly advised that deploying a tripod in those places is a quick way to get in trouble with security. Permits for professional photography (which are very hard to come by) will be  asked for, and photographers have reported being summarily escorted out from premises. Some even wrote that mere professional-looking cameras triggered the same reactions, but I experienced such difficulties only once and it was not downtown.

</span></p><h4 data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Deira</span></h4><span data-dcnode-id="2306" instrument_node="">

One of the oldest neighborhoods of Dubai, Deira is a world away from the slick skyscrapers of downtown. The narrow streets and alleys are crowded, chaotic, and felt like a meeting of the Mediterranean and India – which they are since the area’s souqs have long been venues for the trade of traditional goods ranging from gold to spices. You’d need hours to get lost in that maze (there are no no-go areas) near the mouth of Dubai Creek, but here are some photos all made within half an hour. As a street photography destination, it works all day, even though the lights of the early evening would be a bonus. Prior to my trip, I was under the impression that Dubai is a very restrictive place for photography. Besides the tripod limitations, drones are now strictly prohibited. In theory, one needs to ask permission before photographing anybody, but in practice, nobody seemed to care. Compared to the norms in this part of the world, Dubai is pretty much an open society.

</span></p><h4 data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">Marina</span></h4><span data-dcnode-id="2277" instrument_node="">

Dubai Marina is one of the newest neighborhoods of Dubai and the wealthiest.  Bars and eateries make it a popular evening destination. On Dubai’s main thoroughfare, the Sheikh Zayed Road bordered on both sides by impressive skyscrapers, the traffic is always moving, but it slowed to a crawl in the Dubai Marina access roads. Its array of residential towers rising from water reminded me of Miami, but a mosque bordered the canal which is plied by a multitude of restaurant boats. My hotel, the Sheraton Jumeirah Beach Resort was close to the start of three pleasant night walks, the Marina Promenade along a canal, The Walk at JBR (Jumeirah Beach Residence), a sprawling outdoor shopping and dining promenade, and the JBR Beach boardwalk. Towering above it, Ain Dubai is the world’s tallest observation wheel, rising 210 meters, and built with more metal than the Eiffel Tower.

</span><h4 data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Sharjah</span></h4><span data-dcnode-id="2226" instrument_node="">

</span><p data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">
</span></p><blockquote class="twitter-tweet" data-dcnode-id="2183" data-partner="tweetdeck"><p data-dcnode-id="2187" dir="ltr" lang="en"><span data-dcnode-id="2217" instrument_node="">The Power of Photography… A panel discussion that in and of itself was powerful.</span><br data-dcnode-id="2216"><br data-dcnode-id="2215"><span data-dcnode-id="2214" instrument_node="">More impactful seminars to come at Xposure 2022.</span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Xposurexpf%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/Xposurexpf?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2213" instrument_node="">#Xposurexpf</span></a><span data-dcnode-id="2211" instrument_node=""> </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/international%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/international?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2210" instrument_node="">#international</span></a><span data-dcnode-id="2208" instrument_node=""> </span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/photography%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/photography?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2207" instrument_node="">#photography</span></a><span data-dcnode-id="2205" instrument_node=""> </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/festival%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/festival?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2204" instrument_node="">#festival</span></a><span data-dcnode-id="2202" instrument_node=""> </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Sharjah%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/Sharjah?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2201" instrument_node="">#Sharjah</span></a><span data-dcnode-id="2199" instrument_node=""> </span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/UAE%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/UAE?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2198" instrument_node="">#UAE</span></a><span data-dcnode-id="2196" instrument_node=""> </span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/Xposure2022%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/Xposure2022?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2195" instrument_node="">#Xposure2022</span></a><span data-dcnode-id="2193" instrument_node=""> </span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/welovephotography%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/hashtag/welovephotography?src=hash&amp;ref_src=twsrc%5Etfw');"><span data-dcnode-id="2192" instrument_node="">#welovephotography</span></a><span data-dcnode-id="2190" instrument_node=""> </span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/GLHiT1iqfn" onclick="javascript:pageTracker._trackPageview('/outgoing/t.co/GLHiT1iqfn');"><span data-dcnode-id="2189" instrument_node="">pic.twitter.com/GLHiT1iqfn</span></a></p><span data-dcnode-id="2186" instrument_node="">— Xposure (@xposureXPF) </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/xposureXPF/status/1493475197877469187%3Fref_src%3Dtwsrc%255Etfw" onclick="javascript:pageTracker._trackPageview('/outgoing/twitter.com/xposureXPF/status/1493475197877469187?ref_src=twsrc%5Etfw');"><span data-dcnode-id="2185" instrument_node="">February 15, 2022</span></a></blockquote><span data-dcnode-id="2182" instrument_node="">
</span><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">
 I was glad to have come as visiting the festival provided me with another measure of the UAE’s achievement.
 Cities, however impressive they are, can be difficult to definitively compare because each of them is so individual. On the other hand, I’ve been to many photography festivals and fairs, and Xposure was definitively at a scale above anything I’d seen. The photography exhibition consisted of several dozen booths, most of them dedicated to a single photographer. Each of the booths was in itself an exhibit comparable to those put up by best galleries anywhere, with several dozen prints of average print size maybe 30×45 inches (often more), all impeccably lighted and framed. They even recreated a landscaped jungle environment around an exhibit of primate portraits by Mogens Trolle. There were extensive retrospectives by photographers like Steve McCurry, David Doubilet, or James Natchwey. Like at so many locations on that trip, I could have easily spent the day. 
</span></p><p data-dcnode-id="2174"><span data-dcnode-id="2177" instrument_node="">
</span><img data-dcnode-id="2176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/xposure-2022.jpg&amp;raw"><span data-dcnode-id="2175" instrument_node="">
</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">
 Visiting Xposure drove home the point that in the UAE, they dream of big things and make them happen. Standing in the futuristic city, it is amazing to think that less than a century ago, people there still lived in tents. Some will cite easy oil money, but oil currently represents less than 5% of Dubai’s economy. Vision and embrace of the future has to count for something. 


</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">
My day of touring Dubai was on what was initially supposed to be my “rest day” from air travel – a 16-hour direct flight from San Francisco. It was such a whirlwind tour because visiting the city was not my reason for traveling half-across the globe from California to Dubai, but yet because of the pandemic, it didn’t feel right to extend my stay beyond “essential travel”.  In the next post, we’ll come closer to what brought me to Dubai. Stay tuned! 
</span></p><p data-dcnode-id="2159"><span data-dcnode-id="2169" instrument_node="">

</span><div class="post" data-dcnode-id="1739" id="post-14249"><span data-dcnode-id="2130" instrument_node="">
</span><h2 data-dcnode-id="2127"><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/the-theft-1996/" rel="bookmark" title="Permanent Link to The Theft, 1996"><span data-dcnode-id="2129" instrument_node="">The Theft, 1996</span></a></h2><span data-dcnode-id="2126" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="2115"><span data-dcnode-id="2125" instrument_node="">Posted 
				</span><span data-dcnode-id="2123" instrument_node="">
				on January 15, 2022, 11:30 pm, 
				</span><span data-dcnode-id="2121" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="2119" instrument_node="">
				under </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/recollections/" rel="category tag"><span data-dcnode-id="2118" instrument_node="">Recollections</span></a><span data-dcnode-id="2116" instrument_node="">.
				</span></div><span data-dcnode-id="2114" instrument_node="">
</span><div class="entry" data-dcnode-id="1756"><span data-dcnode-id="2113" instrument_node="">
</span><i data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">The Alpinist</span></i><span data-dcnode-id="2110" instrument_node="">, </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thestreamable.com/movies/the-alpinist-2015" onclick="javascript:pageTracker._trackPageview('/outgoing/thestreamable.com/movies/the-alpinist-2015');"><span data-dcnode-id="2109" instrument_node=""> available online</span></a><span data-dcnode-id="2107" instrument_node=""> for a month, is the best climbing film I have seen. Watching brought back memories of my previous life in the mountains, and a particular apex moment, the subject of this post. In 1993, </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/starting-large-format-photography-in-death-valley/"><span data-dcnode-id="2106" instrument_node="">
I adopted the large format camera</span></a><span data-dcnode-id="2104" instrument_node=""> and by the end of 1995, my longest vacation had been a 
</span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/the-road-trip/"><span data-dcnode-id="2103" instrument_node="">
road trip</span></a><span data-dcnode-id="2101" instrument_node=""> centered around photographing the national parks. However, at that time, I was still obsessed with climbing. Although it was the lure of 
</span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/love-at-first-sight-in-yosemite/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/love-at-first-sight-in-yosemite/');"><span data-dcnode-id="2100" instrument_node="">Yosemite</span></a><span data-dcnode-id="2098" instrument_node=""> and its 
</span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/big-wall-climbing-in-yosemite/"><span data-dcnode-id="2097" instrument_node="">
big walls</span></a><span data-dcnode-id="2095" instrument_node=""> that had brought me to California, my love and best abilities resided in the </span><a data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/picturing-the-top-of-north-america/"><span data-dcnode-id="2094" instrument_node="">
cold mountains</span></a><span data-dcnode-id="2092" instrument_node="">. 
</span><p data-dcnode-id="2088"><span data-dcnode-id="2091" instrument_node="">
</span><img data-dcnode-id="2090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/mountain/icec3247.large.jpeg&amp;raw"><span data-dcnode-id="2089" instrument_node="">
</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">
From the start, I was more attracted by adventure than by gymnastic exercise – at which I am not good at all. On a large scale, the mountains offered a backdrop more awesome than the cliffs and boulders where the difficulty of rock climbing is pushed to its limits. On a smaller scale, the beauty of translucent curtains of waterfall ice festooned with innumerable icicles felt more otherwordly than any rock wall. It isn’t uncommon to find yourself on a thin freestanding column, surrounded by air in almost all directions. The mountains had been so compelling to me because they represented another world.
</span></p><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">
 One could argue that the experience of the rock climber is more directly connected to nature since he holds directly on the rock, whereas the ice climber relies on tools such as crampons and ice axes. However, our knowledge of the world often comes to us through tools that are extensions of the body and mind. The art of photography also entirely relies on tools for personal expression. I felt that using tools was simply a way to amplify my experience. There was a particular satisfaction in finding the confidence to hang out from the pick of an ice-ax penetrating only a fraction of an inch into frozen water. Besides the biting cold, wind, and the fall of ice chunks, that experience felt connected to the mountains as I needed to develop the knowledge or instinct of the changing conditions that critically affect a climb. Rock walls are unchanged. A quick warm spell can cause a frozen waterfall to collapse. A quick freeze may render the ice prone to shattering. A frozen slope may be firm and safe to climb at night and in the early morning and become dangerous in the afternoon. 
</span></p><p data-dcnode-id="2080"><span data-dcnode-id="2083" instrument_node="">
</span><img data-dcnode-id="2082" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/mountain/alps3096.large.jpeg&amp;raw"><span data-dcnode-id="2081" instrument_node="">
</span></p><p data-dcnode-id="2066"><span data-dcnode-id="2079" instrument_node="">

The peaks where I debuted in mountaineering were all snowy high mountains. Through pressure and the cycle of melting and refreezing, snow transforms into alpine ice. The slopes in the mountains are generally quite far from vertical, so the climbs are more about endurance and route-finding than technical difficulty. Thanks to modern ice tools, I soon felt confident enough to venture into the 1,400-meter high (4,600 ft) East Face of Mont-Blanc (the last three photos </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/in-the-beginning/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/in-the-beginning/');"><span data-dcnode-id="2078" instrument_node="">here</span></a><span data-dcnode-id="2076" instrument_node="">)
where I climbed solo a trio of routes of increasing difficulty, the </span><i data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Brenva Spur</span></i><span data-dcnode-id="2073" instrument_node="">, </span><i data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Red Sentinel</span></i><span data-dcnode-id="2070" instrument_node="">, and </span><i data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Grand Pilier d’Angle</span></i><span data-dcnode-id="2067" instrument_node="">, experiencing an exhilarating sense of freedom and wildness.  
</span></p><p data-dcnode-id="2061"><span data-dcnode-id="2065" instrument_node="">
 In the 1970s, climbers began exploring a more transient territory, low-altitude water ice, which can generally be described as frozen waterfalls. Presenting vertical sections, they are steeper than the gullies and couloirs found in the mountains and feature a more complex and brittle quality of ice, adding up to a considerable technical challenge. Their ephemeral beauty, allure, fragility, and the improbability of the climbs mesmerized me. In the 1980s, I learned ice-climbing from </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/news/2002/mar/28/guardianobituaries" onclick="javascript:pageTracker._trackPageview('/outgoing/www.theguardian.com/news/2002/mar/28/guardianobituaries');"><span data-dcnode-id="2064" instrument_node="">Godefroy Perroux</span></a><span data-dcnode-id="2062" instrument_node="">, one of the pioneers of that discipline. 
</span></p><p data-dcnode-id="2057"><span data-dcnode-id="2060" instrument_node="">
</span><img data-dcnode-id="2059" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/mountain/icec3283.large.jpeg&amp;raw"><span data-dcnode-id="2058" instrument_node="">
</span></p><p data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">

In all fields of human endeavor, committed practitioners aim to leave a mark by making something new. In science, you write papers describing discoveries. In art, you create novel and original artworks. In climbing, you seek to establish new routes. During the winter of 1996, I participated in the fourth ascent of </span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Sea of Vapors</span></i><span data-dcnode-id="2053" instrument_node="">, leading the majority of pitches (photo above). Conditions were easier, but the line still had the aura of being considered the hardest in the world when first climbed in 1993, defining what was possible at that time. 
</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2051" instrument_node="">
Afterward, I felt ready to try a first ascent of my own. The occasion presented itself in February of that year when climber Eric Hirst alerted me of an opportunity in British Columbia. It took two flights from California and a very long day with even Canadian police on the scene. Due to the proximity with </span><i data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">The Gift</span></i><span data-dcnode-id="2048" instrument_node=""> and the peculiar circumstances of the ascent, my partner Kevin Normoyle and I named it </span><i data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">The Theft</span></i><span data-dcnode-id="2045" instrument_node="">. I won’t repeat details here, they are in </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/mountain/info/ice/theft-eric.html" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/mountain/info/ice/theft-eric.html');"><span data-dcnode-id="2044" instrument_node="">Eric’s report</span></a><span data-dcnode-id="2042" instrument_node=""> and </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/mountain/info/ice/theft.html"><span data-dcnode-id="2041" instrument_node="">
mine</span></a><span data-dcnode-id="2039" instrument_node="">, both written shortly after the ascent, and also summarized in the notes below.
</span></p><p data-dcnode-id="2034"><span data-dcnode-id="2037" instrument_node="">
</span><img data-dcnode-id="2036" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/thetheft-qt.jpg&amp;raw"><span data-dcnode-id="2035" instrument_node="">
</span></p><p data-dcnode-id="2030"><span data-dcnode-id="2033" instrument_node="">
</span><img data-dcnode-id="2032" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/thetheft-wci.jpg&amp;raw"><span data-dcnode-id="2031" instrument_node="">
</span></p><p data-dcnode-id="2026"><span data-dcnode-id="2029" instrument_node="">
</span><img data-dcnode-id="2028" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images-misc/jmleclerc.jpg&amp;raw"><span data-dcnode-id="2027" instrument_node="">
</span></p><p data-dcnode-id="2018"><span data-dcnode-id="2025" instrument_node="">
The first image reproduces the notes that I penciled on the last page of my copy of the guidebook </span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">West Coast Ice</span></i><span data-dcnode-id="2022" instrument_node=""> (first edition) by Don Serl and Bruce Kay. The second edition of the same guidebook is shown on the second and the third image (still from </span><i data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">The Alpinist</span></i><span data-dcnode-id="2019" instrument_node="">, 55:11). The authors noted that “Subsequent ascents will be exceedingly rare”. 
</span></p><p data-dcnode-id="2004"><span data-dcnode-id="2017" instrument_node="">
Indeed. It took twenty-two years for the line to receive its 
</span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gripped.com/routes/hard-b-c-mixed-route-the-theft-gets-second-ascent/" onclick="javascript:pageTracker._trackPageview('/outgoing/gripped.com/routes/hard-b-c-mixed-route-the-theft-gets-second-ascent/');"><span data-dcnode-id="2016" instrument_node="">second ascent</span></a><span data-dcnode-id="2014" instrument_node="">. Marc-André Leclerc was the best alpinist of his generation. As now plainly evident to all in </span><i data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">The Alpinist</span></i><span data-dcnode-id="2011" instrument_node="">, his unassuming demeanor and free-spirited, ascetic lifestyle belied a supernatural mastery in the mountains. Although at a considerably more modest level, I’ve done a bit of alpinism using the same rules of engagement as Marc-André’s: no rope, no communication device, nor prior reconnaissance. In the movie, Barry Blanchard said that this game is only “for the best alpinists on their best days”, but that is true only of cutting-edge routes. The movie shook and moved me because I could relate to Marc-André’s pure-hearted obsession on a personal level.    </span><i data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">The Theft</span></i><span data-dcnode-id="2008" instrument_node=""> is listed on his </span><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marc-Andr%25C3%25A9_Leclerc" onclick="javascript:pageTracker._trackPageview('/outgoing/en.wikipedia.org/wiki/Marc-André_Leclerc');"><span data-dcnode-id="2007" instrument_node="">Wikipedia page</span></a><span data-dcnode-id="2005" instrument_node=""> as one of his notable climbs and his latest before the fatal outing on the Mendenhall Towers less than a month later. I was honored that we had shared the same route – we are to date the two only people to have led the upper column, and that after the second ascent, Marc-André affirmed: 
</span></p><blockquote data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">
“It must be the best waterfall climb in southwestern B.C. without question.”
</span></blockquote><span data-dcnode-id="2001" instrument_node="">

</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">

Of all the climbing sub-specialties, ice climbing suited me the best because the activity was so much about determination, skill, mental strength (some would translate that as “balls”, or according to my acrophobic wife, a deficient sense of danger), willingness to suffer, and less about physical prowess. Yet, I knew that I had already pushed my natural abilities, and therefore my luck. In high school, I was a frail kid who skipped all the physical education classes. It was mostly by sheer willpower that I got into the world of alpinism, but I wasn’t deluding myself into thinking that I was as strong as most of my partners. In the subsequent years, my two closest climbing friends would perish in the mountains, and so would my ice-climbing mentor. 
</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node="">
I didn’t plan it that way, but for a variety of reasons, </span><i data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">The Theft</span></i><span data-dcnode-id="1758" instrument_node=""> turned out to be my last water ice climb. Maybe it was wise to move on after such a high point. Surpassing it would have meant taking greater risks in the inherently dangerous environment of the steeper mountains. I let it go. Besides fond memories, I was content that as a person of ordinary ability, I had managed to do something out of the ordinary. The void left by this departure didn’t last long, as it immediately filled up with photography.  
 				</span></p></div><span data-dcnode-id="1755" instrument_node="">

</span><div class="post" data-dcnode-id="1618" id="post-14213"><span data-dcnode-id="1737" instrument_node="">
</span><h2 data-dcnode-id="1734"><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/2021-in-review-and-happy-new-year/" rel="bookmark" title="Permanent Link to 2021 in Review and Happy New Year"><span data-dcnode-id="1736" instrument_node="">2021 in Review and Happy New Year</span></a></h2><span data-dcnode-id="1733" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="1722"><span data-dcnode-id="1732" instrument_node="">Posted 
				</span><span data-dcnode-id="1730" instrument_node="">
				on January 1, 2022, 8:33 pm, 
				</span><span data-dcnode-id="1728" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="1726" instrument_node="">
				under </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/uncategorized/" rel="category tag"><span data-dcnode-id="1725" instrument_node="">Uncategorized</span></a><span data-dcnode-id="1723" instrument_node="">.
				</span></div><span data-dcnode-id="1721" instrument_node="">
</span><div class="entry" data-dcnode-id="1632"><span data-dcnode-id="1720" instrument_node="">
					Like many, I had high hopes for 2021, but things did not turn out as well as we hoped on both fronts of civic life and the pandemic. The latter is only one of the reasons that this year, I traveled and photographed less than any year going back all the way to the 1990s.

</span><p data-dcnode-id="1716"><span data-dcnode-id="1719" instrument_node="">
</span><img data-dcnode-id="1718" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-ca/usca69118.large.jpeg&amp;raw"><span data-dcnode-id="1717" instrument_node="">
</span></p><p data-dcnode-id="1708"><span data-dcnode-id="1715" instrument_node="">
I already spend less time in the field than one would think, as I make a point to work efficiently to honor my time away from family. But as our children are poised to leave the nest in a couple of years, I pledged to spend even more time at home.  For a while, that did not mean much. Although at home, I was glued all day to the computer putting together </span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ournationalmonuments.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/ournationalmonuments.com');"><span data-dcnode-id="1714" instrument_node="">Our National Monuments</span></a><span data-dcnode-id="1712" instrument_node="">. This was the first book where I assumed the publisher function from the start, so unlike for </span><i data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Treasured Lands</span></i><span data-dcnode-id="1709" instrument_node="">, there was much more to do than writing, working with the art director on the layout and image selection, and preparing the images for pre-press, especially with so many contributors and disparate sources of information. I am grateful to everybody who contributed to this project. Despite all the particular challenges of this year, we managed to launch the book almost in time. If anything, you can take it as a measure of encouragement and inspiration that even in those circumstances, something beautiful and interesting can still be produced. 
</span></p><p data-dcnode-id="1704"><span data-dcnode-id="1707" instrument_node="">
</span><img data-dcnode-id="1706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-ca/usca69040.large.jpeg&amp;raw"><span data-dcnode-id="1705" instrument_node="">
</span></p><p data-dcnode-id="1690"><span data-dcnode-id="1703" instrument_node="">
Although I had meant for the </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/basin-and-range-national-monument-farewell/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/basin-and-range-national-monument-farewell/');"><span data-dcnode-id="1702" instrument_node="">Fall 2020 southwest tour</span></a><span data-dcnode-id="1700" instrument_node=""> to be the “last road trip”, back then, I had to skip some destinations because massive forest fires had closed large parts of national forests in California. Like for </span><i data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Treasured Lands</span></i><span data-dcnode-id="1697" instrument_node=""> my plan for </span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ournationalmonuments.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/ournationalmonuments.com');"><span data-dcnode-id="1696" instrument_node="">Our National Monuments</span></a><span data-dcnode-id="1694" instrument_node=""> was to depict the parklands in an encyclopedic way, with a selection of locations representative of their diversity. I needed a few more key locations. For that reason, at the beginning of March, I drove back to Southern California for a week. My previous visits to </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/carrizo-plain-beyond-the-superbloom/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/carrizo-plain-beyond-the-superbloom/');"><span data-dcnode-id="1693" instrument_node="">Carrizo Plain National Monument</span></a><span data-dcnode-id="1691" instrument_node=""> were all focused on the superblooms. This time I sought to depict other aspects of the monument. 

</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1689" instrument_node="">
</span><img data-dcnode-id="1688" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-ca/usca69057.large.jpeg&amp;raw"><span data-dcnode-id="1687" instrument_node="">
</span></p><p data-dcnode-id="1681"><span data-dcnode-id="1685" instrument_node="">

I had visited the high-elevation areas of San Gabriel Mountains National Monument during the summer, leaving out the lower elevation front-range for cooler months. Indeed, the weather was perfect for </span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/canyons-of-the-san-gabriel-mountains/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/canyons-of-the-san-gabriel-mountains/');"><span data-dcnode-id="1684" instrument_node="">hiking the trails in the San Gabriel Mountains canyons</span></a><span data-dcnode-id="1682" instrument_node="">. Last, a late winter visit to Sand to Snow National Monument provided me at last with close photographs of the “snow” part of the monument, the San Gorgonio mountains.

</span></p><p data-dcnode-id="1677"><span data-dcnode-id="1680" instrument_node="">
</span><img data-dcnode-id="1679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-ca/usca69115.large.jpeg&amp;raw"><span data-dcnode-id="1678" instrument_node="">
</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1676" instrument_node="">
In April, I was originally hoping to travel to Washington, DC to receive the 
</span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/qt-luong-honored-with-robin-w-winks-award-from-npca/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/qt-luong-honored-with-robin-w-winks-award-from-npca/');"><span data-dcnode-id="1675" instrument_node="">Robin W. Winks Award from the National Parks Conservation Association</span></a><span data-dcnode-id="1673" instrument_node=""> at the annual gala, but the event was canceled due to COVID, and replaced with a zoom event. In May, having turned in almost final files to the printer for </span><i data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Our National Monuments</span></i><span data-dcnode-id="1670" instrument_node="">, and having received two doses of Comirnaty (better known as the Pfizer Covid-19 vaccine) I took advantage of the unused flight ticket to travel to West Virginia for a week to photograph the new </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/new-river-gorge-national-park-five-classic-sights/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/new-river-gorge-national-park-five-classic-sights/');"><span data-dcnode-id="1669" instrument_node="">New River Gorge National Park and Preserve</span></a><span data-dcnode-id="1667" instrument_node="">, which pleasantly surprised me as one of the more worthwhile additions to the growing list of our national parks. 
</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1665" instrument_node="">
</span><img data-dcnode-id="1664" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/np-hardwoods/neri69272.large.jpeg&amp;raw"><span data-dcnode-id="1663" instrument_node="">
</span></p><p data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node="">
For a long-overdue family vacation, my wife and I joined other relatives to walk the </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/return-to-jmt-backpacking/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/return-to-jmt-backpacking/');"><span data-dcnode-id="1660" instrument_node="">final section of the John Muir Trail</span></a><span data-dcnode-id="1658" instrument_node=""> in early June. That was the place where I had fortuitously started backpacking a quarter-century ago. However, having spent recent years in more arid and lower-elevation lands, I had somehow forgotten how beautiful the High Sierra was – but also how tough those mountains can be. Especially on that trip, photography was secondary to the experience, yet was a welcome challenge. 
</span></p><p data-dcnode-id="1653"><span data-dcnode-id="1656" instrument_node="">
</span><img data-dcnode-id="1655" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/np-pacific/kica69303.large.jpeg&amp;raw"><span data-dcnode-id="1654" instrument_node="">
</span></p><p data-dcnode-id="1639"><span data-dcnode-id="1652" instrument_node="">
After that welcome break, it was time to get back into InDesign to update </span><i data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Treasured Lands</span></i><span data-dcnode-id="1649" instrument_node=""> with New River Gorge for a third edition scheduled to be released later this winter. In the book industry, they say that producing a book is the easy part, whereas the hard part is to sell it. Even though with the Delta variant, I could not hold any live events, online promotion and the shipping of more than four hundred signed copies of </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ournationalmonuments.com/" onclick="javascript:pageTracker._trackPageview('/outgoing/ournationalmonuments.com');"><span data-dcnode-id="1648" instrument_node="">Our National Monuments</span></a><span data-dcnode-id="1646" instrument_node=""> kept me busy. During this time at home, I also got more serious about collecting </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/national-park-service-visitor-guides-a-brief-history/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/national-park-service-visitor-guides-a-brief-history/');"><span data-dcnode-id="1645" instrument_node="">historic national park ephemera</span></a><span data-dcnode-id="1643" instrument_node=""> that may make their way into a new project. 
It has been a very dry year, even by California standards, so it was much relief to see the rains come back in November. With the hills green again, we resumed hiking in our local area close to San Jose, with the most interesting outing a </span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/cotoni-coast-dairies-national-monument/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.terragalleria.com/blog/cotoni-coast-dairies-national-monument/');"><span data-dcnode-id="1642" instrument_node="">preview of the Cotoni-Coast Dairies extension</span></a><span data-dcnode-id="1640" instrument_node="">.
</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1638" instrument_node="">
</span><img data-dcnode-id="1637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/images/gallery/us-ca/usca69404.large.jpeg&amp;raw"><span data-dcnode-id="1636" instrument_node="">
</span></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">
If you’ve read so far, my sincere thanks for your interest in my work. 
May the new year be all you hope for, and bring back everything we’ve missed in the past two years. I wish you and your family a happy new year 2022 full of happiness, health, joy, peace, and beauty. 				</span></p></div><span data-dcnode-id="1631" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="1620"><span data-dcnode-id="1630" instrument_node="">

</span><div class="post" data-dcnode-id="1480" id="post-13942"><span data-dcnode-id="1616" instrument_node="">
</span><h2 data-dcnode-id="1613"><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/visiting-americas-national-monuments-the-parks-less-traveled/" rel="bookmark" title="Permanent Link to Visiting America’s National Monuments, the Parks Less Traveled"><span data-dcnode-id="1615" instrument_node="">Visiting America’s National Monuments, the Parks Less Traveled</span></a></h2><span data-dcnode-id="1612" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="1601"><span data-dcnode-id="1611" instrument_node="">Posted 
				</span><span data-dcnode-id="1609" instrument_node="">
				on December 15, 2021, 10:27 am, 
				</span><span data-dcnode-id="1607" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="1605" instrument_node="">
				under </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/locations/" rel="category tag"><span data-dcnode-id="1604" instrument_node="">Locations</span></a><span data-dcnode-id="1602" instrument_node="">.
				</span></div><span data-dcnode-id="1600" instrument_node="">
</span><div class="entry" data-dcnode-id="1494"><span data-dcnode-id="1599" instrument_node="">
					Are you looking for new landscapes away from the crowds of the national parks? Are you seeking a more adventurous and out-of-the-beaten-path experience? If so, how about a visit to America’s national monuments? 
</span><p data-dcnode-id="1595"><span data-dcnode-id="1598" instrument_node="">
</span><img data-dcnode-id="1597" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usaz66274.large.jpeg&amp;raw"><span data-dcnode-id="1596" instrument_node="">
</span></p><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">
</span></p><h4 data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">National monuments: what are they?</span></h4><span data-dcnode-id="1590" instrument_node="">

Ask a person on the street to name a national monument, and you will probably hear about the Statue of Liberty, Mount Rushmore, or memorials commemorating our presidents and war veterans. So what’s in there for those who seek to immerse themselves in nature?  In the United States, the term has a more specific meaning and, at the same time, includes features more general than built landmarks. Defined by a 1906 law called the Antiquities Act, national monuments are federally protected areas containing objects of historic or scientific interest. The main difference with national parks is administrative.  The President can swiftly proclaim national monuments with only a signature, thus providing expedited protections, whereas only Congress can establish national parks.  
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">
As suggested by its name, the Antiquities Act was initially meant to protect native archeological sites. However, the first national monument was Devil’s Tower in Wyoming, a natural feature of geologic interest. Congress had been debating over the Grand Canyon since 1882, but even as commercialism was running unchecked, by 1908, it had not yet acted to protect that quintessential American wonder. President Theodore Roosevelt did, by proclaiming the Grand Canyon a national monument. Since 1906, 16 presidents have used the Act to preserve some of America’s most treasured public lands and waters. Half of today’s national parks were first protected as national monuments. 
</span></p><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">
</span></p><h4 data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Two landscape-scale national monuments</span></h4><span data-dcnode-id="1583" instrument_node="">


While some national monuments fit within an acre, others protect entire landscapes with natural features as extraordinary as those found in national parks. In some sense, those landscape-scale national monuments could be seen as national parks in waiting. An excellent example is Grand Staircase–Escalante National Monument located in Southern Utah. At 1,880,461 acres, it is significantly larger than Grand Canyon National Park (1,217,403 acres). Within its plateaus descending in vividly colored stair-steps from Bryce Canyon to the Grand Canyon, the monument protects significant paleontological sites, making it a scientific treasure trove. However, for the visitors and photographers, the attraction is its extraordinary geology of cliffs, badlands, hoodoos, natural arches, and canyons. 
</span><p data-dcnode-id="1579"><span data-dcnode-id="1582" instrument_node="">
</span><img data-dcnode-id="1581" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67076.large.jpeg&amp;raw"><span data-dcnode-id="1580" instrument_node="">
</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1578" instrument_node="">
</span><img data-dcnode-id="1577" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67116.large.jpeg&amp;raw"><span data-dcnode-id="1576" instrument_node="">
</span></p><p data-dcnode-id="1571"><span data-dcnode-id="1574" instrument_node="">
</span><img data-dcnode-id="1573" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67109.large.jpeg&amp;raw"><span data-dcnode-id="1572" instrument_node="">
</span></p><p data-dcnode-id="1567"><span data-dcnode-id="1570" instrument_node="">
</span><img data-dcnode-id="1569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67099.large.jpeg&amp;raw"><span data-dcnode-id="1568" instrument_node="">
</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">
Nearby Bears Ears National Monument shares many characteristics with Grand Staircase Escalante National Monument: its location in Southern Utah, its size (1,353,000 acres) larger than Grand Canyon National Park, and wondrous red rock country with even more immense vistas. However, it is primarily a cultural landscape. Hidden in its labyrinth of canyons and mesas are more cliff dwellings and tribal artifacts than any other area in the American West, including some of the most iconic ruins on the Colorado Plateau. Both monuments marked milestones in conservation. Grand Staircase Escalante National Monument, proclaimed in 1996 by President Clinton, was the first national monument managed by the Bureau of Land Management (BLM), marking the evolution of the nation’s largest land caretaker towards conservation. The Hopi, Navajo, Mountain Ute, Zuni, and Ute agreed to set generations-old differences apart to petition for the protection of their ancestral lands. In response, in the waning days of his presidency, President Obama proclaimed Bear Ears National Monument in 2016, the first national monument initiated by native people and co-managed by them. 
</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1564" instrument_node="">
</span><img data-dcnode-id="1563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67240.large.jpeg&amp;raw"><span data-dcnode-id="1562" instrument_node="">
</span></p><p data-dcnode-id="1557"><span data-dcnode-id="1560" instrument_node="">
</span><img data-dcnode-id="1559" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67207.large.jpeg&amp;raw"><span data-dcnode-id="1558" instrument_node="">
</span></p><p data-dcnode-id="1553"><span data-dcnode-id="1556" instrument_node="">
</span><img data-dcnode-id="1555" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut67227.large.jpeg&amp;raw"><span data-dcnode-id="1554" instrument_node="">
</span></p><p data-dcnode-id="1549"><span data-dcnode-id="1552" instrument_node="">
</span><img data-dcnode-id="1551" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usut68530.large.jpeg&amp;raw"><span data-dcnode-id="1550" instrument_node="">
</span></p><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">
</span></p><h4 data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">National monuments at risk</span></h4><span data-dcnode-id="1544" instrument_node="">

National monuments are much less known and visited than national parks, but those two just have been in the news since 2017. In the spring of that year, President Trump signed an unprecedented executive order to review all the national monuments created through the Antiquities Act since 1996 that were larger than 100,000 acres. The review’s objective was to determine if former presidents had abused their power and if the protections curtailed economic growth. It targeted a total of 27 out of the 35 larger national monuments, including 22 national monuments across 11 states, in addition to five even larger marine areas.  The public comment period of the summer of 2017 generated 97% support for the national monuments under review. Yet, on December 4, 2017, the President ordered size reductions to the two national monuments located in Utah mentioned above. 
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">

In January 2018, I resolved to take action the only way I knew, by hiking and photographing the 22 land-based national monuments in the review. I found a broad cross-section of natural environments, covering a significant portion of the American landscape.  Totaling about 11 million acres, they ranged from the north woods of Maine to the cactus-covered deserts of Arizona.  Besides their vastness and diversity, their natural features rivaled those in our beloved national parks. Vermilion Cliffs National Monument’s Paria Canyon is more than twice as long and every bit as impressive as Zion National Park’s Virgin River Narrows. The monument also houses unique world-renowned rock formations like The Wave and the White Pocket. Giant Sequoia National Monument protects more sequoia groves than Sequoia and Kings National Parks. The Sonoran Desert portions included in Ironwood Forest National Monument and Sonoran Desert National Monument are as beautiful and representative as those in Saguaro National Park, if not more pristine. 
</span></p><p data-dcnode-id="1537"><span data-dcnode-id="1541" instrument_node="">

I spent months in repeated visits, immersing myself in those sacred lands and discovering remnants of cultures imprinted on the ancient landscape. So many of those monuments were previously unknown to me. I reasoned that those areas were vulnerable because the general public did not know about them and thus was not moved to defend them. This inspired me to publish a book that could help conservation organizations raise awareness of those lands.  To amplify the call for conservation, I invited those who advocate for these national monuments to present their perspective. I am so grateful to 27 local citizen associations caring for those national treasures for contributing their voices, to former Secretary of the Interior Sally Jewell for her foreword, and to Ian Shive for his photographs and words that give readers a glimpse of the almost inaccessible marine national monuments in the Pacific. The result is the first photography book entirely dedicated to America’s national monuments. While it includes only a subset of them (the 27 monuments at risk from the review), those comprise the vast majority of the large, park-like monuments. 
</span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/BfJdU6-D1fU/embed/captioned/%25E2%2580%259Chttp%3A//www.ournationalmonuments.com%25E2%2580%259D"><span data-dcnode-id="1540" instrument_node="">
Our National Monuments: America’s Hidden Gems</span></a><span data-dcnode-id="1538" instrument_node=""> is the first in-depth portrayal of those parks less traveled. 

</span></p><p data-dcnode-id="1533"><span data-dcnode-id="1536" instrument_node="">
</span><img data-dcnode-id="1535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ournationalmonuments.com/OurNM_cover2_800px.jpg&amp;raw"><span data-dcnode-id="1534" instrument_node="">
</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">
</span></p><h4 data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Freedom to roam</span></h4><span data-dcnode-id="1528" instrument_node="">

After spending a big part of the previous quarter-century photographing the national parks, I was surprised by the freedom offered by the BLM and the U.S. Forest Service’s (USFS) national monuments. Freedom from crowds, from rules, and expectations. 
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">
The national parks, set for “benefit and enjoyment of the people,” are generally equipped with a convenient infrastructure of roads, visitor centers, lodges, campgrounds, and interpretive trails. Set up for mass tourism, they can bring in mass visitation. For example, this year Arches National Park was frequently full and closed to new entries by 9 am. People instead head to nearby Canyonlands National Park, but even there, securing a spot at sunrise for the iconic Mesa Arch requires arriving well in advance. Next year, you will need a reservation to enter Arches National Park. By contrast, when I photographed three of the better-known natural arches in nearby Grand Staircase–Escalante National Monument, I had the entire place to myself.  Despite a dozen visits to Death Valley National Park, I could never find the Mesquite Sand Dunes devoid of numerous footprints from other visitors. At Cadiz Dunes Wilderness in Mojave Trails, I saw many animal tracks but no human footprints, aside from my own. 
</span></p><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">

During the worst days of the pandemic, national parks locked their gates.  Embodying the principle that public lands are always open to the public, national monuments never closed, providing much solitude and solace.  The heavy visitation of national parks made it necessary to enforce strict rules. You often have to “commute” a long distance to photography spots as no car camping is allowed outside developed campgrounds. In many national monuments,  you can camp almost everywhere you like. Unlike in Grand Canyon National Park, in adjacent Grand Canyon-Parashant National Monument, I could drive right to the edge of the chasm and pitch my tent a few yards away from where I made my sunset, night, and sunrise photographs. Drones are strictly prohibited in national parks, but they are allowed in the national monuments managed by the BLM and the USFS. 
</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">
Many national parks places have become such over-photographed icons that finding a fresh composition has become as challenging as securing a spot. The national monuments offer new landscapes whose more subtle scenery invites exploration to get to know and love. The absence of postcard views and overwhelming features frees you of pre-conceptions that hinder personal discovery. 


</span></p><p data-dcnode-id="1518"><span data-dcnode-id="1521" instrument_node="">
</span><img data-dcnode-id="1520" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/images/gallery/us-sw/usaz66361.large.jpeg&amp;raw"><span data-dcnode-id="1519" instrument_node="">
</span></p><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">
</span></p><h4 data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Explore the national monuments</span></h4><span data-dcnode-id="1513" instrument_node="">




As the national parks become ever more popular, the BLM and USFS national monuments’ vast open spaces offer us places of solitude and inspiration. The rugged experience gives us a sense of the western frontier. With freedom comes the need for personal responsibility, independence, and self-reliance. As their development is minimal, national monuments can test your preparation and self-sufficiency.  Many do not have a single paved road. I needed to rent a 4WD vehicle several times to access some of them. Even then, I still ended up with five flat tires over three years, sometimes in incredibly remote areas. With no visitor centers nor rangers around, no brochures, nor guidebooks, the first obstacle in my explorations was to find information. 



</span><p data-dcnode-id="1499"><span data-dcnode-id="1512" instrument_node="">
</span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/BfJdU6-D1fU/embed/captioned/%25E2%2580%259Chttp%3A//www.ournationalmonuments.com%25E2%2580%259D"><span data-dcnode-id="1511" instrument_node="">
Our National Monuments: America’s Hidden Gems</span></a><span data-dcnode-id="1509" instrument_node=""> provides you with the starting point I wish I had for planning trips. Coffee-table books about places often left me frustrated of being in the dark about the locations depicted. With my previous book, </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.treasuredlandsbook.com/"><span data-dcnode-id="1508" instrument_node="">Treasured Lands: A Photographic Odyssey Through America’s National Parks</span></a><span data-dcnode-id="1506" instrument_node="">, I had aimed to create a book that inspired and informed. Each photograph came with extended practical travel and photography notes, including facts on the parks’ natural history or anecdotal observations about my experiences. Although people in the publishing industry were skeptical that this combination of an artbook and guidebook would work, the book won twelve national and international awards and is also a best-seller in its sixth printing. My new book, </span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/BfJdU6-D1fU/embed/captioned/%25E2%2580%259Chttp%3A//www.ournationalmonuments.com%25E2%2580%259D"><span data-dcnode-id="1505" instrument_node="">
Our National Monuments</span></a><span data-dcnode-id="1503" instrument_node=""> reprises this innovative format, depicting each national monument in depth through a selection of representative highlights with keyed maps and location information. Because those lands are not as popular as the national parks, I do not expect the new book  
 to be as commercially successful. But, on the other hand, the general lack of awareness of those lands is also why I felt this book is needed, a sentiment echoed by the grassroots conservation organizations that care for those critical landscapes. </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/BfJdU6-D1fU/embed/captioned/%25E2%2580%259Chttp%3A//www.ournationalmonuments.com%25E2%2580%259D"><span data-dcnode-id="1502" instrument_node="">Our National Monuments</span></a><span data-dcnode-id="1500" instrument_node=""> is my gift to our public lands and those who care for them.

</span></p><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">

On October 8, 2021, President Biden finally restored the two national monuments in Utah – and one in the Atlantic Ocean. Was it all a bad dream? Republican politicians in Utah are gearing up for a lawsuit to challenge the restoration. The 2017 presidential attack on them reminded us of John Muir’s appeal that “the battle for conservation will go on endlessly.” It reminded us that since 1906, America’s boldest efforts in conservation have been through the proclamation of national monuments.  It prompted me to set out to see for myself the magnificent landscapes of the parks less traveled. I hope it prompts you to learn about our public lands’ hidden gems and embark on your own journey.

</span></p><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">
</span></p></div><span data-dcnode-id="1493" instrument_node="">

</span><div class="post" data-dcnode-id="1362" id="post-14176"><span data-dcnode-id="1478" instrument_node="">
</span><h2 data-dcnode-id="1475"><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/cotoni-coast-dairies-national-monument/" rel="bookmark" title="Permanent Link to Cotoni-Coast Dairies National Monument"><span data-dcnode-id="1477" instrument_node="">Cotoni-Coast Dairies National Monument</span></a></h2><span data-dcnode-id="1474" instrument_node="">
</span><div class="postmetadata" data-dcnode-id="1463"><span data-dcnode-id="1473" instrument_node="">Posted 
				</span><span data-dcnode-id="1471" instrument_node="">
				on December 10, 2021, 11:42 pm, 
				</span><span data-dcnode-id="1469" instrument_node="">
				by QT Luong, 
				</span><span data-dcnode-id="1467" instrument_node="">
				under </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.terragalleria.com/blog/category/locations/" rel="category tag"><span data-dcnode-id="1466" instrument_node="">Locations</span></a><span data-dcnode-id="1464" instrument_node="">.
				</span></div><span data-dcnode-id="1462" instrument_node="">
</span><div class="entry" data-dcnode-id="1385"><span data-dcnode-id="1461" instrument_node="">
					In the early 2010s, I heard about a campaign to establish Cotoni-Coast Dairies National Monument. I was immediately intrigued. The land, located north of Santa Cruz and south of Davenport, would potentially become the national monument closest to my home in San Jose, CA. The  conservationists, led by the </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sempervirens.org/" onclick="javascript:pageTracker._trackPageview('/outgoing/sempervirens.org/');"><span data-dcnode-id="1460" instrument_node="">Sempervirens Fund</span></a><span data-dcnode-id="1458" instrument_node=""> achieved their goal in early 2017, but it was only last week that I got the opportunity to set foot on Cotoni-Coast Dairies. Still, it was a “preview” well ahead of the official opening to the public planned for next summer. 
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">
There is actually no Cotoni-Coast Dairies National Monument. Part of the actions taken on the last week of his presidency, the Jan 12, 2017 proclamation by President Obama did not establish Cotoni-Coast Dairies as a new national monument, but instead an inland expansion of the California Coastal National Monument. Maybe America’s most odd unit of protected land, the California Coastal National Monument is a paradox. Scores of people see it every day, likely more than any other parkland in California, yet it is unknown to most people. Virtually none of the people who see it ever set foot on its lands. Although spread out over more than 10,000 square miles, as proclaimed by President Clinton on Jan 11, 2000, the California Coastal National Monument totaled only 600 acres of land, less than one square mile. All of this is because as the monument extended for 12 nautical miles along the entire 840-mile California coastline but includes only the islets and rocks above mean high tide within that large area. On March 11, 2014, President Obama had added 1,665 acres of onshore lands to the California Coastal National Monument, but the 5,800 acres from the Cotoni-Coast Dairies are by far the largest onshore additions. 
</span></p><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">
The lands were once inhabited by Indigenous Peoples known as the Cotoni (pronounced Cho-toe-knee), part of the Ohlone of the larger SF Bay Area, and then exploited by the Coast Dairies and Land Company, a Swiss dairy operation, hence the name. After farming activities ceased, a nuclear power plant and later a luxury home development were considered, but fortunately those projects did not succeed. Eventually, the </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tpl.org/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.tpl.org');"><span data-dcnode-id="1454" instrument_node="">Trust for Public Land</span></a><span data-dcnode-id="1452" instrument_node=""> acquired the property. They transferred the 407 coastal acres west of Highway 1 to California State Parks, who manages them as an extension of Wilder Ranch State Park, and the 5,800 inland acres east of Highway 1 to the Bureau of Land Management (BLM). 
</span></p><p data-dcnode-id="1440"><span data-dcnode-id="1450" instrument_node="">
I am thankful for the invitation to the guided hike, which was organized by the </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.conservationlands.org/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.conservationlands.org/');"><span data-dcnode-id="1449" instrument_node="">Conservation Lands Fundation</span></a><span data-dcnode-id="1447" instrument_node=""> (CLF) and led by representatives of the two of its Friends Grassroots Network organizations, the </span><a data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amahmutsunlandtrust.org/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.amahmutsunlandtrust.org/');"><span data-dcnode-id="1446" instrument_node="">Amah Mutsun Land Trust</span></a><span data-dcnode-id="1444" instrument_node=""> and the </span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scmta-trails.org/" onclick="javascript:pageTracker._trackPageview('/outgoing/www.scmta-trails.org/');"><span data-dcnode-id="1443" instrument_node="">Santa Cruz Mountain Trails Association</span></a><span data-dcnode-id="1441" instrument_node="">. The later organization had broken ground for the trails on the same week. They expect to be able to open trails to the public by the summer of 2022. The process of planning and obtaining approval from all parties is much more lengthy than the trail building itself. From what I have seen, it will be well worth the wait. I learned from the former organization about the land’s native heritage, its human-impacted ecology, and the field methods being used to make an archeological inventory. So far, ground samples were made at 2,500 locations. About 10% of them yielded artifacts, but don’t expect them to be arrowheads or pottery shards, they are mostly traces of human occupation like shellfish. The Amah Mutsun Tribal Band are the descendants of the Ohlone. Due to the infamous SF Bay Area costs they now live far away, but the Amah Mutsun Land Trust hopes to involve them in all aspects of the monument development. 
</span></p><p data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">
The lands consist of a mix of grassy coastal terraces and forested hills cut by steep river-carved canyons. Due to prior land use, both by Indigenous Peoples who conducted controlled burns, and then the farming operations, the area is more open than its neighbors, offering great ocean views, especially from the edge of the terraces. By contrast, the canyons presented lush vegetation, dominated by live coast oaks, whereas the hills further inland are home to redwood trees. It all adds up to a fascinating mosaic in a small area (9 square miles).    
</span></p><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">
The hike lasted just two hours. Noticing that I had my camera out, other participants often asked if I got good pictures. Given that we started at midday, that walking, listening to the informative commentary from the various representatives, chatting with them, with friendly CLF staff and other invitees did not leave much time for photography, all I could say was “we will see”. You are seeing them now, as those photographs illustrate this account. I hope that despite the hasty circumstances, they still inspire some to discover this new gem for themselves. I cannot wait for the official opening and will be back.
</span></p><p data-dcnode-id="1432"><span data-dcnode-id="1435" instrument_node="">
