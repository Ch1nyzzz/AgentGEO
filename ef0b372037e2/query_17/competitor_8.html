</span><h3 data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">What is Eiffel?</span></h3><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Actually, in this case it is short for “The Eiffel Development Framework™”&nbsp;– a comprehensive approach to software development. It consists of the Eiffel&nbsp;methodology for the beginning-to-end construction of robust, reusable&nbsp;software; the Eiffel language, which supports the methodology; and EiffelStudio™,&nbsp;the environment that contains the Eiffel compiler and the complete set of&nbsp;productivity tools which make the development environment. The individual parts fit together with and&nbsp;support each other’s function in the pursuit of making the best software possible.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">No other software development system has been designed to work in such a simple and powerful way.&nbsp;The results of this approach and design are staggering. Productivity increases. Cost of ownership&nbsp;goes down. Quality levels go up.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Eiffel takes companies’ software to a level of efficiency and reliability far above the capabilities of other languages and development tools.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1416"><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//docs.eiffel.com/" target="_blank"><span data-dcnode-id="1418" instrument_node="">View Eiffel in detail</span></a></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><a data-dcnode-id="1414" name="classic-where"></a></p><span data-dcnode-id="1412" instrument_node="">
</span><h3 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Where does the name come from?</span></h3><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Eiffel is named after Gustave Eiffel, an engineer who created&nbsp;the famous tower. The Eiffel Tower, built in 1887 for the 1889 World Fair, was&nbsp;completed on time and within budget, as will software projects written in&nbsp;Eiffel. If you look at that wonderful structure, you will see a small number&nbsp;of robust design patterns, combined and varied repeatedly to yield an&nbsp;extremely powerful, bottom-up structure – exactly like a system built out of Eiffel Software’s reusable libraries. Like many software systems today, the Eiffel Tower was initially conceived as a temporary structure; and like many systems built with Eiffel, it was able to endure far beyond its original goals.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><a data-dcnode-id="1405" name="classic-how"></a></p><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">How did Eiffel come about, and what is its history?</span></h3><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Eiffel was designed at Eiffel Software (then known as ISE) in 1985, initially as an internal tool to develop&nbsp;various internal applications. Eiffel Software engineers needed a powerful, object-oriented environment integrating the concepts of modern software engineering, and there was simply nothing available.&nbsp;This is why, Dr. Bertrand Meyer, founder of Eiffel Software, designed for them&nbsp;the The Eiffel 1 compiler. It was introduced to the public at the first OOPSLA conference in October of 1986 where it attracted considerable attention, leading us to release it as a commercial product at the end of 1986. The technology spread rapidly over the following years,&nbsp;leading to a set of successful industrial projects in the US, Canada, Europe&nbsp;and the Far East. Right from the start, Eiffel also attracted attention from&nbsp;the academic community as an ideal tool for teaching programming at all levels.&nbsp;Numerous universities around the world have since used it as the primary teaching language.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">Successive versions of the environment appeared at the rate of about once a&nbsp;year. Eiffel recognition was given wider visibility with the publication in 1988 of the book Object-Oriented Software Construction by&nbsp;Dr. Bertrand Meyer, which quickly became a best-selling title and was&nbsp;translated into eight languages; the book used Eiffel to explain and&nbsp;illustrate the fundamental concepts of object technology and </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/values/design-by-contract/" target="_blank" title="Design by Contract"><span data-dcnode-id="1395" instrument_node="">Design by Contract™</span></a><span data-dcnode-id="1393" instrument_node="">.&nbsp;Since then, an expanded new edition of this book has been released: </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Object-Oriented-Software-Construction-CD-ROM-Edition/dp/0136291554" target="_blank"><span data-dcnode-id="1392" instrument_node="">Object-Oriented Software Construction, 2nd Edition</span></a><span data-dcnode-id="1390" instrument_node="">.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The last iteration of the original technology was version 2.3, released in the Summer of 1990. The next version, Eiffel 3,&nbsp;was written entirely in Eiffel; it was bootstrapped from 2.3. Eiffel 3&nbsp;introduced the Melting Ice Technology for fast recompilation, a fully&nbsp;graphical environment based on innovative user interface concepts, and&nbsp;considerable advances in libraries (graphics, networking…) and optimization&nbsp;of the generated code. The initial versions were released on Unix and followed&nbsp;by Linux, VMS, OS/2, Windows (Windows 3.1, Windows 95, Windows NT), .NET, and&nbsp;Mac OS X.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">Today, the Eiffel technology continues to push the frontiers of software&nbsp;development. With the introduction of </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/eiffelstudio/" target="_blank"><span data-dcnode-id="1383" instrument_node="">EiffelStudio</span></a><span data-dcnode-id="1381" instrument_node="">,&nbsp;programmers can take advantage an efficient IDE for achieving highest-quality,&nbsp;robust, scaleable, reusable software applications – on all major platforms.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><a data-dcnode-id="1378" name="classic-studio"></a></p><span data-dcnode-id="1376" instrument_node="">
</span><h3 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">What is EiffelStudio?</span></h3><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">EiffelStudio is the Integrated Development Environment (IDE) designed exclusively for the Eiffel Object-Oriented language. Seamlessly addressing the whole life cycle of software development, EiffelStudio&nbsp;provides facilities that will help your team to develop from initial design time, right through deployment,&nbsp;testing, and maintenance. Built in functionalities such as Computer Aided Software Engineering (CASE) tool for the Business Object Notation (BON) method allow you to see and interact with the design of your system during development, and there is no need for reverse engineering as everything is done concurrently. EiffelStudio&nbsp;also has superb browsing mechanisms for viewing information about your code&nbsp;and it performs and behaves at execution. From full feature browsing, to built in metrics and profiling, EiffelStudio can give you information on almost anything about your system.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">Centered around the </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/values/design-by-contract/" target="_blank" title="Design by Contract"><span data-dcnode-id="1368" instrument_node="">Design by Contract™</span></a><span data-dcnode-id="1366" instrument_node=""> methodology, EiffelStudio’s debugger will allow your software to find the bugs for you, minimizing the costs&nbsp;of maintenance that systems designed with other languages have to endure.&nbsp;Coupled with a browsable editor, EiffelStudio allows you to navigate to any part of your system to track down and fix the so called ‘hard to find’ bugs, reducing project costs even further.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1361"><a data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/eiffelstudio/" target="_blank"><span data-dcnode-id="1363" instrument_node="">View EiffelStudio page</span></a></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><a data-dcnode-id="1359" name="classic-difference"></a></p><span data-dcnode-id="1357" instrument_node="">
</span><h3 data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">What is the difference between Eiffel and EiffelStudio?</span></h3><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Eiffel is the language a developer uses to write great software. EiffelStudio is the environment and toolkit that surrounds the Eiffel language.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><a data-dcnode-id="1350" name="classic-intendedarea"></a></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Is Eiffel intended for any specific application area?</span></h3><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Not specifically. Eiffel shines in ambitious systems that need to adapt to&nbsp;changing market and user demands. It brings many benefits to serious&nbsp;application development and is used in various industries, from financial applications&nbsp;to manufacturing, product configuration control, healthcare, telecommunication systems,&nbsp;defense ….</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Eiffel scales up thanks to its abstraction and structuring facilities. It is one of the few environments that won’t let you down when your project (or company) grows in size, scope, and ambition.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><a data-dcnode-id="1338" name="classic-operatingsystems"></a></p><span data-dcnode-id="1336" instrument_node="">
</span><h3 data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">What about operating systems then? Where does Eiffel run?</span></h3><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Eiffel is very portable, a feature that developers love. It runs just about everywhere, including Windows (classic and .NET), Unix, Linux, VMS, and Mac OS X. This allows developers the flexibility to maintain their legacy code while developing new code on a completely different operating system.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><a data-dcnode-id="1329" name="classic-forsakeexisting"></a></p><span data-dcnode-id="1327" instrument_node="">
</span><h3 data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Won’t I have to forsake my existing software, thus losing millions of dollars?</span></h3><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Absolutely not. Eiffel is an open system, at its best when used as a&nbsp;combination technology to reuse software components written in various languages. In particular, Eiffel includes a sophisticated C and C++ interface, supporting:</span></p><span data-dcnode-id="1321" instrument_node="">
</span><ul data-dcnode-id="1301"><span data-dcnode-id="1320" instrument_node="">
</span><ul data-dcnode-id="1303"><span data-dcnode-id="1319" instrument_node="">
</span><ul data-dcnode-id="1305"><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Calling C functions from Eiffel.</span></li><span data-dcnode-id="1315" instrument_node="">
</span><li data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Accessing C++ classes and all their components (functions or “methods”, data members, constructors, destructors etc.) from Eiffel.</span></li><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Accessing Eiffel mechanisms from C or C++ through the Cecil library (C-Eiffel Call-In Library).</span></li><span data-dcnode-id="1309" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Automatically producing a “wrapper” Eiffel class from a C++ class.</span></li><span data-dcnode-id="1306" instrument_node="">
</span></ul><span data-dcnode-id="1304" instrument_node="">
</span></ul><span data-dcnode-id="1302" instrument_node="">
</span></ul><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Eiffel makes it possible to move to modern software technology while reusing the best results of earlier practices.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><a data-dcnode-id="1296" name="classic-runtimespeed"></a></p><span data-dcnode-id="1294" instrument_node="">
</span><h3 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">How fast is Eiffel’s run-time performance?</span></h3><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">FAST. Eiffel Software has shown that it is possible to utilize the full power of modern object technology without sacrificing run-time performance. Various benchmarks show run-time efficiency similar to C and Fortran, and in many cases better.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><a data-dcnode-id="1287" name="classic-meltingice"></a></p><span data-dcnode-id="1285" instrument_node="">
</span><h3 data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">What is Melting Ice Technology?</span></h3><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Eiffel Software’s unique incremental compilation technology which combines compilation, generating optimally efficient code, with bytecode interpretation,&nbsp;for a fast turnaround after a change.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1276"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//docs.eiffel.com/book/eiffelstudio/melting-ice-technology" target="_blank"><span data-dcnode-id="1278" instrument_node="">View corresponding&nbsp;documentation</span></a></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><a data-dcnode-id="1274" name="classic-compilestoc"></a></p><span data-dcnode-id="1272" instrument_node="">
</span><h3 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Is it true that Eiffel Compiles into C?</span></h3><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Yes. The Eiffel compiler generates an internal form known as “bytecode”. The bytecode can be interpreted directly,&nbsp;but it can also be translated into other forms.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">To generate the final version of a system, the bytecode is optimized and translated into C, to take advantage of the presence of C compilers on just about every platform under the sun. This is the process known as “finalization”, which performs extensive optimizations (routine inlining,&nbsp;static calls, array optimization), permitting performance achievements.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Using C as an intermediate language takes advantage of the platform-specific optimizations performed by C compilers, and&nbsp;most importantly, facilitates interoperability with software written in C and C++.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><a data-dcnode-id="1259" name="classic-graphics"></a></p><span data-dcnode-id="1257" instrument_node="">
</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">What about graphics?</span></h3><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Eiffel offers a choice of graphical libraries for a variety of application scenarios.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">For portable projects, EiffelVision is a high-level graphical library covering user interface objects (windows, dialogs, menus,&nbsp;buttons, dialog boxes etc.) as well as geometrical figures (polygons, circles&nbsp;and the like) that will run on all the supported platforms, adapting in each case to the native look-and-feel.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">For platform-specific projects, to take advantage of the full set of “controls” or “widgets” available on a particular window system, the platform-specific libraries&nbsp;are available:</span></p><span data-dcnode-id="1245" instrument_node="">
</span><ul data-dcnode-id="1231"><span data-dcnode-id="1244" instrument_node="">
</span><ul data-dcnode-id="1233"><span data-dcnode-id="1243" instrument_node="">
</span><ul data-dcnode-id="1235"><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">On Windows, WEL (the Windows Eiffel Library) gives access to essentially all the Windows graphical API, including the most recent controls. A separate page describes how WEL combines the advantages of Windows and Eiffel. An extensive WEL tutorial is available on-line, as well as a general presentation of the design of WEL.</span></li><span data-dcnode-id="1239" instrument_node="">
</span><li data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">On Unix, Linux and VMS we provide GEL, the GTK Eiffel Library.</span></li><span data-dcnode-id="1236" instrument_node="">
</span></ul><span data-dcnode-id="1234" instrument_node="">
</span></ul><span data-dcnode-id="1232" instrument_node="">
</span></ul><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Using EiffelVision or one of the platform-specific libraries is not an exclusive proposition: you can mix-and-match the two levels, using EiffelVision for its abstract capabilities, and for example, WEL to take advantage of specific Windows controls. In fact, EiffelVision internally relies, for its implementation on each platform, on the corresponding platform-specific library, so you already have WEL if you are using EiffelVision on Windows.</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><a data-dcnode-id="1223" name="classic-databases"></a></p><span data-dcnode-id="1221" instrument_node="">
</span><h3 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">What about relational databases?</span></h3><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Eiffel Software provides the EiffelStore library for object-relational&nbsp;interfaces, with mappings available for ODBC (giving access to dozens of database systems on Windows), Oracle, Sybase and Ingres.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Eiffel has also been interfaced with such object-oriented databases as Matisse, Versant, and O2.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><a data-dcnode-id="1211" name="classic-ide"></a></p><span data-dcnode-id="1209" instrument_node="">
</span><h3 data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">What does the IDE look like?</span></h3><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">EiffelStudio is a fully graphical environment that includes all you would expect and more: analysis and design workbench with round-trip (or reversible) engineering, fast recompilation, editing, sophisticated browsing facilities, automatic documentation (see for example the descriptions of the “short form” below), an advanced debugging mechanism, etc.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1202" instrument_node="">Just as an illustration, with further explanations available in the </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//docs.eiffel.com/" target="_blank"><span data-dcnode-id="1201" instrument_node="">Online documentation</span></a><span data-dcnode-id="1199" instrument_node="">,&nbsp;below is a screenshot from EiffelStudio:</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192" style="text-align: center;"><img alt="concurrent_engineering" class="aligncenter wp-image-3215" data-dcnode-id="1193" height="460" sizes="(max-width: 613px) 100vw, 613px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/wp-content/uploads/images/screenshots/concurrent_engineering.png&amp;raw" srcset="https://www.eiffel.com/wp-content/uploads/images/screenshots/concurrent_engineering.png 1022w, https://www.eiffel.com/wp-content/uploads/images/screenshots/concurrent_engineering-300x224.png 300w" width="613"></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><a data-dcnode-id="1190" name="classic-program"></a></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">For more views, see </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/eiffelstudio/screenshots/" target="_blank" title="Screenshots"><span data-dcnode-id="1186" instrument_node="">EiffelStudio sreenshots page</span></a><span data-dcnode-id="1184" instrument_node="">.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><h3 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">What does an Eiffel program look like?</span></h3><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Actually we like to talk about “systems” — a set of classes — each covering a “data abstraction”&nbsp;— a certain set of objects from the external world or from the implementation. For example, you may have classes AIRPORT, RADAR and RUNWAY in a flight control system, classes CUSTOMER and ACCOUNT in a banking system. In any system you can also have general-purpose classes such as LINKED_LIST and HASH_TABLE, although you would not normally write them but reuse them from a library such as EiffelBase.</span></p><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><a data-dcnode-id="1175" name="classic-class"></a></p><span data-dcnode-id="1173" instrument_node="">
</span><h3 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">What does a class look like?</span></h3><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Here is the outline of a simple class COUNTER describing a counter:</span></p><span data-dcnode-id="1167" instrument_node="">
</span><span data-dcnode-id="1166" instrument_node="">

</span><pre data-dcnode-id="1097"><span class="code-reserved" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">indexing</span></span><span data-dcnode-id="1160" instrument_node="">

</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Such operations will appear in features of other classes, called the clients of class COUNTER.</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">If you understand this example, you already know a fair deal of Eiffel! Note how simple the syntax is. Semicolons between instructions are optional (they have been omitted above); no strange symbols, no complicated rules.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">A couple more comments about this example: all values are initialized by default, so every counter object will start its life with its value, item, initialized to zero (you don’t need to call reset initially). Also, `item’ is an attribute, which is exported in read-only mode: clients can say</span></p><span data-dcnode-id="1021" instrument_node="">

</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">The indexing clause at the beginning of the class does not affect its semantics (i.e. the properties of the corresponding run-time objects), but attaches extra documentation to the class. Such information can be used to help developers search for reusable classes. It is good practice to include at least a description entry providing an informal description of the purpose of the class.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><a data-dcnode-id="931" name="classic-counter"></a></p><span data-dcnode-id="929" instrument_node="">
</span><h3 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">A counter is great but how do I write a real system?</span></h3><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">The principles scale up. A class can represent a counter, but it can also represent an assembly line or a factory.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The Eiffel mechanisms for abstraction, reliability, and simplicity provide a power of expression unmatched in the software world.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><a data-dcnode-id="919" name="classic-reuse"></a></p><span data-dcnode-id="917" instrument_node="">
</span><h3 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">What about reusability?</span></h3><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">As Roland Racko wrote in Software Development:</span></p><span data-dcnode-id="911" instrument_node="">
</span><p class="quote" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">“Everything about Eiffel is single-mindedly, unambiguously, gloriously focused on reusability — right down to the choice of reserved words and punctuation and right up to the compile time environment”.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">We couldn’t have said it better. Eiffel was designed from day one to be the vehicle for the new software industry, based on the reuse of high-quality components — rather than on everyone reinventing the wheel all the time.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">This saves organizations countless hours and thousands of dollars in wasted development time.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Eiffel has put these ideas into practice by providing a rich set of professional reusable libraries (several thousand carefully crafted classes): EiffelBase, EiffelVision, EiffelNet, EiffelWeb, EiffelParse, EiffelLex, WEL, MEL, PEL etc.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="896"><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/resources/libraries/" target="_blank"><span data-dcnode-id="898" instrument_node="">View Eiffel libraries</span></a></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><a data-dcnode-id="894" name="classic-assertions"></a></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Assertions look great, but how do they help me?</span></h3><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Assertions radically improve the nature of software development. They have three major benefits:</span></p><span data-dcnode-id="886" instrument_node="">
</span><ul data-dcnode-id="859"><span data-dcnode-id="885" instrument_node="">
</span><ul data-dcnode-id="861"><span data-dcnode-id="884" instrument_node="">
</span><ul data-dcnode-id="863"><span data-dcnode-id="883" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="881" style="text-decoration: underline;"><span data-dcnode-id="882" instrument_node="">Design aid</span></span><span data-dcnode-id="880" instrument_node="">: by working with Design by Contract, you build software together with the arguments that justify its correctness. This makes it much more realistic to produce bug-free software.</span></li><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="870"><span data-dcnode-id="876" style="text-decoration: underline;"><span data-dcnode-id="877" instrument_node="">Testing and debugging mechanism</span></span><span data-dcnode-id="875" instrument_node="">: using the Eiffel compiler, you select which assertions will be monitored at run time</span><br data-dcnode-id="874"><span data-dcnode-id="873" instrument_node="">
and you can set different levels (no check, preconditions only, preconditions and postconditions, everything) separately for each class. Then if an assertion is found at run time to be violated — meaning a bug remains in your software — an exception will interrupt execution. This is a tremendous help for getting software right quickly.</span><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
Testing and debugging are no longer blind searches. They are helped by a precise description both of what the software does (the actual executable texts, given by the do clauses) and of what it should do (the assertions).</span></li><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="865"><span data-dcnode-id="867" style="text-decoration: underline;"><span data-dcnode-id="868" instrument_node="">Automatic documentation</span></span><span data-dcnode-id="866" instrument_node="">: to give the users of a class a precise description of what a class provides, without giving out implementation details, you use the Eiffel notion of the short form of a class, which keeps the feature headers and comments as well as their assertions, but discards any implementation stuff. For example:</span></li><span data-dcnode-id="864" instrument_node="">
</span></ul><span data-dcnode-id="862" instrument_node="">
</span></ul><span data-dcnode-id="860" instrument_node="">
</span></ul><span data-dcnode-id="858" instrument_node="">

</span><table align="center" border="0" cellpadding="0" cellspacing="0" class="code-sample" data-dcnode-id="726" width="90%"><tbody data-dcnode-id="728"><tr data-dcnode-id="730"><td data-dcnode-id="732"><span data-dcnode-id="854" instrument_node="">
</span><pre data-dcnode-id="734"><span class="code-reserved" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">indexing</span></span><span data-dcnode-id="851" instrument_node="">

               </span><span class="code-comment" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">-- Counter's value.</span></span><span data-dcnode-id="827" instrument_node="">

     </span><span class="code-feature" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">increment</span></span><span data-dcnode-id="818" instrument_node=""> </span><span class="code-reserved" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">is</span></span><span data-dcnode-id="815" instrument_node="">

               </span><span class="code-assertion" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">count_incresed</span></span><span data-dcnode-id="806" instrument_node="">: </span><span class="code-feature" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">item</span></span><span data-dcnode-id="803" instrument_node=""> = </span><span class="code-reserved" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">old</span></span><span data-dcnode-id="800" instrument_node=""> </span><span class="code-feature" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">item</span></span><span data-dcnode-id="797" instrument_node=""> + 1

               </span><span class="code-assertion" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">count_not_zero</span></span><span data-dcnode-id="782" instrument_node="">: </span><span class="code-feature" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">item</span></span><span data-dcnode-id="779" instrument_node=""> &gt; 0
          </span><span class="code-reserved" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">ensure</span></span><span data-dcnode-id="776" instrument_node="">
               </span><span class="code-assertion" data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">count_decreased</span></span><span data-dcnode-id="773" instrument_node="">: </span><span class="code-feature" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">item</span></span><span data-dcnode-id="770" instrument_node=""> = </span><span class="code-reserved" data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">old</span></span><span data-dcnode-id="767" instrument_node=""> </span><span class="code-feature" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">item</span></span><span data-dcnode-id="764" instrument_node=""> - 1

     </span><span class="code-feature" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">reset</span></span><span data-dcnode-id="761" instrument_node=""> </span><span class="code-reserved" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">is</span></span><span data-dcnode-id="758" instrument_node="">
               </span><span class="code-comment" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">-- Reset counter to zero.</span></span><span data-dcnode-id="755" instrument_node="">
          </span><span class="code-reserved" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">ensure</span></span><span data-dcnode-id="752" instrument_node="">
               </span><span class="code-assertion" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">counter_is_zero</span></span><span data-dcnode-id="749" instrument_node="">: </span><span class="code-feature" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">item</span></span><span data-dcnode-id="746" instrument_node=""> = 0

</span><span class="code-reserved" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">invariant</span></span><span data-dcnode-id="743" instrument_node="">
     </span><span class="code-assertion" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">positive_count</span></span><span data-dcnode-id="740" instrument_node="">: </span><span class="code-feature" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">item</span></span><span data-dcnode-id="737" instrument_node=""> &gt;= 0

</span><span class="code-reserved" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">end</span></span></pre><span data-dcnode-id="733" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">In EiffelStudio, you get the short form at the click of a button. The short form is an ideal form of documentation, abstract yet precise.&nbsp;Best of all, it is produced automatically by the environment, not written separately, so you don’t need to do any work to get it! No need to write “interface modules” and then repeat their information in the implementation part.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><a data-dcnode-id="721" name="classic-inheritance"></a></p><span data-dcnode-id="719" instrument_node="">
</span><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">What about repeated inheritance?</span></h3><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Repeated inheritance is the case (illustrated by the figure below)&nbsp; in which a class inherits from another through two or more paths. Only in Eiffel can you decide separately for each feature of the common ancestor, such as `birth_date’ or `library_privileges’ in the example, whether it gives one feature or two in the repeated descendant. In the figure, a teaching assistant has the same birth date whether viewed as an instructor or as a student (one feature), but has different library privileges under each of these capacities (two features). This flexibility is indispensable to specify what you want to share and what you want to replicate.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="709"><img alt="inheritance_example" class="aligncenter size-full wp-image-3671" data-dcnode-id="712" height="218" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/wp-content/uploads/images/pages/inheritance_example.gif&amp;raw" width="342"><span data-dcnode-id="711" instrument_node=""> </span><a data-dcnode-id="710" name="classic-typingandbinding"></a></p><span data-dcnode-id="708" instrument_node="">
</span><h3 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Tell me about typing and binding.</span></h3><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Eiffel is statically typed to ensure that errors are caught at compile time, not run time. For example if your system may mistakenly try to execute a request to compute the diagonal of a graphical object that happens to be a triangle, the Eiffel compiler will catch the error before it has had time to cause any damage. Most other object-oriented languages use some degree of “dynamic typing” in which such errors can escape the compiler. (Beware in particular of C extensions that are sometimes advertised as statically typed but still permit almost arbitrary type conversions.)</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Eiffel is dynamically bound to guarantee that the right version of an operation will always be applied depending on the target object. For example if you apply the feature “take off” to an object representing some kind of plane, you have the guarantee that if there are several plane types, each with its own `take_off’ feature, the appropriate one will always be automatically selected. (In contrast, some approaches by default use “static binding”, which can result in disastrously incorrect behavior.)</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><a data-dcnode-id="698" name="classic-bon"></a></p><span data-dcnode-id="696" instrument_node="">
</span><h3 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">What is BON?</span></h3><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">BON is the acronym for Business Object Notation, an analysis and design&nbsp;method that is based on concepts close to those of Eiffel (seamlessness,&nbsp;reversibility, contracting) and defines simple, intuitive graphical&nbsp;conventions. BON is particularly notable for its ability to scale up when you&nbsp;need to describe large and complex systems, keeping a view of the whole while&nbsp;zooming into the details of components at various levels of abstraction. EiffelCase,&nbsp;the Diagram Tool of EiffelStudio, supports BON. The method is described in the&nbsp;book, </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bon-method.com/book_print_a4.pdf" target="_blank"><span data-dcnode-id="691" instrument_node=""> “Seamless Object-Oriented Software Architecture”</span></a><span data-dcnode-id="689" instrument_node="">, by Kim Walden and&nbsp;Jean-Marc Nerson, that is available online.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="684"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bon-method.com/index_normal.htm" target="_blank"><span data-dcnode-id="686" instrument_node="">View BON website</span></a></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><a data-dcnode-id="682" name="classic-dbc"></a></p><span data-dcnode-id="680" instrument_node="">
</span><h3 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">What is this Design by Contract™ mechanism, and how will it change my life?</span></h3><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Design by Contract (DbC) is a unique mechanism that supports the production&nbsp;of quality software. It ensures that your code will have substantially less&nbsp;errors because it follows ‘the rules’ of development. Our customers tell us&nbsp;that thanks to DbC they cut the number of bugs, reduce testing costs, and&nbsp;quickens time to market.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/values/design-by-contract/" target="_blank"><span data-dcnode-id="673" instrument_node="">See Design by Contract page</span></a></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><a data-dcnode-id="669" name="classic-whatcaneiffelbring"></a></p><span data-dcnode-id="667" instrument_node="">
</span><h3 data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">What can Eiffel bring to me that other languages such as C++, C#, and Java cannot?</span></h3><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Clean clear syntax, reusability, native Design by Contract, support for the&nbsp;full software lifecycle, portability, openess … In short, the ability to finish projects on schedule and enhanced productivity in all stages of development.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><a data-dcnode-id="660" name="classic-easier"></a></p><span data-dcnode-id="658" instrument_node="">
</span><h3 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">How long will it take to learn Eiffel?</span></h3><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">With simple and easy to read syntax, Eiffel is intuitive and user friendly.&nbsp;It takes 4-7 days on average to become comfortable with the language and not&nbsp;much more to master the environment. To get a head start with Eiffel, visit&nbsp;the </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eiffel.com/resources/presentations/" target="_blank" title="Presentations"><span data-dcnode-id="653" instrument_node=""> Presentations page</span></a><span data-dcnode-id="651" instrument_node="">.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><a data-dcnode-id="648" name="classic-multipleinheritance"></a></p><span data-dcnode-id="646" instrument_node="">
</span><h3 data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">What is multiple inheritance?</span></h3><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Multiple inheritance is an mechanism whereby a software unit, known in&nbsp;Eiffel as a class, may inherit the features of many other classes. Most modern&nbsp;programming languages support single inheritance whereby a class can inherit&nbsp;from only one other class, but multiple inheritance offers the developer&nbsp;unrestricted inheritance through the ability to inherit as many as is desired.&nbsp;Using multiple inheritance brings the following advantages: improved reuse, better overall system design and architecture, greater flexibility, easier maintainability and debugging.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><a data-dcnode-id="639" name="classic-cleanmultipleinheritance"></a></p><span data-dcnode-id="637" instrument_node="">
</span><h3 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Why is multiple inheritance so clean in Eiffel?</span></h3><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Eiffel tames the power of multiple inheritance through a renaming mechanism&nbsp;that eliminates name clashes, and through a selection facility to remove any ambiguities resulting from multiple redeclarations. Without multiple inheritance, you would lose much of the reusability benefits of the object-oriented method. For example, not all comparable elements are numeric (think of strings) and not all numeric elements are comparable (think of matrices). Without multiple inheritance, you would not be able to select one of these properties when&nbsp;you need to or both when required.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><a data-dcnode-id="630" name="classic-concurrent"></a></p><span data-dcnode-id="628" instrument_node="">
</span><h3 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">What is concurrent engineering?</span></h3><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Concurrent engineering allows the use of EiffelStudio to automatically generate BON diagrams to see and interact with the overall design of your system as you engineer it.</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><a data-dcnode-id="621" name="classic-genericity"></a></p><span data-dcnode-id="619" instrument_node="">
</span><h3 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">What is genericity?</span></h3><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Genericity is the support for type-parameterized class modules in the software text. In object-oriented circles these are known as generic classes. Such classes use generic parameters in the software text, which are then substituted for formal parameters when the class is actually used by a client class. The benefits of such a method is most fully realized in classes when you consider container objects such as arrays and lists. These types are designed to hold a number of arbitrary elements. Ideally, these contained elements should be able to be any type of element, from books to customers to any type available in your system. Otherwise,&nbsp;you would have to write a separate class definition for every type of element&nbsp;you wish to store, a painful and time consuming activity. Genericity solves this problem by assuming a generic type, which will be substituted by the actual type at runtime.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Eiffel for .NET Questions</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><a data-dcnode-id="609" name="net-transparent"></a></p><span data-dcnode-id="607" instrument_node="">
</span><h3 data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Is Eiffel transparent in .NET?</span></h3><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Yes. Eiffel for .NET can be used in exactly the same way as classic Eiffel&nbsp;and no extra language constructs are required to produce applications.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Eiffel brings quite a few unique and powerful features to .NET. Most noticeably it is the only .NET language to offer multiple inheritance and genericity&nbsp;since the first version of the .NET Framework. These two mechanisms are an indispensable aid to creating fully reusable software in a truly object-oriented way.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Eiffel for .NET also brings the full benefits of Design By Contract, ensuring correctness of the software text, reliability,&nbsp;and robustness. Whilst some other .NET languages do support contract&nbsp;mechanisms, Eiffel for .NET is the only one to support them natively, as an&nbsp;actual language construct.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Eiffel also brings some existing libraries to .NET, so aside from being able to use other .NET libraries such as Windows.Forms for graphical elements you could instead use Eiffel’s WEL or EiffelVision2 libraries. EiffelVision2 is a particularly unique graphical library&nbsp;since it is multi-platform, thus ensuring that the compiled system will produce the same display and behavior on all supported platforms.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><a data-dcnode-id="591" name="net-reuse"></a></p><span data-dcnode-id="589" instrument_node="">
</span><h3 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">How does Eiffel for .NET produce reusable components?</span></h3><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">&nbsp;</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Eiffel for .NET produces reusable components simply by compiling to the&nbsp;Common Intermediary Language (CIL) code which makes it available for use by any other .NET supported language. However, this method of reuse is only one type of reuse in action, namely the reuse of software components. There are many other levels and areas of potential reusability.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">The Eiffel compiler can also produce the so-called ‘precompiled libraries’&nbsp;that can then be reused from another Eiffel project. The advantages of using a&nbsp;precompiled library over just referencing an assembly include the ability to&nbsp;reuse native Eiffel constructs (such as multiple inheritance and genericity)&nbsp;without having to recompile the whole source.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The Eiffel language was developed with such levels of reuse in mind from the very beginning and these can benefit the developer in many ways. Multiple inheritance and genericity provide reuse within the actual software implementation, eliminating the need to repeat the same code in different classes – if you need the functionality provided by a class then become a client or inherit from it. Likewise if much of your code does similar things with only small variations you can abstract it into a class or library. This practice is employed and can be seen in the reusable libraries provided with EiffelStudio or Eiffel ENViSioN!.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><a data-dcnode-id="573" name="net-rewriteclasses"></a></p><span data-dcnode-id="571" instrument_node="">
</span><h3 data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">I have several classes in VB.NET and C#. Do I need to rewrite them in Eiffel?</span></h3><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">No. Any code written in a .NET supported language such as VB.NET, C# or&nbsp;Eiffel for .NET automatically compiles to the Common Intermediary Language (CIL)&nbsp;code. Through this standard, independent modules are created (.dll’s or .exe’s)&nbsp;that are fully interoperable so that a developer can reuse any code without having to rewrite or port it to another language.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><a data-dcnode-id="564" name="net-uml"></a></p><span data-dcnode-id="562" instrument_node="">
</span><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">What UML tools do we support?</span></h3><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">EiffelStudio is capable of generating XMI (XML Metadata Interchange) information for any Eiffel system. The XMI&nbsp;notation makes it possible to exchange system information between any products&nbsp;which support this standard (e.g., IBM’s Rational Rose).</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><a data-dcnode-id="555" name="net-webservice"></a></p><span data-dcnode-id="553" instrument_node="">
</span><h3 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">How do you create a web service in Eiffel?</span></h3><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Creating a web service using Eiffel for .NET is as simple as creating one&nbsp;in any other .NET supported language. The class that contains the methods you&nbsp;wish to expose on the Internet can inherit from the .NET type System.Web.Services.WebService.&nbsp;To expose class features on the Internet they must then be given custom&nbsp;attributes declaring them as web methods.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><a data-dcnode-id="546" name="agile"></a></p><span data-dcnode-id="544" instrument_node="">
</span><h3 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Is Eiffel good for Agile Programming?</span></h3><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Modern software projects need agility: the ability to react quickly to market demands, to develop successful systems incrementally, and to empower the teams. Eiffel is the agile solution par excellence: the language and environment provide the technology to produce regular release through short iterations; the method yields architectures that are easy to change, fulfilling the agile dream of “welcoming change”; and all of the Eiffel tools are focused on letting team members exert the best of their creativity and get rids of the impediments of older technologies.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"></p><span data-dcnode-id="535" instrument_node="">
