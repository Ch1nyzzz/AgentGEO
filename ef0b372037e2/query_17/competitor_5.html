</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">In this article, I want to share </span><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">a brief history of the Eiffel Tower</span></strong><span data-dcnode-id="786" instrument_node="">. There are many articles about this iconic monument, which is why I’ve decided to write a small article to talk about its history! You will get to know the Iron Lady a little better, before actually meeting it!</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="783" instrument_node="">The </span><i data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="779" instrument_node=""> was erected in 1889. It is now the symbol of the city of Paris! Its history is very interesting. Its construction has caused a few worries to its creator, Gustave Eiffel. Its design was innovative and different from the architecture of the time, which is why it wasn’t even supposed to remain. It was a temporary construction that was to stay only twenty years. But its revolutionary architectural style changed its fate. Now, approximately 7 million visitors climb the Eiffel Tower every year! Now, you’re going to learn about when the Eiffel Tower was built and how long it took, who built the Eiffel Tower, why they built it, and if it was indeed as beloved back then as it is now. Read on and find out more about </span><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">the brief history of the Eiffel Tower…</span></strong></p><span data-dcnode-id="775" instrument_node="">
</span><div class="su-button-center" data-dcnode-id="770"><a class="su-button su-button-style-flat" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/recommends/new-campaign-eiffel-tower" rel="noopener noreferrer" style="color:#ffffff;background-color:#32caac;border-color:#28a28a;border-radius:50px;-moz-border-radius:50px;-webkit-border-radius:50px" target="_blank"><span data-dcnode-id="772" style="color:#ffffff;padding:8px 24px;font-size:18px;line-height:27px;border-color:#70dac5;border-radius:50px;-moz-border-radius:50px;-webkit-border-radius:50px;text-shadow:none;-moz-text-shadow:none;-webkit-text-shadow:none"><i class="sui sui-external-link-square" data-dcnode-id="774" style="font-size:18px;color:#ffffff"></i><span data-dcnode-id="773" instrument_node=""> Book your Eiffel Tower Tickets Now</span></span></a></div><span data-dcnode-id="769" instrument_node="">
</span><h4 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">When was the Eiffel Tower built?</span></h4><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="762"><img alt="First Timers Paris 3 Days" class="alignnone size-full wp-image-14989 entered error" data-dcnode-id="765" data-lazy-sizes="(max-width: 924px) 100vw, 924px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-300x202.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-768x518.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-1024x690.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-816x550.jpg 816w" data-ll-status="error" height="623" sizes="(max-width: 924px) 100vw, 924px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-300x202.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-768x518.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-1024x690.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash-816x550.jpg 816w" width="924"><noscript data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">&lt;img class="alignnone size-full wp-image-14989" src="https://www.discoverwalks.com/blog/wp-content/uploads/2019/02/paul-dufour-175889-unsplash.jpg" alt="First Timers Paris 3 Days" width="924" height="623" srcset="https://www.discoverwalks.com/blog/wp-content/upl </span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The construction time of the Eiffel Tower is actually quite impressive. The first digging work started on the&nbsp;January 28th 1887. On March 31st 1889, the Tower had been finished in record time. It only took a total of 2 years, 2 months and 5 days to construct! But who decided to place this giant object in the middle of the city? Keep reading to find out more.</span></p><div class="disco-3rd-para" data-dcnode-id="746" id="disco-840390814" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 10px; margin-bottom: 10px; "><div class="su-animate bounceInDown animated" data-animation="bounceInDown" data-dcnode-id="748" data-delay="0" data-duration="1" style="animation-duration: 1s; animation-delay: 0s;"><p data-dcnode-id="758"></p><span data-dcnode-id="757" instrument_node="">
</span><div data-dcnode-id="751" style="background: #f8f8f8; padding: 15px; color: #c4336e; max-width: 100%;"><a class="GreyCTA-Paris" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/tour/paris-walking-tours/request-private-tour/%3Futm_source%3DBlog%26utm_campaign%3DBlog%26utm_content%3DGreyCta" rel="noopener noreferrer" target="_blank"><b data-dcnode-id="753"><span data-dcnode-id="756" instrument_node="">DESIGN YOUR PRIVATE PARIS TOUR NOW &nbsp; </span><span data-dcnode-id="754" style="font-size: 22px;"><span data-dcnode-id="755" instrument_node="">»</span></span></b></a></div><span data-dcnode-id="750" instrument_node="">

</span><h4 data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Who built the Eiffel Tower?</span></h4><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="738"><img alt="Things to do around the Eiffel tower" class="alignnone size-full wp-image-1766 entered error" data-dcnode-id="741" data-lazy-sizes="(max-width: 540px) 100vw, 540px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg 540w, https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel-300x200.jpg 300w" data-ll-status="error" height="360" sizes="(max-width: 540px) 100vw, 540px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg 540w, https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel-300x200.jpg 300w" width="540"><noscript data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">&lt;img class="alignnone size-full wp-image-1766" src="https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg" alt="Things to do around the Eiffel tower" width="540" height="360" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel.jpg 540w, https://www.discoverwalks.com/blog/wp-content/uploads/2013/11/tour-eiffel-300x200.jpg 300w" sizes="(max-width: 540px) 100vw, 540px" /&gt;</span></noscript></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="736" instrument_node="">The&nbsp;</span><i data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="732" instrument_node=""> was named after Gustave Eiffel, whose company was in charge of the project. Gustave Eiffel was not, however, the primary designer of the famous iron structure. Eiffel had the help of engineers that worked for him in the </span><i data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Compagnie des Établissements Eiffel</span></i><span data-dcnode-id="729" instrument_node=""> – Maurice Koechlin , Émile Nouguier, and &nbsp;architect&nbsp;</span><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Stephen Sauvestre</span></strong><span data-dcnode-id="726" instrument_node="">.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">In recognition of the engineers, scientists and mathematicians who contributed to the construction of the tower, the names of these persons were engraved on the side of tower. 72 names, to be exact.</span></p><span data-dcnode-id="721" instrument_node="">
</span><h4 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Why was the Eiffel Tower built ?</span></h4><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="714"><img alt="abriefhistoryoftheeiffeltower1" class="aligncenter size-full wp-image-13056 entered lazyloaded" data-dcnode-id="717" data-lazy-sizes="(max-width: 1507px) 100vw, 1507px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-300x168.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-768x431.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-1024x575.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-610x342.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-816x458.jpg 816w" data-ll-status="loaded" height="846" sizes="(max-width: 1507px) 100vw, 1507px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-300x168.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-768x431.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-1024x575.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-610x342.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-816x458.jpg 816w" width="1507"><noscript data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">&lt;img class="aligncenter size-full wp-image-13056" src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg" alt="abriefhistoryoftheeiffeltower1" width="1507" height="846" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-300x168.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-768x431.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-1024x575.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-610x342.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower1-816x458.jpg 816w" sizes="(max-width: 1507px) 100vw, 1507px" /&gt;</span></noscript></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="712" instrument_node="">At the time of the construction of the </span><i data-dcnode-id="709"><strong data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="708" instrument_node="">, the architecture became industrial. The industry and the creativity were combined for the construction of the monument.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="705" instrument_node="">The </span><i data-dcnode-id="702"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="701" instrument_node=""> was built in 1889 to celebrate the French Revolution’s centennial year during the </span><i data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="698" instrument_node=""> at the </span><i data-dcnode-id="695"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Champs de Mars</span></strong></i><span data-dcnode-id="694" instrument_node="">. The purpose was to show the other nations the power and the industrial abilities of France. The tower was constructed by the Seine and its rounded shape was used as the entry to the exhibition. The </span><i data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="690" instrument_node=""> was entrance to the </span><i data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="687" instrument_node="">.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="684" instrument_node="">The iron structure marked the beginning of a new form of architecture. In 1884, two important engineers that worked in the </span><i data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Eiffel Enterprise</span></i><span data-dcnode-id="681" instrument_node="">, which was founded by Gustave Eiffel, Maurice Koechlin and Émile Nouguier, started making plans for the 1889 </span><i data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="678" instrument_node="">. They proposed the project of a 300 meters tall tower. Then, Gustave Eiffel asked Stephen Sauvestre to redesign and refine the tower. Sauvestre added a few arcs and decorations. He beautified the project.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="672"><img alt="abriefhistoryoftheeiffeltower2" class="aligncenter size-full wp-image-13057 entered lazyloaded" data-dcnode-id="675" data-lazy-sizes="(max-width: 1600px) 100vw, 1600px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-300x180.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-768x461.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-1024x614.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-610x366.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-816x490.jpg 816w" data-ll-status="loaded" height="960" sizes="(max-width: 1600px) 100vw, 1600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-300x180.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-768x461.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-1024x614.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-610x366.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-816x490.jpg 816w" width="1600"><noscript data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">&lt;img class="aligncenter size-full wp-image-13057" src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg" alt="abriefhistoryoftheeiffeltower2" width="1600" height="960" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-300x180.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-768x461.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-1024x614.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-610x366.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower2-816x490.jpg 816w" sizes="(max-width: 1600px) 100vw, 1600px" /&gt;</span></noscript></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="670" instrument_node="">The construction lasted for two years, two months and five days. This was a technical achievement. Each piece of the tower is designed and calculated with utmost accuracy. The steel industry was burgeoning and strongly influenced the choice of materials. Iron was produced in large quantities and its price was affordable, which allowed the construction of imposing structures, such as the </span><i data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="666" instrument_node="">.</span></p><span data-dcnode-id="664" instrument_node="">
</span><div class="su-button-center" data-dcnode-id="659"><a class="su-button su-button-style-flat" data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/recommends/new-campaign-eiffel-tower" rel="noopener noreferrer" style="color:#ffffff;background-color:#32caac;border-color:#28a28a;border-radius:50px;-moz-border-radius:50px;-webkit-border-radius:50px" target="_blank"><span data-dcnode-id="661" style="color:#ffffff;padding:8px 24px;font-size:18px;line-height:27px;border-color:#70dac5;border-radius:50px;-moz-border-radius:50px;-webkit-border-radius:50px;text-shadow:none;-moz-text-shadow:none;-webkit-text-shadow:none"><i class="sui sui-external-link-square" data-dcnode-id="663" style="font-size:18px;color:#ffffff"></i><span data-dcnode-id="662" instrument_node=""> Book your Eiffel Tower Tickets Now</span></span></a></div><span data-dcnode-id="658" instrument_node="">
</span><h4 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Did the Parisians like the iron structure?</span></h4><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="651"><img alt="abriefhistoryoftheeiffeltower3" class="aligncenter size-full wp-image-13058 entered error" data-dcnode-id="654" data-lazy-sizes="(max-width: 674px) 100vw, 674px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg 674w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-300x199.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-610x404.jpg 610w" data-ll-status="error" height="446" sizes="(max-width: 674px) 100vw, 674px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg 674w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-300x199.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-610x404.jpg 610w" width="674"><noscript data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">&lt;img class="aligncenter size-full wp-image-13058" src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg" alt="abriefhistoryoftheeiffeltower3" width="674" height="446" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3.jpg 674w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-300x199.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower3-610x404.jpg 610w" sizes="(max-width: 674px) 100vw, 674px" /&gt;</span></noscript></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="649" instrument_node="">Today, the Parisians are proud of the impressive </span><i data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="645" instrument_node="">. It stands tall above the city and definitely became the most emblematic monument of the city! But when the construction was over, most Parisians hated it!</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="642" instrument_node="">In a letter signed by artists of reference, such as Guy de Maupassant, the critics were very harsh. They thought the iron structure outshone the classic and elegant city of Paris. Parisians talked about the </span><i data-dcnode-id="639"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="638" instrument_node=""> as “grid” and “factory chimney”.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="635" instrument_node="">Despite the criticisms, the </span><i data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="631" instrument_node=""> established itself as one of the highlights of the city.</span></p><span data-dcnode-id="629" instrument_node="">
</span><h4 data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Was the Eiffel Tower meant to be destroyed?</span></h4><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">The Eiffel Tower was to be a temporary structure. Its sole purpose was for the </span><i data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="622" instrument_node="">. After the exhibition, it was to stay for twenty years and then be destroyed.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><img alt="abriefhistoryoftheeiffeltower4" class="aligncenter size-full wp-image-13059 entered lazyloaded" data-dcnode-id="619" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg" data-lazy-srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-300x225.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-768x576.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-1024x768.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-610x458.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-816x612.jpg 816w" data-ll-status="loaded" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg&amp;raw" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-300x225.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-768x576.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-1024x768.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-610x458.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-816x612.jpg 816w" width="1024"><noscript data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">&lt;img class="aligncenter size-full wp-image-13059" src="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg" alt="abriefhistoryoftheeiffeltower4" width="1024" height="768" srcset="https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4.jpg 924w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-300x225.jpg 300w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-768x576.jpg 768w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-1024x768.jpg 1024w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-610x458.jpg 610w, https://www.discoverwalks.com/blog/wp-content/uploads/2018/11/abriefhistoryoftheeiffeltower4-816x612.jpg 816w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="614" instrument_node="">In 1897, the first broadcasts of radio began. So, the </span><i data-dcnode-id="611"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="610" instrument_node=""> became a strategic point for the city. It wasn’t a simple place to visit, it gained a strategic and military purpose. This is what convinced the city of Paris to keep the Eiffel Tower. During the first World War, the tower captured important telegrams, precious information was deciphered, and spies were exposed. Today, the tower contains 120 antennas. 32 radio stations and 40 TV channels broadcast from the top of the monument.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">If you’re interested in the Eiffel Tower, read the following articles:</span></p><span data-dcnode-id="605" instrument_node="">

</span><p data-dcnode-id="574"><span data-dcnode-id="586" instrument_node="">The history of the </span><i data-dcnode-id="583"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="582" instrument_node=""> is quite amazing and unique. Its original purpose was to show the way to the </span><i data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Exposition Universelle</span></i><span data-dcnode-id="579" instrument_node="">, but it turned out to be the symbol of the city of Paris. One can say that the iron structure achieved many exploits and it definitely changed peoples’ minds with its new architectual style. The </span><i data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Eiffel Tower</span></strong></i><span data-dcnode-id="575" instrument_node=""> was a major role in the industrial revolution. It represented the evolution of a growing Europe. One of the most iconic parts of the Eiffel Tower these days is the view of it at night. Every hour after sundown, the tower sparkles for five minutes on the hour, and it’s truly a splendid site to see.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="572" instrument_node="">And now that you know a little more about the </span><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">history of the Eiffel Tower</span></strong><span data-dcnode-id="569" instrument_node="">, I’m sure you will thoroughly enjoy visiting the tower! Don’t hesitate to contact us if you need further information about anything! I hope to see you soon in </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.discoverwalks.com/tour/city/paris-walking-tours/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="568" instrument_node="">one of our tours</span></a><span data-dcnode-id="566" instrument_node=""> in Paris!</span></p><span data-dcnode-id="564" instrument_node="">
