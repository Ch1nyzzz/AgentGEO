dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">59.4712056; 24.88750</span></span></span></span></a></span></span></span></span></td></tr><tr data-dcnode-id="2280"><th class="infobox-label" data-dcnode-id="2283" scope="row"><span class="nowrap" data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Construction started</span></span></th><td class="infobox-data" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">1975</span></td></tr><tr class="note" data-dcnode-id="2275"><th class="infobox-label" data-dcnode-id="2278" scope="row"><span data-dcnode-id="2279" instrument_node="">Completed</span></th><td class="infobox-data" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">1980</span></td></tr><tr data-dcnode-id="2270"><th class="infobox-label" data-dcnode-id="2273" scope="row"><span data-dcnode-id="2274" instrument_node="">Owner</span></th><td class="infobox-data" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Levira</span></td></tr><tr data-dcnode-id="2267"><th class="infobox-header" colspan="2" data-dcnode-id="2268" style="background-color:#ededed"><span data-dcnode-id="2269" instrument_node="">Height</span></th></tr><tr data-dcnode-id="2262"><th class="infobox-label" data-dcnode-id="2265" scope="row"><span data-dcnode-id="2266" instrument_node="">Antenna spire</span></th><td class="infobox-data" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">314&nbsp;m (1,030.2&nbsp;ft)</span></td></tr><tr data-dcnode-id="2259"><th class="infobox-header" colspan="2" data-dcnode-id="2260" style="background-color:#ededed"><span data-dcnode-id="2261" instrument_node="">Technical details</span></th></tr><tr data-dcnode-id="2254"><th class="infobox-label" data-dcnode-id="2257" scope="row"><span data-dcnode-id="2258" instrument_node="">Lifts/elevators</span></th><td class="infobox-data" data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">2</span></td></tr><tr data-dcnode-id="2251"><th class="infobox-header" colspan="2" data-dcnode-id="2252" style="background-color:#ededed"><span data-dcnode-id="2253" instrument_node="">Design and construction</span></th></tr><tr data-dcnode-id="2242"><th class="infobox-label" data-dcnode-id="2249" scope="row"><span data-dcnode-id="2250" instrument_node="">Architect</span></th><td class="infobox-data" data-dcnode-id="2243"><a class="new" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDavid_Baziladze%26action%3Dedit%26redlink%3D1" title="David Baziladze (page does not exist)"><span data-dcnode-id="2248" instrument_node="">David Baziladze</span></a><span data-dcnode-id="2246" instrument_node=""> and </span><a class="new" data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJuri_Sinis%26action%3Dedit%26redlink%3D1" title="Juri Sinis (page does not exist)"><span data-dcnode-id="2245" instrument_node="">Juri Sinis</span></a></td></tr></tbody></table><span data-dcnode-id="2239" instrument_node="">
</span><p data-dcnode-id="2204"><b data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Tallinn TV tower</span></b><span data-dcnode-id="2236" instrument_node=""> (</span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonian_language" title="Estonian language"><span data-dcnode-id="2235" instrument_node="">Estonian</span></a><span data-dcnode-id="2233" instrument_node="">: </span><i data-dcnode-id="2231" lang="et"><span data-dcnode-id="2232" instrument_node="">Tallinna teletorn</span></i><span data-dcnode-id="2230" instrument_node="">) is a free-standing structure with an </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observation_deck" title="Observation deck"><span data-dcnode-id="2229" instrument_node="">observation deck</span></a><span data-dcnode-id="2227" instrument_node="">, built to provide better telecommunication services for the </span><a data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1980_Summer_Olympics" title="1980 Summer Olympics"><span data-dcnode-id="2226" instrument_node="">1980 Moscow Summer Olympics</span></a><span data-dcnode-id="2224" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regatta" title="Regatta"><span data-dcnode-id="2223" instrument_node="">regatta</span></a><span data-dcnode-id="2221" instrument_node=""> event (see </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sailing_at_the_1980_Summer_Olympics" title="Sailing at the 1980 Summer Olympics"><span data-dcnode-id="2220" instrument_node="">Sailing at the 1980 Summer Olympics</span></a><span data-dcnode-id="2218" instrument_node="">). It is located near the suburb </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pirita" title="Pirita"><span data-dcnode-id="2217" instrument_node="">Pirita</span></a><span data-dcnode-id="2215" instrument_node="">, six km north-east of the </span><a data-dcnode-id="2213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tallinn" title="Tallinn"><span data-dcnode-id="2214" instrument_node="">Tallinn</span></a><span data-dcnode-id="2212" instrument_node=""> city center. With its 313&nbsp;m (1030.2&nbsp;ft), the TV tower is the tallest </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonbuilding_structure" title="Nonbuilding structure"><span data-dcnode-id="2211" instrument_node="">nonbuilding structure</span></a><span data-dcnode-id="2209" instrument_node=""> in Tallinn. The tower was officially opened on 11 July 1980. The viewing platform at a height of 170 metres was open to the public until 26 November 2007, when it was closed for renovation. The tower began receiving visitors again on 5 April 2012. The building is administered by the public company Levira (formerly Estonian Broadcasting Transmission Center Ltd) and is a member of the World Federation of Great Towers.</span><sup class="reference" data-dcnode-id="2206" id="cite_ref-1"><a data-dcnode-id="2207" href="#cite_note-1"><span data-dcnode-id="2208" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2205" instrument_node="">
</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2203" instrument_node="">The architects were </span><a class="new" data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDavid_Baziladze%26action%3Dedit%26redlink%3D1" title="David Baziladze (page does not exist)"><span data-dcnode-id="2202" instrument_node="">David Baziladze</span></a><span data-dcnode-id="2200" instrument_node=""> and </span><a class="new" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJuri_Sinis%26action%3Dedit%26redlink%3D1" title="Juri Sinis (page does not exist)"><span data-dcnode-id="2199" instrument_node="">Juri Sinis</span></a><span data-dcnode-id="2197" instrument_node="">, the engineers Vladimir Obydov and Yevgeny Ignatov. The construction work was supervised by Aleksander Ehala.
</span></p><p data-dcnode-id="2188"><span data-dcnode-id="2195" instrument_node="">The cornerstone was laid on 30 September 1975, and the building was inaugurated 11 July 1980 (although the first transmission took place in 1979). The tower body was constructed of </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reinforced_concrete" title="Reinforced concrete"><span data-dcnode-id="2194" instrument_node="">reinforced concrete</span></a><span data-dcnode-id="2192" instrument_node=""> rings 50&nbsp;cm thick that weigh a total of 17,000 </span><a class="mw-redirect" data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tonnes" title="Tonnes"><span data-dcnode-id="2191" instrument_node="">tonnes</span></a><span data-dcnode-id="2189" instrument_node="">, and the total tower weight is approximately 20,000 tonnes. The tower survived a fire during construction.
</span></p><p data-dcnode-id="2177"><span data-dcnode-id="2187" instrument_node="">The observation deck on the 21st floor, originally designed to have a rotating section, is located 170 m above ground and has a diameter of 38 m. The tower was closed to the public on 26 November 2007. Before it was closed, tickets were priced at 60 </span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonian_kroon" title="Estonian kroon"><span data-dcnode-id="2186" instrument_node="">Estonian kroon</span></a><span data-dcnode-id="2184" instrument_node=""> and, aside from an infrequently used concrete and metal staircase, the observation deck was accessed by two </span><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elevator" title="Elevator"><span data-dcnode-id="2183" instrument_node="">elevators</span></a><span data-dcnode-id="2181" instrument_node="">. The </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vilnius_TV_Tower" title="Vilnius TV Tower"><span data-dcnode-id="2180" instrument_node="">Vilnius TV tower</span></a><span data-dcnode-id="2178" instrument_node=""> has a similar architectural design but features a rotating observation deck 165 m above ground.
</span></p><p data-dcnode-id="2172"><span data-dcnode-id="2176" instrument_node="">The structure consists of a 190-metre reinforced concrete tower and a 124-metre metal mast on top of it. Under the tower is a two-storey building with equipment rooms, entrance halls and a conference centre. The diameter of the tower at its base is 15.2 metres and the wall thickness is 50&nbsp;cm. The diameter of the tower from 140 metres up is 8.2 metres. A total of 10,000 m</span><sup data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">3</span></sup><span data-dcnode-id="2173" instrument_node=""> of concrete and 1,900 tonnes of steel were used in the construction.
</span></p><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">The Tallinn TV tower was reopened on 5 April 2012 with completely new interior design made by KOKO Arhitektid.
</span></p><p data-dcnode-id="2162"><span data-dcnode-id="2169" instrument_node="">Local guide books advertise the observation deck's views of Tallinn and extending to the </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_of_Finland" title="Gulf of Finland"><span data-dcnode-id="2168" instrument_node="">Gulf of Finland</span></a><span data-dcnode-id="2166" instrument_node="">. The tower is described as having a 1980s Soviet feel and a restaurant is located on the observation floor. Bullet holes dating from the </span><a class="mw-redirect" data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_coup_attempt_of_1991" title="Soviet coup attempt of 1991"><span data-dcnode-id="2165" instrument_node="">Soviet coup attempt of 1991</span></a><span data-dcnode-id="2163" instrument_node=""> are still visible at the base of the tower.
</span></p><span data-dcnode-id="2161" instrument_node="">

</span><h2 data-dcnode-id="2067"><span class="mw-headline" data-dcnode-id="2075" id="1991_defense_of_Estonia"><span data-dcnode-id="2076" instrument_node="">1991 defense of Estonia</span></span><span class="mw-editsection" data-dcnode-id="2068"><span class="mw-editsection-bracket" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">[</span></span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTallinn_TV_Tower%26action%3Dedit%26section%3D1" title="Edit section: 1991 defense of Estonia"><span data-dcnode-id="2072" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2065" instrument_node="">A widely known account tells of a handful of radio operators who in 1991 risked their lives to protect the free media of the </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Estonia%23Regaining_independence" title="History of Estonia"><span data-dcnode-id="2064" instrument_node="">reborn Republic of Estonia</span></a><span data-dcnode-id="2062" instrument_node=""> from Soviet troops. The defenders placed a matchbox between the elevator door and frame in such a manner that the elevator wouldn't work, leaving the approximately 1,000 tower steps as the only route to the top for the Soviets. The operators also had an oxygen-removing fire-fighting system at their disposal. Triggering the system would have </span><a data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asphyxia" title="Asphyxia"><span data-dcnode-id="2061" instrument_node="">asphyxiated</span></a><span data-dcnode-id="2059" instrument_node=""> everyone in the tower, including the defenders themselves. However, it is not known if the system was operational or if the threat to deploy it was a bluff. The story is well known in Estonia; it is also part of the movie </span><i data-dcnode-id="2056"><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/August_1991_%28film%29" title="August 1991 (film)"><span data-dcnode-id="2058" instrument_node="">August 1991</span></a></i><span data-dcnode-id="2055" instrument_node=""> and is mentioned at length in the documentary </span><i data-dcnode-id="2052"><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Singing_Revolution" title="The Singing Revolution"><span data-dcnode-id="2054" instrument_node="">The Singing Revolution</span></a></i><span data-dcnode-id="2051" instrument_node="">.
</span></p><span data-dcnode-id="2049" instrument_node="">
</span><h2 data-dcnode-id="2038"><span data-dcnode-id="2048" id="Tallinn_TV_tower.27s_structural_features"></span><span class="mw-headline" data-dcnode-id="2046" id="Tallinn_TV_tower's_structural_features"><span data-dcnode-id="2047" instrument_node="">Tallinn TV tower's structural features</span></span><span class="mw-editsection" data-dcnode-id="2039"><span class="mw-editsection-bracket" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">[</span></span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTallinn_TV_Tower%26action%3Dedit%26section%3D2" title="Edit section: Tallinn TV tower's structural features"><span data-dcnode-id="2043" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Thirty-two building enterprises participated in the construction of the Tallinn TV tower. The TV tower was designed by specialists at the State Design Institute of the Ministry of Communications in Moscow. The chief engineer was Yevgeny Ignatov, the chief designer was Vladimir Obydov and the architects were Juri Sinis and David Basiladze.
</span></p><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">The team faced two challenges: to choose a suitable tower structure and select the best location for it. The structure selected was a freely supported base part from reinforced concrete and steel upper part serving as the antenna, with a total height of 314 metres. The internal space of such a TV tower made from reinforced concrete is sufficient for installation of all the necessary equipment and addition of a viewing platform with a restaurant, accessed via a high-speed lift. The height of the tower is such that it is capable of transmitting excellent radio and television signals to distances of up to 90 kilometres in ideal weather conditions.
</span></p><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Several factors were taken into account for the location: the required distance from densely populated urban areas to ensure proper signal reception, geological features of the local soil, distance from the airport, and impact on Tallinn's skyline. The chosen spot was 8 kilometres from the city centre, in a rest and recreation zone not far from the botanical garden and a motor sports club. The location is 23 metres above sea level. The tower, clearly visible from the city and from the sea, dominates the surrounding landscape and affects the local architecture.
</span></p><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">The structure of the tower can be divided into three sections: the foundation, the tower itself from reinforced concrete (190 m) and the steel antenna (124 m). From 150–182 metres the tower contains a superstructure that is 38 metres in diameter, housing the viewing platform, the restaurant and the equipment room for commercial radio stations. The two-storey building that surrounds the base of the tower is also 38 metres in diameter and contains technical and auxiliary facilities.
The foundation slab made from reinforced concrete is 38 metres in diameter, 2.5 metres thick and buried 8.5 metres below ground level. This slab supports a tower of reinforced concrete that is 15.2 metres in diameter at the base and only 8.2 metres in diameter at a height of 180 metres. The wall thickness in the lower part is 500&nbsp;mm and 350&nbsp;mm in the upper part; this is to ensure tower stability even in strong storm conditions. Before 1967 all tall structures had been built in Estonia in compliance with the safety requirements applicable to structures situated in areas with the second wind strength level. After a storm in 1967, with the wind speed reaching 42 metres per second, the TV tower was designed in compliance with the fourth wind strength level requirements.
</span></p><p data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">The mass total of the tower is over 20,000 tons. The centre of gravity of the structure is in the base of the tower, which is why it could not fall over even if the foundation slab were on the surface of the ground.
</span></p><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">The general contractor was the Tallinn Construction Trust and the subcontractors were the Reinforced Concrete Construction Trust, the Metal Structures Trust and the Radio Construction Trust. The work was commissioned by the TV Tower Construction Directorate of the Ministry of Communications of the Estonian SSR, with Vootele Tõsine as its director.
</span></p><span data-dcnode-id="2024" instrument_node="">
</span><h2 data-dcnode-id="2014"><span class="mw-headline" data-dcnode-id="2022" id="Construction_work"><span data-dcnode-id="2023" instrument_node="">Construction work</span></span><span class="mw-editsection" data-dcnode-id="2015"><span class="mw-editsection-bracket" data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">[</span></span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTallinn_TV_Tower%26action%3Dedit%26section%3D3" title="Edit section: Construction work"><span data-dcnode-id="2019" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Several new technical solutions were implemented during the construction of the TV tower. The reinforced concrete tower itself was assembled using the sliding mold method. The concrete mold was installed at a height of 2.5 metres; then the armature was inserted and the concrete poured. After that the concrete form was shifted upwards, narrowed to the new diameter and the new section of reinforced concrete created. Today the rings resulting from this process can still be seen at 2.5-metre intervals on the tower. The concrete was poured continuously for 8 months, with the tower gradually rising above the landscape. The builders used M-400 concrete based on oil shale ash and Portland cement. This concrete had been developed by the scientists at the Tallinn Polytechnical Institute under the supervision of Verner Kikas. The concrete was designed to withstand 300 frost resistance cycles. Subsequent inspections have revealed that the strength of this concrete is even higher than stipulated.
</span></p><p data-dcnode-id="2001"><span data-dcnode-id="2010" instrument_node="">The antenna part of the structure is made from steel cylinders. The metal antenna was installed using the ejection method. At first a smaller-diameter cylinder was lifted to the necessary spot; then over it was placed a larger-diameter cylinder and the smaller cylinder was pushed up through it with blocks and winches. The assembly was completed by attaching to each cylinder the television and ultra short-wave transmitter vibrators.
The upper metal framework, weighing over 120 tons, was assembled on the ground around the base of the tower and then raised to 170 metres. From start to finish all building work was supervised by foreman Aleksander Ehala and team master Väino Saar. They often had to solve complicated problems and the designers always agreed with their solutions</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2003" style="white-space:nowrap;"><span data-dcnode-id="2009" instrument_node="">[</span><i data-dcnode-id="2005"><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2007" title="This claim needs references to reliable sources. (September 2019)"><span data-dcnode-id="2008" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2004" instrument_node="">]</span></sup><span data-dcnode-id="2002" instrument_node="">.
</span></p><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">The TV tower is regularly checked for geodetic compliance: foundation settling, vertical deviation, condition of reinforced concrete and metal components, and other parameters. The allowed sway of the top of the TV tower due to wind is 1.5 metres; of the viewing platform, 90&nbsp;cm. Besides winds, the tower is affected by solar heating, resulting in the top “drawing” a peculiar curve.
</span></p><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">The steel part, from 190 m to 260 m, has a lift for two persons and hatches for access to the external platforms for the purpose of inspection and repairs of the antenna equipment. In the tower below the antenna section there is also a staircase with 1,050 steps from the basement to a height of 190 metres.
</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h2 data-dcnode-id="1986"><span class="mw-headline" data-dcnode-id="1994" id="Important_dates"><span data-dcnode-id="1995" instrument_node="">Important dates</span></span><span class="mw-editsection" data-dcnode-id="1987"><span class="mw-editsection-bracket" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">[</span></span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTallinn_TV_Tower%26action%3Dedit%26section%3D4" title="Edit section: Important dates"><span data-dcnode-id="1991" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1985" instrument_node="">
</span><ul data-dcnode-id="1949"><li data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">30 September 1975 – laying of the cornerstone</span></li><span data-dcnode-id="1982" instrument_node="">
</span><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">April 1976 – completion of the foundation installation work</span></li><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">May 1977 – construction of the reinforced concrete tower, 17,500 tons of concrete poured and 330&nbsp;km of armature inserted</span></li><span data-dcnode-id="1976" instrument_node="">
</span><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">February 1978 – the lift shaft is made in the 52 reinforced concrete blocks of the tower</span></li><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">April 1978 – assembly of the metal antenna part commences</span></li><span data-dcnode-id="1970" instrument_node="">
</span><li data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">13 June 1978 – the tower reaches the intended height of 314 metres</span></li><span data-dcnode-id="1967" instrument_node="">
</span><li data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">30 October 1978 – the frame of the upper structure is raised into place</span></li><span data-dcnode-id="1964" instrument_node="">
</span><li data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">December 1978 – installation of 16 supports in the upper structure; the tower now looks exactly as designed</span></li><span data-dcnode-id="1961" instrument_node="">
</span><li data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">20 December 1979 – first transmission</span></li><span data-dcnode-id="1958" instrument_node="">
</span><li data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">11 July 1980 – opening</span></li><span data-dcnode-id="1955" instrument_node="">
</span><li data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">November 2007 – the tower is closed to visitors as it lacks a sufficient number of evacuation routes and exits</span></li><span data-dcnode-id="1952" instrument_node="">
</span><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">4 April 2012 – the renovated tower welcomes new visitors</span></li></ul><span data-dcnode-id="1948" instrument_node="">
</span><h2 data-dcnode-id="1938"><span class="mw-headline" data-dcnode-id="1946" id="Incidents_at_the_TV_tower"><span data-dcnode-id="1947" instrument_node="">Incidents at the TV tower</span></span><span class="mw-editsection" data-dcnode-id="1939"><span class="mw-editsection-bracket" data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">[</span></span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTallinn_TV_Tower%26action%3Dedit%26section%3D5" title="Edit section: Incidents at the TV tower"><span data-dcnode-id="1943" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">In April 1980 team master Saar prevented a major construction accident. A welder's negligence had caused the cables in the tower shaft to catch fire. The draught was strong because the structure acted like a giant chimney. The fire thus progressed quickly up the tower from the point of origin on the 5th storey. Saar managed to outrace the conflagration and cut the cables on the 23rd storey, thus preventing the fire from reaching the metal part of the tower. Had the antenna structure been subjected to heat from the fire, it might have collapsed. The fire damage was repaired within one month.
</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1934" instrument_node="">Over the decades the antenna equipment on the TV tower underwent a major overhaul. Due to the introduction of the FM waveband the radio antennas were rebuilt. But an accident ensued during installation of a 12-metre pipe-shaped antenna for the 45th television channel transmitter at the very tip of the tower. Jüri Makarov was a prominent local businessman who created a new television station, Tipp TV, and that included installation on the TV tower of an Italian-made transmitter for the channel. The corresponding antenna, a 12-metre pipe, had been purchased in the United States, and Makarov arranged to install it with the aid of a helicopter commissioned from St. Petersburg. The helicopter successfully removed an old radio antenna from the top of the tower. In the early morning on 19 May 1994 the helicopter took off with the new antenna. The helicopter, with the antenna suspended under it on a cable, attempted to manoeuvre to insert the end of the antenna into its slot. The wind was disruptive, its force reaching 8</span><sup class="noprint Inline-Template" data-dcnode-id="1927" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="1933" instrument_node="">[</span><i data-dcnode-id="1929"><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="1931" title="8 of what units? (September 2019)"><span data-dcnode-id="1932" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="1928" instrument_node="">]</span></sup><span data-dcnode-id="1926" instrument_node="">. When the antenna touched the tower, the pilots mistakenly assumed that it had gone into the slot and released the cable. The falling antenna hit the restaurant roof and grazed the railing. The roof of the viewing platform and its windows shattered. The antenna itself broke as well. A new antenna was later sent and specialists successfully installed it under the supervision of leading engineer Vitali Lonkin. Saar oversaw the repairs to the restaurant roof.
</span></p><span data-dcnode-id="1924" instrument_node="">
