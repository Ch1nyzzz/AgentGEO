</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Iron Bridge of Shropshire is famous for being the first bridge created only from cast iron. Connecting the two sides of large Severn Gorge, this bridge served as the icon of the early English industrial revolution, one of the largest touristic destinations of the Shropshire region, and the inspiration for the creation of many other bridges that fully or partially use cast iron. </span></p><span data-dcnode-id="280" instrument_node="">

</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Ponte Vecchio is the most famous historic bridge in the city of Florence. Originally erected over Arno River by Romans, it became a symbol of Renaissance Italy when it was rebuilt in the 14th century. Filled with goldsmith and jewelry shops and adorned with the elevated passageway above the main level, this bridge is like no other in the entire world.</span></p><span data-dcnode-id="249" instrument_node="">

</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Charles Bridge is one of the most famous Gothic bridges in the entire world. Constructed in the early 17th century, this bridge survived numerous dangerous floods, managing to become one of the proudest structures of the city Prague and the entire Czech Republic history. </span></p><span data-dcnode-id="231" instrument_node="">

</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Pont du Gard is large, three-tiered, Ancient Roman aqueduct bridge, which continues to stand tall for two millennia, showcasing to the world not only architectural feats of our ancestors but also the entire history of France. Today, this cultural heritage site represents one of the most popular tourist destinations in entire France. </span></p><span data-dcnode-id="213" instrument_node="">

</span><p data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Rialto Bridge (Italian: Ponte di Rialto) is one of the oldest bridges that spans the Grand Canal of the Italian city of Venice at its shortest part and connecting city districts of San Marco and San Polo. Praised for its ageless looks and incredible tourist appeal, this bridge represents the best of what medieval renaissance Italy has managed to achieve.</span></p><span data-dcnode-id="182" instrument_node="">

</span><h2 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Mythological Bridges</span></h2><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Mythological bridges as part of several religions usually represent the passageway of souls from our world to the paradise. Some of the most famous fictional bridges are in fact mythological bridges. </span></p><span data-dcnode-id="172" instrument_node="">
</span><div class="row nopadding" data-dcnode-id="155"><div class="col-lg-2 col-md-2 col-sm-2 col-3 nopadding" data-dcnode-id="167"><span data-dcnode-id="171" instrument_node="">
</span><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/mythological-bridges/rainbow-bridge/"><img alt="Rainbow Bridge Bifrost" class="img-responsive width100Percent marginbottom10" data-dcnode-id="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/images/historyofbridges/rainbow-bridge-bifrost-thumb.jpg&amp;raw"></a><span data-dcnode-id="168" instrument_node="">
</span></div><span data-dcnode-id="166" instrument_node="">
</span><div class="col-lg-10 col-md-10 col-sm-10 col-9" data-dcnode-id="157"><span data-dcnode-id="165" instrument_node="">
</span><h2 data-dcnode-id="162"><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/mythological-bridges/rainbow-bridge/"><span data-dcnode-id="164" instrument_node="">Rainbow Bridge</span></a></h2><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">Rainbow bridge was originally popularized in Middle Ages by its mentions in Nordic myths, legends, and works of art, but today, many centuries later, the term Rainbow Bridge is today fairly common and associated with many real structures, works of literature, paintings and many other forms of art. </span></p><span data-dcnode-id="158" instrument_node="">

</span><div class="col-lg-10 col-md-10 col-sm-10 col-9" data-dcnode-id="126"><span data-dcnode-id="134" instrument_node="">

</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Bifröst, the legendary rainbow bridge of the Nordic gods has managed to become the most popular mythological bridge of them all. Shrouded in mystery and described in only a few surviving literary documents, this bridge continues to inspire new generations even today. </span></p><span data-dcnode-id="127" instrument_node="">

</span></div><span data-dcnode-id="117" instrument_node="">
</span><div class="col-lg-10 col-md-10 col-sm-10 col-9" data-dcnode-id="108"><span data-dcnode-id="116" instrument_node="">
</span><h2 data-dcnode-id="113"><a data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/mythological-bridges/rainbow-bridge-pets/"><span data-dcnode-id="115" instrument_node="">Rainbow Bridge Pets</span></a></h2><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Rainbow Bridge is a popular story and poem that is aimed to provide relief to the owners who have lost pets. Created during the late 1980s and early 1990s, the concept of rainbow bridge paradise for pets gained great popularity all over the world. Most commonly accepted aspect of this modern myth is a term “crossed the Rainbow Bridge”.</span></p><span data-dcnode-id="109" instrument_node="">
</span></div><span data-dcnode-id="107" instrument_node="">

</span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/mythological-bridges/rainbow-bridge-texas/"><img alt="Rainbow Bridge Texas Sunset" class="img-responsive width100Percent marginbottom10" data-dcnode-id="103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/images/historyofbridges/rainbow-bridge-texas-sunset-thumb.jpg&amp;raw"></a><span data-dcnode-id="101" instrument_node="">

</span><h2 data-dcnode-id="95"><a data-dcnode-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyofbridges.com/mythological-bridges/rainbow-bridge-texas/"><span data-dcnode-id="97" instrument_node="">Rainbow Bridge in Texas</span></a></h2><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">Rainbow Bridge in Texas spans the shores of River Neches. This impressive bridge was built to accommodate passage of largest ships and sea platforms built in the United States, leading to the elevation of its main span to impressive 177 feet (54 meters). Partly shaped like a rainbow, this bridge adopted this name in 1957.</span></p><span data-dcnode-id="91" instrument_node="">
