</span><div class="post-title" data-dcnode-id="2379"><h1 class="entry-title" data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">List of Famous Historical Monuments of India and their Builders</span></h1></div><span data-dcnode-id="2378" instrument_node="">
</span><span data-dcnode-id="2376" instrument_node="">
</span><span data-dcnode-id="2374" instrument_node="">
</span><div class="post-meta-blog" data-dcnode-id="2359"><span data-dcnode-id="2373" instrument_node="">
</span><span class="meta_author" data-dcnode-id="2369"><span data-dcnode-id="2372" instrument_node="">Posted by </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//quickgs.com/author/superuser/" rel="author" title="Posts by superuser"><span data-dcnode-id="2371" instrument_node="">superuser</span></a></span><span data-dcnode-id="2368" instrument_node="">
</span><span class="meta_date" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">On January 13, 2016</span></span><span data-dcnode-id="2365" instrument_node="">
</span><span class="meta_comments" data-dcnode-id="2361"><span data-dcnode-id="2364" instrument_node=""> </span><a data-dcnode-id="2362" href="#comments"><span data-dcnode-id="2363" instrument_node="">14 Comments</span></a></span><span data-dcnode-id="2360" instrument_node="">
</span></div><span data-dcnode-id="2358" instrument_node="">
</span><span data-dcnode-id="2356" instrument_node="">
</span><span data-dcnode-id="2354" instrument_node="">
</span><div class="post_content entry-content" data-dcnode-id="1039"><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2350" style="text-align: justify;"><span data-dcnode-id="2351" style="font-size: 14pt;"><span data-dcnode-id="2352" instrument_node="">This article is all about famous historical monuments of India, information about most important historical places of India, list of monuments and their builders. Historical Monuments can be classified according to architecture styles, religious entities, period of construction etc. By period we mean the monuments constructed can be differentiated as per their time e.g. Indus valley period, Magadha Empire, Gupta Empire etc in Ancient India, Mughal period during Medieval India and monuments of Modern India. Styles of Architecture also plays a vital role in classification of Historical Places of India. For example the monuments built during Mughal era are classical examples of Turkish-Persian architecture, while the monuments of South India gives the glimpses of Dravidian Architecture. Some of the important &nbsp;and famous historical monuments of India are as follows:</span></span></p><span data-dcnode-id="2349" instrument_node="">
</span><h2 data-dcnode-id="2345" style="text-align: justify;"><span data-dcnode-id="2346" style="font-size: 14pt;"><strong data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Famous Historical Monuments of India</span></strong></span></h2><span data-dcnode-id="2344" instrument_node="">
</span><h2 data-dcnode-id="2340" style="text-align: justify;"><span data-dcnode-id="2341" style="font-size: 14pt;"><strong data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Agra Fort</span></strong></span></h2><span data-dcnode-id="2339" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2334" id="attachment_5525" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-5525" class="size-full wp-image-5525" data-dcnode-id="2338" height="370" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Agra-Fort.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2335" id="caption-attachment-5525"><span data-dcnode-id="2336" style="font-size: 14pt;"><span data-dcnode-id="2337" instrument_node="">Agra Fort</span></span></p></div><span data-dcnode-id="2333" instrument_node="">
</span><ul data-dcnode-id="2321" style="text-align: justify;"><span data-dcnode-id="2332" instrument_node="">
</span><li data-dcnode-id="2328"><span data-dcnode-id="2329" style="font-size: 14pt;"><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Year of &nbsp;construction – 11th century originally, by Akbar in 1573 in present form</span></em></span></li><span data-dcnode-id="2327" instrument_node="">
</span><li data-dcnode-id="2323"><span data-dcnode-id="2324" style="font-size: 14pt;"><em data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Built by – Mughals (in present form)</span></em></span></li><span data-dcnode-id="2322" instrument_node="">
</span></ul><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2314" style="text-align: justify;"><span data-dcnode-id="2315" style="font-size: 14pt;"><span data-dcnode-id="2319" instrument_node="">From starting, Agra Fort was a strategic place and epicenter of power and it was used to command the entire India. The exact time of construction of the original fort is unknown. The fort in its present form was constructed by Mughals. All mughal rulers contributed to some extent in the construction of the present structural form. Originally the fort was called </span><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Badalgarh</span></strong><span data-dcnode-id="2316" instrument_node=""> which was held by Raja Badal Singh, a Rajput king in year 1475. This fort however came under control of Lodi dynasty of Delhi. Sikandar Lodi, the first delhi sultan shifted his capital from Delhi to Agra and occupied this Agra Fort.</span></span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2310" style="text-align: justify;"><span data-dcnode-id="2311" style="font-size: 14pt;"><span data-dcnode-id="2312" instrument_node="">After the first battle of Panipat in 1526 between Ibrahim Lodi (son of Sikandar Lodi) and Babur, the Agra Fort came under the control of Mughals. In year 1540, this fort came in possession of Sher Shah Suri who defeated Humayun and ousted him out although Humayun managed to recapture it again in 1555. The fort was also occupied for few years by Hindu king Hem Chandra Vikramaditya (Hemu) who defeated Humayun. But after the second battle of Panipat in year 1556 between Hemu and Akbar, Hemu was defeated and the fort came under the control of Mughals again. It was Akbar who built the fort in the present form by red sandstones in 1573 and Shah Jahan also contributed in its present design. Later this fort was captured by Marathas in 18th century and then it came under the hands of British rule after Anglo Maratha war of 1803.</span></span></p><span data-dcnode-id="2309" instrument_node="">
</span><h2 data-dcnode-id="2305" style="text-align: justify;"><span data-dcnode-id="2306" style="font-size: 14pt;"><strong data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Buland Darwaza</span></strong></span></h2><span data-dcnode-id="2304" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2299" id="attachment_6442" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6442" class="size-full wp-image-6442" data-dcnode-id="2303" height="374" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Buland-Darwaza-Fatehpur-Sikri.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2300" id="caption-attachment-6442"><span data-dcnode-id="2301" style="font-size: 14pt;"><span data-dcnode-id="2302" instrument_node="">Buland Darwaza of Fatehpur Sikri</span></span></p></div><span data-dcnode-id="2298" instrument_node="">
</span><ul data-dcnode-id="2286" style="text-align: justify;"><span data-dcnode-id="2297" instrument_node="">
</span><li data-dcnode-id="2293"><span data-dcnode-id="2294" style="font-size: 14pt;"><em data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Year of &nbsp;construction – 1576 AD</span></em></span></li><span data-dcnode-id="2292" instrument_node="">
</span><li data-dcnode-id="2288"><span data-dcnode-id="2289" style="font-size: 14pt;"><em data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Built by – Akbar</span></em></span></li><span data-dcnode-id="2287" instrument_node="">
</span></ul><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2282" style="text-align: justify;"><span data-dcnode-id="2283" style="font-size: 14pt;"><span data-dcnode-id="2284" instrument_node="">Buland Darwaza was built by Akbar in 1576 to mark his victory over Gujarat. Buland darwaza is the highest entrance gate of its kind in all over world. This represents the classical example of Mughal architecture. This is built at the main entrance of the palace of Fatehpur Sikri. This is built by using red sandstones and beautified with marble at various key locations. The whole structure of the gate is 54 m above ground level. There are 42 steps to be climbed to reach the main platform over which the gate is built. The height of the gate itself from the base platform is 40 m.</span></span></p><span data-dcnode-id="2281" instrument_node="">
</span><h2 data-dcnode-id="2277" style="text-align: justify;"><span data-dcnode-id="2278" style="font-size: 14pt;"><strong data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Char Minar</span></strong></span></h2><span data-dcnode-id="2276" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2271" id="attachment_6443" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6443" class="size-full wp-image-6443" data-dcnode-id="2275" height="370" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/char-minar.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2272" id="caption-attachment-6443"><span data-dcnode-id="2273" style="font-size: 14pt;"><span data-dcnode-id="2274" instrument_node="">Char Minar of Hyderabad</span></span></p></div><span data-dcnode-id="2270" instrument_node="">
</span><ul data-dcnode-id="2258" style="text-align: justify;"><span data-dcnode-id="2269" instrument_node="">
</span><li data-dcnode-id="2265"><span data-dcnode-id="2266" style="font-size: 14pt;"><em data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Year of &nbsp;construction – 1591</span></em></span></li><span data-dcnode-id="2264" instrument_node="">
</span><li data-dcnode-id="2260"><span data-dcnode-id="2261" style="font-size: 14pt;"><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Built by – Md. Quli Qutub Shah</span></em></span></li><span data-dcnode-id="2259" instrument_node="">
</span></ul><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2251" style="text-align: justify;"><span data-dcnode-id="2252" style="font-size: 14pt;"><span data-dcnode-id="2256" instrument_node="">Charminar is a symbolic icon of city of Hyderabad. It was constructed in year 1591 by Quli Qutub Shah. It is basically a mosque which is situated on the banks of </span><strong data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Musi</span></strong><span data-dcnode-id="2253" instrument_node=""> river. As per the legend, Char minar was constructed as a commemoration for the eradication of deadly plague disease which was causing grave danger to the city. Quli Qutub Shah prayed and vowed to construct the monument once the plague gets eradicated. Quli Qutub Shah also founded the city of Hyderabad around this monument. Persian influence can be found from the architecture of this building. The structure is basically square 20 m long and having a minaret located at each corner. Height of each minaret is 56 m. Granite, limestone and mortar are used as main building materials.</span></span></p><span data-dcnode-id="2250" instrument_node="">
</span><h2 data-dcnode-id="2246" style="text-align: justify;"><span data-dcnode-id="2247" style="font-size: 14pt;"><strong data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Taj Mahal</span></strong></span></h2><span data-dcnode-id="2245" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2240" id="attachment_6448" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6448" class="size-full wp-image-6448" data-dcnode-id="2244" height="350" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Taj-Mahal.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2241" id="caption-attachment-6448"><span data-dcnode-id="2242" style="font-size: 14pt;"><span data-dcnode-id="2243" instrument_node="">Taj Mahal of Agra</span></span></p></div><span data-dcnode-id="2239" instrument_node="">
</span><ul data-dcnode-id="2229"><span data-dcnode-id="2238" instrument_node="">
</span><li data-dcnode-id="2235" style="text-align: justify;"><span data-dcnode-id="2236" style="font-size: 14pt;"><span data-dcnode-id="2237" instrument_node="">Year of construction : 1653</span></span></li><span data-dcnode-id="2234" instrument_node="">
</span><li data-dcnode-id="2231" style="text-align: justify;"><span data-dcnode-id="2232" style="font-size: 14pt;"><span data-dcnode-id="2233" instrument_node="">Built by : Shah Jahan</span></span></li><span data-dcnode-id="2230" instrument_node="">
</span></ul><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2222" style="text-align: justify;"><span data-dcnode-id="2223" style="font-size: 14pt;"><span data-dcnode-id="2227" instrument_node="">Taj Mahal was built the famous Mughal Emperor Shah Jahan who is also called as </span><em data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Mughal Architect</span></em><span data-dcnode-id="2224" instrument_node="">. He has built a number of other monuments also like : Red Fort of Delhi, Jama Masjid of Delhi, Moti Masjid of Lahore, Shalimar gardens of Kashmir etc. This monument was built by him as a tribute and loving memory of her wife Mumtaj. The construction work of Taj Mahal started in year 1632 and completed in 1653. It was built under the supervision of Architect Ustad Ahmad Lahauri and 20,000 craftsmen. The cost of construction is estimated to about 32 Million rupees at that time.</span></span></p><span data-dcnode-id="2221" instrument_node="">
</span><h2 data-dcnode-id="2217" style="text-align: justify;"><span data-dcnode-id="2218" style="font-size: 14pt;"><strong data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Fatehpur Sikri</span></strong></span></h2><span data-dcnode-id="2216" instrument_node="">
</span><ul data-dcnode-id="2204" style="text-align: justify;"><span data-dcnode-id="2215" instrument_node="">
</span><li data-dcnode-id="2211"><span data-dcnode-id="2212" style="font-size: 14pt;"><em data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Year of &nbsp;construction – 1569</span></em></span></li><span data-dcnode-id="2210" instrument_node="">
</span><li data-dcnode-id="2206"><span data-dcnode-id="2207" style="font-size: 14pt;"><em data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Built by – Akbar</span></em></span></li><span data-dcnode-id="2205" instrument_node="">
</span></ul><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2200" style="text-align: justify;"><span data-dcnode-id="2201" style="font-size: 14pt;"><span data-dcnode-id="2202" instrument_node="">Fatehpur sikri is a planned fully fortified wall city which was founded by Akbar in 1569. This city is located 37 Km from Agra and the main attraction includes tomb of the sufi saint – Salim Chisti. This city was constructed by Akbar to commemorate, consolidate and safeguard his victories over Rajput kings of Chittor and Ranthambhor. Fathepur Sikri served as Mughal capital from the period of 1571 to 1585.&nbsp;Its original name was coined as Fatehabad which was later changed to Fatehpur Sikri. The name Fateh was coined to mark the victory of Akbar over this Rajput kingdoms. The buildings of Fathenpur Sikri represents the example of classical Persian architecture. The buildings are made of red sand stones. The main attractions of this city are –&nbsp;Buland Darwaza, Birbal’s house, Jama Masjid,&nbsp;Salim Chisti ki Dargah,&nbsp;Diwan – e – Aam,&nbsp;Diwan – e – Khas,&nbsp;Ibadat Khana, Anup Talao, Panch Mahal, Mariam-uz-Zamani Palace, Pachisi Court and Naubat Khana.</span></span></p><span data-dcnode-id="2199" instrument_node="">
</span><h2 data-dcnode-id="2195" style="text-align: justify;"><span data-dcnode-id="2196" style="font-size: 14pt;"><strong data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Golden Temple (Harmandir Sahib)</span></strong></span></h2><span data-dcnode-id="2194" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2189" id="attachment_6444" style="width: 649px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6444" class="size-full wp-image-6444" data-dcnode-id="2193" height="370" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Golden-Temple-Harmandir-Sahib.jpg&amp;raw" width="639"><p class="wp-caption-text" data-dcnode-id="2190" id="caption-attachment-6444"><span data-dcnode-id="2191" style="font-size: 14pt;"><span data-dcnode-id="2192" instrument_node="">Golden Temple Harmandir Sahib</span></span></p></div><span data-dcnode-id="2188" instrument_node="">
</span><ul data-dcnode-id="2176" style="text-align: justify;"><span data-dcnode-id="2187" instrument_node="">
</span><li data-dcnode-id="2183"><span data-dcnode-id="2184" style="font-size: 14pt;"><em data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Year of &nbsp;construction – 1585 to 1604</span></em></span></li><span data-dcnode-id="2182" instrument_node="">
</span><li data-dcnode-id="2178"><span data-dcnode-id="2179" style="font-size: 14pt;"><em data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Built by – Guru Arjan</span></em></span></li><span data-dcnode-id="2177" instrument_node="">
</span></ul><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2169" style="text-align: justify;"><span data-dcnode-id="2170" style="font-size: 14pt;"><span data-dcnode-id="2174" instrument_node="">Harmandir Sahib which is popularly known as Golden Temple is located in Amritsar, Punjab state, India. This temple is among the holiest Sikh shrines across the whole world. The construction of the temple was started in 1585 and completed in 1604 by fifth Sikh Guru – </span><strong data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Guru Arjan</span></strong><span data-dcnode-id="2171" instrument_node="">. The present structure in the form of Gurudwara was built by Jassa Singh Ahluwalia in 1764. It was Maharaja Ranjit Singh who got the outer walls and roof covered by gold to which the acronym Golden Temple started. The devotees took bath in the holy water &nbsp;of reservoir surrounding the temple which is fed by river ravi. As contrary to the other Sikh shrines, there are total four entrances to the temple. There are three pious trees in the vicinity of temple each representing important milestones of Sikh culture.</span></span></p><span data-dcnode-id="2168" instrument_node="">
</span><h2 data-dcnode-id="2164" style="text-align: justify;"><span data-dcnode-id="2165" style="font-size: 14pt;"><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Gol Gumbaz</span></strong></span></h2><span data-dcnode-id="2163" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2158" id="attachment_6445" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6445" class="wp-image-6445 size-full" data-dcnode-id="2162" height="370" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Gol-Gumbaz.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2159" id="caption-attachment-6445"><span data-dcnode-id="2160" style="font-size: 14pt;"><span data-dcnode-id="2161" instrument_node="">Gol Gumbaz of Bijapur</span></span></p></div><span data-dcnode-id="2157" instrument_node="">
</span><ul data-dcnode-id="2145" style="text-align: justify;"><span data-dcnode-id="2156" instrument_node="">
</span><li data-dcnode-id="2152"><span data-dcnode-id="2153" style="font-size: 14pt;"><em data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Year of &nbsp;construction – 1626 to 1656</span></em></span></li><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2147"><span data-dcnode-id="2148" style="font-size: 14pt;"><em data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Built by – Md Adil Shah&nbsp;</span></em></span></li><span data-dcnode-id="2146" instrument_node="">
</span></ul><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2135" style="text-align: justify;"><span data-dcnode-id="2136" style="font-size: 14pt;"><span data-dcnode-id="2143" instrument_node="">Gol Gumbaz is basically a tomb of Mohammad Adil Shah and his two wives. This </span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">gumbaz</span></em><span data-dcnode-id="2140" instrument_node=""> is located in Bijapur of Karnataka. The structure is a huge dome which is second largest of its kind of medieval world (first one is Hagia Sofia of byzantine empire, presently in Turkey). This was constructed Adil Shah when he was alive by the architect Yaqut of Dabul. The structure consists of four minarets on each corners of a central dome standing on a cubical base. The sides of the base are 47.5 meter in length and the dia of the dome is 44 meter. The minarets are seven storied and octagonal from inside carrying staircase up to the upper dome structure. The most interesting part of this dome is </span><em data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">whispering gallery</span></em><span data-dcnode-id="2137" instrument_node=""> where even a slightest sound can be heard at other side due its acoustic design.</span></span></p><span data-dcnode-id="2134" instrument_node="">
</span><h2 data-dcnode-id="2130" style="text-align: justify;"><span data-dcnode-id="2131" style="font-size: 14pt;"><strong data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Hawa Mahal</span></strong></span></h2><span data-dcnode-id="2129" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2124" id="attachment_3639" style="width: 560px"><img alt="famous historical monuments of india" aria-describedby="caption-attachment-3639" class="wp-image-3639 size-full" data-dcnode-id="2128" height="380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2015/05/Hawa-mahal2.jpg&amp;raw" width="550"><p class="wp-caption-text" data-dcnode-id="2125" id="caption-attachment-3639"><span data-dcnode-id="2126" style="font-size: 14pt;"><span data-dcnode-id="2127" instrument_node="">Hawa Mahal of Jaipur</span></span></p></div><span data-dcnode-id="2123" instrument_node="">
</span><ul data-dcnode-id="2111" style="text-align: justify;"><span data-dcnode-id="2122" instrument_node="">
</span><li data-dcnode-id="2118"><span data-dcnode-id="2119" style="font-size: 14pt;"><em data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Year of &nbsp;construction – 1799</span></em></span></li><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2113"><span data-dcnode-id="2114" style="font-size: 14pt;"><em data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Built by – Sawai Raja Pratap Singh</span></em></span></li><span data-dcnode-id="2112" instrument_node="">
</span></ul><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2104" style="text-align: justify;"><span data-dcnode-id="2105" style="font-size: 14pt;"><span data-dcnode-id="2109" instrument_node="">Hawa Mahal was built by Sawai King Pratap Singh and the construction was completed in year 1799. The palace was designed by Ustad Lal Chand and red and pink sandstones are used in the construction. Hawa Mahal has achieved a distinguished image and iconic representation of the pink city of Jaipur. &nbsp;This palace is the shape of crown of Krishna and is named so because of its numerous windows in form of honeycomb structure. The palace is a 5 storeyed structure which has total 953 windows which enables the royal ladies to watch the outside streets of palace without being seen from out. The unique feature of the palace is the air ducts design which allows air to pass like </span><em data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">venturi</span></em><span data-dcnode-id="2106" instrument_node=""> leaving a cool breeze giving air conditioning effect.</span></span></p><span data-dcnode-id="2103" instrument_node="">
</span><h2 data-dcnode-id="2099" style="text-align: justify;"><span data-dcnode-id="2100" style="font-size: 14pt;"><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Jantar Mantar</span></strong></span></h2><span data-dcnode-id="2098" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2093" id="attachment_4998" style="width: 560px"><img alt="famous historical monuments of india" aria-describedby="caption-attachment-4998" class="wp-image-4998 size-full" data-dcnode-id="2097" height="380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2015/05/Jantar-Mantar-of-Jaipur.jpeg&amp;raw" width="550"><p class="wp-caption-text" data-dcnode-id="2094" id="caption-attachment-4998"><span data-dcnode-id="2095" style="font-size: 14pt;"><span data-dcnode-id="2096" instrument_node="">Jantar Mantar of Jaipur</span></span></p></div><span data-dcnode-id="2092" instrument_node="">
</span><ul data-dcnode-id="2080" style="text-align: justify;"><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2087"><span data-dcnode-id="2088" style="font-size: 14pt;"><em data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Year of &nbsp;construction – 1724 to 1735</span></em></span></li><span data-dcnode-id="2086" instrument_node="">
</span><li data-dcnode-id="2082"><span data-dcnode-id="2083" style="font-size: 14pt;"><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Built by – Maharaja Jai Singh II</span></em></span></li><span data-dcnode-id="2081" instrument_node="">
</span></ul><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2067" style="text-align: justify;"><span data-dcnode-id="2068" style="font-size: 14pt;"><span data-dcnode-id="2078" instrument_node="">There are total 5 </span><em data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Jantar Mantars</span></em><span data-dcnode-id="2075" instrument_node=""> which were built by Maharaja Jai Singh of of Jaipur. The locations of these Jantar Mantar are New Delhi, Mathura, Jaipur, Ujjain and Varanasi. The J</span><em data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">antar Mantar</span></em><span data-dcnode-id="2072" instrument_node=""> of Jaipur is the largest one which houses world’s largest stone Sun dial and is also defined as a World Heritage site. These </span><em data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Jantar Mantar</span></em><span data-dcnode-id="2069" instrument_node=""> are basically astronomical observatory containing of a number of scientific instruments related to astronomy. These instruments measure the time of day as per the position of sun in sky. These devices were used to study the position of planets with respect to sun, calculations related to astronomical tables etc.</span></span></p><span data-dcnode-id="2066" instrument_node="">
</span><h2 data-dcnode-id="2062" style="text-align: justify;"><span data-dcnode-id="2063" style="font-size: 14pt;"><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Red Fort (Lal Quila)</span></strong></span></h2><span data-dcnode-id="2061" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2056" id="attachment_5524" style="width: 650px"><img alt="Historical Monuments of India" aria-describedby="caption-attachment-5524" class="size-full wp-image-5524" data-dcnode-id="2060" height="370" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Red-Fort.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2057" id="caption-attachment-5524"><span data-dcnode-id="2058" style="font-size: 14pt;"><span data-dcnode-id="2059" instrument_node="">Lahori Gate of Red Fort</span></span></p></div><span data-dcnode-id="2055" instrument_node="">
</span><ul data-dcnode-id="2043" style="text-align: justify;"><span data-dcnode-id="2054" instrument_node="">
</span><li data-dcnode-id="2050"><span data-dcnode-id="2051" style="font-size: 14pt;"><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Year of &nbsp;construction – 1638 to 1648</span></em></span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2045"><span data-dcnode-id="2046" style="font-size: 14pt;"><em data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Built by – Shah Jahan</span></em></span></li><span data-dcnode-id="2044" instrument_node="">
</span></ul><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2036" style="text-align: justify;"><span data-dcnode-id="2037" style="font-size: 14pt;"><span data-dcnode-id="2041" instrument_node="">Red Fort is yet another masterpiece delivered by </span><em data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Mughal Architect</span></em><span data-dcnode-id="2038" instrument_node=""> Shah Jahan after Taj Mahal. This was designed by Ustad Ahmad Lahauri who also designed Taj Mahal. Likewise Taj Mahal, Red Fort is also situated on the banks of river Yamuna. Red Fort which is also called as Lal Quila served as official residence of Mughal Kings. In addition to residence, it also served as political and administrative center of Mughal Empire. As the name suggest, the fort is made up of red sandstones and reflects a blend of Persian and Timurid architecture styles. It was also declared a world heritage site by UNESCO in 2007. The importance of this monument can be understood by the fact that Prime Minister of India hoists the tricolor and delivers speech on every independence day annually.</span></span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2032" style="text-align: justify;"><span data-dcnode-id="2033" style="font-size: 14pt;"><span data-dcnode-id="2034" instrument_node="">After Shah Jahan, Aurangzeb made some modifications by constructing moti masjid (Pearl Mosque) and fortified gateway at the two main gates of entrance. After Aurangzeb, the fort was occupied by Jahandar Shah, Farrukhsiyar and then Muhammad Shah. In 1739, Nadir Shah defeated the later Mughals and plundered Delhi and looted the peacock throne of Red Fort. For brief time till 3rd Panipat battle, the control of Red Fort came under hands of Marathas. After Marathas lost in 3rd Panipat battle by Ahamad Shah Durrani, Shah Alam came to power and occupied Red Fort with support of Marathas and Sikhs. In 1803 after Anglo Maratha war of Delhi, the fort came under the control of British.</span></span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2028" style="text-align: justify;"><span data-dcnode-id="2029" style="font-size: 14pt;"><span data-dcnode-id="2030" instrument_node="">Some of the other important structures in the premises of Red Fort are – Delhi Gate, Lahori Gate, Khizrabad Gate, Water Gate, Chhatta Chowk, Mumtaz Mahal, Rang Mahal, Hammam, Baoli, Moti Masjid, Hira Mahal, Diwan-e-Aam and Diwan-e-Khas.</span></span></p><span data-dcnode-id="2027" instrument_node="">
</span><h2 data-dcnode-id="2023" style="text-align: justify;"><span data-dcnode-id="2024" style="font-size: 14pt;"><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Qutub Minar</span></strong></span></h2><span data-dcnode-id="2022" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2017" id="attachment_6446" style="width: 650px"><img alt="Famous Historical Monuments of India" aria-describedby="caption-attachment-6446" class="size-full wp-image-6446" data-dcnode-id="2021" height="370" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quickgs.com/wp-content/uploads/2016/01/Qutub-Minar.jpg&amp;raw" width="640"><p class="wp-caption-text" data-dcnode-id="2018" id="caption-attachment-6446"><span data-dcnode-id="2019" style="font-size: 14pt;"><span data-dcnode-id="2020" instrument_node="">Qutub Minar of Delhi</span></span></p></div><span data-dcnode-id="2016" instrument_node="">
</span><ul data-dcnode-id="2004" style="text-align: justify;"><span data-dcnode-id="2015" instrument_node="">
</span><li data-dcnode-id="2011"><span data-dcnode-id="2012" style="font-size: 14pt;"><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Year of &nbsp;construction – 1193 AD</span></em></span></li><span data-dcnode-id="2010" instrument_node="">
</span><li data-dcnode-id="2006"><span data-dcnode-id="2007" style="font-size: 14pt;"><em data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">Built by – Qutub-ud-din Aibak</span></em></span></li><span data-dcnode-id="2005" instrument_node="">
</span></ul><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2000" style="text-align: justify;"><span data-dcnode-id="2001" style="font-size: 14pt;"><span data-dcnode-id="2002" instrument_node="">Qutub Minar is second tallest minar (tallest is Fateh Burj of Mohali, Punjab) in India while it is tallest brick minaret of India and World. This minar is located in Mahrauli, Delhi, India. This minar was constructed by Qutub-ud-Din Aibak, who is also the founder of Delhi Sultanate. Qutub Minar is also one of the UNESCO world heritage sites in India. The structure is made of red sandstones and marbles. The total height of minar is 73 meters (240 feet) which is actually tapering from base diameter of 47 feet and top being 9 feet. Total number of stairs from base to top is 379. Later three more storeys were added by Iltutmish in year 1220 CE. After the top floor was destroyed by thunderbolt in year 1369, two more storeys were built by Firoz Shah Tughlaq.</span></span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1996" style="text-align: justify;"><span data-dcnode-id="1997" style="font-size: 14pt;"><span data-dcnode-id="1998" instrument_node="">Some other important historical monuments in the vicinity of Qutub Complex are – Alai Darwaza, Alai Minar, Ala-ud-Din’s Madarsa, Tomb of Imam Zamin, Diamond Pole of Delhi, Quwwat-ul-Islam Mosque and Iron Pillar of Gupta Empire.</span></span></p><span data-dcnode-id="1995" instrument_node="">
