</span><div class="photo" data-dcnode-id="765"><img data-dcnode-id="770" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/disney-concert-hall.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">Disney Concert Hall, Los Angeles</span><br data-dcnode-id="767"><span data-dcnode-id="766" instrument_node="">Architect Frank Gehry</span></div><span data-dcnode-id="764" instrument_node="">
</span><span class="first" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Famous modern architects of the twentieth century</span></span><span data-dcnode-id="761" instrument_node=""> found styles that were new, individual,  unique and novel.  As modern tastes changed, architects rejected classical styles and the lavish excesses of the Victorians and Edwardians. Modern architecture took the twentieth century in exciting new directions.  The major architectural styles of the century are Modernism, Post-Modernism, High-Tech, Deconstructivism and Neo-Modernism.  Many architects worked in more than one style during their career.

</span><br data-dcnode-id="760"><br data-dcnode-id="759"><span class="first" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">The dominant architectural style of the twentieth century was Modernism</span></span><span data-dcnode-id="756" instrument_node="">. The goal of Modernism was to free the human spirit, using technology that would make beauty and utility available to all.  Shapes were abstract, geometric and unique.  Floor plans were opened up for multipurpose use.  Ornamentation and classical forms were discarded.  Architecture was first and foremost about the individual.

</span><br data-dcnode-id="755"><br data-dcnode-id="754"><span data-dcnode-id="753" instrument_node="">
</span><div class="photo" data-dcnode-id="747"><img data-dcnode-id="752" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/johnson-att-sony-building.jpg&amp;raw" title="famous architects" width="243"><br data-dcnode-id="751"><span data-dcnode-id="750" instrument_node="">AT&amp;T Building, New York (now Sony)</span><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">Architect Philip Johnson</span></div><span data-dcnode-id="746" instrument_node="">
</span><span class="first" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Since 1980, architects</span></span><span data-dcnode-id="743" instrument_node=""> have moved away from rectilinear forms to eclectic designs. Today's architecture embraces the wealth of unusual new materials and the power of computer-assisted design, CAD, to break from tradition. The  new manifesto seems to be:  Let's create original art.  Let's have fun. Let's defy gravity with zany columns and walls. Let's design buildings that  express irony and ambiguity. Let's explore glamorous new materials.  

</span><br data-dcnode-id="742"><br data-dcnode-id="741"><span class="first" data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">The practice of architecture</span></span><span data-dcnode-id="738" instrument_node=""> is the most complicated of all the arts.  It requires not only  creativity, design skills and planning, but also knowledge of structures, materials,  mechanics and engineering. Unlike other artists, the architect requires financing, client cooperation and years of effort to bring a project to completion. Architects have also embraced the need for "green buildings"  with sustainable materials and energy conservation. Here are a few of the </span><b data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">famous modern architects of the twentieth century and their work</span></b><span data-dcnode-id="735" instrument_node="">.

</span><br data-dcnode-id="687"><a data-dcnode-id="683" name="1"><h2 data-dcnode-id="684" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="686" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="685" instrument_node=""> Famous Modern Architect Antoni Gaudi</span></h2></a><br clear="all" data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
</span><div class="photo" data-dcnode-id="675"><img data-dcnode-id="680" height="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/sagrada-familia.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">Church of La Sagrada Familia</span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">Architect Antoni Gaudi</span></div><span data-dcnode-id="674" instrument_node="">
</span><span class="first" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Famous architect Antoni Gaudi</span></span><span data-dcnode-id="671" instrument_node="">, (1852-1926), pronounced Gow DEE, was the most original architect of the Art Nouveau style. Art Nouveau, the new art, replaced straight lines with the free-form curves, wavy walls, and the textures and shapes of nature's plants and trees.  His most important work, Casa Mila, is one of the outstanding buildings of Art Nouveau architecture. Gaudi began work on the Church of La Sagrada Familia, which resembles a surreal sandcastle or a clay sculpture, but he died before its completion.  Seeing his imaginative work is the highlight of a trip to Barcelona, Spain.

</span><br data-dcnode-id="670"><br data-dcnode-id="669"><a data-dcnode-id="665" name="2"><h2 data-dcnode-id="666" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="668" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="667" instrument_node=""> Famous Modern Architect Eero Saarinen</span></h2></a><br clear="all" data-dcnode-id="664"><span data-dcnode-id="663" instrument_node="">
</span><div class="photo" data-dcnode-id="657"><img data-dcnode-id="662" height="127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/twa-terminal.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">Architect Eero Saarinen</span><br data-dcnode-id="659"><span data-dcnode-id="658" instrument_node="">TWA Terminal, JFK Airport, New York</span></div><span data-dcnode-id="656" instrument_node="">
</span><span class="first" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Architect Eero Saarinen</span></span><span data-dcnode-id="653" instrument_node=""> (1910-1961), classified as a Neo-Expressionist, brought a sculptor's sensibility to his buildings.  Neo-Expressionism architecture is modernist and abstract, but with romantic imagery and the intuitive shapes.  Saarinen is best known for the TWA Terminal, JFK Airport, New York, where he captured the excitement of flight with giant wings of concrete. Other examples of the Neo-Expressionism style of architecture are the Sydney, Australia, Opera House, by Jorn Utzon,  the work of Le Corbusier and Frank Lloyd Wright's Guggenheim Museum.

</span><br data-dcnode-id="652"><br data-dcnode-id="651"><a data-dcnode-id="647" name="3"><h2 data-dcnode-id="648" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="650" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="649" instrument_node=""> Famous Modern Architect Frank Lloyd Wright</span></h2></a><br clear="all" data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
</span><div class="photo" data-dcnode-id="632"><img data-dcnode-id="644" height="304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/wright-fallingwater.jpg&amp;raw" title="famous modern architects" width="246"><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">Fallingwater, Mill Run, Pennsylvania </span><br data-dcnode-id="641"><span data-dcnode-id="640" instrument_node="">Architect Frank Lloyd Wright</span><br data-dcnode-id="639"><br data-dcnode-id="638"><img data-dcnode-id="637" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/wright-guggenheim.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">Guggenheim Museum, New York</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">Architect Frank Lloyd Wright</span></div><span data-dcnode-id="631" instrument_node="">
</span><span class="first" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">American architect Frank Lloyd Wright</span></span><span data-dcnode-id="628" instrument_node=""> (1867-1959) is the most famous architect of the twentieth century and one of the most prolific.  Wright defined his Prairie School style of architecture with organic buildings that extend the indoors to the outside.  Prairie style houses cling to their site with low-slung projecting roofs that suggest security and shelter.  Inside, Wright used open, unobstructed floor plans so that space flowed from room to room. Wright often designed the interior fixtures and furniture, too.  His authentic, democratic style was influenced by his famous mentor, architect Louis Sullivan.  The first Prairie House was the Robie House in Chicago.  Fallingwater is Wright's most famous residence, a set of sweeping cantilevered planes anchored to the ledge above a spectacular waterfall. His final work, the famous Guggenheim Museum in New York, an example of Neo-Expressionism architecture, was completed just before his death. For the Guggenheim, Wright created a continuous, flowing space with a multi-floor spiral ramp, flooded with light from the sky dome.  Several movies have been made about the life of Frank Lloyd Wright.         

</span><br data-dcnode-id="627"><br data-dcnode-id="626"><a data-dcnode-id="622" name="4"><h2 data-dcnode-id="623" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="625" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="624" instrument_node=""> Famous Modern Architects of the Skyscraper</span></h2></a><br clear="all" data-dcnode-id="621"><span data-dcnode-id="620" instrument_node="">
</span><div class="photo" data-dcnode-id="614"><img data-dcnode-id="619" height="352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/seagram-building.jpg&amp;raw" title="famous modern architects" width="235"><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">Seagram Building, New York</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">Architects Mies and Johnson</span></div><span data-dcnode-id="613" instrument_node="">
</span><span class="first" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">The skyscraper is a remarkable creation</span></span><span data-dcnode-id="610" instrument_node=""> of twentieth century architecture. The skyscraper is a uniquely American style of architecture made possible by the invention of electric elevators and structural steel beams.  These tall buildings make efficient use of the free air space over expensive land. So familiar is the skyscraper that we are no longer astonished by these architectural feats. Famous skyscrapers of the century are 
</span><ul data-dcnode-id="597" title="famous modern architects"><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">
The Guaranty Building (1896) Buffalo, New York  by Adler and Sullivan.
</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">The Woolworth Building (1913) New York, by Cass Gilbert, distinctive for its use of historic decorations and crowns.
</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Chrysler Building (1930) by William Van Alen.  In the Art Deco style, it has eagle gargoyles that look like hood ornaments.
</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The Empire State Building (1931) New York, by Shreve, Lamb &amp; Harmon. With 102 stories, the Empire State Building was the world's tallest building for 40 years.
</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">The Seagram Building (1958) New York, by Mies Van der Rohe and Johnson.
</span></li><li data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">The AT&amp;T Building (1984) New York,  by Philip Johnson and John Burgee.  It is now called the Sony Building.
</span></li></ul><span data-dcnode-id="596" instrument_node="">
</span><br data-dcnode-id="595"><a data-dcnode-id="591" name="5"><h2 data-dcnode-id="592" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="594" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="593" instrument_node=""> Famous Modern Architect Ludwig Mies Van Der Rohe</span></h2></a><br clear="all" data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">
</span><div class="photo" data-dcnode-id="583"><img data-dcnode-id="588" height="107" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/farnsworth-house.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node=""> Farnsworth House, Plano, Illinois</span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node="">Architect Ludwig Mies Van Der Rohe</span></div><span data-dcnode-id="582" instrument_node="">
</span><span class="first" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">German architect Ludwig Mies Van Der Rohe</span></span><span data-dcnode-id="579" instrument_node=""> (1886-1969) summed up his design philosophy as "Less is more,"  and "God is in the details."  Mies, along with Walter Gropius and Le Corbusier, is the pioneer of Modern architecture.  He created this influential twentieth century architectural style based on the simple cube and flowing interior space with industrial steel and plate glass. His Modernist residence, The Farnsworth House (1950) in Plano, Illinois, is a National Historic Landmark.  The design for Farnsworth House was reduced to the architectural minimum, unobstructed living space within four glass walls and steel I-beams on a concrete floor.  Mies, collaborating with Philip Johnson, advanced architecture with the Seagram  Building in New York (1958), a distinctive skyscraper of glass partitioned with exterior, bronzed, non-structural I-beams.  Mies believed that Modernism, where the cube was king, gave order to the confusion of daily life.  

</span><br data-dcnode-id="578"><br data-dcnode-id="577"><a data-dcnode-id="573" name="6"><h2 data-dcnode-id="574" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="576" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="575" instrument_node=""> Famous Modern Architect Le Corbusier</span></h2></a><br clear="all" data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
</span><div class="photo" data-dcnode-id="565"><img data-dcnode-id="570" height="130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/le-corbusier-villa-savoye.jpg&amp;raw" title="famous architects" width="250"><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">Villa Savoye, Poissy, France</span><br data-dcnode-id="567"><span data-dcnode-id="566" instrument_node="">Architect Le Corbusier</span></div><span data-dcnode-id="564" instrument_node="">
</span><span class="first" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Famous Swiss architect Charles Edouad Jeannert</span></span><span data-dcnode-id="561" instrument_node=""> (1887-1965) called himself </span><span class="first" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Le Corbusier</span></span><span data-dcnode-id="558" instrument_node="">.  He was a minimalist architect of the Modern movement who believed that architectural design could improve human nature.  He had universal influence and is considered the "Picasso of architecture." His motto in French was "sunlight, space and greenery." Le Corbusier preferred a building without decoration, raw concrete raised on pillars, with long horizontal window strips, open floor plan and a roof garden. His iconic landmark is Villa Savoye (1928), in Poissy,  France. He also designed mass housing as a total environment for people, the Unite d'Habitation in Marseilles, France. 

</span><br data-dcnode-id="557"><br data-dcnode-id="556"><a data-dcnode-id="552" name="7"><h2 data-dcnode-id="553" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="555" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="554" instrument_node=""> Famous Modern Architect Renzo Piano</span></h2></a><br clear="all" data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
</span><div class="photo" data-dcnode-id="537"><img data-dcnode-id="549" height="164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/piano-nemo.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">NEMO, Amsterdam</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">Architect Renzo Piano</span><br data-dcnode-id="544"><br data-dcnode-id="543"><img data-dcnode-id="542" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/centre-pompidou.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="541"><span data-dcnode-id="540" instrument_node="">Centre Pompidou, Paris</span><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">Architect Renzo Piano &amp; Others</span></div><span data-dcnode-id="536" instrument_node="">
</span><span class="first" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Italian architect Renzo Piano</span></span><span data-dcnode-id="533" instrument_node=""> (b.1937) and British architects Richard Rogers and Su Rogers desiged the the Centre Pompidou (1977) in Paris.  A daring example of  High-Tech  architectural design, the museum and library building uses the brightly-colored tubes for wiring and plumbing as part of its decoration. It looks as if Piano and Rogers build the structure inside out.  Renzo Piano also designed NEMO, The New Metropolis (1997), a science center in Amsterdam that resembles a supertanker in  oxidized copper.  In 2007 Rogers won the prestigious Pritzker Prize, which is called the Nobel Prize of architecture.

</span><br data-dcnode-id="532"><br data-dcnode-id="531"><a data-dcnode-id="527" name="8"><h2 data-dcnode-id="528" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="530" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="529" instrument_node=""> Famous Modern Architect Philip Johnson</span></h2></a><br clear="all" data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
</span><div class="photo" data-dcnode-id="519"><img data-dcnode-id="524" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/johnson-glass-house.jpg&amp;raw" title="famous architects" width="250"><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">Glass House, Connecticut</span><br data-dcnode-id="521"><span data-dcnode-id="520" instrument_node="">Architect Philip Johnson</span></div><span data-dcnode-id="518" instrument_node="">
</span><span class="first" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">American architect Philip Johnson</span></span><span data-dcnode-id="515" instrument_node=""> (1906-2005) is the architect who embraced all the twentieth century movements,  one after the other.  In his Modernist period he is most famous for the minimalist Glass House (1949) in New Canaan, Connecticut. He collaborated with Mies Van Der Rohe on the Seagram Building (1956). Many of his works became instant icons, such as PPG Place in Pittsburgh and the landmark Crystal Cathedral in Garden Grove, California. The AT&amp;T Building, with its neo-Georgian, Chippendale style pediment, is a famous work of Johnson's Post-Modern period. Philip Johnson was awarded the first Pritzker Architecture Prize in 1979. 

</span><br data-dcnode-id="514"><br data-dcnode-id="513"><a data-dcnode-id="509" name="9"><h2 data-dcnode-id="510" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="512" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="511" instrument_node=""> Famous Modern Architect I.M. Pei</span></h2></a><br clear="all" data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">
</span><div class="photo" data-dcnode-id="494"><img data-dcnode-id="506" height="193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pei-louvre.jpg&amp;raw" title="famous modern architects and their work" width="250"><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">Architect I.M. Pei</span><br data-dcnode-id="503"><span data-dcnode-id="502" instrument_node="">Pyramid Entrance to the Louvre</span><br data-dcnode-id="501"><br data-dcnode-id="500"><img data-dcnode-id="499" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pei-rock-and-roll-hall-of-fame.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">Rock &amp; Roll Hall of Fame, Cleveland</span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">Architect I.M. Pei</span></div><span data-dcnode-id="493" instrument_node="">
</span><span class="first" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The Chinese-American architect I.M. Pei</span></span><span data-dcnode-id="490" instrument_node=""> (b.1917) is one of the best-known architects. He is particularly identified with his use of the glass pyramid.  His work includes the East Wing of the National Gallery of Art, the Rock and Roll Hall of Fame, the Bank of China Tower in Hong Kong and the Miho Museum in Kyoto.  The most controversial of his works is at the Louvre Museum in Paris, where he designed the 71-foot glass pyramid  as the new underground entrance to the museum.  (Pictured above) Sitting in the center of the plaza, Pei's pyramid contrasts provocatively with the massive historical stone buildings of the Louvre. Among the many awards he received is the Pritzker Prize.

</span><br data-dcnode-id="489"><br data-dcnode-id="488"><a data-dcnode-id="484" name="10"><h2 data-dcnode-id="485" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="487" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="486" instrument_node=""> Famous Modern Architect Frank Gehry</span></h2></a><br clear="all" data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
</span><div class="photo" data-dcnode-id="471"><img data-dcnode-id="481" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/gehry-residence.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">Residence of Architect Frank Gehry</span><br data-dcnode-id="478"><br data-dcnode-id="477"><img data-dcnode-id="476" height="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/guggenheim-bilbao.jpg&amp;raw" title="famous modern architects" width="250"><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">Guggenheim Museum, Bilbao, Spain</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">Architect Frank Gehry</span></div><span data-dcnode-id="470" instrument_node="">
</span><span class="first" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Architect Frank Gehry</span></span><span data-dcnode-id="467" instrument_node=""> (b. 1929) is an original and creative Canadian-American architect who designs  buildings as sculpture, so that the form of the building stands as a work of art on its own merits.  The Guggenheim Museum in Bilboa Spain (1997) is called the greatest building of our time.  In it Gehry used a set of rolling titanium shapes that convey meaning and significance to the viewer. Among his architectural masterpieces is Walt Disney Concert Hall in Los Angeles, pictured above. Gehry's personal residence in Santa Monica, with its eclectic collage of plywood, corrugated metal, chain link fence and asphalt, is an example of the Deconstructivism style of architecture. 

</span><br data-dcnode-id="466"><br data-dcnode-id="465"><a data-dcnode-id="461" name="11"><h2 data-dcnode-id="462" title="famous modern architects"><img align="left" alt="famous modern architects" data-dcnode-id="464" height="35" hspace="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/pixarchitects.jpg&amp;raw" title="famous modern architects" width="35"><span data-dcnode-id="463" instrument_node=""> Famous Women Architects</span></h2></a><br clear="all" data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
</span><div class="photo" data-dcnode-id="453"><img data-dcnode-id="458" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.surfersam.com/articles/famous-architects/contemporary-arts-center.jpg&amp;raw" title="famous architects" width="250"><br data-dcnode-id="457"><span data-dcnode-id="456" instrument_node="">Contemporary Art Center, Cincinnati</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">Architect Zaha Hadid</span></div><span data-dcnode-id="452" instrument_node="">
</span><span class="first" data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Famous women architects</span></span><span data-dcnode-id="449" instrument_node=""> have recently excelled in their profession. Even during the twentieth century, women were often refused admission to architectural schools and had difficulty finding clients.   Julia Morgan (1872-1957), the first woman accepted at the Ecole des Beaux-Arts, is best known as the architect of the magnificent Hearst Castle, San Simeon, California.   Iraqi architect Zaha Hadid designed the Contemporary Arts Center (2003) in Cincinnati, Ohio, as a rolling urban carpet. The New York Times called it "The most important American building to be completed since the end of the cold war."   Other famous women architects are Gae Aulenti, Itsuko Hasegawa, Margaret McCurry and Denise Scott Brown.
