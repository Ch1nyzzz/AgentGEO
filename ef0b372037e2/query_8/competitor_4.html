</span><h2 data-dcnode-id="7654"><span class="ez-toc-section" data-dcnode-id="7663" id="1_Daniel_Libeskind_-_The_Jewish_Museum"></span><strong data-dcnode-id="7656"><span data-dcnode-id="7662" instrument_node=""> 1. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libeskind.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7661" instrument_node="">Daniel Libeskind</span></a><span data-dcnode-id="7659" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jmberlin.de/en" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7658" instrument_node="">The Jewish Museum </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="7655"></span></h2><span data-dcnode-id="7653" instrument_node="">
</span><p data-dcnode-id="7643"><a data-dcnode-id="7651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libeskind.com/"><span data-dcnode-id="7652" instrument_node="">Daniel Libeskind</span></a><span data-dcnode-id="7650" instrument_node=""> is a Polish-Jewish architect who was born in 1946. He founded his architecture firm, </span><strong data-dcnode-id="7648"><span data-dcnode-id="7649" instrument_node="">Studio Daniel Libeskind</span></strong><span data-dcnode-id="7647" instrument_node="">, in 1989. Liebeskind is an architect that has the belief that anyone can understand and design architecture, as long as you have the</span><strong data-dcnode-id="7645"><span data-dcnode-id="7646" instrument_node=""> right mindset</span></strong><span data-dcnode-id="7644" instrument_node="">.</span></p><span data-dcnode-id="7642" instrument_node="">
</span><p data-dcnode-id="7638"><a data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jmberlin.de/en"><span data-dcnode-id="7641" instrument_node="">The Jewish Museum</span></a><span data-dcnode-id="7639" instrument_node=""> in Berlin was Libeskind’s first major international success. Liebeskind designed this museum with the wish to tell the story of the German-Jewish history, rather than simply designing a building. Each individual visiting the museum can have different interpretations, but most experience a feeling of disorientation or insecurity.</span></p><span data-dcnode-id="7637" instrument_node="">
</span><p data-dcnode-id="7629"><span data-dcnode-id="7636" instrument_node="">After the Jewish Museum many works followed, such as the</span><a data-dcnode-id="7634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libeskind.com/work/bord-gais-energy-theatre-and-grand-canal-commercial-development/"><span data-dcnode-id="7635" instrument_node=""> Grand Canal Theatre</span></a><span data-dcnode-id="7633" instrument_node=""> in Dublin and the</span><a data-dcnode-id="7631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iwm.org.uk/visits/iwm-north"><span data-dcnode-id="7632" instrument_node=""> Imperial War Museum North</span></a><span data-dcnode-id="7630" instrument_node=""> in England.</span></p><span data-dcnode-id="7628" instrument_node="">
</span><p data-dcnode-id="7623"><span data-dcnode-id="7627" instrument_node="">If you want to know more about Liebeskind’s thoughts on architecture, and the inspirations for his works, then we recommend you to read his book,</span><a data-dcnode-id="7625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libeskind.com/publishing/edge-of-order/"><span data-dcnode-id="7626" instrument_node=""> Edge of Order</span></a><span data-dcnode-id="7624" instrument_node="">.</span></p><span data-dcnode-id="7622" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7602"><figure class="aligncenter" data-dcnode-id="7603"><a data-dcnode-id="7612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jmberlin.de/en" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2192" data-dcnode-id="7616"><span data-dcnode-id="7621" instrument_node="">

</span><h2 data-dcnode-id="7590"><span class="ez-toc-section" data-dcnode-id="7600" id="2_Richard_Meier_-_Barcelona_Museum_of_Contemporary_Art"></span><strong data-dcnode-id="7592"><span data-dcnode-id="7599" instrument_node="">2. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.richardmeier.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7598" instrument_node="">Richard Meier</span></a><span data-dcnode-id="7596" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.macba.cat/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7595" instrument_node="">Barcelona Museum of Contemporary Art</span></a><span data-dcnode-id="7593" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="7591"></span></h2><span data-dcnode-id="7589" instrument_node="">
</span><p data-dcnode-id="7582"><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.richardmeier.com/"><span data-dcnode-id="7588" instrument_node="">Richard Meier</span></a><span data-dcnode-id="7586" instrument_node="">, born in 1934, is an American abstract artist and architect, whose </span><strong data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">geometric designs</span></strong><span data-dcnode-id="7583" instrument_node=""> are known for following timeless, classical design principles.&nbsp;</span></p><span data-dcnode-id="7581" instrument_node="">
</span><p data-dcnode-id="7573"><span data-dcnode-id="7580" instrument_node="">Incorporating </span><strong data-dcnode-id="7578"><span data-dcnode-id="7579" instrument_node="">natural daylight</span></strong><span data-dcnode-id="7577" instrument_node=""> and the colour white is the standard, and </span><strong data-dcnode-id="7575"><span data-dcnode-id="7576" instrument_node="">order </span></strong><span data-dcnode-id="7574" instrument_node="">and geometry weigh very heavily in the compositions. In both the form and placement of a construction, Meier takes a close look at the context it will be situated in, to enhance the dialogue between the building and its environment.&nbsp;</span></p><span data-dcnode-id="7572" instrument_node="">
</span><p data-dcnode-id="7567"><span data-dcnode-id="7571" instrument_node="">With the increasing demand on </span><strong data-dcnode-id="7569"><span data-dcnode-id="7570" instrument_node="">sustainability </span></strong><span data-dcnode-id="7568" instrument_node="">within design and architecture, also the Richard Meier &amp; Partners Architects company tries to incorporate new technologies and materials that are less demanding on the planet’s resources.</span></p><span data-dcnode-id="7566" instrument_node="">
</span><p data-dcnode-id="7549"><span data-dcnode-id="7565" instrument_node="">When Meier was 49, he received the </span><a data-dcnode-id="7563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="7564" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="7562" instrument_node="">. With this age, he was the youngest ever to receive this prestigious prize. Meier has designed several </span><strong data-dcnode-id="7560"><span data-dcnode-id="7561" instrument_node="">contemporary buildings</span></strong><span data-dcnode-id="7559" instrument_node=""> including the</span><a data-dcnode-id="7557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.macba.cat/"><span data-dcnode-id="7558" instrument_node=""> Barcelona Museum of Contemporary Art</span></a><span data-dcnode-id="7556" instrument_node="">, the </span><a data-dcnode-id="7554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.richardmeier.com/%3Fprojects%3Djubilee-church-2"><span data-dcnode-id="7555" instrument_node="">Jubilee Church</span></a><span data-dcnode-id="7553" instrument_node=""> in Rome, and&nbsp; the </span><a data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//high.org/"><span data-dcnode-id="7552" instrument_node="">High Museum of Art</span></a><span data-dcnode-id="7550" instrument_node=""> in Atlanta.</span></p><span data-dcnode-id="7548" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7528"><figure class="aligncenter is-resized" data-dcnode-id="7529"><a data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.macba.cat/en/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2197" data-dcnode-id="7542"><span data-dcnode-id="7547" instrument_node="">

</span><h2 data-dcnode-id="7516"><span class="ez-toc-section" data-dcnode-id="7526" id="3_Norman_Foster_-_30_St_Mary_Axe"></span><strong data-dcnode-id="7518"><span data-dcnode-id="7525" instrument_node="">3. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fosterandpartners.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7524" instrument_node="">Norman Foster</span></a><span data-dcnode-id="7522" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.30stmaryaxe.info/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7521" instrument_node="">30 St Mary Axe</span></a><span data-dcnode-id="7519" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="7517"></span></h2><span data-dcnode-id="7515" instrument_node="">
</span><p data-dcnode-id="7505"><a data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fosterandpartners.com/"><span data-dcnode-id="7514" instrument_node="">Norman Foster</span></a><span data-dcnode-id="7512" instrument_node=""> was born in 1935, and is a British architect whose company,</span><a data-dcnode-id="7510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fosterandpartners.com/"><span data-dcnode-id="7511" instrument_node=""> Foster + Partners</span></a><span data-dcnode-id="7509" instrument_node="">, maintains an international design practice famous for </span><strong data-dcnode-id="7507"><span data-dcnode-id="7508" instrument_node="">high-tech architecture</span></strong><span data-dcnode-id="7506" instrument_node="">.</span></p><span data-dcnode-id="7504" instrument_node="">
</span><p data-dcnode-id="7496"><span data-dcnode-id="7503" instrument_node="">Foster + Partners has the main emphasis on </span><strong data-dcnode-id="7501"><span data-dcnode-id="7502" instrument_node="">sustainability</span></strong><span data-dcnode-id="7500" instrument_node="">, and developing environmentally friendly buildings. </span><strong data-dcnode-id="7498"><span data-dcnode-id="7499" instrument_node="">Innovation </span></strong><span data-dcnode-id="7497" instrument_node="">is key to them, and they create their so-called ‘responsible design’ using an integrated design approach.&nbsp;</span></p><span data-dcnode-id="7495" instrument_node="">
</span><p data-dcnode-id="7481"><span data-dcnode-id="7494" instrument_node="">Foster is one of Britain’s most prolific architects of his generation. When you are travelling to London, one of the first buildings to strike your eye will be the</span><a data-dcnode-id="7492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/30_St_Mary_Axe"><span data-dcnode-id="7493" instrument_node=""> 30 St Mary Axe</span></a><span data-dcnode-id="7491" instrument_node="">. This </span><strong data-dcnode-id="7489"><span data-dcnode-id="7490" instrument_node="">contemporary building</span></strong><span data-dcnode-id="7488" instrument_node=""> is a commercial skyscraper in London’s primary financial district. Other well-known works from Foster are the </span><a data-dcnode-id="7486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.torredecollserola.com/"><span data-dcnode-id="7487" instrument_node="">Torre de Collserola</span></a><span data-dcnode-id="7485" instrument_node=""> in Barcelona, and the </span><a data-dcnode-id="7483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fosterandpartners.com/projects/willis-building/"><span data-dcnode-id="7484" instrument_node="">Willis Building</span></a><span data-dcnode-id="7482" instrument_node=""> in Ipswich.</span></p><span data-dcnode-id="7480" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7459"><figure class="aligncenter" data-dcnode-id="7460"><a data-dcnode-id="7470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.30stmaryaxe.info/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2738" data-dcnode-id="7474"><span data-dcnode-id="7479" instrument_node="">

</span><h2 data-dcnode-id="7448"><span class="ez-toc-section" data-dcnode-id="7457" id="4_Renzo_Piano_-The_Shard"></span><strong data-dcnode-id="7450"><span data-dcnode-id="7456" instrument_node="">4. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rpbw.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7455" instrument_node="">Renzo Piano</span></a><span data-dcnode-id="7453" instrument_node=""> –</span><a aria-label=" (opens in a new tab)" data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-shard.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7452" instrument_node="">The Shard</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="7449"></span></h2><span data-dcnode-id="7447" instrument_node="">
</span><p data-dcnode-id="7443"><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rpbw.com/"><span data-dcnode-id="7446" instrument_node="">Renzo Piano</span></a><span data-dcnode-id="7444" instrument_node=""> was born in 1937 in Genua, Italy. He is a contemporary, abstract and functional architect.</span></p><span data-dcnode-id="7442" instrument_node="">
</span><p data-dcnode-id="7434"><span data-dcnode-id="7441" instrument_node="">Piano was one of the founding partners of the RPBW architecture company, which has offices in Italy, France and since recently also in New York. Within RPBW they focus on </span><strong data-dcnode-id="7439"><span data-dcnode-id="7440" instrument_node="">collaborative </span></strong><span data-dcnode-id="7438" instrument_node="">and </span><strong data-dcnode-id="7436"><span data-dcnode-id="7437" instrument_node="">participative </span></strong><span data-dcnode-id="7435" instrument_node="">project developments.</span></p><span data-dcnode-id="7433" instrument_node="">
</span><p data-dcnode-id="7425"><span data-dcnode-id="7432" instrument_node="">Their main aim is to communicate to people that they design their buildings </span><strong data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">with and for the people</span></strong><span data-dcnode-id="7429" instrument_node="">. Therefore they focus on many non-physical elements, of which </span><strong data-dcnode-id="7427"><span data-dcnode-id="7428" instrument_node="">light</span></strong><span data-dcnode-id="7426" instrument_node=""> is the most important.&nbsp;</span></p><span data-dcnode-id="7424" instrument_node="">
</span><p data-dcnode-id="7419"><span data-dcnode-id="7423" instrument_node="">RPBW designs its buildings following the </span><strong data-dcnode-id="7421"><span data-dcnode-id="7422" instrument_node="">Genius Loci</span></strong><span data-dcnode-id="7420" instrument_node=""> principle, which implies that they are aware of the surroundings, and design the construction accordingly. </span></p><span data-dcnode-id="7418" instrument_node="">
</span><p data-dcnode-id="7407"><span data-dcnode-id="7417" instrument_node="">One of Piano’s most notable projects is </span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rpbw.com/project/shard-place"><span data-dcnode-id="7416" instrument_node="">The Shard</span></a><span data-dcnode-id="7414" instrument_node="">, which is the tallest building in the United Kingdom, with its 309 meters. Other well-known projects include </span><a data-dcnode-id="7412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rpbw.com/project/istanbul-modern"><span data-dcnode-id="7413" instrument_node="">Istanbul Modern</span></a><span data-dcnode-id="7411" instrument_node=""> in Turkey, and </span><a data-dcnode-id="7409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rpbw.com/project/whittle-school-shenzhen"><span data-dcnode-id="7410" instrument_node="">Whittle School</span></a><span data-dcnode-id="7408" instrument_node=""> in China.</span></p><span data-dcnode-id="7406" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7381"><figure class="aligncenter" data-dcnode-id="7382"><a data-dcnode-id="7396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-shard.com/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2204" data-dcnode-id="7400"><span data-dcnode-id="7405" instrument_node="">

</span><h2 data-dcnode-id="7370"><span class="ez-toc-section" data-dcnode-id="7379" id="5_Santiago_Calatrava_-_City_of_Arts_and_Sciences"></span><strong data-dcnode-id="7372"><span data-dcnode-id="7378" instrument_node="">5. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calatrava.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7377" instrument_node="">Santiago Calatrava</span></a><span data-dcnode-id="7375" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cac.es/en/home.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7374" instrument_node="">City of Arts and Sciences </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="7371"></span></h2><span data-dcnode-id="7369" instrument_node="">
</span><p data-dcnode-id="7365"><a data-dcnode-id="7367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calatrava.com/"><span data-dcnode-id="7368" instrument_node="">Santiago Calatrava</span></a><span data-dcnode-id="7366" instrument_node=""> is an architect born in 1951 in Valencia, Spain. He is an architect, structural design and analyst engineer, sculptor, and painter.</span></p><span data-dcnode-id="7364" instrument_node="">
</span><p data-dcnode-id="7357"><a data-dcnode-id="7362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spanish-art.org/spanish-architecture-calatrava.html"><span data-dcnode-id="7363" instrument_node="">Calatrava </span></a><span data-dcnode-id="7361" instrument_node="">is known for </span><strong data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">unifying beauty and function</span></strong><span data-dcnode-id="7358" instrument_node=""> in his buildings and projects. He incorporates many aspects of the human body and nature in his works.</span></p><span data-dcnode-id="7356" instrument_node="">
</span><p data-dcnode-id="7348"><span data-dcnode-id="7355" instrument_node="">There has been quite some </span><strong data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">critique </span></strong><span data-dcnode-id="7352" instrument_node="">on the building style of Calatrava, as many consider it over-the-top and too </span><strong data-dcnode-id="7350"><span data-dcnode-id="7351" instrument_node="">flamboyant</span></strong><span data-dcnode-id="7349" instrument_node="">. However, he has also gained great successes with his projects.</span></p><span data-dcnode-id="7347" instrument_node="">
</span><p data-dcnode-id="7336"><span data-dcnode-id="7346" instrument_node="">The largest of these is </span><a data-dcnode-id="7344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cac.es/en/home.html"><span data-dcnode-id="7345" instrument_node="">La Ciutat de les Arts i les Ciències</span></a><span data-dcnode-id="7343" instrument_node=""> (The City of Arts and Sciences) in Valencia, which is one of the 12 Treasures of Spain. Other buildings include </span><a data-dcnode-id="7341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calatrava.com/projects/yuan-ze-university-building-taipei.html"><span data-dcnode-id="7342" instrument_node="">Yuan Ze University</span></a><span data-dcnode-id="7340" instrument_node=""> in Taipei, and the </span><a data-dcnode-id="7338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calatrava.com/projects/chicago-airport-chicago.html"><span data-dcnode-id="7339" instrument_node="">O’Hare Global Terminal</span></a><span data-dcnode-id="7337" instrument_node=""> in Chicago.</span></p><span data-dcnode-id="7335" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="7326"><figure class="aligncenter" data-dcnode-id="7327"><img alt="The CAC in Valencia. Image by: Cruise of Travel" class="lazyloaded" data-dcnode-id="7334" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cruisetotravel.com/wp-content/uploads/2019/04/Knipsel7-1024x576.jpg&amp;raw"><noscript data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">&lt;img src="https://www.cruisetotravel.com/wp-content/uploads/2019/04/Knipsel7-1024x576.jpg" alt="The CAC in Valencia. Image by: Cruise of Travel"/&gt;</span></noscript><figcaption data-dcnode-id="7328"><span data-dcnode-id="7331" instrument_node="">The CAC in Valencia. Image by: </span><a data-dcnode-id="7329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cruisetotravel.com/2019/04/08/the-city-of-arts-and-sciences-a-true-icon-of-valencia/"><span data-dcnode-id="7330" instrument_node="">Cruise to Travel</span></a></figcaption></figure></div><span data-dcnode-id="7325" instrument_node="">
</span><p data-dcnode-id="7324"></p><span data-dcnode-id="7323" instrument_node="">
</span><h2 data-dcnode-id="7312"><span class="ez-toc-section" data-dcnode-id="7322" id="6_Rem_Koolhaas_-_CMG_Headquarters"></span><strong data-dcnode-id="7314"><span data-dcnode-id="7321" instrument_node="">6. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oma.eu/partners/rem-koolhaas" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7320" instrument_node="">Rem Koolhaas</span></a><span data-dcnode-id="7318" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CMG_Headquarters" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7317" instrument_node="">CMG Headquarters</span></a><span data-dcnode-id="7315" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="7313"></span></h2><span data-dcnode-id="7311" instrument_node="">
</span><p data-dcnode-id="7307"><a data-dcnode-id="7309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oma.eu/partners/rem-koolhaas"><span data-dcnode-id="7310" instrument_node="">Rem Koolhaas</span></a><span data-dcnode-id="7308" instrument_node=""> is an architect born in 1944 in Rotterdam, the Netherlands. Next to designing as an architect, Koolhaas is active as a Professor in architectural theories and urban space at Harvard University.&nbsp;</span></p><span data-dcnode-id="7306" instrument_node="">
</span><p data-dcnode-id="7296"><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Rem-Koolhaas"><span data-dcnode-id="7305" instrument_node="">Koolhaas </span></a><span data-dcnode-id="7303" instrument_node="">is known for his works that </span><strong data-dcnode-id="7301"><span data-dcnode-id="7302" instrument_node="">embrace modernity</span></strong><span data-dcnode-id="7300" instrument_node="">. He often uses asymmetry, and unexpected uses of colour. Therefore, he can be seen as a </span><strong data-dcnode-id="7298"><span data-dcnode-id="7299" instrument_node="">deconstructivist </span></strong><span data-dcnode-id="7297" instrument_node="">architect.&nbsp;</span></p><span data-dcnode-id="7295" instrument_node="">
</span><p data-dcnode-id="7287"><span data-dcnode-id="7294" instrument_node="">However, what sets him apart from others in this style is his strong focus on </span><strong data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">humanity</span></strong><span data-dcnode-id="7291" instrument_node="">. </span><strong data-dcnode-id="7289"><span data-dcnode-id="7290" instrument_node="">Urban planning</span></strong><span data-dcnode-id="7288" instrument_node=""> is heavily emphasized, as Koolhaas designs buildings paying attention to the role it plays to people’s everyday life.&nbsp;</span></p><span data-dcnode-id="7286" instrument_node="">
</span><p data-dcnode-id="7275"><span data-dcnode-id="7285" instrument_node="">Koolhaas’ largest project to date is the</span><a data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CMG_Headquarters"><span data-dcnode-id="7284" instrument_node=""> CMG Headquarters</span></a><span data-dcnode-id="7282" instrument_node=""> in Beijing. Other famous works are </span><a data-dcnode-id="7280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oma.eu/projects/de-rotterdam"><span data-dcnode-id="7281" instrument_node="">De Rotterdam</span></a><span data-dcnode-id="7279" instrument_node=""> in Rotterdam, and the </span><a data-dcnode-id="7277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inexhibit.com/case-studies/rem-koolhaas-oma-blox-copenhagen/"><span data-dcnode-id="7278" instrument_node="">BLOX design hub</span></a><span data-dcnode-id="7276" instrument_node=""> in Copenhagen.</span></p><span data-dcnode-id="7274" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7258"><figure class="aligncenter" data-dcnode-id="7259"><a data-dcnode-id="7264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oma.eu/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2208" data-dcnode-id="7268"><span data-dcnode-id="7273" instrument_node="">

</span><h2 data-dcnode-id="7247"><span class="ez-toc-section" data-dcnode-id="7256" id="7_Ieoh_Ming_Pei_-_The_Rock_and_Roll_Hall_of_Fame"></span><strong data-dcnode-id="7249"><span data-dcnode-id="7255" instrument_node="">7. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcf-p.com/about/i-m-pei/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7254" instrument_node="">Ieoh Ming Pei </span></a><span data-dcnode-id="7252" instrument_node="">– </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rockhall.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7251" instrument_node="">The Rock and Roll Hall of Fame </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="7248"></span></h2><span data-dcnode-id="7246" instrument_node="">
</span><p data-dcnode-id="7242"><a data-dcnode-id="7244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcf-p.com/about/i-m-pei/"><span data-dcnode-id="7245" instrument_node="">Ieoh Ming Pei</span></a><span data-dcnode-id="7243" instrument_node=""> is an architect born in 1917 in Guangzhou, China. When he was 17 years old, he moved to the US, and never left it. Ieoh Ming Pei unfortunately died in 2019.&nbsp;</span></p><span data-dcnode-id="7241" instrument_node="">
</span><p data-dcnode-id="7231"><a data-dcnode-id="7239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/05/16/obituaries/im-pei-dead.html"><span data-dcnode-id="7240" instrument_node="">Pei </span></a><span data-dcnode-id="7238" instrument_node="">is often referred to as the </span><strong data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">master of modern architecture</span></strong><span data-dcnode-id="7235" instrument_node="">. Even though his work cannot be considered traditional, it is seen as </span><strong data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">timeless</span></strong><span data-dcnode-id="7232" instrument_node="">, and often with references to the past.&nbsp;</span></p><span data-dcnode-id="7230" instrument_node="">
</span><p data-dcnode-id="7225"><span data-dcnode-id="7229" instrument_node="">He is known for using simple geometric lines, and developing clean and sharp-edged designs. His goal is to create </span><strong data-dcnode-id="7227"><span data-dcnode-id="7228" instrument_node="">monumental architectural works</span></strong><span data-dcnode-id="7226" instrument_node="">.</span></p><span data-dcnode-id="7224" instrument_node="">
</span><p data-dcnode-id="7219"><span data-dcnode-id="7223" instrument_node="">One of Pei’s most notable projects is </span><a data-dcnode-id="7221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rockhall.com/"><span data-dcnode-id="7222" instrument_node="">The Rock and Roll Hall of Fame</span></a><span data-dcnode-id="7220" instrument_node=""> in Ohio, a building that recognizes and archives the history of the best-known and most influential artists, producers, engineers, and other notable figures who have had some major influence on the development of rock and roll. </span></p><span data-dcnode-id="7218" instrument_node="">
</span><p data-dcnode-id="7210"><span data-dcnode-id="7217" instrument_node="">Other works Pei got famous for are the </span><a data-dcnode-id="7215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nga.gov/about/welcome-to-the-east-building.html"><span data-dcnode-id="7216" instrument_node="">East Building of the National Gallery of Art</span></a><span data-dcnode-id="7214" instrument_node=""> in Washington DC, and the</span><a data-dcnode-id="7212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architectmagazine.com/awards/aia-honor-awards/louvre-pyramid-the-folly-that-became-a-triumph_o"><span data-dcnode-id="7213" instrument_node=""> Louvre Pyramid</span></a><span data-dcnode-id="7211" instrument_node=""> in Paris.</span></p><span data-dcnode-id="7209" instrument_node="">

</span><h2 data-dcnode-id="7177"><span class="ez-toc-section" data-dcnode-id="7187" id="8_Jean_Nouvel_-_Doha_Office_Tower"></span><strong data-dcnode-id="7179"><span data-dcnode-id="7186" instrument_node="">8. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeannouvel.com/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7185" instrument_node="">Jean Nouvel</span></a><span data-dcnode-id="7183" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doha_Tower" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7182" instrument_node="">Doha Office Tower</span></a><span data-dcnode-id="7180" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="7178"></span></h2><span data-dcnode-id="7176" instrument_node="">
</span><p data-dcnode-id="7172"><a data-dcnode-id="7174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeannouvel.com/en/"><span data-dcnode-id="7175" instrument_node="">Jean Nouvel</span></a><span data-dcnode-id="7173" instrument_node=""> is an architect born in 1945 in Fumel, France. He co-founded Ateliers Jean Nouvel (AJN), which turned into a world-renowned design and architecture firm.&nbsp;</span></p><span data-dcnode-id="7171" instrument_node="">
</span><p data-dcnode-id="7163"><span data-dcnode-id="7170" instrument_node="">Nouvel is known for his works that can be considered </span><strong data-dcnode-id="7168"><span data-dcnode-id="7169" instrument_node="">provocative</span></strong><span data-dcnode-id="7167" instrument_node="">. He incorporates a sense of </span><strong data-dcnode-id="7165"><span data-dcnode-id="7166" instrument_node="">originality </span></strong><span data-dcnode-id="7164" instrument_node="">in each work he creates, by trying to create something unique for each specific context.</span></p><span data-dcnode-id="7162" instrument_node="">
</span><p data-dcnode-id="7157"><span data-dcnode-id="7161" instrument_node="">He looks at the combination of the people, place and time of a specific surroundings, before making a design. Nouvel’s works are viewed as </span><strong data-dcnode-id="7159"><span data-dcnode-id="7160" instrument_node="">constructions transforming the environments</span></strong><span data-dcnode-id="7158" instrument_node=""> they’re built in.</span></p><span data-dcnode-id="7156" instrument_node="">
</span><p data-dcnode-id="7145"><span data-dcnode-id="7155" instrument_node="">In 2008, Nouvel received the</span><a data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="7154" instrument_node=""> Pritzker Prize</span></a><span data-dcnode-id="7152" instrument_node=""> for his work on over 200 projects, including Doha Office Tower in Qatar.</span><a data-dcnode-id="7150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doha_Tower"><span data-dcnode-id="7151" instrument_node=""> Doha Tower</span></a><span data-dcnode-id="7149" instrument_node=""> is an iconic tower located in Doha, Qatar. The $125-million </span><strong data-dcnode-id="7147"><span data-dcnode-id="7148" instrument_node="">contemporary office building</span></strong><span data-dcnode-id="7146" instrument_node=""> has a height of 232 meters, with 46 floors.</span></p><span data-dcnode-id="7144" instrument_node="">
</span><p data-dcnode-id="7136"><span data-dcnode-id="7143" instrument_node="">Other works Nouvel got famous for are </span><a data-dcnode-id="7141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeannouvel.com/en/projects/qingdao-west-sea-art-bay-le-jardin-des-artistes/"><span data-dcnode-id="7142" instrument_node="">The Artists’ Garden</span></a><span data-dcnode-id="7140" instrument_node=""> in Qingdao, and </span><a data-dcnode-id="7138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeannouvel.com/projets/grove-heights/"><span data-dcnode-id="7139" instrument_node="">Grove Heights</span></a><span data-dcnode-id="7137" instrument_node=""> in Miami.</span></p><span data-dcnode-id="7135" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="7116"><figure class="aligncenter" data-dcnode-id="7117"><a data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeannouvel.com/en/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2211" data-dcnode-id="7129"><span data-dcnode-id="7134" instrument_node="">

</span><h2 data-dcnode-id="7105"><span class="ez-toc-section" data-dcnode-id="7114" id="9_Frank_Owen_Gehry_-The_Louis_Vuitton_Foundation"></span><strong data-dcnode-id="7107"><span data-dcnode-id="7113" instrument_node="">9. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foga.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7112" instrument_node="">Frank Owen Gehry</span></a><span data-dcnode-id="7110" instrument_node=""> –</span><a aria-label=" (opens in a new tab)" data-dcnode-id="7108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fondationlouisvuitton.fr/en.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7109" instrument_node="">The Louis Vuitton Foundation </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="7106"></span></h2><span data-dcnode-id="7104" instrument_node="">
</span><p data-dcnode-id="7100"><a data-dcnode-id="7102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/artist/frank-gehry"><span data-dcnode-id="7103" instrument_node="">Frank Owen Gehry</span></a><span data-dcnode-id="7101" instrument_node=""> is an architect born in 1929 in Toronto, Canada. He is among the most praised and well-known architects of the 20th century.</span></p><span data-dcnode-id="7099" instrument_node="">
</span><p data-dcnode-id="7091"><span data-dcnode-id="7098" instrument_node="">His style can best be described as </span><strong data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">postmodern</span></strong><span data-dcnode-id="7095" instrument_node="">, and he is most famous for his </span><strong data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">unusual and bold</span></strong><span data-dcnode-id="7092" instrument_node=""> shapes and styles. A number of his buildings, including his private residence, have become world-renowned attractions.</span></p><span data-dcnode-id="7090" instrument_node="">
</span><p data-dcnode-id="7082"><span data-dcnode-id="7089" instrument_node="">The </span><strong data-dcnode-id="7087"><span data-dcnode-id="7088" instrument_node="">contemporary building</span></strong><span data-dcnode-id="7086" instrument_node=""> of</span><a data-dcnode-id="7084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fondationlouisvuitton.fr/en.html"><span data-dcnode-id="7085" instrument_node=""> the Louis Vuitton Foundation</span></a><span data-dcnode-id="7083" instrument_node=""> is an art museum and cultural center and is one of Frank Gehry’s best-known works. It is located in Paris.</span></p><span data-dcnode-id="7081" instrument_node="">
</span><p data-dcnode-id="7073"><span data-dcnode-id="7080" instrument_node="">Other famous works are the </span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.laphil.com/about/our-venues"><span data-dcnode-id="7079" instrument_node="">Walt Disney Concert Hall</span></a><span data-dcnode-id="7077" instrument_node=""> in Los Angeles, and the </span><a data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guggenheim-bilbao.eus/en/the-building"><span data-dcnode-id="7076" instrument_node="">Guggenheim Museum</span></a><span data-dcnode-id="7074" instrument_node=""> in Bilbao.</span></p><span data-dcnode-id="7072" instrument_node="">

</span><h2 data-dcnode-id="7040"><span class="ez-toc-section" data-dcnode-id="7050" id="10_Tom_Wright_-_The_Burj_Al_Arab"></span><strong data-dcnode-id="7042"><span data-dcnode-id="7049" instrument_node="">10. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wkkarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7048" instrument_node="">Tom Wright</span></a><span data-dcnode-id="7046" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jumeirah.com/en/stay/dubai/burj-al-arab-jumeirah" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7045" instrument_node="">The Burj Al Arab</span></a><span data-dcnode-id="7043" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="7041"></span></h2><span data-dcnode-id="7039" instrument_node="">
</span><p data-dcnode-id="7035"><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wkkarchitects.com/"><span data-dcnode-id="7038" instrument_node="">Tom Wright</span></a><span data-dcnode-id="7036" instrument_node="">, born in 1957 in Croydon, United Kingdom. Together with Hakim Khennouchi and Geku Kuruvilla he started the architecture company WKK in 2013.&nbsp;</span></p><span data-dcnode-id="7034" instrument_node="">
</span><p data-dcnode-id="7020"><span data-dcnode-id="7033" instrument_node="">WKK is known for its </span><strong data-dcnode-id="7031"><span data-dcnode-id="7032" instrument_node="">innovative </span></strong><span data-dcnode-id="7030" instrument_node="">and </span><strong data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">inventive </span></strong><span data-dcnode-id="7027" instrument_node="">buildings, that are all centered around being </span><strong data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">unique</span></strong><span data-dcnode-id="7024" instrument_node="">, and standing out from other buildings. The focus is on creating high quality, and making it look and feel very </span><strong data-dcnode-id="7022"><span data-dcnode-id="7023" instrument_node="">exclusive</span></strong><span data-dcnode-id="7021" instrument_node="">, and out of the box.</span></p><span data-dcnode-id="7019" instrument_node="">
</span><p data-dcnode-id="7014"><span data-dcnode-id="7018" instrument_node="">Tom Wright got best known by being the designer of the </span><a data-dcnode-id="7016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jumeirah.com/en/stay/dubai/burj-al-arab-jumeirah"><span data-dcnode-id="7017" instrument_node="">Burj Al Arab</span></a><span data-dcnode-id="7015" instrument_node=""> in Dubai. This building is a luxury hotel that is the fifth tallest hotel in the world, although 39% of its total height is made up of non-occupiable space. The shape of the structure is designed to resemble the sail of a ship.</span></p><span data-dcnode-id="7013" instrument_node="">
</span><p data-dcnode-id="7002"><span data-dcnode-id="7012" instrument_node="">Other famous works of Tom Wright include the </span><strong data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">award-winning</span></strong><span data-dcnode-id="7009" instrument_node=""> </span><a data-dcnode-id="7007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//millenniumresidence.net/"><span data-dcnode-id="7008" instrument_node="">Millenium Residence</span></a><span data-dcnode-id="7006" instrument_node=""> in Bangkok, and the </span><a data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visitabudhabi.ae/en/see.and.do/attractions.and.landmarks/iconic.landmarks/capital.gate.aspx"><span data-dcnode-id="7005" instrument_node="">Capital Gate</span></a><span data-dcnode-id="7003" instrument_node=""> in Abu Dhabi. </span></p><span data-dcnode-id="7001" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="6983"><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wkkarchitects.com/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2213" data-dcnode-id="6995"><span data-dcnode-id="7000" instrument_node="">

</span><h2 data-dcnode-id="6971"><span class="ez-toc-section" data-dcnode-id="6981" id="11_Balkrishna_Doshi_-_The_Aranya_Housing_Project"></span><strong data-dcnode-id="6973"><span data-dcnode-id="6980" instrument_node="">11. </span><a aria-label="Balkrishna Dosh (opens in a new tab)" data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddeeradvocate.com/entertainment/indian-architect-wins-prestigious-pritzker-prize/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6979" instrument_node="">Balkrishna Doshi</span></a><span data-dcnode-id="6977" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architectureindevelopment.org/project.php%3Fid%3D401" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6976" instrument_node="">The Aranya Housing Project</span></a><span data-dcnode-id="6974" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6972"></span></h2><span data-dcnode-id="6970" instrument_node="">
</span><p data-dcnode-id="6963"><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddeeradvocate.com/entertainment/indian-architect-wins-prestigious-pritzker-prize/"><span data-dcnode-id="6969" instrument_node="">Balkrishna Doshi</span></a><span data-dcnode-id="6967" instrument_node="">, was born in 1927 in Pune, India. Doshi is an Indian </span><strong data-dcnode-id="6965"><span data-dcnode-id="6966" instrument_node="">contemporary </span></strong><span data-dcnode-id="6964" instrument_node="">architect, and is also known as the Eco-friendly Architect of the Millennium.</span></p><span data-dcnode-id="6962" instrument_node="">
</span><p data-dcnode-id="6957"><span data-dcnode-id="6961" instrument_node="">Doshi got most famous for his </span><strong data-dcnode-id="6959"><span data-dcnode-id="6960" instrument_node="">low-cost, innovative housing</span></strong><span data-dcnode-id="6958" instrument_node=""> constructions. His goal is to change the residents’ perceptions, to give them back hope.&nbsp;</span></p><span data-dcnode-id="6956" instrument_node="">
</span><p data-dcnode-id="6951"><span data-dcnode-id="6955" instrument_node="">He is considered to be an important figure of Indian architecture and in 2018 he became the first Indian architect to receive the</span><a data-dcnode-id="6953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6954" instrument_node=""> Pritzker Architecture Prize</span></a><span data-dcnode-id="6952" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="6950" instrument_node="">
</span><p data-dcnode-id="6945"><span data-dcnode-id="6949" instrument_node="">One of his most notable works is</span><a data-dcnode-id="6947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architectureindevelopment.org/project.php%3Fid%3D401"><span data-dcnode-id="6948" instrument_node=""> The Aranya Housing Project</span></a><span data-dcnode-id="6946" instrument_node=""> which is considered a model project for his care for third world urban poverty.&nbsp;</span></p><span data-dcnode-id="6944" instrument_node="">
</span><p data-dcnode-id="6936"><span data-dcnode-id="6943" instrument_node="">Other works Doshi is known for are the </span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hiddenarchitecture.net/school-of-architecture/"><span data-dcnode-id="6942" instrument_node="">School of Architecture</span></a><span data-dcnode-id="6940" instrument_node="">, and the </span><a data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architectmagazine.com/project-gallery/life-insurance-corporation-housing_o"><span data-dcnode-id="6939" instrument_node="">Life Insurance Corporation Housing</span></a><span data-dcnode-id="6937" instrument_node="">. Both are located in Ahmedabad, India.</span></p><span data-dcnode-id="6935" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="6920"><picture class="wp-image-2214" data-dcnode-id="6929"><span data-dcnode-id="6934" instrument_node="">

</span><h2 data-dcnode-id="6909"><span class="ez-toc-section" data-dcnode-id="6918" id="12_Ole_Scheeren_-_The_Interlace"></span><strong data-dcnode-id="6911"><span data-dcnode-id="6917" instrument_node="">12. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6916" instrument_node="">Ole Scheeren</span></a><span data-dcnode-id="6914" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/projects/the-interlace" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6913" instrument_node="">The Interlace </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6910"></span></h2><span data-dcnode-id="6908" instrument_node="">
</span><p data-dcnode-id="6901"><a data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/"><span data-dcnode-id="6907" instrument_node="">Ole Scheeren</span></a><span data-dcnode-id="6905" instrument_node=""> was born in 1971 in Karlsruhe, Germany. He is a </span><strong data-dcnode-id="6903"><span data-dcnode-id="6904" instrument_node="">contemporary </span></strong><span data-dcnode-id="6902" instrument_node="">architect and urbanist.&nbsp;</span></p><span data-dcnode-id="6900" instrument_node="">
</span><p data-dcnode-id="6895"><span data-dcnode-id="6899" instrument_node="">Scheeren ambitions to change people’s perceptions and experiences of the world through his buildings. These buildings can best be described as </span><strong data-dcnode-id="6897"><span data-dcnode-id="6898" instrument_node="">hybrid, innovative, and unexpected</span></strong><span data-dcnode-id="6896" instrument_node=""> constructions.</span></p><span data-dcnode-id="6894" instrument_node="">
</span><p data-dcnode-id="6886"><span data-dcnode-id="6893" instrument_node="">Scheeren is seen as a </span><strong data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">visionary of the future</span></strong><span data-dcnode-id="6890" instrument_node="">, who is transforming the landscape we live in. With his </span><strong data-dcnode-id="6888"><span data-dcnode-id="6889" instrument_node="">idealism</span></strong><span data-dcnode-id="6887" instrument_node="">, he tries to solve challenges the society is currently facing.</span></p><span data-dcnode-id="6885" instrument_node="">
</span><p data-dcnode-id="6880"><span data-dcnode-id="6884" instrument_node="">You can see his contemporary architectural style in various buildings such as</span><a data-dcnode-id="6882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/projects/the-interlace"><span data-dcnode-id="6883" instrument_node=""> The Interlace</span></a><span data-dcnode-id="6881" instrument_node=""> in Singapore, which is a large residential complex consisting of a series of apartment blocks stacked diagonally across one another. </span></p><span data-dcnode-id="6879" instrument_node="">
</span><p data-dcnode-id="6874"><span data-dcnode-id="6878" instrument_node="">The concept behind The Interlace was to find a way of creating high-density housing without adding another tower block to Singapore’s skyline.&nbsp; It has won the</span><a data-dcnode-id="6876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/904921/10-years-of-wafs-world-building-of-the-year"><span data-dcnode-id="6877" instrument_node=""> World Building of the year award in 2015</span></a><span data-dcnode-id="6875" instrument_node="">.</span></p><span data-dcnode-id="6873" instrument_node="">
</span><p data-dcnode-id="6865"><span data-dcnode-id="6872" instrument_node="">Some other works Scheeren got famous for are </span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/projects/studio-zx"><span data-dcnode-id="6871" instrument_node="">Studio ZX</span></a><span data-dcnode-id="6869" instrument_node=""> in Beijing, and </span><a data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buro-os.com/projects/fifteen-fifteen-by-ole-scheeren"><span data-dcnode-id="6868" instrument_node="">Fifteen Fifteen</span></a><span data-dcnode-id="6866" instrument_node=""> in Vancouver.</span></p><span data-dcnode-id="6864" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="6855"><figure class="aligncenter" data-dcnode-id="6856"><img alt="The Interlace. Image by: ArchDaily" data-dcnode-id="6863" data-lazy-src="https://images.adsttc.com/media/images/5549/8741/e58e/ce42/3b00/001a/large_jpg/PORTADA_The_Interlace_by_OMA_Ole_Scheeren_photo_--%C2%BC_Iwan_Baan_01.jpg?1430882109" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="6861"><span data-dcnode-id="6862" instrument_node="">&lt;img src="https://images.adsttc.com/media/images/5549/8741/e58e/ce42/3b00/001a/large_jpg/PORTADA_The_Interlace_by_OMA_Ole_Scheeren_photo_--%C2%BC_Iwan_Baan_01.jpg?1430882109" alt="The Interlace. Image by: ArchDaily"/&gt;</span></noscript><figcaption data-dcnode-id="6857"><span data-dcnode-id="6860" instrument_node="">The Interlace. Image by </span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/url%3Fsa%3Di%26url%3Dhttps%253A%252F%252Fwww.archdaily.com%252F627887%252Fthe-interlace-oma-2%26psig%3DAOvVaw3NXCctZJ4aVWpRgsJGw6xL%26ust%3D1600163080413000%26source%3Dimages%26cd%3Dvfe%26ved%3D0CA0QjhxqFwoTCNDPg-eu6OsCFQAAAAAdAAAAABAL"><span data-dcnode-id="6859" instrument_node="">ArchDaily</span></a></figcaption></figure></div><span data-dcnode-id="6854" instrument_node="">
</span><h2 data-dcnode-id="6844"><span class="ez-toc-section" data-dcnode-id="6853" id="13_Peter_Eisenman_-_Holocaust_Memorial"></span><strong data-dcnode-id="6846"><span data-dcnode-id="6852" instrument_node="">13. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eisenmanarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6851" instrument_node="">Peter Eisenman</span></a><span data-dcnode-id="6849" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Memorial_to_the_Murdered_Jews_of_Europe" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6848" instrument_node="">Holocaust Memorial</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6845"></span></h2><span data-dcnode-id="6843" instrument_node="">
</span><p data-dcnode-id="6839"><a data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eisenmanarchitects.com/"><span data-dcnode-id="6842" instrument_node="">Peter Eisenman</span></a><span data-dcnode-id="6840" instrument_node=""> was born in 1932 in New Jersey, United States. He is considered to be part of the New York Five, a group of world-renowned architects of New York City.</span></p><span data-dcnode-id="6838" instrument_node="">
</span><p data-dcnode-id="6830"><span data-dcnode-id="6837" instrument_node="">Eisenman’s style mainly focuses on </span><strong data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">high modernism</span></strong><span data-dcnode-id="6834" instrument_node=""> or </span><strong data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">deconstruction</span></strong><span data-dcnode-id="6831" instrument_node=""> architecture.&nbsp;</span></p><span data-dcnode-id="6829" instrument_node="">
</span><p data-dcnode-id="6827"><span data-dcnode-id="6828" instrument_node="">He has won multiple awards for his large-scale housing and urban design works, educational designs, and private house architecture.</span></p><span data-dcnode-id="6826" instrument_node="">
</span><p data-dcnode-id="6821"><span data-dcnode-id="6825" instrument_node="">Besides, he got known for his writings and teachings on architecture, and his goal to </span><strong data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">liberate architectural buildings</span></strong><span data-dcnode-id="6822" instrument_node=""> (which led to multiple flawed buildings, was later discovered).</span></p><span data-dcnode-id="6820" instrument_node="">
</span><p data-dcnode-id="6815"><span data-dcnode-id="6819" instrument_node="">One of Eisenman’s most notable works is the</span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eisenmanarchitects.com/Berlin-Memorial-to-the-Murdered-Jews-of-Europe-2005"><span data-dcnode-id="6818" instrument_node=""> Holocaust Memorial</span></a><span data-dcnode-id="6816" instrument_node=""> in Berlin.</span></p><span data-dcnode-id="6814" instrument_node="">
</span><p data-dcnode-id="6812"><span data-dcnode-id="6813" instrument_node="">The monument is a memorial to the Jewish victims of the Holocaust, and it is designed in such a manner that there is no specific end.</span></p><span data-dcnode-id="6811" instrument_node="">
</span><p data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">Just like the Holocaust, there is no possibility to really understand it. Time does not play a particular role, and the individual experience is the main important factor.</span></p><span data-dcnode-id="6808" instrument_node="">
</span><p data-dcnode-id="6800"><span data-dcnode-id="6807" instrument_node="">Next to this monument, other famous works of Eisenman include the </span><a data-dcnode-id="6805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eisenmanarchitects.com/Liget-Budapest-House-of-Music-2015"><span data-dcnode-id="6806" instrument_node="">Liget Budapest House of Music</span></a><span data-dcnode-id="6804" instrument_node=""> in Hungary, and the </span><a data-dcnode-id="6802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eisenmanarchitects.com/City-of-Culture-of-Galicia-2011"><span data-dcnode-id="6803" instrument_node="">City of Culture of Galicia</span></a><span data-dcnode-id="6801" instrument_node=""> in Spain.</span></p><span data-dcnode-id="6799" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="6790"><figure class="aligncenter" data-dcnode-id="6791"><img alt="Memorial for the murdered jews of europe in Berlin" data-dcnode-id="6798" data-lazy-src="https://berlinexperiences.com/wp-content/uploads/2020/03/berlinexperiences_featuredexperience_holocaustmemorial_0.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">&lt;img src="https://berlinexperiences.com/wp-content/uploads/2020/03/berlinexperiences_featuredexperience_holocaustmemorial_0.jpg" alt="Memorial for the murdered jews of europe in Berlin"/&gt;</span></noscript><figcaption data-dcnode-id="6792"><span data-dcnode-id="6795" instrument_node="">The Holocaust Memorial. Image by: </span><a data-dcnode-id="6793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//berlinexperiences.com/featured-experiences/journey-into-the-memorial-for-the-murdered-jews-of-europe/"><span data-dcnode-id="6794" instrument_node="">Berlin Experiences</span></a></figcaption></figure></div><span data-dcnode-id="6789" instrument_node="">
</span><h2 data-dcnode-id="6779"><span class="ez-toc-section" data-dcnode-id="6788" id="14_Eduardo_Souto_de_Moura_-_Paula_Rego_Museum"></span><strong data-dcnode-id="6781"><span data-dcnode-id="6787" instrument_node="">14. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eduardo_Souto_de_Moura" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6786" instrument_node="">Eduardo Souto de Moura</span></a><span data-dcnode-id="6784" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casadashistoriaspaularego.com/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6783" instrument_node="">Paula Rego Museum </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6780"></span></h2><span data-dcnode-id="6778" instrument_node="">
</span><p data-dcnode-id="6765"><a data-dcnode-id="6776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/laureates/2011"><span data-dcnode-id="6777" instrument_node="">Eduardo Souto de Moura</span></a><span data-dcnode-id="6775" instrument_node=""> is an architect born in 1952 in Porto, Portugal. His major works include a </span><strong data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">contemporary </span></strong><span data-dcnode-id="6772" instrument_node="">building design of </span><strong data-dcnode-id="6770"><span data-dcnode-id="6771" instrument_node="">conservatism </span></strong><span data-dcnode-id="6769" instrument_node="">and </span><strong data-dcnode-id="6767"><span data-dcnode-id="6768" instrument_node="">modernism</span></strong><span data-dcnode-id="6766" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="6764" instrument_node="">
</span><p data-dcnode-id="6759"><span data-dcnode-id="6763" instrument_node="">He is sometimes considered to be a </span><strong data-dcnode-id="6761"><span data-dcnode-id="6762" instrument_node="">neo-Miesian</span></strong><span data-dcnode-id="6760" instrument_node=""> architect, however he himself replies that certainly he had some Miesian influence, but remains to be original.</span></p><span data-dcnode-id="6758" instrument_node="">
</span><p data-dcnode-id="6750"><span data-dcnode-id="6757" instrument_node="">Souto de Moura is always looking for this </span><strong data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">originality </span></strong><span data-dcnode-id="6754" instrument_node="">and </span><strong data-dcnode-id="6752"><span data-dcnode-id="6753" instrument_node="">uniqueness </span></strong><span data-dcnode-id="6751" instrument_node="">in his works. Besides, paying attention to the global challenges, such as environmental issues, is normal to him.</span></p><span data-dcnode-id="6749" instrument_node="">
</span><p data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">He is known for his well-executed material use, and his often extraordinary colour use.&nbsp;</span></p><span data-dcnode-id="6746" instrument_node="">
</span><p data-dcnode-id="6741"><span data-dcnode-id="6745" instrument_node="">In 2011 he won the</span><a data-dcnode-id="6743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6744" instrument_node=""> Pritzker Architecture Prize</span></a><span data-dcnode-id="6742" instrument_node=""> in 2011. This prize is given to architects who have significantly altered society and humanity in a positive manner.</span></p><span data-dcnode-id="6740" instrument_node="">
</span><p data-dcnode-id="6732"><span data-dcnode-id="6739" instrument_node="">One of his marvellous pieces of architecture is the</span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casadashistoriaspaularego.com/en/"><span data-dcnode-id="6738" instrument_node=""> Paula Rego Museum</span></a><span data-dcnode-id="6736" instrument_node=""> in Lisbon. The design was made in concordance with</span><a data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/artanddesign/2018/nov/11/paula-rego-it-isnt-nice-in-my-mind"><span data-dcnode-id="6735" instrument_node=""> Paula Rego’s</span></a><span data-dcnode-id="6733" instrument_node=""> wishes. She stated that the building should be “fun, lively and also a bit mischievous”.</span></p><span data-dcnode-id="6731" instrument_node="">
</span><p data-dcnode-id="6723"><span data-dcnode-id="6730" instrument_node="">Some other famous architecture of Souto de Moura include </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/143195/braga-municipal-stadium-eduardo-souto-de-moura"><span data-dcnode-id="6729" instrument_node="">Estádio Municipal de Braga</span></a><span data-dcnode-id="6727" instrument_node="">, and </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//divisare.com/projects/287561-eduardo-souto-de-moura-luis-ferreira-alves-casa-do-cinema"><span data-dcnode-id="6726" instrument_node="">Casa do Cinema</span></a><span data-dcnode-id="6724" instrument_node="">, both in Portugal.</span></p><span data-dcnode-id="6722" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6702"><figure class="aligncenter" data-dcnode-id="6703"><a data-dcnode-id="6712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casadashistoriaspaularego.com/en/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2218" data-dcnode-id="6716"><span data-dcnode-id="6721" instrument_node="">

</span><h2 data-dcnode-id="6691"><span class="ez-toc-section" data-dcnode-id="6700" id="15_Kazuyo_Sejima_-_Rolex_Learning_Center"></span><strong data-dcnode-id="6693"><span data-dcnode-id="6699" instrument_node=""> 15. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sanaa.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6698" instrument_node="">Kazuyo Sejima</span></a><span data-dcnode-id="6696" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epfl.ch/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6695" instrument_node="">Rolex Learning Center </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6692"></span></h2><span data-dcnode-id="6690" instrument_node="">
</span><p data-dcnode-id="6683"><a data-dcnode-id="6688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sanaa.co.jp/"><span data-dcnode-id="6689" instrument_node="">Kazuyo Sejima</span></a><span data-dcnode-id="6687" instrument_node=""> was born in 1956 in Ibaraki, Japan. She is known for her </span><strong data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">clear modernist </span></strong><span data-dcnode-id="6684" instrument_node="">elements in her designs.</span></p><span data-dcnode-id="6682" instrument_node="">
</span><p data-dcnode-id="6677"><span data-dcnode-id="6681" instrument_node="">In 1995 she decided to partner up with Ryue Nishizawa, one of her former employees, into the architecture studio SANAA. In 2010 SANAA won the </span><a data-dcnode-id="6679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6680" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="6678" instrument_node="">.</span></p><span data-dcnode-id="6676" instrument_node="">
</span><p data-dcnode-id="6668"><span data-dcnode-id="6675" instrument_node="">Their focus is on exploring the </span><strong data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">relationship between interior and exterior</span></strong><span data-dcnode-id="6672" instrument_node=""> space. The buildings are known to </span><strong data-dcnode-id="6670"><span data-dcnode-id="6671" instrument_node="">reflect their surroundings</span></strong><span data-dcnode-id="6669" instrument_node="">.</span></p><span data-dcnode-id="6667" instrument_node="">
</span><p data-dcnode-id="6662"><span data-dcnode-id="6666" instrument_node="">Sejima got famous for her buildings with </span><strong data-dcnode-id="6664"><span data-dcnode-id="6665" instrument_node="">large windows</span></strong><span data-dcnode-id="6663" instrument_node="">, which create a fluid transition between interior and exterior.&nbsp;</span></p><span data-dcnode-id="6661" instrument_node="">
</span><p data-dcnode-id="6656"><span data-dcnode-id="6660" instrument_node="">One of these buildings that describe Sejima’s style is the</span><a data-dcnode-id="6658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epfl.ch/en/"><span data-dcnode-id="6659" instrument_node=""> Rolex Learning Center</span></a><span data-dcnode-id="6657" instrument_node=""> in Switzerland.</span></p><span data-dcnode-id="6655" instrument_node="">
</span><p data-dcnode-id="6647"><span data-dcnode-id="6654" instrument_node="">Some other distinctive buildings are the </span><a data-dcnode-id="6652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architecturetokyo.wordpress.com/2017/06/18/2003-dior-omotesando-sanaa/"><span data-dcnode-id="6653" instrument_node="">Christian Dior Building</span></a><span data-dcnode-id="6651" instrument_node=""> in Tokyo, and </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archiweb.cz/en/b/de-kunstlinie-mestske-divadlo-a-umelecke-centrum"><span data-dcnode-id="6650" instrument_node="">De Kunstlinie Theater and Cultural Center</span></a><span data-dcnode-id="6648" instrument_node=""> in Almere.</span></p><span data-dcnode-id="6646" instrument_node="">

</span><h2 data-dcnode-id="6613"><span class="ez-toc-section" data-dcnode-id="6622" id="16_Moshe_Safdie_-_Habitat_67"></span><strong data-dcnode-id="6615"><span data-dcnode-id="6621" instrument_node="">16. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safdiearchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6620" instrument_node="">Moshe Safdie</span></a><span data-dcnode-id="6618" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat67.com/en/homage/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6617" instrument_node="">Habitat 67 </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6614"></span></h2><span data-dcnode-id="6612" instrument_node="">
</span><p data-dcnode-id="6605"><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safdiearchitects.com/"><span data-dcnode-id="6611" instrument_node="">Moshe Safdie,</span></a><span data-dcnode-id="6609" instrument_node=""> was born in 1938. He is a </span><strong data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">contemporary </span></strong><span data-dcnode-id="6606" instrument_node="">Israeli-Canadian architect, urban designer, educator, theorist, and author.</span></p><span data-dcnode-id="6604" instrument_node="">
</span><p data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">In 1964 Safdie founded Safdie Architects, which currently has offices in Shanghai, Singapore, Israel and the USA.</span></p><span data-dcnode-id="6601" instrument_node="">
</span><p data-dcnode-id="6593"><span data-dcnode-id="6600" instrument_node="">The core principles of Safdie Architects are </span><strong data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">idealism </span></strong><span data-dcnode-id="6597" instrument_node="">and </span><strong data-dcnode-id="6595"><span data-dcnode-id="6596" instrument_node="">innovation</span></strong><span data-dcnode-id="6594" instrument_node="">. Their buildings are solving challenges in inventive ways.&nbsp;</span></p><span data-dcnode-id="6592" instrument_node="">
</span><p data-dcnode-id="6584"><span data-dcnode-id="6591" instrument_node="">Besides, their buildings are known to involve a lot of </span><strong data-dcnode-id="6589"><span data-dcnode-id="6590" instrument_node="">natural light</span></strong><span data-dcnode-id="6588" instrument_node="">, as well as </span><strong data-dcnode-id="6586"><span data-dcnode-id="6587" instrument_node="">greenery</span></strong><span data-dcnode-id="6585" instrument_node="">.</span></p><span data-dcnode-id="6583" instrument_node="">
</span><p data-dcnode-id="6581"><span data-dcnode-id="6582" instrument_node="">Safdie is famous for architecture which bends lines and curves to create geometry that has never been defined before.</span></p><span data-dcnode-id="6580" instrument_node="">
</span><p data-dcnode-id="6572"><span data-dcnode-id="6579" instrument_node="">He is most identified with</span><a data-dcnode-id="6577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat67.com/en/"><span data-dcnode-id="6578" instrument_node=""> Habitat 67</span></a><span data-dcnode-id="6576" instrument_node="">, which paved the way for his international career. </span><a data-dcnode-id="6574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat67.com/en/"><span data-dcnode-id="6575" instrument_node="">Habitat </span></a><span data-dcnode-id="6573" instrument_node="">is a model community and housing complex in Montreal and is considered one of the most recognizable and spectacular buildings in Canada.</span></p><span data-dcnode-id="6571" instrument_node="">
</span><p data-dcnode-id="6563"><span data-dcnode-id="6570" instrument_node="">Some other works that are distinctive for Safdie’s style are the </span><a data-dcnode-id="6568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safdiearchitects.com/projects/jewel-changi-airport"><span data-dcnode-id="6569" instrument_node="">Jewel Changi Airport</span></a><span data-dcnode-id="6567" instrument_node=""> in Singapore, and the </span><a data-dcnode-id="6565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.safdiearchitects.com/projects/kauffman-center-for-the-performing-arts"><span data-dcnode-id="6566" instrument_node="">Kauffman Center for the Performing Arts</span></a><span data-dcnode-id="6564" instrument_node=""> in Kansas.</span></p><span data-dcnode-id="6562" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6539"><figure class="aligncenter" data-dcnode-id="6540"><a data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.habitat67.com/en/homage/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2223" data-dcnode-id="6556"><span data-dcnode-id="6561" instrument_node="">
