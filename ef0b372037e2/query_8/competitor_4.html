</span><p data-dcnode-id="2113"><a aria-label=" (opens in a new tab)" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skuratov-arch.ru/%3Flang%3Den" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2119" instrument_node="">Sergey Skuratov</span></a><span data-dcnode-id="2117" instrument_node="">, born in 1955, is an award-winning Russian architect, winning the Architect Of The Year place at </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urbanawards.ru/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2116" instrument_node="">Urban Awards</span></a><span data-dcnode-id="2114" instrument_node=""> in 2012. </span></p><span data-dcnode-id="2112" instrument_node="">

</span><p data-dcnode-id="1969"><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.slideshare.net/MayurWaghulde3/parliament-library-new-delhi" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1977" instrument_node="">Inspired by the </span><strong data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">traditional relationship between Guru and King</span></strong></a><span data-dcnode-id="1973" instrument_node="">, Rewal deigned the library to appear </span><strong data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">powerful without overshadowing the Parliament building</span></strong><span data-dcnode-id="1970" instrument_node="">. </span></p><span data-dcnode-id="1968" instrument_node="">

</span><h2 data-dcnode-id="1939"><span class="ez-toc-section" data-dcnode-id="1949" id="86_Rahul_Mehrotra_-_The_KMC_Corporate_Office"></span><strong data-dcnode-id="1941"><span data-dcnode-id="1948" instrument_node="">86. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1947" instrument_node="">Rahul Mehrotra </span></a><span data-dcnode-id="1945" instrument_node="">– </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/architecture/kmc-corporate-office/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1944" instrument_node="">The KMC Corporate Office</span></a><span data-dcnode-id="1942" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="1940"></span></h2><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1931"><a aria-label=" (opens in a new tab)" data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1937" instrument_node="">Rahul Mehrotra</span></a><span data-dcnode-id="1935" instrument_node=""> is an Indian architect and founder of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1934" instrument_node="">RMA Architects</span></a><span data-dcnode-id="1932" instrument_node="">. The firm is known for the equal importance that they give to urban design, architecture, planning, landscape, and historic preservation.</span></p><span data-dcnode-id="1930" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1929" instrument_node="">One of their most famous projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/architecture/kmc-corporate-office/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1928" instrument_node="">KMC Corporate Office</span></a><span data-dcnode-id="1926" instrument_node="">, which illustrates </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1925" instrument_node="">Rahul Mehrotra</span></a><span data-dcnode-id="1923" instrument_node="">’s style; the building is able to control the amount of light and air that circulates inside the construction.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1920" instrument_node="">The KMC Corporate Office opened in </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/384408/kmc-corporate-office-rma-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1919" instrument_node="">2012</span></a><span data-dcnode-id="1917" instrument_node=""> and is strikingly special in its </span><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">focus on indoor climate</span></strong><span data-dcnode-id="1914" instrument_node="">.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1911" instrument_node="">The building has particular elements that ensure a cool and comfortable workspace throughout the hotter months in India. </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rmaarchitects.com/architecture/kmc-corporate-office/%23%3A~%3Atext%3DLocated%2520in%2520CyberCity%252CHyderabad%252C%2520this%2Cevaporative%2520cooling%2520for%2520the%2520interiors." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1910" instrument_node="">These elements include </span><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">a screen that humidifies all incoming air</span></strong><span data-dcnode-id="1907" instrument_node=""> as well </span><strong data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">as a misting system.</span></strong><span data-dcnode-id="1904" instrument_node=""> </span></a><span data-dcnode-id="1902" instrument_node=""> </span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1899" instrument_node="">Fun fact: </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/384408/kmc-corporate-office-rma-architects" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">20 gardener</span></strong></a><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">s</span></strong><span data-dcnode-id="1893" instrument_node=""> are employed to keep </span><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">the buildings facade healthy and thriving. </span></strong></p><span data-dcnode-id="1889" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1872"><figure class="aligncenter" data-dcnode-id="1873"><picture class="wp-image-2336" data-dcnode-id="1883"><span data-dcnode-id="1888" instrument_node="">

</span><h2 data-dcnode-id="1860"><span class="ez-toc-section" data-dcnode-id="1870" id="87_Sanjeev_Panjabi_Sangeeta_Merchant_-_The_Exim_Tower"></span><strong data-dcnode-id="1862"><span data-dcnode-id="1869" instrument_node="">87. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spasmindia.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1868" instrument_node="">Sanjeev Panjabi &amp; Sangeeta Merchant</span></a><span data-dcnode-id="1866" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architizer.com/projects/exim-tower/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1865" instrument_node="">The Exim Tower</span></a><span data-dcnode-id="1863" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="1861"></span></h2><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1852"><a aria-label=" (opens in a new tab)" data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spasmindia.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1858" instrument_node="">Sanjeev Panjabi and Sangeeta Merchant</span></a><span data-dcnode-id="1856" instrument_node=""> are two Indian architects and founders of</span><a aria-label=" (opens in a new tab)" data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spasmindia.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1855" instrument_node=""> SPASM Design Architects</span></a><span data-dcnode-id="1853" instrument_node="">, one of the best firms in the country. </span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">Their work includes family houses, luxury villas or commercial towers. One work that is included here is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architizer.com/projects/exim-tower/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1849" instrument_node="">Exim Tower</span></a><span data-dcnode-id="1847" instrument_node="">, which is in concordance with the Indian tradition and the firm style.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1844" instrument_node="">The Exim Tower was opened in </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/72087/exim-tower-spasm-design-architects"><span data-dcnode-id="1843" instrument_node="">2009 and its 15 stories span across 1541m²</span></a><span data-dcnode-id="1841" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1835"><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/72087/exim-tower-spasm-design-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1838" instrument_node="">According to the architects themselves</span></a><span data-dcnode-id="1836" instrument_node="">, the main focus was on human comfort: “We chose to bring value to the project through the comfort of human occupation in the hope of enhanced productivity and creating a local icon.”</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1833" instrument_node="">As such, the architects chose elements which “</span><a data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/72087/exim-tower-spasm-design-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1832" instrument_node="">provide spaces sensitized to human needs and experiences.</span></a><span data-dcnode-id="1830" instrument_node="">“</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1827" instrument_node="">Elements such as </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/72087/exim-tower-spasm-design-architects" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">shaded terraces</span></strong><span data-dcnode-id="1824" instrument_node="">, </span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">a noise-buffering stainless steel mesh covering</span></strong><span data-dcnode-id="1821" instrument_node="">, and </span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">lots and lots of natural lights</span></strong></a><span data-dcnode-id="1817" instrument_node=""> further support the architects’ vision of creating a working place that allows for comfort for its inhabitants.&nbsp;</span></p><span data-dcnode-id="1815" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1798"><figure class="aligncenter" data-dcnode-id="1799"><picture class="wp-image-2337" data-dcnode-id="1809"><span data-dcnode-id="1814" instrument_node="">

</span><h2 data-dcnode-id="1783"><span class="ez-toc-section" data-dcnode-id="1796" id="88_Christopher_Lee_Serie_Architects_-_The_Jameel_Arts_Centre_Dubai"></span><strong data-dcnode-id="1792"><span data-dcnode-id="1795" instrument_node="">88. </span><a aria-label="Christopher Lee, Serie Architects (opens in a new tab)" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serie.co.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1794" instrument_node="">Christopher Lee</span></a></strong><a aria-label="Christopher Lee, Serie Architects (opens in a new tab)" data-dcnode-id="1790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serie.co.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1791" instrument_node="">, Serie Architects</span></a><span data-dcnode-id="1789" instrument_node="">&nbsp;</span><strong data-dcnode-id="1785"><span data-dcnode-id="1788" instrument_node="">– </span><a aria-label="The Jameel Arts Centre Dubai  (opens in a new tab)" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jameelartscentre.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1787" instrument_node="">The Jameel Arts Centre Dubai </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="1784"></span></h2><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1778"><a aria-label=" (opens in a new tab)" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serie.co.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1781" instrument_node="">Serie Architects</span></a><span data-dcnode-id="1779" instrument_node=""> are focusing on architecture, urban design and research.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">One of their well-known projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jameelartscentre.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1775" instrument_node="">Jameel Arts Centre Dubai</span></a><span data-dcnode-id="1773" instrument_node="">, where their focus on space efficiency and elegance can be seen, as well as the relation between inside and outside, art and nature.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1763"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906190/jameel-arts-centre-dubai-serie-architects"><strong data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Opened in 2018, Arts Centre spans across 10.000m² </span></strong></a><span data-dcnode-id="1767" instrument_node="">and is actually “the first non-governmental contemporary arts institution of its kind in the Golf”, according to </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906190/jameel-arts-centre-dubai-serie-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">ArchDaily.</span></a><span data-dcnode-id="1764" instrument_node=""> </span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1761" instrument_node="">The entire vision is inspired by both the </span><strong data-dcnode-id="1758"><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906190/jameel-arts-centre-dubai-serie-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1760" instrument_node="">early Emirati Sha’abi houses</span></a></strong><span data-dcnode-id="1757" instrument_node=""> and </span><strong data-dcnode-id="1754"><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906190/jameel-arts-centre-dubai-serie-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1756" instrument_node="">the Madinat style of city planning</span></a></strong><span data-dcnode-id="1753" instrument_node="">.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1742"><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906190/jameel-arts-centre-dubai-serie-architects" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Christopher Lee</span></strong><span data-dcnode-id="1748" instrument_node=""> </span></a><span data-dcnode-id="1746" instrument_node="">from Serie Architects says that the collaboration with Art Jamal has resulted in “architecture that … acts as a </span><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">background structure for the life of the center to unfold</span></strong><span data-dcnode-id="1743" instrument_node="">.”</span></p><span data-dcnode-id="1741" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1723"><figure class="aligncenter" data-dcnode-id="1724"><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jameelartscentre.org/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2338" data-dcnode-id="1735"><span data-dcnode-id="1740" instrument_node="">

</span><h2 data-dcnode-id="1706"><span class="ez-toc-section" data-dcnode-id="1716" id="Xavier_Vilalta_Vilalta_Studio_-_LidetaMercato_in_Ethiopia"></span><span data-dcnode-id="1715" instrument_node="">Xavier Vilalta, </span><strong data-dcnode-id="1712"><a aria-label="Vilalta Studio (opens in a new tab)" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vilalta.studio/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1714" instrument_node="">Vilalta Studio</span></a></strong><span data-dcnode-id="1711" instrument_node=""> – </span><a aria-label="LidetaMercato (opens in a new tab)" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vilalta.studio/en/portfolio-item/lideta-mercato/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1710" instrument_node="">LidetaMercato</span></a><span data-dcnode-id="1708" instrument_node=""> in Ethiopia.</span><span class="ez-toc-section-end" data-dcnode-id="1707"></span></h2><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Vilalta Studio operates in the fields of architecture, urbanism and design. Declaring that “we love nature and we care about people”, firms design philosophy is to connect the old and the new.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">The Lideta Mercato was intended to be a shopping mall just like many others in the city of Addis Ababa. Common issues of the existing malls in the city were uncomfortable thermal conditions and over-illumination in the interiors. </span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">The observation of the Old Mercato, the largest open-air market in Africa, was an inspiration to redefine the program of the building, conceiving a multi-story contemporary market instead of a conventional shopping mall based on large shops.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">The skin of the building was designed considering the local climate conditions and traditions. The facade acts as protection from the sun, controlling the natural light and ventilation in the interior spaces. </span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">It was built using a lightweight concrete prefab system, and the shapes come from a traditional Ethiopian fractal pattern commonly found in the local fabrics.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1673"><figure class="aligncenter size-full" data-dcnode-id="1674"><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vilalta.studio/en/portfolio-item/lideta-mercato/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-5555" data-dcnode-id="1684"><span data-dcnode-id="1689" instrument_node="">
