</span><h2 data-dcnode-id="6527"><span class="ez-toc-section" data-dcnode-id="6537" id="17_Shigeru_Ban_-_The_Paper_Dome"></span><strong data-dcnode-id="6529"><span data-dcnode-id="6536" instrument_node="">17. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6535" instrument_node="">Shigeru Ban</span></a><span data-dcnode-id="6533" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paper_Dome" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6532" instrument_node="">The Paper Dome</span></a><span data-dcnode-id="6530" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6528"></span></h2><span data-dcnode-id="6526" instrument_node="">
</span><p data-dcnode-id="6522"><a data-dcnode-id="6524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/"><span data-dcnode-id="6525" instrument_node="">Shigeru Ban</span></a><span data-dcnode-id="6523" instrument_node=""> was born in 1957 in Tokyo, Japan. In 1985 he started his own firm, Shigeru Ban Architecture.</span></p><span data-dcnode-id="6521" instrument_node="">
</span><p data-dcnode-id="6516"><span data-dcnode-id="6520" instrument_node="">In 2014, Ban won the </span><a data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6519" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="6517" instrument_node="">.</span></p><span data-dcnode-id="6515" instrument_node="">
</span><p data-dcnode-id="6510"><span data-dcnode-id="6514" instrument_node="">Ban is known for his works made with </span><strong data-dcnode-id="6512"><span data-dcnode-id="6513" instrument_node="">unconventional and innovative materials</span></strong><span data-dcnode-id="6511" instrument_node="">, like paper and (recycled) cardboard.&nbsp;</span></p><span data-dcnode-id="6509" instrument_node="">
</span><p data-dcnode-id="6504"><span data-dcnode-id="6508" instrument_node="">He focuses on </span><strong data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">incorporating humanity factors</span></strong><span data-dcnode-id="6505" instrument_node="">, and making the building blend with its surroundings.</span></p><span data-dcnode-id="6503" instrument_node="">
</span><p data-dcnode-id="6501"><span data-dcnode-id="6502" instrument_node="">Part of his architecture aims to help disaster victims worldwide, but Ban also designs housing, cultural, and industrial buildings.</span></p><span data-dcnode-id="6500" instrument_node="">
</span><p data-dcnode-id="6492"><span data-dcnode-id="6499" instrument_node="">His designs are </span><strong data-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node="">minimalist </span></strong><span data-dcnode-id="6496" instrument_node="">and require only the necessary building material. One of these types of works is the</span><a data-dcnode-id="6494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/works/2008_paper-dome-taiwan/index.html"><span data-dcnode-id="6495" instrument_node=""> Paper Dome,</span></a><span data-dcnode-id="6493" instrument_node=""> a temporary church building located in Taiwan.&nbsp;</span></p><span data-dcnode-id="6491" instrument_node="">
</span><p data-dcnode-id="6483"><span data-dcnode-id="6490" instrument_node="">One of his human aid designs was the </span><a data-dcnode-id="6488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/works/2014_PaperEmergencyShelter-Philippines/index.html"><span data-dcnode-id="6489" instrument_node="">Temporary Paper Log House</span></a><span data-dcnode-id="6487" instrument_node=""> in the Philippines. One famous culturally-minded building is </span><a data-dcnode-id="6485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/works/2017_ileseguin/index.html"><span data-dcnode-id="6486" instrument_node="">La Seine Musicale</span></a><span data-dcnode-id="6484" instrument_node="">, which is located in France.</span></p><span data-dcnode-id="6482" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6462"><figure class="aligncenter" data-dcnode-id="6463"><a data-dcnode-id="6472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shigerubanarchitects.com/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2228" data-dcnode-id="6476"><span data-dcnode-id="6481" instrument_node="">

</span><h2 data-dcnode-id="6450"><span class="ez-toc-section" data-dcnode-id="6460" id="18_David_Chipperfield_-_The_Hepworth_Wakefield"></span><strong data-dcnode-id="6452"><span data-dcnode-id="6459" instrument_node="">18. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davidchipperfield.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6458" instrument_node="">David Chipperfield </span></a><span data-dcnode-id="6456" instrument_node="">– </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hepworthwakefield.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6455" instrument_node="">The Hepworth Wakefield</span></a><span data-dcnode-id="6453" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6451"></span></h2><span data-dcnode-id="6449" instrument_node="">
</span><p data-dcnode-id="6442"><a data-dcnode-id="6447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davidchipperfield.com/"><span data-dcnode-id="6448" instrument_node="">David Chipperfield</span></a><span data-dcnode-id="6446" instrument_node=""> was born in 1953 in London, United Kingdom. He is renowned for his </span><strong data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">contemporary </span></strong><span data-dcnode-id="6443" instrument_node="">architectural style.</span></p><span data-dcnode-id="6441" instrument_node="">
</span><p data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">In 1985 he founded David Chipperfield Architects, which currently has offices in London, Berlin, Milan and Shanghai.&nbsp;</span></p><span data-dcnode-id="6438" instrument_node="">
</span><p data-dcnode-id="6430"><span data-dcnode-id="6437" instrument_node="">Chipperfield got mostly known for his strong focus on </span><strong data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">refining </span></strong><span data-dcnode-id="6434" instrument_node="">a project into each little detail, to eventually end up with a construction that is </span><strong data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node="">consistent </span></strong><span data-dcnode-id="6431" instrument_node="">in architectural, social and intellectual aspects involved with the building.</span></p><span data-dcnode-id="6429" instrument_node="">
</span><p data-dcnode-id="6424"><span data-dcnode-id="6428" instrument_node="">David Chipperfield Architects has a broad </span><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davidchipperfield.com/profile"><span data-dcnode-id="6427" instrument_node="">portfolio</span></a><span data-dcnode-id="6425" instrument_node="">, with buildings and spaces for both the private and public sector, all with different purposes. Besides, they have developed multiple civic designs, and urban master plans.</span></p><span data-dcnode-id="6423" instrument_node="">
</span><p data-dcnode-id="6418"><span data-dcnode-id="6422" instrument_node="">It is mention worthy that the company has received many international </span><strong data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">awards and citations</span></strong><span data-dcnode-id="6419" instrument_node=""> over time.</span></p><span data-dcnode-id="6417" instrument_node="">
</span><p data-dcnode-id="6409"><span data-dcnode-id="6416" instrument_node="">One of Chipperfield’s buildings that describes his style the best is</span><a data-dcnode-id="6414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hepworthwakefield.org/"><span data-dcnode-id="6415" instrument_node=""> The Hepworth Wakefield</span></a><span data-dcnode-id="6413" instrument_node=""> in West Yorkshire. Within this design, he focused on the heritage of the area, the view on the waterside, and the allowance for much </span><strong data-dcnode-id="6411"><span data-dcnode-id="6412" instrument_node="">daylight </span></strong><span data-dcnode-id="6410" instrument_node="">into the gallery.</span></p><span data-dcnode-id="6408" instrument_node="">
</span><p data-dcnode-id="6400"><span data-dcnode-id="6407" instrument_node="">Some of his other works include the </span><a data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davidchipperfield.com/project/amorepacific_headquarters"><span data-dcnode-id="6406" instrument_node="">Amorepacific Headquarters</span></a><span data-dcnode-id="6404" instrument_node=""> in Seoul, and the </span><a data-dcnode-id="6402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davidchipperfield.com/project/museum_of_modern_literature"><span data-dcnode-id="6403" instrument_node="">Museum of Modern Literature</span></a><span data-dcnode-id="6401" instrument_node=""> in Marbach am Neckar.</span></p><span data-dcnode-id="6399" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6380"><figure class="aligncenter" data-dcnode-id="6381"><a data-dcnode-id="6389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hepworthwakefield.org/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2229" data-dcnode-id="6393"><span data-dcnode-id="6398" instrument_node="">

</span><h2 data-dcnode-id="6368"><span class="ez-toc-section" data-dcnode-id="6378" id="19_Fumihiko_Maki_-_The_Tokyo_Metropolitan_Gymnasium"></span><strong data-dcnode-id="6370"><span data-dcnode-id="6377" instrument_node="">19. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maki-and-associates.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6376" instrument_node="">Fumihiko Maki</span></a><span data-dcnode-id="6374" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tef.or.jp/tmg/en_index.jsp" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6373" instrument_node="">The Tokyo Metropolitan Gymnasium</span></a><span data-dcnode-id="6371" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6369"></span></h2><span data-dcnode-id="6367" instrument_node="">
</span><p data-dcnode-id="6363"><a data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maki-and-associates.co.jp/"><span data-dcnode-id="6366" instrument_node="">Fumihiko Maki</span></a><span data-dcnode-id="6364" instrument_node=""> was born in 1928 in Tokyo, Japan. In 1965 he opened his own firm, Maki and Associates – Architecture and Planning.</span></p><span data-dcnode-id="6362" instrument_node="">
</span><p data-dcnode-id="6357"><span data-dcnode-id="6361" instrument_node="">Back in 1993 he received the</span><a data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6360" instrument_node=""> Pritzker Prize</span></a><span data-dcnode-id="6358" instrument_node=""> for his work. This prize is known to explore pioneering uses of new materials and fuses the cultures of east and west.</span></p><span data-dcnode-id="6356" instrument_node="">
</span><p data-dcnode-id="6342"><span data-dcnode-id="6355" instrument_node="">Maki perceives himself as a </span><strong data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">modernist</span></strong><span data-dcnode-id="6352" instrument_node=""> architect. Like most modernist artists, he frequently uses </span><strong data-dcnode-id="6350"><span data-dcnode-id="6351" instrument_node="">metal</span></strong><span data-dcnode-id="6349" instrument_node="">, </span><strong data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">concrete </span></strong><span data-dcnode-id="6346" instrument_node="">and </span><strong data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">glass</span></strong><span data-dcnode-id="6343" instrument_node="">. However, he often incorporates other materials as well.</span></p><span data-dcnode-id="6341" instrument_node="">
</span><p data-dcnode-id="6337"><strong data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">Innovations in technology</span></strong><span data-dcnode-id="6338" instrument_node=""> play a significant role in most of Maki’s buildings.</span></p><span data-dcnode-id="6336" instrument_node="">
</span><p data-dcnode-id="6331"><span data-dcnode-id="6335" instrument_node="">Maki designs buildings according to their surroundings, and he aims to create so-called “</span><strong data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">unforgettable scenes</span></strong><span data-dcnode-id="6332" instrument_node="">“, which can be described best as places or spaces that allow for easy human interaction.</span></p><span data-dcnode-id="6330" instrument_node="">
</span><p data-dcnode-id="6325"><span data-dcnode-id="6329" instrument_node="">The project that brought Maki the most desired prize in architecture is the</span><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tef.or.jp/tmg/en_index.jsp"><span data-dcnode-id="6328" instrument_node=""> Tokyo Metropolitan Gymnasium</span></a><span data-dcnode-id="6326" instrument_node="">. The characteristics of this building, with its contemporary design style, made Fumihiko Maki famous worldwide.</span></p><span data-dcnode-id="6324" instrument_node="">
</span><p data-dcnode-id="6316"><span data-dcnode-id="6323" instrument_node="">Other works that display Maki’s style well are the </span><a data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maki-and-associates.co.jp/details/index_pic.html%3Fpcd%3D142"><span data-dcnode-id="6322" instrument_node="">Shenzhen Sea World Culture and Arts Center Data</span></a><span data-dcnode-id="6320" instrument_node=""> in China, and the </span><a data-dcnode-id="6318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maki-and-associates.co.jp/details/index_pic.html%3Fpcd%3D134"><span data-dcnode-id="6319" instrument_node="">Jewish Community of Japan</span></a><span data-dcnode-id="6317" instrument_node=""> located in Tokyo.</span></p><span data-dcnode-id="6315" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6294"><figure class="aligncenter" data-dcnode-id="6295"><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.maki-and-associates.co.jp/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2231" data-dcnode-id="6309"><span data-dcnode-id="6314" instrument_node="">

</span><h2 data-dcnode-id="6283"><span class="ez-toc-section" data-dcnode-id="6292" id="20_John_Andrews_-_Satellite_Campus_of_the_University_of_Toronto"></span><strong data-dcnode-id="6285"><span data-dcnode-id="6291" instrument_node="">20. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.johnandrewsarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6290" instrument_node="">John Andrews</span></a><span data-dcnode-id="6288" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Toronto_Scarborough" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6287" instrument_node="">Satellite Campus of the University of Toronto </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="6284"></span></h2><span data-dcnode-id="6282" instrument_node="">
</span><p data-dcnode-id="6278"><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatbuildings.com/architects/John_Andrews.html"><span data-dcnode-id="6281" instrument_node="">John Andrews</span></a><span data-dcnode-id="6279" instrument_node=""> is an architect born in 1934 in Sydney, Australia.</span></p><span data-dcnode-id="6277" instrument_node="">
</span><p data-dcnode-id="6272"><span data-dcnode-id="6276" instrument_node="">He founded </span><a data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.johnandrewsarchitects.com/"><span data-dcnode-id="6275" instrument_node="">John Andrews Architects</span></a><span data-dcnode-id="6273" instrument_node=""> in 1962.</span></p><span data-dcnode-id="6271" instrument_node="">
</span><p data-dcnode-id="6269"><span data-dcnode-id="6270" instrument_node="">He is mainly known for designing a number of acclaimed structures in Australia, Canada, and the United States.</span></p><span data-dcnode-id="6268" instrument_node="">
</span><p data-dcnode-id="6263"><span data-dcnode-id="6267" instrument_node="">His style is not attributable to a specific architecture style, as he has developed </span><strong data-dcnode-id="6265"><span data-dcnode-id="6266" instrument_node="">his own approach</span></strong><span data-dcnode-id="6264" instrument_node=""> to designing buildings.</span></p><span data-dcnode-id="6262" instrument_node="">
</span><p data-dcnode-id="6257"><span data-dcnode-id="6261" instrument_node="">His works are all focused on being </span><strong data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">user-friendly</span></strong><span data-dcnode-id="6258" instrument_node="">. Andrews designs according to the specific economic, constructional, and climatic conditions, as well as the user needs of the specific site.</span></p><span data-dcnode-id="6256" instrument_node="">
</span><p data-dcnode-id="6248"><span data-dcnode-id="6255" instrument_node="">One of his most noteworthy projects is the </span><a data-dcnode-id="6253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.utsc.utoronto.ca/aboutus/andrews-building-0"><span data-dcnode-id="6254" instrument_node="">Andrews Building</span></a><span data-dcnode-id="6252" instrument_node="">, which is located at </span><a data-dcnode-id="6250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.utoronto.ca/"><span data-dcnode-id="6251" instrument_node="">The University of Toronto Scarborough</span></a><span data-dcnode-id="6249" instrument_node="">.</span></p><span data-dcnode-id="6247" instrument_node="">
</span><p data-dcnode-id="6242"><span data-dcnode-id="6246" instrument_node="">This building was the first completed, and is named after its designer. It was built in a “</span><strong data-dcnode-id="6244"><span data-dcnode-id="6245" instrument_node="">brutalist</span></strong><span data-dcnode-id="6243" instrument_node="">” architectural style, and completed in 1964.</span></p><span data-dcnode-id="6241" instrument_node="">
</span><p data-dcnode-id="6233"><span data-dcnode-id="6240" instrument_node="">Some other works Andrews is renowned for are the </span><a data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cntower.ca/en-ca/home.html"><span data-dcnode-id="6239" instrument_node="">CN Tower</span></a><span data-dcnode-id="6237" instrument_node=""> in Toronto, and the </span><a data-dcnode-id="6235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//harvardplanning.emuseum.com/sites/158/gund-hall%3Bjsessionid%3D72BEA595975A02575F0DD95640B64FAE"><span data-dcnode-id="6236" instrument_node="">Gund Hall</span></a><span data-dcnode-id="6234" instrument_node=""> in Cambridge.</span></p><span data-dcnode-id="6232" instrument_node="">
</span><figure class="wp-block-image is-style-default" data-dcnode-id="6224"><img alt="Welcome to Flickr!" data-dcnode-id="6231" data-lazy-src="https://live.staticflickr.com/8448/7938679244_aa48931e6f_b.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">&lt;img src="https://live.staticflickr.com/8448/7938679244_aa48931e6f_b.jpg" alt="Welcome to Flickr!"/&gt;</span></noscript><figcaption data-dcnode-id="6225"><span data-dcnode-id="6228" instrument_node="">The Andrews Building. Image by: </span><a data-dcnode-id="6226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//live.staticflickr.com/8448/7938679244_aa48931e6f_b.jpg"><span data-dcnode-id="6227" instrument_node="">Flickr</span></a></figcaption></figure><span data-dcnode-id="6223" instrument_node="">
</span><p data-dcnode-id="6222"></p><span data-dcnode-id="6221" instrument_node="">
</span><p data-dcnode-id="6220"></p><span data-dcnode-id="6219" instrument_node="">
</span><h2 data-dcnode-id="6208"><span class="ez-toc-section" data-dcnode-id="6218" id="21_Peter_Zumthor_-_The_Kunsthaus_Bregenz"></span><strong data-dcnode-id="6210"><span data-dcnode-id="6217" instrument_node="">21. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Zumthor" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6216" instrument_node="">Peter Zumthor</span></a><span data-dcnode-id="6214" instrument_node=""> – </span><a aria-label="The Kunsthaus Bregenz (opens in a new tab)" data-dcnode-id="6212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kunsthaus-bregenz.at/%3FL%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6213" instrument_node="">The Kunsthaus Bregenz</span></a><span data-dcnode-id="6211" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6209"></span></h2><span data-dcnode-id="6207" instrument_node="">
</span><p data-dcnode-id="6200"><a data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/364856/happy-70th-birthday-peter-zumthor"><span data-dcnode-id="6206" instrument_node="">Peter Zumthor</span></a><span data-dcnode-id="6204" instrument_node=""> is an architect born in 1943 in Basel, Switzerland. He is known for his uncompromising and </span><strong data-dcnode-id="6202"><span data-dcnode-id="6203" instrument_node="">minimalist </span></strong><span data-dcnode-id="6201" instrument_node="">work.</span></p><span data-dcnode-id="6199" instrument_node="">
</span><p data-dcnode-id="6194"><span data-dcnode-id="6198" instrument_node="">Zumthor places the </span><strong data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">individual’s experience and senses</span></strong><span data-dcnode-id="6195" instrument_node=""> as priority in his designs.&nbsp;</span></p><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6191"><span data-dcnode-id="6192" instrument_node="">This human focus distincts Zumthor of his contemporaries, who focused on theories, culture, and technologies in their designs.</span></p><span data-dcnode-id="6190" instrument_node="">
</span><p data-dcnode-id="6185"><span data-dcnode-id="6189" instrument_node="">He is praised for his </span><strong data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">perfection </span></strong><span data-dcnode-id="6186" instrument_node="">in details, and the excellent use of materials.</span></p><span data-dcnode-id="6184" instrument_node="">
</span><p data-dcnode-id="6176"><span data-dcnode-id="6183" instrument_node="">With his works, Zumthor has won many prizes. Amongst these are the </span><a data-dcnode-id="6181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6182" instrument_node="">Pritzker Prize</span></a><span data-dcnode-id="6180" instrument_node=""> in 2009, and the</span><a data-dcnode-id="6178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecture.com/"><span data-dcnode-id="6179" instrument_node=""> RIBA</span></a><span data-dcnode-id="6177" instrument_node=""> Royal Gold Medal in 2013.&nbsp;</span></p><span data-dcnode-id="6175" instrument_node="">
</span><p data-dcnode-id="6170"><span data-dcnode-id="6174" instrument_node="">One of his best projects is the</span><a data-dcnode-id="6172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kunsthaus-bregenz.at/"><span data-dcnode-id="6173" instrument_node=""> Kunsthaus Bregenz</span></a><span data-dcnode-id="6171" instrument_node=""> in Austria, which is one of Europe’s leading galleries for contemporary art.</span></p><span data-dcnode-id="6169" instrument_node="">
</span><p data-dcnode-id="6161"><span data-dcnode-id="6168" instrument_node="">Some other renowned works are the </span><a data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/bruder-klaus-field-chapel/"><span data-dcnode-id="6167" instrument_node="">Bruder Klaus Field Chapel </span></a><span data-dcnode-id="6165" instrument_node="">in Wachendorf, and the </span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/swiss-sound-pavilion/"><span data-dcnode-id="6164" instrument_node="">Swiss Sound Box</span></a><span data-dcnode-id="6162" instrument_node=""> in Hannover, both located in Germany.</span></p><span data-dcnode-id="6160" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6140"><figure class="aligncenter" data-dcnode-id="6141"><a data-dcnode-id="6150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kunsthaus-bregenz.at/%3FL%3D1" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2234" data-dcnode-id="6154"><span data-dcnode-id="6159" instrument_node="">

</span><h2 data-dcnode-id="6128"><span class="ez-toc-section" data-dcnode-id="6138" id="22_Jacques_Herzog_Pierre_de_Meuron_-_Tate_Modern"></span><strong data-dcnode-id="6130"><span data-dcnode-id="6137" instrument_node="">22. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.herzogdemeuron.com/index.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6136" instrument_node="">Jacques Herzog &amp; Pierre de Meuron </span></a><span data-dcnode-id="6134" instrument_node="">– </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6133" instrument_node="">Tate Modern</span></a><span data-dcnode-id="6131" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6129"></span></h2><span data-dcnode-id="6127" instrument_node="">
</span><p data-dcnode-id="6123"><a data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.herzogdemeuron.com/"><span data-dcnode-id="6126" instrument_node="">Herzog &amp; de Meuron</span></a><span data-dcnode-id="6124" instrument_node=""> is a Swiss architecture firm founded in 1978. Its head office is located in Basel, Switzerland.</span></p><span data-dcnode-id="6122" instrument_node="">
</span><p data-dcnode-id="6114"><span data-dcnode-id="6121" instrument_node="">The company is founded by </span><a data-dcnode-id="6119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.herzogdemeuron.com/index/practice/people/partners/jacques-herzog.html"><span data-dcnode-id="6120" instrument_node="">Jacques Herzog</span></a><span data-dcnode-id="6118" instrument_node=""> and </span><a data-dcnode-id="6116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.herzogdemeuron.com/index/practice/people/partners/pierre-de-meuron.html"><span data-dcnode-id="6117" instrument_node="">Pierre de Meuron</span></a><span data-dcnode-id="6115" instrument_node="">, both born in 1950 in Basel, Switzerland.&nbsp;&nbsp;</span></p><span data-dcnode-id="6113" instrument_node="">
</span><p data-dcnode-id="6102"><span data-dcnode-id="6112" instrument_node="">Their </span><a data-dcnode-id="6110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/370152/happy-birthday-pierre-de-meuron"><span data-dcnode-id="6111" instrument_node="">architectural style</span></a><span data-dcnode-id="6109" instrument_node=""> is acclaimed for </span><strong data-dcnode-id="6107"><span data-dcnode-id="6108" instrument_node="">combining tradition and innovation</span></strong><span data-dcnode-id="6106" instrument_node=""> in such a way that they both </span><strong data-dcnode-id="6104"><span data-dcnode-id="6105" instrument_node="">augment </span></strong><span data-dcnode-id="6103" instrument_node="">the other.</span></p><span data-dcnode-id="6101" instrument_node="">
</span><p data-dcnode-id="6096"><span data-dcnode-id="6100" instrument_node="">Over time, the focus of Herzog &amp; de Meuron has shifted towards the structure and depth of their constructions, with more aspects of the buildings being </span><strong data-dcnode-id="6098"><span data-dcnode-id="6099" instrument_node="">visible to the visitor</span></strong><span data-dcnode-id="6097" instrument_node="">.</span></p><span data-dcnode-id="6095" instrument_node="">
</span><p data-dcnode-id="6090"><span data-dcnode-id="6094" instrument_node="">In 2001 they were awarded the</span><a data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6093" instrument_node=""> Pritzker Prize</span></a><span data-dcnode-id="6091" instrument_node="">, which praised their innovativeness in their facades.&nbsp;</span></p><span data-dcnode-id="6089" instrument_node="">
</span><p data-dcnode-id="6084"><span data-dcnode-id="6088" instrument_node="">Herzog &amp; de Meuron is&nbsp; best known for their conversion of the giant Bankside Power Station in London to the new home of</span><a data-dcnode-id="6086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/"><span data-dcnode-id="6087" instrument_node=""> Tate Modern</span></a><span data-dcnode-id="6085" instrument_node="">, one of the largest museums of modern and contemporary art in the world.</span></p><span data-dcnode-id="6083" instrument_node="">
</span><p data-dcnode-id="6075"><span data-dcnode-id="6082" instrument_node="">Some other works are the </span><a data-dcnode-id="6080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elbphilharmonie.de/de/"><span data-dcnode-id="6081" instrument_node="">Elbphilharmonie </span></a><span data-dcnode-id="6079" instrument_node="">building in Hamburg, and the </span><a data-dcnode-id="6077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dac.dk/en/knowledgebase/architecture/vitra-haus-2/"><span data-dcnode-id="6078" instrument_node="">Vitrahaus </span></a><span data-dcnode-id="6076" instrument_node="">in Weil am Rhein, both in Germany.</span></p><span data-dcnode-id="6074" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="6054"><figure class="aligncenter" data-dcnode-id="6055"><a data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tate.org.uk/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2240" data-dcnode-id="6068"><span data-dcnode-id="6073" instrument_node="">

</span><h2 data-dcnode-id="6042"><span class="ez-toc-section" data-dcnode-id="6052" id="23_Ryue_Nishizawa_-_The_Garden_and_House"></span><strong data-dcnode-id="6044"><span data-dcnode-id="6051" instrument_node="">23. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ryuenishizawa.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6050" instrument_node="">Ryue Nishizawa</span></a><span data-dcnode-id="6048" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archeyes.com/sanaa-garden-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6047" instrument_node="">The Garden and House</span></a><span data-dcnode-id="6045" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="6043"></span></h2><span data-dcnode-id="6041" instrument_node="">
</span><p data-dcnode-id="6037"><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ryuenishizawa.com/"><span data-dcnode-id="6040" instrument_node="">Ryue Nishizawa</span></a><span data-dcnode-id="6038" instrument_node=""> is an architect born in 1966 in Tokyo, Japan.&nbsp;</span></p><span data-dcnode-id="6036" instrument_node="">
</span><p data-dcnode-id="6022"><span data-dcnode-id="6035" instrument_node="">In 1995, he co-founded the firm</span><a data-dcnode-id="6033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sanaa.co.jp/"><span data-dcnode-id="6034" instrument_node=""> SANAA</span></a><span data-dcnode-id="6032" instrument_node=""> with the architect</span><a data-dcnode-id="6030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kazuyo_Sejima"><span data-dcnode-id="6031" instrument_node=""> Kazuyo Sejima</span></a><span data-dcnode-id="6029" instrument_node="">. In 2010, he became the </span><strong data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">youngest recipient ever</span></strong><span data-dcnode-id="6026" instrument_node=""> of the</span><a data-dcnode-id="6024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="6025" instrument_node=""> Pritzker Prize</span></a><span data-dcnode-id="6023" instrument_node="">, together with Sejima.</span></p><span data-dcnode-id="6021" instrument_node="">
</span><p data-dcnode-id="6019"><span data-dcnode-id="6020" instrument_node="">Besides, Nishizawa has founded his own architecture firm, Office of Ryue Nishizawa, in 1997.</span></p><span data-dcnode-id="6018" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6017" instrument_node="">His works are known for combining </span><strong data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">traditional Japanese</span></strong><span data-dcnode-id="6014" instrument_node=""> concepts, with modern and </span><strong data-dcnode-id="6012"><span data-dcnode-id="6013" instrument_node="">contemporary </span></strong><span data-dcnode-id="6011" instrument_node="">thinking.</span></p><span data-dcnode-id="6009" instrument_node="">
</span><p data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">His architecture has simple designs, all reflecting their surroundings.&nbsp;</span></p><span data-dcnode-id="6006" instrument_node="">
</span><p data-dcnode-id="6001"><span data-dcnode-id="6005" instrument_node="">The </span><strong data-dcnode-id="6003"><span data-dcnode-id="6004" instrument_node="">interplay between interior and exterior</span></strong><span data-dcnode-id="6002" instrument_node=""> is one of Nishizawa’s focuses.</span></p><span data-dcnode-id="6000" instrument_node="">
</span><p data-dcnode-id="5995"><span data-dcnode-id="5999" instrument_node="">One of his eye-catching projects is the </span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archeyes.com/sanaa-garden-house/"><span data-dcnode-id="5998" instrument_node="">“garden and house”</span></a><span data-dcnode-id="5996" instrument_node=""> in Tokyo, a five-story townhouse fronted by a stack of gardens.</span></p><span data-dcnode-id="5994" instrument_node="">
</span><p data-dcnode-id="5986"><span data-dcnode-id="5993" instrument_node="">Other famous works are the </span><a data-dcnode-id="5991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//benesse-artsite.jp/en/art/teshima-artmuseum.html"><span data-dcnode-id="5992" instrument_node="">Teshima Art Museum</span></a><span data-dcnode-id="5990" instrument_node=""> in Tonoshō, and </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//towadaartcenter.com/en/"><span data-dcnode-id="5989" instrument_node="">Towada Art Center</span></a><span data-dcnode-id="5987" instrument_node=""> in Aomori, both in Japan.</span></p><span data-dcnode-id="5985" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5966"><figure class="aligncenter" data-dcnode-id="5967"><picture class="wp-image-2243" data-dcnode-id="5979"><span data-dcnode-id="5984" instrument_node="">

</span><h2 data-dcnode-id="5954"><span class="ez-toc-section" data-dcnode-id="5964" id="24_Alejandro_Aravena_-_The_Siamese_Towers"></span><strong data-dcnode-id="5956"><span data-dcnode-id="5963" instrument_node="">24. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alejandro_Aravena" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5962" instrument_node="">Alejandro Aravena</span></a><span data-dcnode-id="5960" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/siamese-towers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5959" instrument_node="">The Siamese Towers</span></a><span data-dcnode-id="5957" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5955"></span></h2><span data-dcnode-id="5953" instrument_node="">
</span><p data-dcnode-id="5949"><a data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/biography-ale-jan-dro-ara-ve-na"><span data-dcnode-id="5952" instrument_node="">Alejandro Aravena</span></a><span data-dcnode-id="5950" instrument_node=""> is an architect born in 1967 in Santiago, Chile.&nbsp;</span></p><span data-dcnode-id="5948" instrument_node="">
</span><p data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">In 1994 he founded his own firm, Alejandro Aravena Architects.</span></p><span data-dcnode-id="5945" instrument_node="">
</span><p data-dcnode-id="5937"><span data-dcnode-id="5944" instrument_node="">Besides, he has been leading </span><a data-dcnode-id="5942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.elementalchile.cl/en/"><span data-dcnode-id="5943" instrument_node="">ELEMENTAL </span></a><span data-dcnode-id="5941" instrument_node="">since 2001. This institution focuses on public projects, which provide some sort of </span><strong data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">social impact</span></strong><span data-dcnode-id="5938" instrument_node="">.</span></p><span data-dcnode-id="5936" instrument_node="">
</span><p data-dcnode-id="5931"><span data-dcnode-id="5935" instrument_node="">ELEMENTAL works in a </span><strong data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">participatory design</span></strong><span data-dcnode-id="5932" instrument_node=""> manner, meaning that the community is being closely involved throughout the whole design process.</span></p><span data-dcnode-id="5930" instrument_node="">
</span><p data-dcnode-id="5922"><span data-dcnode-id="5929" instrument_node="">In 2016 Aravena won the </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/"><span data-dcnode-id="5928" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="5926" instrument_node="">, where he was praised for leading a </span><strong data-dcnode-id="5924"><span data-dcnode-id="5925" instrument_node="">social architecture movement</span></strong><span data-dcnode-id="5923" instrument_node="">.</span></p><span data-dcnode-id="5921" instrument_node="">
</span><p data-dcnode-id="5911"><span data-dcnode-id="5920" instrument_node="">Aravena is best known for his work on the</span><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/siamese-towers/"><span data-dcnode-id="5918" style="text-decoration: underline;"><span data-dcnode-id="5919" instrument_node=""> </span></span><span data-dcnode-id="5917" instrument_node="">Siamese Towers</span></a><span data-dcnode-id="5915" instrument_node=""> in Santiago. The towers serve as the Center for Technological Innovation at the</span><a data-dcnode-id="5913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uc.cl/"><span data-dcnode-id="5914" instrument_node=""> Catholic University of Chile</span></a><span data-dcnode-id="5912" instrument_node="">.</span></p><span data-dcnode-id="5910" instrument_node="">
</span><p data-dcnode-id="5902"><span data-dcnode-id="5909" instrument_node="">Other renowned works are </span><a data-dcnode-id="5907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dac.dk/en/knowledgebase/architecture/quinta-monroy/"><span data-dcnode-id="5908" instrument_node="">Quinta Monroy</span></a><span data-dcnode-id="5906" instrument_node=""> in Iquique (Chile), and the </span><a data-dcnode-id="5904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fondation-janmichalski.com/en/residence-pour-ecrivains/les-cabanes/elemental/"><span data-dcnode-id="5905" instrument_node="">Elemental Treehouse</span></a><span data-dcnode-id="5903" instrument_node=""> in Montricher (Switzerland).</span></p><span data-dcnode-id="5901" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5884"><figure class="aligncenter" data-dcnode-id="5885"><picture class="wp-image-2246" data-dcnode-id="5895"><span data-dcnode-id="5900" instrument_node="">

</span><p data-dcnode-id="5867"><br data-dcnode-id="5871"><br data-dcnode-id="5870"><br data-dcnode-id="5869"><br data-dcnode-id="5868"></p><span data-dcnode-id="5866" instrument_node="">
</span><h2 data-dcnode-id="5856"><span class="ez-toc-section" data-dcnode-id="5865" id="25_Takaharu_Tezuka_-_The_Roof_House"></span><strong data-dcnode-id="5858"><span data-dcnode-id="5864" instrument_node="">25. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5863" instrument_node="">Takaharu Tezuka</span></a><span data-dcnode-id="5861" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/english/works/house/yane-no-ie/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5860" instrument_node="">The Roof House</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5857"></span></h2><span data-dcnode-id="5855" instrument_node="">
</span><p data-dcnode-id="5848"><a data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/"><span data-dcnode-id="5854" instrument_node="">Takaharu Tezuka</span></a><span data-dcnode-id="5852" instrument_node=""> was born in 1964 in Tokyo, Japan. He and his wife Yui Tezuka founded the Tokyo-based firm</span><a data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/"><span data-dcnode-id="5851" instrument_node=""> Tezuka Architects</span></a><span data-dcnode-id="5849" instrument_node=""> in 1994.</span></p><span data-dcnode-id="5847" instrument_node="">
</span><p data-dcnode-id="5839"><span data-dcnode-id="5846" instrument_node="">Their work emphasizes </span><strong data-dcnode-id="5844"><span data-dcnode-id="5845" instrument_node="">human activity and connectivity</span></strong><span data-dcnode-id="5843" instrument_node="">. They are mainly known for designing spaces for </span><strong data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">children</span></strong><span data-dcnode-id="5840" instrument_node="">.</span></p><span data-dcnode-id="5838" instrument_node="">
</span><p data-dcnode-id="5830"><span data-dcnode-id="5837" instrument_node="">For this they have won multiple </span><strong data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">prizes</span></strong><span data-dcnode-id="5834" instrument_node="">, including UNESCO’s </span><a data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.citedelarchitecture.fr/en/article/global-award-sustainable-architecture"><span data-dcnode-id="5833" instrument_node="">Global Award for Sustainable Architecture</span></a><span data-dcnode-id="5831" instrument_node=""> in 2017.</span></p><span data-dcnode-id="5829" instrument_node="">
</span><p data-dcnode-id="5824"><span data-dcnode-id="5828" instrument_node="">One of their works that clearly shows their ambition to design buildings centered around humans is the </span><a data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/english/works/house/yane-no-ie/"><span data-dcnode-id="5827" instrument_node="">“Roof House”</span></a><span data-dcnode-id="5825" instrument_node=""> in Japan.</span></p><span data-dcnode-id="5823" instrument_node="">
</span><p data-dcnode-id="5815"><span data-dcnode-id="5822" instrument_node="">Some other renowned works are the </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/english/works/store/toukamachi-sangyou-bunka-hassinkan-ikote/"><span data-dcnode-id="5821" instrument_node="">Tokamachi Industry and Crafts Center Ikote</span></a><span data-dcnode-id="5819" instrument_node=""> and the </span><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tezuka-arch.com/english/works/church/higashi-yahata/"><span data-dcnode-id="5818" instrument_node="">Church of Eaves</span></a><span data-dcnode-id="5816" instrument_node="">, both located in Japan.</span></p><span data-dcnode-id="5814" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5795"><figure class="aligncenter" data-dcnode-id="5796"><picture class="wp-image-2248" data-dcnode-id="5808"><span data-dcnode-id="5813" instrument_node="">

</span><h2 data-dcnode-id="5779"><span class="ez-toc-section" data-dcnode-id="5793" id="26_Rafael_Aranda_Carme_Pigem_and_Ramon_Vilalta_-_The_Tossols_Basil_Athletics_Stadium"></span><strong data-dcnode-id="5788"><span data-dcnode-id="5792" instrument_node="">26. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rcrarquitectes.es/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5791" instrument_node="">Rafael Aranda, Carme Pigem and Ramon Vilalta</span></a><span data-dcnode-id="5789" instrument_node=""> –</span></strong><span data-dcnode-id="5787" instrument_node=""> </span><strong data-dcnode-id="5781"><a aria-label=" (opens in a new tab)" data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//barcelonarchitecturewalks.com/rcr-arquitectes-baw-expedition/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5786" instrument_node="">The </span><g class="gr_ gr_5 gr-alert gr_spell gr_inline_cards gr_disable_anim_appear ContextualSpelling ins-del multiReplace" data-dcnode-id="5784" data-gr-id="5" id="5"><span data-dcnode-id="5785" instrument_node="">Tossols</span></g><span data-dcnode-id="5783" instrument_node=""> Basil Athletics Stadium </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5780"></span></h2><span data-dcnode-id="5778" instrument_node="">
</span><p data-dcnode-id="5773"><span data-dcnode-id="5777" instrument_node="">The firm </span><a data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rcrarquitectes.es/"><span data-dcnode-id="5776" instrument_node="">RCR Arquitectes</span></a><span data-dcnode-id="5774" instrument_node=""> was founded in 1988 in Olot (Spain) by Rafael Aranda (1961), Carme Pigem (1962) and Ramon Vilalta (1960).</span></p><span data-dcnode-id="5772" instrument_node="">
</span><p data-dcnode-id="5764"><span data-dcnode-id="5771" instrument_node="">Their intention is to produce quality architecture while focusing on the </span><strong data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">environment </span></strong><span data-dcnode-id="5768" instrument_node="">and </span><strong data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">landscape</span></strong><span data-dcnode-id="5765" instrument_node="">.</span></p><span data-dcnode-id="5763" instrument_node="">
</span><p data-dcnode-id="5756"><strong data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">Nature </span></strong><span data-dcnode-id="5760" instrument_node="">and the </span><strong data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">surroundings </span></strong><span data-dcnode-id="5757" instrument_node="">hence play a central role in the design of their constructions.</span></p><span data-dcnode-id="5755" instrument_node="">
</span><p data-dcnode-id="5750"><span data-dcnode-id="5754" instrument_node="">In 2017, Aranda, Pigem and Vilalta won the </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/laureates/rafael-aranda-carme-pigem-ramon-vilalta"><span data-dcnode-id="5753" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="5751" instrument_node="">, praised for the positive impact they have had on their environment.</span></p><span data-dcnode-id="5749" instrument_node="">
</span><p data-dcnode-id="5744"><span data-dcnode-id="5748" instrument_node="">One of their projects that is basically only about the environment is the</span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//barcelonarchitecturewalks.com/rcr-arquitectes-baw-expedition/"><span data-dcnode-id="5747" instrument_node=""> Tossols Basil Athletics Stadium</span></a><span data-dcnode-id="5745" instrument_node=""> in Barcelona, where the architects choose not to alter the space by cutting any trees or by leveling the landscape.</span></p><span data-dcnode-id="5743" instrument_node="">
</span><p data-dcnode-id="5735"><span data-dcnode-id="5742" instrument_node="">Some other praised works are </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rcrbunkafundacio.cat/fons-rcr/obres/o-iv-156-espai-public-teatre-la-lira/341/%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com"><span data-dcnode-id="5741" instrument_node="">La Lira Theatre</span></a><span data-dcnode-id="5739" instrument_node=""> in Ripoll, and </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/les-cols-pavilions/"><span data-dcnode-id="5738" instrument_node="">Les Cols Pavilions</span></a><span data-dcnode-id="5736" instrument_node=""> in Girona, both located in Spain.&nbsp;</span></p><span data-dcnode-id="5734" instrument_node="">

</span><h2 data-dcnode-id="5703"><span class="ez-toc-section" data-dcnode-id="5713" id="27_Mauricio_Rocha_Gabriela_Carrillo_-_The_Criminal_Courts_for_Oral_Trials"></span><strong data-dcnode-id="5705"><span data-dcnode-id="5712" instrument_node="">27. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/879472/mauricio-rocha-and-gabriela-carrillo-it-is-important-not-to-doubt-that-architecture-is-art" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5711" instrument_node="">Mauricio Rocha &amp; Gabriela Carrillo</span></a><span data-dcnode-id="5709" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arcspace.com/feature/criminal-courts-for-oral-trials/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5708" instrument_node="">The Criminal Courts for Oral Trials</span></a><span data-dcnode-id="5706" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5704"></span></h2><span data-dcnode-id="5702" instrument_node="">
</span><p data-dcnode-id="5698"><a data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tallerdearquitectura.com.mx/"><span data-dcnode-id="5701" instrument_node="">Taller de Arquitectura</span></a><span data-dcnode-id="5699" instrument_node=""> was established by the architect Mauricio Rocha in 1991. Later on, in 2012, Gabriela Carrillo joined the firm and the company name was changed to Taller.</span></p><span data-dcnode-id="5697" instrument_node="">
</span><p data-dcnode-id="5686"><span data-dcnode-id="5696" instrument_node="">Taller projects try to develop </span><strong data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">contemporary </span></strong><span data-dcnode-id="5693" instrument_node="">architecture, focusing on the </span><strong data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">environment </span></strong><span data-dcnode-id="5690" instrument_node="">and on the </span><strong data-dcnode-id="5688"><span data-dcnode-id="5689" instrument_node="">overall efficiency</span></strong><span data-dcnode-id="5687" instrument_node="">.</span></p><span data-dcnode-id="5685" instrument_node="">
</span><p data-dcnode-id="5677"><span data-dcnode-id="5684" instrument_node="">Creating </span><strong data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">integrity </span></strong><span data-dcnode-id="5681" instrument_node="">and </span><strong data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">harmony </span></strong><span data-dcnode-id="5678" instrument_node="">are their key goals, hence their focus on developing a balance between form and function.</span></p><span data-dcnode-id="5676" instrument_node="">
</span><p data-dcnode-id="5668"><span data-dcnode-id="5675" instrument_node="">One of their known projects is the</span><a data-dcnode-id="5673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arcspace.com/feature/criminal-courts-for-oral-trials/"><span data-dcnode-id="5674" instrument_node=""> Criminal Courts for Oral Trials</span></a><span data-dcnode-id="5672" instrument_node=""> in Patzcuaro, Mexico. The project matches the Taller ideology of </span><strong data-dcnode-id="5670"><span data-dcnode-id="5671" instrument_node="">design and functionality</span></strong><span data-dcnode-id="5669" instrument_node="">, as they wanted to signal equality and transparency through this construction.</span></p><span data-dcnode-id="5667" instrument_node="">
</span><p data-dcnode-id="5659"><span data-dcnode-id="5666" instrument_node="">Some other renowned works are </span><a data-dcnode-id="5664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/930886/los-chocolates-community-development-center-taller-de-arquitectura-mauricio-rocha-plus-gabriela-carrillo%3Fad_medium%3Doffice_landing%26ad_name%3Darticle"><span data-dcnode-id="5665" instrument_node="">Los Chocolates Community Development Center</span></a><span data-dcnode-id="5663" instrument_node=""> in Cuernavaca (Mexico), and the</span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/906832/iturbide-studio-taller-de-arquitectura-mauricio-rocha-plus-gabriela-carrillo%3Fad_medium%3Doffice_landing%26ad_name%3Darticle"><span data-dcnode-id="5662" instrument_node=""> Iturbide Studio</span></a><span data-dcnode-id="5660" instrument_node=""> in Mexico City.</span></p><span data-dcnode-id="5658" instrument_node="">

</span><h2 data-dcnode-id="5629"><span class="ez-toc-section" data-dcnode-id="5639" id="28_Frida_Escobedo_-_The_Serpentine_Galleries"></span><strong data-dcnode-id="5631"><span data-dcnode-id="5638" instrument_node="">28. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fridaescobedo.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5637" instrument_node="">Frida Escobedo</span></a><span data-dcnode-id="5635" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serpentinegalleries.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5634" instrument_node="">The Serpentine Galleries</span></a><span data-dcnode-id="5632" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5630"></span></h2><span data-dcnode-id="5628" instrument_node="">
</span><p data-dcnode-id="5624"><a data-dcnode-id="5626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fridaescobedo.com/"><span data-dcnode-id="5627" instrument_node="">Frida Escobedo</span></a><span data-dcnode-id="5625" instrument_node=""> is an architect born in 1979 in Mexico City, Mexico. In 2006 she started her own firm, named after herself.</span></p><span data-dcnode-id="5623" instrument_node="">
</span><p data-dcnode-id="5618"><span data-dcnode-id="5622" instrument_node="">Her style is said to </span><strong data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">blur the boundaries</span></strong><span data-dcnode-id="5619" instrument_node=""> between architecture and art, even though she only develops architectural works.</span></p><span data-dcnode-id="5617" instrument_node="">
</span><p data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">Her overall goal is to make her constructions comment on what is happening in a country’s social, economic and political situation.</span></p><span data-dcnode-id="5614" instrument_node="">
</span><p data-dcnode-id="5606"><span data-dcnode-id="5613" instrument_node="">Escobedo’s focus is on the </span><strong data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">design and restoration</span></strong><span data-dcnode-id="5610" instrument_node=""> of</span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architecturequote.com/blog/examples-of-before-and-after-urban-transformations/"><span data-dcnode-id="5609" instrument_node=""> urban spaces</span></a><span data-dcnode-id="5607" instrument_node=""> like housing, community centers, art venues, and hotels.</span></p><span data-dcnode-id="5605" instrument_node="">
</span><p data-dcnode-id="5598"><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serpentinegalleries.org/"><span data-dcnode-id="5604" instrument_node="">The Serpentine Galleries</span></a><span data-dcnode-id="5602" instrument_node=""> are two </span><strong data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">contemporary </span></strong><span data-dcnode-id="5599" instrument_node="">art galleries situated in London, the UK.&nbsp;</span></p><span data-dcnode-id="5597" instrument_node="">
</span><p data-dcnode-id="5592"><span data-dcnode-id="5596" instrument_node="">Every year these galleries appoint world-renowned architects to build a temporary summer pavilion. Frida Escobedo was the youngest architect to ever work on </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serpentinegalleries.org/whats-on/serpentine-pavilion-2018-designed-frida-escobedo/"><span data-dcnode-id="5595" instrument_node="">this project</span></a><span data-dcnode-id="5593" instrument_node="">, when she entered back in 2018.&nbsp;</span></p><span data-dcnode-id="5591" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5590" instrument_node="">Some of her other works include </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fridaescobedo.com/en/project/la-tallera/"><span data-dcnode-id="5589" instrument_node="">La Tallera</span></a><span data-dcnode-id="5587" instrument_node=""> in Morelos, Mexico, and </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fridaescobedo.com/en/project/very-short-space/"><span data-dcnode-id="5586" instrument_node="">GSB Stanford</span></a><span data-dcnode-id="5584" instrument_node=""> in Palo Alto, California.</span></p><span data-dcnode-id="5582" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="5562"><a data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serpentinegalleries.org/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2259" data-dcnode-id="5576"><span data-dcnode-id="5581" instrument_node="">

</span><h2 data-dcnode-id="5550"><span class="ez-toc-section" data-dcnode-id="5560" id="29_Solano_Benitez_-_The_Unilever_Building"></span><strong data-dcnode-id="5552"><span data-dcnode-id="5559" instrument_node="">29. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gabdearq.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5558" instrument_node="">Solano Benitez</span></a><span data-dcnode-id="5556" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/unilever-building/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5555" instrument_node="">The Unilever Building</span></a><span data-dcnode-id="5553" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5551"></span></h2><span data-dcnode-id="5549" instrument_node="">
</span><p data-dcnode-id="5545"><a data-dcnode-id="5547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.arquitecturaviva.com/en/Info/News/Details/5626"><span data-dcnode-id="5548" instrument_node="">Solano Benitez</span></a><span data-dcnode-id="5546" instrument_node=""> is an architect born in 1963 in Asuncion, Paraguay.&nbsp;</span></p><span data-dcnode-id="5544" instrument_node="">
</span><p data-dcnode-id="5542"><span data-dcnode-id="5543" instrument_node="">In 1987 he founded Gabinete de Arquitectura together with Alberto Marinoni and Gloria Cabral, in Asunción, Paraguay.</span></p><span data-dcnode-id="5541" instrument_node="">
</span><p data-dcnode-id="5533"><span data-dcnode-id="5540" instrument_node="">Their office tries to produce </span><strong data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">sustainable </span></strong><span data-dcnode-id="5537" instrument_node="">and </span><strong data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">economic </span></strong><span data-dcnode-id="5534" instrument_node="">solutions with their buildings, all adapted to the specific surroundings and environment.</span></p><span data-dcnode-id="5532" instrument_node="">
</span><p data-dcnode-id="5524"><span data-dcnode-id="5531" instrument_node="">One of these buildings is the</span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/unilever-building/"><span data-dcnode-id="5530" instrument_node=""> Unilever Building</span></a><span data-dcnode-id="5528" instrument_node=""> in Villa Elisa, Paraguay. It is a large container of offices that permits entry of </span><strong data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">light </span></strong><span data-dcnode-id="5525" instrument_node="">and proper ventilation.</span></p><span data-dcnode-id="5523" instrument_node="">
</span><p data-dcnode-id="5515"><span data-dcnode-id="5522" instrument_node="">Two other renowned works are </span><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thesocietypy.com/2017/08/09/casa-esmeraldinasolano-benitez/"><span data-dcnode-id="5521" instrument_node="">Casa Esmeraldina</span></a><span data-dcnode-id="5519" instrument_node=""> in Asuncion, Paraguay, and his award-winning construction </span><a data-dcnode-id="5517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/788589/gabinete-de-arquitecturas-breaking-the-siege-nil-winner-of-the-golden-lion-at-the-2016-venice-biennale"><span data-dcnode-id="5518" instrument_node="">Breaking the Siege</span></a><span data-dcnode-id="5516" instrument_node=""> in the Venice Biennale 2016.</span></p><span data-dcnode-id="5514" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5496"><figure class="aligncenter" data-dcnode-id="5497"><picture class="wp-image-2260" data-dcnode-id="5508"><span data-dcnode-id="5513" instrument_node="">
