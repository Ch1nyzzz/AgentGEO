</span><h2 data-dcnode-id="3750"><span class="ez-toc-section" data-dcnode-id="3760" id="55_Toyo_Ito_-_The_Tower_of_Winds"></span><strong data-dcnode-id="3752"><span data-dcnode-id="3759" instrument_node="">55. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.toyo-ito.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3758" instrument_node="">Toyo Ito</span></a><span data-dcnode-id="3756" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tower_of_the_Winds" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3755" instrument_node="">The Tower of Winds</span></a><span data-dcnode-id="3753" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="3751"></span></h2><span data-dcnode-id="3749" instrument_node="">
</span><p data-dcnode-id="3745"><a aria-label=" (opens in a new tab)" data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.toyo-ito.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3748" instrument_node="">Toyo Ito</span></a><span data-dcnode-id="3746" instrument_node="">, born on June 1, 1941, is a Japanese architect, world known for his creative and unique projects and for his innovative designs. </span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3736"><span data-dcnode-id="3743" instrument_node="">His style brought him the world-renowned,</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3742" instrument_node=""> Pritzker Prize</span></a><span data-dcnode-id="3740" instrument_node=""> in 2013. One of his famous projects that scream his style is </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tower_of_the_Winds" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3739" instrument_node="">the “Tower of Winds”</span></a><span data-dcnode-id="3737" instrument_node="">. </span></p><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3727"><span data-dcnode-id="3734" instrument_node="">Built in 1986 and 43m2 large, the design of this tower is predominately</span><strong data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node=""> inspired by technology. </span></strong><span data-dcnode-id="3731" instrument_node="">The tower incorporates “</span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/344664/ad-classics-tower-of-winds-toyo-ito" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3730" instrument_node="">1300 lamps, 12 neon rings, and 30 flood lights</span></a><span data-dcnode-id="3728" instrument_node="">” in its design. </span></p><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3716"><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/344664/ad-classics-tower-of-winds-toyo-ito" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3725" instrument_node="">These lights</span></a><span data-dcnode-id="3723" instrument_node=""> are in direct contact with, and actually influenced and controlled, by the</span><strong data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node=""> tower’s direct environmen</span></strong><span data-dcnode-id="3720" instrument_node="">t. The lights are designed to reacts to the</span><strong data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node=""> wind and sounds</span></strong><span data-dcnode-id="3717" instrument_node=""> of the tower’s surroundings. </span></p><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3714" instrument_node="">Even though the building is just a storage house, it looks like so much more due to </span><strong data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">connection in design between nature and architecture</span></strong><span data-dcnode-id="3711" instrument_node=""> that Toyo Ito manages to implement in its creation.</span></p><span data-dcnode-id="3709" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3692"><figure class="aligncenter" data-dcnode-id="3693"><picture class="wp-image-2298" data-dcnode-id="3703"><span data-dcnode-id="3708" instrument_node="">

</span><h2 data-dcnode-id="3681"><span class="ez-toc-section" data-dcnode-id="3690" id="56_A_Eugene_Kohn_William_Pedersen_and_Sheldon_Fox_-The_Lotte_World_Tower"></span><strong data-dcnode-id="3683"><span data-dcnode-id="3689" instrument_node="">56. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kpf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3688" instrument_node="">A. Eugene Kohn, William Pedersen and Sheldon Fox</span></a><span data-dcnode-id="3686" instrument_node=""> –</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lwt.co.kr/tower/en/main/main.do" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3685" instrument_node="">The Lotte World Tower</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3682"></span></h2><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3673"><a aria-label=" (opens in a new tab)" data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kpf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3679" instrument_node="">A. Eugene Kohn, William Pedersen, and Sheldon Fox</span></a><span data-dcnode-id="3677" instrument_node=""> are the founders of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kpf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3676" instrument_node="">Kohn Pedersen Fox Associates</span></a><span data-dcnode-id="3674" instrument_node="">, one of the biggest architecture firms in the world. </span></p><span data-dcnode-id="3672" instrument_node="">
</span><p data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">Their projects touch a vast area of activity, from cultural spaces, commercial office buildings, transportation facilities to educational facilities, residential and hospitality developments. </span></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3664"><span data-dcnode-id="3668" instrument_node="">One of their most famous works is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lwt.co.kr/tower/en/main/main.do" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3667" instrument_node="">Lotte World Tower,</span></a><span data-dcnode-id="3665" instrument_node=""> the 5th tallest building in the world, and is inspired by traditional Korean art and design.</span></p><span data-dcnode-id="3663" instrument_node="">

</span><h2 data-dcnode-id="3634"><span class="ez-toc-section" data-dcnode-id="3643" id="57_Marina_Tabassum_-_The_Baitur_Rauf_Jame_Mosque"></span><strong data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">57. </span></strong><a aria-label=" (opens in a new tab)" data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtarchitekts.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3640" instrument_node="">Marina Tabassum</span></a><span data-dcnode-id="3638" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtarchitekts.com/baitur_rauf_jame_mosque.php%3Fo%3Dnoflash" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3637" instrument_node="">The Baitur Rauf Jame Mosque</span></a><span class="ez-toc-section-end" data-dcnode-id="3635"></span></h2><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3626"><a aria-label=" (opens in a new tab)" data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtarchitekts.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3632" instrument_node="">Marina Tabassum</span></a><span data-dcnode-id="3630" instrument_node="">, born in 1968, is a Bangladeshi architect and the owner of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtarchitekts.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3629" instrument_node="">Marina Tabassum Architects (MTA).</span></a><span data-dcnode-id="3627" instrument_node=""> </span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3617"><span data-dcnode-id="3624" instrument_node="">One of her most contemporary and well-known works is the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mtarchitekts.com/baitur_rauf_jame_mosque.php%3Fo%3Dnoflash" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3623" instrument_node=""> Baitur Rauf Jame Mosque</span></a><span data-dcnode-id="3621" instrument_node="">, winning her the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.akdn.org/architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3620" instrument_node=""> Aga Khan Award for Architecture</span></a><span data-dcnode-id="3618" instrument_node=""> in 2016. </span></p><span data-dcnode-id="3616" instrument_node="">
</span><p data-dcnode-id="3606"><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baitur_Rauf_Mosque%23cite_note-%3A11-2" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3615" instrument_node="">Built in 2010</span></a><span data-dcnode-id="3613" instrument_node="">,  The Beitur Rauf Jame Mosque is </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baitur_Rauf_Mosque%23cite_note-%3A11-2" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3612" instrument_node="">144.999</span></a><span data-dcnode-id="3610" instrument_node=""> square feet, with a very modern and untraditional take on a Mosque as it has</span><a data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baitur_Rauf_Mosque%23cite_note-%3A11-2" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3609" instrument_node=""> no domes </span></a><span data-dcnode-id="3607" instrument_node="">but rather has a very square design. </span></p><span data-dcnode-id="3605" instrument_node="">
</span><p data-dcnode-id="3601"><span data-dcnode-id="3604" instrument_node="">The building is located in Dhaka, Bangladesh and serves as the epitome of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//icetoday.net/2017/05/4-reasons-why-the-baitur-rauf-jame-mosque-in-dhaka-is-the-epitome-of-peace-and-solidarity/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3603" instrument_node="">“peace and solidarity”. </span></a></p><span data-dcnode-id="3600" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="3584"><picture class="wp-image-8315" data-dcnode-id="3594"><span data-dcnode-id="3599" instrument_node="">

</span><h2 data-dcnode-id="3573"><span class="ez-toc-section" data-dcnode-id="3582" id="58_Stanley_Tigerman_-_The_Illinois_Holocaust_Museum"></span><strong data-dcnode-id="3575"><span data-dcnode-id="3581" instrument_node="">58. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tigerman-mccurry.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3580" instrument_node="">Stanley Tigerman</span></a><span data-dcnode-id="3578" instrument_node=""> –</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilholocaustmuseum.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3577" instrument_node=""> The Illinois Holocaust Museum </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3574"></span></h2><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3568"><a aria-label=" (opens in a new tab)" data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tigerman-mccurry.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3571" instrument_node="">Stanley Tigerman</span></a><span data-dcnode-id="3569" instrument_node="">, born on September 20, 1930, is an American architect, theorist, and designer, characterized by his social and development-mindset. </span></p><span data-dcnode-id="3567" instrument_node="">
</span><p data-dcnode-id="3562"><span data-dcnode-id="3566" instrument_node="">One of his most known works is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilholocaustmuseum.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3565" instrument_node="">Illinois Holocaust Museum</span></a><span data-dcnode-id="3563" instrument_node="">, a building that has the mission to honor those who were lost and teach the mass how to fight against hate and indifference.</span></p><span data-dcnode-id="3561" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3560" instrument_node="">The Illinois Holocaust Museum is an entire </span><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilholocaustmuseum.org/pages/about/architecture/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3559" instrument_node="">66.000</span></a><span data-dcnode-id="3557" instrument_node=""> square feet.</span></p><span data-dcnode-id="3555" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3554" instrument_node="">Its design is very </span><strong data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">symbolic with both dark and right wings</span></strong><span data-dcnode-id="3551" instrument_node="">. </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilholocaustmuseum.org/pages/about/architecture/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3550" instrument_node="">According to the museum</span></a><span data-dcnode-id="3548" instrument_node="">, the dark wing wing represents a “descent into darkness and the horrors of the Holocaust” while the white wing represents “the rescue and renewal of the survivors”.</span></p><span data-dcnode-id="3546" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3528"><figure class="aligncenter" data-dcnode-id="3529"><a data-dcnode-id="3536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ilholocaustmuseum.org/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2301" data-dcnode-id="3540"><span data-dcnode-id="3545" instrument_node="">
</span><source data-dcnode-id="3544" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-srcset="https://architecturequote.com/wp-content/uploads/2019/06/The-Illinois-Holocaust-Museum.jpg.webp 640w, https://architecturequote.com/wp-content/uploads/2019/06/The-Illinois-Holocaust-Museum-300x225.jpg.webp 300w, https://architecturequote.com/wp-content/uploads/2019/06/The-Illinois-Holocaust-Museum-195x146.jpg.webp 195w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20480'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="3543" instrument_node="">

</span><h2 data-dcnode-id="3517"><span class="ez-toc-section" data-dcnode-id="3526" id="59_James_Polshek_-_The_Rose_Center_for_Earth_and_Space"></span><strong data-dcnode-id="3519"><span data-dcnode-id="3525" instrument_node="">59. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.polshek.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3524" instrument_node="">James Polshek</span></a><span data-dcnode-id="3522" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnh.org/exhibitions/permanent/rose-center" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3521" instrument_node="">The Rose Center for Earth and Space </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3518"></span></h2><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3512"><a aria-label=" (opens in a new tab)" data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.polshek.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3515" instrument_node="">James Polshek</span></a><span data-dcnode-id="3513" instrument_node="">, born on February 11, 1930, is an American architect known for his attention that he gives to people and their needs and his ability to add modern architecture components to the traditional ones. </span></p><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3510" instrument_node="">One of his best-known projects is </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnh.org/exhibitions/permanent/rose-center" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3509" instrument_node="">the Rose Center for Earth and Space</span></a><span data-dcnode-id="3507" instrument_node="">, one of the biggest attractions of the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amnh.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3506" instrument_node="">American Museum of Natural History</span></a><span data-dcnode-id="3504" instrument_node=""> in New York City.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3501" instrument_node="">It is built in</span><a data-dcnode-id="3499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/902420/rose-center-for-earth-and-space-polshek-partnership-ennead-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3500" instrument_node=""> 2000</span></a><span data-dcnode-id="3498" instrument_node=""> and is </span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/902420/rose-center-for-earth-and-space-polshek-partnership-ennead-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3497" instrument_node="">379.000 </span></a><span data-dcnode-id="3495" instrument_node="">square feet.</span></p><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3482"><span data-dcnode-id="3492" instrument_node="">The architect describes this work as a duality of wonder and fact with the </span><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/902420/rose-center-for-earth-and-space-polshek-partnership-ennead-architects"><span data-dcnode-id="3491" instrument_node="">words</span></a><span data-dcnode-id="3489" instrument_node="">: “the soaring interior space and the articulated spatial experience inspire an appreciation of the </span><strong data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">wonder of our universe</span></strong><span data-dcnode-id="3486" instrument_node=""> and </span><strong data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">the power of scientific inquiry</span></strong><span data-dcnode-id="3483" instrument_node="">“. </span></p><span data-dcnode-id="3481" instrument_node="">

</span><h2 data-dcnode-id="3452"><span class="ez-toc-section" data-dcnode-id="3462" id="60_David_Adjaye_-_The_National_Museum_of_African_American_History_and_Culture"></span><strong data-dcnode-id="3454"><span data-dcnode-id="3461" instrument_node="">60. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.adjaye.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3460" instrument_node="">David Adjaye</span></a><span data-dcnode-id="3458" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nmaahc.si.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3457" instrument_node="">The National Museum of African American History and Culture</span></a><span data-dcnode-id="3455" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="3453"></span></h2><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3447"><a aria-label=" (opens in a new tab)" data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adjaye.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3450" instrument_node="">David Adjaye</span></a><span data-dcnode-id="3448" instrument_node="">, born on September 22, 1966, is a British architect known for his diversified design and unique way of using materials and light. </span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3441"><span data-dcnode-id="3445" instrument_node="">One of his most known projects is the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nmaahc.si.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3444" instrument_node=""> “National Museum of African American History and Culture”</span></a><span data-dcnode-id="3442" instrument_node=""> in Washington DC.</span></p><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">Opened in 2016, this museum spans across a grand total f 420.000m2. </span></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">The building and the connection between its design and surrounding landscape represent America’s long African culture.</span></p><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3433" instrument_node="">This connection is further represented by the </span><a data-dcnode-id="3431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/794203/smithsonian-national-museum-of-african-american-history-and-culture-adjaye-associates" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3432" instrument_node="">bronze lattice</span></a><span data-dcnode-id="3430" instrument_node=""> that the building is wrapped in, sending a nod to African American craftsmanship. </span></p><span data-dcnode-id="3428" instrument_node="">

</span><p data-dcnode-id="3394"><a aria-label=" (opens in a new tab)" data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wang_Shu" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3397" instrument_node="">Wang Shu</span></a><span data-dcnode-id="3395" instrument_node="">, born on November 4, 1963, is a Chinese architect known for his modern design accomplished by using classic materials and an older style. </span></p><span data-dcnode-id="3393" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3392" instrument_node="">His well-known design approach can be seen in his most famous work, </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ningbo_Museum" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3391" instrument_node="">The Ningbo Museum</span></a><span data-dcnode-id="3389" instrument_node="">, which was finished in </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/14623/ningbo-historic-museum-wang-shu-architect" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3388" instrument_node="">2008.</span></a><span data-dcnode-id="3386" instrument_node=""> </span></p><span data-dcnode-id="3384" instrument_node="">

</span><h2 data-dcnode-id="3355"><span class="ez-toc-section" data-dcnode-id="3365" id="62_Glenn_Murcutt_-_The_Riversdale_Boyd_Education_Centre"></span><strong data-dcnode-id="3357"><span data-dcnode-id="3364" instrument_node="">62. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glennmurcuttfolio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3363" instrument_node="">Glenn Murcutt</span></a><span data-dcnode-id="3361" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ozetecture.org/riversdale-boyd-education-centre" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3360" instrument_node="">The Riversdale Boyd Education Centre</span></a><span data-dcnode-id="3358" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="3356"></span></h2><span data-dcnode-id="3354" instrument_node="">
</span><p data-dcnode-id="3347"><a aria-label=" (opens in a new tab)" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glennmurcuttfolio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3353" instrument_node="">Glenn Murcutt,</span></a><span data-dcnode-id="3351" instrument_node=""> born on July 25, 1936, is an Australian architect and winner of the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3350" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="3348" instrument_node=""> in 2002. He is known for being the most famous Australian architect. </span></p><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3342"><span data-dcnode-id="3345" instrument_node="">Glenn earns this title not by building tall and imposing buildings, but by designing smaller settlements that let him focus on economical design, preserving energy and environment. One of the many examples of buildings that enter this category is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ozetecture.org/riversdale-boyd-education-centre" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3344" instrument_node="">Riversdale Boyd Education Centre.</span></a></p><span data-dcnode-id="3341" instrument_node="">

</span><p data-dcnode-id="3307"><a aria-label=" (opens in a new tab)" data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elia_Zenghelis" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3310" instrument_node="">Elia Zenghelis</span></a><span data-dcnode-id="3308" instrument_node="">, born in 1937 is a Greek architect whose style is characterized by simplifying structures, materials and building taking into account the landscape and environment.</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3301"><span data-dcnode-id="3305" instrument_node="">An example of his work is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aeworldmap.com/2010/01/27/ashikita-house-of-youth-kyushu-japan/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3304" instrument_node="">Ashikita House of Youth</span></a><span data-dcnode-id="3302" instrument_node="">. In this design, the focus was on preserving the view of the sea, so it was built in such a manner that the design will direct people’s eyes towards the water. </span></p><span data-dcnode-id="3300" instrument_node="">

</span><h2 data-dcnode-id="3272"><span class="ez-toc-section" data-dcnode-id="3281" id="64_Peter_Pennoyer_-_The_Metropolitan_Opera_Club"></span><strong data-dcnode-id="3274"><span data-dcnode-id="3280" instrument_node="">64. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ppapc.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3279" instrument_node="">Peter Pennoyer</span></a><span data-dcnode-id="3277" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metropolitan_Opera_Club" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3276" instrument_node="">The Metropolitan Opera Club </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3273"></span></h2><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3264"><a aria-label=" (opens in a new tab)" data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ppapc.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3270" instrument_node="">Peter Pennoyer</span></a><span data-dcnode-id="3268" instrument_node="">, born on February 19, 1957, in an American architect known for his </span><strong data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">traditional and classic design.</span></strong><span data-dcnode-id="3265" instrument_node=""> </span></p><span data-dcnode-id="3263" instrument_node="">
</span><p data-dcnode-id="3258"><span data-dcnode-id="3262" instrument_node="">Even though he has many outstanding modern works, one of the most famous ones is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metropolitan_Opera_Club" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3261" instrument_node="">Metropolitan Opera Club,</span></a><span data-dcnode-id="3259" instrument_node=""> which we can say has strengthened his classic style.</span></p><span data-dcnode-id="3257" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3256" instrument_node="">His classic styles is clearly seen is examples such as the</span><strong data-dcnode-id="3251"><span data-dcnode-id="3255" instrument_node=""> </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ppapc.com/projects/fifth-avenue-maisonette/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3254" instrument_node="">Fifth Avenue Maisonette</span></a><span data-dcnode-id="3252" instrument_node=""> </span></strong><span data-dcnode-id="3250" instrument_node="">and the </span><strong data-dcnode-id="3247"><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ppapc.com/projects/new-england-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3249" instrument_node="">New England House</span></a></strong><span data-dcnode-id="3246" instrument_node="">.</span></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3243" instrument_node="">No doubt his next project, </span><a data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ppapc.com/projects/house-in-maine/"><span data-dcnode-id="3242" instrument_node="">House in Maine</span></a><span data-dcnode-id="3240" instrument_node="">, will be as classical and beautiful. </span></p><span data-dcnode-id="3238" instrument_node="">

</span><h2 data-dcnode-id="3210"><span class="ez-toc-section" data-dcnode-id="3219" id="65_Maya_Ying_Lin_-_The_Vietnam_Veterans_Memorial"></span><strong data-dcnode-id="3212"><span data-dcnode-id="3218" instrument_node="">65. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maya_Lin" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3217" instrument_node="">Maya Ying Lin</span></a><span data-dcnode-id="3215" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_Veterans_Memorial" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3214" instrument_node="">The Vietnam Veterans Memorial </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3211"></span></h2><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3205"><a aria-label=" (opens in a new tab)" data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maya_Lin" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3208" instrument_node="">Maya Ying Lin</span></a><span data-dcnode-id="3206" instrument_node="">, born on October 5, 1959, is an American designer and architect best known for sculptures and historical memories but also for her care for nature and the environment.</span></p><span data-dcnode-id="3204" instrument_node="">
</span><p data-dcnode-id="3199"><span data-dcnode-id="3203" instrument_node="">Her most famous project is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_Veterans_Memorial" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3202" instrument_node="">Vietnam Veterans Memorial</span></a><span data-dcnode-id="3200" instrument_node="">, built in the honor of the US army that fought in the Vietnam War.</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3197" instrument_node="">Opening in </span><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architectmagazine.com/project-gallery/vietnam-veterans-memorial" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3196" instrument_node="">1981</span></a><span data-dcnode-id="3194" instrument_node=""> and finally completed in</span><a data-dcnode-id="3192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architectmagazine.com/project-gallery/vietnam-veterans-memorial" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3193" instrument_node=""> 2015,</span></a><span data-dcnode-id="3191" instrument_node=""> this</span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774717/spotlight-maya-lin" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3190" instrument_node=""> 12.000m2 </span></a><span data-dcnode-id="3188" instrument_node="">piece of art was a surprising opportunity for Lin. </span></p><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3185" instrument_node="">This iconic design is the result of Lin’s winning of the design competition for the </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/774717/spotlight-maya-lin" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3184" instrument_node="">Vietnam Veterans Memorial</span></a><span data-dcnode-id="3182" instrument_node="">. </span></p><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">The design is very minimalistic in nature, allowing big emotional impact. </span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3169"><span data-dcnode-id="3176" instrument_node="">Since this design, Lin has worked on </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visitorcenter.yale.edu/tours/women-yale/womens-table" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3175" instrument_node="">The Women’s Table at Yale</span></a><span data-dcnode-id="3173" instrument_node=""> and the </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Memorial%3Futm_medium%3Dwebsite%26utm_source%3Darchdaily.com" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3172" instrument_node="">Civil Rights Memorial</span></a><span data-dcnode-id="3170" instrument_node=""> in Montgomery, Alabama. </span></p><span data-dcnode-id="3168" instrument_node="">

</span><p data-dcnode-id="3134"><a aria-label=" (opens in a new tab)" data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denise_Scott_Brown" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3137" instrument_node="">Denise Scott Brown</span></a><span data-dcnode-id="3135" instrument_node="">, born on October 3, 1931, is a South African architect who became one of the most influential architects of the past century by her planning, writing and teaching architecture. </span></p><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3132" instrument_node="">She and her husband manage to build one of the </span><strong data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">most sophisticated public projects</span></strong><span data-dcnode-id="3129" instrument_node=""> in the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalgallery.org.uk/about-us/history/about-the-building/the-sainsbury-wing-20th-anniversary" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3128" instrument_node="">Postmodernism, the Sainsbury Wing.</span></a></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3113"><span data-dcnode-id="3124" instrument_node="">More </span><strong data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">recent designs</span></strong><span data-dcnode-id="3121" instrument_node=""> of the pair include the </span><strong data-dcnode-id="3118"><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baker-Berry_Library%23%3A~%3Atext%3DIn%25201992%252C%2520John%2520Berry%2520and%2Cand%2520was%2520completed%2520in%25202002." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3120" instrument_node="">Baker-Berry Library</span></a></strong><span data-dcnode-id="3117" instrument_node=""> at Dartmouth College and </span><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dumbarton_Oaks" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3116" instrument_node="">Dumbarton Oaks Library</span></a><span data-dcnode-id="3114" instrument_node=""> at Harvard University. </span></p><span data-dcnode-id="3112" instrument_node="">

</span><h2 data-dcnode-id="3084"><span class="ez-toc-section" data-dcnode-id="3093" id="67_Amanda_Levete_-_The_Selfridges_Building"></span><strong data-dcnode-id="3086"><span data-dcnode-id="3092" instrument_node="">67. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ala.uk.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3091" instrument_node="">Amanda Levete</span></a><span data-dcnode-id="3089" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selfridges_Building%2C_Birmingham" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3088" instrument_node="">The Selfridges Building </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3085"></span></h2><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3079"><a aria-label=" (opens in a new tab)" data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ala.uk.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3082" instrument_node="">Amanda Levete</span></a><span data-dcnode-id="3080" instrument_node="">, born on November 17, 1955, is a British architect, considered one of the most innovative architects in the UK. </span></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3077" instrument_node="">She obtained this title by designing the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selfridges_Building%2C_Birmingham" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3076" instrument_node="">Selfridges Building</span></a><span data-dcnode-id="3074" instrument_node=""> with the Future System team. The building is part of the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bullring.co.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3073" instrument_node="">Bullring Shopping Centre</span></a><span data-dcnode-id="3071" instrument_node="">, it cost 60 million pounds and it is one of the most futuristic buildings in Birmingham.</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3068" instrument_node="">Completed in </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archimagazine.com/aselfridges.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3067" instrument_node="">2003</span></a><span data-dcnode-id="3065" instrument_node="">, this building is known for its</span><strong data-dcnode-id="3060"><span data-dcnode-id="3064" instrument_node=""> unique “</span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archimagazine.com/aselfridges.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3063" instrument_node="">Blob Architecture</span></a><span data-dcnode-id="3061" instrument_node="">“</span></strong><span data-dcnode-id="3059" instrument_node=""> style and is comprised of</span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.archimagazine.com/aselfridges.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3058" instrument_node=""> 15.000 </span></a><span data-dcnode-id="3056" instrument_node="">aluminum discs that create a</span><strong data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node=""> very futuristic look. </span></strong></p><span data-dcnode-id="3052" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3035"><figure class="aligncenter" data-dcnode-id="3036"><picture class="wp-image-2311" data-dcnode-id="3046"><span data-dcnode-id="3051" instrument_node="">

</span><h2 data-dcnode-id="3023"><span class="ez-toc-section" data-dcnode-id="3033" id="68_Annabelle_Selldorf_-_The_David_Zwirner_Gallery"></span><strong data-dcnode-id="3025"><span data-dcnode-id="3032" instrument_node="">  68. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.selldorf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3031" instrument_node="">Annabelle Selldorf</span></a><span data-dcnode-id="3029" instrument_node=""> – </span><a aria-label="The David Zwirner Gallery (opens in a new tab)" data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidzwirner.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3028" instrument_node="">The David Zwirner Gallery</span></a><span data-dcnode-id="3026" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="3024"></span></h2><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3012"><a aria-label=" (opens in a new tab)" data-dcnode-id="3020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.selldorf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3021" instrument_node="">Annabelle Selldorf</span></a><span data-dcnode-id="3019" instrument_node=""> is a German architect and founder of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.selldorf.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3018" instrument_node="">Selldorf Architects</span></a><span data-dcnode-id="3016" instrument_node="">. This firm creates </span><strong data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">clear and modern settlements, </span></strong><span data-dcnode-id="3013" instrument_node="">which are “brought to life by its users”. </span></p><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3006"><span data-dcnode-id="3010" instrument_node="">Included in this category are museums, libraries, galleries and residential buildings. One of the most notable ones being the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidzwirner.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3009" instrument_node="">David Zwirner </span></a><span data-dcnode-id="3007" instrument_node="">Gallery.</span></p><span data-dcnode-id="3005" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="3004" instrument_node="">This David Zwirner Gallery opened in </span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/477074/david-zwirner-gallery-selldorf-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3003" instrument_node="">2013</span></a><span data-dcnode-id="3001" instrument_node="">, is </span><a data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/477074/david-zwirner-gallery-selldorf-architects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3000" instrument_node="">30.000</span></a><span data-dcnode-id="2998" instrument_node=""> square feet, and is heavily influenced by its </span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/477074/david-zwirner-gallery-selldorf-architects" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">industrial environment</span></strong></a><span data-dcnode-id="2994" instrument_node="">. This is clearly seen in the use of </span><strong data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">exposed concrete and clear lines. </span></strong></p><span data-dcnode-id="2990" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2972"><figure class="aligncenter" data-dcnode-id="2973"><a data-dcnode-id="2980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.davidzwirner.com/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2312" data-dcnode-id="2984"><span data-dcnode-id="2989" instrument_node="">

</span><h2 data-dcnode-id="2961"><span class="ez-toc-section" data-dcnode-id="2970" id="69_Odile_Decq_-_The_Fangshan_Tangshan_National_Geopark_Museum"></span><strong data-dcnode-id="2963"><span data-dcnode-id="2969" instrument_node="">69. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odiledecq.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2968" instrument_node="">Odile Decq </span></a><span data-dcnode-id="2966" instrument_node="">– </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.odiledecq.com/EN-5-project-64-FANGSHAN_TANGSHAN_NATIONAL_GEOPARK_MUSEUM_China_Nanjing" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2965" instrument_node="">The Fangshan Tangshan National Geopark Museum </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="2962"></span></h2><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2956"><a aria-label=" (opens in a new tab)" data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odiledecq.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2959" instrument_node="">Odile Decq</span></a><span data-dcnode-id="2957" instrument_node="">, born in 1955 is an award-winning French architect and founder of Studio Odile Decq. </span></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2950"><span data-dcnode-id="2954" instrument_node="">Her work is characterized by the importance that she gives to the overall space. An example is the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.odiledecq.com/EN-5-project-64-FANGSHAN_TANGSHAN_NATIONAL_GEOPARK_MUSEUM_China_Nanjing" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2953" instrument_node=""> Fangshan Tangshan National Geopark Museum</span></a><span data-dcnode-id="2951" instrument_node="">, where the interior is spacious and structured.</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2948" instrument_node="">Built in </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odiledecq.com/projets/tangshan-fangshan-geopark-museum/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2947" instrument_node="">2015</span></a><span data-dcnode-id="2945" instrument_node="">, the lines of the Fangshan Tangshan National Geopark Museum draw inspiration from an </span><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odiledecq.com/projets/tangshan-fangshan-geopark-museum/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2944" instrument_node="">1993 archeological site</span></a><span data-dcnode-id="2942" instrument_node="">. </span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2935"><span data-dcnode-id="2939" instrument_node="">This connection between design and inspiration ties in perfectly with the museum’s </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/771367/fangshan-tangshan-national-geopark-museum-studio-odile-decq" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2938" instrument_node="">focus</span></a><span data-dcnode-id="2936" instrument_node=""> on geology and anthropology. </span></p><span data-dcnode-id="2934" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2917"><figure class="aligncenter" data-dcnode-id="2918"><picture class="wp-image-2313" data-dcnode-id="2928"><span data-dcnode-id="2933" instrument_node="">

</span><h2 data-dcnode-id="2905"><span class="ez-toc-section" data-dcnode-id="2915" id="70_Susana_Torre_-_Fire_Station_Five"></span><strong data-dcnode-id="2907"><span data-dcnode-id="2914" instrument_node="">70. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2913" instrument_node="">Susana Torre</span></a><span data-dcnode-id="2911" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2910" instrument_node="">Fire Station Five</span></a><span data-dcnode-id="2908" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="2906"></span></h2><span data-dcnode-id="2904" instrument_node="">
</span><p data-dcnode-id="2900"><a aria-label=" (opens in a new tab)" data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2903" instrument_node="">Susana Torre</span></a><span data-dcnode-id="2901" instrument_node="">, born in 1944 is an Argentinian architect known for her projects that gather cultural, social and regional topics. </span></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2898" instrument_node="">Her style can be recognized in some of her best-known projects like </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Fire Station Five</span></strong></a><span data-dcnode-id="2894" instrument_node=""> in Columbus, the </span><strong data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Clark and Garvey Houses</span></strong><span data-dcnode-id="2891" instrument_node=""> in The Hamptons and the </span><strong data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Consulate of the Ivory Coast</span></strong><span data-dcnode-id="2888" instrument_node=""> in New York City.</span></p><span data-dcnode-id="2886" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2885" instrument_node="">This particular design was a</span><a data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/"><span data-dcnode-id="2884" instrument_node=""> </span><strong data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">collaboration between Torre and the mayor of Columbus</span></strong></a><span data-dcnode-id="2880" instrument_node="">, Indiana, with a focus on </span><a data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2879" instrument_node="">integrating women</span></a><span data-dcnode-id="2877" instrument_node=""> into the firedepartment. </span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2874" instrument_node="">Torre designed a more </span><strong data-dcnode-id="2870"><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2873" instrument_node="">female-friendly environment</span></a><span data-dcnode-id="2871" instrument_node="">,</span></strong><span data-dcnode-id="2869" instrument_node=""> where women weren’t necessitated to share sleep and shower facilities with the men. </span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2857"><span data-dcnode-id="2866" instrument_node="">Rather, the </span><strong data-dcnode-id="2862"><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.susanatorre.net/architecture-and-design/making-room-for-women/fire-station-five/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2865" instrument_node="">new kitchen and gymnasium</span></a><span data-dcnode-id="2863" instrument_node=""> </span></strong><span data-dcnode-id="2861" instrument_node="">have replaced sleep and shower facilities as places for </span><strong data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">coworkers to bond.</span></strong><span data-dcnode-id="2858" instrument_node=""> </span></p><span data-dcnode-id="2856" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2839"><figure class="aligncenter" data-dcnode-id="2840"><picture class="wp-image-2314" data-dcnode-id="2850"><span data-dcnode-id="2855" instrument_node="">

</span><h2 data-dcnode-id="2823"><span class="ez-toc-section" data-dcnode-id="2837" id="71_Elizabeth_Diller_and_Diller_Scofidio_Renfro-_The_Institute_of_Contemporary_Art"></span><strong data-dcnode-id="2833"><span data-dcnode-id="2836" instrument_node="">71. </span><a aria-label="Elizabeth Diller (opens in a new tab)" data-dcnode-id="2834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2835" instrument_node="">Elizabeth Diller</span></a></strong><span data-dcnode-id="2832" instrument_node=""> and </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2831" instrument_node="">Diller Scofidio + Renfro</span></a><strong data-dcnode-id="2825"><span data-dcnode-id="2829" instrument_node="">– </span><a aria-label="The Institute of Contemporary Art (opens in a new tab)" data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ica.art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2828" instrument_node="">The Institute of Contemporary Art</span></a><span data-dcnode-id="2826" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="2824"></span></h2><span data-dcnode-id="2822" instrument_node="">
</span><p data-dcnode-id="2815"><a aria-label=" (opens in a new tab)" data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2821" instrument_node="">Elizabeth Diller,</span></a><span data-dcnode-id="2819" instrument_node=""> born in 1954 is an American architect and partner in </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2818" instrument_node="">Diller Scofidio + Renfro</span></a><span data-dcnode-id="2816" instrument_node=""> alongside Ricardo Scofidio, Charles Renfro, and Benjamin Gilmartin. </span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2809"><span data-dcnode-id="2813" instrument_node="">She is known as one of the most influential designers of cultural buildings. One of her many known buildings is the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ica.art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2812" instrument_node=""> Institute of Contemporary Art</span></a><span data-dcnode-id="2810" instrument_node=""> (ICA), the first new art museum to be built in Boston.</span></p><span data-dcnode-id="2808" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2807" instrument_node="">The ICA was finished in </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/project/institute-of-contemporary-art%3Findex%3Dfalse%26section%3Dprojects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2806" instrument_node="">2006 spans across 65.000 square feet</span></a><span data-dcnode-id="2804" instrument_node="">. It was actually </span><strong data-dcnode-id="2801"><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/project/institute-of-contemporary-art%3Findex%3Dfalse%25C2%25A7ion%3Dprojects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2803" instrument_node="">the very first museum built</span></a></strong><span data-dcnode-id="2800" instrument_node=""> in Boston for over a century. </span></p><span data-dcnode-id="2798" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2797" instrument_node="">However, </span><strong data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">the ICA is much more than simply a museum</span></strong><span data-dcnode-id="2794" instrument_node="">. These 65.000 square feet offer numerous entertainment possibilities, such as </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/project/institute-of-contemporary-art%3Findex%3Dfalse%26section%3Dprojects" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">“galleries, a 330 seat multi-purpose theater, a restaurant, bookstore, education/workshop facilities”</span></strong></a><span data-dcnode-id="2790" instrument_node="">, just to name a few. </span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2783"><span data-dcnode-id="2787" instrument_node="">Also, it has a </span><strong data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">great view </span></strong><span data-dcnode-id="2784" instrument_node="">of the harbor! </span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2781" instrument_node="">Currently, Diller is working on a design for the</span><strong data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node=""> London Symphony Orchestra</span></strong><span data-dcnode-id="2778" instrument_node=""> (</span><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dsrny.com/%3Findex%3Dtrue%26section%3Dstudio" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2777" instrument_node="">The Center for Music</span></a><span data-dcnode-id="2775" instrument_node="">).</span></p><span data-dcnode-id="2773" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2755"><figure class="aligncenter" data-dcnode-id="2756"><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ica.art/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2315" data-dcnode-id="2767"><span data-dcnode-id="2772" instrument_node="">

</span><h2 data-dcnode-id="2743"><span class="ez-toc-section" data-dcnode-id="2753" id="72_Diebedo_Francis_Kere_-_Primary_School_in_Gando"></span><strong data-dcnode-id="2745"><span data-dcnode-id="2752" instrument_node="">72. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kere-architecture.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2751" instrument_node="">Diébédo Francis Kéré</span></a><span data-dcnode-id="2749" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2748" instrument_node="">Primary School in Gando</span></a><span data-dcnode-id="2746" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="2744"></span></h2><span data-dcnode-id="2742" instrument_node="">
</span><p data-dcnode-id="2736"><a aria-label=" (opens in a new tab)" data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kere-architecture.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2741" instrument_node="">Diébédo Francis Kéré</span></a><span data-dcnode-id="2739" instrument_node="">, born on April 10, 1965, in Burkina Faso is the founder of </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kere-architecture.com/"><span data-dcnode-id="2738" instrument_node="">Kéré Architecture. </span></a></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2734" instrument_node="">He finished his studies in Germany and then decided to come back and help his home town. He is known for building the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2733" instrument_node="">Primary School in Gando</span></a><span data-dcnode-id="2731" instrument_node="">, which was </span><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture"><strong data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">his very first building</span></strong></a><span data-dcnode-id="2727" instrument_node="">, alongside many other school-related buildings.</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2721"><span data-dcnode-id="2724" instrument_node="">The Primary School was finished in </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2723" instrument_node="">2001 and is 301m2.</span></a></p><span data-dcnode-id="2720" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2719" instrument_node="">What makes the design of this building so special is the fact that it is a </span><strong data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">very personal design</span></strong><span data-dcnode-id="2716" instrument_node="">. When designing, Kéré had a </span><strong data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">heavy focus on resources</span></strong><span data-dcnode-id="2713" instrument_node=""> as </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2712" instrument_node="">he himself had gone to a school</span></a><span data-dcnode-id="2710" instrument_node=""> in Gando that wasn’t an optimal climate for learning. </span></p><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2698"><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2707" instrument_node="">According to him</span></a><span data-dcnode-id="2705" instrument_node="">, </span><strong data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">his childhood school </span></strong><span data-dcnode-id="2702" instrument_node="">had no ventilation and very poor lighting, both of which heavily</span><strong data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node=""> affected his ability to learn.</span></strong><span data-dcnode-id="2699" instrument_node=""> </span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2696" instrument_node="">This would be remedied in the new primary school. Here the </span><strong data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">indoor climate was vital and prioritized.</span></strong><span data-dcnode-id="2693" instrument_node=""> </span></p><span data-dcnode-id="2691" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2690" instrument_node="">What makes it even more special is that this school is a true “it takes a village” building. </span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/785955/primary-school-in-gando-kere-architecture" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2689" instrument_node="">Embracing tradition</span></a><span data-dcnode-id="2687" instrument_node="">, </span><strong data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">the entire village helped build the school</span></strong><span data-dcnode-id="2684" instrument_node="">. </span></p><span data-dcnode-id="2682" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2665"><figure class="aligncenter" data-dcnode-id="2666"><picture class="wp-image-2317" data-dcnode-id="2676"><span data-dcnode-id="2681" instrument_node="">

</span><h2 data-dcnode-id="2654"><span class="ez-toc-section" data-dcnode-id="2663" id="73_Bruce_Kuwabara_-_The_Remai_Modern"></span><strong data-dcnode-id="2656"><span data-dcnode-id="2662" instrument_node="">73. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kpmb.com/person/bruce-kuwabara/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2661" instrument_node="">Bruce Kuwabara</span></a><span data-dcnode-id="2659" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remaimodern.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2658" instrument_node="">The Remai Modern </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="2655"></span></h2><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2647"><a aria-label=" (opens in a new tab)" data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kpmb.com/person/bruce-kuwabara/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2652" instrument_node="">Bruce Kuwabara</span></a><span data-dcnode-id="2650" instrument_node="">, born in 1949 is a Canadian architect and founder of </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kpmb.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2649" instrument_node="">KPMB Architects.</span></a></p><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">He is known for his sustainable architectural design and for being one of the few who was studding this aspect before being a priority in Canada. </span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2642" instrument_node="">One of his well-known projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remaimodern.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2641" instrument_node="">Remai Modern</span></a><span data-dcnode-id="2639" instrument_node=""> art museum.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">The Ramai was finished in 2017 and spans across 126.000 square feet. </span></p><span data-dcnode-id="2634" instrument_node="">

</span><hr class="wp-block-separator" data-dcnode-id="2502"><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2496"><br data-dcnode-id="2500"><br data-dcnode-id="2499"><br data-dcnode-id="2498"><br data-dcnode-id="2497"></p><span data-dcnode-id="2495" instrument_node="">
</span><h2 data-dcnode-id="2485"><span class="ez-toc-section" data-dcnode-id="2494" id="76_Bruno_Freschi_-_The_Science_World"></span><strong data-dcnode-id="2487"><span data-dcnode-id="2493" instrument_node="">76. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruno_Freschi" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2492" instrument_node="">Bruno Freschi</span></a><span data-dcnode-id="2490" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceworld.ca/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2489" instrument_node="">The Science World </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="2486"></span></h2><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2478"><a aria-label=" (opens in a new tab)" data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruno_Freschi" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2483" instrument_node="">Bruno Freschi</span></a><span data-dcnode-id="2481" instrument_node="">, born on April 18, 1937, is a Canadian architect known for </span><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">his specific focus on space, form, and urbanism. </span></strong></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node="">One of his projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceworld.ca/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2475" instrument_node="">Science World</span></a><span data-dcnode-id="2473" instrument_node=""> where his style can be clearly seen.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2470" instrument_node="">This gorgeous dome was created to be the pièce de résistance of the </span><strong data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">100th anniversary of the 1986 World’s Fair</span></strong><span data-dcnode-id="2467" instrument_node=""> in Vancouver. </span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2458"><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scienceworld.ca/stories/built-to-be-torn-down-dreamed-to-last-the-history-behind-science-worlds-dome/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2464" instrument_node="">According to its creator,</span></a><span data-dcnode-id="2462" instrument_node=""> Bruno Freschi, the dome was “</span><strong data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">built to be torn down, dreamed to last</span></strong><span data-dcnode-id="2459" instrument_node="">” as its sole purpose was to be a part of the 1986 Expo. </span></p><span data-dcnode-id="2457" instrument_node="">

</span><p data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">The company is based in the Netherlands and had implemented contemporary architectural solutions and urban issues all over the world. </span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2166" instrument_node="">One of their most well-known projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mvrdv.nl/projects/158/expo-2000" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2165" instrument_node="">EXPO 2000 Pavilion</span></a><span data-dcnode-id="2163" instrument_node="">, which was made to represent a balance between nature and technology.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2160" instrument_node="">This amazing design has resulted in a construction of </span><strong data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">six levels of Dutch Landscapes</span></strong><span data-dcnode-id="2157" instrument_node=""> that </span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mvrdv.nl/projects/158/expo-2000" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2156" instrument_node="">“form an independent eco-system communicating Dutch cultural sustainability”</span></a><span data-dcnode-id="2154" instrument_node=""> in one single building. </span></p><span data-dcnode-id="2152" instrument_node="">
