</span><h2 data-dcnode-id="4798"><span class="ez-toc-section" data-dcnode-id="4808" id="40_Joshua_Prince-Ramus_-_The_Vakko_Headquarters_and_Power_Media_Center"></span><strong data-dcnode-id="4800"><span data-dcnode-id="4807" instrument_node="">40. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/featured-projects-detail/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4806" instrument_node="">Joshua Prince-Ramus</span></a><span data-dcnode-id="4804" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archello.com/project/vakko-headquarters-and-power-media-center" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4803" instrument_node="">The Vakko Headquarters and Power Media Center</span></a><span data-dcnode-id="4801" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="4799"></span></h2><span data-dcnode-id="4797" instrument_node="">
</span><p data-dcnode-id="4790"><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/featured-projects-detail/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4796" instrument_node="">Joshua Prince-Ramus</span></a><span data-dcnode-id="4794" instrument_node=""> is an American architect born in 1969. He is the founder of </span><strong data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">REX</span></strong><span data-dcnode-id="4791" instrument_node="">, the international architecture, and design firm.&nbsp;</span></p><span data-dcnode-id="4789" instrument_node="">
</span><p data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">Ramus has received many awards for one of the best young architects of our era.</span></p><span data-dcnode-id="4786" instrument_node="">
</span><p data-dcnode-id="4778"><span data-dcnode-id="4785" instrument_node="">His company REX is known for </span><strong data-dcnode-id="4783"><span data-dcnode-id="4784" instrument_node="">challenging typologies</span></strong><span data-dcnode-id="4782" instrument_node="">, and </span><strong data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">promoting architecture</span></strong><span data-dcnode-id="4779" instrument_node=""> as an industry.</span></p><span data-dcnode-id="4777" instrument_node="">
</span><p data-dcnode-id="4772"><span data-dcnode-id="4776" instrument_node="">One of Ramus’ works that brought him fame is the </span><a data-dcnode-id="4774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/vakko-fashion-center/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4775" instrument_node="">Vakko Fashion Center</span></a><span data-dcnode-id="4773" instrument_node=""> in Istanbul, Turkey. The construction is two office buildings, with one built inside the other.</span></p><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4763"><span data-dcnode-id="4770" instrument_node="">Two other works are the </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/seattle-library/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4769" instrument_node="">Seattle Central Library</span></a><span data-dcnode-id="4767" instrument_node=""> in Washington, and the </span><a data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/necklace-residence-final/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4766" instrument_node="">Necklace Residence</span></a><span data-dcnode-id="4764" instrument_node=""> in Long Island, New York.</span></p><span data-dcnode-id="4762" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4753"><figure class="aligncenter" data-dcnode-id="4754"><img alt="Vakko Fashion Center" data-dcnode-id="4761" data-lazy-src="https://1z7yau3hhlmw2pxfx620tixw-wpengine.netdna-ssl.com/wp-content/uploads/2018/02/01-11-1179x1000.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">&lt;img src="https://1z7yau3hhlmw2pxfx620tixw-wpengine.netdna-ssl.com/wp-content/uploads/2018/02/01-11-1179x1000.jpg" alt="Vakko Fashion Center"/&gt;</span></noscript><figcaption data-dcnode-id="4755"><span data-dcnode-id="4758" instrument_node="">Vakko Fashion Center. Image by: </span><a data-dcnode-id="4756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rex-ny.com/project/vakko-fashion-center/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4757" instrument_node="">REX</span></a></figcaption></figure></div><span data-dcnode-id="4752" instrument_node="">
</span><h2 data-dcnode-id="4742"><span class="ez-toc-section" data-dcnode-id="4751" id="41_Ken_Yeang_-_The_National_Library_of_Singapore"></span><strong data-dcnode-id="4744"><span data-dcnode-id="4750" instrument_node="">41. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Yeang" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4749" instrument_node="">Ken Yeang</span></a><span data-dcnode-id="4747" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nlb.gov.sg/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4746" instrument_node="">The National Library of Singapore </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4743"></span></h2><span data-dcnode-id="4741" instrument_node="">
</span><p data-dcnode-id="4737"><a data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kenyeang.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4740" instrument_node="">Ken Yeang</span></a><span data-dcnode-id="4738" instrument_node=""> was born in 1949 in Penang, Malaysia.&nbsp;</span></p><span data-dcnode-id="4736" instrument_node="">
</span><p data-dcnode-id="4731"><span data-dcnode-id="4735" instrument_node="">Yeang himself states: ‘”</span><strong data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">I’m an ecologist first, an architect second</span></strong><span data-dcnode-id="4732" instrument_node="">“.</span></p><span data-dcnode-id="4730" instrument_node="">
</span><p data-dcnode-id="4725"><span data-dcnode-id="4729" instrument_node="">In 1977 he founded the architecture firm </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trhamzahyeang.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4728" instrument_node="">Hamzah &amp; Yeang</span></a><span data-dcnode-id="4726" instrument_node=""> together with Tengku Robert Hamzah.&nbsp;</span></p><span data-dcnode-id="4724" instrument_node="">
</span><p data-dcnode-id="4716"><span data-dcnode-id="4723" instrument_node="">They are known for their </span><strong data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">innovative </span></strong><span data-dcnode-id="4720" instrument_node="">structures that are focused on being </span><strong data-dcnode-id="4718"><span data-dcnode-id="4719" instrument_node="">environmentally and ecologically conscious</span></strong><span data-dcnode-id="4717" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4715" instrument_node="">
</span><p data-dcnode-id="4704"><span data-dcnode-id="4714" instrument_node="">One of Yeang’s key buildings that follows his ideologies is the </span><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nlb.gov.sg/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4713" instrument_node="">National Library Singapore,</span></a><span data-dcnode-id="4711" instrument_node=""> where </span><a data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Ken_Yeang" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4710" instrument_node="">Ken Yeang</span></a><span data-dcnode-id="4708" instrument_node=""> found the opportunity to apply his </span><strong data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">sustainability </span></strong><span data-dcnode-id="4705" instrument_node="">concepts.</span></p><span data-dcnode-id="4703" instrument_node="">
</span><p data-dcnode-id="4695"><span data-dcnode-id="4702" instrument_node="">Some other renowned projects of Hamzah &amp; Yeang are the office building </span><a data-dcnode-id="4700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trhamzahyeang.com/portfolio-item/solaris/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4701" instrument_node="">SOLARIS </span></a><span data-dcnode-id="4699" instrument_node="">in Singapore, and the </span><a data-dcnode-id="4697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trhamzahyeang.com/portfolio-item/calvary-convention-center/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4698" instrument_node="">Calvary Convention Center</span></a><span data-dcnode-id="4696" instrument_node=""> in Kuala Lumpur, Malaysia.&nbsp;</span></p><span data-dcnode-id="4694" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4685"><figure class="aligncenter" data-dcnode-id="4686"><img alt="Libraries in Singapore to reopen on Jul 1 with shorter hours - Youth.SG" data-dcnode-id="4693" data-lazy-src="https://www.youth.sg/~/media/YouthSG/National-Library-Board/NLB.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">&lt;img src="https://www.youth.sg/~/media/YouthSG/National-Library-Board/NLB.jpg" alt="Libraries in Singapore to reopen on Jul 1 with shorter hours - Youth.SG"/&gt;</span></noscript><figcaption data-dcnode-id="4687"><span data-dcnode-id="4690" instrument_node="">Singapore National Library. Image by: </span><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youth.gov.sg/Peek-Show/2020/6/Libraries-in-Singapore-reopen-on-Jul-1-with-shorter-hours" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4689" instrument_node="">Youth.sg</span></a></figcaption></figure></div><span data-dcnode-id="4684" instrument_node="">
</span><h2 data-dcnode-id="4673"><span class="ez-toc-section" data-dcnode-id="4683" id="42_Kengo_Kuma_-_The_Bamboo_Wall_House"></span><strong data-dcnode-id="4675"><span data-dcnode-id="4682" instrument_node="">42. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4681" instrument_node="">Kengo Kuma</span></a><span data-dcnode-id="4679" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-architects.com/de/kengo-kuma-and-associates-tokyo/project/great-bamboo-wall" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4678" instrument_node="">The Bamboo Wall House</span></a><span data-dcnode-id="4676" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="4674"></span></h2><span data-dcnode-id="4672" instrument_node="">
</span><p data-dcnode-id="4668"><a data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4671" instrument_node="">Kengo Kuma</span></a><span data-dcnode-id="4669" instrument_node=""> is a Japanese architect and professor born in 1954 in Yokohama.</span></p><span data-dcnode-id="4667" instrument_node="">
</span><p data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">In 1990 he founded his firm Kengo Kuma &amp; Associates.</span></p><span data-dcnode-id="4664" instrument_node="">
</span><p data-dcnode-id="4654"><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/about/kengokuma/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4663" instrument_node="">Kuma</span></a><span data-dcnode-id="4661" instrument_node=""> is known for his goal to recover the </span><strong data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">traditions </span></strong><span data-dcnode-id="4658" instrument_node="">that the </span><strong data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">Japanese architecture</span></strong><span data-dcnode-id="4655" instrument_node=""> holds and implement them in the architecture from our century.&nbsp;</span></p><span data-dcnode-id="4653" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4652" instrument_node="">He aims to let buildings merge with their environmental and cultural surroundings. All designs are </span><strong data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">human scaled</span></strong><span data-dcnode-id="4649" instrument_node="">.</span></p><span data-dcnode-id="4647" instrument_node="">
</span><p data-dcnode-id="4642"><span data-dcnode-id="4646" instrument_node="">One of Kuma’s key projects is the </span><a data-dcnode-id="4644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/works/architecture/great-bamboo-wall/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4645" instrument_node="">Bamboo Wall House</span></a><span data-dcnode-id="4643" instrument_node="">, which had the purpose to contrast the Great Wall of China in the sense of fragility and transparency.&nbsp;</span></p><span data-dcnode-id="4641" instrument_node="">
</span><p data-dcnode-id="4633"><span data-dcnode-id="4640" instrument_node="">Two other works that are great examples of Kuma’s distinctive style are the </span><a data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/works/architecture/national-stadium/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4639" instrument_node="">Japan National Stadium</span></a><span data-dcnode-id="4637" instrument_node="">, and the </span><a data-dcnode-id="4635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kkaa.co.jp/works/architecture/nagasaki-prefecture-art-museum/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4636" instrument_node="">Nagasaki Prefecture Art Museum</span></a><span data-dcnode-id="4634" instrument_node="">.</span></p><span data-dcnode-id="4632" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4623"><figure class="aligncenter" data-dcnode-id="4624"><img alt="Bamboo House Commune by the Great Wall / Kengo Kuma &amp; Associates | ArchEyes" data-dcnode-id="4631" data-lazy-src="https://i0.wp.com/archeyes.com/wp-content/uploads/2016/01/kengo-kuma-hotel-bamboo-wall-china-2.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">&lt;img src="https://i0.wp.com/archeyes.com/wp-content/uploads/2016/01/kengo-kuma-hotel-bamboo-wall-china-2.jpg" alt="Bamboo House Commune by the Great Wall / Kengo Kuma &amp;amp; Associates | ArchEyes"/&gt;</span></noscript><figcaption data-dcnode-id="4625"><span data-dcnode-id="4628" instrument_node="">The Bamboo Wall House. Image by </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/archeyes.com/wp-content/uploads/2016/01/kengo-kuma-hotel-bamboo-wall-china-2.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4627" instrument_node="">ArchEyes</span></a></figcaption></figure></div><span data-dcnode-id="4622" instrument_node="">
</span><h2 data-dcnode-id="4611"><span class="ez-toc-section" data-dcnode-id="4621" id="43_Ma_Yansong_-_The_Absolute_Towers"></span><strong data-dcnode-id="4613"><span data-dcnode-id="4620" instrument_node="">43. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4619" instrument_node="">Ma Yansong</span></a><span data-dcnode-id="4617" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolute_World" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4616" instrument_node="">The Absolute Towers</span></a><span data-dcnode-id="4614" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="4612"></span></h2><span data-dcnode-id="4610" instrument_node="">
</span><p data-dcnode-id="4603"><a data-dcnode-id="4608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4609" instrument_node="">Ma Yansong</span></a><span data-dcnode-id="4607" instrument_node=""> is an architect born in 1975 in Beijing, China. In 2004 he founded the firm </span><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4606" instrument_node="">MAD architects</span></a><span data-dcnode-id="4604" instrument_node="">.</span></p><span data-dcnode-id="4602" instrument_node="">
</span><p data-dcnode-id="4597"><span data-dcnode-id="4601" instrument_node="">Mention worthy is that Yansong has been the </span><strong data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">first Chinese architect </span></strong><span data-dcnode-id="4598" instrument_node="">to win an overseas landmark-building project.</span></p><span data-dcnode-id="4596" instrument_node="">
</span><p data-dcnode-id="4586"><a data-dcnode-id="4594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/799981/spotlight-ma-yansong" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4595" instrument_node="">Yansong</span></a><span data-dcnode-id="4593" instrument_node="">’s works can be seen as </span><strong data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">innovative</span></strong><span data-dcnode-id="4590" instrument_node="">, and </span><strong data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">breaking with tradition</span></strong><span data-dcnode-id="4587" instrument_node="">.</span></p><span data-dcnode-id="4585" instrument_node="">
</span><p data-dcnode-id="4580"><span data-dcnode-id="4584" instrument_node="">Yansong’s ideology comes from the concept that contemporary architecture has no spirit and he wants to make buildings that </span><strong data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">inspire </span></strong><span data-dcnode-id="4581" instrument_node="">people and are against this concept of today.</span></p><span data-dcnode-id="4579" instrument_node="">
</span><p data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">In his constructions, Yansong explores the relationship between traditional, eastern values and the contemporary, western architecture style.</span></p><span data-dcnode-id="4576" instrument_node="">
</span><p data-dcnode-id="4571"><span data-dcnode-id="4575" instrument_node="">Even though his works are contextually aware, they often appear very </span><strong data-dcnode-id="4573"><span data-dcnode-id="4574" instrument_node="">surreal</span></strong><span data-dcnode-id="4572" instrument_node=""> to the viewer.</span></p><span data-dcnode-id="4570" instrument_node="">
</span><p data-dcnode-id="4565"><span data-dcnode-id="4569" instrument_node="">One of Yansongs most notable projects are the </span><a data-dcnode-id="4567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/work/absolute-towers/%3Fcid%3D4" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4568" instrument_node="">Absolute Towers</span></a><span data-dcnode-id="4566" instrument_node="">, which is a residence with a focus on reducing energy load and giving to its inhabitants as much light as possible.</span></p><span data-dcnode-id="4564" instrument_node="">
</span><p data-dcnode-id="4556"><span data-dcnode-id="4563" instrument_node="">Two other renowned works are the </span><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/work/ordos-museum/%3Fcid%3D4" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4562" instrument_node="">Ordos Art &amp; City Museum</span></a><span data-dcnode-id="4560" instrument_node="">, and the </span><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-mad.com/work/harbin-cultural-center/%3Fcid%3D4" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4559" instrument_node="">Harbin Opera House</span></a><span data-dcnode-id="4557" instrument_node="">, both located in China.</span></p><span data-dcnode-id="4555" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4546"><figure class="aligncenter" data-dcnode-id="4547"><img alt="Marilyn Monroe' towers in Mississauga among world's best new skyscrapers |  The Star" data-dcnode-id="4554" data-lazy-src="https://images.thestar.com/kC7t4dymqElCPGBN5lGqMfYp17o=/400x727/smart/filters:cb(2700061000)/https://www.thestar.com/content/dam/thestar/news/gta/2012/06/14/marilyn_monroe_towers_in_mississauga_among_worlds_best_new_skyscrapers/absolutetowers.jpeg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">&lt;img src="https://images.thestar.com/kC7t4dymqElCPGBN5lGqMfYp17o=/400x727/smart/filters:cb(2700061000)/https://www.thestar.com/content/dam/thestar/news/gta/2012/06/14/marilyn_monroe_towers_in_mississauga_among_worlds_best_new_skyscrapers/absolutetowers.jpeg" alt="Marilyn Monroe' towers in Mississauga among world's best new skyscrapers |  The Star"/&gt;</span></noscript><figcaption data-dcnode-id="4548"><span data-dcnode-id="4551" instrument_node="">The Absolute Towers. Image by </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.thestar.com/kC7t4dymqElCPGBN5lGqMfYp17o%3D/400x727/smart/filters%3Acb%282700061000%29/https%3A//www.thestar.com/content/dam/thestar/news/gta/2012/06/14/marilyn_monroe_towers_in_mississauga_among_worlds_best_new_skyscrapers/absolutetowers.jpeg"><span data-dcnode-id="4550" instrument_node="">The Star</span></a></figcaption></figure></div><span data-dcnode-id="4545" instrument_node="">
</span><h2 data-dcnode-id="4531"><span class="ez-toc-section" data-dcnode-id="4544" id="44_Massimiliano_and_Doriana_Fuksas_-_The_Shenzhen_Baoan_International_Airport_Terminal_3"></span><strong data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">44. </span></strong><a aria-label=" (opens in a new tab)" data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fuksas.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4541" instrument_node="">Massimiliano and Doriana </span></a><a aria-label="Fuksas (opens in a new tab)" data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fuksas.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4539" instrument_node="">Fuksas</span></a><strong data-dcnode-id="4533"><span data-dcnode-id="4537" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airport-shenzhen.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4536" instrument_node="">The Shenzhen Bao’an International Airport Terminal 3</span></a><span data-dcnode-id="4534" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="4532"></span></h2><span data-dcnode-id="4530" instrument_node="">
</span><p data-dcnode-id="4526"><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fuksas.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4529" instrument_node="">Massimiliano Fuksas</span></a><span data-dcnode-id="4527" instrument_node=""> is an architect born in 1944 in Rome.</span></p><span data-dcnode-id="4525" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4524" instrument_node="">He has founded the architecture company </span><a data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fuksas.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4523" instrument_node="">Studio Fuksas</span></a><span data-dcnode-id="4521" instrument_node=""> together with his wife,</span><a data-dcnode-id="4519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fuksas.com/about/doriana-fuksas/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4520" instrument_node=""> Doriana Fuksas.</span></a></p><span data-dcnode-id="4517" instrument_node="">
</span><p data-dcnode-id="4509"><span data-dcnode-id="4516" instrument_node="">Since they design according to the specific </span><strong data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">context </span></strong><span data-dcnode-id="4513" instrument_node="">and </span><strong data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">background </span></strong><span data-dcnode-id="4510" instrument_node="">of a site, the Fuksas works vary a lot in style, scale, and location.</span></p><span data-dcnode-id="4508" instrument_node="">
</span><p data-dcnode-id="4500"><span data-dcnode-id="4507" instrument_node="">However, all their works display some kind of </span><strong data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">elegance </span></strong><span data-dcnode-id="4504" instrument_node="">in their appearance, and they are designed keeping the impact on the </span><strong data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">environment </span></strong><span data-dcnode-id="4501" instrument_node="">in mind.</span></p><span data-dcnode-id="4499" instrument_node="">
</span><p data-dcnode-id="4494"><span data-dcnode-id="4498" instrument_node="">The couple focuses on the desires and needs of the public, as they want to provoke </span><strong data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">positive feelings</span></strong><span data-dcnode-id="4495" instrument_node=""> to the visitors.</span></p><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4488"><span data-dcnode-id="4492" instrument_node="">One example of their exemplary work is the </span><a data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.airport-shenzhen.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4491" instrument_node="">Shenzhen Bao’an International Airport Terminal 3,</span></a><span data-dcnode-id="4489" instrument_node=""> a project located in China that shows elegance and utility.&nbsp;</span></p><span data-dcnode-id="4487" instrument_node="">
</span><p data-dcnode-id="4479"><span data-dcnode-id="4486" instrument_node="">Two other renowned works are the </span><a data-dcnode-id="4484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fuksas.com/zenith-music-hall-strasbourg/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4485" instrument_node="">Zenith Music Hall</span></a><span data-dcnode-id="4483" instrument_node=""> in Strasbourg (France), and the </span><a data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fuksas.com/st-paolo-parish-complex/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4482" instrument_node="">St. Paolo Parish Complex</span></a><span data-dcnode-id="4480" instrument_node=""> in Foligno (Italy).</span></p><span data-dcnode-id="4478" instrument_node="">

</span><h2 data-dcnode-id="4450"><span class="ez-toc-section" data-dcnode-id="4459" id="45_Rafael_Moneo_-_The_National_Museum_of_Roman_Art"></span><strong data-dcnode-id="4452"><span data-dcnode-id="4458" instrument_node="">45. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rafaelmoneo.com/en/studio/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4457" instrument_node="">Rafael Moneo</span></a><span data-dcnode-id="4455" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rafaelmoneo.com/en/projects/national-museum-of-roman-art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4454" instrument_node="">The National Museum of Roman Art </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4451"></span></h2><span data-dcnode-id="4449" instrument_node="">
</span><p data-dcnode-id="4445"><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rafaelmoneo.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4448" instrument_node="">José Rafael Moneo</span></a><span data-dcnode-id="4446" instrument_node=""> is a Spanish architect born in 1937 in Navarro.</span></p><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4439"><span data-dcnode-id="4443" instrument_node="">In 1966 he founded his own firm, Studio Rafael Moneo. Also in this year, Moneo won the </span><a data-dcnode-id="4441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4442" instrument_node="">Pritzker Prize</span></a><span data-dcnode-id="4440" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4433"><span data-dcnode-id="4437" instrument_node="">He is known as a </span><strong data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">contemporary</span></strong><span data-dcnode-id="4434" instrument_node=""> architect that combines aesthetics and functionality in his projects.</span></p><span data-dcnode-id="4432" instrument_node="">
</span><p data-dcnode-id="4424"><span data-dcnode-id="4431" instrument_node="">By spending part of his life in </span><a data-dcnode-id="4429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//architectuul.com/architect/rafael-moneo" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4430" instrument_node="">Scandinavia</span></a><span data-dcnode-id="4428" instrument_node="">, he incorporated traditional </span><strong data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">Nordic style and material</span></strong><span data-dcnode-id="4425" instrument_node=""> aspects in his overall design style.&nbsp;</span></p><span data-dcnode-id="4423" instrument_node="">
</span><p data-dcnode-id="4415"><span data-dcnode-id="4422" instrument_node="">His buildings are </span><strong data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">clean</span></strong><span data-dcnode-id="4419" instrument_node="">, often designed with </span><strong data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">straight lines</span></strong><span data-dcnode-id="4416" instrument_node="">.</span></p><span data-dcnode-id="4414" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4413" instrument_node="">One of his best buildings is the </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rafaelmoneo.com/en/projects/national-museum-of-roman-art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4412" instrument_node="">National Museum of Roman Art</span></a><span data-dcnode-id="4410" instrument_node="">, where Rafael Moneo used Roman techniques, materials and proportions in order to give authenticity to the building.&nbsp;</span></p><span data-dcnode-id="4408" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4407" instrument_node="">Two other renowned works are the </span><a data-dcnode-id="4405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.museodelprado.es/en/museum/jeronimos-extension%23%3A~%3Atext%3DThe%2520Institution-%2CThe%2520extension%2Calmost%2520200%2520years%2520of%2520history." rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4406" instrument_node="">Prado Museum Extension</span></a><span data-dcnode-id="4404" instrument_node=""> in Madrid, and the </span><a data-dcnode-id="4402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//divisare.com/projects/318244-rafael-moneo-chen-hao-murcia-town-hall-1991-98" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4403" instrument_node="">Murcia Town Hall</span></a><span data-dcnode-id="4401" instrument_node="">, both located in Spain.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4382"><figure class="aligncenter" data-dcnode-id="4383"><picture class="wp-image-2283" data-dcnode-id="4393"><span data-dcnode-id="4398" instrument_node="">

</span><h2 data-dcnode-id="4371"><span class="ez-toc-section" data-dcnode-id="4380" id="46_Rafael_Vinoly_-_The_432_Park_Avenue"></span><strong data-dcnode-id="4373"><span data-dcnode-id="4379" instrument_node="">46. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vinoly.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4378" instrument_node="">Rafael Viñoly</span></a><span data-dcnode-id="4376" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.432parkavenue.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4375" instrument_node="">The 432 Park Avenue</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4372"></span></h2><span data-dcnode-id="4370" instrument_node="">
</span><p data-dcnode-id="4366"><a data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vinoly.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4369" instrument_node="">Rafael Viñoly</span></a><span data-dcnode-id="4367" instrument_node=""> is an architect born in 1944 in Montevideo, Uruguay.</span></p><span data-dcnode-id="4365" instrument_node="">
</span><p data-dcnode-id="4363"><span data-dcnode-id="4364" instrument_node="">In 1983 he founded the firm Rafael Viñoly Architects.</span></p><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4357"><span data-dcnode-id="4361" instrument_node="">Viñoly describes himself as being a </span><strong data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">practical </span></strong><span data-dcnode-id="4358" instrument_node="">and intelligent architect who takes into consideration all the factors that go into the architecture of a building.</span></p><span data-dcnode-id="4356" instrument_node="">
</span><p data-dcnode-id="4348"><span data-dcnode-id="4355" instrument_node="">Especially the </span><strong data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">stakeholders </span></strong><span data-dcnode-id="4352" instrument_node="">weigh heavily in the design, as Viñoly aims to incorporate everyone’s opinions and experiences into one </span><strong data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">cohesive whole</span></strong><span data-dcnode-id="4349" instrument_node="">.</span></p><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4339"><span data-dcnode-id="4346" instrument_node="">Overall, Viñoly’s design approach can be considered as an </span><strong data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">efficient </span></strong><span data-dcnode-id="4343" instrument_node="">and </span><strong data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">integrated </span></strong><span data-dcnode-id="4340" instrument_node="">process.</span></p><span data-dcnode-id="4338" instrument_node="">
</span><p data-dcnode-id="4333"><span data-dcnode-id="4337" instrument_node="">One of his most famous works is </span><a data-dcnode-id="4335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.432parkavenue.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4336" instrument_node="">432 Park Avenue</span></a><span data-dcnode-id="4334" instrument_node="">, the third tallest building in North America.</span></p><span data-dcnode-id="4332" instrument_node="">
</span><p data-dcnode-id="4324"><span data-dcnode-id="4331" instrument_node="">Two other renowned works are the </span><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vinoly.com/works/the-cleveland-museum-of-art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4330" instrument_node="">Cleveland Museum of Art</span></a><span data-dcnode-id="4328" instrument_node=""> in Ohio, and the </span><a data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vinoly.com/works/university-of-chicago-medicine-center-for-care-and-discovery/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4327" instrument_node="">University of Chicago Medicine, Center for Care and Discovery</span></a><span data-dcnode-id="4325" instrument_node=""> in Illinois.</span></p><span data-dcnode-id="4323" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4304"><figure class="aligncenter" data-dcnode-id="4305"><picture class="wp-image-2284" data-dcnode-id="4317"><span data-dcnode-id="4322" instrument_node="">

</span><h2 data-dcnode-id="4293"><span class="ez-toc-section" data-dcnode-id="4302" id="47_Richard_Rogers_-_The_Pompidou_Centre"></span><strong data-dcnode-id="4295"><span data-dcnode-id="4301" instrument_node="">47. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsh-p.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4300" instrument_node="">Richard Rogers</span></a><span data-dcnode-id="4298" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centrepompidou.fr/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4297" instrument_node="">The Pompidou Centre</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4294"></span></h2><span data-dcnode-id="4292" instrument_node="">
</span><p data-dcnode-id="4288"><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsh-p.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4291" instrument_node="">Richard George Rogers</span></a><span data-dcnode-id="4289" instrument_node=""> is a British-Italian architect born in 1933 in Florence (Italy).&nbsp;</span></p><span data-dcnode-id="4287" instrument_node="">
</span><p data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">He has co-founded the architecture company Rogers Stirk Harbour + Partners.</span></p><span data-dcnode-id="4284" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4283" instrument_node="">In 2007 he won the </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4282" instrument_node="">Pritzker Architecture Prize</span></a><span data-dcnode-id="4280" instrument_node="">, besides he has won many honours and awards.&nbsp;</span></p><span data-dcnode-id="4278" instrument_node="">
</span><p data-dcnode-id="4267"><span data-dcnode-id="4277" instrument_node="">Rogers is renowned for his focus on </span><strong data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">functionality </span></strong><span data-dcnode-id="4274" instrument_node="">and </span><strong data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">modernist </span></strong><span data-dcnode-id="4271" instrument_node="">design. Most of his works can be considered </span><strong data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">high-tech architecture</span></strong><span data-dcnode-id="4268" instrument_node="">.</span></p><span data-dcnode-id="4266" instrument_node="">
</span><p data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">Besides, designing with a focus on sustainability is key for him, as well as the involvement of relevant stakeholders via collaboration.</span></p><span data-dcnode-id="4263" instrument_node="">
</span><p data-dcnode-id="4258"><span data-dcnode-id="4262" instrument_node="">One of his memorable projects is the </span><a data-dcnode-id="4260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centrepompidou.fr/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4261" instrument_node="">Pompidou Centre</span></a><span data-dcnode-id="4259" instrument_node=""> in France, designed with the help of Renzo Piano and Gianfranco Franchini.</span></p><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4252"><span data-dcnode-id="4256" instrument_node="">The project is described as being “</span><a data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/artanddesign/2017/jan/08/pompidou-centre-40-years-old-review-richard-rogers-renzo-piano" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4255" instrument_node="">not a building but a town where you find everything – lunch, great art, a library, great music</span></a><span data-dcnode-id="4253" instrument_node="">”.</span></p><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4243"><span data-dcnode-id="4250" instrument_node="">Two other famous works of Rogers are the </span><a data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsh-p.com/projects/lloyds-of-london/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4249" instrument_node="">Lloyd’s of London</span></a><span data-dcnode-id="4247" instrument_node=""> in the UK; and </span><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsh-p.com/projects/t4-madrid-barajas-airport/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4246" instrument_node="">Terminal 4, Barajas Airport</span></a><span data-dcnode-id="4244" instrument_node=""> in Madrid.</span></p><span data-dcnode-id="4242" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4233"><figure class="aligncenter" data-dcnode-id="4234"><img alt="Exhibition at the Centre Pompidou Paris - Paris tourist office" data-dcnode-id="4241" data-lazy-src="https://en.parisinfo.com/var/otcp/sites/images/node_43/node_51/node_230/centre-pompidou-630x405-c-amelie-dupont-architecte-renzo-piano-et-richard-rogers/17911851-1-fre-FR/Centre-Pompidou-630x405-C-Amelie-Dupont-Architecte-Renzo-Piano-et-Richard-Rogers.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">&lt;img src="https://en.parisinfo.com/var/otcp/sites/images/node_43/node_51/node_230/centre-pompidou-630x405-c-amelie-dupont-architecte-renzo-piano-et-richard-rogers/17911851-1-fre-FR/Centre-Pompidou-630x405-C-Amelie-Dupont-Architecte-Renzo-Piano-et-Richard-Rogers.jpg" alt="Exhibition at the Centre Pompidou Paris - Paris tourist office"/&gt;</span></noscript><figcaption data-dcnode-id="4235"><span data-dcnode-id="4238" instrument_node="">The Centre Pompidou. Image by </span><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.parisinfo.com/var/otcp/sites/images/node_43/node_51/node_230/centre-pompidou-630x405-c-amelie-dupont-architecte-renzo-piano-et-richard-rogers/17911851-1-fre-FR/Centre-Pompidou-630x405-C-Amelie-Dupont-Architecte-Renzo-Piano-et-Richard-Rogers.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4237" instrument_node="">Paris Tourist Office</span></a></figcaption></figure></div><span data-dcnode-id="4232" instrument_node="">

</span><h2 data-dcnode-id="4206"><span class="ez-toc-section" data-dcnode-id="4215" id="48_Robert_Stern_-The_15_Central_Park_West"></span><strong data-dcnode-id="4208"><span data-dcnode-id="4214" instrument_node="">48. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ramsa.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4213" instrument_node="">Robert Stern</span></a><span data-dcnode-id="4211" instrument_node=""> –</span><a aria-label=" (opens in a new tab)" data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/15_Central_Park_West" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4210" instrument_node="">The 15 Central Park West</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4207"></span></h2><span data-dcnode-id="4205" instrument_node="">
</span><p data-dcnode-id="4201"><a data-dcnode-id="4203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ramsa.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4204" instrument_node="">Robert A.M. Stern</span></a><span data-dcnode-id="4202" instrument_node=""> is an American architect born in 1939 in New York.&nbsp;</span></p><span data-dcnode-id="4200" instrument_node="">
</span><p data-dcnode-id="4195"><span data-dcnode-id="4199" instrument_node="">His style can best be described as a “</span><strong data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">modern traditionalist</span></strong><span data-dcnode-id="4196" instrument_node="">” to describe his work.</span></p><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4186"><span data-dcnode-id="4193" instrument_node="">His works are mainly </span><strong data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">contemporary</span></strong><span data-dcnode-id="4190" instrument_node="">, and he specializes in </span><strong data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">urbanism</span></strong><span data-dcnode-id="4187" instrument_node="">.</span></p><span data-dcnode-id="4185" instrument_node="">
</span><p data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">In 1977, Stern founded the architecture firm RAMSA.</span></p><span data-dcnode-id="4182" instrument_node="">
</span><p data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node="">Robert Stern is the person behind the design of one of the most famous condominium apartment buildings in New York City, the </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//15centralparkw.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4180" instrument_node="">15 Central Park West</span></a><span data-dcnode-id="4178" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="4176" instrument_node="">
</span><p data-dcnode-id="4168"><span data-dcnode-id="4175" instrument_node="">Two other works are </span><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ramsa.com/projects/project/ten-rittenhouse-square" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4174" instrument_node="">Ten Rittenhouse Square</span></a><span data-dcnode-id="4172" instrument_node=""> in Philadelphia, Pennsylvania; and </span><a data-dcnode-id="4170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ramsa.com/projects/project/arris" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4171" instrument_node="">Arris</span></a><span data-dcnode-id="4169" instrument_node=""> in Washington DC.</span></p><span data-dcnode-id="4167" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4149"><figure class="aligncenter" data-dcnode-id="4150"><picture class="wp-image-2286" data-dcnode-id="4161"><span data-dcnode-id="4166" instrument_node="">

</span><h2 data-dcnode-id="4138"><span class="ez-toc-section" data-dcnode-id="4147" id="49_Sheila_Sri_Prakash_-_Mahindra_World_City"></span><strong data-dcnode-id="4143"><span data-dcnode-id="4146" instrument_node="">49. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4145" instrument_node="">Sheila Sri Prakash</span></a></strong><span data-dcnode-id="4142" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/Shilpa_Portfolio/mahindra-world-city-corporate-office/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4141" instrument_node="">Mahindra World City</span></a><span class="ez-toc-section-end" data-dcnode-id="4139"></span></h2><span data-dcnode-id="4137" instrument_node="">
</span><p data-dcnode-id="4130"><a data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4136" instrument_node="">Sheila Sri Prakash</span></a><span data-dcnode-id="4134" instrument_node=""> is an Indian architect born in 1955. She is known for being the </span><strong data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">first woman architect</span></strong><span data-dcnode-id="4131" instrument_node=""> to open her own firm, Shilpa Architects Planners Designers, in 1979.</span></p><span data-dcnode-id="4129" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4128" instrument_node="">While working on her firm</span><span data-dcnode-id="4126" style="text-decoration: underline;"><span data-dcnode-id="4127" instrument_node=""> ,</span></span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4125" instrument_node="">Shilpa Architects</span></a><span data-dcnode-id="4123" instrument_node="">, she became one of the most influential architects in the world. She is known for focusing on </span><strong data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">local and cultural arts</span></strong><span data-dcnode-id="4120" instrument_node=""> and by centering her architecture on </span><strong data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">sustainability</span></strong><span data-dcnode-id="4117" instrument_node="">.</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4110"><span data-dcnode-id="4114" instrument_node="">Her work links human behaviour to the built environment, through </span><strong data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">urban planning</span></strong><span data-dcnode-id="4111" instrument_node="">.</span></p><span data-dcnode-id="4109" instrument_node="">
</span><p data-dcnode-id="4104"><span data-dcnode-id="4108" instrument_node="">With her work, she has grown into one of the leading members of IGBC, the </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//igbc.in/igbc/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4107" instrument_node="">Indian Green Building Council</span></a><span data-dcnode-id="4105" instrument_node="">.</span></p><span data-dcnode-id="4103" instrument_node="">
</span><p data-dcnode-id="4098"><span data-dcnode-id="4102" instrument_node="">Sheila designed the first official entrance to </span><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/Shilpa_Portfolio/mahindra-world-city-corporate-office/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4101" instrument_node="">Mahindra World City</span></a><span data-dcnode-id="4099" instrument_node=""> – the first Special Economic Zone in Tamil Nadu. The design is meant to reflect the city being a “new hope”.&nbsp;</span></p><span data-dcnode-id="4097" instrument_node="">
</span><p data-dcnode-id="4089"><span data-dcnode-id="4096" instrument_node="">Some of her other renowned (finished) works include the </span><a data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/Shilpa_Portfolio/ivr-prime-golf-villa-samten/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4095" instrument_node="">IVR Prime Golf Villa Development</span></a><span data-dcnode-id="4093" instrument_node=""> and the </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//shilpaarchitects.com/Shilpa_Portfolio/copper-beach-gardens/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4092" instrument_node="">Copper Beach Gardens</span></a><span data-dcnode-id="4090" instrument_node=""> in Chennai, India</span></p><span data-dcnode-id="4088" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4071"><figure class="aligncenter size-large is-resized" data-dcnode-id="4072"><picture class="wp-image-5325" data-dcnode-id="4082"><span data-dcnode-id="4087" instrument_node="">

</span><h2 data-dcnode-id="4060"><span class="ez-toc-section" data-dcnode-id="4069" id="50_Steven_Holl_-_The_Kiasma_Museum_in_Helsinki"></span><strong data-dcnode-id="4062"><span data-dcnode-id="4068" instrument_node="">50. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stevenholl.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4067" instrument_node="">Steven Holl</span></a><span data-dcnode-id="4065" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kiasma.fi/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4064" instrument_node="">The Kiasma Museum in Helsinki</span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4061"></span></h2><span data-dcnode-id="4059" instrument_node="">
</span><p data-dcnode-id="4055"><a aria-label=" (opens in a new tab)" data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stevenholl.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4058" instrument_node="">Steven Holl</span></a><span data-dcnode-id="4056" instrument_node="">, born on December 9, 1947, is considered one of the most important American architects for the importance that he gives to natural light. </span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">He has the ability to utilize the light and shadows in his design in order to get the best balance between the two. </span></p><span data-dcnode-id="4051" instrument_node="">
</span><p data-dcnode-id="4046"><span data-dcnode-id="4050" instrument_node="">One of his most known projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kiasma.fi/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4049" instrument_node="">Kiasma Museum</span></a><span data-dcnode-id="4047" instrument_node=""> in Helsinki, which is on par with his abilities, being designed in such a way that it catches the low angle of the Scandinavian sun.</span></p><span data-dcnode-id="4045" instrument_node="">
</span><p data-dcnode-id="4040"><span data-dcnode-id="4044" instrument_node="">In terms of design, </span><a data-dcnode-id="4042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kiasma.fi/en/about-kiasma/architecture/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4043" instrument_node="">light</span></a><span data-dcnode-id="4041" instrument_node=""> played a huge part for the architect, who was fascinated with the Finnish natural light. </span></p><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4035"><span data-dcnode-id="4038" instrument_node="">The museum opened in </span><a data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kiasma.fi/en/about-kiasma/architecture/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4037" instrument_node="">2019.</span></a></p><span data-dcnode-id="4034" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4016"><figure class="aligncenter" data-dcnode-id="4017"><a data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kiasma.fi/en/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2288" data-dcnode-id="4028"><span data-dcnode-id="4033" instrument_node="">

</span><h2 data-dcnode-id="4005"><span class="ez-toc-section" data-dcnode-id="4014" id="51_Tadao_Ando_-_The_Row_House"></span><strong data-dcnode-id="4007"><span data-dcnode-id="4013" instrument_node="">51. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tadao-ando.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4012" instrument_node="">Tadao Ando</span></a><span data-dcnode-id="4010" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/azuma-house-row-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4009" instrument_node="">The Row House </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4006"></span></h2><span data-dcnode-id="4004" instrument_node="">
</span><p data-dcnode-id="3994"><a aria-label=" (opens in a new tab)" data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tadao-ando.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4003" instrument_node="">Tadao Ando</span></a><span data-dcnode-id="4001" instrument_node="">, born </span><g class="gr_ gr_5 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar multiReplace" data-dcnode-id="3999" data-gr-id="5" id="5"><span data-dcnode-id="4000" instrument_node="">on</span></g><span data-dcnode-id="3998" instrument_node=""> September 13, </span><g class="gr_ gr_7 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-ins replaceWithoutSep" data-dcnode-id="3996" data-gr-id="7" id="7"><span data-dcnode-id="3997" instrument_node="">1941</span></g><span data-dcnode-id="3995" instrument_node="">, is one of the most distinguished Japanese architects. </span></p><span data-dcnode-id="3993" instrument_node="">
</span><p data-dcnode-id="3988"><span data-dcnode-id="3992" instrument_node="">His unique and abstract style brought him many awards, including the most desired award, the</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3991" instrument_node=""> Pritzker Architecture Prize</span></a><span data-dcnode-id="3989" instrument_node=""> in 1995. </span></p><span data-dcnode-id="3987" instrument_node="">
</span><p data-dcnode-id="3980"><span data-dcnode-id="3986" instrument_node="">One of his most famous works that </span><g class="gr_ gr_6 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar multiReplace" data-dcnode-id="3984" data-gr-id="6" id="6"><span data-dcnode-id="3985" instrument_node="">portrays</span></g><span data-dcnode-id="3983" instrument_node=""> the simplicity of his style is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/azuma-house-row-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3982" instrument_node="">“Row House”.</span></a></p><span data-dcnode-id="3979" instrument_node="">
</span><p data-dcnode-id="3974"><span data-dcnode-id="3978" instrument_node="">This design is absolute riveting. It showcases how a smaller space </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/azuma-house-row-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3977" instrument_node="">(64,7m2)</span></a><span data-dcnode-id="3975" instrument_node=""> can become a private and personalized living space. </span></p><span data-dcnode-id="3973" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3972" instrument_node="">The house is divided into </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/azuma-house-row-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3971" instrument_node="">two sections</span></a><span data-dcnode-id="3969" instrument_node="">: one which features kitchen and bathroom on one floor and another with bedroom and study in another.</span></p><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3959"><span data-dcnode-id="3966" instrument_node="">The Row House has a very unique way of incorporating nature in everyday living by having an </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiarquitectura.com/building/azuma-house-row-house/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3965" instrument_node="">outdoor patio</span></a><span data-dcnode-id="3963" instrument_node=""> be the </span><strong data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">only way </span></strong><span data-dcnode-id="3960" instrument_node="">to reach the house’s main two sections on the two floors. As such, one will always be in contact with the outdoors when going from one section of the home to another.</span></p><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node=""> </span></p><span data-dcnode-id="3955" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3937"><figure class="aligncenter" data-dcnode-id="3938"><picture class="wp-image-2289" data-dcnode-id="3949"><span data-dcnode-id="3954" instrument_node="">

</span><h2 data-dcnode-id="3926"><span class="ez-toc-section" data-dcnode-id="3935" id="52_Sir_Terry_Farrell_-_The_MI6_Building"></span><strong data-dcnode-id="3928"><span data-dcnode-id="3934" instrument_node="">52. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//farrells.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3933" instrument_node="">Sir Terry Farrell</span></a><span data-dcnode-id="3931" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SIS_Building" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3930" instrument_node="">The MI6 Building </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="3927"></span></h2><span data-dcnode-id="3925" instrument_node="">
</span><p data-dcnode-id="3921"><a aria-label=" (opens in a new tab)" data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//farrells.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3924" instrument_node="">Sir Terry Farrell</span></a><span data-dcnode-id="3922" instrument_node="">, born on May 12, 1938, is a British architect and urban designer. </span></p><span data-dcnode-id="3920" instrument_node="">
</span><p data-dcnode-id="3914"><span data-dcnode-id="3919" instrument_node="">One of his most famous projects is the </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SIS_Building" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">MI6 Building</span></strong></a><span data-dcnode-id="3915" instrument_node="">, headquarters of the Secret Intelligence Service of the United Kingdom.</span></p><span data-dcnode-id="3913" instrument_node="">
</span><p data-dcnode-id="3905"><span data-dcnode-id="3912" instrument_node="">This design of this building offers a </span><a data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.designingbuildings.co.uk/wiki/SIS_Building" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3911" instrument_node="">modern take</span></a><span data-dcnode-id="3909" instrument_node=""> on </span><strong data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">Mayan and Aztec </span></strong><span data-dcnode-id="3906" instrument_node="">temple designs.</span></p><span data-dcnode-id="3904" instrument_node="">
</span><p data-dcnode-id="3899"><span data-dcnode-id="3903" instrument_node="">The construction best characterizes his contextual </span><strong data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">urban design and postmodernism style.</span></strong><span data-dcnode-id="3900" instrument_node=""> </span></p><span data-dcnode-id="3898" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3879"><figure class="aligncenter" data-dcnode-id="3880"><picture class="wp-image-2293" data-dcnode-id="3892"><span data-dcnode-id="3897" instrument_node="">

</span><h2 data-dcnode-id="3867"><span class="ez-toc-section" data-dcnode-id="3877" id="53_Thom_Mayne_-_The_41_Cooper_Square"></span><strong data-dcnode-id="3872"><span data-dcnode-id="3876" instrument_node="">53. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.morphosis.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3875" instrument_node="">Thom Mayne </span></a><span data-dcnode-id="3873" instrument_node="">–</span></strong><span data-dcnode-id="3871" instrument_node=""> </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/41_Cooper_Square" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3870" instrument_node="">The 41 Cooper Square</span></a><span class="ez-toc-section-end" data-dcnode-id="3868"></span></h2><span data-dcnode-id="3866" instrument_node="">
</span><p data-dcnode-id="3859"><a aria-label=" (opens in a new tab)" data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.morphosis.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3865" instrument_node="">Thom Mayne</span></a><span data-dcnode-id="3863" instrument_node="">, born on January 19, 1944, is an American architect and principal founder of</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.morphosis.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3862" instrument_node=""> Morphosis</span></a><span data-dcnode-id="3860" instrument_node="">. The company is focusing on culture and modern design and forms.&nbsp;</span></p><span data-dcnode-id="3858" instrument_node="">
</span><p data-dcnode-id="3850"><span data-dcnode-id="3857" instrument_node="">One of their innovative projects is</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/41_Cooper_Square" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3856" instrument_node=""> 41 Cooper Square</span></a><span data-dcnode-id="3854" instrument_node="">, a project that integrates</span><a aria-label=" (opens in a new tab)" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architecturequote.com/blog/sustainable-architecture-denmark/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3853" instrument_node=""> sustainability</span></a><span data-dcnode-id="3851" instrument_node=""> with function and architecture.</span></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3848" instrument_node="">It was completed in </span><a data-dcnode-id="3846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/41_Cooper_Square" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3847" instrument_node="">2009</span></a><span data-dcnode-id="3845" instrument_node="">. </span></p><span data-dcnode-id="3843" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3832"><figure class="aligncenter size-large" data-dcnode-id="3833"><img alt="41 cooper square" data-dcnode-id="3842" data-lazy-src="https://architecturequote.com/wp-content/uploads/2019/06/The-41-Cooper-Square-%EF%BB%BF.jpg" height="480" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20480'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">&lt;img width="640" height="480" src="https://architecturequote.com/wp-content/uploads/2019/06/The-41-Cooper-Square-%EF%BB%BF.jpg" alt="41 cooper square"/&gt;</span></noscript><figcaption data-dcnode-id="3834"><span data-dcnode-id="3839" instrument_node="">41 Cooper Square</span><br data-dcnode-id="3838"><br data-dcnode-id="3837"><br data-dcnode-id="3836"><br data-dcnode-id="3835"></figcaption></figure></div><span data-dcnode-id="3831" instrument_node="">
</span><h2 data-dcnode-id="3820"><span class="ez-toc-section" data-dcnode-id="3830" id="54_Thomas_Heatherwick_-_The_Learning_Hub"></span><strong data-dcnode-id="3822"><span data-dcnode-id="3829" instrument_node="">54. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heatherwick.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3828" instrument_node="">Thomas Heatherwick</span></a><span data-dcnode-id="3826" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ntu.edu.sg/Pages/home.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3825" instrument_node="">The Learning Hub</span></a><span data-dcnode-id="3823" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="3821"></span></h2><span data-dcnode-id="3819" instrument_node="">
</span><p data-dcnode-id="3801"><a aria-label=" (opens in a new tab)" data-dcnode-id="3817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heatherwick.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3818" instrument_node="">Thomas Heatherwick</span></a><span data-dcnode-id="3816" instrument_node="">, born </span><g class="gr_ gr_5 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Grammar multiReplace" data-dcnode-id="3814" data-gr-id="5" id="5"><span data-dcnode-id="3815" instrument_node="">on</span></g><span data-dcnode-id="3813" instrument_node=""> February 17, </span><g class="gr_ gr_6 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-ins replaceWithoutSep gr-progress" data-dcnode-id="3811" data-gr-id="6" id="6"><span data-dcnode-id="3812" instrument_node="">19</span></g><g class="gr_ gr_6 gr-alert gr_gramm gr_inline_cards gr_disable_anim_appear Punctuation only-ins replaceWithoutSep" data-dcnode-id="3809" data-gr-id="6" id="6"><span data-dcnode-id="3810" instrument_node="">70,</span></g><span data-dcnode-id="3808" instrument_node=""> is an English designer, known as an “ideas engine”. He states that </span><g class="gr_ gr_20 gr-alert gr_spell gr_inline_cards gr_disable_anim_appear ContextualSpelling ins-del" data-dcnode-id="3806" data-gr-id="20" id="20"><span data-dcnode-id="3807" instrument_node="">he</span></g><span data-dcnode-id="3805" instrument_node=""> does not have his own style as many other architects, but he describes himself as </span><strong data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">being a problem solver</span></strong><span data-dcnode-id="3802" instrument_node="">. </span></p><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3789"><span data-dcnode-id="3799" instrument_node="">One of his most notable works is </span><a aria-label=" (opens in a new tab)" data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ntu.edu.sg/Pages/home.aspx" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3798" instrument_node="">the Learning Hub</span></a><span data-dcnode-id="3796" instrument_node=""> in Singapore, an academic </span><strong data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">building with no corridors</span></strong><span data-dcnode-id="3793" instrument_node=""> that creates a </span><strong data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">dynamic environment</span></strong><span data-dcnode-id="3790" instrument_node=""> and encourage interactions between students.</span></p><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3780"><span data-dcnode-id="3787" instrument_node="">The Learning Hub finished in </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/607594/learning-hub-heatherwick-studio" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3786" instrument_node="">2015</span></a><span data-dcnode-id="3784" instrument_node=""> and spans across </span><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/607594/learning-hub-heatherwick-studio" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3783" instrument_node="">14.000m2</span></a><span data-dcnode-id="3781" instrument_node="">.</span></p><span data-dcnode-id="3779" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="3762"><figure class="aligncenter" data-dcnode-id="3763"><picture class="wp-image-2296" data-dcnode-id="3773"><span data-dcnode-id="3778" instrument_node="">
