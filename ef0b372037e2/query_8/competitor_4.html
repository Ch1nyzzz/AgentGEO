</span><h2 data-dcnode-id="5484"><span class="ez-toc-section" data-dcnode-id="5494" id="30_Dominique_Perrault_-_The_DC_Towers"></span><strong data-dcnode-id="5486"><span data-dcnode-id="5493" instrument_node="">30. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/homepage" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5492" instrument_node="">Dominique Perrault</span></a><span data-dcnode-id="5490" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DC_Towers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5489" instrument_node="">The DC Towers</span></a><span data-dcnode-id="5487" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5485"></span></h2><span data-dcnode-id="5483" instrument_node="">
</span><p data-dcnode-id="5479"><a data-dcnode-id="5481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/homepage"><span data-dcnode-id="5482" instrument_node="">Dominique Perrault</span></a><span data-dcnode-id="5480" instrument_node=""> was born in 1953 in Clermont-Ferrand, in France.</span></p><span data-dcnode-id="5478" instrument_node="">
</span><p data-dcnode-id="5470"><span data-dcnode-id="5477" instrument_node="">Perrault has done very diverse projects, with most of them being</span><strong data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node=""> large-scale</span></strong><span data-dcnode-id="5474" instrument_node="">, and focused on solving challenges in </span><strong data-dcnode-id="5472"><span data-dcnode-id="5473" instrument_node="">innovative </span></strong><span data-dcnode-id="5471" instrument_node="">ways.</span></p><span data-dcnode-id="5469" instrument_node="">
</span><p data-dcnode-id="5458"><span data-dcnode-id="5468" instrument_node="">He often uses more </span><strong data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">uncommon </span></strong><span data-dcnode-id="5465" instrument_node="">materials and manners, to enhance the construction’s </span><strong data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">aesthetics</span></strong><span data-dcnode-id="5462" instrument_node="">, but also their </span><strong data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">function</span></strong><span data-dcnode-id="5459" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5457" instrument_node="">
</span><p data-dcnode-id="5443"><span data-dcnode-id="5456" instrument_node="">He operates worldwide, with some notable works including the</span><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/2464-velodrome_and_olympic_swimming_pool.html"><span data-dcnode-id="5455" instrument_node=""> Olympic Velodrome and Olympic swimming pool</span></a><span data-dcnode-id="5453" instrument_node=""> in Berlin, the</span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/2461-olympic_tennis_centre.html"><span data-dcnode-id="5452" instrument_node=""> Olympic Tennis Stadium</span></a><span data-dcnode-id="5450" instrument_node=""> in Madrid, the </span><a data-dcnode-id="5448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/2473-fukoku_life_osaka_project.html"><span data-dcnode-id="5449" instrument_node="">Fukoku Tower</span></a><span data-dcnode-id="5447" instrument_node=""> in Osaka or the </span><a data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/3491-la_bibliotheque_nationale_de_france_-_portrait_of_a_project_1988-1998_-_bnf.html"><span data-dcnode-id="5446" instrument_node="">French National Library</span></a><span data-dcnode-id="5444" instrument_node="">.</span></p><span data-dcnode-id="5442" instrument_node="">
</span><p data-dcnode-id="5437"><span data-dcnode-id="5441" instrument_node="">Another project Perrault is working on are the</span><a data-dcnode-id="5439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/2502-vienna_dc_towers.html"><span data-dcnode-id="5440" instrument_node=""> DC Towers</span></a><span data-dcnode-id="5438" instrument_node="">. Only one of the DC Towers is finished and is currently the tallest skyscraper in Austria. The others are still to be completed.</span></p><span data-dcnode-id="5436" instrument_node="">
</span><figure class="wp-block-image is-style-default" data-dcnode-id="5428"><img alt="Dominique Perrault Architecture - Vienna DC towers" data-dcnode-id="5435" data-lazy-src="https://perraultarchitecture.com/data/projet/fiche/1502/large_07-_m124153_1200-800_web_78969.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">&lt;img src="https://perraultarchitecture.com/data/projet/fiche/1502/large_07-_m124153_1200-800_web_78969.jpg" alt="Dominique Perrault Architecture - Vienna DC towers"/&gt;</span></noscript><figcaption data-dcnode-id="5429"><span data-dcnode-id="5432" instrument_node="">The completed DC Tower. Image by: </span><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.perraultarchitecture.com/en/projects/2502-vienna_dc_towers.html"><span data-dcnode-id="5431" instrument_node="">DPA</span></a></figcaption></figure><span data-dcnode-id="5427" instrument_node="">
</span><h2 data-dcnode-id="5417"><span class="ez-toc-section" data-dcnode-id="5426" id="31_Alvaro_Siza_-_The_Imbere_Camargo_Museum"></span><strong data-dcnode-id="5421"><span data-dcnode-id="5425" instrument_node="">31. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alvarosizavieira.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5424" instrument_node="">Álvaro Siza </span></a><span data-dcnode-id="5422" instrument_node="">– </span></strong><a aria-label=" (opens in a new tab)" data-dcnode-id="5419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archeyes.com/ibere-camargo-foundation-alvaro-siza/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5420" instrument_node="">The Imbere Camargo Museum</span></a><span class="ez-toc-section-end" data-dcnode-id="5418"></span></h2><span data-dcnode-id="5416" instrument_node="">
</span><p data-dcnode-id="5412"><a data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alvaroleitesiza.com/"><span data-dcnode-id="5415" instrument_node="">Álvaro Leite Siza</span></a><span data-dcnode-id="5413" instrument_node=""> is an architect born in 1933 in Porto, Portugal.</span></p><span data-dcnode-id="5411" instrument_node="">
</span><p data-dcnode-id="5403"><span data-dcnode-id="5410" instrument_node="">He is known for his simple but </span><strong data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">breath-taking</span></strong><span data-dcnode-id="5407" instrument_node=""> projects. He stated that “architects don’t invent anything, that they just </span><strong data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">transform reality</span></strong><span data-dcnode-id="5404" instrument_node="">”.</span></p><span data-dcnode-id="5402" instrument_node="">
</span><p data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">Within his works, Siza plays with the relationship between the exterior and interior of a construction.</span></p><span data-dcnode-id="5399" instrument_node="">
</span><p data-dcnode-id="5391"><span data-dcnode-id="5398" instrument_node="">One of his </span><strong data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">awarded projects</span></strong><span data-dcnode-id="5395" instrument_node=""> is the</span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archeyes.com/ibere-camargo-foundation-alvaro-siza/"><span data-dcnode-id="5394" instrument_node=""> Ibere Camargo Museum</span></a><span data-dcnode-id="5392" instrument_node="">, inaugurated in 2007. The design museum follows the European trends of that specific year and perfectly shows Alvaro’s style.&nbsp;</span></p><span data-dcnode-id="5390" instrument_node="">
</span><p data-dcnode-id="5382"><span data-dcnode-id="5389" instrument_node="">Some other renowned works are </span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alvaroleitesiza.com/casa-tolo/"><span data-dcnode-id="5388" instrument_node="">Casa Tolo</span></a><span data-dcnode-id="5386" instrument_node=""> in Ribeira de Pena, Portugal, and his competition proposal for Guggenheim Helsinki (Finland): </span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.alvaroleitesiza.com/guggenheim/"><span data-dcnode-id="5385" instrument_node="">2014 Concurso Guggenheim</span></a><span data-dcnode-id="5383" instrument_node="">.</span></p><span data-dcnode-id="5381" instrument_node="">
</span><figure class="wp-block-image is-style-default" data-dcnode-id="5373"><img alt="Ibere Camargo Foundation | Alvaro Siza" data-dcnode-id="5380" data-lazy-src="https://secureservercdn.net/50.62.172.157/fa5.eba.myftpupload.com/wp-content/uploads/2014/10/5447c9b4e58eceb5670000f6_iber-camargo-foundation-standards-and-variations_195-e1414244959107.jpg?time=1572827655" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">&lt;img src="https://secureservercdn.net/50.62.172.157/fa5.eba.myftpupload.com/wp-content/uploads/2014/10/5447c9b4e58eceb5670000f6_iber-camargo-foundation-standards-and-variations_195-e1414244959107.jpg?time=1572827655" alt="Ibere Camargo Foundation | Alvaro Siza"/&gt;</span></noscript><figcaption data-dcnode-id="5374"><span data-dcnode-id="5377" instrument_node="">Ibere Camargo Foundation. Image by: </span><a data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//moderni.co/barts-square-the-boundary-2/"><span data-dcnode-id="5376" instrument_node="">Moderni</span></a></figcaption></figure><span data-dcnode-id="5372" instrument_node="">
</span><h2 data-dcnode-id="5362"><span class="ez-toc-section" data-dcnode-id="5371" id="32_Antoine_Predock_-_The_Canadian_Museum_for_Human_Rights"></span><strong data-dcnode-id="5364"><span data-dcnode-id="5370" instrument_node="">32. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.predock.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5369" instrument_node="">Antoine Predock</span></a><span data-dcnode-id="5367" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanrights.ca/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5366" instrument_node="">The Canadian Museum for Human Rights </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5363"></span></h2><span data-dcnode-id="5361" instrument_node="">
</span><p data-dcnode-id="5357"><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.predock.com/"><span data-dcnode-id="5360" instrument_node="">Antoine Predock</span></a><span data-dcnode-id="5358" instrument_node=""> was born in 1936 in Missouri, the United States. He currently resides in Albuquerque, New Mexico.&nbsp;</span></p><span data-dcnode-id="5356" instrument_node="">
</span><p data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">He founded Antoine Predock Architect PC in 1967.</span></p><span data-dcnode-id="5353" instrument_node="">
</span><p data-dcnode-id="5345"><span data-dcnode-id="5352" instrument_node="">Predock merges his passion for </span><strong data-dcnode-id="5350"><span data-dcnode-id="5351" instrument_node="">riding motorbikes </span></strong><span data-dcnode-id="5349" instrument_node="">into his building style, by designing his buildings to convey an </span><strong data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">experience </span></strong><span data-dcnode-id="5346" instrument_node="">to the viewer, a road filled with experiences so to say.</span></p><span data-dcnode-id="5344" instrument_node="">
</span><p data-dcnode-id="5339"><span data-dcnode-id="5343" instrument_node="">His style is aiming to preserve the cultural foundation of a scene and he is designing his creations as being </span><strong data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">part of the landscape</span></strong><span data-dcnode-id="5340" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5338" instrument_node="">
</span><p data-dcnode-id="5333"><span data-dcnode-id="5337" instrument_node="">One of his famous projects that reflects his ideologies is the</span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanrights.ca/"><span data-dcnode-id="5336" instrument_node=""> Canadian Museum for Human Rights</span></a><span data-dcnode-id="5334" instrument_node="">, located in Winnipeg. This building is developed to praise the existence of human rights.</span></p><span data-dcnode-id="5332" instrument_node="">
</span><p data-dcnode-id="5324"><span data-dcnode-id="5331" instrument_node="">Two other renowned works are the </span><a data-dcnode-id="5329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.austintexas.gov/government/city-hall"><span data-dcnode-id="5330" instrument_node="">City Hall</span></a><span data-dcnode-id="5328" instrument_node=""> in Austin, Texas; and the </span><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.predock.com/LuxeLake/LuxeLake.html"><span data-dcnode-id="5327" instrument_node="">Luxe Lakes Arts Center</span></a><span data-dcnode-id="5325" instrument_node=""> in Chengdu, China.</span></p><span data-dcnode-id="5323" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5302"><figure class="aligncenter" data-dcnode-id="5303"><a data-dcnode-id="5313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanrights.ca/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2265" data-dcnode-id="5317"><span data-dcnode-id="5322" instrument_node="">

</span><h2 data-dcnode-id="5291"><span class="ez-toc-section" data-dcnode-id="5300" id="33_Ben_van_Berkel_-_The_Erasmus_Bridge"></span><strong data-dcnode-id="5293"><span data-dcnode-id="5299" instrument_node="">33. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5298" instrument_node="">Ben van Berkel</span></a><span data-dcnode-id="5296" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erasmusbrug" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5295" instrument_node="">The Erasmus Bridge </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5292"></span></h2><span data-dcnode-id="5290" instrument_node="">
</span><p data-dcnode-id="5283"><a data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5289" instrument_node="">Ben van Berkel</span></a><span data-dcnode-id="5287" instrument_node=""> was born in 1957 in Utrecht, the Netherlands. In 1988 he founded </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5286" instrument_node="">UNStudio</span></a><span data-dcnode-id="5284" instrument_node=""> together with his wife, Caroline Bos (1959; Rotterdam, NL).</span></p><span data-dcnode-id="5282" instrument_node="">
</span><p data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">UNStudio operates internationally, and has four full-service offices in Amsterdam, Shanghai, Hong Kong, and Frankfurt.</span></p><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5271"><span data-dcnode-id="5278" instrument_node="">Their goal is ‘</span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/en/page/3997/about" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5277" instrument_node="">future-proofing the future</span></a><span data-dcnode-id="5275" instrument_node="">’, and they do so by </span><strong data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">enhancing their knowledge</span></strong><span data-dcnode-id="5272" instrument_node="">.</span></p><span data-dcnode-id="5270" instrument_node="">
</span><p data-dcnode-id="5262"><span data-dcnode-id="5269" instrument_node="">All constructions are built with the </span><strong data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">user central </span></strong><span data-dcnode-id="5266" instrument_node="">in mind. They are designed in such manner that they are adaptive, resilient and </span><strong data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">future-proof</span></strong><span data-dcnode-id="5263" instrument_node="">.</span></p><span data-dcnode-id="5261" instrument_node="">
</span><p data-dcnode-id="5253"><span data-dcnode-id="5260" instrument_node="">One of Van Berkel’s memorable projects is the </span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.rotterdam.info/locations/erasmusbrug/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5259" instrument_node="">Erasmusbrug</span></a><span data-dcnode-id="5257" instrument_node="">, which was accomplished before the creation of his new office, </span><a data-dcnode-id="5255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5256" instrument_node="">UNStudio</span></a><span data-dcnode-id="5254" instrument_node="">.</span></p><span data-dcnode-id="5252" instrument_node="">
</span><p data-dcnode-id="5247"><span data-dcnode-id="5251" instrument_node="">The bridge is compared with a </span><strong data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">swan </span></strong><span data-dcnode-id="5248" instrument_node="">by the public and described by the architect as being “a bracket construction in sky-coloured steel [that] can appear thin as a needle, or wide as a harp”.</span></p><span data-dcnode-id="5246" instrument_node="">
</span><p data-dcnode-id="5238"><span data-dcnode-id="5245" instrument_node="">Some renowned projects of UNStudio are </span><a data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/en/page/11728/westfield-white-city" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5244" instrument_node="">Westfield White City</span></a><span data-dcnode-id="5242" instrument_node=""> in London, the UK; and </span><a data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unstudio.com/en/page/11744/the-ellipsicoon" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5241" instrument_node="">The Ellipsicoon</span></a><span data-dcnode-id="5239" instrument_node=""> in the Philippines.</span></p><span data-dcnode-id="5237" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="5228"><figure class="aligncenter" data-dcnode-id="5229"><img alt="Erasmusbrug - Rotterdam - CitySpotters" data-dcnode-id="5236" data-lazy-src="https://cityspotters.imgix.net/YLTUEoNMogRFiRWx7sxQBKeN?ixlib=rails-3.1.0&amp;auto=enhance%2Ccompress%2Cformat&amp;q=50&amp;fit=crop&amp;crop=entropy&amp;w=800&amp;h=450&amp;dpr=2&amp;s=acad029a5dab6adbc0e2b55911a2e792" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">&lt;img src="https://cityspotters.imgix.net/YLTUEoNMogRFiRWx7sxQBKeN?ixlib=rails-3.1.0&amp;amp;auto=enhance%2Ccompress%2Cformat&amp;amp;q=50&amp;amp;fit=crop&amp;amp;crop=entropy&amp;amp;w=800&amp;amp;h=450&amp;amp;dpr=2&amp;amp;s=acad029a5dab6adbc0e2b55911a2e792" alt="Erasmusbrug - Rotterdam - CitySpotters"/&gt;</span></noscript><figcaption data-dcnode-id="5230"><span data-dcnode-id="5233" instrument_node="">Erasmusbrug. Image by </span><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cityspotters.com/nl/nederland/rotterdam/bezienswaardigheden/erasmusbrug" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5232" instrument_node="">Cityspotters</span></a></figcaption></figure></div><span data-dcnode-id="5227" instrument_node="">
</span><h2 data-dcnode-id="5216"><span class="ez-toc-section" data-dcnode-id="5226" id="34_Bernard_Tschumi_-_The_New_Acropolis_Museum"></span><strong data-dcnode-id="5218"><span data-dcnode-id="5225" instrument_node="">34. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tschumi.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5224" instrument_node="">Bernard Tschumi</span></a><span data-dcnode-id="5222" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theacropolismuseum.gr/en" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5221" instrument_node="">The New Acropolis Museum</span></a><span data-dcnode-id="5219" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5217"></span></h2><span data-dcnode-id="5215" instrument_node="">
</span><p data-dcnode-id="5211"><a data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tschumi.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5214" instrument_node="">Bernard Tschumi</span></a><span data-dcnode-id="5212" instrument_node=""> is an architect and educator who was born in 1944 in Lausanne, Switzerland.&nbsp;</span></p><span data-dcnode-id="5210" instrument_node="">
</span><p data-dcnode-id="5202"><span data-dcnode-id="5209" instrument_node="">He is known for his </span><strong data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">deconstructivist</span></strong><span data-dcnode-id="5206" instrument_node=""> style in his projects, which shows itself in a </span><strong data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">chaotic and fragmentic</span></strong><span data-dcnode-id="5203" instrument_node=""> building style.</span></p><span data-dcnode-id="5201" instrument_node="">
</span><p data-dcnode-id="5196"><span data-dcnode-id="5200" instrument_node="">His works are known to </span><strong data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">distort </span></strong><span data-dcnode-id="5197" instrument_node="">with the common building structures and traditional ideas of harmony within a construction.</span></p><span data-dcnode-id="5195" instrument_node="">
</span><p data-dcnode-id="5190"><span data-dcnode-id="5194" instrument_node="">He has solved many </span><strong data-dcnode-id="5192"><span data-dcnode-id="5193" instrument_node="">urban planning challenges</span></strong><span data-dcnode-id="5191" instrument_node=""> with his works.</span></p><span data-dcnode-id="5189" instrument_node="">
</span><p data-dcnode-id="5184"><span data-dcnode-id="5188" instrument_node="">One of his most well-known works is </span><a data-dcnode-id="5186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theacropolismuseum.gr/en" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5187" instrument_node="">The New Acropolis Museum</span></a><span data-dcnode-id="5185" instrument_node=""> in Athens, Greece. This museum is said to store the most important works of art and architecture, including the archaeological findings of the past city Acropolis.</span></p><span data-dcnode-id="5183" instrument_node="">
</span><p data-dcnode-id="5175"><span data-dcnode-id="5182" instrument_node="">Other works of Tschumi include the </span><a data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tschumi.com/projects/79/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5181" instrument_node="">Binhai Science Museum</span></a><span data-dcnode-id="5179" instrument_node=""> in Tianjin, China; and </span><a data-dcnode-id="5177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tschumi.com/projects/3/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5178" instrument_node="">Parc de la Villette</span></a><span data-dcnode-id="5176" instrument_node=""> in Paris, France.</span></p><span data-dcnode-id="5174" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5156"><figure class="aligncenter" data-dcnode-id="5157"><a data-dcnode-id="5164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theacropolismuseum.gr/en" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2267" data-dcnode-id="5168"><span data-dcnode-id="5173" instrument_node="">

</span><h2 data-dcnode-id="5145"><span class="ez-toc-section" data-dcnode-id="5154" id="35_Bjarke_Ingels_-_The_8_House"></span><strong data-dcnode-id="5147"><span data-dcnode-id="5153" instrument_node="">35. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//big.dk/%23projects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5152" instrument_node="">Bjarke Ingels</span></a><span data-dcnode-id="5150" instrument_node=""> – </span><a aria-label="The 8 House  (opens in a new tab)" data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.8tallet.dk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5149" instrument_node="">The 8 House </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5146"></span></h2><span data-dcnode-id="5144" instrument_node="">
</span><p data-dcnode-id="5137"><a data-dcnode-id="5142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//big.dk/%23projects" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5143" instrument_node="">Bjarke Ingels</span></a><span data-dcnode-id="5141" instrument_node=""> is a Danish architect born in 1974 in Copenhagen. In 2005 he has founded </span><strong data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">BIG</span></strong><span data-dcnode-id="5138" instrument_node=""> (Bjarke Ingels Group).</span></p><span data-dcnode-id="5136" instrument_node="">
</span><p data-dcnode-id="5128"><span data-dcnode-id="5135" instrument_node="">He is known for his </span><strong data-dcnode-id="5133"><span data-dcnode-id="5134" instrument_node="">innovative </span></strong><span data-dcnode-id="5132" instrument_node="">and </span><strong data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">ambitious </span></strong><span data-dcnode-id="5129" instrument_node="">design approach, many of his buildings defy traditional architectural stereotypes.</span></p><span data-dcnode-id="5127" instrument_node="">
</span><p data-dcnode-id="5122"><span data-dcnode-id="5126" instrument_node="">He believes in </span><strong data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">information-driven</span></strong><span data-dcnode-id="5123" instrument_node=""> design.</span></p><span data-dcnode-id="5121" instrument_node="">
</span><p data-dcnode-id="5116"><span data-dcnode-id="5120" instrument_node="">One of his most notable projects is the </span><a data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.8tallet.dk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5119" instrument_node="">“8 House”</span></a><span data-dcnode-id="5117" instrument_node=""> located in Copenhagen (DK). The building is a mixture of three types of residential housing and retail and office spaces.</span></p><span data-dcnode-id="5115" instrument_node="">
</span><p data-dcnode-id="5107"><span data-dcnode-id="5114" instrument_node="">Two other renowned works of BIG include the </span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//big.dk/%23projects-hua" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5113" instrument_node="">Hualien Residences</span></a><span data-dcnode-id="5111" instrument_node=""> in Taiwan, and the </span><a data-dcnode-id="5109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//big.dk/%23projects-suk" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5110" instrument_node="">Superkilen</span></a><span data-dcnode-id="5108" instrument_node=""> park in Copenhagen, Denmark.</span></p><span data-dcnode-id="5106" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="5088"><figure class="aligncenter" data-dcnode-id="5089"><a data-dcnode-id="5096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.8tallet.dk/" rel="noreferrer noopener" target="_blank"><picture class="wp-image-2271" data-dcnode-id="5100"><span data-dcnode-id="5105" instrument_node="">

</span><h2 data-dcnode-id="5076"><span class="ez-toc-section" data-dcnode-id="5086" id="36_Cesar_Pelli_-_The_Petronas_Towers"></span><strong data-dcnode-id="5078"><span data-dcnode-id="5085" instrument_node="">36. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pcparch.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5084" instrument_node="">César Pelli</span></a><span data-dcnode-id="5082" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petronastwintowers.com.my/en" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5081" instrument_node="">The Petronas Towers</span></a><span data-dcnode-id="5079" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="5077"></span></h2><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5071"><a data-dcnode-id="5073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pcparch.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5074" instrument_node="">César Pelli</span></a><span data-dcnode-id="5072" instrument_node=""> was born in 1926 in San Miguel de Tucumán, Argentina. In 1952 he emigrated to the USA. In 2019 César Pelli unfortunately passed away.&nbsp;&nbsp;</span></p><span data-dcnode-id="5070" instrument_node="">
</span><p data-dcnode-id="5065"><span data-dcnode-id="5069" instrument_node="">In 1977 he founded Pelli Clarke Pelli Architects, under which he designed some of the </span><strong data-dcnode-id="5067"><span data-dcnode-id="5068" instrument_node="">tallest buildings in the world</span></strong><span data-dcnode-id="5066" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="5064" instrument_node="">
</span><p data-dcnode-id="5059"><span data-dcnode-id="5063" instrument_node="">Cesar Pelli states that “Humanity has an obsession with building big” and the fact that “</span><strong data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">Tall has power</span></strong><span data-dcnode-id="5060" instrument_node="">”. These were his main reasons for designing tall constructions.</span></p><span data-dcnode-id="5058" instrument_node="">
</span><p data-dcnode-id="5053"><span data-dcnode-id="5057" instrument_node="">One of his projects in this category of tallest buildings are the </span><a data-dcnode-id="5055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.petronastwintowers.com.my/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5056" instrument_node="">Petronas Twin Towers</span></a><span data-dcnode-id="5054" instrument_node=""> in Kuala Lumpur, Malaysia.</span></p><span data-dcnode-id="5052" instrument_node="">
</span><p data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">The towers were the tallest building existent between 1998 and 2004 and they still are the tallest twin towers in the world.&nbsp;</span></p><span data-dcnode-id="5049" instrument_node="">
</span><p data-dcnode-id="5041"><span data-dcnode-id="5048" instrument_node="">Two other works of Pelli include </span><a data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pcparch.com/project/the-centrale/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5047" instrument_node="">The Centrale</span></a><span data-dcnode-id="5045" instrument_node=""> in New York, and the </span><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pcparch.com/project/salesforce-tower/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5044" instrument_node="">Salesforce Tower</span></a><span data-dcnode-id="5042" instrument_node=""> in San Francisco, California.</span></p><span data-dcnode-id="5040" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="5031"><figure class="aligncenter" data-dcnode-id="5032"><img alt="Tips for visiting the Petronas Towers – The Travel Masters" data-dcnode-id="5039" data-lazy-src="https://the-travel-masters.com/wp-content/uploads/2013/09/petronas-twin-tower.jpg" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">&lt;img src="https://the-travel-masters.com/wp-content/uploads/2013/09/petronas-twin-tower.jpg" alt="Tips for visiting the Petronas Towers – The Travel Masters"/&gt;</span></noscript><figcaption data-dcnode-id="5033"><span data-dcnode-id="5036" instrument_node="">The Petronas Towers. Image by </span><a data-dcnode-id="5034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-travel-masters.com/tips-for-visiting-the-petronas-towers.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5035" instrument_node="">The Travel Masters</span></a></figcaption></figure></div><span data-dcnode-id="5030" instrument_node="">
</span><h2 data-dcnode-id="5020"><span class="ez-toc-section" data-dcnode-id="5029" id="37_Christian_de_Portzamparc_-_Chateau_Cheval_Blanc"></span><strong data-dcnode-id="5022"><span data-dcnode-id="5028" instrument_node="">37. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.christiandeportzamparc.com/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5027" instrument_node="">Christian de Portzamparc</span></a><span data-dcnode-id="5025" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="5023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architonic.com/en/project/atelier-christian-de-portzamparc-chateau-cheval-blanc/5101376" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5024" instrument_node="">Château Cheval Blanc </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="5021"></span></h2><span data-dcnode-id="5019" instrument_node="">
</span><p data-dcnode-id="5015"><a data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christiandeportzamparc.com/en/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5018" instrument_node="">Christian de Portzamparc</span></a><span data-dcnode-id="5016" instrument_node=""> is a French architect and urbanist born in 1944 in Casablanca, Morocco.&nbsp;</span></p><span data-dcnode-id="5014" instrument_node="">
</span><p data-dcnode-id="5009"><span data-dcnode-id="5013" instrument_node="">In 1994 he won the world-renowned </span><a data-dcnode-id="5011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5012" instrument_node="">Pritzker Prize</span></a><span data-dcnode-id="5010" instrument_node="">.</span></p><span data-dcnode-id="5008" instrument_node="">
</span><p data-dcnode-id="4997"><span data-dcnode-id="5007" instrument_node="">He </span><a data-dcnode-id="5005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/laureates/1994" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5006" instrument_node="">states</span></a><span data-dcnode-id="5004" instrument_node=""> to ‘’consider a building as a </span><strong data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">part of the whole</span></strong><span data-dcnode-id="5001" instrument_node="">, …. At the same time, the building must also be a response to a client or </span><strong data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">user’s needs</span></strong><span data-dcnode-id="4998" instrument_node="">.”</span></p><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4985"><span data-dcnode-id="4995" instrument_node="">De Portzamparc’s work is being described as having a </span><strong data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">bold design</span></strong><span data-dcnode-id="4992" instrument_node="">, artistic touch and focusing on the importance of the </span><strong data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">environment </span></strong><span data-dcnode-id="4989" instrument_node="">and </span><strong data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">landscape</span></strong><span data-dcnode-id="4986" instrument_node="">.</span></p><span data-dcnode-id="4984" instrument_node="">
</span><p data-dcnode-id="4980"><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christiandeportzamparc.com/en/projects/winery-cheval-blanc/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4983" instrument_node="">Château Cheval Blanc</span></a><span data-dcnode-id="4981" instrument_node=""> is a winery in Saint-Emilion, France. While designing, De Portzamparc’s focus was not put only on the structure, but also on the contrast between the landscape and the design of the building.</span></p><span data-dcnode-id="4979" instrument_node="">
</span><p data-dcnode-id="4971"><span data-dcnode-id="4978" instrument_node="">Two other works characteristic for De Portzamparc’s style are the </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christiandeportzamparc.com/en/projects/flagship-dior-seoul/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4977" instrument_node="">Dior Flagship</span></a><span data-dcnode-id="4975" instrument_node=""> in Seoul, Korea; and the </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.christiandeportzamparc.com/en/projects/philharmonie-luxembourg/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4974" instrument_node="">Luxembourg Philharmonie</span></a><span data-dcnode-id="4972" instrument_node="">, in Luxemburg.</span></p><span data-dcnode-id="4970" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4953"><figure class="aligncenter" data-dcnode-id="4954"><picture class="wp-image-2275" data-dcnode-id="4964"><span data-dcnode-id="4969" instrument_node="">

</span><h2 data-dcnode-id="4942"><span class="ez-toc-section" data-dcnode-id="4951" id="38_David_Childs_-_One_World_Trade_Center"></span><strong data-dcnode-id="4944"><span data-dcnode-id="4950" instrument_node="">38. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Childs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4949" instrument_node="">David Childs</span></a><span data-dcnode-id="4947" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onewtc.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4946" instrument_node="">One World Trade Center </span></a></strong><span class="ez-toc-section-end" data-dcnode-id="4943"></span></h2><span data-dcnode-id="4941" instrument_node="">
</span><p data-dcnode-id="4937"><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//iaa-ngo.com/portfolio-posts/david-childs/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4940" instrument_node="">David Magie Childs</span></a><span data-dcnode-id="4938" instrument_node=""> was born in 1941 in New Jersey, USA.&nbsp;</span></p><span data-dcnode-id="4936" instrument_node="">
</span><p data-dcnode-id="4928"><span data-dcnode-id="4935" instrument_node="">His </span><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/david-m-childs-design-partner-177377" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4934" instrument_node="">works</span></a><span data-dcnode-id="4932" instrument_node=""> are said to be adapted to their specific surroundings, where everyone is involved to create a </span><strong data-dcnode-id="4930"><span data-dcnode-id="4931" instrument_node="">community</span></strong><span data-dcnode-id="4929" instrument_node="">. </span></p><span data-dcnode-id="4927" instrument_node="">
</span><p data-dcnode-id="4922"><span data-dcnode-id="4926" instrument_node="">He himself mentions he likes to design </span><strong data-dcnode-id="4924"><span data-dcnode-id="4925" instrument_node="">big and complicated</span></strong><span data-dcnode-id="4923" instrument_node=""> works, where others are needed to help solve the challenges.</span></p><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4913"><span data-dcnode-id="4920" instrument_node="">This architect is most known for designing the </span><strong data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">tallest building in the United States</span></strong><span data-dcnode-id="4917" instrument_node="">, the </span><a data-dcnode-id="4915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onewtc.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4916" instrument_node="">One World Trade Center</span></a><span data-dcnode-id="4914" instrument_node=""> in New York City.</span></p><span data-dcnode-id="4912" instrument_node="">
</span><p data-dcnode-id="4905"><span data-dcnode-id="4911" instrument_node="">The structure holds </span><strong data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">sentimental value and history </span></strong><span data-dcnode-id="4908" instrument_node="">for the reason that it is built on the same spot where a tragedy happened to the old </span><a data-dcnode-id="4906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onewtc.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4907" instrument_node="">World Trade Center.</span></a></p><span data-dcnode-id="4904" instrument_node="">
</span><p data-dcnode-id="4896"><span data-dcnode-id="4903" instrument_node="">Next to this, Childs got renowned for the </span><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.skyscrapercenter.com/building/times-square-tower/1226" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4902" instrument_node="">Times Square Tower</span></a><span data-dcnode-id="4900" instrument_node="">, and the </span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.metro-manhattan.com/buildings/worldwide-plaza-825-eighth-avenue/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4899" instrument_node="">825 Eighth Avenue</span></a><span data-dcnode-id="4897" instrument_node=""> both in New York City</span></p><span data-dcnode-id="4895" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="4886"><figure class="aligncenter" data-dcnode-id="4887"><img alt="What's that smell? It's the custom scent created for the Observatory at One  World Trade Center | News | Archinect" data-dcnode-id="4894" data-lazy-src="https://archinect.imgix.net/uploads/24/24fe7c1b77c71c7447fc482958e438b4.jpg?auto=compress%2Cformat" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%200%200'%3E%3C/svg%3E"><noscript data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">&lt;img src="https://archinect.imgix.net/uploads/24/24fe7c1b77c71c7447fc482958e438b4.jpg?auto=compress%2Cformat" alt="What's that smell? It's the custom scent created for the Observatory at One  World Trade Center | News | Archinect"/&gt;</span></noscript><figcaption data-dcnode-id="4888"><span data-dcnode-id="4891" instrument_node="">One World Trade Center. Image by: </span><a data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archinect.com/news/article/150150714/what-s-that-smell-it-s-the-custom-scent-created-for-the-observatory-at-one-world-trade-center" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4890" instrument_node="">Archinect</span></a></figcaption></figure></div><span data-dcnode-id="4885" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="4884" style="height:100px"></div><span data-dcnode-id="4883" instrument_node="">
</span><h2 data-dcnode-id="4872"><span class="ez-toc-section" data-dcnode-id="4882" id="39_Jeanne_Gang_-_The_Aqua_Tower"></span><strong data-dcnode-id="4874"><span data-dcnode-id="4881" instrument_node="">39. </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//studiogang.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4880" instrument_node="">Jeanne Gang</span></a><span data-dcnode-id="4878" instrument_node=""> – </span><a aria-label=" (opens in a new tab)" data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studiogang.com/project/aqua-tower" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4877" instrument_node="">The Aqua Tower</span></a><span data-dcnode-id="4875" instrument_node=""> </span></strong><span class="ez-toc-section-end" data-dcnode-id="4873"></span></h2><span data-dcnode-id="4871" instrument_node="">
</span><p data-dcnode-id="4864"><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studiogang.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4870" instrument_node="">Jeanne Gang</span></a><span data-dcnode-id="4868" instrument_node=""> is an American architect and urban designer, born in 1964 in Illinois. In 1997 she founded </span><strong data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">Studio Gang</span></strong><span data-dcnode-id="4865" instrument_node="">.</span></p><span data-dcnode-id="4863" instrument_node="">
</span><p data-dcnode-id="4855"><span data-dcnode-id="4862" instrument_node="">Gang’s work is characterized by having an </span><strong data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">innovative </span></strong><span data-dcnode-id="4859" instrument_node="">use of materials and an </span><strong data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">environmentally sensitive </span></strong><span data-dcnode-id="4856" instrument_node="">approach.</span></p><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4846"><span data-dcnode-id="4853" instrument_node="">Her </span><a data-dcnode-id="4851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gsd.harvard.edu/person/jeanne-gang/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4852" instrument_node="">approach</span></a><span data-dcnode-id="4850" instrument_node=""> is </span><strong data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">research-based</span></strong><span data-dcnode-id="4847" instrument_node="">, and is exploring the relationships between individuals, communities, and environments.</span></p><span data-dcnode-id="4845" instrument_node="">
</span><p data-dcnode-id="4837"><span data-dcnode-id="4844" instrument_node="">Her most famous work is </span><a data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studiogang.com/project/aqua-tower" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4843" instrument_node="">the Aqua Tower</span></a><span data-dcnode-id="4841" instrument_node=""> in Chicago, Illinois. It is an 82-story residential skyscraper. The building was </span><strong data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">awarded </span></strong><span data-dcnode-id="4838" instrument_node="">as being the best skyscraper of the year 2009.&nbsp;</span></p><span data-dcnode-id="4836" instrument_node="">
</span><p data-dcnode-id="4828"><span data-dcnode-id="4835" instrument_node="">Two other famous works of Gang are </span><a data-dcnode-id="4833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studiogang.com/project/writers-theatre" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4834" instrument_node="">Writer’s Theatre</span></a><span data-dcnode-id="4832" instrument_node=""> in Glencoe, Illinois; and </span><a data-dcnode-id="4830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studiogang.com/project/rescue-company-2" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4831" instrument_node="">Rescue Company 2</span></a><span data-dcnode-id="4829" instrument_node=""> in Brooklyn, New York.</span></p><span data-dcnode-id="4827" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="4810"><figure class="aligncenter" data-dcnode-id="4811"><picture class="wp-image-2277" data-dcnode-id="4821"><span data-dcnode-id="4826" instrument_node="">
