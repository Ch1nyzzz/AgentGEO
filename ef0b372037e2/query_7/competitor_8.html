</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><span class="caption" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Ernest Charles Henninges died on February 3, 1939. His sect the "New Covenant Fellowship," is still active and offers his books and copies of the "New Covenant Advocate and Kingdom Herald." Henninges defection caused the second largest split in Watch Tower Society history, second only to the 1917 - 1931 schism.</span></span><span data-dcnode-id="536" instrument_node="">
</span></div><span data-dcnode-id="534" instrument_node="">
</span><div class="clear" data-dcnode-id="533"></div><span data-dcnode-id="532" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="511" data-version="1" id="Image42"><span data-dcnode-id="530" instrument_node="">
</span><h2 data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Paul S. L. Johnson, The "Epiphany Messenger"</span></h2><span data-dcnode-id="527" instrument_node="">
</span><div class="widget-content" data-dcnode-id="515"><span data-dcnode-id="526" instrument_node="">
</span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/savage-wolves-will-come-in-among-you.html"><span data-dcnode-id="525" instrument_node="">
</span><img alt="Paul S. L. Johnson, The &quot;Epiphany Messenger&quot;" data-dcnode-id="524" height="253" id="Image42_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-U2wiUOpd0YA/ThnxuOM-RQI/AAAAAAAAJdc/WWX0CrmbXcc/s253/1911_bible_student_convention_pictures_0013.jpg&amp;raw" width="184"><span data-dcnode-id="523" instrument_node="">
</span></a><span data-dcnode-id="521" instrument_node="">
</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
</span><span class="caption" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">After the death of Pastor Charles Russell on October 31, 1916, the divisions within the Watchtower Society soon started. Read about one of the ring leaders by the name of Paul S. L. Johnson. This review of Paul Johnson and his sect the Laymen's Home Missionary Movement, is not from Watchtower publications. However you can also read all about him in the 1973 &amp; 1975 Yearbooks of Jehovah's Witnesses, the Proclaimers of God's Kingdom book, the Divine Purpose book, and Faith on the March.</span></span><span data-dcnode-id="516" instrument_node="">
</span></div><span data-dcnode-id="514" instrument_node="">
</span><div class="clear" data-dcnode-id="513"></div><span data-dcnode-id="512" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="491" data-version="1" id="Image110"><span data-dcnode-id="510" instrument_node="">
</span><h2 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Did Jesus Mean Hellfire?</span></h2><span data-dcnode-id="507" instrument_node="">
</span><div class="widget-content" data-dcnode-id="495"><span data-dcnode-id="506" instrument_node="">
</span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/did-jesus-mean-hellfire.html"><span data-dcnode-id="505" instrument_node="">
</span><img alt="Did Jesus Mean Hellfire?" data-dcnode-id="504" height="253" id="Image110_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ghvgWlB3Pl8/ThEYfAfgkgI/AAAAAAAAJOI/r0dLX7fhagE/s253/1101110425_400.jpg&amp;raw" style="visibility: visible;" width="191"><span data-dcnode-id="503" instrument_node="">
</span></a><span data-dcnode-id="501" instrument_node="">
</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
</span><span class="caption" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">The Bible has answered our question. It has shown that Hades, Sheol or hell is the common grave of mankind. At the resurrection hell gives up its dead. Jehovah destroys hell, for it is cast into the “lake of fire.” Gehenna represents the state of destruction that lasts forever and ever. There is no hope of a resurrection for those in Gehenna. So the fiery hells are only pagan hells. The Bible hell (Sheol-Hades) is not hot, but is the dark, silent grave.</span></span><span data-dcnode-id="496" instrument_node="">
</span></div><span data-dcnode-id="494" instrument_node="">
</span><div class="clear" data-dcnode-id="493"></div><span data-dcnode-id="492" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="471" data-version="1" id="Image163"><span data-dcnode-id="490" instrument_node="">
</span><h2 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Jesus the Christ was sent by God</span></h2><span data-dcnode-id="487" instrument_node="">
</span><div class="widget-content" data-dcnode-id="475"><span data-dcnode-id="486" instrument_node="">
</span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/12/jesus-christsent-by-god.html"><span data-dcnode-id="485" instrument_node="">
</span><img alt="Jesus the Christ was sent by God" data-dcnode-id="484" height="253" id="Image163_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-NuRvjf_e6kI/ThEpT2vALAI/AAAAAAAAJR4/j4FebzQ24do/s253/jesus_scroll.jpg&amp;raw" width="223"><span data-dcnode-id="483" instrument_node="">
</span></a><span data-dcnode-id="481" instrument_node="">
</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">
</span><span class="caption" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">The word “ransom” is often used when there is a kidnapping. After a kidnapper captures a person, he may say he will return the person if a certain amount of money is paid as a ransom. So a ransom is something that brings the deliverance of a person held captive. It is something that is paid so that he does not lose his life. Jesus’ perfect human life was given to obtain mankind’s release from bondage to sin and death. (1 Peter 1:18, 19; Ephesians 1:7) Why was such a release needed?</span></span><span data-dcnode-id="476" instrument_node="">
</span></div><span data-dcnode-id="474" instrument_node="">
</span><div class="clear" data-dcnode-id="473"></div><span data-dcnode-id="472" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="451" data-version="1" id="Image175"><span data-dcnode-id="470" instrument_node="">
</span><h2 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Gutenberg—How He Enriched the World!</span></h2><span data-dcnode-id="467" instrument_node="">
</span><div class="widget-content" data-dcnode-id="455"><span data-dcnode-id="466" instrument_node="">
</span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/09/gutenberghow-he-enriched-world-by-awake.html"><span data-dcnode-id="465" instrument_node="">
</span><img alt="Gutenberg—How He Enriched the World!" data-dcnode-id="464" height="178" id="Image175_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TL5egrqdjwI/AAAAAAAAGEU/Zi6yBrZh5bI/S760/bible3_zoom.jpg&amp;raw" width="253"><span data-dcnode-id="463" instrument_node="">
</span></a><span data-dcnode-id="461" instrument_node="">
</span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
</span><span class="caption" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">WHICH invention of the past thousand years has most influenced your life? Was it the telephone, the television, or the motorcar? Probably it was none of these. According to many experts, it was mechanized printing. The man who is given credit for the invention of the first practical method is Johannes Gensfleisch zur Laden, better known as Johannes Gutenberg. He came from an aristocratic background and therefore did not have to serve a regular apprenticeship.</span></span><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="454" instrument_node="">
</span><div class="clear" data-dcnode-id="453"></div><span data-dcnode-id="452" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="431" data-version="1" id="Image172"><span data-dcnode-id="450" instrument_node="">
</span><h2 data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Josephus—Historian Well-suited to His Subject</span></h2><span data-dcnode-id="447" instrument_node="">
</span><div class="widget-content" data-dcnode-id="435"><span data-dcnode-id="446" instrument_node="">
</span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/flavius-josephus.html"><span data-dcnode-id="445" instrument_node="">
</span><img alt="Josephus—Historian Well-suited to His Subject" data-dcnode-id="444" height="253" id="Image172_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-KA7SBRbe5VQ/ThEI0MPS3VI/AAAAAAAAJJY/F5RrmIOfxjQ/s253/josephus-color.jpg&amp;raw" width="202"><span data-dcnode-id="443" instrument_node="">
</span></a><span data-dcnode-id="441" instrument_node="">
</span><br data-dcnode-id="440"><span data-dcnode-id="439" instrument_node="">
</span><span class="caption" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Despite his ambivalent role, Josephus was an eyewitness to history, and his writings are considered authoritative. These texts are key to understanding a pivotal point in world history, which has tragic repercussions even to this day.</span></span><span data-dcnode-id="436" instrument_node="">
</span></div><span data-dcnode-id="434" instrument_node="">
</span><div class="clear" data-dcnode-id="433"></div><span data-dcnode-id="432" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="411" data-version="1" id="Image97"><span data-dcnode-id="430" instrument_node="">
</span><h2 data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The Moabite Stone</span></h2><span data-dcnode-id="427" instrument_node="">
</span><div class="widget-content" data-dcnode-id="415"><span data-dcnode-id="426" instrument_node="">
</span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/moabite-stone.html"><span data-dcnode-id="425" instrument_node="">
</span><img alt="The Moabite Stone" data-dcnode-id="424" height="253" id="Image97_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-N2FaQh-jS_o/ThEYb3xSLoI/AAAAAAAAJOA/xywqHAC2HCU/s253/450px-Mesha_Stele_%252528511142469%252529.jpg&amp;raw" style="visibility: visible;" width="190"><span data-dcnode-id="423" instrument_node="">
</span></a><span data-dcnode-id="421" instrument_node="">
</span><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">
</span><span class="caption" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">THE Moabite, or Mesha, Stone was deliberately broken up within a year of its discovery in 1868. It was almost 3,000 years old. A piece of polished black basalt with a neatly rounded top, it was 44 inches high, [112 cm] 28 inches [71 cm] wide, and 14 inches [36 cm] thick. Some time after it was broken up, 2 large and 18 smaller fragments were recovered, but a third of the stone was irretrievably lost. How was such an extraordinary artifact almost lost forever? And how valuable is it to students of the Bible?</span></span><span data-dcnode-id="416" instrument_node="">
</span></div><span data-dcnode-id="414" instrument_node="">
</span><div class="clear" data-dcnode-id="413"></div><span data-dcnode-id="412" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="391" data-version="1" id="Image165"><span data-dcnode-id="410" instrument_node="">
</span><h2 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Rescuing the Codex Sinaiticus</span></h2><span data-dcnode-id="407" instrument_node="">
</span><div class="widget-content" data-dcnode-id="395"><span data-dcnode-id="406" instrument_node="">
</span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/rescuing-codex-sinaiticus.html"><span data-dcnode-id="405" instrument_node="">
</span><img alt="Rescuing the Codex Sinaiticus" data-dcnode-id="404" height="190" id="Image165_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TTCZL2EohfI/AAAAAAAAHr0/Nl5qu1xx33w/S1600-R/alg_bible.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="403" instrument_node="">
</span></a><span data-dcnode-id="401" instrument_node="">
</span><br data-dcnode-id="400"><span data-dcnode-id="399" instrument_node="">
</span><span class="caption" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">THE Codex Sinaiticus has been described as “the most important, exciting, and valuable book in existence.” This is not just because it is at least 1,600 years old but because it forms a vital link in our catalog of Bible manuscripts. Its rediscovery, by Tischendorf just over a hundred years ago, is a fascinating story.</span></span><span data-dcnode-id="396" instrument_node="">
</span></div><span data-dcnode-id="394" instrument_node="">
</span><div class="clear" data-dcnode-id="393"></div><span data-dcnode-id="392" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="371" data-version="1" id="Image166"><span data-dcnode-id="390" instrument_node="">
</span><h2 data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The Dead Sea Scrolls</span></h2><span data-dcnode-id="387" instrument_node="">
</span><div class="widget-content" data-dcnode-id="375"><span data-dcnode-id="386" instrument_node="">
</span><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/dead-sea-scrolls.html"><span data-dcnode-id="385" instrument_node="">
</span><img alt="The Dead Sea Scrolls" data-dcnode-id="384" height="200" id="Image166_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TNuG_ws1IlI/AAAAAAAAGeU/RkyR6jx1Kqc/S1600-R/20100827014623573.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="383" instrument_node="">
</span></a><span data-dcnode-id="381" instrument_node="">
</span><br data-dcnode-id="380"><span data-dcnode-id="379" instrument_node="">
</span><span class="caption" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Before the discovery of the Dead Sea Scrolls, the oldest manuscripts of the Hebrew Scriptures were from about the ninth and tenth centuries C.E. Could these manuscripts truly be relied upon as faithful transmissions of God’s Word, since the writing of the Hebrew Scriptures was completed well over one thousand years earlier? Professor Julio Trebolle Barrera, a member of the international team of editors of the Dead Sea Scrolls, states: “The Isaiah Scroll [from Qumran] provides irrefutable proof that the transmission of the biblical text through a period of more than one thousand years by the hands of Jewish copyists has been extremely faithful and careful.”</span></span><span data-dcnode-id="376" instrument_node="">
</span></div><span data-dcnode-id="374" instrument_node="">
</span><div class="clear" data-dcnode-id="373"></div><span data-dcnode-id="372" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="351" data-version="1" id="Image23"><span data-dcnode-id="370" instrument_node="">
</span><h2 data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Bible’s chronology of 607 B.C.E.</span></h2><span data-dcnode-id="367" instrument_node="">
</span><div class="widget-content" data-dcnode-id="355"><span data-dcnode-id="366" instrument_node="">
</span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jehovahsjudgment.co.uk/607/default.html"><span data-dcnode-id="365" instrument_node="">
</span><img alt="Bible’s chronology of 607 B.C.E." data-dcnode-id="364" height="194" id="Image23_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TPkfZkPyKcI/AAAAAAAAHJQ/ZC6fRxFjuN0/S1600-R/untitled.bmp&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="363" instrument_node="">
</span></a><span data-dcnode-id="361" instrument_node="">
</span><br data-dcnode-id="360"><span data-dcnode-id="359" instrument_node="">
</span><span class="caption" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Why Jehovah’s Witnesses are right for sticking to the Bible’s chronology of 607 BCE for the destruction of Jerusalem. Arguments for 587 BCE are scripturally flawed, causing four Bible prophecies to fail. The year 607 BCE really is the only date that works with the Bible.</span></span><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span><div class="clear" data-dcnode-id="353"></div><span data-dcnode-id="352" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="331" data-version="1" id="Image81"><span data-dcnode-id="350" instrument_node="">
</span><h2 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Jerusalem was destroyed in 607 B.C.E.</span></h2><span data-dcnode-id="347" instrument_node="">
</span><div class="widget-content" data-dcnode-id="335"><span data-dcnode-id="346" instrument_node="">
</span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/jerusalem-was-destroyed-in-607-bce.html"><span data-dcnode-id="345" instrument_node="">
</span><img alt="Jerusalem was destroyed in 607 B.C.E." data-dcnode-id="344" height="157" id="Image81_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/S9pyDhVrrSI/AAAAAAAADqw/VxfDG533fFQ/S240/Jerusalem1.jpg&amp;raw" width="240"><span data-dcnode-id="343" instrument_node="">
</span></a><span data-dcnode-id="341" instrument_node="">
</span><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">
</span><span class="caption" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">It seems evident that the easiest and most direct understanding of the various Biblical statements is that the 70 years began with the complete desolation of Judah after Jerusalem was destroyed. (Jeremiah 25:8-11; 2 Chronicles 36:20-23; Daniel 9:2) Hence, counting back 70 years from when the Jews returned to their homeland in 537 B.C.E., we arrive at 607 B.C.E. for the date when Nebuchadnezzar, in his 18th regnal year, destroyed Jerusalem, removed Zedekiah from the throne and brought to an end the Judean line of kings on a throne in earthly Jerusalem.—Ezekiel 21:19-27</span></span><span data-dcnode-id="336" instrument_node="">
</span></div><span data-dcnode-id="334" instrument_node="">
</span><div class="clear" data-dcnode-id="333"></div><span data-dcnode-id="332" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="311" data-version="1" id="Image58"><span data-dcnode-id="330" instrument_node="">
</span><h2 data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Seven Times - The Times of The Gentiles</span></h2><span data-dcnode-id="327" instrument_node="">
</span><div class="widget-content" data-dcnode-id="315"><span data-dcnode-id="326" instrument_node="">
</span><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/06/seven-timesthe-times-of-gentiles-in.html"><span data-dcnode-id="325" instrument_node="">
</span><img alt="Seven Times - The Times of The Gentiles" data-dcnode-id="324" height="150" id="Image58_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-RzfbUj7vTbY/ThEa3pAckDI/AAAAAAAAJPI/EniXjwS5WBM/s253/chartofages.gif&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="323" instrument_node="">
</span></a><span data-dcnode-id="321" instrument_node="">
</span><br data-dcnode-id="320"><span data-dcnode-id="319" instrument_node="">
</span><span class="caption" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">In the course of their Bible studies, these searching students took up a consideration of the “times of the Gentiles,” as spoken of by Jesus at Luke 21:24 (AV), and they associated those Gentile Times with the “seven times” mentioned four times in Daniel, chapter four, verses 16, 23, 25, 32। What did those Bible students determine to be the date for those “seven times” of Gentile domination of the earth to end legally before God? Well, at that time there was a monthly magazine being published in Brooklyn, New York, by one George Storrs, and it was called “Bible Examiner।” In the year 1876 the twenty-four-year-old Russell made a contribution on the subject to this magazine। It was published in Volume XXI, Number 1, which was the issue of October, 1876. On pages 27, 28 of that issue Russell’s article was published under the title “Gentile Times: When Do They End?” In that article (page 27) Russell said: “The seven times will end in A.D. 1914.”</span></span><span data-dcnode-id="316" instrument_node="">
</span></div><span data-dcnode-id="314" instrument_node="">
</span><div class="clear" data-dcnode-id="313"></div><span data-dcnode-id="312" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="291" data-version="1" id="Image45"><span data-dcnode-id="310" instrument_node="">
</span><h2 data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Jerusalem, 607 B.C.E.</span></h2><span data-dcnode-id="307" instrument_node="">
</span><div class="widget-content" data-dcnode-id="295"><span data-dcnode-id="306" instrument_node="">
</span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlytruegod.org/jwstrs/607BCE.htm"><span data-dcnode-id="305" instrument_node="">
</span><img alt="Jerusalem, 607 B.C.E." data-dcnode-id="304" height="167" id="Image45_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-N6lKpGt1DXo/ThEJTn2JY-I/AAAAAAAAJJg/Gp1Yd1Mjj9A/s253/Jerusalem-of-Gold.jpg&amp;raw" width="253"><span data-dcnode-id="303" instrument_node="">
</span></a><span data-dcnode-id="301" instrument_node="">
</span><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">
</span><span class="caption" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">"Jehovah's Witnesses have been interested in the findings of archaeologists as these relate to the Bible. However, where the interpretation of these findings conflicts with clear statements in the Bible, we accept with confidence what the Holy Scriptures say, whether on matters related to chronology or any other topic. . . . For the same reason, they have realized that the prophecy in Daniel chapter 4 regarding the "seven times" began counting in 607-606 B.C.E. and that it pinpointed 1914 C.E. in the autumn as the year when Christ was enthroned in heaven as ruling King and this world entered its time of the end. But they would not have discerned these thrilling fulfillments of prophecy if they had wavered in their confidence in the inspiration of the Holy Scriptures. Thus, the insight that they have shown has been directly associated with their reliance on God's Word."—The Watchtower, March 15, 1989, p. 22.</span></span><span data-dcnode-id="296" instrument_node="">
</span></div><span data-dcnode-id="294" instrument_node="">
</span><div class="clear" data-dcnode-id="293"></div><span data-dcnode-id="292" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="271" data-version="1" id="Image160"><span data-dcnode-id="290" instrument_node="">
</span><h2 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">1914 A Significant Year</span></h2><span data-dcnode-id="287" instrument_node="">
</span><div class="widget-content" data-dcnode-id="275"><span data-dcnode-id="286" instrument_node="">
</span><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/1914a-significant-year-in-bible.html"><span data-dcnode-id="285" instrument_node="">
</span><img alt="1914 A Significant Year" data-dcnode-id="284" height="148" id="Image160_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-Nu_5VGhna34/TitNOkIz-mI/AAAAAAAAJkU/TjY-Uq1KiiQ/s253/1914%252BForeseen.jpg&amp;raw" width="253"><span data-dcnode-id="283" instrument_node="">
</span></a><span data-dcnode-id="281" instrument_node="">
</span><br data-dcnode-id="280"><span data-dcnode-id="279" instrument_node="">
</span><span class="caption" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The Gentile Times is the period Jesus referred to as “the appointed times of the nations.” (Luke 21:24) Not all that was expected to happen in 1914 did happen, but it did mark the end of the Gentile Times and was a year of special significance. Many historians and commentators agree that 1914 was a turning point in human history.</span></span><span data-dcnode-id="276" instrument_node="">
</span></div><span data-dcnode-id="274" instrument_node="">
</span><div class="clear" data-dcnode-id="273"></div><span data-dcnode-id="272" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="251" data-version="1" id="Image69"><span data-dcnode-id="270" instrument_node="">
</span><h2 data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Appointed Times of the Nations</span></h2><span data-dcnode-id="267" instrument_node="">
</span><div class="widget-content" data-dcnode-id="255"><span data-dcnode-id="266" instrument_node="">
</span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/appointed-times-of-nations.html"><span data-dcnode-id="265" instrument_node="">
</span><img alt="Appointed Times of the Nations" data-dcnode-id="264" height="186" id="Image69_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-hbyNYKgmrbc/ThITXUsZzVI/AAAAAAAAJWg/yswtgp-WlT0/s253/1999book.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="263" instrument_node="">
</span></a><span data-dcnode-id="261" instrument_node="">
</span><br data-dcnode-id="260"><span data-dcnode-id="259" instrument_node="">
</span><span class="caption" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Beginning of ‘trampling.’ The ‘trampling’ on that kingdom of the dynasty of Davidic rulers did not begin with the Roman devastation of the city of Jerusalem in 70 C.E. It began centuries earlier with the Babylonian overthrow of that dynasty in 607 B.C.E. when Nebuchadnezzar destroyed Jerusalem and took captive the dethroned king Zedekiah and the land was left desolate.</span></span><span data-dcnode-id="256" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node="">
</span><div class="clear" data-dcnode-id="253"></div><span data-dcnode-id="252" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="231" data-version="1" id="Image157"><span data-dcnode-id="250" instrument_node="">
</span><h2 data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">"Seven Times" = 2,520 years</span></h2><span data-dcnode-id="247" instrument_node="">
</span><div class="widget-content" data-dcnode-id="235"><span data-dcnode-id="246" instrument_node="">
</span><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/08/seven-times-2520-years-607-bce-1914-ce.html"><span data-dcnode-id="245" instrument_node="">
</span><img alt="&quot;Seven Times&quot; = 2,520 years" data-dcnode-id="244" height="200" id="Image157_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TIhfmy2zJrI/AAAAAAAAFMs/DizXsoaUjyY/S760/%2527Seven%2BTimes%2527%2B-%2B%28Gentile%2BTimes%29.jpg&amp;raw" width="253"><span data-dcnode-id="243" instrument_node="">
</span></a><span data-dcnode-id="241" instrument_node="">
</span><br data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">
</span><span class="caption" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">In the course of their Bible studies, these searching students took up a consideration of the “times of the Gentiles,” as spoken of by Jesus at Luke 21:24 (AV), and they associated those Gentile Times with the “seven times” mentioned four times in Daniel, chapter four, verses 16, 23, 25, 32। What did those Bible students determine to be the date for those “seven times” of Gentile domination of the earth to end legally before God?</span></span><span data-dcnode-id="236" instrument_node="">
</span></div><span data-dcnode-id="234" instrument_node="">
</span><div class="clear" data-dcnode-id="233"></div><span data-dcnode-id="232" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="211" data-version="1" id="Image46"><span data-dcnode-id="230" instrument_node="">
</span><h2 data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Is it not true that 587/6 B.C.E. is every bit as reliable as 539 B.C.E.?</span></h2><span data-dcnode-id="227" instrument_node="">
</span><div class="widget-content" data-dcnode-id="215"><span data-dcnode-id="226" instrument_node="">
</span><a data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlytruegod.org/jwstrs/539vs587.htm"><span data-dcnode-id="225" instrument_node="">
</span><img alt="Is it not true that 587/6 B.C.E. is every bit as reliable as 539 B.C.E.?" data-dcnode-id="224" height="147" id="Image46_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-W-My5TK-GSY/ThOILzPShpI/AAAAAAAAJWw/G9UtCaSg6CE/s253/Jerusalem_Destruction.jpg&amp;raw" width="253"><span data-dcnode-id="223" instrument_node="">
</span></a><span data-dcnode-id="221" instrument_node="">
</span><br data-dcnode-id="220"><span data-dcnode-id="219" instrument_node="">
</span><span class="caption" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">A date that can be used as a pivotal point is the year 539 B.C.E., which is supported by various historical sources (including Diodorus, Africanus, Eusebius, Ptolemy, and Babylonian tablets) as the year for the overthrow of Babylon by Cyrus (technically known as Cyrus II, the grandson of Cyrus I). The date of 539 B.C.E. for the fall of Babylon can be arrived at not only by Ptolemy's canon but by other sources as well. The historian Diodorus, as well as the Christian historians Africanus and Eusebius, shows that Cyrus' first year as king of Persia corresponded to Olympiadftn1 55, year 1 (560/559 B.C.E.), while Cyrus' last year is placed at Olympiad 62, year 2 (531/530 B.C.E.). Cuneiform tablets give Cyrus a rule of nine years over Babylon, which would therefore substantiate the year 539 as the date of his conquest of Babylon.—Handbook of Biblical Chronology, by Jack Finegan, 1964, pages 112, 168-170; Babylonian Chronology, 626 B.C.–A.D. 75, p. 14.—Insight on the Scriptures, "Chronology," p. 454.</span></span><span data-dcnode-id="216" instrument_node="">
</span></div><span data-dcnode-id="214" instrument_node="">
</span><div class="clear" data-dcnode-id="213"></div><span data-dcnode-id="212" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="191" data-version="1" id="Image29"><span data-dcnode-id="210" instrument_node="">
</span><h2 data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Charles Taze Russell: His Life and Times: The Man, the Millennium and the Message</span></h2><span data-dcnode-id="207" instrument_node="">
</span><div class="widget-content" data-dcnode-id="195"><span data-dcnode-id="206" instrument_node="">
</span><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pastorrussellbiography.com/index.html"><span data-dcnode-id="205" instrument_node="">
</span><img alt="Charles Taze Russell: His Life and Times: The Man, the Millennium and the Message" data-dcnode-id="204" height="217" id="Image29_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-l92JMWI1RC4/TV7vtMFdBlI/AAAAAAAAISU/LmY8qxWyhrQ/s1600/_wsb_752x506_BookCoverPreview_2.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="203" instrument_node="">
</span></a><span data-dcnode-id="201" instrument_node="">
</span><br data-dcnode-id="200"><span data-dcnode-id="199" instrument_node="">
</span><span class="caption" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">The biography of an American original. Charles Taze Russell was founder of the Watchtower Bible and Track Society. Many religious groups, including the Jehovah's Witnesses, the International Bible Students Association, the Laymen's Home Missionary Movement, Dawn and other Bible student groups have formed around his teachings.</span></span><span data-dcnode-id="196" instrument_node="">
</span></div><span data-dcnode-id="194" instrument_node="">
</span><div class="clear" data-dcnode-id="193"></div><span data-dcnode-id="192" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="171" data-version="1" id="Image83"><span data-dcnode-id="190" instrument_node="">
</span><h2 data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Pastor C. T. Russell: Messenger of Millennial Hope</span></h2><span data-dcnode-id="187" instrument_node="">
</span><div class="widget-content" data-dcnode-id="175"><span data-dcnode-id="186" instrument_node="">
</span><a data-dcnode-id="182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heraldmag.org/bookstore/ctr_biography.htm"><span data-dcnode-id="185" instrument_node="">
</span><img alt="Pastor C. T. Russell: Messenger of Millennial Hope" data-dcnode-id="184" height="225" id="Image83_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-sbQcIVUffEA/TWBzslG0bUI/AAAAAAAAITU/yZeU1ITeCTI/s1600/4e35ab7c30caa9bd9c5b7ae88e06bf9a.jpg&amp;raw" width="150"><span data-dcnode-id="183" instrument_node="">
</span></a><span data-dcnode-id="181" instrument_node="">
</span><br data-dcnode-id="180"><span data-dcnode-id="179" instrument_node="">
</span><span class="caption" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Ninety years ago the founder of the Bible Students, Pastor Charles Taze Russell, died. The organization he established became fragmented and subject to strong personalities who felt they knew how to best continue his legacy. These differences between the groups who trace their roots to the Pastor’s ministry continue to our day.</span></span><span data-dcnode-id="176" instrument_node="">
</span></div><span data-dcnode-id="174" instrument_node="">
</span><div class="clear" data-dcnode-id="173"></div><span data-dcnode-id="172" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="151" data-version="1" id="Image15"><span data-dcnode-id="170" instrument_node="">
</span><h2 data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">Faith on the March by A. H. Macmillan</span></h2><span data-dcnode-id="167" instrument_node="">
</span><div class="widget-content" data-dcnode-id="155"><span data-dcnode-id="166" instrument_node="">
</span><a data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.e-cepher.com/books/fotm/"><span data-dcnode-id="165" instrument_node="">
</span><img alt="Faith on the March by A. H. Macmillan" data-dcnode-id="164" height="221" id="Image15_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/S9aB9QGw3jI/AAAAAAAADl4/Dl0_eqaA30I/S240/046.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="163" instrument_node="">
</span></a><span data-dcnode-id="161" instrument_node="">
</span><br data-dcnode-id="160"><span data-dcnode-id="159" instrument_node="">
</span><span class="caption" data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">"A. H. Macmillan is to be in full charge of the office and the Bethel Home during my absence. Anything he says for you to do you must do; it doesn't make any difference whether you agree or not. If he tells you incorrectly, I'll attend to him when I get home." Then he handed me copies of all the letters and said, "You have the skeleton organization. Go to work and do things." - Pastor Russell</span></span><span data-dcnode-id="156" instrument_node="">
</span></div><span data-dcnode-id="154" instrument_node="">
</span><div class="clear" data-dcnode-id="153"></div><span data-dcnode-id="152" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="131" data-version="1" id="Image79"><span data-dcnode-id="150" instrument_node="">
</span><h2 data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Truth In Translation</span></h2><span data-dcnode-id="147" instrument_node="">
</span><div class="widget-content" data-dcnode-id="135"><span data-dcnode-id="146" instrument_node="">
</span><a data-dcnode-id="142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3DEgnIp2Bzdi8C%26printsec%3Dfrontcover%26dq%3Dtruth%2Bin%2Btranslation%26source%3Dbl%26ots%3DxdrWt3-Zd7%26sig%3DIuFCLDbS3mAUykiR9jaGGaXdoRA%26hl%3Den%26ei%3D1krXS-ymNI_wsgOUjvHRAg%26sa%3DX%26oi%3Dbook_result%26ct%3Dresult%26resnum%3D6%26ved%3D0CCUQ6AEwBQ%23v%3Donepage%26q%26f%3Dfalse"><span data-dcnode-id="145" instrument_node="">
</span><img alt="Truth In Translation" data-dcnode-id="144" height="219" id="Image79_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/S-nN5g8y--I/AAAAAAAAD6I/sM0tPiN-380/S1600-R/41YVGQZ68WL__SS500_.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="143" instrument_node="">
</span></a><span data-dcnode-id="141" instrument_node="">
</span><br data-dcnode-id="140"><span data-dcnode-id="139" instrument_node="">
</span><span class="caption" data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">ACCORDING to one count, as many as 55 new English translations of the Christian Greek Scriptures were published between 1952 and 1990. Translators’ choices mean that no two read alike. In order to assess the reliability of the translators’ work, Jason BeDuhn, associate professor of religious studies at Northern Arizona University, in Flagstaff, Arizona, U.S.A., examined and compared for accuracy eight major translations, including the New World Translation of the Holy Scriptures, published by Jehovah’s Witnesses. The result? While critical of some of its translation choices, BeDuhn called the New World Translation a “remarkably good” translation, “better by far” and “consistently better” than some of the others considered. Overall, concluded BeDuhn, the New World Translation “is one of the most accurate English translations of the New Testament currently available” and “the most accurate of the translations compared.”—Truth in Translation: Accuracy and Bias in English Translations of the New Testament.</span></span><span data-dcnode-id="136" instrument_node="">
</span></div><span data-dcnode-id="134" instrument_node="">
</span><div class="clear" data-dcnode-id="133"></div><span data-dcnode-id="132" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="111" data-version="1" id="Image90"><span data-dcnode-id="130" instrument_node="">
</span><h2 data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">The Non-Christian Cross</span></h2><span data-dcnode-id="127" instrument_node="">
</span><div class="widget-content" data-dcnode-id="115"><span data-dcnode-id="126" instrument_node="">
</span><a data-dcnode-id="122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3DNn65az9Zc7oC%26printsec%3Dfrontcover%26dq%3Dthe%2Bnon%2Bchristian%2Bcross%26source%3Dbl%26ots%3DNSlg7pJXpJ%26sig%3DLhYob3SVSZ9pAdUubPCgc6O2nl0%26hl%3Den%26ei%3DiRktTczuMoS4sQOrp7WBBw%26sa%3DX%26oi%3Dbook_result%26ct%3Dresult%26resnum%3D4%26ved%3D0CC8Q6AEwAw%23v%3Donepage%26q%26f%3Dfalse"><span data-dcnode-id="125" instrument_node="">
</span><img alt="The Non-Christian Cross" data-dcnode-id="124" height="237" id="Image90_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TS0an_-bTFI/AAAAAAAAHmQ/ZXWDQj0QYXk/S1600-R/214133303.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="123" instrument_node="">
</span></a><span data-dcnode-id="121" instrument_node="">
</span><br data-dcnode-id="120"><span data-dcnode-id="119" instrument_node="">
</span><span class="caption" data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">The book The Non-Christian Cross, by J. D. Parsons (London, 1896), says: “There is not a single sentence in any of the numerous writings forming the New Testament, which, in the original Greek, bears even indirect evidence to the effect that the stauros used in the case of Jesus was other than an ordinary stauros; much less to the effect that it consisted, not of one piece of timber, but of two pieces nailed together in the form of a cross.</span></span><span data-dcnode-id="116" instrument_node="">
</span></div><span data-dcnode-id="114" instrument_node="">
</span><div class="clear" data-dcnode-id="113"></div><span data-dcnode-id="112" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="91" data-version="1" id="Image91"><span data-dcnode-id="110" instrument_node="">
</span><h2 data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">The Works of Josephus</span></h2><span data-dcnode-id="107" instrument_node="">
</span><div class="widget-content" data-dcnode-id="95"><span data-dcnode-id="106" instrument_node="">
</span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sacred-texts.com/jud/josephus/index.htm"><span data-dcnode-id="105" instrument_node="">
</span><img alt="The Works of Josephus" data-dcnode-id="104" height="224" id="Image91_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/S-nXdIVpYGI/AAAAAAAAD6w/oA1W8VnlygQ/S240/9780913573860lrg.jpg&amp;raw" width="150"><span data-dcnode-id="103" instrument_node="">
</span></a><span data-dcnode-id="101" instrument_node="">
</span><br data-dcnode-id="100"><span data-dcnode-id="99" instrument_node="">
</span><span class="caption" data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">This renowned reference book has served scholars, pastors, students, and those interested in the background of the New Testament for years. The insight given into the Essene community, the destruction of Jerusalem and the interpretations and traditions of the Old Testament in first century Judaism is invaluable. The outlook of Josephus, a late first century Pharisee and historian, on Jesus and the New Testament documents is enlightening and provocative. As an original reference, The Works of Josephus is essential to a full understanding of the first century, the time of Christ and the New Testament.</span></span><span data-dcnode-id="96" instrument_node="">
</span></div><span data-dcnode-id="94" instrument_node="">
</span><div class="clear" data-dcnode-id="93"></div><span data-dcnode-id="92" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="71" data-version="1" id="Image89"><span data-dcnode-id="90" instrument_node="">
</span><h2 data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">The Two Babylons</span></h2><span data-dcnode-id="87" instrument_node="">
</span><div class="widget-content" data-dcnode-id="75"><span data-dcnode-id="86" instrument_node="">
</span><a data-dcnode-id="82" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//philologos.org/__eb-ttb/"><span data-dcnode-id="85" instrument_node="">
</span><img alt="The Two Babylons" data-dcnode-id="84" height="228" id="Image89_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/S-nHEtq-VvI/AAAAAAAAD5A/e_0pAXtn8VU/S240/045.jpg&amp;raw" width="150"><span data-dcnode-id="83" instrument_node="">
</span></a><span data-dcnode-id="81" instrument_node="">
</span><br data-dcnode-id="80"><span data-dcnode-id="79" instrument_node="">
</span><span class="caption" data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">The thesis of this book is that Roman Catholicism is--to use the words of the author--"baptised paganism". The author states that the Roman Catholic Church, with its doctrines, organization, and practices, is simply a continuation of the ancient Babylonian "Mystery" religion built around the worship of Nimrod, his wife Semiramis, and the child Tammuz. He further states that the prophetic "Whore of Babylon" described in Revelation 17 and 18 is none other than the great false church of the Tribulation: the Roman Catholic Church. The thesis is startling and provocative.</span></span><span data-dcnode-id="76" instrument_node="">
</span></div><span data-dcnode-id="74" instrument_node="">
</span><div class="clear" data-dcnode-id="73"></div><span data-dcnode-id="72" instrument_node="">
