</span><p class="description" data-dcnode-id="5138"><span data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Charles T. Russell was the founder of Zion's Watch Tower in 1879 and the Watch Tower Society in 1881. He was NOT the founder of Jehovah’s Witnesses nor of any of the current Russellite sects. After his death in 1916 many Bible Students did not want to support the new leadership, they wanted to stay frozen in time with only Russell's teachings. Others, wanted to work with the new president and make changes, so in 1931 they embraced the new name Jehovah’s Witnesses. See JW.ORG </span></span></p><span data-dcnode-id="5137" instrument_node="">

</span><h2 class="date-header" data-dcnode-id="4952"><span data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">Monday, January 5, 2009</span></span></h2><span data-dcnode-id="4951" instrument_node="">
</span><div class="date-posts" data-dcnode-id="4810"><span data-dcnode-id="4950" instrument_node="">
</span><div class="post-outer" data-dcnode-id="4812"><span data-dcnode-id="4949" instrument_node="">
</span><div class="post hentry" data-dcnode-id="4819"><span data-dcnode-id="4948" instrument_node="">
</span><a data-dcnode-id="4947" name="8097368303921581198"></a><span data-dcnode-id="4946" instrument_node="">
</span><h3 class="post-title entry-title" data-dcnode-id="4944"><span data-dcnode-id="4945" instrument_node="">
The Bible House (1889 - 1909)
</span></h3><span data-dcnode-id="4943" instrument_node="">
</span><div class="post-header" data-dcnode-id="4939"><span data-dcnode-id="4942" instrument_node="">
</span><div class="post-header-line-1" data-dcnode-id="4941"></div><span data-dcnode-id="4940" instrument_node="">
</span></div><span data-dcnode-id="4938" instrument_node="">
</span><div class="post-body entry-content" data-dcnode-id="4850" id="post-body-8097368303921581198"><span data-dcnode-id="4937" instrument_node="">
</span><a data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ZWzi77SQ8N0/TvVAjehHc3I/AAAAAAAAK8I/3LZVUxC4lho/s1600/Bible%252BHouse%252B-%252Bcomposite%252B-%252Bretouched%252B-%252B1200%252Bdpi.jpg"><img alt="" border="0" data-dcnode-id="4936" id="BLOGGER_PHOTO_ID_5689524682484052850" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ZWzi77SQ8N0/TvVAjehHc3I/AAAAAAAAK8I/3LZVUxC4lho/s320/Bible%252BHouse%252B-%252Bcomposite%252B-%252Bretouched%252B-%252B1200%252Bdpi.jpg&amp;raw" style="MARGIN: 0px 0px 10px 10px; WIDTH: 243px; FLOAT: right; HEIGHT: 320px; CURSOR: hand"></a><span data-dcnode-id="4934" instrument_node="">Headquarters at the Bible House</span><br data-dcnode-id="4933"><br data-dcnode-id="4932"><span data-dcnode-id="4931" instrument_node="">The Bible Students in Allegheny, associated with the publishing of the Watch Tower, were considered the most experienced in doing the Lord’s work and were looked to by all the ecclesias, or congregations, as those taking the lead. At first they had headquarters offices at 101 Fifth Avenue, Pittsburgh, and later at 44 Federal Street, Allegheny. In the late 1880’s, however, expansion became necessary. So Russell arranged to build larger facilities. In 1889 a four-story brick building at 56-60 Arch Street, Allegheny, was completed. Valued at $34,000, it was known as the Bible House. It served as the Society’s headquarters for some 19 [20] years.</span><br data-dcnode-id="4930"><br data-dcnode-id="4929"><span data-dcnode-id="4928" instrument_node="">As of 1890, the small Bible House family was serving the needs of several hundred active associates of the Watch Tower Society. But as the decade of the 1890’s progressed, more showed interest in what these were doing. In fact, according to an incomplete report published in the Watch Tower, on March 26, 1899, the Memorial of Christ’s death was observed at 339 separate meetings with 2,501 participants. What, though, would help to keep the growing number</span><br data-dcnode-id="4927"><span data-dcnode-id="4926" instrument_node="">of Bible Students united?. . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .</span><br data-dcnode-id="4925"><br data-dcnode-id="4924"><span data-dcnode-id="4923" instrument_node="">Moving to Brooklyn</span><br data-dcnode-id="4922"><br data-dcnode-id="4921"><span data-dcnode-id="4920" instrument_node="">As the newspaper preaching gained momentum, the Bible Students looked for another location from which to originate the sermons. Why? The Bible House in Allegheny had become too small. It was also thought that if Russell’s sermons emanated from a larger, better-known city, it would result in the publication of the sermons in more newspapers. But which city? The Watch Tower of December 15, 1908, explained: “Altogether we concluded, after seeking Divine guidance, that Brooklyn, N.Y., with a large population of the middle class, and known as ‘The City of Churches,’ would, for these reasons, be our most suitable center for the harvest work during the few remaining years.”</span><br data-dcnode-id="4919"><br data-dcnode-id="4918"><span data-dcnode-id="4917" instrument_node="">In 1908, therefore, several representatives of the Watch Tower Society, including its legal counsel, Joseph F. Rutherford, were sent to New York City. Their objective? To secure property that C. T. Russell had located on an earlier trip. They purchased the old “Plymouth Bethel,” located at 13-17 Hicks Street, Brooklyn. It had served as a mission structure for the nearby Plymouth Congregational Church, where Henry Ward Beecher once served as pastor. The Society’s representatives also purchased Beecher’s former residence, a four-story brownstone at 124 Columbia Heights, a few blocks away.</span><br data-dcnode-id="4916"><br data-dcnode-id="4915"><span data-dcnode-id="4914" instrument_node="">The Hicks Street building was remodeled and named the Brooklyn Tabernacle. It housed the Society’s offices and an auditorium. After considerable repairs, Beecher’s former residence at 124 Columbia Heights became the new home of the Society’s headquarters staff. What would it be called? The Watch Tower of March 1, 1909, explained: “The new home we shall call ‘Bethel’ [meaning, “House of God”].”</span><br data-dcnode-id="4913"><br data-dcnode-id="4912"><span data-dcnode-id="4911" instrument_node="">“Newspaper gospelling,” as it was called, gained momentum after the move to Brooklyn. But it was not the only way of reaching masses of people.</span><br data-dcnode-id="4910"><br data-dcnode-id="4909"><strong data-dcnode-id="4906"><span data-dcnode-id="4908" instrument_node="">- Jehovah’s Witnesses—Proclaimers of God’s Kingdom, WTB&amp;TS</span><br data-dcnode-id="4907"></strong><span data-dcnode-id="4905" instrument_node="">____________________________</span><br data-dcnode-id="4904"><br data-dcnode-id="4903"><a data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/--pnGjEjQ1MU/TvVBk6_H9WI/AAAAAAAAK8g/PWsSAShrEdY/s1600/G19%252B-%252B1907%25252C%252BAugust%252B-%252BBible%252BHouse%252BFamily.jpg"><img alt="" border="0" data-dcnode-id="4902" id="BLOGGER_PHOTO_ID_5689525806817604962" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/--pnGjEjQ1MU/TvVBk6_H9WI/AAAAAAAAK8g/PWsSAShrEdY/s320/G19%252B-%252B1907%25252C%252BAugust%252B-%252BBible%252BHouse%252BFamily.jpg&amp;raw" style="float:right; margin:0 0 10px 10px;cursor:pointer; cursor:hand;width: 320px; height: 230px;"></a><span data-dcnode-id="4900" instrument_node="">The Bible Students had headquarters offices first at 101 Fifth Avenue, Pittsburgh, and thereafter at 44 Federal Street, Allegheny, Pennsylvania. By the late 1880’s, however, the accelerating work of publishing the good news and gathering sheeplike ones made expansion a necessity. So, Jehovah’s people built their own structure. Completed in 1889 at a cost of $34,000, this four-story brick building situated at 56-60 (later renumbered 610-614) Arch Street, Allegheny, was known as the “Bible House.” Originally it was held in title by the Tower Publishing Company, a private concern managed by C. T. Russell that for some years published literature for the Watch Tower Society at an agreed price. In April 1898, ownership of this plant and real estate was transferred by donation to the Watch Tower Society, its board of directors evaluating the structure and equipment at $164,033.65.</span><br data-dcnode-id="4899"><br data-dcnode-id="4898"><span data-dcnode-id="4897" instrument_node="">The Bible House served as the Society’s headquarters for some twenty years.</span><br data-dcnode-id="4896"><br data-dcnode-id="4895"><span data-dcnode-id="4894" instrument_node="">“What was it like at the Bible House in 1907?” asks Ora Sullivan Wakefield. Answering her own query, she says, in part: “There were only thirty of us in the ‘family’ and being small it was truly a family. . . . We all ate, slept, worked and worshipped in that one building. The chapel also had a place for baptism under the platform.”</span><br data-dcnode-id="4893"><br data-dcnode-id="4892"><span data-dcnode-id="4891" instrument_node="">Just think of it! Back in 1890 there were only about four hundred active associates of the Watch Tower Society. But Jehovah’s holy spirit was at work and was producing fine results. (Zech. 4:6, 10) Accordingly, the 1890’s were times of increase. In fact, hundreds gathered, on March 26, 1899, to memorialize the death of Jesus Christ, an incomplete report citing 339 groups with 2,501 participants. Indeed, sheeplike ones were flocking ‘into the pen.’—Mic. 2:12.</span><br data-dcnode-id="4890"><br data-dcnode-id="4889"><span data-dcnode-id="4888" instrument_node="">Growth of the preaching work had been spurred on by. C. T. Russell’s trip abroad in 1891. This 17,000-mile journey took him and his party to Europe, Asia and Africa. Thereafter a publications depot was set up in London. Also, arrangements were made to publish the Society’s literature in German, French, Swedish, Dano-Norwegian, Polish, Greek and, later, in Italian.</span><br data-dcnode-id="4887"><br data-dcnode-id="4886"><strong data-dcnode-id="4883"><span data-dcnode-id="4885" instrument_node="">- 1975 Yearbook of Jehovah's Witnesses, WTB&amp;TS</span><br data-dcnode-id="4884"></strong><span data-dcnode-id="4882" instrument_node="">___________________</span><br data-dcnode-id="4881"><br data-dcnode-id="4880"><span data-dcnode-id="4879" instrument_node="">By end of the ‘80’s they had outgrown the quarters at 151 Robinson Street (earlier designated as 44, and then 40, Federal Street), Allegheny, Pennsylvania. They decided to build, and in 1889 they moved into their own large, handsome four-story brick structure costing $34,000, located at 58 and 60 (later renumbered as 610-614) Arch Street, Allegheny (North Side, Pittsburgh), containing quarters for a small “Bible House family,” printing works, shipping rooms, an assembly place for about 200, an office, an editorial department and a store front. They named it “Bible House.” Years later, the Society’s board of directors accepted the donation of title to this plant, the board valuing the building’s net equity and all of its equipment at $164,033.65.</span><br data-dcnode-id="4878"><br data-dcnode-id="4877"><strong data-dcnode-id="4874"><span data-dcnode-id="4876" instrument_node="">- Feb. 1, 1955 Watchtower, WTB&amp;TS</span><br data-dcnode-id="4875"></strong><span data-dcnode-id="4873" instrument_node="">__________________________</span><br data-dcnode-id="4872"><br data-dcnode-id="4871"><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-pKEgJAJq18I/TvVBJ8i6gpI/AAAAAAAAK8U/5dRpk6Ccyag/s1600/2009_1_14a-001.jpg"><img alt="" border="0" data-dcnode-id="4870" id="BLOGGER_PHOTO_ID_5689525343379686034" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-pKEgJAJq18I/TvVBJ8i6gpI/AAAAAAAAK8U/5dRpk6Ccyag/s320/2009_1_14a-001.jpg&amp;raw" style="MARGIN: 0px 0px 10px 10px; WIDTH: 221px; FLOAT: right; HEIGHT: 320px; CURSOR: hand"></a><span data-dcnode-id="4868" instrument_node="">But to undertake an all-out campaign of world-wide proportions the Society’s twenty-year-old four-story “Bible House” headquarters in Allegheny (Pittsburgh), Pennsylvania, had become inadequate, besides being not strategically located for world shipping and communication. So in 1908 representatives of the Society, including its legal counselor, J. F. Rutherford, were sent to Brooklyn, New York, to negotiate the purchase of more desirable quarters. Those quarters Russell himself had found on an earlier trip to New York. They bought the old “Plymouth Bethel,” a mission structure completed in 1868 for nearby Plymouth Congregational Church. This mission, at 13-17 Hicks Street, Brooklyn, had long been used in connection with Plymouth Church (built in 1849 on Orange Street, near Hicks) where about half a century earlier antislavery sermons were preached by the noted Brooklyn clergyman, Henry Ward Beecher. They also purchased the old Beecher residence at 124 Columbia Heights, Brooklyn, where other notables, even Abraham Lincoln, are said to have conferred with Beecher in the 1860’s. On January 31, 1909, some 350 attended the dedication of the Brooklyn Tabernacle, the new name for the now-renovated former “Plymouth Bethel.” Its second-floor auditorium, seating 800, gleamed in soft color, olive green prevailing, with tastefully artistic Bible-text wall decorations. The street floor was altered to be the Society’s headquarters operating office. The large basement floor had been turned into a small printery, stock and shipping departments. Soon, too, the home at 124 Columbia Heights had been readied for occupancy by more than thirty full-time members of the headquarters staff. “The new home we shall call ‘Bethel,’ and the new office and auditorium, ‘The Brooklyn Tabernacle’; these names will supplant the term ‘Bible House.’” By 1911 a spacious new dormitory addition had been completed, adjoining the rear of Bethel and fronting on Furman Street, further enlarging the facilities.</span><br data-dcnode-id="4867"><br data-dcnode-id="4866"><strong data-dcnode-id="4862"><span data-dcnode-id="4865" instrument_node="">- March 1, 1955 Watchtower, WTB&amp;TS</span><br data-dcnode-id="4864"><br data-dcnode-id="4863"></strong><span data-dcnode-id="4861" instrument_node="">Additional Reading: </span><a data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/brooklyn-bethel100-years-of-history.html"><span data-dcnode-id="4860" instrument_node="">http://pastorrussell.blogspot.com/2010/04/brooklyn-bethel100-years-of-history.html</span></a><br data-dcnode-id="4858"><br data-dcnode-id="4857"><span data-dcnode-id="4856" instrument_node="">Additional Reading: </span><a data-dcnode-id="4854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/opening-at-brooklyn.html"><span data-dcnode-id="4855" instrument_node="">http://pastorrussell.blogspot.com/2010/06/opening-at-brooklyn.html</span></a><span data-dcnode-id="4853" instrument_node="">

</span><dd class="profile-textblock" data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">I am not affiliated with any of the current Russellite sects, these factions are not the same as the Bible Students from Pastor Russell's day. These are mostly small insignificant groups that most people know nothing about. Unlike the Jehovah's Witnesses, who now number over 8,200,000 members worldwide. Nor do I support any of the apostate sites. Being in a room with disgruntled fault-finders can get old really fast. The information on this blog will deal with Charles Taze Russell and early Watchtower history. Because Russell was friends with former Advent Christians (not the Seventh-day Adventist Church) information about the 1831 - 44 Millerite movement is included in this blog, however Charles Russell was never a Millerite nor an Adventist. Links are offered for additional reading, however I do not support every comment on these sites. The majority of information on this blog was published by others all credit goes to them for the data. Even if I do not support some of Pastor Russell's outdated views, I still appreciate that he was an imperfect man of God, who spent his entire life and wealth in the Lord's service.

</span><h2 data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">New World Translation (NWT)</span></h2><span data-dcnode-id="3788" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3776"><span data-dcnode-id="3787" instrument_node="">
</span><a data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jw.org/en/publications/bible/"><span data-dcnode-id="3786" instrument_node="">
</span><img alt="New World Translation (NWT)" data-dcnode-id="3785" height="233" id="Image18_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-1nGt5q6LuH0/ThEUWuYLrMI/AAAAAAAAJLo/s29X_DSgTsQ/s253/z170352418.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="3784" instrument_node="">
</span></a><span data-dcnode-id="3782" instrument_node="">
</span><br data-dcnode-id="3781"><span data-dcnode-id="3780" instrument_node="">
</span><span class="caption" data-dcnode-id="3778"><span data-dcnode-id="3779" instrument_node="">Criticisms of the New World Translation should not be surprising. In Jesus' day, he and his followers were the object of criticism, ridicule and abuse. This was more often than not from religious leaders and men. Those who were 'looked up to' and respected as being learned men.(Jn.7:45-49) Likewise today Jehovah's Witnesses are sometimes the object of criticism, ridicule and abuse. Not least their New World Translation of the Holy Scriptures. This does not mean that any scholar or interested person should not be able to take issue with the renderings as found in the New World Translation or any other translation. This clearly should not be the case. But it behoves those that do so to do so in a manner that is an effort to seek out the truth and in a way that is scholarly, honest and fair.</span></span><span data-dcnode-id="3777" instrument_node="">
</span></div><span data-dcnode-id="3775" instrument_node="">

</span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/dates-of-significance.html"><span data-dcnode-id="3746" instrument_node="">
</span><img alt="Dates of significance in WT history from 1868 - 1918" data-dcnode-id="3745" height="281" id="Image56_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TRzo7oQpNXI/AAAAAAAAHek/jZtpoPjw38M/S1600-R/1917calendar.jpg&amp;raw" style="visibility: visible;" width="192"><span data-dcnode-id="3744" instrument_node="">

</span></div><div class="widget Image" data-dcnode-id="3715" data-version="1" id="Image39"><span data-dcnode-id="3734" instrument_node="">
</span><h2 data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">Early Watch Tower History (1868 - 1906)</span></h2><span data-dcnode-id="3731" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3719"><span data-dcnode-id="3730" instrument_node="">
</span><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/light-out-of-darkness.html"><span data-dcnode-id="3729" instrument_node="">
</span><img alt="Early Watch Tower History (1868 - 1906)" data-dcnode-id="3728" height="253" id="Image39_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-OPbLIhwD8bY/ThETlDlGBnI/AAAAAAAAJLI/3CCITghbFis/s253/photo%252Bof%252Byoung%252BCharles%252BTaze%252BRussell.jpg&amp;raw" style="visibility: visible;" width="192"><span data-dcnode-id="3727" instrument_node="">
</span></a><span data-dcnode-id="3725" instrument_node="">
</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">
</span><span class="caption" data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">The following history is given not merely because I have been urged to give a review of God's leadings in the path of light, but specially because I believe it to be needful that the truth be modestly told, that misapprehensions and prejudicial misstatements may be disarmed, and that our readers may see how hitherto the Lord has helped and guided. In so far as the names and views of others, who have parted our company, may be associated with this history, I shall endeavor to bring forward only such points as are necessary to an understanding of our position and of the Lord's leadings. Nor can I name all the little points of divine favor in which faith was tested, prayers were answered, etc., remembering that our Master and the early Church left no such example of boasting faith, but rather admonished otherwise, saying, "Hast thou faith? have it to thyself." Some of the most precious experiences of faith and prayer are those which are too sacred for public display.</span></span><span data-dcnode-id="3720" instrument_node="">
</span></div><span data-dcnode-id="3718" instrument_node="">
</span><div class="clear" data-dcnode-id="3717"></div><span data-dcnode-id="3716" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3695" data-version="1" id="Image150"><span data-dcnode-id="3714" instrument_node="">
</span><h2 data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Watch Tower Society Incorporated  in 1884</span></h2><span data-dcnode-id="3711" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3699"><span data-dcnode-id="3710" instrument_node="">
</span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/wtch-tower-society-incorported.html"><span data-dcnode-id="3709" instrument_node="">
</span><img alt="Watch Tower Society Incorporated  in 1884" data-dcnode-id="3708" height="264" id="Image150_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-UBVDFXrRAjU/TztCs0UUxEI/AAAAAAAALMM/fJ4NqywnsoQ/s1600/Russell%252527s%252Bold%252Bstore%252Bon%252BFederal%252BSt..jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="3707" instrument_node="">
</span></a><span data-dcnode-id="3705" instrument_node="">
</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">
</span><span class="caption" data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">The first office of the Watch Tower Society after Incorporation in 1884 was in a building at the corner of Federal and Robinson Streets, Pittsburgh, Pennsylvania, the location from which Charles T. Russell had earlier directed his chain of clothing stores.</span></span><span data-dcnode-id="3700" instrument_node="">
</span></div><span data-dcnode-id="3698" instrument_node="">
</span><div class="clear" data-dcnode-id="3697"></div><span data-dcnode-id="3696" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3675" data-version="1" id="Image114"><span data-dcnode-id="3694" instrument_node="">
</span><h2 data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">The Bible House (1889 - 1909)</span></h2><span data-dcnode-id="3691" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3679"><span data-dcnode-id="3690" instrument_node="">
</span><a data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/01/bible-house.html"><span data-dcnode-id="3689" instrument_node="">
</span><img alt="The Bible House (1889 - 1909)" data-dcnode-id="3688" height="253" id="Image114_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-uRGvJN8v0RY/TodUG2T0M-I/AAAAAAAAJ9k/Cssp-UoMaaM/s253/Bible%252BHouse.jpg&amp;raw" style="visibility: visible;" width="189"><span data-dcnode-id="3687" instrument_node="">
</span></a><span data-dcnode-id="3685" instrument_node="">
</span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">
</span><span class="caption" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">The Bible Students in Allegheny, associated with the publishing of the Watch Tower, were considered the most experienced in doing the Lord’s work and were looked to by all the ecclesias, or congregations, as those taking the lead. At first they had headquarters offices at 101 Fifth Avenue, Pittsburgh, and later at 44 Federal Street, Allegheny. In the late 1880’s, however, expansion became necessary. So Russell arranged to build larger facilities. In 1889 a four-story brick building at 56-60 Arch Street, Allegheny, was completed. Valued at $34,000, it was known as the Bible House. It served as the Society’s headquarters for some 19 [20] years.</span></span><span data-dcnode-id="3680" instrument_node="">
</span></div><span data-dcnode-id="3678" instrument_node="">
</span><div class="clear" data-dcnode-id="3677"></div><span data-dcnode-id="3676" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3655" data-version="1" id="Image95"><span data-dcnode-id="3674" instrument_node="">
</span><h2 data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">The Opening at Brooklyn (1909)</span></h2><span data-dcnode-id="3671" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3659"><span data-dcnode-id="3670" instrument_node="">
</span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/opening-at-brooklyn.html"><span data-dcnode-id="3669" instrument_node="">
</span><img alt="The Opening at Brooklyn (1909)" data-dcnode-id="3668" height="253" id="Image95_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-9bxXIYpeerQ/ThEetQYPuZI/AAAAAAAAJQI/FMDjxKOrh84/s253/2009_1_14a.jpg&amp;raw" style="visibility: visible;" width="168"><span data-dcnode-id="3667" instrument_node="">
</span></a><span data-dcnode-id="3665" instrument_node="">
</span><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">
</span><span class="caption" data-dcnode-id="3661"><span data-dcnode-id="3662" instrument_node="">The friends of the New York City congregation, those of Brooklyn and those of Jersey City, all voted their unanimous desire to be parts of the Ecclesia whose home will be at the "Brooklyn Tabernacle," and unanimously elected Brother C. T. Russell Pastor of the same.</span></span><span data-dcnode-id="3660" instrument_node="">
</span></div><span data-dcnode-id="3658" instrument_node="">
</span><div class="clear" data-dcnode-id="3657"></div><span data-dcnode-id="3656" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3635" data-version="1" id="Image104"><span data-dcnode-id="3654" instrument_node="">
</span><h2 data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Brooklyn Bethel 100 years of History (1909 - 2009)</span></h2><span data-dcnode-id="3651" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3639"><span data-dcnode-id="3650" instrument_node="">
</span><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/brooklyn-bethel100-years-of-history.html"><span data-dcnode-id="3649" instrument_node="">
</span><img alt="Brooklyn Bethel 100 years of History (1909 - 2009)" data-dcnode-id="3648" height="190" id="Image104_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-X56GC0DODSM/ThEcXM0on4I/AAAAAAAAJPY/cjHORTIGar4/s253/WatchtowerBuildings.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="3647" instrument_node="">
</span></a><span data-dcnode-id="3645" instrument_node="">
</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">
</span><span class="caption" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Why Brooklyn? Russell said: “Altogether we concluded, after seeking Divine guidance, that Brooklyn, N.Y., with a large population . . . and known as ‘The City of Churches,’ would, for these reasons, be our most suitable center for the harvest work.” The results speak for themselves. In a short space of time, 2,000 newspapers were publishing Russell’s sermons.</span></span><span data-dcnode-id="3640" instrument_node="">
</span></div><span data-dcnode-id="3638" instrument_node="">
</span><div class="clear" data-dcnode-id="3637"></div><span data-dcnode-id="3636" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3615" data-version="1" id="Image44"><span data-dcnode-id="3634" instrument_node="">
</span><h2 data-dcnode-id="3632"><span data-dcnode-id="3633" instrument_node="">Russell's Final Journey - 1916</span></h2><span data-dcnode-id="3631" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3619"><span data-dcnode-id="3630" instrument_node="">
</span><a data-dcnode-id="3626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/pastor-russells-final-journey.html"><span data-dcnode-id="3629" instrument_node="">
</span><img alt="Russell's Final Journey - 1916" data-dcnode-id="3628" height="190" id="Image44_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TGCAO3OVnsI/AAAAAAAAEnw/30179zbIAHE/S1600-R/PG014_op_800x598x.jpg&amp;raw" width="253"><span data-dcnode-id="3627" instrument_node="">
</span></a><span data-dcnode-id="3625" instrument_node="">
</span><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">
</span><span class="caption" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Realizing that his severe condition would not allow him to go on, Russell decided to cancel the rest of his speaking appointments and return quickly to the Bethel home in Brooklyn. On Tuesday, October 31, C. T. Russell was on the verge of death. At Panhandle, Texas, a physician summoned earlier by telegraph temporarily boarded the train and observed Russell’s condition, recognizing the critical symptoms. Then the train was under way again. Shortly thereafter, in early afternoon of Tuesday, October 31, 1916, sixty-four-year-old Charles Taze Russell died at Pampa, Texas.</span></span><span data-dcnode-id="3620" instrument_node="">
</span></div><span data-dcnode-id="3618" instrument_node="">
</span><div class="clear" data-dcnode-id="3617"></div><span data-dcnode-id="3616" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3595" data-version="1" id="Image144"><span data-dcnode-id="3614" instrument_node="">
</span><h2 data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">October 31, 1916 (The death of Charles Taze Russell)</span></h2><span data-dcnode-id="3611" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3599"><span data-dcnode-id="3610" instrument_node="">
</span><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/93-years-ago-today.html"><span data-dcnode-id="3609" instrument_node="">
</span><img alt="October 31, 1916 (The death of Charles Taze Russell)" data-dcnode-id="3608" height="206" id="Image144_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/--godFtM9jRA/ThEcyUY1a0I/AAAAAAAAJPg/fNyPZWjJ7ho/s253/Br%252BRussell%252527s%252Bfuneral%252Bnews%252Bclippings%252B%252526%252Btombstone.jpg&amp;raw" width="253"><span data-dcnode-id="3607" instrument_node="">
</span></a><span data-dcnode-id="3605" instrument_node="">
</span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">
</span><span class="caption" data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">He was President of the WATCH TOWER BIBLE AND TRACT SOCIETY from its organization in 1884 until his death. He was also President of the PEOPLES PULPIT ASSOCIATION, organized in 1909, and the INTERNATIONAL BIBLE STUDENTS ASSOCIATION, incorporated in London, in 1913, both of the latter corporations being adjuncts to the WATCH TOWER BIBLE AND TRACT SOCIETY. Through these religious corporations, as well as by word of mouth, he promulgated the Gospel of Messiah's Kingdom. He was the author of the following publications, issued between the years 1881 and 1914, each having phenomenal circulation, as given below:</span></span><span data-dcnode-id="3600" instrument_node="">
</span></div><span data-dcnode-id="3598" instrument_node="">
</span><div class="clear" data-dcnode-id="3597"></div><span data-dcnode-id="3596" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3575" data-version="1" id="Image178"><span data-dcnode-id="3594" instrument_node="">
</span><h2 data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Pastor Russell's Writings</span></h2><span data-dcnode-id="3591" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3579"><span data-dcnode-id="3590" instrument_node="">
</span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/07/pastor-russells-writings.html"><span data-dcnode-id="3589" instrument_node="">
</span><img alt="Pastor Russell's Writings" data-dcnode-id="3588" height="253" id="Image178_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-7xvy2x5zxEs/ThEWKCZisJI/AAAAAAAAJMg/mGw0K_gsfgE/s253/P-10.jpg&amp;raw" style="visibility: visible;" width="193"><span data-dcnode-id="3587" instrument_node="">
</span></a><span data-dcnode-id="3585" instrument_node="">
</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">
</span><span class="caption" data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">"His writings are said to have greater newspaper circulation every week than those of any other living man; a greater, doubtless, than the combined circulation of the writings of all the priests and preachers in North America; greater even than the work of Arthur Brisbane, Norman Hapgood, George Horace Lorimer, Dr. Frank Crane, Frederick Haskins, and a dozen other of the best known editors and syndicate writers put together."</span></span><span data-dcnode-id="3580" instrument_node="">

</span><h2 data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">Change in administration after Russell's death (1916/17)</span></h2><span data-dcnode-id="3571" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3559"><span data-dcnode-id="3570" instrument_node="">
</span><a data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/change-in-administration.html"><span data-dcnode-id="3569" instrument_node="">
</span><img alt="Change in administration after Russell's death (1916/17)" data-dcnode-id="3568" height="190" id="Image47_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-YxyrgeyFI7o/ThEdU8Qv_9I/AAAAAAAAJPo/qfxHdiLfiLk/s253/b603_12_sb.jpg&amp;raw" width="253"><span data-dcnode-id="3567" instrument_node="">
</span></a><span data-dcnode-id="3565" instrument_node="">
</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">
</span><span class="caption" data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">In his will Brother Russell outlined an arrangement for an Editorial Committee of five to determine the contents of The Watch Tower. In addition, the board of directors of the Watch Tower Bible and Tract Society made arrangements for an Executive Committee of three—A. I. Ritchie, W. E. Van Amburgh, and J. F. Rutherford—to have general supervision of all the work of the Society, subject to the control of the board of directors. Who, though, would become the new president? That decision would be made at the next annual meeting of the Society, about two months later, on January 6, 1917.</span></span><span data-dcnode-id="3560" instrument_node="">
</span></div><span data-dcnode-id="3558" instrument_node="">

</span><h2 data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">How we came to be known as Jehovah's Witnesses (1931)</span></h2><span data-dcnode-id="3551" instrument_node="">

</span><img alt="How we came to be known as Jehovah's Witnesses (1931)" data-dcnode-id="3548" height="253" id="Image38_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-E8LOYgXSvFI/ThiTUXuZOPI/AAAAAAAAJag/65EzZKoIc4k/s253/1993book.jpg&amp;raw" style="visibility: visible;" width="192"><span data-dcnode-id="3547" instrument_node="">
</span></a><span data-dcnode-id="3545" instrument_node="">

</span><span class="caption" data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">In time, it became increasingly evident that in addition to the designation Christian, the congregation of Jehovah’s servants truly did need a distinctive name. The meaning of the name Christian had become distorted in the public mind because people who claimed to be Christians often had little or no idea who Jesus Christ was, what he taught, and what they should be doing if they really were his followers. Additionally, as our brothers progressed in their understanding of God’s Word, they clearly saw the need to be separate and distinct from those religious systems that fraudulently claimed to be Christian.</span></span><span data-dcnode-id="3540" instrument_node="">

</span></a><span data-dcnode-id="3465" instrument_node="">
</span><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node="">
</span><span class="caption" data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">KNOCKING opens the door on Jehovah's Witnesses. They are moral conservatives who stay out of politics and the Culture War, but they won a record number of court cases expanding freedom for everyone. They refuse blood transfusions on religious grounds, but they embrace the science behind bloodless surgery. In Nazi Germany, they could fight for Hitler or go to the concentration camps. They chose the camps. Following two families who stand firm for their controversial and misunderstood Christian faith, KNOCKING reveals how one unlikely religion helped to shape history beyond the doorstep.</span></span><span data-dcnode-id="3460" instrument_node="">

</span></a><span data-dcnode-id="3405" instrument_node="">
</span><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">
</span><span class="caption" data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">A conference of religious leaders in Spain noted this: “Perhaps [the churches] are excessively neglectful about that which precisely constitutes the greatest preoccupation of the Witnesses—the home visit, which comes within the apostolic methodology of the primitive church. While the churches, on not a few occasions, limit themselves to constructing their temples, ringing their bells to attract the people and to preaching inside their places of worship, [the&nbsp;Witnesses] follow the apostolic tactic of going from house&nbsp;to&nbsp;house and of taking advantage of every occasion to&nbsp;witness.”—El Catolicismo, Bogotá, Colombia, September&nbsp;14, 1975, p.&nbsp;14.</span></span><span data-dcnode-id="3400" instrument_node="">

</span><h2 data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">'Upon the Watchtower I Am Standing'</span></h2><span data-dcnode-id="3391" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3379"><span data-dcnode-id="3390" instrument_node="">
</span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/upon-watchtower-i-am-standing.html"><span data-dcnode-id="3389" instrument_node="">
</span><img alt="'Upon the Watchtower I Am Standing'" data-dcnode-id="3388" height="197" id="Image101_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TQp16CSoc-I/AAAAAAAAHW4/fGXj3Cj35Hk/S1600-R/JW_1907_WT.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="3387" instrument_node="">
</span></a><span data-dcnode-id="3385" instrument_node="">
</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">
</span><span class="caption" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Picture in your mind a watchman stationed on a high tower, bending forward, scanning the horizon during the daylight, straining to pierce the darkness during the night—always on the alert. You now have the main idea conveyed by the Hebrew word for “watchtower” (mits‧peh′) as used in Isaiah 21:8. Since the watchman is so vigilant, who in his right mind would doubt his ringing report? Likewise today, the watchman class has exerted itself by searching through the Scriptures to see what Jehovah has in store for this system of things. (James 1:25) This watchman then calls out that message loudly and fearlessly, principally through the pages of The Watchtower. (Compare Amos 3:4, 8.) This magazine will never shrink in fear from championing the truth!—Isaiah 43:9, 10.</span></span><span data-dcnode-id="3380" instrument_node="">
</span></div><span data-dcnode-id="3378" instrument_node="">
</span><div class="clear" data-dcnode-id="3377"></div><span data-dcnode-id="3376" instrument_node="">

</span><h2 data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Jehovah's Witnesses—Who Are They? What Do They Believe?</span></h2><span data-dcnode-id="3371" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3359"><span data-dcnode-id="3370" instrument_node="">
</span><a data-dcnode-id="3366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.watchtower.org/e/jt/article_03.htm"><span data-dcnode-id="3369" instrument_node="">
</span><img alt="Jehovah's Witnesses—Who Are They? What Do They Believe?" data-dcnode-id="3368" height="150" id="Image66_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TSYiSeOfL0I/AAAAAAAAHkA/R54g-ldvLpQ/S1600-R/18.jpg&amp;raw" width="146"><span data-dcnode-id="3367" instrument_node="">
</span></a><span data-dcnode-id="3365" instrument_node="">
</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">
</span><span class="caption" data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">IT IS the desire of Jehovah's Witnesses that you become better acquainted with them. You may have met them as neighbors and fellow employees or in other daily affairs of life. You may have seen them on the street, offering their magazines to passersby. Or you may have spoken briefly with them at your door. Actually, Jehovah's Witnesses are interested in you and your welfare. They want to be your friends and to tell you more about themselves, their beliefs, their organization, and how they feel about people and the world in which all of us live. To accomplish this, they have prepared this brochure for you.</span></span><span data-dcnode-id="3360" instrument_node="">
</span></div><span data-dcnode-id="3358" instrument_node="">
</span><div class="clear" data-dcnode-id="3357"></div><span data-dcnode-id="3356" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3335" data-version="1" id="Image57"><span data-dcnode-id="3354" instrument_node="">
</span><h2 data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">How the Governing Body Is Organized</span></h2><span data-dcnode-id="3351" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3339"><span data-dcnode-id="3350" instrument_node="">
</span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/06/how-governing-body-is-organized.html"><span data-dcnode-id="3349" instrument_node="">
</span><img alt="How the Governing Body Is Organized" data-dcnode-id="3348" height="131" id="Image57_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TNuD9b0OZ8I/AAAAAAAAGd0/hu9X3PkQd0o/S1600-R/GB.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="3347" instrument_node="">
</span></a><span data-dcnode-id="3345" instrument_node="">
</span><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">
</span><span class="caption" data-dcnode-id="3341"><span data-dcnode-id="3342" instrument_node="">THE Governing Body of Jehovah’s Witnesses consists of dedicated men who are anointed servants of God. They act as representatives of the faithful and discreet slave class, which has the responsibility of providing spiritual food and giving direction and impetus to the Kingdom-preaching work throughout the earth.—Matt. 24:14, 45-47.</span></span><span data-dcnode-id="3340" instrument_node="">

</span><h2 data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Are Jehovah's Witnesses a Cult?</span></h2><span data-dcnode-id="3331" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3319"><span data-dcnode-id="3330" instrument_node="">
</span><a data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/are-jehovahs-witnesses-cult.html"><span data-dcnode-id="3329" instrument_node="">
</span><img alt="Are Jehovah's Witnesses a Cult?" data-dcnode-id="3328" height="253" id="Image65_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-9eTxx5F2nUM/ThIUAB0l-TI/AAAAAAAAJWo/VX-U4rMFD5w/s253/jwcult.jpg&amp;raw" style="visibility: visible;" width="199"><span data-dcnode-id="3327" instrument_node="">
</span></a><span data-dcnode-id="3325" instrument_node="">
</span><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">
</span><span class="caption" data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Jehovah’s Witnesses do not hold ritualistic meetings, nor is their worship cloaked in secrecy. Non-Witness author Julia Mitchell Corbett notes: “When they meet, usually more than once a week, in Kingdom Halls (their meeting sites are not called churches), most of their time is spent in Bible study and discussion.” Their meeting places are clearly marked with a sign. The meetings are open, and the general public is invited to attend. Unannounced guests are more than welcome.</span></span><span data-dcnode-id="3320" instrument_node="">
</span></div><span data-dcnode-id="3318" instrument_node="">
</span><div class="clear" data-dcnode-id="3317"></div><span data-dcnode-id="3316" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3295" data-version="1" id="Image25"><span data-dcnode-id="3314" instrument_node="">
</span><h2 data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">From House-to-house (Acts 5:42)</span></h2><span data-dcnode-id="3311" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3299"><span data-dcnode-id="3310" instrument_node="">
</span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/house-to-house.html"><span data-dcnode-id="3309" instrument_node="">
</span><img alt="From House-to-house (Acts 5:42)" data-dcnode-id="3308" height="253" id="Image25_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-R7mgEXlk_rw/ThFYpUiSTbI/AAAAAAAAJWA/5dTrrtmKZqA/s253/doorknocking.jpg&amp;raw" style="visibility: visible;" width="199"><span data-dcnode-id="3307" instrument_node="">
</span></a><span data-dcnode-id="3305" instrument_node="">
</span><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">
</span><span class="caption" data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">“Every day in the temple and from house to house they continued without letup teaching and declaring the good news about the Christ, Jesus.” (Acts 5:42) “Go therefore and make disciples of people of all the nations, baptizing them in the name of the Father and of the Son and of the holy spirit, teaching them to observe all the things I have commanded you. And, look! I am with you all the days until the conclusion of the system of things.” (Matthew 28:19, 20)</span></span><span data-dcnode-id="3300" instrument_node="">
</span></div><span data-dcnode-id="3298" instrument_node="">
</span><div class="clear" data-dcnode-id="3297"></div><span data-dcnode-id="3296" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3275" data-version="1" id="Image22"><span data-dcnode-id="3294" instrument_node="">
</span><h2 data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">Jehovah's Witnesses are NOT Inspired nor Infallible</span></h2><span data-dcnode-id="3291" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3279"><span data-dcnode-id="3290" instrument_node="">
</span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jehovah.to/xlation/fp.html"><span data-dcnode-id="3289" instrument_node="">
</span><img alt="Jehovah's Witnesses are NOT Inspired nor Infallible" data-dcnode-id="3288" height="253" id="Image22_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-oA6bE3saxvk/ThFZcNOd5SI/AAAAAAAAJWQ/0GOnklBPvLc/s253/Watchtower_pic_for_WP-565.jpg&amp;raw" style="visibility: visible;" width="248"><span data-dcnode-id="3287" instrument_node="">
</span></a><span data-dcnode-id="3285" instrument_node="">
</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">
</span><span class="caption" data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Jehovah’s Witnesses, in their eagerness for Jesus’ second coming, have suggested dates that turned out to be incorrect. Because of this, some have called them false prophets. Never in these instances, however, did they presume to originate predictions ‘in the name of Jehovah.’ Never did they say, ‘These are the words of Jehovah.’ The Watchtower, the official journal of Jehovah’s Witnesses, has said: “We have not the gift of prophecy.” (January 1883, page 425) “Nor would we have our writings reverenced or regarded as infallible.” (December 15, 1896, page 306) The Watchtower has also said that the fact that some have Jehovah’s spirit “does not mean those now serving as Jehovah’s witnesses are inspired. It does not mean that the writings in this magazine The Watchtower are inspired and infallible and without mistakes.” (May 15, 1947, page 157) “The Watchtower does not claim to be inspired in its utterances, nor is it dogmatic.” (August 15, 1950, page 263) “The brothers preparing these publications are not infallible. Their writings are not inspired as are those of Paul and the other Bible writers. (2 Tim. 3:16) And so, at times, it has been necessary, as understanding became clearer, to correct views. (Prov. 4:18)”—February 15, 1981, page 19.</span></span><span data-dcnode-id="3280" instrument_node="">
</span></div><span data-dcnode-id="3278" instrument_node="">
</span><div class="clear" data-dcnode-id="3277"></div><span data-dcnode-id="3276" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3255" data-version="1" id="Image156"><span data-dcnode-id="3274" instrument_node="">
</span><h2 data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">The Controversy Over the "Great Crowd" of Revelation Chapter 7</span></h2><span data-dcnode-id="3271" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3259"><span data-dcnode-id="3270" instrument_node="">
</span><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/controversy-over-great-crowd-of.html"><span data-dcnode-id="3269" instrument_node="">
</span><img alt="The Controversy Over the &quot;Great Crowd&quot; of Revelation Chapter 7" data-dcnode-id="3268" height="169" id="Image156_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TICRSb7bCCI/AAAAAAAAFFs/kqgwDW9g3r4/S760/chapter1.jpg&amp;raw" width="253"><span data-dcnode-id="3267" instrument_node="">
</span></a><span data-dcnode-id="3265" instrument_node="">
</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">
</span><span class="caption" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Especially, since the late 1970s, a number of ex-Jehovah’s Witnesses and sympathetic supporters from mainstream churches, have publicly challenged the understanding that Jehovah’s Witnesses have of the "great crowd" mentioned in Revelation chapter 7. These antagonists, by and large, believe that the great crowd’’ will be elevated to life in heaven along with the 144,000 mentioned in the same chapter.</span></span><span data-dcnode-id="3260" instrument_node="">
</span></div><span data-dcnode-id="3258" instrument_node="">
</span><div class="clear" data-dcnode-id="3257"></div><span data-dcnode-id="3256" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3235" data-version="1" id="Image155"><span data-dcnode-id="3254" instrument_node="">
</span><h2 data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">The Christian Community and the Earthly Hope</span></h2><span data-dcnode-id="3251" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3239"><span data-dcnode-id="3250" instrument_node="">
</span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/christian-community-and-earthly-hope.html"><span data-dcnode-id="3249" instrument_node="">
</span><img alt="The Christian Community and the Earthly Hope" data-dcnode-id="3248" height="177" id="Image155_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TICNz6H1BmI/AAAAAAAAFFk/A-EFzuZLY3M/S760/Jesus%2BHands%2Bof%2BLight.jpg&amp;raw" width="253"><span data-dcnode-id="3247" instrument_node="">
</span></a><span data-dcnode-id="3245" instrument_node="">
</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">
</span><span class="caption" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Some individuals who formerly associated with Jehovah's Witnesses feel quite strongly that no True Christian is destined to live on the earth forever. For them, the Bible's comments about a "new earth" apply to faithful Pre-Christians like Abraham, Isaac, Jacob and Hezekiah. They are not at cross purposes with Jehovah's Witnesses on the issue of two classes, a heavenly class and an earthly class; they differ on who constitute those two classes. Moreover, they would argue that this difference can not be trivialize since if their position is correct every Christian should be partaking of the Memorial emblems, a significant affair.</span></span><span data-dcnode-id="3240" instrument_node="">
</span></div><span data-dcnode-id="3238" instrument_node="">
</span><div class="clear" data-dcnode-id="3237"></div><span data-dcnode-id="3236" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3215" data-version="1" id="Image120"><span data-dcnode-id="3234" instrument_node="">
</span><h2 data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Why so many False Alarms?</span></h2><span data-dcnode-id="3231" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3219"><span data-dcnode-id="3230" instrument_node="">
</span><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/why-so-many-false-alarms.html"><span data-dcnode-id="3229" instrument_node="">
</span><img alt="Why so many False Alarms?" data-dcnode-id="3228" height="254" id="Image120_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TQkUN9G_LJI/AAAAAAAAHT4/pym5WnccDXQ/S1600-R/Watchtower_Magazine_English_issues.jpg&amp;raw" style="visibility: visible;" width="198"><span data-dcnode-id="3227" instrument_node="">
</span></a><span data-dcnode-id="3225" instrument_node="">
</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">
</span><span class="caption" data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">Jehovah’s Witnesses, in their eagerness for Jesus’ second coming, have suggested dates that turned out to be incorrect. Because of this, some have called them false prophets. Never in these instances, however, did they presume to originate predictions ‘in the name of Jehovah.’ Never did they say, ‘These are the words of Jehovah.’ The Watchtower, the official journal of Jehovah’s Witnesses, has said: “We have not the gift of prophecy.” (January 1883, page 425) “Nor would we have our writings reverenced or regarded as infallible.” (December 15, 1896, page 306) The Watchtower has also said that the fact that some have Jehovah’s spirit “does not mean those now serving as Jehovah’s witnesses are inspired. It does not mean that the writings in this magazine The Watchtower are inspired and infallible and without mistakes.” (May 15, 1947, page 157) “The Watchtower does not claim to be inspired in its utterances, nor is it dogmatic.” (August 15, 1950, page 263) “The brothers preparing these publications are not infallible. Their writings are not inspired as are those of Paul and the other Bible writers. (2 Tim. 3:16) And so, at times, it has been necessary, as understanding became clearer, to correct views. (Prov. 4:18)”—February 15, 1981, page 19.</span></span><span data-dcnode-id="3220" instrument_node="">
