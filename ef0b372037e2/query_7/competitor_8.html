</span><span class="caption" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">In 1879 C.E., the editor of the Watch Tower magazine and his associates were fully dedicated, baptized Christians. They offered themselves to serve as a watchman group in behalf of their spirit-anointed Christian brothers. All of these together made up a larger “watchman” class. They could not dodge the then arising question, “Watchman, what of the night?” The only trustworthy answer that they could give was that which God’s inspired Word put into the mouth of the watchman of old. This was, in effect, “The morning cometh, and also the night.” (Isa. 21:12, AV)</span></span><span data-dcnode-id="2395" instrument_node="">
</span></div><span data-dcnode-id="2393" instrument_node="">
</span><div class="clear" data-dcnode-id="2392"></div><span data-dcnode-id="2391" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2370" data-version="1" id="Image112"><span data-dcnode-id="2389" instrument_node="">
</span><h2 data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Pastor Russell, The British Isles</span></h2><span data-dcnode-id="2386" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2374"><span data-dcnode-id="2385" instrument_node="">
</span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/pastor-russell-british-isles.html"><span data-dcnode-id="2384" instrument_node="">
</span><img alt="Pastor Russell, The British Isles" data-dcnode-id="2383" height="253" id="Image112_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-V9HGDMUcfHQ/ThEWPVYqmTI/AAAAAAAAJMo/uzMwjrs3i5Q/s253/0_map_britain_1987_enlarged.jpg&amp;raw" width="214"><span data-dcnode-id="2382" instrument_node="">
</span></a><span data-dcnode-id="2380" instrument_node="">
</span><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">
</span><span class="caption" data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">WHEN two transatlantic voyagers stepped off the ship in Liverpool, England, sometime in September 1881, little did they think that they were being privileged to start something that was to grow tremendously and bring a great deal of joy to God-fearing Britishers. J. C. Sunderlin and J. J. Bender were two associates of the well-known “Pastor” Charles T. Russell of Allegheny, Pennsylvania, and they had come to arrange for the distribution of a 162-page publication entitled “Food for Thinking Christians.”</span></span><span data-dcnode-id="2375" instrument_node="">
</span></div><span data-dcnode-id="2373" instrument_node="">
</span><div class="clear" data-dcnode-id="2372"></div><span data-dcnode-id="2371" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2350" data-version="1" id="Image37"><span data-dcnode-id="2369" instrument_node="">
</span><h2 data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Will and Testament of Charles Taze Russell (1907)</span></h2><span data-dcnode-id="2366" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2354"><span data-dcnode-id="2365" instrument_node="">
</span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/will-and-testament-of-charles-taze.html"><span data-dcnode-id="2364" instrument_node="">
</span><img alt="Will and Testament of Charles Taze Russell (1907)" data-dcnode-id="2363" height="253" id="Image37_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-yUrqVMRdRAQ/ThEWjbHKYUI/AAAAAAAAJMw/JtsvGm8cUa4/s253/will_and_testament_lg.jpg&amp;raw" style="visibility: visible;" width="190"><span data-dcnode-id="2362" instrument_node="">
</span></a><span data-dcnode-id="2360" instrument_node="">
</span><br data-dcnode-id="2359"><span data-dcnode-id="2358" instrument_node="">
</span><span class="caption" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Having at various times during past years donated to the WATCH TOWER BIBLE AND TRACT SOCIETY all of my personal possessions except a small personal bank account of approximately two hundred dollars, in the Exchange National Bank of Pittsburgh, which will properly be paid over to my wife if she survives me, I have merely love and Christian good wishes to leave to all of the dear members of the Bible House Family--and all other dear colaborers in the Harvest work--yea, for all of the household of faith in every place who call upon the name of the Lord Jesus as their Redeemer.</span></span><span data-dcnode-id="2355" instrument_node="">
</span></div><span data-dcnode-id="2353" instrument_node="">
</span><div class="clear" data-dcnode-id="2352"></div><span data-dcnode-id="2351" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2330" data-version="1" id="Image59"><span data-dcnode-id="2349" instrument_node="">
</span><h2 data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Pastor Russell vs Rev. J. J. Ross (false accusations)</span></h2><span data-dcnode-id="2346" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2334"><span data-dcnode-id="2345" instrument_node="">
</span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/russell-vs-ross.html"><span data-dcnode-id="2344" instrument_node="">
</span><img alt="Pastor Russell vs Rev. J. J. Ross (false accusations)" data-dcnode-id="2343" height="240" id="Image59_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/S885efgUnII/AAAAAAAADfA/blTb1i8jFuo/S240/ctr.jpg&amp;raw" width="162"><span data-dcnode-id="2342" instrument_node="">
</span></a><span data-dcnode-id="2340" instrument_node="">
</span><br data-dcnode-id="2339"><span data-dcnode-id="2338" instrument_node="">
</span><span class="caption" data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">A clergyman who used this approach at Hamilton was a bombastic Baptist preacher named J. J. Ross. In 1912, he wrote a scurrilous pamphlet in which he made many false accusations against Russell. Acting on the advice of his legal counselor, J. F. Rutherford, Brother Russell laid a criminal charge of defamatory libel against Ross. As the complainant, Russell attended the trial to give evidence, and he submitted to a long cross-examination of roughly five hours. After the trial, his Baptist opponent falsely charged that Russell had committed perjury when asked about his knowledge of Greek. This “perjury” charge was published in Ross’ second pamphlet attacking Russell. In it the cleric misquoted what had been said in court, giving the cross-examiner’s question and Russell’s reply as follows:</span></span><span data-dcnode-id="2335" instrument_node="">
</span></div><span data-dcnode-id="2333" instrument_node="">
</span><div class="clear" data-dcnode-id="2332"></div><span data-dcnode-id="2331" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2310" data-version="1" id="Image53"><span data-dcnode-id="2329" instrument_node="">
</span><h2 data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Pastor Russell Debates Dr. Eaton (1903) and Rev. White (1908)</span></h2><span data-dcnode-id="2326" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2314"><span data-dcnode-id="2325" instrument_node="">
</span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/russell-debates-eaton-white.html"><span data-dcnode-id="2324" instrument_node="">
</span><img alt="Pastor Russell Debates Dr. Eaton (1903) and Rev. White (1908)" data-dcnode-id="2323" height="253" id="Image53_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ESTmwt4bfT8/ThEZutEWJ-I/AAAAAAAAJO4/fqc0DvQhunw/s253/russell02.jpg&amp;raw" width="185"><span data-dcnode-id="2322" instrument_node="">
</span></a><span data-dcnode-id="2320" instrument_node="">
</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">
</span><span class="caption" data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">In what later appeared to be an attempt by the Pittsburgh ministerial alliance to discredit C. T. Russell’s scholarship and Biblical views, on March 10, 1903, Dr. E. L. Eaton, minister of the North Avenue Methodist Episcopal Church, challenged Russell to a six-day debate. During each session of this debate, held that autumn in Allegheny’s Carnegie Hall, on the whole Russell came off victorious. Among other things, he Scripturally maintained that the souls of the dead are unconscious while their bodies are in the grave and that the object of both Christ’s second coming and the millennium is the blessing of all the families of the earth. Russell also made a very strong Biblical denial of the hellfire doctrine. Reportedly, one clergyman approached him after the last session of the debate and said: “I am glad to see you turn the hose on hell and put out the fire.” Interestingly, after this debate many members of Eaton’s congregation became Bible Students.</span></span><span data-dcnode-id="2315" instrument_node="">
</span></div><span data-dcnode-id="2313" instrument_node="">
</span><div class="clear" data-dcnode-id="2312"></div><span data-dcnode-id="2311" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2290" data-version="1" id="Image54"><span data-dcnode-id="2309" instrument_node="">
</span><h2 data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">False Charges about Pastor Russell</span></h2><span data-dcnode-id="2306" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2294"><span data-dcnode-id="2305" instrument_node="">
</span><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/false-charges-about-pastor-russell.html"><span data-dcnode-id="2304" instrument_node="">
</span><img alt="False Charges about Pastor Russell" data-dcnode-id="2303" height="253" id="Image54_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-zKNqOdModoI/TsjZmgN6lKI/AAAAAAAAKU8/Yn3HfwJgC6o/s253/001.jpg&amp;raw" style="visibility: visible;" width="175"><span data-dcnode-id="2302" instrument_node="">
</span></a><span data-dcnode-id="2300" instrument_node="">
</span><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node="">
</span><span class="caption" data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">Are the charges in a tract against Jehovah’s witnesses true that the Society’s first president was immoral, profiteered from selling some mysteriously named wheat at $65 a bushel, and committed perjury when asked in court if he could read Greek?—C. W., North Carolina.</span></span><span data-dcnode-id="2295" instrument_node="">
</span></div><span data-dcnode-id="2293" instrument_node="">
</span><div class="clear" data-dcnode-id="2292"></div><span data-dcnode-id="2291" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2270" data-version="1" id="Image106"><span data-dcnode-id="2289" instrument_node="">
</span><h2 data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Why did Pastor Russell's wife leave him?</span></h2><span data-dcnode-id="2286" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2274"><span data-dcnode-id="2285" instrument_node="">
</span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/07/why-did-russells-wife-leave-him.html"><span data-dcnode-id="2284" instrument_node="">
</span><img alt="Why did Pastor Russell's wife leave him?" data-dcnode-id="2283" height="309" id="Image106_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TF2PWw1XQJI/AAAAAAAAEc0/qZhMdkb-g24/S760/Charles%2B%2526%2BMaria%2BRussell.jpg&amp;raw" width="253"><span data-dcnode-id="2282" instrument_node="">
</span></a><span data-dcnode-id="2280" instrument_node="">
</span><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">
</span><span class="caption" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">In summing up the matter respecting his wife, C. T. Russell wrote: “Sister Russell became afflicted with the spirit of ambition, as others have been, and in the Lord’s providence it seemed best three years ago now that she should not be further identified with the publications [of the Watch Tower Bible and Tract Society], until such time as she might show a thorough change of heart in this matter.”</span></span><span data-dcnode-id="2275" instrument_node="">
</span></div><span data-dcnode-id="2273" instrument_node="">
</span><div class="clear" data-dcnode-id="2272"></div><span data-dcnode-id="2271" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2250" data-version="1" id="Image82"><span data-dcnode-id="2269" instrument_node="">
</span><h2 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Pastor Russell was NOT Immoral</span></h2><span data-dcnode-id="2266" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2254"><span data-dcnode-id="2265" instrument_node="">
</span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/07/pastor-russell-was-not-immoral.html"><span data-dcnode-id="2264" instrument_node="">
</span><img alt="Pastor Russell was NOT Immoral" data-dcnode-id="2263" height="160" id="Image82_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/S9sS29n2uDI/AAAAAAAADq4/CBTyDA6fKf4/S240/gavel.jpg&amp;raw" width="240"><span data-dcnode-id="2262" instrument_node="">
</span></a><span data-dcnode-id="2260" instrument_node="">
</span><br data-dcnode-id="2259"><span data-dcnode-id="2258" instrument_node="">
</span><span class="caption" data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">“That Mrs. Russell herself did not believe and never has believed that her husband was guilty of immoral conduct is shown by the [court] record in this case where her own counsel (on page 10) asked Mrs. Russell this question: ‘You don’t mean that your husband was guilty of adultery?’ Ans. ‘No.’” Ibid., p. 19. Also W July 15, 1906, pp. 211-227.</span></span><span data-dcnode-id="2255" instrument_node="">
</span></div><span data-dcnode-id="2253" instrument_node="">
</span><div class="clear" data-dcnode-id="2252"></div><span data-dcnode-id="2251" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2230" data-version="1" id="Image52"><span data-dcnode-id="2249" instrument_node="">
</span><h2 data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Was Charles Taze Russell a Mason? No, he was not!</span></h2><span data-dcnode-id="2246" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2234"><span data-dcnode-id="2245" instrument_node="">
</span><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/09/was-charles-taze-russell-mason.html"><span data-dcnode-id="2244" instrument_node="">
</span><img alt="Was Charles Taze Russell a Mason? No, he was not!" data-dcnode-id="2243" height="190" id="Image52_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-oslNUUj_9JU/ThEykZcMreI/AAAAAAAAJTg/-UdMqmHjuMU/s253/IMG_5659%25255B5%25255D.jpg&amp;raw" width="253"><span data-dcnode-id="2242" instrument_node="">
</span></a><span data-dcnode-id="2240" instrument_node="">
</span><br data-dcnode-id="2239"><span data-dcnode-id="2238" instrument_node="">
</span><span class="caption" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">"This brings before us the whole question of orders, societies, etc., and what privileges the New Creation has in connection with such organizations. Is it right for them to be members of these societies? We answer that while Church associations are purely religious, and labor and beneficial organizations in general are purely secular, there are still other orders which combine the religious and the secular features. As we understand the matter, for instance, the Free Masons, Odd Fellows, Knights of Pythias, etc., perform certain rites and ceremonies of a religious kind... We place upon one level all of those who have any religious ceremonies, teachings, etc., and consider them all as parts of Babylon ... We admonish the New Creation to have nothing whatever to do with any of these semi-religious societies, clubs, orders, churches; but to "Come out from amongst them, and be ye separate, and touch not the unclean thing." (`2 Cor. 6:17`)" —1904; "The New Creation", pp. 580-581</span></span><span data-dcnode-id="2235" instrument_node="">
</span></div><span data-dcnode-id="2233" instrument_node="">
</span><div class="clear" data-dcnode-id="2232"></div><span data-dcnode-id="2231" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2210" data-version="1" id="Image67"><span data-dcnode-id="2229" instrument_node="">
</span><h2 data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">The Watchtower and the Great Pyramid, then and now.</span></h2><span data-dcnode-id="2226" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2214"><span data-dcnode-id="2225" instrument_node="">
</span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/great-pyramid-of-giza-product-of-true_30.html"><span data-dcnode-id="2224" instrument_node="">
</span><img alt="The Watchtower and the Great Pyramid, then and now." data-dcnode-id="2223" height="225" id="Image67_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TRzrTZMyokI/AAAAAAAAHfM/8lySWjGlqes/S1600-R/divine-plan-pyramid-cover.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="2222" instrument_node="">
</span></a><span data-dcnode-id="2220" instrument_node="">
</span><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">
</span><span class="caption" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Judge J. F. Rutherford, who succeeded Russell after the pastor died in 1916, eventually discarded Pyramidology entirely. Writing in the November 15 and December 1, 1928, issues of The Watch Tower, Rutherford releases a double-barreled blast against it, and advances many ingenious arguments that the so-called Altar in Egypt was really inspired by Satan for the purpose of misleading the faithful. Did Jesus ever mention the Pyramid? Of course not. To study it, the Judge writes, is a waste of time and indicates lack of faith in the all-sufficiency of the Bible. Regardless of what some anti-JW fault- finders might say, the WTB&amp;TS rejected all teachings on the Great Pyramid in 1928. For this reason, most Jehovah's Witnesses know nothing about it. However, many (not all) of the current Bible Students still teach this "Bible in Stone" dogma.</span></span><span data-dcnode-id="2215" instrument_node="">
</span></div><span data-dcnode-id="2213" instrument_node="">
</span><div class="clear" data-dcnode-id="2212"></div><span data-dcnode-id="2211" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2190" data-version="1" id="Image63"><span data-dcnode-id="2209" instrument_node="">
</span><h2 data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Is the Watchtower of pagan origin? NO, it is not!</span></h2><span data-dcnode-id="2206" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2194"><span data-dcnode-id="2205" instrument_node="">
</span><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/07/is-watchtower-of-pagan-origin.html"><span data-dcnode-id="2204" instrument_node="">
</span><img alt="Is the Watchtower of pagan origin? NO, it is not!" data-dcnode-id="2203" height="240" id="Image63_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ErzTVptV59A/ThnfNNIMvvI/AAAAAAAAJdU/X51CwTgfMi0/s253/aWatchtower.jpg&amp;raw" width="164"><span data-dcnode-id="2202" instrument_node="">
</span></a><span data-dcnode-id="2200" instrument_node="">
</span><br data-dcnode-id="2199"><span data-dcnode-id="2198" instrument_node="">
</span><span class="caption" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">The expression “Watch Tower” is not unique to Russell’s writings or to Jehovah’s Witnesses. George Storrs published a book in the 1850’s called The Watch Tower: Or, Man in Death; and the Hope for a Future Life. The name was also incorporated in the title of various religious periodicals. It stems from the idea of keeping on the watch for the outworking of God’s purposes.—Isa. 21:8, 11, 12; Ezek. 3:17; Hab. 2:1.</span></span><span data-dcnode-id="2195" instrument_node="">
</span></div><span data-dcnode-id="2193" instrument_node="">
</span><div class="clear" data-dcnode-id="2192"></div><span data-dcnode-id="2191" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2170" data-version="1" id="Image55"><span data-dcnode-id="2189" instrument_node="">
</span><h2 data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">"Miracle Wheat"</span></h2><span data-dcnode-id="2186" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2174"><span data-dcnode-id="2185" instrument_node="">
</span><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/05/miracle-wheat.html"><span data-dcnode-id="2184" instrument_node="">
</span><img alt="&quot;Miracle Wheat&quot;" data-dcnode-id="2183" height="253" id="Image55_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-t3E7DRAJTfY/ThFP-MdovKI/AAAAAAAAJUw/kCPPyeu6crQ/s253/wheat-emmertype.jpg&amp;raw" width="222"><span data-dcnode-id="2182" instrument_node="">
</span></a><span data-dcnode-id="2180" instrument_node="">
</span><br data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">
</span><span class="caption" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Foes of C. T. Russell used not only his domestic affairs but other "weapons" against him. For instance, his enemies have charged that he sold a great quantity of ordinary wheat seed under the name of "Miracle Wheat" at one dollar per pound, or sixty dollars per bushel. They have held that from this Russell realized an enormous personal profit. However, these charges are absolutely false. What are the facts?</span></span><span data-dcnode-id="2175" instrument_node="">
</span></div><span data-dcnode-id="2173" instrument_node="">
</span><div class="clear" data-dcnode-id="2172"></div><span data-dcnode-id="2171" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2150" data-version="1" id="Image113"><span data-dcnode-id="2169" instrument_node="">
</span><h2 data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">Pastor Russell's Sermons</span></h2><span data-dcnode-id="2166" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2154"><span data-dcnode-id="2165" instrument_node="">
</span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/opening-door-of-newspaper-gospelling.html"><span data-dcnode-id="2164" instrument_node="">
</span><img alt="Pastor Russell's Sermons" data-dcnode-id="2163" height="253" id="Image113_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-2lPaz9LYQJE/TssH_t21KvI/AAAAAAAAKYM/aslJmIV0V6w/s253/002.jpg&amp;raw" style="visibility: visible;" width="186"><span data-dcnode-id="2162" instrument_node="">
</span></a><span data-dcnode-id="2160" instrument_node="">
</span><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">
</span><span class="caption" data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">By the end of the 19th century, the world was crisscrossed with telegraph lines. Telegraphic communication was inexpensive and fast; it revolutionized the press. News could be quickly transmitted over long distances and printed in newspapers. In the early part of the 20th century, C. T. Russell and his associates saw newspapers as an effective way of reaching large numbers of people. Russell later said: “The newspaper has become the great factor in the daily life of the civilized world.”</span></span><span data-dcnode-id="2155" instrument_node="">
</span></div><span data-dcnode-id="2153" instrument_node="">
</span><div class="clear" data-dcnode-id="2152"></div><span data-dcnode-id="2151" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2130" data-version="1" id="Image49"><span data-dcnode-id="2149" instrument_node="">
</span><h2 data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">“Millennial Dawn” and “Studies in the Scriptures”</span></h2><span data-dcnode-id="2146" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2134"><span data-dcnode-id="2145" instrument_node="">
</span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/05/millennial-dawn-studies-in-scriptures.html"><span data-dcnode-id="2144" instrument_node="">
</span><img alt="“Millennial Dawn” and “Studies in the Scriptures”" data-dcnode-id="2143" height="215" id="Image49_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TUdYBRAUhpI/AAAAAAAAIEc/bC-wU7-cvjs/s1600/studies_in_the_scriptures_B.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="2142" instrument_node="">
</span></a><span data-dcnode-id="2140" instrument_node="">
</span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">
</span><span class="caption" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">“The dissemination of Bible truths” took a notable step forward with a series of books entitled “Millennial Dawn” (later, “Studies in the Scriptures”). Written by C. T. Russell in easily understood language, Volume I was published in 1886. First called “The Plan of the Ages” and later “The Divine Plan of the Ages,” it covered such subjects as “The Existence of a Supreme Intelligent Creator Established,” “Our Lord’s Return—Its Object, the Restitution of All Things,” “The Day of Judgment,” “The Kingdom of God” and “The Day of Jehovah.” During a forty-year period, six million copies of this publication were distributed, helping hundreds of sincere truth seekers to come out of false religious bondage into Christian freedom.</span></span><span data-dcnode-id="2135" instrument_node="">
</span></div><span data-dcnode-id="2133" instrument_node="">
</span><div class="clear" data-dcnode-id="2132"></div><span data-dcnode-id="2131" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2110" data-version="1" id="Image177"><span data-dcnode-id="2129" instrument_node="">
</span><h2 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Two Pastors Who Appreciated Russell's Writings</span></h2><span data-dcnode-id="2126" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2114"><span data-dcnode-id="2125" instrument_node="">
</span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/two-pastors-who-appreciated-russells.html"><span data-dcnode-id="2124" instrument_node="">
</span><img alt="Two Pastors Who Appreciated Russell's Writings" data-dcnode-id="2123" height="300" id="Image177_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-DxS_WYJB-iE/TbdXJhj6YFI/AAAAAAAAJA8/JhbxL3KJGbA/s1600/473px-Russell_Charles_Taze_1911_.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="2122" instrument_node="">
</span></a><span data-dcnode-id="2120" instrument_node="">
</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">
</span><span class="caption" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">IN 1891, Charles Taze Russell, who did outstanding work among true Christian worshipers of Jehovah, visited Europe for the first time. According to some reports, during a stopover in Pinerolo, Italy, Russell met Professor Daniele Rivoire, a former pastor of a religious group called the Waldenses. Although Rivoire remained closely associated with the Waldenses after he left the ministry, he kept an open mind and read many publications that C. T. Russell wrote.</span></span><span data-dcnode-id="2115" instrument_node="">
</span></div><span data-dcnode-id="2113" instrument_node="">
</span><div class="clear" data-dcnode-id="2112"></div><span data-dcnode-id="2111" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2090" data-version="1" id="Image62"><span data-dcnode-id="2109" instrument_node="">
</span><h2 data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Pastor Russell and the Convention Train</span></h2><span data-dcnode-id="2106" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2094"><span data-dcnode-id="2105" instrument_node="">
</span><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/pastor-russell-and-convention-train.html"><span data-dcnode-id="2104" instrument_node="">
</span><img alt="Pastor Russell and the Convention Train" data-dcnode-id="2103" height="253" id="Image62_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-AE7HXOwqi_8/TsjaJZy_IyI/AAAAAAAAKVI/ixK_nRDulwA/s253/russelltour1.jpg&amp;raw" width="175"><span data-dcnode-id="2102" instrument_node="">
</span></a><span data-dcnode-id="2100" instrument_node="">
</span><br data-dcnode-id="2099"><span data-dcnode-id="2098" instrument_node="">
</span><span class="caption" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">As time passed, requests for personal appearances by C. T. Russell increased. In fulfilling some speaking engagements, he sometimes had traveled aboard a special railroad “convention car,” a small group accompanying him. But larger parties were organized in “convention trains,” as many as 240 traveling with Russell on one occasion.</span></span><span data-dcnode-id="2095" instrument_node="">
</span></div><span data-dcnode-id="2093" instrument_node="">
</span><div class="clear" data-dcnode-id="2092"></div><span data-dcnode-id="2091" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2070" data-version="1" id="Image117"><span data-dcnode-id="2089" instrument_node="">
</span><h2 data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Russell and The Bible Examiner</span></h2><span data-dcnode-id="2086" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2074"><span data-dcnode-id="2085" instrument_node="">
</span><a data-dcnode-id="2081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/02/charles-t-russell-and-bible-examiner.html"><span data-dcnode-id="2084" instrument_node="">
</span><img alt="Russell and The Bible Examiner" data-dcnode-id="2083" height="207" id="Image117_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-b_bTWEHH2q0/To90CdQ2UoI/AAAAAAAAJ_U/YYhr4gjgidY/s253/f6ad_1.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="2082" instrument_node="">
</span></a><span data-dcnode-id="2080" instrument_node="">
</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">
</span><span class="caption" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">George Storrs, was publisher of the magazine Bible Examiner, in Brooklyn, New York. Storrs, who was born on December 13, 1796, was initially stimulated to examine what the Bible says about the condition of the dead as a result of reading something published (though at the time anonymously) by a careful student of the Bible, Henry Grew, of Philadelphia, Pennsylvania. Storrs became a zealous advocate of what was called conditional immortality—the teaching that the soul is mortal and that immortality is a gift to be attained by faithful Christians. He also reasoned that since the wicked do not have immortality, there is no eternal torment. Storrs traveled extensively, lecturing on the subject of no immortality for the wicked. Among his published works was the Six Sermons, which eventually attained a distribution of 200,000 copies. Without a doubt, Storrs’ strong Bible-based views on the mortality of the soul as well as the atonement and restitution (restoration of what was lost due to Adamic sin; Acts 3:21) had a strong, positive influence on young Charles T.&nbsp;Russell.</span></span><span data-dcnode-id="2075" instrument_node="">
</span></div><span data-dcnode-id="2073" instrument_node="">
</span><div class="clear" data-dcnode-id="2072"></div><span data-dcnode-id="2071" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2050" data-version="1" id="Image86"><span data-dcnode-id="2069" instrument_node="">
</span><h2 data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Pastor Russall at Carnegie Hall</span></h2><span data-dcnode-id="2066" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2054"><span data-dcnode-id="2065" instrument_node="">
</span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/03/pastor-russell-at-carnegie-hall.html"><span data-dcnode-id="2064" instrument_node="">
</span><img alt="Pastor Russall at Carnegie Hall" data-dcnode-id="2063" height="253" id="Image86_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-bo5kEhe4YCQ/TvCwJZBhxmI/AAAAAAAAKo0/zCdZ5WyDE6s/s1600/140Plaque.JPG&amp;raw" width="190"><span data-dcnode-id="2062" instrument_node="">
</span></a><span data-dcnode-id="2060" instrument_node="">
</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">
</span><span class="caption" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">After funeral services at The Temple in New York and at Carnegie Hall in Pittsburgh, Brother Russell was buried at Allegheny, in the Bethel family plot, according to his request. A brief biography of Russell along with his will and testament was published in The Watch Tower of December 1, 1916, as well as in subsequent editions of the first volume of Studies in the Scriptures.</span></span><span data-dcnode-id="2055" instrument_node="">
</span></div><span data-dcnode-id="2053" instrument_node="">
</span><div class="clear" data-dcnode-id="2052"></div><span data-dcnode-id="2051" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2030" data-version="1" id="Image127"><span data-dcnode-id="2049" instrument_node="">
</span><h2 data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Filling Spiritual Needs of Early Bible Students</span></h2><span data-dcnode-id="2046" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2034"><span data-dcnode-id="2045" instrument_node="">
</span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/filling-spiritual-needs-of-early-bible.html"><span data-dcnode-id="2044" instrument_node="">
</span><img alt="Filling Spiritual Needs of Early Bible Students" data-dcnode-id="2043" height="195" id="Image127_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-thNmlx6U2b8/Tr9YPn7VZOI/AAAAAAAAKIw/o5KpWpZNwG0/s253/pre-russell-1915-pyramids-jws.png&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="2042" instrument_node="">
</span></a><span data-dcnode-id="2040" instrument_node="">
</span><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">
</span><span class="caption" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Brother Russell realized that it was important for Jehovah’s servants to be a unified people, no matter where they might be scattered around the globe. So, in 1879, shortly after the Watch Tower began to be published, its readers were invited to make request for Brother Russell or one of his associates to visit them.</span></span><span data-dcnode-id="2035" instrument_node="">
</span></div><span data-dcnode-id="2033" instrument_node="">
</span><div class="clear" data-dcnode-id="2032"></div><span data-dcnode-id="2031" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2010" data-version="1" id="Image108"><span data-dcnode-id="2029" instrument_node="">
</span><h2 data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Individuals are Unimportant to God's Work</span></h2><span data-dcnode-id="2026" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2014"><span data-dcnode-id="2025" instrument_node="">
</span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/06/macmillan-is-in-charge.html"><span data-dcnode-id="2024" instrument_node="">
</span><img alt="Individuals are Unimportant to God's Work" data-dcnode-id="2023" height="261" id="Image108_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TOWPGyDgOXI/AAAAAAAAGuU/naLW9WvvJN0/S1600-R/%252521BgJSKKg%2525212k%25257E%252524%252528KGrHqYH-DgEsNUGmk0cBLEIODG%252521-g%25257E%25257E_3.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="2022" instrument_node="">
</span></a><span data-dcnode-id="2020" instrument_node="">
</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">
</span><span class="caption" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">"A. H. Macmillan is to be in full charge of the office and the Bethel Home during my absence. Anything he says for you to do you must do; it doesn't make any difference whether you agree or not. If he tells you incorrectly, I'll attend to him when I get home." Then he handed me copies of all the letters and said, "You have the skeleton organization. Go to work and do things."</span></span><span data-dcnode-id="2015" instrument_node="">
</span></div><span data-dcnode-id="2013" instrument_node="">
</span><div class="clear" data-dcnode-id="2012"></div><span data-dcnode-id="2011" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1990" data-version="1" id="Image70"><span data-dcnode-id="2009" instrument_node="">
</span><h2 data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Joseph L. and Ann Eliza (Birney) Russell</span></h2><span data-dcnode-id="2006" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1994"><span data-dcnode-id="2005" instrument_node="">
</span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/joseph-l-and-ann-eliza-birney-russell.html"><span data-dcnode-id="2004" instrument_node="">
</span><img alt="Joseph L. and Ann Eliza (Birney) Russell" data-dcnode-id="2003" height="168" id="Image70_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/S9NrEEI9QNI/AAAAAAAADiI/KAWk5Ltt3XU/S240/158.JPG&amp;raw" width="240"><span data-dcnode-id="2002" instrument_node="">
</span></a><span data-dcnode-id="2000" instrument_node="">
</span><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">
</span><span class="caption" data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">C. T. Russell was born in the United States, in Allegheny (now part of Pittsburgh), Pennsylvania, on February 16, 1852. He was the second son of Joseph L. and Ann Eliza (Birney) Russell, who were Presbyterians of Scottish-Irish descent. Charles’ mother died when he was only nine years old, but from an early age, Charles was influenced by both of his religiously-minded parents. As a later associate of C. T. Russell put it, “they trained the small twig; and it grew in the direction of the Lord.” Although brought up as a Presbyterian, Charles eventually joined the Congregational Church because he preferred its views.</span></span><span data-dcnode-id="1995" instrument_node="">
</span></div><span data-dcnode-id="1993" instrument_node="">
</span><div class="clear" data-dcnode-id="1992"></div><span data-dcnode-id="1991" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1970" data-version="1" id="Image139"><span data-dcnode-id="1989" instrument_node="">
</span><h2 data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Joseph L. Russell</span></h2><span data-dcnode-id="1986" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1974"><span data-dcnode-id="1985" instrument_node="">
</span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/joseph-l-russell-1813-1898.html"><span data-dcnode-id="1984" instrument_node="">
</span><img alt="Joseph L. Russell" data-dcnode-id="1983" height="213" id="Image139_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TGK7ssNNKOI/AAAAAAAAEu4/_kekyqmV5Us/S760/159.JPG&amp;raw" width="150"><span data-dcnode-id="1982" instrument_node="">
</span></a><span data-dcnode-id="1980" instrument_node="">
</span><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">
</span><span class="caption" data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Joseph L. Russell, Charles’ father, was a member of the Allegheny Bible study class and a close associate of his son in the activities of the Watch Tower Society until his death in 1897.</span></span><span data-dcnode-id="1975" instrument_node="">
</span></div><span data-dcnode-id="1973" instrument_node="">
</span><div class="clear" data-dcnode-id="1972"></div><span data-dcnode-id="1971" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1950" data-version="1" id="Image123"><span data-dcnode-id="1969" instrument_node="">
</span><h2 data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Alexander H. Macmillan</span></h2><span data-dcnode-id="1966" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1954"><span data-dcnode-id="1965" instrument_node="">
</span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/h-macmillan.html"><span data-dcnode-id="1964" instrument_node="">
</span><img alt="Alexander H. Macmillan" data-dcnode-id="1963" height="209" id="Image123_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TGK_qKtUF6I/AAAAAAAAEvY/R254wIY2NKg/S1600-R/27_1.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1962" instrument_node="">
</span></a><span data-dcnode-id="1960" instrument_node="">
</span><br data-dcnode-id="1959"><span data-dcnode-id="1958" instrument_node="">
</span><span class="caption" data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The wonderful expansion that I have seen in Jehovah’s organization and the worldwide preaching of the good news of the Kingdom that I see going on today bring my own years of preaching to a marvelous climax. It has been a privilege to work with the Society’s three presidents and to have had a part in this expansion. I can truly appreciate now Brother Russell’s remark in his last conversation with me when he said: ‘Brother, this is not man’s work. This is God’s.’ Doing God’s will for the past sixty-six years has indeed been my keenest delight.</span></span><span data-dcnode-id="1955" instrument_node="">
</span></div><span data-dcnode-id="1953" instrument_node="">
</span><div class="clear" data-dcnode-id="1952"></div><span data-dcnode-id="1951" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1930" data-version="1" id="Image77"><span data-dcnode-id="1949" instrument_node="">
</span><h2 data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">William E. Van Amburgh</span></h2><span data-dcnode-id="1946" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1934"><span data-dcnode-id="1945" instrument_node="">
</span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/05/two-pastors-who-appreciated-russells.html"><span data-dcnode-id="1944" instrument_node="">
</span><img alt="William E. Van Amburgh" data-dcnode-id="1943" height="211" id="Image77_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TT8XWlcnqsI/AAAAAAAAH8M/jUNXzkZnR40/s1600/1911_bible_student_convention_pictures_0010.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1942" instrument_node="">
</span></a><span data-dcnode-id="1940" instrument_node="">
</span><br data-dcnode-id="1939"><span data-dcnode-id="1938" instrument_node="">
</span><span class="caption" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Many of Brother Russell’s associates were firmly convinced that the Lord had things well in hand. At Brother Russell’s funeral, W. E. Van Amburgh stated: “God has used many servants in the past and He will doubtless use many in the future. Our consecration is not to a man, or to a man’s work, but to do the will of God, as He shall reveal it unto us through His Word and providential leadings. God is still at the helm.” Brother Van Amburgh never wavered from that conviction down till his death.</span></span><span data-dcnode-id="1935" instrument_node="">
</span></div><span data-dcnode-id="1933" instrument_node="">
</span><div class="clear" data-dcnode-id="1932"></div><span data-dcnode-id="1931" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1910" data-version="1" id="Image125"><span data-dcnode-id="1929" instrument_node="">
</span><h2 data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Clayton J. Woodworth</span></h2><span data-dcnode-id="1926" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1914"><span data-dcnode-id="1925" instrument_node="">
</span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/06/clayton-j-woodworth.html"><span data-dcnode-id="1924" instrument_node="">
</span><img alt="Clayton J. Woodworth" data-dcnode-id="1923" height="233" id="Image125_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TGGLZ6z2erI/AAAAAAAAEow/EklZKFHlrtg/S760/woodworth.jpg&amp;raw" width="150"><span data-dcnode-id="1922" instrument_node="">
</span></a><span data-dcnode-id="1920" instrument_node="">
</span><br data-dcnode-id="1919"><span data-dcnode-id="1918" instrument_node="">
</span><span class="caption" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Clayton J. Woodworth and George H. Fisher, compile a book consisting of commentaries on Revelation, The Song of Solomon and Ezekiel. The coeditors assembled material from Brother Russell’s writings and this was published under the title “The Finished Mystery” as the seventh volume of Studies in the Scriptures.</span></span><span data-dcnode-id="1915" instrument_node="">
</span></div><span data-dcnode-id="1913" instrument_node="">
</span><div class="clear" data-dcnode-id="1912"></div><span data-dcnode-id="1911" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1890" data-version="1" id="Image138"><span data-dcnode-id="1909" instrument_node="">
</span><h2 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Jonas Wendell</span></h2><span data-dcnode-id="1906" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1894"><span data-dcnode-id="1905" instrument_node="">
</span><a data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/jonas-wendell.html"><span data-dcnode-id="1904" instrument_node="">
</span><img alt="Jonas Wendell" data-dcnode-id="1903" height="253" id="Image138_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-m7tf5WkuKNY/TvTaCHCLaAI/AAAAAAAAKyY/s4tN31zWCRg/s253/IMG_NEW.jpg&amp;raw" width="199"><span data-dcnode-id="1902" instrument_node="">
</span></a><span data-dcnode-id="1900" instrument_node="">
</span><br data-dcnode-id="1899"><span data-dcnode-id="1898" instrument_node="">
</span><span class="caption" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">By the late 1860s he had been studying the chronology of the Bible, and was encouraged by conclusions showing Christ's return would occur in either 1868 or 1873/4. In 1870 Wendell published his views in the booklet entitled The Present Truth, or Meat in Due Season concluding that the Second Advent was sure to occur in 1873. Unknown to him, attendance at one of his presentations restored Charles Taze Russell's faith in the Bible as the true word of God, leading to Russell's ministry.</span></span><span data-dcnode-id="1895" instrument_node="">
</span></div><span data-dcnode-id="1893" instrument_node="">
</span><div class="clear" data-dcnode-id="1892"></div><span data-dcnode-id="1891" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1870" data-version="1" id="Image21"><span data-dcnode-id="1889" instrument_node="">
</span><h2 data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">George Storrs</span></h2><span data-dcnode-id="1886" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1874"><span data-dcnode-id="1885" instrument_node="">
</span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/george-storrs.html"><span data-dcnode-id="1884" instrument_node="">
</span><img alt="George Storrs" data-dcnode-id="1883" height="214" id="Image21_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/SITJYYkr3XI/AAAAAAAAAOo/6EHAB64IYHs/S760/GeorgeStorrs.jpg&amp;raw" width="150"><span data-dcnode-id="1882" instrument_node="">
</span></a><span data-dcnode-id="1880" instrument_node="">
</span><br data-dcnode-id="1879"><span data-dcnode-id="1878" instrument_node="">
</span><span class="caption" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">C. T.&nbsp;Russell felt a sense of indebtedness to George Storrs, who was some 56 years his senior. Russell had learned much from Storrs about the mortality of the soul. So when Storrs lay seriously ill late in 1879, Russell offered to print in the “Watch Tower” a statement of Storrs’ condition. “Our brother,” Russell wrote, “so long the editor of ‘The Bible Examiner’ is known to most of our readers; also that he has been obliged by severe illness to discontinue his paper.” In Russell’s estimation, Storrs had “much reason to thank God for being privileged to spend so long a life and one so consecrated to the Master.” Storrs died on December 28, 1879, at the age of 83. An announcement of his death appeared in the February 1880 issue of the “Watch Tower,” which said: “We mourn the loss of a friend and brother in Christ yet, ‘not as those who have no hope.’”</span></span><span data-dcnode-id="1875" instrument_node="">
</span></div><span data-dcnode-id="1873" instrument_node="">
</span><div class="clear" data-dcnode-id="1872"></div><span data-dcnode-id="1871" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1850" data-version="1" id="Image126"><span data-dcnode-id="1869" instrument_node="">
</span><h2 data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">George W. Stetson</span></h2><span data-dcnode-id="1866" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1854"><span data-dcnode-id="1865" instrument_node="">
</span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/george-stetson.html"><span data-dcnode-id="1864" instrument_node="">
</span><img alt="George W. Stetson" data-dcnode-id="1863" height="224" id="Image126_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TGGM4QnBzlI/AAAAAAAAEo4/oe57Xlqen_c/S760/06history_stetson.jpg&amp;raw" width="150"><span data-dcnode-id="1862" instrument_node="">
</span></a><span data-dcnode-id="1860" instrument_node="">
</span><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">
</span><span class="caption" data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">For over forty years George Stetson followed in the footsteps of Christ and associated with Henry Grew and George Storrs in his early ministry, and even later with Jonas Wendell and Charles Russell. He was not only a minister, but also a school teacher, and physician. As a member of the Advent Christian Church.</span></span><span data-dcnode-id="1855" instrument_node="">
</span></div><span data-dcnode-id="1853" instrument_node="">
</span><div class="clear" data-dcnode-id="1852"></div><span data-dcnode-id="1851" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1830" data-version="1" id="Image132"><span data-dcnode-id="1849" instrument_node="">
</span><h2 data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Hayden C. Covington</span></h2><span data-dcnode-id="1846" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1834"><span data-dcnode-id="1845" instrument_node="">
</span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/hayden-covington-1911-1978.html"><span data-dcnode-id="1844" instrument_node="">
</span><img alt="Hayden C. Covington" data-dcnode-id="1843" height="201" id="Image132_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TGOW_jFi5CI/AAAAAAAAEy8/aSb3xOcjqD8/S1600-R/hcc.png&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1842" instrument_node="">
</span></a><span data-dcnode-id="1840" instrument_node="">
</span><br data-dcnode-id="1839"><span data-dcnode-id="1838" instrument_node="">
</span><span class="caption" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">In the following years, Hayden Covington came to be hailed as one of the greatest civil liberties attorneys in American history. During his tenure as the head of the Watch Tower Society's Legal Department, Covington is said to have presented 111 petitions and appeals to the Supreme Court; he won well above 80% of the 44 cases he brought before the Court. The cases dealt with issues ranging from compulsory flag-salute statutes, to street preaching, to door-to-door literature distribution. He eventually resigned as Head of the Watch Tower Society's Legal Department.</span></span><span data-dcnode-id="1835" instrument_node="">
</span></div><span data-dcnode-id="1833" instrument_node="">
</span><div class="clear" data-dcnode-id="1832"></div><span data-dcnode-id="1831" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1810" data-version="1" id="Image145"><span data-dcnode-id="1829" instrument_node="">
</span><h2 data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Benjamin H. Barton</span></h2><span data-dcnode-id="1826" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1814"><span data-dcnode-id="1825" instrument_node="">
</span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/benjamin-h-barton.html"><span data-dcnode-id="1824" instrument_node="">
</span><img alt="Benjamin H. Barton" data-dcnode-id="1823" height="204" id="Image145_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TT55vcJ4UVI/AAAAAAAAH68/MJqmAc9IFi4/s1600/1911_bible_student_convention_pictures_0014.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1822" instrument_node="">
</span></a><span data-dcnode-id="1820" instrument_node="">
</span><br data-dcnode-id="1819"><span data-dcnode-id="1818" instrument_node="">
</span><span class="caption" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">On Sunday, June 18, the Philadelphia Friends were called to order at the close of the evening service and informed that our dear Brother Barton had suffered a complete breakdown. Prayer was offered in his behalf. On the Sunday following, the Friends were informed that our dear Brother was on his way to Portland, Ore., to take two weeks' treatment from a physician there, after which he was to make his way home by slow stages. On the next Sunday, the Friends were informed that Brother Barton had indeed arrived "home," having passed beyond the veil the day before, Saturday, June 24.</span></span><span data-dcnode-id="1815" instrument_node="">
</span></div><span data-dcnode-id="1813" instrument_node="">
</span><div class="clear" data-dcnode-id="1812"></div><span data-dcnode-id="1811" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1790" data-version="1" id="Image180"><span data-dcnode-id="1809" instrument_node="">
</span><h2 data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">J. F. Rutherford, on with the work</span></h2><span data-dcnode-id="1806" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1794"><span data-dcnode-id="1805" instrument_node="">
</span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/j-f-rutherford-on-with-work.html"><span data-dcnode-id="1804" instrument_node="">
</span><img alt="J. F. Rutherford, on with the work" data-dcnode-id="1803" height="222" id="Image180_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TMW18u4Jb1I/AAAAAAAAGP8/6bzP-oz_920/S760/%21B00MfbwEWk~%2524%28KGrHqJ%2C%21g4Ew5GZJQsfBMb%252BT7zEHQ~~_3.jpg&amp;raw" width="150"><span data-dcnode-id="1802" instrument_node="">
</span></a><span data-dcnode-id="1800" instrument_node="">
</span><br data-dcnode-id="1799"><span data-dcnode-id="1798" instrument_node="">
</span><span class="caption" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Brother Rutherford was determined to press on with the work of Kingdom-preaching. For years, under the guidance of Jehovah’s holy spirit, the Bible Students had carried on a remarkably extensive campaign in declaring God’s truth. Why, from 1870 through 1913 they had distributed 228,255,719 tracts and pamphlets and 6,950,292 bound books. In the momentous year 1914 alone Jehovah’s servants put out 71,285,037 tracts and pamphlets and 992,845 bound books. The years 1915 and 1916, however, saw a decline in publishing activities because of the expanding of World War I and the breakdown of communications. In 1917, though, the work began showing an upward trend.</span></span><span data-dcnode-id="1795" instrument_node="">
</span></div><span data-dcnode-id="1793" instrument_node="">
</span><div class="clear" data-dcnode-id="1792"></div><span data-dcnode-id="1791" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1770" data-version="1" id="Image122"><span data-dcnode-id="1789" instrument_node="">
</span><h2 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">The Finished Mystery (1917)</span></h2><span data-dcnode-id="1786" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1774"><span data-dcnode-id="1785" instrument_node="">
</span><a data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/07/finished-mystery.html"><span data-dcnode-id="1784" instrument_node="">
</span><img alt="The Finished Mystery (1917)" data-dcnode-id="1783" height="211" id="Image122_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TUdUj_F6XKI/AAAAAAAAID8/5ulHnGMbNx4/s1600/FM.jpg&amp;raw" width="150"><span data-dcnode-id="1782" instrument_node="">
</span></a><span data-dcnode-id="1780" instrument_node="">
</span><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">
</span><span class="caption" data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Charles Taze Russell had written six volumes of Millennial Dawn, or Studies in the Scriptures, but often spoke about writing a seventh volume. “Whenever I find the key,” said he, “I will write the Seventh Volume; and if the Lord gives the key to someone else, he can write it.” The Society’s officers arranged to have two Bible Students, Clayton J. Woodworth and George H. Fisher, compile a book consisting of commentaries on Revelation, The Song of Solomon and Ezekiel.</span></span><span data-dcnode-id="1775" instrument_node="">
</span></div><span data-dcnode-id="1773" instrument_node="">
</span><div class="clear" data-dcnode-id="1772"></div><span data-dcnode-id="1771" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1750" data-version="1" id="Image64"><span data-dcnode-id="1769" instrument_node="">
</span><h2 data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">The Rutherford - Troy Debate (1915 Trinity Auditorium)</span></h2><span data-dcnode-id="1766" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1754"><span data-dcnode-id="1765" instrument_node="">
</span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/rutherford-troy-debate-dear-brother.html"><span data-dcnode-id="1764" instrument_node="">
</span><img alt="The Rutherford - Troy Debate (1915 Trinity Auditorium)" data-dcnode-id="1763" height="253" id="Image64_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-NagkocCircI/ThE52tsnd0I/AAAAAAAAJUI/PXBN2nwGGGU/s253/Troy.jpg&amp;raw" style="visibility: visible;" width="166"><span data-dcnode-id="1762" instrument_node="">
</span></a><span data-dcnode-id="1760" instrument_node="">
</span><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node="">
</span><span class="caption" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">I must tell you how the Adversary did not succeed for once. My opponent was well prepared to assault you personally. I judged so from the interviews he had given the press two days before the debate. I said nothing then, but waited my time. About three minutes before we went on the platform for the first night's discussion I called Brother Troy, my opponent, and two of his friends and two of our friends into a side room. You will recall that we had entered into a thousand-dollar obligation, with securities, that we would refrain from personalities. I then said: "Brother Troy, I desire to be absolutely frank with you and therefore I say this to you before we go on the platform. From your interviews with the press I judge that you intend to assault Pastor Russell from the platform. Of course, you can pursue that course if you wish, but the first time you attempt it I am going to have your bond forfeited."</span></span><span data-dcnode-id="1755" instrument_node="">
</span></div><span data-dcnode-id="1753" instrument_node="">
</span><div class="clear" data-dcnode-id="1752"></div><span data-dcnode-id="1751" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1730" data-version="1" id="Image158"><span data-dcnode-id="1749" instrument_node="">
</span><h2 data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Radio Pioneer (WBBR 1924 - 1957)</span></h2><span data-dcnode-id="1746" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1734"><span data-dcnode-id="1745" instrument_node="">
</span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/09/radio-pioneer-lifts-up-its-voice.html"><span data-dcnode-id="1744" instrument_node="">
</span><img alt="Radio Pioneer (WBBR 1924 - 1957)" data-dcnode-id="1743" height="190" id="Image158_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-0w2HmMKIJZ4/ThEdeqgP5FI/AAAAAAAAJPw/iFUngIHVzYM/s253/%252521BrQhG0%252521%252521mk%25257E%252524%252528KGrHqYH-C4EvEtL-5yEBLy46%252529W8Yg%25257E%25257E_12.jpg&amp;raw" width="253"><span data-dcnode-id="1742" instrument_node="">
</span></a><span data-dcnode-id="1740" instrument_node="">
</span><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">
</span><span class="caption" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">For some thirty-three years WBBR brought glory to Jehovah and spread Bible truth far and wide. It began broadcasting with a 500-watt transmitter. Three years later, a new 1,000-watt transmitter was purchased. In 1947 the Federal Communications Commission granted WBBR permission to increase its power to 5,000 watts, providing this would not interfere with other stations operating on the same frequency in widely scattered parts of the United States. Installation of a three-tower directional antenna system solved that problem and this array increased the 5,000-watt power to more than 25,000 watts in the northeasterly direction where the population was the greatest. WBBR was heard in the area of metropolitan New York and the adjoining states of New Jersey and Connecticut. However, letters concerning its programs were received from England, Alaska, California and other distant places.</span></span><span data-dcnode-id="1735" instrument_node="">
</span></div><span data-dcnode-id="1733" instrument_node="">
</span><div class="clear" data-dcnode-id="1732"></div><span data-dcnode-id="1731" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1710" data-version="1" id="Image159"><span data-dcnode-id="1729" instrument_node="">
</span><h2 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Millions now living will never die</span></h2><span data-dcnode-id="1726" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1714"><span data-dcnode-id="1725" instrument_node="">
</span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/millions-now-living-will-never-die.html"><span data-dcnode-id="1724" instrument_node="">
</span><img alt="Millions now living will never die" data-dcnode-id="1723" height="162" id="Image159_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-R4-QZ3HMDH0/ThEvz0wLjUI/AAAAAAAAJTI/9-MeSH9OKrg/s253/millions%25252520now%25252520living.jpg&amp;raw" width="253"><span data-dcnode-id="1722" instrument_node="">
</span></a><span data-dcnode-id="1720" instrument_node="">
</span><br data-dcnode-id="1719"><span data-dcnode-id="1718" instrument_node="">
</span><span class="caption" data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">At the time, it was believed that faithful men of old times, such as Abraham, Joseph, and David, would be resurrected before the end of this system of things and would serve as “princes in all the earth,” in fulfillment of Psalm 45:16. This view was adjusted in 1950, when further study of the Scriptures indicated that those earthly forefathers of Jesus Christ would be resurrected after Armageddon.—See “The Watchtower,” November 1, 1950, pages 414-17.</span></span><span data-dcnode-id="1715" instrument_node="">
</span></div><span data-dcnode-id="1713" instrument_node="">
</span><div class="clear" data-dcnode-id="1712"></div><span data-dcnode-id="1711" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1690" data-version="1" id="Image116"><span data-dcnode-id="1709" instrument_node="">
</span><h2 data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Beth-Sarim (1929 - 1947)</span></h2><span data-dcnode-id="1706" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1694"><span data-dcnode-id="1705" instrument_node="">
</span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/01/beth-sarim.html"><span data-dcnode-id="1704" instrument_node="">
</span><img alt="Beth-Sarim (1929 - 1947)" data-dcnode-id="1703" height="167" id="Image116_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-vNH_BCcnle8/Tit55emWZbI/AAAAAAAAJk0/oIuwVq5qR8w/s253/beth_sarim.jpg&amp;raw" width="253"><span data-dcnode-id="1702" instrument_node="">
</span></a><span data-dcnode-id="1700" instrument_node="">
</span><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">
</span><span class="caption" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Brother Rutherford had a severe case of pneumonia after his release from unjust imprisonment in 1919. Thereafter, he had only one good lung. In the 1920’s, under a doctor’s treatment, he went to San Diego, California, and the doctor urged him to spend as much time as possible there. From 1929 on, Brother Rutherford spent the winters working at a San Diego residence he had named Beth-Sarim.</span></span><span data-dcnode-id="1695" instrument_node="">
</span></div><span data-dcnode-id="1693" instrument_node="">
</span><div class="clear" data-dcnode-id="1692"></div><span data-dcnode-id="1691" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1670" data-version="1" id="Image115"><span data-dcnode-id="1689" instrument_node="">
</span><h2 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">From Willer  Miller to Charles Taze Russell</span></h2><span data-dcnode-id="1686" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1674"><span data-dcnode-id="1685" instrument_node="">
</span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/from-william-miller-to-charles-t.html"><span data-dcnode-id="1684" instrument_node="">
</span><img alt="From Willer  Miller to Charles Taze Russell" data-dcnode-id="1683" height="227" id="Image115_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-s7FznqzFMDs/ThE0bivc5wI/AAAAAAAAJTw/bHjEjL3VRFc/s253/Dann20ist20das20geheimniss207.jpg&amp;raw" width="253"><span data-dcnode-id="1682" instrument_node="">
</span></a><span data-dcnode-id="1680" instrument_node="">
</span><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">
</span><span class="caption" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Evidently, then, the launching of the Millerite movement did not turn out to be the midnight cry, “Here is the bridegroom!” The heavenly Bridegroom did not appear in the flesh visibly to those Adventists and take them in a rapture to their desired heavenly home, in 1843. And yet Bible study continued on. Thirty years later found a small group of men, not associated with the Adventists or affiliated with any of the religious sects of Christendom, studying the Holy Scriptures at Pittsburgh (Allegheny), Pennsylvania, U.S.A. They studied independently so as to avoid looking at the Bible through sectarian spectacles. Among these men was one Charles Taze Russell, just entered into his twenties.</span></span><span data-dcnode-id="1675" instrument_node="">
</span></div><span data-dcnode-id="1673" instrument_node="">
</span><div class="clear" data-dcnode-id="1672"></div><span data-dcnode-id="1671" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1650" data-version="1" id="Image111"><span data-dcnode-id="1669" instrument_node="">
</span><h2 data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Pastor Russell's view of William Miller</span></h2><span data-dcnode-id="1666" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1654"><span data-dcnode-id="1665" instrument_node="">
</span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/pastor-russells-view-of-william-miller_10.html"><span data-dcnode-id="1664" instrument_node="">
</span><img alt="Pastor Russell's view of William Miller" data-dcnode-id="1663" height="226" id="Image111_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-pMm93W12AOc/Tc18CW4RHhI/AAAAAAAAJCU/pZ-9QHERRlk/s1600/WMCD.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1662" instrument_node="">
</span></a><span data-dcnode-id="1660" instrument_node="">
</span><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">
</span><span class="caption" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">While, as the reader will have observed, we disagree with Mr. Miller’s interpretations and deductions, on almost every point—viewing the object, as well as the manner and the time, of our Lord’s coming, in a very different light—yet we recognize that movement as being in God’s order, and as doing a very important work in the separating, purifying, refining, and thus making ready, of a waiting people prepared for the Lord.</span></span><span data-dcnode-id="1655" instrument_node="">
</span></div><span data-dcnode-id="1653" instrument_node="">
</span><div class="clear" data-dcnode-id="1652"></div><span data-dcnode-id="1651" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1630" data-version="1" id="Image35"><span data-dcnode-id="1649" instrument_node="">
</span><h2 data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">William Miller: Herald of the Second Advent</span></h2><span data-dcnode-id="1646" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1634"><span data-dcnode-id="1645" instrument_node="">
</span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/12/william-miller-herald-of-second-advent.html"><span data-dcnode-id="1644" instrument_node="">
</span><img alt="William Miller: Herald of the Second Advent" data-dcnode-id="1643" height="226" id="Image35_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-ru6LCvNLovo/Tc17kW_5ViI/AAAAAAAAJB8/_n_zKCY5OG8/s1600/MillerWilliam002_big.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1642" instrument_node="">
</span></a><span data-dcnode-id="1640" instrument_node="">
</span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node="">
</span><span class="caption" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">In 1832 Miller published a series of eight articles in the Vermont Telegraph, a Baptist weekly. In 1833 he incorporated these articles into a 64-page pamphlet entitled Evidences from Scripture and History of the Second Coming of Christ About the Year A.D. 1843, and of His Personal Reign for 1,000 Years. In that year he was given a license to preach by the Baptists, and by the close of 1834 he was devoting his whole time to preaching. During 1836 he brought out his “lectures” in a book, which was later reprinted several times and enlarged from 16 to 19 lectures, with a supplement containing chronology and charts.</span></span><span data-dcnode-id="1635" instrument_node="">
</span></div><span data-dcnode-id="1633" instrument_node="">
</span><div class="clear" data-dcnode-id="1632"></div><span data-dcnode-id="1631" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1610" data-version="1" id="Image10"><span data-dcnode-id="1629" instrument_node="">
</span><h2 data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">William Miller, End of the World in 1843/44</span></h2><span data-dcnode-id="1626" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1614"><span data-dcnode-id="1625" instrument_node="">
</span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/miller-william-founder-of-sect-of.html"><span data-dcnode-id="1624" instrument_node="">
</span><img alt="William Miller, End of the World in 1843/44" data-dcnode-id="1623" height="208" id="Image10_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TORIy5HMIKI/AAAAAAAAGqk/80lg4675A40/S1600-R/001.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1622" instrument_node="">
</span></a><span data-dcnode-id="1620" instrument_node="">
</span><br data-dcnode-id="1619"><span data-dcnode-id="1618" instrument_node="">
</span><span class="caption" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Miller began preaching in small towns at first, and then, with the help of Joshua Himes, moved to the larger cities, bringing his second advent message to many thousands. Hundreds of ministers and laymen joined in preaching the message. By the expected time for Christ's return, Miller had between 50,000 to 100,000 followers, commonly known as Millerites. He did not set a specific date for the second advent. At first he said only that it would be "about 1843." He finally set an ultimate time in the spring of 1844. Others picked the more precise date of October 22, 1844, which Miller and many of the leaders of the first movement accepted shortly before the date arrived.</span></span><span data-dcnode-id="1615" instrument_node="">
</span></div><span data-dcnode-id="1613" instrument_node="">
