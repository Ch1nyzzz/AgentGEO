</span><div class="clear" data-dcnode-id="3217"></div><span data-dcnode-id="3216" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3195" data-version="1" id="Image182"><span data-dcnode-id="3214" instrument_node="">
</span><h2 data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">What is God's Kingdom</span></h2><span data-dcnode-id="3211" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3199"><span data-dcnode-id="3210" instrument_node="">
</span><a data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/05/what-is-gods-kingdom.html"><span data-dcnode-id="3209" instrument_node="">
</span><img alt="What is God's Kingdom" data-dcnode-id="3208" height="195" id="Image182_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TS1JPo0SHrI/AAAAAAAAHo4/hFSOQ-57yBk/S1600-R/001.jpg&amp;raw" width="150"><span data-dcnode-id="3207" instrument_node="">
</span></a><span data-dcnode-id="3205" instrument_node="">
</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node="">
</span><span class="caption" data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">WHAT was the theme of Jesus’ preaching? According to Jesus himself, it was God’s Kingdom. (Luke 4:43) When people listened to him speak, they surely heard many references to that Kingdom. Were they puzzled or mystified? Did they ask him what this Kingdom was? No. The Gospels record no such questions. So was God’s Kingdom a familiar concept to those people?</span></span><span data-dcnode-id="3200" instrument_node="">
</span></div><span data-dcnode-id="3198" instrument_node="">
</span><div class="clear" data-dcnode-id="3197"></div><span data-dcnode-id="3196" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3175" data-version="1" id="Image181"><span data-dcnode-id="3194" instrument_node="">
</span><h2 data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Will Planet Earth be destroyed?</span></h2><span data-dcnode-id="3191" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3179"><span data-dcnode-id="3190" instrument_node="">
</span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/06/ccc.html"><span data-dcnode-id="3189" instrument_node="">
</span><img alt="Will Planet Earth be destroyed?" data-dcnode-id="3188" height="209" id="Image181_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TMY33orXrDI/AAAAAAAAGQ8/vmjwy6YR8hU/S1600-R/001.jpg&amp;raw" width="150"><span data-dcnode-id="3187" instrument_node="">
</span></a><span data-dcnode-id="3185" instrument_node="">
</span><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">
</span><span class="caption" data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Prov. 2:21, 22, KJ: “The upright shall dwell in the land [“on earth,” NE], and the perfect [“blameless men,” NE] shall remain in it. But the wicked shall be cut off from the earth, and the transgressors shall be rooted out of it.” (Notice that it does not say the blameless will return to the earth but that they “shall remain in it.”) Isa. 45:18: “This is what Jehovah has said, the Creator of the heavens, He the true God, the Former of the earth and the Maker of it, He the One who firmly established it, who did not create it simply for nothing, who formed it even to be inhabited: ‘I am Jehovah, and there is no one else.’” (See also Isaiah 55:10, 11.)</span></span><span data-dcnode-id="3180" instrument_node="">
</span></div><span data-dcnode-id="3178" instrument_node="">
</span><div class="clear" data-dcnode-id="3177"></div><span data-dcnode-id="3176" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3155" data-version="1" id="Image33"><span data-dcnode-id="3174" instrument_node="">
</span><h2 data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Jesus - Why he is so important?</span></h2><span data-dcnode-id="3171" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3159"><span data-dcnode-id="3170" instrument_node="">
</span><a data-dcnode-id="3166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/09/for-2000-years-now-much-attention-has.html"><span data-dcnode-id="3169" instrument_node="">
</span><img alt="Jesus - Why he is so important?" data-dcnode-id="3168" height="190" id="Image33_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TSAGK7iI9dI/AAAAAAAAHjI/JyX07O9iHbI/S1600-R/b.jpg&amp;raw" width="150"><span data-dcnode-id="3167" instrument_node="">
</span></a><span data-dcnode-id="3165" instrument_node="">
</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node="">
</span><span class="caption" data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">FOR 2,000 years now, much attention has been focused on the birth of Jesus. According to the first-century physician Luke, a young virgin named Mary was told by an angel: “Look! you will conceive in your womb and give birth to a son, and you are to call his name Jesus.” What did the angelic messenger say about Jesus? “This one will be great and will be called Son of the Most High,” he said. “He [Jesus] will rule as king,” and “there will be no end of his kingdom.”—Luke 1:31-33.</span></span><span data-dcnode-id="3160" instrument_node="">
</span></div><span data-dcnode-id="3158" instrument_node="">
</span><div class="clear" data-dcnode-id="3157"></div><span data-dcnode-id="3156" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3135" data-version="1" id="Image146"><span data-dcnode-id="3154" instrument_node="">
</span><h2 data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">No One Has Love Greater Then This</span></h2><span data-dcnode-id="3151" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3139"><span data-dcnode-id="3150" instrument_node="">
</span><a data-dcnode-id="3146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/05/no-one-has-love-greater-than-this.html"><span data-dcnode-id="3149" instrument_node="">
</span><img alt="No One Has Love Greater Then This" data-dcnode-id="3148" height="195" id="Image146_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-4l4Phliy8zw/TVjN58lIY6I/AAAAAAAAIOc/BChl3ni1lkY/s1600/008.jpg&amp;raw" width="150"><span data-dcnode-id="3147" instrument_node="">
</span></a><span data-dcnode-id="3145" instrument_node="">
</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node="">
</span><span class="caption" data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">By surrendering his life, Jesus proved himself a real friend to his followers. “No one has love greater than this,” he said, “that someone should surrender his soul in behalf of his friends.” (John 15:13) That raises some important questions. Was it really necessary for Jesus to go through all that suffering and then to die? Why was he willing to do so? As “his friends” and followers, how can we imitate his example?</span></span><span data-dcnode-id="3140" instrument_node="">
</span></div><span data-dcnode-id="3138" instrument_node="">
</span><div class="clear" data-dcnode-id="3137"></div><span data-dcnode-id="3136" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3115" data-version="1" id="Image5"><span data-dcnode-id="3134" instrument_node="">
</span><h2 data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Reliving Jesus' Last Days on Earth</span></h2><span data-dcnode-id="3131" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3119"><span data-dcnode-id="3130" instrument_node="">
</span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.watchtower.org/e/19980315/article_01.htm"><span data-dcnode-id="3129" instrument_node="">
</span><img alt="Reliving Jesus' Last Days on Earth" data-dcnode-id="3128" height="253" id="Image5_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-rh8Q24vFilY/ThYO-D-TO4I/AAAAAAAAJYo/YF0q5-JFfgM/s253/%252524%252528KGrHqN%25252C%252521isE3QvmLk8bBN7vjDP%252529Lw%25257E%25257E0_3.jpg&amp;raw" width="196"><span data-dcnode-id="3127" instrument_node="">
</span></a><span data-dcnode-id="3125" instrument_node="">
</span><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">
</span><span class="caption" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">By his willing participation in the divine arrangement, God’s Son “emptied himself” of his heavenly nature. (Philippians 2:7) Jehovah transferred the life-force and the personality pattern of his firstborn heavenly Son to the womb of a Jewish virgin named Mary. Holy spirit then ‘overshadowed her,’ guaranteeing that the child growing in her womb would be holy, absolutely free of sin. (Luke 1:35; 1&nbsp;Peter 2:22) As a man, he would be called Jesus. But in a legal sense, he could be called ‘the second Adam,’ for he corresponded perfectly to Adam. (1&nbsp;Corinthians 15:45,&nbsp;47) Jesus could thus offer himself up in sacrifice as “an unblemished and spotless lamb,” a ransom for sinful mankind.—1&nbsp;Peter 1:18,&nbsp;19.</span></span><span data-dcnode-id="3120" instrument_node="">
</span></div><span data-dcnode-id="3118" instrument_node="">
</span><div class="clear" data-dcnode-id="3117"></div><span data-dcnode-id="3116" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3095" data-version="1" id="Image32"><span data-dcnode-id="3114" instrument_node="">
</span><h2 data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">The Ransom and YOU</span></h2><span data-dcnode-id="3111" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3099"><span data-dcnode-id="3110" instrument_node="">
</span><a data-dcnode-id="3106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/03/ransom-and-you.html"><span data-dcnode-id="3109" instrument_node="">
</span><img alt="The Ransom and YOU" data-dcnode-id="3108" height="213" id="Image32_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TRr6PoIjgFI/AAAAAAAAHdM/VnHRaLSdHTM/S1600-R/mi-10-front.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="3107" instrument_node="">
</span></a><span data-dcnode-id="3105" instrument_node="">
</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">
</span><span class="caption" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Definition: A price paid to buy back or to bring about release from some obligation or undesirable circumstance. The most significant ransom price is that of the shed blood of Jesus Christ. By paying over the value of that ransom in heaven, Jesus opened the way for Adam’s offspring to be delivered from the sin and death that we all inherit because of the sin of our forefather Adam.</span></span><span data-dcnode-id="3100" instrument_node="">
</span></div><span data-dcnode-id="3098" instrument_node="">
</span><div class="clear" data-dcnode-id="3097"></div><span data-dcnode-id="3096" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3075" data-version="1" id="Image4"><span data-dcnode-id="3094" instrument_node="">
</span><h2 data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">The Greatest Man</span></h2><span data-dcnode-id="3091" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3079"><span data-dcnode-id="3090" instrument_node="">
</span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.watchtower.org/e/19960201/article_02.htm"><span data-dcnode-id="3089" instrument_node="">
</span><img alt="The Greatest Man" data-dcnode-id="3088" height="180" id="Image4_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/SENX6c6q5lI/AAAAAAAAACA/SigeT2hJ9EA/S180/frontpage1memorialinvitationchristjesusdiedsecondadamredeemedhumanmankindfromadamicsinheldapril022007alocalkingdomhall.jpg&amp;raw" width="136"><span data-dcnode-id="3087" instrument_node="">
</span></a><span data-dcnode-id="3085" instrument_node="">
</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">
</span><span class="caption" data-dcnode-id="3081"><span data-dcnode-id="3082" instrument_node="">The Bible writer James acknowledges that “we all stumble many times.” (James 3:2) Because of Christ’s ransom, however, our errors can be pardoned. John writes: “If anyone does commit a sin, we have a helper with the Father, Jesus Christ, a righteous one. And he is a propitiatory sacrifice for our sins.” (1&nbsp;John 2:1,&nbsp;2) Of course, we should not take a casual view of sin. (Jude 4; compare 1&nbsp;Corinthians 9:27.) However, if we err, we can pour out our heart to Jehovah, confident that he is “ready to forgive.” (Psalm 86:5; 130:3, 4; Isaiah 1:18; 55:7; Acts 3:19) Thus the ransom enables us to serve God with a clean conscience and makes it possible for us to approach him in prayer through the name of Jesus Christ.—John 14:13, 14; Hebrews 9:14.</span></span><span data-dcnode-id="3080" instrument_node="">
</span></div><span data-dcnode-id="3078" instrument_node="">
</span><div class="clear" data-dcnode-id="3077"></div><span data-dcnode-id="3076" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3055" data-version="1" id="Image153"><span data-dcnode-id="3074" instrument_node="">
</span><h2 data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Do Jehovah's Witnesses deny the Ransom?</span></h2><span data-dcnode-id="3071" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3059"><span data-dcnode-id="3070" instrument_node="">
</span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/bible-students-teach-false-view-that.html"><span data-dcnode-id="3069" instrument_node="">
</span><img alt="Do Jehovah's Witnesses deny the Ransom?" data-dcnode-id="3068" height="188" id="Image153_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TICHxvefc1I/AAAAAAAAFE0/U4r1JxZJ-kQ/S760/feature19980315_03.jpg&amp;raw" width="150"><span data-dcnode-id="3067" instrument_node="">
</span></a><span data-dcnode-id="3065" instrument_node="">
</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">
</span><span class="caption" data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">The Bible Students teach the false view that Jehovah's Witnesses deny the Ransom. In reality the Jehovah's Witnesses do not deny the Ransom, we just reject the Bible Students understanding of it. The Bible Students teach that Jesus died "For" Adam, this would then cause a chain reaction that would free "All" of mankind. However the Bible states that Jesus died for us as individuals. The Jehovah's Witnesses love Jesus, and yet many Bible Students hate us. The Jews reject Jesus and these same Bible Students love them. Funny how that works.</span></span><span data-dcnode-id="3060" instrument_node="">
</span></div><span data-dcnode-id="3058" instrument_node="">
</span><div class="clear" data-dcnode-id="3057"></div><span data-dcnode-id="3056" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3035" data-version="1" id="Image92"><span data-dcnode-id="3054" instrument_node="">
</span><h2 data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">God's View of Blood</span></h2><span data-dcnode-id="3051" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3039"><span data-dcnode-id="3050" instrument_node="">
</span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//godsviewofblood.blogspot.com/"><span data-dcnode-id="3049" instrument_node="">
</span><img alt="God's View of Blood" data-dcnode-id="3048" height="253" id="Image92_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-C-Bxe-pfhnA/ThE5LMV33uI/AAAAAAAAJUA/bIQArkn5liI/s253/dracula_1931_poster_05.jpg&amp;raw" width="189"><span data-dcnode-id="3047" instrument_node="">
</span></a><span data-dcnode-id="3045" instrument_node="">
</span><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">
</span><span class="caption" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">"You shall not eat flesh with its life, that is, its blood." (Gen. 9:4) RSV; "YOU must not eat the blood of ANY sort of flesh, because the soul of EVERY sort of flesh is its blood. Anyone eating it will be cut off." (Lev. 17:13, 14) "Behold, the people sin against Jehovah, in that they eat with the blood." (1 Sam. 14:33) ASV; "Keep abstaining from...blood.” Acts 15:29</span></span><span data-dcnode-id="3040" instrument_node="">
</span></div><span data-dcnode-id="3038" instrument_node="">
</span><div class="clear" data-dcnode-id="3037"></div><span data-dcnode-id="3036" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="3015" data-version="1" id="Image109"><span data-dcnode-id="3034" instrument_node="">
</span><h2 data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Did Jesus die on a Cross or Stake (Stauros)</span></h2><span data-dcnode-id="3031" instrument_node="">
</span><div class="widget-content" data-dcnode-id="3019"><span data-dcnode-id="3030" instrument_node="">
</span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/09/cross-or-stake-stauros.html"><span data-dcnode-id="3029" instrument_node="">
</span><img alt="Did Jesus die on a Cross or Stake (Stauros)" data-dcnode-id="3028" height="253" id="Image109_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-idxoi2fbo70/ThTxhB6rSEI/AAAAAAAAJYY/GUkikWSFJ0g/s253/stauros2.jpg&amp;raw" style="visibility: visible;" width="139"><span data-dcnode-id="3027" instrument_node="">
</span></a><span data-dcnode-id="3025" instrument_node="">
</span><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">
</span><span class="caption" data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">The Greek word rendered “cross” in many modern Bible versions (“torture stake” in NW) is stau‧ros′. In classical Greek, this word meant merely an upright stake, or pale. Later it also came to be used for an execution stake having a crosspiece. The Imperial Bible-Dictionary acknowledges this, saying: “The Greek word for cross, [stau‧ros′], properly signified a stake, an upright pole, or piece of paling, on which anything might be hung, or which might be used in impaling [fencing in] a piece of ground. . . . Even amongst the Romans the crux (from which our cross is derived) appears to have been originally an upright pole.”—Edited by P. Fairbairn (London, 1874), Vol. I, p. 376.</span></span><span data-dcnode-id="3020" instrument_node="">
</span></div><span data-dcnode-id="3018" instrument_node="">
</span><div class="clear" data-dcnode-id="3017"></div><span data-dcnode-id="3016" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2995" data-version="1" id="Image173"><span data-dcnode-id="3014" instrument_node="">
</span><h2 data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">The Return of Christ</span></h2><span data-dcnode-id="3011" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2999"><span data-dcnode-id="3010" instrument_node="">
</span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/11/return-of-christ.html"><span data-dcnode-id="3009" instrument_node="">
</span><img alt="The Return of Christ" data-dcnode-id="3008" height="155" id="Image173_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TSeU7gTNooI/AAAAAAAAHlg/LTAxwUsVzKs/S1600-R/cross_flower.jpg&amp;raw" width="150"><span data-dcnode-id="3007" instrument_node="">
</span></a><span data-dcnode-id="3005" instrument_node="">
</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">
</span><span class="caption" data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Before leaving the earth, Jesus Christ promised to return. Thrilling events in connection with God’s Kingdom are associated with that promise. It should be noted that there is a difference between coming and presence. Thus, while a person’s coming (associated with his arrival or return) occurs at a given time, his presence may thereafter extend over a period of years.</span></span><span data-dcnode-id="3000" instrument_node="">
</span></div><span data-dcnode-id="2998" instrument_node="">
</span><div class="clear" data-dcnode-id="2997"></div><span data-dcnode-id="2996" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2975" data-version="1" id="Image107"><span data-dcnode-id="2994" instrument_node="">
</span><h2 data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">Was Jesus a Spirit or Wasn't He?</span></h2><span data-dcnode-id="2991" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2979"><span data-dcnode-id="2990" instrument_node="">
</span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/was-jesus-spirit-or-wasnt-he.html"><span data-dcnode-id="2989" instrument_node="">
</span><img alt="Was Jesus a Spirit or Wasn't He?" data-dcnode-id="2988" height="200" id="Image107_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/TF2RWlb6--I/AAAAAAAAEc8/yKaZUK4VEZM/S760/ascension.jpg&amp;raw" width="150"><span data-dcnode-id="2987" instrument_node="">
</span></a><span data-dcnode-id="2985" instrument_node="">
</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node="">
</span><span class="caption" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">If he was God in the flesh - experiencing two natures simultaneously - then he was a spirit at his resurrection since God is a spirit. On the other hand, if indeed he was, in reality, not a spirit but a "glorified body", then he was not a God-man in the sense Trinitarians understand it, since a God-man is a spirit clothed in flesh. They cannot have it both ways.</span></span><span data-dcnode-id="2980" instrument_node="">
</span></div><span data-dcnode-id="2978" instrument_node="">
</span><div class="clear" data-dcnode-id="2977"></div><span data-dcnode-id="2976" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2955" data-version="1" id="Image98"><span data-dcnode-id="2974" instrument_node="">
</span><h2 data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">Must Christians keep a weekly sabbath?</span></h2><span data-dcnode-id="2971" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2959"><span data-dcnode-id="2970" instrument_node="">
</span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/must-christians-keep-weekly-sabbath.html"><span data-dcnode-id="2969" instrument_node="">
</span><img alt="Must Christians keep a weekly sabbath?" data-dcnode-id="2968" height="253" id="Image98_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-pRIgslM7qAk/ThE5BuQ7MYI/AAAAAAAAJT4/BY1_a8lR1hA/s253/moses.jpg&amp;raw" style="visibility: visible;" width="202"><span data-dcnode-id="2967" instrument_node="">
</span></a><span data-dcnode-id="2965" instrument_node="">
</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">
</span><span class="caption" data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Rom. 10:4: “Christ is the end of the Law, so that everyone exercising faith may have righteousness.” (Sabbath keeping was a part of that Law. God used Christ to bring that Law to its end. Our having a righteous standing with God depends on faith in Christ, not on keeping a weekly sabbath.) (Also Galatians 4:9-11; Ephesians 2:13-16)</span></span><span data-dcnode-id="2960" instrument_node="">
</span></div><span data-dcnode-id="2958" instrument_node="">
</span><div class="clear" data-dcnode-id="2957"></div><span data-dcnode-id="2956" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2935" data-version="1" id="Image19"><span data-dcnode-id="2954" instrument_node="">
</span><h2 data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Jehovah's Witnesses: Victims of the Nazi Era (1933 - 1945)</span></h2><span data-dcnode-id="2951" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2939"><span data-dcnode-id="2950" instrument_node="">
</span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ushmm.org/education/resource/jehovahs/jehovahsw.php"><span data-dcnode-id="2949" instrument_node="">
</span><img alt="Jehovah's Witnesses: Victims of the Nazi Era (1933 - 1945)" data-dcnode-id="2948" height="253" id="Image19_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-9XxAR1HYeKc/ThTqmqoEFZI/AAAAAAAAJXA/0gGWfRDDPko/s253/001.jpg&amp;raw" style="visibility: visible;" width="197"><span data-dcnode-id="2947" instrument_node="">
</span></a><span data-dcnode-id="2945" instrument_node="">
</span><br data-dcnode-id="2944"><span data-dcnode-id="2943" instrument_node="">
</span><span class="caption" data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">The Nazi regime targeted Jehovah's Witnesses for persecution because they refused, out of religious conviction, to swear loyalty to a worldly government or to serve in its armed forces. Jehovah's Witnesses also engaged in missionary activity to win adherents for the faith. The Nazis perceived the refusal to commit to the state and efforts to proselytize as overtly political and subversive acts. Unlike Jews and Roma (Gypsies), whom the Nazis targeted for perceived racial reasons, Jehovah's Witnesses had the option to avoid persecution and personal harm by submitting to state authority and serving in the armed forces. Since such submission would violate their religious beliefs, the vast majority of Jehovah's Witnesses refused to abandon their faith even in the face of persecution, torture in concentration camps, or death.</span></span><span data-dcnode-id="2940" instrument_node="">
</span></div><span data-dcnode-id="2938" instrument_node="">
</span><div class="clear" data-dcnode-id="2937"></div><span data-dcnode-id="2936" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2915" data-version="1" id="Image20"><span data-dcnode-id="2934" instrument_node="">
</span><h2 data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">What does the Bible really teach? (read online)</span></h2><span data-dcnode-id="2931" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2919"><span data-dcnode-id="2930" instrument_node="">
</span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jw.org/en/publications/books/bible-teach/is-this-what-god-purposed/"><span data-dcnode-id="2929" instrument_node="">
</span><img alt="What does the Bible really teach? (read online)" data-dcnode-id="2928" height="214" id="Image20_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/SoeJfm4zY_I/AAAAAAAACDU/HeZB0ZtiaPI/S214/2600041520_ea0cb82d73.jpg&amp;raw" style="visibility: visible;" width="148"><span data-dcnode-id="2927" instrument_node="">
</span></a><span data-dcnode-id="2925" instrument_node="">
</span><br data-dcnode-id="2924"><span data-dcnode-id="2923" instrument_node="">
</span><span class="caption" data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">The fact that you are reading this book shows that you would like to find out what the Bible teaches. This book will help you. Notice that the paragraphs have corresponding questions at the bottom of the page. Millions have enjoyed using the question-and-answer method when discussing the Bible with Jehovah‘s Witnesses. We hope you will too. May you have God‘s blessing as you now enjoy the thrilling and satisfying experience of learning what the Bible really teaches!</span></span><span data-dcnode-id="2920" instrument_node="">

</span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jw.org/en/publications/books/know-the-truth/1102008390/"><span data-dcnode-id="2909" instrument_node="">
</span><img alt="Would You Like to Know the Truth?" data-dcnode-id="2908" height="253" id="Image151_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-Q8RQ1D3xPow/TsredXlaQmI/AAAAAAAAKX0/_mKaeevpDNs/s253/2963337802_c27ddaf7bd.jpg&amp;raw" style="visibility: visible;" width="206"><span data-dcnode-id="2907" instrument_node="">
</span></a><span data-dcnode-id="2905" instrument_node="">
</span><br data-dcnode-id="2904"><span data-dcnode-id="2903" instrument_node="">
</span><span class="caption" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">THE truth about what? About some of the most important questions that humans have ever asked. Perhaps you have wondered about such questions as these:</span></span><span data-dcnode-id="2900" instrument_node="">
</span></div><span data-dcnode-id="2898" instrument_node="">
</span><div class="clear" data-dcnode-id="2897"></div><span data-dcnode-id="2896" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2875" data-version="1" id="Image34"><span data-dcnode-id="2894" instrument_node="">
</span><h2 data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">The New World Translation</span></h2><span data-dcnode-id="2891" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2879"><span data-dcnode-id="2890" instrument_node="">
</span><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/new-world-translation.html"><span data-dcnode-id="2889" instrument_node="">
</span><img alt="The New World Translation" data-dcnode-id="2888" height="149" id="Image34_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-SmXp6XjoLqo/ThTtf4mBeBI/AAAAAAAAJXw/iFRjMCSiOvA/s253/open_bible.gif&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="2887" instrument_node="">
</span></a><span data-dcnode-id="2885" instrument_node="">
</span><br data-dcnode-id="2884"><span data-dcnode-id="2883" instrument_node="">
</span><span class="caption" data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">Professor Benjamin Kedar of Israel said: "In my linguistic research in connection with the Hebrew Bible and translation, I often refer to the English edition as what is known as the New World Translation. In doing so, I find my feeling repeatedly confirmed that this kind of work reflects an honest endeavor to achieve an understanding of the text that is as accurate as possible. Giving evidence of a broad command of the original language, it renders the original words into a second language understandably without deviating unnecessarily from the specific structure of the Hebrew....Every statement of language allows for a certain latitude in interpreting or translating. So the linguistic solution in any given case may be open to debate. But I have never discovered in the New World Translation any biased intent to read something into the text that it does not contain."</span></span><span data-dcnode-id="2880" instrument_node="">
</span></div><span data-dcnode-id="2878" instrument_node="">
</span><div class="clear" data-dcnode-id="2877"></div><span data-dcnode-id="2876" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2855" data-version="1" id="Image76"><span data-dcnode-id="2874" instrument_node="">
</span><h2 data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">Defending The New World Translation - Web Site</span></h2><span data-dcnode-id="2871" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2859"><span data-dcnode-id="2870" instrument_node="">
</span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//defendingthenwt.blogspot.com/"><span data-dcnode-id="2869" instrument_node="">
</span><img alt="Defending The New World Translation - Web Site" data-dcnode-id="2868" height="214" id="Image76_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TSeKqk698tI/AAAAAAAAHkY/KZE4Gab50vs/S1600-R/jws_new_world_translation.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="2867" instrument_node="">
</span></a><span data-dcnode-id="2865" instrument_node="">
</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node="">
</span><span class="caption" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">This website is NOT an official website of the Watchtower Bible and Tract Society nor does it represent Jehovah's Witnesses. All material found on this blog/website cannot be ascribed to the Watchtower Society which cannot be held responsible or liable for the content. To those who are not Jehovah's Witnesses, please remember that if you are looking for information on beliefs, practices and news releases you should look to the source at http://www.watchtower.org/</span></span><span data-dcnode-id="2860" instrument_node="">

</span><h2 data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Emphatic Diaglott (Greek)</span></h2><span data-dcnode-id="2851" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2839"><span data-dcnode-id="2850" instrument_node="">
</span><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/emphatic-diaglott.html"><span data-dcnode-id="2849" instrument_node="">
</span><img alt="Emphatic Diaglott (Greek)" data-dcnode-id="2848" height="240" id="Image85_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/S-Oc_72KgoI/AAAAAAAADy4/ZMEcZN3Bmw0/S240/diagglot.jpg&amp;raw" width="150"><span data-dcnode-id="2847" instrument_node="">
</span></a><span data-dcnode-id="2845" instrument_node="">
</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">
</span><span class="caption" data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">It was through The Emphatic Diaglott that the Society’s first president, C. T. Russell, learned that the inspired Greek Scriptures speak of the second “presence” of Christ, for the Diaglott translated the Greek word “parousía” correctly as “presence,” and not as “coming” like the King James Version Bible. Accordingly when C. T. Russell began publishing the new Bible magazine in July of 1879, he called it Zion’s Watch Tower and Herald of Christ’s Presence.</span></span><span data-dcnode-id="2840" instrument_node="">
</span></div><span data-dcnode-id="2838" instrument_node="">
</span><div class="clear" data-dcnode-id="2837"></div><span data-dcnode-id="2836" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2815" data-version="1" id="Image84"><span data-dcnode-id="2834" instrument_node="">
</span><h2 data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">The Kingdom Interlinear Translation (Greek)</span></h2><span data-dcnode-id="2831" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2819"><span data-dcnode-id="2830" instrument_node="">
</span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/kingdom-interlinear-translation.html"><span data-dcnode-id="2829" instrument_node="">
</span><img alt="The Kingdom Interlinear Translation (Greek)" data-dcnode-id="2828" height="222" id="Image84_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-6RoFiyGPS1c/TVtrZi8m0zI/AAAAAAAAIQE/e0w8yRVb06w/s1600/1985KIT.jpg&amp;raw" width="150"><span data-dcnode-id="2827" instrument_node="">
</span></a><span data-dcnode-id="2825" instrument_node="">
</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">
</span><span class="caption" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Why does Dr. BeDuhn use the Kingdom Interlinear translation in his college courses? He answers: “Simply put, it is the best interlinear New Testament available. I am a trained scholar of the Bible, familiar with the texts and tools in use in modern biblical studies, and, by the way, not a member of the Jehovah’s Witnesses. But I know a quality publication when I see one, and your ‘New World Bible Translation Committee’ has done its job well. Your interlinear English rendering is accurate and consistent to an extreme that forces the reader to come to terms with the linguistic, cultural, and conceptual gaps between the Greek-speaking world and our own. Your ‘New World Translation’ is a high quality, literal translation that avoids traditional glosses in its faithfulness to the Greek. It is, in many ways, superior to the most successful translations in use today.”</span></span><span data-dcnode-id="2820" instrument_node="">
</span></div><span data-dcnode-id="2818" instrument_node="">
</span><div class="clear" data-dcnode-id="2817"></div><span data-dcnode-id="2816" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2795" data-version="1" id="Image71"><span data-dcnode-id="2814" instrument_node="">
</span><h2 data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Bible Translation and Study</span></h2><span data-dcnode-id="2811" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2799"><span data-dcnode-id="2810" instrument_node="">
</span><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jehovah.to/xlation/index.html"><span data-dcnode-id="2809" instrument_node="">
</span><img alt="Bible Translation and Study" data-dcnode-id="2808" height="205" id="Image71_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TS34Pul43cI/AAAAAAAAHpc/xiQVC2RI8D4/S1600-R/bible.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="2807" instrument_node="">
</span></a><span data-dcnode-id="2805" instrument_node="">
</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">
</span><span class="caption" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Since the New World Translation of the Holy Scriptures was published between 1950 and 1961 by Jehovah's Witnesses, it has been the object of much unwarranted criticism.  The aim of this site is to discuss some of the criticisms of the New World Translation and to offer a defence.</span></span><span data-dcnode-id="2800" instrument_node="">
</span></div><span data-dcnode-id="2798" instrument_node="">
</span><div class="clear" data-dcnode-id="2797"></div><span data-dcnode-id="2796" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2775" data-version="1" id="Image137"><span data-dcnode-id="2794" instrument_node="">
</span><h2 data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">William H. Conley (1840 - 1897)</span></h2><span data-dcnode-id="2791" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2779"><span data-dcnode-id="2790" instrument_node="">
</span><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/william-h-conley-1840-1897.html"><span data-dcnode-id="2789" instrument_node="">
</span><img alt="William H. Conley (1840 - 1897)" data-dcnode-id="2788" height="253" id="Image137_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-YiHpC7t683g/Tg37CSdJPLI/AAAAAAAAJHo/5h1F2uW4vK8/s253/WHC.png&amp;raw" width="188"><span data-dcnode-id="2787" instrument_node="">
</span></a><span data-dcnode-id="2785" instrument_node="">
</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">
</span><span class="caption" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">The following year the first of an extensive series of tracts designed to interest people in Bible truths was prepared for publication. This work quickly took on immense proportions. In order to handle it, Zion’s Watch Tower Tract Society was formed on February 16, 1881, with W. H. Conley as president and C. T. Russell as secretary and treasurer. Arrangements were made for the printing to be done by commercial firms in various cities of Pennsylvania, New York, and Ohio, as well as in Britain. In 1884, Zion’s Watch Tower Tract Society was legally incorporated, with C. T. Russell as president, and its charter showed that it was more than a society that would direct publishing. Its real objective was religious; it was chartered for “the dissemination of Bible Truths in various languages.”</span></span><span data-dcnode-id="2780" instrument_node="">
</span></div><span data-dcnode-id="2778" instrument_node="">
</span><div class="clear" data-dcnode-id="2777"></div><span data-dcnode-id="2776" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2755" data-version="1" id="Image142"><span data-dcnode-id="2774" instrument_node="">
</span><h2 data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Charles T. Russell (1852 - 1916)</span></h2><span data-dcnode-id="2771" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2759"><span data-dcnode-id="2770" instrument_node="">
</span><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/07/pastor-russell.html"><span data-dcnode-id="2769" instrument_node="">
</span><img alt="Charles T. Russell (1852 - 1916)" data-dcnode-id="2768" height="253" id="Image142_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-McQwmRusAk8/Tg360oR1b5I/AAAAAAAAJHg/UH2VI8lSNuY/s253/1911_bible_student_convention_pictures_0004.jpg&amp;raw" style="visibility: visible;" width="183"><span data-dcnode-id="2767" instrument_node="">
</span></a><span data-dcnode-id="2765" instrument_node="">
</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">
</span><span class="caption" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">The Continent , a publication whose editor often opposed Pastor Russell, once published the following significant statement concerning him: "His writings are said to have greater newspaper circulation every week than those of any other living man; a greater, doubtless, than the combined circulation of the writings of all the priests and preachers in North America; greater even than the work of Arthur Brisbane, Norman Hapgood, George Horace Lorimer, Dr. Frank Crane, Frederick Haskins, and a dozen other of the best known editors and syndicate writers put together."</span></span><span data-dcnode-id="2760" instrument_node="">
</span></div><span data-dcnode-id="2758" instrument_node="">
</span><div class="clear" data-dcnode-id="2757"></div><span data-dcnode-id="2756" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2735" data-version="1" id="Image124"><span data-dcnode-id="2754" instrument_node="">
</span><h2 data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Joseph F. Rutherford (1869 - 1942)</span></h2><span data-dcnode-id="2751" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2739"><span data-dcnode-id="2750" instrument_node="">
</span><a data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/09/j-f-rutherford.html"><span data-dcnode-id="2749" instrument_node="">
</span><img alt="Joseph F. Rutherford (1869 - 1942)" data-dcnode-id="2748" height="253" id="Image124_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-_fPMrPh7ASI/Tg38CKXBsHI/AAAAAAAAJH4/2HW8Z6zrCVU/s253/422px-Jfrutherford1911.jpg&amp;raw" width="178"><span data-dcnode-id="2747" instrument_node="">
</span></a><span data-dcnode-id="2745" instrument_node="">
</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">
</span><span class="caption" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">If there is any person in this audience who thinks that I, this man standing here, is the leader of Jehovah’s witnesses, say Yes.” The response was an impressive silence, broken only by an emphatic “No” from several in the audience. The speaker continued: “If you who are here believe that I am just one of the servants of the Lord, and we are working shoulder to shoulder in unity, serving God and serving Christ, say Yes.” In unison the assembly roared out a decisive “Yes!” The following month an audience in England responded in exactly the same way.</span></span><span data-dcnode-id="2740" instrument_node="">
</span></div><span data-dcnode-id="2738" instrument_node="">
</span><div class="clear" data-dcnode-id="2737"></div><span data-dcnode-id="2736" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2715" data-version="1" id="Image131"><span data-dcnode-id="2734" instrument_node="">
</span><h2 data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Nathan H. Knorr (1905 - 1977)</span></h2><span data-dcnode-id="2731" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2719"><span data-dcnode-id="2730" instrument_node="">
</span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/nathan-homer-knorr.html"><span data-dcnode-id="2729" instrument_node="">
</span><img alt="Nathan H. Knorr (1905 - 1977)" data-dcnode-id="2728" height="253" id="Image131_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ZOhCEHpBnTo/Tg37_M64kEI/AAAAAAAAJHw/Kxb-gKht3bc/s253/nhk.png&amp;raw" width="175"><span data-dcnode-id="2727" instrument_node="">
</span></a><span data-dcnode-id="2725" instrument_node="">
</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node="">
</span><span class="caption" data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">“every time one of Jehovah’s Witnesses knocks on your door and offers you a free home Bible study you personally are benefiting from this extension of Mr. Knorr’s Bible training program for Jehovah’s Witnesses.” The number of Witnesses has risen from 115,240 in 1942 to 2,248,390 in 1976. However, the Times pointed out that, like the apostle Paul and Apollos, “Mr. Knorr has only ‘planted and watered, but God has made it grow,’ and Mr. Knorr has never claimed credit for himself for this phenomenal increase in the numbers of Jehovah’s Witnesses.”—1 Cor. 3:5-8.</span></span><span data-dcnode-id="2720" instrument_node="">
</span></div><span data-dcnode-id="2718" instrument_node="">
</span><div class="clear" data-dcnode-id="2717"></div><span data-dcnode-id="2716" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2695" data-version="1" id="Image130"><span data-dcnode-id="2714" instrument_node="">
</span><h2 data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">Frederick W. Franz (1893 - 1992)</span></h2><span data-dcnode-id="2711" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2699"><span data-dcnode-id="2710" instrument_node="">
</span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/frederick-w-franz-1893-1992.html"><span data-dcnode-id="2709" instrument_node="">
</span><img alt="Frederick W. Franz (1893 - 1992)" data-dcnode-id="2708" height="253" id="Image130_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-Sxups6xmXjc/Tg39xKW_dKI/AAAAAAAAJIo/7nCm9OdzTlU/s253/fwf-766297.png&amp;raw" style="visibility: visible;" width="177"><span data-dcnode-id="2707" instrument_node="">
</span></a><span data-dcnode-id="2705" instrument_node="">
</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">
</span><span class="caption" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">In 1945 he became vice president of the Watch Tower Society and other associated bodies. Upon the death of then president Nathan H. Knorr in 1977, he became the president of the Watch Tower Society. He served in that capacity until his death. In his lifetime, Brother Franz saw the number of Witnesses of Jehovah increase from a few thousand to some four and a half million.</span></span><span data-dcnode-id="2700" instrument_node="">
</span></div><span data-dcnode-id="2698" instrument_node="">
</span><div class="clear" data-dcnode-id="2697"></div><span data-dcnode-id="2696" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2675" data-version="1" id="Image141"><span data-dcnode-id="2694" instrument_node="">
</span><h2 data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Milton G. Henschel (1920 - 2003)</span></h2><span data-dcnode-id="2691" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2679"><span data-dcnode-id="2690" instrument_node="">
</span><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/04/milton-g-henschel-1920-2003.html"><span data-dcnode-id="2689" instrument_node="">
</span><img alt="Milton G. Henschel (1920 - 2003)" data-dcnode-id="2688" height="253" id="Image141_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-LFLcpZcjRPM/Tg3_BDuqUXI/AAAAAAAAJJI/7mZqVFVlGVA/s253/testHenschel.jpg&amp;raw" width="206"><span data-dcnode-id="2687" instrument_node="">
</span></a><span data-dcnode-id="2685" instrument_node="">
</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">
</span><span class="caption" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Mr. Henschel was a member of the staff of the world headquarters since 1939 and was the president since 1992 of the Watch Tower Bible and Tract Society Inc. of Pennsylvania and the Watchtower Bible and Tract Society Inc. of New York State, two of the corporations that the Jehovah's Witnesses use to conduct their business affairs, which include publishing Bibles.</span></span><span data-dcnode-id="2680" instrument_node="">
</span></div><span data-dcnode-id="2678" instrument_node="">
</span><div class="clear" data-dcnode-id="2677"></div><span data-dcnode-id="2676" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2655" data-version="1" id="Image143"><span data-dcnode-id="2674" instrument_node="">
</span><h2 data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Don A. Adams (1925 - 2014?)</span></h2><span data-dcnode-id="2671" instrument_node="">

</span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/08/don-adams-1925.html"><span data-dcnode-id="2669" instrument_node="">
</span><img alt="Don A. Adams (1925 - 2014?)" data-dcnode-id="2668" height="253" id="Image143_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-oL6OqfWMem0/Tg385DLTtmI/AAAAAAAAJIQ/n0bStUNH4cI/s253/200px-DonAdams_200907.png&amp;raw" width="194"><span data-dcnode-id="2667" instrument_node="">
</span></a><span data-dcnode-id="2665" instrument_node="">
</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">
</span><span class="caption" data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">Don Alden Adams was president of the Watch Tower Bible and Tract Society of Pennsylvania, the oldest and most important of the corporations of Jehovah's Witnesses.</span></span><span data-dcnode-id="2660" instrument_node="">

</span><div class="foot section" data-dcnode-id="1429" id="footer-2-2"><div class="widget Image" data-dcnode-id="2630" data-version="1" id="Image26"><span data-dcnode-id="2649" instrument_node="">
</span><h2 data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">How do Jehovah's Witnesses view Charles T. Russell? Was he an Adventist or Millerite?</span></h2><span data-dcnode-id="2646" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2634"><span data-dcnode-id="2645" instrument_node="">
</span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/jw-view-of-pastor-russell.html"><span data-dcnode-id="2644" instrument_node="">
</span><img alt="How do Jehovah's Witnesses view Charles T. Russell? Was he an Adventist or Millerite?" data-dcnode-id="2643" height="253" id="Image26_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-JcUXrseFkH8/TvRC-BKPYkI/AAAAAAAAKwg/MD8P1fGOw_I/s253/Russell%252Ben%252Bcolor.jpg&amp;raw" style="visibility: visible;" width="210"><span data-dcnode-id="2642" instrument_node="">
</span></a><span data-dcnode-id="2640" instrument_node="">
</span><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">
</span><span class="caption" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">Brother Russell claimed no supernatural power, no divine revelations. He did not claim credit for what he taught. He was an outstanding student of the Bible. But he explained that his remarkable understanding of the Scriptures was due to ‘the simple fact that God’s due time had come.’ He said: “If I did not speak, and no other agent could be found, the very stones would cry out.” He referred to himself as being simply like an index finger, pointing to what is stated in God’s Word.</span></span><span data-dcnode-id="2635" instrument_node="">
</span></div><span data-dcnode-id="2633" instrument_node="">
</span><div class="clear" data-dcnode-id="2632"></div><span data-dcnode-id="2631" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2610" data-version="1" id="Image30"><span data-dcnode-id="2629" instrument_node="">
</span><h2 data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">To the readers of the Herald of the Morning (1879)</span></h2><span data-dcnode-id="2626" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2614"><span data-dcnode-id="2625" instrument_node="">
</span><a data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/09/to-readers-of-herald-of-morning.html"><span data-dcnode-id="2624" instrument_node="">
</span><img alt="To the readers of the Herald of the Morning (1879)" data-dcnode-id="2623" height="320" id="Image30_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-mHai6-aoaCM/TvU93N5ogLI/AAAAAAAAK7Y/Z53VXmat2A8/s1600/%252521CC-ji4Q%2525212k%25257E%252524%252528KGrHqZ%25252C%252521iIE0GYjm3DGBNNCMtO-R%252521%25257E%25257E_12.jpg&amp;raw" width="209"><span data-dcnode-id="2622" instrument_node="">
</span></a><span data-dcnode-id="2620" instrument_node="">
</span><br data-dcnode-id="2619"><span data-dcnode-id="2618" instrument_node="">
</span><span class="caption" data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">DEAR FRIENDS: My connection with the "Herald" having been terminated rather suddenly, and under circumstances which must seem rather remarkable and peculiar to you, I feel it to be a duty both to you and to myself to offer an explanation of the manner of withdrawal and my reasons for so doing. Quite a number who were personally acquainted with me thought there must be more of the story to tell, and I have received a number of letters asking an explanation. To these inquiries and to many unexpressed of similar character, let me offer the following statement:</span></span><span data-dcnode-id="2615" instrument_node="">
</span></div><span data-dcnode-id="2613" instrument_node="">
</span><div class="clear" data-dcnode-id="2612"></div><span data-dcnode-id="2611" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2590" data-version="1" id="Image168"><span data-dcnode-id="2609" instrument_node="">
</span><h2 data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Jehovah gathers and equips his people</span></h2><span data-dcnode-id="2606" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2594"><span data-dcnode-id="2605" instrument_node="">
</span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/12/jehovah-gathers-and-equips-his-people.html"><span data-dcnode-id="2604" instrument_node="">
</span><img alt="Jehovah gathers and equips his people" data-dcnode-id="2603" height="253" id="Image168_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-td5800ehsSc/TvRE4MDtNRI/AAAAAAAAKxc/fHQMW9neN88/s253/JWS.jpg&amp;raw" style="visibility: visible;" width="196"><span data-dcnode-id="2602" instrument_node="">
</span></a><span data-dcnode-id="2600" instrument_node="">
</span><br data-dcnode-id="2599"><span data-dcnode-id="2598" instrument_node="">
</span><span class="caption" data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">This group came to understand that the doctrine of the Trinity is not Biblical but Jehovah alone is the almighty God and Creator; Jesus Christ is His first creation and only-begotten Son; and the holy spirit is not a person but is God’s invisible active force. This group saw that the soul is not immortal but mortal, that the hope for the dead is resurrection, and that the punishment for unrepentant wickedness is not eternal torment but annihilation.</span></span><span data-dcnode-id="2595" instrument_node="">
</span></div><span data-dcnode-id="2593" instrument_node="">
</span><div class="clear" data-dcnode-id="2592"></div><span data-dcnode-id="2591" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2570" data-version="1" id="Image171"><span data-dcnode-id="2589" instrument_node="">
</span><h2 data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">The Birth of Zion's Watch Tower</span></h2><span data-dcnode-id="2586" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2574"><span data-dcnode-id="2585" instrument_node="">
</span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/10/birth-of-zions-watch-tower.html"><span data-dcnode-id="2584" instrument_node="">
</span><img alt="The Birth of Zion's Watch Tower" data-dcnode-id="2583" height="253" id="Image171_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-aL5mGse6z2Q/TvkvYRUHx7I/AAAAAAAALAQ/3lxpVcI_lYo/s253/%252524%252528KGrHqJHJ%252521wE7%252529%252529oIik3BO9MLlYMG%252521%25257E%25257E60_3.jpg&amp;raw" style="visibility: visible;" width="198"><span data-dcnode-id="2582" instrument_node="">
</span></a><span data-dcnode-id="2580" instrument_node="">
</span><br data-dcnode-id="2579"><span data-dcnode-id="2578" instrument_node="">
</span><span class="caption" data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">I have a question to propound to every subscriber and reader of the Herald of the Morning, viz. how many of you, want a paper like the Herald twice a month instead of once. Many of those who love the Herald and the truths taught therein, have suggested that it be issued semi-monthly saying, they get hungry between bites.</span></span><span data-dcnode-id="2575" instrument_node="">
</span></div><span data-dcnode-id="2573" instrument_node="">
</span><div class="clear" data-dcnode-id="2572"></div><span data-dcnode-id="2571" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2550" data-version="1" id="Image80"><span data-dcnode-id="2569" instrument_node="">
</span><h2 data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Zion's Watch Tower &amp; The Watchtower</span></h2><span data-dcnode-id="2566" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2554"><span data-dcnode-id="2565" instrument_node="">
</span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/08/zions-watch-tower-1879_11.html"><span data-dcnode-id="2564" instrument_node="">
</span><img alt="Zion's Watch Tower &amp; The Watchtower" data-dcnode-id="2563" height="253" id="Image80_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-1p4zvV8cb7E/ThES6mTgk_I/AAAAAAAAJKg/IQE5tG_MfJs/s253/okl_5.jpg&amp;raw" width="193"><span data-dcnode-id="2562" instrument_node="">
</span></a><span data-dcnode-id="2560" instrument_node="">
</span><br data-dcnode-id="2559"><span data-dcnode-id="2558" instrument_node="">
</span><span class="caption" data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">An elder of that congregation saw the need of publishing a new magazine that would champion the basic, underlying doctrines of the Holy Bible. His material wealth he decided to use in this behalf. So in July of 1879 he founded the desired magazine with himself as editor and publisher. This magazine was due to pose a problem for the world system of things, particularly for Christendom. It was entitled “Zion’s Watch Tower and Herald of Christ’s Presence.” Its editor and publisher was the self-sacrificing Bible student Charles Taze Russell.</span></span><span data-dcnode-id="2555" instrument_node="">
</span></div><span data-dcnode-id="2553" instrument_node="">
</span><div class="clear" data-dcnode-id="2552"></div><span data-dcnode-id="2551" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2530" data-version="1" id="Image28"><span data-dcnode-id="2549" instrument_node="">
</span><h2 data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Zion's Watch Tower Tract Society, Incorporated  in 1884</span></h2><span data-dcnode-id="2546" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2534"><span data-dcnode-id="2545" instrument_node="">
</span><a data-dcnode-id="2541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/06/watch-tower-society.html"><span data-dcnode-id="2544" instrument_node="">
</span><img alt="Zion's Watch Tower Tract Society, Incorporated  in 1884" data-dcnode-id="2543" height="253" id="Image28_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-zBwY_Dh0yqw/TvRELp3izqI/AAAAAAAAKxQ/UnU4IhWeBVo/s253/2551464392_6cf611b7c0.jpg&amp;raw" style="visibility: visible;" width="189"><span data-dcnode-id="2542" instrument_node="">
</span></a><span data-dcnode-id="2540" instrument_node="">
</span><br data-dcnode-id="2539"><span data-dcnode-id="2538" instrument_node="">
</span><span class="caption" data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">It was in 1881, during the early development of these activities, that Zion’s Watch Tower Tract Society was formed as a non-incorporated association, to provide funds and direction for expanding the preaching activity through distribution of Bible literature. In 1884 it was decided to incorporate it under the laws of the Commonwealth of Pennsylvania so that, as a legal instrument not dependent upon the life of any individuals, it could better carry on the work of expanding distribution of Bible literature. This was finalized by the Court of Common Pleas No. 1 of Allegheny County, Pennsylvania, on December 13, 1884.</span></span><span data-dcnode-id="2535" instrument_node="">
</span></div><span data-dcnode-id="2533" instrument_node="">
</span><div class="clear" data-dcnode-id="2532"></div><span data-dcnode-id="2531" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2510" data-version="1" id="Image12"><span data-dcnode-id="2529" instrument_node="">
</span><h2 data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Small Beginnings (1879-1889)</span></h2><span data-dcnode-id="2526" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2514"><span data-dcnode-id="2525" instrument_node="">
</span><a data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/small-beginnings-1879-1889.html"><span data-dcnode-id="2524" instrument_node="">
</span><img alt="Small Beginnings (1879-1889)" data-dcnode-id="2523" height="253" id="Image12_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-leAqLlMYqCk/ThFMWv-HVJI/AAAAAAAAJUY/W82s--Js9LQ/s253/P-38.jpg&amp;raw" style="visibility: visible;" width="179"><span data-dcnode-id="2522" instrument_node="">
</span></a><span data-dcnode-id="2520" instrument_node="">
</span><br data-dcnode-id="2519"><span data-dcnode-id="2518" instrument_node="">
</span><span class="caption" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">We believe that every member of this body of Christ is engaged in the blessed work, either directly or indirectly, of giving meat in due season to the household of faith. "Who then is that faithful and wise servant whom his Lord hath made ruler over his household," to give them meat in due season? Is it not that "little flock" of consecrated servants who are faithfully carrying out their consecration vows--the body of Christ-- and is not the whole body individually and collectively, giving the meat in due season to the household of faith--the great company of believers? Blessed is that servant (the whole body of Christ) whom his Lord when he has come (Gr. elthon) shall find so doing. "Verily, I say unto you, that he shall make him ruler over all his goods." "He shall inherit all things."  The "evil servant" who says: My Lord delayeth his coming, and forgetting his consecration vows, begins to eat and drink with the drunken (partake of the spirit of the world) shall have no part with the faithful overcomer. (Matt. 24:46-50.)</span></span><span data-dcnode-id="2515" instrument_node="">
</span></div><span data-dcnode-id="2513" instrument_node="">
</span><div class="clear" data-dcnode-id="2512"></div><span data-dcnode-id="2511" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2490" data-version="1" id="Image51"><span data-dcnode-id="2509" instrument_node="">
</span><h2 data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">The Warning Work (1909 -1914)</span></h2><span data-dcnode-id="2506" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2494"><span data-dcnode-id="2505" instrument_node="">
</span><a data-dcnode-id="2501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/03/warning-work-1909-1914.html"><span data-dcnode-id="2504" instrument_node="">
</span><img alt="The Warning Work (1909 -1914)" data-dcnode-id="2503" height="253" id="Image51_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-kVWN-gE31oA/ThETfjX7pDI/AAAAAAAAJLA/zqUI6dpQkcs/s253/JW_1907_WT.jpg&amp;raw" style="visibility: visible;" width="193"><span data-dcnode-id="2502" instrument_node="">
</span></a><span data-dcnode-id="2500" instrument_node="">
</span><br data-dcnode-id="2499"><span data-dcnode-id="2498" instrument_node="">
</span><span class="caption" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">HISTORICALLY, the activity of the Watch Tower Bible and Tract Society from 1909 to 1914 must be viewed largely with respect to the warning work of proclaiming the fateful year 1914. For thirty-two years now since 1877 the Society’s zealous volunteer workers, as witnesses of Jehovah, had publicly set forth the chronological proof and the physical facts indicating that the “Gentile times” were due to end in the fall of 1914.</span></span><span data-dcnode-id="2495" instrument_node="">
</span></div><span data-dcnode-id="2493" instrument_node="">
</span><div class="clear" data-dcnode-id="2492"></div><span data-dcnode-id="2491" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2470" data-version="1" id="Image68"><span data-dcnode-id="2489" instrument_node="">
</span><h2 data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">1914 and Great Expectations</span></h2><span data-dcnode-id="2486" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2474"><span data-dcnode-id="2485" instrument_node="">
</span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/05/pastor-russell-and-great-expectations.html"><span data-dcnode-id="2484" instrument_node="">
</span><img alt="1914 and Great Expectations" data-dcnode-id="2483" height="240" id="Image68_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/S9KdE-K7_CI/AAAAAAAADho/7rqX3637ipU/S240/01240600550.jpg&amp;raw" width="198"><span data-dcnode-id="2482" instrument_node="">
</span></a><span data-dcnode-id="2480" instrument_node="">
</span><br data-dcnode-id="2479"><span data-dcnode-id="2478" instrument_node="">
</span><span class="caption" data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">For years God’s people had pointed forward to 1914 as the year that would mark the end of the Gentile Times. Their expectations did not lead to disappointment. On July 28, 1914, World War I erupted, and as time marched on toward October 1 more and more nations and empires got involved. As Jehovah’s Christian witnesses know from their Scriptural studies, the period of uninterrupted Gentile world rule ended in 1914, with the birth of God’s heavenly kingdom with Jesus Christ as king. (Rev. 12:1-5) But there also were other expectations regarding 1914.</span></span><span data-dcnode-id="2475" instrument_node="">
</span></div><span data-dcnode-id="2473" instrument_node="">
</span><div class="clear" data-dcnode-id="2472"></div><span data-dcnode-id="2471" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2450" data-version="1" id="Image170"><span data-dcnode-id="2469" instrument_node="">
</span><h2 data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">C. T. Russell greets a youth</span></h2><span data-dcnode-id="2466" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2454"><span data-dcnode-id="2465" instrument_node="">
</span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/07/c-t-russell-greets-youth.html"><span data-dcnode-id="2464" instrument_node="">
</span><img alt="C. T. Russell greets a youth" data-dcnode-id="2463" height="253" id="Image170_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-oP2SLwkpPuo/ThFOR69iUqI/AAAAAAAAJUg/nIi24SbvBjE/s253/27_1.jpg&amp;raw" width="181"><span data-dcnode-id="2462" instrument_node="">
</span></a><span data-dcnode-id="2460" instrument_node="">
</span><br data-dcnode-id="2459"><span data-dcnode-id="2458" instrument_node="">
</span><span class="caption" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Russell invited me to make my home at the Watch Tower Society's headquarters in Allegheny, though I was not a member of the staff. When I went there to the Bible House (where the headquarters "family" lived and worked) I was in my early twenties. C. T. Russell was very kind to me. I had no home, both my parents having died; so he took me under his wing and made me feel at home with the headquarters family. He was thoughtful and considerate in every way, and as I would go out on a trip or special assignment he always would say, "Brother, the door is open for you when you return. This is your home."</span></span><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span><div class="clear" data-dcnode-id="2452"></div><span data-dcnode-id="2451" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2430" data-version="1" id="Image154"><span data-dcnode-id="2449" instrument_node="">
</span><h2 data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">The Object and Manner of Our Lord's Return (1877)</span></h2><span data-dcnode-id="2446" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2434"><span data-dcnode-id="2445" instrument_node="">
</span><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/07/manner-of-lords-return.html"><span data-dcnode-id="2444" instrument_node="">
</span><img alt="The Object and Manner of Our Lord's Return (1877)" data-dcnode-id="2443" height="253" id="Image154_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-BZ4nOLaHRSQ/ThEVRtpDBiI/AAAAAAAAJLw/TEw-KXajiCc/s253/1911_bible_student_convention_pictures_0004.jpg&amp;raw" style="visibility: visible;" width="183"><span data-dcnode-id="2442" instrument_node="">
</span></a><span data-dcnode-id="2440" instrument_node="">
</span><br data-dcnode-id="2439"><span data-dcnode-id="2438" instrument_node="">
</span><span class="caption" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">“We felt greatly grieved at the error of Second Adventists, who were expecting Christ in the flesh, and teaching that the world and all in it except Second Adventists would be burned up in 1873 or 1874, whose time-settings and disappointments and crude ideas generally as to the object and manner of his coming brought more or less reproach upon us and upon all who longed for and proclaimed his coming Kingdom. These wrong views so generally held of both the object and manner of the Lord’s return led me to write a pamphlet—‘The Object and Manner of Our Lord’s Return.’” This pamphlet was published in 1877. Brother Russell had some 50,000 copies of it printed and distributed.</span></span><span data-dcnode-id="2435" instrument_node="">
</span></div><span data-dcnode-id="2433" instrument_node="">
</span><div class="clear" data-dcnode-id="2432"></div><span data-dcnode-id="2431" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2410" data-version="1" id="Image149"><span data-dcnode-id="2429" instrument_node="">
</span><h2 data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Old Theology Quarterly</span></h2><span data-dcnode-id="2426" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2414"><span data-dcnode-id="2425" instrument_node="">
</span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/08/old-theology-quarterly.html"><span data-dcnode-id="2424" instrument_node="">
</span><img alt="Old Theology Quarterly" data-dcnode-id="2423" height="208" id="Image149_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-91ZPvQ2r3_w/ThEknLc4leI/AAAAAAAAJRQ/UUBQo4rCyN0/s253/b2b5_3.jpg&amp;raw" width="253"><span data-dcnode-id="2422" instrument_node="">
</span></a><span data-dcnode-id="2420" instrument_node="">
</span><br data-dcnode-id="2419"><span data-dcnode-id="2418" instrument_node="">
</span><span class="caption" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">“This fund is constantly employed in sending out, gratis, thousands of copies of ZION’S WATCH TOWER and OLD THEOLOGY TRACTS most suitable to new readers. It also assists in the spread of the paper-bound editions of the DAWN series, by aiding those disposed to circulate them—colporteurs and others. It also provides a ‘poor fund’ by which any of the Lord’s children who, through age, or sickness, or from other cause, are unable to subscribe for the WATCH TOWER are supplied free, upon condition of their sending a letter or card at the beginning of each year, stating their desire and inability.</span></span><span data-dcnode-id="2415" instrument_node="">
</span></div><span data-dcnode-id="2413" instrument_node="">
</span><div class="clear" data-dcnode-id="2412"></div><span data-dcnode-id="2411" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="2390" data-version="1" id="Image87"><span data-dcnode-id="2409" instrument_node="">
</span><h2 data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Watchman, what of the night?</span></h2><span data-dcnode-id="2406" instrument_node="">
</span><div class="widget-content" data-dcnode-id="2394"><span data-dcnode-id="2405" instrument_node="">
</span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/watchman-what-of-night.html"><span data-dcnode-id="2404" instrument_node="">
</span><img alt="Watchman, what of the night?" data-dcnode-id="2403" height="253" id="Image87_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-1g3lDqEV0fI/ThEV7hK4pGI/AAAAAAAAJMY/AqH_WxZIT2U/s253/okl_5.jpg&amp;raw" width="200"><span data-dcnode-id="2402" instrument_node="">
</span></a><span data-dcnode-id="2400" instrument_node="">
</span><br data-dcnode-id="2399"><span data-dcnode-id="2398" instrument_node="">
