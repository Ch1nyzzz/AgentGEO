</span><div class="clear" data-dcnode-id="1612"></div><span data-dcnode-id="1611" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1590" data-version="1" id="Image16"><span data-dcnode-id="1609" instrument_node="">
</span><h2 data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">William Miller (1782-1849)</span></h2><span data-dcnode-id="1606" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1594"><span data-dcnode-id="1605" instrument_node="">
</span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//universitypress.andrews.edu/content/Memoirs%2520Excerpt.pdf"><span data-dcnode-id="1604" instrument_node="">
</span><img alt="William Miller (1782-1849)" data-dcnode-id="1603" height="188" id="Image16_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-AqKAj-Ji6ss/ThEaqfqewAI/AAAAAAAAJPA/VyftvpcMUjc/s253/RH-MillerStudying.jpg&amp;raw" style="visibility: visible;" width="253"><span data-dcnode-id="1602" instrument_node="">
</span></a><span data-dcnode-id="1600" instrument_node="">
</span><br data-dcnode-id="1599"><span data-dcnode-id="1598" instrument_node="">
</span><span class="caption" data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">1843 was to be the year of the world's end. In that year, Christ personally would return to the earth to establish his kingdom, glorify the saints, and take vengeance on the wicked. This was the conclusion arrived at by William Miller in 1822 and the message that he proclaimed for the next 21 years.</span></span><span data-dcnode-id="1595" instrument_node="">
</span></div><span data-dcnode-id="1593" instrument_node="">
</span><div class="clear" data-dcnode-id="1592"></div><span data-dcnode-id="1591" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1570" data-version="1" id="Image100"><span data-dcnode-id="1589" instrument_node="">
</span><h2 data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">The Reckoning of the Prophetic Periods</span></h2><span data-dcnode-id="1586" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1574"><span data-dcnode-id="1585" instrument_node="">
</span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/reckoning-of-prophetic-periods.html"><span data-dcnode-id="1584" instrument_node="">
</span><img alt="The Reckoning of the Prophetic Periods" data-dcnode-id="1583" height="253" id="Image100_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-KIMltzDskmg/ThEj8S1lKqI/AAAAAAAAJRI/kLHFAPgWP0k/s253/Millerite%252Bchart%252B2.jpg&amp;raw" width="176"><span data-dcnode-id="1582" instrument_node="">
</span></a><span data-dcnode-id="1580" instrument_node="">
</span><br data-dcnode-id="1579"><span data-dcnode-id="1578" instrument_node="">
</span><span class="caption" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">"With a new and deeper earnestness, Miller continued the examination of the prophecies, whole nights as well as days being devoted to the study of what now appeared of such stupendous importance and all-absorbing interest. In the eighth chapter of Daniel he could find no clue to the starting-point of the 2300 days; the angel Gabriel, though commanded to make Daniel understand the vision, gave him only a partial explanation. As the terrible persecution to befall the church was unfolded to the prophet's vision, physical strength gave way. He could endure no more, and the angel left him for a time. Daniel 'fainted, and was sick certain days.' 'And I was astonished at the vision,' he says, 'but none understood it.'</span></span><span data-dcnode-id="1575" instrument_node="">
</span></div><span data-dcnode-id="1573" instrument_node="">
</span><div class="clear" data-dcnode-id="1572"></div><span data-dcnode-id="1571" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1550" data-version="1" id="Image147"><span data-dcnode-id="1569" instrument_node="">
</span><h2 data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">The Home of William Miller</span></h2><span data-dcnode-id="1566" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1554"><span data-dcnode-id="1565" instrument_node="">
</span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/william-miller-it-started-hear.html"><span data-dcnode-id="1564" instrument_node="">
</span><img alt="The Home of William Miller" data-dcnode-id="1563" height="164" id="Image147_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-lcurQGJUDiY/ThEjcAUg0VI/AAAAAAAAJRA/XmmSxeGel2U/s253/William%252BMiller%252527s%252BHome%252B%2525282%252529.jpg&amp;raw" width="253"><span data-dcnode-id="1562" instrument_node="">
</span></a><span data-dcnode-id="1560" instrument_node="">
</span><br data-dcnode-id="1559"><span data-dcnode-id="1558" instrument_node="">
</span><span class="caption" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">William Miller's home and farm is nestled in the scenic Adirondack Mountains near Hampton, New York. Through the efforts of AHM it is being restored to its 19th century appearance because of its cultural and religious significance. The site includes the home, farm buildings, Chapel and ascension rock, all of which are registered with the National Register of Historic Sites. Also located nearby is the cemetery where William and Lucy Miller are buried.</span></span><span data-dcnode-id="1555" instrument_node="">
</span></div><span data-dcnode-id="1553" instrument_node="">
</span><div class="clear" data-dcnode-id="1552"></div><span data-dcnode-id="1551" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1530" data-version="1" id="Image61"><span data-dcnode-id="1549" instrument_node="">
</span><h2 data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">William Millers Death (1849)</span></h2><span data-dcnode-id="1546" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1534"><span data-dcnode-id="1545" instrument_node="">
</span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/william-millers-death.html"><span data-dcnode-id="1544" instrument_node="">
</span><img alt="William Millers Death (1849)" data-dcnode-id="1543" height="253" id="Image61_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-B_-da9I4lLs/ThELJu9GZSI/AAAAAAAAJJo/YS6HaNiyBfk/s253/4819453231_606f2fd8c1.jpg&amp;raw" width="190"><span data-dcnode-id="1542" instrument_node="">
</span></a><span data-dcnode-id="1540" instrument_node="">
</span><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">
</span><span class="caption" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Mr. Miller continued to travel and preach at intervals, as bis failing health would permit, with his usual earnestness and success up to the spring of 1849, when he wrote to the brethren assembled in the Annual Conference in New York: " My multiplied infirmities admonish me that the time of my departure is drawing nigh." During the following summer he was visited by very many of the ministry and laymen to onjoy their last interview in mortality with that faithful man of God. On the 20th of December he " fell asleep " in the joyful hope of being soon awakened to eternal life by the coming of the Lord for whom he had so confidently waited and faithfully labored. The religious, political, and secular papers, throughout this country and in Europe, gave extended notice of the good man's death, and appended many comments, according to their fancies, prejudices, or judgment, of the character of the man and bis work. We append a few as illustrations of the popular mind :</span></span><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">
</span><div class="clear" data-dcnode-id="1532"></div><span data-dcnode-id="1531" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1510" data-version="1" id="Image75"><span data-dcnode-id="1529" instrument_node="">
</span><h2 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">William Miller -  The Orrin Jenks Collection - Aurora University</span></h2><span data-dcnode-id="1526" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1514"><span data-dcnode-id="1525" instrument_node="">
</span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stage.aurora.edu/academics/library/jenks-collection/index.html"><span data-dcnode-id="1524" instrument_node="">
</span><img alt="William Miller -  The Orrin Jenks Collection - Aurora University" data-dcnode-id="1523" height="253" id="Image75_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-PW9VXVVd4vU/Tqm3BAi5VgI/AAAAAAAAKFE/-LVqlLb6M2s/s253/001.jpg&amp;raw" width="187"><span data-dcnode-id="1522" instrument_node="">
</span></a><span data-dcnode-id="1520" instrument_node="">
</span><br data-dcnode-id="1519"><span data-dcnode-id="1518" instrument_node="">
</span><span class="caption" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">To commemorate the faith and confident expectation of those who awaited the personal return of Jesus Christ to earth in 1843-1844 (a view based on a pattern of biblical interpretation introduced by William Miller 1782-1849), and to preserve the early history of the various Adventist bodies which grew out of the Millerite Movement, Orrin Jenks began collecting historic materials, and thus began a research library.</span></span><span data-dcnode-id="1515" instrument_node="">
</span></div><span data-dcnode-id="1513" instrument_node="">
</span><div class="clear" data-dcnode-id="1512"></div><span data-dcnode-id="1511" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1490" data-version="1" id="Image133"><span data-dcnode-id="1509" instrument_node="">
</span><h2 data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Joshua V. Himes</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1494"><span data-dcnode-id="1505" instrument_node="">
</span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/joshua-vaughan-himes-18051895.html"><span data-dcnode-id="1504" instrument_node="">
</span><img alt="Joshua V. Himes" data-dcnode-id="1503" height="209" id="Image133_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TOzU9YhGGSI/AAAAAAAAG9Q/MCx2GsZdPq8/S1600-R/P001623_Himes_Joshua_V_003_big.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1502" instrument_node="">
</span></a><span data-dcnode-id="1500" instrument_node="">
</span><br data-dcnode-id="1499"><span data-dcnode-id="1498" instrument_node="">
</span><span class="caption" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Skilled in methods of promotion, Himes took Miller out of the rural areas and small towns and placed him in the great cities — the communication centers of the nation. Operating chiefly out of Boston and New York, Himes established strategic outposts in such places as Philadelphia, Cincinnati, and Rochester. Newspapers were established in each of the above cities, most notably "The Signs of the Times" (later " The Advent Herald") in Boston and " The Midnight Cry" (later "The Morning Watch") in New York. Books, pamphlets, tracts and other publications flowed from the presses in the thousands. Preaching and lecture tours for Miller and others were organized.</span></span><span data-dcnode-id="1495" instrument_node="">
</span></div><span data-dcnode-id="1493" instrument_node="">
</span><div class="clear" data-dcnode-id="1492"></div><span data-dcnode-id="1491" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1470" data-version="1" id="Image134"><span data-dcnode-id="1489" instrument_node="">
</span><h2 data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Sylvester Bliss</span></h2><span data-dcnode-id="1486" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1474"><span data-dcnode-id="1485" instrument_node="">
</span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/sylvester-bliss.html"><span data-dcnode-id="1484" instrument_node="">
</span><img alt="Sylvester Bliss" data-dcnode-id="1483" height="226" id="Image134_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-znlDWV6_KJ4/TbdWHzdEK7I/AAAAAAAAJAs/gHAW7H6A1vU/s1600/books.jpg&amp;raw" style="visibility: visible;" width="150"><span data-dcnode-id="1482" instrument_node="">
</span></a><span data-dcnode-id="1480" instrument_node="">
</span><br data-dcnode-id="1479"><span data-dcnode-id="1478" instrument_node="">
</span><span class="caption" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Sylvester Bliss (1814–1863) was a Millerite minister and editor. He served first as assistant editor, then editor, of the Millerite journal, The Signs of the Times. Originally a Congregationalist from Hartford, Connecticut, he obtained a liberal education and was a member of the Historical Society of Boston. He was also an editor of the Advent Shield and later edited the Memoirs of William Miller (1853). He remained until his death the editor of the Advent Herald (the continued and renamed publication of Signs of the Times), which remained the organ of the group of Millerites who did not accept the conditional immortality of the soul. His books include Commentary on the Revelation, The Time of the End, and Analysis of Sacred Chronology.</span></span><span data-dcnode-id="1475" instrument_node="">
</span></div><span data-dcnode-id="1473" instrument_node="">
</span><div class="clear" data-dcnode-id="1472"></div><span data-dcnode-id="1471" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1450" data-version="1" id="Image136"><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Charles Fitch</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1454"><span data-dcnode-id="1465" instrument_node="">
</span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/07/charles-fitch-1805-1844.html"><span data-dcnode-id="1464" instrument_node="">
</span><img alt="Charles Fitch" data-dcnode-id="1463" height="215" id="Image136_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TGK2qiiGu-I/AAAAAAAAEuY/NdEZlzkzbDU/S760/CharlesFitch.jpg&amp;raw" width="150"><span data-dcnode-id="1462" instrument_node="">
</span></a><span data-dcnode-id="1460" instrument_node="">
</span><br data-dcnode-id="1459"><span data-dcnode-id="1458" instrument_node="">
</span><span class="caption" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">In 1842, feeling the need of an accurate chart, Fitch and Apollos Hale prepared the famous chart illustrating the fulfillment of the last-time prophecies of Daniel. This was used extensively by the Millerites. Fitch himself used this chart and also other visual aids including a replica of the Daniel 2 statue that could be separated into its various parts. Charles Fitch became seriously ill, probably with pneumonia, in the month of October, 1844. He had chilled while baptizing converts. He died on Monday, October 14th, in full faith that he should awake in a few days in the likeness of his Redeemer.</span></span><span data-dcnode-id="1455" instrument_node="">

</span></a><span data-dcnode-id="1440" instrument_node="">
</span><br data-dcnode-id="1439"><span data-dcnode-id="1438" instrument_node="">
</span><span class="caption" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">As the Adventist movement gradually developed more formal organization, Wellcome actively participated in what eventually became the Advent Christian Church. He served as a minister in the State Conference of Maine for some twenty years after it was organized in 1854 and was elected Vice-president for the State of Maine when the American Advent Mission Society formed in 1865. He also served for four years on the Board of the Advent Christian Publication Society and one year on the editorial committee of The World’s Crisis, the emerging denomination’s paper.</span></span><span data-dcnode-id="1435" instrument_node="">

</span><h2 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">The Photo Drama of Creation (1914)</span></h2><span data-dcnode-id="1401" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1389"><span data-dcnode-id="1400" instrument_node="">
</span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/08/photo-drama-of-creation.html"><span data-dcnode-id="1399" instrument_node="">
</span><img alt="The Photo Drama of Creation (1914)" data-dcnode-id="1398" height="253" id="Image185_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-CIcZMZG7NHI/TvRDWNAinQI/AAAAAAAAKws/52-dqQswl8c/s253/PD1-001.jpg&amp;raw" width="196"><span data-dcnode-id="1397" instrument_node="">
</span></a><span data-dcnode-id="1395" instrument_node="">
</span><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">
</span><span class="caption" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">A fortune for those days—some $300,000—was spent by the Society in producing the Photo-Drama. And of the work involved, Russell wrote: “God kindly veiled our eyes as respects the amount of labor connected with the DRAMA. Had we foreknown the cost of time and money and patience necessary for the start we would never have begun it. But neither did we know in advance the great success that would attend the DRAMA.” Choice musical recordings and ninety-six phonograph-record talks were prepared. Stereopticon slides were made of fine art pictures illustrating world history, and it was necessary to make hundreds of new paintings and sketches. All the color slides and films had to be hand painted, some of this work being accomplished in the Society’s own Art Room. And, think of it! This had to be done repeatedly, for there were at least twenty four-part sets prepared, making it possible to show a portion of the Drama in eighty different cities on a given day.</span></span><span data-dcnode-id="1390" instrument_node="">

</span><img alt="&quot;Did the Early Christians Teach/Believe a 'Trinity' Doctrine?&quot;" data-dcnode-id="1378" height="201" id="Image183_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-lOi7edwIAVY/TvRDoCKhhGI/AAAAAAAAKw4/qKHgVTc41NY/s253/imgad-001.jpg&amp;raw" width="253"><span data-dcnode-id="1377" instrument_node="">
</span></a><span data-dcnode-id="1375" instrument_node="">
</span><br data-dcnode-id="1374"><span data-dcnode-id="1373" instrument_node="">
</span><span class="caption" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Since, within the “New Testament,” there can be found no trace of such a belief as ever having been explicitly taught, explained or defended, the reason for its eventual emergence was that this was direct evidence of a corruption – yes, as an ever growing degeneration of the true, original teachings of Jesus – all in pointed fulfillment of some very specific Bible prophesies.</span></span><span data-dcnode-id="1370" instrument_node="">

</span></a><span data-dcnode-id="1221" instrument_node="">
</span><br data-dcnode-id="1220"><span data-dcnode-id="1219" instrument_node="">
</span><span class="caption" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">On the Internet, there is perhaps no group today as intensely criticized as Jehovah's Witnesses. Hundreds of web sites have emerged that denigrate the Witnesses and actively oppose their beliefs. Some of these sites merely ridicule, while others promote outright hatred toward them. There are even some sites that try to appear unbiased in their views, though still presenting false or twisted information. Of course, this should come as no surprise since Christ Jesus foretold that his true followers would be "objects of hatred" by all the world (Matthew 10:22; Mark 13:13; Luke 21:17). The words at Acts 28:22, regarding Jesus' followers, are certainly just as true today as they were back then: "Truly as regards this sect it is known to us that everywhere it is spoken against."</span></span><span data-dcnode-id="1216" instrument_node="">

</span><br data-dcnode-id="1140"><span data-dcnode-id="1139" instrument_node="">
</span><span class="caption" data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Some claim Jehovah’s Witnesses had “secret deals” with the United Nations, and then lied to cover it up. Is this conspiracy theory true? We show direct evidence from the UN itself showing these accusations to be just plain wrong.</span></span><span data-dcnode-id="1136" instrument_node="">

</span><h2 data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Pastor Russell on the Trinity</span></h2><span data-dcnode-id="1127" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1115"><span data-dcnode-id="1126" instrument_node="">
</span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/01/pastor-russell-on-trinity.html"><span data-dcnode-id="1125" instrument_node="">
</span><img alt="Pastor Russell on the Trinity" data-dcnode-id="1124" height="253" id="Image179_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-_zOO3eM1-Dw/ThETxHNQDxI/AAAAAAAAJLQ/0Vp2e0U8gBk/s253/%252521BgJRqcg%2525212k%25257E%252524%252528KGrHqMH-DsEsMi7PV-rBLEIL%252529IjNg%25257E%25257E_3.jpg&amp;raw" width="172"><span data-dcnode-id="1123" instrument_node="">
</span></a><span data-dcnode-id="1121" instrument_node="">
</span><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">
</span><span class="caption" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">It was after the death of the twelve Apostles that, without Divine authority, the bishops of the church were proclaimed to be the successors of the Apostles, and to possess Apostolic authority, as teachers in the church, and whose words were to be taken as of plenary inspiration. It was these bishops in council who declared the doctrine the 3 x 1 is one that God is one being, of three personalities or manifestations, all three being equal in power and in glory. The question is, Why did they make such a statement? Why should they concoct so unscriptural and so unreasonable a proposition? The Answer—is that it was done to combat certain errors prominent in their day. They flew from one extreme to another.</span></span><span data-dcnode-id="1116" instrument_node="">
</span></div><span data-dcnode-id="1114" instrument_node="">
</span><div class="clear" data-dcnode-id="1113"></div><span data-dcnode-id="1112" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1091" data-version="1" id="Image148"><span data-dcnode-id="1110" instrument_node="">
</span><h2 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Trinity-Pastor Russell's View</span></h2><span data-dcnode-id="1107" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1095"><span data-dcnode-id="1106" instrument_node="">
</span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/trinity-pastor-russells-view.html"><span data-dcnode-id="1105" instrument_node="">
</span><img alt="Trinity-Pastor Russell's View" data-dcnode-id="1104" height="253" id="Image148_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-h5CBh5IRGpY/ThET1MqisOI/AAAAAAAAJLY/0myr4oyzYuo/s253/CTRspecs.jpg&amp;raw" style="visibility: visible;" width="198"><span data-dcnode-id="1103" instrument_node="">
</span></a><span data-dcnode-id="1101" instrument_node="">
</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">
</span><span class="caption" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">I will say that I have never found any text of Scripture from Genesis to Revelation that mentions the Trinity, and if anybody has found one, it would be worth something to me to know where it is. I would give ten dollars for it right away. I cannot find any reference to the Trinity in the Bible.</span></span><span data-dcnode-id="1096" instrument_node="">
</span></div><span data-dcnode-id="1094" instrument_node="">
</span><div class="clear" data-dcnode-id="1093"></div><span data-dcnode-id="1092" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1071" data-version="1" id="Image161"><span data-dcnode-id="1090" instrument_node="">
</span><h2 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Jehovah's Witnesses, not a form of Arianism</span></h2><span data-dcnode-id="1087" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1075"><span data-dcnode-id="1086" instrument_node="">
</span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/09/jehovahs-witnesses-not-form-of-arianism.html"><span data-dcnode-id="1085" instrument_node="">
</span><img alt="Jehovah's Witnesses, not a form of Arianism" data-dcnode-id="1084" height="274" id="Image161_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/_QcjB84-75-0/TT5XbrNAYJI/AAAAAAAAH5g/QgGk-sJaWc8/s1600/11.jpg&amp;raw" width="200"><span data-dcnode-id="1083" instrument_node="">
</span></a><span data-dcnode-id="1081" instrument_node="">
</span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node="">
</span><span class="caption" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Because they do not believe in the Trinity dogma, it has been said of Jehovah’s Witnesses that they practice “a form of Arianism.” But the fact that they are not Trinitarians does not make them Arians.</span></span><span data-dcnode-id="1076" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
</span><div class="clear" data-dcnode-id="1073"></div><span data-dcnode-id="1072" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1051" data-version="1" id="Image43"><span data-dcnode-id="1070" instrument_node="">
</span><h2 data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">An appeal to pious Trinitarians, by Henry Grew (1857)</span></h2><span data-dcnode-id="1067" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1055"><span data-dcnode-id="1066" instrument_node="">
</span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/appeal-to-pious-trinitarians.html"><span data-dcnode-id="1065" instrument_node="">
</span><img alt="An appeal to pious Trinitarians, by Henry Grew (1857)" data-dcnode-id="1064" height="253" id="Image43_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-Iej1nIQXhNg/ThFOvOlP96I/AAAAAAAAJUo/vkDeL7hLyZc/s253/300_1183302.jpg&amp;raw" width="199"><span data-dcnode-id="1063" instrument_node="">
</span></a><span data-dcnode-id="1061" instrument_node="">
</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
</span><span class="caption" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">DEAR BRETHREN, -We acknowledge our fallibility. Truth will endure the closest investigation. I bear you record that you have a zeal for God. Is it, or is it not according to knowledge? Is it in the holy word, which you declare is the ONLY rule of faith, that you have found the declaration, that the one God is three persons? Have you been taught it by Jesus Christ, or by fallible men?</span></span><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span><div class="clear" data-dcnode-id="1053"></div><span data-dcnode-id="1052" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1031" data-version="1" id="Image169"><span data-dcnode-id="1050" instrument_node="">
</span><h2 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The Socinians—Why Did They Reject the Trinity?</span></h2><span data-dcnode-id="1047" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1035"><span data-dcnode-id="1046" instrument_node="">
</span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/socinianswhy-did-they-reject-trinity.html"><span data-dcnode-id="1045" instrument_node="">
</span><img alt="The Socinians—Why Did They Reject the Trinity?" data-dcnode-id="1044" height="253" id="Image169_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-9mobZBnCTxs/ThEVYB893VI/AAAAAAAAJL4/hgDPPaSmyJw/s253/Michael%25252BServetus.jpg&amp;raw" style="visibility: visible;" width="186"><span data-dcnode-id="1043" instrument_node="">
</span></a><span data-dcnode-id="1041" instrument_node="">
</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">
</span><span class="caption" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">As much as Protestants and Catholics hated one another in these early years of the Reformation, they united in a still greater hatred of this one man. His crime? Heresy. Michael Servetus had written books proving that the churches’ teaching on the Trinity was unscriptural. He said: “The papistical Trinity, infant baptism, and the other sacraments of the Papacy, are the doctrines of demons.”</span></span><span data-dcnode-id="1036" instrument_node="">
</span></div><span data-dcnode-id="1034" instrument_node="">
</span><div class="clear" data-dcnode-id="1033"></div><span data-dcnode-id="1032" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="1011" data-version="1" id="Image96"><span data-dcnode-id="1030" instrument_node="">
</span><h2 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Isaac Newton's Search for God</span></h2><span data-dcnode-id="1027" instrument_node="">
</span><div class="widget-content" data-dcnode-id="1015"><span data-dcnode-id="1026" instrument_node="">
</span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/10/isaac-newtons-search-for-god.html"><span data-dcnode-id="1025" instrument_node="">
</span><img alt="Isaac Newton's Search for God" data-dcnode-id="1024" height="253" id="Image96_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-bvLMf3dedaw/ThEVdhqRHQI/AAAAAAAAJMA/J7hvQVZpRwk/s253/P4224988e.jpg&amp;raw" style="visibility: visible;" width="190"><span data-dcnode-id="1023" instrument_node="">
</span></a><span data-dcnode-id="1021" instrument_node="">
</span><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">
</span><span class="caption" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">So on the basis of Scripture, reason and the authentic teaching of early Christianity, Newton found that he could not accept the doctrine of the Trinity. He believed strongly in the supreme sovereignty of Jehovah God, and the proper position of Jesus Christ, neither derogating him as the Son of God nor elevating him to the position occupied by his Father. In discussing with John Locke the passage of Daniel 7:9, he wrote, “Whence are you certain that ye Ancient of Days is Christ? Does Christ anywhere sit upon ye Throne?” His own conclusion here is obvious, and the clarity of his thought regarding the relationship of the Father with the Son is always evident in Newton’s writings. So elsewhere he makes the point that prayer can be made to “God in the name of the Lamb, but not to the Lamb in the name of God.”</span></span><span data-dcnode-id="1016" instrument_node="">
</span></div><span data-dcnode-id="1014" instrument_node="">
</span><div class="clear" data-dcnode-id="1013"></div><span data-dcnode-id="1012" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="991" data-version="1" id="Image152"><span data-dcnode-id="1010" instrument_node="">
</span><h2 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Why do You Believe in the Trinity?</span></h2><span data-dcnode-id="1007" instrument_node="">
</span><div class="widget-content" data-dcnode-id="995"><span data-dcnode-id="1006" instrument_node="">
</span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/why-do-you-believe-in-trinity.html"><span data-dcnode-id="1005" instrument_node="">
</span><img alt="Why do You Believe in the Trinity?" data-dcnode-id="1004" height="253" id="Image152_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/--ErxJaMxoeI/ThEVh6gfASI/AAAAAAAAJMI/NmMrvLfVjBA/s253/falsegodpa4.jpg&amp;raw" width="188"><span data-dcnode-id="1003" instrument_node="">
</span></a><span data-dcnode-id="1001" instrument_node="">
</span><br data-dcnode-id="1000"><span data-dcnode-id="999" instrument_node="">
</span><span class="caption" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">FOR centuries millions of people have believed the doctrine of the trinity, which teaches that “in the unity of the Godhead there are Three Persons, the Father, the Son, and the Holy Spirit, these Three Persons being truly distinct one from another. Thus, in the words of the Athanasian Creed: ‘The Father is God, the Son is God, and the Holy Spirit is God, and yet there are not three Gods, but one God.’” (The Catholic Encyclopedia) Do you believe this doctrine? Why?</span></span><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="994" instrument_node="">
</span><div class="clear" data-dcnode-id="993"></div><span data-dcnode-id="992" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="971" data-version="1" id="Image164"><span data-dcnode-id="990" instrument_node="">
</span><h2 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Accurate Knowledge of God and his Son leads to Life</span></h2><span data-dcnode-id="987" instrument_node="">
</span><div class="widget-content" data-dcnode-id="975"><span data-dcnode-id="986" instrument_node="">
</span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/accurate-knowledge-of-god-and-his-son.html"><span data-dcnode-id="985" instrument_node="">
</span><img alt="Accurate Knowledge of God and his Son leads to Life" data-dcnode-id="984" height="253" id="Image164_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-oSlEFf8-n7o/ToE4gGJ7RBI/AAAAAAAAJ8s/0TXHSAAdRKM/s253/imagesCA0FMGAU.jpg&amp;raw" style="visibility: visible;" width="168"><span data-dcnode-id="983" instrument_node="">
</span></a><span data-dcnode-id="981" instrument_node="">
</span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">
</span><span class="caption" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">ACCURATE knowledge of God and his Son, Jesus Christ, is vital for those who want everlasting life. “[God’s] will is that all sorts of men should be saved and come to an accurate knowledge of truth.” (1 Timothy 2:4) Such knowledge from God’s inspired Word, the Bible, will equip us to know who God is and what our obligations are toward him. (2 Timothy 3:16, 17; 1 John 2:17) It will also enable us properly to identify Jesus Christ and our relationship to him.—Psalm 2:12; Philippians 2:5-11.</span></span><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span><div class="clear" data-dcnode-id="973"></div><span data-dcnode-id="972" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="951" data-version="1" id="Image41"><span data-dcnode-id="970" instrument_node="">
</span><h2 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The scriptures, reason and the Trinity</span></h2><span data-dcnode-id="967" instrument_node="">
</span><div class="widget-content" data-dcnode-id="955"><span data-dcnode-id="966" instrument_node="">
</span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/11/scriptures-reason-and-trinity.html"><span data-dcnode-id="965" instrument_node="">
</span><img alt="The scriptures, reason and the Trinity" data-dcnode-id="964" height="253" id="Image41_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-QJ44KHIBGGw/ThElKwRtWrI/AAAAAAAAJRY/NXOMZ3ckqv8/s253/len-delessio-the-scales-of-justice.jpg&amp;raw" width="190"><span data-dcnode-id="963" instrument_node="">
</span></a><span data-dcnode-id="961" instrument_node="">
</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
</span><span class="caption" data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">The fact that the teaching of the trinity is not mentioned, not discussed, not explained nor vindicated anywhere in the Scriptures when so many other main points of teaching are (and that in spite of the fact that it has been the most controversial teaching of so-called Christianity) is strong circumstantial evidence that neither Christ Jesus nor his apostles nor disciples, nor, for that matter, any of the prophets of old recognized or taught such a mysterious teaching. God through his Word appeals to our reason. The trinity doctrine is a negation of both the Scriptures and reason.</span></span><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span><div class="clear" data-dcnode-id="953"></div><span data-dcnode-id="952" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="931" data-version="1" id="Image121"><span data-dcnode-id="950" instrument_node="">
</span><h2 data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Could Jesus have had faith In God?</span></h2><span data-dcnode-id="947" instrument_node="">
</span><div class="widget-content" data-dcnode-id="935"><span data-dcnode-id="946" instrument_node="">
</span><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/06/could-jesus-have-had-faith-in-god.html"><span data-dcnode-id="945" instrument_node="">
</span><img alt="Could Jesus have had faith In God?" data-dcnode-id="944" height="253" id="Image121_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-MHzXWz5MCIg/ThElb2huf3I/AAAAAAAAJRg/bg6gBhqGwVQ/s253/jesuspraying.jpg&amp;raw" style="visibility: visible;" width="211"><span data-dcnode-id="943" instrument_node="">
</span></a><span data-dcnode-id="941" instrument_node="">
</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">
</span><span class="caption" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">The question of Jesus’ faith really is an enigma for Catholic, Protestant, and Orthodox theologians who believe in the Trinity as “the central mystery of Christian faith and life.” Not all deny Jesus’ faith, however. Jacques Guillet affirms that “it is impossible not to recognize that Jesus had faith,” though Guillet admits that, in the light of Trinity doctrine, it is a “paradox.”</span></span><span data-dcnode-id="936" instrument_node="">
</span></div><span data-dcnode-id="934" instrument_node="">
</span><div class="clear" data-dcnode-id="933"></div><span data-dcnode-id="932" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="911" data-version="1" id="Image24"><span data-dcnode-id="930" instrument_node="">
</span><h2 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">John 1:1, Sahidic Coptic text. - "and a god was the word"</span></h2><span data-dcnode-id="927" instrument_node="">
</span><div class="widget-content" data-dcnode-id="915"><span data-dcnode-id="926" instrument_node="">
</span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nwtandcoptic.blogspot.com/"><span data-dcnode-id="925" instrument_node="">
</span><img alt="John 1:1, Sahidic Coptic text. - &quot;and a god was the word&quot;" data-dcnode-id="924" height="183" id="Image24_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-z0Qqv__JIIE/ThElqHomJ0I/AAAAAAAAJRo/cP7VAzGs34Y/s253/copticsahidic.jpg&amp;raw" style="visibility: visible;" width="230"><span data-dcnode-id="923" instrument_node="">
</span></a><span data-dcnode-id="921" instrument_node="">
</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span><span class="caption" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">As Christianity spread, other versions were required. At least by the third century&nbsp;C.E., the first translation of the Christian Greek Scriptures had been made for the Coptic natives of Egypt. Various Coptic dialects were used in Egypt, and in time various Coptic versions were produced. The most important are the Thebaic, or Sahidic, Version of Upper Egypt (in the S) and the Bohairic Version of Lower Egypt (in the N). These versions, containing both the Hebrew and Christian Greek Scriptures, were probably produced in the third and fourth centuries&nbsp;C.E.</span></span><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span><div class="clear" data-dcnode-id="913"></div><span data-dcnode-id="912" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="891" data-version="1" id="Image99"><span data-dcnode-id="910" instrument_node="">
</span><h2 data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Is Jesus Christ Michael the Archangel?</span></h2><span data-dcnode-id="907" instrument_node="">
</span><div class="widget-content" data-dcnode-id="895"><span data-dcnode-id="906" instrument_node="">
</span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/02/is-jesus-christ-michael-archangel.html"><span data-dcnode-id="905" instrument_node="">
</span><img alt="Is Jesus Christ Michael the Archangel?" data-dcnode-id="904" height="290" id="Image99_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TR5vb3GFVHI/AAAAAAAAHgU/YaH1S_5ts74/S1600-R/Jesus_on_white_horse.jpg&amp;raw" style="visibility: visible;" width="199"><span data-dcnode-id="903" instrument_node="">
</span></a><span data-dcnode-id="901" instrument_node="">
</span><br data-dcnode-id="900"><span data-dcnode-id="899" instrument_node="">
</span><span class="caption" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Michael is the only one said to be the “archangel,” meaning ‘chief angel’ or ‘principal angel’. The term occurs in the Bible only in the singular. This seems to imply that there is but one whom God has designated chief or head of the angelic host. At 1 Thess. 4:16 the voice of the resurrected Lord Jesus Christ is described as being that of an archangel, suggesting that he is in fact, himself the archangel.</span></span><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span><div class="clear" data-dcnode-id="893"></div><span data-dcnode-id="892" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="871" data-version="1" id="Image176"><span data-dcnode-id="890" instrument_node="">
</span><h2 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Christendoms Foundation</span></h2><span data-dcnode-id="887" instrument_node="">
</span><div class="widget-content" data-dcnode-id="875"><span data-dcnode-id="886" instrument_node="">
</span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/07/christendoms-foundation.html"><span data-dcnode-id="885" instrument_node="">
</span><img alt="Christendoms Foundation" data-dcnode-id="884" height="253" id="Image176_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/_QcjB84-75-0/TL5sxyKq-oI/AAAAAAAAGGc/ioVToM-4nWU/S253/987163_f248.jpg&amp;raw" style="visibility: visible;" width="175"><span data-dcnode-id="883" instrument_node="">
</span></a><span data-dcnode-id="881" instrument_node="">
</span><br data-dcnode-id="880"><span data-dcnode-id="879" instrument_node="">
</span><span class="caption" data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">As British broadcaster Malcolm Muggeridge wrote in his book The End of Christendom: “Christendom began with the Emperor Constantine.” However, he also made the perceptive comment: “You might even say that Christ himself abolished Christendom before it began by stating that his kingdom was not of this world—one of the most far reaching and important of all his statements.” And one most widely ignored by Christendom’s religious and political rulers.—John 18:36.</span></span><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="874" instrument_node="">
</span><div class="clear" data-dcnode-id="873"></div><span data-dcnode-id="872" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="851" data-version="1" id="Image40"><span data-dcnode-id="870" instrument_node="">
</span><h2 data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">How Christendom borrows from Plato</span></h2><span data-dcnode-id="867" instrument_node="">
</span><div class="widget-content" data-dcnode-id="855"><span data-dcnode-id="866" instrument_node="">
</span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/06/how-christendom-borrows-from-plato.html"><span data-dcnode-id="865" instrument_node="">
</span><img alt="How Christendom borrows from Plato" data-dcnode-id="864" height="253" id="Image40_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-aL1nAY62dNE/ThEw8Yt6JUI/AAAAAAAAJTQ/TFrq4P1dtgE/s253/plato.jpg&amp;raw" style="visibility: visible;" width="198"><span data-dcnode-id="863" instrument_node="">
</span></a><span data-dcnode-id="861" instrument_node="">
</span><br data-dcnode-id="860"><span data-dcnode-id="859" instrument_node="">
</span><span class="caption" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Not long after the twelve apostles of Jesus Christ died, heated debates began to center around the nature and relationship of the Father, Son and holy spirit. Efforts to settle such questions led to a series of “creeds,” or statements of belief, that eventually resulted in Christendom’s doctrine of the Trinity. Do you believe in the Trinity? Perhaps you have always thought of it as based upon the Bible. But do you know exactly what that doctrine teaches?</span></span><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span><div class="clear" data-dcnode-id="853"></div><span data-dcnode-id="852" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="831" data-version="1" id="Image162"><span data-dcnode-id="850" instrument_node="">
</span><h2 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">No Divine Inspiration</span></h2><span data-dcnode-id="847" instrument_node="">
</span><div class="widget-content" data-dcnode-id="835"><span data-dcnode-id="846" instrument_node="">
</span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/02/no-claim-of-inspiration.html"><span data-dcnode-id="845" instrument_node="">
</span><img alt="No Divine Inspiration" data-dcnode-id="844" height="196" id="Image162_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-yhLojAjWB5I/ThEw_Yimh3I/AAAAAAAAJTY/WhZ8pLo5Kis/s253/divine_inspiration.jpg&amp;raw" width="253"><span data-dcnode-id="843" instrument_node="">
</span></a><span data-dcnode-id="841" instrument_node="">
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><span class="caption" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Jehovah’s Witnesses do not claim to be inspired prophets. They have made mistakes. Like the apostles of Jesus Christ, they have at times had some wrong expectations.—Luke 19:11; Acts 1:6. It is true that the Witnesses have made mistakes in their understanding of what would occur at the end of certain time periods, but they have not made the mistake of losing faith or ceasing to be watchful as to fulfillment of Jehovah’s purposes.</span></span><span data-dcnode-id="836" instrument_node="">
</span></div><span data-dcnode-id="834" instrument_node="">
</span><div class="clear" data-dcnode-id="833"></div><span data-dcnode-id="832" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="811" data-version="1" id="Image31"><span data-dcnode-id="830" instrument_node="">
</span><h2 data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Apostasy "seeing oneself as a victim denied"</span></h2><span data-dcnode-id="827" instrument_node="">
</span><div class="widget-content" data-dcnode-id="815"><span data-dcnode-id="826" instrument_node="">
</span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/07/seeing-onself-as-victim-denied.html"><span data-dcnode-id="825" instrument_node="">
</span><img alt="Apostasy &quot;seeing oneself as a victim denied&quot;" data-dcnode-id="824" height="253" id="Image31_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2.bp.blogspot.com/-kR7CxeFluGo/ThEY7OwGo_I/AAAAAAAAJOY/LGz_UJ3rpDE/s253/business-man-crying.jpg&amp;raw" style="visibility: visible;" width="169"><span data-dcnode-id="823" instrument_node="">
</span></a><span data-dcnode-id="821" instrument_node="">
</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><span class="caption" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">As a result of seeing oneself as a victim denied, there can occur a powerful drive toward disaffection and apostasy. As is almost inevitably the case, there is a great need on the part of a leave-taker to validate their oppositional stance, and the victim-victimizer scenario greatly assists a person in justifying their course of action. Blame shifting may therefore temporarily relieve a person of accountability, but it will only succeed in sanctioning a person's actions so long as their position is given greater exposure over that of their (former) religious fraternity. Thus, the importance placed upon maintaining a heightened level of awareness toward the apostate's unique view works to reinforce the reasons for their departure by maintaining the consequences of blame and continuing to scrutinize it in the object of hostility. It is not difficult to see then why an apostate so adamantly rejects information that contradicts the typecast that they have worked so hard to establish.</span></span><span data-dcnode-id="816" instrument_node="">
</span></div><span data-dcnode-id="814" instrument_node="">
</span><div class="clear" data-dcnode-id="813"></div><span data-dcnode-id="812" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="791" data-version="1" id="Image119"><span data-dcnode-id="810" instrument_node="">
</span><h2 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Apostasy, Who let the Dog's Out!</span></h2><span data-dcnode-id="807" instrument_node="">
</span><div class="widget-content" data-dcnode-id="795"><span data-dcnode-id="806" instrument_node="">
</span><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/03/apostasy-who-let-dogs-out.html"><span data-dcnode-id="805" instrument_node="">
</span><img alt="Apostasy, Who let the Dog's Out!" data-dcnode-id="804" height="253" id="Image119_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-vkMNJDIE_bs/ThEY-Y4WD7I/AAAAAAAAJOg/oueByaJ8OcU/s253/finger-pointer1.jpg&amp;raw" width="163"><span data-dcnode-id="803" instrument_node="">
</span></a><span data-dcnode-id="801" instrument_node="">
</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
</span><span class="caption" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">17These men are springs without water and mists driven by a storm. Blackest darkness is reserved for them. 18For they mouth empty, boastful words and, by appealing to the lustful desires of sinful human nature, they entice people who are just escaping from those who live in error. 19They promise them freedom, while they themselves are slaves of depravity—for a man is a slave to whatever has mastered him. 20If they have escaped the corruption of the world by knowing our Lord and Savior Jesus Christ and are again entangled in it and overcome, they are worse off at the end than they were at the beginning. 21It would have been better for them not to have known the way of righteousness, than to have known it and then to turn their backs on the sacred command that was passed on to them. 22Of them the proverbs are true: "A dog returns to its vomit,"[a]and, "A sow that is washed goes back to her wallowing in the mud." - 2 Peter 2:17-22 (New International Version)</span></span><span data-dcnode-id="796" instrument_node="">
</span></div><span data-dcnode-id="794" instrument_node="">
</span><div class="clear" data-dcnode-id="793"></div><span data-dcnode-id="792" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="771" data-version="1" id="Image140"><span data-dcnode-id="790" instrument_node="">
</span><h2 data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The Apostasy</span></h2><span data-dcnode-id="787" instrument_node="">
</span><div class="widget-content" data-dcnode-id="775"><span data-dcnode-id="786" instrument_node="">
</span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/05/apostasy.html"><span data-dcnode-id="785" instrument_node="">
</span><img alt="The Apostasy" data-dcnode-id="784" height="253" id="Image140_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-F13l-QaISRw/ThEZBS16V3I/AAAAAAAAJOo/tYruCF-OZ0o/s253/z165893233.jpg&amp;raw" style="visibility: visible;" width="221"><span data-dcnode-id="783" instrument_node="">
</span></a><span data-dcnode-id="781" instrument_node="">
</span><br data-dcnode-id="780"><span data-dcnode-id="779" instrument_node="">
</span><span class="caption" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Among the various causes of apostasy, one of the foremost is unquestionably a lack of faith through doubt. (Heb. 3:12) Interestingly, The New International Dictionary of New Testament Theology supplies the following information on the Greek verb that is often translated by “to doubt”: “Diakrinō, make a distinction, judge, . . . ; doubt, waver. . . . In some [New Testament] passages doubt appears as a lack of faith and thus as sin (Rom. 14:23). . . . In Rom. 4:20f. doubt comes close to disbelief. . . . Doubt is thus a lack of trust in the act of God which he has still to perform and which men are to await. . . . In the NT the doubter sins against God and his promises, because he judges God falsely.”</span></span><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
</span><div class="clear" data-dcnode-id="773"></div><span data-dcnode-id="772" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="751" data-version="1" id="Image17"><span data-dcnode-id="770" instrument_node="">
</span><h2 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Apostates - "animalistic men"</span></h2><span data-dcnode-id="767" instrument_node="">
</span><div class="widget-content" data-dcnode-id="755"><span data-dcnode-id="766" instrument_node="">
</span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2010/05/apostates-animalistic-men.html"><span data-dcnode-id="765" instrument_node="">
</span><img alt="Apostates - &quot;animalistic men&quot;" data-dcnode-id="764" height="253" id="Image17_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-9KSleaW-IIg/ThERVPCV1QI/AAAAAAAAJJw/_3KmmLsLBEU/s253/The-Wolfman-2009.jpg&amp;raw" width="170"><span data-dcnode-id="763" instrument_node="">
</span></a><span data-dcnode-id="761" instrument_node="">
</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span><span class="caption" data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">“As for you, beloved ones, call to mind the sayings that have been previously spoken by the apostles of our Lord Jesus Christ, how they used to say to you: ‘In the last time there will be ridiculers, proceeding according to their own desires for ungodly things.’ These are the ones that make separations, animalistic men, not having spirituality.” (Jude 17-19)</span></span><span data-dcnode-id="756" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
</span><div class="clear" data-dcnode-id="753"></div><span data-dcnode-id="752" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="731" data-version="1" id="Image94"><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">The Divine Name, GOD HAS A NAME! And knowing His name is important!</span></h2><span data-dcnode-id="747" instrument_node="">
</span><div class="widget-content" data-dcnode-id="735"><span data-dcnode-id="746" instrument_node="">
</span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.divine-name.info/index.htm"><span data-dcnode-id="745" instrument_node="">
</span><img alt="The Divine Name, GOD HAS A NAME! And knowing His name is important!" data-dcnode-id="744" height="253" id="Image94_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-QSZWGgLxszk/ThEYj0i0ilI/AAAAAAAAJOQ/Wvcrf6pqP68/s253/Watchtower-July-1-2010.png&amp;raw" width="201"><span data-dcnode-id="743" instrument_node="">
</span></a><span data-dcnode-id="741" instrument_node="">
</span><br data-dcnode-id="740"><span data-dcnode-id="739" instrument_node="">
</span><span class="caption" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">The sole aim of our Internet site is to bring God’s name into the spotlight. Further information is given on our page “explanation”. By means of the other pages you will see that our Internet site focuses especially on “showing”. By means of many photographs and documents we show the use of God’s name in archaeology, literature, music and on exceptional objects. We transcend the borders of religion - God’s name is indeed found in many religions, on places and objects of which the visitors themselves perhaps are even not aware.</span></span><span data-dcnode-id="736" instrument_node="">
</span></div><span data-dcnode-id="734" instrument_node="">
</span><div class="clear" data-dcnode-id="733"></div><span data-dcnode-id="732" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="711" data-version="1" id="Image8"><span data-dcnode-id="730" instrument_node="">
</span><h2 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The Divine Name, do you use it?</span></h2><span data-dcnode-id="727" instrument_node="">
</span><div class="widget-content" data-dcnode-id="715"><span data-dcnode-id="726" instrument_node="">
</span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//watchtower.org/e/na/index.htm"><span data-dcnode-id="725" instrument_node="">
</span><img alt="The Divine Name, do you use it?" data-dcnode-id="724" height="240" id="Image8_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/_QcjB84-75-0/SHGy8kqWdUI/AAAAAAAAAEA/cMxJWHssebI/S240/z71121730.jpg&amp;raw" width="189"><span data-dcnode-id="723" instrument_node="">
</span></a><span data-dcnode-id="721" instrument_node="">
</span><br data-dcnode-id="720"><span data-dcnode-id="719" instrument_node="">
</span><span class="caption" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">It was not merely by chance that Jesus taught his followers to put God's name first in their prayers. That name was clearly of crucial importance to him, since he mentioned it repeatedly in his own prayers. On one occasion when he was praying publicly to God, he was heard to say: "Father, glorify your name!" And God himself answered: "I have glorified it, and I will glorify it again."—John 12:28, The Jerusalem Bible.</span></span><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><div class="clear" data-dcnode-id="713"></div><span data-dcnode-id="712" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="691" data-version="1" id="Image105"><span data-dcnode-id="710" instrument_node="">
</span><h2 data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">“You, O Jehovah, are good and ready to forgive.”</span></h2><span data-dcnode-id="707" instrument_node="">
</span><div class="widget-content" data-dcnode-id="695"><span data-dcnode-id="706" instrument_node="">
</span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/02/you-o-jehovah-are-good-and-ready-to.html"><span data-dcnode-id="705" instrument_node="">
</span><img alt="“You, O Jehovah, are good and ready to forgive.”" data-dcnode-id="704" height="253" id="Image105_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-zPw1rQ-aJEI/ThEXwP0hNII/AAAAAAAAJNo/oLe_GNcgaeI/s253/womanPraying.jpg&amp;raw" width="215"><span data-dcnode-id="703" instrument_node="">
</span></a><span data-dcnode-id="701" instrument_node="">
</span><br data-dcnode-id="700"><span data-dcnode-id="699" instrument_node="">
</span><span class="caption" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">We read: “As far off as the sunrise is from the sunset, so far off from us he has put our transgressions. As a father shows mercy to his sons, Jehovah has shown mercy to those fearing him.” Why is Jehovah disposed to show mercy? The next verse answers: “For he himself well knows the formation of us, remembering that we are dust.” (Psalm 103:12-14) Yes, Jehovah does not forget that we are creatures of dust, having frailties, or weaknesses, as a result of imperfection. The expression that he knows “the formation of us” reminds us that the Bible likens Jehovah to a potter and us to the vessels he forms. (Jeremiah 18:2-6) A potter handles his clay vessels firmly yet delicately, ever mindful of their nature. So, too, Jehovah, the Great Potter, tempers his dealings with us according to the frailty of our sinful nature.—Compare 2 Corinthians 4:7.</span></span><span data-dcnode-id="696" instrument_node="">
</span></div><span data-dcnode-id="694" instrument_node="">
</span><div class="clear" data-dcnode-id="693"></div><span data-dcnode-id="692" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="671" data-version="1" id="Image174"><span data-dcnode-id="690" instrument_node="">
</span><h2 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Vatican Says "Yahweh" Not to Be Pronounced</span></h2><span data-dcnode-id="687" instrument_node="">
</span><div class="widget-content" data-dcnode-id="675"><span data-dcnode-id="686" instrument_node="">
</span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2008/08/vatican-says-yahweh-not-to-be.html"><span data-dcnode-id="685" instrument_node="">
</span><img alt="Vatican Says &quot;Yahweh&quot; Not to Be Pronounced" data-dcnode-id="684" height="190" id="Image174_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/_QcjB84-75-0/TL3R5EVVciI/AAAAAAAAGDM/D-elEcesNRk/S760/vatican-city.jpg&amp;raw" width="253"><span data-dcnode-id="683" instrument_node="">
</span></a><span data-dcnode-id="681" instrument_node="">
</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
</span><span class="caption" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">WASHINGTON, D.C., AUG. 19, 2008 (Zenit.org).- A note from the Vatican has reiterated a directive that the name of God revealed in the tetragrammaton YHWH is not to be pronounced in Catholic liturgy.</span></span><span data-dcnode-id="676" instrument_node="">
</span></div><span data-dcnode-id="674" instrument_node="">
</span><div class="clear" data-dcnode-id="673"></div><span data-dcnode-id="672" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="651" data-version="1" id="Image14"><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Pastor Russell Said, online database of Russell's writings</span></h2><span data-dcnode-id="667" instrument_node="">
</span><div class="widget-content" data-dcnode-id="655"><span data-dcnode-id="666" instrument_node="">
</span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ctrussell.us/"><span data-dcnode-id="665" instrument_node="">
</span><img alt="Pastor Russell Said, online database of Russell's writings" data-dcnode-id="664" height="253" id="Image14_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-ipMy5AjLcOk/ThEeo-URaLI/AAAAAAAAJQA/ehlW3KOn1Qw/s253/51wk9DY5DRL__SL500_AA300_.jpg&amp;raw" width="253"><span data-dcnode-id="663" instrument_node="">
</span></a><span data-dcnode-id="661" instrument_node="">
</span><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
</span><span class="caption" data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Nor would we have our writings reverenced or regarded as infallible, or on a par with the holy Scriptures. The most we claim or have ever claimed for our teachings is that they are what we believe to be harmonious interpretations of the divine Word, in harmony with the spirit of the truth. And we still urge, as in the past, that each reader study the subjects we present in the light of the Scriptures, proving all things by the Scriptures, accepting what they see to be thus approved, and rejecting all else. It is to this end, to enable the student to trace the subject in the divinely inspired Record, that we so freely intersperse both quotations and citations of the Scriptures upon which to build.</span></span><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">
</span><div class="clear" data-dcnode-id="653"></div><span data-dcnode-id="652" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="631" data-version="1" id="Image1"><span data-dcnode-id="650" instrument_node="">
</span><h2 data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Studies in the Scriptures (from a Bible Student site)</span></h2><span data-dcnode-id="647" instrument_node="">
</span><div class="widget-content" data-dcnode-id="635"><span data-dcnode-id="646" instrument_node="">
</span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mostholyfaith.com/bible/volumes/index.asp"><span data-dcnode-id="645" instrument_node="">
</span><img alt="Studies in the Scriptures (from a Bible Student site)" data-dcnode-id="644" height="253" id="Image1_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-wecv7ZKArBY/ThEX97qy5DI/AAAAAAAAJN4/q2IBG5C5Omo/s253/_wsb_358x452_Volumes%25252BColor%25252BAd%25252B1-smaller%25252Bversion.jpg&amp;raw" style="visibility: visible;" width="200"><span data-dcnode-id="643" instrument_node="">
</span></a><span data-dcnode-id="641" instrument_node="">
</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
</span><span class="caption" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Many of these books have been burned by people who never read them, but who were influenced by misrepresentations. Just so it was during the Dark Ages in respect to the followers of Jesus, who suffered martyrdom. Yes, Jesus Himself suffered at the hands of those who did not understand Him or His teachings, as St. Peter pointedly declares: “And now, brethren, I wot that through ignorance ye did it, as did also your rulers” (Acts 3:17); “for had they known it, they would not have crucified the Lord of Glory.” 1 Cor. 2:8</span></span><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span><div class="clear" data-dcnode-id="633"></div><span data-dcnode-id="632" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="611" data-version="1" id="Image2"><span data-dcnode-id="630" instrument_node="">
</span><h2 data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Bible Student history (this is how they see it)</span></h2><span data-dcnode-id="627" instrument_node="">
</span><div class="widget-content" data-dcnode-id="615"><span data-dcnode-id="626" instrument_node="">
</span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.heraldmag.org/2006_history/toc_history.htm"><span data-dcnode-id="625" instrument_node="">
</span><img alt="Bible Student history (this is how they see it)" data-dcnode-id="624" height="253" id="Image2_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-HvsdfocQ5-g/ThEXz-VcUJI/AAAAAAAAJNw/YO6yU-e4jYM/s253/Bible-Students-History.jpg&amp;raw" style="visibility: visible;" width="194"><span data-dcnode-id="623" instrument_node="">
</span></a><span data-dcnode-id="621" instrument_node="">
</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
</span><span class="caption" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">And so it was in the early part of 1879 that Pastor Russell decided to withdraw his financial and editorial support from The Herald of the Morning and formed The Watch Tower Bible and Tract Society, publishing, as its journal, Zion’s Watch Tower and Herald of Christ’s Presence.</span></span><span data-dcnode-id="616" instrument_node="">
</span></div><span data-dcnode-id="614" instrument_node="">
</span><div class="clear" data-dcnode-id="613"></div><span data-dcnode-id="612" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="591" data-version="1" id="Image128"><span data-dcnode-id="610" instrument_node="">
</span><h2 data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Nelson H. Barbour</span></h2><span data-dcnode-id="607" instrument_node="">
</span><div class="widget-content" data-dcnode-id="595"><span data-dcnode-id="606" instrument_node="">
</span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/nelson-n-barbour-and-1873.html"><span data-dcnode-id="605" instrument_node="">
</span><img alt="Nelson H. Barbour" data-dcnode-id="604" height="253" id="Image128_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-KW54umYaVfw/ThEXZxoA_jI/AAAAAAAAJNQ/9BskR9Dk1P4/s253/Nelson_H_Barbour.jpg&amp;raw" style="visibility: visible;" width="198"><span data-dcnode-id="603" instrument_node="">
</span></a><span data-dcnode-id="601" instrument_node="">
</span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
</span><span class="caption" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Barbour continued the Herald of the Morning, though with breaks, until at least 1903, occasionally issuing statements critical of C. T. Russell. He wrote favorably though cautiously that he was persuaded 1896 was the date for Christ's visible return. This wasn't original with him, but grew out of the Advent Christian Church. The last date set by Barbour for Christ’s return was 1907.</span></span><span data-dcnode-id="596" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span><div class="clear" data-dcnode-id="593"></div><span data-dcnode-id="592" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="571" data-version="1" id="Image129"><span data-dcnode-id="590" instrument_node="">
</span><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">John H. Paton</span></h2><span data-dcnode-id="587" instrument_node="">
</span><div class="widget-content" data-dcnode-id="575"><span data-dcnode-id="586" instrument_node="">
</span><a data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/john-h-paton.html"><span data-dcnode-id="585" instrument_node="">
</span><img alt="John H. Paton" data-dcnode-id="584" height="253" id="Image129_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//4.bp.blogspot.com/-UkBRNtzwj9k/ThEXc9zhjjI/AAAAAAAAJNY/fPquL1XmDmg/s253/G30.jpg&amp;raw" width="180"><span data-dcnode-id="583" instrument_node="">
</span></a><span data-dcnode-id="581" instrument_node="">
</span><br data-dcnode-id="580"><span data-dcnode-id="579" instrument_node="">
</span><span class="caption" data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Two years later, Paton, who was then serving as a traveling representative of the Watch Tower, also began to turn away, thereafter publishing a book (his second one entitled Day Dawn) in which he rejected belief in Adam’s fall into sin and consequently the need for a redeemer. He reasoned that the Lord himself was an imperfect man who by his life simply showed others how to crucify their sinful propensities.</span></span><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span><div class="clear" data-dcnode-id="573"></div><span data-dcnode-id="572" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="551" data-version="1" id="Image102"><span data-dcnode-id="570" instrument_node="">
</span><h2 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Maria F. Russell</span></h2><span data-dcnode-id="567" instrument_node="">
</span><div class="widget-content" data-dcnode-id="555"><span data-dcnode-id="566" instrument_node="">
</span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/maria-f-russell.html"><span data-dcnode-id="565" instrument_node="">
</span><img alt="Maria F. Russell" data-dcnode-id="564" height="226" id="Image102_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3.bp.blogspot.com/-eKS8ftQ5u6M/TYln9r95LWI/AAAAAAAAI54/uXdgIRJW3Pc/s1600/maria.gif&amp;raw" style="visibility: visible;" width="195"><span data-dcnode-id="563" instrument_node="">
</span></a><span data-dcnode-id="561" instrument_node="">
</span><br data-dcnode-id="560"><span data-dcnode-id="559" instrument_node="">
</span><span class="caption" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Mrs. Russell was a director of the Watch Tower Society and served as its secretary and treasurer for some years. She also was a regular contributor to the columns of Zion’s Watch Tower and for a time was an associate editor of the journal. Eventually, she sought a stronger voice in what should be published in the Watch Tower. Such ambition was comparable to that of Moses’ sister Miriam, who rose up against her brother as leader of Israel under God and tried to make herself prominent—a course that met with divine disapproval.—Num. 12:1-15.</span></span><span data-dcnode-id="556" instrument_node="">
</span></div><span data-dcnode-id="554" instrument_node="">
</span><div class="clear" data-dcnode-id="553"></div><span data-dcnode-id="552" instrument_node="">
</span></div><div class="widget Image" data-dcnode-id="531" data-version="1" id="Image103"><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Ernest C. Henninges "New Covenant Fellowship"</span></h2><span data-dcnode-id="547" instrument_node="">
</span><div class="widget-content" data-dcnode-id="535"><span data-dcnode-id="546" instrument_node="">
</span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pastorrussell.blogspot.com/2009/04/ernest-c-henninges_25.html"><span data-dcnode-id="545" instrument_node="">
</span><img alt="Ernest C. Henninges &quot;New Covenant Fellowship&quot;" data-dcnode-id="544" height="253" id="Image103_img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//1.bp.blogspot.com/-nfd9yrOR7tg/ThEXguybRsI/AAAAAAAAJNg/2KcLCQelarI/s253/E_%252BC_%252BHenninges%252B%2525282%252529.jpg&amp;raw" width="169"><span data-dcnode-id="543" instrument_node="">
</span></a><span data-dcnode-id="541" instrument_node="">
