</span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-342" data-dcnode-id="946" id="menu-item-342"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//buildingtheskyline.org/skynomics-blog/"><span data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Skynomics Blog</span></span></a></li><span data-dcnode-id="945" instrument_node="">
</span></ul></div></nav><div class="site-inner" data-dcnode-id="143"><div class="content-sidebar-wrap" data-dcnode-id="144"><main class="content" data-dcnode-id="145"><article class="post-415 post type-post status-publish format-standard category-skynomics-blog tag-bradford-lee-gilbert tag-chicago tag-first-skyscraper tag-home-insurance-building tag-new-york tag-steel-skeleton tag-tribune-building tag-william-le-baron-jenney entry" data-dcnode-id="631"><header class="entry-header" data-dcnode-id="926"><p class="entry-meta" data-dcnode-id="930"><time class="entry-time" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">October 7, 2017</span></time><span data-dcnode-id="939" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="936"><span class="entry-author-name" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Jason Barr</span></span></span><span data-dcnode-id="935" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="932"><a data-dcnode-id="933" href="#comments"><span data-dcnode-id="934" instrument_node="">10 Comments</span></a></span><span data-dcnode-id="931" instrument_node=""> </span></p><h1 class="entry-title" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">The Birth of Height: What was the World’s First Skyscraper?</span></h1><span data-dcnode-id="927" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="664"><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">By </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jasonmbarr.com/"><span data-dcnode-id="924" instrument_node="">Jason M. Barr</span></a><span data-dcnode-id="922" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; October 7, 2017</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">What was the world’s first skyscraper? If you do have an answer, you would be, most assuredly, wrong (sorry). Any skyscraper that we claim as the “first” is merely a convenience—a social convention to provide a simple answer to a complicated question.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">But why would it be wrong? For two reasons. First, there is no universal definition of a skyscraper. Is it a relatively tall building, or a building that rises above some threshold (say 80, 90, or 100 meters), or perhaps both?</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Alternatively, is it based on the materials and technology used? This definition leads to the second problem. After the Civil War, there were many buildings that incorporated some innovation, and thus we can point to any one of those structures to suggest it was the Original Skyscraper.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">The most popular answer is that the ten-story Home Insurance Building in Chicago, completed in 1885, was the first true skyscraper. Why? Because the belief is that it was the </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">one</span></em><span data-dcnode-id="907" instrument_node="">—the iphone of real estate—that fundamentally altered the world by applying the currently-available technology in a new way.</span></p><span data-dcnode-id="905" instrument_node="">
</span><figure aria-describedby="caption-attachment-420" class="wp-caption alignright" data-dcnode-id="901" id="attachment_420" style="width: 236px"><img alt="" class="wp-image-420" data-dcnode-id="904" height="363" sizes="(max-width: 236px) 100vw, 236px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/Home_Insurance_Building-195x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/Home_Insurance_Building-195x300.jpg 195w, https://buildingtheskyline.org/wp-content/uploads/2017/10/Home_Insurance_Building-300x461.jpg 300w, https://buildingtheskyline.org/wp-content/uploads/2017/10/Home_Insurance_Building.jpg 573w" width="236"><figcaption class="wp-caption-text" data-dcnode-id="902" id="caption-attachment-420"><span data-dcnode-id="903" instrument_node="">Home Insurance Building, (1885), Chicago</span></figcaption></figure><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">Most significant is that the architect, William Le Baron Jenney, had the key insight to use iron (later replaced by steel) framing. Previously, large buildings used the walls to bear the load of the structure. But as the need for taller buildings arose in the late-19</span><sup data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">th</span></sup><span data-dcnode-id="896" instrument_node=""> century, this approach was no longer practical. The higher the building went, the thicker would be the walls on the lower floors, eating into the rentable space and rendering the project unprofitable.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">However, in some sense, Jenney’s structure was a prototype, since the iron beams were embedded in the masonry walls, which also helped carry the load. Later buildings would use pure steel frames, or skeletons, while the walls were mere “curtains,” only needed to keep the elements out.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="890" instrument_node="">Historian Carl Condit </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3D5S6_919wx6wC%26lpg%3DPA84%26dq%3DThe%2520utilitarian%2520advantages%2520of%2520steel%2520framing%26pg%3DPA84%23v%3Donepage%26q%3DThe%2520utilitarian%2520advantages%2520of%2520steel%2520framing%26f%3Dfalse"><span data-dcnode-id="889" instrument_node="">writes</span></a><span data-dcnode-id="887" instrument_node="">,</span></p><span data-dcnode-id="885" instrument_node="">
</span><blockquote data-dcnode-id="882"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">The utilitarian advantages of steel framing were enormous and immediately obvious to architects, builders and owners. First was the possibility of getting rid of a supporting wall, with a consequent reduction in weight and an immense increase in height. The steel necessary to carry a tall building weighs only one-third as much as bearing masonry for an equal number of stories. The virtually unlimited increase in glass area, up to 100 per cent of coverage, allowed the maximum admission of light. The slender columns and wide bays offered greatly increased freedom in the disposition of interior space. Economy in cost of materials together with speed and efficiency of construction convinced even the most skeptical owners of the superiority of steel or wrought-iron framing.</span></p></blockquote><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="880" instrument_node="">In 1889, New York City soon entered the skyscraper game with the construction of the Tower Building at Lower Broadway. Architect Bradford Lee Gilbert also had an Eureka moment on how to build tall on the narrow lot. In 1905, he </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/Gilbert_Birth_of_NY_Skyscraper_NYTimes_1905.pdf"><span data-dcnode-id="879" instrument_node="">recalled</span></a><span data-dcnode-id="877" instrument_node=""> that,</span></p><span data-dcnode-id="875" instrument_node="">
</span><blockquote data-dcnode-id="872"><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">One day the idea came upon me like a flash that an iron bridge truss stood on end was the solution to the problem.</span></p></blockquote><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">Gilbert’s building, also, was not a pure skyscraper, since the top floors included load-bearing masonry walls. New York and Chicago each tried to say they were the first. But after reviewing the evidence, Sarah Landau and Carl Condit </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DzR1Get-mUU8C%26lpg%3DPA166%26dq%3DThe%2520only%2520fair%2520conclusion%2520to%2520be%2520drawn%2520is%2520that%2520architects%252C%2520engineers%2520and%2520builders%2520in%2520New%2520York%252C%2520Chicago%2520and%2520Minneapolis%2520were%2520simultaneously%2520and%2520independently%2520developing%2520the%2520iron%2520skeleton%2520system%26pg%3DPA166%23v%3Donepage%26q%3DThe%2520only%2520fair%2520conclusion%2520to%2520be%2520drawn%2520is%2520that%2520architects%2C%2520engineers%2520and%2520builders%2520in%2520New%2520York%2C%2520Chicago%2520and%2520Minneapolis%2520were%2520simultaneously%2520and%2520independently%2520developing%2520the%2520iron%2520skeleton%2520system%26f%3Dfalse"><span data-dcnode-id="869" instrument_node="">write</span></a><span data-dcnode-id="867" instrument_node="">,</span></p><span data-dcnode-id="865" instrument_node="">
</span><blockquote data-dcnode-id="862"><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">The only fair conclusion to be drawn is that architects, engineers and builders in New York, Chicago and Minneapolis were simultaneously and independently developing the iron skeleton system.</span></p></blockquote><span data-dcnode-id="861" instrument_node="">
</span><figure aria-describedby="caption-attachment-424" class="wp-caption alignright" data-dcnode-id="857" id="attachment_424" style="width: 160px"><img alt="" class="wp-image-424 size-medium" data-dcnode-id="860" height="300" loading="lazy" sizes="(max-width: 160px) 100vw, 160px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/1889_Tower_Building_NYC_Museum_of_the_City_of_NY_21.5_ft_wide-160x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/1889_Tower_Building_NYC_Museum_of_the_City_of_NY_21.5_ft_wide-160x300.jpg 160w, https://buildingtheskyline.org/wp-content/uploads/2017/10/1889_Tower_Building_NYC_Museum_of_the_City_of_NY_21.5_ft_wide-300x562.jpg 300w, https://buildingtheskyline.org/wp-content/uploads/2017/10/1889_Tower_Building_NYC_Museum_of_the_City_of_NY_21.5_ft_wide.jpg 427w" width="160"><figcaption class="wp-caption-text" data-dcnode-id="858" id="caption-attachment-424"><span data-dcnode-id="859" instrument_node="">Tower Building (1889), New York City</span></figcaption></figure><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="855" instrument_node="">While the steel skeleton—and elevator—are perhaps the </span><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">sine qua non</span></em><span data-dcnode-id="852" instrument_node=""> of the skyscraper, there are also about a dozen or so systems that go together to create the whole skyscraper machine.&nbsp; Necessary is the technology for wind bracing; </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ideas.repec.org/a/cup/jechis/v71y2011i04p1060-1077_00.html"><span data-dcnode-id="851" instrument_node="">anchoring the structure to the ground</span></a><span data-dcnode-id="849" instrument_node="">; fireproofing; heating, cooling, and ventilation; plumbing; and lighting and electrical wiring. Based on his research, Condit </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DoKYACAAAQBAJ%26lpg%3DPA22%26dq%3DIf%2520we%2520are%2520tracking%2520down%2520the%2520origins%2520the%2520skyscraper%2520we%2520have%2520certainly%2520reached%2520the%2520seminal%2520stage%2520in%2520New%2520York%2520and%2520Chicago%2520around%2520the%2520year%25201870%26pg%3DPA22%23v%3Donepage%26q%3DIf%2520we%2520are%2520tracking%2520down%2520the%2520origins%2520the%2520skyscraper%2520we%2520have%2520certainly%2520reached%2520the%2520seminal%2520stage%2520in%2520New%2520York%2520and%2520Chicago%2520around%2520the%2520year%25201870%26f%3Dfalse"><span data-dcnode-id="848" instrument_node="">concludes</span></a><span data-dcnode-id="846" instrument_node="">,</span></p><span data-dcnode-id="844" instrument_node="">
</span><blockquote data-dcnode-id="841"><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">If we are tracking down the origins the skyscraper we have certainly reached the seminal stage in New York and Chicago around the year 1870.</span></p></blockquote><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">So 1870, 1885 or when?&nbsp; Well, the debate about which was the first can be tedious, but here are other candidates that have been put forth.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="836" instrument_node="">In 1870, the Equitable Life Assurance Society completed its 7-story headquarters in lower Manhattan. Its revolutionary idea: include two steam-powered elevators for the office tenants. Perhaps for the first time in human history, businesses paid more money to rent the higher floors than the lower ones. Again, </span><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DzR1Get-mUU8C%26lpg%3DPA71%26dq%3DAll%2520the%2520exceptional%2520features%2520of%2520the%2520Equitable%2520Building%25E2%2580%2594its%2520elevator-predicted%2520height%252C%2520%25E2%2580%259Cfireproof%25E2%2580%259D%2520constructions%252C%2520extensive%2520iron%2520framing%26pg%3DPA71%23v%3Donepage%26q%3DAll%2520the%2520exceptional%2520features%2520of%2520the%2520Equitable%2520Building%25E2%2580%2594its%2520elevator-predicted%2520height%2C%2520%25E2%2580%259Cfireproof%25E2%2580%259D%2520constructions%2C%2520extensive%2520iron%2520framing%26f%3Dfalse"><span data-dcnode-id="835" instrument_node="">Landau and Condit</span></a><span data-dcnode-id="833" instrument_node="">:</span></p><span data-dcnode-id="831" instrument_node="">
</span><blockquote data-dcnode-id="828"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">All the exceptional features of the Equitable Building—its elevator-predicated height, “fireproof” constructions, extensive iron framing, large window area, and rent-free owners quarters—justify the title “first skyscraper.”</span></p></blockquote><span data-dcnode-id="827" instrument_node="">
</span><figure aria-describedby="caption-attachment-428" class="wp-caption alignright" data-dcnode-id="823" id="attachment_428" style="width: 252px"><img alt="" class="wp-image-428" data-dcnode-id="826" height="315" loading="lazy" sizes="(max-width: 252px) 100vw, 252px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/EquitableLifeAssuranceBuilding1906-240x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/EquitableLifeAssuranceBuilding1906-240x300.jpg 240w, https://buildingtheskyline.org/wp-content/uploads/2017/10/EquitableLifeAssuranceBuilding1906-768x961.jpg 768w, https://buildingtheskyline.org/wp-content/uploads/2017/10/EquitableLifeAssuranceBuilding1906.jpg 818w, https://buildingtheskyline.org/wp-content/uploads/2017/10/EquitableLifeAssuranceBuilding1906-300x376.jpg 300w" width="252"><figcaption class="wp-caption-text" data-dcnode-id="824" id="caption-attachment-428"><span data-dcnode-id="825" instrument_node="">The Equitable Life Assurance Society Building (1870), New York</span></figcaption></figure><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="821" instrument_node="">Another possibility is the Tribune Building, completed in New York in 1875. It was likely the first office building to use height to show off the power of its occupant, the </span><em data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">New York Tribune</span></em><span data-dcnode-id="818" instrument_node="">—the brainchild of Horace Greeley. &nbsp;Media Studies expert, Aurora Wallace, </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.questia.com/read/1P3-985904191/a-height-deemed-appalling-nineteenth-century-new"><span data-dcnode-id="817" instrument_node="">writes</span></a><span data-dcnode-id="815" instrument_node="">,</span></p><span data-dcnode-id="813" instrument_node="">
</span><blockquote data-dcnode-id="810"><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">The nine-story height ensured that the tower would be taller than any existing New York office building and was thus neither an arbitrary choice of height nor one based on the functional space requirements of the newspaper. The design and size of the Tribune building was primarily governed by the enhanced public image that would be garnered for the newspaper and only tangentially by the potential economic benefits of building tall.</span></p></blockquote><span data-dcnode-id="809" instrument_node="">
</span><figure aria-describedby="caption-attachment-429" class="wp-caption alignleft" data-dcnode-id="805" id="attachment_429" style="width: 244px"><img alt="" class="wp-image-429 size-medium" data-dcnode-id="808" height="300" loading="lazy" sizes="(max-width: 244px) 100vw, 244px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/gon021-Tribune3-244x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/gon021-Tribune3-244x300.jpg 244w, https://buildingtheskyline.org/wp-content/uploads/2017/10/gon021-Tribune3-300x369.jpg 300w, https://buildingtheskyline.org/wp-content/uploads/2017/10/gon021-Tribune3.jpg 521w" width="244"><figcaption class="wp-caption-text" data-dcnode-id="806" id="caption-attachment-429"><span data-dcnode-id="807" instrument_node="">Tribune Building (1875), New York</span></figcaption></figure><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Or perhaps the first skyscraper was the first building to actually receive the moniker “skyscraper.” Before they were applied to tall buildings, the word referred to other extremely tall or high phenomena, including sail masts, horses, and fly balls in baseball.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="800" instrument_node="">As late as 1883, the </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//global.ctbuh.org/resources/papers/download/321-the-origin-of-the-skyscraper.pdf"><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Chicago Daily</span></em></a><span data-dcnode-id="796" instrument_node=""> was referring to a series of buildings in New York and Chicago as “sky-scrapers.” My searches through historical newspaper archives produced a December 19, 1882, New York </span><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Sun</span></em><span data-dcnode-id="793" instrument_node=""> article entitled, “Another Sky Scraper Down Town,” which specifically refers to the construction of the Mutual Life Insurance Company building in Lower Manhattan, completed in 1884.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">We can continue in this way </span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">ad naseum</span></em><span data-dcnode-id="787" instrument_node="">. While I, too, cannot provide a definitive answer, here’s my opinion. There are three characteristics that make a skyscraper a skyscraper: (1) a building that is significantly taller than typical buildings in a given locale; (2) uses an all-steel skeleton frame, and (3) satisfies an economic need.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">Based on this criteria, the </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyscraper.org/PROGRAMS/LECTURES/FRIEDMAN/friedman.htm"><span data-dcnode-id="783" instrument_node="">first skyscrapers</span></a><span data-dcnode-id="781" instrument_node=""> would be the 10-story Lancashire Insurance Building in New York (1890) and the 16-story Manhattan Building in Chicago (1891), designed by William Le Baron Jenney.</span></p><span data-dcnode-id="779" instrument_node="">
</span><figure aria-describedby="caption-attachment-430" class="wp-caption alignright" data-dcnode-id="775" id="attachment_430" style="width: 143px"><img alt="" class="wp-image-430 size-medium" data-dcnode-id="778" height="300" loading="lazy" sizes="(max-width: 143px) 100vw, 143px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/insur_bdg-143x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/insur_bdg-143x300.jpg 143w, https://buildingtheskyline.org/wp-content/uploads/2017/10/insur_bdg-488x1024.jpg 488w, https://buildingtheskyline.org/wp-content/uploads/2017/10/insur_bdg-300x629.jpg 300w, https://buildingtheskyline.org/wp-content/uploads/2017/10/insur_bdg.jpg 600w" width="143"><figcaption class="wp-caption-text" data-dcnode-id="776" id="caption-attachment-430"><span data-dcnode-id="777" instrument_node="">Lancashire Insurance Building (1890), New York</span></figcaption></figure><span data-dcnode-id="774" instrument_node="">
</span><figure aria-describedby="caption-attachment-431" class="wp-caption alignleft" data-dcnode-id="770" id="attachment_431" style="width: 274px"><img alt="" class="wp-image-431 size-medium" data-dcnode-id="773" height="300" loading="lazy" sizes="(max-width: 274px) 100vw, 274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/wp-content/uploads/2017/10/ManhattanBuildingChicago-274x300.jpg&amp;raw" srcset="https://buildingtheskyline.org/wp-content/uploads/2017/10/ManhattanBuildingChicago-274x300.jpg 274w, https://buildingtheskyline.org/wp-content/uploads/2017/10/ManhattanBuildingChicago-300x328.jpg 300w, https://buildingtheskyline.org/wp-content/uploads/2017/10/ManhattanBuildingChicago.jpg 716w" width="274"><figcaption class="wp-caption-text" data-dcnode-id="771" id="caption-attachment-431"><span data-dcnode-id="772" instrument_node="">Manhattan Building (1891), Chicago</span></figcaption></figure><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">Regardless of which building is chosen, what is certain is that by 1890, most of the technological barriers to building height had been removed in a way that allowed for supertall structures which could rise beyond 15 stories. By the turn of the 20</span><sup data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">th</span></sup><span data-dcnode-id="765" instrument_node=""> century, 25 to 30 floors (100 meters) were at the vanguard.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="762" instrument_node="">In the next </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//buildingtheskyline.org/growing-up-skyscraper-heights-in-the-20th-century/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="761" instrument_node="">post</span></a><span data-dcnode-id="759" instrument_node="">, we will review the history of building height over the 20</span><sup data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">th</span></sup><span data-dcnode-id="756" instrument_node=""> century and see how the skyscraper grew up.</span></p><span data-dcnode-id="754" instrument_node="">

</span><li class="comment even thread-even depth-1" data-dcnode-id="514" id="comment-4"><span data-dcnode-id="627" instrument_node="">
</span><article data-dcnode-id="597" id="article-comment-4"><span data-dcnode-id="626" instrument_node="">
</span><header class="comment-header" data-dcnode-id="609"><span data-dcnode-id="625" instrument_node="">
</span><p class="comment-author" data-dcnode-id="616"><span data-dcnode-id="624" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="623" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/ccaaecfb9a9b3afedb9fdc837ec2d280%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/ccaaecfb9a9b3afedb9fdc837ec2d280?s=192&amp;d=mm&amp;r=g 2x" width="96"><span class="comment-author-name" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Rebecca</span></span><span data-dcnode-id="620" instrument_node=""> </span><span class="says" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">says</span></span><span data-dcnode-id="617" instrument_node=""> </span></p><span data-dcnode-id="615" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="611"><time class="comment-time" data-dcnode-id="612"><a class="comment-time-link" data-dcnode-id="613" href="#comment-4"><span data-dcnode-id="614" instrument_node="">October 12, 2017 at 11:33 am</span></a></time></p><span data-dcnode-id="610" instrument_node=""> </span></header><span data-dcnode-id="608" instrument_node="">
</span><div class="comment-content" data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">This is a wonderful blog post.  I am curious about one issue: As I recall from some earlier writings along these lines, the notion of extremely tall structures was, of course, nothing new in the 1860-1900 period, but prior to that period they relied upon stone engineering (pyramids, etc).  But one book which I cannot remember the name of nor the author, suggested that the birth of skyscrapers was somehow due to the construction of the Brooklyn Bridge completed in 1886.  It’s suspension towers, at the time, completely dwarfed all the structures in lower Manhattan.  Is there any validity to that?  Perhaps you address that in your book, but it isn’t mentioned in this blog post.  Perhaps also it is no particular real significance, but I thought I would bring it up.  To an amateur’s perspective it does seem like a convincing idea.</span></p><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="599"><a aria-label="Reply to Rebecca" class="comment-reply-link" data-belowelement="article-comment-4" data-commentid="4" data-dcnode-id="600" data-postid="415" data-replyto="Reply to Rebecca" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23comment-4" rel="nofollow"><span data-dcnode-id="601" instrument_node="">Reply</span></a></div><span data-dcnode-id="598" instrument_node="">
</span></article><span data-dcnode-id="596" instrument_node="">
</span><ul class="children" data-dcnode-id="517"><span data-dcnode-id="595" instrument_node="">
</span><li class="comment byuser comment-author-jason bypostauthor odd alt depth-2" data-dcnode-id="520" id="comment-5"><span data-dcnode-id="594" instrument_node="">
</span><article data-dcnode-id="561" id="article-comment-5"><span data-dcnode-id="593" instrument_node="">
</span><header class="comment-header" data-dcnode-id="576"><span data-dcnode-id="592" instrument_node="">
</span><p class="comment-author" data-dcnode-id="583"><span data-dcnode-id="591" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="590" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/1525a675ee66c1088f19e087161d9d21%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/1525a675ee66c1088f19e087161d9d21?s=192&amp;d=mm&amp;r=g 2x" width="96"><span class="comment-author-name" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Jason Barr</span></span><span data-dcnode-id="587" instrument_node=""> </span><span class="says" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">says</span></span><span data-dcnode-id="584" instrument_node=""> </span></p><span data-dcnode-id="582" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="578"><time class="comment-time" data-dcnode-id="579"><a class="comment-time-link" data-dcnode-id="580" href="#comment-5"><span data-dcnode-id="581" instrument_node="">October 12, 2017 at 12:00 pm</span></a></time></p><span data-dcnode-id="577" instrument_node=""> </span></header><span data-dcnode-id="575" instrument_node="">
</span><div class="comment-content" data-dcnode-id="567"><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">I don’t know the source of the book on the Brooklyn Bridge, but I take your point. I think one of the reasons why the debate about the first skyscraper is so enduring is that there is no single definition of what make a skyscraper a skyscraper. In Gerard Peet’s article, for example, (</span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//global.ctbuh.org/resources/papers/download/321-the-origin-of-the-skyscraper.pdf" rel="nofollow ugc"><span data-dcnode-id="572" instrument_node="">http://global.ctbuh.org/resources/papers/download/321-the-origin-of-the-skyscraper.pdf</span></a><span data-dcnode-id="570" instrument_node="">), he argues for Rome’s Insulae Feliculua, as well as other structures built around the world in the 15th and 16th centuries. I guess the lesson: take your pick!</span></p><span data-dcnode-id="568" instrument_node="">
</span></div><span data-dcnode-id="566" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="563"><a aria-label="Reply to Jason Barr" class="comment-reply-link" data-belowelement="article-comment-5" data-commentid="5" data-dcnode-id="564" data-postid="415" data-replyto="Reply to Jason Barr" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23comment-5" rel="nofollow"><span data-dcnode-id="565" instrument_node="">Reply</span></a></div><span data-dcnode-id="562" instrument_node="">
</span></article><span data-dcnode-id="560" instrument_node="">
</span><ul class="children" data-dcnode-id="523"><span data-dcnode-id="559" instrument_node="">
</span><li class="comment even depth-3" data-dcnode-id="526" id="comment-6"><span data-dcnode-id="558" instrument_node="">
</span><article data-dcnode-id="528" id="article-comment-6"><span data-dcnode-id="557" instrument_node="">
</span><header class="comment-header" data-dcnode-id="540"><span data-dcnode-id="556" instrument_node="">
</span><p class="comment-author" data-dcnode-id="547"><span data-dcnode-id="555" instrument_node="">
</span><img alt="" class="avatar avatar-96 photo" data-dcnode-id="554" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/ccaaecfb9a9b3afedb9fdc837ec2d280%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/ccaaecfb9a9b3afedb9fdc837ec2d280?s=192&amp;d=mm&amp;r=g 2x" width="96"><span class="comment-author-name" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Rebecca</span></span><span data-dcnode-id="551" instrument_node=""> </span><span class="says" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">says</span></span><span data-dcnode-id="548" instrument_node=""> </span></p><span data-dcnode-id="546" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="542"><time class="comment-time" data-dcnode-id="543"><a class="comment-time-link" data-dcnode-id="544" href="#comment-6"><span data-dcnode-id="545" instrument_node="">October 12, 2017 at 12:37 pm</span></a></time></p><span data-dcnode-id="541" instrument_node=""> </span></header><span data-dcnode-id="539" instrument_node="">
</span><div class="comment-content" data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Perfect, re Insulae Feliculua.  Yes and one could go back to the Tower of Babel, which never was built, as far as any archaeologist knows, or as you point out numerous other structures.  I need to dig up that book with the bit about the bridge.  The suspension towers are nearly 300ft (100m) tall, and they took quite some time to build, as you know–completed right around the same time as some of the iron and steel core buildings you mention.  I suspect that there were entrepreneurs who didn’t quite find the upstaging of their businesses by a bridge particularly amusing.  Also, recall that within those structures inside the Brooklyn Bridge towers are livable areas.  I’ll try to find the reference and apologize for posting comments with nothing to back it up.  In the end, maybe now it is far easier to discuss what scrapes the sky?   But the origins of these ideas are important.</span></p><span data-dcnode-id="535" instrument_node="">
</span></div><span data-dcnode-id="533" instrument_node="">
