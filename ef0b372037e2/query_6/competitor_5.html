</span><header class="post__header" data-dcnode-id="917"><span data-dcnode-id="927" instrument_node="">
</span><h1 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">28 Fun Facts about The Eiffel Tower</span></h1><span data-dcnode-id="924" instrument_node="">
</span><div class="post__meta" data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">
                        First published 11th December 2019 </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Robin James</span></em><span data-dcnode-id="920" instrument_node="">
</span></div><span data-dcnode-id="918" instrument_node="">
</span></header><span data-dcnode-id="916" instrument_node="">
</span><div class="post__social" data-dcnode-id="905"><span data-dcnode-id="915" instrument_node="">
</span><a class="facebook-find" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/factscityuk/"><span data-dcnode-id="914" instrument_node="">Find us on Facebook</span></a><span data-dcnode-id="912" instrument_node="">
</span><a class="twitter-follow" data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/FactcityCom"><span data-dcnode-id="911" instrument_node="">Follow us on Twitter</span></a><span data-dcnode-id="909" instrument_node="">
</span><div class="fb-like" data-action="like" data-dcnode-id="907" data-href="https://factcity.com/facts-about-the-eiffel-tower/" data-layout="button_count" data-share="false" data-size="large" data-width="" style="width:120px;"><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="903" instrument_node="">The Eiffel Tower or </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-los-angeles/"><span data-dcnode-id="902" instrument_node="">La</span></a><span data-dcnode-id="900" instrument_node=""> Tour Eiffel in French is one of the world’s most recognizable landmarks. It was designed as the showpiece of the 1889 World’s Fair in&nbsp;</span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-paris/"><span data-dcnode-id="899" instrument_node="">Paris</span></a><span data-dcnode-id="897" instrument_node="">&nbsp;in remembrance of the French Revolution’s centennial as well as to show off </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-france/"><span data-dcnode-id="896" instrument_node="">France</span></a><span data-dcnode-id="894" instrument_node="">’s modern mechanical know-how on a global scale. Mission accomplished!</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">For a closer look into this architectural marvel that’s on every Paris itinerary here’s 28 fun facts about the Eiffel Tower…</span></p><span data-dcnode-id="889" instrument_node="">
</span><h2 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">1. The Eiffel Tower welcomes millions each year</span></h2><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The Eiffel Tower has welcomed over&nbsp;300 million people and still welcomes almost 7 million visitors a year. Quite impressive!</span></p><span data-dcnode-id="883" instrument_node="">
</span><h2 data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">2. It was built to mark the 100</span><sup data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">th</span></sup><span data-dcnode-id="879" instrument_node=""> anniversary of the French Revolution</span></h2><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Paris&nbsp;hosted&nbsp;the 1889 World’s Fair. Artists from around the nation sent in interesting plans for a structure to mark the entrance to the fair on the Champ-de-Mars.</span></p><span data-dcnode-id="874" instrument_node="">
</span><h2 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">3. Eiffel et Compagnie was the firm that designed and built the Eiffel tower</span></h2><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Gustave Eiffel, a bridge-builder, architect, and metals expert owned this consulting and construction firm. In fact, this wasn’t the first grand project, he also&nbsp;worked&nbsp;in the early 1880s on the Garabit Viaduct, the highest bridge in the world, at the time. Before landing the World’s Fair project, he also helped design the Statue of Liberty.</span></p><span data-dcnode-id="868" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="862" id="attachment_7257" style="width: 610px"><img alt="View of the Eiffel Tower from the River Seine" aria-describedby="caption-attachment-7257" class="wp-image-7257 lazyloaded" data-dcnode-id="867" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1536x1021.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-2048x1362.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-406x270.jpg 406w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-842x560.jpg 842w" height="399" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1536x1021.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-2048x1362.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-406x270.jpg 406w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-842x560.jpg 842w" width="600"><noscript data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">&lt;img aria-describedby="caption-attachment-7257" class="wp-image-7257" src="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg" alt="View of the Eiffel Tower from the River Seine" width="600" height="399" srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-1536x1021.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-2048x1362.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-406x270.jpg 406w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-Eiffel-Tower-842x560.jpg 842w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="863" id="caption-attachment-7257"><span data-dcnode-id="864" instrument_node="">Eiffel Tower, Paris, France</span></p></div><span data-dcnode-id="861" instrument_node="">
</span><h2 data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">4. It’s a relative to the Statue of Liberty</span></h2><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Eiffel’s company was invited&nbsp;to plan the interior frame for the Statue of Liberty, a task assigned to his right-hand&nbsp;employee, Maurice Koechlin.</span></p><span data-dcnode-id="855" instrument_node="">
</span><h2 data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">5. The original design was rejected</span></h2><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">After viewing his senior engineer’s design Eiffel felt it was too minimalist and he was instructed to include more details and flourishes in his redesign. The final design was approved in 1884.</span></p><span data-dcnode-id="849" instrument_node="">
</span><h2 data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">6. Who were the engineers behind the project</span></h2><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">While Eiffel earned the naming rights for the Tower, Maurice Koechlin and Emile Nouguier drew the original design teamed up with French architect, Stephen Sauvestre.</span></p><span data-dcnode-id="843" instrument_node="">
</span><div class="google_ad_block" data-dcnode-id="838"><ins class="adsbygoogle" data-ad-client="ca-pub-0822464864017124" data-ad-format="auto" data-ad-slot="2976786395" data-dcnode-id="842" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="841" instrument_node="">
</span></div><span data-dcnode-id="837" instrument_node="">
</span><h2 data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">7. Are you up for a climb!</span></h2><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Another cool fact is that it’s possible to climb to the top of the Eiffel Tower. &nbsp;If you’re feeling very fit, you can climb to the top – beware though – there are 1,665 steps! So most people take the lift. &nbsp;Little known fact: The Eiffel Tower actually has a total of 5 lifts! &nbsp;If you plan on using the lift,&nbsp;It costs up to 26,10€ for a ticket to the top. (</span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/en/rates-opening-times" rel="noopener" target="_blank"><span data-dcnode-id="832" instrument_node="">Price as of September 2021</span></a><span data-dcnode-id="830" instrument_node="">).</span></p><span data-dcnode-id="828" instrument_node="">
</span><h2 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">8. The building of the Eiffel Tower required tons of metal and manpower</span></h2><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">300 steelworkers spent two years, two months, and five days, from 1887 to 1889, constructing the Tower, using more than 18,000 individual metallic parts, 2.5 million rivets, and 40 tons of paint.</span></p><span data-dcnode-id="822" instrument_node="">
</span><h2 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">9. Eiffel’s tower initial height was 985 feet</span></h2><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">In March 1889, upon its completion, the Tower&nbsp;measured&nbsp;300 meters (985 feet) high. The fact is that this measurement isn’t static, cold weather can&nbsp;shrink&nbsp;the Tower by up to six inches.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><img alt="Eiffel Tower Facts" class="aligncenter wp-image-14010 lazyloaded" data-dcnode-id="815" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts.jpg 1280w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts.jpg 1280w" width="600"><noscript data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">&lt;img class="aligncenter wp-image-14010" src="https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg" alt="Eiffel Tower Facts" width="600" height="400" srcset="https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Eiffel-Tower-Facts.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="811" instrument_node="">
</span><h2 data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">10. It was&nbsp;the tallest structure in the world</span></h2><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">For 41 years, the Eiffel Tower stood higher than any building or structure in the world until in 1930 it was surpassed by the&nbsp;Chrysler Building&nbsp;in New York with a height of 1046 feet.</span></p><span data-dcnode-id="805" instrument_node="">
</span><h2 data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">11. A large committee protested the tower</span></h2><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Did you know that the author Guy de Maupassant, Alexandre Dumas, Jr., and around 300 other artists and intellectuals, signed a&nbsp;petition&nbsp;opposing the project? They surely did! In fact, they thought the Tower is useless and monstrous.</span></p><span data-dcnode-id="799" instrument_node="">
</span><h2 data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">12. Nevertheless, the Eiffel Tower was an instant hit</span></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">The Eiffel Tower was visited by nearly 2 million people during the Fair, spending $1.4 million on tickets, making the 1889 World Fair one of the few to actually turn a profit.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="789"><img alt="Facts about the Eiffel Tower" class="aligncenter wp-image-14011 lazyloaded" data-dcnode-id="792" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-1024x690.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-768x518.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1.jpg 1280w" height="405" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-1024x690.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-768x518.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1.jpg 1280w" width="600"><noscript data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">&lt;img class="aligncenter wp-image-14011" src="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg" alt="Facts about the Eiffel Tower" width="600" height="405" srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-300x202.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-1024x690.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1-768x518.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Eiffel-Tower-1.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="788" instrument_node="">
</span><h2 data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">13. The tower was only supposed to stand for 20 years</span></h2><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">The Tower was scheduled to be disassembled in 1909 until they’ve realized that its apex was the perfect place for a telegraphy antenna. The wireless telegraph transmitter helped&nbsp;jam&nbsp;German communications during the First World War.</span></p><span data-dcnode-id="782" instrument_node="">
</span><h2 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">14. The tower moves!</span></h2><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">The tower was built to withstand even the strongest winds, and never sway more than 4.5 inches.</span></p><span data-dcnode-id="776" instrument_node="">
</span><h2 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">15. It has a secret apartment at the top of the tower</span></h2><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">On the 3rd floor of the Tower, Gustave Eiffel had a secret </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-selling-your-home/"><span data-dcnode-id="771" instrument_node="">apartment</span></a><span data-dcnode-id="769" instrument_node=""> built exclusively to entertain from. It was off limits to the public for years but&nbsp;can now be looked at through a window by ticket holders.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="763"><img alt="Model of Eiffel Tower" class="aligncenter wp-image-21139 lazyloaded" data-dcnode-id="766" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280.jpg 1280w" height="399" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280.jpg 1280w" width="0600"><noscript data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&lt;img class="aligncenter wp-image-21139" src="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg" alt="Model of Eiffel Tower" width="0600" height="399" srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-300x199.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-1024x681.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280-768x511.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-1839974_1280.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="762" instrument_node="">
</span><h2 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">16. Hitler wanted the Tower destroyed</span></h2><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">When France was occupied by Germany during the Second World War, Hitler ordered that the Eiffel Tower be&nbsp;torn down, but thankfully France refused and the order was never followed through.</span></p><span data-dcnode-id="756" instrument_node="">
</span><h2 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">17. Want to mail a letter, you can try the Tower’s post office</span></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">In fact, in the tiny post office, you can even pick up&nbsp;une carte postale&nbsp;and a stamp and have it mailed&nbsp;from the Eiffel Tower’s post office with its unique postmark.</span></p><span data-dcnode-id="750" instrument_node="">
</span><h2 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">18. It has a scientific laboratory</span></h2><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Mr. Eiffel built a&nbsp;meteorology laboratory&nbsp;on the Tower’s third floor, where he performed studies in physics, aerodynamics, and built a wind tunnel.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740"><img alt="cool facts about the Eiffel tower" class="aligncenter wp-image-21140 lazyloaded" data-dcnode-id="743" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280.jpg 1280w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280.jpg 1280w" width="600"><noscript data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">&lt;img class="aligncenter wp-image-21140" src="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg" alt="cool facts about the Eiffel tower" width="600" height="400" srcset="https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/eiffel-tower-768501_1280.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">19. Many scientists’ names are engraved on the Eiffel Tower</span></h2><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">To be more precise, 72 names of French scientists and engineers working in the 19</span><sup data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">th</span></sup><span data-dcnode-id="732" instrument_node=""> century were engraved on the Eiffel Tower.</span></p><span data-dcnode-id="730" instrument_node="">
</span><h2 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">20. How does the Eiffel Tower stay looking good?</span></h2><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Every 7 years, around&nbsp;60 tons of paint&nbsp;is applied&nbsp;to the tower to keep the tower looking good, and also to keep the iron from rusting. &nbsp;Also, the tower&nbsp;is covered in 20,000 lightbulbs, making it absolutely sparkle at night!</span></p><span data-dcnode-id="724" instrument_node="">
</span><h2 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">21. Underneath there’s a military bunker</span></h2><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Underneath the Tower’s south pillar there’s a&nbsp;secret military bunker&nbsp;that may connect to the nearby Ecole Militaire via a long tunnel.</span></p><span data-dcnode-id="718" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="712" id="attachment_24507" style="width: 610px"><img alt="Blackpool Tower, UK" aria-describedby="caption-attachment-24507" class="wp-image-24507 lazyloaded" data-dcnode-id="717" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg" data-srcset="https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg 300w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-1024x724.jpg 1024w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-768x543.jpg 768w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280.jpg 1280w" height="424" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg 300w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-1024x724.jpg 1024w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-768x543.jpg 768w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280.jpg 1280w" width="600"><noscript data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">&lt;img aria-describedby="caption-attachment-24507" class="wp-image-24507" src="https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg" alt="Blackpool Tower, UK" width="600" height="424" srcset="https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-300x212.jpg 300w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-1024x724.jpg 1024w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280-768x543.jpg 768w, https://factcity.com/wp-content/uploads/2021/01/blackpool-4021722_1280.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="713" id="caption-attachment-24507"><span data-dcnode-id="714" instrument_node="">Spot the difference (Blackpool Tower, Lancashire, England).</span></p></div><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">22. It’s not unique</span></h2><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">There are 54 replicas of the Eiffel Tower of varying sizes of scale. Blackpool Tower on the English north-west coast is one of the oldest. Other replicas&nbsp;include one in Las&nbsp;</span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-las-vegas/"><span data-dcnode-id="706" instrument_node="">Vegas</span></a><span data-dcnode-id="704" instrument_node="">, USA and there are six in Russia!</span></p><span data-dcnode-id="702" instrument_node="">
</span><h2 data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">23. But there is only one genuine Eiffel Tower</span></h2><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="698" instrument_node="">In </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-the-1990s/"><span data-dcnode-id="697" instrument_node="">1991</span></a><span data-dcnode-id="695" instrument_node=""> The Eiffel Tower was declared a UNESCO world heritage site.</span></p><span data-dcnode-id="693" instrument_node="">
</span><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">24. Pssst! Would you like to buy it?</span></h2><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Incredibly, the Eiffel Tower was sold by a con artist named Victor Lustig for scrap metal. &nbsp;Not once, but twice!</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="683"><img alt="Rooftops of Paris with the Eiffel Tower in the background" class="aligncenter wp-image-24508 lazyload" data-dcnode-id="686" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-300x202.jpg" data-srcset="https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-300x202.jpg 300w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-1024x690.jpg 1024w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-768x518.jpg 768w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280.jpg 1280w" height="405" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="600"><noscript data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">&lt;img class="aligncenter wp-image-24508" src="https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-300x202.jpg" alt="Rooftops of Paris with the Eiffel Tower in the background" width="600" height="405" srcset="https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-300x202.jpg 300w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-1024x690.jpg 1024w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280-768x518.jpg 768w, https://factcity.com/wp-content/uploads/2021/01/paris-5310783_1280.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="682" instrument_node="">
</span><h2 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">25. It’s in the movies. A lot.</span></h2><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">The Eiffel Tower appears in lots of famous films, including ‘A View to a Kill’ (James Bond), ‘Superman 2’,‘Lucy’, and ‘Hugo’, to name just a few.</span></p><span data-dcnode-id="676" instrument_node="">
</span><h2 data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">26. Raise your glass!</span></h2><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="672" instrument_node="">We’ve saved this amazing fact for the end. On the top floor, you can reward yourself with a glass of champagne from the&nbsp;Champagne Bar. A glass of bubbly and a spectacular view with that special someone, just the perfect ending on your Paris journey!&nbsp;The tower is also home to two restaurants – La bulle Parisienne, a French-style bistro, and the world famous </span><i data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Jules Verne </span></i><span data-dcnode-id="669" instrument_node="">restaurant</span><i data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">. </span></i><span data-dcnode-id="666" instrument_node="">&nbsp;Make sure you </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.restaurants-toureiffel.com/en/jules-verne-restaurant.html" rel="noopener" target="_blank"><span data-dcnode-id="665" instrument_node="">make a booking</span></a><span data-dcnode-id="663" instrument_node=""> if you fancy dining here!</span></p><span data-dcnode-id="661" instrument_node="">
</span><h2 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Bonus facts</span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">27. The Eiffel Tower is held together by more than 2.5 million rivets!</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">28. In 2014, to mark it’s 125th anniversary, the British Virgin Islands launched a special tower-shaped $10 coin.</span></p><span data-dcnode-id="652" instrument_node="">
</span><h2 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">FAQs about The Eiffel Tower</span></h2><span data-dcnode-id="649" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="635"><span data-dcnode-id="648" instrument_node="">
</span><div data-dcnode-id="637"><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">How frequently is the Eiffel Tower painted?</span></h2><span data-dcnode-id="644" instrument_node=""> </span><div data-dcnode-id="639"><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">
						The Eiffel Tower is repainted once every seven years to prevent it from deteriorating.                    </span></p><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span></div><span data-dcnode-id="636" instrument_node="">
</span></section><span data-dcnode-id="634" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="620"><span data-dcnode-id="633" instrument_node="">
</span><div data-dcnode-id="622"><span data-dcnode-id="632" instrument_node="">
</span><h2 data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">What’s inside the Eiffel Tower?</span></h2><span data-dcnode-id="629" instrument_node=""> </span><div data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">
						The Eiffel Tower is more than just a simple structure - it houses restaurants, shops and museums!                    </span></p><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span></section><span data-dcnode-id="619" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="605"><span data-dcnode-id="618" instrument_node="">
</span><div data-dcnode-id="607"><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Can you walk under the Eiffel Tower?</span></h2><span data-dcnode-id="614" instrument_node=""> </span><div data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">
						Yes, but there are security barriers - you won’t be able to freely stroll underneath.                    </span></p><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="608" instrument_node="">
</span></div><span data-dcnode-id="606" instrument_node="">
</span></section><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Do you know any fun facts about the Eiffel Tower? &nbsp;Share them here in the comments below!</span></p><span data-dcnode-id="598" instrument_node="">

</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">The former chief engineer of the tower bought a brand new Renault Dauphine car, picked it up and drove to his pace of work in his new car. He parked it in his allocated spot below the tower and walked away. He was a short distance away when he heard a thud behind him, turned and saw a woman laying across his car. She had jumped from the first floor but the car had effectively broken her fall as the owner had left his window(s) slightly open. She lived but his car was written off! Furthermore, his wife had never even seen the car. (I am unable to provide a date but would assume it was in the 50s/60s as it was a new Renault Dauphine.</span></p><span data-dcnode-id="455" instrument_node="">
