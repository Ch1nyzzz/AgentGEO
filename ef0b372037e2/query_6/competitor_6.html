</span><section class="entry-content cf" data-dcnode-id="3913" itemprop="articleBody"><span data-dcnode-id="4065" instrument_node=""> </span><p data-dcnode-id="4060"><span data-dcnode-id="4064" instrument_node="">Cover photo via </span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/34652102%40N04/5354875776/in/photolist-9ac91q-dnXX3d-5vMwL5-aqpkn5-y8Xzk-9hUDJ-bFE3ck-4VC9HS-aBpLsQ-aHtpqT-4FmajN-5xExDE-7Q25nj-axiXSZ-4FpFrC-7RWR3p-b4b8Dr-bJMjEp-fxHiG-7TUQoa-72MUv4-Z9cng-4TMkEu-7hkV8W-4vAZRx-6JuKbt-5P2CFu-d4xjbY-7h2Q34-bqWi9V-gGbGQy-y8Xz9-jzjXB8-8tYuyv-6xEdnm-9HupKa-5gayDw-fpJHeB-2rwnnH-6hP2sL-ad28LU-9HuEvR-4VHbZD-5g6nck-5xAa82-8GHf2w-8MwdS2-6eXpam-4VC9Eh-fpZ5nd"><span data-dcnode-id="4063" instrument_node="">Randy Pertiet</span></a><span data-dcnode-id="4061" instrument_node="">, FlickrCC</span></p><span data-dcnode-id="4059" instrument_node=""> </span><p data-dcnode-id="4055"><span data-dcnode-id="4058" instrument_node="">Much is being made of the 125th anniversary of the The Eiffel Tower’s construction. It’s one of Paris’ most famous landmarks and has received over 250 million visitors since it opened to the public in 1889. Designed by Alexandre Gustave Eiffel, the tower was built to be the entrance to the World’s Fair, an exposition of world culture. The tower was met with much scorn by Parisians of the era, who couldn’t see how such a monstrosity could fit into their picturesque city. A sizable group of artists created a petition against the construction of the tower. Their petition began: ‘</span><em data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">We, writers, painters, sculptors, architects and passionate devotees of the hitherto untouched beauty of Paris, protest with all our strength, with all our indignation in the name of slighted French taste, against the erection … of this useless and monstrous Eiffel Tower’.</span></em></p><span data-dcnode-id="4054" instrument_node=""> </span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">The tower has certainly seen a lot over the past century and has witnessed countless political, social and economic changes and 2 World Wars shape Paris into what it is today. Nowadays, questions over the tower’s design are long forgotten and the Eiffel Tower is as a much a part of Paris as the winding streets of the Montmartre district and the historic Notre Dame Cathedral.</span></p><span data-dcnode-id="4051" instrument_node=""> </span><p data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">The iconic design has been a favourite of architects and many have used it as inspiration (or just simply copied the design) and throughout the world you can find a variety of structures bearing a striking resemblance to the Eiffel Tower. To celebrate 125 years of this remarkable design, here are 10 of the world’s most infamous Eiffel Tower replicas…</span></p><span data-dcnode-id="4048" instrument_node=""> </span><h2 data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">1 – Monte Gorbea, Northern Spain</span></h2><span data-dcnode-id="4045" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="4038" id="attachment_4915" style="width: 660px"><img alt="Cruz de Gorbea, Spanien (c) flickr.com_total13" class="wp-image-4915 size-medium" data-dcnode-id="4044" height="866" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/1b343f559e8feae31917761aa77c1ab4_Cruz-de-Gorbea-Spanien-c-flickr.com_total13-650x866.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/1b343f559e8feae31917761aa77c1ab4_Cruz-de-Gorbea-Spanien-c-flickr.com_total13-650x866.jpg 650w, //cdn.hometogo.net/assets/wl-blog/4fe7d868bb8b4a8af1cffbd2e8b4e9d5_Cruz-de-Gorbea-Spanien-c-flickr.com_total13-320x426.jpg 320w, //cdn.hometogo.net/assets/wl-blog/1a79e6df45ce8e1c37c68674b5674e82_Cruz-de-Gorbea-Spanien-c-flickr.com_total13-1024x1365.jpg 1024w" style="max-width: 700px;height: auto;" title="Cruz de Gorbea Spain" width="650"><p class="wp-caption-text" data-dcnode-id="4039"><span data-dcnode-id="4043" instrument_node="">Photo by </span><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/6Q8FBK" target="_blank" title="Total 13 on Flickr"><span data-dcnode-id="4042" instrument_node="">Total 13</span></a><span data-dcnode-id="4040" instrument_node=""> / FlickrCC</span></p></div><span data-dcnode-id="4037" instrument_node=""> </span><p data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">Here’s a countryside copy of the Eiffel Tower, located in the Basque Country in Northern Spain. This steel construction is located almost 1,500 metres high up on the peak of Monte Gorbea. Since 1994, the mountain has been designed a natural park to preserve the amazing variety of flora such as beech trees and fauna such wild boar.</span></p><span data-dcnode-id="4034" instrument_node=""> </span><h2 data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">2 – Paris, USA</span></h2><span data-dcnode-id="4031" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="4025" id="attachment_4916" style="width: 660px"><img alt="Eiffel_Tower_Replica_Paris_Texas (c) wikimedia.org_Adavyd" class="wp-image-4916 size-medium" data-dcnode-id="4030" height="970" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/180dc62297dbb211c4582066753c8e0b_Eiffel_Tower_Replica_Paris_Texas-c-wikimedia.org_Adavyd-650x970.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/180dc62297dbb211c4582066753c8e0b_Eiffel_Tower_Replica_Paris_Texas-c-wikimedia.org_Adavyd-650x970.jpg 650w, //cdn.hometogo.net/assets/wl-blog/ca47dcc7876d6f39cac7ac9325b4cc2a_Eiffel_Tower_Replica_Paris_Texas-c-wikimedia.org_Adavyd-320x478.jpg 320w, //cdn.hometogo.net/assets/wl-blog/0476f8636c7eb40ad6ddedd230aaa310_Eiffel_Tower_Replica_Paris_Texas-c-wikimedia.org_Adavyd-1024x1529.jpg 1024w" style="max-width: 700px;height: auto;" title="Eiffel Tower Replica Texas" width="650"><p class="wp-caption-text" data-dcnode-id="4026"><span data-dcnode-id="4029" instrument_node="">Photo by Adavyd via </span><a data-dcnode-id="4027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AEiffel_Tower_Replica_Paris_Texas_DSC_0602_ad.JPG" target="_blank" title="Wikimedia Commons"><span data-dcnode-id="4028" instrument_node="">Wikimedia Commons</span></a></p></div><span data-dcnode-id="4024" instrument_node=""> </span><p data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">The motive behind the construction of this Eiffel Tower rip-off is perhaps as simple as this – ‘every place called Paris must have an Eiffel Tower. The inhabitants of Paris, Texas built this tribute to their big brother in 1993 and your eyes really aren’t deceiving you – that actually is a cowboy hat perched on top of it!</span></p><span data-dcnode-id="4021" instrument_node=""> </span><h2 data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">3 – Prague, Czech Republic</span></h2><span data-dcnode-id="4018" instrument_node=""> </span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Whilst heated discussions still raged in Paris over the newly opened Eiffel Tower, the Czech people got to work constructing a similar tower in Prague which was completed just 2 years after the original was. Although it’s much small, the location of the Petrin Lookout Tower (originally built as a radio tower) on Petrin Hill makes it fairly impressive and there are excellent views to be enjoyed over the River Vlatva.</span></p><span data-dcnode-id="4015" instrument_node=""> </span><h2 data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">4 – Las Vegas, USA</span></h2><span data-dcnode-id="4012" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="4005" id="attachment_4919" style="width: 660px"><img alt="PLV_EiffelTower (c) flickr.com_Jonathan Lumibao" class="wp-image-4919 size-medium" data-dcnode-id="4011" height="974" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/d84b30c162dffe388ca1c7e291395578_xPLV_EiffelTower-c-flickr.com_Jonathan-Lumibao-650x974.jpg.pagespeed.ic.QdO9nI8b3Y.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/d84b30c162dffe388ca1c7e291395578_xPLV_EiffelTower-c-flickr.com_Jonathan-Lumibao-650x974.jpg.pagespeed.ic.QdO9nI8b3Y.jpg 650w, //cdn.hometogo.net/assets/wl-blog/ed5219987ac23a623d4c98a3ffd2e0ff_PLV_EiffelTower-c-flickr.com_Jonathan-Lumibao-320x479.jpg 320w, //cdn.hometogo.net/assets/wl-blog/f4c100461219d1c31f78860a37b53159_PLV_EiffelTower-c-flickr.com_Jonathan-Lumibao.jpg 683w" style="max-width: 700px;height: auto;" title="Eiffel Tower Replica" width="650"><p class="wp-caption-text" data-dcnode-id="4006"><span data-dcnode-id="4010" instrument_node="">Photo by </span><a data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/5rYvwg" target="_blank" title="Jonathan Lumibao on Flickr"><span data-dcnode-id="4009" instrument_node="">Jonathan Lumibao</span></a><span data-dcnode-id="4007" instrument_node=""> / FlickrCC</span></p></div><span data-dcnode-id="4004" instrument_node=""> </span><p data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node="">In true Vegas style, this Eiffel Tower knock-off is by far the most impressive and realistic tribute to the real deal. Located at the Paris Hotel, home to nearly 3,000 rooms, was created on a scale of 1:2. There are replicas of the Paris Opera and Louvre Museum near by too…</span></p><span data-dcnode-id="4001" instrument_node=""> </span><h2 data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">5 – Tokyo, Japan</span></h2><span data-dcnode-id="3998" instrument_node=""> </span><p data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">The Japanese version of the Eiffel Tower has become something of an urban landmark in its own right! The Tokyo Tower measures an impressive 333 meters tall and was built in 1958. It’s received over 150 million visitors to its observation desk since construction. It was painted red and white to make it standout from the skyline and prevent aircraft collisions!</span></p><span data-dcnode-id="3995" instrument_node=""> </span><h2 data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">6 – Sucre, Bolivia</span></h2><span data-dcnode-id="3992" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3985" id="attachment_4921" style="width: 660px"><img alt="Torre Sucrense, Torre Eiffel de Sucre (c) flickr.com_pandrcutts" class="wp-image-4921 size-medium" data-dcnode-id="3991" height="866" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/111a059dbffbaf2493ef17ff107317dd_Torre-Sucrense-Torre-Eiffel-de-Sucre-c-flickr.com_pandrcutts-650x866.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/111a059dbffbaf2493ef17ff107317dd_Torre-Sucrense-Torre-Eiffel-de-Sucre-c-flickr.com_pandrcutts-650x866.jpg 650w, //cdn.hometogo.net/assets/wl-blog/7d9caa6e452ec5250e3d80d62eb9a31f_Torre-Sucrense-Torre-Eiffel-de-Sucre-c-flickr.com_pandrcutts-320x426.jpg 320w, //cdn.hometogo.net/assets/wl-blog/4318dae3c01316f1748a280d1176686b_Torre-Sucrense-Torre-Eiffel-de-Sucre-c-flickr.com_pandrcutts-1024x1365.jpg 1024w, //cdn.hometogo.net/assets/wl-blog/adeb659f65e74de1e67c90a473c34876_Torre-Sucrense-Torre-Eiffel-de-Sucre-c-flickr.com_pandrcutts.jpg 1536w" style="max-width: 700px;height: auto;" title="Torre Sucrense, Torre Eiffel de Sucre" width="650"><p class="wp-caption-text" data-dcnode-id="3986"><span data-dcnode-id="3990" instrument_node="">Photo by </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/7BmbzR" target="_blank" title="Robert Cutts on Flickr"><span data-dcnode-id="3989" instrument_node="">Robert Cutts</span></a><span data-dcnode-id="3987" instrument_node=""> / FlickrCC</span></p></div><span data-dcnode-id="3984" instrument_node=""> </span><p data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">You can find the ‘Little Eiffel Tower’ in the Bolivian town of Sucre. Gustav Eiffel designed several buildings in the Bolivian capital of La Paz including the central train station. This tower can created just 20 years after the original was built and was commissioned by the Bolivian government. The design is significantly smaller than the original but does boast being actually designed by the great man! It was used for some users by the meteorological service.</span></p><span data-dcnode-id="3981" instrument_node=""> </span><h2 data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">7 – Alsace, France</span></h2><span data-dcnode-id="3978" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3971" id="attachment_4922" style="width: 660px"><img alt="Tour de Belvédère, Mulhouse" class="wp-image-4922 size-medium" data-dcnode-id="3977" height="1132" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/3e9594836bae00f0e8997a7cf9e22b6d_Tour-de-Belv%25C3%25A9d%25C3%25A8re-Mulhouse-650x1132.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/3e9594836bae00f0e8997a7cf9e22b6d_Tour-de-Belvédère-Mulhouse-650x1132.jpg 650w, //cdn.hometogo.net/assets/wl-blog/35da49633f7d8c002ecb8c59f4e96cd7_Tour-de-Belvédère-Mulhouse-320x557.jpg 320w, //cdn.hometogo.net/assets/wl-blog/a1808a51caeb36db37699d9939d0d0b3_Tour-de-Belvédère-Mulhouse-1024x1783.jpg 1024w" style="max-width: 700px;height: auto;" title="Tour de Belvédère, Mulhouse" width="650"><p class="wp-caption-text" data-dcnode-id="3972"><span data-dcnode-id="3976" instrument_node="">Photo by </span><a data-dcnode-id="3974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMulhouse_-_Sendeturm_Mulhouse-Belv%25C3%25A9d%25C3%25A8re2.jpg" target="_blank" title="Wladyslaw on Wikimedia Commons"><span data-dcnode-id="3975" instrument_node="">Wladyslaw</span></a><span data-dcnode-id="3973" instrument_node=""> via Wikimedia Commons</span></p></div><span data-dcnode-id="3970" instrument_node=""> </span><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">The most recent copy of the Eiffel Tower can also be found on French soil. Built in 1997, the Belvedere Tower is used exclusively for broadcasting services and sadly isn’t intended as a tourist attraction. Standing proudly at 194 metres tall, this is France’s largest transmission tower.</span></p><span data-dcnode-id="3967" instrument_node=""> </span><h2 data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">8 – Brasilia, Brazil</span></h2><span data-dcnode-id="3964" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3957" id="attachment_4923" style="width: 660px"><img alt="TV tower, Brasilia (c) flickr.com_Leandro's World Tour" class="wp-image-4923 size-medium" data-dcnode-id="3963" height="469" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/54658ee76da58fd19031cfb68e39c986_TV-tower-Brasilia-c-flickr.com_Leandros-World-Tour-650x469.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/54658ee76da58fd19031cfb68e39c986_TV-tower-Brasilia-c-flickr.com_Leandros-World-Tour-650x469.jpg 650w, //cdn.hometogo.net/assets/wl-blog/5019553fbba7c6ca79bef55a499ae746_TV-tower-Brasilia-c-flickr.com_Leandros-World-Tour-320x231.jpg 320w, //cdn.hometogo.net/assets/wl-blog/8ac6a3153d7d8d8c87c7a291402d33a5_TV-tower-Brasilia-c-flickr.com_Leandros-World-Tour-1024x740.jpg 1024w" style="max-width: 700px;height: auto;" title="TV Tower Brasilia" width="650"><p class="wp-caption-text" data-dcnode-id="3958"><span data-dcnode-id="3962" instrument_node="">Photo by </span><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/fFysmA" target="_blank" title="Leandro Ciuffro on Flickr"><span data-dcnode-id="3961" instrument_node="">Leandro Ciuffo</span></a><span data-dcnode-id="3959" instrument_node="">, FlickrCC</span></p></div><span data-dcnode-id="3956" instrument_node=""> </span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">The Brazilians have built a version of the Eiffel Tower in the capital, Brasilia. At around 224 meters high there is a viewing platform at 74 metres that attracts up to 300,000 visitors annually. Despite being not as big as the original, the Brasilia TV Tower towers over every other building in the city.</span></p><span data-dcnode-id="3953" instrument_node=""> </span><h2 data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">9 – Riga, Latvia</span></h2><span data-dcnode-id="3950" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3943" id="attachment_4924" style="width: 660px"><img alt="TV Tower, Riga (c) wikimedia.org_Riclib" class="wp-image-4924 size-medium" data-dcnode-id="3949" height="433" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/330f0637f74b56e9f99f045894d7ff02_TV-Tower-Riga-c-wikimedia.org_Riclib-650x433.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/330f0637f74b56e9f99f045894d7ff02_TV-Tower-Riga-c-wikimedia.org_Riclib-650x433.jpg 650w, //cdn.hometogo.net/assets/wl-blog/a23447c62c15d809ebdd74cb9feb8136_TV-Tower-Riga-c-wikimedia.org_Riclib-320x213.jpg 320w, //cdn.hometogo.net/assets/wl-blog/4100cc751ba257875da3aa5e5f5e4c68_TV-Tower-Riga-c-wikimedia.org_Riclib-1024x682.jpg 1024w" style="max-width: 700px;height: auto;" title="TV Tower, Riga" width="650"><p class="wp-caption-text" data-dcnode-id="3944"><span data-dcnode-id="3948" instrument_node="">Photo by </span><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARigaTVTower.jpg" target="_blank" title="Riclib on Wikimedia"><span data-dcnode-id="3947" instrument_node="">Riclib</span></a><span data-dcnode-id="3945" instrument_node=""> via Wikimedia Commons</span></p></div><span data-dcnode-id="3942" instrument_node=""> </span><p data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">This is a fairly free interpretation of the Eiffel Tower, located in the Latvian city of Riga. It stands at just under 369 metres tall and is the tallest free-standing broadcast tower in the EU! The futuristic building has an observation desk boasting stunning views of the surrounding area.</span></p><span data-dcnode-id="3939" instrument_node=""> </span><h2 data-dcnode-id="3937"><span data-dcnode-id="3938" instrument_node="">10 – Sydney, Australia</span></h2><span data-dcnode-id="3936" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3929" id="attachment_4925" style="width: 660px"><img alt="AWA Tower Sydney" class="wp-image-4925 size-medium" data-dcnode-id="3935" height="866" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/1bf075ef21a4da77fd86679609202ebc_AWA-Tower-Sydney-c-flickr.com_Dave-Keeshan-650x866.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/1bf075ef21a4da77fd86679609202ebc_AWA-Tower-Sydney-c-flickr.com_Dave-Keeshan-650x866.jpg 650w, //cdn.hometogo.net/assets/wl-blog/00666f9e87c8ddd16f9307e5e4992612_AWA-Tower-Sydney-c-flickr.com_Dave-Keeshan-320x426.jpg 320w, //cdn.hometogo.net/assets/wl-blog/c5ad235d086378ebc69f041b24425f6a_AWA-Tower-Sydney-c-flickr.com_Dave-Keeshan-1024x1365.jpg 1024w" style="max-width: 700px;height: auto;" title="AWA Tower Sydney" width="650"><p class="wp-caption-text" data-dcnode-id="3930"><span data-dcnode-id="3934" instrument_node="">Photo by </span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/HQCSf" target="_blank" title="Dave Keeshan on Flickr"><span data-dcnode-id="3933" instrument_node="">Dave Keeshan</span></a><span data-dcnode-id="3931" instrument_node=""> / FlickrCC</span></p></div><span data-dcnode-id="3928" instrument_node=""> </span><p data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">The AWA Tower in Sydney is an office complex that was built in 1939. To get around the maximum height restrictions for buildings in Sydney and taking inspiration from the Eiffel Tower, the owners chose to erect a massive transmitter on top. It was Sydney’s tallest structure for many years before several skyscrapers overtook it!</span></p><span data-dcnode-id="3925" instrument_node=""> </span><div class="wp-caption aligncenter" data-dcnode-id="3918" id="attachment_7355" style="width: 660px"><img alt="Eiffel Tower paris" class="wp-image-7355 size-medium" data-dcnode-id="3924" height="975" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.hometogo.net/assets/wl-blog/a50098356a71843efd96959edc62b410_Eiffel-Tower-paris-650x975.jpg&amp;raw" srcset="//cdn.hometogo.net/assets/wl-blog/a50098356a71843efd96959edc62b410_Eiffel-Tower-paris-650x975.jpg 650w, //cdn.hometogo.net/assets/wl-blog/e3b6c7357b2efe005b62beb3ac744549_Eiffel-Tower-paris-320x480.jpg 320w, //cdn.hometogo.net/assets/wl-blog/fe28c1afd79254e3bc11f75b44285c27_Eiffel-Tower-paris-300x450.jpg 300w, //cdn.hometogo.net/assets/wl-blog/5fdbe4754cb9db9a5538cd6b1a8a7f03_Eiffel-Tower-paris.jpg 683w" style="max-width: 700px;height: auto;" title="Eiffel Tower paris" width="650"><p class="wp-caption-text" data-dcnode-id="3919"><span data-dcnode-id="3923" instrument_node="">Photo by </span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//flic.kr/p/aDX3VL" target="_blank" title="Kimberley Vardeman on Flickr"><span data-dcnode-id="3922" instrument_node="">Kimberley Vardeman</span></a><span data-dcnode-id="3920" instrument_node=""> / FlickrCC</span></p></div><span data-dcnode-id="3917" instrument_node=""> </span><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">…and if you’d like a remind of what the real deal looks like – here you go!</span></p><span data-dcnode-id="3914" instrument_node=""> </span></section><span data-dcnode-id="3912" instrument_node="">
