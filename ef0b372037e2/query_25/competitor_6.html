</span><article class="post-6995 page type-page status-publish has-post-thumbnail hentry" data-dcnode-id="418" id="post-6995"><span data-dcnode-id="680" instrument_node="">
</span><header class="entry-header" data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Victorian Industrial Architecture</span></h1><span data-dcnode-id="676" instrument_node="">
</span></header><span data-dcnode-id="673" instrument_node="">
</span><div class="entry-content" data-dcnode-id="421"><span data-dcnode-id="672" instrument_node="">
</span><div class="at-above-post-page addthis_tool" data-dcnode-id="671" data-url="http://victorian-era.org/victorian-industrial-architecture.html"></div><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Victorian Industrial Architecture: The term Industrial Architecture refers to the design and pattern with which the industrial building was constructed. The significance for specially designed industrial structures came to the forefront during the era of Industrial Revolution. The word “Industry” includes within its ambit factories, mills, distillery, warehouses, breweries, etc.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">This article discusses the evolution of Victorian Industrial Architecture. For easy understanding, the article has been divided into two periods- Pre Industrial Revolution and Post Industrial Revolution.</span></p><span data-dcnode-id="665" instrument_node="">
</span><div class="ez-toc-v2_0_17 counter-hierarchy counter-decimal" data-dcnode-id="627" id="ez-toc-container"><span data-dcnode-id="664" instrument_node="">
</span><div class="ez-toc-title-container" data-dcnode-id="649"><span data-dcnode-id="663" instrument_node="">
</span><p class="ez-toc-title" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Table of Contents</span></p><div class="code-block code-block-3" data-dcnode-id="654" style="margin: 8px 0; clear: both;"><span data-dcnode-id="660" instrument_node="">
</span><span data-dcnode-id="658" instrument_node="">
</span><div data-dcnode-id="657" id="ezoic-pub-ad-placeholder-114"></div><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="653" instrument_node="">
</span><span class="ez-toc-title-toggle" data-dcnode-id="650"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="651" style="display: none;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="652"></i></a></span></div><span data-dcnode-id="648" instrument_node="">
</span><nav data-dcnode-id="628"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="629"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="645"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="646" href="#Pre_Industrial_Revolution_Architecture_Georgian_and_Victorian_Era" title="Pre Industrial Revolution Architecture (Georgian and Victorian Era)"><span data-dcnode-id="647" instrument_node="">Pre Industrial Revolution Architecture (Georgian and Victorian Era)</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="642"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="643" href="#Post_Industrial_Revolution_Architecture_Victorian_and_Edwardian_Era" title="Post Industrial Revolution&nbsp;Architecture (Victorian and Edwardian Era)"><span data-dcnode-id="644" instrument_node="">Post Industrial Revolution&nbsp;Architecture (Victorian and Edwardian Era)</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="639"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="640" href="#Victorian_Architecture_Materials" title="Victorian Architecture Materials"><span data-dcnode-id="641" instrument_node="">Victorian Architecture Materials</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="636"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="637" href="#Victorian_Industrial_Architecture" title="Victorian Industrial Architecture"><span data-dcnode-id="638" instrument_node="">Victorian Industrial Architecture</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="633"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="634" href="#Victorian_Style_Architecture" title="Victorian Style Architecture"><span data-dcnode-id="635" instrument_node="">Victorian Style Architecture</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="630"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="631" href="#Victorian_Architecture_Houses" title="Victorian Architecture Houses"><span data-dcnode-id="632" instrument_node="">Victorian Architecture Houses</span></a></li></ul></nav></div><span data-dcnode-id="626" instrument_node="">
</span><h2 data-dcnode-id="621"><span class="ez-toc-section" data-dcnode-id="625" id="Pre_Industrial_Revolution_Architecture_Georgian_and_Victorian_Era"></span><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Pre Industrial Revolution Architecture (Georgian and Victorian Era)</span></strong><span class="ez-toc-section-end" data-dcnode-id="622"></span></h2><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The industries during the Pre Industrial Revolution period were completely opposite and primitive in nature in comparison to the ones that came up after the Revolution. In fact, the concept of the industry as we know it today did not really exist. However, some basic features of an industrial set up like chimneys and windows remain the same.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Earlier, the industrial buildings were constructed using simple and easily available materials. These materials were used on a large scale and they included limestone, stone, bricks, and wood. These materials were then mixed with soil. This combination of mixing the building material with soil helped in holding the structure together.</span></p><div class="code-block code-block-4" data-dcnode-id="608" style="margin: 8px 0; clear: both;"><span data-dcnode-id="614" instrument_node="">
</span><span data-dcnode-id="612" instrument_node="">
</span><div data-dcnode-id="611" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="610" instrument_node="">
</span></div><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><img alt="Victorian Industrial Architecture" class="alignnone wp-image-5584" data-dcnode-id="606" height="300" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/edwardian-era-architecture-Style-2-300x200.jpg&amp;raw" srcset="http://victorian-era.org/images/edwardian-era-architecture-Style-2-300x200.jpg 300w, http://victorian-era.org/images/edwardian-era-architecture-Style-2-768x512.jpg 768w, http://victorian-era.org/images/edwardian-era-architecture-Style-2-750x500.jpg 750w, http://victorian-era.org/images/edwardian-era-architecture-Style-2.jpg 800w" width="450"></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">During this period, the industries were much smaller in size than their Post Industrial Revolution counterparts. The height and weight of these smaller industrial units varied depending on the holding capacity of the building materials. Having said this, there was by default a limitation as to how much burden the industrial structure could bear, both horizontally and vertically.</span></p><div class="code-block code-block-9" data-dcnode-id="595" style="margin: 8px 0; clear: both;"><span data-dcnode-id="601" instrument_node="">
</span><span data-dcnode-id="599" instrument_node="">
</span><div data-dcnode-id="598" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="597" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Chimney was another regular part of the industrial architecture. The chimneys were built of stone or bricks as to guide the smoke out of the industry and de-clog the premises from remnants of any harmful pollutants. The chimneys were also small, built in a way to suit the size of the industrial unit.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Although there were windows in the structures, they were small and this resulted in less supply of air. Industries during the Pre Revolution era were functional either in the worker’s home or in small shops. Manufacture of products was made possible by using simple machinery or hand tools.</span></p><div class="code-block code-block-10" data-dcnode-id="582" style="margin: 8px 0; clear: both;"><span data-dcnode-id="588" instrument_node="">
</span><span data-dcnode-id="586" instrument_node="">
</span><div data-dcnode-id="585" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="584" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><h2 data-dcnode-id="576"><span class="ez-toc-section" data-dcnode-id="580" id="Post_Industrial_Revolution_Architecture_Victorian_and_Edwardian_Era"></span><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Post Industrial Revolution&nbsp;Architecture (Victorian and Edwardian Era)</span></strong><span class="ez-toc-section-end" data-dcnode-id="577"></span></h2><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">The birthplace of Industrial Architecture was England. Industrial Architecture came in vogue during the 18th century. This expansion of architecture in industrial structures was a product of the </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/victorian-england.html"><span data-dcnode-id="573" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="571" instrument_node="">.</span></p><span data-dcnode-id="569" instrument_node="">
</span><figure aria-describedby="caption-attachment-6996" class="wp-caption alignnone" data-dcnode-id="564" id="attachment_6996" style="width: 450px"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/Post-Industrial-Revolution-Industrial-Architecture.jpg"><img alt="Post Industrial Revolution Industrial Architecture" class="wp-image-6996" data-dcnode-id="568" height="577" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/Post-Industrial-Revolution-Industrial-Architecture-234x300.jpg&amp;raw" srcset="http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Architecture-234x300.jpg 234w, http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Architecture-390x500.jpg 390w, http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Architecture.jpg 462w" width="450"></a><figcaption class="wp-caption-text" data-dcnode-id="565" id="caption-attachment-6996"><span data-dcnode-id="566" instrument_node="">Post Industrial Revolution Industrial Architecture</span></figcaption></figure><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">This Industrial Revolution took place on a large scale in the initial few years of the 18th century and had a long-lasting impact on several aspects, social as well as commercial.</span></p><span data-dcnode-id="560" instrument_node="">
</span><h2 data-dcnode-id="555"><span class="ez-toc-section" data-dcnode-id="559" id="Victorian_Architecture_Materials"></span><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Victorian Architecture Materials</span></strong><span class="ez-toc-section-end" data-dcnode-id="556"></span></h2><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">The Industrial Revolution paved the way for the construction of a new type of materials for building industries. There was an increase in the production and usage of materials like steel and iron. These materials were being used on a wide scale as frameworks to the industrial buildings.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Although different building materials were now being used, bricks still remained at top of the list as the principal building material with iron or cast-iron being used as the framework.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">With the advent of some break-through innovations that were a result of various scientific experiments and research, the scattered manufacture of products from either individual house or shop was brought under one big industrial unit.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h2 data-dcnode-id="540"><span class="ez-toc-section" data-dcnode-id="544" id="Victorian_Industrial_Architecture"></span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Victorian Industrial Architecture</span></strong><span class="ez-toc-section-end" data-dcnode-id="541"></span></h2><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">It was from these big industrial premises that raw and unfinished goods were now transformed into finished products. Also, sturdy structures enabled usage of heavy machinery. This new type of machinery helped in increasing the production of the goods.</span></p><div class="code-block code-block-11" data-dcnode-id="530" style="margin: 8px 0; clear: both;"><span data-dcnode-id="536" instrument_node="">
</span><span data-dcnode-id="534" instrument_node="">
</span><div data-dcnode-id="533" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="532" instrument_node="">
</span></div><span data-dcnode-id="529" instrument_node="">
</span><figure aria-describedby="caption-attachment-6997" class="wp-caption alignnone" data-dcnode-id="524" id="attachment_6997" style="width: 450px"><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture.jpeg"><img alt="Post Industrial Revolution Industrial Machinery and Architecture" class="wp-image-6997" data-dcnode-id="528" height="286" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture-300x190.jpeg&amp;raw" srcset="http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture-300x190.jpeg 300w, http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture-768x488.jpeg 768w, http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture.jpeg 1024w, http://victorian-era.org/images/Post-Industrial-Revolution-Industrial-Machinery-and-Architecture-788x500.jpeg 788w" width="450"></a><figcaption class="wp-caption-text" data-dcnode-id="525" id="caption-attachment-6997"><span data-dcnode-id="526" instrument_node="">Post-Industrial Revolution Industrial Machinery and Architecture</span></figcaption></figure><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">During this period, the production of cast-iron as an industrial building material reached new heights. Along with cast-iron, granite had become the newest material for building industries. Over the years, it had gradually become known to the engineers and architects that granite does not catch fire.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">This was an important discovery in the field of architecture since wood (that was primarily used to build structures) would easy succumb to fire and it resulted in a massive loss to the goods and property. Innovations had made it possible for the discovery of newer materials apart from cast-iron like wrought iron, steel, etc.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">These were lighter in weight, sturdier than previously used materials for building. An important feature of these newly found materials was that they bore resistance to any type of structural tension. This, in turn, enhanced the capacity of the structure to be expanded not only with regard to its weight, but also the height of the new age industries could be increased.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h2 data-dcnode-id="509"><span class="ez-toc-section" data-dcnode-id="513" id="Victorian_Style_Architecture"></span><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Victorian Style Architecture</span></strong><span class="ez-toc-section-end" data-dcnode-id="510"></span></h2><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Another new invention during this period was the production and use of glass. Glassed windows had become a fashion. These windows were bigger in size than the ones built during the Pre Revolution period. The increased size of the windows enabled a good supply of natural light. The Post Industrial Revolution era saw the incorporation of different architectural styles.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Doric order style was being used while constructing pillars for some industries. Doric order is a Greek architectural style. Doric columns were simple architectural design. The columns or pillars were very thick in order to support the weight of the structure or ceiling. Above these columns were smooth-surfaced capitals or round shaped structure.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">In some of the earlier designs, a square-shaped structure would be placed in between the capital and the column. This ensured the longevity of the entire structure. Apart from Doric columns, pilasters and pediments were commonly used for providing support to the building.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Some factories during this period were also built in Classical style. Another commonly seen architectural style was Gothic with its signature pointed arches and windows. This period also witnessed experimentation of architectural styles.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">It was achieved by merging two architectural designs and creating a new one. For example, the combination of stones and bricks, or even two different colored bricks were used. Gothic style industrial buildings were built using stones.</span></p><span data-dcnode-id="493" instrument_node="">
</span><h2 data-dcnode-id="488"><span class="ez-toc-section" data-dcnode-id="492" id="Victorian_Architecture_Houses"></span><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Victorian Architecture Houses</span></strong><span class="ez-toc-section-end" data-dcnode-id="489"></span></h2><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Thus, it can be rightly concluded that the entire transformation of the industries, from being run from the backyard of the worker’s house or small shops to being brought together under one roof in form of large industrial units.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">All of this was the resultant of the Industrial Revolution. The Revolution that took place over two centuries ago is primarily responsible for bringing out the notion of Industrial Architecture. It was this architectural venture that had laid the foundations of modern-day structural architecture.</span></p><span data-dcnode-id="481" instrument_node="">
