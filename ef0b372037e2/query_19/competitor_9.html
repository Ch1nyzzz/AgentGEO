ssays.com/support"><span data-dcnode-id="235" instrument_node="">Contact us</span></a></div></li></ul></nav></div><div class="menu-bottom" data-dcnode-id="228"></div></div></div></div><main data-dcnode-id="125" id="site-content"><article class="post-649 post type-post status-publish format-standard hentry category-france category-history category-geography" data-dcnode-id="126" id="post-649"><header class="entry-header has-text-align-center header-footer-group" data-dcnode-id="207"><div class="entry-header-inner section-inner medium" data-dcnode-id="208"><div class="entry-categories" data-dcnode-id="211"><span data-dcnode-id="224" instrument_node=""> </span><span class="screen-reader-text" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Categories</span></span><div class="entry-categories-inner" data-dcnode-id="212"><span data-dcnode-id="221" instrument_node=""> </span><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/category/geography/france" rel="category tag"><span data-dcnode-id="220" instrument_node="">France</span></a><span data-dcnode-id="218" instrument_node=""> </span><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/category/history" rel="category tag"><span data-dcnode-id="217" instrument_node="">History</span></a><span data-dcnode-id="215" instrument_node=""> </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/category/geography" rel="category tag"><span data-dcnode-id="214" instrument_node="">Places</span></a></div></div><h1 class="entry-title" data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">The Eiffel Tower</span></h1></div></header><div class="post-inner thin" data-dcnode-id="128"><div class="entry-content" data-dcnode-id="129"><div class="addtoany_share_save_container addtoany_content addtoany_content_top" data-dcnode-id="203"><div class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="The Eiffel Tower" data-a2a-url="https://onlineessays.com/essays/geography/his237.php" data-dcnode-id="204" style="line-height: 32px;"><a class="a2a_dd addtoany_share_save addtoany_share" data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addtoany.com/share%23url%3Dhttps%253A%252F%252Fonlineessays.com%252Fessays%252Fgeography%252Fhis237.php%26title%3DThe%2520Eiffel%2520Tower"><img alt="Share" data-dcnode-id="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/buttons/share_save_256_24.png&amp;raw"></a></div></div><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">The Eiffel tower is the trademark of Paris, France.  With the tower being 984ft, it’s kind of hard not to notice it.  The tower has a restaurant, radio and television transmitter and more.  Gustave A. Eiffel created the tower to enter it in the worlds fair.  It was made with wrought iron and had medium wind resistance.  Gustave started in 1889 and completed in 1910. Gustave A. Eiffel created the Eiffel Tower.  Eiffel oversaw the construction with such success that in 1866 he founded his own company and soon became known for his wrought iron structures. Starting in 1872 he attracted foreign contracts, and in 1877 he created over the Douro River in Porto, Portugal, a steel arch bridge 525 ft in height.</span></p><div data-dcnode-id="192" style=""><center data-dcnode-id="193"><div data-dcnode-id="196" style="text-align: center;"><div class="button-wrapper" data-dcnode-id="197"><span data-dcnode-id="200" instrument_node=""> </span><a class="call-to-action-button" data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/k7zf" rel="nofollow"><span data-dcnode-id="199" instrument_node="">Plagiarism Checker &gt;</span></a></div></div></center></div><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">The Eiffel Tower is a landmark and an early example of wrought-iron construction on a gigantic scale.  It was designed and built by the French civil engineer Gustave Alexandre Eiffel for the Paris World’s Fair of 1889.  The tower, without its modern broadcasting antennae, is 984 ft high.  The lower section consists of four immense arched legs set on masonry piers.  The legs curve inward until they unite in a single tapered tower.  Platforms, each with an observation deck, are at three levels; on the first is also a restaurant.  The tower, constructed of about 7000 tons of iron, has stairs and elevators.  A meteorological station, a radio communications station, and a television transmission antenna, as well as a suite of rooms that were used by Eiffel are located near the top of the tower.</span></p><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Eiffel’s work combined expert craftsmanship and graceful design.  Completed in 1884, it was for a time the highest bridge in the world, winning Eiffel’s factory a worldwide reputation for excellence.  Eiffel cast Frederic Auguste Bartholdi’s colossal statue Liberty Enlightening the World, which was dedicated in New York in 1886.  Soon after, he began work on his greatest project, the building of the Eiffel Tower.  It was completed in 1889 for the celebration of the centennial of the French Revolution (1789-1799).  Eiffel was not a popular man when he started building the huge steel-frame tower that would overlook Paris. The structure was just too different and the critics didn’t like it at all. In 1887, the leading artists of Paris signed a petition to have what they regarded as a monstrosity torn down immediately.   Fortunately for Paris, their call was ignored. And though Parisians didn’t like it at first, they began to grow fond of the structure they initially called a Cyclops and a skeleton.  The Eiffel Tower was completed in 1889, just in time to show off for the World’s Fair, being held that year in Paris.  The tower was also a sign of things to come. Eiffel was taking full advantage of a new building material, structural steel. With it he took the first step in creating what would become the modern skyscraper.</span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">The imposing tower-constructed of 7,000 tons of iron in 18,000 parts held together by 2,500,000 rivets rises to a height of 984 ft and continues to dominate the Paris skyline.  In the early 1890’s Eiffel gave up the daily management of his business and became absorbed in the new science of aerodynamics.</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Emile Nouguier and Maurice Koechlin, the two chief engineers in Eiffel’s company, had the idea for a very tall tower in June 1884. It was to be designed like a large pylon with four columns of lattice work girders, separated at the base and coming together at the top, and joined to each other by more metal girders at regular intervals. The company had by this time mastered perfectly the principle of building bridge supports. The tower project was a bold extension of this principle up to a height of 300 meters, equivalent to the symbolic figure of 1000 ft. On September 18 1884 Eiffel registered a patent “for a new figuration allowing the construction of metal supports and pylons capable of exceeding a height of 300 meters”.</span></p><div data-dcnode-id="177" style=""><center data-dcnode-id="178"><div data-dcnode-id="179" style="text-align: center;"><div class="button-wrapper" data-dcnode-id="180"><span data-dcnode-id="183" instrument_node=""> </span><a class="call-to-action-button" data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/p8tj" rel="nofollow"><span data-dcnode-id="182" instrument_node="">Plagiarism Checker &gt;</span></a></div></div></center></div><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Eiffel’s clockwork precision had enabled him not only to meet his deadline, but to build the structure with the loss of only one life, that of a worker who fell from the first platform while apparently showing off for his girlfriend after the bell had sounded ending the working day.</span></p><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">The Eiffel tower is the trademark for Paris.  Even though The people of Paris didn’t like the tower, they got to like it, so did the tourist.  Then they found out about the good transmitting with the radio and the television.  Now the Eiffel tower is a major tourist attraction, and one of the best standing structures in the world.</span></p><div class="addtoany_share_save_container addtoany_content addtoany_content_bottom" data-dcnode-id="169"><div class="a2a_kit a2a_kit_size_32 addtoany_list" data-a2a-title="The Eiffel Tower" data-a2a-url="https://onlineessays.com/essays/geography/his237.php" data-dcnode-id="170" style="line-height: 32px;"><a class="a2a_dd addtoany_share_save addtoany_share" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.addtoany.com/share%23url%3Dhttps%253A%252F%252Fonlineessays.com%252Fessays%252Fgeography%252Fhis237.php%26title%3DThe%2520Eiffel%2520Tower"><img alt="Share" data-dcnode-id="172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.addtoany.com/buttons/share_save_256_24.png&amp;raw"></a></div></div><div class="rp4wp-related-posts" data-dcnode-id="130"><h3 data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Related Essays</span></h3><ul data-dcnode-id="131"><li data-dcnode-id="160"><div class="rp4wp-related-post-content" data-dcnode-id="161"><span data-dcnode-id="166" instrument_node=""> </span><a data-dcnode-id="164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlineessays.com/essays/geography/notr
