</span><div class="guide-main content group" data-dcnode-id="1174"><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node="">The Eiffel Tower, an icon of Paris, is a wonder of design and structure, and an impressive sight worth getting close to.  Lie in the grass at the Champs de mars and gaze up.  Ascend the tower for spectacular views of </span><a data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris"><span data-dcnode-id="1270" instrument_node="">Paris</span></a><span data-dcnode-id="1268" instrument_node="">.  Return at night with a bottle of Merlot to watch the spectacular light display.  The Eiffel Tower tops out at over 1,000 feet, containing 2 restaurants, a souvenir shop, a post office (for that one of a kind postmark), snack bar, and a viewing area.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><div class="google_ad_2" data-dcnode-id="1257"><span data-dcnode-id="1265" instrument_node="">
</span><span data-dcnode-id="1263" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3899050732510999" data-ad-format="auto" data-ad-slot="1473245311" data-dcnode-id="1262" style="display:block"></ins><span data-dcnode-id="1261" instrument_node="">
</span><span data-dcnode-id="1258" instrument_node="">
</span></div><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The world famous Paris tower is a mass of iron designed by Gustave Eiffel for the Universal Exposition of 1889 and was the tallest structure in the world until 1930, when New York's Chrysler building surpassed it.  The Paris tower faced criticism, especially from the artistic community of Paris, calling the structure a "truly tragic street lamp."  Allegedly, Guy de Maupassant ate lunch on the lower level of the Paris tower everyday because it was the only view of the city in which he couldn't see it.  The critics were slowly silenced as 2 million visitors ascended the tower in 1889.  Today, the Eiffel Tower is an icon of Paris, and is embraced by the city.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Fifty tons of paint are used every 5 years to repaint the structure.  A permanent light display goes off every hour in the evenings.  Skate 187 feet above the Earth, during the winter, as the Eiffel Tower Paris turns the first floor into a rink.  The tower has two restaurants, Altitude 95, located on the first floor 95 meters above sea level, and "reminiscent of an airship moored above Paris" according to the Eiffel Tower website.  Also on the first deck are a souvenir shop, exhibit on the Paris tower, snack bar, and the post office.  On the second floor, a specialty food shop, the restaurant Le Jules Verne, some historical panels, and another snack bar (in case you're using the stairs instead of the elevator).  At the top level, along with panoramic views, is a replica of Gustave Eiffel's office, complete with wax figures of the man himself.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><div class="callout map left" data-dcnode-id="1238"><span data-dcnode-id="1249" instrument_node="">
</span><h3 data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">
</span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/map"><span data-dcnode-id="1247" instrument_node="">Paris Map
</span></a><span data-dcnode-id="1245" instrument_node="">
</span></h3><span data-dcnode-id="1243" instrument_node="">
</span><a alt="Paris Map" data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/map"><img alt="Paris-map-sml" data-dcnode-id="1242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/maps/paris-map-sml.jpg&amp;raw"><span data-dcnode-id="1241" instrument_node="">
</span></a><span data-dcnode-id="1239" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1236" instrument_node="">No Paris travel guide would be complete without mentioning famous Paris attractions including, the Panthéon, a monument dedicated to historical personages of France, housing a crypt containing over 70 people, including Votaire, Jean-Jacques Rousseau, Marie Curie, and Alexandre Dumas. </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/cathedrale-notre-dame-de-paris"><span data-dcnode-id="1235" instrument_node="">Notre Dame</span></a><span data-dcnode-id="1233" instrument_node=""> cathedral, with its ornate interior is an awe inspiring and popular destination.  Pay homage to French author Victor Hugo, and ascend the bell tower for a look at the gargoyles from The Hunchback of Notre Dame.  Worth mentioning in any Paris travel guide is the </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/arc-de-triomphe"><span data-dcnode-id="1232" instrument_node="">Arc de Triomphe</span></a><span data-dcnode-id="1230" instrument_node="">, located on the famed avenue </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/champs-elysees"><span data-dcnode-id="1229" instrument_node="">Champs Élysées</span></a><span data-dcnode-id="1227" instrument_node=""> and centered in the world largest traffic roundabout.  It is a simple, yet daunting monument commissioned by Napoleon.  The gothic Saint Chapelle, built in the 13th century, has 15 stained glass windows depicting an entire biblical history.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><div class="google_ad_3" data-dcnode-id="1216"><span data-dcnode-id="1224" instrument_node="">
</span><span data-dcnode-id="1222" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-3899050732510999" data-ad-format="auto" data-ad-slot="4426711713" data-dcnode-id="1221" style="display:block"></ins><span data-dcnode-id="1220" instrument_node="">
</span><span data-dcnode-id="1217" instrument_node="">
</span></div><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1214" instrument_node="">Also important to mention in a Paris travel guide are some of the world famous museums Paris is home to including the gigantic </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/musee-du-louvre"><span data-dcnode-id="1213" instrument_node="">Louvre</span></a><span data-dcnode-id="1211" instrument_node="">, which houses the Mona Lisa; the </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.destination360.com/europe/france/paris/musee-d-orsay"><span data-dcnode-id="1210" instrument_node="">Musee d'Orsay</span></a><span data-dcnode-id="1208" instrument_node="">, with artists such as Renoir, Monet, and van Gogh; and the National d'Art et de Culture Georges Pompidou, home to a modern art collection.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">The Eiffel Tower Paris, still a marvel of structure and design, is a must see stop on any Paris itinerary.  Constructed for the World's Exhibition of 1889, the Eiffel Tower Paris was slow to be embraced, but is now a beloved symbol of Paris, and one of Europe, if not the world's most recognizable.</span></p><span data-dcnode-id="1203" instrument_node="">
