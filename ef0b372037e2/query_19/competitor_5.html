</span><h1 align="left" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Eiffel Tower Maintenance</span></h1><span data-dcnode-id="210" instrument_node="">
</span><p align="left" data-dcnode-id="189"><span data-dcnode-id="209" instrument_node="">The </span><i data-dcnode-id="205"><b data-dcnode-id="206"><a data-dcnode-id="207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corrosion-doctors.org/Landmarks/eiffel-picture.htm"><span data-dcnode-id="208" instrument_node="">Eiffel Tower</span></a></b></i><span data-dcnode-id="204" instrument_node=""> 
is built of riveted (2.5 million rivets!)&nbsp; </span><strong data-dcnode-id="199"><em data-dcnode-id="200"><span data-dcnode-id="203" instrument_node="">
</span><a data-dcnode-id="201" href="#Correction"><span data-dcnode-id="202" instrument_node="">wrought iron</span></a></em></strong><span data-dcnode-id="198" instrument_node="">, 
a material that will last virtually forever if it is painted regularly. Since it 
was built (</span><i data-dcnode-id="194"><b data-dcnode-id="195"><a data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corrosion-doctors.org/Landmarks/eiffel-history.htm" target="_top"><span data-dcnode-id="197" instrument_node="">for the International 
Exhibition of Paris in 1889</span></a></b></i><span data-dcnode-id="193" instrument_node="">), the tower has been painted once every 
seven years. Maintenance on the tower includes applying 50 metric tons of three graded tones 
of paint every 7 years to protect the 200,000 square meters of iron lattice work 
from rust. The darkest paint is used at the bottom and the lightest shade at the 
top. Each repainting, by 25 painters working for 15 months, requires 1500 brushes, 
5000 sanding disks and 1500 sets of work clothes. On occasion, the color of the paint 
is changed. The tower is currently painted to a shade of brown. (</span><a data-dcnode-id="191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.french-at-a-touch.com/Newsletters_and_Articles/facts_about_the_eiffel_tower_vii.htm" target="_blank"><span data-dcnode-id="192" instrument_node="">reference</span></a><span data-dcnode-id="190" instrument_node="">)
</span></p><span data-dcnode-id="188" instrument_node="">
</span><hr data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">
</span><h4 align="left" data-dcnode-id="182"><a data-dcnode-id="184" name="Correction"><span data-dcnode-id="185" instrument_node="">Correction</span></a><span data-dcnode-id="183" instrument_node=""> by Jock Dempsey of 
anvilfire.com </span></h4><span data-dcnode-id="181" instrument_node="">
</span><hr data-dcnode-id="180"><span data-dcnode-id="179" instrument_node="">
</span><p align="left" data-dcnode-id="174"><span data-dcnode-id="178" instrument_node="">The application of an anticorrosion treatment lasts one year, so 
that the tower can stay open and continue to greet visitors. This legendary structure 
comprises 220 000 m</span><sup data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">2</span></sup><span data-dcnode-id="175" instrument_node=""> of surfaces that have to be maintained and repainted 
(7 300 tons of structural metal, and 18 000 metal parts held together by 2 500 000 
rivets). Some of these surfaces are very difficult to reach. The budget for the 
job cost a total of 20 million francs.</span></p><span data-dcnode-id="173" instrument_node="">
</span><p align="left" data-dcnode-id="167"><span data-dcnode-id="172" instrument_node="">The </span><span data-dcnode-id="169"><strong data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">17th time</span></strong></span><span data-dcnode-id="168" instrument_node=""> the Eiffel Tower was 
to be repainted, there were three new requirements:</span></p><span data-dcnode-id="166" instrument_node="">
</span><ul data-dcnode-id="146"><span data-dcnode-id="165" instrument_node="">
</span><li data-dcnode-id="160"><span data-dcnode-id="164" instrument_node="">
</span><p align="left" class="style1" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">The monument had to be cleaned completely, with 
	better preparation of the corroded areas before they were painted</span></p><span data-dcnode-id="161" instrument_node="">
</span></li><span data-dcnode-id="159" instrument_node="">
</span><li data-dcnode-id="154"><span data-dcnode-id="158" instrument_node="">
</span><p align="left" class="style1" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">The work had to be inspected</span></p><span data-dcnode-id="155" instrument_node="">
</span></li><span data-dcnode-id="153" instrument_node="">
</span><li data-dcnode-id="148"><span data-dcnode-id="152" instrument_node="">
</span><p align="left" class="style1" data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">Greater safety precautions had to be taken on 
	the site</span></p><span data-dcnode-id="149" instrument_node="">
</span></li><span data-dcnode-id="147" instrument_node="">
</span></ul><span data-dcnode-id="145" instrument_node="">
</span><p align="left" data-dcnode-id="136"><span data-dcnode-id="144" instrument_node="">The 25 painters who work on the </span><a data-dcnode-id="142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corrosion-doctors.org/Landmarks/eiffel-picture.htm"><span data-dcnode-id="143" instrument_node="">Eiffel 
Tower</span></a><span data-dcnode-id="141" instrument_node=""> still use the traditional methods from the time when </span><span data-dcnode-id="138"><strong data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Gustave 
Eiffel</span></strong></span><span data-dcnode-id="137" instrument_node=""> designed it. The paint must be applied only manually, with 
brushes; rollers and paint guns are not allowed.</span></p><span data-dcnode-id="135" instrument_node="">
</span><ul data-dcnode-id="125"><span data-dcnode-id="134" instrument_node="">
</span><li data-dcnode-id="127"><span data-dcnode-id="133" instrument_node="">
</span><p align="left" data-dcnode-id="129"><b data-dcnode-id="130"><font color="#660000" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Special paint systems used</span></font></b></p><span data-dcnode-id="128" instrument_node="">
</span></li><span data-dcnode-id="126" instrument_node="">
</span></ul><span data-dcnode-id="124" instrument_node="">
</span><blockquote data-dcnode-id="116"><span data-dcnode-id="123" instrument_node="">
</span><p align="left" data-dcnode-id="118"><span data-dcnode-id="122" instrument_node="">The paints applied to the Eiffel Tower are formulated for this 
	specific purpose. For this 17th paint job, a paint using new, lead-free pigments 
	was developed, tested on 200 m</span><sup data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">2</span></sup><span data-dcnode-id="119" instrument_node=""> of surface, and subjected to reactivity 
	tests by the SNTE (Société nationale de la Tour Eiffel). To emphasize the shape 
	of the tower as seen from the ground, it was painted in three shades of brown 
	specified by the SNTE's architect -the lightest shade at the top, and the darkest 
	at the bottom.</span></p><span data-dcnode-id="117" instrument_node="">
</span></blockquote><span data-dcnode-id="115" instrument_node="">
</span><ul data-dcnode-id="105"><span data-dcnode-id="114" instrument_node="">
</span><li data-dcnode-id="107"><span data-dcnode-id="113" instrument_node="">
</span><p align="left" data-dcnode-id="109"><b data-dcnode-id="110"><font color="#660000" data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Preparation of corroded areas and complete 
	cleaning of tower</span></font></b></p><span data-dcnode-id="108" instrument_node="">
</span></li><span data-dcnode-id="106" instrument_node="">
</span></ul><span data-dcnode-id="104" instrument_node="">
</span><blockquote data-dcnode-id="96"><span data-dcnode-id="103" instrument_node="">
</span><p align="left" data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">All corroded areas were stripped, sanded, and ground, then received 
	two coats of an oleoglycerophthalic primer containing lead silicate-chromate 
	pigment, which affords excellent resistance to corrosion while maintaining flexibility 
	for the paints applied on top of it. (The areas that were determined not to 
	be corroded were cleaned with high-pressure steam.)</span></p><span data-dcnode-id="100" instrument_node="">
</span><p align="left" data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">The general finishing coat was applied with an oleoglycerophthalic 
	paint containing basic lead silicate-chromate pigment. The colors were Eiffel 
	Tower brown numbers 1, 2, and 3 (one for each level of the tower). This paint 
	has the following properties: highly aesthetic appearance; perfect compatibility 
	with the existing, older paints; excellent corrosion resistance; and complete 
	suitability for the Eiffel Tower.</span></p><span data-dcnode-id="97" instrument_node="">
</span></blockquote><span data-dcnode-id="95" instrument_node="">
</span><p align="left" data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">In total, 60 tons of paint (including 10 tons of primer) were applied 
in the course of this job. It was estimated that about 15 tons of paint had eroded 
since the last time the tower was painted. </span></p><span data-dcnode-id="92" instrument_node="">
</span><h3 align="left" data-dcnode-id="88"><a data-dcnode-id="90" name="Galvanizing_"><span data-dcnode-id="91" instrument_node="">Galvanizing </span></a><span data-dcnode-id="89" instrument_node="">the Eiffel Tower?</span></h3><span data-dcnode-id="87" instrument_node="">
</span><p align="left" data-dcnode-id="82"><span data-dcnode-id="86" instrument_node="">Amazed at the cost and complexity of the work involved in repainting 
the tower, where the painters must use hooks, ropes, safety nets and cannot begin 
painting each day until the morning dew has evaporated, a Dutch corrosion expert 
recently made a hypothetical calculation of cost savings had the Eiffel Tower been 
galvanized. He made a cost analysis comparing the application of a paint system 
with a so-called duplex system, whereby the steel is first galvanized with zinc 
and then painted. With a duplex system, any damage to the paint coating does not 
lead to corrosion as the steel continues to be protected by the zinc which underlies 
the paint. (</span><a data-dcnode-id="84" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.koreazinc.co.kr/english/library/zinc_epel.htm" target="_blank"><span data-dcnode-id="85" instrument_node="">reference</span></a><span data-dcnode-id="83" instrument_node="">)</span></p><span data-dcnode-id="81" instrument_node="">
</span><p align="left" data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">Had the steel used to build the Eiffel Tower been galvanized before 
painting, only seven large-scale maintenance operations would have been required, 
compared to the 17 that have taken place since 1889. The first large-scale maintenance 
of a duplex system normally takes place after about 25 years (surface preparation 
and application of a primer and top coats). After this, small-scale maintenance 
(top coat) and large-scale maintenance take place alternately, after five or seven 
years respectively. </span></p><span data-dcnode-id="78" instrument_node="">
</span><p align="left" data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">What does all this mean in terms of cost? Based on today's wage 
and price levels, and allowing for a favorable purchase price of the large quantity 
of paint needed, galvanizing before painting - the duplex system - would have saved 
at least $10 million in maintenance costs! Using modern day prices to calculate 
construction and erection costs, these savings amount to over 50% of the construction 
cost. </span></p><span data-dcnode-id="75" instrument_node="">
</span><hr data-dcnode-id="74"><span data-dcnode-id="73" instrument_node="">
