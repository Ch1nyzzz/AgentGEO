</span><h1 class="post-title entry-title" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">The Eiffel Tower: How was it built?</span></h1><span data-dcnode-id="564" instrument_node="">
</span><p class="post-byline" data-dcnode-id="552"><span data-dcnode-id="563" instrument_node="">
       by     </span><span class="vcard author" data-dcnode-id="557"><span data-dcnode-id="562" instrument_node="">
</span><span class="fn" data-dcnode-id="559"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.howitworksdaily.com/author/imagineadmin/" rel="author" title="Posts by How It Works Team"><span data-dcnode-id="561" instrument_node="">How It Works Team</span></a></span><span data-dcnode-id="558" instrument_node="">
</span></span><span data-dcnode-id="556" instrument_node="">
     ·
                          </span><span class="published" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">27/08/2015</span></span><span data-dcnode-id="553" instrument_node="">
</span></p><span data-dcnode-id="551" instrument_node="">
</span><div class="clear" data-dcnode-id="550"></div><span data-dcnode-id="549" instrument_node="">
</span><div class="entry themeform" data-dcnode-id="414"><span data-dcnode-id="548" instrument_node="">
</span><div class="entry-inner" data-dcnode-id="418"><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The Eiffel Tower was the brainchild of French structural engineer Alexandre&nbsp;Gustave Eiffel, who proposed a 324m (986ft) tower for the capital’s Champ de Mars, costing the city $1.5 million, for its World’s Fair.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Work began in July 1887 and took just under two years to complete. To begin with the framework was pre-assembled in a factory and in total over 300 workers joined 18,000 pieces of puddle iron to produce parts of the frame. When the parts were ready they were transported to the Champ de Mars where welders secured each segment in place. As the tower grew, moveable platforms were propped into place on the intermediary levels, not only to enable the workforce to weld the latticework together but for their own safety.</span></p><span data-dcnode-id="541" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="536" id="attachment_25063" style="width: 526px"><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//howitworks.wpengine.com/wp-content/uploads/2015/07/Maurice_koechlin_pylone.jpg"><img alt="original blueprint for the Eiffel Tower" aria-describedby="caption-attachment-25063" class="wp-image-25063" data-dcnode-id="540" height="747" sizes="(max-width: 516px) 100vw, 516px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//howitworks.wpengine.com/wp-content/uploads/2015/07/Maurice_koechlin_pylone.jpg&amp;raw" srcset="https://www.howitworksdaily.com/wp-content/uploads/2015/07/Maurice_koechlin_pylone.jpg 750w, https://www.howitworksdaily.com/wp-content/uploads/2015/07/Maurice_koechlin_pylone-311x450.jpg 311w, https://www.howitworksdaily.com/wp-content/uploads/2015/07/Maurice_koechlin_pylone-707x1024.jpg 707w" width="516"></a><p class="wp-caption-text" data-dcnode-id="537" id="caption-attachment-25063"><span data-dcnode-id="538" instrument_node="">The original blueprint for the Eiffel Tower was drawn up in 1884 by engineer Maurice Koechlin</span></p></div><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">&nbsp;</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The tower features exposed latticework and consists of two main parts; a 2.54-acre base which compromises a platform sitting upon four individual legs known as pylons or bents, and a tower created as the pylons incline towards each other, rising upwards past a second platform which then merges into one long column.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">The shape of the tower was engineered using a mathematical calculation involving wind resistance. Eiffel reasoned that the tower had to counterbalance the wind pressure applied on any point by spreading the tension between the construction elements at that point. Therefore the tower’s curvature revealed two exponentials: a lower base section that delivers stronger resistance to wind forces, meaning the tower&nbsp;will only sway at a maximum of 6-7cm in the wind.</span></p><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">How the Eiffel Tower was&nbsp;built</span></h3><span data-dcnode-id="523" instrument_node="">
</span><div class="wp-caption alignnone" data-dcnode-id="518" id="attachment_25064" style="width: 621px"><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//howitworks.wpengine.com/wp-content/uploads/2015/07/Stages-of-Eiffel-Tower.jpg"><img alt="Stages of Eiffel Tower" aria-describedby="caption-attachment-25064" class="size-full wp-image-25064" data-dcnode-id="522" height="402" loading="lazy" sizes="(max-width: 611px) 100vw, 611px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//howitworks.wpengine.com/wp-content/uploads/2015/07/Stages-of-Eiffel-Tower.jpg&amp;raw" srcset="https://www.howitworksdaily.com/wp-content/uploads/2015/07/Stages-of-Eiffel-Tower.jpg 611w, https://www.howitworksdaily.com/wp-content/uploads/2015/07/Stages-of-Eiffel-Tower-450x296.jpg 450w" width="611"></a><p class="wp-caption-text" data-dcnode-id="519" id="caption-attachment-25064"><span data-dcnode-id="520" instrument_node="">More than 18,000 parts were built in Eiffel workshops in Levallois and assembled on site by 132 workers.</span></p></div><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="514"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">1st floor (57m)</span></strong></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Work started on 26 January 1887, withthe foundations alone taking five months to build. Scaffolding was erected and the ‘feet’ were positioned with hydraulic jacks.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="507"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">2nd floor (115m)</span></strong></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Floor two was assembled using cranes that took the same route as the elevators. All of the parts were riveted into position on site.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="500"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">3rd floor (276m)</span></strong></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Carpenters set to work laying the third floor – with no fatal accidents during construction.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">31 March 1889</span></strong></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">On the tower’s inauguration Gustave Eiffel climbed to the top to plant the French flag.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The Eiffel Tower took just two years for 300 workers to complete and despite working on an open framework, and without the safety of intermediate floors, accidents were low and only one man died during construction. This is thought to have been due to the foresight of Eiffel who had insisted upon&nbsp;safety precautions in the form of moveable stagings, guard rails and screens.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">In 1909, at the end of its 20 year lease the tower came under criticism as an eyesore, and was almost torn down. It was only saved because of its antenna, which was used for the city’s communications.</span></p><span data-dcnode-id="483" instrument_node="">
</span><h3 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Eiffel Tower stats</span></h3><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Total weight: 10,100 tons</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Cost: $1.5 million</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Base area: 2.54 acres</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Height: 324 metres</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Rivets: 2.5 million</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Steps to the top: 1,665</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="461" instrument_node="">Discover more stories from History&nbsp;in the latest issue of&nbsp;</span><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">How It Works</span></strong><span data-dcnode-id="458" instrument_node="">&nbsp;magazine.&nbsp;It’s available&nbsp;from all good retailers, or you can order it online from the&nbsp;</span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imagineshop.co.uk/magazines/howitworks/how-it-works-issue-74.html" target="_blank"><span data-dcnode-id="457" instrument_node="">ImagineShop</span></a><span data-dcnode-id="455" instrument_node="">. If you have a tablet or smartphone, you can also&nbsp;</span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.greatdigitalmags.com/howitworks" target="_blank"><span data-dcnode-id="454" instrument_node="">download the digital version</span></a><span data-dcnode-id="452" instrument_node="">&nbsp;onto your&nbsp;</span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itunes.apple.com/gb/app/how-it-works/id471270590%3Fmt%3D8%26ign-mpt%3Duo%253D8" target="_blank"><span data-dcnode-id="451" instrument_node="">iOS</span></a><span data-dcnode-id="449" instrument_node="">&nbsp;or&nbsp;</span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/newsstand/details%3Fid%3DCAowr9HnAw%26cdid%3Dmagazineissue-CAAqBwgKMK_R5wMw0Ol6" target="_blank"><span data-dcnode-id="448" instrument_node="">Android</span></a><span data-dcnode-id="446" instrument_node="">&nbsp;device. To make sure you never miss an issue of&nbsp;</span><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">How It Works</span></strong><span data-dcnode-id="443" instrument_node="">&nbsp;magazine, make sure you&nbsp;</span><
