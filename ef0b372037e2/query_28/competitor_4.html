</span><h1 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">The iconic Eiffel Tower located in Paris, France is world famous and a visit to its top is a must! But when was the Eiffel Tower built and why? But more importantly, who built ‘la Tour Eiffel’?</span></h1><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">What’s the first thing that comes to mind when you think of Paris, or even France? We all know its most famous and iconic structure, but when was the Eiffel tower built and why? Well, there are several reasons.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">There are three reasons why the Eiffel Tower was built…</span></p><span data-dcnode-id="1459" instrument_node="">
</span><h2 data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">The 1889 World’s Fair in Paris</span></h2><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1445"><picture data-dcnode-id="1451"><source data-dcnode-id="1455" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg.webp 754w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-189x300.jpg.webp 189w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-643x1024.jpg.webp 643w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-585x931.jpg.webp 585w" sizes="(max-width: 754px) 100vw, 754px" srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg.webp 754w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-189x300.jpg.webp 189w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-643x1024.jpg.webp 643w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-585x931.jpg.webp 585w" type="image/webp"><img alt="Why was the Eiffel Tower Built - Street View of Eiffel Tower" class="alignleft size-full wp-image-14242 webpexpress-processed entered lazyloaded" data-dcnode-id="1454" data-lazy-sizes="(max-width: 754px) 100vw, 754px" data-lazy-src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg 754w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-189x300.jpg 189w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-643x1024.jpg 643w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-585x931.jpg 585w" data-ll-status="loaded" height="1200" sizes="(max-width: 754px) 100vw, 754px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg&amp;raw" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg 754w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-189x300.jpg 189w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-643x1024.jpg 643w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-585x931.jpg 585w" width="754"><noscript data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">&lt;img class="alignleft size-full wp-image-14242 webpexpress-processed" src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg" alt="Why was the Eiffel Tower Built - Street View of Eiffel Tower" width="754" height="1200" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower.jpg 754w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-189x300.jpg 189w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-643x1024.jpg 643w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Why-was-the-Eiffel-Tower-Built-Street-View-of-Eiffel-Tower-585x931.jpg 585w" sizes="(max-width: 754px) 100vw, 754px"&gt;</span></noscript></picture><span data-dcnode-id="1450" instrument_node="">The first and main reason the tower was designed and constructed was to commemorate the 100-year anniversary of the French Revolution in Europe as part of the 1889 World’s Fair held in </span><strong data-dcnode-id="1447"><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/paris-itinerary-4-days/" rel="noopener" target="_blank"><span data-dcnode-id="1449" instrument_node="">Paris</span></a></strong><span data-dcnode-id="1446" instrument_node="">. The French Revolution was aimed at eliminating the divine right of kings and ending dictatorships to install a democratic system of government. Today it is still a very important event in French history.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">To mark this special anniversary, the people and officials of France wanted to celebrate by making France even more beautiful. Since its erection, the Eiffel Tower has become one of the most beautiful buildings of not only in France, but also in the world. It’s even&nbsp;one of&nbsp;the Seven Wonders of the World.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Leading up to the fair, the organisers held a design competition all over France. Several designers and engineers came up with different ideas and designs on how France could be improved. Amongst the various ideas, a design by Gustave Eiffel made the best impression on a majority of the people. A little-known fact is that Gustave Eiffel also designed the internal body of Liberty Statue.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The design of the Eiffel Tower was the product of&nbsp;Maurice Koechlin&nbsp;and&nbsp;Émile Nouguier, two senior engineers working for the&nbsp;Compagnie des Établissements Eiffel.</span></p><span data-dcnode-id="1435" instrument_node="">

</span><hr data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1419"><strong data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Going to France?</span></strong><span data-dcnode-id="1423" instrument_node=""> Get my free </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/french-travel-phrase-guide-pronunciation/" rel="noopener" target="_blank"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Survival French travel phrase guide with pronunciation</span></strong></a></p><span data-dcnode-id="1418" instrument_node="">
</span><hr data-dcnode-id="1417"><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1415" instrument_node="">Eiffel has openly acknowledged that inspiration for the tower came from the&nbsp;Latting Observatory&nbsp;built in New York City in 1853. In May 1884, Koechlin made a sketch of their idea, which he described as being “</span><em data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">a great&nbsp;pylon, consisting of four lattice&nbsp;girders standing apart at the base and coming together at the top, joined together by metal trusses at regular intervals”.</span></em></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1404"><picture data-dcnode-id="1406"><source data-dcnode-id="1410" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg.webp 960w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-240x300.jpg.webp 240w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-819x1024.jpg.webp 819w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-768x960.jpg.webp 768w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-585x731.jpg.webp 585w" sizes="(max-width: 960px) 100vw, 960px" srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg.webp 960w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-240x300.jpg.webp 240w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-819x1024.jpg.webp 819w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-768x960.jpg.webp 768w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-585x731.jpg.webp 585w" type="image/webp"><img alt="When was the Eiffel Tower Built and Why - Looking up through the centre of the Eiffel Tower" class="alignleft size-full wp-image-14237 webpexpress-processed entered lazyloaded" data-dcnode-id="1409" data-lazy-sizes="(max-width: 960px) 100vw, 960px" data-lazy-src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg 960w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-240x300.jpg 240w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-819x1024.jpg 819w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-768x960.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-585x731.jpg 585w" data-ll-status="loaded" height="1200" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg&amp;raw" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg 960w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-240x300.jpg 240w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-819x1024.jpg 819w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-768x960.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-585x731.jpg 585w" width="960"><noscript data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">&lt;img class="alignleft size-full wp-image-14237 webpexpress-processed" src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg" alt="When was the Eiffel Tower Built and Why - Looking up through the centre of the Eiffel Tower" width="960" height="1200" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower.jpg 960w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-240x300.jpg 240w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-819x1024.jpg 819w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-768x960.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/When-was-the-Eiffel-Tower-Built-and-Why-Looking-up-through-the-centre-of-the-Eiffel-Tower-585x731.jpg 585w" sizes="(max-width: 960px) 100vw, 960px"&gt;</span></noscript></picture><span data-dcnode-id="1405" instrument_node="">Eiffel approved the&nbsp;further development of the design and asked Stephen Sauvestre, the head of the company’s architectural department, to contribute to the design. Sauvestre proceeded to add decorative arches to the base of the tower, a glass pavilion to the first level, and other details.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Enthusiastic by the final draft, Eiffel’s bought the rights to the patent on the design which Koechlin, Nougier, and Sauvestre had taken out. The design was then shown at the Exhibition of Decorative Arts in 1884 under the company name.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Lasting just over two years, construction of the Eiffel tower began on the 26th of January, 1887 and was completed on the 31st of March, 1889. With a towering height of 324 meters, the tower is made up of seven thousand tons of steel.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Eiffel was to receive all income from the commercial exploitation of the tower during the exhibition and for the next 20 years.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">From 1800 to 1938 the World’s Fair exhibitions were focused on trade, and were famous for the display of technological inventions and advancements and served as a platform for state-of-the-art advancement in science and technology from around the world were brought together.&nbsp;Which brings us to the second reason why the Eiffel tower was built.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><h2 data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Advancement in Technology</span></h2><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1381"><a data-dcnode-id="1382" data-rel="penci-gallery-image-content" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg"><picture data-dcnode-id="1383"><source data-dcnode-id="1387" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance.jpg.webp 1000w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-600x487.jpg.webp 600w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-300x243.jpg.webp 300w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-768x623.jpg.webp 768w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-585x474.jpg.webp 585w" sizes="(max-width: 1000px) 100vw, 1000px" srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance.jpg.webp 1000w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-600x487.jpg.webp 600w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-300x243.jpg.webp 300w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-768x623.jpg.webp 768w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Worlds-Fair-Entrance-585x474.jpg.webp 585w" type="image/webp"><img alt="World's Fair Entrance Eiffel Tower - Why was Eiffel Tower built?" class="alignleft wp-image-820 size-full webpexpress-processed entered lazyloaded" data-dcnode-id="1386" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg 1000w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-600x487.jpg 600w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-300x243.jpg 300w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-768x623.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-585x474.jpg 585w" data-ll-status="loaded" height="811" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg&amp;raw" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg 1000w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-600x487.jpg 600w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-300x243.jpg 300w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-768x623.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-585x474.jpg 585w" width="1000"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img class="alignleft wp-image-820 size-full webpexpress-processed" src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg" alt="World's Fair Entrance Eiffel Tower - Why was Eiffel Tower built?" width="1000" height="811" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance.jpg 1000w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-600x487.jpg 600w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-300x243.jpg 300w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-768x623.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Worlds-Fair-Entrance-585x474.jpg 585w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></picture></a></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">In 1885, after having obtained the rights to the design and before a design was chosen, Eiffel presented his plans to the&nbsp;Société des Ingénieurs Civils. Detailing the technical problems and emphasising the practical uses of the tower. In closing he stated that the tower would symbolise,</span></p><span data-dcnode-id="1377" instrument_node="">
</span><blockquote data-dcnode-id="1374"><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Not only the art of the modern engineer, but also the century of Industry and Science in which we are living, and for which the way was prepared by the great scientific movement of the eighteenth century and by the Revolution of 1789, to which this monument will be built as an expression of France’s gratitude. – Gustave Eiffel</span></p></blockquote><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Due to the great height of the Eiffel Tower, it was the perfect platform from which to conduct experiments involving temperature, pressure and radio telegraphy. Thus making it the obvious choice to support. The tower served as the main symbol and as an impressive entrance to the fair.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">During the first 20 years after its construction, Eiffel received all income from the commercial exploitation of the tower during the exhibition. After which time several people wanted it to be demolished and used for scrap metal purposes. Thankfully, it was saved by politicians and scientists who wanted to use it as a radio transmission tower, which is why the Eiffel Tower still stands today.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><h4 data-dcnode-id="1360"><a data-dcnode-id="1361" data-rel="penci-gallery-image-content" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower.jpg"><picture data-dcnode-id="1362"><source data-dcnode-id="1366" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Construction-of-Eiffel-Tower.jpg.webp 1000w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Construction-of-Eiffel-Tower-600x287.jpg.webp 600w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Construction-of-Eiffel-Tower-300x143.jpg.webp 300w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Construction-of-Eiffel-Tower-768x367.jpg.webp 768w, https://www.theintrepidguide.com/wp-content/webp-express/webp-images/uploads/2016/01/Construction-of-Eiffel-Tower-585x280.jpg.webp 585w" sizes="(max-width: 1000px) 100vw, 1000px" type="image/webp"><img alt="Construction of Eiffel Tower - Why was Eiffel Tower built?" class="alignleft wp-image-818 size-full webpexpress-processed" data-dcnode-id="1365" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower.jpg" data-lazy-srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower.jpg 1000w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-600x287.jpg 600w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-300x143.jpg 300w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-768x367.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-585x280.jpg 585w" height="478" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201000%20478'%3E%3C/svg%3E" width="1000"><noscript data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">&lt;img class="alignleft wp-image-818 size-full webpexpress-processed" src="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower.jpg" alt="Construction of Eiffel Tower - Why was Eiffel Tower built?" width="1000" height="478" srcset="https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower.jpg 1000w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-600x287.jpg 600w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-300x143.jpg 300w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-768x367.jpg 768w, https://www.theintrepidguide.com/wp-content/uploads/2016/01/Construction-of-Eiffel-Tower-585x280.jpg 585w" sizes="(max-width: 1000px) 100vw, 1000px"&gt;</span></noscript></picture></a></h4><span data-dcnode-id="1359" instrument_node="">
