</span><section class="postbody" data-dcnode-id="992"><span data-dcnode-id="1026" instrument_node="">
</span><div class="postbody-text" data-dcnode-id="996"><span data-dcnode-id="1025" instrument_node="">
                                      
            The Eiffel Tower, built in 1889, was a temporary structure.  It was supposed to last only 20 years before being demolished.  But Paris kept it, long, long past its design life.  Why has it been so durable?  Scientists are creating a detailed computer model of all of its components to try to answer that question:</span><br data-dcnode-id="1024"><br data-dcnode-id="1023"><blockquote data-dcnode-id="1006"><span data-dcnode-id="1022" instrument_node="">But creating the model for the Eiffel Tower presented a technical challenge of a completely new kind.</span><br data-dcnode-id="1021"><br data-dcnode-id="1020"><span data-dcnode-id="1019" instrument_node="">One thing was that the realisation that its materials -- puddle iron (iron that is super-heated, beaten by hand and then folded over) and rivets -- perform quite differently from modern-day steel, concrete and bolts.</span><br data-dcnode-id="1018"><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">"We had to start from scratch," said Roussin.</span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">Materials scientists carried out mechanical and chemical tests on samples of puddle iron to assess its resilience, and stress engineers revisited Eiffel's own drawings to calculate how the tower would perform under load from the natural elements.</span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">Outwardly simple, the geometry of the tower itself posed some mighty number-crunching problems.</span><br data-dcnode-id="1009"><br data-dcnode-id="1008"><span data-dcnode-id="1007" instrument_node="">The programme had to take into account a range of weather conditions on a latticework of 18,000 metal pieces and the tower's additions, calculating the load vertically, horizontally and in 3D: in all, the model has an astonishing million variables.</span></blockquote><br data-dcnode-id="1005"><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">They've already learned that the tower has shrunk five and a half inches due to settling.</span><br data-dcnode-id="1002"><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">http://www.google.com/hostednews/afp/article/ALeqM5jNYkE-s1Q0Uh9cDYKlYl106OE-nw?docId=CNG.7e25f7c5d89565fea10627f109f43804.311 via Popular Science | Photo by Flickr user </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.flickr.com/photos/terrazzo/" rel="nofollow"><span data-dcnode-id="999" instrument_node="">Terrazzo</span></a><span data-dcnode-id="997" instrument_node=""> used under Creative Commons license          </span></div><span data-dcnode-id="995" instrument_node="">

</span><div class="comm-body" data-dcnode-id="710"><span data-dcnode-id="716" instrument_node="">One very important thing is that engineers back then didn't build things with the 'just barely enough' attitude of today: Todays engineers use just barely enough materials with just enough strength to last just enough strains.</span><br data-dcnode-id="715"><span data-dcnode-id="714" instrument_node="">The old engineers couldn't make these ulta-fine calculations so they OVERBUILT with plenty of safety margins.</span><br data-dcnode-id="713"><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">That's why old stuff lasts while today's stuff falls apart.</span></div><span data-dcnode-id="709" instrument_node="">
