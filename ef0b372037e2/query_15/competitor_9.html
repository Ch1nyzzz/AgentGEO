</span><span data-dcnode-id="1725" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1722"><span data-dcnode-id="1724" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/travel/slideshow" data-amazontamsizes="[[728,90],[300,250]]" data-authors="chloe-pantazi,megan-willett" data-bi-ad="" data-dcnode-id="1723" data-force="" data-not-lazy="" data-pagetype="slideshow" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="design" data-subvertical="travel" data-tag="features,eiffel-tower,architecture,gustave-eiffel,paris,france,travel" data-tile-order="tile-1" data-type="ad" data-url="/eiffel-tower-facts-and-history-2017-3" id="gpt-slideshow-travel-desktop_in_post_ad-desktop-1"></div></div><ul data-dcnode-id="1712"><li data-dcnode-id="1719"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">The Eiffel Tower was completed on March 31, 1889.&nbsp;</span></strong></li><li data-dcnode-id="1716"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">This year, the iconic structure turns 129 years old.</span></strong></li><li data-dcnode-id="1713"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Most people don't know that&nbsp;many Parisians initially hated the Eiffel Tower, that its light show requires&nbsp;20,000 LED lights, or&nbsp;that Gustave Eiffel&nbsp;had a secret apartment on the third floor.</span></strong></li></ul><p data-dcnode-id="1709"><br data-dcnode-id="1711"><span data-dcnode-id="1710" instrument_node="">It's impossible to think of Paris without picturing the Eiffel Tower.</span></p><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">The world-famous&nbsp;attraction&nbsp;turns 128 years old on March 31, marking the date </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1706" data-uri="8113a555fc69debf94d4ef857e9ecf69" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.insider.com/eiffel-tower-construction-photos-history-2017-3" rel="noopener" target="_blank"><span data-dcnode-id="1707" instrument_node="">it was completed for the 1889 Exposition Universelle</span></a><span data-dcnode-id="1705" instrument_node=""> (World’s Fair) to honor the 100th anniversary of the French Revolution.</span></p><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The tower continues to make an impression today, drawing&nbsp;nearly&nbsp;seven&nbsp;million visitors from all over the world each year.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><span data-dcnode-id="1700" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1697"><span data-dcnode-id="1699" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/travel/slideshow" data-amazontamsizes="[[728,90],[300,250]]" data-authors="chloe-pantazi,megan-willett" data-bi-ad="" data-dcnode-id="1698" data-force="" data-pagetype="slideshow" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="design" data-subvertical="travel" data-tag="features,eiffel-tower,architecture,gustave-eiffel,paris,france,travel" data-tile-order="tile-2" data-type="ad" data-url="/eiffel-tower-facts-and-history-2017-3" id="gpt-slideshow-travel-desktop_in_post_ad-desktop-2"></div></div><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">In honor of the Eiffel Tower's&nbsp;upcoming birthday, here are some&nbsp;fascinating facts about the iconic iron structure.</span></p><span data-dcnode-id="1694" instrument_node="">

</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">The structure may be&nbsp;named after Gustave Eiffel, but it was actually his senior engineers, Maurice Koechlin and Emile Nouguier, who designed the building.&nbsp;Eiffel wasn't overly interested in the project, but sent the engineers to the head of his&nbsp;company’s architectural department, Stephen Sauvestre. With Sauvestre's edits, Eiffel got behind the final plans and bought the rights to the patent.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><div class="slide-options" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">

</span></div><span data-dcnode-id="1635" instrument_node="">
</span><div class="slide" data-dcnode-id="1595" data-e2e-name="slide-2" data-slide="" data-slide-anchor="#its-made-of-18038-pieces-of-wrought-iron-2" data-slide-number="2" data-slide-title="It's made of 18,038 pieces of wrought iron." id="its-made-of-18038-pieces-of-wrought-iron-2"><span data-dcnode-id="1634" instrument_node="">

</span></div><span data-dcnode-id="1627" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1605" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1626" instrument_node="">

</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">On May 6, 1889, fairgoers were allowed to enter the tower, but the 30,000 visitors had to climb 1,710 steps to reach the top. The lifts finally entered service on May 26.</span></p><span data-dcnode-id="1381" instrument_node="">

</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Newspapers received angry letters that said the tower didn’t fit into the feel of the city and there was a team of artists that rejected the plan from the get-go. One apocryphal story says that novelist Guy de Maupassant said he hated the tower, but ate lunch at its restaurant every day. When he was asked why, Maupassant replied that it was the only place in Paris where he couldn’t see it.</span></p><span data-dcnode-id="1340" instrument_node="">

</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">The tower attracts almost 7 million visitors every year, 75% of them from other countries.&nbsp;</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">Unsurprisingly, 15.8% of visitors — the majority, when divided&nbsp;by country — are from France, according to </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1244" data-uri="1a56ad3c51906608e9a8c6377a08d3b0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.toureiffel.paris/en/everything-about-the-tower/the-eiffel-tower-at-a-glance.html" target="_blank"><span data-dcnode-id="1245" instrument_node="">visitor statistics</span></a><span data-dcnode-id="1243" instrument_node="">. Outside of the country, Americans&nbsp;visit the most, making up&nbsp;11.9% of the tower's visitors, followed by British tourists (7.5%).</span></p><span data-dcnode-id="1241" instrument_node="">

</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">It transmitted radio signals during WWI and during WWII the elevator wires were cut so that the Nazis could not use the tower (after Allied troops entered the city, the elevators were fixed). It has even survived a fire on its top floor.</span></p><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">The tower continues to be affected by world conflicts. Following the November 2015 terror attacks in&nbsp;Paris, </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1195" data-uri="e4b46f97850254e67a3e92ccbc79220d" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.insider.com/eiffel-tower-to-get-bulletproof-glass-wall-to-protect-against-attacks-2017-2" target="_blank"><span data-dcnode-id="1196" instrument_node="">the fences surrounding the structure will be replaced with&nbsp;a bulletproof glass wall</span></a><span data-dcnode-id="1194" instrument_node=""> as a safety measure.</span></p><span data-dcnode-id="1192" instrument_node="">
