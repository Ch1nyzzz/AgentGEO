</span><p data-dcnode-id="1107"><span data-dcnode-id="1118" style="color: #ff0000;"><noscript data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">&lt;img class="alignnone size-full wp-image-20003" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture.jpg" alt="Art Deco Architecture" width="848" height="1263" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-688x1024.jpg 688w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-768x1144.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-336x500.jpg 336w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-150x223.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-750x1117.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Architecture" class="lazyload alignnone size-full wp-image-20003" data-dcnode-id="1119" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-688x1024.jpg 688w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-768x1144.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-336x500.jpg 336w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-150x223.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architecture-750x1117.jpg 750w" height="1263" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201263%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1108" style="font-size: 10pt;"><span data-dcnode-id="1117" instrument_node="">A photograph of the Chrysler Building, 2012;</span><em data-dcnode-id="1109"><span data-dcnode-id="1116" instrument_node="">&nbsp;</span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A500px_photo_%2844120344%29.jpeg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1115" instrument_node="">L Latumahina</span></a><span data-dcnode-id="1113" instrument_node="">, </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1112" instrument_node="">CC BY 3.0</span></a><span data-dcnode-id="1110" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Built in the Turtle Bay neighborhood on the East Side of Manhattan, the Chrysler Building is known for being one of the most striking skyscrapers in the city. This style of architecture proved to be incredibly popular and continued to be used well into the 1960s.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><blockquote data-dcnode-id="1098"><p data-dcnode-id="1099"><span data-dcnode-id="1100" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Completed in less than two years, it was said that approximately four floors were built each week, which was a surprisingly rapid fast for the types of machinery that was available at the time.</span></strong></span></p></blockquote><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Financed by Walter P. Chrysler, the building was designed to make reference to Chrysler automobiles. Van Alen’s original design used many modernist stylistic elements, such as curved windows at the corners. Two of the most recognizable aspects of the building include the famous gargoyles, as well as the seven arched crowns at the top of the tower.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><h3 data-dcnode-id="1088"><span data-dcnode-id="1089" id="Sonia_Delaunay_1885_1979"><span data-dcnode-id="1090" instrument_node="">Sonia Delaunay (1885 – 1979)</span></span></h3><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1086" instrument_node="">One of the few female artists who practiced in the Art Deco movement was the Russian-born French artist Sonia Delaunay. Co-founder of the Orphism art movement, Delaunay is said to have been included with other notable Art Deco designers who still hold a strong influence over various fashion trends today. Inspired by the Cubist and Fauvist movements, Delaunay worked closely with fellow </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/surrealist-artists/"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Surrealist</span></strong></a><span data-dcnode-id="1082" instrument_node=""> and Dada artists while perfecting her style. This led to her becoming the first designer to bring abstract inspiration into the realm of fashion.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1076" style="color: #ff0000;"><noscript data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&lt;img class="alignnone size-full wp-image-20008" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist.jpg" alt="Art Deco Period Artist" width="848" height="1238" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-205x300.jpg 205w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-701x1024.jpg 701w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-768x1121.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-21x30.jpg 21w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-51x75.jpg 51w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-75x110.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-110x160.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-342x500.jpg 342w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-68x100.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-137x200.jpg 137w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-610x891.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-150x219.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-750x1095.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Period Artist" class="lazyload alignnone size-full wp-image-20008" data-dcnode-id="1077" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-205x300.jpg 205w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-701x1024.jpg 701w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-768x1121.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-21x30.jpg 21w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-51x75.jpg 51w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-75x110.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-110x160.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-342x500.jpg 342w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-68x100.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-137x200.jpg 137w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-610x891.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-150x219.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-Artist-750x1095.jpg 750w" height="1238" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201238%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1070" style="font-size: 10pt;"><span data-dcnode-id="1075" instrument_node="">Sonia Delaunay wearing Casa Sonia creations, Madrid, c. 1918-1920;&nbsp;</span><em data-dcnode-id="1071"><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASonia_Delaunay_wearing_Casa_Sonia_creations%2C_Madrid%2C_c.1920.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1074" instrument_node="">Anonymous Unknown author, possibly by Zockoll</span></a><span data-dcnode-id="1072" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Delaunay was fascinated with the idea of geometric design, which proved to be modern and essentially fashionable between 1920 and 1930. As a textile designer, in addition to being a painter, Delaunay produced some of her most notable fashion pieces during this time. Color was a major aspect that featured in her works, which she defined as “dynamic art”.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><blockquote data-dcnode-id="1060"><p data-dcnode-id="1061"><span data-dcnode-id="1062" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Delaunay’s bold color and textile combinations led to her title of “designer of modern fashion” during the 1925 Exposition in Paris.</span></strong></span></p></blockquote><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1058" instrument_node="">Her most well-known garment is perhaps her patchwork dresses, which existed as experimentations of “simultanism”. </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/mixing-colors/"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Mixing a variety of colors</span></strong></a><span data-dcnode-id="1054" instrument_node=""> and materials, Delaunay made use of different bold blocks of color and loud geometric shapes, which made her dresses stand out. Her success in fashion is partly due to her liberation of the silhouette in female clothing after World War One, with her creations and art still influencing modern fashion houses like Christian Dior and Yves Saint Laurent today.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1049" instrument_node="">
</span><h3 data-dcnode-id="1046"><span data-dcnode-id="1047" id="Tamara_de_Lempicka_1898_1980"><span data-dcnode-id="1048" instrument_node="">Tamara de Lempicka (1898 – 1980)</span></span></h3><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1044" instrument_node="">Another very important female artist who produced artworks during the Art Deco period is </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/tamara-de-lempicka/"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Tamara de Lempicka</span></strong></a><span data-dcnode-id="1040" instrument_node="">. Possibly one of the most respected and recognizable artists to emerge from the Art Deco movement, Polish-born Lempicka was best known for her refined and trendy Art Deco depictions of the wealthy class and her incredibly stylized paintings of nudes. Settling in Paris after the Russian revolution, Lempicka became fascinated with the nonconformist Parisian lifestyle that existed in the 1920s.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><blockquote data-dcnode-id="1033"><p data-dcnode-id="1034"><span data-dcnode-id="1035" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Lempicka’s portraits brought her critical praise and significant wealth. Her style of painting perfectly depicted a lifestyle of luxury and glamour, with inspiration being taken from other movements like Cubism.</span></strong></span></p></blockquote><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Her unique approach to Art Deco painting allowed her to present works that were both extravagant yet clean and precise in nature. The boldness of Lempicka’s colors and her angular style referenced some of the main features of the Art Deco style, which has led to her works being seen as the best representation of Art Deco painting.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><div class="jeg_video_container jeg_video_content" data-dcnode-id="1027"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1028" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/GRktgRgMn9U%3Fstart%3D3%26feature%3Doembed&amp;raw" title="Tamara de Lempicka: The Life of an Artist - Art History School" width="500"></iframe></div><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">Among her iconic works include </span><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Young Lady with Gloves</span></em><span data-dcnode-id="1022" instrument_node="">, which was painted in 1930 and exists as one of her best-known works. Depicting a fashionably modest lady in a green dress, further emphasized by her subtly matching white hat and gloves, her vivid red lipstick makes her stand out despite her apparent timidness.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><blockquote data-dcnode-id="1015"><p data-dcnode-id="1016"><span data-dcnode-id="1017" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The sharp, almost fractured planes of color that were used to depict the facial features and the dress fabric exist as Lempicka’s signature style, which also demonstrates the interplay of Cubism and Art Deco on her artistic style.</span></strong></span></p></blockquote><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Today, Lempicka’s portraits and paintings are still greeted with the same amount of enthusiasm as they were before. While her artworks were originally intended for an elite audience, they have sparked debate across all classes of society and are favored by many. Lempicka was considered to be one of the most prominent portrait painters of her generation, with the clean lines and sleek elegance of her artworks existing as perfect examples of the Art Deco style.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1005" instrument_node="">
</span><h2 data-dcnode-id="1002"><span data-dcnode-id="1003" id="The_Legacy_Left_by_Art_Deco"><span data-dcnode-id="1004" instrument_node="">The Legacy Left by Art Deco</span></span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The same characteristics that made the Art Deco movement so popular in the beginning, such as its exquisite craftsmanship, rich materials, and ornamentation, eventually led to its decline. The Great Depression, which began in 1929 in the United States and reached Europe soon after, began to slowly foster a sense of deterioration in the art movement.</span></p><span data-dcnode-id="998" instrument_node="">
</span><blockquote data-dcnode-id="993"><p data-dcnode-id="994"><span data-dcnode-id="995" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">This devastating economic blow greatly reduced the number of affluent clients who could afford Art Deco furnishings and objects at the time, which led to the style quickly dwindling.</span></strong></span></p></blockquote><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">The emergence of World War Two seemed to signify Art Deco’s falling from grace. During the wartime years, the restraint of society caused the Art Deco style to seem even more decadent than it already appeared to be, which was ill-fitting in a time of history that was so solemn. The limited supply of metal that could be recovered was used in building military weapons and equipment instead of decorating buildings and interior spaces. In a society that was so grave at the time, objects like furniture were no longer seen as important status items.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="985" style="color: #ff0000;"><noscript data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">&lt;img class="alignnone size-full wp-image-20002" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior.jpg" alt="Art Deco Interior" width="848" height="662" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-300x234.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-768x600.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-75x59.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-110x86.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-160x125.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-500x390.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-50x39.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-100x78.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-200x156.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-610x476.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-150x117.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-750x585.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Interior" class="lazyload alignnone size-full wp-image-20002" data-dcnode-id="986" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-300x234.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-768x600.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-75x59.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-110x86.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-160x125.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-500x390.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-50x39.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-100x78.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-200x156.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-610x476.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-150x117.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Interior-750x585.jpg 750w" height="662" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20662%22%3E%3C/svg%3E" width="848"></span><span class="VIiyi" data-dcnode-id="977" lang="en" style="font-size: 10pt;"><span class="JLqJ4b ChMk0b" data-dcnode-id="979" data-language-for-alternatives="en" data-language-to-translate-into="fr" data-number-of-phrases="1" data-phrase-index="0"><span data-dcnode-id="984" instrument_node="">Art Deco-style French Embassy, Plate 22 (after a watercolor by R. Crevel): antechamber by Paul Follot, painted panels by René Crevel, 1925;&nbsp;</span><em data-dcnode-id="980"><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%284_B%29_Ren%25C3%25A9_Crevel._Antichambre_Ambassade_Fran%25C3%25A7aise.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="983" instrument_node="">René Crevel</span></a><span data-dcnode-id="981" instrument_node="">, CC0, via Wikimedia Commons</span></em></span><span data-dcnode-id="978" instrument_node=""> </span></span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Additionally, the crash of the stock market in 1929 redirected the Art Deco movement towards the concept of mass production. Several technological advancements allowed for more affordable production of basic consumer items, which drove out the need for and subsequent popularity of the existing Art Deco designers. By the early 1930s, Streamline Moderne developed in response to the Art Deco ideals within America, with this new style focusing on the simplification of designs in objects, furniture, and architecture.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Art Deco experienced a revitalization during the 1960s with the beginning of the consumerist culture. Since then, a steady and continued interest in the Art Deco movement can be seen in the various art styles and designs that have emerged, which all seem to carry hints of the streamlined aesthetic of Deco art. Despite Art Deco developing as a movement that aimed to escape the past, it has now become a sentimental and fond memory of a classical style that has proven to be inseparable from the past.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">&nbsp;</span></p><span data-dcnode-id="966" instrument_node="">
</span><blockquote data-dcnode-id="961"><p data-dcnode-id="962"><span data-dcnode-id="963" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">As an art style that still has implications today, the development of Art Deco design has truly been remarkable. Despite being popular almost a century ago, Art Deco was considered to be one of the first styles of modern architecture to really make an impact on the art world. Today, inspiration is still being taken from this quintessential style, which has allowed this decorative type of art to essentially come back into fashion again. No matter how much time has passed, Deco art’s striking geometric shapes will forever remain iconic.</span></strong></span></p></blockquote><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">&nbsp;</span></p><span data-dcnode-id="957" instrument_node="">
</span><div class="jeg_video_container jeg_video_content" data-dcnode-id="955"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="956" frameborder="0" height="281" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/OK2L5UiDWCs%3Fstart%3D4%26feature%3Doembed&amp;raw" title="The Story of Art Deco" width="500"></iframe></div><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">&nbsp;</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&nbsp;</span></p><span data-dcnode-id="948" instrument_node="">
</span><h2 data-dcnode-id="945"><span data-dcnode-id="946" id="Frequently_Asked_Questions"><span data-dcnode-id="947" instrument_node="">Frequently Asked Questions</span></span></h2><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">&nbsp;</span></p><span data-dcnode-id="941" instrument_node="">
</span><h3 data-dcnode-id="938"><span data-dcnode-id="939" id="What_Is_Art_Deco-2"><span data-dcnode-id="940" instrument_node="">What Is Art Deco?</span></span></h3><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Art Deco, which emerged onto the art scene in the early 1920s, was an art style defined by its fascination with modernity. This idea could be seen through the elements of vibrant colors and bold geometric patterns that were used, as the aim was to create lavish and truly opulent artworks. Art Deco is also most famously known for its contribution to architecture.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">&nbsp;</span></p><span data-dcnode-id="931" instrument_node="">
</span><h3 data-dcnode-id="928"><span data-dcnode-id="929" id="What_Are_the_Main_Characteristics_of_the_Art_Deco_Style"><span data-dcnode-id="930" instrument_node="">What Are the Main Characteristics of the Art Deco Style?</span></span></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">The main characteristic of the Art Deco style was its pure admiration for the concept of modernity, as well as its respect for the advancement of machinery and technology. Elements that were able to emphasize simplicity, repetition, and symmetry were frequently used, which allowed Art Deco artworks to appear with a clean and streamlined aesthetic.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
</span><h3 data-dcnode-id="918"><span data-dcnode-id="919" id="What_Are_Some_of_the_Most_Iconic_Art_Deco_Pieces_Made"><span data-dcnode-id="920" instrument_node="">What Are Some of the Most Iconic Art Deco Pieces Made?</span></span></h3><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Art Deco architecture has proven to be the most significant genre of the style, as it has produced some of the most well-known modern buildings to date. These include Rockefeller Centre, the Empire State Building, and the absolutely breathtaking Chrysler Building, all built in New York City.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">&nbsp;</span></p><span data-dcnode-id="911" instrument_node="">
