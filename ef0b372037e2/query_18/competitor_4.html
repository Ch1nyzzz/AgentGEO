</span><div class="content-inner" data-dcnode-id="908"><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2135"><strong data-dcnode-id="2136"><span class="dropcap" data-dcnode-id="2138" style="background-color: #ffffff; color: #db9957; border-color: #ffffff; font-size: 36pt;"><span data-dcnode-id="2139" instrument_node="">A</span></span><span data-dcnode-id="2137" instrument_node="">rt Deco was an art movement that was initially unveiled at an exhibition held in Paris in 1925. While it reached the height of popularity during the 1920s, 1930s, and 1940s, Art Deco was actually a movement that had been in development for more than a decade prior to its announcement. Seen as a very decorative art style, Art Deco artists soon experimented with the genres of design, painting, furniture, architecture, and building within its stylistic realm.</span></strong></p><span data-dcnode-id="2134" instrument_node="">

ment_node=""> Key Accomplishments of Art Deco</span></a><ul data-dcnode-id="2064"><li data-dcnode-id="2065"><a data-dcnode-id="2066" href="#Art_Deco_in_America"><span class="toc_number toc_depth_2" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">5.1</span></span><span data-dcnode-id="2067" instrument_node=""> Art Deco in America</span></a></li></ul></li><li data-dcnode-id="2058"><a data-dcnode-id="2059" href="#Late_Art_Deco"><span class="toc_number toc_depth_1" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">6</span></span><span data-dcnode-id="2060" instrument_node=""> Late Art Deco</span></a></li><li data-dcnode-id="2027"><a data-dcnode-id="2054" href="#Notable_Art_Deco_Artists"><span class="toc_number toc_depth_1" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">7</span></span><span data-dcnode-id="2055" instrument_node=""> Notable Art Deco Artists</span></a><ul data-dcnode-id="2028"><li data-dcnode-id="2049"><a data-dcnode-id="2050" href="#Rene_Lalique_1860_1945"><span class="toc_number toc_depth_2" data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">7.1</span></span><span data-dcnode-id="2051" instrument_node=""> René Lalique (1860 – 1945)</span></a></li><li data-dcnode-id="2044"><a data-dcnode-id="2045" href="#Emile-Jacques_Ruhlmann_1879_1933"><span class="toc_number toc_depth_2" data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">7.2</span></span><span data-dcnode-id="2046" instrument_node=""> Émile-Jacques Ruhlmann (1879 – 1933)</span></a></li><li data-dcnode-id="2039"><a data-dcnode-id="2040" href="#William_Van_Alen_1883_1954"><span class="toc_number toc_depth_2" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">7.3</span></span><span data-dcnode-id="2041" instrument_node=""> William Van Alen (1883 – 1954)</span></a></li><li data-dcnode-id="2034"><a data-dcnode-id="2035" href="#Sonia_Delaunay_1885_1979"><span class="toc_number toc_depth_2" data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">7.4</span></span><span data-dcnode-id="2036" instrument_node=""> Sonia Delaunay (1885 – 1979)</span></a></li><li data-dcnode-id="2029"><a data-dcnode-id="2030" href="#Tamara_de_Lempicka_1898_1980"><span class="toc_number toc_depth_2" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">7.5</span></span><span data-dcnode-id="2031" instrument_node=""> Tamara de Lempicka (1898 – 1980)</span></a></li></ul></li><li data-dcnode-id="2022"><a data-dcnode-id="2023" href="#The_Legacy_Left_by_Art_Deco"><span class="toc_number toc_depth_1" data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">8</span></span><span data-dcnode-id="2024" instrument_node=""> The Legacy Left by Art Deco</span></a></li><li data-dcnode-id="2001"><a data-dcnode-id="2018" href="#Frequently_Asked_Questions"><span class="toc_number toc_depth_1" data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">9</span></span><span data-dcnode-id="2019" instrument_node=""> Frequently Asked Questions</span></a><ul data-dcnode-id="2002"><li data-dcnode-id="2013"><a data-dcnode-id="2014" href="#What_Is_Art_Deco-2"><span class="toc_number toc_depth_2" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">9.1</span></span><span data-dcnode-id="2015" instrument_node=""> What Is Art Deco?</span></a></li><li data-dcnode-id="2008"><a data-dcnode-id="2009" href="#What_Are_the_Main_Characteristics_of_the_Art_Deco_Style"><span class="toc_number toc_depth_2" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">9.2</span></span><span data-dcnode-id="2010" instrument_node=""> What Are the Main Characteristics of the Art Deco Style?</span></a></li><li data-dcnode-id="2003"><a data-dcnode-id="2004" href="#What_Are_Some_of_the_Most_Iconic_Art_Deco_Pieces_Made"><span class="toc_number toc_depth_2" data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">9.3</span></span><span data-dcnode-id="2005" instrument_node=""> What Are Some of the Most Iconic Art Deco Pieces Made?</span></a></li></ul></li></ul></div><span data-dcnode-id="1998" instrument_node="">

</span><h2 data-dcnode-id="1989"><span data-dcnode-id="1990" id="What_Is_Art_Deco"><span data-dcnode-id="1991" instrument_node="">What Is Art Deco?</span></span></h2><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Sometimes referred to as simply “Deco”, Art Deco was an art style that was characterized by vivid colors and daring geometry that led to extremely luxurious and detailed artworks. As a visual arts style that incorporated both elements of architecture and design, Art Deco first appeared in France just before the start of World War One. However, this movement was only announced to the public in 1925 at the Exposition Internationale des Arts Décoratifs et Industriels Modernes, which was loosely based around the concept of the World’s Fair.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1981" style="color: #ff0000;"><noscript data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">&lt;img class="alignnone size-full wp-image-20007" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition.jpg" alt="Art Deco Exhibition" width="848" height="509" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-300x180.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-768x461.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-30x18.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-75x45.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-110x66.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-160x96.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-500x300.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-50x30.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-100x60.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-200x120.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-610x366.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-150x90.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-750x450.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Exhibition" class="lazyload alignnone size-full wp-image-20007" data-dcnode-id="1982" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-300x180.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-768x461.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-30x18.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-75x45.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-110x66.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-160x96.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-500x300.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-50x30.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-100x60.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-200x120.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-610x366.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-150x90.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Exhibition-750x450.jpg 750w" height="509" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20509%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1972" style="font-size: 10pt;"><span data-dcnode-id="1980" instrument_node="">Postcard of the overview of the 1925 Exposition of Decorative and Industrial Arts;&nbsp;</span><em data-dcnode-id="1973"><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3APostcard_of_Exposition_des_Art_Decoratifs_et_Industriels_Modernes.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1979" instrument_node="">SiefkinDR</span></a><span data-dcnode-id="1977" instrument_node="">, </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1976" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1974" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Art Decorates, as it was sometimes known, went on to influence the design of furniture, jewelry, fashion, cars, theatres, trains, and even buildings. Everyday objects, such as vacuum cleaners and radios, were not immune to the impact made by Art Deco and incorporated tell-tale characteristics of the iconic style.</span></p><span data-dcnode-id="1967" instrument_node="">
</span><blockquote data-dcnode-id="1962"><p data-dcnode-id="1963"><span data-dcnode-id="1964" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">As it worked to integrate advanced styles with exceptional artistry and decadent materials, Art Deco went on to represent opulence, elegance, vitality, and trust in the social and technological progress that occurred in its prime.</span></strong></span></p></blockquote><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1960" instrument_node="">From the outset, Art Deco proved to be influenced by the bold geometric forms made famous by the Cubism movement, as well as the bright colors used within </span><a data-dcnode-id="1957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/fauvism/"><strong data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Fauvism</span></strong></a><span data-dcnode-id="1956" instrument_node="">. Bringing with it a great sense of order, the Art Deco style presented proportionate and balanced designs in lush and cheerful shapes. Art Deco design managed to find its way into many early 20th-century design forms, with the movement experimenting with elements of fine art, architecture, fashion, furniture, forms of transport, and even ordinary appliances.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1950" style="color: #ff0000;"><noscript data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">&lt;img class="alignnone size-full wp-image-20016" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period.jpg" alt="Art Deco Period" width="848" height="531" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-300x188.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-768x481.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-30x19.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-75x47.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-110x69.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-160x100.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-500x313.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-50x31.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-100x63.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-200x125.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-610x382.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-150x94.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-750x470.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Period" class="lazyload alignnone size-full wp-image-20016" data-dcnode-id="1951" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-300x188.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-768x481.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-30x19.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-75x47.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-110x69.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-160x100.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-500x313.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-50x31.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-100x63.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-200x125.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-610x382.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-150x94.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Period-750x470.jpg 750w" height="531" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20531%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1941" style="font-size: 10pt;"><span data-dcnode-id="1949" instrument_node="">Hall of Mirrors in Carew Tower;&nbsp;</span><em data-dcnode-id="1942"><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AHall_of_Mirrors_in_Carew_Tower.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1948" instrument_node="">Laura Mckenzie Waters</span></a><span data-dcnode-id="1946" instrument_node="">, </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1945" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1943" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1938" instrument_node="">As an </span><strong data-dcnode-id="1935"><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/art-periods/"><span data-dcnode-id="1937" instrument_node="">art movement</span></a></strong><span data-dcnode-id="1934" instrument_node="">, the features that defined Art Deco were easily identifiable. Deco art was typically recognized as a hodgepodge of different styles and seen as an eclectic amalgamation of various influences, materials, and shapes. Due to this, it can be hard to differentiate the Art Deco style from other similar schools of art like Art Nouveau, Art Moderne, the Bauhaus school, or the Arts and Craft movement.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><blockquote data-dcnode-id="1927"><p data-dcnode-id="1928"><span data-dcnode-id="1929" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Despite that, the Art Deco period was an incredibly influential one, with its decorative manner going on to inspire a variety of other artistic styles.</span></strong></span></p></blockquote><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1920" instrument_node="">
</span><h2 data-dcnode-id="1917"><span data-dcnode-id="1918" id="A_History_of_the_Art_Deco_Movement"><span data-dcnode-id="1919" instrument_node="">A History of the Art Deco Movement</span></span></h2><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1915" instrument_node="">Towards the end of the 19</span><sup data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">th</span></sup><span data-dcnode-id="1912" instrument_node=""> century, many </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/famous-french-painters/"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">French artists</span></strong></a><span data-dcnode-id="1908" instrument_node="">, architects, and designers who were instrumental in the development of Art Nouveau noticed that the movement had become very outdated. With the 20</span><sup data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">th</span></sup><span data-dcnode-id="1905" instrument_node=""> century close approaching, and the effects of the Industrial Revolution coming into play, creatives were inspired to produce a style of art that would scream “tasteful and modern” from the rooftops. The Art Deco period was determined to restore France’s reputation as the first-class creator of decorative arts once again.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><blockquote data-dcnode-id="1898"><p data-dcnode-id="1899"><span data-dcnode-id="1900" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">The establishment of the Salon or Société des artistes décorateurs in France, who designed furniture, interiors, and art, helped raise the respect for art objects.</span></strong></span></p></blockquote><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1893" style="color: #ff0000;"><noscript data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">&lt;img class="alignnone size-full wp-image-20022" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design.jpg" alt="Art Deco Design" width="848" height="806" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-300x285.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-768x730.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-30x30.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-75x71.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-110x105.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-160x152.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-500x475.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-50x48.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-100x95.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-200x190.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-610x580.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-150x143.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-750x713.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Design" class="lazyload alignnone size-full wp-image-20022" data-dcnode-id="1894" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-300x285.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-768x730.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-30x30.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-75x71.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-110x105.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-160x152.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-500x475.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-50x48.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-100x95.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-200x190.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-610x580.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-150x143.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-750x713.jpg 750w" height="806" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20806%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1883" style="font-size: 10pt;"><span data-dcnode-id="1892" instrument_node="">Logo of the Société des artistes décorateurs (SAD), designed by Gustave Miklos, 1930;</span><em data-dcnode-id="1884"><span data-dcnode-id="1891" instrument_node="">&nbsp;</span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALogo_SAD_1930_Soci%25C3%25A9t%25C3%25A9_des_artistes_d%25C3%25A9corateurs.JPG" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1890" instrument_node="">Pierre gencey</span></a><span data-dcnode-id="1888" instrument_node="">, </span><a data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1887" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="1885" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">This society helped to slowly expand the definition of art beyond painting and sculpture into other domains that had not been considered before, such as glassware and jewelry. Eventually, those who created Art Deco works that were not considered to be “fine art” before were suddenly viewed as artists instead of mere artisans.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><blockquote data-dcnode-id="1873"><p data-dcnode-id="1874"><span data-dcnode-id="1875" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">The polished and streamlined style that was Art Deco grew out of a longing and assertive desire to be free of the past and to welcome the future in all of its manufactured and machine-driven brilliance.</span></strong></span></p></blockquote><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">The prominence of the Art Deco era rose and fell in between the two World Wars, with the style playing an important role in molding the West’s modern vision. This was particularly noticeable in France and the United States, where the influence of the Art Deco style could be seen in the types of architecture that were used.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">While Art Deco emphasized the features of speed, power, and progression, its artworks were contrasted with the lighter and more delicate elements of the previous Art Nouveau movement to create a truly unique style. Art Nouveau, which was a predominant style before the First World War, was heavily inspired by the natural world and incorporated things like winding vines, flower petals, and flowy waves in the artworks created. This celebration of organic shapes differed greatly from the clean and geometric style of Art Deco.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1862" style="color: #ff0000;"><noscript data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">&lt;img class="alignnone size-full wp-image-20025" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting.jpg" alt="Art Deco Style Painting" width="848" height="499" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-300x177.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-768x452.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-30x18.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-75x44.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-110x65.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-160x94.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-500x294.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-50x29.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-100x59.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-200x118.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-610x359.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-150x88.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-750x441.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Style Painting" class="lazyload alignnone size-full wp-image-20025" data-dcnode-id="1863" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-300x177.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-768x452.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-30x18.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-75x44.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-110x65.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-160x94.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-500x294.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-50x29.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-100x59.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-200x118.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-610x359.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-150x88.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Painting-750x441.jpg 750w" height="499" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20499%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1856" style="font-size: 10pt;"><span data-dcnode-id="1861" instrument_node="">An early Art Deco-style painting by René Crevel, 1915;&nbsp;</span><em data-dcnode-id="1857"><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARen%25C3%25A9_Crevel_D%25C3%25A9cor_de_trumeau.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1860" instrument_node="">René Crevel</span></a><span data-dcnode-id="1858" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1853" instrument_node="">Seen as quite a structured style, Art Deco took on a very Gatsby-esque self-indulgence based on the types of works created. Adopting features from F. Scott Fitzgerald’s iconic novel, </span><em data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">The Great Gatsby</span></em><span data-dcnode-id="1850" instrument_node="">, the Art Deco style celebrated the flamboyance, frivolity, and decadence that emerged during the 1920s in America. Just as the characters within Fitzgerald’s book were fixated with the glitz and glamour that was synonymous with the lifestyle at the time, Art Deco celebrated everything that was considered to be luxurious and forward-thinking.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><blockquote data-dcnode-id="1843"><p data-dcnode-id="1844"><span data-dcnode-id="1845" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">As an art style, Art Deco was considered to be one of the most exciting eras of design.</span></strong></span></p></blockquote><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1841" instrument_node="">It latched onto the flourishing post-war America with its new inventions that were available to even the average person, which led consumer tastes for luxury to go through the roof. As a result, the Art Deco style was forced to quickly develop to reflect this intoxicating sense of progress. Art Deco also evolved alongside other </span><strong data-dcnode-id="1837"><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/avant-garde-art/"><span data-dcnode-id="1840" instrument_node="">avant-garde movements</span></a><span data-dcnode-id="1838" instrument_node=""> </span></strong><span data-dcnode-id="1836" instrument_node="">and aspects of culture at the time, which resulted in a blend of art, design, fashion, and performance.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1823"><span data-dcnode-id="1830" style="color: #ff0000;"><noscript data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">&lt;img class="alignnone size-full wp-image-20001" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster.jpg" alt="Art Deco Style Poster" width="848" height="1264" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-687x1024.jpg 687w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-768x1145.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-335x500.jpg 335w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-150x224.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-750x1118.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Style Poster" class="lazyload alignnone size-full wp-image-20001" data-dcnode-id="1831" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-687x1024.jpg 687w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-768x1145.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-335x500.jpg 335w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-150x224.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Poster-750x1118.jpg 750w" height="1264" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201264%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1824" style="font-size: 10pt;"><span data-dcnode-id="1829" instrument_node="">Art Deco-style Masked Ball poster by René Crevel, 1924;&nbsp;</span><em data-dcnode-id="1825"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%283_H%29_Ren%25C3%25A9_Crevel._Affiche_bal_masqu%25C3%25A9.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1828" instrument_node="">René Crevel</span></a><span data-dcnode-id="1826" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">During the Great Depression in the 1930s, Deco art became more subdued as popular taste shifted towards less ostentatious forms that included materials like stainless steel, chrome plating, and plastic. However, the style quickly went out of fashion during World War Two.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><blockquote data-dcnode-id="1814"><p data-dcnode-id="1815"><span data-dcnode-id="1816" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">During the 1960s, a restored fascination in Art Deco design was fostered and as of today, Art Deco continues to be a key motivation in areas of decorative art, fashion, and even jewelry design.</span></strong></span></p></blockquote><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Representing modernism that was turned into fashion, Art Deco exists as one of the first truly international styles. The purpose behind the artworks was to create a stylish and anti-traditional form of refinement that represented wealth and sophistication. Art Deco marked a time of newly discovered optimism after World War One and oriented itself towards the future and contemporary notions of progress.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1807" instrument_node="">
</span><h3 data-dcnode-id="1804"><span data-dcnode-id="1805" id="The_Society_of_Decorative_Artists_1901_2000s"><span data-dcnode-id="1806" instrument_node="">The Society of Decorative Artists (1901 – 2000s)</span></span></h3><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Art Deco reached its peak in 1925 when the French government promoted the Exposition internationale des arts décoratifs et industriels modernes. The only real requirement to exhibit at this fair was that all artworks needed to be “thoroughly modern”, which demonstrated the focus of the movement. The exhibition proved to be incredibly popular and was widely visited, which helped to firmly establish Art Deco in art history. The show also prompted the official name of the movement, Arts Decorates.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1796" style="color: #ff0000;"><noscript data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">&lt;img class="alignnone size-full wp-image-20011" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era.jpg" alt="Art Deco Era" width="848" height="1318" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-193x300.jpg 193w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-659x1024.jpg 659w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-768x1194.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-48x75.jpg 48w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-71x110.jpg 71w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-103x160.jpg 103w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-322x500.jpg 322w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-32x50.jpg 32w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-64x100.jpg 64w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-129x200.jpg 129w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-610x948.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-150x233.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-750x1166.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Era" class="lazyload alignnone size-full wp-image-20011" data-dcnode-id="1797" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-193x300.jpg 193w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-659x1024.jpg 659w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-768x1194.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-48x75.jpg 48w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-71x110.jpg 71w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-103x160.jpg 103w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-322x500.jpg 322w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-32x50.jpg 32w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-64x100.jpg 64w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-129x200.jpg 129w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-610x948.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-150x233.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Era-750x1166.jpg 750w" height="1318" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201318%22%3E%3C/svg%3E" width="848"></span><span class="VIiyi" data-dcnode-id="1786" lang="en"><span class="JLqJ4b ChMk0b" data-dcnode-id="1787" data-language-for-alternatives="en" data-language-to-translate-into="nl" data-number-of-phrases="38" data-phrase-index="4"><span data-dcnode-id="1794" style="font-size: 10pt;"><span data-dcnode-id="1795" instrument_node="">Postcard of the Eiffel Tower at night with the word “Citroën” in the illuminated letters, Exposition des Arts Décoratifs, 1925;</span></span><span data-dcnode-id="1788" style="font-size: 10pt;"><span data-dcnode-id="1793" instrument_node=""> </span><em data-dcnode-id="1789"><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AEiffeltoren_bij_nacht_met_het_woord_%27Citro%25C3%25ABn%27_in_de_verlichte_letters_Exposition_des_Arts_D%25C3%25A9coratifs_La_Tour_Eiffel_vue_de_nuit_%28titel_op_object%29%2C_RP-F-2012-96-168.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1792" instrument_node="">Rijksmuseum</span></a><span data-dcnode-id="1790" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></span></span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">This society was made up of famous figures in the art world, like Art Nouveau designer and printmaker Eugene Grasset, and Art Nouveau architect Hector Grimard. Other budding decorative artists and designers also joined this group and helped with the development of its style. The French government proved to be incredibly supportive of this style of art and helped encourage the growth of this artistic activity.</span></p><span data-dcnode-id="1781" instrument_node="">
</span><blockquote data-dcnode-id="1776"><p data-dcnode-id="1777"><span data-dcnode-id="1778" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">One of the major goals of this group was to contest the hierarchical organization of the visual arts that demoted decorative artists to an inferior status when compared to the more traditional painting and sculpting forms.</span></strong></span></p></blockquote><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">This was because the Art Deco style was treated as the “Cinderella” of the art world – supposedly inadequate in comparison to the other forms of art that existed. Based on this, the purpose of the exposition was to introduce the new type of decorative art that had formed but was postponed for several reasons until 1925.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1769" instrument_node="">
</span><h3 data-dcnode-id="1766"><span data-dcnode-id="1767" id="The_Exhibition_That_Formally_Initiated_the_Start_of_the_Art_Deco_Movement"><span data-dcnode-id="1768" instrument_node="">The Exhibition That Formally Initiated the Start of the Art Deco Movement</span></span></h3><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">The French government, which hosted the Exposition International des Arts Decorates et Industrials Moderns were seen as responsible for introducing the Art Deco style into the art world. More than 15,000 artists, architects, and designers went on to present their works at this exhibition that ran for seven months, with over 16 million people from around the world coming to view the individual exhibits. Therefore, this exhibition was regarded as the catalyst that launched the beginning of the Art Deco movement.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1758" style="color: #ff0000;"><noscript data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">&lt;img class="alignnone size-full wp-image-20006" src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition.jpg" alt="Famous Art Deco Exhibition" width="848" height="546" srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-300x193.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-768x494.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-30x19.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-75x48.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-110x71.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-160x103.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-500x322.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-50x32.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-100x64.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-200x129.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-610x393.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-150x97.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-750x483.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Famous Art Deco Exhibition" class="lazyload alignnone size-full wp-image-20006" data-dcnode-id="1759" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-300x193.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-768x494.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-30x19.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-75x48.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-110x71.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-160x103.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-500x322.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-50x32.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-100x64.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-200x129.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-610x393.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-150x97.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Exhibition-750x483.jpg 750w" height="546" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20546%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1752" style="font-size: 10pt;"><span data-dcnode-id="1757" instrument_node="">Postcard of the general or principal view of the Exposition Internationale des Arts Décoratifs et Industriels Modernes, Paris, 1925;&nbsp;</span><em data-dcnode-id="1753"><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AParis-FR-75-Expo_1925_Arts_d%25C3%25A9coratifs-vue_g%25C3%25A9n%25C3%25A9rale.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1756" instrument_node="">Unknown author Unknown author</span></a><span data-dcnode-id="1754" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1744" instrument_node="">
</span><h2 data-dcnode-id="1741"><span data-dcnode-id="1742" id="An_Appropriate_Art_Deco_Definition"><span data-dcnode-id="1743" instrument_node="">An Appropriate Art Deco Definition</span></span></h2><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">When talking about a suitable Art Deco definition, the fact that it was one of the most influential and decorative styles from the beginning of the 20</span><sup data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">th</span></sup><span data-dcnode-id="1736" instrument_node=""> century is usually included in the interpretation. Taking its name from the International Exhibition of Modern Decorative and Industrial Arts, the term “arts decorates” was first used in France in 1858 before the iconic label of “Art Deco” was decided on. Once the movement had a name, it quickly gained acceptance around the world.&nbsp;</span></p><span data-dcnode-id="1734" instrument_node="">
</span><blockquote data-dcnode-id="1729"><p data-dcnode-id="1730"><span data-dcnode-id="1731" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">At first, the term “Art Deco” was used in a disdainful way by the modernist architect Le Corbusier.</span></strong></span></p></blockquote><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1724" style="color: #ff0000;"><noscript data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">&lt;img class="alignnone size-full wp-image-20021" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist.jpg" alt="Art Deco Style Artist" width="848" height="1136" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-224x300.jpg 224w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-764x1024.jpg 764w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-768x1029.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-22x30.jpg 22w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-56x75.jpg 56w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-82x110.jpg 82w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-119x160.jpg 119w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-373x500.jpg 373w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-37x50.jpg 37w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-75x100.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-149x200.jpg 149w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-610x817.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-150x201.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-750x1005.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Style Artist" class="lazyload alignnone size-full wp-image-20021" data-dcnode-id="1725" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-224x300.jpg 224w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-764x1024.jpg 764w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-768x1029.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-22x30.jpg 22w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-56x75.jpg 56w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-82x110.jpg 82w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-119x160.jpg 119w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-373x500.jpg 373w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-37x50.jpg 37w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-75x100.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-149x200.jpg 149w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-610x817.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-150x201.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Artist-750x1005.jpg 750w" height="1136" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201136%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1718" style="font-size: 10pt;"><span data-dcnode-id="1723" instrument_node="">Le Corbusier, 1964;&nbsp;</span><em data-dcnode-id="1719"><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALe_Corbusier_%281964%29_Stedelijk_Museum_Sikkensprijzen_916-9288_%28cropped%29.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1722" instrument_node="">Joop van Bilsen / Anefo</span></a><span data-dcnode-id="1720" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">The name was used in articles where he mocked the style for its embellishment, which was a feature that Le Corbusier considered to be useless in modern architecture. While supporters of the Art Deco style praised it for its stripped-down approach, its name was still met with much scorn. Only in the late 1960s, when a greater interest was starting to be paid towards the style, was the Art Deco definition restored.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1712" instrument_node="">The Art Deco definition was used in a positive way for the first time by British critic and art historian, Bevis Hillier. His definitive use of the term “Art Deco” in his first book, </span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Art Deco of the 20s and 30s</span></em><span data-dcnode-id="1709" instrument_node="">, properly cemented the name into art history.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><blockquote data-dcnode-id="1702"><p data-dcnode-id="1703"><span data-dcnode-id="1704" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Based on this, the Art Deco definition described the movement as one that was made up of bold geometric shapes and strong colors that were used in a variety of art forms, most notably in architecture and objects.</span></strong></span></p></blockquote><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h2 data-dcnode-id="1692"><span data-dcnode-id="1693" id="Different_Forms_of_Art_Deco_Art"><span data-dcnode-id="1694" instrument_node="">Different Forms of Art Deco Art</span></span></h2><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">The Art Deco period was characterized by harmonious, clean, geometric, sleek, usually uncomplicated, and visually pleasing artworks. The style’s main visual features derived from repetitive use of linear shapes that frequently included triangular, trapezoidal, zigzag, and chevron-patterned forms. Similar to the precursor movement of Art Nouveau, objects like humans, animals, or even flowers were rendered in a highly stylized and streamlined way in order to maintain the general aesthetic of Art Deco.</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1684" style="color: #ff0000;"><noscript data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">&lt;img class="alignnone size-full wp-image-20014" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition.jpg" alt="Art Deco Definition" width="848" height="898" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-283x300.jpg 283w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-768x813.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-28x30.jpg 28w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-71x75.jpg 71w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-104x110.jpg 104w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-151x160.jpg 151w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-472x500.jpg 472w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-47x50.jpg 47w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-94x100.jpg 94w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-189x200.jpg 189w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-610x646.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-150x159.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-750x794.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Definition" class="lazyload alignnone size-full wp-image-20014" data-dcnode-id="1685" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-283x300.jpg 283w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-768x813.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-28x30.jpg 28w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-71x75.jpg 71w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-104x110.jpg 104w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-151x160.jpg 151w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-472x500.jpg 472w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-47x50.jpg 47w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-94x100.jpg 94w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-189x200.jpg 189w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-610x646.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-150x159.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Definition-750x794.jpg 750w" height="898" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20898%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1672" style="font-size: 10pt;"><span data-dcnode-id="1683" instrument_node="">Art Deco-style painting, </span><em data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Black Panther in the Bamboo</span></em><span data-dcnode-id="1680" instrument_node=""> (1926) by Gaston Suisse;&nbsp;</span><em data-dcnode-id="1673"><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGaston_Suisse._Panth%25C3%25A8re_noire_dans_les_bambous._1926.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1679" instrument_node="">Dominique Suisse</span></a><span data-dcnode-id="1677" instrument_node="">, </span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1676" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1674" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">In order to keep up with the style’s emphasis on modern technology, Art Deco artists joined natural materials with modern and man-made ones like synthetic plastic, glass, reinforced concrete, and stainless steel. However, when a splash of sophistication was needed from Art Deco artworks, designers worked to incorporate more unusual materials into their works to give off a wealthier feel, such as ivory, horn, and even zebra skin.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><blockquote data-dcnode-id="1662"><p data-dcnode-id="1663"><span data-dcnode-id="1664" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Based on this style, the Art Deco movement was less connected to the traditional supposedly superior forms of art that were made up of painting and sculpture.</span></strong></span></p></blockquote><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">As Art Deco design was influenced by industrialization and the technical advancements in society, artworks displayed approval for the modernity of the machine and the innate design qualities of machine-made objects. This led to Art Deco primarily being experimented within design, furniture, architecture, and buildings.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1655" instrument_node="">
</span><h3 data-dcnode-id="1652"><span data-dcnode-id="1653" id="Art_Deco_Design"><span data-dcnode-id="1654" instrument_node="">Art Deco Design</span></span></h3><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1650" instrument_node="">When it first appeared, the Art Deco style wielded its impact all over the graphic art of the time. This was done in such a way that the impact of Italian </span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/futurism/"><strong data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Futurism</span></strong></a><span data-dcnode-id="1646" instrument_node=""> was revealed, as the style’s passion for speed and its devotion to the machine could be seen in the works produced.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><blockquote data-dcnode-id="1639"><p data-dcnode-id="1640"><span data-dcnode-id="1641" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">The use of lines to denote movement, made famous by Futurist artists, was used by Art Deco creatives in the form of parallel lines and narrowing forms to indicate the concept of balance and streamlining.</span></strong></span></p></blockquote><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1634" style="color: #ff0000;"><noscript data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">&lt;img class="alignnone size-full wp-image-20027" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style.jpg" alt="Art Deco Style" width="848" height="1272" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-200x300.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-683x1024.jpg 683w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-768x1152.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-73x110.jpg 73w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-333x500.jpg 333w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-133x200.jpg 133w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-610x915.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-150x225.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-750x1125.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Style" class="lazyload alignnone size-full wp-image-20027" data-dcnode-id="1635" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-200x300.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-683x1024.jpg 683w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-768x1152.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-73x110.jpg 73w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-333x500.jpg 333w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-133x200.jpg 133w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-610x915.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-150x225.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-750x1125.jpg 750w" height="1272" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201272%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1628" style="font-size: 10pt;"><span data-dcnode-id="1633" instrument_node="">Art Deco-style fictional Mars tourism poster commissioned by SpaceX. This poster advertises for Olympus Mons, 2015;&nbsp;</span><em data-dcnode-id="1629"><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASpaceX_Mars_tourism_poster_for_Olympus_Mons.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1632" instrument_node="">SpaceX</span></a><span data-dcnode-id="1630" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Art Deco design went on to feature many aspects that implied motion during the mid-1930s, as movement demonstrated an influence from advanced aerodynamic standards that were developed for aviation and ballistics to diminish aerodynamic drag at high velocities. Shapes that helped to signify motion were then used in many different Art Deco designs and even featured in objects that were genuinely not intended to ever move, such as refrigerators and buildings.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1619" style="color: #ff0000;"><noscript data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">&lt;img class="alignnone size-full wp-image-20004" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster.jpg" alt="Art Deco Poster" width="848" height="1263" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-688x1024.jpg 688w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-768x1144.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-336x500.jpg 336w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-150x223.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-750x1117.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Poster" class="lazyload alignnone size-full wp-image-20004" data-dcnode-id="1620" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-201x300.jpg 201w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-688x1024.jpg 688w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-768x1144.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-74x110.jpg 74w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-336x500.jpg 336w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-134x200.jpg 134w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-610x909.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-150x223.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Poster-750x1117.jpg 750w" height="1263" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201263%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1613" style="font-size: 10pt;"><span data-dcnode-id="1618" instrument_node="">Art Deco-style Japan travel poster, Ontake Shosenkyo Valley (Nagoya Train Agency, 1930s);&nbsp;</span><em data-dcnode-id="1614"><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A1930s_Japan_Travel_Poster_-_Ontake_Shosenkyo_Valley.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1617" instrument_node="">Nagoya Train Agency</span></a><span data-dcnode-id="1615" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">In terms of the imagery produced, Art Deco design elements could be seen in the basic forms and huge sections of solid colors that were used. These features were similar to Japanese woodblock prints, which Art Deco artists looked to for inspiration. The influx of Japanese art into Europe following the First World War left a great impact on countries, most notably France.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><blockquote data-dcnode-id="1603"><p data-dcnode-id="1604"><span data-dcnode-id="1605" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Artists found that the simplicity of these woodblock prints mirrored the clearly modern and sleek styles that Art Deco was attempting to create.</span></strong></span></p></blockquote><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1599" instrument_node="">
</span><h3 data-dcnode-id="1596"><span data-dcnode-id="1597" id="Art_Deco_Furniture"><span data-dcnode-id="1598" instrument_node="">Art Deco Furniture</span></span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Another prominent feature of Art Deco art was the furniture that was produced during the movement’s era. It was not until the late 1920s that the concept of furniture was even explored, with the avant-garde Art Nouveau furniture designs going on to inspire the up-and-coming Art Deco creatives. The types of furniture that were then created under the new Art Deco style proved to be more basic and less arched in design, with modernity existing as the main message.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><blockquote data-dcnode-id="1587"><p data-dcnode-id="1588"><span data-dcnode-id="1589" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">As the Art Deco movement continued, Émile-Jacques Ruhlmann appeared to be the forerunner in furniture.</span></strong></span></p></blockquote><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1582" style="color: #ff0000;"><noscript data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">&lt;img class="alignnone size-full wp-image-20024" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior.jpg" alt="Art Deco Style Interior" width="848" height="477" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-300x169.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-768x432.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-30x17.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-75x42.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-110x62.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-160x90.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-500x281.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-50x28.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-100x56.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-200x113.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-610x343.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-150x84.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-750x422.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Style Interior" class="lazyload alignnone size-full wp-image-20024" data-dcnode-id="1583" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior.jpg" data-srcs
