et="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-300x169.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-768x432.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-30x17.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-75x42.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-110x62.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-160x90.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-500x281.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-50x28.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-100x56.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-200x113.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-610x343.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-150x84.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Style-Interior-750x422.jpg 750w" height="477" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20477%22%3E%3C/svg%3E" width="848"></span><span class="VIiyi" data-dcnode-id="1569" lang="en"><span class="JLqJ4b ChMk0b" data-dcnode-id="1570" data-language-for-alternatives="en" data-language-to-translate-into="fr" data-number-of-phrases="2" data-phrase-index="0"><span data-dcnode-id="1580" style="font-size: 10pt;"><span data-dcnode-id="1581" instrument_node="">Art Deco-style study of the Maharajah d’Indore Mobiliers by Jacques-Émile Ruhlmann, 1932;</span></span><em data-dcnode-id="1571"><span data-dcnode-id="1572" style="font-size: 10pt;"><span data-dcnode-id="1579" instrument_node=""> </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AModerne_Maharajah%2C_Mus%25C3%25A9e_des_arts_d%25C3%25A9coratifs%2C_Paris_3_October_2019_02.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1578" instrument_node="">Jean-Pierre Dalbéra from Paris, France</span></a><span data-dcnode-id="1576" instrument_node="">, </span><a data-dcnode-id="1574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1575" instrument_node="">CC BY 2.0</span></a><span data-dcnode-id="1573" instrument_node="">, via Wikimedia Commons</span></span></em></span></span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">While his furniture pieces took inspiration from the Neoclassical style of the 18</span><sup data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">th</span></sup><span data-dcnode-id="1563" instrument_node=""> century, he worked to remove as much of the embellishment as possible while still using the luxurious materials preferred by Art Nouveau designers.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><blockquote data-dcnode-id="1556"><p data-dcnode-id="1557"><span data-dcnode-id="1558" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">These materials included mahogany, ebony, ivory, and even tortoiseshell. As they were completely out of reach for ordinary individuals, his furniture was only available to the most well-off citizens.</span></strong></span></p></blockquote><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">As Ruhlmann’s furniture works appeared to fluctuate between the Art Nouveau and Art Deco style, this left a gap in the market for a more definitive Art Deco furniture designer to arrive. This occurred in the form of Jules Leela, who was merely a traditional designer prior to the development of the Art Deco period. Leela, after finding inspiration in the new and exciting Art Deco style, went on to design the furniture featured in the grand dining room of the Elysée Palace in Paris, which was his most iconic project.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" id="Art_Deco_Architecture"><span data-dcnode-id="1548" instrument_node="">Art Deco Architecture</span></span></h3><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The architecture that emerged from the Art Deco period is possibly one of the most well-known features of the entire art movement. Making its debut in Paris between 1903 and 1904, Art Deco architecture began with the construction of two apartment buildings designed by Auguste Perret and Henri Savage. These two architects worked with reinforced concrete for the very first time in Parisian suburban buildings, with its clean lines, rectangular forms, and lack of decoration on the facade demonstrating a clear departure from the Art Nouveau style.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1538" style="color: #ff0000;"><noscript data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">&lt;img class="alignnone size-full wp-image-20009" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect.jpg" alt="Art Deco Architect" width="848" height="1136" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-224x300.jpg 224w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-764x1024.jpg 764w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-768x1029.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-22x30.jpg 22w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-56x75.jpg 56w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-82x110.jpg 82w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-119x160.jpg 119w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-373x500.jpg 373w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-37x50.jpg 37w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-75x100.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-149x200.jpg 149w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-610x817.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-150x201.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-750x1005.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Architect" class="lazyload alignnone size-full wp-image-20009" data-dcnode-id="1539" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-224x300.jpg 224w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-764x1024.jpg 764w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-768x1029.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-22x30.jpg 22w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-56x75.jpg 56w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-82x110.jpg 82w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-119x160.jpg 119w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-373x500.jpg 373w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-37x50.jpg 37w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-75x100.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-149x200.jpg 149w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-610x817.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-150x201.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Architect-750x1005.jpg 750w" height="1136" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201136%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1529" style="font-size: 10pt;"><span data-dcnode-id="1537" instrument_node="">Architect Auguste Perret, 1932; </span><em data-dcnode-id="1530"><a data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AAuguste_Perret_architecte_1932.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1536" instrument_node="">Nadine.bilis</span></a><span data-dcnode-id="1534" instrument_node="">, </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1533" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1531" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">Art Deco architecture is therefore distinguished by hard-edged and often amply decorated designs emphasized by lustrous metal accents. Many of the buildings designed using the features of Art Deco architecture have an upright emphasis, as they were built in a way that meant to draw the eyes of those walking on the streets upwards.</span></p><span data-dcnode-id="1524" instrument_node="">
</span><blockquote data-dcnode-id="1519"><p data-dcnode-id="1520"><span data-dcnode-id="1521" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">The buildings created in this style were often rectangular, blockish, and organized geometrically, with the addition of curved ornamental features adding to the sleek effect that was intended.</span></strong></span></p></blockquote><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1514" style="color: #ff0000;"><noscript data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">&lt;img class="alignnone size-full wp-image-20005" src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building.jpg" alt="Famous Art Deco Building" width="848" height="1272" srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-200x300.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-683x1024.jpg 683w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-768x1152.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-73x110.jpg 73w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-333x500.jpg 333w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-133x200.jpg 133w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-610x915.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-150x225.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-750x1125.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Famous Art Deco Building" class="lazyload alignnone size-full wp-image-20005" data-dcnode-id="1515" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-200x300.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-683x1024.jpg 683w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-768x1152.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-50x75.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-73x110.jpg 73w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-107x160.jpg 107w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-333x500.jpg 333w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-33x50.jpg 33w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-67x100.jpg 67w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-133x200.jpg 133w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-610x915.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-150x225.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Building-750x1125.jpg 750w" height="1272" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201272%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1505" style="font-size: 10pt;"><span data-dcnode-id="1513" instrument_node="">Chrysler Building lobby on 42nd street entrance, central elevator bank with Art Deco illumination;&nbsp;</span><em data-dcnode-id="1506"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AChrysler_Central_Elevator_2019-10-03_20-18.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1512" instrument_node="">“Axel Tschentscher”</span></a><span data-dcnode-id="1510" instrument_node="">, </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1509" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1507" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">Some of the most famous American examples of Art Deco architecture include a variety of skyscrapers that were built in New York City, as well as several pastel-colored buildings that were constructed in Miami. In the Interwar period, Art Deco quickly became the most common and popular architectural style available and began to spread to other parts of the world. The influence of Art Deco architecture during the first half of the 20</span><sup data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">th</span></sup><span data-dcnode-id="1499" instrument_node=""> century can still be seen when looking at some of the prevailing buildings that still stand in America today.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1494" instrument_node="">
</span><h3 data-dcnode-id="1491"><span data-dcnode-id="1492" id="Art_Deco_Building"><span data-dcnode-id="1493" instrument_node="">Art Deco Building</span></span></h3><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Some of the most recognizable buildings in America today represent the Art Deco style and patterns in its architecture. After World War One, Art Deco buildings that made use of steel and reinforced concrete began to appear all over large cities in America and Europe. In America, these buildings were typically used for offices, movie theatres, railroad stations, and government buildings.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><blockquote data-dcnode-id="1482"><p data-dcnode-id="1483"><span data-dcnode-id="1484" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Art Deco building elements also featured in some engineering projects, most notably in the towers of the Golden Gate Bridge in San Francisco.</span></strong></span></p></blockquote><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1477" style="color: #ff0000;"><noscript data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">&lt;img class="alignnone size-full wp-image-20023" src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture.jpg" alt="Famous Art Deco Architecture" width="848" height="1064" srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-239x300.jpg 239w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-816x1024.jpg 816w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-768x964.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-24x30.jpg 24w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-60x75.jpg 60w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-88x110.jpg 88w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-128x160.jpg 128w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-398x500.jpg 398w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-40x50.jpg 40w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-80x100.jpg 80w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-159x200.jpg 159w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-610x765.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-150x188.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-750x941.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Famous Art Deco Architecture" class="lazyload alignnone size-full wp-image-20023" data-dcnode-id="1478" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-239x300.jpg 239w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-816x1024.jpg 816w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-768x964.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-24x30.jpg 24w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-60x75.jpg 60w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-88x110.jpg 88w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-128x160.jpg 128w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-398x500.jpg 398w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-40x50.jpg 40w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-80x100.jpg 80w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-159x200.jpg 159w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-610x765.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-150x188.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Famous-Art-Deco-Architecture-750x941.jpg 750w" height="1064" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201064%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1471" style="font-size: 10pt;"><span data-dcnode-id="1476" instrument_node="">Telephoto view showing the top of the tower of the Golden Gate Bridge, 1984;&nbsp;</span><em data-dcnode-id="1472"><a data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADETAIL_TELEPHOTO_VIEW_SHOWING_TOP_OF_TOWER_-_Golden_Gate_Bridge%2C_Spanning_mouth_of_San_Francisco_Bay%2C_San_Francisco%2C_San_Francisco_County%2C_CA_HAER_CAL%2C38-SANFRA%2C140-25.tif" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1475" instrument_node="">Lowe, JetRelated names:Strauss, Joseph BPacific Bridge CompanyJohn Roebling’s Sons CompanyBethlehem Steel Company IncorporatedJackson, Donald C, transmitterYearby, Jean P, transmitterJandoli, Liz, transmitter</span></a><span data-dcnode-id="1473" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The most famous Art Deco buildings, which still exist in their original form today, include Rockefeller Centre, the Empire State Building, and the truly iconic Chrysler Building, all located in New York City. Considered to be the most commemorative expressions of the Art Deco style, these buildings became the tallest and most recognizable contemporary buildings in the world at the time. They were essentially designed to demonstrate the reputation of builders through their height, shape, color, and striking radiance of the evening.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><blockquote data-dcnode-id="1461"><p data-dcnode-id="1462"><span data-dcnode-id="1463" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Skyscrapers were seen as a completely modern creation within the Art Deco era.</span></strong></span></p></blockquote><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">These buildings emphasized neat lines and stability at an often-dizzying level. New York’s skyline was drastically altered by the Chrysler Building in 1930, which stood as the pinnacle of success when it came to Art Deco building. At 77 floors, it was known as the world’s tallest building for 11 months until construction on the Empire State Building began. The Chrysler Building existed as a large commercial for Chrysler cars.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1453" style="color: #ff0000;"><noscript data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">&lt;img class="alignnone size-full wp-image-20010" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building.jpg" alt="Art Deco Building" width="848" height="1352" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-188x300.jpg 188w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-642x1024.jpg 642w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-768x1224.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-47x75.jpg 47w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-69x110.jpg 69w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-100x160.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-314x500.jpg 314w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-31x50.jpg 31w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-63x100.jpg 63w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-125x200.jpg 125w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-610x973.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-150x239.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-750x1196.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Building" class="lazyload alignnone size-full wp-image-20010" data-dcnode-id="1454" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-188x300.jpg 188w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-642x1024.jpg 642w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-768x1224.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-19x30.jpg 19w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-47x75.jpg 47w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-69x110.jpg 69w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-100x160.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-314x500.jpg 314w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-31x50.jpg 31w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-63x100.jpg 63w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-125x200.jpg 125w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-610x973.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-150x239.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Building-750x1196.jpg 750w" height="1352" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201352%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1447" style="font-size: 10pt;"><span data-dcnode-id="1452" instrument_node="">A postcard of the Chrysler Building, 1932;&nbsp;</span><em data-dcnode-id="1448"><a data-dcnode-id="1450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AChrysler_Building_%28NBY_2828%29.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1451" instrument_node="">Unknown author Unknown author</span></a><span data-dcnode-id="1449" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">What made the Chrysler Building so symbolic was its style of decoration. Triangles around the curved tiers adorned the peak of the building, with these shapes being placed in a way that copied the sun gleaming towards a peak. Art Deco gargoyles were also featured as ornamentation that closely imitated the hood ornament of a car.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><blockquote data-dcnode-id="1437"><p data-dcnode-id="1438"><span data-dcnode-id="1439" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">This gravity-defying skyscraper, as it was described at the time, featured all of the essential Art Deco building elements as it invoked the modern man versus nature struggle in its architecture.</span></strong></span></p></blockquote><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1430" instrument_node="">
</span><h2 data-dcnode-id="1427"><span data-dcnode-id="1428" id="Key_Accomplishments_of_Art_Deco"><span data-dcnode-id="1429" instrument_node="">Key Accomplishments of Art Deco</span></span></h2><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">As a modern style of creation, Art Deco attempted to blend functional objects with artistic touches. This is one of the aspects that made Art Deco so different from other fine art styles like painting and sculpture, as artworks had no other real purpose or use beyond functioning as something intriguing for viewers to look at.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><blockquote data-dcnode-id="1418"><p data-dcnode-id="1419"><span data-dcnode-id="1420" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">With the emergence of widespread manufacturing, Art Deco artists were able to improve the appearance of their mass-produced functional objects so that they were accessible to everyone in society.</span></strong></span></p></blockquote><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">One of the biggest accomplishments of the Art Deco movement was the fact that almost everything could be seen as art, from something as simple as clocks, glassware, and ashtrays to more complex creations like cars and buildings.</span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1410" style="color: #ff0000;"><noscript data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">&lt;img class="alignnone size-full wp-image-20015" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware.jpg" alt="Art Deco Glassware" width="848" height="636" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-150x113.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-750x563.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Glassware" class="lazyload alignnone size-full wp-image-20015" data-dcnode-id="1411" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-150x113.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Glassware-750x563.jpg 750w" height="636" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20636%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1404" style="font-size: 10pt;"><span data-dcnode-id="1409" instrument_node="">Art Deco-style glassware, c. 1899-1930;&nbsp;</span><em data-dcnode-id="1405"><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AGros._Falster_a-s_-_no-nb_digifoto_20160412_00011_NB_NS_NM_07745_A.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1408" instrument_node="">National Library of Norway</span></a><span data-dcnode-id="1406" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">This demonstrated Art Deco’s quest to find beauty in all facets of life, with the movement’s aim reflecting the considerable originality and mass usage of machine-age technology that existed at the time. Art Deco achieved this by focusing on the elegance and appeal of objects that already existed around us, with another accomplishment of the Art Deco era being its truly democratic aim. Artists attempted to make even the plainest and unrefined objects, like machine-made objects, as aesthetically pleasing as possible.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1396" instrument_node="">
</span><h3 data-dcnode-id="1393"><span data-dcnode-id="1394" id="Art_Deco_in_America"><span data-dcnode-id="1395" instrument_node="">Art Deco in America</span></span></h3><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1391" instrument_node="">In America, the Art Deco movement was met with a completely different approach. Herbert Hoover, who was the Secretary of Commerce then, stated that no </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artincontext.org/famous-american-artists/"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">American artists</span></strong></a><span data-dcnode-id="1387" instrument_node=""> and designers were allowed to display their work at the Exposition International in France. This was because Hoover believed that they were yet to come up with an explicitly American style of art that was sufficiently “new enough”.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><blockquote data-dcnode-id="1380"><p data-dcnode-id="1381"><span data-dcnode-id="1382" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">In response to this, he sent a group to France to assess the artworks at the Exposition and to bring home any ideas that could be applied in a modern American artistic and architectural sense.</span></strong></span></p></blockquote><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">Within this traveling cohort, Hoover included important figures from the Metropolitan Museum of Art and the American Institute of Architecture, as well as several individuals from </span><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">The New York Times</span></em><span data-dcnode-id="1375" instrument_node="">. This trip to Europe went on to inspire an almost instantaneous expansion in artistic innovation and creation in the United States.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1369" style="color: #ff0000;"><noscript data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">&lt;img class="alignnone size-full wp-image-20017" src="https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco.jpg" alt="What Is Art Deco" width="848" height="636" srcset="https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-150x113.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-750x563.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="What Is Art Deco" class="lazyload alignnone size-full wp-image-20017" data-dcnode-id="1370" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-300x225.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-768x576.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-30x23.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-75x56.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-110x83.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-160x120.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-500x375.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-50x38.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-100x75.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-200x150.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-610x458.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-150x113.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/What-Is-Art-Deco-750x563.jpg 750w" height="636" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20636%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1360" style="font-size: 10pt;"><span data-dcnode-id="1368" instrument_node="">Art Deco-style Hall of the Mirrors inside the Carew Tower, Ohio;&nbsp;</span><em data-dcnode-id="1361"><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AHall_of_mirrors%2C_Carew_Tower.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1367" instrument_node="">EEJCC</span></a><span data-dcnode-id="1365" instrument_node="">, </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1364" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1362" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The American Art Deco style proved to be quite different from the original style that developed in France. Nicknamed “Streamline Moderne”, American Art Deco was a more diminished and sleeker version when compared to the complex and regularly bespoke European Art Deco style.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><blockquote data-dcnode-id="1350"><p data-dcnode-id="1351"><span data-dcnode-id="1352" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Emphasizing the technological advancements of the era, American Art Deco quickly grew and expanded to have a far greater following and use in the United States than in Europe.</span></strong></span></p></blockquote><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1348" instrument_node="">The presence of a unique Art Deco style helped to return some trust and belief in social progress in America, as the artworks that were created were thought to be an expression of national pride. The </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">American World Fairs in Chicago</span></em><span data-dcnode-id="1345" instrument_node=""> (1933) and </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">New York City</span></em><span data-dcnode-id="1342" instrument_node=""> (1939) mainly featured Art Deco designs, as Hollywood adopted the style and made it alluring throughout the country. American Art Deco’s rapid growth created an expression of democracy through its designs, which were made accessible to ordinary citizens.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1334" instrument_node="">
</span><h2 data-dcnode-id="1331"><span data-dcnode-id="1332" id="Late_Art_Deco"><span data-dcnode-id="1333" instrument_node="">Late Art Deco</span></span></h2><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">By 1925, two completely different and contending schools coexisted within the Art Deco movement. These schools were made up of the traditionalists and the modernists. The traditionalists, who had originally established the Society of Decorative Artists, included furniture designer Emile-Jacques Ruhlmann, interior designer Jean Dunant, sculptor Antoine Bordello, and designer Paul Poirot.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><blockquote data-dcnode-id="1322"><p data-dcnode-id="1323"><span data-dcnode-id="1324" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">This school of Art Deco was known for its combination of advanced forms with conventional techniques and pricey materials.</span></strong></span></p></blockquote><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">On the other hand, the modernists stood out for their blatant rejection of the past. Artists within this Art Deco group sought to find and create an artistic style that was based on new developments in technologies, simplicity, an absence of decoration, and the use of cheaper materials and mass production.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1314" style="color: #ff0000;"><noscript data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">&lt;img class="alignnone size-full wp-image-20019" src="https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style.jpg" alt="Late Art Deco Style" width="848" height="679" srcset="https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-300x240.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-768x615.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-30x24.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-75x60.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-110x88.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-160x128.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-500x400.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-50x40.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-100x80.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-200x160.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-610x488.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-150x120.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-750x601.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Late Art Deco Style" class="lazyload alignnone size-full wp-image-20019" data-dcnode-id="1315" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-300x240.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-768x615.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-30x24.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-75x60.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-110x88.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-160x128.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-500x400.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-50x40.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-100x80.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-200x160.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-610x488.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-150x120.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Late-Art-Deco-Style-750x601.jpg 750w" height="679" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20679%22%3E%3C/svg%3E" width="848"></span><span class="VIiyi" data-dcnode-id="1300" lang="en" style="font-size: 10pt;"><span class="JLqJ4b ChMk0b" data-dcnode-id="1312" data-language-for-alternatives="en" data-language-to-translate-into="fr" data-number-of-phrases="2" data-phrase-index="0"><span data-dcnode-id="1313" instrument_node="">The portrait of Auguste Perret in the Art Deco-style grand staircase of the Palais d’Iéna, Paris, France. The staircase faces the entrance to the conference room, acting as a hinge between the ends of the north and south wings of the Palace.</span></span><span data-dcnode-id="1311" instrument_node=""> </span><span class="JLqJ4b ChMk0b" data-dcnode-id="1302" data-language-for-alternatives="en" data-language-to-translate-into="fr" data-number-of-phrases="2" data-phrase-index="1"><span data-dcnode-id="1310" instrument_node="">Note that the reinforced concrete columns are tapered down to express “the structural nature of the material”;&nbsp;</span><em data-dcnode-id="1303"><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AL%27exposition_Auguste_Perret_%28Conseil_%25C3%25A9conomique%2C_social_et_environnemental%2C_Paris%29_%2811872278295%29.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1309" instrument_node="">Jean-Pierre Dalbéra from Paris, France</span></a><span data-dcnode-id="1307" instrument_node="">, </span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/2.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1306" instrument_node="">CC BY 2.0</span></a><span data-dcnode-id="1304" instrument_node="">, via Wikimedia Commons</span></em></span><span data-dcnode-id="1301" instrument_node=""> </span></span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The modernists established their own organization in 1929, which was called the French Union of Modern Artists. Creatives within this group included Pierre Chateau, Francis Jourdain, Le Corbusier, and Sonia Delaunay.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><blockquote data-dcnode-id="1290"><p data-dcnode-id="1291"><span data-dcnode-id="1292" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The modernist Art Deco group criticized the traditional Art Deco style, which they formed was only created to serve the wealthy.</span></strong></span></p></blockquote><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">This group argued that well-made buildings, for example, should be accessible and convenient to everyone no matter their financial status, and that form should automatically follow function. Based on this, the elegance and charm of an object or building rested upon whether it was perfectly capable of fulfilling its function and not related to the art audience who would most likely be viewing the works.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1280" instrument_node="">
</span><h2 data-dcnode-id="1277"><span data-dcnode-id="1278" id="Notable_Art_Deco_Artists"><span data-dcnode-id="1279" instrument_node="">Notable Art Deco Artists</span></span></h2><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Many artists participated in the Art Deco movement, ranging from painters, sculptors, interior designers, furniture makers, and architects. Below, we will be taking a look at several notable creatives who created significant artworks within the Art Deco period and whose influence is still discussed today.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1270" instrument_node="">
</span><h3 data-dcnode-id="1267"><span data-dcnode-id="1268" id="Rene_Lalique_1860_1945"><span data-dcnode-id="1269" instrument_node="">René Lalique (1860 – 1945)</span></span></h3><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1265" instrument_node="">French designer René Lalique has gone down in history as one of the world’s most well-known glass art designers from the late 19</span><sup data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">th</span></sup><span data-dcnode-id="1262" instrument_node=""> and early 20</span><sup data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">th</span></sup><span data-dcnode-id="1259" instrument_node=""> centuries. His legacy as an Art Deco artist is still strong today, with his glasswork pieces still highly favored by collectors. During his career, Lalique was best known for his beautiful perfume bottles, jewelry, vases, chandeliers, clocks, and car hood ornaments.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><blockquote data-dcnode-id="1252"><p data-dcnode-id="1253"><span data-dcnode-id="1254" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Lalique quickly became one of the most acclaimed Art Nouveau jewelry designers and went on to work for prominent French jewelers like Cartier and Boucheron.</span></strong></span></p></blockquote><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">In the 1920s, after Lalique had refined his glass art creations, he rejected the style of Art Nouveau and expressed an interest in fluid and organic forms. This led to him embracing the techniques of the emerging Art Deco style, with his artworks becoming sleeker in the process. Lalique experimented with a variety of new materials, yet he preferred to work with glass.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1244" style="color: #ff0000;"><noscript data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">&lt;img class="alignnone size-full wp-image-20026" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist.jpg" alt="Art Deco Artist" width="848" height="1244" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-205x300.jpg 205w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-698x1024.jpg 698w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-768x1127.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-51x75.jpg 51w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-75x110.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-109x160.jpg 109w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-341x500.jpg 341w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-68x100.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-136x200.jpg 136w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-610x895.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-150x220.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-750x1100.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Artist" class="lazyload alignnone size-full wp-image-20026" data-dcnode-id="1245" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-205x300.jpg 205w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-698x1024.jpg 698w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-768x1127.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-20x30.jpg 20w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-51x75.jpg 51w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-75x110.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-109x160.jpg 109w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-341x500.jpg 341w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-34x50.jpg 34w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-68x100.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-136x200.jpg 136w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-610x895.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-150x220.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Artist-750x1100.jpg 750w" height="1244" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201244%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1238" style="font-size: 10pt;"><span data-dcnode-id="1243" instrument_node="">Portrait of René Lalique, 1906;&nbsp;</span><em data-dcnode-id="1239"><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ARen%25C3%25A9_Lalique_01.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1242" instrument_node="">Aaron Gerschel</span></a><span data-dcnode-id="1240" instrument_node="">, Public domain, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">As he practiced within the Art Deco movement, his style of glassmaking dominated the jewelry industry. Lalique’s triumph was also credited to an older method of glass casting, which was rarely used up until this point, and enabled him to effortlessly produce multiples of the same design. In addition to his dainty perfume bottles and pieces of jewelry, some of Lalique’s monumental Art Deco works include the walls of illuminated glass and glass pillars for the ocean liner, </span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Normandie</span></em><span data-dcnode-id="1232" instrument_node="">.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><blockquote data-dcnode-id="1225"><p data-dcnode-id="1226"><span data-dcnode-id="1227" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">However, one of Lalique’s most well-known glass sculptures was “Victoire”, which he created in 1928.</span></strong></span></p></blockquote><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1223" instrument_node="">Made to be a glass hood ornament for a car, </span><em data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Victoire </span></em><span data-dcnode-id="1220" instrument_node="">represents a female figure in the wind. With her face keenly sticking out and her hair dangling behind her like a single, sharp wing, this sculpture makes reference to the ancient Greek sculpture, </span><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Winged Victory</span></em><span data-dcnode-id="1217" instrument_node="">, located in the Louvre. With </span><em data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Victoire </span></em><span data-dcnode-id="1214" instrument_node="">existing as both fine art and a sculptural object, it seems to encapsulate everything that Art Deco was due to its truly American style.</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1208" style="color: #ff0000;"><noscript data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">&lt;img class="alignnone size-full wp-image-20020" src="https://artincontext.org/wp-content/uploads/2021/12/Deco-Art.jpg" alt="Deco Art" width="848" height="848" srcset="https://artincontext.org/wp-content/uploads/2021/12/Deco-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-300x300.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-150x150.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-768x768.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-30x30.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-75x75.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-110x110.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-160x160.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-500x500.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-50x50.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-100x100.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-200x200.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-610x610.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-96x96.jpg 96w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-750x750.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Deco Art" class="lazyload alignnone size-full wp-image-20020" data-dcnode-id="1209" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Deco-Art.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Deco-Art.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-300x300.jpg 300w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-150x150.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-768x768.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-30x30.jpg 30w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-75x75.jpg 75w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-110x110.jpg 110w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-160x160.jpg 160w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-500x500.jpg 500w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-50x50.jpg 50w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-100x100.jpg 100w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-200x200.jpg 200w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-610x610.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-96x96.jpg 96w, https://artincontext.org/wp-content/uploads/2021/12/Deco-Art-750x750.jpg 750w" height="848" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20848%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1198" style="font-size: 10pt;"><span data-dcnode-id="1207" instrument_node="">“Spirit of the Wind” or “Victoire” mascot by Lalique, 1928;</span><em data-dcnode-id="1199"><span data-dcnode-id="1206" instrument_node="">&nbsp;</span><a data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ALalique_Spirit_of_the_Wind_Mascot_-_Flickr_-_ingridtaylar_cropped.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1205" instrument_node="">Ingrid Taylar from Seattle, WA, USA</span></a><span data-dcnode-id="1203" instrument_node="">, </span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/4.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1202" instrument_node="">CC BY-SA 4.0</span></a><span data-dcnode-id="1200" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1193" instrument_node="">
</span><h3 data-dcnode-id="1190"><span data-dcnode-id="1191" id="Emile-Jacques_Ruhlmann_1879_1933"><span data-dcnode-id="1192" instrument_node="">Émile-Jacques Ruhlmann (1879 – 1933)</span></span></h3><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">One of the most prominent furniture and interior designers within the Art Deco movement was French artist Émile-Jacques Ruhlmann. His furniture designs appeared to be incredibly streamlined, as he made use of very extravagant and outlandish materials that he worked with using his exceptionally delicate craftsmanship. During the movement’s height of popularity, Ruhlmann became a symbol of the opulence and contemporaneity associated with the Art Deco style.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1182" style="color: #ff0000;"><noscript data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">&lt;img class="alignnone size-full wp-image-20018" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist.jpg" alt="Art Deco Design Artist" width="848" height="1215" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-209x300.jpg 209w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-715x1024.jpg 715w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-768x1100.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-21x30.jpg 21w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-52x75.jpg 52w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-77x110.jpg 77w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-112x160.jpg 112w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-349x500.jpg 349w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-35x50.jpg 35w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-70x100.jpg 70w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-140x200.jpg 140w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-610x874.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-150x215.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-750x1075.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Design Artist" class="lazyload alignnone size-full wp-image-20018" data-dcnode-id="1183" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-209x300.jpg 209w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-715x1024.jpg 715w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-768x1100.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-21x30.jpg 21w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-52x75.jpg 52w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-77x110.jpg 77w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-112x160.jpg 112w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-349x500.jpg 349w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-35x50.jpg 35w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-70x100.jpg 70w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-140x200.jpg 140w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-610x874.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-150x215.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Design-Artist-750x1075.jpg 750w" height="1215" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%201215%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1173" style="font-size: 10pt;"><span data-dcnode-id="1181" instrument_node="">Émile-Jacques Ruhlmann, 1930s;&nbsp;</span><em data-dcnode-id="1174"><a data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AJacques-%25C3%2589mile_Ruhlmann_%28cropped%29.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1180" instrument_node="">Olivier Old</span></a><span data-dcnode-id="1178" instrument_node="">, </span><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1177" instrument_node="">CC BY-SA 3.0</span></a><span data-dcnode-id="1175" instrument_node="">, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Ruhlmann’s lavish style produced different reactions from a number of different Art Deco designers and architects. Le Corbusier, in particular, responded to the types of artworks produced by Ruhlmann by calling for the creation of uncomplicated and more practical furniture pieces instead. However, Ruhlmann strongly believed that the preservation of art relied entirely on the upper class, with his designs going on to perfectly capture the sensational and magnificent spirit of the time.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Although he was restrictive when it came to ornamentation, Ruhlmann fashioned his furniture pieces out of the most exotic materials at the time. As a firm favorite of the post-war bourgeois classes, Ruhlmann designed furniture that was able to display the newfound wealth and taste of the recently emerging aristocratic society.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><blockquote data-dcnode-id="1160"><p data-dcnode-id="1161"><span data-dcnode-id="1162" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Due to this, the greatest achievement of Ruhlmann’s career was said to have been his ability to merge the classical style of the past with the more advanced style of the modern world.</span></strong></span></p></blockquote><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1155" style="color: #ff0000;"><noscript data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">&lt;img class="alignnone size-full wp-image-20012" src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture.jpg" alt="Art Deco Furniture" width="848" height="940" srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-271x300.jpg 271w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-768x851.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-27x30.jpg 27w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-68x75.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-99x110.jpg 99w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-144x160.jpg 144w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-451x500.jpg 451w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-45x50.jpg 45w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-90x100.jpg 90w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-180x200.jpg 180w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-610x676.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-150x166.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-750x831.jpg 750w" sizes="(max-width: 848px) 100vw, 848px" /&gt;</span></noscript><img alt="Art Deco Furniture" class="lazyload alignnone size-full wp-image-20012" data-dcnode-id="1156" data-pin-no-hover="true" data-sizes="(max-width: 848px) 100vw, 848px" data-src="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture.jpg" data-srcset="https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture.jpg 848w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-271x300.jpg 271w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-768x851.jpg 768w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-27x30.jpg 27w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-68x75.jpg 68w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-99x110.jpg 99w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-144x160.jpg 144w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-451x500.jpg 451w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-45x50.jpg 45w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-90x100.jpg 90w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-180x200.jpg 180w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-610x676.jpg 610w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-150x166.jpg 150w, https://artincontext.org/wp-content/uploads/2021/12/Art-Deco-Furniture-750x831.jpg 750w" height="940" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20848%20940%22%3E%3C/svg%3E" width="848"></span><span data-dcnode-id="1149" style="font-size: 10pt;"><span data-dcnode-id="1154" instrument_node="">“État” Cabinet by Émile-Jacques Ruhlmann, 1922;&nbsp;</span><em data-dcnode-id="1150"><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3A%2522%25C3%2589tat%2522_Cabinet_MET_DP105993.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">Jacques-Émile Ruhlmann</span></a><span data-dcnode-id="1151" instrument_node="">, CC0, via Wikimedia Commons</span></em></span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1146" instrument_node="">One of Ruhlmann’s notable furniture pieces, produced in 1922, was </span><em data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">État Cabinet</span></em><span data-dcnode-id="1143" instrument_node="">. Diverging from the typically Art Nouveau style in terms of its symmetry and restricted color palette, Ruhlmann made use of a strong wood that contrasted sharply against the intricate ivory design. Despite this, the elaborate floral features borrowed heavily from the Art Nouveau style, with </span><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">État Cabinet </span></em><span data-dcnode-id="1140" instrument_node="">existing as a more updated and simplified object that seemed stuck between the two styles of Art Nouveau and Art Deco.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1132"><span data-dcnode-id="1133" id="William_Van_Alen_1883_1954"><span data-dcnode-id="1134" instrument_node="">William Van Alen (1883 – 1954)</span></span></h3><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Perhaps the most important artist to come from the Art Deco period was American architect William Van Alen, who designed the iconic Chrysler Building in New York City. Born in Brooklyn, Van Alen went on to study architecture in both the United States and Paris before settling on a specific architectural style. In 1910, after returning from Paris, Van Alen displayed his keen interest in the style of modernism, which was said to have been inspired by the early stages of the still-developing Art Deco movement.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><blockquote data-dcnode-id="1123"><p data-dcnode-id="1124"><span data-dcnode-id="1125" style="font-size: 14pt; color: #db9957;"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Many of the significant buildings in New York were built during the peak of the Art Deco movement. The famous Chrysler Building, which changed the skyline of the city, was designed by Van Alen in the late 1920s, with the building being completed in 1930.</span></strong></span></p></blockquote><span data-dcnode-id="1122" instrument_node="">
