</span><h2 class="bs-ov-header p-0" data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">Overview</span></h2><span data-dcnode-id="5057" instrument_node="">
</span><div class="text--medium overview-content p-lg-4 p-sm-0 bookseller-cont" data-dcnode-id="5020"><span data-dcnode-id="5056" instrument_node="">
</span><div class="bs-content" data-dcnode-id="5022"><span data-dcnode-id="5055" instrument_node="">
</span><div class="overview-cntnt" data-dcnode-id="5024" itemprop="description"><span data-dcnode-id="5054" instrument_node="">
</span><b data-dcnode-id="5046"><span data-dcnode-id="5053" instrument_node="">The most complete collection available, the</span><i data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node=""> New York Times </span></i><span data-dcnode-id="5050" instrument_node="">bestselling book </span><i data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">The Louvre: All the Paintings</span></i><span data-dcnode-id="5047" instrument_node=""> includes all 3,022 paintings from the permanent collection of the world's most popular museum in a practical and elegant paperback format. </span></b><br data-dcnode-id="5045"><br data-dcnode-id="5044"><br data-dcnode-id="5043"><span data-dcnode-id="5042" instrument_node="">The Louvre Museum houses many of the world's most celebrated and important art of all time -- from da Vinci's </span><i data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Mona Lisa</span></i><span data-dcnode-id="5039" instrument_node=""> to Vermeer's </span><i data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">The Lacemaker -- </span></i><span data-dcnode-id="5036" instrument_node="">making it also the most visited art museum in the world. </span><i data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">The Louvre: All the Paintings</span></i><span data-dcnode-id="5033" instrument_node=""> allows you to experience every painting currently on display in the permanent collection in Paris, without ever having to step on a plane. </span><br data-dcnode-id="5032"><br data-dcnode-id="5031"><br data-dcnode-id="5030"><span data-dcnode-id="5029" instrument_node="">Divided and organized into the four main painting collections of the museum -- the Italian School, the Northern School, the Spanish School, and the French School -- the paintings are then presented chronologically by the artists' date of birth. Four hundred of the most iconic and significant paintings are illuminated with 300-word discussions by art historians Anja Grebe and Vincent Pomarède on the key attributes of the work, what to look for when viewing, the artist's inspirations and techniques, biographical information on the artist, the artist's overall impact on history, and more. </span><br data-dcnode-id="5028"><br data-dcnode-id="5027"><br data-dcnode-id="5026"><span data-dcnode-id="5025" instrument_node="">Immerse yourself in the wonder and dazzling display of the Louvre without ever having to leave the comfort of your own home. Learn more about each artist and painting, and tour the realms of sensational masterpieces with this new paperback edition.</span></div><span data-dcnode-id="5023" instrument_node="">
</span></div><span data-dcnode-id="5021" instrument_node="">

</span><b data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">Anja Grebe</span></b><span data-dcnode-id="3312" instrument_node=""> teaches art history at the University of Erlangen-Nuremberg in Germany. She has taken part in numerous international research projects and exhibitions and has published extensively on medieval and modern art history. Grebe is also the author of </span><i data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">The Vatican: All the Paintings</span></i><span data-dcnode-id="3309" instrument_node="">. She lives in Erlangen, Germany. </span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><b data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">Erich Lessing</span></b><span data-dcnode-id="3304" instrument_node=""> was an Austrian photographer who documented the culture and fine arts of Europe and the Near East for more than fifty years. He created the Erich Lessing Culture and Fine Arts Archive, which is an extensive image library featuring over 40,000 high resolution images from over 500 museums and private collections throughout the world. His work has been featured globally and produced around sixty books. In 2013 he donated 60,000 images to the archives of the Austrian National Library. Lessing died in August 2018. </span><br data-dcnode-id="3303"><br data-dcnode-id="3302"><b data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Vincent Pomaréde</span></b><span data-dcnode-id="3299" instrument_node=""> is a heritage curator and was the director of the Department of Paintings of the Louvre Museum from 2003 to 2014. Currently, he is the deputy general director of the museum. </span><br data-dcnode-id="3298"><br data-dcnode-id="3297"><b data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Henri Loyrette</span></b><span data-dcnode-id="3294" instrument_node=""> is the former chairman of Admical, a French organization dedicated to corporate philanthropy, and the former director of the Louvre Museum. He is also an author with a total of nineteen books on various subject, including Degas, Gustave Eiffel, and Marcel Proust.</span></div><span data-dcnode-id="3292" instrument_node="">
</span><span data-dcnode-id="3290" instrument_node="">

<h3 class="bv-content-title" data-dcnode-id="2178" itemprop="headline"><span data-dcnode-id="2179" instrument_node="">    I ordered this book on Black Friday for $26.25. Barnes and Noble   </span></h3><span data-dcnode-id="2177" instrument_node=""> </span></div><span data-dcnode-id="2175" instrument_node=""> </span></div><span data-dcnode-id="2173" instrument_node=""> </span></div><span data-dcnode-id="2171" instrument_node=""> </span><div class="bv-content-details-offset-off" data-dcnode-id="2137"><span data-dcnode-id="2170" instrument_node=""> </span><div class="bv-content-summary" data-dcnode-id="2139"><span data-dcnode-id="2169" instrument_node=""> </span><div class="bv-content-summary-body" data-dcnode-id="2141" itemprop="reviewBody"><span data-dcnode-id="2168" instrument_node=""> </span><div class="bv-content-summary-body-text" data-dcnode-id="2163"><span data-dcnode-id="2167" instrument_node=""> </span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">I ordered this book on Black Friday for $26.25. Barnes and Noble sent me a Harry Potter magic wand instead. Now they say I can't get the book because it's &amp;amp;quot;not in stock&amp;amp;quot; even though their own website says it is. They screwed up my order and all they can do is apologize for my inconvenience. Now I have to waste my time taking their Harry Potter magic wand to UPS so I can get a refund for their error. Amazon is so much better at customer service. I imagine this is a great book, but I don't have the book I payed for--and I will not even get a refund until Barnes and Noble gets its Harry Potter magic wand! Way to go B&amp;amp;amp;N! That's how you keep your customers happy! That's how you compete with Amazon!</span></p><span data-dcnode-id="2164" instrument_node=""> </span></div><span data-dcnode-id="2162" instrument_node=""> </span><div class="bv-content-data" data-dcnode-id="2143"><span data-dcnode-id="2161" instrument_node=""> </span><div class="bv-content-product-q
