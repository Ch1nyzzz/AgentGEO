</span><p data-dcnode-id="8145"><b data-dcnode-id="8177"><span data-dcnode-id="8180" instrument_node="">Paris in the </span><i data-dcnode-id="8178"><span data-dcnode-id="8179" instrument_node="">Belle Époque</span></i></b><span data-dcnode-id="8176" instrument_node=""> was a period in the history of the city between the years 1871 to 1914, from the beginning of the </span><a class="mw-redirect" data-dcnode-id="8174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_French_Republic" title="Third French Republic"><span data-dcnode-id="8175" instrument_node="">Third French Republic</span></a><span data-dcnode-id="8173" instrument_node=""> until the </span><a data-dcnode-id="8171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8172" instrument_node="">First World War</span></a><span data-dcnode-id="8170" instrument_node="">. It saw the construction of the </span><a data-dcnode-id="8168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="8169" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="8167" instrument_node="">, the </span><a data-dcnode-id="8165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_M%25C3%25A9tro" title="Paris Métro"><span data-dcnode-id="8166" instrument_node="">Paris Métro</span></a><span data-dcnode-id="8164" instrument_node="">, the completion of the </span><a data-dcnode-id="8162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Opera" title="Paris Opera"><span data-dcnode-id="8163" instrument_node="">Paris Opera</span></a><span data-dcnode-id="8161" instrument_node="">, and the beginning of the </span><a data-dcnode-id="8159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacr%25C3%25A9-C%25C5%2593ur%2C_Paris" title="Sacré-Cœur, Paris"><span data-dcnode-id="8160" instrument_node="">Basilica of Sacré-Cœur</span></a><span data-dcnode-id="8158" instrument_node=""> on </span><a data-dcnode-id="8156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montmartre" title="Montmartre"><span data-dcnode-id="8157" instrument_node="">Montmartre</span></a><span data-dcnode-id="8155" instrument_node="">. Three lavish "universal expositions" in 1878, 1889, and 1900 brought millions of visitors to Paris to sample the latest innovations in commerce, art, and technology. Paris was the scene of the first public projection of a motion picture, and the birthplace of the </span><a data-dcnode-id="8153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballets_Russes" title="Ballets Russes"><span data-dcnode-id="8154" instrument_node="">Ballets Russes</span></a><span data-dcnode-id="8152" instrument_node="">, </span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionism" title="Impressionism"><span data-dcnode-id="8151" instrument_node="">Impressionism</span></a><span data-dcnode-id="8149" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_Art" title="Modern Art"><span data-dcnode-id="8148" instrument_node="">Modern Art</span></a><span data-dcnode-id="8146" instrument_node="">.
</span></p><p data-dcnode-id="8139"><span data-dcnode-id="8144" instrument_node="">The expression </span><i data-dcnode-id="8141"><a data-dcnode-id="8142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belle_%25C3%2589poque" title="Belle Époque"><span data-dcnode-id="8143" instrument_node="">Belle Époque</span></a></i><span data-dcnode-id="8140" instrument_node=""> ("beautiful era") came into use after the First World War; it was a nostalgic term for what seemed a simpler time of optimism, elegance, and progress.

</span><div class="thumb" data-dcnode-id="7648" style="width: 392.333px;"><div data-dcnode-id="7649" style="margin:0px auto;"><a class="image" data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Commune_rue_de_Rivoli.jpg"><img alt="" data-dcnode-id="7651" data-file-height="3312" data-file-width="4416" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Paris_Commune_rue_de_Rivoli.jpg/400px-Paris_Commune_rue_de_Rivoli.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Paris_Commune_rue_de_Rivoli.jpg/600px-Paris_Commune_rue_de_Rivoli.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/54/Paris_Commune_rue_de_Rivoli.jpg/800px-Paris_Commune_rue_de_Rivoli.jpg 2x" width="392"></a></div></div><span data-dcnode-id="7647" instrument_node="">

</span><p data-dcnode-id="7618"><span data-dcnode-id="7635" instrument_node="">After the violent end of the </span><a data-dcnode-id="7633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Commune" title="Paris Commune"><span data-dcnode-id="7634" instrument_node="">Paris Commune</span></a><span data-dcnode-id="7632" instrument_node=""> in May 1871, the city was governed by </span><a data-dcnode-id="7630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martial_law" title="Martial law"><span data-dcnode-id="7631" instrument_node="">martial law</span></a><span data-dcnode-id="7629" instrument_node=""> under the strict surveillance of the national government. At the time, Paris was not actually the capital of France. The government and parliament had moved to </span><a data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Versailles%2C_Yvelines" title="Versailles, Yvelines"><span data-dcnode-id="7628" instrument_node="">Versailles</span></a><span data-dcnode-id="7626" instrument_node=""> in March 1871 once the Paris Commune took power, and they did not return to Paris until 1879, although the Senate returned earlier to its home in the </span><a data-dcnode-id="7624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Luxembourg_Palace" title="Luxembourg Palace"><span data-dcnode-id="7625" instrument_node="">Luxembourg Palace</span></a><span data-dcnode-id="7623" instrument_node="">.</span><sup class="reference" data-dcnode-id="7620" id="cite_ref-1"><a data-dcnode-id="7621" href="#cite_note-1"><span data-dcnode-id="7622" instrument_node="">[1]</span></a></sup><span data-dcnode-id="7619" instrument_node="">
</span></p><p data-dcnode-id="7573"><span data-dcnode-id="7617" instrument_node="">The end of the Commune left the city's population deeply divided. </span><a data-dcnode-id="7615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Flaubert" title="Gustave Flaubert"><span data-dcnode-id="7616" instrument_node="">Gustave Flaubert</span></a><span data-dcnode-id="7614" instrument_node=""> described the atmosphere in the city in early June 1871: "One half of the population of Paris wants to strangle the other half, and the other half has the same idea; you can read it in the eyes of people passing by." </span><sup class="reference" data-dcnode-id="7611" id="cite_ref-FOOTNOTEFierro1996204_2-0"><a data-dcnode-id="7612" href="#cite_note-FOOTNOTEFierro1996204-2"><span data-dcnode-id="7613" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7610" instrument_node=""> This sentiment soon became secondary to the need to reconstruct the buildings that had been destroyed in the last days of the Commune. The </span><a data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communards" title="Communards"><span data-dcnode-id="7609" instrument_node="">Communards</span></a><span data-dcnode-id="7607" instrument_node=""> had burned the </span><a data-dcnode-id="7605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%25C3%25B4tel_de_Ville%2C_Paris" title="Hôtel de Ville, Paris"><span data-dcnode-id="7606" instrument_node="">Hôtel de Ville</span></a><span data-dcnode-id="7604" instrument_node=""> (including all the city archives), the </span><a data-dcnode-id="7602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tuileries_Palace" title="Tuileries Palace"><span data-dcnode-id="7603" instrument_node="">Tuileries Palace</span></a><span data-dcnode-id="7601" instrument_node="">, the </span><a data-dcnode-id="7599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palais_de_Justice%2C_Paris" title="Palais de Justice, Paris"><span data-dcnode-id="7600" instrument_node="">Palais de Justice</span></a><span data-dcnode-id="7598" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="7596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prefecture_of_Police_of_Paris" title="Prefecture of Police of Paris"><span data-dcnode-id="7597" instrument_node="">Prefecture of Police</span></a><span data-dcnode-id="7595" instrument_node="">, the Ministry of Finances, the </span><a class="mw-redirect" data-dcnode-id="7593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cour_des_comptes_%28France%29" title="Cour des comptes (France)"><span data-dcnode-id="7594" instrument_node="">Cour des Comptes</span></a><span data-dcnode-id="7592" instrument_node="">, the State Council building at the </span><a data-dcnode-id="7590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palais-Royal" title="Palais-Royal"><span data-dcnode-id="7591" instrument_node="">Palais-Royal</span></a><span data-dcnode-id="7589" instrument_node="">, and many others. Several streets, particularly the </span><a data-dcnode-id="7587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rue_de_Rivoli" title="Rue de Rivoli"><span data-dcnode-id="7588" instrument_node="">Rue de Rivoli</span></a><span data-dcnode-id="7586" instrument_node="">, had also been badly damaged by the fighting.  Besides the cost of reconstruction, the new government was obliged to pay an </span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_indemnity" title="French indemnity"><span data-dcnode-id="7585" instrument_node="">indemnity</span></a><span data-dcnode-id="7583" instrument_node=""> of 210 million francs in gold to the victorious </span><a data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="7582" instrument_node="">German Empire</span></a><span data-dcnode-id="7580" instrument_node=""> as reparations for the disastrous </span><a data-dcnode-id="7578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-Prussian_War" title="Franco-Prussian War"><span data-dcnode-id="7579" instrument_node="">Franco-Prussian War</span></a><span data-dcnode-id="7577" instrument_node=""> of 1870. On 4 August 1871, at the first meeting of the city council after the Commune, the new Prefect of the Seine, </span><a data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9on_Say" title="Léon Say"><span data-dcnode-id="7576" instrument_node="">Léon Say</span></a><span data-dcnode-id="7574" instrument_node="">, put forward a plan to borrow 350 million francs for reconstruction and indemnity payments. The city's bankers and businessmen quickly raised the money, and the reconstruction was soon underway.
</span></p><p data-dcnode-id="7528"><span data-dcnode-id="7572" instrument_node="">The </span><a data-dcnode-id="7570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conseil_d%27%25C3%2589tat_%28France%29" title="Conseil d'État (France)"><span data-dcnode-id="7571" instrument_node="">Conseil d'État</span></a><span data-dcnode-id="7569" instrument_node=""> and </span><a data-dcnode-id="7567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palais_de_la_L%25C3%25A9gion_d%27Honneur" title="Palais de la Légion d'Honneur"><span data-dcnode-id="7568" instrument_node="">Palais de la Légion d'Honneur</span></a><span data-dcnode-id="7566" instrument_node=""> (Hôtel de Salm) were rebuilt in their original style. The new Hôtel de Ville was built on the lines of a more picturesque </span><a data-dcnode-id="7564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renaissance_Revival_architecture" title="Renaissance Revival architecture"><span data-dcnode-id="7565" instrument_node="">Neo-Renaissance</span></a><span data-dcnode-id="7563" instrument_node=""> style than the original that was based on the appearance of the </span><a data-dcnode-id="7561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ch%25C3%25A2teau_de_Chambord" title="Château de Chambord"><span data-dcnode-id="7562" instrument_node="">Château de Chambord</span></a><span data-dcnode-id="7560" instrument_node=""> in the </span><a data-dcnode-id="7558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loire_Valley" title="Loire Valley"><span data-dcnode-id="7559" instrument_node="">Loire Valley</span></a><span data-dcnode-id="7557" instrument_node="">, with a façade decorated with statues of outstanding personages who contributed to the history and fame of Paris. The destroyed Ministry of Finance on the Rue de Rivoli was replaced by a grand hotel, while the Ministry moved into the </span><a data-dcnode-id="7555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_III%2527s_Louvre_expansion" title="Napoleon III's Louvre expansion"><span data-dcnode-id="7556" instrument_node="">Richelieu wing</span></a><span data-dcnode-id="7554" instrument_node=""> of the </span><a data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louvre_Palace" title="Louvre Palace"><span data-dcnode-id="7553" instrument_node="">Louvre Palace</span></a><span data-dcnode-id="7551" instrument_node="">, where it remained until 1989. The ruined Cour des Comptes on the </span><a data-dcnode-id="7549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rive_Gauche" title="Rive Gauche"><span data-dcnode-id="7550" instrument_node="">Left Bank</span></a><span data-dcnode-id="7548" instrument_node=""> was replaced by the Gare d'Orléans, also known under the name </span><a data-dcnode-id="7546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_d%2527Orsay" title="Gare d'Orsay"><span data-dcnode-id="7547" instrument_node="">Gare d'Orsay</span></a><span data-dcnode-id="7545" instrument_node="">, now the </span><a data-dcnode-id="7543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_d%27Orsay" title="Musée d'Orsay"><span data-dcnode-id="7544" instrument_node="">Musée d'Orsay</span></a><span data-dcnode-id="7542" instrument_node="">. The one difficult decision was the Tuileries Palace, originally built in the 16th century by </span><a data-dcnode-id="7540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marie_de%2527_Medici" title="Marie de' Medici"><span data-dcnode-id="7541" instrument_node="">Marie de' Medici</span></a><span data-dcnode-id="7539" instrument_node=""> as a royal residence. The interior had been entirely destroyed by fire, but the walls were still largely intact. The walls remained standing for ten years while the fate of the ruins was debated. </span><a data-dcnode-id="7537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges-Eug%25C3%25A8ne_Haussmann" title="Georges-Eugène Haussmann"><span data-dcnode-id="7538" instrument_node="">Baron Haussmann</span></a><span data-dcnode-id="7536" instrument_node="">, in retirement, appealed for a restoration of the building as a historic monument, and there was a proposal to turn it into a new museum of modern art. In 1881, however, a new </span><a data-dcnode-id="7534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chamber_of_Deputies_%28France%29" title="Chamber of Deputies (France)"><span data-dcnode-id="7535" instrument_node="">Chamber of Deputies</span></a><span data-dcnode-id="7533" instrument_node=""> more sympathetic to the Commune than previous governments decided that it was too much a symbol of the monarchy and had the walls pulled down.</span><sup class="reference" data-dcnode-id="7530" id="cite_ref-FOOTNOTEHéron_de_Villefosse1959381–382_3-0"><a data-dcnode-id="7531" href="#cite_note-FOOTNOTEH%C3%A9ron_de_Villefosse1959381%E2%80%93382-3"><span data-dcnode-id="7532" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7529" instrument_node="">
</span></p><p data-dcnode-id="7513"><span data-dcnode-id="7527" instrument_node="">On 23 July 1873, the National Assembly (the legislature of the early French </span><a class="mw-redirect" data-dcnode-id="7525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Republic_%28France%29" title="Third Republic (France)"><span data-dcnode-id="7526" instrument_node="">Third Republic</span></a><span data-dcnode-id="7524" instrument_node=""> that was replaced by the Chamber of Deputies and a Senate in 1875) endorsed the project of building a basilica at the site where the uprising of the Paris Commune had begun. The gesture was intended as a symbolic means to atone for the sufferings of Paris during the Franco-Prussian War and the Commune. The </span><a data-dcnode-id="7522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sacr%25C3%25A9-C%25C5%2593ur%2C_Paris" title="Sacré-Cœur, Paris"><span data-dcnode-id="7523" instrument_node="">Basilica of Sacré-Cœur</span></a><span data-dcnode-id="7521" instrument_node=""> was subsequently built in a </span><a data-dcnode-id="7519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Revival_architecture" title="Byzantine Revival architecture"><span data-dcnode-id="7520" instrument_node="">Neo-Byzantine</span></a><span data-dcnode-id="7518" instrument_node=""> style and paid for by public subscription. It quickly became one of the most recognizable landmarks in Paris during construction, but was not finished until 1919.</span><sup class="reference" data-dcnode-id="7515" id="cite_ref-4"><a data-dcnode-id="7516" href="#cite_note-4"><span data-dcnode-id="7517" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7514" instrument_node="">
</span></p><span data-dcnode-id="7512" instrument_node="">
</span><h2 data-dcnode-id="7502"><span class="mw-headline" data-dcnode-id="7510" id="The_Parisians"><span data-dcnode-id="7511" instrument_node="">The Parisians</span></span><span class="mw-editsection" data-dcnode-id="7503"><span class="mw-editsection-bracket" data-dcnode-id="7508"><span data-dcnode-id="7509" instrument_node="">[</span></span><a data-dcnode-id="7506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D2" title="Edit section: The Parisians"><span data-dcnode-id="7507" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7504"><span data-dcnode-id="7505" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7501" instrument_node="">

</span><p data-dcnode-id="7397"><span data-dcnode-id="7414" instrument_node="">The population of Paris was 1,851,792 in 1872, at the beginning the </span><i data-dcnode-id="7412"><span data-dcnode-id="7413" instrument_node="">Belle Époque</span></i><span data-dcnode-id="7411" instrument_node="">. By 1911, it reached 2,888,107, higher than the population today. 
Near the end of the </span><a data-dcnode-id="7409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_French_Empire" title="Second French Empire"><span data-dcnode-id="7410" instrument_node="">Second Empire</span></a><span data-dcnode-id="7408" instrument_node=""> and the beginning of the </span><i data-dcnode-id="7406"><span data-dcnode-id="7407" instrument_node="">Belle Époque</span></i><span data-dcnode-id="7405" instrument_node="">, between 1866 and 1872, the population of Paris grew only 1.5 percent. Then the population surged by 14.09 percent between 1876 and 1881, only to slow down again to a 3.3 percent growth between 1881 and 1886.  After that, it grew very slowly until the end of the </span><i data-dcnode-id="7403"><span data-dcnode-id="7404" instrument_node="">Belle Époque</span></i><span data-dcnode-id="7402" instrument_node="">. It reached a historic high of almost three million persons in 1921 before beginning a long decline until the early 21st century.</span><sup class="reference" data-dcnode-id="7399" id="cite_ref-FOOTNOTEFierro1996282_5-0"><a data-dcnode-id="7400" href="#cite_note-FOOTNOTEFierro1996282-5"><span data-dcnode-id="7401" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7398" instrument_node="">
</span></p><p data-dcnode-id="7378"><span data-dcnode-id="7396" instrument_node="">In 1886, about one-third of the population of Paris (35.7 percent) had been born in Paris. More than half 56.3 percent) had been born in other </span><a data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Departments_of_France" title="Departments of France"><span data-dcnode-id="7395" instrument_node="">departments of France</span></a><span data-dcnode-id="7393" instrument_node=""> and about eight-percent outside France.</span><sup class="reference" data-dcnode-id="7390" id="cite_ref-FOOTNOTEMarchand1993134_6-0"><a data-dcnode-id="7391" href="#cite_note-FOOTNOTEMarchand1993134-6"><span data-dcnode-id="7392" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7389" instrument_node=""> In 1891, Paris was the most cosmopolitan of European capital cities, with seventy-five foreign-born residents for every thousand inhabitants. In comparison, there were only twenty-four per thousand in </span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint_Petersburg" title="Saint Petersburg"><span data-dcnode-id="7388" instrument_node="">Saint Petersburg</span></a><span data-dcnode-id="7386" instrument_node="">, twenty-two in London and Vienna, and eleven in Berlin. The largest communities of immigrants were Belgians, Germans, Italians and Swiss, with between twenty and twenty-eight thousand persons from each country. Followed by these were about ten thousand from Great Britain and an equal number from Russia; eight thousand from Luxembourg; six thousand South Americans; and five thousand Austrians. There were also 445 Africans, 439 Danes, 328 Portuguese and 298 Norwegians. Certain nationalities were concentrated in specific professions: Italians were concentrated in the businesses of making ceramics, shoes, sugar and conserves, whereas Germans were concentrated in leather-working, brewing, baking and </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charcuterie" title="Charcuterie"><span data-dcnode-id="7385" instrument_node="">charcuterie</span></a><span data-dcnode-id="7383" instrument_node="">. Swiss and Germans were predominant in businesses making watches and clocks and also accounted for a large proportion of the domestic servants.</span><sup class="reference" data-dcnode-id="7380" id="cite_ref-FOOTNOTEFierro1996305_7-0"><a data-dcnode-id="7381" href="#cite_note-FOOTNOTEFierro1996305-7"><span data-dcnode-id="7382" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7379" instrument_node="">
</span></p><p data-dcnode-id="7300"><span data-dcnode-id="7377" instrument_node="">The remnants of old Paris </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristocracy" title="Aristocracy"><span data-dcnode-id="7376" instrument_node="">aristocracy</span></a><span data-dcnode-id="7374" instrument_node=""> and the new aristocracy of bankers, financiers and entrepreneurs mostly had their residences in the </span><a data-dcnode-id="7372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/8th_arrondissement_of_Paris" title="8th arrondissement of Paris"><span data-dcnode-id="7373" instrument_node="">8th arrondissement</span></a><span data-dcnode-id="7371" instrument_node="">, from the </span><a data-dcnode-id="7369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champs-%25C3%2589lys%25C3%25A9es" title="Champs-Élysées"><span data-dcnode-id="7370" instrument_node="">Champs-Élysées</span></a><span data-dcnode-id="7368" instrument_node=""> to the </span><a data-dcnode-id="7366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Madeleine%2C_Paris" title="La Madeleine, Paris"><span data-dcnode-id="7367" instrument_node="">Madeleine</span></a><span data-dcnode-id="7365" instrument_node=""> church; in the </span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/8th_arrondissement_of_Paris" title="8th arrondissement of Paris"><span data-dcnode-id="7364" instrument_node="">"Quartier de l'Europe"</span></a><span data-dcnode-id="7362" instrument_node=""> and "Butte Chaillot" (now the area of the </span><a data-dcnode-id="7360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_Charles_de_Gaulle" title="Place Charles de Gaulle"><span data-dcnode-id="7361" instrument_node="">Place Charles de Gaulle</span></a><span data-dcnode-id="7359" instrument_node="">; the </span><a class="mw-redirect" data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faubourg_Saint-Honor%25C3%25A9" title="Faubourg Saint-Honoré"><span data-dcnode-id="7358" instrument_node="">Faubourg Saint-Honoré</span></a><span data-dcnode-id="7356" instrument_node="">; the </span><a data-dcnode-id="7354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/9th_arrondissement_of_Paris" title="9th arrondissement of Paris"><span data-dcnode-id="7355" instrument_node="">"Quartier Saint-Georges"</span></a><span data-dcnode-id="7353" instrument_node="">, from the Rue Vivienne and the Palais-Royal to Roule; and the </span><a data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/17th_arrondissement_of_Paris" title="17th arrondissement of Paris"><span data-dcnode-id="7352" instrument_node="">Plain of Monceau</span></a><span data-dcnode-id="7350" instrument_node="">. On the </span><a data-dcnode-id="7348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rive_Droite" title="Rive Droite"><span data-dcnode-id="7349" instrument_node="">Right Bank</span></a><span data-dcnode-id="7347" instrument_node="">, they lived in </span><a class="mw-redirect" data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Marais" title="Le Marais"><span data-dcnode-id="7346" instrument_node="">Le Marais</span></a><span data-dcnode-id="7344" instrument_node="">. On the Left Bank, they lived on the south of the </span><a data-dcnode-id="7342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_Quarter%2C_Paris" title="Latin Quarter, Paris"><span data-dcnode-id="7343" instrument_node="">Latin Quarter</span></a><span data-dcnode-id="7341" instrument_node="">, at </span><a data-dcnode-id="7339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/6th_arrondissement_of_Paris" title="6th arrondissement of Paris"><span data-dcnode-id="7340" instrument_node="">Notre-Dame-des-Champs and Odéon</span></a><span data-dcnode-id="7338" instrument_node="">; near </span><a data-dcnode-id="7336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Les_Invalides" title="Les Invalides"><span data-dcnode-id="7337" instrument_node="">Les Invalides</span></a><span data-dcnode-id="7335" instrument_node="">; and at the </span><a class="mw-redirect" data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_Militaire" title="École Militaire"><span data-dcnode-id="7334" instrument_node="">École Militaire</span></a><span data-dcnode-id="7332" instrument_node="">. The less affluent shop owners lived from the </span><a data-dcnode-id="7330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porte_Saint-Denis" title="Porte Saint-Denis"><span data-dcnode-id="7331" instrument_node="">Porte Saint-Denis</span></a><span data-dcnode-id="7329" instrument_node=""> to </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Les_Halles" title="Les Halles"><span data-dcnode-id="7328" instrument_node="">Les Halles</span></a><span data-dcnode-id="7326" instrument_node=""> to the west of the </span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_de_S%25C3%25A9bastopol" title="Boulevard de Sébastopol"><span data-dcnode-id="7325" instrument_node="">Boulevard de Sébastopol</span></a><span data-dcnode-id="7323" instrument_node="">. The middle class employees of enterprises, small businesses and government lived closer to the center of the city along the </span><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevards_of_Paris" title="Boulevards of Paris"><span data-dcnode-id="7322" instrument_node="">"Grands Boulevards"</span></a><span data-dcnode-id="7320" instrument_node="">; in the </span><a data-dcnode-id="7318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/10th_arrondissement_of_Paris" title="10th arrondissement of Paris"><span data-dcnode-id="7319" instrument_node="">10th arrondissement</span></a><span data-dcnode-id="7317" instrument_node="">; in the </span><a data-dcnode-id="7315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1st_arrondissement_of_Paris" title="1st arrondissement of Paris"><span data-dcnode-id="7316" instrument_node="">1st</span></a><span data-dcnode-id="7314" instrument_node=""> and </span><a data-dcnode-id="7312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2nd_arrondissement_of_Paris" title="2nd arrondissement of Paris"><span data-dcnode-id="7313" instrument_node="">2nd arrondissements</span></a><span data-dcnode-id="7311" instrument_node=""> near the </span><a class="mw-redirect" data-dcnode-id="7309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Bourse" title="Paris Bourse"><span data-dcnode-id="7310" instrument_node="">Paris Bourse</span></a><span data-dcnode-id="7308" instrument_node=""> (Stock Exchange); in the </span><a data-dcnode-id="7306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sentier" title="Sentier"><span data-dcnode-id="7307" instrument_node="">Sentier</span></a><span data-dcnode-id="7305" instrument_node=""> quarter near Les Halles; and in Le Marais.</span><sup class="reference" data-dcnode-id="7302" id="cite_ref-FOOTNOTEMarchand1993129_8-0"><a data-dcnode-id="7303" href="#cite_note-FOOTNOTEMarchand1993129-8"><span data-dcnode-id="7304" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7301" instrument_node="">
</span></p><p data-dcnode-id="7255"><span data-dcnode-id="7299" instrument_node="">Under </span><a data-dcnode-id="7297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_III" title="Napoleon III"><span data-dcnode-id="7298" instrument_node="">Napoleon III</span></a><span data-dcnode-id="7296" instrument_node="">, Baron </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges-Eug%25C3%25A8ne_Haussmann" title="Georges-Eugène Haussmann"><span data-dcnode-id="7295" instrument_node="">Haussmann</span></a><span data-dcnode-id="7293" instrument_node=""> demolished the poorest, most crowded and historical neighborhoods in the center of the city to make room for the new boulevards and squares. The working-class Parisians moved out of the center toward the edges of the city, particularly to </span><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belleville%2C_Paris" title="Belleville, Paris"><span data-dcnode-id="7292" instrument_node="">Belleville</span></a><span data-dcnode-id="7290" instrument_node=""> and </span><a data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25A9nilmontant" title="Ménilmontant"><span data-dcnode-id="7289" instrument_node="">Ménilmontant</span></a><span data-dcnode-id="7287" instrument_node=""> in the east; to </span><a data-dcnode-id="7285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/18th_arrondissement_of_Paris" title="18th arrondissement of Paris"><span data-dcnode-id="7286" instrument_node="">Clignancourt</span></a><span data-dcnode-id="7284" instrument_node=""> and the </span><a data-dcnode-id="7282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quartier_des_Grandes-Carri%25C3%25A8res" title="Quartier des Grandes-Carrières"><span data-dcnode-id="7283" instrument_node="">Quartier des Grandes-Carrières</span></a><span data-dcnode-id="7281" instrument_node=""> to the north; and on the Left Bank to the area around the </span><a data-dcnode-id="7279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_d%2527Austerlitz" title="Gare d'Austerlitz"><span data-dcnode-id="7280" instrument_node="">Gare d'Austerlitz</span></a><span data-dcnode-id="7278" instrument_node="">, </span><a data-dcnode-id="7276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Javel%2C_France" title="Javel, France"><span data-dcnode-id="7277" instrument_node="">Javel</span></a><span data-dcnode-id="7275" instrument_node=""> and </span><a data-dcnode-id="7273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grenelle" title="Grenelle"><span data-dcnode-id="7274" instrument_node="">Grenelle</span></a><span data-dcnode-id="7272" instrument_node="">, usually to neighborhoods that were close to their places of work. Small quarters of working-class Parisians still remained in the center of the city, mainly on the sides of the </span><a data-dcnode-id="7270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montagne_Sainte-Genevi%25C3%25A8ve" title="Montagne Sainte-Geneviève"><span data-dcnode-id="7271" instrument_node="">Montagne Sainte-Geneviève</span></a><span data-dcnode-id="7269" instrument_node=""> in the Latin Quarter near the </span><a data-dcnode-id="7267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sorbonne" title="Sorbonne"><span data-dcnode-id="7268" instrument_node="">Sorbonne</span></a><span data-dcnode-id="7266" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="7264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jardin_des_Plantes" title="Jardin des Plantes"><span data-dcnode-id="7265" instrument_node="">Jardin des Plantes</span></a><span data-dcnode-id="7263" instrument_node="">, and along the covered </span><a data-dcnode-id="7261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bi%25C3%25A8vre_%28river%29" title="Bièvre (river)"><span data-dcnode-id="7262" instrument_node="">Bièvre River</span></a><span data-dcnode-id="7260" instrument_node="">, where the tanneries had been located for centuries.</span><sup class="reference" data-dcnode-id="7257" id="cite_ref-FOOTNOTEMarchand1993132_9-0"><a data-dcnode-id="7258" href="#cite_note-FOOTNOTEMarchand1993132-9"><span data-dcnode-id="7259" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7256" instrument_node="">
</span></p><p data-dcnode-id="7237"><span data-dcnode-id="7254" instrument_node="">Paris was both the richest and poorest city in France. Twenty-four percent of the wealth in France was found in the </span><a data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seine_%28department%29" title="Seine (department)"><span data-dcnode-id="7253" instrument_node="">Seine department</span></a><span data-dcnode-id="7251" instrument_node="">, but fifty-five percent of burials of Parisians were made in the section for those unable to pay. In 1878, two-thirds of Parisians paid less than 300 francs a year for their lodging, a very small amount at the time. An 1882 study of Parisians, based on funeral costs, concluded that twenty-seven percent of Parisians were upper or middle class, while seventy-three percent were poor or indigent. Incomes varied greatly according to the neighborhood: in the 8th arrondissement, there were eight poor persons for ten upper or middle class residents; in the </span><a data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/13th_arrondissement_of_Paris" title="13th arrondissement of Paris"><span data-dcnode-id="7250" instrument_node="">13th</span></a><span data-dcnode-id="7248" instrument_node="">, </span><a data-dcnode-id="7246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/19th_arrondissement_of_Paris" title="19th arrondissement of Paris"><span data-dcnode-id="7247" instrument_node="">19th</span></a><span data-dcnode-id="7245" instrument_node=""> and </span><a data-dcnode-id="7243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th_arrondissement_of_Paris" title="20th arrondissement of Paris"><span data-dcnode-id="7244" instrument_node="">20th</span></a><span data-dcnode-id="7242" instrument_node=""> arrondissements, there were seven or eight poor for every well-off resident. </span><sup class="reference" data-dcnode-id="7239" id="cite_ref-FOOTNOTEMarchand1993207_10-0"><a data-dcnode-id="7240" href="#cite_note-FOOTNOTEMarchand1993207-10"><span data-dcnode-id="7241" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7238" instrument_node="">
</span></p><span data-dcnode-id="7236" instrument_node="">
</span><h3 data-dcnode-id="7223"><span class="mw-headline" data-dcnode-id="7231" id="The_Apaches_of_Paris"><span data-dcnode-id="7235" instrument_node="">The </span><i data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">Apaches</span></i><span data-dcnode-id="7232" instrument_node=""> of Paris</span></span><span class="mw-editsection" data-dcnode-id="7224"><span class="mw-editsection-bracket" data-dcnode-id="7229"><span data-dcnode-id="7230" instrument_node="">[</span></span><a data-dcnode-id="7227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D3" title="Edit section: The Apaches of Paris"><span data-dcnode-id="7228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7225"><span data-dcnode-id="7226" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7222" instrument_node="">
</span><p data-dcnode-id="7200"><a data-dcnode-id="7219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apaches_%28subculture%29" title="Apaches (subculture)"><i data-dcnode-id="7220"><span data-dcnode-id="7221" instrument_node="">Apaches</span></i></a><span data-dcnode-id="7218" instrument_node=""> was a term that was introduced by Paris newspapers in 1902 for young Parisians who engaged in petty crime and sometimes fought each other or the police. They usually lived in </span><a data-dcnode-id="7216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belleville%2C_Paris" title="Belleville, Paris"><span data-dcnode-id="7217" instrument_node="">Belleville</span></a><span data-dcnode-id="7215" instrument_node=""> and </span><a data-dcnode-id="7213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charonne_quarter" title="Charonne quarter"><span data-dcnode-id="7214" instrument_node="">Charonne</span></a><span data-dcnode-id="7212" instrument_node="">. Their activities were described in lurid terms by the popular press, and they were blamed for all varieties of crime in the city. In September 1907, the newspaper </span><i data-dcnode-id="7209"><a data-dcnode-id="7210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Gaulois" title="Le Gaulois"><span data-dcnode-id="7211" instrument_node="">Le Gaulois</span></a></i><span data-dcnode-id="7208" instrument_node=""> described an </span><i data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">Apache</span></i><span data-dcnode-id="7205" instrument_node=""> as "the man who lives on the margin of society, ready to do anything, except to take a regular job, the miserable who breaks in a doorway, or stabs a passer-by for nothing, just for pleasure."</span><sup class="reference" data-dcnode-id="7202" id="cite_ref-FOOTNOTEFierro1996676_11-0"><a data-dcnode-id="7203" href="#cite_note-FOOTNOTEFierro1996676-11"><span data-dcnode-id="7204" instrument_node="">[11]</span></a></sup><span data-dcnode-id="7201" instrument_node="">
</span></p><span data-dcnode-id="7199" instrument_node="">
</span><h2 data-dcnode-id="7189"><span class="mw-headline" data-dcnode-id="7197" id="Government_and_politics"><span data-dcnode-id="7198" instrument_node="">Government and politics</span></span><span class="mw-editsection" data-dcnode-id="7190"><span class="mw-editsection-bracket" data-dcnode-id="7195"><span data-dcnode-id="7196" instrument_node="">[</span></span><a data-dcnode-id="7193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D4" title="Edit section: Government and politics"><span data-dcnode-id="7194" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7191"><span data-dcnode-id="7192" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7188" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7179"><div class="thumbinner" data-dcnode-id="7180" style="width:302px;"><a class="image" data-dcnode-id="7186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AConseil_municipal_de_Paris_1889.jpg"><img alt="" class="thumbimage" data-dcnode-id="7187" data-file-height="1119" data-file-width="1677" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Conseil_municipal_de_Paris_1889.jpg/300px-Conseil_municipal_de_Paris_1889.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Conseil_municipal_de_Paris_1889.jpg/450px-Conseil_municipal_de_Paris_1889.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Conseil_municipal_de_Paris_1889.jpg/600px-Conseil_municipal_de_Paris_1889.jpg 2x" width="300"></a><span data-dcnode-id="7185" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7181"><div class="magnify" data-dcnode-id="7183"><a class="internal" data-dcnode-id="7184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AConseil_municipal_de_Paris_1889.jpg" title="Enlarge"></a></div><span data-dcnode-id="7182" instrument_node="">A meeting of the Paris Municipal Council (1889)</span></div></div></div><span data-dcnode-id="7178" instrument_node="">
</span><p data-dcnode-id="7172"><span data-dcnode-id="7177" instrument_node="">After the Commune took over the municipal government of Paris in March 1871, the French national government concluded that Paris was too important to be run by the Parisians alone. On 14 April 1871, just before the end of the Commune, the National Assembly, meeting in Versailles, passed a new law giving Paris a special status different from other French cities and subordinate to the national government.  All male Parisians could vote. The city was given a municipal council of eighty members, four from each arrondissement, for a term of three years. The council could meet for four sessions a year, none longer than ten days, except when considering the budget, when six weeks were allowed. There was no elected mayor. The real powers in the city remained the Prefect of the Seine and the Prefect of Police, both appointed by the national government.</span><sup class="reference" data-dcnode-id="7174" id="cite_ref-FOOTNOTEFierro1996331_12-0"><a data-dcnode-id="7175" href="#cite_note-FOOTNOTEFierro1996331-12"><span data-dcnode-id="7176" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7173" instrument_node="">
</span></p><p data-dcnode-id="7133"><span data-dcnode-id="7171" instrument_node="">The first legislative elections after the Commune, on 7 January 1872, were won by the conservative candidates. </span><a data-dcnode-id="7169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="7170" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="7168" instrument_node="">, running as an independent candidate on the side of the radical republicans, was soundly defeated.</span><sup class="reference" data-dcnode-id="7165" id="cite_ref-FOOTNOTEFierro1996205_13-0"><a data-dcnode-id="7166" href="#cite_note-FOOTNOTEFierro1996205-13"><span data-dcnode-id="7167" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7164" instrument_node=""> In the Paris municipal elections of 1878, however, the radical Republicans were overwhelmingly victorious, winning 75 of the 80 municipal council seats. In 1879, they changed the name of many of the Paris streets and squares. The "Place du Château-d’Eau" became the </span><a data-dcnode-id="7162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_R%25C3%25A9publique" title="Place de la République"><span data-dcnode-id="7163" instrument_node="">Place de la République</span></a><span data-dcnode-id="7161" instrument_node="">, and a statue of the Republic was placed in the center in 1883. The avenues "de la Reine-Hortense" (named for the mother of Napoleon III, </span><a data-dcnode-id="7159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hortense_de_Beauharnais" title="Hortense de Beauharnais"><span data-dcnode-id="7160" instrument_node="">Hortense de Beauharnais</span></a><span data-dcnode-id="7158" instrument_node="">), "Joséphine" (name for the wife of Napoleon I, </span><a class="mw-redirect" data-dcnode-id="7156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9phine_de_Beauharnais" title="Joséphine de Beauharnais"><span data-dcnode-id="7157" instrument_node="">Joséphine de Beauharnais</span></a><span data-dcnode-id="7155" instrument_node="">), and "Roi-de-Rome" (named for </span><a data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_II" title="Napoleon II"><span data-dcnode-id="7154" instrument_node="">Napoleon II</span></a><span data-dcnode-id="7152" instrument_node="">), were renamed </span><a data-dcnode-id="7150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_Hoche" title="Avenue Hoche"><span data-dcnode-id="7151" instrument_node="">Avenue Hoche</span></a><span data-dcnode-id="7149" instrument_node="">, Avenue Marceau, and </span><a data-dcnode-id="7147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_Kl%25C3%25A9ber" title="Avenue Kléber"><span data-dcnode-id="7148" instrument_node="">Avenue Kléber</span></a><span data-dcnode-id="7146" instrument_node="">, after generals who served during the period of the </span><a data-dcnode-id="7144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Revolution" title="French Revolution"><span data-dcnode-id="7145" instrument_node="">French Revolution</span></a><span data-dcnode-id="7143" instrument_node="">: </span><a data-dcnode-id="7141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lazare_Hoche" title="Lazare Hoche"><span data-dcnode-id="7142" instrument_node="">Lazare Hoche</span></a><span data-dcnode-id="7140" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_S%25C3%25A9verin_Marceau-Desgraviers" title="François Séverin Marceau-Desgraviers"><span data-dcnode-id="7139" instrument_node="">François Séverin Marceau-Desgraviers</span></a><span data-dcnode-id="7137" instrument_node="">, and </span><a data-dcnode-id="7135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Baptiste_Kl%25C3%25A9ber" title="Jean-Baptiste Kléber"><span data-dcnode-id="7136" instrument_node="">Jean-Baptiste Kléber</span></a><span data-dcnode-id="7134" instrument_node="">.
</span></p><p data-dcnode-id="7092"><span data-dcnode-id="7132" instrument_node="">The burning of the Tuileries Palace by the Commune meant that there was no longer a residence for the French </span><a data-dcnode-id="7130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Head_of_state" title="Head of state"><span data-dcnode-id="7131" instrument_node="">head of state</span></a><span data-dcnode-id="7129" instrument_node="">. The </span><a data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589lys%25C3%25A9e_Palace" title="Élysée Palace"><span data-dcnode-id="7128" instrument_node="">Élysée Palace</span></a><span data-dcnode-id="7126" instrument_node=""> was chosen as the new residence in 1873. It was built between 1718 and 1722 by the architect Armand-Claude Mollet for </span><a data-dcnode-id="7124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Henri_de_La_Tour_d%2527Auvergne" title="Louis Henri de La Tour d'Auvergne"><span data-dcnode-id="7125" instrument_node="">Louis Henri de La Tour d'Auvergne</span></a><span data-dcnode-id="7123" instrument_node="">, </span><a data-dcnode-id="7121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Count_of_%25C3%2589vreux" title="Count of Évreux"><span data-dcnode-id="7122" instrument_node="">Count of Évreux</span></a><span data-dcnode-id="7120" instrument_node="">, then purchased in 1753 by King </span><a class="mw-redirect" data-dcnode-id="7118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_XV_of_France" title="Louis XV of France"><span data-dcnode-id="7119" instrument_node="">Lous XV</span></a><span data-dcnode-id="7117" instrument_node=""> for his mistress, the </span><a class="mw-redirect" data-dcnode-id="7115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marquise_de_Pompadour" title="Marquise de Pompadour"><span data-dcnode-id="7116" instrument_node="">Marquise de Pompadour</span></a><span data-dcnode-id="7114" instrument_node="">. During the period of the </span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Consulate" title="French Consulate"><span data-dcnode-id="7113" instrument_node="">French Consulate</span></a><span data-dcnode-id="7111" instrument_node="">, it was owned by </span><a data-dcnode-id="7109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joachim_Murat" title="Joachim Murat"><span data-dcnode-id="7110" instrument_node="">Joachim Murat</span></a><span data-dcnode-id="7108" instrument_node="">, one of Napoleon's marshals. In 1805, </span><a data-dcnode-id="7106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon" title="Napoleon"><span data-dcnode-id="7107" instrument_node="">Napoleon</span></a><span data-dcnode-id="7105" instrument_node=""> made it one of his imperial residences, and it became the official presidential residence when his nephew, </span><a data-dcnode-id="7103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon_III" title="Napoleon III"><span data-dcnode-id="7104" instrument_node="">Louis-Napoléon</span></a><span data-dcnode-id="7102" instrument_node="">, the future Emperor Napoleon III, became President of the </span><a data-dcnode-id="7100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Second_Republic" title="French Second Republic"><span data-dcnode-id="7101" instrument_node="">Second Republic</span></a><span data-dcnode-id="7099" instrument_node="">. During the </span><a data-dcnode-id="7097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourbon_Restoration_in_France" title="Bourbon Restoration in France"><span data-dcnode-id="7098" instrument_node="">Bourbon Restoration</span></a><span data-dcnode-id="7096" instrument_node=""> of 1815–30, the Élysée gardens were a popular amusement park. The Élysée Palace had no large room for ceremonial events, so a large ballroom was added during the </span><a data-dcnode-id="7094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="7095" instrument_node="">Third Republic</span></a><span data-dcnode-id="7093" instrument_node="">.
</span></p><p data-dcnode-id="7071"><span data-dcnode-id="7091" instrument_node="">The most memorable Parisian civic event during the period was the funeral of </span><a data-dcnode-id="7089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="7090" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="7088" instrument_node=""> in 1885. Hundreds of thousands of Parisians lined the </span><a data-dcnode-id="7086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champs-%25C3%2589lys%25C3%25A9es" title="Champs-Élysées"><span data-dcnode-id="7087" instrument_node="">Champs-Élysées</span></a><span data-dcnode-id="7085" instrument_node=""> to see the passage of his coffin. The </span><a data-dcnode-id="7083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arc_de_Triomphe" title="Arc de Triomphe"><span data-dcnode-id="7084" instrument_node="">Arc de Triomphe</span></a><span data-dcnode-id="7082" instrument_node=""> was draped in black. The remains of the writer were placed in the </span><a data-dcnode-id="7080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panth%25C3%25A9on" title="Panthéon"><span data-dcnode-id="7081" instrument_node="">Panthéon</span></a><span data-dcnode-id="7079" instrument_node="">, formerly the Church of Saint-Geneviève, which had been turned into a </span><a data-dcnode-id="7077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mausoleum" title="Mausoleum"><span data-dcnode-id="7078" instrument_node="">mausoleum</span></a><span data-dcnode-id="7076" instrument_node=""> for great Frenchmen during the French Revolution, then turned back into a church in April 1816, during the Bourbon Restoration. After several changes during the 19th century, it was secularized again in 1885 for the occasion of Victor Hugo's funeral.</span><sup class="reference" data-dcnode-id="7073" id="cite_ref-FOOTNOTECombeau201372–73_14-0"><a data-dcnode-id="7074" href="#cite_note-FOOTNOTECombeau201372%E2%80%9373-14"><span data-dcnode-id="7075" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7072" instrument_node="">
</span></p><span data-dcnode-id="7070" instrument_node="">
</span><h3 data-dcnode-id="7059"><span data-dcnode-id="7069" id="Social_unrest.2C_anarchists_and_the_Boulanger_crisis"></span><span class="mw-headline" data-dcnode-id="7067" id="Social_unrest,_anarchists_and_the_Boulanger_crisis"><span data-dcnode-id="7068" instrument_node="">Social unrest, anarchists and the Boulanger crisis</span></span><span class="mw-editsection" data-dcnode-id="7060"><span class="mw-editsection-bracket" data-dcnode-id="7065"><span data-dcnode-id="7066" instrument_node="">[</span></span><a data-dcnode-id="7063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D5" title="Edit section: Social unrest, anarchists and the Boulanger crisis"><span data-dcnode-id="7064" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7061"><span data-dcnode-id="7062" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7058" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7046"><div class="thumbinner" data-dcnode-id="7047" style="width:252px;"><a class="image" data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1ermai1890.jpg"><img alt="" class="thumbimage" data-dcnode-id="7057" data-file-height="1481" data-file-width="1263" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/70/1ermai1890.jpg/250px-1ermai1890.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/70/1ermai1890.jpg/375px-1ermai1890.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/70/1ermai1890.jpg/500px-1ermai1890.jpg 2x" width="250"></a><span data-dcnode-id="7055" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7048"><div class="magnify" data-dcnode-id="7053"><a class="internal" data-dcnode-id="7054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1ermai1890.jpg" title="Enlarge"></a></div><span data-dcnode-id="7052" instrument_node="">May Day battles between socialist workers and police on the </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_Concorde" title="Place de la Concorde"><span data-dcnode-id="7051" instrument_node="">Place de la Concorde</span></a><span data-dcnode-id="7049" instrument_node=""> (1890)</span></div></div></div><span data-dcnode-id="7045" instrument_node="">
</span><p data-dcnode-id="7033"><span data-dcnode-id="7044" instrument_node="">The </span><i data-dcnode-id="7042"><span data-dcnode-id="7043" instrument_node="">Belle Époque</span></i><span data-dcnode-id="7041" instrument_node=""> was spared the violent uprisings that brought down two French regimes in the 19th century, but it had its share of political and social conflicts and occasional violence. Labor unions and strikes had been legalized during the regime of Napoleon III. The first labor union congress in Paris took place in October 1876,</span><sup class="reference" data-dcnode-id="7038" id="cite_ref-15"><a data-dcnode-id="7039" href="#cite_note-15"><span data-dcnode-id="7040" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7037" instrument_node=""> and the socialist party recruited many members among the Paris workers. On May 1, 1890, the socialists organized the first celebration of </span><a data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/May_Day" title="May Day"><span data-dcnode-id="7036" instrument_node="">May Day</span></a><span data-dcnode-id="7034" instrument_node="">, the international day of labor. Since it was an unauthorized celebration, it led to confrontations between police and demonstrators.
</span></p><p data-dcnode-id="7009"><span data-dcnode-id="7032" instrument_node="">The majority of political violence came from the </span><a class="mw-redirect" data-dcnode-id="7030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchist" title="Anarchist"><span data-dcnode-id="7031" instrument_node="">anarchist</span></a><span data-dcnode-id="7029" instrument_node=""> movement of the 1890s. The first attack was organized by an anarchist named </span><a data-dcnode-id="7027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ravachol" title="Ravachol"><span data-dcnode-id="7028" instrument_node="">Ravachol</span></a><span data-dcnode-id="7026" instrument_node="">, who set off bombs at three residences of wealthy Parisians. On April 25, he set off a bomb at the Restaurant Véry at the Palais-Royal and was arrested. On 8 November, anarchists planted a bomb in the office of the Compagnie Minière et Métallurgique, a mining company, on the </span><a data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_de_l%27Op%25C3%25A9ra" title="Avenue de l'Opéra"><span data-dcnode-id="7025" instrument_node="">Avenue de l'Opéra</span></a><span data-dcnode-id="7023" instrument_node="">. The police found the bomb, but when it was taken to the police headquarters, it exploded, killing six persons. On 6 December, an anarchist named </span><a data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Vaillant" title="Auguste Vaillant"><span data-dcnode-id="7022" instrument_node="">Auguste Vaillant</span></a><span data-dcnode-id="7020" instrument_node=""> set off a bomb in the building of the National Assembly that wounded forty-six persons. On 12 February 1894, an anarchist named </span><a data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Henry_%28anarchist%29" title="Émile Henry (anarchist)"><span data-dcnode-id="7019" instrument_node="">Émile Henry</span></a><span data-dcnode-id="7017" instrument_node=""> set off a bomb at the café of the Hôtel Terminus next to the </span><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_Saint-Lazare" title="Gare Saint-Lazare"><span data-dcnode-id="7016" instrument_node="">Gare Saint-Lazare</span></a><span data-dcnode-id="7014" instrument_node=""> that killed one person and wounded seventy-nine.</span><sup class="reference" data-dcnode-id="7011" id="cite_ref-FOOTNOTEFierro1996631–634_16-0"><a data-dcnode-id="7012" href="#cite_note-FOOTNOTEFierro1996631%E2%80%93634-16"><span data-dcnode-id="7013" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7010" instrument_node="">
</span></p><span data-dcnode-id="7008" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6999"><div class="thumbinner" data-dcnode-id="7000" style="width:352px;"><a class="image" data-dcnode-id="7006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1891_-_Gr%25C3%25A8ve_des_transports.jpg"><img alt="" class="thumbimage" data-dcnode-id="7007" data-file-height="1042" data-file-width="1499" decoding="async" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/1891_-_Gr%25C3%25A8ve_des_transports.jpg/350px-1891_-_Gr%25C3%25A8ve_des_transports.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/1891_-_Gr%C3%A8ve_des_transports.jpg/525px-1891_-_Gr%C3%A8ve_des_transports.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c1/1891_-_Gr%C3%A8ve_des_transports.jpg/700px-1891_-_Gr%C3%A8ve_des_transports.jpg 2x" width="350"></a><span data-dcnode-id="7005" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7001"><div class="magnify" data-dcnode-id="7003"><a class="internal" data-dcnode-id="7004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1891_-_Gr%25C3%25A8ve_des_transports.jpg" title="Enlarge"></a></div><span data-dcnode-id="7002" instrument_node="">A transit strike in 1891</span></div></div></div><span data-dcnode-id="6998" instrument_node="">
</span><p data-dcnode-id="6974"><span data-dcnode-id="6997" instrument_node="">Another political crisis shook Paris beginning on 2 December 1887, when the president of the republic, </span><a data-dcnode-id="6995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Gr%25C3%25A9vy" title="Jules Grévy"><span data-dcnode-id="6996" instrument_node="">Jules Grévy</span></a><span data-dcnode-id="6994" instrument_node="">, was forced to resign when it was discovered that he had been selling the nation's highest award, the </span><a data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legion_of_Honour" title="Legion of Honour"><span data-dcnode-id="6993" instrument_node="">Legion of Honour</span></a><span data-dcnode-id="6991" instrument_node="">. A popular general, </span><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Ernest_Boulanger" title="Georges Ernest Boulanger"><span data-dcnode-id="6990" instrument_node="">Georges Ernest Boulanger</span></a><span data-dcnode-id="6988" instrument_node="">, had his name put forward as a potential new leader. He became known as "the man on horseback" because of images of him on his black horse. He was supported by ardent nationalists who wanted a war with Germany to take back </span><a data-dcnode-id="6986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alsace" title="Alsace"><span data-dcnode-id="6987" instrument_node="">Alsace</span></a><span data-dcnode-id="6985" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lorraine_%28region%29" title="Lorraine (region)"><span data-dcnode-id="6984" instrument_node="">Lorraine</span></a><span data-dcnode-id="6982" instrument_node="">, which were lost in the </span><a data-dcnode-id="6980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-Prussian_War" title="Franco-Prussian War"><span data-dcnode-id="6981" instrument_node="">1870 Franco-Prussian War</span></a><span data-dcnode-id="6979" instrument_node="">. Monarchist politicians began to promote Boulanger as a potential new leader who could dissolve the parliament, become president, recover the lost provinces and restore the French monarchy. Boulanger was elected to parliament in 1888, and his followers urged him to go to the Élysée Palace and declare himself president; but he refused, saying that he could win the office legally in a few months. However, the wave of enthusiasm for Boulanger quickly faded away, and he went into voluntary exile. The government of the Third Republic remained firmly in place.</span><sup class="reference" data-dcnode-id="6976" id="cite_ref-FOOTNOTEFierro1996208–210_17-0"><a data-dcnode-id="6977" href="#cite_note-FOOTNOTEFierro1996208%E2%80%93210-17"><span data-dcnode-id="6978" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6975" instrument_node="">
</span></p><span data-dcnode-id="6973" instrument_node="">
</span><h3 data-dcnode-id="6963"><span class="mw-headline" data-dcnode-id="6971" id="The_Police"><span data-dcnode-id="6972" instrument_node="">The Police</span></span><span class="mw-editsection" data-dcnode-id="6964"><span class="mw-editsection-bracket" data-dcnode-id="6969"><span data-dcnode-id="6970" instrument_node="">[</span></span><a data-dcnode-id="6967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D6" title="Edit section: The Police"><span data-dcnode-id="6968" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6965"><span data-dcnode-id="6966" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6962" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6950"><div class="thumbinner" data-dcnode-id="6951" style="width:252px;"><a class="image" data-dcnode-id="6960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg"><img alt="" class="thumbimage" data-dcnode-id="6961" data-file-height="870" data-file-width="681" decoding="async" height="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg/250px-Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg/375px-Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg/500px-Charles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg 2x" width="250"></a><span data-dcnode-id="6959" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6952"><div class="magnify" data-dcnode-id="6957"><a class="internal" data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACharles-Gustave_Housez_La_petite_fille_perdue_dans_Paris_1877.jpg" title="Enlarge"></a></div><span data-dcnode-id="6956" instrument_node="">Policemen helping a lost little girl in the painting </span><i data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">La petite fille perdue dans Paris</span></i><span data-dcnode-id="6953" instrument_node=""> by Charles-Gustave Housez (1877)</span></div></div></div><span data-dcnode-id="6949" instrument_node="">
</span><p data-dcnode-id="6918"><span data-dcnode-id="6948" instrument_node="">The Paris police force was completely re-organized after the fall of Napoleon III and the Commune; the </span><i data-dcnode-id="6946"><span data-dcnode-id="6947" instrument_node="">sergents de ville</span></i><span data-dcnode-id="6945" instrument_node=""> were replaced by the </span><i data-dcnode-id="6943"><span data-dcnode-id="6944" instrument_node="">gardiens de la paix publique</span></i><span data-dcnode-id="6942" instrument_node=""> (Guardians of the Public Peace), which by June 1871 had 7,756 men under the authority of the Prefect of Police named by the national government. Following a series of anarchist bombings in 1892, the number was increased to 7,000 guardians, 80 </span><i data-dcnode-id="6939"><a data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brigadier" title="Brigadier"><span data-dcnode-id="6941" instrument_node="">brigadiers</span></a></i><span data-dcnode-id="6938" instrument_node=""> and 950 </span><i data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">sous-brigadiers</span></i><span data-dcnode-id="6935" instrument_node="">. In 1901, under the prefect </span><a data-dcnode-id="6933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_L%25C3%25A9pine" title="Louis Lépine"><span data-dcnode-id="6934" instrument_node="">Louis Lépine</span></a><span data-dcnode-id="6932" instrument_node="">, in order to keep up with the technology of the time, a unit of policemen on bicycles (called the </span><i data-dcnode-id="6930"><span data-dcnode-id="6931" instrument_node="">hirondelles</span></i><span data-dcnode-id="6929" instrument_node=""> after the brand of the bicycles) was formed. They numbered 18 per arrondissement and reached 600 by 1906 for the whole city. A unit of river police, the </span><i data-dcnode-id="6927"><span data-dcnode-id="6928" instrument_node="">brigade fluviale</span></i><span data-dcnode-id="6926" instrument_node="">, was organized in 1900 for the </span><a data-dcnode-id="6924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="6925" instrument_node="">Universal Exposition</span></a><span data-dcnode-id="6923" instrument_node="">, as well as a unit of traffic police who wore a symbol of a Roman chariot embroidered on the sleeve of their uniform. The first six motorcycle policemen appeared on the streets in 1906.</span><sup class="reference" data-dcnode-id="6920" id="cite_ref-FOOTNOTEFierro1996899–1900_18-0"><a data-dcnode-id="6921" href="#cite_note-FOOTNOTEFierro1996899%E2%80%931900-18"><span data-dcnode-id="6922" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6919" instrument_node="">
</span></p><p data-dcnode-id="6893"><span data-dcnode-id="6917" instrument_node="">In addition to the </span><i data-dcnode-id="6915"><span data-dcnode-id="6916" instrument_node="">gardiens de la paix publique</span></i><span data-dcnode-id="6914" instrument_node="">, Paris was guarded by the </span><i data-dcnode-id="6911"><a data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Guard_%28France%29" title="Republican Guard (France)"><span data-dcnode-id="6913" instrument_node="">Garde républicaine</span></a></i><span data-dcnode-id="6910" instrument_node=""> under the military command of the </span><a data-dcnode-id="6908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gendarmerie" title="Gendarmerie"><span data-dcnode-id="6909" instrument_node="">Gendarmerie</span></a><span data-dcnode-id="6907" instrument_node=""> Nationale. Gendarmes had been a particular target of the Commune; 33 had been taken hostages and were executed by a (Communard) firing squad on Rue Haxo on 23 May 1871 in the last days of the Commune. In June 1871, they provided security in the damaged city. They numbered 6,500 men in two regiments, plus a unit of </span><a data-dcnode-id="6905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cavalry" title="Cavalry"><span data-dcnode-id="6906" instrument_node="">cavalry</span></a><span data-dcnode-id="6904" instrument_node=""> and a dozen cannon. The number was reduced in 1873 to 4,000 men in a single regiment, called the </span><i data-dcnode-id="6902"><span data-dcnode-id="6903" instrument_node="">Légion de la Garde républicaine</span></i><span data-dcnode-id="6901" instrument_node=""> (Legion of the Republican Guard), with its headquarters on the Quai de Bourbon and troops quartered in several barracks around the city. The Republican Guard was given the duty of providing security for the president of the republic at the Élysée Palace, the National Assembly and the Senate, at the prefecture of police, and also at the </span><a data-dcnode-id="6899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palais_Garnier" title="Palais Garnier"><span data-dcnode-id="6900" instrument_node="">Opéra</span></a><span data-dcnode-id="6898" instrument_node="">, theaters, public balls, racetracks, and other public places. A unit of bicyclists was formed on 6 June 1907. When World War I began, the entire unit of Paris gendarmes was mobilized and fought at the front during war; 222 of them lost their lives. </span><sup class="reference" data-dcnode-id="6895" id="cite_ref-FOOTNOTEFierro1996895–896_19-0"><a data-dcnode-id="6896" href="#cite_note-FOOTNOTEFierro1996895%E2%80%93896-19"><span data-dcnode-id="6897" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6894" instrument_node="">
