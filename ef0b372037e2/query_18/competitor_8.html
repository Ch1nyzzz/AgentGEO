</span><h3 data-dcnode-id="3872"><span class="mw-headline" data-dcnode-id="3880" id="Sculpture"><span data-dcnode-id="3881" instrument_node="">Sculpture</span></span><span class="mw-editsection" data-dcnode-id="3873"><span class="mw-editsection-bracket" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">[</span></span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D33" title="Edit section: Sculpture"><span data-dcnode-id="3877" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3871" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3853"><div class="thumbinner" data-dcnode-id="3854" style="width:302px;"><a class="image" data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStatue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg"><img alt="" class="thumbimage" data-dcnode-id="3870" data-file-height="2736" data-file-width="3648" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/68/Statue_of_BALZAC%252C_made_by_RODIN%252C_Paris.jpg/300px-Statue_of_BALZAC%252C_made_by_RODIN%252C_Paris.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/68/Statue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg/450px-Statue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/68/Statue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg/600px-Statue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg 2x" width="300"></a><span data-dcnode-id="3868" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3855"><div class="magnify" data-dcnode-id="3866"><a class="internal" data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStatue_of_BALZAC%2C_made_by_RODIN%2C_Paris.jpg" title="Enlarge"></a></div><i data-dcnode-id="3863"><a data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monument_to_Balzac" title="Monument to Balzac"><span data-dcnode-id="3865" instrument_node="">Monument to Balzac</span></a></i><span data-dcnode-id="3862" instrument_node="">, by </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Rodin" title="Auguste Rodin"><span data-dcnode-id="3861" instrument_node="">Auguste Rodin</span></a><span data-dcnode-id="3859" instrument_node="">, on the </span><a data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_Raspail" title="Boulevard Raspail"><span data-dcnode-id="3858" instrument_node="">Boulevard Raspail</span></a><span data-dcnode-id="3856" instrument_node=""> (1890)</span></div></div></div><span data-dcnode-id="3852" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3838"><div class="thumbinner" data-dcnode-id="3839" style="width:202px;"><a class="image" data-dcnode-id="3850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AConstantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg"><img alt="" class="thumbimage" data-dcnode-id="3851" data-file-height="1151" data-file-width="890" decoding="async" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Constantin_Brancusi%252C_Portrait_of_Mlle_Pogany%252C_1912%252C_Philadelphia_Museum_of_Modern_Art%252C_Philadelphia.jpg/200px-Constantin_Brancusi%252C_Portrait_of_Mlle_Pogany%252C_1912%252C_Philadelphia_Museum_of_Modern_Art%252C_Philadelphia.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/39/Constantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg/300px-Constantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/39/Constantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg/400px-Constantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg 2x" width="200"></a><span data-dcnode-id="3849" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3840"><div class="magnify" data-dcnode-id="3847"><a class="internal" data-dcnode-id="3848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AConstantin_Brancusi%2C_Portrait_of_Mlle_Pogany%2C_1912%2C_Philadelphia_Museum_of_Modern_Art%2C_Philadelphia.jpg" title="Enlarge"></a></div><span data-dcnode-id="3846" instrument_node="">Constantin Brâncuși, </span><i data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">Portrait of Mademoiselle Pogany</span></i><span data-dcnode-id="3843" instrument_node="">, 1912 </span><a data-dcnode-id="3841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philadelphia_Museum_of_Art" title="Philadelphia Museum of Art"><span data-dcnode-id="3842" instrument_node="">Philadelphia Museum of Art</span></a></div></div></div><span data-dcnode-id="3837" instrument_node="">
</span><p data-dcnode-id="3785"><span data-dcnode-id="3836" instrument_node="">The </span><i data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Belle Époque</span></i><span data-dcnode-id="3833" instrument_node=""> was a golden age for sculptors; the government of the Third Republic commissioned very few monumental buildings, but did commission a large number of statues to French writers, scientists, artists and political figures that soon filled the city's parks and squares. The most prominent sculptor of the period was </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Rodin" title="Auguste Rodin"><span data-dcnode-id="3832" instrument_node="">Auguste Rodin</span></a><span data-dcnode-id="3830" instrument_node=""> (1840-1917). Born in Paris into a working-class family, he was rejected for entry into the </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_des_Beaux-Arts" title="École des Beaux-Arts"><span data-dcnode-id="3829" instrument_node="">École des Beaux-Arts</span></a><span data-dcnode-id="3827" instrument_node=""> and rejected by the Paris Salon. He had to struggle for many years to win recognition, supporting himself as a decorator and later as a designer for the </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manufacture_nationale_de_S%25C3%25A8vres" title="Manufacture nationale de Sèvres"><span data-dcnode-id="3826" instrument_node="">Sèvres porcelain factory</span></a><span data-dcnode-id="3824" instrument_node="">. He gradually won attention for his design for the </span><i data-dcnode-id="3821"><a class="mw-redirect" data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gates_of_Hell" title="Gates of Hell"><span data-dcnode-id="3823" instrument_node="">Gates of Hell</span></a></i><span data-dcnode-id="3820" instrument_node="">, a museum of decorative art which was never built; its plan included what became his most famous work, </span><i data-dcnode-id="3817"><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Thinker" title="The Thinker"><span data-dcnode-id="3819" instrument_node="">The Thinker</span></a></i><span data-dcnode-id="3816" instrument_node="">. He was commissioned by the city of </span><a data-dcnode-id="3814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calais" title="Calais"><span data-dcnode-id="3815" instrument_node="">Calais</span></a><span data-dcnode-id="3813" instrument_node=""> to make a monument, </span><i data-dcnode-id="3810"><a data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Burghers_of_Calais" title="The Burghers of Calais"><span data-dcnode-id="3812" instrument_node="">The Burghers of Calais</span></a></i><span data-dcnode-id="3809" instrument_node=""> (1884), to commemorate an event that took place in that city in 1347, during the </span><a data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hundred_Years%2527_War" title="Hundred Years' War"><span data-dcnode-id="3808" instrument_node="">Hundred Years' War</span></a><span data-dcnode-id="3806" instrument_node="">. He was also commissioned to create a </span><i data-dcnode-id="3803"><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monument_to_Balzac" title="Monument to Balzac"><span data-dcnode-id="3805" instrument_node="">Monument to Balzac</span></a></i><span data-dcnode-id="3802" instrument_node=""> (now on the </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_Raspail" title="Boulevard Raspail"><span data-dcnode-id="3801" instrument_node="">Boulevard Raspail</span></a><span data-dcnode-id="3799" instrument_node="">), which caused a scandal and made him a celebrity. Rodin's work was exhibited near the 1900 Exposition, which won him many foreign clients. In 1908, he moved from </span><a data-dcnode-id="3797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meudon" title="Meudon"><span data-dcnode-id="3798" instrument_node="">Meudon</span></a><span data-dcnode-id="3796" instrument_node=""> to Paris, renting the ground floor of a private mansion in the </span><a data-dcnode-id="3794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/7th_arrondissement_of_Paris" title="7th arrondissement of Paris"><span data-dcnode-id="3795" instrument_node="">7th arrondissement</span></a><span data-dcnode-id="3793" instrument_node="">, the Hôtel Biron, now the </span><a data-dcnode-id="3791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_Rodin" title="Musée Rodin"><span data-dcnode-id="3792" instrument_node="">Musée Rodin</span></a><span data-dcnode-id="3790" instrument_node="">. By the time of his death, he was the most famous sculptor in France, perhaps in the world.</span><sup class="reference" data-dcnode-id="3787" id="cite_ref-FOOTNOTEPetit_Robert19881541_66-0"><a data-dcnode-id="3788" href="#cite_note-FOOTNOTEPetit_Robert19881541-66"><span data-dcnode-id="3789" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3786" instrument_node="">
</span></p><p data-dcnode-id="3752"><span data-dcnode-id="3784" instrument_node="">Other more traditional sculptors whose work won acclaim in Paris during the </span><i data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">Belle Époque</span></i><span data-dcnode-id="3781" instrument_node=""> included </span><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Dalou" title="Jules Dalou"><span data-dcnode-id="3780" instrument_node="">Jules Dalou</span></a><span data-dcnode-id="3778" instrument_node="">, </span><a data-dcnode-id="3776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoine_Bourdelle" title="Antoine Bourdelle"><span data-dcnode-id="3777" instrument_node="">Antoine Bourdelle</span></a><span data-dcnode-id="3775" instrument_node=""> (also a former assistant of Rodin), and </span><a data-dcnode-id="3773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristide_Maillol" title="Aristide Maillol"><span data-dcnode-id="3774" instrument_node="">Aristide Maillol</span></a><span data-dcnode-id="3772" instrument_node="">. Their works decorated theaters, parks, and were featured at the International Expositions. The more </span><a data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avant-garde" title="Avant-garde"><span data-dcnode-id="3771" instrument_node="">avant-garde</span></a><span data-dcnode-id="3769" instrument_node=""> artists organized themselves into the </span><a data-dcnode-id="3767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soci%25C3%25A9t%25C3%25A9_des_Artistes_Ind%25C3%25A9pendants" title="Société des Artistes Indépendants"><span data-dcnode-id="3768" instrument_node="">Société des Artistes Indépendants</span></a><span data-dcnode-id="3766" instrument_node="">. They held annual Salons that helped set the course of modern art. At the turn of the century, Paris attracted sculptors from around the world. </span><a data-dcnode-id="3764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantin_Br%25C3%25A2ncu%25C8%2599i" title="Constantin Brâncuși"><span data-dcnode-id="3765" instrument_node="">Constantin Brâncuși</span></a><span data-dcnode-id="3763" instrument_node=""> (1876-1957) moved from </span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bucharest" title="Bucharest"><span data-dcnode-id="3762" instrument_node="">Bucharest</span></a><span data-dcnode-id="3760" instrument_node=""> to </span><a data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich" title="Munich"><span data-dcnode-id="3759" instrument_node="">Munich</span></a><span data-dcnode-id="3757" instrument_node=""> to Paris, where he was admitted, in 1905, to the École des Beaux-Arts. He worked for two months in the workshop of Rodin, but left, declaring that "Nothing grows under big trees", and went in his own direction into modernism. Brâncuși won fame at the 1913 "Salon des indépendants" and became one of the pioneers of modern sculpture.</span><sup class="reference" data-dcnode-id="3754" id="cite_ref-FOOTNOTEPetit_Robert1988272_67-0"><a data-dcnode-id="3755" href="#cite_note-FOOTNOTEPetit_Robert1988272-67"><span data-dcnode-id="3756" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3753" instrument_node="">
</span></p><span data-dcnode-id="3751" instrument_node="">
</span><h2 data-dcnode-id="3741"><span class="mw-headline" data-dcnode-id="3749" id="The_flood_of_1910"><span data-dcnode-id="3750" instrument_node="">The flood of 1910</span></span><span class="mw-editsection" data-dcnode-id="3742"><span class="mw-editsection-bracket" data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">[</span></span><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D34" title="Edit section: The flood of 1910"><span data-dcnode-id="3746" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3740" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3728"><div class="thumbinner" data-dcnode-id="3729" style="width:302px;"><a class="image" data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_1910_Inondation_avenue_Montaigne_%281%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="3739" data-file-height="461" data-file-width="684" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Paris_1910_Inondation_avenue_Montaigne_%25281%2529.jpg/300px-Paris_1910_Inondation_avenue_Montaigne_%25281%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Paris_1910_Inondation_avenue_Montaigne_%281%29.jpg/450px-Paris_1910_Inondation_avenue_Montaigne_%281%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Paris_1910_Inondation_avenue_Montaigne_%281%29.jpg/600px-Paris_1910_Inondation_avenue_Montaigne_%281%29.jpg 2x" width="300"></a><span data-dcnode-id="3737" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3730"><div class="magnify" data-dcnode-id="3735"><a class="internal" data-dcnode-id="3736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_1910_Inondation_avenue_Montaigne_%281%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="3734" instrument_node="">A footbridge over the </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_Montaigne" title="Avenue Montaigne"><span data-dcnode-id="3733" instrument_node="">Avenue Montaigne</span></a><span data-dcnode-id="3731" instrument_node=""> during the 1910 flood</span></div></div></div><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3726" instrument_node="">The Paris flood of 1910 reached the height of 8.5 meters on the scale measuring the river's level on the </span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_de_la_Tournelle" title="Pont de la Tournelle"><span data-dcnode-id="3725" instrument_node="">Pont de la Tournelle</span></a><span data-dcnode-id="3723" instrument_node="">. The Seine rose above its banks and flooded along the course it had followed in prehistoric times; the water reached as far as the </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_Saint-Lazare" title="Gare Saint-Lazare"><span data-dcnode-id="3722" instrument_node="">Gare Saint-Lazare</span></a><span data-dcnode-id="3720" instrument_node=""> and the Place du Havre. It was the second-highest flood recorded in the history of Paris (the highest was in 1658), and was the third major flood of the </span><i data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Belle Époque</span></i><span data-dcnode-id="3717" instrument_node=""> (the others were in 1872 and 1876). Nonetheless, it received much more attention than earlier floods, largely because of the advent of photography and the international press. Postcards and other images of the flood spread around the world. The municipal authorities made a special survey of the city to measure exactly its extent. It also demonstrated the vulnerability of the city's new infrastructure: the flood stopped the Paris Metro and shut down the city's electricity and telephone system. Afterwards, new dams were constructed along the Seine and its major tributaries. No comparable floods have taken place since. </span><sup class="reference" data-dcnode-id="3714" id="cite_ref-FOOTNOTEFierro1996946_68-0"><a data-dcnode-id="3715" href="#cite_note-FOOTNOTEFierro1996946-68"><span data-dcnode-id="3716" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3713" instrument_node="">
</span></p><span data-dcnode-id="3711" instrument_node="">
</span><h2 data-dcnode-id="3698"><span data-dcnode-id="3710" id="The_end_of_the_Belle_.C3.89poque"></span><span class="mw-headline" data-dcnode-id="3706" id="The_end_of_the_Belle_Époque"><span data-dcnode-id="3709" instrument_node="">The end of the </span><i data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">Belle Époque</span></i></span><span class="mw-editsection" data-dcnode-id="3699"><span class="mw-editsection-bracket" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">[</span></span><a data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D35" title="Edit section: The end of the Belle Époque"><span data-dcnode-id="3703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3697" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3685"><div class="thumbinner" data-dcnode-id="3686" style="width:302px;"><a class="image" data-dcnode-id="3695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_mobilis%25C3%25A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%25C3%25BBt_1914.jpeg"><img alt="" class="thumbimage" data-dcnode-id="3696" data-file-height="512" data-file-width="705" decoding="async" height="218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Les_mobilis%25C3%25A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%25C3%25BBt_1914.jpeg/300px-Les_mobilis%25C3%25A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%25C3%25BBt_1914.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Les_mobilis%C3%A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%C3%BBt_1914.jpeg/450px-Les_mobilis%C3%A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%C3%BBt_1914.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/46/Les_mobilis%C3%A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%C3%BBt_1914.jpeg/600px-Les_mobilis%C3%A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%C3%BBt_1914.jpeg 2x" width="300"></a><span data-dcnode-id="3694" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3687"><div class="magnify" data-dcnode-id="3692"><a class="internal" data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_mobilis%25C3%25A9s_parisiens_devant_la_gare_de_l%27Est_le_2_ao%25C3%25BBt_1914.jpeg" title="Enlarge"></a></div><span data-dcnode-id="3691" instrument_node="">Parisians assemble outside the </span><i data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Gare de l'Est</span></i><span data-dcnode-id="3688" instrument_node=""> for mobilization into the army (August 2, 1914)</span></div></div></div><span data-dcnode-id="3684" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3683" instrument_node="">On 28 June 1914, the news reached Paris of the assassination of the Archduke </span><a class="mw-redirect" data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franz_Ferdinand_of_Austria" title="Franz Ferdinand of Austria"><span data-dcnode-id="3682" instrument_node="">Franz Ferdinand of Austria</span></a><span data-dcnode-id="3680" instrument_node=""> by </span><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbs" title="Serbs"><span data-dcnode-id="3679" instrument_node="">Serbian</span></a><span data-dcnode-id="3677" instrument_node=""> nationalists in </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarajevo" title="Sarajevo"><span data-dcnode-id="3676" instrument_node="">Sarajevo</span></a><span data-dcnode-id="3674" instrument_node="">. </span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="3673" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="3671" instrument_node=""> declared war on </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serbia" title="Serbia"><span data-dcnode-id="3670" instrument_node="">Serbia</span></a><span data-dcnode-id="3668" instrument_node=""> on 28 July, and following the terms of their alliances, Germany joined Austria-Hungary, while Russia, Britain and France went to war against Austria-Hungary and Germany. France declared a general mobilization on 1 August 1914. On the day before the mobilization, the leader of the French socialists, </span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Jaur%25C3%25A8s" title="Jean Jaurès"><span data-dcnode-id="3667" instrument_node="">Jean Jaurès</span></a><span data-dcnode-id="3665" instrument_node="">, was assassinated by a mentally-disturbed man in the Café du Croissant near the headquarters of the socialist newspaper </span><i data-dcnode-id="3662"><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%27Humanit%25C3%25A9" title="L'Humanité"><span data-dcnode-id="3664" instrument_node="">L'Humanité</span></a></i><span data-dcnode-id="3661" instrument_node=""> in Montmartre. The new war was supported by both French nationalists, who saw an opportunity to gain back Alsace and Lorraine from Germany, and by most on the left, who saw an opportunity to overthrow the monarchies in Germany and Austria-Hungary. Parisian men of military age were ordered to report to mobilization points in the city; only one percent did not appear.</span><sup class="reference" data-dcnode-id="3658" id="cite_ref-FOOTNOTEFierro1996216_69-0"><a data-dcnode-id="3659" href="#cite_note-FOOTNOTEFierro1996216-69"><span data-dcnode-id="3660" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3657" instrument_node="">
</span></p><p data-dcnode-id="3644"><span data-dcnode-id="3655" instrument_node="">The German army rapidly approached Paris. On 30 August, a German plane dropped three bombs on the Rue des Récollets, the Quai de Valmy and the Rue des Vinaigriers, killing one woman. Planes dropped bombs on 31 August and 1 September. On 2 September, a bulletin of the military governor of Paris announced that the French government had left the city "in order to give a new impulsion to the defense of the nation." On 6 September, six hundred Parisian taxis were called upon to carry soldiers to the front lines of the </span><a data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="3654" instrument_node="">First Battle of the Marne</span></a><span data-dcnode-id="3652" instrument_node="">. The offensive of the Germans was stopped and their army pulled back. Parisians were urged to leave the city; by 8 September, the population of the city had fallen to 1,800,000, or 63 percent of the population in 1911. For the Parisians, four more years of war and hardship lay ahead. The </span><i data-dcnode-id="3650"><span data-dcnode-id="3651" instrument_node="">Belle Époque</span></i><span data-dcnode-id="3649" instrument_node=""> became just a memory.</span><sup class="reference" data-dcnode-id="3646" id="cite_ref-FOOTNOTEFierro1996216_69-1"><a data-dcnode-id="3647" href="#cite_note-FOOTNOTEFierro1996216-69"><span data-dcnode-id="3648" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3645" instrument_node="">
</span></p><span data-dcnode-id="3643" instrument_node="">
