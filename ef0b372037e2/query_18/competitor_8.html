</span></p><p data-dcnode-id="6877"><span data-dcnode-id="6892" instrument_node="">By a decree of 29 June 1912, to assure the security of Paris by fighting organized criminals such as the </span><i data-dcnode-id="6890"><span data-dcnode-id="6891" instrument_node="">Apaches</span></i><span data-dcnode-id="6889" instrument_node=""> and the </span><a data-dcnode-id="6886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Bonnot" title="Jules Bonnot"><i data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">bande à Bonnot</span></i></a><span data-dcnode-id="6885" instrument_node="">, a criminal section called the </span><i data-dcnode-id="6883"><span data-dcnode-id="6884" instrument_node="">Brigade criminelle</span></i><span data-dcnode-id="6882" instrument_node=""> was created.</span><sup class="reference" data-dcnode-id="6879" id="cite_ref-FOOTNOTEFierro1996637_20-0"><a data-dcnode-id="6880" href="#cite_note-FOOTNOTEFierro1996637-20"><span data-dcnode-id="6881" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6878" instrument_node="">
</span></p><span data-dcnode-id="6876" instrument_node="">
</span><h2 data-dcnode-id="6866"><span class="mw-headline" data-dcnode-id="6874" id="Religion"><span data-dcnode-id="6875" instrument_node="">Religion</span></span><span class="mw-editsection" data-dcnode-id="6867"><span class="mw-editsection-bracket" data-dcnode-id="6872"><span data-dcnode-id="6873" instrument_node="">[</span></span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D7" title="Edit section: Religion"><span data-dcnode-id="6871" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6868"><span data-dcnode-id="6869" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6865" instrument_node="">
</span><p data-dcnode-id="6844"><span data-dcnode-id="6864" instrument_node="">Paris in the </span><i data-dcnode-id="6862"><span data-dcnode-id="6863" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6861" instrument_node=""> witnessed a long and sometimes bitter dispute between the Catholic Church and governments of the Third Republic. During the Commune, the Church was particularly targeted for attack; 24 priests and the Archbishop of Paris were taken hostages and shot by firing squads in the final days of the Commune. The new government after 1871 was conservative and Catholic, and provided substantial funding for the Church establishment through the Ministère des Cultes, which approved the building of the Basilica of Sacré-Cœur on Montmartre without government funds as an act of expiation for the events of 1870–1871. The anti-clerical Republicans took power in 1879, and one of their leaders, </span><a data-dcnode-id="6859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Ferry" title="Jules Ferry"><span data-dcnode-id="6860" instrument_node="">Jules Ferry</span></a><span data-dcnode-id="6858" instrument_node="">, declared: "My objective is to organize humanity without God and without kings."</span><sup class="reference" data-dcnode-id="6855" id="cite_ref-21"><a data-dcnode-id="6856" href="#cite_note-21"><span data-dcnode-id="6857" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6854" instrument_node="">  In March 1880, the Assembly outlawed religious congregations not authorized by the State, and on 30 June had the police expel the Jesuits from their building at 33 Rue de Sèvres. 260 monasteries and convents were closed in Paris and the rest of France. A new law was passed declaring that all public education should be non-religious (</span><i data-dcnode-id="6852"><span data-dcnode-id="6853" instrument_node="">laïque</span></i><span data-dcnode-id="6851" instrument_node="">) and obligatory. In 1883, new laws were passed to forbid public prayers and forbid soldiers to attend religious services in uniform. In 1881, twenty-seven cadets from the </span><a data-dcnode-id="6849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589cole_sp%25C3%25A9ciale_militaire_de_Saint-Cyr" title="École spéciale militaire de Saint-Cyr"><span data-dcnode-id="6850" instrument_node="">École spéciale militaire de Saint-Cyr</span></a><span data-dcnode-id="6848" instrument_node=""> (Military Academy of Saint-Cyr) were expelled for attending a mass at the </span><a class="mw-redirect" data-dcnode-id="6846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_Saint-Germain-des-Pr%25C3%25A9s" title="Church of Saint-Germain-des-Prés"><span data-dcnode-id="6847" instrument_node="">church of Saint-Germain-des-Prés</span></a><span data-dcnode-id="6845" instrument_node="">. The law against working on Sunday was repealed in 1880 (it was reinstated in 1906 to assure workers a day of rest), and in 1885, divorce was authorized.
</span></p><p data-dcnode-id="6810"><span data-dcnode-id="6843" instrument_node="">The new Municipal Council of Paris, also dominated by radical republicans, had little formal power, but it took many symbolic measures against the Church. Nuns and other religious figures were forbidden to have official positions in hospitals, statues were put up to honor </span><a data-dcnode-id="6841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voltaire" title="Voltaire"><span data-dcnode-id="6842" instrument_node="">Voltaire</span></a><span data-dcnode-id="6840" instrument_node=""> and </span><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denis_Diderot" title="Denis Diderot"><span data-dcnode-id="6839" instrument_node="">Diderot</span></a><span data-dcnode-id="6837" instrument_node="">, and the Panthéon was secularized in 1885 to receive the remains of Victor Hugo. Several of the streets of Paris were renamed for republican and socialist heroes, including </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Comte" title="Auguste Comte"><span data-dcnode-id="6836" instrument_node="">Auguste Comte</span></a><span data-dcnode-id="6834" instrument_node=""> (1885), </span><a data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois-Vincent_Raspail" title="François-Vincent Raspail"><span data-dcnode-id="6833" instrument_node="">François-Vincent Raspail</span></a><span data-dcnode-id="6831" instrument_node=""> (1887), </span><a data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armand_Barb%25C3%25A8s" title="Armand Barbès"><span data-dcnode-id="6830" instrument_node="">Armand Barbès</span></a><span data-dcnode-id="6828" instrument_node=""> (1882), and </span><a data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Blanc" title="Louis Blanc"><span data-dcnode-id="6827" instrument_node="">Louis Blanc</span></a><span data-dcnode-id="6825" instrument_node=""> (1885). Specifically forbidden by the Catholic Church, cremation was authorized at </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/P%25C3%25A8re_Lachaise_Cemetery" title="Père Lachaise Cemetery"><span data-dcnode-id="6824" instrument_node="">Père Lachaise Cemetery</span></a><span data-dcnode-id="6822" instrument_node="">. In 1899, the </span><a data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dreyfus_affair" title="Dreyfus affair"><span data-dcnode-id="6821" instrument_node="">Dreyfus affair</span></a><span data-dcnode-id="6819" instrument_node=""> divided Parisians (and the whole of France) even more; the Catholic newspaper </span><i data-dcnode-id="6816"><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Croix" title="La Croix"><span data-dcnode-id="6818" instrument_node="">La Croix</span></a></i><span data-dcnode-id="6815" instrument_node=""> published virulent anti-Semitic articles against the army officer.</span><sup class="reference" data-dcnode-id="6812" id="cite_ref-FOOTNOTEFierro1996371–372_22-0"><a data-dcnode-id="6813" href="#cite_note-FOOTNOTEFierro1996371%E2%80%93372-22"><span data-dcnode-id="6814" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6811" instrument_node="">
</span></p><p data-dcnode-id="6801"><span data-dcnode-id="6809" instrument_node="">The new National Assembly of 1901 had a strongly anti-clerical majority. At the urging of the socialist members, the Assembly officially voted the separation of Church and State on 9 December 1905. The budget of 35 million francs a year given to the Church was cut off, and disputes took place over the official residences of the clergy. On December 17, the police evicted the Archbishop of Paris from his official residence at 127 Rue de Grenelle; the Church responded by banning midnight masses in the city. A law of 1907 finally resolved the issue of property; churches built before that date, including the cathedral of Notre Dame, became the property of the French state, while the Catholic Church was given the right to use them for religious purposes. Despite the cutoff of government assistance, the Catholic Church was able to build 24 new churches, including 15 in the suburbs of Paris, between 1906 and 1914. Official relations between Church and State were almost non-existent to the end of the </span><i data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6806" instrument_node="">.</span><sup class="reference" data-dcnode-id="6803" id="cite_ref-FOOTNOTEFierro1996372–373_23-0"><a data-dcnode-id="6804" href="#cite_note-FOOTNOTEFierro1996372%E2%80%93373-23"><span data-dcnode-id="6805" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6802" instrument_node="">
</span></p><p data-dcnode-id="6783"><span data-dcnode-id="6800" instrument_node="">The Jewish community in Paris had grown from 500 in 1789, or one percent of the Jewish community in France, to 30,000 in 1869, or 40 percent. Beginning in 1881, there were new waves of immigration from Eastern Europe that brought 7 to 9,000 new arrivals each year, and French-born Jews in the 3rd and 4th arrondissements were soon outnumbered by new arrivals, whose numbers increased from 16 percent of the population in those arrondissements to 61 percent. The </span><a class="mw-redirect" data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pogroms" title="Pogroms"><span data-dcnode-id="6799" instrument_node="">pogroms</span></a><span data-dcnode-id="6797" instrument_node=""> in the </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="6796" instrument_node="">Russian Empire</span></a><span data-dcnode-id="6794" instrument_node=""> between 1905 and 1914 provoked a new wave of immigrants arriving in Paris. The community faced a strong current of </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antisemitism" title="Antisemitism"><span data-dcnode-id="6793" instrument_node="">antisemitism</span></a><span data-dcnode-id="6791" instrument_node="">, exemplified by the Dreyfus Affair. With the arrival of the great number of </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ashkenazi_Jews" title="Ashkenazi Jews"><span data-dcnode-id="6790" instrument_node="">Ashkenazi Jews</span></a><span data-dcnode-id="6788" instrument_node=""> from Eastern Europe and Russia, the Paris community became more and more secular and less religious.</span><sup class="reference" data-dcnode-id="6785" id="cite_ref-FOOTNOTEFierro1996381_24-0"><a data-dcnode-id="6786" href="#cite_note-FOOTNOTEFierro1996381-24"><span data-dcnode-id="6787" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6784" instrument_node="">
</span></p><p data-dcnode-id="6771"><span data-dcnode-id="6782" instrument_node="">There was no </span><a data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mosque" title="Mosque"><span data-dcnode-id="6781" instrument_node="">mosque</span></a><span data-dcnode-id="6779" instrument_node=""> in Paris until after the First World War. In 1920, the National Assembly voted to honor the memory of the estimated one hundred thousand Muslims from the French colonies in the Maghreb and black Africa who died for France during the war, and gave a credit of 500,000 francs to build the </span><a data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Mosque_of_Paris" title="Grand Mosque of Paris"><span data-dcnode-id="6778" instrument_node="">Grand Mosque of Paris</span></a><span data-dcnode-id="6776" instrument_node="">.</span><sup class="reference" data-dcnode-id="6773" id="cite_ref-FOOTNOTEFierro1996386_25-0"><a data-dcnode-id="6774" href="#cite_note-FOOTNOTEFierro1996386-25"><span data-dcnode-id="6775" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6772" instrument_node="">
</span></p><span data-dcnode-id="6770" instrument_node="">
</span><h2 data-dcnode-id="6760"><span class="mw-headline" data-dcnode-id="6768" id="The_Economy"><span data-dcnode-id="6769" instrument_node="">The Economy</span></span><span class="mw-editsection" data-dcnode-id="6761"><span class="mw-editsection-bracket" data-dcnode-id="6766"><span data-dcnode-id="6767" instrument_node="">[</span></span><a data-dcnode-id="6764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D8" title="Edit section: The Economy"><span data-dcnode-id="6765" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6762"><span data-dcnode-id="6763" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6759" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6747"><div class="thumbinner" data-dcnode-id="6748" style="width:302px;"><a class="image" data-dcnode-id="6757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAteliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%25C3%25A8.jpg"><img alt="" class="thumbimage" data-dcnode-id="6758" data-file-height="1650" data-file-width="2365" decoding="async" height="209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/25/Ateliers_A.Moisant%252C_Bd_de_Vaugirard%252C_Paris_15%25C3%25A8.jpg/300px-Ateliers_A.Moisant%252C_Bd_de_Vaugirard%252C_Paris_15%25C3%25A8.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/25/Ateliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%C3%A8.jpg/450px-Ateliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%C3%A8.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/25/Ateliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%C3%A8.jpg/600px-Ateliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%C3%A8.jpg 2x" width="300"></a><span data-dcnode-id="6756" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6749"><div class="magnify" data-dcnode-id="6754"><a class="internal" data-dcnode-id="6755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAteliers_A.Moisant%2C_Bd_de_Vaugirard%2C_Paris_15%25C3%25A8.jpg" title="Enlarge"></a></div><span data-dcnode-id="6753" instrument_node="">The Moisant workshop on the Boulevard de Vaugirard (1889) made the metal structure for the </span><a class="mw-redirect" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bon_March%25C3%25A9" title="Bon Marché"><span data-dcnode-id="6752" instrument_node="">Bon Marché</span></a><span data-dcnode-id="6750" instrument_node=""> department store</span></div></div></div><span data-dcnode-id="6746" instrument_node="">
</span><p data-dcnode-id="6719"><span data-dcnode-id="6745" instrument_node="">The economy of Paris suffered an economic crisis in the early 1870s, followed by a long, slow recovery that led to a period of rapid growth beginning in 1895 until the First World War. Between 1872 and 1895, 139 large enterprises closed their doors in Paris, particularly textile and furniture factories, metallurgy concerns, and printing houses, four industries had been the major employers in the city for sixty years. Most of these enterprises had employed between 100 and 200 workers each. Half of the large enterprises on the center of the city's Right Bank moved out, in part because of the high cost of real estate, and also to get better access to transportation on the river and railroads. Several moved to less-expensive areas at the edges of the city, around </span><a data-dcnode-id="6743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montparnasse" title="Montparnasse"><span data-dcnode-id="6744" instrument_node="">Montparnasse</span></a><span data-dcnode-id="6742" instrument_node=""> and La Salpêtriére, while others went to the </span><a data-dcnode-id="6740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/18th_arrondissement_of_Paris" title="18th arrondissement of Paris"><span data-dcnode-id="6741" instrument_node="">18th arrondissement</span></a><span data-dcnode-id="6739" instrument_node="">, </span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Villette%2C_Seine" title="La Villette, Seine"><span data-dcnode-id="6738" instrument_node="">La Villette</span></a><span data-dcnode-id="6736" instrument_node=""> and the </span><a data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canal_Saint-Denis" title="Canal Saint-Denis"><span data-dcnode-id="6735" instrument_node="">Canal Saint-Denis</span></a><span data-dcnode-id="6733" instrument_node=""> to be closer to the river ports and the new railroad freight yards. Still others relocated to Picpus and </span><a data-dcnode-id="6731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charonne_quarter" title="Charonne quarter"><span data-dcnode-id="6732" instrument_node="">Charonne</span></a><span data-dcnode-id="6730" instrument_node=""> in the southeast, or near </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grenelle" title="Grenelle"><span data-dcnode-id="6729" instrument_node="">Grenelle</span></a><span data-dcnode-id="6727" instrument_node=""> and </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Javel%2C_France" title="Javel, France"><span data-dcnode-id="6726" instrument_node="">Javel</span></a><span data-dcnode-id="6724" instrument_node=""> in the southwest. The total number of enterprises in Paris dropped from 76,000 in 1872 to 60,000 in 1896, while in the suburbs their number grew from 11,000 to 13,000. In the heart of Paris, many workers were still employed in traditional industries such as textiles (18,000 workers), garment production (45,000 workers), and in new industries which required highly skilled workers, such as mechanical and electrical engineering and automobile manufacturing.</span><sup class="reference" data-dcnode-id="6721" id="cite_ref-FOOTNOTEMarchand1993126_26-0"><a data-dcnode-id="6722" href="#cite_note-FOOTNOTEMarchand1993126-26"><span data-dcnode-id="6723" instrument_node="">[26]</span></a></sup><span data-dcnode-id="6720" instrument_node="">
</span></p><span data-dcnode-id="6718" instrument_node="">
</span><h2 data-dcnode-id="6707"><span data-dcnode-id="6717" id="Cars.2C_airplanes_and_movies"></span><span class="mw-headline" data-dcnode-id="6715" id="Cars,_airplanes_and_movies"><span data-dcnode-id="6716" instrument_node="">Cars, airplanes and movies</span></span><span class="mw-editsection" data-dcnode-id="6708"><span class="mw-editsection-bracket" data-dcnode-id="6713"><span data-dcnode-id="6714" instrument_node="">[</span></span><a data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D9" title="Edit section: Cars, airplanes and movies"><span data-dcnode-id="6712" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6709"><span data-dcnode-id="6710" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6706" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6695"><div class="thumbinner" data-dcnode-id="6696" style="width:222px;"><a class="image" data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Renault_with_his_first_car.jpg"><img alt="" class="thumbimage" data-dcnode-id="6705" data-file-height="695" data-file-width="719" decoding="async" height="213" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Louis_Renault_with_his_first_car.jpg/220px-Louis_Renault_with_his_first_car.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Louis_Renault_with_his_first_car.jpg/330px-Louis_Renault_with_his_first_car.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Louis_Renault_with_his_first_car.jpg/440px-Louis_Renault_with_his_first_car.jpg 2x" width="220"></a><span data-dcnode-id="6703" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6697"><div class="magnify" data-dcnode-id="6701"><a class="internal" data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Renault_with_his_first_car.jpg" title="Enlarge"></a></div><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Renault_%28industrialist%29" title="Louis Renault (industrialist)"><span data-dcnode-id="6700" instrument_node="">Louis Renault</span></a><span data-dcnode-id="6698" instrument_node=""> and his first car (1903)</span></div></div></div><span data-dcnode-id="6694" instrument_node="">
</span><p data-dcnode-id="6683"><span data-dcnode-id="6693" instrument_node="">Three major new French industries were born in and around Paris at about the turn of the 20th century, taking advantage of the abundance of skilled engineers and technicians and financing from Paris banks. They produced the first French automobiles, aircraft, and motion pictures. In 1898, </span><a data-dcnode-id="6691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Renault_%28industrialist%29" title="Louis Renault (industrialist)"><span data-dcnode-id="6692" instrument_node="">Louis Renault</span></a><span data-dcnode-id="6690" instrument_node=""> and his brother Marcel built their first automobile and founded a new company to produce them. They established their first factory at </span><a data-dcnode-id="6688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulogne-Billancourt" title="Boulogne-Billancourt"><span data-dcnode-id="6689" instrument_node="">Boulogne-Billancourt</span></a><span data-dcnode-id="6687" instrument_node="">, just outside the city, and made the first French truck in 1906. In 1908, they built 3,595 cars, making them the largest car manufacturer in France. They also received an important contract to make taxicabs for the largest Paris taxi company. When the first World War began in 1914, the Renault taxis of Paris were mobilized to carry French soldiers to the front at the </span><a data-dcnode-id="6685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Battle_of_the_Marne" title="First Battle of the Marne"><span data-dcnode-id="6686" instrument_node="">First Battle of the Marne</span></a><span data-dcnode-id="6684" instrument_node="">. 
</span></p><span data-dcnode-id="6682" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6671"><div class="thumbinner" data-dcnode-id="6672" style="width:252px;"><a class="image" data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABleriot.jpg"><img alt="" class="thumbimage" data-dcnode-id="6681" data-file-height="2315" data-file-width="3473" decoding="async" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Bleriot.jpg/250px-Bleriot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/03/Bleriot.jpg/375px-Bleriot.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/03/Bleriot.jpg/500px-Bleriot.jpg 2x" width="250"></a><span data-dcnode-id="6679" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6673"><div class="magnify" data-dcnode-id="6677"><a class="internal" data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABleriot.jpg" title="Enlarge"></a></div><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Bl%25C3%25A9riot" title="Louis Blériot"><span data-dcnode-id="6676" instrument_node="">Louis Blériot</span></a><span data-dcnode-id="6674" instrument_node=""> and his aircraft (1909)</span></div></div></div><span data-dcnode-id="6670" instrument_node="">
</span><p data-dcnode-id="6653"><span data-dcnode-id="6669" instrument_node="">The French aviation pioneer </span><a data-dcnode-id="6667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Bl%25C3%25A9riot" title="Louis Blériot"><span data-dcnode-id="6668" instrument_node="">Louis Blériot</span></a><span data-dcnode-id="6666" instrument_node=""> also established a company, Blériot Aéronautique, on the Boulevard Victor-Hugo in </span><a data-dcnode-id="6664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neuilly" title="Neuilly"><span data-dcnode-id="6665" instrument_node="">Neuilly</span></a><span data-dcnode-id="6663" instrument_node="">, where he manufactured the first French airplanes. On 25 July 1909, he became the first man to fly across the </span><a data-dcnode-id="6661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_Channel" title="English Channel"><span data-dcnode-id="6662" instrument_node="">English Channel</span></a><span data-dcnode-id="6660" instrument_node="">. Blériot moved his company to </span><a data-dcnode-id="6658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buc%2C_Yvelines" title="Buc, Yvelines"><span data-dcnode-id="6659" instrument_node="">Buc</span></a><span data-dcnode-id="6657" instrument_node="">, near </span><a class="mw-redirect" data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Versailles_%28city%29" title="Versailles (city)"><span data-dcnode-id="6656" instrument_node="">Versailles</span></a><span data-dcnode-id="6654" instrument_node="">, where he established a private airport and a flying school. In 1910, he built the Aérobus, one of the first passenger aircraft, which could carry seven persons, the most of any aircraft of the time.
</span></p><p data-dcnode-id="6612"><span data-dcnode-id="6652" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lumi%25C3%25A8re_brothers" title="Lumière brothers"><span data-dcnode-id="6651" instrument_node="">Lumière brothers</span></a><span data-dcnode-id="6649" instrument_node=""> had given the first projected showing of a motion picture, </span><a data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Workers_Leaving_the_Lumi%25C3%25A8re_Factory" title="Workers Leaving the Lumière Factory"><i data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">La Sortie de l'usine Lumière</span></i></a><span data-dcnode-id="6645" instrument_node="">, at the </span><a data-dcnode-id="6643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salon_Indien_du_Grand_Caf%25C3%25A9" title="Salon Indien du Grand Café"><span data-dcnode-id="6644" instrument_node="">Salon Indien du Grand Café</span></a><span data-dcnode-id="6642" instrument_node=""> of the Hôtel Scribe on the </span><a data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_des_Capucines" title="Boulevard des Capucines"><span data-dcnode-id="6641" instrument_node="">Boulevard des Capucines</span></a><span data-dcnode-id="6639" instrument_node="">, on 28 December 1895. A young French entrepreneur, </span><a class="mw-redirect" data-dcnode-id="6637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_M%25C3%25A9li%25C3%25A9s" title="Georges Méliés"><span data-dcnode-id="6638" instrument_node="">Georges Méliés</span></a><span data-dcnode-id="6636" instrument_node="">, attended the first showing and asked the Lumière brothers for a license to make films. The Lumière Brothers politely declined, telling him that the cinema was for scientific purposes and had no commercial value. Méliés persisted and established his own small studio in 1897 in </span><a data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montreuil%2C_Seine-Saint-Denis" title="Montreuil, Seine-Saint-Denis"><span data-dcnode-id="6635" instrument_node="">Montreuil</span></a><span data-dcnode-id="6633" instrument_node="">, just east of Paris. He became a producer, director, scenarist, set designer and actor, and made hundreds of short films, including the first science-fiction film, </span><i data-dcnode-id="6630"><a data-dcnode-id="6631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_Trip_to_the_Moon" title="A Trip to the Moon"><span data-dcnode-id="6632" instrument_node="">A Trip to the Moon</span></a></i><span data-dcnode-id="6629" instrument_node=""> (</span><i data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">Le Voyage dans la Lune</span></i><span data-dcnode-id="6626" instrument_node="">), in 1902. Another French cinema pioneer and producer </span><a data-dcnode-id="6624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Path%25C3%25A9" title="Charles Pathé"><span data-dcnode-id="6625" instrument_node="">Charles Pathé</span></a><span data-dcnode-id="6623" instrument_node="">, also built a studio in Montreuil, then moved to the Rue des Vignerons in </span><a data-dcnode-id="6621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vincennes" title="Vincennes"><span data-dcnode-id="6622" instrument_node="">Vincennes</span></a><span data-dcnode-id="6620" instrument_node="">, east of Paris. His chief rival in the early French film industry, </span><a data-dcnode-id="6618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9on_Gaumont" title="Léon Gaumont"><span data-dcnode-id="6619" instrument_node="">Léon Gaumont</span></a><span data-dcnode-id="6617" instrument_node="">, opened his first studio at about the same time at the Rue des Alouettes in the 19th arrondissement, near the Buttes-Chaumont.</span><sup class="reference" data-dcnode-id="6614" id="cite_ref-FOOTNOTEFierro1996777_27-0"><a data-dcnode-id="6615" href="#cite_note-FOOTNOTEFierro1996777-27"><span data-dcnode-id="6616" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6613" instrument_node="">
</span></p><span data-dcnode-id="6611" instrument_node="">
</span><h2 data-dcnode-id="6601"><span class="mw-headline" data-dcnode-id="6609" id="Commerce_and_the_department_stores"><span data-dcnode-id="6610" instrument_node="">Commerce and the department stores</span></span><span class="mw-editsection" data-dcnode-id="6602"><span class="mw-editsection-bracket" data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">[</span></span><a data-dcnode-id="6605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D10" title="Edit section: Commerce and the department stores"><span data-dcnode-id="6606" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6603"><span data-dcnode-id="6604" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6600" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6589"><div class="thumbinner" data-dcnode-id="6590" style="width:302px;"><a class="image" data-dcnode-id="6598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAu_Bon_March%25C3%25A9_%28vue_g%25C3%25A9n%25C3%25A9rale_-_gravure%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6599" data-file-height="838" data-file-width="1232" decoding="async" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/07/Au_Bon_March%25C3%25A9_%28vue_g%25C3%25A9n%25C3%25A9rale_-_gravure%29.jpg/300px-Au_Bon_March%25C3%25A9_%28vue_g%25C3%25A9n%25C3%25A9rale_-_gravure%29.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/07/Au_Bon_March%C3%A9_%28vue_g%C3%A9n%C3%A9rale_-_gravure%29.jpg/450px-Au_Bon_March%C3%A9_%28vue_g%C3%A9n%C3%A9rale_-_gravure%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/07/Au_Bon_March%C3%A9_%28vue_g%C3%A9n%C3%A9rale_-_gravure%29.jpg/600px-Au_Bon_March%C3%A9_%28vue_g%C3%A9n%C3%A9rale_-_gravure%29.jpg 2x" width="300"></a><span data-dcnode-id="6597" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6591"><div class="magnify" data-dcnode-id="6595"><a class="internal" data-dcnode-id="6596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAu_Bon_March%25C3%25A9_%28vue_g%25C3%25A9n%25C3%25A9rale_-_gravure%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="6593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Bon_March%25C3%25A9" title="Le Bon Marché"><span data-dcnode-id="6594" instrument_node="">Le Bon Marché</span></a><span data-dcnode-id="6592" instrument_node=""> in 1887</span></div></div></div><span data-dcnode-id="6588" instrument_node="">
</span><p data-dcnode-id="6568"><span data-dcnode-id="6587" instrument_node="">The </span><i data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6584" instrument_node=""> in Paris was the golden age of the </span><i data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">Grand magasin</span></i><span data-dcnode-id="6581" instrument_node="">, or </span><a data-dcnode-id="6579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_store" title="Department store"><span data-dcnode-id="6580" instrument_node="">department store</span></a><span data-dcnode-id="6578" instrument_node="">. The first modern department store in the city, </span><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Bon_March%25C3%25A9" title="Le Bon Marché"><span data-dcnode-id="6577" instrument_node="">Le Bon Marché</span></a><span data-dcnode-id="6575" instrument_node="">, was originally a small variety store with a staff of twelve when it was taken over by </span><a data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristide_Boucicaut" title="Aristide Boucicaut"><span data-dcnode-id="6574" instrument_node="">Aristide Boucicaut</span></a><span data-dcnode-id="6572" instrument_node=""> in 1852. Boucicaut expanded it, and by deft discount pricing, advertising, and innovative marketing (a mail order catalog, seasonal sales, fashion shows, gifts to customers, entertainment for children) turned it into a hugely successful enterprise with a staff of eleven hundred employees and income that increased from 5 million francs in 1860 to 20 million in 1870, then reached 72 million at the time of his death in 1877. He built an enormous new building near the site of the original shop on the Left Bank, with an iron structure designed with the help of the engineering firm of </span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="6571" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="6569" instrument_node="">.
</span></p><p data-dcnode-id="6547"><span data-dcnode-id="6567" instrument_node="">The success of Bon Marché inspired many competitors. The </span><a class="mw-redirect" data-dcnode-id="6565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grands_Magasins_du_Louvre" title="Grands Magasins du Louvre"><span data-dcnode-id="6566" instrument_node="">Grands Magasins du Louvre</span></a><span data-dcnode-id="6564" instrument_node=""> opened in 1855 with an income of 5 million francs that rose to 41 million by 1875 and 2400 employees in 1882. The </span><a data-dcnode-id="6562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bazar_de_l%27H%25C3%25B4tel_de_Ville" title="Bazar de l'Hôtel de Ville"><span data-dcnode-id="6563" instrument_node="">Bazar de l'Hôtel de Ville</span></a><span data-dcnode-id="6561" instrument_node=""> (BHV) opened in 1857 and moved into a larger store in 1866. </span><a data-dcnode-id="6559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Printemps" title="Printemps"><span data-dcnode-id="6560" instrument_node="">Printemps</span></a><span data-dcnode-id="6558" instrument_node=""> was founded in 1865 by a former department head of Bon Marché; </span><a data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Samaritaine" title="La Samaritaine"><span data-dcnode-id="6557" instrument_node="">La Samaritaine</span></a><span data-dcnode-id="6555" instrument_node=""> was opened in 1870; and La Ville de Saint-Denis, the first building in France to have an elevator, in 1869. Alphonse Kahn opened his </span><a data-dcnode-id="6553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galeries_Lafayette" title="Galeries Lafayette"><span data-dcnode-id="6554" instrument_node="">Galeries Lafayette</span></a><span data-dcnode-id="6552" instrument_node=""> in 1895.</span><sup class="reference" data-dcnode-id="6549" id="cite_ref-FOOTNOTEFierro1996911–912_28-0"><a data-dcnode-id="6550" href="#cite_note-FOOTNOTEFierro1996911%E2%80%93912-28"><span data-dcnode-id="6551" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6548" instrument_node="">
</span></p><span data-dcnode-id="6546" instrument_node="">
</span><h2 data-dcnode-id="6536"><span class="mw-headline" data-dcnode-id="6544" id="High_Fashion_and_luxury_goods"><span data-dcnode-id="6545" instrument_node="">High Fashion and luxury goods</span></span><span class="mw-editsection" data-dcnode-id="6537"><span class="mw-editsection-bracket" data-dcnode-id="6542"><span data-dcnode-id="6543" instrument_node="">[</span></span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D11" title="Edit section: High Fashion and luxury goods"><span data-dcnode-id="6541" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6535" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6524"><div class="thumbinner" data-dcnode-id="6525" style="width:302px;"><a class="image" data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGervex_Cinq_Heures_Chez_Paquin.jpg"><img alt="" class="thumbimage" data-dcnode-id="6534" data-file-height="1842" data-file-width="2832" decoding="async" height="195" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Gervex_Cinq_Heures_Chez_Paquin.jpg/300px-Gervex_Cinq_Heures_Chez_Paquin.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Gervex_Cinq_Heures_Chez_Paquin.jpg/450px-Gervex_Cinq_Heures_Chez_Paquin.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Gervex_Cinq_Heures_Chez_Paquin.jpg/600px-Gervex_Cinq_Heures_Chez_Paquin.jpg 2x" width="300"></a><span data-dcnode-id="6532" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6526"><div class="magnify" data-dcnode-id="6530"><a class="internal" data-dcnode-id="6531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGervex_Cinq_Heures_Chez_Paquin.jpg" title="Enlarge"></a></div><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeanne_Paquin" title="Jeanne Paquin"><span data-dcnode-id="6529" instrument_node="">Jeanne Paquin</span></a><span data-dcnode-id="6527" instrument_node="">'s fashion house (1906)</span></div></div></div><span data-dcnode-id="6523" instrument_node="">
</span><p data-dcnode-id="6461"><span data-dcnode-id="6522" instrument_node="">At the beginning of the </span><i data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6519" instrument_node="">, the industry of </span><i data-dcnode-id="6516"><a data-dcnode-id="6517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haute_couture" title="Haute couture"><span data-dcnode-id="6518" instrument_node="">haute couture</span></a></i><span data-dcnode-id="6515" instrument_node=""> (high fashion) was dominated by the </span><a data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Worth" title="House of Worth"><span data-dcnode-id="6514" instrument_node="">House of Worth</span></a><span data-dcnode-id="6512" instrument_node="">. </span><a data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Frederick_Worth" title="Charles Frederick Worth"><span data-dcnode-id="6511" instrument_node="">Charles Worth</span></a><span data-dcnode-id="6509" instrument_node=""> had designed the clothes of the </span><a data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eug%25C3%25A9nie_de_Montijo" title="Eugénie de Montijo"><span data-dcnode-id="6508" instrument_node="">Empress Eugénie</span></a><span data-dcnode-id="6506" instrument_node=""> during the </span><a data-dcnode-id="6504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_French_Empire" title="Second French Empire"><span data-dcnode-id="6505" instrument_node="">Second Empire</span></a><span data-dcnode-id="6503" instrument_node=""> and turned high fashion into an industry. His shop at 7 </span><a class="mw-redirect" data-dcnode-id="6501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rue_de_la_Paix" title="Rue de la Paix"><span data-dcnode-id="6502" instrument_node="">Rue de la Paix</span></a><span data-dcnode-id="6500" instrument_node=""> helped make that street the center of fashion in Paris. By 1900, there were more than twenty houses of </span><i data-dcnode-id="6498"><span data-dcnode-id="6499" instrument_node="">haute couture</span></i><span data-dcnode-id="6497" instrument_node=""> in Paris, led by designers including </span><a data-dcnode-id="6495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeanne_Paquin" title="Jeanne Paquin"><span data-dcnode-id="6496" instrument_node="">Jeanne Paquin</span></a><span data-dcnode-id="6494" instrument_node="">, </span><a data-dcnode-id="6492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Poiret" title="Paul Poiret"><span data-dcnode-id="6493" instrument_node="">Paul Poiret</span></a><span data-dcnode-id="6491" instrument_node="">, </span><a data-dcnode-id="6489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Doeuillet" title="Georges Doeuillet"><span data-dcnode-id="6490" instrument_node="">Georges Doeuillet</span></a><span data-dcnode-id="6488" instrument_node="">, Margaine-Lacroix, </span><a data-dcnode-id="6486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redfern_%28couture%29" title="Redfern (couture)"><span data-dcnode-id="6487" instrument_node="">Redfern</span></a><span data-dcnode-id="6485" instrument_node="">, Raudnitz, Rouff, </span><a data-dcnode-id="6483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Callot_Soeurs" title="Callot Soeurs"><span data-dcnode-id="6484" instrument_node="">Callot Sœurs</span></a><span data-dcnode-id="6482" instrument_node="">, Blanche Lebouvier, and others, including sons of Charles Worth. Most of these houses had fewer than fifty employees, but the top six or seven firms each had between four hundred and nine hundred employees. They were concentrated on Rue de la Paix and around the Place Vendôme, with a few on the nearby Grands Boulevards. At the </span><a data-dcnode-id="6480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="6481" instrument_node="">Universal Exposition of 1900</span></a><span data-dcnode-id="6479" instrument_node="">, an entire building was devoted to fashion designers. The first fashion show with models had taken place in London in 1908; the idea was quickly copied in Paris. </span><a data-dcnode-id="6477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeanne_Lanvin" title="Jeanne Lanvin"><span data-dcnode-id="6478" instrument_node="">Jeanne Lanvin</span></a><span data-dcnode-id="6476" instrument_node=""> became a member of the </span><a data-dcnode-id="6473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F%25C3%25A9d%25C3%25A9ration_fran%25C3%25A7aise_de_la_couture" title="Fédération française de la couture"><i data-dcnode-id="6474"><span data-dcnode-id="6475" instrument_node="">Chambre syndicale de la haute couture</span></i></a><span data-dcnode-id="6472" instrument_node=""> (Syndicate of fashion designers) in 1909. </span><a data-dcnode-id="6470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coco_Chanel" title="Coco Chanel"><span data-dcnode-id="6471" instrument_node="">Coco Chanel</span></a><span data-dcnode-id="6469" instrument_node=""> opened her first shop in Paris in 1910, but her fame as a designer came after the First World War.</span><sup class="reference" data-dcnode-id="6466" id="cite_ref-FOOTNOTEFierro1996809_29-0"><a data-dcnode-id="6467" href="#cite_note-FOOTNOTEFierro1996809-29"><span data-dcnode-id="6468" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="6463" id="cite_ref-30"><a data-dcnode-id="6464" href="#cite_note-30"><span data-dcnode-id="6465" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6462" instrument_node="">
</span></p><p data-dcnode-id="6437"><span data-dcnode-id="6460" instrument_node="">The growth of the department stores and tourism created a much larger market for luxury goods, such as perfumes, watches and jewelry. The perfumer </span><a data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Coty" title="François Coty"><span data-dcnode-id="6459" instrument_node="">François Coty</span></a><span data-dcnode-id="6457" instrument_node=""> began making scents in 1904, and achieved his first success selling through department stores. He discovered the importance of elegant bottles in marketing perfume and commissioned </span><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baccarat_%28company%29" title="Baccarat (company)"><span data-dcnode-id="6456" instrument_node="">Baccarat</span></a><span data-dcnode-id="6454" instrument_node=""> and </span><a data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Lalique" title="René Lalique"><span data-dcnode-id="6453" instrument_node="">René Lalique</span></a><span data-dcnode-id="6451" instrument_node=""> to design bottles in the </span><a data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="6450" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="6448" instrument_node=""> style. He realized the desire of middle class consumers to have luxury goods and sold a range of less-expensive perfumes. He also invented the fragrance set, a box of perfume, powder soap, cream and cosmetics with the same scent. He was so successful that in 1908 he built a new laboratory and factory, La Cité des Parfums ("The City of Perfume"), at </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suresnes" title="Suresnes"><span data-dcnode-id="6447" instrument_node="">Suresnes</span></a><span data-dcnode-id="6445" instrument_node=""> in the Paris suburbs. It had 9,000 employees and made one hundred thousand bottles of perfume a day.</span><sup class="reference" data-dcnode-id="6442" id="cite_ref-cotybio_31-0"><a data-dcnode-id="6443" href="#cite_note-cotybio-31"><span data-dcnode-id="6444" instrument_node="">[31]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6439"><span data-dcnode-id="6440" title="Page / location: 24"><span data-dcnode-id="6441" instrument_node="">: 24 </span></span></sup><span data-dcnode-id="6438" instrument_node="">
</span></p><p data-dcnode-id="6426"><span data-dcnode-id="6436" instrument_node="">The watchmaker Louis-François Cartier opened a shop in Paris in 1847. In 1899, his grandchildren moved the shop to the Rue de la Paix and made the shop international, opening branches in London (1902), Moscow (1908) and New York (1909). His grandson </span><a class="mw-redirect" data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Cartier" title="Louis Cartier"><span data-dcnode-id="6435" instrument_node="">Louis Cartier</span></a><span data-dcnode-id="6433" instrument_node=""> designed one of the first purpose-built </span><a class="mw-redirect" data-dcnode-id="6431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wristwatches" title="Wristwatches"><span data-dcnode-id="6432" instrument_node="">wristwatches</span></a><span data-dcnode-id="6430" instrument_node=""> for the Brazilian aviation pioneer </span><a data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberto_Santos-Dumont" title="Alberto Santos-Dumont"><span data-dcnode-id="6429" instrument_node="">Alberto Santos-Dumont</span></a><span data-dcnode-id="6427" instrument_node="">, who made the first aircraft flight in Paris in 1906. The "Santos watch" went on sale in 1911 and was a huge success for the company.
</span></p><span data-dcnode-id="6425" instrument_node="">
