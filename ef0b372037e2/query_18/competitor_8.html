</span></p><p data-dcnode-id="4822"><span data-dcnode-id="4833" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neon_light" title="Neon light"><span data-dcnode-id="4832" instrument_node="">neon light</span></a><span data-dcnode-id="4830" instrument_node=""> was used for the first time in Paris on 3 December 1910 in the Grand Palais. The first outdoor neon advertising sign was put up on </span><a data-dcnode-id="4828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_Montmartre" title="Boulevard Montmartre"><span data-dcnode-id="4829" instrument_node="">Boulevard Montmartre</span></a><span data-dcnode-id="4827" instrument_node=""> in 1912.</span><sup class="reference" data-dcnode-id="4824" id="cite_ref-FOOTNOTEFierro1996637_20-1"><a data-dcnode-id="4825" href="#cite_note-FOOTNOTEFierro1996637-20"><span data-dcnode-id="4826" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4823" instrument_node="">
</span></p><span data-dcnode-id="4821" instrument_node="">
</span><h2 data-dcnode-id="4811"><span class="mw-headline" data-dcnode-id="4819" id="The_arts"><span data-dcnode-id="4820" instrument_node="">The arts</span></span><span class="mw-editsection" data-dcnode-id="4812"><span class="mw-editsection-bracket" data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">[</span></span><a data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D29" title="Edit section: The arts"><span data-dcnode-id="4816" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4810" instrument_node="">
</span><h3 data-dcnode-id="4800"><span class="mw-headline" data-dcnode-id="4808" id="Literature"><span data-dcnode-id="4809" instrument_node="">Literature</span></span><span class="mw-editsection" data-dcnode-id="4801"><span class="mw-editsection-bracket" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">[</span></span><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D30" title="Edit section: Literature"><span data-dcnode-id="4805" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4799" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4788"><div class="thumbinner" data-dcnode-id="4789" style="width:202px;"><a class="image" data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVictor_Hugo_by_%25C3%2589tienne_Carjat_1876_-_full.jpg"><img alt="" class="thumbimage" data-dcnode-id="4798" data-file-height="2632" data-file-width="2140" decoding="async" height="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Victor_Hugo_by_%25C3%2589tienne_Carjat_1876_-_full.jpg/200px-Victor_Hugo_by_%25C3%2589tienne_Carjat_1876_-_full.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Victor_Hugo_by_%C3%89tienne_Carjat_1876_-_full.jpg/300px-Victor_Hugo_by_%C3%89tienne_Carjat_1876_-_full.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Victor_Hugo_by_%C3%89tienne_Carjat_1876_-_full.jpg/400px-Victor_Hugo_by_%C3%89tienne_Carjat_1876_-_full.jpg 2x" width="200"></a><span data-dcnode-id="4796" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4790"><div class="magnify" data-dcnode-id="4794"><a class="internal" data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVictor_Hugo_by_%25C3%2589tienne_Carjat_1876_-_full.jpg" title="Enlarge"></a></div><a data-dcnode-id="4792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="4793" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="4791" instrument_node=""> (1876)</span></div></div></div><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4760"><span data-dcnode-id="4786" instrument_node="">During the </span><i data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">Belle Époque</span></i><span data-dcnode-id="4783" instrument_node="">, Paris was the home and inspiration for some of France's most famous writers. </span><a data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="4782" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="4780" instrument_node=""> was sixty-eight when he returned to Paris from Brussels in 1871 and took up residence on the Avenue d'Eylau (now </span><a data-dcnode-id="4778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_Victor-Hugo_%28Paris%29" title="Avenue Victor-Hugo (Paris)"><span data-dcnode-id="4779" instrument_node="">Avenue Victor Hugo</span></a><span data-dcnode-id="4777" instrument_node="">) in the </span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/16th_arrondissement_of_Paris" title="16th arrondissement of Paris"><span data-dcnode-id="4776" instrument_node="">16th arrondissement</span></a><span data-dcnode-id="4774" instrument_node="">. He failed to be re-elected to the National Assembly, but in 1876, he was elected to the French Senate.</span><sup class="reference" data-dcnode-id="4771" id="cite_ref-56"><a data-dcnode-id="4772" href="#cite_note-56"><span data-dcnode-id="4773" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4770" instrument_node=""> It was a difficult period for Hugo; his daughter </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ad%25C3%25A8le_Hugo" title="Adèle Hugo"><span data-dcnode-id="4769" instrument_node="">Adèle</span></a><span data-dcnode-id="4767" instrument_node=""> was placed in an </span><a class="mw-redirect" data-dcnode-id="4765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insane_asylum" title="Insane asylum"><span data-dcnode-id="4766" instrument_node="">insane asylum</span></a><span data-dcnode-id="4764" instrument_node="">, and his longtime mistress, </span><a data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juliette_Drouet" title="Juliette Drouet"><span data-dcnode-id="4763" instrument_node="">Juliette Drouet</span></a><span data-dcnode-id="4761" instrument_node="">, died in 1883. When Hugo died 28 May 1885 at the age of eighty-three, hundreds of thousands of Parisians lined the streets to pay tribute as his coffin was taken to the Panthéon on 1 June 1885.
</span></p><span data-dcnode-id="4759" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4744"><div class="thumbinner" data-dcnode-id="4745" style="width:302px;"><a class="image" data-dcnode-id="4757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1er_juin_1885_-_Enterrement_Victor_Hugo.jpg"><img alt="" class="thumbimage" data-dcnode-id="4758" data-file-height="1107" data-file-width="1802" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/1er_juin_1885_-_Enterrement_Victor_Hugo.jpg/300px-1er_juin_1885_-_Enterrement_Victor_Hugo.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/1er_juin_1885_-_Enterrement_Victor_Hugo.jpg/450px-1er_juin_1885_-_Enterrement_Victor_Hugo.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c7/1er_juin_1885_-_Enterrement_Victor_Hugo.jpg/600px-1er_juin_1885_-_Enterrement_Victor_Hugo.jpg 2x" width="300"></a><span data-dcnode-id="4756" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4746"><div class="magnify" data-dcnode-id="4754"><a class="internal" data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1er_juin_1885_-_Enterrement_Victor_Hugo.jpg" title="Enlarge"></a></div><span data-dcnode-id="4753" instrument_node="">On 1 June 1885, crowds line the streets of Paris as </span><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="4752" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="4750" instrument_node="">'s remains are taken to the </span><a data-dcnode-id="4748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panth%25C3%25A9on" title="Panthéon"><span data-dcnode-id="4749" instrument_node="">Panthéon</span></a><span data-dcnode-id="4747" instrument_node="">.</span></div></div></div><span data-dcnode-id="4743" instrument_node="">
</span><p data-dcnode-id="4718"><a data-dcnode-id="4741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Zola" title="Émile Zola"><span data-dcnode-id="4742" instrument_node="">Émile Zola</span></a><span data-dcnode-id="4740" instrument_node=""> was born in Paris in 1840, the son of an Italian engineer. He was raised by his mother in </span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aix-en-Provence" title="Aix-en-Provence"><span data-dcnode-id="4739" instrument_node="">Aix-en-Provence</span></a><span data-dcnode-id="4737" instrument_node="">, then returned to Paris in 1858 with his friend </span><a data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_C%25C3%25A9zanne" title="Paul Cézanne"><span data-dcnode-id="4736" instrument_node="">Paul Cézanne</span></a><span data-dcnode-id="4734" instrument_node=""> to attempt a literary career. He worked as a mailing clerk for the publisher </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hachette_%28publisher%29" title="Hachette (publisher)"><span data-dcnode-id="4733" instrument_node="">Hachette</span></a><span data-dcnode-id="4731" instrument_node=""> and began attracting literary attention in 1865 with his novels in the new style of </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naturalism_%28literature%29" title="Naturalism (literature)"><span data-dcnode-id="4730" instrument_node="">naturalism</span></a><span data-dcnode-id="4728" instrument_node="">. He described in intimate details the workings of Paris department stores, markets, apartment buildings and other institutions, and the lives of the Parisians. By 1877, he had become famous and wealthy from his writing. He took a central role in the </span><a data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dreyfus_affair" title="Dreyfus affair"><span data-dcnode-id="4727" instrument_node="">Dreyfus affair</span></a><span data-dcnode-id="4725" instrument_node="">, helping win justice for </span><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alfred_Dreyfus" title="Alfred Dreyfus"><span data-dcnode-id="4724" instrument_node="">Alfred Dreyfus</span></a><span data-dcnode-id="4722" instrument_node="">, a French artillery officer of </span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_Alsace" title="History of the Jews in Alsace"><span data-dcnode-id="4721" instrument_node="">Alsatian Jewish background</span></a><span data-dcnode-id="4719" instrument_node="">, who had falsely been accused of treason.
</span></p><p data-dcnode-id="4705"><a data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_de_Maupassant" title="Guy de Maupassant"><span data-dcnode-id="4717" instrument_node="">Guy de Maupassant</span></a><span data-dcnode-id="4715" instrument_node=""> (1850-1893) moved to Paris in 1881 and worked as a clerk for the </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Navy" title="French Navy"><span data-dcnode-id="4714" instrument_node="">French Navy</span></a><span data-dcnode-id="4712" instrument_node="">, then for the </span><a data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_National_Education_%28France%29" title="Ministry of National Education (France)"><span data-dcnode-id="4711" instrument_node="">Ministry of Public Education</span></a><span data-dcnode-id="4709" instrument_node="">, as he wrote short stories and novels at a furious pace. He became famous, but also became ill and depressed, then paranoid and suicidal. He died at the asylum of Saint-Esprit in </span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passy" title="Passy"><span data-dcnode-id="4708" instrument_node="">Passy</span></a><span data-dcnode-id="4706" instrument_node=""> in 1893.
</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4704" instrument_node="">Other writers who made a mark in the Paris literary world of the Third Republic's </span><i data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Belle Époque</span></i><span data-dcnode-id="4701" instrument_node=""> included </span><a data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatole_France" title="Anatole France"><span data-dcnode-id="4700" instrument_node="">Anatole France</span></a><span data-dcnode-id="4698" instrument_node=""> (1844-1924); </span><a data-dcnode-id="4696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Claudel" title="Paul Claudel"><span data-dcnode-id="4697" instrument_node="">Paul Claudel</span></a><span data-dcnode-id="4695" instrument_node=""> (1868-1955); </span><a data-dcnode-id="4693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alphonse_Allais" title="Alphonse Allais"><span data-dcnode-id="4694" instrument_node="">Alphonse Allais</span></a><span data-dcnode-id="4692" instrument_node=""> (1854-1905); </span><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guillaume_Apollinaire" title="Guillaume Apollinaire"><span data-dcnode-id="4691" instrument_node="">Guillaume Apollinaire</span></a><span data-dcnode-id="4689" instrument_node=""> (1880-1918); </span><a data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Barr%25C3%25A8s" title="Maurice Barrès"><span data-dcnode-id="4688" instrument_node="">Maurice Barrès</span></a><span data-dcnode-id="4686" instrument_node=""> (1862-1923); </span><a data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ren%25C3%25A9_Bazin" title="René Bazin"><span data-dcnode-id="4685" instrument_node="">René Bazin</span></a><span data-dcnode-id="4683" instrument_node=""> (1853-1932); </span><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colette" title="Colette"><span data-dcnode-id="4682" instrument_node="">Colette</span></a><span data-dcnode-id="4680" instrument_node=""> (1873-1954); </span><a data-dcnode-id="4678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Copp%25C3%25A9e" title="François Coppée"><span data-dcnode-id="4679" instrument_node="">François Coppée</span></a><span data-dcnode-id="4677" instrument_node=""> (1842-1908); </span><a data-dcnode-id="4675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alphonse_Daudet" title="Alphonse Daudet"><span data-dcnode-id="4676" instrument_node="">Alphonse Daudet</span></a><span data-dcnode-id="4674" instrument_node=""> (1840-1897); </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alain-Fournier" title="Alain-Fournier"><span data-dcnode-id="4673" instrument_node="">Alain Fournier</span></a><span data-dcnode-id="4671" instrument_node=""> (1886-1914); </span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Gide" title="André Gide"><span data-dcnode-id="4670" instrument_node="">André Gide</span></a><span data-dcnode-id="4668" instrument_node=""> (1869-1951); </span><a data-dcnode-id="4666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Lou%25C3%25BFs" title="Pierre Louÿs"><span data-dcnode-id="4667" instrument_node="">Pierre Louÿs</span></a><span data-dcnode-id="4665" instrument_node=""> (1870-1925); </span><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Maeterlinck" title="Maurice Maeterlinck"><span data-dcnode-id="4664" instrument_node="">Maurice Maeterlinck</span></a><span data-dcnode-id="4662" instrument_node=""> (1862-1949); </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St%25C3%25A9phane_Mallarm%25C3%25A9" title="Stéphane Mallarmé"><span data-dcnode-id="4661" instrument_node="">Stéphane Mallarmé</span></a><span data-dcnode-id="4659" instrument_node=""> (1840-1898); </span><a data-dcnode-id="4657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Octave_Mirbeau" title="Octave Mirbeau"><span data-dcnode-id="4658" instrument_node="">Octave Mirbeau</span></a><span data-dcnode-id="4656" instrument_node=""> (1848-1917); </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anna_de_Noailles" title="Anna de Noailles"><span data-dcnode-id="4655" instrument_node="">Anna de Noailles</span></a><span data-dcnode-id="4653" instrument_node=""> (1876-1933); </span><a data-dcnode-id="4651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_P%25C3%25A9guy" title="Charles Péguy"><span data-dcnode-id="4652" instrument_node="">Charles Péguy</span></a><span data-dcnode-id="4650" instrument_node=""> (1873-1914); </span><a data-dcnode-id="4648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marcel_Proust" title="Marcel Proust"><span data-dcnode-id="4649" instrument_node="">Marcel Proust</span></a><span data-dcnode-id="4647" instrument_node=""> (1871-1922); </span><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Renard" title="Jules Renard"><span data-dcnode-id="4646" instrument_node="">Jules Renard</span></a><span data-dcnode-id="4644" instrument_node=""> (1864-1910); </span><a data-dcnode-id="4642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Rimbaud" title="Arthur Rimbaud"><span data-dcnode-id="4643" instrument_node="">Arthur Rimbaud</span></a><span data-dcnode-id="4641" instrument_node=""> (1854-1891); </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romain_Rolland" title="Romain Rolland"><span data-dcnode-id="4640" instrument_node="">Romain Rolland</span></a><span data-dcnode-id="4638" instrument_node=""> (1866-1944); </span><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmond_Rostand" title="Edmond Rostand"><span data-dcnode-id="4637" instrument_node="">Edmond Rostand</span></a><span data-dcnode-id="4635" instrument_node=""> (1868-1918); and </span><a data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Verlaine" title="Paul Verlaine"><span data-dcnode-id="4634" instrument_node="">Paul Verlaine</span></a><span data-dcnode-id="4632" instrument_node=""> (1844-1890). Paris was also the home of one of the greatest Russian writers of the period, </span><a data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivan_Turgenev" title="Ivan Turgenev"><span data-dcnode-id="4631" instrument_node="">Ivan Turgenev</span></a><span data-dcnode-id="4629" instrument_node="">.
</span></p><span data-dcnode-id="4627" instrument_node="">

</span><h3 data-dcnode-id="4529"><span class="mw-headline" data-dcnode-id="4537" id="Music"><span data-dcnode-id="4538" instrument_node="">Music</span></span><span class="mw-editsection" data-dcnode-id="4530"><span class="mw-editsection-bracket" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">[</span></span><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D31" title="Edit section: Music"><span data-dcnode-id="4534" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4528" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4517"><div class="thumbinner" data-dcnode-id="4518" style="width:202px;"><a class="image" data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClaude_Debussy_ca_1908%2C_foto_av_F%25C3%25A9lix_Nadar.jpg"><img alt="" class="thumbimage" data-dcnode-id="4527" data-file-height="1616" data-file-width="1200" decoding="async" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Claude_Debussy_ca_1908%252C_foto_av_F%25C3%25A9lix_Nadar.jpg/200px-Claude_Debussy_ca_1908%252C_foto_av_F%25C3%25A9lix_Nadar.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Claude_Debussy_ca_1908%2C_foto_av_F%C3%A9lix_Nadar.jpg/300px-Claude_Debussy_ca_1908%2C_foto_av_F%C3%A9lix_Nadar.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Claude_Debussy_ca_1908%2C_foto_av_F%C3%A9lix_Nadar.jpg/400px-Claude_Debussy_ca_1908%2C_foto_av_F%C3%A9lix_Nadar.jpg 2x" width="200"></a><span data-dcnode-id="4525" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4519"><div class="magnify" data-dcnode-id="4523"><a class="internal" data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClaude_Debussy_ca_1908%2C_foto_av_F%25C3%25A9lix_Nadar.jpg" title="Enlarge"></a></div><a data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Debussy" title="Claude Debussy"><span data-dcnode-id="4522" instrument_node="">Claude Debussy</span></a><span data-dcnode-id="4520" instrument_node=""> (1908)</span></div></div></div><span data-dcnode-id="4516" instrument_node="">
</span><p data-dcnode-id="4508"><span data-dcnode-id="4515" instrument_node="">Paris composers during the period had a major impact on European music, moving it away from romanticism toward </span><a data-dcnode-id="4513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionism_in_music" title="Impressionism in music"><span data-dcnode-id="4514" instrument_node="">impressionism in music</span></a><span data-dcnode-id="4512" instrument_node=""> and </span><a data-dcnode-id="4510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernism" title="Modernism"><span data-dcnode-id="4511" instrument_node="">modernism</span></a><span data-dcnode-id="4509" instrument_node="">.
</span></p><p data-dcnode-id="4464"><a data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camille_Saint-Sa%25C3%25ABns" title="Camille Saint-Saëns"><span data-dcnode-id="4507" instrument_node="">Camille Saint-Saëns</span></a><span data-dcnode-id="4505" instrument_node=""> (1835-1921) was born in Paris and admitted to the </span><a class="mw-redirect" data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Conservatory" title="Paris Conservatory"><span data-dcnode-id="4504" instrument_node="">Paris Conservatory</span></a><span data-dcnode-id="4502" instrument_node=""> when he was thirteen. When he finished the Conservatory, he became organist at the church of </span><a data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Merri" title="Saint-Merri"><span data-dcnode-id="4501" instrument_node="">Saint-Merri</span></a><span data-dcnode-id="4499" instrument_node="">, and later at </span><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Madeleine%2C_Paris" title="La Madeleine, Paris"><span data-dcnode-id="4498" instrument_node="">La Madeleine</span></a><span data-dcnode-id="4496" instrument_node="">. His most famous works included the </span><i data-dcnode-id="4493"><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danse_macabre_%28Saint-Sa%25C3%25ABns%29" title="Danse macabre (Saint-Saëns)"><span data-dcnode-id="4495" instrument_node="">Danse Macabre</span></a></i><span data-dcnode-id="4492" instrument_node="">, the opera </span><i data-dcnode-id="4489"><a class="mw-redirect" data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samson_et_Dalila" title="Samson et Dalila"><span data-dcnode-id="4491" instrument_node="">Samson et Dalila</span></a></i><span data-dcnode-id="4488" instrument_node=""> (1877), the </span><i data-dcnode-id="4485"><a class="mw-redirect" data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carnival_of_the_Animals" title="Carnival of the Animals"><span data-dcnode-id="4487" instrument_node="">Carnival of the Animals</span></a></i><span data-dcnode-id="4484" instrument_node=""> (1877), and his </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Symphony_No._3_%28Saint-Sa%25C3%25ABns%29" title="Symphony No. 3 (Saint-Saëns)"><span data-dcnode-id="4483" instrument_node="">Symphony No. 3</span></a><span data-dcnode-id="4481" instrument_node=""> (1886). On 25 February 1871, he co-founded the </span><a class="mw-redirect" data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soci%25C3%25A9t%25C3%25A9_Nationale_de_Musique" title="Société Nationale de Musique"><span data-dcnode-id="4480" instrument_node="">Société Nationale de Musique</span></a><span data-dcnode-id="4478" instrument_node=""> with </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romain_Bussine" title="Romain Bussine"><span data-dcnode-id="4477" instrument_node="">Romain Bussine</span></a><span data-dcnode-id="4475" instrument_node=""> to promote French contemporary and chamber music. His students included </span><a data-dcnode-id="4473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Ravel" title="Maurice Ravel"><span data-dcnode-id="4474" instrument_node="">Maurice Ravel</span></a><span data-dcnode-id="4472" instrument_node=""> and </span><a data-dcnode-id="4470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gabriel_Faur%25C3%25A9" title="Gabriel Fauré"><span data-dcnode-id="4471" instrument_node="">Gabriel Fauré</span></a><span data-dcnode-id="4469" instrument_node="">, two of the foremost French composers of the late 19th- and early 20th centuries.</span><sup class="reference" data-dcnode-id="4466" id="cite_ref-FOOTNOTEPetit_Robert19881597_57-0"><a data-dcnode-id="4467" href="#cite_note-FOOTNOTEPetit_Robert19881597-57"><span data-dcnode-id="4468" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4465" instrument_node="">
</span></p><p data-dcnode-id="4443"><a data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Bizet" title="Georges Bizet"><span data-dcnode-id="4463" instrument_node="">Georges Bizet</span></a><span data-dcnode-id="4461" instrument_node=""> (1838-1875), born in Paris, was admitted to the Paris Conservatory when he was only ten years old. He finished his most famous work, </span><i data-dcnode-id="4458"><a class="mw-redirect" data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carmen_%28opera%29" title="Carmen (opera)"><span data-dcnode-id="4460" instrument_node="">Carmen</span></a></i><span data-dcnode-id="4457" instrument_node="">, written for the </span><a data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Op%25C3%25A9ra-Comique" title="Opéra-Comique"><span data-dcnode-id="4456" instrument_node="">Opéra-Comique</span></a><span data-dcnode-id="4454" instrument_node="">, in 1874. Even before its première, </span><i data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Carmen</span></i><span data-dcnode-id="4451" instrument_node=""> was criticized as immoral. Furthermore, the musicians complained that it could not be played, and the singers complained that it could be not be sung. The reviews were mixed, and the audience cold. When Bizet died in 1875, he considered it a failure. Nonetheless, </span><i data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">Carmen</span></i><span data-dcnode-id="4448" instrument_node=""> soon became one of the best-known and beloved operas in the repertoire worldwide.</span><sup class="reference" data-dcnode-id="4445" id="cite_ref-FOOTNOTEPetit_Robert1988233_58-0"><a data-dcnode-id="4446" href="#cite_note-FOOTNOTEPetit_Robert1988233-58"><span data-dcnode-id="4447" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4444" instrument_node="">
</span></p><p data-dcnode-id="4404"><span data-dcnode-id="4442" instrument_node="">The most famous French composer of the late </span><i data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">Belle Époque</span></i><span data-dcnode-id="4439" instrument_node=""> in Paris was </span><a data-dcnode-id="4437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Debussy" title="Claude Debussy"><span data-dcnode-id="4438" instrument_node="">Claude Debussy</span></a><span data-dcnode-id="4436" instrument_node=""> (1862-1918). He was born at </span><a data-dcnode-id="4434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Germain-en-Laye" title="Saint-Germain-en-Laye"><span data-dcnode-id="4435" instrument_node="">Saint-Germain-en-Laye</span></a><span data-dcnode-id="4433" instrument_node="">, near Paris, and entered the Conservatory in 1872. He became part of the Parisian literary circle of the symbolist poet Mallarme. At first an admirer of </span><a data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Wagner" title="Richard Wagner"><span data-dcnode-id="4432" instrument_node="">Richard Wagner</span></a><span data-dcnode-id="4430" instrument_node="">, he went on to experiment with </span><a data-dcnode-id="4428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionism_in_music" title="Impressionism in music"><span data-dcnode-id="4429" instrument_node="">impressionism in music</span></a><span data-dcnode-id="4427" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atonal" title="Atonal"><span data-dcnode-id="4426" instrument_node="">atonal</span></a><span data-dcnode-id="4424" instrument_node=""> music and </span><a data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromaticism" title="Chromaticism"><span data-dcnode-id="4423" instrument_node="">chromaticism</span></a><span data-dcnode-id="4421" instrument_node="">. His most famous works include </span><i data-dcnode-id="4418"><a class="mw-redirect" data-dcnode-id="4419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clair_de_lune_%28Debussy%29" title="Clair de lune (Debussy)"><span data-dcnode-id="4420" instrument_node="">Clair de Lune</span></a></i><span data-dcnode-id="4417" instrument_node=""> for piano (written ca. 1890, published 1905), </span><i data-dcnode-id="4414"><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_mer_%28Debussy%29" title="La mer (Debussy)"><span data-dcnode-id="4416" instrument_node="">La Mer</span></a></i><span data-dcnode-id="4413" instrument_node=""> for orchestra (1905) and the opera </span><i data-dcnode-id="4410"><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pell%25C3%25A9as_et_M%25C3%25A9lisande_%28opera%29" title="Pelléas et Mélisande (opera)"><span data-dcnode-id="4412" instrument_node="">Pelléas et Mélisande</span></a></i><span data-dcnode-id="4409" instrument_node=""> (1903-1905).</span><sup class="reference" data-dcnode-id="4406" id="cite_ref-FOOTNOTEPetit_Robert1988501_59-0"><a data-dcnode-id="4407" href="#cite_note-FOOTNOTEPetit_Robert1988501-59"><span data-dcnode-id="4408" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4405" instrument_node="">
</span></p><p data-dcnode-id="4372"><span data-dcnode-id="4403" instrument_node="">The most revolutionary composer to work in Paris during the </span><i data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">Belle Époque</span></i><span data-dcnode-id="4400" instrument_node=""> was the Russian-born </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Igor_Stravinsky" title="Igor Stravinsky"><span data-dcnode-id="4399" instrument_node="">Igor Stravinsky</span></a><span data-dcnode-id="4397" instrument_node="">. He first achieved international fame with three ballets commissioned by the </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impresario" title="Impresario"><span data-dcnode-id="4396" instrument_node="">impresario</span></a><span data-dcnode-id="4394" instrument_node=""> </span><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergei_Diaghilev" title="Sergei Diaghilev"><span data-dcnode-id="4393" instrument_node="">Sergei Diaghilev</span></a><span data-dcnode-id="4391" instrument_node=""> and first performed in Paris by Diaghilev's </span><a data-dcnode-id="4389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballets_Russes" title="Ballets Russes"><span data-dcnode-id="4390" instrument_node="">Ballets Russes</span></a><span data-dcnode-id="4388" instrument_node="">: </span><i data-dcnode-id="4385"><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Firebird" title="The Firebird"><span data-dcnode-id="4387" instrument_node="">The Firebird</span></a></i><span data-dcnode-id="4384" instrument_node=""> (1910), </span><i data-dcnode-id="4381"><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petrushka_%28ballet%29" title="Petrushka (ballet)"><span data-dcnode-id="4383" instrument_node="">Petrushka</span></a></i><span data-dcnode-id="4380" instrument_node=""> (1911) and </span><i data-dcnode-id="4377"><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Rite_of_Spring" title="The Rite of Spring"><span data-dcnode-id="4379" instrument_node="">The Rite of Spring</span></a></i><span data-dcnode-id="4376" instrument_node=""> (1913). The last of these transformed the way in which subsequent composers thought about rhythmic structure and </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Consonance_and_dissonance" title="Consonance and dissonance"><span data-dcnode-id="4375" instrument_node="">dissonance</span></a><span data-dcnode-id="4373" instrument_node=""> treatment.
</span></p><p data-dcnode-id="4345"><span data-dcnode-id="4371" instrument_node="">Other influential composers in Paris during the period included </span><a data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Massenet" title="Jules Massenet"><span data-dcnode-id="4370" instrument_node="">Jules Massenet</span></a><span data-dcnode-id="4368" instrument_node=""> (1842-1912), author of the operas </span><i data-dcnode-id="4365"><a data-dcnode-id="4366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manon" title="Manon"><span data-dcnode-id="4367" instrument_node="">Manon</span></a></i><span data-dcnode-id="4364" instrument_node=""> and </span><i data-dcnode-id="4361"><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Werther" title="Werther"><span data-dcnode-id="4363" instrument_node="">Werther</span></a></i><span data-dcnode-id="4360" instrument_node="">,  and </span><a class="mw-redirect" data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Satie" title="Eric Satie"><span data-dcnode-id="4359" instrument_node="">Eric Satie</span></a><span data-dcnode-id="4357" instrument_node=""> (1866-1925), who made his living as a pianist at </span><a data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Chat_Noir" title="Le Chat Noir"><span data-dcnode-id="4356" instrument_node="">Le Chat Noir</span></a><span data-dcnode-id="4354" instrument_node="">, a cabaret on Montmartre, after leaving the Conservatory. His most famous works are the </span><i data-dcnode-id="4351"><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gymnop%25C3%25A9dies" title="Gymnopédies"><span data-dcnode-id="4353" instrument_node="">Gymnopédies</span></a></i><span data-dcnode-id="4350" instrument_node=""> (1888).</span><sup class="reference" data-dcnode-id="4347" id="cite_ref-FOOTNOTEPetit_Robert19881622_60-0"><a data-dcnode-id="4348" href="#cite_note-FOOTNOTEPetit_Robert19881622-60"><span data-dcnode-id="4349" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4346" instrument_node="">

</span><h3 data-dcnode-id="4229"><span class="mw-headline" data-dcnode-id="4237" id="Painting"><span data-dcnode-id="4238" instrument_node="">Painting</span></span><span class="mw-editsection" data-dcnode-id="4230"><span class="mw-editsection-bracket" data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">[</span></span><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D32" title="Edit section: Painting"><span data-dcnode-id="4234" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4228" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4200"><div class="thumbinner" data-dcnode-id="4201" style="width:302px;"><a class="image" data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APierre-Auguste_Renoir_064.jpg"><img alt="" class="thumbimage" data-dcnode-id="4227" data-file-height="1041" data-file-width="1398" decoding="async" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Pierre-Auguste_Renoir_064.jpg/300px-Pierre-Auguste_Renoir_064.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Pierre-Auguste_Renoir_064.jpg/450px-Pierre-Auguste_Renoir_064.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/46/Pierre-Auguste_Renoir_064.jpg/600px-Pierre-Auguste_Renoir_064.jpg 2x" width="300"></a><span data-dcnode-id="4225" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4202"><div class="magnify" data-dcnode-id="4223"><a class="internal" data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APierre-Auguste_Renoir_064.jpg" title="Enlarge"></a></div><span data-dcnode-id="4222" instrument_node="">The </span><i data-dcnode-id="4219"><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bal_du_moulin_de_la_Galette" title="Bal du moulin de la Galette"><span data-dcnode-id="4221" instrument_node="">Bal du moulin de la Galette</span></a></i><span data-dcnode-id="4218" instrument_node=""> by </span><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre-Auguste_Renoir" title="Pierre-Auguste Renoir"><span data-dcnode-id="4217" instrument_node="">Pierre-Auguste Renoir</span></a><span data-dcnode-id="4215" instrument_node=""> (1876) depicts a Sunday afternoon dance in </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montmartre" title="Montmartre"><span data-dcnode-id="4214" instrument_node="">Montmartre</span></a><span data-dcnode-id="4212" instrument_node="">. Paris became the birthplace of </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionism" title="Impressionism"><span data-dcnode-id="4211" instrument_node="">Impressionism</span></a><span data-dcnode-id="4209" instrument_node=""> and </span><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_art" title="Modern art"><span data-dcnode-id="4208" instrument_node="">modern art</span></a><span data-dcnode-id="4206" instrument_node=""> during the </span><i data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Belle Époque</span></i><span data-dcnode-id="4203" instrument_node="">.</span></div></div></div><span data-dcnode-id="4199" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4198" instrument_node="">Paris was the home and the frequent subject of the </span><a class="mw-redirect" data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impressionists" title="Impressionists"><span data-dcnode-id="4197" instrument_node="">Impressionists</span></a><span data-dcnode-id="4195" instrument_node="">, who tried to capture the city's light, its colors, and its motion. They survived and flourished because of the support of Paris art dealers, such as </span><a data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ambroise_Vollard" title="Ambroise Vollard"><span data-dcnode-id="4194" instrument_node="">Ambroise Vollard</span></a><span data-dcnode-id="4192" instrument_node=""> and </span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel-Henry_Kahnweiler" title="Daniel-Henry Kahnweiler"><span data-dcnode-id="4191" instrument_node="">Daniel-Henry Kahnweiler</span></a><span data-dcnode-id="4189" instrument_node="">, and wealthy patrons, including </span><a data-dcnode-id="4187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gertrude_Stein" title="Gertrude Stein"><span data-dcnode-id="4188" instrument_node="">Gertrude Stein</span></a><span data-dcnode-id="4186" instrument_node="">,
</span></p><p data-dcnode-id="4155"><span data-dcnode-id="4184" instrument_node="">The first exhibit of the Impressionists took place from April 15 to May 15, 1874 in the studio of the photographer </span><a class="mw-redirect" data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nadar_%28photographer%29" title="Nadar (photographer)"><span data-dcnode-id="4183" instrument_node="">Nadar</span></a><span data-dcnode-id="4181" instrument_node="">. It was open to any painter who could pay a fee of sixty francs. There, </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Monet" title="Claude Monet"><span data-dcnode-id="4180" instrument_node="">Claude Monet</span></a><span data-dcnode-id="4178" instrument_node=""> exhibited the painting </span><i data-dcnode-id="4175"><a class="mw-redirect" data-dcnode-id="4176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impression%3A_Sunrise" title="Impression: Sunrise"><span data-dcnode-id="4177" instrument_node="">Impression: Sunrise</span></a></i><span data-dcnode-id="4174" instrument_node=""> (</span><i data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Impression, soleil levant</span></i><span data-dcnode-id="4171" instrument_node="">), which gave the movement its name. Other artists who took part included </span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre-Auguste_Renoir" title="Pierre-Auguste Renoir"><span data-dcnode-id="4170" instrument_node="">Pierre-Auguste Renoir</span></a><span data-dcnode-id="4168" instrument_node="">, </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berthe_Morisot" title="Berthe Morisot"><span data-dcnode-id="4167" instrument_node="">Berthe Morisot</span></a><span data-dcnode-id="4165" instrument_node="">, </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edgar_Degas" title="Edgar Degas"><span data-dcnode-id="4164" instrument_node="">Edgar Degas</span></a><span data-dcnode-id="4162" instrument_node="">, </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camille_Pissarro" title="Camille Pissarro"><span data-dcnode-id="4161" instrument_node="">Camille Pissarro</span></a><span data-dcnode-id="4159" instrument_node="">, and </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_C%25C3%25A9zanne" title="Paul Cézanne"><span data-dcnode-id="4158" instrument_node="">Paul Cézanne</span></a><span data-dcnode-id="4156" instrument_node="">.
</span></p><span data-dcnode-id="4154" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4142"><div class="thumbinner" data-dcnode-id="4143" style="width:202px;"><a class="image" data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_Demoiselles_d%2527Avignon.jpg"><img alt="" class="thumbimage" data-dcnode-id="4153" data-file-height="4661" data-file-width="4500" decoding="async" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/4/4c/Les_Demoiselles_d%2527Avignon.jpg/200px-Les_Demoiselles_d%2527Avignon.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/4/4c/Les_Demoiselles_d%27Avignon.jpg/300px-Les_Demoiselles_d%27Avignon.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/4/4c/Les_Demoiselles_d%27Avignon.jpg/400px-Les_Demoiselles_d%27Avignon.jpg 2x" width="200"></a><span data-dcnode-id="4151" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4144"><div class="magnify" data-dcnode-id="4149"><a class="internal" data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALes_Demoiselles_d%2527Avignon.jpg" title="Enlarge"></a></div><i data-dcnode-id="4146"><a data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Les_Demoiselles_d%2527Avignon" title="Les Demoiselles d'Avignon"><span data-dcnode-id="4148" instrument_node="">Les Demoiselles d'Avignon</span></a></i><span data-dcnode-id="4145" instrument_node=""> painted by Picasso in Montmartre (1907)</span></div></div></div><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4108"><a data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_de_Toulouse-Lautrec" title="Henri de Toulouse-Lautrec"><span data-dcnode-id="4140" instrument_node="">Henri de Toulouse-Lautrec</span></a><span data-dcnode-id="4138" instrument_node=""> (1864-1901) spent much of his short life in Montmartre painting and drawing the dancers in cabarets. He produced 737 canvases in his lifetime, thousands of drawings and a series of posters made for the cabaret </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moulin_Rouge" title="Moulin Rouge"><span data-dcnode-id="4137" instrument_node="">Moulin Rouge</span></a><span data-dcnode-id="4135" instrument_node="">. Many other artists lived and worked in </span><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Montmartre" title="Montmartre"><span data-dcnode-id="4134" instrument_node="">Montmartre</span></a><span data-dcnode-id="4132" instrument_node="">, where rent was low and the atmosphere congenial. In 1876, </span><a class="mw-redirect" data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Renoir" title="Auguste Renoir"><span data-dcnode-id="4131" instrument_node="">Auguste Renoir</span></a><span data-dcnode-id="4129" instrument_node=""> rented space at 12 Rue Cartot to paint his </span><i data-dcnode-id="4126"><a data-dcnode-id="4127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bal_du_moulin_de_la_Galette" title="Bal du moulin de la Galette"><span data-dcnode-id="4128" instrument_node="">Bal du moulin de la Galette</span></a></i><span data-dcnode-id="4125" instrument_node="">, which depicts a popular ball at Montmartre on a Sunday afternoon. </span><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Utrillo" title="Maurice Utrillo"><span data-dcnode-id="4124" instrument_node="">Maurice Utrillo</span></a><span data-dcnode-id="4122" instrument_node=""> lived at the same address from 1906 to 1914, </span><a data-dcnode-id="4120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suzanne_Valadon" title="Suzanne Valadon"><span data-dcnode-id="4121" instrument_node="">Suzanne Valadon</span></a><span data-dcnode-id="4119" instrument_node=""> lived and had her studio there, and </span><a data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raoul_Dufy" title="Raoul Dufy"><span data-dcnode-id="4118" instrument_node="">Raoul Dufy</span></a><span data-dcnode-id="4116" instrument_node=""> shared an atelier there from 1901 to 1911. The building is now the </span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_de_Montmartre" title="Musée de Montmartre"><span data-dcnode-id="4115" instrument_node="">Musée de Montmartre</span></a><span data-dcnode-id="4113" instrument_node="">.</span><sup class="reference" data-dcnode-id="4110" id="cite_ref-Paris,_2013_61-0"><a data-dcnode-id="4111" href="#cite_note-Paris,_2013-61"><span data-dcnode-id="4112" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4109" instrument_node="">
</span></p><span data-dcnode-id="4107" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4093"><div class="thumbinner" data-dcnode-id="4094" style="width:302px;"><a class="image" data-dcnode-id="4105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMatisse-Luxe.jpg"><img alt="" class="thumbimage" data-dcnode-id="4106" data-file-height="1467" data-file-width="1779" decoding="async" height="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/07/Matisse-Luxe.jpg/300px-Matisse-Luxe.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/07/Matisse-Luxe.jpg/450px-Matisse-Luxe.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/0/07/Matisse-Luxe.jpg/600px-Matisse-Luxe.jpg 2x" width="300"></a><span data-dcnode-id="4104" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4095"><div class="magnify" data-dcnode-id="4102"><a class="internal" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMatisse-Luxe.jpg" title="Enlarge"></a></div><i data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">Luxe, Calme, et Volupté</span></i><span data-dcnode-id="4099" instrument_node=""> by </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Matisse" title="Henri Matisse"><span data-dcnode-id="4098" instrument_node="">Henri Matisse</span></a><span data-dcnode-id="4096" instrument_node=""> (1904)</span></div></div></div><span data-dcnode-id="4092" instrument_node="">
</span><p data-dcnode-id="4058"><span data-dcnode-id="4091" instrument_node="">A new generation of artists arrived in Montmartre at the turn of the century. Drawn by the reputation of Paris as the world capital of art, </span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pablo_Picasso" title="Pablo Picasso"><span data-dcnode-id="4090" instrument_node="">Pablo Picasso</span></a><span data-dcnode-id="4088" instrument_node=""> came from </span><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barcelona" title="Barcelona"><span data-dcnode-id="4087" instrument_node="">Barcelona</span></a><span data-dcnode-id="4085" instrument_node=""> in 1900 to share an apartment with the poet </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Ernst" title="Max Ernst"><span data-dcnode-id="4084" instrument_node="">Max Ernst</span></a><span data-dcnode-id="4082" instrument_node=""> and began by painting the cabarets and prostitutes of the neighborhood. </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amedeo_Modigliani" title="Amedeo Modigliani"><span data-dcnode-id="4081" instrument_node="">Amedeo Modigliani</span></a><span data-dcnode-id="4079" instrument_node=""> and other artists lived and worked in a building called </span><a class="mw-redirect" data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Bateau-Lavoir" title="Le Bateau-Lavoir"><span data-dcnode-id="4078" instrument_node="">Le Bateau-Lavoir</span></a><span data-dcnode-id="4076" instrument_node=""> during the years 1904–1909. In 1907, Picasso painted one of his most important masterpieces, </span><i data-dcnode-id="4073"><a data-dcnode-id="4074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Les_Demoiselles_d%2527Avignon" title="Les Demoiselles d'Avignon"><span data-dcnode-id="4075" instrument_node="">Les Demoiselles d'Avignon</span></a></i><span data-dcnode-id="4072" instrument_node="">, in </span><a class="mw-redirect" data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Bateau-Lavoir" title="Le Bateau-Lavoir"><span data-dcnode-id="4071" instrument_node="">Le Bateau-Lavoir</span></a><span data-dcnode-id="4069" instrument_node="">. Led by Picasso and </span><a data-dcnode-id="4067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Braque" title="Georges Braque"><span data-dcnode-id="4068" instrument_node="">Georges Braque</span></a><span data-dcnode-id="4066" instrument_node="">, the artistic movement </span><a data-dcnode-id="4064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cubism" title="Cubism"><span data-dcnode-id="4065" instrument_node="">cubism</span></a><span data-dcnode-id="4063" instrument_node=""> was born in Paris.</span><sup class="reference" data-dcnode-id="4060" id="cite_ref-FOOTNOTEPetit_Robert19881416_62-0"><a data-dcnode-id="4061" href="#cite_note-FOOTNOTEPetit_Robert19881416-62"><span data-dcnode-id="4062" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4059" instrument_node="">
</span></p><p data-dcnode-id="3997"><a data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Matisse" title="Henri Matisse"><span data-dcnode-id="4057" instrument_node="">Henri Matisse</span></a><span data-dcnode-id="4055" instrument_node=""> came to Paris in 1891 to study at the </span><a class="mw-redirect" data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acad%25C3%25A9mie_Julien" title="Académie Julien"><span data-dcnode-id="4054" instrument_node="">Académie Julien</span></a><span data-dcnode-id="4052" instrument_node=""> in the class of painter </span><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Moreau" title="Gustave Moreau"><span data-dcnode-id="4051" instrument_node="">Gustave Moreau</span></a><span data-dcnode-id="4049" instrument_node="">, who advised him to copy paintings in the Louvre and study </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_art" title="Islamic art"><span data-dcnode-id="4048" instrument_node="">Islamic art</span></a><span data-dcnode-id="4046" instrument_node="">, which Matisse did. He also made the acquaintance of </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raoul_Dufy" title="Raoul Dufy"><span data-dcnode-id="4045" instrument_node="">Raoul Dufy</span></a><span data-dcnode-id="4043" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C%25C3%25A9zanne" title="Cézanne"><span data-dcnode-id="4042" instrument_node="">Cézanne</span></a><span data-dcnode-id="4040" instrument_node="">, </span><a data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Rouault" title="Georges Rouault"><span data-dcnode-id="4039" instrument_node="">Georges Rouault</span></a><span data-dcnode-id="4037" instrument_node=""> and </span><a data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Gauguin" title="Paul Gauguin"><span data-dcnode-id="4036" instrument_node="">Paul Gauguin</span></a><span data-dcnode-id="4034" instrument_node="">, and began to paint in the style of Cézanne. Matisse visited </span><a data-dcnode-id="4032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Tropez" title="Saint-Tropez"><span data-dcnode-id="4033" instrument_node="">Saint-Tropez</span></a><span data-dcnode-id="4031" instrument_node=""> in 1905, and when he returned to Paris, he painted a revolutionary work, </span><i data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Luxe, Calme et Volupté</span></i><span data-dcnode-id="4028" instrument_node="">, using bright colors and bold dabs of paint.</span><sup class="reference" data-dcnode-id="4025" id="cite_ref-FOOTNOTEPetit_Robert19881416_62-1"><a data-dcnode-id="4026" href="#cite_note-FOOTNOTEPetit_Robert19881416-62"><span data-dcnode-id="4027" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4024" instrument_node=""> Matisse and artists such as </span><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Derain" title="André Derain"><span data-dcnode-id="4023" instrument_node="">André Derain</span></a><span data-dcnode-id="4021" instrument_node="">, </span><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raoul_Dufy" title="Raoul Dufy"><span data-dcnode-id="4020" instrument_node="">Raoul Dufy</span></a><span data-dcnode-id="4018" instrument_node="">, </span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean_Metzinger" title="Jean Metzinger"><span data-dcnode-id="4017" instrument_node="">Jean Metzinger</span></a><span data-dcnode-id="4015" instrument_node="">, </span><a data-dcnode-id="4013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_de_Vlaminck" title="Maurice de Vlaminck"><span data-dcnode-id="4014" instrument_node="">Maurice de Vlaminck</span></a><span data-dcnode-id="4012" instrument_node=""> and </span><a data-dcnode-id="4010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Camoin" title="Charles Camoin"><span data-dcnode-id="4011" instrument_node="">Charles Camoin</span></a><span data-dcnode-id="4009" instrument_node=""> revolutionized the Paris art world with "wild", multi-colored, expressive landscapes and figure paintings that the critics called </span><a data-dcnode-id="4007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fauvism" title="Fauvism"><span data-dcnode-id="4008" instrument_node="">Fauvism</span></a><span data-dcnode-id="4006" instrument_node="">. Henri Matisse's two versions of </span><a class="mw-redirect" data-dcnode-id="4003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Dance_%28painting%29" title="The Dance (painting)"><i data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">The Dance</span></i></a><span data-dcnode-id="4002" instrument_node=""> (1909) signified a key point in the development of modern painting.</span><sup class="reference" data-dcnode-id="3999" id="cite_ref-63"><a data-dcnode-id="4000" href="#cite_note-63"><span data-dcnode-id="4001" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3998" instrument_node="">
</span></p><p data-dcnode-id="3957"><span data-dcnode-id="3996" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="3994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Salon" title="Paris Salon"><span data-dcnode-id="3995" instrument_node="">Paris Salon</span></a><span data-dcnode-id="3993" instrument_node="">, which had established the reputations and measured the success of painters throughout the Second Empire, continued to take place under the Third Republic until 1881, when a more radical French government denied it official sponsorship. It was replaced by a new Salon sponsored by the </span><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soci%25C3%25A9t%25C3%25A9_des_Artistes_Fran%25C3%25A7ais" title="Société des Artistes Français"><span data-dcnode-id="3992" instrument_node="">Société des Artistes Français</span></a><span data-dcnode-id="3990" instrument_node="">. In December 1890, the leader of the society, </span><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William-Adolphe_Bouguereau" title="William-Adolphe Bouguereau"><span data-dcnode-id="3989" instrument_node="">William-Adolphe Bouguereau</span></a><span data-dcnode-id="3987" instrument_node="">, propagated the idea that the new Salon should be an exhibition of young, yet not awarded, artists. </span><a data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernest_Meissonier" title="Ernest Meissonier"><span data-dcnode-id="3986" instrument_node="">Ernest Meissonier</span></a><span data-dcnode-id="3984" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puvis_de_Chavannes" title="Puvis de Chavannes"><span data-dcnode-id="3983" instrument_node="">Puvis de Chavannes</span></a><span data-dcnode-id="3981" instrument_node="">, </span><a data-dcnode-id="3979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Rodin" title="Auguste Rodin"><span data-dcnode-id="3980" instrument_node="">Auguste Rodin</span></a><span data-dcnode-id="3978" instrument_node=""> and others rejected this proposal and made a secession. They created the </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soci%25C3%25A9t%25C3%25A9_Nationale_des_Beaux-Arts" title="Société Nationale des Beaux-Arts"><span data-dcnode-id="3977" instrument_node="">Société Nationale des Beaux-Arts</span></a><span data-dcnode-id="3975" instrument_node=""> and its own exhibition, immediately referred to in the press as the Salon du Champ de Mars</span><sup class="reference" data-dcnode-id="3972" id="cite_ref-64"><a data-dcnode-id="3973" href="#cite_note-64"><span data-dcnode-id="3974" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3971" instrument_node=""> or the Salon de la Société Nationale des Beaux–Arts;</span><sup class="reference" data-dcnode-id="3968" id="cite_ref-65"><a data-dcnode-id="3969" href="#cite_note-65"><span data-dcnode-id="3970" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3967" instrument_node=""> it was soon also widely known as the "Nationale". In 1903, in response to what many artists at the time felt was a bureaucratic and conservative organization, a group of painters and sculptors led by </span><a data-dcnode-id="3965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre-Auguste_Renoir" title="Pierre-Auguste Renoir"><span data-dcnode-id="3966" instrument_node="">Pierre-Auguste Renoir</span></a><span data-dcnode-id="3964" instrument_node=""> and </span><a data-dcnode-id="3962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Rodin" title="Auguste Rodin"><span data-dcnode-id="3963" instrument_node="">Auguste Rodin</span></a><span data-dcnode-id="3961" instrument_node=""> organized the </span><a data-dcnode-id="3959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salon_d%2527Automne" title="Salon d'Automne"><span data-dcnode-id="3960" instrument_node="">Salon d'Automne</span></a><span data-dcnode-id="3958" instrument_node="">.
</span></p><span data-dcnode-id="3956" instrument_node="">
