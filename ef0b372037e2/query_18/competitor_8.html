</span><div class="thumb tright" data-dcnode-id="5516"><div class="thumbinner" data-dcnode-id="5517" style="width:202px;"><a class="image" data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASOLparkParis.jpg"><img alt="" class="thumbimage" data-dcnode-id="5536" data-file-height="1088" data-file-width="873" decoding="async" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/SOLparkParis.jpg/200px-SOLparkParis.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8a/SOLparkParis.jpg/300px-SOLparkParis.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8a/SOLparkParis.jpg/400px-SOLparkParis.jpg 2x" width="200"></a><span data-dcnode-id="5534" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5518"><div class="magnify" data-dcnode-id="5532"><a class="internal" data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASOLparkParis.jpg" title="Enlarge"></a></div><span data-dcnode-id="5531" instrument_node="">At the UniversExposition of 1878, the </span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jardins_du_Trocad%25C3%25A9ro" title="Jardins du Trocadéro"><span data-dcnode-id="5530" instrument_node="">Gardens of the Trocadéro</span></a><span data-dcnode-id="5528" instrument_node=""> displayed the full-size head of the </span><a data-dcnode-id="5526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty" title="Statue of Liberty"><span data-dcnode-id="5527" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="5525" instrument_node=""> (</span><i data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">Liberty Enlightening the World</span></i><span data-dcnode-id="5522" instrument_node="">) before the statue was completed and shipped to </span><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="5521" instrument_node="">New York City</span></a><span data-dcnode-id="5519" instrument_node="">.</span></div></div></div><span data-dcnode-id="5515" instrument_node="">
</span><p data-dcnode-id="5478"><span data-dcnode-id="5514" instrument_node="">The work of creating parks, squares and promenades during the </span><i data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5511" instrument_node=""> continued in the Second Empire style. The projects were managed at first by </span><a class="mw-redirect" data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Charles_Adolphe_Alphand" title="Jean-Charles Adolphe Alphand"><span data-dcnode-id="5510" instrument_node="">Jean-Charles Adolphe Alphand</span></a><span data-dcnode-id="5508" instrument_node="">, who had been the head of department of parks and promenades under Haussmann and was elevated to the post of Director of Public Works of Paris, a position he held until his death in 1891. He was also the director of works of the 1889 Universal Exposition, responsible for building the exposition's gardens and pavilions.</span><sup class="reference" data-dcnode-id="5505" id="cite_ref-FOOTNOTEJarrassé2007162–183_43-0"><a data-dcnode-id="5506" href="#cite_note-FOOTNOTEJarrass%C3%A92007162%E2%80%93183-43"><span data-dcnode-id="5507" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5504" instrument_node=""> Alphand finished several of the projects begun under Haussmann:  the </span><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parc_Montsouris" title="Parc Montsouris"><span data-dcnode-id="5503" instrument_node="">Parc Montsouris</span></a><span data-dcnode-id="5501" instrument_node=""> (1869–1878), the Square Boucicaut (1873), and the Square Popincourt (later renamed Parmentier, and still later Maurice-Gardette), which replaced a demolished slaughterhouse and opened in 1872. Alphand's first major project of the </span><i data-dcnode-id="5499"><span data-dcnode-id="5500" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5498" instrument_node=""> was the </span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jardins_du_Trocad%25C3%25A9ro" title="Jardins du Trocadéro"><span data-dcnode-id="5497" instrument_node="">Jardins du Trocadéro</span></a><span data-dcnode-id="5495" instrument_node="">, the site of the Universal Exposition of 1878 that surrounded the enormous Palais de Trocadéro, which served as the main building for the exposition. He filled the park with a grotto, fountains, gardens and statues (the statues can now be seen on the parvis of the </span><a data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_d%27Orsay" title="Musée d'Orsay"><span data-dcnode-id="5494" instrument_node="">Musée d'Orsay</span></a><span data-dcnode-id="5492" instrument_node="">). The park also displayed the full-sized head of the </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty" title="Statue of Liberty"><span data-dcnode-id="5491" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="5489" instrument_node=""> (</span><i data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">Liberty Enlightening the World</span></i><span data-dcnode-id="5486" instrument_node="">) before the statue was completed and shipped to </span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="5485" instrument_node="">New York City</span></a><span data-dcnode-id="5483" instrument_node="">. The grotto and much of the park are still preserved as they were. It was used again for the Universal Exposition of 1889 Exposition, and with new fountains and a new palace added, it was also used for the Universal Exposition of 1937.</span><sup class="reference" data-dcnode-id="5480" id="cite_ref-FOOTNOTEJarrassé2007162–183_43-1"><a data-dcnode-id="5481" href="#cite_note-FOOTNOTEJarrass%C3%A92007162%E2%80%93183-43"><span data-dcnode-id="5482" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5479" instrument_node="">
</span></p><p data-dcnode-id="5466"><span data-dcnode-id="5477" instrument_node="">During the exposition of 1878, Alphand used the </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champ_de_Mars" title="Champ de Mars"><span data-dcnode-id="5476" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="5474" instrument_node=""> as the site of a huge iron-framed exhibit hall, 725 meters long, surrounded by gardens. For the 1889 exposition, the same site was occupied by the Eiffel Tower and the huge Gallery of Machines, plus two large exhibit halls: the Palace of Liberal Arts and the Palace of Fine Arts. The two palaces were designed by </span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Camille_Formig%25C3%25A9" title="Jean-Camille Formigé"><span data-dcnode-id="5473" instrument_node="">Jean-Camille Formigé</span></a><span data-dcnode-id="5471" instrument_node="">, the chief architect of Paris. The two palaces and the Gallery of Machines were demolished after the exposition, but in 1909, Formigé was given the task of transforming the exposition site around the Eiffel Tower into a park with broad lawns, promenades and groves of trees in the form it is today.</span><sup class="reference" data-dcnode-id="5468" id="cite_ref-FOOTNOTEJarrassé2007162–183_43-2"><a data-dcnode-id="5469" href="#cite_note-FOOTNOTEJarrass%C3%A92007162%E2%80%93183-43"><span data-dcnode-id="5470" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5467" instrument_node="">
</span></p><span data-dcnode-id="5465" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5450"><div class="thumbinner" data-dcnode-id="5451" style="width:252px;"><a class="image" data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Bois_Boulogne_Serres_Auteuil.jpg"><img alt="" class="thumbimage" data-dcnode-id="5464" data-file-height="1110" data-file-width="1700" decoding="async" height="163" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Paris_Bois_Boulogne_Serres_Auteuil.jpg/250px-Paris_Bois_Boulogne_Serres_Auteuil.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/79/Paris_Bois_Boulogne_Serres_Auteuil.jpg/375px-Paris_Bois_Boulogne_Serres_Auteuil.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/79/Paris_Bois_Boulogne_Serres_Auteuil.jpg/500px-Paris_Bois_Boulogne_Serres_Auteuil.jpg 2x" width="250"></a><span data-dcnode-id="5462" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5452"><div class="magnify" data-dcnode-id="5460"><a class="internal" data-dcnode-id="5461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Bois_Boulogne_Serres_Auteuil.jpg" title="Enlarge"></a></div><span data-dcnode-id="5459" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serres_d%2527Auteuil" title="Serres d'Auteuil"><span data-dcnode-id="5458" instrument_node="">Serres d'Auteuil</span></a><span data-dcnode-id="5456" instrument_node=""> (1898), next to the </span><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bois_de_Boulogne" title="Bois de Boulogne"><span data-dcnode-id="5455" instrument_node="">Bois de Boulogne</span></a><span data-dcnode-id="5453" instrument_node="">, provided trees, shrubs and flowers for all the parks of Paris</span></div></div></div><span data-dcnode-id="5449" instrument_node="">
</span><p data-dcnode-id="5441"><span data-dcnode-id="5448" instrument_node="">Between 1895 and 1898, Formigé created another </span><i data-dcnode-id="5446"><span data-dcnode-id="5447" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5445" instrument_node=""> landmark, the </span><a class="mw-redirect" data-dcnode-id="5443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serres_d%2527Auteuil" title="Serres d'Auteuil"><span data-dcnode-id="5444" instrument_node="">Serres d'Auteuil</span></a><span data-dcnode-id="5442" instrument_node="">, a complex of large greenhouses designed to grow trees and plants for all the gardens and parks of Paris. The largest structure, one hundred meters long, was designed to grow tropical plants. The greenhouses still exist today and are open to the public.
</span></p><p data-dcnode-id="5432"><span data-dcnode-id="5440" instrument_node="">Other than the parks of the expositions, no other large Paris parks were created in the </span><i data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5437" instrument_node="">, but several squares of about one hectare each were created. They all had the same basic design: a bandstand in the center, a fence, groves of trees and flower beds, and often also statues. These included the Square Édouard-Vaillant in the 20th arrondissement (1879), the Square Samuel-de-Champlain in the 20th arrondissement (1889), the Square des Épinettes in the 17th arrondissement (1893), the Square Scipion in the 5th arrondissement (1899), the Square Paul-Painlevé in the 5th arrondissement (1899) and the Square Carpeaux in the 18th arrondissement (1907).</span><sup class="reference" data-dcnode-id="5434" id="cite_ref-FOOTNOTEJarrassé2007162–183_43-3"><a data-dcnode-id="5435" href="#cite_note-FOOTNOTEJarrass%C3%A92007162%E2%80%93183-43"><span data-dcnode-id="5436" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5433" instrument_node="">
</span></p><p data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">The best-known and most picturesque park of the period is that composed of the Squares Willette and Nadar on the slope directly below the Basilica of Sacré-Cœur on Montmartre. It was begun by Formigé in 1880, but not completed until 1927 by another architect, Léopold Béviére, after the death of Formigé in 1926. The park features terraces and slopes dropping eighty meters from the Basilica to the street below, and has one of the best-known views in Paris.
</span></p><span data-dcnode-id="5429" instrument_node="">
</span><h3 data-dcnode-id="5419"><span class="mw-headline" data-dcnode-id="5427" id="Street_lighting"><span data-dcnode-id="5428" instrument_node="">Street lighting</span></span><span class="mw-editsection" data-dcnode-id="5420"><span class="mw-editsection-bracket" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">[</span></span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D21" title="Edit section: Street lighting"><span data-dcnode-id="5424" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5421"><span data-dcnode-id="5422" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5418" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5406"><div class="thumbinner" data-dcnode-id="5407" style="width:302px;"><a class="image" data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYablochkov_candles_illuminating_Avenue_de_l%2527Opera_ca1878.jpg"><img alt="" class="thumbimage" data-dcnode-id="5417" data-file-height="480" data-file-width="780" decoding="async" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Yablochkov_candles_illuminating_Avenue_de_l%2527Opera_ca1878.jpg/300px-Yablochkov_candles_illuminating_Avenue_de_l%2527Opera_ca1878.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Yablochkov_candles_illuminating_Avenue_de_l%27Opera_ca1878.jpg/450px-Yablochkov_candles_illuminating_Avenue_de_l%27Opera_ca1878.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Yablochkov_candles_illuminating_Avenue_de_l%27Opera_ca1878.jpg/600px-Yablochkov_candles_illuminating_Avenue_de_l%27Opera_ca1878.jpg 2x" width="300"></a><span data-dcnode-id="5415" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5408"><div class="magnify" data-dcnode-id="5413"><a class="internal" data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYablochkov_candles_illuminating_Avenue_de_l%2527Opera_ca1878.jpg" title="Enlarge"></a></div><span data-dcnode-id="5412" instrument_node="">The first electric street lights in Paris, on the </span><a data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_de_l%27Op%25C3%25A9ra" title="Avenue de l'Opéra"><span data-dcnode-id="5411" instrument_node="">Avenue de l'Opéra</span></a><span data-dcnode-id="5409" instrument_node=""> (1878)</span></div></div></div><span data-dcnode-id="5405" instrument_node="">
</span><p data-dcnode-id="5380"><span data-dcnode-id="5404" instrument_node="">At the beginning of the </span><i data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5401" instrument_node="">, Paris was lit by a constellation of thousands of </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaslighting" title="Gaslighting"><span data-dcnode-id="5400" instrument_node="">gaslights</span></a><span data-dcnode-id="5398" instrument_node=""> that were often admired by foreign visitors and helped give the city its nickname </span><i data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">La Ville-Lumière</span></i><span data-dcnode-id="5395" instrument_node="">: the "City of Light". In 1870, there were 56,573 gaslights used exclusively to illuminate the streets of the city.</span><sup class="reference" data-dcnode-id="5392" id="cite_ref-Camp,_Maxime_p._596_44-0"><a data-dcnode-id="5393" href="#cite_note-Camp,_Maxime_p._596-44"><span data-dcnode-id="5394" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5391" instrument_node=""> The gas was produced by ten enormous factories around the edge of the city that were located near the circle of fortifications. It was distributed in pipes installed under the new boulevards and streets. The street lights were placed every twenty meters on the Grands Boulevards. At a predetermined minute after nightfall, a small army of 750 uniformed </span><i data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">allumeurs</span></i><span data-dcnode-id="5388" instrument_node=""> ("lighters") carrying long poles with small lamps at the end went out into the streets to turn on a pipe of gas inside each lamppost and light the lamp. The entire city was illuminated within forty minutes. The Arc de Triomphe was crowned with a ring of gaslights, and the </span><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champs-%25C3%2589lys%25C3%25A9es" title="Champs-Élysées"><span data-dcnode-id="5387" instrument_node="">Champs-Élysées</span></a><span data-dcnode-id="5385" instrument_node=""> was lined with ribbons of white light.</span><sup class="reference" data-dcnode-id="5382" id="cite_ref-Camp,_Maxime_p._596_44-1"><a data-dcnode-id="5383" href="#cite_note-Camp,_Maxime_p._596-44"><span data-dcnode-id="5384" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5381" instrument_node="">
</span></p><p data-dcnode-id="5371"><span data-dcnode-id="5379" instrument_node="">One of the major urban innovations in Paris was the introduction of </span><a class="mw-redirect" data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electric_street_lights" title="Electric street lights"><span data-dcnode-id="5378" instrument_node="">electric street lights</span></a><span data-dcnode-id="5376" instrument_node=""> to coincide with the opening of the Universal Exposition of 1878. The first streets lit were the Avenue de l'Opéra and the Place de l'Étoile around the Arc de Triomphe. In 1881, electric street lights were added along the Grands Boulevards. Electric lighting came much more slowly for residences and businesses in some Paris neighborhoods. While electric lights lined the Champs-Élysées in 1905, there was no electric lines for any households in the 20th arrondissement.</span><sup class="reference" data-dcnode-id="5373" id="cite_ref-FOOTNOTEFierro1996838_45-0"><a data-dcnode-id="5374" href="#cite_note-FOOTNOTEFierro1996838-45"><span data-dcnode-id="5375" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5372" instrument_node="">
</span></p><span data-dcnode-id="5370" instrument_node="">
</span><h2 data-dcnode-id="5360"><span class="mw-headline" data-dcnode-id="5368" id="The_Paris_Universal_Expositions"><span data-dcnode-id="5369" instrument_node="">The Paris Universal Expositions</span></span><span class="mw-editsection" data-dcnode-id="5361"><span class="mw-editsection-bracket" data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">[</span></span><a data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D22" title="Edit section: The Paris Universal Expositions"><span data-dcnode-id="5365" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5359" instrument_node="">
</span><p data-dcnode-id="5348"><span data-dcnode-id="5358" instrument_node="">The three "universal expositions" that took place in Paris during the </span><i data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5355" instrument_node=""> attracted millions of visitors from around the world and displayed the newest innovations in science and technology, from the </span><a data-dcnode-id="5353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telephone" title="Telephone"><span data-dcnode-id="5354" instrument_node="">telephone</span></a><span data-dcnode-id="5352" instrument_node=""> and </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phonograph" title="Phonograph"><span data-dcnode-id="5351" instrument_node="">phonograph</span></a><span data-dcnode-id="5349" instrument_node=""> to electric street lighting.
</span></p><span data-dcnode-id="5347" instrument_node="">
</span><h3 data-dcnode-id="5337"><span class="mw-headline" data-dcnode-id="5345" id="The_1878_Universal_Exposition"><span data-dcnode-id="5346" instrument_node="">The 1878 Universal Exposition</span></span><span class="mw-editsection" data-dcnode-id="5338"><span class="mw-editsection-bracket" data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">[</span></span><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D23" title="Edit section: The 1878 Universal Exposition"><span data-dcnode-id="5342" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5339"><span data-dcnode-id="5340" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5336" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5325"><div class="thumbinner" data-dcnode-id="5326" style="width:402px;"><a class="image" data-dcnode-id="5334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APanorama_des_Palais.JPG"><img alt="" class="thumbimage" data-dcnode-id="5335" data-file-height="2092" data-file-width="5460" decoding="async" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Panorama_des_Palais.JPG/400px-Panorama_des_Palais.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Panorama_des_Palais.JPG/600px-Panorama_des_Palais.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Panorama_des_Palais.JPG/800px-Panorama_des_Palais.JPG 2x" width="400"></a><span data-dcnode-id="5333" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5327"><div class="magnify" data-dcnode-id="5331"><a class="internal" data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APanorama_des_Palais.JPG" title="Enlarge"></a></div><span data-dcnode-id="5330" instrument_node="">Aerial view of the </span><a data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281878%29" title="Exposition Universelle (1878)"><span data-dcnode-id="5329" instrument_node="">Universal Exposition of 1878</span></a></div></div></div><span data-dcnode-id="5324" instrument_node="">
</span><p data-dcnode-id="5274"><span data-dcnode-id="5323" instrument_node="">The </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281878%29" title="Exposition Universelle (1878)"><span data-dcnode-id="5322" instrument_node="">Universal Exposition of 1878</span></a><span data-dcnode-id="5320" instrument_node="">, which lasted from 1 May to 10 November 1878, was designed to advertise the recovery of France from the 1870 </span><a class="mw-redirect" data-dcnode-id="5318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-German_War" title="Franco-German War"><span data-dcnode-id="5319" instrument_node="">Franco-German War</span></a><span data-dcnode-id="5317" instrument_node=""> and the destruction of the period of the </span><a data-dcnode-id="5315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Commune" title="Paris Commune"><span data-dcnode-id="5316" instrument_node="">Paris Commune</span></a><span data-dcnode-id="5314" instrument_node="">. It took place on both sides of the Seine, in the </span><a data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champ_de_Mars" title="Champ de Mars"><span data-dcnode-id="5313" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="5311" instrument_node=""> and the heights of </span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trocad%25C3%25A9ro" title="Trocadéro"><span data-dcnode-id="5310" instrument_node="">Trocadéro</span></a><span data-dcnode-id="5308" instrument_node="">, where the first </span><a class="mw-redirect" data-dcnode-id="5306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palais_du_Trocad%25C3%25A9ro" title="Palais du Trocadéro"><span data-dcnode-id="5307" instrument_node="">Palais du Trocadéro</span></a><span data-dcnode-id="5305" instrument_node=""> was built. Many of the buildings were made of new inexpensive material called </span><a data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Staff_%28building_material%29" title="Staff (building material)"><span data-dcnode-id="5304" instrument_node="">staff</span></a><span data-dcnode-id="5302" instrument_node="">, which was composed of jute fiber, plaster of Paris, and cement. The main exposition hall was an enormous rectangular structure, the Palace of Machines, where the Eiffel Tower is located today. Inside, </span><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Graham_Bell" title="Alexander Graham Bell"><span data-dcnode-id="5301" instrument_node="">Alexander Graham Bell</span></a><span data-dcnode-id="5299" instrument_node=""> displayed his new telephone and </span><a data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Edison" title="Thomas Edison"><span data-dcnode-id="5298" instrument_node="">Thomas Edison</span></a><span data-dcnode-id="5296" instrument_node=""> presented his </span><a data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phonograph" title="Phonograph"><span data-dcnode-id="5295" instrument_node="">phonograph</span></a><span data-dcnode-id="5293" instrument_node="">. The head of the newly finished </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Statue_of_Liberty" title="Statue of Liberty"><span data-dcnode-id="5292" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="5290" instrument_node=""> (</span><i data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">Liberty Enlightening the World</span></i><span data-dcnode-id="5287" instrument_node="">) was displayed before it was sent to New York City to be attached to the body. Important congresses and conferences took place on the margins of the exposition, including the first congress on </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intellectual_property" title="Intellectual property"><span data-dcnode-id="5286" instrument_node="">intellectual property</span></a><span data-dcnode-id="5284" instrument_node="">, led by </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Hugo" title="Victor Hugo"><span data-dcnode-id="5283" instrument_node="">Victor Hugo</span></a><span data-dcnode-id="5281" instrument_node="">, whose proposals led eventually to the first </span><a data-dcnode-id="5279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copyright" title="Copyright"><span data-dcnode-id="5280" instrument_node="">copyright</span></a><span data-dcnode-id="5278" instrument_node=""> laws, and a conference on education for the blind, which led to the adoption of the </span><a data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Braille" title="Braille"><span data-dcnode-id="5277" instrument_node="">Braille</span></a><span data-dcnode-id="5275" instrument_node=""> system of reading for the blind. The exposition attracted thirteen million visitors, and was a financial success.
</span></p><span data-dcnode-id="5273" instrument_node="">
</span><h3 data-dcnode-id="5263"><span class="mw-headline" data-dcnode-id="5271" id="The_1889_Universal_Exposition"><span data-dcnode-id="5272" instrument_node="">The 1889 Universal Exposition</span></span><span class="mw-editsection" data-dcnode-id="5264"><span class="mw-editsection-bracket" data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">[</span></span><a data-dcnode-id="5267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D24" title="Edit section: The 1889 Universal Exposition"><span data-dcnode-id="5268" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5262" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5248"><div class="thumbinner" data-dcnode-id="5249" style="width:202px;"><a class="image" data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg"><img alt="" class="thumbimage" data-dcnode-id="5261" data-file-height="4432" data-file-width="6288" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg/200px-Exposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg/300px-Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/72/Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg/400px-Exposition_Universelle_de_Paris_1889_-_Universit%C3%A4ts-_und_Landesbibliothek_Darmstadt.jpg 2x" width="200"></a><span data-dcnode-id="5259" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5250"><div class="magnify" data-dcnode-id="5257"><a class="internal" data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AExposition_Universelle_de_Paris_1889_-_Universit%25C3%25A4ts-_und_Landesbibliothek_Darmstadt.jpg" title="Enlarge"></a></div><span data-dcnode-id="5256" instrument_node="">The </span><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="5255" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="5253" instrument_node=""> was the gateway of the </span><a data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29" title="Exposition Universelle (1889)"><span data-dcnode-id="5252" instrument_node="">Universal Exposition of 1889</span></a></div></div></div><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5186"><span data-dcnode-id="5246" instrument_node="">The </span><a data-dcnode-id="5244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29" title="Exposition Universelle (1889)"><span data-dcnode-id="5245" instrument_node="">Universal Exposition of 1889</span></a><span data-dcnode-id="5243" instrument_node=""> took place from 6 May until 31 October 1889 and celebrated the centenary of the beginning of the </span><a data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Revolution" title="French Revolution"><span data-dcnode-id="5242" instrument_node="">French Revolution</span></a><span data-dcnode-id="5240" instrument_node="">; one of the structures on the grounds was a replica of the </span><a data-dcnode-id="5238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bastille" title="Bastille"><span data-dcnode-id="5239" instrument_node="">Bastille</span></a><span data-dcnode-id="5237" instrument_node="">. It took place on the Champ de Mars, the hill of </span><a class="mw-redirect" data-dcnode-id="5235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaillot" title="Chaillot"><span data-dcnode-id="5236" instrument_node="">Chaillot</span></a><span data-dcnode-id="5234" instrument_node="">, and along the Seine at the </span><a data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quai_d%2527Orsay" title="Quai d'Orsay"><span data-dcnode-id="5233" instrument_node="">Quai d'Orsay</span></a><span data-dcnode-id="5231" instrument_node="">.  The most memorable feature was the </span><a data-dcnode-id="5229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="5230" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="5228" instrument_node="">, 300 meters tall when it opened (now 324 with the addition of broadcast antennas), which served as the gateway to the exposition.</span><sup class="reference" data-dcnode-id="5225" id="cite_ref-FOOTNOTEWeingardt200915_46-0"><a data-dcnode-id="5226" href="#cite_note-FOOTNOTEWeingardt200915-46"><span data-dcnode-id="5227" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5224" instrument_node=""> The Eiffel Tower remained the world's tallest structure until 1930.</span><sup class="reference" data-dcnode-id="5221" id="cite_ref-FOOTNOTESutherland200337_47-0"><a data-dcnode-id="5222" href="#cite_note-FOOTNOTESutherland200337-47"><span data-dcnode-id="5223" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5220" instrument_node="">  It was not popular with everyone; its modern style was denounced in a public letter by many of France's most prominent cultural figures, including </span><a data-dcnode-id="5218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_de_Maupassant" title="Guy de Maupassant"><span data-dcnode-id="5219" instrument_node="">Guy de Maupassant</span></a><span data-dcnode-id="5217" instrument_node="">, </span><a data-dcnode-id="5215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Gounod" title="Charles Gounod"><span data-dcnode-id="5216" instrument_node="">Charles Gounod</span></a><span data-dcnode-id="5214" instrument_node=""> and </span><a data-dcnode-id="5212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Garnier_%28architect%29" title="Charles Garnier (architect)"><span data-dcnode-id="5213" instrument_node="">Charles Garnier</span></a><span data-dcnode-id="5211" instrument_node="">.</span><sup class="reference" data-dcnode-id="5208" id="cite_ref-48"><a data-dcnode-id="5209" href="#cite_note-48"><span data-dcnode-id="5210" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5207" instrument_node=""> The largest building was the iron-framed </span><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galerie_des_machines" title="Galerie des machines"><span data-dcnode-id="5206" instrument_node="">Gallery of Machines</span></a><span data-dcnode-id="5204" instrument_node="">, at the time the largest covered interior space in the world. Other popular exhibits included the first musical fountain, lit with colored electric lights that changed in time to music. </span><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buffalo_Bill" title="Buffalo Bill"><span data-dcnode-id="5203" instrument_node="">Buffalo Bill</span></a><span data-dcnode-id="5201" instrument_node=""> and sharpshooter </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Annie_Oakley" title="Annie Oakley"><span data-dcnode-id="5200" instrument_node="">Annie Oakley</span></a><span data-dcnode-id="5198" instrument_node=""> drew large crowds to their </span><a class="mw-redirect" data-dcnode-id="5196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wild_West_Show" title="Wild West Show"><span data-dcnode-id="5197" instrument_node="">Wild West Show</span></a><span data-dcnode-id="5195" instrument_node=""> at the exposition.</span><sup class="reference" data-dcnode-id="5192" id="cite_ref-49"><a data-dcnode-id="5193" href="#cite_note-49"><span data-dcnode-id="5194" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5191" instrument_node="">  The exposition welcomed 23 million visitors. </span><sup class="reference" data-dcnode-id="5188" id="cite_ref-FOOTNOTEFierro1996863_50-0"><a data-dcnode-id="5189" href="#cite_note-FOOTNOTEFierro1996863-50"><span data-dcnode-id="5190" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5187" instrument_node="">
</span></p><span data-dcnode-id="5185" instrument_node="">
</span><h3 data-dcnode-id="5175"><span class="mw-headline" data-dcnode-id="5183" id="The_1900_Universal_Exposition"><span data-dcnode-id="5184" instrument_node="">The 1900 Universal Exposition</span></span><span class="mw-editsection" data-dcnode-id="5176"><span class="mw-editsection-bracket" data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">[</span></span><a data-dcnode-id="5179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D25" title="Edit section: The 1900 Universal Exposition"><span data-dcnode-id="5180" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5174" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5157"><div class="thumbinner" data-dcnode-id="5158" style="width:202px;"><a class="image" data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVue_panoramique_de_l%2527exposition_universelle_de_1900.jpg"><img alt="" class="thumbimage" data-dcnode-id="5173" data-file-height="4942" data-file-width="7235" decoding="async" height="137" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Vue_panoramique_de_l%2527exposition_universelle_de_1900.jpg/200px-Vue_panoramique_de_l%2527exposition_universelle_de_1900.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Vue_panoramique_de_l%27exposition_universelle_de_1900.jpg/300px-Vue_panoramique_de_l%27exposition_universelle_de_1900.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Vue_panoramique_de_l%27exposition_universelle_de_1900.jpg/400px-Vue_panoramique_de_l%27exposition_universelle_de_1900.jpg 2x" width="200"></a><span data-dcnode-id="5171" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5159"><div class="magnify" data-dcnode-id="5169"><a class="internal" data-dcnode-id="5170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVue_panoramique_de_l%2527exposition_universelle_de_1900.jpg" title="Enlarge"></a></div><span data-dcnode-id="5168" instrument_node="">the Universal Exposition of 1900 included events at the </span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="5167" instrument_node="">Grand Palais</span></a><span data-dcnode-id="5165" instrument_node=""> and </span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petit_Palais" title="Petit Palais"><span data-dcnode-id="5164" instrument_node="">Petit Palais</span></a><span data-dcnode-id="5162" instrument_node=""> as well as the Eiffel Tower and </span><a class="mw-redirect" data-dcnode-id="5160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaillot" title="Chaillot"><span data-dcnode-id="5161" instrument_node="">Chaillot</span></a></div></div></div><span data-dcnode-id="5156" instrument_node="">
</span><p data-dcnode-id="5112"><span data-dcnode-id="5155" instrument_node="">The </span><a data-dcnode-id="5153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="5154" instrument_node="">Universal Exposition of 1900</span></a><span data-dcnode-id="5152" instrument_node=""> took place from 15 April until 12 November 1900. It celebrated the turn of the century and was by far the largest in scale of the Expositions; its sites included the </span><a data-dcnode-id="5150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Champ_de_Mars" title="Champ de Mars"><span data-dcnode-id="5151" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="5149" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chaillot" title="Chaillot"><span data-dcnode-id="5148" instrument_node="">Chaillot</span></a><span data-dcnode-id="5146" instrument_node="">, the </span><a data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="5145" instrument_node="">Grand Palais</span></a><span data-dcnode-id="5143" instrument_node=""> and the </span><a data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petit_Palais" title="Petit Palais"><span data-dcnode-id="5142" instrument_node="">Petit Palais</span></a><span data-dcnode-id="5140" instrument_node="">. Beside the Eiffel Tower, it featured the world's largest </span><a data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ferris_wheel" title="Ferris wheel"><span data-dcnode-id="5139" instrument_node="">ferris wheel</span></a><span data-dcnode-id="5137" instrument_node="">, the "Grande Roue de Paris", one hundred metres high, that could carry sixteen hundred passengers in forty cars. Inside the exhibit hall, </span><a class="mw-redirect" data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudolph_Diesel" title="Rudolph Diesel"><span data-dcnode-id="5136" instrument_node="">Rudolph Diesel</span></a><span data-dcnode-id="5134" instrument_node=""> demonstrated his new engine, and one of the first </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escalator" title="Escalator"><span data-dcnode-id="5133" instrument_node="">escalators</span></a><span data-dcnode-id="5131" instrument_node=""> was on display. The Exposition coincided with the </span><a class="mw-redirect" data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1900_Paris_Olympics" title="1900 Paris Olympics"><span data-dcnode-id="5130" instrument_node="">1900 Paris Olympics</span></a><span data-dcnode-id="5128" instrument_node="">, the first Olympic games held outside of Greece. The Exposition popularized a new artistic style, the </span><a class="mw-redirect" data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_nouveau" title="Art nouveau"><span data-dcnode-id="5127" instrument_node="">Art nouveau</span></a><span data-dcnode-id="5125" instrument_node="">, to the world.</span><sup class="reference" data-dcnode-id="5122" id="cite_ref-51"><a data-dcnode-id="5123" href="#cite_note-51"><span data-dcnode-id="5124" instrument_node="">[51]</span></a></sup><span data-dcnode-id="5121" instrument_node="">  Two architectural legacies of the Exposition, the Grand Palais and Petit Palais, are still in place in the city.</span><sup class="reference" data-dcnode-id="5118" id="cite_ref-52"><a data-dcnode-id="5119" href="#cite_note-52"><span data-dcnode-id="5120" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5117" instrument_node=""> Though it was a great popular success, attracting an estimated forty-eight million visitors, the 1900 exposition lost money and was the last such exposition in Paris on such a grand scale.</span><sup class="reference" data-dcnode-id="5114" id="cite_ref-FOOTNOTEFierro1996863_50-1"><a data-dcnode-id="5115" href="#cite_note-FOOTNOTEFierro1996863-50"><span data-dcnode-id="5116" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5113" instrument_node="">
</span></p><span data-dcnode-id="5111" instrument_node="">
</span><h2 data-dcnode-id="5100"><span data-dcnode-id="5110" id="Restaurants.2C_caf.C3.A9s.2C_and_brasseries"></span><span class="mw-headline" data-dcnode-id="5108" id="Restaurants,_cafés,_and_brasseries"><span data-dcnode-id="5109" instrument_node="">Restaurants, cafés, and brasseries</span></span><span class="mw-editsection" data-dcnode-id="5101"><span class="mw-editsection-bracket" data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">[</span></span><a data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D26" title="Edit section: Restaurants, cafés, and brasseries"><span data-dcnode-id="5105" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5099" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5083"><div class="thumbinner" data-dcnode-id="5084" style="width:302px;"><a class="image" data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARitzParisGarden.jpg"><img alt="" class="thumbimage" data-dcnode-id="5098" data-file-height="346" data-file-width="500" decoding="async" height="208" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/RitzParisGarden.jpg/300px-RitzParisGarden.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/RitzParisGarden.jpg/450px-RitzParisGarden.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/3/30/RitzParisGarden.jpg 2x" width="300"></a><span data-dcnode-id="5096" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5085"><div class="magnify" data-dcnode-id="5094"><a class="internal" data-dcnode-id="5095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARitzParisGarden.jpg" title="Enlarge"></a></div><i data-dcnode-id="5090"><span data-dcnode-id="5093" instrument_node="">Dining in the garden of the </span><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%25C3%25B4tel_Ritz_Paris" title="Hôtel Ritz Paris"><span data-dcnode-id="5092" instrument_node="">Ritz</span></a></i><span data-dcnode-id="5089" instrument_node="">, a painting by </span><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre-Georges_Jeanniot" title="Pierre-Georges Jeanniot"><span data-dcnode-id="5088" instrument_node="">Pierre-Georges Jeanniot</span></a><span data-dcnode-id="5086" instrument_node=""> (1904)</span></div></div></div><span data-dcnode-id="5082" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5068"><div class="thumbinner" data-dcnode-id="5069" style="width:302px;"><a class="image" data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParisian_Cafe_by_Repin.jpg"><img alt="" class="thumbimage" data-dcnode-id="5081" data-file-height="2009" data-file-width="3200" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Parisian_Cafe_by_Repin.jpg/300px-Parisian_Cafe_by_Repin.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Parisian_Cafe_by_Repin.jpg/450px-Parisian_Cafe_by_Repin.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Parisian_Cafe_by_Repin.jpg/600px-Parisian_Cafe_by_Repin.jpg 2x" width="300"></a><span data-dcnode-id="5079" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5070"><div class="magnify" data-dcnode-id="5077"><a class="internal" data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParisian_Cafe_by_Repin.jpg" title="Enlarge"></a></div><i data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">A Parisian café</span></i><span data-dcnode-id="5074" instrument_node=""> by </span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ilya_Repin" title="Ilya Repin"><span data-dcnode-id="5073" instrument_node="">Ilya Repin</span></a><span data-dcnode-id="5071" instrument_node=""> (1875)</span></div></div></div><span data-dcnode-id="5067" instrument_node="">
</span><p data-dcnode-id="5034"><span data-dcnode-id="5066" instrument_node="">Paris was already famous for its restaurants in the first half of the 19th century, particularly the Café Riche, the Maison Dorée and the Café Anglais on the Grands Boulevards, where the wealthy personalities of Balzac's novels would dine. The Second Empire had added more luxury restaurants, particularly in the center near the new grand hotels: Durand at the Madeleine; Voisin on the Rue Cambon and </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rue_Saint-Honor%25C3%25A9" title="Rue Saint-Honoré"><span data-dcnode-id="5065" instrument_node="">Rue Saint-Honoré</span></a><span data-dcnode-id="5063" instrument_node="">; Magny on the Rue Mazet; Foyot near the Luxembourg Gardens; and Maire at the corner of the </span><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_de_Strasbourg" title="Boulevard de Strasbourg"><span data-dcnode-id="5062" instrument_node="">Boulevard de Strasbourg</span></a><span data-dcnode-id="5060" instrument_node=""> and Boulevard Saint-Denis, where </span><a class="mw-redirect" data-dcnode-id="5058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lobster_thermidor" title="Lobster thermidor"><span data-dcnode-id="5059" instrument_node="">lobster thermidor</span></a><span data-dcnode-id="5057" instrument_node=""> was invented. During the </span><i data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5054" instrument_node="">, many more prestigious restaurants could be found, including Laurent, </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fouquet%2527s" title="Fouquet's"><span data-dcnode-id="5053" instrument_node="">Fouquet's</span></a><span data-dcnode-id="5051" instrument_node=""> and the Pavillon de l'Élysée on the Champs-Élysées; the </span><a class="mw-redirect" data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tour_d%2527Argent" title="Tour d'Argent"><span data-dcnode-id="5050" instrument_node="">Tour d'Argent</span></a><span data-dcnode-id="5048" instrument_node=""> on the Quai de la Tournelle; Prunier on the Rue Duphot; </span><a data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drouant" title="Drouant"><span data-dcnode-id="5047" instrument_node="">Drouant</span></a><span data-dcnode-id="5045" instrument_node=""> on the Place Gaillon; Lapérouse on the Quai des Grands-Augustins; Lucas Carton at the Madeleine, and Weber on the </span><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rue_Royale" title="Rue Royale"><span data-dcnode-id="5044" instrument_node="">Rue Royale</span></a><span data-dcnode-id="5042" instrument_node="">. The most famous restaurant of the period, </span><a class="mw-redirect" data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maxim%2527s_Paris" title="Maxim's Paris"><span data-dcnode-id="5041" instrument_node="">Maxim's</span></a><span data-dcnode-id="5039" instrument_node="">, also opened its doors on the Rue Royale. Two luxury restaurants were found by the lakes in the Bois de Boulogne: the Pavillon d'Armenonville and the Cascade.</span><sup class="reference" data-dcnode-id="5036" id="cite_ref-FOOTNOTEFierro19961138_53-0"><a data-dcnode-id="5037" href="#cite_note-FOOTNOTEFierro19961138-53"><span data-dcnode-id="5038" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5035" instrument_node="">
</span></p><p data-dcnode-id="5029"><span data-dcnode-id="5033" instrument_node="">For those with more modest budgets, there was the </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bouillon_%28restaurant%29" title="Bouillon (restaurant)"><span data-dcnode-id="5032" instrument_node="">Bouillon</span></a><span data-dcnode-id="5030" instrument_node="">, a type of restaurant begun by a butcher named Duval in 1867. These establishment served simple and inexpensive food and were popular with students and visitors. One from this period, Chartier, near the Grands Boulevards, still exists.
</span></p><p data-dcnode-id="5020"><span data-dcnode-id="5028" instrument_node="">A new type of restaurant, the </span><a data-dcnode-id="5026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brasserie" title="Brasserie"><span data-dcnode-id="5027" instrument_node="">Brasserie</span></a><span data-dcnode-id="5025" instrument_node="">, appeared in Paris during the 1867 Universal Exposition. The name originally meant a place that brewed beer, but in 1867 it was a type of café where young women in the national costumes of different countries served different drinks of those countries, including beer, ale, chianti, and vodka. The idea was continued after the Exposition by the Brasserie de l'Espérance on the Rue Champollion on the Left Bank, and was soon imitated by others. By 1890, there were forty-two brasseries on the Left Bank, with names including the Brasserie des Amours, the Brasserie de la Vestale, the Brasserie des Belles Marocaines, and the Brasserie des Excentriques Polonais (brasserie of the eccentric Poles), and they were often used as a place to meet prostitutes.</span><sup class="reference" data-dcnode-id="5022" id="cite_ref-FOOTNOTEFierro19961138_53-1"><a data-dcnode-id="5023" href="#cite_note-FOOTNOTEFierro19961138-53"><span data-dcnode-id="5024" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5021" instrument_node="">
</span></p><span data-dcnode-id="5019" instrument_node="">
</span><h2 data-dcnode-id="5009"><span class="mw-headline" data-dcnode-id="5017" id="Sports"><span data-dcnode-id="5018" instrument_node="">Sports</span></span><span class="mw-editsection" data-dcnode-id="5010"><span class="mw-editsection-bracket" data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">[</span></span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D27" title="Edit section: Sports"><span data-dcnode-id="5014" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5008" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4999"><div class="thumbinner" data-dcnode-id="5000" style="width:302px;"><a class="image" data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATennis_women_1900.jpg"><img alt="" class="thumbimage" data-dcnode-id="5007" data-file-height="1654" data-file-width="1478" decoding="async" height="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Tennis_women_1900.jpg/300px-Tennis_women_1900.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/13/Tennis_women_1900.jpg/450px-Tennis_women_1900.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/13/Tennis_women_1900.jpg/600px-Tennis_women_1900.jpg 2x" width="300"></a><span data-dcnode-id="5005" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5001"><div class="magnify" data-dcnode-id="5003"><a class="internal" data-dcnode-id="5004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATennis_women_1900.jpg" title="Enlarge"></a></div><span data-dcnode-id="5002" instrument_node="">Women's tennis at the 1900 Paris Olympics</span></div></div></div><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4972"><span data-dcnode-id="4997" instrument_node="">Paris played a central role in the organization of international sports and in the professionalization of sports. The first efforts to revive the </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olympic_Games" title="Olympic Games"><span data-dcnode-id="4996" instrument_node="">Olympic Games</span></a><span data-dcnode-id="4994" instrument_node=""> were led by a French educator and historian, </span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_de_Coubertin" title="Pierre de Coubertin"><span data-dcnode-id="4993" instrument_node="">Pierre de Coubertin</span></a><span data-dcnode-id="4991" instrument_node="">. The first meeting to organize the games took place at the </span><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sorbonne" title="Sorbonne"><span data-dcnode-id="4990" instrument_node="">Sorbonne</span></a><span data-dcnode-id="4988" instrument_node=""> in 1894, resulting in the creation of the </span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Olympic_Committee" title="International Olympic Committee"><span data-dcnode-id="4987" instrument_node="">International Olympic Committee</span></a><span data-dcnode-id="4985" instrument_node=""> and the holding of the first modern Olympic Games in </span><a data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Athens" title="Athens"><span data-dcnode-id="4984" instrument_node="">Athens</span></a><span data-dcnode-id="4982" instrument_node=""> in 1896. The second games, the first Olympics held outside of Greece, were the </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1900_Summer_Olympics" title="1900 Summer Olympics"><span data-dcnode-id="4981" instrument_node="">1900 Summer Olympics</span></a><span data-dcnode-id="4979" instrument_node=""> in Paris, from 14 May until 28 October 1900, organized in conjunction with the Paris Universal Exposition of 1900. There were 19 sports included in the event, and women competed in the Olympics for the first time. The swimming events took place in the Seine. Some of the sports were unusual by modern standards; they included automobile and motorcycle racing, </span><a data-dcnode-id="4977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cricket" title="Cricket"><span data-dcnode-id="4978" instrument_node="">cricket</span></a><span data-dcnode-id="4976" instrument_node="">, </span><a data-dcnode-id="4974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croquet" title="Croquet"><span data-dcnode-id="4975" instrument_node="">croquet</span></a><span data-dcnode-id="4973" instrument_node="">, underwater swimming, tug-of-war, and shooting live pigeons.
</span></p><p data-dcnode-id="4958"><span data-dcnode-id="4971" instrument_node="">Cycling also became an important professional sport, with the opening in 1903 of the first cycling stadium, the </span><a class="mw-redirect" data-dcnode-id="4969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/V%25C3%25A9lodrome_d%27hiver" title="Vélodrome d'hiver"><span data-dcnode-id="4970" instrument_node="">Vélodrome d'hiver</span></a><span data-dcnode-id="4968" instrument_node="">, on the site of the demolished Palace of Machinery from the 1900 Exposition on the Champ de Mars. The first stadium was demolished and moved in 1910 to </span><i data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">boulevard de Grenelle</span></i><span data-dcnode-id="4965" instrument_node="">. The first </span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tour_de_France" title="Tour de France"><span data-dcnode-id="4964" instrument_node="">Tour de France</span></a><span data-dcnode-id="4962" instrument_node="">, the most famous of all French cycling events, took place in 1903, with the finish line at the </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parc_des_Princes" title="Parc des Princes"><span data-dcnode-id="4961" instrument_node="">Parc des Princes</span></a><span data-dcnode-id="4959" instrument_node=""> stadium.
</span></p><p data-dcnode-id="4950"><span data-dcnode-id="4957" instrument_node="">In September 1901, Paris hosted the first European </span><a class="mw-redirect" data-dcnode-id="4955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lawn_tennis" title="Lawn tennis"><span data-dcnode-id="4956" instrument_node="">lawn tennis</span></a><span data-dcnode-id="4954" instrument_node=""> championship in 1901, and on June 1, 1912, hosted the first world championship of tennis, at the stadium of the Faisanderie in the </span><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parc_de_Saint-Cloud" title="Parc de Saint-Cloud"><span data-dcnode-id="4953" instrument_node="">Domaine national de Saint-Cloud</span></a><span data-dcnode-id="4951" instrument_node="">.
</span></p><p data-dcnode-id="4936"><span data-dcnode-id="4949" instrument_node="">The first championship of France in </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Association_football" title="Association football"><span data-dcnode-id="4948" instrument_node="">football</span></a><span data-dcnode-id="4946" instrument_node=""> took place in 1894, with six teams competing. It was won by the team </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_Athletic_Club" title="Standard Athletic Club"><span data-dcnode-id="4945" instrument_node="">Standard Athletic Club of Paris</span></a><span data-dcnode-id="4943" instrument_node="">; the team had one French player and ten British players. The first </span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rugby_football" title="Rugby football"><span data-dcnode-id="4942" instrument_node="">rugby</span></a><span data-dcnode-id="4940" instrument_node=""> match between England and France took place on 26 March 1906 at the </span><a data-dcnode-id="4938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parc_des_Princes" title="Parc des Princes"><span data-dcnode-id="4939" instrument_node="">Parc des Princes</span></a><span data-dcnode-id="4937" instrument_node="">, with the victory of England.
</span></p><p data-dcnode-id="4926"><span data-dcnode-id="4935" instrument_node="">Paris also hosted several of the world's earliest automobile races. The first, in 1894, was the Paris-Rouen race, organized by the newspaper </span><i data-dcnode-id="4932"><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Le_Petit_Journal_%28newspaper%29" title="Le Petit Journal (newspaper)"><span data-dcnode-id="4934" instrument_node="">Le Petit Journal</span></a></i><span data-dcnode-id="4931" instrument_node="">. The first Paris-Bordeaux race took place on 10–12 June 1895, and the first race from Paris to Monte-Carlo in 1911.</span><sup class="reference" data-dcnode-id="4928" id="cite_ref-FOOTNOTEFierro1996632-634_54-0"><a data-dcnode-id="4929" href="#cite_note-FOOTNOTEFierro1996632-634-54"><span data-dcnode-id="4930" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4927" instrument_node="">
</span></p><span data-dcnode-id="4925" instrument_node="">
</span><h2 data-dcnode-id="4915"><span class="mw-headline" data-dcnode-id="4923" id="Science_and_technology"><span data-dcnode-id="4924" instrument_node="">Science and technology</span></span><span class="mw-editsection" data-dcnode-id="4916"><span class="mw-editsection-bracket" data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">[</span></span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D28" title="Edit section: Science and technology"><span data-dcnode-id="4920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4917"><span data-dcnode-id="4918" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4914" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4904"><div class="thumbinner" data-dcnode-id="4905" style="width:152px;"><a class="image" data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Pasteur%2C_foto_av_Paul_Nadar%2C_Crisco_edit.jpg"><img alt="" class="thumbimage" data-dcnode-id="4913" data-file-height="3292" data-file-width="2388" decoding="async" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Louis_Pasteur%252C_foto_av_Paul_Nadar%252C_Crisco_edit.jpg/150px-Louis_Pasteur%252C_foto_av_Paul_Nadar%252C_Crisco_edit.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Louis_Pasteur%2C_foto_av_Paul_Nadar%2C_Crisco_edit.jpg/225px-Louis_Pasteur%2C_foto_av_Paul_Nadar%2C_Crisco_edit.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Louis_Pasteur%2C_foto_av_Paul_Nadar%2C_Crisco_edit.jpg/300px-Louis_Pasteur%2C_foto_av_Paul_Nadar%2C_Crisco_edit.jpg 2x" width="150"></a><span data-dcnode-id="4911" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4906"><div class="magnify" data-dcnode-id="4909"><a class="internal" data-dcnode-id="4910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_Pasteur%2C_foto_av_F%25C3%25A9lix_Nadar_Crisco_edit.jpg" title="Enlarge"></a></div><a data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Pasteur" title="Louis Pasteur"><span data-dcnode-id="4908" instrument_node="">Louis Pasteur</span></a></div></div></div><span data-dcnode-id="4903" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4892"><div class="thumbinner" data-dcnode-id="4893" style="width:202px;"><a class="image" data-dcnode-id="4901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarie_Curie_%28Nobel-Chem%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4902" data-file-height="1293" data-file-width="1017" decoding="async" height="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Marie_Curie_%2528Nobel-Chem%2529.jpg/200px-Marie_Curie_%2528Nobel-Chem%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Marie_Curie_%28Nobel-Chem%29.jpg/300px-Marie_Curie_%28Nobel-Chem%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Marie_Curie_%28Nobel-Chem%29.jpg/400px-Marie_Curie_%28Nobel-Chem%29.jpg 2x" width="200"></a><span data-dcnode-id="4900" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4894"><div class="magnify" data-dcnode-id="4898"><a class="internal" data-dcnode-id="4899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarie_Curie_%28Nobel-Chem%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="4896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marie_Curie" title="Marie Curie"><span data-dcnode-id="4897" instrument_node="">Marie Curie</span></a><span data-dcnode-id="4895" instrument_node=""> (1911)</span></div></div></div><span data-dcnode-id="4891" instrument_node="">
</span><p data-dcnode-id="4861"><span data-dcnode-id="4890" instrument_node="">Scientists in Paris played a leading role in many of major scientific developments of the period, particularly in </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bacteriology" title="Bacteriology"><span data-dcnode-id="4889" instrument_node="">bacteriology</span></a><span data-dcnode-id="4887" instrument_node=""> and </span><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physics" title="Physics"><span data-dcnode-id="4886" instrument_node="">physics</span></a><span data-dcnode-id="4884" instrument_node="">. </span><a data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Pasteur" title="Louis Pasteur"><span data-dcnode-id="4883" instrument_node="">Louis Pasteur</span></a><span data-dcnode-id="4881" instrument_node=""> (1822-1895) was a pioneer in </span><a data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaccination" title="Vaccination"><span data-dcnode-id="4880" instrument_node="">vaccination</span></a><span data-dcnode-id="4878" instrument_node="">, microbacterial fermentation and </span><a data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pasteurization" title="Pasteurization"><span data-dcnode-id="4877" instrument_node="">pasteurization</span></a><span data-dcnode-id="4875" instrument_node="">. He developed the first vaccines against </span><a data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthrax" title="Anthrax"><span data-dcnode-id="4874" instrument_node="">anthrax</span></a><span data-dcnode-id="4872" instrument_node=""> (1881) and </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabies" title="Rabies"><span data-dcnode-id="4871" instrument_node="">rabies</span></a><span data-dcnode-id="4869" instrument_node=""> (1885), and the process for stopping bacterial growth in milk and wine. He founded the </span><a data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pasteur_Institute" title="Pasteur Institute"><span data-dcnode-id="4868" instrument_node="">Pasteur Institute</span></a><span data-dcnode-id="4866" instrument_node=""> in 1888 to carry on his work, and his tomb is located at the institute.</span><sup class="reference" data-dcnode-id="4863" id="cite_ref-FOOTNOTEPetit_Robert19881377_55-0"><a data-dcnode-id="4864" href="#cite_note-FOOTNOTEPetit_Robert19881377-55"><span data-dcnode-id="4865" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4862" instrument_node="">
</span></p><p data-dcnode-id="4834"><span data-dcnode-id="4860" instrument_node="">The physicist </span><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henri_Becquerel" title="Henri Becquerel"><span data-dcnode-id="4859" instrument_node="">Henri Becquerel</span></a><span data-dcnode-id="4857" instrument_node=""> (1852-1908), while studying the fluorescence of uranium salts, discovered </span><a class="mw-redirect" data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radioactivity" title="Radioactivity"><span data-dcnode-id="4856" instrument_node="">radioactivity</span></a><span data-dcnode-id="4854" instrument_node=""> in 1896, and in 1903 was awarded the </span><a data-dcnode-id="4852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nobel_Prize" title="Nobel Prize"><span data-dcnode-id="4853" instrument_node="">Nobel Prize</span></a><span data-dcnode-id="4851" instrument_node=""> in physics for his discovery. </span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Curie" title="Pierre Curie"><span data-dcnode-id="4850" instrument_node="">Pierre Curie</span></a><span data-dcnode-id="4848" instrument_node=""> (1859-1906) and </span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marie_Curie" title="Marie Curie"><span data-dcnode-id="4847" instrument_node="">Marie Curie</span></a><span data-dcnode-id="4845" instrument_node=""> (1867-1934) jointly carried on Becquerel's work, discovering </span><a data-dcnode-id="4843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radium" title="Radium"><span data-dcnode-id="4844" instrument_node="">radium</span></a><span data-dcnode-id="4842" instrument_node=""> and </span><a data-dcnode-id="4840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polonium" title="Polonium"><span data-dcnode-id="4841" instrument_node="">polonium</span></a><span data-dcnode-id="4839" instrument_node=""> (1898). They jointly received the Nobel Prize for physics in 1903.  Marie Curie became the first female professor at the University of Paris and won the Nobel Prize for chemistry in 1911. She was the first woman to be buried in the Panthéon.</span><sup class="reference" data-dcnode-id="4836" id="cite_ref-FOOTNOTEPetit_Robert19881377_55-1"><a data-dcnode-id="4837" href="#cite_note-FOOTNOTEPetit_Robert19881377-55"><span data-dcnode-id="4838" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4835" instrument_node="">
