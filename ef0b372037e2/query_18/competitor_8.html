</span><h2 data-dcnode-id="6342"><span data-dcnode-id="6352" id="Tourism.2C_hotels_and_railroad_stations"></span><span class="mw-headline" data-dcnode-id="6350" id="Tourism,_hotels_and_railroad_stations"><span data-dcnode-id="6351" instrument_node="">Tourism, hotels and railroad stations</span></span><span class="mw-editsection" data-dcnode-id="6343"><span class="mw-editsection-bracket" data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">[</span></span><a data-dcnode-id="6346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D12" title="Edit section: Tourism, hotels and railroad stations"><span data-dcnode-id="6347" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6344"><span data-dcnode-id="6345" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6341" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6327"><div class="thumbinner" data-dcnode-id="6328" style="width:302px;"><a class="image" data-dcnode-id="6339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClaude_Monet_004.jpg"><img alt="" class="thumbimage" data-dcnode-id="6340" data-file-height="1019" data-file-width="1256" decoding="async" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Claude_Monet_004.jpg/300px-Claude_Monet_004.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Claude_Monet_004.jpg/450px-Claude_Monet_004.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Claude_Monet_004.jpg/600px-Claude_Monet_004.jpg 2x" width="300"></a><span data-dcnode-id="6338" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6329"><div class="magnify" data-dcnode-id="6336"><a class="internal" data-dcnode-id="6337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClaude_Monet_004.jpg" title="Enlarge"></a></div><a data-dcnode-id="6334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Monet" title="Claude Monet"><span data-dcnode-id="6335" instrument_node="">Claude Monet</span></a><span data-dcnode-id="6333" instrument_node="">: </span><i data-dcnode-id="6331"><span data-dcnode-id="6332" instrument_node="">Gare Saint-Lazare, l'arrivée d'un train</span></i><span data-dcnode-id="6330" instrument_node="">, 1877, Fogg Art Museum, USA</span></div></div></div><span data-dcnode-id="6326" instrument_node="">
</span><p data-dcnode-id="6293"><span data-dcnode-id="6325" instrument_node="">The industry of mass tourism and large luxury hotels had arrived in Paris under Napoleon III, driven by new railroads and the huge crowds that had come for the first international expositions. The expositions and the crowds grew even larger during the </span><i data-dcnode-id="6323"><span data-dcnode-id="6324" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6322" instrument_node="">; twenty-three million visitors came to Paris for the </span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281889%29" title="Exposition Universelle (1889)"><span data-dcnode-id="6321" instrument_node="">1889 exposition</span></a><span data-dcnode-id="6319" instrument_node="">, and the </span><a data-dcnode-id="6317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="6318" instrument_node="">1900 exposition</span></a><span data-dcnode-id="6316" instrument_node=""> welcomed forty-eight million visitors. The </span><a class="mw-redirect" data-dcnode-id="6314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_H%25C3%25B4tel_du_Louvre" title="Grand Hôtel du Louvre"><span data-dcnode-id="6315" instrument_node="">Grand Hôtel du Louvre</span></a><span data-dcnode-id="6313" instrument_node="">, built for the </span><a data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281855%29" title="Exposition Universelle (1855)"><span data-dcnode-id="6312" instrument_node="">universal exposition of 1855</span></a><span data-dcnode-id="6310" instrument_node="">, opened that same year. The Grand Hôtel on the Boulevard des Capucines opened in 1862. More luxury hotels appeared near the train stations and in the city center during the </span><i data-dcnode-id="6308"><span data-dcnode-id="6309" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6307" instrument_node="">; the Hôtel Continental opened in 1878 on the Rue de Rivoli on the site of the old Ministry of Finance, which had been burned by the Paris Commune. The </span><a data-dcnode-id="6305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%25C3%25B4tel_Ritz_Paris" title="Hôtel Ritz Paris"><span data-dcnode-id="6306" instrument_node="">Hôtel Ritz</span></a><span data-dcnode-id="6304" instrument_node=""> on the Place Vendôme opened in 1898, and the </span><a data-dcnode-id="6302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%25C3%25B4tel_de_Crillon" title="Hôtel de Crillon"><span data-dcnode-id="6303" instrument_node="">Hôtel de Crillon</span></a><span data-dcnode-id="6301" instrument_node=""> on the </span><a data-dcnode-id="6299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_Concorde" title="Place de la Concorde"><span data-dcnode-id="6300" instrument_node="">Place de la Concorde</span></a><span data-dcnode-id="6298" instrument_node=""> opened in 1909.</span><sup class="reference" data-dcnode-id="6295" id="cite_ref-FOOTNOTEFierro1996938_32-0"><a data-dcnode-id="6296" href="#cite_note-FOOTNOTEFierro1996938-32"><span data-dcnode-id="6297" instrument_node="">[32]</span></a></sup><span data-dcnode-id="6294" instrument_node="">
</span></p><p data-dcnode-id="6263"><span data-dcnode-id="6292" instrument_node="">The growing number of visitors to Paris required the enlargement of the main train stations to handle all the passengers. The </span><a data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_Saint-Lazare" title="Gare Saint-Lazare"><span data-dcnode-id="6291" instrument_node="">Gare Saint-Lazare</span></a><span data-dcnode-id="6289" instrument_node=""> had been covered with a forty-meter high shed between 1851 and 1853; it was further enlarged for the 1889 exposition, and a new hotel, the Terminus, was built next to it. The station and its huge shed became a popular subject for painters, among them </span><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Claude_Monet" title="Claude Monet"><span data-dcnode-id="6288" instrument_node="">Claude Monet</span></a><span data-dcnode-id="6286" instrument_node="">, during the period. A brand-new station, the Gare d'Orsay, designed by </span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victor_Laloux" title="Victor Laloux"><span data-dcnode-id="6285" instrument_node="">Victor Laloux</span></a><span data-dcnode-id="6283" instrument_node="">, opened on 4 July 1900; it was the first station designed for electrified trains. The line was not profitable, and the station was almost demolished in 1971, but between 1980 and 1986 it was turned into the Musée d'Orsay. The </span><a data-dcnode-id="6281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_Montparnasse" title="Gare Montparnasse"><span data-dcnode-id="6282" instrument_node="">Gare Montparnasse</span></a><span data-dcnode-id="6280" instrument_node="">, serving western France, had been built between 1848 and 1852. It was also enlarged between 1898 and 1900 to serve the growing number of passengers. The </span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_de_l%2527Est" title="Gare de l'Est"><span data-dcnode-id="6279" instrument_node="">Gare de l'Est</span></a><span data-dcnode-id="6277" instrument_node=""> and </span><a data-dcnode-id="6275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_du_Nord" title="Gare du Nord"><span data-dcnode-id="6276" instrument_node="">Gare du Nord</span></a><span data-dcnode-id="6274" instrument_node=""> were both expanded, and the </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_de_Lyon" title="Gare de Lyon"><span data-dcnode-id="6273" instrument_node="">Gare de Lyon</span></a><span data-dcnode-id="6271" instrument_node=""> was completely rebuilt between 1895 and 1902 and given a new restaurant in the ornate style of the period, Le buffet de la Gare de Lyon, renamed the </span><a class="mw-redirect" data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Train_Bleu" title="Train Bleu"><span data-dcnode-id="6270" instrument_node="">Train Bleu</span></a><span data-dcnode-id="6268" instrument_node=""> in 1963. </span><sup class="reference" data-dcnode-id="6265" id="cite_ref-FOOTNOTEFierro1996900–901_33-0"><a data-dcnode-id="6266" href="#cite_note-FOOTNOTEFierro1996900%E2%80%93901-33"><span data-dcnode-id="6267" instrument_node="">[33]</span></a></sup><span data-dcnode-id="6264" instrument_node="">
</span></p><span data-dcnode-id="6262" instrument_node="">
</span><h2 data-dcnode-id="6252"><span class="mw-headline" data-dcnode-id="6260" id="From_the_fiacre_to_the_taxicab"><span data-dcnode-id="6261" instrument_node="">From the fiacre to the taxicab</span></span><span class="mw-editsection" data-dcnode-id="6253"><span class="mw-editsection-bracket" data-dcnode-id="6258"><span data-dcnode-id="6259" instrument_node="">[</span></span><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D13" title="Edit section: From the fiacre to the taxicab"><span data-dcnode-id="6257" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6254"><span data-dcnode-id="6255" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6251" instrument_node="">
</span><p data-dcnode-id="6218"><span data-dcnode-id="6250" instrument_node="">In the first part of the </span><i data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6247" instrument_node="">, the </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiacre_%28carriage%29" title="Fiacre (carriage)"><span data-dcnode-id="6246" instrument_node="">fiacre</span></a><span data-dcnode-id="6244" instrument_node=""> was the most common form of public transport for individuals; it was a box-line small horse-drawn coach with driver carrying two passengers that could be hired by the hour or by the distance of the trip. In 1900, there were about ten thousand fiacres in service in Paris; half belonged to a single company, the </span><i data-dcnode-id="6242"><span data-dcnode-id="6243" instrument_node="">Compagnie générale des voitures de Paris</span></i><span data-dcnode-id="6241" instrument_node="">; the other five thousand belonged to about five hundred small companies. The first two automobile taxis entered service in 1898, at a time when there were just 1,309 automobiles in Paris. The number remained very small at first; there were just eighteen in service during the Exposition of 1900, only eight in 1904, and 39 in 1905. However, by the end of 1905, the automobile taxi began to take off; there were 417 on the streets of Paris in 1906, and 1,465 at the end of 1907. Most were made by the Renault company in their factory on the </span><a data-dcnode-id="6239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%258Ele_Seguin" title="Île Seguin"><span data-dcnode-id="6240" instrument_node="">Île Seguin</span></a><span data-dcnode-id="6238" instrument_node="">, an island on the Seine between </span><a data-dcnode-id="6236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulogne-Billancourt" title="Boulogne-Billancourt"><span data-dcnode-id="6237" instrument_node="">Boulogne-Billancourt</span></a><span data-dcnode-id="6235" instrument_node=""> and </span><a data-dcnode-id="6233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25A8vres" title="Sèvres"><span data-dcnode-id="6234" instrument_node="">Sèvres</span></a><span data-dcnode-id="6232" instrument_node="">. There were four large taxi companies; the largest, the </span><i data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">Compagnie française des automobiles de place</span></i><span data-dcnode-id="6229" instrument_node=""> owned more than a thousand taxis. Beginning 1898, the automobile taxis were equipped with a meter to measure the distance and calculate the fare. First called a </span><i data-dcnode-id="6227"><span data-dcnode-id="6228" instrument_node="">taxamètre</span></i><span data-dcnode-id="6226" instrument_node="">, it was renamed </span><i data-dcnode-id="6224"><span data-dcnode-id="6225" instrument_node="">taximètre</span></i><span data-dcnode-id="6223" instrument_node=""> on 17 October 1904, which gave birth to the name "taxi". In 1907, Renault began building three thousand specially-built taxis; some were exported to London and others to New York City. The ones that went into service in New York were named "taxi cabriolets", which was shortened in America to "taxicab". By 1913, there were seven thousand taxis on the streets of Paris.</span><sup class="reference" data-dcnode-id="6220" id="cite_ref-FOOTNOTEFierro19961165=1166_34-0"><a data-dcnode-id="6221" href="#cite_note-FOOTNOTEFierro19961165=1166-34"><span data-dcnode-id="6222" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6219" instrument_node="">
</span></p><span data-dcnode-id="6217" instrument_node="">
</span><h2 data-dcnode-id="6206"><span data-dcnode-id="6216" id="The_omnibus.2C_the_tramway_and_the_metro"></span><span class="mw-headline" data-dcnode-id="6214" id="The_omnibus,_the_tramway_and_the_metro"><span data-dcnode-id="6215" instrument_node="">The omnibus, the tramway and the metro</span></span><span class="mw-editsection" data-dcnode-id="6207"><span class="mw-editsection-bracket" data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">[</span></span><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D14" title="Edit section: The omnibus, the tramway and the metro"><span data-dcnode-id="6211" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6205" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6193"><div class="thumbinner" data-dcnode-id="6194" style="width:302px;"><a class="image" data-dcnode-id="6203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOmnibus_by_Eug%25C3%25A8ne_Atget_1910.jpeg"><img alt="" class="thumbimage" data-dcnode-id="6204" data-file-height="544" data-file-width="700" decoding="async" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/57/Omnibus_by_Eug%25C3%25A8ne_Atget_1910.jpeg/300px-Omnibus_by_Eug%25C3%25A8ne_Atget_1910.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/57/Omnibus_by_Eug%C3%A8ne_Atget_1910.jpeg/450px-Omnibus_by_Eug%C3%A8ne_Atget_1910.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/57/Omnibus_by_Eug%C3%A8ne_Atget_1910.jpeg/600px-Omnibus_by_Eug%C3%A8ne_Atget_1910.jpeg 2x" width="300"></a><span data-dcnode-id="6202" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6195"><div class="magnify" data-dcnode-id="6200"><a class="internal" data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOmnibus_by_Eug%25C3%25A8ne_Atget_1910.jpeg" title="Enlarge"></a></div><span data-dcnode-id="6199" instrument_node="">A horse-drawn Paris </span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horsebus" title="Horsebus"><span data-dcnode-id="6198" instrument_node="">omnibus</span></a><span data-dcnode-id="6196" instrument_node=""> in 1910</span></div></div></div><span data-dcnode-id="6192" instrument_node="">
</span><p data-dcnode-id="6171"><span data-dcnode-id="6191" instrument_node="">At the beginning of the </span><i data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6188" instrument_node="">, the horse-drawn </span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horsebus" title="Horsebus"><span data-dcnode-id="6187" instrument_node="">omnibus</span></a><span data-dcnode-id="6185" instrument_node=""> was the primary means of public transport. In 1855, Haussmann consolidated ten private omnibus companies into a single company, the C.G.O. (</span><i data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">Compagnie générale des Omnibus</span></i><span data-dcnode-id="6182" instrument_node="">) and gave it the monopoly on public transport. The coaches of the CGO carried twenty-four to twenty-six passengers and ran on thirty-one different lines. The omnibus system was overwhelmed by the number of visitors at the </span><a data-dcnode-id="6180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281867%29" title="Exposition Universelle (1867)"><span data-dcnode-id="6181" instrument_node="">1867 Exposition</span></a><span data-dcnode-id="6179" instrument_node="">, thus the city began to develop a new system of tramways in 1873. The omnibus continued to run, with larger cars that could carry forty passengers in 1880, and then, in 1888–89, a lighter vehicle that could carry thirty passengers, called an </span><i data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">omnibus à impériale</span></i><span data-dcnode-id="6176" instrument_node="">. The horse-drawn tramway gradually replaced the horse-drawn omnibus. In 1906, the first motorized omnibuses began to run on Paris streets. The last horse-drawn omnibus run took place on January 11, 1913 between Saint-Sulpice and La Villette.</span><sup class="reference" data-dcnode-id="6173" id="cite_ref-FOOTNOTEFierro19961032_35-0"><a data-dcnode-id="6174" href="#cite_note-FOOTNOTEFierro19961032-35"><span data-dcnode-id="6175" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6172" instrument_node="">
</span></p><span data-dcnode-id="6170" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6161"><div class="thumbinner" data-dcnode-id="6162" style="width:302px;"><a class="image" data-dcnode-id="6168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG"><img alt="" class="thumbimage" data-dcnode-id="6169" data-file-height="1031" data-file-width="1642" decoding="async" height="188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG/300px-FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG/450px-FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0f/FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG/600px-FF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG 2x" width="300"></a><span data-dcnode-id="6167" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6163"><div class="magnify" data-dcnode-id="6165"><a class="internal" data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFF_61_-_PARIS_-_Avenue_de_Clichy_-_Station_des_Omnibus_automobiles.JPG" title="Enlarge"></a></div><span data-dcnode-id="6164" instrument_node="">Motorized omnibuses on the Avenue de Clichy (1914)</span></div></div></div><span data-dcnode-id="6160" instrument_node="">
</span><p data-dcnode-id="6145"><span data-dcnode-id="6159" instrument_node="">The horse-drawn </span><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tram" title="Tram"><span data-dcnode-id="6158" instrument_node="">tramway</span></a><span data-dcnode-id="6156" instrument_node="">, running on a track flush with the street, had been introduced in New York in 1832. A French engineer living in New York, Loubat, brought the idea to Paris and opened the first tramway line in Paris, between the Place de la Concorde and the Barrière de Passy in November 1853. He extended the line, known as the </span><i data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">Chemin de fer américain</span></i><span data-dcnode-id="6153" instrument_node=""> ("American rail line"), all the way across Paris from </span><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulogne-Billancourt" title="Boulogne-Billancourt"><span data-dcnode-id="6152" instrument_node="">Boulogne</span></a><span data-dcnode-id="6150" instrument_node=""> to Vincennes in 1856. But then it was purchased by the CGO, the main omnibus line, and remained simply a curiosity. Only in 1873 did the tramway begin to gain importance, when the CGO lost its monopoly on city transport and two new companies, Tramways Nord and Tramways Sud, one financed by Belgian banks and the other by British banks, began operating from the center of Paris to the suburbs.  The CGO responded by opening two new lines, one from the Louvre to Vincennes, the other following the line of fortifications around the city. By 1878, forty different lines were operating, half by the CGO. The companies tried a brief experiment with steam-powered tramways in 1876, but abandoned them in 1878. The electric-powered tramway, in service in Berlin since 1881, did not arrive in Paris until 1898, with a line from Saint-Denis to the Madeleine.</span><sup class="reference" data-dcnode-id="6147" id="cite_ref-FOOTNOTEFierro19961182_36-0"><a data-dcnode-id="6148" href="#cite_note-FOOTNOTEFierro19961182-36"><span data-dcnode-id="6149" instrument_node="">[36]</span></a></sup><span data-dcnode-id="6146" instrument_node="">
</span></p><p data-dcnode-id="6140"><span data-dcnode-id="6144" instrument_node="">When the </span><a data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="6143" instrument_node="">1900 Universal Exposition</span></a><span data-dcnode-id="6141" instrument_node=""> was announced in 1898 in anticipation of millions of visitors coming to Paris, most of the public transport in Paris was still horse-drawn; forty-eight lines of omnibuses and thirty-four tramway lines still used horses, while there were just thirty-six lines of electric tramways. The last horse-drawn tramways were replaced with electric trams in 1914. 
</span></p><span data-dcnode-id="6139" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6123"><div class="thumbinner" data-dcnode-id="6124" style="width:302px;"><a class="image" data-dcnode-id="6137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAbesses_entrance_1.jpg"><img alt="" class="thumbimage" data-dcnode-id="6138" data-file-height="2448" data-file-width="3264" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Abesses_entrance_1.jpg/300px-Abesses_entrance_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Abesses_entrance_1.jpg/450px-Abesses_entrance_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Abesses_entrance_1.jpg/600px-Abesses_entrance_1.jpg 2x" width="300"></a><span data-dcnode-id="6136" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6125"><div class="magnify" data-dcnode-id="6134"><a class="internal" data-dcnode-id="6135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAbesses_entrance_1.jpg" title="Enlarge"></a></div><a data-dcnode-id="6132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hector_Guimard" title="Hector Guimard"><span data-dcnode-id="6133" instrument_node="">Hector Guimard</span></a><span data-dcnode-id="6131" instrument_node="">'s original </span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="6130" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="6128" instrument_node=""> entrance to the Paris Métro station </span><a data-dcnode-id="6126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abbesses_%28Paris_M%25C3%25A9tro%29" title="Abbesses (Paris Métro)"><span data-dcnode-id="6127" instrument_node="">Abbesses</span></a></div></div></div><span data-dcnode-id="6122" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6110"><div class="thumbinner" data-dcnode-id="6111" style="width:302px;"><a class="image" data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Metro_construction_03300288-3.jpg"><img alt="" class="thumbimage" data-dcnode-id="6121" data-file-height="512" data-file-width="678" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Paris_Metro_construction_03300288-3.jpg/300px-Paris_Metro_construction_03300288-3.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Paris_Metro_construction_03300288-3.jpg/450px-Paris_Metro_construction_03300288-3.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Paris_Metro_construction_03300288-3.jpg/600px-Paris_Metro_construction_03300288-3.jpg 2x" width="300"></a><span data-dcnode-id="6119" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6112"><div class="magnify" data-dcnode-id="6117"><a class="internal" data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AParis_Metro_construction_03300288-3.jpg" title="Enlarge"></a></div><span data-dcnode-id="6116" instrument_node="">The </span><a data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_M%25C3%25A9tro" title="Paris Métro"><span data-dcnode-id="6115" instrument_node="">Paris Métro</span></a><span data-dcnode-id="6113" instrument_node=""> under construction (between 1902 and 1910)</span></div></div></div><span data-dcnode-id="6109" instrument_node="">
</span><p data-dcnode-id="6104"><span data-dcnode-id="6108" instrument_node="">Other cities were well ahead of Paris in introducing underground or elevated metropolitan railways: London (1863), New York (1868), Berlin (1878), Chicago (1892), Budapest (1896) and Vienna (1898) all had them before Paris. The reason for the delay was a fierce battle between the French railway companies and national government, which wanted a metropolitan system based on the existing railroad stations that would bring passengers in from the suburbs (like the modern </span><a data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R%25C3%25A9seau_Express_R%25C3%25A9gional" title="Réseau Express Régional"><span data-dcnode-id="6107" instrument_node="">RER</span></a><span data-dcnode-id="6105" instrument_node="">). The Municipal Council of Paris, in contrast, wanted an independent underground metro only in the twenty arrondissements of the city that would support the tramways and omnibuses on the streets.  The plan of the municipality won and was approved on 30 March 1898; it called for six lines totaling sixty-five kilometers of track. They chose the Belgian method of construction, with the lines just under the surface of the street, rather than the deep tunnels of the London system.
</span></p><p data-dcnode-id="6077"><span data-dcnode-id="6103" instrument_node="">The first line, which connected the </span><a data-dcnode-id="6101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porte_de_Vincennes" title="Porte de Vincennes"><span data-dcnode-id="6102" instrument_node="">Porte de Vincennes</span></a><span data-dcnode-id="6100" instrument_node=""> with the </span><a data-dcnode-id="6098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="6099" instrument_node="">Grand Palais</span></a><span data-dcnode-id="6097" instrument_node=""> and the other exposition sites, was built the most rapidly (just twenty months) and opened on 19 July 1900, three months after the opening the exposition. It carried more than sixteen million passengers between July and December. Line 2, between </span><a data-dcnode-id="6095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porte_Dauphine_%28Paris_M%25C3%25A9tro%29" title="Porte Dauphine (Paris Métro)"><span data-dcnode-id="6096" instrument_node="">Porte Dauphine</span></a><span data-dcnode-id="6094" instrument_node=""> and </span><a data-dcnode-id="6092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation_%28Paris_M%25C3%25A9tro_and_RER%29" title="Nation (Paris Métro and RER)"><span data-dcnode-id="6093" instrument_node="">Nation</span></a><span data-dcnode-id="6091" instrument_node="">, opened in April 1903, and the modern Line 6 was finished at the end of 1905. The earliest lines used viaducts to cross over the Seine, at </span><a data-dcnode-id="6089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bercy_%28Paris_M%25C3%25A9tro%29" title="Bercy (Paris Métro)"><span data-dcnode-id="6090" instrument_node="">Bercy</span></a><span data-dcnode-id="6088" instrument_node="">, </span><a data-dcnode-id="6086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passy_%28Paris_M%25C3%25A9tro%29" title="Passy (Paris Métro)"><span data-dcnode-id="6087" instrument_node="">Passy</span></a><span data-dcnode-id="6085" instrument_node=""> and </span><a data-dcnode-id="6083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gare_d%2527Austerlitz" title="Gare d'Austerlitz"><span data-dcnode-id="6084" instrument_node="">Austerlitz</span></a><span data-dcnode-id="6082" instrument_node="">. The first line under the Seine, Line 4 between Châtelet and the Left Bank, was built between 1905 and 1909. By 1914, the metro was carrying five hundred million passengers a year.</span><sup class="reference" data-dcnode-id="6079" id="cite_ref-FOOTNOTEFierro1996993–994_37-0"><a data-dcnode-id="6080" href="#cite_note-FOOTNOTEFierro1996993%E2%80%93994-37"><span data-dcnode-id="6081" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6078" instrument_node="">
</span></p><span data-dcnode-id="6076" instrument_node="">
</span><h2 data-dcnode-id="6066"><span class="mw-headline" data-dcnode-id="6074" id="Constructing_Paris"><span data-dcnode-id="6075" instrument_node="">Constructing Paris</span></span><span class="mw-editsection" data-dcnode-id="6067"><span class="mw-editsection-bracket" data-dcnode-id="6072"><span data-dcnode-id="6073" instrument_node="">[</span></span><a data-dcnode-id="6070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D15" title="Edit section: Constructing Paris"><span data-dcnode-id="6071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6068"><span data-dcnode-id="6069" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6065" instrument_node="">
</span><h3 data-dcnode-id="6055"><span class="mw-headline" data-dcnode-id="6063" id="Monuments"><span data-dcnode-id="6064" instrument_node="">Monuments</span></span><span class="mw-editsection" data-dcnode-id="6056"><span class="mw-editsection-bracket" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">[</span></span><a data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D16" title="Edit section: Monuments"><span data-dcnode-id="6060" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6054" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6040"><div class="thumbinner" data-dcnode-id="6041" style="width:202px;"><a class="image" data-dcnode-id="6052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStatue_place_R%25C3%25A9publique_Paris.jpg"><img alt="" class="thumbimage" data-dcnode-id="6053" data-file-height="1280" data-file-width="960" decoding="async" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Statue_place_R%25C3%25A9publique_Paris.jpg/200px-Statue_place_R%25C3%25A9publique_Paris.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Statue_place_R%C3%A9publique_Paris.jpg/300px-Statue_place_R%C3%A9publique_Paris.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Statue_place_R%C3%A9publique_Paris.jpg/400px-Statue_place_R%C3%A9publique_Paris.jpg 2x" width="200"></a><span data-dcnode-id="6051" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6042"><div class="magnify" data-dcnode-id="6049"><a class="internal" data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStatue_place_R%25C3%25A9publique_Paris.jpg" title="Enlarge"></a></div><i data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">The Republic</span></i><span data-dcnode-id="6046" instrument_node="">, a statue in the </span><a data-dcnode-id="6044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_R%25C3%25A9publique" title="Place de la République"><span data-dcnode-id="6045" instrument_node="">Place de la République</span></a><span data-dcnode-id="6043" instrument_node=""> (1883)</span></div></div></div><span data-dcnode-id="6039" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6022"><div class="thumbinner" data-dcnode-id="6023" style="width:252px;"><a class="image" data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADalou-Republique-1.jpg"><img alt="" class="thumbimage" data-dcnode-id="6038" data-file-height="1133" data-file-width="1139" decoding="async" height="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dalou-Republique-1.jpg/250px-Dalou-Republique-1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dalou-Republique-1.jpg/375px-Dalou-Republique-1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/60/Dalou-Republique-1.jpg/500px-Dalou-Republique-1.jpg 2x" width="250"></a><span data-dcnode-id="6036" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6024"><div class="magnify" data-dcnode-id="6034"><a class="internal" data-dcnode-id="6035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADalou-Republique-1.jpg" title="Enlarge"></a></div><i data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Triumph of the Republic</span></i><span data-dcnode-id="6031" instrument_node=""> by </span><a data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Dalou" title="Jules Dalou"><span data-dcnode-id="6030" instrument_node="">Jules Dalou</span></a><span data-dcnode-id="6028" instrument_node=""> on the </span><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_Nation" title="Place de la Nation"><span data-dcnode-id="6027" instrument_node="">Place de la Nation</span></a><span data-dcnode-id="6025" instrument_node=""> (1899)</span></div></div></div><span data-dcnode-id="6021" instrument_node="">
</span><p data-dcnode-id="5967"><span data-dcnode-id="6020" instrument_node="">Most of the notable monuments of the </span><i data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">Belle Époque</span></i><span data-dcnode-id="6017" instrument_node=""> were constructed for use at the Universal Expositions, for example the </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eiffel_Tower" title="Eiffel Tower"><span data-dcnode-id="6016" instrument_node="">Eiffel Tower</span></a><span data-dcnode-id="6014" instrument_node="">, the </span><a data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="6013" instrument_node="">Grand Palais</span></a><span data-dcnode-id="6011" instrument_node="">, the </span><a data-dcnode-id="6009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petit_Palais" title="Petit Palais"><span data-dcnode-id="6010" instrument_node="">Petit Palais</span></a><span data-dcnode-id="6008" instrument_node="">, and the </span><a data-dcnode-id="6006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_Alexandre_III" title="Pont Alexandre III"><span data-dcnode-id="6007" instrument_node="">Pont Alexandre III</span></a><span data-dcnode-id="6005" instrument_node="">. The chief architectural legacy of the Third Republic was a large number of new schools and local city halls, all inscribed with the slogans of the republic and statues of allegorical symbols of the republic; representations of scientists, writers and political figures were placed in parks and squares. The largest monument was an allegorical statue of the republic erected in the center of the Place du Château-d'Eau, renamed the </span><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_R%25C3%25A9publique" title="Place de la République"><span data-dcnode-id="6004" instrument_node="">Place de la République</span></a><span data-dcnode-id="6002" instrument_node=""> in 1879. It was an enormous bronze figure 9.5 meters high of the republic holding an olive branch and standing on a pedestal 15 meters high. On 14 July 1880, the Place du Trône was renamed the </span><a data-dcnode-id="6000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Place_de_la_Nation" title="Place de la Nation"><span data-dcnode-id="6001" instrument_node="">Place de la Nation</span></a><span data-dcnode-id="5999" instrument_node="">, and a group of statues by </span><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jules_Dalou" title="Jules Dalou"><span data-dcnode-id="5998" instrument_node="">Jules Dalou</span></a><span data-dcnode-id="5996" instrument_node="">, called </span><i data-dcnode-id="5994"><span data-dcnode-id="5995" instrument_node="">Triumph of the Republic</span></i><span data-dcnode-id="5993" instrument_node="">, was placed in the center. In the middle was </span><a data-dcnode-id="5991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marianne" title="Marianne"><span data-dcnode-id="5992" instrument_node="">Marianne</span></a><span data-dcnode-id="5990" instrument_node=""> in a chariot drawn by two lions surrounded by allegorical figures of Liberty, Work, Justice and Abundance. A plaster version was put in place in 1889, the bronze version in 1899. A 29-meter tall monument with a statue of another republican hero, </span><a class="mw-redirect" data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Gambetta" title="Leon Gambetta"><span data-dcnode-id="5989" instrument_node="">Leon Gambetta</span></a><span data-dcnode-id="5987" instrument_node="">, surmounted by a </span><a data-dcnode-id="5985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pylon_%28architecture%29" title="Pylon (architecture)"><span data-dcnode-id="5986" instrument_node="">pylon</span></a><span data-dcnode-id="5984" instrument_node=""> crowned by a winged lion, was placed in the </span><a class="mw-redirect" data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cour_Napol%25C3%25A9on" title="Cour Napoléon"><span data-dcnode-id="5983" instrument_node="">Cour Napoléon</span></a><span data-dcnode-id="5981" instrument_node=""> of the </span><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louvre_Palace" title="Louvre Palace"><span data-dcnode-id="5980" instrument_node="">Louvre</span></a><span data-dcnode-id="5978" instrument_node=""> in 1888. It was taken down in 1954 after destructions during World War II, but some remaining sculptures including that of Gambetta himself were placed in 1982 in the Square Édouard-Vaillant (</span><a data-dcnode-id="5976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th_arrondissement_of_Paris" title="20th arrondissement of Paris"><span data-dcnode-id="5977" instrument_node="">20th arrondissement</span></a><span data-dcnode-id="5975" instrument_node="">) by the socialist president </span><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Mitterrand" title="François Mitterrand"><span data-dcnode-id="5974" instrument_node="">François Mitterrand</span></a><span data-dcnode-id="5972" instrument_node="">.</span><sup class="reference" data-dcnode-id="5969" id="cite_ref-FOOTNOTESarmant2012204_38-0"><a data-dcnode-id="5970" href="#cite_note-FOOTNOTESarmant2012204-38"><span data-dcnode-id="5971" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5968" instrument_node="">
</span></p><span data-dcnode-id="5966" instrument_node="">
</span><h3 data-dcnode-id="5956"><span class="mw-headline" data-dcnode-id="5964" id="Streets_and_boulevards"><span data-dcnode-id="5965" instrument_node="">Streets and boulevards</span></span><span class="mw-editsection" data-dcnode-id="5957"><span class="mw-editsection-bracket" data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">[</span></span><a data-dcnode-id="5960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D17" title="Edit section: Streets and boulevards"><span data-dcnode-id="5961" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5955" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5940"><div class="thumbinner" data-dcnode-id="5941" style="width:302px;"><a class="image" data-dcnode-id="5953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhoto_H%25C3%25B4tel_Lutetia_Paris_France_2007-08-01.jpg"><img alt="" class="thumbimage" data-dcnode-id="5954" data-file-height="2304" data-file-width="3456" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Photo_H%25C3%25B4tel_Lutetia_Paris_France_2007-08-01.jpg/300px-Photo_H%25C3%25B4tel_Lutetia_Paris_France_2007-08-01.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Photo_H%C3%B4tel_Lutetia_Paris_France_2007-08-01.jpg/450px-Photo_H%C3%B4tel_Lutetia_Paris_France_2007-08-01.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Photo_H%C3%B4tel_Lutetia_Paris_France_2007-08-01.jpg/600px-Photo_H%C3%B4tel_Lutetia_Paris_France_2007-08-01.jpg 2x" width="300"></a><span data-dcnode-id="5952" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5942"><div class="magnify" data-dcnode-id="5950"><a class="internal" data-dcnode-id="5951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APhoto_H%25C3%25B4tel_Lutetia_Paris_France_2007-08-01.jpg" title="Enlarge"></a></div><span data-dcnode-id="5949" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hotel_Lutetia" title="Hotel Lutetia"><span data-dcnode-id="5948" instrument_node="">Hotel Lutetia</span></a><span data-dcnode-id="5946" instrument_node=""> (1910), with its </span><a data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="5945" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="5943" instrument_node=""> façade, reflected the abandonment of the strict façade uniformity of Haussmann's Paris</span></div></div></div><span data-dcnode-id="5939" instrument_node="">
</span><p data-dcnode-id="5921"><span data-dcnode-id="5938" instrument_node="">The construction of the new boulevards and streets begun by Napoleon III and Haussmann had been much criticized by Napoleon's opponents near the end of the Second Empire, but the government of the Third Republic continued his projects. The </span><a data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Avenue_de_l%27Op%25C3%25A9ra" title="Avenue de l'Opéra"><span data-dcnode-id="5937" instrument_node="">Avenue de l'Opéra</span></a><span data-dcnode-id="5935" instrument_node="">, </span><a data-dcnode-id="5933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_Saint-Germain" title="Boulevard Saint-Germain"><span data-dcnode-id="5934" instrument_node="">Boulevard Saint-Germain</span></a><span data-dcnode-id="5932" instrument_node="">, Avenue de la République, Boulevard Henry-IV and Avenue Ledru-Rollin were all completed by 1889 essentially as Haussmann had planned them before his death. After 1889, the pace of construction slowed down. The </span><a data-dcnode-id="5930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boulevard_Raspail" title="Boulevard Raspail"><span data-dcnode-id="5931" instrument_node="">Boulevard Raspail</span></a><span data-dcnode-id="5929" instrument_node=""> was finished, the Rue Réaumur was extended, and several new streets were created on the left bank: the Rue de la Convention, Rue de Vouillé, </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rue_d%27Al%25C3%25A9sia" title="Rue d'Alésia"><span data-dcnode-id="5928" instrument_node="">Rue d'Alésia</span></a><span data-dcnode-id="5926" instrument_node="">, and Rue de Tolbiac. On the Right Bank, the Rue Étienne-Marcel was the last of the Haussmann projects to be completed before the First World War.</span><sup class="reference" data-dcnode-id="5923" id="cite_ref-FOOTNOTEFierro1996993–994_37-1"><a data-dcnode-id="5924" href="#cite_note-FOOTNOTEFierro1996993%E2%80%93994-37"><span data-dcnode-id="5925" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5922" instrument_node="">
</span></p><p data-dcnode-id="5915"><span data-dcnode-id="5920" instrument_node="">While the streets planned by Haussmann were completed, the strict uniformity of façades and building heights imposed by him was gradually modified. Buildings became much larger and deeper, with two apartments on each floor facing the street and others facing only onto the courtyard. The new buildings often had ornamental rotundas or pavilions on the corners and highly ornamental roof designs and gables. In 1902, maximum building heights were increased to 52 meters. With the advent of elevators, the most desirable apartments were no longer on the lowest floors, but on the highest floors, where there was more light, nicer views and less noise. With the arrival of automobiles and the beginning of traffic noise on the streets, the bedrooms moved to the back of the apartment, overlooking the courtyard.</span><sup class="reference" data-dcnode-id="5917" id="cite_ref-FOOTNOTESarmant2012198–199_39-0"><a data-dcnode-id="5918" href="#cite_note-FOOTNOTESarmant2012198%E2%80%93199-39"><span data-dcnode-id="5919" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5916" instrument_node="">
</span></p><p data-dcnode-id="5891"><span data-dcnode-id="5914" instrument_node="">The façades also changed from the strict symmetry of Haussmann: undulating façades appeared, as did bay and bow windows. Eclectic façades became popular; they often mixed the styles of </span><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/17th-century_French_art" title="17th-century French art"><span data-dcnode-id="5913" instrument_node="">Louis XIV</span></a><span data-dcnode-id="5911" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Quinze" title="Louis Quinze"><span data-dcnode-id="5910" instrument_node="">Louis XV</span></a><span data-dcnode-id="5908" instrument_node=""> and </span><a data-dcnode-id="5906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassicism" title="Neoclassicism"><span data-dcnode-id="5907" instrument_node="">Louis XVI</span></a><span data-dcnode-id="5905" instrument_node="">, and then, with the advent of </span><a class="mw-redirect" data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_nouveau" title="Art nouveau"><span data-dcnode-id="5904" instrument_node="">Art nouveau</span></a><span data-dcnode-id="5902" instrument_node=""> style, floral patterns could be incorporated. The most striking examples of the new architecture were the </span><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castel_B%25C3%25A9ranger" title="Castel Béranger"><span data-dcnode-id="5901" instrument_node="">Castel Béranger</span></a><span data-dcnode-id="5899" instrument_node=""> on the Rue La Fontaine and the </span><a data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/H%25C3%25B4tel_Lutetia" title="Hôtel Lutetia"><span data-dcnode-id="5898" instrument_node="">Hôtel Lutetia</span></a><span data-dcnode-id="5896" instrument_node="">. Between 1898 and 1905, the city organized eight competitions for the most imaginative building façades; variety was given precedence over uniformity. .</span><sup class="reference" data-dcnode-id="5893" id="cite_ref-FOOTNOTESarmant2012198–199_39-1"><a data-dcnode-id="5894" href="#cite_note-FOOTNOTESarmant2012198%E2%80%93199-39"><span data-dcnode-id="5895" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5892" instrument_node="">
</span></p><span data-dcnode-id="5890" instrument_node="">
</span><h3 data-dcnode-id="5880"><span class="mw-headline" data-dcnode-id="5888" id="Architecture"><span data-dcnode-id="5889" instrument_node="">Architecture</span></span><span class="mw-editsection" data-dcnode-id="5881"><span class="mw-editsection-bracket" data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">[</span></span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D18" title="Edit section: Architecture"><span data-dcnode-id="5885" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5882"><span data-dcnode-id="5883" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5879" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5867"><div class="thumbinner" data-dcnode-id="5868" style="width:252px;"><a class="image" data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALe_Bon_March%25C3%25A9_%25C3%25A0_Paris_%281875%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="5878" data-file-height="2719" data-file-width="2099" decoding="async" height="324" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Le_Bon_March%25C3%25A9_%25C3%25A0_Paris_%281875%29.jpg/250px-Le_Bon_March%25C3%25A9_%25C3%25A0_Paris_%281875%29.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Le_Bon_March%C3%A9_%C3%A0_Paris_%281875%29.jpg/375px-Le_Bon_March%C3%A9_%C3%A0_Paris_%281875%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Le_Bon_March%C3%A9_%C3%A0_Paris_%281875%29.jpg/500px-Le_Bon_March%C3%A9_%C3%A0_Paris_%281875%29.jpg 2x" width="250"></a><span data-dcnode-id="5876" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5869"><div class="magnify" data-dcnode-id="5874"><a class="internal" data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALe_Bon_March%25C3%25A9_%25C3%25A0_Paris_%281875%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="5873" instrument_node="">The interior of the </span><a class="mw-redirect" data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bon_March%25C3%25A9" title="Bon Marché"><span data-dcnode-id="5872" instrument_node="">Bon Marché</span></a><span data-dcnode-id="5870" instrument_node=""> department store (1875)</span></div></div></div><span data-dcnode-id="5866" instrument_node="">
</span><p data-dcnode-id="5825"><span data-dcnode-id="5865" instrument_node="">The architectural style of the </span><i data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5862" instrument_node=""> was eclectic and sometimes combined elements of several different styles. While the structures of the new buildings were resolutely modern, using iron frames and reinforced concrete, the façades ranged from the </span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Byzantine_Revival_architecture" title="Byzantine Revival architecture"><span data-dcnode-id="5861" instrument_node="">Romano-Byzantine style</span></a><span data-dcnode-id="5859" instrument_node=""> of the Basilica of Sacré-Cœur on Montmartre, to the strange </span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moorish_Revival_architecture" title="Moorish Revival architecture"><span data-dcnode-id="5858" instrument_node="">neo-Moorish</span></a><span data-dcnode-id="5856" instrument_node=""> </span><a data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trocad%25C3%25A9ro" title="Trocadéro"><span data-dcnode-id="5855" instrument_node="">Palais du Trocadéro</span></a><span data-dcnode-id="5853" instrument_node="">, to the </span><a data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renaissance_Revival_architecture" title="Renaissance Revival architecture"><span data-dcnode-id="5852" instrument_node="">neo-Renaissance style</span></a><span data-dcnode-id="5850" instrument_node=""> of the new Hôtel de Ville, to the exuberant reinvention of </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/17th-century_French_art" title="17th-century French art"><span data-dcnode-id="5849" instrument_node="">French classicism of the 17th</span></a><span data-dcnode-id="5847" instrument_node=""> and </span><a data-dcnode-id="5845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/18th-century_French_art" title="18th-century French art"><span data-dcnode-id="5846" instrument_node="">18th centuries</span></a><span data-dcnode-id="5844" instrument_node=""> in the </span><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="5843" instrument_node="">Grand Palais</span></a><span data-dcnode-id="5841" instrument_node="">, </span><a data-dcnode-id="5839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petit_Palais" title="Petit Palais"><span data-dcnode-id="5840" instrument_node="">Petit Palais</span></a><span data-dcnode-id="5838" instrument_node=""> and Gare d'Orsay, decorated as they are with </span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dome" title="Dome"><span data-dcnode-id="5837" instrument_node="">domes</span></a><span data-dcnode-id="5835" instrument_node="">, </span><a data-dcnode-id="5833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonnade" title="Colonnade"><span data-dcnode-id="5834" instrument_node="">colonnades</span></a><span data-dcnode-id="5832" instrument_node="">, </span><a data-dcnode-id="5830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mosaic" title="Mosaic"><span data-dcnode-id="5831" instrument_node="">mosaics</span></a><span data-dcnode-id="5829" instrument_node=""> and statuary. The most innovative buildings of the period were the </span><a data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galerie_des_machines" title="Galerie des machines"><span data-dcnode-id="5828" instrument_node="">Gallery of Machines</span></a><span data-dcnode-id="5826" instrument_node=""> at the 1889 exposition and the new railroad stations and department stores: their classical exteriors concealed very modern interiors with large open spaces and large glass skylights made possible by the new engineering techniques of the period. The Eiffel Tower shocked many traditional Parisians, both because of its appearance and because it was the first building in Paris taller than the cathedral of Notre-Dame.
</span></p><p data-dcnode-id="5801"><a data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="5824" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="5822" instrument_node=""> became the most striking stylistic innovation of the period in architecture. It is associated particularly with the metro station entrances designed by </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hector_Guimard" title="Hector Guimard"><span data-dcnode-id="5821" instrument_node="">Hector Guimard</span></a><span data-dcnode-id="5819" instrument_node=""> and a handful of buildings, including Guimard's </span><a data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castel_B%25C3%25A9ranger" title="Castel Béranger"><span data-dcnode-id="5818" instrument_node="">Castel Béranger</span></a><span data-dcnode-id="5816" instrument_node=""> (1889) at 14 Rue La Fontaine and the Hôtel Mezzara (1910) in the </span><a data-dcnode-id="5814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/16th_arrondissement_of_Paris" title="16th arrondissement of Paris"><span data-dcnode-id="5815" instrument_node="">16th arrondissement</span></a><span data-dcnode-id="5813" instrument_node="">.</span><sup class="reference" data-dcnode-id="5810" id="cite_ref-FOOTNOTESarmant2012202_40-0"><a data-dcnode-id="5811" href="#cite_note-FOOTNOTESarmant2012202-40"><span data-dcnode-id="5812" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5809" instrument_node=""> The enthusiasm for Art Nouveau metro station entrances did not last long; in 1904 it was replaced at the </span><a data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Op%25C3%25A9ra_%28Paris_M%25C3%25A9tro%29" title="Opéra (Paris Métro)"><span data-dcnode-id="5808" instrument_node="">Opéra</span></a><span data-dcnode-id="5806" instrument_node=""> metro station by a less exuberant "modern" style. Beginning in 1912, all the Guimard metro entrances were replaced with functional entrances without decoration.</span><sup class="reference" data-dcnode-id="5803" id="cite_ref-FOOTNOTEMarchand1993169_41-0"><a data-dcnode-id="5804" href="#cite_note-FOOTNOTEMarchand1993169-41"><span data-dcnode-id="5805" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5802" instrument_node="">
</span></p><p data-dcnode-id="5787"><span data-dcnode-id="5800" instrument_node="">A revolutionary new building material, </span><a data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reinforced_concrete" title="Reinforced concrete"><span data-dcnode-id="5799" instrument_node="">reinforced concrete</span></a><span data-dcnode-id="5797" instrument_node="">, appeared at the beginning of the 20th century and quietly began to change the face of Paris. The first church built in the new material was </span><a data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Jean_de_Montmartre" title="Saint-Jean de Montmartre"><span data-dcnode-id="5796" instrument_node="">Saint-Jean de Montmartre</span></a><span data-dcnode-id="5794" instrument_node="">, at 19 Rue des Abbesses at the foot of Montmartre. The architect was </span><a data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatole_de_Baudot" title="Anatole de Baudot"><span data-dcnode-id="5793" instrument_node="">Anatole de Baudot</span></a><span data-dcnode-id="5791" instrument_node="">, a student of </span><a class="mw-redirect" data-dcnode-id="5789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viollet-le-Duc" title="Viollet-le-Duc"><span data-dcnode-id="5790" instrument_node="">Viollet-le-Duc</span></a><span data-dcnode-id="5788" instrument_node="">. The nature of the revolution was not evident, because Baudot faced the concrete with brick and ceramic tiles in a colorful Art Nouveau style with stained glass windows in the same style.
</span></p><p data-dcnode-id="5754"><span data-dcnode-id="5786" instrument_node="">The </span><a data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Th%25C3%25A9%25C3%25A2tre_des_Champs-%25C3%2589lys%25C3%25A9es" title="Théâtre des Champs-Élysées"><span data-dcnode-id="5785" instrument_node="">Théâtre des Champs-Élysées</span></a><span data-dcnode-id="5783" instrument_node=""> (1913) is another architectural landmark of the period, one of the few Paris buildings in the </span><a class="mw-redirect" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_deco" title="Art deco"><span data-dcnode-id="5782" instrument_node="">Art deco</span></a><span data-dcnode-id="5780" instrument_node=""> style. Designed by </span><a data-dcnode-id="5778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auguste_Perret" title="Auguste Perret"><span data-dcnode-id="5779" instrument_node="">Auguste Perret</span></a><span data-dcnode-id="5777" instrument_node="">, it was also built of reinforced concrete and decorated by some of the leading artists of the era: </span><a class="mw-redirect" data-dcnode-id="5775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bas-relief" title="Bas-relief"><span data-dcnode-id="5776" instrument_node="">bas-reliefs</span></a><span data-dcnode-id="5774" instrument_node=""> on the façade by </span><a data-dcnode-id="5772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antoine_Bourdelle" title="Antoine Bourdelle"><span data-dcnode-id="5773" instrument_node="">Antoine Bourdelle</span></a><span data-dcnode-id="5771" instrument_node="">, a dome by </span><a data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Denis" title="Maurice Denis"><span data-dcnode-id="5770" instrument_node="">Maurice Denis</span></a><span data-dcnode-id="5768" instrument_node="">, and paintings in the interior by </span><a data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589douard_Vuillard" title="Édouard Vuillard"><span data-dcnode-id="5767" instrument_node="">Édouard Vuillard</span></a><span data-dcnode-id="5765" instrument_node="">. It was the setting in 1913 for one of the major musical events of the </span><i data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5762" instrument_node="">: the premiere of </span><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Igor_Stravinsky" title="Igor Stravinsky"><span data-dcnode-id="5761" instrument_node="">Igor Stravinsky</span></a><span data-dcnode-id="5759" instrument_node="">'s </span><i data-dcnode-id="5756"><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Rite_of_Spring" title="The Rite of Spring"><span data-dcnode-id="5758" instrument_node="">The Rite of Spring</span></a></i><span data-dcnode-id="5755" instrument_node="">.
</span></p><span data-dcnode-id="5753" instrument_node="">

</span><h3 data-dcnode-id="5617"><span class="mw-headline" data-dcnode-id="5625" id="Bridges"><span data-dcnode-id="5626" instrument_node="">Bridges</span></span><span class="mw-editsection" data-dcnode-id="5618"><span class="mw-editsection-bracket" data-dcnode-id="5623"><span data-dcnode-id="5624" instrument_node="">[</span></span><a data-dcnode-id="5621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D19" title="Edit section: Bridges"><span data-dcnode-id="5622" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5616" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5599"><div class="thumbinner" data-dcnode-id="5600" style="width:272px;"><a class="image" data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APont_Alexandre_III.jpg"><img alt="" class="thumbimage" data-dcnode-id="5615" data-file-height="594" data-file-width="794" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Pont_Alexandre_III.jpg/270px-Pont_Alexandre_III.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Pont_Alexandre_III.jpg/405px-Pont_Alexandre_III.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Pont_Alexandre_III.jpg/540px-Pont_Alexandre_III.jpg 2x" width="270"></a><span data-dcnode-id="5613" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5601"><div class="magnify" data-dcnode-id="5611"><a class="internal" data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APont_Alexandre_III.jpg" title="Enlarge"></a></div><span data-dcnode-id="5610" instrument_node="">The </span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_Alexandre_III" title="Pont Alexandre III"><span data-dcnode-id="5609" instrument_node="">Pont Alexandre III</span></a><span data-dcnode-id="5607" instrument_node=""> and the </span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="5606" instrument_node="">Grand Palais</span></a><span data-dcnode-id="5604" instrument_node="">, legacies of the Paris </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposition_Universelle_%281900%29" title="Exposition Universelle (1900)"><span data-dcnode-id="5603" instrument_node="">Universal Exposition of 1900</span></a></div></div></div><span data-dcnode-id="5598" instrument_node="">
</span><p data-dcnode-id="5550"><span data-dcnode-id="5597" instrument_node="">Eight new bridges were put across the Seine during the </span><i data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">Belle Époque</span></i><span data-dcnode-id="5594" instrument_node="">. The </span><a class="mw-redirect" data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_Sully" title="Pont Sully"><span data-dcnode-id="5593" instrument_node="">Pont Sully</span></a><span data-dcnode-id="5591" instrument_node="">, built in 1876, replaced two foot bridges that had connected the </span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%258Ele_Saint-Louis" title="Île Saint-Louis"><span data-dcnode-id="5590" instrument_node="">Île Saint-Louis</span></a><span data-dcnode-id="5588" instrument_node=""> to the Right and Left Bank. The </span><a data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_de_Tolbiac" title="Pont de Tolbiac"><span data-dcnode-id="5587" instrument_node="">Pont de Tolbiac</span></a><span data-dcnode-id="5585" instrument_node=""> was built in 1882 to connect the Left Bank with </span><a data-dcnode-id="5583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bercy" title="Bercy"><span data-dcnode-id="5584" instrument_node="">Bercy</span></a><span data-dcnode-id="5582" instrument_node="">. The </span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_Mirabeau" title="Pont Mirabeau"><span data-dcnode-id="5581" instrument_node="">Pont Mirabeau</span></a><span data-dcnode-id="5579" instrument_node="">, made famous in a poem by </span><a class="mw-redirect" data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollinaire" title="Apollinaire"><span data-dcnode-id="5578" instrument_node="">Apollinaire</span></a><span data-dcnode-id="5576" instrument_node="">, was dedicated in 1895. Three bridges were built for the 1900 Exposition: the </span><a class="mw-redirect" data-dcnode-id="5574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_Alexandre-III" title="Pont Alexandre-III"><span data-dcnode-id="5575" instrument_node="">Pont Alexandre-III</span></a><span data-dcnode-id="5573" instrument_node="">, dedicated by Czar </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_II_of_Russia" title="Nicholas II of Russia"><span data-dcnode-id="5572" instrument_node="">Nicholas II of Russia</span></a><span data-dcnode-id="5570" instrument_node=""> in 1896, which connected the Left Bank with the grand exposition halls of the </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grand_Palais" title="Grand Palais"><span data-dcnode-id="5569" instrument_node="">Grand Palais</span></a><span data-dcnode-id="5567" instrument_node=""> and </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petit_Palais" title="Petit Palais"><span data-dcnode-id="5566" instrument_node="">Petit Palais</span></a><span data-dcnode-id="5564" instrument_node="">; the </span><a data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passerelle_Debilly" title="Passerelle Debilly"><span data-dcnode-id="5563" instrument_node="">Passerelle Debilly</span></a><span data-dcnode-id="5561" instrument_node="">, a foot bridge that linked two sections of the Exposition; and a railroad bridge between Grenelle and Passy. Two more bridges were dedicated in 1905: the Pont de Passy (now the </span><a data-dcnode-id="5559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pont_de_Bir-Hakeim" title="Pont de Bir-Hakeim"><span data-dcnode-id="5560" instrument_node="">Pont de Bir-Hakeim</span></a><span data-dcnode-id="5558" instrument_node="">), and the </span><a data-dcnode-id="5556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Viaduc_d%2527Austerlitz" title="Viaduc d'Austerlitz"><span data-dcnode-id="5557" instrument_node="">Viaduc d'Austerlitz</span></a><span data-dcnode-id="5555" instrument_node="">, crossed by the metro.</span><sup class="reference" data-dcnode-id="5552" id="cite_ref-FOOTNOTEFierro19961089_42-0"><a data-dcnode-id="5553" href="#cite_note-FOOTNOTEFierro19961089-42"><span data-dcnode-id="5554" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5551" instrument_node="">
</span></p><span data-dcnode-id="5549" instrument_node="">
</span><h3 data-dcnode-id="5538"><span data-dcnode-id="5548" id="Parks.2C_gardens_and_squares"></span><span class="mw-headline" data-dcnode-id="5546" id="Parks,_gardens_and_squares"><span data-dcnode-id="5547" instrument_node="">Parks, gardens and squares</span></span><span class="mw-editsection" data-dcnode-id="5539"><span class="mw-editsection-bracket" data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">[</span></span><a data-dcnode-id="5542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DParis_in_the_Belle_%25C3%2589poque%26action%3Dedit%26section%3D20" title="Edit section: Parks, gardens and squares"><span data-dcnode-id="5543" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5540"><span data-dcnode-id="5541" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5537" instrument_node="">
