</span><div class="media media--blazy media--bundle--image media--image is-b-loaded" data-dcnode-id="2720"><span data-dcnode-id="2723" instrument_node="">
</span><img alt="Architectures can be visualized at multiple levels of abstraction." class="media__image media__element b-lazy img-fluid b-loaded" data-dcnode-id="2722" height="600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/full/public/2020-09/architect-architecture-scaffolding-structure-tower_0.png%3Fitok%3DPMq8nJNV&amp;raw" typeof="foaf:Image" width="1000"><span data-dcnode-id="2721" instrument_node="">
</span></div><span data-dcnode-id="2719" instrument_node="">
</span></div><span data-dcnode-id="2717" instrument_node="">
</span></div><span data-dcnode-id="2715" instrument_node="">
</span><figcaption data-dcnode-id="2703"><span data-dcnode-id="2714" instrument_node="">
</span><div class="image__field-media-description" data-dcnode-id="2705"><p data-dcnode-id="2707"><span data-dcnode-id="2713" instrument_node="">Photo by </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/%40fleetingday"><span data-dcnode-id="2712" instrument_node="">Malgorzata Frej</span></a><span data-dcnode-id="2710" instrument_node=""> on </span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/s/photos/architecture-eiffel"><span data-dcnode-id="2709" instrument_node="">Unsplash</span></a></p><span data-dcnode-id="2706" instrument_node="">
</span></div><span data-dcnode-id="2704" instrument_node="">
</span></figcaption><span data-dcnode-id="2702" instrument_node="">
</span></figure><span data-dcnode-id="2700" instrument_node="">
</span></div><span data-dcnode-id="2698" instrument_node="">
</span></div><span data-dcnode-id="2696" instrument_node="">
</span><div class="block" data-dcnode-id="2398"><span data-dcnode-id="2695" instrument_node="">
</span><div class="clearfix article__body" data-dcnode-id="2400" property="schema:text"><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">One of the things I've noticed about aspiring Enterprise Architects from an application development background is that they tend to drill down into implementation details too soon. It's an understandable inclination. Typically, developers live in a detail-laden world of issues and bugs that can only be remedied by having an in-depth operational understanding of the technology at hand. One bad setting in a configuration file can cause a weekend's worth of grief trying to get a failing system back online.</span></p><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Operating at the higher levels of abstraction that are part of the architectural design process can be difficult for people who have spent most of their careers achieving success by going "into the weeds." For the application developer, the devil is always in the details. Yet a good deal of the effort that goes into an architectural design requires working at the higher levels abstraction.</span></p><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Descending down to concrete implementation before addressing higher-level concerns can lead to creating inherently flawed systems.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">It's the analogical equivalent to a residential architect being so focused on finding just the right faucets for a client's kitchen that he or she fails to notice that the plot of land where the house is to be built is miles from the nearest water main. When it comes to design considerations, overlooking water access is a far greater problem than choosing the wrong set of faucets. As the analogy shows, problems created at the higher levels of the design process often are costly, or maybe impossible, to fix it later on.</span></p><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Being able to design according to a certain level of abstraction is an important skill. To do so, you need to have a clear idea of the hierarchy of levels in the architectural design process. The following describes a model that's worked for me over the years.</span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Let's look at the details.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><h2 data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">Understanding the four phases of architecture</span></h2><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">As mentioned above, architectural design is not a one-shot deal. Instead, it's a progression through a hierarchy of phases. A model I use defines four design phases, starting from conceptual abstraction and ending with a concrete implementation. These four phases are named as follows:</span></p><span data-dcnode-id="2671" instrument_node="">
</span><ul data-dcnode-id="2657"><span data-dcnode-id="2670" instrument_node="">
</span><li data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">Conceptual</span></li><span data-dcnode-id="2667" instrument_node="">
</span><li data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Logical</span></li><span data-dcnode-id="2664" instrument_node="">
</span><li data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Structural</span></li><span data-dcnode-id="2661" instrument_node="">
</span><li data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">Concrete</span></li><span data-dcnode-id="2658" instrument_node="">
</span></ul><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2645"><span data-dcnode-id="2655" instrument_node="">Figure 1 below is an informal example of applying the four phases to a well-known building, the Eiffel Tower. The tower started as a concept imagined by two engineers, </span><a data-dcnode-id="2653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Koechlin" target="_blank"><span data-dcnode-id="2654" instrument_node="">Maurice Koechlin</span></a><span data-dcnode-id="2652" instrument_node=""> and </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589mile_Nouguier" target="_blank"><span data-dcnode-id="2651" instrument_node="">Émile Nouguier</span></a><span data-dcnode-id="2649" instrument_node="">, who worked in the architecture firm of </span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Eiffel" target="_blank"><span data-dcnode-id="2648" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="2646" instrument_node="">. Eiffel bought the rights to the engineers' plans, and thus the tower came to be named after him.</span></p><span data-dcnode-id="2644" instrument_node="">
</span><figure class="figure colorbox-image align-center" data-dcnode-id="2620"><span data-dcnode-id="2643" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-large cboxElement" data-colorbox-inline=".colorbox-image" data-dcnode-id="2625" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_large" data-entity-type="media" data-entity-uuid="1a7884c8-084a-4cf8-98ab-8a8ac3cf72d7" data-height="569" data-langcode="en" data-width="1232"><div data-dcnode-id="2627"><span data-dcnode-id="2642" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2629"><span data-dcnode-id="2641" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">
      Image    </span></div><span data-dcnode-id="2638" instrument_node="">
</span><div class="field__item" data-dcnode-id="2631"><span data-dcnode-id="2637" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--image is-b-loaded" data-dcnode-id="2633"><span data-dcnode-id="2636" instrument_node="">
</span><img alt="The four phases of architectural design as applied to the Eiffel Tower" class="media__image media__element b-lazy img-fluid b-loaded b-error b-checked" data-dcnode-id="2635" height="569" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_large/public/2020-09/Figure1.png%3Fitok%3DHhU6RrL2&amp;raw" typeof="foaf:Image" width="1232"><span data-dcnode-id="2634" instrument_node="">
</span></div><span data-dcnode-id="2632" instrument_node="">
</span></div><span data-dcnode-id="2630" instrument_node="">
</span></div><span data-dcnode-id="2628" instrument_node="">
</span></div><span data-dcnode-id="2626" instrument_node="">
</span></div><span data-dcnode-id="2624" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Figure 1: The four phases of architectural design as applied to the Eiffel Tower</span></figcaption><span data-dcnode-id="2621" instrument_node="">
</span></figure><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2618" instrument_node="">Eiffel intended the tower to be the tallest structure of its time. To achieve this objective, the designers needed to develop a design that could withstand the significant wind force at high altitudes. The structure was also supposed to be a </span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pariscityvision.com/en/paris/landmarks/eiffel-tower/history" target="_blank"><span data-dcnode-id="2617" instrument_node="">temporary centerpiece</span></a><span data-dcnode-id="2615" instrument_node=""> for the 1889 World's Fair in Paris. Thus, it needed to be not only assembled but also disassembled after the fair was over. It became a permanent fixture on the Paris landscape due to the popularity and utility that the structure garnered during the 1889 event and afterward. Still, the thing to remember is that the structure was initially to be taken apart at the end of the World's Fair. The decision to make the structure temporary influenced the logic of how the structure would be built. If the tower were supposed to be permanent, the resulting structure would have been very different.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">Once the conceptual requirements for the tower are established, the next step in the architectural process is to create a logical way to move forward. Thus, Eiffel and his team decided to make the structure out of prefabricated components made of puddled iron that are to be assembled in sections and held together with rivets.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The next step is to move on to the structural design. The architects and engineers working on the project accomplished this with an amazing degree of accuracy. They produced 3,629 detailed drawings that described the 18,038 different parts of the structure. Every facet of the tower was accounted for.</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2606" instrument_node="">The way that the structural drawings were transformed into concrete reality was to prefabricate the tower's sections offsite. The sections were then assembled at the tower's location on the World's Fair grounds at the </span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//duckduckgo.com/%3Fq%3DChamp%2Bde%2BMars%2BTour%2BEiffel%26atb%3Dv58-1%26ia%3Dplaces%26page%3D1%26adx%3Dprdsdc%26sexp%3D%257B%2522v7exp%2522%253A%2522a%2522%252C%2522sltexp%2522%253A%2522b%2522%252C%2522prodexp%2522%253A%2522b%2522%252C%2522prdsdexp%2522%253A%2522c%2522%252C%2522biaexp%2522%253A%2522b%2522%252C%2522wiadrk%2522%253A%2522b%2522%252C%2522wiamr%2522%253A%2522a%2522%252C%2522nyexp%2522%253A%2522b%2522%252C%2522langexp%2522%253A%2522b%2522%252C%2522liapm%2522%253A%2522a%2522%257D%26iaxm%3Dplaces%26strict_bbox%3D0%26bbox%3D49.66962297662514%252C2.3002060000000455%252C47.26406302918448%252C7.351570000000052%26metatoken%3D0" target="_blank"><span data-dcnode-id="2605" instrument_node="">Champ de Mars</span></a><span data-dcnode-id="2603" instrument_node=""> on the banks of the river Seine in Paris. Planning was so good that the rivet holes made offsite in the iron sections fit together perfectly when assembled on the main tower. No drilling was done onsite.</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Outside of the historically fascinating aspects of making the Eiffel Tower, what's interesting from an architectural point of view is how well the four phases of architectural design map from creating a physical structure such as the Eiffel Tower onto creating enterprise software systems. Just as designing the tower needs to go through the conceptual, logical, structural, and concrete levels in sequence, so too does the pattern apply to enterprise architecture.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">Allow me to elaborate.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><h2 data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">A real-world example</span></h2><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Let's apply the four phases of architecture development I introduced earlier to a fictitious but realistic example. Figure 2 below shows the four phases of architectural design applied to an enterprise payroll system.</span></p><span data-dcnode-id="2589" instrument_node="">
</span><figure class="figure colorbox-image2 align-center" data-dcnode-id="2565"><span data-dcnode-id="2588" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-large cboxElement" data-colorbox-inline=".colorbox-image2" data-dcnode-id="2570" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_large" data-entity-type="media" data-entity-uuid="58406539-2022-4c02-987e-94c3cb1d7569" data-height="579" data-langcode="en" data-width="1232"><div data-dcnode-id="2572"><span data-dcnode-id="2587" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2574"><span data-dcnode-id="2586" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">
      Image    </span></div><span data-dcnode-id="2583" instrument_node="">
</span><div class="field__item" data-dcnode-id="2576"><span data-dcnode-id="2582" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--image is-b-loaded" data-dcnode-id="2578"><span data-dcnode-id="2581" instrument_node="">
</span><img alt="Apply the four phases of architectural design to an enterprise system" class="media__image media__element b-lazy img-fluid b-loaded b-error b-checked" data-dcnode-id="2580" height="579" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_large/public/2020-09/Figure2.png%3Fitok%3D9uIcm66X&amp;raw" typeof="foaf:Image" width="1232"><span data-dcnode-id="2579" instrument_node="">
</span></div><span data-dcnode-id="2577" instrument_node="">
</span></div><span data-dcnode-id="2575" instrument_node="">
</span></div><span data-dcnode-id="2573" instrument_node="">
</span></div><span data-dcnode-id="2571" instrument_node="">
</span></div><span data-dcnode-id="2569" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Figure 2: Apply the four phases of architectural design to an enterprise system</span></figcaption><span data-dcnode-id="2566" instrument_node="">
</span></figure><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">The sections following describe the details of the illustration shown above in Figure 2.</span></p><span data-dcnode-id="2561" instrument_node="">
</span><h4 data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Conceptual</span></h4><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">The conceptual level is where the definitions of purpose, scope, and constraints of the intended software architecture are created. For example, according to the illustration in Figure 2 above, the purpose of the intended architecture might be to allow employees in the Finance department of a company to conduct payroll activities for all divisions globally. The scope of the architecture is, as the name indicates, the Finance department, but what is not known is the number of current and projected employees in the Finance department. Neither is the number of employees company-wide known. In addition, the countries which will be subject to the payroll system need to be determined. Also, an important piece of information required is an estimated budget that the company is willing to spend on the architecture.</span></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">These items might seem like business considerations, but they're much more. Software designed for 100 users maximum over the system's anticipated lifetime is much different from one that needs to support 5,000 users. The same goes for the number of employees subjected to the system. A company that needs to handle payroll for 5,000 employees is different than a company that needs to run payroll for 50,000. Of course, the company might want a system to handle infinite scale over current and yet unknown geography. Achieving this goal is possible as long as the budget is there to support such an ambitious undertaking. If the funds are not available, the project's ambitions are moot. Every aspect of the conceptual definition of the intended architecture matters.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">The long and the short of it is that decisions made in the conceptual level affect every aspect of the intended architecture moving forward.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><h4 data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">Logical</span></h4><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">The logical level of architectural design is where the purpose, scope, and constraints defined in the conceptual level are translated into a set of logical entities that can be converted into actual working software. Typically, enterprise architects use a combination of written descriptions and a diagramming language such as Unified Modeling Language (UML) to express the system's logical design. (See Figure 3, below)</span></p><span data-dcnode-id="2543" instrument_node="">
</span><figure class="figure colorbox-image3 align-center" data-dcnode-id="2519"><span data-dcnode-id="2542" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-large cboxElement" data-colorbox-inline=".colorbox-image3" data-dcnode-id="2524" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_large" data-entity-type="media" data-entity-uuid="6feda04f-a7ae-4a15-8e87-fed77680e9ac" data-height="1108" data-langcode="en" data-width="1232"><div data-dcnode-id="2526"><span data-dcnode-id="2541" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2528"><span data-dcnode-id="2540" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">
      Image    </span></div><span data-dcnode-id="2537" instrument_node="">
</span><div class="field__item" data-dcnode-id="2530"><span data-dcnode-id="2536" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--loading is-b-loading media--image" data-dcnode-id="2532"><span data-dcnode-id="2535" instrument_node="">
</span><img alt="A high-level logical description of a hypothetical payroll system" class="media__image media__element b-lazy img-fluid b-loaded" data-dcnode-id="2534" height="1108" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_large/public/2020-09/Figure3.png%3Fitok%3D80ttOxTZ&amp;raw" typeof="foaf:Image" width="1232"><span data-dcnode-id="2533" instrument_node="">
</span></div><span data-dcnode-id="2531" instrument_node="">
</span></div><span data-dcnode-id="2529" instrument_node="">
</span></div><span data-dcnode-id="2527" instrument_node="">
</span></div><span data-dcnode-id="2525" instrument_node="">
</span></div><span data-dcnode-id="2523" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Figure 3: A high-level logical description of a hypothetical payroll system</span></figcaption><span data-dcnode-id="2520" instrument_node="">
</span></figure><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">The scope of logical design needs to be detailed enough that technical staff can be divided into distinct workgroups that focus on realizing the defined logical components, yet general enough that changes in the high-level design have minimal impact. An example of appropriate scope is changing the Banking and Human Resource components from a direct association to the Payroll System, as shown in Version 1 of Figure 4 below, to the Geography component subsystems, as shown in Version 2.</span></p><span data-dcnode-id="2515" instrument_node="">
</span><figure class="figure colorbox-image4 align-center" data-dcnode-id="2491"><span data-dcnode-id="2514" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-large cboxElement" data-colorbox-inline=".colorbox-image4" data-dcnode-id="2496" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_large" data-entity-type="media" data-entity-uuid="39d51a87-87e8-4aa2-bab5-ddff118820b5" data-height="608" data-langcode="en" data-width="1232"><div data-dcnode-id="2498"><span data-dcnode-id="2513" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2500"><span data-dcnode-id="2512" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">
      Image    </span></div><span data-dcnode-id="2509" instrument_node="">
</span><div class="field__item" data-dcnode-id="2502"><span data-dcnode-id="2508" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--loading is-b-loading media--image" data-dcnode-id="2504"><span data-dcnode-id="2507" instrument_node="">
</span><img alt="A logical design needs to be flexible enough to accommodate high-level change without affecting lower-level implementation activity" class="media__image media__element b-lazy img-fluid b-loaded" data-dcnode-id="2506" height="608" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_large/public/2020-09/Figure4.png%3Fitok%3Dlj2GrTnF&amp;raw" typeof="foaf:Image" width="1232"><span data-dcnode-id="2505" instrument_node="">
</span></div><span data-dcnode-id="2503" instrument_node="">
</span></div><span data-dcnode-id="2501" instrument_node="">
</span></div><span data-dcnode-id="2499" instrument_node="">
</span></div><span data-dcnode-id="2497" instrument_node="">
</span></div><span data-dcnode-id="2495" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Figure 4: A logical design needs to be flexible enough to accommodate high-level changes without affecting lower-level implementation activity</span></figcaption><span data-dcnode-id="2492" instrument_node="">
</span></figure><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Once the logical phase has been completed, work begins in the structural phase.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><h4 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Structural</span></h4><span data-dcnode-id="2484" instrument_node="">
</span><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">The structural level is the place where the architectural design begins to take shape physically. The purpose of the structural phase is to create the system's physical blueprints. For example, this phase defines the data structures, protocols, and context boundaries associated with each component made earlier in the logical phase. High-level programming guidelines on a per-component basis are determined, too. For instance, logical components might be well-suited to using Object Oriented Programming or Functional Programming, while data storage components would use a SQL-based language.</span></p><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">In addition, the structural phase is where media support is identified. This phase is particularly important as voice and touch-screen activity continue to grow as a means of data generation and data exchange. (See Figure 5, below)</span></p><span data-dcnode-id="2478" instrument_node="">
</span><figure class="figure colorbox-image5 align-center" data-dcnode-id="2454"><span data-dcnode-id="2477" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-small cboxElement" data-colorbox-inline=".colorbox-image5" data-dcnode-id="2459" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_small" data-entity-type="media" data-entity-uuid="360d859f-6991-4462-a772-ab148613d073" data-height="860" data-langcode="en" data-width="1144"><div data-dcnode-id="2461"><span data-dcnode-id="2476" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2463"><span data-dcnode-id="2475" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">
      Image    </span></div><span data-dcnode-id="2472" instrument_node="">
</span><div class="field__item" data-dcnode-id="2465"><span data-dcnode-id="2471" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--loading is-b-loading media--image" data-dcnode-id="2467"><span data-dcnode-id="2470" instrument_node="">
</span><img alt="The structural phase is where data structures, protocols, media, and programming paradigms for the logical components are identified" class="media__image media__element b-lazy img-fluid b-loaded" data-dcnode-id="2469" height="1144" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_small/public/2020-09/structural-architecture-four-architectural-design.png%3Fitok%3D5FBFDqAr&amp;raw" typeof="foaf:Image" width="860"><span data-dcnode-id="2468" instrument_node="">
</span></div><span data-dcnode-id="2466" instrument_node="">
</span></div><span data-dcnode-id="2464" instrument_node="">
</span></div><span data-dcnode-id="2462" instrument_node="">
</span></div><span data-dcnode-id="2460" instrument_node="">
</span></div><span data-dcnode-id="2458" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Figure 5: The structural phase is where data structures, protocols, media, and programming paradigms for the logical components are identified</span></figcaption><span data-dcnode-id="2455" instrument_node="">
</span></figure><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">As stated above, the structural phase's work output provides the level of detail found in a blueprint. The blueprints produced in the structural phase describe precisely what is to be built and, to some degree, how the architecture is to be built. However, the final work of realizing the architecture is done in the concrete phase of implementation.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><h4 data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Concrete</span></h4><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">The concrete level is where the specific products, technologies, frameworks, and services necessary to realize the architectural design are identified and implemented. (See Figure 6, below)</span></p><span data-dcnode-id="2444" instrument_node="">
</span><figure class="figure colorbox-image6 align-center" data-dcnode-id="2420"><span data-dcnode-id="2443" instrument_node="">
</span><div class="embedded-entity embedded-entity--image embedded-entity--image--embed-small cboxElement" data-colorbox-inline=".colorbox-image6" data-dcnode-id="2425" data-embed-button="media_entity_embed" data-entity-embed-display="view_mode:media.embed_small" data-entity-type="media" data-entity-uuid="42bfbcfe-9b4b-4a3c-9959-ef965234d5ca" data-height="860" data-langcode="en" data-width="1093"><div data-dcnode-id="2427"><span data-dcnode-id="2442" instrument_node="">
</span><div class="blazy blazy--field blazy--field-media-image image__field-media-image blazy--on" data-blazy="" data-dcnode-id="2429"><span data-dcnode-id="2441" instrument_node="">
</span><div class="field__label font-weight-bold visually-hidden" data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">
      Image    </span></div><span data-dcnode-id="2438" instrument_node="">
</span><div class="field__item" data-dcnode-id="2431"><span data-dcnode-id="2437" instrument_node="">
</span><div class="media media--blazy media--bundle--image media--loading is-b-loading media--image" data-dcnode-id="2433"><span data-dcnode-id="2436" instrument_node="">
</span><img alt="Specific products, frameworks, and services are identified in the concrete phase" class="media__image media__element b-lazy img-fluid b-loaded" data-dcnode-id="2435" height="1093" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.redhat.com/architect/sites/default/files/styles/embed_small/public/2020-09/concrete-architecture-four-architectural-design_0.png%3Fitok%3DTPUSaCRv&amp;raw" typeof="foaf:Image" width="860"><span data-dcnode-id="2434" instrument_node="">
</span></div><span data-dcnode-id="2432" instrument_node="">
</span></div><span data-dcnode-id="2430" instrument_node="">
</span></div><span data-dcnode-id="2428" instrument_node="">
</span></div><span data-dcnode-id="2426" instrument_node="">
</span></div><span data-dcnode-id="2424" instrument_node="">
</span><figcaption class="figure-caption" data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Figure 6: Specific products, frameworks, and services are identified in the concrete phase</span></figcaption><span data-dcnode-id="2421" instrument_node="">
</span></figure><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Things get very specific in the concrete phase. The scope of the decisions made vary in impact. For example, choosing between Docker Swarm or Kubernetes as the container orchestration technology has broad implications throughout the architectural implementation. Choosing the programming language or database technology to use in a particular component has a narrower scope of impact. The trick is to organize decision-making about specific technologies according to the scope of influence.</span></p><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Those decisions about products, services, and frameworks that affect the entire architecture are typically driven by consensus among senior engineering staff on a cross-functional basis. However, decisions that relate to the implementation of a specific component's internals, such as which programming language best suits the use case requirement defined in the structural phase previous, can be made by the particular development team.</span></p><span data-dcnode-id="2413" instrument_node="">
</span><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Regardless of the scope of impact, whether it's system-wide or confined to the internals of a given component, the devil really is in the details. Thus, such decisions are best made by those with hands-on expertise. However, their work cannot be done in isolation. At the least, all decisions made at the concrete level need to be reviewed by the higher-level architects. It's a process very similar to building construction. Architects make the design, and construction crews implement those designs. However, all construction activity is subjected to rigorous inspection and subsequent certification by qualified personnel. Building standards must be met. Safety must be assured. Software architecture is but a newcomer to a practice that's been going on for hundreds of years.</span></p><span data-dcnode-id="2410" instrument_node="">
</span><h2 data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Putting it all together</span></h2><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Making enterprise software requires structure and discipline. Small startups that employ a few dozen people can enjoy an improvisational approach to architectural design. However, large companies that employ thousands of people on a project require more business operations and enterprise software design organization. You can't put a person on the moon and bring him or her back again on a whim. Coordinating the efforts of thousands of people is very hard work.</span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">The four design phases is but one of many approaches to creating software for very large projects. It might not be for you. There are a lot of schools of design and design methodology for Enterprise Architecture. The critical thing to understand is they all separate work into different phases of design activity. Each phase has distinct concerns and well-defined work products. None advocate vacillating up and down between levels. Being able to work within the boundaries of a particular level is a sign of professional discipline. Few people can do it right off the bat. It's a skill that, once acquired, ensures a design sensibility that delivers software that meets expectations on time and on budget.&nbsp;</span></p><span data-dcnode-id="2401" instrument_node="">
</span></div><span data-dcnode-id="2399" instrument_node="">
</span></div><span data-dcnode-id="2397" instrument_node="">
