</span><h1 class="entry-title" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Map of France</span></h1><span data-dcnode-id="1591" instrument_node="">
</span></div><span data-dcnode-id="1589" instrument_node="">
</span><div class="penci-hide-tagupdated" data-dcnode-id="1580"><span data-dcnode-id="1588" instrument_node="">
</span><span class="author-italic author vcard" data-dcnode-id="1585"><span data-dcnode-id="1587" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofworld.com/author/countriesvishal/"></a></span><span data-dcnode-id="1584" instrument_node="">
</span><time class="entry-date updated" data-dcnode-id="1582" datetime="2022-03-07T09:41:33+00:00"><span data-dcnode-id="1583" instrument_node="">March 7, 2022</span></time><span data-dcnode-id="1581" instrument_node=""> </span></div><span data-dcnode-id="1579" instrument_node="">
</span><div class="post-image" data-dcnode-id="1575"><span data-dcnode-id="1578" instrument_node="">
</span><img alt="France Map" class="attachment-penci-full-thumb size-penci-full-thumb wp-post-image lazyloaded" data-dcnode-id="1577" data-src="https://images.mapsofworld.com/france/france-map.gif" fifu-featured="1" height="1000" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.mapsofworld.com/france/france-map.gif&amp;raw" title="France Map" width="1000"><span data-dcnode-id="1576" instrument_node="">

</span><div class="post-entry blockquote-style-2" data-dcnode-id="1157"><span data-dcnode-id="1571" instrument_node="">
</span><div class="inner-post-entry entry-content closed" data-dcnode-id="1162" style="height: 250px; overflow: hidden;"><span data-dcnode-id="1570" instrument_node="">
</span><h2 data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">History</span></h2><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Humans have been living in France for an estimated 1.8 million years. There are many cave drawings in France from the Paleolithic era. The first colony in France was founded by Greeks in 600 BC in the modern city Marseille, then known as Massalia.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">The spread of Gallic Celtic tribes in France occurred between the third and fifth century BC, when the borders of modern-day state map of France were mostly defined.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The Franks, a Germanic pagan tribe that gave France its name, settled in Gaul and took it over, dividing the region into four parts for the sons of Frankish King Clovis I. These kingdoms were later reunited by Charlemagne (Charles the Great).</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">France played a major role during the Crusades between 1095 and 1291.</span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">From 1337 to 1453, the Hundred Years’ War was fought between France and England. Between the years 1648 and 1653, France witnessed a series of civil wars. Known as Fronde, these civil wars were fought in the midst of the Franco Spanish War, which began in 1635 and lasted till 1659.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">During the period of European exploration, France established colonies in the New World. The Seven Years War (1756-1763) in the New World resulted in the loss of New France territories to Britain, under the rule of Louis XV. As a result, France was a major ally of American colonists seeking independence from Britain during the American Revolution, leading to the 1783 Treaty of Paris.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">The French Revolution took place from around 1789 to 1799, culminating in the storming of the Bastille on July 14, 1789, which ended France’s absolute monarchy and replaced it with a constitutional monarchy. The French Revolutionary wars began in 1792, the same year France became a republic. King Louis XVI was executed in 1793 for treason, as was his wife Marie Antoinette.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Napoleon Bonaparte took over the Republic in 1799, eventually becoming Emperor. The French empire led by Napoleon began conquering Europe, until his defeat in 1815.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">During the nineteenth century, France became the second largest colonial power of all times, with colonies in North America, Southeast Asia, North, West &amp; Central Africa, Caribbean, and Pacific Islands. Many of these colonies are still part of the Republic of France. France was an integral part in both World War I and World War II, and was a founding member of NATO in 1949.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><h3 data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Physical</span></h3><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1536" instrument_node="">As shown in the map of France, it is the largest country in western Europe, bordering Belgium,&nbsp;</span><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofworld.com/germany/"><span data-dcnode-id="1535" instrument_node="">Germany</span></a><span data-dcnode-id="1533" instrument_node="">, Italy, Luxembourg, Switzerland, Spain, Monaco, and Andorra. The major bodies of water around France are the Mediterranean Sea, English Channel, North Sea, Atlantic Ocean, and the Rhine River as shown in the France Map. Other major geographic features of France as shown on the map of France are the Alps, the Pyrenees Mountains, and the Massif Central. France’s other five territories are considered part of the Republic of France. Here is </span><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mapsofworld.com/france/physical-map-of-france.html"><span data-dcnode-id="1532" instrument_node="">France&nbsp;Physical Map</span></a><span data-dcnode-id="1530" instrument_node="">&nbsp;showing all physical feature of the country.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Because France takes up a large area, the climate varies from one place to another. Areas closer to the Mediterranean have a Mediterranean climate, while the inland climate is typical continental, and the Alps have much more extreme temperatures.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><h3 data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Polities</span></h3><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">France has been under the Fifth Republic’s constitution since September 28, 1958. The government is headed by a President, who is elected by the people and the Prime Minister, who in turn is appointed by the President. France has a parliament with a National Assembly and a Senate.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">With effect from January 1, 2016, France is divided into 13 metropolitan regions, after its Parliament passed a law reforming the total number of regions. In addition, 5 regions of France are overseas, away from the main or metropolitan part of France. These five regions are French Guiana, Guadaloupe, Martinique, Mayotte, and Réunion. France also has other overseas territories like French Polynesia that are considered collectivities.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Regions are administratively divided into 102 departments, then further into arrondissements (342), cantons and finally communes or municipalities. Paris, Lyon, and Marseille are three of the major communes in France which are also located on the map of France and these communes are divided into municipal arrondissements.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><h3 data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Travel to France</span></h3><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Paris, Normandy, the Rhone Valley, Provence, the Cote d’Azur, the Alps, Languedoc, the Pyrenees, Burgundy, the Loire, Brittany, Lorraine, and Alsace are counted among the most visited places in the country. Each region proudly boasts of its rich history, mind-blowing cuisine, festive revelries, and quintessential bistros &amp; brasseries. A vacation to France is an unsaid promise of a lifetime of memories, excellent learning, and unbridled fun.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1494"><b data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="1504" instrument_node="">, which is situated in Paris of course, is the prime attraction of the country and is marked on the France Map. However,&nbsp;</span><b data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Bastille Day</span></b><span data-dcnode-id="1501" instrument_node="">&nbsp;celebrations, too, attract tourists from all over the globe in legions. France is also the place where wine connoisseurs turn up to indulge in the delirious&nbsp;</span><b data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">wine right from the breweries</span></b><span data-dcnode-id="1498" instrument_node="">. For architects and historians,&nbsp;</span><b data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Châteaux of the Loire Valley</span></b><span data-dcnode-id="1495" instrument_node="">&nbsp;is their favorite spot to look into the advanced engineering techniques in old France. Plus, the French Revolution, World Wars, and the history of crusades add the necessary layer of shine to the charm of France.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">There are various travel opportunities as well in France. From wine tasting to beach holidays, from romantic honeymoons to religious pilgrimages, from art &amp; culture travel to ecotourism and from business travel to natural expeditions, France ranks first in every aspect.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">For getting around Paris, Paris Métro is considered the best transport service. Other viable options are RER suburban trains, the tram, and the bus. Those looking for an inexpensive way of traveling in the city can get Mobilis tickets, which are passes valid for one complete day in the city. For other cities, bus services and trams are excellent ways to explore them in and out.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1483"><b data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Tip:</span></b><span data-dcnode-id="1484" instrument_node="">&nbsp;One important thing to know is that all the tourists have to pay Tourism Tax while they are staying in the country. This tax is generally added to the apartment rent or the hotel bill. So, while making arrangements, prior checking with your hotel will come handy.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">The bus network is excellent here, for it connects Avignon, Nice, and Paris with more than 36 cities in Europe. For those on a tight budget, discounted passes are also available. Those who want to enjoy the landscape of the country on road can have motorcycles and cars on rent at affordable prices.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">There are also train services that connect France with countries like Switzerland, Spain, Germany, Netherlands, Austria, and Belgium which are depicted on the map of France. Connecting Paris and London, Eurostar is a popular train service. Talking about air links, France is connected with virtually all the major cities of the world. Paris-Orly airport and Charles De Gaulle airport are the two major airports in the country.</span></p><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Rouen, Paris, Nantes, Marseille, Le Havre, Dunkerque, and Calaisa are major ports which are located on the map of France. From Ireland and across the English Channel, there are ferry services available to get to France.</span></p><span data-dcnode-id="1473" instrument_node="">
</span><h3 data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Culture in France</span></h3><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Culture is an important part of the French experience, with food and wine playing a central role. The French are known for being proud of their language and often expect tourists to make some effort in speaking the language during their visit. So, it’s a good idea to study some commonly used expressions before traveling to France.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Art and Architecture</span></h3><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">France is widely considered as Europe’s cultural capital. Under the rule of French monarchs, architecture and fine arts flourished. France’s neighbor Italy played a key role in influencing its art. Monet, Renoir, Manet, and Pissarro are world renowned French painters. Many of the french painters worked and lived out of France. Leonardo da Vinci, Vincent van Gogh, and Picasso produced highly valued pieces of art.</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1460" instrument_node="">The title of the most Romanesque and Gothic architecture of Europe goes to&nbsp;</span><b data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Saint Sernin Basilica</span></b><span data-dcnode-id="1457" instrument_node="">&nbsp;in Toulouse and the&nbsp;</span><b data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Cathédrale St-Lazare</span></b><span data-dcnode-id="1454" instrument_node="">&nbsp;in Autun. The best palace-residences is Châteaus in the Loire valley. Although they are now converted to luxury hotels, they still carry the splendor and grace of the bygone era. The&nbsp;</span><b data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Château d’Amboise</span></b><span data-dcnode-id="1451" instrument_node="">&nbsp;and the&nbsp;</span><b data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Château de Chambord</span></b><span data-dcnode-id="1448" instrument_node="">&nbsp;are timeless architectural marvels. The post Revolution French architecture is represented by&nbsp;</span><b data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Arc de Triomphe</span></b><span data-dcnode-id="1445" instrument_node="">&nbsp;and the&nbsp;</span><b data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Palace of Versailles</span></b><span data-dcnode-id="1442" instrument_node="">&nbsp;which was constructed in the Baroque era. Designed by Gustave Eiffel, the Eiffel Tower was built in 1889. In current time, French architecture is seen as an exquisite blend of great structural engineering and innovative design.</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1436"><b data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Trivia:</span></b><span data-dcnode-id="1437" instrument_node="">&nbsp;Leonardo da Vinci and Francis I were said to share a friendly relation. It was Francis who brought Leonardo to France and gave him a healthy pension. Leonardo also spent his last years in France at Château de Cloux, teaching art techniques to French artists.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><h3 data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Language, Literature and Media</span></h3><span data-dcnode-id="1432" instrument_node="">
</span><div class="txt_con" data-dcnode-id="1164"><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">French is the official language of the country; however, European languages including German and Italian are also spoken quite frequently. English is also spoken in most tourist centers. The French are very courteous people. A few greetings in French, and a warm smile, help tourists in most cities. The origin of French literature can be traced as far back as the Middle Ages, and the use of regional dialects was pronounced in the literature of this time. While Langue d’oïl was more popular with court poets and scribes, Langue d’oc was preferred by the troubadours who immortalized the love stories in their works. The 16th and 17th centuries saw the rise of great thinkers such as Rene Descartes, Blaise Pascal, and Jean de La Fontaine. Descartes’ mathematical and philosophical treatises are studied all over the world. Later, critiques by Voltaire and JJ Rousseau were clear expositions in popular political philosophy and are known in intellectual spheres across the world.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><h3 data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Here’s a list of 10 famous books by authors either born or based in France:</span></h3><span data-dcnode-id="1425" instrument_node="">
</span><ul data-dcnode-id="1393"><span data-dcnode-id="1424" instrument_node="">
</span><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Les Miserables: Victor Hugo</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">The Hunchback of Notre Dame: Victor Hugo</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">The Three Musketeers: Alexandre Dumas</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">The Count of Monte-Cristo: Alexandre Dumas</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Twenty Thousand Leagues Under the Sea: Jules Verne</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Around The World In 80 Days: Jules Verne</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Madame Bovary: Gustave Flaubert</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Being and Nothingness: Jean-Paul Sartre</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Little Prince: Antoine de Saint Exupery</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">All Things Are Lights: Robert Shea</span></li><span data-dcnode-id="1394" instrument_node="">
</span></ul><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1377"><b data-dcnode-id="1378"><span data-dcnode-id="1391" instrument_node="">The most popular French daily is the&nbsp;</span><em data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Le Monde</span></em><span data-dcnode-id="1388" instrument_node="">. Other dailies that enjoy a high circulation in France are the&nbsp;</span><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Le Figaro, Liberation</span></em><span data-dcnode-id="1385" instrument_node="">&nbsp;(founded by Jean-Paul Sartre),&nbsp;</span><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">L’Humanite and Aujourd’hui</span></em><span data-dcnode-id="1382" instrument_node="">. English newspapers such as&nbsp;</span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The Washington Post, New York Times, and The European</span></em><span data-dcnode-id="1379" instrument_node="">&nbsp;are available in most cities. Radio France is the public radio service available and owns seven stations in the country. British, Canadian and American radio stations also operate in France.</span></b></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1372"><b data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Trivia:</span></b><span data-dcnode-id="1373" instrument_node="">&nbsp;Although written by American author, Robert Shea, ‘All Things Are Lights’ is believed to be one of the best fictional accounts of the fall of Montségur. The book describes Catharism, the forbidden religion of 13th century France. The novel builds around the legend of alchemical books and the chalice, popularly known as the ‘Holy Grail’, being whisked away before the Cathar Perfectii, singing, entered a fire to escape conversion. It also describes graphically, the intrigues, politics and l’amour courtois of the French courts in the early 13th century.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><h3 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">French Music and Cinema</span></h3><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Music in France originated from the rich tradition of troubadours. Renaissance France saw several court musicians such as François Couperin, Marc-Antoine Charpentier, and Jean-Baptiste Lully enjoy stature and wealth. Classical music flourished in France and maestros such as Jean-Philippe Rameau, Claude Debussy, Maurice Ravel, Pierre Boulez, and Francis Poulenc are known for their exceptional contribution to music. Opera thrived in France and operatic music became famous in the 19th century. The late 20th and the 21st centuries have seen an upsurge in pop, jazz, and rock culture. France hosts a number of pop and jazz festivals every year and these are very popular with the country’s youth.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The history of cinema in France is as old as the history of cinema itself. The Lumière brothers are credited with screening the earliest cinema at the Grand Cafe on Boulevard des Capucines in Paris. This event in December 1895 marks the advent of movie screenings in history. The launch of Cinémathèque Française (1936) and Les Cahiers du Cinéma are significant events that mark the evolution of French cinema.</span></p><span data-dcnode-id="1362" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">L’exception Culturelle allows for French cinema to be treated differently from the cinema of other countries. Such a cultural exception was negotiated by France as part of the GATT. France advocated the exclusion of culture from the WTO designated liberalized sectors. The country won a huge mandate in favor of such cultural exception in the UNESCO in 2005.</span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1355"><b data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Trivia:</span></b><span data-dcnode-id="1356" instrument_node="">&nbsp;The Le Festival de Cannes (The Cannes Film Festival) was scheduled to be launched in the year 1939. The outbreak of World War II halted the launch. The determined French patiently waited and launched the festival on September 20, 1946, marking the indomitable spirit of cultural victory over warfare. The festival is held in the city of Cannes which is located on map of France. The much-coveted Palme d’Or was first given away in 1955.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><h3 data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Trivia</span></h3><span data-dcnode-id="1351" instrument_node="">

</span><li data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">France is the most visited country in the world – an estimated 90 million tourists travel to France every year (2018).</span></li><span data-dcnode-id="1347" instrument_node="">
</span><li data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Almost one-fifth of France’s territory is not in Europe.</span></li><span data-dcnode-id="1344" instrument_node="">
</span><li data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">About one-fifth of France’s population resides near Paris.</span></li><span data-dcnode-id="1341" instrument_node="">
</span><li data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">The French have one of the highest life expectancies in the EU.</span></li><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">French toast and French fries did not originate in France.More Facts…</span></li><span data-dcnode-id="1335" instrument_node="">
