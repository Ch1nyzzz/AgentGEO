</span><li data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Denver Union Station, Denver</span></li><span data-dcnode-id="1045" instrument_node="">
</span></ul><span data-dcnode-id="1043" instrument_node="">
</span><h3 data-dcnode-id="1037"><b data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">83.&nbsp;</span></b><strong data-dcnode-id="1038"><b data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Louis Kahn</span></b></strong></h3><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Louis Kahn was one of the greatest architects of the 20th century who fused modernism with the dignity and weigh of ancient monuments. He was born in Parnu which is now Estonia. His family moved to Philadelphia where he lived for the rest of his life. Most of his architectural works are also found there.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">His initial interest was in medieval architecture. It wasn’t until he turned 50 that his interest in modern architecture developed. He delivered many successful, well-known projects in different parts of the world. Some of them are the following:</span></p><span data-dcnode-id="1030" instrument_node="">
</span><ul data-dcnode-id="1016"><span data-dcnode-id="1029" instrument_node="">
</span><li data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Salk Institute, Jolla, California</span></li><span data-dcnode-id="1026" instrument_node="">
</span><li data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">National Assembly Building, Dhaka, Bangladesh</span></li><span data-dcnode-id="1023" instrument_node="">
</span><li data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Kimbell Art Museum, Fort Worth, Texas</span></li><span data-dcnode-id="1020" instrument_node="">
</span><li data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Four Freedoms Park, New York (design discovered after&nbsp;his death)</span></li><span data-dcnode-id="1017" instrument_node="">
</span></ul><span data-dcnode-id="1015" instrument_node="">
</span><div data-dcnode-id="1004" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/fieldwire-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="1006" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">See also</span></span><span data-dcnode-id="1009" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">FieldWire Software Review (Based on Our Trial-Run)</span></span></div></a></div><h3 data-dcnode-id="998"><b data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">84.&nbsp;</span></b><strong data-dcnode-id="999"><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Philip Johnson</span></b></strong></h3><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><img alt="AT&amp;T New York Headquarters " class="aligncenter wp-image-508247 size-full" data-dcnode-id="996" height="1000" sizes="(max-width: 842px) 100vw, 842px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/ATT-Headquarters.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/ATT-Headquarters.jpg 842w, https://www.homestratosphere.com/wp-content/uploads/2019/07/ATT-Headquarters-269x320.jpg 269w" width="842"></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">&nbsp;</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="986"><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/node/30" rel="noopener" target="_self"><u data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Philip Johnson</span></u></a><span data-dcnode-id="987" instrument_node=""> was born in Ohio. He was a critic, author, museum director, historian, but not an architect before he designed his first building. With time, he became one of the most potent forces in modern architecture.</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">As a part of his primary degree thesis, he designed his residence in New Canaan which is now the world famous, Glass House. he was the one to organize the first visits of Mies van der Rohe and Le Corbusier’s first visits to the country. He commissioned Mies van der Rohe to design his apartment in New York. Later, he collaborated with Mies for the designing and construction of the Seagram Building in New York, which is the finest high-rise building of the continent. The most controversial project of his career was the AT&amp;T headquarters in New York with the “Chippendale” top.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">The list of his projects that are known to the world today include:</span></p><span data-dcnode-id="979" instrument_node="">
</span><ul data-dcnode-id="953"><span data-dcnode-id="978" instrument_node="">
</span><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">International Place, Boston</span></li><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Tycon Towers, Vienna</span></li><span data-dcnode-id="972" instrument_node="">
</span><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Momentum Place, Dallas</span></li><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">53</span><sup data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">rd</span></sup><span data-dcnode-id="965" instrument_node="">at Third, New York</span></li><span data-dcnode-id="963" instrument_node="">
</span><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">NCNB Center, Houston</span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Crystal Cathedral, California</span></li><span data-dcnode-id="957" instrument_node="">
</span><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Water Garden, Fort Worth</span></li><span data-dcnode-id="954" instrument_node="">
</span></ul><span data-dcnode-id="952" instrument_node="">
</span><h3 data-dcnode-id="946"><b data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">85.&nbsp;</span></b><strong data-dcnode-id="947"><b data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Oscar Niemeyer</span></b></strong></h3><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="940"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/biography-oscar-niemeyer" rel="noopener" target="_self"><u data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Oscar Niemeyer</span></u></a><span data-dcnode-id="941" instrument_node="">&nbsp;was born in Rio de Janeiro, Brazil and studied architecture. He became the most famous Brazilian architects during the 20th century.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Oscar Niemeyer designed the Brazilian Pavilion for the World’s Fair in New York in collaboration with Lucio Costa. He was involved in the design and construction of the Ministry of Education and Health, after which his architectural career blossomed.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">He collaborated with Le Corbusier to design the United Nations Headquarters in New York. His residence in Rio de Janeiro became a landmark itself. He also designed the Aeronautical Research Center. He worked on an office building in Europe for Renault and the Communist Party Headquarters in Paris.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Other works include Le Havre’s cultural center, the Mondadori Editorial Office in Milan and FATA Office Building in Turin. He was also involved in the design of Zoological Gardens, the Foreign Office, and the University of Constantine. Metropolitan Cathedral, Brasilia and Palacio do Itamaraty, Brasilia are also his works.</span></p><span data-dcnode-id="930" instrument_node="">
</span><h3 data-dcnode-id="924"><b data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">86.&nbsp;</span></b><strong data-dcnode-id="925"><b data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Eero Saarinen</span></b></strong></h3><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><img alt="TWA Flight Center at John F. Kennedy International Airport" class="aligncenter wp-image-508290 size-full" data-dcnode-id="922" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/TWA-Flight-Center.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/TWA-Flight-Center.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/TWA-Flight-Center-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/TWA-Flight-Center-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/TWA-Flight-Center-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="912"><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/architect-eero-saarinen-biography-buildings.html" rel="noopener" target="_self"><u data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Eero Saarinen</span></u></a><span data-dcnode-id="913" instrument_node="">&nbsp;was a Finnish architect, born to Eliel Saarinen who was a well-establish Finnish architect. His family moved to the United States when he was only 12 years old.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Being overweight and dyslexic, Eero Saarinen could not receive proper schooling. He was sent to Paris for one year at Académie de la Grande Chaumière after which he received his degree of Bachelor of Arts from Yale.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Initially, he worked with his father but after his father died, he opened his own firm. He focused on utilizing a newer technique for construction and creating architecture that had some sort of visual effect.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Other than this Saarinen Collection in furniture, he produced a number of architectural primarypieces like TWA Terminal at New York’s J.F Kennedy Airport AND Dulles International Airport in Washington D.C. He also designed the Jefferson National Expansion Memorial in St. Louis, Missouri and the Kresge Auditorium at MIT, Cambridge.</span></p><span data-dcnode-id="902" instrument_node="">
</span><h3 data-dcnode-id="896"><b data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">87.&nbsp;</span></b><strong data-dcnode-id="897"><b data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Kenzo Tange</span></b></strong></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="890"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architectuul.com/architect/kenzo-tange" rel="noopener" target="_self"><u data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Kenzo Tange</span></u></a><span data-dcnode-id="891" instrument_node="">&nbsp;was a Japanese architect who was one of the very important architects of the 20th century. He fused the Japanese styles with modernism and designed many prominent and important buildings in five continents.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Kenzo Tange participated in a competition in 1942 for the design of the Greater East Asian Co-Prosperity Sphere Memorial Hall. He was awarded the first prize, for the design that would be situated at the base of Mount Fuji. However, what he conceived was a fusion of plaza on Capitoline Hill in Rome and Shinto shrine architecture. Hence, the design was not realized.</span></p><span data-dcnode-id="886" instrument_node="">
</span><div data-dcnode-id="875" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/tradify-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="877" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">See also</span></span><span data-dcnode-id="880" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">A Helpful Tradify Software Review (Tested this Out Personally)</span></span></div></a></div><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The highlights of his architectural career include the following buildings:</span></p><span data-dcnode-id="872" instrument_node="">
</span><ul data-dcnode-id="861"><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Hiroshima Peace Centre, Hiroshima, Japan</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Yamanashi Press and Radio Centre, Kofu, Japan</span></li><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Tokyo Olympic Stadium, Japan</span></li><span data-dcnode-id="862" instrument_node="">
</span></ul><span data-dcnode-id="860" instrument_node="">
</span><h3 data-dcnode-id="854"><b data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">88.&nbsp;</span></b><strong data-dcnode-id="855"><b data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Ieoh Ming Pei (I.M Pei)</span></b></strong></h3><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="848"><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/359079/happy-96th-birthday-i-m-pei" rel="noopener" target="_self"><u data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Ieoh Ming Pei</span></u></a><span data-dcnode-id="849" instrument_node="">&nbsp;is a Chinese-American architect is said to be the greatest modernist architect. He won the Pritzker Price in 1963. The jury stated that he had given some of the most beautiful exterior forms and interior spaces to the century. He was born in China but grew up in Hong Kong.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">He had his own practice with the name I.M. Pei &amp; Associates. The most well-known work of his firm is the crystalline extension of the world-famous Louvre in Paris. Other works that are quite influential include Bank of China Tower in Hong Kong, JFK Presidential Library in Boston, – John Hancock Building, Boston, and the East Building of National Art Gallery Of Art in Washington D.C.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h3 data-dcnode-id="838"><b data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">89.&nbsp;</span></b><strong data-dcnode-id="839"><b data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Jorn Oberg Utzon</span></b></strong></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archiobjects.org/jorn-oberg-utzon-danish-architecture/" rel="noopener" target="_self"><u data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">John Oberg Utzon</span></u></a><span data-dcnode-id="833" instrument_node=""> took education from Sweden, Denmark, and Finland. He worked beside Alvar Aalto, who was his primary. He is considered as one of the most important architects that lived in the second half of the 20th century.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">He settled in Copenhagen where he had his own studio. He won the Pritzker prize for the most important project of his career- Sydney Opera House.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Other works that he well known for include:</span></p><span data-dcnode-id="825" instrument_node="">
</span><ul data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The Kingo Houses, Helsingor</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Bagsvaerd Church, Copenhagen</span></li><span data-dcnode-id="818" instrument_node="">
</span></ul><span data-dcnode-id="816" instrument_node="">
</span><h3 data-dcnode-id="810"><b data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">90.&nbsp;</span></b><strong data-dcnode-id="811"><b data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Sir James Stirling</span></b></strong></h3><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Sir James Stirling was born in Glasgow, Scotland. He is known for his controversial designs of multiunit houses and public buildings. He received education in architecture from Architecture, University of Liverpool. He started work during the early 1950s. He worked in partnership with James Gowan for 7 years and with Michael Wilford from 1971 onwards.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">The early works that he did included low-rise houses in New Brutalist style. The most important work that he did was the Engineering Department Building at the University of Leicester.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">He brought unconventional axes, brightly colored elements, and complex geometric shapes in his designs which can be seen in the New State Gallery that he worked on in Stuttgart, Germany. It is one of his finest achievements. Other works include Fogg Art Museum and Arthur M. Museum at Harvard University, and Clore Gallery at Tate Britain in London.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">He was awarded the Pritzker Architecture Prize in 1981. He was knighted shortly after he died.</span></p><span data-dcnode-id="797" instrument_node="">
</span><h3 data-dcnode-id="791"><b data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">91.&nbsp;</span></b><strong data-dcnode-id="792"><b data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Venturi, Rauch &amp; Scott-Brown</span></b></strong></h3><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><img alt="Freedom Plaza, Washington D.C " class="aligncenter size-full wp-image-508256" data-dcnode-id="789" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Freedom-Plaza.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Freedom-Plaza.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Freedom-Plaza-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Freedom-Plaza-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Freedom-Plaza-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="783"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tclf.org/pioneer/venturi-rausch-scott-brown" rel="noopener" target="_self"><span data-dcnode-id="786" instrument_node="">Venturi, Rauch, and Scott-Brown</span></a><span data-dcnode-id="784" instrument_node="">&nbsp;is an architectural firm based in Philadelphia which was established by postmodernist architects- Robert Venturi, Denise Scott Brown and John Rauch.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">These architects established their firm with a philosophy of social planning, environmental responsibility, and contextual design. The firm is involved in urban planning, residences, museums, decorative arts, and academic planning.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">The major works that the trio of architects has successfully pulled off include:</span></p><span data-dcnode-id="776" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="775" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Freedom Plaza in Washington, D.C.</span></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Washington Avenue district in Miami Beach, Florida</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The Strand in Galveston, Texas</span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Vanna Venturi House, Pennsylvania</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Guild House Retirement Home, Philadelphia</span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Allen Memorial Art Museum, Oberlin College</span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Museum of Contemporary Art, San Diego</span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span><h3 data-dcnode-id="746"><b data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">92.&nbsp;</span></b><strong data-dcnode-id="747"><b data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Frank O. Gehry </span></b></strong></h3><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="741"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/gallery/best-of-frank-gehry-slideshow" rel="noopener" target="_self"><span data-dcnode-id="744" instrument_node="">Frank O. Gehry</span></a><span data-dcnode-id="742" instrument_node="">&nbsp;was born in Canada. He took his education from the University of Southern California and the Harvard Graduate School of Design.</span></p><span data-dcnode-id="740" instrument_node="">
</span><div data-dcnode-id="729" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/interior-designer-business-software-options/" rel="dofollow" target="_self"><div data-dcnode-id="731" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">See also</span></span><span data-dcnode-id="734" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">12 Interior Designer Business Software Options</span></span></div></a></div><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">He started off with his career by working for Victor Gruen Associates and for Pereira and Luckman. He had a brief stint in Paris after which he returned to California and established his own firm. He won the Pritzker Prize in 1989.</span></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">The most prominent of works by Frank Gehry include the following:</span></p><span data-dcnode-id="723" instrument_node="">
</span><ul data-dcnode-id="703"><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">California Aerospace Museum, Los Angeles</span></li><span data-dcnode-id="719" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Walt Disney Concert Hall, Los Angeles</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Weisman Museum, Minneapolis</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Guggenheim Museum, Bilbao</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Nationale Nederlanden Building, Prague</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Experience Music Project, Seattle</span></li><span data-dcnode-id="704" instrument_node="">
</span></ul><span data-dcnode-id="702" instrument_node="">
</span><h3 data-dcnode-id="696"><b data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">93.&nbsp;</span></b><strong data-dcnode-id="697"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Fazlur Khan</span></b></strong></h3><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/fazlur-khan.htm" rel="noopener" target="_self"><u data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Fazlur Khan</span></u></a><span data-dcnode-id="691" instrument_node="">&nbsp;was a structural engineer and designer who was born in Bangladesh. He was involved in the construction of extremely tall skyscrapers.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">He developed many structural systems that lead to the revolution in the construction of high-rise towers. His works include the Willis Tower (110-story) and John Hancock Center (100-story). He is considered as the Father of tubular designs for skyscrapers.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">He was a partner in the firm of Skidmore, Owings &amp; Merrill which is the firm of American architects. Fazlur Khan also designed many of other important buildings which include the Haj Terminal, at Jeddah Airport Jeddah, Saudi Arabia. Other major contributions to 20th-century architecture include:</span></p><span data-dcnode-id="683" instrument_node="">
</span><ul data-dcnode-id="675"><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The United States Air Force Academy, Colorado</span></li><span data-dcnode-id="679" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">One Magnificent Mile, Chicago</span></li><span data-dcnode-id="676" instrument_node="">
</span></ul><span data-dcnode-id="674" instrument_node="">
</span><h3 data-dcnode-id="668"><b data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">94.&nbsp;</span></b><strong data-dcnode-id="669"><b data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Aldo Rossi</span></b></strong></h3><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><img alt="Carlo Felice Theatre by Aldo Rossi" class="aligncenter size-full wp-image-508249" data-dcnode-id="666" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Carlo-Felice-theater.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Carlo-Felice-theater.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Carlo-Felice-theater-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Carlo-Felice-theater-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Carlo-Felice-theater-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="659"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pritzkerprize.com/biography-aldo-rossi" rel="noopener" target="_self"><u data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Aldo Rossi</span></u></a><span data-dcnode-id="660" instrument_node=""> was a theorist, artist, author, teacher, and an architect. He was born in Italy but has left a mark of his influence all over the world. He received his Architecture degree from Milan Polytechnic University in 1959. He was an editor of Casabella, an architectural magazine for 9 years.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">He contributed greatly to the 20th-century modern architecture. The most popular of his works include Teatro del Mondo (a floating theatre), the Carlo Felice Theatre which is the National Opera House in Genoa and the Toronto Lighthouse Theatre on the banks of Lake Ontario in Canada. He also built the Gallaratese housing complex, Pocono Pines Houses in Pocono, new School of Architecture in the University of Miami, St Cataldo Cemetery in Modena, and Cirque de Soleil House in Berlin. He won the Pritzker Prize in 1990.</span></p><span data-dcnode-id="655" instrument_node="">
</span><h3 data-dcnode-id="649"><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">95.&nbsp;</span></b><strong data-dcnode-id="650"><b data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Richard Rogers</span></b></strong></h3><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><img alt="Lloyd's Building" class="aligncenter wp-image-508284 size-full" data-dcnode-id="647" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Lloyds-Building.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Lloyds-Building.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Lloyds-Building-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Lloyds-Building-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Lloyds-Building-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="640"><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/405538/happy-birthday-richard-rogers" rel="noopener" target="_self"><u data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Richard Rogers</span></u></a><span data-dcnode-id="641" instrument_node=""> is among the most innovative and distinctive architects of the 20th century. He is one of the leading architects during the British High-Tech movement. He was born in Florence. He attended the Architectural Association in London and then went to Yale University. He met Brit Norman Foster at Yale and after graduating, the two joined hands with Su Brumwell and Wendy Cheeseman and established Team 4 in 1963. Their collaboration as Team 4 just lasted for 4 years but during this time, they contributed greatly to British architecture. After Team 4 got disbanded, he collaborated with Renzo Piano which was very fruitful.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The most important of Richard Roger’s works include:</span></p><span data-dcnode-id="636" instrument_node="">
</span><ul data-dcnode-id="628"><span data-dcnode-id="635" instrument_node="">
</span><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Georges Pompidou Centre, Paris (with Renzo Piano)</span></li><span data-dcnode-id="632" instrument_node="">
</span><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Lloyds of London</span></li><span data-dcnode-id="629" instrument_node="">
</span></ul><span data-dcnode-id="627" instrument_node="">
</span><h3 data-dcnode-id="621"><b data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">96.&nbsp;</span></b><strong data-dcnode-id="622"><b data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Richard Meier</span></b></strong></h3><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><img alt="The Hague City Hall &amp; Central Library, Netherlands" class="aligncenter wp-image-508283 size-full" data-dcnode-id="619" height="693" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Hague.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Hague.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Hague-320x222.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Hague-870x603.jpg 870w" width="1000"></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Richard Meier&nbsp;is an American architect who focused on open space, pure geometry, and light. After working with Skidmore, Owings &amp; Merrill and Marcel Breuer during the beginning of his career, he formed in own firm.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">One of his early works on the Smith House received a lot of criticism since it was his first white building that he built upon Le Corbusier’s modernism. He received greater attention for the Douglas House.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">After the success of the series of private residences, he received numerous public commissions. These commissions included:</span></p><span data-dcnode-id="608" instrument_node="">
</span><ul data-dcnode-id="585"><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Atheneum New Harmony, Indiana</span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Museum of Decorative Arts Germany</span></li><span data-dcnode-id="601" instrument_node="">
</span><li data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">High Museum of Art in Atlanta, Georgia</span></li><span data-dcnode-id="598" instrument_node="">
</span><li data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">City Hall and Library in The Hague, Netherlands</span></li><span data-dcnode-id="595" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Museum of Contemporary Art in Barcelona, Spain.</span></li><span data-dcnode-id="592" instrument_node="">
</span><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Getty Center in Los Angeles</span></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Eli and Edythe Broad Art, north campus of the University of California, Los Angeles</span></li><span data-dcnode-id="586" instrument_node="">
</span></ul><span data-dcnode-id="584" instrument_node="">
</span><div data-dcnode-id="573" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/servicebox-review/" rel="dofollow" target="_self"><div data-dcnode-id="575" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">See also</span></span><span data-dcnode-id="578" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Our Detailed ServiceBox Software Review (for Field Service Businesses)</span></span></div></a></div><h3 data-dcnode-id="567"><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">97.&nbsp;</span></b><strong data-dcnode-id="568"><b data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Sir Norman Foster</span></b></strong></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><img alt="The Sainsbury Centre for Visual Arts" class="aligncenter wp-image-508286 size-full" data-dcnode-id="565" height="538" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Sainsbury-Centre-for-Visual-Arts.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Sainsbury-Centre-for-Visual-Arts.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Sainsbury-Centre-for-Visual-Arts-320x172.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Sainsbury-Centre-for-Visual-Arts-870x468.jpg 870w" width="1000"></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="558"><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/380738/happy-78th-birthday-sir-norman-foster" rel="noopener" target="_self"><u data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Sir Norman Foster</span></u></a><span data-dcnode-id="559" instrument_node=""> was born in Manchester. He is a British designer and an architect who is active in London. He has a diverse experience and his contribution to modern architecture is massive. He has designed offices, skyscrapers, stadiums, airports, galleries, parliament buildings, city primary plans, and a spaceport.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">He won a Pritzker Price in 1999. He is truly devoted to architectural technology and this devotion has helped him earn a place in the High-Tech movement. He has designed incredible buildings such as the headquarters of Willis Faber &amp; Dumas and the Sainsbury Centre for Visual Arts.</span></p><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Other major architectural works that Sir Norman Foster has worked on include:</span></p><span data-dcnode-id="551" instrument_node="">
</span><ul data-dcnode-id="540"><span data-dcnode-id="550" instrument_node="">
</span><li data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Hong Kong and Shanghai Bank Headquarters in Hong Kong</span></li><span data-dcnode-id="547" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Reichstag Dom in Berlin</span></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">30 St Mary Axe, London (the Gherkin)</span></li><span data-dcnode-id="541" instrument_node="">
</span></ul><span data-dcnode-id="539" instrument_node="">
</span><h3 data-dcnode-id="533"><b data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">98.&nbsp;</span></b><strong data-dcnode-id="534"><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Renzo Piano</span></b></strong></h3><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><img alt="The Whitney museum of American Art by Renzo Piano" class="aligncenter size-full wp-image-508289" data-dcnode-id="531" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Whitney-museum-of-American-Art.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Whitney-museum-of-American-Art.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Whitney-museum-of-American-Art-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Whitney-museum-of-American-Art-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Whitney-museum-of-American-Art-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/273403/happy-birthday-renzo-piano" rel="noopener" target="_self"><u data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Renzo Piano</span></u></a><span data-dcnode-id="525" instrument_node=""> is an Italian architect. He was born in Genoa. He belongs to a family of builders, but he chose design instead. He studied architecture in Milan. He worked for Louis Kahn and Richard Rogers, leading to Piano getting success quite early in his career. He participated in the competition for the design of Centre Pompidou and won. After completing work at the Centre Pompidou, he founded his own firm, Renzo Piano Building Workshop after spending 4 years with Peter Rice, an engineer.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">With Centre Pompidou, he received commissions for many museums. Some of his most prominent works include the Menil Collection and Whitney Museum of American Art. He has also designed and constructed Louis Kahn’s Kimbell Art Museum and the Carpenter Center at Harvard.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">He received the Pritzker Prize in 1998. He was praised by the jury for his projects including Kansai Airport Terminal in Osaka and Shard in London.</span></p><span data-dcnode-id="517" instrument_node="">
</span><h3 data-dcnode-id="511"><b data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">99.&nbsp;</span></b><strong data-dcnode-id="512"><b data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Albert Speer</span></b></strong></h3><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Albert Speer was born in Germany. He studied architecture at the Institute of Technology, Karlsruhe. He later went to Universities of Berlin and Munich.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">He believed that Hitler could restore the glory that the German Empire had lost during the Weimar Republic. He prepared creative stages for Nazi events. He designed many decorations, monuments and parade grounds at Nuremberg. These parade grounds were captured in a film Triumph of the Will by Leni Riefenstahl. He was selected by Hitler to construct Reich Chancellory in Berlin, the Party Palace in Nuremberg, and for the refurbishment of Berlin.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">He was imprisoned for 20 years for aiding Nazis war crimes and numerous crimes against humanity. He died in London in 1981.</span></p><span data-dcnode-id="501" instrument_node="">
</span><h3 data-dcnode-id="495"><b data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">100.&nbsp;</span></b><strong data-dcnode-id="496"><b data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Hassan Fathy </span></b></strong></h3><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="489"><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milleworld.com/hassan-fahty-architect-tradition/" rel="noopener" target="_self"><u data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Hassan Fathy</span></u></a><span data-dcnode-id="490" instrument_node="">&nbsp;was an Egyptian architect who brought a larger audience&nbsp;to the vernacular architecture of Egypt. He used local construction methods and materials to create architecture that was economically and socially suited to the people.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">One of the most important projects that Hassan Fathy worked on was the town of New Gourna. His work near the town of New Baris is also a notable contribution of Hassan Fathy to Egyptian architecture.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">&nbsp;</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Architecture has seen numerous variations and modifications since the 16th century up until the 20th century. Starting from extensive ornamentation and settling on simplistic, minimalist, and modern architecture, architecture has seen waves of transformations!</span></p><span data-dcnode-id="479" instrument_node="">
</span><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="474" instrument_node="">
</span></div><span data-dcnode-id="472" instrument_node="">
