</span><p data-dcnode-id="3372"><img alt="Dome of the Cathedral Santa Maria del Flore interior " class="aligncenter wp-image-508254 size-full" data-dcnode-id="3373" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Duomo-Santa-Maria-Del-Fiore-and-Campanile.-Florence.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Duomo-Santa-Maria-Del-Fiore-and-Campanile.-Florence.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Duomo-Santa-Maria-Del-Fiore-and-Campanile.-Florence-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Duomo-Santa-Maria-Del-Fiore-and-Campanile.-Florence-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Duomo-Santa-Maria-Del-Fiore-and-Campanile.-Florence-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3366"><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/artist/filippo-brunelleschi" rel="noopener" target="_self"><u data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Filippo Brunelleschi</span></u></a><span data-dcnode-id="3367" instrument_node=""> was born in Florence, Italy in 1377. He is one of the pioneers of Renaissance architecture in Italy. He was an architect and an engineer. He is known for his major work- the dome of the Cathedral Santa Maria del Flore in Florence. He was the first ever modern engineer. Being an innovative problem solver, he worked on the Cathedral of Santa Maria del Flore with the help of machines that he particularly invented for this project.</span></p><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">He has also worked for building and rebuilding many military fortifications in different cities like Rencine, Pisa, Rimini, Castellina, and Vicopisano. He is the creator of a hoist-like mechanism that helped in theatrical performances in Florentine churches. This mechanism assisted characters in flying around. He also secured the first modern patent for his invention of a riverboat.</span></p><span data-dcnode-id="3362" instrument_node="">
</span><p data-dcnode-id="3357"><span data-dcnode-id="3361" instrument_node="">He died in Florence, on 15</span><sup data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">th</span></sup><span data-dcnode-id="3358" instrument_node=""> April 1446. His tomb is situated in Duomo.</span></p><span data-dcnode-id="3356" instrument_node="">
</span><h3 data-dcnode-id="3350"><b data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">2.&nbsp;</span></b><strong data-dcnode-id="3351"><b data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">Michelozzo di Bartolomeo</span></b></strong></h3><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3347"><img alt="Santa Trinita Church" class="aligncenter wp-image-508273 size-full" data-dcnode-id="3348" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Trinita-church.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Trinita-church.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Trinita-church-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Trinita-church-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Trinita-church-300x200.jpg 300w" width="1000"></p><div class="code-block code-block-7" data-dcnode-id="3343" style="margin: 8px 0; clear: both;"><span data-dcnode-id="3346" instrument_node="">
</span><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3OQveak" rel="nofollow noreferrer"><img alt="" class="aligncenter size-full wp-image-784872" data-dcnode-id="3345" height="345" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2022/04/fb-like-banner2-apr30.jpg&amp;raw" width="800"></a></div><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3337"><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.artsandcollections.com/the-legacy-of-renaissance-architect-michelozzo/" rel="noopener" target="_self"><u data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Michelozzo di Bartolomeo</span></u></a><span data-dcnode-id="3338" instrument_node="">&nbsp;was born in 1396 in Florence. His father was a tailor. At the age of 14, Michelozzo became an apprentice of Ghiberti. He became known as the second greatest among sculptors in Europe. Most of his work has been done in collaboration with Donatello. He developed the concept of central palazzo configuration which still defines the visage of Italy even today.</span></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">One of the most renowned projects that Michelozzo did with Ghiberti was the North Doors of the Baptisery, depicting stories that were told in the New Testament. He also assisted Donatello in building the sacristy of the Santa Trinita which is situated in Florence. He also executed the tomb of Antipope John XXIII. Michelozzo was also an architect for Cosimo de’ Medici for about 40 years. One of his greatest works was the Palazzo Medici Ricarddi which took a good 40 years!</span></p><span data-dcnode-id="3333" instrument_node="">
</span><div data-dcnode-id="3322" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/gift-ideas-for-architects/" rel="dofollow" target="_self"><div data-dcnode-id="3324" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">See also</span></span><span data-dcnode-id="3327" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">33 Gift Ideas for Architects (Under $20, $50, $100 and $200)</span></span></div></a></div><h3 data-dcnode-id="3316"><b data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">3.&nbsp;</span></b><strong data-dcnode-id="3317"><b data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Leon Battista Alberti</span></b></strong></h3><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3313"><img alt="Santa Maria Novella" class="aligncenter wp-image-508271 size-full" data-dcnode-id="3314" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-Novella.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-Novella.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-Novella-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-Novella-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-Novella-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3312" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">Leon Battista Alberti was not just an architect but a writer, sculptor, and a painter. He wrote several books due which his contributions to architecture, sculpture, and painting can never be forgotten. These include De Statua (a book on sculpturing), Della Pittura (a book on Painting), and De Re Aedificatoria (a book on Architecture).</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">His first architectural contribution was for Sigismondo Malatesta of Rimini who wanted to covert the Gothic church of San Francesco in Rimini into a mausoleum for himself. Though it was never completed, it stands as a strong reminder of Roman Antiquity.</span></p><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">More prominent works in architecture include the Church of Santa Maria Novella in Florence and Palazzo Rucellai. The last two churches that Alberti worked on were Santa Sebastiano and Santa Andrea. Santa Sebastiano was never really completed while Santa Andrea was completed after Alberti’s death.</span></p><span data-dcnode-id="3303" instrument_node="">
</span><h3 data-dcnode-id="3297"><b data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">4.&nbsp;</span></b><strong data-dcnode-id="3298"><b data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Giuliano da Sangallo</span></b></strong></h3><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><img alt="Villa Medici in Rome, Italy" class="aligncenter wp-image-508293 size-full" data-dcnode-id="3295" height="656" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Medici.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Medici.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Medici-320x210.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Medici-870x571.jpg 870w" width="1000"></p><span data-dcnode-id="3293" instrument_node="">
</span><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Guiliano da Sangallo was one of the most eminent architects during the Italian Renaissance. He belonged to a family of architects of Florentine Renaissance. The most prominent members of his family were Antonio de Sangallo the Elder, Antonio de Sangallo the Younger, and Francesco da Sangallo.</span></p><span data-dcnode-id="3290" instrument_node="">
</span><ul data-dcnode-id="3267"><span data-dcnode-id="3289" instrument_node="">
</span><li data-dcnode-id="3284"><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.all-art.org/history230-7-1.html" rel="noopener" target="_self"><u data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">Guiliano da Sangallo</span></u></a><span data-dcnode-id="3285" instrument_node="">&nbsp;is known for his incredible contributions. His major works include the following: Medici Villa at Poggio a Caiano that he built for Lorenzo de’ Medici</span></li><span data-dcnode-id="3283" instrument_node="">
</span><li data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Santa Maria Delle Carceri, a church that was built at the miracle site where a painting of infant Jesus Christ and Virgin Mary was seen to come to life</span></li><span data-dcnode-id="3280" instrument_node="">
</span><li data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Reggia in Naples, a castle for the King of Naples, Ferrante of Aragon</span></li><span data-dcnode-id="3277" instrument_node="">
</span><li data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Church of San Gallo, a church for Augustinian monks</span></li><span data-dcnode-id="3274" instrument_node="">
</span><li data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">Palazzo Gondi, a palazzo for Guiliano Gondi, a wealthy Florentine merchant. Palazzo Gondi was not completed during the lifetime of Guiliano da Sangallo and is still subject to renovations</span></li><span data-dcnode-id="3271" instrument_node="">
</span><li data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Palazzo Della Rovere</span></li><span data-dcnode-id="3268" instrument_node="">
</span></ul><span data-dcnode-id="3266" instrument_node="">
</span><p data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">His final work was the assistance in the design and the construction of St. Peter’s Basilica, after which he died in 1516, in Florence.</span></p><span data-dcnode-id="3263" instrument_node="">
</span><h3 data-dcnode-id="3257"><b data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">5.&nbsp;</span></b><strong data-dcnode-id="3258"><b data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Donato Bramante</span></b></strong></h3><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3254"><img alt="Santa Maria presso San Satiro in Milan " class="aligncenter size-full wp-image-508272" data-dcnode-id="3255" height="692" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-presso-San-Satiro.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-presso-San-Satiro.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-presso-San-Satiro-320x221.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-presso-San-Satiro-870x602.jpg 870w" width="1000"></p><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3248"><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/donato-bramante-biography-works.html" rel="noopener" target="_self"><u data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">Donato Bramante</span></u></a><span data-dcnode-id="3249" instrument_node="">&nbsp;was one of the most popular architects during the High Renaissance. Donato Bramante’s first major work in architecture was the church in Milan, Santa Maria presso San Satiro. He transformed a simple rectangular building into a marvel that still stands proudly today. Tempietto di San Pietro in Montorio is a well-known Christian structure that was built by Donato Bramante in Rome. Tempietto di San Pietro is the perfect embodiment of the philosophies that prevailed during the Renaissance. It was the first time when Doric order was fully used.</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">He died in April 1514, after working in numerous other commissions.</span></p><span data-dcnode-id="3244" instrument_node="">
</span><h3 data-dcnode-id="3238"><b data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">6.&nbsp;</span></b><strong data-dcnode-id="3239"><b data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Michelangelo</span></b></strong></h3><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3235"><img alt="Castel Sant'angelo by Michelangelo " class="aligncenter wp-image-508250 size-full" data-dcnode-id="3236" height="563" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Castel-Sant-Angelo.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Castel-Sant-Angelo.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Castel-Sant-Angelo-320x180.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Castel-Sant-Angelo-870x490.jpg 870w" width="1000"></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3233" instrument_node="">Michelangelo was an </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.khanacademy.org/humanities/renaissance-reformation/high-ren-florence-rome/michelangelo/a/michelangelo-sculptor-painter-architect-and-poet" rel="noopener" target="_self"><u data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">architect, painter, sculptor, and a poet</span></u></a><span data-dcnode-id="3229" instrument_node="">. He was called ‘il divino’ which means the divine one in English. A lot of his creations appear to be super-human. He created primarypieces like </span><em data-dcnode-id="3226"><i data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">David</span></i></em><span data-dcnode-id="3225" instrument_node="">, the sculpture that looked really like living flesh and blood, the painted ceiling of the Sistine Chapel in Rome, and numerous examples in the field of architecture.</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">He built several structures that one can’t stop staring at. The marvelous contributions in architecture include the facade on the Papel Chapel in Castel Sant’Angelo in Rome, the Laurentian Library in Saint Lorenzo in Florence, Palazzo Farnese in Rome, the dome of St Peter’s Basilica Vatican, and Porta Pia in Rome.</span></p><span data-dcnode-id="3220" instrument_node="">
</span><div data-dcnode-id="3209" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/top-home-builders-in-portland/" rel="dofollow" target="_self"><div data-dcnode-id="3211" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">See also</span></span><span data-dcnode-id="3214" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">5 Top Custom Home Builders in Portland, Oregon</span></span></div></a></div><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">We can see great works by Michelangelo even today in Rome and understand the life of that era in a better way, all thanks to the genius Michelangelo Buonarroti.</span></p><span data-dcnode-id="3206" instrument_node="">
</span><h3 data-dcnode-id="3200"><b data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">7.&nbsp;</span></b><strong data-dcnode-id="3201"><b data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">Baldassare Peruzzi</span></b></strong></h3><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3197"><img alt="Villa Farnesina" class="aligncenter wp-image-508292 size-full" data-dcnode-id="3198" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Farnesina.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Farnesina.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Farnesina-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Farnesina-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Farnesina-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3196" instrument_node="">
</span><p data-dcnode-id="3191"><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.italyonthisday.com/2019/03/baldassare-peruzzi-Italian-Renaissance-architect-painter-Rome-Villa-Farnesina.html" rel="noopener" target="_self"><u data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Baldessare Peruzzi</span></u></a><span data-dcnode-id="3192" instrument_node="">&nbsp;was an architect and a painter who was born in Siena and died in Rome. He contributed to the architecture of his hometown and Rome. He was one of the architects to have worked on Saint Peter’s Basilica where he also worked on two outstanding buildings: the Palazzo Massimo alle Colonne and the Villa Farnesina. Villa Farnesina was originally known as the Villa Chigi.</span></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3185"><span data-dcnode-id="3189" instrument_node="">Other architectural works by Peruzzi include a mosaic </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/what-is-drop-ceiling/" rel="noopener" target="_self"><span data-dcnode-id="3188" instrument_node="">ceiling</span></a><span data-dcnode-id="3186" instrument_node=""> in Santa Croce, which is a church in Gerusalemme, paintings in churches of San Pietro and Sant’Onofrio in Montorio and Santa Maria in Siena.</span></p><span data-dcnode-id="3184" instrument_node="">
</span><h3 data-dcnode-id="3178"><b data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">8.&nbsp;</span></b><strong data-dcnode-id="3179"><b data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Raphael</span></b></strong></h3><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><img alt="Santa Maria del Popolo" class="aligncenter wp-image-508268 size-full" data-dcnode-id="3176" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-del-Popolo-chapel.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-del-Popolo-chapel.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-del-Popolo-chapel-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-del-Popolo-chapel-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-del-Popolo-chapel-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3169"><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/artist/raphael" rel="noopener" target="_self"><u data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Raphael</span></u></a><span data-dcnode-id="3170" instrument_node="">&nbsp;was a painter and an architect in the Italian Renaissance. He was best known for Madonnas that were a series of paintings. Raphael contributions were not limited to paintings. He contributed a great deal to architecture as well.</span></p><span data-dcnode-id="3168" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">In 1508, Raphael moved from Italy to Rome, where he started painting in the Vatican Stanze under the patronage of Pope Julius II. By 1514, he had become famous because of his work at the Vatican. He hired a crew which allowed him to focus more on other projects. In 1517, he began his work in architecture. He was hired by the Pope as the chief architect after Donato Bramante died. He designed the chapel in Sant’ Eligo degil Oredici. He also worked on Santa Maria del Popolo chapel in Rome, and on an area in Saint Peter’s new Basilica. He also designed palaces.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Even centuries after his death, Raphael is still considered as one of the leading artistic figures of Italian High Renaissance classicism.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><h3 data-dcnode-id="3156"><b data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">9.&nbsp;</span></b><strong data-dcnode-id="3157"><b data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Michele Sanmicheli</span></b></strong></h3><span data-dcnode-id="3155" instrument_node="">
</span><p data-dcnode-id="3153"><img alt="Palazzo Roncalli" class="aligncenter wp-image-508265 size-full" data-dcnode-id="3154" height="750" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Roncalli.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Roncalli.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Roncalli-320x240.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Roncalli-870x653.jpg 870w" width="1000"></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3147"><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.histouring.com/en/historical-figure/michele-sanmicheli/" rel="noopener" target="_self"><u data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Michele Sanmicheli</span></u></a><span data-dcnode-id="3148" instrument_node="">&nbsp;is known to be one of the greatest mannerist architects and town planners in Italy. You can find his works in numerous cities like Venice, Bergamo, Verona, and Brescia. He also worked in Crete, Corfu, Zadar, and Sibenik where he studied Greek architecture. He worked on numerous religious structures and palaces.</span></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">He contributed in the building of the Corner Mocenigo palace in Venice. His works include Palazzo Roncale in Rovigo, Palazzo Grimani di San Luca in Venice, and Palazzo Honorji in Verona. One of his primarypieces included the triumphal arch for the entry of the Bona Sforza in Padua.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">He died in 1559 due to a violent fever. He has been buried in the church of San Tomaso Cantuariense.</span></p><span data-dcnode-id="3140" instrument_node="">
</span><h3 data-dcnode-id="3134"><b data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">10.&nbsp;</span></b><strong data-dcnode-id="3135"><b data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Jacopo Sansovino</span></b></strong></h3><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3131"><img alt="St. Mark's Basilica" class="aligncenter size-full wp-image-508277" data-dcnode-id="3132" height="688" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/St.-Marks-Basilica.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Marks-Basilica.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Marks-Basilica-320x220.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Marks-Basilica-870x599.jpg 870w" width="1000"></p><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3125"><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/sculpture/jacopo-sansovino.htm" rel="noopener" target="_self"><u data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Jacopo Sansovino</span></u></a><span data-dcnode-id="3126" instrument_node=""> introduced the art style High Renaissance in Venice. He began his career in Florence as a sculpture but was welcomed warmly in Venice by Lorenzo Lotto, a painter, illustrator, and a draughtsman. He declared Jacopo Sansovino as second to Michelangelo.</span></p><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3123" instrument_node="">He was appointed as the proto of the Procurators of San Marco which was the most influential architectural office in the country. He reworked the Piazza di San Marco to its current shape. He also started designing the Republic’s new Mint (Zecca) which came to become one of the biggest in all of Europe. Sansovino also designed the Libreria Vecchia, the city </span><a class="wpil_keyword_link" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/home-library-ideas/" title="library"><span data-dcnode-id="3122" instrument_node="">library</span></a><span data-dcnode-id="3120" instrument_node="">. Libreria Vecchia on the Piazzetta San Marco is considered a primarypiece of Renaissance architecture.</span></p><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Sansovino also designed many private commissions, hospitals, palaces, and churches.</span></p><span data-dcnode-id="3115" instrument_node="">
</span><div data-dcnode-id="3104" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/servicebox-review/" rel="dofollow" target="_self"><div data-dcnode-id="3106" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">See also</span></span><span data-dcnode-id="3109" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="3107"><span data-dcnode-id="3108" instrument_node="">Our Detailed ServiceBox Software Review (for Field Service Businesses)</span></span></div></a></div><h3 data-dcnode-id="3098"><b data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">11.&nbsp;</span></b><strong data-dcnode-id="3099"><b data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">Mimar Sinan</span></b></strong></h3><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3095"><img alt="Sehzade Mosque " class="aligncenter size-full wp-image-508274" data-dcnode-id="3096" height="580" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Sehzade-Mosque.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Sehzade-Mosque.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sehzade-Mosque-320x186.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sehzade-Mosque-870x505.jpg 870w" width="1000"></p><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3089"><a data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.turkishculture.org/architecture-403.htm" rel="noopener" target="_self"><u data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Mimar Sinan</span></u></a><span data-dcnode-id="3090" instrument_node=""> was an Ottoman architect who is considered as the greatest in the Ottoman Empire. He had become a valued military engineer. Because of his reputation, he was appointed as the head of the office of the royal architects. Upon the orders of Sultan Suleyman, Mimar Sinan built the legendary Sehzade Mosque after Sultan Suleyman’s favorite son Mehmet died. It is considered as a primarypiece even today.</span></p><span data-dcnode-id="3088" instrument_node="">
</span><p data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Mimar Sinan also bagged the credits of building the Suleymaniye Kulliye, Sokollu Mehmet Pasha Mosque Complex, and the Selimiye Complex.</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">The above mentioned projects are not the only projects Mimar Sinan worked on. They are just a few from a long list. These majestic structures continue to be a major tourist attraction of Istanbul today.</span></p><span data-dcnode-id="3082" instrument_node="">
</span><h3 data-dcnode-id="3075"><b data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">12.&nbsp;</span></b><strong data-dcnode-id="3077"><b data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Giulio Romano</span></b></strong><img alt="Palazzo del Te" class="aligncenter wp-image-508287 size-full" data-dcnode-id="3076" height="668" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-Farnese.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-Farnese.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-Farnese-320x214.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-Farnese-870x581.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-Farnese-300x200.jpg 300w" width="1000"></h3><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3069"><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/old-primarys/giulio-romano.htm" rel="noopener" target="_self"><u data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Giulio Romano</span></u></a><span data-dcnode-id="3070" instrument_node="">&nbsp;was an Italian designer, painter, and an architect who started his career from the workshop of Raphael. In 1525, Giulio set himself free from the influence of Raphael and became the initiator of a new style of Mannerism that showcased a liberated attitude to the classical influence.</span></p><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Giulio became the chief architect and painter of the court of the Gonzagas in Mantua. The latter part of his career was devoted to architecture. He was involved in the rebuilding of the Ducal Palace in Mantua, he renovated the cathedral and also designed the Church if San Benedetto. He planned decorations for Verona Cathedral’s choir and apse. As a primary of mural paintings, he is best known for his work on trompe l’oeil frescoes in the Palazzo del Te.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><h3 data-dcnode-id="3059"><b data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">13.&nbsp;</span></b><strong data-dcnode-id="3060"><b data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">Giacomo Barozzi Vignola</span></b></strong></h3><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3056"><img alt="Palazzo Ducale at night" class="aligncenter wp-image-508264 size-full" data-dcnode-id="3057" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Ducal.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Ducal.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Ducal-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Ducal-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Palazzo-Ducal-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3049"><span data-dcnode-id="3054" instrument_node="">Giacomo Barozzi Vignola was an Italian architect who lived when the Renaissance era was at its peak and through the period when </span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveabout.com/giacomo-da-vignola-renaissance-architect-177877" rel="noopener" target="_self"><u data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Renaissance architecture was transitioning into Baroque style</span></u></a><span data-dcnode-id="3050" instrument_node="">.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">He was appointed by Pope Julius III as a papal architect in Rome. He succeeded Michelangelo after his death as an architect for work on St. Peter’s. Villa Caprarola, situated near Viterbo is one of his finest productions. He did this work for Cardinal Alessandro Farbese. He also worked on the Villa Giulia for the Pope Julius III in Rome. He was the interior designer of the Church of the Gesu in Rome.</span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3040"><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infoplease.com/encyclopedia/arts/bios/architecture/vignola-giacomo-da" rel="noopener" target="_self"><u data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Vignola</span></u></a><span data-dcnode-id="3041" instrument_node="">&nbsp;has credits for many architectural primarypieces that still overwhelm the cities today. He is not just known for his architectural contributions but he has also written a treatise, ‘Five Orders of Architecture’ which was translated in many languages.</span></p><span data-dcnode-id="3039" instrument_node="">
</span><h3 data-dcnode-id="3033"><b data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">14.&nbsp;</span></b><strong data-dcnode-id="3034"><b data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Andrea Palladio</span></b></strong></h3><span data-dcnode-id="3032" instrument_node="">
</span><p data-dcnode-id="3030"><img alt="Villa Cornaro" class="aligncenter wp-image-508291 size-full" data-dcnode-id="3031" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Cornaro.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Cornaro.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Cornaro-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Cornaro-870x579.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Villa-Cornaro-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3024"><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/andrea-palladio.htm" rel="noopener" target="_self"><u data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">Andrea Palladio</span></u></a><span data-dcnode-id="3025" instrument_node="">&nbsp;is one of the most prominent figures in architecture. His legacy was carried forward far beyond his lifetime. He was considered to be one of the most influential figures in the entire history of Western architecture. His designs were based on Greek architecture.</span></p><span data-dcnode-id="3023" instrument_node="">
</span><p data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">He is best known for his contributions to architecture, including the villas in Veneto, palaces in Vicenza, and churches in Venice, that are all located within the Venetian Republic. His greatest works include Villa Cornaro, the Church of San Giorgio Maggiore, Villa Capra, and the Church of II Redentore. Many of the buildings by Palladio in Veneto and Vicenza have been protected by UNESCO as World Heritage Sites.</span></p><span data-dcnode-id="3020" instrument_node="">
</span><h3 data-dcnode-id="3014"><b data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">15.&nbsp;</span></b><strong data-dcnode-id="3015"><b data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Philibert de l’Orme</span></b></strong></h3><span data-dcnode-id="3013" instrument_node="">
</span><p data-dcnode-id="3008"><a data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/philibert-de-l-orme" rel="noopener" target="_self"><u data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Philibert de l’Orme</span></u></a><span data-dcnode-id="3009" instrument_node="">&nbsp;was born in Lyons. He was the son of Primary Mason. He went to Rome in 1533 for the excavation and measurement of ancient Roman buildings. He returned to his hometown in 1536 where he built the house for Antoine Bullioud.</span></p><span data-dcnode-id="3007" instrument_node="">
</span><div data-dcnode-id="2996" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/top-builders-bellingham/" rel="dofollow" target="_self"><div data-dcnode-id="2998" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">See also</span></span><span data-dcnode-id="3001" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">5 Top Home Builders in Bellingham, Washington</span></span></div></a></div><p data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">In 1540, he was called to Rome by Du Bellay who had become his friend during the earlier visit to Rome. He wanted l’Orme to build his château at St-Maur-lès-Foussés which was the first ever building to show how measures and proportions should be observed in architecture. It was also the first ever building in France that had a horseshoe staircase and columnar order in all elements of decoration.</span></p><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">He was appointed as a superintendent of buildings by Henry II. He built the Tomb of Francis at St-Denis for Henry II. He was commissioned by the mistress of Henry II, Diane de Poitiers, to build her château at Anet. However, he was dismissed by Henry II’s wife, Catherine de Médicis after he died. He was summoned again in 1563 to enlarge St.Maur for her son and also to build the new palace for her, the Palace of Tuileries in Paris. By the time l’Orme died, only the central pavilion’s lower section was complete.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><h3 data-dcnode-id="2984"><b data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">16.&nbsp;</span></b><strong data-dcnode-id="2985"><b data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">Giacomo Della Porta</span></b></strong></h3><span data-dcnode-id="2983" instrument_node="">
</span><p data-dcnode-id="2981"><img alt="Papal Basilica of St Peter, Italy " class="aligncenter size-full wp-image-508266" data-dcnode-id="2982" height="750" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Papal-Basilica-of-St-Peter.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Papal-Basilica-of-St-Peter.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Papal-Basilica-of-St-Peter-320x240.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Papal-Basilica-of-St-Peter-870x653.jpg 870w" width="1000"></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2975"><a data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolvy.com/page/Giacomo-della-Porta" rel="noopener" target="_self"><u data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">Giacomo Della Porta</span></u></a><span data-dcnode-id="2976" instrument_node=""> was an Italian architect and sculptor who was born in a family of sculptors in Geneva. He was greatly influenced by and also collaborated with Michelangelo and Giacomo Barozzi da Vignola. Having two of the greatest architects as primarys, he became a very important architect in the history of the Roman Renaissance.</span></p><span data-dcnode-id="2974" instrument_node="">
</span><p data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">He worked on a number of important buildings like St.Peter’s Basilica. He continued the plans of Michelangelo to rebuild the Capitoline&nbsp;Hill or Campidoglio’s open spaces where he was involved in the completion of the façade and steps of&nbsp;Palazzo Senatorio, and the&nbsp;Cordonata&nbsp;up to the Piazza del Campidoglio. After Vignola died, he continued the construction of II Gesu which was the mother&nbsp;church of Jesuit. He also constructed the Palazzo Albertoni Spinola, creating the entrance gallery and also the entrance hall of the Palace. He was the in-charge of construction that was going on in St. Peter’s Basilica. He also completed the dome of Michelangelo with Domenico Fontana.</span></p><span data-dcnode-id="2971" instrument_node="">
</span><h3 data-dcnode-id="2965"><b data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">17.&nbsp;</span></b><strong data-dcnode-id="2966"><b data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">Vincenzo Scamozzi</span></b></strong></h3><span data-dcnode-id="2964" instrument_node="">
</span><p data-dcnode-id="2962"><img alt="The Villa La Rotonda in Italy" class="aligncenter size-full wp-image-508288" data-dcnode-id="2963" height="664" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-La-Rotonda.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-La-Rotonda.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-La-Rotonda-320x212.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-La-Rotonda-870x578.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Villa-La-Rotonda-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2961" instrument_node="">
</span><p data-dcnode-id="2956"><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.villevicentine.it/en/artists/vincenzo-scamozzi/" rel="noopener" target="_self"><u data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">Vicenzo Scamozzi</span></u></a><span data-dcnode-id="2957" instrument_node=""> was a Venetian writer on architecture and a practicing architect. He was the most important architects that lived between Andrea Palladio and Baldassarre Longhena. He wrote very highly of Andrea Palladio in his literature. When Andrea Palladio died, Vincenzo Scamozzi was appointed to complete many of Palladio’s unfinished projects.</span></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">The primarypieces that were constructed by Vincenzo Scamozzi include the Rocca Oisana in Lonigo, completion of Villa Rotonda that has the world-famous scene of the Teatro Olimpico with roads of Thebes, Villa Molin in Mandriola, Villa Nani Mocenigo in Canda, Villa Duodo in Monselice, the theatre of Sabbioneta, and his design of the Salzburg Cathedral.</span></p><span data-dcnode-id="2952" instrument_node="">
</span><h2 data-dcnode-id="2948"><strong data-dcnode-id="2949"><b data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Baroque Architects</span></b></strong></h2><span data-dcnode-id="2947" instrument_node="">
</span><p data-dcnode-id="2942"><span data-dcnode-id="2946" instrument_node="">They are the architects that worked during the Baroque era (late 16</span><sup data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">th</span></sup><span data-dcnode-id="2943" instrument_node=""> century). They used the Roman Renaissance architecture to form a new theatrical and rhetorical fashion, quite often used to express the triumph of the Catholic Church. The architectural commissions that were the most popular during this era were churches and palaces.</span></p><span data-dcnode-id="2941" instrument_node="">
</span><h3 data-dcnode-id="2935"><b data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">18.&nbsp;</span></b><strong data-dcnode-id="2936"><b data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Carlo Maderno</span></b></strong></h3><span data-dcnode-id="2934" instrument_node="">
</span><p data-dcnode-id="2932"><img alt="Santa Maria della Vittoria in Rome" class="aligncenter wp-image-508270 size-full" data-dcnode-id="2933" height="686" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Vittoria.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Vittoria.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Vittoria-320x220.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Vittoria-870x597.jpg 870w" width="1000"></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2926"><a data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.papalartifacts.com/portfolio-item/carlo-maderno/" rel="noopener" target="_self"><u data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Carlo Maderno</span></u></a><span data-dcnode-id="2927" instrument_node=""> was a Swiss-Italian architect who is remembered as the father of Baroque architecture. He went to Rome in 1588 to work for his uncle Domenico Fontana who was an architect for Pope Sixtus V. It wasn’t until 1596 that he got to work on the first important commission- the church of Santa Susanna. It was completed in 1603 and was called the first Baroque facade.</span></p><span data-dcnode-id="2925" instrument_node="">
</span><p data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Maderno’s work on Santa Susanna caught the attention of Pope Paul V and he appointed Maderno as the chief architect for the completion of St. Peter’s. He was forced to modify the original plan of Michelangelo and was made to provide designs for an extended nave having a palatial façade.</span></p><span data-dcnode-id="2922" instrument_node="">
</span><div data-dcnode-id="2911" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/servicetitan-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="2913" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">See also</span></span><span data-dcnode-id="2916" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2914"><span data-dcnode-id="2915" instrument_node="">Our Detailed ServiceTitan Software Review (for Field Businesses)</span></span></div></a></div><p data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Most of his work was usually the remodeling of already developed structures. One of his primarypieces was the Santa Maria Della Vittoria which took 12 years to get completed.</span></p><span data-dcnode-id="2908" instrument_node="">
</span><h3 data-dcnode-id="2902"><b data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">19.&nbsp;</span></b><strong data-dcnode-id="2903"><b data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Inigo Jones</span></b></strong></h3><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><img alt="The Queen's House in London during the day " class="aligncenter size-full wp-image-508285" data-dcnode-id="2900" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Queens-House.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Queens-House.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Queens-House-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Queens-House-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Queens-House-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2893"><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/inigo-jones-biography-architecture.html" rel="noopener" target="_self"><u data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">Inigo Jones</span></u></a><span data-dcnode-id="2894" instrument_node=""> was born in London. He caught the attention of the royals by designed exquisite masques which were a kind of a ball that was enjoyed by the royalty. He provided the settings and costumes for these fancy dances.</span></p><span data-dcnode-id="2892" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">In 1598, a patron paid for Inigo’s trip to Italy. He visited Florence, Rome, and Venice where all emerging architects went. It was a time when Italy was in the last stages of the Renaissance. Inigo Jones discovered the great works of Andrea Palladio. He bought his drawings, visited his buildings, and also studied the ruins of Roman temples. When he returned to London 5 years later, he brought with him the Palladian architecture to England.</span></p><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2884"><span data-dcnode-id="2888" instrument_node="">He continued designing masques upon his return to England. He also used it as a means to indulge with the nobility. He completed his first architectural commission in 1608 for the Earl of Salisbury. Later in 1611, he was appointed the surveyor to Prince Henry’s works, and later to King James I after the death of Prince Henry. During his career, he designed </span><a class="wpil_keyword_link" data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/tag/mansion-floor-plans/" title="mansions"><span data-dcnode-id="2887" instrument_node="">mansions</span></a><span data-dcnode-id="2885" instrument_node="">, churches, and gardens. Two of the most prominent architectural works of Inigo Jones are The Queen’s House in Greenwich and the Banqueting House, Whitehall. During the brief career that he had, he became a great Welsh architect and introduced a revival of classical architecture in London singlehandedly.</span></p><span data-dcnode-id="2883" instrument_node="">
</span><h3 data-dcnode-id="2877"><b data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">20.&nbsp;</span></b><strong data-dcnode-id="2878"><b data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Pietro da Cortona</span></b></strong></h3><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><img alt="Santa Maria Della Pace Church in Italy" class="aligncenter wp-image-508269 size-full" data-dcnode-id="2875" height="835" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Pace-church.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Pace-church.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Pace-church-320x267.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Santa-Maria-della-Pace-church-870x726.jpg 870w" width="1000"></p><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2868"><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/pietro-da-cortona" rel="noopener" target="_self"><u data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">Pietro da Cortona</span></u></a><span data-dcnode-id="2869" instrument_node=""> was an Italian architect who was a true representative of high Baroque architecture. His real name was Pietro Berrettini but he is known for his birthplace that was Cortona (a small town in Tuscany).</span></p><span data-dcnode-id="2867" instrument_node="">
</span><p data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">When he went to Rome in his teens, he was influenced by the ancient Roman sculptures and the paintings of Annibale. He was encouraged by Cassiano dal Pozzo to study ancient Roman sculptures and architecture.</span></p><span data-dcnode-id="2864" instrument_node="">
</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Most of his career includes some majestic pieces of paintings but some part of his career is dedicated to architecture as well. Among his architectural works, the façade for the church Santa Maria Della Pace in Rome is the most prominent one. It spreads on one side, across the front of a cloister, and an adjacent church on the other side.</span></p><span data-dcnode-id="2861" instrument_node="">
</span><h3 data-dcnode-id="2855"><b data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">21.&nbsp;</span></b><strong data-dcnode-id="2856"><b data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">Bernini</span></b></strong></h3><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2852"><img alt="St Peter's basilica in Vatican, Rome" class="aligncenter size-full wp-image-508276" data-dcnode-id="2853" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/St-Peters-basilica-in-Vatican.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/St-Peters-basilica-in-Vatican.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St-Peters-basilica-in-Vatican-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St-Peters-basilica-in-Vatican-870x579.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St-Peters-basilica-in-Vatican-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2851" instrument_node="">
</span><p data-dcnode-id="2846"><a data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist-bernini-giovanni-lorenzo-life-and-legacy.htm" rel="noopener" target="_self"><u data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Bernini</span></u></a><span data-dcnode-id="2847" instrument_node=""> was the son of popular sculptor Pietro Bernini. He was a great sculptor from an age as early as 8 years. Bernini moved to Rome in 1606 when his father was invited by Pope to work on the construction of Basilica Santa Maria Maggiore.</span></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">Cardinal Maffeo Barberini was impressed by Bernini’s skill and he reported about it to his uncle, Pope Paul V and this lead to Bernini’s appointment on a role that was earlier held by Michelangelo. Most of Bernini’s career was dedicated to sculpting. However, he tried to transform Rome through an urban planning project which was quite costly. He recreated the ‘glory of Rome’ that began in the 15th century. He focused greatly on architecture that included the piazza that lead to St. Peter’s.</span></p><span data-dcnode-id="2842" instrument_node="">
</span><h3 data-dcnode-id="2836"><b data-dcnode-id="2840"><span data-dcnode-id="2841" instrument_node="">22.&nbsp;</span></b><strong data-dcnode-id="2837"><b data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Francois Mansart</span></b></strong></h3><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><img alt="Val-de-Grâce in Paris" class="aligncenter wp-image-508263 size-full" data-dcnode-id="2834" height="693" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Notre-dame-du-Val-de-Grace-church.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Notre-dame-du-Val-de-Grace-church.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Notre-dame-du-Val-de-Grace-church-320x222.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Notre-dame-du-Val-de-Grace-church-870x603.jpg 870w" width="1000"></p><span data-dcnode-id="2832" instrument_node="">
</span><p data-dcnode-id="2827"><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/francois-mansart" rel="noopener" target="_self"><u data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Francois Mansart</span></u></a><span data-dcnode-id="2828" instrument_node="">&nbsp;was a French architect who was born in Paris. He was the student of Salomon de Brosse, who was an architect of the Luxembourg Palace.</span></p><span data-dcnode-id="2826" instrument_node="">
</span><div data-dcnode-id="2815" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/tradify-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="2817" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">See also</span></span><span data-dcnode-id="2820" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">A Helpful Tradify Software Review (Tested this Out Personally)</span></span></div></a></div><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">He received numerous commissions. Some of the work he did during his early period includes the châteaux of Berny and Balleroy. He rebuilt the château of Blois. He also worked on many townhouses in Paris. Most notable ones include Hôtel de la Vrillière and the Hôtel Le Jars. Château of Maisons is the best known of all his domestic works. It was in 1645 that he was commissioned to design the convent and the church of the Val-de-Grâce in Paris.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">He was asked to submit his designs for the eastern wing of the Great Court of the Louvre which he never did due to his obsession of modifying his designs. Due to this reason, he was ignored by the time he died in 1666.</span></p><span data-dcnode-id="2809" instrument_node="">
</span><h3 data-dcnode-id="2803"><b data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">23.&nbsp;</span></b><strong data-dcnode-id="2804"><b data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">Francesco Borromini</span></b></strong></h3><span data-dcnode-id="2802" instrument_node="">
</span><p data-dcnode-id="2800"><img alt="Church of St. Charles in Rome" class="aligncenter wp-image-508279 size-full" data-dcnode-id="2801" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/St..-Charles-Church.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/St..-Charles-Church.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St..-Charles-Church-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St..-Charles-Church-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St..-Charles-Church-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2799" instrument_node="">
</span><p data-dcnode-id="2794"><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/francesco-borromini.htm" rel="noopener" target="_self"><u data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">Francesco Borromini</span></u></a><span data-dcnode-id="2795" instrument_node="">&nbsp;is one of the most important contributors to the Roman baroque art in the 17th century. Most of his work combined geometric rationalism and an imaginative sense of drama.</span></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">The most famous architectural designs that he worked on include the following:</span></p><span data-dcnode-id="2790" instrument_node="">
</span><ul data-dcnode-id="2755"><span data-dcnode-id="2789" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">Cappella del St Sacramento</span></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">Palazzo Spada</span></li><span data-dcnode-id="2783" instrument_node="">
</span><li data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Oratory of St Phillip Neri</span></li><span data-dcnode-id="2780" instrument_node="">
</span><li data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Church of St Carlo alle Quattro Fontane</span></li><span data-dcnode-id="2777" instrument_node="">
</span><li data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Church of St Ivo alla Sapienza (1640-60) Dome and Facade</span></li><span data-dcnode-id="2774" instrument_node="">
</span><li data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">Maria dei Sette Dolori</span></li><span data-dcnode-id="2771" instrument_node="">
</span><li data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Palazzo Pamphili</span></li><span data-dcnode-id="2768" instrument_node="">
</span><li data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">St Giovani in Laterano</span></li><span data-dcnode-id="2765" instrument_node="">
</span><li data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Villa Falconieri, Frascati</span></li><span data-dcnode-id="2762" instrument_node="">
</span><li data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Church of St Agnese in Agone</span></li><span data-dcnode-id="2759" instrument_node="">
</span><li data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">Church of St Giovanni dei Fiorentini</span></li><span data-dcnode-id="2756" instrument_node="">
</span></ul><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">His life was a rather difficult one. Due to this reserved personality, he had to struggle for commissions. He committed suicide in 1667.</span></p><span data-dcnode-id="2751" instrument_node="">
</span><h3 data-dcnode-id="2745"><b data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">24.&nbsp;</span></b><strong data-dcnode-id="2746"><b data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">Alonso Cano</span></b></strong></h3><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><img alt="Granada Cathedral in Andalusia, Spain" class="aligncenter wp-image-508252 size-full" data-dcnode-id="2743" height="659" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Cathedral-of-Granada-in-Andalusia.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Cathedral-of-Granada-in-Andalusia.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Cathedral-of-Granada-in-Andalusia-320x211.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Cathedral-of-Granada-in-Andalusia-870x573.jpg 870w" width="1000"></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2736"><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/sculpture/alonso-cano.htm" rel="noopener" target="_self"><u data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Alonso Cano</span></u></a><span data-dcnode-id="2737" instrument_node=""> was taught fundamentals of architecture by his father from a very early age. He has credits to numerous primarypieces in painting and sculpting. Most of his paintings and sculptures from early times did not survive. However, Saint John the Evangelist’s Vision of Jerusalem, one of his paintings are displayed in the Wallace Collection, London.</span></p><span data-dcnode-id="2735" instrument_node="">
</span><p data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">His greatest contribution to architecture is Granada Cathedral. He was appointed as Canon at Granada Cathedral. He was the chief architect for the cathedral. a position that he secured till his death. He designed many decorations and features of the western façade of Granada Cathedral which is the basis of his reputation as the greatest architects of Spain, to date.</span></p><span data-dcnode-id="2732" instrument_node="">
</span><h3 data-dcnode-id="2726"><b data-dcnode-id="2730"><span data-dcnode-id="2731" instrument_node="">25.&nbsp;</span></b><strong data-dcnode-id="2727"><b data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Louis Le Vau</span></b></strong></h3><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><img alt="Castle of Versailles by Louis Le Vau" class="aligncenter size-full wp-image-508251" data-dcnode-id="2724" height="346" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Castle-of-Versailles.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Castle-of-Versailles.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Castle-of-Versailles-320x111.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Castle-of-Versailles-870x301.jpg 870w" width="1000"></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2717"><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/louis-le-vau.htm" rel="noopener" target="_self"><u data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Louis Le Vau</span></u></a><span data-dcnode-id="2718" instrument_node=""> was a son of a stonemason, Le Vau. He was trained by his father. Louis Le Vau was influenced by the Italian architecture, including the works of Pietro da Cortona and Bernini.</span></p><span data-dcnode-id="2716" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">He began his architectural career with Hotel de Bautru and Hotel Lambart. He also designed many townhouses on the Ile Saint-Louis. He designed a colonnade and the new wings for the Lourve. He was appointed the first architect to King Louis XIV. E started working on his architectural primarypiece, Chateau- Vaux-le-Vicomte.</span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">He was the main structural architect, along with Jules Hardouin Mansart, for phase one of remodeling of Palace of Versailles. He renovated the Marble Court. He also remodeled the garden façade of the palace, which was initially a hunting lodge.</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">The famous buildings that were designed by Louis Le Vau are:</span></p><span data-dcnode-id="2707" instrument_node="">
</span><ul data-dcnode-id="2672"><span data-dcnode-id="2706" instrument_node="">
</span><li data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Hotel de Bautru</span></li><span data-dcnode-id="2703" instrument_node="">
</span><li data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Hotel Lambert, Ile Saint-Louis</span></li><span data-dcnode-id="2700" instrument_node="">
</span><li data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Chateau of Livry, Raincy</span></li><span data-dcnode-id="2697" instrument_node="">
</span><li data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Church of Saint-Sulpice</span></li><span data-dcnode-id="2694" instrument_node="">
</span><li data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">Palais du Louvre</span></li><span data-dcnode-id="2691" instrument_node="">
</span><li data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Hotel de Fonteney</span></li><span data-dcnode-id="2688" instrument_node="">
</span><li data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Chateau of Vaux-le-Vicomte</span></li><span data-dcnode-id="2685" instrument_node="">
</span><li data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Vincennes Castle</span></li><span data-dcnode-id="2682" instrument_node="">
</span><li data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">College des Quatre-Nations (now Institut de France)</span></li><span data-dcnode-id="2679" instrument_node="">
</span><li data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">Palais du Louvre (Galerie d’Apollon)</span></li><span data-dcnode-id="2676" instrument_node="">
</span><li data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Palace of Versailles (stage)</span></li><span data-dcnode-id="2673" instrument_node="">
</span></ul><span data-dcnode-id="2671" instrument_node="">
</span><div data-dcnode-id="2660" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/the-best-house-cleaning-business-software-options/" rel="dofollow" target="_self"><div data-dcnode-id="2662" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">See also</span></span><span data-dcnode-id="2665" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">9 of The Best House Cleaning Business Software Programs for Managing the Business</span></span></div></a></div><h3 data-dcnode-id="2654"><b data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">26.&nbsp;</span></b><strong data-dcnode-id="2655"><b data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Andre Le Notre</span></b></strong></h3><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2651"><img alt="Gardens of the Versailles in Palace Versailles " class="aligncenter size-full wp-image-508258" data-dcnode-id="2652" height="662" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Gardens-of-the-Versailles.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Gardens-of-the-Versailles.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Gardens-of-the-Versailles-320x212.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Gardens-of-the-Versailles-870x576.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Gardens-of-the-Versailles-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2650" instrument_node="">
</span><p data-dcnode-id="2645"><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.chateauversailles.fr/discover/history/great-characters/andre-notre" rel="noopener" target="_self"><u data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Andre Le Notre</span></u></a><span data-dcnode-id="2646" instrument_node="">&nbsp;is known as the king of gardeners. He was the gardener to the King. He is credited to have given the “French garden” its noble reputation.</span></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2643" instrument_node="">He started his career as a gardener to the uncle of Louis XIV, Gastin – the duke if Orleans. He was born in a family who had been a gardener to the king ever since the 16</span><sup data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">th</span></sup><span data-dcnode-id="2640" instrument_node="">&nbsp;century. He took his training in the garden at Les Tuileries where he was made the head gardener. He also worked for the Fouquet at Vaux-le-Vicomte. He became the Controller of General Buildings in 1657, to the King. After 5 years, he was working for Grande Conde, on the gardens of Chantilly. He was then summoned by King Louis XIV, for the garden of Palace of Versailles, where he was the chief gardener.</span></p><span data-dcnode-id="2638" instrument_node="">
</span><h3 data-dcnode-id="2632"><b data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">27.&nbsp;</span></b><strong data-dcnode-id="2633"><b data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Sir Christopher Wren</span></b></strong></h3><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2629"><img alt="Sheldonian Theatre &amp; Clarendon, England" class="aligncenter size-full wp-image-508275" data-dcnode-id="2630" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Sheldonian-Theatre-Clarendon.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Sheldonian-Theatre-Clarendon.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sheldonian-Theatre-Clarendon-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sheldonian-Theatre-Clarendon-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sheldonian-Theatre-Clarendon-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2628" instrument_node="">
