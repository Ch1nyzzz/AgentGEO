</span><p data-dcnode-id="2623"><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/sir-christopher-wren" rel="noopener" target="_self"><u data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Sir Christopher Wren</span></u></a><span data-dcnode-id="2624" instrument_node=""> was not inclined to architecture until the age of 30. He was trained in mathematics and science and had the ability to solve scientific problems. This provided him with the technical training that was needed to undertake complex projects in the field of architecture.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">The first venture in architecture was Sheldonian Theatre at Oxford. He visited France once, during which he studied baroque architecture and French Renaissance. The influence of his learning can be seen in his work.</span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">He was appointed by King Charles after the Great Fire in 1666 to reconstruct the city. His plan, which was a typical 17th-century&nbsp;city plan, was not accepted. He was then made responsible to replace 87 parish churches that were demolished in the Great Fire. From 1670 to 1686, 51 new churches were designed, which came to be known as City Churches.</span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Some of his most renowned projects include the Trinity College Library at Cambridge, design of St. Paul’s Cathedral, the Royal Hospital at Chelsea, Hampton Court Palace (designed for King William III and Queen Mary), and last but definitely not the least important, the Royal Naval Hospital at Greenwich.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><h3 data-dcnode-id="2607"><b data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">28.&nbsp;</span></b><strong data-dcnode-id="2608"><b data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Jules Hardouin Mansart</span></b></strong></h3><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2604"><img alt="French Pavilion at the Petit Trianon, Palace of Versailles" class="aligncenter size-full wp-image-508257" data-dcnode-id="2605" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/French-Pavilion-at-the-Petit-Trianon.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/French-Pavilion-at-the-Petit-Trianon.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/French-Pavilion-at-the-Petit-Trianon-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/French-Pavilion-at-the-Petit-Trianon-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/French-Pavilion-at-the-Petit-Trianon-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2603" instrument_node="">
</span><p data-dcnode-id="2598"><a data-dcnode-id="2600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/jules-hardouin-mansart.htm" rel="noopener" target="_self"><u data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Jules Hardouin Mansart</span></u></a><span data-dcnode-id="2599" instrument_node=""> was the grand-nephew of Francois Mansart. He succeeded Louis Le Vau as the Royal Architect to King Louis XIV. His skill and passion can be seen in the grandiose facades of the Palace of Versailles. He also designed the French Windows for Grand Trianon at Versailles. He also has the credit of designing the majestic dome of Les Invalides. He was appointed as the Premier Architect and Superintendent of Buildings.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Other contributions in architecture include:</span></p><span data-dcnode-id="2594" instrument_node="">
</span><ul data-dcnode-id="2586"><span data-dcnode-id="2593" instrument_node="">
</span><li data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">Chateau of Marly</span></li><span data-dcnode-id="2590" instrument_node="">
</span><li data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">The Place Vendome in Paris</span></li><span data-dcnode-id="2587" instrument_node="">
</span></ul><span data-dcnode-id="2585" instrument_node="">
</span><h3 data-dcnode-id="2579"><b data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">29.&nbsp;</span></b><strong data-dcnode-id="2580"><b data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">Johann Bernhard Fischer von Erlach</span></b></strong></h3><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2576"><img alt=" Imperial Palace, Austria Europe " class="aligncenter size-full wp-image-508262" data-dcnode-id="2577" height="542" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/mperial-Palace.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/mperial-Palace.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/mperial-Palace-320x173.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/mperial-Palace-870x472.jpg 870w" width="1000"></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2570"><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.habsburger.net/en/chapter/stately-architecture-johann-bernhard-fischer-von-erlach" rel="noopener" target="_self"><u data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Johann Bernhard Fischer</span></u></a><span data-dcnode-id="2571" instrument_node=""> von Erlach is one of the most important architects that lived during the Baroque era. He was an Austrian architect, who initially made sculptures. The first architectural works that he did was a triumphal arch that was more than 30 meters high, marking the coronation of Roman King.</span></p><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Other architectural primarypieces include the Palais Clam-Gallas, Prague, Town Palace of Prince Eugen of Savoy in Vienna, designs for Schönbrunn Palace, Vienna, and Hofbibliothek, Vienna.</span></p><span data-dcnode-id="2566" instrument_node="">
</span><h3 data-dcnode-id="2560"><b data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">30.&nbsp;</span></b><strong data-dcnode-id="2561"><b data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Jakob Prandtauer</span></b></strong></h3><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><img alt="Melk Abbey Monastery " class="aligncenter wp-image-508261 size-full" data-dcnode-id="2558" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Melk-Abbey.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Melk-Abbey.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Melk-Abbey-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Melk-Abbey-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Melk-Abbey-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2551"><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/jakob-prandtauer" rel="noopener" target="_self"><u data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Jakob Prandtauer</span></u></a><span data-dcnode-id="2552" instrument_node=""> was an Austrian architect who studied architecture and sculpture. He learned the trade with his father but the age of 19, he was working as a sculptor in a city in lower Austria, Sankt Polten. By the time he turned 40, he was Baumeister (primary builder) who was working on numerous projects.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">He worked for the monastery of Melk on the Danube and completely rebuilt the church and all the buildings of the huge complex which is one of the largest monastic complexes. He also built the pilgrimage church on Sonntagberg and the monastery at Garsten. Moreover, he reconstructed the monastery of Sankt Florian, situated near Linz. He worked on numerous other projects as well.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><div data-dcnode-id="2536" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/fieldwire-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="2538" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">See also</span></span><span data-dcnode-id="2541" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">FieldWire Software Review (Based on Our Trial-Run)</span></span></div></a></div><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">Jakob Prandtauer was not just an architect but he was in charge of all aspects of construction, including the interior and exterior designs. He died while many of his projects were still unfinished.</span></p><span data-dcnode-id="2533" instrument_node="">
</span><h3 data-dcnode-id="2527"><b data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">31.&nbsp;</span></b><strong data-dcnode-id="2528"><b data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Johann Dientzenhofer</span></b></strong></h3><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2521"><a data-dcnode-id="2523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archinform.net/arch/649.htm" rel="noopener" target="_self"><u data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Johann Dientzenhofer</span></u></a><span data-dcnode-id="2522" instrument_node="">&nbsp;was an architect and a builder in Germany. He belonged to a famous family of German architects, Dientzenhofer. They were leading builders during the German and Bohemian baroque era.</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">The major architectural works of Johann Dientzenhofer among many others include:</span></p><span data-dcnode-id="2517" instrument_node="">
</span><ul data-dcnode-id="2506"><span data-dcnode-id="2516" instrument_node="">
</span><li data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Fulda Cathedral for the Abbot of Fulda</span></li><span data-dcnode-id="2513" instrument_node="">
</span><li data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Parish church of St. Wenzel, Litzendorf</span></li><span data-dcnode-id="2510" instrument_node="">
</span><li data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Facade of Neumünster church, Würzburg</span></li><span data-dcnode-id="2507" instrument_node="">
</span></ul><span data-dcnode-id="2505" instrument_node="">
</span><h3 data-dcnode-id="2499"><b data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">32.&nbsp;</span></b><strong data-dcnode-id="2500"><b data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Andreas Schluter</span></b></strong></h3><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2493"><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/andreas-schluter" rel="noopener" target="_self"><u data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Andreas Schluter</span></u></a><span data-dcnode-id="2494" instrument_node="">&nbsp;was a German architect and a sculptor. He produced many sculptures like the statues for the Long Bridge leading to the palace in Berlin that earned him a great deal of reputation.</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">His architectural works are also known for the sculptural approach that is evident in most of his work. He was appointed for the elector, as the surveyor of general works. He was made in-charge of all buildings. He worked on a new palace that was situated on the island of Spree, which is known as the Berlin Schloss. He not only designed the structure but also took care of the decorative details. The parts of Berlin Schloss that were designed by Andreas Schluter include the Great Portal, the Great Court, and the main rooms situated on the first floor. He also executed works as the pulpit in the Alte Post, St. Mary’s Church, and the Münzturm which was a water tower attached to the Mint.</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">It was due to the discovery of structural problems in many of his works that his reputation saw a downfall, and he was in disgrace in the court. He was then permitted to work as a sculptor only. He left for St. Petersburg in 1714 and died shortly after his arrival there.</span></p><span data-dcnode-id="2486" instrument_node="">
</span><h3 data-dcnode-id="2480"><b data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">33.&nbsp;</span></b><strong data-dcnode-id="2481"><b data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">Sir John Vanbrugh</span></b></strong></h3><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2474"><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/sir-john-vanbrugh" rel="noopener" target="_self"><u data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Sir John Vanbrugh</span></u></a><span data-dcnode-id="2475" instrument_node="">&nbsp;was an English dramatist and an architect who was born in London. He studied arts in France, but he soon resigned the commission of a foot regiment that he had obtained. He was imprisoned as a spy for 2 years during his travel in France. During his imprisonment, he wrote a comedy play that was highly successful. He wrote many other plays and adaptations as well.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Sir John Vanbrugh’s interest in architecture was sudden. He began designing the Castle Howard in Yorkshire, for the Earl of Carlisle. He was secured as the comptroller of royal works by the Earl the same year he started working on the castle. He was also commissioned to work on the Greenwich Hospital. He also built the Blenheim Palace that the Duke of Marlborough intended to give as a royal gift to the one who won the war against Louis XIV.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">He was a popular member of society and lived a rather happy life. He died early, leaving behind two sons.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h3 data-dcnode-id="2461"><b data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">34.&nbsp;</span></b><strong data-dcnode-id="2462"><b data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">Pedro de Ribera</span></b></strong></h3><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2452"><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolvy.com/page/Pedro-de-Ribera" rel="noopener" target="_self"><u data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Pedro de Ribera</span></u></a><span data-dcnode-id="2456" instrument_node="">&nbsp;worked exclusively in Madrid. He is one of the most prominent architects during the late baroque period. He contributed the architecture of the city through palaces, city </span><a class="wpil_keyword_link" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/types-of-bridges/" title="bridges"><span data-dcnode-id="2455" instrument_node="">bridges</span></a><span data-dcnode-id="2453" instrument_node="">, churches, monumental fountains, and many public buildings, a lot of which can still be seen today.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><div data-dcnode-id="2440" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/interior-designer-business-software-options/" rel="dofollow" target="_self"><div data-dcnode-id="2442" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">See also</span></span><span data-dcnode-id="2445" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">12 Interior Designer Business Software Options</span></span></div></a></div><p data-dcnode-id="2435"><span data-dcnode-id="2439" instrument_node="">He was the Lieutenant Major Primary of Works and sources of the city Madrid. He succeeded Theodore Ardemans after his death. His position made his reputation strong that allowed him to take up an important position at court. Many of the works of Ribera were either destroyed or modified in the 18</span><sup data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">th</span></sup><span data-dcnode-id="2436" instrument_node="">&nbsp;century when his architectural style was attacked by the art scholars who were very influential, like Antonio Ponz.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Some of his architectural contributions are:</span></p><span data-dcnode-id="2431" instrument_node="">
</span><ul data-dcnode-id="2417"><span data-dcnode-id="2430" instrument_node="">
</span><li data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Torrecilla Palace</span></li><span data-dcnode-id="2427" instrument_node="">
</span><li data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Church of San Cayetano</span></li><span data-dcnode-id="2424" instrument_node="">
</span><li data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Ucles Monastery</span></li><span data-dcnode-id="2421" instrument_node="">
</span><li data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">Fuente de la Fama</span></li><span data-dcnode-id="2418" instrument_node="">
</span></ul><span data-dcnode-id="2416" instrument_node="">
</span><h3 data-dcnode-id="2410"><b data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">35.&nbsp;</span></b><strong data-dcnode-id="2411"><b data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Johann Balthasar Neumann</span></b></strong></h3><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2404"><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/balthasar-neumann.htm" rel="noopener" target="_self"><u data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Johann Balthasar Neumann</span></u></a><span data-dcnode-id="2405" instrument_node="">&nbsp;was born in Bohemia which is the Czech Republic today. He studied engineering after becoming an apprentice at a metal foundry. He later joined the imperial Austrian army. While in the army, he worked on his technical skills in the field of fortress architecture.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">After working under the supervision of Joseph Greising and Andreas Muller, he was appointed as the chief architect-engineer in Wurzburg by the Schonborn family. He became the chief architect of the new Residenz project (the initial architectural planning had already been done before Neumann took up). The Wurzburg Palace was completed in almost a quarter of a century. The Wurzburg Residence Frescoes is one of the greatest palaces that were built in the Baroque era.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">He completed numerous other projects while he was working at the Wurzburg Palace. They include:</span></p><span data-dcnode-id="2397" instrument_node="">
</span><ul data-dcnode-id="2377"><span data-dcnode-id="2396" instrument_node="">
</span><li data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Walifahrtskirche ,Twin-towered Pilgrim’s Church at Grossweinstein</span></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">Marble staircase for the Augustusburg Palace at Bruhl</span></li><span data-dcnode-id="2390" instrument_node="">
</span><li data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Single-towered Trinity Church at Gaiback</span></li><span data-dcnode-id="2387" instrument_node="">
</span><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Benedictine Abbey at Neresheim</span></li><span data-dcnode-id="2384" instrument_node="">
</span><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Baden-Wurttemberg</span></li><span data-dcnode-id="2381" instrument_node="">
</span><li data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">the Basilica of the Fourteen Holy Helpers (Vierzehnheiligen)</span></li><span data-dcnode-id="2378" instrument_node="">
</span></ul><span data-dcnode-id="2376" instrument_node="">
</span><h3 data-dcnode-id="2370"><b data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">36.&nbsp;</span></b><strong data-dcnode-id="2371"><b data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Joseph Emanuel Fischer von Erlach</span></b></strong></h3><span data-dcnode-id="2369" instrument_node="">
</span><p data-dcnode-id="2364"><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aeiou.at/aeiou.encyclop.f/f453277.htm" rel="noopener" target="_self"><u data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Joseph Emanuel Fischer von Erlach</span></u></a><span data-dcnode-id="2365" instrument_node=""> was an Austrian architect, inventor, mine engineer, and a mechanical engineer. He was the son of the famous architect, Johann Bernhard Fischer von Erlach. He worked on some of the unfinished projects that his father left behind. These projects included the Imperial Library, the Karlskirche, and Winter Riding School of the Hofburg. He also worked on many castles, palaces, and churches, built some amazing monuments, tombs, gardens, and altars.</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Later in his life, he left the field of architecture and devoted himself to the technical talent that he had. Many of the earlier buildings attributed to him come from other architects.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><h3 data-dcnode-id="2354"><b data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">37.&nbsp;</span></b><strong data-dcnode-id="2355"><b data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">Hans Georg Wenzeslaus von Knobelsdorff</span></b></strong></h3><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><img alt="Potsdam Sanssouci Palace " class="aligncenter wp-image-508267 size-full" data-dcnode-id="2352" height="666" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Sanssouci-Palace-in-Potsdam.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Sanssouci-Palace-in-Potsdam.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sanssouci-Palace-in-Potsdam-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sanssouci-Palace-in-Potsdam-870x579.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Sanssouci-Palace-in-Potsdam-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2345"><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geni.com/people/Hans-Georg-Wenzeslaus-von-Knobelsdorff/6000000039677806085" rel="noopener" target="_self"><u data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Hans Georg Wenzeslaus von Knobelsdorff</span></u></a><span data-dcnode-id="2346" instrument_node="">&nbsp;was not an architect from the beginning. He was first a soldier, and then he became a portrait and landscape painter. He then became a theatre director, land designer, followed by an interior decorator, eventually landing in the field o architecture.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">He was an architect in the service of Frederick II of Prussia. He was on friendly terms with the Crown Prince, who later became the King. In about two decades that he worked for the King, he supplied a number of designs for townhouses, castles, parks, colonnades, etc. his designs influenced the appearance of the cities of Potsdam and Berlin greatly. Today, most of his work has either been destroyed or has been changed. Only some of it could be restored or preserved.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Some of his major contributions to Baroque architecture are:</span></p><span data-dcnode-id="2338" instrument_node="">
</span><ul data-dcnode-id="2330"><span data-dcnode-id="2337" instrument_node="">
</span><li data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Potsdam City Palace</span></li><span data-dcnode-id="2334" instrument_node="">
</span><li data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Sanssouci Palace Potsdam</span></li><span data-dcnode-id="2331" instrument_node="">
</span></ul><span data-dcnode-id="2329" instrument_node="">
</span><h3 data-dcnode-id="2323"><b data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">38.&nbsp;</span></b><strong data-dcnode-id="2324"><b data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Bartolomeo Rastrelli</span></b></strong></h3><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2321" instrument_node="">The last of the great Baroque architects to work in St. Petersburg was </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.saint-petersburg.com/famous-people/francesco-rastrelli/" rel="noopener" target="_self"><u data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Francesco Bartolomeo Rastrelli</span></u></a><span data-dcnode-id="2317" instrument_node="">. He was born in Paris and received professional education from his father who was a sculptor and a trained architect. The first work Rastrelli did was building a home in St.Petersburg for the Prince Dimitrie Cantemir who was the former ruler of Moldova.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><div data-dcnode-id="2304" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wordpress-themes-for-real-estate-websites/" rel="dofollow" target="_self"><div data-dcnode-id="2306" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">See also</span></span><span data-dcnode-id="2309" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">30 Best Wordpress Themes for Real Estate Websites</span></span></div></a></div><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">His career took off in the 1730s after he started working for Ernst Johann von Biron. The first project he did for the new patron was building a riding school on Nevsky Prospekt which was later demolished. Rastrelli built two palaces in Duchy of Courtland and Semigallia for von Biron who became Duke in 1737, at Rundale and Jelgava. He became the Chief Architect of the Imperial Court as well.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Ratrelli designed the Summer Palace in St. Petersburg after Von Viron fell from power in 1740. In 1744, Empress Elizabeth ordered Rastrelli to build the Mariinsky Palace as her summer residence in Kiev. He started the reconstruction and redecoration work on the Grand Palace in Peterhof the next year which officially opened in 1755.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">The next project Rastrelli worked on was the Smolny Convent. He also worked on the construction of Catherine Palace which is one of the most extravagant palace sin the world. Winter Palace is yet another primarypiece that Rastrelli worked on.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><h2 data-dcnode-id="2291"><strong data-dcnode-id="2292"><b data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Neoclassical Architects</span></b></strong></h2><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2284"><span data-dcnode-id="2289" instrument_node="">Neoclassical architects became the pioneers of neoclassical architecture. </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/neoclassical-architects-in-germany.html" rel="noopener" target="_self"><u data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Neoclassical architecture</span></u></a><span data-dcnode-id="2285" instrument_node="">&nbsp;was a reaction against Baroque and Rococo architecture’s excessive ornamentation. It recreated the order and style of Ancient Rome and Greece. It originated in France.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><h3 data-dcnode-id="2277"><b data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">39.&nbsp;</span></b><strong data-dcnode-id="2278"><b data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">Jacques Germain Soufflot</span></b></strong></h3><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2271"><a data-dcnode-id="2273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/soufflot-jacques-germain.htm" rel="noopener" target="_self"><u data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Jacques Germain Soufflot</span></u></a><span data-dcnode-id="2272" instrument_node=""> was one of the earliest representatives of the neoclassical style in architecture. He was born in Irancy. He attended the French Academy in Rome. Jacques Germain Soufflot studied classical monuments, Renaissance architecture by architects like Andrea Palladio, and also studied baroque architecture examples like St. Peter’s Basilica.</span></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">Soufflot is best known for his primarypiece, The Pantheon in Paris. It is the best example of 18th-century&nbsp;architecture. It was designed as a church that was dedicated to Sainte Genevieve. It was later converted into a memorial. His designs were simple, severe, spacious, and complete that can be seen in his works like the Loge des Changes and extension of Hotel Dieu.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Jacques Germain Soufflot died in Paris in 1780.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><h3 data-dcnode-id="2258"><b data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">40.&nbsp;</span></b><strong data-dcnode-id="2259"><b data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Carl Gotthard Langhans</span></b></strong></h3><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255"><img alt="Brandenburg Gate in Berlin " class="aligncenter size-full wp-image-508246" data-dcnode-id="2256" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Brandenburg-Gate-in-Berlin.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Brandenburg-Gate-in-Berlin.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Brandenburg-Gate-in-Berlin-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Brandenburg-Gate-in-Berlin-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Brandenburg-Gate-in-Berlin-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2249"><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/carl-gotthard-langhans.htm" rel="noopener" target="_self"><u data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Carl Gotthard Langhans</span></u></a><span data-dcnode-id="2250" instrument_node="">&nbsp;was a great architect who moved away from the Baroque architecture and adapted the new neoclassical architecture. He was the first to introduce the &nbsp;Greek structural designs to Berlin. He also continued to use designs from Baroque and Renaissance architecture in his work.</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">He was appointed the Chief Building Officer in Breslau. He designed the buildings in Palladian style that were inspired by the work of by Wilhelm Freiherr von Erdmannsdorff at Schloss Worlitz.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">He was called to Berlin by Friedrich Wilhelm II of Prussia in 1788 to design new buildings for the capital. He created the monuments of neoclassical art – Brandenburg Gate, which is the most famous of Langhans’ works. He also designed many theatres including the Royal Theatre in Gendarmenmarkt, Berlin and German National Theatre in Potsdam. Moreover, he was the architect to design the Anatomical Theatre for the Berlin Veterinary School. He also contributed in the construction of Charlottenburg Palace in Berlin, for Friedrich II.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node="">He is still one of the major contributors to architecture in the 18</span><sup data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">th</span></sup><span data-dcnode-id="2238" instrument_node="">&nbsp;century.</span></p><span data-dcnode-id="2236" instrument_node="">
</span><h3 data-dcnode-id="2227"><b data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">41.&nbsp;</span></b><strong data-dcnode-id="2231"><b data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Claude Nicolas Ledoux</span></b></strong><strong data-dcnode-id="2228"><b data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">&nbsp;</span></b></strong></h3><span data-dcnode-id="2226" instrument_node="">
</span><p data-dcnode-id="2221"><a data-dcnode-id="2223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architectuul.com/architect/claude-nicolas-ledoux" rel="noopener" target="_self"><u data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Claude Nicolas Ledoux</span></u></a><span data-dcnode-id="2222" instrument_node="">&nbsp;was a French neoclassical architect. He was knowledgeable in architectural theory which he used to not only design domestic structures but for town planning as well. He became known as the utopian because of his visionary plan to make the City of Chaux an ideal city.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><div data-dcnode-id="2209" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/servicetitan-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="2211" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">See also</span></span><span data-dcnode-id="2214" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Our Detailed ServiceTitan Software Review (for Field Businesses)</span></span></div></a></div><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">He learned the craft from Jacques François Blondel who was a neoclassical architect. He spent four years in Maroon and Champagne provinces where he built bridges, village churches, and schools. He designed many palaces in Paris, such as Hotel d’Halwyll. He also built the Royal Saltworks of Arc-et-Senans.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Other major works that he did are:</span></p><span data-dcnode-id="2203" instrument_node="">
</span><ul data-dcnode-id="2195"><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Cathedral of Saint-Germaine, Auxerre</span></li><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Chateau de Benouville</span></li><span data-dcnode-id="2196" instrument_node="">
</span></ul><span data-dcnode-id="2194" instrument_node="">
</span><h3 data-dcnode-id="2188"><b data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">42.&nbsp;</span></b><strong data-dcnode-id="2189"><b data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Jean Chalgrin</span></b></strong></h3><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2182"><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.revolvy.com/page/Jean-Chalgrin%3Fcr%3D1" rel="noopener" target="_self"><u data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Jean Chalgrin</span></u></a><span data-dcnode-id="2183" instrument_node="">&nbsp;established a neoclassic orientation during his early studies which were under the supervision of Giovanni Niccolò Servandoni and Étienne-Louis Boullée in Paris. His Prix de Rome sojourn as French Academy’s pensionnaire in Rome also played a major role.</span></p><span data-dcnode-id="2181" instrument_node="">
</span><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">When he returned to Paris, he was appointed an inspector of public works almost immediately, under Pierre-Louis Moreau-Desproux, an architect. He oversaw the construction of Hôtel Saint-Florentin in the rue Saint-Florentin where Chalgrin got an opportunity to design the gateway to the cour d’honneur. He presented the design for Church of St. Philippe-du-Roule which was based on the basilica plan.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">He was appointed as the First Architect to the brother of Louis XVI for whom he designed the pavilion of the Comtesse de Provence at Versailles. He was also appointed to supervise the projects for another brother of the king. He remodeled the interior of the Saint Sulpice Church. He was also commissioned to work on the Arc de Triomphe by Napoleon. Chalgrin died while the project was still underway.</span></p><span data-dcnode-id="2175" instrument_node="">
</span><h3 data-dcnode-id="2169"><b data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">43.&nbsp;</span></b><strong data-dcnode-id="2170"><b data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Thomas Jefferson</span></b></strong></h3><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2163"><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.monticello.org/thomas-jefferson/brief-biography-of-jefferson/" rel="noopener" target="_self"><u data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Thomas Jefferson</span></u></a><span data-dcnode-id="2164" instrument_node="">&nbsp;was an American statesman, a lawyer, diplomat, and an architect. He was the third U.S President, the author of The Declaration of American Independence and Virginia Statute for Religious Freedom, and Father of the University of Virginia.</span></p><span data-dcnode-id="2162" instrument_node="">
</span><p data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Jeffersonian architecture is a form of Neo-Palladianism and/ or Neo-classicism embodied in architecture designs that Thomas Jefferson incorporated in his properties, including the Monticello House- the home where he lived, Poplar Forest- his retreat, and the University of Virginia- a college that he founded. He also designed homes for his political allies and friends, like Barboursville.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2158" instrument_node="">Thomas Jefferson built the Monticello House in Virginia which he had wished to from his childhood. He wished to spend his life with his beloved wife in a house that was his childhood dream but unfortunately, his wife died in the 10</span><sup data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">th</span></sup><span data-dcnode-id="2155" instrument_node="">&nbsp;year of marriage and could not see the completion of Monticello House. It was this place that he remained mostly during the last seventeen years of his life.</span></p><span data-dcnode-id="2153" instrument_node="">
</span><h3 data-dcnode-id="2147"><b data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">44.&nbsp;</span></b><strong data-dcnode-id="2148"><b data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Charles Cameron</span></b></strong></h3><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><img alt="The Alexander Palace in Tsarskoye Selo" class="aligncenter wp-image-508280 size-full" data-dcnode-id="2145" height="640" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Alexander-Palace-in-Tsarskoye-Selo.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Alexander-Palace-in-Tsarskoye-Selo.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Alexander-Palace-in-Tsarskoye-Selo-320x205.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Alexander-Palace-in-Tsarskoye-Selo-870x557.jpg 870w" width="1000"></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2135"><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/charles-cameron.htm" rel="noopener" target="_self"><u data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Charles Cameron</span></u></a><span data-dcnode-id="2139" instrument_node="">&nbsp;was a neoclassical architect who was influenced by Roman and Greek architecture, as well as by the work of Robert Adam. His architectural works are more focused on </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/outdoor-garden-steps/" rel="noopener" target="_self"><span data-dcnode-id="2138" instrument_node="">landscaped gardens</span></a><span data-dcnode-id="2136" instrument_node=""> and country palaces. He was born in London. His father was a builder and a carpenter. He trained under Isaac Ware who was an architect.</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">He worked for Empress Catherine the Great, Paul I and Alexander I. Some of his most famous contributions include the Alexander Palace, and the Pavlovsk Palace, Razumovsky Palace. The contemporaries he worked on include Giacomo Quarenghi and the Matvey Kazakov.</span></p><span data-dcnode-id="2131" instrument_node="">
</span><h3 data-dcnode-id="2125"><b data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">45.&nbsp;</span></b><strong data-dcnode-id="2126"><b data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">John Nash</span></b></strong></h3><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2119"><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/john-nash.htm" rel="noopener" target="_self"><u data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">John Nash</span></u></a><span data-dcnode-id="2120" instrument_node=""> was born in London. He trained as an architect under &nbsp;Sir Robert Taylor. He started off as an architect at an early age, with his own architecture firm. However, at the age of 25, he was declared bankrupt. He then moved from London to Wales, to be near his mother.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><div data-dcnode-id="2107" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/the-best-house-cleaning-business-software-options/" rel="dofollow" target="_self"><div data-dcnode-id="2109" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">See also</span></span><span data-dcnode-id="2112" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">9 of The Best House Cleaning Business Software Programs for Managing the Business</span></span></div></a></div><p data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">He worked on many prisons, country homes, and church renovations in Wales and moved back to London in 1797. In around 1806, his work caught the attention of Prince Regent, who late became King George IV.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">He is best known for his works which are:</span></p><span data-dcnode-id="2101" instrument_node="">
</span><ul data-dcnode-id="2072"><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Royal Mews</span></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Cumberland Terrace</span></li><span data-dcnode-id="2094" instrument_node="">
</span><li data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">East Cowes Castle</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Ravensworth Castle</span></li><span data-dcnode-id="2088" instrument_node="">
</span><li data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">All Souls Church in Langham</span></li><span data-dcnode-id="2085" instrument_node="">
</span><li data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Mary’s Church Haggerston</span></li><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Royal Pavilion in Brighton</span></li><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Trafalgar Square</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Buckingham Palace</span></li><span data-dcnode-id="2073" instrument_node="">
</span></ul><span data-dcnode-id="2071" instrument_node="">
</span><h3 data-dcnode-id="2065"><b data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">46.&nbsp;</span></b><strong data-dcnode-id="2066"><b data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">William Thornton</span></b></strong></h3><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2059"><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/william-thornton.htm" rel="noopener" target="_self"><u data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">William Thornton</span></u></a><span data-dcnode-id="2060" instrument_node="">&nbsp;is one of the earliest architects of America. He achieved fame during his early years with the US Capitol Building that was designed in the neoclassical architectural style.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">He had studied medicine and was a practicing physician in Philadelphia. However, he found the nature of work laborious and disgusting. He had interest in painting and drawing and he ended up submitting his designs to competition for Library Hall for Library Company of Philadelphia. His entry for the competition was selected and he went to Tortola.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">He learned about the competition for public buildings in Washington. He proposed a design for the U.S Capitol Building. His drawings were awarded a premium of $500 after recommendations from Thomas Jefferson, the Secretary of State and George Washington, the President.</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">William Thornton was appointed as the superintendent of the Patent Office by President Jefferson. He held this position for 26 years, till his death. He designed two Washington DC residences including the Octagon (John Tayloe III townhouse) and Tudor Palace (Thomas Peter’s villa). Other major architectural works include the Woodlawn Plantation in Virginia.</span></p><span data-dcnode-id="2049" instrument_node="">
</span><h3 data-dcnode-id="2043"><b data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">47.&nbsp;</span></b><strong data-dcnode-id="2044"><b data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Charles Bulfinch</span></b></strong></h3><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2037"><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/charles-bulfinch.htm" rel="noopener" target="_self"><u data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Charles Bulfinch</span></u></a><span data-dcnode-id="2038" instrument_node="">&nbsp;was an American-born architect. He was the first to practice architecture professionally in Boston. He was well-known for his neoclassical architecture.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">His neoclassicism was first seen in his design for Tontine Crescent. Some of his early works include an old Federal Street, the new State House, New England’s first playhouse and the Massachusetts State House.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">In Boston, he was the most active architect for 25 years. He had a strong influence on modernizing Boston. He provided new systems fir street-lighting, drainage, and also widened the streets. He was one of the architects in the designing of the U.S Capitol Building. He was the one to complete the wings and the central portion that were unfinished.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><h3 data-dcnode-id="2024"><b data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">48.&nbsp;</span></b><strong data-dcnode-id="2025"><b data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Benjamin Latrobe</span></b></strong></h3><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><img alt=" Baltimore Basilica" class="aligncenter size-full wp-image-508248" data-dcnode-id="2022" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Baltimore-Basilica.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Baltimore-Basilica.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Baltimore-Basilica-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Baltimore-Basilica-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Baltimore-Basilica-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2015"><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/benjamin-latrobe.htm" rel="noopener" target="_self"><u data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Benjamin Latrobe</span></u></a><span data-dcnode-id="2016" instrument_node="">&nbsp;was born in Leeds, England. He studied engineering under John Smeaton and architecture under Pepys Cockerell. He immigrated to Virginia before he settled in Philadelphia. he designed Bank of Pennsylvania which was the first neoclassical building in the U.S. that displayed Grecian order. He designed the St. John’s Church in Washington D.C.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Benjamin Latrobe was hired by President Jefferson on the position of Surveyor of Public Buildings. He constructed the south wing of the U.S Capitol. He also worked on the President House and the Navy Yard. He reconstructed the interior of the north wing of U.S. Capitol. He was rehired for the restoration work after two wings were damaged from fires by British troops.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">He is well-known for the Baltimore Basilica which is a neoclassical primarypiece. Other works include the Fairmount Waterworks, Nassau Hall in Princeton University, the Baltimore Exchange, and Louisiana State Bank.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">He died in New Orleans, where he was working on the city’s municipal water system.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><h3 data-dcnode-id="1999"><b data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">49.&nbsp;</span></b><strong data-dcnode-id="2000"><b data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Sir Robert Smirke</span></b></strong></h3><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1993"><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottisharchitects.org.uk/architect_full.php%3Fid%3D200349" rel="noopener" target="_self"><u data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Sir Robert Smirke</span></u></a><span data-dcnode-id="1994" instrument_node="">&nbsp;is one of the many leaders in the Greek revival architecture. He studied drawing and architecture from a very young age. He was a student of the architect, John Soan.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><div data-dcnode-id="1981" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/fieldwire-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="1983" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">See also</span></span><span data-dcnode-id="1986" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">FieldWire Software Review (Based on Our Trial-Run)</span></span></div></a></div><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">He was made the architect to the Royal Mint which was first official appointment. He was elected Associate of the Royal Academy and later the Royal Academician. His diploma work consisted of a drawing for the reconstruction of the Acropolis of Athens.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">He was nominated as an architect for Office of Works along with John Soan and Nash. He then worked o numerous commissions that include the General Post Office, the British Museum, King’s College, the Strand, and the Custom House. He also worked on many private projects like the Convent Garden Theatre in London, the Royal College of Physicians, various churches and four clubs.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">He died at an age of 87 in Cheltenham.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><h3 data-dcnode-id="1966"><b data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">50.&nbsp;</span></b><strong data-dcnode-id="1967"><b data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Karl Friedrich Schinkel</span></b></strong></h3><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><img alt="The Altes Museum " class="aligncenter size-full wp-image-508281" data-dcnode-id="1964" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Altes-Museum.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Altes-Museum.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Altes-Museum-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Altes-Museum-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Altes-Museum-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1957"><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architects.htm" rel="noopener" target="_self"><u data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Karl Friedrich Schinkel</span></u></a><span data-dcnode-id="1958" instrument_node=""> was a Prussian architect, painter, and a city planner. When he was 14 years old, he had already developed an interest in art. he visited numerous exhibitions and it was in an exhibition that he had an encounter with the architect, Friedrich Gilly. He studied his work and decided to become an architect.</span></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">He became Friedrich Gilly’s student and a friend. He designed stages including one for the Magic Flute. Queen of Prussia became aware of his work and he was commissioned to re-design the sleeping chamber for her in the palace. After this commission, Schinkel became the interior designer and the primary builder for the royal family.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">He worked on turning Berlin into a representative capital of Prussia while he was the Chief Government Building Surveyor. He was in charge of the projects taking place in Prussian territories, starting from Rhineland to Königsberg. He also built the Museum am Lustgarten in Berlin.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Some of his popular works are:</span></p><span data-dcnode-id="1947" instrument_node="">
</span><ul data-dcnode-id="1936"><span data-dcnode-id="1946" instrument_node="">
</span><li data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Konzerthaus, Gendarmenmarkt in Berlin</span></li><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Tegel Palace</span></li><span data-dcnode-id="1940" instrument_node="">
</span><li data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Altes Museum</span></li><span data-dcnode-id="1937" instrument_node="">
</span></ul><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">He was a very important German architect who had a great influence on the subsequent generations of architects, as well as on Modern Art.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><h2 data-dcnode-id="1928"><strong data-dcnode-id="1929"><b data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">19th Century Architects</span></b></strong></h2><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node="">The work of architects of the 19</span><sup data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">th</span></sup><span data-dcnode-id="1923" instrument_node=""> Century was influenced by the earlier architectural movements and exotic, foreign styles, along with the new technologies that emerged in the early modern age. The revival of Gothic, Greek, and Renaissance designs were fused with new engineering methods and materials.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><h3 data-dcnode-id="1915"><b data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">51.&nbsp;</span></b><strong data-dcnode-id="1916"><b data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Sir Charles Barry</span></b></strong></h3><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1909"><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.victorianweb.org/art/architecture/barry/index.html" rel="noopener" target="_self"><u data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Sir Charles Barry</span></u></a><span data-dcnode-id="1910" instrument_node="">&nbsp;was an English architect as well as a fine draughtsman. He studied Renaissance architecture in Florence and Rome. He practiced in London.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">He worked on numerous Gothic Revival Churches like St. Peter’s in Brighton and the Holy Trinity in Islington. He worked on the Westminster Palace which is said to have hastened his death due to the immense pressure he had to work under.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Some of his popular works are listed below:</span></p><span data-dcnode-id="1902" instrument_node="">
</span><ul data-dcnode-id="1873"><span data-dcnode-id="1901" instrument_node="">
</span><li data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">All Saints, Stand, Manchester</span></li><span data-dcnode-id="1898" instrument_node="">
</span><li data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Houses of Parliament</span></li><span data-dcnode-id="1895" instrument_node="">
</span><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">The Reform Club in London</span></li><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Four preparatory drawings for the Reform Club</span></li><span data-dcnode-id="1889" instrument_node="">
</span><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">The Traveller’s Club, in London</span></li><span data-dcnode-id="1886" instrument_node="">
</span><li data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">The (Former) Athenaeum in Manchester</span></li><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">The Clock Tower, Mount Felix, Walton-on-Thames, Surrey</span></li><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">City Art Gallery in Manchester</span></li><span data-dcnode-id="1877" instrument_node="">
</span><li data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Kingston Lacy, Dorset (remodeling)</span></li><span data-dcnode-id="1874" instrument_node="">
</span></ul><span data-dcnode-id="1872" instrument_node="">
</span><h3 data-dcnode-id="1866"><b data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">52.&nbsp;</span></b><strong data-dcnode-id="1867"><b data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Richard Upjohn</span></b></strong></h3><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1860"><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philadelphiabuildings.org/pab/app/ar_display.cfm/22225" rel="noopener" target="_self"><u data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Richard Upjohn</span></u></a><span data-dcnode-id="1861" instrument_node="">&nbsp;was an American architect. He established architectural practices in New York. He also became a leader nationwide in the picturesque mode in architecture in America.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">He is known best for his contribution to Gothic Revival church architecture which had a long-lasting influence. He designed the Episcopal churches in North Carolina and the Christ Episcopal Church in Raleigh. He worked with Alexander Paris, an architect in Boston. He made a reputation in New York with the Trinity Episcopal Church which is a landmark for the Gothic Revival in the American architecture of the church.</span></p><span data-dcnode-id="1856" instrument_node="">
</span><div data-dcnode-id="1845" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/servicebox-review/" rel="dofollow" target="_self"><div data-dcnode-id="1847" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">See also</span></span><span data-dcnode-id="1850" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Our Detailed ServiceBox Software Review (for Field Service Businesses)</span></span></div></a></div><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Another of his popular work is the Bowdoin College Chapel which as a Romanesque-influenced design.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><h3 data-dcnode-id="1836"><b data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">53.&nbsp;</span></b><strong data-dcnode-id="1837"><b data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Georges-Eugene Haussmann</span></b></strong></h3><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1830"><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/baron-georges-eugene-haussmann" rel="noopener" target="_self"><u data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Georges-Eugene Haussmann</span></u></a><span data-dcnode-id="1831" instrument_node="">&nbsp;is the man who designed Paris. It was Georges-Eugene Haussmann who gave the city of Paris the look that it still flaunts proudly today. He demolished most of the historic buildings with an intention to get rid of the slums and prepare the city for an industrial era. The reforms in Paris that Georges-Eugene Haussmann brought were so expansive that almost everything in Paris today can be traced back to him.</span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">The most prominent of his works that can be seen in Paris are:</span></p><span data-dcnode-id="1826" instrument_node="">
</span><ul data-dcnode-id="1815"><span data-dcnode-id="1825" instrument_node="">
</span><li data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Bois de Boulogne</span></li><span data-dcnode-id="1822" instrument_node="">
</span><li data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Avenue Foch</span></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Boulevard Haussmann</span></li><span data-dcnode-id="1816" instrument_node="">
</span></ul><span data-dcnode-id="1814" instrument_node="">
</span><h3 data-dcnode-id="1808"><b data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">54.&nbsp;</span></b><strong data-dcnode-id="1809"><b data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Eugene Viollet-le-Duc</span></b></strong></h3><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1802"><a data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/viollet-le-duc.htm" rel="noopener" target="_self"><u data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Eugene Viollet-le-Duc</span></u></a><span data-dcnode-id="1803" instrument_node=""> was a theorist, writer, and an unconventional designer. He is best known for his restorations of Gothic and Romanesque architecture. He was very well-educated in Italy and France. He was just 24 years of age when he was given the task of restoring La Madeleine at Vezelay Abbey. It was followed by the restoration of Sainte Chapelle and Notre Dame in Paris. The most important of the restoration works he did was the restoration of the historical city of Carcassonne.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">He worked on the interior of the Statue of Liberty. He was one of the most significant and influential figures that contributed to 19th-century&nbsp;architecture. He also had a major impact on the development of other styles, including Victorian architecture.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><h3 data-dcnode-id="1792"><b data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">55.&nbsp;</span></b><strong data-dcnode-id="1793"><b data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">James Renwick</span></b></strong></h3><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><img alt="St. Patrick's Cathedral at night" class="aligncenter wp-image-508278 size-full" data-dcnode-id="1790" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/St.-Patricks-Cathedral.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Patricks-Cathedral.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Patricks-Cathedral-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Patricks-Cathedral-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/St.-Patricks-Cathedral-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">James Renwick&nbsp;was one of the most versatile American architects. He studied engineering and was self-taught in architecture.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">He submitted a Gothic design for the Grace Church that was to be built in New York and won the competition. This design showed a true understanding of the Gothic style. He also worked on the St. Patrick’s Cathedral in New York City.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Some of his prominent works include the building of Smithsonian Institution in Washington, D.C. and Corcoran Gallery in Washington, D.C. Saint Bartholomew’s Church and All Saints’ Roman Catholic Church in New York City are also the works of James Renwick.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><h3 data-dcnode-id="1773"><b data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">56.&nbsp;</span></b><strong data-dcnode-id="1774"><b data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Frederick Law Olmsted</span></b></strong></h3><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1767"><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecture.org/learn/resources/architecture-dictionary/entry/frederick-law-olmsted/" rel="noopener" target="_self"><u data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Frederick Law Olmsted</span></u></a><span data-dcnode-id="1768" instrument_node=""> was a landscape architect. He has designed most of the picturesque green spaces in Chicago. He studied farming and chemistry and then settled on becoming a landscape architect.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">In 1858, he won a competition to design the Central Park in New York, in which he participated with Calvert Vaux. The planners of Riverside were so impressed by their work that the duo was appointed for designing a suburban community that was located 9 miles from Chicago. Olmsted was asked to submit plans for South Park Commission by the Chicago Sanitary Commission. Olmsted and Vaux put forward a proposal which was put on hold as the city recovered from the devastating Great Chicago fire in 1871.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Olmsted worked on many projects such as the University of Chicago, U.S. Capitol’s landscape design, and the Baltimore Estate in North Carolina. He also worked in the conservation movement and contributed to the preservation of the Niagara Falls.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">World’s Columbian Exposition in Chicago was the shining moment for Olmsted. He, along with Daniel Burnham, designed the South Pak Commission which is Jackson Park today.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><h3 data-dcnode-id="1751"><b data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">57.&nbsp;</span></b><strong data-dcnode-id="1752"><b data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Calvert Vaux</span></b></strong></h3><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1745"><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tclf.org/pioneer/calvert-vaux" rel="noopener" target="_self"><u data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Calvert Vaux</span></u></a><span data-dcnode-id="1746" instrument_node=""> was born in England. He was trained to be an architect from an early age. He came to America for collaboration on landscape projects in Picturesque estate with Andrew Jackson Downing. He collaborated with many designers and landscape architects throughout his career, having the best partnership with Frederick Law Olmsted.</span></p><span data-dcnode-id="1744" instrument_node="">
