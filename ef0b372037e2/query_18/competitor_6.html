</span><div data-dcnode-id="1733" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/interior-designer-business-software-options/" rel="dofollow" target="_self"><div data-dcnode-id="1735" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">See also</span></span><span data-dcnode-id="1738" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">12 Interior Designer Business Software Options</span></span></div></a></div><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">The partnership with Olmsted began with the duo participating in a competition for the design of the Central Park. After winning the competition, they did numerous collaborative projects like Prospect Park in Brooklyn, park systems and parks for Brooklyn and Buffalo, New York State Reservation at Niagara, and South Park in Chicago. Calvert Vaux also worked on many cemeteries, campuses, estate landscapes, and planned communities with Olmsted.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Other projects that Vaux worked on include Trinity Cemetery, Grace Church grounds, Cemetery of the Evergreens, Bryn Mawr College, and the Wisner estate. He was the landscape architect for the New York Department of Public Parks.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><h3 data-dcnode-id="1721"><b data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">58.&nbsp;</span></b><strong data-dcnode-id="1722"><b data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Charles Garnier</span></b></strong></h3><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Charles Garnier was born in Paris. He attended atelier of Louis Hippolyte Lebas to study drawing. In 1841, he attended the École des Beaux-Arts. After winning Grand Prix de Rome in 1848, he spent 5 years in Italy.</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">He participated in a competition for the Opera in Paris in 1861. It was a two-phase competition. Charles Garnier secured the fifth place in the first phase and won the commission in the same year. It took 14 years for the Opera to complete. Charles Garnier also designed the Monte Carlo Casino.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">He worked on numerous other projects which include libraries, churches, houses, hotels, and tombs. He designed and constructed the tombs of Bizet and Offenbach.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Charles Garnier did not fit very well into the emerging movements of functionalism. His work was based on theory, as he says in his book. He died in 1898.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><h3 data-dcnode-id="1702"><b data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">59.&nbsp;</span></b><strong data-dcnode-id="1703"><b data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Richard Morris Hunt</span></b></strong></h3><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1699"><img alt="Biltmore Estate in North Carolina " class="aligncenter wp-image-508282 size-full" data-dcnode-id="1700" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/The-Biltmont-Estate.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Biltmont-Estate.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Biltmont-Estate-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Biltmont-Estate-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/The-Biltmont-Estate-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1693"><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/richard-morris-hunt-architect-gilded-age-177382" rel="noopener" target="_self"><u data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Richard Morris Hunt</span></u></a><span data-dcnode-id="1694" instrument_node="">&nbsp;is regarded as the dean of American architecture. He belonged to a respected family in New England. His family moved to Europe when Richard’s father died. He was the first American student who studied architecture in the École des Beaux-Arts in Paris. He returned to England to bring European culture and architecture to the United States.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">He worked on many buildings including civic buildings, libraries, art museums, and apartment buildings. One of the first commissions that he worked on in New York was the Tenth Street Studio Building in Greenwich Village. He built the Stuyvesant Apartments for American middle class. Roosevelt Building was another of his works in which he experimented with cast-iron facades. He built the New York Tribune Building that was the first skyscraper in New York City and also the first commercial building to have an elevator. He also designed the pedestal for the world famous, Statue of Liberty.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Other popular creations of Richard Morris Hunt include:</span></p><span data-dcnode-id="1686" instrument_node="">
</span><ul data-dcnode-id="1672"><span data-dcnode-id="1685" instrument_node="">
</span><li data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Griswold House</span></li><span data-dcnode-id="1682" instrument_node="">
</span><li data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Marble House</span></li><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The Breakers</span></li><span data-dcnode-id="1676" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Biltmore Estate</span></li><span data-dcnode-id="1673" instrument_node="">
</span></ul><span data-dcnode-id="1671" instrument_node="">
</span><h3 data-dcnode-id="1665"><b data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">60.&nbsp;</span></b><strong data-dcnode-id="1666"><b data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Gustave Eiffel</span></b></strong></h3><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1659"><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/scientist/gustave-eiffel" rel="noopener" target="_self"><u data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Gustave Eiffel</span></u></a><span data-dcnode-id="1660" instrument_node="">&nbsp;was born in France. He was interested in construction from a very early age. he went to École Polytechnique and then to College of Art and Manufacturing 9 École Centrale des Arts et Manufactures) in Paris. He specialized in metal constructions, specifically in bridges.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">The first project that Gustave Eiffel worked on was an iron bridge in Bordeaux. In just 6 years from then, he had set up his own company. He designed the arched Gallery of Machines for an exhibition that was to be held in Paris, which further solidified his reputation. He designed the Ponte Maria Pia Bridge which was a 525-foot arched bridge over the Douro River in Portugal. He also has the credit to have built the Garabit viaduct Truyère in France.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><div data-dcnode-id="1644" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/tradify-software-review/" rel="dofollow" target="_self"><div data-dcnode-id="1646" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">See also</span></span><span data-dcnode-id="1649" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">A Helpful Tradify Software Review (Tested this Out Personally)</span></span></div></a></div><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Other projects that he worked on include the dome of Nice, an astronomical observatory in France, and the magnificent Statue of Liberty. Eiffel was hired after the initial engineer, Eugene Viollet-le-Duc died.</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">What marked Eiffel’s name to history forever was the Eiffel Tower in Paris. It is a magnificent structure of that Gustave Eiffel built only in two years!</span></p><span data-dcnode-id="1638" instrument_node="">
</span><h3 data-dcnode-id="1632"><b data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">61.&nbsp;</span></b><strong data-dcnode-id="1633"><b data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">William Le Baron Jenney</span></b></strong></h3><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1626"><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/william-le-baron-jenney.htm" rel="noopener" target="_self"><u data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">William Le Baron Jenney</span></u></a><span data-dcnode-id="1627" instrument_node=""> was not just an architect, but also an engineer, a park and town planner, and an innovator in the building technology. The founder of the Chicago School of Skyscraper Architecture, William Le Barron Jenney pioneered the concept of high-rise skyscraper architecture.</span></p><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">One of the first commissions he worked on in Chicago was West Parks. However, he is known best for the Home Insurance Building in Chicago which is 10 floors high. It was the first building in America which had a metal frame instead of a stone and brick one to support the upper levels. Ludington Building in Chicago is another example of such a high-rise building. Other works include First Leiter Building and the Second Leiter Building, the latter being an exemplary 19th-century&nbsp;architectural primarypiece.</span></p><span data-dcnode-id="1622" instrument_node="">
</span><h3 data-dcnode-id="1616"><b data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">62.&nbsp;</span></b><strong data-dcnode-id="1617"><b data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">George Brown Post</span></b></strong></h3><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1610"><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brownstoner.com/brooklyn-life/walkabout-the-great-forgotten-architect-george-b-post/" rel="noopener" target="_self"><u data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">George Brown Post</span></u></a><span data-dcnode-id="1611" instrument_node="">&nbsp;was born in New York City, in a very well-off family. He got his education from New York University. He graduated from the university’s engineering department, with a major in civil engineering and architecture.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">He turned down the offer of being a mathematics professor at New York University to join the apprenticeship of a great architect, Richard Morris Hunt. After spending some time in the military, he returned to his apprenticeship. He worked on many projects with his co-apprentice but then went on his own.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Although he had lost the competition for the design of Equitable Life Insurance Society Building that was to be built in Manhattan, the panel was so impressed that they appointed him the consulting engineer and the project architect for the project. He brought a lot of structural changes to the winning design by Gilman &amp; Kendall. It was the first 8-floors building that had an elevator installed. Post also worked when the building was being expanded.</span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">George Brown Post also designed the three buildings for College of New Jersey which were the Bonner-Marquand Gymnasium, Dickenson Hall (a classroom), and Reunion Hall&nbsp;(a dorm). None of these buildings are standing today.</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">It was George Brown Post who built the New York Stock Exchange, the Williamsburgh Savings Bank, and the Long Island Historical Society Building.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><h3 data-dcnode-id="1591"><b data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">63.&nbsp;</span></b><strong data-dcnode-id="1592"><b data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Henry Hobson Richardson</span></b></strong></h3><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1585"><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/henry-hobson-richardson.htm" rel="noopener" target="_self"><u data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Henry Hobson Richardson</span></u></a><span data-dcnode-id="1586" instrument_node=""> was born in Louisiana. He studied civil engineering at Harvard College and Tulane University. He was the second American, after Richard Morris Hunt, to study architecture at the Ecole des Beaux-Arts in Paris.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">His work was more of Romanesque architecture rather than neoclassical or Gothic Revival architecture. When he returned to the United States from Paris, he started his professional practice independently. The first commission that he worked on was the Unity Church in Springfield, Massachusetts.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">He experimented with many styles. He designed a huge structure that was built out of Medina sandstone, the New York State Asylum in Buffalo. Today, it is called the H.H Richardson Complex. He worked on Brattle Square Church in Boston, and the Trinity Church which was his primarypiece.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">He also designed many urban houses, the most popular ones include John Hay and Henry Adams houses in Washington DC and the John J. Glessner House in Chicago. Most famous of all was the Mary Fisk Stoughton House and the Henry Potter House.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><div data-dcnode-id="1564" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/gift-ideas-for-architects/" rel="dofollow" target="_self"><div data-dcnode-id="1566" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">See also</span></span><span data-dcnode-id="1569" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">33 Gift Ideas for Architects (Under $20, $50, $100 and $200)</span></span></div></a></div><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Allegheny County Courthouse and Jail and Marshall Field Wholesale Store are also the works of Henry Hobson Richardson.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><h3 data-dcnode-id="1555"><b data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">64.&nbsp;</span></b><strong data-dcnode-id="1556"><b data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Otto Wagner</span></b></strong></h3><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><img alt="Majolica House by Otto Wagner " class="aligncenter size-full wp-image-508260" data-dcnode-id="1553" height="665" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Majolica-House.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Majolica-House.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Majolica-House-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Majolica-House-870x579.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Majolica-House-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1550" instrument_node="">It won’t be wrong to say that </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/otto-wagner-selected-vienna-architecture-177924" rel="noopener" target="_self"><u data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Otto Wagner</span></u></a><span data-dcnode-id="1546" instrument_node="">&nbsp;defined the concept of modernity. He was the one who helped in building a modern world. he was an Austrian architect who is considered as one of the most important contributors to the early modernist architecture.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Architecture in the era when Otto Wagner lived was detailed, ornate, and decorative. He used to speak openly against the revivalist movements.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1540" instrument_node="">Some of his major works include the Majolika Hous. It was made from weather-proof </span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/types-of-tiles-for-flooring/" rel="noopener" target="_self"><span data-dcnode-id="1539" instrument_node="">tiles</span></a><span data-dcnode-id="1537" instrument_node=""> and had floral designs on the façade. Although its shape is straight and flat, it is still considered Art Nouveau. He was also commissioned for building the Karlsplatz Stadtbahn Station in Vienna. Austrian Postal Savings Bank, Banking Hall, Inside the Austrian Postal Savings Bank, and the Church of St. Leopold are all bagged by Otto Wagner. Two of his residences, Villa I and Villa II for each of his wives respectively amazing examples of his incredible work too!</span></p><span data-dcnode-id="1535" instrument_node="">
</span><h3 data-dcnode-id="1529"><b data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">65.&nbsp;</span></b><strong data-dcnode-id="1530"><b data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Antoni Gaudi</span></b></strong></h3><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1523"><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/artist/antoni-gaudi" rel="noopener" target="_self"><u data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Antoni Gaudi</span></u></a><span data-dcnode-id="1524" instrument_node=""> was a Spanish architect, born in Spain. He developed an interest in architecture at an early age. he graduated from Provincial School of Architecture. Antoni Gaudi put up an impressive showcase at the Paris World’s Affair in 1878 which impressed one patron so much that Antoni Gaudi ended up working on Güell Estate and Güell Palace. He also worked on the construction of Basilica and Expiatory Church of the Holy Family.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Some other impressive works he did include Episcopal Palace (and the Casa de Los Botines, both Gothic and the Casa Calvet. Antoni Gaudi used his equilibrated system to construct apartment buildings in Barcelona which were the Casa Milà and the Casa Batlló.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">The last project Antoni Gaudi worked on was the Sagrada Familia which wasn’t completed by the time he died. It is still not complete today.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><h3 data-dcnode-id="1510"><b data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">66.&nbsp;</span></b><strong data-dcnode-id="1511"><b data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Cass Gilbert</span></b></strong></h3><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1504"><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.com/academy/lesson/architect-cass-gilbert-buildings-biography.html" rel="noopener" target="_self"><u data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Cass Gilbert</span></u></a><span data-dcnode-id="1505" instrument_node="">&nbsp;is an architect from America, who built some of the finest buildings that still stand in America today. When he was 17 years old, Abraham M. Radcliffe, an architect from Minnesota, hired him. After many years, Cass Gilbert earned a degree in architecture from MIT.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">CASS Gilbert worked on many buildings including Minnesota State Capital Building. He moved to New York where he was commissioned to design and construct Alexander Hamilton U.S. Custom House. He was then elected the president of the American Institute of Architects.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">He designed the Spalding Building, St. Louis Library, Alien Art Museum, Detroit Public Library, and Thurgood Marshal United States Courthouse. Cass Gilbert worked until he died. Before he died, he designed plans for the United States Supreme Court Building,</span></p><span data-dcnode-id="1497" instrument_node="">
</span><h3 data-dcnode-id="1491"><b data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">67.&nbsp;</span></b><strong data-dcnode-id="1492"><b data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Victor Horta</span></b></strong></h3><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><img alt="House of Horta interior " class="aligncenter size-full wp-image-508259" data-dcnode-id="1489" height="668" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/House-of-Horta.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/House-of-Horta.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/House-of-Horta-320x214.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/House-of-Horta-870x581.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/House-of-Horta-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1482"><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.victor-horta.com/" rel="noopener" target="_self"><u data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Victor Horta</span></u></a><span data-dcnode-id="1483" instrument_node=""> was a Belgian architect who was born in Ghent. He studied architecture at Académie des Beaux-Arts. His work is the most important of examples of the Art Nouveau. Although most of the work by Victor Horta can be seen in Beaux Arts style it is Art Nouveau work that makes him beloved. Most of his Art Nouveau work includes townhouses that he built for the Belgian elite.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><div data-dcnode-id="1470" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wordpress-themes-for-real-estate-websites/" rel="dofollow" target="_self"><div data-dcnode-id="1472" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">See also</span></span><span data-dcnode-id="1475" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">30 Best Wordpress Themes for Real Estate Websites</span></span></div></a></div><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">He designed my private houses and public buildings in Brussels. He used cast iron for decorative and structural reasons. He built the Hotel Tassel, Maison Autrique, Maison Winssinge, Hôtel Eetvelde, and Maison du Peuple. His works also include “À l’Innovation” which was a department store. In subsequent years, he distanced himself from Art nouveau and designed buildings in a more neo-classical style which is exemplified by the Palais des Beaux-Arts in Brussels.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h3 data-dcnode-id="1461"><b data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">68.&nbsp;</span></b><strong data-dcnode-id="1462"><b data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Joseph Maria Olbrich</span></b></strong></h3><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><img alt="Hochzeitsturm (Wedding Tower)" class="aligncenter wp-image-508294 size-full" data-dcnode-id="1459" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Wedding-Tower.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Wedding-Tower.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Wedding-Tower-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Wedding-Tower-870x580.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Wedding-Tower-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1449"><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//architectuul.com/architect/joseph-maria-olbrich" rel="noopener" target="_self"><u data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Joseph Maria Olbrich</span></u></a><span data-dcnode-id="1450" instrument_node="">&nbsp;was an Austrian architect. He studied architecture at the renowned Wiener Staatsgewerbeschule and the Academy of Fine Arts Vienna.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">He worked for Otto Wagner and it is said that it was Joseph Maria Olbrich who did the detailed construction for most of the Wiener Stadtbahn (Metropolitan Railway) buildings by Otto Wagner. He also designed the Succession Hall Building which is now the landmark of the movement.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">He worked on many other fields including furniture, pottery, musical instruments, and book bindings. One of his famous creations includes the Wedding Tower in Darmstadt.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1436"><b data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">69.&nbsp;</span></b><strong data-dcnode-id="1437"><b data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Hector Guimard</span></b></strong></h3><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1430"><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/hector-guimard.htm" rel="noopener" target="_self"><u data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Hector Guimard</span></u></a><span data-dcnode-id="1431" instrument_node=""> was a designer and an engineer. His work is an outstanding example of Art Nouveau. He was a key figure in the 19th-century&nbsp;architecture and is considered as a pioneer of modern design. He applied modern construction techniques and innovative materials in his work. He made use of steel, iron, and glass in many of his works.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Example of his modern art includes the Castle Beranger in Paris which is an apartment complex. Other of his works that are popular include Humbert de Romans auditorium, Coilliot house, La Bluette, Castel Henriette, Nozal Hotel, and Castel d’Orgeval. He is most famous for the revolutionary entrances to the Paris Metro, having perfectly interwoven plant and animal shapes.</span></p><span data-dcnode-id="1426" instrument_node="">
</span><h3 data-dcnode-id="1420"><b data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">70.&nbsp;</span></b><strong data-dcnode-id="1421"><b data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Frank Lloyd Wright</span></b></strong></h3><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><img alt="Home of Frank Lloyd Wright " class="aligncenter wp-image-508255 size-full" data-dcnode-id="1418" height="695" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Frank-Lloyd-Wright-home.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Frank-Lloyd-Wright-home.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Frank-Lloyd-Wright-home-320x222.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Frank-Lloyd-Wright-home-870x605.jpg 870w" width="1000"></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1408"><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biography.com/artist/frank-lloyd-wright" rel="noopener" target="_self"><u data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Frank Lloyd Wright</span></u></a><span data-dcnode-id="1409" instrument_node="">&nbsp;was a modern architect whose work depicted modern style. He has the credits for designing numerous iconic buildings. After he finished college, he became the chief assistant to Louis Sullivan, an architect. He developed his own architectural firm later which focused on organic architecture in commercial buildings and homes.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">He designed more than 1100 buildings during his lifetime. The first architectural primary piece that Frank Lloyd Wright was his own home in Chicago which is now called the Frank Lloyd Wright home and studio. He started private practice under the name Prairie School in this residential studio after he left Adler and Sullivan in 1893.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">He designed the Winslow House in River Forest. Over the next years, he worked on many public buildings and residences including the Unity Temple in Oak Park and Robie House in Chicago.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">After 20 years of his marriage, he abandoned his family and moved to Germany with the wife of a client, where he put two portfolios together. This established an international profile for Frank Lloyd Wright.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Upon his return to the United States, he designed what became one of his most acclaimed works –&nbsp;Taliesin, Welsh which was a home he built for himself and Mamah Borthwick Cheney, the woman he had moved to Germany earlier.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">He was commissioned by a Japanese emperor to build the Imperial Hotel in Tokyo. He claimed that the structure he spent 7 years on was earthquake-proof and in the Great Kanto Earthquake, the Imperial Hotel was the only large structure that survived the massive impact!</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">In 1932, he founded Taliesin Fellowship which was an architectural school that he started from his Taliesin residence. Taliesin Fellowship was housed in Taliesin West during winter months, which his he built 5 years later with his apprentices.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><div data-dcnode-id="1378" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/top-builders-bellingham/" rel="dofollow" target="_self"><div data-dcnode-id="1380" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">See also</span></span><span data-dcnode-id="1383" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">5 Top Home Builders in Bellingham, Washington</span></span></div></a></div><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">At about 70 years of age, he made a dramatic entrance to the profession by his greatest building, the Fallingwater, which was a residence for the acclaimed Kaufmann family of Pittsburgh. He designed the SC Johnson Wax Administration Building in Wisconsin. He also designed the stunning Monona Terrace (which could not be constructed due to lack of funds), and Guggenheim Museum in New York City.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1371"><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/frank-lloyd-wright-houses/"><span data-dcnode-id="1374" instrument_node="">See Frank Lloyd Wright’s houses</span></a><span data-dcnode-id="1372" instrument_node=""> (with detailed write-up).</span></p><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1364"><b data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">71.&nbsp;</span></b><strong data-dcnode-id="1365"><b data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">Charles Rennie Mackintosh</span></b></strong></h3><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Charles Rennie Mackintosh&nbsp;studied architecture and technical drawing. He was an intern with John Hutchinson, who was a renowned architect. He received numerous challenging commissions during his internship.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">His architectural works include Glasgow School of Art, International Exhibition in Glasgow Haus eines Kunstfreundes, Windyhill in Kilmacolm, Hill House in Helensburgh, the Willow Tea Rooms, Glasgow, and&nbsp;Scotland&nbsp;Street School. The Mackintosh House situated in Glasgow was reconstructed and it was opened to the public as a museum in the late 1970s.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><h3 data-dcnode-id="1351"><b data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">72.&nbsp;</span></b><strong data-dcnode-id="1352"><b data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Peter Behrens</span></b></strong></h3><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1345"><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architecture/peter-behrens.htm" rel="noopener" target="_self"><u data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Peter Behrens</span></u></a><span data-dcnode-id="1346" instrument_node="">&nbsp;is considered the pioneer of corporate design and modernist architecture. He was born in Hamburg. He joined utopian Darmstadt artist colony that was set up by the Grand duke of Hesse, Ernst Ludwig. While he was there, he designed his own home which gave him the encouragement to start working as an architect.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">His famous works include AEG Turbine Factory, German Embassy in St Petersburg, and Hoechst Dye Factory, Admin Building in Frankfurt.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><h3 data-dcnode-id="1335"><b data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">73.&nbsp;</span></b><strong data-dcnode-id="1336"><b data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Adolf Loos</span></b></strong></h3><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1329"><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adolf-loos.com/" rel="noopener" target="_self"><u data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Adolf Loos</span></u></a><span data-dcnode-id="1330" instrument_node=""> was an Austrian architect who grew up in Germany. He was against the use of ornamentals and design in architecture because he found it immature and childish.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Adolf Loos did not design many buildings himself. One of his earliest primarypieces includes the Café Museum. Other works of Adolf Loos include the Loos House, Hais Steiner, Haus Scheu, and Haus Rufer. He designed the Chicago Tribune Tower and the house in Paris for Tristan Tzara.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><h3 data-dcnode-id="1319"><b data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">74.&nbsp;</span></b><strong data-dcnode-id="1320"><b data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Burnham and Root</span></b></strong></h3><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1313"><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecture.org/learn/resources/architecture-dictionary/entry/burnham-and-root/" rel="noopener" target="_self"><u data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Burnham and Root</span></u></a><span data-dcnode-id="1314" instrument_node=""> are one of the top architectural firms that were set up by Daniel Hudson Burnham and John Wellborn Root. It was a key influence on the Chicago School of Architecture. Burnham and Root met each other during the apprenticeship at an architectural firm of Carter, Drake, and Wight in Chicago.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">The early buildings that they worked on were homes for wealthy people but hey started designing tall buildings soon. The popular architectural works that the duo pulled together include Rookery Building, Rand McNally Building, and Monadnock Building, all in Chicago.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><h3 data-dcnode-id="1303"><b data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">75.&nbsp;</span></b><strong data-dcnode-id="1304"><b data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Holabird &amp; Roche</span></b></strong></h3><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1301" instrument_node="">William Holabird and Martin Roche were architects who were working as apprentices with William Le Baron Jennery who worked on the designing and building of tall buildings. The two architects decided to start their practice and in 1880, </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecture.org/learn/resources/architecture-dictionary/entry/holabird-and-roche/" rel="noopener" target="_self"><u data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Holabird and Roche</span></u></a><span data-dcnode-id="1297" instrument_node=""> (the current name) were established.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">They constructed numerous tall, commercial buildings in Chicago including the Marquette Building, the southern half of Monadnock Building, the Old Colony Building, Brookes Building, and the Chicago Building which is the Chicago Savings Bank Building. In a short span of time, skyscrapers designed and built by Holabird and Roche dotted the skylines of the cities all over the Midwest. They constructed many historically-inspired buildings which include County Building or Chicago’s City Hall, the University Club, and the Chicago Temple.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><h3 data-dcnode-id="1286"><b data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">76.&nbsp;</span></b><strong data-dcnode-id="1287"><b data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Adler and Sullivan</span></b></strong></h3><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><img alt="Chicago Stock Exchange Building Arch, Chicago" class="aligncenter size-full wp-image-508253" data-dcnode-id="1284" height="666" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/wp-content/uploads/2019/07/Chicago-Stock-Exchange-Building-Arch.jpg&amp;raw" srcset="https://www.homestratosphere.com/wp-content/uploads/2019/07/Chicago-Stock-Exchange-Building-Arch.jpg 1000w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Chicago-Stock-Exchange-Building-Arch-320x213.jpg 320w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Chicago-Stock-Exchange-Building-Arch-870x579.jpg 870w, https://www.homestratosphere.com/wp-content/uploads/2019/07/Chicago-Stock-Exchange-Building-Arch-300x200.jpg 300w" width="1000"></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1281" instrument_node="">The two architects during the late 19th century, </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dwell.com/article/the-architecture-of-adler-and-sullivan-e67f12f5" rel="noopener" target="_self"><u data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Dankmar Adler and Louis Sullivan</span></u></a><span data-dcnode-id="1277" instrument_node=""> teamed up to create waves in the architecture. They produced American architecture that was simple and featured steel fame walls and modern forms. Their partnership was the most influential and famous in American architecture. They were considered the fathers of the modern skyscrapers.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div data-dcnode-id="1264" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/top-home-builders-in-portland/" rel="dofollow" target="_self"><div data-dcnode-id="1266" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">See also</span></span><span data-dcnode-id="1269" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">5 Top Custom Home Builders in Portland, Oregon</span></span></div></a></div><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">The most significant works by the duo include the Auditorium Building, the Schiller/Garrick, the Chicago Stock Exchange Building, the Wainwright Building in St. Louis, and the Guaranty Building in New York.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Some of the primarypieces that Louis Sullivan worked alone include the Schlesinger &amp; Mayer store which was later known as Carson Pirie Scott and the Bayard Building in New York.</span></p><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1252"><b data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">77.&nbsp;</span></b><strong data-dcnode-id="1253"><b data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Walter Gropius</span></b></strong></h3><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1246"><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theartstory.org/artist-gropius-walter.htm" rel="noopener" target="_self"><u data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Walter Gropius</span></u></a><span data-dcnode-id="1247" instrument_node=""> is one of the pioneers of modern architecture and the founder of Bauhaus, which is an architecture school in Germany. This German architect designed and developed several architectural primarypieces that are still standing today.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">The major works that Walter Gropius did include The Fagus Factory, Sommerfeld House, and Monument to the March Dead. Bauhaus Complex in Dessau, Gropius House in Massachusetts, the Graduate Center at Harvard University, the Pan American Building in New York City, and the John F. Kennedy Federal Office Building in Boston are all Walter Gropius’s contributions to American architecture.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><h2 data-dcnode-id="1231"><strong data-dcnode-id="1239"><b data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">20</span></b></strong><strong data-dcnode-id="1235"><sup data-dcnode-id="1236"><b data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">th</span></b></sup></strong><strong data-dcnode-id="1232"><b data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&nbsp;Century Architects</span></b></strong></h2><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">In the 20th century, architecture observed modernism. With rapid economic development and urbanization, the architecture saw new forms, having little or no ornamentation. The structures were made more practical and functional and made-made materials like steel were used excessively. The architects who adapted to the modernization in the 20th century were successful in pulling off primarypieces that formed the basis of modern architecture.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><h3 data-dcnode-id="1221"><b data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">78.&nbsp;</span></b><strong data-dcnode-id="1222"><b data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Erich Mendelsohn</span></b></strong></h3><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1215"><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biography.yourdictionary.com/erich-mendelsohn" rel="noopener" target="_self"><u data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Erich Mendelsohn</span></u></a><span data-dcnode-id="1216" instrument_node="">&nbsp;was a German architect and also the pioneer of modern architecture. He incorporated functionalism in his projects. He was born in Prussia and received training in architecture in Berlin and Munich.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">The first major commission that Erich Mendelsohn bagged was the Einstein Tower in Potsdam. The structure was a perfect expression of abstract architecture and sculptural expressionism. When he started turning away from free-flowing designs, he created the Steinberg Hat Factory in Luckenwalde, Germany which is an example of the new direction he took in architecture.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The most important British design that Erich Mendelsohn worked on was the De La Warr Pavilion at Bexhill-On-Sea. He executed many important buildings in Palestine which include University Medical Center in Jerusalem and a hospital at Haifa.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">His American works include Maimonides Hospital -San Francisco. His works in Midwest include St. Louis Mo in Ohio, Grand Rapids in Mich, and St. Paul in Minn.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><h3 data-dcnode-id="1199"><b data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">79.&nbsp;</span></b><strong data-dcnode-id="1200"><b data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Charles-Edouard Jeanneret</span></b></strong></h3><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1193"><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visual-arts-cork.com/architects.htm" rel="noopener" target="_self"><u data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Charles Edouard Jeanneret</span></u></a><span data-dcnode-id="1194" instrument_node="">&nbsp;was a Swiss-born architect. He joined his father in trade at the age of 13 and went to Europe on a trip upon the advice of Charles L’Eplattenier, who decided that Charles Edouard should become an architect. After working in many architectural offices in Paris, Vienna, and Berlin, under renowned architects, returned to home town and continued his architectural studies.</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">One of his earliest designs includes the one for the Domino House, the design of which became the template for the next decade. After setting up his own studio in Paris in 1922, Le Corbusier designed many houses and villas which include Citrohan House, and the villas built for Ozenfant, Raoul La Roche, Michael Stein and the Villa Lipchitz, Maison Planeix, Maison Cook, and his primarywork Savoye House. He also produced large-scale housing projects like Immeubles Villas.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><div data-dcnode-id="1178" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="IRPP_minimalist" data-dcnode-id="1179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homestratosphere.com/gift-ideas-for-architects/" rel="dofollow" target="_self"><div data-dcnode-id="1180" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">See also</span></span><span data-dcnode-id="1183" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">33 Gift Ideas for Architects (Under $20, $50, $100 and $200)</span></span></div></a></div><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Other popular works include:</span></p><span data-dcnode-id="1175" instrument_node="">
</span><ul data-dcnode-id="1155"><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Army Hostel</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Swiss Dormitory at the City University</span></li><span data-dcnode-id="1168" instrument_node="">

</span><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Villa Savoye, Poissy-sur-Seine, France</span></li><span data-dcnode-id="1162" instrument_node="">
</span><li data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">La Tourette Monastery, Evreux-sur-l’Arbesle</span></li><span data-dcnode-id="1159" instrument_node="">
</span><li data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Notre Dame du Haut, Ronchamp</span></li><span data-dcnode-id="1156" instrument_node="">
</span></ul><span data-dcnode-id="1154" instrument_node="">
</span><h3 data-dcnode-id="1148"><b data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">80.&nbsp;</span></b><strong data-dcnode-id="1149"><b data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Mies van der Rohe</span></b></strong></h3><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1142"><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.archdaily.com/350573/happy-127th-birthday-mies-van-der-rohe" rel="noopener" target="_self"><u data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Ludwig Mies van der Rohe</span></u></a><span data-dcnode-id="1143" instrument_node="">&nbsp;was born in Germany. He was one of the most influential architects who lived in the 20th century. He developed the most enduring style of architecture which was modernism. The minimalist style of Mies van der Rohe was very popular for almost a century. He started his career at Peter Behrens’s studio.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">His fame was cemented in 1921 when he proposed the design of the Friedrichstraße skyscraper which was an all-glass tower and in 1929 by the German Pavilion at Barcelona Exposition. It remains one of the most popular and well-known of his works even today.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">After the influence of Nazis continued to grow, finding work in Germany became difficult. Mies went to the United States. He settled in Chicago where was made the head of Illinois Institute of Technology. He worked on exemplary projects such as the Seagram Building and the 860-880 Lakeshore Drive. He also designed the Farnsworth House and the Chicago Federal Center.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1129"><b data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">81.&nbsp;</span></b><strong data-dcnode-id="1130"><b data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Alvar Aalto</span></b></strong></h3><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1123"><a data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alvaraalto.fi/en/information/alvar-aalto/" rel="noopener" target="_self"><u data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Alvar Aalto</span></u></a><span data-dcnode-id="1124" instrument_node="">&nbsp;was born in Finland. He designed buildings for many public institutions and also worked on private homes and standardized housing. He was a popular furniture designer. Artek was established so that sales of Aalto furniture could be promoted.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">One of the major milestones for Alvar Aalto was the Paimio Sanatorium. He designed many public buildings including Säynätsalo Town Hall, the Jyväskylä Institute of Pedagogics and the House of Culture in Helsinki. The most notable urban designs include Seinäjoki city center, Rovaniemi city center and the Jyväskylä administrative and cultural center which was only partly built.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Alvar Aalto also worked on many projects, both public and private, outside Finland as well. Most prominent works by Alvar Aalto include:</span></p><span data-dcnode-id="1116" instrument_node="">
</span><ul data-dcnode-id="1105"><span data-dcnode-id="1115" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">City Library, Vyborg, Russia</span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">Villa Mairea, Noormarkku, Finland</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Finnish Church of the Holy Ghost, Wolfsburg, Germany</span></li><span data-dcnode-id="1106" instrument_node="">
</span></ul><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1098"><b data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">82.&nbsp;</span></b><strong data-dcnode-id="1099"><b data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Skidmore, Owings &amp; Merrill</span></b></strong></h3><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1096" instrument_node="">The westerners,&nbsp;</span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.architecturaldigest.com/gallery/som-architecture" rel="noopener" target="_self"><u data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Skidmore, Owings, and Merrill</span></u></a><span data-dcnode-id="1092" instrument_node=""> establish SOM in the 1930s in Chicago. The firm was established when the city was trying to establish itself taller and bigger than New York. Skidmore, Owings &amp; Merrill worked on numerous projects, not only in Chicago but throughout the world that are all primarypieces of modern architecture.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">The most prominent works by the firm include the following:</span></p><span data-dcnode-id="1087" instrument_node="">
