</span><section class="l-guide-section withCallToAction _text-collection _first-guide-section" data-dcnode-id="1302"><span data-dcnode-id="1391" instrument_node="">
</span><div class="l-guide-section__inner" data-dcnode-id="1304"><span data-dcnode-id="1390" instrument_node="">
</span><div class="o-content" data-dcnode-id="1306"><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1388" instrument_node="">The Eiffel Tower is a wrought iron tower that stands </span><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">1,063 ft (324 m) tall</span></strong><span data-dcnode-id="1385" instrument_node="">. It was designed for the </span><strong data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Exposition Universelle, a world fair held in Paris in 1889</span></strong><span data-dcnode-id="1382" instrument_node="">. It is currently the most famous symbol of Paris.</span></p><span data-dcnode-id="1380" instrument_node="">
</span><h2 data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Origin</span></h2><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1376" instrument_node="">Two senior engineers working for the architect and engineer Gustave Eiffel designed the Tower, which was then approved by Eiffel and proposed as the centrepiece for the world fair held in France’s capital, the Exposition Universelle in 1889. Once approved, 250 builders were hired to build the monument, which took </span><strong data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">over two years to finish.</span></strong></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1371" instrument_node="">Initially, the Eiffel Tower was subject of controversy. The artists of the period thought the monument to be monstrous, and given its poor profitability,&nbsp;</span><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">it was suggested on several occasions that they should demolish it.</span></strong></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">During World War I, enemy messages were intercepted thanks to the </span><strong data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">tower radiotelegraphy centre</span></strong><span data-dcnode-id="1363" instrument_node="">.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">Currently, the Eiffel Tower is the </span><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">most-visited monument in the world with over 7 million visitors a year.</span></strong><span data-dcnode-id="1357" instrument_node=""> This is partly due to the popularity of Paris as a tourist&nbsp;destination. &nbsp;&nbsp;</span></p><span data-dcnode-id="1355" instrument_node="">
</span><h2 data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Visiting the Eiffel Tower</span></h2><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1351" instrument_node="">If it’s your first time in Paris, </span><strong data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">going up the Eiffel Tower is a must</span></strong><span data-dcnode-id="1348" instrument_node="">. Visitors can </span><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">choose to go up using the Tower lift or the stairs. </span></strong><span data-dcnode-id="1345" instrument_node="">However, before making your mind up on how you want to visit the monument, it is important to keep in mind that there are </span><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">1,665 steps to the top</span></strong><span data-dcnode-id="1342" instrument_node="">.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">If you decide to take the stairs, you can only visit the second floor. </span></strong><span data-dcnode-id="1337" instrument_node="">Although the stairs admission ticket is cheaper, the difference is not worthwhile and we recommend taking the elevator.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1334" instrument_node="">The best moment to enjoy the breath-taking views of Paris is </span><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">early in the morning</span></strong><span data-dcnode-id="1331" instrument_node=""> to avoid the lines or </span><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">at dusk, when visitors will see Paris lit up.</span></strong></p><span data-dcnode-id="1327" instrument_node="">
</span><h2 data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Eiffel Tower Tickets</span></h2><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">If you want to avoid the long lines at the Eiffel tower ticket office, the best option is to buy your tickets online. You can buy tickets via the official website or reserve our guided tour</span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.civitatis.com/en/paris/eiffel-tower-tickets/" title="Eiffel Tower Tickets"><span data-dcnode-id="1322" instrument_node="">&nbsp;</span></a><span data-dcnode-id="1320" instrument_node="">which also lets you skip the queues:</span></p><span data-dcnode-id="1318" instrument_node="">
</span><ul data-dcnode-id="1308"><span data-dcnode-id="1317" instrument_node="">
