</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">I must have been around four years old when I first 'climbed' the Eiffel Tower. I told my father I wanted to walk up the stairs, as one does at that age. </span></p><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">He relented of course, and within a minute I was in his arms, being carried up 328 steps. </span></p><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">I was never able to pull that trick on him again, but I still remember the awe and wonder (and yes, a little bit of terror) at seeing Paris, already beautiful, stretched out below so perfectly even a four-year old could catch her breath.</span></p><p data-dcnode-id="1202"><span data-dcnode-id="1203" style="background-color: initial;"><span data-dcnode-id="1207" instrument_node="">I've returned since then, riding up the easy way, and each time, I discover something new about the first Iron Lady － things I never expected to find. She truly is one of the more </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/off-the-beaten-path-in-paris.html"><span data-dcnode-id="1206" instrument_node="">unusual sights of Paris</span></a><span data-dcnode-id="1204" instrument_node="">&nbsp;and one of your must-see places when you travel to the city.</span></span></p><span data-dcnode-id="1201" instrument_node="">
</span><span data-dcnode-id="1199" instrument_node="">
</span><span data-dcnode-id="1197" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="1170" style="background-color: #f7ecc3; box-sizing: border-box"><div class="responsive_grid_block-2 responsive_grid_block-244320898" data-dcnode-id="1173"><div class="responsive-row" data-dcnode-id="1175"><div class="responsive_col-1 responsive_grid_block-244320898" data-dcnode-id="1187"><span data-dcnode-id="1196" instrument_node="">
</span><div class="SpacerTiny" data-dcnode-id="1193" style="box-sizing: border-box"><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1192" instrument_node="">
</span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Eiffels-Tower-Thrilling-Extraordinary-Introduced/dp/0143117297%3Fcrid%3D1MP0GZTPFVFR3%26keywords%3Deiffel%2Bjill%2Bjonnes%26qid%3D1646252382%26s%3Dbooks%26sprefix%3Deiffel%2Bjill%2Bjonnes%252Cstripbooks-intl-ship%252C158%26sr%3D1-1%26linkCode%3Dli3%26tag%3Dwomontheroa-20%26linkId%3D8a06093aecee190b3fc694f6164e5021%26language%3Den_US%26ref_%3Das_li_ss_il" rel="noopener nofollow" target="_blank"><img border="0" data-dcnode-id="1191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3D0143117297%26Format%3D_SL250_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dwomontheroa-20%26language%3Den_US&amp;raw"></a><img alt="" border="0" data-dcnode-id="1189" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dwomontheroa-20%26language%3Den_US%26l%3Dli3%26o%3D1%26a%3D0143117297&amp;raw" style="border:none !important; margin:0px !important;" width="1"><span data-dcnode-id="1188" instrument_node="">
</span></div><div class="responsive_col-2 responsive_grid_block-244320898" data-dcnode-id="1176"><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1185" instrument_node="">Author&nbsp;Jill Jonnes tells us the story of the Eiffel Tower, but not only. She veers out into the world and explores the World's Fair for which Eiffel built his tower, a snapshot of the times. Eiffel may be the lead actor, but there are plenty of supporting roles: Buffalo Bill and Annie Oakley, Thomas Edison and Vincent van Gogh. BUY on </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3Kca4Ra" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1184" instrument_node="">AMAZON</span></a><span data-dcnode-id="1182" instrument_node=""> or from your </span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookshop.org/a/81870/9780143117292" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1181" instrument_node="">independent bookshop</span></a><span data-dcnode-id="1179" instrument_node="">.</span></p><span data-dcnode-id="1177" instrument_node="">
</span></div></div></div><span data-dcnode-id="1171" instrument_node="">
</span></div><span data-dcnode-id="1169" instrument_node="">
</span><h2 data-dcnode-id="1167" id="eiffelnotbuilt"><span data-dcnode-id="1168" instrument_node="">how The eiffel tower almost didn't get built</span></h2><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">There's no getting around your Eiffel Tower history lesson, but bear with me because some of these things will be new, even to you!</span></p><p data-dcnode-id="1161"><span data-dcnode-id="1162" style="background-color: initial;"><span data-dcnode-id="1163" instrument_node="">First, the big picture. </span></span></p><p data-dcnode-id="1151"><span data-dcnode-id="1156" style="background-color: initial;"><span data-dcnode-id="1160" instrument_node="">The tower was built by (or under the oversight of) French civil engineer Gustave Eiffel in honour of the 1889 Exposition Universelle, or World's Fair, at the height of the </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/belle-epoque-in-france.html"><span data-dcnode-id="1159" instrument_node="">Belle Époque</span></a><span data-dcnode-id="1157" instrument_node="">. The fair would</span></span><span data-dcnode-id="1154" style="background-color: initial;"><span data-dcnode-id="1155" instrument_node="">&nbsp;celebrate the 100th anniversary of the French Revolution,&nbsp;</span></span><span data-dcnode-id="1152" style="background-color: initial;"><span data-dcnode-id="1153" instrument_node="">at a time of rapid modernization and innovation. </span></span></p><p data-dcnode-id="1148"><span data-dcnode-id="1149" style="background-color: initial;"><span data-dcnode-id="1150" instrument_node="">This particular design won the competition but Paris was appalled. The monstrous structure, as it was called, wouldn't exactly fit in with classical Parisian architecture, and anyone who was anyone fought to prevent its building. (You may recall similar arguments were made about the Louvre pyramid, now accepted and yes, even beloved).</span></span></p><span data-dcnode-id="1147" instrument_node="">
</span><h3 data-dcnode-id="1145" id="whodesignedeiffel"><span data-dcnode-id="1146" instrument_node="">Who designed the Eiffel Tower, really?</span></h3><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1142" style="background-color: initial;"><span data-dcnode-id="1143" instrument_node="">Although it was named after Gustave, the tower was actually designed by two engineers (Maurice Koechlin and Émile Nouguier)&nbsp;</span></span><span data-dcnode-id="1140" style="background-color: initial;"><span data-dcnode-id="1141" instrument_node="">and an architect (</span></span><span data-dcnode-id="1138" style="background-color: initial;"><span data-dcnode-id="1139" instrument_node="">Stephen Sauvestre), all of whom worked for Eiffel. </span></span></p><p data-dcnode-id="1134"><span data-dcnode-id="1135" style="background-color: initial;"><span data-dcnode-id="1136" instrument_node="">In fact, when the engineers first showed him their original design, he didn't even like it and it required several iterations before he gave it the green light. </span></span></p><p data-dcnode-id="1130"><span data-dcnode-id="1132" style="background-color: initial;"><span data-dcnode-id="1133" instrument_node="">The original design had a central pylon and sat on a monumental arch. Yes, I can imagine how awful that might look.</span></span><br data-dcnode-id="1131"></p><span data-dcnode-id="1129" instrument_node="">
</span><h3 data-dcnode-id="1126" id="eiffelspeedrecord"><span data-dcnode-id="1128" instrument_node="">Building the tower broke every speed record</span><br data-dcnode-id="1127"></h3><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The initial sketch was drawn up in 1884 and the first foundations poured in 1887. I won't get into the detail of the concrete slabs and girders and limestone blocks but suffice it to say that at the time, the work was monumental and extremely complex, with designs specified to within 1mm (and they weren't off, they were perfect). Scaffolding was made of wood and small cranes were raised along the tower as it was built, a bit hard to imagine today.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1122" instrument_node="">Bits and pieces of the tower were manufactured in the nearby&nbsp;</span><span data-dcnode-id="1120" style="background-color: initial;"><span data-dcnode-id="1121" instrument_node="">Parisian suburb of Levallois-Perret and brought to the site by horse and cart.&nbsp;</span></span><span data-dcnode-id="1118" style="background-color: initial;"><span data-dcnode-id="1119" instrument_node="">In all, 18,038 pieces were assembled using 2.5 million rivets, and based on&nbsp;</span></span><span data-dcnode-id="1116" style="background-color: initial;"><span data-dcnode-id="1117" instrument_node="">1,700 general drawings and 3,629 detailed drawings. More than 300 people were involved in the construction work, which benefited from plenty of safety features, such as rails and screens to prevent workers from falling. The official death toll was a single death (although a contemporary blurb in the New York Times hinted that as many as 100 might have died).</span></span></p><span data-dcnode-id="1114" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="1112"><img alt="Interesting facts Eiffel Tower - stages of construction" class="ss-lazy loaded" data-dcnode-id="1113" data-pin-media="https://www.offbeatfrance.com/images/eiffel-tower-construction.jpeg" data-src="https://www.offbeatfrance.com/images/eiffel-tower-construction.jpeg" data-was-processed="true" height="468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/images/eiffel-tower-construction.jpeg&amp;raw" style="width: 800px; height: auto" title="Interesting facts Eiffel Tower - stages of construction" width="800"></div><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" style="background-color: initial;"><span data-dcnode-id="1110" instrument_node="">Despite the record-breaking construction (it took 2 years, 2 months and 5 days), it was such a complex undertaking that many people thought it would never be built... and if it did, that it would topple over at the first gust of wind and destroy the beauty that was Paris.</span></span></p><span data-dcnode-id="1107" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="1078" style="background-color: #f7ecc3; box-sizing: border-box"><div class="responsive_grid_block-2 responsive_grid_block-244320907" data-dcnode-id="1081"><div class="responsive-row" data-dcnode-id="1083"><div class="responsive_col-1 responsive_grid_block-244320907" data-dcnode-id="1097"><span data-dcnode-id="1106" instrument_node="">
</span><div class="SpacerTiny" data-dcnode-id="1103" style="box-sizing: border-box"><span data-dcnode-id="1104" instrument_node="">
</span></div><span data-dcnode-id="1102" instrument_node="">
</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Eiffel-Tower-History-Famous-Landmark/dp/1511735643%3F_encoding%3DUTF8%26qid%3D1646253077%26sr%3D1-1%26linkCode%3Dli3%26tag%3Dwomontheroa-20%26linkId%3D594343fa6c37ef668f1f976ecf484f53%26language%3Den_US%26ref_%3Das_li_ss_il" rel="noopener nofollow" target="_blank"><img border="0" data-dcnode-id="1101" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3D1511735643%26Format%3D_SL250_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dwomontheroa-20%26language%3Den_US&amp;raw"></a><img alt="" border="0" data-dcnode-id="1099" height="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dwomontheroa-20%26language%3Den_US%26l%3Dli3%26o%3D1%26a%3D1511735643&amp;raw" style="border:none !important; margin:0px !important;" width="1"><span data-dcnode-id="1098" instrument_node="">
</span></div><div class="responsive_col-2 responsive_grid_block-244320907" data-dcnode-id="1084"><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">This is the Eiffel book for your inner engineer. Less of a story, more of a reference, the book you need if you want to know how the tower was built, and see a few of the original drawings and photographs. Not a light read, but a great reference. </span></p><p data-dcnode-id="1086"><span data-dcnode-id="1093" instrument_node="">BUY on </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3hzvco8" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1092" instrument_node="">AMAZON</span></a><span data-dcnode-id="1090" instrument_node=""> or from your </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bookshop.org/a/81870/9781511735643" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1089" instrument_node="">independent bookshop</span></a><span data-dcnode-id="1087" instrument_node="">.</span></p><span data-dcnode-id="1085" instrument_node="">
</span></div></div></div><span data-dcnode-id="1079" instrument_node="">
</span></div><span data-dcnode-id="1077" instrument_node="">
</span><h3 data-dcnode-id="1075" id="eiffelmaligned"><span data-dcnode-id="1076" instrument_node="">It was a tower much maligned...</span></h3><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">As soon as Paris saw the plans, it was up in arms.&nbsp;</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">"This high and skinny pyramid of iron ladders," wrote Guy de Maupassant.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1069" instrument_node="">"A half-built factory pipe," clamored French art critic&nbsp;</span><span data-dcnode-id="1067" style="background-color: initial;"><span data-dcnode-id="1068" instrument_node="">Joris-Karl Huysmans.</span></span></p><p data-dcnode-id="1061"><span data-dcnode-id="1064" style="background-color: initial;"><span data-dcnode-id="1065" instrument_node="">"This truly tragic street lamp," Catholic essayist&nbsp;</span></span><span data-dcnode-id="1062" style="background-color: initial;"><span data-dcnode-id="1063" instrument_node="">Léon Bloy called it.</span></span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">These and other artistic luminaries formed the ‘Committee of Three Hundred’, one member for each meter of the tower's height.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1058" instrument_node="">Criticism and insults were flung around, leading to a highly publicized open letter by artists and writers to</span><span data-dcnode-id="1056" style="background-color: initial;"><span data-dcnode-id="1057" instrument_node="">&nbsp;the exhibition's authorities and which was published in&nbsp;</span></span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Le Temps</span></em><span data-dcnode-id="1052" style="background-color: initial;"><span data-dcnode-id="1053" instrument_node="">:</span></span><br data-dcnode-id="1051"></p><span data-dcnode-id="1049" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="1038" style="box-sizing: border-box"><h3 data-dcnode-id="1046"><span data-dcnode-id="1047" style="color: rgb(13, 57, 147);"><span data-dcnode-id="1048" instrument_node="">An extract of the open letter, 1887</span></span></h3><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">"We come, we writers, painters, sculptors, architects, lovers of the beauty of Paris which was until now intact, to protest with all our strength and all our indignation, in the name of the underestimated taste of the French, in the name of French art and history under threat, against the erection in the very heart of our capital, of the useless and monstrous Eiffel Tower which popular ill-feeling, so often an arbiter of good sense and justice, has already christened the Tower of Babel. (...) </span></p><p data-dcnode-id="1040"><span data-dcnode-id="1042" instrument_node="">To comprehend what we are arguing one only needs to imagine for a moment a tower of ridiculous vertiginous height dominating Paris, just like a gigantic black factory chimney, its barbarous mass overwhelming and humiliating all our monuments and belittling our works of architecture, which will just disappear before this stupefying folly."</span><br data-dcnode-id="1041"></p><span data-dcnode-id="1039" instrument_node="">
</span></div><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Eiffel, not one to bite his tongue, was quick to reply. Here's an excerpt of what he had to say.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="1025" style="box-sizing: border-box"><h3 data-dcnode-id="1031"><span data-dcnode-id="1032" style="color: rgb(13, 57, 147);"><span data-dcnode-id="1033" instrument_node="">Part of Eiffel's response</span></span></h3><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1029" instrument_node="">"For my part I believe that the Tower will possess its own beauty. Are we to believe that because one is an engineer, one is not preoccupied by beauty in one's constructions, or that one does not seek to create elegance as well as solidity and durability ? Is it not true that the very conditions which give strength also conform to the hidden rules of harmony ? (...) Now to what phenomenon did I have to give primary concern in designing the Tower ? It was wind resistance."</span><br data-dcnode-id="1028"></p><span data-dcnode-id="1026" instrument_node="">
</span></div><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">The Eiffel Tower controversy faded once the tower was built, however. It was a stunning success, and welcomed two million visitors during the World's Fair alone. Today, of course, it is among the world's most visited attractions (some say </span><em data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">the</span></em><span data-dcnode-id="1020" instrument_node=""> most visited).</span></p><span data-dcnode-id="1018" instrument_node="">
</span><h3 data-dcnode-id="1016" id="eiffeltemporary"><span data-dcnode-id="1017" instrument_node="">The Eiffel Tower was only supposed to stay up a few years</span></h3><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Funny thing though, the tower wasn't supposed to stay up. </span></p><p data-dcnode-id="1009"><span data-dcnode-id="1012" instrument_node="">It was designed to be dismantled after 20 years, once Eiffel had recouped his 80% investment, and sold off&nbsp;</span><span data-dcnode-id="1010" style="background-color: initial;"><span data-dcnode-id="1011" instrument_node="">for scrap metal. (The mind liquefies.)&nbsp;</span></span></p><p data-dcnode-id="1006"><span data-dcnode-id="1007" style="background-color: initial;"><span data-dcnode-id="1008" instrument_node="">Rather than see his masterpiece destroyed, Eiffel hatched a plan: it involved science.&nbsp;</span></span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" style="background-color: initial;"><span data-dcnode-id="1005" instrument_node="">If he could demonstrate its scientific value, he would guarantee its survival. This was, after all, an era of great inventions. So he built an antenna on top of the tower and launched a series of successful wireless experiments, which caught the attention of the French military, and the rest is history.</span></span></p><p data-dcnode-id="998"><span data-dcnode-id="1001" style="background-color: initial;"><span data-dcnode-id="1002" instrument_node="">When</span></span><span data-dcnode-id="999" style="background-color: initial;"><span data-dcnode-id="1000" instrument_node="">&nbsp;World War I erupted a few years later, the tower's value as a radio transmitter was consolidated and it became essential to communications with ships and to intercept enemy transmissions.&nbsp;</span></span></p><p data-dcnode-id="995"><span data-dcnode-id="996" style="background-color: initial;"><span data-dcnode-id="997" instrument_node="">But every so often, the tower's existence came under threat.&nbsp;</span></span></p><p data-dcnode-id="992"><span data-dcnode-id="993" style="background-color: initial;"><span data-dcnode-id="994" instrument_node="">Towards the end of World War II, Hitler, incensed at his failure to win the war, ordered Paris razed, and the tower along with it. Fortunately, the city's German military governor at the time,&nbsp;Dietrich von Choltiz, was (like many) convinced Hitler had gone crazy and simply ignored the order. We thank him for that.</span></span></p><p data-dcnode-id="989"><span data-dcnode-id="990" style="background-color: initial;"><span data-dcnode-id="991" instrument_node="">Then, in the 1960s, President Charles de Gaulle had planned to dismantle the Eiffel Tower and send it to Montreal for Expo 67, having apparently made a secret deal with Quebec. Thankfully, the Eiffel Tower's management said No, not trusting the government to bring it back.</span></span></p><p data-dcnode-id="984"><span data-dcnode-id="987" style="background-color: initial;"><span data-dcnode-id="988" instrument_node="">There have been plenty of&nbsp; movies about its destruction and&nbsp;</span></span><span data-dcnode-id="985" style="background-color: initial;"><span data-dcnode-id="986" instrument_node="">threats against it, but she still stands, an emblem of daring and a symbol of French technological genius (or insanity, if you were living in pre-tower Paris), not to mention the more than 120 broadcast antennae that sit at its summit.</span></span></p><span data-dcnode-id="983" instrument_node="">
</span><h3 data-dcnode-id="981" id="eiffelapartment"><span data-dcnode-id="982" instrument_node="">The Eiffel Tower secret room (but you knew about it, right?)</span></h3><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="979" instrument_node="">I love the fact that Eiffel built himself a secret apartment inbu the Eiffel Tower</span><span data-dcnode-id="977" style="background-color: initial;"><span data-dcnode-id="978" instrument_node="">&nbsp;.</span></span></p><p data-dcnode-id="973"><span data-dcnode-id="974" style="background-color: initial;"><span data-dcnode-id="975" instrument_node="">And all of Paris, those same Parisians who had vilified Eiffel for even building the tower, clamoured for an invite 'up there', 285 meters above Paris. High society cajoled, begged and even tried to rent the apartment but Eiffel stood firm, possibly smarting from the earlier snubs. Instead, he stuck to a rarefied guest list of his own choosing, the most often-cited guest being Thomas Edison, who apparently gave Eiffel a sound recording machine.</span></span></p><p data-dcnode-id="970"><span data-dcnode-id="971" style="background-color: initial;"><span data-dcnode-id="972" instrument_node="">The Eiffel Tower secret apartment was a cosy place (compared to the rest of the modern metallic tower), with a bathroom and a bit of furniture － but no bedroom, which hints the owner never intended to live there. Indeed, he used it to entertain guests, of course, but mostly to run weather and aerodynamic experiments, because it was ideally situated at the top.</span></span></p><p data-dcnode-id="967"><span data-dcnode-id="968" style="background-color: initial;"><span data-dcnode-id="969" instrument_node="">You can't enter the apartment but you can see it through a special window – along with wax statues of Eiffel, his daughter Claire and Thomas Edison – if you go to the top of the Eiffel Tower.</span></span></p><span data-dcnode-id="966" instrument_node="">
</span><span data-dcnode-id="964" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="954" style="background-color: #b1e0d4; box-sizing: border-box"><p data-dcnode-id="956"><span data-dcnode-id="957" style="font-size: 20px;"><span data-dcnode-id="962" style="color: rgb(236, 25, 32);"><span data-dcnode-id="963" instrument_node="">➽</span></span><span data-dcnode-id="961" instrument_node="">&nbsp; Get your tickets to the top of the Eiffel Tower </span><a data-dcnode-id="959" data-gyg-scraped="1651068191521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.getyourguide.com/paris-l16/eiffel-tower-direct-access-with-host-to-summit-by-elevator-t387464/%3Fpartner_id%3DNESA9VR%26utm_medium%3Donline_publisher%26placement%3Dcontent-middle" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="960" instrument_node="">HERE</span></a><span data-dcnode-id="958" instrument_node="">.</span></span></p><span data-dcnode-id="955" instrument_node="">
</span></div><span data-dcnode-id="953" instrument_node="">
</span><span data-dcnode-id="951" instrument_node="">
</span><h3 data-dcnode-id="949" id="eiffelnames"><span data-dcnode-id="950" instrument_node="">The secret names engraved into the tower</span></h3><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">Far below the apartment, below the first floor balcony, 72 prominent French scientists and engineers involved in designing the tower had their names engraved into the metal and painted gold. It's worth noting that these scientists weren't modern － most had been active during the French Revolution of the end of the 18th century. Their names remind us of past genius, and are also familiar as street names: Rue Foucault in Paris, named for Léon Foucault of pendulum fame, who proved that the earth rotates; Rue Gay-Lussac, also in Paris, for the French chemist who pioneered the study of gas movements; Rue Joseph Fourier in Chartres, in honour of the mathematician who undertook ground-breaking work in heat transfer and vibrations; and the Rue Ampère, for André-Marie Ampère, founder of the science of electromagnetism. (Here's </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_the_72_names_on_the_Eiffel_Tower" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="946" instrument_node="">the full list of names</span></a><span data-dcnode-id="944" instrument_node="">, if you're curious.)</span></p><p data-dcnode-id="939"><span data-dcnode-id="941" style="background-color: initial;"><span data-dcnode-id="942" instrument_node="">At some point the engravings were, sadly, covered up. But sensibly, the tower's management restored the names in the 1980s and, a few years ago, had their tarnished surface repainted in gold.</span></span><br data-dcnode-id="940"></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Lovely as the homage might be, the list is male only and doesn't include the name of mathematician Sophie Germain, despite her important work on the theory of elasticity, vital to building the Eiffel Tower. Surely she wasn't left out because she was a woman...</span></p><span data-dcnode-id="936" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="932"><img alt="names Eiffel Tower" class="ss-lazy" data-dcnode-id="935" data-pin-media="https://www.offbeatfrance.com/images/names-eiffel-tower.jpg" data-src="https://www.offbeatfrance.com/images/names-eiffel-tower.jpg" height="534" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20534'%3E%3C/svg%3E" style="width: 800px; height: auto" title="names Eiffel Tower" width="800"><span class="Caption CaptionCenter" data-dcnode-id="933" style="max-width:800px"><span data-dcnode-id="934" instrument_node="">Spot the names?</span></span></div><span data-dcnode-id="931" instrument_node="">
</span><div data-dcnode-id="929" data-gyg-href="https://widget.getyourguide.com/default/activities.frame" data-gyg-locale-code="en-US" data-gyg-number-of-items="3" data-gyg-partner-id="NESA9VR" data-gyg-tour-ids="193898,52707,403886" data-gyg-widget="activities" data-gyg-widget-created="1651068192129" style="height: 608px;"><iframe data-dcnode-id="930" data-gyg-scraped="1651068192518" frameborder="0" name="GYG-23ce860d-f6d6-4e4b-afcc-2f66c371f46f" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widget.getyourguide.com/default/activities.frame%3Flocale_code%3Den-US%26widget%3Dactivities%26number_of_items%3D3%26partner_id%3DNESA9VR%26tour_ids%3D193898%252C52707%252C403886%26widget_created%3D1651068192129%26website%3Dhttps%253A%252F%252Fwww.offbeatfrance.com%252Fsecrets-of-the-eiffel-tower.html%26visitor_id%3D4C70F71E501B477785B9539F8B4E608E&amp;raw" style="border: none; position: relative; visibility: visible; display: block; margin: 0px; padding: 0px; width: 100%; height: 100%;"></iframe></div><span data-dcnode-id="928" instrument_node="">
</span><h3 data-dcnode-id="926" id="eiffelother"><span data-dcnode-id="927" instrument_node="">You'll be surprised at what else was built by Eiffel</span></h3><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="924" instrument_node="">We know him for the Eiffel Tower, but that's not his only claim to fame. Gustave Eiffel was born in </span><a data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/dijon-owl-trail.html"><span data-dcnode-id="923" instrument_node="">Dijon</span></a><span data-dcnode-id="921" instrument_node=""> (of mustard fame) and, fascinated by metal structures, started his own construction and research firm, with considerable success.</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" style="background-color: initial;"><span data-dcnode-id="919" instrument_node="">His many non-tower accomplishments include these:</span></span></p><ul data-dcnode-id="895"><li data-dcnode-id="914"><span data-dcnode-id="915" style="background-color: initial;"><span data-dcnode-id="916" instrument_node="">his first major work was the metallic railway bridge in Bordeaux</span></span></li><li data-dcnode-id="911"><span data-dcnode-id="912" style="background-color: initial;"><span data-dcnode-id="913" instrument_node="">it was followed by the iconic Maria Pia bridge spanning the Douro in the Portuguese city of Porto</span></span></li><li data-dcnode-id="908"><span data-dcnode-id="909" style="background-color: initial;"><span data-dcnode-id="910" instrument_node="">the Budapest Western rail station</span></span></li><li data-dcnode-id="905"><span data-dcnode-id="906" style="background-color: initial;"><span data-dcnode-id="907" instrument_node="">several viaducts in France</span></span></li><li data-dcnode-id="902"><span data-dcnode-id="903" style="background-color: initial;"><span data-dcnode-id="904" instrument_node="">the Pont de les Peixateries Velles in Girona, Spain</span></span></li><li data-dcnode-id="899"><span data-dcnode-id="900" style="background-color: initial;"><span data-dcnode-id="901" instrument_node="">the dome of Nice's observatory</span></span></li><li data-dcnode-id="896"><span data-dcnode-id="897" style="background-color: initial;"><span data-dcnode-id="898" instrument_node="">and － a lasting accomplishment － the internal metal structure of the Statue of Liberty.</span></span></li></ul><span data-dcnode-id="894" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="890"><img class="ss-lazy" data-dcnode-id="893" data-pin-media="https://www.offbeatfrance.com/images/girona-eiffel-bridge.jpg" data-src="https://www.offbeatfrance.com/images/girona-eiffel-bridge.jpg" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20800%20600'%3E%3C/svg%3E" style="width: 800px; height: auto" width="800"><span class="Caption CaptionCenter" data-dcnode-id="891" style="max-width:800px"><span data-dcnode-id="892" instrument_node="">And to think I not only walked across but photographed the Pont de les Peixateries Velles in Girona, Spain, without ever knowing it had been designed by Eiffel... ©OffbeatFrance</span></span></div><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" style="background-color: initial;"><span data-dcnode-id="888" instrument_node="">His last effort was his most noteworthy － in terms of failure: the locks of the Panama Canal, a venture that ended in scandal when the company building the canal (not his) was liquidated. Eiffel, who wasn't at fault, was nonetheless fined and imprisoned for a while.</span></span></p><span data-dcnode-id="885" instrument_node="">
</span><h3 data-dcnode-id="883" id="eiffelscience"><span data-dcnode-id="884" instrument_node="">How the Eiffel Tower was saved by science</span></h3><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The Eiffel Tower's scientific vocation has been well documented.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">We know about the meteorology lab on the third floor and its experiments with aerodynamics and physics. But what you might not know is that Eiffel shared his 'lab' with plenty of other scientists. An intriguing discovery was made here: cosmic rays, those tiny high-energy particles that come from outer space.</span></p><p data-dcnode-id="875"><span data-dcnode-id="877" instrument_node="">Vastly more mundane and arguable most useful was Eiffel's invention of the garbage chute, concocted in response to the need to evacuate all the construction material from the tower during building － there was no space to store waste in the tower itself. It was at the time a simple invention: a long hollow tube fixed to the tower frame, through which the garbage found its way downward.</span><br data-dcnode-id="876"></p><span data-dcnode-id="874" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="824" style="background-color: #f0cece; box-sizing: border-box"><h3 data-dcnode-id="871"><span data-dcnode-id="872" style="color: rgb(13, 57, 147);"><span data-dcnode-id="873" instrument_node="">Best hotels with Eiffel Tower view*</span></span></h3><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="868" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;color: rgb(227, 31, 31);"><span data-dcnode-id="869" instrument_node="">➽</span></span><span data-dcnode-id="866" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;"><span data-dcnode-id="867" instrument_node="">&nbsp;</span></span><span data-dcnode-id="857" style="font-size: 20px;font-family: 'Fira Sans Condensed', Arial, Helvetica, sans-serif;"><span data-dcnode-id="865" instrument_node="">LUXURY: </span><a data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/ha-tel-plaza-atha-c-na-c-e-paris.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="864" instrument_node="">Plaza Athénée</span></a><span data-dcnode-id="862" instrument_node=""> and&nbsp;</span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/raphael.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="861" instrument_node="">Raphaël</span></a><span data-dcnode-id="859" instrument_node="">&nbsp;</span><br data-dcnode-id="858"></span><span data-dcnode-id="855" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;color: rgb(227, 31, 31);"><span data-dcnode-id="856" instrument_node="">➽</span></span><span data-dcnode-id="853" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;"><span data-dcnode-id="854" instrument_node="">&nbsp;</span></span><span data-dcnode-id="845" style="font-size: 20px;font-family: 'Fira Sans Condensed', Arial, Helvetica, sans-serif;"><span data-dcnode-id="852" instrument_node="">MID-RANGE: </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/le-littre.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="851" instrument_node="">Le Littré</span></a><span data-dcnode-id="849" instrument_node=""> and </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/duquesneeiffel.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="848" instrument_node="">Duquesne</span></a><br data-dcnode-id="846"></span><span data-dcnode-id="843" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;color: rgb(227, 31, 31);"><span data-dcnode-id="844" instrument_node="">➽</span></span><span data-dcnode-id="841" style="font-family: 'Bree Serif', Georgia, Times, serif;font-size: 22px;text-align: center;"><span data-dcnode-id="842" instrument_node="">&nbsp;</span></span><span data-dcnode-id="833" style="font-size: 20px;font-family: 'Fira Sans Condensed', Arial, Helvetica, sans-serif;"><span data-dcnode-id="840" instrument_node="">BUDGET: </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/hotel-le-relais-saint-charles.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="839" instrument_node="">Relais Saint-Charles</span></a><span data-dcnode-id="837" instrument_node=""> and </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.booking.com/hotel/fr/ramada-paris-toureiffel.en-gb.html%3Faid%3D1130222" onclick="return FIX.track(this);" rel="noopener nofollow" target="_blank"><span data-dcnode-id="836" instrument_node="">Le Parisis</span></a><span data-dcnode-id="834" instrument_node="">&nbsp;("budget" is a relative term in Paris)</span></span></p><p data-dcnode-id="826"><span data-dcnode-id="827" style="font-size: 20px;font-family: 'Fira Sans Condensed', Arial, Helvetica, sans-serif;"><span data-dcnode-id="831" instrument_node="">* </span><span data-dcnode-id="828" style="font-size: 18px;"><em data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Only certain rooms in each hotel have an Eiffel Tower view.</span></em></span></span></p><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span><h3 data-dcnode-id="821" id="eiffelads"><span data-dcnode-id="822" instrument_node="">Yes, you can advertise on the Eiffel Tower (if you have a good cause)</span></h3><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">A structure as tall and as visible as the Eiffel Tower is irresistible, commercially speaking. Whatever it wears will be seen by every Parisian. </span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">So it is with no surprise that in 1925, carmaker Citroen was able to stick its name down the entire length of the tower, an ugly reminder that all is fair when it comes to business. That habit was soon quashed.</span></p><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Less greedy but equally controversial was the proposal by an AIDS charity to clothe the entire tower with a big red condom. The request was turned down but at least the cause was a good one.</span></p><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">But the tower does support worthy causes, such as the fight against cancer, for which it was lit entirely in pin, or in blue (with the 12 stars of the EU flag) to celebrate France's turn at the European Presidency, or yet again as a symbol of the 2015 Paris climate conference － in green.</span></p><p data-dcnode-id="808"><span data-dcnode-id="810" style="background-color: initial;"><span data-dcnode-id="811" instrument_node="">That wasn't the end of it and periodically, someone comes up with an idea to use the Eiffel Tower as a prop or as part of a work of art: a Portuguese artist in 2010 who wanted to cover it in a hand-crocheted quilt, or a wildly expensive 2011 proposal to cover the tower entirely with plants.</span></span><br data-dcnode-id="809"></p><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">But perhaps the most outlandish proposal was the very first one, made when the tower was still being built: to shield sensitive Parisians from the "hollow chandelier", as some called the Eiffel Tower, it should be hidden inside an artificial rock 300m high, with waterfalls cascading down the exterior.</span></p><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Well, not everything is art.</span></p><span data-dcnode-id="803" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="795" style="box-sizing: border-box"><h3 data-dcnode-id="800"><span data-dcnode-id="801" style="color: rgb(13, 57, 147);"><span data-dcnode-id="802" instrument_node="">Some common misspellings of the Eiffel Tower</span></span></h3><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Spelling the name of this famous French landmark isn't necessarily easy, especially if you haven't seen it before and only heard it pronounced... here are some of the more common spellings you might come across for this monument: effel tower, effial tower, tower eiffel, eff tower, eiffel towered, eiffel towers, ifal tower, iffel tower, iffle tower, ifil tower, the iphal tower, effal tower. They may look strange, but think about it: if you've never seen it in writing, the spelling is anything but obvious...</span></p><span data-dcnode-id="796" instrument_node="">

</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="747"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/france-off-the-beaten-path.html" title="Go to France Off The Beaten Path: 12 Unexpected Places You May Not Know"><img alt="Thumbnail - Unexpected places in France, the Camargue" class="ss-lazy" data-dcnode-id="751" data-pin-media="https://www.offbeatfrance.com/images/offbeat-thumbnail.png" data-src="https://www.offbeatfrance.com/images/offbeat-thumbnail.png" height="191" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20191%20191'%3E%3C/svg%3E" style="width: 191px; height: auto" title="Thumbnail - Unexpected places in France, the Camargue" width="191"><span class="Caption CaptionCenter" data-dcnode-id="749" style="max-width:191px"><span data-dcnode-id="750" instrument_node="">12 Unexpected Places You Might Not Know In France</span></span></a></div><span data-dcnode-id="746" instrument_node="">

</span><div class="" data-dcnode-id="675" style="background-color: #ffffff; box-sizing: border-box"><h2 data-dcnode-id="734" id="eiffelfacts"><span data-dcnode-id="735" instrument_node="">You want more facts about the eiffel tower? No problem.&nbsp;</span></h2><span data-dcnode-id="733" instrument_node="">
</span><ul data-dcnode-id="730"><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Before winning its place in Paris, the Eiffel Tower was first offered to Barcelona, Spain. But the city worried it would be an eyesore (just as Parisians did later) and rejected it. I wonder if they ever had second thoughts.</span></li></ul><ul data-dcnode-id="727"><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">What is the Eiffel Tower made of? Hint: Long before Margaret Thatcher inherited the label, the Eiffel Tower was known as the Iron Lady.&nbsp;</span></li></ul><ul data-dcnode-id="724"><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">The Eiffel Tower was the tallest building in the world － but then New York built the Chrysler Building. So the Eiffel Tower added an antenna and reached past its New York competitor, staying at the head of the list until, eventually, she was surpassed by the Empire State Building.</span></li></ul><ul data-dcnode-id="721"><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">The Tower's first official visitors in 1889 were the British royal family, and Buffalo Bill.</span></li></ul><ul data-dcnode-id="718"><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Doors were thrown open to visitors on 6 May 1889, and the 30,000 visitors had to climb 1,710 steps to reach the top. It took another three weeks for the elevators to open. At the time, the tower's five elevators were the highest and most sophisticated in the world.</span></li></ul><ul data-dcnode-id="715"><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The Eiffel Tower was originally illuminated by 10,000 gas lamps. Now, 20,000 flashbulbs glitter each evening, every hour on the hour. The new lights were put up in 2000 for the millennial festivities and were only supposed to stay up a few years. Like the tower itself, the lights have stayed up long beyond their shut-down date.</span></li></ul><ul data-dcnode-id="712"><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Speaking of evenings, you may know it is illegal to publish photos of the Eiffel Tower lit up at night. The lights are considered a work of art and are protected by copyright, its rights reserved. So each time you see a photo of the Iron Lady at night, remember: it may not be legal.</span></li></ul><ul data-dcnode-id="709"><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The tower shrinks and expands by up to 15cm/6in depending on the season. It is also designed to sway about the same amount in the wind (a good thing or it might snap).</span></li></ul><ul data-dcnode-id="703"><li data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">How tall is the Eiffel Tower? It is 324 meters high, or 1063 feet: it is truly one of </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.offbeatfrance.com/famous-landmarks-in-france.html"><span data-dcnode-id="707" instrument_node="">France's major landmarks</span></a><span data-dcnode-id="705" instrument_node="">.</span></li></ul><ul data-dcnode-id="700"><li data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">It takes 30 painters 18 months to apply a full coat (60 tons) of fresh paint to the tower. It is repainted every seven years. Three shades are used, changing from dark to light as you rise. This actually results in a uniform colour. Painting is done the traditional way, with brushes and rollers. By hand.</span></li></ul><ul data-dcnode-id="697"><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">The tower is kept running by more than 500 staff. You need that for the seven million yearly visitors.</span></li></ul><ul data-dcnode-id="694"><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The tower has to be stocked daily because there is no room to store things, like... four tons of souvenirs, T-shirts, postcards and the like. The seven bars and restaurants require 6-8 tons of food each day.</span></li></ul><ul data-dcnode-id="691"><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">A few years ago, an American woman somehow married the Eiffel Tower. Her new name: Erika La Tour Eiffel. Yep.</span></li></ul><ul data-dcnode-id="688"><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Speaking of marriage, there are two proposals a day at the Tower's Michelin-starred restaurant, Le Jules Verne.</span></li></ul><ul data-dcnode-id="685"><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">The Eiffel Tower was originally intended to stand in which city? Barcelona! But authorities thought it would be an eyesore so... they turned the offer down.</span></li></ul><ul data-dcnode-id="682"><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">And on a final note, the tower has also seen its share of deaths. At least one person died during construction of the Eiffel Tower, although there are hints (unofficial, unsubstantiated) that the figure may have been much higher. After that, in 1912, the 'Flying Tailor',&nbsp;Franz Reichelt, jumped to his death while trying out a homemade parachute. In 1926, Leon Collet, an aviator, flew through the tower's arches, crashing after getting tangled in some cables. In 2009, a young woman killed herself by jumping off, as did a male tourist in 2012, after climbing up the outside frame. Apparently, there are several suicides each year, although the number has never been made public and there are plenty of safety features in place to prevent accidents and discourage those who want to jump.</span></li></ul><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Would you like a virtual Eiffel Tower tour? </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//artsandculture.google.com/streetview/tour-eiffel/sAHt5Gv4YGH84Q%3Fsv_lng%3D2.294758519443887%26sv_lat%3D48.85821778334351%26sv_h%3D97%26sv_p%3D0%26sv_pid%3DK-zqf3wT2zlWLXhztVc_CQ%26sv_z%3D1.0000000000000002" onclick="return FIX.track(this);" rel="noopener" target="_blank"><span data-dcnode-id="680" instrument_node="">Here it is</span></a><span data-dcnode-id="678" instrument_node="">!</span></p><span data-dcnode-id="676" instrument_node="">
