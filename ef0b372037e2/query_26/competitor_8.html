f the Eiffel Tower</span></a></li><li class="top" data-dcnode-id="704"><a data-dcnode-id="705" href="#eiffel-s-firm-produced-5-329-drawings-of-the-eiffel-tower"><span data-dcnode-id="706" instrument_node="">Eiffel’s Firm Produced 5,329 Drawings of the Eiffel Tower</span></a></li><li class="top" data-dcnode-id="701"><a data-dcnode-id="702" href="#gustave-eiffel-compared-his-tower-to-the-pyramids-of-egypt"><span data-dcnode-id="703" instrument_node="">Gustave Eiffel Compared His Tower to the Pyramids of Egypt</span></a></li><li class="top" data-dcnode-id="698"><a data-dcnode-id="699" href="#a-conman-named-victor-lustig-sold-the-eiffel-tower-twice"><span data-dcnode-id="700" instrument_node="">A Conman Named Victor Lustig Sold the Eiffel Tower… Twice!</span></a></li><li class="top" data-dcnode-id="695"><a data-dcnode-id="696" href="#only-one-person-died-in-the-construction-of-the-eiffel-tower"><span data-dcnode-id="697" instrument_node="">Only One Person Died in the Construction of the Eiffel Tower</span></a></li><li class="top" data-dcnode-id="692"><a data-dcnode-id="693" href="#the-eiffel-tower-was-supposed-to-be-torn-down-in-1919"><span data-dcnode-id="694" instrument_node="">The Eiffel Tower Was Supposed to Be Torn Down in 1919</span></a></li><li class="top" data-dcnode-id="689"><a data-dcnode-id="690" href="#over-200-000-000-people-have-visited-the-eiffel-tower"><span data-dcnode-id="691" instrument_node="">Over 200,000,000 People Have Visited the Eiffel Tower</span></a></li></ul></div><h2 class="wpsm_toplist_heading" data-dcnode-id="685" id="the-eiffel-tower-was-the-world-s-tallest-structure-for-41-years"><span data-dcnode-id="686" instrument_node="">The Eiffel Tower Was the World’s Tallest Structure for 41 Years</span></h2><p data-dcnode-id="681"><img alt="Eiffel Tower Facts" class="alignright size-full wp-image-2757 lazyloaded" data-dcnode-id="684" data-lazy-sizes="(max-width: 300px) 100vw, 300px" data-lazy-src="//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg" data-lazy-srcset="//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg 300w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-150x150.jpg 150w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-768x768.jpg 768w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-1024x1024.jpg 1024w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-788x788.jpg 788w" data-was-processed="true" height="300" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg&amp;raw" srcset="//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg 300w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-150x150.jpg 150w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-768x768.jpg 768w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-1024x1024.jpg 1024w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-788x788.jpg 788w" width="300"><noscript data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">&lt;img loading="lazy" class="alignright size-full wp-image-2757" src="//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg" alt="Eiffel Tower Facts" width="300" height="300" srcset="//interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts.jpg 300w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-150x150.jpg 150w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-768x768.jpg 768w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-1024x1024.jpg 1024w, //interesting-facts.com/wp-content/uploads/2019/04/Eiffel-Tower-Facts-788x788.jpg 788w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Eiffel tower facts tell us about this iconic symbol of Paris, France and the world. While the tower is located in Paris, people all around the world know about this famous structure. In recognition, UNESCO has named the Eiffel Tower as one of its World Heritage Sites.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Before the Eiffel Tower was constructed, the Washington Monument in Washington, D.C., capital of the United States, was the tallest man-made structure in the world. Eiffel Tower facts teach us that during its construction, which was completed in 1889, the Eiffel Tower became the tallest man-made structure, surpassing the height of the Washington Monument.</span></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">In 1930, the Chrysler Building was built in New York City, becoming the tallest structure in the world at the time. The Eiffel Tower had held the title for 41 years! Later Eiffel Tower facts show that in 1957, an antenna was attached which, depending on how you determine the height of a structure, made the Eiffel Tower taller than the Chrysler Building.</span></p><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">To this day, at 1,063 feet, or 324 meters, the Eiffel Tower is the second tallest structure in France. The tallest structure in France is actually the world’s tallest bridge, Millau Viaduct, which is 1,125 feet, or 343 meters, from the base to the top of one of its masts.</span></p><span data-dcnode-id="672" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="670" href="#kcmenu"><span data-dcnode-id="671" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="668" id="gustave-eiffel-did-not-design-the-eiffel-tower-maurice-koechlin-did"><span data-dcnode-id="669" instrument_node="">Gustave Eiffel Did Not Design the Eiffel Tower – Maurice Koechlin Did</span></h2><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">This is perhaps the most shocking of Eiffel Tower facts: Gustave Eiffel, the famous architect for whom the structure was named, did not actually design the Eiffel Tower. The initial design was sketched by Maurice Koechlin in May of 1884, while he was working at home.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Eiffel Tower facts reveal that Koechlin was a senior engineer working for Eiffel’s architecture firm at the time. Koechlin was working with another architect in the firm, Emile Nouguier, to design a monument for the 1889 Exposition Universelle. The exposition was planned as a World’s Fair to celebrate the 100-year anniversary of the French Revolution.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">In the margin of the first drawing by Maurice Koechlin, you can see other monuments from around the world that he used for inspiration or comparison. Included in the monuments are the Statue of Liberty and the Arc de Triomphe. This is an amazing document for interesting Eiffel Tower facts and it shows that Koechlin was endeavoring to design something world class from the start.</span></p><span data-dcnode-id="661" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="659" href="#kcmenu"><span data-dcnode-id="660" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="657" id="it-took-3-years-of-lobbying-to-approve-the-eiffel-tower-in-1887"><span data-dcnode-id="658" instrument_node="">It Took 3 Years of Lobbying to Approve the Eiffel Tower in 1887</span></h2><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Eiffel Tower facts surprise us again with the evidence that Gustave Eiffel did not immediately like Maurice Koechlin’s design. Nouguier and Koechlin asked Stephen Sauvestre, the head of the architectural department in Eiffel’s firm, to add some embellishments to the design.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Sauvestre contributed the decorated arches at the base, a glass pavilion on the first level, and other additions to polish the design. The three men took out a patent on the design and presented it to Eiffel once again, in the fall of 1884. This time, the design caught Eiffel’s eye, and he bought the patent and began exhibiting the design.</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Eiffel Tower facts tell us there was a long road from this point to actually getting approval for the project. In 1885 Eiffel presented the design to the Société des Ingiénieurs Civils as a symbol of the dawning Industrial Age and the accomplishments of the previous century, as well as a monument to the French Revolution of 1789.</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Two more years passed, and there were changes in government. Eiffel continued to lobby for the project and it was brought to review by a commission in 1886. Eiffel Tower facts show that the commission examined Eiffel’s proposal, along with competing proposals for the monument.</span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">What happened next is one of the great Eiffel Tower facts for kids. Eiffel’s proposal was chosen because it was the most practical and most well planned. The other proposals seemed impossible or were not completely thought through. Perhaps all the time lobbying for the design paid off: when it came up for review, everything could be explained.</span></p><span data-dcnode-id="646" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="644" href="#kcmenu"><span data-dcnode-id="645" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="642" id="public-funds-only-covered-1-4-of-the-cost-of-the-eiffel-tower"><span data-dcnode-id="643" instrument_node="">Public Funds Only Covered 1/4 of the Cost of the Eiffel Tower</span></h2><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">When Eiffel signed the contract to build the Eiffel Tower, he did so personally, and not on behalf of his company. The public funds granted covered only 1/4 of the total needed to build the tower. As part of the agreement, Eiffel would receive all income from any commercial use of the tower during the exhibition and for the next 20 years.</span></p><p data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">Eiffel Tower facts show that Eiffel setup a separate company to manage the operations and income of the tower. He put up half the capital that was needed to establish the company. For Gustave Eiffel, the tower really did represent a&nbsp;</span><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">monumental</span></i><span data-dcnode-id="636" instrument_node="">&nbsp;investment.</span></p><span data-dcnode-id="634" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="632" href="#kcmenu"><span data-dcnode-id="633" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="630" id="eiffel-s-firm-produced-5-329-drawings-of-the-eiffel-tower"><span data-dcnode-id="631" instrument_node="">Eiffel’s Firm Produced 5,329 Drawings of the Eiffel Tower</span></h2><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Once the Eiffel Tower was approved, Eiffel Tower facts show that an intense planning phase began. During the course of the planning, Eiffel’s firm produced 1,700 general drawings, and 3,629 detailed drawings. The drawings captured the 18,038 pieces that make up the tower.</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Bear in mind all of this was being done by hand, before the 1900s. The Eiffel Tower was a symbol of the Industrial Age as it was happening.</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Eiffel Tower facts show that construction began in January of 1887 after a location had been determined. The massive concrete and limestone foundations of the Eiffel Tower were the first things to be put into place.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The tower would be assembled in a modular fashion. Sub-assemblies would be completed at one of Eiffel’s facilities in the suburbs of Paris, and then brought to the site by horse and cart for assembly into the finished structure. Eiffel’s tower was ahead of its time in more ways than one. Modular building has increased in popularity in recent years – it only took the world over 100 years to catch up!</span></p><span data-dcnode-id="621" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="619" href="#kcmenu"><span data-dcnode-id="620" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="617" id="gustave-eiffel-compared-his-tower-to-the-pyramids-of-egypt"><span data-dcnode-id="618" instrument_node="">Gustave Eiffel Compared His Tower to the Pyramids of Egypt</span></h2><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">While it took Eiffel some time to warm to Koechlin’s design, Eiffel Tower facts show that he became an ardent supporter once he actually decided to build the tower. While it is considered by many to be a work of art today, at the time, many artists and writers protested against the building of the tower based on the drawings that were exhibited.</span></p><p data-dcnode-id="607"><span data-dcnode-id="614" instrument_node="">As the Industrial Age began there was tension between artists and engineers in the field of architecture. Eiffel Tower facts show that a group of artists launched a campaign claiming that the Eiffel Tower was too much&nbsp;</span><i data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">engineering</span></i><span data-dcnode-id="611" instrument_node="">&nbsp;and not enough&nbsp;</span><i data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">art</span></i><span data-dcnode-id="608" instrument_node="">&nbsp;to be considered good architecture.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Eiffel responded by defending the monumental nature of the work, comparing it to the Pyramids of Egypt. It was an apt description. At the time, the Pyramids were still some of the largest man-made structures on Earth.</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Eiffel Tower facts reveal that Gustave Eiffel was not too concerned about the criticism, as the project had already been approved. Now, these objections seem like nothing more than a distant memory as many artists, engineers and everyday people look to the Eiffel Tower for inspiration.</span></p><span data-dcnode-id="602" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="600" href="#kcmenu"><span data-dcnode-id="601" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="598" id="a-conman-named-victor-lustig-sold-the-eiffel-tower-twice"><span data-dcnode-id="599" instrument_node="">A Conman Named Victor Lustig Sold the Eiffel Tower… Twice!</span></h2><p data-dcnode-id="593"><span data-dcnode-id="597" instrument_node="">As the Eiffel Tower became a great symbol, it was well-known throughout the world. One conman, named Victor Lustig, would use this worldwide recognition to&nbsp;</span><i data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">sell</span></i><span data-dcnode-id="594" instrument_node="">&nbsp;the Eiffel Tower, not once, but twice!</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">In 1925, after World War I, the Eiffel Tower was not in the best condition. Keeping it painted to prevent rusting proved to be a difficult task. Eiffel Tower facts show that Lustig developed his con based on this information. He held a secret meeting of scrap dealers and, using forged government stationary, offered to sell the Eiffel Tower for scrap!</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">The scrap dealer that Lustig targeted, Andre Poisson, believed he was a corrupt government official and gave him a bribe along with the money for the tower. Lustig and his accomplice fled to Vienna with a suitcase full of money.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Poisson was so embarrassed that he did not press charges. A month later, Lustig couldn’t help himself, and he returned to Paris to try the scheme again. This time, the person he tried to scam went to the police, but Lustig managed to get away without being arrested.</span></p><span data-dcnode-id="586" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="584" href="#kcmenu"><span data-dcnode-id="585" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="582" id="only-one-person-died-in-the-construction-of-the-eiffel-tower"><span data-dcnode-id="583" instrument_node="">Only One Person Died in the Construction of the Eiffel Tower</span></h2><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Our Titanic Facts tell us that this massive ship, which was built many years later, led to the death of many people before the ship even hit the water. Deaths in large-scale construction projects were a sad reality at the beginning of the Industrial Age.</span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Eiffel Tower facts tell us that Gustave Eiffel was very serious when it came to the safety of the more than 300 people working on-site on the tallest structure man had ever built at the time.</span></p><p data-dcnode-id="573"><span data-dcnode-id="577" instrument_node="">After criticism of the wood scaffolding that was built to support the structure and the men working as they put the pieces in place, Eiffel’s firm installed&nbsp;</span><i data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">creeper cranes</span></i><span data-dcnode-id="574" instrument_node="">&nbsp;that would actually move up the tower as construction progressed.</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Other safety measures put in place included guards and screens. As a result, only one person died in the construction of the Eiffel Tower. This is one of the sad Eiffel Tower facts, but it could have been much sadder if the working conditions on the Tower were not as forward thinking as the design itself!</span></p><span data-dcnode-id="570" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="568" href="#kcmenu"><span data-dcnode-id="569" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="566" id="the-eiffel-tower-was-supposed-to-be-torn-down-in-1919"><span data-dcnode-id="567" instrument_node="">The Eiffel Tower Was Supposed to Be Torn Down in 1919</span></h2><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Eiffel Tower facts show that the original contract for the tower stipulated that it should be torn down after 20 years, in 1919. At this point, the ownership of the tower would pass from Eiffel to the City of Paris. Part of the original design requirements said that the tower had to be easily dismantled or demolished. This explains in part why the tower was built in a modular fashion.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Emerging wireless technology and the importance of the tower for making weather observations saved it from the scrap heap. From 1919 on, there were many instances until about the 1950s were it seemed the tower might be torn down. One example from historical Eiffel Tower facts teaches us that during World War II, as the Germans were being driven from Paris, Adolf Hitler ordered one of his generals to demolish the tower. Thankfully, the general refused, and the tower stands to this day.</span></p><span data-dcnode-id="561" instrument_node=""> </span><a class="kc-gotop kc__gotop" data-dcnode-id="559" href="#kcmenu"><span data-dcnode-id="560" instrument_node="">back to menu ↑</span></a><h2 class="wpsm_toplist_heading" data-dcnode-id="557" id="over-200-000-000-people-have-visited-the-eiffel-tower"><span data-dcnode-id="558" instrument_node="">Over 200,000,000 People Have Visited the Eiffel Tower</span></h2><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Eiffel Tower facts reveal that elevators or lifts were installed in the tower shortly after its debut. This is a good thing! Walking to the top took early visitors hours. The lifts have been modified, upgraded and replaced many times over the years.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Communications equipment in the form of radio antennas and TV broadcast equipment were added to the Eiffel Tower as those technologies emerged in the 1900s. Additional lights and spotlights have been added to the tower, so it lights up the Paris skyline at night.</span></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Visitors to the Eiffel Tower include daredevils who have staged stunts, such as bungee jumping from the tower. The Eiffel Tower has become a must-see destination in Paris and, at the last count, more than 200,000,000 people had visited the tower!</span></p><hr data-dcnode-id="550"><h3 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Interesting Facts about The Eiffel Tower Summary</span></h3><p data-dcnode-id="544"><span data-dcnode-id="547" instrument_node="">The Eiffel Tower is a symbol of the world. When it was built, and for 41 years after,</span><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node=""> it was the tallest manmade structure on Earth. Gustave Eiffel didn’t design the tower, but he put the passion, capital, and resources behind the project to make it a reality.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">When it was being constructed, there was a protest from artists that said it elevated engineering above art in architecture. Gustave Eiffel met the criticism by asking: Do not the laws of natural forces always conform to the secret laws of harmony?</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Eiffel Tower facts show that Eiffel was right. Today, the Eiffel Tower is seen as inspiration by artists, engineers, architects, and everyday people who are reaching for the same ideals of liberty and freedom that characterized the French Revolution to which the tower is dedicated.</span></p><div class="rmp-widgets-container rmp-wp-plugin rmp-main-container js-rmp-widgets-container js-rmp-widgets-container--2756" data-dcnode-id="503" data-post-id="2756"><div class="rmp-rating-widget js-rmp-rating-widget" data-dcnode-id="504"><p class="rmp-heading rmp-heading--title" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node=""> Did you like those interesting facts?</span></p><p class="rmp-heading rmp-heading--subtitle" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node=""> Click on smiley face to rate it!</span></p><div class="rmp-rating-widget__icons" data-dcnode-id="519"><ul class="rmp-rating-widget__icons-list js-rmp-rating-icons-list" data-dcnode-id="520"><li class="rmp-rating-widget__icons-list__icon js-rmp-rating-item" data-dcnode-id="533" data-descriptive-rating="Not at all useful" data-value="1" style="cursor: pointer;"><span data-dcnode-id="535" instrument_node=""> </span><i class="js-rmp-rating-icon rmp-icon rmp-icon--ratings rmp-icon--smile-o rmp-icon--full-highlight" data-dcnode-id="534"></i></li><li class="rmp-rating-widget__icons-list__icon js-rmp-rating-item" data
