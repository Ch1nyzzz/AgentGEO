</span><div class="NitemIntroText" data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">The world famous Eiffel Tower, symbol of Paris, was constructed for the 1889 Exposition Universelle (World Fair), marking the 100th anniversary of the French Revolution. Originally intended to be temporary, the wrought iron tower is now the most visited paid attraction in the world, and is the tallest building in the city at 324m.</span></div><span data-dcnode-id="281" instrument_node="">
</span><div class="NitemText" data-dcnode-id="270"><span data-dcnode-id="280" instrument_node="">Planning for a suitable monument for the exposition began in May 1884, when Swiss structural engineer </span><strong data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Maurice Koechlin</span></strong><span data-dcnode-id="277" instrument_node=""> (1856-1946) conceived the idea of building a tall pylon of iron lattices. It consisted of four columns splayed at the base, meeting before the top and linked together by horizontal girders. Koechlin developed the design with French civil engineer </span><strong data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Emile Nouguier</span></strong><span data-dcnode-id="274" instrument_node=""> (1840-98) while both were working for the Compagnie des Etablissements Eiffel, run by </span><strong data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Alexandre Gustave Eiffel</span></strong><span data-dcnode-id="271" instrument_node=""> (1832-1923).</span></div><span data-dcnode-id="269" instrument_node="">
</span><div class="NitemText" data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">Though initially ambivalent, Eiffel allowed Nouguier and Koechlin to continue with the project. They commissioned French architect </span><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Charles Léon Stephen Sauvestre</span></strong><span data-dcnode-id="265" instrument_node=""> (1847-1919) to improve the look of the tower. He added masonry bases to the legs and the now-characteristic iron arches that connect the columns to the first level.</span></div><span data-dcnode-id="263" instrument_node="">
</span><div class="NitemText" data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">On 18th September 1884, the by now enthusiastic Eiffel registered a patent for the tower’s design. He chose puddled (wrought) iron as the main material for its strength and durability, plus it was more cost effective than masonry. It is also flexible compared to cast iron, which is brittle, and so can better accommodate wind loading and temperature-driven expansion and contraction.</span></div><span data-dcnode-id="260" instrument_node="">
</span><div class="NitemText" data-dcnode-id="252"><span data-dcnode-id="259" instrument_node="">On 2nd May 1886, the </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Journal Officiel</span></em><span data-dcnode-id="256" instrument_node=""> launched a competition to explore the possibility of erecting a 300m tall metal tower on the Champ de Mars. More than 100 entries were submitted but only Eiffel’s tower fulfilled the rather biased brief. Nevertheless, many people doubted his ability to complete such a project — the tallest tower in the world at the time was the 169.2m </span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Washington Monument</span></strong><span data-dcnode-id="253" instrument_node="">.</span></div><span data-dcnode-id="251" instrument_node="">
</span><div class="NitemText" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Eiffel was awarded the contract on condition that he was solely responsible for the project's finance and construction, and for the tower's maintenance during the fair, which would run from 15th May to 6th November, 1889. In return he would receive 1.5 million francs — just one quarter of the estimated 6 million francs required — plus all income derived from the tower's commercial use for 20 years after the fair closed.</span></div><span data-dcnode-id="248" instrument_node="">
</span><div class="NitemText" data-dcnode-id="237"><span data-dcnode-id="247" instrument_node="">Construction commenced on 28th January 1887. At first, the novel design drew criticism, and on 14th February a consortium of well-known writers, artists and architects wrote a protest (</span><em data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Protestation contre la Tour de M. Eiffel</span></em><span data-dcnode-id="244" instrument_node="">) published in the newspaper </span><em data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Le Temps</span></em><span data-dcnode-id="241" instrument_node="">. In a lengthy interview in the same edition, Eiffel replied, </span><em data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">"Je crois, pour ma part, que la Tour aura sa beauté propre"</span></em><span data-dcnode-id="238" instrument_node=""> (I believe the Tower will possess its own beauty).</span></div><span data-dcnode-id="236" instrument_node="">
</span><div class="NitemText" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">The design approach taken by Eiffel was to consider the superstructure as a series of lattice-trussed upright piers, the curvature of which was calculated as offering the most efficient wind resistance. The maximum wind deflection of the completed tower is 90mm. In addition, in hot weather, expansion of the iron frame on the side facing the sun can make the top of the tower bend some 75mm in the other direction.</span></div><span data-dcnode-id="233" instrument_node="">
</span><div class="NitemText" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Eiffel’s labour force of up to 250 people, working from 5,329 engineering drawings, produced an astonishing structure. Its footprint is 124.9m square and it sits on a foundation 33.5m above sea level. The first stage gallery is 57.6m above ground and the second stage 115.7m. The third stage is 276.1m above the ground and offers a panoramic view of Paris.</span></div><span data-dcnode-id="230" instrument_node="">
</span><div class="NitemText" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Site investigation revealed that the ground nearest the River Seine, at the north and west corners of the tower, was far softer than the ground at the south and east corners. Permanent compressed-air caissons were used for the construction of the north and west column foundations, which are 4.9m deeper than the other two.</span></div><span data-dcnode-id="227" instrument_node="">
</span><div class="NitemText" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">The four principal girders at the four corners of each leg sit on concrete slabs, making 16 slabs in all. On the landward side, the slabs are 2m thick, founded on a layer of compacted gravel. On the river side, each 6.1m thick slab sits on an iron caisson, 14.9m long and 6.1m wide. Two piles were driven through each caisson to a depth of 21.9m before the slabs were cast.</span></div><span data-dcnode-id="224" instrument_node="">
</span><div class="NitemText" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">The finished slabs are built up with masonry to form massive buttresses, each inclined inwards at an angle of 44 degrees, capped with courses of dressed limestone from the Château Landon quarry. Each buttress has an iron shoe for support of the principal girders, fixed into the masonry with two anchor bolts 7.9m long and 102mm in diameter. The legs are 74.2m apart at ground level.</span></div><span data-dcnode-id="221" instrument_node="">
</span><div class="NitemText" data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">By the end of June, the foundations and buttresses were complete. Assembly of the ironwork up to the first stage began on 1st July, with the help of steam-powered cranes. The principal girders were positioned to an accuracy of 1mm, using a system of sand boxes and hydraulic jacks to adjust the iron shoes at the base of the legs.</span></div><span data-dcnode-id="218" instrument_node="">
</span><div class="NitemText" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">Initially, the legs were constructed as cantilevers but were given additional support using temporary timber scaffolds, 30-40m high. On 7th December 1887, the legs were completed to the first level.</span></div><span data-dcnode-id="215" instrument_node="">
</span><div class="NitemText" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">In March 1888, the first stage was completed. Beneath the balcony, the names of 72 French scientists, engineers and mathematicians are embossed in letters about 600mm high. Work began on the second stage in May. By the end of August, the timber scaffolding under the first stage had been removed, the arches between the lower legs installed and the second stage completed.</span></div><span data-dcnode-id="212" instrument_node="">
</span><div class="NitemText" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">By the end of December, construction of the upper part of the tower had passed the midpoint between second and third stages. By March 1889, construction of the cupola at the top of the third stage was underway. </span></div><span data-dcnode-id="209" instrument_node="">
</span><div class="NitemText" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Eiffel had an office and private apartment on the third stage. The separate wrought iron elements of the tower were fabricated at his factory in Levallois-Perret, on the outskirts of Paris, and assembled into sections weighing no more than 3 tonnes. The sections were delivered to site daily and lifted into position by creeper cranes running on inclined rails inside the tower’s legs. All members were connected by hot riveting, both at the factory and on site.</span></div><span data-dcnode-id="206" instrument_node="">
</span><div class="NitemText" data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Eiffel oversaw every aspect of the project personally, and was always looking to maximise efficiency — even installing a workers' canteen inside the tower. However, he reluctantly subcontracted the provision of hydraulic elevators to specialists. He realised that most visitors would not want to climb the 1,710 steps to the top of the tower.</span></div><span data-dcnode-id="203" instrument_node="">
</span><div class="NitemText" data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Up to the first stage, the curvature of the legs was slight enough to permit lifts to run on straight inclined tracks, similar to a cliff railway. Roux, Combaluzier &amp; Lepape double-deck elevators were installed in the east and west legs. The lift cars were hauled up the track by a pair of endless chains enclosed in conduit. They carried passengers between ground level and the first stage.</span></div><span data-dcnode-id="200" instrument_node="">
</span><div class="NitemText" data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">A second pair of lifts was installed in the north and south legs conveying passengers from the ground to the second stage. As the curvature of the main girders becomes progressively steeper between first and second levels, the tracks followed three straight chords connected by short segmental curves. These Otis elevators also had double-deck cars but were pulled upwards using pistons, which operated more efficiently and with less friction. Passengers were seated because of the change in inclination during ascent.</span></div><span data-dcnode-id="197" instrument_node="">
</span><div class="NitemText" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Hydraulic pressure for the Roux and Otis elevators was provided by a large open reservoir on the second stage. Water flowed down to a tank below ground and was pumped back up by two Girard pumps located in the engine room at the base of the south leg.</span></div><span data-dcnode-id="194" instrument_node="">
</span><div class="NitemText" data-dcnode-id="189"><span data-dcnode-id="193" instrument_node="">A direct plunger type elevator ran vertically between the second and third stages. It was invented by </span><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Félix Léon Edoux</span></strong><span data-dcnode-id="190" instrument_node=""> (1827-1910) and the only one of its type in the world. Its track had a platform halfway between stages, with one ram-driven lift car operating over each half of the run. Passengers transferred from one to the other as the cars reached the platform. Water for hydraulic power was supplied by Worthington tandem compound steam pumps in the engine room.</span></div><span data-dcnode-id="188" instrument_node="">
</span><div class="NitemText" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">The Eiffel Tower was completed on 31st March 1889, and opened to the public on 15th May along with the opening of the fair, though the elevators were not in service until 26th. It had cost 7.8 million gold francs to construct. Its total weight is 10,260 tonnes, of which 7,420 tonnes is ironwork — 18,038 pieces of it, joined together by 2.5 million rivets.</span></div><span data-dcnode-id="185" instrument_node="">
</span><div class="NitemText" data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">The tower was painted in three shades of reddish brown, with the 72 names picked out in gold. After dark, it was lit by numerous gas lamps in opaline globes. An electric beacon mounted inside the cupola flashed every 90 seconds, sending tricolour signals of red, white and blue across the city and two mobile searchlights mounted on a rail around the third stage highlighted various parts of the site. A cannon fired from the top marked the fair's daily opening and closing. Almost two million people visited the tower during the exposition.</span></div><span data-dcnode-id="182" instrument_node="">
</span><div class="NitemText" data-dcnode-id="177"><span data-dcnode-id="181" instrument_node="">On 11th September 1889, American inventor </span><strong data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Thomas Alva Edison</span></strong><span data-dcnode-id="178" instrument_node=""> (1847-1931) visited Eiffel’s eyrie on the third stage and presented him with a phonograph. Eiffel used the office as a laboratory for meteorological, astronomical and physiological observations, physics and aerodynamics experiments, and investigations in the use of scientific apparatus.</span></div><span data-dcnode-id="176" instrument_node="">
</span><div class="NitemText" data-dcnode-id="171"><span data-dcnode-id="175" instrument_node="">On 5th November 1898, </span><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Eugène Adrien Ducretet</span></strong><span data-dcnode-id="172" instrument_node=""> (1844-1915) carried out the first wireless telegraphy trials between the Eiffel Tower and the Pantheon 4km away, from a transmitter installed at the top of the tower. In 1899, radio waves from the tower crossed the English Channel (La Manche) for the first time.</span></div><span data-dcnode-id="170" instrument_node="">
</span><div class="NitemText" data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">The next year, in preparation for the 1900 Exposition Universelle, the Roux elevators were replaced by Fives-Lille hydraulic elevators with self-levelling cars that ran up to the second stage. The Otis elevator in the south leg was replaced by a wide staircase up to the first stage. The tower was furnished with 5,000 electric lamps. In 1912, the Otis elevator in the north leg would be replaced with an electric-powered lift.</span></div><span data-dcnode-id="167" instrument_node="">
</span><div class="NitemText" data-dcnode-id="162"><span data-dcnode-id="166" instrument_node="">At Eiffel’s suggestion, in 1903 </span><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Captain Gustave Auguste Ferrié</span></strong><span data-dcnode-id="163" instrument_node=""> (1868-1932) began using the tower for experiments in military applications of wireless transmission, enabling transmission and reception over 400km. Ferrié was authorised to install antennae on top of the tower, and he conducted his operations from a timber shelter next to the south leg.</span></div><span data-dcnode-id="161" instrument_node="">
</span><div class="NitemText" data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">In 1909, the 20 year lease expired and control reverted to the City of Paris. With the outbreak of World War I (1914-18), plans for demolition were abandoned and the tower became an important military radio and telegraph centre. The lease was renewed for another 70 years.</span></div><span data-dcnode-id="158" instrument_node="">
</span><div class="NitemText" data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">During 1925-36, André Gustave Citroën (1878-1935) was responsible for the first purely decorative lighting display on the tower. The name Citroën, adorned three sides of the structure, spelled out in 250,000 lights and visible for 30km. Also in 1925, conman Victor Lustig (1890-1947) twice tried to sell the tower to scrap metal dealers. He received money from the first buyer but the police were alerted by the second, though Lustig evaded arrest.</span></div><span data-dcnode-id="155" instrument_node="">
</span><div class="NitemText" data-dcnode-id="150"><span data-dcnode-id="154" instrument_node="">Up until 1930, when the 319.4m </span><strong data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Chrysler Building</span></strong><span data-dcnode-id="151" instrument_node=""> was completed in New York, the Eiffel Tower was the world’s tallest building. Its height was increased to its present 324m by the addition of a mast in 1957. It remains the tallest building in Paris, by just a metre (2015).</span></div><span data-dcnode-id="149" instrument_node="">
</span><div class="NitemText" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">During the German occupation of Paris in World War II (1939-45), the tower was closed to the public and its elevators disabled. In 1965, a Schneider electric elevator was installed in the north leg. It was modernised in 1994-5 and 1997, and its speed reducer was changed in 2004.</span></div><span data-dcnode-id="146" instrument_node="">
</span><div class="NitemText" data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">By 1980, the tower was in disrepair, and a major programme of renovation was undertaken in 1980-3. Work included removing more than 1,000 tonnes of extra weight created by concrete additions and radio and television masts added over the years. Part of the original staircase were dismantled and sold, and the entire structure was repainted.</span></div><span data-dcnode-id="143" instrument_node="">
</span><div class="NitemText" data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">In 1983, a Duolift-Otis electric elevator was installed in the south leg for the exclusive use of Restaurant Jules Verne customers, and updated in 1994-5. In 1989, a 4 tonne freight elevator was constructed in the same leg, and refurbished in 2003 and 2007. Also in 1983, the Edoux elevator was dismantled as it did not function well in winter. Its hydraulic pump was put on display at the first level. </span></div><span data-dcnode-id="140" instrument_node="">
</span><div class="NitemText" data-dcnode-id="135"><span data-dcnode-id="139" instrument_node="">The golden lighting scheme of the Eiffel Tower that we see today was unveiled on 31st December 1985. Invented by electrician and lighting engineer </span><strong data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Pierre Bideau</span></strong><span data-dcnode-id="136" instrument_node="">, it consists of 336 searchlights equipped with sodium lamps, all located at the base of the tower and directed up into the structure. The lights are activated automatically at dusk.</span></div><span data-dcnode-id="134" instrument_node="">
</span><div class="NitemText" data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">The Fives-Lille hydraulic elevators were modernised in 1986 and 1987, when high pressure oil hydraulic motors replaced the hydraulic accumulators. The elevators were refurbished in 1992, 1995 and 2005. In 2008-12, the west leg elevators were replaced, after which the east leg elevators were also replaced.</span></div><span data-dcnode-id="131" instrument_node="">
</span><div class="NitemText" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">in 1986-7, the Société Nouvelle d'exploitation de la Tour Eiffel restored the 72 embossed names below the first stage, which had been painted over since the beginning of the 20th century.</span></div><span data-dcnode-id="128" instrument_node="">
</span><div class="NitemText" data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">The Eiffel Tower was last painted in 2009, and has had lead-free paint since 2002. It has been repainted 18 times altogether, once every seven years on average. Over the years its colour has changed through reddish brown, yellow ochre, chestnut brown and is now bronze.</span></div><span data-dcnode-id="125" instrument_node="">
</span><div class="NitemText" data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Sanding, rust proofing and repainting is done by hand by a team of 25 painters using 50km of safety ropes and 2 hectares of safety nets. The tower stays open throughout. It takes some 15-18 months to apply 60 tonnes of paint to the 250,000 sq m of surface area, and costs around 4 million Euros.</span></div><span data-dcnode-id="122" instrument_node="">
</span><div class="NitemText" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">In 2010, the tower received its 250 millionth visitor. It lies within the Paris, Banks of the Seine UNESCO World Heritage Site.</span></div><span data-dcnode-id="119" instrument_node="">
</span><div class="NitemText" data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">The spacious but least visited first stage was refurbished in 2014, to a design by French architect Moatti-Rivière. Two of the existing pavilions were rebuilt and the third given new façades, providing new facilities and event spaces, with disabled access. A 4,260 sq m glass floor was constructed enabling daring visitors to gain a different perspective on the structure.</span></div><span data-dcnode-id="116" instrument_node="">
</span><div class="NitemText" data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">In March 2015, two 5.2m tri-blade wind turbines were installed. They generate 10MWh of electricity — a tiny proportion of the Eiffel Tower’s annual power consumption of 6.7GWh.</span></div><span data-dcnode-id="113" instrument_node="">
</span><div class="NitemText" data-dcnode-id="105"><span data-dcnode-id="112" instrument_node="">Elevators: Roux Combaluzier &amp; Lepape, Otis Brothers &amp; Co, Félix Léon Edoux</span><br data-dcnode-id="111"><span data-dcnode-id="110" instrument_node="">Architect (2014): Moatti-Rivière</span><br data-dcnode-id="109"><span data-dcnode-id="108" instrument_node="">Contractor (2014): SETE</span><br data-dcnode-id="107"><span data-dcnode-id="106" instrument_node="">Wind turbnes (2015): Urban Green Technology</span></div><span data-dcnode-id="104" instrument_node="">
