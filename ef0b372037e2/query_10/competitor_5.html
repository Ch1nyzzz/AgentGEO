</span><p data-dcnode-id="1361"><span data-dcnode-id="1377" instrument_node="">The </span><b data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Eiffel Tower</span></b><span data-dcnode-id="1374" instrument_node=""> is a </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Wrought_iron" title="Wrought iron"><span data-dcnode-id="1373" instrument_node="">wrought-iron</span></a><span data-dcnode-id="1371" instrument_node=""> lattice tower on the Champ de Mars in </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Paris" title="Paris"><span data-dcnode-id="1370" instrument_node="">Paris</span></a><span data-dcnode-id="1368" instrument_node="">, </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/France" title="France"><span data-dcnode-id="1367" instrument_node="">France</span></a><span data-dcnode-id="1365" instrument_node="">. It is named after the engineer </span><a data-dcnode-id="1363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Gustave_Eiffel" title="Gustave Eiffel"><span data-dcnode-id="1364" instrument_node="">Gustave Eiffel</span></a><span data-dcnode-id="1362" instrument_node="">, whose company designed and built the tower.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">Constructed from 1887 to 1889 as the entrance to the 1889 World's Fair, it was initially criticised by some of France's leading artists and intellectuals for its design, but it has become a global </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Cultural_icon" title="Cultural icon"><span data-dcnode-id="1358" instrument_node="">cultural icon</span></a><span data-dcnode-id="1356" instrument_node=""> of France and one of the most recognisable structures in the world. The Eiffel Tower is the most-visited paid monument in the world; 6.91&nbsp;million people ascended it in 2015.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1353" instrument_node="">The tower is 324 metres (1,063&nbsp;ft) tall, about the same height as an 81-storey building, and the tallest structure in Paris. Its base is square, measuring 125 metres (410&nbsp;ft) on each side. During its construction, the Eiffel Tower surpassed the </span><a data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Washington_Monument" title="Washington Monument"><span data-dcnode-id="1352" instrument_node="">Washington Monument</span></a><span data-dcnode-id="1350" instrument_node=""> to become the tallest man-made structure in the world, a title it held for 41 years until the </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Chrysler_Building" title="Chrysler Building"><span data-dcnode-id="1349" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="1347" instrument_node=""> in </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/New_York_City" title="New York City"><span data-dcnode-id="1346" instrument_node="">New York City</span></a><span data-dcnode-id="1344" instrument_node=""> was finished in 1930. It was the first structure to reach a height of 300 metres. Due to the addition of a broadcasting </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Antenna" title="Antenna"><span data-dcnode-id="1343" instrument_node="">aerial</span></a><span data-dcnode-id="1341" instrument_node=""> at the top of the tower in 1957, it is now taller than the Chrysler Building by 5.2 metres (17&nbsp;ft). Excluding transmitters, the Eiffel Tower is the second tallest free-standing structure in France after the </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Millau_Viaduct" title="Millau Viaduct"><span data-dcnode-id="1340" instrument_node="">Millau Viaduct</span></a><span data-dcnode-id="1338" instrument_node="">.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1335" instrument_node="">The tower has three levels for visitors, with restaurants on the first and second levels. The top level's upper platform is 276&nbsp;m (906&nbsp;ft) above the ground – the highest </span><a data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Observation_deck" title="Observation deck"><span data-dcnode-id="1334" instrument_node="">observation deck</span></a><span data-dcnode-id="1332" instrument_node=""> accessible to the public in the </span><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/European_Union" title="European Union"><span data-dcnode-id="1331" instrument_node="">European Union</span></a><span data-dcnode-id="1329" instrument_node="">. Tickets can be purchased to ascend by stairs or </span><a data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Elevator" title="Elevator"><span data-dcnode-id="1328" instrument_node="">lift</span></a><span data-dcnode-id="1326" instrument_node=""> to the first and second levels. The climb from ground level to the first level is over 300 steps, as is the climb from the first level to the second. Although there is a staircase to the top level, it is usually accessible only by lift.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1323" instrument_node="">There are 20,000 sparkling lights and 80&nbsp;</span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Kilometre" title="Kilometre"><span data-dcnode-id="1322" instrument_node="">km</span></a><span data-dcnode-id="1320" instrument_node=""> (50 </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Mile" title="Mile"><span data-dcnode-id="1319" instrument_node="">miles</span></a><span data-dcnode-id="1317" instrument_node="">) of cables covering the structure. The paper used to print the visitors' tickets in one year weighs 2 tonnes (4,400 pounds). The top of the tower leans away from the sun as the metal facing the sun heats up and expands it can move as much as 18&nbsp;</span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Centimetre" title="Centimetre"><span data-dcnode-id="1316" instrument_node="">cm</span></a><span data-dcnode-id="1314" instrument_node=""> (7 </span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Inch" title="Inch"><span data-dcnode-id="1313" instrument_node="">inches</span></a><span data-dcnode-id="1311" instrument_node="">) and grow 15&nbsp;cm (6 inches) taller. The tower was also built to sway slightly in the wind.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1308"></p><span data-dcnode-id="1307" instrument_node="">

</span><h2 class="section-heading" data-dcnode-id="1107"><span class="mw-headline" data-dcnode-id="1108" id="History"><span data-dcnode-id="1109" instrument_node="">History</span></span></h2><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">The Eiffel Tower was built by Alexandre Gustave Eiffel for the 100th anniversary of the </span><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/French_Revolution" title="French Revolution"><span data-dcnode-id="1104" instrument_node="">French Revolution</span></a><span data-dcnode-id="1102" instrument_node="">. Even though Gustave Eiffel is credited for the Eiffel Tower it was actually two lesser known people who came up with the original drawing of it. These people were Maurice Koechlin and Emile Nouguier. These two men were the chief engineers of Eiffel’s engineering firm. The main architect was Stephen Sauvestre.</span></p><div class="thumb tleft" data-dcnode-id="1091"><div class="thumbinner" data-dcnode-id="1092" style="width:302px;"><span data-dcnode-id="1100" instrument_node="">
</span><span data-dcnode-id="1098" instrument_node="">
</span><ins <="" class="adsbygoogle" data-ad-client="ca-pub-2806779683782082" data-ad-slot="4319964985" data-dcnode-id="1093" ins="" style="display:inline-block;width:300px;height:250px"><span data-dcnode-id="1097" instrument_node="">
</span><span data-dcnode-id="1094" instrument_node="">
</span></ins></div></div><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Koechlin, Nouguier, Sauvestre, and Eiffel submitted the plans to compete for the spot on the champ de mars plot of land, to serve as the expositions entrance. It would also determine the 1889 world's fair centerpiece in Paris. There were 107 bids submitted to construct the Eiffel Tower. Fifty people worked on the design, and more than 100 built the parts. One hundred and thirty two workers assembled the parts on site.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">The first digging for the foundations began on January 28, 1887 and all construction was concluded on March 31, 1889. When the tower was built, it was only meant to be kept for 20 years. People did not like the Eiffel Tower and wanted it taken down because they thought is was an ugly structure polluting the scenery of the Paris sky. After the 20 years, the tower became the </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Property" title="Property"><span data-dcnode-id="1085" instrument_node="">property</span></a><span data-dcnode-id="1083" instrument_node=""> of Paris again.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1080" instrument_node="">By this time, the city had learned that the tower could be used to help with </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Communication" title="Communication"><span data-dcnode-id="1079" instrument_node="">communications</span></a><span data-dcnode-id="1077" instrument_node="">. There was also a metrology lab that had been installed for studies on everything from gravity to electricity. The </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Military" title="Military"><span data-dcnode-id="1076" instrument_node="">military</span></a><span data-dcnode-id="1074" instrument_node=""> used the tower as a wireless telegraph transmitter for communication during battle. The tower was used in the capture of the spy "</span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Mata_Hari" title="Mata Hari"><span data-dcnode-id="1073" instrument_node="">Mata Hari</span></a><span data-dcnode-id="1071" instrument_node="">" during World War I after a message was intercepted. Today, it is used to send radio and television signals to the capital city of Paris and beyond. After people learned about the many benefits the tower provided, no one wanted it to be taken apart.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1068" instrument_node="">The Eiffel Tower joined the green energy movement by building two wind turbines on the second level. These wind turbines produce 10,000 </span><a class="mw-redirect" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Kilowatt" title="Kilowatt"><span data-dcnode-id="1067" instrument_node="">kilowatts</span></a><span data-dcnode-id="1065" instrument_node=""> per </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Hour" title="Hour"><span data-dcnode-id="1064" instrument_node="">hour</span></a><span data-dcnode-id="1062" instrument_node=""> (13,000 </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Horsepower" title="Horsepower"><span data-dcnode-id="1061" instrument_node="">horsepower</span></a><span data-dcnode-id="1059" instrument_node=""> per hour) of electricity.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h2 class="section-heading" data-dcnode-id="1054"><span class="mw-headline" data-dcnode-id="1055" id="Construction"><span data-dcnode-id="1056" instrument_node="">Construction</span></span></h2><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">There were 50 architects, engineers, and draftsmen that created 5,300 drawings of the Eiffel Tower before the construction started. Once they had a plan, there were 18,000 pieces built and prepared in Eiffel's factory outside of town. These pieces were created to the accuracy of 1/10 of a millimeter. These pieces were put together to form new pieces that were 5 meters long to be transported to the building site.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">There were 132 workers there to assemble the pieces on site. All the pieces were put into place and hooked together by thermally assembled rivets. There were 4 men needed to assemble a single rivet: one person to heat the rivet up, another to hold it in place, a third to shape the head, and a fourth person to beat the rivet with a sledge hammer.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1046" instrument_node="">Only </span><small data-dcnode-id="1039"><sup data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">1</span></sup><big data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">⁄</span></big><sub data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">3</span></sub></small><span data-dcnode-id="1038" instrument_node=""> of the 2.5 million rivets were assembled on site. The work on the foundations took 5 months. The workers only used spades, and the rubble was taken away by horses and steam locomotives.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">There was no problem in building the pillars on the Champ de Mars side of the tower. But on the Seine River side of the tower, foundations used compressed air and corrugated steel caissons five meters under water. The deepest foundations are 15 meters under ground. The feet of the tower are set in each of these foundation ditches. These foundations support the four pillars or truss frames.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The difficulty building the first floor was in bringing building materials and people up to it with a point of departure as in the elevators. The elevators had to be positioned at a slanting angle to meet the horizontal beams on the first floor. The elevator had to use hydraulic jacks to move and erect the elevator up the slanted legs. Currently the hydraulic jacks are not in use due to more advanced technology. The second floor was assembled with cranes that took the same route as the elevators. There was no troubles from this point onward in the construction.</span></p><span data-dcnode-id="1030" instrument_node="">

</span><div data-dcnode-id="908" style="margin:0px auto;"><a class="image" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AConstruction_tour_eiffel7.JPG"><img alt="Construction tour eiffel7" data-dcnode-id="910" height="78" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/b/bf/Construction_tour_eiffel7.JPG/136px-Construction_tour_eiffel7.JPG&amp;raw" width="91"></a></div><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">15 March 1889: Construction of the cupola</span></p><span data-dcnode-id="901" instrument_node="">
</span></div><span data-dcnode-id="899" instrument_node="">
</span></div><span data-dcnode-id="897" instrument_node="">
</span></li><span data-dcnode-id="895" instrument_node="">
</span></ul><h3 class="section-heading" data-dcnode-id="891"><span class="mw-headline" data-dcnode-id="892" id="Material"><span data-dcnode-id="893" instrument_node="">Material</span></span></h3><span data-dcnode-id="890" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="877"><span data-dcnode-id="889" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="879" style="width:302px;"><a class="image" data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ASous_la_Tour_Eiffel_1.jpg"><img alt="Sous la Tour Eiffel 1" class="thumbimage" data-dcnode-id="888" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/b/bd/Sous_la_Tour_Eiffel_1.jpg/300px-Sous_la_Tour_Eiffel_1.jpg&amp;raw" width="300"></a><span data-dcnode-id="886" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">
</span><div class="magnify" data-dcnode-id="883"><a class="internal" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ASous_la_Tour_Eiffel_1.jpg" title="Enlarge"></a></div><span data-dcnode-id="882" instrument_node="">
The Eiffel Tower from below</span></div><span data-dcnode-id="880" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">
</span></div><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">The iron of the Eiffel Tower weighs 7,300 tons, and the addition of lifts, shops and antennae have brought the total weight to approximately 10,100&nbsp;tons. As a demonstration of the economy of design, if the 7,300&nbsp;tons of metal in the structure were melted down, it would fill the square base, 125 metres (410&nbsp;ft) on each side, to a depth of only 6.25&nbsp;cm (2.46&nbsp;in) assuming the density of the metal to be 7.8&nbsp;tons per cubic metre. Additionally, a cubic box surrounding the tower (324&nbsp;m x 125&nbsp;m x 125&nbsp;m) would contain 6,200&nbsp;tons of air, weighing almost as much as the iron itself. Depending on the ambient temperature, the top of the tower may shift away from the sun by up to 18&nbsp;cm (7&nbsp;in) due to </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Thermal_expansion" title="Thermal expansion"><span data-dcnode-id="874" instrument_node="">thermal expansion</span></a><span data-dcnode-id="872" instrument_node=""> of the metal on the side facing the sun.</span></p><span data-dcnode-id="870" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="867"><span class="mw-headline" data-dcnode-id="868" id="Wind_considerations"><span data-dcnode-id="869" instrument_node="">Wind considerations</span></span></h3><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">When it was built, many were shocked by the tower's daring form. Eiffel was accused of trying to create something artistic with no regard to the principles of engineering. However, Eiffel and his team – experienced bridge builders – understood the importance of wind forces, and knew that if they were going to build the tallest structure in the world, they had to be sure it could withstand them.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">He used graphical methods to determine the strength of the tower and empirical evidence to account for the effects of wind, rather than a mathematical formula. Close examination of the tower reveals a basically </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Exponential_function" title="Exponential function"><span data-dcnode-id="861" instrument_node="">exponential</span></a><span data-dcnode-id="859" instrument_node=""> shape. All parts of the tower were over-designed to ensure maximum resistance to wind forces. The top half was even assumed to have no gaps in the latticework. In the years since it was completed, engineers have put forward various mathematical hypotheses in an attempt to explain the success of the design. The most recent, devised in 2004 after letters sent by Eiffel to the French Society of Civil Engineers in 1885 were translated into English, is described as a non-linear integral equation based on counteracting the wind pressure on any point of the tower with the tension between the construction elements at that point.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The Eiffel Tower sways by up to 9&nbsp;centimetres (3.5&nbsp;in) in the wind.</span></p><span data-dcnode-id="854" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="851"><span class="mw-headline" data-dcnode-id="852" id="Accommodation"><span data-dcnode-id="853" instrument_node="">Accommodation</span></span></h3><span data-dcnode-id="850" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="837"><span data-dcnode-id="849" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="839" style="width:302px;"><a class="image" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AGustaves_Apartment_-_Eiffel_%283384390462%29.jpg"><img alt="Gustaves Apartment - Eiffel (3384390462)" class="thumbimage" data-dcnode-id="848" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/f/fd/Gustaves_Apartment_-_Eiffel_%25283384390462%2529.jpg/300px-Gustaves_Apartment_-_Eiffel_%25283384390462%2529.jpg&amp;raw" width="300"></a><span data-dcnode-id="846" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">
</span><div class="magnify" data-dcnode-id="843"><a class="internal" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AGustaves_Apartment_-_Eiffel_%283384390462%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="842" instrument_node="">
Gustave Eiffel's apartment</span></div><span data-dcnode-id="840" instrument_node="">
</span></div><span data-dcnode-id="838" instrument_node="">
</span></div><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="835" instrument_node="">When originally built, the first level contained three restaurants—one French, one </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Russia" title="Russia"><span data-dcnode-id="834" instrument_node="">Russian</span></a><span data-dcnode-id="832" instrument_node=""> and one </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Flemish_Region" title="Flemish Region"><span data-dcnode-id="831" instrument_node="">Flemish</span></a><span data-dcnode-id="829" instrument_node="">—and an "Anglo-American Bar". After the exposition closed, the Flemish restaurant was converted to a 250-seat theatre. A promenade 2.6-metre (8&nbsp;ft 6&nbsp;in) wide ran around the outside of the first level. At the top, there were laboratories for various experiments, and a small apartment reserved for Gustave Eiffel to entertain guests, which is now open to the public, complete with period decorations and lifelike </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Mannequin" title="Mannequin"><span data-dcnode-id="828" instrument_node="">mannequins</span></a><span data-dcnode-id="826" instrument_node=""> of Eiffel and some of his notable guests.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="823" instrument_node="">In May 2016, an apartment was created on the first level to accommodate four competition winners during the </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/UEFA_Euro_2016" title="UEFA Euro 2016"><span data-dcnode-id="822" instrument_node="">UEFA Euro 2016</span></a><span data-dcnode-id="820" instrument_node=""> football tournament in Paris in June. The apartment has a kitchen, two bedrooms, a lounge, and views of Paris landmarks including the </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Seine" title="Seine"><span data-dcnode-id="819" instrument_node="">Seine</span></a><span data-dcnode-id="817" instrument_node="">, the Sacre Coeur, and the </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Arc_de_Triomphe" title="Arc de Triomphe"><span data-dcnode-id="816" instrument_node="">Arc de Triomphe</span></a><span data-dcnode-id="814" instrument_node="">.</span></p><span data-dcnode-id="812" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="809"><span class="mw-headline" data-dcnode-id="810" id="Passenger_lifts"><span data-dcnode-id="811" instrument_node="">Passenger lifts</span></span></h3><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">The arrangement of the lifts has been changed several times during the tower's history. Given the elasticity of the cables and the time taken to align the cars with the landings, each lift, in normal service, takes an average of 8 minutes and 50 seconds to do the round trip, spending an average of 1 minute and 15 seconds at each level. The average journey time between levels is 1 minute. The original hydraulic mechanism is on public display in a small museum at the base of the east and west legs. Because the mechanism requires frequent lubrication and maintenance, public access is often restricted. The rope mechanism of the north tower can be seen as visitors exit the lift.</span></p><span data-dcnode-id="805" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="802"><span class="mw-headline" data-dcnode-id="803" id="Engraved_names"><span data-dcnode-id="804" instrument_node="">Engraved names</span></span></h3><span data-dcnode-id="801" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="788"><span data-dcnode-id="800" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="790" style="width:302px;"><a class="image" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ALes_savants_de_la_Tour_Eiffel.jpg"><img alt="Les savants de la Tour Eiffel" class="thumbimage" data-dcnode-id="799" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/8/89/Les_savants_de_la_Tour_Eiffel.jpg/300px-Les_savants_de_la_Tour_Eiffel.jpg&amp;raw" width="300"></a><span data-dcnode-id="797" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">
</span><div class="magnify" data-dcnode-id="794"><a class="internal" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ALes_savants_de_la_Tour_Eiffel.jpg" title="Enlarge"></a></div><span data-dcnode-id="793" instrument_node="">
Names engraved on the tower</span></div><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Gustave Eiffel engraved on the tower the names of 72 French scientists, engineers and mathematicians in recognition of their contributions to the building of the tower. Eiffel chose this "invocation of science" because of his concern over the artists' protest. At the beginning of the 20th century, the engravings were painted over, but they were restored in 1986–87 by the </span><span data-dcnode-id="784" lang="fr" xml:lang="fr"><span data-dcnode-id="785" instrument_node="">Société Nouvelle d'exploitation de la Tour Eiffel</span></span><span data-dcnode-id="783" instrument_node="">, a company operating the tower.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="778"><span class="mw-headline" data-dcnode-id="779" id="Aesthetics"><span data-dcnode-id="780" instrument_node="">Aesthetics</span></span></h3><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">The tower is painted in three shades: lighter at the top, getting progressively darker towards the bottom to perfectly complement the Parisian sky. It was originally reddish brown; this changed in 1968 to a bronze colour known as "Eiffel Tower Brown".</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The only non-structural elements are the four decorative grill-work arches, added in Sauvestre's sketches, which served to make the tower look more substantial and to make a more impressive entrance to the exposition.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">One of the great Hollywood movie clichés is that the view from a Parisian window always includes the tower. In reality, since zoning restrictions limit the height of most buildings in Paris to seven storeys, only a small number of tall buildings have a clear view of the tower.</span></p><span data-dcnode-id="768" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="765"><span class="mw-headline" data-dcnode-id="766" id="Maintenance"><span data-dcnode-id="767" instrument_node="">Maintenance</span></span></h3><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">Maintenance of the tower includes applying 60&nbsp;tons of paint every seven years to prevent it from </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Rust" title="Rust"><span data-dcnode-id="762" instrument_node="">rusting</span></a><span data-dcnode-id="760" instrument_node="">. The tower has been completely repainted at least 19 times since it was built. Lead paint was still being used as recently as 2001 when the practice was stopped out of concern for the environment.</span></p><span data-dcnode-id="758" instrument_node="">
</span><div class="thumb tnone" data-dcnode-id="743" style="margin-left:auto;margin-right:auto;overflow:hidden;width:auto;max-width:888px"><span data-dcnode-id="757" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="745"><span data-dcnode-id="756" instrument_node="">
</span><div class="noresize" data-dcnode-id="753" style="overflow:auto"><a class="image" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ATour_Eiffel_360_Panorama.jpg" title="Panorama of Paris and its suburbs from the top of the Eiffel Tower"><img alt="Panorama of Paris from the Tour Eiffel" data-dcnode-id="755" height="117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/a/ae/Tour_Eiffel_360_Panorama.jpg/880px-Tour_Eiffel_360_Panorama.jpg&amp;raw" width="880"></a></div><span data-dcnode-id="752" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">
</span><div class="magnify" data-dcnode-id="749"><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ATour_Eiffel_360_Panorama.jpg" title="Image:Tour Eiffel 360 Panorama.jpg"></a></div><span data-dcnode-id="748" instrument_node="">
Panorama of Paris and its suburbs from the top of the Eiffel Tower</span></div><span data-dcnode-id="746" instrument_node="">
</span></div><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><h2 class="section-heading" data-dcnode-id="739"><span class="mw-headline" data-dcnode-id="740" id="Tourism"><span data-dcnode-id="741" instrument_node="">Tourism</span></span></h2><span data-dcnode-id="738" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="735"><span class="mw-headline" data-dcnode-id="736" id="Transport"><span data-dcnode-id="737" instrument_node="">Transport</span></span></h3><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">The nearest </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Paris_M%25C3%25A9tro" title="Paris Métro"><span data-dcnode-id="732" instrument_node="">Paris Métro</span></a><span data-dcnode-id="730" instrument_node=""> station is Bir-Hakeim and the nearest RER station is Champ de Mars-Tour Eiffel. The tower itself is located at the intersection of the quai Branly and the Pont d'Iéna.</span></p><span data-dcnode-id="728" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="725"><span class="mw-headline" data-dcnode-id="726" id="Popularity"><span data-dcnode-id="727" instrument_node="">Popularity</span></span></h3><span data-dcnode-id="724" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="711"><span data-dcnode-id="723" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="713" style="width:302px;"><a class="image" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AEiffel_Tower_Visitors.svg"><img alt="Eiffel Tower Visitors" class="thumbimage" data-dcnode-id="722" height="134" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/2/2e/Eiffel_Tower_Visitors.svg/300px-Eiffel_Tower_Visitors.svg.png&amp;raw" width="300"></a><span data-dcnode-id="720" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="715"><span data-dcnode-id="719" instrument_node="">
</span><div class="magnify" data-dcnode-id="717"><a class="internal" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AEiffel_Tower_Visitors.svg" title="Enlarge"></a></div><span data-dcnode-id="716" instrument_node="">
Number of visitors per year between 1889 and 2004</span></div><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span></div><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">More than 250&nbsp;million people have visited the tower since it was completed in 1889. In 2015, there were 6.91&nbsp;million visitors. The tower is the most-visited paid monument in the world. An average of 25,000 people ascend the tower every day which can result in long queues. Tickets can be purchased online to avoid the long queues.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h3 class="section-heading" data-dcnode-id="704"><span class="mw-headline" data-dcnode-id="705" id="Restaurants"><span data-dcnode-id="706" instrument_node="">Restaurants</span></span></h3><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="702" instrument_node="">The tower has two restaurants: </span><span data-dcnode-id="700" lang="fr" xml:lang="fr"><span data-dcnode-id="701" instrument_node="">Le 58 Tour Eiffel</span></span><span data-dcnode-id="699" instrument_node=""> on the first level, and </span><span data-dcnode-id="697" lang="fr" xml:lang="fr"><span data-dcnode-id="698" instrument_node="">Le Jules Verne</span></span><span data-dcnode-id="696" instrument_node="">, a gourmet restaurant with its own lift on the second level. This restaurant has one star in the </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Michelin_Guide" title="Michelin Guide"><span data-dcnode-id="695" instrument_node="">Michelin Red Guide</span></a><span data-dcnode-id="693" instrument_node="">. It is run by the multi-</span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Michelin_Guide" title="Michelin Guide"><span data-dcnode-id="692" instrument_node="">Michelin star</span></a><span data-dcnode-id="690" instrument_node=""> chef </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Alain_Ducasse" title="Alain Ducasse"><span data-dcnode-id="689" instrument_node="">Alain Ducasse</span></a><span data-dcnode-id="687" instrument_node=""> and owes its name to the famous science-fiction writer </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Jules_Verne" title="Jules Verne"><span data-dcnode-id="686" instrument_node="">Jules Verne</span></a><span data-dcnode-id="684" instrument_node="">. Additionally, there is a champagne bar at the top of the Eiffel Tower.</span></p><span data-dcnode-id="682" instrument_node="">
</span><h2 class="section-heading" data-dcnode-id="679"><span class="mw-headline" data-dcnode-id="680" id="Replicas"><span data-dcnode-id="681" instrument_node="">Replicas</span></span></h2><span data-dcnode-id="678" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="665"><span data-dcnode-id="677" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="667" style="width:302px;"><a class="image" data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AParis_hotel_%28Las_Vegas%291.JPG"><img alt="Paris hotel (Las Vegas)1" class="thumbimage" data-dcnode-id="676" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/3/31/Paris_hotel_%2528Las_Vegas%25291.JPG/300px-Paris_hotel_%2528Las_Vegas%25291.JPG&amp;raw" width="300"></a><span data-dcnode-id="674" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">
</span><div class="magnify" data-dcnode-id="671"><a class="internal" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3AParis_hotel_%28Las_Vegas%291.JPG" title="Enlarge"></a></div><span data-dcnode-id="670" instrument_node="">
Replica at the Paris Las Vegas Hotel, Nevada, United States</span></div><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="663" instrument_node="">As one of the most iconic landmarks in the world, the Eiffel Tower has been the inspiration for the creation of many replicas and similar towers. An early example is </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Blackpool_Tower" title="Blackpool Tower"><span data-dcnode-id="662" instrument_node="">Blackpool Tower</span></a><span data-dcnode-id="660" instrument_node=""> in England. The mayor of Blackpool, Sir John Bickerstaffe, was so impressed on seeing the Eiffel Tower at the 1889 exposition that he commissioned a similar tower to be built in his town. It opened in 1894 and is 158.1&nbsp;metres (518&nbsp;ft) tall. </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Tokyo_Tower" title="Tokyo Tower"><span data-dcnode-id="659" instrument_node="">Tokyo Tower</span></a><span data-dcnode-id="657" instrument_node=""> in Japan, built as a communications tower in 1958, was also inspired by the Eiffel Tower.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="654" instrument_node="">There are various scale models of the tower in the United States, including a half-scale version at the Paris Las Vegas, Nevada, one in </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Paris%2C_Texas" title="Paris, Texas"><span data-dcnode-id="653" instrument_node="">Paris, Texas</span></a><span data-dcnode-id="651" instrument_node=""> built in 1993, and two 1:3 scale models at </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Kings_Island" title="Kings Island"><span data-dcnode-id="650" instrument_node="">Kings Island</span></a><span data-dcnode-id="648" instrument_node="">, </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Ohio" title="Ohio"><span data-dcnode-id="647" instrument_node="">Ohio</span></a><span data-dcnode-id="645" instrument_node="">, and </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Kings_Dominion" title="Kings Dominion"><span data-dcnode-id="644" instrument_node="">Kings Dominion</span></a><span data-dcnode-id="642" instrument_node="">, </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Virginia" title="Virginia"><span data-dcnode-id="641" instrument_node="">Virginia</span></a><span data-dcnode-id="639" instrument_node="">, amusement parks opened in 1972 and 1975 respectively. Two 1:3 scale models can be found in China, one in </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Durango%2C_Durango" title="Durango, Durango"><span data-dcnode-id="638" instrument_node="">Durango, Mexico</span></a><span data-dcnode-id="636" instrument_node=""> that was donated by the local French community, and several across Europe.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">In 2011, the TV show </span><i data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Pricing the Priceless</span></i><span data-dcnode-id="630" instrument_node=""> on the National Geographic Channel speculated that a full-size replica of the tower would cost approximately US$480&nbsp;million to build.</span></p><span data-dcnode-id="628" instrument_node="">
</span><h2 class="section-heading" data-dcnode-id="625"><span class="mw-headline" data-dcnode-id="626" id="Communications"><span data-dcnode-id="627" instrument_node="">Communications</span></span></h2><span data-dcnode-id="624" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="611"><span data-dcnode-id="623" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="613" style="width:232px;"><a class="image" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ATour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg"><img alt="Tour Eiffel le sommet 08-2015 (cropped)" class="thumbimage" data-dcnode-id="622" height="346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/1/11/Tour_Eiffel_le_sommet_08-2015_%2528cropped%2529.jpg/230px-Tour_Eiffel_le_sommet_08-2015_%2528cropped%2529.jpg&amp;raw" width="230"></a><span data-dcnode-id="620" instrument_node="">

</span><div class="magnify" data-dcnode-id="617"><a class="internal" data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3ATour_Eiffel_le_sommet_08-2015_%28cropped%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="616" instrument_node="">
Top of the Eiffel Tower</span></div><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="609" instrument_node="">The tower has been used for making radio transmissions since the beginning of the 20th century. Until the 1950s, sets of aerial wires ran from the cupola to anchors on the Avenue de Suffren and Champ de Mars. These were connected to </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Longwave" title="Longwave"><span data-dcnode-id="608" instrument_node="">longwave</span></a><span data-dcnode-id="606" instrument_node=""> transmitters in small bunkers. In 1909, a permanent underground radio centre was built near the south pillar, which still exists today. On 20 November 1913, the Paris Observatory, using the Eiffel Tower as an aerial, exchanged wireless signals with the </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/United_States_Naval_Observatory" title="United States Naval Observatory"><span data-dcnode-id="605" instrument_node="">United States Naval Observatory</span></a><span data-dcnode-id="603" instrument_node="">, which used an aerial in </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Arlington_County%2C_Virginia" title="Arlington County, Virginia"><span data-dcnode-id="602" instrument_node="">Arlington</span></a><span data-dcnode-id="600" instrument_node="">, Virginia. The object of the transmissions was to measure the difference in longitude between Paris and </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="599" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="597" instrument_node=""> Today, radio and digital television signals are transmitted from the Eiffel Tower.</span></p><span data-dcnode-id="595" instrument_node="">

ps%3A//kids.kiddle.co/TF1" title="TF1"><span data-dcnode-id="459" instrument_node="">TF1</span></a></td></tr><tr data-dcnode-id="439"><td data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">527.25&nbsp;MHz</span></td><td data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">—</span></td><td data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">28</span></td><td data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">500</span></td><td data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">France 3</span></td></tr><tr data-dcnode-id="423"><td data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">543.25&nbsp;MHz</span></td><td data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">—</span></td><td data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">30</span></td><td data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">100</span></td><td data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">France 5</span></td></tr><tr data-dcnode-id="407"><td data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">567.25&nbsp;MHz</span></td><td data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">—</span></td><td data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">33</span></td><td data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">100</span></td><td data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">M6</span></td></tr></tbody></table><h2 class="section-heading" data-dcnode-id="402"><span class="mw-headline" data-dcnode-id="403" id="Illumination_copyright"><span data-dcnode-id="404" instrument_node="">Illumination copyright</span></span></h2><span data-dcnode-id="401" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="388"><span data-dcnode-id="400" instrument_node="">
</span><div class="thumbinner" data-dcnode-id="390" style="width:302px;"><a class="image" data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3APhotographing_the_Eiffel_Tower_at_dusk.jpg"><img alt="Photographing the Eiffel Tower at dusk" class="thumbimage" data-dcnode-id="399" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/images/thumb/8/84/Photographing_the_Eiffel_Tower_at_dusk.jpg/300px-Photographing_the_Eiffel_Tower_at_dusk.jpg&amp;raw" width="300"></a><span data-dcnode-id="397" instrument_node="">
</span><div class="thumbcaption" data-dcnode-id="392"><span data-dcnode-id="396" instrument_node="">
</span><div class="magnify" data-dcnode-id="394"><a class="internal" data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Image%3APhotographing_the_Eiffel_Tower_at_dusk.jpg" title="Enlarge"></a></div><span data-dcnode-id="393" instrument_node="">
The Eiffel Tower illuminated in 2015</span></div><span data-dcnode-id="391" instrument_node="">
</span></div><span data-dcnode-id="389" instrument_node="">
</span></div><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="386" instrument_node="">The tower and its image have long been in the </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Public_domain" title="Public domain"><span data-dcnode-id="385" instrument_node="">public domain</span></a><span data-dcnode-id="383" instrument_node="">. In June 1990 a French court ruled that a special lighting display on the tower in 1989 to mark the tower's 100th anniversary was an "original visual creation" protected by copyright. The Court of Cassation, France's judicial court of last resort, upheld the ruling in March 1992. The </span><span data-dcnode-id="381" lang="fr" xml:lang="fr"><span data-dcnode-id="382" instrument_node="">Société d'Exploitation de la Tour Eiffel</span></span><span data-dcnode-id="380" instrument_node=""> (SETE) now considers any illumination of the tower to be a separate work of art that falls under copyright. As a result, the SNTE alleges that it is illegal to publish contemporary photographs of the lit tower at night without permission in France and some other countries for commercial use.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">The imposition of copyright has been controversial. The Director of Documentation for what was then called the </span><span data-dcnode-id="375" lang="fr" xml:lang="fr"><span data-dcnode-id="376" instrument_node="">Société Nouvelle d'exploitation de la Tour Eiffel</span></span><span data-dcnode-id="374" instrument_node=""> (SNTE), Stéphane Dieu, commented in 2005: "It is really just a way to manage commercial use of the image, so that it isn't used in ways [of which] we don't approve". SNTE made over €1&nbsp;million from copyright fees in 2002. However, it could also be used to restrict the publication of tourist photographs of the tower at night, as well as hindering non-profit and semi-commercial publication of images of the illuminated tower.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="371" instrument_node="">French doctrine and jurisprudence allows pictures incorporating a copyrighted work as long as their presence is incidental or accessory to the subject being represented, a reasoning akin to the </span><i data-dcnode-id="368"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/De_minimis" title="De minimis"><span data-dcnode-id="370" instrument_node="">de minimis</span></a></i><span data-dcnode-id="367" instrument_node=""> rule. Therefore, SETE may be unable to claim copyright on photographs of Paris which happen to include the lit tower.</span></p><span data-dcnode-id="365" instrument_node="">
</span><h2 class="section-heading" data-dcnode-id="362"><span class="mw-headline" data-dcnode-id="363" id="Taller_structures"><span data-dcnode-id="364" instrument_node="">Taller structures</span></span></h2><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">The Eiffel Tower was the world's tallest structure when completed in 1889, a distinction it retained until 1929 when the </span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.kiddle.co/Chrysler_Building" title="Chrysler Building"><span data-dcnode-id="359" instrument_node="">Chrysler Building</span></a><span data-dcnode-id="357" instrument_node=""> in New York City was topped out. The tower has lost its standing both as the world's tallest structure and the world's tallest lattice tower but retains its status as the tallest freestanding (non-guyed) structure in France.</span></p><span data-dcnode-id="355" instrument_node="">
