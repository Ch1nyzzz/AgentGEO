		was built for the International Exhibition of Paris of </span><span data-dcnode-id="273"><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">1889</span></strong></span><span data-dcnode-id="272" instrument_node=""> 
		commemorating the centenary of the French Revolution. The Prince of Wales, 
		later </span><span data-dcnode-id="269"><strong data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">King Edward VII</span></strong></span><span data-dcnode-id="268" instrument_node=""> of England, opened the 
		tower. Of the 700 proposals submitted in a design competition, </span><span data-dcnode-id="263"><span data-dcnode-id="267" instrument_node="">
</span><strong data-dcnode-id="264"><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Gustave Eiffel</span></em></strong></span><span data-dcnode-id="262" instrument_node="">'s was unanimously chosen. 
		However it was not accepted by all at first, and a petition of 300 names 
		- including those of Maupassant, Emile Zola, Charles Garnier (architect 
		of the Opéra Garnier), and Dumas the Younger - protested its construction. At </span><span data-dcnode-id="259"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">300 meters</span></strong></span><span data-dcnode-id="258" instrument_node=""> (320.75 m including 
		antenna), and 7,000 tons, it was the world's tallest building until
		</span><span data-dcnode-id="255"><strong data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">1930</span></strong></span><span data-dcnode-id="254" instrument_node="">. Other statistics include:</span></p><span data-dcnode-id="252" instrument_node="">
</span><ol data-dcnode-id="230"><span data-dcnode-id="251" instrument_node="">
</span><li data-dcnode-id="248"><font color="#660000" data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">2.5 million rivets</span></font></li><span data-dcnode-id="247" instrument_node="">
</span><li data-dcnode-id="244"><font color="#660000" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">300 steel 
		workers, and 2 years (1887-1889) to construct it.</span></font></li><span data-dcnode-id="243" instrument_node="">
</span><li data-dcnode-id="240"><font color="#660000" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Sway of at most 12 cm in high winds.</span></font></li><span data-dcnode-id="239" instrument_node="">
</span><li data-dcnode-id="236"><font color="#660000" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Height varies up to 15 cm depending on temperature.</span></font></li><span data-dcnode-id="235" instrument_node="">
</span><li data-dcnode-id="232"><font color="#660000" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">15,000 iron pieces 
		(excluding rivets). 40 tons of paint. 1652 steps to the top.</span></font></li><span data-dcnode-id="231" instrument_node="">
</span></ol><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="209"><span data-dcnode-id="228" instrument_node="">In </span><span data-dcnode-id="225"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">1889</span></strong></span><span data-dcnode-id="224" instrument_node="">, </span><span data-dcnode-id="220"><strong data-dcnode-id="221"><em data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Gustave Eiffel
		</span></em></strong></span><span data-dcnode-id="219" instrument_node="">began to fit the peak of the tower as an observation 
		station to measure the speed of wind. He also encouraged several scientific 
		experiments including </span><span data-dcnode-id="215"><strong data-dcnode-id="216"><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Foucault</span></em></strong></span><span data-dcnode-id="214" instrument_node="">'s 
		giant pendulum, a mercury barometer and the first experiment of radio transmission. 
		In </span><span data-dcnode-id="211"><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">1898</span></strong></span><span data-dcnode-id="210" instrument_node="">, Eugene Ducretet at the Pantheon, 
		received signals from the tower.</span></p><span data-dcnode-id="208" instrument_node="">
</span><img alt="Eiffel tower legend " data-dcnode-id="207" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corrosion-doctors.org/Landmarks/images/Eiffel-Tower.jpg&amp;raw" style="float: left" width="354"><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="205" instrument_node="">After </span><strong data-dcnode-id="202"><em data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Gustave Eiffel</span></em></strong><span data-dcnode-id="201" instrument_node=""> experiments in the field 
		of meterology, he begun to look at the effects of wind and air resistance, 
		the science that would later be termed aerodynamics, which has become a 
		large part of both military and commercial aviation as well as rocket technology.
		</span><span data-dcnode-id="197"><strong data-dcnode-id="198"><em data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Gustave Eiffel</span></em></strong></span><span data-dcnode-id="196" instrument_node=""> imagined an automatic 
		device sliding along a cable that was stretched between the ground and the 
		second floor of the Eiffel Tower. (</span><a data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.endex.com/gf/buildings/eiffel/eiffelhistory.htm" target="_blank"><span data-dcnode-id="195" instrument_node="">reference</span></a><span data-dcnode-id="193" instrument_node="">)
		</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="190" instrument_node="">The tower was almost torn down in </span><span data-dcnode-id="187"><strong data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">1909</span></strong></span><span data-dcnode-id="186" instrument_node="">, 
		but was saved because of its antenna used both for military and other purposes, 
		and the city let it stand after the permit expired. When the tower played 
		an important role in capturing the infamous spy </span><span data-dcnode-id="183"><strong data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Mata Hari</span></strong></span><span data-dcnode-id="182" instrument_node=""> 
		during </span><span data-dcnode-id="179"><strong data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">World War I</span></strong></span><span data-dcnode-id="178" instrument_node="">, it gained such importance 
		to the French people that there was no more thought of demolishing it.- 
		used for telegraphy at that time.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="175" instrument_node="">
From </span><span data-dcnode-id="172"><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">1910</span></strong></span><span data-dcnode-id="171" instrument_node=""> and on the Eiffel 
		Tower became part of the International Time Service. French radio (since
		</span><span data-dcnode-id="168"><strong data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">1918</span></strong></span><span data-dcnode-id="167" instrument_node="">), and French television (since </span><span data-dcnode-id="163"><span data-dcnode-id="166" instrument_node="">
</span><strong data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">1957</span></strong></span><span data-dcnode-id="162" instrument_node="">) have also made use of its stature.</span></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="159" instrument_node="">During its lifetime, the</span><a data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//corrosion-doctors.org/Landmarks/Eiffel.htm"><span data-dcnode-id="158" instrument_node=""> Eiffel Tower</span></a><span data-dcnode-id="156" instrument_node=""> has also 
		witnessed a few strange scenes, including being scaled by a mountaineer 
		in </span><span data-dcnode-id="153"><strong data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">1954</span></strong></span><span data-dcnode-id="152" instrument_node="">, and parachuted off of in </span><span data-dcnode-id="148"><span data-dcnode-id="151" instrument_node="">
</span><strong data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">1984</span></strong></span><span data-dcnode-id="147" instrument_node=""> by two Englishmen. In </span><span data-dcnode-id="144"><strong data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">1923</span></strong></span><span data-dcnode-id="143" instrument_node=""> 
		a journalist rode a bicycle down from the first level. Some accounts say 
		he rode down the stairs, other accounts suggest the exterior of one of the 
		tower's four legs which slope outward. (</span><a data-dcnode-id="141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.paris.org/Monuments/Eiffel/" target="_blank"><span data-dcnode-id="142" instrument_node="">reference</span></a><span data-dcnode-id="140" instrument_node="">)</span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="129"><span data-dcnode-id="137" instrument_node="">Of the </span><span data-dcnode-id="134"><strong data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">7.5 million kilowatt hours</span></strong></span><span data-dcnode-id="133" instrument_node=""> of electricity 
		used annually, 580 thousand are used exclusively to illuminate the tower. 
		The tower's annual operation also requires the use of 2 tons of paper 
		for tickets, 4 tons of rag or paper wipes, 10,000 applications of detergents, 
		400 liters of metal cleansers and 25,000 garbage bags. (</span><a data-dcnode-id="131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.french-at-a-touch.com/Newsletters_and_Articles/" target="_blank"><span data-dcnode-id="132" instrument_node="">reference</span></a><span data-dcnode-id="130" instrument_node="">)</span></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="127" instrument_node="">On the four facades of the tower, the 72 surnames of leading turn-of-the-century
		</span><a data-dcnode-id="122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/The_72_names_on_the_Eiffel_Tower" target="_blank"><span data-dcnode-id="126" instrument_node="">
</span><strong data-dcnode-id="123"><em data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">French scientists</span></em></strong></a><span data-dcnode-id="121" instrument_node=""> and engineers are engraved 
		in recognition of their contributions to science. This engraving was over 
		painted at the beginning of the 20th century and restored in </span><span data-dcnode-id="117"><span data-dcnode-id="120" instrument_node="">
</span><strong data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">1986-1987</span></strong></span><span data-dcnode-id="116" instrument_node=""> by the Société Nouvelle d' Exploitation 
		de la Tour Eiffel, a company contracted to operate business related to the 
		Tower. </span></p><span data-dcnode-id="114" instrument_node="">
