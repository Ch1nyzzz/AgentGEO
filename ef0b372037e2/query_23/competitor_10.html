only economically advantageous for remote locations.</span></p><p data-dcnode-id="1733"><span data-dcnode-id="1749" instrument_node="">Economic factors motivated Eastwood to innovate with the standard multiple arch form and develop ‘triple arch’ and ‘multiple cone’ designs that could reduce concrete unit costs. His early dams required small quantities of concrete, but their formwork also required detailed carpentry (</span><span class="figure refFigure figuresContent" data-dcnode-id="1745" id="ref-ehah162-137-f8"><a class="showFiguresEEvent figure-no-ehah162-137-f8" data-attr-fig-id="ehah162-137-f8" data-dcnode-id="1746" href="#" title="Open Figure Viewer"><span data-dcnode-id="1748" instrument_node="">Figure 8</span><span class="overlay" data-dcnode-id="1747"></span></a></span><span data-dcnode-id="1744" instrument_node="">). To reduce expenses, he sought to exploit the economic advantages of casting mass concrete and in the early 1920s developed designs such as the Webber Creek Dam (built) and the San Elijo Dam (proposed) that utilised three or four wide-span arches. (</span><span class="figure refFigure figuresContent" data-dcnode-id="1740" id="ref-ehah162-137-f9"><a class="showFiguresEEvent figure-no-ehah162-137-f9" data-attr-fig-id="ehah162-137-f9" data-dcnode-id="1741" href="#" title="Open Figure Viewer"><span data-dcnode-id="1743" instrument_node="">Figures 9</span><span class="overlay" data-dcnode-id="1742"></span></a></span><span data-dcnode-id="1739" instrument_node=""> and </span><span class="figure refFigure figuresContent" data-dcnode-id="1735" id="ref-ehah162-137-f10"><a class="showFiguresEEvent figure-no-ehah162-137-f10" data-attr-fig-id="ehah162-137-f10" data-dcnode-id="1736" href="#" title="Open Figure Viewer"><span data-dcnode-id="1738" instrument_node="">10</span><span class="overlay" data-dcnode-id="1737"></span></a></span><span data-dcnode-id="1734" instrument_node="">) These designs—suitable for relatively narrow gorges—required concrete quantities comparable with more standard type of multiple arch dams but lessened the expense of erecting formwork and casting concrete.</span></p><div class="figure figuresContent" data-dcnode-id="1719" id="ehah162-137-f8"><div class="holder" data-dcnode-id="1720"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f8" data-dcnode-id="1730" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1732" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f8.gif&amp;raw"><span class="overlay" data-dcnode-id="1731"></span></a><div class="caption" data-dcnode-id="1721"><span data-dcnode-id="1729" instrument_node=""> </span><p data-dcnode-id="1725"><span class="captionLabel" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Figure 8</span></span><span data-dcnode-id="1726" instrument_node=""> Lake Hodges Dam under construction in San Diego County, California, 1917. The articulated form of the arches and buttress required a large amount of carpentry that added to the unit cost of casting concrete. (Author's collection)</span></p><span data-dcnode-id="1724" instrument_node=""> </span><div data-dcnode-id="1722" id="footer"><input data-dcnode-id="1723" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="1702" id="ehah162-137-f9"><div class="holder" data-dcnode-id="1703"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f9" data-dcnode-id="1716" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1718" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f9.gif&amp;raw"><span class="overlay" data-dcnode-id="1717"></span></a><div class="caption" data-dcnode-id="1704"><span data-dcnode-id="1715" instrument_node=""> </span><p data-dcnode-id="1708"><span class="captionLabel" data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Figure 9</span></span><span data-dcnode-id="1712" instrument_node=""> ‘Triple-arch’ Webber Creek Dam near Placerville, California shortly after completion in 1924. The concrete hoisting tower is still visible as is wooden formwork; the arches vary in thickness from 0·75 m at the top to 3·65 m at the deepest section. This 30 m high design (built with about 4200 m</span><sup data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">3</span></sup><span data-dcnode-id="1709" instrument_node=""> of concrete) allowed much simpler formwork than a standard multiple arch dam, thus reducing unit costs for casting concrete. (Water Resources Center Archives)</span></p><span data-dcnode-id="1707" instrument_node=""> </span><div data-dcnode-id="1705" id="footer"><input data-dcnode-id="1706" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="1688" id="ehah162-137-f10"><div class="holder" data-dcnode-id="1689"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f10" data-dcnode-id="1699" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1701" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f10.gif&amp;raw"><span class="overlay" data-dcnode-id="1700"></span></a><div class="caption" data-dcnode-id="1690"><span data-dcnode-id="1698" instrument_node=""> </span><p data-dcnode-id="1694"><span class="captionLabel" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">Figure 10</span></span><span data-dcnode-id="1695" instrument_node=""> Top: Plan view of ‘Radial Cone’ design for proposed 45 m high San Elijo Dam near San Diego, California. Bottom: Cross-section of centre arch showing maximum thickness of about 3 m at deepest foundation; a siphon spillway is shown at top of arch. (Water Resources Center Archives)</span></p><span data-dcnode-id="1693" instrument_node=""> </span><div data-dcnode-id="1691" id="footer"><input data-dcnode-id="1692" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1453" id="s6"><a class="scroll-offset" data-dcnode-id="1685" name="_i17"></a><div class="sectionInfo" data-dcnode-id="1587"><div class="sectionHeading" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">6. ELEGANCE</span></div><div class="sectionJumpTo" data-dcnode-id="1588"><div class="sectionLabel" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Section:</span></div><form data-dcnode-id="1594" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="1658" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="1679" selected="#" value="#">Choose</option><option data-dcnode-id="1677" value="#">Top of page</option><option data-dcnode-id="1675" value="#abstract">Abstract</option><option data-dcnode-id="1673" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="1671" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="1669" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="1667" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="1665" value="#_i13">5. ECONOMY</option><option data-dcnode-id="1663" value="">6. ELEGANCE &lt;&lt;</option><option data-dcnode-id="1661" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="1659" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="1595"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="1653" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Choose</span></span><span data-dcnode-id="1655" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="1654"></span></button><div class="dropdown-menu open" data-dcnode-id="1596"><ul class="dropdown-menu inner" data-dcnode-id="1597" role="menu"><li class="selected" data-dcnode-id="1648" data-original-index="0"><a class="" data-dcnode-id="1649" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1650"></span></a></li><li data-dcnode-id="1643" data-original-index="1"><a class="" data-dcnode-id="1644" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1645"></span></a></li><li data-dcnode-id="1638" data-original-index="2"><a class="" data-dcnode-id="1639" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1640"></span></a></li><li data-dcnode-id="1633" data-original-index="3"><a class="" data-dcnode-id="1634" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1635"></span></a></li><li data-dcnode-id="1628" data-original-index="4"><a class="" data-dcnode-id="1629" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1630"></span></a></li><li data-dcnode-id="1623" data-original-index="5"><a class="" data-dcnode-id="1624" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1625"></span></a></li><li data-dcnode-id="1618" data-original-index="6"><a class="" data-dcnode-id="1619" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1620"></span></a></li><li data-dcnode-id="1613" data-original-index="7"><a class="" data-dcnode-id="1614" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1615"></span></a></li><li data-dcnode-id="1608" data-original-index="8"><a class="" data-dcnode-id="1609" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">6. ELEGANCE &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1610"></span></a></li><li data-dcnode-id="1603" data-original-index="9"><a class="" data-dcnode-id="1604" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1605"></span></a></li><li data-dcnode-id="1598" data-original-index="10"><a class="" data-dcnode-id="1599" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1600"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="1589"><a class="up" data-dcnode-id="1592" href="#_i13"><img alt="Previous section" border="0" data-dcnode-id="1593" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="1590" href="#_i23"><img alt="Next section" border="0" data-dcnode-id="1591" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">With Eastwood's dams, an observer confronts forms bearing scant resemblance to the bridges and long span vaults constituting the most prominent examples of structural art. Except for the ‘aesthetic of mass’ associated with monumental gravity dams (and the allied visual appearance of single arch dams), little precedent exists for viewing dams within an artistic context. However, once observers become familiar with multiple arch technology, the form can appear quite elegant and visually expressive.</span></p><p data-dcnode-id="1573"><span data-dcnode-id="1584" instrument_node="">Eastwood's interest in reinforced concrete dams did not originate as a means of artistic expression, instead developing out of a utilitarian desire to impound large reservoirs at minimal expense. But despite a design orientation that would seemingly place little value on aesthetics, he clearly cared about the appearance of his dams. For example, consider the strut-tie beams used to provide lateral bracing for the buttresses at Big Bear Valley Dam (</span><span class="figure refFigure figuresContent" data-dcnode-id="1580" id="ref-ehah162-137-f11"><a class="showFiguresEEvent figure-no-ehah162-137-f11" data-attr-fig-id="ehah162-137-f11" data-dcnode-id="1581" href="#" title="Open Figure Viewer"><span data-dcnode-id="1583" instrument_node="">Figure 11</span><span class="overlay" data-dcnode-id="1582"></span></a></span><span data-dcnode-id="1579" instrument_node="">). Constructed in 1910–11, these strut-tie beams consist of wonderfully expressive open-spandrel arches. Nothing requires the bracing to be so graceful in its form, but at the same time the materially efficient arch design is devoid of architectural adornment or embellishment. The strut-tie beams were conceived for the practical purpose of resisting seismic tremors, but beyond this, they imbue the design with an engaging flair. Later designs such as Murray Dam (1918), Lake Hodges Dam (1918) and Anyox Dam in British Columbia (1923) featured open spandrel arch strut-tie beam designs, affirming his commitment to the form (</span><span class="figure refFigure figuresContent" data-dcnode-id="1575" id="ref-ehah162-137-f12"><a class="showFiguresEEvent figure-no-ehah162-137-f12" data-attr-fig-id="ehah162-137-f12" data-dcnode-id="1576" href="#" title="Open Figure Viewer"><span data-dcnode-id="1578" instrument_node="">Figure 12</span><span class="overlay" data-dcnode-id="1577"></span></a></span><span data-dcnode-id="1574" instrument_node="">).</span></p><div class="figure figuresContent" data-dcnode-id="1559" id="ehah162-137-f11"><div class="holder" data-dcnode-id="1560"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f11" data-dcnode-id="1570" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1572" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f11.gif&amp;raw"><span class="overlay" data-dcnode-id="1571"></span></a><div class="caption" data-dcnode-id="1561"><span data-dcnode-id="1569" instrument_node=""> </span><p data-dcnode-id="1565"><span class="captionLabel" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Figure 11</span></span><span data-dcnode-id="1566" instrument_node=""> Detail of strut-tie beam used to provide lateral bracing for Big Bear Valley Dam. The graceful form of this open-spandrel arch design reveals Eastwood's disinterest in mimicking the ponderous appearance of massive masonry/concrete gravity designs. (Author's collection)</span></p><span data-dcnode-id="1564" instrument_node=""> </span><div data-dcnode-id="1562" id="footer"><input data-dcnode-id="1563" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="1545" id="ehah162-137-f12"><div class="holder" data-dcnode-id="1546"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f12" data-dcnode-id="1556" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1558" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f12.gif&amp;raw"><span class="overlay" data-dcnode-id="1557"></span></a><div class="caption" data-dcnode-id="1547"><span data-dcnode-id="1555" instrument_node=""> </span><p data-dcnode-id="1551"><span class="captionLabel" data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Figure 12</span></span><span data-dcnode-id="1552" instrument_node=""> Downstream side of Murray Dam in San Diego, California, shortly after completion in 1918. The strut-tie beam bracing between the buttresses lends Eastwood's design a ‘lace curtain’ visual effect that contrasts strongly with the massive bulk of concrete gravity dams. (Author's collection)</span></p><span data-dcnode-id="1550" instrument_node=""> </span><div data-dcnode-id="1548" id="footer"><input data-dcnode-id="1549" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="1535"><span data-dcnode-id="1544" instrument_node="">This commitment did not occur in a professional vacuum, but instead was articulated in the face of strong opposition. These feelings are evident in a 1924 letter where he celebrated Anyox Dam's performance in withstanding an overtopping through an uncompleted arch (</span><span class="figure refFigure figuresContent" data-dcnode-id="1540" id="ref-ehah162-137-f13"><a class="showFiguresEEvent figure-no-ehah162-137-f13" data-attr-fig-id="ehah162-137-f13" data-dcnode-id="1541" href="#" title="Open Figure Viewer"><span data-dcnode-id="1543" instrument_node="">Figure 13</span><span class="overlay" data-dcnode-id="1542"></span></a></span><span data-dcnode-id="1539" instrument_node="">). Boasting of it being the ‘most beautiful dam in the world’ he further described Anyox as ‘one of the 17 strongest ‘Lace Curtain’ dams in the world,’ an allusion to the visual effect produced by the strut-tie beams extending between the buttresses.</span><a class="ref showRefEvent" data-dcnode-id="1537" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="34  John S. . Eastwood to Ed Fletcher. letter dated 25 April 1924, Folder 62, Eastwood Papers, WRCA." data-rid="b34" href="#"><span data-dcnode-id="1538" instrument_node="">34</span></a><span data-dcnode-id="1536" instrument_node=""> On the surface, this ‘lace curtain’ reference might seem a bit odd, but in fact it possesses deeper significance and relates to how others used visual/aesthetic criteria to oppose multiple arch dams.</span></p><div class="figure figuresContent" data-dcnode-id="1518" id="ehah162-137-f13"><div class="holder" data-dcnode-id="1519"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f13" data-dcnode-id="1532" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1534" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f13.gif&amp;raw"><span class="overlay" data-dcnode-id="1533"></span></a><div class="caption" data-dcnode-id="1520"><span data-dcnode-id="1531" instrument_node=""> </span><p data-dcnode-id="1524"><span class="captionLabel" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Figure 13</span></span><span data-dcnode-id="1528" instrument_node=""> Downstream side of Anyox Dam in British Columbia near completion of construction in 1923. The reservoir filled before the top of a central arch was cast and 48 m</span><sup data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">3</span></sup><span data-dcnode-id="1525" instrument_node=""> per second water poured through the opening, causing no damage and demonstrating how multiple arch designs could safely withstand overtopping or the partial loss of an arch. Eastwood imaginatively characterised the cascading overflow as ‘the bridesmaid of the dam’ and referenced this photograph in labelling Anyox ‘the most beautiful dam in the world.’ (Library of Congress)</span></p><span data-dcnode-id="1523" instrument_node=""> </span><div data-dcnode-id="1521" id="footer"><input data-dcnode-id="1522" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="1502"><span data-dcnode-id="1517" instrument_node="">First use of the phrase ‘lace curtain’ to describe an Eastwood design appears in a 1912 letter written by the prominent hydraulic engineer John R. Freeman to Arthur P. Davis, chief engineer of the US Reclamation Service, concerning Eastwood's Big Meadows hydroelectric dam then under construction.</span><a class="ref showRefEvent" data-dcnode-id="1515" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="35 John R. Freeman to Arthur P. Davis, letter dated 26 September 1912, Box 63, John R. Freeman papers (MC51), Institute Archives and Special Collections, Massachusetts Institute of Technology, Cambridge, Massachusetts. (Hereafter Freeman Papers, IT.)." data-rid="b35" href="#"><span data-dcnode-id="1516" instrument_node="">35</span></a><span data-dcnode-id="1514" instrument_node=""> An influential proponent of massive gravity dams (at the time he was involved with construction of New York City's Ashokan Dam)</span><a class="ref showRefEvent" data-dcnode-id="1512" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="36  White Z. . The Catskill Water Supply of New York City: History, Location, Subsurface Investigations, and Construction, 1913, Wiley, New York: 20." data-rid="b36" href="#"><span data-dcnode-id="1513" instrument_node="">36</span></a><span data-dcnode-id="1511" instrument_node=""> Freeman exhibited a strong distaste for Eastwood's multiple arch design and its visual appearance (</span><span class="figure refFigure figuresContent" data-dcnode-id="1507" id="ref-ehah162-137-f14"><a class="showFiguresEEvent figure-no-ehah162-137-f14" data-attr-fig-id="ehah162-137-f14" data-dcnode-id="1508" href="#" title="Open Figure Viewer"><span data-dcnode-id="1510" instrument_node="">Figure 14</span><span class="overlay" data-dcnode-id="1509"></span></a></span><span data-dcnode-id="1506" instrument_node="">). Pulling no punches, Freeman advised Davis that for Big Meadows he had ‘repeatedly informally urged’ the power company instead ‘to build a big massive lump of a dam.’ Significantly, Freeman's arguments concerning the suitability of Eastwood's design ultimately did not focus on technical issues so much as they did on matters of ‘psychology,’ visual appearance, and supposed public sentiment. For example, in his letter to Davis, he asserted that ‘the psychology of these airy arches and the lace curtain affects of [Eastwood[s] stiffening props is not well suited to inspire public confidence.’ Later Freeman recommended that the company fill in the downstream side of Eastwood's dam with earth in order ‘to lessen the apparent height of the buttresses’ should this become desirable for ‘diplomatic or psychological reasons.’</span><a class="ref showRefEvent" data-dcnode-id="1504" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="37 John R. Freeman to H. P. Wilson, letter dated 30 September 1912, Box 63, Freeman Papers, MIT." data-rid="b37" href="#"><span data-dcnode-id="1505" instrument_node="">37</span></a><span data-dcnode-id="1503" instrument_node=""> And in a final report to the power company Freeman counselled that:</span></p><div class="figure figuresContent" data-dcnode-id="1488" id="ehah162-137-f14"><div class="holder" data-dcnode-id="1489"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f14" data-dcnode-id="1499" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1501" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f14.gif&amp;raw"><span class="overlay" data-dcnode-id="1500"></span></a><div class="caption" data-dcnode-id="1490"><span data-dcnode-id="1498" instrument_node=""> </span><p data-dcnode-id="1494"><span class="captionLabel" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Figure 14</span></span><span data-dcnode-id="1495" instrument_node=""> Downstream side of Ashokan (Olive Bridge) Dam upon completion in 1915. This massive cyclopean masonry gravity structure is part of New York City's Catskill Aqueduct built under the supervision of consulting engineer John R. Freeman. In contrast to ‘lace curtain’ multiple arch dams, Ashokan's monumental façade (with concrete block facing) represented what Freeman believed large-scale dams should look like. (Author's collection)</span></p><span data-dcnode-id="1493" instrument_node=""> </span><div data-dcnode-id="1491" id="footer"><input data-dcnode-id="1492" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="quote" data-dcnode-id="1481"><span data-dcnode-id="1487" instrument_node=""> </span><p data-dcnode-id="1483"><span data-dcnode-id="1486" instrument_node="">It is worthy of some considerable expenditure beyond that to satisfy engineers… in order to satisfy the more or less ignorant public… [who will] regard the dam not from a technical standpoint, but by comparison with the familiar type of solid gravity dam.</span><a class="ref showRefEvent" data-dcnode-id="1484" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="38 John R. Freeman and Alfred Noble to H. P. Wilson (Secretary, Great Western Power Company), letter sent 17 October 1912, Freeman Papers, MIT." data-rid="b38" href="#"><span data-dcnode-id="1485" instrument_node="">38</span></a></p><span data-dcnode-id="1482" instrument_node=""> </span></div><p data-dcnode-id="1474"><span data-dcnode-id="1480" instrument_node="">Here, the battle lines were drawn and the visual elegance of the multiple arch dam—in contrast to the big massive lump of an architecturally adorned gravity design—was brought to the fore in arguments (made by a professionally prominent engineer) seeking to block its adoption (</span><span class="figure refFigure figuresContent" data-dcnode-id="1476" id="ref-ehah162-137-f15"><a class="showFiguresEEvent figure-no-ehah162-137-f15" data-attr-fig-id="ehah162-137-f15" data-dcnode-id="1477" href="#" title="Open Figure Viewer"><span data-dcnode-id="1479" instrument_node="">Figure 15</span><span class="overlay" data-dcnode-id="1478"></span></a></span><span data-dcnode-id="1475" instrument_node="">).</span></p><div class="figure figuresContent" data-dcnode-id="1460" id="ehah162-137-f15"><div class="holder" data-dcnode-id="1461"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f15" data-dcnode-id="1471" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1473" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f15.gif&amp;raw"><span class="overlay" data-dcnode-id="1472"></span></a><div class="caption" data-dcnode-id="1462"><span data-dcnode-id="1470" instrument_node=""> </span><p data-dcnode-id="1466"><span class="captionLabel" data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Figure 15</span></span><span data-dcnode-id="1467" instrument_node=""> Eastwood's Big Meadows Dam under construction in northern California, Summer 1912. Later that year, John Freeman's objections to the design on ‘psychological’ grounds that it did not appear visually impressive prompted the Great Western Power Company to abandon Eastwood's design and build a massive earthfill dam in its place. (Author's collection)</span></p><span data-dcnode-id="1465" instrument_node=""> </span><div data-dcnode-id="1463" id="footer"><input data-dcnode-id="1464" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="1454"><span data-dcnode-id="1459" instrument_node="">The fullness of the Big Meadows controversy is beyond the scope of this article, but Eastwood considered Freeman's efforts to alter the appearance of his dam to be ‘idiotic’ and he saw no value in gerrymandering the design in response to nebulous ideas about ‘psychology’ or what the public (as guided by Freeman) might expect a dam to look like.</span><a class="ref showRefEvent" data-dcnode-id="1458" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="39  Jackson D. C. . Confrontation at big meadows.Building the Ultimate Dam: John S. Eastwood and the Control of Water in the West, paperback edn, 2005, University of Oklahoma Press, Norman, 109–133." data-rid="b39" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1456" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="40 John S. Eastwood to A. W. Burchard, letter dated 29 October 1912, Folder 18, Eastwood Papers, WRCA." data-rid="b40" href="#"><span data-dcnode-id="1457" instrument_node="">39,40</span></a><span data-dcnode-id="1455" instrument_node=""> On this issue Eastwood's resolve never wavered and he never attempted to compromise the appearance of his designs as a means of making them more palatable or acceptable to critics.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1234" id="s7"><a class="scroll-offset" data-dcnode-id="1451" name="_i23"></a><div class="sectionInfo" data-dcnode-id="1353"><div class="sectionHeading" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">7. ‘ALL LINES ARE CURVES…’</span></div><div class="sectionJumpTo" data-dcnode-id="1354"><div class="sectionLabel" data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Section:</span></div><form data-dcnode-id="1360" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="1424" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="1445" selected="#" value="#">Choose</option><option data-dcnode-id="1443" value="#">Top of page</option><option data-dcnode-id="1441" value="#abstract">Abstract</option><option data-dcnode-id="1439" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="1437" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="1435" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="1433" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="1431" value="#_i13">5. ECONOMY</option><option data-dcnode-id="1429" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="1427" value="">7. ‘ALL LINES ARE CURVES…... &lt;&lt;</option><option data-dcnode-id="1425" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="1361"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="1419" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Choose</span></span><span data-dcnode-id="1421" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="1420"></span></button><div class="dropdown-menu open" data-dcnode-id="1362"><ul class="dropdown-menu inner" data-dcnode-id="1363" role="menu"><li class="selected" data-dcnode-id="1414" data-original-index="0"><a class="" data-dcnode-id="1415" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1416"></span></a></li><li data-dcnode-id="1409" data-original-index="1"><a class="" data-dcnode-id="1410" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1411"></span></a></li><li data-dcnode-id="1404" data-original-index="2"><a class="" data-dcnode-id="1405" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1406"></span></a></li><li data-dcnode-id="1399" data-original-index="3"><a class="" data-dcnode-id="1400" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1401"></span></a></li><li data-dcnode-id="1394" data-original-index="4"><a class="" data-dcnode-id="1395" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1396"></span></a></li><li data-dcnode-id="1389" data-original-index="5"><a class="" data-dcnode-id="1390" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1391"></span></a></li><li data-dcnode-id="1384" data-original-index="6"><a class="" data-dcnode-id="1385" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1386"></span></a></li><li data-dcnode-id="1379" data-original-index="7"><a class="" data-dcnode-id="1380" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1381"></span></a></li><li data-dcnode-id="1374" data-original-index="8"><a class="" data-dcnode-id="1375" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1376"></span></a></li><li data-dcnode-id="1369" data-original-index="9"><a class="" data-dcnode-id="1370" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">7. ‘ALL LINES ARE CURVES…... &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1371"></span></a></li><li data-dcnode-id="1364" data-original-index="10"><a class="" data-dcnode-id="1365" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1366"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="1355"><a class="up" data-dcnode-id="1358" href="#_i17"><img alt="Previous section" border="0" data-dcnode-id="1359" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="1356" href="#_i26"><img alt="Next section" border="0" data-dcnode-id="1357" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="1346"><span data-dcnode-id="1352" instrument_node="">In confronting the myriad problems associated with economically efficient dam design Eastwood believed that his methodological approach was based upon ‘true scientific principles.’</span><a class="ref showRefEvent" data-dcnode-id="1350" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="21 Eastwood bulletin, promotional pamphlet included in Western Engineering. April 1914, 2." data-rid="b21" href="#"><span data-dcnode-id="1351" instrument_node="">21</span></a><span data-dcnode-id="1349" instrument_node=""> But as part of this, he rejected the notion that ever more complicated mathematical analysis would inevitably foster better design or that a scientific approach to design required a slavish adherence to mathematical formula. Because the use of mathematical theory by engineers is often portrayed as one of the great fruits of the melding of science and technology, it is worth noting how Eastwood used such theory in designing multiple arch dams. In this example, discussion focuses on the elastic theory of arches that received much attention in the early 20th century and was often perceived as a major advancement in engineering analysis.</span><a class="ref showRefEvent" data-dcnode-id="1347" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="41  Cain W. . The circular arch under normal loads.Transactions of the American Society of Civil Engineers, 1922, 85, 233–283." data-rid="b41" href="#"><span data-dcnode-id="1348" instrument_node="">41</span></a></p><p data-dcnode-id="1303"><span data-dcnode-id="1345" instrument_node="">While cognisant of elastic theory, Eastwood eventually became skeptical of its value, opting instead to rely upon the simpler ‘cylinder formula’ (</span><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">T</span></i><span data-dcnode-id="1342" instrument_node="">  =  </span><i data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">P</span></i><span data-dcnode-id="1339" instrument_node="">×</span><i data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">R</span></i><span data-dcnode-id="1336" instrument_node="">/</span><i data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Q</span></i><span data-dcnode-id="1333" instrument_node="">) for dimensioning his arch designs (formulated by Navier in 1826, in this formula </span><i data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">T</span></i><span data-dcnode-id="1330" instrument_node=""> equals arch thickness, </span><i data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">P</span></i><span data-dcnode-id="1327" instrument_node=""> is water pressure, </span><i data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">R</span></i><span data-dcnode-id="1324" instrument_node=""> is arch radius and </span><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Q</span></i><span data-dcnode-id="1321" instrument_node=""> is allowable stress).</span><a class="ref showRefEvent" data-dcnode-id="1319" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="42  Schnitter N. . Arch dams.History of Dams: The Useful Pyramids, 1994, Balkema, Rotterdam: 195." data-rid="b42" href="#"><span data-dcnode-id="1320" instrument_node="">42</span></a><span data-dcnode-id="1318" instrument_node=""> The cylinder formula neglects any consideration of an arch's tendency to compress or deform under loading and, in contrast to elastic arch analysis, makes no attempt to account for stresses induced by temperature change or by ‘rib-shortening.’ Thus, on first glance, use of the cylinder formula would appear to be less ‘scientific’ than use of the more sophisticated elastic theory. Aware of elastic arch theory as early as 1912, Eastwood used it to analyse arch stresses in his Big Meadows design.</span><a class="ref showRefEvent" data-dcnode-id="1316" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="43  Baker I. . Elastic arch.A Treatise on Masonry Construction, 10th edn, 1909, Wiley, New York, 670–703." data-rid="b43" href="#"><span data-dcnode-id="1317" instrument_node="">43</span></a><span data-dcnode-id="1315" instrument_node=""> He subsequently took rib-shortening/temperature stresses very seriously and his first designs after Big Meadows featured arches encompassing very deeps arcs (elastic theory indicates that rib-shortening stresses are at a minimum when an arch encompasses 180 degrees and increase as an arch flattens out).</span><a class="ref showRefEvent" data-dcnode-id="1313" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="44  Eastwood J. S. . Los Verjels dam, a multiple-arched structure.Western Engineering, July 1914 5, 7–9." data-rid="b44" href="#"><span data-dcnode-id="1314" instrument_node="">44</span></a><span data-dcnode-id="1312" instrument_node=""> Even more significantly, for Kennedy Dam (built 1914) and Mountain Dell Dam (built to 33 m height in 1916–17) he went so far as to employ three-hinge arches capable of rotating and adjusting to rib-shortening/temperature stresses (</span><span class="figure refFigure figuresContent" data-dcnode-id="1308" id="ref-ehah162-137-f16"><a class="showFiguresEEvent figure-no-ehah162-137-f16" data-attr-fig-id="ehah162-137-f16" data-dcnode-id="1309" href="#" title="Open Figure Viewer"><span data-dcnode-id="1311" instrument_node="">Figure 16</span><span class="overlay" data-dcnode-id="1310"></span></a></span><span data-dcnode-id="1307" instrument_node="">).</span><a class="ref showRefEvent" data-dcnode-id="1306" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="45  Eastwood J. S. . Kennedy dam.Western Engineering, April 1915 6, 407–409." data-rid="b45" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1304" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="46  Cannon S. Q. . Mountain Dell dam.Monthly Journal Utah Society of Engineers, September 1917 3, 223–230." data-rid="b46" href="#"><span data-dcnode-id="1305" instrument_node="">45,46</span></a></p><div class="figure figuresContent" data-dcnode-id="1286" id="ehah162-137-f16"><div class="holder" data-dcnode-id="1287"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f16" data-dcnode-id="1300" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f16.gif&amp;raw"><span class="overlay" data-dcnode-id="1301"></span></a><div class="caption" data-dcnode-id="1288"><span data-dcnode-id="1299" instrument_node=""> </span><p data-dcnode-id="1292"><span class="captionLabel" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Figure 16</span></span><span data-dcnode-id="1296" instrument_node=""> Drawings of the three-hinge arch design used for Mountain Dell Dam near Salt Lake City, Utah. Eastwood intended this feature to alleviate rib-shortening/temperature stresses that elastic arch theory indicates would act upon the arches. However, in actual performance the theory proved a poor guide as the arches did not move or rotate. (</span><i data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Engineering News-Record</span></i><span data-dcnode-id="1293" instrument_node="">, 1918)</span></p><span data-dcnode-id="1291" instrument_node=""> </span><div data-dcnode-id="1289" id="footer"><input data-dcnode-id="1290" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">However, the performance of Kennedy's and Mountain Dell's arches revealed that the rib-shortening stresses indicated by elastic theory were illusory; despite a three-hinge design intended to give free play to rotational displacements, no movement occurred. After Mountain Dell had provided several years of service, engineer Fred Noetzli offered telling confirmation:</span></p><div class="quote" data-dcnode-id="1277"><span data-dcnode-id="1283" instrument_node=""> </span><p data-dcnode-id="1279"><span data-dcnode-id="1282" instrument_node="">In 1925 a careful inspection was made [of Mountain Dell Dam and]… a remarkable thing was observed… It was found that in the seven years of operation of the dam and reservoir none of the hinges had moved a sufficient amount to break the thin coating of cement wash [covering the upstream face]. The hinges were pointed with asphalt and probably offered little resistance to rotation due to deformation of the arches. It appears, therefore, that the deformation of the arches was too small to break the cement coating.</span><a class="ref showRefEvent" data-dcnode-id="1280" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="47  Wegmann E. , Noetzli F. . The Design and Construction of Dams, 8th edn, 1927, Wiley, New York: 482." data-rid="b47" href="#"><span data-dcnode-id="1281" instrument_node="">47</span></a></p><span data-dcnode-id="1278" instrument_node=""> </span></div><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Attuned to the structural performance of his dams, Eastwood quickly came to appreciate the limited value of arch theory as it applied to his multiple arch designs:</span></p><div class="quote" data-dcnode-id="1268"><span data-dcnode-id="1274" instrument_node=""> </span><p data-dcnode-id="1270"><span data-dcnode-id="1273" instrument_node="">The elastic theory is the best guide we have but we must not take snap judgments in our assumptions or we are liable to get results not agreeing with the facts…It is undoubtedly the proper procedure to fit theory to practice but the factors of the theory must be based on the actual physical conditions as they are in practice or else theory will lead us astray.</span><a class="ref showRefEvent" data-dcnode-id="1271" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="48 John S. Eastwood to Paul M. Downing, letter dated 27 September 1916, Folder 4, Eastwood Papers, WRCA." data-rid="b48" href="#"><span data-dcnode-id="1272" instrument_node="">48</span></a></p><span data-dcnode-id="1269" instrument_node=""> </span></div><p data-dcnode-id="1252"><span data-dcnode-id="1267" instrument_node="">In contrast to other designers and analysts of multiple arch dams in the 1920s and 30s,</span><a class="ref showRefEvent" data-dcnode-id="1266" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="49  Jakobsen B. F. . Stresses in multiple arch dams.Transactions of the American Society of Civil Engineers, 1924, 87, 276–341." data-rid="b49" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1264" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="50  Goodell G. E. , Nelidov I. M. . Stresses in inclined arches of multiple arch dams. Transactions of the American Society of Civil Engineers, 1933, 98, 1200–1239." data-rid="b50" href="#"><span data-dcnode-id="1265" instrument_node="">49,50</span></a><span data-dcnode-id="1263" instrument_node=""> Eastwood generated designs in which the arches are extremely flat (at Littlerock, Cave Creek and Anyox they encompass a mere 100 degrees) (</span><span class="figure refFigure figuresContent" data-dcnode-id="1259" id="ref-ehah162-137-f17"><a class="showFiguresEEvent figure-no-ehah162-137-f17" data-attr-fig-id="ehah162-137-f17" data-dcnode-id="1260" href="#" title="Open Figure Viewer"><span data-dcnode-id="1262" instrument_node="">Figure 17</span><span class="overlay" data-dcnode-id="1261"></span></a></span><span data-dcnode-id="1258" instrument_node="">). This overtly defied the dictates of elastic theory, but was in full accord with his understanding of ‘actual physical conditions.’ In this, Eastwood resisted a simplistic faith in formula and acted in a manner fully consistent with other practitioners of structural art. In Billington's words: ‘leading structural artists resisted that trend [to justify their works by sophisticated calculation] and sought rather to base designs on simplified calculation and on observations of physical behavior.’ Significantly, after several decades of service none of Eastwood's dams exhibited any evidence of distress caused by rib-shortening/temperature stresses. This would not have surprised their designer, for he understood that mathematical modelling of physical forms was less than an exact science. As he provocatively proclaimed in his 1922 memorandum </span><i data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Limitations to Formulae</span></i><span data-dcnode-id="1255" instrument_node="">: ‘Einstein is right; all lines are curves and all things mundane are relative.’</span><a class="ref showRefEvent" data-dcnode-id="1253" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="51  Eastwood J. S. . Limitations to Formulae, memorandum circa 1922, Folder 45, Eastwood Papers, WRCA." data-rid="b51" href="#"><span data-dcnode-id="1254" instrument_node="">51</span></a></p><div class="figure figuresContent" data-dcnode-id="1235" id="ehah162-137-f17"><div class="holder" data-dcnode-id="1236"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f17" data-dcnode-id="1249" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f17.gif&amp;raw"><span class="overlay" data-dcnode-id="1250"></span></a><div class="caption" data-dcnode-id="1237"><span data-dcnode-id="1248" instrument_node=""> </span><p data-dcnode-id="1241"><span class="captionLabel" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Figure 17</span></span><span data-dcnode-id="1245" instrument_node=""> In his later designs, Eastwood defied the dictates of elastic arch analysis and used very flat arches. This 1979 photograph shows the upstream face of the 53 m high, 210 m long Littlerock Dam (completed in 1924 with about 19 100 m</span><sup data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">3</span></sup><span data-dcnode-id="1242" instrument_node=""> of concrete) with arches encompassing an arc of only 100 degrees. (D. C. Jackson)</span></p><span data-dcnode-id="1240" instrument_node=""> </span><div data-dcnode-id="1238" id="footer"><input data-dcnode-id="1239" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1088" id="s8"><a class="scroll-offset" data-dcnode-id="1232" name="_i26"></a><div class="sectionInfo" data-dcnode-id="1136"><div class="sectionHeading" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">8. CONCLUSION</span></div><div class="sectionJumpTo" data-dcnode-id="1137"><div class="sectionLabel" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Section:</span></div><form data-dcnode-id="1141" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="1205" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="1226" selected="#" value="#">Choose</option><option data-dcnode-id="1224" value="#">Top of page</option><option data-dcnode-id="1222" value="#abstract">Abstract</option><option data-dcnode-id="1220" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="1218" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="1216" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="1214" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="1212" value="#_i13">5. ECONOMY</option><option data-dcnode-id="1210" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="1208" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="1206" value="">8. CONCLUSION &lt;&lt;</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="1142"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="1200" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">Choose</span></span><span data-dcnode-id="1202" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="1201"></span></button><div class="dropdown-menu open" data-dcnode-id="1143"><ul class="dropdown-menu inner" data-dcnode-id="1144" role="menu"><li class="selected" data-dcnode-id="1195" data-original-index="0"><a class="" data-dcnode-id="1196" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1197"></span></a></li><li data-dcnode-id="1190" data-original-index="1"><a class="" data-dcnode-id="1191" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1192"></span></a></li><li data-dcnode-id="1185" data-original-index="2"><a class="" data-dcnode-id="1186" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1187"></span></a></li><li data-dcnode-id="1180" data-original-index="3"><a class="" data-dcnode-id="1181" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1182"></span></a></li><li data-dcnode-id="1175" data-original-index="4"><a class="" data-dcnode-id="1176" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1177"></span></a></li><li data-dcnode-id="1170" data-original-index="5"><a class="" data-dcnode-id="1171" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1172"></span></a></li><li data-dcnode-id="1165" data-original-index="6"><a class="" data-dcnode-id="1166" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1167"></span></a></li><li data-dcnode-id="1160" data-original-index="7"><a class="" data-dcnode-id="1161" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1162"></span></a></li><li data-dcnode-id="1155" data-original-index="8"><a class="" data-dcnode-id="1156" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1157"></span></a></li><li data-dcnode-id="1150" data-original-index="9"><a class="" data-dcnode-id="1151" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1152"></span></a></li><li data-dcnode-id="1145" data-original-index="10"><a class="" data-dcnode-id="1146" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">8. CONCLUSION &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1147"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="1138"><a class="up" data-dcnode-id="1139" href="#_i23"><img alt="Previous section" border="0" data-dcnode-id="1140" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">Eastwood stands as a major figure in the history of structural design and no other native-born American practitioner in reinforced concrete better exemplifies the ideals of structural art. The question then arises as to why he has largely languished in obscurity since his death. One reason for this is that his practical approach to design and his scepticism about ever more complicated mathematical theory ran counter to professional trends in 20th century dam design.</span><a class="ref showRefEvent" data-dcnode-id="1133" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="52  Billington D. P. , Jackson D. C. . The trial load method and the Stevenson creek test dam. Big Dams of the New Deal Era: A Confluence of Engineering and Politics, 2006, Norman, University of Oklahoma Press: 59–65." data-rid="b52" href="#"><span data-dcnode-id="1134" instrument_node="">52</span></a><span data-dcnode-id="1132" instrument_node=""> But perhaps even more important is his separation from the business-oriented civil engineering fraternity—exemplified by his nemesis John Freeman—that held great influence in 20th century America.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1130" instrument_node="">In </span><i data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="1127" instrument_node="">, Billington associates massive masonry design with the ‘preindustrial imperial era’ while projecting structural art as exhibiting ‘a lightness, even a fragility, which closely parallels the essence of a free and open society.’</span><a class="ref showRefEvent" data-dcnode-id="1125" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="53  Billington D. P. . Structural art and society.The Tower and the Bridge, 1983, Basic Books, New York, The Tower, p. 24." data-rid="b53" href="#"><span data-dcnode-id="1126" instrument_node="">53</span></a><span data-dcnode-id="1124" instrument_node=""> Ironically, he notes that the United States, one of history's most prominent democracies, suffers from a ‘relative lack of structural artists,’ a phenomenon attributable to American engineers perceiving themselves as ‘servants of business.’ </span><a class="ref showRefEvent" data-dcnode-id="1122" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="54  Billington D. P. . The tension between structural art and business.The Tower and the Bridge, 1983, Basic Books, New York: 53." data-rid="b54" href="#"><span data-dcnode-id="1123" instrument_node="">54</span></a><span data-dcnode-id="1121" instrument_node=""> Strong words to be sure, but ones that resonate with Freeman's opposition to Eastwood's efforts in promoting the multiple arch dam.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1119" instrument_node="">Freeman was a long-time leader in the factory insurance industry and his alignment with America's business community has been affirmed by historian of technology Bruce Sinclair, who perceived in Freeman a desire to be ‘a gentleman, comfortable in the boardroom, a man who might also be elected a director of the firm.’</span><a class="ref showRefEvent" data-dcnode-id="1117" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="55  Sinclair B. . Inventing a genteel tradition: MIT crosses the river.New Perspectives on Technology and American Culture, 1986, Philadelphia, American Philosophical Society, Philadelphia: 8." data-rid="b55" href="#"><span data-dcnode-id="1118" instrument_node="">55</span></a><span data-dcnode-id="1116" instrument_node=""> Combining this with his professional prominence as president of both the ASCE (1922) and the ASME (1905) and his role in planning major water supply systems for Boston, New York City, and San Francisco, Freeman's opposition to the multiple arch dam represented a formidable barrier.</span><a class="ref showRefEvent" data-dcnode-id="1114" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="56 John Ripley Freeman (obituary).Transactions of the American Society of Civil Engineers, 1933, 98, 1471–1476." data-rid="b56" href="#"><span data-dcnode-id="1115" instrument_node="">56</span></a><span data-dcnode-id="1113" instrument_node=""> As A. G. Wishon, Eastwood's colleague and the Fresno-based general manager of the San Joaquin Light and Power Corporation bemoaned to him in 1922: ‘the prominence of John R. Freeman in the engineering world and his influence with men of capital [has] delayed the storing of water ten to fifteen years.’</span><a class="ref showRefEvent" data-dcnode-id="1111" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="57 A. G. Wishon to John S. Eastwood, letter dated 29 March 1922, Eastwood Papers, Folder 48, WRCA." data-rid="b57" href="#"><span data-dcnode-id="1112" instrument_node="">57</span></a><span data-dcnode-id="1110" instrument_node=""> Even after his death in 1932, Freeman's legacy held strong and when the history of dam engineering was celebrated at the 100th anniversary of the ASCE in 1952, multiple arch dams received scant attention and Eastwood no mention at all.</span><a class="ref showRefEvent" data-dcnode-id="1109" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="58  Huber W. L. . An engineering century in California.Transactions of the American Society of Civil Engineers, 1953, 97–111, Centennial Transactions." data-rid="b58" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1107" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="59  Hinds J. . Continuous development of dams since 1850. Transactions of the American Society of Civil Engineers, 1953, 489–520, Centennial Transactions." data-rid="b59" href="#"><span data-dcnode-id="1108" instrument_node="">58,59</span></a></p><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">For men such as Freeman and others who embraced massive gravity dam technology, the design of new structural forms for water storage held little allure. Eastwood, an engineer from the hinterlands of California who never fit into the boardrooms where so many business-related engineering decisions were made, struggled to procure commissions, finding success only when the objections of Freeman and fellow travellers could be avoided or overcome. In the end, the dams themselves, built largely for enterprises with limited access to capital, became for Eastwood the ultimate means of accomplishment. His pride in the multiple arch dam is undeniable and a joyous, self-conscious desire for achievement—and its related affirmation that critics such as Freeman were wrong—is central to his work. In a letter written shortly before his death, he extolled the satisfaction that came with construction of Anyox Dam:</span></p><div class="quote" data-dcnode-id="1097"><span data-dcnode-id="1103" instrument_node=""> </span><p data-dcnode-id="1099"><span data-dcnode-id="1102" instrument_node="">My joy in life is in doing each one a bit better than the one just completed. At Anyox I had no ‘critics’ and built it as it should be, and was able, by reason of my getting a ‘free hand’ to give my clients…the best service and the most complete dam in every particular in the world.</span><a class="ref showRefEvent" data-dcnode-id="1100" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="60 John S. Eastwood to Ed Fletcher, letter dated 25 April 1924, Folder 62, Eastwood Papers, WRCA." data-rid="b60" href="#"><span data-dcnode-id="1101" instrument_node="">60</span></a></p><span data-dcnode-id="1098" instrument_node=""> </span></div><p data-dcnode-id="1089"><span data-dcnode-id="1096" instrument_node="">As Billington describes all structural artists: ‘At the heart of the technology they found their own originality, they created personal styles without denying any of the rigor of engineering.’</span><a class="ref showRefEvent" data-dcnode-id="1094" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="61  Billington D. P. . Designers and artists. The Tower and the Bridge, 1983, Basic Books, New York, The Tower, p. 274." data-rid="b61" href="#"><span data-dcnode-id="1095" instrument_node="">61</span></a><span data-dcnode-id="1093" instrument_node=""> This was certainly the case with Eastwood, as he explored—and revelled in—his own distinctive vision of the possibilities offered by concrete in the development of water storage structures. But, in terms of dams and structural art, Eastwood certainly does not need to stand as </span><i data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">sui generis</span></i><span data-dcnode-id="1090" instrument_node="">. In this light, the author encourages researchers to carry out investigations into other innovative dam designers such as Lars Jorgensen, Fred Noetzli, B. F. Jakobsen, and Andre Coyne (to name but a few) to analyse how their work accords with the ideals of structural art promulgated by Billington. Eastwood's work in dam design may have been dauntingly innovative, but there is no reason to believe that he represents the only practitioner through which the analytic prism of structural art can help enhance our understanding of hydraulic engineering history.</span></p></div></div><div class="response" data-dcnode-id="1082"><div class="sub-article-title" data-dcnode-id="1083"></div></div><span data-dcnode-id="1081" instrument_node="">
