</span><meta content="Proceedings of the Institution of Civil Engineers - Engineering History and Heritage" data-dcnode-id="3599" property="og:site_name"><span data-dcnode-id="3598" instrument_node="">
</span><meta content="In his landmark book The Tower and the Bridge, engineering professor/historian David Billington proposes the concept of ‘structural art’ and, with a focus on bridges, thin shell roofs and tall buildings, describes its relationship to the ideals of efficiency, economy and elegance. Dams are not discussed in The Tower and the Bridge, apparently because the massive gravity designs commonly built for major projects represent bulky, inefficient designs. Moving beyond gravity dam technology, this paper explores how John S. Eastwood's work designing multiple arch dams accords with Billington's idea of structural art. Eastwood built the world's first reinforced concrete multiple arch dam at Hume Lake, California in 1908 and during the last 15 years of his life became a prominent proponent of the technology. Eastwood's designs, how they correlate to the ideals of efficiency, economy and elegance, and how he integrated mathematical theory into his design methodology comprise the focus of this paper. In addition, issues of visual appearance and their effect upon professional acceptance of Eastwood's design are also considered. By employing the concept of structural art as a prism for studying multiple arch dams, the article elucidates an important aspect of hydraulic engineering history." data-dcnode-id="3597" property="og:description"><span data-dcnode-id="3596" instrument_node="">

an></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2614"></span></a></li><li data-dcnode-id="2607" data-original-index="6"><a class="" data-dcnode-id="2608" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2609"></span></a></li><li data-dcnode-id="2602" data-original-index="7"><a class="" data-dcnode-id="2603" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2604"></span></a></li><li data-dcnode-id="2597" data-original-index="8"><a class="" data-dcnode-id="2598" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2599"></span></a></li><li data-dcnode-id="2592" data-original-index="9"><a class="" data-dcnode-id="2593" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2594"></span></a></li><li data-dcnode-id="2587" data-original-index="10"><a class="" data-dcnode-id="2588" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2589"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="2580"><a class="down" data-dcnode-id="2581" href="#_i2"><img alt="Next section" border="0" data-dcnode-id="2582" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div></div><div class="abstractSection abstractInFull" data-dcnode-id="2566"><span data-dcnode-id="2576" instrument_node=""> </span><p data-dcnode-id="2568"><span data-dcnode-id="2575" instrument_node="">In his landmark book </span><i data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="2572" instrument_node="">, engineering professor/historian David Billington proposes the concept of ‘structural art’ and, with a focus on bridges, thin shell roofs and tall buildings, describes its relationship to the ideals of efficiency, economy and elegance. Dams are not discussed in </span><i data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="2569" instrument_node="">, apparently because the massive gravity designs commonly built for major projects represent bulky, inefficient designs. Moving beyond gravity dam technology, this paper explores how John S. Eastwood's work designing multiple arch dams accords with Billington's idea of structural art. Eastwood built the world's first reinforced concrete multiple arch dam at Hume Lake, California in 1908 and during the last 15 years of his life became a prominent proponent of the technology. Eastwood's designs, how they correlate to the ideals of efficiency, economy and elegance, and how he integrated mathematical theory into his design methodology comprise the focus of this paper. In addition, issues of visual appearance and their effect upon professional acceptance of Eastwood's design are also considered. By employing the concept of structural art as a prism for studying multiple arch dams, the article elucidates an important aspect of hydraulic engineering history.</span></p><span data-dcnode-id="2567" instrument_node=""> </span></div></div><div class="hlFld-Fulltext" data-dcnode-id="1087"><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2435" id="s1"><a class="scroll-offset" data-dcnode-id="2561" name="_i2"></a><div class="sectionInfo" data-dcnode-id="2463"><div class="sectionHeading" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">1. INTRODUCTION</span></div><div class="sectionJumpTo" data-dcnode-id="2464"><div class="sectionLabel" data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Section:</span></div><form data-dcnode-id="2470" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="2534" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="2555" selected="#" value="#">Choose</option><option data-dcnode-id="2553" value="#">Top of page</option><option data-dcnode-id="2551" value="#abstract">Abstract</option><option data-dcnode-id="2549" value="">1. INTRODUCTION &lt;&lt;</option><option data-dcnode-id="2547" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="2545" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="2543" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="2541" value="#_i13">5. ECONOMY</option><option data-dcnode-id="2539" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="2537" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="2535" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="2471"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="2529" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Choose</span></span><span data-dcnode-id="2531" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="2530"></span></button><div class="dropdown-menu open" data-dcnode-id="2472"><ul class="dropdown-menu inner" data-dcnode-id="2473" role="menu"><li class="selected" data-dcn a-original-index="6"><a class="" data-dcnode-id="2495" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2496"></span></a></li><li data-dcnode-id="2489" data-original-index="7"><a class="" data-dcnode-id="2490" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2491"></span></a></li><li data-dcnode-id="2484" data-original-index="8"><a class="" data-dcnode-id="2485" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2486"></span></a></li><li data-dcnode-id="2479" data-original-index="9"><a class="" data-dcnode-id="2480" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2481"></span></a></li><li data-dcnode-id="2474" data-original-index="10"><a class="" data-dcnode-id="2475" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2476"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="2465"><a class="up" data-dcnode-id="2468" href="#abstract"><img alt="Previous section" border="0" data-dcnode-id="2469" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="2466" href="#_i3"><img alt="Next section" border="0" data-dcnode-id="2467" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="2452"><span data-dcnode-id="2462" instrument_node="">In his landmark book </span><i data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="2459" instrument_node="">, engineering professor/ historian David Billington proposes the concept of ‘structural art’ in the hope it will further understanding—and appreciation—of innovative structural design.</span><a class="ref showRefEvent" data-dcnode-id="2457" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="1  Billington D. P. . The Tower and the Bridge: The New Art of Structural Engineering, 1983, Basic Books, New York." data-rid="b1" href="#"><span data-dcnode-id="2458" instrument_node="">1</span></a><span data-dcnode-id="2456" instrument_node=""> Recognising that the Industrial Revolution provided engineers with copious quantities of iron, steel and reinforced concrete that could foster forms far different from those possible using traditional methods of timber, stone and masonry construction, Billington's conception of structural art is visually oriented but extends beyond the context and concerns of traditional architectural analysis.</span><a class="ref showRefEvent" data-dcnode-id="2454" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="2  Billington D. P. . Structures and architecture.The Tower and the Bridge, 1983, Basic Books, New York, 14–15." data-rid="b2" href="#"><span data-dcnode-id="2455" instrument_node="">2</span></a><span data-dcnode-id="2453" instrument_node=""> Uninterested in assimilating the work of famed engineers such as Thomas Telford, John Roebling, Gustave Eiffel, Robert Maillart, Othmar Ammann, Eugene Freyssinet, Heinz Isler and Christian Menn into a conventional rendering of design history, Billington has developed a means of analysing the structural validity and visual significance of bridges, long span roofs, tall buildings, dams and so on, independent of architectural theory. To Billington, the practice of structural engineering constitutes a creative endeavour which, purely on its own terms, can produce socially useful works of art on a monumental scale.</span></p><p data-dcnode-id="2445"><span data-dcnode-id="2451" instrument_node="">In addition to differentiating engineering from architecture, Billington also demarks engineering as more than applied science. Reacting to notions that technology represents little more than an application of scientific principles and mathematical formulae, he bristles at the idea that ‘creative genius and the precedence in innovation belong to the scientist; the engineer is merely the technician, following orders from above.’</span><a class="ref showRefEvent" data-dcnode-id="2449" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="3  Bush V. . Science, the Endless Frontier: A Report to the President, 1945, Government Printing Office, Washington, D.C., 13–14." data-rid="b3" href="#"><span data-dcnode-id="2450" instrument_node="">3</span></a><span data-dcnode-id="2448" instrument_node=""> Perceiving the ascendance of scientific and mathematical theory in the early 20th century as often working against creation of innovative design, Billington believes that the intelligent use of simple mathematical formulations is often better than reliance upon complicated (and seemingly more precise) formulae. As he phrases it, ‘the leading scientific idea [associated with structural art] might be stated as that of reducing analysis… and [resisting the] tendency to overemphasize analysis… When the form is well chosen its analysis becomes astoundingly simple.’</span><a class="ref showRefEvent" data-dcnode-id="2446" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="4  Billington D. P. . Engineering and science.The Tower and the Bridge, 1983, Basic Books, New York, 8–10." data-rid="b4" href="#"><span data-dcnode-id="2447" instrument_node="">4</span></a></p><p data-dcnode-id="2440"><span data-dcnode-id="2444" instrument_node="">For Billington, the first ideal of structural art is efficiency, for without efficient use of materials a structure cannot exhibit the lightness necessary to distinguish it from ponderous, masonry-derived forms.</span><a class="ref showRefEvent" data-dcnode-id="2442" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="5  Billington D. P. . The ideals of structural art.The Tower and the Bridge, 1983, Basic Books, New York, 4–6." data-rid="b5" href="#"><span data-dcnode-id="2443" instrument_node="">5</span></a><span data-dcnode-id="2441" instrument_node=""> Clearly, if a structure contains excessive material that does little or nothing to add to its strength, then it cannot be an efficient design. The beauty of structural art is dependent upon design that uses as little material as possible; conversely, designs that are profligate in their use of material or utilise decorative features in order to make them more ‘attractive’ or ‘architectural’ are anathema to the concept.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">The second ideal is economy. Although the economic advantages of a design often derive from efficient use of material, it is not always true that material conservancy leads inevitably to economic savings. For example, in a reinforced concrete structure costs correlate with the amount of cement, aggregate and steel reinforcement used. Costs, however, also depend upon both the complexity of wooden formwork and expenses involved in mixing, conveying and casting concrete. In adhering to economy as an ideal, structural art separates itself from fanciful public sculpture (as attractive as it might be) and connects with the economic concerns of financiers, stockholders, investors, taxpayers and so on. By definition, structural art must be of practical, civic use to society and must not waste scarce economic resources.</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">The third ideal is elegance. Although difficult to define in unambiguous terms, the relationship between elegance and structural art is of key importance. The creation of structural art requires consideration of visual qualities, but in a manner that does not simply mimic or expropriate architectural motifs. Of course, the beauty of a design is not a quantifiable attribute and personal preferences will vary from one observer to another. However, a structural artist integrates an aesthetic sensibility into the design process and the creation of structural art depends upon more than a mechanistic search for efficient, economic design</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2259" id="s2"><a class="scroll-offset" data-dcnode-id="2433" name="_i3"></a><div class="sectionInfo" data-dcnode-id="2335"><div class="sectionHeading" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">2. DAMS AND STRUCTURAL ART</span></div><div class="sectionJumpTo" data-dcnode-id="2336"><div class="sectionLabel" data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Section:</span></div><form data-dcnode-id="2342" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="2406" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="2427" selected="#" value="#">Choose</option><option data-dcnode-id="2425" value="#">Top of page</option><option data-dcnode-id="2423" value="#abstract">Abstract</option><option data-dcnode-id="2421" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="2419" value="">2. DAMS AND STRUCTURAL AR... &lt;&lt;</option><option data-dcnode-id="2417" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="2415" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="2413" value="#_i13">5. ECONOMY</option><option data-dcnode-id="2411" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="2409" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="2407" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="2343"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="2401" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Choose</span></span><span data-dcnode-id="2403" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="2402"></span></button><div class="dropdown-menu open" data-dcnode-id="2344"><ul class="dropdown-menu inner" data-dcnode-id="2345" role="menu"><li class="selected" data-dcnode-id="2396" data-original-index="0"><a class="" data-dcnode-id="2397" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2398"></span></a></li><li data-dcnode-id="2391" data-original-index="1"><a class="" data-dcnode-id="2392" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2393"></span></a></li><li data-dcnode-id="2386" data-original-index="2"><a class="" data-dcnode-id="2387" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2388"></span></a></li><li data-dcnode-id="2381" data-original-index="3"><a class="" data-dcnode-id="2382" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2383"></span></a></li><li data-dcnode-id="2376" data-original-index="4"><a class="" data-dcnode-id="2377" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">2. DAMS AND STRUCTURAL AR... &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2378"></span></a></li><li data-dcnode-id="2371" data-original-index="5"><a class="" data-dcnode-id="2372" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2373"></span></a></li><li data-dcnode-id="2366" data-original-index="6"><a class="" data-dcnode-id="2367" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2368"></span></a></li><li data-dcnode-id="2361" data-original-index="7"><a class="" data-dcnode-id="2362" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2363"></span></a></li><li data-dcnode-id="2356" data-original-index="8"><a class="" data-dcnode-id="2357" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2358"></span></a></li><li data-dcnode-id="2351" data-original-index="9"><a class="" data-dcnode-id="2352" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2353"></span></a></li><li data-dcnode-id="2346" data-original-index="10"><a class="" data-dcnode-id="2347" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2348"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="2337"><a class="up" data-dcnode-id="2340" href="#_i2"><img alt="Previous section" border="0" data-dcnode-id="2341" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="2338" href="#_i6"><img alt="Next section" border="0" data-dcnode-id="2339" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="2321"><span data-dcnode-id="2334" instrument_node="">Given the numerous examples of structural art discussed in </span><i data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="2331" instrument_node=""> (they extend from Telford's 1814 Craigellachie Bridge in Scotland through Christian Menn's 1980 Ganter Bridge in Switzerland) it is noteworthy that dams were excluded from consideration. Although dams clearly contribute to the public works infrastructure responsible for fostering structural art, their absence from Billington's analysis does not appear to be the result of hasty oversight. Rather, it relates to the predilection of many dam engineers to depend upon traditional methods of design in the construction of water storage structures. Ancient techniques of piling up timber, earth, rock,and masonry constitute the conceptual foundation of the modern gravity dam. And, beginning with the work of the French engineers de Dezilly and Delocre in the 1850s, mathematically based methods of gravity dam design have always relied upon material bulk to provide stability.</span><a class="ref showRefEvent" data-dcnode-id="2329" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="6  Schittner N. . Gravity dams.A History of Dams: The Useful Pyramids, 1994, Balkema, Rotterdam: 170." data-rid="b6" href="#"><span data-dcnode-id="2330" instrument_node="">6</span></a><span data-dcnode-id="2328" instrument_node=""> The form of masonry and concrete gravity dams is directly related to an ‘aesthetic of mass’ and bears little relevance to Billington's concept of structural art.</span><a class="ref showRefEvent" data-dcnode-id="2326" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="7  Davis A. P. . Elephant butte reservoir.Irrigation Works Constructed by the United States Government, 1917, Wiley, New York, 237–259." data-rid="b7" href="#"><span data-dcnode-id="2327" instrument_node="">7</span></a><span data-dcnode-id="2325" instrument_node=""> Furthermore, while examples of arch dams (i.e. curved structures with a cross-sectional profile too thin to provide stability as a gravity dam) date back to ancient times and were present in the 19th century (e.g. the 1854 Zola Dam in France and the 1884 Bear Valley Dam in California), designs of this type—with expansive downstream façades— are frequently quite similar in appearance to curved gravity dams.</span><a class="ref showRefEvent" data-dcnode-id="2323" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="8  Schittner N. . Arch dams.A History of Dams: The Useful Pyramids, 1994, Balkema, Rotterdam, 193–209." data-rid="b8" href="#"><span data-dcnode-id="2324" instrument_node="">8</span></a><span data-dcnode-id="2322" instrument_node=""> Thin arch dams can no doubt be efficient in their use of material compared with gravity designs, but nonetheless they often project a massive appearance making it difficult for observers visually to differentiate them from the more predominant gravity dam technology.</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2320" instrument_node="">In the United States, major concrete gravity dams built by the Bureau of Reclamation (</span><span class="figure refFigure figuresContent" data-dcnode-id="2316" id="ref-ehah162-137-f1"><a class="showFiguresEEvent figure-no-ehah162-137-f1" data-attr-fig-id="ehah162-137-f1" data-dcnode-id="2317" href="#" title="Open Figure Viewer"><span data-dcnode-id="2319" instrument_node="">Figure 1</span><span class="overlay" data-dcnode-id="2318"></span></a></span><span data-dcnode-id="2315" instrument_node="">) and the Tennessee Valley Authority (</span><span class="figure refFigure figuresContent" data-dcnode-id="2311" id="ref-ehah162-137-f2"><a class="showFiguresEEvent figure-no-ehah162-137-f2" data-attr-fig-id="ehah162-137-f2" data-dcnode-id="2312" href="#" title="Open Figure Viewer"><span data-dcnode-id="2314" instrument_node="">Figure 2</span><span class="overlay" data-dcnode-id="2313"></span></a></span><span data-dcnode-id="2310" instrument_node="">) have garnered most attention devoted to the aesthetics of water storage design.</span><a class="ref showRefEvent" data-dcnode-id="2309" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="9  Wilson R. G. . Machine-age iconography in the American west: the design of the Hoover Dam.Pacific Historical Quarterly, 1985, 54, 4, November: 463–494." data-rid="b9" href="#"></a><a class="ref showRefEvent" data-dcnode-id="2307" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="10 Tennessee Valley Authority. Architectural design.The Fontana Project, 1950, Government Printing Office, Washington, D.C., 133–136." data-rid="b10" href="#"><span data-dcnode-id="2308" instrument_node="">9,10</span></a><span data-dcnode-id="2306" instrument_node=""> Such analyses generally accept that gravity dams comprise a suitably economic form and then proceed to assess and/or praise their architectural embellishments. For example, the prominent architectural historian Carl Condit proclaimed that Fontana Dam, a large gravity structure containing more than 2 million m</span><a class="ref showRefEvent" data-dcnode-id="2304" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="3  Bush V. . Science, the Endless Frontier: A Report to the President, 1945, Government Printing Office, Washington, D.C., 13–14." data-rid="b3" href="#"><span data-dcnode-id="2305" instrument_node="">3</span></a><span data-dcnode-id="2303" instrument_node=""> of concrete and featuring moderne surface treatments, to be ‘a classic of the structural art, a perfect symbol of man and nature in harmony.’</span><a class="ref showRefEvent" data-dcnode-id="2301" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="11  Condit C. . American Building Art: The Twentieth Century, 1961, 2, Oxford University Press, New York: 269." data-rid="b11" href="#"><span data-dcnode-id="2302" instrument_node="">11</span></a><span data-dcnode-id="2300" instrument_node=""> Here, Condit does not use the term ‘structural art’ as Billington would, but he does ascribe to massive concrete gravity dams a special artistic character and to the massive Fontana Dam in particular the distinction of being a ‘perfect symbol’ conjoining humans and nature. Given that most major 20th century dams utilised massive embankments or massive masonry/concrete gravity designs it is not so surprising that Condit's perspective has held sway and that the structural art of dams as Billington would define it seems almost an oxymoron.</span></p><div class="figure figuresContent" data-dcnode-id="2282" id="ehah162-137-f1"><div class="holder" data-dcnode-id="2283"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f1" data-dcnode-id="2296" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="2298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f1.gif&amp;raw"><span class="overlay" data-dcnode-id="2297"></span></a><div class="caption" data-dcnode-id="2284"><span data-dcnode-id="2295" instrument_node=""> </span><p data-dcnode-id="2288"><span class="captionLabel" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Figure 1</span></span><span data-dcnode-id="2292" instrument_node=""> Downstream side of the massive Elephant Butte Dam in New Mexico. Built in 1912–1916 by the US Reclamation Service (later renamed Bureau of Reclamation), this concrete gravity dam is 365 m long, 91 m high and contains over 462 000 m</span><sup data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">3</span></sup><span data-dcnode-id="2289" instrument_node=""> of concrete. Note the beaux-art architectural embellishment at the crest. (Author's collection)</span></p><span data-dcnode-id="2287" instrument_node=""> </span><div data-dcnode-id="2285" id="footer"><input data-dcnode-id="2286" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="2265" id="ehah162-137-f2"><div class="holder" data-dcnode-id="2266"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f2" data-dcnode-id="2279" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="2281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f2.gif&amp;raw"><span class="overlay" data-dcnode-id="2280"></span></a><div class="caption" data-dcnode-id="2267"><span data-dcnode-id="2278" instrument_node=""> </span><p data-dcnode-id="2271"><span class="captionLabel" data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Figure 2</span></span><span data-dcnode-id="2275" instrument_node=""> Downstream side of the 146 m high Fontana Dam in North Carolina completed by the Tennessee Valley Authority (TVA) in 1945. The massive concrete gravity dam features a sleek moderne surface treatment but required more than 2 million m</span><sup data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">3</span></sup><span data-dcnode-id="2272" instrument_node=""> of concrete to construct. (Tennessee Valley Authority)</span></p><span data-dcnode-id="2270" instrument_node=""> </span><div data-dcnode-id="2268" id="footer"><input data-dcnode-id="2269" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">In </span><i data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">The Tower and the Bridge</span></i><span data-dcnode-id="2261" instrument_node=""> Billington presents no argument denying the possibility of reconciling his concept of structural art with dam design, but no obvious examples appeared available for analysis. As a result, no dam designs or dam engineers were discussed. This article represents an effort to explain how dam engineering can logically be brought under the umbrella of structural art. In particular, it demonstrates how the work of John S. Eastwood in developing the multiple arch dam, a technology predicated upon minimising the amount material required to impound a reservoir, conforms especially well to the concept of structural art.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="2074" id="s3"><a class="scroll-offset" data-dcnode-id="2257" name="_i6"></a><div class="sectionInfo" data-dcnode-id="2159"><div class="sectionHeading" data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">3. EASTWOOD AND STRUCTURAL ART</span></div><div class="sectionJumpTo" data-dcnode-id="2160"><div class="sectionLabel" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Section:</span></div><form data-dcnode-id="2166" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="2230" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="2251" selected="#" value="#">Choose</option><option data-dcnode-id="2249" value="#">Top of page</option><option data-dcnode-id="2247" value="#abstract">Abstract</option><option data-dcnode-id="2245" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="2243" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="2241" value="">3. EASTWOOD AND STRUCTURA... &lt;&lt;</option><option data-dcnode-id="2239" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="2237" value="#_i13">5. ECONOMY</option><option data-dcnode-id="2235" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="2233" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="2231" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="2167"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="2225" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Choose</span></span><span data-dcnode-id="2227" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="2226"></span></button><div class="dropdown-menu open" data-dcnode-id="2168"><ul class="dropdown-menu inner" data-dcnode-id="2169" role="menu"><li class="selected" data-dcnode-id="2220" data-original-index="0"><a class="" data-dcnode-id="2221" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2222"></span></a></li><li data-dcnode-id="2215" data-original-index="1"><a class="" data-dcnode-id="2216" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2217"></span></a></li><li data-dcnode-id="2210" data-original-index="2"><a class="" data-dcnode-id="2211" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2212"></span></a></li><li data-dcnode-id="2205" data-original-index="3"><a class="" data-dcnode-id="2206" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2207"></span></a></li><li data-dcnode-id="2200" data-original-index="4"><a class="" data-dcnode-id="2201" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2202"></span></a></li><li data-dcnode-id="2195" data-original-index="5"><a class="" data-dcnode-id="2196" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">3. EASTWOOD AND STRUCTURA... &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2197"></span></a></li><li data-dcnode-id="2190" data-original-index="6"><a class="" data-dcnode-id="2191" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2192"></span></a></li><li data-dcnode-id="2185" data-original-index="7"><a class="" data-dcnode-id="2186" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2187"></span></a></li><li data-dcnode-id="2180" data-original-index="8"><a class="" data-dcnode-id="2181" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2182"></span></a></li><li data-dcnode-id="2175" data-original-index="9"><a class="" data-dcnode-id="2176" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2177"></span></a></li><li data-dcnode-id="2170" data-original-index="10"><a class="" data-dcnode-id="2171" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2172"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="2161"><a class="up" data-dcnode-id="2164" href="#_i3"><img alt="Previous section" border="0" data-dcnode-id="2165" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="2162" href="#_i9"><img alt="Next section" border="0" data-dcnode-id="2163" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="2137"><span data-dcnode-id="2158" instrument_node="">In classic form, the upstream face of the multiple arch dam consists of a series of cylindrical arches. These thin arches are supported on buttresses that, depending upon the site and the dam's height, can be spaced from 3 to 20 m apart.</span><a class="ref showRefEvent" data-dcnode-id="2156" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="12  Kollgaard E B , Chadwick W L . Development of Dam Engineering in the United States, 1988, Pergamon, New York." data-rid="b12" href="#"><span data-dcnode-id="2157" instrument_node="">12</span></a><span data-dcnode-id="2155" instrument_node=""> Except for dams of very modest height, the upstream faces of the arches and buttresses are usually inclined into the reservoir to take advantage of a vertical component of water pressure pushing down on the structure, thus enhancing stability. Eastwood did not ‘invent’ the multiple arch dam (the form dates at least to the 18th century) but in 1908, using logging cable and railroad scrap iron for reinforcement, he built the world's first reinforced concrete multiple arch dam at Hume Lake in California's Sierra Nevada (18·6 m high to the deepest foundation, 206 m long).</span><a class="ref showRefEvent" data-dcnode-id="2154" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="13  Schittner N. . Buttress dams.History of Dams: The Useful Pyramids, 1994, Balkema, Rotterdam, 181–183." data-rid="b13" href="#"></a><a class="ref showRefEvent" data-dcnode-id="2152" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="14  Eastwood J. S. . Hume lake dam. Journal of Electricity, Power and Gas, 1909, 23, October: 398–404." data-rid="b14" href="#"><span data-dcnode-id="2153" instrument_node="">13,14</span></a><span data-dcnode-id="2151" instrument_node=""> He quickly followed with construction of the 28 m high Big Bear Valley Dam in Southern California completed in 1911 (</span><span class="figure refFigure figuresContent" data-dcnode-id="2147" id="ref-ehah162-137-f3"><a class="showFiguresEEvent figure-no-ehah162-137-f3" data-attr-fig-id="ehah162-137-f3" data-dcnode-id="2148" href="#" title="Open Figure Viewer"><span data-dcnode-id="2150" instrument_node="">Figures 3</span><span class="overlay" data-dcnode-id="2149"></span></a></span><span data-dcnode-id="2146" instrument_node=""> and </span><span class="figure refFigure figuresContent" data-dcnode-id="2142" id="ref-ehah162-137-f4"><a class="showFiguresEEvent figure-no-ehah162-137-f4" data-attr-fig-id="ehah162-137-f4" data-dcnode-id="2143" href="#" title="Open Figure Viewer"><span data-dcnode-id="2145" instrument_node="">4</span><span class="overlay" data-dcnode-id="2144"></span></a></span><span data-dcnode-id="2141" instrument_node="">) and continued innovating with the technology until his death at the age of 67 in August 1924.</span><a class="ref showRefEvent" data-dcnode-id="2140" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="15  Eastwood J. S. . New Big Bear valley dam. Western Engineering, 1913, 23, December: 458–470." data-rid="b15" href="#"></a><a class="ref showRefEvent" data-dcnode-id="2138" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="16  Atkinson L. S. , Weber A. G. . Multiple-arch dam product of pioneer efforts of noted California engineer. Southwest Builder and Contractor, 1925, 65, January: 46–47." data-rid="b16" href="#"><span data-dcnode-id="2139" instrument_node="">15,16</span></a></p><div class="figure figuresContent" data-dcnode-id="2123" id="ehah162-137-f3"><div class="holder" data-dcnode-id="2124"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f3" data-dcnode-id="2134" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="2136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f3.gif&amp;raw"><span class="overlay" data-dcnode-id="2135"></span></a><div class="caption" data-dcnode-id="2125"><span data-dcnode-id="2133" instrument_node=""> </span><p data-dcnode-id="2129"><span class="captionLabel" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Figure 3</span></span><span data-dcnode-id="2130" instrument_node=""> Vignette of John S. Eastwood adorning a view of the inclined upstream face of Big Bear Valley Dam. Completed near San Bernardino, California in 1911, the dam features 12 arches each spanning 9·75 m; they vary in thickness from 0·30 m at the top to 0·75 m in the deepest foundations (Water Resources Center Archives)</span></p><span data-dcnode-id="2128" instrument_node=""> </span><div data-dcnode-id="2126" id="footer"><input data-dcnode-id="2127" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="2106" id="ehah162-137-f4"><div class="holder" data-dcnode-id="2107"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f4" data-dcnode-id="2120" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="2122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f4.gif&amp;raw"><span class="overlay" data-dcnode-id="2121"></span></a><div class="caption" data-dcnode-id="2108"><span data-dcnode-id="2119" instrument_node=""> </span><p data-dcnode-id="2112"><span class="captionLabel" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">Figure 4</span></span><span data-dcnode-id="2116" instrument_node=""> 1914 view looking across Big Bear Valley Dam showing how the buttresses support the arches. The 30 m high, 118 m long structure required less than 3600 m</span><sup data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">3</span></sup><span data-dcnode-id="2113" instrument_node=""> of concrete to build. (Author's collection)</span></p><span data-dcnode-id="2111" instrument_node=""> </span><div data-dcnode-id="2109" id="footer"><input data-dcnode-id="2110" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><p data-dcnode-id="2101"><span data-dcnode-id="2105" instrument_node="">During his life, 17 of Eastwood's dams were built and he developed plans for more than 40 other sites and projects in the American West, Canada and Mexico.</span><a class="ref showRefEvent" data-dcnode-id="2103" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="17  Jackson D. C. . Building the Ultimate Dam: John S. Eastwood and the Control of Water in the West, 2005, University of Oklahoma Press, Norman." data-rid="b17" href="#"><span data-dcnode-id="2104" instrument_node="">17</span></a><span data-dcnode-id="2102" instrument_node=""> However, his work was never embraced by America's engineering establishment (the prominent hydraulic engineer and gravity dam advocate John R. Freeman—who served as president of both the American Society of Civil Engineers (ASCE) and the American Society of Mechanical Engineers (ASME)— was particularly adamant in opposing Eastwood's multiple arch designs). After his death Eastwood received little recognition for his innovative accomplishments. Taking Eastwood's designs and analysing them through the prism of structural art provides a useful means of extending Billington's idea into the realm of hydraulic engineering; just as importantly, it focuses attention on the professional forces that influence the practice of structural engineering.</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Born of Dutch heritage in Minnesota in 1857, Eastwood attended the University of Minnesota between 1877 and 1880 and took classes in the ‘Scientific Course.’ Before graduating he left to work on the Northern Pacific Railroad for three years and then migrated to California where he practiced civil engineering until the end of his life. In California, Eastwood's career involved three distinct phases</span></p><ol class="NLM_list-list_type-alpha-lower" data-dcnode-id="2083" type="a"><li data-dcnode-id="2094"><span data-dcnode-id="2098" instrument_node=""> </span><p class="inline" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">general civil engineer/surveyor (1883–1894)</span></p><span data-dcnode-id="2095" instrument_node=""> </span></li><li data-dcnode-id="2089"><span data-dcnode-id="2093" instrument_node=""> </span><p class="inline" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">hydroelectric power engineer (1895–1907)</span></p><span data-dcnode-id="2090" instrument_node=""> </span></li><li data-dcnode-id="2084"><span data-dcnode-id="2088" instrument_node=""> </span><p class="inline" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">dam design engineer (1908–1924).</span></p><span data-dcnode-id="2085" instrument_node=""> </span></li></ol><p data-dcnode-id="2075"><span data-dcnode-id="2082" instrument_node="">His work building the San Joaquin Electric Company's hydroelectric power system in 1895–96 (430 m head, 60 km-long, 11 000 volt transmission line)</span><a class="ref showRefEvent" data-dcnode-id="2080" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="18  Low G. P. . Fresno transmission plant. Journal of Electricity, 1896, 2, April: 79–89." data-rid="b18" href="#"><span data-dcnode-id="2081" instrument_node="">18</span></a><span data-dcnode-id="2079" instrument_node=""> and his design of the one million horsepower capacity Big Creek hydropower system (between 1902 and 1907)</span><a class="ref showRefEvent" data-dcnode-id="2077" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="19  Redinger D. . The Story of Big Creek, 1949, Angeles Press, Los Angeles." data-rid="b19" href="#"><span data-dcnode-id="2078" instrument_node="">19</span></a><span data-dcnode-id="2076" instrument_node=""> comprised major engineering achievements, but he did not begin building multiple arch dams until he was 51 years old. From 1908 onwards his development of the technology was continuous and his most advanced designs were not conceived until he was over 60. Significantly, this career path accords with the experience of many other structural artists as Telford did not design his first modern arch until he was 53, John Roebling designed the Brooklyn Bridge when he was over 60 and Maillart created his Salginatobel arch bridge masterpiece at age 56.</span></p></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1870" id="s4"><a class="scroll-offset" data-dcnode-id="2072" name="_i9"></a><div class="sectionInfo" data-dcnode-id="1974"><div class="sectionHeading" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">4. EFFICIENCY</span></div><div class="sectionJumpTo" data-dcnode-id="1975"><div class="sectionLabel" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">Section:</span></div><form data-dcnode-id="1981" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="2045" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="2066" selected="#" value="#">Choose</option><option data-dcnode-id="2064" value="#">Top of page</option><option data-dcnode-id="2062" value="#abstract">Abstract</option><option data-dcnode-id="2060" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="2058" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="2056" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="2054" value="">4. EFFICIENCY &lt;&lt;</option><option data-dcnode-id="2052" value="#_i13">5. ECONOMY</option><option data-dcnode-id="2050" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="2048" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="2046" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="1982"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="2040" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Choose</span></span><span data-dcnode-id="2042" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="2041"></span></button><div class="dropdown-menu open" data-dcnode-id="1983"><ul class="dropdown-menu inner" data-dcnode-id="1984" role="menu"><li class="selected" data-dcnode-id="2035" data-original-index="0"><a class="" data-dcnode-id="2036" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2037"></span></a></li><li data-dcnode-id="2030" data-original-index="1"><a class="" data-dcnode-id="2031" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2032"></span></a></li><li data-dcnode-id="2025" data-original-index="2"><a class="" data-dcnode-id="2026" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2027"></span></a></li><li data-dcnode-id="2020" data-original-index="3"><a class="" data-dcnode-id="2021" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2022"></span></a></li><li data-dcnode-id="2015" data-original-index="4"><a class="" data-dcnode-id="2016" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2017"></span></a></li><li data-dcnode-id="2010" data-original-index="5"><a class="" data-dcnode-id="2011" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2012"></span></a></li><li data-dcnode-id="2005" data-original-index="6"><a class="" data-dcnode-id="2006" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">4. EFFICIENCY &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2007"></span></a></li><li data-dcnode-id="2000" data-original-index="7"><a class="" data-dcnode-id="2001" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">5. ECONOMY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="2002"></span></a></li><li data-dcnode-id="1995" data-original-index="8"><a class="" data-dcnode-id="1996" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1997"></span></a></li><li data-dcnode-id="1990" data-original-index="9"><a class="" data-dcnode-id="1991" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1992"></span></a></li><li data-dcnode-id="1985" data-original-index="10"><a class="" data-dcnode-id="1986" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1987"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="1976"><a class="up" data-dcnode-id="1979" href="#_i6"><img alt="Previous section" border="0" data-dcnode-id="1980" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="1977" href="#_i13"><img alt="Next section" border="0" data-dcnode-id="1978" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="1949"><span data-dcnode-id="1973" instrument_node="">From the beginning of his work as a dam design engineer, Eastwood championed efficiency as the basic tenet of his designs and promoted multiple arch dams because of their ability to reduce concrete quantities while keeping safety factors high. Or, as he succinctly phrased it in a 1915 promotional pamphlet distributed to prospective clients: ‘Bulk Does Not Mean Strength.’</span><a class="ref showRefEvent" data-dcnode-id="1971" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="20 Eastwood bulletin, promotional pamphlet included in Western Engineering. April 1914, 4, 1." data-rid="b20" href="#"><span data-dcnode-id="1972" instrument_node="">20</span></a><span data-dcnode-id="1970" instrument_node=""> Compared with concrete gravity dam designs the efficiency of the multiple arch dam (with carefully proportioned arches and buttresses designed to equalise stresses throughout the structure, usually at about 21 kg/cm</span><sup data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">2</span></sup><span data-dcnode-id="1967" instrument_node=""> is indeed extraordinary. Depending on the site, an Eastwood multiple arch dam generally reduced concrete quantities by 80% or more compared with analogous gravity designs. For example, his first dam at Hume Lake—with a maximum arch thickness of 0·75 m at a depth of 18 m—required only 1687 m</span><sup data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">3</span></sup><span data-dcnode-id="1964" instrument_node=""> of concrete, compared with almost 15 300 m</span><sup data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">3</span></sup><span data-dcnode-id="1961" instrument_node=""> for a functionally equivalent concrete gravity design.</span><a class="ref showRefEvent" data-dcnode-id="1959" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="21 Eastwood bulletin, promotional pamphlet included in Western Engineering. April 1914, 2." data-rid="b21" href="#"><span data-dcnode-id="1960" instrument_node="">21</span></a><span data-dcnode-id="1958" instrument_node=""> Even more striking, the 516 m long Cave Creek Dam (with a maximum height of 36 m and a maximum arch thickness of one metre) used less than 14 600 m</span><sup data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">3</span></sup><span data-dcnode-id="1955" instrument_node="">; a comparable concrete gravity design with a 3-to-2 height/width ratio would require on the order of 180 000 m</span><sup data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">3</span></sup><span data-dcnode-id="1952" instrument_node=""> of concrete.</span><a class="ref showRefEvent" data-dcnode-id="1950" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="22  Peterson W. H. . Cave creek flood control dam multiple arch structure built along new lines.Southwest Builder and Contractor, February 1923 62, 30–33." data-rid="b22" href="#"><span data-dcnode-id="1951" instrument_node="">22</span></a></p><p data-dcnode-id="1941"><span data-dcnode-id="1948" instrument_node="">When formulating his first multiple arch designs, Eastwood's interest lay in creating reservoirs high in the Sierra Nevada for hydroelectric power projects. Here, transportation costs were high, encouraging designs that reduced cement haulage. Once he had developed the basic structural form, however, he appreciated that multiple arch designs were suitable for a wide variety of sites, no matter how accessible. Early on he came to characterise the multiple arch dam as ‘The Ultimate Dam,’ but he continually innovated in seeking more efficient forms.</span><a class="ref showRefEvent" data-dcnode-id="1946" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="23  Eastwood J. S. . Ultimate dam.Western Engineering, September 1913 3, 175–179." data-rid="b23" href="#"><span data-dcnode-id="1947" instrument_node="">23</span></a><span data-dcnode-id="1945" instrument_node=""> Analysing the relationship between depth of excavation to reach bedrock, dam height, site width, buttress spacing, buttress slope, arch span, and arc of arch for a wide variety of dam site openings, he discerned that no single design template could serve all purposes.</span><a class="ref showRefEvent" data-dcnode-id="1943" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="24  Eastwood J. S. . Eastwood multiple-arched dam.Western Engineering, July 1914 5, 49–52." data-rid="b24" href="#"><span data-dcnode-id="1944" instrument_node="">24</span></a><span data-dcnode-id="1942" instrument_node=""> Of course, he often worked from earlier designs when developing estimates for new projects, but he never stopped trying to find new ways to reduce concrete quantities.</span></p><p data-dcnode-id="1916"><span data-dcnode-id="1940" instrument_node="">For example, in 1918 he conceived of ‘radial plan’ designs featuring angled (not parallel) buttresses that minimised the arch radius where hydrostatic pressure is greatest (</span><span class="figure refFigure figuresContent" data-dcnode-id="1936" id="ref-ehah162-137-f5"><a class="showFiguresEEvent figure-no-ehah162-137-f5" data-attr-fig-id="ehah162-137-f5" data-dcnode-id="1937" href="#" title="Open Figure Viewer"><span data-dcnode-id="1939" instrument_node="">Figure 5</span><span class="overlay" data-dcnode-id="1938"></span></a></span><span data-dcnode-id="1935" instrument_node="">). With a variable radius, each conical (not cylindrical) arch is thinner in the lower sections of the dam, significantly reducing concrete quantities.</span><a class="ref showRefEvent" data-dcnode-id="1933" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="25  John S. . Eastwood to J. T. Whittlesey, letter dated 18 January 1919, Folder 10, John S. Eastwood Papers,. Water Resources Center Archives, University of California, Berkeley, California, (Hereafter Eastwood papers, WRCA.)." data-rid="b25" href="#"><span data-dcnode-id="1934" instrument_node="">25</span></a><span data-dcnode-id="1932" instrument_node=""> Unfortunately for Eastwood, his radial plan design encountered significant opposition (visually it appeared to be curved the wrong way, downstream rather than upstream) and none was ever built.</span><a class="ref showRefEvent" data-dcnode-id="1930" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="26  Walter L. . Huber to State Engineer Wilbur F. McClure, letter dated 24 May 1919, Littlerock Dam File,. Division of Safety of Dams, Sacramento, California." data-rid="b26" href="#"><span data-dcnode-id="1931" instrument_node="">26</span></a><span data-dcnode-id="1929" instrument_node=""> However, another of his innovations on the standard multiple arch dam—the use of arches with curved upstream faces—did find expression in two completed projects (Cave Creek and Anyox) and helped to minimise concrete quantities (</span><span class="figure refFigure figuresContent" data-dcnode-id="1925" id="ref-ehah162-137-f6"><a class="showFiguresEEvent figure-no-ehah162-137-f6" data-attr-fig-id="ehah162-137-f6" data-dcnode-id="1926" href="#" title="Open Figure Viewer"><span data-dcnode-id="1928" instrument_node="">Figures 6</span><span class="overlay" data-dcnode-id="1927"></span></a></span><span data-dcnode-id="1924" instrument_node=""> and </span><span class="figure refFigure figuresContent" data-dcnode-id="1920" id="ref-ehah162-137-f7"><a class="showFiguresEEvent figure-no-ehah162-137-f7" data-attr-fig-id="ehah162-137-f7" data-dcnode-id="1921" href="#" title="Open Figure Viewer"><span data-dcnode-id="1923" instrument_node="">7</span><span class="overlay" data-dcnode-id="1922"></span></a></span><span data-dcnode-id="1919" instrument_node="">). Before his death, Eastwood never publicly described how he discerned that a curved face design was more materially conservant, but in the 1930s confirmation appeared in the technical press.</span><a class="ref showRefEvent" data-dcnode-id="1917" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="27  Schorer H. . Buttress dam of uniform strength.Transactions of the American Society of Civil Engineers, 1932, 96, 681–683." data-rid="b27" href="#"><span data-dcnode-id="1918" instrument_node="">27</span></a></p><div class="figure figuresContent" data-dcnode-id="1902" id="ehah162-137-f5"><div class="holder" data-dcnode-id="1903"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f5" data-dcnode-id="1913" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1915" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f5.gif&amp;raw"><span class="overlay" data-dcnode-id="1914"></span></a><div class="caption" data-dcnode-id="1904"><span data-dcnode-id="1912" instrument_node=""> </span><p data-dcnode-id="1908"><span class="captionLabel" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Figure 5</span></span><span data-dcnode-id="1909" instrument_node=""> ‘Radial Plan’ design proposed for Littlerock Dam in northern Los Angeles County in 1919. The arch spans vary in width and the arches at the bottom feature smaller radii; this allows reduction of the arch thickness without increasing compressive stress. (Littlerock Creek Irrigation District)</span></p><span data-dcnode-id="1907" instrument_node=""> </span><div data-dcnode-id="1905" id="footer"><input data-dcnode-id="1906" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="1885" id="ehah162-137-f6"><div class="holder" data-dcnode-id="1886"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f6" data-dcnode-id="1899" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1901" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f6.gif&amp;raw"><span class="overlay" data-dcnode-id="1900"></span></a><div class="caption" data-dcnode-id="1887"><span data-dcnode-id="1898" instrument_node=""> </span><p data-dcnode-id="1891"><span class="captionLabel" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Figure 6</span></span><span data-dcnode-id="1895" instrument_node=""> Curved upstream face of Cave Creek Dam near Phoenix, Arizona after completion in 1923. 516 m long with a maximum height of 36 m, the structure contains less than 14 600 m</span><sup data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">3</span></sup><span data-dcnode-id="1892" instrument_node=""> of concrete. (National Archives)</span></p><span data-dcnode-id="1890" instrument_node=""> </span><div data-dcnode-id="1888" id="footer"><input data-dcnode-id="1889" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div><div class="figure figuresContent" data-dcnode-id="1871" id="ehah162-137-f7"><div class="holder" data-dcnode-id="1872"><a class="thumbnail showFiguresEEvent" data-attr-fig-id="ehah162-137-f7" data-dcnode-id="1882" href="#" title="Open Figure Viewer"><img alt="figure parent remove" data-dcnode-id="1884" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/cms/10.1680/ehah.2009.162.3.137/asset/images/small/ehah162-137-f7.gif&amp;raw"><span class="overlay" data-dcnode-id="1883"></span></a><div class="caption" data-dcnode-id="1873"><span data-dcnode-id="1881" instrument_node=""> </span><p data-dcnode-id="1877"><span class="captionLabel" data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Figure 7</span></span><span data-dcnode-id="1878" instrument_node=""> Detail view of downstream face of Cave Creek Dam taken in 1988. 65 years after the completion of construction the ‘lift lines’ formed by the concrete casting process are evident; also visible are imprints created by the wooden formwork. (D. C. Jackson)</span></p><span data-dcnode-id="1876" instrument_node=""> </span><div data-dcnode-id="1874" id="footer"><input data-dcnode-id="1875" id="showFigureAttributes" type="hidden" value="true"></div></div></div></div></div><div class="NLM_sec NLM_sec_level_1" data-dcnode-id="1687" id="s5"><a class="scroll-offset" data-dcnode-id="1868" name="_i13"></a><div class="sectionInfo" data-dcnode-id="1770"><div class="sectionHeading" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">5. ECONOMY</span></div><div class="sectionJumpTo" data-dcnode-id="1771"><div class="sectionLabel" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Section:</span></div><form data-dcnode-id="1777" style="margin-bottom:0"><select class="fulltextdd bs-select-hidden" data-dcnode-id="1841" name="select23" onchange="GoTo(this, 'self')"><option data-dcnode-id="1862" selected="#" value="#">Choose</option><option data-dcnode-id="1860" value="#">Top of page</option><option data-dcnode-id="1858" value="#abstract">Abstract</option><option data-dcnode-id="1856" value="#_i2">1. INTRODUCTION</option><option data-dcnode-id="1854" value="#_i3">2. DAMS AND STRUCTURAL AR...</option><option data-dcnode-id="1852" value="#_i6">3. EASTWOOD AND STRUCTURA...</option><option data-dcnode-id="1850" value="#_i9">4. EFFICIENCY</option><option data-dcnode-id="1848" value="">5. ECONOMY &lt;&lt;</option><option data-dcnode-id="1846" value="#_i17">6. ELEGANCE</option><option data-dcnode-id="1844" value="#_i23">7. ‘ALL LINES ARE CURVES…...</option><option data-dcnode-id="1842" value="#_i26">8. CONCLUSION</option></select><div class="btn-group bootstrap-select fulltextdd" data-dcnode-id="1778"><button class="btn dropdown-toggle rnd-4" data-dcnode-id="1836" data-toggle="dropdown" title="Choose" type="button"><span class="filter-option pull-left" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Choose</span></span><span data-dcnode-id="1838" instrument_node="">&nbsp;</span><span class="caret" data-dcnode-id="1837"></span></button><div class="dropdown-menu open" data-dcnode-id="1779"><ul class="dropdown-menu inner" data-dcnode-id="1780" role="menu"><li class="selected" data-dcnode-id="1831" data-original-index="0"><a class="" data-dcnode-id="1832" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Choose</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1833"></span></a></li><li data-dcnode-id="1826" data-original-index="1"><a class="" data-dcnode-id="1827" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Top of page</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1828"></span></a></li><li data-dcnode-id="1821" data-original-index="2"><a class="" data-dcnode-id="1822" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Abstract</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1823"></span></a></li><li data-dcnode-id="1816" data-original-index="3"><a class="" data-dcnode-id="1817" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">1. INTRODUCTION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1818"></span></a></li><li data-dcnode-id="1811" data-original-index="4"><a class="" data-dcnode-id="1812" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">2. DAMS AND STRUCTURAL AR...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1813"></span></a></li><li data-dcnode-id="1806" data-original-index="5"><a class="" data-dcnode-id="1807" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">3. EASTWOOD AND STRUCTURA...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1808"></span></a></li><li data-dcnode-id="1801" data-original-index="6"><a class="" data-dcnode-id="1802" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">4. EFFICIENCY</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1803"></span></a></li><li data-dcnode-id="1796" data-original-index="7"><a class="" data-dcnode-id="1797" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">5. ECONOMY &lt;&lt;</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1798"></span></a></li><li data-dcnode-id="1791" data-original-index="8"><a class="" data-dcnode-id="1792" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">6. ELEGANCE</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1793"></span></a></li><li data-dcnode-id="1786" data-original-index="9"><a class="" data-dcnode-id="1787" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">7. ‘ALL LINES ARE CURVES…...</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1788"></span></a></li><li data-dcnode-id="1781" data-original-index="10"><a class="" data-dcnode-id="1782" data-tokens="null" style="" tabindex="0"><span class="text" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">8. CONCLUSION</span></span><span class="glyphicon glyphicon-ok check-mark" data-dcnode-id="1783"></span></a></li></ul></div></div></form><div class="nextPrevSec" data-dcnode-id="1772"><a class="up" data-dcnode-id="1775" href="#_i9"><img alt="Previous section" border="0" data-dcnode-id="1776" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_up.gif&amp;raw" width="11"></a><a class="down" data-dcnode-id="1773" href="#_i17"><img alt="Next section" border="0" data-dcnode-id="1774" height="9" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.icevirtuallibrary.com/templates/jsp/images/arrow_down.gif&amp;raw" width="11"></a></div></div></div><p data-dcnode-id="1760"><span data-dcnode-id="1769" instrument_node="">Although Eastwood's dams primarily were financed by private interests, they were decidedly public structures in providing for development of the arid West's scarce water resources. Eastwood constantly sought to maximise the financial efficacy of his dams and for him, his work found its greatest meaning within a competitive economic environment. In a 1913 letter published in </span><i data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Engineering News</span></i><span data-dcnode-id="1766" instrument_node=""> he disparaged the trend to increase the thickness of gravity dams in order to counteract the effect of ‘uplift,’ observing that: ‘Only by the use of a wide base can there be safety in a gravity dam and a wide base means a big bond issue.’</span><a class="ref showRefEvent" data-dcnode-id="1764" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="28  Eastwood J. S. . Letter to editor.Engineering News, 1913, 70, October, 822–823." data-rid="b28" href="#"><span data-dcnode-id="1765" instrument_node="">28</span></a><span data-dcnode-id="1763" instrument_node=""> To Eastwood, a ‘big bond issue’ dictated by the cost of a massive gravity dam design represented a waste of society's economic resources and this perspective accords closely with how Billington allies structural art—and its attribute of reducing construction expenditures—with a greater social purpose. As Eastwood phrased it: ‘the cost of storing water is of special interest to the people of this state [California] and when this can be accomplished with equal or greater safety and at much less cost… they should not be deprived of these benefits.’</span><a class="ref showRefEvent" data-dcnode-id="1761" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="29  John S. . Eastwood to Railroad Commission of California. letter dated 17 March 1913, Folder 18, Eastwood Papers, WRCA." data-rid="b29" href="#"><span data-dcnode-id="1762" instrument_node="">29</span></a></p><p data-dcnode-id="1750"><span data-dcnode-id="1759" instrument_node="">From Hume Lake Dam, which undercut the cost estimate for the original rockfill design by 37% ($46 000 against $74 000), through the 53 m high, 220 m long Littlerock Dam (completed in 1924 for $430 000) where the California State engineer acknowledged that a multiple arch design was the only one economically feasible to build, Eastwood focused on developing the least expensive dams possible.</span><a class="ref showRefEvent" data-dcnode-id="1758" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="30 Eastwood bulletin, 3." data-rid="b30" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1756" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="31 State Engineer W. F. McClure to Donald Barker, letter dated 2 August 1920, Littlerock Dam File, Division of Safety of Dams, Sacramento, California." data-rid="b31" href="#"><span data-dcnode-id="1757" instrument_node="">30,31</span></a><span data-dcnode-id="1755" instrument_node=""> His design for the Big Meadows Dam (1912) was to be approximately $500 000 cheaper than a gravity dam (estimated to be over a million dollars) and his Mountain Dell Dam, which openly competed with a flat slab buttress and a gravity design, undercut them both by more than 35%.</span><a class="ref showRefEvent" data-dcnode-id="1754" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="32 Alfred Noble to Great Western Power Company, letter dated 12 May 1911, Folder 18, Eastwood Papers, WRCA." data-rid="b32" href="#"></a><a class="ref showRefEvent" data-dcnode-id="1752" data-referenceslink="/doi/ref/10.1680/ehah.2009.162.3.137" data-refrance="33 High multiple-arched concrete dam for Salt Lake City water supply.Engineering News-Record, 7 March 1918, 78, 455–457." data-rid="b33" href="#"><span data-dcnode-id="1753" instrument_node="">32,33</span></a><span data-dcnode-id="1751" instrument_node=""> In both of these instances the dam sites were accessible to railroad lines or other transportation facilities, belying the notion that multiple arch dams were
