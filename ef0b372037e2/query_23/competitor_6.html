</span><h1 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">🗽18 Little-known Facts about The Statue of Liberty</span></h1><span data-dcnode-id="734" instrument_node="">
</span><div class="post__meta" data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">
                        First published 16th December 2019 </span><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Robin James</span></em><span data-dcnode-id="730" instrument_node="">

</span><a class="twitter-follow" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/FactcityCom"><span data-dcnode-id="721" instrument_node="">Follow us on Twitter</span></a><span data-dcnode-id="719" instrument_node="">
</span><div class="fb-like" data-action="like" data-dcnode-id="717" data-href="https://factcity.com/14-interesting-facts-about-the-statue-of-liberty/" data-layout="button_count" data-share="false" data-size="large" data-width="" style="width:120px;"><span data-dcnode-id="718" instrument_node="">

</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">The Statue of Liberty, an iconic US national monument, welcomes approximately 4.5 million visitors every year.&nbsp; If you’re considering a visit, you’ll want to learn these fun facts about Lady Liberty:</span></p><span data-dcnode-id="711" instrument_node="">
</span><h2 data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">1. Lady Liberty is actually French!</span></h2><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">The Statue of Liberty was a gift to the people of the United States from the people of France to recognise 100 years of friendship between the two nations.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">2. Yes – they shipped the whole statue overseas!</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="701" instrument_node="">It was built in </span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-paris/"><span data-dcnode-id="700" instrument_node="">Paris</span></a><span data-dcnode-id="698" instrument_node=""> and then shipped to the USA in 1885.&nbsp; It now stands magnificent on Liberty Island in Manhattan, </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-new-york/"><span data-dcnode-id="697" instrument_node="">New York</span></a><span data-dcnode-id="695" instrument_node="">.</span></p><span data-dcnode-id="693" instrument_node="">
</span><h2 data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">3. Liberty Island isn’t the original name.</span></h2><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">Before </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-the-1950s/"><span data-dcnode-id="688" instrument_node="">1956</span></a><span data-dcnode-id="686" instrument_node="">, Liberty Island was called Bedloe Island.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="680"><img alt="close up photo of the statue of liberty " class="aligncenter wp-image-7996 lazyloaded" data-dcnode-id="683" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-2048x1365.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-405x270.jpg 405w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-840x560.jpg 840w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-2048x1365.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-405x270.jpg 405w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-840x560.jpg 840w" width="600"><noscript data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">&lt;img class="aligncenter wp-image-7996" src="https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg" alt="close up photo of the statue of liberty " width="600" height="400" srcset="https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-2048x1365.jpg 2048w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-405x270.jpg 405w, https://factcity.com/wp-content/uploads/2019/12/interesting-facts-about-the-statue-of-liberty-840x560.jpg 840w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="679" instrument_node="">
</span><h2 data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">4. The genius behind another French landmark helped create the Statue of Liberty.</span></h2><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">It was Gustave Eiffel, the designer of the Eiffel Tower, that was responsible for the supporting iron framework of the Statue of Liberty.</span></p><span data-dcnode-id="673" instrument_node="">
</span><h2 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">5. It’s got a longer name in French.</span></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">“</span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-los-angeles/"><span data-dcnode-id="668" instrument_node="">La</span></a><span data-dcnode-id="666" instrument_node=""> Liberté Éclairant le Monde” or “Liberty Enlightening the World” is the statue’s official name.</span></p><span data-dcnode-id="664" instrument_node="">
</span><h2 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">6. You’ll see it if you break change in the US.</span></h2><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The Statue of Liberty appears on the $10 note.</span></p><span data-dcnode-id="658" instrument_node="">
</span><div class="google_ad_block" data-dcnode-id="653"><ins class="adsbygoogle" data-ad-client="ca-pub-0822464864017124" data-ad-format="auto" data-ad-slot="2976786395" data-dcnode-id="657" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="652" instrument_node="">
</span><h2 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">7. It’s astonishingly tall!</span></h2><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">The total height from the ground to the top of the torch is 92.99 meters (305 feet and 1 inch).The Statue of Liberty was the tallest iron structure ever built at the </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-time/"><span data-dcnode-id="647" instrument_node="">time</span></a><span data-dcnode-id="645" instrument_node=""> of its construction (1886).</span></p><span data-dcnode-id="643" instrument_node="">
</span><h2 data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">8. Fancy a lift?</span></h2><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">There’s a lift inside if you don’t fancy climbing the 354 steps up to the crown.</span></p><span data-dcnode-id="637" instrument_node="">
</span><h2 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">9. Lady Liberty had an 80s makeover.</span></h2><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">The Statue of Liberty was restored in the 1980s.&nbsp; To finish her off, the torch was completely covered in a thin layer of 24k </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-the-gold-rush/"><span data-dcnode-id="632" instrument_node="">gold</span></a><span data-dcnode-id="630" instrument_node="">!</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="624"><img alt="facts about the statue of liberty" class="aligncenter wp-image-10472 lazyloaded" data-dcnode-id="627" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-2048x1365.jpg 2048w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-2048x1365.jpg 2048w" width="600"><noscript data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">&lt;img class="aligncenter wp-image-10472" src="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg" alt="facts about the statue of liberty" width="600" height="400" srcset="https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-1536x1024.jpg 1536w, https://factcity.com/wp-content/uploads/2019/12/facts-about-the-statue-of-liberty-2048x1365.jpg 2048w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="623" instrument_node="">
</span><h2 data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">10. Liberty’s crown is symbolic.</span></h2><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">The crown’s 7 points represent the seven seas and the seven continents of the world.</span></p><span data-dcnode-id="617" instrument_node="">
</span><h2 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">11. In fact, Lady Liberty herself is a known goddess.</span></h2><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">The robed female figure represents Libertas, the </span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-ancient-rome/"><span data-dcnode-id="612" instrument_node="">Roman</span></a><span data-dcnode-id="610" instrument_node=""> goddess of freedom.</span></p><span data-dcnode-id="608" instrument_node="">
</span><h2 data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">12. Ever snooped at her tablet?</span></h2><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="604" instrument_node="">The tablet she holds is inscribed “</span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-july/"><span data-dcnode-id="603" instrument_node="">July</span></a><span data-dcnode-id="601" instrument_node=""> 4th, 1776” – the date of American Independence.</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="595"><img alt="The Statue of Liberty at sunset" class="aligncenter wp-image-14006 lazyloaded" data-dcnode-id="598" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg" data-srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-1024x670.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-768x503.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1.jpg 1280w" height="393" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-1024x670.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-768x503.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1.jpg 1280w" width="600"><noscript data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&lt;img class="aligncenter wp-image-14006" src="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg" alt="The Statue of Liberty at sunset" width="600" height="393" srcset="https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-300x196.jpg 300w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-1024x670.jpg 1024w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1-768x503.jpg 768w, https://factcity.com/wp-content/uploads/2019/12/Facts-about-the-Statue-of-Liberty-1.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="594" instrument_node="">
</span><h2 data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">13. It’s a bit of a lightning rod!</span></h2><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Since she was first erected in 1886, the statue has attracted about 600 </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-light/"><span data-dcnode-id="589" instrument_node="">lighting</span></a><span data-dcnode-id="587" instrument_node=""> strikes every year!&nbsp; A New York photographer, Jay Fine became the first to capture this on film.</span></p><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">14. You’ll have seen the statue many, many times on the big screen.</span></h2><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The Statue of Liberty has featured in lots of famous films including Titanic, Ghostbusters, and, of course, Planet of the Apes (spoilers!).</span></p><span data-dcnode-id="579" instrument_node="">
</span><h2 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">15. She’s a fair age!</span></h2><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Lady Liberty will be celebrating her 140th birthday in </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-october/"><span data-dcnode-id="574" instrument_node="">October</span></a><span data-dcnode-id="572" instrument_node=""> 2025!</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="566"><img alt="facts about the statue of liberty" class="aligncenter wp-image-22606 lazyloaded" data-dcnode-id="569" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg" data-srcset="https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280.jpg 1280w" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg&amp;raw" srcset="https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280.jpg 1280w" width="600"><noscript data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">&lt;img class="aligncenter wp-image-22606" src="https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg" alt="facts about the statue of liberty" width="600" height="400" srcset="https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-300x200.jpg 300w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-1024x682.jpg 1024w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280-768x512.jpg 768w, https://factcity.com/wp-content/uploads/2021/05/statue-of-liberty-2501264_1280.jpg 1280w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="565" instrument_node="">
</span><h2 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">16. Lady Liberty once served a different role.</span></h2><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Up until 1902, the statue operated as a lighthouse.</span></p><span data-dcnode-id="559" instrument_node="">
</span><h2 data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">17. It’s an important point of heritage.</span></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="555" instrument_node="">UNESCO listed the statue in </span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//factcity.com/facts-about-the-1980s/"><span data-dcnode-id="554" instrument_node="">1984</span></a><span data-dcnode-id="552" instrument_node=""> as a World Heritage Site.</span></p><span data-dcnode-id="550" instrument_node="">
</span><h2 data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">18. You can take a look around for yourself!</span></h2><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">Want to take a close up look at the Statue of Liberty? To get the ferry to Liberty Island, adult tickets cost $19.25.&nbsp; An additional $3 fee to access the crown is also charged.&nbsp; Find out more on the </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nps.gov/stli/planyourvisit/fees.htm" rel="noopener" target="_blank"><span data-dcnode-id="545" instrument_node="">National Monument website</span></a><span data-dcnode-id="543" instrument_node="">.</span></p><span data-dcnode-id="541" instrument_node="">
</span><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">FAQs about The Statue of Liberty</span></h2><span data-dcnode-id="538" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="524"><span data-dcnode-id="537" instrument_node="">
</span><div data-dcnode-id="526"><span data-dcnode-id="536" instrument_node="">
</span><h2 data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Did Egypt reject the Statue of Liberty?</span></h2><span data-dcnode-id="533" instrument_node=""> </span><div data-dcnode-id="528"><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">
						Yes! It’s thought that Egypt didn’t wish to take on the statue as its costs were too high.                    </span></p><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="525" instrument_node="">
</span></section><span data-dcnode-id="523" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="509"><span data-dcnode-id="522" instrument_node="">
</span><div data-dcnode-id="511"><span data-dcnode-id="521" instrument_node="">
</span><h2 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">What is inside Lady Liberty?</span></h2><span data-dcnode-id="518" instrument_node=""> </span><div data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">
						The statue’s interior is largely structuring and staircases - a bit boring, we’re afraid!                    </span></p><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="510" instrument_node="">
</span></section><span data-dcnode-id="508" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="494"><span data-dcnode-id="507" instrument_node="">
</span><div data-dcnode-id="496"><span data-dcnode-id="506" instrument_node="">
</span><h2 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">How much is the Statue of Liberty worth?</span></h2><span data-dcnode-id="503" instrument_node=""> </span><div data-dcnode-id="498"><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">
						The Statue of Liberty is said to be worth around $227,000, but that’s if you were to sell all of its parts for scrap!                    </span></p><span data-dcnode-id="499" instrument_node="">
</span></div><span data-dcnode-id="497" instrument_node="">
</span></div><span data-dcnode-id="495" instrument_node="">
</span></section><span data-dcnode-id="493" instrument_node="">
</span><span data-dcnode-id="490" instrument_node="">
