</span><p class="cat" data-dcnode-id="961"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/category/regions/art-europe/"><span data-dcnode-id="963" instrument_node="">European Art</span></a></p><span data-dcnode-id="960" instrument_node="">
</span><h3 data-dcnode-id="957"><a data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/artists-and-industrial-revolution/"><span data-dcnode-id="959" instrument_node="">Artists and Industrial Revolution: Images of the Changing World</span></a></h3><span data-dcnode-id="956" instrument_node="">
</span></div><span data-dcnode-id="954" instrument_node="">
</span></div><div class="small-post" data-dcnode-id="930"><span data-dcnode-id="952" instrument_node="">
</span><div class="post-image" data-dcnode-id="943"><span data-dcnode-id="951" instrument_node="">
</span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/alec-soths-american-landscapes/"><span data-dcnode-id="950" instrument_node="">
</span><img alt="" class="lazy-hidden attachment-post-thumb-2 size-post-thumb-2 wp-post-image" data-dcnode-id="949" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-264x177.jpg" data-srcset="https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-264x177.jpg 264w, https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-107x72.jpg 107w, https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-552x370.jpg 552w" height="177" loading="lazy" sizes="(max-width: 264px) 100vw, 264px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="264"><noscript data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">&lt;img width="264" height="177" src="https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-264x177.jpg" class="attachment-post-thumb-2 size-post-thumb-2 wp-post-image" alt="" loading="lazy" srcset="https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-264x177.jpg 264w, https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-107x72.jpg 107w, https://www.dailyartmagazine.com/wp-content/uploads/2021/10/SBTM_2-552x370.jpg 552w" sizes="(max-width: 264px) 100vw, 264px" /&gt;</span></noscript><span data-dcnode-id="946" instrument_node=""> </span></a><span data-dcnode-id="944" instrument_node="">
</span></div><span data-dcnode-id="942" instrument_node="">
</span><div class="post-content" data-dcnode-id="932"><span data-dcnode-id="941" instrument_node="">
</span><p class="cat" data-dcnode-id="938"><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/category/art-forms/"><span data-dcnode-id="940" instrument_node="">Art Forms</span></a></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="934"><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/alec-soths-american-landscapes/"><span data-dcnode-id="936" instrument_node="">Alec Soth’s American Landscapes, Global Interiors</span></a></h3><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">
</span></div><span data-dcnode-id="929" instrument_node=""> </span></div><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span></div><span data-dcnode-id="923" instrument_node="">
</span><div class="art-ads-right" data-dcnode-id="919"><span data-dcnode-id="922" instrument_node="">
</span><div data-dcnode-id="921" id="halfpage_desktop_1_articles"></div><span data-dcnode-id="920" instrument_node="">
</span></div><span data-dcnode-id="918" instrument_node="">
</span><div class="standard-article-sections__Ctn" data-dcnode-id="513"><span data-dcnode-id="917" instrument_node="">
</span><section class="content container" data-dcnode-id="515"><span data-dcnode-id="916" instrument_node="">
</span><div class="page-content article-content" data-dcnode-id="516"><span data-dcnode-id="915" instrument_node="">
</span><div class="old-post-ctn" data-dcnode-id="551"><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="906"><b data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">The Industrial Revolution brought profound changes into the world, re-designing its shape in the most hardhearted of ways, never experienced before by humanity. As per usual, art was a witty spectator of these changes and faithfully reported them for posterity to admire and ponder over. Come read about industrial landscapes </span></b><strong data-dcnode-id="910" style="font-weight: bold;"><span data-dcnode-id="911" instrument_node="">from around the globe</span></strong><span data-dcnode-id="909" instrument_node=""> </span><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">and what they represent. </span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><span data-dcnode-id="904" instrument_node="">
</span><span data-dcnode-id="903" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="891"><span data-dcnode-id="902" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="893"><img alt="Joseph Mallord William Turner, Rain, Steam, and Speed - The Great Western Railway, 1844, The National Gallery, London. Detail." class="wp-image-66974 lazy-loaded" data-dcnode-id="901" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/server-2.jpg" height="331" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/server-2.jpg&amp;raw" width="589"><noscript data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">&lt;img loading="lazy" class="wp-image-66974" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/server-2.jpg" alt="Joseph Mallord William Turner, Rain, Steam, and Speed - The Great Western Railway, 1844, The National Gallery, London. Detail." width="589" height="331" /&gt;</span></noscript><figcaption data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">Joseph Mallord William Turner, </span><em data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Rain, Steam, and Speed – The Great Western Railway</span></em><span data-dcnode-id="895" instrument_node="">, 1844, The National Gallery, London, England, UK. Detail.</span></figcaption></figure><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span><span data-dcnode-id="889" instrument_node="">
</span><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Historically, this global phenomenon sparked in England at the end of the 18th century and it lasted for about 160 years. Some first, some later, the rest of the world eventually joined in. Historians split it into two distinct periods: a First Industrial Revolution and a Second one. The First harbored the invention of machines and tools, cement, iron making, gas lighting, electricity and steam power. Meanwhile the Second brought refinement of these innovations plus the mass production and use of chemicals. The zeal and enthusiasm towards the many possibilities ahead were great at the time.</span></p><span data-dcnode-id="885" instrument_node="">
</span><span data-dcnode-id="884" instrument_node="">
</span><span data-dcnode-id="883" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="871"><span data-dcnode-id="882" instrument_node="">
</span><figure class="aligncenter size-large" data-dcnode-id="873"><img alt="Karl Eduard Biermann, Ironworks Borsig, Berlin, 1847, Markisches Museum, Berlin. Wikicommons." class="wp-image-65989 lazy-loaded" data-dcnode-id="881" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/800px-Maschinenbau-Anstalt_Borsig_Berlin_Chausseestraße_1847_Karl_Eduard_Biermann-1.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/800px-Maschinenbau-Anstalt_Borsig_Berlin_Chausseestra%25C3%259Fe_1847_Karl_Eduard_Biermann-1.jpg&amp;raw"><noscript data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">&lt;img class="wp-image-65989" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/800px-Maschinenbau-Anstalt_Borsig_Berlin_Chausseestraße_1847_Karl_Eduard_Biermann-1.jpg" alt="Karl Eduard Biermann, Ironworks Borsig, Berlin, 1847, Markisches Museum, Berlin. Wikicommons." /&gt;</span></noscript><figcaption data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">Karl Eduard Biermann, </span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Ironworks Borsig, Berlin</span></em><span data-dcnode-id="875" instrument_node="">, 1847, Markisches Museum, Berlin, Germany. Wikimedia Commons.</span></figcaption></figure><span data-dcnode-id="872" instrument_node="">
</span></div><span data-dcnode-id="870" instrument_node="">
</span><span data-dcnode-id="869" instrument_node="">
</span><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="867" instrument_node="">Despite the immense potential, there was also a quick development of a counter-trend among the intellectual and artistic circles. The </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/ruins-in-art/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">Romantics</span></a><span data-dcnode-id="864" instrument_node="">, headed by artists and poets such as </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/last-chance-to-see-william-blake-at-tate-britain/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="863" instrument_node="">William Blake</span></a><span data-dcnode-id="861" instrument_node=""> and </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/10-shades-romantic-creepiness-according-caspar-david-friedrich/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="860" instrument_node="">Caspar David Friedrich</span></a><span data-dcnode-id="858" instrument_node="">, were horrified by what the Industrial Revolution entailed. The Romantic movement was openly hostile towards this reality’s make-over. Distraught by the ugliness and misery of it, it turned to nature and ancient, evocative beauty. That said, I will not explore this movement here any further. Nonetheless, should you wish to read more, follow this link to some fine articles about </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/category/periods/romanticism/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="857" instrument_node="">Romanticism</span></a><span data-dcnode-id="855" instrument_node="">. Now, moving on to our industrial landscapes…</span></p><span data-dcnode-id="853" instrument_node="">
</span><span data-dcnode-id="852" instrument_node="">
</span><span data-dcnode-id="851" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="839"><img alt="The Industrial Revolution and its Landscapes: William Williams, Ironbridge, 1780, Ironbridge Gorge Museum Trust." class="wp-image-66636 lazy-loaded" data-dcnode-id="850" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/iron-bridge-paint-1024x435.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/iron-bridge-paint-1024x435.jpg&amp;raw"><noscript data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">&lt;img class="wp-image-66636" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/iron-bridge-paint-1024x435.jpg" alt="The Industrial Revolution and its Landscapes: William Williams, Ironbridge, 1780, Ironbridge Gorge Museum Trust." /&gt;</span></noscript><figcaption data-dcnode-id="840"><span data-dcnode-id="847" instrument_node="">William Williams, </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Ironbridge, </span></em><span data-dcnode-id="844" instrument_node="">1780, Ironbridge Gorge Museum Trust, Shropshire, England, UK. </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ironbridge.org.uk/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="843" instrument_node="">Ironbridge Gorge Museums</span></a><span data-dcnode-id="841" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="838" instrument_node="">
</span><span data-dcnode-id="837" instrument_node="">
</span><span data-dcnode-id="836" instrument_node="">
</span><h2 data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Realism &amp; Train Spotting</span></h2><span data-dcnode-id="833" instrument_node="">
</span><span data-dcnode-id="832" instrument_node="">
</span><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">If there is a genre that actively incorporated the modern into its production, letting the Industrial Revolution in, it is Realism. This movement made the fall from the empyrean skies to the crude, hard-working earth its own journey. Mythology with all its divinities and heroes started to lose ground on which to frolic, while artists began to pay increasing attention to an entirely human-made, grinding world. In the 1800s, Realism observed and depicted a brand new register of images. They were rigorously drawn from everyday life, made of tangible things, small and large, shiny and dirty, material, detailed, functional.</span></p><span data-dcnode-id="828" instrument_node="">
</span><span data-dcnode-id="827" instrument_node="">
</span><span data-dcnode-id="826" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="814"><span data-dcnode-id="825" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="816"><img alt="Lionel Walden, Steel Works, Cardiff at Night, 1893-97, National Museum Wales." class="wp-image-66732 lazy-loaded" data-dcnode-id="824" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/nmwa2245.jpg" height="432" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/nmwa2245.jpg&amp;raw" width="576"><noscript data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">&lt;img loading="lazy" class="wp-image-66732" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/nmwa2245.jpg" alt="Lionel Walden, Steel Works, Cardiff at Night, 1893-97, National Museum Wales." width="576" height="432" /&gt;</span></noscript><figcaption data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Lionel Walden, </span><em data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Steel Works, Cardiff at Night, </span></em><span data-dcnode-id="818" instrument_node="">1893-97, National Museum Wales, Cardiff, Wales, UK.</span></figcaption></figure><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span><span data-dcnode-id="812" instrument_node="">
</span><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">The palette was ‘slightly’ affected and generally turned towards earthy, subdued colors. Like in the dark oil on canvas above, by Lionel Walden. The fact that he painted this industrial landscape at night didn’t help. Despite the proliferation of new, prodigious machines rotating, melting, pressing and tilting, one could object that the representation of very technical, lifeless objects could dull the senses in the long run, even if shown within a landscape.</span></p><span data-dcnode-id="808" instrument_node="">
</span><span data-dcnode-id="807" instrument_node="">
</span><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="805" instrument_node="">Nevertheless, Realist painters took it upon themselves to represent the Industrial Revolution with accuracy and an abundance of details. They recognized it was a happening that well deserved to be recorded, regardless of the lack of poetry. I am grateful for the truthful depiction we get from their observations of the shifting in their time. Besides, some painters infused their scenes with a beauty they couldn’t help but include. I suppose this beauty was already there, in their eyes. So the world just looked poetic anyway, regardless of the subject. An example is </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/spinning-colors-turners-changes-in-technique-from-objects-to-colors/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="804" instrument_node="">J. M. W. Turner</span></a><span data-dcnode-id="802" instrument_node=""> and his landscape </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Rain, Steam and Speed</span></em><span data-dcnode-id="799" instrument_node="">, shown below. I mean, it is about a train crossing the English river Thames, but it looks very evocative indeed.</span></p><span data-dcnode-id="797" instrument_node="">
</span><span data-dcnode-id="796" instrument_node="">
</span><span data-dcnode-id="795" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="783"><span data-dcnode-id="794" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="785"><img alt="The Industrial Revolution and its Landscapes: Joseph Mallord William Turner, Rain, Steam, and Speed - The Great Western Railway, 1844, The National Gallery, London." class="wp-image-65831 lazy-loaded" data-dcnode-id="793" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/unnamed-4.jpg" height="434" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/unnamed-4.jpg&amp;raw" width="582"><noscript data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">&lt;img loading="lazy" class="wp-image-65831" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/unnamed-4.jpg" alt="The Industrial Revolution and its Landscapes: Joseph Mallord William Turner, Rain, Steam, and Speed - The Great Western Railway, 1844, The National Gallery, London." width="582" height="434" /&gt;</span></noscript><figcaption data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">Joseph Mallord William Turner, </span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Rain, Steam, and Speed – The Great Western Railway</span></em><span data-dcnode-id="787" instrument_node="">, 1844, The National Gallery, London, England, UK.</span></figcaption></figure><span data-dcnode-id="784" instrument_node="">
</span></div><span data-dcnode-id="782" instrument_node="">
</span><span data-dcnode-id="781" instrument_node="">
</span><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="779" instrument_node="">The train embodied pretty much all the novelties there were in the industrialization process, out in the open, rather than in factories and plants. Machinery, power, movement of people, goods, and construction materials at speeds that was unimaginable before. A connection formed between places, as remote as possible, via miles and miles of railway. The dynamic subject also attracted many artists who thought locomotives and stations worthy of their time. To name just one, </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/claude-monet-and-saint-lazare-train-station/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="778" instrument_node="">Claude Monet</span></a><span data-dcnode-id="776" instrument_node=""> painted buzzing junctions several times, peering through steam and cinder. If you are interested, you can read more about travel-related art in the </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/fabulous-railway-station-paintings-from-the-golden-age-of-train-travel/" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Fabulous Railway Station Paintings from the Golden Age of Train Travel</span></em></a><span data-dcnode-id="772" instrument_node=""> article.</span></p><span data-dcnode-id="770" instrument_node="">
</span><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">I can only imagine the awe that the sight must have kindled. What did it feel like to spot the very first train passing by at full speed, for people who were witnessing industrialization? Possibly what it would feel like for us to see a real light-speed spaceship or a fully functioning teleportation pod.</span></p><span data-dcnode-id="765" instrument_node="">
</span><span data-dcnode-id="764" instrument_node="">
</span><span data-dcnode-id="763" instrument_node="">
</span><h2 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Expositions</span></h2><span data-dcnode-id="760" instrument_node="">
</span><span data-dcnode-id="759" instrument_node="">
</span><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">The print below belongs to a Japanese artist recognized as a master in representing the shift of his country from a “floating”, unspoiled world to a modern power at play. Kobayashi Kiyochika decided to capture the ground-breaking historical event of the first Japanese Industrial Exposition on paper. It was a very successful event! It attracted 450,000 visitors in the 102 days of its duration and displayed 84,000 innovations.</span></p><span data-dcnode-id="755" instrument_node="">
</span><span data-dcnode-id="754" instrument_node="">
</span><span data-dcnode-id="753" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="741"><span data-dcnode-id="752" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="743"><img alt="The Industrial Revolution and its Landscapes: Kobayashi Kiyochika, The first Domestic Industrial Exposition, 1877, National Diet Library, Tokyo." class="wp-image-65866 lazy-loaded" data-dcnode-id="751" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/139543-1024x523.jpg" height="299" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/139543-1024x523.jpg&amp;raw" width="586"><noscript data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">&lt;img loading="lazy" class="wp-image-65866" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/139543-1024x523.jpg" alt="The Industrial Revolution and its Landscapes: Kobayashi Kiyochika, The first Domestic Industrial Exposition, 1877, National Diet Library, Tokyo." width="586" height="299" /&gt;</span></noscript><figcaption data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">Kobayashi Kiyochika, </span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">The First Domestic Industrial Exposition</span></em><span data-dcnode-id="745" instrument_node="">, 1877, National Diet Library, Tokyo, Japan.</span></figcaption></figure><span data-dcnode-id="742" instrument_node="">
</span></div><span data-dcnode-id="740" instrument_node="">
</span><span data-dcnode-id="739" instrument_node="">
</span><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">I am playing a bit with the terminology here. If you look at this print, representing the exposition’s settings in Ueno Park in Tokyo, you see trees, hills, clean water, a clear sky. Well, it fits perfectly with the description of a landscape! Admittedly this is not industrialization at its most sooty stage. However, dear readers, it represents the start of Japan’s rush towards a model of living and business-making started by Western countries. So much development deserved anything but its own fair. European countries had been holding expositions sporadically, then more and more regularly, since the late 1700s.</span></p><span data-dcnode-id="735" instrument_node="">
</span><span data-dcnode-id="734" instrument_node="">
</span><span data-dcnode-id="733" instrument_node="">
</span><h2 data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">A Symbol</span></h2><span data-dcnode-id="730" instrument_node="">
</span><span data-dcnode-id="729" instrument_node="">
</span><span data-dcnode-id="728" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="716"><span data-dcnode-id="727" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="718"><img alt="The Industrial Revolution and its Landscapes: Eiffel Tower and Champ de Mars seen from Trocadéro Palace - Paris Exposition, photographer unknown, 1889, sPPOC Library of Congress." class="wp-image-65839 lazy-loaded" data-dcnode-id="726" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/service-pnp-cph-3f00000-3f03000-3f03700-3f03710v-1.jpg" height="401" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/uploads/2020/11/service-pnp-cph-3f00000-3f03000-3f03700-3f03710v-1.jpg&amp;raw" width="587"><noscript data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">&lt;img loading="lazy" class="wp-image-65839" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/service-pnp-cph-3f00000-3f03000-3f03700-3f03710v-1.jpg" alt="The Industrial Revolution and its Landscapes: Eiffel Tower and Champ de Mars seen from Trocadéro Palace - Paris Exposition, photographer unknown, 1889, sPPOC Library of Congress." width="587" height="401" /&gt;</span></noscript><figcaption data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Eiffel Tower and Champ de Mars seen from Trocadéro Palace – Paris Exposition, photographer unknown, 1889. </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loc.gov/pictures/resource/cph.3f03710/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="722" instrument_node="">PPOC Library of Congress</span></a><span data-dcnode-id="720" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><span data-dcnode-id="714" instrument_node="">
</span><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="712" instrument_node="">Once again, if you look at the image of this next industrial landscape you might think I am cheating. Fret not, as I am being accurate and truthful. Besides, should I have shown you only chimneys, smoke, and ashes? In all honesty, I could have not. This is much more beautiful. I am going to tell you why this picture of </span><em data-dcnode-id="708"><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/delaunay-red-tower/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="711" instrument_node="">La Tour Eiffel</span></a><span data-dcnode-id="709" instrument_node=""> </span></em><span data-dcnode-id="707" instrument_node="">and Champs de Mars constitutes a perfect example. I am even showing it to you via a </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/pioneers-of-photography-france/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="706" instrument_node="">photograph</span></a><span data-dcnode-id="704" instrument_node="">! A further ‘modern contraption’, quintessentially realistic, that split the figurative world in two.</span></p><span data-dcnode-id="702" instrument_node="">
</span><span data-dcnode-id="701" instrument_node="">
</span><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">First of all, the tower was built from 1887 to 1889, nestled between the first and second Industrial Revolutions. Mind you, iron was no news in the late 1800s. However, the amount of metal that was extracted and molded at the time was unprecedented. Furthermore, without the fast-paced production, which was only possible thanks to the new machinery used in factories, it would have taken forever to complete it (figuratively)! Instead, the Eiffel Tower was ready to feature as the grand portal to the 1889 World’s Fair, as designed by the French civil engineer Alexandre Gustave Eiffel.</span></p><span data-dcnode-id="697" instrument_node="">
</span><span data-dcnode-id="696" instrument_node="">
</span><span data-dcnode-id="695" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="683"><span data-dcnode-id="694" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="685"><img alt="Eiffel Tower, detail, 2011, PH credit: Albert, Flickr." class="lazy-hidden wp-image-66299" data-dcnode-id="693" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/eiffel-tower-metal-frame-close-up-5-1.jpg" height="355" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="534"><noscript data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">&lt;img loading="lazy" class="wp-image-66299" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/eiffel-tower-metal-frame-close-up-5-1.jpg" alt="Eiffel Tower, detail, 2011, PH credit: Albert, Flickr." width="534" height="355" /&gt;</span></noscript><figcaption data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">Detail of Eiffel Tower, Paris, France. </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/campra/7509360106/in/photostream/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">Flickr</span></a><span data-dcnode-id="687" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span><span data-dcnode-id="681" instrument_node="">
</span><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">This globally acclaimed monument is 324 metres tall and is constructed of a staggering number of iron segments, that is 18,038 pieces joined together by 2.5 million rivets. Each and every part was created to fit impeccably, if anything short of perfection arrived on the premises, the piece was sent back to the factory to be refined. As nearly 30,000 visitors arrived in flocks to see it, we can say that it was an instant success with the public.</span></p><span data-dcnode-id="677" instrument_node="">
</span><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">However, it met a certain resistance from a number of intellectual figures. They heatedly declared their indignation towards the “useless and monstrous […] giddy, ridiculous tower”. The declaration, published by a French magazine in 1887, gathered 300 signatures of prominent men. Artists, writers, and painters fought the inclusion of this new symbol of modern times to Paris’ beloved, pre-industrial skyline. Had they succeeded in altering the project, we would have never known this exact architectural wonder, sky-scraping over Champs de Mars. Imagine that!</span></p><span data-dcnode-id="672" instrument_node="">
</span><span data-dcnode-id="671" instrument_node="">
</span><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The Cities</span></h2><span data-dcnode-id="667" instrument_node="">
</span><span data-dcnode-id="666" instrument_node="">
</span><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">At the beginning of the 1800s only about 3% of the population lived in cities. As you either already know, or can guess, the Industrial Revolution changed that for good! It was a steady movement of people, amassing just outside the pretty, historical centers. It also created new environments inhabited by a new working class. As laborers left the countryside where they were no longer needed, the outskirts of cities buzzed and gained new, interesting traits to observe, study, and paint.</span></p><span data-dcnode-id="662" instrument_node="">
</span><span data-dcnode-id="661" instrument_node="">
</span><span data-dcnode-id="660" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="645"><span data-dcnode-id="659" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="647"><img alt="Georges Seurat, Bathers at Asnieres (Une Baignade, Asnières), 1884, The National Art Gallery, London." class="lazy-hidden wp-image-65834" data-dcnode-id="658" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/N-3908-00-000103-pp_550-1.jpg" height="386" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="585"><noscript data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">&lt;img loading="lazy" class="wp-image-65834" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/N-3908-00-000103-pp_550-1.jpg" alt="Georges Seurat, Bathers at Asnieres (Une Baignade, Asnières), 1884, The National Art Gallery, London." width="585" height="386" /&gt;</span></noscript><figcaption data-dcnode-id="648"><span data-dcnode-id="655" instrument_node="">Georges Seurat, </span><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Bathers at Asnieres</span></em><span data-dcnode-id="652" instrument_node=""> (</span><em data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Une Baignade, Asnières</span></em><span data-dcnode-id="649" instrument_node="">), 1884, The National Gallery, London, England, UK.</span></figcaption></figure><span data-dcnode-id="646" instrument_node="">
</span></div><span data-dcnode-id="644" instrument_node="">
</span><span data-dcnode-id="643" instrument_node="">
</span><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="641" instrument_node="">Inevitably, this meant a new kind of landscape building up all around the major cities, and people, moving through it, operating it, living in it. To show you just a couple of these new industrial scenes, I have picked French </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/post-impressionism-everything-to-know/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="640" instrument_node="">post-Impressionist</span></a><span data-dcnode-id="638" instrument_node=""> George Seurat’s </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Bathers at Asnieres</span></em><span data-dcnode-id="635" instrument_node=""> (above) and </span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Afternoon. Porta Romana’s Workshops</span></em><span data-dcnode-id="632" instrument_node="">, by Italian </span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/manifesto-of-futurism/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="631" instrument_node="">Futurist </span></a><span data-dcnode-id="629" instrument_node="">Umberto Boccioni (below). They are both full of light, both airy and colorful. They suggest a manageable coexistence between humans and the human-made. It is monumental and still in Seurat’s painting, while dynamic and populated in Boccioni’s.</span></p><span data-dcnode-id="627" instrument_node="">
</span><span data-dcnode-id="626" instrument_node="">
</span><span data-dcnode-id="625" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="613"><span data-dcnode-id="624" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="615"><img alt="The Industrial Revolution and its Landscapes: Umberto Boccioni, Afternoon. Porta Romana's Workshops (Meriggio. Officine a Porta Romana), 1909-10, Gallerie d'Italia Collection." class="lazy-hidden wp-image-65863" data-dcnode-id="623" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/Umberto-Boccioni-Officine-a-Porta-Romana-1909-10.-Collezione-Intesa-Sanpaolo-1-1-1024x522.jpg" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="590"><noscript data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">&lt;img loading="lazy" class="wp-image-65863" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/Umberto-Boccioni-Officine-a-Porta-Romana-1909-10.-Collezione-Intesa-Sanpaolo-1-1-1024x522.jpg" alt="The Industrial Revolution and its Landscapes: Umberto Boccioni, Afternoon. Porta Romana's Workshops (Meriggio. Officine a Porta Romana), 1909-10, Gallerie d'Italia Collection." width="590" height="300" /&gt;</span></noscript><figcaption data-dcnode-id="616"><span data-dcnode-id="620" instrument_node="">Umberto Boccioni</span><em data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">, Afternoon. Porta Romana’s Workshops (Meriggio. Officine a Porta Romana), </span></em><span data-dcnode-id="617" instrument_node="">1909-10, Gallerie d’Italia Collection, Milan, Italy.</span></figcaption></figure><span data-dcnode-id="614" instrument_node="">
</span></div><span data-dcnode-id="612" instrument_node="">
</span><span data-dcnode-id="611" instrument_node="">
</span><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">These landscapes incorporate people, new buildings, and smoking chimneys as part of a new reality that the artists witnessed. Undoubtedly, the depiction of some boiling-hot, loud, busy factory’s interior would look less serene. Industrialization is there, more prominently in </span><em data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Afternoon. Porta Romana’s Workshops</span></em><span data-dcnode-id="606" instrument_node="">, but it does not look brutal, nor dull. By now it must be no secret to you that I have a predilection for the brighter side of this coin!</span></p><span data-dcnode-id="604" instrument_node="">
</span><span data-dcnode-id="603" instrument_node="">
</span><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Legacy</span></h2><span data-dcnode-id="599" instrument_node="">
</span><span data-dcnode-id="598" instrument_node="">
</span><span data-dcnode-id="597" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="588"><img alt="The Industrial Revolution and its Landscapes: Vincent Van Gogh, Factories at Asnieres Seen from the Quai de Clichy" class="lazy-hidden wp-image-67058" data-dcnode-id="596" data-lazy-type="image" data-src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/168-Factories-at-Asnieres-Seen-from-the-Quai-de-Clichy-1-1024x765.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailyartmagazine.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw"><noscript data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&lt;img class="wp-image-67058" src="https://www.dailyartmagazine.com/wp-content/uploads/2020/11/168-Factories-at-Asnieres-Seen-from-the-Quai-de-Clichy-1-1024x765.jpg" alt="The Industrial Revolution and its Landscapes: Vincent Van Gogh, Factories at Asnieres Seen from the Quai de Clichy" /&gt;</span></noscript><figcaption data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">Vincent Van Gogh, </span><em data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Factories at Asnieres Seen from the Quai de Clichy</span></em><span data-dcnode-id="590" instrument_node="">, 1887, Saint Louis Art Museum, St.Louis, Missouri, USA.</span></figcaption></figure><span data-dcnode-id="587" instrument_node="">
</span><span data-dcnode-id="586" instrument_node="">
</span><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">The Industrial Revolution left us a legacy made of steel, iron, and cement. Nowadays, countries that followed a different path are fighting for their right to catch up with the lifestyle of the Western world, despite the warnings around pollution and unsustainability. Meanwhile, the already industrialized nations are desperate to reverse the trend towards the eradication of a natural, green dimension.</span></p><span data-dcnode-id="582" instrument_node="">
</span><span data-dcnode-id="581" instrument_node="">
</span><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Indeed, what we inherited from the 19th and 20th centuries and from the Industrial Revolution can be considered controversial under many aspects. How inhumane it looked at times, even though perfectly engineered and executed. Posterity will perhaps be wise and prompt in identifying what is best to keep and what to discard of the reality that will be received from us, towards where to steer the next revolution and its landscapes!</span></p><span data-dcnode-id="577" instrument_node="">

</span><p class="small-p" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">During my University years, I drove my scooter to go to History of Art lessons and my route would take me by the Colosseum. I used to slow down when I approached the everlasting site. I must have been too slow for people's taste, as I was often called names by angry drivers. But I couldn't help it. I am a true sucker for beauty and aesthetics and I'll die one.</span></p><span data-dcnode-id="433" instrument_node="">
