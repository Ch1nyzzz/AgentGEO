</span><section data-dcnode-id="957" id="footnotes"><p data-dcnode-id="1892"><span class="footnote_head" data-dcnode-id="1893"><strong data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Notes</span></strong></span></p><div class="footnote-text" data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">I am indebted to the Center for Advanced Study in the Visual Arts (CASVA, Washington D.C.) and l’Institut national d’histoire de l’art (INHA, Paris) for their support of my research on the Eiffel Tower. And I want to thank Rob Linrothe, C.C. McKee, Aisha Motlani, and especially Marnin Young for their guidance and assistance. The essay’s shortcomings are however mine alone.</span></div><span data-dcnode-id="1889" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1864"><span data-dcnode-id="1888" instrument_node="">
</span><span class="superscript" data-dcnode-id="1885"><a data-dcnode-id="1886" href="#foot_src_1-11530" name="foot_1-11530"><span data-dcnode-id="1887" instrument_node="">1.</span></a></span><span data-dcnode-id="1884" instrument_node="">&nbsp;Writings on the Eiffel Tower are voluminous. See my compilation and annotation of the literature: “The Eiffel Tower,” in </span><em data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">Oxford Bibliographies in Architecture, Planning, and Preservation, </span></em><span data-dcnode-id="1881" instrument_node="">ed. Kevin Murphy (New York: Oxford University Press, forthcoming). The question of whether the Tower was meant to survive, unlike the vast majority of World’s Fair structures, is a complex one. The ownership of and right to exploit the Tower “maintained in good condition” passed from Eiffel to the City of Paris after twenty years (from the date 1 January 1890). Michel Lyonnet du Moutier, </span><em data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">L’Aventure de la Tour Eiffel. Realisation et financement </span></em><span data-dcnode-id="1878" instrument_node="">(Paris: Publications de la Sorbonne, 2009), 57. See Fonds Eiffel ARO 1981 1239, </span><em data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">Convention rélative à la Tour Eiffel</span></em><span data-dcnode-id="1875" instrument_node="">, 8 janvier 1887, article 11. The initiatives to get it torn down in the twentieth century, undermined each time by successful salvation campaigns, are covered in detail in Frédéric Seitz, </span><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">La Tour Eiffel: Cent ans de solicitude </span></em><span data-dcnode-id="1872" instrument_node="">(Paris: Belin-Herscher</span><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">, </span></em><span data-dcnode-id="1869" instrument_node="">2001).</span><span class="hide" data-dcnode-id="1865"><span class="superscript" data-dcnode-id="1866"><a data-dcnode-id="1867" href="#foot_src_1-11530"><span data-dcnode-id="1868" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1863" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1844"><span data-dcnode-id="1862" instrument_node="">
</span><span class="superscript" data-dcnode-id="1859"><a data-dcnode-id="1860" href="#foot_src_2-11530" name="foot_2-11530"><span data-dcnode-id="1861" instrument_node="">2.</span></a></span><span data-dcnode-id="1858" instrument_node="">&nbsp;Even the prior Colossus of Paris, Bartholdi’s </span><em data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Statue of Liberty</span></em><span data-dcnode-id="1855" instrument_node="">, during its late 1870s audition in the French capital, did not prepare Parisians for the Giant of 1889. See François Keriouégan, “Un colosse dans le ciel de Paris,”</span><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">Le Magasin du XIXe siècle</span></em><span data-dcnode-id="1852" instrument_node=""> 5 (2015): 293-297. Darcy Grimaldo Grigsby’s account emphasizes the Eiffel Tower’s engineering form as well as its enormous size and emptiness: “The job of the Eiffel Tower was to make visible the engineering needed to erect a structure more colossal in size than any in the world.” Grigsby, “Eiffel’s Emptiness: Volume/Mass,” </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Colossal: Engineering the Suez Canal, Statue of Liberty, Eiffel Tower, and Panama Canal – Transcontinental Ambition in France and the United States during the Long Nineteenth Century </span></em><span data-dcnode-id="1849" instrument_node="">(Pittsburgh: Periscope, 2012), 106.</span><span class="hide" data-dcnode-id="1845"><span class="superscript" data-dcnode-id="1846"><a data-dcnode-id="1847" href="#foot_src_2-11530"><span data-dcnode-id="1848" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1843" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1830"><span data-dcnode-id="1842" instrument_node="">
</span><span class="superscript" data-dcnode-id="1839"><a data-dcnode-id="1840" href="#foot_src_3-11530" name="foot_3-11530"><span data-dcnode-id="1841" instrument_node="">3.</span></a></span><span data-dcnode-id="1838" instrument_node="">&nbsp;On the Eiffel Tower’s fin-de-siècle twin, the Blackpool Tower, 1891–1894, see Paul Dobraszczyk</span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">, Iron, Ornament and Architecture in Victorian Britain: Myth and Modernity, Excess and Enchantment</span></em><span data-dcnode-id="1835" instrument_node=""> (Aldershot: Ashgate, 2014), 176-7.</span><span class="hide" data-dcnode-id="1831"><span class="superscript" data-dcnode-id="1832"><a data-dcnode-id="1833" href="#foot_src_3-11530"><span data-dcnode-id="1834" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1829" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1813"><span data-dcnode-id="1828" instrument_node="">
</span><span class="superscript" data-dcnode-id="1825"><a data-dcnode-id="1826" href="#foot_src_4-11530" name="foot_4-11530"><span data-dcnode-id="1827" instrument_node="">4.</span></a></span><span data-dcnode-id="1824" instrument_node="">&nbsp;Vanessa R. Schwartz, </span><em data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Modern France: A Very Short Introduction</span></em><span data-dcnode-id="1821" instrument_node=""> (Oxford: Oxford University Press, 2011), 64; Philip J. Ethington and Vanessa R. Schwartz, “Introduction: an atlas of the urban icons project,” </span><em data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Urban History</span></em><span data-dcnode-id="1818" instrument_node=""> 33, no. 1 (2006): 14 and 17.</span><span class="hide" data-dcnode-id="1814"><span class="superscript" data-dcnode-id="1815"><a data-dcnode-id="1816" href="#foot_src_4-11530"><span data-dcnode-id="1817" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1812" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1787"><span data-dcnode-id="1811" instrument_node="">
</span><span class="superscript" data-dcnode-id="1808"><a data-dcnode-id="1809" href="#foot_src_5-11530" name="foot_5-11530"><span data-dcnode-id="1810" instrument_node="">5.</span></a></span><span data-dcnode-id="1807" instrument_node="">&nbsp;Roland Barthes, </span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">La Tour Eiffel</span></em><span data-dcnode-id="1804" instrument_node=""> (Paris: Delpire, 1964). </span><em data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The Eiffel Tower and other mythologies</span></em><span data-dcnode-id="1801" instrument_node="">, trans. Richard Howard (New York: Hill and Wang, 1979), 5. “There is virtually no Parisian glance it fails to </span><em data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">touch</span></em><span data-dcnode-id="1798" instrument_node=""> at some time of day… The Tower is also present to the entire world,” 3. &nbsp;Patrice Higonnet called it “purposeful without purpose.” Patrice Higonnet, </span><em data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Paris: Capital of the World</span></em><span data-dcnode-id="1795" instrument_node=""> (Cambridge, MA: Harvard University Press, 2002), 359. Vanessa Schwartz avers that “the tower served little purpose other than to be seen and visited.” </span><em data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Modern France</span></em><span data-dcnode-id="1792" instrument_node="">, 101.</span><span class="hide" data-dcnode-id="1788"><span class="superscript" data-dcnode-id="1789"><a data-dcnode-id="1790" href="#foot_src_5-11530"><span data-dcnode-id="1791" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1786" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1773"><span data-dcnode-id="1785" instrument_node="">
</span><span class="superscript" data-dcnode-id="1782"><a data-dcnode-id="1783" href="#foot_src_6-11530" name="foot_6-11530"><span data-dcnode-id="1784" instrument_node="">6.</span></a></span><span data-dcnode-id="1781" instrument_node="">&nbsp;Joseph Harriss, </span><em data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">The Tallest Tower: Eiffel and the Belle Époque</span></em><span data-dcnode-id="1778" instrument_node=""> (Boston: Houghton Mifflin, 1975), 195. I discussed the 1937 transformation with Stéphane Dieu, Responsible du service de valorisation du fonds patrimonial et du service documentation, SETE (Société d’Exploitation de la Tour Eiffel), in his Paris office, 4 May 2018. He has no idea what became of those massive pieces of iron.</span><span class="hide" data-dcnode-id="1774"><span class="superscript" data-dcnode-id="1775"><a data-dcnode-id="1776" href="#foot_src_6-11530"><span data-dcnode-id="1777" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1772" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1759"><span data-dcnode-id="1771" instrument_node="">
</span><span class="superscript" data-dcnode-id="1768"><a data-dcnode-id="1769" href="#foot_src_7-11530" name="foot_7-11530"><span data-dcnode-id="1770" instrument_node="">7.</span></a></span><span data-dcnode-id="1767" instrument_node="">&nbsp;André Granet, the designer of the Tower’s dazzling 1937 lighting, justified the modification by characterizing the outmodedness of the Tower’s decoration somewhat snidely: “Indiscutable dans sa forme purement rationnelle, elle avait été surchargé à sa naissance de décors qui marquaient un peu trop leur époque et qui avaient été une concession aux clameurs de moment.” (“Of an indisputably purely rational form, it was encumbered at its birth with decoration that marked its epoch a bit excessively, and which was a concession to the complaints of the moment.”) André Granet, </span><em data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Décors Éphémères: Les Expositions, Jeux d’Eau et de Lumière</span></em><span data-dcnode-id="1764" instrument_node=""> (Paris: E. Desfossés, 1948), 21.</span><span class="hide" data-dcnode-id="1760"><span class="superscript" data-dcnode-id="1761"><a data-dcnode-id="1762" href="#foot_src_7-11530"><span data-dcnode-id="1763" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1758" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1742"><span data-dcnode-id="1757" instrument_node="">
</span><span class="superscript" data-dcnode-id="1754"><a data-dcnode-id="1755" href="#foot_src_8-11530" name="foot_8-11530"><span data-dcnode-id="1756" instrument_node="">8.</span></a></span><span data-dcnode-id="1753" instrument_node="">&nbsp;As the word “monument” shows up again and again in this text, it is time to ask: is monument the right term for the Eiffel Tower? The Tower’s jarring visibility may disqualify it as a monument. It should be vetted for suitability through the lenses of Alois Riegl and Robert Musil. Alois Riegl, “The Modern Cult of Monuments: Its Character and Its Origin,” trans. Kurt W. Forster and Diane Ghirardo, </span><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Oppositions</span></em><span data-dcnode-id="1750" instrument_node=""> (Fall 1982): 25, 21-51; and Robert Musil, “Monuments,” in </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Selected Writings</span></em><span data-dcnode-id="1747" instrument_node="">, ed. and trans. Burton Pike (New York: Continuum, 1986), 320-323.</span><span class="hide" data-dcnode-id="1743"><span class="superscript" data-dcnode-id="1744"><a data-dcnode-id="1745" href="#foot_src_8-11530"><span data-dcnode-id="1746" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1741" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1722"><span data-dcnode-id="1740" instrument_node="">
</span><span class="superscript" data-dcnode-id="1737"><a data-dcnode-id="1738" href="#foot_src_9-11530" name="foot_9-11530"><span data-dcnode-id="1739" instrument_node="">9.</span></a></span><span data-dcnode-id="1736" instrument_node="">&nbsp;Harriss, </span><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Tallest Tower</span></em><span data-dcnode-id="1733" instrument_node="">, 215. Alexander Geppert notes that between 1901 and 1914, the Tower’s attendance figures fell to a historical low. Things changed not long before Malraux’s gesture. “The Tower’s popularity increased with the expositions of 1925, 1931 and 1937, but it was not until the end of the Second World War that a process of codification set in, eventually transforming it into the very symbol of modernity.” Alexander Geppert, </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Fleeting Cities: Imperial Expositions in Fin-de-Siècle Europe</span></em><span data-dcnode-id="1730" instrument_node=""> (New York: Palgrave Macmillan</span><em data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">, </span></em><span data-dcnode-id="1727" instrument_node="">2010), 227.</span><span class="hide" data-dcnode-id="1723"><span class="superscript" data-dcnode-id="1724"><a data-dcnode-id="1725" href="#foot_src_9-11530"><span data-dcnode-id="1726" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1721" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1708"><span data-dcnode-id="1720" instrument_node="">
</span><span class="superscript" data-dcnode-id="1717"><a data-dcnode-id="1718" href="#foot_src_10-11530" name="foot_10-11530"><span data-dcnode-id="1719" instrument_node="">10.</span></a></span><span data-dcnode-id="1716" instrument_node="">&nbsp;“Nothing can compare to the loneliness of the soul in adolescence. I remember my first visit to Paris in 1964; I was eighteen. … I was lonely even among those who befriended me. Remembering those weeks now, I realize that I never went upwards—the Eiffel Tower seemed an absurd, and absurdly popular, structure—but I did go down.” Julian Barnes, </span><em data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Levels of Life</span></em><span data-dcnode-id="1713" instrument_node=""> (New York: Alfred A. Knopf, 2013), 121-2.</span><span class="hide" data-dcnode-id="1709"><span class="superscript" data-dcnode-id="1710"><a data-dcnode-id="1711" href="#foot_src_10-11530"><span data-dcnode-id="1712" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1707" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1694"><span data-dcnode-id="1706" instrument_node="">
</span><span class="superscript" data-dcnode-id="1703"><a data-dcnode-id="1704" href="#foot_src_11-11530" name="foot_11-11530"><span data-dcnode-id="1705" instrument_node="">11.</span></a></span><span data-dcnode-id="1702" instrument_node="">&nbsp;Period debates about iron ornament are carefully handled in Dobraszczyk, “Introduction: Ornament Unbound,” in </span><em data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Iron Ornament and Architecture</span></em><span data-dcnode-id="1699" instrument_node="">, 1-27.</span><span class="hide" data-dcnode-id="1695"><span class="superscript" data-dcnode-id="1696"><a data-dcnode-id="1697" href="#foot_src_11-11530"><span data-dcnode-id="1698" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1693" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1674"><span data-dcnode-id="1692" instrument_node="">
</span><span class="superscript" data-dcnode-id="1689"><a data-dcnode-id="1690" href="#foot_src_12-11530" name="foot_12-11530"><span data-dcnode-id="1691" instrument_node="">12.</span></a></span><span data-dcnode-id="1688" instrument_node="">&nbsp;Henri Loyrette stated that Napoléon III banished industry from the capital in 1859 when he divided the city into twenty arrondissements and “relegated factories to the suburbs.” Henri Loyrette, “The Eiffel Tower,” </span><em data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Realms of Memory</span></em><span data-dcnode-id="1685" instrument_node="">, vol. 3: </span><em data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Symbols</span></em><span data-dcnode-id="1682" instrument_node="">, ed. Pierre Nora and Laurence D. Kritzman (New York: Columbia University Press, 1998), 356. Grigsby cites Loyrette when she states: “… industry was banished to the outskirts of Paris in 1860.” Grigsby, </span><em data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Colossal</span></em><span data-dcnode-id="1679" instrument_node="">, 106. Robert Tombs helpfully modifies this assertion by noting it was the tax on coal that was increased at this moment, and that made industry inside the city more expensive. Hence the move of much heavy industry outside the city. Robert Tombs, email message, 30 November 2018.</span><span class="hide" data-dcnode-id="1675"><span class="superscript" data-dcnode-id="1676"><a data-dcnode-id="1677" href="#foot_src_12-11530"><span data-dcnode-id="1678" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1673" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1648"><span data-dcnode-id="1672" instrument_node="">
</span><span class="superscript" data-dcnode-id="1669"><a data-dcnode-id="1670" href="#foot_src_13-11530" name="foot_13-11530"><span data-dcnode-id="1671" instrument_node="">13.</span></a></span><span data-dcnode-id="1668" instrument_node="">&nbsp;Certain practitioners of the social history of art in the 1970s and 1980s became preoccupied by the effects of the erasure of industry in the northwest suburbs by Impressionist landscapists, especially Monet. See, for example, Paul Hayes Tucker, </span><em data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Monet at Argenteuil </span></em><span data-dcnode-id="1665" instrument_node="">(New Haven: Yale University Press, 1982); and T. J. Clark, “The Environs of Paris,” </span><em data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">The Painting of Modern Life: Paris in the Art of Manet and His Followers</span></em><span data-dcnode-id="1662" instrument_node=""> (New York: Alfred A. Knopf, 1984). I am stressing the other side, as it were: the spectacle of the encroachment and pollution of industry and its factories surrounding Paris, especially northwest of the Tower across the Seine, as the screen (both literal and imagined) through and upon which the new 300-meter Tower was seen and evaluated. See Véronique Alemany et al., </span><em data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Peindre la banlieue: De Corot à Vlaminck, 1850–1950</span></em><span data-dcnode-id="1659" instrument_node=""> (Colombelle: Éditions du Valhermeil, 2016); and Geneviève Massard-Guilbaud, </span><em data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Histoire de la pollution industrielle. France, 1789–1914</span></em><span data-dcnode-id="1656" instrument_node=""> (Paris: Éditions de l’École des hautes études en sciences sociales, 2010). This statement, for example, suggests a rising tide of worry about visual pollution: “À partir du dernier tiers du XIXe siècle, des peintres présentent un visage négatif, jusqu’à être lugubre, de la banlieue périphérique de Paris: une mise en garde contre les méfaits de l’industrialisation croissante sur la pollution visuelle du paysage naturel et contre la déshumanisation des conditions de vie.” (Alemany, 92) Vanguard painters’ inclusion of factory chimneys outside the city limits is discussed in James H. Rubin, </span><em data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Impressionism and the Modern Landscape: Productivity, Technology, and Urbanization from Manet to Van Gogh</span></em><span data-dcnode-id="1653" instrument_node=""> (Berkeley: University of California Press, 2008), 132-147.</span><span class="hide" data-dcnode-id="1649"><span class="superscript" data-dcnode-id="1650"><a data-dcnode-id="1651" href="#foot_src_13-11530"><span data-dcnode-id="1652" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1647" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1631"><span data-dcnode-id="1646" instrument_node="">
</span><span class="superscript" data-dcnode-id="1643"><a data-dcnode-id="1644" href="#foot_src_14-11530" name="foot_14-11530"><span data-dcnode-id="1645" instrument_node="">14.</span></a></span><span data-dcnode-id="1642" instrument_node="">&nbsp;“un tuyau d’usine en construction.” J.-K. Huysmans, “Le Fer,” in </span><em data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Certains</span></em><span data-dcnode-id="1639" instrument_node=""> (Paris: Tresse et Stock, 1889), 174. This is attributed to Jules Simon by Grigsby, 106, but without a source. It is thus unclear whether this is Jules Simon, influential member of the French Senate, or the author of a guide to the Eiffel Tower, </span><em data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Guide illustré de la Tour Eiffel</span></em><span data-dcnode-id="1636" instrument_node="">, 1893, also quoted by Grigsby, 17.</span><span class="hide" data-dcnode-id="1632"><span class="superscript" data-dcnode-id="1633"><a data-dcnode-id="1634" href="#foot_src_14-11530"><span data-dcnode-id="1635" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1630" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1608"><span data-dcnode-id="1629" instrument_node="">
</span><span class="superscript" data-dcnode-id="1626"><a data-dcnode-id="1627" href="#foot_src_15-11530" name="foot_15-11530"><span data-dcnode-id="1628" instrument_node="">15.</span></a></span><span data-dcnode-id="1625" instrument_node="">&nbsp;Answers to the question “why a tower?” will not be reviewed here, except to note that many period voices interpreted it as an explicit and over-sized expression of national resurgence and well-being eighteen years after the French defeat by the Prussians. See Louis Devance, </span><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Gustave Eiffel: La construction d’une carrière d’ingénieur</span></em><span data-dcnode-id="1622" instrument_node=""> (Dijon: Editions Universitaires de Dijon, collection Histoires, 2016), 173-191; and Daniel Le Comte, </span><em data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">La Tour de Gustave Eiffel</span></em><span data-dcnode-id="1619" instrument_node=""> (Paris: Éditions du Sénevé, 1969), 4 ff.&nbsp;Eiffel signed the contract on 8 January 1887. Other entries were formidable. Jules Bourdais’s design for a giant classicizing stone light tower (Bourdais had designed the </span><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">clou</span></em><span data-dcnode-id="1616" instrument_node=""> of the 1878 fair, Le Palais de Trocadéro, with Gabriel Davioud) was the other most highly-regarded (and vigorously supported) entry. A 984-foot guillotine to commemorate the opening of the Estates General (5 May 1789) was also arresting. Another good overview of the competition is Barry Bergdoll, “Introduction,” in </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">The Eiffel Tower: Photographs by Lucien Hervé</span></em><span data-dcnode-id="1613" instrument_node=""> (New York: Princeton Architectural Press, 2003), 7-16.</span><span class="hide" data-dcnode-id="1609"><span class="superscript" data-dcnode-id="1610"><a data-dcnode-id="1611" href="#foot_src_15-11530"><span data-dcnode-id="1612" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1607" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1594"><span data-dcnode-id="1606" instrument_node="">
</span><span class="superscript" data-dcnode-id="1603"><a data-dcnode-id="1604" href="#foot_src_16-11530" name="foot_16-11530"><span data-dcnode-id="1605" instrument_node="">16.</span></a></span><span data-dcnode-id="1602" instrument_node="">&nbsp;Kirk Savage is the indispensable source on the American “mechanic monster,” as its detractors called it. He argues that “the Washington Monument was a critical—and mostly unacknowledged—step in the development of a modern spatial sensibility.” Kirk Savage, </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Monument Wars: Washington, D.C., the National Mall, and the Transformation of the Memorial Landscape</span></em><span data-dcnode-id="1599" instrument_node=""> (Berkeley: University of California Press, 2009), 133. The Eiffel Tower remained the world’s tallest construction until the United States regained the title with the slightly taller Chrysler Building in New York City in 1930, displaced in turn by the Empire State Building the next year.</span><span class="hide" data-dcnode-id="1595"><span class="superscript" data-dcnode-id="1596"><a data-dcnode-id="1597" href="#foot_src_16-11530"><span data-dcnode-id="1598" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1593" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1580"><span data-dcnode-id="1592" instrument_node="">
</span><span class="superscript" data-dcnode-id="1589"><a data-dcnode-id="1590" href="#foot_src_17-11530" name="foot_17-11530"><span data-dcnode-id="1591" instrument_node="">17.</span></a></span><span data-dcnode-id="1588" instrument_node="">&nbsp;Le Comte, </span><em data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Tour de Gustave Eiffel</span></em><span data-dcnode-id="1585" instrument_node="">, 16. And only 250 workers were involved.</span><span class="hide" data-dcnode-id="1581"><span class="superscript" data-dcnode-id="1582"><a data-dcnode-id="1583" href="#foot_src_17-11530"><span data-dcnode-id="1584" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1579" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1563"><span data-dcnode-id="1578" instrument_node="">
</span><span class="superscript" data-dcnode-id="1575"><a data-dcnode-id="1576" href="#foot_src_18-11530" name="foot_18-11530"><span data-dcnode-id="1577" instrument_node="">18.</span></a></span><span data-dcnode-id="1574" instrument_node="">&nbsp;“Painting the Eiffel Tower,” Card 12 of the English version of the toureiffel.com website brochure, </span><em data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">All you need to know about the Eiffel Tower,</span></em><span data-dcnode-id="1571" instrument_node=""> highlights the importance of the 1899 repainting, </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toureiffel.paris/en/the-monument/painting-eiffel-tower" rel="nofollow" target="_blank"><span data-dcnode-id="1570" instrument_node="">https://www.toureiffel.paris/en/the-monument/painting-eiffel-tower</span></a><span data-dcnode-id="1568" instrument_node="">. For the record, the first coat of paint in 1889 was red iron ocher. The second and third coats were linseed oil. Painting was completed in March 1889.</span><span class="hide" data-dcnode-id="1564"><span class="superscript" data-dcnode-id="1565"><a data-dcnode-id="1566" href="#foot_src_18-11530"><span data-dcnode-id="1567" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1562" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1549"><span data-dcnode-id="1561" instrument_node="">
</span><span class="superscript" data-dcnode-id="1558"><a data-dcnode-id="1559" href="#foot_src_19-11530" name="foot_19-11530"><span data-dcnode-id="1560" instrument_node="">19.</span></a></span><span data-dcnode-id="1557" instrument_node="">&nbsp;Henri Loyrette, </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Eiffel – Un ingénieur et son oeuvre</span></em><span data-dcnode-id="1554" instrument_node=""> (Fribourg: Office du Livre, 1985), 351.</span><span class="hide" data-dcnode-id="1550"><span class="superscript" data-dcnode-id="1551"><a data-dcnode-id="1552" href="#foot_src_19-11530"><span data-dcnode-id="1553" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1548" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1520"><span data-dcnode-id="1547" instrument_node="">
</span><span class="superscript" data-dcnode-id="1544"><a data-dcnode-id="1545" href="#foot_src_20-11530" name="foot_20-11530"><span data-dcnode-id="1546" instrument_node="">20.</span></a></span><span data-dcnode-id="1543" instrument_node="">&nbsp;“Origins and Constructions of the Eiffel Tower,” </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.toureiffel.paris/en/the-monument/history" rel="nofollow" target="_blank"><span data-dcnode-id="1542" instrument_node="">www.toureiffel.paris/en/the-monument/history</span></a><span data-dcnode-id="1540" instrument_node="">. And Lyonnet du Moutier, </span><em data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">L’Aventure de la Tour Eiffel</span></em><span data-dcnode-id="1537" instrument_node="">, 31. See Michelle Foa’s helpful discussion of the analogy between the Tower and a Lighthouse in the context of her discussion of Seurat’s </span><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Eiffel Tower</span></em><span data-dcnode-id="1534" instrument_node="">, discussed below. I have planned a separate study of the </span><em data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">éclairage</span></em><span data-dcnode-id="1531" instrument_node=""> of the Tower (in 1889 and 1900), and in it I will be returning to the parallels discussed by Foa and by Patricia Mainardi. Michelle Foa, </span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Georges Seurat: The Art of Vision</span></em><span data-dcnode-id="1528" instrument_node=""> (New Haven: Yale University Press, 2015), 197-203; Patricia Mainardi, “The Eiffel Tower and the English Lighthouse,” </span><em data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Arts Magazine</span></em><span data-dcnode-id="1525" instrument_node=""> 54, no. 7 (March 1980): 141-144.</span><span class="hide" data-dcnode-id="1521"><span class="superscript" data-dcnode-id="1522"><a data-dcnode-id="1523" href="#foot_src_20-11530"><span data-dcnode-id="1524" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1519" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1506"><span data-dcnode-id="1518" instrument_node="">
</span><span class="superscript" data-dcnode-id="1515"><a data-dcnode-id="1516" href="#foot_src_21-11530" name="foot_21-11530"><span data-dcnode-id="1517" instrument_node="">21.</span></a></span><span data-dcnode-id="1514" instrument_node="">&nbsp;“…les lignes constructives sont agrémentées de quelques décors caractéristiques de la fin du XIXe siècle.” Seitz, </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">La Tour Eiffel</span></em><span data-dcnode-id="1511" instrument_node="">, 47.</span><span class="hide" data-dcnode-id="1507"><span class="superscript" data-dcnode-id="1508"><a data-dcnode-id="1509" href="#foot_src_21-11530"><span data-dcnode-id="1510" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1505" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1483"><span data-dcnode-id="1504" instrument_node="">
</span><span class="superscript" data-dcnode-id="1501"><a data-dcnode-id="1502" href="#foot_src_22-11530" name="foot_22-11530"><span data-dcnode-id="1503" instrument_node="">22.</span></a></span><span data-dcnode-id="1500" instrument_node="">&nbsp;Sauvestre’s singular talent with iron ornament was showcased later in his unrealized plan for a modified Tower for the 1900 </span><em data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Exposition Universelle</span></em><span data-dcnode-id="1497" instrument_node="">. See the proliferation of ornament as well as the flanking demi-towers in his 1896 watercolor drawing, </span><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Projet de transformation de la Tour Eiffel pour l’Exposition universelle de 1900</span></em><span data-dcnode-id="1494" instrument_node="">, 102 x 75 cm. Paris, SETE. Reproduced in Caroline Mathieu, ed., </span><em data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Gustave Eiffel: Le Magicien du Fer</span></em><span data-dcnode-id="1491" instrument_node=""> (Paris: Éditions Skira Flammarion, 2009), 177. Stephen Sauvestre was an 1868 graduate of l’École Centrale d’Architecture (later called l’École Spéciale d’Architecture), created in 1865 through the influence of important figures like Henri Labrouste and Eugène Viollet-le-Duc. He became well known for the design of villas and private homes (“hôtels particuliers”), such as the Hôtel Beranger, 1884, Tours. Frédéric Seitz, </span><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Une Entreprise d’Idée: L’École Spéciale d’Architecture, 1865–1930</span></em><span data-dcnode-id="1488" instrument_node=""> (Paris: Editions Picard, 1995), introduction and 166.</span><span class="hide" data-dcnode-id="1484"><span class="superscript" data-dcnode-id="1485"><a data-dcnode-id="1486" href="#foot_src_22-11530"><span data-dcnode-id="1487" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1482" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1469"><span data-dcnode-id="1481" instrument_node="">
</span><span class="superscript" data-dcnode-id="1478"><a data-dcnode-id="1479" href="#foot_src_23-11530" name="foot_23-11530"><span data-dcnode-id="1480" instrument_node="">23.</span></a></span><span data-dcnode-id="1477" instrument_node="">&nbsp;“[i]l est vrai que la première épure n’est pas très attractive.” Lyonnet du Moutier, </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">L’Aventure de la Tour Eiffel</span></em><span data-dcnode-id="1474" instrument_node="">, 31.</span><span class="hide" data-dcnode-id="1470"><span class="superscript" data-dcnode-id="1471"><a data-dcnode-id="1472" href="#foot_src_23-11530"><span data-dcnode-id="1473" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1468" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1455"><span data-dcnode-id="1467" instrument_node="">
</span><span class="superscript" data-dcnode-id="1464"><a data-dcnode-id="1465" href="#foot_src_24-11530" name="foot_24-11530"><span data-dcnode-id="1466" instrument_node="">24.</span></a></span><span data-dcnode-id="1463" instrument_node="">&nbsp;“Au-dessus, tout autour, la galerie ou promenoir se présente extérieurement comme une succession de loggias à arcades gracieuses. Les tympans de ces arcades sont en treillis dorés disposes en éventail, dont les lignes partent d’une légere colonnette. Les entre-deux verticaux qui séparent les loggias sont à jour, avec des cabochons en cristal de cornaline. Derrière ces cabochons un bec de gaz. Si bien que ce sont autant de colonnes étincelantes les jours d’illumination. Comme ces jours-là les lignes de feu suivent les grandes lignes du monument, on se rend compte de la valeur artistique de cette conception cyclopéenne.” </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Guide Officiel de la Tour Eiffel</span></em><span data-dcnode-id="1460" instrument_node=""> (Paris: Imprimerie Chaix, 1897), 15.</span><span class="hide" data-dcnode-id="1456"><span class="superscript" data-dcnode-id="1457"><a data-dcnode-id="1458" href="#foot_src_24-11530"><span data-dcnode-id="1459" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1454" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1441"><span data-dcnode-id="1453" instrument_node="">
</span><span class="superscript" data-dcnode-id="1450"><a data-dcnode-id="1451" href="#foot_src_25-11530" name="foot_25-11530"><span data-dcnode-id="1452" instrument_node="">25.</span></a></span><span data-dcnode-id="1449" instrument_node="">&nbsp;“[I]l faudra lui adjoindre une ornamentation pour lui faire accepter. Grace à cette ornamentation, Eiffel élimine ses concurrents.” Le Comte, </span><em data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Tour de Gustave Eiffel</span></em><span data-dcnode-id="1446" instrument_node="">, 8.</span><span class="hide" data-dcnode-id="1442"><span class="superscript" data-dcnode-id="1443"><a data-dcnode-id="1444" href="#foot_src_25-11530"><span data-dcnode-id="1445" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1440" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1427"><span data-dcnode-id="1439" instrument_node="">
</span><span class="superscript" data-dcnode-id="1436"><a data-dcnode-id="1437" href="#foot_src_26-11530" name="foot_26-11530"><span data-dcnode-id="1438" instrument_node="">26.</span></a></span><span data-dcnode-id="1435" instrument_node="">&nbsp;“Des arcs de 74 m. de diamètre se développent entre les montants à l’étage inférieur mais leur role est purement decoratif.” Gustave Eiffel, </span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">La Tour Eiffel/The Eiffel Tower: extraits de la tour en 1900</span></em><span data-dcnode-id="1432" instrument_node=""> (Paris: editions Masson, 1902), 22.</span><span class="hide" data-dcnode-id="1428"><span class="superscript" data-dcnode-id="1429"><a data-dcnode-id="1430" href="#foot_src_26-11530"><span data-dcnode-id="1431" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1426" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1416"><span data-dcnode-id="1425" instrument_node="">
</span><span class="superscript" data-dcnode-id="1422"><a data-dcnode-id="1423" href="#foot_src_27-11530" name="foot_27-11530"><span data-dcnode-id="1424" instrument_node="">27.</span></a></span><span data-dcnode-id="1421" instrument_node="">&nbsp;Author’s notes, T. J. Clark, Art 54, UCLA, 24 April 1975.</span><span class="hide" data-dcnode-id="1417"><span class="superscript" data-dcnode-id="1418"><a data-dcnode-id="1419" href="#foot_src_27-11530"><span data-dcnode-id="1420" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1415" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1402"><span data-dcnode-id="1414" instrument_node="">
</span><span class="superscript" data-dcnode-id="1411"><a data-dcnode-id="1412" href="#foot_src_28-11530" name="foot_28-11530"><span data-dcnode-id="1413" instrument_node="">28.</span></a></span><span data-dcnode-id="1410" instrument_node="">&nbsp;See the discussion of the Tower’s reputational downs and ups in William Thompson, “‘The Symbol of Paris’: Writing the Eiffel Tower,” </span><em data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The French Review</span></em><span data-dcnode-id="1407" instrument_node=""> 73, no. 6 (May 2000): 1130-40.</span><span class="hide" data-dcnode-id="1403"><span class="superscript" data-dcnode-id="1404"><a data-dcnode-id="1405" href="#foot_src_28-11530"><span data-dcnode-id="1406" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1401" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1385"><span data-dcnode-id="1400" instrument_node="">
</span><span class="superscript" data-dcnode-id="1397"><a data-dcnode-id="1398" href="#foot_src_29-11530" name="foot_29-11530"><span data-dcnode-id="1399" instrument_node="">29.</span></a></span><span data-dcnode-id="1396" instrument_node="">&nbsp;“Les artistes contre La Tour Eiffel,” lettre ouverte addressee à M. Alphand, commissaire de l’Exposition, </span><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Le Temps</span></em><span data-dcnode-id="1393" instrument_node="">, 14 février 1887, quoted in English in Joëlle Bolloch, </span><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">The Eiffel Tower</span></em><span data-dcnode-id="1390" instrument_node=""> (Paris: Musée d’Orsay and Milan: Five Continents, 2005), 13.</span><span class="hide" data-dcnode-id="1386"><span class="superscript" data-dcnode-id="1387"><a data-dcnode-id="1388" href="#foot_src_29-11530"><span data-dcnode-id="1389" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1384" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1371"><span data-dcnode-id="1383" instrument_node="">
</span><span class="superscript" data-dcnode-id="1380"><a data-dcnode-id="1381" href="#foot_src_30-11530" name="foot_30-11530"><span data-dcnode-id="1382" instrument_node="">30.</span></a></span><span data-dcnode-id="1379" instrument_node="">&nbsp;“Car la tour Eiffel, dont la commerciale Amérique elle-même ne voudrait pas, c’est, n’en doutez point, le déshonneur de Paris,” “Les artistes contre La Tour Eiffel,” quoted in Collectif, </span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">La Tour Eiffel vue par les écrivains</span></em><span data-dcnode-id="1376" instrument_node=""> (Paris: Nouvelles éditions Scala, 2016), 7.</span><span class="hide" data-dcnode-id="1372"><span class="superscript" data-dcnode-id="1373"><a data-dcnode-id="1374" href="#foot_src_30-11530"><span data-dcnode-id="1375" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1370" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1358"><span data-dcnode-id="1369" instrument_node="">
</span><span class="superscript" data-dcnode-id="1366"><a data-dcnode-id="1367" href="#foot_src_31-11530" name="foot_31-11530"><span data-dcnode-id="1368" instrument_node="">31.</span></a></span><span data-dcnode-id="1365" instrument_node="">&nbsp;“Gigantesque et noire cheminée d’usine.” </span><em data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">ibid.</span></em><span class="hide" data-dcnode-id="1359"><span class="superscript" data-dcnode-id="1360"><a data-dcnode-id="1361" href="#foot_src_31-11530"><span data-dcnode-id="1362" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1357" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1344"><span data-dcnode-id="1356" instrument_node="">
</span><span class="superscript" data-dcnode-id="1353"><a data-dcnode-id="1354" href="#foot_src_32-11530" name="foot_32-11530"><span data-dcnode-id="1355" instrument_node="">32.</span></a></span><span data-dcnode-id="1352" instrument_node="">&nbsp;Deborah Silverman put it best: “This spectacular iron tower, constructed on the very principle of the interpenetration of inner and outer space, effected a dazzling spatial dematerialization.” Deborah Silverman, “The 1889 Exhibition: The Crisis of Bourgeois Individualism,” </span><em data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Opposition</span></em><span data-dcnode-id="1349" instrument_node="">s 8 (Spring 1977): 88.</span><span class="hide" data-dcnode-id="1345"><span class="superscript" data-dcnode-id="1346"><a data-dcnode-id="1347" href="#foot_src_32-11530"><span data-dcnode-id="1348" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1343" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1330"><span data-dcnode-id="1342" instrument_node="">
</span><span class="superscript" data-dcnode-id="1339"><a data-dcnode-id="1340" href="#foot_src_33-11530" name="foot_33-11530"><span data-dcnode-id="1341" instrument_node="">33.</span></a></span><span data-dcnode-id="1338" instrument_node="">&nbsp;Guy de Maupassant as quoted in Barthes</span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">, Eiffel Tower, </span></em><span data-dcnode-id="1335" instrument_node="">3.</span><span class="hide" data-dcnode-id="1331"><span class="superscript" data-dcnode-id="1332"><a data-dcnode-id="1333" href="#foot_src_33-11530"><span data-dcnode-id="1334" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1329" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1305"><span data-dcnode-id="1328" instrument_node="">
</span><span class="superscript" data-dcnode-id="1325"><a data-dcnode-id="1326" href="#foot_src_34-11530" name="foot_34-11530"><span data-dcnode-id="1327" instrument_node="">34.</span></a></span><span data-dcnode-id="1324" instrument_node="">&nbsp;“J’ai quitté Paris et même la France, parce que la tour Eiffel finissait par m’ennuyer trop. Non seulement on la voyait de partout, mais on la trouvait partout, faite de toutes les matières connues, exposée à toutes les vitres, cauchemar inévitable et torturant.” Maupassant, “Lassitude” (1890) in </span><em data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">La Vie errante</span></em><span data-dcnode-id="1321" instrument_node="">, 1903, quoted in Collectif, </span><em data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">La Tour Eiffel vue par les écrivains</span></em><span data-dcnode-id="1318" instrument_node="">, 27. As an early comment on the burgeoning business in Tower souvenirs, it cannot be improved upon. Eiffel, by the way, thanks to a court case, maintained a monopoly on Tower souvenir production, sales and profits. On souvenirs and postcards, see Caroline Mathieu et PhilippeThiébault</span><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">, </span></strong><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">La Tour Eiffel. Curiosités et autres babioles autour de 1900</span></em><span data-dcnode-id="1313" instrument_node="">exh. cat. (Paris: Musée d’Orsay; Skira Flammarion, 2009); and Naomi Schor, “‘Cartes Postales’: Representing Paris 1900,” </span><em data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Critical Inquiry</span></em><span data-dcnode-id="1310" instrument_node=""> 18, no. 2 (Winter 1992): 188-244.</span><span class="hide" data-dcnode-id="1306"><span class="superscript" data-dcnode-id="1307"><a data-dcnode-id="1308" href="#foot_src_34-11530"><span data-dcnode-id="1309" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1304" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1291"><span data-dcnode-id="1303" instrument_node="">
</span><span class="superscript" data-dcnode-id="1300"><a data-dcnode-id="1301" href="#foot_src_35-11530" name="foot_35-11530"><span data-dcnode-id="1302" instrument_node="">35.</span></a></span><span data-dcnode-id="1299" instrument_node="">&nbsp;“tous nos monuments humiliés, toutes nos architectures rapetissées, qui disparaîtront dans ce rêve stupéfiant.” Quoted in Collectif, </span><em data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">La Tour Eiffel vue par les écrivains</span></em><span data-dcnode-id="1296" instrument_node="">, 7.</span><span class="hide" data-dcnode-id="1292"><span class="superscript" data-dcnode-id="1293"><a data-dcnode-id="1294" href="#foot_src_35-11530"><span data-dcnode-id="1295" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1290" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1274"><span data-dcnode-id="1289" instrument_node="">
</span><span class="superscript" data-dcnode-id="1286"><a data-dcnode-id="1287" href="#foot_src_36-11530" name="foot_36-11530"><span data-dcnode-id="1288" instrument_node="">36.</span></a></span><span data-dcnode-id="1285" instrument_node="">&nbsp;“Nos renseignments personnels nous permettent d’affirmer qu’il y aura une Exposition universelle, vers le milieu de l’année 1889. Mais on ne la verra pas, à cause de la Tour Eiffel…” Erik Satie, “Pronostics pour l’année 1889,” </span><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">La Lanterne japonaise</span></em><span data-dcnode-id="1282" instrument_node="">, 22 décembre 1888, quoted in </span><em data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">La Tour Eiffel vue par les écrivains</span></em><span data-dcnode-id="1279" instrument_node="">, 12.</span><span class="hide" data-dcnode-id="1275"><span class="superscript" data-dcnode-id="1276"><a data-dcnode-id="1277" href="#foot_src_36-11530"><span data-dcnode-id="1278" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1273" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1257"><span data-dcnode-id="1272" instrument_node="">
</span><span class="superscript" data-dcnode-id="1269"><a data-dcnode-id="1270" href="#foot_src_37-11530" name="foot_37-11530"><span data-dcnode-id="1271" instrument_node="">37.</span></a></span><span data-dcnode-id="1268" instrument_node="">&nbsp;“on ne peut rêver quelque chose de plus laid pour l’oeil d’un vieux civilisé.” Edmond de Goncourt, </span><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Journal: memoires de la vie litteraire</span></em><span data-dcnode-id="1265" instrument_node="">. Tome 3: </span><em data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">1879–1990</span></em><span data-dcnode-id="1262" instrument_node="">, (Paris: Fasquelle et Flammarion, 1956), 935.</span><span class="hide" data-dcnode-id="1258"><span class="superscript" data-dcnode-id="1259"><a data-dcnode-id="1260" href="#foot_src_37-11530"><span data-dcnode-id="1261" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1256" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1244"><span data-dcnode-id="1255" instrument_node="">
</span><span class="superscript" data-dcnode-id="1252"><a data-dcnode-id="1253" href="#foot_src_38-11530" name="foot_38-11530"><span data-dcnode-id="1254" instrument_node="">38.</span></a></span><span data-dcnode-id="1251" instrument_node="">&nbsp;“sa tour ressemble à un tuyau d’usine en construction.” Huysmans, “Le Fer,” 174. </span><em data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">&nbsp;</span></em><span class="hide" data-dcnode-id="1245"><span class="superscript" data-dcnode-id="1246"><a data-dcnode-id="1247" href="#foot_src_38-11530"><span data-dcnode-id="1248" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1243" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1230"><span data-dcnode-id="1242" instrument_node="">
</span><span class="superscript" data-dcnode-id="1239"><a data-dcnode-id="1240" href="#foot_src_39-11530" name="foot_39-11530"><span data-dcnode-id="1241" instrument_node="">39.</span></a></span><span data-dcnode-id="1238" instrument_node="">&nbsp;Louis Gonse, “Exposition Universelle de 1889&nbsp;: Coup d’œil avant l’ouverture,”</span><em data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Gazette des Beaux-Arts</span></em><span data-dcnode-id="1235" instrument_node="">1, 3rd period, no. 5 (1 May 1889): 356.</span><span class="hide" data-dcnode-id="1231"><span class="superscript" data-dcnode-id="1232"><a data-dcnode-id="1233" href="#foot_src_39-11530"><span data-dcnode-id="1234" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1229" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1219"><span data-dcnode-id="1228" instrument_node="">
</span><span class="superscript" data-dcnode-id="1225"><a data-dcnode-id="1226" href="#foot_src_40-11530" name="foot_40-11530"><span data-dcnode-id="1227" instrument_node="">40.</span></a></span><span data-dcnode-id="1224" instrument_node="">&nbsp;“On se souvient des méfiances, des critiques et des protestations qui ont accueilli, à ses débuts, la construction de la Tour Eiffel ; tout cela est bien loin. L’œuvre est là, triomphante, ‘chef-d’œuvre industriel de ce siècle de fer’. Sa silhouette aérienne domine Paris sans l’écraser; on la voit de partout, variant d’aspect avec les éclairages et les heures du jour, tantôt légère, grise et estompée, comme un phare noyé dans la brume, ou male et rude quand souffle le vent et que son sommet plonge dans la nuée, tantôt empourprée par les rayons du soleil couchant, ou rose et transparente sous les caresses matinales de l’aube.”&nbsp;Gonse, “Exposition Universelle,” 355-56.</span><span class="hide" data-dcnode-id="1220"><span class="superscript" data-dcnode-id="1221"><a data-dcnode-id="1222" href="#foot_src_40-11530"><span data-dcnode-id="1223" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1218" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1205"><span data-dcnode-id="1217" instrument_node="">
</span><span class="superscript" data-dcnode-id="1214"><a data-dcnode-id="1215" href="#foot_src_41-11530" name="foot_41-11530"><span data-dcnode-id="1216" instrument_node="">41.</span></a></span><span data-dcnode-id="1213" instrument_node="">&nbsp;Henri Loyrette, </span><em data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Gustave Eiffel</span></em><span data-dcnode-id="1210" instrument_node=""> (New York: Rizzoli, 1985), 162.</span><span class="hide" data-dcnode-id="1206"><span class="superscript" data-dcnode-id="1207"><a data-dcnode-id="1208" href="#foot_src_41-11530"><span data-dcnode-id="1209" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1204" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1191"><span data-dcnode-id="1203" instrument_node="">
</span><span class="superscript" data-dcnode-id="1200"><a data-dcnode-id="1201" href="#foot_src_42-11530" name="foot_42-11530"><span data-dcnode-id="1202" instrument_node="">42.</span></a></span><span data-dcnode-id="1199" instrument_node="">&nbsp;</span><em data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Ibid</span></em><span data-dcnode-id="1196" instrument_node="">., 167.</span><span class="hide" data-dcnode-id="1192"><span class="superscript" data-dcnode-id="1193"><a data-dcnode-id="1194" href="#foot_src_42-11530"><span data-dcnode-id="1195" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1190" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1177"><span data-dcnode-id="1189" instrument_node="">
</span><span class="superscript" data-dcnode-id="1186"><a data-dcnode-id="1187" href="#foot_src_43-11530" name="foot_43-11530"><span data-dcnode-id="1188" instrument_node="">43.</span></a></span><span data-dcnode-id="1185" instrument_node="">&nbsp;Geppert, </span><em data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Fleeting Cities</span></em><span data-dcnode-id="1182" instrument_node="">, 227.</span><span class="hide" data-dcnode-id="1178"><span class="superscript" data-dcnode-id="1179"><a data-dcnode-id="1180" href="#foot_src_43-11530"><span data-dcnode-id="1181" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1176" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1160"><span data-dcnode-id="1175" instrument_node="">
</span><span class="superscript" data-dcnode-id="1172"><a data-dcnode-id="1173" href="#foot_src_44-11530" name="foot_44-11530"><span data-dcnode-id="1174" instrument_node="">44.</span></a></span><span data-dcnode-id="1171" instrument_node="">&nbsp;&nbsp;“Après la </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Protestation</span></em><span data-dcnode-id="1168" instrument_node="">de 1887, aucun peintre “officiel” ni aucun des membres de la jeune école impressionniste ne tirent inspiration de la Tour Eiffel.”&nbsp;Frédéric Seitz, </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">La Tour Eiffel: Cent ans de solicitude </span></em><span data-dcnode-id="1165" instrument_node="">(Paris: Belin-Herscher, 2001), 94.</span><span class="hide" data-dcnode-id="1161"><span class="superscript" data-dcnode-id="1162"><a data-dcnode-id="1163" href="#foot_src_44-11530"><span data-dcnode-id="1164" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1159" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1143"><span data-dcnode-id="1158" instrument_node="">
</span><span class="superscript" data-dcnode-id="1155"><a data-dcnode-id="1156" href="#foot_src_45-11530" name="foot_45-11530"><span data-dcnode-id="1157" instrument_node="">45.</span></a></span><span data-dcnode-id="1154" instrument_node="">&nbsp;In addition to works discussed here, Henri Rousseau (le Douanier) included the Tower in wiry miniature in the middle ground of his 1890 self-portrait, </span><em data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Moi-même, portrait paysage</span></em><span data-dcnode-id="1151" instrument_node="">, Prague, Narodni Galerie, and it figured in one of Camille Pissarro’s </span><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Turpitudes Sociales</span></em><span data-dcnode-id="1148" instrument_node="">, “Le Capital,” 1889–1890, aligned with the greed of capitalism.</span><span class="hide" data-dcnode-id="1144"><span class="superscript" data-dcnode-id="1145"><a data-dcnode-id="1146" href="#foot_src_45-11530"><span data-dcnode-id="1147" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1142" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1126"><span data-dcnode-id="1141" instrument_node="">
</span><span class="superscript" data-dcnode-id="1138"><a data-dcnode-id="1139" href="#foot_src_46-11530" name="foot_46-11530"><span data-dcnode-id="1140" instrument_node="">46.</span></a></span><span data-dcnode-id="1137" instrument_node="">&nbsp;The explosive and remarkable Eiffel Tower paintings by Robert Delaunay—the Tower was at the heart of all four of his series (1909–1914)—are not discussed here because my focus falls on pictorial responses closest in time to the completion of the monument. The key analyses are Mark Rosenthal, </span><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Visions of Paris: Robert Delaunay’s Series</span></em><span data-dcnode-id="1134" instrument_node="">, exh. cat. (New York: The Solomon R. Guggenheim Museum, 1997); and Gordon Hughes, </span><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Resisting Abstraction: Robert Delaunay and Vision in the Face of Modernism</span></em><span data-dcnode-id="1131" instrument_node=""> (Chicago: University of Chicago Press, 2014).</span><span class="hide" data-dcnode-id="1127"><span class="superscript" data-dcnode-id="1128"><a data-dcnode-id="1129" href="#foot_src_46-11530"><span data-dcnode-id="1130" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1125" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1112"><span data-dcnode-id="1124" instrument_node="">
</span><span class="superscript" data-dcnode-id="1121"><a data-dcnode-id="1122" href="#foot_src_47-11530" name="foot_47-11530"><span data-dcnode-id="1123" instrument_node="">47.</span></a></span><span data-dcnode-id="1120" instrument_node="">&nbsp;Henri Loyrette, “Images de la Tour Eiffel (1884–1914),” in </span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">1889: La Tour Eiffel et l’Exposition Universelle</span></em><span data-dcnode-id="1117" instrument_node="">, ed. Caroline Mathieu (Paris: Éditions de la Réunion des musées nationaux, 1989), 196-219.</span><span class="hide" data-dcnode-id="1113"><span class="superscript" data-dcnode-id="1114"><a data-dcnode-id="1115" href="#foot_src_47-11530"><span data-dcnode-id="1116" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1111" instrument_node="">

</span><span class="superscript" data-dcnode-id="1107"><a data-dcnode-id="1108" href="#foot_src_48-11530" name="foot_48-11530"><span data-dcnode-id="1109" instrument_node="">48.</span></a></span><span data-dcnode-id="1106" instrument_node="">&nbsp;Paul Gauguin, “Notes on Art at the Universal Exhibition (July 1889),” in </span><em data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">The Writings of a Savage</span></em><span data-dcnode-id="1103" instrument_node="">, ed. Daniel Guerin, trans. Eleanor Levieux (New York: Viking Press, 1978), 28. Quoted in John A. Kouwenhoven, “The Eiffel Tower and the Ferris Wheel,” </span><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Arts Magazine</span></em><span data-dcnode-id="1100" instrument_node=""> 54, no. 6 (February 1980): 173.</span><span class="hide" data-dcnode-id="1096"><span class="superscript" data-dcnode-id="1097"><a data-dcnode-id="1098" href="#foot_src_48-11530"><span data-dcnode-id="1099" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1094" instrument_node="">

</span><span class="superscript" data-dcnode-id="1076"><a data-dcnode-id="1077" href="#foot_src_50-11530" name="foot_50-11530"><span data-dcnode-id="1078" instrument_node="">50.</span></a></span><span data-dcnode-id="1075" instrument_node="">&nbsp;François Fossier, Françoise Heilbrun and Philippe Néagu, </span><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Henri Rivière graveur et photographe</span></em><span data-dcnode-id="1072" instrument_node="">, exh. cat. (Paris: Musée d’Orsay, 1988); Valerie Sueur-Hermel, </span><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Henri Rivière. Entre impressionisme et japonisme</span></em><span data-dcnode-id="1069" instrument_node=""> (Paris: BnF, 2009); Armond Fields, </span><em data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Henri Rivière</span></em><span data-dcnode-id="1066" instrument_node=""> (Paris: Éditions Hubschmid et Bouret, 1985), 42-43; for his own account see Henri Rivière, </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Les Détours du Chemin, Souvenirs Notes et Croquis</span></em><span data-dcnode-id="1063" instrument_node="">, </span><em data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">1864–1951</span></em><span data-dcnode-id="1060" instrument_node=""> (Paris: Éditions Équinox, 2004), 68; and the replica, Henri Rivière, </span><em data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Les Trente-Six Vues de la Tour Eiffel, Paris</span></em><span data-dcnode-id="1057" instrument_node=""> (Paris: Éditions du Seuil, 2011), which contains James A. Ganz and Karin Breuer, “Postface: Une création en hommage à la Tour,” 93-105.</span><span class="hide" data-dcnode-id="1053"><span class="superscript" data-dcnode-id="1054"><a data-dcnode-id="1055" href="#foot_src_50-11530"><span data-dcnode-id="1056" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1051" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1038"><span data-dcnode-id="1050" instrument_node="">
</span><span class="superscript" data-dcnode-id="1047"><a data-dcnode-id="1048" href="#foot_src_51-11530" name="foot_51-11530"><span data-dcnode-id="1049" instrument_node="">51.</span></a></span><span data-dcnode-id="1046" instrument_node="">&nbsp;See Ruth Fiori, </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">L’Invention de Vieux Paris. Naissance d’une conscience patrimoniale dans la capitale</span></em><span data-dcnode-id="1043" instrument_node=""> (Paris: MARDAGA, 2012).</span><span class="hide" data-dcnode-id="1039"><span class="superscript" data-dcnode-id="1040"><a data-dcnode-id="1041" href="#foot_src_51-11530"><span data-dcnode-id="1042" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1037" instrument_node="">

</span><span class="superscript" data-dcnode-id="1033"><a data-dcnode-id="1034" href="#foot_src_52-11530" name="foot_52-11530"><span data-dcnode-id="1035" instrument_node="">52.</span></a></span><span data-dcnode-id="1032" instrument_node="">&nbsp;See the 1911 revisitation of the same scenario also titled “Rue Beethoven,” in the etching by Ernest Herscher in his </span><em data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Souvenirs du Paris d’hier</span></em><span data-dcnode-id="1029" instrument_node=""> (Paris: Société de Propagation des Livres d’Art, 1911).</span><span class="hide" data-dcnode-id="1025"><span class="superscript" data-dcnode-id="1026"><a data-dcnode-id="1027" href="#foot_src_52-11530"><span data-dcnode-id="1028" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1023" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="1010"><span data-dcnode-id="1022" instrument_node="">
</span><span class="superscript" data-dcnode-id="1019"><a data-dcnode-id="1020" href="#foot_src_53-11530" name="foot_53-11530"><span data-dcnode-id="1021" instrument_node="">53.</span></a></span><span data-dcnode-id="1018" instrument_node="">&nbsp;“Ce n’est que par les progrès de la science et de l’art de l’ingénieur, et par ceux de l’industrie métallurgique qui distinguent la fin de notre siècle, que nous avons pu dépasser dans cette voie les générations anciennes par la construction de cette Tour qui sera l’une des caractéristiques de l’industrie moderne, puisqu’elle seule l’a rendue possible.” Gustave Eiffel quoted in François Guillaume Dumas and Louis de Fourcaud, “La Tour Eiffel,” </span><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Revue de L’Exposition Universelle de 1889</span></em><span data-dcnode-id="1015" instrument_node="">, vol. 1 (Paris: Motteroz L. Baschet [1889]), 44.</span><span class="hide" data-dcnode-id="1011"><span class="superscript" data-dcnode-id="1012"><a data-dcnode-id="1013" href="#foot_src_53-11530"><span data-dcnode-id="1014" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="1009" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="990"><span data-dcnode-id="1008" instrument_node="">
</span><span class="superscript" data-dcnode-id="1005"><a data-dcnode-id="1006" href="#foot_src_54-11530" name="foot_54-11530"><span data-dcnode-id="1007" instrument_node="">54.</span></a></span><span data-dcnode-id="1004" instrument_node="">&nbsp;Meyer Schapiro, “Seurat,” in </span><em data-dcnode-id="996"><span data-dcnode-id="1003" instrument_node="">Modern Art 19</span><sup data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">th</span></sup><span data-dcnode-id="1000" instrument_node="">&amp; 20</span><sup data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">th</span></sup><span data-dcnode-id="997" instrument_node="">Centuries: Selected Papers</span></em><span data-dcnode-id="995" instrument_node=""> (New York: George Braziller, 1978), 107.</span><span class="hide" data-dcnode-id="991"><span class="superscript" data-dcnode-id="992"><a data-dcnode-id="993" href="#foot_src_54-11530"><span data-dcnode-id="994" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="989" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="976"><span data-dcnode-id="988" instrument_node="">
</span><span class="superscript" data-dcnode-id="985"><a data-dcnode-id="986" href="#foot_src_55-11530" name="foot_55-11530"><span data-dcnode-id="987" instrument_node="">55.</span></a></span><span data-dcnode-id="984" instrument_node="">&nbsp;Christoph Becker, the director of the Kunsthaus Zürich, restated Schapiro’s argument in less subtle language but along the same lines. “[Seurat’s] analytical spirit foresaw the tower as an extraordinary engineering achievement, a triumph of precise science. But more than that—the sky-high structure also had the potential to present this technical achievement in a novel aesthetic way. It bore all the marks of a symbol. It is not in the least surprising that Seurat’s interest was fired, He acted quickly. He made the symbolic structure his subject and topic by recording it in his new technique.” Becker, “Epilogue,” in </span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Georges Seurat: Figure in Space</span></em><span data-dcnode-id="981" instrument_node=""> (Ostfildern: Hatje Cantz, 2009), 138.</span><span class="hide" data-dcnode-id="977"><span class="superscript" data-dcnode-id="978"><a data-dcnode-id="979" href="#foot_src_55-11530"><span data-dcnode-id="980" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="975" instrument_node="">
</span><div class="footnote-text" data-dcnode-id="959"><span data-dcnode-id="974" instrument_node="">
</span><span class="superscript" data-dcnode-id="971"><a data-dcnode-id="972" href="#foot_src_56-11530" name="foot_56-11530"><span data-dcnode-id="973" instrument_node="">56.</span></a></span><span data-dcnode-id="970" instrument_node="">&nbsp;Perhaps he is discussing the post-1937 structure? But plenty of decoration remains. “Le monument est formé d’une myriade d’éléments préfabriqués plus ou moins identiques ; de cette accumulation naît un édifice qui n’en reste pas moins, aux yeux de classicisme, une simple somme d’éléments. Il n’y a en effet dans la tour plus aucune hiérarchisation structurelle subordonnant les éléments entre eux en fonction de leur place par rapport au centre et à la périphérie.” Hubertus Kohle, “La Tour Eiffel, monument commémoratif de la Révolution française,” </span><em data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Arts et société. Essais sur l’art français (1734–1889)</span></em><span data-dcnode-id="967" instrument_node=""> (Norderstedt: Books on Demand, 2009), 231-232. For another view of the republican contents of the Tower, or rather the close fit between the Tower and the larger political project of the Third Republic, see Priscilla Parkhurst Ferguson, </span><em data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Paris as Revolution: Writing the Nineteenth-Century City</span></em><span data-dcnode-id="964" instrument_node=""> (Berkeley: University of California Press, 1994), 220-224.</span><span class="hide" data-dcnode-id="960"><span class="superscript" data-dcnode-id="961"><a data-dcnode-id="962" href="#foot_src_56-11530"><span data-dcnode-id="963" instrument_node="">↑</span></a></span></span></div><span data-dcnode-id="958" instrument_node="">
&nbsp;
</span></section><div class="post_meta post_meta_single" data-dcnode-id="936"><span class="post_meta_item post_tags" data-dcnode-id="949"><span class="post_meta_label" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Tags:</span></span><span data-dcnode-id="954" instrument_node=""> </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/tag/aesthetics/" rel="tag"><span data-dcnode-id="953" instrument_node="">Aesthetics</span></a><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/tag/representation/" rel="tag"><span data-dcnode-id="951" instrument_node="">Representation</span></a></span><span class="post_meta_item post_share" data-dcnode-id="937"><div class="socials_share socials_size_tiny socials_type_block socials_dir_horizontal socials_wrap" data-dcnode-id="938"><span class="social_items inited" data-dcnode-id="939"><a class="social_item social_item_popup" data-count="twitter" data-dcnode-id="946" data-link="//twitter.com/intent/tweet?text=The Ornamented Eiffel Tower: Awareness and Denial&amp;url=https%3A%2F%2Fnonsite.org%2Fthe-ornamented-eiffel-tower%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DThe%2BOrnamented%2BEiffel%2BTower%253A%2BAwareness%2Band%2BDenial%26url%3Dhttps%253A%252F%252Fnonsite.org%252Fthe-ornamented-eiffel-tower%252F" rel="nofollow" target="_blank"><span class="social_icon social_icon_twitter sc_icon_type_icons" data-dcnode-id="947"><span class="trx_addons_icon-twitter" data-dcnode-id="948"></span></span></a><a class="social_item social_item_popup" data-count="facebook" data-dcnode-id="943" data-link="//www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fnonsite.org%2Fthe-ornamented-eiffel-tower%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fnonsi </span><h5 class="author_title" data-dcnode-id="920" itemprop="name"><span data-dcnode-id="921" instrument_node="">
		Hollis Clayson		</span></h5><span data-dcnode-id="919" instrument_node="">
</span><div class="author_bio" data-dcnode-id="899" itemprop="description"><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="917" instrument_node="">Hollis Clayson is Professor of Art History and Bergen Evans Professor in the Humanities at Northwestern University. She has published widely on Paris-based art practices, including the French capital’s large population of artists from elsewhere. Her books include </span><em data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Painted Love: Prostitution in French Art of the Impressionist Era</span></em><span data-dcnode-id="914" instrument_node=""> (1991), </span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Paris in Despair: Art and Everyday Life Under Siege (1870-71)</span></em><span data-dcnode-id="911" instrument_node=""> (2002), and </span><em data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Is Paris Still the Capital of the Nineteenth Century? Essays on Art and Modernity, 1850-1900</span></em><span data-dcnode-id="908" instrument_node=""> (2016), co-edited with André Dombrowski. Her newest book (2019) is </span><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Paris Illuminated: Essays on Art and Lighting in the Belle Époque</span></em><span data-dcnode-id="905" instrument_node="">. Work on the Eiffel Tower will continue alongside a new study of Cézanne’s etchings.</span></p><span data-dcnode-id="903" instrument_node="">
</span><a class="author_link" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/author/shc/" rel="author"><span data-dcnode-id="902" instrument_node="">
