</span><meta content="That the almost 130-year-old Tower has been a monument sacré for fifty-five years has clouded both popular and specialist awareness of its transformation. Because we are familiar with Barthes’s, Malraux’s and Barnes’s Tower, the stripped-down post-1937 structure, which features a ruthlessly geometricized horizontal construction as its first platform, key aspects of its initial lacey ornament have not figured in histories of the structure, its reception, and representation. Answering the questions—who noticed the ornament when the Tower was new? and so what?—is a goal of this essay." data-dcnode-id="2942" property="og:description"><span data-dcnode-id="2941" instrument_node="">

</span><article class="post_item_single post_type_post post_format_ post-11530 post type-post status-publish format-standard has-post-thumbnail hentry category-articles category-issue-27-2 tag-aesthetics tag-representation" data-dcnode-id="931" id="post-11530"><span data-dcnode-id="2487" instrument_node="">
</span><div class="post_header_wrap with_featured_image" data-dcnode-id="2453"><span data-dcnode-id="2486" instrument_node="">
</span><div class="post_header post_header_single entry-header" data-dcnode-id="2460"><span data-dcnode-id="2485" instrument_node="">
</span><h1 class="post_title entry-title" data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">The Ornamented Eiffel Tower: Awareness and Denial</span></h1><div class="post_content_meta" data-dcnode-id="2462"><span data-dcnode-id="2482" instrument_node=""> </span><div class="post_meta" data-dcnode-id="2465"><span data-dcnode-id="2481" instrument_node="">
</span><span class="post_meta_item post_categories" data-dcnode-id="2475"><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/category/articles/" rel="category tag"><span data-dcnode-id="2480" instrument_node="">Articles</span></a><span data-dcnode-id="2478" instrument_node=""> </span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/category/issue-27-2/" rel="category tag"><span data-dcnode-id="2477" instrument_node="">Issue #27</span></a></span><br data-dcnode-id="2474"><span class="post_meta_item post_author" data-dcnode-id="2470"><span data-dcnode-id="2473" instrument_node="">BY </span><a class="post meta_item post_author" data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/author/shc/" rel="author"><span data-dcnode-id="2472" instrument_node="">Hollis Clayson</span></a></span><br data-dcnode-id="2469"><span class="post_meta_item post_date" data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">February 11, 2019</span></span><span data-dcnode-id="2466" instrument_node=""> </span></div><span data-dcnode-id="2463" instrument_node="">
</span></div><span data-dcnode-id="2461" instrument_node=""> </span></div><span data-dcnode-id="2458" instrument_node="">
</span><div class="post_featured with_thumb" data-dcnode-id="2456"><img alt="" class="attachment-blabber-thumb-full size-blabber-thumb-full" data-attachment-id="11545" data-comments-opened="1" data-dcnode-id="2457" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Figure10" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure10-600x398.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure10-300x199.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure10.jpg" data-orig-size="1260,835" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure10/" height="835" loading="lazy" sizes="(max-width: 1260px) 100vw, 1260px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure10.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure10.jpg 1260w, https://nonsite.org/wp-content/uploads/2019/01/Figure10-300x199.jpg 300w, https://nonsite.org/wp-content/uploads/2019/01/Figure10-768x509.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure10-600x398.jpg 600w" width="1260"></div><span data-dcnode-id="2454" instrument_node=""> </span></div><span data-dcnode-id="2452" instrument_node="">
</span><div class="post_content post_content_single entry-content" data-dcnode-id="934" itemprop="mainEntityOfPage"><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2448"><strong data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">The Argument</span></strong></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2446" instrument_node="">When the Eiffel Tower—the daring centerpiece of the centenary celebration of the French Revolution, the 1889 Exposition Universelle—was new, it was widely disparaged for its impertinent mechanical appearance. The distinctive 300-meter iron structure still looms over western Paris from the Champ de Mars close to the Seine, but it is now admired, even adored.</span><span class="footnote-number" data-dcnode-id="2443"><a data-dcnode-id="2444" href="#foot_1-11530" name="foot_src_1-11530"><span data-dcnode-id="2445" instrument_node="">1</span></a></span><span data-dcnode-id="2442" instrument_node=""> The history of the Tower thus contains a two-fold surprise: it was the odd World’s Fair edifice to survive, and, though once reviled, it is now loved. Not only has the old derrick-shaped monument become endearing, its thrusting gigantism, surprising shape, and unapologetically industrial materials, along with its attention-grabbing nocturnal lighting and mesmerizing daytime transparency, make it inescapable in many districts of the French capital city.</span><span class="footnote-number" data-dcnode-id="2439"><a data-dcnode-id="2440" href="#foot_2-11530" name="foot_src_2-11530"><span data-dcnode-id="2441" instrument_node="">2</span></a></span><span data-dcnode-id="2438" instrument_node=""> And not only there: owing to its nonstop reproduction and circulation, its familiarity exceeds the spaces of Paris.</span><span class="footnote-number" data-dcnode-id="2435"><a data-dcnode-id="2436" href="#foot_3-11530" name="foot_src_3-11530"><span data-dcnode-id="2437" instrument_node="">3</span></a></span><span data-dcnode-id="2434" instrument_node=""> On account of its global popularity, it is called an urban icon. According to leading image historians, the Tower is “a reference-point for urban signification,” “the iconic object of Paris,” and “the archetype for all urban icons to follow.”</span><span class="footnote-number" data-dcnode-id="2431"><a data-dcnode-id="2432" href="#foot_4-11530" name="foot_src_4-11530"><span data-dcnode-id="2433" instrument_node="">4</span></a></span><span data-dcnode-id="2430" instrument_node=""> The parent of this outlook was literary critic Roland Barthes. In 1964, he argued influentially that the bases of the Tower’s clout are its widespread fame and its emptiness: it is both “a pure signifier” and “an utterly </span><em data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">useless </span></em><span data-dcnode-id="2427" instrument_node="">monument” meaning that wherever the Tower is known, it absorbs any claim whatsoever about its identity and significance.</span><span class="footnote-number" data-dcnode-id="2424"><a data-dcnode-id="2425" href="#foot_5-11530" name="foot_src_5-11530"><span data-dcnode-id="2426" instrument_node="">5</span></a></span></p><span data-dcnode-id="2422" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2421" instrument_node="">I take my distance from Barthes’s perspective in what follows. My aim is to complicate the conspicuousness of the contemporary Tower by historicizing it and its representations. The fundamental fact about the appearance of the Tower is that it is not today what it was at the start. Of course, its lighting has been altered repeatedly, but more importantly the silhouette and overall visual personality of the 1889 iron titan were fundamentally changed in 1937, forty-eight years after its construction. The highly ornamental scalloped arcades of its first platform (fig. 1), at the center of my analysis, were torn off and discarded.</span><span class="footnote-number" data-dcnode-id="2418"><a data-dcnode-id="2419" href="#foot_6-11530" name="foot_src_6-11530"><span data-dcnode-id="2420" instrument_node="">6</span></a></span><span data-dcnode-id="2417" instrument_node=""> The modification was a stylistic update; the Tower was to appear less old-fashioned in the context of that year’s self-consciously modern Exposition Internationale des Arts et Techniques dans la Vie Moderne.</span><span class="footnote-number" data-dcnode-id="2414"><a data-dcnode-id="2415" href="#foot_7-11530" name="foot_src_7-11530"><span data-dcnode-id="2416" instrument_node="">7</span></a></span><span data-dcnode-id="2413" instrument_node=""> Its stripped-down appearance was meant to fall in line with, even mirror, the reductive style of the new structure across the Seine on the Hill of Chaillot. The aerodynamically sleek Art Déco Palais de Chaillot, still in place, arose to camouflage and largely replace the elegant Palais de Trocadéro. Designed by Gabriel Davioud and Jules Bourdais, the earlier building had been the centerpiece of the 1878 Exposition Universelle, and the only structure to survive the fair, if not forever.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2401"><span data-dcnode-id="2410" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="2403"><a class="inited" data-dcnode-id="2408" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure1.jpg" rel="magnific"><img alt="" class="wp-image-11536" data-attachment-id="11536" data-comments-opened="1" data-dcnode-id="2409" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;Exposition universelle de 1889 (Paris, France)&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1380145305&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;Figaro exposition&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure1" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure1-425x600.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure1-213x300.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure1.jpg" data-orig-size="2127,3000" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure1/" height="600" sizes="(max-width: 425px) 100vw, 425px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure1-425x600.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure1-425x600.jpg 425w, https://nonsite.org/wp-content/uploads/2019/01/Figure1-213x300.jpg 213w, https://nonsite.org/wp-content/uploads/2019/01/Figure1-768x1083.jpg 768w" width="425"></a><span data-dcnode-id="2407" instrument_node="">
</span><figcaption data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Fig. 1. Figaro Exposition,&nbsp;no. 6,&nbsp;supplément du Figaro, Exposition universelle, 15 septembre 1889.</span></figcaption><span data-dcnode-id="2404" instrument_node="">
</span></figure><span data-dcnode-id="2402" instrument_node="">
</span></div><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2399" instrument_node="">1964 was another benchmark year in the history of the now celebrated monument.</span><span class="footnote-number" data-dcnode-id="2396"><a data-dcnode-id="2397" href="#foot_8-11530" name="foot_src_8-11530"><span data-dcnode-id="2398" instrument_node="">8</span></a></span><span data-dcnode-id="2395" instrument_node=""> The French government recognized La Tour Eiffel as a noteworthy part of the French </span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">patrimoine</span></em><span data-dcnode-id="2392" instrument_node="">, securing the survival of the seventy-five-year old Tower in its rather recently modernized form. André Malraux, Ministre d’État des affaires culturelles from 1959 to 1969, declared it a historical monument (</span><em data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">monument historique</span></em><span data-dcnode-id="2389" instrument_node="">), a sign of its accelerating popularity, insuring that it would not be altered again in any consequential way without authorization at the highest level.</span><span class="footnote-number" data-dcnode-id="2386"><a data-dcnode-id="2387" href="#foot_9-11530" name="foot_src_9-11530"><span data-dcnode-id="2388" instrument_node="">9</span></a></span><span data-dcnode-id="2385" instrument_node=""> Another accolade from 1964, also the date of Barthes’s essay, belongs to the history of the Tower’s enhanced postwar reputation. During his first trip to the French capital, the young English novelist Julian Barnes captured the 1960s celebrity of the Tower by calling it “absurd and absurdly popular.”</span><span class="footnote-number" data-dcnode-id="2382"><a data-dcnode-id="2383" href="#foot_10-11530" name="foot_src_10-11530"><span data-dcnode-id="2384" instrument_node="">10</span></a></span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2379" instrument_node="">That the almost 130-year-old Tower has been a </span><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">monument sacré</span></em><span data-dcnode-id="2376" instrument_node="">for fifty-five years has clouded both popular and specialist awareness of its transformation. Because we are familiar with Barthes’s, Malraux’s and Barnes’s Tower, the stripped-down post-1937 structure, which features a ruthlessly geometricized horizontal construction as its first platform (fig. 2), key aspects of its initial lacey ornament have not figured in histories of the structure, its reception, and representation. Answering the questions—who noticed the ornament when the Tower was new? and so what?—is a goal of this essay. Ignorance or disavowal of its ornament enabled many of the protests hurled in its direction.</span><span class="footnote-number" data-dcnode-id="2373"><a data-dcnode-id="2374" href="#foot_11-11530" name="foot_src_11-11530"><span data-dcnode-id="2375" instrument_node="">11</span></a></span></p><span data-dcnode-id="2371" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2361"><span data-dcnode-id="2370" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="2363"><a class="inited" data-dcnode-id="2368" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure2.jpeg" rel="magnific"><img alt="" class="wp-image-11537" data-attachment-id="11537" data-comments-opened="1" data-dcnode-id="2369" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Figure2" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure2-600x458.jpeg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure2-300x229.jpeg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure2.jpeg" data-orig-size="1381,1054" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure2/" height="458" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure2-600x458.jpeg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure2-600x458.jpeg 600w, https://nonsite.org/wp-content/uploads/2019/01/Figure2-300x229.jpeg 300w, https://nonsite.org/wp-content/uploads/2019/01/Figure2-768x586.jpeg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure2.jpeg 1381w" width="600"></a><span data-dcnode-id="2367" instrument_node="">
</span><figcaption data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Fig. 2. Exposition international des arts et techniques, Paris 1937, “la foule des visiteurs sous la Tour Eiffel le jour de l’ouverture, photographie de presse,” 1937. Gallica.bnf.fr.&nbsp;</span></figcaption><span data-dcnode-id="2364" instrument_node="">
</span></figure><span data-dcnode-id="2362" instrument_node="">
</span></div><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2359" instrument_node="">I argue that many of the attacks on the Tower that were oblivious to its flowery ironwork mirrored disquiet about the specter of heavy smoke-belching industry in or very close to the French capital city. Napoléon III and Haussmann discouraged the presence of coal-based industry mid-century by raising the tax on coal, resulting in the migration of factories to Saint-Denis, for example.</span><span class="footnote-number" data-dcnode-id="2356"><a data-dcnode-id="2357" href="#foot_12-11530" name="foot_src_12-11530"><span data-dcnode-id="2358" instrument_node="">12</span></a></span><span data-dcnode-id="2355" instrument_node=""> My point is that the denunciation of the Tower as a despised factory chimney could have indexed anxiety about the return of industry; the return of the repressed. Also germane are the passionate and anxious discussions about the expansion of industry into the banlieue, begun during the third quarter of the century, and its polluting effects.</span><span class="footnote-number" data-dcnode-id="2352"><a data-dcnode-id="2353" href="#foot_13-11530" name="foot_src_13-11530"><span data-dcnode-id="2354" instrument_node="">13</span></a></span><span data-dcnode-id="2351" instrument_node=""> Small wonder then that the sight of the Tower could foster what I shall call Pylon Vision, inasmuch as it was called a “factory chimney,” the essential industrial form, by some of its detractors, including J.-K. Huysmans, or reckoned to herald, in the words of another period voice, “the triumphant return of industry to Paris.”</span><span class="footnote-number" data-dcnode-id="2348"><a data-dcnode-id="2349" href="#foot_14-11530" name="foot_src_14-11530"><span data-dcnode-id="2350" instrument_node="">14</span></a></span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2343"><strong data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Origins of the 1889 Tower</span></strong></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2341" instrument_node="">Known almost from the very start as La Tour Eiffel after Gustave Eiffel, the astute engineer who spearheaded the project, the renowned </span><em data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">tour de trois cents mètres</span></em><span data-dcnode-id="2338" instrument_node="">was the winning entry (out of 107) in a French government competition for a 300-meter tower.</span><span class="footnote-number" data-dcnode-id="2335"><a data-dcnode-id="2336" href="#foot_15-11530" name="foot_src_15-11530"><span data-dcnode-id="2337" instrument_node="">15</span></a></span><span data-dcnode-id="2334" instrument_node=""> It was created as the </span><em data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">clou</span></em><span data-dcnode-id="2331" instrument_node="">of the French capital’s fourth World’s Fair since mid-century. As the tallest structure on earth in 1889, it outdid its nearest competitor, a 169-meter stone obelisk across the Atlantic, the Washington Monument (on the National Mall in Washington, DC), completed in 1884 but not dedicated until 1888.</span><span class="footnote-number" data-dcnode-id="2328"><a data-dcnode-id="2329" href="#foot_16-11530" name="foot_src_16-11530"><span data-dcnode-id="2330" instrument_node="">16</span></a></span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2325" instrument_node="">The enormous open-work four-footed structure, made of seven thousand tons of iron and erected in less than two years, was richly decorated overall but especially, as already noted,&nbsp; across the first platform.</span><span class="footnote-number" data-dcnode-id="2322"><a data-dcnode-id="2323" href="#foot_17-11530" name="foot_src_17-11530"><span data-dcnode-id="2324" instrument_node="">17</span></a></span><span data-dcnode-id="2321" instrument_node=""> It bore a dazzlingly bright red painted surface (changed to brown in 1899 in preparation of the next Exposition Universelle; fig. 3).</span><span class="footnote-number" data-dcnode-id="2318"><a data-dcnode-id="2319" href="#foot_18-11530" name="foot_src_18-11530"><span data-dcnode-id="2320" instrument_node="">18</span></a></span><span data-dcnode-id="2317" instrument_node=""> Georges Garen’s </span><em data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">gravure</span></em><span data-dcnode-id="2314" instrument_node="">(fig. 4) highlights the dazzling nighttime effects of the Tower’s </span><em data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">éclairage</span></em><span data-dcnode-id="2311" instrument_node="">: 10,000 gas lit globes glowed brightly, and ferociously intense electric searchlights streamed from the </span><em data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">campanile</span></em><span data-dcnode-id="2308" instrument_node="">(as its crest was called) at the summit.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2296"><span data-dcnode-id="2305" instrument_node="">

</span><figcaption data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">Fig. 4. Georges Garen,&nbsp;</span><em data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Embrasement de la Tour Eiffel</span></em><span data-dcnode-id="2287" instrument_node="">, 1889. Color print, 65 x 45.3 cm. Musée d’Orsay, Paris.</span></figcaption><span data-dcnode-id="2285" instrument_node="">
</span></figure><span data-dcnode-id="2283" instrument_node="">
</span></div><span data-dcnode-id="2281" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2280" instrument_node="">Two aspects of the Tower’s inaugural aesthetic remain little studied: its radical initial conception (1884) and its original adornments (1889). On the former, it began conceptual life in 1884 as a rigorously stripped-down metal </span><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">pylône&nbsp;</span></em><span data-dcnode-id="2277" instrument_node="">(fig. 5) designed by two chief engineers in Eiffel’s office, the Compagnie des Établissements Eiffel, Maurice Koechlin and Émile Nouguier. The word “pylon” is Koechlin’s own: describing his sketch of 6 June 1884 he called it “a large pylon consisting of four trellised beams separated at the base and narrowing toward the summit, joined together by metal girders placed at regular intervals.”</span><span class="footnote-number" data-dcnode-id="2274"><a data-dcnode-id="2275" href="#foot_19-11530" name="foot_src_19-11530"><span data-dcnode-id="2276" instrument_node="">19</span></a></span><span data-dcnode-id="2273" instrument_node=""> It was in other words a large pylon with four columns of lattice-work girders, separated at the base and joined at the top. They would be joined together by more girders spaced at regular intervals. Acting on the basis of the Koechlin-Nouguier plan, on 18 September 1884 Eiffel registered a patent under his and the two engineers’ names “for a new configuration allowing the construction of metal supports and pylons capable of exceeding a height of 300 meters.”</span><span class="footnote-number" data-dcnode-id="2270"><a data-dcnode-id="2271" href="#foot_20-11530" name="foot_src_20-11530"><span data-dcnode-id="2272" instrument_node="">20</span></a></span></p><span data-dcnode-id="2268" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2258"><span data-dcnode-id="2267" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="2260"><a class="inited" data-dcnode-id="2265" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure5.jpg" rel="magnific"><img alt="" class="wp-image-11540" data-attachment-id="11540" data-comments-opened="1" data-dcnode-id="2266" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;11&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS 350D DIGITAL&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1262176722&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;33&quot;,&quot;iso&quot;:&quot;400&quot;,&quot;shutter_speed&quot;:&quot;0.005&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure5" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure5-317x600.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure5-158x300.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure5.jpg" data-orig-size="1114,2109" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure5/" height="600" loading="lazy" sizes="(max-width: 317px) 100vw, 317px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure5-317x600.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure5-317x600.jpg 317w, https://nonsite.org/wp-content/uploads/2019/01/Figure5-158x300.jpg 158w, https://nonsite.org/wp-content/uploads/2019/01/Figure5-768x1454.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure5.jpg 1114w" width="317"></a><span data-dcnode-id="2264" instrument_node="">
</span><figcaption data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Fig. 5. Maurice Koechlin,&nbsp;Pylône de 300 m. de hauteur, 6 June 1884. Public domain, Wikimedia commons, authorization given by the Koechlin family.</span></figcaption><span data-dcnode-id="2261" instrument_node="">
</span></figure><span data-dcnode-id="2259" instrument_node="">
</span></div><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2256" instrument_node="">Pylons, standard metal bridge components, were familiar structures in the engineering world thanks in large part to Eiffel’s earlier specialization in bridges. Koechlin’s use of the word “</span><em data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">pylône</span></em><span data-dcnode-id="2253" instrument_node="">” in 1884 is clear proof of that terminological fluency. For example, Eiffel’s 162-meter span Garabit Viaduct (1880–1884), a railway bridge over the Truyère River in southern France, the highest bridge in the world at the time, consisted of a long horizontal bed supported by a broad iron arch and two pylons. Another apposite high-profile metal structure, albeit eventually concealed, was the one designed by Eiffel for the interior of Auguste Bartholdi’s </span><em data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Statue of Liberty</span></em><span data-dcnode-id="2250" instrument_node="">, completed in 1883. A twenty-eight-meter pylon was the central attachment point for the network of girders that formed the statue’s body. Koechlin’s 1884 design emulated such functional structures by imagining the 300-meter Tower as a free-standing, oversized, brashly exposed, and functionless pylon. Despite the lacey ornamentation that festooned the completed Tower, many observers could only see it as a pylon. As a consequence, numerous opinions of the Tower were hostage to the limitations of what I call “Pylon Vision.”</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2247" instrument_node="">Apropos of the scalloped arcades added to Koechlin’s naked pylon, Frédéric Seitz’s understated description is apt: “the construction lines were embellished with some decorations characteristic of the end of the nineteenth century.”</span><span class="footnote-number" data-dcnode-id="2244"><a data-dcnode-id="2245" href="#foot_21-11530" name="foot_src_21-11530"><span data-dcnode-id="2246" instrument_node="">21</span></a></span><span data-dcnode-id="2243" instrument_node=""> Did Gustave Eiffel dream up the ornamented promenade? No. The engineers Koechlin and Nouguier, originators of the metal pylon, were joined by the architect Stephen Sauvestre.</span><span class="footnote-number" data-dcnode-id="2240"><a data-dcnode-id="2241" href="#foot_22-11530" name="foot_src_22-11530"><span data-dcnode-id="2242" instrument_node="">22</span></a></span><span data-dcnode-id="2239" instrument_node=""> As Michel Lyonnet du Moutier observed, “it is true that the first working drawing was not very attractive,” and it was Sauvestre that gave the tower an aesthetic form.</span><span class="footnote-number" data-dcnode-id="2236"><a data-dcnode-id="2237" href="#foot_23-11530" name="foot_src_23-11530"><span data-dcnode-id="2238" instrument_node="">23</span></a></span><span data-dcnode-id="2235" instrument_node=""> Sauvestre’s scalloped </span><em data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">promenoir</span></em><span data-dcnode-id="2232" instrument_node="">, ignored by many onlookers, was however found extraordinary by some, as in this vivid description, whose author was smitten by the effects of gas light on the arches of the first level:</span></p><span data-dcnode-id="2230" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2219"><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">Below, all around, the gallery or </span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">promenoir&nbsp;</span></em><span data-dcnode-id="2225" instrument_node="">presents itself facing out as a succession of loggias, of gracious arcades. The tympana of the arcades are gilt latticework in the shape of fans, of which the lines start from a light colonnette. The vertical separations between the loggias are up to date with cabochons in carnelian crystal. Behind the cabochons are gas flames. They are many sparkling columns on the days of illumination. On those days when the lines of fire follow the major lines of the monument, one is very aware of the artistic value of this cyclopean conception.</span><span class="footnote-number" data-dcnode-id="2222"><a data-dcnode-id="2223" href="#foot_24-11530" name="foot_src_24-11530"><span data-dcnode-id="2224" instrument_node="">24</span></a></span></p><span data-dcnode-id="2220" instrument_node="">
</span></blockquote><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2217" instrument_node="">It was, then, the trio of Nouguier, Koechlin and Sauvestre that drew up the project that was submitted to and won the competition. It was an elaboration of the uncompromisingly minimalist pylon of 1884. Daniel Le Comte emphasizes the importance of the decoration, but overstates Eiffel’s role:&nbsp;“he had to add decoration to get it accepted. Thanks to the ornament, Eiffel eliminated his competitors.”</span><span class="footnote-number" data-dcnode-id="2214"><a data-dcnode-id="2215" href="#foot_25-11530" name="foot_src_25-11530"><span data-dcnode-id="2216" instrument_node="">25</span></a></span><span data-dcnode-id="2213" instrument_node=""> Apparently the stonework pedestals out of which the Tower’s legs emerge with staggering torsion, the monumental arches that link the columns and the first level, a bulb-shaped campanile for the top, and the lacework of the first platform were all attributable to Stephen Sauvestre. Insisting on the singularity of the Eiffel Tower, as many have done, conceals the fact that Sauvestre’s ornament synched up with the vocabulary of many stone and metal structures of the era. The scalloped iron mini portals of the original first platform (fig. 1), the work of Sauvestre, were akin to architectural ornament fashioned by Jacques-Ignace Hittorf (e.g. on the interior of St. Vincent de Paul, Paris, 1844). They also echoed the stylized floral metal ornament that bestrides the crest of the rooftops of Notre Dame de Paris (fig. 6) designed by Eugène Emmanuel Viollet-le-Duc between 1845 and 1868.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="2204"><a class="inited" data-dcnode-id="2209" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure6.jpg" rel="magnific"><img alt="" class="wp-image-11541" data-attachment-id="11541" data-comments-opened="1" data-dcnode-id="2210" data-image-caption="<p>Creator: Viollet-le-Duc, Eugène Emmanuel (French architect and theorist, 1814-1879); Date: Photograph date: ca. 1865-ca. 1886; Sculpture date: 1845-1868; Location: Paris, Ville de Paris, Département de, Île-de-France, France; Material: albumen prints; Measurements: Image: 10.4331 x 14.8425 in.; 26.5 x 37.7 cm</p>

</span><figcaption data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Fig. 6. Notre Dame de Paris, View from Tower with Chimeras and Gargoyles, ca. 1865–1886. Albumen print, 26.5 x 37.7 cm. Cornell University Library, Artstor.</span></figcaption><span data-dcnode-id="2205" instrument_node="">
</span></figure><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2202" instrument_node="">As Eiffel himself pointed out in 1900, the arches that linked the uprights were purely decorative, performing no functional work whatsoever.</span><span class="footnote-number" data-dcnode-id="2199"><a data-dcnode-id="2200" href="#foot_26-11530" name="foot_src_26-11530"><span data-dcnode-id="2201" instrument_node="">26</span></a></span><span data-dcnode-id="2198" instrument_node=""> Assuming (wrongly), like everyone else, that the most surprising aspects of the Tower’s form were Eiffel’s exclusively, T. J. Clark was actually paying tribute to the extraordinary Sauvestre when he observed in a 1975 classroom lecture I heard and never forgot: “The moment of torsion, of maximum stress, is displayed above ground. No trained architect of the nineteenth century before this would ever have dared to show the stress and strain in his work in quite such a graphic way.”</span><span class="footnote-number" data-dcnode-id="2195"><a data-dcnode-id="2196" href="#foot_27-11530" name="foot_src_27-11530"><span data-dcnode-id="2197" instrument_node="">27</span></a></span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">With Sauvestre’s elegant and intricate ironwork in mind, we confront a puzzling aspect of the Tower’s reception. Why were its jewel-like enhancements ignored by so many observers and artists? Why did a Pylon Gestalt or Pylon Vision shape and deform the perception of so many onlookers?</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2187"><strong data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Condemnations of the Tower</span></strong></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2155"><span data-dcnode-id="2185" instrument_node="">The Tower needed state sanction because Eiffel’s daring structure was condemned more than lionized until the post-World War II era.</span><span class="footnote-number" data-dcnode-id="2182"><a data-dcnode-id="2183" href="#foot_28-11530" name="foot_src_28-11530"><span data-dcnode-id="2184" instrument_node="">28</span></a></span><span data-dcnode-id="2181" instrument_node=""> &nbsp;While twenty-first-century tourist literature spins the sight and the experience of the Tower as sources of joy, artists and writers protested plans for the Tower even as it was being built. The most prominent condemnation was the 1887 “Protestation des artistes,” which ran in </span><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Le Temps&nbsp;</span></em><span data-dcnode-id="2178" instrument_node="">(14 February) as a petition to Jean-Charles Adolphe Alphand, the Director of Public Works and Commissioner of the 1889 Exposition. It was signed by luminaries of the art establishment including Charles Gounod, Charles Garnier, Albert Wolff, Guy de Maupassant, Alexander Dumas </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">fils</span></em><span data-dcnode-id="2175" instrument_node="">, and the painters William-Adolphe Bouguereau and Ernest Meissonier.</span><span class="footnote-number" data-dcnode-id="2172"><a data-dcnode-id="2173" href="#foot_29-11530" name="foot_src_29-11530"><span data-dcnode-id="2174" instrument_node="">29</span></a></span><span data-dcnode-id="2171" instrument_node=""> Xenophobia certainly ungirded their attack</span><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">; </span></em><span data-dcnode-id="2168" instrument_node="">among their stinging accusations was this barb: “…the Eiffel tower, which even the commercial America itself would not want, is, do not doubt it, the dishonor of Paris.”</span><span class="footnote-number" data-dcnode-id="2165"><a data-dcnode-id="2166" href="#foot_30-11530" name="foot_src_30-11530"><span data-dcnode-id="2167" instrument_node="">30</span></a></span><span data-dcnode-id="2164" instrument_node=""> But the governing trope of their brief against Eiffel’s structure is often forgotten. Their vision of the Tower’s eventual appearance was that it would be a “gigantic and black factory chimney.”</span><span class="footnote-number" data-dcnode-id="2161"><a data-dcnode-id="2162" href="#foot_31-11530" name="foot_src_31-11530"><span data-dcnode-id="2163" instrument_node="">31</span></a></span><span data-dcnode-id="2160" instrument_node=""> The naysayers selected a poor metaphor in view of the iron structure’s eventual manifold ornamental flourishes not to mention the monument’s transparency.</span><span class="footnote-number" data-dcnode-id="2157"><a data-dcnode-id="2158" href="#foot_32-11530" name="foot_src_32-11530"><span data-dcnode-id="2159" instrument_node="">32</span></a></span><span data-dcnode-id="2156" instrument_node=""> But its function as the return of the repressed in the sphere of banished smoky industry cannot be undervalued. An unidentified humorous illustrator moved against the deeply entrenched factory chimney trope in a hilarious fashion (fig. 7). “Indiscrétions sur l’Exposition,” imagines the Tower as a Rococo candelabrum. The caption reads: “Until now tasteful folks saw in it only a formidable factory chimney or a pretentious scaffolding. Wait for the judge: the current structure is covered with morsels of artistic decoration of the purest Rococo style.” Indeed Sauvestre’s decorations, while not Rococo per se, were elaborate versions of familiar and widespread late nineteenth-century architectural decoration and highly visible as a result. Except to those determined not to see it: those blinded by Pylon Vision.</span></p><span data-dcnode-id="2154" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2141"><span data-dcnode-id="2153" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="2143"><a class="inited" data-dcnode-id="2151" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure7.jpeg" rel="magnific"><img alt="" class="wp-image-11552" data-attachment-id="11552" data-comments-opened="1" data-dcnode-id="2152" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure7" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-428x600.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-214x300.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618.jpg" data-orig-size="1844,2584" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure7-2/" height="600" loading="lazy" sizes="(max-width: 428px) 100vw, 428px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-428x600.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-428x600.jpg 428w, https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-214x300.jpg 214w, https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618-768x1076.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure7-e1548861208618.jpg 1844w" width="428"></a><span data-dcnode-id="2150" instrument_node="">
</span><figcaption data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">Fig. 7. “Indiscrétions sur l’Expostion. La Tour Eiffel telle qu’elle sera lors de son complet achèvement le 1er mai,”&nbsp;La Caricature</span><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2146" instrument_node="">486 (20 April 1889): 124.</span></figcaption><span data-dcnode-id="2144" instrument_node="">
</span></figure><span data-dcnode-id="2142" instrument_node="">
</span></div><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2139" instrument_node="">Some signatories of the protest letter later recanted, but others continued to resist the completed Tower, among them Maupassant, who hated it so much that he often ate lunch in the Tower’s second floor restaurant, the only point in the city where he couldn’t see “this tall skinny pyramid of iron ladders, this giant and disgraceful skeleton.”</span><span class="footnote-number" data-dcnode-id="2136"><a data-dcnode-id="2137" href="#foot_33-11530" name="foot_src_33-11530"><span data-dcnode-id="2138" instrument_node="">33</span></a></span><span data-dcnode-id="2135" instrument_node=""> His disdain grew apace. In 1890, reflecting an economy already awash in souvenir reproductions, he averred: “I left Paris and even France, because the Eiffel Tour bored me too much. Not only does one see it everywhere, but one finds it everywhere, made of all known materials, exposed in all the windows, inevitable and torturing nightmare.”</span><span class="footnote-number" data-dcnode-id="2132"><a data-dcnode-id="2133" href="#foot_34-11530" name="foot_src_34-11530"><span data-dcnode-id="2134" instrument_node="">34</span></a></span><span data-dcnode-id="2131" instrument_node=""> The 1887 artists’ protest&nbsp;had predicted that the Tower would overshadow Notre-Dame, the Sainte-Chapelle, the Tour Saint-Jacques, the Louvre, the Dôme of the Invalides, and the Arc de Triomphe: “all our monuments humiliated, all our architecture dwarfed, that will disappear in this stupefying dream.”</span><span class="footnote-number" data-dcnode-id="2128"><a data-dcnode-id="2129" href="#foot_35-11530" name="foot_src_35-11530"><span data-dcnode-id="2130" instrument_node="">35</span></a></span><span data-dcnode-id="2127" instrument_node=""> Composer Erik Satie snidely indicted worries of this sort: “Our personal information permits us to affirm that there will be a Universal Exhibition in the middle of the year 1889. But you will not see it, because of the Eiffel Tower.”</span><span class="footnote-number" data-dcnode-id="2124"><a data-dcnode-id="2125" href="#foot_36-11530" name="foot_src_36-11530"><span data-dcnode-id="2126" instrument_node="">36</span></a></span></p><span data-dcnode-id="2122" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2121" instrument_node="">Edmond de Goncourt, sharp-tongued wit, was pointed and cruel: “you couldn’t dream of anything more ugly to the eye of an old civilized onlooker (or an old civilization).”</span><span class="footnote-number" data-dcnode-id="2118"><a data-dcnode-id="2119" href="#foot_37-11530" name="foot_src_37-11530"><span data-dcnode-id="2120" instrument_node="">37</span></a></span><span data-dcnode-id="2117" instrument_node=""> J.-K. Huysmans also disdained the Tower. In his essay, “Le Fer (Iron),” he used the imagery of rebarbative industry when he wrote: “its tower resembles a factory chimney under construction.”</span><span class="footnote-number" data-dcnode-id="2114"><a data-dcnode-id="2115" href="#foot_38-11530" name="foot_src_38-11530"><span data-dcnode-id="2116" instrument_node="">38</span></a></span><span data-dcnode-id="2113" instrument_node=""> Those who were smitten by the Tower in the immediate aftermath of its opening (31 May), also deployed the descriptive and metaphorical language of industry but with positive connotations. Louis Gonse, editor-in-chief of the </span><em data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Gazette des Beaux Arts</span></em><span data-dcnode-id="2110" instrument_node="">, for example, wrote a paean to the new structure calling it “the industrial masterpiece of this century of iron.”</span><span class="footnote-number" data-dcnode-id="2107"><a data-dcnode-id="2108" href="#foot_39-11530" name="foot_src_39-11530"><span data-dcnode-id="2109" instrument_node="">39</span></a></span><span data-dcnode-id="2106" instrument_node=""> And besotted by its interaction with the elements, he opined: “Its aerial figure dominates Paris without crushing it; one sees it from everywhere, with its looks varying with the clouds and the hours of the day, sometimes light, grey and faded, like a lighthouse drowning in the fog, or manly and hard when the wind blows and its summit is plunged into a cloud, sometimes flushed by the rays of the setting sun, or rose and transparent under the caresses of the light of dawn.”</span><span class="footnote-number" data-dcnode-id="2103"><a data-dcnode-id="2104" href="#foot_40-11530" name="foot_src_40-11530"><span data-dcnode-id="2105" instrument_node="">40</span></a></span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2088"><span data-dcnode-id="2100" instrument_node="">Visitors liked mounting the Tower right from the start. They voted loudly in favor with their feet. Over the seven-month duration of the exhibition—15 May to 6 November—1,953,122 people visited the Tower; an average of 11,800 per day.</span><span class="footnote-number" data-dcnode-id="2097"><a data-dcnode-id="2098" href="#foot_41-11530" name="foot_src_41-11530"><span data-dcnode-id="2099" instrument_node="">41</span></a></span><span data-dcnode-id="2096" instrument_node=""> Whether it remained visitable between 1889 and 1900 and on what terms remain open questions—the subject of another essay—but it lost popularity in 1900 vis-à-vis its debut season. In 1900 (compared to 1889) there were 51 percent fewer visitors to the Tower. And there were other signs of a lessening of interest: fewer Tower shaped souvenirs were sold. Moreover, its unconcealed metal, all that ornament notwithstanding, made it an anachronism in 1900. According to Henri Loyrette, it compared badly to the high-profile masonry building of the moment including the classicizing stone and glass of the Gare d’Orsay and the Grand Palais.</span><span class="footnote-number" data-dcnode-id="2093"><a data-dcnode-id="2094" href="#foot_42-11530" name="foot_src_42-11530"><span data-dcnode-id="2095" instrument_node="">42</span></a></span><span data-dcnode-id="2092" instrument_node=""> Between 1901 and 1914, attendance figures declined precipitously with no more than 120,000 to 260,000 visitors per year.</span><span class="footnote-number" data-dcnode-id="2089"><a data-dcnode-id="2090" href="#foot_43-11530" name="foot_src_43-11530"><span data-dcnode-id="2091" instrument_node="">43</span></a></span></p><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2084"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Artists and the Tower</span></strong></p><span data-dcnode-id="2083" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2073"><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">After the “Protest” of 1887, no “official” painter nor any members of the young Impressionist school drew inspiration from the Eiffel Tower.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><cite data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">Frédéric Seitz, 2001</span><span class="footnote-number" data-dcnode-id="2075"><a data-dcnode-id="2076" href="#foot_44-11530" name="foot_src_44-11530"><span data-dcnode-id="2077" instrument_node="">44</span></a></span></cite></blockquote><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2071" instrument_node="">Seitz was right to note the Tower’s absence from the artwork of the Impressionist vanguard, which was not however a “young” school in Paris in 1889. Period graphic images—both commercial prints and photographs—often however examined the structural complexity of the Tower’s crisscrossing iron members on the interior (fig. 8, for example). And some aesthetically progressive painters and printmakers were interested in the monument’s exterior.</span><span class="footnote-number" data-dcnode-id="2068"><a data-dcnode-id="2069" href="#foot_45-11530" name="foot_src_45-11530"><span data-dcnode-id="2070" instrument_node="">45</span></a></span><span data-dcnode-id="2067" instrument_node=""> The history of painting prior to 1910 has not yielded a parallel to figure 8, but the words of Paul Gauguin, lithographs by Henri Rivière (figs. 9 through 12), and a small painting by Georges Seurat (fig. 13) as glossed by Meyer Schapiro engaged with related formal issues.</span><span class="footnote-number" data-dcnode-id="2064"><a data-dcnode-id="2065" href="#foot_46-11530" name="foot_src_46-11530"><span data-dcnode-id="2066" instrument_node="">46</span></a></span><span data-dcnode-id="2063" instrument_node=""> Henri Loyrette was nonetheless justified in observing, presumably with Robert Delaunay’s Tower-centric paintings in mind, that the eventual “pictorial glory” of the Tower coincided with the decline of its fortune; when it was neither an object of controversy nor yet a mythic symbol.</span><span class="footnote-number" data-dcnode-id="2060"><a data-dcnode-id="2061" href="#foot_47-11530" name="foot_src_47-11530"><span data-dcnode-id="2062" instrument_node="">47</span></a></span></p><span data-dcnode-id="2058" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2048"><span data-dcnode-id="2057" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="2050"><a class="inited" data-dcnode-id="2055" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure8.jpg" rel="magnific"><img alt="" class="wp-image-11543" data-attachment-id="11543" data-comments-opened="1" data-dcnode-id="2056" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1547224738&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure8" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure8-438x600.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure8-219x300.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure8.jpg" data-orig-size="869,1190" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure8/" height="600" loading="lazy" sizes="(max-width: 438px) 100vw, 438px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure8-438x600.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure8-438x600.jpg 438w, https://nonsite.org/wp-content/uploads/2019/01/Figure8-219x300.jpg 219w, https://nonsite.org/wp-content/uploads/2019/01/Figure8-768x1052.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure8.jpg 869w" width="438"></a><span data-dcnode-id="2054" instrument_node="">
</span><figcaption data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Fig. 8. “La Tour Eiffel,”&nbsp;Champs de Mars, Exposition Universelle 1889: Construction, Inauguration, Vues Générales, album. Cabinet des Estampes, BnF, Paris.</span></figcaption><span data-dcnode-id="2051" instrument_node="">
</span></figure><span data-dcnode-id="2049" instrument_node="">
</span></div><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2046" instrument_node="">Paul Gauguin paid close attention to Eiffel’s decorative use of iron. In his very first published writing, “Notes on Art at the Universal Exhibition” of July 1889, the artist recognized that the exhibition was “the triumph of iron, not only with regard to machines, but also with regard to architecture. And yet architecture is at its beginnings, in that, as an art, it lacks a style of decoration consistent with the material which architecture uses.”</span><span class="footnote-number" data-dcnode-id="2043"><a data-dcnode-id="2044" href="#foot_48-11530" name="foot_src_48-11530"><span data-dcnode-id="2045" instrument_node="">48</span></a></span><span data-dcnode-id="2042" instrument_node=""> Only in the Eiffel Tower “to some extent” did he find some examples of the “ornamental bolts, iron cornices extending beyond the main line, a sort of Gothic lacework of iron.”</span><span class="footnote-number" data-dcnode-id="2039"><a data-dcnode-id="2040" href="#foot_49-11530" name="foot_src_49-11530"><span data-dcnode-id="2041" instrument_node="">49</span></a></span><span data-dcnode-id="2038" instrument_node=""> Gauguin’s response is notable in light of my effort to demonstrate that an acknowledgement of the Tower’s Gothic lacework of iron was rare indeed.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2035" instrument_node="">Henri Rivière, shadow-theater artist at the Chat Noir cabaret in Montmartre and innovative photographer of the Tower under construction, deserves the spotlight because his art struggled complexly to capture the improbability and novelty of the structure designed by Eiffel and his associates. A number of his lithographs seem to have explicitly sought to figure uneasiness at the sight of the Tower, or at least a strong sense of the monument’s impertinent clash with its surroundings. His </span><em data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">japoniste&nbsp;</span></em><span data-dcnode-id="2032" instrument_node="">prints, </span><em data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Trente-Six Vues de la Tour Eiffel</span></em><span data-dcnode-id="2029" instrument_node="">, published in 1902, were based on the work of Utagawa Hiroshige plus his own visit to and photographs of the Tower under construction in 1888.</span><span class="footnote-number" data-dcnode-id="2026"><a data-dcnode-id="2027" href="#foot_50-11530" name="foot_src_50-11530"><span data-dcnode-id="2028" instrument_node="">50</span></a></span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2023" instrument_node="">In Vue 5 (fig. 9), “Rue Beethoven,” a looming background cross-section of the lacy volumetric structure, sliced just above and below the first platform, contrasts sharply and uncomfortably with the scale and forms of a consummate example of “Vieux Paris” in the foreground: a street in the sixteenth arrondissement inhabited by the poor.</span><span class="footnote-number" data-dcnode-id="2020"><a data-dcnode-id="2021" href="#foot_51-11530" name="foot_src_51-11530"><span data-dcnode-id="2022" instrument_node="">51</span></a></span><span data-dcnode-id="2019" instrument_node=""> (Because the lithographs are inked uniformly in monochrome plus some brown-yellows, there was no way to show the red color of the painted Tower.) The lithograph conjures the appearance of Old Paris via old-fashioned partially ruined buildings on a modest stone thoroughfare (albeit separated from the Tower by a Haussmannian apartment building), and defines its provincial social life by the quotidian timelessness and modesty of laundry strung across the street, chickens pecking the ground, and one conversation between a modestly dressed woman and man on the old pavement.</span><span class="footnote-number" data-dcnode-id="2016"><a data-dcnode-id="2017" href="#foot_52-11530" name="foot_src_52-11530"><span data-dcnode-id="2018" instrument_node="">52</span></a></span><span data-dcnode-id="2015" instrument_node=""> Vue 31 (fig. 10), “Du Quai de Passy – Charbonniers,” makes the case for visual incommensurability in even stronger terms by staging a clash between the pale silhouette of the flattened symmetrical metal structure at center, avatar of technical modernity, and a dark silhouette of traditional labor, worker plus horse and cart collecting wood to burn into charcoal. It is hard to ignore the violence of the black diagonal tool at the very center of the sheet that slices up into the decorated promenade of the first floor of the Tower. More striking still is the alert standing pose of the hyper legible worker on the cart which seems meant to register his feeling threatened as he looks at and recoils from the iron giant in the near distance.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2003"><span data-dcnode-id="2012" instrument_node="">

</span></figure><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1993" instrument_node="">Two of Rivière’s lithographs, the railway-centric “Du Quai de Javel (baraque d’aiguilleur),” (Vue 28, fig. 11) and his symphony of chimneys, “Vue des toits,” (Vue 21, fig. 12) exemplify what I have named “Pylon Vision.” Vue 28 cleverly aligns the Tower with a cluster of cognate vertical instrumental forms, chimneys and a railway signal, endeavoring cheekily to assimilate the Tower to a world of pure industrial shape and utility. Vue 21 is a bit more complicated: its choreographed forest of wobbling and angular black-grey chimneys serves to stress the regularity of the surface of Eiffel’s distant faded tower. Eiffel himself shared this vision of the industrial non-decorative character of the Tower when he wrote, “It is only the progress of science and the art of the engineer, and that of metallurgic industry that distinguishes the end of our century, through which we have been able to overcome the path trod by older generations by the construction of this Tower which will be one of the characteristics of modern industry, because it [modern industry] alone rendered it possible.”</span><span class="footnote-number" data-dcnode-id="1990"><a data-dcnode-id="1991" href="#foot_53-11530" name="foot_src_53-11530"><span data-dcnode-id="1992" instrument_node="">53</span></a></span></p><span data-dcnode-id="1988" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1981"><a class="inited" data-dcnode-id="1986" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure11.jpg" rel="magnific"><img alt="" class="wp-image-11546" data-attachment-id="11546" data-comments-opened="1" data-dcnode-id="1987" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Figure11" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure11-600x398.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure11-300x199.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure11.jpg" data-orig-size="1260,835" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure11/" height="398" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure11-600x398.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure11-600x398.jpg 600w, https://nonsite.org/wp-content/uploads/2019/01/Figure11-300x199.jpg 300w, https://nonsite.org/wp-content/uploads/2019/01/Figure11-768x509.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure11.jpg 1260w" width="600"></a><span data-dcnode-id="1985" instrument_node="">

</span></figure><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Meyer Schapiro responded fluently to color in art. His eloquent 1955 discussion of Georges Seurat’s small 1889 oil painting (fig. 13) argues for a close bond between the forms of the Tower and Seurat’s divided strokes:</span></p><span data-dcnode-id="1969" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1952"><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1967" instrument_node="">In painting the Tower in 1889, even before it was completed, Seurat took a stand on an object of intense dispute among artists at the time. The enemies of the Tower included writers like Huysmans who saw in it only the </span><em data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Notre Dame de la Brocante</span></em><span data-dcnode-id="1964" instrument_node="">—a vulgar assertion of the power of industry and trade. For Seurat the tower was a congenial work of art of which he had anticipated the forms in his own painting. Its clean, graceful silhouette has an unmistakable affinity with the lines of the trombonist in his </span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Side Show&nbsp;</span></em><span data-dcnode-id="1961" instrument_node="">and the central nude in the </span><em data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Models</span></em><span data-dcnode-id="1958" instrument_node="">. Besides, the construction of this immense monument out of small exposed parts, each designed for its place, and forming together out of the visible crisscross and multiplicity of elements a single airy whole of striking simplicity and elegance of shape, was not unlike his own art with its summation of innumerable tiny units into a large clear form which retained the aspect of immaterial lightness evident in the smaller parts. In its original state the Tower was closer to Seurat’s art than it is today; for the iron structure was coated with several shades of iridescent enamel paint—the poet Tailhade called it the “speculum-Eiffel.” If the identity of the painter of Seurat’s pictures were unknown, we could call him appropriately the Master of the Eiffel Tower.</span><span class="footnote-number" data-dcnode-id="1955"><a data-dcnode-id="1956" href="#foot_54-11530" name="foot_src_54-11530"><span data-dcnode-id="1957" instrument_node="">54</span></a></span></p><span data-dcnode-id="1953" instrument_node="">
</span></blockquote><span data-dcnode-id="1951" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1941"><span data-dcnode-id="1950" instrument_node="">
</span><figure class="aligncenter" data-dcnode-id="1943"><a class="inited" data-dcnode-id="1948" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure13.jpg" rel="magnific"><img alt="" class="wp-image-11548" data-attachment-id="11548" data-comments-opened="1" data-dcnode-id="1949" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure13" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure13-375x600.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure13-188x300.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure13.jpg" data-orig-size="688,1100" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure13/" height="600" loading="lazy" sizes="(max-width: 375px) 100vw, 375px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure13-375x600.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure13-375x600.jpg 375w, https://nonsite.org/wp-content/uploads/2019/01/Figure13-188x300.jpg 188w, https://nonsite.org/wp-content/uploads/2019/01/Figure13.jpg 688w" width="375"></a><span data-dcnode-id="1947" instrument_node="">
</span><figcaption data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Fig. 13. Georges Seurat,&nbsp;La Tour Eiffel, 1889. Oil on panel, 24 x 15.2 cm. Fine Arts Museums of San Francisco.</span></figcaption><span data-dcnode-id="1944" instrument_node="">
</span></figure><span data-dcnode-id="1942" instrument_node="">
</span></div><span data-dcnode-id="1940" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1939" instrument_node="">While Schapiro did not see the Tower’s Gothic lacework of iron in the canvas, though he did acknowledge the orange-red of the original structure, I would argue that Seurat did. There is an unmistakable delineation of the scallops that comprised Sauvestre’s first platform, but the strokes are begrudging in their acknowledgement of volume and depth. His use of royal blue and saturated rose creates the illusion of a cast shadow, but the </span><em data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">promenoir </span></em><span data-dcnode-id="1936" instrument_node="">scallops themselves are flattened and generalized. The fact remains, following Schapiro’s argument, that there was an undeniable synchronicity between the fashioning of the Tower out of so many identical prefabricated iron parts riveted together and Seurat’s painstaking fashioning of the structure out of many separate orange, red and complementary blue-mauve strokes.</span><span class="footnote-number" data-dcnode-id="1933"><a data-dcnode-id="1934" href="#foot_55-11530" name="foot_src_55-11530"><span data-dcnode-id="1935" instrument_node="">55</span></a></span></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1930" instrument_node="">If we do not attend to Seurat’s response to the Tower’s horizontal tier of ornament, albeit delicate and very slight, it would seem that Seurat seen through the lens of Schapiro anticipated the extremely certain assessment of contemporary German art historian Hubertus Kohle, who has very recently written this about the Tower with specific interest in arguing that it was openly democratic and egalitarian: “The monument is formed from myriad prefabricated elements that are more or less identical; an edifice is borne from this accumulation that, in the eyes of classicism, is a simple collection of elements. There is no structural hierarchy in the tower subordinating elements as a function of their location whether at the center or the periphery.”</span><span class="footnote-number" data-dcnode-id="1927"><a data-dcnode-id="1928" href="#foot_56-11530" name="foot_src_56-11530"><span data-dcnode-id="1929" instrument_node="">56</span></a></span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Fascinatingly for our purposes, Kohle’s text exemplifies Pylon Vision and resonates importantly with Schapiro’s admiring characterization of Seurat’s multi-partite construction in paint. Pylon Vision has unfortunately dominated the discussion and the perception of the Eiffel Tower for generations. While Sauvestre’s elegant ornament was removed and discarded by those in charge in 1937 in order to enhance the modernism and modernity of its profile, contemporary students of the Tower’s reputation need to put it back.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1919"><strong data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Coda: Factories and the Eiffel Tower in 1900</span></strong></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Paul Signac, erstwhile comrade of Seurat, represented the Tower from a distance repeatedly in the 1890s (fig. 14). Rather than grappling with the specificities of the iron forms of the monument itself, he drew back to emphasize the environmental and visual impact of the industrialization of the district across the river from the Champ de Mars. Signac straightforwardly depicted the area surrounding the Pont de Grenelle as chock-a-block with factory chimneys producing dark smoke. The next year, Félix Thiollier photographed belching smokestacks on the very grounds of the World’s Fair (fig. 15). An unintended but vivid consequence of this pattern of representation, ca. 1900, is to lay to rest once and for all the old late 1880s metaphor that endlessly likened the impertinent new Eiffel Tower to a factory chimney. Once industry and its smoking factory chimneys dug in and proliferated not far from the river across from the Champ de Mars, the Eiffel Tower must have looked lacey, crisp, fastidiously adorned, intricately crafted, trim, and transparent as never before.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1908"><a class="inited" data-dcnode-id="1913" data-elementor-open-lightbox="no" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure14.jpg" rel="magnific"><img alt="" class="wp-image-11549" data-attachment-id="11549" data-comments-opened="1" data-dcnode-id="1914" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;8&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;Canon EOS 5D Mark II&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;1360148141&quot;,&quot;copyright&quot;:&quot;Copyright Amos Anderson Art Museum&quot;,&quot;focal_length&quot;:&quot;85&quot;,&quot;iso&quot;:&quot;100&quot;,&quot;shutter_speed&quot;:&quot;0.016666666666667&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Figure14" data-large-file="https://nonsite.org/wp-content/uploads/2019/01/Figure14-600x476.jpg" data-medium-file="https://nonsite.org/wp-content/uploads/2019/01/Figure14-300x238.jpg" data-orig-file="https://nonsite.org/wp-content/uploads/2019/01/Figure14.jpg" data-orig-size="1024,813" data-permalink="https://nonsite.org/the-ornamented-eiffel-tower/figure14/" height="476" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nonsite.org/wp-content/uploads/2019/01/Figure14-600x476.jpg&amp;raw" srcset="https://nonsite.org/wp-content/uploads/2019/01/Figure14-600x476.jpg 600w, https://nonsite.org/wp-content/uploads/2019/01/Figure14-300x238.jpg 300w, https://nonsite.org/wp-content/uploads/2019/01/Figure14-768x610.jpg 768w, https://nonsite.org/wp-content/uploads/2019/01/Figure14.jpg 1024w" width="600"></a><span data-dcnode-id="1912" instrument_node="">
