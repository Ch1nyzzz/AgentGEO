</span><p class="imgModalLegende" data-dcnode-id="7662"><span data-dcnode-id="7663" instrument_node="">Gustave Eiffel (1832-1923)</span></p><span data-dcnode-id="7661" instrument_node="">

</span><h2 data-dcnode-id="7649"><span data-dcnode-id="7650" instrument_node="">Biography</span></h2><span data-dcnode-id="7648" instrument_node="">
</span><p data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">Gustave Eiffel is a French engineer and entrepreneur of the late nineteenth century, mainly known for the realization of the tower that bears his name in Paris. He made his career building iron works of art, an innovative material for the time that allowed the construction of structures that could not be made of stone ...</span></p><span data-dcnode-id="7645" instrument_node="">
</span><br data-dcnode-id="7644"><span data-dcnode-id="7643" instrument_node="">
</span><h3 data-dcnode-id="7641"><span data-dcnode-id="7642" instrument_node="">His youth and his formation (1832-1855)</span></h3><span data-dcnode-id="7640" instrument_node="">
</span><p data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">Gustave Eiffel was born on December 15, 1832 in Dijon of François-Alexandre Eiffel and Catherine Mélanie Moneuse. He spent his early childhood with his maternal grandmother in the same city, where he will join the school. In 1850, when he graduated from the baccalaureate, he left Dijon to enter the College Ste Barbe for the preparation of the entrance examination at Polytechnique. But he failed and chose to enter the Ecole Centrale de Paris from which he graduated in 1855. His specialty was chemistry, but he turned professionally speaking to metallurgy, a field of activity that his mother knows and in which she has relationships.</span></p><span data-dcnode-id="7637" instrument_node="">
</span><br data-dcnode-id="7636"><span data-dcnode-id="7635" instrument_node="">
</span><h3 data-dcnode-id="7633"><span data-dcnode-id="7634" instrument_node="">Professional activities (1856-1887)</span></h3><span data-dcnode-id="7632" instrument_node="">
</span><p data-dcnode-id="7630"><span data-dcnode-id="7631" instrument_node="">His career began when he was hired by Charles Nepveu, a steam engine and railway equipment builder. He will make his debut there but stayed there only one year since, from 1857 is taken the responsibility of the office of studies of Pauwels and Company. It is in this company that he will make his first works of art. Between 1858 and 1860 he worked on the Bordeaux bridge.</span></p><span data-dcnode-id="7629" instrument_node="">
</span><p data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">In 1866 he left the Pauwels and Company and set up consulting engineer on his own, then, the following year, created his own company with which he created a viaduct of the railway line between Commentry and Gannat . This viaduct occupied it until 1871. Until 1873 he worked for various viaduct sites in Spain, Romania, Portugal, Egypt, Latin America and on the viaduct of Thouars, on the Brive-Tulle line. In 1875 he designed the Budapest West Station and the following year the Maria Pia Bridge, which spans the Douro River in Portugal. He will then make some works for the World Fair of 1878, and the metal structures of Bon Marché, Crédit Lyonnais in Paris, Birrh cellars in Thuir, near Perpignan, etc.</span></p><span data-dcnode-id="7626" instrument_node="">
</span><p data-dcnode-id="7624"><span data-dcnode-id="7625" instrument_node="">In 1879 he worked on the construction of the Viana and Beira Alta bridges in Portugal and in 1880 on the Szeged Bridge in Hungary. From 1880 to 1884 he spent a lot of time on what is sometimes considered a masterpiece, the viaduct of Garabit. During this period he continued to work on other sites, delivering the bridge Cubzac (1882), the viaduct on the Tardes (1883), the dome of the great equatorial in the observatory of Nice. He diversifies a little by creating removable bridges that he sends to Indochina.</span></p><span data-dcnode-id="7623" instrument_node="">
</span><p data-dcnode-id="7618"><span data-dcnode-id="7622" instrument_node="">In 1885 he did an original job that changed his habits. It designs and builds the internal structure of the </span><a data-dcnode-id="7620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower"><span data-dcnode-id="7621" instrument_node=""> Statue of Liberty </span></a><span data-dcnode-id="7619" instrument_node=""> which is quite complex to do.</span></p><span data-dcnode-id="7617" instrument_node="">
</span><p data-dcnode-id="7615"><span data-dcnode-id="7616" instrument_node="">The works from 1887 to 1889 are mainly devoted to the construction of a 300m tower in the heart of Paris, for the World Fair of 1889. It is the famous "Eiffel Tower", but it is also the one of these latest achievements.</span></p><span data-dcnode-id="7614" instrument_node="">
</span><br data-dcnode-id="7613"><span data-dcnode-id="7612" instrument_node="">
</span><h3 data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node="">Scientific Studies (1887-1923)</span></h3><span data-dcnode-id="7609" instrument_node="">

﻿

</span><em data-dcnode-id="7602"><small data-dcnode-id="7603"><p class="text-center" data-dcnode-id="7604"><span data-dcnode-id="7605" instrument_node="">The Gustave Eiffel wind tunnel</span></p></small></em><span data-dcnode-id="7601" instrument_node="">

</span><h4 class="modal-title" data-dcnode-id="7584"><span class="glyphicon glyphicon-camera" data-dcnode-id="7586"></span><span data-dcnode-id="7585" instrument_node=""> The Gustave Eiffel wind tunnel</span></h4><span data-dcnode-id="7583" instrument_node="">
</span></div><span data-dcnode-id="7581" instrument_node="">
</span><span data-dcnode-id="7579" instrument_node="">
</span><div class="modal-body" data-dcnode-id="7572"><span data-dcnode-id="7578" instrument_node="">
</span><img alt="The Gustave Eiffel wind tunnel" class="imgModal img-responsive center-block" data-dcnode-id="7577" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/images/Histoire/Soufflerie-Eiffel.jpg&amp;raw"><span data-dcnode-id="7576" instrument_node="">
</span><p class="imgModalLegende" data-dcnode-id="7574"><span data-dcnode-id="7575" instrument_node="">The Gustave Eiffel wind tunnel, Boileau street, at Paris.</span></p><span data-dcnode-id="7573" instrument_node="">
</span></div><span data-dcnode-id="7571" instrument_node="">
</span></div><span data-dcnode-id="7569" instrument_node="">
</span></div><span data-dcnode-id="7567" instrument_node="">
</span></div><span data-dcnode-id="7565" instrument_node="">
</span></div><span data-dcnode-id="7563" instrument_node="">
</span><p data-dcnode-id="7558"><span data-dcnode-id="7562" instrument_node="">During the construction of the tower that will bear his name, Gustave Eiffel continues to run his business. Thus in 1887 he signed an important contract for the Panama Canal, but it is precisely this contract that will lose him. Involved in the scandal of Panama, he is sentenced before the Paris Court, well that this judgment is broken later. Gustave Eiffel then focuses on his tower and the benefits he can draw. He begins by exploiting, as expected, the tower over the twenty years during which he has the rights. In 1909 he set up an aerodynamic laboratory, which he used to experiment with a specially designed drop apparatus. He deduces physical properties on the shape of airplane wings. He will also install on the tower a </span><a data-dcnode-id="7560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Scientific-applications-of-the-Eiffel-tower.php"><span data-dcnode-id="7561" instrument_node="">meteorological laboratory</span></a><span data-dcnode-id="7559" instrument_node="">. All these scientific experiments pushed him to build a wind tunnel (in 1912) that he installed rue Boileau, in Paris. Thanks to him aerodynamics has made great progress during this period.</span></p><span data-dcnode-id="7557" instrument_node="">
</span><p data-dcnode-id="7555"><span data-dcnode-id="7556" instrument_node="">Gustave Eiffel's interest in scientific experiments is inversely proportional to the amount of work done by his company, which eventually ceases all activity.</span></p><span data-dcnode-id="7554" instrument_node="">
</span><br data-dcnode-id="7553"><span data-dcnode-id="7552" instrument_node="">
</span><h3 data-dcnode-id="7550"><span data-dcnode-id="7551" instrument_node="">Privacy</span></h3><span data-dcnode-id="7549" instrument_node="">
</span><p data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">His private life is marked by his marriage on July 8, 1860 with Marie Gaudelet. Gustave Eiffel had five children, three girls and two boys. The eldest, Claire, was born in 1863, three years after her marriage. His wife will unfortunately die in 1877, shortly before her own mother.</span></p><span data-dcnode-id="7546" instrument_node="">
</span><p data-dcnode-id="7544"><span data-dcnode-id="7545" instrument_node="">Gustave Eiffel died on December 27, 1923 at the age of 91.</span></p><span data-dcnode-id="7543" instrument_node="">
</span><br data-dcnode-id="7542"><span data-dcnode-id="7541" instrument_node="">
</span><h3 data-dcnode-id="7539"><span data-dcnode-id="7540" instrument_node="">Awards</span></h3><span data-dcnode-id="7538" instrument_node="">
</span><p data-dcnode-id="7536"><span data-dcnode-id="7537" instrument_node="">Eiffel's long industrial career has earned him distinctions of various kinds. Thus, he was named:</span></p><span data-dcnode-id="7535" instrument_node="">
</span><ul data-dcnode-id="7515"><span data-dcnode-id="7534" instrument_node="">
</span><li data-dcnode-id="7532"><span data-dcnode-id="7533" instrument_node="">President of the Society of Civil Engineers in 1880</span></li><span data-dcnode-id="7531" instrument_node="">
</span><li data-dcnode-id="7529"><span data-dcnode-id="7530" instrument_node="">President of the International Congress of Construction Processes at the Exhibition of 1889</span></li><span data-dcnode-id="7528" instrument_node="">
</span><li data-dcnode-id="7526"><span data-dcnode-id="7527" instrument_node="">President of the Friendly Association of Central School Alumni</span></li><span data-dcnode-id="7525" instrument_node="">
</span><li data-dcnode-id="7523"><span data-dcnode-id="7524" instrument_node="">Member of the Development Council of this School</span></li><span data-dcnode-id="7522" instrument_node="">
</span><li data-dcnode-id="7520"><span data-dcnode-id="7521" instrument_node="">Laureate of the Institute (Prix Montyon de Mécanique in 1889)</span></li><span data-dcnode-id="7519" instrument_node="">
</span><li data-dcnode-id="7517"><span data-dcnode-id="7518" instrument_node="">Laureate of the Encouragement Society (five-year Elphège Baude Award)</span></li><span data-dcnode-id="7516" instrument_node="">
</span></ul><span data-dcnode-id="7514" instrument_node="">
</span><p data-dcnode-id="7512"><span data-dcnode-id="7513" instrument_node="">Abroad, the most renowned engineering companies have awarded him the title of honorary member. Citon the Institution of Mechnnical Engineers of London, the American Society of Mechanical Engineers of New York, the Royal Institute of Dutch Engineers in The Hague, the Imperial Society of Russian Polytechnic, the Association of Industrial Engineers of Barcelona and the Association of Engineers graduated from Ghent Special Schools.</span></p><span data-dcnode-id="7511" instrument_node="">
</span><p data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">At each of the 1878 and 1889 exhibitions, Gustave Eiffel won a Grand Prix, that is to say, the highest prize awarded. Finally, the list of awarded decorations shows that each of them corresponds to the execution of important works:</span></p><span data-dcnode-id="7508" instrument_node="">
</span><ul data-dcnode-id="7470"><span data-dcnode-id="7507" instrument_node="">
</span><li data-dcnode-id="7505"><span data-dcnode-id="7506" instrument_node="">Knight of the Legion of Honor, at the opening of the Exhibition of 1878, and Officer in 1889, at the inauguration of the Tower</span></li><span data-dcnode-id="7504" instrument_node="">
</span><li data-dcnode-id="7502"><span data-dcnode-id="7503" instrument_node="">Officer of Public Instruction (Exhibition of 1889)</span></li><span data-dcnode-id="7501" instrument_node="">
</span><li data-dcnode-id="7499"><span data-dcnode-id="7500" instrument_node="">Knight of the Order of Franz Joseph (Pestj Station)</span></li><span data-dcnode-id="7498" instrument_node="">
</span><li data-dcnode-id="7496"><span data-dcnode-id="7497" instrument_node="">Austrian Iron Crown Knight (Szegedin Bridge)</span></li><span data-dcnode-id="7495" instrument_node="">
</span><li data-dcnode-id="7493"><span data-dcnode-id="7494" instrument_node="">Commander of the Order of Conception of Portugal (Douro Bridge)</span></li><span data-dcnode-id="7492" instrument_node="">
</span><li data-dcnode-id="7490"><span data-dcnode-id="7491" instrument_node="">Commander of Isabella the Catholic of Spain (Tagus Bridge)</span></li><span data-dcnode-id="7489" instrument_node="">
</span><li data-dcnode-id="7487"><span data-dcnode-id="7488" instrument_node="">Royal Commander of Cambodia (works in Cochin China)</span></li><span data-dcnode-id="7486" instrument_node="">
</span><li data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">Commander of the Annam Dragon (works in Cochin China)</span></li><span data-dcnode-id="7483" instrument_node="">
</span><li data-dcnode-id="7481"><span data-dcnode-id="7482" instrument_node="">Commander of the Crown of Italy (unbreakable bridges)</span></li><span data-dcnode-id="7480" instrument_node="">
</span><li data-dcnode-id="7478"><span data-dcnode-id="7479" instrument_node="">Commander of St. Anne of Russia (removable bridges)</span></li><span data-dcnode-id="7477" instrument_node="">
</span><li data-dcnode-id="7475"><span data-dcnode-id="7476" instrument_node="">Commander of the Savior of Greece (various works)</span></li><span data-dcnode-id="7474" instrument_node="">
</span><li data-dcnode-id="7472"><span data-dcnode-id="7473" instrument_node="">Commander of St. Sava of Serbia (various works)</span></li><span data-dcnode-id="7471" instrument_node="">
</span></ul><span data-dcnode-id="7469" instrument_node="">
</span><br data-dcnode-id="7468"><span data-dcnode-id="7467" instrument_node="">
</span><h2 data-dcnode-id="7465"><span data-dcnode-id="7466" instrument_node="">Biography, by Georges Barral</span></h2><span data-dcnode-id="7464" instrument_node="">
</span><p data-dcnode-id="7462"><span data-dcnode-id="7463" instrument_node="">Georges Barral is the author of the book "The scientific pantheon of the Eiffel Tower", a reference work on this monument which has the characteristic of giving the biograpies of scholars on the tower, hence the name of the book. But he also gives other biographies, those of the designers and main builders of this tower. Here is the complete text below. It is in a style a little old but gives much more information on Gustave Eiffel. Note that this text was written in 1891, only 12 years after the end of the construction of the tower. Eiffel was still active, so obviously, there is no end of his life.</span></p><span data-dcnode-id="7461" instrument_node="">
</span><br data-dcnode-id="7460"><span data-dcnode-id="7459" instrument_node="">
</span><div aria-multiselectable="true" class="panel-group" data-dcnode-id="7325" id="accordion" role="tablist"><span data-dcnode-id="7458" instrument_node="">
</span><span data-dcnode-id="7456" instrument_node="">
</span><div class="panel panel-default" data-dcnode-id="7327"><span data-dcnode-id="7455" instrument_node="">
</span><div class="panel-heading" data-dcnode-id="7444" id="heading1" role="tab"><span data-dcnode-id="7454" instrument_node="">
</span><h3 class="panel-title" data-dcnode-id="7446"><span data-dcnode-id="7453" instrument_node="">
</span><a aria-controls="collapse1" aria-expanded="true" data-dcnode-id="7448" data-parent="#accordion" data-toggle="collapse" href="#collapse1"><span data-dcnode-id="7452" instrument_node="">
</span><span class="PuceRouge" data-dcnode-id="7450"><span data-dcnode-id="7451" instrument_node="">Biography of Gustave Eiffel, by Georges Barral (1891)</span></span><span data-dcnode-id="7449" instrument_node="">
</span></a><span data-dcnode-id="7447" instrument_node="">
</span></h3><span data-dcnode-id="7445" instrument_node="">
</span></div><span data-dcnode-id="7443" instrument_node="">
</span><div aria-labelledby="heading1" class="panel-collapse collapse" data-dcnode-id="7329" id="collapse1" role="tabpanel"><span data-dcnode-id="7442" instrument_node="">
</span><div class="panel-body" data-dcnode-id="7331"><span data-dcnode-id="7441" instrument_node="">
</span><p data-dcnode-id="7439"><span data-dcnode-id="7440" instrument_node="">The triumphant successor of this gigantic work, Alexandre-Gustave Eiffel, was born in Dijon, in the department of Côte-d'Or, on December 15, 1832. Here is a documentary copy of his birth certificate taken from the registers. of the civil status of the Burgundian city. It will be seen that the name of Eiffel was only a nickname until 1880, and that it was only that year that it became the legal name of the great engineer.</span></p><span data-dcnode-id="7438" instrument_node="">
</span><p data-dcnode-id="7435"><i data-dcnode-id="7436"><span data-dcnode-id="7437" instrument_node="">The year 1832, December 16, at one o'clock in the evening, in front of us Bernard-Charles Belot, deputy mayor of the city of Dijon (Côte-d'Or), by special delegation the functions of civil registrar.</span></i></p><span data-dcnode-id="7434" instrument_node="">
</span><p data-dcnode-id="7431"><i data-dcnode-id="7432"><span data-dcnode-id="7433" instrument_node="">Appeared: François-Alexandre Bonickhausen said Eiffel, thirty-seven years old, a merchant living in Dijon, a suburb of Ouche, on the canal harbor, who introduced us to a child we recognized to be of the male sex, born in his home on December 15 this month, hour of evening 8, of the marriage contracted in this city on November 23, 1824 between him, declaring, and Catherine Moneuse, his wife, aged thirty-three years; to which he has declared the names of Alexander Gustavus.</span></i></p><span data-dcnode-id="7430" instrument_node="">
</span><p data-dcnode-id="7427"><i data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">The said statement and presentation made in the presence of Benoît-Nicolas-Casimir-Alphonse Lefebvre, aged forty-eight, owner and major of the National Guard and Claude Bossu, aged sixty-five, retired battalion commander, knight of Saint-Louis, officer of the Legion of Honor and colonel of the National Guard, both domiciled in Dijon and signed with the father and us after reading the present birth certificate.</span></i></p><span data-dcnode-id="7426" instrument_node="">
</span><p data-dcnode-id="7423"><i data-dcnode-id="7424"><span data-dcnode-id="7425" instrument_node="">Signed: BELOT, LEFEBVRE, BOSSU, EIFFEL,</span></i></p><span data-dcnode-id="7422" instrument_node="">
</span><p data-dcnode-id="7420"><span data-dcnode-id="7421" instrument_node="">In the margin is the following statement:</span></p><span data-dcnode-id="7419" instrument_node="">
</span><p data-dcnode-id="7416"><i data-dcnode-id="7417"><span data-dcnode-id="7418" instrument_node="">By judgment of the court of first instance, Dijon dated December 15, 1880, it was ordered that Covenant opposite will be rectified in that the name of Eiffel will be substituted for that of Bonickhausen.</span></i></p><span data-dcnode-id="7415" instrument_node="">
</span><p data-dcnode-id="7412"><i data-dcnode-id="7413"><span data-dcnode-id="7414" instrument_node="">Dijon, august 20th, 1881. For the mayor, the deputy, Signed: LORY.</span></i></p><span data-dcnode-id="7411" instrument_node="">
</span><p data-dcnode-id="7409"><span data-dcnode-id="7410" instrument_node="">Mr. Bonickhausen said Eiffel (father) was born in Paris on January 29, 1795; he was the son of Alexandre-Marie Bonickhausen, known as Eiffel, and Marguerite-Josephine Lachapelle. He died in Dijon, on September 15, 1879.</span></p><span data-dcnode-id="7408" instrument_node="">
</span><p data-dcnode-id="7406"><span data-dcnode-id="7407" instrument_node="">Everyone knows that there are many names of Germanic origin here. It's not surprising. For a long time, Michelet has judiciously remarked, Germany and France have lived pell-mell on the Eastern frontier. In the valleys of the Meuse and the Moselle and in the forests of the Vosges, a vague and floating population was formed, living on the common countries, before deciding for a definitive nationality. From there this exchange of names. In Rhenish Prussia, not far from Aix-la-Chapelle, east of the Belgian frontier, there is a volcanic and mountainous plateau with an elevation of 500 meters. It's called Eifel. In geology, the Efelian adjective applies to an average division of the Devonian system of the Meuse and Rhine basins, containing powerful limestone massifs attributed to a coral origin. It has been so called because of its importance in the Rhine Eifel. Mr. Jules Gosselet, eminent geologist and corresponding member of the Institut de France, has published a remarkable memoir on this subject.</span></p><span data-dcnode-id="7405" instrument_node="">
</span><p data-dcnode-id="7403"><span data-dcnode-id="7404" instrument_node="">Former barbist, Mr. Eiffel presided in August 1886, the distribution of the awards of the College Sainte-Barbe, honor reserved for the most eminent students. On leaving this famous house of education, he was received at the Central School of Arts and Manufactures, which he left in 1855 to work at one of his uncles who owned a chemical factory. Let's add that it was at the Lycée de Dijon that he had attended primary school. But the chemistry was not the fact of Mr. Eiffel, who dreamed another job of his engineering degree. He entered the Western Railway Company, then, shortly after, he passed to the Company of Orleans, as chief of service and was charged to direct the execution of the great metal bridge of Bordeaux, His way was found. From the start, he showed a deep science combined with an exceptional look and coolness. The Bordelais, who followed with extreme interest the construction of their bridge, were not a little surprised to find that it was a young man of twenty-six, hardly twenty, who directed the work with rare ease even in an old practitioner. This first step accomplished, the personality of Mr. Eiffel only asserted itself.</span></p><span data-dcnode-id="7402" instrument_node="">
</span><p data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">In 1867, the World Exhibition offered him another opportunity to come to light. The commissioner general, the illustrious Hippolyte Le Play, commissioned him to verify experimentally the calculations according to which the arches of the machine gallery had been made, and he accomplishes this mission in the most remarkable way.</span></p><span data-dcnode-id="7399" instrument_node="">
</span><p data-dcnode-id="7397"><span data-dcnode-id="7398" instrument_node="">Mr. Eiffel summarized his work in a memory that became classic among engineers and builders, and he set the modal elasticity of parts composed at 16 x 10 °, a formula that was now adopted conventionally for all large metal constructions.</span></p><span data-dcnode-id="7396" instrument_node="">
</span><p data-dcnode-id="7391"><span data-dcnode-id="7395" instrument_node="">Sure of himself, full of confidence in his future, he founded, in 1868, Levallois-Perret, at the gates of Paris, in the rue Fouquet, to which the municipality gave the name of Eiffel, May 1, 1889, the </span><a data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Workshop.php"><span data-dcnode-id="7394" instrument_node="">factory out of which</span></a><span data-dcnode-id="7392" instrument_node="">, by pieces, so many gigantic works. Thus, this plant took part in the construction of the metal piles of the Commentry and Gannat viaducts and that it was noted by the improvements made in this kind of work, realizing, step by step, the bold creations of the bridges and viaducts with long reach and vertiginous elevation, which can be seen at Garabit, in Cantal; at Cubzac, on the Sioule; on the Tardes; on the Douro, Porto (Portugal); in Szegedin (Hungary); in Tan-An, Cochin China, etc. It will be remembered that the 1878 World Fair presented an immense and very interesting facade with three domes. It was to Mr. Eiffel that this work was entrusted as well as that of the Pavilion of the city of Paris, which was then transported to the Champs-Elysées, behind the Palais de l'Industrie. The attention of the scientists was particularly drawn to M. Eiffel, concerning the cupola of the Equatorial of the Observatoire de Nice, due, as we know, to the liberality of M. Raphael Bischoffsheim. This cupola, which measures 22 meters in diameter, and weighs more than a hundred thousand kilograms, can be moved with extreme ease by the hand of a child. To achieve this wonderful result, Mr. Eiffel had the idea to install, at the base of the dome, an annular float dipping into a tank filled with an incongruent liquid (magnesium chloride solution), so that the aircraft still floating, moves with extraordinary ease. It is to Mr. Eiffel to whom we owe the substitution of the iron for the cast iron, in the establishment of the piers of bridge, and the introduction of the steel in the construction of the aprons, which makes them to the times lighter, stronger, more economical. The launching of straight-beam bridges, like that of arch bridges, owe him new developments and new systems. He adopted, for the launching of the long rigid aprons, the levers and seesaw chassis, of his invention, and the cantilever assembly that no one before him had been able to achieve.</span></p><span data-dcnode-id="7390" instrument_node="">
</span><p data-dcnode-id="7388"><span data-dcnode-id="7389" instrument_node="">Mr. Eiffel is the laureate of the five-year Elphège Baude Prize, awarded by the National Industry Incentive Corporation to the author of the most significant improvements to the materials and processes of civil engineering, public works and architecture. . He obtained a grand prize at the 1878 World Fair and honorary diplomas at the Antwerp and Amsterdam exhibitions in 1883 and 1885. He has been an officer of the Legion of Honor since 31 March 1889, a knight of the Austrian Iron Crown and of the Order of Francis, Commander of Isabella the Catholic (Spain), Cambodia and the Conception of Portugal. This last decoration was handed to him publicly by the King, the day of the inauguration of the viaduct of Porto.</span></p><span data-dcnode-id="7387" instrument_node="">
</span><p data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">The public will never know enough about science in a bridge or viaduct, and it is useful to let them know the admirable organization of these vast workshops where the great people conceive and prepare themselves. works. We will read with as much interest as fruit the following description of a visit to the establishments of Mr. Eiffel by our colleague of the Petit Journal, Mr. Henry, on November 30, 1890:</span></p><span data-dcnode-id="7384" instrument_node="">
</span><p data-dcnode-id="7382"><span data-dcnode-id="7383" instrument_node="">A deserted street in Levallois-Perret, a wolf's cold and a gentleman, his nose sunk in the collar of his coat, looking for the number of a house. The decor is not cheerful; it has for canvas the bottom of the fortifications and vast empty and desolate spaces. It is a landscape of the suburbs of Paris, these landscapes where it seems that the cold is more intense, the wind more sour. Brrr! just to contemplate them one feels an irresistible urge to sneeze. Behind the endless walls that line the street and serve as enclosure for large sheds, we feel however that life has not abandoned this lunar site. A pipe, which dominates the hangars, spits at regular intervals into the gray atmosphere powerful jets of steam; dull blows, succeeding each other like the ticking of a clock, indicate that immense labor is being accomplished behind these walls, which are so little recreational. The gentleman is still looking for his number and we hear him whisper: "Come on, this is Rue Fouquet, there must be a No. 42." Indeed, the number appears at last above a door on which one reads: Etablissements Eiffel. It's there.</span></p><span data-dcnode-id="7381" instrument_node="">
</span><p data-dcnode-id="7379"><span data-dcnode-id="7380" instrument_node="">In order not to continue this novel-feuilleton any longer, I will tell you right away that the mysterious character who was thus looking for the other morning, by a cold of several degrees, the n ° 42 of the street Fouquet, it is was me simply, signatory of this article, which is nothing romantic. What attracted me to those places as far removed from Tortoni's steps as Siberia might have been, was not the desire to look for a scene conducive to the development of a novel; no, I was attracted solely by the desire to visit the factory from which have been released, piece by piece, so many great works, starting with the Eiffel Tower and the viaduct of Garabit, which seem, for this purpose of century, the last word of engineering science. It seemed to me interesting to see the surprises that could still be reserved to us Mr. Eiffel who, playing himself so to speak, put into action the legend of the Tower of Babel, less the confusion of languages. One can not spend one's life building towers three hundred meters high. What work are now being done on these factories, whose reputation is now universal! That was the interesting question to which I had come to get an answer. This answer, in the absence of Mr. Eiffel, the managing director of the Company, Mr. Gobert, and the chief engineer, M. Nouguier, consented to give it to me by making me visit, with the kindest eagerness , and their offices and workshops.</span></p><span data-dcnode-id="7378" instrument_node="">
</span><p data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">Offices and workshops occupy at Levallois-Perret a site of more than twenty thousand meters. This is where all the iron works go, which are shipped all over the world. The nomenclature is long orders in progress and I see the parts passing under the machine tools that pierce, plan, beat the iron, cut it with as much ease and clarity as you cut a piece of butter at the table. First of all, there is a 200-meter bridge with a central span of 100 meters: it is the Conflans-Andrésy viaduct on the new Argentan line at Mantes. This bridge will cost a million. Here are the locks of Port-Villez, in the department of Seine-et-Oise: an order of 3 million made by the State. Here are the caissons for the foundations of the canal bridge of Briare, on the Loire, which represent 1 500 000 francs approximately. This work is very curious. It is a question of passing the canal over the river as one makes cross a stream of water to a train of railway. It is therefore a suspended channel. Here are the pieces of four beautiful viaducts for the Compagnie du Sud de France. Later, I attend the assembly of a bridge commissioned by the Company of the East for the passage of the street of Cross of the Evangile, in Paris.</span></p><span data-dcnode-id="7375" instrument_node="">
</span><p data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">These large pieces of iron lying on the ground are reserved for the pier of Trompeloup Pauillac, jetty for the Transatlantic Company and which will cost nearly 2 million. These other pieces are for the bridge of Notre-Dame-de-la-Garde, Marseille. Another considerable work in progress is destined for Portugal. It is a 850 meter long Tagus Bridge with compressed air foundations and one of the largest viaducts in Europe. Three big bridges, also for Portugal, represent with the bridge of the Tagus an order of approximately 3 million.</span></p><span data-dcnode-id="7372" instrument_node="">
</span><p data-dcnode-id="7370"><span data-dcnode-id="7371" instrument_node="">Alongside these major projects, the Eiffel establishments are constantly working for military engineering abroad, to which they provide military bridges, and for the big companies in France, to which they have just delivered three large bridges which serve to the restoration of lanes when they are washed away by flood, flood or any other cause. This is the common task, which also includes the manufacture of portable bridges widely used in Cochin China, Tonkin, Manila. Nothing ingenious like these bridges invented by Mr. Eiffel. We will have an idea of ​​the advantages of the system when I say that in a few hours we can connect, by a solid iron passage, the two banks of a river. In the past, the same job took months.</span></p><span data-dcnode-id="7369" instrument_node="">
</span><p data-dcnode-id="7367"><span data-dcnode-id="7368" instrument_node="">Do you want to have a communication on a river? you just have to write to the Etablissements Eiffel: Send 10 meters or 20 meters of bridge and you receive what you need. No need for assemblers, special workers; you put your bridge yourself, with the help of the locals, and in two or three hours your communication is established. Only when the stream is more than twenty-one meters wide is a pile needed; in this case, it is seen in the bed of the river and everything is said. It's wonderful simplicity and cheap.</span></p><span data-dcnode-id="7366" instrument_node="">
</span><p data-dcnode-id="7364"><span data-dcnode-id="7365" instrument_node="">We can see from all the above how the engineers and workers of Mr. Eiffel are using their time right now. Who can do the least? All these small and large works are executed using the processes that were used for the construction of the Eiffel Tower, that is to say that all the parts leave the factory of Levallois-Perret all prepared, numbered, adapting exactly to each other, like the pieces of a clock. Arrived on the spot, even at the end of the world, the editors of Mr. Eiffel have only to indulge in a kind of game of patience, bringing the various parts together following the numbers, bolting, rivant, without ever having to encounter a bolt hole that does not combine with that of another room. Thanks to these processes, which are very simple when we explain them in a few words, very complicated, on the contrary, and demanding a great practical habit, a long preparatory work when it comes to applying them, the metal work the more colossal can be compared to a coat whose parts are cut in advance and that it is only necessary to gather and sew. It is this precision, this simplicity of execution that is the triumph of the engineers and workers of the Eiffel establishments. The tower of the Champ de Mars was thus prepared, piece by piece, in the workshops of Levallois-Perret. We understand how the Parisians saw her rise so quickly, so regularly, without a moment's pause, without hesitation.</span></p><span data-dcnode-id="7363" instrument_node="">
</span><p data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">Today, the Eiffel workshops are busy more than ever. The gigantic claim that the tower of the Champ de Mars has made to them all around the world has attracted a large number of orders and the work is assured for next year. We also know that some of the most important projects are under consideration, namely metal construction and public works projects, some of which are on the right track, such as, for example, the Métropolitain de Paris, which the Company is pursuing. Concession. These projects augur well for the future of the Society. The thing may not be without interest for a part of the public, the one who has been interested in this prosperous business, which is expected to be so fruitful in results.</span></p><span data-dcnode-id="7360" instrument_node="">
</span><p data-dcnode-id="7358"><span data-dcnode-id="7359" instrument_node="">It is known that, after the success of the exhibition, Mr. Eiffel, understanding what development would take his establishments, formed a society, and to obtain more powerful means of action, and to make to participate those who would trust him to the benefits he was called upon to collect. Compagnie des Etablissements Eiffel was incorporated on March 25, 1890 for fifty years, with the assistance of Societe Generale, Crédit Industriel and the International Bank of Paris, with a capital of 6 million francs, represented by 12,000 shares of 500 francs on which 350 francs were paid.</span></p><span data-dcnode-id="7357" instrument_node="">
</span><p data-dcnode-id="7355"><span data-dcnode-id="7356" instrument_node="">This company, which kept Mr. Eiflel at his head, as its president, became the owner of all the im-furniture, workshops, equipment, patents, agencies of the former Eiffel House. It is therefore called to benefit from the enormous reputation that is attached to the name of its president, and having to operate a beautifully equipped industry, operating for many years, she has no school to do and sees open in front of she has a clear road. This explains the early acceptance of the Company's shares, which are currently trading at around 560 francs and are very likely to be used after the results of the first financial years to benefit from a substantial increase in value. Indeed, we have seen the importance of orders in progress, that is to say profits prepared; the capital to be remunerated on the other hand is minimal, since the business was constituted without any increase. This paid-up capital is only 4,200,000 francs. He is thus assured of a remuneration which can not be that important from the beginning and which could become considerable in the continuation. The case is therefore very interesting to watch closely for capitalists who understand that in our time, where the annuity only yields 3%, it is essential to ask the industry an increase in income.</span></p><p data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">
</span></p><p data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">It should be added that the Eiflel establishments are called upon to play a leading role in the case of a European conflagration. They are excellent at building metal bridges of 45 meters span for normal-gauge railways, which are intended to quickly replace war-torn tracks, and also in peacetime following the removal of a bridge by flash floods or any other disaster.</span></p><span data-dcnode-id="7350" instrument_node="">
</span><p data-dcnode-id="7348"><span data-dcnode-id="7349" instrument_node="">It is truly amazing to see how easy and how easy it is to maneuver these bridges. Some men do it effortlessly, and since there is no need for prior learning, engineers can quickly build a bridge of this nature. The assembly is carried out entirely without the assistance of any mechanical agent, in less than 50 hours. As for the complete language, it does not even require 10 hours. As a result, to restore a passage 45 meters opening, without intermediate supports, it takes 60 hours of work. All steel a similar bridge weighs about 86,000 kilograms. It can withstand a load of 225,000 kilograms with an almost insignificant spire. The system of these economic portable bridges is, moreover, applied for a long time by its inventor, Mr. Eiffel, both in France and abroad. In Cochin-China and Tonkin in particular, there are a considerable number. The editing is of elementary simplicity.</span></p><span data-dcnode-id="7347" instrument_node="">
</span><p data-dcnode-id="7345"><span data-dcnode-id="7346" instrument_node="">These extraordinary companies require men of energy, knowledge and long patience.</span></p><span data-dcnode-id="7344" instrument_node="">
</span><p data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Mr. G. Eiffel is gifted with an obstinate will, with iron tenacity, with a great deal of kindness, gentleness, timidity even in relations, and exquisite modesty. His name is now spread all over the world. In the most isolated villages, we found the views of the Eiffel Tower placed next to the images of Napoleon and Gambetta.</span></p><span data-dcnode-id="7341" instrument_node="">
</span><p data-dcnode-id="7336"><span data-dcnode-id="7340" instrument_node="">Mr. Gastave Eiffel has always surrounded himself with a staff of painstaking and daring engineers, thanks to the influence of his natural gifts and his primary education. It is indeed at the Collège de Sainte-Barbe that his scientific spirit has opened. He has followed the courses in physics, chemistry and mathematics of </span><a data-dcnode-id="7338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Eiffel-Tower/Pantheon/Jean-Augustin-Barral.php"><span data-dcnode-id="7339" instrument_node="">Barral</span></a><span data-dcnode-id="7337" instrument_node="">, who has been the teacher of a large number of men who hold today the first rank in the army, navy, industry, education, sciences. He learned early to guess skills and discover the merits. When one is destined to become the head of a powerful house, it is an inestimable gift. He met in his son-in-law, M. Adolphe Salles, and in MM. Gobert, Nouguier, Koechlin, Sauvestre, Companion, precious executors of his thoughts in the field of theory and practice.</span></p><span data-dcnode-id="7335" instrument_node="">
</span><p data-dcnode-id="7333"><span data-dcnode-id="7334" instrument_node="">In this wonderful technical campaign of the 300-meter Tower, so skillfully driven, without a failure, without the smallest disappointment, as Napoleon in his military battles found generals at the height of his thoughts, Mr. Gustave Eiffel had the gift of knowing how to surround himself with engineers and specialists worthy of his talents and his ideas. It is therefore useful to know the life of its main collaborators. They have been struggling, they must be in the spotlight.</span></p><span data-dcnode-id="7332" instrument_node="">

</span><p data-dcnode-id="6210"><span data-dcnode-id="6211" instrument_node="">The Thouars Viaduct is one of the structures of the Vendée railway line in France. Thouars is located in Deux-Sèvres. This bridge was built between 1871 and 1873, relatively early in the career of Gustave Eiffel, it crosses the Thouet. It consists of a rectangular metal deck supported by three cast iron piles resting on masonry foundations.</span></p><span data-dcnode-id="6209" instrument_node="">
</span><p data-dcnode-id="6207"><span data-dcnode-id="6208" instrument_node=""> This work of art has been modified several times, the first since 1887 with the construction of a second apron, lower than the first, which has been added to the piles. This was necessary following the construction of the railway line Chartres-Bordeaux, granted to the railways of the State. In 1913 a disaster occurred on November 23 on the bridge of Montreuil-Bellay collapsed when passing a freight train. Following this event, the viaduct of Thouars was strengthened by piles in 1914 and 1915, sealed in reinforced concrete and dressed with dressed stone, and then the deck itself. The set allowed the passage of heavier train. During the Second World War the Germans blew up a battery and apron, but by the spring of 1946 the viaduct was repaired. In modern times the old cast iron piles have been replaced by concrete piles.</span></p><span data-dcnode-id="6206" instrument_node="">

</span><p data-dcnode-id="4343"><span data-dcnode-id="4350" instrument_node="">It is an element not necessarily known, but the internal structure of the </span><a data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Statue-of-Liberty"><span data-dcnode-id="4349" instrument_node="">Statue of Liberty</span></a><span data-dcnode-id="4347" instrument_node="">, in New York, was designed by the Eiffel workshops in Paris. The artist who made this statue, </span><a data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wonders-of-the-world.net/Statue-of-Liberty/Auguste-Bartholdi.php"><span data-dcnode-id="4346" instrument_node="">Auguste Bartholdi</span></a><span data-dcnode-id="4344" instrument_node="">, was in the same industrial environment as Eiffel, so naturally they were brought to work together.</span></p><span data-dcnode-id="4342" instrument_node="">
</span><p data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node=""> The Statue of Liberty has a very specific frame, with interlocking beams arranged in a box, and its arm is a kind of outgrowth of the whole. For the anecdote, the engineer and the artist had forgotten to communicate together during a slight modification of the statue, the distance of 60 cm from the arm raised to the outside, the artist judging too close to the head. The result ? The internal structure remained in arch for 100 years, until the day when the Americans have renovated it from top to bottom!</span></p><span data-dcnode-id="4339" instrument_node="">

</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">It is a half-iron house built in 1892. At that time Gustave Eiffel had designed houses to mount, all metal. They were planned for the settlements, architecturally speaking, they had large balconies and large openings. It is a certain Julio H. Toots, rubber operator in Iquitos, who bought it after his Parisian visit to the World Fair of 1889. Having discovered these houses proposed by Eiffel, he bought one that he made forward to his home. But once mounted, he had to split it in two because it was too big. He sold half of them to the south, but the transport difficulties being too great it was installed on the Malecón of Iquitos. Uninhabited, it quickly deteriorated, was bought by a trader and eventually fell into ruin. The metal will be sold to the scrap metal kilo.</span></p><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node=""> The second part remained in Iquitos. She is mounted on the weapon square (her current location) and will change owners several times. Nowadays it is occupied on the first floor by a couple of restaurateur, but the building belongs to the Social Club of Iquitos, an association aware of the local heritage and who maintains it. Nowadays this building is known as "Casa de Fierro", the "Iron House".</span></p><span data-dcnode-id="1904" instrument_node="">
