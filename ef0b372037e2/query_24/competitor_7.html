</span><p data-dcnode-id="1876"><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">1</span></strong><span data-dcnode-id="1877" instrument_node=""> Every time I look at the Eiffel Tower, it completely blows my mind.” Brian Fallon</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1871"><strong data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">2.</span></strong><span data-dcnode-id="1872" instrument_node="">  “I like The Eiffel Tower because it looks like steel and lace.” – Natalie Lloyd </span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1866"><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">3.</span></strong><span data-dcnode-id="1867" instrument_node=""> “I ought to be jealous of the tower. She is more famous than I am.” – Gustave Eiffel</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1859"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">4.</span></strong><span data-dcnode-id="1862" instrument_node=""> “984; 85; 3; 63;, 1,000,000</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">The Eiffel Tower is nine hundred eighty-four feet high. On a clear day, you can see eighty-five miles from the top. It has three elevators. Each elevator can carry sixty-three people. It cost about one million dollars to build Eiffel Tower.” – Suzy Kline </span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1854"><strong data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">5. </span></strong><span data-dcnode-id="1855" instrument_node="">“The Arc de Triomphe, the Eiffel Tower. They’re monumental. They’re straight out of Page 52 in your school history book” Billy Crystal </span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1849"><strong data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">6.</span></strong><span data-dcnode-id="1850" instrument_node=""> ” I miss a lot about Paris. After three and a half years, you get a little sick of it, and you just want to be home. But there are little things, sights. Like seeing the Eiffel Tower every day, that’s kind of cool.” – Lindsey Horan </span></p><span data-dcnode-id="1848" instrument_node="">
