</span><div class="site-container" data-dcnode-id="17"><header class="site-header" data-dcnode-id="355"><div class="wrap" data-dcnode-id="356"><div class="title-area" data-dcnode-id="357"><p class="site-title" data-dcnode-id="360"><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whatitcosts.com/"><span data-dcnode-id="362" instrument_node="">What It Costs</span></a></p><p class="site-description" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Cost Benefit Analysis of Everything in Life</span></p></div></div></header><div class="site-inner" data-dcnode-id="32"><div class="content-sidebar-wrap" data-dcnode-id="33"><main class="content" data-dcnode-id="135"><article aria-label="How Much Did the Eiffel Tower Cost to Build" class="post-250 post type-post status-publish format-standard has-post-thumbnail category-history entry" data-dcnode-id="198"><header class="entry-header" data-dcnode-id="351"><h1 class="entry-title" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">How Much Did the Eiffel Tower Cost to Build</span></h1><span data-dcnode-id="352" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="234"><p data-dcnode-id="349"><img alt="eiffel tower in paris france" class="alignnone size-full wp-image-1388" data-dcnode-id="350" height="1032" loading="lazy" sizes="(max-width: 1836px) 100vw, 1836px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whatitcosts.com/wp-content/uploads/2016/04/eiffel-tower-paris-france.jpg&amp;raw" srcset="https://www.whatitcosts.com/wp-content/uploads/2016/04/eiffel-tower-paris-france.jpg 1836w, https://www.whatitcosts.com/wp-content/uploads/2016/04/eiffel-tower-paris-france-300x169.jpg 300w, https://www.whatitcosts.com/wp-content/uploads/2016/04/eiffel-tower-paris-france-768x432.jpg 768w, https://www.whatitcosts.com/wp-content/uploads/2016/04/eiffel-tower-paris-france-1024x576.jpg 1024w" width="1836"></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="344"><em data-dcnode-id="345"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Ballpark Estimate:&nbsp;8 Million Francs (US$1.5 Million in 1890 dollars,&nbsp;US$34 Million in 2007 dollars).</span></strong></em></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">At 1,063 feet, including the antenna, the Eiffel Tower is the tallest structure in Paris and one of the most recognized tourist attractions on the globe. As the winning entry in a design competition, construction began in 1887 taking as many as 300 workmen to assemble the 18,038 pieces of a very pure type of structural iron called puddle iron.</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Opened in May of 1889 as the grand entrance to the Exposition Universelle, a world’s fair that commemorated the 100th anniversary of the French Revolution, the Eiffel Tower has attracted over 200 million people to marvel at its unique engineering design. In fact, in terms of paid-visitors, the Eiffel Tower ranks number one in the world.</span></p><span data-dcnode-id="337" instrument_node="">
</span><span data-dcnode-id="335" instrument_node="">
</span><div class="quads-location quads-ad1" data-dcnode-id="321" id="quads-ad1" style="float:none;margin:0px;"><span data-dcnode-id="334" instrument_node="">
</span><div data-dcnode-id="323" style="padding-bottom:20px;"><span data-dcnode-id="333" instrument_node="">
</span><span data-dcnode-id="331" instrument_node="">
</span><span data-dcnode-id="329" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7750387145990009" data-ad-slot="8532087259" data-dcnode-id="328" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="327" instrument_node="">
</span><span data-dcnode-id="324" instrument_node="">
</span></div><span data-dcnode-id="322" instrument_node="">
</span></div><span data-dcnode-id="320" instrument_node="">
</span><h2 data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Initial Construction</span></h2><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">When the Eiffel Tower was first constructed, its unique design, referred to as “Victorian Structural Expressionist” by some people at the time, was highly criticized as an eyesore in a city well known for its cultural heritage. The Parisians, however, despite their disapproval of this blot on the landscape, had no choice but to wait out the 20 years when, under the provisions of the permit, the ownership of the structure transferred from its designer and engineer, Gustave Eiffel, to the City of Paris for dismantling. By that time, however, with the new radio technology in vogue, the French government considered the tower a valuable asset for communications purposes and the people had become so enamored with the structure that it received a reprieve. Today, the Eiffel Tower is a cherished icon of the French people.</span></p><span data-dcnode-id="314" instrument_node="">
</span><h2 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Painting the Tower</span></h2><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">The Eiffel Tower must be painted by hand every 6 or 7 years to protect it from corrosion, a process that takes 60 tons of paint and two years to complete. The painting is usually done by a rather unique cadre of 25 painters who are unafraid of heights and possess an acrobatic agility for scaling the tower. In order to accentuate the impression of height, the tower is painted in three slightly different shades of “Eiffel Tower beige”, a color similar to milk chocolate with the lightest shade at the top. The next painting cycle is scheduled to begin around the end of 2008.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">To gain a little perspective on its height, if the Statue of Liberty, including its base, were to be placed on top of the Washington Monument, the Eiffel Tower would still be 200 feet taller.</span></p><span data-dcnode-id="305" instrument_node="">
</span><h2 data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">What It Cost to Build</span></h2><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="301" instrument_node="">It cost eight million francs (</span><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">US$1.5 Million 1890 dollars, US$34 Million 2007 dollars</span></strong><span data-dcnode-id="298" instrument_node="">), a sum partially funded by the French government. The balance of the cost was paid with the admission proceeds going to Eiffel’s construction company.</span></p><span data-dcnode-id="296" instrument_node="">
</span><h2 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Visiting the Tower</span></h2><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">For those planning a visit to Paris the Eiffel Tower is open from mid-June to August 31 (High season) and September 1 to mid-June (Low season). And according to Eiffel Tower aficionados, the best time to see the Eiffel Tower is at night when it is lit up by 336 sodium-vapor discharge lamps which gives it a yellow-orange glow. Furthermore, to witness the most spectacular view of the Parisian skyline from the Tower is at sunset.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Visitors who choose to view the splendid panorama of Paris should be prepared to confront massive crowds. First, one must find the end of the line leading to the ticket booth as it snakes around the base of the Tower. Then it’s back in line for up to 2 hours for a ride up on the elevator.</span></p><span data-dcnode-id="287" instrument_node="">
</span><h2 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Riding the Elevators</span></h2><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Although there are four elevators that travel to the 1st and 2nd level, one at each leg, one is always reserved for the restaurant on the second level and one is for tickets to access the stairs. From the second level there is only one elevator to the observation platform. Under “normal” conditions, there is only a single admission point which rotates from leg to leg on different days. But during extra busy days, an additional elevator may also be opened. If you have an aversion to crowds, visit the Eiffel Tower during the winter when the wait is only a few minutes.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The following are the elevator ticket prices as of April 2008:</span></p><span data-dcnode-id="278" instrument_node="">
</span><ul data-dcnode-id="261"><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="273"><span data-dcnode-id="276" instrument_node="">First Level (311 feet) – </span><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Adults 4.80 Euros (US$7.68), Children 2.50 Euros</span></strong></li><span data-dcnode-id="272" instrument_node="">
</span><li data-dcnode-id="268"><span data-dcnode-id="271" instrument_node="">Second Level (379 feet) – </span><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Adults 7.80 Euros (US$12.50), Children 4.30 Euros</span></strong></li><span data-dcnode-id="267" instrument_node="">
</span><li data-dcnode-id="263"><span data-dcnode-id="266" instrument_node="">Observation Deck (905 feet) – </span><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Adults 12.0 Euros (US$19.20), Children 6.70 Euros</span></strong></li><span data-dcnode-id="262" instrument_node="">
</span></ul><span data-dcnode-id="260" instrument_node="">
</span><h2 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Taking the Stairs</span></h2><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="256" instrument_node="">As of April 2008, the price for those brave souls who prefer to climb the stairs to the first and second level is 4.0 Euros (</span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">US$6.40</span></strong><span data-dcnode-id="253" instrument_node="">) for adults and 2.10 Euros for those under 25. Be forewarned, however, only the physically fit should attempt walking up the nearly 700 steps to the second level, and certainly no children. But whether you take the stairs or the elevator, acrophobia sufferers beware. Because of the open lattice framework of the Eiffel Tower, visitors will get a dizzying view of the ground below as they ascend higher and higher. In addition to the view, you experience 2 to 3 inches of sway as you climb to observation platform.</span></p><span data-dcnode-id="251" instrument_node="">
</span><h2 data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Eating in the Tower</span></h2><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="247" instrument_node="">For a bite to eat, there are two restaurants and a snack bar. On the mezzanine level there is a fast-food eatery where you can pick up such items as bagels, sandwiches, yogurt, etc. As one travels higher up the tower the restaurant prices rise proportionately. A typical French restaurant is located on the first level that can seat 200 diners. It’s called Altitude 95 because its 95 meters from the ground. At this restaurant traditional French cuisine is served that’s priced around </span><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">US$40</span></strong><span data-dcnode-id="244" instrument_node=""> per person and reservations made several weeks ahead of time is always wise. On the second level is a very small upscale establishment with a tremendous view of the city below. It’s called the Le Jules Vernes and because of its limited seating capacity and fine reputation, it’s recommended that reservations be made two months ahead of your visit. Dinner is priced at around US$200 per person. There is also a post office on the site as well as three souvenir shops.</span></p><span data-dcnode-id="242" instrument_node="">
</span><h2 data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Final Note</span></h2><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Sadly, its appeal as a romantic way to end ones life has attracted over 400 people who decided to take that final plunge.

</span></p><div class="jp-relatedposts" data-dcnode-id="235" id="jp-relatedposts"><span data-dcnode-id="236" instrument_node="">
