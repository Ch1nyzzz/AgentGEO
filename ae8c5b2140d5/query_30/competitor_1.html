</span><h1 class="margintop20 marginbottom15" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">History of the Telescope</span></h1><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
Without any doubt, telescopes are today viewed as one of the most important scientific instruments that helped us to find out more about our place in universe.  Built for the first time some 600 years ago, telescoped were initially hailed as one of the most important tools for sea fearers, and very quickly it became a pivotal tool of the astronomers who started exploring the night sky in search of answers. 
</span></p><span data-dcnode-id="274" instrument_node="">
</span><div class="d-xl-none d-lg-none" data-dcnode-id="269"><span data-dcnode-id="273" instrument_node="">
</span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/picture/picture-of-telescope/"><img alt="Picture Of Telescope" class="img-fluid marginbottom10 width100Percent" data-dcnode-id="272" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/images/historyoftelescope/picture-of-telescope.jpg&amp;raw"></a><span data-dcnode-id="270" instrument_node="">
</span></div><span data-dcnode-id="268" instrument_node="">
</span><div class="row" data-dcnode-id="236"><span data-dcnode-id="267" instrument_node="">
</span><div class="col-lg-6 col-md-6 col-sm-6 col-12" data-dcnode-id="258"><span data-dcnode-id="266" instrument_node="">
</span><h2 data-dcnode-id="263"><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/telescope-history/"><span data-dcnode-id="265" instrument_node="">Telescope History</span></a></h2><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">The history of optics instruments was completely revolution with the arrival of telescopes, with countless of prominent inventors, engineers, mathematicians and physicists trying to improve them and make them viable for very complicated scientific studies.</span></p><span data-dcnode-id="259" instrument_node="">
</span></div><span data-dcnode-id="257" instrument_node="">
</span><div class="col-lg-6 col-md-6 col-sm-6 col-12" data-dcnode-id="248"><span data-dcnode-id="256" instrument_node="">
</span><h2 data-dcnode-id="253"><a data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/telescope-facts/"><span data-dcnode-id="255" instrument_node="">Telescope Facts</span></a></h2><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">With over 600 years in our presence, telescopes managed to become significant part of our science, enabling everyone between ordinary people, workers, amateur astronomers and scientists to easily take advantage of their powerful optic capabilities to make distant objects look closer.</span></p><span data-dcnode-id="249" instrument_node="">
</span></div><span data-dcnode-id="247" instrument_node="">
</span><div class="col-lg-6 col-md-6 col-sm-6 col-12" data-dcnode-id="238"><span data-dcnode-id="246" instrument_node="">
</span><h2 data-dcnode-id="243"><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/telescope-invention/"><span data-dcnode-id="245" instrument_node="">Telescope Invention</span></a></h2><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Telescopes was shaped not only by the state of our industry and science, but also by famous inventors who managed to improve telescopes in very significant ways and pave the way for future inventors who all gave us the telescope technology that we have today.</span></p><span data-dcnode-id="239" instrument_node="">
</span></div><span data-dcnode-id="237" instrument_node="">
</span></div><span data-dcnode-id="235" instrument_node="">
</span><div class="d-xl-none d-lg-none" data-dcnode-id="230"><span data-dcnode-id="234" instrument_node="">
</span><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/picture/picture-of-stars-field/"><img alt="Picture Of Stars Field" class="img-fluid marginbottom10 width100Percent" data-dcnode-id="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.historyoftelescope.com/images/historyoftelescope/picture-of-stars-field.jpg&amp;raw"></a><span data-dcnode-id="231" instrument_node="">
</span></div><span data-dcnode-id="229" instrument_node="">
</span><h2 data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Brief Telescope History</span></h2><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">
    History of telescope started in 1608 with the group of Dutch spectacle-makers who all created first working models of telescope at the same time. However,
    credit for the creation of first one was given to Hans Lippershey, German-born lens grinder and spectacle maker who first managed to gain a patent on a
    telescope device. He managed to do that not on his own, but using almost 2 thousand years of slowly growing experience that was gathered by Indian,
    Egyptian, Chinese, Greece, Roman and Arab scientists. All those ancient accounts were gathered and examined in the famous “Book of Optics” by Arab scholar
    Alhazen (965 – 1040 AD), which became the foundation of knowledge of optics in Europe. In the beginning, Venice and Florence started creating their own
    lenses that were used for spectacles in 13th century, with Germany and Netherlands coming to prominence century later.
</span></p><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">
    Discovery of Hans Lippershey was popularized across Europe not via its own design of telescope, but with the improved design that was created by Galileo
    Galilei just 2 years later. Even though this telescope had many limitations (chromatic aberrations, low field of view), it was enough for Galileo to start
    looking at the sky and discovery of phases of Venus, 4 largest moons of Jupiter, and find proof that will support astronomical model of heliocentrism.
    After Galileo, scientists from all around Europe started to evolve its technology, they provided mathematical descriptions of the way rays of light are
    interacting with lenses, and provided several new ways to create telescope. The pioneers in that field were Isaac Newton who in 1668 built first practical
    reflecting telescope (although it was not used much because it was very complicated and expensive for manufacture). One of the most important moments in
    the history of modern telescope happened in mid-18th century with the discovery of first achromatic lens that enabled creation of telescopes that were not
    plagued by the effects of chromatic and spherical aberration. Reflecting mirrors also evolved after first models of Isaac Newton, especially after the
    introduction of f silver coated glass mirrors in 1850s and aluminized mirrors in early 1930s.
</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">
    In 20th century, telescopes of all shapes and sizes started being made, with many of them being focused not on gathering visible light, but on collecting
    other parts of the electromagnetic spectrum (x-rays, ultraviolet, infrared, gamma ray…). As for optical telescopes, the maximum size of reflecting
    telescope mirror remained at around 1m diameter, so telescope manufacturers started making segmented mirrors that grew to the size of 10m of diameter.
</span></p><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">
    Plans for building future telescopes on both earth and in space are already underway, and many of them strive to break previous records in pretty
    spectaculars - “European Extremely Large Telescope” will have main segmented mirror with the diameter of 39.9m, and “James Web Space Telescope” aims to
    have main mirror that is many times larger than the one used by Hubble Space Telescope.
</span></p><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
