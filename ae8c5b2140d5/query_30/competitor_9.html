</span><font color="#990000" data-dcnode-id="1162"><strong data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="1161" instrument_node=""> </span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Greco-Roman</span></em><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">
</span><font color="#61380B" data-dcnode-id="1154"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="1153" instrument_node=""> </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Ptolemaic Model of the universe</span></em><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">

/06/Al-Kindi-144x200.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/Al-Kindi-144x200.jpg 144w, https://totallyhistory.com/wp-content/uploads/2013/06/Al-Kindi-235x325.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Al-Kindi-288x400.jpg 288w, https://totallyhistory.com/wp-content/uploads/2013/06/Al-Kindi-169x235.jpg 169w, https://totallyhistory.com/wp-content/uploads/2013/06/Al-Kindi.jpg 324w" width="144"></a></td><td class="imagepart" data-dcnode-id="1128"><a class="fancybox image" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Bhaskara.jpg"><img alt="Bhaskara" class="alignnone size-thumbnail wp-image-55058" data-dcnode-id="1130" height="162" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Bhaskara-200x162.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/Bhaskara-200x162.jpg 200w, https://totallyhistory.com/wp-content/uploads/2013/06/Bhaskara-235x191.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Bhaskara-300x244.jpg 300w, https://totallyhistory.com/wp-content/uploads/2013/06/Bhaskara-288x235.jpg 288w, https://totallyhistory.com/wp-content/uploads/2013/06/Bhaskara.jpg 740w" width="200"></a></td></tr><tr data-dcnode-id="1049"><td class="textpart" data-dcnode-id="1101"><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/aryabhata/"><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Aryabhata</span></strong></a><span data-dcnode-id="1120" instrument_node=""> (476-550)</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">

y.com/wp-content/uploads/2013/06/Tycho_Brahe-235x349.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Tycho_Brahe-269x400.jpg 269w, https://totallyhistory.com/wp-content/uploads/2013/06/Tycho_Brahe-158x235.jpg 158w, https://totallyhistory.com/wp-content/uploads/2013/06/Tycho_Brahe.jpg 303w" width="134"></a></td><td class="imagepart" data-dcnode-id="978"><a class="fancybox image" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei.jpg"><img alt="Galileo Galilei" class="alignnone size-thumbnail wp-image-55031" data-dcnode-id="980" height="161" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei-200x161.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei-200x161.jpg 200w, https://totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei-235x189.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei-300x242.jpg 300w, https://totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei-291x235.jpg 291w, https://totallyhistory.com/wp-content/uploads/2013/06/Galileo-Galilei.jpg 800w" width="200"></a></td></tr><tr data-dcnode-id="901"><td class="textpart" data-dcnode-id="951"><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/nicolaus-copernicus/"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Nicolaus Copernicus</span></strong></a><span data-dcnode-id="970" instrument_node=""> (1473-1543)</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">

</span><font color="#990000" data-dcnode-id="917"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="916" instrument_node=""> </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Italian</span></em><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">

3/06/Herschel_Caroline-162x200.jpg 162w, https://totallyhistory.com/wp-content/uploads/2013/06/Herschel_Caroline-235x289.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Herschel_Caroline-300x369.jpg 300w, https://totallyhistory.com/wp-content/uploads/2013/06/Herschel_Caroline-190x235.jpg 190w, https://totallyhistory.com/wp-content/uploads/2013/06/Herschel_Caroline.jpg 333w" width="162"></a></td><td class="imagepart" data-dcnode-id="670"><a class="fancybox image" data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle.jpg"><img alt="Johann Gottfriend Galle" class="alignnone size-thumbnail wp-image-55052" data-dcnode-id="672" height="200" loading="lazy" sizes="(max-width: 121px) 100vw, 121px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle-121x200.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle-121x200.jpg 121w, https://totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle-235x387.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle-242x400.jpg 242w, https://totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle-142x235.jpg 142w, https://totallyhistory.com/wp-content/uploads/2013/06/Johann-Gottfriend-Galle.jpg 485w" width="121"></a></td></tr><tr data-dcnode-id="590"><td class="textpart" data-dcnode-id="640"><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/pierre-simon-laplace/"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Pierre-Simon Laplace</span></strong></a><span data-dcnode-id="662" instrument_node=""> (1749-1827)</span><br data-dcnode-id="661"><span data-dcnode-id="660" instrument_node="">
</span><font color="#990000" data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="656" instrument_node=""> </span><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">French</span></em><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">
</span><font color="#61380B" data-dcnode-id="649"><strong data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="648" instrument_node=""> </span><em data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">One of the first astronomers to discuss the possibility of black holes</span></em><br data-dcnode-id="645"><span data-dcnode-id="644" instrument_node="">
LaPlace is often referred to as the French Isaac Newton because of his contributions to science, specifically astronomy. He presented the theory of gravitations collapse and wrote a five-volume work entitled </span><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Celestial Mechanics</span></em><span data-dcnode-id="641" instrument_node="">.</span></td><td class="textpart" data-dcnode-id="616"><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/caroline-herschel/"><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Caroline Herschel</span></strong></a><span data-dcnode-id="635" instrument_node=""> (1750-1848)</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
</span><font color="#990000" data-dcnode-id="630"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="629" instrument_node=""> </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">German-British</span></em><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
</span><font color="#61380B" data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="621" instrument_node=""> </span><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Discovered several comets, including the rediscovery of Comet Encke</span></em><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
Worked extensively with her husband, William, on astronomical observations. She was awarded the Gold Medal by the Royal Astronomical Society in 1828. She was one of the first honorary members of the organization, too.</span></td><td class="textpart" data-dcnode-id="592"><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/johann-gottfried-galle/"><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Johann Gottfried Galle</span></strong></a><span data-dcnode-id="611" instrument_node=""> (1812-1910)</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
</span><font color="#990000" data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="605" instrument_node=""> </span><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">German</span></em><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node="">
</span><font color="#61380B" data-dcnode-id="598"><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="597" instrument_node=""> </span><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">First astronomer to observe Neptune</span></em><br data-dcnode-id="594"><span data-dcnode-id="593" instrument_node="">
Worked at the Berlin Observatory for many years and discovered the planet Neptune, a dark ring of Saturn, and three previously undiscovered comets. Also became the director of the Breslau Observatory for more than 40 years.</span></td></tr></tbody></table><span data-dcnode-id="585" instrument_node="">

ontent/uploads/2013/06/Edwin-Hubble1-235x295.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Edwin-Hubble1-300x377.jpg 300w, https://totallyhistory.com/wp-content/uploads/2013/06/Edwin-Hubble1-186x235.jpg 186w, https://totallyhistory.com/wp-content/uploads/2013/06/Edwin-Hubble1.jpg 795w" width="159"></a></td><td class="imagepart" data-dcnode-id="556"><img alt="Zwicky" class="alignnone size-thumbnail wp-image-55060" data-dcnode-id="557" height="200" loading="lazy" sizes="(max-width: 147px) 100vw, 147px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/Zwicky-147x200.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/Zwicky-147x200.jpg 147w, https://totallyhistory.com/wp-content/uploads/2013/06/Zwicky-235x319.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/Zwicky-294x400.jpg 294w, https://totallyhistory.com/wp-content/uploads/2013/06/Zwicky-172x235.jpg 172w, https://totallyhistory.com/wp-content/uploads/2013/06/Zwicky.jpg 404w" width="147"></td></tr><tr data-dcnode-id="478"><td class="textpart" data-dcnode-id="529"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/annie-jump-cannon/"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Annie Jump Cannon</span></strong></a><span data-dcnode-id="548" instrument_node=""> (1863-1941)</span><br data-dcnode-id="547"><span data-dcnode-id="546" instrument_node="">
</span><font color="#990000" data-dcnode-id="543"><strong data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="542" instrument_node=""> </span><em data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">American</span></em><br data-dcnode-id="539"><span data-dcnode-id="538" instrument_node="">
</span><font color="#61380B" data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="534" instrument_node=""> </span><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Helped Create the Harvard Classification Scheme</span></em><br data-dcnode-id="531"><span data-dcnode-id="530" instrument_node="">
Received the nickname “Census Taker of the Sky” because she classified more stars than anybody else before her – more than 230,000 of them. She was the first female elected as an office of the American Astronomical Society and she has a lunar crater named after her.</span></td><td class="textpart" data-dcnode-id="505"><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/edwin-hubble/"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Edwin Hubble</span></strong></a><span data-dcnode-id="524" instrument_node=""> (1889-1953)</span><br data-dcnode-id="523"><span data-dcnode-id="522" instrument_node="">
</span><font color="#990000" data-dcnode-id="519"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="518" instrument_node=""> </span><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">American</span></em><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
</span><font color="#61380B" data-dcnode-id="511"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="510" instrument_node=""> </span><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Created Hubble’s Law</span></em><br data-dcnode-id="507"><span data-dcnode-id="506" instrument_node="">
Discovered that the universe is ever-expanding and that there were more galaxies besides the Milky Way. Hubble also organized galaxies into three classes – spirals, ellipticals, and irregulars.</span></td><td class="textpart" data-dcnode-id="480"><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/fritz-zwicky/"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Fritz Zwicky</span></strong><span data-dcnode-id="501" instrument_node=""> </span></a><span data-dcnode-id="499" instrument_node="">(1898-1974)</span><br data-dcnode-id="498"><span data-dcnode-id="497" instrument_node="">
</span><font color="#990000" data-dcnode-id="494"><strong data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="493" instrument_node=""> </span><em data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Swiss</span></em><br data-dcnode-id="490"><span data-dcnode-id="489" instrument_node="">
</span><font color="#61380B" data-dcnode-id="486"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Known for:</span></strong></font><span data-dcnode-id="485" instrument_node=""> </span><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Helped coin the term “supernova”</span></em><br data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">
Zwicky studied nearby galaxies extensively to search for supernovas. In just four years, he found 18 of them. Before his work, only about 12 supernovas had been found in the history of astronomy.</span></td></tr><tr data-dcnode-id="475"></tr></tbody><tbody data-dcnode-id="376"><tr data-dcnode-id="460"><td class="imagepart" data-dcnode-id="468"><a class="fancybox image" data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/George-Gamow.jpg"><img alt="George Gamow" class="alignnone size-thumbnail wp-image-55049" data-dcnode-id="470" height="200" loading="lazy" sizes="(max-width: 149px) 100vw, 149px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/George-Gamow-149x200.jpg&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/George-Gamow-149x200.jpg 149w, https://totallyhistory.com/wp-content/uploads/2013/06/George-Gamow-235x314.jpg 235w, https://totallyhistory.com/wp-content/uploads/2013/06/George-Gamow-298x400.jpg 298w, https://totallyhistory.com/wp-content/uploads/2013/06/George-Gamow-175x235.jpg 175w, https://totallyhistory.com/wp-content/uploads/2013/06/George-Gamow.jpg 717w" width="149"></a></td><td class="imagepart" data-dcnode-id="465"><img alt="ClydeTombaugh2" class="alignnone size-thumbnail wp-image-55041" data-dcnode-id="466" height="200" loading="lazy" sizes="(max-width: 137px) 100vw, 137px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//totallyhistory.com/wp-content/uploads/2013/06/ClydeTombaugh2-137x200.gif&amp;raw" srcset="https://totallyhistory.com/wp-content/uploads/2013/06/ClydeTombaugh2-137x200.gif 137w, https://totallyhistory.com/wp-content/uploads/2013/06/ClydeTombaugh2-161x235.gif 161w" width="137"></td><td class="imagepart" data-dcnode-id="462"><img alt="Thomas_Gold" class="alignnone size-thumbnail wp-image-55061" data-dcnode-id="463" height=" </span><font color="#990000" data-dcnode-id="449"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Nationality:</span></strong></font><span data-dcnode-id="448" instrument_node=""> </span><em data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Russian</span></em><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">
