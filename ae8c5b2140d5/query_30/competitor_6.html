</span><header class="entry-header" data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Victorian Era Astronomy: Telescopes, Society, Hypothesis, Famous Astonomers</span></h1><span data-dcnode-id="500" instrument_node="">
</span></header><span data-dcnode-id="497" instrument_node="">
</span><div class="entry-content" data-dcnode-id="410"><span data-dcnode-id="496" instrument_node="">
</span><div class="at-above-post-page addthis_tool" data-dcnode-id="495" data-url="http://victorian-era.org/astronomy-during-victorian-era.html"></div><p data-dcnode-id="491"><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/astronomy-during-victorian-era.html"><span data-dcnode-id="494" instrument_node="">Astronomy </span></a><span data-dcnode-id="492" instrument_node="">in continental Europe was funded by rulers. On the contrary, Victorian government did not fund research in astronomy.&nbsp;It was Victorian affluent amateurs who showed interest in astronomy.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Their riches founded learned societies, commissioned telescopes and constructed observatories. Although there are not many records of these amateur societies, it is accepted that new telescope technology and deeper observations helped for one of the major theories in astronomy called The Nebular Hypothesis.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><img alt="Victorian Astronomy" class="alignnone size-full wp-image-3897" data-dcnode-id="486" height="401" loading="lazy" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/Victorian-Astronomy.jpg&amp;raw" srcset="http://victorian-era.org/images/Victorian-Astronomy.jpg 500w, http://victorian-era.org/images/Victorian-Astronomy-300x241.jpg 300w" width="500"></p><div class="code-block code-block-3" data-dcnode-id="478" style="margin: 8px 0; clear: both;"><span data-dcnode-id="484" instrument_node="">
</span><span data-dcnode-id="482" instrument_node="">
</span><div data-dcnode-id="481" id="ezoic-pub-ad-placeholder-114"></div><span data-dcnode-id="480" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">This name was suggested by William Whewell in his Bridgewater Treatise. This was as a result of inspiration from the theory of the Origins of the Solar System by Pierre-Simon Laplace in his System of the World (1796) and William Herschel’s findings that nebulae might be new nascent solar systems.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">The nebular hypothesis appeared in a couple of popular works: Views of the Architecture of the Heavens (1837) and Vestiges of the Natural History of Creation (1844).&nbsp;George Biddell Airy (1801-92) was an Astronomer Royal at the Royal Observatory in Greenwich from 1835 to 1881.</span></p><div class="code-block code-block-4" data-dcnode-id="465" style="margin: 8px 0; clear: both;"><span data-dcnode-id="471" instrument_node="">
</span><span data-dcnode-id="469" instrument_node="">
</span><div data-dcnode-id="468" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="464" instrument_node="">
</span><figure aria-describedby="caption-attachment-4700" class="wp-caption alignnone" data-dcnode-id="460" id="attachment_4700" style="width: 570px"><img alt="Victorian Astronomy Book" class="size-full wp-image-4700" data-dcnode-id="463" height="633" loading="lazy" sizes="(max-width: 570px) 100vw, 570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//victorian-era.org/images/VictorianAstronomybook.jpg&amp;raw" srcset="http://victorian-era.org/images/VictorianAstronomybook.jpg 570w, http://victorian-era.org/images/VictorianAstronomybook-270x300.jpg 270w, http://victorian-era.org/images/VictorianAstronomybook-450x500.jpg 450w" width="570"><figcaption class="wp-caption-text" data-dcnode-id="461" id="caption-attachment-4700"><span data-dcnode-id="462" instrument_node="">Victorian Astronomy Book</span></figcaption></figure><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">He transformed it, installing advanced astronomical equipment and expanding staff. He popularised the idea of clocking in and out of observers and astronomers, just as in a manufacturing setup. Further reforms by Airy helped to increase efficiency and improve accuracy by reduction of human errors in observations.</span></p><span data-dcnode-id="456" instrument_node="">
