"">We acknowledge the support of ISSI for several meetings held in Berne, which were very well organised by Silvia Wenger and Jennifer Zaugg.</span></p><p data-dcnode-id="3570" id="p1010"><span data-dcnode-id="3571" instrument_node="">During the preparation of this report we have consulted with many colleagues and people from the astronomy and astrophysics community involved in space science, and we acknowledge all of them. Several have made important contributions to the preparation of the report and we wish to mention the following people explicitly: Angela Bazzano, Johan Bleeker, Joao Braga, Iver Cairns, Parizia Caraveo, Jean Clavel, Martin Elvis, Josh Grindlay, Wim Hermsen, Chryssa Kouveliotou, Miguel Mass, Luigi Piro, Jean Pierre Roques, Ravi K. Sood, Mike Watson, Jean-Claude Worms, Sergio Volonte’, Peter von Ballmoos and Martin Weisskopf.</span></p><p data-dcnode-id="3568" id="p1015"><span data-dcnode-id="3569" instrument_node="">PU is grateful to Alvaro Gimenez and Jon Morse for very useful discussions and advice. Finally, a special thanks to Mrs. Catia Spalletta for her professional and timely production of the manuscript.</span></p></section><div class="Appendices" data-dcnode-id="3031"><section data-dcnode-id="3522" id="s0505"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3561"><span data-dcnode-id="3566" instrument_node="">Appendix A</span><span data-dcnode-id="3564" instrument_node="">. </span><span data-dcnode-id="3562" instrument_node="">The Astronet Report</span></h2><section data-dcnode-id="3523" id="s0510"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3555"><span data-dcnode-id="3560" instrument_node="">A.1</span><span data-dcnode-id="3558" instrument_node="">. </span><span data-dcnode-id="3556" instrument_node="">Preface</span></h3><p data-dcnode-id="3528" id="p1020"><span data-dcnode-id="3554" instrument_node="">Astronomy is the study of everything beyond Earth. It is a science driven by observations, with links to mathematics, physics, chemistry, computer science, geophysics, material science and biology. Astronomy is important for society and culture, and helps attract young people to the physical sciences. The field benefits from and also drives advances in technology. As a result, it is now possible to study objects which are so far away that they are seen at a time when the Universe was only 5% of its present age, and – perhaps even more astoundingly – to detect and characterise planets orbiting other stars, and to search for evidence of life. European astronomers have access to a range of observational facilities on the ground and in space. Plans are being made for a next generation of facilities, which would continue to exploit the rapid advances in, e.g., adaptive optics, detector sensitivity, computing capabilities, and in the ability to construct large precision structures, sending probes to Solar System objects, and even bring back samples from some of them. Realizing all the plans and dreams would require substantial investments by national and international funding agencies, with significant long-term commitments for operations. For this reason, funding agencies from a number of European countries established ASTRONET, an ERA-net with financial support from the European Union, to develop a comprehensive strategic plan for European astronomy covering the ambitions of all of astronomy, ground and space, including links with neighbouring fields, to establish the most effective approach towards answering the highest priority scientific questions. The first step is the development of an integrated Science Vision with strong community involvement, which identifies the key astronomical questions which may be answered in the next 20</span><span data-dcnode-id="3552" instrument_node="">&nbsp;</span><span data-dcnode-id="3550" instrument_node="">years by a combination of observations, simulations, laboratory experiments, interpretation and theory. The next step is to construct a Road Map which defines the required infrastructures and technological developments, leading to an implementation plan. To this end, the ASTRONET Board appointed a Science Vision Working Group and an Infrastructure Road Map Working Group, both of them with supporting thematic panels. The Science Vision Working Group identified four key questions where significant advances and breakthroughs can be expected in the coming two decades:</span></p><dl class="list" data-dcnode-id="3529"><dt class="list-label" data-dcnode-id="3548"><span data-dcnode-id="3549" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3545"><p data-dcnode-id="3546" id="p1615"><span data-dcnode-id="3547" instrument_node="">Do we understand the extremes of the Universe?</span></p></dd><dt class="list-label" data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3540"><p data-dcnode-id="3541" id="p1620"><span data-dcnode-id="3542" instrument_node="">How do galaxies form and evolve?</span></p></dd><dt class="list-label" data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3535"><p data-dcnode-id="3536" id="p1625"><span data-dcnode-id="3537" instrument_node="">What is the origin and evolution of stars and planets?</span></p></dd><dt class="list-label" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="3530"><p data-dcnode-id="3531" id="p1630"><span data-dcnode-id="3532" instrument_node="">How do we (and the Solar System) fit in?</span></p></dd></dl><p></p><p data-dcnode-id="3524"><span data-dcnode-id="3527" instrument_node="">These are amongst the most fundamental questions in science and generate considerable interest in the general public. The Science Vision Working Group and four supporting panels brought together about 50 scientists with a good distribution of expertise, gender and nationalities. Each of the panels concentrated on one of the key questions, and established the approach, experiment or new facility needed to make progress. Much information already existed in national strategic plans, ESA’s Cosmic Vision, and the three ESA-ESO studies. This work led to specific scientific recommendations, which were incorporated in a draft version of the Science Vision, made available to the entire astronomical community in late 2006. The draft was discussed in-depth during a Symposium in Poitiers, January 23–25, 2007. Many of the 228 participants from 31 countries provided constructive input, and additional comments were received via a dedicated website. This led to further sharpening of the scientific requirements, an improved balance across the four main areas, and improvements in the text… Care was taken to describe these in a fairly generic way, focusing on the scientific requirements, and not to identify too closely with specific proposed implementations of missions or facilities, as this is the purview of the infrastructure Road Mapping activity that will follow. …summarises the main recommendations by thematic area, and distinguishes essential facilities or experiments, without which a certain scientific goal simply cannot be achieved, and complementary ones, which would go a long way towards answering the question, but may have their main scientific driver elsewhere… Activities needed across the four thematic areas are identified as well. In all cases, the focus is on the most promising avenues for scientific progress, without detailed consideration of cost or technological readiness, which are the subject of the infrastructure roadmapping. Some of the more ambitious facilities may take a significant time to develop, and in some case may only start to produce a scientific harvest towards the end of the 20</span><span data-dcnode-id="3526" instrument_node="">&nbsp;</span><span data-dcnode-id="3525" instrument_node="">year horizon. Exploration remains an integral component of the entire field, as many problems require investigation of large numbers of objects, all different. This leads naturally to searches and surveys with modest-sised telescopes, and follow-up by larger facilities, together with a strong programme of theory, numerical simulations and laboratory experiments. Progress relies on a healthy mix of approaches including imaging, spectroscopy and time-series analysis across the entire electromagnetic spectrum, in situ measurements in the Solar System, and use of particles and gravitational waves as additional messengers from celestial objects. Europe has the opportunity to lead the expected scientific harvest, if the Infrastructure Road Map leads to an effective and timely implementation of the plans outlined in the Science Vision. This is a very exciting prospect…</span></p></section></section><section data-dcnode-id="3032" id="s0515"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3516"><span data-dcnode-id="3521" instrument_node="">Appendix B</span><span data-dcnode-id="3519" instrument_node="">. </span><span data-dcnode-id="3517" instrument_node="">Acronyms</span></h2><p data-dcnode-id="3033" id="p1030"><span class="display" data-dcnode-id="3034"></span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3035" id="t0070"><div class="groups" data-dcnode-id="3036"><table data-dcnode-id="3037"><tbody data-dcnode-id="3038"><tr class="valign-top" data-dcnode-id="3511"><td class="align-left" data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">AGILE</span></td><td class="align-left" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">Astrorivelatore Gamma a Immagini LEggero</span></td></tr><tr class="valign-top" data-dcnode-id="3506"><td class="align-left" data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">AGN</span></td><td class="align-left" data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">Active Galactic Nucleus (or Nuclei)</span></td></tr><tr class="valign-top" data-dcnode-id="3501"><td class="align-left" data-dcnode-id="3504"><span data-dcnode-id="3505" instrument_node="">ALMA</span></td><td class="align-left" data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">Atacama Large Millimeter/submillimetre Array</span></td></tr><tr class="valign-top" data-dcnode-id="3496"><td class="align-left" data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Aquarius/SAC-D</span></td><td class="align-left" data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">Aquarius/Satlite de Aplicaciones Cientficas D (USA/Argentina)</span></td></tr><tr class="valign-top" data-dcnode-id="3491"><td class="align-left" data-dcnode-id="3494"><span data-dcnode-id="3495" instrument_node="">ASI</span></td><td class="align-left" data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Agenzia Spaziale Italiana (Italian Space Agency)</span></td></tr><tr class="valign-top" data-dcnode-id="3486"><td class="align-left" data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">ASTROSAT</span></td><td class="align-left" data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Indian multi-wavelength astronomy mission on an IRS-class satellite</span></td></tr><tr class="valign-top" data-dcnode-id="3481"><td class="align-left" data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">ATLAST</span></td><td class="align-left" data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">Advanced Technology Large Aperture Space Telescope (US study)</span></td></tr><tr class="valign-top" data-dcnode-id="3476"><td class="align-left" data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">AO</span></td><td class="align-left" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">Announcement of Opportunity</span></td></tr><tr cla data-dcnode-id="842" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="843"><div class="PageDivider" data-dcnode-id="935"></div><header data-dcnode-id="932" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Cited by (12)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="844"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="845"><ul data-dcnode-id="851"><li class="ListArticleItem" data-dcnode-id="914"><div class="sub-heading" data-dcnode-id="926"><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0273117719306441" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="930" id="citing-articles-article0-title"><span data-dcnode-id="931" instrument_node="">Dynamic modeling and multi-stage integrated control method of ultra-quiet spacecraft</span></h3></a><div class="article-source ellipsis" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">2020, Advances in Space Research</span></div></div><div class="buttons" data-dcnode-id="920"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="921" type="button"><span class="button-link-text" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="922" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="923"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="915"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="916" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="917"><p data-dcnode-id="918" id="sp005"><span data-dcnode-id="919" instrument_node="">Space telescope ultrahigh precision pointing control requires the spacecraft platform to provide an ultra-quiet working environment. Vibration isolator rejection control and the multi-stage integrated control method is believed to be one of the best methods to improve the space telescope attitude control performance. In this paper, the fine dynamics model of multi-stage spacecraft systems is presented and the multi-stage integrated controller design techniques are provided. Effectiveness of the multi-stage integrated control approach is demonstrated by both the numerical simulation and experiment results. An integrated design and demonstrated experimental environment is developed for high-fidelity control performance assessment. The verification experiments for the space telescope attitude control and vibration control are carried out. The results show that the pointing accuracy and stability of the line-of-sight (LOS) for space telescope are improved at least one order by the multi-stage integrated control method.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="896"><div class="sub-heading" data-dcnode-id="908"><a data-dcnode-id="911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168900218305564" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="912" id="citing-articles-article1-title"><span data-dcnode-id="913" instrument_node="">Radiation hardness test and characterization of a low-noise front-end readout ASIC in 180 nm CMOS technology for space X-ray survey</span></h3></a><div class="article-source ellipsis" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">2018, Nuclear Instruments and Methods in Physics Research, Section A: Accelerators, Spectrometers, Detectors and Associated Equipment</span></div></div><div class="buttons" data-dcnode-id="902"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="903" type="button"><span class="button-link-text" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="904" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="905"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="897"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="898" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="899"><p data-dcnode-id="900" id="d1e303"><span data-dcnode-id="901" instrument_node="">In this paper, we present total-ionization dose (TID) radiation hardness test methods and the analysis of experimental results of a low-noise front-end ASIC dedicated to CZT and/or Si-PIN detectors for X-ray surveys in space. A six-channel front-end readout prototype chip is designed and implemented in 180 nm CMOS process. The topology, circuit descriptions, and radiation-hardened-by-design techniques are firstly presented. Secondly, the radiation test apparatus, radiation test conditions, DUTs, test boards and the radiation test flow are introduced. Then, experimental results including the electrical performance before irradiation, key parameters including leakage current, gain, nonlinearity, and ENC slope after TID radiation are described and discussed. With the accumulation of the total dose, the leakage current is suppressed; the gain and the nonlinearity vary slightly; the noise performance is degraded. After the annealing process, the ASIC operates normally. However, the noise performance is degenerated. The ENC slope is twice than that before irradiation. It can be concluded that the proposed ASIC can resist total dose of 200 krad (Si) according to the radiation hardness assessment.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="885"><div class="sub-heading" data-dcnode-id="890"><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1038/s41598-018-38188-w" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="894" id="citing-articles-article2-title"><span data-dcnode-id="895" instrument_node="">Role of selenium addition to CdZnTe matrix for room-temperature radiation detector applications</span></h3></a><div class="article-source ellipsis" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">2019, Scientific Reports</span></div></div><div class="buttons" data-dcnode-id="889"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="886"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="887" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="888"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="874"><div class="sub-heading" data-dcnode-id="879"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.22616/ERDev2019.18.N419" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="883" id="citing-articles-article3-title"><span data-dcnode-id="884" instrument_node="">Role and value of user base around large-scale research facilities</span></h3></a><div class="article-source ellipsis" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">2019, Engineering for Rural Development</span></div></div><div class="buttons" data-
