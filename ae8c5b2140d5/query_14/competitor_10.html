node-id="4572" instrument_node="">53</span></sup></a><span data-dcnode-id="4569" instrument_node=""> would be an infrared space telescope led by the Japanese Space Agency JAXA. It would provide ’missing-link’ infrared coverage in the region of the spectrum between that seen by the ESA-NASA James Webb Space Telescope and the “ground based” ALMA telescope. SPICA would focus on the conditions for planet formation and distant young galaxies. The Japanese Space Infrared Telescope for Cosmology and Astrophysics (SPICA) mission is envisaged to be launched around 2018 and will carry a 3.2-m diameter telescope cooled to around 6</span><span data-dcnode-id="4568" instrument_node="">&nbsp;</span><span data-dcnode-id="4567" instrument_node="">K and a set of instruments covering 5–210</span><span data-dcnode-id="4566" instrument_node="">&nbsp;</span><span data-dcnode-id="4565" instrument_node="">microns. SPICA will be launched warm and cooled down in orbit by a combination of radiative cooling and on-board mechanical coolers. Unlike previous cryogenically cooled missions, its lifetime will therefore not be determined by a limited cryogen supply but by fuel for the attitude control system or component reliability. A lifetime of at least 5</span><span data-dcnode-id="4564" instrument_node="">&nbsp;</span><span data-dcnode-id="4563" instrument_node="">years is envisaged. A European contribution to SPICA is being developed in the form of the telescope (to be provided by ESA under an industrial procurement) and an FIR camera/spectrometer, SAFARI, to be provided by a Dutch-led consortium of European nationally-funded institutes with collaboration from Canada and Japan. SAFARI will have an imaging Fourier Transform Spectrometer, based on the Herschel-SPIRE design, with transition-edge superconducting (TES) detector arrays. In addition, SPICA will also carry a NIR camera and spectrometer, a Mid-IR Camera, and spectrograph, and possibly a US-provided submillimetre spectrometer. In September 2008, SPICA successfully passed its System Requirements Review in Japan, and is still on track for a confirmation of mission implementation. More recently SPICA received a strong endorsement in the 2010 US Decadal review, strengthening the probability of a NASA-provided instrument being included in the payload. Cooled single aperture missions have also been studied in the USA, e.g., SAFIR and CALISTO. In the event that SPICA proceeds through implementation, it is unlikely that these missions will be further developed.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4500" id="t0050"><span class="captions" data-dcnode-id="4555"><span data-dcnode-id="4556"><p data-dcnode-id="4557" id="sp275"><span class="label" data-dcnode-id="4560"><span data-dcnode-id="4561" instrument_node="">Table 10</span></span><span data-dcnode-id="4559" instrument_node="">. </span><span data-dcnode-id="4558" instrument_node="">SPICA: to discover the origins of galaxies, stars and planets.</span></p></span></span><div class="groups" data-dcnode-id="4501"><table data-dcnode-id="4502"><tbody data-dcnode-id="4503"><tr class="valign-top" data-dcnode-id="4550"><td class="align-left" data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">Theme</span></td><td class="align-left" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">What are the conditions for planet formation and the emergence of life? How does the solar system work? How did the universe originate and what is it made of?</span></td></tr><tr class="valign-top" data-dcnode-id="4545"><td class="align-left" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">Primary goal</span></td><td class="align-left" data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">Understanding how galaxies, stars and planets form and evolve as well as the interaction between the astrophysical processes that have led to the formation of our own solar system</span></td></tr><tr class="valign-top" data-dcnode-id="4540"><td class="align-left" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Targets</span></td><td class="align-left" data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Young gas giant planets, Protoplanetary disks, Galactic and extragalactic star forming regions Luminous IR galaxies, AGNs and starburst galaxies at high redshift. Deep cosmological surveys</span></td></tr><tr class="valign-top" data-dcnode-id="4533"><td class="align-left" data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">Wavelength</span></td><td class="align-left" data-dcnode-id="4534"><span data-dcnode-id="4537" instrument_node="">Medium to Far Infra-red (∼5–210</span><span data-dcnode-id="4536" instrument_node="">&nbsp;</span><span data-dcnode-id="4535" instrument_node="">μm)</span></td></tr><tr class="valign-top" data-dcnode-id="4526"><td class="align-left" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Telescope</span></td><td class="align-left" data-dcnode-id="4527"><span data-dcnode-id="4530" instrument_node="">3.5</span><span data-dcnode-id="4529" instrument_node="">&nbsp;</span><span data-dcnode-id="4528" instrument_node="">m Ritchey–Chrtien</span></td></tr><tr class="valign-top" data-dcnode-id="4521"><td class="align-left" data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4522"><span data-dcnode-id="4523" instrument_node="">L2</span></td></tr><tr class="valign-top" data-dcnode-id="4514"><td class="align-left" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="4515"><span data-dcnode-id="4518" instrument_node="">Minimum 5</span><span data-dcnode-id="4517" instrument_node="">&nbsp;</span><span data-dcnode-id="4516" instrument_node="">years</span></td></tr><tr class="valign-top" data-dcnode-id="4509"><td class="align-left" data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">JAXA–ESA</span></td></tr><tr class="valign-top" data-dcnode-id="4504"><td class="align-left" data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">M-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4488" id="s0395"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4494"><span data-dcnode-id="4497" instrument_node="">5.2.2.5</span><span data-dcnode-id="4496" instrument_node="">. </span><span data-dcnode-id="4495" instrument_node="">The M1 and M2 selection</span></h5><p data-dcnode-id="4489" id="p0700"><span data-dcnode-id="4493" instrument_node="">The M1/M2 selection has been completed in September 2011with the approval to completion of the Solar Orbiter and EUCLID satellites. The launch date are scheduled for the time frame 2017 and 2018, respectively (see </span><a class="workspace-trigger" data-dcnode-id="4491" href="#f0215" name="bf0215"><span data-dcnode-id="4492" instrument_node="">Fig. 43</span></a><span data-dcnode-id="4490" instrument_node=""> for details).</span></p></section><section data-dcnode-id="4474" id="s0400"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4484"><span data-dcnode-id="4487" instrument_node="">5.2.2.6</span><span data-dcnode-id="4486" instrument_node="">. </span><span data-dcnode-id="4485" instrument_node="">ESA Cosmic Vision selection for the M3 mission</span></h5><p data-dcnode-id="4482" id="p0705"><span data-dcnode-id="4483" instrument_node="">25 February 2011: Four candidates selected for the next medium-class mission in ESA’s Cosmic Vision Looking ahead to the next decade of scientific exploration, ESA has selected four candidates for a medium-class mission that will launch in the period 2020–2022. The candidates cover very different areas of scientific research, ranging from investigations of black holes and general relativity to near-Earth asteroid sample return and studies of planets orbiting distant stars.</span></p><p data-dcnode-id="4480" id="p0710"><span data-dcnode-id="4481" instrument_node="">ESA issued a call to the scientific community on 29 July, 2010, soliciting proposals for a third medium-class mission (M3) within the long-term science plan known as Cosmic Vision 2015–2025. A total of 47 proposals was submitted and then peer reviewed by the Advisory Structure to the Science Programme. As a result of this review process, recommendations based on the scientific excellence of the missions were forwarded by the Space Science Advisory Committee to David Southwood, ESA’s Director of Science and Robotic Exploration. ESA has now selected four missions to undergo an initial Assessment Phase. Once this is completed, a further down-selection will be performed, leading to a decision on which mission will be finally implemented.</span></p><p data-dcnode-id="4475" id="p0715"><span data-dcnode-id="4479" instrument_node="">The four proposals chosen to proceed for assessment are EChO, LOFT, MarcoPolo-R and STE-QUEST.</span><a class="workspace-trigger" data-dcnode-id="4476" href="#fn54" name="bfn54"><sup data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">54</span></sup></a></p></section><section data-dcnode-id="4463" id="s0405"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4470"><span data-dcnode-id="4473" instrument_node="">5.2.2.7</span><span data-dcnode-id="4472" instrument_node="">. </span><span data-dcnode-id="4471" instrument_node="">M3: Exoplanet Characterisation Observatory (EChO)</span></h5><p data-dcnode-id="4468" id="p0720"><span data-dcnode-id="4469" instrument_node="">The Exoplanet Characterisation Observatory (EChO) would be the first dedicated mission to investigate exoplanetary atmospheres, addressing the suitability of those planets for life and placing our Solar System in context.</span></p><p data-dcnode-id="4464" id="p0725"><span data-dcnode-id="4467" instrument_node="">Orbiting around the L2 Lagrange point, 1.5</span><span data-dcnode-id="4466" instrument_node="">&nbsp;</span><span data-dcnode-id="4465" instrument_node="">million km from Earth in the anti-sunward direction, EChO would provide high resolution, multi-wavelength spectroscopic observations. It would measure the atmospheric composition, temperature and albedo of a representative sample of known exoplanets, constrain models of their internal structure and improve our understanding of how planets form and evolve.</span></p></section><section data-dcnode-id="4454" id="s0410"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4459"><span data-dcnode-id="4462" instrument_node="">5.2.2.8</span><span data-dcnode-id="4461" instrument_node="">. </span><span data-dcnode-id="4460" instrument_node="">M3: Large Observatory For X-ray Timing (LOFT)</span></h5><p data-dcnode-id="4457" id="p0730"><span data-dcnode-id="4458" instrument_node="">The Large Observatory For X-ray Timing (LOFT) is intended to answer fundamental questions about the motion of matter orbiting close to the event horizon of a black hole, and the state of matter in neutron stars, by detecting their very rapid X-ray flux and spectral variability.</span></p><p data-dcnode-id="4455" id="p0735"><span data-dcnode-id="4456" instrument_node="">LOFT would carry two instruments: a Large Area Detector with an effective area far larger than current spaceborne X-ray detectors, and a Wide Field Monitor that would monitor a large fraction of the sky. With its high spectral resolution, LOFT would revolutionise studies of collapsed objects in our Galaxy and of the brightest supermassive black holes in active galactic nuclei.</span></p></section><section data-dcnode-id="4445" id="s0415"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4450"><span data-dcnode-id="4453" instrument_node="">5.2.2.9</span><span data-dcnode-id="4452" instrument_node="">. </span><span data-dcnode-id="4451" instrument_node="">M3: MarcoPolo-R</span></h5><p data-dcnode-id="4448" id="p0740"><span data-dcnode-id="4449" instrument_node="">MarcoPolo-R is a mission to return a sample of material from a primitive near-Earth asteroid (NEA) for detailed analysis in “ground based” laboratories. The scientific data would help to answer key questions about the processes that occurred during planet formation and the evolution of the rocks which were the building blocks of terrestrial planets.</span></p><p data-dcnode-id="4446" id="p0745"><span data-dcnode-id="4447" instrument_node="">The mission would also reveal whether NEAs contain pre-solar material not yet found in meteorite samples, determine the nature and origin of the organic compounds they contain, and possibly shed light on the origin of molecules necessary for life.</span></p></section><section data-dcnode-id="4433" id="s0420"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4441"><span data-dcnode-id="4444" instrument_node="">5.2.2.10</span><span data-dcnode-id="4443" instrument_node="">. </span><span data-dcnode-id="4442" instrument_node="">M3: Space-Time Explorer and Quantum Equivalence Principle Space Test (STE-QUEST)</span></h5><p data-dcnode-id="4436" id="p0750"><span data-dcnode-id="4440" instrument_node="">The Space-Time Explorer and Quantum Equivalence Principle Space Test (STE-QUEST) is devoted to precise measurement of the effects of gravity on time and matter. Its main objective would be to test the Principle of Equivalence, a fundamental assumption of Einstein’s Theory of General Relativity. STE-QUEST would measure space-time curvature by comparing the tick rate of an atomic clock on the spacecraft with other clocks on the ground.</span><a class="workspace-trigger" data-dcnode-id="4437" href="#fn55" name="bfn55"><sup data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">55</span></sup></a></p><p data-dcnode-id="4434" id="p0755"><span data-dcnode-id="4435" instrument_node="">A second primary goal is a quantum test of the Universality of Free Fall – the theory that gravitational acceleration is universal, independent of the type of body.</span></p></section><section data-dcnode-id="4403" id="s0425"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4429"><span data-dcnode-id="4432" instrument_node="">5.2.2.11</span><span data-dcnode-id="4431" instrument_node="">. </span><span data-dcnode-id="4430" instrument_node="">A Cosmic Vision update</span></h5><p data-dcnode-id="4406" id="p0760"><span data-dcnode-id="4428" instrument_node="">The missions flown as part of ESA’s Cosmic Vision 2015–2025 plan will tackle some of the major outstanding scientific questions about the Universe and our place in it:</span></p><dl class="list" data-dcnode-id="4407"><dt class="list-label" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4423"><p data-dcnode-id="4424" id="p1525"><span data-dcnode-id="4425" instrument_node="">What are the conditions for planet formation and the emergence of life?</span></p></dd><dt class="list-label" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4418"><p data-dcnode-id="4419" id="p1530"><span data-dcnode-id="4420" instrument_node="">How does the Solar System work?</span></p></dd><dt class="list-label" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4413"><p data-dcnode-id="4414" id="p1535"><span data-dcnode-id="4415" instrument_node="">What are the fundamental physical laws of the Universe?</span></p></dd><dt class="list-label" data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4408"><p data-dcnode-id="4409" id="p1540"><span data-dcnode-id="4410" instrument_node="">How did the Universe originate and what is it made of?</span></p></dd></dl><p></p><p data-dcnode-id="4404" id="p0765"><span data-dcnode-id="4405" instrument_node="">There are currently three missions – Euclid, PLATO and Solar Orbiter – which are undergoing competitive assessment for selection as the first and second medium class missions under Cosmic Vision. The final selection for M1 and M2 will be made soon, with launches expected in 2017–2018.</span></p></section></section></section></section><section data-dcnode-id="3601" id="s0430"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4394"><span data-dcnode-id="4399" instrument_node="">6</span><span data-dcnode-id="4397" instrument_node="">. </span><span data-dcnode-id="4395" instrument_node="">The role and plan of the National Agencies</span></h2><p data-dcnode-id="4392" id="p0770"><span data-dcnode-id="4393" instrument_node="">In this section we briefly report the future role and plan, when available, of some national agencies.</span></p><section data-dcnode-id="4314" id="s0435"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4386"><span data-dcnode-id="4391" instrument_node="">6.1</span><span data-dcnode-id="4389" instrument_node="">. </span><span data-dcnode-id="4387" instrument_node="">The Japan Space Astronomy Plan: JAXA Long Term Vision</span></h3><p data-dcnode-id="4335" id="p0775"><span data-dcnode-id="4385" instrument_node="">In 2005, JAXA published a Long Term Vision that included orbiting observatories at every wavelength band for the coming decade. Three basic themes were included as follows:</span></p><dl class="list" data-dcnode-id="4336"><dt class="list-label" data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="4369"><p data-dcnode-id="4370" id="p1860"><span data-dcnode-id="4382" instrument_node="">Structure and history of the Universe</span></p><dl class="list" data-dcnode-id="4371"><dt class="list-label" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4377"><p data-dcnode-id="4378" id="p1865"><span data-dcnode-id="4379" instrument_node="">First galaxies, first black holes, co-evolution of galaxies and black holes.</span></p></dd><dt class="list-label" data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4372"><p data-dcnode-id="4373" id="p1870"><span data-dcnode-id="4374" instrument_node="">Formation of large scale structure, clusters of galaxies.</span></p></dd></dl><p></p></dd><dt class="list-label" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="4353"><p data-dcnode-id="4354" id="p1875"><span data-dcnode-id="4366" instrument_node="">Physics in extreme conditions</span></p><dl class="list" data-dcnode-id="4355"><dt class="list-label" data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4361"><p data-dcnode-id="4362" id="p1880"><span data-dcnode-id="4363" instrument_node="">Physics of black holes and in their vicinity, verification of general relativity.</span></p></dd><dt class="list-label" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4356"><p data-dcnode-id="4357" id="p1885"><span data-dcnode-id="4358" instrument_node="">Cosmic ray acceleration, equation of state of neutron stars.</span></p></dd></dl><p></p></dd><dt class="list-label" data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="4337"><p data-dcnode-id="4338" id="p1890"><span data-dcnode-id="4350" instrument_node="">Composition of the Universe</span></p><dl class="list" data-dcnode-id="4339"><dt class="list-label" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4345"><p data-dcnode-id="4346" id="p1895"><span data-dcnode-id="4347" instrument_node="">Dark matter, dark energy (through galaxy clusters).</span></p></dd><dt class="list-label" data-dcnode-id="4343"><span data-dcnode-id="4344" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4340"><p data-dcnode-id="4341" id="p1900"><span data-dcnode-id="4342" instrument_node="">History of matter and its chemical composition, planets, and life.</span></p></dd></dl><p></p></dd></dl><p></p><p data-dcnode-id="4317"><span data-dcnode-id="4334" instrument_node="">JAXA’s currently approved astronomy projects include:</span></p><dl class="list" data-dcnode-id="4318"><dt class="list-label" data-dcnode-id="4332"><span data-dcnode-id="4333" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4329"><p data-dcnode-id="4330" id="p1575"><span data-dcnode-id="4331" instrument_node="">ASTRO-H (2014, X-ray astronomy).</span></p></dd><dt class="list-label" data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4324"><p data-dcnode-id="4325" id="p1580"><span data-dcnode-id="4326" instrument_node="">ASTRO-G (space VLBI).</span></p></dd><dt class="list-label" data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4319"><p data-dcnode-id="4320" id="p1585"><span data-dcnode-id="4321" instrument_node="">SPICA (in pre-project phase, undergoing feasibility study).</span></p></dd></dl><p></p><p data-dcnode-id="4315" id="p0780"><span data-dcnode-id="4316" instrument_node="">No further missions have been approved by the Steering Committee for Space Science of ISAS. In 2008–2009 the astronomy and astrophysics division of the Japanese Science Council conducted a survey for large and/or medium astrophysics projects. In 2010, this group recommended three projects, two “ground based” observatories and 1 space observatory, to be promoted on the national scale. These were LCGT (Underground Gravity Wave Telescope), ELT, and SPICA. These do not have strong obligations on the government and JAXA. Funding for LCGT was approved in 2010.</span></p></section><section data-dcnode-id="4128" id="s0440"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4308"><span data-dcnode-id="4313" instrument_node="">6.2</span><span data-dcnode-id="4311" instrument_node="">. </span><span data-dcnode-id="4309" instrument_node="">Future Space Astronomy Programmes in China</span></h3><section data-dcnode-id="4299" id="s0445"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4302"><span data-dcnode-id="4307" instrument_node="">6.2.1</span><span data-dcnode-id="4305" instrument_node="">. </span><span data-dcnode-id="4303" instrument_node="">Road Maps and Plans</span></h4><p data-dcnode-id="4300" id="p0790"><span data-dcnode-id="4301" instrument_node="">Over the last several years a number of reports, road maps and plans including future space astronomy programmes have been proposed in China by various working groups, committees and panels, including “Space Science &amp; Technology in China: A Road Map to 2050”, “Medium and Long Term Development Plan for Space Science Missions” (study funded by Chinese Academy of Sciences), “Report of Strategic Study on Mid- and Long-Term Development of Astronomy in China” (study jointly funded by Chinese Academy of Sciences and National Natural Science Foundation of China), “Report on the Development of Astronomy in China” (study funded by the Association of Science and technology in China) and the “2011–2016 Space Science Plan of China’s National Space Agency”. This section summarises the future space astronomy programmes listed in these documents and provides a description of missions funded, approved, selected or under-study.</span></p></section><section data-dcnode-id="4281" id="s0450"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4293"><span data-dcnode-id="4298" instrument_node="">6.2.2</span><span data-dcnode-id="4296" instrument_node="">. </span><span data-dcnode-id="4294" instrument_node="">Summary of China’s Space Astronomy Programmes</span></h4><p data-dcnode-id="4288" id="p0795"><span data-dcnode-id="4292" instrument_node="">Black Hole Probe Programme (BHP): The objective of this programme is to study high-energy processes of cosmic objects and black hole physics through observations of compact objects such as all kinds of black holes and </span><em data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">γ</span></em><span data-dcnode-id="4289" instrument_node="">-ray bursts. The programme will explore the extreme physical processes and laws in the universe using extreme objects such as black holes as examples of how stars and galaxies evolve. The main missions will include the Hard X-ray Modulation Telescope (HXMT) satellite, the Space Variable Objects Monitor (SVOM) satellite, and the Gamma-ray Burst Polarisation (POLAR) experiment on board China’s Spacelab.</span></p><p data-dcnode-id="4286" id="p0800"><span data-dcnode-id="4287" instrument_node="">Diagnostics of Astro-Oscillations (DAO) Programme: The objective of this programme is to make high precision photometric and timing measurements of electromagnetic radiation in various wavebands and non-electromagnetic radiation, in order to understand the internal structures of various astrophysical objects and the processes of various violent activities. The main missions will include the X-ray Timing and Polarisation (XTP) satellite, and possible participation in relevant international missions.</span></p><p data-dcnode-id="4284" id="p0805"><span data-dcnode-id="4285" instrument_node="">Portraits of Astrophysical Objects Programme (PAO): The objective of this programme is to obtain direct photographs (portraits) of astrophysical objects beyond the solar system such as solar-like stars, exoplanets, white dwarfs, neutron stars, and black holes which are essential for understanding scientific questions such as the construction of the universe. The main mission will include the proposed submillimetre Space Very Long Baseline Interferometer (VLBI) telescope array.</span></p><p data-dcnode-id="4282" id="p0810"><span data-dcnode-id="4283" instrument_node="">Dark Matter Detection Programme (DMD): This programme is based on space platforms to detect the products of dark matter annihilation predicted in various theoretical models. The main mission will include the dark matter particle detection satellite and dark matter particle detection experiment aboard China’s manned space station to be operational around 2012.</span></p></section><section data-dcnode-id="4236" id="s0455"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4275"><span data-dcnode-id="4280" instrument_node="">6.2.3</span><span data-dcnode-id="4278" instrument_node="">. </span><span data-dcnode-id="4276" instrument_node="">Missions from 2011 to 2015</span></h4><p data-dcnode-id="4273" id="p0815"><span data-dcnode-id="4274" instrument_node="">Selected and funded missions:</span></p><p data-dcnode-id="4271" id="p0820"><span data-dcnode-id="4272" instrument_node="">Gamma-ray Burst Polarisation (POLAR) experiment on board China’s Spacelab: 2012–2013 launch.</span></p><p data-dcnode-id="4259" id="p0825"><span data-dcnode-id="4270" instrument_node="">This experiment consists of a stack of plastic scintillators for measuring the linear polarisation of prompt </span><em data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">γ</span></em><span data-dcnode-id="4267" instrument_node="">-rays from bright </span><em data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">γ</span></em><span data-dcnode-id="4264" instrument_node="">-ray bursts (GRB), between 50 and 300</span><span data-dcnode-id="4262" instrument_node="">&nbsp;</span><span data-dcnode-id="4260" instrument_node="">keV. This experiment is being conducted in collaboration with a Switzerland-led (Geneva and ISDC) European team.</span></p><p data-dcnode-id="4237" id="p0830"><span data-dcnode-id="4258" instrument_node="">Space Variable Objects Monitor (SVOM) satellite: 2014–2015 launch. This monitor consists of four instruments: Coded-mask ECLAIRs as a GRB imager and trigger between 5 and 150</span><span data-dcnode-id="4256" instrument_node="">&nbsp;</span><span data-dcnode-id="4254" instrument_node="">keV, GRM for GRB spectral measurement and trigger between 30</span><span data-dcnode-id="4252" instrument_node="">&nbsp;</span><span data-dcnode-id="4250" instrument_node="">keV and 1</span><span data-dcnode-id="4248" instrument_node="">&nbsp;</span><span data-dcnode-id="4246" instrument_node="">MeV, a 21</span><span data-dcnode-id="4244" instrument_node="">&nbsp;</span><span data-dcnode-id="4242" instrument_node="">cm aperture X-ray telescope and a 45</span><span data-dcnode-id="4240" instrument_node="">&nbsp;</span><span data-dcnode-id="4238" instrument_node="">cm aperture optical telescope for GRB localisation and afterglow observations. This monitor is being developed in collaboration with France. It has been selected and is a fully funded mission.</span></p></section><section data-dcnode-id="4167" id="s0460"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4230"><span data-dcnode-id="4235" instrument_node="">6.2.4</span><span data-dcnode-id="4233" instrument_node="">. </span><span data-dcnode-id="4231" instrument_node="">Selected and fully funded missions</span></h4><p data-dcnode-id="4187" id="p0835"><span data-dcnode-id="4229" instrument_node="">Hard X-ray Modulation Telescope (HXMT) satellite: 2014–2015 launch. This telescope consists of three sets of collimated (about 1</span><span data-dcnode-id="4227" instrument_node="">&nbsp;</span><span data-dcnode-id="4225" instrument_node="">degree by 6</span><span data-dcnode-id="4223" instrument_node="">&nbsp;</span><span data-dcnode-id="4221" instrument_node="">degree FOV) instruments, high energy instruments between 20 and 250</span><span data-dcnode-id="4219" instrument_node="">&nbsp;</span><span data-dcnode-id="4217" instrument_node="">keV of about 5000</span><span data-dcnode-id="4215" instrument_node="">&nbsp;</span><span data-dcnode-id="4213" instrument_node="">cm</span><sup data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">2</span></sup><span data-dcnode-id="4210" instrument_node=""> (NaI/CsI phoswitch), medium energy instruments between 5 and 300</span><span data-dcnode-id="4208" instrument_node="">&nbsp;</span><span data-dcnode-id="4206" instrument_node="">keV of about 1000</span><span data-dcnode-id="4204" instrument_node="">&nbsp;</span><span data-dcnode-id="4202" instrument_node="">cm</span><sup data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">2</span></sup><span data-dcnode-id="4199" instrument_node=""> (Si-PIN), and low energy instruments between 1 and 15</span><span data-dcnode-id="4197" instrument_node="">&nbsp;</span><span data-dcnode-id="4195" instrument_node="">keV of about 400</span><span data-dcnode-id="4193" instrument_node="">&nbsp;</span><span data-dcnode-id="4191" instrument_node="">cm</span><sup data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">2</span></sup><span data-dcnode-id="4188" instrument_node=""> (SCD). The main scientific goals include a broadband wide-area survey and pointed observations of compact galactic objects.</span></p><p data-dcnode-id="4185" id="p0840"><span data-dcnode-id="4186" instrument_node="">Dark matter and cosmic ray detection satellite: 2014–2015 launch.</span></p><p data-dcnode-id="4168" id="p0845"><span data-dcnode-id="4184" instrument_node="">This satellite consists of a stack of charged particle detector and calorimeter of 1.2</span><span data-dcnode-id="4182" instrument_node="">&nbsp;</span><span data-dcnode-id="4180" instrument_node="">ton payload mass, aiming for the detection of the annihilation and decay products (electrons, positrons and </span><em data-dcnode-id="4178"><span data-dcnode-id="4179" instrument_node="">γ</span></em><span data-dcnode-id="4177" instrument_node="">-rays) of suspected dark matter particles, as well as the determination of a precision cosmic ray spectrum, between 5</span><span data-dcnode-id="4175" instrument_node="">&nbsp;</span><span data-dcnode-id="4173" instrument_node="">GeV and 1</span><span data-dcnode-id="4171" instrument_node="">&nbsp;</span><span data-dcnode-id="4169" instrument_node="">TeV.</span></p></section><section data-dcnode-id="4129" id="s0465"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4161"><span data-dcnode-id="4166" instrument_node="">6.2.5</span><span data-dcnode-id="4164" instrument_node="">. </span><span data-dcnode-id="4162" instrument_node="">Mid-Long Term Missions Funded for Development and Study</span></h4><p data-dcnode-id="4148" id="p0850"><span data-dcnode-id="4160" instrument_node="">Moderate funding is provided for key technology development and conceptual studies which may lead to future missions. Several conceptual studies are fundedannually, and at the conclusion of these studies some missions may be funded for key technology development. At the present time, the following are funded for key technology development:</span></p><dl class="list" data-dcnode-id="4149"><dt class="list-label" data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4155"><p data-dcnode-id="4156" id="p1590"><span data-dcnode-id="4157" instrument_node="">X-ray Timing and Polarisation (XTP) satellite: launch around 2020 with instruments including large arrays of soft X-ray and hard X-ray telescopes to achieve several meter squared sensitive area, and X-ray polarimeter telescopes, for high throughput X-ray observations.</span></p></dd><dt class="list-label" data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4150"><p data-dcnode-id="4151" id="p1595"><span data-dcnode-id="4152" instrument_node="">Dark matter and cosmic ray observatory on board China’s Space Station with a projected 2020–2022 launch.</span></p></dd></dl><p></p><p data-dcnode-id="4130"><span data-dcnode-id="4147" instrument_node="">The following are funded for conceptual studies:</span></p><dl class="list" data-dcnode-id="4131"><dt class="list-label" data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4142"><p data-dcnode-id="4143" id="p1600"><span data-dcnode-id="4144" instrument_node="">Infrared sky survey small satellite mission.</span></p></dd><dt class="list-label" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4137"><p data-dcnode-id="4138" id="p1605"><span data-dcnode-id="4139" instrument_node="">Fast photometry observation mission from optical to X-ray bands.</span></p></dd><dt class="list-label" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4132"><p data-dcnode-id="4133" id="p1610"><span data-dcnode-id="4134" instrument_node="">Submillimetre space VLBI mission.</span></p></dd></dl><p></p></section></section><section data-dcnode-id="4077" id="s0470"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4122"><span data-dcnode-id="4127" instrument_node="">6.3</span><span data-dcnode-id="4125" instrument_node="">. </span><span data-dcnode-id="4123" instrument_node="">The Indian Space science programme</span></h3><section data-dcnode-id="4078" id="s0475"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4116"><span data-dcnode-id="4121" instrument_node="">6.3.1</span><span data-dcnode-id="4119" instrument_node="">. </span><span data-dcnode-id="4117" instrument_node="">Space Astronomy in India: the 2010–2020 vision</span></h4><p data-dcnode-id="4094" id="p0860"><span data-dcnode-id="4115" instrument_node="">The availability of opportunities in space astronomy in India have been generally linked to the indigenous rocket development programme, and the rocket load-carrying capacities and the 5-year plan funding of ISRO, the nodal agency for the space activities in India. The PSLV rocket, which is the work horse of the Indian remote sensing satellites, has the capability to put 1500</span><span data-dcnode-id="4113" instrument_node="">&nbsp;</span><span data-dcnode-id="4111" instrument_node="">kg in orbit and is the key vehicle for science experiments today. There is no formal Road Map for the space astronomy missions in ISRO; the missions are approved on an ad-hoc case-bycase basis. In recent years, ISRO launched the Moon mission Chandrayaan-1, and ASTROSAT, a multi-wavelength astronomy satellite carrying a suite of instruments is due for launch next year. Several small missions in astronomy have been funded for development. These include an IR astronomy satellite, the Coronagraph mission Aditya and a solar spectrograph mission. Chandrayaan-2 is also in preparation, as are future planetary probes. Both Chandrayaan and ASTROSAT were conceived as multi-instrument satellites carrying a suite of instruments for a variety of observations; other payloads are planned as small co-passenger missions. In the 2004, a committee appointed by the Indian Academy of Sciences in Bangalore, submitted the Decadal Vision Document for Astronomy and Astrophysics, which was the first such exercise undertaken in India. The committee noted that, given the relatively small size of the Indian astronomical community and the large range of research activities,there are no discernible thrust areas and many of the existing experimental efforts in space astronomy are sub-optimal. After surveying the ongoing research, critically assessing the contributions made in the past in various areas and evaluating their impact and the future directions in different areas worldwide, some key developments were recommended:</span></p><dl class="list" data-dcnode-id="4095"><dt class="list-label" data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="4106"><p data-dcnode-id="4107" id="p1905"><span data-dcnode-id="4108" instrument_node="">Multi-wavelength astronomy as a niche area.</span></p></dd><dt class="list-label" data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="4101"><p data-dcnode-id="4102" id="p1910"><span data-dcnode-id="4103" instrument_node="">Some modest new initiatives in “ground based” and space astronomy and technology initiatives.</span></p></dd><dt class="list-label" data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="4096"><p data-dcnode-id="4097" id="p1915"><span data-dcnode-id="4098" instrument_node="">Participation in large international projects.</span></p></dd></dl><p></p><p data-dcnode-id="4089"><span data-dcnode-id="4093" instrument_node="">The prioritised list of recommended space-based initiatives include a small solar coronagraph and a Near Infrared Spectro-photometer, while the prioritised list of technology initiatives suggested were detector development for </span><em data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">γ</span></em><span data-dcnode-id="4090" instrument_node="">-rays, hard X-rays and infrared; hard X-ray mirrors: X-ray polarimeter; and space platforms for fundamental physics experiments. While recommending the participation in international projects, the committee noted that multinational collaboration is the new paradigm in big science. This is going to be true in all branches of astronomy. Therefore, the Indian scientists have no option but to participate in future international ventures. While it was noted that they must pursue their own projects, they felt they must exploit every opportunity to collaborate in major international projects. The necessary expertise which will empower them to do so must be developed. Since the Academy’s recommendations are used as the guiding principals by ISRO when deciding on the future missions, therefore, the Indian Space astronomy programme will only be targeted to small missions in different areas of astronomy. ISRO has, however, always encouraged participation with the international groups even in such missions. For example, Chanrayaan-1, ASTROSAT and the IR satellite have foreign participation. For large missions, ISRO will work together with other agencies if supported by the Indian Astronomy community.</span></p><p data-dcnode-id="4083" id="p0865"><span data-dcnode-id="4088" instrument_node="">There are future considered astronomical satellites considered for two medium class missions of ISRO.</span><a class="workspace-trigger" data-dcnode-id="4085" href="#fn56" name="bfn56"><sup data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">56</span></sup></a><span data-dcnode-id="4084" instrument_node=""> Aditya-1 is proposed to be a space-based Solar Coronagraph to study the solar corona in visible and near-IR bands. The launch of the Aditya mission is planned during the next high solar activity period in 2014. The main objective is to study the Coronal Mass Ejections (CME) and consequently the crucial physical parameters for space weather such as the coronal magnetic field structures, evolution of the coronal magnetic field, etc. This will provide completely new information on the velocity fields and their variability in the inner corona which have an important knowledge to address the unsolved question of how the corona is heated.</span></p><p data-dcnode-id="4079" id="p0870"><span data-dcnode-id="4082" instrument_node="">A Thomson X-ray polarimeter has been developed for a small satellite mission. The instrument works in the 5–30</span><span data-dcnode-id="4081" instrument_node="">&nbsp;</span><span data-dcnode-id="4080" instrument_node="">keV band and will be suitable for X-ray polarisation measurements in many hard X-ray sources. The accretion-powered X-ray pulsars, black hole X-ray binaries, rotation-powered pulsars and non-thermal supernova remnants will be the prime targets for this mission. In spite of its moderate sensitivity, this experiment will give an unique opportunity to expand the field of X-ray astronomy into a hitherto unexplored dimension.</span></p></section></section><section data-dcnode-id="3634" id="s0480"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4071"><span data-dcnode-id="4076" instrument_node="">6.4</span><span data-dcnode-id="4074" instrument_node="">. </span><span data-dcnode-id="4072" instrument_node="">The Russian Space Science programme</span></h3><p data-dcnode-id="4065" id="p0880"><span data-dcnode-id="4070" instrument_node="">At the present time, Russian scientific space missions are being developed based on the 10-year Federal space programme for the 2006–2015 period. The Russian Federal Space Agency, Roscosmos, is responsible for the implementation of this programme. It is planned that during 2011 the space programme will be corrected for the period 2013–2015 and new tasks will be formulated for the 5-year period 2016–2020, or even possibly for the 10</span><span data-dcnode-id="4068" instrument_node="">&nbsp;</span><span data-dcnode-id="4066" instrument_node="">year period 2016–2025. In the current programme, the manned space flight programme associated with the International Space Station support has the highest priority. Half of the available financial resources are being allocated to the human space flight programme. The other half goes to telecommunications, remote sensing and scientific research satellites.</span></p><p data-dcnode-id="4063" id="p0885"><span data-dcnode-id="4064" instrument_node="">The Global Navigation System (GLONAS) has its own separate programme.</span></p><p data-dcnode-id="4030" id="p0890"><span data-dcnode-id="4062" instrument_node="">The scientific space programme is being realised as a rule according to the interest of the Russian Academy of Sciences and covers the following directions:</span></p><dl class="list" data-dcnode-id="4031"><dt class="list-label" data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="4057"><p data-dcnode-id="4058" id="p1920"><span data-dcnode-id="4059" instrument_node="">Planetary research – projects: Phobos-Soil (2011), Luna-Resource (2013), Luna-Glob (2013).</span></p></dd><dt class="list-label" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="4052"><p data-dcnode-id="4053" id="p1925"><span data-dcnode-id="4054" instrument_node="">Extraterrestrial astronomy: Spectrum-Radioastron (2011), Spectrum-Ultraviolet (2014), Spectrum-Roentgen-Gamma (2013), Gamma-400 (after 2015), Millimetron (after 2015).</span></p></dd><dt class="list-label" data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="4047"><p data-dcnode-id="4048" id="p1930"><span data-dcnode-id="4049" instrument_node="">Sun – Interhelioprobe (after 2015).</span></p></dd><dt class="list-label" data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="4042"><p data-dcnode-id="4043" id="p1935"><span data-dcnode-id="4044" instrument_node="">Cosmic rays – Resurs-DK/Pamela (it is operating on the orbit from 2006), “Lomonosov”.</span></p></dd><dt class="list-label" data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="4037"><p data-dcnode-id="4038" id="p1940"><span data-dcnode-id="4039" instrument_node="">Plasma physics – Resonance (2013).</span></p></dd><dt class="list-label" data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="4032"><p data-dcnode-id="4033" id="p1945"><span data-dcnode-id="4034" instrument_node="">Cosmic rays – Resurs-Dk/Pamela (operational since 2006), Lomonosov (Moscow State University, 2012 TBD).</span></p></dd></dl><p></p><p data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">The projects are being developed in wide international cooperation with the participation of ESA, NASA and other national space agencies: DLR, CNES, ASI, etc. Development of separate small experiments for the foreign space planetary missions is also supported. These missions include: Mars missions (Mars Odyssey Spacecraft, NASA, and Mars Express, ESA), Venus missions (Venus Express, ESA), Moon (LRO, NASA) and Mercury (BepiColombo, ESA) missions. In the branch of extraterrestrial astronomy, the nearest perspective of the Federal Space Programme is associated with the three missions of the “Spectrum” series: “Spectrum-Radioastron”, “Spectrum-UV” and “Spectrum-Roentgen-Gamma”.</span></p><p data-dcnode-id="4014" id="p0895"><span data-dcnode-id="4027" instrument_node="">Spectrum-Radioastron (Astro Space Center of the P.N. Lebedev Physical Institute of the Russian Academy of Science). The spacecraft is scheduled for launch in the middle of 2011. Radioastron is an international collaborative mission to launch a free-flying satellite carrying a 10-m space radio telescope (SRT) into an elliptical orbit around the Earth. The aim of the mission is to use the space telescope for radio astronomical observations using VLBI (Very Long Baseline Interferometry) techniques in conjunction with “ground based” VLBI networks located in Australia, Chile, China, Europe, India, Japan, Korea, Mexico, Russia, South Africa, Ukraine, and USA. The expected orbit of the Radioastron satellite is evolving with time and has an apogee between 310,000 and 390,000</span><span data-dcnode-id="4026" instrument_node="">&nbsp;</span><span data-dcnode-id="4025" instrument_node="">km, a perigee between 10,000 and 70,000</span><span data-dcnode-id="4024" instrument_node="">&nbsp;</span><span data-dcnode-id="4023" instrument_node="">km, a period of 8–9</span><span data-dcnode-id="4022" instrument_node="">&nbsp;</span><span data-dcnode-id="4021" instrument_node="">days, and an initial inclination of 51</span><span data-dcnode-id="4020" instrument_node="">&nbsp;</span><span data-dcnode-id="4019" instrument_node="">degrees. Radioastron will operate at the standard radio astronomical wavelengths of 1.19–1.63, 6.2, 18, and 92</span><span data-dcnode-id="4018" instrument_node="">&nbsp;</span><span data-dcnode-id="4017" instrument_node="">cm. Space-ground VLBI observations using Radioastron will provide morphological information on galactic and extragalactic radio sources. The spacecraft’s guaranteed operational lifetime is 5</span><span data-dcnode-id="4016" instrument_node="">&nbsp;</span><span data-dcnode-id="4015" instrument_node="">years.</span></p><div data-dcnode-id="3951"><p data-dcnode-id="3993" id="p0905"><span data-dcnode-id="4013" instrument_node="">Spectrum-UV (Institute of Astronomy of the Russian Academy of Science). Spectrum UV is an international space observatory designed for observations in the ultraviolet domain. The observatory includes a single 170</span><span data-dcnode-id="4011" instrument_node="">&nbsp;</span><span data-dcnode-id="4009" instrument_node="">cm aperture telescope capable of high-resolution spectroscopy, long slit low-resolution spectroscopy, and deep UV and optical imaging. The telescope optical configuration is Ritchey-Chetien, with primary mirror diameter – 170</span><span data-dcnode-id="4007" instrument_node="">&nbsp;</span><span data-dcnode-id="4005" instrument_node="">cm, focal length – 1700</span><span data-dcnode-id="4003" instrument_node="">&nbsp;</span><span data-dcnode-id="4001" instrument_node="">cm, field of view – 30</span><span data-dcnode-id="3999" instrument_node="">&nbsp;</span><span data-dcnode-id="3997" instrument_node="">arc min. The spectrograph unit comprises three different single spectrographs: two high-resolution spectrographs – UVEC and VUVES (Germany), and a long-slit spectrograph LSS (see </span><a class="workspace-trigger" data-dcnode-id="3995" href="#t0055" name="bt0055"><span data-dcnode-id="3996" instrument_node="">Table 11</span></a><span data-dcnode-id="3994" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3952" id="t0055"><span class="captions" data-dcnode-id="3985"><span data-dcnode-id="3986"><p data-dcnode-id="3987" id="sp280"><span class="label" data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">Table 11</span></span><span data-dcnode-id="3990" instrument_node="">. </span><span data-dcnode-id="3988" instrument_node="">Spectrograph-range (nm)-resolution.</span></p></span></span><div class="groups" data-dcnode-id="3953"><table data-dcnode-id="3954"><thead data-dcnode-id="3977"><tr class="rowsep-1 valign-top" data-dcnode-id="3978"><th class="align-left" data-dcnode-id="3983" scope="col"><span data-dcnode-id="3984" instrument_node="">Spectrograph</span></th><th class="align-left" data-dcnode-id="3981" scope="col"><span data-dcnode-id="3982" instrument_node="">Range (nm)</span></th><th class="align-char" data-dcnode-id="3979" scope="col"><span data-dcnode-id="3980" instrument_node="">Resolution</span></th></tr></thead><tbody data-dcnode-id="3955"><tr class="valign-top" data-dcnode-id="3970"><td class="align-left" data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">UVEC</span></td><td class="align-left" data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">174–310</span></td><td class="align-char" data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">50000</span></td></tr><tr class="valign-top" data-dcnode-id="3963"><td class="align-left" data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">VUVES</span></td><td class="align-left" data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">102–172</span></td><td class="align-char" data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">55000</span></td></tr><tr class="valign-top" data-dcnode-id="3956"><td class="align-left" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">LSS</span></td><td class="align-left" data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">102–310</span></td><td class="align-char" data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">2500</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="3866"><p data-dcnode-id="3946" id="p0910"><span data-dcnode-id="3950" instrument_node="">A Field Camera Unit (FCU) is being developed to carry out UV and optical diffraction limited imaging of astronomical objects. The FCU incorporates two UV cameras, FUV and NUV, and an optical camera (OC) (see </span><a class="workspace-trigger" data-dcnode-id="3948" href="#t0060" name="bt0060"><span data-dcnode-id="3949" instrument_node="">Table 12</span></a><span data-dcnode-id="3947" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3867" id="t0060"><span class="captions" data-dcnode-id="3935"><span data-dcnode-id="3936"><p data-dcnode-id="3937" id="sp285"><span class="label" data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Table 12</span></span><span data-dcnode-id="3943" instrument_node="">. </span><span data-dcnode-id="3941" instrument_node="">Camera range (nm) scale (arc sec/px) field of view (arc min</span><sup data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">2</span></sup><span data-dcnode-id="3938" instrument_node="">).</span></p></span></span><div class="groups" data-dcnode-id="3868"><table data-dcnode-id="3869"><thead data-dcnode-id="3922"><tr class="rowsep-1 valign-top" data-dcnode-id="3923"><th class="align-left" data-dcnode-id="3933" scope="col"><span data-dcnode-id="3934" instrument_node="">Camera</span></th><th class="align-left" data-dcnode-id="3931" scope="col"><span data-dcnode-id="3932" instrument_node="">Range (nm)</span></th><th class="align-char" data-dcnode-id="3929" scope="col"><span data-dcnode-id="3930" instrument_node="">Scale (arc sec/px)</span></th><th class="align-char" data-dcnode-id="3924" scope="col"><span data-dcnode-id="3928" instrument_node="">Field of view (arc min</span><sup data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">2</span></sup><span data-dcnode-id="3925" instrument_node="">)</span></th></tr></thead><tbody data-dcnode-id="3870"><tr class="valign-top" data-dcnode-id="3905"><td class="align-left" data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">FUV</span></td><td class="align-left" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">115–190</span></td><td class="align-char" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">0.2</span></td><td class="align-char" data-dcnode-id="3906"><span data-dcnode-id="3915" instrument_node="">6.6</span><span data-dcnode-id="3913" instrument_node="">&nbsp;</span><span data-dcnode-id="3911" instrument_node="">×</span><span data-dcnode-id="3909" instrument_node="">&nbsp;</span><span data-dcnode-id="3907" instrument_node="">6.6</span></td></tr><tr class="valign-top" data-dcnode-id="3888"><td class="align-left" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">NUV</span></td><td class="align-left" data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">150–280</span></td><td class="align-char" data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">0.03</span></td><td class="align-char" data-dcnode-id="3889"><span data-dcnode-id="3898" instrument_node="">1.0</span><span data-dcnode-id="3896" instrument_node="">&nbsp;</span><span data-dcnode-id="3894" instrument_node="">×</span><span data-dcnode-id="3892" instrument_node="">&nbsp;</span><span data-dcnode-id="3890" instrument_node="">1.0</span></td></tr><tr class="valign-top" data-dcnode-id="3871"><td class="align-left" data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">OC</span></td><td class="align-left" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">250–700</span></td><td class="align-char" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">0.07</span></td><td class="align-char" data-dcnode-id="3872"><span data-dcnode-id="3881" instrument_node="">4.6</span><span data-dcnode-id="3879" instrument_node="">&nbsp;</span><span data-dcnode-id="3877" instrument_node="">×</span><span data-dcnode-id="3875" instrument_node="">&nbsp;</span><span data-dcnode-id="3873" instrument_node="">4.6</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="3856" id="p0915"><span data-dcnode-id="3865" instrument_node="">The telescope is planned to be launched by a Zenit-2SB medium-class launcher equipped with a Fregat-SB accelerating module from Baikonur in 2014. The observatory is expected to operate for about 10</span><span data-dcnode-id="3863" instrument_node="">&nbsp;</span><span data-dcnode-id="3861" instrument_node="">years. A geosynchronous orbit with an inclination of 51.8</span><span data-dcnode-id="3859" instrument_node="">&nbsp;</span><span data-dcnode-id="3857" instrument_node="">degrees has been chosen. For this orbit the effects of the radiation belts will be negligible and the observing efficiency will be high.</span></p><p data-dcnode-id="3842" id="p0920"><span data-dcnode-id="3855" instrument_node="">Spectrum-Roentgen Gamma (Space Research Institute of the Russian Academy of Science). This mission is a Russian – German X-ray astrophysical observatory. Germany is responsible for the development of the key mission instrument – an X-ray grazing-incidence mirror telescope, eROSITA. The second experiment is ART-XC – an X-ray mirror telescope with a harder response than eROSITA, which is being developed by Russia (IKI, Moscow and VNIIEF, Sarov). The scientific payload is housed on the Navigator bus, developed by Lavochkin Association (Russia). Spectrum-RG will be delivered to the Sun-Earth L2 point with the use of a Zenit-2SB rocket and Fregat buster. The total mass of the SRG is 2385</span><span data-dcnode-id="3853" instrument_node="">&nbsp;</span><span data-dcnode-id="3851" instrument_node="">kg. The SRG mission will be launched in 2013 from Baikonur and the observational programme will last 7</span><span data-dcnode-id="3849" instrument_node="">&nbsp;</span><span data-dcnode-id="3847" instrument_node="">years. The first 4</span><span data-dcnode-id="3845" instrument_node="">&nbsp;</span><span data-dcnode-id="3843" instrument_node="">years will be devoted to an all-sky survey, and the rest of the mission lifetime will be spent on follow-on pointed observations of a selection of the most interesting galaxy clusters and AGNs.</span></p><p data-dcnode-id="3832" id="p0925"><span data-dcnode-id="3841" instrument_node="">The mission will conduct an all-sky survey in the 0.5–11</span><span data-dcnode-id="3839" instrument_node="">&nbsp;</span><span data-dcnode-id="3837" instrument_node="">keV band with the imaging telescopes eROSITA and ART-XC. It will permit the discovery of all obscured accreting Black Holes in nearby galaxies, many (∼ millions) of new distant AGN, and the detection of all massive clusters of galaxies in the Universe. In addition to the all-sky survey, dedicated sky regions will be observed with higher sensitivity. Thereafter, follow-on pointed observations of selected sources at energies up to 30</span><span data-dcnode-id="3835" instrument_node="">&nbsp;</span><span data-dcnode-id="3833" instrument_node="">keV will take place in order to investigate the nature of dark matter, dark energy and the physics of accretion.</span></p><p data-dcnode-id="3830" id="p0930"><span data-dcnode-id="3831" instrument_node="">The following projects are being considered for a more distant perspective: “Gamma-400”, “Millimetron” and “Interhelioprobe”. These projects are currently at the stage of experimental development; they are likely to be transferred to the 2016–2020 programme.</span></p><div data-dcnode-id="3652"><p data-dcnode-id="3822" id="p0935"><span data-dcnode-id="3829" instrument_node="">Gamma-400 (P.N. Lebedev Physical Institute of the Russian Academy of Science). This is the </span><em data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">γ</span></em><span data-dcnode-id="3826" instrument_node="">-ray observatory satellite. The scientific objectives of this project are comparable to those of the NASA Fermi mission. The main parameters for the Gamma-400 satellite are given in </span><a class="workspace-trigger" data-dcnode-id="3824" href="#t0065" name="bt0065"><span data-dcnode-id="3825" instrument_node="">Table 13</span></a><span data-dcnode-id="3823" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3653" id="t0065"><span class="captions" data-dcnode-id="3814"><span data-dcnode-id="3815"><p data-dcnode-id="3816" id="sp290"><span class="label" data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Table 13</span></span><span data-dcnode-id="3819" instrument_node="">. </span><span data-dcnode-id="3817" instrument_node="">Main parameters of the Gamma-400 Satellite.</span></p></span></span><div class="groups" data-dcnode-id="3654"><table data-dcnode-id="3655"><tbody data-dcnode-id="3656"><tr class="valign-top" data-dcnode-id="3805"><td class="align-left" data-dcnode-id="3812"><span data-dcnode-id="3813" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="3806"><span data-dcnode-id="3811" instrument_node="">500–3,00,000</span><span data-dcnode-id="3809" instrument_node="">&nbsp;</span><span data-dcnode-id="3807" instrument_node="">km</span></td></tr><tr class="valign-top" data-dcnode-id="3792"><td class="align-left" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">Gamma-ray energy range</span></td><td class="align-left" data-dcnode-id="3793"><span data-dcnode-id="3802" instrument_node="">100</span><span data-dcnode-id="3800" instrument_node="">&nbsp;</span><span data-dcnode-id="3798" instrument_node="">MeV–3000</span><span data-dcnode-id="3796" instrument_node="">&nbsp;</span><span data-dcnode-id="3794" instrument_node="">GeV</span></td></tr><tr class="valign-top" data-dcnode-id="3781"><td class="align-left" data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">Sensitivie area</span></td><td class="align-left" data-dcnode-id="3782"><span data-dcnode-id="3789" instrument_node="">0.64</span><span data-dcnode-id="3787" instrument_node="">&nbsp;</span><span data-dcnode-id="3785" instrument_node="">m</span><sup data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">2</span></sup></td></tr><tr class="valign-top" data-dcnode-id="3776"><td class="align-left" data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Coordinate detectors</span></td><td class="align-left" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Si strips with 0.1-mm pitch</span></td></tr><tr class="valign-top" data-dcnode-id="3771"><td class="align-left" data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">Field of view</span></td><td class="align-left" data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">±45°</span></td></tr><tr class="valign-top" data-dcnode-id="3753"><td class="align-left" data-dcnode-id="3756"><span data-dcnode-id="3770" instrument_node="">Angular resolution (E</span><em data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">γ</span></em><span data-dcnode-id="3767" instrument_node="">&nbsp;</span><span data-dcnode-id="3765" instrument_node="">&gt;</span><span data-dcnode-id="3763" instrument_node="">&nbsp;</span><span data-dcnode-id="3761" instrument_node="">100</span><span data-dcnode-id="3759" instrument_node="">&nbsp;</span><span data-dcnode-id="3757" instrument_node="">GeV)</span></td><td class="align-left" data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">∼0.01°</span></td></tr><tr class="valign-top" data-dcnode-id="3740"><td class="align-left" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Calorimeter-thickness, r.l.</span></td><td class="align-left" data-dcnode-id="3741"><span data-dcnode-id="3750" instrument_node="">BGO</span><span data-dcnode-id="3748" instrument_node="">&nbsp;</span><span data-dcnode-id="3746" instrument_node="">+</span><span data-dcnode-id="3744" instrument_node="">&nbsp;</span><span data-dcnode-id="3742" instrument_node="">Si strips, 30</span></td></tr><tr class="valign-top" data-dcnode-id="3722"><td class="align-left" data-dcnode-id="3725"><span data-dcnode-id="3739" instrument_node="">Energy resolution (E</span><em data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">γ</span></em><span data-dcnode-id="3736" instrument_node="">&nbsp;</span><span data-dcnode-id="3734" instrument_node="">&gt;</span><span data-dcnode-id="3732" instrument_node="">&nbsp;</span><span data-dcnode-id="3730" instrument_node="">20</span><span data-dcnode-id="3728" instrument_node="">&nbsp;</span><span data-dcnode-id="3726" instrument_node="">GeV)</span></td><td class="align-left" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">∼1%</span></td></tr><tr class="valign-top" data-dcnode-id="3715"><td class="align-left" data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Proton rejection</span></td><td class="align-left" data-dcnode-id="3716"><span data-dcnode-id="3719" instrument_node="">10</span><sup data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">6</span></sup></td></tr><tr class="valign-top" data-dcnode-id="3684"><td class="align-left" data-dcnode-id="3697"><span data-dcnode-id="3714" instrument_node="">Point source sensitivity, ph/cm</span><sup data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">2</span></sup><span data-dcnode-id="3711" instrument_node="">/s (E</span><em data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">γ</span></em><span data-dcnode-id="3708" instrument_node="">&nbsp;</span><span data-dcnode-id="3706" instrument_node="">&gt;</span><span data-dcnode-id="3704" instrument_node="">&nbsp;</span><span data-dcnode-id="3702" instrument_node="">100</span><span data-dcnode-id="3700" instrument_node="">&nbsp;</span><span data-dcnode-id="3698" instrument_node="">MeV)</span></td><td class="align-left" data-dcnode-id="3685"><span data-dcnode-id="3696" instrument_node="">5</span><span data-dcnode-id="3694" instrument_node="">&nbsp;</span><span data-dcnode-id="3692" instrument_node="">×</span><span data-dcnode-id="3690" instrument_node="">&nbsp;</span><span data-dcnode-id="3688" instrument_node="">10</span><sup data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">−9</span></sup></td></tr><tr class="valign-top" data-dcnode-id="3675"><td class="align-left" data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">Power consumption</span></td><td class="align-left" data-dcnode-id="3676"><span data-dcnode-id="3681" instrument_node="">2000</span><span data-dcnode-id="3679" instrument_node="">&nbsp;</span><span data-dcnode-id="3677" instrument_node="">W</span></td></tr><tr class="valign-top" data-dcnode-id="3666"><td class="align-left" data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">PL, total mass</span></td><td class="align-left" data-dcnode-id="3667"><span data-dcnode-id="3672" instrument_node="">2500</span><span data-dcnode-id="3670" instrument_node="">&nbsp;</span><span data-dcnode-id="3668" instrument_node="">kg</span></td></tr><tr class="valign-top" data-dcnode-id="3657"><td class="align-left" data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">Life time</span></td><td class="align-left" data-dcnode-id="3658"><span data-dcnode-id="3663" instrument_node="">5</span><span data-dcnode-id="3661" instrument_node="">&nbsp;</span><span data-dcnode-id="3659" instrument_node="">years</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="3641" id="p0940"><span data-dcnode-id="3651" instrument_node="">Millimetron (Astro Space Center of the P.N. Lebedev Physical Institute of the Russian Academy of Science). The goal of this project is to construct a space observatory operating in millimetre, sub-millimetre and infrared wavelength ranges (10</span><span data-dcnode-id="3649" instrument_node="">&nbsp;</span><em data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">μ</span></em><span data-dcnode-id="3646" instrument_node="">m–2</span><span data-dcnode-id="3644" instrument_node="">&nbsp;</span><span data-dcnode-id="3642" instrument_node="">cm) using a 12-m cryogenic telescope in a single-dish mode and as an interferometer with space-ground and space-space baselines (the latter after the launch of the second identical space telescope). The observatory will provide the possibility to conduct astronomical observations with super-high sensitivity (down to the nanoJansky level) in a single dish mode, and observations with super-high angular resolution in an interferometric mode. The current status of the project is draft design of payload.</span></p><p data-dcnode-id="3635" id="p0945"><span data-dcnode-id="3640" instrument_node="">Interhelioprobe (Institute of Earth magnetism, ionosphere and radiowaves propagation named after Nikolay Pushkov of the Russian Academy of Science). This satellite is targeted towards the close distance study of the Sun, its internal heliosphere, solution of the problems of the solar corona heating, acceleration of the solar wind, origins of the most powerful phenomena of the solar activity – solar flares and outbursts. After launch and numerous gravitational maneuvers near Venus, the spacecraft will approach the Sun, thus saving fuel and shortening the time of insertion into operational orbit. Gravitational maneuvers near Venus will also tilt the spacecraft orbit with respect to the Ecliptic and enable studying of the solar pole areas. When at perigee at distances of the order of 40 Solar radii, the spacecraft will be co-rotating with the Sun for about 7</span><span data-dcnode-id="3638" instrument_node="">&nbsp;</span><span data-dcnode-id="3636" instrument_node="">days. During this period, the spacecraft will be observing the same part of the Sun which enable it to perform specific observations and measurements.</span></p></section><section data-dcnode-id="3614" id="s0485"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3628"><span data-dcnode-id="3633" instrument_node="">6.5</span><span data-dcnode-id="3631" instrument_node="">. </span><span data-dcnode-id="3629" instrument_node="">Decadal Plan for Australian Space Science</span></h3><p data-dcnode-id="3622" id="p0950"><span data-dcnode-id="3627" instrument_node="">In the last few decades, the astronomy, astrophysics and space science activities in Australia have been confined to only a few areas using “ground based” observations. In the area of astronomy and astrophysics, the activities in the past flourished only in the lower end of the electromagnetic spectrum, i.e., optical and radio bands due to the distinct advantage of being in the southern hemisphere. This advantage has eroded to some extent over the past 10</span><span data-dcnode-id="3625" instrument_node="">&nbsp;</span><span data-dcnode-id="3623" instrument_node="">years with the arrival of the ESO observatory in Chile. Major facilities like the Australia telescope for radio astronomy and the Anglo-Australian telescope for optical studies have been operating in Narabrai and Siding Springs and have given several remarkable results in recent years (?).</span></p><p data-dcnode-id="3617" id="p0955"><span data-dcnode-id="3621" instrument_node="">Australian presence in space-based research has been absent even though the indigenously built small satellite named Wresat was launched in 1967 and Fedsat followed in 2002. Balloon-borne experiments in X-ray/</span><em data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">γ</span></em><span data-dcnode-id="3618" instrument_node="">-ray astronomy were carried out in the last decades. Several proposed starts like the Mirabooka mission for X-ray astronomy and the Lyman ultraviolet space telescope were made in the past decades but they were not approved or not funded.</span></p><p data-dcnode-id="3615" id="p0960"><span data-dcnode-id="3616" instrument_node="">A major initiative has been recently proposed in the Australian Decadal plan for Space Science activities and the technology scenario for the 2011–2019 period as desired by the space science community. The proposed theme areas of P2P i.e. plasma-to-planets and RS, i.e. remote sensing, of the other members of the solar system will give new insight to our understanding of ‘Sun as a star’ as well as the solar system as a whole.</span></p></section><section data-dcnode-id="3602" id="s0490"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3608"><span data-dcnode-id="3613" instrument_node="">6.6</span><span data-dcnode-id="3611" instrument_node="">. </span><span data-dcnode-id="3609" instrument_node="">Programmes of Other Space Agencies</span></h3><p data-dcnode-id="3603" id="p0965"><span data-dcnode-id="3607" instrument_node="">Most developing nations concentrate their space activities in Earth observation and meteorological studies, either through the use of third party satellites or, in cases where a sufficiently developed technological and industrial basis exists, through the construction and launch of indigenous spacecraft. As examples of the latter we can mention Argentina and Brazil, that show a proven record of capability to design and build reliable satellites and space-borne instrumentation. The Argentine Space Plan calls for the development and launch of two main series of Earth observing satellites, carrying either optical cameras and microwave sensors, or synthetic aperture radars. In the case of Brazil, the two “flagship” science missions, Equars and Mirex, have had considerable delays and priority is now given to remote sensing satellites like Amazonia-1 and Mapsar, among others. Similar cases can be noted in other regions of the world, like e.g., Taiwan, where the first Rocsat scientific satellite was followed by a second one devoted to remote sensing of the Earth. At a time when even the most developed space-faring nations tend to concentrate their efforts in “politically correct” endeavours to satisfy politicians and the general public, the road taken by less developed countries is easy to understand. What is important, however, in the possible framework of international cooperation described earlier, is that several of these countries have developed a substantial expertise in carrying out fairly complex space missions in cooperation with international partners. Argentina’s experience in a long-standing collaboration with US/NASA, as well as Denmark, France and Italy, and Brazil’s partnership with China on the CBERS (</span><a class="workspace-trigger" data-dcnode-id="3605" href="#b0190" name="bb0190"><span data-dcnode-id="3606" instrument_node="">Sausen, 2001</span></a><span data-dcnode-id="3604" instrument_node="">) series of Earth observing spacecraft, as well as with France, are primary examples of this type of relationship. Both Argentina and Brazil have also developed an incipient industrial basis able to provide instruments, spacecraft subsystems and even complete satellites.</span></p></section></section><section data-dcnode-id="3581" id="s0495"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3595"><span data-dcnode-id="3600" instrument_node="">7</span><span data-dcnode-id="3598" instrument_node="">. </span><span data-dcnode-id="3596" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3593" id="p0970"><span data-dcnode-id="3594" instrument_node="">The Working Group members and all who have worked on or participated in the year-long activity that resulted in this report have been aware of the extraordinary “golden age” which astronomers have experienced in the last decade, with unique and great opportunities for science.</span></p><p data-dcnode-id="3588" id="p0975"><span data-dcnode-id="3592" instrument_node="">The use of space-borne observatories continues to play a key role in the advance of astronomy and astrophysics by providing access to the entire electromagnetic spectrum from radio to high energy </span><em data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">γ</span></em><span data-dcnode-id="3589" instrument_node="">-rays.</span></p><p data-dcnode-id="3586" id="p0980"><span data-dcnode-id="3587" instrument_node="">The existence of an impressive fleet of space observatories complemented by “ground based” facilities has given the worldwide scientific community an incredible opportunity to make spectacular advances in our knowledge of the Universe. The open availability of existing and future datasets from space and “ground based” observatories is a clear path to enabling powerful and relatively inexpensive collaboration to address problems that can only be tackled by the application of extensive multi-wavelength observations.</span></p><p data-dcnode-id="3584" id="p0985"><span data-dcnode-id="3585" instrument_node="">Unfortunately, the panorama in the next decades, with only a few new major space missions planned, promises a much less productive future. At this stage remedial global action is required to correct this negative trend, to ensure positive prospects for future research, and to avoid a “dark age” for space astronomy.</span></p><p data-dcnode-id="3582" id="p0990"><span data-dcnode-id="3583" instrument_node="">We conclude that the size, complexity and costs of large space observatories must place a growing emphasis on international collaboration and multilateral cooperation. Although this poses technical and programmatic challenges, these challenges are not insurmountable, and the great scientific benefits will be a rich reward for everyone.</span></p></section></div><section data-dcnode-id="3567" id="aep-acknowledgment-id58"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3576" id="p1950"><span data-dcnode-id="3577" instrument_node="">We acknowledge the former COSPAR President, Roger-Maurice Bonnet, for the appointment of the committee, his successor, Giovanni Fabrizio Bignami, for his full endorsement of the Working Group activity and his unconditional support during more than a year of work, and Robert Williams, IAU President, for supporting the Working Group activity and a companion IAU Study.</span></p><p data-dcnode-id="3574" id="p1000"><span data-dcnode-id="3575" instrument_node="">Most of the work has been carried out within the COSPAR framework and we are grateful for the support of the COSPAR-CSAC chair, Lennard Fisk, the Executive Director, Jean-Louis Fellous, and to Johan Bleeker, Aaron Janofsky, Jean-Pierre Swings and all the other members for their positive attitude toward the WG activity.</span></p><p data-dcnode-id="3572" id="p1005"><span data-dcnode-id="3573" instrument_node=
