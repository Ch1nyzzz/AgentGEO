</span><meta content="The use of space techniques continues to play a key role in the advance of astrophysics by providing access to the entire electromagnetic spectrum fro…" data-dcnode-id="10089" property="og:description"><span data-dcnode-id="10088" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id55&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id56&quot;><p id=&quot;sp005&quot;>The use of space techniques continues to play a key role in the advance of astrophysics by providing access to the entire electromagnetic spectrum from radio to high energy <em>γ</em> rays. The increasing size, complexity and cost of large space observatories places a growing emphasis on international collaboration. Furthermore, combining existing and future datasets from space and “ground based” observatories is an emerging mode of powerful and relatively inexpensive research to address problems that can only be tackled by the application of large multi-wavelength observations. While the present set of astronomical facilities is impressive and covers the entire electromagnetic spectrum, with complementary space and “ground based” telescopes, the situation in the next 10–20&nbsp;years is of critical concern. The James Webb Space Telescope (JWST), to be launched not earlier than 2018, is the only approved future major space astronomy mission. Other major highly recommended space astronomy missions, such as the Wide-field Infrared Survey Telescope (WFIRST), the International X-ray Observatory (IXO), Large Interferometer Space Antenna (LISA) and the Space Infrared Telescope for Cosmology and Astrophysics (SPICA), have yet to be approved for development.</p><p id=&quot;sp010&quot;>A “Working Group on the Future of Space Astronomy” was established at the 38th COSPAR Assembly held in Bremen, Germany in July 2010. The purpose of this Working Group was to establish a Road Map for future major space missions to complement future large “ground based” telescopes. This paper presents the results of this study, including a number of recommendations and a Road Map for the next decades of space astronomy research.</p></div></div></div>" data-dcnode-id="10087" lang="en" name="citation_abstract"><span data-dcnode-id="10086" instrument_node="">

="9418" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="9406" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="9409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.asr.2012.03.009" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="9410" instrument_node="">https://doi.org/10.1016/j.asr.2012.03.009</span></a><a class="rights-and-content" data-dcnode-id="9407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0273117712001755%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9408" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="9405"></section><section class="ReferencedArticles" data-dcnode-id="9404"></section><div class="PageDivider" data-dcnode-id="9403"></div><div class="Abstracts u-font-serif" data-dcnode-id="9387" id="abstracts"><div class="abstract author" data-dcnode-id="9388" id="aep-abstract-id55" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9401"><span data-dcnode-id="9402" instrument_node="">Abstract</span></h2><div data-dcnode-id="9389" id="aep-abstract-sec-id56"><p data-dcnode-id="9392" id="sp005"><span data-dcnode-id="9400" instrument_node="">The use of space techniques continues to play a key role in the advance of astrophysics by providing access to the entire electromagnetic spectrum from radio to high energy </span><em data-dcnode-id="9398"><span data-dcnode-id="9399" instrument_node="">γ</span></em><span data-dcnode-id="9397" instrument_node=""> rays. The increasing size, complexity and cost of large space observatories places a growing emphasis on international collaboration. Furthermore, combining existing and future datasets from space and “ground based” observatories is an emerging mode of powerful and relatively inexpensive research to address problems that can only be tackled by the application of large multi-wavelength observations. While the present set of astronomical facilities is impressive and covers the entire electromagnetic spectrum, with complementary space and “ground based” telescopes, the situation in the next 10–20</span><span data-dcnode-id="9395" instrument_node="">&nbsp;</span><span data-dcnode-id="9393" instrument_node="">years is of critical concern. The James Webb Space Telescope (JWST), to be launched not earlier than 2018, is the only approved future major space astronomy mission. Other major highly recommended space astronomy missions, such as the Wide-field Infrared Survey Telescope (WFIRST), the International X-ray Observatory (IXO), Large Interferometer Space Antenna (LISA) and the Space Infrared Telescope for Cosmology and Astrophysics (SPICA), have yet to be approved for development.</span></p><p data-dcnode-id="9390" id="sp010"><span data-dcnode-id="9391" instrument_node="">A “Working Group on the Future of Space Astronomy” was established at the 38th COSPAR Assembly held in Bremen, Germany in July 2010. The purpose of this Working Group was to establish a Road Map for future major space missions to complement future large “ground based” telescopes. This paper presents the results of this study, including a number of recommendations and a Road Map for the next decades of space astronomy research.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="9364" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="9376"><button class="button-alternative button-alternative-tertiary" data-dcnode-id="9377" disabled="" type="button"><svg class="icon icon-navigate-left" data-dcnode-id="9385" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="9386"></path></svg><span class="button-alternative-text" data-dcnode-id="9378"><strong data-dcnode-id="9383"><span data-dcnode-id="9384" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="9381"><span data-dcnode-id="9382" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9379"><span data-dcnode-id="9380" instrument_node=""> in issue</span></span></span></button></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="9365"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0273117712002001"><span class="button-alternative-text" data-dcnode-id="9369"><strong data-dcnode-id="9374"><span data-dcnode-id="9375" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="9372"><span data-dcnode-id="9373" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9370"><span data-dcnode-id="9371" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="9367" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="9368"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="9354"><div class="keywords-section" data-dcnode-id="9355" id="aep-keywords-id57"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9362"><span data-dcnode-id="9363" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="9359"><span data-dcnode-id="9360"><span data-dcnode-id="9361" instrument_node="">Future of Space Astronomy</span></span></div><div class="keyword" data-dcnode-id="9356"><span data-dcnode-id="9357"><span data-dcnode-id="9358" instrument_node="">COSPAR Working Group</span></span></div></div></div><span data-dcnode-id="9353" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3030" id="body"><div data-dcnode-id="3580"><section data-dcnode-id="9128" id="s0520"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9351"><span data-dcnode-id="9352" instrument_node="">Executive summary</span></h2><p data-dcnode-id="9342" id="p0005"><span data-dcnode-id="9350" instrument_node="">Astronomers today have access to an impressive set of space missions and “ground based” observatories that gives them nearly continuous coverage of the electromagnetic spectrum from the </span><em data-dcnode-id="9348"><span data-dcnode-id="9349" instrument_node="">γ</span></em><span data-dcnode-id="9347" instrument_node="">-ray to the radio regions. But there is serious concern about the situation in the next 10–15</span><span data-dcnode-id="9345" instrument_node="">&nbsp;</span><span data-dcnode-id="9343" instrument_node="">years, when current space astronomy missions will have ended and new missions will be much less numerous.</span></p><p data-dcnode-id="9337" id="p0010"><span data-dcnode-id="9341" instrument_node="">Astronomy is a difficult observational science requiring continuous and simultaneous access to the full electromagnetic spectrum to explore our complex Universe and to pursue answers to fundamental scientific questions. The history of space astronomy, especially the past three decades, has demonstrated clearly the importance and benefits of access to the </span><em data-dcnode-id="9339"><span data-dcnode-id="9340" instrument_node="">γ</span></em><span data-dcnode-id="9338" instrument_node="">-ray, X-ray, UV-optical, near IR and far-IR spectrum from space. To build on this success, continuing technical and scientific advances and commitment to space science on the part of the world’s space agencies are going to be needed. It will be essential to complement the powerful “ground based” facilities that will soon be available, and to ensure that the next generation of astronomers has access to the whole spectrum.</span></p><p data-dcnode-id="9331" id="p0015"><span data-dcnode-id="9336" instrument_node="">To this end, COSPAR appointed the “Future of Space Astronomy” Working Group (hereafter, WG) under the aegis of Commission E</span><a class="workspace-trigger" data-dcnode-id="9333" href="#fn1" name="bfn1"><sup data-dcnode-id="9334"><span data-dcnode-id="9335" instrument_node="">1</span></sup></a><span data-dcnode-id="9332" instrument_node=""> with the aim to analyze the difficult situation of space astronomy over the next two decades and recommend ways to improve the prospects.</span></p><p data-dcnode-id="9329" id="p0020"><span data-dcnode-id="9330" instrument_node="">Having assessed the scientific needs and the current plans of a number of space agencies worldwide, the Working Group identified some major concerns about the lack of a secured future plan. This study was conducted during the period April 2010 – April 2011. During this time and in the months following there were significant changes in the plans of multiple space agencies as they adjusted to programmatic realities in their countries. This paper reports the conclusions of the Working Group as of the end of the period of our discussions. We hope that our findings will remain of value as a vision statement in spite of the rapidly changing short-term circumstances.</span></p><section data-dcnode-id="9279" id="s0525"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9327"><span data-dcnode-id="9328" instrument_node="">Recommendations concerning international planning and implementation of large space astronomy missions</span></h3><p data-dcnode-id="9285" id="p0025"></p><dl class="list" data-dcnode-id="9286"><dt class="list-label" data-dcnode-id="9325"><span data-dcnode-id="9326" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="9322"><p data-dcnode-id="9323" id="p1635"><span data-dcnode-id="9324" instrument_node="">It is important to maintain the rate of fundamental scientific discoveries in space science that has been achieved in recent decades. This success will continue to derive from the ability to use space to access the full electromagnetic spectrum.</span></p></dd><dt class="list-label" data-dcnode-id="9320"><span data-dcnode-id="9321" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="9317"><p data-dcnode-id="9318" id="p1640"><span data-dcnode-id="9319" instrument_node="">Large and powerful space astronomy missions have an outstanding track record of technical success, new discoveries, and long-lasting legacy science. In the future, such missions will continue to be essential to address key questions in astrophysics including the properties of dark matter and dark energy, gravitational wave astrophysics, the formation of the first stars, the evolution of galaxies like the Milky Way, the development of planetary systems, and the characteristics of exoplanets.</span></p></dd><dt class="list-label" data-dcnode-id="9315"><span data-dcnode-id="9316" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="9312"><p data-dcnode-id="9313" id="p1645"><span data-dcnode-id="9314" instrument_node="">The astronomy community has developed methodologies to implement ambitious and powerful “ground based” observatories as multinational projects. It is necessary to bring about an equivalent paradigm for large space missions based on international cooperation and coordination. Without this, space agencies will implement only smaller scale and more fragmented projects. Whilst these will continue to be important and productive, without a balancing large-mission programme the overall outcome will be less effective, less competitive, and less successful scientifically.</span></p></dd><dt class="list-label" data-dcnode-id="9310"><span data-dcnode-id="9311" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="9307"><p data-dcnode-id="9308" id="p1650"><span data-dcnode-id="9309" instrument_node="">Recent indications that major space agencies may adopt a go-it-alone policy with respect to large mission implementation are a concern. Such missions will not be as powerful as they could be if carried out as international projects, and may result in unnecessary duplication or not occur at all.</span></p></dd><dt class="list-label" data-dcnode-id="9305"><span data-dcnode-id="9306" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="9302"><p data-dcnode-id="9303" id="p1655"><span data-dcnode-id="9304" instrument_node="">The international astronomical community, matured in the developed countries, is now spreading worldwide and is fertilising the scientific environment and the intellectual life of newly developed countries. Participation in major international space missions is a great opportunity for developing nations, both to help make such endeavours possible, and to share in the technical and scientific benefits.</span></p></dd><dt class="list-label" data-dcnode-id="9300"><span data-dcnode-id="9301" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="9297"><p data-dcnode-id="9298" id="p1660"><span data-dcnode-id="9299" instrument_node="">COSPAR and the IAU can play an influential role in promoting the involvement of developing countries in major missions, and should establish and pursue an active joint programme to foster increased international cooperation in the area of space astronomy.</span></p></dd><dt class="list-label" data-dcnode-id="9295"><span data-dcnode-id="9296" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="9292"><p data-dcnode-id="9293" id="p1665"><span data-dcnode-id="9294" instrument_node="">Space agencies worldwide should develop a process for strategic planning that takes into account and exploits opportunities for international cooperation. Technical and programmatic challenges are inevitable, but must be overcome.</span></p></dd><dt class="list-label" data-dcnode-id="9290"><span data-dcnode-id="9291" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="9287"><p data-dcnode-id="9288" id="p1670"><span data-dcnode-id="9289" instrument_node="">The scientific community at large must find ways to provide the necessary encouragement and support to space agencies, and to help create the conditions in which international cooperation can bring about a better scientific outcome for all.</span></p></dd></dl><p></p><p data-dcnode-id="9280"><span data-dcnode-id="9284" instrument_node="">We note that many of the ideas and conclusions of this report are reflected by </span><a class="workspace-trigger" data-dcnode-id="9282" href="#b0070" name="bb0070"><span data-dcnode-id="9283" instrument_node="">Bonnet and Bleeker (2011)</span></a><span data-dcnode-id="9281" instrument_node="">. Having reviewed the current situation and prospects, these authors propose a global equivalent of the Horizon 2000 programme which ESA successfully implemented over a 25-year period from the mid 1980s. This would involve inter-agency agreement on a long-term programme with defined large missions to be built within fixed budgets, and scope for additional smaller missions to be proposed and selected in a flexible manner. As a starting point, such a programme would require the establishment of an inter-agency coordination group to formulate a long-term programme for observatory-class missions. The Working Group regards this suggestion as one option that is quite consistent with the key conclusions of this report.</span></p></section><section data-dcnode-id="9243" id="s0530"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9277"><span data-dcnode-id="9278" instrument_node="">Road Map principles</span></h3><p data-dcnode-id="9244" id="p0035"><span data-dcnode-id="9276" instrument_node="">The Working Group considers it essential to develop a space astronomy Road Map in the context of some important underlying principles:</span></p><dl class="list" data-dcnode-id="9245"><dt class="list-label" data-dcnode-id="9274"><span data-dcnode-id="9275" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9269"><p data-dcnode-id="9270" id="p1035"><em data-dcnode-id="9272"><span data-dcnode-id="9273" instrument_node="">Science driven</span></em><span data-dcnode-id="9271" instrument_node="">: pursue top priority science topics stemming from state-of-the art observations and theory, and set in a worldwide context.</span></p></dd><dt class="list-label" data-dcnode-id="9267"><span data-dcnode-id="9268" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9260"><p data-dcnode-id="9261" id="p1040"><em data-dcnode-id="9265"><span data-dcnode-id="9266" instrument_node="">Observatory class missions</span></em><span data-dcnode-id="9264" instrument_node="">: provide open access to the scientific community at large, preferably with data available with no more than a short turn-around time (6–12</span><span data-dcnode-id="9263" instrument_node="">&nbsp;</span><span data-dcnode-id="9262" instrument_node="">months) after observations.</span></p></dd><dt class="list-label" data-dcnode-id="9258"><span data-dcnode-id="9259" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9253"><p data-dcnode-id="9254" id="p1045"><em data-dcnode-id="9256"><span data-dcnode-id="9257" instrument_node="">Innovative enabling technology and cutting-edge scientific instrumentation</span></em><span data-dcnode-id="9255" instrument_node="">: focus research and development support on innovative technologies and instrument concepts driven by science requirements for future observatory-class missions.</span></p></dd><dt class="list-label" data-dcnode-id="9251"><span data-dcnode-id="9252" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9246"><p data-dcnode-id="9247" id="p1050"><em data-dcnode-id="9249"><span data-dcnode-id="9250" instrument_node="">Technology development</span></em><span data-dcnode-id="9248" instrument_node="">: national agencies and scientific councils support research and development programmes to advance the Technical Readiness Level of mission-critical elements to flight-ready status early in mission preparation.</span></p></dd></dl><p></p></section><section data-dcnode-id="9142" id="s0535"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9241"><span data-dcnode-id="9242" instrument_node="">Recommended space astronomy Road Map</span></h3><p data-dcnode-id="9148" id="p0040"><span data-dcnode-id="9240" instrument_node="">A select group of future space astronomy missions has been identified in major studies by national scientific committees to be of the highest priority. Critical technologies and instrumentation for these missions have been brought to a high level of technical readiness. Though these missions do not provide complete coverage of the electromagnetic spectrum, the WG considers these missions to be the most feasible core of the near-term major space astronomy missions, and recommends this list as a Road Map for the next few decades.</span></p><dl class="list" data-dcnode-id="9149"><dt class="list-label" data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9224"><p data-dcnode-id="9225" id="p1055"><em data-dcnode-id="9236"><span data-dcnode-id="9237" instrument_node="">JWST</span></em><span data-dcnode-id="9235" instrument_node="">. JWST</span><a class="workspace-trigger" data-dcnode-id="9232" href="#fn2" name="bfn2"><sup data-dcnode-id="9233"><span data-dcnode-id="9234" instrument_node="">2</span></sup></a><span data-dcnode-id="9231" instrument_node=""> is a collaborative mission of NASA, ESA and the Canadian Space Agency (CSA). It is the only future large space astronomy mission already approved for development, with a planned launch in 2018. It was the highest priority programme recommended in the US National Academy of Sciences decadal survey in 2000 (Astronomy and Astrophysics for the New Millenium), and its central importance to astronomy was reiterated in the 2010 survey (New Worlds, New Horizons, </span><a class="workspace-trigger" data-dcnode-id="9229" href="#b0240" name="bb0240"><span data-dcnode-id="9230" instrument_node="">NRC, 2010a</span></a><span data-dcnode-id="9228" instrument_node="">). With a combination of near- and mid-infrared imagers and spectrometers, JWST will provide unprecedented capability to study systems from the first galaxies that formed in the early Universe, to newly forming stars and planetary systems, and to bodies in our solar system. The WG recommends completion and launch of this major observatory as soon as possible. JWST is recognised to be the only new large space astronomy Observatory to be possibly operational in the next 10–20</span><span data-dcnode-id="9227" instrument_node="">&nbsp;</span><span data-dcnode-id="9226" instrument_node="">years. It is an essential asset for space science investigations complementing “ground based” facilities planned.</span></p></dd><dt class="list-label" data-dcnode-id="9222"><span data-dcnode-id="9223" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9196"><p data-dcnode-id="9197" id="p1060"><em data-dcnode-id="9220"><span data-dcnode-id="9221" instrument_node="">Euclid/WFIRST</span></em><span data-dcnode-id="9219" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="9216" href="#fn3" name="bfn3"><sup data-dcnode-id="9217"><span data-dcnode-id="9218" instrument_node="">3</span></sup></a><sup data-dcnode-id="9214"><span data-dcnode-id="9215" instrument_node="">,</span></sup><a class="workspace-trigger" data-dcnode-id="9211" href="#fn4" name="bfn4"><sup data-dcnode-id="9212"><span data-dcnode-id="9213" instrument_node="">4</span></sup></a><span data-dcnode-id="9210" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="9208" href="#b0140" name="bb0140"><span data-dcnode-id="9209" instrument_node="">Laureijs et al., 2011</span></a><span data-dcnode-id="9207" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="9205" href="#b0240" name="bb0240"><span data-dcnode-id="9206" instrument_node="">SIR, 2010</span></a><span data-dcnode-id="9204" instrument_node="">). Both ESA and NASA are currently evaluating missions to study dark energy: Euclid (ESA; dark energy and dark matter) (</span><a class="workspace-trigger" data-dcnode-id="9202" href="#b0065" name="bb0065"><span data-dcnode-id="9203" instrument_node="">Bignami et al., 2005</span></a><span data-dcnode-id="9201" instrument_node="">) and Wide-Field Infrared Survey Telescope (WFIRST) (NASA; dark energy, exoplanets and near-infrared sky survey (</span><a class="workspace-trigger" data-dcnode-id="9199" href="#b0240" name="bb0240"><span data-dcnode-id="9200" instrument_node="">SIR, 2010</span></a><span data-dcnode-id="9198" instrument_node="">). The scientific goals of these missions have been recommended as being of the highest importance by the worldwide astronomical community. Euclid has been selected as an ESA M-class mission; NASA is conducting a definition study for WFIRST. Possible collaboration has been discussed by the national agencies, but the situation is unclear at the time of this study. The WG believes it would best serve the interests of science and the community to have a single optimised mission or programme, combining the resources and technical capabilities of NASA and ESA. Canada, India, China, Russia and others could be added as partners.</span></p></dd><dt class="list-label" data-dcnode-id="9194"><span data-dcnode-id="9195" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9179"><p data-dcnode-id="9180" id="p1065"><em data-dcnode-id="9192"><span data-dcnode-id="9193" instrument_node="">International X-ray Observatory (IXO)</span></em><span data-dcnode-id="9191" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="9189" href="#b0050" name="bb0050"><span data-dcnode-id="9190" instrument_node="">Barcons et al., 2011</span></a><span data-dcnode-id="9188" instrument_node="">). IXO has been extensively studied and reviewed as a collaborative NASA/ESA/Japan mission, now re-scoped by ESA as an L-Class candidate for the 2020–2025 time-frame, Athena, without NASA collaboration.</span><a class="workspace-trigger" data-dcnode-id="9185" href="#fn5" name="bfn5"><sup data-dcnode-id="9186"><span data-dcnode-id="9187" instrument_node="">5</span></sup></a><span data-dcnode-id="9184" instrument_node=""> The proposed IXO satellite, or a similar large high energy observatory, would be able to exploit a broad scientific scenario, possibly including investigation of the ‘first stars’ via a high-</span><em data-dcnode-id="9182"><span data-dcnode-id="9183" instrument_node="">z γ</span></em><span data-dcnode-id="9181" instrument_node="">-ray burst detection capability. The WG recommends development of a large X-ray space observatory, operative in the next decade.</span></p></dd><dt class="list-label" data-dcnode-id="9177"><span data-dcnode-id="9178" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9165"><p data-dcnode-id="9166" id="p1070"><em data-dcnode-id="9175"><span data-dcnode-id="9176" instrument_node="">Large Interferometer Space Antenna (LISA)</span></em><span data-dcnode-id="9174" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="9172" href="#b0075" name="bb0075"><span data-dcnode-id="9173" instrument_node="">Brillet et al., 2011</span></a><span data-dcnode-id="9171" instrument_node="">). LISA is a pioneering gravitational wave mission, designed to open a new window on the cosmos. LISA has been extensively studied as a collaborative NASA/ESA mission, but, though highly ranked in the 2010 US Decadal Survey, programmatic constraints are preventing NASA from proceeding. The LISA Pathfinder mission</span><a class="workspace-trigger" data-dcnode-id="9168" href="#fn6" name="bfn6"><sup data-dcnode-id="9169"><span data-dcnode-id="9170" instrument_node="">6</span></sup></a><span data-dcnode-id="9167" instrument_node=""> is in development in Europe. ESA has re-scoped LISA as NGO, an L-Class mission candidate. The WG recommends that the agencies involved support, exploit and finalise the R&amp; D programmes necessary to have in operation a gravitational wave mission at the latest in the time-frame 2025–2030. Even though the previous collaborative mission concepts for IXO and LISA are not feasible in the current ESA or NASA plans, the Working Group recommends that some multinational aspect of the missions be preserved to prevent significant loss of scientific capability.</span></p></dd><dt class="list-label" data-dcnode-id="9163"><span data-dcnode-id="9164" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9155"><p data-dcnode-id="9156" id="p1075"><em data-dcnode-id="9161"><span data-dcnode-id="9162" instrument_node="">Space Infrared Observatory for Cosmology and Astrophysics (SPICA)</span></em><span data-dcnode-id="9160" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="9158" href="#b0105" name="bb0105"><span data-dcnode-id="9159" instrument_node="">Ferlet et al., 2009</span></a><span data-dcnode-id="9157" instrument_node="">). SPICA is a large aperture, cryogenically cooled far-infrared observatory studied as a collaborative JAXA/ESA/Canada mission. Contribution of an additional instrument was recommended by the US 2010 Decadal Survey, but may not be possible due to US programmatic constraints. The WG believes that a large aperture, cryogenically cooled far-infrared observatory is essential to bring about the major advance in sensitivity needed to continue investigation of the cold and dust obscured Universe.</span></p></dd><dt class="list-label" data-dcnode-id="9153"><span data-dcnode-id="9154" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9150"><p data-dcnode-id="9151" id="p1080"><span data-dcnode-id="9152" instrument_node="">In the longer term, it is to be expected that detailed characterisation of Earth-like exoplanets, a major scientific priority, will require the stability and sensitivity afforded by a large space mission. Numerous UV/optical and infrared mission concepts have been proposed and studied. The WG recommends further technical development to bring the most promising approaches to readiness. The WG also recommends that space-faring nations pursue robust cooperative programmes devoted to solving specific burning scientific questions via the implementation of multilateral medium and small size dedicated missions.</span></p></dd></dl><p></p><p data-dcnode-id="9143"><span data-dcnode-id="9147" instrument_node="">In addition to the specific high priority near-term missions listed above, the WG compiled a list of additional missions of interest around the globe, some of which might be accomplished by 2030. Such missions are listed, by approximate size class, in Section </span><a class="workspace-trigger" data-dcnode-id="9145" href="#s0025" name="bs0025"><span data-dcnode-id="9146" instrument_node="">3</span></a><span data-dcnode-id="9144" instrument_node=""> of this paper.</span></p></section><section data-dcnode-id="9129" id="s0540"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9140"><span data-dcnode-id="9141" instrument_node="">Conclusions</span></h3><p data-dcnode-id="9135" id="p0050"><span data-dcnode-id="9139" instrument_node="">The Working Group members and all who have worked on or participated in the year long activity that resulted in this report have been aware of the extraordinary “golden age” which astronomers have experienced in the last decade, with unique and great opportunities for science. The use of space-borne observatories continues to play a key role in the advance of astronomy and astrophysics by providing access to the entire electromagnetic spectrum from radio to high energy </span><em data-dcnode-id="9137"><span data-dcnode-id="9138" instrument_node="">γ</span></em><span data-dcnode-id="9136" instrument_node=""> rays. The existence of an impressive fleet of space observatories complemented by “ground based” facilities has given the worldwide scientific community an incredible opportunity to make spectacular advances in our knowledge of the Universe. The open availability of existing and future datasets from space and “ground based” observatories facilitates powerful and relatively inexpensive collaboration to address problems that can only be tackled by the application of extensive, multi-wavelength observations. Unfortunately, the future panorama, with only a few main space missions planned, requires remedial global action to correct this negative trend, to ensure positive prospects for future research, and to avoid a “dark age” for space astronomy.</span></p><p data-dcnode-id="9130" id="p0055"><span data-dcnode-id="9134" instrument_node="">We conclude that the size, complexity and costs of large space observatories must place a growing emphasis on international collaboration and multilateral cooperation. Although this poses technical and programmatic challenges, these challenges are not insurmountable, and the great scientific benefits will be a rich reward for everyone.</span><a class="workspace-trigger" data-dcnode-id="9131" href="#fn7" name="bfn7"><sup data-dcnode-id="9132"><span data-dcnode-id="9133" instrument_node="">7</span></sup></a></p></section></section><section data-dcnode-id="9037" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9122"><span data-dcnode-id="9127" instrument_node="">1</span><span data-dcnode-id="9125" instrument_node="">. </span><span data-dcnode-id="9123" instrument_node="">The COSPAR Working Group on the Future of Space Astronomy</span></h2><section data-dcnode-id="9110" id="s0010"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9116"><span data-dcnode-id="9121" instrument_node="">1.1</span><span data-dcnode-id="9119" instrument_node="">. </span><span data-dcnode-id="9117" instrument_node="">Establishment of the Working Group</span></h3><p data-dcnode-id="9111" id="p0060"><span data-dcnode-id="9115" instrument_node="">The use of observations from space continues to play a key role in the advance of astrophysics by providing access to the entire electromagnetic spectrum from the radio region to high energy </span><em data-dcnode-id="9113"><span data-dcnode-id="9114" instrument_node="">γ</span></em><span data-dcnode-id="9112" instrument_node=""> rays. The increasing size, complexity and cost of large space-based observatory missions leads to a growing emphasis on international collaboration, marked by the increasing range of joint missions involving the large space agencies in the US (NASA), Europe (ESA), Japan (JAXA), and Russia (RKA). Major future contributions are foreseen from the Indian, Chinese and Korean space agencies, and countries in South America. It is important that the world’s space agencies coordinate their mission plans for both large and small scale enterprises, both to make major missions affordable and to provide maximum scientific value for money. The coordination of existing and future datasets from space-based and “ground based” observatories is an emerging mode of powerful and relatively inexpensive collaboration to address problems that can only be tackled by the application of large multi-wavelength datasets. In April 2010, the President of COSPAR, Roger-Maurice Bonnet, created the “Future of Space Astronomy Working Group”, to be chaired by Pietro Ubertini and co-chaired by Neil Gehrels, under the aegis of Commission E, with the task of analyzing the difficult situation of space astronomy over the next two decades and recommending ways to improve the prospects. During his opening message to the 38th COSPAR Assembly, held in Bremen, Germany on 18–25 July, 2010, Prof. Bonnet announced the establishment of the Working Group.</span></p></section><section data-dcnode-id="9038" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9104"><span data-dcnode-id="9109" instrument_node="">1.2</span><span data-dcnode-id="9107" instrument_node="">. </span><span data-dcnode-id="9105" instrument_node="">Terms of Reference and Membership of the Working Group</span></h3><p data-dcnode-id="9102" id="p0065"><span data-dcnode-id="9103" instrument_node="">During the Bremen meeting, the newly elected President, Giovanni Fabrizio Bignami, fully endorsed the initial Working Group Terms of Reference, specified to be as follows:</span></p><p data-dcnode-id="9096" id="p0070"><span data-dcnode-id="9101" instrument_node="">“If the present set of space and “ground based” astronomy facilities is today impressive and fairly complete, with space and “ground based” astronomy telescopes complementing nicely, the situation becomes much more concerning and critical in the next 10 or 15</span><span data-dcnode-id="9099" instrument_node="">&nbsp;</span><span data-dcnode-id="9097" instrument_node="">years when new main space missions will be much less numerous, probably restricted to JWST and possibly WFIRST and SPICA, since no other main facilities are already recommended. The planning of “ground based” astronomy facilities is in the hands of dedicated institutions (ESO, NOAO, NRAO, etc.) which deal with their respective spectral bands, while the planning of space missions is in the hands of space agencies which deal with the whole space accessible spectrum, from high energy through infrared and sub-millimetre ranges to the radio ranges. Space missions are becoming so big that no space agency is able to cover alone the whole range of wavelengths and clearly international cooperation is needed. That situation gives a strong advantage to “ground based” astronomy, where plans are already being made for the next decade or so with such telescopes or facilities as ALMA, etc.</span></p><p data-dcnode-id="9094" id="p0075"><span data-dcnode-id="9095" instrument_node="">Following a discussion in Rio de Janeiro in August 2010, the IAU decided also to review the situation and has resurrected a Working Group on big facilities to look at the issue concerning all of astronomy including both space and “ground based” astronomy. The IAU plans to prepare a report for its next General Assembly in 2012.</span></p><p data-dcnode-id="9092" id="p0080"><span data-dcnode-id="9093" instrument_node="">At a meeting with the IAU General Secretary Jan Corbett on Monday 12 April, 2010, it was agreed that COSPAR would establish its own Working Group aiming at developing a Road Map for the planning of future main space missions which would complement the future big “ground based” telescopes.</span></p><p data-dcnode-id="9090" id="p0085"><span data-dcnode-id="9091" instrument_node="">It was further agreed that the report from the COSPAR Working Group would be an input to the IAU study, and that both Working Groups (COSPAR and IAU) would incorporate representatives of the other organisation in their respective membership”.</span></p><p data-dcnode-id="9088" id="p0090"><span data-dcnode-id="9089" instrument_node="">The membership of the COSPAR Working Group, chosen to provide wide international participation and broad astrophysical competence, is as follows: Paolo De Bernardis, Italy; Ian Corbett, UK, and IAU General Secretary (IAU liaison); Neil Gehrels, USA (Co-Chair); Matt Griffin, UK; Michael Hauser, USA; Nobuyuki Kawai, Japan; Marcos Machado, Argentina; Ravinder K. Manchanda, India; Mikhail Pavlinsky, Russia; Pietro Ubertini, Italy (Chair); Shuang-Nan Zhang, China.</span></p><p data-dcnode-id="9086" id="p0095"><span data-dcnode-id="9087" instrument_node="">The basic mandate of the Working Group was to establish a Road Map for the planning of future main space missions with a particular focus on their capability to complement the future large scale “ground based” telescopes and observatories. An important role will surely be played by “small” and “explorer” type satellites and/or attached payloads on the International Space Station (ISS), with focused though effective scientific objectives. Small/medium size experiments, affordable by single space agencies or bi-lateral/multilateral collaborations, will continue to be important for solving specific open astrophysical questions as they have in the past.</span></p><p data-dcnode-id="9054" id="p0100"><span data-dcnode-id="9085" instrument_node="">The Working Group started with a comprehensive review of the “cornerstone” studies that will influence planning of space and “ground based” astronomy in the next two decades. Of particular relevance are the following:</span></p><dl class="list" data-dcnode-id="9055"><dt class="list-label" data-dcnode-id="9083"><span data-dcnode-id="9084" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="9077"><p data-dcnode-id="9078" id="p1675"><span data-dcnode-id="9082" instrument_node="">The Astronet Report (</span><a class="workspace-trigger" data-dcnode-id="9080" href="#b0240" name="bb0240"><span data-dcnode-id="9081" instrument_node="">AST, 2007</span></a><span data-dcnode-id="9079" instrument_node="">)</span></p></dd><dt class="list-label" data-dcnode-id="9075"><span data-dcnode-id="9076" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="9069"><p data-dcnode-id="9070" id="p1680"><span data-dcnode-id="9074" instrument_node="">The ESA Cosmic Vision (</span><a class="workspace-trigger" data-dcnode-id="9072" href="#b0065" name="bb0065"><span data-dcnode-id="9073" instrument_node="">Bignami et al., 2005</span></a><span data-dcnode-id="9071" instrument_node="">)</span></p></dd><dt class="list-label" data-dcnode-id="9067"><span data-dcnode-id="9068" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="9061"><p data-dcnode-id="9062" id="p1685"><span data-dcnode-id="9066" instrument_node="">The US National Academy of Sciences Astro2010 Decadal Survey (</span><a class="workspace-trigger" data-dcnode-id="9064" href="#b0240" name="bb0240"><span data-dcnode-id="9065" instrument_node="">NRC, 2010a</span></a><span data-dcnode-id="9063" instrument_node="">)</span></p></dd><dt class="list-label" data-dcnode-id="9059"><span data-dcnode-id="9060" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="9056"><p data-dcnode-id="9057" id="p1690"><span data-dcnode-id="9058" instrument_node="">National Agency’s Road Maps</span></p></dd></dl><p></p><p data-dcnode-id="9052"><span data-dcnode-id="9053" instrument_node="">The remit of the COSPAR WG is more limited than that of the above studies, and of course the WG does not have any power of decision or direct influence on the different space agencies. With this boundary condition in mind, the WG has adopted a very pragmatic approach to formulate a conceptual international space astronomy Road Map for the coming decades.</span></p><p data-dcnode-id="9039" id="p0105"><span data-dcnode-id="9051" instrument_node="">The WG has identified a limited number of major space missions and observatories that are considered vital to solving key astrophysical questions identified in the above reports. These missions can be guaranteed to provide major advances in our knowledge of the Universe. This Road Map was the final result of almost 1</span><span data-dcnode-id="9050" instrument_node="">&nbsp;</span><span data-dcnode-id="9049" instrument_node="">year of study, achieved after a detailed analysis of the currently operating fleet of space satellites for astronomical studies (Section </span><a class="workspace-trigger" data-dcnode-id="9047" href="#s0150" name="bs0150"><span data-dcnode-id="9048" instrument_node="">4.3</span></a><span data-dcnode-id="9046" instrument_node="">), a review of the future missions already approved by the main national space agencies and multilateral inter-Agency agreements (Section </span><a class="workspace-trigger" data-dcnode-id="9044" href="#s0280" name="bs0280"><span data-dcnode-id="9045" instrument_node="">4.4</span></a><span data-dcnode-id="9043" instrument_node="">), and potential additional missions proposed or under study (Section </span><a class="workspace-trigger" data-dcnode-id="9041" href="#s0330" name="bs0330"><span data-dcnode-id="9042" instrument_node="">5</span></a><span data-dcnode-id="9040" instrument_node="">). It is important to recognise that lack of success in launching a minimum number of identified missions in the next two decades would have harmful consequences beyond the serious reduction in science investigation capability on the part of the existing astronomical community. It would also represent a decline in leadership on the part of the Space Agencies of the main developed countries, and give rise to a damaging loss of technological know-how, hampering the cutting-edge research and development advances historically enabled by space science programmes.</span></p></section></section><section data-dcnode-id="8967" id="s0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9031"><span data-dcnode-id="9036" instrument_node="">2</span><span data-dcnode-id="9034" instrument_node="">. </span><span data-dcnode-id="9032" instrument_node="">The Role of Developing Space-Faring Nations, a New Concept in International Cooperation</span></h2><p data-dcnode-id="8979" id="p0115"><span data-dcnode-id="9030" instrument_node="">The last two decades have seen a growing number of developing countries acquiring the technical expertise to develop and build their own spacecraft. Besides China and India, which have become major players in space research activities, Argentina, Brazil, Chile, Korea, Malaysia, Mexico, Pakistan, Thailand and various other countries have demonstrated the capabilities to build their own satellites or space qualified instruments that can be flown on board third party spacecraft. In times of globalisation, developing countries do not wish to and cannot afford to be passive spectators of the newly emerging opportunities related to Earth observations, materials science, biotechnology research, geophysical and environment studies and, even though it may be considered by some as a “luxury”, the use of space as a laboratory and vantage point for fundamental research in astronomy and physics, and for the exploration of the solar system. A recent Euroconsult report (</span><a class="workspace-trigger" data-dcnode-id="9028" href="#b0240" name="bb0240"><span data-dcnode-id="9029" instrument_node="">EUR, 2010</span></a><span data-dcnode-id="9027" instrument_node="">) shows that over the next decade, 280 Earth observation and meteorology satellites are expected to be launched from 41 countries, a significant increase over the 135 launches during the previous 10</span><span data-dcnode-id="9025" instrument_node="">&nbsp;</span><span data-dcnode-id="9023" instrument_node="">years. Space programmes of developing countries will play a significant role, launching an estimated 75 satellites, quadrupling their launches from the last decade. The results of the Euroconsult report (</span><a class="workspace-trigger" data-dcnode-id="9021" href="#b0240" name="bb0240"><span data-dcnode-id="9022" instrument_node="">EUR, 2010</span></a><span data-dcnode-id="9020" instrument_node="">) confirm the fact that, thus far, emerging space-faring nations have concentrated their efforts in developing “practical” missions related to areas perceived by the politicians, the media and the public as having a strong social impact and/or economic benefits. Such is the case in Argentina and Brazil, where basic science projects have either been abandoned or considerably delayed, and the situation is similar itself in other countries. Furthermore, the costs associated with the advanced technologies used in state of the art astronomical instrumentation, make it rather unlikely that these countries will independently develop any major astrophysics missions within the coming decade. Nevertheless, there will be a growing desire on the part of developing countries to contribute significantly to world-class space astronomy missions in order to develop internal technical capabilities and to participate in high profile scientific investigations which are of great cultural importance to the global community. In this respect, a good deal can be learned from recent experiences associated with world class “ground based” observatories. LOFAR,</span><a class="workspace-trigger" data-dcnode-id="9017" href="#fn8" name="bfn8"><sup data-dcnode-id="9018"><span data-dcnode-id="9019" instrument_node="">8</span></sup></a><span data-dcnode-id="9016" instrument_node=""> ALMA,</span><a class="workspace-trigger" data-dcnode-id="9013" href="#fn9" name="bfn9"><sup data-dcnode-id="9014"><span data-dcnode-id="9015" instrument_node="">9</span></sup></a><span data-dcnode-id="9012" instrument_node=""> SKA,</span><a class="workspace-trigger" data-dcnode-id="9009" href="#fn10" name="bfn10"><sup data-dcnode-id="9010"><span data-dcnode-id="9011" instrument_node="">10</span></sup></a><span data-dcnode-id="9008" instrument_node=""> ELT,</span><a class="workspace-trigger" data-dcnode-id="9005" href="#fn11" name="bfn11"><sup data-dcnode-id="9006"><span data-dcnode-id="9007" instrument_node="">11</span></sup></a><span data-dcnode-id="9004" instrument_node=""> Gemini,</span><a class="workspace-trigger" data-dcnode-id="9001" href="#fn12" name="bfn12"><sup data-dcnode-id="9002"><span data-dcnode-id="9003" instrument_node="">12</span></sup></a><span data-dcnode-id="9000" instrument_node=""> LSST,</span><a class="workspace-trigger" data-dcnode-id="8997" href="#fn13" name="bfn13"><sup data-dcnode-id="8998"><span data-dcnode-id="8999" instrument_node="">13</span></sup></a><span data-dcnode-id="8996" instrument_node=""> TMT,</span><a class="workspace-trigger" data-dcnode-id="8993" href="#fn14" name="bfn14"><sup data-dcnode-id="8994"><span data-dcnode-id="8995" instrument_node="">14</span></sup></a><span data-dcnode-id="8992" instrument_node=""> CTA,</span><a class="workspace-trigger" data-dcnode-id="8989" href="#fn15" name="bfn15"><sup data-dcnode-id="8990"><span data-dcnode-id="8991" instrument_node="">15</span></sup></a><span data-dcnode-id="8988" instrument_node=""> HAWC,</span><a class="workspace-trigger" data-dcnode-id="8985" href="#fn16" name="bfn16"><sup data-dcnode-id="8986"><span data-dcnode-id="8987" instrument_node="">16</span></sup></a><span data-dcnode-id="8984" instrument_node=""> Pierre Auger,</span><a class="workspace-trigger" data-dcnode-id="8981" href="#fn17" name="bfn17"><sup data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">17</span></sup></a><span data-dcnode-id="8980" instrument_node=""> to name some of the better known, have significant contributions from a wide range of countries including developing nations.</span></p><p data-dcnode-id="8977" id="p0120"><span data-dcnode-id="8978" instrument_node="">These concepts were developed over decades by large international consortia. In some cases one of their major contributions is the provision of the site, but this is by no means a general rule or condition for a country’s participation; in fact, in most cases the opportunity to participate in a major scientific endeavour is what is most attractive to the countries’ academic communities, government agencies, and high-tech enterprises.</span></p><p data-dcnode-id="8972" id="p0125"><span data-dcnode-id="8976" instrument_node="">We thus envision the possibility that a similar scheme can be adopted in space science missions. Examples already exist in areas outside astronomy and astrophysics, like the China–Brazil (</span><a class="workspace-trigger" data-dcnode-id="8974" href="#b0190" name="bb0190"><span data-dcnode-id="8975" instrument_node="">Sausen, 2001</span></a><span data-dcnode-id="8973" instrument_node="">) series of remote sensing satellites, or the recently launched Argentina–USA SAC-D/Aquarius mission devoted to the study of ocean salinity. Since future large observatories in space will require a partnership of several or even many national agencies, it will be important to develop a new model of partnership. Even though in practice leadership by major agencies such as NASA or ESA may need to remain, given their available resources and infrastructure, the decision-making process will need to be improved if smaller agencies are to be involved in major international missions. Often the leadership role by larger agencies gets misinterpreted as a commanding role, rather than a true partnership where all parties are sensitive and respectful to all involved. Once again, the experience of large “ground based” projects shows how science-driven facilities can be developed and implemented through large multi-agency collaborations.</span></p><p data-dcnode-id="8970" id="p0130"><span data-dcnode-id="8971" instrument_node="">It may therefore be helpful to adopt a new paradigm for International space astronomy collaboration, perhaps analogous to that used at CERN for large experiments like the LHC with several levels of associate-ship, ranging from simple observer to non-member to full member. National participation as an observer would allow the member to attend the meetings without any participation. Associate members could participate in the science and technical discussions and influence the decision making without having an actual vote, and nations providing funding for the project would have the right to take part in the decision making process. Such a model would serve two key purposes. First, a national presence, even as an observer, will give the relevant country the respectability of its association with large international missions, motivate the national space research programmes and also help deal with capacity building in space sciences. Second, it may motivate the politicians of the participating nations to aspire to become full members in order to contribute effectively in the decision making process.</span></p><p data-dcnode-id="8968" id="p0135"><span data-dcnode-id="8969" instrument_node="">A practical issue which is already known as a real impediment to wider collaboration is the application of the US International Traffic in Arms Regulations (ITAR), which has proved to be a serious problem in several instances already.</span></p></section><section data-dcnode-id="7987" id="s0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8961"><span data-dcnode-id="8966" instrument_node="">3</span><span data-dcnode-id="8964" instrument_node="">. </span><span data-dcnode-id="8962" instrument_node="">The Working Group Vision</span></h2><p data-dcnode-id="8959" id="p0140"><span data-dcnode-id="8960" instrument_node="">An international Road Map is needed that will take into account the importance of key space missions enabling the scientific integration of the space observational windows with large “ground based” facilities. This Working Group has promoted open discussions involving the IAU, IAF, IAA and all the national agencies willing to contribute, in order to analyse the best approach to the establishment of a viable and solid global Road Map.</span></p><p data-dcnode-id="8942" id="p0145"><span data-dcnode-id="8958" instrument_node="">The most likely candidates for new major space astronomy missions in the next few decades may be found in the plans of ESA and NASA. ESA has a long term plan articulated in the document </span><em data-dcnode-id="8956"><span data-dcnode-id="8957" instrument_node="">ESA Cosmic Vision: Space Science for Europe 2015–2025</span></em><span data-dcnode-id="8955" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="8953" href="#b0065" name="bb0065"><span data-dcnode-id="8954" instrument_node="">Bignami et al., 2005</span></a><span data-dcnode-id="8952" instrument_node="">). The selection process is still under way. The next L-class mission is to be selected by 2012. The future vision for the US ground and space astronomy programmes, with current key scientific questions and discovery areas as well as programmatic recommendations, is included in the US National Academy of Sciences Astro2010 Decadal Survey Report </span><em data-dcnode-id="8950"><span data-dcnode-id="8951" instrument_node="">New Worlds, New Horizons in Astronomy and Astrophysics</span></em><span data-dcnode-id="8949" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="8947" href="#b0240" name="bb0240"><span data-dcnode-id="8948" instrument_node="">NRC, 2010a</span></a><span data-dcnode-id="8946" instrument_node="">), with much more detail in each subject area in the reports from the Astro2010 Science Frontiers Panels and Program Prioritization Panels (</span><a class="workspace-trigger" data-dcnode-id="8944" href="#b0240" name="bb0240"><span data-dcnode-id="8945" instrument_node="">NRC, 2010b</span></a><span data-dcnode-id="8943" instrument_node="">).</span></p><section data-dcnode-id="8854" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8936"><span data-dcnode-id="8941" instrument_node="">3.1</span><span data-dcnode-id="8939" instrument_node="">. </span><span data-dcnode-id="8937" instrument_node="">The Present Scenario</span></h3><p data-dcnode-id="8931" id="p0150"><span data-dcnode-id="8935" instrument_node="">In order to develop specific Road Map recommendations, the WG began by reviewing the present context. We provide here a summary of our findings. Much more detail is presented in Section </span><a class="workspace-trigger" data-dcnode-id="8933" href="#s0025" name="bs0025"><span data-dcnode-id="8934" instrument_node="">3</span></a><span data-dcnode-id="8932" instrument_node=""> of this paper.</span></p><div data-dcnode-id="8880"><p data-dcnode-id="8919" id="p0155"><span data-dcnode-id="8930" instrument_node="">The present panorama for ground and space large facilities, summarised in an incomplete picture, is shown in </span><a class="workspace-trigger" data-dcnode-id="8928" href="#f0005" name="bf0005"><span data-dcnode-id="8929" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8927" instrument_node="">. In the next 5</span><span data-dcnode-id="8925" instrument_node="">&nbsp;</span><span data-dcnode-id="8923" instrument_node="">years only a few small/medium size missions are expected to be completed and placed in orbit. Currently operating large Observatories will continue to operate with aging hardware and weakened scientific grasp. The best scenario we can hope for through 2015 could be as shown in </span><a class="workspace-trigger" data-dcnode-id="8921" href="#f0010" name="bf0010"><span data-dcnode-id="8922" instrument_node="">Fig. 2</span></a><span data-dcnode-id="8920" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="8900" id="f0005"><span data-dcnode-id="8909"><img alt="" data-dcnode-id="8918" height="553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr1.jpg&amp;raw"><span data-dcnode-id="8917" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8910"><li data-dcnode-id="8911"><a class="anchor download-link u-font-sans" data-dcnode-id="8912" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8913"><span data-dcnode-id="8916" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8914"><span data-dcnode-id="8915" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8901"><span data-dcnode-id="8902"><p data-dcnode-id="8903" id="sp015"><span class="label" data-dcnode-id="8907"><span data-dcnode-id="8908" instrument_node="">Fig. 1</span></span><span data-dcnode-id="8906" instrument_node="">. </span><span data-dcnode-id="8904" instrument_node="">Present panorama for ground and space large facilities.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="8881" id="f0010"><span data-dcnode-id="8890"><img alt="" data-dcnode-id="8899" height="548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr2.jpg&amp;raw"><span data-dcnode-id="8898" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8891"><li data-dcnode-id="8892"><a class="anchor download-link u-font-sans" data-dcnode-id="8893" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8894"><span data-dcnode-id="8897" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8895"><span data-dcnode-id="8896" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8882"><span data-dcnode-id="8883"><p data-dcnode-id="8884" id="sp020"><span class="label" data-dcnode-id="8888"><span data-dcnode-id="8889" instrument_node="">Fig. 2</span></span><span data-dcnode-id="8887" instrument_node="">. </span><span data-dcnode-id="8885" instrument_node="">The best scenario. A few small/medium size missions are expected to be completed and placed in orbit. Current operative missions, like Chandra, XMM, INTEGRAL, SWIFT, etc. will hopefully be supported and in good hardware status in the future years. Few new entries are expected: ASTROSAT, Nustar, Astro-H, GEMS, e-Rosita etc.</span></p></span></span></figure></div><div data-dcnode-id="8855"><p data-dcnode-id="8875" id="p0160"><span data-dcnode-id="8879" instrument_node="">The robust state of space astrophysics missions over the past three decades and the diminished prospect in the future is perhaps more clearly illustrated in </span><a class="workspace-trigger" data-dcnode-id="8877" href="#f0015" name="bf0015"><span data-dcnode-id="8878" instrument_node="">Fig. 3</span></a><span data-dcnode-id="8876" instrument_node="">. Without strong corrective action, the space astrophysics community will lose the main space observatories without comprehensive future replacement for decades.</span></p><figure class="figure text-xs" data-dcnode-id="8856" id="f0015"><span data-dcnode-id="8865"><img alt="" data-dcnode-id="8874" height="584" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr3.jpg&amp;raw"><span data-dcnode-id="8873" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8866"><li data-dcnode-id="8867"><a class="anchor download-link u-font-sans" data-dcnode-id="8868" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8869"><span data-dcnode-id="8872" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8870"><span data-dcnode-id="8871" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8857"><span data-dcnode-id="8858"><p data-dcnode-id="8859" id="sp025"><span class="label" data-dcnode-id="8863"><span data-dcnode-id="8864" instrument_node="">Fig. 3</span></span><span data-dcnode-id="8862" instrument_node="">. </span><span data-dcnode-id="8860" instrument_node="">Missions in operation with projected lifetime (Green), and Missions under development (Yellow) with scheduled launch date indicated by the S/C position.</span></p></span></span></figure></div></section><section data-dcnode-id="8769" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8848"><span data-dcnode-id="8853" instrument_node="">3.2</span><span data-dcnode-id="8851" instrument_node="">. </span><span data-dcnode-id="8849" instrument_node="">Issues</span></h3><p data-dcnode-id="8770" id="p0165"><span data-dcnode-id="8847" instrument_node="">A credible Road Map must take into account the basic problems made evident in these figures, and seek to devise a way of resolving these issues:</span></p><dl class="list" data-dcnode-id="8771"><dt class="list-label" data-dcnode-id="8845"><span data-dcnode-id="8846" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="8799"><p data-dcnode-id="8800" id="p1695"><span data-dcnode-id="8844" instrument_node="">The impressive fleet of currently operating space observatories is aging: HST,</span><a class="workspace-trigger" data-dcnode-id="8841" href="#fn18" name="bfn18"><sup data-dcnode-id="8842"><span data-dcnode-id="8843" instrument_node="">18</span></sup></a><span data-dcnode-id="8840" instrument_node=""> Chandra (</span><a class="workspace-trigger" data-dcnode-id="8838" href="#b0230" name="bb0230"><span data-dcnode-id="8839" instrument_node="">Weisskopf et al., 2002</span></a><span data-dcnode-id="8837" instrument_node="">), XMM-Newton (</span><a class="workspace-trigger" data-dcnode-id="8835" href="#b0280" name="bb0280"><span data-dcnode-id="8836" instrument_node="">Jansen et al., 2001</span></a><span data-dcnode-id="8834" instrument_node="">) and RXTE</span><a class="workspace-trigger" data-dcnode-id="8831" href="#fn19" name="bfn19"><sup data-dcnode-id="8832"><span data-dcnode-id="8833" instrument_node="">19</span></sup></a><span data-dcnode-id="8830" instrument_node=""> are more than 10</span><span data-dcnode-id="8829" instrument_node="">&nbsp;</span><span data-dcnode-id="8828" instrument_node="">years old, and INTEGRAL (</span><a class="workspace-trigger" data-dcnode-id="8826" href="#b0240" name="bb0240"><span data-dcnode-id="8827" instrument_node="">Winkler et al., 2011</span></a><span data-dcnode-id="8825" instrument_node="">), SWIFT (</span><a class="workspace-trigger" data-dcnode-id="8823" href="#b0110" name="bb0110"><span data-dcnode-id="8824" instrument_node="">Gehrels et al., 2004</span></a><span data-dcnode-id="8822" instrument_node="">), Spitzer,</span><a class="workspace-trigger" data-dcnode-id="8819" href="#fn20" name="bfn20"><sup data-dcnode-id="8820"><span data-dcnode-id="8821" instrument_node="">20</span></sup></a><span data-dcnode-id="8818" instrument_node=""> Suzaku,</span><a class="workspace-trigger" data-dcnode-id="8815" href="#fn21" name="bfn21"><sup data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">21</span></sup></a><span data-dcnode-id="8814" instrument_node=""> and GALEX (</span><a class="workspace-trigger" data-dcnode-id="8812" href="#b0060" name="bb0060"><span data-dcnode-id="8813" instrument_node="">Bianchi et al., 1999</span></a><span data-dcnode-id="8811" instrument_node="">) have all been operating for between 5 and 8</span><span data-dcnode-id="8810" instrument_node="">&nbsp;</span><span data-dcnode-id="8809" instrument_node="">years. Most of them are in the extended phase operation and can be expected to suffer hardware degradation. The successful Herschel</span><a class="workspace-trigger" data-dcnode-id="8806" href="#fn22" name="bfn22"><sup data-dcnode-id="8807"><span data-dcnode-id="8808" instrument_node="">22</span></sup></a><span data-dcnode-id="8805" instrument_node=""> and Planck</span><a class="workspace-trigger" data-dcnode-id="8802" href="#fn23" name="bfn23"><sup data-dcnode-id="8803"><span data-dcnode-id="8804" instrument_node="">23</span></sup></a><span data-dcnode-id="8801" instrument_node=""> missions have lifetimes limited by their cryogenic design, and will both come to an end by 2014.</span></p></dd><dt class="list-label" data-dcnode-id="8797"><span data-dcnode-id="8798" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="8790"><p data-dcnode-id="8791" id="p1700"><span data-dcnode-id="8796" instrument_node="">Following JWST,</span><a class="workspace-trigger" data-dcnode-id="8793" href="#fn24" name="bfn24"><sup data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">24</span></sup></a><span data-dcnode-id="8792" instrument_node=""> there are no large astrophysics space missions currently approved. Consequently, a major gap in the coverage of the electromagnetic spectrum will arise after 2015. This raises the prospect of a new ‘dark age’, with lack of large facilities, in particular for high energy astrophysics.</span></p></dd><dt class="list-label" data-dcnode-id="8788"><span data-dcnode-id="8789" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="8782"><p data-dcnode-id="8783" id="p1705"><span data-dcnode-id="8787" instrument_node="">In contrast, there are solid and internationally agreed plans for the implementation of major “ground based” observatories, from the long-wavelength radio region to ultra high energy </span><em data-dcnode-id="8785"><span data-dcnode-id="8786" instrument_node="">γ</span></em><span data-dcnode-id="8784" instrument_node="">-rays. Space missions with comparable scientific power will be needed to give complementary access to spectral regions not accessible from the ground.</span></p></dd><dt class="list-label" data-dcnode-id="8780"><span data-dcnode-id="8781" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="8777"><p data-dcnode-id="8778" id="p1710"><span data-dcnode-id="8779" instrument_node="">The development and implementation of large space observatories, with increasing cost, large consortia, heavy payloads and space facilities, requires multilateral effort and solid decadal or multi-decadal agreements that are not easy to attain in view of short-middle term budget planning by different countries (USA, Europe etc.). An example of how this is now damaging the prospects for space astronomy is the mismatch between the timescales for mission selection in the NASA programme and ESA Cosmic Vision.</span></p></dd><dt class="list-label" data-dcnode-id="8775"><span data-dcnode-id="8776" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="8772"><p data-dcnode-id="8773" id="p1715"><span data-dcnode-id="8774" instrument_node="">A different type of collaboration programme, system and instrument level, requiring multilateral cooperation among agencies, but an easier programmatic interface has been adopted by ESA and NASA for the Mars Missions. In this scenario the national agencies collaborate at the PROGRAMME level, where one or two nations develops one mission of mutual interest and another nation (or two) develops another. Scientists from all countries in the PROGRAMME are supported by their countries to participate in the scientific planning and research with data from all missions. This may simplify management and cost control, and circumvent technology transfer constraints and issues preventing exchange of funds. The potential value of such arrangements for astrophysics missions is worth considering.</span></p></dd></dl><p></p></section><section data-dcnode-id="8737" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8763"><span data-dcnode-id="8768" instrument_node="">3.3</span><span data-dcnode-id="8766" instrument_node="">. </span><span data-dcnode-id="8764" instrument_node="">Road Map principles</span></h3><p data-dcnode-id="8738" id="p0170"><span data-dcnode-id="8762" instrument_node="">The Working Group adopted a few basic principles to guide development of a space astronomy Road Map that would be widely accepted:</span></p><dl class="list" data-dcnode-id="8739"><dt class="list-label" data-dcnode-id="8760"><span data-dcnode-id="8761" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8757"><p data-dcnode-id="8758" id="p1085"><span data-dcnode-id="8759" instrument_node="">Science driven: pursue top priority science topics stemming from state-of-the art observations and theory, and set in a worldwide context.</span></p></dd><dt class="list-label" data-dcnode-id="8755"><span data-dcnode-id="8756" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8750"><p data-dcnode-id="8751" id="p1090"><span data-dcnode-id="8754" instrument_node="">Observatory class missions: provide open access to the scientific community at large, preferably with data available with no more than a short turn-around time (6–12</span><span data-dcnode-id="8753" instrument_node="">&nbsp;</span><span data-dcnode-id="8752" instrument_node="">months) after observations.</span></p></dd><dt class="list-label" data-dcnode-id="8748"><span data-dcnode-id="8749" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8745"><p data-dcnode-id="8746" id="p1095"><span data-dcnode-id="8747" instrument_node="">Innovative enabling technology and cutting-edge scientific instrumentation: focus research and development support on innovative technologies and instrument concepts driven by science requirements for future observatory-class missions.</span></p></dd><dt class="list-label" data-dcnode-id="8743"><span data-dcnode-id="8744" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8740"><p data-dcnode-id="8741" id="p1100"><span data-dcnode-id="8742" instrument_node="">Technology development: national agencies and scientific councils support research and development programmes to advance the Technical Readiness Level of mission-critical elements to flight-ready status early in mission preparation.</span></p></dd></dl><p></p></section><section data-dcnode-id="8277" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8731"><span data-dcnode-id="8736" instrument_node="">3.4</span><span data-dcnode-id="8734" instrument_node="">. </span><span data-dcnode-id="8732" instrument_node="">A Road Map for the 2010–2020 Decade</span></h3><p data-dcnode-id="8729" id="p0175"><span data-dcnode-id="8730" instrument_node="">With the above issues and principles in mind, the WG recommends that the following new missions be pursued vigorously in the present decade. We assume that JWST will be launched in this decade as planned.</span></p><section data-dcnode-id="8691" id="s0050"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8723"><span data-dcnode-id="8728" instrument_node="">3.4.1</span><span data-dcnode-id="8726" instrument_node="">. </span><span data-dcnode-id="8724" instrument_node="">IXO: International X-ray Observatory</span></h4><p data-dcnode-id="8721" id="p0180"><span data-dcnode-id="8722" instrument_node="">In May 2008 ESA and NASA established a coordination group involving ESA, NASA and JAXA, to study a joint mission merging their independent XEUS and Constellation-X concepts. The International X-ray Observatory (IXO) was announced to the astronomical community in July 2008 as a joint X-ray observatory with participation from ESA, NASA and JAXA. Top level science goals and derived key science measurement requirements were established. Peering through dust and obscuring clouds of gas, IXO would discover and map super-massive black holes at very early times when the Universe was still assembling galaxies. The unprecedented sensitivity of the IXO images and spectra would uncover the history and evolution of matter and energy, visible and dark, as well as their interplay during the formation of the largest structures. Observations of neutron stars would show how matter rearranges itself under crushing pressures well beyond what can be studied in any laboratory, while studies of spinning black holes would reveal how these objects form and grow. IXO planned to explore both when and how elements were created, how they dispersed into the intergalactic medium, and much more.</span></p><p data-dcnode-id="8704" id="p0185"><span data-dcnode-id="8720" instrument_node="">The study team had the target to provide the input to the US decadal process and to the ESA selection for the Cosmic Vision Plan. The starting configuration for the IXO study was a mission featuring a single large X-ray mirror and an extensible optical bench with a 20–25</span><span data-dcnode-id="8718" instrument_node="">&nbsp;</span><span data-dcnode-id="8716" instrument_node="">m focal length, with an interchangeable focal plane. To achieve its science goals, IXO featured a single large X-ray mirror with a 3 square metre collecting area and 5 arc sec angular resolution, and a suite of instrumentation, including a wide field imaging detector, a hard X-ray imaging detector, a high-spectral-resolution imaging spectrometer (calorimeter), a grating spectrometer, a high time-resolution spectrometer, and a polarimeter. IXO would provide up to 100-fold increase in effective area for high resolution spectroscopy from 0.3 to 10</span><span data-dcnode-id="8714" instrument_node="">&nbsp;</span><span data-dcnode-id="8712" instrument_node="">keV, deep spectral imaging from 0.3 to 40</span><span data-dcnode-id="8710" instrument_node="">&nbsp;</span><span data-dcnode-id="8708" instrument_node="">keV over a wide field of view, and microsecond spectroscopic timing with high count rate capability.</span><a class="workspace-trigger" data-dcnode-id="8705" href="#fn25" name="bfn25"><sup data-dcnode-id="8706"><span data-dcnode-id="8707" instrument_node="">25</span></sup></a></p><p data-dcnode-
