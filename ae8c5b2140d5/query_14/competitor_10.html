etermine the chemical abundances and velocity structure in Galactic Type Ia supernova remnants to provide insight into the explosion mechanism. To accomplish these investigations, the SXS uses a state-of-the-art X-ray calorimeter spectrometer at the focus of a high-throughput X-ray telescope. The X-ray calorimeter is a low-temperature sensor that measures the energy of each X-ray photon as heat with extraordinary precision, and allows high-resolution spectra to be obtained from extended sources without degradation. The instrument utilises a multi-stage cooling system that will maintain the ultra-low temperature of the calorimeter array for more than 3</span><span data-dcnode-id="5590" instrument_node="">&nbsp;</span><span data-dcnode-id="5588" instrument_node="">years in space. X-rays are focused onto an array of calorimeters by a highly efficient, grazing-incidence X-ray mirror that provides large collecting area. The result is a high-resolution spectrum at each pixel of the image. The NASA contribution to Astro-H is being built at the NASA/Goddard Spaceflight Center in collaboration with the University of Wisconsin. Astro-H will be launched into low-Earth orbit from the Tanegashima Space Center, Japan, by a JAXA H-IIA rocket (</span><a class="workspace-trigger" data-dcnode-id="5586" href="#b0205" name="bb0205"><span data-dcnode-id="5587" instrument_node="">Takahashi et al., 2010</span></a><span data-dcnode-id="5585" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5565" id="f0185"><span data-dcnode-id="5574"><img alt="" data-dcnode-id="5583" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr37.jpg&amp;raw"><span data-dcnode-id="5582" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5575"><li data-dcnode-id="5576"><a class="anchor download-link u-font-sans" data-dcnode-id="5577" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr37.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5578"><span data-dcnode-id="5581" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5566"><span data-dcnode-id="5567"><p data-dcnode-id="5568" id="sp195"><span class="label" data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">Fig. 37</span></span><span data-dcnode-id="5571" instrument_node="">. </span><span data-dcnode-id="5569" instrument_node="">Astro H artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5528" id="s0310"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5557"><span data-dcnode-id="5562" instrument_node="">4.4.6</span><span data-dcnode-id="5560" instrument_node="">. </span><span data-dcnode-id="5558" instrument_node="">Gravity and Extreme Magnetism Small Explorer (GEMS): Launch 2014</span></h4><div data-dcnode-id="5529"><p data-dcnode-id="5549" id="p0545"><span data-dcnode-id="5556" instrument_node="">GEMS is a NASA SMEX mission designed to measure X-ray polarisation. It will use three grazing incidence X-ray optics to explore the shape of space that has been distorted by a spinning black hole’s gravity, and probe the structure and effects of the magnetic field around neutron stars (see </span><a class="workspace-trigger" data-dcnode-id="5554" href="#f0190" name="bf0190"><span data-dcnode-id="5555" instrument_node="">Fig. 38</span></a><span data-dcnode-id="5553" instrument_node="">). Current missions cannot do this because the required angular resolution is far beyond what is technically feasible and, in the case of magnetic field imaging, can’t do this because magnetic fields are invisible. GEMS will use a new technique to accomplish what has been impossible until now. It will build up a picture indirectly by measuring the polarisation of X-rays. This will open new discovery space because GEMS is orders of magnitude more sensitive than previous X-ray polarisation experiments (</span><a class="workspace-trigger" data-dcnode-id="5551" href="#b0130" name="bb0130"><span data-dcnode-id="5552" instrument_node="">Jahoda, 2010</span></a><span data-dcnode-id="5550" instrument_node="">). X-rays are just a powerful kind of light. When light travels freely through space, its electric field can vibrate in any direction; however, under certain conditions, it becomes polarised. This means it is forced to vibrate primarily in only one direction. This happens when light scatters off of a surface, for example, or when it traverses a strong magnetic field.</span></p><figure class="figure text-xs" data-dcnode-id="5530" id="f0190"><span data-dcnode-id="5539"><img alt="" data-dcnode-id="5548" height="261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr38.jpg&amp;raw"><span data-dcnode-id="5547" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5540"><li data-dcnode-id="5541"><a class="anchor download-link u-font-sans" data-dcnode-id="5542" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr38.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5543"><span data-dcnode-id="5546" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5544"><span data-dcnode-id="5545" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5531"><span data-dcnode-id="5532"><p data-dcnode-id="5533" id="sp200"><span class="label" data-dcnode-id="5537"><span data-dcnode-id="5538" instrument_node="">Fig. 38</span></span><span data-dcnode-id="5536" instrument_node="">. </span><span data-dcnode-id="5534" instrument_node="">GEMS artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5404" id="s0315"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5522"><span data-dcnode-id="5527" instrument_node="">4.4.7</span><span data-dcnode-id="5525" instrument_node="">. </span><span data-dcnode-id="5523" instrument_node="">Hard X-ray Modulation Telescope (HXMT): Launch 2015</span></h4><div data-dcnode-id="5405"><p data-dcnode-id="5424" id="p0550"><span data-dcnode-id="5521" instrument_node="">The “Hard X-ray Modulation Telescope” (HXMT) was proposed in 1994 (</span><a class="workspace-trigger" data-dcnode-id="5519" href="#b0100" name="bb0100"><span data-dcnode-id="5520" instrument_node="">Fangjun, 2009</span></a><span data-dcnode-id="5518" instrument_node="">). In 2000, the feasibility and technical demonstration study of HXMT was selected as a project under the Major State Basic Research Development Program in China. The project entered its full design phase in October 2005. In March 2007, the Chinese National Space Administration (CNSA) released the 5-year plan for space science development in the period 2006–2010, in which HXMT was scheduled for launch in around 2010. The technical feasibility review was concluded successfully in September 2007. However, a full funding decision was not made until March 2011, when CNSA finally confirmed its funding approval request with a new launch date in 2014–2015. HXMT (see </span><a class="workspace-trigger" data-dcnode-id="5516" href="#f0195" name="bf0195"><span data-dcnode-id="5517" instrument_node="">Fig. 39</span></a><span data-dcnode-id="5515" instrument_node="">) will be launched into a low Earth orbit with an altitude of 550</span><span data-dcnode-id="5513" instrument_node="">&nbsp;</span><span data-dcnode-id="5511" instrument_node="">km and an inclination angle of 43</span><span data-dcnode-id="5509" instrument_node="">&nbsp;</span><span data-dcnode-id="5507" instrument_node="">degree. HXMT carries three slat-collimated instruments, the High Energy X-ray instrument (HE: NaI/CsI phoswitch scintillators, 20–250</span><span data-dcnode-id="5505" instrument_node="">&nbsp;</span><span data-dcnode-id="5503" instrument_node="">keV, 5000</span><span data-dcnode-id="5501" instrument_node="">&nbsp;</span><span data-dcnode-id="5499" instrument_node="">cm</span><sup data-dcnode-id="5497"><span data-dcnode-id="5498" instrument_node="">2</span></sup><span data-dcnode-id="5496" instrument_node="">), the Medium Energy X-ray instrument (ME: SiPIN, 5–30</span><span data-dcnode-id="5494" instrument_node="">&nbsp;</span><span data-dcnode-id="5492" instrument_node="">keV, 952</span><span data-dcnode-id="5490" instrument_node="">&nbsp;</span><span data-dcnode-id="5488" instrument_node="">cm</span><sup data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">2</span></sup><span data-dcnode-id="5485" instrument_node="">), and the Low Energy X-ray instrument (LE: Si-SCD, 1–15</span><span data-dcnode-id="5483" instrument_node="">&nbsp;</span><span data-dcnode-id="5481" instrument_node="">keV, 384</span><span data-dcnode-id="5479" instrument_node="">&nbsp;</span><span data-dcnode-id="5477" instrument_node="">cm</span><sup data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">2</span></sup><span data-dcnode-id="5474" instrument_node="">). Each instrument contains a number of individual modules, and the typical field of view of a module is 5.7</span><span data-dcnode-id="5472" instrument_node="">&nbsp;</span><span data-dcnode-id="5470" instrument_node="">degree</span><span data-dcnode-id="5468" instrument_node="">&nbsp;</span><span data-dcnode-id="5466" instrument_node="">×</span><span data-dcnode-id="5464" instrument_node="">&nbsp;</span><span data-dcnode-id="5462" instrument_node="">1.1</span><span data-dcnode-id="5460" instrument_node="">&nbsp;</span><span data-dcnode-id="5458" instrument_node="">degree (Full Width Half Maximum). The total payload and satellite weights are about 1200 and 2700</span><span data-dcnode-id="5456" instrument_node="">&nbsp;</span><span data-dcnode-id="5454" instrument_node="">kg, respectively. The designed mission lifetime is 4</span><span data-dcnode-id="5452" instrument_node="">&nbsp;</span><span data-dcnode-id="5450" instrument_node="">years. HXMT will perform sky surveys and pointed observations in the energy range 1–250</span><span data-dcnode-id="5448" instrument_node="">&nbsp;</span><span data-dcnode-id="5446" instrument_node="">keV, with the following main scientific objectives:</span></p><dl class="list" data-dcnode-id="5425"><dt class="list-label" data-dcnode-id="5444"><span data-dcnode-id="5445" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5441"><p data-dcnode-id="5442" id="p1435"><span data-dcnode-id="5443" instrument_node="">Perform repeated scanning surveys of the Galactic plane, in order to monitor Galactic variable sources and to detect new Galactic transient sources.</span></p></dd><dt class="list-label" data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5436"><p data-dcnode-id="5437" id="p1440"><span data-dcnode-id="5438" instrument_node="">Make large-area sky observations, in order to study the cosmic variance of the cosmic X-ray background.</span></p></dd><dt class="list-label" data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5431"><p data-dcnode-id="5432" id="p1445"><span data-dcnode-id="5433" instrument_node="">Obtain broad band X-ray spectra of bright AGNs, in order to constrain the geometry of the various components in the AGNs unified model.</span></p></dd><dt class="list-label" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5426"><p data-dcnode-id="5427" id="p1450"><span data-dcnode-id="5428" instrument_node="">Observe X-ray binaries with broad band spectral and timing capabilities, in order to understand the physics under the extreme physical conditions near compact objects.</span></p></dd></dl><p></p><figure class="figure text-xs" data-dcnode-id="5406" id="f0195"><span data-dcnode-id="5414"><img alt="" data-dcnode-id="5423" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr39.jpg&amp;raw"><span data-dcnode-id="5422" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5415"><li data-dcnode-id="5416"><a class="anchor download-link u-font-sans" data-dcnode-id="5417" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr39.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5418"><span data-dcnode-id="5421" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5407"><span data-dcnode-id="5408"><p data-dcnode-id="5409" id="sp205"><span class="label" data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">Fig. 39</span></span><span data-dcnode-id="5411" instrument_node="">. </span><span data-dcnode-id="5410" instrument_node="">HXMT artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5356" id="s0320"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5398"><span data-dcnode-id="5403" instrument_node="">4.4.8</span><span data-dcnode-id="5401" instrument_node="">. </span><span data-dcnode-id="5399" instrument_node="">The James Webb Space Telescope: Launch 2018</span></h4><div data-dcnode-id="5357"><p data-dcnode-id="5377" id="p0555"><span data-dcnode-id="5397" instrument_node="">The James Webb Space Telescope (JWST) is a collaborative mission involving NASA, ESA and the Canadian Space Agency. The observatory consists ofa large, infrared-optimised space telescope with a segmented 6.5</span><span data-dcnode-id="5395" instrument_node="">&nbsp;</span><span data-dcnode-id="5393" instrument_node="">m primary mirror four instruments sensitive from 0.6 to 27</span><span data-dcnode-id="5391" instrument_node="">&nbsp;</span><span data-dcnode-id="5389" instrument_node="">μm. JWST is scheduled for launch on an Ariane rocket not earlier than 2018. It will be launched to a location about 1.5</span><span data-dcnode-id="5387" instrument_node="">&nbsp;</span><span data-dcnode-id="5385" instrument_node="">million km from the Earth, orbiting the Earth-Sun Lagrange point L2.</span><a class="workspace-trigger" data-dcnode-id="5382" href="#fn47" name="bfn47"><sup data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">47</span></sup></a><span data-dcnode-id="5381" instrument_node=""> JWST will find the first galaxies that formed in the early Universe, connecting the Big Bang to our own Milky Way Galaxy. It will peer through dusty clouds to see stars and planetary systems forming, connecting the Milky Way to our own solar system. The JWST instruments will be designed to work primarily in the infrared range of the electromagnetic spectrum, with some capability in the visible range (see </span><a class="workspace-trigger" data-dcnode-id="5379" href="#f0200" name="bf0200"><span data-dcnode-id="5380" instrument_node="">Fig. 40</span></a><span data-dcnode-id="5378" instrument_node="">). In order to achieve high sensitivity in the infrared, JWST will have a multi-layer sunshield the size of a tennis court to shield the telescope and instruments from direct radiation from the Sun and Earth. Both the telescope and sunshade are too large to fit into the rocket shroud fully open, so both will fold up and be deployed once Webb is in outer space. The James Webb Space Telescope was named after the early NASA Administrator who assured that science would be an important element of the NASA programme.</span></p><figure class="figure text-xs" data-dcnode-id="5358" id="f0200"><span data-dcnode-id="5367"><img alt="" data-dcnode-id="5376" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr40.jpg&amp;raw"><span data-dcnode-id="5375" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5368"><li data-dcnode-id="5369"><a class="anchor download-link u-font-sans" data-dcnode-id="5370" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr40.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5371"><span data-dcnode-id="5374" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5359"><span data-dcnode-id="5360"><p data-dcnode-id="5361" id="sp210"><span class="label" data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">Fig. 40</span></span><span data-dcnode-id="5364" instrument_node="">. </span><span data-dcnode-id="5362" instrument_node="">James Webb Space Telescope artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5315" id="s0325"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5350"><span data-dcnode-id="5355" instrument_node="">4.4.9</span><span data-dcnode-id="5353" instrument_node="">. </span><span data-dcnode-id="5351" instrument_node="">Stratospheric Observatory for Infrared Astronomy (SOFIA): Fully operational 2014</span></h4><div data-dcnode-id="5318"><p data-dcnode-id="5338" id="p0560"><span data-dcnode-id="5349" instrument_node="">SOFIA (</span><a class="workspace-trigger" data-dcnode-id="5347" href="#b0135" name="bb0135"><span data-dcnode-id="5348" instrument_node="">Krabbe, 2000</span></a><span data-dcnode-id="5346" instrument_node="">) is a world-class airborne infrared observatory (see </span><a class="workspace-trigger" data-dcnode-id="5344" href="#f0205" name="bf0205"><span data-dcnode-id="5345" instrument_node="">Fig. 41</span></a><span data-dcnode-id="5343" instrument_node="">) that will complement the Hubble, Spitzer, Herschel and Webb space telescopes and major Earth-based telescopes. SOFIA is a joint program by NASA and DLR, Deutsches Zentrum fur Luft und Raumfahrt (German Aerospace Center). Major modifications of a Boeing 747-SP aircraft and installation of the 2.5</span><span data-dcnode-id="5341" instrument_node="">&nbsp;</span><span data-dcnode-id="5339" instrument_node="">m telescope built in Germany were carried out at the L-3 Communications Integrated Systems facility at Waco, Texas. Completion of systems installation, integration and flight test operations were conducted at NASA’s Dryden Flight Research Center at Edwards Air Force Base, California, from 2007 to 2010. SOFIA’s science operations are being planned jointly by the Universities Space Research Association (USRA) and the Deutsches SOFIA Institut (DSI) under leadership of the SOFIA Science project at NASA’s Ames Research Center at Moffett Field near San Jose, California.</span></p><figure class="figure text-xs" data-dcnode-id="5319" id="f0205"><span data-dcnode-id="5328"><img alt="" data-dcnode-id="5337" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr41.jpg&amp;raw"><span data-dcnode-id="5336" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5329"><li data-dcnode-id="5330"><a class="anchor download-link u-font-sans" data-dcnode-id="5331" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr41.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5332"><span data-dcnode-id="5335" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5320"><span data-dcnode-id="5321"><p data-dcnode-id="5322" id="sp215"><span class="label" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Fig. 41</span></span><span data-dcnode-id="5325" instrument_node="">. </span><span data-dcnode-id="5323" instrument_node="">Photo of SOFIA, the Stratospheric Observatory for Infrared Astronomy, during ’open-door’ flight tests.</span></p></span></span></figure></div><p data-dcnode-id="5316" id="p0565"><span data-dcnode-id="5317" instrument_node="">SOFIA early science operations began in 2010, with full operational capability planned for 2014. SOFIA’S instruments will provide astronomers with access to the visible, infrared and submillimetre spectrum, with optimised performance in the mid-infrared to submillimetre range. During its 20-year expected lifetime it will be capable of “Great Observatory” – class astronomical science, and permit installation of up-graded instruments as technology advances. By recording infrared measurements not possible from the ground, SOFIA will be able to observe occultation of stars by solar system objects to help determine the objects’ sizes, compositions and atmospheric structures. It will help answer many fundamental questions about the creation and evolution of the universe, including how stars and planets are formed, how organic materials necessary for life form and evolve, and the nature of the black hole at the center of our Milky Way galaxy.</span></p></section></section></section><section data-dcnode-id="4400" id="s0330"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5307"><span data-dcnode-id="5312" instrument_node="">5</span><span data-dcnode-id="5310" instrument_node="">. </span><span data-dcnode-id="5308" instrument_node="">The Future Programmes of the National Space Agencies</span></h2><p data-dcnode-id="5305" id="p0570"><span data-dcnode-id="5306" instrument_node="">In this section we review the main mission opportunities already under study for selection or firmly planned in the context of space agencies around the world.</span></p><section data-dcnode-id="5196" id="s0335"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5299"><span data-dcnode-id="5304" instrument_node="">5.1</span><span data-dcnode-id="5302" instrument_node="">. </span><span data-dcnode-id="5300" instrument_node="">The NASA future programs and Vision</span></h3><p data-dcnode-id="5275" id="p0575"><span data-dcnode-id="5298" instrument_node="">The US National Academy of Sciences Astro2010 Decadal Survey scientific and programmatic priority recommendations were made by the Committee for a Decadal Survey of Astronomy and Astrophysics (</span><a class="workspace-trigger" data-dcnode-id="5296" href="#b0240" name="bb0240"><span data-dcnode-id="5297" instrument_node="">NRC, 2010a</span></a><span data-dcnode-id="5295" instrument_node="">). More detailed discussions of the science questions and programmatic options on which the recommendations were based are presented in a separate publication containing the reports of the Science Frontiers Panels and Program Prioritization Panels (</span><a class="workspace-trigger" data-dcnode-id="5293" href="#b0240" name="bb0240"><span data-dcnode-id="5294" instrument_node="">NRC, 2010b</span></a><span data-dcnode-id="5292" instrument_node="">). The recommended programme is organised by three science objectives that represent its scope:</span></p><dl class="list" data-dcnode-id="5276"><dt class="list-label" data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5287"><p data-dcnode-id="5288" id="p1455"><span data-dcnode-id="5289" instrument_node="">Cosmic Dawn.</span></p></dd><dt class="list-label" data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5282"><p data-dcnode-id="5283" id="p1460"><span data-dcnode-id="5284" instrument_node="">New Worlds.</span></p></dd><dt class="list-label" data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5277"><p data-dcnode-id="5278" id="p1465"><span data-dcnode-id="5279" instrument_node="">Physics of the Universe.</span></p></dd></dl><p></p><p data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">The highest priority recommendations for space missions and programs are as follows:</span></p><p data-dcnode-id="5231" id="p0580"><span data-dcnode-id="5272" instrument_node="">Large programmes (in rank order)</span></p><dl class="list" data-dcnode-id="5232"><dt class="list-label" data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5260"><p data-dcnode-id="5266" id="p1470"><em data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Wide-Field Infrared Survey Telescope (WFIRST)</span></em><span data-dcnode-id="5267" instrument_node="">.</span></p><p data-dcnode-id="5261" id="p0590"><span data-dcnode-id="5265" instrument_node="">WFIRST is an observatory designed to address essential questions in both exoplanets and dark energy research, and to conduct near infrared sky surveys of unprecedented sky coverage, sensitivity and angular resolution. Such surveys will advance research on topics ranging from galaxy evolution to the study of objects within our own Galaxy. The primary operations will consist of surveys defined by selected science teams (</span><a class="workspace-trigger" data-dcnode-id="5263" href="#b0240" name="bb0240"><span data-dcnode-id="5264" instrument_node="">SIR, 2010</span></a><span data-dcnode-id="5262" instrument_node="">). It is the top-ranked overall programme in the New Worlds, New Horizons Decadal Survey of Astronomy and Astrophysics.</span></p></dd><dt class="list-label" data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5251"><p data-dcnode-id="5254" id="p1475"><em data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">An Augmented Astrophysics Explorer Program</span></em><span data-dcnode-id="5255" instrument_node="">.</span></p><p data-dcnode-id="5252" id="p0595"><span data-dcnode-id="5253" instrument_node="">This is a recommendation to increase the rate of launching PI-led missions. Such missions deliver a high level of scientific return on relatively moderate investment and provide the capability to respond rapidly to new scientific and technical breakthroughs.</span></p></dd><dt class="list-label" data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5242"><p data-dcnode-id="5245" id="p1480"><em data-dcnode-id="5247"><span data-dcnode-id="5248" instrument_node="">Laser Interferometer Space Antenna (LISA)</span></em><span data-dcnode-id="5246" instrument_node="">.</span></p><p data-dcnode-id="5243" id="p0600"><span data-dcnode-id="5244" instrument_node="">LISA is a low-frequency gravitational wave observatory that will open an entirely new window on the cosmos by measuring ripples in space-time caused by many new sources, including nearby white dwarf stars, and will probe the nature of black holes. This recommendation assumed partnership with ESA.</span></p></dd><dt class="list-label" data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5233"><p data-dcnode-id="5236" id="p1485"><em data-dcnode-id="5238"><span data-dcnode-id="5239" instrument_node="">International X-ray Observatory (IXO)</span></em><span data-dcnode-id="5237" instrument_node="">.</span></p><p data-dcnode-id="5234" id="p0605"><span data-dcnode-id="5235" instrument_node="">IXO is a powerful X-ray telescope that will transform our understanding of hot gas associated with stars and galaxies in all evolutionary stages. This recommendation assumed partnership with ESA and JAXA.</span></p></dd></dl><p></p><p data-dcnode-id="5214" id="p0585"><span data-dcnode-id="5230" instrument_node="">Medium scale Programmes (in rank order)</span></p><dl class="list" data-dcnode-id="5215"><dt class="list-label" data-dcnode-id="5228"><span data-dcnode-id="5229" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5223"><p data-dcnode-id="5224" id="p1490"><em data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">New Worlds Technology Development Program</span></em><span data-dcnode-id="5225" instrument_node="">. This is a competed programme to lay the technical and scientific foundation for a future mission to study nearby Earth-like planets.</span></p></dd><dt class="list-label" data-dcnode-id="5221"><span data-dcnode-id="5222" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5216"><p data-dcnode-id="5217" id="p1495"><em data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">Inflation Probe Technology Development Program</span></em><span data-dcnode-id="5218" instrument_node="">. This is a competed programme designed to prepare for a potential next-decade cosmic microwave-background mission to study the epoch of inflation.</span></p></dd></dl><p></p><p data-dcnode-id="5197"><span data-dcnode-id="5213" instrument_node="">Small programmes (mentioned here because there is a relatively small NASA contribution to a large international programme)</span></p><dl class="list" data-dcnode-id="5198"><dt class="list-label" data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5199"><p data-dcnode-id="5200" id="p1500"><em data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">Background-limited Submillimetre Spectrometer on SPICA</span></em><span data-dcnode-id="5208" instrument_node=""> A spectrometer of unprecedented sensitivity for Galactic and extragalactic studies provided by NASA to the Japanese Space Infrared Telescope for Cosmology and Astrophysics (SPICA) mission.</span><a class="workspace-trigger" data-dcnode-id="5205" href="#fn48" name="bfn48"><sup data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">48</span></sup></a><span data-dcnode-id="5204" instrument_node=""> [</span><em data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Note</span></em><span data-dcnode-id="5201" instrument_node="">: the Astro2010 Survey Report indicated that if sufficient funding were not available to do the full recommended programme, this should be the first activity removed from the recommended list. Since the release of the Astro2010 Survey Report, NASA has indicated that it cannot participate on the current SPICA schedule.]</span></p></dd></dl><p></p></section><section data-dcnode-id="4401" id="s0340"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5190"><span data-dcnode-id="5195" instrument_node="">5.2</span><span data-dcnode-id="5193" instrument_node="">. </span><span data-dcnode-id="5191" instrument_node="">The ESA future programmes and Cosmic Vision</span></h3><p data-dcnode-id="5182" id="p0620"><span data-dcnode-id="5189" instrument_node="">The European Space Agency started the definition of a new long term plan in 2004 with the call for new Space Science missions to be conducted in the next decade. The community responded with more than 150 ideas that were reviewed by the Agency advisory groups. The results are summarised in: </span><em data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">Cosmic Vision Space Science for Europe 2015–2025</span></em><span data-dcnode-id="5186" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5184" href="#b0065" name="bb0065"><span data-dcnode-id="5185" instrument_node="">Bignami et al., 2005</span></a><span data-dcnode-id="5183" instrument_node="">).</span></p><div data-dcnode-id="5157"><p data-dcnode-id="5177" id="p0625"><span data-dcnode-id="5181" instrument_node="">An updated Cosmic Vision Long Term Plan is shown in </span><a class="workspace-trigger" data-dcnode-id="5179" href="#f0210" name="bf0210"><span data-dcnode-id="5180" instrument_node="">Fig. 42</span></a><span data-dcnode-id="5178" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="5158" id="f0210"><span data-dcnode-id="5167"><img alt="" data-dcnode-id="5176" height="509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr42.jpg&amp;raw"><span data-dcnode-id="5175" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5168"><li data-dcnode-id="5169"><a class="anchor download-link u-font-sans" data-dcnode-id="5170" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr42.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5171"><span data-dcnode-id="5174" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5159"><span data-dcnode-id="5160"><p data-dcnode-id="5161" id="sp220"><span class="label" data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">Fig. 42</span></span><span data-dcnode-id="5164" instrument_node="">. </span><span data-dcnode-id="5162" instrument_node="">ESA Cosmic Vision long term plan and time schedule for M- and L-Class planned missions.</span></p></span></span></figure></div><p data-dcnode-id="5134" id="p0630"><span data-dcnode-id="5156" instrument_node="">The ESA Science Vision Working Group identified four key questions where significant advances and breakthroughs can be expected in the coming two decades:</span></p><dl class="list" data-dcnode-id="5135"><dt class="list-label" data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5151"><p data-dcnode-id="5152" id="p1505"><span data-dcnode-id="5153" instrument_node="">Do we understand the extremes of the Universe?</span></p></dd><dt class="list-label" data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5146"><p data-dcnode-id="5147" id="p1510"><span data-dcnode-id="5148" instrument_node="">How do galaxies form and evolve?</span></p></dd><dt class="list-label" data-dcnode-id="5144"><span data-dcnode-id="5145" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5141"><p data-dcnode-id="5142" id="p1515"><span data-dcnode-id="5143" instrument_node="">What is the origin and evolution of stars and planets?</span></p></dd><dt class="list-label" data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5136"><p data-dcnode-id="5137" id="p1520"><span data-dcnode-id="5138" instrument_node="">How do we (and the Solar System) fit in?</span></p></dd></dl><p></p><div data-dcnode-id="5105"><p data-dcnode-id="5127" id="p0635"><span data-dcnode-id="5133" instrument_node="">These are amongst the most fundamental questions in astrophysical science and generate considerable interest in the general public. The Cosmic Vision basic implementation schedule </span><a class="workspace-trigger" data-dcnode-id="5131" href="#b0095" name="bb0095"><span data-dcnode-id="5132" instrument_node="">Clavel (2010)</span></a><span data-dcnode-id="5130" instrument_node=""> is shown in </span><a class="workspace-trigger" data-dcnode-id="5128" href="#f0215" name="bf0215"><span data-dcnode-id="5129" instrument_node="">Fig. 43</span></a></p><figure class="figure text-xs" data-dcnode-id="5106" id="f0215"><span data-dcnode-id="5117"><img alt="" data-dcnode-id="5126" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr43.jpg&amp;raw"><span data-dcnode-id="5125" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5118"><li data-dcnode-id="5119"><a class="anchor download-link u-font-sans" data-dcnode-id="5120" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr43.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5121"><span data-dcnode-id="5124" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5107"><span data-dcnode-id="5108"><p data-dcnode-id="5109" id="sp225"><span class="label" data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">Fig. 43</span></span><span data-dcnode-id="5114" instrument_node="">. </span><span data-dcnode-id="5113" instrument_node="">Cosmic Vision 2015–2025. Implementation plan and selection milestone for Medium and Large Class planned missions (</span><a class="workspace-trigger" data-dcnode-id="5111" href="#b0095" name="bb0095"><span data-dcnode-id="5112" instrument_node="">Clavel, 2010</span></a><span data-dcnode-id="5110" instrument_node="">).</span></p></span></span></figure></div><p data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Following is a short description of all the emissions under selection.</span></p><section data-dcnode-id="4827" id="s0345"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5099"><span data-dcnode-id="5102" instrument_node="">5.2.1</span><span data-dcnode-id="5101" instrument_node="">. </span><span data-dcnode-id="5100" instrument_node="">The Cosmic Vision L-Class priority (under selection)</span></h4><p data-dcnode-id="5097" id="p0645"><span data-dcnode-id="5098" instrument_node="">In February 2009 a down-selection took place between the two L-class missions Laplace (Jupiter) and TandEM (Saturn). Both missions had been proposed as collaborations with NASA, and a joint decision was taken to retain the mission to the Jupiter system as candidate for the L1 launch slot in 2020. The remaining candidate L missions for the L1 launch slot are EJSM/Laplace, IXO and LISA.</span></p><section data-dcnode-id="5022" id="s0350"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5090"><span data-dcnode-id="5096" instrument_node="">5.2.1.1</span><span data-dcnode-id="5095" instrument_node="">. </span><span data-dcnode-id="5094" instrument_node="">L1: Europa Jupiter System Mission (EJSM): Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="5092" href="#t0020" name="bt0020"><span data-dcnode-id="5093" instrument_node="">Table 4</span></a><span data-dcnode-id="5091" instrument_node="">)</span></h5><div data-dcnode-id="5023"><p data-dcnode-id="5077" id="p0650"><span data-dcnode-id="5089" instrument_node="">The ESA-NASA Europa Jupiter System Mission (</span><a class="workspace-trigger" data-dcnode-id="5087" href="#b0090" name="bb0090"><span data-dcnode-id="5088" instrument_node="">Clark et al., 2010</span></a><span data-dcnode-id="5086" instrument_node="">) consists of two primary flight elements operating in the Jovian system: the NASA-led Jupiter Europa Orbiter (JEO),</span><a class="workspace-trigger" data-dcnode-id="5083" href="#fn49" name="bfn49"><sup data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">49</span></sup></a><span data-dcnode-id="5082" instrument_node=""> and the ESA-led Jupiter Ganymede Orbiter (JGO).</span><a class="workspace-trigger" data-dcnode-id="5079" href="#fn50" name="bfn50"><sup data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">50</span></sup></a><span data-dcnode-id="5078" instrument_node=""> JEO and JGO will execute a choreographed exploration of the Jupiter System before settling into orbit around Europa and Ganymede, respectively. JEO and JGO carry 11 and 10 complementary instruments, respectively, to monitor dynamic phenomena (such as Io’s volcanoes and Jupiter’s atmosphere), map the Jovian magnetosphere and its interactions with the Galilean satellites, and characterise water oceans beneath the ice shells of Europa and Ganymede. By understanding the Jupiter system and unraveling its history from origin to the possible emergence of habitable worlds, a better understanding will be gained as to how gas giant planets and their satellites form and evolve. Most important, new light will be shed on the potential for the emergence of life in the galactic neighbourhood and beyond. Thus, the overarching theme for EJSM has been formulated as: The emergence of habitable worlds around gas giants. To understand the Galilean satellites as a system, Europa and Ganymede are singled out for detailed investigation. This pair of objects provides a natural laboratory for comparative analysis of the nature, evolution, and potential habitability of icy worlds. The primary focus is on an in-depth comparative analysis of their internal oceans, current and past environments, surface and near-surface compositions, and their geologic histories. Moreover, objectives for studying the other two Galilean satellites, Io and Callisto, are also defined. To understand how gas giant planets and their satellites evolve, broader studies of Jupiter’s atmosphere and magnetosphere will round out the Jupiter system investigation.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="5024" id="t0020"><span class="captions" data-dcnode-id="5070"><span data-dcnode-id="5071"><p data-dcnode-id="5072" id="sp245"><span class="label" data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">Table 4</span></span><span data-dcnode-id="5074" instrument_node="">. </span><span data-dcnode-id="5073" instrument_node="">Europa Jupiter System Mission: EJSM/Laplace.</span></p></span></span><div class="groups" data-dcnode-id="5025"><table data-dcnode-id="5026"><thead data-dcnode-id="5064"><tr class="rowsep-1 valign-top" data-dcnode-id="5065"><th class="align-left" data-dcnode-id="5068" scope="col"><span data-dcnode-id="5069" instrument_node="">Theme</span></th><th class="align-left" data-dcnode-id="5066" scope="col"><span data-dcnode-id="5067" instrument_node="">How does the Solar System work?</span></th></tr></thead><tbody data-dcnode-id="5027"><tr class="valign-top" data-dcnode-id="5059"><td class="align-left" data-dcnode-id="5062" rowspan="3"><span data-dcnode-id="5063" instrument_node="">Goal</span></td><td class="align-left" data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">What have been the conditions for the formation of the Jupiter system?</span></td></tr><tr class="valign-top" data-dcnode-id="5056"><td class="align-left" data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">How does Jupiter work?</span></td></tr><tr class="valign-top" data-dcnode-id="5053"><td class="align-left" data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">Is Europa habitable?</span></td></tr><tr class="valign-top" data-dcnode-id="5050"><td class="align-left" colspan="2" data-dcnode-id="5051"><br data-dcnode-id="5052"></td></tr><tr class="valign-top" data-dcnode-id="5045"><td class="align-left" data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">Ganymede Orbiter (ESA-led)</span></td><td class="align-left" data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">JEO: Jupiter Europa Orbiter (NASA-led)</span></td></tr><tr class="valign-top" data-dcnode-id="5038"><td class="align-left" data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="5039"><span data-dcnode-id="5042" instrument_node="">5–7</span><span data-dcnode-id="5041" instrument_node="">&nbsp;</span><span data-dcnode-id="5040" instrument_node="">year cruise &amp; 2-years in orbit</span></td></tr><tr class="valign-top" data-dcnode-id="5033"><td class="align-left" data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">ESA–NASA</span></td></tr><tr class="valign-top" data-dcnode-id="5028"><td class="align-left" data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">L-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4946" id="s0355"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5015"><span data-dcnode-id="5021" instrument_node="">5.2.1.2</span><span data-dcnode-id="5020" instrument_node="">. </span><span data-dcnode-id="5019" instrument_node="">L1: LISA Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="5017" href="#t0025" name="bt0025"><span data-dcnode-id="5018" instrument_node="">Table 5</span></a><span data-dcnode-id="5016" instrument_node="">)</span></h5><div data-dcnode-id="4947"><p data-dcnode-id="5000" id="p0655"><span data-dcnode-id="5014" instrument_node="">Unlike electromagnetic radiation (radio to optical to </span><em data-dcnode-id="5012"><span data-dcnode-id="5013" instrument_node="">γ</span></em><span data-dcnode-id="5011" instrument_node="">-rays), gravitational waves penetrate through all matter, thereby allowing us to see back to the beginning of the Universe without obscuration by dust or other matter. LISA (</span><a class="workspace-trigger" data-dcnode-id="5009" href="#b0075" name="bb0075"><span data-dcnode-id="5010" instrument_node="">Brillet et al., 2011</span></a><span data-dcnode-id="5008" instrument_node="">), the first instrument to directly measure gravitational radiation from space, will peer back to the epoch of initial star formation. It will test Einstein’s theory of general relativity in the strong-field regime, and will witness the merger of supermassive black holes throughout the Universe, along with other astrophysical phenomena. LISA is a gravity wave telescope similar to a Michelson interferometer. Three identical spacecraft are flown in deep space in an Earth-trailing orbit, forming the vertices of an equilateral triangle with arm spacing of 5</span><span data-dcnode-id="5007" instrument_node="">&nbsp;</span><span data-dcnode-id="5006" instrument_node="">million kilometers. Laser beams between these spacecraft enable interferometric measurement of relative displacements between these spacecraft, with the incredible accuracy of several picometers. With this accuracy, one is able to measure the tiny distortions of spacetime caused by a passing gravitational wave. These waves, produced by such cataclysmic events as the merger of supermassive black holes, propagate unattenuated throughout the Universe, and thus allow us to see back to the time of star formation and beyond. LISA detects gravitational radiation with periods of several seconds to a few hours, such as that produced by two coalescing massive black holes in a distant galaxy. LISA will also provide an unprecedented test of strong field general relativity theory. As the first dedicated space-based gravitational wave observatory, LISA will detect waves generated by binaries within our Galaxy, the Milky Way, and by massive black holes in distant galaxies. LISA will make its observations in a low-frequency band that “ground based” detectors can’t achieve. The difference in frequency bands between LISA and gravitational wave ground detectors such as the Laser Interferometer Gravitational Wave Observatory (LIGO) (</span><a class="workspace-trigger" data-dcnode-id="5004" href="#b0005" name="bb0005"><span data-dcnode-id="5005" instrument_node="">Abbott et al., 2004</span></a><span data-dcnode-id="5003" instrument_node="">), which operate above 1</span><span data-dcnode-id="5002" instrument_node="">&nbsp;</span><span data-dcnode-id="5001" instrument_node="">Hz, make these detectors complementary rather than competitive.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4948" id="t0025"><span class="captions" data-dcnode-id="4993"><span data-dcnode-id="4994"><p data-dcnode-id="4995" id="sp250"><span class="label" data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Table 5</span></span><span data-dcnode-id="4997" instrument_node="">. </span><span data-dcnode-id="4996" instrument_node="">LISA: Laser Interferometer Space Antenna.</span></p></span></span><div class="groups" data-dcnode-id="4949"><table data-dcnode-id="4950"><tbody data-dcnode-id="4951"><tr class="valign-top" data-dcnode-id="4988"><td class="align-left" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">Theme</span></td><td class="align-left" data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">What are the fundamental physical laws of the Universe? How did the Universe originate and what is it made of?</span></td></tr><tr class="valign-top" data-dcnode-id="4976"><td class="align-left" data-dcnode-id="4986"><span data-dcnode-id="4987" instrument_node="">Goal</span></td><td class="align-left" data-dcnode-id="4977"><span data-dcnode-id="4985" instrument_node="">Detect and observe gravitational waves from astronomical sources in a frequency range of 10</span><sup data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">−4</span></sup><span data-dcnode-id="4982" instrument_node=""> to 10</span><sup data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">−1</span></sup><span data-dcnode-id="4979" instrument_node="">&nbsp;</span><span data-dcnode-id="4978" instrument_node="">Hz</span></td></tr><tr class="valign-top" data-dcnode-id="4971"><td class="align-left" data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">Spacecraft</span></td><td class="align-left" data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">Three identical spacecraft, each carrying two telescopes with associated lasers and optical systems that together act as an interferometer</span></td></tr><tr class="valign-top" data-dcnode-id="4962"><td class="align-left" data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4963"><span data-dcnode-id="4968" instrument_node="">The three spacecraft fly in a near-equilateral triangular formation separated from each other by 5</span><span data-dcnode-id="4967" instrument_node="">&nbsp;</span><span data-dcnode-id="4966" instrument_node="">million km Together they trail behind the Earth at a distance of 50</span><span data-dcnode-id="4965" instrument_node="">&nbsp;</span><span data-dcnode-id="4964" instrument_node="">million km in the planet’s orbit around the Sun</span></td></tr><tr class="valign-top" data-dcnode-id="4957"><td class="align-left" data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">NASA–ESA</span></td></tr><tr class="valign-top" data-dcnode-id="4952"><td class="align-left" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">L-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4866" id="s0360"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4939"><span data-dcnode-id="4945" instrument_node="">5.2.1.3</span><span data-dcnode-id="4944" instrument_node="">. </span><span data-dcnode-id="4943" instrument_node="">L1: IXO Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="4941" href="#t0030" name="bt0030"><span data-dcnode-id="4942" instrument_node="">Table 6</span></a><span data-dcnode-id="4940" instrument_node="">)</span></h5><div data-dcnode-id="4867"><p data-dcnode-id="4929" id="p0660"><span data-dcnode-id="4938" instrument_node="">IXO (</span><a class="workspace-trigger" data-dcnode-id="4936" href="#b0050" name="bb0050"><span data-dcnode-id="4937" instrument_node="">Barcons et al., 2011</span></a><span data-dcnode-id="4935" instrument_node="">) is the result of the merging of NASAs Constellation-X and ESA/JAXAs XEUS mission concepts. Following discussions involving ESA, NASA and JAXA the XEUS mission concept was merged with the Constellation-X concept (NASA) into the International X-ray Observatory (IXO). After this merger a study was performed for IXO which ran from October 2008 to November 2008. In the first half of 2009 the Invitation to Tender was issued to industry, resulting in parallel industrial assessment studies that lasted 18</span><span data-dcnode-id="4934" instrument_node="">&nbsp;</span><span data-dcnode-id="4933" instrument_node="">months. These studies were completed by the end of 2010 and a new X-ray observatory class mission was designed: the International X-ray Observatory (IXO) – a joint effort of NASA, ESA, and JAXA- that combined a large X-ray mirror with powerful new instrumentation designed to explore the high energy Universe. The launch was planned for 2021 (a detailed description of IXO characteristics are reported in </span><a class="workspace-trigger" data-dcnode-id="4931" href="#s0050" name="bs0050"><span data-dcnode-id="4932" instrument_node="">Section 3.4.1</span></a><span data-dcnode-id="4930" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4868" id="t0030"><span class="captions" data-dcnode-id="4922"><span data-dcnode-id="4923"><p data-dcnode-id="4924" id="sp255"><span class="label" data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">Table 6</span></span><span data-dcnode-id="4926" instrument_node="">. </span><span data-dcnode-id="4925" instrument_node="">IXO: International X-ray Observatory.</span></p></span></span><div class="groups" data-dcnode-id="4869"><table data-dcnode-id="4870"><tbody data-dcnode-id="4871"><tr class="valign-top" data-dcnode-id="4917"><td class="align-left" data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">Themes</span></td><td class="align-left" data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">What are the fundamental physical laws of the Universe? How did the Universe originate and what is it made of?</span></td></tr><tr class="valign-top" data-dcnode-id="4912"><td class="align-left" data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">Goal</span></td><td class="align-left" data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Black holes and matter under extreme conditions. Formation and evolution of galaxies, clusters and large scale structure Life cycles of matter and energy</span></td></tr><tr class="valign-top" data-dcnode-id="4907"><td class="align-left" data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">Targets</span></td><td class="align-left" data-dcnode-id="4908"><span data-dcnode-id="4909" instrument_node="">High redshift AGN Clusters of galaxies Neutron stars and black holes</span></td></tr><tr class="valign-top" data-dcnode-id="4903"><td class="align-left" data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">(keV)</span></td><td class="align-left" data-dcnode-id="4904"></td></tr><tr class="valign-top" data-dcnode-id="4894"><td class="align-left" data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">Telescope</span></td><td class="align-left" data-dcnode-id="4895"><span data-dcnode-id="4900" instrument_node="">3.3</span><span data-dcnode-id="4899" instrument_node="">&nbsp;</span><span data-dcnode-id="4898" instrument_node="">m diameter mirror with 20</span><span data-dcnode-id="4897" instrument_node="">&nbsp;</span><span data-dcnode-id="4896" instrument_node="">m focal length</span></td></tr><tr class="valign-top" data-dcnode-id="4889"><td class="align-left" data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">Halo orbit at L2</span></td></tr><tr class="valign-top" data-dcnode-id="4882"><td class="align-left" data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="4883"><span data-dcnode-id="4886" instrument_node="">5</span><span data-dcnode-id="4885" instrument_node="">&nbsp;</span><span data-dcnode-id="4884" instrument_node="">years</span></td></tr><tr class="valign-top" data-dcnode-id="4877"><td class="align-left" data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">ESA–NASA–JAXA</span></td></tr><tr class="valign-top" data-dcnode-id="4872"><td class="align-left" data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">L-class Mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4828" id="s0365"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4862"><span data-dcnode-id="4865" instrument_node="">5.2.1.4</span><span data-dcnode-id="4864" instrument_node="">. </span><span data-dcnode-id="4863" instrument_node="">Why do IXO?</span></h5><p data-dcnode-id="4831" id="p0665"><span data-dcnode-id="4861" instrument_node="">High-energy phenomena in the X-ray band characterise the evolution of cosmic structures on both large and small scales. On the smallest scales, X-rays provide the only electromagnetic spectral signatures from the regions of strong gravity near black holes through absorption and emission features, such as the Fe K emission line at 6.4</span><span data-dcnode-id="4860" instrument_node="">&nbsp;</span><span data-dcnode-id="4859" instrument_node="">keV and its profile, and can penetrate the surrounding gas and dust allowing us to uncover the earliest massive black holes and measure their distances. In neutron stars, X-ray spectra and light curves carry the observable imprints of exotic processes occurring in these objects. Detailed simulations of spectra of various sources have shown the IXO ability to:</span></p><dl class="list" data-dcnode-id="4832"><dt class="list-label" data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="4854"><p data-dcnode-id="4855" id="p1840"><span data-dcnode-id="4856" instrument_node="">Determine redshift autonomously in the X-ray band.</span></p></dd><dt class="list-label" data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="4843"><p data-dcnode-id="4844" id="p1845"><span data-dcnode-id="4851" instrument_node="">Determine temperatures and abundances, even for low luminosity groups to </span><em data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">z</span></em><span data-dcnode-id="4848" instrument_node="">&nbsp;</span><span data-dcnode-id="4847" instrument_node="">&lt;</span><span data-dcnode-id="4846" instrument_node="">&nbsp;</span><span data-dcnode-id="4845" instrument_node="">1.</span></p></dd><dt class="list-label" data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="4838"><p data-dcnode-id="4839" id="p1850"><span data-dcnode-id="4840" instrument_node="">Make spin measurements of AGN to a similar redshift.</span></p></dd><dt class="list-label" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="4833"><p data-dcnode-id="4834" id="p1855"><span data-dcnode-id="4835" instrument_node="">Uncover the most heavily obscured, Compton-thick AGN.</span></p></dd></dl><p></p><p data-dcnode-id="4829" id="p0670"><span data-dcnode-id="4830" instrument_node="">On the largest scales, X-rays are essential for detecting the “missing” half of baryons in the local Universe, as a probe of both dark energy and dark matter and to measure the energy deposited in the surrounding medium by AGN’s jets and winds. Building on a rich technological heritage, IXO will have improved instrumental capabilities in X-ray imaging, timing, and spectroscopy far beyond the current generation of X-ray missions (e.g. Chandra, XMM, RXTE, and Suzaku). Moreover, IXO will carry an X-ray polarimeter, which will open a new window on the study of high-energy phenomena. These will enable observations that will address the above science issues-among others-with unprecedented detail and precision.</span></p></section></section><section data-dcnode-id="4402" id="s0370"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4823"><span data-dcnode-id="4826" instrument_node="">5.2.2</span><span data-dcnode-id="4825" instrument_node="">. </span><span data-dcnode-id="4824" instrument_node="">The Cosmic Vision M-Class priority</span></h4><p data-dcnode-id="4812" id="p0675"><span data-dcnode-id="4822" instrument_node="">ESA has initially chosen three scientific missions for further M Class study. Dark energy, habitable planets around other stars, and the mysterious nature of our own Sun, have been chosen by ESA as candidates for two medium-class missions to be launched no earlier than 2017. On February 2010, ESA’s Science Programme Committee (SPC) approved three missions to enter the so-called definition phase. This is the next step required before the final decision is taken as to which missions are implemented. The three proposals chosen to proceed are Euclid (</span><a class="workspace-trigger" data-dcnode-id="4820" href="#b0140" name="bb0140"><span data-dcnode-id="4821" instrument_node="">Laureijs et al., 2011</span></a><span data-dcnode-id="4819" instrument_node="">), PLAnetary Transits and Oscillations of stars (PLATO) (</span><a class="workspace-trigger" data-dcnode-id="4817" href="#b0085" name="bb0085"><span data-dcnode-id="4818" instrument_node="">Catala et al., 2011</span></a><span data-dcnode-id="4816" instrument_node="">), and Solar Orbiter.</span><a class="workspace-trigger" data-dcnode-id="4813" href="#fn51" name="bfn51"><sup data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">51</span></sup></a></p><section data-dcnode-id="4723" id="s0375"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4805"><span data-dcnode-id="4811" instrument_node="">5.2.2.1</span><span data-dcnode-id="4810" instrument_node="">. </span><span data-dcnode-id="4809" instrument_node="">M1/2: Euclid Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="4807" href="#t0035" name="bt0035"><span data-dcnode-id="4808" instrument_node="">Table 7</span></a><span data-dcnode-id="4806" instrument_node="">)</span></h5><div data-dcnode-id="4724"><p data-dcnode-id="4800" id="p0680"><span data-dcnode-id="4804" instrument_node="">Euclid would address key questions relevant to fundamental physics and cosmology, namely the nature of the mysterious dark energy and dark matter (</span><a class="workspace-trigger" data-dcnode-id="4802" href="#b0140" name="bb0140"><span data-dcnode-id="4803" instrument_node="">Laureijs et al., 2011</span></a><span data-dcnode-id="4801" instrument_node="">). Astronomers are now convinced that these form of mass-energy dominate ordinary matter. Euclid would map the distribution of galaxies to reveal the underlying ’dark’ architecture of the Universe.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4725" id="t0035"><span class="captions" data-dcnode-id="4793"><span data-dcnode-id="4794"><p data-dcnode-id="4795" id="sp260"><span class="label" data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">Table 7</span></span><span data-dcnode-id="4797" instrument_node="">. </span><span data-dcnode-id="4796" instrument_node="">Euclid: Mapping the geometry of the dark Universe.</span></p></span></span><div class="groups" data-dcnode-id="4726"><table data-dcnode-id="4727"><tbody data-dcnode-id="4728"><tr class="valign-top" data-dcnode-id="4788"><td class="align-left" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">Theme</span></td><td class="align-left" data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">How did the Universe originate and what is it made of?</span></td></tr><tr class="valign-top" data-dcnode-id="4783"><td class="align-left" data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Primary goal</span></td><td class="align-left" data-dcnode-id="4784"><span data-dcnode-id="4785" instrument_node="">To map the geometry of the dark Universe</span></td></tr><tr class="valign-top" data-dcnode-id="4763"><td class="align-left" data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">Targets</span></td><td class="align-left" data-dcnode-id="4764"><span data-dcnode-id="4780" instrument_node="">Galaxies and clusters of galaxies out to </span><em data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">z</span></em><span data-dcnode-id="4777" instrument_node="">&nbsp;</span><span data-dcnode-id="4776" instrument_node="">∼</span><span data-dcnode-id="4775" instrument_node="">&nbsp;</span><span data-dcnode-id="4774" instrument_node="">2, in a wide extragalactic survey covering 20000</span><span data-dcnode-id="4773" instrument_node="">&nbsp;</span><span data-dcnode-id="4772" instrument_node="">deg</span><sup data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">2</span></sup><span data-dcnode-id="4769" instrument_node="">, plus a deep survey covering an area of 40</span><span data-dcnode-id="4768" instrument_node="">&nbsp;</span><span data-dcnode-id="4767" instrument_node="">deg</span><sup data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">2</span></sup></td></tr><tr class="valign-top" data-dcnode-id="4758"><td class="align-left" data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">Wavelength</span></td><td class="align-left" data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">Visible and near-infrared</span></td></tr><tr class="valign-top" data-dcnode-id="4751"><td class="align-left" data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">Telescope</span></td><td class="align-left" data-dcnode-id="4752"><span data-dcnode-id="4755" instrument_node="">1.2</span><span data-dcnode-id="4754" instrument_node="">&nbsp;</span><span data-dcnode-id="4753" instrument_node="">m Korsch</span></td></tr><tr class="valign-top" data-dcnode-id="4746"><td class="align-left" data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">Second Sun–Earth Lagrange point, L2</span></td></tr><tr class="valign-top" data-dcnode-id="4739"><td class="align-left" data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="4740"><span data-dcnode-id="4743" instrument_node="">5</span><span data-dcnode-id="4742" instrument_node="">&nbsp;</span><span data-dcnode-id="4741" instrument_node="">years</span></td></tr><tr class="valign-top" data-dcnode-id="4734"><td class="align-left" data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4735"><span data-dcnode-id="4736" instrument_node="">To be confirmed</span></td></tr><tr class="valign-top" data-dcnode-id="4729"><td class="align-left" data-dcnode-id="4732"><span data-dcnode-id="4733" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4730"><span data-dcnode-id="4731" instrument_node="">M-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4651" id="s0380"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4716"><span data-dcnode-id="4722" instrument_node="">5.2.2.2</span><span data-dcnode-id="4721" instrument_node="">. </span><span data-dcnode-id="4720" instrument_node="">M1/2: PLATO Mission summary (see </span><a class="workspace-trigger" data-dcnode-id="4718" href="#t0040" name="bt0040"><span data-dcnode-id="4719" instrument_node="">Table 8</span></a><span data-dcnode-id="4717" instrument_node="">)</span></h5><div data-dcnode-id="4652"><p data-dcnode-id="4711" id="p0685"><span data-dcnode-id="4715" instrument_node="">The PLATO mission (</span><a class="workspace-trigger" data-dcnode-id="4713" href="#b0085" name="bb0085"><span data-dcnode-id="4714" instrument_node="">Catala et al., 2011</span></a><span data-dcnode-id="4712" instrument_node="">) would address one of the most timely and long-standing questions in science, namely the frequency of planets around other stars. This would include terrestrial planets in a star’s habitable zone, so-called Earth-analogues. In addition, PLATO would probe stellar interiors by detecting the gaseous waves rippling their surfaces.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4653" id="t0040"><span class="captions" data-dcnode-id="4704"><span data-dcnode-id="4705"><p data-dcnode-id="4706" id="sp265"><span class="label" data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">Table 8</span></span><span data-dcnode-id="4708" instrument_node="">. </span><span data-dcnode-id="4707" instrument_node="">PLATO: PLAnetary Transits and Oscillations of stars.</span></p></span></span><div class="groups" data-dcnode-id="4654"><table data-dcnode-id="4655"><tbody data-dcnode-id="4656"><tr class="valign-top" data-dcnode-id="4699"><td class="align-left" data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Theme</span></td><td class="align-left" data-dcnode-id="4700"><span data-dcnode-id="4701" instrument_node="">What are the conditions for planet formation and the emergence of life?</span></td></tr><tr class="valign-top" data-dcnode-id="4694"><td class="align-left" data-dcnode-id="4697"><span data-dcnode-id="4698" instrument_node="">Primary goal</span></td><td class="align-left" data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">Discover and characterise a large number of close-by exoplanetary systems,with a precision in the determination of mass and radius of 1%</span></td></tr><tr class="valign-top" data-dcnode-id="4689"><td class="align-left" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">Targets</span></td><td class="align-left" data-dcnode-id="4690"><span data-dcnode-id="4691" instrument_node="">Detect Earth sized planets around solar-type stars detect super-earths around solar-type stars Measure solar oscillations in the host stars of exoplanets measure oscillations of classical pulsators</span></td></tr><tr class="valign-top" data-dcnode-id="4684"><td class="align-left" data-dcnode-id="4687"><span data-dcnode-id="4688" instrument_node="">Wavelength</span></td><td class="align-left" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">Optical</span></td></tr><tr class="valign-top" data-dcnode-id="4679"><td class="align-left" data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">Telescope</span></td><td class="align-left" data-dcnode-id="4680"><span data-dcnode-id="4681" instrument_node="">A number of small,optically fast,wide-field telescopes</span></td></tr><tr class="valign-top" data-dcnode-id="4674"><td class="align-left" data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4675"><span data-dcnode-id="4676" instrument_node="">Large amplitude libration orbit around Sun–Earth Lagrangian point, L2</span></td></tr><tr class="valign-top" data-dcnode-id="4667"><td class="align-left" data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="4668"><span data-dcnode-id="4671" instrument_node="">Minimum 6</span><span data-dcnode-id="4670" instrument_node="">&nbsp;</span><span data-dcnode-id="4669" instrument_node="">years</span></td></tr><tr class="valign-top" data-dcnode-id="4662"><td class="align-left" data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">To be confirmed</span></td></tr><tr class="valign-top" data-dcnode-id="4657"><td class="align-left" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">M-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4581" id="s0385"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4644"><span data-dcnode-id="4650" instrument_node="">5.2.2.3</span><span data-dcnode-id="4649" instrument_node="">. </span><span data-dcnode-id="4648" instrument_node="">M1/2: Solar Orbiter Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="4646" href="#t0045" name="bt0045"><span data-dcnode-id="4647" instrument_node="">Table 9</span></a><span data-dcnode-id="4645" instrument_node="">)</span></h5><div data-dcnode-id="4582"><p data-dcnode-id="4638" id="p0690"><span data-dcnode-id="4643" instrument_node="">Solar Orbiter would take the closest look at our Sun yet possible, approaching to just 62 solar radii.</span><a class="workspace-trigger" data-dcnode-id="4640" href="#fn52" name="bfn52"><sup data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">52</span></sup></a><span data-dcnode-id="4639" instrument_node=""> It would deliver images and data that include views of the Sun’s polar regions and the solar far side when it is not visible from Earth. These three missions are the finalists from 52 proposals that were either made or carried forward in 2007. They were whittled down to just six mission proposals in 2008 and sent for industrial assessment. The reports from those studies were completed and the missions pared down again. “It was a very difficult selection process. All the missions contained very strong science cases,” says Lennart Nordh, Swedish National Space Board and chair of the SPC. The tough decisions were not yet over. Only two missions out of three of them: EUCLID, PLATO and Solar Orbiter, were competing for selection for the M-class launch slots. All three missions presented challenges that were resolved at the definition phase. A specific challenge, of which the SPC was conscious, was the ability of these missions to fit within the available budget. The final decision about which missions to implement has been finally taken in September 2011 (see next paragraph for details).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4583" id="t0045"><span class="captions" data-dcnode-id="4631"><span data-dcnode-id="4632"><p data-dcnode-id="4633" id="sp270"><span class="label" data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Table 9</span></span><span data-dcnode-id="4635" instrument_node="">. </span><span data-dcnode-id="4634" instrument_node="">Solar orbiter: exploring our nearest star.</span></p></span></span><div class="groups" data-dcnode-id="4584"><table data-dcnode-id="4585"><tbody data-dcnode-id="4586"><tr class="valign-top" data-dcnode-id="4626"><td class="align-left" data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Theme</span></td><td class="align-left" data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">How does the solar system work?</span></td></tr><tr class="valign-top" data-dcnode-id="4621"><td class="align-left" data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Primary goal</span></td><td class="align-left" data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">To produce images of the Sun at an unprecedented resolution and perform closest ever in-situ measurements</span></td></tr><tr class="valign-top" data-dcnode-id="4616"><td class="align-left" data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">Targets</span></td><td class="align-left" data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">The Sun</span></td></tr><tr class="valign-top" data-dcnode-id="4611"><td class="align-left" data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">Wavelength</span></td><td class="align-left" data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Visible, extreme ultra violet, X-rays</span></td></tr><tr class="valign-top" data-dcnode-id="4604"><td class="align-left" data-dcnode-id="4609"><span data-dcnode-id="4610" instrument_node="">Orbit</span></td><td class="align-left" data-dcnode-id="4605"><span data-dcnode-id="4608" instrument_node="">Elliptical orbit around the Sun with perihelion as low as 0.28</span><span data-dcnode-id="4607" instrument_node="">&nbsp;</span><span data-dcnode-id="4606" instrument_node="">AU and with increasing inclination up to more than 30° with respect to the solar equator</span></td></tr><tr class="valign-top" data-dcnode-id="4597"><td class="align-left" data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">Lifetime</span></td><td class="align-left" data-dcnode-id="4598"><span data-dcnode-id="4601" instrument_node="">6 </span><span data-dcnode-id="4600" instrument_node="">&nbsp;</span><span data-dcnode-id="4599" instrument_node="">years (nominal)</span></td></tr><tr class="valign-top" data-dcnode-id="4592"><td class="align-left" data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">Partners</span></td><td class="align-left" data-dcnode-id="4593"><span data-dcnode-id="4594" instrument_node="">To be confirmed</span></td></tr><tr class="valign-top" data-dcnode-id="4587"><td class="align-left" data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">Type</span></td><td class="align-left" data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">M-class mission</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="4498" id="s0390"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4574"><span data-dcnode-id="4580" instrument_node="">5.2.2.4</span><span data-dcnode-id="4579" instrument_node="">. </span><span data-dcnode-id="4578" instrument_node="">M1/2: SPICA Mission Summary (see </span><a class="workspace-trigger" data-dcnode-id="4576" href="#t0050" name="bt0050"><span data-dcnode-id="4577" instrument_node="">Table 10</span></a><span data-dcnode-id="4575" instrument_node="">)</span></h5><div data-dcnode-id="4499"><p data-dcnode-id="4562" id="p0695"><span data-dcnode-id="4573" instrument_node="">SPICA</span><a class="workspace-trigger" data-dcnode-id="4570" href="#fn53" name="bfn53"><sup data-dcnode-id="4571"><span data-dc
