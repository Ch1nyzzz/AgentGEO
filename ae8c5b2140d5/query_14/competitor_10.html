isecond X-ray pulsars, with spin frequencies ranging from 185 to 435</span><span data-dcnode-id="7484" instrument_node="">&nbsp;</span><span data-dcnode-id="7483" instrument_node="">Hz and discovery of twin kilohertz QPOs detected in weak-field neutron stars having frequencies from ∼100 to ∼1300</span><span data-dcnode-id="7482" instrument_node="">&nbsp;</span><span data-dcnode-id="7481" instrument_node="">Hz has clearly demonstrated the complexity of these strong gravity phenomena and thermonuclear bursts. The separation of the twin peaks remains nearly constant while the QPO frequency shifts by a factor of ∼2–3. Other key results of RXTE include a strong correlation between the X-ray spectra and X-ray variability of accreting stellar mass black holes and the launch of jets correlated with changes in the inner part of the accretion disk (disk-jet connection). RXTE has also clearly established that soft </span><em data-dcnode-id="7479"><span data-dcnode-id="7480" instrument_node="">γ</span></em><span data-dcnode-id="7478" instrument_node="">-ray repeaters (SGRs) and anomalous X-ray pulsars (AXPs) are isolated neutron stars with similar properties, having extremely large magnetic fields (Magnetars). In the case of extragalactic X-ray sources, some important examples are observations of correlated X-ray and TeV flares in Blazars and the variability of broad iron K</span><em data-dcnode-id="7476"><span data-dcnode-id="7477" instrument_node="">α</span></em><span data-dcnode-id="7475" instrument_node=""> lines in active galactic nuclei. Seyfert galaxies and quasars which have low fluxes of a few tenths of a milliCrab can be measured in the range 30–100</span><span data-dcnode-id="7474" instrument_node="">&nbsp;</span><span data-dcnode-id="7473" instrument_node="">keV in a few days of observation with RXTE.</span></p></section></section><section data-dcnode-id="7182" id="s0175"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7466"><span data-dcnode-id="7469" instrument_node="">4.3.3</span><span data-dcnode-id="7468" instrument_node="">. </span><span data-dcnode-id="7467" instrument_node="">Chandra X-ray Observatory</span></h4><div data-dcnode-id="7439"><p data-dcnode-id="7458" id="p0355"><span data-dcnode-id="7465" instrument_node="">NASA’s Advanced X-ray Astrophysics Facility, (AXAF), renamed the Chandra X-ray Observatory in honour of Subrahmanyan Chandrasekhar, was launched and deployed by the Space Shuttle Columbia on the 23 of July 1999 (see </span><a class="workspace-trigger" data-dcnode-id="7463" href="#f0220" name="bf0220"><span data-dcnode-id="7464" instrument_node="">Fig. 8</span></a><span data-dcnode-id="7462" instrument_node="">). The combination of high angular resolution, large collecting area, and sensitivity to high energy X-rays make it possible for Chandra to study extremely faint sources, sometimes strongly absorbed, in crowded fields. Chandra was boosted into an elliptical high-earth orbit that allows long-duration uninterrupted exposures of celestial objects (</span><a class="workspace-trigger" data-dcnode-id="7460" href="#b0230" name="bb0230"><span data-dcnode-id="7461" instrument_node="">Weisskopf et al., 2002</span></a><span data-dcnode-id="7459" instrument_node="">). The Smithsonian Astrophysical Observatory (SAO) in Cambridge, Massachussets, is responsible for the conduct of the day-to-day fight operations and science activities from the Operations Control Center and Chandra X-ray Center (CXC) facilities.</span></p><figure class="figure text-xs" data-dcnode-id="7440" id="f0220"><span data-dcnode-id="7448"><img alt="" data-dcnode-id="7457" height="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr8.jpg&amp;raw"><span data-dcnode-id="7456" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7449"><li data-dcnode-id="7450"><a class="anchor download-link u-font-sans" data-dcnode-id="7451" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7452"><span data-dcnode-id="7455" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7453"><span data-dcnode-id="7454" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7441"><span data-dcnode-id="7442"><p data-dcnode-id="7443" id="sp0250"><span class="label" data-dcnode-id="7446"><span data-dcnode-id="7447" instrument_node="">Fig. 8</span></span><span data-dcnode-id="7445" instrument_node="">. </span><span data-dcnode-id="7444" instrument_node="">Chandra X-Ray Observatory artist’s concept.</span></p></span></span></figure></div><p data-dcnode-id="7348" id="p0360"><span data-dcnode-id="7438" instrument_node="">Mission characteristics:</span></p><dl class="list" data-dcnode-id="7349"><dt class="list-label" data-dcnode-id="7436"><span data-dcnode-id="7437" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7431"><p data-dcnode-id="7432" id="p1720"><span data-dcnode-id="7435" instrument_node="">Lifetime: 23 July, 1999 – (nominal 5</span><span data-dcnode-id="7434" instrument_node="">&nbsp;</span><span data-dcnode-id="7433" instrument_node="">year mission; extended by NASA and still operating).</span></p></dd><dt class="list-label" data-dcnode-id="7429"><span data-dcnode-id="7430" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="7424"><p data-dcnode-id="7425" id="p1725"><span data-dcnode-id="7428" instrument_node="">Energy range: 0.1–10</span><span data-dcnode-id="7427" instrument_node="">&nbsp;</span><span data-dcnode-id="7426" instrument_node="">keV.</span></p></dd><dt class="list-label" data-dcnode-id="7422"><span data-dcnode-id="7423" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="7417"><p data-dcnode-id="7418" id="p1730"><span data-dcnode-id="7421" instrument_node="">Spatial resolution better than 1</span><span data-dcnode-id="7420" instrument_node="">&nbsp;</span><span data-dcnode-id="7419" instrument_node="">arc sec.</span></p></dd><dt class="list-label" data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="7410"><p data-dcnode-id="7411" id="p1735"><span data-dcnode-id="7414" instrument_node="">Orbit: 64</span><span data-dcnode-id="7413" instrument_node="">&nbsp;</span><span data-dcnode-id="7412" instrument_node="">h period, highly-eccentric Earth orbit.</span></p></dd><dt class="list-label" data-dcnode-id="7408"><span data-dcnode-id="7409" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="7396"><p data-dcnode-id="7397" id="p1740"><span data-dcnode-id="7407" instrument_node="">Payload: A single Wolter Type 1 grazing incidence iridium-coated imaging telescope with a ghost-free field of view of about 30</span><span data-dcnode-id="7406" instrument_node="">&nbsp;</span><span data-dcnode-id="7405" instrument_node="">arc min diameter and an effective area of 800 and 400</span><span data-dcnode-id="7404" instrument_node="">&nbsp;</span><span data-dcnode-id="7403" instrument_node="">cm</span><sup data-dcnode-id="7401"><span data-dcnode-id="7402" instrument_node="">2</span></sup><span data-dcnode-id="7400" instrument_node=""> @ 0.25 and 5</span><span data-dcnode-id="7399" instrument_node="">&nbsp;</span><span data-dcnode-id="7398" instrument_node="">keV, respectively.</span></p></dd><dt class="list-label" data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="7350"><p data-dcnode-id="7351" id="p1745"><span data-dcnode-id="7393" instrument_node="">Four detectors can be inserted, one at a time, into the focal plane. Two of these are designed to be used primarily with the gratings:</span></p><dl class="list" data-dcnode-id="7352"><dt class="list-label" data-dcnode-id="7391"><span data-dcnode-id="7392" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7382"><p data-dcnode-id="7383" id="p1750"><span data-dcnode-id="7390" instrument_node="">AXAF Charged Coupled Imaging Spectrometer (ACIS): energy range 0.2–10</span><span data-dcnode-id="7389" instrument_node="">&nbsp;</span><span data-dcnode-id="7388" instrument_node="">keV: one 4-chip imaging array (ACIS-I), Field of View 16 X 16, one 6-chip spectroscopic array (ACIS-S), Field of View 8</span><span data-dcnode-id="7387" instrument_node="">&nbsp;</span><span data-dcnode-id="7386" instrument_node="">×</span><span data-dcnode-id="7385" instrument_node="">&nbsp;</span><span data-dcnode-id="7384" instrument_node="">48.</span></p></dd><dt class="list-label" data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7375"><p data-dcnode-id="7376" id="p1755"><span data-dcnode-id="7379" instrument_node="">High Resolution Camera (HRC): energy range 0.1–10</span><span data-dcnode-id="7378" instrument_node="">&nbsp;</span><span data-dcnode-id="7377" instrument_node="">keV.</span></p></dd><dt class="list-label" data-dcnode-id="7373"><span data-dcnode-id="7374" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7364"><p data-dcnode-id="7365" id="p1760"><span data-dcnode-id="7372" instrument_node="">High Energy Transmission Grating</span><span data-dcnode-id="7371" instrument_node="">&nbsp;</span><span data-dcnode-id="7370" instrument_node="">+</span><span data-dcnode-id="7369" instrument_node="">&nbsp;</span><span data-dcnode-id="7368" instrument_node="">ACIS-S (HETG): energy range 0.5–10</span><span data-dcnode-id="7367" instrument_node="">&nbsp;</span><span data-dcnode-id="7366" instrument_node="">keV.</span></p></dd><dt class="list-label" data-dcnode-id="7362"><span data-dcnode-id="7363" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7353"><p data-dcnode-id="7354" id="p1765"><span data-dcnode-id="7361" instrument_node="">Low Energy Transmission Grating</span><span data-dcnode-id="7360" instrument_node="">&nbsp;</span><span data-dcnode-id="7359" instrument_node="">+</span><span data-dcnode-id="7358" instrument_node="">&nbsp;</span><span data-dcnode-id="7357" instrument_node="">HRC-S (LETG) energy range 0.08–6.0</span><span data-dcnode-id="7356" instrument_node="">&nbsp;</span><span data-dcnode-id="7355" instrument_node="">keV.</span></p></dd></dl><p></p></dd></dl><p></p><section data-dcnode-id="7183" id="s0180"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7344"><span data-dcnode-id="7347" instrument_node="">4.3.3.1</span><span data-dcnode-id="7346" instrument_node="">. </span><span data-dcnode-id="7345" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="7184"><p data-dcnode-id="7326" id="p0365"><span data-dcnode-id="7343" instrument_node="">The main features of the Chandra X-ray Observatory are the sub-arcsecond angular resolution and capability to provide spatially resolved spectra on the same scale. These characteristics are not provided by any other mission and may not be provided by any other mission for several decades. Chandra is one of NASAs Great Observatories and its main strengths are unprecedented spatial resolution, sensitivity that extends from soft X-rays up to 10</span><span data-dcnode-id="7342" instrument_node="">&nbsp;</span><span data-dcnode-id="7341" instrument_node="">keV, and the ability to obtain high spectral resolution observations over most of this range with the use of the gratings. Chandra has provided outstanding scientific results in a broad range of extragalactic studies from cosmology, to clusters of galaxies, to AGN, and to resolution of the sources of the cosmic X-ray background radiation. Chandra has also enabled Galactic studies of star formation, white dwarfs, neutron stars and black holes. Chandra studies have advanced our understanding of the dark energy, dark matter, and baryonic matter that comprise the Universe; of the physical processes that govern the formation and evolution of stars, galaxies, and galaxy clusters; of the formation and dispersal of heavy elements needed for planets and life; and of the nature of the laws of physics under extreme conditions. Chandra and XMM-Newton (see next paragraph) have been two most powerful X-ray Observatories in orbit for more than a decade and are complementary to each other: Chandra providing the best angular resolution ever achieved and XMM-Newton providing the highest throughput. A comprehensive review of the main results achieved in the first 10</span><span data-dcnode-id="7340" instrument_node="">&nbsp;</span><span data-dcnode-id="7339" instrument_node="">years of scientific observations of these two Observatory-class satellites is reported in (</span><a class="workspace-trigger" data-dcnode-id="7337" href="#b0185" name="bb0185"><span data-dcnode-id="7338" instrument_node="">Santos-Lleo et al., 2009</span></a><span data-dcnode-id="7336" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="7334" href="#t0010" name="bt0010"><span data-dcnode-id="7335" instrument_node="">Table 2</span></a><span data-dcnode-id="7333" instrument_node=""> summarises the main achievements of the two observatories. Examples of the scientific investigation power of these observatories are illustrated in </span><a class="workspace-trigger" data-dcnode-id="7331" href="#f0045" name="bf0045"><span data-dcnode-id="7332" instrument_node="">Fig. 9</span></a><span data-dcnode-id="7330" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7328" href="#f0050" name="bf0050"><span data-dcnode-id="7329" instrument_node="">Fig. 10</span></a><span data-dcnode-id="7327" instrument_node="">, which show respectively the best X-ray image of the Crab Nebula and Pulsar ever achieved and the image of a deep XMM-Newton extragalactic field.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="7221" id="t0010"><span class="captions" data-dcnode-id="7316"><span data-dcnode-id="7317"><p data-dcnode-id="7318" id="sp235"><span class="label" data-dcnode-id="7324"><span data-dcnode-id="7325" instrument_node="">Table 2</span></span><span data-dcnode-id="7323" instrument_node="">. </span><span data-dcnode-id="7322" instrument_node="">Chandra and XMM-Newton first decade results summary (</span><a class="workspace-trigger" data-dcnode-id="7320" href="#b0185" name="bb0185"><span data-dcnode-id="7321" instrument_node="">Santos-Lleo et al., 2009</span></a><span data-dcnode-id="7319" instrument_node="">).</span></p></span></span><div class="groups" data-dcnode-id="7222"><table data-dcnode-id="7223"><thead data-dcnode-id="7310"><tr class="rowsep-1 valign-top" data-dcnode-id="7311"><th class="align-left" data-dcnode-id="7314" scope="col"><span data-dcnode-id="7315" instrument_node="">Scientific area</span></th><th class="align-left" data-dcnode-id="7312" scope="col"><span data-dcnode-id="7313" instrument_node="">Main achievement</span></th></tr></thead><tbody data-dcnode-id="7224"><tr class="valign-top" data-dcnode-id="7306"><td class="align-left" colspan="2" data-dcnode-id="7307"><em data-dcnode-id="7308"><span data-dcnode-id="7309" instrument_node="">Planetary science</span></em></td></tr><tr class="valign-top" data-dcnode-id="7301"><td class="align-left" data-dcnode-id="7304"><span data-dcnode-id="7305" instrument_node="">Comets</span></td><td class="align-left" data-dcnode-id="7302"><span data-dcnode-id="7303" instrument_node="">Established charge-exchange as mechanism for X-ray emission</span></td></tr><tr class="valign-top" data-dcnode-id="7298"><td class="align-left" colspan="2" data-dcnode-id="7299"><br data-dcnode-id="7300"></td></tr><tr class="valign-top" data-dcnode-id="7294"><td class="align-left" colspan="2" data-dcnode-id="7295"><em data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node="">Galactic astrophysics</span></em></td></tr><tr class="valign-top" data-dcnode-id="7289"><td class="align-left" data-dcnode-id="7292"><span data-dcnode-id="7293" instrument_node="">Stars</span></td><td class="align-left" data-dcnode-id="7290"><span data-dcnode-id="7291" instrument_node="">Measured densities, temperatures and composition of hot plasmas, testing models for stellar evolution, X-ray emission from stellar coronae, and stellar winds</span></td></tr><tr class="valign-top" data-dcnode-id="7284"><td class="align-left" data-dcnode-id="7287"><span data-dcnode-id="7288" instrument_node="">Star formation and</span></td><td class="align-left" data-dcnode-id="7285"><span data-dcnode-id="7286" instrument_node="">Discovered X-ray emission from gas-accreting star-forming regions onto stellar surfaces and influenced by magnetic fields detected giant flares from young stars, with implications for planet formation.</span></td></tr><tr class="valign-top" data-dcnode-id="7279"><td class="align-left" data-dcnode-id="7282"><span data-dcnode-id="7283" instrument_node="">Supernovae</span></td><td class="align-left" data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">Established that Keplers supernova was a thermonuclear event</span></td></tr><tr class="valign-top" data-dcnode-id="7274"><td class="align-left" data-dcnode-id="7277"><span data-dcnode-id="7278" instrument_node="">Supernova remnants (SNRs)</span></td><td class="align-left" data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node="">Discovered a central compact object in the CasA SNR11 and traced the distribution of elements indicating turbulent mixing along with an aspherical explosion. Imaged forward and reverse shock waves in several SNR, with implications for the acceleration of cosmic rays</span></td></tr><tr class="valign-top" data-dcnode-id="7269"><td class="align-left" data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">Pulsar wind nebulae</span></td><td class="align-left" data-dcnode-id="7270"><span data-dcnode-id="7271" instrument_node="">Resolved jets and rings of relativistic particles produced by young neutron stars</span></td></tr><tr class="valign-top" data-dcnode-id="7264"><td class="align-left" data-dcnode-id="7267"><span data-dcnode-id="7268" instrument_node="">Black hole accretion processes</span></td><td class="align-left" data-dcnode-id="7265"><span data-dcnode-id="7266" instrument_node="">Measured the flaring of central black hole and resolved the galactic ridge emission into individual sources</span></td></tr><tr class="valign-top" data-dcnode-id="7259"><td class="align-left" data-dcnode-id="7262"><span data-dcnode-id="7263" instrument_node="">Galactic centre</span></td><td class="align-left" data-dcnode-id="7260"><span data-dcnode-id="7261" instrument_node="">Measured the flaring of central black hole and resolved the galactic ridge emission into individual sources</span></td></tr><tr class="valign-top" data-dcnode-id="7256"><td class="align-left" colspan="2" data-dcnode-id="7257"><br data-dcnode-id="7258"></td></tr><tr class="valign-top" data-dcnode-id="7252"><td class="align-left" colspan="2" data-dcnode-id="7253"><em data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">Extragalactic astrophysics</span></em></td></tr><tr class="valign-top" data-dcnode-id="7247"><td class="align-left" data-dcnode-id="7250"><span data-dcnode-id="7251" instrument_node="">Starburst galaxies</span></td><td class="align-left" data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">Discovered evidence for enrichment of the interstellar medium and the intergalactic medium by starbursts</span></td></tr><tr class="valign-top" data-dcnode-id="7242"><td class="align-left" data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">Active galactic nuclei feedback</span></td><td class="align-left" data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">Discovered evidence for heating of hot gas in galaxies and clusters of in galaxies and clusters by outbursts produced galaxies by supermassive black holes,supporting the concept that supermassive black holes can regulate the growth of galaxies</span></td></tr><tr class="valign-top" data-dcnode-id="7239"><td class="align-left" colspan="2" data-dcnode-id="7240"><br data-dcnode-id="7241"></td></tr><tr class="valign-top" data-dcnode-id="7235"><td class="align-left" colspan="2" data-dcnode-id="7236"><em data-dcnode-id="7237"><span data-dcnode-id="7238" instrument_node="">Cosmology</span></em></td></tr><tr class="valign-top" data-dcnode-id="7230"><td class="align-left" data-dcnode-id="7233"><span data-dcnode-id="7234" instrument_node="">Dark matter</span></td><td class="align-left" data-dcnode-id="7231"><span data-dcnode-id="7232" instrument_node="">Determined the amount of dark matter in galaxy clusters and, by extension, the Universe; observed the separation of dark matter from normal matter in the Bullet Cluster, demonstrating that alternative theories of gravity are very unlikely to explain the evidence for dark matter</span></td></tr><tr class="valign-top" data-dcnode-id="7225"><td class="align-left" data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">Dark energy</span></td><td class="align-left" data-dcnode-id="7226"><span data-dcnode-id="7227" instrument_node="">Observed galaxy clusters to generate two independent measurements of the accelerated expansion of the Universe</span></td></tr></tbody></table></div></div><figure class="figure text-xs" data-dcnode-id="7203" id="f0045"><span data-dcnode-id="7211"><img alt="" data-dcnode-id="7220" height="374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr9.jpg&amp;raw"><span data-dcnode-id="7219" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7212"><li data-dcnode-id="7213"><a class="anchor download-link u-font-sans" data-dcnode-id="7214" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7215"><span data-dcnode-id="7218" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7216"><span data-dcnode-id="7217" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7204"><span data-dcnode-id="7205"><p data-dcnode-id="7206" id="sp055"><span class="label" data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">Fig. 9</span></span><span data-dcnode-id="7208" instrument_node="">. </span><span data-dcnode-id="7207" instrument_node="">A sharp X-ray image of the Crab Nebula and Pulsar obtained with the CHANDRA Observatory (Credit: NASA/CXC/SAO).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="7185" id="f0050"><span data-dcnode-id="7193"><img alt="" data-dcnode-id="7202" height="355" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr10.jpg&amp;raw"><span data-dcnode-id="7201" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7194"><li data-dcnode-id="7195"><a class="anchor download-link u-font-sans" data-dcnode-id="7196" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr10.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7197"><span data-dcnode-id="7200" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7198"><span data-dcnode-id="7199" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7186"><span data-dcnode-id="7187"><p data-dcnode-id="7188" id="sp060"><span class="label" data-dcnode-id="7191"><span data-dcnode-id="7192" instrument_node="">Fig. 10</span></span><span data-dcnode-id="7190" instrument_node="">. </span><span data-dcnode-id="7189" instrument_node="">A deep XMM-Newton extragalactic X-Ray image (Credit: Image courtesy of Ian Stewart and Mike Watson (Leicester University, XMM-Newton Survey Science Centre) and ESA).</span></p></span></span></figure></div></section></section><section data-dcnode-id="7116" id="s0185"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7178"><span data-dcnode-id="7181" instrument_node="">4.3.4</span><span data-dcnode-id="7180" instrument_node="">. </span><span data-dcnode-id="7179" instrument_node="">The XMM-Newton Observatory</span></h4><div data-dcnode-id="7142"><p data-dcnode-id="7161" id="p0370"><span data-dcnode-id="7177" instrument_node="">XMM-Newton observatory is ESA’s second ‘Cornerstone’ mission and was launched on 10 December, 1999 from Kourou on the first commercial Ariane-5 into a highly elliptical 48</span><span data-dcnode-id="7176" instrument_node="">&nbsp;</span><span data-dcnode-id="7175" instrument_node="">h orbit (see </span><a class="workspace-trigger" data-dcnode-id="7173" href="#f0055" name="bf0055"><span data-dcnode-id="7174" instrument_node="">Fig. 11</span></a><span data-dcnode-id="7172" instrument_node="">). The mission provides high-quality X-ray and optical/UV data from the European Photon Imaging Camera (EPIC), the Reflection Grating Spectrometer (RGS) and the Optical Monitor (OM) (</span><a class="workspace-trigger" data-dcnode-id="7170" href="#b0280" name="bb0280"><span data-dcnode-id="7171" instrument_node="">Jansen et al., 2001</span></a><span data-dcnode-id="7169" instrument_node="">). XMM-Newton is a 3-axis-stabilised spacecraft with a mass of about 4</span><span data-dcnode-id="7168" instrument_node="">&nbsp;</span><span data-dcnode-id="7167" instrument_node="">t. The satellite is dominated by a large carbon-fibre telescope tube attached to the Service Module (SVM) at one end and to the Focal Plane Assembly (FPA) at the other. The mission routinely responds to Targets of Opportunity (ToO) requests with a response time as short as 5</span><span data-dcnode-id="7166" instrument_node="">&nbsp;</span><span data-dcnode-id="7165" instrument_node="">h. This has been put to good use a number of times when XMM-Newton has performed rapid follow-up of </span><em data-dcnode-id="7163"><span data-dcnode-id="7164" instrument_node="">γ</span></em><span data-dcnode-id="7162" instrument_node="">-ray bursts.</span></p><figure class="figure text-xs" data-dcnode-id="7143" id="f0055"><span data-dcnode-id="7151"><img alt="" data-dcnode-id="7160" height="479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr11.jpg&amp;raw"><span data-dcnode-id="7159" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7152"><li data-dcnode-id="7153"><a class="anchor download-link u-font-sans" data-dcnode-id="7154" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr11.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7155"><span data-dcnode-id="7158" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7144"><span data-dcnode-id="7145"><p data-dcnode-id="7146" id="sp065"><span class="label" data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">Fig. 11</span></span><span data-dcnode-id="7148" instrument_node="">. </span><span data-dcnode-id="7147" instrument_node="">XMM during ground testing.</span></p></span></span></figure></div><section data-dcnode-id="7117" id="s0190"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7138"><span data-dcnode-id="7141" instrument_node="">4.3.4.1</span><span data-dcnode-id="7140" instrument_node="">. </span><span data-dcnode-id="7139" instrument_node="">Mission achievement summary</span></h5><p data-dcnode-id="7118" id="p0375"><span data-dcnode-id="7137" instrument_node="">XMM-Newton is a facility-class X-ray observatory that is a cornerstone of ESAs Horizon 2000 programme. The instruments on XMM-Newton are the European Photon Imaging Camera, which contains three imaging devices (EPIC, 0.2–12</span><span data-dcnode-id="7136" instrument_node="">&nbsp;</span><span data-dcnode-id="7135" instrument_node="">keV, 30’ FOV, 6” FWHM), two Reflection Grating Spectrometers (RGS, 0.33–2.5</span><span data-dcnode-id="7134" instrument_node="">&nbsp;</span><span data-dcnode-id="7133" instrument_node="">keV, 3–38</span><span data-dcnode-id="7132" instrument_node="">&nbsp;</span><span data-dcnode-id="7131" instrument_node="">A, spectral resolution of 0.06</span><span data-dcnode-id="7130" instrument_node="">&nbsp;</span><span data-dcnode-id="7129" instrument_node="">A), and the Optical Monitor (OM) with a 16’ FOV operating from 1800 to 6500</span><span data-dcnode-id="7128" instrument_node="">&nbsp;</span><span data-dcnode-id="7127" instrument_node="">A. With this impressive set of co-aligned telescopes in its operative energy band XMM-Newton provides to the scientific observer the largest collecting area for imaging and spectroscopic studies from a fraction of a keV up to 15</span><span data-dcnode-id="7126" instrument_node="">&nbsp;</span><span data-dcnode-id="7125" instrument_node="">keV, over a field of view that is larger than Chandra and Suzaku. A summary of Chandra and XMM-Newton first decade scientific results, adapted from (</span><a class="workspace-trigger" data-dcnode-id="7123" href="#b0185" name="bb0185"><span data-dcnode-id="7124" instrument_node="">Santos-Lleo et al., 2009</span></a><span data-dcnode-id="7122" instrument_node="">), is given in </span><a class="workspace-trigger" data-dcnode-id="7120" href="#t0010" name="bt0010"><span data-dcnode-id="7121" instrument_node="">Table 2</span></a><span data-dcnode-id="7119" instrument_node="">.</span></p></section></section><section data-dcnode-id="6929" id="s0195"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7112"><span data-dcnode-id="7115" instrument_node="">4.3.5</span><span data-dcnode-id="7114" instrument_node="">. </span><span data-dcnode-id="7113" instrument_node="">INTEGRAL: International Gamma-Ray Astrophysics Laboratory</span></h4><div data-dcnode-id="7034"><p data-dcnode-id="7053" id="p0380"><span data-dcnode-id="7111" instrument_node="">The ESA INTEGRAL mission was approved as the 2nd medium size ESA project of the Horizon 2000 scientific programme in April 1993 (see </span><a class="workspace-trigger" data-dcnode-id="7109" href="#f0060" name="bf0060"><span data-dcnode-id="7110" instrument_node="">Fig. 12</span></a><span data-dcnode-id="7108" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="7106" href="#b0235" name="bb0235"><span data-dcnode-id="7107" instrument_node="">Winkler et al., 2003</span></a><span data-dcnode-id="7105" instrument_node="">). The programme is led by ESA, with the instrument complement and the Scientific Data Centre (based in Geneva) provided by five different European consortia. Contributions were also provided by Russia, for the Proton launcher, and by the USA which made available the NASA Deep Space Network ground station at Goldstone.</span><a class="workspace-trigger" data-dcnode-id="7102" href="#fn40" name="bfn40"><sup data-dcnode-id="7103"><span data-dcnode-id="7104" instrument_node="">40</span></sup></a><span data-dcnode-id="7101" instrument_node=""> The payload was calibrated at the beginning of 2002 at the European Space Research and Technology Centre (ESTEC) in Noordwijk, the Netherlands. INTEGRAL was successfully launched from Baikonur (Kazakhstan) on 17 October, 2002 for a planned operational lifetime of 2</span><span data-dcnode-id="7100" instrument_node="">&nbsp;</span><span data-dcnode-id="7099" instrument_node="">years with possible extension. The Observatory is devoted to the observation of the </span><em data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">γ</span></em><span data-dcnode-id="7096" instrument_node="">-ray Universe in the energy range from 15</span><span data-dcnode-id="7095" instrument_node="">&nbsp;</span><span data-dcnode-id="7094" instrument_node="">keV to 10</span><span data-dcnode-id="7093" instrument_node="">&nbsp;</span><span data-dcnode-id="7092" instrument_node="">MeV with substantial monitoring capability in the X-ray range, from 3 to 30</span><span data-dcnode-id="7091" instrument_node="">&nbsp;</span><span data-dcnode-id="7090" instrument_node="">keV, and in the optical V band at 550</span><span data-dcnode-id="7089" instrument_node="">&nbsp;</span><span data-dcnode-id="7088" instrument_node="">nm. The two </span><em data-dcnode-id="7086"><span data-dcnode-id="7087" instrument_node="">γ</span></em><span data-dcnode-id="7085" instrument_node="">-ray instruments are the spectrometer, SPI, and the imager, IBIS. SPI is a high resolution, cooled, germanium-based coded mask spectrometer with unprecedented sensitivity to diffuse emission over a very wide field of view (∼25° FWHM) (</span><a class="workspace-trigger" data-dcnode-id="7083" href="#b0225" name="bb0225"><span data-dcnode-id="7084" instrument_node="">Vedrenne et al., 2003</span></a><span data-dcnode-id="7082" instrument_node="">). It is optimised for high resolution </span><em data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">γ</span></em><span data-dcnode-id="7079" instrument_node="">-ray line spectroscopy in the energy range 20</span><span data-dcnode-id="7078" instrument_node="">&nbsp;</span><span data-dcnode-id="7077" instrument_node="">keV–8</span><span data-dcnode-id="7076" instrument_node="">&nbsp;</span><span data-dcnode-id="7075" instrument_node="">MeV. IBIS is a large area coded aperture mask telescope based on two layers of 16,384 Cadmium Telluride (CdTe) detectors and 4,096 Caesium Iodide (CsI) detectors (</span><a class="workspace-trigger" data-dcnode-id="7073" href="#b0215" name="bb0215"><span data-dcnode-id="7074" instrument_node="">Ubertini et al., 2003</span></a><span data-dcnode-id="7072" instrument_node="">). It provides fine angular resolution (&lt;12</span><span data-dcnode-id="7071" instrument_node="">&nbsp;</span><span data-dcnode-id="7070" instrument_node="">arc min), wide spectral response (15</span><span data-dcnode-id="7069" instrument_node="">&nbsp;</span><span data-dcnode-id="7068" instrument_node="">keV–10</span><span data-dcnode-id="7067" instrument_node="">&nbsp;</span><span data-dcnode-id="7066" instrument_node="">MeV), high resolution timing (60</span><span data-dcnode-id="7065" instrument_node="">&nbsp;</span><em data-dcnode-id="7063"><span data-dcnode-id="7064" instrument_node="">μ</span></em><span data-dcnode-id="7062" instrument_node="">s) and spectroscopy (6% at 100</span><span data-dcnode-id="7061" instrument_node="">&nbsp;</span><span data-dcnode-id="7060" instrument_node="">keV) . In view of the impossibility of focusing high energy X-rays and soft </span><em data-dcnode-id="7058"><span data-dcnode-id="7059" instrument_node="">γ</span></em><span data-dcnode-id="7057" instrument_node="">-rays, the three high energy instruments are operated with a coded mask to provide good imaging capability over a wide field of view. Of course, the coded mask technology and “pixel” size are different for the X-ray monitor and for the two </span><em data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">γ</span></em><span data-dcnode-id="7054" instrument_node="">-ray instruments.</span></p><figure class="figure text-xs" data-dcnode-id="7035" id="f0060"><span data-dcnode-id="7043"><img alt="" data-dcnode-id="7052" height="492" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr12.jpg&amp;raw"><span data-dcnode-id="7051" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7044"><li data-dcnode-id="7045"><a class="anchor download-link u-font-sans" data-dcnode-id="7046" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr12.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7047"><span data-dcnode-id="7050" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7048"><span data-dcnode-id="7049" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7036"><span data-dcnode-id="7037"><p data-dcnode-id="7038" id="sp070"><span class="label" data-dcnode-id="7041"><span data-dcnode-id="7042" instrument_node="">Fig. 12</span></span><span data-dcnode-id="7040" instrument_node="">. </span><span data-dcnode-id="7039" instrument_node="">INTEGRAL during ground testing at ESTEC, ESA.</span></p></span></span></figure></div><p data-dcnode-id="7032" id="p0385"><span data-dcnode-id="7033" instrument_node="">This technique is a key feature of INTEGRAL to provide simultaneous images of the whole field observed and detection and location of all the sources. It also provides the best “on-source” and “background” measurements in a time-independent manner. INTEGRAL provides almost an order of magnitude improved performance in spectroscopy and imaging compared to earlier high energy observatories, such as BeppoSAX, RXTE, GRANAT and the Compton Gamma-Ray Observatory (CGRO). On 15 January, 2010, ESA’s advisory bodies approved the extension of INTEGRAL operations until 2014.</span></p><section data-dcnode-id="6930" id="s0200"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7028"><span data-dcnode-id="7031" instrument_node="">4.3.5.1</span><span data-dcnode-id="7030" instrument_node="">. </span><span data-dcnode-id="7029" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="6956"><p data-dcnode-id="6980" id="p0390"><span data-dcnode-id="7027" instrument_node="">With its broad energy range, INTEGRAL provides an astronomical bridge between the soft X-ray missions, such as XMM-Newton, Chandra, Suzaku, Swift, and NuSTAR, the space-based high-energy </span><em data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">γ</span></em><span data-dcnode-id="7024" instrument_node="">-ray facilities in the GeV regime, such as Fermi and AGILE, and “ground based” </span><em data-dcnode-id="7022"><span data-dcnode-id="7023" instrument_node="">γ</span></em><span data-dcnode-id="7021" instrument_node="">-ray telescopes for higher (∼TeV) energies, such as the The High Energy Stereoscopic System (H.E.S.S), the Major Atmospheric Gamma-ray Imaging Cherenkov Telescopes (MAGIC) and the Very Energetic Radiation Imaging Telescope Array System (VERITAS). The primary astronomical usage of the observatory is for high-resolution spectroscopy with imaging and arc min positioning of celestial sources of hard X-ray/</span><em data-dcnode-id="7019"><span data-dcnode-id="7020" instrument_node="">γ</span></em><span data-dcnode-id="7018" instrument_node="">-ray emission. High-resolution spectroscopy over the entire energy range permits spectral features to be uniquely identified and line profiles to be measured for studies of physical conditions in the source region. The high-resolution imaging capability of INTEGRAL within a large field of view permits accurate location of the high energy emitting sources and hence identification with counterparts at other wavelengths (</span><a class="workspace-trigger" data-dcnode-id="7016" href="#b0055" name="bb0055"><span data-dcnode-id="7017" instrument_node="">Bazzano et al., 2006</span></a><span data-dcnode-id="7015" instrument_node="">). It also enables extended regions to be distinguished from point sources and provides considerable serendipitous science, which is very important for an observatory-class mission (see </span><a class="workspace-trigger" data-dcnode-id="7013" href="#f0065" name="bf0065"><span data-dcnode-id="7014" instrument_node="">Fig. 13</span></a><span data-dcnode-id="7012" instrument_node="">). INTEGRAL remains unique world-wide as an observatory providing these capabilities. Key science areas of INTEGRAL include:</span></p><dl class="list" data-dcnode-id="6981"><dt class="list-label" data-dcnode-id="7010"><span data-dcnode-id="7011" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="7004"><p data-dcnode-id="7005" id="p1770"><span data-dcnode-id="7009" instrument_node="">Studies of nucleosynthesis through </span><em data-dcnode-id="7007"><span data-dcnode-id="7008" instrument_node="">γ</span></em><span data-dcnode-id="7006" instrument_node="">-ray lines from elements formed in supernovae.</span></p></dd><dt class="list-label" data-dcnode-id="7002"><span data-dcnode-id="7003" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="6999"><p data-dcnode-id="7000" id="p1775"><span data-dcnode-id="7001" instrument_node="">Studies of positron production and annihilation.</span></p></dd><dt class="list-label" data-dcnode-id="6997"><span data-dcnode-id="6998" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="6994"><p data-dcnode-id="6995" id="p1780"><span data-dcnode-id="6996" instrument_node="">Studies of the physics of emission mechanisms of white dwarfs, neutron stars, and black holes and associated transient phenomena.</span></p></dd><dt class="list-label" data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="6989"><p data-dcnode-id="6990" id="p1785"><span data-dcnode-id="6991" instrument_node="">Deep surveys for supermassive black holes in Active Galactic Nuclei, and</span></p></dd><dt class="list-label" data-dcnode-id="6987"><span data-dcnode-id="6988" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="6982"><p data-dcnode-id="6983" id="p1790"><em data-dcnode-id="6985"><span data-dcnode-id="6986" instrument_node="">γ</span></em><span data-dcnode-id="6984" instrument_node="">-ray burst studies.</span></p></dd></dl><p></p><figure class="figure text-xs" data-dcnode-id="6957" id="f0065"><span data-dcnode-id="6970"><img alt="" data-dcnode-id="6979" height="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr13.jpg&amp;raw"><span data-dcnode-id="6978" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6971"><li data-dcnode-id="6972"><a class="anchor download-link u-font-sans" data-dcnode-id="6973" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr13.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6974"><span data-dcnode-id="6977" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6975"><span data-dcnode-id="6976" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6958"><span data-dcnode-id="6959"><p data-dcnode-id="6960" id="sp075"><span class="label" data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">Fig. 13</span></span><span data-dcnode-id="6967" instrument_node="">. </span><span data-dcnode-id="6966" instrument_node="">The central part of the Milky Way Galaxy seen by INTEGRAL/IBIS (17–60</span><span data-dcnode-id="6965" instrument_node="">&nbsp;</span><span data-dcnode-id="6964" instrument_node="">keV). Green curves are iso-contours of surface brightness in the infrared from COBE/DIRBE, tracing the surface density of stars in the Galaxy. The maximum sensitivity of the map is within 5–10 of the Galactic Centre. Credit: </span><a class="workspace-trigger" data-dcnode-id="6962" href="#b0285" name="bb0285"><span data-dcnode-id="6963" instrument_node="">Krivonos et al., A&amp; A 519, A107, 2010</span></a><span data-dcnode-id="6961" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="6931" id="p0395"><span data-dcnode-id="6955" instrument_node="">The main results obtained so far include the first sky map in the light of the 511</span><span data-dcnode-id="6954" instrument_node="">&nbsp;</span><span data-dcnode-id="6953" instrument_node="">keV annihilation emission, the discovery of a new class of high mass X-ray binaries and detection of polarisation in cosmic high energy radiation. For the foreseeable future, INTEGRAL will remain the only observatory enabling the study of nucleosynthesis in our Galaxy, including the next, long overdue, nearby supernova, through high-resolution </span><em data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">γ</span></em><span data-dcnode-id="6950" instrument_node="">-ray line spectroscopy (</span><a class="workspace-trigger" data-dcnode-id="6948" href="#b0240" name="bb0240"><span data-dcnode-id="6949" instrument_node="">Winkler et al., 2011</span></a><span data-dcnode-id="6947" instrument_node="">). INTEGRAL observations have uncovered a new class of highly absorbed, slowly spinning pulsars, have shown pulsar wind nebulae to be the </span><em data-dcnode-id="6945"><span data-dcnode-id="6946" instrument_node="">γ</span></em><span data-dcnode-id="6944" instrument_node="">-ray counterpart of the new TeV sources, and detected the most distant </span><em data-dcnode-id="6942"><span data-dcnode-id="6943" instrument_node="">γ</span></em><span data-dcnode-id="6941" instrument_node="">-ray quasars, a break-trough in relativistic astrophysics. The 30% unidentified new INTEGRAL sources are a remaining mystery. Recently, the new class of Fast Supergiant X-Ray Transients has been discovered by INTEGRAL, posing a challenge to stellar evolution modeling (</span><a class="workspace-trigger" data-dcnode-id="6939" href="#b0195" name="bb0195"><span data-dcnode-id="6940" instrument_node="">Sguera et al., 2005</span></a><span data-dcnode-id="6938" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6936" href="#b0220" name="bb0220"><span data-dcnode-id="6937" instrument_node="">Ubertini et al., 2006</span></a><span data-dcnode-id="6935" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6933" href="#b0200" name="bb0200"><span data-dcnode-id="6934" instrument_node="">Sidoli et al., 2007</span></a><span data-dcnode-id="6932" instrument_node="">).</span></p></section></section><section data-dcnode-id="6884" id="s0205"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6925"><span data-dcnode-id="6928" instrument_node="">4.3.6</span><span data-dcnode-id="6927" instrument_node="">. </span><span data-dcnode-id="6926" instrument_node="">GALEX, Galaxy Evolution Explorer</span></h4><div data-dcnode-id="6892"><p data-dcnode-id="6911" id="p0400"><span data-dcnode-id="6924" instrument_node="">The Galaxy Evolution Explorer (GALEX) is a small mission with an ultraviolet space telescope for imaging the sky with a 1.2</span><span data-dcnode-id="6923" instrument_node="">&nbsp;</span><span data-dcnode-id="6922" instrument_node="">degree field of view and a resolution of ∼5</span><span data-dcnode-id="6921" instrument_node="">&nbsp;</span><span data-dcnode-id="6920" instrument_node="">arc sec. A Pegasus rocket launched GALEX into orbit on April 28th, 2003 (see </span><a class="workspace-trigger" data-dcnode-id="6918" href="#f0070" name="bf0070"><span data-dcnode-id="6919" instrument_node="">Fig. 14</span></a><span data-dcnode-id="6917" instrument_node="">). The mission is now in an extended phase, but the formal Guest Investigator Program has been discontinued. The observatory continues to collect near-ultraviolet (227</span><span data-dcnode-id="6916" instrument_node="">&nbsp;</span><span data-dcnode-id="6915" instrument_node="">nm) images for a Legacy Survey. Led by the California Institute of Technology, GALEX is conducting several first-of-a-kind sky surveys, including an extra-galactic (beyond our galaxy) ultraviolet all-sky survey. During its mission, GALEX produced the first comprehensive map of a Universe of galaxies under construction, bringing us closer to understanding how galaxies like our own Milky Way were formed. GALEX is also identifying celestial objects for further study by ongoing and future missions. GALEX data now populate a large archive available to the entire astronomical community and to the general public. Scientists would like to understand when the stars that we see today and the chemical elements that make up our Milky Way galaxy were formed. With its ultraviolet observations, GALEX is filling in one of the key pieces of this puzzle (</span><a class="workspace-trigger" data-dcnode-id="6913" href="#b0060" name="bb0060"><span data-dcnode-id="6914" instrument_node="">Bianchi et al., 1999</span></a><span data-dcnode-id="6912" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="6893" id="f0070"><span data-dcnode-id="6901"><img alt="" data-dcnode-id="6910" height="467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr14.jpg&amp;raw"><span data-dcnode-id="6909" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6902"><li data-dcnode-id="6903"><a class="anchor download-link u-font-sans" data-dcnode-id="6904" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr14.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6905"><span data-dcnode-id="6908" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6906"><span data-dcnode-id="6907" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6894"><span data-dcnode-id="6895"><p data-dcnode-id="6896" id="sp080"><span class="label" data-dcnode-id="6899"><span data-dcnode-id="6900" instrument_node="">Fig. 14</span></span><span data-dcnode-id="6898" instrument_node="">. </span><span data-dcnode-id="6897" instrument_node="">GALEX artist’s concept.</span></p></span></span></figure></div><section data-dcnode-id="6885" id="s0210"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6888"><span data-dcnode-id="6891" instrument_node="">4.3.6.1</span><span data-dcnode-id="6890" instrument_node="">. </span><span data-dcnode-id="6889" instrument_node="">Mission achievement summary</span></h5><p data-dcnode-id="6886" id="p0405"><span data-dcnode-id="6887" instrument_node="">A 5-year survey of 200,000 galaxies, stretching back seven billion years in cosmic time, has led to one of the best independent confirmations that dark energy is driving our universe apart at accelerating speeds. The survey used data from NASA’s space-based Galaxy Evolution Explorer and the Anglo-Australian Telescope on Siding Spring Mountain in Australia. The findings offer new support for the favored theory of how dark energy works – as a constant force, uniformly affecting the universe and propelling its runaway expansion. They contradict an alternate theory, where gravity, not dark energy, is the force pushing space apart. According to this alternate theory, with which the new survey results are not consistent, Einstein’s concept of gravity is wrong, and gravity becomes repulsive instead of attractive when acting at great distances.</span></p></section></section><section data-dcnode-id="6834" id="s0215"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6880"><span data-dcnode-id="6883" instrument_node="">4.3.7</span><span data-dcnode-id="6882" instrument_node="">. </span><span data-dcnode-id="6881" instrument_node="">Spitzer Space Telescope</span></h4><div data-dcnode-id="6849"><p data-dcnode-id="6868" id="p0410"><span data-dcnode-id="6879" instrument_node="">The Spitzer Space Telescope (see </span><a class="workspace-trigger" data-dcnode-id="6877" href="#f0075" name="bf0075"><span data-dcnode-id="6878" instrument_node="">Fig. 15</span></a><span data-dcnode-id="6876" instrument_node="">) was launched on 25 August, 2003. It consists of a 0.85-m diameter telescope and three cryogenically cooled science instruments which perform imaging and spectroscopy in the 3–180 micron wavelength range. Since infrared radiation is primarily heat radiation, detectors are most sensitive to infrared light when they are kept extremely cold. Using the latest in large-format detector arrays, Spitzer was able to make observations that are more sensitive than any previous mission. The telescope is surrounded by an outer shell that radiates heat to cold space in the anti-Sun direction, and is shielded from the Sun by the solar panel assembly. Intermediate shields intercept heat from the solar panel and the spacecraft bus. Spitzer operated at cryogenic temperature until May 2009 when the cryogen was exhausted, greatly exceeding its lifetime requirement of 2.5</span><span data-dcnode-id="6875" instrument_node="">&nbsp;</span><span data-dcnode-id="6874" instrument_node="">years. The only instrument able to operate after cryogen expiration, the Infrared Array Camera, continues to enable outstanding science investigations with its two shortest wavelength channels at 3.5 and 4.6</span><span data-dcnode-id="6873" instrument_node="">&nbsp;</span><span data-dcnode-id="6872" instrument_node="">microns.</span><a class="workspace-trigger" data-dcnode-id="6869" href="#fn41" name="bfn41"><sup data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">41</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="6850" id="f0075"><span data-dcnode-id="6858"><img alt="" data-dcnode-id="6867" height="552" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr15.jpg&amp;raw"><span data-dcnode-id="6866" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6859"><li data-dcnode-id="6860"><a class="anchor download-link u-font-sans" data-dcnode-id="6861" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr15.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6862"><span data-dcnode-id="6865" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6851"><span data-dcnode-id="6852"><p data-dcnode-id="6853" id="sp085"><span class="label" data-dcnode-id="6856"><span data-dcnode-id="6857" instrument_node="">Fig. 15</span></span><span data-dcnode-id="6855" instrument_node="">. </span><span data-dcnode-id="6854" instrument_node="">The Spitzer satellite during ground testing.</span></p></span></span></figure></div><section data-dcnode-id="6835" id="s0220"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6845"><span data-dcnode-id="6848" instrument_node="">4.3.7.1</span><span data-dcnode-id="6847" instrument_node="">. </span><span data-dcnode-id="6846" instrument_node="">Mission achievement summary</span></h5><p data-dcnode-id="6838" id="p0415"><span data-dcnode-id="6844" instrument_node="">Spitzers wavelength coverage and sensitivity have made it a highly productive observatory demonstrating the importance of the infrared spectral region for galactic, extragalactic, and solar system astrophysics; a few of its scientific discoveries are mentioned here as examples. Among Spitzers many extragalactic science highlights are the identification of the individual galaxies responsible for most of the Cosmic Infrared Background (CIB), tracing the history of star formation out to redshift 3, showing that the CIB contains roughly the same amount of energy as the optical background and that galaxy formation and evolution processes have produced radiation equivalent to 5% of the cosmic microwave background (CMB). Star formation by galaxies that are not very luminous in the infrared has been found to dominate the energy production in the Universe at low redshift (</span><em data-dcnode-id="6842"><span data-dcnode-id="6843" instrument_node="">z</span></em><span data-dcnode-id="6841" instrument_node=""> less than ∼0.5), but the contribution of luminous and ultraluminous infrared galaxies increases steadily out to redshifts of 2–3. Emission by polycyclic aromatic hydrocarbon particles (essentially very large molecules) has been shown to be a characteristic signature and probe of star formation throughout the Universe. A population of dust-obscured active galactic nuclei has been identified through their IR spectral energy distributions. In the study of nearby galaxies, the wavelength coverage and imaging capabilities of Spitzer probe various components, including stellar atmospheres and dust in quiescent and star forming clouds. Spitzer has provided detailed images of nearby galaxies giving new insights into the distribution and properties of stars and the interstellar medium. Spitzer has also enabled major advances in the study of planetary system formation and evolution. For example, debris disks comprising cold material, identified via their 70</span><span data-dcnode-id="6840" instrument_node="">&nbsp;</span><span data-dcnode-id="6839" instrument_node="">μm excess, have been shown to be common features of main sequence stars, with no correlation of the excess with metallicity or spectral type, but a weak dependence on stellar age, with younger stars more likely to have excess emission. Systems with warmer debris (of the kind discovered by the IRAS satellite around the star Vega) created by collisions in forming planetary disks, and heated by the central star, have also been studied. Their emission is found to be strongly dependent on recent collision history, suggesting that interplanetary dust around main sequence stars varies stochastically as a result of major collision events. Spectroscopic study with Spitzer of the atmospheres of brown dwarf stars reveal non-equilibrium chemistry and show that brown dwarfs are just as likely as more massive stars to harbour circumstellar disks. This implies that brown dwarfs as low in mass as ∼10 Jupiters appear to form by the same process as solar-mass stars.</span></p><p data-dcnode-id="6836" id="p0420"><span data-dcnode-id="6837" instrument_node="">Spitzer has made the first detections of secondary eclipse signatures from ’hot Jupiter’ exoplanets, providing information on the temperature and atmospheric properties of the planets. Within the solar system, spectral observations by Spitzer of the debris created by the collision of the Deep Impact probe with Comet Tempel1, revealed the silicate composition of the interior.</span></p></section></section><section data-dcnode-id="6761" id="s0225"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6830"><span data-dcnode-id="6833" instrument_node="">4.3.8</span><span data-dcnode-id="6832" instrument_node="">. </span><span data-dcnode-id="6831" instrument_node="">The Swift Gamma-Ray Burst Mission</span></h4><div data-dcnode-id="6762"><p data-dcnode-id="6802" id="p0425"><span data-dcnode-id="6829" instrument_node="">Swift (see </span><a class="workspace-trigger" data-dcnode-id="6827" href="#f0080" name="bf0080"><span data-dcnode-id="6828" instrument_node="">Fig. 16</span></a><span data-dcnode-id="6826" instrument_node="">), a mission designed to study </span><em data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">γ</span></em><span data-dcnode-id="6823" instrument_node="">-ray bursts, is part of NASA’s medium explorer (MIDEX) programme and was launched into a low-Earth orbit on a Delta 7320 rocket on 20 November, 2004 (</span><a class="workspace-trigger" data-dcnode-id="6821" href="#b0110" name="bb0110"><span data-dcnode-id="6822" instrument_node="">Gehrels et al., 2004</span></a><span data-dcnode-id="6820" instrument_node="">). Gamma-ray bursts (GRBs) are the most powerful explosions the Universe has seen since the Big Bang. They occur approximately once per day and are brief, but intense, flashes of </span><em data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">γ</span></em><span data-dcnode-id="6817" instrument_node=""> radiation. They come from all different directions of the sky and last from a few milliseconds to a few 100</span><span data-dcnode-id="6816" instrument_node="">&nbsp;</span><span data-dcnode-id="6815" instrument_node="">s. So far scientists do not know what causes them. Do they signal the birth of a black hole in a massive stellar explosion? Are they the product of the collision of two neutron stars? Or is it some other exotic phenomenon that causes these bursts? With Swift, a NASA mission with international participation, scientists have a tool dedicated to answering these questions and solving the </span><em data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">γ</span></em><span data-dcnode-id="6812" instrument_node="">-ray burst mystery. Its three instruments give scientists the ability to scrutinise </span><em data-dcnode-id="6810"><span data-dcnode-id="6811" instrument_node="">γ</span></em><span data-dcnode-id="6809" instrument_node="">-ray bursts as never before. Within seconds of detecting a burst, Swift relays its location to ground stations, allowing both “ground based” and space-based telescopes around the world the opportunity to observe the burst’s afterglow. GRB 100413B is Number 500 (see </span><a class="workspace-trigger" data-dcnode-id="6807" href="#f0085" name="bf0085"><span data-dcnode-id="6808" instrument_node="">Fig. 17)</span></a><span data-dcnode-id="6806" instrument_node=""> detected by Swift/BAT since the mission was launched (</span><a class="workspace-trigger" data-dcnode-id="6804" href="#b0110" name="bb0110"><span data-dcnode-id="6805" instrument_node="">Gehrels et al., 2004</span></a><span data-dcnode-id="6803" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="6784" id="f0080"><span data-dcnode-id="6792"><img alt="" data-dcnode-id="6801" height="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr16.jpg&amp;raw"><span data-dcnode-id="6800" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6793"><li data-dcnode-id="6794"><a class="anchor download-link u-font-sans" data-dcnode-id="6795" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr16.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6796"><span data-dcnode-id="6799" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6785"><span data-dcnode-id="6786"><p data-dcnode-id="6787" id="sp090"><span class="label" data-dcnode-id="6790"><span data-dcnode-id="6791" instrument_node="">Fig. 16</span></span><span data-dcnode-id="6789" instrument_node="">. </span><span data-dcnode-id="6788" instrument_node="">Swift artist’s concept.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="6763" id="f0085"><span data-dcnode-id="6774"><img alt="" data-dcnode-id="6783" height="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr17.jpg&amp;raw"><span data-dcnode-id="6782" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6775"><li data-dcnode-id="6776"><a class="anchor download-link u-font-sans" data-dcnode-id="6777" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr17.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6778"><span data-dcnode-id="6781" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6779"><span data-dcnode-id="6780" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6764"><span data-dcnode-id="6765"><p data-dcnode-id="6766" id="sp095"><span class="label" data-dcnode-id="6772"><span data-dcnode-id="6773" instrument_node="">Fig. 17</span></span><span data-dcnode-id="6771" instrument_node="">. </span><span data-dcnode-id="6770" instrument_node="">Sky distribution of 500 </span><em data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">γ</span></em><span data-dcnode-id="6767" instrument_node="">-ray bursts detected by Swift.</span></p></span></span></figure></div></section><section data-dcnode-id="6724" id="s0230"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6757"><span data-dcnode-id="6760" instrument_node="">4.3.9</span><span data-dcnode-id="6759" instrument_node="">. </span><span data-dcnode-id="6758" instrument_node="">Suzaku X-ray and hard X-ray telescopes</span></h4><div data-dcnode-id="6725"><p data-dcnode-id="6744" id="p0430"><span data-dcnode-id="6756" instrument_node="">Suzaku (previously called Astro-E2) was successfully launched on 10 July, 2005 by the Japan Aerospace Exploration Agency (JAXA) in collaboration with US (NASA/GSFC and MIT) and Japanese institutes (see </span><a class="workspace-trigger" data-dcnode-id="6754" href="#f0090" name="bf0090"><span data-dcnode-id="6755" instrument_node="">Fig. 18</span></a><span data-dcnode-id="6753" instrument_node="">). Suzaku covers the energy range 0.3–600</span><span data-dcnode-id="6752" instrument_node="">&nbsp;</span><span data-dcnode-id="6751" instrument_node="">keV and is currently performing astronomical observations using imaging CCD cameras (XIS) and a hard X-ray detector (HXD). Suzaku provides new capabilities to observe all classes of astronomical objects including active galactic nuclei, clusters of galaxies, stars, supernova remnants, X-ray binaries and solar system objects. After a 9</span><span data-dcnode-id="6750" instrument_node="">&nbsp;</span><span data-dcnode-id="6749" instrument_node="">months performance verification phase, Suzaku began operating as an observatory, open to the world-wide astronomical community.</span><a class="workspace-trigger" data-dcnode-id="6746" href="#fn42" name="bfn42"><sup data-dcnode-id="6747"><span data-dcnode-id="6748" instrument_node="">42</span></sup></a><span data-dcnode-id="6745" instrument_node=""> Since the start of open time observations, JAXA has kindly offered to allocate 8% of the open observing time to proposals from scientists from institutes located in ESA Member States. The European proposals are peer-reviewed by an ESA-appointed Time Allocation Committee and the recommended proposals forwarded to JAXA for merging with those resulting from the parallel Japanese and US calls. The Suzaku Announcement of Opportunity-6 yelded a total of 28 valid proposals, corresponding to an over-subscription in time of 3.2.</span></p><figure class="figure text-xs" data-dcnode-id="6726" id="f0090"><span data-dcnode-id="6734"><img alt="" data-dcnode-id="6743" height="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr18.jpg&amp;raw"><span data-dcnode-id="6742" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6735"><li data-dcnode-id="6736"><a class="anchor download-link u-font-sans" data-dcnode-id="6737" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr18.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6738"><span data-dcnode-id="6741" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6739"><span data-dcnode-id="6740" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6727"><span data-dcnode-id="6728"><p data-dcnode-id="6729" id="sp100"><span class="label" data-dcnode-id="6732"><span data-dcnode-id="6733" instrument_node="">Fig. 18</span></span><span data-dcnode-id="6731" instrument_node="">. </span><span data-dcnode-id="6730" instrument_node="">Suzaku artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="6607" id="s0235"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6720"><span data-dcnode-id="6723" instrument_node="">4.3.10</span><span data-dcnode-id="6722" instrument_node="">. </span><span data-dcnode-id="6721" instrument_node="">AGILE high energy gamma-ray mission</span></h4><div data-dcnode-id="6678"><p data-dcnode-id="6697" id="p0435"><span data-dcnode-id="6719" instrument_node="">AGILE (“Astrorivelatore Gamma a Immagini Leggero”) is the Italian Space Agency (ASI) Mission dedicated to the observation of the gamma-ray Universe (</span><a class="workspace-trigger" data-dcnode-id="6717" href="#b0210" name="bb0210"><span data-dcnode-id="6718" instrument_node="">Tavani et al., 2009</span></a><span data-dcnode-id="6716" instrument_node="">). The AGILE instrument consists of a gamma-ray imager (30</span><span data-dcnode-id="6715" instrument_node="">&nbsp;</span><span data-dcnode-id="6714" instrument_node="">MeV–50</span><span data-dcnode-id="6713" instrument_node="">&nbsp;</span><span data-dcnode-id="6712" instrument_node="">GeV), a hard X-ray imager (18–60</span><span data-dcnode-id="6711" instrument_node="">&nbsp;</span><span data-dcnode-id="6710" instrument_node="">keV), a calorimeter (350</span><span data-dcnode-id="6709" instrument_node="">&nbsp;</span><span data-dcnode-id="6708" instrument_node="">keV–100</span><span data-dcnode-id="6707" instrument_node="">&nbsp;</span><span data-dcnode-id="6706" instrument_node="">MeV), and an anti-coincidence system (see </span><a class="workspace-trigger" data-dcnode-id="6704" href="#f0095" name="bf0095"><span data-dcnode-id="6705" instrument_node="">Fig. 19</span></a><span data-dcnode-id="6703" instrument_node="">). AGILE was launched on 23 April, 2007 from the Indian base of Sriharikota and inserted in an equatorial orbit. AGILE surveyed the </span><em data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">γ</span></em><span data-dcnode-id="6700" instrument_node="">-ray sky in pointing mode until 2009 and now is operating in spinning mode. Hundreds of Galactic and extragalactic sources are detected with emphasis on the energy range near 100</span><span data-dcnode-id="6699" instrument_node="">&nbsp;</span><span data-dcnode-id="6698" instrument_node="">MeV.</span></p><figure class="figure text-xs" data-dcnode-id="6679" id="f0095"><span data-dcnode-id="6687"><img alt="" data-dcnode-id="6696" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr19.jpg&amp;raw"><span data-dcnode-id="6695" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6688"><li data-dcnode-id="6689"><a class="anchor download-link u-font-sans" data-dcnode-id="6690" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr19.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6691"><span data-dcnode-id="6694" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6692"><span data-dcnode-id="6693" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6680"><span data-dcnode-id="6681"><p data-dcnode-id="6682" id="sp105"><span class="label" data-dcnode-id="6685"><span data-dcnode-id="6686" instrument_node="">Fig. 19</span></span><span data-dcnode-id="6684" instrument_node="">. </span><span data-dcnode-id="6683" instrument_node="">AGILE artist’s concept.</span></p></span></span></figure></div><section data-dcnode-id="6608" id="s0240"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6674"><span data-dcnode-id="6677" instrument_node="">4.3.10.1</span><span data-dcnode-id="6676" instrument_node="">. </span><span data-dcnode-id="6675" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="6609"><p data-dcnode-id="6637" id="p0440"><span data-dcnode-id="6673" instrument_node="">The main discoveries and achievements include: The surprising discovery of very rapid and variable </span><em data-dcnode-id="6671"><span data-dcnode-id="6672" instrument_node="">γ</span></em><span data-dcnode-id="6670" instrument_node="">-ray emission from the Crab Nebula, a source believed to be the constant reference source in high-energy astrophysics. The AGILE discovery of a strong </span><em data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">γ</span></em><span data-dcnode-id="6667" instrument_node="">-ray flaring episode from the Crab Nebula in September 2010 (later confirmed by the Fermi, LAT) shattered this belief; the discovery of the first unambiguous neutral pion signature of accelerated protons/hadrons in the </span><em data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">γ</span></em><span data-dcnode-id="6664" instrument_node="">-ray emission of the Supernova Remnant W44. </span><a class="workspace-trigger" data-dcnode-id="6662" href="#f0100" name="bf0100"><span data-dcnode-id="6663" instrument_node="">Fig. 20</span></a><span data-dcnode-id="6661" instrument_node=""> shows a detailed map of the W44 region in the energy range from 400</span><span data-dcnode-id="6660" instrument_node="">&nbsp;</span><span data-dcnode-id="6659" instrument_node="">MeV to 3</span><span data-dcnode-id="6658" instrument_node="">&nbsp;</span><span data-dcnode-id="6657" instrument_node="">GeV. Contours of the 324</span><span data-dcnode-id="6656" instrument_node="">&nbsp;</span><span data-dcnode-id="6655" instrument_node="">MHz radio continuum flux density detected by the VLA (</span><a class="workspace-trigger" data-dcnode-id="6653" href="#b0115" name="bb0115"><span data-dcnode-id="6654" instrument_node="">Giuliani et al., 2011</span></a><span data-dcnode-id="6652" instrument_node="">) are overlaid in green; the detection of several tens of bright </span><em data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">γ</span></em><span data-dcnode-id="6649" instrument_node="">-ray Blazars, including the </span><em data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">γ</span></em><span data-dcnode-id="6646" instrument_node="">-ray flare from the super-massive black hole 3C 454.3 in November 2010, the brightest ever detected from any cosmic source; the discovery of </span><em data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">γ</span></em><span data-dcnode-id="6643" instrument_node="">-ray emission from the micro-quasar Cygnus X-3; the discovery of </span><em data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">γ</span></em><span data-dcnode-id="6640" instrument_node="">-ray emission up to 100</span><span data-dcnode-id="6639" instrument_node="">&nbsp;</span><span data-dcnode-id="6638" instrument_node="">MeV from Terrestrial Gamma-Ray Flashes (TGFs), a detection that shows how the atmosphere can very efficiently accelerate particles during lightning associated with powerful thunderstorms.</span></p><figure class="figure text-xs" data-dcnode-id="6610" id="f0100"><span data-dcnode-id="6627"><img alt="" data-dcnode-id="6636" height="390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr20.jpg&amp;raw"><span data-dcnode-id="6635" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6628"><li data-dcnode-id="6629"><a class="anchor download-link u-font-sans" data-dcnode-id="6630" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr20.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6631"><span data-dcnode-id="6634" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6611"><span data-dcnode-id="6612"><p data-dcnode-id="6613" id="sp110"><span class="label" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">Fig. 20</span></span><span data-dcnode-id="6624" instrument_node="">. </span><span data-dcnode-id="6623" instrument_node="">AGILE </span><em data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">γ</span></em><span data-dcnode-id="6620" instrument_node="">-ray intensity map of the Supernova Remnant W44 in the energy range 400</span><span data-dcnode-id="6619" instrument_node="">&nbsp;</span><span data-dcnode-id="6618" instrument_node="">MeV–3</span><span data-dcnode-id="6617" instrument_node="">&nbsp;</span><span data-dcnode-id="6616" instrument_node="">GeV. Green contours show the 324</span><span data-dcnode-id="6615" instrument_node="">&nbsp;</span><span data-dcnode-id="6614" instrument_node="">MHz radio continuum flux density.</span></p></span></span></figure></div></section></section><section data-dcnode-id="6492" id="s0245"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6603"><span data-dcnode-id="6606" instrument_node="">4.3.11</span><span data-dcnode-id="6605" instrument_node="">. </span><span data-dcnode-id="6604" instrument_node="">Fermi High Energy Gamma ray Telescope</span></h4><div data-dcnode-id="6548"><p data-dcnode-id="6567" id="p0445"><span data-dcnode-id="6602" instrument_node="">The Fermi Gamma-Ray Space Telescope (Fermi) (see </span><a class="workspace-trigger" data-dcnode-id="6600" href="#f0105" name="bf0105"><span data-dcnode-id="6601" instrument_node="">Fig. 21</span></a><span data-dcnode-id="6599" instrument_node="">) was launched on 11 June, 2008 into a nearly circular orbit of ∼565</span><span data-dcnode-id="6598" instrument_node="">&nbsp;</span><span data-dcnode-id="6597" instrument_node="">km altitude at an inclination of 25.6</span><span data-dcnode-id="6596" instrument_node="">&nbsp;</span><span data-dcnode-id="6595" instrument_node="">degrees. The mission has a design lifetime of 5</span><span data-dcnode-id="6594" instrument_node="">&nbsp;</span><span data-dcnode-id="6593" instrument_node="">years, with a goal of 10</span><span data-dcnode-id="6592" instrument_node="">&nbsp;</span><span data-dcnode-id="6591" instrument_node="">years. Science operations began on 4 August, 2008, and the spacecraft and instrument packages have operated in a nearly flawless manner up to the present time. The mission is managed by the NASA Goddar
