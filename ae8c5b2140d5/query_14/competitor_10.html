id="8692" id="p0190"><em data-dcnode-id="8702"><span data-dcnode-id="8703" instrument_node="">Working group assessment and recommendations</span></em><span data-dcnode-id="8701" instrument_node="">: The increasing cost and schedule delay of JWST has made the US timescale inconsistent with that of ESA. As a consequence the re-scoped ESA L-class mission down-selection</span><a class="workspace-trigger" data-dcnode-id="8698" href="#fn26" name="bfn26"><sup data-dcnode-id="8699"><span data-dcnode-id="8700" instrument_node="">26</span></sup></a><span data-dcnode-id="8697" instrument_node=""> had been planned for the second half of 2012.</span><a class="workspace-trigger" data-dcnode-id="8694" href="#fn27" name="bfn27"><sup data-dcnode-id="8695"><span data-dcnode-id="8696" instrument_node="">27</span></sup></a><span data-dcnode-id="8693" instrument_node=""> Consequently, ESA has announced the re-scoping of the mission compatible with an ESA-led project within a more limited budget envelope. The new ESA policy is triggering the development of new mission scenarios with new possible participating partners, and it is possible that a world-class mission could emerge. Nevertheless, there are serious concerns that the scientific capabilities originally envisaged may be significantly compromised.</span></p></section><section data-dcnode-id="8670" id="s0055"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8685"><span data-dcnode-id="8690" instrument_node="">3.4.2</span><span data-dcnode-id="8688" instrument_node="">. </span><span data-dcnode-id="8686" instrument_node="">LISA: Laser Interferometer Space Antenna</span></h4><p data-dcnode-id="8675" id="p0195"><span data-dcnode-id="8684" instrument_node="">The Laser Interferometer Space Antenna (LISA) was planned as a cooperative mission between NASA and ESA, designed to measure ‘ripples’ in space–time, detecting and characterising gravitational waves that are emitted during the most powerful events in the universe. LISA will detect gravitational radiation from astronomical sources, observing galaxies far back in time, and testing the fundamental theories of gravitation. Predicted by Einstein’s general theory of relativity, these ripples, called gravitational waves, are generated during events in which very massive objects undergo strong acceleration. Examples of such events are massive black holes swallowing neutron stars or the collision of two massive black holes. LISA was due to be the first mission to detect gravitational waves from space, making possible observations at low frequencies that would be difficult from the ground. LISA’s three spacecraft were planned to form an equilateral triangle with arms of about 5</span><span data-dcnode-id="8682" instrument_node="">&nbsp;</span><span data-dcnode-id="8680" instrument_node="">million km in length. Each spacecraft was designed to house two free-floating test masses made of a gold-platinum alloy, shielded from adverse effects of being in interplanetary space, with the distance between the test masses in different spacecraft being monitored using highly accurate laser-based techniques. In this manner, it is possible to detect minute changes caused by passing gravitational waves. Gravitational waves are an integral part of Einstein’s theory of general relativity. When a massive body is strongly accelerated, it radiates gravitational waves. The difficulty is that, even for very massive bodies, such as black holes or neutron stars, gravitational waves are very weak and their effects are small. To detect gravitational waves, increasing the size of the detectors and going to a very quiet place is key. This is why scientists need LISA – a space-based detector, 5</span><span data-dcnode-id="8678" instrument_node="">&nbsp;</span><span data-dcnode-id="8676" instrument_node="">million km in size.</span></p><p data-dcnode-id="8671" id="p0200"><em data-dcnode-id="8673"><span data-dcnode-id="8674" instrument_node="">Working group assessment and recommendations</span></em><span data-dcnode-id="8672" instrument_node="">: The future of the LISA concept and mission depends on the outcome of the LISA Pathfinder mission, which is designed to demonstrate some of the key technologies for LISA. The construction and testing of the Pathfinder spacecraft is currently nearing completion, but subject to schedule delay due to some remaining technical difficulties. As with IXO, the increasing cost and schedule delay of JWST are making the US timescale inconsistent with ESA’s plans, and ESA has announced a re-scoping of the mission within a more limited budget and ESA-led scheme. Scientific and technical studies are currently being carried out to assess what could be achieved within the confines of such a reduced budget. It remains to be seen what options will emerge from this exercise, but, as with IXO, there are strong worries that the compelling scientific promise of LISA may be greatly degraded unless it can be redefined as an ambitious mission involving major international partnership.</span></p></section><section data-dcnode-id="8661" id="s0060"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8664"><span data-dcnode-id="8669" instrument_node="">3.4.3</span><span data-dcnode-id="8667" instrument_node="">. </span><span data-dcnode-id="8665" instrument_node="">EJSM: Europa Jupiter System Mission</span></h4><p data-dcnode-id="8662" id="p0205"><span data-dcnode-id="8663" instrument_node="">The fundamental theme for the Jupiter System Mission is focused on science goals relating to habitability (especially on Europa and Ganymede) and processes at work within the Jupiter System and the system’s origin. Europa is believed to have a saltwater ocean beneath a relatively thin and geodynamically active icy crust. Ganymede is believed to have a liquid ocean sandwiched between a thick ice shell above and high-density ice polymorphs below, more typical of volatile-rich icy satellites. The discovery of hydrothermal fields on Earth’s sea floor suggests that such areas are potential habitats, powered by energy and nutrients that result from reactions between the sea water, and silicates. Consequently, Europa and Ganymede are interesting candidates in the search for habitable zones and life in the solar system. In addition, Ganymede is the only satellite known to have an intrinsic magnetic field, which makes the Ganymede-Jupiter magnetospheric interaction unique in the Solar System. The Jupiter system includes a broad diversity of objects, including Jupiter itself, 55 currently known outer irregular satellites, the Jovian ring system, four small inner satellites, and the four large Galilean Satellites: Io, Europa, Ganymede, and Callisto. The Jupiter System Mission has the goal of determining whether the Jupiter system harbours habitable worlds, while detailing the geophysical, compositional, geological, and external processes that affect these icy and active planet-sized worlds. The mission will study Jupiter’s atmosphere while focusing on complementary scientific questions through measurements of the troposphere, stratosphere, thermosphere, and ionosphere for comparisons with Jupiter’s interior and magnetosphere. In mid-April 2011, ESA appointed the Science Study Team (SST) for the Jupiter System Mission concept to re-formulate the science case, re-structure the mission, and study which of the original science goals of the EJSM mission concept can be achieved by a European led mission. The SST process is scheduled to be terminated in February 2012.</span></p></section><section data-dcnode-id="8632" id="s0065"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8655"><span data-dcnode-id="8660" instrument_node="">3.4.4</span><span data-dcnode-id="8658" instrument_node="">. </span><span data-dcnode-id="8656" instrument_node="">Dark Energy and Exoplanet Science: WFIRST (NASA Decadal Survey) and Euclid (ESA M-class mission)</span></h4><section data-dcnode-id="8646" id="s0070"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8649"><span data-dcnode-id="8654" instrument_node="">3.4.4.1</span><span data-dcnode-id="8652" instrument_node="">. </span><span data-dcnode-id="8650" instrument_node="">WFIRST (NASA)</span></h5><p data-dcnode-id="8647" id="p0210"><span data-dcnode-id="8648" instrument_node="">The Wide-Field Infrared Survey Telescope (WFIRST) is a recommended NASA observatory based on a 1.5-metre-class telescope with a wide field-of-view to carry out near-infrared imaging and low-resolution spectroscopy. WFIRST will address two of the most fundamental questions in astrophysics: why is the expansion rate of the universe accelerating? and are there other solar systems like ours, with worlds like Earth? In addition, WFIRST will allow astronomers to tackle issues of central importance to our understanding of how galaxies, stars, and black holes form and evolve. To settle fundamental questions about the nature of dark energy, the postulated cause of the accelerating expansion of the universe, WFIRST will employ three distinct techniques – measurements of weak gravitational lensing, baryon acoustic oscillations, and supernova distances. To search for exoplanets, it will monitor a large sample of stars in the central bulge of the Milky Way for small deviations in brightness due to microlensing by intervening stars and their associated planetary systems. Finally, WFIRST will offer a robust guest investigator programme supporting key and archival studies of broad astrophysical topics.</span></p></section><section data-dcnode-id="8633" id="s0075"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8640"><span data-dcnode-id="8645" instrument_node="">3.4.4.2</span><span data-dcnode-id="8643" instrument_node="">. </span><span data-dcnode-id="8641" instrument_node="">Euclid (ESA – M Class Mission)</span></h5><p data-dcnode-id="8638" id="p0215"><span data-dcnode-id="8639" instrument_node="">The mission has a 1.2-metre-class telescope and instruments in the visible and near-infrared. Its primary observation is a large (∼15,000 square degree) imaging and spectroscopic (slitless) sky survey. Euclid is designed to address key questions relevant to fundamental physics and cosmology, namely the nature of the mysterious dark energy and dark matter. Astronomers are now convinced that these substances dominate ordinary matter. Euclid would map the distribution of galaxies to reveal the underlying ‘dark’ architecture of the Universe.</span></p><p data-dcnode-id="8634" id="p0220"><em data-dcnode-id="8636"><span data-dcnode-id="8637" instrument_node="">Working group assessment and recommendations</span></em><span data-dcnode-id="8635" instrument_node="">: Euclid has now been selected by ESA. Join together the Dark Energy missions in Europe and the US. Add-in possible other partners from Canada, China, India and possibly Russia.</span></p></section></section><section data-dcnode-id="8278" id="s0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8626"><span data-dcnode-id="8631" instrument_node="">3.4.5</span><span data-dcnode-id="8629" instrument_node="">. </span><span data-dcnode-id="8627" instrument_node="">The ESA change of L Class mission collaborative scheme</span></h4><p data-dcnode-id="8624" id="p0225"><span data-dcnode-id="8625" instrument_node="">On March 15 2011, F. Favata, Head of the Science Planning and Community Coordination Office informed the community of a relevant change of collaborative scheme with NASA on the three L Class mission candidates with an e-mail to the Members of the Space Science Advisory Committee, Astronomy Working Group, and Solar System and Exploration Working Group, to be distributed to interested people. The main message was that “the US budgetary prospective has now also become known in February 2011, and, given the decadal prioritisation, our initial discussions with US counterparts indicate that it has become quite unlikely for any of the three L mission candidates to be implemented as a joint Europe-US mission in the planned early 2020s timeframe. The ESA advisory bodies and the Science Programme Committee have decided to revise the structure of each L-class mission study and of the corresponding team in the context of a European framework. Each revised team will be asked to examine if they can restructure their mission concept and its science case to meet a scenario where, in the least optimistic case, a Europe-alone mission could be envisaged”.</span></p><section data-dcnode-id="8279" id="s0085"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8618"><span data-dcnode-id="8623" instrument_node="">3.4.5.1</span><span data-dcnode-id="8621" instrument_node="">. </span><span data-dcnode-id="8619" instrument_node="">The impact of the “ESA alone” programmatic decision on NASA-JAXA common programme</span></h5><p data-dcnode-id="8607" id="p0230"><span data-dcnode-id="8617" instrument_node="">The Astrophysics and Planetary decadal prioritisation and NASA’s projected resources for the 2012 budget were clearly in contrast with the ESA Cosmic Vision priorities and programmatic scenario. This situation has forced ESA to face the fact that none of the three mission concepts, IXO, LISA and EJSM, could have been feasible in an ESA–NASA common scenario. As an immediate consequence, ESA has ended plans to implement the three L-Class Missions as partnerships at the level proposed in the </span><em data-dcnode-id="8615"><span data-dcnode-id="8616" instrument_node="">New Worlds</span></em><span data-dcnode-id="8614" instrument_node="">, </span><em data-dcnode-id="8612"><span data-dcnode-id="8613" instrument_node="">New Horizons</span></em><span data-dcnode-id="8611" instrument_node=""> Decadal Survey and </span><em data-dcnode-id="8609"><span data-dcnode-id="8610" instrument_node="">Visions and Voyages for Planetary Science</span></em><span data-dcnode-id="8608" instrument_node="">. At the same time ESA has started a rapid rescoping/definition phase with nomination of new Science Teams (ST) for each Mission. The main objectives of those teams, to be completed by the end of 2011, are the re-definition and identification of the key science goals and consequent redefinition of the high level scientific requirements, and identification of re-scoped mission concepts that could be implemented as ESA led missions. It is intended that the selected mission be implemented on a schedule compatible with the original Cosmic Vision timeframe, with a launch in the 2022–2023 timeframe. The total ESA cost envelope (not including national participation in the science payload) is to be &lt;1BEuro, with possible additional contributions from other agencies. A future minor role for NASA in the new ESA-led X-ray mission, in particular, contributions at the instrument level, has not been ruled out, while participation of scientists from the US and Japan is planned. The final down selection is planned in May 2012.</span></p><p data-dcnode-id="8280" id="p0235"><em data-dcnode-id="8605"><span data-dcnode-id="8606" instrument_node="">Working group assessment and recommendations</span></em><span data-dcnode-id="8604" instrument_node="">: LISA and IXO are large scale observatories, both of which are vital to ensure a breakthrough in knowledge of the Universe. It is important that if a similar mission is selected by ESA for implementation in Cosmic Vision, it should have scientific objectives that are compatible with the ambitions of the scientific community. If not selected, the international community should pursue a new route to implementation. An international X-ray mission should be planned, focused on First Stars, black hole physics and cosmic chemical evolution of the Universe. Likewise, a low-frequency gravitational wave observatory such as LISA will be essential to realise the promise of this new area of science.</span><span class="display" data-dcnode-id="8281"><span class="formula" data-dcnode-id="8282" id="e0005"><span class="math" data-dcnode-id="8283"><span class="MathJax_Preview" data-dcnode-id="8603" style=""></span><span class="MathJax_SVG" data-dcnode-id="8286" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mstyle frame=&quot;solid&quot; is=&quot;true&quot;><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>The</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>WG</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>expresses</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>a</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>strong</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>concern</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>about</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>the</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>feasibility</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>of</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>developing</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>large</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>space</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>observatories</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>by</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>a</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>single</mi><mspace width=&quot;0.35em&quot; is=&quot;true&quot; /><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>Agency</mi><mo is=&quot;true&quot;>/</mo><mi mathvariant=&quot;italic&quot; is=&quot;true&quot;>country</mi><mo is=&quot;true&quot;>.</mo></mstyle></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="8349" focusable="false" height="8.966ex" role="img" style="vertical-align: -7.121ex;" viewBox="0 -794.4 26304.8 3860.5" width="61.095ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="8350" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="8596" is="true"><use data-dcnode-id="8601" href="#MJMATHI-54"><path d="M40 437Q21 437 21 445Q21 450 37 501T71 602L88 651Q93 669 101 677H569H659Q691 677 697 676T704 667Q704 661 687 553T668 444Q668 437 649 437Q640 437 637 437T631 442L629 445Q629 451 635 490T641 551Q641 586 628 604T573 629Q568 630 515 631Q469 631 457 630T439 622Q438 621 368 343T298 60Q298 48 386 46Q418 46 427 45T436 36Q436 31 433 22Q429 4 424 1L422 0Q419 0 415 0Q410 0 363 1T228 2Q99 2 64 0H49Q43 6 43 9T45 27Q49 40 55 46H83H94Q174 46 189 55Q190 56 191 56Q196 59 201 76T241 233Q258 301 269 344Q339 619 339 625Q339 630 310 630H279Q212 630 191 624Q146 614 121 583T67 467Q60 445 57 441T43 437H40Z" data-dcnode-id="8602" id="MJMATHI-54" stroke-width="1"></path></use><use data-dcnode-id="8599" href="#MJMATHI-68" x="584" y="0"><path d="M137 683Q138 683 209 688T282 694Q294 694 294 685Q294 674 258 534Q220 386 220 383Q220 381 227 388Q288 442 357 442Q411 442 444 415T478 336Q478 285 440 178T402 50Q403 36 407 31T422 26Q450 26 474 56T513 138Q516 149 ction data-dcnode-id="8105" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8271"><span data-dcnode-id="8276" instrument_node="">3.5</span><span data-dcnode-id="8274" instrument_node="">. </span><span data-dcnode-id="8272" instrument_node="">The 2020–2030 Decade Road Map</span></h3><div data-dcnode-id="8246"><p data-dcnode-id="8266" id="p0240"><span data-dcnode-id="8270" instrument_node="">In the post-2020 era, without corrective actions, the best case scenario may become as shown in </span><a class="workspace-trigger" data-dcnode-id="8268" href="#f0020" name="bf0020"><span data-dcnode-id="8269" instrument_node="">Fig. 4</span></a><span data-dcnode-id="8267" instrument_node="">, with JWST the only new mission launched in the present decade and many current missions ceasing operation before 2020. As this Figure illustrates, there would be little synergy between ground and space observatories, and the international community will have lost parts of the electromagnetic spectrum. In the area of high energy astrophysics, the only foreseen Observatory class mission is IXO/Athena. This ESA led-NASA-JAXA mission is now in competition with LISA and EJSM for the ESA 2012 L-Class down selection process. The final selection to fly is expected by middle 2012.</span></p><figure class="figure text-xs" data-dcnode-id="8247" id="f0020"><span data-dcnode-id="8256"><img alt="" data-dcnode-id="8265" height="548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr4.jpg&amp;raw"><span data-dcnode-id="8264" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8257"><li data-dcnode-id="8258"><a class="anchor download-link u-font-sans" data-dcnode-id="8259" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8260"><span data-dcnode-id="8263" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8261"><span data-dcnode-id="8262" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8248"><span data-dcnode-id="8249"><p data-dcnode-id="8250" id="sp030"><span class="label" data-dcnode-id="8254"><span data-dcnode-id="8255" instrument_node="">Fig. 4</span></span><span data-dcnode-id="8253" instrument_node="">. </span><span data-dcnode-id="8251" instrument_node="">In the post 2020 scenario only JWST is actually planned and approved. In the high energy astrophysics domain the only foreseen Observatory Class Mission is IXO/Athena. This ESA lead-NASA-JAXA mission is now under final selection process.</span></p></span></span></figure></div><section data-dcnode-id="8198" id="s0095"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8240"><span data-dcnode-id="8245" instrument_node="">3.5.1</span><span data-dcnode-id="8243" instrument_node="">. </span><span data-dcnode-id="8241" instrument_node="">Proposed longer term large missions (to fly within ∼two decades)</span></h4><p data-dcnode-id="8199" id="p0245"><span data-dcnode-id="8239" instrument_node="">In addition to the major mission candidates discussed above, numerous additional ideas have been advanced in countries around the world. We list here examples to illustrate the rich potential of space astronomy in the future.</span></p><dl class="list" data-dcnode-id="8200"><dt class="list-label" data-dcnode-id="8237"><span data-dcnode-id="8238" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8231"><p data-dcnode-id="8232" id="p1105"><span data-dcnode-id="8236" instrument_node="">Next generation </span><em data-dcnode-id="8234"><span data-dcnode-id="8235" instrument_node="">γ</span></em><span data-dcnode-id="8233" instrument_node=""> ray Observatory.</span></p></dd><dt class="list-label" data-dcnode-id="8229"><span data-dcnode-id="8230" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8226"><p data-dcnode-id="8227" id="p1110"><span data-dcnode-id="8228" instrument_node="">Large specialised exoplanet characterisation mission (e.g., a version of TPF, Terrestrial Planet Finder).</span></p></dd><dt class="list-label" data-dcnode-id="8224"><span data-dcnode-id="8225" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8221"><p data-dcnode-id="8222" id="p1115"><span data-dcnode-id="8223" instrument_node="">Next generation UV-Optical-IR-optical telescope, such as ATLAST (Advanced Technology Large Aperture Space Telescope, studied in the US).</span></p></dd><dt class="list-label" data-dcnode-id="8219"><span data-dcnode-id="8220" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8216"><p data-dcnode-id="8217" id="p1120"><span data-dcnode-id="8218" instrument_node="">Large-aperture far-infrared (FIR) telescope (recommended by US Decadal Survey in 2000) and a future priority of the FIR/submillimetre community).</span></p></dd><dt class="list-label" data-dcnode-id="8214"><span data-dcnode-id="8215" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8211"><p data-dcnode-id="8212" id="p1125"><span data-dcnode-id="8213" instrument_node="">Far Infrared Interferometer (high angular resolution imaging and spectroscopy) studied in US and Europe, and a future priority of the FIR community.</span></p></dd><dt class="list-label" data-dcnode-id="8209"><span data-dcnode-id="8210" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8206"><p data-dcnode-id="8207" id="p1130"><span data-dcnode-id="8208" instrument_node="">Space Submillimetre array.</span></p></dd><dt class="list-label" data-dcnode-id="8204"><span data-dcnode-id="8205" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8201"><p data-dcnode-id="8202" id="p1135"><span data-dcnode-id="8203" instrument_node="">Post-Planck CMB polarisation mission (exploration of the physics of inflation).</span></p></dd></dl><p></p></section><section data-dcnode-id="8106" id="s0100"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8192"><span data-dcnode-id="8197" instrument_node="">3.5.2</span><span data-dcnode-id="8195" instrument_node="">. </span><span data-dcnode-id="8193" instrument_node="">Medium sized missions proposed to NASA, ESA, JAXA, Roscosmos and other Agencies</span></h4><p data-dcnode-id="8109" id="p0250"></p><dl class="list" data-dcnode-id="8110"><dt class="list-label" data-dcnode-id="8190"><span data-dcnode-id="8191" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8184"><p data-dcnode-id="8185" id="p1140"><span data-dcnode-id="8189" instrument_node="">GRB First Stars Finder: rapid response, 1-m IR telescope, wide-field X-ray instrument to detect high </span><em data-dcnode-id="8187"><span data-dcnode-id="8188" instrument_node="">z γ</span></em><span data-dcnode-id="8186" instrument_node="">-ray bursts (GRB).</span></p></dd><dt class="list-label" data-dcnode-id="8182"><span data-dcnode-id="8183" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8176"><p data-dcnode-id="8177" id="p1145"><span data-dcnode-id="8181" instrument_node="">Hard X-ray/soft </span><em data-dcnode-id="8179"><span data-dcnode-id="8180" instrument_node="">γ</span></em><span data-dcnode-id="8178" instrument_node="">-ray focusing or modulation telescope.</span></p></dd><dt class="list-label" data-dcnode-id="8174"><span data-dcnode-id="8175" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8171"><p data-dcnode-id="8172" id="p1150"><span data-dcnode-id="8173" instrument_node="">HXMT – Hard X-ray Modulation Telescope (approved by CNSA and CAS for launch in 2014–2015): China, Italy, others.</span></p></dd><dt class="list-label" data-dcnode-id="8169"><span data-dcnode-id="8170" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8166"><p data-dcnode-id="8167" id="p1155"><span data-dcnode-id="8168" instrument_node="">LOFT – X-ray timing large area (ESA M3 candidate; possible selection by end 2012).</span></p></dd><dt class="list-label" data-dcnode-id="8164"><span data-dcnode-id="8165" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8161"><p data-dcnode-id="8162" id="p1160"><span data-dcnode-id="8163" instrument_node="">SVOM – GRB detection and study (launch 2014–2015): China–France collaboration.</span></p></dd><dt class="list-label" data-dcnode-id="8159"><span data-dcnode-id="8160" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8156"><p data-dcnode-id="8157" id="p1165"><span data-dcnode-id="8158" instrument_node="">Timing and X-ray Timing and Polarisation – India, China, Russia.</span></p></dd><dt class="list-label" data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8151"><p data-dcnode-id="8152" id="p1170"><span data-dcnode-id="8153" instrument_node="">Cosmic-ray and dark matter origin: China, Japan, etc.; possible joint mission.</span></p></dd><dt class="list-label" data-dcnode-id="8149"><span data-dcnode-id="8150" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8146"><p data-dcnode-id="8147" id="p1175"><span data-dcnode-id="8148" instrument_node="">PLATO (ESA M2 candidate).</span></p></dd><dt class="list-label" data-dcnode-id="8144"><span data-dcnode-id="8145" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8141"><p data-dcnode-id="8142" id="p1180"><span data-dcnode-id="8143" instrument_node="">EChO (ESA M3 candidate) – exoplanet.</span></p></dd><dt class="list-label" data-dcnode-id="8139"><span data-dcnode-id="8140" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8136"><p data-dcnode-id="8137" id="p1185"><span data-dcnode-id="8138" instrument_node="">MARCO POLO (ESA M3 candidate) – exoplanet.</span></p></dd><dt class="list-label" data-dcnode-id="8134"><span data-dcnode-id="8135" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8131"><p data-dcnode-id="8132" id="p1190"><span data-dcnode-id="8133" instrument_node="">STE-QUEST (ESA M3 candidate) – equivalence principle.</span></p></dd><dt class="list-label" data-dcnode-id="8129"><span data-dcnode-id="8130" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8126"><p data-dcnode-id="8127" id="p1195"><span data-dcnode-id="8128" instrument_node="">Post-Planck CMB polarisation mission (exploration of the physics of inflation); concepts under development in USA, Europe, Japan.</span></p></dd><dt class="list-label" data-dcnode-id="8124"><span data-dcnode-id="8125" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8121"><p data-dcnode-id="8122" id="p1200"><span data-dcnode-id="8123" instrument_node="">SPICA: far infrared observatory (Japan, ESA, Canada, USA) – to be considered medium-large; launch 2018.</span></p></dd><dt class="list-label" data-dcnode-id="8119"><span data-dcnode-id="8120" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8116"><p data-dcnode-id="8117" id="p1205"><span data-dcnode-id="8118" instrument_node="">Millimetron – VLBI and submillimetre single dish observatory; Russia, Italy, etc.</span></p></dd><dt class="list-label" data-dcnode-id="8114"><span data-dcnode-id="8115" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8111"><p data-dcnode-id="8112" id="p1210"><span data-dcnode-id="8113" instrument_node="">Radioastron – VLBI; Russia with international participation.</span></p></dd></dl><p></p><p data-dcnode-id="8107"><span data-dcnode-id="8108" instrument_node="">In addition to the aforementioned missions, there are a number of small missions planned at national and multinational levels.</span></p></section></section><section data-dcnode-id="8026" id="s0105"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8099"><span data-dcnode-id="8104" instrument_node="">3.6</span><span data-dcnode-id="8102" instrument_node="">. </span><span data-dcnode-id="8100" instrument_node="">The COSPAR Working Group on Future of Space Astronomy Basic Recommendations</span></h3><p data-dcnode-id="8027" id="p0260"></p><dl class="list" data-dcnode-id="8028"><dt class="list-label" data-dcnode-id="8097"><span data-dcnode-id="8098" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8052"><p data-dcnode-id="8053" id="p1215"><span data-dcnode-id="8096" instrument_node="">Launch JWST as early as possible in the present decade. JWST is recognised to be the only approved large space observatory to be possibly operational in the next 10–20</span><span data-dcnode-id="8095" instrument_node="">&nbsp;</span><span data-dcnode-id="8094" instrument_node="">years. It is an essential asset for space science investigations complementing “ground based” facilities planned (e.g. LOFAR,</span><a class="workspace-trigger" data-dcnode-id="8091" href="#fn28" name="bfn28"><sup data-dcnode-id="8092"><span data-dcnode-id="8093" instrument_node="">28</span></sup></a><span data-dcnode-id="8090" instrument_node=""> ALMA,</span><a class="workspace-trigger" data-dcnode-id="8087" href="#fn29" name="bfn29"><sup data-dcnode-id="8088"><span data-dcnode-id="8089" instrument_node="">29</span></sup></a><span data-dcnode-id="8086" instrument_node=""> SKA,</span><a class="workspace-trigger" data-dcnode-id="8083" href="#fn30" name="bfn30"><sup data-dcnode-id="8084"><span data-dcnode-id="8085" instrument_node="">30</span></sup></a><span data-dcnode-id="8082" instrument_node=""> ELT,</span><a class="workspace-trigger" data-dcnode-id="8079" href="#fn31" name="bfn31"><sup data-dcnode-id="8080"><span data-dcnode-id="8081" instrument_node="">31</span></sup></a><span data-dcnode-id="8078" instrument_node=""> Gemini,</span><a class="workspace-trigger" data-dcnode-id="8075" href="#fn32" name="bfn32"><sup data-dcnode-id="8076"><span data-dcnode-id="8077" instrument_node="">32</span></sup></a><span data-dcnode-id="8074" instrument_node=""> LSST,</span><a class="workspace-trigger" data-dcnode-id="8071" href="#fn33" name="bfn33"><sup data-dcnode-id="8072"><span data-dcnode-id="8073" instrument_node="">33</span></sup></a><span data-dcnode-id="8070" instrument_node=""> TMT,</span><a class="workspace-trigger" data-dcnode-id="8067" href="#fn34" name="bfn34"><sup data-dcnode-id="8068"><span data-dcnode-id="8069" instrument_node="">34</span></sup></a><span data-dcnode-id="8066" instrument_node=""> CTA,</span><a class="workspace-trigger" data-dcnode-id="8063" href="#fn35" name="bfn35"><sup data-dcnode-id="8064"><span data-dcnode-id="8065" instrument_node="">35</span></sup></a><span data-dcnode-id="8062" instrument_node=""> HAWC,</span><a class="workspace-trigger" data-dcnode-id="8059" href="#fn36" name="bfn36"><sup data-dcnode-id="8060"><span data-dcnode-id="8061" instrument_node="">36</span></sup></a><span data-dcnode-id="8058" instrument_node=""> Pierre Auger,</span><a class="workspace-trigger" data-dcnode-id="8055" href="#fn37" name="bfn37"><sup data-dcnode-id="8056"><span data-dcnode-id="8057" instrument_node="">37</span></sup></a><span data-dcnode-id="8054" instrument_node=""> etc.).</span></p></dd><dt class="list-label" data-dcnode-id="8050"><span data-dcnode-id="8051" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8044"><p data-dcnode-id="8045" id="p1220"><span data-dcnode-id="8049" instrument_node="">Vigorously pursue a large X-ray space observatory, operative in the next decade. The proposed IXO satellite, or a similar large high energy observatory, should be able to exploit a broad scientific scenario, possibly including investigation of the ’first stars’ via a high-</span><em data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">z γ</span></em><span data-dcnode-id="8046" instrument_node="">-ray burst detection capability.</span></p></dd><dt class="list-label" data-dcnode-id="8042"><span data-dcnode-id="8043" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8039"><p data-dcnode-id="8040" id="p1225"><span data-dcnode-id="8041" instrument_node="">At the same time we recommend that the agencies involved support, exploit and finalise the R&amp;D programmes necessary to have in operation the gravitational wave mission LISA at the latest in the time-frame 2025–2030.</span></p></dd><dt class="list-label" data-dcnode-id="8037"><span data-dcnode-id="8038" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8034"><p data-dcnode-id="8035" id="p1230"><span data-dcnode-id="8036" instrument_node="">Develop and launch a dark energy/exoplanet mission such as Euclid/WFIRST, preferably involving multinational participation.</span></p></dd><dt class="list-label" data-dcnode-id="8032"><span data-dcnode-id="8033" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8029"><p data-dcnode-id="8030" id="p1235"><span data-dcnode-id="8031" instrument_node="">Pursue a robust co-operative programme devoted to solving specific burning scientific questions via the implementation of multilateral medium size/small size dedicated missions.</span></p></dd></dl><p></p></section><section data-dcnode-id="7988" id="s0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8020"><span data-dcnode-id="8025" instrument_node="">3.7</span><span data-dcnode-id="8023" instrument_node="">. </span><span data-dcnode-id="8021" instrument_node="">WG conclusions</span></h3><p data-dcnode-id="7989" id="p0265"><span data-dcnode-id="8019" instrument_node="">The scenario recommended above is the minimum necessary programme to successfully:</span></p><dl class="list" data-dcnode-id="7990"><dt class="list-label" data-dcnode-id="8017"><span data-dcnode-id="8018" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8014"><p data-dcnode-id="8015" id="p1240"><span data-dcnode-id="8016" instrument_node="">Maintain the rate of fundamental discoveries in science, with particular emphasis in astrophysics. The capability to achieve outstanding breakthroughs in scientific knowledge has been a key characteristic of the field.</span></p></dd><dt class="list-label" data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8001"><p data-dcnode-id="8002" id="p1245"><span data-dcnode-id="8011" instrument_node="">Observe formation of the ‘first stars’ and, in turn, advance our knowledge of evolution of the universe at </span><em data-dcnode-id="8009"><span data-dcnode-id="8010" instrument_node="">z</span></em><span data-dcnode-id="8008" instrument_node="">&nbsp;</span><span data-dcnode-id="8007" instrument_node="">⩾</span><span data-dcnode-id="8006" instrument_node="">&nbsp;</span><span data-dcnode-id="8005" instrument_node="">10, filling the gap between the Big Bang and the re-ionisation era. Preserve and advance the knowledge and skills of the large scientific and technical space astrophysics community that was borne and has matured in the first 50</span><span data-dcnode-id="8004" instrument_node="">&nbsp;</span><span data-dcnode-id="8003" instrument_node="">years of the Space Age.</span></p></dd><dt class="list-label" data-dcnode-id="7999"><span data-dcnode-id="8000" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7996"><p data-dcnode-id="7997" id="p1250"><span data-dcnode-id="7998" instrument_node="">Maintain observational access to the Universe across the electromagnetic spectrum and open up the new window of gravitational wave astronomy. This is a fundamental scientific requirement to complement large “ground based” telescopes and facilities in the observational windows hampered from the ground by atmospheric absorption and emission. This will also preserve the invaluable Space-Ground synergy achieved so far.</span></p></dd><dt class="list-label" data-dcnode-id="7994"><span data-dcnode-id="7995" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7991"><p data-dcnode-id="7992" id="p1255"><span data-dcnode-id="7993" instrument_node="">Preserve and expand the knowledge and skills of the scientific and technical space community that has contributed so much to the technical and cultural life in the developed world during recent decades. This community has now spread worldwide and is fertilising the scientific environment and the intellectual life of newly developed countries.</span></p></dd></dl><p></p></section></section><section data-dcnode-id="5313" id="s0115"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7981"><span data-dcnode-id="7986" instrument_node="">4</span><span data-dcnode-id="7984" instrument_node="">. </span><span data-dcnode-id="7982" instrument_node="">The Present Scenario</span></h2><section data-dcnode-id="7931" id="s0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7975"><span data-dcnode-id="7980" instrument_node="">4.1</span><span data-dcnode-id="7978" instrument_node="">. </span><span data-dcnode-id="7976" instrument_node="">The ASTRONET report: A Science Vision for (European) Astronomy</span></h3><p data-dcnode-id="7945" id="p0270"><span data-dcnode-id="7974" instrument_node="">This paragraph is a summary of the Astronet report published in 2007 (</span><a class="workspace-trigger" data-dcnode-id="7972" href="#b0240" name="bb0240"><span data-dcnode-id="7973" instrument_node="">AST, 2007</span></a><span data-dcnode-id="7971" instrument_node="">), which presents a vision shared by the WG. The excerpt below in italics is simply reported here as a reminder of the “basic facts” that the WG endorses. The short following paragraph is also a good summary of the WG vision for “ground based” observatory status and future plans. Astronomy is the study of everything beyond Earth. It is a science driven by observations, with links to mathematics, physics, chemistry, computer science, geophysics, material science and biology. Astronomy is important for society and culture, and helps attract young people to the physical sciences. The field benefits from and also drives advances in technology. As a result, it is now possible to study objects which are so far away that they are seen at a time when the Universe was only 5% of its present age, and – perhaps even more astoundingly – to detect and characterise planets orbiting other stars, and to search for evidence of life. European astronomers have access to a range of observational facilities on the ground and in space. Plans are being made for a next generation of facilities, which would continue to exploit the rapid advances in, e.g., adaptive optics, detector sensitivity, computing capabilities, and in the ability to construct large precision structures, sending probes to Solar System objects, and even bring back samples from some of them. Realizing all the plans and dreams would require substantial investments by national and international funding agencies, with significant long-term commitments for operations. The Astronet Science Vision Working Group identified four key questions where significant advances and breakthroughs can be expected in the coming two decades:</span></p><dl class="list" data-dcnode-id="7946"><dt class="list-label" data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7965"><p data-dcnode-id="7966" id="p1260"><em data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">Do we understand the extremes of the Universe?</span></em></p></dd><dt class="list-label" data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7959"><p data-dcnode-id="7960" id="p1265"><em data-dcnode-id="7961"><span data-dcnode-id="7962" instrument_node="">How do galaxies form and evolve?</span></em></p></dd><dt class="list-label" data-dcnode-id="7957"><span data-dcnode-id="7958" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7953"><p data-dcnode-id="7954" id="p1270"><em data-dcnode-id="7955"><span data-dcnode-id="7956" instrument_node="">What is the origin and evolution of stars and planets?</span></em></p></dd><dt class="list-label" data-dcnode-id="7951"><span data-dcnode-id="7952" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7947"><p data-dcnode-id="7948" id="p1275"><em data-dcnode-id="7949"><span data-dcnode-id="7950" instrument_node="">How do we (and the Solar System) fit in?</span></em></p></dd></dl><p></p><p data-dcnode-id="7942"><em data-dcnode-id="7943"><span data-dcnode-id="7944" instrument_node="">These are amongst the most fundamental questions in science and generate considerable interest in the general public.</span></em></p><p data-dcnode-id="7934" id="p0275"><span data-dcnode-id="7941" instrument_node="">In addition to the Astronet Report, the COSPAR Working Group has analyzed the information already existing in national strategic plans, ESA’s Cosmic Vision, the US National Academay of Science Decadal Survey, ESA–ESO studies, etc. …</span><em data-dcnode-id="7939"><span data-dcnode-id="7940" instrument_node="">the Astronet work led to specific scientific recommendations, which were incorporated in a draft version of the Science Vision, made available to the entire astronomical community in late 2006. The draft was discussed in-depth during a Symposium in Poitiers, Paris, January 23–25, 2007. Many of the 228 participants from 31 countries provided constructive input, and additional comments were received via a dedicated website. This led to further sharpening of the scientific requirements, an improved balance across the four main areas, and improvements in the text… Care was taken to describe these in a fairly generic way, focusing on the scientific requirements, and not to identify too closely with specific proposed implementations of missions or facilities, as this is the purview of the infrastructure roadmapping activity that will follow. … summarises the main recommendations by thematic area, and distinguishes essential facilities or experiments, without which a certain scientific goal simply cannot be achieved, and complementary ones, which would go a long way towards answering the question, but may have their main scientific driver elsewhere… Activities needed across the four thematic areas are identified as well. In all cases, the focus is on the most promising avenues for scientific progress, without detailed consideration of cost or technological readiness, which are the subject of the infrastructure roadmapping. Some of the more ambitious facilities may take a significant time to develop, and in some case may only start to produce a scientific harvest towards the end of the 20</span></em><span data-dcnode-id="7938" instrument_node="">&nbsp;</span><em data-dcnode-id="7936"><span data-dcnode-id="7937" instrument_node="">year horizon. Progress relies on a healthy mix of approaches including imaging, spectroscopy and time-series analysis across the entire electromagnetic spectrum, in situ measurements in the Solar System, and use of particles and gravitational waves as additional messengers from celestial objects</span></em><span data-dcnode-id="7935" instrument_node="">.</span></p><p data-dcnode-id="7932" id="p0280"><span data-dcnode-id="7933" instrument_node="">Most of the above concepts were shared by the COSPAR WG members and a similar approach was taken as a starting point to elaborate the WG vision.</span></p></section><section data-dcnode-id="7854" id="s0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7925"><span data-dcnode-id="7930" instrument_node="">4.2</span><span data-dcnode-id="7928" instrument_node="">. </span><span data-dcnode-id="7926" instrument_node="">Spectral Coverage of Currently Operating Space Astrophysics Missions</span></h3><p data-dcnode-id="7920" id="p0290"><span data-dcnode-id="7924" instrument_node="">To clarify the full electromagnetic spectral coverage of the currently operating space astronomy and astrophysics missions and the more limited coverage of those approved and under development (</span><a class="workspace-trigger" data-dcnode-id="7922" href="#f0015" name="bf0015"><span data-dcnode-id="7923" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7921" instrument_node="">), we begin with a short description organised by spectral range. In the following section we provide more detail about each of the missions and the scientific contributions of the operating missions.</span></p><section data-dcnode-id="7882" id="s0130"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7911"><span data-dcnode-id="7919" instrument_node="">4.2.1</span><span data-dcnode-id="7917" instrument_node="">. </span><span data-dcnode-id="7915" instrument_node="">X-rays and </span><em data-dcnode-id="7913"><span data-dcnode-id="7914" instrument_node="">γ</span></em><span data-dcnode-id="7912" instrument_node="">-rays</span></h4><p data-dcnode-id="7883" id="p0295"><span data-dcnode-id="7910" instrument_node="">The NASA Rossi-XTE mission, providing high resolution timing studies of X-ray sources over the 1–200</span><span data-dcnode-id="7908" instrument_node="">&nbsp;</span><span data-dcnode-id="7906" instrument_node="">keV range, continues to operate successfully producing key findings on variable, pulsed and quasi-periodic sources. The world-wide </span><em data-dcnode-id="7904"><span data-dcnode-id="7905" instrument_node="">γ</span></em><span data-dcnode-id="7903" instrument_node="">-ray burst and transient monitoring capability is in excellent shape with the continued operation of the Swift mission. Bursts have been detected from the early universe at redshifts in the range of the most distant objects known. NASA’s Chandra observatory and ESA’s X-ray Multi-mirror Mission (XMM-Newton) have been operating successfully in space since 1999. With their complementary emphases on high angular resolution (Chandra) and high throughput spectroscopy (XMM-Newton), these observatory missions continue to generate major advances in astrophysics. The two missions have been particularly effective in studying distant galaxies, including the massive black holes at their centres, galactic mergers, and the billion-degree gas that permeates the intergalactic medium in clusters of galaxies. Japan’s Suzaku X-ray mission was launched in 2005. It has X-ray and hard X-ray telescopes that are producing high-quality broad-band observations of accreting and jetting sources. Japan’s MAXI experiment was installed on the International Space Station (ISS) in 2009 and is successfully performing full-sky monitoring of the X-ray sky. At the relatively low </span><em data-dcnode-id="7901"><span data-dcnode-id="7902" instrument_node="">γ</span></em><span data-dcnode-id="7900" instrument_node="">-ray energies associated with nuclear spectral lines, ESA’s International </span><em data-dcnode-id="7898"><span data-dcnode-id="7899" instrument_node="">γ</span></em><span data-dcnode-id="7897" instrument_node=""> Ray Astrophysics Laboratory observatory (INTEGRAL), launched in 2002, is now supplying the world </span><em data-dcnode-id="7895"><span data-dcnode-id="7896" instrument_node="">γ</span></em><span data-dcnode-id="7894" instrument_node="">-ray astronomy community with an important imaging, spectroscopic and polarimetric capability, complemented by X-ray and optical monitoring. INTEGRAL has provided the most accurate images of the Universe at high energy. It will also provide a legacy of almost 10</span><span data-dcnode-id="7892" instrument_node="">&nbsp;</span><span data-dcnode-id="7890" instrument_node="">years of continuous observation of the Galactic Center, and the discovery of the new class of high energy Super giant Fast X-ray Transients (SFXT). to observe higher energies that facilitate investigation of the highest energy processes in the universe, Italy’s AGILE (Astro-rivelatore </span><em data-dcnode-id="7888"><span data-dcnode-id="7889" instrument_node="">γ</span></em><span data-dcnode-id="7887" instrument_node=""> a Immagini Leggero) was launched in 2007 and the major Fermi </span><em data-dcnode-id="7885"><span data-dcnode-id="7886" instrument_node="">γ</span></em><span data-dcnode-id="7884" instrument_node="">-ray Space Telescope developed by NASA &amp; the Department of Energy in the US plus universities and agencies in France, Germany, Italy, Japan and Sweden was launched in 2008. These missions are producing discoveries every month. The future outlook includes the launch in 2012 of the Nuclear Spectroscopic Telescope Array (NuSTAR) that is a NASA Small Explorer mission (SMEX), a high energy mission with two small focusing hard X-ray telescopes. The Indian ASTROSAT mission, an X-ray and multiwavelength satellite is also scheduled for launch in 2012. ASTRO-H is a joint JAXA/NASA mission to perform high-resolution spectroscopy of X-ray sources that is in development for launch in 2014. During 2010, the Gravity and Extreme Magnetism SMEX (GEMS) was selected in the NASA Explorer programme for X-ray polarisation measurements and is in development for launch in 2014. Spectrum RG is an RKA X-ray observatory with Russian and German X-ray instruments for launch in 2014.</span></p></section><section data-dcnode-id="7873" id="s0135"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7876"><span data-dcnode-id="7881" instrument_node="">4.2.2</span><span data-dcnode-id="7879" instrument_node="">. </span><span data-dcnode-id="7877" instrument_node="">UV/Extreme UV and Visible</span></h4><p data-dcnode-id="7874" id="p0300"><span data-dcnode-id="7875" instrument_node="">The Hubble Space Telescope (HST) continues to operate successfully producing spectacular images and spectra. In 2009, the fourth servicing mission replaced key spacecraft sub-systems. In addition, two new instruments were installed, Wide-Field Camera 3 (WFC3) and the Cosmic Origins Spectrograph (COS), and two instruments were repaired, the Space Telescope Imaging Spectrograph (STIS) and the Advanced Camera for Surveys (ACS). NASA’s GALEX (Galaxy Evolution Explorer), has conducted the first deep all-sky survey in the ultraviolet, and has detected more than one million hot stars and galactic cores since launch in 2003.</span></p></section><section data-dcnode-id="7864" id="s0140"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7867"><span data-dcnode-id="7872" instrument_node="">4.2.3</span><span data-dcnode-id="7870" instrument_node="">. </span><span data-dcnode-id="7868" instrument_node="">Infrared and Submillimetre</span></h4><p data-dcnode-id="7865" id="p0305"><span data-dcnode-id="7866" instrument_node="">NASA’s Spitzer Space Telescope, launched in 2003, has detected tens of millions of infrared point sources and probed the dust and gas in star-forming regions in the Milky Way and in other galaxies extending to the early Universe. Its extensive legacy programmes are devoted to specific large-scale surveys. With the exhaustion of its stored cryogen in 2009, it is continuing exciting studies including exoplanets and the high-redshift universe with the two shortest-wavelength channels of its Infrared Array Camera. ESA’s Herschel is a major mission launched (with Planck) in 2009. It is a far-infrared to submillimetre telescope. Herschel is providing astronomers with an unprecedentedly high spatial and spectral resolution view of the cold Universe, observing tiny stars, molecular clouds and galaxies enshrouded in dust. In 2009, NASA launched the WISE SMEX mission. In its operational lifetime it performed an all-sky IR survey in the 3–25 micron range. The James Webb Space Telescope (JWST) is a large, infrared-optimised space telescope, scheduled for launch not early than 2018. It is a joint project of NASA, ESA, and the Canadian Space Agency (CSA).</span></p></section><section data-dcnode-id="7855" id="s0145"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7858"><span data-dcnode-id="7863" instrument_node="">4.2.4</span><span data-dcnode-id="7861" instrument_node="">. </span><span data-dcnode-id="7859" instrument_node="">Submillimetre</span></h4><p data-dcnode-id="7856" id="p0310"><span data-dcnode-id="7857" instrument_node="">NASA’s Wilkinson Microwave Anisotropy Probe (WMAP) Explorer mission, launched in 2001, has reported the spectacular results of its all-sky survey of the cosmic microwave background radiation. While pinning down the age of the universe to approximately 1% accuracy, these results also offer powerful confirmation of all the measurable predictions of the ‘hot big bang with inflation’ history of the early universe. An added surprise of these first WMAP results is the apparent evidence for the appearance of the first stars earlier than was expected from the standard model of galaxy formation. The operations of WMAP were concluded in 2010. The ESA Planck mission is a precision cosmology satellite launched (with Herschel) in 2009 and is providing new insights clusters of galaxies and on the cold objects in the Universe, from within our Galaxy to the distant reaches of the cosmos. It follows on WMAP to make comprehensive observations of the cosmic microwave background radiation.</span></p></section></section><section data-dcnode-id="6079" id="s0150"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7848"><span data-dcnode-id="7853" instrument_node="">4.3</span><span data-dcnode-id="7851" instrument_node="">. </span><span data-dcnode-id="7849" instrument_node="">Missions in Operation: short description and basic scientific characteristics</span></h3><div data-dcnode-id="7646"><p data-dcnode-id="7840" id="p0315"><span data-dcnode-id="7847" instrument_node="">This section provides an expanded account of the missions actually in operation and highlights of their scientific contributions to date. </span><a class="workspace-trigger" data-dcnode-id="7845" href="#f0015" name="bf0015"><span data-dcnode-id="7846" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7844" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="7842" href="#t0005" name="bt0005"><span data-dcnode-id="7843" instrument_node="">Table 1</span></a><span data-dcnode-id="7841" instrument_node=""> show and list respectively the satellites and observatory class missions which are operating in space and have continuing data analysis efforts.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="7647" id="t0005"><span class="captions" data-dcnode-id="7831"><span data-dcnode-id="7832"><p data-dcnode-id="7833" id="sp230"><span class="label" data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">Table 1</span></span><span data-dcnode-id="7837" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="7835" href="#f0015" name="bf0015"><span data-dcnode-id="7836" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7834" instrument_node=""> details.</span></p></span></span><div class="groups" data-dcnode-id="7648"><table data-dcnode-id="7649"><thead data-dcnode-id="7825"><tr class="rowsep-1 valign-top" data-dcnode-id="7826"><th class="align-left" data-dcnode-id="7829" scope="col"><span data-dcnode-id="7830" instrument_node="">Mission</span></th><th class="align-left" data-dcnode-id="7827" scope="col"><span data-dcnode-id="7828" instrument_node="">Details: in operation</span></th></tr></thead><tbody data-dcnode-id="7650"><tr class="valign-top" data-dcnode-id="7816"><td class="align-left" data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">HST 1990</span></td><td class="align-left" data-dcnode-id="7817"><span data-dcnode-id="7822" instrument_node="">(NASA/ESA) Observatory mission: 2.4</span><span data-dcnode-id="7820" instrument_node="">&nbsp;</span><span data-dcnode-id="7818" instrument_node="">m telescope, imaging/spectroscopy of galactic and extragalactic sources</span></td></tr><tr class="valign-top" data-dcnode-id="7807"><td class="align-left" data-dcnode-id="7814"><span data-dcnode-id="7815" instrument_node="">Rossi XTE 1995</span></td><td class="align-left" data-dcnode-id="7808"><span data-dcnode-id="7813" instrument_node="">(NASA) Timing and broadband spectroscopy of compact X-ray sources (2–250</span><span data-dcnode-id="7811" instrument_node="">&nbsp;</span><span data-dcnode-id="7809" instrument_node="">keV)</span></td></tr><tr class="valign-top" data-dcnode-id="7802"><td class="align-left" data-dcnode-id="7805"><span data-dcnode-id="7806" instrument_node="">CHANDRA 1999</span></td><td class="align-left" data-dcnode-id="7803"><span data-dcnode-id="7804" instrument_node="">(NASA) X-ray Observatory mission. High resolution imaging and spectroscopy in the soft X-ray range</span></td></tr><tr class="valign-top" data-dcnode-id="7797"><td class="align-left" data-dcnode-id="7800"><span data-dcnode-id="7801" instrument_node="">XMM-Newton 1999</span></td><td class="align-left" data-dcnode-id="7798"><span data-dcnode-id="7799" instrument_node="">(ESA) Observatory mission. High throughput spectroscopy and imaging in the soft X-ray range</span></td></tr><tr class="valign-top" data-dcnode-id="7781"><td class="align-left" data-dcnode-id="7795"><span data-dcnode-id="7796" instrument_node="">INTEGRAL 2002</span></td><td class="align-left" data-dcnode-id="7782"><span data-dcnode-id="7794" instrument_node="">(ESA) high resolution Imaging and spectroscopy in the soft </span><em data-dcnode-id="7792"><span data-dcnode-id="7793" instrument_node="">γ</span></em><span data-dcnode-id="7791" instrument_node="">-ray range from 20</span><span data-dcnode-id="7789" instrument_node="">&nbsp;</span><span data-dcnode-id="7787" instrument_node="">keV to 10</span><span data-dcnode-id="7785" instrument_node="">&nbsp;</span><span data-dcnode-id="7783" instrument_node="">MeV</span></td></tr><tr class="valign-top" data-dcnode-id="7776"><td class="align-left" data-dcnode-id="7779"><span data-dcnode-id="7780" instrument_node="">GALEX 2003</span></td><td class="align-left" data-dcnode-id="7777"><span data-dcnode-id="7778" instrument_node="">(NASA) Galactic Evolution Explorer. UV all-sky survey mission</span></td></tr><tr class="valign-top" data-dcnode-id="7767"><td class="align-left" data-dcnode-id="7774"><span data-dcnode-id="7775" instrument_node="">Spitzer 2003</span></td><td class="align-left" data-dcnode-id="7768"><span data-dcnode-id="7773" instrument_node="">(NASA) Observatory Infrared Telescope Facility. IR telescope of 0.85</span><span data-dcnode-id="7771" instrument_node="">&nbsp;</span><span data-dcnode-id="7769" instrument_node="">m aperture</span></td></tr><tr class="valign-top" data-dcnode-id="7762"><td class="align-left" data-dcnode-id="7765"><span data-dcnode-id="7766" instrument_node="">Swift 2004</span></td><td class="align-left" data-dcnode-id="7763"><span data-dcnode-id="7764" instrument_node="">(NASA/UK/Italy) Medium Explorer. Γ-ray burst detection with X-ray and optical telescopes for rapid follow-up</span></td></tr><tr class="valign-top" data-dcnode-id="7757"><td class="align-left" data-dcnode-id="7760"><span data-dcnode-id="7761" instrument_node="">Suzaku 2005</span></td><td class="align-left" data-dcnode-id="7758"><span data-dcnode-id="7759" instrument_node="">(Japan/NASA) X-ray and hard X-ray telescopes</span></td></tr><tr class="valign-top" data-dcnode-id="7749"><td class="align-left" data-dcnode-id="7755"><span data-dcnode-id="7756" instrument_node="">AGILE 2007</span></td><td class="align-le ata-dcnode-id="7642" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7638"><p data-dcnode-id="7639" id="p1280"><span data-dcnode-id="7640" instrument_node="">Missions in operation with projected lifetime.</span></p></dd><dt class="list-label" data-dcnode-id="7636"><span data-dcnode-id="7637" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7633"><p data-dcnode-id="7634" id="p1285"><span data-dcnode-id="7635" instrument_node="">Missions under development.</span></p></dd></dl><p></p><p data-dcnode-id="7606"><a class="workspace-trigger" data-dcnode-id="7629" href="#t0005" name="bt0005"><span data-dcnode-id="7630" instrument_node="">Table 1</span></a><span data-dcnode-id="7628" instrument_node=""> includes:</span></p><dl class="list" data-dcnode-id="7607"><dt class="list-label" data-dcnode-id="7626"><span data-dcnode-id="7627" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7623"><p data-dcnode-id="7624" id="p1290"><span data-dcnode-id="7625" instrument_node="">The main responsible agency or nation.</span></p></dd><dt class="list-label" data-dcnode-id="7621"><span data-dcnode-id="7622" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7618"><p data-dcnode-id="7619" id="p1295"><span data-dcnode-id="7620" instrument_node="">Actual launch dates for already in flight satellites.</span></p></dd><dt class="list-label" data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7613"><p data-dcnode-id="7614" id="p1300"><span data-dcnode-id="7615" instrument_node="">Actual or scheduled launch dates for mission under development.</span></p></dd><dt class="list-label" data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7608"><p data-dcnode-id="7609" id="p1305"><span data-dcnode-id="7610" instrument_node="">A brief description of the main characteristics of the mission.</span></p></dd></dl><p></p><section data-dcnode-id="7531" id="s0155"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7602"><span data-dcnode-id="7605" instrument_node="">4.3.1</span><span data-dcnode-id="7604" instrument_node="">. </span><span data-dcnode-id="7603" instrument_node="">Hubble Space Telescope</span></h4><div data-dcnode-id="7573"><p data-dcnode-id="7592" id="p0330"><span data-dcnode-id="7601" instrument_node="">On 24 April 1990, the Space Shuttle Discovery lifted off from Earth with the Hubble Space Telescope nestled securely in its bay. The following day, Hubble was released into space, ready to peer into the vast unknown of space, offering mankind a glimpse upon distant, exotic cosmic shores yet to be described. In </span><a class="workspace-trigger" data-dcnode-id="7599" href="#f0025" name="bf0025"><span data-dcnode-id="7600" instrument_node="">Fig. 5</span></a><span data-dcnode-id="7598" instrument_node=""> HST is shown as viewed from the Space Shuttle Discovery during the Servicing Mission STS-82. NASA suggested that the lifetime of the Hubble telescope be 15</span><span data-dcnode-id="7597" instrument_node="">&nbsp;</span><span data-dcnode-id="7596" instrument_node="">years, which implied that the instruments needed the ability to be replaced on the ground or even serviced in orbit, an ability not afforded to any satellite before or since. Scientists also had to balance the size and quantity of scientific instruments versus their cost. The European Space Agency joined the project in 1975 and provided 15% of the funding of the HST via contribution of the Faint Object Camera and the solar arrays. In return, NASA guaranteed at least 15% of telescope time to European astronomers. In 1977, Congress approved funding to build HTS, one of the most sophisticated satellites ever constructed. Over the course of Hubble’s 20-year mission, new and improved instruments have been periodically installed in order to bring the most advanced instrument technologies to the observatory.</span><a class="workspace-trigger" data-dcnode-id="7593" href="#fn38" name="bfn38"><sup data-dcnode-id="7594"><span data-dcnode-id="7595" instrument_node="">38</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="7574" id="f0025"><span data-dcnode-id="7582"><img alt="" data-dcnode-id="7591" height="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr5.jpg&amp;raw"><span data-dcnode-id="7590" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7583"><li data-dcnode-id="7584"><a class="anchor download-link u-font-sans" data-dcnode-id="7585" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7586"><span data-dcnode-id="7589" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7587"><span data-dcnode-id="7588" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7575"><span data-dcnode-id="7576"><p data-dcnode-id="7577" id="sp035"><span class="label" data-dcnode-id="7580"><span data-dcnode-id="7581" instrument_node="">Fig. 5</span></span><span data-dcnode-id="7579" instrument_node="">. </span><span data-dcnode-id="7578" instrument_node="">The Hubble Space Telescope in space.</span></p></span></span></figure></div><p data-dcnode-id="7571" id="p0335"><span data-dcnode-id="7572" instrument_node="">HST currently has the most powerful suite of instruments in its history.</span></p><section data-dcnode-id="7532" id="s0160"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7567"><span data-dcnode-id="7570" instrument_node="">4.3.1.1</span><span data-dcnode-id="7569" instrument_node="">. </span><span data-dcnode-id="7568" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="7533"><p data-dcnode-id="7552" id="p0340"><span data-dcnode-id="7566" instrument_node="">The Hubble Space Telescope has arguably had a greater impact on astronomy and, as importantly, on worldwide appreciation of and support for astronomy, than any observatory since Galileos telescope. HST has produced many remarkable discoveries, some anticipated and some totally surprising, ranging from our solar system to galaxies as they appeared within a billion years after the Big Bang. As a few examples, Hubble images of solar system bodies from Venus to Kuiper-belt objects, including comets crashing into the atmosphere of Jupiter, star and planetary systems forming in our Galaxy, galaxies in collision and the host galaxies of gamma-ray burst sources grace text-books and class-room walls around the globe and advance our understanding of how we got here. Hubble spectral data showed us the atmospheric constituents of planets orbiting other stars, and showed us that there are supermassive black holes in the centers of most galaxies. Most surprisingly, HST played a key role in perhaps the most transformative scientific discovery since Edwin Hubble discovered the expansion of the Universe. In 1998, two teams of astronomers (</span><a class="workspace-trigger" data-dcnode-id="7564" href="#b0165" name="bb0165"><span data-dcnode-id="7565" instrument_node="">Perlmutter et al., 1999</span></a><span data-dcnode-id="7563" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7561" href="#b0175" name="bb0175"><span data-dcnode-id="7562" instrument_node="">Riess et al., 1998</span></a><span data-dcnode-id="7560" instrument_node="">) using data from “ground based” telescopes and HST presented evidence that the expansion of the Universe is currently accelerating, rather than decelerating under the influence of gravity as expected. Unless Einsteins general theory of relativity needs to be modified, the acceleration appears to be propelled by the repulsive force of a mysterious dark energy. The nature of the dark energy is arguably the most profound puzzle facing physics today. The observers used Type Ia supernovae as bright, standard candles to trace the expansion history of the Universe. The high angular resolution of HST was essential to separating the light of the most distant supernovae from that of the host galaxy, and thereby obtaining an accurate distance. </span><a class="workspace-trigger" data-dcnode-id="7558" href="#f0030" name="bf0030"><span data-dcnode-id="7559" instrument_node="">Fig. 6</span></a><span data-dcnode-id="7557" instrument_node="">) shows HST data for three such events, both before and after the supernova explosions. The HST observations demonstrated three critical points confirming the reality of the acceleration: prior to about 5</span><span data-dcnode-id="7556" instrument_node="">&nbsp;</span><span data-dcnode-id="7555" instrument_node="">billion years ago, the expansion was decelerating, indicating that gravity was then dominating over dark energy; dark energy was already present as early as 9</span><span data-dcnode-id="7554" instrument_node="">&nbsp;</span><span data-dcnode-id="7553" instrument_node="">billion years ago, though not yet dominant; dark energy behaves in a manner consistent with what quantum mechanics predicts for vacuum energy. Improving observational determinations of the character of dark energy is a major motivator for future astronomical studies.</span></p><figure class="figure text-xs" data-dcnode-id="7534" id="f0030"><span data-dcnode-id="7542"><img alt="" data-dcnode-id="7551" height="361" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr6.jpg&amp;raw"><span data-dcnode-id="7550" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7543"><li data-dcnode-id="7544"><a class="anchor download-link u-font-sans" data-dcnode-id="7545" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7546"><span data-dcnode-id="7549" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7535"><span data-dcnode-id="7536"><p data-dcnode-id="7537" id="sp040"><span class="label" data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">Fig. 6</span></span><span data-dcnode-id="7539" instrument_node="">. </span><span data-dcnode-id="7538" instrument_node="">HST discovery of distant Supernovae.</span></p></span></span></figure></div></section></section><section data-dcnode-id="7470" id="s0165"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7527"><span data-dcnode-id="7530" instrument_node="">4.3.2</span><span data-dcnode-id="7529" instrument_node="">. </span><span data-dcnode-id="7528" instrument_node="">Rossi X-ray Timing Explorer (RXTE)</span></h4><div data-dcnode-id="7492"><p data-dcnode-id="7511" id="p0345"><span data-dcnode-id="7526" instrument_node="">The Rossi X-ray Timing Explorer (RXTE) was launched on 30 December 1995 from NASA’s Kennedy Space Center (see </span><a class="workspace-trigger" data-dcnode-id="7524" href="#f0035" name="bf0035"><span data-dcnode-id="7525" instrument_node="">Fig. 7</span></a><span data-dcnode-id="7523" instrument_node="">) and decommissioned the 5 January 2012. The mission is managed and controlled by NASA’s Goddard Space Flight Center (GSFC) in Greenbelt, Maryland. RXTE features unprecedented time resolution in combination with moderate spectral resolution to explore the variability of X-ray sources. Time scales from microseconds to months are covered in an instantaneous spectral range from 2 to 250</span><span data-dcnode-id="7522" instrument_node="">&nbsp;</span><span data-dcnode-id="7521" instrument_node="">keV. Originally designed for a required lifetime of 2</span><span data-dcnode-id="7520" instrument_node="">&nbsp;</span><span data-dcnode-id="7519" instrument_node="">years with a goal of five, RXTE has been performing well completing 16</span><span data-dcnode-id="7518" instrument_node="">&nbsp;</span><span data-dcnode-id="7517" instrument_node="">years of operation in December 2011. The mission carries two pointed instruments, the Proportional Counter Array (PCA) developed by GSFC to cover the lower part of the energy range, and the High Energy X-ray Timing Experiment (HEXTE) developed by the University of California San Diego covering the upper energy range. These instruments are equipped with collimators yielding a FWHM of one degree. In addition, RXTE carries an All-Sky Monitor (ASM) from the Massachusetts Institute of Technology (MIT) that scans about 80% of the sky every orbit, allowing monitoring at time scales of 90</span><span data-dcnode-id="7516" instrument_node="">&nbsp;</span><span data-dcnode-id="7515" instrument_node="">min or longer. Data from PCA and ASM are processed on board by the Experiment Data System (EDS), also built by MIT.</span><a class="workspace-trigger" data-dcnode-id="7512" href="#fn39" name="bfn39"><sup data-dcnode-id="7513"><span data-dcnode-id="7514" instrument_node="">39</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="7493" id="f0035"><span data-dcnode-id="7501"><img alt="" data-dcnode-id="7510" height="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr7.jpg&amp;raw"><span data-dcnode-id="7509" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7502"><li data-dcnode-id="7503"><a class="anchor download-link u-font-sans" data-dcnode-id="7504" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7505"><span data-dcnode-id="7508" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7506"><span data-dcnode-id="7507" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7494"><span data-dcnode-id="7495"><p data-dcnode-id="7496" id="sp045"><span class="label" data-dcnode-id="7499"><span data-dcnode-id="7500" instrument_node="">Fig. 7</span></span><span data-dcnode-id="7498" instrument_node="">. </span><span data-dcnode-id="7497" instrument_node="">Rossi X-Ray Timing Explorer (RXTE) during ground test.</span></p></span></span></figure></div><section data-dcnode-id="7471" id="s0170"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7488"><span data-dcnode-id="7491" instrument_node="">4.3.2.1</span><span data-dcnode-id="7490" instrument_node="">. </span><span data-dcnode-id="7489" instrument_node="">Mission achievement summary</span></h5><p data-dcnode-id="7472" id="p0350"><span data-dcnode-id="7487" instrument_node="">The RXTE has proved to be a successful mission for exploration and new discoveries. In particular, the large collecting area of the PCA is a key tool for study of the rapid X-ray variability phenomena of galactic sources. This capability has allowed investigations to address fundamental questions concerning the properties of dense matter and strong gravitational fields around astrophysical objects. In the past 15</span><span data-dcnode-id="7486" instrument_node="">&nbsp;</span><span data-dcnode-id="7485" instrument_node="">years, the RXTE mission has achieved several new breakthrough results from neutron stars and black holes. Discovery of the accretion-powered mill
