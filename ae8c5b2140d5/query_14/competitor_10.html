d Space Flight Center. Fermi is a multiagency and international observatory-class facility designed to study the cosmos in the &lt;10</span><span data-dcnode-id="6590" instrument_node="">&nbsp;</span><span data-dcnode-id="6589" instrument_node="">keV to &gt;300</span><span data-dcnode-id="6588" instrument_node="">&nbsp;</span><span data-dcnode-id="6587" instrument_node="">GeV energy range. Its primary instrument, the Large Area Telescope (LAT), is a pair-conversion telescope. Gamma rays pair-produce in tungsten foils, silicon strip detectors track the resulting pairs, and the resulting particle shower deposits energy in a CsI calorimeter. An anticoincidence detector provides discrimination against the large flux of charged particles incident on the LAT. The anticoincidence detector is segmented to eliminate the self-vetoing problems of previous instruments. The LAT has a peak effective area (&gt;8000</span><span data-dcnode-id="6586" instrument_node="">&nbsp;</span><span data-dcnode-id="6585" instrument_node="">cm</span><sup data-dcnode-id="6583"><span data-dcnode-id="6584" instrument_node="">2</span></sup><span data-dcnode-id="6582" instrument_node="">), angular resolution (&lt;3.5</span><span data-dcnode-id="6581" instrument_node="">&nbsp;</span><span data-dcnode-id="6580" instrument_node="">degree at 100</span><span data-dcnode-id="6579" instrument_node="">&nbsp;</span><span data-dcnode-id="6578" instrument_node="">MeV, &lt;0.15</span><span data-dcnode-id="6577" instrument_node="">&nbsp;</span><span data-dcnode-id="6576" instrument_node="">degree above 10</span><span data-dcnode-id="6575" instrument_node="">&nbsp;</span><span data-dcnode-id="6574" instrument_node="">GeV), field-of-view (&gt;2</span><span data-dcnode-id="6573" instrument_node="">&nbsp;</span><span data-dcnode-id="6572" instrument_node="">sr), and deadtime (&lt;100</span><span data-dcnode-id="6571" instrument_node="">&nbsp;</span><span data-dcnode-id="6570" instrument_node="">μs per event) that provides a factor of 30 or more advance in sensitivity compared to previous missions. Fermi also carries a secondary experiment, the Gamma-ray Burst Monitor (GBM) that facilitates the study of transient phenomena. The GBM has a field-of-view larger than the LAT and a spectral range that extends from the LATs lower limit down to less than 10</span><span data-dcnode-id="6569" instrument_node="">&nbsp;</span><span data-dcnode-id="6568" instrument_node="">keV.</span></p><figure class="figure text-xs" data-dcnode-id="6549" id="f0105"><span data-dcnode-id="6557"><img alt="" data-dcnode-id="6566" height="448" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr21.jpg&amp;raw"><span data-dcnode-id="6565" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6558"><li data-dcnode-id="6559"><a class="anchor download-link u-font-sans" data-dcnode-id="6560" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr21.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6561"><span data-dcnode-id="6564" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6550"><span data-dcnode-id="6551"><p data-dcnode-id="6552" id="sp115"><span class="label" data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">Fig. 21</span></span><span data-dcnode-id="6554" instrument_node="">. </span><span data-dcnode-id="6553" instrument_node="">The Fermi Gamma-Ray Space Telescope being prepared for launch in the clean room at the Kennedy Space Center in February 2008.</span></p></span></span></figure></div><section data-dcnode-id="6493" id="s0250"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6544"><span data-dcnode-id="6547" instrument_node="">4.3.11.1</span><span data-dcnode-id="6546" instrument_node="">. </span><span data-dcnode-id="6545" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="6494"><p data-dcnode-id="6518" id="p0450"><span data-dcnode-id="6543" instrument_node="">Although pointed observations are possible, Fermi primarily scans the sky continuously because of the LATs large field-of-view. In this sky survey mode Fermi provides nearly uniform sky exposure every ∼3</span><span data-dcnode-id="6542" instrument_node="">&nbsp;</span><span data-dcnode-id="6541" instrument_node="">h. During its first 2</span><span data-dcnode-id="6540" instrument_node="">&nbsp;</span><span data-dcnode-id="6539" instrument_node="">years, the Fermi LAT’s has detected and catalogued over 1800</span><span data-dcnode-id="6538" instrument_node="">&nbsp;</span><span data-dcnode-id="6537" instrument_node="">cosmic </span><em data-dcnode-id="6535"><span data-dcnode-id="6536" instrument_node="">γ</span></em><span data-dcnode-id="6534" instrument_node="">-ray sources. Collectively, the study of these sources has led to new insights into basic astrophysical issues such as the structure of pulsar magnetospheres, the galactic millisecond pulsar population, jet production and propagation in active galaxies and the sources and composition of galactic cosmic-rays. The mission is an astrophysics and particle physics partnership, developed by NASA in collaboration with the US Department of Energy, along with important contributions from academic institutions (</span><a class="workspace-trigger" data-dcnode-id="6532" href="#b0180" name="bb0180"><span data-dcnode-id="6533" instrument_node="">Ritz, 2007</span></a><span data-dcnode-id="6531" instrument_node="">)</span><a class="workspace-trigger" data-dcnode-id="6528" href="#fn43" name="bfn43"><sup data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">43</span></sup></a><span data-dcnode-id="6527" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6525" href="#f0110" name="bf0110"><span data-dcnode-id="6526" instrument_node="">Fig. 22</span></a><span data-dcnode-id="6524" instrument_node=""> shows the Fermi </span><em data-dcnode-id="6522"><span data-dcnode-id="6523" instrument_node="">γ</span></em><span data-dcnode-id="6521" instrument_node="">-ray sky as observed during the first 2</span><span data-dcnode-id="6520" instrument_node="">&nbsp;</span><span data-dcnode-id="6519" instrument_node="">years of observations.</span></p><figure class="figure text-xs" data-dcnode-id="6495" id="f0110"><span data-dcnode-id="6508"><img alt="" data-dcnode-id="6517" height="280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr22.jpg&amp;raw"><span data-dcnode-id="6516" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6509"><li data-dcnode-id="6510"><a class="anchor download-link u-font-sans" data-dcnode-id="6511" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr22.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6512"><span data-dcnode-id="6515" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6513"><span data-dcnode-id="6514" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6496"><span data-dcnode-id="6497"><p data-dcnode-id="6498" id="sp120"><span class="label" data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">Fig. 22</span></span><span data-dcnode-id="6505" instrument_node="">. </span><span data-dcnode-id="6504" instrument_node="">The Fermi </span><em data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">γ</span></em><span data-dcnode-id="6501" instrument_node="">-ray sky, integrating the data obtained during the first 2</span><span data-dcnode-id="6500" instrument_node="">&nbsp;</span><span data-dcnode-id="6499" instrument_node="">years of observations. Credit: NASA/DOE/Fermi/LAT Collaboration.</span></p></span></span></figure></div></section></section><section data-dcnode-id="6333" id="s0255"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6488"><span data-dcnode-id="6491" instrument_node="">4.3.12</span><span data-dcnode-id="6490" instrument_node="">. </span><span data-dcnode-id="6489" instrument_node="">The Planck mission</span></h4><div data-dcnode-id="6427"><p data-dcnode-id="6446" id="p0455"><span data-dcnode-id="6487" instrument_node="">Planck is a mm/sub-millimetre-wave sky-survey satellite, including a wide-field cold telescope (1.5</span><span data-dcnode-id="6486" instrument_node="">&nbsp;</span><span data-dcnode-id="6485" instrument_node="">m aperture) with two focal plane instruments, covering the frequency range from 30 to 857</span><span data-dcnode-id="6484" instrument_node="">&nbsp;</span><span data-dcnode-id="6483" instrument_node="">GHz. It was launched by ESA on 14 May, 2009, (see </span><a class="workspace-trigger" data-dcnode-id="6481" href="#f0115" name="bf0115"><span data-dcnode-id="6482" instrument_node="">Fig. 23</span></a><span data-dcnode-id="6480" instrument_node="">) and is currently operating from an orbit around in L2 with excellent performance (</span><a class="workspace-trigger" data-dcnode-id="6478" href="#b0010" name="bb0010"><span data-dcnode-id="6479" instrument_node="">Ade et al., 2011a</span></a><span data-dcnode-id="6477" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6475" href="#b0015" name="bb0015"><span data-dcnode-id="6476" instrument_node="">Ade et al., 2011b</span></a><span data-dcnode-id="6474" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6472" href="#b0155" name="bb0155"><span data-dcnode-id="6473" instrument_node="">Mennella et al., 2011</span></a><span data-dcnode-id="6471" instrument_node="">). As planned after 50</span><span data-dcnode-id="6470" instrument_node="">&nbsp;</span><span data-dcnode-id="6469" instrument_node="">days, as foreseen, Planck entered its final orbit around the second Lagrange point of the Sun–Earth system (L2), at a distance of 1.5</span><span data-dcnode-id="6468" instrument_node="">&nbsp;</span><span data-dcnode-id="6467" instrument_node="">million km from Earth. Since the end of the commissioning and performance verification phases in mid-August 2009, Planck has been performing its scientific mission. On 15 January, 2010, ESA’s advisory bodies approved an extension of Planck operations by 12</span><span data-dcnode-id="6466" instrument_node="">&nbsp;</span><span data-dcnode-id="6465" instrument_node="">months. Planck is now scheduled to continuously acquire high-quality science data until the end of 2011. The Planck collects and characterises radiation from the Cosmic Microwave Background (CMB) using sensitive radio receivers operating at extremely low temperatures, and is capable of distinguishing temperature variations of about 1 micro-deg Kelvin. These measurements are used to produce maps of anisotropies in the CMB radiation field. The Planck spacecraft is 4.2</span><span data-dcnode-id="6464" instrument_node="">&nbsp;</span><span data-dcnode-id="6463" instrument_node="">m high with a launch mass of around 1.9</span><span data-dcnode-id="6462" instrument_node="">&nbsp;</span><span data-dcnode-id="6461" instrument_node="">t, consisting of a service module with the warm parts of the scientific instruments, and a payload module. The payload module contains the telescope, the optical bench, with the parts of the instruments that need to be cooled – the sensitive detector units – and the cooling systems. The Planck telescope is an off-axis tilted Gregorian design with a primary mirror measuring 1.9</span><span data-dcnode-id="6460" instrument_node="">&nbsp;</span><span data-dcnode-id="6459" instrument_node="">×</span><span data-dcnode-id="6458" instrument_node="">&nbsp;</span><span data-dcnode-id="6457" instrument_node="">1.5</span><span data-dcnode-id="6456" instrument_node="">&nbsp;</span><span data-dcnode-id="6455" instrument_node="">m, and with a projected aperture of 1.5</span><span data-dcnode-id="6454" instrument_node="">&nbsp;</span><span data-dcnode-id="6453" instrument_node="">m diameter. The 1.1</span><span data-dcnode-id="6452" instrument_node="">&nbsp;</span><span data-dcnode-id="6451" instrument_node="">×</span><span data-dcnode-id="6450" instrument_node="">&nbsp;</span><span data-dcnode-id="6449" instrument_node="">1.0</span><span data-dcnode-id="6448" instrument_node="">&nbsp;</span><span data-dcnode-id="6447" instrument_node="">m secondary mirror focuses the collected light onto the two scientific instruments: Low Frequency Instrument (LFI), an array of radio receivers using high electron mobility transistor mixers; and High Frequency Instrument (HFI), an array of microwave detectors using spider bolometers equipped with neutron transmutation doped germanium thermistors.</span></p><figure class="figure text-xs" data-dcnode-id="6428" id="f0115"><span data-dcnode-id="6436"><img alt="" data-dcnode-id="6445" height="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr23.jpg&amp;raw"><span data-dcnode-id="6444" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6437"><li data-dcnode-id="6438"><a class="anchor download-link u-font-sans" data-dcnode-id="6439" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr23.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6440"><span data-dcnode-id="6443" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6429"><span data-dcnode-id="6430"><p data-dcnode-id="6431" id="sp125"><span class="label" data-dcnode-id="6434"><span data-dcnode-id="6435" instrument_node="">Fig. 23</span></span><span data-dcnode-id="6433" instrument_node="">. </span><span data-dcnode-id="6432" instrument_node="">The Planck satellite during integration tests.</span></p></span></span></figure></div><section data-dcnode-id="6334" id="s0260"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6423"><span data-dcnode-id="6426" instrument_node="">4.3.12.1</span><span data-dcnode-id="6425" instrument_node="">. </span><span data-dcnode-id="6424" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="6335"><p data-dcnode-id="6359" id="p0460"><span data-dcnode-id="6422" instrument_node="">Planck has been designed to measure the temperature and polarisation anisotropies of the Cosmic Microwave Background with unprecedented accuracy. With respect to WMAP, Planck provides broader frequency coverage, higher angular resolution (down to a few arc min in the high frequency channels), and increased sensitivity of the survey (roughly by a factor of 10). The first CBM data release is scheduled for January 2013. A set of early results was published in January 2011. The main product released so far, the Early Release Compact Source Catalog (ERCSC), is a list of high reliability (&gt;90%) sources, both Galactic and extragalactic, derived from the data acquired by Planck between 13 August, 2009 and 6 June, 2010. The 10</span><em data-dcnode-id="6420"><span data-dcnode-id="6421" instrument_node="">σ</span></em><span data-dcnode-id="6419" instrument_node=""> photometric flux density limit of the catalogue at ∣</span><em data-dcnode-id="6417"><span data-dcnode-id="6418" instrument_node="">b</span></em><span data-dcnode-id="6416" instrument_node="">∣</span><span data-dcnode-id="6415" instrument_node="">&nbsp;</span><span data-dcnode-id="6414" instrument_node="">&gt;</span><span data-dcnode-id="6413" instrument_node="">&nbsp;</span><span data-dcnode-id="6412" instrument_node="">30</span><span data-dcnode-id="6411" instrument_node="">&nbsp;</span><span data-dcnode-id="6410" instrument_node="">degree is a fraction of a Jy in all bands, resulting in a total of more than 15000 unique sources (</span><a class="workspace-trigger" data-dcnode-id="6408" href="#b0025" name="bb0025"><span data-dcnode-id="6409" instrument_node="">Ade et al., 2011c</span></a><span data-dcnode-id="6407" instrument_node="">). The ERCSC consists of nine lists of sources, extracted independently from each of Planck’s nine frequency channels, plus two lists extracted using multi-channel criteria. These are the Early Cold Cores catalogue (</span><a class="workspace-trigger" data-dcnode-id="6405" href="#b0030" name="bb0030"><span data-dcnode-id="6406" instrument_node="">Ade et al., 2011d</span></a><span data-dcnode-id="6404" instrument_node="">) (ECC, including 915 Galactic dense and cold cores, selected mainly on the basis of their temperature) and the Early Sunyaev–Zeldovich catalogue (</span><a class="workspace-trigger" data-dcnode-id="6402" href="#b0035" name="bb0035"><span data-dcnode-id="6403" instrument_node="">Ade et al., 2011e</span></a><span data-dcnode-id="6401" instrument_node="">) (ESZ, including 190 galaxy clusters selected by the spectral signature of the Sunyaev–Zeldovich effect). This is the first all-sky shallow survey for SZ clusters, and is especially sensitive to the high-mass tail of the cluster mass distribution. In the early results, Planck has been able to discover 21 new clusters, and most of them have already been confirmed by follow-up observations of XMM and “ground based” mm-wave telescopes. A typical example of these discoveries is PLCKG266.6–27.3 (</span><a class="workspace-trigger" data-dcnode-id="6399" href="#b0040" name="bb0040"><span data-dcnode-id="6400" instrument_node="">Aghanim et al., 2011</span></a><span data-dcnode-id="6398" instrument_node="">), see </span><a class="workspace-trigger" data-dcnode-id="6396" href="#f0120" name="bf0120"><span data-dcnode-id="6397" instrument_node="">Fig. 24</span></a><span data-dcnode-id="6395" instrument_node="">), a high redshift (</span><em data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">z</span></em><span data-dcnode-id="6392" instrument_node="">&nbsp;</span><span data-dcnode-id="6391" instrument_node="">=</span><span data-dcnode-id="6390" instrument_node="">&nbsp;</span><span data-dcnode-id="6389" instrument_node="">0.94), relaxed, high mass (8</span><span data-dcnode-id="6388" instrument_node="">&nbsp;</span><span data-dcnode-id="6387" instrument_node="">×</span><span data-dcnode-id="6386" instrument_node="">&nbsp;</span><span data-dcnode-id="6385" instrument_node="">10</span><sup data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">14</span></sup><span data-dcnode-id="6382" instrument_node="">&nbsp;</span><span data-dcnode-id="6381" instrument_node="">M</span><sub data-dcnode-id="6378"><em data-dcnode-id="6379"><span data-dcnode-id="6380" instrument_node="">sun</span></em></sub><span data-dcnode-id="6377" instrument_node=""> cluster, extremely luminous in X-rays (1.4</span><span data-dcnode-id="6376" instrument_node="">&nbsp;</span><span data-dcnode-id="6375" instrument_node="">×</span><span data-dcnode-id="6374" instrument_node="">&nbsp;</span><span data-dcnode-id="6373" instrument_node="">10</span><sup data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">45</span></sup><span data-dcnode-id="6370" instrument_node="">&nbsp;</span><span data-dcnode-id="6369" instrument_node="">erg/s). Planck is perfectly suited to carry-out a systematic survey of these objects, opening the way to statistical studies of population evolution. Planck</span><a class="workspace-trigger" data-dcnode-id="6366" href="#fn44" name="bfn44"><sup data-dcnode-id="6367"><span data-dcnode-id="6368" instrument_node="">44</span></sup></a><span data-dcnode-id="6365" instrument_node=""> is providing a map of the CMB field at all angular resolutions greater than 10</span><span data-dcnode-id="6364" instrument_node="">&nbsp;</span><span data-dcnode-id="6363" instrument_node="">arc min and with a temperature resolution of the order of one part in 10</span><sup data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">6</span></sup><span data-dcnode-id="6360" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6336" id="f0120"><span data-dcnode-id="6349"><img alt="" data-dcnode-id="6358" height="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr24.jpg&amp;raw"><span data-dcnode-id="6357" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6350"><li data-dcnode-id="6351"><a class="anchor download-link u-font-sans" data-dcnode-id="6352" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr24.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6353"><span data-dcnode-id="6356" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6337"><span data-dcnode-id="6338"><p data-dcnode-id="6339" id="sp130"><span class="label" data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">Fig. 24</span></span><span data-dcnode-id="6346" instrument_node="">. </span><span data-dcnode-id="6345" instrument_node="">Left: Image of the SZ effect in the cluster PLCKG266.6-27.3, discovered by Planck. Right: follow-up observation of the same cluster from XMM-Newton in the 0.3–2.0</span><span data-dcnode-id="6344" instrument_node="">&nbsp;</span><span data-dcnode-id="6343" instrument_node="">keV band (</span><a class="workspace-trigger" data-dcnode-id="6341" href="#b0040" name="bb0040"><span data-dcnode-id="6342" instrument_node="">Aghanim et al., 2011</span></a><span data-dcnode-id="6340" instrument_node="">).</span></p></span></span></figure></div></section></section><section data-dcnode-id="6185" id="s0265"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6329"><span data-dcnode-id="6332" instrument_node="">4.3.13</span><span data-dcnode-id="6331" instrument_node="">. </span><span data-dcnode-id="6330" instrument_node="">The Herschel mission</span></h4><div data-dcnode-id="6290"><p data-dcnode-id="6309" id="p0465"><span data-dcnode-id="6328" instrument_node="">The Herschel Space Observatory is the largest infrared space observatory launched to date (</span><a class="workspace-trigger" data-dcnode-id="6326" href="#b0170" name="bb0170"><span data-dcnode-id="6327" instrument_node="">Pilbratt, 2001</span></a><span data-dcnode-id="6325" instrument_node="">) (see </span><a class="workspace-trigger" data-dcnode-id="6323" href="#f0125" name="bf0125"><span data-dcnode-id="6324" instrument_node="">Fig. 25</span></a><span data-dcnode-id="6322" instrument_node="">). Equipped with a 3.5</span><span data-dcnode-id="6321" instrument_node="">&nbsp;</span><span data-dcnode-id="6320" instrument_node="">m diameter reflecting telescope and instruments cooled to close to absolute zero, Herschel is observing at far-infrared and submillimetre wavelengths that have never previously been explored with such high sensitivity and spatial and spectral resolution. Herschel will spend a nominal mission lifetime of &gt;2</span><span data-dcnode-id="6319" instrument_node="">&nbsp;</span><span data-dcnode-id="6318" instrument_node="">years in orbit around the second Lagrange point of the Sun-Earth system (L2). Infrared astronomy is a young and exciting science. In recent decades infrared astronomers have unveiled tens of thousands of new galaxies, and have made surprising discoveries such as the huge amount of water vapour throughout our Galaxy. The spacecraft is approximately 7.5</span><span data-dcnode-id="6317" instrument_node="">&nbsp;</span><span data-dcnode-id="6316" instrument_node="">m high with a launch mass of around 3.4</span><span data-dcnode-id="6315" instrument_node="">&nbsp;</span><span data-dcnode-id="6314" instrument_node="">t. The spacecraft consists of a service module containing the warm parts of the scientific instruments, and a payload module. The payload module contains of the telescope, the optical bench, with the parts of the instruments that need to be cooled, i.e., the sensitive detector units and cooling systems. The payload module is fitted with a sunshield, which protects the telescope and cryostat from solar visible and infrared radiation and spectrometer; Photodetector Array Camera and Spectrometer (PACS), an imaging photometer and medium resolution grating spectrometer; and SPIRE (Spectral and Photometric Imaging Receiver), an imaging photometer and an imaging Fourier transform spectrometer. The instruments have been designed to take maximum advantage of the characteristics of the Herschel mission. In order to make measurements at infrared and submillimetre wavelengths, parts of the instruments have to be cooled to near absolute zero. The optical bench, the common mounting structure of all three instruments, is contained within a cryostat, and over 2000</span><span data-dcnode-id="6313" instrument_node="">&nbsp;</span><span data-dcnode-id="6312" instrument_node="">l of liquid helium will be used during the mission for primary cooling. Individual instrument detectors are equipped with additional, specialised cooling systems to achieve the very lowest temperatures, down to 0.3</span><span data-dcnode-id="6311" instrument_node="">&nbsp;</span><span data-dcnode-id="6310" instrument_node="">K for PACS and SPIRE.</span></p><figure class="figure text-xs" data-dcnode-id="6291" id="f0125"><span data-dcnode-id="6299"><img alt="" data-dcnode-id="6308" height="531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr25.jpg&amp;raw"><span data-dcnode-id="6307" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6300"><li data-dcnode-id="6301"><a class="anchor download-link u-font-sans" data-dcnode-id="6302" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr25.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6303"><span data-dcnode-id="6306" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6292"><span data-dcnode-id="6293"><p data-dcnode-id="6294" id="sp135"><span class="label" data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">Fig. 25</span></span><span data-dcnode-id="6296" instrument_node="">. </span><span data-dcnode-id="6295" instrument_node="">Herschel artist’s concept.</span></p></span></span></figure></div><section data-dcnode-id="6186" id="s0270"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6286"><span data-dcnode-id="6289" instrument_node="">4.3.13.1</span><span data-dcnode-id="6288" instrument_node="">. </span><span data-dcnode-id="6287" instrument_node="">Mission achievement summary</span></h5><div data-dcnode-id="6187"><p data-dcnode-id="6260" id="p0470"><span data-dcnode-id="6285" instrument_node="">Herschel has followed on from Spitzer, extending wavelength coverage beyond 200 </span><em data-dcnode-id="6283"><span data-dcnode-id="6284" instrument_node="">μ</span></em><span data-dcnode-id="6282" instrument_node="">m, and achieving better angular resolution due to its larger telescope. The main science drivers for Herschel have included: (i) wide-area photometric surveys of the extragalactic and Galactic sky to measure dust-enshrouded star-formation activity throughout cosmic time and in our own and nearby galaxies today; (ii) detailed studies of the physics and chemistry of the interstellar medium, in our own and local galaxies; (iii) observational astrochemistry as a tool for understanding the stellar/interstellar lifecycle and investigating the physical and chemical processes involved in star formation and early stellar evolution; (iv) spectroscopic and photometric study of comets, asteroids and outer planet atmospheres and their satellites. At the time of writing, the Herschel spacecraft and instruments are performing as planned, with scientific capabilities and data quality matching or exceeding pre-launch expectations. Two thirds of Herschel observing time is available to the worldwide astronomical community, with the remainder allocated to the teams which have worked on the observatory and the instruments. The first half of the mission has been mainly used for Key Projects, substantial programmes addressing core science goals in a comprehensive manner and producing large coherent data sets. Extragalactic science highlights to date include accurate measurements of FIR/submillimetre number counts and the implications for the origin of the Cosmic Infrared Background (CIB); characterisation of galaxy luminosity function evolution with redshift; galaxy clustering analysis suggesting that multiple dusty star-forming galaxies occupy the same dark matter halos; and evidence for strong AGN-driven molecular outflows that regulate star formation and may be responsible for the correlation between central black hole mass and host galaxy mass. Herschel’s angular resolution, wavelength coverage, and instrumentation are well suited to study of the ecology of the Milky Way galaxy in unprecedented detail. Significant results so far include the observation of complex and highly structured networks of filaments which appear to be ubiquitous in the galactic interstellar medium, suggesting a scenario for star formation in which protostellar condensations form inside and at the junctions of filaments; multi-band photometry yielding accurate masses, luminosities, temperatures, and lifetimes of protostellar objects, and characterising the origin of the stellar initial mass function down to the brown dwarf regime; a high resolution survey of the nearby star-forming region in Orion revealing tens of thousands of spectral lines; and imaging of debris disks around nearby young stars. Solar system observations with Herschel are allowing comparison of the isotopic composition of cometary water with that of the Earths oceans, improving global models of the atmospheres of the giant planets, and giving accurate estimation of the sizes and thermophysical properties of asteroids and Kuiper Belt objects. The observatory will continue to operate until its tank of liquid helium is exhausted, which is expected to happen in the spring of 2013. All Herschel data will be stored long-term in the Herschel Science Archive. The spatial and spectral survey data especially are expected to be of considerable archival value well beyond the lifetime of the mission. A text book example of the synergy and powerful capability of space observatories is shown in </span><a class="workspace-trigger" data-dcnode-id="6280" href="#f0130" name="bf0130"><span data-dcnode-id="6281" instrument_node="">Fig. 26</span></a><span data-dcnode-id="6279" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6277" href="#f0135" name="bf0135"><span data-dcnode-id="6278" instrument_node="">Fig. 27</span></a><span data-dcnode-id="6276" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6274" href="#f0140" name="bf0140"><span data-dcnode-id="6275" instrument_node="">Fig. 28</span></a><span data-dcnode-id="6273" instrument_node="">. The Herschel image contains basic information about a region of the Galaxy with strong star formation processes; the optical image shows ‘normal stars’ during their thermonuclear evolution period, lasting from millions to billions of years; and the X-ray image shows the ’end-of-life- activity, with high energy photons emitted mainly by white dwarfs, neutron stars or black holes accreting matter from companion stars. </span><a class="workspace-trigger" data-dcnode-id="6271" href="#f0145" name="bf0145"><span data-dcnode-id="6272" instrument_node="">Fig. 29</span></a><span data-dcnode-id="6270" instrument_node="">, (</span><a class="workspace-trigger" data-dcnode-id="6268" href="#b0275" name="bb0275"><span data-dcnode-id="6269" instrument_node="">Fritz et al., 2011</span></a><span data-dcnode-id="6267" instrument_node="">) shows the image obtained by overlapping the two images of </span><a class="workspace-trigger" data-dcnode-id="6265" href="#f0135" name="bf0135"><span data-dcnode-id="6266" instrument_node="">Fig. 27</span></a><span data-dcnode-id="6264" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6262" href="#f0140" name="bf0140"><span data-dcnode-id="6263" instrument_node="">Fig. 28</span></a><span data-dcnode-id="6261" instrument_node="">. This image clearly shows where the star forming regions, emitting in the IR, and the collapsed stars, emitting high energy X-rays, are located.</span></p><figure class="figure text-xs" data-dcnode-id="6242" id="f0130"><span data-dcnode-id="6250"><img alt="" data-dcnode-id="6259" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr26.jpg&amp;raw"><span data-dcnode-id="6258" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6251"><li data-dcnode-id="6252"><a class="anchor download-link u-font-sans" data-dcnode-id="6253" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr26.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6254"><span data-dcnode-id="6257" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6255"><span data-dcnode-id="6256" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6243"><span data-dcnode-id="6244"><p data-dcnode-id="6245" id="sp140"><span class="label" data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">Fig. 26</span></span><span data-dcnode-id="6247" instrument_node="">. </span><span data-dcnode-id="6246" instrument_node="">Optical image of the Andromeda Galaxy. Credit: NASA/ESA/R. Gendler, T. Lauer (NOAO/AURA/NSF), and A. Field (STScl).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="6224" id="f0135"><span data-dcnode-id="6232"><img alt="" data-dcnode-id="6241" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr27.jpg&amp;raw"><span data-dcnode-id="6240" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6233"><li data-dcnode-id="6234"><a class="anchor download-link u-font-sans" data-dcnode-id="6235" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr27.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6236"><span data-dcnode-id="6239" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6237"><span data-dcnode-id="6238" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6225"><span data-dcnode-id="6226"><p data-dcnode-id="6227" id="sp145"><span class="label" data-dcnode-id="6230"><span data-dcnode-id="6231" instrument_node="">Fig. 27</span></span><span data-dcnode-id="6229" instrument_node="">. </span><span data-dcnode-id="6228" instrument_node="">IR-Herschel image of the Andromeda Galaxy. Credit: ESA/Herschel – PACS/SPIRE/J. Fritz, U. Gent.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="6206" id="f0140"><span data-dcnode-id="6214"><img alt="" data-dcnode-id="6223" height="452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr28.jpg&amp;raw"><span data-dcnode-id="6222" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6215"><li data-dcnode-id="6216"><a class="anchor download-link u-font-sans" data-dcnode-id="6217" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr28.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6218"><span data-dcnode-id="6221" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6219"><span data-dcnode-id="6220" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6207"><span data-dcnode-id="6208"><p data-dcnode-id="6209" id="sp150"><span class="label" data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">Fig. 28</span></span><span data-dcnode-id="6211" instrument_node="">. </span><span data-dcnode-id="6210" instrument_node="">XMM-Newton image of the Andromeda Galaxy. Credit: ESA/XMM Newton/EPIC/W. Pietsch, MPE.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="6188" id="f0145"><span data-dcnode-id="6196"><img alt="" data-dcnode-id="6205" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr29.jpg&amp;raw"><span data-dcnode-id="6204" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6197"><li data-dcnode-id="6198"><a class="anchor download-link u-font-sans" data-dcnode-id="6199" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr29.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6200"><span data-dcnode-id="6203" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6189"><span data-dcnode-id="6190"><p data-dcnode-id="6191" id="sp155"><span class="label" data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">Fig. 29</span></span><span data-dcnode-id="6193" instrument_node="">. </span><span data-dcnode-id="6192" instrument_node="">Composite X-Ray – Infrared image of the Andromeda Galaxy: from the birth to the death of the stars.</span></p></span></span></figure></div></section></section><section data-dcnode-id="6080" id="s0275"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6181"><span data-dcnode-id="6184" instrument_node="">4.3.14</span><span data-dcnode-id="6183" instrument_node="">. </span><span data-dcnode-id="6182" instrument_node="">MAXI Monitor of All-sky X-ray Image</span></h4><div data-dcnode-id="6111"><p data-dcnode-id="6130" id="p0475"><span data-dcnode-id="6180" instrument_node="">Monitor of All-sky X-ray Image (MAXI) is a highly sensitive X-ray slit camera for the monitoring of more than 1000 X-ray sources in space over an energy band range of 0.5–30</span><span data-dcnode-id="6179" instrument_node="">&nbsp;</span><span data-dcnode-id="6178" instrument_node="">keV (see </span><a class="workspace-trigger" data-dcnode-id="6176" href="#f0150" name="bf0150"><span data-dcnode-id="6177" instrument_node="">Fig. 30</span></a><span data-dcnode-id="6175" instrument_node="">). It is an attached payload to the International Space Station (ISS), externally mounted on the Japanese Experiment Module (JEM), Kibo, Exposed Facility. MAXI is continuously observing to monitor flux variability once every 96</span><span data-dcnode-id="6174" instrument_node="">&nbsp;</span><span data-dcnode-id="6173" instrument_node="">min for more than 1000 X-ray sources covering the entire sky on time scales from a day to a few months. As an all-sky monitor, MAXI employs slit cameras. They determine one coordinate of the X-ray sources within the narrow field of view of the slit, which is orthogonally oriented to a one-dimensional position-sensitive X-ray detector. As an X-ray source moves according to the motion of the International Space Station, another coordinate of the X-ray source is determined when the sources are captured by the collimated field-of-view of the camera. The International Space Station orbits around the Earth every 96</span><span data-dcnode-id="6172" instrument_node="">&nbsp;</span><span data-dcnode-id="6171" instrument_node="">min. During this time, MAXI’s two semicircular (arc-shaped) fields-of-view will scan the whole sky once. MAXI has two types of X-ray slit cameras with wide FOVs and two kinds of X-ray detectors: gas proportional counters covering the energy range of 2–30</span><span data-dcnode-id="6170" instrument_node="">&nbsp;</span><span data-dcnode-id="6169" instrument_node="">keV; and X-ray CCDs, covering the energy range of 0.5–12</span><span data-dcnode-id="6168" instrument_node="">&nbsp;</span><span data-dcnode-id="6167" instrument_node="">keV. MAXI is equipped with 12 counters with a total effective area of 5000</span><span data-dcnode-id="6166" instrument_node="">&nbsp;</span><span data-dcnode-id="6165" instrument_node="">cm</span><sup data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">2</span></sup><span data-dcnode-id="6162" instrument_node="">. The main MAXI scientific objectives include:</span></p><dl class="list" data-dcnode-id="6131"><dt class="list-label" data-dcnode-id="6160"><span data-dcnode-id="6161" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="6157"><p data-dcnode-id="6158" id="p1795"><span data-dcnode-id="6159" instrument_node="">to alert the community to X-ray novae and transient X-ray sources,</span></p></dd><dt class="list-label" data-dcnode-id="6155"><span data-dcnode-id="6156" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="6152"><p data-dcnode-id="6153" id="p1800"><span data-dcnode-id="6154" instrument_node="">to monitor long-term variability of X-ray sources,</span></p></dd><dt class="list-label" data-dcnode-id="6150"><span data-dcnode-id="6151" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="6147"><p data-dcnode-id="6148" id="p1805"><span data-dcnode-id="6149" instrument_node="">to stimulate multi-wavelength observations of variable objects,</span></p></dd><dt class="list-label" data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="6142"><p data-dcnode-id="6143" id="p1810"><span data-dcnode-id="6144" instrument_node="">to create unbiased X-ray source catalogues, and</span></p></dd><dt class="list-label" data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="6132"><p data-dcnode-id="6133" id="p1815"><span data-dcnode-id="6139" instrument_node="">to observe diffuse cosmic X-ray emissions, especially with better energy resolution for soft X-rays down to 0.5</span><span data-dcnode-id="6138" instrument_node="">&nbsp;</span><span data-dcnode-id="6137" instrument_node="">keV (</span><a class="workspace-trigger" data-dcnode-id="6135" href="#b0150" name="bb0150"><span data-dcnode-id="6136" instrument_node="">Matsuoka et al., 2009</span></a><span data-dcnode-id="6134" instrument_node="">).</span></p></dd></dl><p></p><figure class="figure text-xs" data-dcnode-id="6112" id="f0150"><span data-dcnode-id="6120"><img alt="" data-dcnode-id="6129" height="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr30.jpg&amp;raw"><span data-dcnode-id="6128" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6121"><li data-dcnode-id="6122"><a class="anchor download-link u-font-sans" data-dcnode-id="6123" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr30.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6124"><span data-dcnode-id="6127" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6113"><span data-dcnode-id="6114"><p data-dcnode-id="6115" id="sp160"><span class="label" data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">Fig. 30</span></span><span data-dcnode-id="6117" instrument_node="">. </span><span data-dcnode-id="6116" instrument_node="">Photo of the MAXI payload before launch.</span></p></span></span></figure></div><div data-dcnode-id="6081"><p data-dcnode-id="6102" id="p0480"><a class="workspace-trigger" data-dcnode-id="6109" href="#f0155" name="bf0155"><span data-dcnode-id="6110" instrument_node="">Fig. 31</span></a><span data-dcnode-id="6108" instrument_node=""> shows the all-sky image obtained by MAXI/GSC (energy range 4–10</span><span data-dcnode-id="6107" instrument_node="">&nbsp;</span><span data-dcnode-id="6106" instrument_node="">keV) in the period from September 2009 to March 2011 (</span><a class="workspace-trigger" data-dcnode-id="6104" href="#b0125" name="bb0125"><span data-dcnode-id="6105" instrument_node="">Hiroi et al., 2011</span></a><span data-dcnode-id="6103" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="6082" id="f0155"><span data-dcnode-id="6092"><img alt="" data-dcnode-id="6101" height="256" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr31.jpg&amp;raw"><span data-dcnode-id="6100" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6093"><li data-dcnode-id="6094"><a class="anchor download-link u-font-sans" data-dcnode-id="6095" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr31.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6096"><span data-dcnode-id="6099" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6097"><span data-dcnode-id="6098" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6083"><span data-dcnode-id="6084"><p data-dcnode-id="6085" id="sp165"><span class="label" data-dcnode-id="6090"><span data-dcnode-id="6091" instrument_node="">Fig. 31</span></span><span data-dcnode-id="6089" instrument_node="">. </span><span data-dcnode-id="6088" instrument_node="">MAXI all-sky image in the energy range 4–10</span><span data-dcnode-id="6087" instrument_node="">&nbsp;</span><span data-dcnode-id="6086" instrument_node="">keV. The data were obtained in the period September 2009 to March 2011.</span></p></span></span></figure></div></section></section><section data-dcnode-id="5314" id="s0280"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6073"><span data-dcnode-id="6078" instrument_node="">4.4</span><span data-dcnode-id="6076" instrument_node="">. </span><span data-dcnode-id="6074" instrument_node="">Approved Missions in Development and Future Concepts</span></h3><div data-dcnode-id="5904"><p data-dcnode-id="6036" id="p0485"><span data-dcnode-id="6072" instrument_node="">A summary of future missions approved and under development worldwide, of which the Working Group has learned, is presented in this section and summarised in </span><a class="workspace-trigger" data-dcnode-id="6070" href="#t0015" name="bt0015"><span data-dcnode-id="6071" instrument_node="">Table 3</span></a><span data-dcnode-id="6069" instrument_node="">. We include missions under construction or being tested. The WG looks forward to successful execution of all of these missions. We also mention candidate future missions now under study by ESA, NASA and other national space agencies for possible approval for flight. Missions in this latter category and others are discussed in more detail in Section </span><a class="workspace-trigger" data-dcnode-id="6067" href="#s0330" name="bs0330"><span data-dcnode-id="6068" instrument_node="">5</span></a><span data-dcnode-id="6066" instrument_node=""> of this Report in the context of the space programmes of individual nations. </span><a class="workspace-trigger" data-dcnode-id="6064" href="#f0160" name="bf0160"><span data-dcnode-id="6065" instrument_node="">Fig. 32</span></a><span data-dcnode-id="6063" instrument_node=""> is a graphical summary of the following categories of space astronomy missions:</span></p><dl class="list" data-dcnode-id="6037"><dt class="list-label" data-dcnode-id="6061"><span data-dcnode-id="6062" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6058"><p data-dcnode-id="6059" id="p1355"><span data-dcnode-id="6060" instrument_node="">Missions under development with projecte trum X-Gamma-eRosita experiment</span></td></tr><tr class="valign-top" data-dcnode-id="5990"><td class="align-left" data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">Astro-H</span></td><td class="align-left" data-dcnode-id="5991"><span data-dcnode-id="5992" instrument_node="">(JAXA-NASA) X-ray mission for high resolution spectroscopy and hard X-rays</span></td></tr><tr class="valign-top" data-dcnode-id="5985"><td class="align-left" data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">GEMS</span></td><td class="align-left" data-dcnode-id="5986"><span data-dcnode-id="5987" instrument_node="">((NASA) SMEX X-ray polarisation mission</span></td></tr><tr class="valign-top" data-dcnode-id="5978"><td class="align-left" data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">HXMT</span></td><td class="align-left" data-dcnode-id="5979"><span data-dcnode-id="5982" instrument_node="">Hard X-ray Modulation Telescope (1–250</span><span data-dcnode-id="5981" instrument_node="">&nbsp;</span><span data-dcnode-id="5980" instrument_node="">keV)</span></td></tr><tr class="valign-top" data-dcnode-id="5969"><td class="align-left" data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">JWST</span></td><td class="align-left" data-dcnode-id="5970"><span data-dcnode-id="5975" instrument_node="">(NASA/ESA/CSA) Observatory, IR 6.5</span><span data-dcnode-id="5974" instrument_node="">&nbsp;</span><span data-dcnode-id="5973" instrument_node="">m mirror telescope sensitive from 0.6 to 27</span><span data-dcnode-id="5972" instrument_node="">&nbsp;</span><span data-dcnode-id="5971" instrument_node="">μm</span></td></tr><tr class="valign-top" data-dcnode-id="5964"><td class="align-left" data-dcnode-id="5967"><span data-dcnode-id="5968" instrument_node="">SOFIA</span></td><td class="align-left" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Stratospheric Observatory for Infrared Astronomy (NASA-DLR) NASA EXPLORER outcome (selection in progress): several astrophysical Missions relevant for this WG</span></td></tr><tr class="valign-top" data-dcnode-id="5961"><td class="align-left" colspan="2" data-dcnode-id="5962"><br data-dcnode-id="5963"></td></tr><tr class="valign-top" data-dcnode-id="5958"><td class="align-left" colspan="2" data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">ESA CV</span></td></tr><tr class="valign-top" data-dcnode-id="5953"><td class="align-left" data-dcnode-id="5956"><span data-dcnode-id="5957" instrument_node="">M1</span></td><td class="align-left" data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">Solar Orbiter</span></td></tr><tr class="valign-top" data-dcnode-id="5948"><td class="align-left" data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">M2</span></td><td class="align-left" data-dcnode-id="5949"><span data-dcnode-id="5950" instrument_node="">Euclid</span></td></tr><tr class="valign-top" data-dcnode-id="5945"><td class="align-left" colspan="2" data-dcnode-id="5946"><br data-dcnode-id="5947"></td></tr><tr class="valign-top" data-dcnode-id="5940"><td class="align-left" data-dcnode-id="5943"><span data-dcnode-id="5944" instrument_node="">ESA CV- M3</span></td><td class="align-left" data-dcnode-id="5941"><span data-dcnode-id="5942" instrument_node="">Outcome: selection in progress: see chapter 4 for details</span></td></tr><tr class="valign-top" data-dcnode-id="5935"><td class="align-left" data-dcnode-id="5938"><span data-dcnode-id="5939" instrument_node="">WFIRST NASA</span></td><td class="align-left" data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">US 2010 Decadal Survey recommendation</span></td></tr><tr class="valign-top" data-dcnode-id="5930"><td class="align-left" data-dcnode-id="5933"><span data-dcnode-id="5934" instrument_node="">ESA CV-NASA</span></td><td class="align-left" data-dcnode-id="5931"><span data-dcnode-id="5932" instrument_node="">LISA (NGO) or IXO (Athena) to be selected</span></td></tr></tbody></table></div></div><figure class="figure text-xs" data-dcnode-id="5905" id="f0160"><span data-dcnode-id="5916"><img alt="" data-dcnode-id="5925" height="496" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr32.jpg&amp;raw"><span data-dcnode-id="5924" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5917"><li data-dcnode-id="5918"><a class="anchor download-link u-font-sans" data-dcnode-id="5919" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr32.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5920"><span data-dcnode-id="5923" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5906"><span data-dcnode-id="5907"><p data-dcnode-id="5908" id="sp170"><span class="label" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">Fig. 32</span></span><span data-dcnode-id="5913" instrument_node="">. </span><span data-dcnode-id="5912" instrument_node="">Missions under development (Green), Explorer/Medium class missions under selection processes from ESA and NASA (Red) and the Observatory class mission proposed by the NASA Decadal Survey (DS) and the ESA L-Class mission scheduled for a launch in 2021 (Orange). See Section </span><a class="workspace-trigger" data-dcnode-id="5910" href="#s0135" name="bs0135"><span data-dcnode-id="5911" instrument_node="">4.2.2</span></a><span data-dcnode-id="5909" instrument_node=""> for the recent ESA M1/M2 undergoing selection development). (For interpretation of the references to colour in this figure legend, the reader is referred to the web version of this article.)</span></p></span></span></figure></div><p data-dcnode-id="5902" id="p0490"><span data-dcnode-id="5903" instrument_node="">A short description and basic characteristics of these missions and planned launch dates are presented in this section.</span></p><section data-dcnode-id="5863" id="s0285"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5896"><span data-dcnode-id="5901" instrument_node="">4.4.1</span><span data-dcnode-id="5899" instrument_node="">. </span><span data-dcnode-id="5897" instrument_node="">Gaia 3-D mapping of the stars of the Galaxy (ESA)-Launch 2013</span></h4><div data-dcnode-id="5864"><p data-dcnode-id="5884" id="p0495"><span data-dcnode-id="5895" instrument_node="">Gaia is an ambitious mission to chart a three-dimensional map of our Galaxy, the Milky Way, in the process revealing the composition, and evolution of the Galaxy (see </span><a class="workspace-trigger" data-dcnode-id="5893" href="#f0165" name="bf0165"><span data-dcnode-id="5894" instrument_node="">Fig. 33</span></a><span data-dcnode-id="5892" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="5889" href="#fn45" name="bfn45"><sup data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">45</span></sup></a><span data-dcnode-id="5888" instrument_node=""> Gaia will provide unprecedented positional and radial velocity measurements with the accuracies needed to produce a stereoscopic and kinematic census of about one billion stars in our Galaxy and throughout the Local Group. This amounts to about 1% of the Galactic stellar population (</span><a class="workspace-trigger" data-dcnode-id="5886" href="#b0160" name="bb0160"><span data-dcnode-id="5887" instrument_node="">Mignard, 2005</span></a><span data-dcnode-id="5885" instrument_node="">). Combined with astrophysical information for each star, provided by on-board multi-colour photometry, these data will have the precision necessary to quantify the early formation, and subsequent dynamical, chemical and star formation evolution of the Milky Way Galaxy. Additional scientific products include detection and orbital classification of tens of thousands of extra-solar planetary systems, a comprehensive survey of objects ranging from huge numbers of minor bodies in our Solar System, through galaxies in the nearby Universe, to some 500,000 distant quasars. It will also provide a number of stringent new tests of general relativity and cosmology.</span></p><figure class="figure text-xs" data-dcnode-id="5865" id="f0165"><span data-dcnode-id="5874"><img alt="" data-dcnode-id="5883" height="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr33.jpg&amp;raw"><span data-dcnode-id="5882" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5875"><li data-dcnode-id="5876"><a class="anchor download-link u-font-sans" data-dcnode-id="5877" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr33.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5878"><span data-dcnode-id="5881" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5879"><span data-dcnode-id="5880" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5866"><span data-dcnode-id="5867"><p data-dcnode-id="5868" id="sp175"><span class="label" data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Fig. 33</span></span><span data-dcnode-id="5871" instrument_node="">. </span><span data-dcnode-id="5869" instrument_node="">Gaia artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5738" id="s0290"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5857"><span data-dcnode-id="5862" instrument_node="">4.4.2</span><span data-dcnode-id="5860" instrument_node="">. </span><span data-dcnode-id="5858" instrument_node="">ASTROSAT: Launch 2012–2013</span></h4><div data-dcnode-id="5767"><p data-dcnode-id="5786" id="p0500"><span data-dcnode-id="5856" instrument_node="">Multi-wavelength astronomy mission from visible (320-530</span><span data-dcnode-id="5854" instrument_node="">&nbsp;</span><span data-dcnode-id="5852" instrument_node="">nm) to hard X-rays (3–80</span><span data-dcnode-id="5850" instrument_node="">&nbsp;</span><span data-dcnode-id="5848" instrument_node="">keV and 10–150</span><span data-dcnode-id="5846" instrument_node="">&nbsp;</span><span data-dcnode-id="5844" instrument_node="">keV). ASTROSAT</span><a class="workspace-trigger" data-dcnode-id="5841" href="#fn46" name="bfn46"><sup data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">46</span></sup></a><span data-dcnode-id="5840" instrument_node=""> is the first dedicated Indian Astronomy satellite mission, which will enable multi-wavelength observations of celestial bodies and cosmic sources in X-ray and UV spectral bands simultaneously (see </span><a class="workspace-trigger" data-dcnode-id="5838" href="#f0170" name="bf0170"><span data-dcnode-id="5839" instrument_node="">Fig. 34</span></a><span data-dcnode-id="5837" instrument_node="">). The scientific payload covers the visible (3500–6000</span><span data-dcnode-id="5835" instrument_node="">&nbsp;</span><span data-dcnode-id="5833" instrument_node="">A), UV (1300–3000</span><span data-dcnode-id="5831" instrument_node="">&nbsp;</span><span data-dcnode-id="5829" instrument_node="">A), and soft and hard X-ray regimes (0.5–8</span><span data-dcnode-id="5827" instrument_node="">&nbsp;</span><span data-dcnode-id="5825" instrument_node="">keV; 3–80</span><span data-dcnode-id="5823" instrument_node="">&nbsp;</span><span data-dcnode-id="5821" instrument_node="">keV). The uniqueness of ASTROSAT lies in this wide spectral coverage. There are four co-aligned instruments and an all-sky monitor. The all-sky monitor is very similar to the RXTE-ASM. The co-aligned instruments are:</span></p><dl class="list" data-dcnode-id="5787"><dt class="list-label" data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5812"><p data-dcnode-id="5813" id="p1380"><span data-dcnode-id="5818" instrument_node="">Soft X-ray Telescope (SXT): X-ray Mirror</span><span data-dcnode-id="5817" instrument_node="">&nbsp;</span><span data-dcnode-id="5816" instrument_node="">+</span><span data-dcnode-id="5815" instrument_node="">&nbsp;</span><span data-dcnode-id="5814" instrument_node="">CCD, similar to one ASCA-SIS.</span></p></dd><dt class="list-label" data-dcnode-id="5810"><span data-dcnode-id="5811" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5805"><p data-dcnode-id="5806" id="p1385"><span data-dcnode-id="5809" instrument_node="">Large Area Xenon Proportional Counter (LAXPC): Three large area proportional counters, geometric area same as the original RXTE-PCA, but with a larger detection efficiency for hard X-rays and 40% efficiency at 80</span><span data-dcnode-id="5808" instrument_node="">&nbsp;</span><span data-dcnode-id="5807" instrument_node="">keV</span></p></dd><dt class="list-label" data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5793"><p data-dcnode-id="5794" id="p1390"><span data-dcnode-id="5802" instrument_node="">CZT Imager (CZTI): A pixelated CZT detector with a CAM. Total area 1000</span><span data-dcnode-id="5801" instrument_node="">&nbsp;</span><span data-dcnode-id="5800" instrument_node="">cm</span><sup data-dcnode-id="5798"><span data-dcnode-id="5799" instrument_node="">2</span></sup><span data-dcnode-id="5797" instrument_node="">, field of view of 8</span><span data-dcnode-id="5796" instrument_node="">&nbsp;</span><span data-dcnode-id="5795" instrument_node="">degree.</span></p></dd><dt class="list-label" data-dcnode-id="5791"><span data-dcnode-id="5792" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5788"><p data-dcnode-id="5789" id="p1395"><span data-dcnode-id="5790" instrument_node="">UV Imaging Telescope (UVIT): A pair of telescopes with three bands available simultaneously, near-UV, far-UV and optical.</span></p></dd></dl><p></p><figure class="figure text-xs" data-dcnode-id="5768" id="f0170"><span data-dcnode-id="5776"><img alt="" data-dcnode-id="5785" height="209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr34.jpg&amp;raw"><span data-dcnode-id="5784" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5777"><li data-dcnode-id="5778"><a class="anchor download-link u-font-sans" data-dcnode-id="5779" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr34.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5780"><span data-dcnode-id="5783" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5769"><span data-dcnode-id="5770"><p data-dcnode-id="5771" id="sp180"><span class="label" data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">Fig. 34</span></span><span data-dcnode-id="5773" instrument_node="">. </span><span data-dcnode-id="5772" instrument_node="">ASTROSAT artist’s concept.</span></p></span></span></figure></div><p data-dcnode-id="5744" id="p0505"><span data-dcnode-id="5766" instrument_node="">The LAXPC and UVIT are the main instruments of ASTROSAT. The scientific outcome of ASTROSAT will mainly be in the following areas:</span></p><dl class="list" data-dcnode-id="5745"><dt class="list-label" data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="5761"><p data-dcnode-id="5762" id="p1820"><span data-dcnode-id="5763" instrument_node="">X-ray timing, especially hard X-ray timing (high frequency QPOs from BHC, etc.).</span></p></dd><dt class="list-label" data-dcnode-id="5759"><span data-dcnode-id="5760" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="5756"><p data-dcnode-id="5757" id="p1825"><span data-dcnode-id="5758" instrument_node="">Broad band spectroscopy with emphasis on hard X-rays (Cyclotron line, reflection component in BHCs/AGNs etc.).</span></p></dd><dt class="list-label" data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="5751"><p data-dcnode-id="5752" id="p1830"><span data-dcnode-id="5753" instrument_node="">Simultaneous multi-wavelength studies.</span></p></dd><dt class="list-label" data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="5746"><p data-dcnode-id="5747" id="p1835"><span data-dcnode-id="5748" instrument_node="">Diffuse UV studies (the UVIT has a sensitivity similar to GALEX but with higher angular resolution).</span></p></dd></dl><p></p><p data-dcnode-id="5739"><span data-dcnode-id="5743" instrument_node="">ASTROSAT is scheduled for a launch in the window from the end of 2012 to the beginning of 2013 (</span><a class="workspace-trigger" data-dcnode-id="5741" href="#b0145" name="bb0145"><span data-dcnode-id="5742" instrument_node="">Manchanda, 2011</span></a><span data-dcnode-id="5740" instrument_node="">).</span></p></section><section data-dcnode-id="5657" id="s0295"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5732"><span data-dcnode-id="5737" instrument_node="">4.4.3</span><span data-dcnode-id="5735" instrument_node="">. </span><span data-dcnode-id="5733" instrument_node="">NuSTAR Nuclear Spectroscopic Telescope Array (NuSTAR) : launch 2012</span></h4><div data-dcnode-id="5707"><p data-dcnode-id="5727" id="p0515"><span data-dcnode-id="5731" instrument_node="">The Nuclear Spectroscopic Telescope Array is a NASA Explorer mission that will allow astronomers to study the universe in high energy X-rays (see </span><a class="workspace-trigger" data-dcnode-id="5729" href="#f0175" name="bf0175"><span data-dcnode-id="5730" instrument_node="">Fig. 35</span></a><span data-dcnode-id="5728" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5708" id="f0175"><span data-dcnode-id="5717"><img alt="" data-dcnode-id="5726" height="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr35.jpg&amp;raw"><span data-dcnode-id="5725" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5718"><li data-dcnode-id="5719"><a class="anchor download-link u-font-sans" data-dcnode-id="5720" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr35.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5721"><span data-dcnode-id="5724" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5709"><span data-dcnode-id="5710"><p data-dcnode-id="5711" id="sp185"><span class="label" data-dcnode-id="5715"><span data-dcnode-id="5716" instrument_node="">Fig. 35</span></span><span data-dcnode-id="5714" instrument_node="">. </span><span data-dcnode-id="5712" instrument_node="">NuSTAR artist’s concept.</span></p></span></span></figure></div><p data-dcnode-id="5689" id="p0520"><span data-dcnode-id="5706" instrument_node="">Launching in 2012, NuSTAR will be the first focusing hard X-ray telescope to orbit Earth and is expected to greatly exceed the performance of the largest “ground based” observatories that have observed the high energy sky. NuSTAR will also complement astrophysics missions that explore the cosmos in other regions of the spectrum. X-ray telescopes such as Chandra and XMM-Newton have observed the X-ray universe at low X-ray energy levels. By focusing higher energy X-rays, NuSTAR will start to answer several fundamental questions about the Universe including:</span></p><dl class="list" data-dcnode-id="5690"><dt class="list-label" data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5701"><p data-dcnode-id="5702" id="p1400"><span data-dcnode-id="5703" instrument_node="">How are black holes distributed through the cosmos?</span></p></dd><dt class="list-label" data-dcnode-id="5699"><span data-dcnode-id="5700" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5696"><p data-dcnode-id="5697" id="p1405"><span data-dcnode-id="5698" instrument_node="">How were heavy elements forged in the explosions of massive stars?</span></p></dd><dt class="list-label" data-dcnode-id="5694"><span data-dcnode-id="5695" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5691"><p data-dcnode-id="5692" id="p1410"><span data-dcnode-id="5693" instrument_node="">What powers the most extreme active galaxies?</span></p></dd></dl><p></p><p data-dcnode-id="5666"><span data-dcnode-id="5688" instrument_node="">NuSTAR’s primary science objectives include:</span></p><dl class="list" data-dcnode-id="5667"><dt class="list-label" data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5683"><p data-dcnode-id="5684" id="p1415"><span data-dcnode-id="5685" instrument_node="">Conducting a census for black holes on all scales using wide-field surveys of extragalactic fields and the Galactic center.</span></p></dd><dt class="list-label" data-dcnode-id="5681"><span data-dcnode-id="5682" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5678"><p data-dcnode-id="5679" id="p1420"><span data-dcnode-id="5680" instrument_node="">Mapping radioactive material in young supernova remnants.</span></p></dd><dt class="list-label" data-dcnode-id="5676"><span data-dcnode-id="5677" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5673"><p data-dcnode-id="5674" id="p1425"><span data-dcnode-id="5675" instrument_node="">Studying the birth of the elements and to understand how stars explode.</span></p></dd><dt class="list-label" data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5668"><p data-dcnode-id="5669" id="p1430"><span data-dcnode-id="5670" instrument_node="">Observing relativistic jets found in the most extreme active galaxies and to understand what powers giant cosmic accelerators.</span></p></dd></dl><p></p><p data-dcnode-id="5658" id="p0525"><span data-dcnode-id="5665" instrument_node="">NuSTAR will also study the origin of cosmic rays and the extreme physics around collapsed stars while responding to targets of opportunity including supernovae and </span><em data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">γ</span></em><span data-dcnode-id="5662" instrument_node="">-ray bursts. NuSTAR will perform follow-up observations to discoveries made by Chandra and Spitzer, and will team with Fermi, making simultaneous observations which will greatly enhance Fermi’s science return (</span><a class="workspace-trigger" data-dcnode-id="5660" href="#b0120" name="bb0120"><span data-dcnode-id="5661" instrument_node="">Harrison et al., 2010</span></a><span data-dcnode-id="5659" instrument_node="">).</span></p></section><section data-dcnode-id="5602" id="s0300"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5651"><span data-dcnode-id="5656" instrument_node="">4.4.4</span><span data-dcnode-id="5654" instrument_node="">. </span><span data-dcnode-id="5652" instrument_node="">The Spectrum Roentgen-Gamma (SRG) – eRosita experiment: Launch 2012</span></h4><div data-dcnode-id="5603"><p data-dcnode-id="5623" id="p0535"><span data-dcnode-id="5650" instrument_node="">Spectrum-RG is a Russian – Germany X-ray astrophysical observatory. Germany is responsible for the development of the key mission instrument – the X-ray grazing-incident mirror telescope, eROSITA, mounted on the optical bench of the SRG satellite, shown in </span><a class="workspace-trigger" data-dcnode-id="5648" href="#f0180" name="bf0180"><span data-dcnode-id="5649" instrument_node="">Fig. 36</span></a><span data-dcnode-id="5647" instrument_node="">. The second experiment is ART-XC, an X-ray mirror telescope with a harder response than eROSITA, which is being developed by Russia (IKI, Moscow and VNIIEF, Sarov). The scientific payload is housed on the Navigator bus, developed by Lavochkin Association (Russia). Spectrum-RG will be delivered to the L2 point with use of the Soyuz-2 rocket and Fregat booster. The total mass of the SRG is about 2200</span><span data-dcnode-id="5645" instrument_node="">&nbsp;</span><span data-dcnode-id="5643" instrument_node="">kg. The SRG mission will be launched in 2012 from Baikonur and the observational programme will last 7</span><span data-dcnode-id="5641" instrument_node="">&nbsp;</span><span data-dcnode-id="5639" instrument_node="">years. The first 4</span><span data-dcnode-id="5637" instrument_node="">&nbsp;</span><span data-dcnode-id="5635" instrument_node="">years will be devoted to an all-sky survey, and the rest of the mission lifetime will be spent on follow-on pointed observations of a selection of the most interesting galaxy clusters and AGNs (</span><a class="workspace-trigger" data-dcnode-id="5633" href="#b0080" name="bb0080"><span data-dcnode-id="5634" instrument_node="">Cappelluti et al., 2011</span></a><span data-dcnode-id="5632" instrument_node="">). The mission will conduct an all-sky survey in the 0.5–11</span><span data-dcnode-id="5630" instrument_node="">&nbsp;</span><span data-dcnode-id="5628" instrument_node="">keV band with the imaging telescopes eROSITA and ART-XC. It will permit the discovery of all obscured accreting black holes in nearby galaxies, many (millions) of new distant AGNs, and the detection of all massive clusters of galaxies in the Universe. In addition to the all-sky survey, dedicated sky regions will be observed with higher sensitivity, and thereafter follow-on pointed observations of selected sources at energies up to 30</span><span data-dcnode-id="5626" instrument_node="">&nbsp;</span><span data-dcnode-id="5624" instrument_node="">keV will take place in order to investigate the nature of dark matter, dark energy and the physics of accretion.</span></p><figure class="figure text-xs" data-dcnode-id="5604" id="f0180"><span data-dcnode-id="5613"><img alt="" data-dcnode-id="5622" height="266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr36.jpg&amp;raw"><span data-dcnode-id="5621" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5614"><li data-dcnode-id="5615"><a class="anchor download-link u-font-sans" data-dcnode-id="5616" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0273117712001755-gr36.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5617"><span data-dcnode-id="5620" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5605"><span data-dcnode-id="5606"><p data-dcnode-id="5607" id="sp190"><span class="label" data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">Fig. 36</span></span><span data-dcnode-id="5610" instrument_node="">. </span><span data-dcnode-id="5608" instrument_node="">Spectrum RG artist’s concept.</span></p></span></span></figure></div></section><section data-dcnode-id="5563" id="s0305"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5596"><span data-dcnode-id="5601" instrument_node="">4.4.5</span><span data-dcnode-id="5599" instrument_node="">. </span><span data-dcnode-id="5597" instrument_node="">Astro-H: Launch: 2014</span></h4><div data-dcnode-id="5564"><p data-dcnode-id="5584" id="p0540"><span data-dcnode-id="5595" instrument_node="">Astro-H is a powerful observatory being developed by the Japan Aerospace Exploration Agency (JAXA) for studying extremely energetic processes in the universe (see </span><a class="workspace-trigger" data-dcnode-id="5593" href="#f0185" name="bf0185"><span data-dcnode-id="5594" instrument_node="">Fig. 37</span></a><span data-dcnode-id="5592" instrument_node="">). NASA and the JAXA/Institute of Space and Astronautical Science have teamed up to develop a high resolution “Soft X-Ray Spectrometer” (SXS) for Astro-H. SXS, with its unprecedented sensitivity for high-resolution X-ray spectroscopy, will perform a wide variety of breakthrough science investigations directly aligned with NASA goals. SXS will test theories of structure formation by measuring the velocity field of X-ray-emitting gas in clusters of galaxies and the energy output from the jets and winds of active galaxies. SXS will accurately measure metal abundances in the oldest galaxies, providing unique information about the origin of the elements. SXS will observe matter in extreme gravitational fields, obtaining time-resolved spectra from material approaching the event horizon of a black hole. SXS will d
