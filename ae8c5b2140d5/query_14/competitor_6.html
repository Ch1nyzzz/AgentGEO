</span><b data-dcnode-id="1142"><svg data-dcnode-id="1144" fill="currentColor" height="21" style="float: left;margin-right: 10px;" viewBox="0 0 16 16" width="21" xmlns="http://www.w3.org/2000/svg"><path d="M10 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm6 5c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z" data-dcnode-id="1146" fill-rule="evenodd"></path></svg><span data-dcnode-id="1145" instrument_node="">

        </span><p data-dcnode-id="1124"><span data-dcnode-id="1125"><span data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">Galileo was a </span><b data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">natural philosopher, astronomer, and mathematician</span></b><span data-dcnode-id="1127" instrument_node=""> who made fundamental contributions to the sciences of motion, astronomy, and strength of materials and to the development of the scientific method. He also made revolutionary telescopic discoveries, including the four largest moons of Jupiter.</span></span></span></p><span data-dcnode-id="1123" instrument_node="">
</span><span data-dcnode-id="1121" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2283524179149477" data-ad-format="auto" data-ad-slot="6725593823" data-dcnode-id="1120" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1119" instrument_node="">
</span><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">What was Galileo famous for?</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">Of all of his </span><b data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">telescope discoveries</span></b><span data-dcnode-id="1109" instrument_node="">, he is perhaps most known for his discovery of the four most massive moons of Jupiter, now known as the Galilean moons: Io, Ganymede, Europa and Callisto. When NASA sent a mission to Jupiter in the 1990s, it was called Galileo in honor of the famed astronomer.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">
</span></p><h2 data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">What 3 things did Galileo discover?</span></h2><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1102"></p><div data-dcnode-id="1099"><b data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">What did Galileo discover?</span></b></div><span data-dcnode-id="1098" instrument_node="">
</span><div data-dcnode-id="1076"><span data-dcnode-id="1097" instrument_node="">
</span><ul data-dcnode-id="1080"><span data-dcnode-id="1096" instrument_node="">
</span><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Craters and mountains on the Moon. The Moon's surface was not smooth and perfect as received wisdom had claimed but rough, with mountains and craters whose shadows changed with the position of the Sun. ... </span></li><span data-dcnode-id="1093" instrument_node="">
</span><li data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">The phases of Venus. ... </span></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Jupiter's moons. ... </span></li><span data-dcnode-id="1087" instrument_node="">
</span><li data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The stars of the Milky Way. ... </span></li><span data-dcnode-id="1084" instrument_node="">
</span><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">The first pendulum clock.</span></li><span data-dcnode-id="1081" instrument_node="">
</span></ul><span data-dcnode-id="1079" instrument_node="">
</span><div data-dcnode-id="1078"></div><span data-dcnode-id="1077" instrument_node="">
</span></div><p data-dcnode-id="1075"></p><span data-dcnode-id="1074" instrument_node="">
</span><h2 data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">What was Galileo first to do?</span></h2><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">In 1609 Galileo </span><b data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">built his first telescope</span></b><span data-dcnode-id="1067" instrument_node="">, improving upon a Dutch design. In January of 1610 he discovered four new “stars” orbiting Jupiter—the planet's four largest moons.</span></p><span data-dcnode-id="1065" instrument_node="">

</span><p data-dcnode-id="1061"></p><div data-dcnode-id="1058"><b data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">10 Major Accomplishments of Galileo Galilei</span></b></div><span data-dcnode-id="1057" instrument_node="">

</span><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">#2 Galileo invented a forerunner to the modern thermometer. ... </span></li><span data-dcnode-id="1049" instrument_node="">
</span><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">#3 He is credited with the invention of an improved military compass. ... </span></li><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">#4 Galileo discovered that pendulums were isochronous.</span></li><span data-dcnode-id="1043" instrument_node="">

</span><h3 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Who is the father of science?</span></h3><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="486"><b data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Galileo Galilei</span></b><span data-dcnode-id="487" instrument_node=""> pioneered the experimental scientific method and was the first to use a refracting telescope to make important astronomical discoveries. He is often referred to as the “father of modern astronomy” and the “father of modern physics”. Albert Einstein called Galileo the “father of modern science.”</span></p><span data-dcnode-id="485" instrument_node="">

</span><div data-dcnode-id="472"><span data-dcnode-id="482" instrument_node="">
</span><h3 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">What did Galileo contribute to society?</span></h3><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">Galileo was a natural philosopher, astronomer, and mathematician who made fundamental contributions to the </span><b data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">sciences of motion, astronomy, and strength of materials</span></b><span data-dcnode-id="475" instrument_node=""> and to the development of the scientific method. He also made revolutionary telescopic discoveries, including the four largest moons of Jupiter.</span></p><span data-dcnode-id="473" instrument_node="">
</span></div><span data-dcnode-id="471" instrument_node="">
</span><div data-dcnode-id="434"><span data-dcnode-id="470" instrument_node="">
</span><h3 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">What are three interesting facts about Galileo?</span></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="466"></p><div data-dcnode-id="463"><b data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">8 Things You May Not Know About Galileo</span></b></div><span data-dcnode-id="462" instrument_node="">
</span><div data-dcnode-id="437"><span data-dcnode-id="461" instrument_node="">
</span><ul data-dcnode-id="441"><span data-dcnode-id="460" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">He was a college dropout. ... </span></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">He didn't invent the telescope. ... </span></li><span data-dcnode-id="454" instrument_node="">
</span><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">His daughters were nuns. ... </span></li><span data-dcnode-id="451" instrument_node="">
</span><li data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">9 Things You May Not Know About Isaac Newton.</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Galileo was sentenced to life in prison by the Roman Inquisition. ... </span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">He spent his final years under house arrest.</span></li><span data-dcnode-id="442" instrument_node="">
</span></ul><span data-dcnode-id="440" instrument_node="">
</span><div data-dcnode-id="439"></div><span data-dcnode-id="438" instrument_node="">
</span></div><p data-dcnode-id="436"></p><span data-dcnode-id="435" instrument_node="">
</span></div><span data-dcnode-id="433" instrument_node="">
</span><div data-dcnode-id="422"><span data-dcnode-id="432" instrument_node="">
</span><h3 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Is Galileo religious?</span></h3><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Galileo suffered through the humiliation of having to deny his theories in order to save his life. </span><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">He was Catholic</span></b><span data-dcnode-id="425" instrument_node="">, believed in God, but, on the other hand, he was a great believer in the role of science and the fascinating beauty of God's creation.</span></p><span data-dcnode-id="423" instrument_node="">
</span></div><span data-dcnode-id="421" instrument_node="">
</span><div data-dcnode-id="411"><span data-dcnode-id="420" instrument_node="">
</span><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Who first discovered heliocentrism?</span></h3><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="413"><b data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Nicolaus Copernicus</span></b><span data-dcnode-id="414" instrument_node=""> was a Polish astronomer known as the father of modern astronomy. He was the first modern European scientist to propose that Earth and other planets revolve around the sun, or the Heliocentric Theory of the universe.</span></p><span data-dcnode-id="412" instrument_node="">
</span></div><span data-dcnode-id="410" instrument_node="">
</span><span data-dcnode-id="408" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2283524179149477" data-ad-format="auto" data-ad-slot="2970181644" data-dcnode-id="407" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="406" instrument_node="">
</span><span data-dcnode-id="403" instrument_node="">
</span><div data-dcnode-id="395"><span data-dcnode-id="402" instrument_node="">
</span><h3 data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Who discovered Earth?</span></h3><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">By around 500 B.C., most ancient Greeks believed that Earth was round, not flat. But they had no idea how big the planet is until about 240 B.C., when Eratosthenes devised a clever method of estimating its circumference.</span></p><span data-dcnode-id="396" instrument_node="">
</span></div><span data-dcnode-id="394" instrument_node="">
</span><div data-dcnode-id="383"><span data-dcnode-id="393" instrument_node="">
</span><h3 data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Who discovered the Moon?</span></h3><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="389" instrument_node="">Earth's only natural satellite is simply called "the Moon" because people didn't know other moons existed until </span><b data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Galileo Galilei</span></b><span data-dcnode-id="386" instrument_node=""> discovered four moons orbiting Jupiter in 1610.</span></p><span data-dcnode-id="384" instrument_node="">
</span></div><span data-dcnode-id="382" instrument_node="">
</span><div data-dcnode-id="371"><span data-dcnode-id="381" instrument_node="">
</span><h3 data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">What did Galileo say about gravity?</span></h3><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">According to legend, Galileo dropped weights off of the Leaning Tower of Pisa, </span><b data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">showing that gravity causes objects of different masses to fall with the same acceleration</span></b><span data-dcnode-id="374" instrument_node="">. In recent years, researchers have taken to replicating this test in a way that the Italian scientist probably never envisioned — by dropping atoms.</span></p><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
</span><div data-dcnode-id="359"><span data-dcnode-id="369" instrument_node="">
</span><h3 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">How accurate are Galileo thermometers?</span></h3><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="365" instrument_node="">The Galileo thermometer is a decorative instrument that measures ambient temperature, and unlike the Fitzroy storm glass—</span><b data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">it is reasonably accurate</span></b><span data-dcnode-id="362" instrument_node="">. We think it's an excellent option for those looking for a unique gift for a weather enthusiast.</span></p><span data-dcnode-id="360" instrument_node="">
</span></div><span data-dcnode-id="358" instrument_node="">
</span><div data-dcnode-id="347"><span data-dcnode-id="357" instrument_node="">
</span><h3 data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">How does Galileo affect us today?</span></h3><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="353" instrument_node="">The scientist's </span><b data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">discoveries and theories laid the foundation for modern physics and astronomy</span></b><span data-dcnode-id="350" instrument_node="">. Galileo's contributions to the fields of astronomy, physics, mathematics, and philosophy have led many to call him the father of modern science.</span></p><span data-dcnode-id="348" instrument_node="">
</span></div><span data-dcnode-id="346" instrument_node="">
</span><span data-dcnode-id="344" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-2283524179149477" data-ad-format="auto" data-ad-slot="1657099973" data-dcnode-id="343" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="342" instrument_node="">
</span><span data-dcnode-id="339" instrument_node="">
</span><div data-dcnode-id="328"><span data-dcnode-id="338" instrument_node="">
</span><h3 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">What Galileo said about God?</span></h3><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">The quote: </span><b data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">I do not feel obliged to believe that the same God who has endowed us with sense, reason, and intellect has intended us to forgo their use</span></b><span data-dcnode-id="331" instrument_node=""> and by some other means to give us knowledge which we can attain by them.</span></p><span data-dcnode-id="329" instrument_node="">
</span></div><span data-dcnode-id="327" instrument_node="">
</span><div data-dcnode-id="316"><span data-dcnode-id="326" instrument_node="">
</span><h3 data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Who proved Galileo right?</span></h3><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="322" instrument_node="">At a ceremony in Rome, before the Pontifical Academy of Sciences, </span><b data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Pope John Paul II</span></b><span data-dcnode-id="319" instrument_node=""> officially declared that Galileo was right. The formal rehabilitation was based on the findings of a committee of the Academy the Pope set up in 1979, soon after taking office.</span></p><span data-dcnode-id="317" instrument_node="">
</span></div><span data-dcnode-id="315" instrument_node="">
</span><div data-dcnode-id="304"><span data-dcnode-id="314" instrument_node="">
</span><h3 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">What is a fun fact about Galileo?</span></h3><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="310" instrument_node="">1. Galileo Galilei was born in Pisa, Italy, on the 15th of February 1564, he died on the 8th of January 1642. 2. </span><b data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Galileo firmly believed that the Earth was not the centre of the universe</span></b><span data-dcnode-id="307" instrument_node="">, however he did not believe in his Kepler's theory that the moon caused the tides.</span></p><span data-dcnode-id="305" instrument_node="">
</span></div><span data-dcnode-id="303" instrument_node="">
</span><div data-dcnode-id="292"><span data-dcnode-id="302" instrument_node="">
</span><h3 data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">What was Albert Einstein's contribution to society?</span></h3><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="298" instrument_node="">In addition to his work on relativity, the physicist laid the scientific foundations for paper towels, lasers, and more common products. Albert Einstein is justly famous for devising his </span><b data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">theory of relativity</span></b><span data-dcnode-id="295" instrument_node="">, which revolutionized our understanding of space, time, gravity, and the universe.</span></p><span data-dcnode-id="293" instrument_node="">
</span></div><span data-dcnode-id="291" instrument_node="">
</span><div data-dcnode-id="280"><span data-dcnode-id="290" instrument_node="">
</span><h3 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">How did Galileo contribute to math?</span></h3><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">In 1589, Galileo was named professor of mathematics at the University of Pisa. Here he conducted </span><b data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">a very public experiment that disproved at least one tenet</span></b><span data-dcnode-id="283" instrument_node=""> of Aristotelian physics. ... The more progressive University of Padua appointed Galileo professor of mathematics in 1592, a post he held for eighteen years.</span></p><span data-dcnode-id="281" instrument_node="">
</span></div><span data-dcnode-id="279" instrument_node="">
</span><div data-dcnode-id="268"><span data-dcnode-id="278" instrument_node="">
</span><h3 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Who named science?</span></h3><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">Although, we do know that it was </span><b data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">philosopher William Whewell</span></b><span data-dcnode-id="271" instrument_node=""> who first coined the term 'scientist. ' Prior to that, scientists were called 'natural philosophers'.” Whewell coined the term in 1833, said my friend Debbie Lee.</span></p><span data-dcnode-id="269" instrument_node="">
</span></div><span data-dcnode-id="267" instrument_node="">
</span><div data-dcnode-id="256"><span data-dcnode-id="266" instrument_node="">
</span><h3 data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Who is the king of science?</span></h3><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="262" instrument_node="">Answer: </span><b data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Physics</span></b><span data-dcnode-id="259" instrument_node=""> is the king of science ....</span></p><span data-dcnode-id="257" instrument_node="">
