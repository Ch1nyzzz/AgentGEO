</span><p data-dcnode-id="1841" style="text-align: justify;"><span data-dcnode-id="1842" style="font-size: 14pt;"><span data-dcnode-id="1843" instrument_node="">The television is likely an outstanding invention of the 20th Century. However, the invention of televios has not come in a day. In this article, I am going to talk about television invention.</span></span></p><span data-dcnode-id="1840" instrument_node="">
</span><h2 data-dcnode-id="1838" style="text-align: justify;"><span data-dcnode-id="1839" instrument_node="">Television invention</span></h2><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1830" style="text-align: justify;"><span data-dcnode-id="1835" style="font-size: 14pt;"><span data-dcnode-id="1836" instrument_node="">It has to turn into some of the frequent methods people view the bigger world past them, in addition to being among the finest methods for people to flee from the world with television invention.</span></span><br data-dcnode-id="1834"><br data-dcnode-id="1833"><span data-dcnode-id="1831" style="font-size: 14pt;"><span data-dcnode-id="1832" instrument_node="">In the 1880s a German inventor created simplistic shifting photos utilizing a filtered light considered by means of a spinning disk, laying the foundations for the modern tv through a continuous process of television invention. </span></span></p><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1818" style="text-align: justify;"><span data-dcnode-id="1827" style="font-size: 14pt;"><span data-dcnode-id="1828" instrument_node="">During the 1920s numerous scientists started experimenting with sending nonetheless photos utilizing radio waves. However, it was in 1928 that General Electric first mixed the concept of a tool that would present shifting photos with the technology to wirelessly broadcast them as a part of television invention.</span></span><br data-dcnode-id="1826"><br data-dcnode-id="1825"><span data-dcnode-id="1823" style="font-size: 14pt;"><span data-dcnode-id="1824" instrument_node="">During the 30s and 40s, the technology was steadily improved upon. In America, the first regular broadcasts started in 1939 although it was not till after the Second World War that the tv as standard dwelling equipment started to actually take off. After 1945 tv gross sales in America skyrocketed. The first color broadcast was made in 1954.</span></span><br data-dcnode-id="1822"><br data-dcnode-id="1821"><span data-dcnode-id="1819" style="font-size: 14pt;"><span data-dcnode-id="1820" instrument_node="">Throughout the remainder of the world, tv got here years later, and it wasn’t till the late 1960s {that a} tv was commonplace in homes all through the West. By the 1970s, tv had turned into the dominant media pressure it’s immediately, with 24-hour programming, mass promoting, and syndicated exhibits and television invention.</span></span></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1814" style="text-align: justify;"><span data-dcnode-id="1815" style="font-size: 14pt;"><span data-dcnode-id="1816" instrument_node="">In the 1980s satellite TV shrunk the world, making dwell feeds from different nations and time zones possible. The new millennium introduced the appearance of digital tv, which is the way forward on the basis of television invention and its development.</span></span></p><span data-dcnode-id="1813" instrument_node="">

</span><table data-dcnode-id="708" style="border-collapse: collapse; width: 0%; height: 3362px;"><tbody data-dcnode-id="710"><tr data-dcnode-id="1787" style="height: 28px;"><td data-dcnode-id="1794" style="width: 14.467%; text-align: center; height: 28px;"><span data-dcnode-id="1795" style="font-size: 14pt;"><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Timeline</span></strong></span></td><td data-dcnode-id="1789" style="width: 85.533%; text-align: center; height: 28px;"><span data-dcnode-id="1790" style="font-size: 14pt;"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Event</span></strong></span></td></tr><tr data-dcnode-id="1776" style="height: 24px;"><td data-dcnode-id="1782" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1783" style="font-size: 14pt;"><span data-dcnode-id="1784" instrument_node="">1831</span></span></td><td data-dcnode-id="1778" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1779" style="font-size: 14pt;"><span data-dcnode-id="1780" instrument_node="">Joseph Henry’s and Michael Faraday’s work with electromagnetism jumpstarts the era of electronic communication.</span></span></td></tr><tr data-dcnode-id="1765" style="height: 24px;"><td data-dcnode-id="1771" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1772" style="font-size: 14pt;"><span data-dcnode-id="1773" instrument_node="">1862</span></span></td><td data-dcnode-id="1767" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1768" style="font-size: 14pt;"><span data-dcnode-id="1769" instrument_node="">Abbe Giovanna Caselli invents his Pantelegraph and becomes the first person to transmit a still image over wires.</span></span></td></tr><tr data-dcnode-id="1754" style="height: 24px;"><td data-dcnode-id="1760" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1761" style="font-size: 14pt;"><span data-dcnode-id="1762" instrument_node="">1873</span></span></td><td data-dcnode-id="1756" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1757" style="font-size: 14pt;"><span data-dcnode-id="1758" instrument_node="">Scientist Willoughby Smith experiments with selenium and light, revealing the possibility for inventors to transform images into electronic signals.</span></span></td></tr><tr data-dcnode-id="1736" style="height: 120px;"><td data-dcnode-id="1749" style="width: 14.467%; height: 120px; text-align: center;"><span data-dcnode-id="1750" style="font-size: 14pt;"><span data-dcnode-id="1751" instrument_node="">1876</span></span></td><td data-dcnode-id="1738" style="width: 85.533%; height: 120px;"><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" style="font-size: 14pt;"><span data-dcnode-id="1746" instrument_node="">Boston civil servant George Carey was thinking about complete television systems and in 1877 he put forward drawings for what he called a selenium camera that would allow people to see by electricity.</span></span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" style="font-size: 14pt;"><span data-dcnode-id="1742" instrument_node="">Eugen Goldstein coins the term “cathode rays” to describe the light emitted when an electric current was forced through a vacuum tube.</span></span></p><span data-dcnode-id="1739" instrument_node="">
</span></td></tr><tr data-dcnode-id="1725" style="height: 24px;"><td data-dcnode-id="1731" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1732" style="font-size: 14pt;"><span data-dcnode-id="1733" instrument_node="">The Late 1870s</span></span></td><td data-dcnode-id="1727" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1728" style="font-size: 14pt;"><span data-dcnode-id="1729" instrument_node="">Scientists and engineers like Valeria Correa Vaz de Paiva, Louis Figuier, and Constantin Senlecq were suggesting alternative designs for telectroscopes.</span></span></td></tr><tr data-dcnode-id="1703" style="height: 136px;"><td data-dcnode-id="1720" style="width: 14.467%; height: 136px; text-align: center;"><span data-dcnode-id="1721" style="font-size: 14pt;"><span data-dcnode-id="1722" instrument_node="">1880</span></span></td><td data-dcnode-id="1705" style="width: 85.533%; height: 136px;"><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" style="font-size: 14pt;"><span data-dcnode-id="1717" instrument_node="">Inventors Alexander Graham Bell and Thomas Edison theorize about telephone devices that transmit image as well as sound.</span></span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" style="font-size: 14pt;"><span data-dcnode-id="1713" instrument_node="">Bell’s photophone used light to transmit sound and he wanted to advance his device for image sending.</span></span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" style="font-size: 14pt;"><span data-dcnode-id="1709" instrument_node="">George Carey builds a rudimentary system with light-sensitive cells.</span></span></p><span data-dcnode-id="1706" instrument_node="">
</span></td></tr><tr data-dcnode-id="1692" style="height: 24px;"><td data-dcnode-id="1698" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1699" style="font-size: 14pt;"><span data-dcnode-id="1700" instrument_node="">1881</span></span></td><td data-dcnode-id="1694" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1695" style="font-size: 14pt;"><span data-dcnode-id="1696" instrument_node="">Sheldon Bidwell experiments with his telephotography that was similar to Bell’s photophone.</span></span></td></tr><tr data-dcnode-id="1681" style="height: 24px;"><td data-dcnode-id="1687" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1688" style="font-size: 14pt;"><span data-dcnode-id="1689" instrument_node="">1884</span></span></td><td data-dcnode-id="1683" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1684" style="font-size: 14pt;"><span data-dcnode-id="1685" instrument_node="">Paul Nipkow sends images over wires using a rotating metal disk technology calling it the electric telescope with 18 lines of resolution.</span></span></td></tr><tr data-dcnode-id="1663" style="height: 24px;"><td data-dcnode-id="1676" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1677" style="font-size: 14pt;"><span data-dcnode-id="1678" instrument_node="">1900</span></span></td><td data-dcnode-id="1665" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" style="font-size: 14pt;"><span data-dcnode-id="1673" instrument_node="">At the World’s Fair in Paris, the First International Congress of Electricity was held. That is where Russian Constantin Perskyi made the first known use of the word “television.”</span></span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" style="font-size: 14pt;"><span data-dcnode-id="1669" instrument_node="">Soon after 1900, the momentum shifted from ideas and discussions to the physical development of television systems. Two major paths in the development of a television system were pursued by inventors.</span></span></p><span data-dcnode-id="1666" instrument_node="">
</span></td></tr><tr data-dcnode-id="1645" style="height: 24px;"><td data-dcnode-id="1658" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1659" style="font-size: 14pt;"><span data-dcnode-id="1660" instrument_node="">1906</span></span></td><td data-dcnode-id="1647" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" style="font-size: 14pt;"><span data-dcnode-id="1655" instrument_node="">Lee De Forest invents the Audion vacuum tube that proves essential to electronics. The Audion was the first tube with the ability to amplify signals.</span></span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" style="font-size: 14pt;"><span data-dcnode-id="1651" instrument_node="">Boris Rosing combines Nipkow’s disk and a cathode ray tube and builds the first working mechanical TV system.</span></span></p><span data-dcnode-id="1648" instrument_node="">
</span></td></tr><tr data-dcnode-id="1634" style="height: 24px;"><td data-dcnode-id="1640" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1641" style="font-size: 14pt;"><span data-dcnode-id="1642" instrument_node="">1907</span></span></td><td data-dcnode-id="1636" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1637" style="font-size: 14pt;"><span data-dcnode-id="1638" instrument_node="">Campbell Swinton and Boris Rosing suggest using cathode ray tubes to transmit images. Independent of each other, they both develop electronic scanning methods of reproducing images.</span></span></td></tr><tr data-dcnode-id="1623" style="height: 24px;"><td data-dcnode-id="1629" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1630" style="font-size: 14pt;"><span data-dcnode-id="1631" instrument_node="">1911</span></span></td><td data-dcnode-id="1625" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1626" style="font-size: 14pt;"><span data-dcnode-id="1627" instrument_node="">Campbell Swinton develops his idea of 1908 and presents details of a theoretical but complete electrical solution to electronically-scanned television. The paper (Jan 1912) is today widely accepted to have contributed to the development of electronic television in the UK, the USA and elsewhere.</span></span></td></tr><tr data-dcnode-id="1612" style="height: 24px;"><td data-dcnode-id="1618" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1619" style="font-size: 14pt;"><span data-dcnode-id="1620" instrument_node="">1922</span></span></td><td data-dcnode-id="1614" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1615" style="font-size: 14pt;"><span data-dcnode-id="1616" instrument_node="">Formation of the British Broadcasting Company</span></span></td></tr><tr data-dcnode-id="1601" style="height: 24px;"><td data-dcnode-id="1607" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1608" style="font-size: 14pt;"><span data-dcnode-id="1609" instrument_node="">1923</span></span></td><td data-dcnode-id="1603" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1604" style="font-size: 14pt;"><span data-dcnode-id="1605" instrument_node="">Vladimir Zworykin patents his iconoscope a TV camera tube based on Campbell Swinton’s ideas. The iconoscope, which he called an electric eye, becomes the cornerstone for further television development. Zworkin later develops the kinescope for picture display (aka the receiver).</span></span></td></tr><tr data-dcnode-id="1575" style="height: 24px;"><td data-dcnode-id="1596" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1597" style="font-size: 14pt;"><span data-dcnode-id="1598" instrument_node="">1924-25</span></span></td><td data-dcnode-id="1577" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" style="font-size: 14pt;"><span data-dcnode-id="1593" instrument_node="">American Charles Jenkins and John Baird from Scotland each demonstrate the mechanical transmissions of images over wire circuits.</span></span></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" style="font-size: 14pt;"><span data-dcnode-id="1589" instrument_node="">John Baird becomes the first person to transmit moving silhouette images using a mechanical system based on Nipkow’s disk.</span></span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" style="font-size: 14pt;"><span data-dcnode-id="1585" instrument_node="">Charles Jenkin built his Radiovisor and in 1931 and sold it as a kit for consumers to put together.</span></span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" style="font-size: 14pt;"><span data-dcnode-id="1581" instrument_node="">Vladimir Zworykin patents a color television system.</span></span></p><span data-dcnode-id="1578" instrument_node="">
</span></td></tr><tr data-dcnode-id="1564" style="height: 24px;"><td data-dcnode-id="1570" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1571" style="font-size: 14pt;"><span data-dcnode-id="1572" instrument_node="">1926-30</span></span></td><td data-dcnode-id="1566" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1567" style="font-size: 14pt;"><span data-dcnode-id="1568" instrument_node="">John Baird operates a television system with 30 lines of resolution system running at five frames per second.</span></span></td></tr><tr data-dcnode-id="1546" style="height: 24px;"><td data-dcnode-id="1559" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1560" style="font-size: 14pt;"><span data-dcnode-id="1561" instrument_node="">1927</span></span></td><td data-dcnode-id="1548" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" style="font-size: 14pt;"><span data-dcnode-id="1556" instrument_node="">Bell Telephone and the U.S. Department of Commerce conducted the first long-distance use of television that took place between Washington, D.C., and New York City on April 7. Secretary of Commerce Herbert Hoover commented, “Today we have, in a sense, the transmission of sight for the first time in the world’s history. Human genius has now destroyed the impediment of distance in (this) new respect, and in a manner hitherto unknown.”</span></span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" style="font-size: 14pt;"><span data-dcnode-id="1552" instrument_node="">Philo Farnsworth, files for a patent on the first completely electronic television system, which he called the Image Dissector.</span></span></p><span data-dcnode-id="1549" instrument_node="">
</span></td></tr><tr data-dcnode-id="1528" style="height: 24px;"><td data-dcnode-id="1541" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1542" style="font-size: 14pt;"><span data-dcnode-id="1543" instrument_node="">1928</span></span></td><td data-dcnode-id="1530" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" style="font-size: 14pt;"><span data-dcnode-id="1538" instrument_node="">The first demonstration of color television by John Logie Baird. His system was adopted by Peter Goldmark of CBS for the US frame-sequential color system, subsequently used for the Apollo lunar missions</span></span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" style="font-size: 14pt;"><span data-dcnode-id="1534" instrument_node="">The Federal Radio Commission issues the first television station license (W3XK) to Charles Jenkins.</span></span></p><span data-dcnode-id="1531" instrument_node="">
</span></td></tr><tr data-dcnode-id="1510" style="height: 24px;"><td data-dcnode-id="1523" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1524" style="font-size: 14pt;"><span data-dcnode-id="1525" instrument_node="">1929</span></span></td><td data-dcnode-id="1512" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" style="font-size: 14pt;"><span data-dcnode-id="1520" instrument_node="">Vladimir Zworykin demonstrates the first practical electronic system for both the transmission and reception of images using his new kinescope tube.</span></span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" style="font-size: 14pt;"><span data-dcnode-id="1516" instrument_node="">John Baird opens the first TV studio; however, the image quality is poor.</span></span></p><span data-dcnode-id="1513" instrument_node="">
</span></td></tr><tr data-dcnode-id="1489" style="height: 24px;"><td data-dcnode-id="1505" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1506" style="font-size: 14pt;"><span data-dcnode-id="1507" instrument_node="">1930</span></span></td><td data-dcnode-id="1491" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" style="font-size: 14pt;"><span data-dcnode-id="1502" instrument_node="">Charles Jenkins broadcasts the first TV commercial.</span></span></p><span data-dcnode-id="1499" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1493"><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" style="font-size: 14pt;"><span data-dcnode-id="1497" instrument_node="">The Baird television service is extended to simultaneous sound and vision, with the opening of the BBC’s radio transmitter at Brookmans Park</span></span></p><span data-dcnode-id="1494" instrument_node="">
</span></div><span data-dcnode-id="1492" instrument_node="">
</span></td></tr><tr data-dcnode-id="1465" style="height: 120px;"><td data-dcnode-id="1484" style="width: 14.467%; height: 120px; text-align: center;"><span data-dcnode-id="1485" style="font-size: 14pt;"><span data-dcnode-id="1486" instrument_node="">1931</span></span></td><td data-dcnode-id="1467" style="width: 85.533%; height: 120px;"><span data-dcnode-id="1482" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1469"><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" style="font-size: 14pt;"><span data-dcnode-id="1480" instrument_node="">HMV (to merge with Columbia in April 1931 to become Electrical and Musical Industries (EMI)) emerge as a player in systems for British television with a demonstration of their 150-line Opto-mechanically-scanned film scanner and display.</span></span></p><span data-dcnode-id="1477" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1471"><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" style="font-size: 14pt;"><span data-dcnode-id="1475" instrument_node="">First television Outside Broadcast (OB). Baird televises action at the finish line of the National Derby.</span></span></p><span data-dcnode-id="1472" instrument_node="">
</span></div><span data-dcnode-id="1470" instrument_node="">
</span></div><span data-dcnode-id="1468" instrument_node="">
</span></td></tr><tr data-dcnode-id="1445" style="height: 56px;"><td data-dcnode-id="1460" style="width: 14.467%; height: 56px; text-align: center;"><span data-dcnode-id="1461" style="font-size: 14pt;"><span data-dcnode-id="1462" instrument_node="">1932</span></span></td><td data-dcnode-id="1447" style="width: 85.533%; height: 56px;"><span data-dcnode-id="1458" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1449"><span data-dcnode-id="1457" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1451"><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" style="font-size: 14pt;"><span data-dcnode-id="1455" instrument_node="">First BBC television service starts using the Baird 30-line TV system – based on optomechanical scanning and using the existing radio transmitters</span></span></p><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span></td></tr><tr data-dcnode-id="1413" style="height: 24px;"><td data-dcnode-id="1440" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1441" style="font-size: 14pt;"><span data-dcnode-id="1442" instrument_node="">1934</span></span></td><td data-dcnode-id="1415" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" style="font-size: 14pt;"><span data-dcnode-id="1437" instrument_node="">The first commercially made electronic televisions with cathode ray tubes were manufactured by Telefunken in Germany in 1934</span></span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" style="font-size: 14pt;"><span data-dcnode-id="1433" instrument_node="">Iowa State University (W9XK) starts broadcasting twice-weekly television programs in cooperation with the radio station WSUI.</span></span></p><span data-dcnode-id="1430" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1417"><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" style="font-size: 14pt;"><span data-dcnode-id="1428" instrument_node="">EMI successfully demonstrates a practical working fully-electronic camera system to BBC and Post Office personnel</span></span></p><span data-dcnode-id="1425" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1419"><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" style="font-size: 14pt;"><span data-dcnode-id="1423" instrument_node="">The Marconi-EMI Company is formed with the aim of providing the camera and studio processing systems (EMI) and radio communications systems (Marconi) for future needs in television</span></span></p><span data-dcnode-id="1420" instrument_node="">
</span></div><span data-dcnode-id="1418" instrument_node="">
</span></div><span data-dcnode-id="1416" instrument_node="">
</span></td></tr><tr data-dcnode-id="1382" style="height: 160px;"><td data-dcnode-id="1408" style="width: 14.467%; height: 160px; text-align: center;"><span data-dcnode-id="1409" style="font-size: 14pt;"><span data-dcnode-id="1410" instrument_node="">1935</span></span></td><td data-dcnode-id="1384" style="width: 85.533%; height: 160px;"><span data-dcnode-id="1406" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1386"><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" style="font-size: 14pt;"><span data-dcnode-id="1404" instrument_node="">Publication of the Report of the Selsdon Committee. The primary recommendation is for the provision of a ‘high definition’ television service with a picture of not less than 240-lines refreshed 25 times a second.</span></span></p><span data-dcnode-id="1401" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1388"><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" style="font-size: 14pt;"><span data-dcnode-id="1399" instrument_node="">Alexandra Palace is selected as the site for the London Station (incorporating studios and transmitter tower) for the new BBC television service</span></span></p><span data-dcnode-id="1396" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1390"><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" style="font-size: 14pt;"><span data-dcnode-id="1394" instrument_node="">Close down of the BBC’s 30-line service in preparation for high definition broadcasting</span></span></p><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span></div><span data-dcnode-id="1387" instrument_node="">
</span></div><span data-dcnode-id="1385" instrument_node="">
</span></td></tr><tr data-dcnode-id="1356" style="height: 248px;"><td data-dcnode-id="1377" style="width: 14.467%; height: 248px; text-align: center;"><span data-dcnode-id="1378" style="font-size: 14pt;"><span data-dcnode-id="1379" instrument_node="">1936</span></span></td><td data-dcnode-id="1358" style="width: 85.533%; height: 248px;"><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" style="font-size: 14pt;"><span data-dcnode-id="1374" instrument_node="">About 200 television sets are in use worldwide.</span></span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" style="font-size: 14pt;"><span data-dcnode-id="1370" instrument_node="">Coaxial cable—a pure copper or copper-coated wire surrounded by insulation and aluminum covering—is introduced. These cables were and are used to transmit television, telephone, and data signals.</span></span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" style="font-size: 14pt;"><span data-dcnode-id="1366" instrument_node="">The first experimental coaxial cable lines were laid by AT&amp;T between New York and Philadelphia in 1936. The first regular installation connected Minneapolis and Stevens Point, Wisconsin, in 1941.</span></span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1361" style="font-size: 14pt;"><span data-dcnode-id="1362" instrument_node="">The original L1 coaxial cable system could carry 480 telephone conversations or one television program. By the 1970s, L5 systems could carry 132,000 calls or more than 200 television programs.</span></span></p><span data-dcnode-id="1359" instrument_node="">
</span></td></tr><tr data-dcnode-id="1330" style="height: 160px;"><td data-dcnode-id="1351" style="width: 14.467%; height: 160px; text-align: center;"><span data-dcnode-id="1352" style="font-size: 14pt;"><span data-dcnode-id="1353" instrument_node="">1937</span></span></td><td data-dcnode-id="1332" style="width: 85.533%; height: 160px;"><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" style="font-size: 14pt;"><span data-dcnode-id="1348" instrument_node="">CBS begins its TV development.</span></span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" style="font-size: 14pt;"><span data-dcnode-id="1344" instrument_node="">The BBC begins high-definition broadcasts in London.</span></span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" style="font-size: 14pt;"><span data-dcnode-id="1340" instrument_node="">Brothers and Stanford researchers Russell and Sigurd Varian introduce the Klystron. A Klystron is a high-frequency amplifier for generating microwaves. It is considered the technology that makes UHF-TV possible because it gives the ability to generate the high power required in this spectrum.</span></span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" style="font-size: 14pt;"><span data-dcnode-id="1336" instrument_node="">First televising of Last Night of the Proms (in part, using only two cameras)</span></span></p><span data-dcnode-id="1333" instrument_node="">
</span></td></tr><tr data-dcnode-id="1285" style="height: 216px;"><td data-dcnode-id="1325" style="width: 14.467%; height: 216px; text-align: center;"><span data-dcnode-id="1326" style="font-size: 14pt;"><span data-dcnode-id="1327" instrument_node="">1938</span></span></td><td data-dcnode-id="1287" style="width: 85.533%; height: 216px;"><span data-dcnode-id="1323" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1289"><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" style="font-size: 14pt;"><span data-dcnode-id="1321" instrument_node="">The first live coverage of the Derby at Epsom with three electronic cameras</span></span></p><span data-dcnode-id="1318" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1291"><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" style="font-size: 14pt;"><span data-dcnode-id="1316" instrument_node="">The first live transmission of a play from a London Theatre. ‘When we are married’, performed at St Martin’s</span></span></p><span data-dcnode-id="1313" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1293"><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" style="font-size: 14pt;"><span data-dcnode-id="1311" instrument_node="">First live coverage of the Lord Mayor’s Show. The broadcast used the new Super EMItron camera tube.</span></span></p><span data-dcnode-id="1308" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1295"><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" style="font-size: 14pt;"><span data-dcnode-id="1306" instrument_node="">First live television of coverage of a Test Match – from Lord’s, England vs Australia</span></span></p><span data-dcnode-id="1303" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1297"><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" style="font-size: 14pt;"><span data-dcnode-id="1301" instrument_node="">First live television coverage from an FA Cup Final – Wembley, London – Preston North End vs Huddersfield Town</span></span></p><span data-dcnode-id="1298" instrument_node="">
</span></div><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span></div><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span></td></tr><tr data-dcnode-id="1238" style="height: 200px;"><td data-dcnode-id="1280" style="width: 14.467%; height: 200px; text-align: center;"><span data-dcnode-id="1281" style="font-size: 14pt;"><span data-dcnode-id="1282" instrument_node="">1939</span></span></td><td data-dcnode-id="1240" style="width: 85.533%; height: 200px;"><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" style="font-size: 14pt;"><span data-dcnode-id="1277" instrument_node="">Vladimir Zworykin and RCA conduct experimental broadcasts from the Empire State Building.</span></span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" style="font-size: 14pt;"><span data-dcnode-id="1273" instrument_node="">Television was demonstrated at the New York World’s Fair and the San Francisco Golden Gate International Exposition.</span></span></p><span data-dcnode-id="1270" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1264"><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" style="font-size: 14pt;"><span data-dcnode-id="1268" instrument_node="">First live coverage of a golf match from Coombe Hill Golf Club</span></span></p><span data-dcnode-id="1265" instrument_node="">
</span></div><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" style="font-size: 14pt;"><span data-dcnode-id="1262" instrument_node="">RCA’s David Sarnoff used his company’s exhibit at the 1939 World’s Fair as a showcase for the first presidential speech (by Franklin D. Roosevelt) on television and to introduce RCA’s new line of television receivers, some of which had to be coupled with a radio if you wanted to hear the sound.</span></span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" style="font-size: 14pt;"><span data-dcnode-id="1258" instrument_node="">The Dumont company starts making TV sets.</span></span></p><span data-dcnode-id="1255" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1242"><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" style="font-size: 14pt;"><span data-dcnode-id="1253" instrument_node="">EMI makes the first 405-line telerecording using a Mechau projector in reverse. The system was used by the BBC to record the Coronation of Queen Elizabeth II on 2 June 1953</span></span></p><span data-dcnode-id="1250" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1244"><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" style="font-size: 14pt;"><span data-dcnode-id="1248" instrument_node="">The BBC Television Service closes down as a precaution as war is declared with Germany on 1 Sep 1939. The BBC radio broadcasting continues unaffected.</span></span></p><span data-dcnode-id="1245" instrument_node="">
</span></div><span data-dcnode-id="1243" instrument_node="">
</span></div><span data-dcnode-id="1241" instrument_node="">
</span></td></tr><tr data-dcnode-id="1227" style="height: 24px;"><td data-dcnode-id="1233" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1234" style="font-size: 14pt;"><span data-dcnode-id="1235" instrument_node="">1940</span></span></td><td data-dcnode-id="1229" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1230" style="font-size: 14pt;"><span data-dcnode-id="1231" instrument_node="">Peter Goldmark invents 343 lines of the resolution color television system.</span></span></td></tr><tr data-dcnode-id="1206" style="height: 24px;"><td data-dcnode-id="1222" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1223" style="font-size: 14pt;"><span data-dcnode-id="1224" instrument_node="">1941</span></span></td><td data-dcnode-id="1208" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1218" style="font-size: 14pt;"><span data-dcnode-id="1219" instrument_node="">The FCC releases the NTSC standard for black and white TV.</span></span></p><span data-dcnode-id="1216" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1210"><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" style="font-size: 14pt;"><span data-dcnode-id="1214" instrument_node="">John Logie Baird gives a closed-circuit demonstration of a 600-line stereoscopic color electronic camera and display.</span></span></p><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">
</span></td></tr><tr data-dcnode-id="1195" style="height: 24px;"><td data-dcnode-id="1201" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1202" style="font-size: 14pt;"><span data-dcnode-id="1203" instrument_node="">1943</span></span></td><td data-dcnode-id="1197" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1198" style="font-size: 14pt;"><span data-dcnode-id="1199" instrument_node="">Vladimir Zworykin develops a better camera tube called the Orthicon. The Orthicon has enough light sensitivity to record outdoor events at night.</span></span></td></tr><tr data-dcnode-id="1152" style="height: 24px;"><td data-dcnode-id="1190" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1191" style="font-size: 14pt;"><span data-dcnode-id="1192" instrument_node="">1946</span></span></td><td data-dcnode-id="1154" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" style="font-size: 14pt;"><span data-dcnode-id="1187" instrument_node="">Peter Goldmark, working for CBS, demonstrated his color television system to the FCC. His system produced color pictures by having a red-blue-green wheel spin in front of a cathode ray tube.</span></span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" style="font-size: 14pt;"><span data-dcnode-id="1183" instrument_node="">This mechanical means of producing a color picture was used in 1949 to broadcast medical procedures from Pennsylvania and Atlantic City hospitals. In Atlantic City, viewers could come to the convention center to see broadcasts of operations. Reports from the time noted that the realism of seeing surgery in color caused more than a few viewers to faint.</span></span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1177"><span data-dcnode-id="1178" style="font-size: 14pt;"><span data-dcnode-id="1179" instrument_node="">Although Goldmark’s mechanical system was eventually replaced by an electronic system, he is recognized as the first to introduce a broadcasting color television system.</span></span></p><span data-dcnode-id="1176" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1156"><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" style="font-size: 14pt;"><span data-dcnode-id="1174" instrument_node="">The BBC Television Service from Alexandra Palace restarts after the Second World War</span></span></p><span data-dcnode-id="1171" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1158"><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" style="font-size: 14pt;"><span data-dcnode-id="1169" instrument_node="">Televising the Victory Parade in London.</span></span></p><span data-dcnode-id="1166" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1160"><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" style="font-size: 14pt;"><span data-dcnode-id="1164" instrument_node="">The first televised outside broadcast of the Lord Mayor’s Show procession.</span></span></p><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span></div><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
</span></td></tr><tr data-dcnode-id="1128" style="height: 96px;"><td data-dcnode-id="1147" style="width: 14.467%; height: 96px; text-align: center;"><span data-dcnode-id="1148" style="font-size: 14pt;"><span data-dcnode-id="1149" instrument_node="">1947</span></span></td><td data-dcnode-id="1130" style="width: 85.533%; height: 96px;"><span data-dcnode-id="1145" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1132"><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" style="font-size: 14pt;"><span data-dcnode-id="1143" instrument_node="">Televising of the marriage of HRH Princess Elizabeth to Lieutenant Philip Mountbatten, R.N. (the ceremony being sound only)</span></span></p><span data-dcnode-id="1140" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1134"><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" style="font-size: 14pt;"><span data-dcnode-id="1138" instrument_node="">First public broadcast of recorded television in Britain with the replay of a tape-recorded film version of the ceremony at the Cenotaph</span></span></p><span data-dcnode-id="1135" instrument_node="">
</span></div><span data-dcnode-id="1133" instrument_node="">
</span></div><span data-dcnode-id="1131" instrument_node="">
</span></td></tr><tr data-dcnode-id="1092" style="height: 24px;"><td data-dcnode-id="1123" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1124" style="font-size: 14pt;"><span data-dcnode-id="1125" instrument_node="">1948</span></span></td><td data-dcnode-id="1094" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" style="font-size: 14pt;"><span data-dcnode-id="1120" instrument_node="">Cable television is introduced in Pennsylvania as a means of bringing television to rural areas.</span></span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" style="font-size: 14pt;"><span data-dcnode-id="1116" instrument_node="">A patent was granted to Louis W. Parker for a low-cost television receiver.</span></span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" style="font-size: 14pt;"><span data-dcnode-id="1112" instrument_node="">One million homes in the United States have television sets.</span></span></p><span data-dcnode-id="1109" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1096"><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" style="font-size: 14pt;"><span data-dcnode-id="1107" instrument_node="">29 July – 14 August: Olympic Games in London, televised to an estimated 80,000 receivers in London and the Home Counties, with over 68 hours of coverage (about 5 hours per day)</span></span></p><span data-dcnode-id="1104" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1098"><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" style="font-size: 14pt;"><span data-dcnode-id="1102" instrument_node="">For the first time, the BBC operates three mobile units for the Olympics (two at Wembley Stadium and one at White City Stadium). A record of 8 hours continuous television, White City Athletics, Olympic Boxing from the Empire Hall, hockey from the Wembley stadium, an Olympic Newsreel and a full-length play – A.A. Milne’sThe Dover Road’.</span></span></p><span data-dcnode-id="1099" instrument_node="">
</span></div><span data-dcnode-id="1097" instrument_node="">
</span></div><span data-dcnode-id="1095" instrument_node="">
</span></td></tr><tr data-dcnode-id="1068" style="height: 120px;"><td data-dcnode-id="1087" style="width: 14.467%; height: 120px; text-align: center;"><span data-dcnode-id="1088" style="font-size: 14pt;"><span data-dcnode-id="1089" instrument_node="">1949</span></span></td><td data-dcnode-id="1070" style="width: 85.533%; height: 120px;"><span data-dcnode-id="1085" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1072"><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" style="font-size: 14pt;"><span data-dcnode-id="1083" instrument_node="">EMI Research designs build and demonstrate a 1001-line television system. The Post Office and the BBC maintain the 405-line system but continue to monitor developments.</span></span></p><span data-dcnode-id="1080" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1074"><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" style="font-size: 14pt;"><span data-dcnode-id="1078" instrument_node="">The BBC installs its first ‘zoom’ lens on a television camera</span></span></p><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span></td></tr><tr data-dcnode-id="1043" style="height: 24px;"><td data-dcnode-id="1063" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1064" style="font-size: 14pt;"><span data-dcnode-id="1065" instrument_node="">1950</span></span></td><td data-dcnode-id="1045" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" style="font-size: 14pt;"><span data-dcnode-id="1060" instrument_node="">The FCC approves the first color television standard which is replaced by a second in 1953.</span></span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" style="font-size: 14pt;"><span data-dcnode-id="1056" instrument_node="">Vladimir Zworykin developed a better camera tube called the Vidicon.</span></span></p><span data-dcnode-id="1053" instrument_node="">
</span><div class="tl-text-content" data-dcnode-id="1047"><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" style="font-size: 14pt;"><span data-dcnode-id="1051" instrument_node="">The European Broadcasting Union is formed</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span></td></tr><tr data-dcnode-id="1025" style="height: 24px;"><td data-dcnode-id="1038" style="width: 14.467%; height: 24px; text-align: center;"><span data-dcnode-id="1039" style="font-size: 14pt;"><span data-dcnode-id="1040" instrument_node="">1951</span></span></td><td data-dcnode-id="1027" style="width: 85.533%; height: 24px;"><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="font-size: 14pt;"><span data-dcnode-id="1035" instrument_node="">The first national live television broadcast in the U.S. took place on September 4, 1951, when President Harry Truman’s speech at the Japanese Peace Treaty Conference in San Francisco was transmitted over AT&amp;T’s transcontinental cable and microwave radio relay system to broadcast stations in local markets.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" style="font-size: 14pt;"><span data-dcnode-id="1031" instrument_node="">The first live coast-to-coast commercial television broadcast in the U.S. took place on November 18, 1951, during the premiere of CBS’s See It Now, which showed a split-screen view of the Brooklyn Bridge in New York City and the Golden Gate Bridge in San Francisco. </span></span></p><span data-dcnode-id="1028" instrument_node="">
</span></td></tr><tr data-dcnode-id="1007" style="height: 96px;"><td data-dcnode-id="1020" style="width: 14.467%; height: 96px; text-align: center;"><span data-dcnode-id="1021" style="font-size: 14pt;"><span data-dcnode-id="1022" instrument_node="">1956</span></span></td><td data-dcnode-id="1009" style="width: 85.533%; height: 96px;"><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" style="font-size: 14pt;"><span data-dcnode-id="1017" instrument_node="">Ampex introduces the first practical videotape system of broadcast quality.</span></span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" style="font-size: 14pt;"><span data-dcnode-id="1013" instrument_node="">Robert Adler invents the first practical remote control called the Zenith Space Commander. It was preceded by wired remotes and units that failed in sunlight.</span></span></p><span data-dcnode-id="1010" instrument_node="">
</span></td></tr><tr data-dcnode-id="993" style="height: 56px;"><td data-dcnode-id="1002" style="width: 14.467%; height: 56px; text-align: center;"><span data-dcnode-id="1003" style="font-size: 14pt;"><span data-dcnode-id="1004" instrument_node="">1958</span></span></td><td data-dcnode-id="995" style="width: 85.533%; height: 56px;"><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" style="font-size: 14pt;"><span data-dcnode-id="999" instrument_node="">In 1958, the CBC completed the longest television network in the world, from Sydney, Nova Scotia to Victoria, British Columbia. </span></span></p><span data-dcnode-id="996" instrument_node="">
