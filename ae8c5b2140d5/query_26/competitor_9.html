</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="963" id="mntl-sc-block_1-0-310"></div><span data-dcnode-id="962" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="957" id="mntl-sc-block_1-0-311"><span data-dcnode-id="961" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node=""> Niels Bohr (1913) </span></span><span data-dcnode-id="958" instrument_node=""> </span></h3><span data-dcnode-id="956" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="951" id="mntl-sc-block_1-0-312"><span data-dcnode-id="955" instrument_node="">
Devised quantum model&nbsp;</span><a data-component="link" data-dcnode-id="953" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/what-is-an-atom-603816"><span data-dcnode-id="954" instrument_node="">of the atom</span></a><span data-dcnode-id="952" instrument_node="">&nbsp;in which atoms had orbital shells of electrons.
</span></p><span data-dcnode-id="950" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="949" id="mntl-sc-block_1-0-313"></div><span data-dcnode-id="948" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="943" id="mntl-sc-block_1-0-314"><span data-dcnode-id="947" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node=""> Robert Milliken (1913) </span></span><span data-dcnode-id="944" instrument_node=""> </span></h3><span data-dcnode-id="942" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="940" id="mntl-sc-block_1-0-315"><span data-dcnode-id="941" instrument_node="">
Experimentally determined the charge and mass of an electron using an oil drop.
</span></p><span data-dcnode-id="939" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="938" id="mntl-sc-block_1-0-316"></div><span data-dcnode-id="937" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="932" id="mntl-sc-block_1-0-317"><span data-dcnode-id="936" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node=""> F.H.C Crick (1916–2004) with James D. Watson </span></span><span data-dcnode-id="933" instrument_node=""> </span></h3><span data-dcnode-id="931" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="929" id="mntl-sc-block_1-0-318"><span data-dcnode-id="930" instrument_node="">
Described the structure of the DNA molecule (1953).
</span></p><span data-dcnode-id="928" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="927" id="mntl-sc-block_1-0-319"></div><span data-dcnode-id="926" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="921" id="mntl-sc-block_1-0-320"><span data-dcnode-id="925" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node=""> Robert W. Woodward (1917-1979) </span></span><span data-dcnode-id="922" instrument_node=""> </span></h3><span data-dcnode-id="920" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="915" id="mntl-sc-block_1-0-321"><span data-dcnode-id="919" instrument_node="">
Synthesized&nbsp;</span><a data-component="link" data-dcnode-id="917" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/definition-of-compound-605842"><span data-dcnode-id="918" instrument_node="">many compounds</span></a><span data-dcnode-id="916" instrument_node="">, including cholesterol, quinine, chlorophyll, and cobalamin. Nobel Prize in 1965.
</span></p><span data-dcnode-id="914" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="913" id="mntl-sc-block_1-0-322"></div><span data-dcnode-id="912" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="907" id="mntl-sc-block_1-0-323"><span data-dcnode-id="911" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node=""> F.W. Aston (1919) </span></span><span data-dcnode-id="908" instrument_node=""> </span></h3><span data-dcnode-id="906" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="904" id="mntl-sc-block_1-0-324"><span data-dcnode-id="905" instrument_node="">
Use a mass spectrograph to demonstrate the existence of isotopes.
</span></p><span data-dcnode-id="903" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="902" id="mntl-sc-block_1-0-325"></div><span data-dcnode-id="901" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="896" id="mntl-sc-block_1-0-326"><span data-dcnode-id="900" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node=""> Louis&nbsp;de Broglie (1923) </span></span><span data-dcnode-id="897" instrument_node=""> </span></h3><span data-dcnode-id="895" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="893" id="mntl-sc-block_1-0-327"><span data-dcnode-id="894" instrument_node="">
Described the particle/wave duality of electrons.
</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="891" id="mntl-sc-block_1-0-328"></div><span data-dcnode-id="890" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="885" id="mntl-sc-block_1-0-329"><span data-dcnode-id="889" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node=""> Werner Heisenberg (1927) </span></span><span data-dcnode-id="886" instrument_node=""> </span></h3><span data-dcnode-id="884" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="882" id="mntl-sc-block_1-0-330"><span data-dcnode-id="883" instrument_node="">
Stated the quantum uncertainty principle. Described atoms using a formula based on the frequencies of spectral lines.
</span></p><span data-dcnode-id="881" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="880" id="mntl-sc-block_1-0-331"></div><span data-dcnode-id="879" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="874" id="mntl-sc-block_1-0-332"><span data-dcnode-id="878" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node=""> John Cockcroft, Ernest Walton (1929) </span></span><span data-dcnode-id="875" instrument_node=""> </span></h3><span data-dcnode-id="873" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="871" id="mntl-sc-block_1-0-333"><span data-dcnode-id="872" instrument_node="">
Constructed a linear accelerator and bombarded lithium with protons to produce alpha particles.
</span></p><span data-dcnode-id="870" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="869" id="mntl-sc-block_1-0-334"></div><span data-dcnode-id="868" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="863" id="mntl-sc-block_1-0-335"><span data-dcnode-id="867" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node=""> Erwin&nbsp;Schodinger (1930) </span></span><span data-dcnode-id="864" instrument_node=""> </span></h3><span data-dcnode-id="862" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="860" id="mntl-sc-block_1-0-336"><span data-dcnode-id="861" instrument_node="">
Described electrons as continuous clouds. Introduced 'wave mechanics' to mathematically describe the atom.
</span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="858" id="mntl-sc-block_1-0-337"></div><span data-dcnode-id="857" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="852" id="mntl-sc-block_1-0-338"><span data-dcnode-id="856" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node=""> Paul Dirac (1930) </span></span><span data-dcnode-id="853" instrument_node=""> </span></h3><span data-dcnode-id="851" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="849" id="mntl-sc-block_1-0-339"><span data-dcnode-id="850" instrument_node="">
Proposed anti-particles and discovered the anti-electron (positron) in 1932. (Segre/Chamberlain detected the anti-proton in 1955).
</span></p><span data-dcnode-id="848" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="847" id="mntl-sc-block_1-0-340"></div><span data-dcnode-id="846" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="841" id="mntl-sc-block_1-0-341"><span data-dcnode-id="845" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node=""> James Chadwick (1932) </span></span><span data-dcnode-id="842" instrument_node=""> </span></h3><span data-dcnode-id="840" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="838" id="mntl-sc-block_1-0-342"><span data-dcnode-id="839" instrument_node="">
Discovered the neutron.
</span></p><span data-dcnode-id="837" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="836" id="mntl-sc-block_1-0-343"></div><span data-dcnode-id="835" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="830" id="mntl-sc-block_1-0-344"><span data-dcnode-id="834" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node=""> Carl Anderson (1932) </span></span><span data-dcnode-id="831" instrument_node=""> </span></h3><span data-dcnode-id="829" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="827" id="mntl-sc-block_1-0-345"><span data-dcnode-id="828" instrument_node="">
Discovered the positron.
</span></p><span data-dcnode-id="826" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="825" id="mntl-sc-block_1-0-346"></div><span data-dcnode-id="824" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="819" id="mntl-sc-block_1-0-347"><span data-dcnode-id="823" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node=""> Wolfgang Pauli (1933) </span></span><span data-dcnode-id="820" instrument_node=""> </span></h3><span data-dcnode-id="818" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="813" id="mntl-sc-block_1-0-348"><span data-dcnode-id="817" instrument_node="">
Proposed the&nbsp;</span><a data-component="link" data-dcnode-id="815" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/neutrino-2698990"><span data-dcnode-id="816" instrument_node="">existence of neutrinos</span></a><span data-dcnode-id="814" instrument_node="">&nbsp;as a means of accounting for what appeared to be a violation of the law of conservation of energy in some nuclear reactions.
</span></p><span data-dcnode-id="812" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="811" id="mntl-sc-block_1-0-349"></div><span data-dcnode-id="810" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="805" id="mntl-sc-block_1-0-350"><span data-dcnode-id="809" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node=""> Enrico Fermi (1934) </span></span><span data-dcnode-id="806" instrument_node=""> </span></h3><span data-dcnode-id="804" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="799" id="mntl-sc-block_1-0-351"><span data-dcnode-id="803" instrument_node="">
Formulated his&nbsp;</span><a data-component="link" data-dcnode-id="801" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/beta-decay-definition-608733"><span data-dcnode-id="802" instrument_node="">theory of beta decay</span></a><span data-dcnode-id="800" instrument_node="">.
</span></p><span data-dcnode-id="798" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="797" id="mntl-sc-block_1-0-352"></div><span data-dcnode-id="796" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="791" id="mntl-sc-block_1-0-353"><span data-dcnode-id="795" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="793"><span data-dcnode-id="794" instrument_node=""> Lise Meitner, Otto Hahn,&nbsp;Fritz Strassmann (1938) </span></span><span data-dcnode-id="792" instrument_node=""> </span></h3><span data-dcnode-id="790" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="788" id="mntl-sc-block_1-0-354"><span data-dcnode-id="789" instrument_node="">
Verified&nbsp;that heavy elements capture neutrons to form&nbsp;fisionable&nbsp;unstable products in a process which ejects more neutrons, thus continuing the chain reaction.&nbsp;that heavy elements capture neutrons to form&nbsp;fisionable&nbsp;unstable products in a process which ejects more neutrons, thus continuing the chain reaction.
</span></p><span data-dcnode-id="787" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="786" id="mntl-sc-block_1-0-355"></div><span data-dcnode-id="785" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="777" id="mntl-sc-block_1-0-357"><span data-dcnode-id="778" instrument_node="">
