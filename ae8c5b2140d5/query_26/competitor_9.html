</span></p><span data-dcnode-id="1874" instrument_node="">

First synthesis of an organic compound (urea, 1828).
</span></p><span data-dcnode-id="1863" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1862" id="mntl-sc-block_1-0-85"></div><span data-dcnode-id="1861" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1856" id="mntl-sc-block_1-0-86"><span data-dcnode-id="1860" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node=""> Charles Goodyear (1800–1860) </span></span><span data-dcnode-id="1857" instrument_node=""> </span></h3><span data-dcnode-id="1855" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1853" id="mntl-sc-block_1-0-87"><span data-dcnode-id="1854" instrument_node="">
Discovered vulcanization of rubber (1844). Hancock in England made a parallel discovery.
</span></p><span data-dcnode-id="1852" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1851" id="mntl-sc-block_1-0-88"></div><span data-dcnode-id="1850" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1845" id="mntl-sc-block_1-0-89"><span data-dcnode-id="1849" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node=""> Thomas Young (1801) </span></span><span data-dcnode-id="1846" instrument_node=""> </span></h3><span data-dcnode-id="1844" instrument_node="">

</span></p><span data-dcnode-id="1841" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1840" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="1839" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1834" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1838" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node=""> J. von Liebig (1803–1873) </span></span><span data-dcnode-id="1835" instrument_node=""> </span></h3><span data-dcnode-id="1833" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1831" id="mntl-sc-block_1-0-93"><span data-dcnode-id="1832" instrument_node="">

</span></p><span data-dcnode-id="1830" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1829" id="mntl-sc-block_1-0-94"></div><span data-dcnode-id="1828" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1823" id="mntl-sc-block_1-0-95"><span data-dcnode-id="1827" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node=""> Hans Oersted (1820) </span></span><span data-dcnode-id="1824" instrument_node=""> </span></h3><span data-dcnode-id="1822" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1820" id="mntl-sc-block_1-0-96"><span data-dcnode-id="1821" instrument_node="">

</span></p><span data-dcnode-id="1819" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1818" id="mntl-sc-block_1-0-97"></div><span data-dcnode-id="1817" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1812" id="mntl-sc-block_1-0-98"><span data-dcnode-id="1816" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node=""> Thomas Graham (1822–1869) </span></span><span data-dcnode-id="1813" instrument_node=""> </span></h3><span data-dcnode-id="1811" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1809" id="mntl-sc-block_1-0-99"><span data-dcnode-id="1810" instrument_node="">

</span></p><span data-dcnode-id="1808" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1807" id="mntl-sc-block_1-0-100"></div><span data-dcnode-id="1806" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1801" id="mntl-sc-block_1-0-101"><span data-dcnode-id="1805" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node=""> Louis Pasteur (1822–1895) </span></span><span data-dcnode-id="1802" instrument_node=""> </span></h3><span data-dcnode-id="1800" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1798" id="mntl-sc-block_1-0-102"><span data-dcnode-id="1799" instrument_node="">
First recognition of bacteria as disease-causing agents. Developed field of immunochemistry. Introduced heat-sterilization of wine and milk (pasteurization). Saw optical isomers (enantiomers) in tartaric acid.
</span></p><span data-dcnode-id="1797" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1796" id="mntl-sc-block_1-0-103"></div><span data-dcnode-id="1795" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1790" id="mntl-sc-block_1-0-104"><span data-dcnode-id="1794" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node=""> William Sturgeon (1823) </span></span><span data-dcnode-id="1791" instrument_node=""> </span></h3><span data-dcnode-id="1789" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1787" id="mntl-sc-block_1-0-105"><span data-dcnode-id="1788" instrument_node="">
Invented the electromagnet.
</span></p><span data-dcnode-id="1786" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1785" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="1784" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1779" id="mntl-sc-block_1-0-107"><span data-dcnode-id="1783" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node=""> Sadi Carnot (1824) </span></span><span data-dcnode-id="1780" instrument_node=""> </span></h3><span data-dcnode-id="1778" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1776" id="mntl-sc-block_1-0-108"><span data-dcnode-id="1777" instrument_node="">
Analyzed heat engines.
</span></p><span data-dcnode-id="1775" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1774" id="mntl-sc-block_1-0-109"></div><span data-dcnode-id="1773" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1768" id="mntl-sc-block_1-0-110"><span data-dcnode-id="1772" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node=""> Simon Ohm (1826) </span></span><span data-dcnode-id="1769" instrument_node=""> </span></h3><span data-dcnode-id="1767" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1762" id="mntl-sc-block_1-0-111"><span data-dcnode-id="1766" instrument_node="">
Stated </span><a data-component="link" data-dcnode-id="1764" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/chemical-law-and-concepts-4133592"><span data-dcnode-id="1765" instrument_node="">law of electrical resistance</span></a><span data-dcnode-id="1763" instrument_node="">.
</span></p><span data-dcnode-id="1761" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1760" id="mntl-sc-block_1-0-112"></div><span data-dcnode-id="1759" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1754" id="mntl-sc-block_1-0-113"><span data-dcnode-id="1758" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node=""> Robert Brown (1827) </span></span><span data-dcnode-id="1755" instrument_node=""> </span></h3><span data-dcnode-id="1753" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1751" id="mntl-sc-block_1-0-114"><span data-dcnode-id="1752" instrument_node="">
Discovered Brownian motion.
</span></p><span data-dcnode-id="1750" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1749" id="mntl-sc-block_1-0-115"></div><span data-dcnode-id="1748" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1743" id="mntl-sc-block_1-0-116"><span data-dcnode-id="1747" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node=""> Joseph Lister (1827–1912) </span></span><span data-dcnode-id="1744" instrument_node=""> </span></h3><span data-dcnode-id="1742" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1740" id="mntl-sc-block_1-0-117"><span data-dcnode-id="1741" instrument_node="">
Initiated use of antiseptics in surgery, e.g., phenols, carbolic acid, cresols.
</span></p><span data-dcnode-id="1739" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1738" id="mntl-sc-block_1-0-118"></div><span data-dcnode-id="1737" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1732" id="mntl-sc-block_1-0-119"><span data-dcnode-id="1736" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node=""> A. Kekulé (1829–1896) </span></span><span data-dcnode-id="1733" instrument_node=""> </span></h3><span data-dcnode-id="1731" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1726" id="mntl-sc-block_1-0-120"><span data-dcnode-id="1730" instrument_node="">
Father of aromatic chemistry. Realized four-valent carbon and structure of benzene ring. Predicted </span><a data-component="link" data-dcnode-id="1728" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/ortho-meta-para-in-organic-chemistry-608213"><span data-dcnode-id="1729" instrument_node="">isomeric substitutions (ortho-, meta-, para-)</span></a><span data-dcnode-id="1727" instrument_node="">.
</span></p><span data-dcnode-id="1725" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1724" id="mntl-sc-block_1-0-121"></div><span data-dcnode-id="1723" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1718" id="mntl-sc-block_1-0-122"><span data-dcnode-id="1722" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node=""> Alfred Nobel (1833–1896) </span></span><span data-dcnode-id="1719" instrument_node=""> </span></h3><span data-dcnode-id="1717" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1712" id="mntl-sc-block_1-0-123"><span data-dcnode-id="1716" instrument_node="">
Invented dynamite, smokeless powder, and blasting gelatin. Established international awards for achievements in&nbsp;</span><a data-component="link" data-dcnode-id="1714" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/chemistry-nobel-prize-winners-608597"><span data-dcnode-id="1715" instrument_node="">chemistry</span></a><span data-dcnode-id="1713" instrument_node="">, physics, and medicine (Nobel Prize).
</span></p><span data-dcnode-id="1711" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1710" id="mntl-sc-block_1-0-124"></div><span data-dcnode-id="1709" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1704" id="mntl-sc-block_1-0-125"><span data-dcnode-id="1708" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node=""> Dmitri Mendeléev (1834–1907) </span></span><span data-dcnode-id="1705" instrument_node=""> </span></h3><span data-dcnode-id="1703" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1698" id="mntl-sc-block_1-0-126"><span data-dcnode-id="1702" instrument_node="">
Discovered periodicity of the elements. Compiled the&nbsp;</span><a data-component="link" data-dcnode-id="1700" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/all-about-the-periodic-table-608824"><span data-dcnode-id="1701" instrument_node="">first Periodic Table</span></a><span data-dcnode-id="1699" instrument_node="">&nbsp;with elements arranged into 7 groups (1869).
</span></p><span data-dcnode-id="1697" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1696" id="mntl-sc-block_1-0-127"></div><span data-dcnode-id="1695" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1690" id="mntl-sc-block_1-0-128"><span data-dcnode-id="1694" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node=""> J.W. Hyatt (1837–1920) </span></span><span data-dcnode-id="1691" instrument_node=""> </span></h3><span data-dcnode-id="1689" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1687" id="mntl-sc-block_1-0-129"><span data-dcnode-id="1688" instrument_node="">
Invented the plastic Celluloid (nitrocellulose modified&nbsp;using camphor)(1869).
</span></p><span data-dcnode-id="1686" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1685" id="mntl-sc-block_1-0-130"></div><span data-dcnode-id="1684" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1679" id="mntl-sc-block_1-0-131"><span data-dcnode-id="1683" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node=""> Sir W.H. Perkin (1838–1907) </span></span><span data-dcnode-id="1680" instrument_node=""> </span></h3><span data-dcnode-id="1678" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1676" id="mntl-sc-block_1-0-132"><span data-dcnode-id="1677" instrument_node="">
Synthesized first organic dye (mauveine, 1856) and first synthetic perfume (coumarin).
</span></p><span data-dcnode-id="1675" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1674" id="mntl-sc-block_1-0-133"></div><span data-dcnode-id="1673" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1668" id="mntl-sc-block_1-0-134"><span data-dcnode-id="1672" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node=""> F.K. Beilstein (1838–1906) </span></span><span data-dcnode-id="1669" instrument_node=""> </span></h3><span data-dcnode-id="1667" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1665" id="mntl-sc-block_1-0-135"><span data-dcnode-id="1666" instrument_node="">
Compiled&nbsp;Handbuchder&nbsp;organischen&nbsp;Chemie, a compendium of the properties and reactions of organics.
</span></p><span data-dcnode-id="1664" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1663" id="mntl-sc-block_1-0-136"></div><span data-dcnode-id="1662" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1657" id="mntl-sc-block_1-0-137"><span data-dcnode-id="1661" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node=""> Josiah W. Gibbs (1839–1903) </span></span><span data-dcnode-id="1658" instrument_node=""> </span></h3><span data-dcnode-id="1656" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1651" id="mntl-sc-block_1-0-138"><span data-dcnode-id="1655" instrument_node="">
Stated three principal laws of thermodynamics. Described&nbsp;</span><a data-component="link" data-dcnode-id="1653" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/definition-of-entropy-604458"><span data-dcnode-id="1654" instrument_node="">the nature of entropy</span></a><span data-dcnode-id="1652" instrument_node="">&nbsp;and established a relation between chemical, electric, and thermal energy.
</span></p><span data-dcnode-id="1650" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1649" id="mntl-sc-block_1-0-139"></div><span data-dcnode-id="1648" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1643" id="mntl-sc-block_1-0-140"><span data-dcnode-id="1647" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node=""> H. Chardonnet (1839–1924) </span></span><span data-dcnode-id="1644" instrument_node=""> </span></h3><span data-dcnode-id="1642" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1640" id="mntl-sc-block_1-0-141"><span data-dcnode-id="1641" instrument_node="">
Produced a synthetic fiber (nitrocellulose).
</span></p><span data-dcnode-id="1639" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1638" id="mntl-sc-block_1-0-142"></div><span data-dcnode-id="1637" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1632" id="mntl-sc-block_1-0-143"><span data-dcnode-id="1636" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node=""> James Joule (1843) </span></span><span data-dcnode-id="1633" instrument_node=""> </span></h3><span data-dcnode-id="1631" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1626" id="mntl-sc-block_1-0-144"><span data-dcnode-id="1630" instrument_node="">
Experimentally demonstrated that heat is&nbsp;</span><a data-component="link" data-dcnode-id="1628" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/kinetic-and-potential-energy-609257"><span data-dcnode-id="1629" instrument_node="">a form of energy</span></a><span data-dcnode-id="1627" instrument_node="">.
</span></p><span data-dcnode-id="1625" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1624" id="mntl-sc-block_1-0-145"></div><span data-dcnode-id="1623" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1618" id="mntl-sc-block_1-0-146"><span data-dcnode-id="1622" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node=""> L. Boltzmann (1844–1906) </span></span><span data-dcnode-id="1619" instrument_node=""> </span></h3><span data-dcnode-id="1617" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1615" id="mntl-sc-block_1-0-147"><span data-dcnode-id="1616" instrument_node="">
Developed&nbsp;kinetic theory&nbsp;of gasses. Viscosity and diffusion properties are summarized in Boltzmann’s Law.
</span></p><span data-dcnode-id="1614" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1613" id="mntl-sc-block_1-0-148"></div><span data-dcnode-id="1612" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1607" id="mntl-sc-block_1-0-149"><span data-dcnode-id="1611" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node=""> W.K. Roentgen (1845–1923) </span></span><span data-dcnode-id="1608" instrument_node=""> </span></h3><span data-dcnode-id="1606" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1604" id="mntl-sc-block_1-0-150"><span data-dcnode-id="1605" instrument_node="">
Discovered x-radiation (1895). Nobel Prize in 1901.
</span></p><span data-dcnode-id="1603" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1602" id="mntl-sc-block_1-0-151"></div><span data-dcnode-id="1601" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1596" id="mntl-sc-block_1-0-152"><span data-dcnode-id="1600" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node=""> Lord Kelvin&nbsp;(1838) </span></span><span data-dcnode-id="1597" instrument_node=""> </span></h3><span data-dcnode-id="1595" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1593" id="mntl-sc-block_1-0-153"><span data-dcnode-id="1594" instrument_node="">
Described the absolute zero point of temperature.
</span></p><span data-dcnode-id="1592" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1591" id="mntl-sc-block_1-0-154"></div><span data-dcnode-id="1590" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1585" id="mntl-sc-block_1-0-155"><span data-dcnode-id="1589" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node=""> James Joule (1849) </span></span><span data-dcnode-id="1586" instrument_node=""> </span></h3><span data-dcnode-id="1584" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1582" id="mntl-sc-block_1-0-156"><span data-dcnode-id="1583" instrument_node="">
Published results from experiments showing that heat is a form of energy.
</span></p><span data-dcnode-id="1581" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1580" id="mntl-sc-block_1-0-157"></div><span data-dcnode-id="1579" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1574" id="mntl-sc-block_1-0-158"><span data-dcnode-id="1578" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node=""> H.L. Le Chatelier (1850–1936) </span></span><span data-dcnode-id="1575" instrument_node=""> </span></h3><span data-dcnode-id="1573" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1568" id="mntl-sc-block_1-0-159"><span data-dcnode-id="1572" instrument_node="">
Fundamental research on equilibrium reactions (</span><a data-component="link" data-dcnode-id="1570" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/definition-of-le-chateliers-principle-605297"><span data-dcnode-id="1571" instrument_node="">Le Chatelier’s Law),</span></a><span data-dcnode-id="1569" instrument_node="">&nbsp;combustion of gasses, and iron and steel metallurgy.
</span></p><span data-dcnode-id="1567" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1566" id="mntl-sc-block_1-0-160"></div><span data-dcnode-id="1565" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1560" id="mntl-sc-block_1-0-161"><span data-dcnode-id="1564" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node=""> H. Becquerel (1851–1908) </span></span><span data-dcnode-id="1561" instrument_node=""> </span></h3><span data-dcnode-id="1559" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1557" id="mntl-sc-block_1-0-162"><span data-dcnode-id="1558" instrument_node="">
Discovered radioactivity of uranium (1896) and deflection of electrons by magnetic fields and gamma rays. Nobel Prize in 1903 (with the Curies).
</span></p><span data-dcnode-id="1556" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1555" id="mntl-sc-block_1-0-163"></div><span data-dcnode-id="1554" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1549" id="mntl-sc-block_1-0-164"><span data-dcnode-id="1553" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node=""> H. Moisson (1852–1907) </span></span><span data-dcnode-id="1550" instrument_node=""> </span></h3><span data-dcnode-id="1548" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1546" id="mntl-sc-block_1-0-165"><span data-dcnode-id="1547" instrument_node="">
Developed electric furnace for making carbides and purifying metals. Isolated fluorine (1886). Nobel Prize in 1906.
</span></p><span data-dcnode-id="1545" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1544" id="mntl-sc-block_1-0-166"></div><span data-dcnode-id="1543" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1538" id="mntl-sc-block_1-0-167"><span data-dcnode-id="1542" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node=""> Emil Fischer (1852–1919) </span></span><span data-dcnode-id="1539" instrument_node=""> </span></h3><span data-dcnode-id="1537" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1532" id="mntl-sc-block_1-0-168"><span data-dcnode-id="1536" instrument_node="">
Studied sugars, purines, ammonia,&nbsp;uric acid, enzymes,&nbsp;</span><a data-component="link" data-dcnode-id="1534" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/acid-chemical-structures-gallery-4071297"><span data-dcnode-id="1535" instrument_node="">nitric acid</span></a><span data-dcnode-id="1533" instrument_node="">. Pioneer research in sterochemistry. Nobel Prize in 1902.
</span></p><span data-dcnode-id="1531" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1530" id="mntl-sc-block_1-0-169"></div><span data-dcnode-id="1529" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1524" id="mntl-sc-block_1-0-170"><span data-dcnode-id="1528" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node=""> Sir J.J. Thomson (1856–1940) </span></span><span data-dcnode-id="1525" instrument_node=""> </span></h3><span data-dcnode-id="1523" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1521" id="mntl-sc-block_1-0-171"><span data-dcnode-id="1522" instrument_node="">
Research on cathode rays&nbsp;proved existence of electrons (1896). Nobel Prize in 1906.
</span></p><span data-dcnode-id="1520" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1519" id="mntl-sc-block_1-0-172"></div><span data-dcnode-id="1518" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1513" id="mntl-sc-block_1-0-173"><span data-dcnode-id="1517" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node=""> J. Plucker (1859) </span></span><span data-dcnode-id="1514" instrument_node=""> </span></h3><span data-dcnode-id="1512" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1507" id="mntl-sc-block_1-0-174"><span data-dcnode-id="1511" instrument_node="">
Built </span><a data-component="link" data-dcnode-id="1509" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/chemical-element-pictures-photo-gallery-4052466"><span data-dcnode-id="1510" instrument_node="">one of the first gas discharge tubes</span></a><span data-dcnode-id="1508" instrument_node="">&nbsp;(cathode ray tubes).
</span></p><span data-dcnode-id="1506" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1505" id="mntl-sc-block_1-0-175"></div><span data-dcnode-id="1504" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1499" id="mntl-sc-block_1-0-176"><span data-dcnode-id="1503" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node=""> James Clerk Maxwell (1859) </span></span><span data-dcnode-id="1500" instrument_node=""> </span></h3><span data-dcnode-id="1498" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1496" id="mntl-sc-block_1-0-177"><span data-dcnode-id="1497" instrument_node="">
Described the mathematical distribution of the velocities of molecules of a gas.
</span></p><span data-dcnode-id="1495" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1494" id="mntl-sc-block_1-0-178"></div><span data-dcnode-id="1493" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1488" id="mntl-sc-block_1-0-179"><span data-dcnode-id="1492" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node=""> Svante Arrhenius (1859–1927) </span></span><span data-dcnode-id="1489" instrument_node=""> </span></h3><span data-dcnode-id="1487" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1482" id="mntl-sc-block_1-0-180"><span data-dcnode-id="1486" instrument_node="">
Researched rates of reaction versus temperature (Arrhenius equation) and electrolytic dissociation.&nbsp;</span><a data-component="link" data-dcnode-id="1484" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/monetary-value-of-the-nobel-prize-608598"><span data-dcnode-id="1485" instrument_node="">Nobel Prize in 1903</span></a><span data-dcnode-id="1483" instrument_node="">.
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1480" id="mntl-sc-block_1-0-181"></div><span data-dcnode-id="1479" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1474" id="mntl-sc-block_1-0-182"><span data-dcnode-id="1478" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node=""> Hall,&nbsp;Charles Martin&nbsp;(1863–1914) </span></span><span data-dcnode-id="1475" instrument_node=""> </span></h3><span data-dcnode-id="1473" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1471" id="mntl-sc-block_1-0-183"><span data-dcnode-id="1472" instrument_node="">
Invented method of manufacturing aluminum by the electrochemical reduction of alumina. Parallel discovery by Heroult in France.
</span></p><span data-dcnode-id="1470" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1469" id="mntl-sc-block_1-0-184"></div><span data-dcnode-id="1468" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1467" id="toc-late-1800s-1900s"></span><span data-dcnode-id="1466" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1461" id="mntl-sc-block_1-0-185"><span data-dcnode-id="1465" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node=""> Late 1800s-1900s </span></span><span data-dcnode-id="1462" instrument_node=""> </span></h2><span data-dcnode-id="1460" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1458" id="mntl-sc-block_1-0-186"><span data-dcnode-id="1459" instrument_node="">
From the development of the first synthetic resin to discoveries about the nature of radiation and the development of penicillin, this period produced many scientific milestones.
</span></p><span data-dcnode-id="1457" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1456" id="mntl-sc-block_1-0-187"></div><span data-dcnode-id="1455" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1450" id="mntl-sc-block_1-0-188"><span data-dcnode-id="1454" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node=""> Leo H. Baekeland (1863–1944) </span></span><span data-dcnode-id="1451" instrument_node=""> </span></h3><span data-dcnode-id="1449" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1447" id="mntl-sc-block_1-0-189"><span data-dcnode-id="1448" instrument_node="">
Invented&nbsp;phenolformaldehyde&nbsp;plastic (1907). Bakelite was the first completely synthetic resin.
</span></p><span data-dcnode-id="1446" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1445" id="mntl-sc-block_1-0-190"></div><span data-dcnode-id="1444" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1439" id="mntl-sc-block_1-0-191"><span data-dcnode-id="1443" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node=""> Walther Hermann&nbsp;Nernst (1864–1941) </span></span><span data-dcnode-id="1440" instrument_node=""> </span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1436" id="mntl-sc-block_1-0-192"><span data-dcnode-id="1437" instrument_node="">
Nobel Prize in 1920&nbsp;for work in thermochemistry. Performed basic research in electrochemistry and thermodynamics.
</span></p><span data-dcnode-id="1435" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1434" id="mntl-sc-block_1-0-193"></div><span data-dcnode-id="1433" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1428" id="mntl-sc-block_1-0-194"><span data-dcnode-id="1432" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node=""> A. Werner (1866–1919) </span></span><span data-dcnode-id="1429" instrument_node=""> </span></h3><span data-dcnode-id="1427" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1425" id="mntl-sc-block_1-0-195"><span data-dcnode-id="1426" instrument_node="">
Introduced concept of coordination theory of valence (complex chemistry). Nobel Prize in 1913.
</span></p><span data-dcnode-id="1424" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1423" id="mntl-sc-block_1-0-196"></div><span data-dcnode-id="1422" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1417" id="mntl-sc-block_1-0-197"><span data-dcnode-id="1421" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node=""> Marie Curie (1867–1934) </span></span><span data-dcnode-id="1418" instrument_node=""> </span></h3><span data-dcnode-id="1416" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1411" id="mntl-sc-block_1-0-198"><span data-dcnode-id="1415" instrument_node="">
With&nbsp;</span><a data-component="link" data-dcnode-id="1413" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/pierre-curie-biography-and-achievements-4034912"><span data-dcnode-id="1414" instrument_node="">Pierre Curie</span></a><span data-dcnode-id="1412" instrument_node="">, discovered and isolated radium and polonium (1898). Studied&nbsp;radioactivity of uranium. Nobel Prize in 1903 (with Becquerel) in physics; in chemistry 1911.
</span></p><span data-dcnode-id="1410" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1409" id="mntl-sc-block_1-0-199"></div><span data-dcnode-id="1408" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1403" id="mntl-sc-block_1-0-200"><span data-dcnode-id="1407" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node=""> F. Haber (1868–1924) </span></span><span data-dcnode-id="1404" instrument_node=""> </span></h3><span data-dcnode-id="1402" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1394" id="mntl-sc-block_1-0-201"><span data-dcnode-id="1401" instrument_node="">
Synthesized&nbsp;</span><a data-component="link" data-dcnode-id="1399" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/haber-bosch-process-604046"><span data-dcnode-id="1400" instrument_node="">ammonia from nitrogen</span></a><span data-dcnode-id="1398" instrument_node="">&nbsp;and hydrogen, the&nbsp;</span><a data-component="link" data-dcnode-id="1396" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/fixed-nitrogen-and-nitrogen-fixation-608591"><span data-dcnode-id="1397" instrument_node="">first industrial fixation of atmospheric nitrogen</span></a><span data-dcnode-id="1395" instrument_node="">&nbsp;(the process was further developed by Bosch). Nobel Prize 1918.
</span></p><span data-dcnode-id="1393" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1392" id="mntl-sc-block_1-0-202"></div><span data-dcnode-id="1391" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1386" id="mntl-sc-block_1-0-203"><span data-dcnode-id="1390" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node=""> Lord Kelvin (1874) </span></span><span data-dcnode-id="1387" instrument_node=""> </span></h3><span data-dcnode-id="1385" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1380" id="mntl-sc-block_1-0-204"><span data-dcnode-id="1384" instrument_node="">
Stated the&nbsp;</span><a data-component="link" data-dcnode-id="1382" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/laws-of-thermodynamics-p3-2699420"><span data-dcnode-id="1383" instrument_node="">second law</span></a><span data-dcnode-id="1381" instrument_node="">&nbsp;of thermodynamics.
</span></p><span data-dcnode-id="1379" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1378" id="mntl-sc-block_1-0-205"></div><span data-dcnode-id="1377" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1372" id="mntl-sc-block_1-0-206"><span data-dcnode-id="1376" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node=""> Sir Ernest Rutherford (1871–1937) </span></span><span data-dcnode-id="1373" instrument_node=""> </span></h3><span data-dcnode-id="1371" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1366" id="mntl-sc-block_1-0-207"><span data-dcnode-id="1370" instrument_node="">
Discovered that uranium radiation is composed of positively charged 'alpha' particles and negatively charged 'beta' particles (1989/1899). First to prove radioactive decay of heavy elements and to perform a transmutation reaction (1919). Discovered&nbsp;</span><a data-component="link" data-dcnode-id="1368" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-most-radioactive-element-608920"><span data-dcnode-id="1369" instrument_node="">half-life of radioactive elements</span></a><span data-dcnode-id="1367" instrument_node="">. Established that the nucleus was small, dense, and positively charged. Assumed that electrons were outside the nucleus. Nobel Prize in 1908.
</span></p><span data-dcnode-id="1365" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1364" id="mntl-sc-block_1-0-208"></div><span data-dcnode-id="1363" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1358" id="mntl-sc-block_1-0-209"><span data-dcnode-id="1362" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node=""> James Clerk Maxwell (1873) </span></span><span data-dcnode-id="1359" instrument_node=""> </span></h3><span data-dcnode-id="1357" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1355" id="mntl-sc-block_1-0-210"><span data-dcnode-id="1356" instrument_node="">
Proposed that electric and magnetic fields filled space.
</span></p><span data-dcnode-id="1354" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1353" id="mntl-sc-block_1-0-211"></div><span data-dcnode-id="1352" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1347" id="mntl-sc-block_1-0-212"><span data-dcnode-id="1351" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node=""> G.J. Stoney (1874) </span></span><span data-dcnode-id="1348" instrument_node=""> </span></h3><span data-dcnode-id="1346" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1344" id="mntl-sc-block_1-0-213"><span data-dcnode-id="1345" instrument_node="">
Proposed that electricity consisted of discrete negative particles he named 'electrons'.
</span></p><span data-dcnode-id="1343" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1342" id="mntl-sc-block_1-0-214"></div><span data-dcnode-id="1341" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1336" id="mntl-sc-block_1-0-215"><span data-dcnode-id="1340" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node=""> Gilbert N. Lewis (1875–1946) </span></span><span data-dcnode-id="1337" instrument_node=""> </span></h3><span data-dcnode-id="1335" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1333" id="mntl-sc-block_1-0-216"><span data-dcnode-id="1334" instrument_node="">
Proposed electron-pair theory of acids and bases.
</span></p><span data-dcnode-id="1332" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1331" id="mntl-sc-block_1-0-217"></div><span data-dcnode-id="1330" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1325" id="mntl-sc-block_1-0-218"><span data-dcnode-id="1329" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node=""> F.W. Aston (1877–1945) </span></span><span data-dcnode-id="1326" instrument_node=""> </span></h3><span data-dcnode-id="1324" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1322" id="mntl-sc-block_1-0-219"><span data-dcnode-id="1323" instrument_node="">
Pioneer research on isotope separation by mass spectrograph. Nobel Prize 1922.
</span></p><span data-dcnode-id="1321" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1320" id="mntl-sc-block_1-0-220"></div><span data-dcnode-id="1319" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1314" id="mntl-sc-block_1-0-221"><span data-dcnode-id="1318" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node=""> Sir William Crookes (1879) </span></span><span data-dcnode-id="1315" instrument_node=""> </span></h3><span data-dcnode-id="1313" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1311" id="mntl-sc-block_1-0-222"><span data-dcnode-id="1312" instrument_node="">
Discovered&nbsp;that cathode rays&nbsp;travel in straight lines, impart a negative charge, are deflected by electric and magnetic fields (indicating negative charge), cause glass to fluoresce, and cause pinwheels in their path to spin (indicating mass).
</span></p><span data-dcnode-id="1310" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1309" id="mntl-sc-block_1-0-223"></div><span data-dcnode-id="1308" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1303" id="mntl-sc-block_1-0-224"><span data-dcnode-id="1307" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node=""> Hans Fischer (1881–1945) </span></span><span data-dcnode-id="1304" instrument_node=""> </span></h3><span data-dcnode-id="1302" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1300" id="mntl-sc-block_1-0-225"><span data-dcnode-id="1301" instrument_node="">
Research on porphyrins, chlorophyll, carotene. Synthesized hemin. Nobel Prize in 1930.
</span></p><span data-dcnode-id="1299" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1298" id="mntl-sc-block_1-0-226"></div><span data-dcnode-id="1297" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1292" id="mntl-sc-block_1-0-227"><span data-dcnode-id="1296" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node=""> Irving Langmuir (1881–1957) </span></span><span data-dcnode-id="1293" instrument_node=""> </span></h3><span data-dcnode-id="1291" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1286" id="mntl-sc-block_1-0-228"><span data-dcnode-id="1290" instrument_node="">
Research in the fields of surface chemistry, monomolecular films, emulsion chemistry,&nbsp;</span><a data-component="link" data-dcnode-id="1288" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/lightning-and-plasma-photo-gallery-4122966"><span data-dcnode-id="1289" instrument_node="">electric discharges</span></a><span data-dcnode-id="1287" instrument_node="">&nbsp;in gasses, cloud seeding. Nobel Prize in 1932.
</span></p><span data-dcnode-id="1285" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1284" id="mntl-sc-block_1-0-229"></div><span data-dcnode-id="1283" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1278" id="mntl-sc-block_1-0-230"><span data-dcnode-id="1282" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node=""> Hermann Staudinger (1881–1965) </span></span><span data-dcnode-id="1279" instrument_node=""> </span></h3><span data-dcnode-id="1277" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1275" id="mntl-sc-block_1-0-231"><span data-dcnode-id="1276" instrument_node="">
Studied high-polymer structure, catalytic synthesis, polymerization mechanisms. Nobel Prize in 1963.
</span></p><span data-dcnode-id="1274" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1273" id="mntl-sc-block_1-0-232"></div><span data-dcnode-id="1272" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1267" id="mntl-sc-block_1-0-233"><span data-dcnode-id="1271" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node=""> Sir Alexander Flemming (1881–1955) </span></span><span data-dcnode-id="1268" instrument_node=""> </span></h3><span data-dcnode-id="1266" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1264" id="mntl-sc-block_1-0-234"><span data-dcnode-id="1265" instrument_node="">
Discovered the antibiotic penicillin (1928). Nobel Prize in 1945.
</span></p><span data-dcnode-id="1263" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1262" id="mntl-sc-block_1-0-235"></div><span data-dcnode-id="1261" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1256" id="mntl-sc-block_1-0-236"><span data-dcnode-id="1260" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node=""> E. Goldstein (1886) </span></span><span data-dcnode-id="1257" instrument_node=""> </span></h3><span data-dcnode-id="1255" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1253" id="mntl-sc-block_1-0-237"><span data-dcnode-id="1254" instrument_node="">
Used cathode ray tube to study 'canal rays', which possessed electrical and magnetic properties opposite those an electron.
</span></p><span data-dcnode-id="1252" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1251" id="mntl-sc-block_1-0-238"></div><span data-dcnode-id="1250" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1245" id="mntl-sc-block_1-0-239"><span data-dcnode-id="1249" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node=""> Heinrich Hertz (1887) </span></span><span data-dcnode-id="1246" instrument_node=""> </span></h3><span data-dcnode-id="1244" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1242" id="mntl-sc-block_1-0-240"><span data-dcnode-id="1243" instrument_node="">
Discovered the&nbsp;photoelectric effect.
</span></p><span data-dcnode-id="1241" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1240" id="mntl-sc-block_1-0-241"></div><span data-dcnode-id="1239" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1234" id="mntl-sc-block_1-0-242"><span data-dcnode-id="1238" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node=""> Henry G.J. Moseley (1887–1915) </span></span><span data-dcnode-id="1235" instrument_node=""> </span></h3><span data-dcnode-id="1233" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1222" id="mntl-sc-block_1-0-243"><span data-dcnode-id="1232" instrument_node="">
Discovered the relation between the frequency of the x-rays emitted by an element and its&nbsp;</span><a data-component="link" data-dcnode-id="1230" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/atomic-number-2-on-periodic-table-606482"><span data-dcnode-id="1231" instrument_node="">atomic number</span></a><span data-dcnode-id="1229" instrument_node="">&nbsp;(1914). His work led to the&nbsp;</span><a data-component="link" data-dcnode-id="1227" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/how-to-use-a-periodic-table-608807"><span data-dcnode-id="1228" instrument_node="">reorganization of the periodic table</span></a><span data-dcnode-id="1226" instrument_node="">&nbsp;based on an atomic number rather&nbsp;</span><a data-component="link" data-dcnode-id="1224" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/atomic-mass-and-atomic-mass-number-606079"><span data-dcnode-id="1225" instrument_node="">than atomic mass</span></a><span data-dcnode-id="1223" instrument_node="">.
</span></p><span data-dcnode-id="1221" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1220" id="mntl-sc-block_1-0-244"></div><span data-dcnode-id="1219" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1214" id="mntl-sc-block_1-0-245"><span data-dcnode-id="1218" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node=""> Heinrich Hertz (1888) </span></span><span data-dcnode-id="1215" instrument_node=""> </span></h3><span data-dcnode-id="1213" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1211" id="mntl-sc-block_1-0-246"><span data-dcnode-id="1212" instrument_node="">
Discovered&nbsp;radio waves.
</span></p><span data-dcnode-id="1210" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1209" id="mntl-sc-block_1-0-247"></div><span data-dcnode-id="1208" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1203" id="mntl-sc-block_1-0-248"><span data-dcnode-id="1207" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node=""> Roger Adams (1889–1971) </span></span><span data-dcnode-id="1204" instrument_node=""> </span></h3><span data-dcnode-id="1202" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1200" id="mntl-sc-block_1-0-249"><span data-dcnode-id="1201" instrument_node="">
Industrial research on catalysis and methods of structural analysis.
</span></p><span data-dcnode-id="1199" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1198" id="mntl-sc-block_1-0-250"></div><span data-dcnode-id="1197" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1192" id="mntl-sc-block_1-0-251"><span data-dcnode-id="1196" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node=""> Thomas Midgley (1889–1944) </span></span><span data-dcnode-id="1193" instrument_node=""> </span></h3><span data-dcnode-id="1191" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1189" id="mntl-sc-block_1-0-252"><span data-dcnode-id="1190" instrument_node="">
Discovered tetraethyl lead and it used as an antiknock treatment for gasoline (1921). Discovered fluorocarbon refrigerants. Performed early research on synthetic rubber.
</span></p><span data-dcnode-id="1188" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1187" id="mntl-sc-block_1-0-253"></div><span data-dcnode-id="1186" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1181" id="mntl-sc-block_1-0-254"><span data-dcnode-id="1185" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node=""> Vladimir N. Ipatieff (1890?–1952) </span></span><span data-dcnode-id="1182" instrument_node=""> </span></h3><span data-dcnode-id="1180" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1178" id="mntl-sc-block_1-0-255"><span data-dcnode-id="1179" instrument_node="">
Research and development of catalytic alkylation and isomerisation of hydrocarbons (together with Herman Pines).
</span></p><span data-dcnode-id="1177" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1176" id="mntl-sc-block_1-0-256"></div><span data-dcnode-id="1175" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1170" id="mntl-sc-block_1-0-257"><span data-dcnode-id="1174" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node=""> Sir Frederick Banting (1891–1941) </span></span><span data-dcnode-id="1171" instrument_node=""> </span></h3><span data-dcnode-id="1169" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1167" id="mntl-sc-block_1-0-258"><span data-dcnode-id="1168" instrument_node="">
Isolated the insulin molecule. Nobel Prize in 1923.
</span></p><span data-dcnode-id="1166" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1165" id="mntl-sc-block_1-0-259"></div><span data-dcnode-id="1164" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1159" id="mntl-sc-block_1-0-260"><span data-dcnode-id="1163" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> Sir James Chadwick (1891–1974) </span></span><span data-dcnode-id="1160" instrument_node=""> </span></h3><span data-dcnode-id="1158" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1156" id="mntl-sc-block_1-0-261"><span data-dcnode-id="1157" instrument_node="">
Discovered the neutron (1932). Nobel Prize in 1935.
</span></p><span data-dcnode-id="1155" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1154" id="mntl-sc-block_1-0-262"></div><span data-dcnode-id="1153" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1148" id="mntl-sc-block_1-0-263"><span data-dcnode-id="1152" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node=""> Harold C. Urey (1894-1981) </span></span><span data-dcnode-id="1149" instrument_node=""> </span></h3><span data-dcnode-id="1147" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1145" id="mntl-sc-block_1-0-264"><span data-dcnode-id="1146" instrument_node="">
One of the leaders of the Manhattan Project. Discovered deuterium. Nobel Prize 1934.
</span></p><span data-dcnode-id="1144" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1143" id="mntl-sc-block_1-0-265"></div><span data-dcnode-id="1142" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1137" id="mntl-sc-block_1-0-266"><span data-dcnode-id="1141" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node=""> Wilhelm Roentgen (1895) </span></span><span data-dcnode-id="1138" instrument_node=""> </span></h3><span data-dcnode-id="1136" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1131" id="mntl-sc-block_1-0-267"><span data-dcnode-id="1135" instrument_node="">
Discovered that certain chemicals near a cathode&nbsp;</span><a data-component="link" data-dcnode-id="1133" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/television-history-cathode-ray-tube-1991459"><span data-dcnode-id="1134" instrument_node="">ray tube</span></a><span data-dcnode-id="1132" instrument_node="">&nbsp;glowed. Found highly penetrating rays that were not deflected by a magnetic field, which he named 'x-rays'.
</span></p><span data-dcnode-id="1130" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1129" id="mntl-sc-block_1-0-268"></div><span data-dcnode-id="1128" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1123" id="mntl-sc-block_1-0-269"><span data-dcnode-id="1127" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node=""> Henri Becquerel (1896) </span></span><span data-dcnode-id="1124" instrument_node=""> </span></h3><span data-dcnode-id="1122" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1120" id="mntl-sc-block_1-0-270"><span data-dcnode-id="1121" instrument_node="">
While studying effects of x-rays on photographic film, he discovered that some chemicals spontaneously decompose and emit very penetrating rays.
</span></p><span data-dcnode-id="1119" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1118" id="mntl-sc-block_1-0-271"></div><span data-dcnode-id="1117" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1112" id="mntl-sc-block_1-0-272"><span data-dcnode-id="1116" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node=""> Wallace Carothers (1896–1937) </span></span><span data-dcnode-id="1113" instrument_node=""> </span></h3><span data-dcnode-id="1111" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1109" id="mntl-sc-block_1-0-273"><span data-dcnode-id="1110" instrument_node="">
Synthesized neoprene (polychloroprene) and nylon (polyamide).
</span></p><span data-dcnode-id="1108" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1107" id="mntl-sc-block_1-0-274"></div><span data-dcnode-id="1106" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1101" id="mntl-sc-block_1-0-275"><span data-dcnode-id="1105" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node=""> Thomson,&nbsp;Joseph J. (1897) </span></span><span data-dcnode-id="1102" instrument_node=""> </span></h3><span data-dcnode-id="1100" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1098" id="mntl-sc-block_1-0-276"><span data-dcnode-id="1099" instrument_node="">
Discovered the electron. Used a cathode ray tube to experimentally determine the charge to mass ratio of an electron. Found that 'canal rays' were associated with the proton H+.
</span></p><span data-dcnode-id="1097" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1096" id="mntl-sc-block_1-0-277"></div><span data-dcnode-id="1095" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1090" id="mntl-sc-block_1-0-278"><span data-dcnode-id="1094" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node=""> Plank, Max (1900) </span></span><span data-dcnode-id="1091" instrument_node=""> </span></h3><span data-dcnode-id="1089" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1087" id="mntl-sc-block_1-0-279"><span data-dcnode-id="1088" instrument_node="">
Stated radiation law and Planck's constant.
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1085" id="mntl-sc-block_1-0-280"></div><span data-dcnode-id="1084" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1079" id="mntl-sc-block_1-0-281"><span data-dcnode-id="1083" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node=""> Soddy (1900) </span></span><span data-dcnode-id="1080" instrument_node=""> </span></h3><span data-dcnode-id="1078" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1073" id="mntl-sc-block_1-0-282"><span data-dcnode-id="1077" instrument_node="">
Observed spontaneous disintegration of radioactive elements into 'isotopes' or&nbsp;</span><a data-component="link" data-dcnode-id="1075" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/how-are-new-elements-discovered-606638"><span data-dcnode-id="1076" instrument_node="">new elements</span></a><span data-dcnode-id="1074" instrument_node="">, described 'half-life', made calculations of the energy of decay.
</span></p><span data-dcnode-id="1072" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1071" id="mntl-sc-block_1-0-283"></div><span data-dcnode-id="1070" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1065" id="mntl-sc-block_1-0-284"><span data-dcnode-id="1069" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node=""> George B. Kistiakowsky (1900–1982) </span></span><span data-dcnode-id="1066" instrument_node=""> </span></h3><span data-dcnode-id="1064" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1059" id="mntl-sc-block_1-0-285"><span data-dcnode-id="1063" instrument_node="">
Devised the detonating device used&nbsp;</span><a data-component="link" data-dcnode-id="1061" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/chemistry-4133594"><span data-dcnode-id="1062" instrument_node="">in the first atomic bomb</span></a><span data-dcnode-id="1060" instrument_node="">.
</span></p><span data-dcnode-id="1058" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1057" id="mntl-sc-block_1-0-286"></div><span data-dcnode-id="1056" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1051" id="mntl-sc-block_1-0-287"><span data-dcnode-id="1055" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node=""> Werner K. Heisenberg (1901–1976) </span></span><span data-dcnode-id="1052" instrument_node=""> </span></h3><span data-dcnode-id="1050" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1045" id="mntl-sc-block_1-0-288"><span data-dcnode-id="1049" instrument_node="">
Developed the orbital theory of chemical bonding. Described atoms&nbsp;</span><a data-component="link" data-dcnode-id="1047" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/definition-of-chemical-formula-604906"><span data-dcnode-id="1048" instrument_node="">using a formula</span></a><span data-dcnode-id="1046" instrument_node="">&nbsp;related to the frequencies of spectral lines. Stated the Uncertainty Principle (1927). Nobel Prize in 1932.
</span></p><span data-dcnode-id="1044" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1043" id="mntl-sc-block_1-0-289"></div><span data-dcnode-id="1042" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1037" id="mntl-sc-block_1-0-290"><span data-dcnode-id="1041" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node=""> Enrico Fermi (1901-1954) </span></span><span data-dcnode-id="1038" instrument_node=""> </span></h3><span data-dcnode-id="1036" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1034" id="mntl-sc-block_1-0-291"><span data-dcnode-id="1035" instrument_node="">
First to achieve a controlled nuclear fission reaction (1939/1942). Performed fundamental research on subatomic particles. Nobel Prize in 1938.
</span></p><span data-dcnode-id="1033" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1032" id="mntl-sc-block_1-0-292"></div><span data-dcnode-id="1031" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1026" id="mntl-sc-block_1-0-293"><span data-dcnode-id="1030" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node=""> Nagaoka (1903) </span></span><span data-dcnode-id="1027" instrument_node=""> </span></h3><span data-dcnode-id="1025" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1023" id="mntl-sc-block_1-0-294"><span data-dcnode-id="1024" instrument_node="">
Postulated a 'Saturnian' atom model with flat rings of electrons revolving about a positively charged particle.
</span></p><span data-dcnode-id="1022" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1021" id="mntl-sc-block_1-0-295"></div><span data-dcnode-id="1020" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1015" id="mntl-sc-block_1-0-296"><span data-dcnode-id="1019" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> Abegg (1904) </span></span><span data-dcnode-id="1016" instrument_node=""> </span></h3><span data-dcnode-id="1014" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1012" id="mntl-sc-block_1-0-297"><span data-dcnode-id="1013" instrument_node="">
Discovered that inert gasses have a stable electron configuration which results in their chemical inactivity.
</span></p><span data-dcnode-id="1011" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1010" id="mntl-sc-block_1-0-298"></div><span data-dcnode-id="1009" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1004" id="mntl-sc-block_1-0-299"><span data-dcnode-id="1008" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node=""> Hans Geiger (1906) </span></span><span data-dcnode-id="1005" instrument_node=""> </span></h3><span data-dcnode-id="1003" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1001" id="mntl-sc-block_1-0-300"><span data-dcnode-id="1002" instrument_node="">
Developed an electrical device which made an audible 'click' when hit with alpha particles.
</span></p><span data-dcnode-id="1000" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="999" id="mntl-sc-block_1-0-301"></div><span data-dcnode-id="998" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="993" id="mntl-sc-block_1-0-302"><span data-dcnode-id="997" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node=""> Ernest O. Lawrence (1901–1958) </span></span><span data-dcnode-id="994" instrument_node=""> </span></h3><span data-dcnode-id="992" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="990" id="mntl-sc-block_1-0-303"><span data-dcnode-id="991" instrument_node="">
Invented the cyclotron, which was used to create the first synthetic elements. Nobel Prize in 1939.
</span></p><span data-dcnode-id="989" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="988" id="mntl-sc-block_1-0-304"></div><span data-dcnode-id="987" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="982" id="mntl-sc-block_1-0-305"><span data-dcnode-id="986" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node=""> Wilard&nbsp;F. Libby (1908–1980) </span></span><span data-dcnode-id="983" instrument_node=""> </span></h3><span data-dcnode-id="981" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="979" id="mntl-sc-block_1-0-306"><span data-dcnode-id="980" instrument_node="">
Developed carbon-14 dating technique. Nobel Prize in 1960.
</span></p><span data-dcnode-id="978" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="977" id="mntl-sc-block_1-0-307"></div><span data-dcnode-id="976" instrument_node="">
</span><h3 class="comp mntl-sc-block reference-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="971" id="mntl-sc-block_1-0-308"><span data-dcnode-id="975" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node=""> Ernest Rutherford&nbsp;and Thomas Royds (1909) </span></span><span data-dcnode-id="972" instrument_node=""> </span></h3><span data-dcnode-id="970" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="965" id="mntl-sc-block_1-0-309"><span data-dcnode-id="969" instrument_node="">
Demonstrated&nbsp;that alpha particles&nbsp;are doubly ionized&nbsp;</span><a data-component="link" data-dcnode-id="967" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/atoms-diagrams-electron-configurations-elements-4064658"><span data-dcnode-id="968" instrument_node="">helium atoms</span></a><span data-dcnode-id="966" instrument_node="">.
</span></p><span data-dcnode-id="964" instrument_node="">
