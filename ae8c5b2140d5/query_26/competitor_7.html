ent_node="">If you ever feel like you can never truly get away, you probably have inventor Stephen J. Boies to thank (or blame). People had been tinkering with contraptions to record the human voice from afar since the mid-19th century. But in 1973, Boies developed the </span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//researcher.watson.ibm.com/researcher/view_group.php%3Fid%3D7339" target="_blank"><span data-dcnode-id="2181" instrument_node="">Speech Filing System</span></a><span data-dcnode-id="2179" instrument_node="">, which was the first voicemail. It allowed people to check messages from any phone even when the recording device wasn't present.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="2139" id="slide=12"><figure class="figure" data-dcnode-id="2152"><div class="img-wrap" data-dcnode-id="2155"><picture data-dcnode-id="2171" data-slide-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_18_fs.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slid.2e16d0ba.fill-60x40_VyIG2EX.jpg"><source data-dcnode-id="2173" data-srcset="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_18_fs.max-420x243.jpg" media="--mobile"><img alt="1974: Post-It Notes" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="2172" data-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_18_fs.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="label slide-counter" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">12 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3D%26media%3Dhttps%3A//cdn.cheapism.com/images/062217_best_amer 9"><span data-dcnode-id="2103" instrument_node="">In 1975, the first nail was hammered into the film camera's coffin when Eastman Kodak engineer </span><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.invent.org/blog/inventors/Legacy-Steve-Sasson" target="_blank"><span data-dcnode-id="2102" instrument_node="">Steven Sasson</span></a><span data-dcnode-id="2100" instrument_node="">&nbsp;invented the digital camera. The 24-year-old from Brooklyn was the first to use a new technology called digitalization to capture images. Four decades later, we carry his invention in our pockets on our phones.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="2053" id="slide=14"><figure class="figure" data-dcnode-id="2066"><div class="img-wrap" data-dcnode-id="2076"><picture data-dcnode-id="2092" data-slide-src="https://cdn.cheapism.com/images/Bulletin_Board_System.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/Bulletin_Board_System.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="2094" data-srcset="https://cdn.cheapism.com/images/Bulletin_Board_System.max-420x243.jpg" media="--mobile"><img alt="1978: Bulletin Board System" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="2093" data-src="https://cdn.cheapism.com/images/Bulletin_Board_System.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="label slide-counter" data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">14 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3D%26media%3Dhttps%3A//cdn.cheapism.com/images/Bulletin_Board_System.max-784x410.jpg" target="_blank"><svg class="icon icon-pinterest" data-dcnode-id="2086"><use data-dcnode-id="2087" xlink:href="#icon-pi 817" instrument_node="">Macintosh computer</span></a><span data-dcnode-id="1815" instrument_node="">. Before the Macintosh, which was the first affordable computer ever to come with a graphical user interface and a mouse, computers were designed only for businesses, techies, and experts. The Macintosh made computers available for the average person in the average household.</span></p><p data-dcnode-id="1812"><br data-dcnode-id="1813"></p><p data-dcnode-id="1805"><b data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Related:</span></b><span data-dcnode-id="1809" instrument_node="">&nbsp;</span><a data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cheapism.com/never-discounted-brands/"><span data-dcnode-id="1808" instrument_node="">Apple, Chanel, and Other Brands That Almost Never Go on Sale</span></a><br data-dcnode-id="1806"></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="1766" id="slide=21"><figure class="figure" data-dcnode-id="1779"><div class="img-wrap" data-dcnode-id="1782"><picture data-dcnode-id="1798" data-slide-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_27_fs.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slid.2e16d0ba.fill-60x40_pW4auwW.jpg"><source data-dcnode-id="1800" data-srcset="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_27_fs.max-420x243.jpg" media="--mobile"><img alt="1985: Lipitor" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="1799" data-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_27_fs.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="label slide-counter" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">21 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="1791  layering thousands of thin sheets of plastic on top of each other to create a physical 3D object. Once a novelty for hobbyists, the technology has since been used in applications ranging from manufacturing to medical science.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="1696" id="slide=23"><figure class="figure" data-dcnode-id="1709"><div class="img-wrap" data-dcnode-id="1712"><picture data-dcnode-id="1728" data-slide-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_29_fs.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slid.2e16d0ba.fill-60x40_dKSdSWw.jpg"><source data-dcnode-id="1730" data-srcset="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_29_fs.max-420x243.jpg" media="--mobile"><img alt="1987: Rollaboard Luggage" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="1729" data-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_29_fs.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="label slide-counter" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">23 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3D%26media%3Dhttps%3A//cdn.cheapism.com/images/062217_best_american_inventions_slide_29_fs.max-784x410.jpg" target="_blank"><svg class="icon icon-pinterest" data-dcnode-id="1722"><use data-dcnode-id="1723" xlink:href="#icon-pinterest"><svg data-dcnode-id="1724" id="icon-pinterest" viewBox="0 0 12 14"><path d="M.86521467 5.07854247c0-.60268158.10463065-1.17047725.31389509-1.70340402s.49804504-.99748686.86635045-1.39369419c.36830541-.39620734.79240831-.73939587 1.27232143-1.0295759.47991311-.29018002.99609099-.50781177 1.5485491-.65290178C5.4 class="slide-affiliates" data-dcnode-id="1705"><div class="rich-text" data-dcnode-id="1706"></div></div><div class="slide-body" data-dcnode-id="1698"><div class="rich-text" data-dcnode-id="1699"><p data-dcnode-id="1700"><span data-dcnode-id="1704" instrument_node="">Luggage with wheels dates back to the early 1970s, but it was a top-heavy version with a pull-strap, which was clumsy when compared to today's modern </span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2010/10/05/business/05road.html" target="_blank"><span data-dcnode-id="1703" instrument_node="">Rollaboard-style luggage</span></a><span data-dcnode-id="1701" instrument_node="">. Invented by Northwest Airlines pilot Robert Plath, the Rollaboard incorporated a now-familiar long, fixed telescoping handle that enabled luggage to be pulled upright on two wheels — just one of many American inventions that we now use on a daily basis.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="1661" id="slide=24"><figure class="figure" data-dcnode-id="1674"><div class="img-wrap" data-dcnode-id="1677"><picture data-dcnode-id="1693" data-slide-src="https://cdn.cheapism.com/images/iStock-175529440.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/iStock-175529440.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="1695" data-srcset="https://cdn.cheapism.com/images/iStock-175529440.max-420x243.jpg" media="--mobile"><img alt="Inserting contact lens" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="1694" data-src="https://cdn.cheapism.com/images/iStock-175529440.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="615"></picture><label class="label slide-counter" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">24 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="1686" href="https://chatnoir-w ience Jerome Schentag developed and patented the </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/history-of-the-smart-pill-1992429" target="_blank"><span data-dcnode-id="1492" instrument_node="">smart pill</span></a><span data-dcnode-id="1490" instrument_node="">. A revolutionary medical breakthrough, the smart pill is a medical device that is encapsulated in pill form and controlled by a computer. When patients swallow the pill, they swallow the device.</span></p><p data-dcnode-id="1487"><br data-dcnode-id="1488"></p><p data-dcnode-id="1481"><b data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Related:</span></b><span data-dcnode-id="1484" instrument_node=""> </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cheapism.com/reduce-your-healthcare-costs-these-expert-tips-seniors/"><span data-dcnode-id="1483" instrument_node="">50 Ways for Seniors to Save on Medical Expenses</span></a></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="1442" id="slide=30"><figure class="figure" data-dcnode-id="1455"><div class="img-wrap" data-dcnode-id="1458"><picture data-dcnode-id="1474" data-slide-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_36_fs.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slid.2e16d0ba.fill-60x40_azuswb3.jpg"><source data-dcnode-id="1476" data-srcset="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_36_fs.max-420x243.jpg" media="--mobile"><img alt="1993: UV Waterworks" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="1475" data-src="https://cdn.cheapism.com/images/062217_best_american_inventions_slide_36_fs.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="labe d="1295"><h2 class="h3 slide-title" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">2001: Human Genome Map</span></h2><div class="slide-affiliates" data-dcnode-id="1303"><div class="rich-text" data-dcnode-id="1304"></div></div><div class="slide-body" data-dcnode-id="1296"><div class="rich-text" data-dcnode-id="1297"><p data-dcnode-id="1298"><span data-dcnode-id="1302" instrument_node="">When scientists Francis Collins and Craig Venter began work on mapping the human genome in the early 1990s, the government had already been using a much slower and more expensive method for sequencing the human genome's 3 billion base pairs. By developing a cheaper, faster method, </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.genome.gov/12011238/an-overview-of-the-human-genome-project/" target="_blank"><span data-dcnode-id="1301" instrument_node="">Collins and Venter finished the project</span></a><span data-dcnode-id="1299" instrument_node="">&nbsp;two years early and published their results in 2001, ushering in a new era in the effort to prevent and cure disease.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="1252" id="slide=35"><figure class="figure" data-dcnode-id="1265"><div class="img-wrap" data-dcnode-id="1275"><picture data-dcnode-id="1291" data-slide-src="https://cdn.cheapism.com/images/1354402094_0d20365317_k.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/1354402094_0d20365317_k.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="1293" data-srcset="https://cdn.cheapism.com/images/1354402094_0d20365317_k.max-420x243.jpg" media="--mobile"><img alt="Old meets new(-ish)" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="1292" data-src="https://cdn.cheapism.com/images/1354402094_0d20365317_k.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="615"></pict .forbes.com/sites/roberthof/2014/02/04/how-fitbit-survived-as-a-hardware-startup/%23627a64d19347" target="_blank"><span data-dcnode-id="995" instrument_node="">Fitbit</span></a><span data-dcnode-id="993" instrument_node="">&nbsp;in time for Christmas in 2009. Invented by James Park and Eric Friedman, the device measures and records vital statistics and activity. Today, Fitbit claims more than 31 million active users and more than one-third of the wearable tech market.</span></p></div></div></article></div><div class="ad-places" data-dcnode-id="986"><div data-aa-adunit="/1030155/chp_ff_300v_2" data-aaad="true" data-dcnode-id="987"></div></div><div class="slideshow-item" data-dcnode-id="940" id="slide=43"><figure class="figure" data-dcnode-id="964"><div class="img-wrap" data-dcnode-id="967"><picture data-dcnode-id="983" data-slide-src="https://cdn.cheapism.com/images/Lab-Grown_Burger.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/Lab-Grown_Burger.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="985" data-srcset="https://cdn.cheapism.com/images/Lab-Grown_Burger.max-420x243.jpg" media="--mobile"><img alt="Lab-Grown Burger" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="984" data-src="https://cdn.cheapism.com/images/Lab-Grown_Burger.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="614"></picture><label class="label slide-counter" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">43 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3D%26media%3Dhttps%3A//cdn.cheapism.com/images/Lab-Grown_Burger.max-784x410.jpg" target="_blank"><svg class="icon icon-pinterest" data-dcnode-id="977"><use data-dcnode-id="978" xlink:href="#icon-pinterest"><svg data-dcnode-id="979" id="icon-pinterest" viewBox="0 0 12 14"><path d="M.8652 </span></figcaption></figure><article class="slide-info" data-dcnode-id="941"><h2 class="h3 slide-title" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">2013: Lab-Grown Burger</span></h2><div class="slide-affiliates" data-dcnode-id="960"><div class="rich-text" data-dcnode-id="961"></div></div><div class="slide-body" data-dcnode-id="942"><div class="rich-text" data-dcnode-id="943"><p data-dcnode-id="952"><span data-dcnode-id="959" instrument_node="">Six years ago, Dutch scientist Mark Post produced the first lab-grown burger — it took two years and $300,000, however. Since then, the cost of producing what is being coined "clean meat" — due to its much-lower environmental impact — has lowered while the </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scientificamerican.com/article/lab-grown-meat/" target="_blank"><span data-dcnode-id="958" instrument_node="">number of players</span></a><span data-dcnode-id="956" instrument_node="">&nbsp;racing to produce meatballs, steaks, pork, poultry, and seafood, has skyrocketed. Early in 2019, Bill Gates called lab-grown meats one of the "</span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technologyreview.com/lists/technologies/2019/" target="_blank"><span data-dcnode-id="955" instrument_node="">10 Breakthrough Technologies</span></a><span data-dcnode-id="953" instrument_node="">" of 2019.&nbsp;</span></p><p data-dcnode-id="950"><br data-dcnode-id="951"></p><p data-dcnode-id="944"><i data-dcnode-id="945"><span data-dcnode-id="949" instrument_node="">For more American inventions and innovators looking to make a difference in the world, check out </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cheapism.com/companies-doing-good-deeds/"><span data-dcnode-id="948" instrument_node="">26 Companies That Are Doing Good Deeds With Your Do  data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">2018: Google Duplex</span></h2><div class="slide-affiliates" data-dcnode-id="825"><div class="rich-text" data-dcnode-id="826"></div></div><div class="slide-body" data-dcnode-id="815"><div class="rich-text" data-dcnode-id="816"><p data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">More of an extension of an invention — that of artificially intelligent home assistants like the Amazon Echo — the </span><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geekwire.com/2018/google-duplex-technology-mimics-human-voices-raising-new-privacy-security-concerns/" target="_blank"><span data-dcnode-id="823" instrument_node="">Google Duplex</span></a><span data-dcnode-id="821" instrument_node="">&nbsp;is actually one of a few front-runners of next-gen AIs that can perform eerily human-like, conversational tasks like screening calls and making restaurant reservations, thanks to better speech training and synthesis techniques. Not yet invented: a way to balance improved technology with </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2018/05/googles-ai-assistant-is-a-reminder-that-privacy-and-security-are-not-the-same" target="_blank"><span data-dcnode-id="820" instrument_node="">privacy and security concerns</span></a><span data-dcnode-id="818" instrument_node="">.&nbsp;</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="778" id="slide=47"><figure class="figure" data-dcnode-id="791"><div class="img-wrap" data-dcnode-id="794"><picture data-dcnode-id="810" data-slide-src="https://cdn.cheapism.com/images/Headset.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/Headset.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="812" data-srcset="https://cdn.cheapism.com/images/Headset.max-420x243.jpg" media="--mobile"><img alt="Augmetics xvision surgic fill-rule="evenodd"></path></svg></use></svg></a><span data-dcnode-id="802" instrument_node=""> </span><a class="btn btn-zoom" data-dcnode-id="795" href="#image=47"><svg class="icon icon-zoom" data-dcnode-id="796"><use data-dcnode-id="797" xlink:href="#icon-zoom"><svg data-dcnode-id="798" id="icon-zoom" viewBox="24 12 18 18"><g data-dcnode-id="799" fill="none" fill-rule="evenodd"><g data-dcnode-id="800" stroke="currentColor" stroke-width="1.5"><path d="M31.671478 13.85574951h-6.37985649V20.235606M41.00399149 20.23560594V13.8557494H34.624135M25.2916215 22.89388v6.37985649h6.37985647M34.62413506 29.2737365h6.37985654v-6.37985647" data-dcnode-id="801"></path></g></g></svg></use></svg></a></div><figcaption class="figure-caption slide-credit" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Augmetics</span></figcaption></figure><article class="slide-info" data-dcnode-id="779"><h2 class="h3 slide-title" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">2019: Augmedics Xvision</span></h2><div class="slide-affiliates" data-dcnode-id="787"><div class="rich-text" data-dcnode-id="788"></div></div><div class="slide-body" data-dcnode-id="780"><div class="rich-text" data-dcnode-id="781"><p class="MsoNormal" data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">Xvision is as close as surgeons can get to having actual X-ray vision — outside of science fiction movies, of course. The culmination of several years of research and development by the Chicago-based Augmedics company, </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/collection/best-inventions-2020/5911324/xvision/" target="_blank"><span data-dcnode-id="785" instrument_node="">Xvision is an augmented reality headset</span></a><span data-dcnode-id="783" instrument_node="">&nbsp;that guides surgeons through incredibly complex spinal surgeries. It superimposes a 3D image of a patient's spine, rendered from a CT scan, over the outside of the patient's body, allowing the surgeon to "see through" the patient. The Food and Drug Administration approved it for use in December 2019, and hospitals like Rush University Medical Center and Johns Hopkins are now using it.</span></p></div></div></article></div><div class="slideshow-item" data-dcnode-id="735" id="slide=48"><figure class="figure" data-dcnode-id="756"><div class="img-wrap" data-dcnode-id="759"><picture data-dcnode-id="775" data-slide-src="https://cdn.cheapism.com/images/iStock-1303673696.max-784x410.jpg" data-thumb-src="https://cdn.cheapism.com/images/iStock-1303673696.2e16d0ba.fill-60x40.jpg"><source data-dcnode-id="777" data-srcset="https://cdn.cheapism.com/images/iStock-1303673696.max-420x243.jpg" media="--mobile"><img alt="Covid-19 Vaccine" class="lazyload img-responsive img-fit-contain slide-image" data-dcnode-id="776" data-src="https://cdn.cheapism.com/images/iStock-1303673696.max-784x410.jpg" height="410" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="615"></picture><label class="label slide-counter" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">48 / 49</span></label><a class="btn btn-pinit" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3D%26media%3Dhttps%3A//cdn.cheapism.com/images/iStock-1303673696.max-784x410.jpg" target="_blank"><svg class="icon icon-pinterest" data-dcnode-id="769"><use data-dcnode-id="770" xlink:href="#icon-pinterest"><svg data-dcnode-id="771" id="icon-pinterest" viewBox="0 0 12 14"><path d="M.86521467 5.07854247c0-.60268158.10463065-1.17047725.31389509-1.70340402s.49804504-.99748686.86635045-1.39369419c.36830541-.39620734.79240831-.73939587 1.27232143-1.0295759.47991311-.29018002.99609099-.50781177 1.5485491-.65290178C5.41878886.15387657 5.9823993.08133265 6.55717896.08133265c.88170084 0 1.70200513.18554502 2.4609375.55664062.75893237.37109561 1 data-dcnode-id="737"><div class="rich-text" data-dcnode-id="738"><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">From the very beginning of the coronavirus pandemic, the question on everyone's mind was when a vaccine would be ready. On Dec. 11, 2020, the question was answered when the FDA issued the very first </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fda.gov/emergency-preparedness-and-response/coronavirus-disease-2019-covid-19/pfizer-biontech-covid-19-vaccine%23additional" target="_blank"><span data-dcnode-id="750" instrument_node="">emergency use authorization for a vaccine</span></a><span data-dcnode-id="748" instrument_node="">, which would be manufactured by New York-based Pfizer. At the time, nearly 3,000 Americans were dying every day. That's about one 9/11 every 24 hours.</span></p><p data-dcnode-id="745"><br data-dcnode-id="746"></p><p data-dcnode-id="739"><b data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Related:</span></b><span data-dcnode-id="742" instrument_node=""> </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.cheapism.com/coronavirus-phrases/"><span data-dcnode-id="741" instrument_node="">Pandemic Phrases That Have Infected Our Vocabulary</span></a></p></div></div></article></div><div class="ad-places" data-dcnode-id="733"><div data-aa-adunit="/1030155/chp_ss_728v_3" data-aaad="true" data-dcnode-id="734"></div></div><div class="slideshow-item" data-dcnode-id="668" id="slide=49"><figure class="figure" data-dcnode-id="711"><div class="img-wrap" data-dcnode-id="714"><picture data-dcnode-id="730" data-slide-src="https://cdn.cheapism.com/images/051118_amazing_chocolate_chip_cookie_recipes.max-784x410_Vxq969Z.jpg" data-thumb-src="https://cdn.cheapism.com/images/051118_amazing_chocolate_chip_cookie.2e16d0ba.fill-60x40_lxJeJKY.jpg"><source data-dcnode-id="732" data-srcset="https://cdn. strument_node="">The Wright brothers successfully launch the first powered, sustained, and controlled </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/inventions/wright-brothers" target="_blank"><span data-dcnode-id="697" instrument_node="">airplane flight</span></a><span data-dcnode-id="695" instrument_node="">.</span></p><p data-dcnode-id="692"><br data-dcnode-id="693"></p><p data-dcnode-id="683"><b data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">1938: Chocolate Chip Cookies</span></b><span data-dcnode-id="689" instrument_node=""> </span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">Created by </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americacomesalive.com/chocolate-chip-cookie-inventor-ruth-wakefield/" target="_blank"><span data-dcnode-id="686" instrument_node="">Ruth Wakefield</span></a><span data-dcnode-id="684" instrument_node="">&nbsp;with the help of Susan Brides at the Toll House Inn in Massachusetts. This is the first year the recipe appeared in print.</span></p><p data-dcnode-id="681"><br data-dcnode-id="682"></p><p data-dcnode-id="672"><b data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">1969: Laser Printer</span></b><span data-dcnode-id="678" instrument_node=""> </span><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node="">A Xerox engineer named Gary Starkweather changed homes and offices forever with his </span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historyofinformation.com/expanded.php%3Fid%3D1112" target="_blank"><span data-dcnode-id="675" instrument_node="">laser printer</span></a><span data-dcnode-id="673" instrument_node="">, converting digital information into a format that a laser could read.&nbsp;</span></p></div></div></article></div></div><div class="column co
