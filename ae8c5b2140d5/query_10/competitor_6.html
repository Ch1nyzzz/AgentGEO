><span data-dcnode-id="4268" instrument_node="">Platform</span></a></th><td class="infobox-data" data-dcnode-id="4260"><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/.NET_Framework" title=".NET Framework"><span data-dcnode-id="4265" instrument_node="">.NET Framework</span></a><span data-dcnode-id="4263" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="4261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Web_app" title="Web app"><span data-dcnode-id="4262" instrument_node="">Web platform</span></a></td></tr><tr data-dcnode-id="4254"><th class="infobox-label" data-dcnode-id="4257" scope="row" style="white-space: nowrap;"><span data-dcnode-id="4258" instrument_node="">Available in</span></th><td class="infobox-data" data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">English, Chinese, Spanish, German, Russian, Hindi</span></td></tr><tr data-dcnode-id="4247"><th class="infobox-label" data-dcnode-id="4251" scope="row" style="white-space: nowrap;"><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software_categories%23Categorization_approaches" title="Software categories"><span data-dcnode-id="4253" instrument_node="">Type</span></a></th><td class="infobox-data" data-dcnode-id="4248"><a class="mw-redirect" data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visualization_software" title="Visualization software"><span data-dcnode-id="4250" instrument_node="">Visualization software</span></a></td></tr><tr data-dcnode-id="4237"><th class="infobox-label" data-dcnode-id="4244" scope="row" style="white-space: nowrap;"><a data-dcnode-id="4245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Software_license" title="Software license"><span data-dcnode-id="4246" instrument_node="">License</span></a></th><td class="infobox-data" data-dcnode-id="4238"><a data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MIT_License" title="MIT License"><span data-dcnode-id="4243" instrument_node="">MIT License</span></a><sup class="reference" data-dcnode-id="4239" id="cite_ref-3"><a data-dcnode-id="4240" href="#cite_note-3"><span data-dcnode-id="4241" instrument_node="">[3]</span></a></sup></td></tr><tr data-dcnode-id="4228"><th class="infobox-label" data-dcnode-id="4235" scope="row" style="white-space: nowrap;"><span data-dcnode-id="4236" instrument_node="">Website</span></th><td class="infobox-data" data-dcnode-id="4229"><span class="url" data-dcnode-id="4230"><a class="external text" data-dcnode-id="4231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//worldwidetelescope.org/" rel="nofollow"><span data-dcnode-id="4234" instrument_node="">worldwidetelescope</span><wbr data-dcnode-id="4233"><span data-dcnode-id="4232" instrument_node="">.org</span></a></span></td></tr></tbody></table><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4169"><b data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">WorldWide Telescope</span></b><span data-dcnode-id="4222" instrument_node=""> (</span><b data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">WWT</span></b><span data-dcnode-id="4219" instrument_node="">) is an </span><a data-dcnode-id="4217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open-source_software" title="Open-source software"><span data-dcnode-id="4218" instrument_node="">open-source</span></a><span data-dcnode-id="4216" instrument_node=""> set of applications, data and cloud services,</span><sup class="reference" data-dcnode-id="4213" id="cite_ref-4"><a data-dcnode-id="4214" href="#cite_note-4"><span data-dcnode-id="4215" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="4210" id="cite_ref-5"><a data-dcnode-id="4211" href="#cite_note-5"><span data-dcnode-id="4212" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4209" instrument_node=""> originally created by </span><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Research" title="Microsoft Research"><span data-dcnode-id="4208" instrument_node="">Microsoft Research</span></a><span data-dcnode-id="4206" instrument_node=""> but now an open source project hosted on </span><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GitHub" title="GitHub"><span data-dcnode-id="4205" instrument_node="">GitHub</span></a><span data-dcnode-id="4203" instrument_node="">.</span><sup class="reference" data-dcnode-id="4200" id="cite_ref-6"><a data-dcnode-id="4201" href="#cite_note-6"><span data-dcnode-id="4202" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4199" instrument_node="">  The </span><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/.NET_Foundation" title=".NET Foundation"><span data-dcnode-id="4198" instrument_node="">.NET Foundation</span></a><span data-dcnode-id="4196" instrument_node=""> holds the copyright and the project is managed by the </span><a data-dcnode-id="4194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Astronomical_Society" title="American Astronomical Society"><span data-dcnode-id="4195" instrument_node="">American Astronomical Society</span></a><span data-dcnode-id="4193" instrument_node=""> and has been supported by grants from the </span><a data-dcnode-id="4191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gordon_and_Betty_Moore_Foundation" title="Gordon and Betty Moore Foundation"><span data-dcnode-id="4192" instrument_node="">Moore Foundation</span></a><span data-dcnode-id="4190" instrument_node=""> and </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Science_Foundation" title="National Science Foundation"><span data-dcnode-id="4189" instrument_node="">National Science Foundation</span></a><span data-dcnode-id="4187" instrument_node="">.  WWT displays </span><a class="mw-redirect" data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical" title="Astronomical"><span data-dcnode-id="4186" instrument_node="">astronomical</span></a><span data-dcnode-id="4184" instrument_node="">, earth and planetary data allowing visual navigation through the 3-dimensional  (3D) Universe. Users are able to navigate the sky by panning and zooming, or explore the 3D universe from the surface of Earth to past the </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_microwave_background" title="Cosmic microwave background"><span data-dcnode-id="4183" instrument_node="">Cosmic microwave background</span></a><span data-dcnode-id="4181" instrument_node=""> (CMB), viewing both visual imagery and scientific data (academic papers, etc.) about that area and the objects in it. Data is curated from hundreds of different data sources, but its </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_data" title="Open data"><span data-dcnode-id="4180" instrument_node="">open data</span></a><span data-dcnode-id="4178" instrument_node=""> nature allows users to explore any third party data that conforms to a WWT supported format. With the rich source of multi-spectral all-sky images it is possible to view the sky in many wavelengths of light.</span><sup class="reference" data-dcnode-id="4175" id="cite_ref-techcrunch_7-0"><a data-dcnode-id="4176" href="#cite_note-techcrunch-7"><span data-dcnode-id="4177" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4174" instrument_node=""> The software utilizes Microsoft's Visual Experience Engine technologies to function.</span><sup class="reference" data-dcnode-id="4171" id="cite_ref-8"><a data-dcnode-id="4172" href="#cite_note-8"><span data-dcnode-id="4173" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4170" instrument_node=""> WWT can also be used to visualize arbitrary or abstract data sets and time series data.
</span></p><p data-dcnode-id="4147"><span data-dcnode-id="4168" instrument_node="">WWT is completely free and currently comes in two versions: a native application that runs under </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Windows" title="Microsoft Windows"><span data-dcnode-id="4167" instrument_node="">Microsoft Windows</span></a><sup class="reference" data-dcnode-id="4163" id="cite_ref-9"><a data-dcnode-id="4164" href="#cite_note-9"><span data-dcnode-id="4165" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4162" instrument_node=""> (this version can use the specialized capabilities of a computer graphics card to render up to a half million data points), and a web client based on </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HTML5" title="HTML5"><span data-dcnode-id="4161" instrument_node="">HTML5</span></a><span data-dcnode-id="4159" instrument_node=""> and </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WebGL" title="WebGL"><span data-dcnode-id="4158" instrument_node="">WebGL</span></a><span data-dcnode-id="4156" instrument_node="">.</span><sup class="reference" data-dcnode-id="4153" id="cite_ref-10"><a data-dcnode-id="4154" href="#cite_note-10"><span data-dcnode-id="4155" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4152" instrument_node=""> The web client uses a responsive design which allows people to use it on smartphones and on desktops. The Windows desktop application is a high-performance system which scales from a desktop to large multi-channel full dome digital planetariums.</span><sup class="reference" data-dcnode-id="4149" id="cite_ref-help_11-0"><a data-dcnode-id="4150" href="#cite_note-help-11"><span data-dcnode-id="4151" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4148" instrument_node="">
</span></p><p data-dcnode-id="4115"><span data-dcnode-id="4146" instrument_node="">The WWT project began in 2002, at </span><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Research" title="Microsoft Research"><span data-dcnode-id="4145" instrument_node="">Microsoft Research</span></a><span data-dcnode-id="4143" instrument_node=""> and </span><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johns_Hopkins_University" title="Johns Hopkins University"><span data-dcnode-id="4142" instrument_node="">Johns Hopkins University</span></a><span data-dcnode-id="4140" instrument_node="">. Database researcher </span><a data-dcnode-id="4138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Gray_%28computer_scientist%29" title="Jim Gray (computer scientist)"><span data-dcnode-id="4139" instrument_node="">Jim Gray</span></a><span data-dcnode-id="4137" instrument_node=""> had developed a satellite Earth-images database (</span><a class="mw-redirect" data-dcnode-id="4135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TerraServer-USA" title="TerraServer-USA"><span data-dcnode-id="4136" instrument_node="">Terraserver</span></a><span data-dcnode-id="4134" instrument_node="">) and wanted to apply a similar technique to organizing the many disparate astronomical databases of sky images.</span><sup class="reference" data-dcnode-id="4131" id="cite_ref-12"><a data-dcnode-id="4132" href="#cite_note-12"><span data-dcnode-id="4133" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4130" instrument_node="">  WWT was announced at the </span><a class="mw-redirect" data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TED_Conference" title="TED Conference"><span data-dcnode-id="4129" instrument_node="">TED Conference</span></a><span data-dcnode-id="4127" instrument_node=""> in </span><a data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monterey%2C_California" title="Monterey, California"><span data-dcnode-id="4126" instrument_node="">Monterey, California</span></a><span data-dcnode-id="4124" instrument_node=""> in February 2008.</span><sup class="reference" data-dcnode-id="4121" id="cite_ref-13"><a data-dcnode-id="4122" href="#cite_note-13"><span data-dcnode-id="4123" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4120" instrument_node="">  As of 2016, WWT has been downloaded by at least 10 million active users."</span><sup class="reference" data-dcnode-id="4117" id="cite_ref-equinox_14-0"><a data-dcnode-id="4118" href="#cite_note-equinox-14"><span data-dcnode-id="4119" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4116" instrument_node="">
</span></p><p data-dcnode-id="4110"><span data-dcnode-id="4114" instrument_node="">As of February 2012 the earth science applications of WWT are showcased and supported by the Layerscape community collaboration website, also created by </span><a data-dcnode-id="4112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Research" title="Microsoft Research"><span data-dcnode-id="4113" instrument_node="">Microsoft Research</span></a><span data-dcnode-id="4111" instrument_node="">.  Since WWT has gone to Open Source Layerscape communities have been brought into the WWT application and re-branded simply "communities".
</span></p><span data-dcnode-id="4109" instrument_node="">

</span><h2 data-dcnode-id="3927"><span class="mw-headline" data-dcnode-id="3935" id="Features"><span data-dcnode-id="3936" instrument_node="">Features</span></span><span class="mw-editsection" data-dcnode-id="3928"><span class="mw-editsection-bracket" data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">[</span></span><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D1" title="Edit section: Features"><span data-dcnode-id="3932" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3929"><span data-dcnode-id="3930" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3926" instrument_node="">
</span><h3 data-dcnode-id="3916"><span class="mw-headline" data-dcnode-id="3924" id="Modes"><span data-dcnode-id="3925" instrument_node="">Modes</span></span><span class="mw-editsection" data-dcnode-id="3917"><span class="mw-editsection-bracket" data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">[</span></span><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D2" title="Edit section: Modes"><span data-dcnode-id="3921" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3915" instrument_node="">
</span><p data-dcnode-id="3909"><span data-dcnode-id="3914" instrument_node="">WorldWide Telescope has six main modes. These are Sky, Earth, Planets, Panoramas, Solar System and Sandbox.</span><sup class="reference" data-dcnode-id="3911" id="cite_ref-help_11-1"><a data-dcnode-id="3912" href="#cite_note-help-11"><span data-dcnode-id="3913" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3910" instrument_node="">
</span></p><span data-dcnode-id="3908" instrument_node="">
</span><h4 data-dcnode-id="3898"><span class="mw-headline" data-dcnode-id="3906" id="Earth"><span data-dcnode-id="3907" instrument_node="">Earth</span></span><span class="mw-editsection" data-dcnode-id="3899"><span class="mw-editsection-bracket" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">[</span></span><a data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D3" title="Edit section: Earth"><span data-dcnode-id="3903" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3897" instrument_node="">
</span><p data-dcnode-id="3879"><span data-dcnode-id="3896" instrument_node="">Earth mode allows users to view a 3D model of the Earth, similar to </span><a class="mw-redirect" data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NASA_World_Wind" title="NASA World Wind"><span data-dcnode-id="3895" instrument_node="">NASA World Wind</span></a><span data-dcnode-id="3893" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsoft_Virtual_Earth" title="Microsoft Virtual Earth"><span data-dcnode-id="3892" instrument_node="">Microsoft Virtual Earth</span></a><span data-dcnode-id="3890" instrument_node=""> and </span><a data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Google_Earth" title="Google Earth"><span data-dcnode-id="3889" instrument_node="">Google Earth</span></a><span data-dcnode-id="3887" instrument_node="">. The Earth mode has a default data set with near global coverage and resolution down to sub-meter in high-population centers. Unlike most Earth viewers, WorldWide Telescope supports many different map projections including Mercator, Equirectangular and Tessellated Octahedral Adaptive Subdivision Transform (TOAST). There are also map layers for seasonal, night, streets, hybrid and science oriented </span><a class="mw-redirect" data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moderate-Resolution_Imaging_Spectroradiometer" title="Moderate-Resolution Imaging Spectroradiometer"><span data-dcnode-id="3886" instrument_node="">Moderate-Resolution Imaging Spectroradiometer</span></a><span data-dcnode-id="3884" instrument_node=""> (MODIS) imagery. The new layer manager can be used to add data visualization on the Earth or other planets.</span><sup class="reference" data-dcnode-id="3881" id="cite_ref-help_11-2"><a data-dcnode-id="3882" href="#cite_note-help-11"><span data-dcnode-id="3883" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3880" instrument_node="">
</span></p><span data-dcnode-id="3878" instrument_node="">
</span><h4 data-dcnode-id="3868"><span class="mw-headline" data-dcnode-id="3876" id="Planets"><span data-dcnode-id="3877" instrument_node="">Planets</span></span><span class="mw-editsection" data-dcnode-id="3869"><span class="mw-editsection-bracket" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">[</span></span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D4" title="Edit section: Planets"><span data-dcnode-id="3873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3843"><span data-dcnode-id="3866" instrument_node="">Planets mode currently allows users to view 3D models of eight celestial bodies: </span><a data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus" title="Venus"><span data-dcnode-id="3865" instrument_node="">Venus</span></a><span data-dcnode-id="3863" instrument_node="">, </span><a data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mars" title="Mars"><span data-dcnode-id="3862" instrument_node="">Mars</span></a><span data-dcnode-id="3860" instrument_node="">, </span><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jupiter" title="Jupiter"><span data-dcnode-id="3859" instrument_node="">Jupiter</span></a><span data-dcnode-id="3857" instrument_node="">, the </span><a data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_moons" title="Galilean moons"><span data-dcnode-id="3856" instrument_node="">Galilean moons</span></a><span data-dcnode-id="3854" instrument_node=""> of Jupiter, and our own planet's </span><a data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="3853" instrument_node="">moon</span></a><span data-dcnode-id="3851" instrument_node="">. It also allows users to view a </span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mandelbrot_set" title="Mandelbrot set"><span data-dcnode-id="3850" instrument_node="">Mandelbrot set</span></a><span data-dcnode-id="3848" instrument_node="">.</span><sup class="reference" data-dcnode-id="3845" id="cite_ref-help_11-3"><a data-dcnode-id="3846" href="#cite_note-help-11"><span data-dcnode-id="3847" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3844" instrument_node="">
</span></p><span data-dcnode-id="3842" instrument_node="">
</span><h4 data-dcnode-id="3832"><span class="mw-headline" data-dcnode-id="3840" id="Sky"><span data-dcnode-id="3841" instrument_node="">Sky</span></span><span class="mw-editsection" data-dcnode-id="3833"><span class="mw-editsection-bracket" data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">[</span></span><a data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D5" title="Edit section: Sky"><span data-dcnode-id="3837" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3792"><span data-dcnode-id="3830" instrument_node="">Sky mode is the main feature of the software. It allows users to view high quality images of outer space with images from many space and Earth-based telescopes. Each image is shown at its actual position in the sky. There are over 200 full-sky images in spectral bands ranging from </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_astronomy" title="Radio astronomy"><span data-dcnode-id="3829" instrument_node="">radio</span></a><span data-dcnode-id="3827" instrument_node=""> to </span><a data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma-ray_astronomy" title="Gamma-ray astronomy"><span data-dcnode-id="3826" instrument_node="">gamma-rays</span></a><span data-dcnode-id="3824" instrument_node=""> There are also thousands of individual study images of various astronomical objects from space telescopes such as the </span><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_Space_Telescope" title="Hubble Space Telescope"><span data-dcnode-id="3823" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="3821" instrument_node="">, the </span><a data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spitzer_Space_Telescope" title="Spitzer Space Telescope"><span data-dcnode-id="3820" instrument_node="">Spitzer Space Telescope</span></a><span data-dcnode-id="3818" instrument_node=""> in </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_astronomy" title="Infrared astronomy"><span data-dcnode-id="3817" instrument_node="">infrared</span></a><span data-dcnode-id="3815" instrument_node="">, the </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandra_X-ray_Observatory" title="Chandra X-ray Observatory"><span data-dcnode-id="3814" instrument_node="">Chandra X-ray Observatory</span></a><span data-dcnode-id="3812" instrument_node="">, </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_Background_Explorer" title="Cosmic Background Explorer"><span data-dcnode-id="3811" instrument_node="">COBE</span></a><span data-dcnode-id="3809" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WMAP" title="WMAP"><span data-dcnode-id="3808" instrument_node="">WMAP</span></a><span data-dcnode-id="3806" instrument_node="">, </span><a data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ROSAT" title="ROSAT"><span data-dcnode-id="3805" instrument_node="">ROSAT</span></a><span data-dcnode-id="3803" instrument_node="">, </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IRAS" title="IRAS"><span data-dcnode-id="3802" instrument_node="">IRAS</span></a><span data-dcnode-id="3800" instrument_node="">, </span><a data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GALEX" title="GALEX"><span data-dcnode-id="3799" instrument_node="">GALEX</span></a><span data-dcnode-id="3797" instrument_node=""> as well as many other space and ground-based telescopes.</span><sup class="reference" data-dcnode-id="3794" id="cite_ref-help_11-4"><a data-dcnode-id="3795" href="#cite_note-help-11"><span data-dcnode-id="3796" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3793" instrument_node=""> Sky mode also shows the Sun, Moon, planets, and their moons in their current positions.
</span></p><p data-dcnode-id="3778"><span data-dcnode-id="3791" instrument_node="">Users can add their own image data from </span><a data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FITS" title="FITS"><span data-dcnode-id="3790" instrument_node="">FITS</span></a><span data-dcnode-id="3788" instrument_node=""> files or can convert them to standard image formats such as </span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/JPEG" title="JPEG"><span data-dcnode-id="3787" instrument_node="">JPEG</span></a><span data-dcnode-id="3785" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PNG_format" title="PNG format"><span data-dcnode-id="3784" instrument_node="">PNG</span></a><span data-dcnode-id="3782" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tagged_Image_File_Format" title="Tagged Image File Format"><span data-dcnode-id="3781" instrument_node="">TIFF</span></a><span data-dcnode-id="3779" instrument_node="">.  These images can be formatted with the astronomical visual metadata (AVM).
</span></p><span data-dcnode-id="3777" instrument_node="">
</span><h4 data-dcnode-id="3767"><span class="mw-headline" data-dcnode-id="3775" id="Panoramas"><span data-dcnode-id="3776" instrument_node="">Panoramas</span></span><span class="mw-editsection" data-dcnode-id="3768"><span class="mw-editsection-bracket" data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">[</span></span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D6" title="Edit section: Panoramas"><span data-dcnode-id="3772" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3755"><span data-dcnode-id="3765" instrument_node="">The Panorama mode allows users to view several panoramas, from remote robotic rovers: </span><a data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curiosity_%28rover%29" title="Curiosity (rover)"><span data-dcnode-id="3764" instrument_node="">Curiosity (rover)</span></a><span data-dcnode-id="3762" instrument_node="">, </span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mars_Exploration_Rover" title="Mars Exploration Rover"><span data-dcnode-id="3761" instrument_node="">Mars Exploration Rovers</span></a><span data-dcnode-id="3759" instrument_node="">, as well as from the </span><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollo_program" title="Apollo program"><span data-dcnode-id="3758" instrument_node="">Apollo program</span></a><span data-dcnode-id="3756" instrument_node=""> astronauts.
</span></p><p data-dcnode-id="3746"><span data-dcnode-id="3754" instrument_node="">Users can include their own panoramas, created by gigapixel panoramas such as the ones available for HDView.,</span><sup class="reference" data-dcnode-id="3751" id="cite_ref-help_11-5"><a data-dcnode-id="3752" href="#cite_note-help-11"><span data-dcnode-id="3753" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3750" instrument_node=""> or single-shot spherical cameras, such as the </span><a class="external text" data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theta360.com/en/" rel="nofollow"><span data-dcnode-id="3749" instrument_node="">Ricoh Theta</span></a><span data-dcnode-id="3747" instrument_node="">.
</span></p><span data-dcnode-id="3745" instrument_node="">
</span><h4 data-dcnode-id="3735"><span class="mw-headline" data-dcnode-id="3743" id="Solar_System"><span data-dcnode-id="3744" instrument_node="">Solar System</span></span><span class="mw-editsection" data-dcnode-id="3736"><span class="mw-editsection-bracket" data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">[</span></span><a data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D7" title="Edit section: Solar System"><span data-dcnode-id="3740" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3734" instrument_node="">
</span><p data-dcnode-id="3719"><span data-dcnode-id="3733" instrument_node="">This mode displays the major solar system objects from the Sun to Pluto, and Jupiter's moons, orbits of all solar system moons, all 550,000+ minor planets all positioned with their correct scale, position and phase. The user can move forward and backward in time at various rates, or type in a time and date for which to view the positions of the planets, and can select viewing location. The program can show the solar system the way it would look from any location at any time between 1 AD and 4000 AD. Using this tool a user can watch an </span><a data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eclipse" title="Eclipse"><span data-dcnode-id="3732" instrument_node="">eclipse</span></a><span data-dcnode-id="3730" instrument_node="">  (e.g., </span><a class="external text" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldwidetelescope.org/news/eclipse2017" rel="nofollow"><span data-dcnode-id="3729" instrument_node="">2017 total solar eclipse</span></a><span data-dcnode-id="3727" instrument_node="">) </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Occultation" title="Occultation"><span data-dcnode-id="3726" instrument_node="">occultation</span></a><span data-dcnode-id="3724" instrument_node="">, or astronomical alignment, and preview where the best spot might be to observe a future event.</span><sup class="reference" data-dcnode-id="3721" id="cite_ref-help_11-6"><a data-dcnode-id="3722" href="#cite_note-help-11"><span data-dcnode-id="3723" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3720" instrument_node=""> In this mode it is possible to zoom away from the Solar System, through the Milky Way, and out into the cosmos to see a hypothetical view of the entire known universe. Other bodies, spacecraft and orbital reference frames can be added and visualized in the Solar System Mode using the layer manager.
</span></p><p data-dcnode-id="3714"><span data-dcnode-id="3718" instrument_node="">Users can query the </span><a data-dcnode-id="3716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minor_Planet_Center" title="Minor Planet Center"><span data-dcnode-id="3717" instrument_node="">Minor Planet Center</span></a><span data-dcnode-id="3715" instrument_node=""> for the orbits of minor bodies in the solar system, such as
</span></p><p data-dcnode-id="3710"><b data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Sandbox</span></b><span data-dcnode-id="3711" instrument_node="">
</span></p><p data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">The Sandbox mode allows users to view arbitrary 3d models (OBJ or 3DS formats) in an empty universe.  For instance, this is useful to explore 3D objects such as molecular data.
</span></p><span data-dcnode-id="3707" instrument_node="">
</span><h3 data-dcnode-id="3697"><span class="mw-headline" data-dcnode-id="3705" id="Local_user_content"><span data-dcnode-id="3706" instrument_node="">Local user content</span></span><span class="mw-editsection" data-dcnode-id="3698"><span class="mw-editsection-bracket" data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">[</span></span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D8" title="Edit section: Local user content"><span data-dcnode-id="3702" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3696" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3695" instrument_node="">WorldWide Telescope was designed as a professional research environment and as such it facilitates viewing of user data. Virtually all of the data types and visualizations in WorldWide Telescope can be run using supplied user data either locally or over the network. Any of the above viewing modes allow the user to browse and load equirectangular, fisheye, or dome master images to be viewed as planet surfaces, sky images or panoramas. Images with </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy_Visualization_Metadata" title="Astronomy Visualization Metadata"><span data-dcnode-id="3694" instrument_node="">Astronomy Visualization Metadata</span></a><span data-dcnode-id="3692" instrument_node=""> (AVM) can be loaded and registered to their location in the sky. Images without AVM can be shown on the sky but the user must align the images in the sky by moving, scaling and rotating the images until star patterns align. Once the images are aligned they can be saved to collections for later viewing and sharing. The layer manager can be used to add vector or image data to planet surfaces or in orbit.</span><sup class="reference" data-dcnode-id="3689" id="cite_ref-help_11-7"><a data-dcnode-id="3690" href="#cite_note-help-11"><span data-dcnode-id="3691" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3688" instrument_node="">
</span></p><span data-dcnode-id="3686" instrument_node="">
</span><h3 data-dcnode-id="3676"><span class="mw-headline" data-dcnode-id="3684" id="Layer_Manager"><span data-dcnode-id="3685" instrument_node="">Layer Manager</span></span><span class="mw-editsection" data-dcnode-id="3677"><span class="mw-editsection-bracket" data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">[</span></span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D9" title="Edit section: Layer Manager"><span data-dcnode-id="3681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3667"><span data-dcnode-id="3674" instrument_node="">Introduced in the Aphelion release, the Layer Manager allows management of relative reference frames allowing data and images to be places on Earth, the planets, moons, the sky or anywhere else in the universe. Data can be loaded from files, linked live with Microsoft Excel, or pasted in from other applications. Layers support 3D points and </span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Well-known_text_representation_of_geometry" title="Well-known text representation of geometry"><span data-dcnode-id="3673" instrument_node="">Well-known text representation of geometry</span></a><span data-dcnode-id="3671" instrument_node=""> (WKT), shape files, </span><a data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3D_modeling" title="3D modeling"><span data-dcnode-id="3670" instrument_node="">3D models</span></a><span data-dcnode-id="3668" instrument_node="">, orbital elements, image layers and more. Time series data can be viewed to see smoothly animated events over time. Reference frames can contain orbital information allowing 3d models or other data to be plotted at their correct location over time.
</span></p><span data-dcnode-id="3666" instrument_node="">
</span><h3 data-dcnode-id="3656"><span class="mw-headline" data-dcnode-id="3664" id="Use_for_amateur_astronomy"><span data-dcnode-id="3665" instrument_node="">Use for amateur astronomy</span></span><span class="mw-editsection" data-dcnode-id="3657"><span class="mw-editsection-bracket" data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">[</span></span><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D10" title="Edit section: Use for amateur astronomy"><span data-dcnode-id="3661" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3655" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3654" instrument_node="">The program allows the selection of a telescope and camera and can preview the field of view against the sky. Using </span><a data-dcnode-id="3652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ASCOM_%28standard%29" title="ASCOM (standard)"><span data-dcnode-id="3653" instrument_node="">ASCOM</span></a><span data-dcnode-id="3651" instrument_node=""> the user can connect a computer-controlled telescope or an astronomical pointing device such as Meade's MySky, and then either control or follow it. The large selection of catalog objects and 1 arc-second-per-pixel imagery allow an astrophotographer to select and plan a photograph and find a suitable guide star using the multi-chip FOV indicator.</span><sup class="reference" data-dcnode-id="3648" id="cite_ref-help_11-8"><a data-dcnode-id="3649" href="#cite_note-help-11"><span data-dcnode-id="3650" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3647" instrument_node="">
</span></p><span data-dcnode-id="3645" instrument_node="">
</span><h3 data-dcnode-id="3635"><span class="mw-headline" data-dcnode-id="3643" id="Tours"><span data-dcnode-id="3644" instrument_node="">Tours</span></span><span class="mw-editsection" data-dcnode-id="3636"><span class="mw-editsection-bracket" data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">[</span></span><a data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D11" title="Edit section: Tours"><span data-dcnode-id="3640" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3634" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3633" instrument_node="">WorldWide Telescope contains a multimedia authoring environment that allows users or educators to create tours with a simple slide-based paradigm. The slides can have a begin and end camera position allowing for easy </span><a class="mw-redirect" data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ken_Burns_Effect" title="Ken Burns Effect"><span data-dcnode-id="3632" instrument_node="">Ken Burns Effects</span></a><span data-dcnode-id="3630" instrument_node="">. Pictures, objects, and text can be added to the slides, and tours can have both background music and voice-overs with separate volume control. The layer manager can be used in conjunction with a tour to publish user data visualizations with annotations and animations. One of the tours featured was made by a six-year-old boy, while other tours are made by astrophysicists such as Dr. </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alyssa_A._Goodman" title="Alyssa A. Goodman"><span data-dcnode-id="3629" instrument_node="">Alyssa A. Goodman</span></a><span data-dcnode-id="3627" instrument_node=""> of the Harvard/Smithsonian Center for Astrophysics and Dr. </span><a class="mw-redirect" data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_L._Hurt" title="Robert L. Hurt"><span data-dcnode-id="3626" instrument_node="">Robert L. Hurt</span></a><span data-dcnode-id="3624" instrument_node=""> of Caltech/JPL.</span><sup class="reference" data-dcnode-id="3621" id="cite_ref-help_11-9"><a data-dcnode-id="3622" href="#cite_note-help-11"><span data-dcnode-id="3623" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3620" instrument_node="">
</span></p><span data-dcnode-id="3618" instrument_node="">
</span><h3 data-dcnode-id="3608"><span class="mw-headline" data-dcnode-id="3616" id="Communities"><span data-dcnode-id="3617" instrument_node="">Communities</span></span><span class="mw-editsection" data-dcnode-id="3609"><span class="mw-editsection-bracket" data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">[</span></span><a data-dcnode-id="3612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D12" title="Edit section: Communities"><span data-dcnode-id="3613" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3606" instrument_node="">Communities are a way of allowing organizations and communities to add their own images, tours, catalogs and research materials to the WorldWide Telescope interface. The concept is similar to subscribing to a </span><a class="mw-redirect" data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/RSS_feed" title="RSS feed"><span data-dcnode-id="3605" instrument_node="">RSS feed</span></a><span data-dcnode-id="3603" instrument_node=""> except the contents are astronomical metadata.</span><sup class="reference" data-dcnode-id="3600" id="cite_ref-help_11-10"><a data-dcnode-id="3601" href="#cite_note-help-11"><span data-dcnode-id="3602" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3599" instrument_node="">
</span></p><span data-dcnode-id="3597" instrument_node="">
</span><h3 data-dcnode-id="3587"><span class="mw-headline" data-dcnode-id="3595" id="Virtual_observatory"><span data-dcnode-id="3596" instrument_node="">Virtual observatory</span></span><span class="mw-editsection" data-dcnode-id="3588"><span class="mw-editsection-bracket" data-dcnode-id="3593"><span data-dcnode-id="3594" instrument_node="">[</span></span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D13" title="Edit section: Virtual observatory"><span data-dcnode-id="3592" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3558"><span data-dcnode-id="3585" instrument_node="">The WorldWide Telescope was designed to be the embodiment of a rich virtual observatory client envisioned by </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turing_Award" title="Turing Award"><span data-dcnode-id="3584" instrument_node="">Turing Award</span></a><span data-dcnode-id="3582" instrument_node=""> winner </span><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Gray_%28computer_scientist%29" title="Jim Gray (computer scientist)"><span data-dcnode-id="3581" instrument_node="">Jim Gray</span></a><span data-dcnode-id="3579" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/JHU" title="JHU"><span data-dcnode-id="3578" instrument_node="">JHU</span></a><span data-dcnode-id="3576" instrument_node=""> astrophysicist and co-principal investigator for the US </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Virtual_Observatory" title="National Virtual Observatory"><span data-dcnode-id="3575" instrument_node="">National Virtual Observatory</span></a><span data-dcnode-id="3573" instrument_node="">, </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alex_Szalay" title="Alex Szalay"><span data-dcnode-id="3572" instrument_node="">Alex Szalay</span></a><span data-dcnode-id="3570" instrument_node=""> in their paper titled "The WorldWide Telescope".</span><sup class="reference" data-dcnode-id="3567" id="cite_ref-15"><a data-dcnode-id="3568" href="#cite_note-15"><span data-dcnode-id="3569" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3566" instrument_node=""> The WorldWide Telescope program makes use of </span><a class="mw-redirect" data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IVOA" title="IVOA"><span data-dcnode-id="3565" instrument_node="">IVOA</span></a><span data-dcnode-id="3563" instrument_node=""> standards for inter-operating with data providers to provide its image, search and catalog data. Rather than concentrate all data into one database, the WorldWide Telescope sources its data from all over the web and the available content grows as more VO compliant data sources are placed on the web.</span><sup class="reference" data-dcnode-id="3560" id="cite_ref-help_11-11"><a data-dcnode-id="3561" href="#cite_note-help-11"><span data-dcnode-id="3562" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3559" instrument_node="">
</span></p><span data-dcnode-id="3557" instrument_node="">
</span><h3 data-dcnode-id="3547"><span class="mw-headline" data-dcnode-id="3555" id="Full_dome_planetarium_support"><span data-dcnode-id="3556" instrument_node="">Full dome planetarium support</span></span><span class="mw-editsection" data-dcnode-id="3548"><span class="mw-editsection-bracket" data-dcnode-id="3553"><span data-dcnode-id="3554" instrument_node="">[</span></span><a data-dcnode-id="3551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D14" title="Edit section: Full dome planetarium support"><span data-dcnode-id="3552" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3546" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3537"><div class="thumbinner" data-dcnode-id="3538" style="width:222px;"><a class="image" data-dcnode-id="3544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlyssa_Goodman_under_the_Gaia_Stars_at_New_York%2527s_Hayden_Planetarium.jpg"><img alt="" class="thumbimage" data-dcnode-id="3545" data-file-height="2423" data-file-width="3611" decoding="async" height="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%2527s_Hayden_Planetarium.jpg/220px-Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%2527s_Hayden_Planetarium.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%27s_Hayden_Planetarium.jpg/330px-Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%27s_Hayden_Planetarium.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%27s_Hayden_Planetarium.jpg/440px-Alyssa_Goodman_under_the_Gaia_Stars_at_New_York%27s_Hayden_Planetarium.jpg 2x" width="220"></a><span data-dcnode-id="3543" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3539"><div class="magnify" data-dcnode-id="3541"><a class="internal" data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlyssa_Goodman_under_the_Gaia_Stars_at_New_York%2527s_Hayden_Planetarium.jpg" title="Enlarge"></a></div><span data-dcnode-id="3540" instrument_node="">Visualization using WorldWide Telescope at the Hayden Planetarium.</span></div></div></div><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3523"><span data-dcnode-id="3535" instrument_node="">The WorldWide Telescope Windows client application supports both single and multichannel </span><a class="mw-redirect" data-dcnode-id="3533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full-dome_video" title="Full-dome video"><span data-dcnode-id="3534" instrument_node="">full-dome video</span></a><span data-dcnode-id="3532" instrument_node=""> projection allowing it to power full-dome digital planetarium systems. It is currently installed in several world-class planetariums where it runs on turn-key planetarium system. It can also be used to create a stand-alone planetarium by using the included tools for calibration, alignment, and blending. This allows using consumer DLP projectors to create a projection system with resolution, performance and functionality comparable to high-end turnkey solutions, at a fraction of the cost. The University of Washington pioneered this approach with the UW Planetarium.</span><sup class="reference" data-dcnode-id="3529" id="cite_ref-16"><a data-dcnode-id="3530" href="#cite_note-16"><span data-dcnode-id="3531" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3528" instrument_node="">
WorldWide Telescope can also be used in single channel mode from a laptop using a mirror dome or fisheye projector to display on inflatable domes, or even on user constructed low-cost planetariums for which plans are available on their website.</span><sup class="reference" data-dcnode-id="3525" id="cite_ref-17"><a data-dcnode-id="3526" href="#cite_note-17"><span data-dcnode-id="3527" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3524" instrument_node="">
</span></p><span data-dcnode-id="3522" instrument_node="">
</span><h2 data-dcnode-id="3512"><span class="mw-headline" data-dcnode-id="3520" id="Reception"><span data-dcnode-id="3521" instrument_node="">Reception</span></span><span class="mw-editsection" data-dcnode-id="3513"><span class="mw-editsection-bracket" data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">[</span></span><a data-dcnode-id="3516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorldWide_Telescope%26action%3Dedit%26section%3D15" title="Edit section: Reception"><span data-dcnode-id="3517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3511" instrument_node="">
</span><p data-dcnode-id="3501"><span data-dcnode-id="3510" instrument_node="">WorldWide Telescope was praised before its announcement in a post by blogger Robert Scoble, who said the demo had made him cry.</span><sup class="reference" data-dcnode-id="3507" id="cite_ref-18"><a data-dcnode-id="3508" href="#cite_note-18"><span data-dcnode-id="3509" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3506" instrument_node=""> He later called it "the most fabulous thing I’ve seen Microsoft do in years."</span><sup class="reference" data-dcnode-id="3503" id="cite_ref-19"><a data-dcnode-id="3504" href="#cite_note-19"><span data-dcnode-id="3505" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3502" instrument_node="">
</span></p><p data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Dr. Roy Gould of the Harvard-Smithsonian Center for Astrophysics said:
</span></p><span data-dcnode-id="3498" instrument_node="">
</span><dl data-dcnode-id="3492"><dd data-dcnode-id="3493"><span data-dcnode-id="3497" instrument_node="">"The WorldWide Telescope takes the best images from the greatest telescopes on Earth ... and in space ... and assembles them into a seamless, holistic view of the universe. This new resource will change the way we do astronomy ... the way we teach astronomy ... and, most importantly, I think it's going to change the way we see ourselves in the universe,"..."The creators of the WorldWide Telescope have now given us a way to have a dialogue with our universe."</span><sup class="reference" data-dcnode-id="3494" id="cite_ref-WorldWide_Telescope_20-0"><a data-dcnode-id="3495" href="#cite_note-WorldWide_Telescope-20"><span data-dcnode-id="3496" instrument_node="">[20]</span></a></sup></dd></dl><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3490" instrument_node="">A PC World review of the original beta concluded that WorldWide Telescope "has a few shortcomings" but "is a phenomenal resource for enthusiasts, students, and teachers."</span><sup class="reference" data-dcnode-id="3487" id="cite_ref-PC_Mag_Review_21-0"><a data-dcnode-id="3488" href="#cite_note-PC_Mag_Review-21"><span data-dcnode-id="3489" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3486" instrument_node=""> It also believed the product to be "far beyond Google's current offerings."</span><sup class="reference" data-dcnode-id="3483" id="cite_ref-PC_Mag_Review_continued_22-0"><a data-dcnode-id="3484" href="#cite_note-PC_Mag_Review_continued-22"><span data-dcnode-id="3485" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3482" instrument_node="">
</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3480" instrument_node="">Prior to the cross-platform web client release, at least one reviewer regretted the lack of support for non-Windows operating systems, the slow speed at which imagery loads, and the lack of KML support.</span><sup class="reference" data-dcnode-id="3477" id="cite_ref-Ogle_Earth_Review_23-0"><a data-dcnode-id="3478" href="#cite_note-Ogle_Earth_Review-23"><span data-dcnode-id="3479" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3476" instrument_node="">
</span></p><span data-dcnode-id="3474" instrument_node="">
