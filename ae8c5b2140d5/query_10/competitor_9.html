</span><div class="clearfix product_form init smart-payment-button--false product_form--swatches is-visible" data-dcnode-id="5856" data-enable-state="true" data-money-format="${{amount}}" data-options-size="1" data-product="{&quot;id&quot;:6645079801925,&quot;title&quot;:&quot;Beginning Astronomy Telescope Starter Kit&quot;,&quot;handle&quot;:&quot;beginning-astronomy-telescope-starter-kit&quot;,&quot;description&quot;:&quot;\u003cp\u003eIntroducing the Beginner Astronomy Telescope Starter Kit from OPT! This kit comes with everything the beginner visual observer needs to get started observing the night sky. The&nbsp;Universal Astro 70mm Refractor Travel Telescope can provide amazing views of the craters on the moon, and will even let you see Saturn's rings and Jupiter's four Galilean moons! The telescope also comes with a bunch of great accessories that make the observing experience easy: two eyepieces, a smartphone mount for taking pictures with your phone, a bluetooth camera remote for your smartphone, and a carry case to take it with you wherever you go. The complete kit comes with a polishing cloth for keeping your optics clean, a red headlamp for operating your telescope in the dark and preserving your night vision, a premium green laser for pointing out objects in the night sky to your friends and family, and lastly a beanie to keep your head warm on colder nights!\u003c\/p\u003e\n\u003cdiv style=\&quot;text-align: center;\&quot;\u003e\u003cimg style=\&quot;float: none;\&quot; alt=\&quot;\&quot; src=\&quot;https:\/\/cdn.shopify.com\/s\/files\/1\/1594\/4815\/files\/25_600x600.png?v=1635204635\&quot;\u003e\u003c\/div\u003e\n\u003cp\u003e\u003cbr\u003e\u003c\/p\u003e\n\u003ch2\u003e\u003ca title=\&quot;Universal Astro 70mm Refractor Travel Telescope\&quot; href=\&quot;https:\/\/optcorp.com\/products\/universal-astro-70mm-refractor-travel-telescope\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eUniversal Astro 70mm Refractor Travel Telescope\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eAn astronomical telescope for kids and adults is the best gift to teach people how to explore nature and space. The Universal Astro 70mm Refractor Travel Telescope is an excellent choice when observing the moon and terrestrial objects. Quick and easy setup; no tools required. The Universal Astro 70mm Refractor Travel Telescope is ideal for beginners who are interested in exploring the moon, planets, clusters, and fog. One can even enjoy distant scenery like mountains, flowers, birds, and wild animals.\u003c\/p\u003e\n\u003ch2\u003e\u003ca title=\&quot;Radian Telescope Polishing Cloth\&quot; href=\&quot;https:\/\/optcorp.com\/products\/radian-telescope-polishing-cloth\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eRadian Telescope Polishing Cloth\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eKeep your telescope glass or mirrors spotless with the Radian Telescope Polishing Cloth. This soft cloth is 18x15 inches in size.\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eClean your delicate telescope optics, eyepieces, or other astro gear with this soft polishing cloth\u003c\/li\u003e\n\u003cli\u003e18x15 inches in size\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;Universal Astro LED Motion Sensing Headlamp\&quot; href=\&quot;https:\/\/optcorp.com\/products\/universal-astro-headlamp\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eUniversal Astro LED&nbsp;Motion Sensing Headlamp\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eThe \u003cspan data-mce-fragment=\&quot;1\&quot;\u003eUniversal Astro LED&nbsp;\u003c\/span\u003e\u003cspan data-ogsb=\&quot;white\&quot; data-mce-fragment=\&quot;1\&quot;\u003eMotion Sensing Headlamp\u003c\/span\u003e brings you a flexible option for light in the dark when camping, hiking, or setting up your astronomy gear under the night sky!\u003c\/p\u003e\n\u003cp\u003ePacked full of nifty features, this headlamp will serve you well in an active lifestyle. The waterproof hard plastic casing allows usage during less-than-ideal weather and you can adjust the light angle up to 60 degrees.\u003c\/p\u003e\n\u003cp\u003eUSB-mini port&nbsp;for charging.\u003c\/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cbr\u003e\u003cstrong\u003eInstructions for use\u003c\/strong\u003e \u003cbr\u003eWhen looking at the headlamp the button on the left will turn the light on and off. The button on the right will turn on\/off the sensor.\u003c\/p\u003e\n\u003cp\u003e&nbsp;\u003c\/p\u003e\n\u003cdiv style=\&quot;text-align: center;\&quot; data-mce-style=\&quot;text-align: center;\&quot;\u003e\u003cimg src=\&quot;https:\/\/cdn.shopify.com\/s\/files\/1\/1594\/4815\/files\/UA_Astro_Headlamp_480x480.jpg?v=1630083709\&quot; alt=\&quot;Universal Astro Headlamp\&quot; style=\&quot;float: none;\&quot; data-mce-style=\&quot;float: none;\&quot;\u003e\u003c\/div\u003e\n\u003cp\u003eTo keep the red light on only, you will click through the light colors and decide on the red one of choice (blinking or non-blinking).\u003c\/p\u003e\n\u003cp\u003eIf you pause a second and then click the left button again it will turn off the light.\u003c\/p\u003e\n\u003cp\u003eThe memory setting will last for up to 72 hours.\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003e5-mode LED headlamp: spot light, flood light, spot \u0026amp; flood light in tandem, red light, and blinking red light\u003c\/li\u003e\n\u003cli\u003e430 Max Lumens for considerable brightness that will last about 3 hours at max intensity and up to 5 hours for lower intensities\u003c\/li\u003e\n\u003cli\u003eBuilt-in, waterproof (IP44), and rechargeable lithium battery\u003c\/li\u003e\n\u003cli\u003eWith the motion sensor you can power the light on and off with a simple wave of your hand\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;Radian Green Laser For Stargazing\&quot; href=\&quot;https:\/\/optcorp.com\/products\/radian-green-laser-for-stargazing\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eRadian Green Laser For Stargazing\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eA&nbsp;favorite accessory for&nbsp;stargazing and astronomy outreach. As with any Radian product, the Green Laser is made from premium-quality components and&nbsp;comes with everything you need to&nbsp;start using it.\u003c\/p\u003e\n\u003ch3\u003ePowerful Beam for Stargazing\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003eWith 5mW (milliwatts) \u003cspan data-mce-fragment=\&quot;1\&quot;\u003eof power, the Radian Green Laser can easily produce a visible beam.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eLong Battery Life for Observing All Night\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003e\u003cspan\u003eWith a powerful 18650 battery inside, you can ensure hours of stargazing entertainment without having to worry about running out of battery power. The Radian Green Laser comes standard with an AC battery charger that can be plugged into&nbsp;a wall outlet to recharge the battery when not in use.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eFeatures for Safety First\u003c\/h3\u003e\n\u003cp\u003eWith any laser this powerful, proper safety practices must be taken in order to prevent injury or other accidents. The Radian Green Laser features a lock and key&nbsp;system on the rear end to prevent it from being accidentally turned on without the key. Please see&nbsp;the Safety \u0026amp; Best Use Practices&nbsp;below for more information on how to safely use the Radian Green Laser.\u003c\/p\u003e\n\u003ch3\u003eDurability, Portability, \u0026amp; Other Extras\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003e\u003cspan\u003eMade of top-grade aluminum, the Radian Green Laser is highly durable and resistant to drops.&nbsp;To further prevent drops, a handy wrist strap is included. At just 6 inches (150mm) long, it's compact, lightweight, and easy to hold and carry.&nbsp;A convenient Radian-branded zip-up carry bag is included for protecting the laser during travel and storage.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eSafety \u0026amp; Best Use Practices\u003c\/h3\u003e\n\u003cp\u003eWith any laser, especially one as powerful as the Radian Green Laser, it's best to&nbsp;follow&nbsp;these Safety \u0026amp; Best Use Practices to prevent injury, accidental damage, and&nbsp;proper stargazing etiquette:\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eNever point the laser at someone's eye or face, including your own. Doing so can cause permanent damage to vision. Always&nbsp;keep&nbsp;the laser pointed up at the sky when using it for stargazing.\u003c\/li\u003e\n\u003cli\u003eKeep the laser away from children at all times, and store the safety locking key in a separate location away from the laser when not in use.\u003c\/li\u003e\n\u003cli\u003eNever&nbsp;point the laser at&nbsp;a magnifying glass, binoculars, a telescope, a mirror, or other reflective glass surfaces that could potentially magnify or reflect the laser beam.\u003c\/li\u003e\n\u003cli\u003eNever point the laser at aircraft, and follow local laws and regulations about using a laser.\u003c\/li\u003e\n\u003cli\u003eUse caution when pointing the laser at a solid surface for more than a few seconds, as it can cause objects to burn.\u003c\/li\u003e\n\u003cli\u003eWhen at a dark sky location with other amateur astronomers nearby, it's best to ask permission to use the laser first, as doing so can ruin night vision for astronomy and\/or long exposure images.\u003c\/li\u003e\n\u003cli\u003eDo not keep&nbsp;the laser on for more than 30 seconds at one time as it can shorten the laser's useful lifetime.\u003c\/li\u003e\n\u003cli\u003eRemove the battery when the laser is not in use.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;OPT Beanie - Grey\&quot; href=\&quot;https:\/\/optcorp.com\/products\/opt-beanie-grey\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eOPT Beanie - Grey\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eEnjoy this soft, warm beanie when out under the night sky or just when you want to look good! The yarn fabric is smooth on your skin and one size fits most will ensure a snug fit.\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eOne size fits most\u003c\/li\u003e\n\u003cli\u003eMaterial: recycled yarn\u003c\/li\u003e\n\u003cli\u003eColor: grey\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003c!-- split --\u003e\n\u003cul\u003e\n\u003cli\u003eUniversal Astro 70mm Refractor Travel Telescope\u003cbr\u003e\n\u003c\/li\u003e\n\u003cli\u003eUniversal Astro LED Motion Sensing Headlamp\u003c\/li\u003e\n\u003cli\u003eRadian Green Laser for Stargazing\u003c\/li\u003e\n\u003cli\u003eRadian Telescope Polishing Cloth\u003c\/li\u003e\n\u003cli\u003eOPT Beanie - Grey\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003c!-- split --\u003e\n\u003cul\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\&quot;https:\/\/optcorp.com\/products\/universal-astro-70mm-refractor-travel-telescope\&quot; target=\&quot;_blank\&quot;\u003eUniversal Astro 70mm Refractor Travel Telescope\u003c\/a\u003e\u003c\/li\u003e\n\u003cul\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003eTelescope\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003eFinder scope: 5x24\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003e1x 10mm eyepiece\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003e1x 25mm eyepiece\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003eDiagonal Mirror\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce-style=\&quot;margin-left: 40px;\&quot;\u003eFocuser\u003c\/li\u003e\n\u003cli style=\&quot;margin-left: 40px;\&quot; data-mce- t_ratio&quot;:1.0,&quot;height&quot;:800,&quot;media_type&quot;:&quot;image&quot;,&quot;src&quot;:&quot;https:\/\/cdn.shopify.com\/s\/files\/1\/1594\/4815\/products\/greybeanie.png?v=1633632815&quot;,&quot;width&quot;:800}],&quot;requires_selling_plan&quot;:false,&quot;selling_plan_groups&quot;:[],&quot;content&quot;:&quot;\u003cp\u003eIntroducing the Beginner Astronomy Telescope Starter Kit from OPT! This kit comes with everything the beginner visual observer needs to get started observing the night sky. The&nbsp;Universal Astro 70mm Refractor Travel Telescope can provide amazing views of the craters on the moon, and will even let you see Saturn's rings and Jupiter's four Galilean moons! The telescope also comes with a bunch of great accessories that make the observing experience easy: two eyepieces, a smartphone mount for taking pictures with your phone, a bluetooth camera remote for your smartphone, and a carry case to take it with you wherever you go. The complete kit comes with a polishing cloth for keeping your optics clean, a red headlamp for operating your telescope in the dark and preserving your night vision, a premium green laser for pointing out objects in the night sky to your friends and family, and lastly a beanie to keep your head warm on colder nights!\u003c\/p\u003e\n\u003cdiv style=\&quot;text-align: center;\&quot;\u003e\u003cimg style=\&quot;float: none;\&quot; alt=\&quot;\&quot; src=\&quot;https:\/\/cdn.shopify.com\/s\/files\/1\/1594\/4815\/files\/25_600x600.png?v=1635204635\&quot;\u003e\u003c\/div\u003e\n\u003cp\u003e\u003cbr\u003e\u003c\/p\u003e\n\u003ch2\u003e\u003ca title=\&quot;Universal Astro 70mm Refractor Travel Telescope\&quot; href=\&quot;https:\/\/optcorp.com\/products\/universal-astro-70mm-refractor-travel-telescope\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eUniversal Astro 70mm Refractor Travel Telescope\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eAn astronomical telescope for kids and adults is the best gift to teach people how to explore nature and space. The Universal Astro 70mm Refractor Travel Telescope is an excellent choice when observing the moon and terrestrial objects. Quick and easy setup; no tools required. The Universal Astro 70mm Refractor Travel Telescope is ideal for beginners who are interested in exploring the moon, planets, clusters, and fog. One can even enjoy distant scenery like mountains, flowers, birds, and wild animals.\u003c\/p\u003e\n\u003ch2\u003e\u003ca title=\&quot;Radian Telescope Polishing Cloth\&quot; href=\&quot;https:\/\/optcorp.com\/products\/radian-telescope-polishing-cloth\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eRadian Telescope Polishing Cloth\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eKeep your telescope glass or mirrors spotless with the Radian Telescope Polishing Cloth. This soft cloth is 18x15 inches in size.\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eClean your delicate telescope optics, eyepieces, or other astro gear with this soft polishing cloth\u003c\/li\u003e\n\u003cli\u003e18x15 inches in size\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;Universal Astro LED Motion Sensing Headlamp\&quot; href=\&quot;https:\/\/optcorp.com\/products\/universal-astro-headlamp\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eUniversal Astro LED&nbsp;Motion Sensing Headlamp\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eThe \u003cspan data-mce-fragment=\&quot;1\&quot;\u003eUniversal Astro LED&nbsp;\u003c\/span\u003e\u003cspan data-ogsb=\&quot;white\&quot; data-mce-fragment=\&quot;1\&quot;\u003eMotion Sensing Headlamp\u003c\/span\u003e brings you a flexible option for light in the dark when camping, hiking, or setting up your astronomy gear under the night sky!\u003c\/p\u003e\n\u003cp\u003ePacked full of nifty features, this headlamp will serve you well in an active lifestyle. The waterproof hard plastic casing allows usage during less-than-ideal weather and you can adjust the light angle up to 60 degrees.\u003c\/p\u003e\n\u003cp\u003eUSB-mini port&nbsp;for charging.\u003c\/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cbr\u003e\u003cstrong\u003eInstructions for use\u003c\/strong\u003e \u003cbr\u003eWhen looking at the headlamp the button on the left will turn the light on and off. The button on the right will turn on\/off the sensor.\u003c\/p\u003e\n\u003cp\u003e&nbsp;\u003c\/p\u003e\n\u003cdiv style=\&quot;text-align: center;\&quot; data-mce-style=\&quot;text-align: center;\&quot;\u003e\u003cimg src=\&quot;https:\/\/cdn.shopify.com\/s\/files\/1\/1594\/4815\/files\/UA_Astro_Headlamp_480x480.jpg?v=1630083709\&quot; alt=\&quot;Universal Astro Headlamp\&quot; style=\&quot;float: none;\&quot; data-mce-style=\&quot;float: none;\&quot;\u003e\u003c\/div\u003e\n\u003cp\u003eTo keep the red light on only, you will click through the light colors and decide on the red one of choice (blinking or non-blinking).\u003c\/p\u003e\n\u003cp\u003eIf you pause a second and then click the left button again it will turn off the light.\u003c\/p\u003e\n\u003cp\u003eThe memory setting will last for up to 72 hours.\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003e5-mode LED headlamp: spot light, flood light, spot \u0026amp; flood light in tandem, red light, and blinking red light\u003c\/li\u003e\n\u003cli\u003e430 Max Lumens for considerable brightness that will last about 3 hours at max intensity and up to 5 hours for lower intensities\u003c\/li\u003e\n\u003cli\u003eBuilt-in, waterproof (IP44), and rechargeable lithium battery\u003c\/li\u003e\n\u003cli\u003eWith the motion sensor you can power the light on and off with a simple wave of your hand\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;Radian Green Laser For Stargazing\&quot; href=\&quot;https:\/\/optcorp.com\/products\/radian-green-laser-for-stargazing\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eRadian Green Laser For Stargazing\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eA&nbsp;favorite accessory for&nbsp;stargazing and astronomy outreach. As with any Radian product, the Green Laser is made from premium-quality components and&nbsp;comes with everything you need to&nbsp;start using it.\u003c\/p\u003e\n\u003ch3\u003ePowerful Beam for Stargazing\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003eWith 5mW (milliwatts) \u003cspan data-mce-fragment=\&quot;1\&quot;\u003eof power, the Radian Green Laser can easily produce a visible beam.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eLong Battery Life for Observing All Night\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003e\u003cspan\u003eWith a powerful 18650 battery inside, you can ensure hours of stargazing entertainment without having to worry about running out of battery power. The Radian Green Laser comes standard with an AC battery charger that can be plugged into&nbsp;a wall outlet to recharge the battery when not in use.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eFeatures for Safety First\u003c\/h3\u003e\n\u003cp\u003eWith any laser this powerful, proper safety practices must be taken in order to prevent injury or other accidents. The Radian Green Laser features a lock and key&nbsp;system on the rear end to prevent it from being accidentally turned on without the key. Please see&nbsp;the Safety \u0026amp; Best Use Practices&nbsp;below for more information on how to safely use the Radian Green Laser.\u003c\/p\u003e\n\u003ch3\u003eDurability, Portability, \u0026amp; Other Extras\u003cbr\u003e\n\u003c\/h3\u003e\n\u003cp\u003e\u003cspan\u003eMade of top-grade aluminum, the Radian Green Laser is highly durable and resistant to drops.&nbsp;To further prevent drops, a handy wrist strap is included. At just 6 inches (150mm) long, it's compact, lightweight, and easy to hold and carry.&nbsp;A convenient Radian-branded zip-up carry bag is included for protecting the laser during travel and storage.\u003c\/span\u003e\u003c\/p\u003e\n\u003ch3\u003eSafety \u0026amp; Best Use Practices\u003c\/h3\u003e\n\u003cp\u003eWith any laser, especially one as powerful as the Radian Green Laser, it's best to&nbsp;follow&nbsp;these Safety \u0026amp; Best Use Practices to prevent injury, accidental damage, and&nbsp;proper stargazing etiquette:\u003c\/p\u003e\n\u003cul\u003e\n\u003cli\u003eNever point the laser at someone's eye or face, including your own. Doing so can cause permanent damage to vision. Always&nbsp;keep&nbsp;the laser pointed up at the sky when using it for stargazing.\u003c\/li\u003e\n\u003cli\u003eKeep the laser away from children at all times, and store the safety locking key in a separate location away from the laser when not in use.\u003c\/li\u003e\n\u003cli\u003eNever&nbsp;point the laser at&nbsp;a magnifying glass, binoculars, a telescope, a mirror, or other reflective glass surfaces that could potentially magnify or reflect the laser beam.\u003c\/li\u003e\n\u003cli\u003eNever point the laser at aircraft, and follow local laws and regulations about using a laser.\u003c\/li\u003e\n\u003cli\u003eUse caution when pointing the laser at a solid surface for more than a few seconds, as it can cause objects to burn.\u003c\/li\u003e\n\u003cli\u003eWhen at a dark sky location with other amateur astronomers nearby, it's best to ask permission to use the laser first, as doing so can ruin night vision for astronomy and\/or long exposure images.\u003c\/li\u003e\n\u003cli\u003eDo not keep&nbsp;the laser on for more than 30 seconds at one time as it can shorten the laser's useful lifetime.\u003c\/li\u003e\n\u003cli\u003eRemove the battery when the laser is not in use.\u003c\/li\u003e\n\u003c\/ul\u003e\n\u003ch2\u003e\u003ca title=\&quot;OPT Beanie - Grey\&quot; href=\&quot;https:\/\/optcorp.com\/products\/opt-beanie-grey\&quot; target=\&quot;_blank\&quot;\u003e\u003cstrong\u003eOPT Beanie - Grey\u003c\/strong\u003e\u003c\/a\u003e\u003c\/h2\u003e\n\u003cp\u003eEnjoy this soft, warm beanie when out under the nig </span><p data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">A&nbsp;favorite accessory for&nbsp;stargazing and astronomy outreach. As with any Radian product, the Green Laser is made from premium-quality components and&nbsp;comes with everything you need to&nbsp;start using it.</span></p><span data-dcnode-id="5688" instrument_node="">
</span><h3 data-dcnode-id="5684"><span data-dcnode-id="5687" instrument_node="">Powerful Beam for Stargazing</span><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">
</span></h3><span data-dcnode-id="5683" instrument_node="">
</span><p data-dcnode-id="5679"><span data-dcnode-id="5682" instrument_node="">With 5mW (milliwatts) </span><span data-dcnode-id="5680" data-mce-fragment="1"><span data-dcnode-id="5681" instrument_node="">of power, the Radian Green Laser can easily produce a visible beam.</span></span></p><span data-dcnode-id="5678" instrument_node="">
</span><h3 data-dcnode-id="5674"><span data-dcnode-id="5677" instrument_node="">Long Battery Life for Observing All Night</span><br data-dcnode-id="5676"><span data-dcnode-id="5675" instrument_node="">
</span></h3><span data-dcnode-id="5673" instrument_node="">
</span><p data-dcnode-id="5670"><span data-dcnode-id="5671"><span data-dcnode-id="5672" instrument_node="">With a powerful 18650 battery inside, you can ensure hours of stargazing entertainment without having to worry about running out of battery power. The Radian Green Laser comes standard with an AC battery charger that can be plugged into&nbsp;a wall outlet to recharge the battery when not in use.</span></span></p><span data-dcnode-id="5669" instrument_node="">
</span><h3 data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">Features for Safety First</span></h3><span data-dcnode-id="5666" instrument_node="">
</span><p data-dcnode-id="5664"><span data-dcnode-id="5665" instrument_node="">With any laser this powerful, proper safety practices must be taken in order to prevent injury or other accidents. The Radian Green Laser features a lock and key&nbsp;system on the rear end to prevent it from being accidentally turned on without the key. Please see&nbsp;the Safety &amp; Best Use Practices&nbsp;below for more information on how to safely use the Radian Green Laser.</span></p><span data-dcnode-id="5663" instrument_node="">
</span><h3 data-dcnode-id="5659"><span data-dcnode-id="5662" instrument_node="">Durability, Portability, &amp; Other Extras</span><br data-dcnode-id="5661"><span data-dcnode-id="5660" instrument_node="">
</span></h3><span data-dcnode-id="5658" instrument_node="">
</span><p data-dcnode-id="5655"><span data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">Made of top-grade aluminum, the Radian Green Laser is highly durable and resistant to drops.&nbsp;To further prevent drops, a handy wrist strap is included. At just 6 inches (150mm) long, it's compact, lightweight, and easy to hold and carry.&nbsp;A convenient Radian-branded zip-up carry bag is included for protecting the laser during travel and storage.</span></span></p><span data-dcnode-id="5654" instrument_node="">
</span><h3 data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">Safety &amp; Best Use Practices</span></h3><span data-dcnode-id="5651" instrument_node="">
</span><p data-dcnode-id="5649"><span data-dcnode-id="5650" instrument_node="">With any laser, especially one as powerful as the Radian Green Laser, it's best to&nbsp;follow&nbsp;these Safety &amp; Best Use Practices to prevent injury, accidental damage, and&nbsp;proper stargazing etiquette:</span></p><span data-dcnode-id="5648" instrument_node="">
</span><ul data-dcnode-id="5622"><span data-dcnode-id="5647" instrument_node="">
</span><li data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">Never point the laser at someone's eye or face, including your own. Doing so can cause permanent damage to vision. Always&nbsp;keep&nbsp;the laser pointed up at the sky when using it for stargazing.</span></li><span data-dcnode-id="5644" instrument_node="">
</span><li data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">Keep the laser away from children at all times, and store the safety locking key in a separate location away from the laser when not in use.</span></li><span data-dcnode-id="5641" instrument_node="">
</span><li data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">Never&nbsp;point the laser at&nbsp;a magnifying glass, binoculars, a telescope, a mirror, or other reflective glass surfaces that could potentially magnify or reflect the laser beam.</span></li><span data-dcnode-id="5638" instrument_node="">
</span><li data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">Never point the laser at aircraft, and follow local laws and regulations about using a laser.</span></li><span data-dcnode-id="5635" instrument_node="">
</span><li data-dcnode-id="5633"><span data-dcnode-id="5634" instrument_node="">Use caution when pointing the laser at a solid surface for more than a few seconds, as it can cause objects to burn.</span></li><span data-dcnode-id="5632" instrument_node="">
</span><li data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">When at a dark sky location with other amateur astronomers nearby, it's best to ask permission to use the laser first, as doing so can ruin night vision for astronomy and/or long exposure images.</span></li><span data-dcnode-id="5629" instrument_node="">
</span><li data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">Do not keep&nbsp;the laser on for more than 30 seconds at one time as it can shorten the laser's useful lifetime.</span></li><span data-dcnode-id="5626" instrument_node="">
</span><li data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">Remove the battery when the laser is not in use.</span></li><span data-dcnode-id="5623" instrument_node="">
</span></ul><span data-dcnode-id="5621" instrument_node="">

</span><div data-dcnode-id="3828" id="reviews"><span data-dcnode-id="4947" instrument_node=""> </span><div class="container" data-dcnode-id="3830"><span data-dcnode-id="4946" instrument_node=""> </span><div class="page-content" data-dcnode-id="3831"><span data-dcnode-id="4945" instrument_node=""> </span><div class="shopify-reviews reviewsVisibility--true" data-dcnode-id="3832"><span data-dcnode-id="4944" instrument_node=""> </span><h2 class="title" data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">Product Reviews</span></h2><span data-dcnode-id="4941" instrument_node=""> </span><div data-dcnode-id="3833" data-description="<p>Introducing the Beginner Astronomy Telescope Starter Kit from OPT! This kit comes with everything the beginner visual observer needs to get started observing the night sky. The&nbsp;Universal Astro 70mm Refractor Travel Telescope can provide amazing views of the craters on the moon, and will even let you see Saturn's rings and Jupiter's four Galilean moons! The telescope also comes with a bunch of great accessories that make the observing experience easy: two eyepieces, a smartphone mount for taking pictures with your phone, a bluetooth camera remote for your smartphone, and a carry case to take it with you wherever you go. The complete kit comes with a polishing cloth for keeping your optics clean, a red headlamp for operating your telescope in the dark and preserving your night vision, a premium green laser for pointing out objects in the night sky to your friends and family, and lastly a beanie to keep your head warm on colder nights!</p>
<div style=&quot;text-align: center;&quot;><img style=&quot;float: none;&quot; alt=&quot;&quot; src=&quot;https://cdn.shopify.com/s/files/1/1594/4815/files/25_600x600.png?v=1635204635&quot;></div>
<p><br></p>
<h2><a title=&quot;Universal Astro 70mm Refractor Travel Telescope&quot; href=&quot;https://optcorp.com/products/universal-astro-70mm-refractor-travel-telescope&quot; target=&quot;_blank&quot;><strong>Universal Astro 70mm Refractor Travel Telescope</strong></a></h2>
<p>An astronomical telescope for kids and adults is the best gift to teach people how to explore nature and space. The Universal Astro 70mm Refractor Travel Telescope is an excellent choice when observing the moon and terrestrial objects. Quick and easy setup; no tools required. The Universal Astro 70mm Refractor Travel Telescope is ideal for beginners who are interested in exploring the moon, planets, clusters, and fog. One can even enjoy distant scenery like mountains, flowers, birds, and wild animals.</p>
<h2><a title=&quot;Radian Telescope Polishing Cloth&quot; href=&quot;https://optcorp.com/products/radian-telescope-polishing-cloth&quot; target=&quot;_blank&quot;><strong>Radian Telescope Polishing Cloth</strong></a></h2>
<p>Keep your telescope glass or mirrors spotless with the Radian Telescope Polishing Cloth. This soft cloth is 18x15 inches in size.</p>
<ul>
<li>Clean your delicate telescope optics, eyepieces, or other astro gear with this soft polishing cloth</li>
<li>18x15 inches in size</li>
</ul>
<h2><a title=&quot;Universal Astro LED Motion Sensing Headlamp&quot; href=&quot;https://optcorp.com/products/universal-astro-headlamp&quot; target=&quot;_blank&quot;><strong>Universal Astro LED&nbsp;Motion Sensing Headlamp</strong></a></h2>
<p>The <span data-mce-fragment=&quot;1&quot;>Universal Astro LED&nbsp;</span><span data-ogsb=&quot;white&quot; data-mce-fragment=&quot;1&quot;>Motion Sensing Headlamp</span> brings you a flexible option for light in the dark when camping, hiking, or setting up your astronomy gear under the night sky!</p>
<p>Packed full of nifty features, this headlamp will serve you well in an active lifestyle. The waterproof hard plastic casing allows usage during less-than-ideal weather and you can adjust the light angle up to 60 degrees.</p>
<p>USB-mini port&nbsp;for charging.</p>
<hr>
<p><br><strong>Instructions for use</strong> <br>When looking at the headlamp the button on the left will turn the light on and off. The button on the right will turn on/off the sensor.</p>
<p>&nbsp;</p>
<div style=&quot;text-align: center;&quot; data-mce-style=&quot;text-align: center;&quot;><img src=&quot;https://cdn.shopify.com/s/files/1/1594/4815/files/UA_Astro_Headlamp_480x480.jpg?v=1630083709&quot; alt=&quot;Universal Astro Headlamp&quot; style=&quot;float: none;&quot; data-mce-style=&quot;float: none;&quot;></div>
<p>To keep the red light on only, you will click through the light colors and decide on the red one of choice (blinking or non-blinking).</p>
<p>If you pause a second and then click the left button again it will turn off the light.</p>
<p>The memory setting will last for up to 72 hours.</p>
<ul>
<li>5-mode LED headlamp: spot light, flood light, spot &amp;amp; flood light in tandem, red light, and blinking red light</li>

<h2><a title=&quot;Radian Green Laser For Stargazing&quot; href=&quot;https://optcorp.com/products/radian-green-laser-for-stargazing&quot; target=&quot;_blank&quot;><strong>Radian Green Laser For Stargazing</strong></a></h2>
<p>A&nbsp;favorite accessory for&nbsp;stargazing and astronomy outreach. As with any Radian product, the Green Laser is made from premium-quality components and&nbsp;comes with everything you need to&nbsp;start using it.</p>
<h3>Powerful Beam for Stargazing<br>
</h3>
<p>With 5mW (milliwatts) <span data-mce-fragment=&quot;1&quot;>of power, the Radian Green Laser can easily produce a visible beam.</span></p>
<h3>Long Battery Life for Observing All Night<br>
</h3>
<p><span>With a powerful 18650 battery inside, you can ensure hours of stargazing entertainment without having to worry about running out of battery power. The Radian Green Laser comes standard with an AC battery charger that can be plugged into&nbsp;a wall outlet to recharge the battery when not in use.</span></p>
<h3>Features for Safety First</h3>
<p>With any laser this powerful, proper safety practices must be taken in order to prevent injury or other accidents. The Radian Green Laser features a lock and key&nbsp;system on the rear end to prevent it from being accidentally turned on without the key. Please see&nbsp;the Safety &amp;amp; Best Use Practices&nbsp;below for more information on how to safely use the Radian Green Laser.</p>
<h3>Durability, Portability, &amp;amp; Other Extras<br>
</h3>
<p><span>Made of top-grade aluminum, the Radian Green Laser is highly durable and resistant to drops.&nbsp;To further prevent drops, a handy wrist strap is included. At just 6 inches (150mm) long, it's compact, lightweight, and easy to hold and carry.&nbsp;A convenient Radian-branded zip-up carry bag is included for protecting the laser during travel and storage.</span></p>
<h3>Safety &amp;amp; Best Use Practices</h3>
<p>With any laser, especially one as powerful as the Radian Green Laser, it's best to&nbsp;follow&nbsp;these Safety &amp;amp; Best Use Practices to prevent injury, accidental damage, and&nbsp;proper stargazing etiquette:</p>
<ul>
<li>Never point the laser at someone's eye or face, including your own. Doing so can cause permanent damage to vision. Always&nbsp;keep&nbsp;the laser pointed up at the sky when using it for stargazing.</li>
<li>Keep the laser away from children at all times, and store the safety locking key in a separate location away from the laser when not in use.</li>
<li>Never&nbsp;point the laser at&nbsp;a magnifying glass, binoculars, a telescope, a mirror, or other reflective glass surfaces that could potentially magnify or reflect the laser beam.</li>
<li>Never point the laser at aircraft, and follow local laws and regulations about using a laser.</li>
<li>Use caution when pointing the laser at a solid surface for more than a few seconds, as it can cause objects to burn.</li>
<li>When at a dark sky location with other amateur astronomers nearby, it's best to ask permission to use the laser first, as doing so can ruin night vision for astronomy and/or long exposure images.</li>
<li>Do not keep&nbsp;the laser on for more than 30 seconds at one time as it can shorten the laser's useful lifetime.</li>
<li>Remove the battery when the laser is not in use.</li>
</ul>

</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="86" tabindex="0"><span data-dcnode-id="266" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="265"></div><span data-dcnode-id="264" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="88" role="dialog"><span data-dcnode-id="263" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="259" role="button" tabindex="0"><span data-dcnode-id="262" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="261"></i><span data-dcnode-id="260" instrument_node=""> </span></span><span data-dcnode-id="258" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="90"><span data-dcnode-id="257" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="92"><strong class="acsb-title-main" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Compliance status</span></strong><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="237" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="231" instrument_node="">
</span><ol data-dcnode-id="205"><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="218"><strong class="acsb-title" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="227" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="226"><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="223"><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="220"><br data-dcnode-id="219"></li><span data-dcnode-id="217" instrument_node="">
</span><li data-dcnode-id="207"><strong class="acsb-title" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="214" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="213"><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="210"><br data-dcnode-id="209"><span data-dcnode-id="208" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="206" instrument_node="">
</span></ol><span data-dcnode-id="204" instrument_node="">
</span><strong data-dcnode-id="201" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="202" lang="EN-US"><span data-dcnode-id="203" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="200" instrument_node="">
</span><ul data-dcnode-id="168"><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="195"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="196" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="194" instrument_node="">
</span><li data-dcnode-id="190"><strong class="acsb-title" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="191" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="185"><strong class="acsb-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="186" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="184" instrument_node="">
</span><li data-dcnode-id="180"><strong class="acsb-title" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="181" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="179" instrument_node="">
</span><li data-dcnode-id="175"><strong class="acsb-title" data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="176" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="170"><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="171" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="169" instrument_node="">
</span></ul><span data-dcnode-id="167" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="164"><span data-dcnode-id="165" lang="EN-US"><span data-dcnode-id="166" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="163" instrument_node="">
</span><ol data-dcnode-id="105"><span data-dcnode-id="162" instrument_node="">
</span><li data-dcnode-id="155"><strong class="acsb-title" data-dcnode-id="158"><span data-dcnode-id="160" lang="EN-US"><span data-dcnode-id="161" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="159" instrument_node="">–</span></strong><span data-dcnode-id="156" lang="EN-US"><span data-dcnode-id="157" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="154" instrument_node="">
</span><li data-dcnode-id="147"><span data-dcnode-id="150" lang="EN-US"><strong class="acsb-title" data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="151" instrument_node="">&nbsp;</span></span><span data-dcnode-id="148" lang="EN-US"><span data-dcnode-id="149" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="146" instrument_node="">
</span><li data-dcnode-id="140"><span data-dcnode-id="142" lang="EN-US"><strong class="acsb-title" data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">Animations –</span></strong><span data-dcnode-id="143" instrument_node="">&nbsp;</span></span><span data-dcnode-id="141" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="139" instrument_node="">
</span><li data-dcnode-id="132"><span data-dcnode-id="135" lang="EN-US"><strong class="acsb-title" data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="136" instrument_node="">&nbsp;</span></span><span data-dcnode-id="133" lang="EN-US"><span data-dcnode-id="134" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="131" instrument_node="">
</span><li data-dcnode-id="124"><span data-dcnode-id="127" lang="EN-US"><strong class="acsb-title" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="128" instrument_node="">&nbsp;</span></span><span data-dcnode-id="125" lang="EN-US"><span data-dcnode-id="126" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="123" instrument_node="">
</span><li data-dcnode-id="116"><span data-dcnode-id="119" lang="EN-US"><strong class="acsb-title" data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="120" instrument_node="">&nbsp;</span></span><span data-dcnode-id="117" lang="EN-US"><span data-dcnode-id="118" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="115" instrument_node="">
</span><li data-dcnode-id="107"><strong class="acsb-title" data-dcnode-id="112"><span data-dcnode-id="113" lang="EN-US"><span data-dcnode-id="114" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="108" lang="EN-US"><strong class="acsb-title" data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">–</span></strong><span data-dcnode-id="109" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="106" instrument_node="">
</span></ol><span data-dcnode-id="104" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="98" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="91" instrument_node=""> </span></div><span data-dcnode-id="89" instrument_node=""> </span></div><span data-dcnode-id="87" instrument_node="">
