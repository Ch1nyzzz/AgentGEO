</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Are you looking for a telescope to get started with?&nbsp;When you want to get into stargazing, one of the most important – if not THE most important bit of kit is a telescope. Without a telescope you might just be gazing dreamily at the stars out of your bedroom window!</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Perhaps you already have a bit of experience and want to move up in terms of quality and stability so you can look at the objects out there in the vast universe a bit more clearly? Can’t get enough sharpness with your current telescope?</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">As we all know, there is a vast amount of information out there about a huge range of different scopes. It can be really hard to whittle this down into </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">“What is the best telescope for me?”</span></em><span data-dcnode-id="1284" instrument_node=""> Well, now you don’t have to whittle, because I have done it for you!</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Check out the different telescope reviews I have provided below, so that you can choose the best telescope for you, based on exactly what it is you want to look at.</span></p><span data-dcnode-id="1279" instrument_node="">

</span><a class="easyazon-link" data-cart="n" data-cloak="n" data-dcnode-id="1052" data-identifier="B01L0EQLTI" data-locale="UK" data-localize="y" data-popups="n" data-tag="stargazinguk-21" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/dp/B01L0EQLTI%3Ftag%3Dstargazinguk-21%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><img class="easyazon-image aligncenter" data-dcnode-id="1053" height="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stargazing.me.uk/wp-content/uploads/2018/06/41mnA8QOm0L.jpg&amp;raw" width="500"></a><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The Celestron 22202 AstroFi 102 WiFi Maksutov wireless rotating telescope is a great one if you are just starting out your stargazing journey. It can be controlled using your smartphone; simply point your phone at the sky and you will receieve information about whatever the telescope is looking at. Not only is this scope easy to set up and use, it’s informative and fun too – what could be better? It generates its own wireless signal, so you don’t even need to be connected to your home Wifi, making it great to take out and about.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><h4 data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">What I like about it:</span></h4><span data-dcnode-id="1045" instrument_node="">
</span><ul data-dcnode-id="1034"><span data-dcnode-id="1044" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Gives fantastic images of the Moon, the rings of Saturn, Jupiter’s Red Spot, and more</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">It’s super easy to use</span></li><span data-dcnode-id="1038" instrument_node="">
</span><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">You can create a “sky tour” of all the best celestial bodies, based on your exact time and location</span></li><span data-dcnode-id="1035" instrument_node="">
</span></ul><span data-dcnode-id="1033" instrument_node="">
</span><hr data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">
</span><h3 data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">2. </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stargazing.me.uk/whats-best-telescope-kids/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1029" instrument_node="">Best Telescope for Kids</span></a><span data-dcnode-id="1027" instrument_node="">:&nbsp;Celestron 21061 AstroMaster 70AZ Refractor</span></h3><span data-dcnode-id="1025" instrument_node="">
</span><a class="easyazon-link" data-cart="n" data-cloak="n" data-dcnode-id="1023" data-identifier="B000MLHMAS" data-locale="UK" data-localize="y" data-popups="n" data-tag="stargazinguk-21" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/dp/B000MLHMAS%3Ftag%3Dstargazinguk-21%26linkCode%3Dogi%26th%3D1%26psc%3D1" rel="nofollow" target="_blank"><img class="easyazon-image aligncenter" data-dcnode-id="1024" height="500" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stargazing.me.uk/wp-content/uploads/2018/06/41bp9UEUBuL.jpg&amp;raw" width="500"></a><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Telescopes for kids have to be good enough that they can get enough good images to keep them absorbed, as well as be easy to use (and relatively cheap, in case the interest wanes quickly)! The Celestron 21061 AstroMaster 70AZ Refractor ticks all these boxes. It can be used for both night sky viewing and daytime terrestrial imagery, meaning that it can keep little people interested before and after bedtime. It’s great for learning about the night sky, as you can download images and print maps with information about them, great for keeping young minds interested in astronomy.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><h4 data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">What I like about it:</span></h4><span data-dcnode-id="1016" instrument_node="">
</span><ul data-dcnode-id="1005"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Very easy to set up and use</span></li><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Gives fantastic clear imagery of the moon, Saturn’s rings and Jupiter’s moons, as well as nebulae and star clusters</span></li><span data-dcnode-id="1009" instrument_node="">
</span><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Sturdy stand and ease of use makes it ideal for kids</span></li><span data-dcnode-id="1006" instrument_node="">
</span></ul><span data-dcnode-id="1004" instrument_node="">
</span><hr data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">
</span><h3 data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">3. </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stargazing.me.uk/best-budget-telescope/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1000" instrument_node="">Best Budget Telescope</span></a><span data-dcnode-id="998" instrument_node="">:&nbsp;Orion 08946e 36x Reflector</span></h3><span data-dcnode-id="996" instrument_node="">

</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">For a fantastic, high performance scope under £500, you should look into the Orion 08946e 36x Reflector. It’s a high quality Dobsonian, with a large aperture and good focal length. It gathers plenty of light, making it great for viewing the deepest of deep space, as well as startlingly clear views of the moon and several planets. It has good magnification, which can be improved still further by adding Barlow lenses. It’s a fairly large scope, with a good weight to it, meaning that you will have to have good storage space for it. If you are looking for a good scope with which you can see glorious detail of some of our close-by neighbours as well as some further afield, then you should look into this one.</span></p><span data-dcnode-id="990" instrument_node="">

</span><h2 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Few tips before you make your final decision</span></h2><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Before you dig deep into those pockets or remortgage the house to buy all the expensive kit and gadgetry to indulge in this incredibly rewarding hobby, it is a good idea to bear in mind that you really should take a look at the basics first.</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">A great many would-be astronomers never reach their dreams, because they get frustrated and give up too soon, before they have even learned the basics of the night sky.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">If you throw yourself in at the deep end, and expect to seeing deep space nebulae and close up views of Saturn’s rings on your first excursion, you too may end up disappointed!</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">You really should take some time to get to know what it is you will be gazing into, before you gaze into it using some fairly pricy equipment.</span></p><span data-dcnode-id="755" instrument_node="">
</span><ol data-dcnode-id="732"><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">It’s a good idea to start by getting to know a few basic terms – the horizon, zenith, meridian, the North or South pole, the celestial equator and the ecliptic.</span></li><span data-dcnode-id="751" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Find yourself some star charts and maps, and pick out a dozen or so bright stars, and around 10 major constellations. Figuring out where these are and what they look like will give you a good start into astronomy on a larger and more detailed scale.</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Once you have got to grips with these, consider looking into spotting things through a pair of binoculars. You should be able to pick out the moon, Jupiter, Orion, the Pleiades and the Andromeda galaxy. Practising using binoculars is a good step towards spotting these things, and more, through a telescope, and using binoculars can be easier than getting to grips with a scope.</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">It’s worth borrowing a friend’s telescope, or popping along to a local astronomy club to try before you buy, as it were. This way you can also get a feel of what you like and don’t like, and start to get an idea about the best telescope for you to invest in.</span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Figuring out your surroundings is key – it’s no good getting a telescope that might not be suitable for your particular area, because you will only end up frustrated when you can’t see anything!</span></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Decide what it is you actually want to see. If you are happiest looking at the moon in detail, or a few of our closest neighbours, then your requirements for the best telescope will be different than if you want to observe deep space.</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Most importantly of all, remember to have fun. After all, what is the point of a hobby if you don’t enjoy it? You can have the best telescope in the world, but it’s usless if you don’t have a good time using it!</span></li><span data-dcnode-id="733" instrument_node="">
</span></ol><span data-dcnode-id="731" instrument_node="">
</span><hr data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Frequently asked questions</span></h2><span data-dcnode-id="726" instrument_node="">
</span><h3 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">1. Why does my telescope view upside down?</span></h3><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">All lenses and mirrors display images that are inverted upside down, left to right or rotated. This includes lenses in cameras, our eyes and telescopes. So don’t worry if you are getting an upside down image; your telescope is working fine. If you want to flip the image the right way, use a star diagonal or an erecting prism.</span></p><span data-dcnode-id="720" instrument_node="">
</span><h3 data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">2. What is telescope aperture?</span></h3><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">A telescope’s aperture is the size or diameter of the main or objective lens. Aperture is the most important feature to consider when buying a telescope. A larger aperture means a brighter image, better details and the ability to see deeper into the sky.</span></p><span data-dcnode-id="714" instrument_node="">
</span><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">3. How to make a telescope more powerful? How to increase the magnification of a telescope?</span></h3><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Using an eyepiece with a shorter focal length will increase the magnification of your telescope. This is handy for observing the moon and planets. Attaching a Barlow lens to your eyepiece is another way to make your telescope more powerful (increase magnification).</span></p><span data-dcnode-id="708" instrument_node="">
</span><h3 data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">4. How to aim a telescope?</span></h3><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Point your telescope at the object you want to observe. Look through the finderscope attached to you telescope and adjust the telescope until the object is centered in the scope. Now, look through the telescope’s eyepiece. If you centered the object in the scope, it should also be centered in the eyepiece.</span></p><span data-dcnode-id="702" instrument_node="">
</span><h3 data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">5. How to set up a telescope with an equatorial mount?</span></h3><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Once you place the telescope on the mount, you’ll need to polar align it to be able to track objects. This involves aligning the polar axis of the equatorial mount to the rotational axis of the earth. To do this, you focus the telescope on Polaris if you are in the Northern hemisphere or Octantis&nbsp;if you are in the south.</span></p><span data-dcnode-id="696" instrument_node="">
</span><h3 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">6. What is a Galilean telescope?</span></h3><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">A Galilean telescope is a type of refracting telescope consisting of an objective convex lens and a concave lens that acts as the eyepiece.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">The Galilean telescope goes by that name because it is the same design Galileo Galilei used to discover the four big moons of Jupiter and other astronomical objects.</span></p><span data-dcnode-id="687" instrument_node="">
</span><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">7. How to find Saturn with my telescope?</span></h3><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">You first need to find the general direction where it currently is. Use a sky map or star chart to find that location. You can also Google search ‘location of Saturn’ and Google will show you its current coordinates.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Swing your telescope to the right spot in the sky and look for a yellowish-golden bright object that’s shining steadily. Once you find it, use your finderscope to focus on it then increase the magnification of your eyepiece until you can see the planet’s rings.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">If you are using a telescope with a GoTo mount, you just need to select Saturn on the hand controller and the telescope will automatically swing to the right location (as long as you’ve aligned it).</span></p><span data-dcnode-id="675" instrument_node="">
</span><span data-dcnode-id="672" instrument_node="">
