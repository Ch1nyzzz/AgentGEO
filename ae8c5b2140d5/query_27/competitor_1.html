node-id="1024" instrument_node=""> at Amazon. A look into the numerous inventions we now take for granted by great inventors such as Archimedes, Galileo, Leonardo da Vinci, Louis Pasteur, Marie Curie, Alan Turing and Steve Jobs.</span></p><div class="clear" data-dcnode-id="1022"></div><p data-dcnode-id="1003"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/archimedes.html"><span class="floatleft" data-dcnode-id="1012"><picture data-dcnode-id="1016" id="" name=""><span data-dcnode-id="1021" instrument_node="">
</span><source data-dcnode-id="1020" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/archimedes1.jpg.webp" type="image/webp"><span data-dcnode-id="1019" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="1018" data-ll-status="loaded" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/archimedes1.jpg&amp;raw" width="100"><span data-dcnode-id="1017" instrument_node="">
</span></picture><span data-dcnode-id="1015" instrument_node="">
</span><noscript data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&lt;picture id="" name=""&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/archimedes1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/archimedes1.jpg" alt="" width="100" name=""/&gt;
&lt;/picture&gt;
</span></noscript></span></a><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/archimedes.html"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Archimedes</span></strong></a><span data-dcnode-id="1007" instrument_node=""> (287 BCE – </span><abbr data-dcnode-id="1005" title="circa"><span data-dcnode-id="1006" instrument_node="">c.</span></abbr><span data-dcnode-id="1004" instrument_node=""> 212 BCE) Archimedes of Syracuse was an ancient Greek mathematician, physicist, engineer, inventor, and astronomer. Amongst other things he calculated pi and developed the Archimedes screw for lifting up water from mines or wells.</span></p><div class="clear" data-dcnode-id="1002"></div><p data-dcnode-id="994"><span class="floatleft" data-dcnode-id="998"><img alt="cai lun" class="lazyloaded" data-dcnode-id="1001" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/business/images/Cai-lun.jpg&amp;raw" width="100"><noscript data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">&lt;img src="/imported-static/business/images/Cai-lun.jpg" alt="cai lun" width="100" /&gt;</span></noscript></span><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Cai Lun </span></strong><span data-dcnode-id="995" instrument_node="">(50–121 CE), Chinese inventor of paper. Cai Lun was a Chinese political administrator credited with inventing modern paper and inventing the paper-making process. His invention included the use of raw materials such as bark, hemp, silk and fishing net. The sheets of fibre were suspended in water before removing for drying.</span></p><div class="clear" data-dcnode-id="993"></div><p data-dcnode-id="978"><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/leonardo_da_vinci.html"><span class="floatleft" data-dcnode-id="983"><picture data-dcnode-id="987" id="" name=""><span data-dcnode-id="992" instrument_node="">
</span><source data-dcnode-id="991" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/250-leonardo-da-vinci1.jpg.webp" type="image/webp"><span data-dcnode-id="990" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="989" data-ll-status="loaded" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/250-leonardo-da-vinci1.jpg&amp;raw" width="100"><span data-dcnode-id="988" instrument_node="">
</span></picture><span data-dcnode-id="986" instrument_node="">
</span><noscript data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&lt;picture id="" name=""&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/250-leonardo-da-vinci1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/250-leonardo-da-vinci1.jpg" alt="" width="100" name=""/&gt;
&lt;/picture&gt;
</span></noscript></span><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Leonardo Da Vinci</span></strong></a><span data-dcnode-id="979" instrument_node=""> (1452–1519) Italian artist, scientist and polymath. Da Vinci invented a huge range of machines and drew models that proved workable 3-500 years later. These included prototype parachutes, tanks, flying machines and single-span bridges. More practical inventions included an optical lens grinder and various hydraulic machines.</span></p><div class="clear" data-dcnode-id="977"></div><p data-dcnode-id="967"><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/galileo.html"><span class="floatleft" data-dcnode-id="973"><img alt="" class="error" data-dcnode-id="976" data-lazy-src="/imported-static/scientists/images/100/Galileo.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/Galileo.jpg&amp;raw" width="100"><noscript data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/Galileo.jpg" alt="" width="100" name="" /&gt;</span></noscript></span></a><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/galileo.html"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Galileo</span></strong></a><span data-dcnode-id="968" instrument_node=""> (1564–1642) Italian scientist. Galileo developed a powerful telescope and confirmed revolutionary theories about the nature of the world. Also developed an improved compass.</span></p><div class="clear" data-dcnode-id="966"></div><p data-dcnode-id="955"><span class="floatleft" data-dcnode-id="961"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/isaac-newton.html"><img alt="" class="error" data-dcnode-id="965" data-lazy-src="/imported-static/scientists/images/100/IsaacNewton-1689.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/IsaacNewton-1689.jpg&amp;raw" width="100"><noscript data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/IsaacNewton-1689.jpg" alt="" width="100" name="" /&gt;</span></noscript></a></span><strong data-dcnode-id="957"><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/isaac-newton.html"><span data-dcnode-id="960" instrument_node="">Sir Isaac Newton</span></a><span data-dcnode-id="958" instrument_node=""> </span></strong><span data-dcnode-id="956" instrument_node="">(1642–1726) English scientist. Newton invented the reflecting telescope. This greatly improved the capacity of telescopes and reduced optical distortion. Newton was also a great physicist and astronomer.</span></p><div class="clear" data-dcnode-id="954"></div><p data-dcnode-id="940"><strong data-dcnode-id="942"><span class="floatleft" data-dcnode-id="944"><picture data-dcnode-id="948"><span data-dcnode-id="953" instrument_node="">
</span><source data-dcnode-id="952" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/Thomas_Savery1.jpg.webp" type="image/webp"><span data-dcnode-id="951" instrument_node="">
</span><img alt="thomas-savery" class="lazyloaded" data-dcnode-id="950" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/Thomas_Savery1.jpg&amp;raw" width="100"><span data-dcnode-id="949" instrument_node="">
</span></picture><span data-dcnode-id="947" instrument_node="">
</span><noscript data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">&lt;picture&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/Thomas_Savery1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/Thomas_Savery1.jpg" alt="thomas-savery" width="100"/&gt;
&lt;/picture&gt;
</span></noscript></span><span data-dcnode-id="943" instrument_node="">Thomas Savery</span></strong><span data-dcnode-id="941" instrument_node=""> (c. 1650–1715) English inventor. Savery patented one of the first steam engines which was pioneered for use in pumping water from mines. This original Savery steam engine was basic, but it was used as a starting point in later developments of the steam engine.</span></p><div class="clear" data-dcnode-id="939"></div><p data-dcnode-id="925"><strong data-dcnode-id="927"><span class="floatleft" data-dcnode-id="929"><picture data-dcnode-id="933"><span data-dcnode-id="938" instrument_node="">
</span><source data-dcnode-id="937" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/thomas-newcomen1.jpg.webp" type="image/webp"><span data-dcnode-id="936" instrument_node="">
</span><img alt="thomas-newcomen" class="lazyloaded" data-dcnode-id="935" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/thomas-newcomen1.jpg&amp;raw" width="100"><span data-dcnode-id="934" instrument_node="">
</span></picture><span data-dcnode-id="932" instrument_node="">
</span><noscript data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">&lt;picture&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/thomas-newcomen1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/thomas-newcomen1.jpg" alt="thomas-newcomen" width="100"/&gt;
&lt;/picture&gt;
</span></noscript></span><span data-dcnode-id="928" instrument_node="">Thomas Newcomen</span></strong><span data-dcnode-id="926" instrument_node=""> (1664–1729) English inventor who created the first practical steam engine for pumping water from mines. He worked with Savery’s initial design, but significantly improved it, using atmospheric pressure which was safer and more effective for use in mines to remove water.</span></p><div class="clear" data-dcnode-id="924"></div><p data-dcnode-id="910"><span class="floatleft" data-dcnode-id="914"><picture data-dcnode-id="918"><span data-dcnode-id="923" instrument_node="">
</span><source data-dcnode-id="922" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/Jethro_Tull1.jpg.webp" type="image/webp"><span data-dcnode-id="921" instrument_node="">
</span><img alt="jethro-tull" class="lazyloaded" data-dcnode-id="920" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/Jethro_Tull1.jpg&amp;raw" width="100"><span data-dcnode-id="919" instrument_node="">
</span></picture><span data-dcnode-id="917" instrument_node="">
</span><noscript data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">&lt;picture&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/Jethro_Tull1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/Jethro_Tull1.jpg" alt="jethro-tull" width="100"/&gt;
&lt;/picture&gt;
</span></noscript></span><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Jethro Tull</span></strong><span data-dcnode-id="911" instrument_node=""> (1674–1741) English agricultural entrepreneur. Tull invented the seed drill and horse-drawn hoe. The seed drill improved the efficiency of farming and led to increased yields. It was an important invention in the agricultural revolution which increased yields prior to the industrial revolution.</span></p><div class="clear" data-dcnode-id="909"></div><p data-dcnode-id="895"><strong data-dcnode-id="897"><span class="floatleft" data-dcnode-id="899"><picture data-dcnode-id="903"><span data-dcnode-id="908" instrument_node="">
</span><source data-dcnode-id="907" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/abraham-darby1.jpg.webp" type="image/webp"><span data-dcnode-id="906" instrument_node="">
</span><img alt="abraham-darby" class="lazyloaded" data-dcnode-id="905" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/abraham-darby1.jpg&amp;raw" width="100"><span data-dcnode-id="904" instrument_node="">
</span></picture><span data-dcnode-id="902" instrument_node="">
</span><noscript data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">&lt;picture&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/abraham-darby1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/abraham-darby1.jpg" alt="abraham-darby" width="100"/&gt;
&lt;/picture&gt;
</span></noscript></span><span data-dcnode-id="898" instrument_node="">Abraham Darby</span></strong><span data-dcnode-id="896" instrument_node=""> (1678–1717) English Quaker, inventor and businessman. Darby developed a process for producing large quantities of pig iron from coke. Coke smelted iron was a crucial raw material in the industrial revolution.</span></p><div class="clear" data-dcnode-id="894"></div><p data-dcnode-id="884"><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/john-harrison.html"><span class="floatleft" data-dcnode-id="890"><img alt="" class="error" data-dcnode-id="893" data-lazy-src="/imported-static/scientists/images/100/John_Harrison.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/John_Harrison.jpg&amp;raw" width="100"><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/John_Harrison.jpg" alt="" width="100" name="" /&gt;</span></noscript></span><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">John Harrison</span></strong><span data-dcnode-id="887" instrument_node=""> </span></a><span data-dcnode-id="885" instrument_node="">(1693–1776) English carpenter and clockmaker. He invented a device for measuring longitude at sea. This was a crucial invention to improve the safety of navigating the oceans.</span></p><div class="clear" data-dcnode-id="883"></div><p data-dcnode-id="867"><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/politicians/american/benjamin-franklin.html"><span class="floatleft" data-dcnode-id="873"><picture data-dcnode-id="877" id="" name=""><span data-dcnode-id="882" instrument_node="">
</span><source data-dcnode-id="881" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/250-Benjamin_Franklin1.jpg.webp" type="image/webp"><span data-dcnode-id="880" instrument_node="">
</span><img alt="" class="lazyloaded" data-dcnode-id="879" data-ll-status="loaded" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/250-Benjamin_Franklin1.jpg&amp;raw" width="100"><span data-dcnode-id="878" instrument_node="">
</span></picture><span data-dcnode-id="876" instrument_node="">
</span><noscript data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">&lt;picture id="" name=""&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/250-Benjamin_Franklin1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/250-Benjamin_Franklin1.jpg" alt="" width="100" name=""/&gt;
&lt;/picture&gt;
</span></noscript></span></a><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/politicians/american/benjamin-franklin.html"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Benjamin Franklin</span></strong></a><span data-dcnode-id="868" instrument_node=""> (1705–1790) American polymath who discovered electricity and invented the Franklin stove, the lightning rod and bifocals. Franklin was also an American statesman and an influential figure in the development of modern America.</span></p><div class="clear" data-dcnode-id="866"></div><p data-dcnode-id="852"><span class="floatleft" data-dcnode-id="856"><picture data-dcnode-id="860"><span data-dcnode-id="865" instrument_node="">
</span><source data-dcnode-id="864" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/William_Cullen1.jpg.webp" type="image/webp"><span data-dcnode-id="863" instrument_node="">
</span><img alt="william-cullen" class="lazyloaded" data-dcnode-id="862" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/wp-content/uploads/2014/05/William_Cullen1.jpg&amp;raw" width="100"><span data-dcnode-id="861" instrument_node="">
</span></picture><span data-dcnode-id="859" instrument_node="">
</span><noscript data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">&lt;picture&gt;
&lt;source type="image/webp" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/William_Cullen1.jpg.webp"/&gt;
&lt;img src="https://www.biographyonline.net/wp-content/uploads/2014/05/William_Cullen1.jpg" alt="william-cullen" width="100"/&gt;
&lt;/picture&gt;
</span></noscript></span><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">William Cullen</span></strong><span data-dcnode-id="853" instrument_node=""> (1710–1790) Scottish physician and chemist. He is credited with inventing the basis for the first artificial refrigerator, although it took others to make his designs suitable for practical use.</span></p><div class="clear" data-dcnode-id="851"></div><p data-dcnode-id="837"><strong data-dcnode-id="839"><span class="floatleft" data-dcnode-id="841"><picture data-dcnode-id="845"><span data-dcnode-id="850" instrument_node="">
</span><source data-dcnode-id="849" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/John_Wilkinson1.jpg.webp" type="image/webp"><span data-dcnode-id="848" instrument_node="">

</span></picture><span data-dcnode-id="829" instrument_node="">
</span><noscript data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">&lt;picture&gt;

</span></noscript></span><span data-dcnode-id="825" instrument_node="">Sir Richard Arkwright</span></strong><span data-dcnode-id="823" instrument_node=""> (1732–1792) English entrepreneur and ‘father of the industrial revolution.’ Arkwright was a leading pioneer in the spinning industry. He invented the spinning frame and was successful in using this in mass-scale factory production.</span></p><div class="clear" data-dcnode-id="821"></div><p data-dcnode-id="810"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/james-watt.html"><span class="floatleft" data-dcnode-id="817"><img alt="" class="error" data-dcnode-id="820" data-lazy-src="/imported-static/scientists/images/100/James_Watt.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/James_Watt.jpg&amp;raw" width="100"><noscript data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/James_Watt.jpg" alt="" width="100" name="" /&gt;</span></noscript></span></a><span data-dcnode-id="815" instrument_node=""> </span><strong data-dcnode-id="812"><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/james-watt.html"><span data-dcnode-id="814" instrument_node="">James Watt </span></a></strong><span data-dcnode-id="811" instrument_node=""> (1736–1819) Scottish inventor of the steam engine, which was suitable for use in trains. His invention of a separate condensing chamber greatly improved the efficiency of steam. It enabled the steam engine to be used for a greater range of purpose than just pumping water.</span></p><div class="clear" data-dcnode-id="809"></div><p data-dcnode-id="792"><span class="floatleft" data-dcnode-id="799"><picture data-dcnode-id="803"><span data-dcnode-id="808" instrument_node="">
</span><source data-dcnode-id="807" srcset="https://www.biographyonline.net/wp-content/uploads/2014/05/allessandro-Volta1.jpg.webp" type="image/webp"><span data-dcnode-id="806" instrument_node="">

</span></noscript></span><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Alessandro Volta </span></strong><span data-dcnode-id="796" instrument_node="">(1745–1827), Italian </span><span class="st" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">physicist</span></span><span data-dcnode-id="793" instrument_node="">, credited with inventing the battery. Volta invented the first electrochemical battery cell. It used zinc, copper and an electrolyte, such as sulphuric acid and water.</span></p><div class="clear" data-dcnode-id="791"></div><p data-dcnode-id="777"><span class="floatleft" data-dcnode-id="781"><picture data-dcnode-id="785"><span data-dcnode-id="790" instrument_node="">

</span></noscript></span><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Louis Daguerre</span></strong></a><span data-dcnode-id="762" instrument_node=""> (1787 – 1851) French artist and inventor who developed the Daguerreotype of photography. His innovative method of taking photographs brought photography within the reach of ordinary people.</span></p><div class="clear" data-dcnode-id="760"></div><p data-dcnode-id="751"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/inventors/charles-babage.html"><span class="floatleft" data-dcnode-id="756"><img alt="" class="error" data-dcnode-id="759" data-lazy-src="/imported-static/scientists/images/Charles_Babbage_-_1860.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/Charles_Babbage_-_1860.jpg&amp;raw" width="100"><noscript data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/Charles_Babbage_-_1860.jpg" alt="" width="100" name="" /&gt;</span></noscript></span><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Charles Babbage</span></strong></a><span data-dcnode-id="752" instrument_node=""> (1791–1871) English mathematician and inventor. Babbage created the first mechanical computer, which proved to be the prototype for future computers. Considered to be the ‘Father of Computers,’ despite not finishing a working model.</span></p><div class="clear" data-dcnode-id="750"></div><p data-dcnode-id="741"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/michael-faraday.html"><span class="floatleft" data-dcnode-id="746"><img alt="" class="error" data-dcnode-id="749" data-lazy-src="/imported-static/scientists/images/100/michae </span></noscript></span><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Samuel Morse</span></strong><span data-dcnode-id="727" instrument_node=""> (1791–1872) American inventor Morse used principles of Jackson’s electromagnet to develop a single telegraph wire. He also invented Morse code, a method of communicating via telegraph.</span></p><div class="clear" data-dcnode-id="725"></div><p data-dcnode-id="711"><span class="floatleft" data-dcnode-id="715"><picture data-dcnode-id="719"><span data-dcnode-id="724" instrument_node="">

</span></noscript></span><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Kirkpatrick Macmillan</span></strong><span data-dcnode-id="682" instrument_node=""> (1812–1878) Scottish inventor of the pedal bicycle. Kirkpatrick’s contribution was to make a rear wheel driven bicycle through the use of a chain, giving the basic design for the bicycle as we know it today.</span></p><div class="clear" data-dcnode-id="680"></div><p data-dcnode-id="671"><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/james-maxwell.html"><span class="floatleft" data-dcnode-id="676"><img alt="" class="error" data-dcnode-id="679" data-lazy-src="/imported-static/scientists/images/100/James_clerk_maxwell.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/James_clerk_maxwell.jpg&amp;raw" width="100"><noscript data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/James_clerk_maxwell.jpg" alt="" width="100" name="" /&gt;</span></noscript></span></a><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">James Clerk Maxwell</span></strong><span data-dcnode-id="672" instrument_node=""> (1831–1879) Scottish physicist and inventor. Maxwell invented the first process for producing colour photography. Maxwell was also considered one of the greatest physicists of the millennium.</span></p><div class="clear" data-dcnode-id="670"></div><p data-dcnode-id="656"><span class="floatleft" data-dcnode-id="660"><picture data-dcnode-id="664"><span data-dcnode-id="669" instrument_node="">

noir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/scientists/nikola-tesla.html"><span class="floatleft" data-dcnode-id="623"><img alt="" class="error" data-dcnode-id="626" data-lazy-src="/imported-static/scientists/images/100/tesla.jpg" data-ll-status="error" id="" name="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.biographyonline.net/imported-static/scientists/images/100/tesla.jpg&amp;raw" width="100"><noscript data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">&lt;img id="" src="/imported-static/scientists/images/100/tesla.jpg" alt="" width="100" name="" /&gt;</span></noscript></span><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Nikola Tesla</span></strong></a><span data-dcnode-id="619" instrument_node=""> (1856–1943) American Physicist who invented fluorescent lighting, the Tesla coil, the induction motor, 3-phase electricity and AC electricity.</span></p><div class="clear" data-dcnode-id="617"></div><p data-dcnode-id="603"><span class="floatleft" data-dcnode-id="607"><picture data-dcnode-id="611"><span data-dcnode-id="616" instrument_node="">
