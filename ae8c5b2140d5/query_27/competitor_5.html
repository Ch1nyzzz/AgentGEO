</span><h1 class="entry-title" data-dcnode-id="821" itemprop="headline"><span data-dcnode-id="822" instrument_node="">
      The 50 Most Famous Inventors in History
    </span></h1><span data-dcnode-id="820" instrument_node="">
</span><div class="entry-meta has-text-centered" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">
</span></div><span data-dcnode-id="817" instrument_node="">
</span><div class="entry-content" data-dcnode-id="244"><span data-dcnode-id="816" instrument_node="">
</span><div class="support has-text-centered" data-dcnode-id="805"><span data-dcnode-id="815" instrument_node="">
</span><span data-dcnode-id="813" instrument_node="">
</span><span data-dcnode-id="811" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5235596129066369" data-ad-format="link" data-ad-slot="6638337180" data-dcnode-id="810" style="display:block"></ins><span data-dcnode-id="809" instrument_node="">
</span><span data-dcnode-id="806" instrument_node="">
</span></div><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="799" style="text-align:justify;"><span data-dcnode-id="803" instrument_node=""> If we think of </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> Famous inventors </span></strong><span data-dcnode-id="800" instrument_node=""> , The normal thing is that you come to mind people like Newton, Edison or Franklin.  However, it should be noted that at this time you would not be reading this page had it not been for the inventions of geniuses like Charles Babbage, Alan Turing or Sir Timothy John Berners-Lee, whose work represented the basis of modern computer systems and  Internet. </span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796" style="text-align:justify;"><span data-dcnode-id="797" instrument_node=""> Inventors are individuals who have developed a process or product for the first time.  For a long time, inventors have made our world much richer and better through their scientific observations, studies and research. </span></p><span data-dcnode-id="795" instrument_node="">
</span><div class="support has-text-centered" data-dcnode-id="784"><span data-dcnode-id="794" instrument_node="">
</span><span data-dcnode-id="792" instrument_node="">
</span><span data-dcnode-id="790" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5235596129066369" data-ad-format="auto" data-ad-slot="3214203661" data-dcnode-id="789" style="display:block"></ins><span data-dcnode-id="788" instrument_node="">
</span><span data-dcnode-id="785" instrument_node="">
</span></div><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="776" style="text-align:justify;"><span data-dcnode-id="782" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="778" style="padding-bottom: calc(350 / 500 * 100%)"><span data-dcnode-id="781" instrument_node="">
</span><img alt="Mosaic of famous inventors" data-dcnode-id="780" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/mosaic-of-famous-inventors.jpg&amp;raw" title="Mosaic of famous inventors"><span data-dcnode-id="779" instrument_node="">
</span></span><span data-dcnode-id="777" instrument_node=""> </span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773" style="text-align:justify;"><span data-dcnode-id="774" instrument_node=""> What would the world be without Thomas Alva Edison, one of the most prolific inventors in history?  Today we can not imagine a world without electricity.  Humanity is currently so dependent on the technology to communicate, largely thanks to the invention of devices such as the phone. </span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770" style="text-align:justify;"><span data-dcnode-id="771" instrument_node=""> Some drugs may have been discovered by accident, but there is no denying the fact that they revolutionized the world of medicine.  Read on to learn more about the inventors who changed the course of history. </span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767" style="text-align:justify;"><span data-dcnode-id="768" instrument_node=""> You may also like   This list of the most important scientists   . </span></p><span data-dcnode-id="766" instrument_node="">
</span><h2 data-dcnode-id="763" style="text-align:justify;"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node=""> Top 50 most important inventors in history </span></strong></h2><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="759" style="text-align:justify;"><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node=""> 1- Archimedes (287-212 BC) </span></strong></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="757" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="753" style="padding-bottom: calc(319 / 340 * 100%)"><span data-dcnode-id="756" instrument_node="">
</span><img alt="The 50 Most Famous Inventors in History" data-dcnode-id="755" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-in-history.jpg&amp;raw" title="The 50 Most Famous Inventors in History"><span data-dcnode-id="754" instrument_node="">
</span></span><span data-dcnode-id="752" instrument_node=""> </span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748" style="text-align:justify;"><span data-dcnode-id="749" instrument_node=""> Ancient mathematician, physicist, engineer, astronomer and Greek inventor.  Among other things, he determined the value of Pi and developed the Archimedes screw that served to raise water in mines or wells. </span></p><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="744" style="text-align:justify;"><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node=""> 2- Cai Lun (50-121) </span></strong></h3><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="742" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="738" style="padding-bottom: calc(469 / 375 * 100%)"><span data-dcnode-id="741" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 1" data-dcnode-id="740" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-1.jpg&amp;raw" title="The 50 Most Famous Inventors of History 1"><span data-dcnode-id="739" instrument_node="">
</span></span><span data-dcnode-id="737" instrument_node=""> </span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733" style="text-align:justify;"><span data-dcnode-id="734" instrument_node=""> A Chinese inventor of paper, he was a political administrator who developed the papermaking process.  It consisted in the use of compacted plant fibers suspended in water, which were then dried. </span></p><span data-dcnode-id="732" instrument_node="">
</span><h3 data-dcnode-id="727" style="text-align:justify;"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node=""> 3- </span></strong><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node=""> Leonardo da Vinci (1452 - 1519) </span></strong></h3><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="725" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="721" style="padding-bottom: calc(479 / 374 * 100%)"><span data-dcnode-id="724" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 2" data-dcnode-id="723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-2.jpg&amp;raw" title="The 50 Most Famous Inventors of History 2"><span data-dcnode-id="722" instrument_node="">
</span></span><span data-dcnode-id="720" instrument_node=""> </span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716" style="text-align:justify;"><span data-dcnode-id="717" instrument_node=""> Italian artist, scientist and mathematician.  He invented a large number of machines and drew planes of devices that could be completed centuries later.  Among them were parachutes, tanks, flying machines and drawbridges. </span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="710" style="text-align:justify;"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node=""> 4- </span></strong><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node=""> Galileo (1564-1642) </span></strong></h3><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="708" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="704" style="padding-bottom: calc(326 / 262 * 100%)"><span data-dcnode-id="707" instrument_node="">
</span><img alt="Phrases from Galileo Galilei" data-dcnode-id="706" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/phrases-from-galileo-galilei.jpg&amp;raw" title="Phrases from Galileo Galilei"><span data-dcnode-id="705" instrument_node="">
</span></span><span data-dcnode-id="703" instrument_node=""> </span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699" style="text-align:justify;"><span data-dcnode-id="700" instrument_node=""> An Italian scientist, Galileo developed a powerful telescope that served to confirm revolutionary theories about the origin and nature of our world.  He also developed an improved compass. </span></p><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="693" style="text-align:justify;"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node=""> 5- </span></strong><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node=""> Isaac Newton (1642-1726) </span></strong></h3><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="691" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="687" style="padding-bottom: calc(484 / 396 * 100%)"><span data-dcnode-id="690" instrument_node="">
</span><img alt="Phrases from Isaac Newton" data-dcnode-id="689" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/phrases-from-isaac-newton.jpg&amp;raw" title="Phrases from Isaac Newton"><span data-dcnode-id="688" instrument_node="">
</span></span><span data-dcnode-id="686" instrument_node=""> </span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682" style="text-align:justify;"><span data-dcnode-id="683" instrument_node=""> Of English origin, Newton invented the reflective telescope, which allowed to increase widely the capacity of the telescopes of the era and reduced the optical distortion. </span></p><span data-dcnode-id="681" instrument_node="">
</span><h3 data-dcnode-id="676" style="text-align:justify;"><strong data-dcnode-id="679"><span data-dcnode-id="680" instrument_node=""> 6- </span></strong><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node=""> Blaise Pascal (1623 - 1662) </span></strong></h3><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="674" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="670" style="padding-bottom: calc(319 / 340 * 100%)"><span data-dcnode-id="673" instrument_node="">
</span><img alt="The 50 Most Famous Inventors in History" data-dcnode-id="672" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-in-history.jpg&amp;raw" title="The 50 Most Famous Inventors in History"><span data-dcnode-id="671" instrument_node="">
</span></span><span data-dcnode-id="669" instrument_node=""> </span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665" style="text-align:justify;"><span data-dcnode-id="666" instrument_node=""> A French mathematician, his scientific contributions include the development of statistical probability theory as well as Pascal's Law or the principle of pressure transmission in fluids.  Created a mechanical calculator </span></p><span data-dcnode-id="664" instrument_node="">
</span><h3 data-dcnode-id="659" style="text-align:justify;"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node=""> 7- </span></strong><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node=""> Thomas Savery (1650-1715) </span></strong></h3><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="657" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="653" style="padding-bottom: calc(479 / 374 * 100%)"><span data-dcnode-id="656" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 3" data-dcnode-id="655" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-3.jpg&amp;raw" title="The 50 Most Famous Inventors of History 3"><span data-dcnode-id="654" instrument_node="">
</span></span><span data-dcnode-id="652" instrument_node=""> </span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648" style="text-align:justify;"><span data-dcnode-id="649" instrument_node=""> Inventor English, patented one of the first steam engines that was used to pump water from the mines.  It served as the basis for the further development of the modern steam engine. </span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="642" style="text-align:justify;"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node=""> 8- </span></strong><strong data-dcnode-id="643"><span data-dcnode-id="644" instrument_node=""> Thomas Newcomen (1664-1729) </span></strong></h3><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="640" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="636" style="padding-bottom: calc(382 / 300 * 100%)"><span data-dcnode-id="639" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 4" data-dcnode-id="638" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-4.jpg&amp;raw" title="The 50 Most Famous Inventors of History 4"><span data-dcnode-id="637" instrument_node="">
</span></span><span data-dcnode-id="635" instrument_node=""> </span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631" style="text-align:justify;"><span data-dcnode-id="632" instrument_node=""> Based on Savery's initial design, this English inventor created the first practical version of the steam engine to pump water.  It used atmospheric pressure, which was safer and more effective to extract water from the mines. </span></p><span data-dcnode-id="630" instrument_node="">
</span><h3 data-dcnode-id="625" style="text-align:justify;"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node=""> 9- </span></strong><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node=""> Jethro Tull (1674-1741) </span></strong></h3><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="623" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="619" style="padding-bottom: calc(314 / 236 * 100%)"><span data-dcnode-id="622" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 5" data-dcnode-id="621" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-5.jpg&amp;raw" title="The 50 Most Famous Inventors of History 5"><span data-dcnode-id="620" instrument_node="">
</span></span><span data-dcnode-id="618" instrument_node=""> </span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614" style="text-align:justify;"><span data-dcnode-id="615" instrument_node=""> English agricultural entrepreneur, Tull invented the seeder and the horse-driven plow.  Their creations greatly increased agricultural efficiency and crop production.  It served as a bridge to the industrial revolution. </span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="608" style="text-align:justify;"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node=""> 10- </span></strong><strong data-dcnode-id="609"><span data-dcnode-id="610" instrument_node=""> Abraham Darby (1678 - 1717) </span></strong></h3><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="599"><span class="image-share-wrap" data-dcnode-id="600"><span data-dcnode-id="606" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="602" style="padding-bottom: calc(271 / 220 * 100%)"><span data-dcnode-id="605" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 6" data-dcnode-id="604" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-6.jpg&amp;raw" title="The 50 Most Famous Inventors of History 6"><span data-dcnode-id="603" instrument_node="">
</span></span><span data-dcnode-id="601" instrument_node=""> </span></span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596" style="text-align:justify;"><span data-dcnode-id="597" instrument_node=""> English colonizer, inventor and businessman, Darby developed a process to make large quantities of iron from the mineral coca.  Its creation was fundamental raw material in the industrial revolution. </span></p><span data-dcnode-id="595" instrument_node="">
</span><h3 data-dcnode-id="590" style="text-align:justify;"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node=""> eleven- </span></strong><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node=""> John Harrison (1693-1776) </span></strong></h3><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="588" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="584" style="padding-bottom: calc(377 / 298 * 100%)"><span data-dcnode-id="587" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 7" data-dcnode-id="586" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-7.jpg&amp;raw" title="The 50 Most Famous Inventors of History 7"><span data-dcnode-id="585" instrument_node="">
</span></span><span data-dcnode-id="583" instrument_node=""> </span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579" style="text-align:justify;"><span data-dcnode-id="580" instrument_node=""> Carpenter and English watchmaker, invented a device to measure the length in the sea.  Its creation allowed to improve the safety of the navigators. </span></p><span data-dcnode-id="578" instrument_node="">
</span><h3 data-dcnode-id="573" style="text-align:justify;"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node=""> 12- </span></strong><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node=""> Benjamin Franklin (1705 - 1790) </span></strong></h3><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="571" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="567" style="padding-bottom: calc(480 / 388 * 100%)"><span data-dcnode-id="570" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 8" data-dcnode-id="569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-8.jpg&amp;raw" title="The 50 Most Famous Inventors of History 8"><span data-dcnode-id="568" instrument_node="">
</span></span><span data-dcnode-id="566" instrument_node=""> </span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562" style="text-align:justify;"><span data-dcnode-id="563" instrument_node=""> American scientist who discovered electricity and invented Franklin's stove, lightning rod and bifocals.  He was also a state figure and one of the founding fathers of the United States. </span></p><span data-dcnode-id="561" instrument_node="">
</span><h3 data-dcnode-id="556" style="text-align:justify;"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node=""> 13- </span></strong><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node=""> William Cullen (1710 - 1790) </span></strong></h3><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="554" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="550" style="padding-bottom: calc(240 / 196 * 100%)"><span data-dcnode-id="553" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 9" data-dcnode-id="552" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-9.jpg&amp;raw" title="The 50 Most Famous Inventors of History 9"><span data-dcnode-id="551" instrument_node="">
</span></span><span data-dcnode-id="549" instrument_node=""> </span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545" style="text-align:justify;"><span data-dcnode-id="546" instrument_node=""> Physicist and Scottish chemist, is credited with the invention of artificial cooling. </span></p><span data-dcnode-id="544" instrument_node="">
</span><h3 data-dcnode-id="539" style="text-align:justify;"><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node=""> 14- </span></strong><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node=""> John Wilkinson (1728-1808) </span></strong></h3><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="537" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="533" style="padding-bottom: calc(246 / 220 * 100%)"><span data-dcnode-id="536" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 10" data-dcnode-id="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-10.jpg&amp;raw" title="The 50 Most Famous Inventors of History 10"><span data-dcnode-id="534" instrument_node="">
</span></span><span data-dcnode-id="532" instrument_node=""> </span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528" style="text-align:justify;"><span data-dcnode-id="529" instrument_node=""> Industrial English, developed the manufacture and use of wrought iron.  Its precision iron cylinders were essential for steam engines. </span></p><span data-dcnode-id="527" instrument_node="">
</span><h3 data-dcnode-id="522" style="text-align:justify;"><strong data-dcnode-id="525"><span data-dcnode-id="526" instrument_node=""> fifteen- </span></strong><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node=""> Sir Richard Arkwright (1732 - 1792) </span></strong></h3><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="520" instrument_node=""> </span><span class="image-lazy-box" data-dcnode-id="516" style="padding-bottom: calc(273 / 220 * 100%)"><span data-dcnode-id="519" instrument_node="">
</span><img alt="The 50 Most Famous Inventors of History 11" data-dcnode-id="518" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.lifepersona.com/the-50-most-famous-inventors-in-history/the-50-most-famous-inventors-of-history-11.jpg&amp;raw" title="The 50 Most Famous Inventors of History 11"><span data-dcnode-id="517" instrument_node="">
</span></span><span data-dcnode-id="515" instrument_node=""> </span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511" style="text-align:justify;"><span data-dcnode-id="512" instrument_node=""> English businessman, father of the industrial revolution.  He was the creator of the industrial loom, which was used in the mass production of textiles. </span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="504" style="text-align:justify;"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node=""> 16- </span></strong><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node=""> James Watt (1736 - 1819) </span></strong><span data-dcnode-id="505" instrument_node=""> : Scottish inventor of the steam engine used in trains.  By creating a separate condensate chamber, it managed to tremendously improve steam efficiency, which expanded its uses beyond water pumping. </span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="497" style="text-align:justify;"><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node=""> 17- </span></strong><strong data-dcnode-id="499"><span data-dcnode-id="500" instrument_node=""> Alessandro Volta (1745 - 1827) </span></strong><span data-dcnode-id="498" instrument_node=""> : Italian physicist, is considered the inventor of the battery, having created the first electrochemical battery using zinc, copper and an electrolyte. </span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="490" style="text-align:justify;"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node=""> 18- </span></strong><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node=""> Sir Humphry Davy (1778 - 1829) </span></strong><span data-dcnode-id="491" instrument_node=""> : English inventor, creator of the lamp of Davy.  Its lamp could be used by miners in areas where there was methane gas, since its design prevented the flame from escaping from the chamber. </span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="483" style="text-align:justify;"><strong data-dcnode-id="487"><span data-dcnode-id="488" instrument_node=""> 19- </span></strong><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node=""> Charles Babbage (1791 - 1871) </span></strong><span data-dcnode-id="484" instrument_node=""> : English mathematician and inventor, created the first computer that served as a prototype for future computers.  He is considered, for this reason, as the father of computing, despite not having completed a functional model during his life. </span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="476" style="text-align:justify;"><strong data-dcnode-id="480"><span data-dcnode-id="481" instrument_node=""> twenty- </span></strong><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node=""> Michael Faraday (1791-1867) </span></strong><span data-dcnode-id="477" instrument_node=""> : English scientist, contributed to convert the electricity in a form that could be easily usable.  He discovered benzene and created a primitive form of bunsen burner. </span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="469" style="text-align:justify;"><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node=""> twenty-one- </span></strong><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node=""> Samuel Morse (1791 - 1872) </span></strong><span data-dcnode-id="470" instrument_node=""> : American inventor who used Jackson's principles of electromagnetism to develop the telegraph cable.  He also invented Morse code, a system of tone communication used in the telegraph. </span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="462" style="text-align:justify;"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node=""> 22- </span></strong><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node=""> William Henry Fox Talbot (1800 - 1877) </span></strong><span data-dcnode-id="463" instrument_node=""> : Pioneer of photography in Victorian England, created the first negative that allowed several impressions.  He is known for creating the calotype process, using silver nitrate for photographing. </span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="455" style="text-align:justify;"><strong data-dcnode-id="459"><span data-dcnode-id="460" instrument_node=""> 2. 3- </span></strong><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node=""> Louis Braille (1809 - 1852) </span></strong><span data-dcnode-id="456" instrument_node=""> : French inventor, Braille was blind after an accident in his childhood.  He developed the Braille reading system for the blind.  He also developed a Braille system for reading musical scores. </span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="448" style="text-align:justify;"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node=""> 24- </span></strong><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node=""> Kirkpatrick Macmillan (1812 - 1878) </span></strong><span data-dcnode-id="449" instrument_node=""> : Born in Scotland, was the inventor of the bicycle of pedals.  His invention allowed the use of a rear wheel for the driving of the bicycle using a chain, giving rise to the bicycle design that we use today. </span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="441" style="text-align:justify;"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node=""> 25- </span></strong><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node=""> James Clerk Maxwell (1831 - 1879) </span></strong><span data-dcnode-id="442" instrument_node=""> : Scottish physicist and inventor, created the first process to produce color photographs.  He is also considered one of the greatest physicists of the millennium. </span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="434" style="text-align:justify;"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node=""> 26- </span></strong><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node=""> Karl Benz (1844-1929) </span></strong><span data-dcnode-id="435" instrument_node=""> : Inventor and German entrepreneur, developed the car of propulsion by petroleum fuel.  He received his first patent for the oil-based internal combustion engine, which allowed the creation of the modern car.  It also became a successful vehicle manufacturer. </span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="427" style="text-align:justify;"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node=""> 27- </span></strong><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node=""> Thomas Alva Edison (1847 - 1931) </span></strong><span data-dcnode-id="428" instrument_node=""> : American inventor who presented more than 1,000 patents.  Developed and innovated in a wide range of products, from the electric bulb to the phonograph, through the camera of moving images.  Without doubt one of the most important inventors of all time. </span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="420" style="text-align:justify;"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node=""> 28- </span></strong><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node=""> Alexander Graham Bell (1847 - 1922) </span></strong><span data-dcnode-id="421" instrument_node=""> : Scottish scientist considered the inventor of the first handset.  He also worked in telecommunications, aeronautics and hydrodynamics. </span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="413" style="text-align:justify;"><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node=""> 29- </span></strong><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node=""> Nikola Tesla (1856 - 1943) </span></strong><span data-dcnode-id="414" instrument_node=""> : American physicist, invented fluorescent light, Tesla coal induction motor, three-phase electricity and alternating current. </span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="406" style="text-align:justify;"><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node=""> 30- </span></strong><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node=""> Rudolf Diesel (1858 - 1913) </span></strong><span data-dcnode-id="407" instrument_node=""> : German inventor of the machine to Diesel.  He sought to build an engine that had much greater efficiency, which led him to develop the internal combustion engine that used the fuel now called in his name. </span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="399" style="text-align:justify;"><strong data-dcnode-id="403"><span data-dcnode-id="404" instrument_node=""> 31- </span></strong><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node=""> Edward Michelin (1859 - 1940) </span></strong><span data-dcnode-id="400" instrument_node=""> : French inventor of the pneumatic tire.  Based on the development done by John Dunlop in 1887, Michelin improved the original design and developed its own version in 1889. </span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="392" style="text-align:justify;"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node=""> 32- </span></strong><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node=""> Marie Curie (1867-1934) </span></strong><span data-dcnode-id="393" instrument_node=""> : Born in Poland, this Polish scientist was chemistry and physics.  He discovered the radius, which led to the development of radiation and X-rays. </span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="385" style="text-align:justify;"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node=""> 33- </span></strong><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node=""> The Wright Brothers (1871 - 1948) </span></strong><span data-dcnode-id="386" instrument_node=""> : American inventors who successfully completed the design, construction and flight of the first plane in 1903. </span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="380" style="text-align:justify;"><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node=""> 34- Alberto Santos Dumont (1873 - 1932) </span></strong><span data-dcnode-id="381" instrument_node=""> : Brazilian inventor, pioneer of modern aviation, invented airplane and airship.  He became the first person to successfully combine internal combustion engines and hot air balloons. </span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="370" style="text-align:justify;"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node=""> 35- </span></strong><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node=""> Alexander Fleming (1881 - 1955) </span></strong><span data-dcnode-id="374" instrument_node=""> : Scottish scientist who discovered the antibiotic called penicillin by accident, from the so-called mold strain </span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node=""> Penicillium notatum </span></em><span data-dcnode-id="371" instrument_node=""> In the year 1928. </span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="363" style="text-align:justify;"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node=""> 36- </span></strong><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node=""> Johannes Gutenberg (1398 - 1468) </span></strong><span data-dcnode-id="364" instrument_node=""> : Famous German inventor, creator of the printing of moving characters.  His invention was the basis of the later printing devices and was instrumental in the development of the print and publishing industries. </span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="356" style="text-align:justify;"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node=""> 37- </span></strong><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node=""> Alfred Nobel (1833 - 1896) </span></strong><span data-dcnode-id="357" instrument_node=""> : Scientist and inventor of Swedish origin, engineer and industrialist who achieved more than 355 patents during his life.  He is considered the inventor of explosive dynamite used in mining and construction, produced by the mixture of nitroglycerin and other absorbent materials. </span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="349" style="text-align:justify;"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node=""> 38- </span></strong><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node=""> John Logie Baird (1888-1946) </span></strong><span data-dcnode-id="350" instrument_node=""> : Scottish scientist, is considered the creator of television and the first recording device in history. </span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="342" style="text-align:justify;"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node=""> 39- </span></strong><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node=""> Enrico Fermi (1901 - 1954) </span></strong><span data-dcnode-id="343" instrument_node=""> : Italian scientist who developed the nuclear reactor.  Fermi made important discoveries in induced radioactivity and is considered the creator of the modern nuclear industry. </span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="335" style="text-align:justify;"><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node=""> 40- </span></strong><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node=""> Guglielmo Marconi (1874 - 1937) </span></strong><span data-dcnode-id="336" instrument_node=""> : Italian engineer and inventor, managed to demonstrate the operation of telegraphic communication and radio signals from a distance.  Winner of the Nobel Prize, his inventions served as a basis for the development of telecommunications today. </span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="328" style="text-align:justify;"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node=""> 41- Robert Oppenheimer </span></strong><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node=""> (1904-1967) </span></strong><span data-dcnode-id="329" instrument_node=""> : Born in the United States, this scientist was the creator of the atomic bomb.  He was in charge of the Manhattan project, which culminated in the creation of the weapon of mass destruction that was detonated in Japan years later.  Later in his life, he made activism against the use of his own invention. </span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="321" style="text-align:justify;"><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node=""> 42- </span></strong><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node=""> Alan Turing (1912 - 1954) </span></strong><span data-dcnode-id="322" instrument_node=""> : English mathematician of the 20th century, pioneer of computational sciences.  He developed the Turing machine, capable of automating processes.  It could be adapted to simulate the logic of any computational algorithm. </span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="314" style="text-align:justify;"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node=""> 43- </span></strong><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node=""> Robert Noyce (1927 - 1990) </span></strong><span data-dcnode-id="315" instrument_node=""> : American electrical engineer who together with Jack Kilby invented the microchip or integrated circuit.  He applied for a patent in 1959. The microchip gave rise to the development of the computer revolution that continues to this day. </span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="307" style="text-align:justify;"><strong data-dcnode-id="311"><span data-dcnode-id="312" instrument_node=""> 44- </span></strong><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node=""> James Dyson (1947) - Full cast and crew </span></strong><span data-dcnode-id="308" instrument_node=""> : British entrepreneur who developed a vacuum cleaner that did not require a bag and, instead, used a double cyclone action.  His company, Dyson, has also created revolutionary hand dryers. </span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="300" style="text-align:justify;"><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node=""> Four. Five- </span></strong><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node=""> Erno Rubik (1944) </span></strong><span data-dcnode-id="301" instrument_node=""> : Famous Hungarian inventor, creator of the Rubik cube, the most popular toy in history and a classic of the culture of the 80s.  His first version was handmade as a challenge for his students while he was a math teacher. </span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="293" style="text-align:justify;"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node=""> 46- </span></strong><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node=""> Tim Berners-Lee (1955) - Full cast and crew </span></strong><span data-dcnode-id="294" instrument_node=""> : British computational scientist, Berners-Lee is considered the inventor of the World Wide Web, which allows the internet to present sites visible through browsers.  He developed the HTTP protocol and helped make the network of networks available to everyone. </span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="286" style="text-align:justify;"><strong data-dcnode-id="290"><span data-dcnode-id="291" instrument_node=""> 47- </span></strong><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node=""> Thomas Adams (1818 - 1905) </span></strong><span data-dcnode-id="287" instrument_node=""> : Scientist and American inventor considered the founder of the gum industry.  He conceived his creation while working as secretary of Mexican leader Antonio López de Santa Anna, who used to chew a natural gum called chewing gum. </span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="279" style="text-align:justify;"><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node=""> 48- </span></strong><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node=""> George Eastman (1854 - 1932) </span></strong><span data-dcnode-id="280" instrument_node=""> : American scientist and inventor, Eastman created and patented the first photographic roll and the camera that used it, of name Kodak.  Its creation allowed ordinary people to take pictures as a hobby. </span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="274" style="text-align:justify;"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node=""> 49. Shiva Ayyadurai (1963) </span></strong><span data-dcnode-id="275" instrument_node=""> : American inventor of Indian origin, he is considered the inventor of electronic mail.  At the age of 14 he created a computer program that allowed the exchange of messages within a network.  He called it"EMAIL"and applied for a patent that it finally received in 1982. </span></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="267" style="text-align:justify;"><strong data-dcnode-id="271"><span data-dcnode-id="272" instrument_node=""> fifty- </span></strong><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node=""> Steve Jobs (1955 - 2011) </span></strong><span data-dcnode-id="268" instrument_node=""> : Businessman and American developer, Jobs contributed to the personal computing revolution with devices such as the Mac computer, the iPod and the iPhone.  He is considered the inventor of a new generation of portable personal computing devices. </span></p><span data-dcnode-id="266" instrument_node="">
