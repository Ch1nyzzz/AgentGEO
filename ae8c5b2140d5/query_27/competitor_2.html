</span><h1 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Inventions and Inventors: Fact or Fiction?</span></h1><span data-dcnode-id="295" instrument_node="">
</span><dl data-dcnode-id="287"><span data-dcnode-id="294" instrument_node="">
</span><dt data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Question: Post-it notes were a deliberate invention.</span></dt><span data-dcnode-id="291" instrument_node="">
</span><dd data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Answer: Also called "sticky notes," these paper slips were an accident. An inventor had been working on a superstrong glue but made the opposite. He realized that the weak glue could hold paper to objects—thus Post-Its!</span></dd><span data-dcnode-id="288" instrument_node="">
</span></dl><span data-dcnode-id="286" instrument_node="">
</span><dl data-dcnode-id="278"><span data-dcnode-id="285" instrument_node="">
</span><dt data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Question: The first synthetic fiber to be made was rayon.</span></dt><span data-dcnode-id="282" instrument_node="">
</span><dd data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Answer: Rayon was first made in the late 19th century. Nylon, the first cloth to be made from petroleum, was discovered in the 1930s. Other synthetic fabrics include polyester and spandex. </span></dd><span data-dcnode-id="279" instrument_node="">
</span></dl><span data-dcnode-id="277" instrument_node="">
</span><dl data-dcnode-id="269"><span data-dcnode-id="276" instrument_node="">
</span><dt data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Question: Jacques Cousteau helped invent the scuba device.</span></dt><span data-dcnode-id="273" instrument_node="">
</span><dd data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Answer: Jacques Cousteau helped create the first scuba (self-contained underwater breathing apparatus) diving device. With it, divers were able to swim beneath the sea without being attached to an air hose.</span></dd><span data-dcnode-id="270" instrument_node="">
</span></dl><span data-dcnode-id="268" instrument_node="">
</span><dl data-dcnode-id="260"><span data-dcnode-id="267" instrument_node="">
</span><dt data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Question: The TWAIN driver was named after writer Mark Twain.</span></dt><span data-dcnode-id="264" instrument_node="">
</span><dd data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Answer: TWAIN, a technology used for optical scanners, is an acronym. It stands for "technology without an interesting name"!</span></dd><span data-dcnode-id="261" instrument_node="">
</span></dl><span data-dcnode-id="259" instrument_node="">
</span><dl data-dcnode-id="251"><span data-dcnode-id="258" instrument_node="">
</span><dt data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Question: Space exploration has led to many inventions.</span></dt><span data-dcnode-id="255" instrument_node="">
</span><dd data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Answer: Rugged electronics, portable water-filtration devices, smoke detectors, scratchproof lenses, and even gravity-proof ink are among the many inventions of space exploration.</span></dd><span data-dcnode-id="252" instrument_node="">
</span></dl><span data-dcnode-id="250" instrument_node="">
</span><dl data-dcnode-id="242"><span data-dcnode-id="249" instrument_node="">
</span><dt data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Question: Locks were invented only recently.</span></dt><span data-dcnode-id="246" instrument_node="">
</span><dd data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Answer: Locks are a very old technology. The oldest known example was found in the ruins of the palace of Khorsabad near Nineveh and is about 4,000 years old.</span></dd><span data-dcnode-id="243" instrument_node="">
</span></dl><span data-dcnode-id="241" instrument_node="">
</span><dl data-dcnode-id="233"><span data-dcnode-id="240" instrument_node="">
</span><dt data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Question: The elevator made the skyscraper possible.</span></dt><span data-dcnode-id="237" instrument_node="">
</span><dd data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Answer: The invention of the elevator and mass production of steel made the skyscraper possible.</span></dd><span data-dcnode-id="234" instrument_node="">
</span></dl><span data-dcnode-id="232" instrument_node="">
</span><dl data-dcnode-id="224"><span data-dcnode-id="231" instrument_node="">
</span><dt data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Question: The parachute was invented 500 years ago.</span></dt><span data-dcnode-id="228" instrument_node="">
</span><dd data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Answer: Italian Leonardo da Vinci sketched a wooden and canvas parachute nearly 500 years ago. An Englishman tested the design from 9,843 feet (3,000 meters) in 2000, and it worked.</span></dd><span data-dcnode-id="225" instrument_node="">
</span></dl><span data-dcnode-id="223" instrument_node="">
</span><dl data-dcnode-id="215"><span data-dcnode-id="222" instrument_node="">
</span><dt data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Question: The thermal flask was invented by a Scotsman.</span></dt><span data-dcnode-id="219" instrument_node="">
</span><dd data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Answer: Scottish inventor James Dewar invented the thermal vacuum flask in 1892. A German student of his, Reinhold Burger, was the first to sell the invention commercially, in 1904.</span></dd><span data-dcnode-id="216" instrument_node="">
</span></dl><span data-dcnode-id="214" instrument_node="">
</span></div><span data-dcnode-id="212" instrument_node="">
