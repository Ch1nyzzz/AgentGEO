</span><p data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">In 1824, Louis Braille developed the first iteration of his tactile writing system. With his invention, the visually impaired regained their ability to read, making it easier for them to communicate and learn. At the time, Braille was only 15 years old.</span></p><span data-dcnode-id="6664" instrument_node="">
</span><p data-dcnode-id="6653"><span data-dcnode-id="6663" instrument_node="">For many inventors, the desire to help others and change the world comes at a very early age. </span><a data-dcnode-id="6660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/collection/davos-2020/5765632/young-inventors-changing-the-world/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6661" style="font-weight: 400;"><span data-dcnode-id="6662" instrument_node="">Kid inventors with a passion for STEM</span></span></a><span data-dcnode-id="6658" style="font-weight: 400;"><span data-dcnode-id="6659" instrument_node=""> continue to make big impacts in our lives.&nbsp;</span></span><span data-dcnode-id="6657" instrument_node="">With modern technology, kids are able to build prototypes and invent devices that have an impact on society. Here are </span><span data-dcnode-id="6655" style="font-weight: 400;"><span data-dcnode-id="6656" instrument_node="">five kid inventors&nbsp;</span></span><span data-dcnode-id="6654" instrument_node="">who are creating inventions to save lives today.&nbsp;&nbsp;</span></p><span data-dcnode-id="6652" instrument_node="">

</span><h2 data-dcnode-id="6128"><span data-dcnode-id="6129" instrument_node="">Kid Inventor #1: The 11 Year Old Cancer Survivor &amp; Her Pediatric Backpack</span></h2><span data-dcnode-id="6127" instrument_node="">
</span><p data-dcnode-id="6115"><span data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">After beating cancer at age 9, Kylie Simonds wanted to solve a problem that plagued chemotherapy patients. During her time in the hospital, Simonds’ movement was limited due to being connected to a large IV bag. Simonds told&nbsp;</span></span><span data-dcnode-id="6124" instrument_node="">ABC News</span><span data-dcnode-id="6116"><span data-dcnode-id="6123" instrument_node="">&nbsp;that she remembered “tripping over all the wires, getting tangled up and having to drag this big thing around.” So she </span><span data-dcnode-id="6121" style="font-weight: 400;"><span data-dcnode-id="6122" instrument_node="">So she</span></span><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/US/11-year-cancer-survivor-kylie-simonds-invents-iv/story%3Fid%3D25751190" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6119" style="font-weight: 400;"><span data-dcnode-id="6120" instrument_node=""> invented a Pediatric IV Backpack</span></span></a><span data-dcnode-id="6117" instrument_node=""> that allows children receiving medical transfusions to move around, and makes their treatment a little more bearable.</span></span></p><span data-dcnode-id="6114" instrument_node="">
</span><p data-dcnode-id="6111"><span data-dcnode-id="6112" style="font-weight: 400;"><span data-dcnode-id="6113" instrument_node="">Kylie Simonds raised more than $50,000 to manufacture her backpacks and was featured on shows such as The Doctors and MSNBC.&nbsp;</span></span></p><span data-dcnode-id="6110" instrument_node="">
</span><h2 data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Kid Inventor #2: The 18 Year Old &amp; His Alzheimer Alert System</span></h2><span data-dcnode-id="6107" instrument_node="">
</span><p data-dcnode-id="6104"><span data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">Alzheimer’s disease is the fastest-growing threat to Americans’ health, and its symptoms not only affect the patients, but also their loved ones. </span></span></p><span data-dcnode-id="6103" instrument_node="">
</span><p data-dcnode-id="6100"><span data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">Kenneth Shinozuka knows this all too well. He remembers being 4 years old, walking in a park in Japan with his grandfather, when his grandfather suddenly got lost. It was then that his family learned that his grandfather has Alzheimer’s. Kenneth needed a way know when his grandfather wandered out of his bed in the middle of the night. So at age 15, Kenneth&nbsp;invented a sock with a pressure sensor that, when activated by a step, would send a message to the smartphone of his grandfather’s caretakers. Not only was Kenneth successful in taking care of his grandfather, but his invention won first prize and the $50,000 Scientific American Science in Action Award. </span></span></p><span data-dcnode-id="6099" instrument_node="">
</span><p data-dcnode-id="6092"><span data-dcnode-id="6093"><span data-dcnode-id="6098" instrument_node="">Kenneth is now attending Harvard, and was a judge in our&nbsp;</span><strong data-dcnode-id="6095"><a data-dcnode-id="6096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//classroom.littlebits.com/lessons/invent-for-good%3Futm_source%3Dshopify%26utm_medium%3Dblog%2520%26utm_campaign%3Dblog_10_24%26utm_content%3DInvent%2520for%2520Good" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="6097" instrument_node="">Invent For Good</span></a></strong><span data-dcnode-id="6094" instrument_node="">&nbsp;challenge. You can learn more in Kenneth’s TED Talk from 2014. &nbsp;</span></span></p><span data-dcnode-id="6091" instrument_node="">

</span><h2 data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">Kid Inventor #3: The 15 Year Old &amp; Her Nebulizer Dryer</span></h2><span data-dcnode-id="5382" instrument_node="">
</span><span data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">We were first introduced to this next kid inventor by our friend&nbsp;</span></span><span data-dcnode-id="5379" instrument_node="">Gokul Krishnan</span><span data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">, whose Project MACH aims to bring&nbsp;</span></span><strong data-dcnode-id="5374"><a data-dcnode-id="5375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//makerfaire.com/mfarchives/a-makerspace-at-a-childrens-hospital-designing-mobile-makerspaces-for-chronic-illness-patients-at-a-childrens-hospital/www.projectmach.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="5376" instrument_node="">mobile makerspaces to children’s hospitals</span></a></strong><span data-dcnode-id="5370"><span data-dcnode-id="5373" instrument_node="">. These makerspaces allow young patients with chronic illnesses to invent with products such as littleBits and 3D printers.</span><br data-dcnode-id="5372"><br data-dcnode-id="5371"></span><span data-dcnode-id="5369" instrument_node="">One such&nbsp;creator is Daelyn James, who used Sphero littleBits and parts she 3D printed to&nbsp;invent a device to let Cystic Fibrosis patients dry their nebulizers. Daelyn invented the device at Vanderbilt Children’s Hospital, where she gets treatment for CF. The mobile makerspace allows Daeyln to get up and out of bed more often, which helps her treatments be more effective.&nbsp;CBS Evening News&nbsp;stopped by Daeyln’s hospital room to see how she invents.&nbsp;&nbsp;</span></div><span data-dcnode-id="5367" instrument_node="">

</span><p data-dcnode-id="3482"><span data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">Hannah Herbst wanted to provide fresh water and a source of sustainable power to people in developing countries. So she invented the Ocean Energy Probe, a device that converts ocean currents into usable power through a generator. Hannah 3D printed her design after modeling it using CAD, and she estimates that if she scales up her prototype she’ll be able to convert enough current into energy to power three car batteries in under one hour! Hannah wants to use her invention to power water desalination pumps to convert salt water to potable water. “I’m excited to aid the world’s energy crisis. I can’t wait to save lives with my invention!” Hannah’s invention won first prize in&nbsp;</span></span><span data-dcnode-id="3483" instrument_node="">Discovery Education &amp; 3M’s Young Scientist Challenge. &nbsp;</span></p><span data-dcnode-id="3481" instrument_node="">

</span><h2 data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Kid Inventor #5: The 10 Year Old &amp; His Self-Disinfecting Hazmat Suit</span></h2><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2953"><span data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">While following coverage of the Ebola scare of 2014, 9 year old Mark Leschinsky of Mahwah, New Jersey, felt that he wanted to help. He saw a problem in the way hazmat suits were designed, realizing that “900 healthcare workers got infected despite wearing conventional suits.” </span></span></p><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">So Mark invented a Self-Disinfecting Hazmat Suit designed to keep workers safe when treating patients. The suit has three layers, an impenetrable inner layer, a center layer with pockets filled with disinfecting solution, and an external perforated layer that lets the solution out to kill viruses on the suit. In 2015, Mark was inducted into National Gallery of Young Inventors. PopSci visited Mark last October to learn more about his life-saving invention.</span></span></p><span data-dcnode-id="2948" instrument_node="">

</span><h2 data-dcnode-id="2720"><strong data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Inspire More Kid Inventors with the Help of Sphero</span></strong></h2><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2717" style="font-weight: 400;"><span data-dcnode-id="2718" instrument_node="">These kid inventors are making a lasting impact in today’s world and are paving the way for future creators. There’s plenty you can do to help your kid or student become inspired and </span></span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sphero.com/blogs/news/stem-vs-steam" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2715" style="font-weight: 400;"><span data-dcnode-id="2716" instrument_node="">use STEM principles</span></span></a><span data-dcnode-id="2712" style="font-weight: 400;"><span data-dcnode-id="2713" instrument_node=""> to change the world.</span></span></p><span data-dcnode-id="2710" instrument_node="">

ode-id="283" instrument_node="">日本語</span></span><span data-dcnode-id="281" instrument_node=""> </span></div><span data-dcnode-id="279" instrument_node=""> </span></div><span data-dcnode-id="277" instrument_node="">
</span></div><span data-dcnode-id="275" instrument_node=""> </span></div><span data-dcnode-id="273" instrument_node=""> </span></div><span data-dcnode-id="271" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="89" tabindex="0"><span data-dcnode-id="269" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="268"></div><span data-dcnode-id="267" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="91" role="dialog"><span data-dcnode-id="266" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="262" role="button" tabindex="0"><span data-dcnode-id="265" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="264"></i><span data-dcnode-id="263" instrument_node=""> </span></span><span data-dcnode-id="261" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="93"><span data-dcnode-id="260" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="95"><strong class="acsb-title-main" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Compliance status</span></strong><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="246" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="240" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="234" instrument_node="">
</span><ol data-dcnode-id="208"><span data-dcnode-id="233" instrument_node="">
</span><li data-dcnode-id="221"><strong class="acsb-title" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="230" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="229"><br data-dcnode-id="228"><span data-dcnode-id="227" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="226"><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="223"><br data-dcnode-id="222"></li><span data-dcnode-id="220" instrument_node="">
</span><li data-dcnode-id="210"><strong class="acsb-title" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="217" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="213"><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="209" instrument_node="">
</span></ol><span data-dcnode-id="207" instrument_node="">
</span><strong data-dcnode-id="204" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="205" lang="EN-US"><span data-dcnode-id="206" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="203" instrument_node="">
</span><ul data-dcnode-id="171"><span data-dcnode-id="202" instrument_node="">
</span><li data-dcnode-id="198"><strong class="acsb-title" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="199" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="193"><strong class="acsb-title" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="194" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="188"><strong class="acsb-title" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="189" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="187" instrument_node="">
</span><li data-dcnode-id="183"><strong class="acsb-title" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="184" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="182" instrument_node="">
</span><li data-dcnode-id="178"><strong class="acsb-title" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="179" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="177" instrument_node="">
</span><li data-dcnode-id="173"><strong class="acsb-title" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="174" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="172" instrument_node="">
</span></ul><span data-dcnode-id="170" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="167"><span data-dcnode-id="168" lang="EN-US"><span data-dcnode-id="169" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="166" instrument_node="">
</span><ol data-dcnode-id="108"><span data-dcnode-id="165" instrument_node="">
</span><li data-dcnode-id="158"><strong class="acsb-title" data-dcnode-id="161"><span data-dcnode-id="163" lang="EN-US"><span data-dcnode-id="164" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="162" instrument_node="">–</span></strong><span data-dcnode-id="159" lang="EN-US"><span data-dcnode-id="160" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="157" instrument_node="">
</span><li data-dcnode-id="150"><span data-dcnode-id="153" lang="EN-US"><strong class="acsb-title" data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="154" instrument_node="">&nbsp;</span></span><span data-dcnode-id="151" lang="EN-US"><span data-dcnode-id="152" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="149" instrument_node="">
</span><li data-dcnode-id="143"><span data-dcnode-id="145" lang="EN-US"><strong class="acsb-title" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Animations –</span></strong><span data-dcnode-id="146" instrument_node="">&nbsp;</span></span><span data-dcnode-id="144" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="142" instrument_node="">
</span><li data-dcnode-id="135"><span data-dcnode-id="138" lang="EN-US"><strong class="acsb-title" data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="139" instrument_node="">&nbsp;</span></span><span data-dcnode-id="136" lang="EN-US"><span data-dcnode-id="137" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="134" instrument_node="">
</span><li data-dcnode-id="127"><span data-dcnode-id="130" lang="EN-US"><strong class="acsb-title" data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="131" instrument_node="">&nbsp;</span></span><span data-dcnode-id="128" lang="EN-US"><span data-dcnode-id="129" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="126" instrument_node="">
</span><li data-dcnode-id="119"><span data-dcnode-id="122" lang="EN-US"><strong class="acsb-title" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="123" instrument_node="">&nbsp;</span></span><span data-dcnode-id="120" lang="EN-US"><span data-dcnode-id="121" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="118" instrument_node="">
</span><li data-dcnode-id="110"><strong class="acsb-title" data-dcnode-id="115"><span data-dcnode-id="116" lang="EN-US"><span data-dcnode-id="117" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="111" lang="EN-US"><strong class="acsb-title" data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">–</span></strong><span data-dcnode-id="112" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="109" instrument_node="">
</span></ol><span data-dcnode-id="107" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="104" instrument_node="">
</span><p data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="101" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="94" instrument_node=""> </span></div><span data-dcnode-id="92" instrument_node=""> </span></div><span data-dcnode-id="90" instrument_node="">
</span></div><div class="acsb-popup acsb-hide-popup" data-acsb-popup="acsb-hide-popup" data-dcnode-id="56" tabindex="0"><span data-dcnode-id="88" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="87"></div><span data-dcnode-id="86" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="58" role="dialog"><span data-dcnode-id="85" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="81" role="button" tabindex="0"><span data-dcnode-id="84" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="83"></i><span data-dcnode-id="82" instrument_node=""> </span></span><span data-dcnode-id="80" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="60"><span data-dcnode-id="79" instrument_node=""> </span><div class="acsb-hide" data-dcnode-id="62"><span data-dcnode-id="78" instrument_node=""> </span><span class="acsb-title" data-dcnode-id="76"><span data-dcnode-id="77" instrument_node="">Hide Accessibility Interface?</span></span><span data-dcnode-id="75" instrument_node=""> </span><span class="acsb-text" data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">Please note: If you choose to hide the accessibility interface, you won't be able to see it anymore, unless you clear your browsing history and data. Are you sure that you wish to hide the interface?</span></span><span data-dcnode-id="72" instrument_node=""> </span><div class="acsb-buttons" data-dcnode-id="64"><span data-dcnode-id="71" instrument_node=""> </span><span class="acsb-button acsb-button-colorized" data-acsb-option="hide" data-dcnode-id="69" role="button" tabindex="0"><span data-dcnode-id="70" instrument_node="">Accept</span></span><span data-dcnode-id="68" instrument_node=""> </span><span class="acsb-button" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="66"
