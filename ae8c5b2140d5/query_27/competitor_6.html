</span></noscript></figure></div><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1428" instrument_node="">But the name “</span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/champagne/"><span data-dcnode-id="1427" instrument_node="">Champagne</span></a><span data-dcnode-id="1425" instrument_node="">” became famous in France and around the world due to 2 men. The first was a monk named&nbsp;</span><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Dom Perignon</span></strong><span data-dcnode-id="1422" instrument_node="">&nbsp;in the 17th-century in the outskirts of&nbsp;</span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/reims/"><span data-dcnode-id="1421" instrument_node="">Reims</span></a><span data-dcnode-id="1419" instrument_node="">, who came up with the idea of matching grapes together to come up with particular notes (rather than throwing random grapes together). He also used thicker bottles which helped prevent the bottles from exploding during transport.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">This was key to getting the name “champagne” known around the world, as it could now be exported. The 2nd man was his successor in the 18th-century,&nbsp;</span><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Dom Grossard</span></strong><span data-dcnode-id="1413" instrument_node="">, who proclaimed Dom Perignon as the “inventor of Champagne” to augment the prestige and the history of their church and of their sparkling wine.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1410" style="height:50px"></div><span data-dcnode-id="1409" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1397"><figure class="aligncenter size-large is-resized" data-dcnode-id="1398"><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/champagne-tshirt/" rel="sponsored noopenner noopener" target="_blank"><img alt="Champagne long-sleeve tshirt" class="wp-image-32954" data-dcnode-id="1408" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645.jpg" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645.jpg 800w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-300x300.jpg 300w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-151x151.jpg 151w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-768x768.jpg 768w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-200x200.jpg 200w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-320x320.jpg 320w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-480x480.jpg 480w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-720x720.jpg 720w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-735x735.jpg 735w" draggable="false" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20600'%3E%3C/svg%3E" title="52 Famous French Inventors and their Inventions 19" width="600"><noscript data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&lt;img src="https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645.jpg" alt="Champagne long-sleeve tshirt" class="wp-image-32954" width="600" height="600" srcset="https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645.jpg 800w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-300x300.jpg 300w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-151x151.jpg 151w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-768x768.jpg 768w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-200x200.jpg 200w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-320x320.jpg 320w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-480x480.jpg 480w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-720x720.jpg 720w, https://snippetsofparis.com/wp-content/uploads/2020/11/champagne-mockup-012802f5-2-e1609100756645-735x735.jpg 735w" sizes="(max-width: 600px) 100vw, 600px" title="52 Famous French Inventors and their Inventions 19"&gt;</span></noscript></a><figcaption data-dcnode-id="1399"><strong data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Shop Now:</span></strong><span data-dcnode-id="1402" instrument_node=""> </span><a data-dcnode-id="1400" data-id="https://snippetsofparis.com/find/champagne-tshirt/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/champagne-tshirt/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1401" instrument_node="">More Champagne Please | Long Sleeve T-Shirt</span></a></figcaption></figure></div><span data-dcnode-id="1396" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1395" style="height:80px"></div><span data-dcnode-id="1394" instrument_node="">
</span><h2 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">31. Self-propelled Automobile by Nicolas-Joseph Cugnot – 1769</span></h2><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">The first steam-powered vehicle was built in 1679 by Ferdinand Verbiest, a Flemish inventor as a toy for the Chinese Emperor. However, it was not meant to carry people. </span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">While there were many subsequent variations, it would be a French inventor, Nicolas-Joseph Cugnot, who built the first working self-propelled land-based mechanical vehicle in 1769 for use by the French Army.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">It was called a &nbsp;</span><em data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">fardier à vapeur</span></em><span data-dcnode-id="1381" instrument_node=""> (“steam cart”), but was rather unstable due to its weight distribution. But the concept stuck. </span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Soon other inventors would get in on the action. By the 1880s saw several large-scale manufacturers began producing vehicles, particularly in France, the first being Bollée (1878), followed by De Dion-Bouton (1883), Serpollet (1887), and Peugeot (1889).</span></p><span data-dcnode-id="1376" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1375" style="height:100px"></div><span data-dcnode-id="1374" instrument_node="">
</span><h2 data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">32. Modern Bra by Herminie Cadolle – 1889</span></h2><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Herminie Cadolle was a French inventor of the modern bra and founder of the Cadolle Lingerie House. Cadolle was a firm believer in women’s rights and was looking to reinvent the traditional corset. </span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">At the time, both advocates for women’s rights and physicians were pointing out that not only did the corset cause physical discomfort, but it also had health complications.</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">In 1889, Cadolle opened lingerie in Paris where she invented a two-piece undergarment. The lower part was a corset for the stomach and waist, and the upper part supported the breasts with shoulder straps. </span></p><span data-dcnode-id="1362" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1344"><figure class="aligncenter size-large" data-dcnode-id="1345"><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/not-pushup/" rel="noopener noreferrer" target="_blank"><picture class="wp-image-27678" data-dcnode-id="1356" title="52 Famous French Inventors and their Inventions 20"><span data-dcnode-id="1361" instrument_node="">

</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Cadolle exhibited her invention at the Great Exposition of 1900. Within a few years, just the upper half was being sold separately as modern-day bras. </span></p><span data-dcnode-id="1340" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1339" style="height:100px"></div><span data-dcnode-id="1338" instrument_node="">
</span><h2 data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">33. Oxygen and Hydrogen by Antoine Lavoisier – 1778-83</span></h2><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Antoine-Laurent de Lavoisier was a French chemist who is most noted for his discovery of the role oxygen plays in combustion. He recognized and named oxygen (1778) and hydrogen (1783).</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">He also helped construct the metric system (noted above) and wrote the first extensive list of elements.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">Unfortunately, he was accused of tax fraud during the 1789 </span><a data-dcnode-id="1326" data-id="44756" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-revolution/"><span data-dcnode-id="1327" instrument_node="">French Revolution</span></a><span data-dcnode-id="1325" instrument_node="">, during which he was found guilty and guillotined. </span></p><span data-dcnode-id="1323" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1322" style="height:100px"></div><span data-dcnode-id="1321" instrument_node="">
</span><h2 data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">34. Modern Dentistry by Pierre Fauchard – 1728</span></h2><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Pierre Fauchard was a French physician, credited as being the “father of modern dentistry”. Before Fauchard, people would often go to barbers or tooth-pullers to have work done on their teeth instead of doctors. </span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Tooth pullers would often use crass tools to pull teeth, often pulling healthy teeth along with the problematic ones.&nbsp;</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">Fauchard wrote a book called </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Le Chirurgien Dentiste</span></em><span data-dcnode-id="1308" instrument_node=""> (“The Surgeon Dentist”), published in 1728 which turned dentistry into a science. He described everything from basic oral anatomy and function, to syptoms and operative methods for removing decay and restoring teeth. He also covered items like:</span></p><span data-dcnode-id="1306" instrument_node="">
</span><ul data-dcnode-id="1297"><li data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">periodontal disease (pyorrhea)</span></li><li data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">orthodontics</span></li><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">replacement of missing teeth</span></li><li data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">tooth transplantation.</span></li></ul><span data-dcnode-id="1296" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1295" style="height:100px"></div><span data-dcnode-id="1294" instrument_node="">
</span><h2 data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">35. National air force by the French Government- 1909</span></h2><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">In the early 20th century, the American Wright brothers were working on inventing the airplane, and it wouldn’t take long for the rest of the world to take notice. </span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1287" instrument_node="">By 1910, the first aviation force in the world was formed by the French Army, called the </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Aviation Militaire</span></em><span data-dcnode-id="1284" instrument_node=""> which eventually became </span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">l’Armée de l’Air.</span></em><span data-dcnode-id="1281" instrument_node=""> World War I in Europe would begin in 1914, making the airforce a mainstay in modern warfare. </span></p><span data-dcnode-id="1279" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1278" style="height:100px"></div><span data-dcnode-id="1277" instrument_node="">
</span><h2 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">36. Cure for malaria by Joseph Bienaimé Caventou – 1700-1800s</span></h2><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">Malaria used to be a big problem in across the world, without treatment. A </span><a data-dcnode-id="1271" data-id="55797" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-explorers/"><span data-dcnode-id="1272" instrument_node="">French explorer</span></a><span data-dcnode-id="1270" instrument_node=""> and biologist named Charles Marie de La Condamine, who was exploring South America would notice the cinchona tree and its medicinal qualities, a tree not known in Europe. </span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1267" instrument_node="">However it would be in 1820 that a French scientist named Joseph Bienaimé Caventou identified </span><em data-dcnode-id="1264"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">quinine</span></strong></em><span data-dcnode-id="1263" instrument_node="">, as the active anti-malarial ingredient in the bark of cinchona tree, and use it to treat the disease. </span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Even though the disease had become treatable, the cause was not clear. It was a 3rd Frenchman Charles Louis Alphonse Laveran, an army doctor, who observed parasites inside the red blood cells of infected people for the first time in the 1880s. </span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Laveran proposed that malaria is caused by this organism. He would go on to win the Nobel Prize in Physiology or Medicine in 1907 for his discoveries, leading to new medicines and quicker cures. </span></p><span data-dcnode-id="1255" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1254" style="height:100px"></div><span data-dcnode-id="1253" instrument_node="">
</span><h2 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">37. The Modern Parachute by Louis-Sébastien Lenormand – 1783</span></h2><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Louis-Sébastien Lenormand was a French inventor who pioneered the modern parachute. While there were several sketches of the parachute during the Renaissance from greats like Leonardo da Vinci, it is Louis-Sébastien Lenormand who put it into practice. </span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1246" instrument_node="">He coined the term “parachute”, from the Latin prefix </span><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">para </span></em><span data-dcnode-id="1243" instrument_node="">meaning “against”, and the French word </span><em data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">chute</span></em><span data-dcnode-id="1240" instrument_node=""> for “fall”. On December 26, 1783, he jumped from the tower of the </span><a data-dcnode-id="1238" data-id="20849" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/montpellier/"><span data-dcnode-id="1239" instrument_node="">Montpellier</span></a><span data-dcnode-id="1237" instrument_node=""> observatory in front of a crowd that included Joseph Montgolfier, using a 14-foot parachute with a rigid wooden frame. </span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Lenormand was succeeded by another Frenchman, André-Jacques Garnerin, who made the first parachute descent from high altitude in a gondola detached from a balloon, with the help of a collapsible parachute on October 22, 1797.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1231" style="height:100px"></div><span data-dcnode-id="1230" instrument_node="">
</span><h2 data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">38. Coffee French Press by Henri-Otto Mayer and Jacques-Victor Delforge – 1852 </span></h2><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">The first French press may have appeared in France in a rudimentary form: a piece of perforated metal or a cheesecloth attached to a rod that the user can put into a kettle. It was made by two French inventors, Henri-Otto Mayer and Jacques-Victor Delforge in 1852. </span></p><span data-dcnode-id="1224" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1208"><picture class="wp-image-57580" data-dcnode-id="1218" title="52 Famous French Inventors and their Inventions 21"><span data-dcnode-id="1223" instrument_node="">
</span><source data-dcnode-id="1222" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/AlessiAldoRossiFrenchPressCoffeeMaker.jpeg.webp" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20754%20754'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1221" instrument_node="">
</span><img alt="52 Famous French Inventors and their Inventions 4" data-dcnode-id="1220" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2021/07/AlessiAldoRossiFrenchPressCoffeeMaker.jpeg" draggable="false" height="754" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20754%20754'%3E%3C/svg%3E" width="754"><span data-dcnode-id="1219" instrument_node="">
</span></picture><span data-dcnode-id="1217" instrument_node="">
</span><noscript data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">&lt;picture class="wp-image-57580" title="52 Famous French Inventors and their Inventions 21"&gt;
&lt;source type="image/webp" srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/AlessiAldoRossiFrenchPressCoffeeMaker.jpeg.webp"/&gt;
&lt;img src="https://snippetsofparis.com/wp-content/uploads/2021/07/AlessiAldoRossiFrenchPressCoffeeMaker.jpeg" alt="52 Famous French Inventors and their Inventions 4" width="754" height="754"/&gt;
&lt;/picture&gt;
</span></noscript><figcaption data-dcnode-id="1209"><strong data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Shop Now: </span></strong><span data-dcnode-id="1212" instrument_node=""> </span><a class="thirstylink" data-dcnode-id="1210" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/french-press/" rel="sponsored" target="_blank" title="french press"><span data-dcnode-id="1211" instrument_node="">French Press</span></a></figcaption></figure><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">The first modern percolator incorporating the rising of boiling water through a tube to form a continuous cycle and capable of being heated on a kitchen stove was invented in 1819 by the Parisian tinsmith Joseph-Henry-Marie Laurens. </span></p><span data-dcnode-id="1204" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1203" style="height:100px"></div><span data-dcnode-id="1202" instrument_node="">
</span><h2 data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">39. Submarine by Siméon Bourgeois and Charles Brun – 1863</span></h2><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Captain Siméon Bourgeois, who made the plans, and naval constructor Charles Brun began working on the design in 1859 at Rochefort. Until then, going underwater relied on human power for propulsion.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">By 1863, they would launch the first submarine which used compressed air to move, called the </span><em data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Plongeur</span></em><span data-dcnode-id="1192" instrument_node=""> (meaning “Diver”).</span></p><span data-dcnode-id="1190" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1189" style="height:100px"></div><span data-dcnode-id="1188" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">40. Naval periscope by Hippolyte Marié-Davy – 1854</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">A few years before the submarine, in 1854, Hippolyte Marié-Davy, French chemist and inventor from the Nièvre, invented the first naval periscope. </span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">It consisted of a vertical tube with two small mirrors fixed at each end at 45° and could be used by divers and the like. </span></p><span data-dcnode-id="1179" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1178" style="height:100px"></div><span data-dcnode-id="1177" instrument_node="">
</span><h2 data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">41. Battery by Gaston Planté and Georges Leclanché – 1859-1866</span></h2><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">There were two main types of batteries and both were invented by Frenchmen. </span></p><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1170" instrument_node="">In 1859, Gaston Planté invented the&nbsp;lead-acid </span><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">dry</span></strong><span data-dcnode-id="1167" instrument_node=""> cell, the first rechargeable cell battery. </span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1164" instrument_node="">A few years later, in 1866, another Frenchman Georges Leclanché patented the carbon-zinc </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">wet</span></strong><span data-dcnode-id="1161" instrument_node=""> cell battery called the </span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Leclanché cell</span></em><span data-dcnode-id="1158" instrument_node="">.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1155" style="height:100px"></div><span data-dcnode-id="1154" instrument_node="">
</span><h2 data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">42. Modern Olympic Games by Pierre de Coubertin – 1894</span></h2><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1150" instrument_node="">The father of the modern Olympic movement was a French man named </span><a aria-label="Baron Pierre de Coubertin (opens in a new tab)" class="rank-math-link" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_de_Coubertin" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1149" instrument_node="">Baron Pierre de Coubertin</span></a><span data-dcnode-id="1147" instrument_node="">. Inspired by the Games held in ancient Greece, he became interested in physical education and the ideals of </span><a class="rank-math-link" data-dcnode-id="1145" data-id="46839" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/sports-france/"><span data-dcnode-id="1146" instrument_node="">sport</span></a><span data-dcnode-id="1144" instrument_node="">. </span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">In 1894, in the halls of the University of Sorbonne in Paris, the modern Olympic Games was voted upon, designating Athens and Paris as the first two hosts in 1896 and 1900.&nbsp; </span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">The&nbsp;Pierre de Coubertin medal&nbsp;(also known as the True Spirit of Sportsmanship medal) is an award given by the&nbsp;International Olympic Committee&nbsp;to&nbsp;athletes&nbsp;who demonstrate&nbsp;sportsmanship.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1135" style="height:100px"></div><span data-dcnode-id="1134" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">43. Minitel (WWW) by France Telecom – 1980</span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">English scientist Tim Berners-Lee may have invented the World Wide Web in 1989, but before that came the French Minitel. </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">The Minitel was an online service accessible through telephone lines and was the world’s most successful online service prior to the World Wide Web. It was invented in Cesson-Sévigné, near Rennes in Brittany, France.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">As Minitel was only deployed in France, while the World Wide Web was deployed everywhere, the Minitel eventually lost ground. France Télécom retired the service on 30 June 2012. </span></p><span data-dcnode-id="1122" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1121" style="height:100px"></div><span data-dcnode-id="1120" instrument_node="">
</span><h2 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">44. Polo shirt by René Lacoste – 1926</span></h2><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Jean René Lacoste&nbsp;was actually a professional tennis player, winning 7 Grand Slam titles and being recognized as the No 1 in the world in 1926 and 1927. </span></p><span data-dcnode-id="1114" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1098"><picture class="wp-image-57600" data-dcnode-id="1108" title="52 Famous French Inventors and their Inventions 22"><span data-dcnode-id="1113" instrument_node="">
</span><source data-dcnode-id="1112" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/lacoste-polo-668x1024.jpeg.webp" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20668%201024'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1111" instrument_node="">
</span><img alt="Lacoste polo shirt" data-dcnode-id="1110" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2021/07/lacoste-polo-668x1024.jpeg" draggable="false" height="1024" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20668%201024'%3E%3C/svg%3E" width="668"><span data-dcnode-id="1109" instrument_node="">
</span></picture><span data-dcnode-id="1107" instrument_node="">
</span><noscript data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">&lt;picture class="wp-image-57600" title="52 Famous French Inventors and their Inventions 22"&gt;
&lt;source type="image/webp" srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/lacoste-polo-668x1024.jpeg.webp"/&gt;
&lt;img width="668" height="1024" src="https://snippetsofparis.com/wp-content/uploads/2021/07/lacoste-polo-668x1024.jpeg" alt="Lacoste polo shirt"/&gt;
&lt;/picture&gt;
</span></noscript><figcaption data-dcnode-id="1099"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Shop Now:</span></strong><span data-dcnode-id="1102" instrument_node=""> </span><a class="thirstylink" data-dcnode-id="1100" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/lacoste-polo-shirt/" rel="sponsored" target="_blank" title="lacoste polo shirt"><span data-dcnode-id="1101" instrument_node="">Lacoste Polo Shirt</span></a></figcaption></figure><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">At the time, he felt that the tennis attire of the day was too cumbersome and uncomfortable. So he designed a white, short-sleeved, loosely-knit piqué cotton. He then added a logo of a crocodile on it, which was his tennis nickname. The Polo shirt was born. </span></p><span data-dcnode-id="1094" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1093" style="height:100px"></div><span data-dcnode-id="1092" instrument_node="">
</span><h2 data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">45. Hypodermic needle by Charles Pravaz – 1853</span></h2><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">While ancient Greeks and Romans knew of injections as a method of medicinal delivery, it would be quite a while before precise dosage was possible. </span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">Charles Pravaz, a French orthopedic surgeon in </span><a data-dcnode-id="1083" data-id="13180" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/things-to-do-in-lyon/"><span data-dcnode-id="1084" instrument_node="">Lyon</span></a><span data-dcnode-id="1082" instrument_node="">, designed a hypodermic needle measuring 3 cm (1.18 in) long and 5 mm (0.2 in) in diameter. </span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Pravaz died before he could publish an account of his invention, but another French surgeon, L. J. Béhier, would make Pravaz’s discovery known all across the world.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1076" style="height:100px"></div><span data-dcnode-id="1075" instrument_node="">
</span><h2 data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">46. Triathlon in Joinville-le-Pont – 1920s</span></h2><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1071" instrument_node="">In the 1920s, a new competition became popular in France. The earliest events were in </span><a data-dcnode-id="1069" data-id="7737" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/paris-suburb-east-val-de-marne/"><span data-dcnode-id="1070" instrument_node="">Joinville-le-Pont, a suburb of Paris</span></a><span data-dcnode-id="1068" instrument_node="">, with the newspaper L’Auto advertising races consisting of a 3 km run, a 12 km bike ride, and the crossing of the river Marne, all without a break.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1065" instrument_node="">“</span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Les Trois Sports</span></em><span data-dcnode-id="1062" instrument_node="">” as it was called, would soon be seen in La Rochelle, </span><a data-dcnode-id="1060" data-id="22402" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/old-port-marseille/"><span data-dcnode-id="1061" instrument_node="">Marseille</span></a><span data-dcnode-id="1059" instrument_node="">, and all over France and the world. </span></p><span data-dcnode-id="1057" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1056" style="height:100px"></div><span data-dcnode-id="1055" instrument_node="">
</span><h2 data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">47. Bone Marrow Transplant by Georges Mathé – 1959</span></h2><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">In 1958, French oncologist Georges Mathé performed the first&nbsp;bone marrow&nbsp;graft&nbsp;between unrelated donors and hosts ever made in the world. </span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">His patients were six&nbsp;Yugoslavian&nbsp;nuclear researchers who had been accidentally irradiated.&nbsp;</span></p><span data-dcnode-id="1046" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1045" style="height:100px"></div><span data-dcnode-id="1044" instrument_node="">
</span><h2 data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">48. Ballet Shoes by Marie Camargo – 1720s</span></h2><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">It was </span><a data-dcnode-id="1038" data-id="79342" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/sun-king-louis-xiv/"><span data-dcnode-id="1039" instrument_node="">Sun King Louis XIV of France</span></a><span data-dcnode-id="1037" instrument_node=""> who made ballet popular, by founding the Royal Academy of Dance. However, at that time the standard women’s ballet shoe had heels. </span></p><span data-dcnode-id="1035" instrument_node="">

</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Mid 18th century dancer Marie Camargo of the Paris Opéra Ballet was the first to wear a non-heeled shoe.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Later in 1947, Rose Repetto created her first ballet shoes for her son, and soon thereafter opened a workshop and a store near the National Opera of Paris. </span></p><span data-dcnode-id="1016" instrument_node="">

</span><p data-dcnode-id="990"><span data-dcnode-id="997" instrument_node="">Repetto ballet shoes became world-famous after their “Cendrillon” ballerina flat made for </span><a data-dcnode-id="995" data-id="56693" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-actors/"><span data-dcnode-id="996" instrument_node="">French actress</span></a><span data-dcnode-id="994" instrument_node=""> Brigitte Bardot’s 1956 film </span><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Et Dieu… créa la femme</span></em><span data-dcnode-id="991" instrument_node="">.</span></p><span data-dcnode-id="989" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="988" style="height:100px"></div><span data-dcnode-id="987" instrument_node="">
</span><h2 data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">49. Inflatable tyres by Édouard Michelin – 1895 </span></h2><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Although intending to be an artist, he entered into the family business of making tires. In 1889, he improved greatly on the design of the pneumatic tire for bicycles, making tires easier to change and repair. </span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The company Michelin Tires quickly adapted his inflatable tires for use on motor vehicles, and France became a powerhouse in car and tire manufacturing. </span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">And if you are wondering, yes the Michelin Tire company also invented the French Michelin-starred system for restaurants. </span></p><span data-dcnode-id="975" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="974" style="height:100px"></div><span data-dcnode-id="973" instrument_node="">
</span><h2 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">50. Modern pencil by Nicolas-Jacques Conté – 1795</span></h2><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Nicolas-Jacques Conté was a French painter, army officer, and inventor of the modern pencil. </span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="966" instrument_node="">It was soon after the </span><a data-dcnode-id="964" data-id="44756" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-revolution/"><span data-dcnode-id="965" instrument_node="">French Revolution</span></a><span data-dcnode-id="963" instrument_node="">, and the country was under economic blockade and unable to import graphite from </span><a data-dcnode-id="961" data-id="46669" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/quotes-britain-france/"><span data-dcnode-id="962" instrument_node="">Great Britain</span></a><span data-dcnode-id="960" instrument_node="">. Conté was asked to create a pencil that did not rely on foreign imports. </span></p><span data-dcnode-id="958" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="947"><figure class="aligncenter size-full is-resized" data-dcnode-id="948"><picture class="wp-image-79011" data-dcnode-id="952" title="52 Famous French Inventors and their Inventions 25"><span data-dcnode-id="957" instrument_node="">
</span><source data-dcnode-id="956" data-lazy-sizes="(max-width: 375px) 100vw, 375px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2.jpg.webp 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2-300x300.jpg.webp 300w, https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2-151x151.jpg.webp 151w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20375%20375'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="955" instrument_node="">
</span><img alt="pencil" data-dcnode-id="954" data-lazy-sizes="(max-width: 375px) 100vw, 375px" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2.jpg" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2.jpg 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2-300x300.jpg 300w, https://snippetsofparis.com/wp-content/uploads/2021/11/PENCIL_2-151x151.jpg 151w" draggable="false" height="375" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20375%20375'%3E%3C/svg%3E" width="375"><span data-dcnode-id="953" instrument_node="">

</span></noscript></figure></div><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="945" instrument_node="">He came up with the idea of mixing powdered graphite with clay and pressing the material between two half-cylinders of wood, forming the modern pencil. He also invented the </span><em data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">conté crayon</span></em><span data-dcnode-id="942" instrument_node=""> named after him, a hard pastel crayon used </span><a data-dcnode-id="940" data-id="59563" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-artists/"><span data-dcnode-id="941" instrument_node="">by artists</span></a><span data-dcnode-id="939" instrument_node="">.</span></p><span data-dcnode-id="937" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="936" style="height:100px"></div><span data-dcnode-id="935" instrument_node="">
</span><h2 data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">51. Neonatal intensive care unit by Étienne Stéphane Tarnier – 1881</span></h2><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">&nbsp;French&nbsp;obstetrician&nbsp;Stéphane Étienne Tarnier became the savior of </span><a data-dcnode-id="929" data-id="3043" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/pregnant-in-france-baby/"><span data-dcnode-id="930" instrument_node="">French mothers</span></a><span data-dcnode-id="928" instrument_node=""> and their premature infants. Interested in their treatment and well-being, he realized that keeping a constant temperature was not enough. </span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">He realized that isolation, hygiene, appropriate feeding, and a warm, humid environment were also necessary. Inspired by a device used to incubate poultry, Tarnier created prototypes of infant incubators for the Paris Maternité in 1881. Today, many an infant around the world has survived because of his invention. </span></p><span data-dcnode-id="923" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="922" style="height:100px"></div><span data-dcnode-id="921" instrument_node="">
</span><h2 data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">52. Semaphore Optical telegraph by Claude Chappe</span></h2><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Claude Chappe was a French inventor who in 1792 demonstrated a practical&nbsp;semaphore telegraph system&nbsp;that eventually spanned all of&nbsp;France. </span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">His system consisted of a series of towers, each within line of sight of others, each with cross-arms on pivots that could be placed in various positions. The operator in a tower moved the arms to a sequence of positions, spelling out text messages in semaphore code.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">This was the first telecommunications system, before the electric telegraph and eventually telephones were invented. &nbsp;</span></p><span data-dcnode-id="909" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="908" style="height:50px"></div><span data-dcnode-id="907" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="896"><figure class="aligncenter size-large" data-dcnode-id="897"><picture class="wp-image-6942" data-dcnode-id="901" title="52 Famous French Inventors and their Inventions 26"><span data-dcnode-id="906" instrument_node="">
