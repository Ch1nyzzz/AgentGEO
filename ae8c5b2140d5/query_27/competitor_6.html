</span><h1 class="single-post-title entry-title" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">52 Famous French Inventors and their Inventions</span></h1><span data-dcnode-id="2415" instrument_node="">
</span></header><span data-dcnode-id="2413" instrument_node="">
</span><div class="clr page-subheading" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Learn about famous French inventors and their incredible inventions that have changed our world. From physicists and biologists, to scientists and fashion designers. </span></div><span data-dcnode-id="2410" instrument_node="">
</span><div class="thumbnail" data-dcnode-id="2398"><span data-dcnode-id="2409" instrument_node="">

</span><li class="meta-author" data-dcnode-id="2383"><span class="screen-reader-text" data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Post author:</span></span><i aria-hidden="true" class="fas fa-user-circle" data-dcnode-id="2386" role="img"></i><a data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/about/" rel="author" title="Posts by Nassie"><span data-dcnode-id="2385" instrument_node="">Nassie</span></a></li><span data-dcnode-id="2382" instrument_node="">

</span><div data-dcnode-id="2369" style="line-height:1.4"><span data-dcnode-id="2370" style="background-color: #f2f0f0; font-size: 75%; "><em data-dcnode-id="2373"><span data-dcnode-id="2377" instrument_node="">(As an Amazon affiliate, we may earn commissions on certain purchases. Please note, information provided is for entertainment purposes. See our </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/privacy-policy-and-cookies/"><span data-dcnode-id="2376" instrument_node="">disclosure policy</span></a><span data-dcnode-id="2374" instrument_node=""> for details.) </span></em><br data-dcnode-id="2372"><br data-dcnode-id="2371"></span></div></div><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2366" instrument_node="">France is known for its love of the </span><a data-dcnode-id="2364" data-id="59563" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-artists/"><span data-dcnode-id="2365" instrument_node="">arts</span></a><span data-dcnode-id="2363" instrument_node="">, </span><a data-dcnode-id="2361" data-id="74037" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-food/"><span data-dcnode-id="2362" instrument_node="">food</span></a><span data-dcnode-id="2360" instrument_node="">, and </span><a data-dcnode-id="2358" data-id="21895" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-wine-regions/"><span data-dcnode-id="2359" instrument_node="">wine</span></a><span data-dcnode-id="2357" instrument_node="">. However, there’s something that’s not as well-known: The French are also responsible for many of the modern world’s inventions.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">French scientists have contributed much to the modern world, with some of the greatest inventions of all time having been made in France, from antibiotics to sports to inflatable tires. </span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2351" instrument_node="">The country is a hotbed for entrepreneurialism and innovation, with the French government giving many grants for research and development. Throughout </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-history/"><span data-dcnode-id="2350" instrument_node="">French history</span></a><span data-dcnode-id="2348" instrument_node="">, inventions great and small have played a role in the modern world we have today. </span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2345" instrument_node="">As the birthplace and home of many famous inventors, scientists, biologists, and thinkers, France has been at the forefront of scientific discovery. So here are the most famous French inventors and their groundbreaking inventions. </span><em data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Allons-y! </span></em></p><span data-dcnode-id="2341" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2340" style="height:100px"></div><span data-dcnode-id="2339" instrument_node="">
</span><h2 data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">1. Sterilisation and Pasteurization by Louis Pasteur – 1864</span></h2><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Biologist Louis Pasteur has long been renowned in France for his discoveries of the principles of vaccination, microbial fermentation, and pasteurization. </span></p><span data-dcnode-id="2333" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2320"><figure class="aligncenter size-full is-resized" data-dcnode-id="2321"><picture class="wp-image-78998" data-dcnode-id="2327" title="52 Famous French Inventors and their Inventions 2"><span data-dcnode-id="2332" instrument_node="">
</span><source data-dcnode-id="2331" data-lazy-sizes="(max-width: 375px) 100vw, 375px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg.webp 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg.webp 300w" sizes="(max-width: 375px) 100vw, 375px" srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg.webp 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg.webp 300w" type="image/webp"><span data-dcnode-id="2330" instrument_node="">
</span><img alt="Pasturized milk" class="entered lazyloaded" data-dcnode-id="2329" data-lazy-sizes="(max-width: 375px) 100vw, 375px" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg 300w" data-ll-status="loaded" draggable="false" height="281" sizes="(max-width: 375px) 100vw, 375px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg&amp;raw" srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg 300w" width="375"><span data-dcnode-id="2328" instrument_node="">
</span></picture><span data-dcnode-id="2326" instrument_node="">
</span><noscript data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">&lt;picture class="wp-image-78998" title="52 Famous French Inventors and their Inventions 2"&gt;
&lt;source type="image/webp" srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg.webp 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg.webp 300w" sizes="(max-width: 375px) 100vw, 375px"/&gt;
&lt;img src="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg" alt="Pasturized milk" width="375" height="281" srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Milk.jpg 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Milk-300x225.jpg 300w" sizes="(max-width: 375px) 100vw, 375px"/&gt;
&lt;/picture&gt;
</span></noscript><figcaption data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Pasturized milk</span></figcaption></figure></div><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">From heating up milk to sterilization and washing hands, his many experiments showed that diseases could be prevented by killing germs, leading to him being referred to as one of the “fathers of germ theory”. </span></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">His research led to breakthroughs in the understanding of the causes and preventions of diseases, which laid down the foundations of modern hygiene, public health standards, and much of modern medicine.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Among his achievements, his vaccines are credited with saving millions of lives against rabies and anthrax which was rampant during his time. The Institut Pasteur in Paris continues his work, conducting experiments in the search for vaccines and other biological and medical studies. </span></p><span data-dcnode-id="2310" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2309" style="height:100px"></div><span data-dcnode-id="2308" instrument_node="">
</span><h2 data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">2. Doctor’s stethoscope by René Laennec – 1816</span></h2><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Physician René Laennec invented the ubiquitous stethoscope that has become so important in modern medicine. Laennec invented the stethoscope because he was not comfortable placing his ear directly onto a woman’s chest to listen to her heart. </span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">The original was made out of wood, amplifying heart sounds without requiring physical contact. </span></p><span data-dcnode-id="2299" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2298" style="height:100px"></div><span data-dcnode-id="2297" instrument_node="">
</span><h2 data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">3. Roulette by Blaise Pascal – 1720</span></h2><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">The first form of roulette was devised in 18th century France. Many historians believe Blaise Pascal introduced a primitive form of roulette. </span></p><span data-dcnode-id="2291" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2275"><picture class="wp-image-57573" data-dcnode-id="2285" title="52 Famous French Inventors and their Inventions 3"><span data-dcnode-id="2290" instrument_node="">

</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">The current version that you see in casinos all around the world, is a hybrid version of that original wheel invented in 1720 and the Italian game Biribi, which was commonly seen in 1796 in Paris. </span></p><span data-dcnode-id="2271" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2270" style="height:100px"></div><span data-dcnode-id="2269" instrument_node="">
</span><h2 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">4. Pencil sharpener by Bernard Lassimonne – 1828</span></h2><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">The pencil sharpener is French, however, its exact inventor is in question. The development of pencil sharpeners began in France when a book published in 1822 reported details of a pencil sharpener invention. </span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Before the development of dedicated pencil sharpeners, a pencil was sharpened by whittling with a knife. It would be French mathematician Bernard Lassimonne of Limoges, who would apply for the world’s first patent on a pencil sharpener in 1828 soon after those initial invention reports. </span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Its design was improved in&nbsp;1847&nbsp;by Thierry des Estivaux, another Frenchman to the design we use today.</span></p><span data-dcnode-id="2257" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2256" style="height:100px"></div><span data-dcnode-id="2255" instrument_node="">
</span><h2 data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">5. Mongolfière by the Montgolfier brothers – 1783</span></h2><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">The Montgolfière, aka a hot air balloon, was invented by the Montgolfier brothers, Joseph-Michel and Jacques-Etienne Montgolfier. Born to successful paper manufacturer parents who had 15 children, the brothers became successful aviation pioneers and balloonists. </span></p><span data-dcnode-id="2249" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2238"><figure class="aligncenter size-large is-resized" data-dcnode-id="2239"><picture class="wp-image-79001" data-dcnode-id="2243" title="52 Famous French Inventors and their Inventions 4"><span data-dcnode-id="2248" instrument_node="">
</span><source data-dcnode-id="2247" data-lazy-sizes="(max-width: 512px) 100vw, 512px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/hot-air-balloon-montgolfiere-1024x1024.jpg.webp 1024w, https://snippetsofparis.com/wp-content/uploads/2021/11/hot-air-balloon-montgolfiere-300x300.jpg.webp 300w, https://snippetsofparis.com/wp-content/uploads/2021/11/hot-air-balloon-montgolfiere-151x151.jpg.webp 151w, https://snippetsofparis.com/wp-content/uploads/2021/11/hot-air-balloon-montgolfiere-768x768.jpg.webp 768w, https://snippetsofparis.com/wp-content/uploads/2021/11/hot-air-balloon-montgolfiere.jpg.webp 1100w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="2246" instrument_node="">

</span></picture><span data-dcnode-id="2242" instrument_node="">

</span></noscript></figure></div><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2236" instrument_node="">They conducted several flights with animals, before human flight was authorized by King Louis XIV (the husband of </span><a data-dcnode-id="2234" data-id="13763" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/marie-antoinette-let-them-eat-cake/"><span data-dcnode-id="2235" instrument_node="">Marie Antoinette</span></a><span data-dcnode-id="2233" instrument_node="">). </span></p><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2230" instrument_node="">The flights by the Brothers Montgolfier were a sensation and the family was soon elevated to the nobility and the hereditary appellation of&nbsp;</span><em data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">de Montgolfier</span></em><span data-dcnode-id="2227" instrument_node=""> in 1783. It didn’t last long, however, as the </span><a data-dcnode-id="2225" data-id="44756" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-revolution/"><span data-dcnode-id="2226" instrument_node="">French revolution</span></a><span data-dcnode-id="2224" instrument_node=""> struck in 1789 when French nobility lost their titles and privileges.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">The Montgolfier brothers were inducted into the International Air &amp; Space Hall of Fame in 1983. </span></p><span data-dcnode-id="2219" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2218" style="height:100px"></div><span data-dcnode-id="2217" instrument_node="">
</span><h2 data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">6. Braille by Louis Braille – 1824</span></h2><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">A blind French teenager named Louis Braille, who lost his eyesight in a childhood accident, would revolutionize the world in terms of accessibility for the visually impaired. </span></p><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">In 1824, at the age of fifteen, he developed a code for the French alphabet as an improvement on </span><a data-dcnode-id="2208" data-id="https://en.wikipedia.org/wiki/Charles_Barbier" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Barbier" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2209" instrument_node="">night writing</span></a><span data-dcnode-id="2207" instrument_node="">, a previous system also invented by a Frenchman named Charles Barbier de la Serre, that had the aim of short-hand writing and code, but was not necessarily for the blind. </span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2200"><span data-dcnode-id="2204" instrument_node="">Braille’s system addressed several shortcomings in Barbier’s system, as he was blind while Barbier was not. In </span><em data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Braille</span></em><span data-dcnode-id="2201" instrument_node="">, the characters have rectangular blocks called cells that have tiny bumps pressed into paper that are called raised dots. The number and arrangement of these dots distinguish one character from another. </span></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Braille published his system, which subsequently included musical notation, in 1829. The two men became friendly as Braille grew into adulthood, keeping up a letter correspondence. </span></p><span data-dcnode-id="2196" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2195" style="height:100px"></div><span data-dcnode-id="2194" instrument_node="">
</span><h2 data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">7. Mayonnaise by the Army cook of the Duc of Richelieu – 1756</span></h2><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2190" instrument_node="">According to legend, mayonnaise was&nbsp;created in 1756 by the cook of the&nbsp;French Duc of Richelieu&nbsp;with the only two ingredients he had available (eggs and oil) after the capture of Port-Mahon in Spain, against the English. Hence the name of “</span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Mahonnaise</span></em><span data-dcnode-id="2187" instrument_node="">“.&nbsp;</span></p><span data-dcnode-id="2185" instrument_node="">

&lt;/picture&gt;
</span></noscript></figure></div><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2172" instrument_node="">However, it is quite similar to the garlicky&nbsp;</span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/aioli-recipe/"><span data-dcnode-id="2171" instrument_node="">aioli sauce</span></a><span data-dcnode-id="2169" instrument_node="">&nbsp;which could have already existed at the time in southern France and Spain, so there is a question of which came first, the chicken or the egg. </span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2166" instrument_node="">Nevertheless, the mayonnaise recipe soon began appearing in French cookbooks in the 18th century, and a culinary treat was born. You can get the recipe for </span><a data-dcnode-id="2164" data-id="45218" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-mayonnaise/"><span data-dcnode-id="2165" instrument_node="">French mayonnaise</span></a><span data-dcnode-id="2163" instrument_node=""> here. </span></p><span data-dcnode-id="2161" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2160" style="height:100px"></div><span data-dcnode-id="2159" instrument_node="">
</span><h2 data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">8. Radioactivity by Henri Becquerel, Marie Curie, and Pierre Curie – 1896</span></h2><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Born in Paris into a wealthy family which produced four generations of physicists, Henri Becquerel is best known for discovering radioactivity in 1896 while working with phosphorescent materials.</span></p><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">These materials glowed in the dark after exposure to light, and he soon found from experiments that there was a form of invisible radiation that could pass through paper.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2145"><span data-dcnode-id="2149" instrument_node="">His contemporaries at the time were Polish-turned-French scientists </span><a data-dcnode-id="2147" data-id="84079" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/marie-curie-sklodowska/"><span data-dcnode-id="2148" instrument_node="">Marie Curie and her husband Pierre Curie</span></a><span data-dcnode-id="2146" instrument_node="">. They would go on to conduct many experiments, writing papers about their discoveries of the elements polonium and radium.</span></p><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Marie and Pierre Curie and Henri Becquerel shared the 1903 Nobel Prize in Physics for their pioneering work developing the theory of “radioactivity”.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2140" instrument_node="">Marie Curie would go on to also win the 1911 Nobel Prize in Chemistry and become one of the most </span><a data-dcnode-id="2138" data-id="80772" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-women-history/"><span data-dcnode-id="2139" instrument_node="">famous women in France</span></a><span data-dcnode-id="2137" instrument_node="">. During World War I, she developed mobile radiography units to provide X-ray services to field hospitals. </span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">In 1920 she founded the Curie Institute in Paris, (as well as one in Warsaw, Poland) which remain major centres of medical research. </span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2131" instrument_node="">Today, Marie and Pierre Curie are buried in the vaunted </span><a data-dcnode-id="2129" data-id="58225" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/pantheon-paris/"><span data-dcnode-id="2130" instrument_node="">Panthéon in Paris</span></a><span data-dcnode-id="2128" instrument_node="">, in tombs lined with lead as their bodies are still radioactive. </span></p><span data-dcnode-id="2126" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2114"><picture class="wp-image-79004" data-dcnode-id="2120" title="52 Famous French Inventors and their Inventions 6"><span data-dcnode-id="2125" instrument_node="">

</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2112" style="height:100px"></div><span data-dcnode-id="2111" instrument_node="">
</span><h2 data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">9. Hairdryer by Alexandre Godefroy – 1890</span></h2><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">France has the capital of fashion since the days of the </span><a data-dcnode-id="2105" data-id="59325" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/palace-of-versailles-facts/"><span data-dcnode-id="2106" instrument_node="">Sun King and the Palace of Versailles</span></a><span data-dcnode-id="2104" instrument_node="">, so it is no surprise that the hairdryer would be invented in France. </span></p><span data-dcnode-id="2102" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2086"><figure class="aligncenter size-large is-resized" data-dcnode-id="2087"><picture class="wp-image-57586" data-dcnode-id="2096" title="52 Famous French Inventors and their Inventions 7"><span data-dcnode-id="2101" instrument_node="">
</span><source data-dcnode-id="2100" data-lazy-sizes="(max-width: 334px) 100vw, 334px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/dyson-hairdryer-668x1024.jpeg.webp 668w, https://snippetsofparis.com/wp-content/uploads/2021/07/dyson-hairdryer-196x300.jpeg.webp 196w, https://snippetsofparis.com/wp-content/uploads/2021/07/dyson-hairdryer-768x1178.jpeg.webp 768w, https://snippetsofparis.com/wp-content/uploads/2021/07/dyson-hairdryer.jpeg.webp 780w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20334%20512'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="2099" instrument_node="">

</span><p data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">In 1890, the first hairdryer was invented by French stylist Alexander Godefroy. His invention was a large, seated version that that attached to the chimney pipe of a gas stove. </span></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">It was neither portable nor handheld, but the idea of hot air being used to set and style one’s hair was an instant success. </span></p><span data-dcnode-id="2079" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2078" style="height:100px"></div><span data-dcnode-id="2077" instrument_node="">
</span><h2 data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">10. Denim from Nîmes – 1800s</span></h2><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2073" instrument_node="">Staying with fashion, no one is quite sure who invented the famous fabric denim, or rather </span><em data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">de Nîmes </span></em><span data-dcnode-id="2070" instrument_node="">(meaning “from Nimes”). A city in the south of France, </span><a data-dcnode-id="2068" data-id="26207" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/nimes/"><span data-dcnode-id="2069" instrument_node="">Nimes</span></a><span data-dcnode-id="2067" instrument_node=""> is a less than hour’s drive away from the Mediterranean sea.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">The quintessential fabric of the jean was created in Nimes with a mixture of wool and silk devised by shepherds to withstand a hard day’s work.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2061" style="height:100px"></div><span data-dcnode-id="2060" instrument_node="">
</span><h2 data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">11. Aqua-Lung by Jacques Cousteau – 1943</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">Living by the seaside in </span><a data-dcnode-id="2054" data-id="53161" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/sanary-sur-mer/"><span data-dcnode-id="2055" instrument_node="">Sanary-sur-mer</span></a><span data-dcnode-id="2053" instrument_node=""> in a home that is still owned by his family, Jacques-Yves Cousteau created the aqua-lung, the world’s first underwater oxygen supply. </span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">It was the first self-contained underwater breathing apparatus (or “scuba”) to achieve worldwide popularity. This class of equipment is now commonly referred to as a diving regulator or demand valve.</span></p><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2047" instrument_node="">An earlier underwater breathing regulator, known as the&nbsp;</span><em data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">régulateur,</span></em><span data-dcnode-id="2044" instrument_node="">&nbsp;was also invented in France in 1860 by&nbsp;Benoît Rouquayrol. &nbsp;</span></p><span data-dcnode-id="2042" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="2041" style="height:100px"></div><span data-dcnode-id="2040" instrument_node="">
</span><h2 data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">12. The Metric system by Gabriel Mouton – 1700s</span></h2><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">Gabriel Mouton, a church vicar in </span><a data-dcnode-id="2034" data-id="13180" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/things-to-do-in-lyon/"><span data-dcnode-id="2035" instrument_node="">Lyon</span></a><span data-dcnode-id="2033" instrument_node=""> founded the&nbsp;metric system in 1670. French scientists at the Academy of Sciences of Paris refined it in the 1790s, and since the metric system has traversed the world. </span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2030" instrument_node="">The idea was that a unit of time should be the second, the unit of length should be either the metre or a </span><strong data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">decimal multiple </span></strong><span data-dcnode-id="2027" instrument_node="">of it, and the unit of mass should be the gram or a decimal multiple of it.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2024" instrument_node="">At the same time, French scientists and </span><a data-dcnode-id="2022" data-id="60011" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-philosophers/"><span data-dcnode-id="2023" instrument_node="">philosophers</span></a><span data-dcnode-id="2021" instrument_node=""> attempted the same technique with time, creating the </span><a data-dcnode-id="2019" data-id="16855" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-revolutionary-calendar/"><span data-dcnode-id="2020" instrument_node="">French revolutionary calendar</span></a><span data-dcnode-id="2018" instrument_node="">. </span></p><span data-dcnode-id="2016" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2002"><picture class="wp-image-29651" data-dcnode-id="2010" title="52 Famous French Inventors and their Inventions 8"><span data-dcnode-id="2015" instrument_node="">

</span></noscript><figcaption data-dcnode-id="2003"><span data-dcnode-id="2006" instrument_node="">Courtesy </span><a data-dcnode-id="2004" data-id="https://commons.wikimedia.org/wiki/File:Calendrier-republicain-debucourt2.jpg" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ACalendrier-republicain-debucourt2.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2005" instrument_node="">Wikipedia</span></a></figcaption></figure><span data-dcnode-id="2001" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">The idea was there should be 10 days in a week, 10 hours in a day, 100 minutes in an hour, and 100 seconds in a minute. This second idea was much less successful, and was soon abandoned after a few years. </span></p><span data-dcnode-id="1998" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">The metric system on the other hand, has been adopted all around the world. </span></p><span data-dcnode-id="1995" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1994" style="height:100px"></div><span data-dcnode-id="1993" instrument_node="">
</span><h2 data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">13. French Bagpipes – Middle ages</span></h2><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1989" instrument_node="">Bagpipes play an important part in </span><a data-dcnode-id="1987" data-id="32272" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-culture-facts/"><span data-dcnode-id="1988" instrument_node="">French culture</span></a><span data-dcnode-id="1986" instrument_node="">, with many bagpipes being developed in France including:</span></p><span data-dcnode-id="1984" instrument_node="">
</span><ul data-dcnode-id="1967"><li data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">the Biniou</span></li><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">the bodega</span></li><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">the Boha, </span></li><li data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">the Bousine, </span></li><li data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">the Cabrette, </span></li><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">the Chabrette, </span></li><li data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">the Cornemuse du Centre, </span></li><li data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">the Loure</span></li></ul><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1965" instrument_node="">France and Scotland had a strategical liaison called the </span><a data-dcnode-id="1963" data-id="55462" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/auld-alliance/"><span data-dcnode-id="1964" instrument_node="">Auld Alliance</span></a><span data-dcnode-id="1962" instrument_node=""> in the Middle ages which undoubtedly explains some of those roots. For centuries after the Scottish guards would be the last line of defense for </span><a data-dcnode-id="1960" data-id="12403" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/french-royals/"><span data-dcnode-id="1961" instrument_node="">French Kings</span></a><span data-dcnode-id="1959" instrument_node="">. </span></p><span data-dcnode-id="1957" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1956" style="height:100px"></div><span data-dcnode-id="1955" instrument_node="">
</span><h2 data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">14. Cinema by Léon Guillaume Bouly and Lumière Brothers – 1890s</span></h2><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1944"><span data-dcnode-id="1951" instrument_node="">If you visit </span><a data-dcnode-id="1949" data-id="52956" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/la-ciotat/"><span data-dcnode-id="1950" instrument_node="">La Ciotat in the south of France</span></a><span data-dcnode-id="1948" instrument_node="">, you will quickly realize that it is the site of the world’s first cinema by the famous </span><em data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Frères Lumières</span></em><span data-dcnode-id="1945" instrument_node="">. You will see many names around town dedicated to the brothers who invented modern movie industry as we now know it.</span></p><span data-dcnode-id="1943" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1929"><picture class="wp-image-53000" data-dcnode-id="1937" title="52 Famous French Inventors and their Inventions 9"><span data-dcnode-id="1942" instrument_node="">
</span><source data-dcnode-id="1941" data-lazy-sizes="(max-width: 741px) 100vw, 741px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/06/Cinematograph_Lumiere_advertisement_1895-741x1024.jpg.webp 741w, https://snippetsofparis.com/wp-content/uploads/2021/06/Cinematograph_Lumiere_advertisement_1895-217x300.jpg.webp 217w, https://snippetsofparis.com/wp-content/uploads/2021/06/Cinematograph_Lumiere_advertisement_1895-768x1062.jpg.webp 768w, https://snippetsofparis.com/wp-content/uploads/2021/06/Cinematograph_Lumiere_advertisement_1895.jpg.webp 868w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20741%201024'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1940" instrument_node="">

</span></noscript><figcaption data-dcnode-id="1930"><span data-dcnode-id="1933" instrument_node="">Ad for Cinematography Lumière in 1895 – courtesy of </span><a data-dcnode-id="1931" data-id="https://en.wikipedia.org/wiki/File:Cinematograph_Lumiere_advertisement_1895.jpg" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACinematograph_Lumiere_advertisement_1895.jpg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1932" instrument_node="">Wikipedia </span></a></figcaption></figure><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1927" instrument_node="">It was actually a French inventor named Léon Guillaume Bouly who invented a machine in 1892 for creating motion pictures which was called ‘the </span><em data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">cinematographe</span></em><span data-dcnode-id="1924" instrument_node="">’. In 1894, Bouly could not pay the fees for his patents, so he sold his rights to the device and its name to the Lumière Brothers, who applied it to their own device in 1895.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">In 1895, when on holiday at the Palais Lumière in La Ciotat, the two brothers used their cinematographe to make what were to become the first films in world cinema history:</span></p><span data-dcnode-id="1919" instrument_node="">
</span><ul data-dcnode-id="1906"><li data-dcnode-id="1915"><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">L’arroseur arosé&nbsp;</span></em><span data-dcnode-id="1916" instrument_node="">(The sprinkler sprinkled)</span></li><li data-dcnode-id="1911"><em data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Querelle enfantine</span></em><span data-dcnode-id="1912" instrument_node="">&nbsp;(Childish quarrel)</span></li><li data-dcnode-id="1907"><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">L’arrivée d’un train en gare de La Ciotat</span></em><span data-dcnode-id="1908" instrument_node="">&nbsp; (The arrival of a train at La Ciotat station.)</span></li></ul><span data-dcnode-id="1905" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1904" style="height:100px"></div><span data-dcnode-id="1903" instrument_node="">
</span><h2 data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">15. Pressure cooker by Denis Papin – 1679</span></h2><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The Instant pot of its day was invented by the Frenchman Denis Papin in 1679. He invented something called “the steam digester”, which was the forerunner of the pressure cooker and the steam engine.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1880"><figure class="aligncenter size-large" data-dcnode-id="1881"><picture class="wp-image-25364" data-dcnode-id="1891" title="52 Famous French Inventors and their Inventions 10"><span data-dcnode-id="1896" instrument_node="">
</span><source data-dcnode-id="1895" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot.jpg.webp 400w, https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot-300x277.jpg.webp 300w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20369'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1894" instrument_node="">
</span><img alt="Instant pot" data-dcnode-id="1893" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot.jpg" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot.jpg 400w, https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot-300x277.jpg 300w" draggable="false" height="369" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20369'%3E%3C/svg%3E" width="400"><span data-dcnode-id="1892" instrument_node="">
</span></picture><span data-dcnode-id="1890" instrument_node="">
</span><noscript data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">&lt;picture class="wp-image-25364" title="52 Famous French Inventors and their Inventions 10"&gt;
&lt;source type="image/webp" srcset="https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot.jpg.webp 400w, https://snippetsofparis.com/wp-content/uploads/2020/07/Instant-Pot-300x277.jpg.webp 300w" sizes="(max-width: 400px) 100vw, 400px"/&gt;

</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Sometimes called the bone digester, it is a device for extracting fats from bones in a high-pressure steam environment. The concentration of heat was so high, it also rendered them brittle enough to be easily ground into bone meal.</span></p><span data-dcnode-id="1876" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1875" style="height:100px"></div><span data-dcnode-id="1874" instrument_node="">
</span><h2 data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">16. Refrigerator by Carré Brothers- 1859</span></h2><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Another set of scientist brothers on the list are Edmond and Ferdinand Carré. In 1850, Edmond Carré developed the first absorption refrigerator, using water and sulphuric acid. </span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Ferdinand continued Edmond’s work on the process and in 1858 developed a machine that used water as the absorbent and ammonia as a refrigerant.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1864" instrument_node="">The ancestor to the modern refrigerator, their device found much success in breweries, to keep drinks cool. Similar principles would be used to later invent the </span><a data-dcnode-id="1862" data-id="4598" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/air-conditioning-france/"><span data-dcnode-id="1863" instrument_node="">air conditioner</span></a><span data-dcnode-id="1861" instrument_node="">. </span></p><span data-dcnode-id="1859" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1858" style="height:100px"></div><span data-dcnode-id="1857" instrument_node="">
</span><h2 data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">17. Photography by Nicéphore Niépce – 1820s</span></h2><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">In the mid-1820s, Joseph Nicéphore Niépce first managed to fix an image that was captured with a camera. It took at least eight hours or even several days of exposure in the camera to fix the results, and the earliest results were very crude, but the idea was there. </span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1850" instrument_node="">Niépce would die suddenly, leaving his notes to his associate, Frenchman Louis Daguerre. Daguerre went on to develop the </span><em data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">daguerreotype</span></em><span data-dcnode-id="1847" instrument_node=""> process in 1839, which was the first publicly announced and commercially viable photographic process.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1844" style="height:100px"></div><span data-dcnode-id="1843" instrument_node="">
</span><h2 data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">18. Canned foods by Nicolas Appert – 1809</span></h2><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">The ambitions of </span><a data-dcnode-id="1837" data-id="79318" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/napoleon-bonaparte/"><span data-dcnode-id="1838" instrument_node="">Emperor Napoleon Bonaparte</span></a><span data-dcnode-id="1836" instrument_node=""> involved conquering foreign lands, for which he would need an army. An army that would need a lot of food, as it was on the move. </span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Napoleon offered a hefty cash award of 12,000 francs to any inventor who could devise a cheap and effective method of preserving large amounts of food. </span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">In 1809, Nicolas Appert, a French confectioner and brewer, observed that food cooked inside a jar did not spoil unless the seals leaked, and developed a method of sealing food in glass jars. He was awarded the prize in 1810 by Count Montelivert, Napoleon’s minister of the interior.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">The reason for lack of spoilage was unknown at the time, since it would be another 50 years before French scientist Louis Pasteur would demonstrate the role of germs and microbes in food spoilage.</span></p><span data-dcnode-id="1825" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1824" style="height:100px"></div><span data-dcnode-id="1823" instrument_node="">
</span><h2 data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">19. Margarine by Hippolyte Mège-Mouriès – 1869</span></h2><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1819" instrument_node="">In the 1860s, </span><a data-dcnode-id="1817" data-id="17561" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/alsace-region/"><span data-dcnode-id="1818" instrument_node="">tensions between Prussia (Germany) and France</span></a><span data-dcnode-id="1816" instrument_node=""> were as high as they ever were. War was on the horizon, so </span><a data-dcnode-id="1814" data-id="90628" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/emperor-napoleon-iii/"><span data-dcnode-id="1815" instrument_node="">Emperor Napoleon III</span></a><span data-dcnode-id="1813" instrument_node=""> of France (the nephew of Napoleon Bonaparte) offered a prize to anyone who could make a satisfactory butter alternative, suitable for use by the military and the poor.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">First made in France in 1869, it was created as a butter substitute by Hippolyte Mège-Mouriès from beef tallow for the armed forces and lower classes. </span></p><span data-dcnode-id="1808" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1807" style="height:100px"></div><span data-dcnode-id="1806" instrument_node="">
</span><h2 data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">20. Etch-A-Sketch&nbsp;by&nbsp;André Cassagnes – 1950s</span></h2><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1802" instrument_node="">The Etch-A-Sketch toy was invented in the late 1950s by André Cassagnes, an electrician who named the toy </span><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">L’Écran Magique</span></em><span data-dcnode-id="1799" instrument_node=""> (The Magic Screen).</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">The inside surface of the glass screen is coated with&nbsp;aluminium&nbsp;powder, which is then scraped off by a movable stylus, leaving a dark line on the light gray screen. The left control moves the stylus horizontally, the right one vertically, and moving both at the same time made the lines diagonal. </span></p><span data-dcnode-id="1794" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1777"><figure class="aligncenter size-large is-resized" data-dcnode-id="1778"><picture class="wp-image-57627" data-dcnode-id="1788" title="52 Famous French Inventors and their Inventions 11"><span data-dcnode-id="1793" instrument_node="">
</span><source data-dcnode-id="1792" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/07/etchasketch.jpeg.webp 1000w, https://snippetsofparis.com/wp-content/uploads/2021/07/etchasketch-300x300.jpeg.webp 300w, https://snippetsofparis.com/wp-content/uploads/2021/07/etchasketch-151x151.jpeg.webp 151w, https://snippetsofparis.com/wp-content/uploads/2021/07/etchasketch-768x768.jpeg.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20500'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1791" instrument_node="">

</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">In 1959, he took his drawing toy to the International Toy Fair in Nuremberg, Germany. It was eventually picked up by toy producers and renamed renamed as the Etch A Sketch, becoming one of the most popular toys in the world.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1772" style="height:100px"></div><span data-dcnode-id="1771" instrument_node="">
</span><h2 data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">21. Sewing machine by Barthélemy Thimonnier – 1830</span></h2><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">While earlier patents for a sewing machine were issued in 1755 to Charles Fredrick Wiesenthal, the first practical and widely used sewing machine was invented by Barthélemy Thimonnier, a French tailor, in 1829. </span></p><span data-dcnode-id="1765" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1748"><figure class="aligncenter size-large is-resized" data-dcnode-id="1749"><picture class="wp-image-57632" data-dcnode-id="1759" title="52 Famous French Inventors and their Inventions 12"><span data-dcnode-id="1764" instrument_node="">

</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">His machine sewed straight seams using chain stitch. In 1830, he got a patent and opened the first machine-based manufacturing company in the world to create army uniforms for the French Army. </span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">However, the workers were angry and the factory was burned down, (</span><a data-dcnode-id="1741" data-id="9878" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/protests-in-france/"><span data-dcnode-id="1742" instrument_node="">the French do like to protest</span></a><span data-dcnode-id="1740" instrument_node="">) reportedly by workers fearful of being replaced by a machine. </span></p><span data-dcnode-id="1738" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1737" style="height:100px"></div><span data-dcnode-id="1736" instrument_node="">
</span><h2 data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">22. Jeu de Paume (Tennis) by King François I – 1527s</span></h2><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1732" instrument_node="">Jeu de Paume was the ancestor to modern tennis, as we know it today. It was a royal sport, officialized by </span><a data-dcnode-id="1730" data-id="91512" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/francis-i-france/"><span data-dcnode-id="1731" instrument_node="">French King François I</span></a><span data-dcnode-id="1729" instrument_node=""> in 1527.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1716"><figure class="aligncenter size-full is-resized" data-dcnode-id="1717"><picture class="wp-image-79006" data-dcnode-id="1721" title="52 Famous French Inventors and their Inventions 13"><span data-dcnode-id="1726" instrument_node="">
</span><source data-dcnode-id="1725" data-lazy-sizes="(max-width: 250px) 100vw, 250px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Tennis-racket.jpg.webp 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Tennis-racket-300x225.jpg.webp 300w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20250%20188'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1724" instrument_node="">

&lt;img src="https://snippetsofparis.com/wp-content/uploads/2021/11/Tennis-racket.jpg" alt="tennis racket" width="250" height="188" srcset="https://snippetsofparis.com/wp-content/uploads/2021/11/Tennis-racket.jpg 500w, https://snippetsofparis.com/wp-content/uploads/2021/11/Tennis-racket-300x225.jpg 300w" sizes="(max-width: 250px) 100vw, 250px"/&gt;
&lt;/picture&gt;
</span></noscript></figure></div><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1714" instrument_node="">In the earliest versions of the game, the players hit the ball with their hands. </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Jeu de paume</span></em><span data-dcnode-id="1711" instrument_node=""> literally means “palm game”. In time, gloves replaced bare hands, then paddle-like bats, and finally racquets. </span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">Today, tennis remains one of the </span><a data-dcnode-id="1706" data-id="46839" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/sports-france/"><span data-dcnode-id="1707" instrument_node="">most popular sports in France</span></a><span data-dcnode-id="1705" instrument_node="">, with the Grand Slam French Open (Roland Garros) taking place annually in summer. </span></p><span data-dcnode-id="1703" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1702" style="height:100px"></div><span data-dcnode-id="1701" instrument_node="">
</span><h2 data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">23. Bicycle with pedals by Pierre Michaux and Pierre Lallement – 1860s</span></h2><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">The “dandy horse” was the first bicycle invented in 1817, but it did not have pedals. It was rather like a toddler bike is today, where the rider pushes the vehicle with their feet while steering the front wheel.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1677"><figure class="aligncenter size-large is-resized" data-dcnode-id="1678"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/bicycle-poster/" rel="sponsored noopener noreferrer" target="_blank"><picture class="wp-image-28297" data-dcnode-id="1689" title="52 Famous French Inventors and their Inventions 14"><span data-dcnode-id="1694" instrument_node="">
</span><source data-dcnode-id="1693" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5.jpg.webp 800w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-300x300.jpg.webp 300w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-151x151.jpg.webp 151w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-768x768.jpg.webp 768w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20600%20600'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1692" instrument_node="">

</span></picture><span data-dcnode-id="1688" instrument_node="">

&lt;source type="image/webp" srcset="https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5.jpg.webp 800w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-300x300.jpg.webp 300w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-151x151.jpg.webp 151w, https://snippetsofparis.com/wp-content/uploads/2020/09/black-frame-mockup-portrait-5-768x768.jpg.webp 768w" sizes="(max-width: 600px) 100vw, 600px"/&gt;

</span></noscript></a><figcaption data-dcnode-id="1679"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Shop Now:</span></strong><span data-dcnode-id="1682" instrument_node=""> </span><a data-dcnode-id="1680" data-id="https://snippetsofparis.com/find/bicycle-poster/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/bicycle-poster/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1681" instrument_node="">Antique Bicycle | Photography Print</span></a></figcaption></figure></div><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">In the early 1860s, Frenchmen Pierre Michaux and Pierre Lallement added a mechanical crank drive with pedals on an enlarged front wheel.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node="">In 1869, bicycle wheels with wire spokes were patented by Eugène Meyer of Paris. The French </span><em data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">vélocipède</span></em><span data-dcnode-id="1669" instrument_node=""> made of iron and wood, developed into the “penny-farthing” with one giant wheel in the front and one small one at the back. </span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">It would become obsolete after the invention of the modern bicycle with wheels that are more even, but the pedal power concept remains. </span></p><span data-dcnode-id="1664" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1663" style="height:100px"></div><span data-dcnode-id="1662" instrument_node="">
</span><h2 data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">24. Aspirin by Charles Frédéric Gerhardt – 1853</span></h2><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">In 1853, chemist Charles Frédéric Gerhardt treated sodium salicylate with acetyl chloride to produce acetylsalicylic acid for the first time. By 1899, the German company Bayer adjusted the formula and sold the drug under the brand name “Aspirin”. </span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">The name stuck, with the copyright eventually giving way to the generic medecine “aspirin”. With billions of pills sold annually, it is notably on the&nbsp;</span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WHO_Model_List_of_Essential_Medicines" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1654" instrument_node="">World Health Organization’s List of Essential Medicines</span></a><span data-dcnode-id="1652" instrument_node="">.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1649" style="height:100px"></div><span data-dcnode-id="1648" instrument_node="">
</span><h2 data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">25. Calculator by Blaise Pascal – 1640</span></h2><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">In 1640, a teenager named Blaise Pascal was co-opted into his father’s office as tax collector in the city of </span><a data-dcnode-id="1642" data-id="49926" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/rouen/"><span data-dcnode-id="1643" instrument_node="">Rouen</span></a><span data-dcnode-id="1641" instrument_node="">. Pascal was a child prodigy, and having been forced to manually work on tediously detailed calculations, he came up the mechanical calculator. </span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">He designed the machine to add and subtract two numbers directly and to perform multiplication and division through repeated addition or subtraction.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Pascal’s calculator was especially successful in the design of its&nbsp;carry mechanism, which adds 1 to 9 on one dial, and carries 1 to the next dial when the first dial changes from 9 to 0. Each digit was independent, allowing multiple carries to quickly add up. The machine was initially called the Pascaline.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1632" instrument_node="">As </span><a data-dcnode-id="1630" data-id="https://en.wikipedia.org/wiki/Blaise_Pascal" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blaise_Pascal" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1631" instrument_node="">Pascal</span></a><span data-dcnode-id="1629" instrument_node=""> grew into adulthood, he would go on to work on various mathematical concepts like probability theory and geometry, as well as gain fame as a philosopher and physicist. </span></p><span data-dcnode-id="1627" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1626" style="height:100px"></div><span data-dcnode-id="1625" instrument_node="">
</span><h2 data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">26. Little Black Dress by Coco Chanel – 1920</span></h2><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">After World War I, people wanted to let loose. The roaring 1920s would see corsets being banished and complicated dresses pushed to the back of the closet. </span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">In 1926 Gabrielle “Coco” Chanel, the French couturier, published a picture of a short, simple black dress in American Vogue. It was calf-length and straight, and a revolution in terms of women’s clothing. </span></p><span data-dcnode-id="1616" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1600"><figure class="aligncenter size-large is-resized" data-dcnode-id="1601"><picture class="wp-image-57621" data-dcnode-id="1610" title="52 Famous French Inventors and their Inventions 15"><span data-dcnode-id="1615" instrument_node="">

</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">The simple design made it accessible for women of all social classes, while still being chic and attractive. The legend of the little black dress (and Coco Chanel) was born. </span></p><span data-dcnode-id="1596" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1595" style="height:100px"></div><span data-dcnode-id="1594" instrument_node="">
</span><h2 data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">27. Pétanque by Paul Courtieu – 1920s</span></h2><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1590" instrument_node="">A sport that is not very popular outside of France, but is a mainstay in Provence is </span><a data-dcnode-id="1588" data-id="10954" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/petanque/"><span data-dcnode-id="1589" instrument_node="">pétanque</span></a><span data-dcnode-id="1587" instrument_node="">. </span></p><span data-dcnode-id="1585" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1569"><picture class="wp-image-30052" data-dcnode-id="1579" title="52 Famous French Inventors and their Inventions 16"><span data-dcnode-id="1584" instrument_node="">

</span><p data-dcnode-id="1554"><span data-dcnode-id="1567" instrument_node="">A variation of lawn bowls and the Italian game of bocce, pétanque originated in&nbsp;</span><a data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/P%25C3%25A9tanque" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1566" instrument_node="">1907</span></a><span data-dcnode-id="1564" instrument_node="">&nbsp;or 1910 in&nbsp;</span><a data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/la-ciotat/"><span data-dcnode-id="1563" instrument_node="">La Ciotat</span></a><span data-dcnode-id="1561" instrument_node="">&nbsp;(a beach city near </span><a data-dcnode-id="1559" data-id="10220" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/things-to-do-marseille/"><span data-dcnode-id="1560" instrument_node="">Marseille</span></a><span data-dcnode-id="1558" instrument_node="">), in&nbsp;</span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/category/travel-france/provence/"><span data-dcnode-id="1557" instrument_node="">Provence</span></a><span data-dcnode-id="1555" instrument_node="">. </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">However the previous balls were wooden and hollow, it was Frenchman Paul Courtieu who came up with the idea of heavy metal balls to control the speed and precision. </span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1549" instrument_node="">Pétanque has become so popular as a&nbsp;</span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/sports-france/"><span data-dcnode-id="1548" instrument_node="">sport</span></a><span data-dcnode-id="1546" instrument_node="">, there are leagues of players and competitions are carried live on sports tv channels. Today, it is as well-loved as bowling in the U.S. or curling in Canada. You can read more about </span><a data-dcnode-id="1544" data-id="10954" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/petanque/"><span data-dcnode-id="1545" instrument_node="">pétanque and its rules</span></a><span data-dcnode-id="1543" instrument_node=""> here. </span></p><span data-dcnode-id="1541" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1540" style="height:100px"></div><span data-dcnode-id="1539" instrument_node="">
</span><h2 data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">28. Mathematical theories by Pierre-Simon Laplace – 1749-1827</span></h2><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">The English may have had Isaac Newton, but the French had Pierre-Simon Laplace (around 100 years after Newton). He was a French scholar whose work was important to the development of engineering, mathematics, statistics, physics, astronomy, and philosophy.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">He had several mathematical theories that he was named after, including:</span></p><span data-dcnode-id="1530" instrument_node="">
</span><ul data-dcnode-id="1493"><li data-dcnode-id="1526"><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace%2527s_equation" rel="noopener" target="_blank"><span data-dcnode-id="1529" instrument_node="">Laplace’s equation</span></a><span data-dcnode-id="1527" instrument_node="">,</span></li><li data-dcnode-id="1522"><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_operator" rel="noopener" target="_blank"><span data-dcnode-id="1525" instrument_node="">Laplace operator</span></a><span data-dcnode-id="1523" instrument_node="">,&nbsp;</span></li><li data-dcnode-id="1519"><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_transform" rel="noopener" target="_blank"><span data-dcnode-id="1521" instrument_node="">Laplace transform</span></a></li><li data-dcnode-id="1516"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_distribution" rel="noopener" target="_blank"><span data-dcnode-id="1518" instrument_node="">Laplace distribution</span></a></li><li data-dcnode-id="1513"><a data-dcnode-id="1514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace%2527s_demon" rel="noopener" target="_blank"><span data-dcnode-id="1515" instrument_node="">Laplace’s demon</span></a></li><li data-dcnode-id="1510"><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_expansion" rel="noopener" target="_blank"><span data-dcnode-id="1512" instrument_node="">Laplace expansion</span></a></li><li data-dcnode-id="1507"><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young%25E2%2580%2593Laplace_equation" rel="noopener" target="_blank"><span data-dcnode-id="1509" instrument_node="">Young–Laplace equation</span></a></li><li data-dcnode-id="1504"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_number" rel="noopener" target="_blank"><span data-dcnode-id="1506" instrument_node="">Laplace number</span></a></li><li data-dcnode-id="1501"><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_limit" rel="noopener" target="_blank"><span data-dcnode-id="1503" instrument_node="">Laplace limit</span></a></li><li data-dcnode-id="1498"><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_invariant" rel="noopener" target="_blank"><span data-dcnode-id="1500" instrument_node="">Laplace invariant</span></a></li><li data-dcnode-id="1494"><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laplace_principle_%28large_deviations_theory%29" rel="noopener" target="_blank"><span data-dcnode-id="1497" instrument_node="">Laplace principle</span></a><span data-dcnode-id="1495" instrument_node=""> </span></li></ul><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Laplace is remembered as one of the greatest scientists of all time, exploring theories of the solar system, tidal waves, and more. He was awarded the title of Marquis in 1817. </span></p><span data-dcnode-id="1489" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1488" style="height:100px"></div><span data-dcnode-id="1487" instrument_node="">
</span><h2 data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">29. Bikini by Louis Réard – 1946</span></h2><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">Louis Réard was an automotive engineer who took over his mother’s lingerie business in about 1940. While on the beaches of </span><a data-dcnode-id="1481" data-id="25937" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/saint-tropez/"><span data-dcnode-id="1482" instrument_node="">Saint Tropez</span></a><span data-dcnode-id="1480" instrument_node=""> beaches, he noticed women rolling up the edges of their swimsuits to get a better tan, and came up with a swimsuit with the midriff exposed.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">After WWII ended, a swimsuit competition began. In May 1946, another Frenchman Jacques Heim produced a two-piece swimsuit that he named the “Atome” (after the atom bomb). </span></p><span data-dcnode-id="1475" instrument_node="">

</span></noscript><figcaption data-dcnode-id="1461"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Shop Now: </span></strong><a class="thirstylink" data-dcnode-id="1462" data-shortcode="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//snippetsofparis.com/find/striped-bikini/" rel="sponsored" target="_blank" title="striped bikini"><span data-dcnode-id="1463" instrument_node="">Striped bikini</span></a></figcaption></figure></div><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Réard quickly produced his own swimsuit design which was a string bikini consisting of four triangles made from only 30 square inches (194 cm2) of fabric printed with a newspaper pattern. He had to hire a nude dancer to model it, as none of his regular models agreed to wear it. </span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">He introduced his new swimsuit, to the media in Paris in 1946 at Piscine Molitor. It was named after the first test of a nuclear weapon at the </span><a data-dcnode-id="1452" data-id="https://en.wikipedia.org/wiki/Bikini_Atoll" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bikini_Atoll" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1453" instrument_node="">Bikini Atoll</span></a><span data-dcnode-id="1451" instrument_node="">. </span></p><span data-dcnode-id="1449" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="1448" style="height:100px"></div><span data-dcnode-id="1447" instrument_node="">
</span><h2 data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">30. Champagne by Dom Pérignon – 1600s</span></h2><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Sparkling wines have been produced in France as early as the days of the Roman Empire. The oldest recorded sparkling wine is Blanquette de Limoux, which was invented by Benedictine monks in the Abbey of Saint-Hilaire, near Carcassonne in 1531.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1430"><figure class="aligncenter size-large is-resized" data-dcnode-id="1431"><picture class="wp-image-6248" data-dcnode-id="1435" title="52 Famous French Inventors and their Inventions 18"><span data-dcnode-id="1440" instrument_node="">
</span><source data-dcnode-id="1439" data-lazy-sizes="(max-width: 375px) 100vw, 375px" data-lazy-srcset="https://snippetsofparis.com/wp-content/uploads/2019/01/Untitled-30.jpg.webp 750w, https://snippetsofparis.com/wp-content/uploads/2019/01/Untitled-30-151x151.jpg.webp 151w, https://snippetsofparis.com/wp-content/uploads/2019/01/Untitled-30-300x300.jpg.webp 300w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20375%20375'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="1438" instrument_node="">
