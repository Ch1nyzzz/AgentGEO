</span></div><div class="et_pb_module et_pb_text et_pb_text_1 et_pb_text_align_left et_pb_bg_layout_dark et_had_animation" data-dcnode-id="1755" style=""><span data-dcnode-id="1763" instrument_node="">

</span><p data-dcnode-id="1758" style="font-size: 16px;"><span data-dcnode-id="1759" instrument_node="">by Barbara Hogg</span></p></div><span data-dcnode-id="1756" instrument_node="">
</span></div><span data-dcnode-id="1754" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_2 et_pb_column_1 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1743"><span data-dcnode-id="1752" instrument_node="">

</span><span class="et_pb_image_wrap" data-dcnode-id="1747"><img alt="" class="wp-image-2867 entered lazyloaded" data-dcnode-id="1750" data-lazy-sizes="(max-width: 405px) 100vw, 405px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png 405w, https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers-243x300.png 243w" data-ll-status="loaded" height="500" sizes="(max-width: 405px) 100vw, 405px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png&amp;raw" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png 405w, https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers-243x300.png 243w" title="" width="405"><noscript data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">&lt;img width="405" height="500" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png" alt="" title="" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers.png 405w, https://letsgetsciencey.com/wp-content/uploads/2019/07/famous-female-engineers-243x300.png 243w" sizes="(max-width: 405px) 100vw, 405px" class="wp-image-2867" /&gt;</span></noscript></span><span data-dcnode-id="1746" instrument_node="">

</span><div class="et_pb_row et_pb_row_1 et_pb_gutters1" data-dcnode-id="1694"><span data-dcnode-id="1735" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_2 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1696"><span data-dcnode-id="1734" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1725"><span data-dcnode-id="1733" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1727"><h2 data-dcnode-id="1728" style="text-align: left;"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" style="color: #00a99c;"><span data-dcnode-id="1732" instrument_node="">When we think about famous female engineers, we think about many women in science who changed the world as we know it. They were part of the revolution that also altered society’s perception of what women could or could not do. These ladies made a huge difference for every one of us, so let’s learn more about them and their achievements!</span><br data-dcnode-id="1731"></span></strong></h2></div><span data-dcnode-id="1726" instrument_node="">
</span></div><div class="et_pb_module et_pb_divider et_pb_divider_0 et_pb_divider_position_center et_pb_space" data-dcnode-id="1723"><div class="et_pb_divider_internal" data-dcnode-id="1724"></div></div><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1698"><span data-dcnode-id="1722" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1700"><p data-dcnode-id="1714"><span data-dcnode-id="1715" style="color: #000000;"><span data-dcnode-id="1721" instrument_node="">As recently as the past century, society believed that women could not understand machinery at any capacity. Well, the society said a lot of things about women in medicine as well, but just as our </span><strong data-dcnode-id="1717"><span data-dcnode-id="1718" style="color: #000080;"><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/famous-female-doctors/" style="color: #000080;"><span data-dcnode-id="1720" instrument_node="">famous female doctors</span></a></span></strong><span data-dcnode-id="1716" instrument_node=""> proved, many do not know what they are talking about. </span></span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" style="color: #000000;"><span data-dcnode-id="1712" instrument_node="">The female inventors we are going to present you with today fought their entire careers to prove the world wrong and boy, are we glad they did!</span><br data-dcnode-id="1711"></span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" style="color: #000000;"><span data-dcnode-id="1707" instrument_node="">They stood up for what they believed in and used their success to further others’. They lived extraordinary lives, each with her own captivating story to tell.</span></span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" style="color: #000000;"><span data-dcnode-id="1703" instrument_node="">While most of these famous female scientists and women inventors worked in the 19th and 20th centuries, you will find here a few modern faces as well, because the struggle goes on.</span></span></p></div><span data-dcnode-id="1699" instrument_node="">
</span></div><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_2 et_pb_gutters1" data-dcnode-id="1620"><span data-dcnode-id="1693" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_3 et_pb_animation_top et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et_animated" data-dcnode-id="1632"><span data-dcnode-id="1692" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_4 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1634"><span data-dcnode-id="1691" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1636"><h2 data-dcnode-id="1686" style="text-align: justify;"><span data-dcnode-id="1687" style="color: #000000;"><b data-dcnode-id="1688"><span data-dcnode-id="1690" instrument_node="">1. Margaret E. Knight</span><br data-dcnode-id="1689"></b></span></h2><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" style="color: #000000;"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1680" instrument_node="">
</span><ul data-dcnode-id="1668"><span data-dcnode-id="1679" instrument_node="">
</span><li data-dcnode-id="1675"><span data-dcnode-id="1676" style="color: #000000;"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">The invention of the flat-bottomed paper bag</span></strong></span></li><span data-dcnode-id="1674" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" style="color: #000000;"><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Improvements to the rotary engine</span></strong></span></li><span data-dcnode-id="1669" instrument_node="">
</span></ul><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" style="color: #000000;"><span data-dcnode-id="1666" instrument_node="">Margaret E. Knight is the first name on our list of famous female engineers and for all the right reasons. </span><strong data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">She was a famous female inventor in the 1800s, amassing over 26 patents in her lifetime and establishing the Eastern Paper Bag company.</span></strong></span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" style="color: #000000;"><span data-dcnode-id="1660" instrument_node="">While working in a cotton mill, she witnessed a horrible accident: a shuttle broke loose and impaled a co-worker. It was a common issue with mills, and within a few weeks, Knight had devised a way to prevent this from happening again.</span></span></p><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" style="color: #000000;"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Despite not ever receiving a patent, the invention was so successful that other mills in the area adopted the practice. Margaret never saw a profit from her achievement but did save countless workers’ lives, many of them children.</span></strong></span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" style="color: #000000;"><span data-dcnode-id="1651" instrument_node="">In her late twenties, Knight relocated from New Hampshire to Massachusetts and worked for a paper bag company. Within a year, she identified how to improve the paper bag and invented the machine to do it.</span></span></p><span data-dcnode-id="1648" instrument_node="">
</span><ul data-dcnode-id="1641"><span data-dcnode-id="1647" instrument_node="">
</span><li data-dcnode-id="1643"><strong data-dcnode-id="1644"><span data-dcnode-id="1645" style="color: #000000;"><span data-dcnode-id="1646" instrument_node="">Knight created the first flat bottomed paper bag that we still use today and made a machine to fold and glue the base. It may not seem like a big deal now, but in the 1800s, it was huge! Everyone used paper bags, and her machine not only made the production more manageable but also considerably faster.</span></span></strong></li><span data-dcnode-id="1642" instrument_node="">
</span></ul><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" style="color: #000000;"><span data-dcnode-id="1639" instrument_node="">Margaret had made a wooden prototype within six months and then moved on to designing an iron model of the machine. To do this, she consulted with a local machinist and then moved to Boston to collaborate with two others in the field.</span></span></p></div><span data-dcnode-id="1635" instrument_node="">
</span></div><span data-dcnode-id="1633" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_4 et_pb_animation_bottom et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child et_animated" data-dcnode-id="1622"><span data-dcnode-id="1631" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_1" data-dcnode-id="1624"><span data-dcnode-id="1630" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1626"><img alt="Famous female doctors_Gertrude B. Elion" class="wp-image-2869 entered lazyloaded" data-dcnode-id="1629" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight-216x300.jpg 216w" data-ll-status="loaded" height="694" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg&amp;raw" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight-216x300.jpg 216w" title="Doctor Gertrude B. Elion" width="500"><noscript data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">&lt;img width="500" height="694" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg" alt="Famous female doctors_Gertrude B. Elion" title="Doctor Gertrude B. Elion" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/Margaret-E-Knight-216x300.jpg 216w" sizes="(max-width: 500px) 100vw, 500px" class="wp-image-2869" /&gt;</span></noscript></span><span data-dcnode-id="1625" instrument_node="">
</span></div><span data-dcnode-id="1623" instrument_node="">
</span></div><span data-dcnode-id="1621" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_3 et_pb_gutters1" data-dcnode-id="1583"><span data-dcnode-id="1619" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_5 et_pb_animation_top et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child et_animated" data-dcnode-id="1585"><span data-dcnode-id="1618" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1587"><span data-dcnode-id="1617" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1589"><p data-dcnode-id="1612"><span data-dcnode-id="1613" style="color: #000000;"><span data-dcnode-id="1616" instrument_node="">While working in Boston, she met with a man called Charles Anan, who admired the ingenuity of her prototype. </span><strong data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">When Knight completed the project, she applied for a patent and discovered that Charles Anan had already received a patent for the same machine.</span></strong></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" style="color: #000000;"><span data-dcnode-id="1610" instrument_node="">Knight filed a patent inference lawsuit, which she rightfully won, and she went on to create the Eastern Paper Bag Company with a business partner.</span></span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1605" style="color: #000000;"><span data-dcnode-id="1606" instrument_node="">She faced plenty of prejudice from many people due to her being a female inventor and engineer. No one believed that a woman could understand machines, let alone invent them.</span></span></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" style="color: #000000;"><span data-dcnode-id="1602" instrument_node="">This was Charles Anan’s court defense as to why he was the rightful owner of the patent. The prejudice lasted her whole life, and she often encountered problems with disrespectful employees doubting her abilities.</span></span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" style="color: #000000;"><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Margaret never let this hold her back but dedicated her entire life to inventing a wide range of different machines that made an impact on the way that many industries operate today</span></strong><span data-dcnode-id="1596" instrument_node="">.</span></span></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" style="color: #000000;"><span data-dcnode-id="1592" instrument_node="">A New York Times article about famous female engineers and inventors from 1913 praised her a lot. At the time she was in her seventies and tirelessly working on improvements to rotary engines. That’s dedication! She has rightfully received acclaim as one of the most prominent inventors of all times.</span></span></p></div><span data-dcnode-id="1588" instrument_node="">
</span></div><span data-dcnode-id="1586" instrument_node="">
</span></div><span data-dcnode-id="1584" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_4 et_pb_gutters1" data-dcnode-id="1511"><span data-dcnode-id="1582" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_6 et_pb_animation_top et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et_animated" data-dcnode-id="1523"><span data-dcnode-id="1581" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_6 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1525"><span data-dcnode-id="1580" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1527"><h2 data-dcnode-id="1575" style="text-align: justify;"><span data-dcnode-id="1576" style="color: #000000;"><b data-dcnode-id="1577"><span data-dcnode-id="1579" instrument_node="">2. Ada Lovelace</span><br data-dcnode-id="1578"></b></span></h2><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" style="color: #000000;"><strong data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1569" instrument_node="">
</span><ul data-dcnode-id="1562"><span data-dcnode-id="1568" instrument_node="">
</span><li data-dcnode-id="1564"><span data-dcnode-id="1565" style="color: #000000;"><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">First to recognize the potential of the Analytical Engine as a computer-like device</span></strong></span></li><span data-dcnode-id="1563" instrument_node="">
</span></ul><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" style="color: #000000;"><span data-dcnode-id="1560" instrument_node="">Ada Lovelace was a 19th-century mathematician who we now know as the first computer programmer. That’s right! A computer programmer in the 1800s, over 100 years before the computer as we know it had even been invented!</span></span></p><span data-dcnode-id="1557" instrument_node="">
</span><ul data-dcnode-id="1550"><span data-dcnode-id="1556" instrument_node="">
</span><li data-dcnode-id="1552"><strong data-dcnode-id="1553"><span data-dcnode-id="1554" style="color: #000000;"><span data-dcnode-id="1555" instrument_node="">Lovelace is not credited with any inventions but was a forward-thinking genius worthy of the fame she received.</span></span></strong></li><span data-dcnode-id="1551" instrument_node="">
</span></ul><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" style="color: #000000;"><span data-dcnode-id="1548" instrument_node="">As we all know, she was Lord Byron’s only legitimate child. The renowned poet deserted her and her mother when Ada was just five weeks old. Bitter and resentful, her mother pushed Ada to pursue mathematics and logic to keep her away from poetry or artistic interests.</span></span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" style="color: #000000;"><span data-dcnode-id="1544" instrument_node="">This, coupled with severe illnesses in early childhood, which left her paralyzed or bedridden for years, is considered to have shaped her fascination for mathematics and science.</span></span></p><span data-dcnode-id="1541" instrument_node="">
</span><ul data-dcnode-id="1534"><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1536"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" style="color: #000000;"><span data-dcnode-id="1539" instrument_node="">As a child, Ada dreamed of flying and decided to investigate how this would be possible by studying bird wing anatomy. She even hypothesized the use of steam propulsion.</span></span></strong></li><span data-dcnode-id="1535" instrument_node="">
</span></ul><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1528" style="text-align: justify;"><span data-dcnode-id="1529" style="color: #000000;"><span data-dcnode-id="1532" instrument_node="">When Lovelace was a young lady, she met Charles Babbage, a mathematician, and mechanical engineer. Babbage was working on the Analytical Engine, the first mechanical computer. </span><strong data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Ada became obsessed with the device and would investigate the machine, working with Babbage as much as she could.</span></strong></span></p></div><span data-dcnode-id="1526" instrument_node="">
</span></div><span data-dcnode-id="1524" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_7 et_pb_animation_bottom et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child et_animated" data-dcnode-id="1513"><span data-dcnode-id="1522" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_2" data-dcnode-id="1515"><span data-dcnode-id="1521" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1517"><img alt="Famous female doctors_Gertrude B. Elion" class="wp-image-2870 entered lazyloaded" data-dcnode-id="1520" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace-276x300.jpg 276w" data-ll-status="loaded" height="544" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg&amp;raw" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace-276x300.jpg 276w" title="Doctor Gertrude B. Elion" width="500"><noscript data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">&lt;img width="500" height="544" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg" alt="Famous female doctors_Gertrude B. Elion" title="Doctor Gertrude B. Elion" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ada-lovelace-276x300.jpg 276w" sizes="(max-width: 500px) 100vw, 500px" class="wp-image-2870" /&gt;</span></noscript></span><span data-dcnode-id="1516" instrument_node="">
</span></div><span data-dcnode-id="1514" instrument_node="">
</span></div><span data-dcnode-id="1512" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_5 et_pb_gutters1" data-dcnode-id="1479"><span data-dcnode-id="1510" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_8 et_pb_animation_top et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child et_animated" data-dcnode-id="1481"><span data-dcnode-id="1509" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1483"><span data-dcnode-id="1508" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1485"><p data-dcnode-id="1504"><span data-dcnode-id="1506" style="color: #000000;"><span data-dcnode-id="1507" instrument_node="">The Analytical Engine gained attention, and in 1840, Babbage gave a presentation at the University of Turin. Lovelace was tasked with the English translation of the papers and decided to include her notes and her theories to its use</span></span><span data-dcnode-id="1505" instrument_node="">.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><ul data-dcnode-id="1496"><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1498"><span data-dcnode-id="1499" style="color: #000000;"><strong data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Until this point, the engine had only been considered for mathematic and analytical purposes. Lovelace saw beyond.</span></strong></span></li><span data-dcnode-id="1497" instrument_node="">
</span></ul><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" style="color: #000000;"><span data-dcnode-id="1494" instrument_node="">There is some debate to how much Lovelace was responsible for the machine’s true capabilities, as some argued that Babbage had created programs to use the Analytical Engine in a similar way years before Lovelace partnered with him.</span></span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" style="color: #000000;"><span data-dcnode-id="1490" instrument_node="">Others believe that she was only responsible for furthering the publicity of the machine and contributed nothing to its development. However, </span><strong data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">most think that Babbage was unable to see the true potential of his work, and the true visionary was Lovelace herself.</span></strong></span></p></div><span data-dcnode-id="1484" instrument_node="">
</span></div><span data-dcnode-id="1482" instrument_node="">
</span></div><span data-dcnode-id="1480" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_6 et_pb_gutters1" data-dcnode-id="1399"><span data-dcnode-id="1478" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_9 et_pb_animation_top et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et_animated" data-dcnode-id="1411"><span data-dcnode-id="1477" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_8 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1413"><span data-dcnode-id="1476" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1415"><h2 data-dcnode-id="1471" style="text-align: justify;"><span data-dcnode-id="1472" style="color: #000000;"><b data-dcnode-id="1473"><span data-dcnode-id="1475" instrument_node="">3. Ellen Ochoa</span><br data-dcnode-id="1474"></b></span></h2><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" style="color: #000000;"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1465" instrument_node="">
</span><ul data-dcnode-id="1453"><span data-dcnode-id="1464" instrument_node="">
</span><li data-dcnode-id="1460"><span data-dcnode-id="1461" style="color: #000000;"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">First Hispanic female to travel to space</span></strong></span></li><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1455"><span data-dcnode-id="1456" style="color: #000000;"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Three patents in optical equipment</span></strong></span></li><span data-dcnode-id="1454" instrument_node="">
</span></ul><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" style="color: #000000;"><span data-dcnode-id="1451" instrument_node="">Dr. Ellen Ochoa is an American astronaut who was </span><strong data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">the first Hispanic female to reach space</span></strong><span data-dcnode-id="1448" instrument_node="">. She has an </span><strong data-dcnode-id="1444"><span data-dcnode-id="1445" style="color: #000080;"><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/centers/johnson/about/people/orgs/bios/ochoa.html" rel="noopener noreferrer" style="color: #000080;" target="_blank"><span data-dcnode-id="1447" instrument_node="">impressive career within NASA</span></a></span></strong><span data-dcnode-id="1443" instrument_node=""> and is today one of the most famous female engineers in our contemporary world.</span></span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" style="color: #000000;"><span data-dcnode-id="1439" instrument_node="">She started as a research engineer in 1988, before climbing the ranks to hold prestigious positions, such as director of flight crew operations, deputy center director and even Director of the Johnson Space Centre.</span></span></p><span data-dcnode-id="1436" instrument_node="">
</span><ul data-dcnode-id="1424"><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1431"><strong data-dcnode-id="1432"><span data-dcnode-id="1433" style="color: #000000;"><span data-dcnode-id="1434" instrument_node="">In 1990, she was selected to become an astronaut, going on to serve in 4 space missions, and clocking in at almost 1000 hours in space.</span></span></strong></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1426"><strong data-dcnode-id="1427"><span data-dcnode-id="1428" style="color: #000000;"><span data-dcnode-id="1429" instrument_node="">She even operated a robotic arm to transfer supplies and equipment from the shuttle to the International Space Station.</span></span></strong></li><span data-dcnode-id="1425" instrument_node="">
</span></ul><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" style="color: #000000;"><span data-dcnode-id="1422" instrument_node="">She is also a gifted inventor, co-developing three patents on optical equipment, which get better quality images and more precise information from further into space than were previously able.</span></span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" style="color: #000000;"><span data-dcnode-id="1418" instrument_node="">We are very proud to be contemporaries with one of the most famous female engineers in the world and a, most of all, with a woman that made critical contributions to space understanding and explorations.&nbsp;</span></span></p></div><span data-dcnode-id="1414" instrument_node="">
</span></div><span data-dcnode-id="1412" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_10 et_pb_animation_bottom et-animated et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child et_animated" data-dcnode-id="1401"><span data-dcnode-id="1410" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_3" data-dcnode-id="1403"><span data-dcnode-id="1409" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1405"><img alt="Famous female doctors_gerty cory" class="wp-image-2871 entered lazyloaded" data-dcnode-id="1408" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa-240x300.jpeg 240w" data-ll-status="loaded" height="625" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg&amp;raw" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa-240x300.jpeg 240w" title="Doctor Gerty Cori" width="500"><noscript data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&lt;img width="500" height="625" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg" alt="Famous female doctors_gerty cory" title="Doctor Gerty Cori" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa.jpeg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/ellen-ochoa-240x300.jpeg 240w" sizes="(max-width: 500px) 100vw, 500px" class="wp-image-2871" /&gt;</span></noscript></span><span data-dcnode-id="1404" instrument_node="">
</span></div><span data-dcnode-id="1402" instrument_node="">
</span></div><span data-dcnode-id="1400" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_7 et_pb_gutters1" data-dcnode-id="1370"><span data-dcnode-id="1398" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_11 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1372"><span data-dcnode-id="1397" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_9 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1374"><span data-dcnode-id="1396" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1376"><p data-dcnode-id="1393"><span data-dcnode-id="1394" style="color: #000000;"><span data-dcnode-id="1395" instrument_node="">Her contributions to the NASA missions and advancement of space technology has led to her receiving many awards, including NASA’s highest honor, the Distinguished Service Medal.</span></span></p><span data-dcnode-id="1392" instrument_node="">
</span><ul data-dcnode-id="1385"><span data-dcnode-id="1391" instrument_node="">
</span><li data-dcnode-id="1387"><strong data-dcnode-id="1388"><span data-dcnode-id="1389" style="color: #000000;"><span data-dcnode-id="1390" instrument_node="">She has had six schools named after her, and she received even the Presidential Distinguished Rank Award from the federal government for senior executives.</span></span></strong></li><span data-dcnode-id="1386" instrument_node="">
</span></ul><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" style="color: #000000;"><span data-dcnode-id="1383" instrument_node="">Ochoa strives to advance the science around the world for the benefit of all of humankind. A fellow of the American Association for the Advancement of Science, she serves on several boards, including chairing the Nomination Evaluation Committee for the National Medal of Technology and Innovation.</span></span></p><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" style="color: #000000;"><span data-dcnode-id="1379" instrument_node="">Despite having all of this under her belt, Ochoa somehow found time to learn to fly planes, play the classical flute, and raise two sons with her husband, Coe Milles.</span></span></p></div><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span></div><span data-dcnode-id="1371" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_8 et_pb_gutters1" data-dcnode-id="1289"><span data-dcnode-id="1369" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_12 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1301"><span data-dcnode-id="1368" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_10 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1303"><span data-dcnode-id="1367" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1305"><h2 data-dcnode-id="1362" style="text-align: left;"><span data-dcnode-id="1363" style="color: #000000;"><b data-dcnode-id="1364"><span data-dcnode-id="1366" instrument_node="">4. Hedy Lamarr</span><br data-dcnode-id="1365"></b></span></h2><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" style="color: #000000;"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1356" instrument_node="">
</span><ul data-dcnode-id="1344"><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1351"><span data-dcnode-id="1352" style="color: #000000;"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Frequency hopping invention</span></strong></span></li><span data-dcnode-id="1350" instrument_node="">
</span><li data-dcnode-id="1346" style="font-weight: 400;"><span data-dcnode-id="1347" style="color: #000000;"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Improvements to plane aerodynamics</span></strong></span></li><span data-dcnode-id="1345" instrument_node="">
</span></ul><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" style="color: #000000;"><span data-dcnode-id="1342" instrument_node="">Hedy Lamarr made history with her femme fatale persona on the big screen, working with stars like Clark Gable and Spencer Tracy. But, along with being a starlet, she was also a thriving female inventor.</span></span></p><span data-dcnode-id="1339" instrument_node="">
</span><ul data-dcnode-id="1327"><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1334"><span data-dcnode-id="1335" style="color: #000000;"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">She devised a method of encrypting signals to prevent enemy spies listening to sensitive information, the underlying method of how we use Wi-Fi today.</span></strong></span></li><span data-dcnode-id="1333" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" style="color: #000000;"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Without Hedy Lamarr, there would be no wireless communication in our modern world.</span></strong></span></li><span data-dcnode-id="1328" instrument_node="">
</span></ul><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" style="color: #000000;"><span data-dcnode-id="1325" instrument_node="">Born Hedwig Eva Maria Kiesler in 1914 Austria, she was an intelligent child who was encouraged by her father to question the world and how things worked.&nbsp;</span></span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1320" style="color: #000000;"><span data-dcnode-id="1321" instrument_node="">In 1933, she married Friedrich Fritz Mandl, a munitions manufacturer who only wanted Lamarr as arm candy, the perfect wife who should be seen and not heard</span></span><span data-dcnode-id="1319" instrument_node="">.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" style="color: #000000;"><span data-dcnode-id="1316" instrument_node="">He was an incredibly jealous man who prevented her from pursuing any career. He forbade her to act, and he tried (unsuccessfully) to have some of her work removed from existence.</span></span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1311" style="color: #000000;"><span data-dcnode-id="1312" instrument_node="">How did a movie diva become one of the most famous female engineers of all times?</span></span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" style="color: #000000;"><span data-dcnode-id="1308" instrument_node="">Well, Hedy would often be present at Mandl’s business meetings with other scientists and used this time to absorb knowledge on military technology. The toxic relationship between Lamarr and her husband didn’t last long; she eventually escaped from their castle home and fled to London.</span></span></p></div><span data-dcnode-id="1304" instrument_node="">
</span></div><span data-dcnode-id="1302" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_13 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1291"><span data-dcnode-id="1300" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_4" data-dcnode-id="1293"><span data-dcnode-id="1299" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1295"><img alt="Famous female doctors_Helen B. Taussig" class="wp-image-2874" data-dcnode-id="1298" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr.png" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr.png 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr-199x300.png 199w" height="604" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20604'%3E%3C/svg%3E" title="Doctor Helen Brooke Taussig" width="400"><noscript data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">&lt;img width="400" height="604" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr.png" alt="Famous female doctors_Helen B. Taussig" title="Doctor Helen Brooke Taussig" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr.png 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/hedy-lamarr-199x300.png 199w" sizes="(max-width: 400px) 100vw, 400px" class="wp-image-2874" /&gt;</span></noscript></span><span data-dcnode-id="1294" instrument_node="">
</span></div><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_9 et_pb_gutters1" data-dcnode-id="1246"><span data-dcnode-id="1288" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_14 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1248"><span data-dcnode-id="1287" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_11 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1250"><span data-dcnode-id="1286" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1252"><p data-dcnode-id="1283"><span data-dcnode-id="1284" style="color: #000000;"><span data-dcnode-id="1285" instrument_node="">Once considered “world’s most beautiful woman,” Hedy had to fight against her fame because no one took her seriously in the scientific community.</span></span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" style="color: #000000;"><span data-dcnode-id="1281" instrument_node="">During World War II, Lamarr did not enjoy being in Hollywood during such tremendous human devastation. Together with her friend George Antheil she teamed up to see what they could do.</span></span></p><span data-dcnode-id="1278" instrument_node="">
</span><ul data-dcnode-id="1261"><span data-dcnode-id="1277" instrument_node="">
</span><li data-dcnode-id="1273"><strong data-dcnode-id="1274"><span data-dcnode-id="1275" style="color: #000000;"><span data-dcnode-id="1276" instrument_node="">They found that a common issue in military defense was the enemy hijacking their torpedoes; this meant that the enemy could reroute or disable their security.</span></span></strong></li><span data-dcnode-id="1272" instrument_node="">
</span><li data-dcnode-id="1268"><strong data-dcnode-id="1269"><span data-dcnode-id="1270" style="color: #000000;"><span data-dcnode-id="1271" instrument_node="">Lamar and Antheil invented a way for the command signal to jump around on different radio frequencies, preventing anyone from being able to follow and control it.</span></span></strong></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1263"><strong data-dcnode-id="1264"><span data-dcnode-id="1265" style="color: #000000;"><span data-dcnode-id="1266" instrument_node="">It also served as a mean of a secret communication method that it was hard to spy. They patented their invention, but the Navy did not use her work at the time.</span></span></strong></li><span data-dcnode-id="1262" instrument_node="">
</span></ul><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" style="color: #000000;"><span data-dcnode-id="1259" instrument_node="">Although dismissed for a while, we use wireless communications in industries delivering our G.P.S., Bluetooth, and Wi-Fi.</span></span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" style="color: #000000;"><span data-dcnode-id="1255" instrument_node="">Unfortunately, neither Lamar nor Antheil ever saw a penny from the use of their technology, as the patent had expired by the time of its implementation.</span></span></p></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_10 et_pb_gutters1" data-dcnode-id="1169"><span data-dcnode-id="1245" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_15 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1181"><span data-dcnode-id="1244" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_12 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1183"><span data-dcnode-id="1243" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1185"><h2 data-dcnode-id="1238" style="text-align: justify;"><span data-dcnode-id="1239" style="color: #000000;"><strong data-dcnode-id="1240"><span data-dcnode-id="1242" instrument_node="">5. Katharine Burr Blodgett</span><br data-dcnode-id="1241"></strong></span></h2><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" style="color: #000000;"><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1232" instrument_node="">
</span><ul data-dcnode-id="1220"><span data-dcnode-id="1231" instrument_node="">
</span><li data-dcnode-id="1227"><strong data-dcnode-id="1228"><span data-dcnode-id="1229" style="color: #000000;"><span data-dcnode-id="1230" instrument_node="">The first woman to receive a Ph.D. in physics from Cambridge University</span></span></strong></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1222"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" style="color: #000000;"><span data-dcnode-id="1225" instrument_node="">Advanced glass lens technology, revolutionizing everything from glasses to telescopes and cameras</span></span></strong></li><span data-dcnode-id="1221" instrument_node="">
</span></ul><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" style="color: #000000;"><span data-dcnode-id="1218" instrument_node="">Katharine Burr Blodgett was a famous female inventor in the field of molecular engineering, working with monomolecular coatings. It led to improvements in everything from eyeglasses to the camera on your phone.</span></span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" style="color: #000000;"><span data-dcnode-id="1214" instrument_node="">Blodgett was born in 1898, the daughter of a famous patent attorney for General Electric, who was tragically killed in a burglary while she was a child. After some time living with her mother in France, she returned to New York and attended Rayson School, receiving a higher quality of education than others of the time.</span></span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" style="color: #000000;"><span data-dcnode-id="1210" instrument_node="">She showed a gift for physics and mathematics, going on to earn her Bachelor’s degree at Bryn Mawr College and a masters degree from the University of Chicago. She then became the first woman in history to receive a Ph.D. in physics from Cambridge University.</span></span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1205" style="color: #000000;"><span data-dcnode-id="1206" instrument_node="">Blodgett worked at the General Electric research lab with Irving Langmuir, a former co-worker of her father. Together they developed films that were only a few molecules thick and outlined their potential uses</span></span><span data-dcnode-id="1204" instrument_node="">.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><ul data-dcnode-id="1190"><span data-dcnode-id="1201" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" style="color: #000000;"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node=""> After applying several films of barium to the glass, she dramatically reduced the amount of light that would reflect from it.</span></strong></span></li><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1192"><span data-dcnode-id="1193" style="color: #000000;"><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Blodgett later applied this to eyeglasses, creating nonreflective lenses and also improving the lenses used for cinematography.</span></strong></span></li><span data-dcnode-id="1191" instrument_node="">
</span></ul><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" style="color: #000000;"><span data-dcnode-id="1188" instrument_node="">When it comes to famous female engineers and some of the most revered women inventors in the world, Blodgett’s name will still shine bright for generations.</span></span></p></div><span data-dcnode-id="1184" instrument_node="">
</span></div><span data-dcnode-id="1182" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_16 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1171"><span data-dcnode-id="1180" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_5" data-dcnode-id="1173"><span data-dcnode-id="1179" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1175"><img alt="most influential women in history_Elisabeth Kubler Ross" class="wp-image-2875" data-dcnode-id="1178" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett-239x300.jpg 239w" height="628" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20628'%3E%3C/svg%3E" title="Doctor Elisabeth Kubler Ross" width="500"><noscript data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">&lt;img width="500" height="628" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett.jpg" alt="most influential women in history_Elisabeth Kubler Ross" title="Doctor Elisabeth Kubler Ross" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/katharine-blodgett-239x300.jpg 239w" sizes="(max-width: 500px) 100vw, 500px" class="wp-image-2875" /&gt;</span></noscript></span><span data-dcnode-id="1174" instrument_node="">
</span></div><span data-dcnode-id="1172" instrument_node="">
</span></div><span data-dcnode-id="1170" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_11 et_pb_gutters1" data-dcnode-id="1115"><span data-dcnode-id="1168" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_17 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1117"><span data-dcnode-id="1167" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_13 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1119"><span data-dcnode-id="1166" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1121"><p data-dcnode-id="1163"><span data-dcnode-id="1164" style="color: #000000;"><span data-dcnode-id="1165" instrument_node="">During the war-torn times of the early 20th century, Blodgett helped advance military technology, using her research in the monomolecular coating to aid in the war effort – helping create more effective smokescreens to allow soldiers to cover better their advance or retreat.</span></span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" style="color: #000000;"><span data-dcnode-id="1161" instrument_node="">In 1963, Blodgett retired from General Electric, but we still use her finding today. Blodgett’s research had a massive impact on the modern world, leading to the development of hydrophobic coatings for almost any item imaginable:</span></span></p><span data-dcnode-id="1158" instrument_node="">
</span><ul data-dcnode-id="1136"><span data-dcnode-id="1157" instrument_node="">
</span><li data-dcnode-id="1153"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" style="color: #000000;"><span data-dcnode-id="1156" instrument_node="">non-scratch camera lenses and glasses,</span></span></strong></li><span data-dcnode-id="1152" instrument_node="">
</span><li data-dcnode-id="1148"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" style="color: #000000;"><span data-dcnode-id="1151" instrument_node="">better telescope lenses,</span></span></strong></li><span data-dcnode-id="1147" instrument_node="">
</span><li data-dcnode-id="1143"><strong data-dcnode-id="1144"><span data-dcnode-id="1145" style="color: #000000;"><span data-dcnode-id="1146" instrument_node="">non-reflective store windows,</span></span></strong></li><span data-dcnode-id="1142" instrument_node="">
</span><li data-dcnode-id="1138"><strong data-dcnode-id="1139"><span data-dcnode-id="1140" style="color: #000000;"><span data-dcnode-id="1141" instrument_node="">and weather balloon technology, to name a few.</span></span></strong></li><span data-dcnode-id="1137" instrument_node="">
</span></ul><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" style="color: #000000;"><span data-dcnode-id="1134" instrument_node="">So, next time you use your </span><strong data-dcnode-id="1130"><span data-dcnode-id="1131" style="color: #000080;"><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/best-telescopes-for-beginners/" rel="noopener noreferrer" style="color: #000080;" target="_blank"><span data-dcnode-id="1133" instrument_node="">telescope for beginners</span></a></span></strong><span data-dcnode-id="1129" instrument_node=""> to see those Saturn rings or pick your </span><strong data-dcnode-id="1125"><span data-dcnode-id="1126" style="color: #000080;"><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/best-binoculars-for-astronomy/" rel="noopener noreferrer" style="color: #000080;" target="_blank"><span data-dcnode-id="1128" instrument_node="">astronomy binoculars</span></a></span></strong><span data-dcnode-id="1124" instrument_node=""> to gaze at the Moon, give thanks to Katharine Blodgett.</span></span></p></div><span data-dcnode-id="1120" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_12 et_pb_gutters1" data-dcnode-id="1043"><span data-dcnode-id="1114" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_18 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="1055"><span data-dcnode-id="1113" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_14 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1057"><span data-dcnode-id="1112" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1059"><h2 data-dcnode-id="1107" style="text-align: justify;"><span data-dcnode-id="1108" style="color: #000000;"><strong data-dcnode-id="1109"><span data-dcnode-id="1111" instrument_node="">6. Edith Clarke</span><br data-dcnode-id="1110"></strong></span></h2><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" style="color: #000000;"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="1101" instrument_node="">
</span><ul data-dcnode-id="1088"><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1095" style="font-weight: 400;"><span data-dcnode-id="1096" style="color: #000000;"><strong data-dcnode-id="1097"><span data-dcnode-id="1099" instrument_node="">First female engineer</span><br data-dcnode-id="1098"></strong></span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" style="color: #000000;"><strong data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Created the Clarke calculator for graphing electrical properties</span></strong></span></li><span data-dcnode-id="1089" instrument_node="">
</span></ul><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" style="color: #000000;"><span data-dcnode-id="1086" instrument_node="">Edith Clarke has quite a few “first female” badges to wear honorably, but we have to mention, among her already impressive collection of accomplishments, that she also invented the Clarke calculator, used to graph out electrical properties.</span></span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" style="color: #000000;"><span data-dcnode-id="1082" instrument_node="">Edith was born in 1883 and became orphan at a young age. She used her inheritance to attend college and study mathematics and astronomy.</span></span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" style="color: #000000;"><span data-dcnode-id="1078" instrument_node="">After college, she had a few teaching jobs before going to the University of Wisconsin to be a civil engineer. After some time, she dropped out to work at AT&amp;T and collaborate with George Campbell studying long-distance electrical transmission.</span></span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" style="color: #000000;"><span data-dcnode-id="1074" instrument_node="">While working at AT&amp;T, she studied to get her electrical engineering degree. Edith later enrolled with the Massachusetts Institute of Technology, and within a year she was the first female to graduate with a master’s in electrical engineering from MIT.</span></span></p><span data-dcnode-id="1071" instrument_node="">
</span><ul data-dcnode-id="1064"><span data-dcnode-id="1070" instrument_node="">
</span><li data-dcnode-id="1066"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" style="color: #000000;"><span data-dcnode-id="1069" instrument_node="">After graduation, she created the Clarke calculator, a device that deals with mathematical problems relating to electricity.</span></span></strong></li><span data-dcnode-id="1065" instrument_node="">
</span></ul><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" style="color: #000000;"><span data-dcnode-id="1062" instrument_node="">People solved these calculations manually, so her invention saved a lot of time and effort.</span></span></p></div><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_19 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1045"><span data-dcnode-id="1054" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_6" data-dcnode-id="1047"><span data-dcnode-id="1053" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="1049"><img alt="Famous female doctors_Audrey Evans" class="wp-image-2876" data-dcnode-id="1052" data-lazy-sizes="(max-width: 500px) 100vw, 500px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke-245x300.jpg 245w" height="611" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20500%20611'%3E%3C/svg%3E" title="Doctor Audrey Evans" width="500"><noscript data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">&lt;img width="500" height="611" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke.jpg" alt="Famous female doctors_Audrey Evans" title="Doctor Audrey Evans" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke.jpg 500w, https://letsgetsciencey.com/wp-content/uploads/2019/07/edith-clarke-245x300.jpg 245w" sizes="(max-width: 500px) 100vw, 500px" class="wp-image-2876" /&gt;</span></noscript></span><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_13 et_pb_gutters1" data-dcnode-id="1018"><span data-dcnode-id="1042" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_20 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="1020"><span data-dcnode-id="1041" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_15 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="1022"><span data-dcnode-id="1040" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="1024"><p data-dcnode-id="1037"><span data-dcnode-id="1038" style="color: #000000;"><span data-dcnode-id="1039" instrument_node="">Clarke found it hard to earn a job as an engineer due to her being female. She had tried to become an engineer at General Electric, where she worked as a computer supervisor, but they would not allow it.</span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="color: #000000;"><span data-dcnode-id="1035" instrument_node="">She eventually left General Electric and took a teaching position elsewhere. The following year, General Electric hired her back, making her their first female engineer.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" style="color: #000000;"><span data-dcnode-id="1031" instrument_node="">Her accomplishments don’t just stop here. The American Institute of Electrical Engineers awarded her the Best Regional Paper Prize and the Best National Paper Prize.</span></span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" style="color: #000000;"><span data-dcnode-id="1027" instrument_node="">At the age of 64, she still wasn’t done smashing those records. When she accepted a teaching position at UT Austin, it also made her the first female professor of electrical engineering in America.</span></span></p></div><span data-dcnode-id="1023" instrument_node="">
</span></div><span data-dcnode-id="1021" instrument_node="">
</span></div><span data-dcnode-id="1019" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_14 et_pb_gutters1" data-dcnode-id="932"><span data-dcnode-id="1017" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_21 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="944"><span data-dcnode-id="1016" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_16 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="946"><span data-dcnode-id="1015" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="948"><h2 data-dcnode-id="1010" style="text-align: justify;"><span data-dcnode-id="1011" style="color: #000000;"><b data-dcnode-id="1012"><span data-dcnode-id="1014" instrument_node="">7. Marissa Mayer</span><br data-dcnode-id="1013"></b></span></h2><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" style="color: #000000;"><b data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Achievements: </span></b></span></p><span data-dcnode-id="1004" instrument_node="">
</span><ul data-dcnode-id="992"><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="999" style="font-weight: 400;"><span data-dcnode-id="1000" style="color: #000000;"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">First female engineer to join Google</span></strong></span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="994" style="font-weight: 400;"><span data-dcnode-id="995" style="color: #000000;"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">First female CEO of a Fortune 500 company</span></strong></span></li><span data-dcnode-id="993" instrument_node="">
</span></ul><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" style="color: #000000;"><span data-dcnode-id="990" instrument_node="">Next on our list of famous female engineers and notable women in science and engineering is a name that needs little presentation. However, </span><strong data-dcnode-id="986"><span data-dcnode-id="987" style="color: #000080;"><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/yahoo-marissa-mayer-rise-and-fall-2017-6" rel="noopener noreferrer" style="color: #000080;" target="_blank"><span data-dcnode-id="989" instrument_node="">Marissa Mayer’s story and evolution</span></a></span></strong><span data-dcnode-id="985" instrument_node=""> certainly deserve our praise.</span></span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" style="color: #000000;"><span data-dcnode-id="981" instrument_node="">Marissa Mayer is an American software engineer who was the first female engineer to join Google and went on the be the CEO of Yahoo. She has been an integral part of the design and management of both companies.</span></span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="975"><span data-dcnode-id="976" style="color: #000000;"><span data-dcnode-id="977" instrument_node="">She was in Fortune’s 40 Under 40 and ranked among their most powerful businesswomen in the world. Mayer is now one of the most famous women in science and engineering in our contemporary world.</span></span></strong></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" style="color: #000000;"><span data-dcnode-id="972" instrument_node="">In her youth, she excelled in maths and science, while also keeping a hectic schedule with a near endless list of extracurriculars and a part-time job at her local grocery store.</span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" style="color: #000000;"><span data-dcnode-id="968" instrument_node="">Mayer attended Stanford University and got the Bachelors in symbolic systems and the Masters in computer science. Her specialty was artificial intelligence.</span></span></p><span data-dcnode-id="965" instrument_node="">
</span><ul data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="959"><span data-dcnode-id="960" style="color: #000000;"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">She has several patents in this area, as well as in interface design.</span></strong><span data-dcnode-id="961" instrument_node=""> </span></span></li><span data-dcnode-id="958" instrument_node="">
</span></ul><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" style="color: #000000;"><span data-dcnode-id="955" instrument_node="">After graduation, Mayer had several job offers and declined high paying positions to join the team at Google. She was their 20th member and the first female engineer to join the group.</span></span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" style="color: #000000;"><span data-dcnode-id="951" instrument_node="">Soon enough, she became climbing the ranks, becoming the production manager, director of consumer products and vice president of Google search products.</span></span></p></div><span data-dcnode-id="947" instrument_node="">
</span></div><span data-dcnode-id="945" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_22 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="934"><span data-dcnode-id="943" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_7" data-dcnode-id="936"><span data-dcnode-id="942" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="938"><img alt="Famous female doctors_virginia apgar" class="wp-image-2879" data-dcnode-id="941" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer.jpg 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer-200x300.jpg 200w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20600'%3E%3C/svg%3E" title="Doctor Virginia Apgar" width="400"><noscript data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">&lt;img width="400" height="600" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer.jpg" alt="Famous female doctors_virginia apgar" title="Doctor Virginia Apgar" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer.jpg 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/marissa-mayer-200x300.jpg 200w" sizes="(max-width: 400px) 100vw, 400px" class="wp-image-2879" /&gt;</span></noscript></span><span data-dcnode-id="937" instrument_node="">
</span></div><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_15 et_pb_gutters1" data-dcnode-id="893"><span data-dcnode-id="931" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_23 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="895"><span data-dcnode-id="930" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_17 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="897"><span data-dcnode-id="929" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="899"><p data-dcnode-id="925"><span data-dcnode-id="927" style="color: #000000;"><span data-dcnode-id="928" instrument_node="">Mayer was involved in almost all Google flagship programs and applications over the years</span></span><span data-dcnode-id="926" instrument_node="">.</span></p><span data-dcnode-id="924" instrument_node="">
</span><ul data-dcnode-id="913"><span data-dcnode-id="923" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="916" style="color: #000000;"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node=""> He</span></strong><strong data-dcnode-id="917"><span data-dcnode-id="919" style="color: #000000;"><span data-dcnode-id="920" instrument_node="">r</span></span><span data-dcnode-id="918" instrument_node=""> contributions include the design of the Google homepage, Gmail, Chrome, Google Earth, all of them while she was one of the only three members to develop Google Adwords.</span></strong></span></li><span data-dcnode-id="914" instrument_node="">
</span></ul><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" style="color: #000000;"><span data-dcnode-id="911" instrument_node="">Mayer was offered the position of CEO of Yahoo in 2012, which she accepted. During her time at Yahoo, she became the first female CEO of a Fortune 500 company. Fortune ranked her 6th on their 40 Under 40 list and the 16th most powerful businesswoman in the world.</span></span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" style="color: #000000;"><span data-dcnode-id="907" instrument_node="">Yahoo board members believed that appointing Mayer CEO would revive the declining business. Unfortunately, her efforts did not save the company, and when Verizon bought it in 2007, Mayer resigned from her post.&nbsp;</span></span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" style="color: #000000;"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">After leaving Yahoo, Marissa teamed up with a former colleague and founded Lumi Labs, an incubator for artificial intelligence. She is also a board member in various organizations, from the National Design Museum to the New York Ballet.</span></strong></span></p></div><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span></div><span data-dcnode-id="894" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_16 et_pb_gutters1" data-dcnode-id="819"><span data-dcnode-id="892" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_24 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="831"><span data-dcnode-id="891" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_18 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="833"><span data-dcnode-id="890" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="835"><h2 data-dcnode-id="885" style="text-align: justify;"><span data-dcnode-id="886" style="color: #000000;"><b data-dcnode-id="887"><span data-dcnode-id="889" instrument_node="">8. Emily Warren Roebling</span><br data-dcnode-id="888"></b></span></h2><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="color: #000000;"><span data-dcnode-id="883" instrument_node="">Achievements:</span></span></p><span data-dcnode-id="880" instrument_node="">
</span><ul data-dcnode-id="873"><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="875"><strong data-dcnode-id="876"><span data-dcnode-id="877" style="color: #000000;"><span data-dcnode-id="878" instrument_node="">The construction of the Brooklyn Bridge</span></span></strong></li><span data-dcnode-id="874" instrument_node="">
</span></ul><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" style="color: #000000;"><span data-dcnode-id="871" instrument_node="">Emily Warren Roebling is famous for her part in building the Brooklyn Bridge. One of the most famous female engineers of her times – although she never held such degree – Emily’s story is as inspirational today as it was then.</span><br data-dcnode-id="870"></span></p><span data-dcnode-id="867" instrument_node="">
</span><ul data-dcnode-id="860"><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="862"><strong data-dcnode-id="863"><span data-dcnode-id="864" style="color: #000000;"><span data-dcnode-id="865" instrument_node="">She was an honorary engineer, receiving no formal education, but that didn’t stop her from leaving her mark.</span></span></strong></li><span data-dcnode-id="861" instrument_node="">
</span></ul><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" style="color: #000000;"><span data-dcnode-id="858" instrument_node="">As children, she and her brother strived for the best education that they could get. Her brother went on to become the commanding officer of the V. Corps, while she met her husband, Washington Roebling, at a soldier’s ball.</span></span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" style="color: #000000;"><span data-dcnode-id="854" instrument_node="">Washington was the son of John Roebling, the engineer responsible for designing the Brooklyn Bridge. She had become a regular at the construction site, where she accompanied her husband, and while honeymooning, they both studied underwater construction practices in Europe. Her husband took over as chief engineer when his father suddenly passed.</span></span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" style="color: #000000;"><span data-dcnode-id="850" instrument_node="">Shortly after Washington was appointed chief engineer, he fell ill and became bedridden.</span></span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" style="color: #000000;"><span data-dcnode-id="846" instrument_node="">Emily cared from him at home and relayed information between him and his workers. During this time, Emily dedicated herself to the completion of the Brooklyn Bridge.</span></span></p><span data-dcnode-id="843" instrument_node="">
</span><ul data-dcnode-id="836"><span data-dcnode-id="842" instrument_node="">
</span><li data-dcnode-id="838"><strong data-dcnode-id="839"><span data-dcnode-id="840" style="color: #000000;"><span data-dcnode-id="841" instrument_node="">She excelled so well at managing the day to day operations and site development that most people assumed she was the next chief.</span></span></strong></li><span data-dcnode-id="837" instrument_node="">
</span></ul></div><span data-dcnode-id="834" instrument_node="">
</span></div><span data-dcnode-id="832" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_25 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="821"><span data-dcnode-id="830" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_8" data-dcnode-id="823"><span data-dcnode-id="829" instrument_node="">
