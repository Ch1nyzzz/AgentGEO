</span><span class="et_pb_image_wrap" data-dcnode-id="825"><img alt="famous women in medicine_Ana Aslan" class="wp-image-2880" data-dcnode-id="828" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling.jpg 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling-190x300.jpg 190w" height="632" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20632'%3E%3C/svg%3E" title="Doctor Ana Aslan" width="400"><noscript data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">&lt;img width="400" height="632" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling.jpg" alt="famous women in medicine_Ana Aslan" title="Doctor Ana Aslan" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling.jpg 400w, https://letsgetsciencey.com/wp-content/uploads/2019/07/Roebling-190x300.jpg 190w" sizes="(max-width: 400px) 100vw, 400px" class="wp-image-2880" /&gt;</span></noscript></span><span data-dcnode-id="824" instrument_node="">
</span></div><span data-dcnode-id="822" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_17 et_pb_gutters1" data-dcnode-id="773"><span data-dcnode-id="818" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_26 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="775"><span data-dcnode-id="817" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_19 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="777"><span data-dcnode-id="816" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="779"><p data-dcnode-id="813"><span data-dcnode-id="814" style="color: #000000;"><span data-dcnode-id="815" instrument_node="">In 1882, she appeared before the engineers and politicians’ panel to advocate for her husband to remain in charge, which they granted.</span></span></p><span data-dcnode-id="812" instrument_node="">
</span><ul data-dcnode-id="805"><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="807"><strong data-dcnode-id="808"><span data-dcnode-id="809" style="color: #000000;"><span data-dcnode-id="810" instrument_node=""> Construction ended the following year, and she traveled the first journey across the bridge in a carriage, holding a rooster as a victory sign.</span></span></strong></li><span data-dcnode-id="806" instrument_node="">
</span></ul><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" style="color: #000000;"><span data-dcnode-id="803" instrument_node="">She received praise for her efforts and dedication in Abram S. Hewitt’s speech.</span></span></p><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="788"><span data-dcnode-id="799" instrument_node="">
</span><li data-dcnode-id="795"><strong data-dcnode-id="796"><span data-dcnode-id="797" style="color: #000000;"><span data-dcnode-id="798" instrument_node="">After the completion of the project, Emily dedicated her time to support many women’s causes, such as the Daughters of the American Revolution and the Committee on Statistics of the New Jersey Board of Lady Managers.</span></span></strong></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="790"><strong data-dcnode-id="791"><span data-dcnode-id="792" style="color: #000000;"><span data-dcnode-id="793" instrument_node="">She published an essay titled “A Wife’s Disabilities,” which advocated for women’s rights.</span></span></strong></li><span data-dcnode-id="789" instrument_node="">
</span></ul><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" style="color: #000000;"><span data-dcnode-id="786" instrument_node="">The Brooklyn Bridge recently celebrated its 135th birthday and with it, Emily Roebling’s contributions. The street where she lived with her husband while working on the Brooklyn Bridge received her name as an honor.</span></span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" style="color: #000000;"><span data-dcnode-id="782" instrument_node="">Her obituary appeared in NY Times “overlooked” articles, which is rewriting the obituaries of brilliant people who went unnoticed in their times.</span></span></p></div><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span></div><span data-dcnode-id="774" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_18 et_pb_gutters1" data-dcnode-id="675"><span data-dcnode-id="772" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_27 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="687"><span data-dcnode-id="771" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_20 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="689"><span data-dcnode-id="770" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="691"><h2 data-dcnode-id="765" style="text-align: justify;"><span data-dcnode-id="766" style="color: #000000;"><b data-dcnode-id="767"><span data-dcnode-id="769" instrument_node="">9. Patricia Bath</span><br data-dcnode-id="768"></b></span></h2><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="760"><strong data-dcnode-id="761"><span data-dcnode-id="762" style="color: #000000;"><span data-dcnode-id="763" instrument_node="">Achievements:</span></span></strong></p><span data-dcnode-id="759" instrument_node="">
</span><ul data-dcnode-id="747"><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="754"><span data-dcnode-id="755" style="color: #000000;"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">First African American doctor to receive a medical patent</span></strong></span></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="750" style="color: #000000;"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Developed cutting edge technology in the treatment and removal of cataracts</span></strong></span></li><span data-dcnode-id="748" instrument_node="">
</span></ul><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" style="color: #000000;"><span data-dcnode-id="745" instrument_node="">Patricia Bath is another trailblazer on our list of famous female engineers. An African American inventor in the medical field of ophthalmology, she was the first woman to achieve many things, from the first African American to complete a residency in ophthalmology to the first African American doctor to receive a medical patent.</span></span></p><span data-dcnode-id="742" instrument_node="">
</span><ul data-dcnode-id="732"><span data-dcnode-id="741" instrument_node="">
</span><li data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="736" style="color: #000000;"><span data-dcnode-id="740" instrument_node="">One of the most </span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//letsgetsciencey.com/famous-female-doctors/" style="color: #000000;"><span data-dcnode-id="739" instrument_node="">famous female doctors</span></a><span data-dcnode-id="737" instrument_node=""> and female African American inventors, she reshaped the treatment of cataracts by developing many patents to improve their treatment and removal.</span></span></strong></li><span data-dcnode-id="733" instrument_node="">
</span></ul><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" style="color: #000000;"><span data-dcnode-id="730" instrument_node="">Bath stood out as a bright and intelligent teenager and earned herself a spot in a cancer workshop held by the National Science Foundation.</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" style="color: #000000;"><span data-dcnode-id="726" instrument_node="">While studying there, she received credit in a paper published by the head researcher. Her efforts were acknowledged by the </span><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Mademoiselle </span></em><span data-dcnode-id="723" instrument_node="">magazine, earning her a Merit Award – </span><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">she was only 16 at the time!</span></strong></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" style="color: #000000;"><span data-dcnode-id="717" instrument_node="">After high school, Bath went on to earn her Bachelor’s degree from Hunter College in 1964. While attending university, she established the Students National Medical Association with another student and became the association’s first female president.</span></span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" style="color: #000000;"><span data-dcnode-id="713" instrument_node="">She attended medical school, interning at Harlem Hospital, where she pioneered an eye care team by convincing doctors to operate pro-bono on the project.</span></span></p><span data-dcnode-id="710" instrument_node="">
</span><ul data-dcnode-id="703"><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" style="color: #000000;"><strong data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">She was a member of the group performing Harlem Hospital’s first eye surgery in 1969.</span></strong></span></li><span data-dcnode-id="704" instrument_node="">
</span></ul><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" style="color: #000000;"><span data-dcnode-id="701" instrument_node="">Next, she took a residency at NYU, making her the first African American to complete a residency in ophthalmology. Bath also became NYU’s first female ever to lead an ophthalmology post-graduate program.&nbsp;</span></span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" style="color: #000000;"><span data-dcnode-id="697" instrument_node="">Upon completing her education, Bath received a position at UCLA’s Jules Stein Eye Institute. When she accepted, </span><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">she became their first female member</span></strong><span data-dcnode-id="694" instrument_node="">.</span></span></p></div><span data-dcnode-id="690" instrument_node="">
</span></div><span data-dcnode-id="688" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_28 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="677"><span data-dcnode-id="686" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_9" data-dcnode-id="679"><span data-dcnode-id="685" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="681"><img alt="influential women in history_Rita levi-montalcini" class="wp-image-2881" data-dcnode-id="684" data-lazy-sizes="(max-width: 442px) 100vw, 442px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/bath.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/bath.jpg 442w, https://letsgetsciencey.com/wp-content/uploads/2019/07/bath-236x300.jpg 236w" height="561" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20442%20561'%3E%3C/svg%3E" title="Doctor Rita Levi-Montalcini" width="442"><noscript data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">&lt;img width="442" height="561" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/bath.jpg" alt="influential women in history_Rita levi-montalcini" title="Doctor Rita Levi-Montalcini" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/bath.jpg 442w, https://letsgetsciencey.com/wp-content/uploads/2019/07/bath-236x300.jpg 236w" sizes="(max-width: 442px) 100vw, 442px" class="wp-image-2881" /&gt;</span></noscript></span><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span></div><span data-dcnode-id="676" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_19 et_pb_gutters1" data-dcnode-id="633"><span data-dcnode-id="674" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_29 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="635"><span data-dcnode-id="673" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_21 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="637"><span data-dcnode-id="672" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="639"><p data-dcnode-id="669"><span data-dcnode-id="670" style="color: #000000;"><span data-dcnode-id="671" instrument_node="">She became the assistant chief of their ophthalmology residency program and made it to the chief position within ten years.</span></span></p><span data-dcnode-id="668" instrument_node="">
</span><ul data-dcnode-id="661"><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="663"><strong data-dcnode-id="664"><span data-dcnode-id="665" style="color: #000000;"><span data-dcnode-id="666" instrument_node="">During this time, she was the first African American woman surgeon, established the Ophthalmic Assistant Training Program, co-founded the American Institute for the Prevention of Blindness, and became the first female in America to lead an ophthalmology residency program.</span></span></strong></li><span data-dcnode-id="662" instrument_node="">
</span></ul><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" style="color: #000000;"><span data-dcnode-id="659" instrument_node="">Bath’s next plan of action was to take a leave of absence from UCLA and concentrate on her work.</span></span></p><span data-dcnode-id="656" instrument_node="">
</span><ul data-dcnode-id="644"><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="651"><strong data-dcnode-id="652"><span data-dcnode-id="653" style="color: #000000;"><span data-dcnode-id="654" instrument_node="">She invented the Laser-Phaco Probe, an advancement in the laser technology used to treat cataracts.</span></span></strong></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" style="color: #000000;"><span data-dcnode-id="649" instrument_node="">When she received the patent for the Laser-Phaco Probe in 1988 (and, subsequently, for three other developments to this innovative technology), she became the first African American female doctor to obtain a medical license.</span></span></strong></li><span data-dcnode-id="645" instrument_node="">
</span></ul><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" style="color: #000000;"><span data-dcnode-id="642" instrument_node="">With her ground-breaking technology, she has been able to restore the eyesight of patients who have been unable to see for over thirty years, and, over her career, she has helped countless people.</span></span></p></div><span data-dcnode-id="638" instrument_node="">
</span></div><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_20 et_pb_gutters1" data-dcnode-id="556"><span data-dcnode-id="632" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_30 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="568"><span data-dcnode-id="631" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_22 article-fact et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="570"><span data-dcnode-id="630" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="572"><h2 data-dcnode-id="625" style="text-align: justify;"><span data-dcnode-id="626" style="color: #000000;"><b data-dcnode-id="627"><span data-dcnode-id="629" instrument_node="">10. Beatrix Shilling</span><br data-dcnode-id="628"></b></span></h2><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" style="color: #000000;"><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Achievements:</span></strong></span></p><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="607"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" style="color: #000000;"><strong data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Revolutionized World War II airplane engines</span></strong></span></li><span data-dcnode-id="613" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" style="color: #000000;"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Fastest female race car driver</span></strong></span></li><span data-dcnode-id="608" instrument_node="">
</span></ul><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" style="color: #000000;"><span data-dcnode-id="605" instrument_node="">Beatrix Shilling is one of the famous female engineers of all times. </span><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">She was a British mechanical engineer serving in the Royal Aircraft Establishment (RAE) during World War II.</span></strong></span></p><span data-dcnode-id="600" instrument_node="">
</span><ul data-dcnode-id="593"><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="597" style="color: #000000;"><span data-dcnode-id="598" instrument_node="">She did not only develop a way to allow Spitfire planes to dive while in combat but was also a successful race car driver – holding the title of the fastest female racer.</span></span></strong></li><span data-dcnode-id="594" instrument_node="">
</span></ul><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" style="color: #000000;"><span data-dcnode-id="591" instrument_node="">After leaving school, she became an apprentice at a local electrical engineering company, headed by Margaret Partridge. Partridge was a founder of the Women’s Engineering Society (WES) and an advocate for women in science and engineering.</span></span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" style="color: #000000;"><span data-dcnode-id="587" instrument_node="">She encouraged Shilling to further her education, and WES supplied an interest-free loan to help her study.</span></span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" style="color: #000000;"><span data-dcnode-id="583" instrument_node="">Beatrix gained her Bachelor’s with honors in 1932 and received her Master’s degree the following year. </span><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">While studying for the degree, she accepted a position as a research assistant, where she helped G.F. Mucklow with his work on supercharged engines.</span></strong></span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" style="color: #000000;"><span data-dcnode-id="577" instrument_node="">Shilling joined the RAE at Farnborough as a technical writer, an experimental engineer, and finally, senior technical officer. </span><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">She served her entire career with the RAE, her most notable contribution being “Miss Shilling’s Orifice.”</span></strong></span></p></div><span data-dcnode-id="571" instrument_node="">
</span></div><span data-dcnode-id="569" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_31 et_pb_animation_bottom et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="558"><span data-dcnode-id="567" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_10" data-dcnode-id="560"><span data-dcnode-id="566" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="562"><img alt="influential women in history_Rita levi-montalcini" class="wp-image-2882" data-dcnode-id="565" data-lazy-sizes="(max-width: 394px) 100vw, 394px" data-lazy-src="https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling.jpg" data-lazy-srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling.jpg 394w, https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling-237x300.jpg 237w" height="499" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20394%20499'%3E%3C/svg%3E" title="Doctor Rita Levi-Montalcini" width="394"><noscript data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">&lt;img width="394" height="499" src="https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling.jpg" alt="influential women in history_Rita levi-montalcini" title="Doctor Rita Levi-Montalcini" srcset="https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling.jpg 394w, https://letsgetsciencey.com/wp-content/uploads/2019/07/beatrix-shilling-237x300.jpg 237w" sizes="(max-width: 394px) 100vw, 394px" class="wp-image-2882" /&gt;</span></noscript></span><span data-dcnode-id="561" instrument_node="">
</span></div><span data-dcnode-id="559" instrument_node="">
</span></div><span data-dcnode-id="557" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_21 et_pb_gutters1" data-dcnode-id="527"><span data-dcnode-id="555" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_32 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="529"><span data-dcnode-id="554" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_23 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="531"><span data-dcnode-id="553" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="533"><p data-dcnode-id="550"><span data-dcnode-id="551" style="color: #000000;"><span data-dcnode-id="552" instrument_node="">During the Second World War, British RAF planes were unable to maintain control while driving, as it caused the engines’ carburetors to flood and disengage, problems leading to many pilots dying due to engine failure.</span></span></p><span data-dcnode-id="549" instrument_node="">
</span><ul data-dcnode-id="542"><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" style="color: #000000;"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Beatrix Shilling devised a diaphragm to insert into the engine and prevent Spitfire and Hurricane aircraft from stalling, allowing the crew to operate the planes easier and safer.</span></strong></span></li><span data-dcnode-id="543" instrument_node="">
</span></ul><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" style="color: #000000;"><span data-dcnode-id="540" instrument_node="">While maintaining a successful career, she was also an avid motorcycle racer, modifying her bike herself.</span></span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" style="color: #000000;"><span data-dcnode-id="536" instrument_node=""> She was the second female ever to receive a Brookland’s Gold Star for reaching 100 mph. She broke the record, reaching 106 mph, and thus becoming the fast female racer in the world.</span></span></p></div><span data-dcnode-id="532" instrument_node="">
</span></div><span data-dcnode-id="530" instrument_node="">
</span></div><span data-dcnode-id="528" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_22 et_pb_gutters1" data-dcnode-id="498"><span data-dcnode-id="526" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_33 et_pb_animation_top et-waypoint et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="500"><span data-dcnode-id="525" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_24 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="502"><span data-dcnode-id="524" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="504"><h2 data-dcnode-id="521"><span data-dcnode-id="522" style="color: #000000;"><span data-dcnode-id="523" instrument_node="">Which of These Famous Female Engineers do You Appreciate Most?</span></span></h2><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" style="color: #000000;"><span data-dcnode-id="519" instrument_node="">There we have them, ten famous women in science and engineering!</span></span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" style="color: #000000;"><span data-dcnode-id="515" instrument_node=""> It has been a fascinating journey learning about the lives of these outstanding female engineers who cemented the way for all of us in such a male-dominated field. They never allowed what others thought to stop or even slow them for a second.</span></span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" style="color: #000000;"><span data-dcnode-id="511" instrument_node="">It truly is admirable, and some of these biographies are only the tip of the iceberg. I would encourage you to learn more about them and others like them!</span></span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" style="color: #000000;"><span data-dcnode-id="507" instrument_node="">If you happen to have as a role model one of the famous female engineers on this list, tell us more about her! We also welcome all readers to share with us information and stories about your favorite female inventors and trailblazers!</span></span></p></div><span data-dcnode-id="503" instrument_node="">
</span></div><span data-dcnode-id="501" instrument_node="">
</span></div><span data-dcnode-id="499" instrument_node="">
</span></div><span data-dcnode-id="497" instrument_node="">
</span></div><div class="et_pb_section et_pb_section_2 et_pb_with_background et_section_regular" data-dcnode-id="473"><span data-dcnode-id="495" instrument_node="">
</span><div class="et_pb_row et_pb_row_23" data-dcnode-id="475"><span data-dcnode-id="494" instrument_node="">
