Charles Wheatstone (February 6, 1802–October 19, 1875) was an English natural </span><a data-component="link" data-dcnode-id="1357" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/major-philosophers-4133023"><span data-dcnode-id="1358" instrument_node="">philosopher</span></a><span data-dcnode-id="1356" instrument_node=""> and inventor, perhaps best known today for his contributions to the electric telegraph. However, he invented and contributed in several fields of science, including photography, electrical generators, encryption, acoustics, and musical instruments and theory.
</span></p><span data-dcnode-id="1354" instrument_node="">

Fast Facts: Charles Wheatstone</span></h3><span data-dcnode-id="1338" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1303" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1337" instrument_node="">
</span><ul data-dcnode-id="1304"><li data-dcnode-id="1333"><strong data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Known For: </span></strong><span data-dcnode-id="1334" instrument_node="">Physics experiments and patents applying to sight and sound, including the electric telegraph, the concertina, and the stereoscope</span></li><li data-dcnode-id="1329"><strong data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Born:&nbsp;</span></strong><span data-dcnode-id="1330" instrument_node="">February 6, 1802 at Barnwood, near Gloucester, England</span></li><li data-dcnode-id="1325"><strong data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Parents: </span></strong><span data-dcnode-id="1326" instrument_node="">William and Beata Bubb Wheatstone</span></li><li data-dcnode-id="1321"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Died: </span></strong><span data-dcnode-id="1322" instrument_node="">October 19, 1875 in Paris, France</span></li><li data-dcnode-id="1317"><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Education: </span></strong><span data-dcnode-id="1318" instrument_node="">No formal science education, but excelled in French, math, and physics at&nbsp;Kensington and Vere Street schools, and took an apprenticeship in his uncle's music factory</span></li><li data-dcnode-id="1313"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Awards and Honors:</span></strong><span data-dcnode-id="1314" instrument_node=""> Professor of Experimental Philosophy at King's College, Fellow of the Royal Society in 1837, knighted by Queen Victoria in 1868</span></li><li data-dcnode-id="1309"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Spouse: </span></strong><span data-dcnode-id="1310" instrument_node="">Emma West</span></li><li data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Children: </span></strong><span data-dcnode-id="1306" instrument_node="">Charles Pablo, Arthur William Fredrick, Florence Caroline, Catherine Ada, Angela</span></li></ul></div><span data-dcnode-id="1302" instrument_node="">
</span></div><span data-dcnode-id="1300" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1299" id="toc-early-life"></span><span data-dcnode-id="1298" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1293" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1297" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node=""> Early Life </span></span><span data-dcnode-id="1294" instrument_node=""> </span></h2><span data-dcnode-id="1292" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1290" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1291" instrument_node="">
Charles Wheatstone was born on February 6, 1802, near Gloucester, England. He was the second child born to William (1775–1824) and Beata Bubb Wheatstone, members of a music business family established on the Strand in London at least as early as 1791, and perhaps as early as 1750. William and Beata and their family moved to London in 1806, where William set up shop as a flute teacher and maker; his elder brother Charles Sr. was head of the family business, manufacturing and selling musical instruments.
</span></p><span data-dcnode-id="1289" instrument_node="">

</span><div class="rail-video__title" data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Profile of Lord Charles Cornwallis</span></div><span data-dcnode-id="1017" instrument_node="">
</span></div><span data-dcnode-id="1015" instrument_node="">
</span></div><span data-dcnode-id="1013" instrument_node="">
</span></div></div><span data-dcnode-id="1010" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1008" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1009" instrument_node="">
Charles learned to read at age 4 and was sent to school early at the Kensington Proprietary Grammar School and Vere Street Board School in Westminster, where he excelled in French, math, and physics. In 1816, he was apprenticed to his Uncle Charles, but by the age of 15, his uncle complained that he was neglecting his work at the shop to read, write, publish songs, and pursue an interest in electricity and acoustics.
</span></p><span data-dcnode-id="1007" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="996" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="997" id="mntl-block_6-0"><span data-dcnode-id="1006" instrument_node="">

In 1818, Charles produced his first known </span><a data-component="link" data-dcnode-id="992" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/inventing-musical-instruments-1992156"><span data-dcnode-id="993" instrument_node="">musical instrument</span></a><span data-dcnode-id="991" instrument_node="">, the "flute harmonique," which was a keyed instrument. No examples have survived.
</span></p><span data-dcnode-id="989" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="978" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="979" id="mntl-block_7-0"><span data-dcnode-id="988" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="976" id="toc-early-inventions-and-academics"></span><span data-dcnode-id="975" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="970" id="mntl-sc-block_1-0-10"><span data-dcnode-id="974" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node=""> Early Inventions and Academics </span></span><span data-dcnode-id="971" instrument_node=""> </span></h2><span data-dcnode-id="969" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="967" id="mntl-sc-block_1-0-11"><span data-dcnode-id="968" instrument_node="">
In September 1821, Charles Wheatstone exhibited his Enchanted Lyre or Acoucryptophone&nbsp;at a gallery in a music store, a musical instrument that appeared to play itself to amazed shoppers. The Enchanted Lyre was not a real instrument, but rather a sounding box disguised as a&nbsp;lyre&nbsp;that hung from the ceiling by a thin steel wire. The wire was connected to the soundboards of a piano, harp, or dulcimer played in an upper room, and as those instruments were played, the sound was conducted down the wire, setting off sympathetic resonance of the lyre's strings. Wheatstone speculated publicly that at some time in the future, music might be transmitted in a similar manner throughout London "laid on like gas."
</span></p><span data-dcnode-id="966" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="955" id="mntl-sc-block_1-0-12"><div class="comp mntl-block" data-dcnode-id="956" id="mntl-block_8-0"><span data-dcnode-id="965" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard4-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="958" data-height="600" id="ref-billboard4-sticky-dynamic_2-0" style="height: 600px; top: 2746px;"><span data-dcnode-id="964" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="960" id="mntl-sc-sticky-billboard-ad_10-0"><span data-dcnode-id="963" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="f56ba304b0aa4001be9d9d25fd6a91e9" data-auction-floor-value="105" data-dcnode-id="962" data-pos="btf3" data-priority="6" data-rtb="true" data-sizes="[[300, 250],[300, 600],[300, 253],[250, 250],[200, 200],[180, 150],[4, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard4"></div><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">
</span></div><span data-dcnode-id="957" instrument_node="">
</span></div></div><span data-dcnode-id="954" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="946" id="mntl-sc-block_1-0-13"><span data-dcnode-id="953" instrument_node="">
In 1823 acclaimed Danish scientist Hans Christian Örsted (1777–1851) saw the Enchanted Lyre and convinced Wheatstone to write his first scientific article, "New Experiments in Sound." Örsted presented the paper to the Académie Royale des Sciences in Paris, and it was eventually published in Great Britain in </span><em data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Thomson's Annals of Philosophy.</span></em><span data-dcnode-id="950" instrument_node=""> Wheatstone began his association with the Royal Institution of Great Britain (also known as the Royal Institute, founded in 1799) in the mid-1820s, writing papers to be presented by close friend and RI member </span><a data-component="link" data-dcnode-id="948" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/michael-faraday-inventor-4059933"><span data-dcnode-id="949" instrument_node="">Michael Faraday</span></a><span data-dcnode-id="947" instrument_node=""> (1791–1869) because he was too shy to do it himself.&nbsp;
</span></p><span data-dcnode-id="945" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="934" id="mntl-sc-block_1-0-14"><div class="comp mntl-block" data-dcnode-id="935" id="mntl-block_9-0"><span data-dcnode-id="944" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard5-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="937" data-height="600" id="ref-billboard5-sticky-dynamic_2-0" style="height: 600px; top: 3446px;"><span data-dcnode-id="943" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="939" id="mntl-sc-sticky-billboard-ad_12-0"><span data-dcnode-id="942" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="932" id="toc-early-inventions"></span><span data-dcnode-id="931" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="926" id="mntl-sc-block_1-0-15"><span data-dcnode-id="930" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="928"><span data-dcnode-id="929" instrument_node=""> Early Inventions </span></span><span data-dcnode-id="927" instrument_node=""> </span></h2><span data-dcnode-id="925" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="923" id="mntl-sc-block_1-0-16"><span data-dcnode-id="924" instrument_node="">
Wheatstone had a wide-ranging interest in sound and vision and contributed many inventions and improvements on existing inventions while he was active.
</span></p><span data-dcnode-id="922" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="921" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="920" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="918" id="mntl-sc-block_1-0-18"><span data-dcnode-id="919" instrument_node="">
His first patent (#5803) was for a "Construction of Wind Instruments" on June 19, 1829, describing the use of a flexible bellows. From there, Wheatstone developed the concertina, a bellows-driven, free-reed instrument in which each button produces the same pitch regardless of the way the bellows are moving. The patent was not published until 1844, but Faraday gave a Wheatstone-written lecture demonstrating the instrument to the Royal Institute in 1830.
</span></p><span data-dcnode-id="917" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="906" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="907" id="mntl-block_10-0"><span data-dcnode-id="916" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard6-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="909" data-height="600" id="ref-billboard6-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="915" instrument_node="">

</span></div><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">
</span></div></div><span data-dcnode-id="905" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="904" id="toc-academics-and-professional-life"></span><span data-dcnode-id="903" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="898" id="mntl-sc-block_1-0-20"><span data-dcnode-id="902" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node=""> Academics and Professional Life </span></span><span data-dcnode-id="899" instrument_node=""> </span></h2><span data-dcnode-id="897" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="895" id="mntl-sc-block_1-0-21"><span data-dcnode-id="896" instrument_node="">
Despite his lack of a formal education in science, in 1834 Wheatstone was made a Professor of Experimental Philosophy at King's College, London, where he conducted pioneering experiments in electricity and invented an improved dynamo. He also invented two devices to measure and regulate electrical resistance and current: the Rheostat and an improved version of what is now known as the Wheatstone bridge (it was actually invented by Samuel Hunter Christie&nbsp;in 1833). He held the position at King's College for the remainder of his life, although he continued working in the family business for another 13 years.
</span></p><span data-dcnode-id="894" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="893" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="892" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="887" id="mntl-sc-block_1-0-23"><span data-dcnode-id="891" instrument_node="">
In 1837, Charles Wheatstone partnered with inventor and entrepreneur William Cooke to co-invent an </span><a data-component="link" data-dcnode-id="889" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/the-history-of-the-electric-telegraph-and-telegraphy-1992542"><span data-dcnode-id="890" instrument_node="">electric telegraph</span></a><span data-dcnode-id="888" instrument_node="">, a now-outdated communication system that transmitted electric signals over wires from location to location, signals that could be translated into a message. The Wheatstone-Cooke or needle telegraph was the first working communication system of its kind in Great Britain, and it was put into operation on the London and Blackwall Railway. Wheatstone was elected a Fellow of the Royal Society (FRS) that same year.
</span></p><span data-dcnode-id="886" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="875" id="mntl-sc-block_1-0-24"><div class="comp mntl-block" data-dcnode-id="876" id="mntl-block_11-0"><span data-dcnode-id="885" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard7-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="878" data-height="600" id="ref-billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="884" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="880" id="mntl-sc-sticky-billboard-ad_14-0"><span data-dcnode-id="883" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="daa077095a294d2ca303ee5b1463de4c" data-auction-floor-value="30" data-dcnode-id="882" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[250, 250],[200, 200],[180, 150],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="881" instrument_node="">
</span></div><span data-dcnode-id="879" instrument_node="">
</span></div><span data-dcnode-id="877" instrument_node="">
</span></div></div><span data-dcnode-id="874" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="872" id="mntl-sc-block_1-0-25"><span data-dcnode-id="873" instrument_node="">
Wheatstone invented an early version of the stereoscope in 1838, versions of which became a very popular philosophical toy in the later 19th century. Wheatstone's stereoscope used two slightly different versions of the same image, which when viewed through two separate tubes gave the viewer the optical illusion of depth.
</span></p><span data-dcnode-id="871" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="870" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="869" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="864" id="mntl-sc-block_1-0-27"><span data-dcnode-id="868" instrument_node="">
Throughout his professional life, Wheatstone invented both philosophical toys and </span><a data-component="link" data-dcnode-id="866" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/lab-equipment-and-instruments-4074323"><span data-dcnode-id="867" instrument_node="">scientific instruments</span></a><span data-dcnode-id="865" instrument_node="">, exercising his interests in linguistics, optics, cryptography (the Playfair Cipher), typewriters, and clocks—one of his inventions was the Polar Clock, which told time by polarized light.
</span></p><span data-dcnode-id="863" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="862" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="861" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="860" id="toc-marriage-and-family"></span><span data-dcnode-id="859" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="854" id="mntl-sc-block_1-0-29"><span data-dcnode-id="858" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="856"><span data-dcnode-id="857" instrument_node=""> Marriage and Family </span></span><span data-dcnode-id="855" instrument_node=""> </span></h2><span data-dcnode-id="853" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="851" id="mntl-sc-block_1-0-30"><span data-dcnode-id="852" instrument_node="">
On February 12, 1847, Charles Wheatstone married Emma West, the daughter of a local tradesman, and they eventually had five children. That year he also stopped working in a significant way at the family business to concentrate on his academic research. His wife died in 1866, at which point his youngest daughter Angela was 11 years old.
</span></p><span data-dcnode-id="850" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="849" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="848" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="846" id="mntl-sc-block_1-0-32"><span data-dcnode-id="847" instrument_node="">
Wheatstone gleaned a number of important awards and honors throughout his career. He was elected to the Royal Swedish Academy of Sciences in 1859, made a Foreign Associate of the French Academy of Sciences in 1873, and became an honorary member of the Institution of Civil Engineers in 1875. He was knighted by Queen Victoria in 1868. He was named a Doctor of Civil Law (DCL) at Oxford and a doctor of law (LLD) at Cambridge.
</span></p><span data-dcnode-id="845" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="844" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="843" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="842" id="toc-death-and-legacy"></span><span data-dcnode-id="841" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="836" id="mntl-sc-block_1-0-34"><span data-dcnode-id="840" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node=""> Death and Legacy </span></span><span data-dcnode-id="837" instrument_node=""> </span></h2><span data-dcnode-id="835" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="833" id="mntl-sc-block_1-0-35"><span data-dcnode-id="834" instrument_node="">
Charles Wheatstone was one of the most inventive geniuses of his generation, combining combined science-based publication with business-focused patent applications and serious research with a playful interest in philosophical toys and inventions.
</span></p><span data-dcnode-id="832" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="831" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="830" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="828" id="mntl-sc-block_1-0-37"><span data-dcnode-id="829" instrument_node="">
He died of bronchitis on October 19, 1875, in Paris while he was working on yet another new invention, this one for submarine cables. He is buried in Kensal Green Cemetery near his home in London.
</span></p><span data-dcnode-id="827" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="826" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="825" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="824" id="toc-sources"></span><span data-dcnode-id="823" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="818" id="mntl-sc-block_1-0-39"><span data-dcnode-id="822" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node=""> Sources </span></span><span data-dcnode-id="819" instrument_node=""> </span></h2><span data-dcnode-id="817" instrument_node="">
</span><ul class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="777" id="mntl-sc-block_1-0-40"><span data-dcnode-id="816" instrument_node="">
