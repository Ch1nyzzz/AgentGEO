</span><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Let's get started!</span></p><span data-dcnode-id="3248" instrument_node="">
</span><h2 data-dcnode-id="3245"><strong data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">WHAT IS THE IMPORTANT PART OF A TELESCOPE&nbsp;FOR ASTROPHOTOGRAPHY?</span></strong></h2><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">While some scopes are better suited for planetary views, others perform best with a camera. Here, we'll look at some of the most important parts of a telescope when choosing an astrophotography telescope.</span></p><span data-dcnode-id="3241" instrument_node="">
</span><h3 data-dcnode-id="3238"><strong data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">FOCAL LENGTH</span></strong></h3><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">The focal length of the telescope is the distance from your first lens to the focus point of your camera. For example, a focal length of 1000 mm (40 inches) doesn't necessarily mean your telescope is physically that long. Remember, the focal length is measured internally for your telescope.</span></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3232" style="text-align: center;"><img alt="what is the focal length of a telescope? " data-dcnode-id="3233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/TEC_250_OTA_grande.PNG%3Fv%3D1571770792&amp;raw" style="float: none;"></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Your telescope's focal length determines the magnification it provides, making it a primary factor in deciding what kind of astro-imaging you want to do and what celestial bodies you can capture.</span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">This functions in the same manner as lenses on a standard DSLR camera. Increasing the focal length on your camera lens allows you to "zoom in" on your target.</span></p><span data-dcnode-id="3225" instrument_node="">
</span><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">For reference, wide-field astrophotography setups generally stay at or below 70 mm focal length. Any longer and you’ll start finding some objects difficult to catch in one frame.</span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">The focal length also influences another major factor in all of this, which is the focal ratio.</span></p><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3218" instrument_node="">A long focal length telescope like the Celestron </span><span data-dcnode-id="3214" style="color: #3d85c6;"><strong data-dcnode-id="3215"><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/celestron-cgem-925-edgehd" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3217" instrument_node="">CGEM-II 925 EdgeHD</span></a></strong></span><span data-dcnode-id="3213" instrument_node=""> telescope, provides&nbsp;ideal observation to bright objects such as the Moon, planets, and star clusters.&nbsp;</span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3202"><span data-dcnode-id="3210" instrument_node="">A short focal length telescope like the Meade </span><span data-dcnode-id="3206" style="color: #3d85c6;"><strong data-dcnode-id="3207"><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/meade-lx85-70mm-f-5-petzval-apo-refractor" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3209" instrument_node="">LX85 70 MM Quadruplet APO</span></a></strong></span><span data-dcnode-id="3205" instrument_node="">provides better observations for wider views of the universe&nbsp;like wide-field captures of the Milky Way&nbsp;</span><span data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">or Pleiades.&nbsp;</span></span></p><span data-dcnode-id="3201" instrument_node="">
</span><h3 data-dcnode-id="3198"><strong data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">FOCAL RATIO</span></strong></h3><span data-dcnode-id="3197" instrument_node="">
</span><p data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">If you've ever looked at a photography ad or read an article on cameras, there's a good chance that the focal ratio was involved.</span></p><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">The focal ratio displays as an f-number that looks like f/6.5, the number portion varies wildly.</span></p><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">The f/ measure is what determines whether a scope is "fast" or "slow." Scopes with a low f-number gathers the light coming in more efficiently. So, your camera exposures with a lower number might be 10 seconds instead of the 20 seconds that a higher (slower) focal ratio would need to get the same amount of data (light).</span></p><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Your focal ratio, like in standard photography, is determined by your telescope's focal length and aperture.</span></p><span data-dcnode-id="3185" instrument_node="">
</span><h3 data-dcnode-id="3182"><strong data-dcnode-id="3183"><span data-dcnode-id="3184" instrument_node="">APERTURE</span></strong></h3><span data-dcnode-id="3181" instrument_node="">
</span><p data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">For a moment, think of your telescope as a bucket sitting out in the rain.</span></p><span data-dcnode-id="3178" instrument_node="">
</span><p data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">A bucket with a wide rim inevitably fills faster than one with a small rim because of its smaller diameter.</span></p><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">Now think of light particles as raindrops.</span></p><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">The wide bucket collects rain more quickly than a narrow bucket just as a larger aperture telescope collects light more efficiently than a smaller one.</span></p><span data-dcnode-id="3169" instrument_node="">
</span><p data-dcnode-id="3166" style="text-align: center;"><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/celestron-11-schmidt-cassegrain-ota-with-cge-mount-plate" rel="noopener noreferrer" target="_blank"><img alt="What is the aperture of a telescope?" data-dcnode-id="3168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/Telescope_Aperture_grande.PNG%3Fv%3D1571771278&amp;raw" style="float: none;"></a></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">In terms of fast and slow telescopes mentioned above, a telescope with a larger aperture will generally yield brighter images per shot because more light is coming in while the camera shutter is open. Simple enough, right? This whole concept can get rather complicated and dizzying with more accessories, but that's the basic idea.</span></p><span data-dcnode-id="3162" instrument_node="">
</span><h3 data-dcnode-id="3159"><strong data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">PORTABILITY</span></strong></h3><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3156"><span data-dcnode-id="3157" instrument_node="">The portability of a telescope system often comes as an afterthought for beginners in the hobby.</span></p><span data-dcnode-id="3155" instrument_node="">
</span><p data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Are you keeping this at home? Do you want to bring this out to the desert?</span></p><span data-dcnode-id="3152" instrument_node="">
</span><p data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">Will it fit in your car?</span></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">These are things you’ll need to consider when buying your first telescope.</span></p><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">One system might weigh 30 pounds in total while others might weigh over 100 pounds! Telescope manufacturers understand this, thankfully, so nearly every telescope system disassembles for more comfortable transporting.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><h2 data-dcnode-id="3140"><strong data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">MOUNT</span></strong></h2><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">Are you one that likes to rush out and grab the flashiest thing involved in a new hobby when just getting started? Some of us are guilty of that too, and the telescope tube itself is usually what gets people most excited.</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3135" instrument_node="">Astrophotography has taught us to temper that urge though. When it comes to this hobby, the most crucial piece of your setup is your </span><span data-dcnode-id="3131" style="color: #3d85c6;"><strong data-dcnode-id="3132"><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/telescope-mounts" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Telescope Mounts"><span data-dcnode-id="3134" instrument_node="">mount</span></a></strong></span><span data-dcnode-id="3130" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">That may sound odd, but even if you have the best camera and the best telescope, your images will ultimately look awful with a cheap mount. The most beautiful building will eventually crumble with a faulty foundation, and the same logic applies here.</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3122" style="text-align: center;"><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/meade-lx85-computerized-german-equatorial-telescope-mount" rel="noopener noreferrer" target="_blank"><img alt="What is the mount of a telescope?" data-dcnode-id="3124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/Meade-LX85-Computerized-German-Equatorial-Telescope-Mount_large.jpg%3Fv%3D1571771891&amp;raw" style="float: none;"></a></p><span data-dcnode-id="3121" instrument_node="">
</span><p data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Your mount is responsible for more than just holding everything together. Telescope mounts track the objects we choose in the night sky, among other things, and if the mount has poor tracking or cheap materials, these faults will show in your images and potentially put the rest of your equipment in danger.</span></p><span data-dcnode-id="3118" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3117" instrument_node="">What you’ll need is a computerized—or at least motorized—equatorial </span><strong data-dcnode-id="3113"><span data-dcnode-id="3114" style="color: #3d85c6;"><a data-dcnode-id="3115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/telescope-mounts" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Telescope Mounts"><span data-dcnode-id="3116" instrument_node="">mount</span></a></span></strong><span data-dcnode-id="3112" instrument_node="">&nbsp;that can hold your telescope and camera with no issue. Equatorial mounts are the standard when it comes to astrophotography because, unlike altitude-azimuth mounts that track in a stair-stepping manner, these rotate on a single axis for smooth tracking.</span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3109" instrument_node="">If you plan to travel a lot with your setup portable mounts like the&nbsp;</span><span data-dcnode-id="3105" style="color: #3d85c6;"><strong data-dcnode-id="3106"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/sky-watcher-star-adventurer-pro-pack" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3108" instrument_node="">Star Adventurer</span></a></strong></span><span data-dcnode-id="3104" instrument_node=""> mount is a perfect on-the-go choices.&nbsp;</span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3101" instrument_node="">For heavier equipment mounts like the </span><span data-dcnode-id="3097" style="color: #3d85c6;"><strong data-dcnode-id="3098"><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/celestron-cgx-l-computerized-mount-without-tripod" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3100" instrument_node="">Celestron CGX-L</span></a></strong></span><span data-dcnode-id="3096" instrument_node=""> mount and the </span><span data-dcnode-id="3092" style="color: #3d85c6;"><strong data-dcnode-id="3093"><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/ioptron-cem120" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3095" instrument_node="">iOptron CEM120</span></a></strong></span><span data-dcnode-id="3091" instrument_node=""> mount are ideal for higher&nbsp;payload capacities.</span></p><span data-dcnode-id="3089" instrument_node="">
</span><h2 data-dcnode-id="3086"><strong data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">What is the Best Type of Telescope for Astrophotography?</span></strong></h2><span data-dcnode-id="3085" instrument_node="">
</span><h3 data-dcnode-id="3082"><strong data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">Refracting vs Reflecting Telescopes</span></strong></h3><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">At the basic level, every telescope in the world is an adapted form of a refracting or reflecting telescope.</span></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3074" style="color: #3d85c6;"><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/refracting-telescopes" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Refracting Telescopes"><strong data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node="">Refracting telescopes</span></strong></a></span><span data-dcnode-id="3073" instrument_node=""> are most likely what comes to mind when you think of what a telescope “looks like.” These are the classic tube design that use specialized and extremely precise glass lenses to refract and focus incoming light to a perfect point. Check out the Williams Optics </span><span data-dcnode-id="3069" style="color: #3d85c6;"><strong data-dcnode-id="3070"><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/opt-nightcat-51" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3072" instrument_node="">OPT NightCat 51</span></a></strong></span><span data-dcnode-id="3068" instrument_node=""> and&nbsp;the </span><span data-dcnode-id="3064" style="color: #3d85c6;"><strong data-dcnode-id="3065"><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/meade-lx85-70mm-f-5-petzval-apo-refractor" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3067" instrument_node="">Meade 70mm Quadruplet</span></a></strong></span><span data-dcnode-id="3063" instrument_node=""> for examples.</span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3059" style="text-align: center;"><img alt="the basic telescope types refractor light path diagram animation" data-dcnode-id="3060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/the-basic-telescope-types-refractor-light-path-diagram-animation_ad7ef3e7-f881-45d8-a499-22a60244bcfb_grande.gif%3Fv%3D1501190999&amp;raw"></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3054" style="color: #3d85c6;"><a data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/reflecting-telescopes" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Reflecting Telescopes"><strong data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Reflecting telescopes</span></strong></a></span><span data-dcnode-id="3053" instrument_node=""> have, over the years, varied wildly in style. The most iconic variation of the reflecting telescope is the Dobsonian, which looks like a cannon from old cartoons. Reflectors have 2 or more mirrors that literally reflect light off one another, bringing a focused beam into the eyepiece or camera. To get a better idea of reflecting telescopes, the&nbsp;</span><span data-dcnode-id="3049" style="color: #3d85c6;"><strong data-dcnode-id="3050"><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/tpo-6-f-9-ritchey-chretien-reflecting-ota-telescope" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="3052" instrument_node="">TPO 6-inch Ritchey Chretien telescope</span></a></strong></span><span data-dcnode-id="3048" instrument_node=""> and the </span><span data-dcnode-id="3044" style="color: #3d85c6;"><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/tpo-10-f-4-newtonian-reflecting-ota-telescope" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><strong data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">TPO 10-inch Newtonian</span></strong></a></span><span data-dcnode-id="3043" instrument_node=""> telescope make great picks!</span></p><span data-dcnode-id="3041" instrument_node="">
</span><p data-dcnode-id="3039" style="text-align: center;"><img alt="the basic telescope types reflector light path diagram animation" data-dcnode-id="3040" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/the-basic-telescope-types-reflector-light-path-diagram-animation_56796770-b3fb-4d18-b060-77d451cd2321_grande.gif%3Fv%3D1501191105&amp;raw"></p><span data-dcnode-id="3038" instrument_node="">
</span><h2 data-dcnode-id="3035"><strong data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Which is Better?</span></strong></h2><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Knowing which type of telescope is better is essentially a trick question. Neither is necessarily "better," but rather, each telescope type has its own set of bonuses and challenges and its personality.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3024"><span data-dcnode-id="3030" instrument_node="">Refractor telescopes are historically more widely used for astrophotography than reflectors, but these are also prone to chromatic aberration unless we dip into the higher-end </span><strong data-dcnode-id="3026"><span data-dcnode-id="3027" style="color: #3d85c6;"><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/triplet-refracting-telescopes" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Triplet Refracting Telescopes"><span data-dcnode-id="3029" instrument_node="">“triplet” refractors</span></a></span></strong><span data-dcnode-id="3025" instrument_node="">. The aberration occurs when incoming, varied wavelengths of light reach the focus point at slightly different angles, leading to color fringing that looks like this:</span></p><span data-dcnode-id="3023" instrument_node="">
</span><p data-dcnode-id="3021" style="text-align: center;"><img alt="What is Chromatic Aberration? - Chromatic Aberration Example" data-dcnode-id="3022" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/Chromatic_Aberration_9552ddea-c97e-4f75-afce-730c9f989fe6_grande.png%3Fv%3D1571767729&amp;raw" style="float: none;"></p><span data-dcnode-id="3020" instrument_node="">
</span><p data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">Nonetheless, these are an excellent choice when opting for something more portable, and chromatic aberration will not be an issue for most beginning astronomers.</span></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3016" instrument_node="">Reflector Telescopes have become increasingly popular and seen much innovation over the years with some of the best </span><strong data-dcnode-id="3012"><span data-dcnode-id="3013" style="color: #3d85c6;"><a data-dcnode-id="3014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/astrograph-telescopes" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Astrograph Telescopes"><span data-dcnode-id="3015" instrument_node="">astrophotography telescopes</span></a></span></strong><span data-dcnode-id="3011" instrument_node=""> around being reflectors. While reflectors cannot suffer from chromatic aberration, these are inherently a bit more tedious to maintain and are almost always larger than refractors. But don't let that deter you!</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3001"><span data-dcnode-id="3008" instrument_node="">Each telescope type is wonderful in its own way, but if you want to dive deep into how each works, check out these resources. Our </span><span data-dcnode-id="3003" style="color: #0000ff;"><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/blogs/astronomy/the-basic-telescope-types" rel="noopener noreferrer" style="color: #0000ff;" target="_blank" title="OPT The Basic Telescopes Types"><span data-dcnode-id="3005" style="color: #3d85c6;"><strong data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node="">blog on the basic telescope types</span></strong></span></a></span><span data-dcnode-id="3002" instrument_node=""> or our video below provides excellent information to help you in your ventures.</span></p><span data-dcnode-id="3000" instrument_node="">

</span><h2 data-dcnode-id="2474"><strong data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">What Type of Astrophotography is for You?</span></strong></h2><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">We've got two styles of astrophotography you can choose from, and they're both the right choice: Wide-field and deep-sky astrophotography.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Each is challenging in its own way and require different equipment, but are an incredible experience, and you'll more than likely try both at some point.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><h3 data-dcnode-id="2464"><strong data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">WIDE-FIELD</span></strong></h3><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2462" instrument_node="">Wide-field astrophotography is the most common style you'll see on Instagram or anywhere else. These are the images where the </span><span data-dcnode-id="2458" style="color: #3d85c6;"><strong data-dcnode-id="2459"><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/blogs/astronomy/best-milky-way-photography-equipment" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="2461" instrument_node="">Milky Way</span></a></strong></span><span data-dcnode-id="2457" instrument_node=""> is bursting into shot, streaking across the photo in a glorious display. Most beginners start with this style because it's "easier" and less gear-intensive. A great astrophotography telescope choice is the Williams Opitcs </span><span data-dcnode-id="2453" style="color: #3d85c6;"><strong data-dcnode-id="2454"><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/opt-nightcat-51" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="2456" instrument_node="">OPT NightCat 51</span></a></strong></span><span data-dcnode-id="2452" instrument_node=""> Refractor.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448" style="text-align: center;"><img alt="Delicate Arch Milky Way Galaxy Utah Travis Burke Photography" data-dcnode-id="2449" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/Delicate-Arch-MilkyWay-Galaxy-Utah-TravisBurkePhotography_26e8c93f-9643-4e4a-85f7-6777ebb2a320_grande.jpg%3Fv%3D1571767923&amp;raw" style="float: none;"></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2444" style="text-align: center;"><em data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Photo Credit: Travis Burke</span></em></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">One immediate benefit of wide-field astrophotography is that it's incredibly forgiving. Your mount doesn't need to be perfect, and neither does your technique (but that's no reason to slack off!).&nbsp;</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">You can simply grab a camera, camera mount, and a tripod, and you're ready to go!</span></p><span data-dcnode-id="2437" instrument_node="">
</span><h3 data-dcnode-id="2434"><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">DEEP-SKY</span></strong></h3><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2432" instrument_node="">Deep-sky astrophotography is where things can get tricky (call us if you need help). You've likely seen some deep-sky images around the internet as well, but certainly less than the Milky Way. Deep-sky shots are generally nebulae and galaxies, with two of the most prominent targets being the Orion Nebula and the Andromeda Galaxy. Capturing these images is inherently more difficult when starting. Good choices for deep-sky astrophotography are the&nbsp;</span><span data-dcnode-id="2428" style="color: #3d85c6;"><strong data-dcnode-id="2429"><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/celestron-cgem-ii-800-rasa" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="2431" instrument_node="">Celestron RASA 8</span></a></strong></span><span data-dcnode-id="2427" instrument_node="">, and the </span><span data-dcnode-id="2423" style="color: #3d85c6;"><strong data-dcnode-id="2424"><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/products/planewave-125-cdk-ota" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank"><span data-dcnode-id="2426" instrument_node="">Planewave CDK 12.5-inch</span></a></strong></span><span data-dcnode-id="2422" instrument_node=""> telescope.&nbsp;</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418" style="text-align: center;"><img alt="What is deep sky photography? - Andromeda Galaxy example" data-dcnode-id="2419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/1594/4815/files/Andromeda_Galaxy_3c7e7b90-72a1-4649-8f4c-3884f3dca2d3_grande.jpg%3Fv%3D1571768016&amp;raw" style="float: none;"></p><span data-dcnode-id="2417" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2416" instrument_node="">Some people want to make their </span><strong data-dcnode-id="2412"><span data-dcnode-id="2413" style="color: #3d85c6;"><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/collections/telescope-packages" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="OPT Telescope Packages"><span data-dcnode-id="2415" instrument_node="">imaging system</span></a></span></strong><span data-dcnode-id="2411" instrument_node=""> as complex as possible for the sake of the challenge. Some want a perfectly optimized system for the greatest possible photos or for research data that cannot tolerate errors. Most people just want to put a system together that works well and start taking pictures as soon as possible. Most of us at OPT are in that last category, and we think you’ll enjoy being there too.</span></p><span data-dcnode-id="2409" instrument_node="">
</span><h2 data-dcnode-id="2406"><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Get Your Own Telescope System Started Today</span></strong></h2><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Whether you're totally new to astrophotography or you're an expert in standard photography, we'll help you get started in this new venture!</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2401" instrument_node="">For more information on all of this, check out our </span><strong data-dcnode-id="2397"><span data-dcnode-id="2398" style="color: #3d85c6;"><a data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/pages/astronomy-for-beginners" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="Astronomy for Beginners"><span data-dcnode-id="2400" instrument_node="">Astronomy for Beginners</span></a></span></strong><span data-dcnode-id="2396" instrument_node=""> page!&nbsp;</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386"><span data-dcnode-id="2393" instrument_node="">If you want to get a good grasp on the nitty-gritty of this hobby, we have an in-depth</span><span data-dcnode-id="2388" style="color: #3d85c6;"><strong data-dcnode-id="2389"><span data-dcnode-id="2392" instrument_node=""> </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//optcorp.com/blogs/dslr-astrophotography-101/intro" rel="noopener noreferrer" style="color: #3d85c6;" target="_blank" title="Intro to DSLR Astrophotography"><span data-dcnode-id="2391" instrument_node="">DSLR astrophotography blog</span></a></strong></span><span data-dcnode-id="2387" instrument_node=""> to get you up to speed with wide-field imaging.&nbsp;</span></span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">Stay safe out there, and keep looking up!</span></p></div><span data-dcnode-id="2380" instrument_node=""> </span><div class="social-iconbar" data-dcnode-id="2347"><span data-dcnode-id="2379" instrument_node=""> </span><div class="title" data-dcnode-id="2375"><span data-dcnode-id="2378" instrument_node=""> </span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Like it? Share it</span></p></div><span data-dcnode-id="2374" instrument_node=""> </span><div class="blog_share meta" data-dcnode-id="2348"><span data-dcnode-id="2373" instrument_node=""> </span><div class="share_article" data-dcnode-id="2349"><span data-dcnode-id="2372" instrument_node="">
