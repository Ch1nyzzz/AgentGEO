ap monocular sold on social media with a video that shows clear images of people several miles away while zooming in and out. The video is very shaky to disguise the fact that it is actually several videos spliced together. Obviously the videos were taken with various 2000 Euro scopes and the product my well-meaning mother-in-law bought was not anything like implied in the video. In plain language, she was snookered. (In fact, one scope can not do the range shown in the video with good image quality. It is a total scam and you get a $30 monocular for $60. No, you do not get a $5000 military scope with “amazing advanced BAK4 glass developed at Joe Hopkins University” for $60 like the video says. You didn’t believe you would, did you? Joe Hopkins? Who is that? BAK4? Used since World War II, how could it be a “new” development?)</span></span></p><span data-dcnode-id="5363" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5360" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5361" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5362" instrument_node="">I did nothing to adulterate this image, and it looks pretty much like this to my eye when I use it. If this image looks fine to you, get the 30 Euro binoculars. That said, the image is reasonably clear near the center of the FOV.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="5359" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--none Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/Scams/comments/l0xfir/i_hate_these_ubiquitous_scammy_product/" rel="noopener nofollow" style="box-siz "></div></div><div class="q-box qu-p--medium qu-hover--bg--darken qu-overflow--hidden" data-dcnode-id="5320" style="box-sizing: border-box; width: 100%;" width="100%"><div class="q-flex qu-verticalAlign--middle qu-alignItems--center" data-dcnode-id="5321" style="box-sizing: border-box; display: flex; height: 100%;"><div class="q-box qu-overflow--hidden" data-dcnode-id="5322" style="box-sizing: border-box;"><div class="q-text qu-truncateLines--3 qu-bold qu-color--gray_dark_dim qu-wordBreak--break-word" data-dcnode-id="5332" style="box-sizing: border-box;"><span data-dcnode-id="5333" instrument_node="">The Minefield: Advertising Hype in Binoculars</span></div><div class="q-text qu-dynamicFontSize--small qu-truncateLines--1 qu-color--gray qu-mt--tiny" data-dcnode-id="5330" style="box-sizing: border-box;"><span data-dcnode-id="5331" instrument_node="">The Minefield: Advertising Hype in Binoculars The stuff you really wish you didn't need to know about budget astronomical binoculars So, you are after a binocular for astronomy. You have been advised by well-meaning friends, vendors, and "experts" in astronomy magazines and on internet forums that you can't go far wrong if you opt for something that has "Fully Multi-Coated" (FMC) and "BAK4 prisms" printed on the binocular's cover-plate. This is very much not the case. Let's see why: Well, first of all, there are at least a dozen relevant things that "Fully Multi-Coated" (FMC) and "BAK4 prisms" (or "BaK4 prisms" )tells you exactly nothing about. These include, in no particular order: Quality of internal light-baffling. Type and quality of eyepieces. Prism housings. Field curvature. Spherical aberration. Crispness of focus. Edge distortion. Amount of vignetting. Size of fully illuminated field of view. Chromatic aberration. Mechanical build quality. Smoothness of focus. Manufacturer's quality control. But at least it will tell you about the coatings and the prisms, won't it? Well, no, not really: "Fully Multi-Coated" Multi-coated optics will, if the coating is done properly , transmit more light than single-coated optics. If the coatings are unevenly applied, or if they are evenly applied but are the wrong thicknesses, all bets are off! So, how can you tell? Unevenly-applied coatings can, but do not necessarily, look "blotchy". Without test equipment, you have no way of telling if they are the right thicknesses. Ultimately you are relying on the integrity of the coating process and quality control. You are buying a binocular that is probably costing you less than two reasonably good eyepieces, maybe even less than one: exactly what level of quality control were you expecting? Read what the biggest manufacturer of imported (into Europe) binoculars says: For years, the international markets are flooded with unbelievably low-price Chinese binoculars and some of the users have been complaining or bashing loudly about the quality control consistency of Chinese binoculars for a while.&nbsp;  Actually, it's quite simple to improve the quality consistency: spending much more time in grinding and selecting glass, spending much more time in training the workers for assembling the binoculars,  and spending much more time in the final quality check - then, a much better quality binocular will be made, however, at the trade-off of much higher production cost. There is no industry-wide standard for the term "Fully Multi-Coated". Let me repeat that: There is no industry-wide standard for the term "Fully Multi-Coated" . It could mean that all glass-to-air surfaces of the lenses in the objectives and the eyepieces, and the transmissive faces of the prisms, all have 7 layer interference coatings (properly applied). Or it may mean that just the glass-to-air surfaces of the lenses have 2 layer interference coatings. Unless the manufacturer provides more information, you ha</span></div><div class="q-flex qu-mt--small qu-justifyContent--space-between qu-verticalAlign--middle qu-alignItems--center" data-dcno art" data-dcnode-id="4769" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4774" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4775" instrument_node="">The magnification is</span></span><span data-dcnode-id="4772" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4773" instrument_node=""> only as good </span></span><span data-dcnode-id="4770" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4771" instrument_node="">as the quality of the objective and seeing conditions.</span></span></p><span data-dcnode-id="4768" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4766" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4767" instrument_node="">So…</span></span><span data-dcnode-id="4764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4765" instrument_node="">…</span></span></p><span data-dcnode-id="4762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4755" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4761" instrument_node="">A cheap pair of binoculars might be something like </span></span><span data-dcnode-id="4758" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4759" instrument_node="">20X30. </span></span><span data-dcnode-id="4756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4757" instrument_node="">That might sound impressive, but the 20 power would be virtually unusable because the small objective would lack resolving power, and all you would get is a distorted and blurred image.</span></span></p><span data-dcnode-id="4754" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4751" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4752" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4753" instrument_node="">And….</span></span></p><span data-dcnode-id="4750" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4749" instrument_node="">Since astronomical objects like planets, and especially stars and galaxies, are very, very, very, far away, the goal of an astronomical instrument is to collect as many photons as possible, and for this you need a large objective.</span></span></p><span data-dcnode-id="4746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4745" instrument_node="">The power becomes almost irrelevant and it’s all about collecting those pesky little photons.</span></span></p><span data-dcnode-id="4742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4740" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4741" instrument_node="">So…..</span></span></p><span data-dcnode-id="4738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4737" instrument_node="">There isn’t one particular binocular that is best for stargazing, but generally the bigger the better, and there are indeed some big ones out there.</span></span></p><span data-dcnode-id="4734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4729" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4733" instrument_node="">We had several different binoculars that we used for astronomy. One was an </span></span><span data-dcnode-id="4730" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4731" instrument_node="">8X56.</span></span></p><span data-dcnode-id="4728" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4725" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4726" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4727" instrument_node="">This was a nice instrument that was a good compromise. The 56 mm objective gave nice views of a dark sky but the instrument was still light enough to be held by hand, and great for other things like bird watching and general terrestrial viewing.</span></span></p><span data-dcnode-id="4724" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4721" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4722" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4723" instrument_node="">But….</span></span></p><span data-dcnode-id="4720" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4711" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4718" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4719" instrument_node="">We also had a couple of pairs of “hernia” binoculars that were far too heavy to hold with your hands and required a tripod. One was </span></span><span data-dcnode-id="4716" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4717" instrument_node="">11X80</span></span><span data-dcnode-id="4714" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4715" instrument_node=""> and the other was </span></span><span data-dcnode-id="4712" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4713" instrument_node="">20X80.</span></span></p><span data-dcnode-id="4710" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4707" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4708" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4709" instrument_node="">These both gave breath-taking views of the deep sky, especially open star clusters, and when we moved down from the far north, the huge binoculars were great for poking around the Milky Way Galaxy. The constellation Sagittarius was a wonderland of all kinds of cool stuff.</span></span></p><span data-dcnode-id="4706" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4699" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4704" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4705" instrument_node="">It was great fun just scanning the sky at random with the </span></span><span data-dcnode-id="4702" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4703" instrument_node="">20X80s</span></span><span data-dcnode-id="4700" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4701" instrument_node=""> to see what we could find.</span></span></p><span data-dcnode-id="4698" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4696" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4697" instrument_node="">During World War Two, the Japanese were masters of night fighting and had monstrous </span></span><span data-dcnode-id="4694" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4695" instrument_node="">20X155</span></span><span data-dcnode-id="4692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4693" instrument_node=""> or even </span></span><span data-dcnode-id="4690" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4691" instrument_node="">30X200</span></span><span data-dcnode-id="4688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4689" instrument_node=""> sized binoculars. Of course these were mounted on huge tripods, but gave the Japanese a huge advantage in detecting enemy ships.</span></span></p><span data-dcnode-id="4686" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4683" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4684" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4685" instrument_node="">At least until the allies developed radar and made the binoculars superfluous.</span></span></p><span data-dcnode-id="4682" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4679" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4680" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4681" instrument_node="">So…..</span></span></p><span data-dcnode-id="4678" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4671" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4676" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4677" instrument_node="">If you want a nice, easy to hold pair of binoculars for bird watching, nature viewing, or if you happen to be a pervert and want to look through your neighbors window, a good pair of</span></span><span data-dcnode-id="4674" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4675" instrument_node=""> 7X35s</span></span><span data-dcnode-id="4672" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4673" instrument_node=""> are usually perfect.</span></span></p><span data-dcnode-id="4670" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4667" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4668" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4669" instrument_node="">But…</span></span></p><span data-dcnode-id="4666" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4659" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4664" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4665" instrument_node="">If you really want to see the </span></span><span data-dcnode-id="4662" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4663" instrument_node="">deep sky</span></span><span data-dcnode-id="4660" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4661" instrument_node="">,</span></span></p><span data-dcnode-id="4658" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4655" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4656" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4657" instrument_node="">bigger is always better.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4652" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4653" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-714a1b4d5522411aa99e07c6f9a555ff-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4649" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4650" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4651" instrument_node="">I believe these are the 11X80s.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4646" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4647" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4648" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4a72a84ea2ed6467cd381ecec9ae577a-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4643" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4644" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4645" instrument_node="">These are the 20X80s, great binoculars for viewing the deep sky at night.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4640" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4641" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4642" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b855a5b883d628b6b2faa7bb4ce97e93-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4629" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4638" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4639" instrument_node="">This is a picture we stole off the internet that shows a modern navy ship with some really huge binoculars. I think they are </span></span><span data-dcnode-id="4636" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4637" instrument_node="">40X200s</span></span><span data-dcnode-id="4634" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4635" instrument_node="">. The</span></span><span data-dcnode-id="4632" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4633" instrument_node=""> 200mm</span></span><span data-dcnode-id="4630" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4631" instrument_node=""> lens allows the observer to collect lots of photons and see extremely well in the dark or dim light.</span></span></p><span data-dcnode-id="4628" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4625" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4626" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4627" instrument_node="">First two photos by the “always peering into the darkness”, Anna K. &lt;3 &lt;3</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4543" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4544" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4545" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4559" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4591" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4592" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4602" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4603" style="box-sizing: border-box; position: relative;"><button aria-label="84 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4604" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timi ding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="4462" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="4463" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="4464" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4465" style="box-sizing: border-box;"><span data-dcnode-id="4466" style="background: none;"><span data-dcnode-id="4467" instrument_node="">Why does everything look so distorted and flat when looking through a binoculars? I'm assuming the 'bi' in binoculars had something to do with it, like bi is 2.</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="4390" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="4391" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4392" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="4453" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4393" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4429" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4430" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4431" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4432" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4433" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4450" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4451" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4452" instrument_node="">The “bi” in binoculars has to do with the fact that you are provided with two telescopes, with coordinated focusing controls, so that your view can be seen as a 3-dimensional scene, rather than merely a flat view like a picture (essentially what you get from a telescope, through which you view with only one eye.)</span></span></p><span data-dcnode-id="4449" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4446" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4447" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4448" instrument_node="">Now, the optics of a telescope, in its simplest form, invert the image that you see when you look through it. This is fairly undesirable, so various approaches are used to re-invert the image, so the scene you see without the telescope is identical in layout to the scene you see throug</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4434" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4435" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4436" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4437" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4438" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4443" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4444" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4445" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4439" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4440"><svg data-dcnode-id="4441" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4442" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4394" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4395" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4396"><span class="q-box qu-userSelect--text" data-dcnode-id="4397" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4426" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4427" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4428" instrument_node="">The “bi” in binoculars has to do with the fact that you are provided with two telescopes, with coordinated focusing controls, so that your view can be seen as a 3-dimensional scene, rather than merely a flat view like a picture (essentially what you get from a telescope, through which you view with only one eye.)</span></span></p><span data-dcnode-id="4425" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4422" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4423" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4424" instrument_node="">Now, the optics of a telescope, in its simplest form, invert the image that you see when you look through it. This is fairly undesirable, so various approaches are used to re-invert the image, so the scene you see without the telescope is identical in layout to the scene you see through the telescope, but not so enlarged.</span></span></p><span data-dcnode-id="4421" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4418" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4419" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4420" instrument_node="">Humans have, for the most part, two eyes. There is a benefit in this: each eye observes a scene from a slightly different angle. A human’s brain does the heavy lifting here, knitting the images encoded in the eye into nerve impulses into a combined view of the scene which derives a sense of depth and volume from two essentially flat images, where each eye’s lens focuses the image on the retina. This view is immensely useful in navigating through the spaces around us, avoiding obstacles and dangers and those other humans. The spacing between the centers of the two eyes is a desirable feature, since the greater the spacing, the more 3D effect one gets.</span></span></p><span data-dcnode-id="4417" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4414" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4415" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4416" instrument_node="">Binoculars were originally built with the image erection performed by a pair of “Porro” prisms. These are the binoculars which people probably associate with the military, these days, since they are most often seen in relation to military optics and encountered in binoculars which look like they were made during the World Wars. The porro prisms work in pairs, and their construction and alignment creates an offset between the lenses which gather light from the distant scene which is greater than the offset between the eyepieces. This separation between the incoming lenses allows the views which they gather to be from further apart than they would be if the spacing were the same as your eyes, which is good, because the additional distance to the view renders the difference between those views less pronounced without that separation.</span></span></p><span data-dcnode-id="4413" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4410" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4411" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4412" instrument_node="">Modern optics have employed roof prisms, which invert the image to restore it to the pre-lens inversion layout, but do so with the elements “in-line”. This results in the two binocular tubes being more compact, and the overall size of the binoculars considerably smaller than equivalent binoculars using porro prisms. Roof prisms are called roof prisms because the portion which does the inversions resembles the shape of a house roof. While they are more convenient to use, the lack of separation between the barrels and inter-ocular distance is constant from your eyes to the lenses which gather the light from the incoming scene, and you don’t get as much of a sense of volume in the scene.</span></span></p><span data-dcnode-id="4409" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4406" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4407" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4408" instrument_node="">Additional technical issues, ranging from the type of glass used for the lenses and prisms to the physical design to alignment and even the adjustment between the barrels may account for additional flattening effects in the viewed scene, some of which may be fixed by a visit to the boffins at your local camera shop, some of which may be inherent in the particular design of the model or the preferences of the manufacturer.</span></span></p><span data-dcnode-id="4405" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4402" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4403" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4404" instrument_node="">And, unfortunately, the synthesis of a three-dimensional view can be related to the neuromorphology of the eye-brain nervous system and/or the psychology of the user. This part of the interface is so variable that professional observers can differ on whether they see a more 3D view through Porro or Roof prism designs, sometimes within the same viewing session!</span></span></p><span data-dcnode-id="4401" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4398" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4399" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4400" instrument_node="">For more information and pictures of different kinds of binoculars, please refer to the Wikipedia article on “Binoculars”.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4321" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4322" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; trans -word qu-textAlign--start" data-dcnode-id="3669" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3679" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3680" instrument_node="">However, if you are contemplating taking an interest in the night sky, I would strongly recommend that you start with a good quality pair of binoculars. Don't go for too much power since you will be hand-holding them. You will get a lot of satisfaction and crucial initial learning by using binoculars. Furthermore, if you don't get bitten by the Astronomy bug, you can find plenty of uses for </span></span><span class="q-inline" data-dcnode-id="3672" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//binoculars.eg/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="binoculars.eg"><span data-dcnode-id="3678" instrument_node="">binoculars.eg</span></a><span class="q-inlineBlock" data-dcnode-id="3673" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3674"><svg data-dcnode-id="3675" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3676" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3670" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3671" instrument_node=""> sport, bird watching.</span></span></p><span data-dcnode-id="3668" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3665" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3666" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3667" instrument_node="">If you are a school considering setting up an Astronomy Club, I will still recommend that you first get at least half a dozen pairs of binoculars. People get bored waiting in line for a quick turn at the one telescope. Telescopes are time consuming to set up. There are far too many telescopes lying around in school storerooms.</span></span></p><span data-dcnode-id="3664" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3661" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3662" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3663" instrument_node="">Having several binoculars on hand keeps the students gainfully occupied while the telescope is being set up, and targetted, and re-targetted.</span></span></p><span data-dcnode-id="3660" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3657" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3658" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3659" instrument_node="">Finally, if you have a number of binoculars, the Ornithology Club can use them during the day, and the Astronomy Club during the evenings.</span></span></p></span></span ata-dcnode-id="2623" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2624" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2629" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2630" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2631" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2625" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2626"><svg data-dcnode-id="2627" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2628" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2580" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2581" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2582"><span class="q-box qu-userSelect--text" data-dcnode-id="2583" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2612" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2613" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2614" instrument_node="">Binoculars are nothing more than the combination of two barrels to form binoculars. There is a lens at the front end of the telescope, namely the objective lens. Its function is to collect light, combine the light into a visible image, enlarge the image, and then transmit the light to the eyepiece to enter the line of sight. The magnification of the seen object or scene depends on the focal length of the eyepiece. For binoculars, the magnification is generally between 5x and 10x. If there are only objective lens and eyepiece, the image generated by the telescope will be inverted, which will not affect the viewing of astronomy, because objects in space are upright, inverted and left-right. However, when watching birds or baseball games, upright images are necessary, which is why binoculars put corrective lenses and prisms between the objective and eyepiece.</span></span></p><span data-dcnode-id="2611" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2608" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2609" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2610" instrument_node="">Binoculars have left and right symmetrical lenses, which is convenient for people to observe with both eyes. The monocular telescope is used to observe with one eye, but we can't arbitrarily think that binoculars are better. Generally speaking, the magnification of a single telescope is higher than that of a binocular telescope, which can put objects far away larger. Although the magnification of binoculars is lower than that of single binoculars, they can get a three-dimensional sense because they can be observed with both eyes. At the same time, due to the low magnification, it can be held by hand and has good portability. Due to its wide field of vision, it is more suitable for watching outdoor sports competitions. The prism is arranged between the objective lens and the eyepiece, and surrounded by the outer shell of the lens barrel to play a protective role. The function of a prism is no different from that of an ordinary mirror, except that it does not reflect the back. Prism system can be divided into roof prism type and pro prism type, and can be divided into bak-4 material and BK7 material according to material. Here, we only discuss the function of prism</span></span></p><span data-dcnode-id="2607" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2604" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2605" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2606" instrument_node="">The light enters the objective lens and reaches the first prism. At this time, the image is inverted; Then refract to the second prism. At this time, the image is in a vertical shape. Finally, it enters the eyepiece and reaches the line of sight. This is the enlarged object we see. This principle applies to all binoculars</span></span></p><span data-dcnode-id="2603" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2600" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span p: anywhere; direction: ltr;"><span data-dcnode-id="1433" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1434" instrument_node="">MAGNIFICATION</span></span></p><span data-dcnode-id="1431" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1424" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1429" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1430" instrument_node="">The first number refers to the </span></span><span data-dcnode-id="1427" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1428" instrument_node="">magnification</span></span><span data-dcnode-id="1425" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1426" instrument_node=""> or “Power” of the binoculars. So, in your example the magnification is 60. This means that if you were looking at something that is 500m away, a magnification of 60 would make it seem like it was 60 times closer or 8.3m away.</span></span></p><span data-dcnode-id="1423" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1420" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1421" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1422" instrument_node="">However, the greater the magnification, the smaller the field (area) of view you see. And, the narrower the view the harder it is to use by just holding them in you</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1408" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1409" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1410" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1411" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1412" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1417" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1418" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1419" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1413" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1414"><svg data-dcnode-id="1415" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1416" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1336" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1337" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1338"><span class="q-box qu-userSelect--text" data-dcnode-id="1339" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1400" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1401" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1402" instrument_node="">I’m quite sure there are much better explanations for what binocular “Numbers” mean on the web but here is my shot at explaining them as simply as I can.</span></span></p><span data-dcnode-id="1399" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1396" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1397" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1398" instrument_node="">MAGNIFICATION</span></span></p><span data-dcnode-id="1395" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1388" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1393" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1394" instrument_node="">The first number refers to the </span></span><span data-dcnode-id="1391" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1392" instrument_node="">magnification</span></span><span data-dcnode-id="1389" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1390" instrument_node=""> or “Power” of the binoculars. So, in your example the magnification is 60. This means that if you were looking at something that is 500m away, a magnification of 60 would make it seem like it was 60 times closer or 8.3m away.</span></span></p><span data-dcnode-id="1387" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1384" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1385" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1386" instrument_node="">However, the greater the magnification, the smaller the field (area) of view you see. And, the narrower the view the harder it is to use by just holding them in your hands. Even at a magnification of 10, each tiny shake of your hands will be magnified tenfold, thus making what you’re looking at jump all over the place. Lastly, the narrower the view, locating what you are looking at (i.e. a bird) is more difficult once you raise the binoculars to your eyes. In your example, it would be nearly impossible to use a magnification that high without a tripod. A bit like trying to look through a telescope while holding it in your hands.</span></span></p><span data-dcnode-id="1383" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1380" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1381" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1382" instrument_node="">Object Lens (aperture)</span></span></p><span data-dcnode-id="1379" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1368" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1377" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1378" instrument_node="">The second number refers to the </span></span><span data-dcnode-id="1375" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1376" instrument_node="">objective lens</span></span><span data-dcnode-id="1373" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1374" instrument_node="">. The objective lens is the front lens of the binoculars, measured in (mm) terms. The size, meaning the “diameter” of its lens determines how much light is gathered. It is referred to as its </span></span><span data-dcnode-id="1371" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1372" instrument_node="">aperture size</span></span><span data-dcnode-id="1369" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1370" instrument_node="">. The bigger the aperture, the more light it is able to capture, which results in better image clarity.</span></span></p><span data-dcnode-id="1367" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1364" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1365" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1366" instrument_node="">Sometimes having 2 different sets of binoculars, each with the same aperture size but with different magnifications is useful. For example: 8X42 versus 10X42. I use both for bird watching. While I like the closer view of the 10X42, they are harder to locate my bird and harder to keep the image still when I do. The 8X42 aren’t quite as powerful and don’t bring the subject quite as close, however, locating the subject is easier and once located, I can hold a prolonged steady view much more easily.</span></span></p><span data-dcnode-id="1363" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1360" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1361" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1362" instrument_node="">The other thing to remember about the diameter of the objective lens (aperture) is that the larger the number the bigger and heavier the binoculars become. So if you had a 60X90 pair of binoculars, not only would they be huge, they’d be heavy as well. Just take a ruler and compare 90mm to just about any binoculars you have around the house. You will immediately see what I mean. You would never be able to use them by just holding them in your hands. A sturdy tripod is a must and for binoculars of that size and weight, the tripod itself would have to very sturdy which adds even more weight to lug around.</span></span></p><span data-dcnode-id="1359" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1356" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1357" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1358" instrument_node="">SUMMARY</span></span></p><span data-dcnode-id="1355" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1352" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1353" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1354" instrument_node="">When it comes to binoculars, a great deal goes into them besides the magnification and aperture. The glass lenses alone will vary widely. Some coated some not (and there are different types of coating). Add to that, the binocular interior design. For example: A Porro prism design versus a Roof prism design. So, matching the right binoculars to your intended use and at a cost you can afford can be quite daunting. My advice: take your time and do your research.</span></span></p><span data-dcnode-id="1351" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1344" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1349" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1350" instrument_node="">And one last thing: Unless you plan on looking at things that are </span></span><span data-dcnode-id="1347" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1348" instrument_node="">more </span></span><span data-dcnode-id="1345" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1346" instrument_node="">than 2 kilometres away (i.e. the stars), I can’t see any practical use for 60X90 binoculars. Having said that, I’m a bird watcher so maybe there are other practical uses that I’m not familiar with.</span></span></p><span data-dcnode-id="1343" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1340" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1341" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1342" instrument_node="">Hope this helps.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1263" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1264" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1265" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1279" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1306" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1307" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1317" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1318" style="box-sizing: border-box; position: relative;"><button aria-label="6 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data
