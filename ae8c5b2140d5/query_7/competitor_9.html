</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">&nbsp;</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="511"><img data-dcnode-id="513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rasc.ca/sites/default/files/starfinder_observinglists_hands.gif&amp;raw" style="float:right; height:125px; width:319px;"><span data-dcnode-id="512" instrument_node=""> Many amateur astronomers like to work with "Observing Lists" to help guide their night-time observing sessions. From lists for beginners to lists of hard-to-find objects, there are lists for everyone.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The Star Finder star map has round circles around 10 objects. These are special objects which are visible either by the naked eye, or through binoculars. Of course, the higher magnification of a telescope gives even more details.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="504"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Learn more about these targets:</span></strong></p><span data-dcnode-id="503" instrument_node="">
</span><ul data-dcnode-id="426"><span data-dcnode-id="502" instrument_node="">
</span><li data-dcnode-id="491"><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orion_Nebula"><img data-dcnode-id="501" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rasc.ca/sites/default/files/Orion_Nebula.jpg&amp;raw" style="float:right; height:275px; width:275px; margin: 0 0 0 10px;"></a><span data-dcnode-id="499" instrument_node=""> </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mira" target="_blank"><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Mira</span></strong></a><span data-dcnode-id="495" instrument_node=""> is a red super giant star which significantly changes in brightness. Many amateur astronomers measure the brightness of variable stars; that helps professional astronomers better understand stars. </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aavso.org/" target="_blank"><span data-dcnode-id="494" instrument_node="">The AAVSO website</span></a><span data-dcnode-id="492" instrument_node=""> shows how to do this. The distances to galaxies can be found by observing the brightness and periods of variable stars.</span></li><span data-dcnode-id="490" instrument_node="">
</span><li data-dcnode-id="485"><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orion_Nebula" target="_blank"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Orion Nebula M42</span></strong></a><span data-dcnode-id="486" instrument_node=""> can be seen with the unaided eye from a dark location or in binoculars from the city. Located just below the belt of Orion, it is a huge cloud of dust and gas. Gravity is pulling it into clumps which eventually ignite as stars. It glows because of bright stars which have already formed in it.</span></li><span data-dcnode-id="484" instrument_node="">
</span><li data-dcnode-id="479"><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pleiades" target="_blank"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Pleiades M45</span></strong></a><span data-dcnode-id="480" instrument_node=""> is an open star cluster. This has many hundreds of stars which all formed from a nebula at roughly the same time. The Orion Nebula will become an open cluster in a few million years. This is a good test of eyesight. Some people can see 7 or more stars.</span></li><span data-dcnode-id="478" instrument_node="">
</span><li data-dcnode-id="473"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beehive_Cluster" target="_blank"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Beehive Cluster M44</span></strong></a><span data-dcnode-id="474" instrument_node=""> is another open cluster.</span></li><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="465"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hercules_cluster" target="_blank"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">The Hercules Cluster or M13</span></strong></a><span data-dcnode-id="468" instrument_node=""> is a globular star cluster. It has hundreds of thousands rather than hundreds of stars, and is shaped like a sphere rather than flat like our solar system and many galaxies. Globular clusters are some of the oldest things in the universe.</span><br data-dcnode-id="467"><span data-dcnode-id="466" instrument_node="">
	The distance to each globular cluster can be found from variable stars. Much of this work was done at the David Dunlap observatory by Dr. Helen Hogg. From those distances, astronomers figured out the shape of the Milky Way, and our distance from the centre.</span></li><span data-dcnode-id="464" instrument_node="">
</span><li data-dcnode-id="459"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brocchi%27s_Cluster" target="_blank"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">The Coat Hanger cluster</span></strong></a><span data-dcnode-id="460" instrument_node=""> is a group of unrelated stars which look like a coat hanger. This is in a star rich part of the Milky Way.</span></li><span data-dcnode-id="458" instrument_node="">
</span><li data-dcnode-id="453"><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andromeda_Galaxy" target="_blank"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Andromeda Galaxy or M31</span></strong></a><span data-dcnode-id="454" instrument_node=""> is the most distant object most of us can see with our naked eyes. It has spiral arms, just like our Milky Way. There is a black hole in the centre. Almost all galaxies are moving away from us. This galaxy, however, is moving towards us and may pass through the Milky Way in 2 billion years. The Andromeda Galaxy, the Milky Way plus a few other galaxies form the local groups of galaxies. There are other clusters of galaxies in Virgo and Hercules, but telescopes are needed to see them.</span></li><span data-dcnode-id="452" instrument_node="">
</span><li data-dcnode-id="440"><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mizar_%28star%29" target="_blank"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Mizar</span></strong></a><span data-dcnode-id="448" instrument_node=""> and </span><a data-dcnode-id="446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeta_Ursae_Majoris" target="_blank"><span data-dcnode-id="447" instrument_node="">Alcor</span></a><span data-dcnode-id="445" instrument_node=""> form a double star. Some people with good vision can see that the middle star of the Big Dipper handle as a double star. Each of these is a double star with the stars orbiting each other. Almost half of solar systems have multiple stars. If Jupiter </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mizar_%28star%29"><span data-dcnode-id="444" instrument_node=""> </span><img data-dcnode-id="443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rasc.ca/sites/default/files/polaris.jpg&amp;raw" style="float:right; height:236px; width:221px; margin: 10px 0 10px 10px;"></a><span data-dcnode-id="441" instrument_node=""> had been 90 times heavier, it would have ignited and formed into a second star. Then we would have had less night. Double star systems still have planets, but probably not as many.</span></li><span data-dcnode-id="439" instrument_node="">
</span><li data-dcnode-id="434"><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Double_Cluster" target="_blank"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Double Cluster</span></strong></a><span data-dcnode-id="435" instrument_node=""> is two separate open clusters next to each other. One cluster is about 3 million years old, the other almost twice as old.</span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="428"><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polaris" target="_blank"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Polaris</span></strong></a><span data-dcnode-id="429" instrument_node=""> is a fairly bright star which you would see straight overhead if you lay on your back at the North Pole. It stays in same spot of the sky, always within about a degree of true north. It is easy to find from the pointer stars of the Big Dipper. Some find North at night by finding Polaris. It is also used by amateur astronomers to adjust the alignment (polar align) of their telescopes. There is no bright star directly above the South Pole.</span></li><span data-dcnode-id="427" instrument_node="">
</span></ul><span data-dcnode-id="425" instrument_node="">
</span><hr data-dcnode-id="424"><span data-dcnode-id="423" instrument_node="">
</span><div class="container" data-dcnode-id="391"><span data-dcnode-id="422" instrument_node="">
</span><div class="four columns" data-dcnode-id="420"><img data-dcnode-id="421" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rasc.ca/sites/default/files/starfinder_resources2.gif&amp;raw" style="width:157px; height:160px;"></div><span data-dcnode-id="419" instrument_node="">
</span><div class="eight columns" data-dcnode-id="393"><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="414"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">The most famous observing list is called the "Messier List", published by Charles Messier in 1771!</span></strong><span data-dcnode-id="415" instrument_node=""> Astronomical names that contain a code like "M44" or "M42" refer to their position on the Messier list.</span></p><span data-dcnode-id="413" instrument_node="">
</span><ul data-dcnode-id="407"><span data-dcnode-id="412" instrument_node="">
</span><li data-dcnode-id="409"><a data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_Messier_objects" target="_blank"><span data-dcnode-id="411" instrument_node="">Find out more about the Messier List at this Wikipedia page.</span></a></li><span data-dcnode-id="408" instrument_node="">
</span></ul><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="402"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">The RASC has several Observing lists to challenge you. These lists will help you guide your observing sessions! </span></strong><span data-dcnode-id="403" instrument_node="">The easiest is the "Explore the Universe Certificate". Print out the sheet. Find 55 out of 110 objects. When you complete a list, send the printed form in. RASC members will get a certificate and be mentioned on their website.</span></p><span data-dcnode-id="401" instrument_node="">
</span><ul data-dcnode-id="395"><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="397"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rasc.ca/explore-universe" target="_blank"><span data-dcnode-id="399" instrument_node="">Visit the RASC "Explore the Universe Certificate" page here.</span></a></li><span data-dcnode-id="396" instrument_node="">
</span></ul><span data-dcnode-id="394" instrument_node="">
</span></div><span data-dcnode-id="392" instrument_node="">
