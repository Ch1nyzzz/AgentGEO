</span><h2 data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">How To Buy Binoculars Without Regrets</span></h2><span data-dcnode-id="1945" instrument_node="">
</span><span data-dcnode-id="1941" instrument_node="">

</span><span data-dcnode-id="1936" instrument_node="">
</span><span data-dcnode-id="1933" instrument_node="">
</span><div class="ReminderBox" data-dcnode-id="1910"><span data-dcnode-id="1932" instrument_node="">
</span><h5 data-dcnode-id="1927"><span data-dcnode-id="1931" instrument_node="">Get </span><i data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">7 Easy Tips</span></i><span data-dcnode-id="1928" instrument_node=""> on How to Get the Binocular You Want</span></h5><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">
             Trying to make a smart binocular choice despite apparent conflicts in what you find about choosing and buying binoculars?              
            </span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1922" instrument_node="">
</span><a class="red" data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/ors-1.html" onclick="return FIX.track(this);"><span data-dcnode-id="1921" instrument_node="">Click here</span></a><span data-dcnode-id="1919" instrument_node=""> to receive your </span><b data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">FREE</span></b><span data-dcnode-id="1916" instrument_node=""> </span><i data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">7 Easy Tips</span></i><span data-dcnode-id="1913" instrument_node=""> 
            on how to get the binocular you want.
            </span></p><span data-dcnode-id="1911" instrument_node="">
</span></div><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">
Many people want to know how to buy binoculars, but are hesitant 
to venture into an unfamiliar topic without understanding binoculars 
in at least a fundamental way.  
Here you will find information about buying binoculars 
that will fit your needs at a reasonable price.
</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1905" instrument_node="">
For those who are returning to this page, you can skip ahead to 
</span><a data-dcnode-id="1903" href="#criteria-list"><span data-dcnode-id="1904" instrument_node="">the criteria for choosing binoculars</span></a><span data-dcnode-id="1902" instrument_node="">.
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><h3 data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">What Are Binoculars?</span></h3><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">
Quite simply, binoculars are two telescopes linked by
a hinge and collimated (aligned) so that both eyes will
see the same magnified image.  They are usually used to
see things that we might not be able to see otherwise - 
generally observing things, people, or activities from
a distance.
</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1893" instrument_node="">
The broad goal in choosing a binocular is to find one 
that transmits the most useable light to your eyes with 
the clearest, cleanest, crispest image, while being as 
lightweight as reasonably possible (</span><i data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">for your needs</span></i><span data-dcnode-id="1890" instrument_node="">) 
and easy to use. 
</span></p><span data-dcnode-id="1888" instrument_node="">
</span><h3 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">One Size Does Not Fit All</span></h3><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">
The best binocular for you depends on what you intend to 
do with it. This is fundamental in considering how to buy 
binoculars. The following tips on how to buy binoculars 
will help with a variety of considerations.  Please stay 
with us as we walk through several examples to illustrate this.  
If you already understand the impact of intended use, 
feel free to skip ahead to </span><a data-dcnode-id="1882" href="#common-approach"><span data-dcnode-id="1883" instrument_node="">the Common Approach -vs- the Informed Approach</span></a><span data-dcnode-id="1881" instrument_node="">.  
</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p class="ColumnRightSmall noprint" data-dcnode-id="1875"><span data-dcnode-id="1878" instrument_node="">
</span><iframe border="0" data-dcnode-id="1877" frameborder="0" height="200" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rcm-na.amazon-adsystem.com/e/cm%3Ft%3Dopticsr-20%26o%3D1%26p%3D286%26l%3Dst1%26mode%3Dsporting%26search%3Dcamping%2520tents%26fc1%3D000000%26lt1%3D_blank%26lc1%3D3366FF%26bg1%3DFFFFFF%26f%3Difr&amp;raw" style="border:none;" width="200"></iframe><span data-dcnode-id="1876" instrument_node="">
</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">
For example, an 8X25 model might be great for a bird watcher 
wanting to watch the action at a bird feeder 10-35 feet from 
the kitchen window in good daylight. That model would be 
entirely inadequate, though, for the birder wanting to see a 
predator bird's nest a good half mile distant - who might need 
a 20X80 tripod-mounted model.  If the birder were venturing 
into a forest with plenty of foliage overhead, an 8X42 or even 
a 10X56 configuration, depending on terrain, might be better.
</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1870" instrument_node="">
For astronomy, you may be able to see the moon in general or 
see star fields with a 7X35 binocular configuration. With a 
10X50 including features for good light transmission, though, 
you will be able to see craters on the Moon, the four bright 
Galilean satellites of Jupiter, and you will gasp at your three 
dimensional view of the Milky Way galaxy.  You'll want to know
what's important and what isn't in </span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/astronomy-binoculars.html%23sections"><span data-dcnode-id="1869" instrument_node="">astronomy binoculars</span></a><span data-dcnode-id="1867" instrument_node="">.
</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">
Someone wanting to find and watch white tailed deer would do 
well with a 7X35 or 8X40, but the individual "glassing" for 
mule deer would more likely want a 10X45 or 10X50 due to the 
difference in habitats.
</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">
For hikers and backpackers wanting to keep weight to a minimum, 
a small monocular (perhaps 7X18 or 8X20) or a compact binocular 
(8X20 or perhaps 8X25) would certainly fill the need.  Depending 
on the person's desire to see wildlife or distant views, it may 
be worth the extra weight to shift to a 10X36 or 10X42.
</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">
Let's say you are attending a baseball game in a large stadium.  
The binocular you will want if you are beside the field will be 
less powerful and have a wider field of view than the one you will 
want if you are in a seat high above the field.  Also, you will want 
to consider if you will be using your binocular more at day games 
or night games, since you will need larger objective lenses for 
gathering more light at night games.
</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">
Someone boating on freshwater lakes may find a smaller 8X36 
binocular just as useful as a saltwater boater finds the larger 
8X50 or 10X50 configuration - but both will likely want to ensure 
the binoculars were waterproof!
</span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">
From considering only these situations, you'll see that the 
configuration and features of your binocular needs are likely 
to vary depending on your intended use.  You've probably already 
guessed that many people have separate binoculars for two or 
three different applications.
</span></p><span data-dcnode-id="1850" instrument_node="">
</span><div class="CalloutBox" data-dcnode-id="1841"><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">
 "...you guys have some awesome reviews that are quite thorough and informative!"
</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1843"><cite data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Brian in Houston, Texas</span></cite></p><span data-dcnode-id="1842" instrument_node="">
</span></div><span data-dcnode-id="1840" instrument_node="">
</span><a class="name" data-dcnode-id="1837" name="common-approach"><h3 data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Common Approach to Binocular Choice Versus Informed Approach</span></h3></a><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">
Many binocular buyers go to the store and simply purchase a low-cost 
model in appealing packaging, assuming it will satisfy their need.  
Unfortunately, nowhere is it more true that "you get what you pay 
for" than with optics.
</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">
With this no-nonsense 
guide, you'll learn where you can safely save money on optics and what 
you don't want to skimp on in order to get the viewing experience that's 
important to you.  We'll identify what the various specifications mean.  
As an informed consumer, you'll be able to choose what's important to you. 
With binoculars, it's possible for you to buy ones that you can enjoy for years 
and the wise keep this in mind when thinking of how to buy binoculars either for 
themselves or as gifts!
</span></p><span data-dcnode-id="1830" instrument_node="">
</span><a class="name" data-dcnode-id="1827" name="criteria-list"><h3 data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Assessing Your Needs</span></h3></a><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">
In considering how to buy binoculars to fill your particular needs, 
there are a number of possible factors to consider. Some of the 
main criteria include understanding binoculars by understanding -
</span></p><span data-dcnode-id="1823" instrument_node="">
</span><p class="ColumnRightSmall noprint" data-dcnode-id="1819"><span data-dcnode-id="1822" instrument_node="">

</span><li data-dcnode-id="1749"><a data-dcnode-id="1751" href="#image-stabilized"><span data-dcnode-id="1752" instrument_node="">Image Stabilized,</span></a><span data-dcnode-id="1750" instrument_node=""> and</span></li><span data-dcnode-id="1748" instrument_node="">
</span><li data-dcnode-id="1745"><a data-dcnode-id="1746" href="#travel-binoculars"><span data-dcnode-id="1747" instrument_node="">Travel binoculars.</span></a></li><span data-dcnode-id="1744" instrument_node="">
</span></ul><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">
We'll discuss each of them in detail so that you'll be able to make informed 
decisions about how important they are to you.  You'll see how higher quality 
specifications in one area may compensate for less than optimal specifications 
in other areas.  You'll be able to make a wise optics choice to satisfy your 
needs and provide enjoyable viewing for years.
</span></p><span data-dcnode-id="1739" instrument_node="">
</span><h3 data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">There are 7 Easy Tips…</span></h3><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">
And, while we're thinking about assessing your needs and making sense of what to consider in buying binoculars….
</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1732" instrument_node="">
After working with people, we've found there were </span><i data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">7 Easy Tips</span></i><span data-dcnode-id="1729" instrument_node=""> to keep in mind to get the binoculars they wanted.  These </span><i data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">7 Easy Tips</span></i><span data-dcnode-id="1726" instrument_node=""> effortlessly guide a person wanting to make sense of all the information that enters into choosing a binocular.  Receiving the tips in helpful e-mails over several days makes it easy to sort it out without information overload.  
</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1723" instrument_node="">
Receive your </span><b data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">FREE</span></b><span data-dcnode-id="1720" instrument_node=""> </span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/ors-1.html" onclick="return FIX.track(this);"><i data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">7 Easy Tips to get the Binocular You Want</span></i><span data-dcnode-id="1717" instrument_node=""> by clicking here</span></a><span data-dcnode-id="1715" instrument_node="">.
</span></p><span data-dcnode-id="1713" instrument_node="">
</span><a class="name" data-dcnode-id="1710" name="magnification"><h3 data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Magnification</span></h3></a><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">
The magnification (or power) of a binocular is a reference to the degree to 
which the image you're viewing is enlarged.  For an 8X42 binocular, the first 
number (8) is the binocular's power.  It enlarges the image eight times as 
large as it would appear to the unaided eye.  If you view something 80 or 800 
feet away, using an 8X binocular will make it appear only 10 or 100 feet away, 
respectively.
</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">
It's normal to think that the more powerful a binocular, the better. 
This isn't necessarily the case.  Adding power to a binocular adds weight, 
for one thing.  Binoculars greater than 12X or 15X will be heavy enough that 
they will be difficult to hold steady and normal hand movements will be magnified.
</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">
In the past 10-20 years, weight reductions have made lightweight 12X and 15X 
binoculars a reality from a number of manufacturers, although you'll still meet 
some who insist that binoculars over 10X are not practical unless tripod-mounted. 
Today, you should count on using a tripod for binoculars greater than 15X and for 
some as low as 10X that are still of heavy construction or with small diameter 
objective lenses.  There is a work around 
for holding them steady - we'll talk about image stabilized binoculars later on.
</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">
Further, it's true that poor optics at 10X (an arbitrarily chosen magnification) will show a larger 
image than an 8X.  However, it won't usually show more details than the image seen with 8X 
magnification and better optics.  Since higher magnification power usually means a higher 
price, it will usually be a better value to find better quality optics at a lower magnification 
for the same price.  
</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">
Keeping all other aspects of a binocular the same, increasing power will not only 
decrease brightness, but will also decrease your eye relief (distance your eyes 
can be from the eyepieces - important for eyeglass wearers) and the field of view. 
Each of these will be discussed in depth later, but it's good to know that 
increasing power affects them.
</span></p><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">
Since we brought it up, brightness isn't only affected by a binocular's power. 
It's is also affected by objective lens' size, coatings, prism glass quality, 
blackening of the barrel interior, and exit pupil (size of the circle of light 
visible at the binocular's eyepiece).  Let's talk about blackening of the barrel 
interior here and leave the other things for later.  If the inside surfaces of the 
barrel are not blackened, it generally results in extra reflected light inside the binocular - 
which results in a poor view.  You can tell if binocular you're looking at is blackened 
inside the barrel by looking into it through the objective lens.  Usually, looking at a 
slight angle is best.  If you can see the inside of the barrel, it hasn't been blackened. 
This should not typically be a concern unless shopping for very inexpensive binoculars.
</span></p><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">
You should be forming thoughts about how important magnification is to you at this 
point.  But you should not necessarily be making firm decisions yet!  Before you're 
finished, you will see how magnification works with other elements as you contemplate 
how to buy binoculars for your special interests.  
</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">
We sometimes get questions about what kind of binocular is needed so one can see 1,000 yards/meters, 
three miles/kilometers, or ten miles/kilometers, etc.  The question is not a bad one, it just needs to 
be refined a bit.  What does a person want to be able to see at those distances?  You can point 
a binocular with very poor optics at the moon on a clear evening and see it relatively clearly - 
and it's thousands of miles/kilometers away!  The question then becomes focused on what level of detail, color, 
contrast, and so on are desired at given distances.  Those elements are matters of magnification, objective lens size, 
lens coatings, prism coatings, and more.  This page will help provide the answers to those questions.
</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">
Here is an excellent video by the folks at Eagle Optics.  They do a good job of explaining 
magnification in optics.  
</span></p><span data-dcnode-id="1682" instrument_node="">

For an 8X42 binocular configuration, the second number 42 refers to the diameter 
of the objective lenses in millimeters (mm).  The objective lenses are those at 
the front of the binocular - farthest from your eyes.  The size of these lenses 
can be an significant consideration in answering the question of how to buy 
binoculars that will be suited to your particular needs.
</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">
The principle purpose of the objective lenses is to gather light and form a 
sharply-defined image of a distant object.  The wider the objective lens, 
magnification and quality being equal, the more light it gathers, resulting 
in a brighter view and sharper image.
</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">
All other things being equal, doubling the objective size results in quadrupling an 
instrument's light gathering ability. For example, an 8X50 binocular has four times 
the light gathering capability of an 8X25 and nearly twice as much as an 8X36.  The 
larger objective lenses in the 8X36 or 8X50 produce correspondingly wider beams of 
light leaving the eyepieces (the beam is called the "exit pupil"). This makes viewing 
with a larger objective more comfortable than viewing with a smaller objective lens in 
general terms and especially under low light conditions.
</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">
It's important to keep quality in perspective in all of this, too.  A high quality 40mm 
lens and associated glass components will nearly always give you a better, brighter image 
than a cheap 50mm lens and associated glass components will. (That's a very good reason 
for the "all things being equal" caveat above!)
</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">
The larger the objective lenses are, however, the more weight they add to the binocular. 
The additional weight may be significant for the weight conscious users intending to carry 
an instrument hanging around the neck for long distances.  Of course, larger objectives will 
not be attractive to those needing a compact binocular for travel, backpacking, or fine arts 
performances, either.
</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">
The objective size is more significant than many, if not most, realize.  The physics laws of 
light means that details are blended in the image through what is called diffraction.  
This is caused by the rays of light which pass an object's edge being bent out of what 
would otherwise be their course by that edge.  The rays going through the center of the 
lens are not affected this way - they're not bent.  When the rays from all parts of the 
lens are recombined to make the image, the rays diffracted by the edge will form the 
halos we call chromatic aberration.  As the diameter of the objective lens is decreased, 
an increasing number of the finest details are lost when the rays are recombined as the 
details that are close together can no longer remain separate.  Larger objective lenses 
simply allow the image to pass through without the harm to the image that smaller ones 
inflict.  
</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">
If one of your main interests is in observing wildlife, you may already know that some of 
the prime viewing times are in the early morning and late evening twilight hours.  Since 
wildlife is often more active at those times, you may decide an objective lens of 40mm or 
larger will be an advantage.  If you're not physically carrying your instrument 
long distances or simply using it from the home or vehicle, you may decide for 
50mm or greater objectives for their utility.
</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">
</span><i data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Here's an example of applying these principles in your specific situation</span></i><span data-dcnode-id="1117" instrument_node="">.  
We frequently carry a 10X28 binocular and a 7X18 monocular when traveling.  
They're both small and lightweight - easy to pack and unobtrusive to carry.  We 
also use a 15X45 binocular for enjoyable hand-held viewing at a substantial distance.  Both 
situations have limitations.  The travel optics won't satisfy us for long-range viewing and 
when using the physically larger 15X45 it's more difficult to "find" what we want to view than 
it would be with a larger objective lens.  Our primary goal in choosing the 45 mm objective lens for 
the 15X45 instrument, however, was to reduce the instrument's weight to a level that was acceptable 
to us.  The smaller objective lens made a noticeable difference in the weight of the binocular for us 
and we were willing to both accept less light/brightness and work a bit more to visually "find" 
what we wanted to see.  
</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">
Finally, as we leave the objective lens section, you may find that you want to keep 
the magnification power and objective lens size in mind as you consider how to buy 
binoculars to provide the field of view and eye relief you want.
</span></p><span data-dcnode-id="1112" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="1099"><span data-dcnode-id="1111" instrument_node="">
</span><ul data-dcnode-id="1101"><span data-dcnode-id="1110" instrument_node="">
</span><li data-dcnode-id="1107"><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="1109" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="1106" instrument_node="">
</span><li data-dcnode-id="1103"><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="1105" instrument_node="">Top of page</span></a></li><span data-dcnode-id="1102" instrument_node="">
</span></ul><span data-dcnode-id="1100" instrument_node="">
</span></div><span data-dcnode-id="1098" instrument_node="">
</span><a class="name" data-dcnode-id="1095" name="field-of-view"><h3 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Field of View</span></h3></a><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">
The field of view is the width of the area you can see at 1,000 yards/meters.  This is usually 
measured in feet/meters and is called the "linear field."  When it's measured in degrees, 
it's called the "angular field" and this can be converted to the linear field measurement in feet
by multiplying the angular field by 52.5.  For example, with a binocular with a 6.3° field 
of view you would see an area about 330 feet wide at 1,000 yards.   (If you want absolute 
precision 1°=52.365 feet at 1,000 yards, but the entire industry rounds it to 52.5. 
In metric terms, the linear field at 1,000 meters is calculated by multiplying the angular 
field by 17.5m.)
</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p class="ItemCenter" data-dcnode-id="1087"><span data-dcnode-id="1090" instrument_node="">
</span><img alt="Field of View Illustrated" data-dcnode-id="1089" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/field-of-view.jpg&amp;raw"><span data-dcnode-id="1088" instrument_node="">
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">
Generally speaking, if you're watching something with action such as birds in flight, 
stadium sports, race track events, and the like, you'll find a wide field 
of view to be a significant benefit in considering how to buy binoculars.  The focal length 
of the objectives (not their diameter) and the type of eyepieces used determine the field of 
view. You'll recall from our discussion of magnification power that the higher your magnification, 
the smaller your typical field of view.
</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">
A word of caution is due here: Going with an inexpensive pair of binoculars to get a wide field of view 
will likely be a poor investment.  This is because the manufacturer can't afford to lose money on 
the product (it's understandable!) and will nearly always achieve the wide angle view at the expense 
of image clarity and sharpness.  You'll find far more enjoyment in a crisp and clear smaller field of 
view than a large blurry one!   Even on a binocular you don't consider to be inexpensive, it's worth 
checking the sharpness of the image from edge to edge of the field of view.  It's normal and acceptable 
for the edges of an instrument's field of view to not be as clear as the the images in the center, 
but you don't want significant blurring.  Take the time to look through binoculars in various price 
ranges to see the differences.  
</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">
Some binoculars are given a "wide-angle rating."  What is this?  Most manufacturers consider 
an apparent field greater than 60° as wide-angle.  The "apparent field" is calculated by 
multiplying the magnification by the real angle of view.  For an 8X42 binocular with a 6.3° 
angular field, we multiply 8 by 6.3° and come to 50.4°.  Our 8X42 example here would not 
qualify as a wide-angle binocular.  
</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">
Your personal "How to Buy Binoculars" criteria should be taking form!
</span></p><span data-dcnode-id="1074" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="1061"><span data-dcnode-id="1073" instrument_node="">
</span><ul data-dcnode-id="1063"><span data-dcnode-id="1072" instrument_node="">
</span><li data-dcnode-id="1069"><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="1071" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1065"><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="1067" instrument_node="">Top of page</span></a></li><span data-dcnode-id="1064" instrument_node="">
</span></ul><span data-dcnode-id="1062" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
</span><a class="name" data-dcnode-id="1057" name="prisms"><h3 data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Prisms</span></h3></a><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">
Binoculars commonly use one of two prism systems: 1) a roof prism or 2) a Porro prism (named for its 
inventor, Ignazio Porro).  You can easily tell which system is used in a binocular since roof prism 
binoculars tend to have a straight tube or "barrel" and Porro prism binoculars have an offset (or 
"dog leg") in the barrel so the objective lens is not in line with the eyepiece.  
</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p class="ItemCenter" data-dcnode-id="1049"><span data-dcnode-id="1052" instrument_node="">
</span><img alt="How to buy binoculars - Porro and roof prisms illustrated" data-dcnode-id="1051" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/how-to-buy-binoculars.jpg&amp;raw"><span data-dcnode-id="1050" instrument_node="">
</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">
Traditional thinking was that Porro prisms provided an optical experience superior to roof prisms. 
Zeiss engineers found that the roof prism's phase shift could be corrected by coating them similar 
to the lens coatings.  In about the late 1980s, manufacturers began applying a phase shift coating 
to roof prisms which produced a roof prism binocular optic equal to the Porro prism design. Phase 
correction coating used to be limited to the best binoculars produced by manufacturers like Zeiss, 
Leica, Swarovski, and Bausch &amp; Lomb, but it was soon figured out and put into use by Nikon, 
Pentax, and others and became popularized in the 1990s.  
</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">
Today you can find many roof prism binoculars with phase correction coating, sometimes called 
"p-coating," at quite reasonable prices - you'll want to ensure that yours has it, too.  Some 
of the p-coated binoculars made by new manufacturers are as good as or better than their European 
counterparts.
</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">
Since the prism is a critical element of any optics, they're graded somewhat similarly to gemstones.  
A high-end binocular's prisms will have been selected and set apart for their quality even before they're 
polished and their coatings are applied.  Perhaps 2-3% of prisms will be of a suitable quality 
for high-end instruments.  The others will have tiny faults, whether scratches, small internal defects, 
or other flaws, that will be graded and many of which will still make good and excellent quality optics 
- just not the premium optics which command premium prices.  
</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">
Both prism designs have advantages unique to their design, however.  The Porro prism design is 
easier to manufacture and consequently have a significantly lower price than a roof prism binocular of 
equal optical quality.  The roof prism design is nearly always lighter and more compact than the Porro 
prism design.  Further, the roof prism design allows a long, piano-type hinge to be used and this 
results in a stronger, more rugged binocular that stays in collimation better (the barrels are 
aligned at this point in the discussion, which keeps the axes of the optics aligned - which is a 
better definition of collimation!), although this is possible with Porro prism designs that turn 
the offset of the objective lenses inward as is the case with some compact binoculars.  As a benefit 
of the increased competition in quality roof prism binoculars, their prices continue to become 
affordable for nearly everyone.
</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">
How vigorously you use your equipment should be a consideration in your "How to Buy Binoculars" 
criteria.  Unless your equipment is going to be subject to significant bumps and bruises, however,
it may not be an overriding one.
</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">
When buying binoculars, there are two immediate levels of prism quality generally encountered.  
The prisms' glass will likely be either boro-silicate glass (BK-7) or barium crown glass (BaK-4). 
Although BaK-4 costs the manufacturer a bit more, you'll want it used in your binoculars because 
it provides a much brighter, sharper image than BK-7.  There are not many other glasses used - but 
the density of the glass should equal or exceed that of BaK-4 glass before you accept it.  You'll 
usually find BK-7 prisms in lower-priced binoculars where quality is sacrificed to compete on price. 
If the manufacturer doesn't conspicuously say that it uses BaK-4 glass in a model you're considering, 
you'll do well to avoid that binocular.  To say it differently, people who know how to buy binoculars 
purchase only those which they know have prisms made of BaK-4 glass or better.  
</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1029" instrument_node="">
Although it isn't an issue for binoculars made with Porro prisms or Abbe-Koenig roof prisms (they 
don't need reflective coatings because of their design), you'll want to be generally aware of the 
differences in reflective coatings for roof prisms.  Typically, there are three reflective coatings 
used for roof prisms.  The 
</span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/binocular-glossary.html%23dielectric"><span data-dcnode-id="1028" instrument_node="">dielectric coating</span></a><span data-dcnode-id="1026" instrument_node=""> 
provides a reflectivity exceeding 99%, a 
</span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/binocular-glossary.html%23silver"><span data-dcnode-id="1025" instrument_node="">silver alloy coating</span></a><span data-dcnode-id="1023" instrument_node=""> 
provides reflectivity in the 95-98% range, and an aluminum alloy typically provides 
reflectivity of 87-93%.  The greater the reflectivity, the brighter the image and, consequently, the 
cleaner, crisper, and clearer your view will be and the greater the amount of contrast and color you'll see.  
</span></p><span data-dcnode-id="1021" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="1008"><span data-dcnode-id="1020" instrument_node="">
</span><ul data-dcnode-id="1010"><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1016"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="1018" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1012"><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="1014" instrument_node="">Top of page</span></a></li><span data-dcnode-id="1011" instrument_node="">
</span></ul><span data-dcnode-id="1009" instrument_node="">
</span></div><span data-dcnode-id="1007" instrument_node="">
</span><a class="name" data-dcnode-id="1004" name="optical-glass"><h3 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Optical Glass</span></h3></a><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">
Besides the Bak-4 glass you want in your prisms, you want to know about other optical glass 
and how it can affect your viewing experience.
</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">
Standard grades of glass in lenses offer good image quality under good lighting conditions.  
However, if you anticipate using your instrument much under low-light conditions, there 
is high-grade optical glass which provides notably improved resolution and higher fidelity 
rendering of colors.  Fluoride glass, high-density glass, and extra-low dispersion glass are 
three of these.  Since these lenses do raise manufacturing costs, it may be time to start 
thinking about price as part of your "How to Buy Binoculars" criteria.  
</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">
The result of using these more dense glasses in the lenses is that they work to move the 
binocular significantly from being an achromatic optic to an apochromatic optic.  The 
binocular does not become fully apochromatic, but these lenses do remove a significant 
amount of chromatic aberration in the viewed image.  While it is a subtle difference to 
notice, what people often recognize more quickly is that image details are less muddied 
and it the image seems to have greater contrast.  Using these lenses for a while will 
allow one to come to appreciate the ability to see detailed shades and hues which could 
not be discerned with an achromatic instrument.  
</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">
The difference is discernable in good light, but obvious in low-light conditions.  If 
functionality in low light is important to you, it is something to make note of in 
your list of considerations.  If you're approaching your first binocular purchase and 
you intend to watch wildlife, you may want to remember that a lot of wildlife activity 
occurs at twilight.  That doesn't necessarily mean you need this special type of glass, just that
it may be a consideration for you.  
</span></p><span data-dcnode-id="991" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="978"><span data-dcnode-id="990" instrument_node="">
</span><ul data-dcnode-id="980"><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="986"><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="988" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="982"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="984" instrument_node="">Top of page</span></a></li><span data-dcnode-id="981" instrument_node="">
</span></ul><span data-dcnode-id="979" instrument_node="">
</span></div><span data-dcnode-id="977" instrument_node="">
</span><div class="poppages noprint" data-dcnode-id="945"><span data-dcnode-id="976" instrument_node="">
</span><h4 data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">YOU MIGHT ALSO LIKE</span></h4><span data-dcnode-id="973" instrument_node="">
</span><ul data-dcnode-id="947"><span data-dcnode-id="972" instrument_node="">
</span><li data-dcnode-id="968"><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/optics-for-sale.html" onclick="return FIX.track(this);"><img alt="Optics for Sale" data-dcnode-id="971" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/xfor-sale.jpg.pagespeed.ic.s_PDcO423g.jpg&amp;raw"><span data-dcnode-id="970" instrument_node="">Our Optics for Sale</span></a></li><span data-dcnode-id="967" instrument_node="">
