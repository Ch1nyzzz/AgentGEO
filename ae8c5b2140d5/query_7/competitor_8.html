</span><li data-dcnode-id="956"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/binocular-comparisons.html" onclick="return FIX.track(this);"><img alt="Binocular Comparison Page" data-dcnode-id="960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/xcomparison-page.jpg.pagespeed.ic.AQ8BwOjzqM.jpg&amp;raw"><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">Binocular Comparisons</span></a></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="949"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/best-binoculars.html" onclick="return FIX.track(this);"><img alt="Best Binoculars Page" data-dcnode-id="954" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/xbest-binoculars-popular.png.pagespeed.ic.kzndgF1lSV.png&amp;raw"><br data-dcnode-id="953"><br data-dcnode-id="952"><span data-dcnode-id="951" instrument_node="">Best Binoculars</span></a></li><span data-dcnode-id="948" instrument_node="">
</span></ul><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">
</span><a class="name" data-dcnode-id="941" name="zoom-configurations"><h3 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Zoom Configurations</span></h3></a><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">
Some who are shopping for binoculars have the understandable mindset that a "zoom" binocular is 
a smart purchase because it provides a range of magnifications for the price of one instrument.  
This thinking is understandable.  Unfortunately, it doesn't consider compromises in optical quality 
required in a zoom binocular.  Most would do well to avoid such an instrument.  
Any article on how to buy binoculars is incomplete if it doesn't pause to discuss 
why this is true!  
</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">
From the optical perspective, a zoom binocular usually requires re-focusing after changing the magnification. 
Because they incorporate a number of optical compromises in order to function, zoom optics are prone to significant
distortions in which lines that are actually straight appear curved through the binoculars ("barreling" 
and "pin-cushioning").  These are more common in zoom binoculars than "standard" binoculars with one fixed magnification 
power.  
</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">
Zoom binocular eyepieces are optically compromised and result in a narrower field of view.  Although it may not 
be the final determining factor, you'll find that regular binocular users typically take field of view measurements 
into consideration when choosing an instrument.  The field of view for a chosen configuration can make a difference 
in your enjoyment.  If you take it into account when making your choice, it will be an informed choice!  
</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">
Finally, it's not easy to find zoom binoculars that are in collimation and it's not unusual for the collimation 
to change as the zoom feature is used.  The collimation problems alone will sharply reduce viewing enjoyment at 
best and provide headaches and eye strain through fuzzy or "double" images at worst - either of which will cause 
their owners to use them infrequently.  After understanding these things, people often ask "Why spend money on 
something we're not likely to enjoy?"  
</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">
From the mechanical side, zoom binoculars are necessarily heavier and often bulkier than a standard 
instrument because of the zoom elements.  The mechanical variations for the zoom feature are either
one that is belt-driven or one that uses gears and both are complex and difficult to repair.  
</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">
If you feel that only a zoom binocular will satisfactorily fill your needs, 
you'll want to know that the gear system works more smoothly and is more durable than the belt-driven.
</span></p><span data-dcnode-id="922" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="909"><span data-dcnode-id="921" instrument_node="">
</span><ul data-dcnode-id="911"><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="917"><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="919" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="916" instrument_node="">
</span><li data-dcnode-id="913"><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="915" instrument_node="">Top of page</span></a></li><span data-dcnode-id="912" instrument_node="">
</span></ul><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">
</span><a class="name" data-dcnode-id="905" name="lens-coatings"><h3 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Lens Coatings</span></h3></a><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">
Most binoculars have a coating on their air-to-glass surfaces to reduce reflected 
light and thus produce a brighter and sharper image to the user.  Like the glass 
your prisms are made of, lens coatings are very important to the quality of the 
binocular and its ability to transmit light.  Please pay close attention to how 
the coating of a binocular is described by the manufacturer because certain 
descriptions are standardized.
</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">
</span></p><ul class="indent" data-dcnode-id="882"><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">"Coated optics" means only that one or more lenses have a single layer anti-reflective
      magnesium coating or film applied.  This will usually be the first and/or last lenses - 
      the ones you can really see.  </span></li><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">"Fully coated" should mean that all air-to-glass surfaces have been coated with 
       magnesium flouride.</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">"Multi-coated" means that one or more surfaces of one or more lenses have
      been coated with multiple films.  In this situation, some surfaces could
      be coated only once or not at all.</span></li><span data-dcnode-id="889" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">"Fully multi-coated" means that all air-to-glass surfaces have multiple coats or films applied.</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">"UV coatings" are sometimes touted on a binocular.  They're supposed to block harmful ultraviolet light, but they don't 
      transmit as much light as multi-coatings, resulting in darker images.</span></li><span data-dcnode-id="883" instrument_node="">
</span></ul><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="880"></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">
Technically, of course, two layers of film on lenses qualify as multi-coating. 
Top optics manufacturers typically use at least three or four coatings and often more.  
</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">
It's worth saving up the money or scrimping on other purchases 
if necessary to be able to buy a fully multi-coated binocular.  (If you're
considering a used instrument, multi-coatings became more widely used after the 1980s.)
You'll find you actually use a higher quality binocular significantly 
more than a low-end instrument and your enjoyment is multiplied several 
times over by being able to see clear, clean, crisp images.  
</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">
If you've 
read from the beginning of this "How to Buy Binoculars" article, you're becoming an informed 
optics consumer and well on your way to knowing how to buy binoculars!
</span></p><span data-dcnode-id="870" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="857"><span data-dcnode-id="869" instrument_node="">
</span><ul data-dcnode-id="859"><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="865"><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="867" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="864" instrument_node="">
</span><li data-dcnode-id="861"><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="863" instrument_node="">Top of page</span></a></li><span data-dcnode-id="860" instrument_node="">
</span></ul><span data-dcnode-id="858" instrument_node="">
</span></div><span data-dcnode-id="856" instrument_node="">
</span><a class="name" data-dcnode-id="853" name="contrast"><h3 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Contrast</span></h3></a><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">
Contrast is the ability to differentiate between both bright and dim 
elements of an image.  Higher contrast helps you to see faint objects 
or subtle variations in detail. Contrast is particularly important for both serious 
bird watchers and for astronomy, for example.  Search and rescue staff, 
hunters, and law enforcement personnel also find excellent contrast 
high on their attribute lists.
</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">
Contrast is affected by the resolution - the better the resolution, 
the better the contrast.  Better optical coatings also contribute 
significantly to better contrast, as does the quality of the glass in 
the lenses and prisms.
</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">
Collimation, while not directly affecting contrast, can appear to affect it. 
Collimation is the alignment of the optical axes of the lenses to the mechanical 
components of a binocular.  If they're not precisely aligned, the image seen 
by one eye will differ slightly from the other eye's image - presenting the 
brain with a blurred image.  Usually, the brain will compensate for this on a short-term basis and 
adjust the two images into one.  (It usually results in sore eyes and/or headaches as the instrument is 
used, though.)  If bad enough, however, it will frequently appear as though 
one is troubled by "double vision."  A binocular should be able to withstand 
reasonable use, but can be knocked out of collimation by jarring such as dropping 
it on a hard surface, rough handling, and sometimes even shipping if not carefully packaged.  
A high percentage of inexpensive binoculars are unfortunately already out of collimation when 
they're purchased.  It's difficult to manufacture good quality optics without spending the 
money for quality components and assembly procedures!  
</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">
To test collimation, secure the binocular on a steady rest or tripod and 
focus on an image 75 to 125 yards distant, preferably with a straight line 
in it such as a pole, horizontal roof edge, smokestack, or something similar.  
Compare the images in each side of the binocular.  If one is lower/higher 
than the other, further to the left/right than the other, or one is slightly 
rotated when compared to the other, the binocular is out of collimation.  Unless 
you know how to adjust the instrument, you run a good chance of ruining your 
binocular in attempting it the first time or two.  It's wiser to send it to a
repair shop or return it to the seller/manufacturer if that's an option for you.  
</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">
Anyone wanting to know about how to buy binoculars will want to know about an
instrument's exit pupil.  That's the next topic!  
</span></p><span data-dcnode-id="837" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="824"><span data-dcnode-id="836" instrument_node="">
</span><ul data-dcnode-id="826"><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="832"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="834" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="828"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="830" instrument_node="">Top of page</span></a></li><span data-dcnode-id="827" instrument_node="">
</span></ul><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span><a class="name" data-dcnode-id="820" name="exit-pupil"><h3 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Exit Pupil</span></h3></a><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">
The exit pupil is the diameter of the beam of light leaving the eyepiece 
of the binocular.  It's calculated by dividing the objective lens diameter 
by the magnification power of the binocular.  In other words, a 7X35 binocular 
has an exit pupil of 5mm.  You can easily see the exit pupil by holding the 
binocular at arms' length and looking through the eyepieces at a source of light. 
The larger the exit pupil, the brighter the image you see - one of the goals 
looking for binoculars.  It doesn't make as much difference during daylight when 
the diameter of your eyes' pupils is less than the exit pupil of your binocular.
</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">
However, large exit pupil is of special interest if you expect to use your 
binocular in low light levels or at night.  As the ambient light decreases, 
our eyes' pupils adapt by enlarging.  If your binocular's exit pupil is smaller 
than your eyes' pupils, it means you're not getting enough light to see clearly. 
On a bright day, the diameter of your pupils might be 2-4mm.  Ideally, dark-adapted 
human pupils in excellent condition will enlarge to between 5 and 9mm.  (Experiments 
show the average dark-adapted pupil diameter decreases with age and eventually 
approximates its diameter in bright light.  A middle-aged person's maximum pupil 
average is about 5mm and an elderly maximum averages 4mm.)  As you age, good quality 
glass and multi-coatings become more meaningful in binocular brightness than a larger 
exit pupil does when you're younger.
</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">
At about 20 years of age, our dark-adapted eye pupil diameter will enlarge to about 
7mm on average.  As we age, however, the average diameter of the dark-adapted pupil 
decreases to about 6mm at age 40, 5mm at age 50, 4mm at around age 70, and even as small as 
3mm at age 80.  If you are the only person using your binocular or the users are only 
people in your age group and you're interested in low-light viewing, you'll do well 
to not worry unduly about a larger exit pupil than the approximate average dark-adapted 
pupil diameter for your age.  That's because larger objective lenses and exit pupils add 
both weight and cost to binoculars.  If you're over 40 or 50 years of age, large exit 
pupils are not likely to mean much to you as far as low-light conditions are concerned.  
Along with prism glass and multi-coatings, this is noteworthy for your "How to Buy Binoculars"
list.  
</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">
With daylight conditions, you'll understand that compact 8X20 binoculars, with an exit 
pupil of 3.0, will be just fine.  Under low light or dark conditions, however, when the 
dark-adapted diameter of younger pupils is closer to 6mm, the younger users will notice 
that they're not getting the light they'd like to have as compared to those of more 
advanced years.  That's when an 8X56 binocular, with an exit pupil of 7mm, will give 
them a much better view.  Astronomical binoculars, those used for astronomy, should 
have a generous exit pupil for younger users since they'll be used at night.
</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">
Even in bright light, a 7mm or larger exit pupil will be of benefit if you're moving 
along in a vehicle on bumpy road or in a boat on even relatively small waves.  That's because it's 
easier to keep your daylight-contracted pupil within the binocular's wider exit pupil.
</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">
By now, you're probably seeing why one binocular configuration may not address all of 
your needs in an outstanding way.  If you're considering your first binocular purchase, 
you may be best served by choosing a compromise configuration that's nearly optimal for 
your primary needs and a little less than optimal for secondary needs.  Odds are you 
will never regret stretching your budget to acquire the very best binocular you can 
possibly afford.  
</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">
A fair number of years ago, this writer scrimped and saved up $250 
for a good quality, first binocular which is still giving excellent service and enjoyment 
today.  The years of pleasure that clean, clear, crisp images provide are worth it.  The 
fuzzy images, headaches and sore eyes that go hand-in-hand with bad optics are definitely not 
worth the relatively small amount saved...especially when considering how very little an 
inferior binocular actually gets used!  
</span></p><span data-dcnode-id="798" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="785"><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="787"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="793"><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="795" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="792" instrument_node="">
</span><li data-dcnode-id="789"><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="791" instrument_node="">Top of page</span></a></li><span data-dcnode-id="788" instrument_node="">
</span></ul><span data-dcnode-id="786" instrument_node="">
</span></div><span data-dcnode-id="784" instrument_node="">
</span><a class="name" data-dcnode-id="781" name="relative-brightness"><h3 data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Relative Brightness and Twilight Factor</span></h3></a><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">
You're sure to see reference to relative brightness figures at some point in your shopping.  
In fact, we'll give them to you here for a number of binoculars just for comparison purposes.  Any 
article on how to buy binoculars would be incomplete without at least explaining what
they are - whether you use the information or not.    
</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">
Much like the exit pupil's calculation, the relative brightness is a mathematically 
calculated guide to image brightness.  It's simply the exit pupil squared.  An exit 
pupil of 5mm, would then have a relative brightness of 25.  It treats all 
similarly configured binoculars the identically.  Since you already know about the variations 
between binoculars due to the quality of their prism glass and coatings, you're 
right to not place too much reliance on this calculation.  In actual optical tests, 
some premium-grade compact binoculars with a low calculated relative brightness are 
brighter than some full-size instruments.
</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">
The twilight factor is another calculated guide to image brightness.  Its the square 
root of the magnification power times the objective diameter in millimeters.  As with 
the relative brightness, it's not particularly meaningful with today's optical
glass and coatings.
</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">
You aren't likely to find a binocular retailing for $50 or $75 that will have the same 
brightness, sharpness, and clarity of view in low-light conditions as one with 
good quality optics.  This is life.  Not even when they have an identical exit pupil.  
You won't even find the same brightness and clarity with 7X35 and 10X50 binoculars of 
equal quality - which both have a 5mm exit pupil - because the 50mm objective lens 
simply delivers more than twice as much light from the image, despite its higher 
magnification power.
</span></p><span data-dcnode-id="768" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="755"><span data-dcnode-id="767" instrument_node="">
</span><ul data-dcnode-id="757"><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="763"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="765" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="759"><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="761" instrument_node="">Top of page</span></a></li><span data-dcnode-id="758" instrument_node="">
</span></ul><span data-dcnode-id="756" instrument_node="">
</span></div><span data-dcnode-id="754" instrument_node="">
</span><a class="name" data-dcnode-id="751" name="eye-relief"><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Eye Relief</span></h3></a><span data-dcnode-id="750" instrument_node="">
</span><p class="ColumnRight" data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">
</span><img alt="Eye relief when Buying Binoculars" data-dcnode-id="748" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/buying-binoculars.jpg&amp;raw"><span data-dcnode-id="747" instrument_node="">
</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">
This is of particular interest for eyeglass wearers.  Eye relief is the 
distance away from the eye that the binoculars can be held and still allow you 
to view the entire field of view image.  
</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">
Because eyeglass lenses stand out from 
our eyes by about 10 to 13 mm, a longer eye relief is helpful and even necessary.  
A minimum of 16 to 19mm of eye relief is usually necessary for a person wearing 
eyeglasses to be able to see the full field of view.  (The farther your glasses 
are physically from your eyes, the greater eye relief you'll want.  The thickness 
of eyeglass lenses may also enter into achieving comfortable eye relief.)
</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">
Eyecups help in this area.  For a person not wearing eyeglasses, extended eyecups 
help to keep the eye from actually touching the eyepiece lens.  By turning or folding 
the eyecups down, eyeglasses can fit right up next to the lenses.  If an eyeglass 
wearer doesn't have astigmatism, the eyeglasses can often be removed while using 
binoculars.
</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">
Even for those who don't wear eyeglasses, a reasonable eye relief is often more 
comfortable since the eyes don't need to be pressed up against the eyecups 
in order to see the full field of view.
</span></p><span data-dcnode-id="733" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="720"><span data-dcnode-id="732" instrument_node="">
</span><ul data-dcnode-id="722"><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="728"><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="730" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="727" instrument_node="">
</span><li data-dcnode-id="724"><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="726" instrument_node="">Top of page</span></a></li><span data-dcnode-id="723" instrument_node="">
</span></ul><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">
</span><a class="name" data-dcnode-id="716" name="interpupillary-distance"><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Interpupillary Distance</span></h3></a><span data-dcnode-id="715" instrument_node="">
</span><p class="ColumnRight" data-dcnode-id="711"><span data-dcnode-id="714" instrument_node="">
</span><img alt="How to Choose Binoculars with correct interpupillary distance" data-dcnode-id="713" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/how-to-choose-binoculars.jpg&amp;raw"><span data-dcnode-id="712" instrument_node="">
</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">
Interpupillary distance (abbreviated as IPD) is the physical distance 
between the pupils of your eyes.  
</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">
Binocular specifications usually show the minimum and maximum distances 
they can accommodate.  This can be a factor in choosing binoculars.  It is a 
consideration when purchasing for younger users and it's helpful that more
than one brand provides binoculars especially designed for the youthful 
user.  
</span></p><span data-dcnode-id="704" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="691"><span data-dcnode-id="703" instrument_node="">
</span><ul data-dcnode-id="693"><span data-dcnode-id="702" instrument_node="">
</span><li data-dcnode-id="699"><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="701" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="695"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="697" instrument_node="">Top of page</span></a></li><span data-dcnode-id="694" instrument_node="">
</span></ul><span data-dcnode-id="692" instrument_node="">
</span></div><span data-dcnode-id="690" instrument_node="">
</span><a class="name" data-dcnode-id="687" name="near-focus"><h3 data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Near Focus</span></h3></a><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">
Near focus is the closest distance the binocular can be adjusted to a sharp 
focus.  Binocular specifications are usually based on a young person's focusing 
ability - as you age, your close focus extends further away from you.  Near-sighted 
and far-sighted individuals find that their near focus is closer and farther away, 
respectively.  Serious bird watchers usually request a near focus of about 15 feet, 
but most find that 20 to 25 feet is acceptable.
</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">
Some binoculars, usually at lower magnification powers, have a near focus as low/short
as three feet (a meter).  It's also possible to learn a lot about insects that you wouldn't
ordinarly be able to get close enough to observe closely otherwise.  
</span></p><span data-dcnode-id="680" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="667"><span data-dcnode-id="679" instrument_node="">
</span><ul data-dcnode-id="669"><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="675"><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="677" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="671"><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="673" instrument_node="">Top of page</span></a></li><span data-dcnode-id="670" instrument_node="">
</span></ul><span data-dcnode-id="668" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span><a class="name" data-dcnode-id="663" name="optical-problems"><h3 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Optical Problems</span></h3></a><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">
Binocular manufacturers often find themselves balancing optical quality against 
the buying public's willingness to tolerate optical problems.  To say it differently, 
it's a balance between optical quality and what consumers are willing to pay for!  
Perhaps the most discerning binocular users are bird watching enthusiasts, since 
matters of color and detail can be critical in identifying a bird.  The two most 
common optical problems are chromatic aberrations and distortions.  Anyone 
wanting to know how to buy binoculars will want to know about them.  
</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">
Chromatic aberration, the inability to bring different wavelengths of light 
(colors) into focus, usually produces a relatively faint halo of color around an object.  
It may depend on the brightness of the image and may not treat all images alike 
as to the color of the halo.  Also, the halos may be one color on one side and 
another color on the opposite side.
</span></p><span data-dcnode-id="656" instrument_node="">
</span><p class="ItemCenter" data-dcnode-id="652"><span data-dcnode-id="655" instrument_node="">
</span><img alt="Understanding distortion when Choosing Binoculars" data-dcnode-id="654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/image-files/choosing-binoculars.jpg&amp;raw"><span data-dcnode-id="653" instrument_node="">
</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">
Barreling and pin-cushion effects are distortions of images in which straight 
lines appear in the binocular as though they were curved.  When lines appear 
to be curved outward, it's referred to as barrel distortion.  When the lines 
appear curved inward, it's called pin-cushion distortion.  A complete absence 
of barreling and/or pin-cushioning can produce a "roller ball" in which it 
appears that you're looking at things through a wide-angle lens and the "ball" 
in the view seems to roll as you pan across a scene.  Some have likened it to 
looking through a peep-hole lens in the front door.  Many feel a very minor 
amount of barreling and/or pin-cushioning an acceptable trade off for avoiding 
the roller ball effect.  
</span></p><span data-dcnode-id="648" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="635"><span data-dcnode-id="647" instrument_node="">
</span><ul data-dcnode-id="637"><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="643"><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="645" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="639"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="641" instrument_node="">Top of page</span></a></li><span data-dcnode-id="638" instrument_node="">
</span></ul><span data-dcnode-id="636" instrument_node="">
</span></div><span data-dcnode-id="634" instrument_node="">
</span><a class="name" data-dcnode-id="631" name="focusing-mechanism"><h3 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Focusing Mechanism</span></h3></a><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">
Most binoculars focus by a center knob that adjusts both barrels simultaneously. 
Some, however, are designed to focus each eyepiece (or barrel, if you prefer) 
individually.  Because focusing each eyepiece takes time and lacks convenience, 
center focus binoculars are much more common.
</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">
Nearly all center focus binoculars have provision for a separate focus adjustment 
for one eye, usually the right one.  This is called the "diopter 
adjustment."  It's for adjusting for the difference between eyes, since it's 
unusual for two eyes to be identical in strength.  Since this setting can easily 
be changed by accident, better binoculars provide for this adjusting mechanism to 
be "locked."   Using this individualized focus arrangement calls for using the 
central focus to adjust to a sharp image for the left eye (while the right is 
closed) and then closing the left while focusing using the diopter adjustment 
for the right eye.
</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">
Permanently focused binoculars (sometimes called </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsreviewer.com/auto-focus-binocular.html" onclick="return FIX.track(this);"><span data-dcnode-id="622" instrument_node="">"auto focus"</span></a><span data-dcnode-id="620" instrument_node="">) 
are very easy to use.  Although there are exceptions, both of the eyepieces are usually 
set and locked at the factory.  If this is the case, it means that you generally won't be 
able to focus on objects nearer than about 40 yards (37 meters).  It also means you often 
can't adjust the binocular for a difference in strength between your left and right eyes - 
a significant drawback for most because two eyes are not usually identical in strength.  
Eyeglass wearers will need to wear their eyeglasses with permanently focused binoculars.  
For those that are adjustable or for the people who can use them, however, they're 
very good for activities such as sporting and race track events.  
</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">
Individual focus for binoculars looking into infinity is usually considered quite 
acceptable.  Astronomy would be one such use.  Because of the durability of the 
individual focus arrangement, binoculars made to military specifications will often
use individual focus.  There is a particular way of focusing them that's much better 
than the intuitive method - see </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/auto-focus-binocular.html%23individual%2520focus%2520binoculars"><span data-dcnode-id="616" instrument_node="">Focusing an Individual-focus Binocular</span></a><span data-dcnode-id="614" instrument_node="">.  
Becoming adept with individual focusing is actually quite easy.  Most simply rest the 
binocular barrels on the heels of the hands and use the thumbs and forefingers to adjust 
the occulars (eyepieces).  If you're using a tripod-mounted instrument it's even easier.  
Once familiar with it, many find that they prefer individual focus because it provides 
the ideal focus for each eye - every time.  Of course, most of the "giant" binoculars 
are only available with individually focusing eyepieces.  
</span></p><span data-dcnode-id="612" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="599"><span data-dcnode-id="611" instrument_node="">
</span><ul data-dcnode-id="601"><span data-dcnode-id="610" instrument_node="">
</span><li data-dcnode-id="607"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="609" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="606" instrument_node="">
</span><li data-dcnode-id="603"><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="605" instrument_node="">Top of page</span></a></li><span data-dcnode-id="602" instrument_node="">
</span></ul><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span><a class="name" data-dcnode-id="595" name="weight-durability"><h3 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Weight and Durability</span></h3></a><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">
Thanks to constant improvements, most binocular configurations are now relatively 
lightweight.  Obvious exceptions to this will be the giant astronomy binoculars in 
20X80, 25X150, and similar configurations typically used on tripods.
</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">
Many, if not most, compact binoculars will weigh in at a pound (half kilo) or less.  
Larger binoculars, up in the 10X56 range, may weigh upwards of three pounds (1.5 kilos). 
Zeiss and Swarovski 8X42 configurations weigh in at less than 30 ounces (850 grams) each. 
Most people find that binoculars weighing more than 35 ounces (about 1,000 grams) are 
uncomfortable to carry around the neck and 30 ounces or less is more comfortable.  Use 
of a binocular harness, instead of a neck strap, can help with comfort.
</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">
Weight distribution would be something you would want to give as much or perhaps 
greater consideration to.  Binoculars made with poor balance may be less comfortable 
than heavier binoculars designed with better balance.
</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">
Some use magnesium bodies to combine ruggedness with low weight.  Others go to 
aluminum or aluminum alloy bodies.  Still others use a polycarbonate.  Regardless, 
there are many options to provide a quality binocular at a weight you can be 
comfortable with.
</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">
Rubber armoring helps with durability in absorbing shocks from falling, bumping 
against objects, etc.   Rubber armoring does not provide waterproofing, however!
</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="578" instrument_node="">
For any significant outdoor use, you'll want your binoculars to be waterproof and 
internally fog proof.  Even if you're never outdoors when rain is predicted, there 
are always fast-moving storms and the inevitable occasional slip when crossing a 
creek that will get your instrument wet.  Fog proof means that the binocular won't 
fog internally - it will still fog externally when you go from an air conditioned 
setting into a warmer, humid one!  Quality binoculars are generally purged with an inert gas - 
the air and moisture has been replaced by </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/binocular-glossary.html%23nitrogen"><span data-dcnode-id="577" instrument_node="">nitrogen</span></a><span data-dcnode-id="575" instrument_node=""> 
or </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/binocular-glossary.html%23argon"><span data-dcnode-id="574" instrument_node="">argon</span></a><span data-dcnode-id="572" instrument_node=""> gas - and then sealed with O-rings 
to make them waterproof.
</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">
Being waterproof also means the binocular is sealed against humidity.  If you live in 
an area where there is significant humidity, this can be important even if you never take
your binoculars outdoors.  This is because moisture can get into unsealed binoculars and 
promote the growth of a fungus 
grow on the optics.  This is perhaps especially true of the prisms.  A binocular with
internal fungus growth may be able to be cleaned if attended to promptly.  You're likely 
to note a degraded view through the binocular when a fungus is present.  
</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">
It's not easy to determine how well a binocular is made, although a rule of 
thumb is the price: usually the better the construction, the higher the price.  Also, 
as the price goes up, the quality of the case and lens caps usually go up.
</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">
Most binocular manufacturers provide generous warranties with many offering limited 
lifetime warranties.  Of course, a lifetime warranty from a company you can't find 
in five years won't be worth much!
</span></p><span data-dcnode-id="561" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="548"><span data-dcnode-id="560" instrument_node="">
</span><ul data-dcnode-id="550"><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="556"><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="558" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="555" instrument_node="">
</span><li data-dcnode-id="552"><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="554" instrument_node="">Top of page</span></a></li><span data-dcnode-id="551" instrument_node="">
</span></ul><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span><a class="name" data-dcnode-id="544" name="image-stabilized"><h3 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Image Stabilized</span></h3></a><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">
The exceptions to the idea that you must put anything over 15X on a tripod are the 
image stabilizing binoculars available.  Though there are different systems to 
accomplish the stabilization of the image, the effect is marvelously similar. 
Instead of the image bouncing about with every heartbeat or breath you take, 
you can see the image in perfect detail while holding a 15X or 20X binocular 
with only one hand.
</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">
This is ideal for boaters on anything other than calm water, of course.  It's also 
of great benefit at lower magnifications for those who may not be able to hold 
binoculars of any magnification as steady as they would like to be able to do.
</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">
A downside may be the relatively small exit pupil for many models, depending on 
your intended use.
</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">
Feeling better about knowing how to buy binoculars that will provide you with 
years of enjoyment and satisfaction?  
</span></p><span data-dcnode-id="531" instrument_node="">
</span><div class="ExtraNav" data-dcnode-id="518"><span data-dcnode-id="530" instrument_node="">
</span><ul data-dcnode-id="520"><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="526"><a data-dcnode-id="527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23criteria-list"><span data-dcnode-id="528" instrument_node="">Back to the criteria list</span></a></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="522"><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/TxEfy66r0G8%3Frel%3D0%23top"><span data-dcnode-id="524" instrument_node="">Top of page</span></a></li><span data-dcnode-id="521" instrument_node="">
</span></ul><span data-dcnode-id="519" instrument_node="">
</span></div><span data-dcnode-id="517" instrument_node="">
</span><a class="name" data-dcnode-id="514" name="travel-binoculars"><h3 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Travel Binoculars</span></h3></a><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">
Most seasoned travelers compromise on things like objective lens size and exit 
pupil for a more compact and lighter weight binocular.  These features allow the 
instrument to be taken in carryon luggage and, if small roof prisms, easily slipped 
into a pocket at your destination.  Unless you have a particular interest or need, 
a magnification power between 7 and 10 will serve your needs wonderfully.  Since 
your objective lens size will be relatively small (technically, above 30mm is no 
longer a compact binocular), good quality optics will help to compensate for the 
limited light gathering ability.  
</span></p><span data-dcnode-id="510" instrument_node="">
</span><div class="ColumnRight noprint" data-dcnode-id="499"><span data-dcnode-id="509" instrument_node="">
</span><span data-dcnode-id="507" instrument_node="">
</span><span data-dcnode-id="505" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4492876046856997" data-ad-slot="2511860208" data-dcnode-id="504" style="display:inline-block;width:250px;height:250px"></ins><span data-dcnode-id="503" instrument_node="">
</span><span data-dcnode-id="500" instrument_node="">
</span></div><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">
We've used a compact reverse Porro prism binocular for a travel optic for years.  Its 
compact size and light weight has made it ideal when traveling by car, plane, and train 
in the United States and other countries.  However, we also believe in traveling as 
lightly as possible - frequently taking only carry-on luggage when flying.  In such 
instances, we're likely to take a good monocular to further reduce our weight and size.  
</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">
Monoculars are now available in a wider variety of configurations than ever before and 
are of a higher quality.  You can now easily find fully multi-coated and waterproof/fog-proof 
monoculars that are excellent travel companions.  We highly recommend taking a monocular 
when your circumstances don't allow you to carry a binocular!  
</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">
A general conclusion - the best phase-corrected roof-prism binoculars your budget will stretch for 
are the best long-term purchase regardless of whether you're buying compacts or full-size 
binoculars.  The same goes for monoculars.  There is plenty of intermediate ground, however, 
with good optics, construction, and pricing!
</span></p><span data-dcnode-id="489" instrument_node="">
</span><span data-dcnode-id="485" instrument_node=""> </span><span data-dcnode-id="483" instrument_node="">

</span><h4 data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">OTHER PAGES YOU MIGHT LIKE</span></h4><span data-dcnode-id="463" instrument_node="">
