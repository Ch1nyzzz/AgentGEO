</span><h2 class="entry-title" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Telescopes</span></h2><span data-dcnode-id="897" instrument_node="">
</span><div class="standard post-184 chapter type-chapter status-publish hentry" data-dcnode-id="112" id="post-184"><span data-dcnode-id="896" instrument_node="">
</span><div class="entry-content" data-dcnode-id="115"><span data-dcnode-id="895" instrument_node="">
</span><div class="textbox learning-objectives" data-dcnode-id="875"><span data-dcnode-id="894" instrument_node="">
</span><h3 data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Learning Objectives</span></h3><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">By the end of this section, you will be able to:</span></p><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="877"><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Describe the three basic components of a modern system for measuring astronomical sources</span></li><span data-dcnode-id="884" instrument_node="">
</span><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Describe the main functions of a telescope</span></li><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Describe the two basic types of visible-light telescopes and how they form images</span></li><span data-dcnode-id="878" instrument_node="">
</span></ul><span data-dcnode-id="876" instrument_node="">
</span></div><span data-dcnode-id="874" instrument_node="">
</span><h2 data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Systems for Measuring Radiation</span></h2><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="870" instrument_node="">There are three basic components of a modern system for measuring radiation from astronomical sources. First, there is a </span><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">telescope</span></strong><span data-dcnode-id="867" instrument_node="">, which serves as a “bucket” for collecting visible light (or radiation at other wavelengths, as shown in Figure 1. Just as you can catch more rain with a garbage can than with a coffee cup, large telescopes gather much more light than your eye can. Second, there is an instrument attached to the telescope that sorts the incoming radiation by wavelength. Sometimes the sorting is fairly crude. For example, we might simply want to separate blue light from red light so that we can determine the temperature of a star. But at other times, we want to see individual spectral lines to determine what an object is made of, or to measure its speed (as explained in the </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.lumenlearning.com/astronomy/chapter/telescopes/chapter/introduction-to-radiation-and-spectra/" rel="noopener" target="_blank"><span data-dcnode-id="866" instrument_node="">Radiation and Spectra</span></a><span data-dcnode-id="864" instrument_node=""> chapter). Third, we need some type of </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">detector</span></strong><span data-dcnode-id="861" instrument_node="">, a device that senses the radiation in the wavelength regions we have chosen and permanently records the observations.</span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="850" style="width: 959px"><img alt="Three images of the constellation of Orion in different wavelengths of light. On the left (a) is a visible light image, with straight lines connecting the bright stars to form the outline of the constellation, which is that of a man. Below the three stars that form Orion’s belt in the center of the image is the famous Orion nebula. Image (b) shows the same area in X-rays. As only a few of the stars seen in visible light are seen in X-rays, the outline of the constellation has been omitted. Numerous very bright stars and other distant sources are prominent. Lastly, on the right (c), is an infrared image. Some of the stars are visible, so the outline is again presented. The image is nearly covered with delicate wisps of nebulosity which get quite bright and dense in the vicinity of the Orion nebula." class="" data-dcnode-id="858" data-media-type="image/jpeg" height="399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images/wp-content/uploads/sites/1095/2016/11/03155059/OSC_Astro_06_01_Originsky.jpg&amp;raw" width="949"><p data-dcnode-id="857"></p><span data-dcnode-id="856" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="852"><strong data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Figure 1: Orion Region at Different Wavelengths. </span></strong><span data-dcnode-id="853" instrument_node=""> The same part of the sky looks different when observed with instruments that are sensitive to different bands of the spectrum. (a) Visible light: this shows part of the Orion region as the human eye sees it, with dotted lines added to show the figure of the mythical hunter, Orion. (b) X-rays: here, the view emphasizes the point-like X-ray sources nearby. The colors are artificial, changing from yellow to white to blue with increasing energy of the X-rays. The bright, hot stars in Orion are still seen in this image, but so are many other objects located at very different distances, including other stars, star corpses, and galaxies at the edge of the observable universe. (c) Infrared radiation: here, we mainly see the glowing dust in this region. (credit a: modification of work by Howard McCallon/NASA/IRAS; credit b: modification of work by Howard McCallon/NASA/IRAS; credit c: modification of work by Michael F. Corcoran)</span></p><span data-dcnode-id="851" instrument_node="">
</span></div><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The history of the development of astronomical telescopes is about how new technologies have been applied to improve the efficiency of these three basic components: the telescopes, the wavelength-sorting device, and the detectors. Let’s first look at the development of the telescope.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">Many ancient cultures&nbsp;&nbsp;built special sites for observing the sky (Figure 2). At these ancient </span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">observatories</span></em><span data-dcnode-id="842" instrument_node="">, they could measure the positions of celestial objects, mostly to keep track of time and date. Many of these ancient observatories had religious and ritual functions as well. The eye was the only device available to gather light, all of the colors in the light were observed at once, and the only permanent record of the observations was made by human beings writing down or sketching what they saw.</span></p><span data-dcnode-id="840" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="831" style="width: 960px"><img alt="Two photographs of pre-telescopic observatories. At left (a) is a photo of the ruins of Machu Picchu in Peru. On the right (b) is a photo of the stone monoliths, with lintels, at Stonehenge in England." class="" data-dcnode-id="839" data-media-type="image/jpeg" height="374" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images/wp-content/uploads/sites/1095/2016/11/03155102/OSC_Astro_06_01_Observator.jpg&amp;raw" width="950"><p data-dcnode-id="838"></p><span data-dcnode-id="837" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="833"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Figure 2: Two Pre-Telescopic Observatories.</span></strong><span data-dcnode-id="834" instrument_node=""> (a) Machu Picchu is a fifteenth century Incan site located in Peru. (b) Stonehenge, a prehistoric site (3000–2000 BCE), is located in England. (credit a: modification of work by Allard Schmidt)</span></p><span data-dcnode-id="832" instrument_node="">
</span></div><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="829" instrument_node="">While Hans&nbsp;</span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Lippershey</span></strong><span data-dcnode-id="826" instrument_node="">, Zaccharias </span><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Janssen</span></strong><span data-dcnode-id="823" instrument_node="">, and Jacob </span><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Metius</span></strong><span data-dcnode-id="820" instrument_node=""> are all credited with the invention of the telescope around 1608—applying for patents within weeks of each other—it was </span><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Galileo</span></strong><span data-dcnode-id="817" instrument_node=""> who, in 1610, used this simple tube with lenses (which he called a spyglass) to observe the sky and gather more light than his eyes alone could. Even his small telescope—used over many nights—revolutionized ideas about the nature of the planets and the position of Earth.</span></p><span data-dcnode-id="815" instrument_node="">
</span><h2 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">How Telescopes Work</span></h2><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Telescopes have come a long way since Galileo’s time. Now they tend to be huge devices; the most expensive cost hundreds of millions to billions of dollars. (To provide some reference point, however, keep in mind that just renovating college football stadiums typically costs hundreds of millions of dollars—with the most expensive recent renovation, at Texas A&amp;M University’s Kyle Field, costing $450 million.) The reason astronomers keep building bigger and bigger telescopes is that celestial objects—such as planets, stars, and galaxies—send much more light to Earth than any human eye (with its tiny opening) can catch, and bigger telescopes can detect fainter objects. If you have ever watched the stars with a group of friends, you know that there’s plenty of starlight to go around; each of you can see each of the stars. If a thousand more people were watching, each of them would also catch a bit of each star’s light. Yet, as far as you are concerned, the light not shining into your eye is wasted. It would be great if some of this “wasted” light could also be captured and brought to your eye. This is precisely what a telescope does.</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="808" instrument_node="">The most important functions of a telescope are (1) to </span><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">collect</span></em><span data-dcnode-id="805" instrument_node=""> the faint light from an astronomical source and (2) to </span><em data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">focus</span></em><span data-dcnode-id="802" instrument_node=""> all the light into a point or an image. Most objects of interest to astronomers are extremely faint: the more light we can collect, the better we can study such objects. (And remember, even though we are focusing on visible light first, there are many telescopes that collect other kinds of electromagnetic radiation.)</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Telescopes that collect visible radiation use a lens or mirror to gather the light. Other types of telescopes may use collecting devices that look very different from the lenses and mirrors with which we are familiar, but they serve the same function. In all types of telescopes, the light-gathering ability is determined by the area of the device acting as the light-gathering “bucket.” Since most telescopes have mirrors or lenses, we can compare their light-gathering power by comparing the apertures, or diameters, of the opening through which light travels or reflects.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="796" instrument_node="">The amount of light a telescope can collect increases with the size of the aperture. A telescope with a mirror that is 4 meters in diameter can collect 16 times as much light as a telescope that is 1 meter in diameter. (The diameter is squared because the area of a circle equals π</span><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">d</span></em><sup data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">2</span></sup><span data-dcnode-id="791" instrument_node="">/4, where </span><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">d</span></em><span data-dcnode-id="788" instrument_node=""> is the diameter of the circle.)</span></p><span data-dcnode-id="786" instrument_node="">
</span><div class="textbox examples" data-dcnode-id="318"><span data-dcnode-id="785" instrument_node="">
</span><h3 data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Example 1: Calculating the Light-Collecting Area</span></h3><span data-dcnode-id="782" instrument_node="">

</span><div class="hidden-answer" data-dcnode-id="322" id="q903654" style="display: none"><span class="MathJax_Preview" data-dcnode-id="402" style="color: inherit; display: none;"></span><span class="mjx-chtml MathJax_CHTML" data-dcnode-id="326" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mfrac><mrow><mn>12.6</mn><msup><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mtext>m</mtext></mrow><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mn>2</mn></mrow></msup></mrow><mrow><mn>0.79</mn><msup><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mtext>m</mtext></mrow><mrow class=&quot;MJX-TeXAtom-ORD&quot;><mn>2</mn></mrow></msup></mrow></mfrac><mo>=</mo><mn>16</mn></math>" id="MathJax-Element-4-Frame" role="presentation" style="font-size: 121%; position: relative;" tabindex="0"><span aria-hidden="true" class="mjx-math" data-dcnode-id="354" id="MJXc-Node-98"><span class="mjx-mrow" data-dcnode-id="355" id="MJXc-Node-99"><span class="mjx-mfrac" data-dcnode-id="362" id="MJXc-Node-100"><span class="mjx-box MJXc-stacked" data-dcnode-id="364" style="width: 2.263em; padding: 0px 0.12em;"><span class="mjx-numerator" data-dcnode-id="384" style="font-size: 70.7%; width: 3.2em; top: -1.497em;"><span class="mjx-mrow" data-dcnode-id="385" id="MJXc-Node-101" style=""><span class="mjx-mn" data-dcnode-id="399" id="MJXc-Node-102"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="400" style="padding-top: 0.405em; padding-bottom: 0.347em;"><span data-dcnode-id="401" instrument_node="">12.6</span></span></span><span class="mjx-msubsup" data-dcnode-id="386" id="MJXc-Node-103"><span class="mjx-base" data-dcnode-id="393"><span class="mjx-texatom" data-dcnode-id="394" id="MJXc-Node-104"><span class="mjx-mrow" data-dcnode-id="395" id="MJXc-Node-105"><span class="mjx-mtext" data-dcnode-id="396" id="MJXc-Node-106"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="397" style="padding-top: 0.175em; padding-bottom: 0.347em;"><span data-dcnode-id="398" instrument_node="">m</span></span></span></span></span></span><span class="mjx-sup" data-dcnode-id="387" style="font-size: 70.7%; vertical-align: 0.513em; padding-left: 0px; padding-right: 0.071em;"><span class="mjx-texatom" data-dcnode-id="388" id="MJXc-Node-107" style=""><span class="mjx-mrow" data-dcnode-id="389" id="MJXc-Node-108"><span class="mjx-mn" data-dcnode-id="390" id="MJXc-Node-109"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="391" style="padding-top: 0.405em; padding-bottom: 0.347em;"><span data-dcnode-id="392" instrument_node="">2</span></span></span></span></span></span></span></span></span><span class="mjx-denominator" data-dcnode-id="366" style="font-size: 70.7%; width: 3.2em; bottom: -0.716em;"><span class="mjx-mrow" data-dcnode-id="367" id="MJXc-Node-110" style=""><span class="mjx-mn" data-dcnode-id="381" id="MJXc-Node-111"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="382" style="padding-top: 0.405em; padding-bottom: 0.347em;"><span data-dcnode-id="383" instrument_node="">0.79</span></span></span><span class="mjx-msubsup" data-dcnode-id="368" id="MJXc-Node-112"><span class="mjx-base" data-dcnode-id="375"><span class="mjx-texatom" data-dcnode-id="376" id="MJXc-Node-113"><span class="mjx-mrow" data-dcnode-id="377" id="MJXc-Node-114"><span class="mjx-mtext" data-dcnode-id="378" id="MJXc-Node-115"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="379" style="padding-top: 0.175em; padding-bottom: 0.347em;"><span data-dcnode-id="380" instrument_node="">m</span></span></span></span></span></span><span class="mjx-sup" data-dcnode-id="369" style="font-size: 70.7%; vertical-align: 0.409em; padding-left: 0px; padding-right: 0.071em;"><span class="mjx-texatom" data-dcnode-id="370" id="MJXc-Node-116" style=""><span class="mjx-mrow" data-dcnode-id="371" id="MJXc-Node-117"><span class="mjx-mn" data-dcnode-id="372" id="MJXc-Node-118"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="373" style="padding-top: 0.405em; padding-bottom: 0.347em;"><span data-dcnode-id="374" instrument_node="">2</span></span></span></span></span></span></span></span></span><span class="mjx-line" data-dcnode-id="365" style="border-bottom: 1.3px solid; top: -0.286em; width: 2.263em;"></span></span><span class="mjx-vsize" data-dcnode-id="363" style="height: 1.565em; vertical-align: -0.506em;"></span></span><span class="mjx-mo MJXc-space3" data-dcnode-id="359" id="MJXc-Node-119"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="360" style="padding-top: 0.06em; padding-bottom: 0.29em;"><span data-dcnode-id="361" instrument_node="">=</span></span></span><span class="mjx-mn MJXc-space3" data-dcnode-id="356" id="MJXc-Node-120"><span class="mjx-char MJXc-TeX-main-R" data-dcnode-id="357" style="padding-top: 0.405em; padding-bottom: 0.347em;"><span data-dcnode-id="358" instrument_node="">16</span></span></span></span></span><span class="MJX_Assistive_MathML" data-dcnode-id="327" role="presentation"><math data-dcnode-id="328" xmlns="http://www.w3.org/1998/Math/MathML"><mfrac data-dcnode-id="333"><mrow data-dcnode-id="344"><mn data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">12.6</span></mn><msup data-dcnode-id="345"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="349"><mtext data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">m</span></mtext></mrow><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="346"><mn data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">2</span></mn></mrow></msup></mrow><mrow data-dcnode-id="334"><mn data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">0.79</span></mn><msup data-dcnode-id="335"><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="339"><mtext data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">m</span></mtext></mrow><mrow class="MJX-TeXAtom-ORD" data-dcnode-id="336"><mn data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">2</span></mn></mrow></msup></mrow></mfrac><mo data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">=</span></mo><mn data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">16</span></mn></math></span></span><span data-dcnode-id="323" instrument_node="">. Therefore, with 16 times the area, a 4-m telescope collects 16 times the light of a 1-m telescope.</span></div><span data-dcnode-id="321" instrument_node="">
</span></div><span data-dcnode-id="319" instrument_node="">
</span></div><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">After the telescope forms an image, we need some way to detect and record it so that we can measure, reproduce, and analyze the image in various ways. Before the nineteenth century, astronomers simply viewed images with their eyes and wrote descriptions of what they saw. This was very inefficient and did not lead to a very reliable long-term record; you know from crime shows on television that eyewitness accounts are often inaccurate.</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">In the nineteenth century, the use of photography became widespread. In those days, photographs were a chemical record of an image on a specially treated glass plate. Today, the image is generally detected with sensors similar to those in digital cameras, recorded electronically, and stored in computers. This permanent record can then be used for detailed and quantitative studies. Professional astronomers rarely look through the large telescopes that they use for their research.</span></p><span data-dcnode-id="311" instrument_node="">
</span><h2 data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Formation of an Image by a Lens or a Mirror</span></h2><span data-dcnode-id="308" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="299" style="width: 459px"><img alt="Diagram of a simple lens. At left is a drawing of a convex lens seen in profile. It looks a bit like an American football. Parallel light rays enter the lens from the left and are bent inward to the right as the now converging rays exit the lens. The rays meet some distance from the lens at what is known, and labeled as, the focus. Also labeled is the focal length, which is the distance from the lens to the focus point." class="" data-dcnode-id="307" data-media-type="image/jpeg" height="288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images/wp-content/uploads/sites/1095/2016/11/03155105/OSC_Astro_06_01_Simplelens.jpg&amp;raw" width="449"><p data-dcnode-id="306"></p><span data-dcnode-id="305" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="301"><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Figure 3: Formation of an Image by a Simple Lens. </span></strong><span data-dcnode-id="302" instrument_node=""> Parallel rays from a distant source are bent by the convex lens so that they all come together in a single place (the focus) to form an image.</span></p><span data-dcnode-id="300" instrument_node="">
</span></div><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="297" instrument_node="">Whether or not you wear glasses, you see the world through lenses; they are key elements of your eyes. A lens is a transparent piece of material that bends the rays of light passing through it. If the light rays are parallel as they enter, the lens brings them together in one place to form an image (Figure 3). If the curvatures of the lens surfaces are just right, all parallel rays of light (say, from a star) are bent, or </span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">refracted</span></em><span data-dcnode-id="294" instrument_node="">, in such a way that they converge toward a point, called the focus of the lens. At the focus, an image of the light source appears. In the case of parallel light rays, the distance from the lens to the location where the light rays focus, or image, behind the lens is called the </span><em data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">focal length</span></em><span data-dcnode-id="291" instrument_node=""> of the lens.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">As you look at Figure 3&nbsp;you may ask why two rays of light from the same star would be parallel to each other. After all, if you draw a picture of star shining in all directions, the rays of light coming from the star don’t look parallel at all. But remember that the stars (and other astronomical objects) are all extremely far away. By the time the few rays of light pointed toward us actually arrive at Earth, they are, for all practical purposes, parallel to each other. Put another way, any rays that were </span><em data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">not</span></em><span data-dcnode-id="285" instrument_node=""> parallel to the ones pointed at Earth are now heading in some very different direction in the universe.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">To view the image formed by the lens in a telescope, we use an additional lens called an eyepiece. The eyepiece focuses the image at a distance that is either directly viewable by a human or at a convenient place for a detector. Using different eyepieces, we can change the </span><em data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">magnification</span></em><span data-dcnode-id="279" instrument_node=""> (or size) of the image and also redirect the light to a more accessible location. Stars look like points of light, and magnifying them makes little difference, but the image of a planet or a galaxy, which has structure, can often benefit from being magnified.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="276" instrument_node="">Many people, when thinking of a telescope, picture a long tube with a large glass lens at one end. This design, which uses a lens as its main optical element to form an image, as we have been discussing, is known as a </span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">refractor</span></em><span data-dcnode-id="273" instrument_node="">&nbsp;(Figure 4)&nbsp;and a telescope based on this design is called a refracting telescope. Galileo’s telescopes were refractors, as are today’s binoculars and field glasses. However, there is a limit to the size of a refracting telescope. The largest one ever built was a 49-inch refractor built for the Paris 1900 Exposition, and it was dismantled after the Exposition. Currently, the largest refracting telescope is the 40-inch refractor at Yerkes Observatory in Wisconsin.</span></p><span data-dcnode-id="271" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="262" style="width: 660px"><img alt="Illustrations of refracting and reflecting telescopes. At left (b) is a refracting telescope. At the telescope opening at the top of the image is a convex lens. Parallel light rays enter the telescope and are bent toward each other. The converging rays travel down the tube to the focus at the end of the telescope. An eyepiece or camera can be placed at the focus. On the right (b) is a reflecting telescope. Parallel rays of light enter the telescope tube at the top of the illustration, travelling downward until they strike the concave mirror at the base of the tube. The reflected light is sent, converging, back up the tube until it strikes a flat mirror which then sends the light out the side of the telescope tube to an eyepiece or camera." class="" data-dcnode-id="270" data-media-type="image/jpeg" height="487" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images/wp-content/uploads/sites/1095/2016/11/03155107/OSC_Astro_06_01_RTelescope.jpg&amp;raw" width="650"><p data-dcnode-id="269"></p><span data-dcnode-id="268" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="264"><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Figure 4: Refracting and Reflecting Telescopes.</span></strong><span data-dcnode-id="265" instrument_node=""> Light enters a refracting telescope through a lens at the upper end, which focuses the light near the bottom of the telescope. An eyepiece then magnifies the image so that it can be viewed by the eye, or a detector like a photographic plate can be placed at the focus. The upper end of a reflecting telescope is open, and the light passes through to the mirror located at the bottom of the telescope. The mirror then focuses the light at the top end, where it can be detected. Alternatively, as in this sketch, a second mirror may reflect the light to a position outside the telescope structure, where an observer can have easier access to it. Professional astronomers’ telescopes are more complicated than this, but they follow the same principles of reflection and refraction.</span></p><span data-dcnode-id="263" instrument_node="">
</span></div><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="260" instrument_node="">One problem with a refracting telescope is that the light must pass </span><em data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">through</span></em><span data-dcnode-id="257" instrument_node=""> the lens of a refractor. That means the glass must be perfect all the way through, and it has proven very difficult to make large pieces of glass without flaws and bubbles in them. Also, optical properties of transparent materials change a little bit with the wavelengths (or colors) of light, so there is some additional distortion, known as chromatic aberration. Each wavelength focuses at a slightly different spot, causing the image to appear blurry.</span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">In addition, since the light must pass through the lens, the lens can only be supported around its edges (just like the frames of our eyeglasses). The force of gravity will cause a large lens to sag and distort the path of the light rays as they pass through it. Finally, because the light passes through it, both sides of the lens must be manufactured to precisely the right shape in order to produce a sharp image.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">A different type of telescope uses a concave </span><em data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">primary mirror</span></em><span data-dcnode-id="248" instrument_node=""> as its main optical element. The mirror is curved like the inner surface of a sphere, and it reflects light in order to form an image (Figure 4).&nbsp;Telescope mirrors are coated with a shiny metal, usually silver, aluminum, or, occasionally, gold, to make them highly reflective. If the mirror has the correct shape, all parallel rays are reflected back to the same point, the focus of the mirror. Thus, images are produced by a mirror exactly as they are by a lens.</span></p><span data-dcnode-id="246" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="237" style="width: 710px"><img alt="Diagram of typical reflecting telescopes. Shown are three nearly identical reflecting telescopes. On the left, a prime focus telescope is depicted, where parallel rays of light enter the telescope tube and are then reflected off the surface of a concave mirror at the base of the tube. The reflected rays converge at the focus point which is located a short distance inside the telescope tube from the opening where the light enters. It is here at the prime focus where a detector can be placed. In the middle illustration, a Newtonian focus telescope is shown. It is identical to the prime focus arrangement, except that a small flat mirror is placed at the prime focus to reflect the light to the outside the telescope, where an eyepiece or detector can be placed. Essentially, a Newtonian moves the focus point from within the telescope to outside the telescope. On the right, a Cassegrain focus telescope is shown; as with the Newtonian focus, a prime mirro is placed at the prime focus, but in this telescope the prime focus reflects light back down trhough an opening at the bottom of the telescope." class="" data-dcnode-id="245" data-media-type="image/jpeg" height="443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/courses-images/wp-content/uploads/sites/1095/2016/11/03155109/OSC_Astro_06_01_Focusarran.jpg&amp;raw" width="700"><p data-dcnode-id="244"></p><span data-dcnode-id="243" instrument_node="">
</span><p class="wp-caption-text" data-dcnode-id="239"><strong data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">Figure 5. Focus Arrangements for Reflecting Telescopes: </span></strong><span data-dcnode-id="240" instrument_node=""> Reflecting telescopes have different options for where the light is brought to a focus. With prime focus, light is detected where it comes to a focus after reflecting from the primary mirror. With Newtonian focus, light is reflected by a small secondary mirror off to one side, where it can be detected (see also [link]). Most large professional telescopes have a Cassegrain focus in which light is reflected by the secondary mirror down through a hole in the primary mirror to an observing station below the telescope.</span></p><span data-dcnode-id="238" instrument_node="">
</span></div><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Telescopes designed with mirrors avoid the problems of refracting telescopes. Because the light is reflected from the front surface only, flaws and bubbles within the glass do not affect the path of the light. In a telescope designed with mirrors, only the front surface has to be manufactured to a precise shape, and the mirror can be supported from the back. For these reasons, most astronomical telescopes today (both amateur and professional) use a mirror rather than a lens to form an image; this type of telescope is called a reflecting telescope. The first successful reflecting telescope was built by Isaac Newton in 1668.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="232" instrument_node="">In a reflecting telescope, the concave mirror is placed at the bottom of a tube or open framework. The mirror reflects the light back up the tube to form an image near the front end at a location called the prime focus. The image can be observed at the prime focus, or additional mirrors can intercept the light and redirect it to a position where the observer can view it more easily (Figure 5). Since an astronomer at the prime focus can block much of the light coming to the main mirror, the use of a small </span><em data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">secondary mirror</span></em><span data-dcnode-id="229" instrument_node=""> allows more light to get through the system.</span></p><span data-dcnode-id="227" instrument_node="">
</span><div class="textbox shaded" data-dcnode-id="168"><span data-dcnode-id="226" instrument_node="">
</span><h3 data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Choosing Your Own Telescope</span></h3><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="222" instrument_node="">If the astronomy course you are taking whets your appetite for exploring the sky further, you may be thinking about buying your own telescope. Many excellent amateur telescopes are available, and some research is required to find the best model for your needs. Some good sources of information about personal telescopes are the two popular US magazines aimed at amateur astronomers: </span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Sky &amp; Telescope</span></em><span data-dcnode-id="219" instrument_node=""> and </span><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Astronomy</span></em><span data-dcnode-id="216" instrument_node="">. Both carry regular articles with advice, reviews, and advertisements from reputable telescope dealers.</span></p><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Some of the factors that determine which telescope is right for you depend upon your preferences:</span></p><span data-dcnode-id="211" instrument_node="">
</span><ul data-dcnode-id="200"><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Will you be setting up the telescope in one place and leaving it there, or do you want an instrument that is portable and can come with you on outdoor excursions? How portable should it be, in terms of size and weight?</span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Do you want to observe the sky with your eyes only, or do you want to take photographs? (Long-exposure photography, for example, requires a good clock drive to turn your telescope to compensate for Earth’s rotation.)</span></li><span data-dcnode-id="204" instrument_node="">
</span><li data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">What types of objects will you be observing? Are you interested primarily in comets, planets, star clusters, or galaxies, or do you want to observe all kinds of celestial sights?</span></li><span data-dcnode-id="201" instrument_node="">
</span></ul><span data-dcnode-id="199" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="198" instrument_node="">You may not know the answers to some of these questions yet. For this reason, you may want to “test-drive” some telescopes first. Most communities have amateur astronomy clubs that sponsor star parties open to the public. The members of those clubs often know a lot about telescopes and can share their ideas with you. Your instructor may know where the nearest amateur astronomy club meets; or, to find a club near you, use the websites suggested in </span><a class="target-chapter" data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//courses.lumenlearning.com/contents/5828cbfc-03c0-436c-8efe-264a5de96b94"><span data-dcnode-id="197" instrument_node="">Appendix B</span></a><span data-dcnode-id="195" instrument_node="">.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Furthermore, you may already have an instrument like a telescope at home (or have access to one through a relative or friend). Many amateur astronomers recommend starting your survey of the sky with a good pair of binoculars. These are easily carried around and can show you many objects not visible (or clear) to the unaided eye.</span></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">When you are ready to purchase a telescope, you might find the following ideas useful:</span></p><span data-dcnode-id="187" instrument_node="">
</span><ul data-dcnode-id="170"><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">The key characteristic of a telescope is the aperture of the main mirror or lens; when someone says they have a 6-inch or 8-inch telescope, they mean the diameter of the collecting surface. The larger the aperture, the more light you can gather, and the fainter the objects you can see or photograph.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Telescopes of a given aperture that use lenses (refractors) are typically more expensive than those using mirrors (reflectors) because both sides of a lens must be polished to great accuracy. And, because the light passes through it, the lens must be made of high-quality glass throughout. In contrast, only the front surface of a mirror must be accurately polished.</span></li><span data-dcnode-id="180" instrument_node="">
</span><li data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Magnification is not one of the criteria on which to base your choice of a telescope. As we discussed, the magnification of the image is done by a smaller eyepiece, so the magnification can be adjusted by changing eyepieces. However, a telescope will magnify not only the astronomical object you are viewing but also the turbulence of Earth’s atmosphere. If the magnification is too high, your image will shimmer and shake and be difficult to view. A good telescope will come with a variety of eyepieces that stay within the range of useful magnification.</span></li><span data-dcnode-id="177" instrument_node="">
</span><li data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">The mount of a telescope (the structure on which it rests) is one of its most critical elements. Because a telescope shows a tiny field of view, which is magnified significantly, even the smallest vibration or jarring of the telescope can move the object you are viewing around or out of your field of view. A sturdy and stable mount is essential for serious viewing or photography (although it clearly affects how portable your telescope can be).</span></li><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">A telescope requires some practice to set up and use effectively. Don’t expect everything to go perfectly on your first try. Take some time to read the instructions. If a local amateur astronomy club is nearby, use it as a resource.</span></li><span data-dcnode-id="171" instrument_node="">
</span></ul><span data-dcnode-id="169" instrument_node="">
</span></div><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">A telescope collects the faint light from astronomical sources and brings it to a focus, where an instrument can sort the light according to wavelength. Light is then directed to a detector, where a permanent record is made. The light-gathering power of a telescope is determined by the diameter of its aperture, or opening—that is, by the area of its largest or primary lens or mirror. The primary optical element in a telescope is either a convex lens (in a refracting telescope) or a concave mirror (in a reflector) that brings the light to a focus. Most large telescopes are reflectors; it is easier to manufacture and support large mirrors because the light does not have to pass through glass.</span></p><span data-dcnode-id="164" instrument_node="">
</span><h3 data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Glossary</span></h3><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="157"><strong data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">aperture: </span></strong><span data-dcnode-id="158" instrument_node="">diameter of the primary lens or mirror of a telescope</span></p><span data-dcnode-id="156" instrument_node="">
</span><p data-dcnode-id="152"><strong data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">chromatic aberration: </span></strong><span data-dcnode-id="153" instrument_node="">distortion that causes an image to appear fuzzy when each wavelength coming into a transparent material focuses at a different spot</span></p><span data-dcnode-id="151" instrument_node="">
</span><p data-dcnode-id="147"><strong data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">detector: </span></strong><span data-dcnode-id="148" instrument_node="">device sensitive to electromagnetic radiation that makes a record of astronomical observations</span></p><span data-dcnode-id="146" instrument_node="">
</span><p data-dcnode-id="142"><strong data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">eyepiece: </span></strong><span data-dcnode-id="143" instrument_node="">magnifying lens used to view the image produced by the objective lens or primary mirror of a telescope</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="137"><strong data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">focus: </span></strong><span data-dcnode-id="138" instrument_node="">(of telescope) point where the rays of light converged by a mirror or lens meet</span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="132"><strong data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">prime focus: </span></strong><span data-dcnode-id="133" instrument_node="">point in a telescope where the objective lens or primary mirror focuses the light</span></p><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="127"><strong data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">reflecting telescope: </span></strong><span data-dcnode-id="128" instrument_node="">telescope in which the principal light collector is a concave mirror</span></p><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="122"><strong data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">refracting telescope: </span></strong><span data-dcnode-id="123" instrument_node="">telescope in which the principal light collector is a lens or system of lenses</span></p><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="117"><strong data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">telescope: </span></strong><span data-dcnode-id="118" instrument_node="">instrument for collecting visible-light or other electromagnetic radiation</span></p><span data-dcnode-id="116" instrument_node="">
</span></div><span data-dcnode-id="113" instrument_node="">
