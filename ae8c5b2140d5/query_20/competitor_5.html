data-dcnode-id="1621" instrument_node="">Physical and Orbital Data for the Planets</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1610" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/g-selected-moons-of-the-planets"><span class="os-number" data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">G</span></span><span class="os-divider" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1612" data-type="" itemprop=""><span data-dcnode-id="1613" instrument_node="">Selected Moons of the Planets</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1602" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/h-future-total-eclipses"><span class="os-number" data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">H</span></span><span class="os-divider" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1604" data-type="" itemprop=""><span data-dcnode-id="1605" instrument_node="">Future Total Eclipses</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1594" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/i-the-nearest-stars-brown-dwarfs-and-white-dwarfs"><span class="os-number" data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">I</span></span><span class="os-divider" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1596" data-type="" itemprop=""><span data-dcnode-id="1597" instrument_node="">The Nearest Stars, Brown Dwarfs, and White Dwarfs</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1586" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/j-the-brightest-twenty-stars"><span class="os-number" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">J</span></span><span class="os-divider" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1588" data-type="" itemprop=""><span data-dcnode-id="1589" instrument_node="">The Brightest Twenty Stars</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1578" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/k-the-chemical-elements"><span class="os-number" data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">K</span></span><span class="os-divider" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1580" data-type="" itemprop=""><span data-dcnode-id="1581" instrument_node="">The Chemical Elements</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1570" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/l-the-constellations"><span class="os-number" data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">L</span></span><span class="os-divider" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1572" data-type="" itemprop=""><span data-dcnode-id="1573" instrument_node="">The Constellations</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1562" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/m-star-chart-and-sky-event-resources"><span class="os-number" data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">M</span></span><span class="os-divider" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node=""> | </span></span><span class="os-text" data-dcnode-id="1564" data-type="" itemprop=""><span data-dcnode-id="1565" instrument_node="">Star Chart and Sky Event Resources</span></span></a></li><li class="styled__NavItem-sc-18yti3s-2 lcPtic" data-dcnode-id="1558" data-type="page"><a class="styled__ContentLink-sc-18yti3s-1 cRIWDW" data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/index"><span class="os-text" data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">Index</span></span></a></li></ol></div><div class="ContentPane__Wrapper-sc-6et83r-0 kpTBXq" data-dcnode-id="312"><div class="Content__UndoPadding-sc-1f451g1-3 iqlTSL" data-dcnode-id="313"><div class="Content__MainContentWrapper-sc-1f451g1-4 hGEkST" data-dcnode-id="314"><div class="MinPageHeight-sc-1i28xs0-0 hxgCaZ" data-dcnode-id="474"><div class="RedoPadding-sc-1rj2rww-0 gaOlpC" data-dcnode-id="475"><div class="page-content PageContent-ny9bj0-0 cXwdbF" data-dcnode-id="490" tabindex="0"><div class="MainContent__HideOutline-sc-6yy1if-0 bdVAq sc-bdVaJa ibTDPh" data-dcnode-id="491" data-dynamic-style="false" id="main-content" tabindex="-1"><div class="chapter-content-module" data-cnxml-to-html-ver="2.8.0" data-dcnode-id="492" data-type="page" id="page_7c547388-eced-47de-80c9-4826b072356e"><span data-dcnode-id="1555" instrument_node="">
</span><section class="learning-objectives" data-dcnode-id="1536" data-depth="1" id="fs-id1167469570419"><h3 data-dcnode-id="1553" data-type="title"><span data-dcnode-id="1554" instrument_node="">Learning Objectives</span></h3><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550" id="fs-id1168584309971"><span data-dcnode-id="1551" instrument_node="">By the end of this section, you will be able to:</span></p><span data-dcnode-id="1549" instrument_node="">
</span><ul data-dcnode-id="1538" id="fs-id1167469684878"><span data-dcnode-id="1548" instrument_node="">
</span><li data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Describe the three basic components of a modern system for measuring astronomical sources</span></li><span data-dcnode-id="1545" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Describe the main functions of a telescope</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Describe the two basic types of visible-light telescopes and how they form images</span></li><span data-dcnode-id="1539" instrument_node="">
</span></ul><span data-dcnode-id="1537" instrument_node="">
</span></section><span data-dcnode-id="1535" instrument_node="">
</span><section data-dcnode-id="1429" data-depth="1" id="fs-id1167469759610"><h3 data-dcnode-id="1533" data-type="title"><span data-dcnode-id="1534" instrument_node="">Systems for Measuring Radiation</span></h3><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1518" id="fs-id1167469822819"><span data-dcnode-id="1531" instrument_node="">There are three basic components of a modern system for measuring radiation from astronomical sources. First, there is a </span><span data-dcnode-id="1529" data-type="term" group-by="t" id="term225"><span data-dcnode-id="1530" instrument_node="">telescope</span></span><span data-dcnode-id="1528" instrument_node="">, which serves as a “bucket” for collecting visible light (or radiation at other wavelengths, as shown in (</span><a class="autogenerated-content" data-dcnode-id="1526" href="#OSC_Astro_06_01_Originsky"><span data-dcnode-id="1527" instrument_node="">Figure 6.2</span></a><span data-dcnode-id="1525" instrument_node="">). Just as you can catch more rain with a garbage can than with a coffee cup, large telescopes gather much more light than your eye can. Second, there is an instrument attached to the telescope that sorts the incoming radiation by wavelength. Sometimes the sorting is fairly crude. For example, we might simply want to separate blue light from red light so that we can determine the temperature of a star. But at other times, we want to see individual spectral lines to determine what an object is made of, or to measure its speed (as explained in the </span><a data-dcnode-id="1523" data-page-fragment="" data-page-slug="5-thinking-ahead" data-page-uuid="bc5ce180-f2b3-4469-a882-22bf96435c99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/5-thinking-ahead"><span data-dcnode-id="1524" instrument_node="">Radiation and Spectra</span></a><span data-dcnode-id="1522" instrument_node=""> chapter). Third, we need some type of </span><span data-dcnode-id="1520" data-type="term" group-by="d" id="term226"><span data-dcnode-id="1521" instrument_node="">detector</span></span><span data-dcnode-id="1519" instrument_node="">, a device that senses the radiation in the wavelength regions we have chosen and permanently records the observations.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><div class="os-figure" data-dcnode-id="1488" id="OSC_Astro_06_01_Originsky"><figure data-dcnode-id="1510" data-id="OSC_Astro_06_01_Originsky"><span data-dcnode-id="1516" instrument_node="">
</span><span data-alt="Three images of the constellation of Orion in different wavelengths of light. On the left (a) is a visible light image, with straight lines connecting the bright stars to form the outline of the constellation, which is that of a man. Below the three stars that form Orion’s belt in the center of the image is the famous Orion nebula. Image (b) shows the same area in X-rays. As only a few of the stars seen in visible light are seen in X-rays, the outline of the constellation has been omitted. Numerous very bright stars and other distant sources are prominent. Lastly, on the right (c), is an infrared image. Some of the stars are visible, so the outline is again presented. The image is nearly covered with delicate wisps of nebulosity which get quite bright and dense in the vicinity of the Orion nebula." data-dcnode-id="1512" data-type="media" id="fs-id1167469817911"><span data-dcnode-id="1515" instrument_node="">
</span><img alt="Three images of the constellation of Orion in different wavelengths of light. On the left (a) is a visible light image, with straight lines connecting the bright stars to form the outline of the constellation, which is that of a man. Below the three stars that form Orion’s belt in the center of the image is the famous Orion nebula. Image (b) shows the same area in X-rays. As only a few of the stars seen in visible light are seen in X-rays, the outline of the constellation has been omitted. Numerous very bright stars and other distant sources are prominent. Lastly, on the right (c), is an infrared image. Some of the stars are visible, so the outline is again presented. The image is nearly covered with delicate wisps of nebulosity which get quite bright and dense in the vicinity of the Orion nebula." data-dcnode-id="1514" data-media-type="image/jpeg" id="2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/90e8dd7381461b7497009c8adfb59628106ca3e2&amp;raw"><span data-dcnode-id="1513" instrument_node="">
</span></span><span data-dcnode-id="1511" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="1490"><span data-dcnode-id="1509" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Figure </span></span><span data-dcnode-id="1506" instrument_node="">
</span><span class="os-number" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">6.2</span></span><span data-dcnode-id="1503" instrument_node="">

</span><span class="os-title" data-dcnode-id="1498" data-type="title" id="1"><span data-dcnode-id="1499" instrument_node="">Orion Region at Different Wavelengths.</span></span><span data-dcnode-id="1497" instrument_node="">
</span><span class="os-divider" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node=""> </span></span><span data-dcnode-id="1494" instrument_node="">
</span><span class="os-caption" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">The same part of the sky looks different when observed with instruments that are sensitive to different bands of the spectrum. (a) Visible light: this shows part of the Orion region as the human eye sees it, with dotted lines added to show the figure of the mythical hunter, Orion. (b) X-rays: here, the view emphasizes the point-like X-ray sources nearby. The colors are artificial, changing from yellow to white to blue with increasing energy of the X-rays. The bright, hot stars in Orion are still seen in this image, but so are many other objects located at very different distances, including other stars, star corpses, and galaxies at the edge of the observable universe. (c) Infrared radiation: here, we mainly see the glowing dust in this region. (credit a: modification of work by Howard McCallon/NASA/IRAS; credit b: modification of work by Howard McCallon/NASA/IRAS; credit c: modification of work by Michael F. Corcoran)</span></span><span data-dcnode-id="1491" instrument_node="">
</span></div><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485" id="fs-id1167469466210"><span data-dcnode-id="1486" instrument_node="">The history of the development of astronomical telescopes is about how new technologies have been applied to improve the efficiency of these three basic components: the telescopes, the wavelength-sorting device, and the detectors. Let’s first look at the development of the telescope.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1476" id="fs-id1167469466567"><span data-dcnode-id="1483" instrument_node="">Many ancient cultures built special sites for observing the sky (</span><a class="autogenerated-content" data-dcnode-id="1481" href="#OSC_Astro_06_01_Observator"><span data-dcnode-id="1482" instrument_node="">Figure 6.3</span></a><span data-dcnode-id="1480" instrument_node="">). At these ancient </span><em data-dcnode-id="1478" data-effect="italics"><span data-dcnode-id="1479" instrument_node="">observatories</span></em><span data-dcnode-id="1477" instrument_node="">, they could measure the positions of celestial objects, mostly to keep track of time and date. Many of these ancient observatories had religious and ritual functions as well. The eye was the only device available to gather light, all of the colors in the light were observed at once, and the only permanent record of the observations was made by human beings writing down or sketching what they saw.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><div class="os-figure" data-dcnode-id="1446" id="OSC_Astro_06_01_Observator"><figure data-dcnode-id="1468" data-id="OSC_Astro_06_01_Observator"><span data-dcnode-id="1474" instrument_node="">
</span><span data-alt="Two photographs of pre-telescopic observatories. At left (a) is a photo of the ruins of Machu Picchu in Peru. On the right (b) is a photo of the stone monoliths, with lintels, at Stonehenge in England." data-dcnode-id="1470" data-type="media" id="fs-id1167469789436"><span data-dcnode-id="1473" instrument_node="">
</span><img alt="Two photographs of pre-telescopic observatories. At left (a) is a photo of the ruins of Machu Picchu in Peru. On the right (b) is a photo of the stone monoliths, with lintels, at Stonehenge in England." data-dcnode-id="1472" data-media-type="image/jpeg" id="4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/a348c5d64869636aa0d6c2c37ff84e2a3fd706dc&amp;raw"><span data-dcnode-id="1471" instrument_node="">
</span></span><span data-dcnode-id="1469" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="1448"><span data-dcnode-id="1467" instrument_node="">

</span></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1431" id="fs-id1167469574129"><span data-dcnode-id="1444" instrument_node="">While Hans </span><span class="no-emphasis" data-dcnode-id="1442" data-type="term" group-by="L" id="term227"><span data-dcnode-id="1443" instrument_node="">Lippershey</span></span><span data-dcnode-id="1441" instrument_node="">, Zaccharias </span><span class="no-emphasis" data-dcnode-id="1439" data-type="term" group-by="J" id="term228"><span data-dcnode-id="1440" instrument_node="">Janssen</span></span><span data-dcnode-id="1438" instrument_node="">, and Jacob </span><span class="no-emphasis" data-dcnode-id="1436" data-type="term" group-by="M" id="term229"><span data-dcnode-id="1437" instrument_node="">Metius</span></span><span data-dcnode-id="1435" instrument_node=""> are all credited with the invention of the telescope around 1608—applying for patents within weeks of each other—it was </span><span class="no-emphasis" data-dcnode-id="1433" data-type="term" group-by="G" id="term230"><span data-dcnode-id="1434" instrument_node="">Galileo</span></span><span data-dcnode-id="1432" instrument_node=""> who, in 1610, used this simple tube with lenses (which he called a spyglass) to observe the sky and gather more light than his eyes alone could. Even his small telescope—used over many nights—revolutionized ideas about the nature of the planets and the position of Earth.</span></p><span data-dcnode-id="1430" instrument_node="">
</span></section><span data-dcnode-id="1428" instrument_node="">
</span><section data-dcnode-id="745" data-depth="1" id="fs-id1167469716818"><h3 data-dcnode-id="1426" data-type="title"><span data-dcnode-id="1427" instrument_node="">How Telescopes Work</span></h3><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1423" id="fs-id1167469716772"><span data-dcnode-id="1424" instrument_node="">Telescopes have come a long way since Galileo’s time. Now they tend to be huge devices; the most expensive cost hundreds of millions to billions of dollars. (To provide some reference point, however, keep in mind that just renovating college football stadiums typically costs hundreds of millions of dollars—with the most expensive recent renovation, at Texas A&amp;M University’s Kyle Field, costing $450 million.) The reason astronomers keep building bigger and bigger telescopes is that celestial objects—such as planets, stars, and galaxies—send much more light to Earth than any human eye (with its tiny opening) can catch, and bigger telescopes can detect fainter objects. If you have ever watched the stars with a group of friends, you know that there’s plenty of starlight to go around; each of you can see each of the stars. If a thousand more people were watching, each of them would also catch a bit of each star’s light. Yet, as far as you are concerned, the light not shining into your eye is wasted. It would be great if some of this “wasted” light could also be captured and brought to your eye. This is precisely what a telescope does.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1414" id="fs-id1167469454657"><span data-dcnode-id="1421" instrument_node="">The most important functions of a telescope are (1) to </span><em data-dcnode-id="1419" data-effect="italics"><span data-dcnode-id="1420" instrument_node="">collect</span></em><span data-dcnode-id="1418" instrument_node=""> the faint light from an astronomical source and (2) to </span><em data-dcnode-id="1416" data-effect="italics"><span data-dcnode-id="1417" instrument_node="">focus</span></em><span data-dcnode-id="1415" instrument_node=""> all the light into a point or an image. Most objects of interest to astronomers are extremely faint: the more light we can collect, the better we can study such objects. (And remember, even though we are focusing on visible light first, there are many telescopes that collect other kinds of electromagnetic radiation.)</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1408" id="fs-id1167469739039"><span data-dcnode-id="1412" instrument_node="">Telescopes that collect visible radiation use a lens or mirror to gather the light. Other types of telescopes may use collecting devices that look very different from the lenses and mirrors with which we are familiar, but they serve the same function. In all types of telescopes, the light-gathering ability is determined by the area of the device acting as the light-gathering “bucket.” Since most telescopes have mirrors or lenses, we can compare their light-gathering power by comparing the </span><span data-dcnode-id="1410" data-type="term" group-by="a" id="term231"><span data-dcnode-id="1411" instrument_node="">apertures</span></span><span data-dcnode-id="1409" instrument_node="">, or diameters, of the opening through which light travels or reflects.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1397" id="fs-id1167469419582"><span data-dcnode-id="1406" instrument_node="">The amount of light a telescope can collect increases with the size of the aperture. A telescope with a mirror that is 4 meters in diameter can collect 16 times as much light as a telescope that is 1 meter in diameter. (The diameter is squared because the area of a circle equals π</span><em data-dcnode-id="1404" data-effect="italics"><span data-dcnode-id="1405" instrument_node="">d</span></em><sup data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">2</span></sup><span data-dcnode-id="1401" instrument_node="">/4, where </span><em data-dcnode-id="1399" data-effect="italics"><span data-dcnode-id="1400" instrument_node="">d</span></em><span data-dcnode-id="1398" instrument_node=""> is the diameter of the circle.)</span></p><span data-dcnode-id="1396" instrument_node="">
</span><div class="ui-has-child-title" data-dcnode-id="753" data-type="example" id="fs-id1167469708536"><header data-dcnode-id="1384"><h3 class="os-title" data-dcnode-id="1385"><span data-dcnode-id="1395" instrument_node="">

</span><p data-dcnode-id="761" id="fs-id1167469556105"><span class="os-math-in-para" data-dcnode-id="763"><span class="MathJax_Preview" data-dcnode-id="890" style="color: inherit;"></span><span class="MathJax" data-dcnode-id="766" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot; display=&quot;inline&quot;><semantics><mrow><mrow><mfrac><mrow><mn>12.6</mn><mspace width=&quot;0.2em&quot; /><msup><mrow><mtext>m</mtext></mrow><mn>2</mn></msup></mrow><mrow><mn>0.79</mn><mspace width=&quot;0.2em&quot; /><msup><mrow><mtext>m</mtext></mrow><mn>2</mn></msup></mrow></mfrac><mo>=</mo><mn>16</mn><mo>.</mo></mrow></mrow><annotation-xml encoding=&quot;MathML-Content&quot;><mrow><mfrac><mrow><mn>12.6</mn><mspace width=&quot;0.2em&quot;></mspace><msup><mrow><mtext>m</mtext></mrow><mn>2</mn></msup></mrow><mrow><mn>0.79</mn><mspace width=&quot;0.2em&quot;></mspace><msup><mrow><mtext>m</mtext></mrow><mn>2</mn></msup></mrow></mfrac><mo>=</mo><mn>16</mn><mo>.</mo></mrow></annotation-xml></semantics></math>" id="MathJax-Element-4-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="828"><span class="math" data-dcnode-id="829" id="MathJax-Span-81" style="width: 6.357em; display: inline-block;"><span data-dcnode-id="831" style="display: inline-block; position: relative; width: 5.26em; height: 0px; font-size: 120%;"><span data-dcnode-id="832" style="position: absolute; clip: rect(2.747em, 1005.18em, 4.513em, -1000em); top: -3.906em; left: 0em;"><span class="mrow" data-dcnode-id="834" id="MathJax-Span-82"><span class="semantics" data-dcnode-id="835" id="MathJax-Span-83"><span class="mrow" data-dcnode-id="836" id="MathJax-Span-84"><span class="mrow" data-dcnode-id="837" id="MathJax-Span-85"><span class="mfrac" data-dcnode-id="845" id="MathJax-Span-86"><span data-dcnode-id="846" style="display: inline-block; position: relative; width: 2.429em; height: 0px; margin-right: 0.12em; margin-left: 0.12em;"><span data-dcnode-id="870" style="position: absolute; clip: rect(3.274em, 1002.31em, 4.182em, -1000em); top: -4.433em; left: 50%; margin-left: -1.155em;"><span class="mrow" data-dcnode-id="872" id="MathJax-Span-87"><span class="mn" data-dcnode-id="885" id="MathJax-Span-88" style="font-size: 70.7%;"><img data-dcnode-id="889" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/0031.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 9px; margin-right: 0.072em;"><img data-dcnode-id="888" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/0032.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 9px; margin-right: 0.05em;"><img data-dcnode-id="887" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/002E.png%3FV%3D2.7.5&amp;raw" style="width: 3px; height: 2px; margin-right: 0.078em;"><img data-dcnode-id="886" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/fonts/HTML-CSS/TeX/png/Main/Regular/283/0036.png%3FV%3D2.7.5&amp;raw" style="width: 6px; height: 9px; margin-right: 0.043em;"></span><span class="mspace" data-dcnode-id="884" id="MathJax-Span-89" style="height: 0em; vertical-align: 0em; width: 0.2em; display: inline-block; overflow: hidden;"></span><span class="msup" data-dcnode-id="873" id="MathJax-Span-90"><span data-dcnode-id="874" style="display: inline-block; position: relative; width: 0.875em; height: 0px;"><span data-dcnode-id="879" style="position: absolute; clip: rect(3.547em, 1000.57em, 4.167em, -1000em); top: -4.01em; left: 0em;"><span class="mrow" data-dcnode-id="881" id="MathJax-Span-91"><span class="mtext" data-dcnode-id="882" id="MathJax-Span-92" style="font-size: 70.7%;"><img data 0px; height: 3.906em;"></span></span></span><span data-dcnode-id="830" style="display: inline-block; overflow: hidden; vertical-align: -0.604em; border-left: 0px solid; width: 0px; height: 1.87em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="767" role="presentation"><math data-dcnode-id="768" display="inline" xmlns="http://www.w3.org/1998/Math/MathML"><semantics data-dcnode-id="769"><mrow data-dcnode-id="799"><mrow data-dcnode-id="800"><mfrac data-dcnode-id="807"><mrow data-dcnode-id="818"><mn data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">12.6</span></mn><mspace data-dcnode-id="825" width="0.2em"></mspace><msup data-dcnode-id="819"><mrow data-dcnode-id="822"><mtext data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">m</span></mtext></mrow><mn data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">2</span></mn></msup></mrow><mrow data-dcnode-id="808"><mn data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">0.79</span></mn><mspace data-dcnode-id="815" width="0.2em"></mspace><msup data-dcnode-id="809"><mrow data-dcnode-id="812"><mtext data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">m</span></mtext></mrow><mn data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">2</span></mn></msup></mrow></mfrac><mo data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">=</span></mo><mn data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">16</span></mn><mo data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">.</span></mo></mrow></mrow><annotation-xml data-dcnode-id="770" encoding="MathML-Content"><mrow data-dcnode-id="771"><mfrac data-dcnode-id="778"><mrow data-dcnode-id="789"><mn data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">12.6</span></mn><mspace data-dcnode-id="796" width="0.2em"></mspace><msup data-dcnode-id="790"><mrow data-dcnode-id="793"><mtext data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">m</span></mtext></mrow><mn data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">2</span></mn></msup></mrow><mrow data-dcnode-id="779"><mn data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">0.79</span></mn><mspace data-dcnode-id="786" width="0.2em"></mspace><msup data-dcnode-id="780"><mrow data-dcnode-id="783"><mtext data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">m</span></mtext></mrow><mn data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">2</span></mn></msup></mrow></mfrac><mo data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">=</span></mo><mn data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">16</span></mn><mo data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">.</span></mo></mrow></annotation-xml></semantics></math></span></span></span><span data-dcnode-id="762" instrument_node=""> Therefore, with 16 times the area, a 4-m telescope collects 16 times the light of a 1-m telescope.</span></p><span data-dcnode-id="760" instrument_node="">
</span></div></section></div><span data-dcnode-id="756" instrument_node="">
</span></div></section></div><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750" id="fs-id1167469577056"><span data-dcnode-id="751" instrument_node="">After the telescope forms an image, we need some way to detect and record it so that we can measure, reproduce, and analyze the image in various ways. Before the nineteenth century, astronomers simply viewed images with their eyes and wrote descriptions of what they saw. This was very inefficient and did not lead to a very reliable long-term record; you know from crime shows on television that eyewitness accounts are often inaccurate.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747" id="fs-id1167469470212"><span data-dcnode-id="748" instrument_node="">In the nineteenth century, the use of photography became widespread. In those days, photographs were a chemical record of an image on a specially treated glass plate. Today, the image is generally detected with sensors similar to those in digital cameras, recorded electronically, and stored in computers. This permanent record can then be used for detailed and quantitative studies. Professional astronomers rarely look through the large telescopes that they use for their research.</span></p><span data-dcnode-id="746" instrument_node="">
</span></section><span data-dcnode-id="744" instrument_node="">
</span><section data-dcnode-id="494" data-depth="1" id="fs-id1167469479702"><h3 data-dcnode-id="742" data-type="title"><span data-dcnode-id="743" instrument_node="">Formation of an Image by a Lens or a Mirror</span></h3><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="727" id="fs-id1167469604694"><span data-dcnode-id="740" instrument_node="">Whether or not you wear glasses, you see the world through lenses; they are key elements of your eyes. A lens is a transparent piece of material that bends the rays of light passing through it. If the light rays are parallel as they enter, the lens brings them together in one place to form an image (</span><a class="autogenerated-content" data-dcnode-id="738" href="#OSC_Astro_06_01_Simplelens"><span data-dcnode-id="739" instrument_node="">Figure 6.4</span></a><span data-dcnode-id="737" instrument_node="">). If the curvatures of the lens surfaces are just right, all parallel rays of light (say, from a star) are bent, or </span><em data-dcnode-id="735" data-effect="italics"><span data-dcnode-id="736" instrument_node="">refracted</span></em><span data-dcnode-id="734" instrument_node="">, in such a way that they converge toward a point, called the </span><span data-dcnode-id="732" data-type="term" group-by="f" id="term232"><span data-dcnode-id="733" instrument_node="">focus</span></span><span data-dcnode-id="731" instrument_node=""> of the lens. At the focus, an image of the light source appears. In the case of parallel light rays, the distance from the lens to the location where the light rays focus, or image, behind the lens is called the </span><em data-dcnode-id="729" data-effect="italics"><span data-dcnode-id="730" instrument_node="">focal length</span></em><span data-dcnode-id="728" instrument_node=""> of the lens.</span></p><span data-dcnode-id="726" instrument_node="">
</span><div class="os-figure" data-dcnode-id="697" id="OSC_Astro_06_01_Simplelens"><figure data-dcnode-id="719" data-id="OSC_Astro_06_01_Simplelens"><span data-dcnode-id="725" instrument_node="">
</span><span data-alt="Diagram of a simple lens. At left is a drawing of a convex lens seen in profile. It looks a bit like an American football. Parallel light rays enter the lens from the left and are bent inward to the right as the now converging rays exit the lens. The rays meet some distance from the lens at what is known, and labeled as, the focus. Also labeled is the focal length, which is the distance from the lens to the focus point." data-dcnode-id="721" data-type="media" id="fs-id1167469809086"><span data-dcnode-id="724" instrument_node="">
</span><img alt="Diagram of a simple lens. At left is a drawing of a convex lens seen in profile. It looks a bit like an American football. Parallel light rays enter the lens from the left and are bent inward to the right as the now converging rays exit the lens. The rays meet some distance from the lens at what is known, and labeled as, the focus. Also labeled is the focal length, which is the distance from the lens to the focus point." data-dcnode-id="723" data-media-type="image/jpeg" id="7" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/5674b7cff33668d2b768c2b05113f2331243568f&amp;raw"><span data-dcnode-id="722" instrument_node="">
</span></span><span data-dcnode-id="720" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="699"><span data-dcnode-id="718" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Figure </span></span><span data-dcnode-id="715" instrument_node="">
</span><span class="os-number" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">6.4</span></span><span data-dcnode-id="712" instrument_node="">
</span><span class="os-divider" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node=""> </span></span><span data-dcnode-id="709" instrument_node="">
</span><span class="os-title" data-dcnode-id="707" data-type="title" id="6"><span data-dcnode-id="708" instrument_node="">Formation of an Image by a Simple Lens.</span></span><span data-dcnode-id="706" instrument_node="">
</span><span class="os-divider" data-dcnode-id="704"><span data-dcnode-id="705" instrument_node=""> </span></span><span data-dcnode-id="703" instrument_node="">
</span><span class="os-caption" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Parallel rays from a distant source are bent by the convex lens so that they all come together in a single place (the focus) to form an image.</span></span><span data-dcnode-id="700" instrument_node="">
</span></div><span data-dcnode-id="698" instrument_node="">
</span></div><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="688" id="fs-id1167469529229"><span data-dcnode-id="695" instrument_node="">As you look at </span><a class="autogenerated-content" data-dcnode-id="693" href="#OSC_Astro_06_01_Simplelens"><span data-dcnode-id="694" instrument_node="">Figure 6.4</span></a><span data-dcnode-id="692" instrument_node="">, you may ask why two rays of light from the same star would be parallel to each other. After all, if you draw a picture of star shining in all directions, the rays of light coming from the star don’t look parallel at all. But remember that the stars (and other astronomical objects) are all extremely far away. By the time the few rays of light pointed toward us actually arrive at Earth, they are, for all practical purposes, parallel to each other. Put another way, any rays that were </span><em data-dcnode-id="690" data-effect="italics"><span data-dcnode-id="691" instrument_node="">not</span></em><span data-dcnode-id="689" instrument_node=""> parallel to the ones pointed at Earth are now heading in some very different direction in the universe.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="679" id="fs-id1167469678164"><span data-dcnode-id="686" instrument_node="">To view the image formed by the lens in a telescope, we use an additional lens called an </span><span data-dcnode-id="684" data-type="term" group-by="e" id="term233"><span data-dcnode-id="685" instrument_node="">eyepiece</span></span><span data-dcnode-id="683" instrument_node="">. The eyepiece focuses the image at a distance that is either directly viewable by a human or at a convenient place for a detector. Using different eyepieces, we can change the </span><em data-dcnode-id="681" data-effect="italics"><span data-dcnode-id="682" instrument_node="">magnification</span></em><span data-dcnode-id="680" instrument_node=""> (or size) of the image and also redirect the light to a more accessible location. Stars look like points of light, and magnifying them makes little difference, but the image of a planet or a galaxy, which has structure, can often benefit from being magnified.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="667" id="fs-id1167469467817"><span data-dcnode-id="677" instrument_node="">Many people, when thinking of a telescope, picture a long tube with a large glass lens at one end. This design, which uses a lens as its main optical element to form an image, as we have been discussing, is known as a </span><em data-dcnode-id="675" data-effect="italics"><span data-dcnode-id="676" instrument_node="">refractor</span></em><span data-dcnode-id="674" instrument_node=""> (</span><a class="autogenerated-content" data-dcnode-id="672" href="#OSC_Astro_06_01_RTelescope"><span data-dcnode-id="673" instrument_node="">Figure 6.5</span></a><span data-dcnode-id="671" instrument_node="">), and a telescope based on this design is called a </span><span data-dcnode-id="669" data-type="term" group-by="r" id="term234"><span data-dcnode-id="670" instrument_node="">refracting telescope</span></span><span data-dcnode-id="668" instrument_node="">. Galileo’s telescopes were refractors, as are today’s binoculars and field glasses. However, there is a limit to the size of a refracting telescope. The largest one ever built was a 49-inch refractor built for the Paris 1900 Exposition, and it was dismantled after the Exposition. Currently, the largest refracting telescope is the 40-inch refractor at Yerkes Observatory in Wisconsin.</span></p><span data-dcnode-id="666" instrument_node="">
</span><div class="os-figure" data-dcnode-id="637" id="OSC_Astro_06_01_RTelescope"><figure data-dcnode-id="659" data-id="OSC_Astro_06_01_RTelescope"><span data-dcnode-id="665" instrument_node="">
</span><span data-alt="Illustrations of refracting and reflecting telescopes. At left (b) is a refracting telescope. At the telescope opening at the top of the image is a convex lens. Parallel light rays enter the telescope and are bent toward each other. The converging rays travel down the tube to the focus at the end of the telescope. An eyepiece or camera can be placed at the focus. On the right (b) is a reflecting telescope. Parallel rays of light enter the telescope tube at the top of the illustration, travelling downward until they strike the concave mirror at the base of the tube. The reflected light is sent, converging, back up the tube until it strikes a flat mirror which then sends the light out the side of the telescope tube to an eyepiece or camera." data-dcnode-id="661" data-type="media" id="fs-id1167469758574"><span data-dcnode-id="664" instrument_node="">
</span><img alt="Illustrations of refracting and reflecting telescopes. At left (b) is a refracting telescope. At the telescope opening at the top of the image is a convex lens. Parallel light rays enter the telescope and are bent toward each other. The converging rays travel down the tube to the focus at the end of the telescope. An eyepiece or camera can be placed at the focus. On the right (b) is a reflecting telescope. Parallel rays of light enter the telescope tube at the top of the illustration, travelling downward until they strike the concave mirror at the base of the tube. The reflected light is sent, converging, back up the tube until it strikes a flat mirror which then sends the light out the side of the telescope tube to an eyepiece or camera." data-dcnode-id="663" data-media-type="image/jpeg" id="9" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/844a84727fcdac15c108b4ef1da096e49bb4b18c&amp;raw"><span data-dcnode-id="662" instrument_node="">
</span></span><span data-dcnode-id="660" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="639"><span data-dcnode-id="658" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Figure </span></span><span data-dcnode-id="655" instrument_node="">
</span><span class="os-number" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">6.5</span></span><span data-dcnode-id="652" instrument_node="">
</span><span class="os-divider" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node=""> </span></span><span data-dcnode-id="649" instrument_node="">
</span><span class="os-title" data-dcnode-id="647" data-type="title" id="8"><span data-dcnode-id="648" instrument_node="">Refracting and Reflecting Telescopes.</span></span><span data-dcnode-id="646" instrument_node="">
</span><span class="os-divider" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node=""> </span></span><span data-dcnode-id="643" instrument_node="">
</span><span class="os-caption" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Light enters a refracting telescope through a lens at the upper end, which focuses the light near the bottom of the telescope. An eyepiece then magnifies the image so that it can be viewed by the eye, or a detector like a photographic plate can be placed at the focus. The upper end of a reflecting telescope is open, and the light passes through to the mirror located at the bottom of the telescope. The mirror then focuses the light at the top end, where it can be detected. Alternatively, as in this sketch, a second mirror may reflect the light to a position outside the telescope structure, where an observer can have easier access to it. Professional astronomers’ telescopes are more complicated than this, but they follow the same principles of reflection and refraction.</span></span><span data-dcnode-id="640" instrument_node="">
</span></div><span data-dcnode-id="638" instrument_node="">
</span></div><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="628" id="fs-id1167469758795"><span data-dcnode-id="635" instrument_node="">One problem with a refracting telescope is that the light must pass </span><em data-dcnode-id="633" data-effect="italics"><span data-dcnode-id="634" instrument_node="">through</span></em><span data-dcnode-id="632" instrument_node=""> the lens of a refractor. That means the glass must be perfect all the way through, and it has proven very difficult to make large pieces of glass without flaws and bubbles in them. Also, optical properties of transparent materials change a little bit with the wavelengths (or colors) of light, so there is some additional distortion, known as </span><span data-dcnode-id="630" data-type="term" group-by="c" id="term235"><span data-dcnode-id="631" instrument_node="">chromatic aberration</span></span><span data-dcnode-id="629" instrument_node="">. Each wavelength focuses at a slightly different spot, causing the image to appear blurry.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625" id="fs-id1167469691619"><span data-dcnode-id="626" instrument_node="">In addition, since the light must pass through the lens, the lens can only be supported around its edges (just like the frames of our eyeglasses). The force of gravity will cause a large lens to sag and distort the path of the light rays as they pass through it. Finally, because the light passes through it, both sides of the lens must be manufactured to precisely the right shape in order to produce a sharp image.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="616" id="fs-id1167469601454"><span data-dcnode-id="623" instrument_node="">A different type of telescope uses a concave </span><em data-dcnode-id="621" data-effect="italics"><span data-dcnode-id="622" instrument_node="">primary mirror</span></em><span data-dcnode-id="620" instrument_node=""> as its main optical element. The mirror is curved like the inner surface of a sphere, and it reflects light in order to form an image (</span><a class="autogenerated-content" data-dcnode-id="618" href="#OSC_Astro_06_01_RTelescope"><span data-dcnode-id="619" instrument_node="">Figure 6.5</span></a><span data-dcnode-id="617" instrument_node="">). Telescope mirrors are coated with a shiny metal, usually silver, aluminum, or, occasionally, gold, to make them highly reflective. If the mirror has the correct shape, all parallel rays are reflected back to the same point, the focus of the mirror. Thus, images are produced by a mirror exactly as they are by a lens.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="610" id="fs-id1167469573257"><span data-dcnode-id="614" instrument_node="">Telescopes designed with mirrors avoid the problems of refracting telescopes. Because the light is reflected from the front surface only, flaws and bubbles within the glass do not affect the path of the light. In a telescope designed with mirrors, only the front surface has to be manufactured to a precise shape, and the mirror can be supported from the back. For these reasons, most astronomical telescopes today (both amateur and professional) use a mirror rather than a lens to form an image; this type of telescope is called a </span><span data-dcnode-id="612" data-type="term" group-by="r" id="term236"><span data-dcnode-id="613" instrument_node="">reflecting telescope</span></span><span data-dcnode-id="611" instrument_node="">. The first successful reflecting telescope was built by Isaac Newton in 1668.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="598" id="fs-id1167469763275"><span data-dcnode-id="608" instrument_node="">In a reflecting telescope, the concave mirror is placed at the bottom of a tube or open framework. The mirror reflects the light back up the tube to form an image near the front end at a location called the </span><span data-dcnode-id="606" data-type="term" group-by="p" id="term237"><span data-dcnode-id="607" instrument_node="">prime focus</span></span><span data-dcnode-id="605" instrument_node="">. The image can be observed at the prime focus, or additional mirrors can intercept the light and redirect it to a position where the observer can view it more easily (</span><a class="autogenerated-content" data-dcnode-id="603" href="#OSC_Astro_06_01_Focusarran"><span data-dcnode-id="604" instrument_node="">Figure 6.6</span></a><span data-dcnode-id="602" instrument_node="">). Since an astronomer at the prime focus can block much of the light coming to the main mirror, the use of a small </span><em data-dcnode-id="600" data-effect="italics"><span data-dcnode-id="601" instrument_node="">secondary mirror</span></em><span data-dcnode-id="599" instrument_node=""> allows more light to get through the system.</span></p><span data-dcnode-id="597" instrument_node="">
</span><div class="os-figure" data-dcnode-id="566" id="OSC_Astro_06_01_Focusarran"><figure data-dcnode-id="591" data-id="OSC_Astro_06_01_Focusarran"><span data-alt="Diagram of typical reflecting telescopes. Shown are three nearly identical reflecting telescopes. On the left, a prime focus telescope is depicted, where parallel rays of light enter the telescope tube and are then reflected off the surface of a concave mirror at the base of the tube. The reflected rays converge at the focus point which is located a short distance inside the telescope tube from the opening where the light enters. It is here at the prime focus where a detector can be placed. In the middle illustration, a Newtonian focus telescope is shown. It is identical to the prime focus arrangement, except that a small flat mirror is placed at the prime focus to reflect the light to the outside the telescope, where an eyepiece or detector can be placed. Essentially, a Newtonian moves the focus point from within the telescope to outside the telescope. On the right, a Cassegrain focus telescope is shown; as with the Newtonian focus, a prime mirror is placed at the prime focus, but in this telescope the prime focus reflects light back down through an opening at the bottom of the telescope." data-dcnode-id="593" data-type="media" id="fs-id1167469739514"><span data-dcnode-id="596" instrument_node="">
</span><img alt="Diagram of typical reflecting telescopes. Shown are three nearly identical reflecting telescopes. On the left, a prime focus telescope is depicted, where parallel rays of light enter the telescope tube and are then reflected off the surface of a concave mirror at the base of the tube. The reflected rays converge at the focus point which is located a short distance inside the telescope tube from the opening where the light enters. It is here at the prime focus where a detector can be placed. In the middle illustration, a Newtonian focus telescope is shown. It is identical to the prime focus arrangement, except that a small flat mirror is placed at the prime focus to reflect the light to the outside the telescope, where an eyepiece or detector can be placed. Essentially, a Newtonian moves the focus point from within the telescope to outside the telescope. On the right, a Cassegrain focus telescope is shown; as with the Newtonian focus, a prime mirror is placed at the prime focus, but in this telescope the prime focus reflects light back down through an opening at the bottom of the telescope." data-dcnode-id="595" data-media-type="image/jpeg" id="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/9cae1ba82c7962ab1e33c15411ff312f426feb6b&amp;raw"><span data-dcnode-id="594" instrument_node="">
</span></span><span data-dcnode-id="592" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="568"><span data-dcnode-id="590" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Figure </span></span><span data-dcnode-id="587" instrument_node="">
</span><span class="os-number" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">6.6</span></span><span data-dcnode-id="584" instrument_node="">
</span><span class="os-divider" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node=""> </span></span><span data-dcnode-id="581" instrument_node="">
</span><span class="os-title" data-dcnode-id="579" data-type="title" id="10"><span data-dcnode-id="580" instrument_node="">Focus Arrangements for Reflecting Telescopes.</span></span><span data-dcnode-id="578" instrument_node="">
</span><span class="os-divider" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node=""> </span></span><span data-dcnode-id="575" instrument_node="">
</span><span class="os-caption" data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Reflecting telescopes have different options for where the light is brought to a focus. With prime focus, light is detected where it comes to a focus after reflecting from the primary mirror. With Newtonian focus, light is reflected by a small secondary mirror off to one side, where it can be detected (see also </span><a class="autogenerated-content" data-dcnode-id="572" href="#OSC_Astro_06_01_RTelescope"><span data-dcnode-id="573" instrument_node="">Figure 6.5</span></a><span data-dcnode-id="571" instrument_node="">). Most large professional telescopes have a Cassegrain focus in which light is reflected by the secondary mirror down through a hole in the primary mirror to an observing station below the telescope.</span></span><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span></div><div class="astronomy making-connections ui-has-child-title" data-dcnode-id="496" data-type="note" id="fs-id1167469585240"><header data-dcnode-id="560"><h3 class="os-title" data-dcnode-id="561" data-type="title"><span data-dcnode-id="565" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Making Connections</span></span><span data-dcnode-id="562" instrument_node="">
</span></h3></header><section data-dcnode-id="497"><span data-dcnode-id="559" instrument_node="">
</span><div class="os-note-body" data-dcnode-id="498"><h4 class="os-subtitle" data-dcnode-id="554" data-type="title" id="12"><span data-dcnode-id="558" instrument_node="">
</span><span class="os-subtitle-label" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Choosing Your Own Telescope</span></span><span data-dcnode-id="555" instrument_node="">
</span></h4><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="545" id="fs-id1167469563367"><span data-dcnode-id="552" instrument_node="">If the astronomy course you are taking whets your appetite for exploring the sky further, you may be thinking about buying your own telescope. Many excellent amateur telescopes are available, and some research is required to find the best model for your needs. Some good sources of information about personal telescopes are the two popular US magazines aimed at amateur astronomers: </span><em data-dcnode-id="550" data-effect="italics"><span data-dcnode-id="551" instrument_node="">Sky &amp; Telescope</span></em><span data-dcnode-id="549" instrument_node=""> and </span><em data-dcnode-id="547" data-effect="italics"><span data-dcnode-id="548" instrument_node="">Astronomy</span></em><span data-dcnode-id="546" instrument_node="">. Both carry regular articles with advice, reviews, and advertisements from reputable telescope dealers.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542" id="fs-id1167469792056"><span data-dcnode-id="543" instrument_node="">Some of the factors that determine which telescope is right for you depend upon your preferences:</span></p><span data-dcnode-id="541" instrument_node="">
</span><ul data-bullet-style="bullet" data-dcnode-id="530" id="fs-id1167469590997"><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Will you be setting up the telescope in one place and leaving it there, or do you want an instrument that is portable and can come with you on outdoor excursions? How portable should it be, in terms of size and weight?</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Do you want to observe the sky with your eyes only, or do you want to take photographs? (Long-exposure photography, for example, requires a good clock drive to turn your telescope to compensate for Earth’s rotation.)</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">What types of objects will you be observing? Are you interested primarily in comets, planets, star clusters, or galaxies, or do you want to observe all kinds of celestial sights?</span></li><span data-dcnode-id="531" instrument_node="">
</span></ul><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524" id="fs-id1167469736663"><span data-dcnode-id="528" instrument_node="">You may not know the answers to some of these questions yet. For this reason, you may want to “test-drive” some telescopes first. Most communities have amateur astronomy clubs that sponsor star parties open to the public. The members of those clubs often know a lot about telescopes and can share their ideas with you. Your instructor may know where the nearest amateur astronomy club meets; or, to find a club near you, use the websites suggested in </span><a data-dcnode-id="526" data-page-fragment="" data-page-slug="b-astronomy-websites-images-and-apps" data-page-uuid="5828cbfc-03c0-436c-8efe-264a5de96b94" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/b-astronomy-websites-images-and-apps"><span data-dcnode-id="527" instrument_node="">Appendix B</span></a><span data-dcnode-id="525" instrument_node="">.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521" id="fs-id1167469562614"><span data-dcnode-id="522" instrument_node="">Furthermore, you may already have an instrument like a telescope at home (or have access to one through a relative or friend). Many amateur astronomers recommend starting your survey of the sky with a good pair of binoculars. These are easily carried around and can show you many objects not visible (or clear) to the unaided eye.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518" id="fs-id1167469577262"><span data-dcnode-id="519" instrument_node="">When you are ready to purchase a telescope, you might find the following ideas useful:</span></p><span data-dcnode-id="517" instrument_node="">
</span><ul data-bullet-style="bullet" data-dcnode-id="500" id="fs-id1167469484245"><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">The key characteristic of a telescope is the aperture of the main mirror or lens; when someone says they have a 6-inch or 8-inch telescope, they mean the diameter of the collecting surface. The larger the aperture, the more light you can gather, and the fainter the objects you can see or photograph.</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Telescopes of a given aperture that use lenses (refractors) are typically more expensive than those using mirrors (reflectors) because both sides of a lens must be polished to great accuracy. And, because the light passes through it, the lens must be made of high-quality glass throughout. In contrast, only the front surface of a mirror must be accurately polished.</span></li><span data-dcnode-id="510" instrument_node="">
</span><li data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Magnification is not one of the criteria on which to base your choice of a telescope. As we discussed, the magnification of the image is done by a smaller eyepiece, so the magnification can be adjusted by changing eyepieces. However, a telescope will magnify not only the astronomical object you are viewing but also the turbulence of Earth’s atmosphere. If the magnification is too high, your image will shimmer and shake and be difficult to view. A good telescope will come with a variety of eyepieces that stay within the range of useful magnification.</span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">The mount of a telescope (the structure on which it rests) is one of its most critical elements. Because a telescope shows a tiny field of view, which is magnified significantly, even the smallest vibration or jarring of the telescope can move the object you are viewing around or out of your field of view. A sturdy and stable mount is essential for serious viewing or photography (although it clearly affects how portable your telescope can be).</span></li><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">A telescope requires some practice to set up and use effectively. Don’t expect everything to go perfectly on your first try. Take some time to read the instructions. If a local amateur astronomy club is nearby, use it as a resource.</span></li><span data-dcnode-id="501" instrument_node="">
</span></ul><span data-dcnode-id="499" instrument_node="">
</span></div></section></div><span data-dcnode-id="495" instrument_node="">
</span></section><span data-dcnode-id="493" instrument_node="">
</span></div></div></div><div class="PrevNextBar__BarWrapper-sc-13m2i12-3 fEZPiF" data-analytics-region="prev-next" data-dcnode-id="481"><a aria-label="Previous Page" class="PrevNextBar__HidingContentLink-sc-13m2i12-2 eMxlJc" data-analytics-label="prev" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/6-thinking-ahead"><svg aria-hidden="true" class="PrevNextBar__LeftArrow-sc-13m2i12-0 bBoLai StyledIconBase-sc-bdy9j4 jbPeIR" data-dcnode-id="488" fill="currentColor" focusable="false" viewBox="0 0 24 24"><path d="M13.293 6.293L7.586 12l5.707 5.707 1.414-1.414L10.414 12l4.293-4.293z" data-dcnode-id="489"></path></svg><span data-dcnode-id="487" instrument_node="">Previous</span></a><a aria-label="Next Page" class="PrevNextBar__HidingContentLink-sc-13m2i12-2 TdchT" data-analytics-label="next" data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/6-2-telescopes-today"><span data-dcnode-id="485" instrument_node="">Next</span><svg aria-hidden="true" class="PrevNextBar__RightArrow-sc-13m2i12-1 hAIJlW StyledIconBase-sc-bdy9j4 jbPeIR" data-dcnode-id="483" fill="currentColor" focusable="false" viewBox="0 0 24 24"><path d="M10.707 17.707L16.414 12l-5.707-5.707-1.414 1.414L13.586 12l-4.293 4.293z" data-dcnode-id="484"></path></svg></a></div><div class="BuyBook__BuyBookAlignment-s2exzh-0 dsrSOQ" data-dcnode-id="476"><a aria-label="Buy book" class="BuyBook__BuyBookLink-s2exzh-1 hNBOXB" data-analytics-label="buy-book" data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3ov4SwV" rel="noopener" target="_blank"><span data-dcnode-id="480" instrument_node="">Order a print copy</span></a><p class="BuyBook__BuyPrintDisclosure-s2exzh-2 dPPdHn" data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">As an Amazon Associate we earn from qualifying purchases.</span></p></div
