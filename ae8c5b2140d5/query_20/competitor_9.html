</span><div class="wrapper-post-content" data-dcnode-id="916"><span data-dcnode-id="1589" instrument_node="">
</span><div class="content content--post" data-dcnode-id="1395"><span data-dcnode-id="1588" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1587" data-url="https://skyandtelescope.org/observing/winter-sky-asterisms011320161301/"></div><p data-dcnode-id="1582"><span data-dcnode-id="1583"><b data-dcnode-id="1584"><i data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Asterisms appeal to our playful side but also&nbsp;serve as key waypoints in the sky for identifying fainter stars and constellations.</span></i></b></span></p><span data-dcnode-id="1581" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445042" class="wp-caption alignleft" data-dcnode-id="1572" id="attachment_255445042"><a class="fancybox image" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST.jpg" rel="noopener noreferrer" target="_blank"><img alt="Three Not-So-Hidden Asterisms" class="wp-image-255445042 size-large" data-dcnode-id="1580" height="360" loading="lazy" sizes="(max-width: 272px) 100vw, 272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST-272x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST-272x360.jpg 272w, https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST-143x190.jpg 143w, https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST.jpg 468w" width="272"></a><figcaption class="wp-caption-text" data-dcnode-id="1573" id="caption-attachment-255445042"><span data-dcnode-id="1578" instrument_node="">There are three asterisms in this photo. Can you find them? Answers at the end of this article.</span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node=""> </span><i data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">Bob King</span></i></figcaption></figure><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1570" instrument_node="">Thank goodness for asterisms! If you're a beginning skywatcher, asterisms&nbsp;ease your entry into the night sky.&nbsp;Even seasoned observers know that most constellations don't look like the figures they're supposed to represent. OK, some do. Like Ursa Major, the Great Bear, or Delphinus, the Dolphin. But you'll pull your hair out trying to see a chained princess in </span><strong data-dcnode-id="1567"><a data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ianridpath.com/startales/andromeda.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1569" instrument_node="">Andromeda</span></a></strong><span data-dcnode-id="1566" instrument_node="">&nbsp;or the chariot-driving </span><strong data-dcnode-id="1563"><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ianridpath.com/startales/auriga.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1565" instrument_node="">Auriga</span></a></strong><span data-dcnode-id="1562" instrument_node="">.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Asterisms are easy-to-recognize patterns that can be part of a larger constellation or composed of stars from more than one constellation. One of the biggest, the Winter Hexagon, borrows from six! Some asterisms even involve the entire constellation, as in the 'W' of Cassiopeia or the Northern Cross, a.k.a. Cygnus, the Swan.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">All asterisms have one thing in common: they make wonderful places from which to begin learning the constellations.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1553" instrument_node="">A great many skywatchers have cut their teeth on </span><strong data-dcnode-id="1550"><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/astronomy-news/observing-news/tour-march-sky-orion-and-his-belt-02272015/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1552" instrument_node="">Orion's Belt</span></a></strong><span data-dcnode-id="1549" instrument_node=""> (yours truly) and the Big Dipper,&nbsp;straightforward, easy-to-recognize patterns of relatively bright stars.&nbsp;Finding the Belt is your passport to the rest of the great hunter.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445073" class="wp-caption aligncenter" data-dcnode-id="1538" id="attachment_255445073"><a class="fancybox image" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Asterism-Square-Pegasus-Circlet-Jan-2016_ANNO-v2_ST.jpg" rel="noopener noreferrer" target="_blank"><img alt="Simple Shapes Make the Search Easy" class="wp-image-255445073 size-large" data-dcnode-id="1546" height="360" loading="lazy" sizes="(max-width: 447px) 100vw, 447px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Asterism-Square-Pegasus-Circlet-Jan-2016_ANNO-v2_ST-447x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Asterism-Square-Pegasus-Circlet-Jan-2016_ANNO-v2_ST-447x360.jpg 447w, https://skyandtelescope.org/wp-content/uploads/Asterism-Square-Pegasus-Circlet-Jan-2016_ANNO-v2_ST-236x190.jpg 236w, https://skyandtelescope.org/wp-content/uploads/Asterism-Square-Pegasus-Circlet-Jan-2016_ANNO-v2_ST.jpg 612w" width="447"></a><figcaption class="wp-caption-text" data-dcnode-id="1539" id="caption-attachment-255445073"><span data-dcnode-id="1544" instrument_node="">Two familiar asterisms of fall and winter are the Great Square of Pegasus and the faint Circlet of Pisces. Both are visible in the southwestern sky during early evening hours in mid-January.</span><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node=""> </span><i data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Bob King</span></i></figcaption></figure><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1536" instrument_node="">From the Dipper, we can use the </span><strong data-dcnode-id="1533"><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.astropix.com/HTML/SHOW_DIG/Big_and_Little_Dippers.HTM" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1535" instrument_node="">Pointer Stars</span></a></strong><span data-dcnode-id="1532" instrument_node=""> (another asterism) to arrive at the North Star or explore the very bear-like outline of the constellation Ursa Major. While we're talking about the Belt, Aussie skywatchers, who see Orion upside-down from our northern perspective, picture a "saucepan" by combining the Belt with Orion's Sword. Since Orion is very much a summertime constellation viewed from down under,&nbsp;could&nbsp;homemade barbecue sauce be bubbling&nbsp;away in there, I wonder?</span></p><span data-dcnode-id="1530" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445046" class="wp-caption aligncenter" data-dcnode-id="1521" id="attachment_255445046"><a class="fancybox image" data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/PegasusSS_ST.jpg" rel="noopener noreferrer" target="_blank"><img alt="Find the Square, Go Anywhere" class="wp-image-255445046 size-large" data-dcnode-id="1529" height="360" loading="lazy" sizes="(max-width: 446px) 100vw, 446px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/PegasusSS_ST-446x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/PegasusSS_ST-446x360.jpg 446w, https://skyandtelescope.org/wp-content/uploads/PegasusSS_ST-235x190.jpg 235w, https://skyandtelescope.org/wp-content/uploads/PegasusSS_ST.jpg 612w" width="446"></a><figcaption class="wp-caption-text" data-dcnode-id="1522" id="caption-attachment-255445046"><span data-dcnode-id="1527" instrument_node="">Find the Great Square of Pegasus and you’ll be on your way to identifying six key stars that head up six different constellations.</span><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node=""> </span><i data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Stellarium</span></i></figcaption></figure><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1519" instrument_node="">The Sickle of Leo asterism works backwards and forwards, west&nbsp;to faint Cancer the Crab and the </span><strong data-dcnode-id="1516"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apod.nasa.gov/apod/ap140222.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1518" instrument_node="">Beehive Cluster</span></a></strong><span data-dcnode-id="1515" instrument_node="">&nbsp;and east to the lion's tail. Shooting lines through the Great Square of Pegasus, a favorite fall asterism, plunges our gaze into&nbsp;the watery depths where we meet up with Piscis Austrinus, the Southern Fish, and the gargantuan&nbsp;Cetus, the Sea Monster.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445040" class="wp-caption alignleft" data-dcnode-id="1504" id="attachment_255445040"><a class="fancybox image" data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Jan10_2016_S_ST.jpg" rel="noopener noreferrer" target="_blank"><img alt="Getting Hexed" class="wp-image-255445040 size-large" data-dcnode-id="1512" height="360" loading="lazy" sizes="(max-width: 274px) 100vw, 274px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Jan10_2016_S_ST-274x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Jan10_2016_S_ST-274x360.jpg 274w, https://skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Jan10_2016_S_ST-145x190.jpg 145w, https://skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Jan10_2016_S_ST.jpg 493w" width="274"></a><figcaption class="wp-caption-text" data-dcnode-id="1505" id="caption-attachment-255445040"><span data-dcnode-id="1510" instrument_node="">Can you see the Hexagon and the letter G? From bottom clockwise: Sirius, Procyon, Pollux, Castor, Capella (overhead), Aldebaran and Rigel. Betelgeuse is a lone horse corralled by the figure.</span><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node=""> </span><i data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Bob King</span></i></figcaption></figure><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">For sentimental reasons, Orion's Belt will always be my favorite, but no pattern connects more bright stars and offers avenues to a greater diversity of constellations than&nbsp;the Winter Hexagon. First-time skywatchers are wowed by the Hexagon's sheer size . . . and its brilliance.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">From Capella to Sirius, top to bottom, the figure spans 65°, or more than six fists at arm's length, and 45° in width (Procyon to Aldebaran). Here's the kicker: Not only does it vie for biggest asterism in the known universe,&nbsp;it contains 7 of the sky's 21 first magnitude or brighter stars: Sirius, Procyon, Pollux, Capella, Aldebaran, Rigel, and Betelgeuse.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">A word about Pollux's neighbor Castor. At magnitude 1.6, it's&nbsp;officially a 2nd-magnitude star, but situated so close to the figure, it doesn't seem right to exclude it. If we graciously include Castor, the&nbsp;Hexagon morphs into a 7-sided Heptagon.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Betelgeuse, sadly left out of all the geometric merrymaking, comes into its own in the Heavenly G, completing&nbsp;the letter's inner lobe. Whatever form you prefer, the best time to view it is around 9 to 11 p.m. in mid-January as it stands high (and low) in the south-southeastern sky.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Start with the unmistakably brilliant Sirius at the lowest apex and work your way clockwise and up to Procyon in Canis Minor, the Gemini Twins, the neck-cracking Capella near the zenith, then down to Aldebaran, and farther to sparkling, white Rigel in Orion. Swirl your gaze around it a few times for the full effect.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445088" class="wp-caption aligncenter" data-dcnode-id="1472" id="attachment_255445088"><a class="fancybox image" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Letter-G-panel_ST_edited-1.jpg" rel="noopener noreferrer" target="_blank"><img alt="Hexagon vs. Celestial G" class="wp-image-255445088 size-full" data-dcnode-id="1487" height="350" loading="lazy" sizes="(max-width: 619px) 100vw, 619px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Letter-G-panel_ST_edited-1.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Letter-G-panel_ST_edited-1.jpg 619w, https://skyandtelescope.org/wp-content/uploads/Winter-Hexagon-Letter-G-panel_ST_edited-1-300x170.jpg 300w" width="619"></a><figcaption class="wp-caption-text" data-dcnode-id="1473" id="caption-attachment-255445088"><span data-dcnode-id="1485" instrument_node="">Winter Hexagon or Heptagon — your choice. To better sense the depth of the scene, I've added each star's distance from Earth. The winter Milky Way "flows" directly through the grand figure. </span><strong data-dcnode-id="1482"><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/astronomy-videos/skyweek-tv-archive/december-23-29-2013/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1484" instrument_node="">See a video</span></a></strong><span data-dcnode-id="1481" instrument_node=""> about the future of the Hexagon from </span><i data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Sky &amp; Telescope</span></i><span data-dcnode-id="1478" instrument_node="">'s Tony Flanders.</span><br data-dcnode-id="1477"><span data-dcnode-id="1476" instrument_node=""> </span><i data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Stellarium</span></i></figcaption></figure><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Now, imagine if you're new to the sky how helpful this asterism will be. Using these 6 or 7 stars you can pilot to a half-dozen constellations or more. What a great way to learn the sky — establish&nbsp;a base of operations from which to make nightly forays into lesser known realms.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445050" class="wp-caption alignright" data-dcnode-id="1459" id="attachment_255445050"><a class="fancybox image" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Orion-Saucepan-Australia_ST.jpg" rel="noopener noreferrer" target="_blank"><img alt="A Saucy Sight" class="wp-image-255445050 size-large" data-dcnode-id="1467" height="360" loading="lazy" sizes="(max-width: 306px) 100vw, 306px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Orion-Saucepan-Australia_ST-306x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Orion-Saucepan-Australia_ST-306x360.jpg 306w, https://skyandtelescope.org/wp-content/uploads/Orion-Saucepan-Australia_ST-162x190.jpg 162w, https://skyandtelescope.org/wp-content/uploads/Orion-Saucepan-Australia_ST.jpg 468w" width="306"></a><figcaption class="wp-caption-text" data-dcnode-id="1460" id="caption-attachment-255445050"><span data-dcnode-id="1465" instrument_node="">The southern sky asterism the "Saucepan", composed of Orion's Belt, Sword and the star Saiph.</span><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node=""> </span><i data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Stellarium</span></i></figcaption></figure><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1457" instrument_node="">One final asterism of winter nights is far less showy but no less amazing — the </span><strong data-dcnode-id="1454"><a data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//whassupinthemilkyway.blogspot.com/2009/05/three-leaps-of-gazelle.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1456" instrument_node="">Three Leaps of the Gazelle</span></a></strong><span data-dcnode-id="1453" instrument_node="">. You'll spot it springing alongside the Big Dipper in the northeastern sky from about 9 o'clock on.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">This is an ancient Arabic star group composed of three sets of paired stars that resemble starry hoof prints in the sky. None of the pairs is especially bright, but the six stars are stand-outs because they form a striking repetitive pattern. All of them belong to Ursa Major.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Legend has it that the gazelle was startled by the lion as it drank from a pond (Coma Berenices) near the lion’s lair. It sprang up and leaped across the sky from east (left) to west, leaving impressions in muddy ground. Here’s the breakdown on the stars’ names, which refers to the first, second, and third leap respectively from east to west:</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1444" instrument_node="">* </span><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">First Leap </span></strong><span data-dcnode-id="1441" instrument_node="">— Alula Australis (Nu UMa) and Alula Borealis (Xi UMa)</span><br data-dcnode-id="1440"><span data-dcnode-id="1439" instrument_node="">
* </span><strong data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Second Leap</span></strong><span data-dcnode-id="1436" instrument_node=""> —&nbsp; Tania Australis (Lambda UMa) and Tania Borealis (Mu UMa)</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">
* </span><strong data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Third Leap</span></strong><span data-dcnode-id="1431" instrument_node=""> —&nbsp; Talitha (Iota UMa) and Kappa UMa</span></p><span data-dcnode-id="1429" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445052" class="wp-caption aligncenter" data-dcnode-id="1421" id="attachment_255445052"><a class="fancybox image" data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST_ANNO.jpg" rel="noopener noreferrer" target="_blank"><img alt="Puzzle Solution" class="wp-image-255445052 size-large" data-dcnode-id="1428" height="360" loading="lazy" sizes="(max-width: 272px) 100vw, 272px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST_ANNO-272x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST_ANNO-272x360.jpg 272w, https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST_ANNO-143x190.jpg 143w, https://skyandtelescope.org/wp-content/uploads/Three-leaps-gazelle-Dipper-Jan9_2016_ST_ANNO.jpg 468w" width="272"></a><figcaption class="wp-caption-text" data-dcnode-id="1422" id="caption-attachment-255445052"><span data-dcnode-id="1426" instrument_node="">Three asterisms revealed! The pale green and red banding is airglow.</span><br data-dcnode-id="1425"><i data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Bob King</span></i></figcaption></figure><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Lots of skywatchers like making their own asterisms. Amateur astronomer Greg Furtman of Webster, Wisconsin, sees a stone skipping on water&nbsp;in a long arc of stars beginning with the "throwing arm" of the Big Dipper's Handle and ending half a sky later in southern Ophiuchus. And&nbsp;anyone who's used a telescope or finderscope to star-hop to a favorite deep sky object creates one temporary asterism after another to navigate their way from point A to the target.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Let me guess. You've probably created a few asterisms of your own. If you have, we'd love to hear from you. Just share your pattern in the comments section. Asterisms — they're everywhere!</span></p><span data-dcnode-id="1414" instrument_node="">
</span><figure aria-describedby="caption-attachment-255445075" class="wp-caption aligncenter" data-dcnode-id="1405" id="attachment_255445075"><a class="fancybox image" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Skipping-Stone-stars.jpg" rel="noopener noreferrer" target="_blank"><img alt="Make-Your-Own Asterism" class="wp-image-255445075 size-large" data-dcnode-id="1413" height="360" loading="lazy" sizes="(max-width: 423px) 100vw, 423px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/wp-content/uploads/Skipping-Stone-stars_ST-423x360.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Skipping-Stone-stars_ST-423x360.jpg 423w, https://skyandtelescope.org/wp-content/uploads/Skipping-Stone-stars_ST-223x190.jpg 223w, https://skyandtelescope.org/wp-content/uploads/Skipping-Stone-stars_ST.jpg 576w" width="423"></a><figcaption class="wp-caption-text" data-dcnode-id="1406" id="caption-attachment-255445075"><span data-dcnode-id="1411" instrument_node="">The imaginative Skipping Stones asterism follows a rock's progress from the "throwing arm" of the Big Dipper south all the way to 35 Ophiuchi. Each stellar pair or single star is a skip of the rock on&nbsp;a heavenly sea.</span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node=""> </span><i data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Stellarium</span></i></figcaption></figure><span data-dcnode-id="1404" instrument_node="">

</span><p class="c-comment-block__content" data-dcnode-id="1158"></p><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Another interesting note on the "Heavenly G." This asterism is the basis of the Gemini 6 Flight Patch. It would more aptly be the "Heavenly 6" or what I've always just called the "Big Number 6 in the Sky." It starts at Capella (sorry Aldebaran!) goes through Castor and Pollux, on to Procyon and Sirius, and then up through Orion (Rigel, Bellatrix, and Betelgeuse) and then back over to Procyon. The flight patch was developed from the idea that Gemini 6 would be the first mission to rendezvous with an Agena target vehicle. This would be the star field that Schirra and Stafford would be looking into when they would be approaching the Agena to get a visual sighting. When the mission changed due to a launch problem, Gemini 6 would still rendezvous with another vehicle: the manned Gemini 7! I may be wrong about this, but I believe it still turned out to be the same star field when Gemini 6 was looking for Gemini 7 with Borman and Lovell aboard. (If you check out the flight patch, the "GT-6" stands for Gemini Titan-6" Titan was the Gemini launch vehicle's name.)  More Fun!</span></p><p data-dcnode-id="1155"></p><span data-dcnode-id="1154" instrument_node="">

</span><p class="c-comment-block__content" data-dcnode-id="983"></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">When I first made sense of what I was looking up in the night sky (15 years ago) I found the standard constellations hard to comprehend so I went ahead and made asterisms of my own. I only remember two now. First was "the wiggly y" (the upper part of the "y"made by drawing a v shape connecting Acrux, Mimosa and Gacrux, and finishing with a line down from Mimosa to Rigil Kent through Hadar). The other one was "Denebola thick pencil" (which I made by connecting the stars in constellation Leo from Regulus, Algeiba, Zosma, Denebola, Iota Leonis, then back to Regulus. I completed the sharpened end of the pencil by adding a line from Zosma to Iota Leonis through Chertan.</span></p><p data-dcnode-id="980"></p><span data-dcnode-id="979" instrument_node="">
