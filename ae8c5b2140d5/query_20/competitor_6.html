</span><h3 data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">New Program Launched for International Collaboration between the Subaru Telescope and Next Generation Space Telescopes</span></h3><span data-dcnode-id="778" instrument_node="">
</span><h4 data-dcnode-id="774"><span data-dcnode-id="777" instrument_node="">August&nbsp;11,&nbsp;2021</span><br data-dcnode-id="776"><span data-dcnode-id="775" instrument_node="">Last updated: August&nbsp;11,&nbsp;2021</span></h4><span data-dcnode-id="773" instrument_node="">
</span><ul class="share" data-dcnode-id="759"><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="769"><a class="fb btn" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/share.php%3Fu%3Dhttps%3A//subarutelescope.org/en/news/topics/2021/08/11/2975.html" target="_blank"><img alt="" data-dcnode-id="771" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/img/common/sns_fb.png&amp;raw"></a></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="765"><a class="twitter btn" data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/share%3Furl%3Dhttps%3A//subarutelescope.org/en/news/topics/2021/08/11/2975.html" target="_blank"><img alt="" data-dcnode-id="767" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/img/common/sns_tw.png&amp;raw"></a></li><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="761"><a class="mgl10" data-dcnode-id="762" href="javascript:print()"><img alt="" data-dcnode-id="763" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/img/common/icon_print.png&amp;raw"></a></li><span data-dcnode-id="760" instrument_node="">
</span></ul><span data-dcnode-id="758" instrument_node="">
</span></div><span data-dcnode-id="756" instrument_node="">
</span><div class="content" data-dcnode-id="683"><span data-dcnode-id="755" instrument_node="">
</span><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">A new Core-to-Core Program, entitled "International research network toward the era of deep and wide near-infrared surveys of the Universe with space and ground-based telescopes" led by Prof. Michitoshi Yoshida, the Director of Subaru Telescope, has been approved by the Japan Society for the Promotion of Science (JSPS) as a 5-year program (April 2021-March 2026). Under this program, JSPS will support our science collaboration between Japan, US, France, Australia, and Taiwan. </span></p><span data-dcnode-id="750" instrument_node="">
</span><div class="image" data-dcnode-id="735"><span data-dcnode-id="749" instrument_node="">
</span><div class="zoom" data-dcnode-id="746"><a data-caption="" data-dcnode-id="747" data-fancybox="gallery" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/en/news/topics/2021/08/11/fig1e-20210811-topics.jpg"><span data-dcnode-id="748" instrument_node="">zoom</span></a></div><span data-dcnode-id="745" instrument_node="">
</span><div class="inn" data-dcnode-id="743"><img alt="New Program Launched for International Collaboration between the Subaru Telescope and Next Generation Space Telescopes Figure" data-dcnode-id="744" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/en/news/topics/2021/08/11/fig1e-20210811-topics.jpg&amp;raw"></div><span data-dcnode-id="742" instrument_node="">
</span><p class="caption" data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">Figure 1: Concept of the international research network supported by the new Core-to-Core Program. Original image is </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subarutelescope.org/en/news/topics/2021/08/11/fig1e-20210811-topics_org.jpg" target="_blank"><span data-dcnode-id="740" instrument_node="">here</span></a><span data-dcnode-id="738" instrument_node=""> (2.6 MB). (Credit: NAOJ/NASA/ESA/Osaka University/University of Tokyo/CNES/ANU/ASIAA; Designed by Adachi Design Laboratory)</span></p><span data-dcnode-id="736" instrument_node="">
</span></div><span data-dcnode-id="734" instrument_node="">
</span><span data-dcnode-id="732" instrument_node="">
</span><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="729" instrument_node="">How big is the Universe? What did the first stars and galaxies look like? Astronomical observations at near-infrared wavelengths are critical to answer these questions by setting new records for observations of high-redshift objects. Currently, there are a number of ambitious projects around the world to launch space telescopes and to build ground-based telescopes/instruments to perform deep and wide-field observations in the near-infrared, all of which are expected to revolutionize our understanding of the Universe in the late 2020s. </span><br data-dcnode-id="728"><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">The main focus of this JSPS Core-to-Core Program is to establish a research network to accelerate science collaboration between the Subaru Telescope, NASA’s Nancy Grace Roman Space Telescope, and ESA’s Euclid space telescope; and to accelerate the development of the next-generation wide-field adaptive optics system for the Subaru Telescope (ULTIMATE-Subaru). </span><br data-dcnode-id="725"><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">Dr. Yusei Koyama (Project Scientist of ULTIMATE-Subaru), one of the leading scientists of this Core-to-Core Program, says, "The approval of this program is a very important step for the ULTIMATE-Subaru project, as well as the future of Subaru Telescope. We are very proud that many top-level scientists around the world are enthusiastic about collaboration with the Subaru Telescope."</span><br data-dcnode-id="722"><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">This Core-to-Core program also aims to foster collaboration with the PRIME telescope (in South Africa, to be operated by Osaka University) and the SWIMS instrument on the TAO telescope (in Chile, to be operated by the University of Tokyo), both of which have wide-field observational capabilities in the near-infrared. This project is named "SUPER-IRNET," an acronym made by taking the first letter of the names of the five key projects mentioned above – "S"WIMS, "U"LTIMATE, "P"RIME, "E"uclid, and "R"oman. This SUPER-IRNET also plans to organize several workshops/conferences, to encourage interaction particularly between young scientists in the five countries to build a basis for future, long-term collaboration.
In these ways, the Subaru Telescope is now expected to play a leading role in the new era of optical-infrared astronomy. </span></p><span data-dcnode-id="718" instrument_node="">
