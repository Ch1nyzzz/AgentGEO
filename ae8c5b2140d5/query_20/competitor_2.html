</span><div class="text-center" data-dcnode-id="672" data-platform="mobile" id="interiorsotatitularmobil" style="margin-bottom:10px; display:block; margin-top:0;"></div><span data-dcnode-id="671" instrument_node="">

</span><div class="content_text" data-dcnode-id="144"><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="663" dir="ltr"><span data-dcnode-id="667" instrument_node="">Although </span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">the development of human societies is due more to the joint and cumulative action of many people</span></strong><span data-dcnode-id="664" instrument_node=""> over time than to the efforts of a few famous figures, it is undeniable that some women and men have changed the world. These personalities have become historical figures worthy of being remembered for decades, centuries or even millennia after their&nbsp;death.</span></p><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">Below, we have compiled </span><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">a list of 40 historical figures&nbsp;of all times who have excelled in very different areas</span></strong><span data-dcnode-id="659" instrument_node=""> - from rulers and conquerors to scientists, artists, philosophers, and explorers, or ordinary people who have been as influential as the most important historical figures of the history.</span></p><ul data-dcnode-id="653"><li data-dcnode-id="654" dir="ltr"><p data-dcnode-id="655" dir="ltr"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthywaymag.com/science/famous-female-scientists" target="_blank"><span data-dcnode-id="657" instrument_node="">10 Famous Female Scientists</span></a></p></li></ul><h2 data-dcnode-id="651" dir="ltr"><span data-dcnode-id="652" instrument_node="">40 historical figures that have changed the world</span></h2><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">In this list, we will briefly talk about 40 of the most influential historical figures in the world throughout history. </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">We have included both men and women</span></strong><span data-dcnode-id="647" instrument_node="">, and we have tried to select great personalities from around the planet, although it is somewhat difficult to avoid a Eurocentric approach when investigating human history.</span></p><div class="ad-container interiorentrenoticia1" data-dcnode-id="640"><div class="text-center" data-dcnode-id="642" data-platform="desktop" id="interiorentrenoticia1pc"><div data-dcnode-id="643"><div align="center" data-dcnode-id="644"><div data-dcnode-id="645" id="interior_entre_noticia_1" style="height:650px;display:inline-block"></div></div></div></div><div class="text-center" data-dcnode-id="641" data-platform="mobile" id="interiorentrenoticia1mobil"></div></div><h3 data-dcnode-id="638" dir="ltr"><span data-dcnode-id="639" instrument_node="">1. Hammurabi (1810-1750 BC)</span></h3><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Hammurabi (Ammurapi) was king of Babylon in the eighteenth century BC, and during this period he extended the rule of his kingdom by conquering different territories of the Mesopotamian region.</span></p><p data-dcnode-id="629"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">This Babylonian emperor is known above all for the "Code of Hammurabi"</span></strong><span data-dcnode-id="633" instrument_node="">, a set of</span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/ancient-history/hammurabi" target="_blank"><span data-dcnode-id="632" instrument_node=""> 282 laws</span></a><span data-dcnode-id="630" instrument_node=""> that dictated specific physical punishments based on the crime and the characteristics of the person who committed it, including biological sex or social status - for example, the law of Hammurabi was not the same for a slave as for a free person.</span></p><h3 data-dcnode-id="627" dir="ltr"><span data-dcnode-id="628" instrument_node="">2. Hatshepsut (1507-1458 BC)</span></h3><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">Maatkara Hatshepsut was </span><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">the second woman who played the role of the pharaoh in Ancient Egypt</span></strong><span data-dcnode-id="623" instrument_node="">, the first being Sobekneferu (at least according to the available historical records).</span></p><div class="predefinedBody" data-dcnode-id="618"><div class="hidden" data-dcnode-id="621" data-platform="desktop" id="predefinedBodyPc"></div><div class="hidden" data-dcnode-id="620" data-platform="mobile" id="predefinedBodyMobile"></div><div class="hidden" data-dcnode-id="619" data-platform="mobile" id="predefinedBodyMobile"></div></div><div class="ad-container interiorentrenoticia2" data-dcnode-id="613"><div class="text-center" data-dcnode-id="615" data-platform="desktop" id="interiorentrenoticia2pc"><div data-dcnode-id="616"><div data-dcnode-id="617" id="interior_entre_noticia_2" style="height:800px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="614" data-platform="mobile" id="interiorentrenoticia2mobil"></div></div><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Hatshepsut is considered "the first great woman in history" of which there is evidence by some historians. She was one of the most celebrated rulers of Ancient Egypt, as well as one of those who ruled for a longer period.</span></p><h3 data-dcnode-id="609" dir="ltr"><span data-dcnode-id="610" instrument_node="">3. Sappho (650/610-580 BC)</span></h3><p data-dcnode-id="605"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Sappho (Psapphô) was a poet born in Mytilene, on the Greek island of Lesbos</span></strong><span data-dcnode-id="606" instrument_node="">, who wrote poems intended to be recited with the accompaniment of a lyre ("lyric poems").</span></p><p data-dcnode-id="601"><span data-dcnode-id="604" instrument_node="">Her influences are not limited to poetry and Sappho of Lesbos is considered a symbol of lesbianism today; however, in ancient Greece, jokes about Sappho were common as a promiscuous heterosexual woman. The philosopher Plato, the next historical figure included in our list, spoke of Sappho as "the tenth Muse" and as </span><strong data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">one of the most important Greek poetesses.</span></strong></p><div class="ad-container interiorentrenoticia3" data-dcnode-id="596"><div class="text-center" data-dcnode-id="598" data-platform="desktop" id="interiorentrenoticia3pc"><div data-dcnode-id="599"><div data-dcnode-id="600" id="interior_entre_noticia_3" style="height:400px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="597" data-platform="mobile" id="interiorentrenoticia3mobil"></div></div><div class="inter_image" data-dcnode-id="586"><div class="inter_image" data-dcnode-id="587"><picture data-dcnode-id="592"><source class="img-responsive" data-dcnode-id="595" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 1200w" srcset="https://filesedc.com/uploads/201/img/2019/05/300/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.webp 1200w" type="image/webp"><source class="img-responsive" data-dcnode-id="594" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 1200w" srcset="https://filesedc.com/uploads/201/img/2019/05/300/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg 1200w" type="image/jpg"><img alt="Gautama Buddha" class="img-responsive lazyloaded" data-dcnode-id="593" data-src="https://filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filesedc.com/uploads/201/img/2019/05/1200/sappho-was-the-most-important-greek-poet-of-her-time-5cd2a1e78e62d.jpg&amp;raw" title="Gautama Buddha"></picture><div data-dcnode-id="588"><span class="img_footer" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Sappho was the most famous Greek poet of her time. </span></span><span data-dcnode-id="589" instrument_node="">|&nbsp;</span></div></div></div><h3 data-dcnode-id="584" dir="ltr"><span data-dcnode-id="585" instrument_node="">4. Gautama Buddha (563/480-483/400 BC)</span></h3><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">Siddharta Gautama, who is usually referred to as "Buddha," was the &nbsp;</span><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">philosophical monk who founded the Buddhist religion</span></strong><span data-dcnode-id="580" instrument_node=""> from meditation, which led him to "enlightenment" and knowledge about how to help living beings and reduce&nbsp;suffering.</span></p><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Although many believers deny that it can be considered as such, Buddhism is one of the most important religions in the world, with more than 500 million followers worldwide (approximately 8% of the world population).</span></p><ul data-dcnode-id="572"><li data-dcnode-id="573" dir="ltr"><p data-dcnode-id="574" dir="ltr"><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthywaymag.com/psychology/buddhism" target="_blank"><span data-dcnode-id="576" instrument_node="">Buddhism: Nirvana, Reincarnation And The Four Noble Truths</span></a></p></li></ul><h3 data-dcnode-id="570" dir="ltr"><span data-dcnode-id="571" instrument_node="">5. Confucius (551-479 BC)</span></h3><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">Kong Fuzi ("Master Kong") was a </span><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">philosopher, educator, and politician who lived in Ancient China</span></strong><span data-dcnode-id="566" instrument_node="">&nbsp; and who had a major influence on the development of the society of this region during the subsequent millennia.</span></p><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">The philosophy promoted by Confucius is called </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asiasociety.org/education/confucianism" target="_blank"><span data-dcnode-id="563" instrument_node="">Confucianism</span></a><span data-dcnode-id="561" instrument_node="">. This defends the importance of favoring the maintenance of the current social structure through personal conduct that is educated, honest and inoffensive to the power.</span></p><div class="ad-container interiorentrenoticia4" data-dcnode-id="555"><div class="text-center" data-dcnode-id="557" data-platform="desktop" id="interiorentrenoticia4pc"><div data-dcnode-id="558"><div data-dcnode-id="559" id="interior_entre_noticia_4" style="height:600px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="556" data-platform="mobile" id="interiorentrenoticia4mobil"></div></div><h3 data-dcnode-id="553" dir="ltr"><span data-dcnode-id="554" instrument_node="">6. Plato (428/427-348/347 BC)</span></h3><p data-dcnode-id="549"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Plato is one of the most influential philosophers in the history of mankind</span></strong><span data-dcnode-id="550" instrument_node="">, in particular, the Western school of&nbsp;thought, which would end up being dominant throughout the world, was determined to a large extent by Platonic concepts such as the soul, as well as by its perspectives on reason, ethics or political organization.</span></p><h3 data-dcnode-id="547" dir="ltr"><span data-dcnode-id="548" instrument_node="">7. Aristotle (384-322 BC)</span></h3><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Along with Plato, Aristotle is considered the father of Western philosophy. His work has had a major influence throughout history in science, logic, philosophy or mathematics in Europe and, consequently, the rest of the world.</span></p><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">Likewise, &nbsp;</span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Aristotle was the personal tutor of the next historical figure on our list, Alexander the Great,</span></strong><span data-dcnode-id="541" instrument_node=""> until the latter turned 16.</span></p><h3 data-dcnode-id="538" dir="ltr"><span data-dcnode-id="539" instrument_node="">8. Alexander the Great (356-323 BC)</span></h3><p data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">Alexander III of Macedonia is one of the great conquerors in the history of humankind. &nbsp;</span><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">His army first subdued the region of Greece and later Persia</span></strong><span data-dcnode-id="534" instrument_node="">, multiple islands and parts of Asia Minor to India, and was never defeated in battle - although it was worn out over the years.</span></p><div class="ad-container interiorentrenoticia5" data-dcnode-id="528"><div class="text-center" data-dcnode-id="530" data-platform="desktop" id="interiorentrenoticia5pc"><div data-dcnode-id="531"><div data-dcnode-id="532" id="interior_entre_noticia_5" style="height:600px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="529" data-platform="mobile" id="interiorentrenoticia5mobil"></div></div><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Although Alexander the Great died at the age of 32 and his reign was very brief, he brought significant advancements to the political situation of the affected regions in a critical way, as well as favoring cultural and economic exchange.</span></p><div class="inter_image" data-dcnode-id="516"><div class="inter_image" data-dcnode-id="517"><picture data-dcnode-id="522"><source class="img-responsive" data-dcnode-id="525" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 1200w" srcset="https://filesedc.com/uploads/201/img/2019/05/300/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.webp 1200w" type="image/webp"><source class="img-responsive" data-dcnode-id="524" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 1200w" srcset="https://filesedc.com/uploads/201/img/2019/05/300/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg 1200w" type="image/jpg"><img alt="Qin Shi Huang" class="img-responsive lazyloaded" data-dcnode-id="523" data-src="https://filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//filesedc.com/uploads/201/img/2019/05/1200/alexander-the-great-is-one-of-the-great-historical-figures-of-humanity-thanks-to-his-conquests-5cd2a280a5b83.jpg&amp;raw" title="Qin Shi Huang"></picture><div data-dcnode-id="518"><span class="img_footer" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Alexander the Great is one of the significant historical figures of humanity thanks to his conquests. </span></span><span data-dcnode-id="519" instrument_node="">|&nbsp;</span></div></div></div><h3 data-dcnode-id="514" dir="ltr"><span data-dcnode-id="515" instrument_node="">9. Qin Shi Huang (259-210 BC)</span></h3><p data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">King Zheng was known as the "First Emperor" of China - or Qin Shi Huang. The &nbsp;</span><strong data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">founder of the Qin dynasty unified the region of China</span></strong><span data-dcnode-id="510" instrument_node="">&nbsp; on a political, economic and military level, putting an end to the so-called period of the "fighting kingdoms."</span></p><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">As a historical figure, Emperor Qin Shi Huang is associated with the unification of China, which would continue with a very similar configuration until today.</span></p><h3 data-dcnode-id="505" dir="ltr"><span data-dcnode-id="506" instrument_node="">10. Julius Caesar (100-44 BC)</span></h3><p data-dcnode-id="500" dir="ltr"><span data-dcnode-id="504" instrument_node="">The Roman politician and general Gaius Iulius Caesar is one of Europe's key historical figures: </span><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Julius Caesar is the most important figure in the transformation of the Republic of Rome into the Roman Empire</span></strong><span data-dcnode-id="501" instrument_node="">, whose influence largely explains the culture, languages, the religion, politics or philosophy of Europe.</span></p><div class="ad-container interiorentrenoticia6" data-dcnode-id="495"><div class="text-center" data-dcnode-id="497" data-platform="desktop" id="interiorentrenoticia6pc"><div data-dcnode-id="498"><div data-dcnode-id="499" id="interior_entre_noticia_6" style="height:300px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="496" data-platform="mobile" id="interiorentrenoticia6mobil"></div></div><h3 data-dcnode-id="493" dir="ltr"><span data-dcnode-id="494" instrument_node="">11. Cleopatra (69-30 BC)</span></h3><p data-dcnode-id="489"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Cleopatra is remembered for being the last Empress of Ptolemaic Egypt</span></strong><span data-dcnode-id="490" instrument_node="">-that is the period that followed the conquest of Alexander the Great and preceded that of Rome.</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The alliance of Queen Cleopatra with Julius Caesar and later with Mark Antony (another relevant Roman general) concluded with the conquest of Egypt by Octavian and his subsequent incorporation into the nascent Roman Empire.</span></p><h3 data-dcnode-id="485" dir="ltr"><span data-dcnode-id="486" instrument_node="">12. Hypatia (350-415 AD)</span></h3><p data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">Hypatia of Alexandria is one of the most remembered female historical figures today. She is the first mathematical woman with reliable records, and she also &nbsp;</span><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">made relevant contributions in the fields of astronomy and philosophy</span></strong><span data-dcnode-id="481" instrument_node="">; in this sense, Hypatia was the leader of the Neoplatonic School of Alexandria.</span></p><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Considered a pagan by rejecting the existence of a single god, Hypatia was skinned by Christians in a period of religious conflict in the Roman Empire.</span></p><h3 data-dcnode-id="476" dir="ltr"><span data-dcnode-id="477" instrument_node="">13. Avicenna (980-1037 AD)</span></h3><p data-dcnode-id="468"><span data-dcnode-id="475" instrument_node="">The original abbreviated name of Avicenna is "Ibn Sina." This historical figure is </span><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">a key figure in the history of medicine</span></strong><span data-dcnode-id="472" instrument_node=""> since he wrote the medical encyclopedia called </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muslimheritage.com/article/ibn-sinas-canon-medicine" target="_blank"><span data-dcnode-id="471" instrument_node="">"Canon of Medicine,"</span></a><span data-dcnode-id="469" instrument_node=""> whose influence would be fundamental in the universities of Europe during the Middle Ages. Ibn Sina also made relevant contributions to astronomy, logic, mathematics, theology, poetry and even alchemy.</span></p><div class="ad-container interiorentrenoticia7" data-dcnode-id="463"><div class="text-center" data-dcnode-id="465" data-platform="desktop" id="interiorentrenoticia7pc"><div data-dcnode-id="466"><div data-dcnode-id="467" id="interior_entre_noticia_7" style="height:600px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="464" data-platform="mobile" id="interiorentrenoticia7mobil"></div></div><ul data-dcnode-id="458"><li data-dcnode-id="459" dir="ltr"><p data-dcnode-id="460" dir="ltr"><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthywaymag.com/science/avicenna-ibn-sina" target="_blank"><span data-dcnode-id="462" instrument_node="">Avicenna (Ibn Sina): Biography And The Canon Of Medicine</span></a></p></li></ul><h3 data-dcnode-id="456" dir="ltr"><span data-dcnode-id="457" instrument_node="">14. Genghis Khan (1162-1227)</span></h3><p data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">Genghis&nbsp;Khan's birth name was Temujin, and he was </span><strong data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">the warrior who founded the first Mongol Empire</span></strong><span data-dcnode-id="452" instrument_node=""> after uniting the nomadic tribes of Northeast Asia, coming to dominate areas as far as Siberia, Eastern Europe or India.</span></p><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">Genghis Khan is remembered for the vast amount of territory he conquered and for the violent methods by which he achieved it. He is also relevant for his enormous number of descendants: in fact, &nbsp;</span><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">it is said that 8% of the current population of the region who ruled Genghis Khan are descendants of the Mongol emperor</span></strong><span data-dcnode-id="447" instrument_node="">&nbsp; (the ruler had over 500 secondary wives and concubines).</span></p><h3 data-dcnode-id="444" dir="ltr"><span data-dcnode-id="445" instrument_node="">15. Joan of Arc&nbsp;(1412-1431)</span></h3><p data-dcnode-id="439" dir="ltr"><span data-dcnode-id="443" instrument_node="">Joan of Arc, "the Maid of Orleans," is a French historical figure who has had a significant influence around the world. </span><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Joan of Arc was a peasant who led the French&nbsp;army&nbsp;during the Hundred Years' War</span></strong><span data-dcnode-id="440" instrument_node=""> when she was only 17 years old and played a vital role in the expulsion of the English and the coronation of Charles VII of Valois.</span></p><div class="ad-container interiorentrenoticia8" data-dcnode-id="434"><div class="text-center" data-dcnode-id="436" data-platform="desktop" id="interiorentrenoticia8pc"><div data-dcnode-id="437"><div data-dcnode-id="438" id="interior_entre_noticia_8" style="height:300px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="435" data-platform="mobile" id="interiorentrenoticia8mobil"></div></div><p data-dcnode-id="432" dir="ltr"><span data-dcnode-id="433" instrument_node="">However, she was captured, given to her enemies and burned alive under the&nbsp;accusation&nbsp;of heresy. At the time of her death, Joan was 19 years old.</span></p><h3 data-dcnode-id="430" dir="ltr"><span data-dcnode-id="431" instrument_node="">16. Christopher Columbus (1451-1506)</span></h3><p data-dcnode-id="425" dir="ltr"><span data-dcnode-id="429" instrument_node="">The Genoese Cristoforo Colombo is considered by many Westerners to be &nbsp;</span><strong data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">responsible for the so-called "discovery of America"</span></strong><span data-dcnode-id="426" instrument_node=""> ​​-that is, tracing and sharing the route between Europe and the "New World", favoring not only commercial exchange but, in a decisive way, the conquest of the continent by European civilizations, and therefore the fall of the Aztec and Inca empires.</span></p><h3 data-dcnode-id="423" dir="ltr"><span data-dcnode-id="424" instrument_node="">17. Leonardo da Vinci (1452-1519)</span></h3><p data-dcnode-id="418" dir="ltr"><span data-dcnode-id="422" instrument_node="">Leonardo di Piero da Vinci is the quintessential </span><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">historical figure of the Italian Renaissance</span></strong><span data-dcnode-id="419" instrument_node="">&nbsp; as he was a master of multiple areas of knowledge and creativity - painting, sculpture, engineering, mathematics, writing, history or anatomy, among others.</span></p><p data-dcnode-id="413" dir="ltr"><span data-dcnode-id="417" instrument_node="">This "man of the Renaissance" was the precursor&nbsp;of&nbsp;</span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">important inventions such as the hydraulic pump, the parachute, the aerial screw (the helicopter's predecessor), automobiles or tanks</span></strong><span data-dcnode-id="414" instrument_node="">. Leonardo's designs contain serious errors that would have made his operation unviable, but it is possible that he included them voluntarily to prevent plagiarism.</span></p><div class="ad-container interiorentrenoticia9" data-dcnode-id="408"><div class="text-center" data-dcnode-id="410" data-platform="desktop" id="interiorentrenoticia9pc"><div data-dcnode-id="411"><div data-dcnode-id="412" id="interior_entre_noticia_9" style="height:600px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="409" data-platform="mobile" id="interiorentrenoticia9mobil"></div></div><h3 data-dcnode-id="406" dir="ltr"><span data-dcnode-id="407" instrument_node="">18. Miguel de Cervantes (1547-1616)</span></h3><p data-dcnode-id="401"><span data-dcnode-id="405" instrument_node="">The only Spaniard in this list of historical figures is Miguel de Cervantes Saavedra, author of the novel El Quijote ("The Ingenious Hidalgo Don Quixote de La Mancha"). Cervantes is not only considered the greatest of all writers in the history of Spain and Castilian, but the fact that &nbsp;</span><strong data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Don Quixote is the second most translated book in the world (after the Bible)</span></strong><span data-dcnode-id="402" instrument_node="">&nbsp; gives him a position of honor in the history of universal literature and art.</span></p><h3 data-dcnode-id="399" dir="ltr"><span data-dcnode-id="400" instrument_node="">19. Galileo Galilei (1564-1642)</span></h3><p data-dcnode-id="394"><span data-dcnode-id="398" instrument_node="">Galileo Galilei was a scientist and artist born in Pisa (Italy) in the sixteenth century. &nbsp;</span><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">His contributions to mathematics and astronomy make many people consider him the father of modern science</span></strong><span data-dcnode-id="395" instrument_node=""> or, more specifically, the scientific method against the principles based on the philosophy of Aristotle, dominant in the Middle Ages.</span></p><p data-dcnode-id="389"><span data-dcnode-id="393" instrument_node="">Galileo's contributions include the </span><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">creation of the telescope</span></strong><span data-dcnode-id="390" instrument_node=""> and other applications of science, the study of gravity or velocity, or the formulation of the principle of inertia, that of relativity and the first law of motion.</span></p><div class="ad-container interiorentrenoticia10" data-dcnode-id="384"><div class="text-center" data-dcnode-id="386" data-platform="desktop" id="interiorentrenoticia10pc"><div data-dcnode-id="387"><div data-dcnode-id="388" id="interior_entre_noticia_10" style="height:300px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="385" data-platform="mobile" id="interiorentrenoticia10mobil"></div></div><div class="inter_image" data-dcnode-id="374"><div class="inter_image" data-dcnode-id="375"><picture data-dcnode-id="380"><source class="img-responsive" data-dcnode-id="383" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.webp 1200w" type="image/webp"><source class="img-responsive" data-dcnode-id="382" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.jpg 1200w" type="image/jpg"><img alt="René Descartes" class="img-responsive lazyload" data-dcnode-id="381" data-src="https://filesedc.com/uploads/201/img/2019/05/1200/galileo-galilei-enters-this-list-of-historical-figures-for-being-the-father-of-modern-science-5cd2a3223e1f0.jpg" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD//gAfQ29tcHJlc3NlZCBieSBqcGVnLXJlY29tcHJlc3P/2wCEAAQEBAQEBAQEBAQGBgUGBggHBwcHCAwJCQkJCQwTDA4MDA4MExEUEA8QFBEeFxUVFx4iHRsdIiolJSo0MjRERFwBBAQEBAQEBAQEBAYGBQYGCAcHBwcIDAkJCQkJDBMMDgwMDgwTERQQDxAUER4XFRUXHiIdGx0iKiUlKjQyNEREXP/CABEIAMgBLAMBIgACEQEDEQH/xAAWAAEBAQAAAAAAAAAAAAAAAAAAAQj/2gAIAQEAAAAA1CAAAAABYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/EABQBAQAAAAAAAAAAAAAAAAAAAAD/2gAIAQIQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/EABQBAQAAAAAAAAAAAAAAAAAAAAD/2gAIAQMQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/EABQQAQAAAAAAAAAAAAAAAAAAAJD/2gAIAQEAAT8Abb//xAAUEQEAAAAAAAAAAAAAAAAAAABw/9oACAECAQE/AHf/xAAUEQEAAAAAAAAAAAAAAAAAAABw/9oACAEDAQE/AHf/2Q==" title="René Descartes"></picture><div data-dcnode-id="376"><span class="img_footer" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Galileo Galilei enters this list of historical figures for being the father of modern science. </span></span><span data-dcnode-id="377" instrument_node="">|&nbsp;</span></div></div></div><h3 data-dcnode-id="372" dir="ltr"><span data-dcnode-id="373" instrument_node="">20. René Descartes (1596-1650)</span></h3><p data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">René Descartes is probably the most influential philosopher of the last 500 years. &nbsp;</span><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">His ideas were fundamental in the consolidation of rationalism</span></strong><span data-dcnode-id="368" instrument_node="">, which would become the hegemonic philosophy worldwide until today.</span></p><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">For example, the division between body and soul/mind ("dualism") is inseparable from how sciences such as medicine and psychology have developed over the past centuries.</span></p><h3 data-dcnode-id="363" dir="ltr"><span data-dcnode-id="364" instrument_node="">21. Johann Sebastian Bach (1685-1750)</span></h3><p data-dcnode-id="358" dir="ltr"><span data-dcnode-id="362" instrument_node="">The German composer and multi-instrumentalist Johann Sebastian Bach is one of the key historical figures in the musical field: he not only composed a huge number of masterpieces (including the Brandenburg Concerts or the Goldberg Variations), but </span><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">his musical contributions influenced Beethoven, Mozart, Brahms</span></strong><span data-dcnode-id="359" instrument_node="">, and many other great musicians.</span></p><h3 data-dcnode-id="356" dir="ltr"><span data-dcnode-id="357" instrument_node="">22. Adam Smith (1723-1790)</span></h3><p data-dcnode-id="351" dir="ltr"><span data-dcnode-id="355" instrument_node="">The Scottish economist and philosopher Adam Smith is probably the most influential figure in the capitalist economy of recent centuries. His work </span><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">"The Wealth of Nations" (1776), laid the foundations of the so-called "free market,"</span></strong><span data-dcnode-id="352" instrument_node=""> in addition to conceptualizing the division of labor and disclosing the supposed benefits of competition and personal selfishness for the economy.</span></p><div class="ad-container interiorentrenoticia11" data-dcnode-id="346"><div class="text-center" data-dcnode-id="348" data-platform="desktop" id="interiorentrenoticia11pc"><div data-dcnode-id="349"><div data-dcnode-id="350" id="interior_entre_noticia_11" style="height:600px;display:inline-block"></div></div></div><div class="text-center" data-dcnode-id="347" data-platform="mobile" id="interiorentrenoticia11mobil"></div></div><p data-dcnode-id="344" dir="ltr"><span data-dcnode-id="345" instrument_node="">Although Smith is currently remembered for the idea of ​​an "invisible hand" that would balance the market without the state´s&nbsp;intervention, the truth is that this concept is an a posteriori perversion of a passage that does not describe anything similar. That passage has been used more or less consciously to provide an apparent theoretical basis for the lack of regulation of the economy, and that has no empirical support either.</span></p><h3 data-dcnode-id="342" dir="ltr"><span data-dcnode-id="343" instrument_node="">23. Simón Bolívar (1783-1830)</span></h3><p data-dcnode-id="338" dir="ltr"><span data-dcnode-id="341" instrument_node="">Simon José Antonio de la Santísima Trinidad Bolívar Palacios Ponte y Blanco is a historical figure remembered as a &nbsp;</span><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">symbol of the independence of Latin America concerning Spain.</span></strong></p><p data-dcnode-id="336" dir="ltr"><span data-dcnode-id="337" instrument_node="">This politician and military figure had an essential role in the emancipation of Venezuela (his native country), Peru, Colombia, Ecuador, and Panama. For this reason, he was awarded the honorary title of "Liberator."</span></p><h3 data-dcnode-id="334" dir="ltr"><span data-dcnode-id="335" instrument_node="">24. Charles Darwin (1809-1882)</span></h3><p data-dcnode-id="329"><span data-dcnode-id="333" instrument_node="">Charles Robert Darwin was the English scientist who, through the publication of the book "The Origin of Species" (1859), </span><strong data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">managed to build an elaborate and hugely influential theory of evolution</span></strong><span data-dcnode-id="330" instrument_node=""> around the world after that.</span></p><div class="ad-container interiorentrenoticia12" data-dcnode-id="326"><div class="text-center" data-dcnode-id="328" data-platform="desktop" id="interiorentrenoticia12pc"></div><div class="text-center" data-dcnode-id="327" data-platform="mobile" id="interiorentrenoticia12mobil"></div></div><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">According to Darwin's premise, all living beings start from a common ancestor, and the variations in the species are due to the natural selection of individual characteristics that would have increased the probability of surviving in specific contexts. Current science departs in no small extent from Darwin's evolutionary theory.</span></p><ul data-dcnode-id="319"><li data-dcnode-id="320" dir="ltr"><p data-dcnode-id="321" dir="ltr"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthywaymag.com/science/asclepius" target="_blank"><span data-dcnode-id="323" instrument_node="">Asclepius: History Of The Greek God Of Medicine</span></a></p></li></ul><h3 data-dcnode-id="317" dir="ltr"><span data-dcnode-id="318" instrument_node="">25. Ada Lovelace (1815-1852)</span></h3><p data-dcnode-id="313"><span data-dcnode-id="316" instrument_node="">Augusta Ada King, Countess of Lovelace, created the first algorithm to be processed by a machine and consequently is </span><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">considered the leading pioneer of computer programming.</span></strong></p><p data-dcnode-id="308"><span data-dcnode-id="312" instrument_node="">Lovelace was the first person who brought&nbsp;machines to more complex operations than the numerical calculations. Ada Lovelace's birth name is "Ada Augusta Byron." </span><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">She was&nbsp;the daughter of George Gordon Byron</span></strong><span data-dcnode-id="309" instrument_node="">, an important poet of English romanticism better known as "Lord Byron."</span></p><h3 data-dcnode-id="306" dir="ltr"><span data-dcnode-id="307" instrument_node="">26. Karl Marx (1818-1883)</span></h3><p data-dcnode-id="301" dir="ltr"><span data-dcnode-id="305" instrument_node="">The political theorist, philosopher, economist, sociologist, and German historian Karl Marx is one of the most influential historical figures in modern politics: &nbsp;</span><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Marx is the author of "Capital" and "The Communist Manifesto", two fundamental works in the development of socialism and communism,</span></strong><span data-dcnode-id="302" instrument_node=""> movements that arose as a result of runaway industrial capitalism.</span></p><div class="ad-container interiorentrenoticia13" data-dcnode-id="298"><div class="text-center" data-dcnode-id="300" data-platform="desktop" id="interiorentrenoticia13pc"></div><div class="text-center" data-dcnode-id="299" data-platform="mobile" id="interiorentrenoticia13mobil"></div></div><p data-dcnode-id="296" dir="ltr"><span data-dcnode-id="297" instrument_node="">Marxism - that is, Marx's views on the economy, politics, and society as a whole - served to agglomerate the efforts of the proletariat in the class struggle to reduce economic inequalities between it and the bourgeoisie. The Leninist revolution in the Soviet Union was the most direct manifestation of Marx's sociopolitical influence.</span></p><h3 data-dcnode-id="294" dir="ltr"><span data-dcnode-id="295" instrument_node="">27. Thomas Edison (1847-1931)</span></h3><p data-dcnode-id="289" dir="ltr"><span data-dcnode-id="293" instrument_node="">Thomas Edison is one of the most famous inventors in history. His contributions include (or directly influenced) electric light and power, video and sound recording or telecommunications. </span><strong data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Edison was a crucial figure in industrialization since his work allowed the electrical supply of factories</span></strong><span data-dcnode-id="290" instrument_node="">, homes, etc., and also contributed to the popularization of chain production.</span></p><h3 data-dcnode-id="287" dir="ltr"><span data-dcnode-id="288" instrument_node="">28. Emmeline Pankhurst (1858-1928)</span></h3><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">The English activist Emmeline Pankhurst Goulden is a central historical figure in the feminist movement; in particular, </span><strong data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Pankhurst was the leader of the British suffrage movement</span></strong><span data-dcnode-id="283" instrument_node="">, and therefore was a very influential figure in the expansion of the right to vote of women in Europe and other parts of the world.</span></p><div class="ad-container interiorentrenoticia14" data-dcnode-id="279"><div class="text-center" data-dcnode-id="281" data-platform="desktop" id="interiorentrenoticia14pc"></div><div class="text-center" data-dcnode-id="280" data-platform="mobile" id="interiorentrenoticia14mobil"></div></div><h3 data-dcnode-id="277" dir="ltr"><span data-dcnode-id="278" instrument_node="">29. Henry Ford (1863-1947)</span></h3><p data-dcnode-id="272"><span data-dcnode-id="276" instrument_node="">Henry Ford, the founder of the automobile giant Ford Motor Company, is one of the most famous entrepreneurs in history. The influence of </span><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Ford was significant in the development and popularization of chain production for all types of factories</span></strong><span data-dcnode-id="273" instrument_node="">, in addition to the vehicle industry in particular.</span></p><h3 data-dcnode-id="270" dir="ltr"><span data-dcnode-id="271" instrument_node="">30. Marie Curie (1867-1934)</span></h3><p data-dcnode-id="265" dir="ltr"><span data-dcnode-id="269" instrument_node="">Maria Salomea Sklodowska (or Curie, her married name) is a </span><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">pioneer in the investigation of radioactivity and the first person to isolate pure radium</span></strong><span data-dcnode-id="266" instrument_node="">&nbsp; (an element that she discovered, along with polonium), for which she became the only person to date to obtain two Nobel prizes in two different scientific fields: physics and chemistry.</span></p><div class="inter_image" data-dcnode-id="255"><div class="inter_image" data-dcnode-id="256"><picture data-dcnode-id="261"><source class="img-responsive" data-dcnode-id="264" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.webp 300w, https://filesedc.com/uploads/201/img/2019/05/630/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.webp 630w, https://filesedc.com/uploads/201/img/2019/05/760/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.webp 760w, https://filesedc.com/uploads/201/img/2019/05/1200/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.webp 1200w" type="image/webp"><source class="img-responsive" data-dcnode-id="263" data-srcset="https://filesedc.com/uploads/201/img/2019/05/300/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.jpg 300w, https://filesedc.com/uploads/201/img/2019/05/630/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.jpg 630w, https://filesedc.com/uploads/201/img/2019/05/760/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.jpg 760w, https://filesedc.com/uploads/201/img/2019/05/1200/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.jpg 1200w" type="image/jpg"><img alt="Mahatma Gandhi" class="img-responsive lazyload" data-dcnode-id="262" data-src="https://filesedc.com/uploads/201/img/2019/05/1200/marie-curie-was-a-pioneer-in-the-investigation-of-radioactivity-5cd2a3884ced4.jpg" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD//gAfQ29tcHJlc3NlZCBieSBqcGVnLXJlY29tcHJlc3P/2wCEAAQEBAQEBAQEBAQGBgUGBggHBwcHCAwJCQkJCQwTDA4MDA4MExEUEA8QFBEeFxUVFx4iHRsdIiolJSo0MjRERFwBBAQEBAQEBAQEBAYGBQYGCAcHBwcIDAkJCQkJDBMMDgwMDgwTERQQDxAUER4XFRUXHiIdGx0iKiUlKjQyNEREXP/CABEIAMgBLAMBIgACEQEDEQH/xAAWAAEBAQAAAAAAAAAAAAAAAAAAAQj/2gAIAQEAAAAA1CAAAAABYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABYAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAP/EABQBAQAAAAAAAAAAAAAAAAAAAAD/2gAIAQIQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/EABQBAQAAAAAAAAAAAAAAAAAAAAD/2gAIAQMQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/EABQQAQAAAAAAAAAAAAAAAAAAAJD/2gAIAQEAAT8Abb//xAAUEQEAAAAAAAAAAAAAAAAAAABw/9oACAECAQE/AHf/xAAUEQEAAAAAAAAAAAAAAAAAAABw/9oACAEDAQE/AHf/2Q==" title="Mahatma Gandhi"></picture><div data-dcnode-id="257"><span class="img_footer" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Marie Curie was a pioneer in the investigation of radioactivity. </span></span><span data-dcnode-id="258" instrument_node="">|&nbsp;</span></div></div></div><h3 data-dcnode-id="253" dir="ltr"><span data-dcnode-id="254" instrument_node="">31. Mahatma Gandhi (1869-1948)</span></h3><p data-dcnode-id="249"><span data-dcnode-id="252" instrument_node="">The activist and political leader Mohandas Karamchand Gandhi was the </span><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">central historical figure in the independence of India after the period of colonization by the British Raj.</span></strong></p><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">He is famous above all for his methods of peaceful resistance such as nonviolent civil disobedience and the hunger strike. The honorary name "Mahatma" was granted to him by the poet and philosopher Rabindranath Tagore, and is translated as "big soul."</span></p><div class="ad-container interiorentrenoticia15" data-dcnode-id="244"><div class="text-center" data-dcnode-id="246" data-platform="desktop" id="interiorentrenoticia15pc"></div><div class="text-center" data-dcnode-id="245" data-platform="mobile" id="interiorentrenoticia15mobil"></div></div><h3 data-dcnode-id="242" dir="ltr"><span data-dcnode-id="243" instrument_node="">32. Adolf Hitler (1889-1945)</span></h3><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">The dictator and leader of the Nazi Party Adolf Hitler is the main icon of the European fascist movements of the second quarter of the 20th century. Hitler's army and its allies conquered most of Europe and North Africa during World War II and was also the ideological architect of the Holocaust; which caused around 40 million deaths.</span></p><h3 data-dcnode-id="238" dir="ltr"><span data-dcnode-id="239" instrument_node="">33. Amelia Earhart (1898-1937?)</span></h3><p data-dcnode-id="233"><span data-dcnode-id="237" instrument_node="">Aviator and writer &nbsp;</span><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Amelia Mary Earhart was the first woman to cross the Atlantic alone</span></strong><span data-dcnode-id="234" instrument_node="">&nbsp; and broke many other records during her lifetime. She was also a leading activist who fought for the political and civil rights of women.</span></p><p data-dcnode-id="229"><span data-dcnode-id="232" instrument_node="">Amelia Earhart disappeared while trying to circle the planet by flying over the Equator. The most substantial assumptions about what happened to her suggest that </span><strong data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">her plane probably ran out of fuel and she and her navigator Fred Noonan died at sea.</span></strong></p><h3 data-dcnode-id="227" dir="ltr"><span data-dcnode-id="228" instrument_node="">34. Frida Kahlo (1907-1954)</span></h3><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Magdalena Carmen Frida Kahlo y Calderón is one of the most famous artists in history, as well as the most important Mexican historical figure around the world.</span></p><div class="ad-container interiorentrenoticia16" data-dcnode-id="222"><div class="text-center" data-dcnode-id="224" data-platform="desktop" id="interiorentrenoticia16pc"></div><div class="text-center" data-dcnode-id="223" data-platform="mobile" id="interiorentrenoticia16mobil"></div></div><p data-dcnode-id="218"><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Her most remembered paintings are her self-portraits</span></strong><span data-dcnode-id="219" instrument_node="">, which include elements of magical realism and typical of Mexican culture. In this sense, Frida Kahlo is considered a key figure in the construction of Mexico's national identity.</span></p><h3 data-dcnode-id="216" dir="ltr"><span data-dcnode-id="217" instrument_node="">35. Simone de Beauvoir (1908-1986)</span></h3><p data-dcnode-id="211" dir="ltr"><span data-dcnode-id="215" instrument_node="">The writer, philosopher and French political activist Simone Lucie Ernestine Marie Bertrand de Beauvoir is </span><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">one of the leading historical figures associated with feminism</span></strong><span data-dcnode-id="212" instrument_node="">, and in particular with its theoretical component.</span></p><p data-dcnode-id="209" dir="ltr"><span data-dcnode-id="210" instrument_node="">The most well-known work of Simone de Beauvoir is "The Second Sex" (1949), a foundational book for modern feminism in which the writer analyzes the oppression of women throughout history.</span></p><h3 data-dcnode-id="207" dir="ltr"><span data-dcnode-id="208" instrument_node="">36. Rosa Parks (1913-2005)</span></h3><p data-dcnode-id="202"><span data-dcnode-id="206" instrument_node="">American Rosa Parks is one of the most famous women in recent history. This African-American activist is remembered mostly for&nbsp;her &nbsp;</span><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">pivotal role in the Montgomery bus boycott</span></strong><span data-dcnode-id="203" instrument_node=""> because&nbsp;she refused to give up her seat to a white man&nbsp;and move to the back of the bus, as stipulated in the Alabama federal law.</span></p><div class="ad-container interiorentrenoticia17" data-dcnode-id="199"><div class="text-center" data-dcnode-id="201" data-platform="desktop" id="interiorentrenoticia17pc"></div><div class="text-center" data-dcnode-id="200" data-platform="mobile" id="interiorentrenoticia17mobil"></div></div><p data-dcnode-id="195"><span data-dcnode-id="198" instrument_node="">Rosa Parks was later&nbsp;tried for civil disobedience and&nbsp;later &nbsp;</span><strong data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">became an international icon of resistance to&nbsp;racial segregation.</span></strong></p><h3 data-dcnode-id="193" dir="ltr"><span data-dcnode-id="194" instrument_node="">37. Nelson Mandela (1918-2013)</span></h3><p data-dcnode-id="189"><span data-dcnode-id="192" instrument_node="">Nelson Rolihlahla Mandela is the emblematic political leader of the anti-apartheid movement in South Africa. After his time of radical activism and his time in prison, &nbsp;</span><strong data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Mandela was elected as president in a democratic election, becoming the first black president of the country.</span></strong></p><h3 data-dcnode-id="187" dir="ltr"><span data-dcnode-id="188" instrument_node="">38. Rosalind Franklin (1920-1958)</span></h3><p data-dcnode-id="183"><span data-dcnode-id="186" instrument_node="">British Rosalind Elsie Franklin is one of the most famous scientists of all time. The use of chemistry was a fundamental element in the &nbsp;</span><strong data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">molecular analysis of DNA, RNA, viruses, graphite, and carbon.</span></strong></p><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Her contributions regarding DNA and RNA were only recognized posthumously by the community, although her work makes it one of the most influential historical figures of the last century.</span></p><h3 data-dcnode-id="179" dir="ltr"><span data-dcnode-id="180" instrument_node="">39. Ana Frank (1929-1945)</span></h3><p data-dcnode-id="174" dir="ltr"><span data-dcnode-id="178" instrument_node="">Annelies Marie Frank was a &nbsp;</span><strong data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Jewish girl who was born in Germany and was a victim of the Holocaust</span></strong><span data-dcnode-id="175" instrument_node="">. Anne Frank is remembered by the private diary in which she related her life while she and her family were hiding from the Nazis, very famous throughout the world.</span></p><div class="ad-container interiorentrenoticia18" data-dcnode-id="171"><div class="text-center" data-dcnode-id="173" data-platform="desktop" id="interiorentrenoticia18pc"></div><div class="text-center" data-dcnode-id="172" data-platform="mobile" id="interiorentrenoticia18mobil"></div></div><h3 data-dcnode-id="169" dir="ltr"><span data-dcnode-id="170" instrument_node="">40. Margaret Hamilton (1936-)</span></h3><p data-dcnode-id="164" dir="ltr"><span data-dcnode-id="168" instrument_node="">Margaret Heafield Hamilton is the only historical character in this list that is still alive today and is one of the most famous women in recent times. </span><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Hamilton is the systems engineer and computer scientist who developed the software of the Apollo Space Program</span></strong><span data-dcnode-id="165" instrument_node="">, thanks to which a group of American astronauts arrived on the Moon in 1969.</span></p><p data-dcnode-id="160"><span data-dcnode-id="163" instrument_node="">Check out the original article:</span><a data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//viviendolasalud.com/estilo-de-vida/personajes-historicos-personas-famosas-de-la-historia-del-mundo" target="_blank"><span data-dcnode-id="162" instrument_node=""> Personajes históricos: 40 personas famosas de la historia del mundo at viviendolasalud.com</span></a></p><span data-dcnode-id="159" instrument_node=""> </span><div class="predefinedAfterBody" data-dcnode-id="153"><span data-dcnode-id="158" instrument_node="">
