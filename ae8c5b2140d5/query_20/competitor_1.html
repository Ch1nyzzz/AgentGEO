</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Since its launch in 1990, the Hubble Space Telescope (HST) has provided a dazzling array of images that have awed and inspired the public.&nbsp;</span></p><div class="ad-unit" data-dcnode-id="2607" id="ad-unit-1"></div><p data-dcnode-id="2602"><span data-dcnode-id="2606" instrument_node="">But Hubble's about far more than just pretty pictures. The mission has gathered dozens of terabytes of data over the decades, providing key insights into the universe, from objects as close as </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/55-earths-moon-formation-composition-and-orbit.html"><span data-dcnode-id="2605" instrument_node="">the moon</span></a><span data-dcnode-id="2603" instrument_node=""> to the most remote galaxies, with observations of supernovas and nebulas in between.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2601" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="9863739662893187000" data-widget-type="seasonal"></aside><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Here we explore the history of the telescope and its many discoveries, provide interesting Hubble facts and link to some of the orbiting observatory's best images.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2554" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2555" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2556"><div data-dcnode-id="2557"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2558" id="trc_wrapper_31197" style="overflow: hidden; di nd see why everyone is addicted.</span></span><span class="branding" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Raid Shadow Legends</span></span></span></a><div class="trc_user_exclude_btn" data-dcnode-id="2567" title="Remove this item"></div><div class="trc_exclude_overlay trc_fade" data-dcnode-id="2566"></div><div class="trc_undo_btn" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">Undo</span></div></div></div></div></div><div class="trc_clearer" data-dcnode-id="2559"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2552" id="mobile-in-article"><div data-dcnode-id="2553" id="mobile-taboola-mid-article"></div></div><p data-dcnode-id="2546"><strong data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/best-hubble-space-telescope-images.html"><strong data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">The best Hubble Space Telescope images of all time!</span></strong></a></p><div class="jwplayer__widthsetter" data-dcnode-id="2527"><div class="jwplayer__wrapper" data-dcnode-id="2528"><div class="future__jwplayer" data-dcnode-id="2529" id="futr_botr_qXlHvsx2_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2542" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/qXlHvsx2/stunning-nebulas-captured-by-hubble-take-a-tour%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2544" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2530" id="botr_qXlHvsx2_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2531"><div class="jw-icon jw-reset" data-dcnode-id="2537"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2538" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2539"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2532"><div class="jw-error-text jw-reset-text" data-dcnode-id="2533" data-nosnippet="" dir="auto"><span data-dcnode-id="2536" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2535"></span><span data-dcnode-id="2534" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h3 class="article-body__section" data-dcnode-id="2524" id="section-getting-hubble-off-the-ground"><span data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Getting Hubble off the ground</span></span></h3><p data-dcnode-id="2516"><span data-dcnode-id="2523" instrument_node="">When </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15589-galileo-galilei.html"><span data-dcnode-id="2522" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="2520" instrument_node=""> first turned a spyglass to the heavens in 1610, he had trouble making out the rings of Saturn that are visible in inexpensive telescopes today. Advances in optics eventually improved scientists' views of the planets, stars and distant galaxies, but </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17683-earth-atmosphere.html"><span data-dcnode-id="2519" instrument_node="">Earth's atmosphere</span></a><span data-dcnode-id="2517" instrument_node=""> still blocked or distorted much of the light for observers on the ground. Larger telescopes were, and still are, placed atop mountains, where the thinner atmosphere at higher elevations allows clearer pictures.</span></p><div class="ad-unit" data-dcnode-id="2515" id="ad-unit-2"></div><p data-dcnode-id="2510"><span data-dcnode-id="2514" instrument_node="">In 1946, soon after World War II, astronomer Lyman Spitzer proposed launching a space telescope, which could overcome the limitations of ground-based observatories. It took a couple more decades before the idea garnered enough support for the U.S. National Academy of Sciences to organize a committee of scientists to evaluate the potential of a "Large Space Telescope." With Spitzer at the helm, the committee published a document in 1969 that outlined the scientific uses of a Large Space Telescope and advocated for its construction, according to a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2512" data-url="https://history.nasa.gov/hubble/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.nasa.gov/hubble/" target="_blank"><span data-dcnode-id="2513" instrument_node="">Hubble history written by Gabriel Olkoski for NASA</span></a><span data-dcnode-id="2511" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">The National Academy of Sciences took the pitch to NASA — the only agency capable of making the Large Space Telescope a reality. NASA was already considering a space telescope of some type, but the agency was undecided about how big to make it and where to start. In 1971, George Low, the agency's acting administrator at the time, greenlit the Large Space Telescope Science Steering Group, and NASA soon began lobbying Congress for funding for the endeavor.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="2507" data-feat-ref="bordeaux-feat-id-84" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="2491"><div class="fancy_box-title" data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Hubble facts and figures</span></div><div class="fancy_box_body" data-dcnode-id="2492"><p data-dcnode-id="2493"><span data-dcnode-id="2504" instrument_node="">— Hubble is 43.5 feet (13.2 meters) wide with a maximum diameter of 14 feet (4.2 m). On Earth, it would weigh 24,500 pounds (11,110 kilograms).</span><br data-dcnode-id="2503"><span data-dcnode-id="2502" instrument_node="">
— The solar-powered telescope launched on April 24, 1990 on board the space shuttle Discovery and was deployed one day later.</span><br data-dcnode-id="2501"><span data-dcnode-id="2500" instrument_node="">
— Hubble orbits about 340 miles (547 kilometers) above Earth, on a path inclined 28.5 degrees to the equator. Its average speed is 17,000 mph (27,000 kph), and it takes 95 minutes to complete one orbit.</span><br data-dcnode-id="2499"><span data-dcnode-id="2498" instrument_node="">
— Hubble transmits about 120 gigabytes of science data every week. That would be roughly 3,600 feet (1,097 m) of books on a shelf. The collection of pictures and data is stored on magneto-optical disks.</span><br data-dcnode-id="2497"><span data-dcnode-id="2496" instrument_node="">
— The telescope's primary mirror is 94.5 inches (2.4 m) wide and weighs 1,825 pounds (828 kg). Its secondary mirror is 12 inches (0.3 m) wide and weighs 27.4 pounds (12.3 kg).</span><br data-dcnode-id="2495"><span data-dcnode-id="2494" instrument_node="">
— Astronauts have serviced Hubble five times, on missions that launched in December 1993, February 1997, December 1999, February 2002 and May 2009.</span></p></div></div><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2475" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/" target="_blank"><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2476"><div class="image-full-width-wrapper" data-dcnode-id="2482"><div class="image-widthsetter" data-dcnode-id="2483" style="max-width:1323px;"><p class="vanilla-image-block" data-dcnode-id="2484" style="padding-top:145.12%;"><picture data-dcnode-id="2485"><source alt="The Hubble Space Telescope went through many years of development. Here, astronauts practice servicing the telescope in the weightless environment of the Neutral Buoyancy Simulator at the Marshall Space Flight Center." class="expandable lazy-image-van optional-image" data-dcnode-id="2490" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Hubble Space Telescope went through many years of development. Here, astronauts practice servicing the telescope in the weightless environment of the Neutral Buoyancy Simulator at the Marshall Space Flight Center." class="expandable lazy-image-van optional-image" data-dcnode-id="2489" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2486"><img alt="The Hubble Space Telescope went through many years of development. Here, astronauts practice servicing the telescope in the weightless environment of the Neutral Buoyancy Simulator at the Marshall Space Flight Center." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2488" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/ZFJTBkvNeSZtcNtcouY7Aa-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2487"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2477" itemprop="caption description"><span class="caption-text" data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">The Hubble Space Telescope went through many years of development. Here, astronauts practice servicing the telescope in the weightless environment of the Neutral Buoyancy Simulator at NASA's Marshall Space Flight Center in Alabama.&nbsp; </span></span><span class="credit" data-dcnode-id="2478" itemprop="copyrightHolder"><span data-dcnode-id="2479" instrument_node="">(Image credit: NASA/MFSC)</span></span></figcaption></figure></a><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">The expensive project was a tough sell, and funding was initially denied by the House Appropriations Subcommittee in 1975. NASA then upped its lobbying efforts and got buy-in from European Space Agency, which shared the costs. Congress eventually granted funding for NASA's portion of the Large Space Telescope in 1977. &nbsp;</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">Development began almost immediately. NASA planned to launch the telescope in 1983, but various production delays pushed the launch date back to 1986.&nbsp;</span></p><p data-dcnode-id="2465"><span data-dcnode-id="2470" instrument_node="">In the meantime, the Large Space Telescope was renamed Hubble in honor of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15665-edwin-powell-hubble.html"><u data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Edwin Hubble</span></u></a><span data-dcnode-id="2466" instrument_node="">, an American astronomer who, among other things, determined that the universe extended beyond the borders of the Milky Way.&nbsp;</span></p><p data-dcnode-id="2460"><span data-dcnode-id="2464" instrument_node="">Hubble's planned liftoff was delayed again after the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18084-space-shuttle-challenger.html"><span data-dcnode-id="2463" instrument_node="">space shuttle Challenger exploded</span></a><span data-dcnode-id="2461" instrument_node=""> a minute after takeoff on Jan. 28, 1986, killing all seven astronauts on board. It was more than 2.5 years before shuttle flights resumed and NASA could begin planning Hubble's launch again. &nbsp;</span></p><p data-dcnode-id="2455"><span data-dcnode-id="2459" instrument_node="">Hubble finally launched aboard the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18187-space-shuttle-discovery.html"><span data-dcnode-id="2458" instrument_node="">space shuttle Discovery</span></a><span data-dcnode-id="2456" instrument_node=""> on April 24, 1990 and a day later was deployed into low Earth orbit, about 340 miles (545 kilometers) above our planet. Getting Hubble developed and launched cost $1.5 billion, but there would be ongoing costs as well — both expected and unexpected.</span></p><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2439" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/" target="_blank"><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2440"><div class="image-full-width-wrapper" data-dcnode-id="2446"><div class="image-widthsetter" data-dcnode-id="2447" style="max-width:1600px;"><p class="vanilla-image-block" data-dcnode-id="2448" style="padding-top:77.06%;"><picture data-dcnode-id="2449"><source alt="The Hubble Space Telescope is deployed from NASA's space shuttle Discovery on April 25, 1990." class="expandable lazy-image-van optional-image" data-dcnode-id="2454" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The Hubble Space Telescope is deployed from NASA's space shuttle Discovery on April 25, 1990." class="expandable lazy-image-van optional-image" data-dcnode-id="2453" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2450"><img alt="The Hubble Space Telescope is deployed from NASA's space shuttle Discovery on April 25, 1990." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2452" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/4HqQkStTCSLYzhLn7WuGDM-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2451"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2441" itemprop="caption description"><span class="caption-text" data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">The Hubble Space Telescope is deployed from NASA's space shuttle Discovery on April 25, 1990.&nbsp; </span></span><span class="credit" data-dcnode-id="2442" itemprop="copyrightHolder"><span data-dcnode-id="2443" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><h3 class="article-body__section" data-dcnode-id="2436" id="section-blurry-initial-images-and-a-much-needed-fix"><span data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Blurry initial images —&nbsp;and a much-needed fix</span></span></h3><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Initial instruments on Hubble included the Wide Field Planetary Camera, the Goddard High Resolution Spectrograph (GHRS), the Faint Object Camera (FOC), the Faint Object Spectrograph (FOS) and the High Speed Photometer.&nbsp;</span></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Hubble experienced equipment issues right off the bat. For example, the telescope's first images came back so blurry that they were close to useless scientifically. It turned out that Hubble's 7.9-foot-wide (2.4 meters) main mirror had a defect — a spherical aberration caused by a manufacturing error. The flaw was minute, at just 1/50th the thickness of a sheet of paper, but that was big enough to cause major imaging problems.&nbsp;</span></p><p data-dcnode-id="2427"><span data-dcnode-id="2431" instrument_node="">Hubble became a laughingstock, the butt of jokes that spread through popular culture. For instance, the 1991 film "</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2429" data-url="https://www.imdb.com/title/tt0102510/trivia/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0102510/trivia/" target="_blank"><span data-dcnode-id="2430" instrument_node="">Naked Gun 2 1/2: The Smell of Fear</span></a><span data-dcnode-id="2428" instrument_node="">" features a photo of Hubble. It appears on the wall of an establishment called Loser's Bar, along with pictures of the Hindenburg, the 1906 San Francisco earthquake, the Ford Edsel and other famous disasters.</span></p><p data-dcnode-id="2422"><span data-dcnode-id="2426" instrument_node="">But all was not lost, for Hubble was designed to be serviced by astronauts. On Dec. 2, 1993, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/18123-space-shuttle-endeavour.html"><span data-dcnode-id="2425" instrument_node="">space shuttle Endeavour</span></a><span data-dcnode-id="2423" instrument_node=""> ferried a crew of seven to fix Hubble during five days of spacewalks. Two new cameras, including the Wide-Field Planetary Camera 2 (WFPC-2), which later took many of Hubble's most famous photos, were installed during the fix. In December 1993, the first new images from Hubble reached Earth, and they were breathtaking.</span></p><p data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Spacewalking astronauts repaired, maintained and upgraded Hubble on four additional servicing missions, which took place in February 1997, December 1999, March 2002 and May 2009.</span></p><p data-dcnode-id="2415"><span data-dcnode-id="2419" instrument_node="">The 1997 mission replaced some failed or degraded hardware and installed two new &nbsp;instruments, the Space Telescope Imaging Spectrograph (STIS) and the Near Infrared Camera and Multi-Object Spectrometer. The new instruments, which replaced the GHRS and FOS, extended Hubble's vision into the near-infrared wavelength range, NASA officials wrote in a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2417" data-url="https://www.nasa.gov/mission_pages/hubble/servicing/index.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/mission_pages/hubble/servicing/index.html" target="_blank"><span data-dcnode-id="2418" instrument_node="">servicing mission explainer</span></a><span data-dcnode-id="2416" instrument_node="">.</span></p><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">The next astronaut visit was originally intended to be a relatively routine maintenance trip that lifted off in June 2000. But the fourth of Hubble's orientation-maintaining gyroscopes failed in November 1999, sending the observatory into a protective "safe mode." (Hubble has six gyros but needs at least three functioning ones to collect science data.) In response, NASA revised its servicing mission plans, splitting the next one into two parts, the first of which launched in December 1999.</span></p><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">On that 10-day mission, astronauts replaced all of Hubble's gyros, as well as one of its three fine guidance sensors, and performed other maintenance work as well.&nbsp;</span></p><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">The next crewed Hubble visit, known as Servicing Mission 3B (following from 1999's Servicing Mission 3A), occurred in December 2002. During that 11-day trip, "astronauts replaced Hubble's solar panels and installed the Advanced Camera for Surveys (ACS), which took the place of Hubble's Faint Object Camera, the telescope's last original instrument," NASA officials wrote in the servicing mission explainer.&nbsp;</span></p><p data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node="">Like Hubble's launch, the fifth and final servicing mission was delayed by a shuttle tragedy — the February 2003 </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19436-columbia-disaster.html"><span data-dcnode-id="2407" instrument_node="">breakup of Columbia</span></a><span data-dcnode-id="2405" instrument_node=""> during its reentry to Earth's atmosphere, which killed all seven astronauts on board. That tragic accident ended up pushing the servicing flight back from its initial 2005 target date to May 2009. During the mission, astronauts put in new batteries and gyroscopes and installed two new instruments, the Cosmic Origins Spectrograph and the Wide Field Camera 3. Among other tasks, the spacewalkers also revived the ACS and STIS, both of which had failed. "With these efforts, Hubble was&nbsp;brought to the apex of its scientific capabilities," NASA officials wrote.</span></p><p data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Ever since, Hubble has continued to provide unprecedented information about our universe and inspire curious minds around the world.&nbsp;</span></p><p data-dcnode-id="2395"><strong data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Related:</span></strong><span data-dcnode-id="2399" instrument_node=""> </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20802-hubble-space-telescope-quiz.html"><span data-dcnode-id="2398" instrument_node="">Hubble quiz: How well do you know the famous telescope?</span></a><span data-dcnode-id="2396" instrument_node="">&nbsp;</span></p><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2379" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/" target="_blank"><figure class="van-image-figure" data-bordeaux-image-check="" data-dcnode-id="2380"><div class="image-full-width-wrapper" data-dcnode-id="2386"><div class="image-widthsetter" data-dcnode-id="2387" style="max-width:2048px;"><p class="vanilla-image-block" data-dcnode-id="2388" style="padding-top:66.46%;"><picture data-dcnode-id="2389"><source alt="A view of the Hubble Space Telescope in orbit." class="expandable lazy-image-van optional-image" data-dcnode-id="2394" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="A view of the Hubble Space Telescope in orbit." class="expandable lazy-image-van optional-image" data-dcnode-id="2393" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2390"><img alt="A view of the Hubble Space Telescope in orbit." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2392" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/WfUK3QxuauWG7XRHhJAupj-970-80.jpeg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2391"></div></figure><p></p></div></div><figcaption class="" data-dcnode-id="2381" itemprop="caption description"><span class="caption-text" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">A view of the Hubble Space Telescope in orbit. </span></span><span class="credit" data-dcnode-id="2382" itemprop="copyrightHolder"><span data-dcnode-id="2383" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure></a><h3 class="article-body__section" data-dcnode-id="2376" id="section-hubble-discoveries"><span data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Hubble discoveries</span></span></h3><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Hubble's elevated perspective and advanced optics allow it to peer farther away than ground-based optics are able to see.&nbsp;</span></p><p data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">Because light takes time to travel long distances, Hubble functions like a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21675-time-travel.html"><span data-dcnode-id="2372" instrument_node="">time machine</span></a><span data-dcnode-id="2370" instrument_node="">: the light it views from remote objects reveals how those objects appeared when the light left them, not how they appear today. For example, when we look at the Andromeda galaxy, which lies about 2.5 million light-years from Earth, we see it as it was 2.5 million years ago.</span></p><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2353" data-url="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/" target="_blank"><figure class="van-image-figure pull-right" data-bordeaux-image-check="" data-dcnode-id="2354"><div class="image-full-width-wrapper" data-dcnode-id="2360"><div class="image-widthsetter" data-dcnode-id="2361"><p class="vanilla-image-block" data-dcnode-id="2362" style="padding-top:56.25%;"><picture data-dcnode-id="2363"><source alt="This Hubble Ultra Deep Field (UDF) image shows primordial dwarf galaxy candidates circled in green. Three enlargements at right show several dwarf objects that are at the limits of Hubble's present instrument capabilities. The Hubble UDF is a small region of sky in the direction of the southern constellation Fornax. The faintest objects are less than one four-billionth the brightness of stars that can be seen with the naked eye." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="2368" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="This Hubble Ultra Deep Field (UDF) image shows primordial dwarf galaxy candidates circled in green. Three enlargements at right show several dwarf objects that are at the limits of Hubble's present instrument capabilities. The Hubble UDF is a small region of sky in the direction of the southern constellation Fornax. The faintest objects are less than one four-billionth the brightness of stars that can be seen with the naked eye." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="2367" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2364"><img alt="This Hubble Ultra Deep Field (UDF) image shows primordial dwarf galaxy candidates circled in green. Three enlargements at right show several dwarf objects that are at the limits of Hubble's present instrument capabilities. The Hubble UDF is a small region of sky in the direction of the southern constellation Fornax. The faintest objects are less than one four-billionth the brightness of stars that can be seen with the naked eye." class="pull-right expandable lazy-image-van optional-image loaded" data-dcnode-id="2366" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/8DmQdHn5oEmtmdkBtr5WoR-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2365"></div></figure><p></p></div></div><figcaption class="pull-right" data-dcnode-id="2355" itemprop="caption description"><span class="caption-text" data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">This Hubble Ultra Deep Field (UDF) image shows primordial dwarf galaxy candidates circled in green. Three enlargements at right show several dwarf objects that are at the limits of Hubble's present instrument capabilities. The Hubble UDF is a small region of sky in the direction of the southern constellation Fornax. The faintest objects are less than one four-billionth the brightness of stars that can be seen with the naked eye. </span></span><span class="credit" data-dcnode-id="2356" itemprop="copyrightHolder"><span data-dcnode-id="2357" instrument_node="">(Image credit: NASA, ESA, R. Windhorst (Arizona State University) and H. Yan (Spitzer Science Center, Caltech))</span></span></figcaption></figure></a><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">And with Hubble, distant objects are revealed that otherwise can't be seen at all.</span></p><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">When astronomers pointed the HST to a seemingly empty patch of sky in Ursa Major in 1995, for instance, they captured an image of over 3,000 galaxies too distant to be detected by other telescopes. (This was later called the Hubble Deep Field). Some of the galaxies were so young, they had not yet begun serious star formation. Other deep field observations in the same area were performed, peering deeper into space each time. These were called the Hubble Ultra-Deep Field (released in 2004) and the Hubble eXtreme Deep Field (released in 2012).&nbsp;</span></p><p data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">In addition to gazing at the early universe, Hubble also helped astronomers gauge how much time had passed since the Big Bang. By measuring a special kind of pulsing star known as a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15396-variable-stars.html"><span data-dcnode-id="2347" instrument_node="">Cepheid variable</span></a><span data-dcnode-id="2345" instrument_node="">, researchers were able to narrow down the age of the universe from its pre-HST range of 10 to 20 billion years to a more precise 13.7 billion years.</span></p><p data-dcnode-id="2339"><span data-dcnode-id="2343" instrument_node="">And in the late 1990s, Hubble observations of supernovas helped astronomers make a startling find —&nbsp;the universe's ongoing expansion is accelerating, apparently driven by a mysterious force known as </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20929-dark-energy.html"><span data-dcnode-id="2342" instrument_node="">dark energy</span></a><span data-dcnode-id="2340" instrument_node="">. We still don't know what dark energy is, even though it makes up most of the universe.</span></p><p data-dcnode-id="2331"><span data-dcnode-id="2338" instrument_node="">Astronomers have used Hubble to create a 3D map of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20930-dark-matter.html"><span data-dcnode-id="2337" instrument_node="">dark matter</span></a><span data-dcnode-id="2335" instrument_node="">, which remains mysterious even though it's six times more abundant than the "normal" matter that makes up stars, planets and everything else we can see and touch. The iconic scope has also discovered that most, if not all, major galaxies harbor supermassive </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15421-black-holes-facts-formation-discovery-sdcmp.html"><span data-dcnode-id="2334" instrument_node="">black holes</span></a><span data-dcnode-id="2332" instrument_node=""> at their cores.</span></p><p data-dcnode-id="2326"><span data-dcnode-id="2330" instrument_node="">Hubble also examines individual stars in various stages of their evolution, from the clouds of dust that form infant stars to the corpses of those long since detonated. It has even been able to study stars beyond our own galaxy, the Milky Way, and into its neighbors, the Magellanic Clouds and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15590-andromeda-galaxy-m31.html"><span data-dcnode-id="2329" instrument_node="">Andromeda Galaxy</span></a><span data-dcnode-id="2327" instrument_node="">.</span></p><p data-dcnode-id="2320"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Related: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17-amazing-hubble-discoveries.html"><strong data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">The most amazing Hubble Space Telescope discoveries</span></strong></a></p><p data-dcnode-id="2309"><span data-dcnode-id="2319" instrument_node="">Hubble has even photographed planets orbiting other suns. In 2008, for example, Hubble captured imagery of the exoplanet candidate </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2317" data-url="https://hubblesite.org/contents/media/images/2008/39/2427-Image.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hubblesite.org/contents/media/images/2008/39/2427-Image.html" target="_blank"><span data-dcnode-id="2318" instrument_node="">Fomalhaut b</span></a><span data-dcnode-id="2316" instrument_node="">, the first time such an object had been directly imaged in visible light. Fomalhaut b has since been </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2314" data-url="https://exoplanetarchive.ipac.caltech.edu/docs/2020news.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//exoplanetarchive.ipac.caltech.edu/docs/2020news.html" target="_blank"><span data-dcnode-id="2315" instrument_node="">reclassified as a likely dust cloud</span></a><span data-dcnode-id="2313" instrument_node="">, but Hubble has snapped photos of a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-pds-70b-exoplanet"><span data-dcnode-id="2312" instrument_node="">number of other alien worlds</span></a><span data-dcnode-id="2310" instrument_node=""> since then.</span></p><p data-dcnode-id="2304"><span data-dcnode-id="2308" instrument_node="">Most of Hubble's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17738-exoplanets.html"><span data-dcnode-id="2307" instrument_node="">exoplanet</span></a><span data-dcnode-id="2305" instrument_node=""> observations, however, have been more indirect. As alien worlds pass in front of their suns from Hubble's perspective, their atmospheres filter out certain wavelengths of starlight, a change that the observatory can detect. This information can reveal key details of the atmospheres' composition.</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2303" instrument_node="">Hubble may spend much of its time peering light-years from Earth, but astronomers also use it to study objects in our own solar system. High-resolution images taken of Jupiter, Saturn and Pluto have provided insights that can only be topped by planetary probes circling the planets. Four of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16535-plutos-moons.html"><span data-dcnode-id="2302" instrument_node="">Pluto's five moons</span></a><span data-dcnode-id="2300" instrument_node=""> were discovered using Hubble observations, for example.&nbsp;</span></p><p data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Images from the HST also allow scientists on Earth to monitor changes in planets' atmospheres and on their surfaces. When fragments of the comet </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19855-shoemaker-levy-9.html"><span data-dcnode-id="2297" instrument_node="">Shoemaker-Levy 9 crashed into Jupiter</span></a><span data-dcnode-id="2295" instrument_node=""> in 1994, for example, Hubble photographed the fatal collision. The aftermath revealed a great deal about the gas giant's atmosphere.</span></p><p data-dcnode-id="2289"><span data-dcnode-id="2293" instrument_node="">Further, Hubble has seen what appear to be </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/36464-jupiter-moon-europa-water-plume-hubble.html"><span data-dcnode-id="2292" instrument_node="">water plumes erupting from Europa</span></a><span data-dcnode-id="2290" instrument_node="">, a potentially life-hosting moon of Jupiter. The telescope made an initial observation in March 2014 and then saw a follow-up candidate plume in the same location in February 2016.</span></p><div class="jwplayer__widthsetter" data-dcnode-id="2270"><div class="jwplayer__wrapper" data-dcnode-id="2271"><div class="future__jwplayer" data-dcnode-id="2272" id="futr_botr_ZDEvEb2a_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2285" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/ZDEvEb2a/see-hubbles-amazing-views-of-the-outer-solar-system-planets-in-2021%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2287" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2273" id="botr_ZDEvEb2a_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2274"><div class="jw-icon jw-reset" data-dcnode-id="2280"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2281" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2282"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2275"><div class="jw-error-text jw-reset-text" data-dcnode-id="2276" data-nosnippet="" dir="auto"><span data-dcnode-id="2279" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2278"></span><span data-dcnode-id="2277" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">That's just a taste of what Hubble has done over the past three decades. To give you a better sense of the breadth and depth of the observatory's achievements, here's a brief rundown of some Hubble highlights from recent years:</span></p><ul data-dcnode-id="2108"><li data-dcnode-id="2255"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">2021: </span></strong><span data-dcnode-id="2265" instrument_node="">Observed a bizarre, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-superbubble-nebula-image"><span data-dcnode-id="2264" instrument_node="">250-light-year-wide "superbubble"</span></a><span data-dcnode-id="2262" instrument_node=""> inside a nebula, spotted a galaxy with </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-studies-galaxy-missing-dark-matter"><span data-dcnode-id="2261" instrument_node="">surprisingly little dark matter</span></a><span data-dcnode-id="2259" instrument_node=""> and saw a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-pds-70b-exoplanet"><span data-dcnode-id="2258" instrument_node="">Jupiter-size exoplanet being born</span></a><span data-dcnode-id="2256" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="2245"><strong data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">2020</span></strong><span data-dcnode-id="2252" instrument_node="">: Spotted evidence for a mysterious </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/black-hole-missing-link-hubble-telescope-discovery.html"><span data-dcnode-id="2251" instrument_node="">star-eating black hole</span></a><span data-dcnode-id="2249" instrument_node=""> at the edge of another galaxy, and celebrated its </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-nasa-30th-anniversary-plans.html"><span data-dcnode-id="2248" instrument_node="">30th birthday</span></a><span data-dcnode-id="2246" instrument_node="">.</span></li><li data-dcnode-id="2232"><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">2019</span></strong><span data-dcnode-id="2242" instrument_node="">: Took a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/stunning-hubble-spiral-galaxy-ngc-2903-photo.html"><span data-dcnode-id="2241" instrument_node="">close-up photo of a spiral galaxy</span></a><span data-dcnode-id="2239" instrument_node=""> that may help demystify black holes, showed us the colorful </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/colorful-dying-star-hubble-telescope-photo.html"><span data-dcnode-id="2238" instrument_node="">demise of a dying star</span></a><span data-dcnode-id="2236" instrument_node=""> and captured incredible </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/interstellar-comet-borisov-new-hubble-telescope-photos.html"><span data-dcnode-id="2235" instrument_node="">images of the interstellar Comet Borisov</span></a><span data-dcnode-id="2233" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="2219"><strong data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">2018</span></strong><span data-dcnode-id="2229" instrument_node="">: Spied the enormous</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/39424-el-gordo-galaxy-cluster-hubble-image.html"><span data-dcnode-id="2228" instrument_node=""> 'El Gordo' galaxy cluster</span></a><span data-dcnode-id="2226" instrument_node="">, watched a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/39719-hubble-watches-giant-neptune-storm-disappear.html"><span data-dcnode-id="2225" instrument_node="">giant storm on Neptune disappear</span></a><span data-dcnode-id="2223" instrument_node=""> and caught a great look at the leftovers of a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/40467-supernova-survivor-hubble-telescope-photo.html"><span data-dcnode-id="2222" instrument_node="">supernova explosion</span></a><span data-dcnode-id="2220" instrument_node="">. &nbsp;&nbsp;</span></li><li data-dcnode-id="2195"><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">2017:</span></strong><span data-dcnode-id="2216" instrument_node=""> Found a</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2214" data-url="https://www.space.com/37705-exoplanet-stratosphere-detected-wasp-121b.html" h pan data-dcnode-id="2201" instrument_node="">, and accidentally discovered several asteroids when they snuck into observations of a</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2199" data-url="https://www.space.com/38655-asteroids-photobomb-galaxy-cluster-hubble-telescope-views.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/38655-asteroids-photobomb-galaxy-cluster-hubble-telescope-views.html"><span data-dcnode-id="2200" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/38655-asteroids-photobomb-galaxy-cluster-hubble-telescope-views.html"><span data-dcnode-id="2198" instrument_node="">galaxy cluster</span></a><span data-dcnode-id="2196" instrument_node="">.&nbsp;</span></li><li data-dcnode-id="2173"><strong data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">2016:</span></strong><span data-dcnode-id="2192" instrument_node=""> Made close-up observations of</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2190" data-url="https://www.space.com/32875-comet-whirls-by-hubble-time-lapse.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/32875-comet-whirls-by-hubble-time-lapse.html"><span data-dcnode-id="2191" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/32875-comet-whirls-by-hubble-time-lapse.html"><span data-dcnode-id="2189" instrument_node="">Comet 252P/LINEAR</span></a><span data-dcnode-id="2187" instrument_node="">), spotted the</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2185" data-url="https://www.space.com/32150-farthest-galaxy-smashes-cosmic-distance-record.html" href="h onent-tracked="1" data-dcnode-id="2137" data-url="https://www.space.com/26118-colorful-hubble-telescope-photo-universe-evolution.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/26118-colorful-hubble-telescope-photo-universe-evolution.html"><span data-dcnode-id="2138" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/26118-colorful-hubble-telescope-photo-universe-evolution.html"><span data-dcnode-id="2136" instrument_node="">Ultraviolet Coverage of the Hubble Ultra Deep Field</span></a><span data-dcnode-id="2134" instrument_node="">, that showed the universe's evolution.</span></li><li data-dcnode-id="2109"><strong data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">2013</span></strong><span data-dcnode-id="2130" instrument_node="">: Performed several observations of the spectacular</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2128" data-url="https://vanilla.tools/22126-comet-ison-galaxies-hubble-photo.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.tools/22126-comet-ison-galaxies-hubble-photo.html"><span data-dcnode-id="2129" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/22126-comet-ison-galaxies-hubble-photo.html"><span data-dcnode-id="2127" instrument_node="">Comet ISON</span></a><span data-dcnode-id="2125" instrument_node=""> before the comet broke up near the sun, examined an</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21436-white-dwarf-eruption-hubble-telescope.html"><span data-dcnode-id="2124" instrument_node=""> explosion on a distant star</span></a><span data-dcnode-id="2122" instrument_node="">, discovered a</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2120" data-url="https://vanilla.tools/21967-tiny-neptune-moon-discovered-hubble-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.tools/21967-tiny-neptune-moon-discovered-hubble-photos.html"><span data-dcnode-id="2121" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21967-tiny-neptune-moon-discovered-hubble-photos.html"><span data-dcnode-id="2119" instrument_node="">new moon of Neptune</span></a><span data-dcnode-id="2117" instrument_node=""> and revealed details about the</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2115" data-url="https://vanilla.tools/23594-milky-way-galaxy-evolution-hubble-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.tools/23594-milky-way-galaxy-evolution-hubble-photos.html"><span data-dcnode-id="2116" instrument_node=""> </span></a><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/23594-milky-way-galaxy-evolution-hubble-photos.html"><span data-dcnode-id="2114" instrument_node="">Milky Way's history</span></a><span data-dcnode-id="2112" instrument_node=""> based on images of 400 galaxies in various stages of evolution.</span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">
&nbsp;</span></li></ul><h3 class="article-body__section" data-dcnode-id="2105" id="section-showing-its-age"><span data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Showing its age</span></span></h3><p data-dcnode-id="2100"><span data-dcnode-id="2104" instrument_node="">Hubble has been showing signs of its advanced age. For example, the telescope went offline for a month in the summer of 2021 after experiencing an </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-serious-glitch-nasa-investigation"><span data-dcnode-id="2103" instrument_node="">issue with its main payload computer</span></a><span data-dcnode-id="2101" instrument_node="">. The Hubble team fixed the problem by switching to backup hardware.&nbsp;</span></p><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">But just a few months later, in October 2021, a problem arose with the synchronization of Hubble's internal messaging, sending all five of the observatory's science instruments into a protective "safe mode." The mission team managed to get all of the instruments back online over the next few months.</span></p><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">If you're a pessimist, you can look at such glitches and conclude that Hubble may be on its last legs. If you're an optimist, you can focus on the success of the troubleshooting efforts and the fact that the Hubble team has faced many such challenges over the past three decades and overcome them all.</span></p><p data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node="">The truth is, nobody knows for sure how much longer Hubble will be able to keep studying the cosmos. Engineering studies suggest that Hubble's various systems will </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/42983-hubble-space-telescope-five-more-years.html"><span data-dcnode-id="2094" instrument_node="">endure through 2025</span></a><span data-dcnode-id="2092" instrument_node=""> and perhaps beyond, but that's just an estimate.</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2090" instrument_node="">Hubble's highly anticipated successor, the $10 billion </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21925-james-webb-space-telescope-jwst.html"><span data-dcnode-id="2089" instrument_node="">James Webb Space Telescope</span></a><span data-dcnode-id="2087" instrument_node="">, is already aloft. Webb launched on Dec. 25, 2021 and arrived at its final destination, the Earth-sun Lagrange Point 2, a month later.&nbsp;</span></p><p data-dcnode-id="2081"><span data-dcnode-id="2085" instrument_node="">Webb is expected to begin science operations in the summer of 2022. Astronomers are excited to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/james-webb-space-telescope-hubble-images-comparison"><span data-dcnode-id="2084" instrument_node="">use Webb and Hubble in tandem</span></a><span data-dcnode-id="2082" instrument_node="">. Webb will view the universe in infrared light whereas Hubble is strongest in optical and ultraviolet wavelengths, so studying the same objects and phenomena with both observatories will provide a wealth of insight and information, NASA officials have said.</span></p><div class="bordeaux-slot" data-dcnode-id="2080" data-feat-ref="bordeaux-feat-id-85" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="2064"><div class="fancy_box-title" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Related stories:</span></div><div class="fancy_box_body" data-dcnode-id="2065"><p data-dcnode-id="2066"><span data-dcnode-id="2077" instrument_node="">— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-30-years-of-astronomy.html"><span data-dcnode-id="2076" instrument_node="">The Hubble Space Telescope and 30 years that transformed our view of the universe</span></a><br data-dcnode-id="2074"><span data-dcnode-id="2073" instrument_node="">
— </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/hubble-space-telescope-one-billion-seconds"><span data-dcnode-id="2072" instrument_node="">1 billion seconds in space! NASA's Hubble Space Telescope surpasses major milestone</span></a><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">
