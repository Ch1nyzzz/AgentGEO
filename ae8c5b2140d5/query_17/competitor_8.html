ode-id="2155"><span data-dcnode-id="2156" instrument_node="">Search</span></span></label><span data-dcnode-id="2153" instrument_node=""> </span><input class="search-field" data-dcnode-id="2152" name="s" placeholder="Search..." type="text"><span data-dcnode-id="2151" instrument_node=""> </span><input class="submit" data-dcnode-id="2150" name="submit" type="submit" value="Search"></form></div></div></div></header><div class="overlay-wrap cf" data-dcnode-id="2144" id="overlay-wrap"></div><div class="Mnet_TopLeft_970x250" data-dcnode-id="2135"><div data-dcnode-id="2142" style="color: silver; font-size: 12px;font-family: 'Kanit', sans-serif;"><span data-dcnode-id="2143" instrument_node="">Advertisement</span></div><div class="ad-tag" data-dcnode-id="2136" id="ezoic-pub-ad-placeholder-101" style="margin: 0px -25px 0px -25px;"><div adonis-marker="" data-dcnode-id="2137" data-pan-sizes="[[728,90],[970,250],[320,50]]" id="div-gpt-ad-1461699599921-2"><span data-dcnode-id="2141" instrument_node=""> </span><span data-dcnode-id="2138" instrument_node=""> </span></div></div></div><div class="singlepost-wrap cf" data-dcnode-id="83" id="singlepost-wrap"><article class="post-85206 post type-post status-publish format-standard has-post-thumbnail hentry category-features tag-astronomy-in-the-middle-ages tag-science tag-sophie-andrade inview" data-dcnode-id="137" id="post-85206"><header class="entry-header cf" data-dcnode-id="2109"><div class="title-wrap" data-dcnode-id="2128"><div class="entry-cats" data-dcnode-id="2131"><span data-dcnode-id="2134" instrument_node=""> </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/category/features/" rel="category tag"><span data-dcnode-id="2133" instrument_node="">Features</span></a></div><h1 class="entry-title" data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Astronomical Instruments in the Middle Ages: More than just a timepiece</span></h1></div><div class="entry-meta cf" data-dcnode-id="2110"><div class="meta-columnone" data-dcnode-id="2113"><div class="author-pic" data-dcnode-id="2125"><span data-dcnode-id="2127" instrument_node=""> </span><img alt="" class="avatar avatar-100 photo gm-observing gm-observing-cb" data-dcnode-id="2126" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7dd1734ef61e81963a2dcaaa459dcdd7%3Fs%3D100%26d%3Dblank%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7dd1734ef61e81963a2dcaaa459dcdd7?s=200&amp;d=blank&amp;r=g 2x" width="100"></div><div class="entry-author" data-dcnode-id="2118"><span data-dcnode-id="2124" instrument_node=""> </span><span class="entry-author" data-dcnode-id="2119"><span data-dcnode-id="2123" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2120"><a class="url fn n" data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/author/charlemagne/"><span data-dcnode-id="2122" instrument_node="">by Medievalists.net</span></a></span></span></div><div class="entry-date" data-dcnode-id="2114"><span data-dcnode-id="2117" instrument_node=""> </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/2021/02/astronomical-instruments-middle-ages/"><span data-dcnode-id="2116" instrument_node="">February 28, 2021</span></a></div></div><div class="meta-columntwo" data-dcnode-id="2112"></div><div class="meta-columnthree" data-dcnode-id="2111"></div></div></header><div class="contentwrap" data-dcnode-id="138"><div class="entry-thumbnail" data-dcnode-id="2106"><span data-dcnode-id="2108" instrument_node=""> </span><img alt="" class="attachment-post-thumbnail size-post-thumbnail wp-post-image gm-loaded gm-observing gm-observing-cb" data-dcnode-id="2107" data-gmsrc="https://www.medievalists.net/wp-content/uploads/2021/02/Astronomical-Instruments-Middle-Ages.jpg" height="522" loading="lazy" sizes="(max-width: 861px) 100vw, 861px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medievalists.gumlet.io/wp-content/uploads/2021/02/Astronomical-Instruments-Middle-Ages.jpg%3Fformat%3Dwebp%26compress%3Dtrue%26quality%3D80%26w%3D800%26dpr%3D1.0&amp;raw" width="861"></div><div data-dcnode-id="139" id="socialicons-sticky"><div class="entry-content" data-dcnode-id="172" id="entry-content"><p data-dcnode-id="2102"><em data-dcnode-id="2103"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">By Sophie Andrade</span></strong></em></p><p data-dcnode-id="2098"><strong data-dcnode-id="2099"><em data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">While astronomical instruments could be as useful to the medieval person as Google Maps is to us today, you pretty much needed a whole degree in mathematics to figure out how to use them properly.</span></em></strong></p><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Several different groups of people in the Middle Ages would have interacted with astronomical instruments at some point in their lives. Students used the instruments at university, monks invented and used them in monasteries, physicians used them to cast horoscopes for patients, and travellers likely used them on the road.</span></p><div class="code-block code-block-1" data-dcnode-id="2083" style="margin: 8px 0; clear: both;"><div class="ad custom intext" data-dcnode-id="2084"><div class="intext_ad_wrapper widget" data-dcnode-id="2085"><a class="remove-ads-link" data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/medievalists/overview"><span data-dcnode-id="2095" instrument_node="">Remove Ads</span></a><span data-dcnode-id="2093" instrument_node=""> </span><span data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Advertisement</span></span><div class="adcontainer ad-tag" data-dcnode-id="2086" id="ad_mnet_mobile1"><span data-dcnode-id="2090" instrument_node=""> </span><span data-dcnode-id="2087" instrument_node=""> </span></div></div></div></div><p data-dcnode-id="2078"><span data-dcnode-id="2082" instrument_node="">Many instruments, such as compass dials, sundials, and </span><em data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">navicula</span></em><span data-dcnode-id="2079" instrument_node="">, were primarily used for timekeeping, while other instruments like the astrolabe and the quadrant were used to track the heavens and predict the position of the planets and stars. In addition to these practical uses, astronomical instruments elevated the status and credibility of their owners by acting as symbols of knowledge, ingenuity, and style.</span></p><p data-dcnode-id="2075"><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Students</span></strong></p><p data-dcnode-id="2070"><span data-dcnode-id="2074" instrument_node="">The Carolingian Renaissance brought about the establishment of universities, and the new computus curriculum provided a better understanding of astronomy and its instruments. Learning with an instrument was not uncommon, and perhaps the best-known evidence for instruments and learning comes from Chaucer’s </span><em data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">Treatise on an Astrolabe</span></em><span data-dcnode-id="2071" instrument_node="">, written in 1391, which describes Chaucer giving the instrument to his 10-year-old son as he prepares to attend university. It was written in the vernacular instead of Latin, which made it accessible to a much wider audience, and it describes the parts of the astrolabe and how to use it in detail.</span></p><p data-dcnode-id="1550"></p><div class="fluid-width-video-wrapper" data-dcnode-id="1551" style="padding-top: 56.25%;"><iframe allowfullscreen="allowfullscreen" class="gm-lazy" data data-dcnode-id="1544" instrument_node="">Advertisement</span></span><div class="adcontainer ad-tag" data-dcnode-id="1538" id="ad_mnet_mobile2"><span data-dcnode-id="1542" instrument_node=""> </span><span data-dcnode-id="1539" instrument_node=""> </span></div></div></div></div><p data-dcnode-id="1530"><span data-dcnode-id="1534" instrument_node="">The library records from Merton College, Oxford, 1320-1340 show that their instruments were sometimes even more valuable than their books. In the mathematical books section, two astrolabes are listed, one priced at 13 shillings 4 pence and the other at 10 shillings. Chaucer mentions astronomical instruments in the </span><em data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Canterbury Tales</span></em><span data-dcnode-id="1531" instrument_node=""> when he describes an astrolabe lying next to books and ‘augrym stones’ on an Oxford student’s bookshelf. Without providing an explanation of what these instruments are, he implies that they are common tools for a student in the fourteenth century. These instruments would have been familiar to his audience and recognized as essentials for astronomical study.</span></p><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Astrolabes were especially useful for study because they could calculate the rising and setting of the planets and the location of the stars and sun without the need to go outside. Students also likely learned with astrolabes and quadrants rather than other instruments, as their many uses, and mathematical nature, made them practical for teaching both geometry and astronomy.</span></p><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Using astronomical instruments improved students’ knowledge and thus improved their status in society. Being a practiced astronomer, or someone who understands how to use an astronomical instrument, provided opportunities for respectable employment. University graduates could look for a patron and become a court astronomer, or they could enter a monastery and join the ranks of renowned astronomers and inventors.</span></p><div class="code-block code-block-3" data-dcnode-id="1513" style="margin: 8px 0; clear: both;"><div class="ad custom intext" data-dcnode-id="1514"><div class="intext_ad_wrapper widget" data-dcnode-id="1515"><a class="remove-ads-link" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/medievalists/overview"><span data-dcnode-id="1525" instrument_node="">Remove Ads</span></a><span data-dcnode-id="1523" instrument_node=""> </span><span data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Advertisement</span></span><div class="adcontainer ad-tag" data-dcnode-id="1516" id="ad_mnet_mobile3"><span data-dcnode-id="1520" instrument_node=""> </span><span data-dcnode-id="1517" instrument_node=""> </span></div></div></div></div><p data-dcnode-id="993"></p><div class="fluid-width-video-wrapper" data-dcnode-id="994" style="padding-top: 56.25%;"><iframe allowfullscreen="allowfullscreen" class="gm-lazy" data-dcnode-id="995" frameborder="0" loading="lazy" name="fitvid1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/N8oWGwcdFmA&amp;raw"><html data-cast-api-enabled="true" data-dcnode-id="997" dir="ltr" lang="en"><head data-dcnode-id="1487"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1507" name="viewport"/><link data-dcnode-id="1502" href="https://www.youtube.com/s/player/9cdfefcf/www-player.css" name="www-player" nonce="PhSU5aUrYrfQK4ReMEQzQA" rel="stylesheet"/><title data-dcnode-id="1489">YouTube</title><link data-dcnode-id="1488" href="https://www.youtube.com/watch?v=N8oWGwcdFmA" rel="canonical"/></meta></head><body class="date-20220430 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="998" dir="ltr"><div data-dcnode-id="1005" id="player" style="wi node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=N8oWGwcdFmA" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p></p><p data-dcnode-id="990"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Clergy</span></strong></p><p data-dcnode-id="985"><span data-dcnode-id="989" instrument_node="">Monks used astrolabes and other astronomical instruments too, particularly for calculating the hours of the day for prayer. They also relied on their instruments to calculate the time of Easter and other moveable feasts. The clergy followed canonical hours, and their days were divided into times for prayer. The rise of monasticism and specifically the spread of the </span><em data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Rule of Saint Benedict</span></em><span data-dcnode-id="986" instrument_node=""> solidified these prayer hours into a system called the Divine Office, which consisted of seven specific times for prayer during the day and one at night.</span></p><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">In the early seventh century, sundials began to appear on church walls to aid monks in keeping to canonical hours while also reminding lay people, when they passed the clock, to take a moment to pray. They were used by astronomers, mathematicians and theologians alike to determine the dates of Easter and eventually create the Gregorian calendar.</span></p><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">By the mid-fourteenth century, Benedictine monasteries were ordered by the papal office to send at least one monk in twenty to a university, where they mainly studied theology and canon law, but would have also had opportunities to study other subjects including mathematics and astronomy. Although not all monks went to university, they were still able to engage with astronomy and its instruments within their cloister. Those who did attend university could bring back books to keep in the monastic library, where they were available for all to read.</span></p><div class="code-block code-block-4" data-dcnode-id="968" style="margin: 8px 0; clear: both;"><div class="ad custom intext" data-dcnode-id="969"><div class="intext_ad_wrapper widget" data-dcnode-id="970"><a class="remove-ads-link" data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/medievalists/overview"><span data-dcnode-id="980" instrument_node="">Remove Ads</span></a><span data-dcnode-id="978" instrument_node=""> </span><span data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Advertisement</span></span><div class="adcontainer ad-tag" data-dcnode-id="971" id="ad_mnet_mobile4"><span data-dcnode-id="975" instrument_node=""> </span><span data-dcnode-id="972" instrument_node=""> </span></div></div></div></div><figure aria-describedby="caption-attachment-85208" class="wp-caption aligncenter" data-dcnode-id="963" id="attachment_85208" style="width: 571px"><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/2021/02/astronomical-instruments-middle-ages/abbot_richard_wallingford/" rel="attachment wp-att-85208"><img alt="" class="wp-image-85208 gm-loaded gm-observing gm-observing-cb" data-dcnode-id="967" data-gmsrc="https://www.medievalists.net/wp-content/uploads/2021/02/Abbot_Richard_Wallingford.jpg" height="613" loading="lazy" sizes="(max-width: 571px) 100vw, 571px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medievalists.gumlet.io/wp-content/uploads/2021/02/Abbot_Richard_Wallingford.jpg%3Fformat%3Dwebp%26compress%3Dtrue%26quality%3D80%26w%3D576%26dpr%3D1.0&amp;raw" width="571"></a><figcaption class="wp-caption-text" data-dcnode-id="964" id="caption-attachment-85208"><span data-dcnode-id="965" instrument_node="">Richard of Wallingford pointing to a clock, in reference to his gift to the abbey. British Library Cotton Nero D. VII, f.20</span></figcaption></figure><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Richard of Wallingford, a fourteenth-century Benedictine monk, was one such monk who was able to attend university for an extended period of time and created some very influential instruments while he was abbot of St Albans Abbey.</span></p><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Orphaned at age ten, Richard was taken in by the prior of Wallingford and then attended Oxford University for nine years.&nbsp; He became abbot of St Albans in 1326 and, as an advanced mathematician, he invented two astronomical instruments as well as an immense astronomical clock.</span></p><p data-dcnode-id="951"><span data-dcnode-id="958" instrument_node="">He invented two instruments: the Albion, an instrument used to find the position of the planets, and the </span><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Rectangulus</span></em><span data-dcnode-id="955" instrument_node="">, an advanced astrolabe that was used for spherical trigonometry. His third invention, a great astronomical clock called the </span><em data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">machina mundi</span></em><span data-dcnode-id="952" instrument_node="">, was admired centuries later by John Leland when he visited St Albans in 1540. Leland described the mechanisms of the clock by writing, ‘One may look at the course of the sun and moon or the fixed stars or again one may regard the rise and fall of the tide’. This was certainly an impressive instrument that was no less wonderful to its observers two hundred years after its creation.</span></p><p data-dcnode-id="948"><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Physicians</span></strong></p><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Astrology and the movements of the planets were thought to have great influence on a person’s life. It was part of a physician’s duty to consult the heavens and take their positions into account when diagnosing and treating a patient.</span></p><div class="code-block code-block-5" data-dcnode-id="933" style="margin: 8px 0; clear: both;"><div class="ad custom intext" data-dcnode-id="934"><div class="intext_ad_wrapper widget" data-dcnode-id="935"><a class="remove-ads-link" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/medievalists/overview"><span data-dcnode-id="945" instrument_node="">Remove Ads</span></a><span data-dcnode-id="943" instrument_node=""> </span><span data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Advertisement</span></span><div class="adcontainer ad-tag" data-dcnode-id="936" id="ad_mnet_mobile5"><span data-dcnode-id="940" instrument_node=""> </span><span data-dcnode-id="937" instrument_node=""> </span></div></div></div></div><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Astrolabes were likely only used by royal physicians since they were so expensive, and much cheaper almanacs could be used in a similar fashion. These almanacs, or folded almanacs, while not technically astronomical instruments, should be noted for their presence in the world of medieval medicine. They were usually about twelve to twenty pages long and they appeared most commonly in England in the later Middle Ages. They would often have calendars of movable feasts, lunar tables, calendars of lunar and solar eclipses, diagrams of urine vessels, instructions for making astrological predictions, as well as diagrams of the Vein Man and the Zodiac Man.</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">A Vein Man is a diagram of a man which shows the location of veins and arteries, while a Zodiac Man is a diagram that labels the body with the signs of the zodiac in the locations over which they were believed to have influence. These almanacs were likely used by physicians of all levels and while they were designed to be worn hanging from a belt, they were more likely carried around in a protective case.</span></p><figure aria-describedby="caption-attachment-71077" class="wp-caption aligncenter" data-dcnode-id="924" id="attachment_71077" style="width: 570px"><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medievalists.net/2017/10/pharmacy-testing-language-truth-renaissance-italy-2/p-_26_the_zodiac_man_a_diagram_of_a_human_body_and_astrological_symbols_with_instructions_explaining_the_importance_of_astrology_fro1/" rel="attachment wp-att-71077"><img alt="" class="size-full wp-image-71077 gm-loaded gm-observing gm-observing-cb" data-dcnode-id="928" data-gmsrc="https://www.medievalists.net/wp-content/uploads/2017/10/P._26_The_Zodiac_Man_a_diagram_of_a_human_body_and_astrological_symbols_with_instructions_explaining_the_importance_of_astrology_fro1-e1507124901105.jpg" height="499" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medievalists.gumlet.io/wp-content/uploads/2017/10/P._26_The_Zodiac_Man_a_diagram_of_a_human_body_and_astrological_symbols_with_instructions_explaining_the_importance_of_astrology_fro1-e1507124901105.jpg%3Fformat%3Dwebp%26compress%3Dtrue%26quality%3D80%26w%3D576%26dpr%3D1.0&amp;raw" width="570"></a><figcaption class="wp-caption-text" data-dcnode-id="925" id="caption-attachment-71077"><span data-dcnode-id="926" instrument_node="">‘The Zodiac Man’, c. 1488, National Library of Wales, MS 3026C.</span></figcaption></figure><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">At the University in Bologna in the 1320s, an astrologer named Cecco d’Ascoli began his lectures by claiming astrology was an integral part of the study of medicine, and medical astrology became particularly popular in Italian universities in the fourteenth and fifteenth centuries. Most physicians would have had at least a surface knowledge of astrology in order to treat patients and take their horoscopes.</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">More often than not, physicians would retroactively diagnose or explain an illness based on previous horoscopes rather than predict imminent illnesses in the future. They would do this by determining the time of their patient’s birth, figuring out their horoscope and comparing it with the current position of the celestial bodies. From there they were able to interpret how the positions of the planets might have affected their patients in the recent past.</span></p><p data-dcnode-id="917"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Travellers and Pilgrims</span></strong></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Astrolabes and other instruments were also used by travellers such as pilgrims and merchants. They could use their instruments to measure the distance to certain objects of a known height, determine the time of day, and from there determine when it would get dark. Astrolabes especially were perfect for determining a journey’s length and when one should stop to find shelter.</span></p><p data-dcnode-id="910"><span data-dcnode-id="914" instrument_node="">The </span><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Practica geometriae</span></em><span data-dcnode-id="911" instrument_node=""> by Dominicus de Clavasio c. 1346 describes how an astrolabe can be used for many practical things while travelling, such as determining the ‘distance between the summits of two mountains, the length of a valley, or the distance between the foot of a mountain and its summit’.</span></p><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Sundials, however, were likely more popular with travellers due to their smaller size and affordability. Sundials are one of the oldest astronomical instruments, dating back to 1500 BCE. Portable versions of sundials were popular among travellers, especially universal sundials which worked at different latitudes.</span></p><p data-dcnode-id="386"></p><div class="fluid-width-video-wrapper" data-dcnode-id="387" style="padding-top: 56.25%;"><iframe allowfullscreen="allowfullscreen" class="gm-lazy" data-dcnode-id="388" frameborder="0" loading="lazy" name="fitvid2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/tI0GqYJha1Q&amp;raw"><html data-cast-api-enabled="true" data-dcnode-id="390" dir="ltr" lang="en"><head data-dcnode-id="880"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="901" name="viewport"/><link data-dcnode-id="896" href="https://www.youtube.com/s/player/9cdfefcf/www-player.css" name="www-player" nonce="b3WNk0HpCIPPhNQcw8HW8w" rel="stylesheet"/><title data-dcnode-id="883">YouTube</title><link data-dcnode-id="882" href="https://www.youtube.com/watch?v=tI0GqYJha1Q" rel="canonical"/><link data-dcnode-id="881" data-loaded="true" href="https://www.youtube.com/s/player/9cdfefcf/www-player.css" id="css-2498650825" nonce="diUBtp6gtsI4enD0EgoMwg" rel="stylesheet"/></meta></head><body class="date-20220430 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="391" dir="ltr"><div data-dcnode-id="398" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls ytp-large-width-mode" data-dcnode-id="399" data-version="/s/player/9cdfefcf/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div h class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="416" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="414" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="409"><use class="ytp-svg-shadow" data-dcnode-id="411" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="412" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="410" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="405"><use class="ytp-svg-shadow" data-dcnode-id="407" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="408" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="406" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=tI0GqYJha1Q" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Using a table inscribed on the sundial, the traveler would determine their latitude based on which city they were in (or closest to) and adjust the angle of the dial. ‘Pin-gnomon’ dials found the length of daylight hours so travel could be planned accordingly. If the dial came with a device called a lunar volvelle, the traveler could use it to determine the amount of moonlight hours expected for that season as well.</span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Merchants and tradespeople would likely have used such instruments while conducting their business, as the rise of urban centres, trade, and the merchant class gave new meaning to the passage of time: to waste time was to waste money.</span></p><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">Despite this wide array of people, social classes, and usages, the owners of instruments all had these things in common: their instruments gave them knowledge, prestige, and a chance to show off their wealth and interest in astronomy. The student is identifiable in the </span><em data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Canterbury Tales</span></em><span data-dcnode-id="378" instrument_node=""> by his instruments and owning them was a symbol of learning and accomplishment.&nbsp; Monks who used and invented instruments, like Richard of Wallingford, brought renown to their monasteries and were regarded as the most gifted men of their time. Astrolabes lent a sense of wonder to the physician’s art as their knowledge of the human body and its ailments was proven through their use of instruments and almanacs. An astrolabe or sundial with several latitudes inscribed upon it proved how widely one had travelled and, if the device had been used for pilgrimage, it could also prove how devout one was. Any astronomical instrument represented knowledge and learning, and sometimes wealth, and along with their practical uses, they symbolised their owner’s power, status, and deep understanding of medieval astronomy and the heavens.</span></p><p data-dcnode-id="374" style="padding-left: 40px;"><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Sophie Andrade is a recent graduate of the University of St Andrews with an MLitt in Medieval Studies. Her research focuses on medieval women, music, manuscripts, and castles. She lives in Nottingham, England.</span></em></p><p data-dcnode-id="368"><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Armillary-Astrolabe-Maritime-Nautical-Collectible/dp/B07TN28CT5%3Fac_md%3D1-1-YXN0cm9sYWJlIGluc3RydW1lbnQgZnVuY3Rpb25hbA%253D%253D-ac_d_rm%26cv_ct_cx%3Dastrolabe%26dchild%3D1%26keywords%3Dastrolabe%26pd_rd_i%3DB07TN28CT5%26pd_rd_r%3D9ce44942-adc3-460b-85ed-8302535b1124%26pd_rd_w%3Dps6bW%26pd_rd_wg%3D3TQmO%26pf_rd_p%3D5ceb2a76-ceaa-45a9-982b-6fa61a20d67b%26pf_rd_r%3D4XT1ZM6WHM91R2WHH4FM%26psc%3D1%26qid%3D1614545496%26sr%3D1-2-12d4272d-8adb-4121-8624-135149aa9081%26linkCode%3Dli3%26tag%3Dmedievalistsn-20%26linkId%3Dcf706e0dc91c26f67660e456578c7887%26language%3Den_US%26ref_%3Das_li_ss_il" rel="noopener" target="_blank"><img border="0" class="alignright gm-observing gm-observing-cb" data-dcnode-id="373" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3F_encoding%3DUTF8%26ASIN%3DB07TN28CT5%26Format%3D_SL250_%26ID%3DAsinImage%26MarketPlace%3DUS%26ServiceVersion%3D20070822%26WS%3D1%26tag%3Dmedievalistsn-20%26language%3Den_US&amp;raw"></a><img alt="" border="0" class="gm-observing gm-observing-cb" data-dcnode-id="371" height="1" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ir-na.amazon-adsystem.com/e/ir%3Ft%3Dmedievalistsn-20%26language%3Den_US%26l%3Dli3%26o%3D1%26a%3DB07TN28CT5&amp;raw" style="border: none !important; margin: 0px !important;" width="1"><strong data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Further Reading:</span></strong></p><p data-dcnode-id="362"><span data-dcnode-id="367" instrument_node="">Chaucer, Geoffrey. ‘</span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sourcebooks.fordham.edu/source/chaucer-astro.asp"><strong data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">A Treatise on the Astrolabe< cience: objects and investigations</span></em></strong></a><span data-dcnode-id="340" instrument_node=""> (Cambridge, 2019), pp. 33-54.</span></p><p data-dcnode-id="334"><span data-dcnode-id="338" instrument_node="">Falk, Seb. “I Found This Written in the Other Book’: Learning Astronomy in Late Medieval Monasteries’. </span><em data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Studies in Church History</span></em><span data-dcnode-id="335" instrument_node=""> 55 (2019), pp. 129-144.</span></p><p data-dcnode-id="327"><span data-dcnode-id="333" instrument_node="">Gimpel, Jean. </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/37SeNX9"><strong data-dcnode-id="330"><em data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">The Medieval Machine: The Industrial Revolution of the Middle Ages</span></em></strong></a><span data-dcnode-id="328" instrument_node=""> (London: Pimlico, 1993).</span></p><p data-dcnode-id="322"><span data-dcnode-id="326" instrument_node="">Giralt, Sebastià. ‘Astrology in the service of the crown: Bartomeu de Tresbens, physician and astrologer to Pere the Ceremonious of Aragon’. </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Journal of Medieval History</span></em><span data-dcnode-id="323" instrument_node=""> 44 (21 November 2017) pp. 104-129.</span></p><p data-dcnode-id="315"><span data-dcnode-id="321" instrument_node="">McCluskey, Stephen C. </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2NGGFXI"><strong data-dcnode-id="318"><em data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Astronomies and Cultures in Early Medieval Europe</span></em></strong></a><span data-dcnode-id="316" instrument_node=""> (Cambridge: Cambridge University Press, 1998).</span></p><p data-dcnode-id="308"><span data-dcnode-id="314" instrument_node="">Schechner, Sara J. ‘
