</span></div><span class="marker before-article" data-dcnode-id="1136"></span><div class="md-sentinel--spy-target" data-dcnode-id="1135"></div><section data-dcnode-id="1095" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1102"><strong data-dcnode-id="1132"><span data-dcnode-id="1134" id="ref65385"></span><span data-dcnode-id="1133" instrument_node="">coelostat</span></strong><span data-dcnode-id="1131" instrument_node="">,  device consisting of a flat mirror that is turned slowly by a motor to reflect a portion of the sky continuously into a fixed </span><a class="md-crosslink" data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope"><span data-dcnode-id="1130" instrument_node="">telescope</span></a><span data-dcnode-id="1128" instrument_node="">. The mirror is </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1126" data-term="mounted" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/mounted"><span data-dcnode-id="1127" instrument_node="">mounted</span></a><span data-dcnode-id="1125" instrument_node=""> to rotate about an axis through its front surface that points to a celestial pole and is driven at the rate of one revolution in 48 hours. The telescope image is then stationary and nonrotating. The coelostat is particularly useful in </span><span data-dcnode-id="1124" id="ref65386"></span><a class="md-crosslink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/eclipse"><span data-dcnode-id="1123" instrument_node="">eclipse</span></a><span data-dcnode-id="1121" instrument_node=""> expeditions when elaborate equatorial mounting of telescopes is impossible. Other instruments that are used to reflect light into a fixed telescope are the </span><span data-dcnode-id="1120" id="ref65387"></span><a class="md-crosslink" data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/heliostat"><span data-dcnode-id="1119" instrument_node="">heliostat</span></a><span data-dcnode-id="1117" instrument_node="">, which produces an image of the </span><a class="md-crosslink" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1116" instrument_node="">Sun</span></a><span data-dcnode-id="1114" instrument_node="">, and the </span><span data-dcnode-id="1113" id="ref65388"></span><a class="md-crosslink" data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/siderostat"><span data-dcnode-id="1112" instrument_node="">siderostat</span></a><span data-dcnode-id="1110" instrument_node="">, which is like a heliostat but is used to observe </span><a class="md-crosslink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1109" instrument_node="">stars</span></a><span data-dcnode-id="1107" instrument_node="">. The coelostat was invented by French physicist </span><span data-dcnode-id="1106" id="ref1185767"></span><a class="md-crosslink" data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gabriel-Lippmann"><span data-dcnode-id="1105" instrument_node="">Gabriel Lippmann</span></a><span data-dcnode-id="1103" instrument_node=""> in 1895.</span></p><span class="marker p1" data-dcnode-id="1100"></span><span class="marker AM1 am-inline" data-dcnode-id="1098"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1096"></span></section><span data-dcnode-id="1094" instrument_node="">

</span></div><span class="marker before-article" data-dcnode-id="738"></span><div class="md-sentinel--spy-target" data-dcnode-id="737"></div><section data-dcnode-id="708" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="715"><strong data-dcnode-id="734"><span data-dcnode-id="736" id="ref10444"></span><span data-dcnode-id="735" instrument_node="">siderostat</span></strong><span data-dcnode-id="733" instrument_node="">,   any of a class of astronomical instruments consisting of a flat mirror that is turned slowly by a motor to reflect a given region of the sky continuously into a fixed telescope. In the traditional siderostat, the mirror is rotated by a lever arm connected to a motor that turns at a rate of one revolution every 24 hours. This so-called </span><span data-dcnode-id="732" id="ref10445"></span><span data-dcnode-id="731" instrument_node="">Foucault siderostat provides a fixed but rotating image. In recent years the Foucault siderostat has been largely </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="729" data-term="supplanted" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/supplanted"><span data-dcnode-id="730" instrument_node="">supplanted</span></a><span data-dcnode-id="728" instrument_node=""> by the </span><a class="md-crosslink" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/heliostat"><span data-dcnode-id="727" instrument_node="">heliostat</span></a><span data-dcnode-id="725" instrument_node=""> (</span><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">q.v.</span></em><span data-dcnode-id="722" instrument_node="">), which is a polar siderostat, and by the </span><a class="md-crosslink" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/coelostat"><span data-dcnode-id="721" instrument_node="">coelostat</span></a><span data-dcnode-id="719" instrument_node=""> (</span><em data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">q.v.</span></em><span data-dcnode-id="716" instrument_node="">).</span></p><span class="marker p1" data-dcnode-id="713"></span><span class="marker AM1 am-inline" data-dcnode-id="711"></span><span class="marker MOD1 mod-inline" data-dcnode-id="709"></span></section><span data-dcnode-id="707" instrument_node="">
