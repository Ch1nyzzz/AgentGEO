</span><div class="content" data-dcnode-id="57"><span data-dcnode-id="110" instrument_node="">
</span><h1 data-dcnode-id="107"><a data-dcnode-id="108" name="top"><span data-dcnode-id="109" instrument_node="">The Astronomical Clock - can you guess what time it is?</span></a></h1><span data-dcnode-id="106" instrument_node="">
</span><p data-dcnode-id="102"><a data-dcnode-id="104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/pic8.php"><img alt="Astronomical clock" class="floatleft" data-dcnode-id="105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/thumbnails/dsc_0241.jpg&amp;raw" title="Astronomical clock"></a><span data-dcnode-id="103" instrument_node=""> According to the latest researches, the astronomical clock was constructed in 1410 by the clockmaker Mikulas of Kadan in collaboration with Jan Ondrejuv called Sindel, professor of mathematics and astronomy of Prague Charles University.</span></p><span data-dcnode-id="101" instrument_node="">
</span><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">The astrolabe mechanisms they have built over 600 years ago are still functional. 80 years later, the legendary master Hanus rebuild the clock and as legend has it, the Councillors had him blinded, so that he would not ever manage to build another instrument greater than the Orloj in Prague. </span></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="94"><a data-dcnode-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/pic4.php"><img alt="The clock's dial" class="floatright" data-dcnode-id="97" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/thumbnails/dsc_0053.jpg&amp;raw" title="The clock's dial"></a><span data-dcnode-id="95" instrument_node=""> The story also says that before he died, master Hanus deliberately damaged the clock so seriously, that nobody could ever fix it again. He also cursed the instrument, so those who tried to repair it have either gone mad or died.</span></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">The figures of the 12 apostles, blessing the city at every  hour were added in more recent times, during the major repair work carried out between the years 1865-1866. </span></p><span data-dcnode-id="90" instrument_node="">

 The clock and the entire City Hall had a lot to suffer during the Second World War in 1945. On the last day of the war, the centre of old Prague was the aim of the Nazi artillery. The entire building of the Old Town Hall burnt down. Fortunately, everything could be reconstructed and the figures of the apostles replaced by the creations of the woodcarver Vojtech Sucharda after the end of the Second World War. 

	</span><p data-dcnode-id="86"><a data-dcnode-id="88" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/pic1.php"><img alt="Calendar disk with immobile figures: a chronicler, an angel, an astronomer and a philosopher (from left to right" class="floatleft" data-dcnode-id="89" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/thumbnails/dsc_0046.jpg&amp;raw" title="Calendar disk with immobile figures: a chronicler, an angel, an astronomer and a philosopher (from left to right"></a><span data-dcnode-id="87" instrument_node=""> Except the figures of the 12 apostles there are also eight immobile figures on the left and right side of the clock dial and the calendar. </span></p><span data-dcnode-id="85" instrument_node="">
</span><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">Let’s take them in order: the four figures at the clock dial are symbols of the Prague medieval society. On the left side are represented Vanity admiring himself in a mirror and the Miser/Jew holding into his bag of gold. On the right side are represented Death ringing his bell and a Turk (or The Piper) shaking his head.</span></p><span data-dcnode-id="82" instrument_node="">
</span><p data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">Under the clock dial you will see the Calendar, painted by Josef Manes in 1805. Well, the one you will see is actually a replica, the original are safely kept on the sides of the stairway of the Prague Museum of History. Getting back to our figures, at the Calendar you will see: a chronicler, an angel, an astronomer and a philosopher (from left to right).</span></p><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">The Clock Tower is also decorated with exquisite coats of arms and different royal symbols. There is also a rooster that crows after the Apostles have finished their blessing. </span></p><span data-dcnode-id="76" instrument_node="">
</span><p data-dcnode-id="72"><a data-dcnode-id="74" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/pic7.php"><img alt="Interior of the Old town city hall tower that hosts the Astronomical clock" class="floatright" data-dcnode-id="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/thumbnails/dsc_0208.jpg&amp;raw" title="Interior of the Old town city hall tower that hosts the Astronomical clock"></a><span data-dcnode-id="73" instrument_node=""> It may seem the funniest thing, but on the Prague Orloj one can read almost anything BUT the time (that if he he not an ancestor of master Hanus, of course:-) </span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">The Sphere or clock dial shows most important astronomical events: movement of the sun (notice that the sun circles around the Earth and not the other way around), phases of the moon, the equinoxes, the seasons, the days and the zodiac. </span></p><span data-dcnode-id="68" instrument_node="">
</span><p data-dcnode-id="64"><span data-dcnode-id="67" instrument_node="">For more pictures see </span><a data-dcnode-id="65" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prague.net/gallery/astronomical-clock/"><span data-dcnode-id="66" instrument_node="">Astronomocal clock photo gallery</span></a></p><span data-dcnode-id="63" instrument_node="">
</span><p data-dcnode-id="59"><a data-dcnode-id="61" href="#top"><span data-dcnode-id="62" instrument_node="">Top of the page</span></a><span data-dcnode-id="60" instrument_node="">.</span></p><span data-dcnode-id="58" instrument_node="">
