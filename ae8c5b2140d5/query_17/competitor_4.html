</span><h2 data-dcnode-id="2536"><span class="ez-toc-section" data-dcnode-id="2540" id="Astronomy_of_the_Pharaohs"></span><strong data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Astronomy of the Pharaohs:</span></strong><span class="ez-toc-section-end" data-dcnode-id="2537"></span></h2><span data-dcnode-id="2535" instrument_node="">
</span><h3 data-dcnode-id="2524"><span class="ez-toc-section" data-dcnode-id="2534" id="The_decorated_sun_dial_in_the_Pharaonic_civilization"></span><strong data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">The decorated sun dial in the</span></strong><span data-dcnode-id="2531" instrument_node=""> </span><strong data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">Pharaonic</span></strong><span data-dcnode-id="2528" instrument_node=""> </span><strong data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">civilization: </span></strong><span class="ez-toc-section-end" data-dcnode-id="2525"></span></h3><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">In addition to using the column facing sunlight and measuring its length, the Egyptians used two other types of simple tools, such as the wooden or ivory ruler with a vertical edge and a hard wire, where the 12 points that represent the hours were carved on the ruler towards the corresponding hour, and this tool continued to be used to measure time and calculate the time measuring.</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Responsible for turning the wheeled machines and fixing a time to open the dams in the fields. It took the use of a long ruler to measure the long shadows drawn in the morning and evening and thus built by the Egyptians so that the shadow was drawn on a curved surface where the necessary length is completely shortened. In both cases, the measurement of time was inaccurate.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><h3 data-dcnode-id="2512"><span class="ez-toc-section" data-dcnode-id="2516" id="Astronomy_of_the_Pharaohs_-_Clepsydra"></span><strong data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Astronomy of the Pharaohs – Clepsydra: </span></strong><span class="ez-toc-section-end" data-dcnode-id="2513"></span></h3><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Egyptian references show that this instrument was used around 1580 BC., but its conception dates back to the 15th century BC (1417 BC.) and was used to measure time at night.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The clepsydra consists of a vase decorated on the outside with images of stars, zodiac signs and hieroglyphics, some of which say (each image at the time… In order to determine the hours of the night when the zodiacs sign, the right time for sacrifice can be determined all the time.</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">The inner surface of the vase contained the following (for each month there was a vertical row of twelve signs, each indicating one hour &nbsp;&nbsp;of the twelve hours of the night this month) and the sentence came to consider the different hours of the night and the hours of the day in summer and winter.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">The vase had a small hole at the bottom that allowed the liquid to pass gradually and the vase was listed from the inside at a steady and constant rate of water flow within an hour. But this device was not accurate, and they created a deviant cylindrical shape to avoid errors, but this was not enough to compensate for the decrease in pressure leading to a decrease in water drainage.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Creating an accurate clepsydra was only available after complex calculations that Egyptian scholars were not able to do, because the deviant cylindrical shape adopted after trial and error would certainly not correct some of the difficult error, but the result remains approximate. At the end of their time, the Egyptians tried to avoid scarcity by using a cylindrical clepsydra operating by the water filling system</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">The water flows gradually and there are lines indicating the hours gradually as the level rises systematically and this is due to a tank always filled, this device has become more accurate than the clepsydra based on water flow. But we don’t know if that’s true.</span></p><span data-dcnode-id="2493" instrument_node="">
</span><h3 data-dcnode-id="2482"><span class="ez-toc-section" data-dcnode-id="2492" id="Astronomy_of_the_Pharaohs_-_The_Merkhet_instrument_for_stargazing_and_determining_the_night"></span><strong data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Astronomy of the Pharaohs – The Merkhet</span></strong><span data-dcnode-id="2489" instrument_node=""> </span><strong data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">instrument for</span></strong><span data-dcnode-id="2486" instrument_node=""> </span><strong data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">stargazing and determining the night: </span></strong><span class="ez-toc-section-end" data-dcnode-id="2483"></span></h3><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2478"><strong data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">It is a double device composed of:</span></strong></p><span data-dcnode-id="2477" instrument_node="">
</span><ul data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node="">
</span><li data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">It consists of a palm tree branch split in its wider section, the astronomer looked through the incision made in the branch to a lead wire called (Plum Bob).</span></li><span data-dcnode-id="2473" instrument_node="">
</span></ul><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">■ This lead wire (Plumb Bob), which is held by an assistant sitting near the astronomer holding the Merkhet (the branch of the palm tree) and this Plumb Bob consists of a horizontal ruler that shaves the lead wire on it so that the lead wire corresponds to a mark in the wood.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">The monitors sit opposite to each other on a north-south axis and the hours are determined when the rays of certain planets pass through the vertical wire passing through the heart, right or left eye or other parts of the viewer’s body. The results are comparable to the graphs of pre-placed diagrams &nbsp;&nbsp;consisting of a square grid from which the viewer is separated, while the planets are arranged around it, and the texts determine the location of the planets in relation to the body of the auxiliary person.</span></p><span data-dcnode-id="2465" instrument_node="">
</span><h3 data-dcnode-id="2460"><span class="ez-toc-section" data-dcnode-id="2464" id="Astronomy_of_the_Pharaohs_-_Egyptian_calendars"></span><strong data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Astronomy of the Pharaohs – Egyptian calendars:</span></strong><span class="ez-toc-section-end" data-dcnode-id="2461"></span></h3><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">The Egyptian calendar originally comes from a deep mythology, and Egyptian mythology has stated that it was the God Thot who invented all science and brought it back to Earth, where he ruled for 3,000 years, and the character of God Thot was associated with the Sumerian character of Hermes.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Legends had taught us that the oldest of the 36,000 books of knowledge written by Thot according to the Egyptian Hellenistic historian Manethon was astronomy and the calendar, and that the day was divided into ten hours, each hour was divided into 100 minutes. and each minute was divided into &nbsp;&nbsp;&nbsp;100 seconds. According to Egyptian mythology, Thot is the first teacher of humanity and the inventor of writing.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">This information shows that the system in the calendar was decimal and was not a sexagesimal system such as that of the Sumerians. But it is the myths that have told us that there is a sexagesimal system implicit in the decimal system because the science of the Egyptian calendar has divided the year (12) months and each month into (20) days and divided the (360) days into three equal seasons as we will see, which means that it combines the decimal and the sexagesimal systems, which also happened with the Babylonian astronomical system.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><h3 data-dcnode-id="2445"><span class="ez-toc-section" data-dcnode-id="2449" id="Astronomy_of_the_Pharaohs_-_Lunar_Calendar"></span><strong data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Astronomy of the Pharaohs – Lunar Calendar:</span></strong><span class="ez-toc-section-end" data-dcnode-id="2446"></span></h3><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">The oldest time measuring system in Egypt was the lunar calendar, which was overseen by the god Osiris (not Thot) with his 28 guards. There was a name for each lunar month and there was even a name for each day of the 28-day lunar month, and the lunar calendar seemed to have two phases: early (leap) and late (dotit).</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">The first 14 days, the crescent moon’s growth days to the full moon, had fourteen gods to take care of each day, as well as the 14 days of disintegration of the moon from the full moon to the crescent, which is described in this form.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><h3 data-dcnode-id="2430"><span class="ez-toc-section" data-dcnode-id="2437" id="The_seasons_of_the_year_among_the_pharaohs"></span><strong data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">The seasons of the year among the</span></strong><span data-dcnode-id="2434" instrument_node=""> </span><strong data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">pharaohs:</span></strong><span class="ez-toc-section-end" data-dcnode-id="2431"></span></h3><span data-dcnode-id="2429" instrument_node="">
</span><ol data-dcnode-id="2405"><span data-dcnode-id="2428" instrument_node="">
</span><li data-dcnode-id="2424"><strong data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">The months of the flood (Akhet)</span></strong><span data-dcnode-id="2425" instrument_node=""> the appearance of water on earth, which is the flood of the Nile, which begins from mid-July to mid-November, and the word Akhet means the horizon, where the appearance of water on the horizon and the sowing of seeds and the appearance of the sun on the horizon, this chapter includes four Egyptian months (Thot, Babah, Hathor and Kayahk).</span></li><span data-dcnode-id="2423" instrument_node="">
</span><li data-dcnode-id="2419"><strong data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">The winter months (Peret), that is, the exit from planting the soil, which is the season of germination and</span></strong><span data-dcnode-id="2420" instrument_node=""> rain, begins from mid-November to mid-March and includes four Egyptian months (Touba, Mekhir, Famont, Farmoti).</span></li><span data-dcnode-id="2418" instrument_node="">
</span><li data-dcnode-id="2414"><strong data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">The summer months (Shemu),</span></strong><span data-dcnode-id="2415" instrument_node=""> that is, water scarcity, which is the &nbsp;&nbsp;&nbsp;drought season, begins from mid-March, until mid-July, during which the plant ripens and harvests, and the land is infected with water scarcity and drought, also called harvest or crop harvest, and includes four Egyptian months (Pakhons, Paona, Abib and Mess Ra or Mesri).</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2407"><strong data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">The days </span></strong><span data-dcnode-id="2410" instrument_node="">of Nessi</span><strong data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">‘.</span></strong></li><span data-dcnode-id="2406" instrument_node="">
</span></ol><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2401"><strong data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="2400" instrument_node="">
</span><h3 data-dcnode-id="2394"><span class="ez-toc-section" data-dcnode-id="2399" id="Astronomy_of_the_Pharaohs_-_Palm_Calendar"></span><strong data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Astronomy of the Pharaohs</span></strong><span data-dcnode-id="2396" instrument_node=""> – Palm Calendar:</span><span class="ez-toc-section-end" data-dcnode-id="2395"></span></h3><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">The ancient Egyptians were introduced to the seasons and months of the year by the right palm, where the upper tips of the four fingers represent the flood season (Akhet) of four months that reaches its peak in the third month (Aqor).</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">And the tips in the middle of the four fingers represent winter, (Peret).</span></p><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">And the lower ends represent summer (Shemou).</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">The fifth finger (thumb) represents the last 5 days of the year called El-nessi’.</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">Egyptian farmers still use this method to know the seasons and months of the year.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><h3 data-dcnode-id="2371"><span class="ez-toc-section" data-dcnode-id="2377" id="Reading_the_palm_features_horoscope_and_astrology_Khamsa_we_Khmessa"></span><span data-dcnode-id="2376" instrument_node="">Reading the&nbsp; &nbsp;palm features horoscope and astrology (Khamsa we </span><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Khmessa</span></strong><span data-dcnode-id="2373" instrument_node="">):</span><span class="ez-toc-section-end" data-dcnode-id="2372"></span></h3><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">The Egyptians also used the reading of the lines of the right palm to reveal the horoscope and know the sign &nbsp;to which the person belongs, where the time &nbsp;of birth is found on &nbsp;the &nbsp;little finger,and the day of &nbsp;birth &nbsp;is on the ring finger, &nbsp;&nbsp;the month of birth is on the middle finger , and the lunar day of birth on the index finger,and the year &nbsp;on the go, and back to the tables of the zodiac &nbsp;signs can through this information know the sign to which the person belongs, &nbsp;and read its reading from &nbsp;it.</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">This method is still common among Egyptian farmers in what is known as “Khamsa we Khmessa”.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><h3 data-dcnode-id="2360"><span class="ez-toc-section" data-dcnode-id="2363" id="Drawing_the_two_palms_in_the_Pharaonic_civilization"></span><span data-dcnode-id="2362" instrument_node="">Drawing the two palms in the Pharaonic civilization:</span><span class="ez-toc-section-end" data-dcnode-id="2361"></span></h3><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">There was a solar calendar that was parallel and matched to the two-stage lunar calendar, and here are the most famous names in the lunar and solar calendars in their ancient and late forms extracted and translated from Richard Parker’s Book of Calendars in Ancient Egypt. There are the five days of El-Nessi’ which are excluded outside the calendar called “BeKoji Anafot”, the days of birth of the five gods (Osiris, Seth, Isis, Nephtis and Horus), and they did not pay attention to the extra quarter of the day each year, so when this error in the calendar was&nbsp; rectified in the era of the&nbsp; Ptolemees, a sixth day of Nessi’&nbsp; was added every four years called &nbsp;Sebedet.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">The quarter day, which should have been added to the 365 days of the year, continued to accumulate until it began to confuse the Egyptian calendar, because 120 years after the match between the stellar year and the beginning of a calendar year, the calendar year was one month ahead of the astronomical year and 1,456 years had to pass until the calendar year again corresponded to the astronomical year. This 1,456-year-long epoch was related to the star Sothis, which we call the star of Sirius or Sebedet of Egypt.&nbsp; This error in the Egyptian calendar indicates a flaw in their astronomy and timing, which forced them to take more than one calendar to try to adjust their time.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Thus, the Egyptians dominated the civil calendar over the stellar calendar (despite the accuracy of the latter) but also used the religious calendar which depended on the movement of the moon and used it to determine the dates of religious holidays, the religious calendar stipulated that all 25 Egyptian years should be divided into lunar months of (309) months or (9125) days divided between groups of lunar months ranging from 29 to 30 days and the&nbsp; Periodic repetition of this very simple method corresponded to the facts and the lunar year containing On 13 festivals called the Little Lunar Year.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">In short, the Pharaonic Year begins on September 11, a famous day in our contemporary calendar when terrorism hit the two trade towers of the United States, and we are now in 2014, corresponding to the year 6,255 in the Pharaonic calendar that seems to have begun 4,000 years before the Gregorian calendar (a hypothesis that we reserve). The Egyptian year begins &nbsp;&nbsp;&nbsp;on (9/11) each year and ends on 9/16 of the following year, and the Egyptians used to call New Year’s Day “River Day: &nbsp;&nbsp;&nbsp;Ni-Yara”, which is the date of the completion of the Nile flood.</span></p><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">This name can be changed later to Nayrouz, which marks the beginning of the New Year of Agriculture, and we do not know to what extent the relationship between the Persian festival of Nowruz, which is the beginning of the Persian New Year on that day, although there is confirmation that the Persian festival of Nowruz was taken from the Babylonian Aquita, which was called “New Day”, and was translated into their language by the Persians and became Nowruz, meaning the New Day.</span></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Today, for the Egyptians, the day has been estimated from midnight to midnight, which is currently in effect, and divided the day into 12 hours a day cut off by the Sun God from the eastern horizon to the western horizon, as well as the night has been divided into 12 hours during which the Sun God will go into the afterlife. &nbsp;in the lower world (the other) during which he delegates difficulties and wars and triumphs over them until he rises again.</span></p><span data-dcnode-id="2341" instrument_node="">
</span><h3 data-dcnode-id="2336"><span class="ez-toc-section" data-dcnode-id="2340" id="Egyptian_Time_Measuring_system"></span><strong data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">Egyptian Time Measuring system:</span></strong><span class="ez-toc-section-end" data-dcnode-id="2337"></span></h3><span data-dcnode-id="2335" instrument_node="">

</span><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">The calendar of the Egyptian Year belonged to the so-called “Stellar Year”, which does not depend on the sun or moon but on the star Sirius, where the beginning of the year announces the sight of this star before sunrise on 9/11, which was located at the time of the flood of the Nile, where the three seasons begin to separate the flood,&nbsp; and each &nbsp;season is formed of four months. But &nbsp;the difference &nbsp;in the quarter of a day of the year &nbsp;caused &nbsp;&nbsp;&nbsp;the scholars &nbsp;great confusion in the calendar and they put a year every 1460 years, and it would have been better for them to increase every day every four years as the Babylonians did. The Copts took their calendar from the ancient Egyptians and kept their method.</span></p><span data-dcnode-id="2196" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">The historian Snica said that the priests of Heliopolis were the first to discover that the beginning of the flood is compatible with the brilliance of the star of&nbsp; Sirius or (also called the morning star) which they called&nbsp; “Sebedet &nbsp;Sothis” in the Temple of Iuno&nbsp;&nbsp; (Temple of the Sun) once a year, so they took it as the beginning of the appearance of Sirius and the solar year, and they used their knowledge of this astronomical phenomenon to inspire people that the Nile does not overflow with its generosity until God accepts their invitations and sets them the date of the flood and declares it&nbsp; to the people.</span></p><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">During the Third Dynasty, the priests of the Temple of Iuno corrected the Year of the Nile by adding five days, the days when the five gods (Osiris, Isis, Seth, Nephtis and Horus) were born. Thus, &nbsp;according to some historians from 2800 BC. the Egyptian calendar became 365 days, and some historians have attributed this calendar to the great sage, minister, &nbsp;doctor, architect and astronomer &nbsp;Imhotep of the time of King &nbsp;Djoser, calling each of the twelve months the name of a god, or a religious occasion, as they called it every month, in this new calendar, the name of the God of Knowledge,&nbsp; to whom this calendar, which is supervised by the gods of astronomy, was &nbsp;revealed to them.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">In the table below is the precise division of the ancient Egyptian months with its solar system and hieroglyphic names (in brackets) and Coptic, with the negation of its equivalent of the calendar of our current calendar, the God of each month and his evidence and cultures that appear that month, and the current popular Egyptian proverbs inherited from the past for each month and disseminated by the Egyptian peasants to this day:</span></p><span data-dcnode-id="2187" instrument_node="">

</span><h3 data-dcnode-id="1810"><span class="ez-toc-section" data-dcnode-id="1818" id="Astronomy_of_the_Pharaohs_-_The_Table_of_the_Egyptian_Calendar_Coptic_and_Pharaonic_General"></span><strong data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Astronomy of the Pharaohs</span></strong><span data-dcnode-id="1815" instrument_node=""> – The Table of the Egyptian Calendar (Coptic and Pharaonic) </span><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">General</span></strong><span data-dcnode-id="1812" instrument_node="">:</span><span class="ez-toc-section-end" data-dcnode-id="1811"></span></h3><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">It should be known that the Egyptians did not know the seven days of the week, which came from the first Sumerian then Babylonian, then the Greeks took it and introduced it to Egypt in Hellenistic times, they divided the month into three periods each &nbsp;ten days, and we can not call it a week in Arabic but we can call it metaphorical (tenths) and no specific name for that,&nbsp; and in doing so, they are similar to the Chinese, Japanese, and Koreans in the past (and the French later in their post-Republic calendar).</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Ptolemy’s reforms on the Egyptian calendar:</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">In 238 BC, Ptolemy III introduced important reforms to the Egyptian calendar due to its differences from the Greek calendar, which were marked by a decree called the Canopus Decree, and the most important thing in these reforms was the quarter of the day when a day (leap year) was added every four years.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">In 25 BC, the Roman Emperor Augustus applied this idea, and the Copts took this amendment and worked on their calendar, where the thirteenth month consists of five days of oblivion and increases to six days in leap years. That is, the Coptic New Year in leap years begins at 12/9, not at 11/9.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">The Coptic New Year was called the “Day of Nayrouz”, which was dedicated by the Arab conquerors when they merged it on Persian New Year’s Day, and the name continued between Pharaonic and Persian and was consecrated.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">The Copts began this calendar on 9/11/284 &nbsp;&nbsp;&nbsp;AD, the beginning of the reign of the Roman emperor Diocletian &nbsp;(who persecuted Christians) and was named Martyrs’ Day. That is, 282 AD = 1 Coptic = 4525 (Pharaonic).</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Astronomy of the Pharaohs – The five planets they observed were called &nbsp;(AkmoWardaj):</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">The five planets are moving planets visible in the night sky observed by the Egyptians and linked their movement to certain atmospheric nuances and linked certain minerals to them and emphasized their spiritual and intellectual significance.</span></p><span data-dcnode-id="1785" instrument_node="">

الرحلة يوميا
برنامج الرحلة البحرية:
بداية من ٠٨:٠٠ صباحا يصل اليك باص او ميكروباص عند باب الفندق في أي مكان في مدينة الغردقة السياحية حتى فنادق ومنتجعات الاحياء
٠٨:٤٥ صباحا تصل الى مكان المركب واليخت السياحي وتبدأ بتسجيل الأسماء, سوف تجد جميع معدات الاسنوركل والسباحة من الزعانف والماسك المناسبة لك على المركب واليخت السياحي.
٠٩:٠٠ صباحا انطلاق الرحلة البحرية والاستمتاع لمدة ٦٠ دقيقة في البحر وروية طيور النورس&nbsp; والاستمتاع بأشعة الشمس المعتدلة في الصباح.
١٠:٠٠ صباحا نبدأ ركوب القارب الخشبي لكي نصل لجزيرة وشاطي اورانج باي أحد جزر وشواطئ جزيرة الجفتون الساحرة بالرمال البيضاء والمياه النقية.
١٠:٠٠ صباحا الى ١٢:٠٠ مساء، مدة البقاء على جزيرة اورانج باي لمدة ساعتين والاستمتاع بالسباحة في المياه وتوفير جميع الخدمات والخصوصية من مظلة ووسائد لكل فرد بالإضافة الألعاب المائية من مراجيح وكراسي في وسط المياه للالتقاط الصور التذكارية.
١٢:٠٠ مساء بداية مغادرة الجزيرة وركوب مرة أخرى القارب الخشبي والرجوع الى اليخت البحري والبدء الاستعداد لذهاب الى أماكن السباحة والاسنوركل.
١٢:٣٠ مساء بداية اول وقفة للسباحة في المياه وروية الأسماك الملونة النادرة والشعاب المرجانية التي تمتاز بها منطقة البحر الأحمر وخصوصا مدينة الغردقة السياحية، حيث يتم ارتداء الماسك والجاكت للأشخاص التي لا تجيد السباحة مع توفير مدرب سباحة وشخص مختص يقوم بالمتابعة مع كامل افراد الرحلة.
٠١:٣٠ مساء بداية البوفيه المفتوح المميز ووجبة الغداء وتتكون من (سلطات خضار + فراخ بانية + مكرونة + ارز + كفته مشوية + سمك + بطاطس مقلية + بطاطس فرن مشوية + مياه غازية + مشروبات غازية).
٠٢:٠١٥ مساء بداية الوقفة الثانية لعمل اسنوركل والسباحة في مكان اخر لروية الأسماك النادرة الملونة لمدة ٢٠ دقيقة.
٠٣:٠٠ مساء بداية الألعاب المائية، حيث تبدأ ارتداء لايف جاكت ثم ركوب لعبة البننا بوت والكوارتر لمدة ٢٠ دقيقة والاستمتاع بأجمل اللحظات اثناء اللعب مع افراد العائلة.
٠٣:٢٠ مساءا بداية الرجوع الى منطقة البداية والمرسى.
٠٣:٤٥ مساء ركوب سيارات الانتقال لفندق او الباص وتسليم جميع أدوات الاسنوركل والسباحة لمقر المكتب.

تبدأ الرحلة من توفير سيارة جيب سفاري تأخذك من الفندق أو أي مكان إقامة بشقة في الغردقة.
مواعيد الانتظار في الفندق او خارج الفندق من ٨ صباحا حسب الموعد المرسل لك عبر الواتس اب بعد حجز الرحلة.
تبدأ الرحلة من ٩ صباحا بركوب دراجات الدفع الرباعي &quot;بيتش بجي&quot; والسير في الصحراء لمدة ٢٥ كيلو متر حتى الوصول الى قرية البدوية.
تستطيع الاسترخاء قليلا وشرب الشاي والمياه المعدنية ومشاهدة حياة البدو الطبيعية في صحراء البحر الأحمر ثم ركوب الجمال والتقاط الصور.
الرجوع مرة أخرى بركوب دراجات بيتش باجي لمسافة ٢٥ كيلو متر لمكان الوصول اول مرة.
تستطيع حجز الرحلة لفترة المسائية وتبدأ من ٣ مساءا حتى ٦ مساءا لرؤية غروب الشمس خلف الجبال والهضاب.
تستطيع اصطحاب الأطفال معك على البيتش بجي والسير بمعدلات هادئة للحفظ على سلامتك وسلامة طفلك.

الرحلة يوميا
برنامج الرحلة البحرية:
بداية من ٠٨:٠٠ صباحا يصل اليك باص او ميكروباص عند باب الفندق في أي مكان في مدينة الغردقة السياحية حتى فنادق ومنتجعات الاحياء
٠٨:٤٥ صباحا تصل الى مكان المركب واليخت السياحي وتبدأ بتسجيل الأسماء, سوف تجد جميع معدات الاسنوركل والسباحة من الزعانف والماسك المناسبة لك على المركب واليخت السياحي.
٠٩:٠٠ صباحا انطلاق الرحلة البحرية والاستمتاع لمدة ٦٠ دقيقة في البحر وروية طيور النورس&nbsp; والاستمتاع بأشعة الشمس المعتدلة في الصباح.
١٠:٠٠ صباحا نبدأ ركوب القارب الخشبي لكي نصل لجزيرة وشاطي اورانج باي أحد جزر وشواطئ جزيرة الجفتون الساحرة بالرمال البيضاء والمياه النقية.
١٠:٠٠ صباحا الى ١٢:٠٠ مساء، مدة البقاء على جزيرة اورانج باي لمدة ساعتين والاستمتاع بالسباحة في المياه وتوفير جميع الخدمات والخصوصية من مظلة ووسائد لكل فرد بالإضافة الألعاب المائية من مراجيح وكراسي في وسط المياه للالتقاط الصور التذكارية.
١٢:٠٠ مساء بداية مغادرة الجزيرة وركوب مرة أخرى القارب الخشبي والرجوع الى اليخت البحري والبدء الاستعداد لذهاب الى أماكن السباحة والاسنوركل.
١٢:٣٠ مساء بداية اول وقفة للسباحة في المياه وروية الأسماك الملونة النادرة والشعاب المرجانية التي تمتاز بها منطقة البحر الأحمر وخصوصا مدينة الغردقة السياحية، حيث يتم ارتداء الماسك والجاكت للأشخاص التي لا تجيد السباحة مع توفير مدرب سباحة وشخص مختص يقوم بالمتابعة مع كامل افراد الرحلة.
٠١:٣٠ مساء بداية البوفيه المفتوح المميز ووجبة الغداء وتتكون من (سلطات خضار + فراخ بانية + مكرونة + ارز + كفته مشوية + سمك + بطاطس مقلية + بطاطس فرن مشوية + مياه غازية + مشروبات غازية).
٠٢:٠١٥ مساء بداية الوقفة الثانية لعمل اسنوركل والسباحة في مكان اخر لروية الأسماك النادرة الملونة لمدة ٢٠ دقيقة.
٠٣:٠٠ مساء بداية الألعاب المائية، حيث تبدأ ارتداء لايف جاكت ثم ركوب لعبة البننا بوت والكوارتر لمدة ٢٠ دقيقة والاستمتاع بأجمل اللحظات اثناء اللعب مع افراد العائلة.
٠٣:٢٠ مساءا بداية الرجوع الى منطقة البداية والمرسى.
٠٣:٤٥ مساء ركوب سيارات الانتقال لفندق او الباص وتسليم جميع أدوات الاسنوركل والسباحة لمقر المكتب.
