</span><article about="/posts/news/2022/01/month-astronomical-history-january-2022" class="node node--type-blog-post node--view-mode-full tw-border-t-2 tw-border-solid tw-border-gray-light tw-pt-12 tw-pb-8" data-dcnode-id="280" data-history-node-id="37869" role="article"><span data-dcnode-id="491" instrument_node="">

</span><div class="tw-max-w-4xl tw-mx-auto tw-px-6" data-dcnode-id="458"><span data-dcnode-id="489" instrument_node="">
</span><div class="tw-block" data-dcnode-id="460"><span data-dcnode-id="488" instrument_node="">
</span><div class="general-styles" data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">
</span><div class="tw-inline tw-uppercase tw-text-xs tw-tracking-widest" data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">10 January 2022</span></div><span data-dcnode-id="484" instrument_node="">
</span><h1 class="tw-block tw-mt-3" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">  This Month in Astronomical History: January 2022
</span></h1><span data-dcnode-id="481" instrument_node="">
</span></div><span data-dcnode-id="479" instrument_node="">
</span><div class="tw-flex tw-flex-wrap tw--mx-6 tw--mb-1" data-dcnode-id="462"><span data-dcnode-id="478" instrument_node="">
</span><div class="tw-w-full tw-flex tw-items-center tw-mt-4 tw-px-6" data-dcnode-id="464"><span data-dcnode-id="477" instrument_node="">
</span><div class="tw-block" data-dcnode-id="466"><span data-dcnode-id="476" instrument_node="">
</span><h3 data-dcnode-id="468"><span data-dcnode-id="475" instrument_node="">
</span><span class="tw-block tw-font-univers-bold tw-antialiased" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Amy Oliver</span></span><span data-dcnode-id="472" instrument_node="">
</span><span class="tw-block" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">NRAO</span></span><span data-dcnode-id="469" instrument_node=""> </span></h3><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span></div><span data-dcnode-id="463" instrument_node="">
</span></div><span data-dcnode-id="461" instrument_node="">
</span></div><span data-dcnode-id="459" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
</span><div class="tw-w-full tw-max-w-4xl tw-px-6 tw-mt-6 tw-mb-12 lg:tw-mt-8 lg:tw-mb-16 tw-mx-auto" data-dcnode-id="284"><span data-dcnode-id="456" instrument_node="">
</span><div class="tw-max-w-2xl general-styles" data-dcnode-id="349"><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="443"><i data-dcnode-id="444"><img alt="HAD Logo" class="align-right" data-dcnode-id="454" data-entity-type="file" data-entity-uuid="1994cab5-5dac-48c7-9516-edfc382a3f22" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aas.org/sites/default/files/inline-images/HAD_AAS_Logo_RGB_2019.png&amp;raw" width="33%"><span data-dcnode-id="453" instrument_node="">Each month as part of this series from the </span><a data-dcnode-id="451" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//had.aas.org/" target="_blank"><span data-dcnode-id="452" instrument_node="">AAS Historical Astronomy Division (HAD)</span></a><span data-dcnode-id="450" instrument_node="">, an important discovery or memorable event in the history of astronomy will be highlighted. This month's author, Amy C. Oliver, writes about William Herschel.</span><i data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">&nbsp;Interested in writing a short (500-word) column? Instructions along with previous history columns are available on the </span><a data-dcnode-id="447" data-feathr-click-track="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//had.aas.org/resources/astro-history" target="_blank"><span data-dcnode-id="448" instrument_node="">HAD web page</span></a><span data-dcnode-id="446" instrument_node="">.</span></i></i></p><span data-dcnode-id="442" instrument_node="">
</span><h2 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Strange Comet: William Herschel, His Telescopes, and Uranus</span></h2><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">On 11 March 1787, Frederick William Herschel (1738-1822) identified two moons orbiting Uranus, first discovered on 13 March 1781. The moons were given the names Titania and Oberon.</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Better known to us as an astronomer, Herschel was first an accomplished composer of 24 symphonies and 14 concertos. His astronomical work eclipsed his musical achievements. His accurate positional catalog of 2,500 deep-sky objects included the first resolution of individual stars within several nebulae. He is also credited with the first studies of infrared radiation from the Sun. In addition to Titania and Oberon around Uranus, he located two more moons orbiting Saturn, named Enceladus and Mimas.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Like so many other paradigm-shifting revelations, his finding of Uranus, the first planet not known in antiquity, was almost entirely by accident.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="429" instrument_node="">Herschel’s discovery of Uranus, however, did not start in the sky. Rather, it began on the ground, with the construction in 1778 of a 6.2-inch aperture 7-foot focal length (f/13.5) reflector telescope with 227x magnification, followed by a years-long methodical survey of the stars from his observatory in Bath.</span><sup data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">1</span></sup><span data-dcnode-id="426" instrument_node="">&nbsp;This same telescope would later go on to play a significant role in the development of Herschel’s catalog of double and multiple stars.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="423" instrument_node="">In the spring of 1781, William Herschel pointed his telescope toward the night sky and saw what he at first believed to be a new and somewhat unusual star in the constellation Gemini. Subsequent observations, however, revealed to Herschel that the nearby object could not be a star after all. Herschel presented his findings to the Royal Society on 26 April 1781, noting to fellow astronomers that, "...while I was observing the small stars in the neighborhood of H Geminorum, I perceived one that appeared visibly larger than the rest; being struck with its uncommon magnitude, I compared it to H Geminorum and the small star in the quartile between Auriga and Gemini, and finding it so much larger than either of them, suspected it to be a comet." </span><sup data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">2</span></sup></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="418" instrument_node="">Despite his presentation to the Royal Society, Herschel remained uncertain whether his discovery was a comet or something else. After weeks of discussion, the astronomical community announced that Herschel had made the first discovery of a planet using a telescope, and more important at the time, the first discovery of a planet since antiquity.</span><sup data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">3</span></sup><span data-dcnode-id="415" instrument_node=""> Herschel’s instant fame curried him favor with King George III — for whom Herschel had attempted to name the planet, Georgium Sidus — and after several demonstrations of his telescope’s excellence at the Royal Observatory and Windsor Castle, Herschel became the King’s private astronomer. The move, in turn, allowed Herschel to perfect his work as a professional astronomer and telescope maker, building and selling many small telescopes. He also completed his own instrument of 18.7-inch&nbsp;aperture and 20-foot focal length (f/12.83). Herschel even succeeded in constructing an f/10 40-foot telescope, though it proved not to be his favorite.</span><sup data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">4</span></sup></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">Despite a busy new role for the palace, Herschel’s relationship with Uranus was far from over, and in 1787, he discovered two satellites orbiting the planet — Titania and Oberon. Herschel largely credited his discovery of the two moons to his decision to use not his favored and trusted 6-inch aperture and 7-foot focal length telescope built in 1785, but his new front-view construction that reflected light from the primary mirror directly to the eyepiece without the need for a secondary mirror. The arrangement made small objects, like stars (and in the case of Titania and Oberon, moons), appear brighter.</span><sup data-dcnode-id="407"><span data-dcnode-id="408" style="font-size: 12.5px;"><span data-dcnode-id="409" instrument_node="">5</span></span></sup></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Continued improvements to his telescopes and his science led to further discoveries and enhancements of astronomy, including the publication of his deep-sky objects catalog in 1786, the discovery of Enceladus and Mimas in 1789, and the discovery of infrared radiation in 1800.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><i data-dcnode-id="400"><img alt="explorer" data-dcnode-id="401" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aas.org/sites/default/files/2022-01/Fig%25201%2520HerschelTelescope1.jpeg&amp;raw" style="float: center;" width="430 px"></i><br data-dcnode-id="399"><span data-dcnode-id="398" instrument_node="">
Fig. 1: Herschel Telescope. William Herschel made this 7-foot Newtonian reflecting telescope with a 6.125-inch diameter mirror for his friend Sir William Watson between 1783 and 1785. Herschel ground and polished all of his own mirrors for his telescopes, including the original on which this telescope was based, the telescope he used to discover Uranus in 1781. This telescope is on permanent display at the Science Museum in Kensington, London. Credit: The Board of Trustees of the London Science Museum</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="391"><i data-dcnode-id="394"><img alt="explorer" data-dcnode-id="395" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aas.org/sites/default/files/2022-01/Fig%25202%2520Sir-William-Herschel.jpg&amp;raw" style="float: center;" width="430 px"></i><br data-dcnode-id="393"><span data-dcnode-id="392" instrument_node="">
Fig. 2: Herschel (provided in a zip file with the license from the National Portrait Gallery). Sir William Herschel was a celebrated composer and astronomer who discovered Uranus in 1781, and two of its 27 known moons in 1787. Credit: Lemuel Francis Abbott, oil on canvas 1785, National Portrait Gallery NPG 98</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="385"><i data-dcnode-id="388"><img alt="explorer" data-dcnode-id="389" height="auto" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aas.org/sites/default/files/2022-01/Fig%25203%2520Uranus.jpeg&amp;raw" style="float: center;" width="430 px"></i><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node="">
Fig. 3: Uranus. William Herschel discovered Uranus, the seventh planet, on 13 March 1781 while surveying constellation Gemini for double stars. This true-color image of Uranus was compiled from images returned from NASA’s Voyager 2 on January 17, 1986. Credit: NASA/JPL.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="381"><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">References</span></strong></p><span data-dcnode-id="380" instrument_node="">
</span><ol data-dcnode-id="351"><span data-dcnode-id="379" instrument_node="">
</span><li data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">Mullaney, J. (2007). </span><em data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">The Herschel Objects and How to Observe Them</span></em><span data-dcnode-id="375" instrument_node="">. New York: Springer, pp. 15; An important distinction: The Herschel telescope used to discover Uranus in 1781 did not contain a 7-foot mirror despite the inference from the contemporary reports. Today’s astronomers measure telescopes by the diameter of their apertures. A second measure of focal ratio (focal length divided by aperture) has been adopted from photography.</span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Herschel, W. (1781). "Account of a Comet,"&nbsp;presented to the Royal Society on 26 April 1781.</span></li><span data-dcnode-id="370" instrument_node="">
</span><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Prior to the discovery of Uranus, five planets were known to inhabit the night sky: Mercury, Venus, Mars, Jupiter, and Saturn. Knowledge of Uranus, and the observation of aberrations in its orbit around the Sun led to the confirmation of Neptune in 1846.</span></li><span data-dcnode-id="367" instrument_node="">
