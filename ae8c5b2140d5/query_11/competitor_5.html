</span><h2 data-dcnode-id="5911"><span data-dcnode-id="5912" instrument_node="">Scope</span></h2><span data-dcnode-id="5910" instrument_node="">
      Papers submitted for publication in MNRAS are considered by members of the editorial board, who will usually seek the opinion of one or more expert referees. Decisions on whether or not to publish a paper are subjective, but the minimum requirements are:

The paper must present original research, clearly demonstrating its novelty beyond that of previously published work.
The results must be significant and likely to make an important contribution to the advancement of their field.
The paper must be clearly presented, written in good scientific English, and conform to journal guidelines for content and presentation (see section 2).
The subject must be of interest to readers of MNRAS and fall within the range of topics covered by the journal.
MNRAS publishes the results of original research in astronomy and astrophysics, including work which is observational, theoretical or concerned with astronomical instrumentation and software. Assessment of whether papers fall within this scope is made by the members of the editorial board, who will reject papers which are not on suitable topics.        </span><a class="join_comments_button" data-dcnode-id="5907" href="#wp-comments-response" id="join_conversation" style="cursor: pointer;"><img alt="" data-dcnode-id="5909" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scimagojr.com/img/comments_icon_black.png&amp;raw"><span data-dcnode-id="5908" instrument_node="">Join the conversation about this journal</span></a><span data-dcnode-id="5906" instrument_node="">

</span><p data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">
        The SJR is a size-independent prestige indicator that ranks journals by their 'average prestige per article'. It is based on the idea that 'all citations are not created equal'. SJR is a measure of scientific influence of journals that accounts for both the number of citations received by a journal and the importance or prestige of the journals where such citations come from
    It measures the scientific influence of the average article in a journal, it expresses how central to the global scientific discussion an average article of the journal is.

</span><p data-dcnode-id="3535"><span data-dcnode-id="3536" instrument_node="">
        This indicator counts the number of citations received by documents from a journal and divides them by the total number of documents published in that journal. The chart shows the evolution of the average number of times documents published in a journal in the past two, three and four years have been cited in the current year. The two years line is equivalent to journal impact factor ™ (Thomson Reuters) metric.
