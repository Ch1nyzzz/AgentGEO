</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" style="font-size:14px"><span data-dcnode-id="1157" instrument_node="">By the end of 5</span><sup data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">th</span></sup><span data-dcnode-id="1154" instrument_node=""> grade school children know when light passes through a prism it is broken into its component colors ranging from red to violet.&nbsp; Many of us are excited when we see a rainbow’s colors of ROYGBV.&nbsp; In 1802, the English chemist William Hyde Wollaston was the first person to note the appearance of a number of dark features in the solar spectrum. &nbsp;In 1814, Joseph von Fraunhofer independently rediscovered the lines and began a systematic study and careful measurement of the wavelengths of these features.&nbsp; Today we recognize that the colors and lines are part of an area of knowledge known as spectroscopy, the branch of science concerned with the investigation and measurement of spectra produced when matter interacts with or emits electromagnetic radiation.&nbsp; Spectroscopy makes use of an instrument called a spectrograph to produce the colors (spectra).&nbsp;&nbsp;&nbsp; A spectrum can be analyzed to produce a spectrogram, a visual representation of the spectrum of frequencies as they vary in intensity.</span></span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" style="font-size:14px"><span data-dcnode-id="1150" instrument_node="">Most of what we know in astronomy is a result of spectroscopy:&nbsp; It can reveal the temperature, spectral class, and composition of an object as well as be used to infer mass, distance, luminosity, relative motion using Doppler shift and many other pieces of information.&nbsp; Spectroscopy is done at all wavelengths of the electromagnetic spectrum, from radio waves to gamma rays, but this program will focus on visible light.&nbsp; The radio frequencies are addressed in the Astronomical Leagues’ Radio Astronomy Observing Program.&nbsp; Through the work of Indian astronomer Meghnad Saha and others, it was realized that a primary difference between stars was their temperature, and so the classification scheme was organized into “OBAFGKM” based on temperature, from the hot O stars that cause most of the surface Hydrogen to be ionized to the cool M stars that are unable to excite Hydrogen’s electrons at all.&nbsp; Thus, we see different features for different classes of&nbsp;stars as shown in the tables below:&nbsp;</span></span></p><span data-dcnode-id="1147" instrument_node="">
</span></td><td data-dcnode-id="1131"><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><img alt="" data-dcnode-id="1143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/SPE-QV.jpg&amp;raw" style="width:335px"></p><span data-dcnode-id="1141" instrument_node="">

</span><h2 data-dcnode-id="1099"><span data-dcnode-id="1100" style="color:rgb(0, 0, 255)"><span data-dcnode-id="1101" style="font-size:18px"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Background Information</span></strong></span></span></h2><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" style="font-size:14px"><span data-dcnode-id="1096" style="background-color:rgb(255, 255, 254); color:rgb(34, 34, 34); font-family:arial,helvetica,sans-serif"><span data-dcnode-id="1097" instrument_node="">This certification is available to members of the Astronomical League, either through their local astronomical society or as members at large.&nbsp; If you are not a member and would like to become one, check with your local astronomical society, search for a local society on the Astronomical League Website&nbsp;(</span></span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/astronomy-clubs-usa-state" style="text-decoration-line: none; color: rgb(202, 156, 19); font-family: Arial, Helvetica, sans-serif; font-size: 14px; background-color: rgb(255, 255, 254);"><span data-dcnode-id="1095" instrument_node="">click here</span></a><span data-dcnode-id="1092" style="background-color:rgb(255, 255, 254); color:rgb(34, 34, 34); font-family:arial,helvetica,sans-serif"><span data-dcnode-id="1093" instrument_node="">),&nbsp;or join as a member at large (</span></span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/al/general/memblarg.html" style="text-decoration-line: none; color: rgb(202, 156, 19); font-family: Arial, Helvetica, sans-serif; font-size: 14px; background-color: rgb(255, 255, 254);"><span data-dcnode-id="1091" instrument_node="">click here</span></a><span data-dcnode-id="1088" style="background-color:rgb(255, 255, 254); color:rgb(34, 34, 34); font-family:arial,helvetica,sans-serif"><span data-dcnode-id="1089" instrument_node="">).</span></span></span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" style="font-size:14px"><span data-dcnode-id="1084" instrument_node="">To qualify for the AL's</span><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node=""> </span></strong><span data-dcnode-id="1081" instrument_node="">Spectroscopy Observing Program certificate and pin,&nbsp;complete the required activities defined in the program.</span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" style="font-size:14px"><span data-dcnode-id="1077" instrument_node="">Note: Remote telescopes may not be used in the Spectroscopy Observing Program.&nbsp; Remote Telescopes are defined on this Astronomical League web page:&nbsp; </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/content/terms-common-usage-observing"><span data-dcnode-id="1076" instrument_node="">https://www.astroleague.org/content/terms-common-usage-observing</span></a><span data-dcnode-id="1074" instrument_node="">.</span></span></p><span data-dcnode-id="1071" instrument_node="">
</span><span data-dcnode-id="1027" instrument_node="">
</span><span data-dcnode-id="1015" instrument_node="">
</span><table data-dcnode-id="1012"><tbody data-dcnode-id="1013"><tr data-dcnode-id="1014"><td data-dcnode-id="1028" style="width:490.151px"><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1064"><u data-dcnode-id="1065"><span data-dcnode-id="1066" style="color:#000000"><span data-dcnode-id="1067" style="font-size:14px"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Equipment Needed:&nbsp;</span></strong></span></span></u></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" style="font-size:14px"><span data-dcnode-id="1062" instrument_node="">To complete this Observing Program, you will need a spectroscope, camera, associated optics, mount, and drive.&nbsp; Special software will be needed to process the spectra.</span></span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" style="font-size:14px"><span data-dcnode-id="1058" instrument_node="">It may be possible to construct a DIY (do it yourself) working spectroscope.&nbsp; Commercial models range from about two hundred dollars to thousands of dollars.&nbsp; The Links section below contains links to DIY pages with possible solutions.</span></span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" style="font-size:14px"><span data-dcnode-id="1054" instrument_node="">A DSLR, CCD, or CMOS camera is needed to capture the spectra.&nbsp; Literature suggests a monochrome is preferred, but color will be satisfactory for this program.&nbsp;&nbsp; If using a DSLR it is important to have one with an interchangeable lens system to maximize the size of the spectra.</span></span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" style="font-size:14px"><span data-dcnode-id="1050" instrument_node="">The optics you use will depend on the spectroscope and camera.&nbsp; Solutions will range from a moderate 200mm telephoto lens to a large telescope.&nbsp;</span></span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-size:14px"><span data-dcnode-id="1046" instrument_node="">A go-to tracking mount is suggested to make finding and imaging the stars easier.</span></span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" style="font-size:14px"><span data-dcnode-id="1042" instrument_node="">A variety of commercial and free software can be found on the Internet to analyze spectra.&nbsp; The Astronomical League makes no specific recommendations, but links can be found in the Links section below that lead to a number of helpful&nbsp; resources.&nbsp;</span></span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" style="font-size:14px"><u data-dcnode-id="1036"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Determining Stellar Type:</span></strong></u></span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" style="font-size:14px"><span data-dcnode-id="1032" instrument_node="">The stellar type of a star can be determined in two ways.&nbsp; This Observing Program will make use of the star’s spectra to calculate its surface temperature.&nbsp; Based on&nbsp;the spectrogram’s shape, prominent features, and surface temperature, the star’s stellar type will be determined. &nbsp;This method will be limited to class F, G, &amp; K type stars because the maximum wavelengths of other classes fall outside the&nbsp;visible range that can be detected by most cameras.&nbsp; Means to capture data in the UV and IR ranges exist but are beyond the scope of this Observing Program and the abilities&nbsp;of most amateur astronomers.&nbsp;</span></span></p><span data-dcnode-id="1029" instrument_node="">
</span></td><td data-dcnode-id="1016"><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><img alt="" data-dcnode-id="1025" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/H%2520Spectrum%2520example.jpg&amp;raw" style="height:222px; width:331px"></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><img alt="" data-dcnode-id="1019" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/SPE-OR.jpg&amp;raw" style="width:335px"></p><span data-dcnode-id="1017" instrument_node="">
</span></td></tr></tbody></table><p data-dcnode-id="1009"><span data-dcnode-id="1010" style="font-size:14px"><span data-dcnode-id="1011" instrument_node="">A second method performs photometry of images taken with photometric filters, usually B and V.&nbsp; The table below shows B – V values for various stellar classifications.&nbsp; While this method can be used to determine a wider range of classes, the cost of photometric B and V filters places this method beyond the scope of this program.&nbsp; &nbsp;</span></span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" style="font-size:14px"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Note:&nbsp; </span></strong><span data-dcnode-id="1005" instrument_node="">The free program Stellarium when set to display all information displays B – V (color index) about the selected stars.</span></span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">&nbsp;</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" style="color:rgb(0, 0, 255)"><span data-dcnode-id="996" style="font-size:18px"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Requirements and Rules</span></strong></span></span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="987"><u data-dcnode-id="988"><span data-dcnode-id="989" style="font-size:14px"><span data-dcnode-id="990" style="color:#000000"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Program Activities (Three Parts):</span></strong></span></span></u></p><span data-dcnode-id="986" instrument_node="">
</span><span data-dcnode-id="940" instrument_node="">
</span><span data-dcnode-id="916" instrument_node="">
</span><table data-dcnode-id="913"><tbody data-dcnode-id="914"><tr data-dcnode-id="915"><td data-dcnode-id="941" style="width:640px"><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" style="font-size:14px"><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Part I:&nbsp; Characterizing Star Types</span></strong></span></p><span data-dcnode-id="980" instrument_node="">
</span><ol data-dcnode-id="965"><li data-dcnode-id="974"><span data-dcnode-id="975" style="font-size:14px"><span data-dcnode-id="979" instrument_node="">Successfully complete the Astronomical League’s </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/content/stellar-evolution-observing-program"><span data-dcnode-id="978" instrument_node="">Stellar Evolution Observing Program</span></a><span data-dcnode-id="976" instrument_node="">&nbsp;where you will learn about stellar types.</span></span></li><span data-dcnode-id="973" instrument_node="">
</span><li data-dcnode-id="967"><span data-dcnode-id="968" style="font-size:14px"><span data-dcnode-id="972" instrument_node="">Using a spectroscope to create the spectrum, image our star, the Sun, and three (3) stars from EACH of the OBAFGKM stellar type stars found in the </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/obsclubs/StellarEvolution/Observing%2520Stellar%2520Evolution%2520-%2520AL%2520-%2520Observing%2520List%2520%2520V3.8.pdf"><span data-dcnode-id="971" instrument_node="">Astronomical League’s Stellar Evolution Program’s object list</span></a><span data-dcnode-id="969" instrument_node=""> (twenty-two total spectra).&nbsp; You may choose other stars but picking stars from the Stellar Evolution Program gives a common source for data for the calculations below.&nbsp; You should take multiple images and stack them&nbsp;to reduce noise.&nbsp; Since there is a wide range of brightnesses between the various stars on the list, exposure times will vary.&nbsp; Choose exposures that produce spectra that are well exposed for the particular star to be measured.&nbsp; Even though the star is possibly saturated, make sure the spectrum is not.</span></span></li><span data-dcnode-id="966" instrument_node="">
</span></ol><p class="rteindent1" data-dcnode-id="950"><span data-dcnode-id="951" style="font-size:14px"><span data-dcnode-id="964" instrument_node="">The stars you choose should come from the following Stellar Evolution’s groups:</span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">
			&nbsp; &nbsp; &nbsp;- Colorful Stars</span><br data-dcnode-id="961"><span data-dcnode-id="960" instrument_node="">
			&nbsp; &nbsp; &nbsp;- Low Mass stars</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">
			&nbsp; &nbsp; &nbsp;- Red Giant Stars&nbsp;&nbsp; (see note below about non Main Sequence Stars)</span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">
			&nbsp; &nbsp; &nbsp;- High Mass Main Sequence Stars</span><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">
			&nbsp; &nbsp; &nbsp;- Red Supergiant Stars (see note below about non Main Sequence Stars)</span><br data-dcnode-id="953"><span data-dcnode-id="952" instrument_node="">
			A link to the possible stars in PDF and Excel formats can be found below in the Observing List section of this page below.</span></span></p><span data-dcnode-id="949" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="946"><span data-dcnode-id="947" style="font-size:14px"><span data-dcnode-id="948" instrument_node="">3. For each of the spectra make a spectrogram.&nbsp; Label prominent lines and bands. For example:</span></span></p><span data-dcnode-id="945" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="943"><img alt="" data-dcnode-id="944" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/vega%2520spectra.png&amp;raw" style="height:272px; width:400px"></p><span data-dcnode-id="942" instrument_node="">
</span></td><td data-dcnode-id="917"><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><img alt="" data-dcnode-id="938" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/Spectral%2520Temperatures.jpg&amp;raw" style="height:490px; width:150px"></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">&nbsp;</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">&nbsp;</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">&nbsp;</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">&nbsp;</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">&nbsp;</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">&nbsp;</span></p><span data-dcnode-id="918" instrument_node="">
</span></td></tr></tbody></table><p class="rteindent1" data-dcnode-id="910"><span data-dcnode-id="911" style="font-size:14px"><span data-dcnode-id="912" instrument_node="">4. Making use of your spectrograms and the picture below attempt, to the best of your ability, to classify the stellar types (OBAFGKM).</span></span></p><span data-dcnode-id="909" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="907"><img alt="" data-dcnode-id="908" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/FullSpectrum.jpg&amp;raw" style="height:390px; width:525px"></p><span data-dcnode-id="906" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="903"><span data-dcnode-id="904" style="font-size:14px"><span data-dcnode-id="905" instrument_node="">5. From the spectrograms of the Stellar Evolution’s listed F, G, K type stars estimate the maximum wavelength and calculate the surface&nbsp;temperatures of the stars using Wien’s Law:&nbsp;&nbsp;</span></span></div><span data-dcnode-id="902" instrument_node="">
</span><div class="rtecenter" data-dcnode-id="899"><span data-dcnode-id="900" style="font-size:14px"><img alt="" data-dcnode-id="901" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/Weins%2520Law.jpg&amp;raw" style="height:106px; width:300px"></span></div><span data-dcnode-id="898" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="893"><span data-dcnode-id="894" style="font-size:14px"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Note:&nbsp; </span></strong><span data-dcnode-id="895" instrument_node="">O, B, A, &amp; M stars are excluded here because the maximum wavelengths fall outside the visual and normal imaging sensor ranges.&nbsp; &nbsp;&nbsp;</span></span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="889"><span data-dcnode-id="890" style="font-size:14px"><span data-dcnode-id="891" instrument_node="">6. From the spectrogram and the Spectral Type Characteristics Table found in the Links section below predict the stellar type based&nbsp;on shape, spectral lines present, and temperature.&nbsp; The table comes from</span></span></div><span data-dcnode-id="888" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="874"><span data-dcnode-id="883" style="font-size:14px"><span data-dcnode-id="887" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;​</span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.uni.edu/morgans/astro/course/Notes/section2/spectraltemps.html"><span data-dcnode-id="886" instrument_node="">https://sites.uni.edu/morgans/astro/course/Notes/section2/spectraltemps.html</span></a><span data-dcnode-id="884" instrument_node="">.&nbsp;</span></span><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="878" style="font-size:14px"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Note:&nbsp; </span></strong><span data-dcnode-id="879" instrument_node="">Considerable variation in the data is found on the Internet.&nbsp; Your prediction should be considered approximate.</span></span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
&nbsp;</span></p></div><span data-dcnode-id="873" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="868"><span data-dcnode-id="869" style="font-size:14px"><span data-dcnode-id="872" instrument_node="">7. Omit the Sun from the following distance calculation.&nbsp;
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Look up the apparent magnitude of your stars in the Stellar Evolution’s object list.&nbsp; Using the absolute magnitude for the stars type found&nbsp;in the Spectral Type Characteristics Table, calculate the distance the star is from the Earth by the spectroscopic parallax method.</span></p></span></div><span data-dcnode-id="867" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="864"><span data-dcnode-id="865" style="font-size:14px"><img alt="" data-dcnode-id="866" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/Distance%2520Calculation.jpg&amp;raw" style="height:25px; width:150px"></span></p><span data-dcnode-id="863" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="860"><span data-dcnode-id="861" style="font-size:14px"><span data-dcnode-id="862" instrument_node="">The actual measurement of the star’s apparent brightness is a skill learned in the Astronomical League’s Variable Star Programs.&nbsp;&nbsp; You&nbsp;may wish to estimate the star’s brightness with procedures involved there or use the Stellar Evolution’s values.&nbsp;</span></span></div><span data-dcnode-id="859" instrument_node="">
</span><div data-dcnode-id="856"><span data-dcnode-id="857" style="font-size:14px"><span data-dcnode-id="858" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span></span></div><span data-dcnode-id="855" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="852"><span data-dcnode-id="853" style="font-size:14px"><span data-dcnode-id="854" instrument_node="">&nbsp;Make sure to get the data for Giant and Super Giant stars (Betelgeuse, Antares, Rigel, Alphard, Arcturus, Aldebaran, etc.) from the&nbsp;correct part of the Spectral Type Characteristic Table.</span></span></div><span data-dcnode-id="851" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="846"><span data-dcnode-id="847" style="font-size:14px"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Note:&nbsp; </span></strong><span data-dcnode-id="848" instrument_node="">There is considerable variation between internet sources for the data in the table below.&nbsp; Your results should be considered as an estimated distance to the stars.</span></span></p><span data-dcnode-id="845" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="842"><span data-dcnode-id="843" style="font-size:14px"><span data-dcnode-id="844" instrument_node="">8. For the twenty-two stars you have selected construct a graph of your measured surface temperatures (x) vs. the absolute magnitude&nbsp;for the estimated stellar type from the table above (y). &nbsp;&nbsp;Label the points with the names of the stars.</span></span></div><span data-dcnode-id="841" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="838"><span data-dcnode-id="839" style="font-size:14px"><span data-dcnode-id="840" instrument_node="">You now have created the HR diagram for the stars you have studied.</span></span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" style="font-size:14px"><u data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Required Information to be Submitted:</span></strong></u></span></p><span data-dcnode-id="831" instrument_node="">
</span><div class="rteindent1" data-dcnode-id="828"><span data-dcnode-id="829" style="font-size:14px"><span data-dcnode-id="830" instrument_node="">Submit the following data for each star:</span></span></div><span data-dcnode-id="827" instrument_node="">
</span><ul class="rteindent1" data-dcnode-id="737"><li data-dcnode-id="824"><span data-dcnode-id="825" style="font-size:14px"><span data-dcnode-id="826" instrument_node="">Star name,</span></span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="821" style="font-size:14px"><span data-dcnode-id="822" instrument_node="">Date and time of the imaging (local or UT),</span></span></li><span data-dcnode-id="819" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="817" style="font-size:14px"><span data-dcnode-id="818" instrument_node="">Latitude and longitude of your imaging location,</span></span></li><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" style="font-size:14px"><span data-dcnode-id="814" instrument_node="">Seeing and transparency,</span></span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="809" style="font-size:14px"><span data-dcnode-id="810" instrument_node="">Filters used (if any),</span></span></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="805" style="font-size:14px"><span data-dcnode-id="806" instrument_node="">Telescope/optics used including aperture and focal ratio,</span></span></li><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="801" style="font-size:14px"><span data-dcnode-id="802" instrument_node="">Camera/CCD/CMOS information including:</span></span><span data-dcnode-id="800" instrument_node="">
</span><ul data-dcnode-id="780"><li data-dcnode-id="794"><span data-dcnode-id="799" instrument_node="">
</span><div data-dcnode-id="796"><span data-dcnode-id="797" style="font-size:14px"><span data-dcnode-id="798" instrument_node="">imaging software,</span></span></div><span data-dcnode-id="795" instrument_node="">
</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="790"><span data-dcnode-id="791" style="font-size:14px"><span data-dcnode-id="792" instrument_node="">exposure times,</span></span></li><span data-dcnode-id="789" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" style="font-size:14px"><span data-dcnode-id="788" instrument_node="">number of images,</span></span></li><span data-dcnode-id="785" instrument_node="">
</span><li data-dcnode-id="782"><span data-dcnode-id="783" style="font-size:14px"><span data-dcnode-id="784" instrument_node="">other information relevant to the image production should also be provided.</span></span></li><span data-dcnode-id="781" instrument_node="">
</span></ul></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="775"><span data-dcnode-id="776" style="font-size:14px"><span data-dcnode-id="777" instrument_node="">Type of spectrograph used (include a picture if DIY),</span></span></li><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="771"><span data-dcnode-id="772" style="font-size:14px"><span data-dcnode-id="773" instrument_node="">Spectral analysis software used,</span></span></li><span data-dcnode-id="770" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" style="font-size:14px"><span data-dcnode-id="769" instrument_node="">Spectrum,</span></span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" style="font-size:14px"><span data-dcnode-id="765" instrument_node="">Spectrogram with prominent features labeled (significant lines, etc.)</span></span></li><span data-dcnode-id="762" instrument_node="">
</span><li data-dcnode-id="759"><span data-dcnode-id="760" style="font-size:14px"><span data-dcnode-id="761" instrument_node="">Wavelength of maximum transmission,</span></span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" style="font-size:14px"><span data-dcnode-id="757" instrument_node="">Temperature of the star’s surface,</span></span></li><span data-dcnode-id="754" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="752" style="font-size:14px"><span data-dcnode-id="753" instrument_node="">Estimated stellar type,</span></span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="747"><span data-dcnode-id="748" style="font-size:14px"><span data-dcnode-id="749" instrument_node="">Distance to the star,</span></span></li><span data-dcnode-id="746" instrument_node="">
</span><li data-dcnode-id="743"><span data-dcnode-id="744" style="font-size:14px"><span data-dcnode-id="745" instrument_node="">Graph of Absolute Magnitude&nbsp;(y) vs. Surface Temperature (x) for all stars measured.</span></span></li><span data-dcnode-id="742" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="740" style="font-size:14px"><span data-dcnode-id="741" instrument_node="">Additional notes or observations related to the star.&nbsp; (This might include perceived visual color, imaging difficulty related to poor seeing, placement close to the horizon (airmass concerns), etc.)</span></span></li><span data-dcnode-id="738" instrument_node="">
</span></ul><p data-dcnode-id="732"><span data-dcnode-id="733" style="font-size:14px"><u data-dcnode-id="734"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Part II:&nbsp; Spectroscopic Binary Stars</span></strong></u></span></p><span data-dcnode-id="731" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="728"><span data-dcnode-id="729" style="font-size:14px"><span data-dcnode-id="730" instrument_node="">Many double stars have separations that are much too small to see for even the best telescopes.&nbsp; We know they are doubles because their spectra changes repeatably&nbsp;over time.&nbsp; Your task is to verify five spectroscopic eclipsing binary stars.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="718"><span data-dcnode-id="719" style="font-size:14px"><span data-dcnode-id="726" instrument_node="">To help pick spectroscopic eclipsing binary stars to verify go to the “TIDAK - TIming DAtabase at Krakow“ web site (</span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.as.up.krakow.pl/ephem/"><span data-dcnode-id="725" instrument_node="">http://www.as.up.krakow.pl/ephem/</span></a><span data-dcnode-id="723" instrument_node="">) and/or the "Ephemerides of Variable Stars" (</span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.motl.cz/dmotl/predpovedi/"><span data-dcnode-id="722" instrument_node="">http://www.motl.cz/dmotl/predpovedi/</span></a><span data-dcnode-id="720" instrument_node="">).&nbsp; You will use these databases to pick the stars you wish to verify because it will give you predictions of the best times for your observations.&nbsp; Select a constellation and look through the list noting the magnitudes and periods.&nbsp; Select eclipsing binaries that have magnitudes that are possible with your equipment based on your experience collecting data for the stars you choose in Part I.&nbsp; Eclipsing binaries with short periods can be done in one evening.&nbsp; Click an eclipsing binary and note that the new page gives a number of primary and secondary minima times for the next few days or weeks.&nbsp; A primary minimum is when the primary star (the brightest of the pair) blocks the light from the secondary star (the dimmer of the pair).&nbsp; A secondary minimum is the opposite.&nbsp; You should image the eclipsing binary near these two times.&nbsp; If the primary and secondary stars are different stellar types, it may be possible to note a change in the spectra.&nbsp; By clicking on the Simbad link on the page it is possible to see the Spectral Type.&nbsp; Select your five eclipsing binary stars so they have different spectral types as far apart as possible.&nbsp; Since you won’t have to note the maximum wavelength any star type can be used.&nbsp; While not specifically required Algol (beta Per), TX UMa, and U Cep are good examples.&nbsp; Negative observations are permitted since this is dependant on the resolution of your spectrometer.</span></span></p><span data-dcnode-id="717" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="714"><span data-dcnode-id="715" style="font-size:14px"><img alt="" data-dcnode-id="716" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/Star%2520examples.jpg&amp;raw" style="height:67px; width:400px"></span></p><span data-dcnode-id="713" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="707"><span data-dcnode-id="708" style="font-size:14px"><span data-dcnode-id="712" instrument_node="">Additional information other than the minima times can be found in the AAVSO’s VSX (</span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aavso.org/vsx/"><span data-dcnode-id="711" instrument_node="">https://www.aavso.org/vsx/</span></a><span data-dcnode-id="709" instrument_node="">).</span></span></p><span data-dcnode-id="706" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="703"><span data-dcnode-id="704" style="font-size:14px"><span data-dcnode-id="705" instrument_node="">Imaging the star every few minutes for an hour on either side of the predicted minimum should give you enough data to ensure that you can tell that the eclipse actually happened.</span></span></p><span data-dcnode-id="702" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="699"><span data-dcnode-id="700" style="font-size:14px"><span data-dcnode-id="701" instrument_node="">For the five eclipsing binary stars report imaging data as above, the two spectra, the two spectrograms, and estimated stellar types for each member in the pair.&nbsp;</span></span></p><span data-dcnode-id="698" instrument_node="">
</span><div data-dcnode-id="694"><span data-dcnode-id="695" style="font-size:14px"><strong data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Part III:&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Complete your choice of two or more of the following projects:</span></strong></span></div><span data-dcnode-id="693" instrument_node="">
</span><ul data-dcnode-id="682"><li data-dcnode-id="690"><span data-dcnode-id="691" style="font-size:14px"><span data-dcnode-id="692" instrument_node="">Submit the above imaging data for the projects.</span></span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="684"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Note:</span></strong><span data-dcnode-id="685" style="font-size:14px"><span data-dcnode-id="686" instrument_node="">&nbsp; The ability to successfully complete some of the projects will depend on the resolution of your spectrograph.</span></span></li><span data-dcnode-id="683" instrument_node="">
</span></ul><p data-dcnode-id="678"><span data-dcnode-id="679" style="font-size:14px"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Project 1:&nbsp; &nbsp;&nbsp;&nbsp;&nbsp; Spectra of Extended Deep Sky Objects</span></strong></span></p><span data-dcnode-id="677" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="674"><span data-dcnode-id="675" style="font-size:14px"><span data-dcnode-id="676" instrument_node="">Capture and analyze the spectra of ten extended deep sky objects found within the Milky Way (planetary nebulae, open clusters, globular clusters, reflection and diffuse nebulae).&nbsp; &nbsp;Some types will give better results than others.&nbsp; Can you guess this in advance?&nbsp; Identify elements found in the spectra.&nbsp; Might your results suggest possible filters to aid in imaging these objects?</span></span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" style="font-size:14px"><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Project 2:&nbsp; &nbsp;&nbsp;&nbsp;&nbsp; Detect the Methane Atmosphere&nbsp;in Neptune and Uranus</span></strong></span></p><span data-dcnode-id="668" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="663"><span data-dcnode-id="664" style="font-size:14px"><span data-dcnode-id="667" instrument_node="">Capture and analyze the spectra of Neptune and Uranus.&nbsp; Label the methane bands in their spectrograms.</span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span></strong></span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" style="font-size:14px"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Project 3&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Spectra of Comets</span></strong></span></p><span data-dcnode-id="657" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="654"><span data-dcnode-id="655" style="font-size:14px"><span data-dcnode-id="656" instrument_node="">Capture, analyze, and report any elements found in the spectra of two comets.&nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" style="font-size:14px"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Project 4&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Measure the red shift of galaxies</span></strong></span></p><span data-dcnode-id="648" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="645"><span data-dcnode-id="646" style="font-size:14px"><span data-dcnode-id="647" instrument_node="">Capture and analyze the spectra of two galaxies.&nbsp; Galaxies with small, bright cores will work the best.&nbsp; Compare the spectra to an A class star to see how much the Hydrogen-alpha line has been shifted in wavelength.&nbsp; From the shift calculate z describing the galaxy’s red shift.</span></span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" style="font-size:14px"><strong data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Project 5 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Spectra of RR Lyra type variable stars over a night</span></strong></span></p><span data-dcnode-id="639" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="636"><span data-dcnode-id="637" style="font-size:14px"><span data-dcnode-id="638" instrument_node="">Capture and analyze the spectra of RR Lyra or other RR Lyra type variable star over the course of one night.&nbsp; Note any changes in the spectrum.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="635" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="630"><span data-dcnode-id="631" style="font-size:14px"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Note:&nbsp; </span></strong><span data-dcnode-id="632" instrument_node="">RR Lyra is the brightest and easiest of the type with a magnitude range of 7.17-8.14 over a .567 day period. &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" style="font-size:14px"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Project 6&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; User Submitted</span></strong></span></p><span data-dcnode-id="624" instrument_node="">
</span><p class="rteindent1" data-dcnode-id="621"><span data-dcnode-id="622" style="font-size:14px"><span data-dcnode-id="623" instrument_node="">Got an idea of something you’d like to try?&nbsp; Email the Observing Program’s coordinator to discuss the topic.&nbsp; Possible ideas could include (but are not limited to):</span></span></p><span data-dcnode-id="620" instrument_node="">
</span><ul class="rteindent1" data-dcnode-id="591"><li data-dcnode-id="617"><span data-dcnode-id="618" style="font-size:14px"><span data-dcnode-id="619" instrument_node="">the change in spectra of a carbon star throughout its period,</span></span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="614" style="font-size:14px"><span data-dcnode-id="615" instrument_node="">a study of Wolf-Rayet stars,</span></span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" style="font-size:14px"><span data-dcnode-id="611" instrument_node="">the change in a supernova over time as it dims,</span></span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="606" style="font-size:14px"><span data-dcnode-id="607" instrument_node="">high resolution solar spectrum showing Fraunhofer lines,</span></span></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="602" style="font-size:14px"><span data-dcnode-id="603" instrument_node="">using spectra to differentiate between eclipsing binary stars and exoplanets,</span></span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" style="font-size:14px"><span data-dcnode-id="599" instrument_node="">solar spectra and the sun’s rotation, or</span></span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="593"><span data-dcnode-id="594" style="font-size:14px"><span data-dcnode-id="595" instrument_node="">explore stellar class classification by the B – V method outlined above.</span></span></li><span data-dcnode-id="592" instrument_node="">
</span></ul><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">&nbsp;</span></p><span data-dcnode-id="588" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" style="color:rgb(0, 0, 255)"><span data-dcnode-id="585" style="font-size:18px"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Submitting for Certification</span></strong></span></span></h2><span data-dcnode-id="582" instrument_node="">

</span><p data-dcnode-id="564"><span data-dcnode-id="565" style="font-size:14px"><span data-dcnode-id="580" instrument_node="">To receive your </span><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Spectroscopy Observing Program </span></strong><span data-dcnode-id="577" instrument_node="">certificate and pin, send a </span><strong data-dcnode-id="574"><u data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">copy</span></u></strong><span data-dcnode-id="573" instrument_node=""> of your log or report including a </span><strong data-dcnode-id="570"><u data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">copy</span></u></strong><span data-dcnode-id="569" instrument_node=""> of all relevant data, graphs, and contact information to the Coordinator via email or mail for verification.&nbsp; Submissions will not be returned.&nbsp; I prefer to verify the observations myself since I really love to see what other observers have done. However, if mailing the observations seems impractical and there is another member in your club who has already received the </span><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Spectroscopy Observing Program </span></strong><span data-dcnode-id="566" instrument_node="">certification, I will accept an email recommendation from that person or your club's Awards Coordinator after they have reviewed and approved your work.&nbsp;&nbsp;&nbsp; If there are any questions or problems, please contact the Coordinator.</span></span></p><span data-dcnode-id="563" instrument_node="">
</span></td><td data-dcnode-id="559"><img alt="" data-dcnode-id="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astroleague.org/files/u220/All-OP-SR.jpg&amp;raw" style="width:335px"></td></tr></tbody></table><p data-dcnode-id="552"><span data-dcnode-id="553" style="font-size:14px"><span data-dcnode-id="554" instrument_node="">Upon verification of your submission and of your active membership in the Astronomical League, your recognition (certificate, pin, etc.) will be sent to you or to the awards coordinator for your society, as you specified.&nbsp; Your name will also appear in an upcoming issue of the Reflector magazine and in the Astronomical League’s on-line database.&nbsp; Congratulations.&nbsp; Good luck with your next observing challenge.</span></span></p><span data-dcnode-id="551" instrument_node="">
