</span><ul data-dcnode-id="4876"><li data-dcnode-id="4888"><a data-dcnode-id="4893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Innsbruck" title="Innsbruck"><span data-dcnode-id="4894" instrument_node="">Innsbruck</span></a><span data-dcnode-id="4892" instrument_node="">. The astronomical clock in the gable of 17–19 Maria-Theresien-Strasse is a 20th-century copy of the astronomical clock of the Ulm Rathaus.</span><sup class="reference" data-dcnode-id="4889" id="cite_ref-18"><a data-dcnode-id="4890" href="#cite_note-18"><span data-dcnode-id="4891" instrument_node="">[18]</span></a></sup></li><span data-dcnode-id="4887" instrument_node="">
</span><li data-dcnode-id="4877"><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peuerbach" title="Peuerbach"><span data-dcnode-id="4886" instrument_node="">Peuerbach</span></a><span data-dcnode-id="4884" instrument_node="">. The facade of Peuerbach Town Hall features an astrolabe clock, an enlarged copy of </span><a data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georg_von_Peuerbach" title="Georg von Peuerbach"><span data-dcnode-id="4883" instrument_node="">Georg von Peuerbach</span></a><span data-dcnode-id="4881" instrument_node="">'s original astrolabe of 1457.</span><sup class="reference" data-dcnode-id="4878" id="cite_ref-19"><a data-dcnode-id="4879" href="#cite_note-19"><span data-dcnode-id="4880" instrument_node="">[19]</span></a></sup></li></ul><span data-dcnode-id="4875" instrument_node="">
</span><h3 data-dcnode-id="4865"><span class="mw-headline" data-dcnode-id="4873" id="Belgium"><span data-dcnode-id="4874" instrument_node="">Belgium</span></span><span class="mw-editsection" data-dcnode-id="4866"><span class="mw-editsection-bracket" data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">[</span></span><a data-dcnode-id="4869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D20" title="Edit section: Belgium"><span data-dcnode-id="4870" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4867"><span data-dcnode-id="4868" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4864" instrument_node="">
</span><ul data-dcnode-id="4807"><li data-dcnode-id="4848"><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lier%2C_Belgium" title="Lier, Belgium"><span data-dcnode-id="4863" instrument_node="">Lier</span></a><span data-dcnode-id="4861" instrument_node="">. The </span><a data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zimmer_tower" title="Zimmer tower"><span data-dcnode-id="4860" instrument_node="">Zimmer tower</span></a><span data-dcnode-id="4858" instrument_node=""> houses an astronomical clock installed by </span><a data-dcnode-id="4856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Zimmer" title="Louis Zimmer"><span data-dcnode-id="4857" instrument_node="">Louis Zimmer</span></a><span data-dcnode-id="4855" instrument_node=""> in 1930. On twelve dials surrounding a central clockface, it gives indications including the time around the world, the date, the moon phase, and the </span><a data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equation_of_time" title="Equation of time"><span data-dcnode-id="4854" instrument_node="">equation of time</span></a><span data-dcnode-id="4852" instrument_node="">, and includes a </span><a data-dcnode-id="4850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tide_clock" title="Tide clock"><span data-dcnode-id="4851" instrument_node="">tide clock</span></a><span data-dcnode-id="4849" instrument_node="">.</span></li><span data-dcnode-id="4847" instrument_node="">
</span><li data-dcnode-id="4824"><a class="new" data-dcnode-id="4845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSenzeilles%26action%3Dedit%26redlink%3D1" title="Senzeilles (page does not exist)"><span data-dcnode-id="4846" instrument_node="">Senzeilles</span></a><span class="noprint" data-dcnode-id="4840" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4844" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Senzeilles" title="fr:Senzeilles"><span data-dcnode-id="4843" instrument_node="">fr</span></a><span data-dcnode-id="4841" instrument_node="">]</span></span><span data-dcnode-id="4839" instrument_node="">. The </span><a class="new" data-dcnode-id="4837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSenzeilles_astronomical_clock%26action%3Dedit%26redlink%3D1" title="Senzeilles astronomical clock (page does not exist)"><span data-dcnode-id="4838" instrument_node="">Senzeilles astronomical clock</span></a><span class="noprint" data-dcnode-id="4832" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4836" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Horloge_astronomique_de_Senzeilles" title="fr:Horloge astronomique de Senzeilles"><span data-dcnode-id="4835" instrument_node="">fr</span></a><span data-dcnode-id="4833" instrument_node="">]</span></span><span data-dcnode-id="4831" instrument_node=""> was constructed by self-taught Lucien Charloteaux between 1896 and 1912. A domestic clock housed in a wooden case, it gives indications including the solar, mean and sidereal time around the world, the positions of the constellations and planets, and the appearance of </span><a data-dcnode-id="4829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halley%2527s_Comet" title="Halley's Comet"><span data-dcnode-id="4830" instrument_node="">Halley's Comet</span></a><span data-dcnode-id="4828" instrument_node="">.</span><sup class="reference" data-dcnode-id="4825" id="cite_ref-20"><a data-dcnode-id="4826" href="#cite_note-20"><span data-dcnode-id="4827" instrument_node="">[20]</span></a></sup></li><span data-dcnode-id="4823" instrument_node="">
</span><li data-dcnode-id="4808"><a data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sint-Truiden" title="Sint-Truiden"><span data-dcnode-id="4822" instrument_node="">Sint-Truiden</span></a><span data-dcnode-id="4820" instrument_node="">. The astronomical clock constructed by </span><a class="new" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKamiel_Festraets%26action%3Dedit%26redlink%3D1" title="Kamiel Festraets (page does not exist)"><span data-dcnode-id="4819" instrument_node="">Kamiel Festraets</span></a><span class="noprint" data-dcnode-id="4813" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4817" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nl.wikipedia.org/wiki/Kamiel_Festraets" title="nl:Kamiel Festraets"><span data-dcnode-id="4816" instrument_node="">nl</span></a><span data-dcnode-id="4814" instrument_node="">]</span></span><span data-dcnode-id="4812" instrument_node=""> between 1937 and 1942 is now housed in the </span><a class="extiw" data-dcnode-id="4810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nl.wikipedia.org/wiki/Sint-Agnesbegijnhof%23Festraetsmuseum" title="nl:Sint-Agnesbegijnhof"><span data-dcnode-id="4811" instrument_node="">Festraets Museum</span></a><span data-dcnode-id="4809" instrument_node="">.</span></li></ul><span data-dcnode-id="4806" instrument_node="">

</span><ul data-dcnode-id="4747"><li data-dcnode-id="4748"><a data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubrovnik" title="Dubrovnik"><span data-dcnode-id="4754" instrument_node="">Dubrovnik</span></a><span data-dcnode-id="4752" instrument_node="">. The </span><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dubrovnik_Bell_Tower" title="Dubrovnik Bell Tower"><span data-dcnode-id="4751" instrument_node="">Dubrovnik Bell Tower</span></a><span data-dcnode-id="4749" instrument_node=""> constructed in 1444 has housed a clock since its creation, though due to earthquake damage, both the tower and the clock were replaced in 1929. A rotating moon ball shows the lunar phase.</span></li></ul><span data-dcnode-id="4746" instrument_node="">

</span><h3 data-dcnode-id="4718"><span class="mw-headline" data-dcnode-id="4726" id="Czech_Republic"><span data-dcnode-id="4727" instrument_node="">Czech Republic</span></span><span class="mw-editsection" data-dcnode-id="4719"><span class="mw-editsection-bracket" data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">[</span></span><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D22" title="Edit section: Czech Republic"><span data-dcnode-id="4723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4717" instrument_node="">
</span><link data-dcnode-id="4716" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="4712" role="note"><span data-dcnode-id="4715" instrument_node="">See also: </span><a data-dcnode-id="4713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_the_Czech_Republic" title="Category:Astronomical clocks in the Czech Republic"><span data-dcnode-id="4714" instrument_node="">Category:Astronomical clocks in the Czech Republic</span></a></div><span data-dcnode-id="4711" instrument_node="">
</span><ul data-dcnode-id="4633"><li data-dcnode-id="4701"><a data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prague" title="Prague"><span data-dcnode-id="4710" instrument_node="">Prague</span></a><span data-dcnode-id="4708" instrument_node="">. The </span><a data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prague_astronomical_clock" title="Prague astronomical clock"><span data-dcnode-id="4707" instrument_node="">Prague astronomical clock</span></a><span data-dcnode-id="4705" instrument_node=""> at the Old Town Hall is one of the most famous astronomical clocks. The central section was completed in 1410, the calendar dial was added in 1490. The clock was renovated after damage during </span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="4704" instrument_node="">World War II</span></a><span data-dcnode-id="4702" instrument_node="">, and in 1979. On the hour, Death strikes the time, and the twelve apostles appear at the doors above the clock.</span></li><span data-dcnode-id="4700" instrument_node="">
</span><li data-dcnode-id="4687"><a data-dcnode-id="4698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olomouc" title="Olomouc"><span data-dcnode-id="4699" instrument_node="">Olomouc</span></a><span data-dcnode-id="4697" instrument_node="">. The </span><a data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olomouc_astronomical_clock" title="Olomouc astronomical clock"><span data-dcnode-id="4696" instrument_node="">Olomouc astronomical clock</span></a><span data-dcnode-id="4694" instrument_node=""> at the Town Hall is a rare example of a </span><a class="mw-redirect" data-dcnode-id="4692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heliocentric_system" title="Heliocentric system"><span data-dcnode-id="4693" instrument_node="">heliocentric</span></a><span data-dcnode-id="4691" instrument_node=""> astronomical clock. Dated 1422 by legend, but first mentioned in history in 1517, the clock was remodelled approximately once every century; in 1898 the astrolabe was replaced with a heliocentric model of the solar system. Badly damaged by the retreating German army in 1945, the clock was remodelled in </span><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_realism" title="Socialist realism"><span data-dcnode-id="4690" instrument_node="">socialist realism</span></a><span data-dcnode-id="4688" instrument_node=""> style in 1955, under the Communist government. The religious and royal figures were replaced with athletes, workers, farmers, scientists, and other members of the proletariat.</span></li><span data-dcnode-id="4686" instrument_node="">
</span><li data-dcnode-id="4679"><a data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Litomy%25C5%25A1l" title="Litomyšl"><span data-dcnode-id="4685" instrument_node="">Litomyšl</span></a><span data-dcnode-id="4683" instrument_node="">. The tower of the Old Town Hall has an art nouveau astronomical clock, installed in 1907.</span><sup class="reference" data-dcnode-id="4680" id="cite_ref-21"><a data-dcnode-id="4681" href="#cite_note-21"><span data-dcnode-id="4682" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="4678" instrument_node="">
</span><li data-dcnode-id="4674"><a data-dcnode-id="4676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prost%25C4%259Bjov" title="Prostějov"><span data-dcnode-id="4677" instrument_node="">Prostějov</span></a><span data-dcnode-id="4675" instrument_node="">. The astronomical clock in the tower of the New Town Hall was installed in 1910.</span></li><span data-dcnode-id="4673" instrument_node="">
</span><li data-dcnode-id="4666"><a data-dcnode-id="4671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kry%25C5%25A1tofovo_%25C3%259Adol%25C3%25AD" title="Kryštofovo Údolí"><span data-dcnode-id="4672" instrument_node="">Kryštofovo Údolí</span></a><span data-dcnode-id="4670" instrument_node="">. The </span><a data-dcnode-id="4668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kry%25C5%25A1tofovo_%25C3%259Adol%25C3%25AD_astronomical_clock" title="Kryštofovo Údolí astronomical clock"><span data-dcnode-id="4669" instrument_node="">Kryštofovo Údolí astronomical clock</span></a><span data-dcnode-id="4667" instrument_node=""> is a modern astronomical clock (inaugurated in 2008), built-in a former electrical substation.</span></li><span data-dcnode-id="4665" instrument_node="">
</span><li data-dcnode-id="4655"><a data-dcnode-id="4663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hojsova_Str%25C3%25A1%25C5%25BE" title="Hojsova Stráž"><span data-dcnode-id="4664" instrument_node="">Hojsova Stráž</span></a><span data-dcnode-id="4662" instrument_node="">. An astronomical clock in the </span><a data-dcnode-id="4660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bohemian_Forest" title="Bohemian Forest"><span data-dcnode-id="4661" instrument_node="">Bohemian Forest</span></a><span data-dcnode-id="4659" instrument_node=""> was inaugurated in 2017. It has a concentric dial showing the 24-hour time, the date and zodiac, and the moon phase, and a star map dial with a dragon hand, and indicates the time of sunrise and sunset.</span><sup class="reference" data-dcnode-id="4656" id="cite_ref-22"><a data-dcnode-id="4657" href="#cite_note-22"><span data-dcnode-id="4658" instrument_node="">[22]</span></a></sup></li><span data-dcnode-id="4654" instrument_node="">
</span><li data-dcnode-id="4650"><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T%25C5%2599eb%25C3%25AD%25C4%258D" title="Třebíč"><span data-dcnode-id="4653" instrument_node="">Třebíč</span></a><span data-dcnode-id="4651" instrument_node="">. At the Třebíč Astronomical Observatory, a modern astronomical clock which shows the time in world cities, the time of sunrise and sunset, the date and zodiac, and the orbits of the planets.</span></li><span data-dcnode-id="4649" instrument_node="">
</span><li data-dcnode-id="4634"><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C5%25BDatec" title="Žatec"><span data-dcnode-id="4648" instrument_node="">Žatec</span></a><span data-dcnode-id="4646" instrument_node="">. The </span><a class="new" data-dcnode-id="4644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemple_to_Hops_and_Beer%26action%3Dedit%26redlink%3D1" title="Temple to Hops and Beer (page does not exist)"><span data-dcnode-id="4645" instrument_node="">Temple to Hops and Beer</span></a><span class="noprint" data-dcnode-id="4639" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4643" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cs.wikipedia.org/wiki/Chr%25C3%25A1m_chmele_a_piva" title="cs:Chrám chmele a piva"><span data-dcnode-id="4642" instrument_node="">cs</span></a><span data-dcnode-id="4640" instrument_node="">]</span></span><span data-dcnode-id="4638" instrument_node="">, a museum and amusement complex dedicated to beer, has an astronomical clock on which the zodiac indication illustrates the annual processes of beer production.</span><sup class="reference" data-dcnode-id="4635" id="cite_ref-23"><a data-dcnode-id="4636" href="#cite_note-23"><span data-dcnode-id="4637" instrument_node="">[23]</span></a></sup></li></ul><span data-dcnode-id="4632" instrument_node="">

</span><ul data-dcnode-id="4502"><li data-dcnode-id="4503"><a data-dcnode-id="4514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copenhagen" title="Copenhagen"><span data-dcnode-id="4515" instrument_node="">Copenhagen</span></a><span data-dcnode-id="4513" instrument_node="">. </span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Olsen%2527s_World_Clock" title="Jens Olsen's World Clock"><span data-dcnode-id="4512" instrument_node="">Jens Olsen's World Clock</span></a><span data-dcnode-id="4510" instrument_node=""> in </span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copenhagen_City_Hall" title="Copenhagen City Hall"><span data-dcnode-id="4509" instrument_node="">Copenhagen City Hall</span></a><span data-dcnode-id="4507" instrument_node=""> was designed by </span><a data-dcnode-id="4505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Olsen" title="Jens Olsen"><span data-dcnode-id="4506" instrument_node="">Jens Olsen</span></a><span data-dcnode-id="4504" instrument_node=""> and assembled from 1948 to 1955.</span></li></ul><span data-dcnode-id="4501" instrument_node="">

</span><h3 data-dcnode-id="4473"><span class="mw-headline" data-dcnode-id="4481" id="France"><span data-dcnode-id="4482" instrument_node="">France</span></span><span class="mw-editsection" data-dcnode-id="4474"><span class="mw-editsection-bracket" data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">[</span></span><a data-dcnode-id="4477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D24" title="Edit section: France"><span data-dcnode-id="4478" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4472" instrument_node="">
</span><link data-dcnode-id="4471" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="4467" role="note"><span data-dcnode-id="4470" instrument_node="">See also: </span><a data-dcnode-id="4468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_France" title="Category:Astronomical clocks in France"><span data-dcnode-id="4469" instrument_node="">Category:Astronomical clocks in France</span></a></div><span data-dcnode-id="4466" instrument_node="">
</span><ul data-dcnode-id="4294"><li data-dcnode-id="4451"><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Auxerre" title="Auxerre"><span data-dcnode-id="4465" instrument_node="">Auxerre</span></a><span data-dcnode-id="4463" instrument_node="">. The 15th-century clock in the </span><a class="new" data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTour_de_l%2527Horloge%2C_Auxerre%26action%3Dedit%26redlink%3D1" title="Tour de l'Horloge, Auxerre (page does not exist)"><span data-dcnode-id="4462" instrument_node="">Tour de l'Horloge</span></a><span class="noprint" data-dcnode-id="4456" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4460" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Tour_de_l%2527Horloge_d%2527Auxerre" title="fr:Tour de l'Horloge d'Auxerre"><span data-dcnode-id="4459" instrument_node="">fr</span></a><span data-dcnode-id="4457" instrument_node="">]</span></span><span data-dcnode-id="4455" instrument_node=""> has a 24-hour sun hand and a moon hand which completes a revolution in a </span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_day" title="Lunar day"><span data-dcnode-id="4454" instrument_node="">lunar day</span></a><span data-dcnode-id="4452" instrument_node=""> of 24 hours 50 minutes, and shows the lunar phase on a rotating moon ball.</span></li><span data-dcnode-id="4450" instrument_node="">
</span><li data-dcnode-id="4429"><a data-dcnode-id="4448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beauvais" title="Beauvais"><span data-dcnode-id="4449" instrument_node="">Beauvais</span></a><span data-dcnode-id="4447" instrument_node="">. The </span><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beauvais_astronomical_clock" title="Beauvais astronomical clock"><span data-dcnode-id="4446" instrument_node="">Beauvais astronomical clock</span></a><span data-dcnode-id="4444" instrument_node=""> in </span><a data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beauvais_Cathedral" title="Beauvais Cathedral"><span data-dcnode-id="4443" instrument_node="">Beauvais Cathedral</span></a><span data-dcnode-id="4441" instrument_node="">, constructed 1865–1868 by </span><a class="new" data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAuguste-Lucien_V%25C3%25A9rit%25C3%25A9%26action%3Dedit%26redlink%3D1" title="Auguste-Lucien Vérité (page does not exist)"><span data-dcnode-id="4440" instrument_node="">Auguste-Lucien Vérité</span></a><span class="noprint" data-dcnode-id="4434" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4438" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Auguste-Lucien_V%25C3%25A9rit%25C3%25A9" title="fr:Auguste-Lucien Vérité"><span data-dcnode-id="4437" instrument_node="">fr</span></a><span data-dcnode-id="4435" instrument_node="">]</span></span><span data-dcnode-id="4433" instrument_node="">, has 52 dials that display the times of sunrise, sunset, moonrise, moonset, the phases of the moon, the solstices, the position of the planets, the current time in 18 cities around the world, and the tidal hours. Its 68 automata enact the </span><a class="mw-redirect" data-dcnode-id="4431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Last_Judgement" title="Last Judgement"><span data-dcnode-id="4432" instrument_node="">Last Judgement</span></a><span data-dcnode-id="4430" instrument_node=""> on the hour.</span></li><span data-dcnode-id="4428" instrument_node="">
</span><li data-dcnode-id="4418"><a data-dcnode-id="4426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Besan%25C3%25A7on" title="Besançon"><span data-dcnode-id="4427" instrument_node="">Besançon</span></a><span data-dcnode-id="4425" instrument_node="">. The </span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Besan%25C3%25A7on_astronomical_clock" title="Besançon astronomical clock"><span data-dcnode-id="4424" instrument_node="">Besançon astronomical clock</span></a><span data-dcnode-id="4422" instrument_node=""> in </span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Besan%25C3%25A7on_Cathedral" title="Besançon Cathedral"><span data-dcnode-id="4421" instrument_node="">Besançon Cathedral</span></a><span data-dcnode-id="4419" instrument_node=""> (1860) was also constructed by Auguste-Lucien Vérité. Its 70 dials provide 122 indications.</span></li><span data-dcnode-id="4417" instrument_node="">
</span><li data-dcnode-id="4407"><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourges" title="Bourges"><span data-dcnode-id="4416" instrument_node="">Bourges</span></a><span data-dcnode-id="4414" instrument_node="">. The </span><a data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourges_astronomical_clock" title="Bourges astronomical clock"><span data-dcnode-id="4413" instrument_node="">Bourges astronomical clock</span></a><span data-dcnode-id="4411" instrument_node=""> in </span><a data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourges_Cathedral" title="Bourges Cathedral"><span data-dcnode-id="4410" instrument_node="">Bourges Cathedral</span></a><span data-dcnode-id="4408" instrument_node=""> was installed in 1424. It shows the zodiac, and the moon phase and age.</span></li><span data-dcnode-id="4406" instrument_node="">
</span><li data-dcnode-id="4391"><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chartres" title="Chartres"><span data-dcnode-id="4405" instrument_node="">Chartres</span></a><span data-dcnode-id="4403" instrument_node="">. The </span><a class="new" data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChartres_astronomical_clock%26action%3Dedit%26redlink%3D1" title="Chartres astronomical clock (page does not exist)"><span data-dcnode-id="4402" instrument_node="">Chartres astronomical clock</span></a><span class="noprint" data-dcnode-id="4396" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4400" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Horloge_astronomique_de_Chartres" title="fr:Horloge astronomique de Chartres"><span data-dcnode-id="4399" instrument_node="">fr</span></a><span data-dcnode-id="4397" instrument_node="">]</span></span><span data-dcnode-id="4395" instrument_node=""> in </span><a data-dcnode-id="4393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chartres_Cathedral" title="Chartres Cathedral"><span data-dcnode-id="4394" instrument_node="">Chartres Cathedral</span></a><span data-dcnode-id="4392" instrument_node=""> is an astrolabe clock, installed in 1528. It was overhauled, its mechanism replaced by an electric mechanism, in 2009.</span></li><span data-dcnode-id="4390" instrument_node="">
</span><li data-dcnode-id="4383"><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haguenau" title="Haguenau"><span data-dcnode-id="4389" instrument_node="">Haguenau</span></a><span data-dcnode-id="4387" instrument_node="">. The facade of the </span><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mus%25C3%25A9e_alsacien_%28Haguenau%29" title="Musée alsacien (Haguenau)"><span data-dcnode-id="4386" instrument_node="">Musée alsacien</span></a><span data-dcnode-id="4384" instrument_node=""> displays an astronomical clock, a modern copy of the clock of the Ulm Rathaus.</span></li><span data-dcnode-id="4382" instrument_node="">
</span><li data-dcnode-id="4372"><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyon" title="Lyon"><span data-dcnode-id="4381" instrument_node="">Lyon</span></a><span data-dcnode-id="4379" instrument_node="">. The </span><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyon_astronomical_clock" title="Lyon astronomical clock"><span data-dcnode-id="4378" instrument_node="">Lyon astronomical clock</span></a><span data-dcnode-id="4376" instrument_node=""> in </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyon_Cathedral" title="Lyon Cathedral"><span data-dcnode-id="4375" instrument_node="">Lyon Cathedral</span></a><span data-dcnode-id="4373" instrument_node=""> was constructed in 1661, replacing a 14th-century original. It has an astrolabe dial and a calendar dial.</span></li><span data-dcnode-id="4371" instrument_node="">
</span><li data-dcnode-id="4364"><a data-dcnode-id="4369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munster%2C_Haut-Rhin" title="Munster, Haut-Rhin"><span data-dcnode-id="4370" instrument_node="">Munster</span></a><span data-dcnode-id="4368" instrument_node="">. The Church of Saint-Léger houses the Clock of Creation, installed in 2008. It shows the time, the day of the week, the month and zodiac, and the moon phase.</span><sup class="reference" data-dcnode-id="4365" id="cite_ref-24"><a data-dcnode-id="4366" href="#cite_note-24"><span data-dcnode-id="4367" instrument_node="">[24]</span></a></sup></li><span data-dcnode-id="4363" instrument_node="">
</span><li data-dcnode-id="4353"><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plo%25C3%25ABrmel" title="Ploërmel"><span data-dcnode-id="4362" instrument_node="">Ploërmel</span></a><span data-dcnode-id="4360" instrument_node="">. The </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plo%25C3%25ABrmel_astronomical_clock" title="Ploërmel astronomical clock"><span data-dcnode-id="4359" instrument_node="">Ploërmel astronomical clock</span></a><span data-dcnode-id="4357" instrument_node="">, constructed 1850–1855, comprises an astronomical clock with 10 dials and an </span><a data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orrery" title="Orrery"><span data-dcnode-id="4356" instrument_node="">orrery</span></a><span data-dcnode-id="4354" instrument_node="">.</span></li><span data-dcnode-id="4352" instrument_node="">
</span><li data-dcnode-id="4345"><a data-dcnode-id="4350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rouen" title="Rouen"><span data-dcnode-id="4351" instrument_node="">Rouen</span></a><span data-dcnode-id="4349" instrument_node="">. The </span><a data-dcnode-id="4347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gros_Horloge" title="Gros Horloge"><span data-dcnode-id="4348" instrument_node="">Gros Horloge</span></a><span data-dcnode-id="4346" instrument_node=""> has a movement built in 1389, with a dial added in 1529. It indicates the moon phase on a rotating sphere above the dial, and the day of the week in an aperture at the base of the dial.</span></li><span data-dcnode-id="4344" instrument_node="">
</span><li data-dcnode-id="4329"><a data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Omer" title="Saint-Omer"><span data-dcnode-id="4343" instrument_node="">Saint-Omer</span></a><span data-dcnode-id="4341" instrument_node="">. The </span><a class="new" data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSaint-Omer_astronomical_clock%26action%3Dedit%26redlink%3D1" title="Saint-Omer astronomical clock (page does not exist)"><span data-dcnode-id="4340" instrument_node="">Saint-Omer astronomical clock</span></a><span class="noprint" data-dcnode-id="4334" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4338" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fr.wikipedia.org/wiki/Horloge_astronomique_de_Saint-Omer" title="fr:Horloge astronomique de Saint-Omer"><span data-dcnode-id="4337" instrument_node="">fr</span></a><span data-dcnode-id="4335" instrument_node="">]</span></span><span data-dcnode-id="4333" instrument_node=""> in </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saint-Omer_Cathedral" title="Saint-Omer Cathedral"><span data-dcnode-id="4332" instrument_node="">Saint-Omer Cathedral</span></a><span data-dcnode-id="4330" instrument_node=""> is an astrolabe clock of 1558.</span></li><span data-dcnode-id="4328" instrument_node="">
</span><li data-dcnode-id="4312"><a data-dcnode-id="4326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strasbourg" title="Strasbourg"><span data-dcnode-id="4327" instrument_node="">Strasbourg</span></a><span data-dcnode-id="4325" instrument_node="">. The </span><a data-dcnode-id="4323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strasbourg_astronomical_clock" title="Strasbourg astronomical clock"><span data-dcnode-id="4324" instrument_node="">Strasbourg astronomical clock</span></a><span data-dcnode-id="4322" instrument_node=""> is the third clock housed in </span><a data-dcnode-id="4320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strasbourg_Cathedral" title="Strasbourg Cathedral"><span data-dcnode-id="4321" instrument_node="">Strasbourg Cathedral</span></a><span data-dcnode-id="4319" instrument_node="">, following 14th-century and 16th-century predecessors. Constructed by </span><a data-dcnode-id="4317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Baptiste_Schwilgu%25C3%25A9" title="Jean-Baptiste Schwilgué"><span data-dcnode-id="4318" instrument_node="">Jean-Baptiste Schwilgué</span></a><span data-dcnode-id="4316" instrument_node=""> from 1838 to 1843, it shows many astronomical and calendrical functions (including what is thought to be the first complete mechanization of the </span><a class="mw-redirect" data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computus" title="Computus"><span data-dcnode-id="4315" instrument_node="">computus</span></a><span data-dcnode-id="4313" instrument_node=""> needed to compute Easter) and several automata.</span></li><span data-dcnode-id="4311" instrument_node="">
</span><li data-dcnode-id="4295"><a class="mw-redirect" data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Versailles_%28city%29" title="Versailles (city)"><span data-dcnode-id="4310" instrument_node="">Versailles</span></a><span data-dcnode-id="4308" instrument_node="">. The </span><a data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Passemant_astronomical_clock" title="Passemant astronomical clock"><span data-dcnode-id="4307" instrument_node="">Passemant astronomical clock</span></a><span data-dcnode-id="4305" instrument_node=""> in the </span><a data-dcnode-id="4303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palace_of_Versailles" title="Palace of Versailles"><span data-dcnode-id="4304" instrument_node="">Palace of Versailles</span></a><span data-dcnode-id="4302" instrument_node=""> near Paris is a </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rococo" title="Rococo"><span data-dcnode-id="4301" instrument_node="">rococo</span></a><span data-dcnode-id="4299" instrument_node=""> astronomical clock sitting on a formal low marble base. It took 12 years for a clockmaker and an engineer to build and was presented to </span><a class="mw-redirect" data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_XV_of_France" title="Louis XV of France"><span data-dcnode-id="4298" instrument_node="">Louis XV</span></a><span data-dcnode-id="4296" instrument_node=""> in 1754.</span></li></ul><span data-dcnode-id="4293" instrument_node="">

</span><h3 data-dcnode-id="4141"><span class="mw-headline" data-dcnode-id="4149" id="Germany"><span data-dcnode-id="4150" instrument_node="">Germany</span></span><span class="mw-editsection" data-dcnode-id="4142"><span class="mw-editsection-bracket" data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">[</span></span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D26" title="Edit section: Germany"><span data-dcnode-id="4146" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4140" instrument_node="">
</span><link data-dcnode-id="4139" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="4135" role="note"><span data-dcnode-id="4138" instrument_node="">See also: </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_Germany" title="Category:Astronomical clocks in Germany"><span data-dcnode-id="4137" instrument_node="">Category:Astronomical clocks in Germany</span></a></div><span data-dcnode-id="4134" instrument_node="">
</span><ul data-dcnode-id="3856"><li data-dcnode-id="4029"><span data-dcnode-id="4133" instrument_node="">A group of interior astronomical clocks of the 14th, 15th and 16th centuries in churches of </span><a data-dcnode-id="4131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hanseatic_League" title="Hanseatic League"><span data-dcnode-id="4132" instrument_node="">Hanseatic League</span></a><span data-dcnode-id="4130" instrument_node=""> towns in northern Germany, known as the Hanseatic clocks (the group also includes the </span><a data-dcnode-id="4128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gda%25C5%2584sk_astronomical_clock" title="Gdańsk astronomical clock"><span data-dcnode-id="4129" instrument_node="">clock at Gdańsk</span></a><span data-dcnode-id="4127" instrument_node="">, now in Poland).
</span><ul data-dcnode-id="4030"><li data-dcnode-id="4117"><a data-dcnode-id="4125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bad_Doberan" title="Bad Doberan"><span data-dcnode-id="4126" instrument_node="">Bad Doberan</span></a><span data-dcnode-id="4124" instrument_node="">. At </span><a data-dcnode-id="4122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doberan_Minster" title="Doberan Minster"><span data-dcnode-id="4123" instrument_node="">Doberan Minster</span></a><span data-dcnode-id="4121" instrument_node="">, an astrolabe clock was installed by </span><a data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolaus_Lilienfeld" title="Nikolaus Lilienfeld"><span data-dcnode-id="4120" instrument_node="">Nikolaus Lilienfeld</span></a><span data-dcnode-id="4118" instrument_node=""> in 1390. Only the dial survives, now positioned above the west door.</span></li><span data-dcnode-id="4116" instrument_node="">
</span><li data-dcnode-id="4103"><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25BCbeck" title="Lübeck"><span data-dcnode-id="4115" instrument_node="">Lübeck</span></a><span data-dcnode-id="4113" instrument_node="">. The astronomical clock of </span><a data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Mary%27s_Church%2C_L%25C3%25BCbeck" title="St. Mary's Church, Lübeck"><span data-dcnode-id="4112" instrument_node="">St. Mary's Church</span></a><span data-dcnode-id="4110" instrument_node="">, constructed 1561–1566, was destroyed in the </span><a data-dcnode-id="4108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bombing_of_L%25C3%25BCbeck_in_World_War_II" title="Bombing of Lübeck in World War II"><span data-dcnode-id="4109" instrument_node="">bombing of Lübeck</span></a><span data-dcnode-id="4107" instrument_node=""> in 1942. The present clock is a replacement by </span><a data-dcnode-id="4105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Behrens" title="Paul Behrens"><span data-dcnode-id="4106" instrument_node="">Paul Behrens</span></a><span data-dcnode-id="4104" instrument_node="">, installed in 1967.</span></li><span data-dcnode-id="4102" instrument_node="">
</span><li data-dcnode-id="4089"><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25BCnster" title="Münster"><span data-dcnode-id="4101" instrument_node="">Münster</span></a><span data-dcnode-id="4099" instrument_node="">. The </span><a data-dcnode-id="4097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25BCnster_astronomical_clock" title="Münster astronomical clock"><span data-dcnode-id="4098" instrument_node="">Münster astronomical clock</span></a><span data-dcnode-id="4096" instrument_node=""> of 1540 in </span><a data-dcnode-id="4094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25BCnster_Cathedral" title="Münster Cathedral"><span data-dcnode-id="4095" instrument_node="">Münster Cathedral</span></a><span data-dcnode-id="4093" instrument_node="">, adorned with hand-painted zodiac symbols, which traces the movement of the planets, plays a </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glockenspiel" title="Glockenspiel"><span data-dcnode-id="4092" instrument_node="">glockenspiel</span></a><span data-dcnode-id="4090" instrument_node=""> tune every noon.</span></li><span data-dcnode-id="4088" instrument_node="">
</span><li data-dcnode-id="4071"><a data-dcnode-id="4086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rostock" title="Rostock"><span data-dcnode-id="4087" instrument_node="">Rostock</span></a><span data-dcnode-id="4085" instrument_node="">. The </span><a data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rostock_astronomical_clock" title="Rostock astronomical clock"><span data-dcnode-id="4084" instrument_node="">Rostock astronomical clock</span></a><span data-dcnode-id="4082" instrument_node=""> in </span><a data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Mary%2527s_Church%2C_Rostock" title="St. Mary's Church, Rostock"><span data-dcnode-id="4081" instrument_node="">St. Mary's Church</span></a><span data-dcnode-id="4079" instrument_node=""> dating from 1472, built by </span><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_D%25C3%25BCringer" title="Hans Düringer"><span data-dcnode-id="4078" instrument_node="">Hans Düringer</span></a><span data-dcnode-id="4076" instrument_node="">. Clock with daily time, zodiac, moon phases, and month. With a dedicated electronic database</span><sup class="reference" data-dcnode-id="4073" id="cite_ref-26"><a data-dcnode-id="4074" href="#cite_note-26"><span data-dcnode-id="4075" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4072" instrument_node=""> this clock is particularly well documented.</span></li><span data-dcnode-id="4070" instrument_node="">
</span><li data-dcnode-id="4055"><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stendal" title="Stendal"><span data-dcnode-id="4069" instrument_node="">Stendal</span></a><span data-dcnode-id="4067" instrument_node="">. At </span><a class="new" data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSt._Mary%2527s_Church%2C_Stendal%26action%3Dedit%26redlink%3D1" title="St. Mary's Church, Stendal (page does not exist)"><span data-dcnode-id="4066" instrument_node="">St. Mary's Church</span></a><span class="noprint" data-dcnode-id="4060" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4064" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/St._Marien_%28Stendal%29" title="de:St. Marien (Stendal)"><span data-dcnode-id="4063" instrument_node="">de</span></a><span data-dcnode-id="4061" instrument_node="">]</span></span><span data-dcnode-id="4059" instrument_node="">, an astronomical clock of the 1580s, rebuilt in 1856 (and vandalized by the clockmaker), and restored in 1977.</span><sup class="reference" data-dcnode-id="4056" id="cite_ref-27"><a data-dcnode-id="4057" href="#cite_note-27"><span data-dcnode-id="4058" instrument_node="">[27]</span></a></sup></li><span data-dcnode-id="4054" instrument_node="">
</span><li data-dcnode-id="4044"><a data-dcnode-id="4052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stralsund" title="Stralsund"><span data-dcnode-id="4053" instrument_node="">Stralsund</span></a><span data-dcnode-id="4051" instrument_node="">. The </span><a data-dcnode-id="4049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_clock%2C_St._Nicholas_Church%2C_Stralsund" title="Astronomical clock, St. Nicholas Church, Stralsund"><span data-dcnode-id="4050" instrument_node="">astronomical clock</span></a><span data-dcnode-id="4048" instrument_node=""> in </span><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St._Nicholas_Church%2C_Stralsund" title="St. Nicholas Church, Stralsund"><span data-dcnode-id="4047" instrument_node="">St. Nicholas' Church</span></a><span data-dcnode-id="4045" instrument_node=""> is an astrolabe clock installed by Nikolaus Lilienfeld in 1394. It has not been in working order since the 16th century.</span></li><span data-dcnode-id="4043" instrument_node="">
</span><li data-dcnode-id="4031"><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wismar" title="Wismar"><span data-dcnode-id="4042" instrument_node="">Wismar</span></a><span data-dcnode-id="4040" instrument_node="">. The 15th-century astronomical clock in </span><a class="new" data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSt._Mary%2527s_Church%2C_Wismar%26action%3Dedit%26redlink%3D1" title="St. Mary's Church, Wismar (page does not exist)"><span data-dcnode-id="4039" instrument_node="">St. Mary's Church</span></a><span class="noprint" data-dcnode-id="4033" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4037" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Marienkirche_%28Wismar%29" title="de:Marienkirche (Wismar)"><span data-dcnode-id="4036" instrument_node="">de</span></a><span data-dcnode-id="4034" instrument_node="">]</span></span><span data-dcnode-id="4032" instrument_node=""> was destroyed by bombing in 1945.</span></li></ul></li><span data-dcnode-id="4028" instrument_node="">
</span><li data-dcnode-id="3963"><span data-dcnode-id="4027" instrument_node="">A group of 16th-century clocks on the facade of town halls in southern Germany, which have a 12-hour dial, a moon phase indication, and a calendar dial indicating the positions of the sun and moon in the zodiac, with a dragon hand:
</span><ul data-dcnode-id="3964"><li data-dcnode-id="4015"><a data-dcnode-id="4025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esslingen_am_Neckar" title="Esslingen am Neckar"><span data-dcnode-id="4026" instrument_node="">Esslingen am Neckar</span></a><span data-dcnode-id="4024" instrument_node="">. The </span><a class="new" data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DClock_of_Esslingen_Old_Town_Hall%26action%3Dedit%26redlink%3D1" title="Clock of Esslingen Old Town Hall (page does not exist)"><span data-dcnode-id="4023" instrument_node="">Clock of Esslingen Old Town Hall</span></a><span class="noprint" data-dcnode-id="4017" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4021" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Uhr_am_Alten_Rathaus_zu_Esslingen" title="de:Uhr am Alten Rathaus zu Esslingen"><span data-dcnode-id="4020" instrument_node="">de</span></a><span data-dcnode-id="4018" instrument_node="">]</span></span><span data-dcnode-id="4016" instrument_node="">, constructed 1581–1586.</span></li><span data-dcnode-id="4014" instrument_node="">
</span><li data-dcnode-id="3991"><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heilbronn" title="Heilbronn"><span data-dcnode-id="4013" instrument_node="">Heilbronn</span></a><span data-dcnode-id="4011" instrument_node="">. The </span><a class="new" data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKunstuhr_%28Heilbronn%29%26action%3Dedit%26redlink%3D1" title="Kunstuhr (Heilbronn) (page does not exist)"><span data-dcnode-id="4010" instrument_node="">Kunstuhr</span></a><span class="noprint" data-dcnode-id="4004" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4008" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="4006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Kunstuhr_%28Heilbronn%29" title="de:Kunstuhr (Heilbronn)"><span data-dcnode-id="4007" instrument_node="">de</span></a><span data-dcnode-id="4005" instrument_node="">]</span></span><span data-dcnode-id="4003" instrument_node=""> of </span><a class="new" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHeilbronn_Town_Hall%26action%3Dedit%26redlink%3D1" title="Heilbronn Town Hall (page does not exist)"><span data-dcnode-id="4002" instrument_node="">Heilbronn Town Hall</span></a><span class="noprint" data-dcnode-id="3996" style="font-size:85%; font-style: normal;"><span data-dcnode-id="4000" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_%28Heilbronn%29" title="de:Rathaus (Heilbronn)"><span data-dcnode-id="3999" instrument_node="">de</span></a><span data-dcnode-id="3997" instrument_node="">]</span></span><span data-dcnode-id="3995" instrument_node=""> of </span><a data-dcnode-id="3993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_and_Josias_Habrecht" title="Isaac and Josias Habrecht"><span data-dcnode-id="3994" instrument_node="">Isaac Habrecht</span></a><span data-dcnode-id="3992" instrument_node="">, installed 1579–1580.</span></li><span data-dcnode-id="3990" instrument_node="">
</span><li data-dcnode-id="3978"><a data-dcnode-id="3988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/T%25C3%25BCbingen" title="Tübingen"><span data-dcnode-id="3989" instrument_node="">Tübingen</span></a><span data-dcnode-id="3987" instrument_node="">. The clock of </span><a class="new" data-dcnode-id="3985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DT%25C3%25BCbingen_Town_Hall%26action%3Dedit%26redlink%3D1" title="Tübingen Town Hall (page does not exist)"><span data-dcnode-id="3986" instrument_node="">Tübingen Town Hall</span></a><span class="noprint" data-dcnode-id="3980" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3984" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_T%25C3%25BCbingen" title="de:Rathaus Tübingen"><span data-dcnode-id="3983" instrument_node="">de</span></a><span data-dcnode-id="3981" instrument_node="">]</span></span><span data-dcnode-id="3979" instrument_node="">, installed in 1510.</span></li><span data-dcnode-id="3977" instrument_node="">
</span><li data-dcnode-id="3965"><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulm" title="Ulm"><span data-dcnode-id="3976" instrument_node="">Ulm</span></a><span data-dcnode-id="3974" instrument_node="">. The 16th-century astronomical clock of </span><a class="new" data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUlm_Town_Hall%26action%3Dedit%26redlink%3D1" title="Ulm Town Hall (page does not exist)"><span data-dcnode-id="3973" instrument_node="">Ulm Town Hall</span></a><span class="noprint" data-dcnode-id="3967" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3971" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_%28Ulm%29" title="de:Rathaus (Ulm)"><span data-dcnode-id="3970" instrument_node="">de</span></a><span data-dcnode-id="3968" instrument_node="">]</span></span><span data-dcnode-id="3966" instrument_node=""> has a 24-hour astrolabe format, although the zodiac is repeated as a rotating ring of gold sculptures, and the outer ring of the dial is a 12-hour chapter ring.</span></li></ul></li><span data-dcnode-id="3962" instrument_node="">
</span><li data-dcnode-id="3944"><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cologne" title="Cologne"><span data-dcnode-id="3961" instrument_node="">Cologne</span></a><span data-dcnode-id="3959" instrument_node="">. At the </span><a class="new" data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCologne_Planetarium%26action%3Dedit%26redlink%3D1" title="Cologne Planetarium (page does not exist)"><span data-dcnode-id="3958" instrument_node="">Cologne Planetarium</span></a><span class="noprint" data-dcnode-id="3952" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3956" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Planetarium_K%25C3%25B6ln" title="de:Planetarium Köln"><span data-dcnode-id="3955" instrument_node="">de</span></a><span data-dcnode-id="3953" instrument_node="">]</span></span><span data-dcnode-id="3951" instrument_node="">, a modern astronomical clock which shows the hour in regular and </span><a data-dcnode-id="3949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidereal_time" title="Sidereal time"><span data-dcnode-id="3950" instrument_node="">sidereal time</span></a><span data-dcnode-id="3948" instrument_node="">, the moon phase, positions of the sun and moon in the zodiac, and the rotation of the earth according to the geocentric model.</span><sup class="reference" data-dcnode-id="3945" id="cite_ref-28"><a data-dcnode-id="3946" href="#cite_note-28"><span data-dcnode-id="3947" instrument_node="">[28]</span></a></sup></li><span data-dcnode-id="3943" instrument_node="">
</span><li data-dcnode-id="3924"><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Esslingen_am_Neckar" title="Esslingen am Neckar"><span data-dcnode-id="3942" instrument_node="">Esslingen am Neckar</span></a><span data-dcnode-id="3940" instrument_node="">. At the headquarters of </span><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Festo" title="Festo"><span data-dcnode-id="3939" instrument_node="">Festo</span></a><span data-dcnode-id="3937" instrument_node="">, Professor Hans Scheurenbrand has constructed the </span><i data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Harmonices Mundi</span></i><span data-dcnode-id="3934" instrument_node=""> (named after Kepler's </span><a data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harmonices_Mundi" title="Harmonices Mundi"><span data-dcnode-id="3933" instrument_node="">book of the same name</span></a><span data-dcnode-id="3931" instrument_node="">), which consists of an astronomical clock, a world time clock, and a 74 bell </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glockenspiel" title="Glockenspiel"><span data-dcnode-id="3930" instrument_node="">glockenspiel</span></a><span data-dcnode-id="3928" instrument_node="">.</span><sup class="reference" data-dcnode-id="3925" id="cite_ref-29"><a data-dcnode-id="3926" href="#cite_note-29"><span data-dcnode-id="3927" instrument_node="">[29]</span></a></sup></li><span data-dcnode-id="3923" instrument_node="">
</span><li data-dcnode-id="3903"><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G%25C3%25B6rlitz" title="Görlitz"><span data-dcnode-id="3922" instrument_node="">Görlitz</span></a><span data-dcnode-id="3920" instrument_node="">. </span><a class="new" data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DG%25C3%25B6rlitz_Town_Hall%26action%3Dedit%26redlink%3D1" title="Görlitz Town Hall (page does not exist)"><span data-dcnode-id="3919" instrument_node="">Görlitz Town Hall</span></a><span class="noprint" data-dcnode-id="3913" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3917" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_G%25C3%25B6rlitz" title="de:Rathaus Görlitz"><span data-dcnode-id="3916" instrument_node="">de</span></a><span data-dcnode-id="3914" instrument_node="">]</span></span><span data-dcnode-id="3912" instrument_node=""> and the </span><a class="new" data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChurch_of_St_Peter_and_St_Paul%2C_G%25C3%25B6rlitz%26action%3Dedit%26redlink%3D1" title="Church of St Peter and St Paul, Görlitz (page does not exist)"><span data-dcnode-id="3911" instrument_node="">Church of St Peter and St Paul</span></a><span class="noprint" data-dcnode-id="3905" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3909" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Pfarrkirche_St._Peter_und_Paul_%28G%25C3%25B6rlitz%29" title="de:Pfarrkirche St. Peter und Paul (Görlitz)"><span data-dcnode-id="3908" instrument_node="">de</span></a><span data-dcnode-id="3906" instrument_node="">]</span></span><span data-dcnode-id="3904" instrument_node=""> both have 16th-century clocks which indicate the lunar phase.</span></li><span data-dcnode-id="3902" instrument_node="">
</span><li data-dcnode-id="3892"><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich" title="Munich"><span data-dcnode-id="3901" instrument_node="">Munich</span></a><span data-dcnode-id="3899" instrument_node="">. The </span><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Town_Hall%2C_Munich" title="Old Town Hall, Munich"><span data-dcnode-id="3898" instrument_node="">Old Town Hall</span></a><span data-dcnode-id="3896" instrument_node=""> and the </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deutsches_Museum" title="Deutsches Museum"><span data-dcnode-id="3895" instrument_node="">Deutsches Museum</span></a><span data-dcnode-id="3893" instrument_node=""> both have clocks which indicate the moon phase on a rotating ball, and the zodiac on a fixed ring within a 12-hour dial.</span></li><span data-dcnode-id="3891" instrument_node="">
</span><li data-dcnode-id="3883"><a data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schramberg" title="Schramberg"><span data-dcnode-id="3890" instrument_node="">Schramberg</span></a><span data-dcnode-id="3888" instrument_node="">. The Town Hall has an astronomical clock installed in 1913.</span><sup class="reference" data-dcnode-id="3885" id="cite_ref-30"><a data-dcnode-id="3886" href="#cite_note-30"><span data-dcnode-id="3887" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3884" instrument_node=""> Its indications are similar to the clock of Ulm (except that the outer hour ring is 24-hour), with an offset astrolabe ring repeated as a golden zodiac ring.</span></li><span data-dcnode-id="3882" instrument_node="">
</span><li data-dcnode-id="3870"><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stuttgart" title="Stuttgart"><span data-dcnode-id="3881" instrument_node="">Stuttgart</span></a><span data-dcnode-id="3879" instrument_node="">. A modern clock in the tower of </span><a class="new" data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DStuttgart_Town_Hall%26action%3Dedit%26redlink%3D1" title="Stuttgart Town Hall (page does not exist)"><span data-dcnode-id="3878" instrument_node="">Stuttgart Town Hall</span></a><span class="noprint" data-dcnode-id="3872" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3876" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_Stuttgart" title="de:Rathaus Stuttgart"><span data-dcnode-id="3875" instrument_node="">de</span></a><span data-dcnode-id="3873" instrument_node="">]</span></span><span data-dcnode-id="3871" instrument_node=""> shows the moon phase and the day of the week.</span></li><span data-dcnode-id="3869" instrument_node="">
</span><li data-dcnode-id="3857"><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worms%2C_Germany" title="Worms, Germany"><span data-dcnode-id="3868" instrument_node="">Worms</span></a><span data-dcnode-id="3866" instrument_node="">. The clock tower </span><a class="new" data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DWorms_Town_Hall%26action%3Dedit%26redlink%3D1" title="Worms Town Hall (page does not exist)"><span data-dcnode-id="3865" instrument_node="">Worms Town Hall</span></a><span class="noprint" data-dcnode-id="3859" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3863" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Rathaus_%28Worms%29" title="de:Rathaus (Worms)"><span data-dcnode-id="3862" instrument_node="">de</span></a><span data-dcnode-id="3860" instrument_node="">]</span></span><span data-dcnode-id="3858" instrument_node=""> has a modern calendar dial that shows the month, the positions of the sun and moon in the zodiac, the moon phase, and has a dragon hand.</span></li></ul><span data-dcnode-id="3855" instrument_node="">
