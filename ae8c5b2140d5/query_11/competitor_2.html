</span><link data-dcnode-id="3712" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="3708" role="note"><span data-dcnode-id="3711" instrument_node="">See also: </span><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_Italy" title="Category:Astronomical clocks in Italy"><span data-dcnode-id="3710" instrument_node="">Category:Astronomical clocks in Italy</span></a></div><span data-dcnode-id="3707" instrument_node="">
</span><ul data-dcnode-id="3546"><li data-dcnode-id="3692"><a data-dcnode-id="3705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arezzo" title="Arezzo"><span data-dcnode-id="3706" instrument_node="">Arezzo</span></a><span data-dcnode-id="3704" instrument_node="">. The clock of the </span><a class="new" data-dcnode-id="3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPalazzo_della_Fraternita_dei_Laici%26action%3Dedit%26redlink%3D1" title="Palazzo della Fraternita dei Laici (page does not exist)"><span data-dcnode-id="3703" instrument_node="">Palazzo della Fraternita dei Laici</span></a><span class="noprint" data-dcnode-id="3697" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3701" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/Palazzo_della_Fraternita_dei_Laici" title="it:Palazzo della Fraternita dei Laici"><span data-dcnode-id="3700" instrument_node="">it</span></a><span data-dcnode-id="3698" instrument_node="">]</span></span><span data-dcnode-id="3696" instrument_node="">, installed in 1552, shows the moon phase and age.</span><sup class="reference" data-dcnode-id="3693" id="cite_ref-32"><a data-dcnode-id="3694" href="#cite_note-32"><span data-dcnode-id="3695" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="3691" instrument_node="">
</span><li data-dcnode-id="3684"><a data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bassano_del_Grappa" title="Bassano del Grappa"><span data-dcnode-id="3690" instrument_node="">Bassano del Grappa</span></a><span data-dcnode-id="3688" instrument_node="">. 24-hour dial with zodiac indication on the Palazzo del Municipio, first installed in 1430, reconstructed by Bartolomeo Ferracina in 1747.</span><sup class="reference" data-dcnode-id="3685" id="cite_ref-33"><a data-dcnode-id="3686" href="#cite_note-33"><span data-dcnode-id="3687" instrument_node="">[33]</span></a></sup></li><span data-dcnode-id="3683" instrument_node="">
</span><li data-dcnode-id="3665"><a data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brescia" title="Brescia"><span data-dcnode-id="3682" instrument_node="">Brescia</span></a><span data-dcnode-id="3680" instrument_node="">. Astronomical clock dated </span><abbr data-dcnode-id="3678" title="circa"><span data-dcnode-id="3679" instrument_node="">c.</span></abbr><span data-dcnode-id="3676" style="white-space:nowrap;"><span data-dcnode-id="3677" instrument_node=""> 1540–1550</span></span><span data-dcnode-id="3675" instrument_node=""> in the </span><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torre_dell%2527Orologio%2C_Brescia" title="Torre dell'Orologio, Brescia"><span data-dcnode-id="3674" instrument_node="">Torre dell'Orologio</span></a><span data-dcnode-id="3672" instrument_node="">.</span><sup class="reference" data-dcnode-id="3669" id="cite_ref-34"><a data-dcnode-id="3670" href="#cite_note-34"><span data-dcnode-id="3671" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3666" id="cite_ref-35"><a data-dcnode-id="3667" href="#cite_note-35"><span data-dcnode-id="3668" instrument_node="">[35]</span></a></sup></li><span data-dcnode-id="3664" instrument_node="">
</span><li data-dcnode-id="3649"><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clusone" title="Clusone"><span data-dcnode-id="3663" instrument_node="">Clusone</span></a><span data-dcnode-id="3661" instrument_node="">. </span><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fanzago%2527s_astronomical_clock" title="Fanzago's astronomical clock"><span data-dcnode-id="3660" instrument_node="">Fanzago's astronomical clock</span></a><span data-dcnode-id="3658" instrument_node=""> at the </span><a class="new" data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPalazzo_Comunale%2C_Clusone%26action%3Dedit%26redlink%3D1" title="Palazzo Comunale, Clusone (page does not exist)"><span data-dcnode-id="3657" instrument_node="">Palazzo Comunale</span></a><span class="noprint" data-dcnode-id="3651" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3655" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/Palazzo_comunale_%28Clusone%29" title="it:Palazzo comunale (Clusone)"><span data-dcnode-id="3654" instrument_node="">it</span></a><span data-dcnode-id="3652" instrument_node="">]</span></span><span data-dcnode-id="3650" instrument_node="">, built by Pietro Fanzago in 1583.</span></li><span data-dcnode-id="3648" instrument_node="">
</span><li data-dcnode-id="3638"><a data-dcnode-id="3646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cremona" title="Cremona"><span data-dcnode-id="3647" instrument_node="">Cremona</span></a><span data-dcnode-id="3645" instrument_node="">. The 16th-century astronomical clock of the </span><a data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torrazzo_of_Cremona" title="Torrazzo of Cremona"><span data-dcnode-id="3644" instrument_node="">Torrazzo</span></a><span data-dcnode-id="3642" instrument_node="">, the bell tower of </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cremona_Cathedral" title="Cremona Cathedral"><span data-dcnode-id="3641" instrument_node="">Cremona Cathedral</span></a><span data-dcnode-id="3639" instrument_node="">, is the largest medieval clock in Europe.</span></li><span data-dcnode-id="3637" instrument_node="">
</span><li data-dcnode-id="3625"><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macerata" title="Macerata"><span data-dcnode-id="3636" instrument_node="">Macerata</span></a><span data-dcnode-id="3634" instrument_node="">. An astronomical clock installed in the </span><a class="new" data-dcnode-id="3632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTorre_Civica%2C_Macerata%26action%3Dedit%26redlink%3D1" title="Torre Civica, Macerata (page does not exist)"><span data-dcnode-id="3633" instrument_node="">Torre Civica</span></a><span class="noprint" data-dcnode-id="3627" style="font-size:85%; font-style: normal;"><span data-dcnode-id="3631" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="3629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//it.wikipedia.org/wiki/Torre_civica_%28Macerata%29" title="it:Torre civica (Macerata)"><span data-dcnode-id="3630" instrument_node="">it</span></a><span data-dcnode-id="3628" instrument_node="">]</span></span><span data-dcnode-id="3626" instrument_node="">, a modern replica of the original clock of 1571, which shows the orbits of the planets.</span></li><span data-dcnode-id="3624" instrument_node="">
</span><li data-dcnode-id="3617"><a data-dcnode-id="3622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mantua" title="Mantua"><span data-dcnode-id="3623" instrument_node="">Mantua</span></a><span data-dcnode-id="3621" instrument_node="">. Astronomical clock was installed in 1473 in the </span><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torre_dell%2527Orologio%2C_Mantua" title="Torre dell'Orologio, Mantua"><span data-dcnode-id="3620" instrument_node="">Torre dell'Orologio</span></a><span data-dcnode-id="3618" instrument_node=""> of the Palazzo della Ragione.</span></li><span data-dcnode-id="3616" instrument_node="">
</span><li data-dcnode-id="3605"><a data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merano" title="Merano"><span data-dcnode-id="3615" instrument_node="">Merano</span></a><span data-dcnode-id="3613" instrument_node="">. Clock tower at the entrance to </span><a class="extiw" data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Friedh%25C3%25B6fe_in_Meran" title="de:Friedhöfe in Meran"><span data-dcnode-id="3612" instrument_node="">Merano town cemetery</span></a><span data-dcnode-id="3610" instrument_node="">, installed in 1908 by Philipp Hörz of Ulm,</span><sup class="reference" data-dcnode-id="3607" id="cite_ref-36"><a data-dcnode-id="3608" href="#cite_note-36"><span data-dcnode-id="3609" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3606" instrument_node=""> with a calendar dial showing the month, zodiac, and moon phase.</span></li><span data-dcnode-id="3604" instrument_node="">
</span><li data-dcnode-id="3594"><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messina" title="Messina"><span data-dcnode-id="3603" instrument_node="">Messina</span></a><span data-dcnode-id="3601" instrument_node="">. The </span><a data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messina_astronomical_clock" title="Messina astronomical clock"><span data-dcnode-id="3600" instrument_node="">Messina astronomical clock</span></a><span data-dcnode-id="3598" instrument_node=""> in the tower of </span><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messina_Cathedral" title="Messina Cathedral"><span data-dcnode-id="3597" instrument_node="">Messina Cathedral</span></a><span data-dcnode-id="3595" instrument_node="">. Multi-dial clock equipped with complex automata. Constructed between 1930 and 1933 by the Ungerer Company of Strasbourg. It is one of the largest astronomical clocks in the world.</span></li><span data-dcnode-id="3593" instrument_node="">
</span><li data-dcnode-id="3586"><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Padua" title="Padua"><span data-dcnode-id="3592" instrument_node="">Padua</span></a><span data-dcnode-id="3590" instrument_node="">. 15th-century astronomical clock in the </span><a data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torre_dell%2527Orologio%2C_Padua" title="Torre dell'Orologio, Padua"><span data-dcnode-id="3589" instrument_node="">Torre dell'Orologio</span></a><span data-dcnode-id="3587" instrument_node="">.</span></li><span data-dcnode-id="3585" instrument_node="">
</span><li data-dcnode-id="3577"><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rimini" title="Rimini"><span data-dcnode-id="3584" instrument_node="">Rimini</span></a><span data-dcnode-id="3582" instrument_node="">. The clock tower on Piazza Tre Martiri has a calendar dial installed in 1750</span><sup class="reference" data-dcnode-id="3579" id="cite_ref-37"><a data-dcnode-id="3580" href="#cite_note-37"><span data-dcnode-id="3581" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3578" instrument_node=""> showing the date, zodiac, and moon phase and age.</span></li><span data-dcnode-id="3576" instrument_node="">
</span><li data-dcnode-id="3569"><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soncino%2C_Lombardy" title="Soncino, Lombardy"><span data-dcnode-id="3575" instrument_node="">Soncino</span></a><span data-dcnode-id="3573" instrument_node="">. 24-hour dial with zodiac indication in the town hall. The terracotta zodiac dial dates from 1977.</span><sup class="reference" data-dcnode-id="3570" id="cite_ref-38"><a data-dcnode-id="3571" href="#cite_note-38"><span data-dcnode-id="3572" instrument_node="">[38]</span></a></sup></li><span data-dcnode-id="3568" instrument_node="">
</span><li data-dcnode-id="3561"><a data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trapani" title="Trapani"><span data-dcnode-id="3567" instrument_node="">Trapani</span></a><span data-dcnode-id="3565" instrument_node="">. Astronomical clock of 1596 in the Porta Oscura, with a dial for the hours and the zodiac, and a lunar dial.</span><sup class="reference" data-dcnode-id="3562" id="cite_ref-39"><a data-dcnode-id="3563" href="#cite_note-39"><span data-dcnode-id="3564" instrument_node="">[39]</span></a></sup></li><span data-dcnode-id="3560" instrument_node="">
</span><li data-dcnode-id="3547"><a data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice" title="Venice"><span data-dcnode-id="3559" instrument_node="">Venice</span></a><span data-dcnode-id="3557" instrument_node="">. </span><a data-dcnode-id="3555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Mark%2527s_Clock" title="St Mark's Clock"><span data-dcnode-id="3556" instrument_node="">St Mark's Clock</span></a><span data-dcnode-id="3554" instrument_node="">, in the </span><a data-dcnode-id="3552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Mark%2527s_Clocktower" title="St Mark's Clocktower"><span data-dcnode-id="3553" instrument_node="">clocktower</span></a><span data-dcnode-id="3551" instrument_node=""> on </span><a class="mw-redirect" data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Mark%2527s_Square_%28Venice%29" title="St Mark's Square (Venice)"><span data-dcnode-id="3550" instrument_node="">St Mark's Square</span></a><span data-dcnode-id="3548" instrument_node="">, was built and installed by Gian Paulo and Gian Carlo Rainieri, father and son, between 1496 and 1499.</span></li></ul><span data-dcnode-id="3545" instrument_node="">

</span><ul data-dcnode-id="3139"><li data-dcnode-id="3140"><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star%25C3%25A1_Bystrica" title="Stará Bystrica"><span data-dcnode-id="3158" instrument_node="">Stará Bystrica</span></a><span data-dcnode-id="3156" instrument_node="">: An astronomical clock in the stylized shape of </span><a data-dcnode-id="3154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Our_Lady_of_Sorrows" title="Our Lady of Sorrows"><span data-dcnode-id="3155" instrument_node="">Our Lady of Sorrows</span></a><span data-dcnode-id="3153" instrument_node=""> was built in the town square in 2009. The astronomical part of the clock consists of an </span><a data-dcnode-id="3151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrolabe" title="Astrolabe"><span data-dcnode-id="3152" instrument_node="">astrolabe</span></a><span data-dcnode-id="3150" instrument_node=""> displaying the astrological signs, positions of the Sun and Moon, and the lunar phases. Its statues and automata depict Slovakian historical and religious figures. The clock is controlled by computer using </span><a data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DCF77" title="DCF77"><span data-dcnode-id="3149" instrument_node="">DCF77</span></a><span data-dcnode-id="3147" instrument_node=""> signals.</span><sup class="reference" data-dcnode-id="3144" id="cite_ref-Slovak_clock_41-0"><a data-dcnode-id="3145" href="#cite_note-Slovak_clock-41"><span data-dcnode-id="3146" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="3141" id="cite_ref-42"><a data-dcnode-id="3142" href="#cite_note-42"><span data-dcnode-id="3143" instrument_node="">[42]</span></a></sup></li></ul><span data-dcnode-id="3138" instrument_node="">

</span><ul data-dcnode-id="3098"><li data-dcnode-id="3099"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astorga%2C_Spain" title="Astorga, Spain"><span data-dcnode-id="3108" instrument_node="">Astorga</span></a><span data-dcnode-id="3106" instrument_node="">: The interior face of the clock of </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astorga_Cathedral" title="Astorga Cathedral"><span data-dcnode-id="3105" instrument_node="">Astorga Cathedral</span></a><span data-dcnode-id="3103" instrument_node=""> has a 24-hour dial which shows the lunar phase and the date.</span><sup class="reference" data-dcnode-id="3100" id="cite_ref-43"><a data-dcnode-id="3101" href="#cite_note-43"><span data-dcnode-id="3102" instrument_node="">[43]</span></a></sup></li></ul><span data-dcnode-id="3097" instrument_node="">
</span><h3 data-dcnode-id="3087"><span class="mw-headline" data-dcnode-id="3095" id="Sweden"><span data-dcnode-id="3096" instrument_node="">Sweden</span></span><span class="mw-editsection" data-dcnode-id="3088"><span class="mw-editsection-bracket" data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">[</span></span><a data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D36" title="Edit section: Sweden"><span data-dcnode-id="3092" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3086" instrument_node="">
</span><ul data-dcnode-id="3044"><li data-dcnode-id="3066"><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lund" title="Lund"><span data-dcnode-id="3085" instrument_node="">Lund</span></a><span data-dcnode-id="3083" instrument_node="">: </span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lund_astronomical_clock" title="Lund astronomical clock"><span data-dcnode-id="3082" instrument_node="">Lund astronomical clock</span></a><span data-dcnode-id="3080" instrument_node=""> in </span><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lund_Cathedral" title="Lund Cathedral"><span data-dcnode-id="3079" instrument_node="">Lund Cathedral</span></a><span data-dcnode-id="3077" instrument_node=""> in Sweden, (</span><i data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Horologium mirabile Lundense</span></i><span data-dcnode-id="3074" instrument_node="">) was made around 1425, probably by the clockmaker Nicolaus Lilienveld in Rostock. After it had been in storage since 1837, it was restored and put back in place in 1923. Only the upper, astronomical part is original, while some of the other remaining medieval parts can be seen at the Cathedral museum. When it plays, one can hear </span><i data-dcnode-id="3071"><a class="mw-redirect" data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_Dulci_Jubilo" title="In Dulci Jubilo"><span data-dcnode-id="3073" instrument_node="">In Dulci Jubilo</span></a></i><span data-dcnode-id="3070" instrument_node=""> from the smallest organ in the church, while seven wooden figures, representing the three </span><a data-dcnode-id="3068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magi" title="Magi"><span data-dcnode-id="3069" instrument_node="">magi</span></a><span data-dcnode-id="3067" instrument_node=""> and their servants, pass by.</span></li><span data-dcnode-id="3065" instrument_node="">

</span><li data-dcnode-id="3045"><a data-dcnode-id="3050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rinkaby" title="Rinkaby"><span data-dcnode-id="3051" instrument_node="">Rinkaby</span></a><span data-dcnode-id="3049" instrument_node="">: An astronomical clock was installed in </span><a data-dcnode-id="3047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rinkaby_Church" title="Rinkaby Church"><span data-dcnode-id="3048" instrument_node="">Rinkaby Church</span></a><span data-dcnode-id="3046" instrument_node=""> in the 1950s. Modelled on medieval clocks, it was made by a local electrician.</span></li></ul><span data-dcnode-id="3043" instrument_node="">

</span><link data-dcnode-id="2994" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="2990" role="note"><span data-dcnode-id="2993" instrument_node="">See also: </span><a data-dcnode-id="2991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_Switzerland" title="Category:Astronomical clocks in Switzerland"><span data-dcnode-id="2992" instrument_node="">Category:Astronomical clocks in Switzerland</span></a></div><span data-dcnode-id="2989" instrument_node="">
</span><ul data-dcnode-id="2877"><li data-dcnode-id="2982"><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bern" title="Bern"><span data-dcnode-id="2988" instrument_node="">Bern</span></a><span data-dcnode-id="2986" instrument_node="">. The </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zytglogge" title="Zytglogge"><span data-dcnode-id="2985" instrument_node="">Zytglogge</span></a><span data-dcnode-id="2983" instrument_node=""> is a famous 15-century astronomical clock housed in a medieval fortification tower.</span></li><span data-dcnode-id="2981" instrument_node="">
</span><li data-dcnode-id="2929"><span data-dcnode-id="2980" instrument_node="">A set of 16th-century clocks which show the zodiac and the days of the week in concentric rings within a 12-hour clock face, with a moon phase ball above:
</span><ul data-dcnode-id="2930"><li data-dcnode-id="2968"><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bremgarten%2C_Aargau" title="Bremgarten, Aargau"><span data-dcnode-id="2979" instrument_node="">Bremgarten</span></a><span data-dcnode-id="2977" instrument_node="">. The clock of the </span><a class="new" data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSpittelturm%2C_Bremgarten%26action%3Dedit%26redlink%3D1" title="Spittelturm, Bremgarten (page does not exist)"><span data-dcnode-id="2976" instrument_node="">Spittelturm</span></a><span class="noprint" data-dcnode-id="2970" style="font-size:85%; font-style: normal;"><span data-dcnode-id="2974" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Spittelturm_%28Bremgarten%29" title="de:Spittelturm (Bremgarten)"><span data-dcnode-id="2973" instrument_node="">de</span></a><span data-dcnode-id="2971" instrument_node="">]</span></span><span data-dcnode-id="2969" instrument_node="">, installed in 1558.</span></li><span data-dcnode-id="2967" instrument_node="">
</span><li data-dcnode-id="2963"><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diessenhofen" title="Diessenhofen"><span data-dcnode-id="2966" instrument_node="">Diessenhofen</span></a><span data-dcnode-id="2964" instrument_node="">. The clock of the Siegelturm, installed in 1546.</span></li><span data-dcnode-id="2962" instrument_node="">
</span><li data-dcnode-id="2950"><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mellingen" title="Mellingen"><span data-dcnode-id="2961" instrument_node="">Mellingen</span></a><span data-dcnode-id="2959" instrument_node="">. The clock of the </span><a class="new" data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DZeitturm%2C_Mellingen%26action%3Dedit%26redlink%3D1" title="Zeitturm, Mellingen (page does not exist)"><span data-dcnode-id="2958" instrument_node="">Zeitturm</span></a><span class="noprint" data-dcnode-id="2952" style="font-size:85%; font-style: normal;"><span data-dcnode-id="2956" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Zeitturm_%28Mellingen%29" title="de:Zeitturm (Mellingen)"><span data-dcnode-id="2955" instrument_node="">de</span></a><span data-dcnode-id="2953" instrument_node="">]</span></span><span data-dcnode-id="2951" instrument_node="">, installed in 1554.</span></li><span data-dcnode-id="2949" instrument_node="">
</span><li data-dcnode-id="2931"><a data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schaffhausen" title="Schaffhausen"><span data-dcnode-id="2948" instrument_node="">Schaffhausen</span></a><span data-dcnode-id="2946" instrument_node="">: The astronomical clock by </span><a class="new" data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJoachim_Habrecht%26action%3Dedit%26redlink%3D1" title="Joachim Habrecht (page does not exist)"><span data-dcnode-id="2945" instrument_node="">Joachim Habrecht</span></a><span class="noprint" data-dcnode-id="2939" style="font-size:85%; font-style: normal;"><span data-dcnode-id="2943" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Joachim_Habrecht" title="de:Joachim Habrecht"><span data-dcnode-id="2942" instrument_node="">de</span></a><span data-dcnode-id="2940" instrument_node="">]</span></span><span data-dcnode-id="2938" instrument_node=""> in the gable of the Fronwagturm, installed in 1564, has five hands, including indications of the positions of the sun and moon in the zodiac, and a dragon hand indicating the </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_node" title="Lunar node"><span data-dcnode-id="2937" instrument_node="">lunar nodes</span></a><span data-dcnode-id="2935" instrument_node="">.</span><sup class="reference" data-dcnode-id="2932" id="cite_ref-44"><a data-dcnode-id="2933" href="#cite_note-44"><span data-dcnode-id="2934" instrument_node="">[44]</span></a></sup></li></ul></li><span data-dcnode-id="2928" instrument_node="">
</span><li data-dcnode-id="2918"><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sion%2C_Switzerland" title="Sion, Switzerland"><span data-dcnode-id="2927" instrument_node="">Sion</span></a><span data-dcnode-id="2925" instrument_node="">: The </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sion_astronomical_clock" title="Sion astronomical clock"><span data-dcnode-id="2924" instrument_node="">Sion astronomical clock</span></a><span data-dcnode-id="2922" instrument_node=""> on the town hall dates from 1667–68. Its current mechanism was installed in 1902.</span><sup class="reference" data-dcnode-id="2919" id="cite_ref-45"><a data-dcnode-id="2920" href="#cite_note-45"><span data-dcnode-id="2921" instrument_node="">[45]</span></a></sup></li><span data-dcnode-id="2917" instrument_node="">
</span><li data-dcnode-id="2894"><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solothurn" title="Solothurn"><span data-dcnode-id="2916" instrument_node="">Solothurn</span></a><span data-dcnode-id="2914" instrument_node="">. This astronomical clock, installed by </span><a class="new" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLorenz_Liechti%26action%3Dedit%26redlink%3D1" title="Lorenz Liechti (page does not exist)"><span data-dcnode-id="2913" instrument_node="">Lorenz Liechti</span></a><span class="noprint" data-dcnode-id="2907" style="font-size:85%; font-style: normal;"><span data-dcnode-id="2911" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Lorenz_Liechti" title="de:Lorenz Liechti"><span data-dcnode-id="2910" instrument_node="">de</span></a><span data-dcnode-id="2908" instrument_node="">]</span></span><span data-dcnode-id="2906" instrument_node=""> and </span><a class="new" data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DJoachim_Habrecht%26action%3Dedit%26redlink%3D1" title="Joachim Habrecht (page does not exist)"><span data-dcnode-id="2905" instrument_node="">Joachim Habrecht</span></a><span class="noprint" data-dcnode-id="2899" style="font-size:85%; font-style: normal;"><span data-dcnode-id="2903" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//de.wikipedia.org/wiki/Joachim_Habrecht" title="de:Joachim Habrecht"><span data-dcnode-id="2902" instrument_node="">de</span></a><span data-dcnode-id="2900" instrument_node="">]</span></span><span data-dcnode-id="2898" instrument_node=""> in 1545 to replace an original of 1452, shows the positions of the sun and moon in the zodiac.</span><sup class="reference" data-dcnode-id="2895" id="cite_ref-46"><a data-dcnode-id="2896" href="#cite_note-46"><span data-dcnode-id="2897" instrument_node="">[46]</span></a></sup></li><span data-dcnode-id="2893" instrument_node="">
</span><li data-dcnode-id="2886"><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winterthur" title="Winterthur"><span data-dcnode-id="2892" instrument_node="">Winterthur</span></a><span data-dcnode-id="2890" instrument_node="">. This astrolabe astronomical clock was installed in 1529. The building which housed it was demolished in 1870. The clock is now an exhibit at the Museum Lindengut.</span><sup class="reference" data-dcnode-id="2887" id="cite_ref-47"><a data-dcnode-id="2888" href="#cite_note-47"><span data-dcnode-id="2889" instrument_node="">[47]</span></a></sup></li><span data-dcnode-id="2885" instrument_node="">
</span><li data-dcnode-id="2878"><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zug" title="Zug"><span data-dcnode-id="2884" instrument_node="">Zug</span></a><span data-dcnode-id="2882" instrument_node="">: The astronomical clock of the </span><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zytturm%2C_Zug" title="Zytturm, Zug"><span data-dcnode-id="2881" instrument_node="">Zytturm</span></a><span data-dcnode-id="2879" instrument_node=""> was installed in 1574. Its calendar dial shows the zodiac, the lunar phase, the day of the week and the leap year cycle.</span></li></ul><span data-dcnode-id="2876" instrument_node="">

</span><h3 data-dcnode-id="2773"><span class="mw-headline" data-dcnode-id="2781" id="United_Kingdom"><span data-dcnode-id="2782" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="2774"><span class="mw-editsection-bracket" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">[</span></span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D38" title="Edit section: United Kingdom"><span data-dcnode-id="2778" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2772" instrument_node="">
</span><link data-dcnode-id="2771" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable selfref" data-dcnode-id="2767" role="note"><span data-dcnode-id="2770" instrument_node="">See also: </span><a data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AAstronomical_clocks_in_the_United_Kingdom" title="Category:Astronomical clocks in the United Kingdom"><span data-dcnode-id="2769" instrument_node="">Category:Astronomical clocks in the United Kingdom</span></a></div><span data-dcnode-id="2766" instrument_node="">
</span><ul data-dcnode-id="2655"><li data-dcnode-id="2724"><span data-dcnode-id="2765" instrument_node="">A group of four famous astronomical clocks in the </span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Country" title="West Country"><span data-dcnode-id="2764" instrument_node="">West Country</span></a><span data-dcnode-id="2762" instrument_node="">, dating from the 14th and 15th centuries, all of which show the 24-hour time and the moon phase:
</span><ul data-dcnode-id="2725"><li data-dcnode-id="2750"><a data-dcnode-id="2760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exeter" title="Exeter"><span data-dcnode-id="2761" instrument_node="">Exeter</span></a><span data-dcnode-id="2759" instrument_node="">. The </span><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exeter_Cathedral_astronomical_clock" title="Exeter Cathedral astronomical clock"><span data-dcnode-id="2758" instrument_node="">Exeter Cathedral astronomical clock</span></a><span data-dcnode-id="2756" instrument_node=""> (</span><abbr data-dcnode-id="2754" title="circa"><span data-dcnode-id="2755" instrument_node="">c.</span></abbr><span data-dcnode-id="2752" style="white-space:nowrap;"><span data-dcnode-id="2753" instrument_node=""> 1484</span></span><span data-dcnode-id="2751" instrument_node="">)</span></li><span data-dcnode-id="2749" instrument_node="">
</span><li data-dcnode-id="2742"><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottery_St_Mary" title="Ottery St Mary"><span data-dcnode-id="2748" instrument_node="">Ottery St Mary</span></a><span data-dcnode-id="2746" instrument_node="">. The </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottery_St_Mary_astronomical_clock" title="Ottery St Mary astronomical clock"><span data-dcnode-id="2745" instrument_node="">Ottery St Mary astronomical clock</span></a><span data-dcnode-id="2743" instrument_node=""> (15th century)</span></li><span data-dcnode-id="2741" instrument_node="">
</span><li data-dcnode-id="2734"><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wells%2C_Somerset" title="Wells, Somerset"><span data-dcnode-id="2740" instrument_node="">Wells</span></a><span data-dcnode-id="2738" instrument_node="">. The </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wells_Cathedral_clock" title="Wells Cathedral clock"><span data-dcnode-id="2737" instrument_node="">Wells Cathedral clock</span></a><span data-dcnode-id="2735" instrument_node=""> (1386–1392)</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2726"><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wimborne_Minster" title="Wimborne Minster"><span data-dcnode-id="2732" instrument_node="">Wimborne Minster</span></a><span data-dcnode-id="2730" instrument_node="">. The </span><a data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wimborne_Minster_astronomical_clock" title="Wimborne Minster astronomical clock"><span data-dcnode-id="2729" instrument_node="">Wimborne Minster astronomical clock</span></a><span data-dcnode-id="2727" instrument_node=""> (14th century)</span></li></ul></li><span data-dcnode-id="2723" instrument_node="">
</span><li data-dcnode-id="2713"><a data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durham%2C_England" title="Durham, England"><span data-dcnode-id="2722" instrument_node="">Durham</span></a><span data-dcnode-id="2720" instrument_node="">. </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prior_Castell%2527s_Clock" title="Prior Castell's Clock"><span data-dcnode-id="2719" instrument_node="">Prior Castell's Clock</span></a><span data-dcnode-id="2717" instrument_node=""> in </span><a data-dcnode-id="2715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durham_Cathedral" title="Durham Cathedral"><span data-dcnode-id="2716" instrument_node="">Durham Cathedral</span></a><span data-dcnode-id="2714" instrument_node="">, installed between 1494 and 1519.</span></li><span data-dcnode-id="2712" instrument_node="">
</span><li data-dcnode-id="2702"><a data-dcnode-id="2710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampton_Court_Palace" title="Hampton Court Palace"><span data-dcnode-id="2711" instrument_node="">Hampton Court Palace</span></a><span data-dcnode-id="2709" instrument_node="">. The </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hampton_Court_astronomical_clock" title="Hampton Court astronomical clock"><span data-dcnode-id="2708" instrument_node="">Hampton Court astronomical clock</span></a><span data-dcnode-id="2706" instrument_node=""> (1540) is on the interior façade of the Main Gatehouse. It is a fine early example of a pre-</span><a class="mw-redirect" data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copernicus" title="Copernicus"><span data-dcnode-id="2705" instrument_node="">Copernican</span></a><span data-dcnode-id="2703" instrument_node=""> astronomical clock.</span></li><span data-dcnode-id="2701" instrument_node="">
</span><li data-dcnode-id="2694"><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leicester" title="Leicester"><span data-dcnode-id="2700" instrument_node="">Leicester</span></a><span data-dcnode-id="2698" instrument_node="">. The </span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leicester_University_astronomical_clock" title="Leicester University astronomical clock"><span data-dcnode-id="2697" instrument_node="">Leicester University astronomical clock</span></a><span data-dcnode-id="2695" instrument_node=""> (1989) is on the Rattray Lecture Theatre opposite the Physics department.</span></li><span data-dcnode-id="2693" instrument_node="">
</span><li data-dcnode-id="2686"><a data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London" title="London"><span data-dcnode-id="2692" instrument_node="">London</span></a><span data-dcnode-id="2690" instrument_node="">. The astronomical clock of </span><a data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bracken_House%2C_London" title="Bracken House, London"><span data-dcnode-id="2689" instrument_node="">Bracken House</span></a><span data-dcnode-id="2687" instrument_node=""> was installed in 1959.</span></li><span data-dcnode-id="2685" instrument_node="">
</span><li data-dcnode-id="2678"><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snowshill" title="Snowshill"><span data-dcnode-id="2684" instrument_node="">Snowshill</span></a><span data-dcnode-id="2682" instrument_node="">. The Nychthemeron Clock, installed in the garden of </span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snowshill_Manor" title="Snowshill Manor"><span data-dcnode-id="2681" instrument_node="">Snowshill Manor</span></a><span data-dcnode-id="2679" instrument_node="">.</span></li><span data-dcnode-id="2677" instrument_node="">
</span><li data-dcnode-id="2667"><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Albans" title="St Albans"><span data-dcnode-id="2676" instrument_node="">St Albans</span></a><span data-dcnode-id="2674" instrument_node="">. A modern clock dating from 1995, built from notes by Richard of Wallingford held in the </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bodleian_Library" title="Bodleian Library"><span data-dcnode-id="2673" instrument_node="">Bodleian Library</span></a><span data-dcnode-id="2671" instrument_node="">, Oxford. On display in </span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Albans_Cathedral" title="St Albans Cathedral"><span data-dcnode-id="2670" instrument_node="">St Albans Cathedral</span></a><span data-dcnode-id="2668" instrument_node="">.</span></li><span data-dcnode-id="2666" instrument_node="">
</span><li data-dcnode-id="2656"><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/York" title="York"><span data-dcnode-id="2665" instrument_node="">York</span></a><span data-dcnode-id="2663" instrument_node="">. The </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/York_Minster_astronomical_clock" title="York Minster astronomical clock"><span data-dcnode-id="2662" instrument_node="">York Minster astronomical clock</span></a><span data-dcnode-id="2660" instrument_node="">, an astronomical clock installed in 1955 as a memorial to airmen killed in </span><a data-dcnode-id="2658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="2659" instrument_node="">World War II</span></a><span data-dcnode-id="2657" instrument_node="">, shows the positions of the sun and stars from the perspective of a pilot flying over York. It was damaged by fire in 1984, and is not currently working.</span></li></ul><span data-dcnode-id="2654" instrument_node="">
