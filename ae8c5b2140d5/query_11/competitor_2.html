index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Dondi_dell%2527Orologio" title="Giovanni Dondi dell'Orologio"><span data-dcnode-id="5738" instrument_node="">Giovanni Dondi dell'Orologio</span></a><span data-dcnode-id="5736" instrument_node=""> showed hour, year calendar, movement of the planets, Sun and Moon. Reconstruction, </span><a class="mw-redirect" data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Museo_della_Scienza_e_della_Tecnologia_%2522Leonardo_da_Vinci%2522" title="Museo della Scienza e della Tecnologia &quot;Leonardo da Vinci&quot;"><span data-dcnode-id="5735" instrument_node="">Museo nazionale della scienza e della tecnologia Leonardo da Vinci</span></a><span data-dcnode-id="5733" instrument_node="">, Milan.</span></div></div></div><span data-dcnode-id="5729" instrument_node="">
</span><p data-dcnode-id="5712"><span data-dcnode-id="5728" instrument_node="">The term is loosely used to refer to any clock that shows, in addition to the time of day, astronomical information. This could include the location of the Sun and Moon in the sky, the age and </span><a class="mw-redirect" data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_phases" title="Lunar phases"><span data-dcnode-id="5727" instrument_node="">Lunar phases</span></a><span data-dcnode-id="5725" instrument_node="">, the position of the Sun on the ecliptic and the current zodiac sign, the </span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidereal_time" title="Sidereal time"><span data-dcnode-id="5724" instrument_node="">sidereal time</span></a><span data-dcnode-id="5722" instrument_node="">, and other astronomical data such as the Moon's nodes (for indicating </span><a class="mw-redirect" data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eclipses" title="Eclipses"><span data-dcnode-id="5721" instrument_node="">eclipses</span></a><span data-dcnode-id="5719" instrument_node="">) or a rotating star map. The term should not be confused with </span><i data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">astronomical regulator</span></i><span data-dcnode-id="5716" instrument_node="">, a high precision but otherwise ordinary </span><a data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pendulum_clock" title="Pendulum clock"><span data-dcnode-id="5715" instrument_node="">pendulum clock</span></a><span data-dcnode-id="5713" instrument_node=""> used in observatories.
</span></p><p data-dcnode-id="5695"><span data-dcnode-id="5711" instrument_node="">Astronomical clocks usually represent the </span><a data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="5710" instrument_node="">Solar System</span></a><span data-dcnode-id="5708" instrument_node=""> using the </span><a class="mw-redirect" data-dcnode-id="5706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geocentric" title="Geocentric"><span data-dcnode-id="5707" instrument_node="">geocentric</span></a><span data-dcnode-id="5705" instrument_node=""> model. The center of the dial is often marked with a disc or sphere representing the Earth, located at the center of the Solar System. The Sun is often represented by a golden sphere (as it initially appeared in the </span><a data-dcnode-id="5703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antikythera_mechanism" title="Antikythera mechanism"><span data-dcnode-id="5704" instrument_node="">Antikythera mechanism</span></a><span data-dcnode-id="5702" instrument_node="">, back in the 2nd century BC), shown rotating around the Earth once a day around a </span><a data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/24-hour_analog_dial" title="24-hour analog dial"><span data-dcnode-id="5701" instrument_node="">24-hour analog dial</span></a><span data-dcnode-id="5699" instrument_node="">. This view accorded both with the daily experience and with the philosophical world view of pre-</span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copernican_Revolution" title="Copernican Revolution"><span data-dcnode-id="5698" instrument_node="">Copernican</span></a><span data-dcnode-id="5696" instrument_node=""> Europe.
</span></p><span data-dcnode-id="5694" instrument_node="">
</span><h2 data-dcnode-id="5684"><span class="mw-headline" data-dcnode-id="5692" id="History"><span data-dcnode-id="5693" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="5685"><span class="mw-editsection-bracket" data-dcnode-id="5690"><span data-dcnode-id="5691" instrument_node="">[</span></span><a data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D2" title="Edit section: History"><span data-dcnode-id="5689" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5683" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5677" role="note"><span data-dcnode-id="5680" instrument_node="">Main article: </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_timekeeping_devices" title="History of timekeeping devices"><span data-dcnode-id="5679" instrument_node="">History of timekeeping devices</span></a></div><span data-dcnode-id="5676" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5661"><div class="thumbinner" data-dcnode-id="5662" style="width:292px;"><a class="image" data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg"><img alt="" class="thumbimage" data-dcnode-id="5675" data-file-height="807" data-file-width="747" decoding="async" height="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%252C_Horloge_de_Sapience_1470-1480.jpg/290px-Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%252C_Horloge_de_Sapience_1470-1480.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg/435px-Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg/580px-Louis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg 2x" width="290"></a><span data-dcnode-id="5673" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5663"><div class="magnify" data-dcnode-id="5671"><a class="internal" data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALouis_de_Bruges_in_front_of_an_astronomical_clock_Henri_Suso%2C_Horloge_de_Sapience_1470-1480.jpg" title="Enlarge"></a></div><span data-dcnode-id="5670" instrument_node="">The courtier and bibliophile </span><a data-dcnode-id="5668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_de_Gruuthuse" title="Louis de Gruuthuse"><span data-dcnode-id="5669" instrument_node="">Louis de Gruuthuse</span></a><span data-dcnode-id="5667" instrument_node=""> in front of an astronomical clock. Henri Suso, </span><i data-dcnode-id="5665"><span data-dcnode-id="5666" instrument_node="">Horloge de Sapience</span></i><span data-dcnode-id="5664" instrument_node="">, 1470-1480</span></div></div></div><span data-dcnode-id="5660" instrument_node="">
</span><p data-dcnode-id="5654"><span data-dcnode-id="5659" instrument_node="">Research in 2011 and 2012 led an expert group of researchers to posit that European astronomical clocks are descended from the technology of the Antikythera mechanism.</span><sup class="reference" data-dcnode-id="5656" id="cite_ref-1"><a data-dcnode-id="5657" href="#cite_note-1"><span data-dcnode-id="5658" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5655" instrument_node="">
</span></p><p data-dcnode-id="5595"><span data-dcnode-id="5653" instrument_node="">In the 11th century, the </span><a data-dcnode-id="5651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Song_dynasty" title="Song dynasty"><span data-dcnode-id="5652" instrument_node="">Song dynasty</span></a><span data-dcnode-id="5650" instrument_node=""> Chinese horologist, mechanical engineer, and astronomer </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Su_Song" title="Su Song"><span data-dcnode-id="5649" instrument_node="">Su Song</span></a><span data-dcnode-id="5647" instrument_node=""> created a </span><a data-dcnode-id="5645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_clock" title="Water clock"><span data-dcnode-id="5646" instrument_node="">water-driven astronomical clock</span></a><span data-dcnode-id="5644" instrument_node=""> for his clock-tower of </span><a data-dcnode-id="5642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kaifeng" title="Kaifeng"><span data-dcnode-id="5643" instrument_node="">Kaifeng</span></a><span data-dcnode-id="5641" instrument_node=""> City. Su Song is noted for having incorporated an </span><a data-dcnode-id="5639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escapement" title="Escapement"><span data-dcnode-id="5640" instrument_node="">escapement</span></a><span data-dcnode-id="5638" instrument_node=""> mechanism and the earliest known endless power-transmitting </span><a data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chain_drive" title="Chain drive"><span data-dcnode-id="5637" instrument_node="">chain drive</span></a><span data-dcnode-id="5635" instrument_node=""> for his clock-tower and </span><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armillary_sphere" title="Armillary sphere"><span data-dcnode-id="5634" instrument_node="">armillary sphere</span></a><span data-dcnode-id="5632" instrument_node=""> to function. Contemporary </span><a class="mw-redirect" data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_astronomy" title="Islamic astronomy"><span data-dcnode-id="5631" instrument_node="">Muslim astronomers</span></a><span data-dcnode-id="5629" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_inventions" title="Muslim inventions"><span data-dcnode-id="5628" instrument_node="">engineers</span></a><span data-dcnode-id="5626" instrument_node=""> also constructed a variety of highly accurate astronomical clocks for use in their </span><a data-dcnode-id="5624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observatory" title="Observatory"><span data-dcnode-id="5625" instrument_node="">observatories</span></a><span data-dcnode-id="5623" instrument_node="">,</span><sup class="reference" data-dcnode-id="5620" id="cite_ref-2"><a data-dcnode-id="5621" href="#cite_note-2"><span data-dcnode-id="5622" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="5617" id="cite_ref-3"><a data-dcnode-id="5618" href="#cite_note-3"><span data-dcnode-id="5619" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5616" instrument_node=""> such as the </span><a class="mw-redirect" data-dcnode-id="5614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castle_clock" title="Castle clock"><span data-dcnode-id="5615" instrument_node="">castle clock</span></a><span data-dcnode-id="5613" instrument_node=""> (a water-powered astronomical clock) by </span><a class="mw-redirect" data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Jazari" title="Al-Jazari"><span data-dcnode-id="5612" instrument_node="">Al-Jazari</span></a><span data-dcnode-id="5610" instrument_node=""> in 1206,</span><sup class="reference" data-dcnode-id="5607" id="cite_ref-4"><a data-dcnode-id="5608" href="#cite_note-4"><span data-dcnode-id="5609" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5606" instrument_node=""> and the </span><a data-dcnode-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrolabe" title="Astrolabe"><span data-dcnode-id="5605" instrument_node="">astrolabic</span></a><span data-dcnode-id="5603" instrument_node=""> clock by </span><a data-dcnode-id="5601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_al-Shatir" title="Ibn al-Shatir"><span data-dcnode-id="5602" instrument_node="">Ibn al-Shatir</span></a><span data-dcnode-id="5600" instrument_node=""> in the early 14th century.</span><sup class="reference" data-dcnode-id="5597" id="cite_ref-5"><a data-dcnode-id="5598" href="#cite_note-5"><span data-dcnode-id="5599" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5596" instrument_node="">
</span></p><p data-dcnode-id="5578"><span data-dcnode-id="5594" instrument_node="">
The early development of mechanical clocks in Europe is not fully understood, but there is general agreement that by 1300–1330 there existed mechanical clocks (powered by weights rather than by water and using an </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escapement" title="Escapement"><span data-dcnode-id="5593" instrument_node="">escapement</span></a><span data-dcnode-id="5591" instrument_node="">) which were intended for two main purposes: for signalling and notification (e.g. the timing of services and public events), and for modelling the solar system. The latter is an inevitable development because the </span><a data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrolabe" title="Astrolabe"><span data-dcnode-id="5590" instrument_node="">astrolabe</span></a><span data-dcnode-id="5588" instrument_node=""> was used both by astronomers and astrologers, and it was natural to apply a clockwork drive to the rotating plate to produce a working model of the solar system. American historian </span><a data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lynn_Townsend_White_Jr." title="Lynn Townsend White Jr."><span data-dcnode-id="5587" instrument_node="">Lynn White Jr.</span></a><span data-dcnode-id="5585" instrument_node=""> of Princeton University wrote:</span><sup class="reference" data-dcnode-id="5582" id="cite_ref-6"><a data-dcnode-id="5583" href="#cite_note-6"><span data-dcnode-id="5584" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5581" instrument_node=""> </span></p><blockquote class="templatequote" data-dcnode-id="5575"><p data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">Most of the first clocks were not so many chronometers as exhibitions of the pattern of the cosmos … Clearly, the origins of the mechanical clock lie in a complex realm of monumental planetaria, equatoria, and geared astrolabes.</span></p></blockquote><span data-dcnode-id="5574" instrument_node="">
</span><p data-dcnode-id="5539"><span data-dcnode-id="5573" instrument_node="">The astronomical clocks developed by the English mathematician and cleric </span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_of_Wallingford" title="Richard of Wallingford"><span data-dcnode-id="5572" instrument_node="">Richard of Wallingford</span></a><span data-dcnode-id="5570" instrument_node=""> in </span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/St_Albans" title="St Albans"><span data-dcnode-id="5569" instrument_node="">St Albans</span></a><span data-dcnode-id="5567" instrument_node=""> during the 1330s,</span><sup class="reference" data-dcnode-id="5564" id="cite_ref-7"><a data-dcnode-id="5565" href="#cite_note-7"><span data-dcnode-id="5566" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5563" instrument_node=""> and by medieval Italian physician and astronomer </span><a class="mw-redirect" data-dcnode-id="5561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_de_Dondi" title="Giovanni de Dondi"><span data-dcnode-id="5562" instrument_node="">Giovanni de Dondi</span></a><span data-dcnode-id="5560" instrument_node=""> in </span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Padua" title="Padua"><span data-dcnode-id="5559" instrument_node="">Padua</span></a><span data-dcnode-id="5557" instrument_node=""> between 1348 and 1364</span><sup class="reference" data-dcnode-id="5554" id="cite_ref-Astrarium_8-0"><a data-dcnode-id="5555" href="#cite_note-Astrarium-8"><span data-dcnode-id="5556" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5553" instrument_node=""> are masterpieces of their type. They no longer exist, but detailed descriptions of their design and construction survive, and modern reproductions have been made. Wallingford's clock may have shown the sun, moon (age, </span><a data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_phase" title="Lunar phase"><span data-dcnode-id="5552" instrument_node="">phase</span></a><span data-dcnode-id="5550" instrument_node="">, and </span><a data-dcnode-id="5548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_node" title="Lunar node"><span data-dcnode-id="5549" instrument_node="">node</span></a><span data-dcnode-id="5547" instrument_node="">), stars and planets, and had, in addition, a wheel of fortune and an indicator of the state of the tide at </span><a data-dcnode-id="5545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_Bridge" title="London Bridge"><span data-dcnode-id="5546" instrument_node="">London Bridge</span></a><span data-dcnode-id="5544" instrument_node="">. De Dondi's clock was a seven-faced construction with 107 moving parts, showing the positions of the sun, moon, and five planets, as well as religious feast days.</span><sup class="reference" data-dcnode-id="5541" id="cite_ref-Astrarium_8-1"><a data-dcnode-id="5542" href="#cite_note-Astrarium-8"><span data-dcnode-id="5543" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5540" instrument_node="">
</span></p><p data-dcnode-id="5534"><span data-dcnode-id="5538" instrument_node="">Both these clocks, and others like them, were probably less accurate than their designers would have wished. The gear ratios may have been exquisitely calculated, but their manufacture was somewhat beyond the mechanical abilities of the time, and they never worked reliably. Furthermore, in contrast to the intricate advanced wheelwork, the timekeeping mechanism in nearly all these clocks until the 16th century was the simple </span><a class="mw-redirect" data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verge_and_foliot" title="Verge and foliot"><span data-dcnode-id="5537" instrument_node="">verge and foliot</span></a><span data-dcnode-id="5535" instrument_node=""> escapement, which had errors of at least half an hour a day.
</span></p><p data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">Astronomical clocks were built as demonstration or exhibition pieces, to impress as much as to educate or inform. The challenge of building these masterpieces meant that clockmakers would continue to produce them, to demonstrate their technical skill and their patrons' wealth. The philosophical message of an ordered, heavenly-ordained universe, which accorded with the Gothic era view of the world, helps explain their popularity.
</span></p><p data-dcnode-id="5527"><span data-dcnode-id="5531" instrument_node="">The growing interest in astronomy during the 18th century revived interest in astronomical clocks, less for the philosophical message, more for the accurate astronomical information that </span><a data-dcnode-id="5529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pendulum" title="Pendulum"><span data-dcnode-id="5530" instrument_node="">pendulum</span></a><span data-dcnode-id="5528" instrument_node="">-regulated clocks could display.
</span></p><span data-dcnode-id="5526" instrument_node="">
</span><h2 data-dcnode-id="5516"><span class="mw-headline" data-dcnode-id="5524" id="Generic_description"><span data-dcnode-id="5525" instrument_node="">Generic description</span></span><span class="mw-editsection" data-dcnode-id="5517"><span class="mw-editsection-bracket" data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">[</span></span><a data-dcnode-id="5520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D3" title="Edit section: Generic description"><span data-dcnode-id="5521" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5518"><span data-dcnode-id="5519" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5515" instrument_node="">
</span><p data-dcnode-id="5509"><span data-dcnode-id="5514" instrument_node="">Although each astronomical clock is different, they share some common features.</span><sup class="reference" data-dcnode-id="5511" id="cite_ref-9"><a data-dcnode-id="5512" href="#cite_note-9"><span data-dcnode-id="5513" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5510" instrument_node="">
</span></p><span data-dcnode-id="5508" instrument_node="">
</span><h3 data-dcnode-id="5498"><span class="mw-headline" data-dcnode-id="5506" id="Time_of_day"><span data-dcnode-id="5507" instrument_node="">Time of day</span></span><span class="mw-editsection" data-dcnode-id="5499"><span class="mw-editsection-bracket" data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">[</span></span><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D4" title="Edit section: Time of day"><span data-dcnode-id="5503" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5497" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5485"><div class="thumbinner" data-dcnode-id="5486" style="width:222px;"><a class="image" data-dcnode-id="5495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-24hourdial.svg"><img alt="" class="thumbimage" data-dcnode-id="5496" data-file-height="353" data-file-width="375" decoding="async" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Astroclock-24hourdial.svg/220px-Astroclock-24hourdial.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Astroclock-24hourdial.svg/330px-Astroclock-24hourdial.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Astroclock-24hourdial.svg/440px-Astroclock-24hourdial.svg.png 2x" width="220"></a><span data-dcnode-id="5494" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5487"><div class="magnify" data-dcnode-id="5492"><a class="internal" data-dcnode-id="5493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-24hourdial.svg" title="Enlarge"></a></div><span data-dcnode-id="5491" instrument_node="">How the </span><a data-dcnode-id="5489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/24-hour_analog_dial" title="24-hour analog dial"><span data-dcnode-id="5490" instrument_node="">24-hour analog dial</span></a><span data-dcnode-id="5488" instrument_node=""> might be interpreted.</span></div></div></div><span data-dcnode-id="5484" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5472"><div class="thumbinner" data-dcnode-id="5473" style="width:222px;"><a class="image" data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-zodiac.png"><img alt="" class="thumbimage" data-dcnode-id="5483" data-file-height="459" data-file-width="417" decoding="async" height="242" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/71/Astroclock-zodiac.png/220px-Astroclock-zodiac.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/71/Astroclock-zodiac.png/330px-Astroclock-zodiac.png 1.5x, //upload.wikimedia.org/wikipedia/commons/7/71/Astroclock-zodiac.png 2x" width="220"></a><span data-dcnode-id="5481" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5474"><div class="magnify" data-dcnode-id="5479"><a class="internal" data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-zodiac.png" title="Enlarge"></a></div><span data-dcnode-id="5478" instrument_node="">Diagram showing how the </span><a data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zodiac" title="Zodiac"><span data-dcnode-id="5477" instrument_node="">zodiac</span></a><span data-dcnode-id="5475" instrument_node=""> is projected on to the ecliptic dial – the symbols are often drawn inside the dial.</span></div></div></div><span data-dcnode-id="5471" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5460"><div class="thumbinner" data-dcnode-id="5461" style="width:222px;"><a class="image" data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-stereographic.png"><img alt="" class="thumbimage" data-dcnode-id="5470" data-file-height="467" data-file-width="479" decoding="async" height="214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Astroclock-stereographic.png/220px-Astroclock-stereographic.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Astroclock-stereographic.png/330px-Astroclock-stereographic.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Astroclock-stereographic.png/440px-Astroclock-stereographic.png 2x" width="220"></a><span data-dcnode-id="5468" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5462"><div class="magnify" data-dcnode-id="5466"><a class="internal" data-dcnode-id="5467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAstroclock-stereographic.png" title="Enlarge"></a></div><a data-dcnode-id="5464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereographic_projection" title="Stereographic projection"><span data-dcnode-id="5465" instrument_node="">Stereographic projection</span></a><span data-dcnode-id="5463" instrument_node=""> from the North Pole.</span></div></div></div><span data-dcnode-id="5459" instrument_node="">
</span><p data-dcnode-id="5454"><span data-dcnode-id="5458" instrument_node="">Most astronomical clocks have a </span><a data-dcnode-id="5456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/24-hour_analog_dial" title="24-hour analog dial"><span data-dcnode-id="5457" instrument_node="">24-hour analog dial</span></a><span data-dcnode-id="5455" instrument_node=""> around the outside edge, numbered from I to XII then from I to XII again. The current time is indicated by a golden ball or a picture of the sun at the end of a pointer. Local noon is usually at the top of the dial, and midnight at the bottom. Minute hands are rarely used.
</span></p><p data-dcnode-id="5449"><span data-dcnode-id="5453" instrument_node="">The Sun indicator or hand gives an approximate indication of both the Sun's </span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azimuth" title="Azimuth"><span data-dcnode-id="5452" instrument_node="">azimuth</span></a><span data-dcnode-id="5450" instrument_node=""> and altitude. For azimuth (bearing from the north), the top of the dial indicates South, and the two VI points of the dial East and West. For altitude, the top is the zenith and the two VI and VI points define the horizon. (This is for the astronomical clocks designed for use in the northern hemisphere.) This interpretation is most accurate at the equinoxes, of course.
</span></p><p data-dcnode-id="5444"><span data-dcnode-id="5448" instrument_node="">If XII is not at the top of the dial, or if the numbers are Arabic rather than Roman, then the time may be shown in </span><a data-dcnode-id="5446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hour%23Counting_from_sunset" title="Hour"><span data-dcnode-id="5447" instrument_node="">Italian hours</span></a><span data-dcnode-id="5445" instrument_node=""> (also called Bohemian, or Old Czech, hours). In this system, 1 o'clock occurs at sunset, and counting continues through the night and into the next afternoon, reaching 24 an hour before sunset.
</span></p><p data-dcnode-id="5442"><span data-dcnode-id="5443" instrument_node="">In the photograph of the Prague clock shown at the top of the article, the time indicated by the Sun hand is about 9am (IX in Roman numerals), or about the 13th hour (Italian time in Arabic numerals).
</span></p><span data-dcnode-id="5441" instrument_node="">
</span><h3 data-dcnode-id="5431"><span class="mw-headline" data-dcnode-id="5439" id="Calendar_and_zodiac"><span data-dcnode-id="5440" instrument_node="">Calendar and zodiac</span></span><span class="mw-editsection" data-dcnode-id="5432"><span class="mw-editsection-bracket" data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">[</span></span><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D5" title="Edit section: Calendar and zodiac"><span data-dcnode-id="5436" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5430" instrument_node="">
</span><p data-dcnode-id="5422"><span data-dcnode-id="5429" instrument_node="">The year is usually represented by the 12 signs of the </span><a data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zodiac" title="Zodiac"><span data-dcnode-id="5428" instrument_node="">zodiac</span></a><span data-dcnode-id="5426" instrument_node="">, arranged either as a concentric circle inside the 24-hour dial, or drawn onto a displaced smaller circle, which is a projection of the </span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecliptic" title="Ecliptic"><span data-dcnode-id="5425" instrument_node="">ecliptic</span></a><span data-dcnode-id="5423" instrument_node="">, the path of the Sun and planets through the sky, and the plane of the Earth's orbit.
</span></p><p data-dcnode-id="5414"><span data-dcnode-id="5421" instrument_node="">The ecliptic plane is projected onto the face of the clock, and, because of the Earth's tilted angle of rotation relative to its orbital plane, it is displaced from the center and appears to be distorted. The projection point for the </span><a data-dcnode-id="5419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereographic_projection" title="Stereographic projection"><span data-dcnode-id="5420" instrument_node="">stereographic projection</span></a><span data-dcnode-id="5418" instrument_node=""> is the North pole; on </span><a class="mw-redirect" data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrolabes" title="Astrolabes"><span data-dcnode-id="5417" instrument_node="">astrolabes</span></a><span data-dcnode-id="5415" instrument_node=""> the South pole is more common.
</span></p><p data-dcnode-id="5409"><span data-dcnode-id="5413" instrument_node="">The ecliptic dial makes one complete revolution in 23 hours 56 minutes (a </span><a data-dcnode-id="5411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidereal_time" title="Sidereal time"><span data-dcnode-id="5412" instrument_node="">sidereal day</span></a><span data-dcnode-id="5410" instrument_node="">), and will therefore gradually get out of phase with the hour hand, drifting slowly further apart during the year.
</span></p><p data-dcnode-id="5404"><span data-dcnode-id="5408" instrument_node="">To find the date, find the place where the hour hand or Sun disk intersects the ecliptic dial: this indicates the current star sign, the sun's current location on the ecliptic. The intersection point slowly moves around the ecliptic dial during the year, as the Sun moves out of one </span><a data-dcnode-id="5406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrological_sign" title="Astrological sign"><span data-dcnode-id="5407" instrument_node="">astrological sign</span></a><span data-dcnode-id="5405" instrument_node=""> into another.
</span></p><p data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">In the diagram showing the clock face on the right, the Sun's disk has recently moved into Aries (the stylized ram's horns), having left Pisces. The date is therefore late March or early April.
</span></p><p data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">If the zodiac signs run around inside the hour hands, either this ring rotates to align itself with the hour hand, or there's another hand, revolving once per year, which points to the Sun's current zodiac sign.
</span></p><span data-dcnode-id="5399" instrument_node="">
</span><h3 data-dcnode-id="5389"><span class="mw-headline" data-dcnode-id="5397" id="Moon"><span data-dcnode-id="5398" instrument_node="">Moon</span></span><span class="mw-editsection" data-dcnode-id="5390"><span class="mw-editsection-bracket" data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">[</span></span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D6" title="Edit section: Moon"><span data-dcnode-id="5394" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5388" instrument_node="">
</span><p data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">A dial or ring indicating the numbers 1 to 29 or 30 indicates the moon's age: a new moon is 0, waxes become full around day 15, and then wanes up to 29 or 30. The phase is sometimes shown by a rotating globe or black hemisphere, or a window that reveals part of a wavy black shape beneath.
</span></p><span data-dcnode-id="5385" instrument_node="">
</span><h3 data-dcnode-id="5375"><span class="mw-headline" data-dcnode-id="5383" id="Hour_lines"><span data-dcnode-id="5384" instrument_node="">Hour lines</span></span><span class="mw-editsection" data-dcnode-id="5376"><span class="mw-editsection-bracket" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">[</span></span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D7" title="Edit section: Hour lines"><span data-dcnode-id="5380" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5374" instrument_node="">
</span><p data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Unequal hours were the result of dividing up the period of daylight into 12 equal hours and nighttime into another 12. In Europe, there is more daylight in the summer, and less night, so each of the 12 daylight hours is longer than a night hour. Similarly in winter, daylight hours are shorter, and night hours are longer. These unequal hours are shown by the curved lines radiating from the center. The longer daylight hours in summer can usually be seen at the outer edge of the dial, and the time in unequal hours is read by noting the intersection of the sun hand with the appropriate curved line.
</span></p><span data-dcnode-id="5371" instrument_node="">
</span><h3 data-dcnode-id="5361"><span class="mw-headline" data-dcnode-id="5369" id="Aspects"><span data-dcnode-id="5370" instrument_node="">Aspects</span></span><span class="mw-editsection" data-dcnode-id="5362"><span class="mw-editsection-bracket" data-dcnode-id="5367"><span data-dcnode-id="5368" instrument_node="">[</span></span><a data-dcnode-id="5365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D8" title="Edit section: Aspects"><span data-dcnode-id="5366" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5360" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5359" instrument_node="">Astrologers placed importance on how the Sun, Moon, and planets were arranged and aligned in the sky. If certain planets appeared at the points of a triangle, hexagon, or square, or if they were opposite or next to each other, the appropriate </span><a data-dcnode-id="5357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrological_aspect" title="Astrological aspect"><span data-dcnode-id="5358" instrument_node="">aspect</span></a><span data-dcnode-id="5356" instrument_node=""> was used to determine the event's significance. On some clocks you can see the common aspects – triangle, square, and hexagon – drawn inside the central disc, with each line marked by the symbol for that aspect, and you may also see the signs for conjunction and opposition. On an </span><a data-dcnode-id="5354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrolabe" title="Astrolabe"><span data-dcnode-id="5355" instrument_node="">astrolabe</span></a><span data-dcnode-id="5353" instrument_node="">, the corners of the different aspects could be lined up on any of the planets. On a clock, though, the disc containing the aspect lines can't be rotated at will, so they usually show only the aspects of the Sun or Moon.
</span></p><p data-dcnode-id="5347"><span data-dcnode-id="5351" instrument_node="">On the </span><a data-dcnode-id="5349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Torre_dell%2527Orologio%2C_Brescia" title="Torre dell'Orologio, Brescia"><span data-dcnode-id="5350" instrument_node="">Torre dell'Orologio, Brescia</span></a><span data-dcnode-id="5348" instrument_node=""> clock in northern Italy, the triangle, square, and star in the centre of the dial show these aspects (the third, fourth, and sixth phases) of (presumably) the moon.
</span></p><span data-dcnode-id="5346" instrument_node="">
</span><h3 data-dcnode-id="5336"><span class="mw-headline" data-dcnode-id="5344" id="Dragon_hand:_eclipse_prediction_and_lunar_nodes"><span data-dcnode-id="5345" instrument_node="">Dragon hand: eclipse prediction and lunar nodes</span></span><span class="mw-editsection" data-dcnode-id="5337"><span class="mw-editsection-bracket" data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">[</span></span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D9" title="Edit section: Dragon hand: eclipse prediction and lunar nodes"><span data-dcnode-id="5341" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5335" instrument_node="">
</span><p data-dcnode-id="5330"><span data-dcnode-id="5334" instrument_node="">The Moon's orbit is not in the same plane as the Earth's orbit around the Sun but crosses it in two places. The Moon crosses the ecliptic plane twice a month, once when it goes up above the plane, and again 15 or so days later when it goes back down below the ecliptic. These two locations are the ascending and descending </span><a class="mw-redirect" data-dcnode-id="5332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_nodes" title="Lunar nodes"><span data-dcnode-id="5333" instrument_node="">lunar nodes</span></a><span data-dcnode-id="5331" instrument_node="">. Solar and lunar eclipses will occur only when the Moon is positioned near one of these nodes because at other times the Moon is either too high or too low for an eclipse to be noticed from the earth. Some astronomical clocks keep track of the position of the lunar nodes with a long pointer that crosses the dial. This so-called dragon hand makes one complete rotation around the ecliptic dial every 19 years. When the dragon hand and the new moon coincide, the Moon is on the same plane as the Earth and Sun, and so there is every chance that an eclipse will be visible from somewhere on Earth.
</span></p><span data-dcnode-id="5329" instrument_node="">
</span><h2 data-dcnode-id="5319"><span class="mw-headline" data-dcnode-id="5327" id="Historical_examples"><span data-dcnode-id="5328" instrument_node="">Historical examples</span></span><span class="mw-editsection" data-dcnode-id="5320"><span class="mw-editsection-bracket" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">[</span></span><a data-dcnode-id="5323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D10" title="Edit section: Historical examples"><span data-dcnode-id="5324" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5318" instrument_node="">
</span><h3 data-dcnode-id="5307"><span data-dcnode-id="5317" id="Su_Song.27s_Cosmic_Engine"></span><span class="mw-headline" data-dcnode-id="5315" id="Su_Song's_Cosmic_Engine"><span data-dcnode-id="5316" instrument_node="">Su Song's Cosmic Engine</span></span><span class="mw-editsection" data-dcnode-id="5308"><span class="mw-editsection-bracket" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">[</span></span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D11" title="Edit section: Su Song's Cosmic Engine"><span data-dcnode-id="5312" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5306" instrument_node="">
</span><p data-dcnode-id="5276"><span data-dcnode-id="5305" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Science_Museum_%28London%29" title="Science Museum (London)"><span data-dcnode-id="5304" instrument_node="">Science Museum (London)</span></a><span data-dcnode-id="5302" instrument_node=""> has a scale model of the 'Cosmic Engine', which </span><a data-dcnode-id="5300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Su_Song" title="Su Song"><span data-dcnode-id="5301" instrument_node="">Su Song</span></a><span data-dcnode-id="5299" instrument_node="">, a Chinese </span><a data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polymath" title="Polymath"><span data-dcnode-id="5298" instrument_node="">polymath</span></a><span data-dcnode-id="5296" instrument_node="">, designed and constructed in China in 1092. This great astronomical hydromechanical clock tower was about ten metres high (about 30 feet) and featured a clock </span><a data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Escapement" title="Escapement"><span data-dcnode-id="5295" instrument_node="">escapement</span></a><span data-dcnode-id="5293" instrument_node=""> and was indirectly powered by a rotating wheel either with falling water and </span><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercury_%28element%29" title="Mercury (element)"><span data-dcnode-id="5292" instrument_node="">liquid mercury</span></a><span data-dcnode-id="5290" instrument_node="">, which freezes at a much lower temperature than water, allowing operation of the clock during colder weather. A full-sized working replica of Su Song's clock exists in the </span><a class="mw-redirect" data-dcnode-id="5288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China" title="Republic of China"><span data-dcnode-id="5289" instrument_node="">Republic of China</span></a><span data-dcnode-id="5287" instrument_node=""> (Taiwan)'s </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Museum_of_Natural_Science" title="National Museum of Natural Science"><span data-dcnode-id="5286" instrument_node="">National Museum of Natural Science</span></a><span data-dcnode-id="5284" instrument_node="">, </span><a data-dcnode-id="5282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taichung" title="Taichung"><span data-dcnode-id="5283" instrument_node="">Taichung</span></a><span data-dcnode-id="5281" instrument_node=""> city. This full-scale, fully functional replica, approximately 12 meters (39 feet) in height, was constructed from Su Song's original descriptions and mechanical drawings.</span><sup class="reference" data-dcnode-id="5278" id="cite_ref-10"><a data-dcnode-id="5279" href="#cite_note-10"><span data-dcnode-id="5280" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5277" instrument_node="">
</span></p><span data-dcnode-id="5275" instrument_node="">
</span><h3 data-dcnode-id="5264"><span data-dcnode-id="5274" id="Al-Jazari.27s_castle_clock"></span><span class="mw-headline" data-dcnode-id="5272" id="Al-Jazari's_castle_clock"><span data-dcnode-id="5273" instrument_node="">Al-Jazari's castle clock</span></span><span class="mw-editsection" data-dcnode-id="5265"><span class="mw-editsection-bracket" data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">[</span></span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D12" title="Edit section: Al-Jazari's castle clock"><span data-dcnode-id="5269" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5263" instrument_node="">
</span><link data-dcnode-id="5262" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5258" role="note"><span data-dcnode-id="5261" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castle_clock" title="Castle clock"><span data-dcnode-id="5260" instrument_node="">Castle clock</span></a></div><span data-dcnode-id="5257" instrument_node="">
</span><p data-dcnode-id="5206"><span data-dcnode-id="5256" instrument_node="">The most sophisticated </span><a data-dcnode-id="5254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_clock" title="Water clock"><span data-dcnode-id="5255" instrument_node="">water-powered</span></a><span data-dcnode-id="5253" instrument_node=""> astronomical clock was </span><a class="mw-redirect" data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Jazari" title="Al-Jazari"><span data-dcnode-id="5252" instrument_node="">Al-Jazari</span></a><span data-dcnode-id="5250" instrument_node="">'s castle clock, considered to be an early example of a </span><a data-dcnode-id="5248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_programming" title="Computer programming"><span data-dcnode-id="5249" instrument_node="">programmable</span></a><span data-dcnode-id="5247" instrument_node=""> </span><a data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Analog_computer" title="Analog computer"><span data-dcnode-id="5246" instrument_node="">analog computer</span></a><span data-dcnode-id="5244" instrument_node="">, in 1206. It was a complex device that was about 33 meters (108 feet) high and had multiple functions alongside timekeeping. It included a display of the </span><a data-dcnode-id="5242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zodiac" title="Zodiac"><span data-dcnode-id="5243" instrument_node="">zodiac</span></a><span data-dcnode-id="5241" instrument_node=""> and the </span><a data-dcnode-id="5239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heliocentric_orbit" title="Heliocentric orbit"><span data-dcnode-id="5240" instrument_node="">solar</span></a><span data-dcnode-id="5238" instrument_node=""> and </span><a data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_orbit" title="Lunar orbit"><span data-dcnode-id="5237" instrument_node="">lunar orbits</span></a><span data-dcnode-id="5235" instrument_node="">, and a </span><a class="mw-redirect" data-dcnode-id="5233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pointer_%28computing_WIMP%29" title="Pointer (computing WIMP)"><span data-dcnode-id="5234" instrument_node="">pointer</span></a><span data-dcnode-id="5232" instrument_node=""> in the shape of the </span><a data-dcnode-id="5230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lunar_phase" title="Lunar phase"><span data-dcnode-id="5231" instrument_node="">crescent moon</span></a><span data-dcnode-id="5229" instrument_node=""> which travelled across the top of a </span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gate" title="Gate"><span data-dcnode-id="5228" instrument_node="">gateway</span></a><span data-dcnode-id="5226" instrument_node="">, moved by a hidden </span><a data-dcnode-id="5224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cart" title="Cart"><span data-dcnode-id="5225" instrument_node="">cart</span></a><span data-dcnode-id="5223" instrument_node=""> and causing automatic doors to open, each revealing a </span><a data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mannequin" title="Mannequin"><span data-dcnode-id="5222" instrument_node="">mannequin</span></a><span data-dcnode-id="5220" instrument_node="">, every hour.</span><sup class="reference" data-dcnode-id="5217" id="cite_ref-11"><a data-dcnode-id="5218" href="#cite_note-11"><span data-dcnode-id="5219" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="5214" id="cite_ref-Hill2_12-0"><a data-dcnode-id="5215" href="#cite_note-Hill2-12"><span data-dcnode-id="5216" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="5211" id="cite_ref-13"><a data-dcnode-id="5212" href="#cite_note-13"><span data-dcnode-id="5213" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="5208" id="cite_ref-14"><a data-dcnode-id="5209" href="#cite_note-14"><span data-dcnode-id="5210" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5207" instrument_node="">
</span></p><p data-dcnode-id="5169"><span data-dcnode-id="5205" instrument_node="">It was possible to re-program the length of </span><a class="mw-redirect" data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daytime_%28astronomy%29" title="Daytime (astronomy)"><span data-dcnode-id="5204" instrument_node="">day</span></a><span data-dcnode-id="5202" instrument_node=""> and night every day in order to account for the changing lengths of day and night throughout the year, and it also featured five musician </span><a data-dcnode-id="5200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automaton" title="Automaton"><span data-dcnode-id="5201" instrument_node="">automata</span></a><span data-dcnode-id="5199" instrument_node=""> who automatically played music when moved by </span><a data-dcnode-id="5197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lever" title="Lever"><span data-dcnode-id="5198" instrument_node="">levers</span></a><span data-dcnode-id="5196" instrument_node=""> operated by a hidden </span><a data-dcnode-id="5194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camshaft" title="Camshaft"><span data-dcnode-id="5195" instrument_node="">camshaft</span></a><span data-dcnode-id="5193" instrument_node=""> attached to a </span><a data-dcnode-id="5191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_wheel" title="Water wheel"><span data-dcnode-id="5192" instrument_node="">water wheel</span></a><span data-dcnode-id="5190" instrument_node="">.</span><sup class="reference" data-dcnode-id="5187" id="cite_ref-Ancient_Discoveries_15-0"><a data-dcnode-id="5188" href="#cite_note-Ancient_Discoveries-15"><span data-dcnode-id="5189" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5186" instrument_node=""> Other components of the castle clock included a main reservoir with a float, a </span><a data-dcnode-id="5184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Float_chamber" title="Float chamber"><span data-dcnode-id="5185" instrument_node="">float chamber</span></a><span data-dcnode-id="5183" instrument_node=""> and </span><a data-dcnode-id="5181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulator_%28automatic_control%29" title="Regulator (automatic control)"><span data-dcnode-id="5182" instrument_node="">flow regulator</span></a><span data-dcnode-id="5180" instrument_node="">, plate and </span><a data-dcnode-id="5178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valve" title="Valve"><span data-dcnode-id="5179" instrument_node="">valve</span></a><span data-dcnode-id="5177" instrument_node=""> trough, two </span><a data-dcnode-id="5175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pulley" title="Pulley"><span data-dcnode-id="5176" instrument_node="">pulleys</span></a><span data-dcnode-id="5174" instrument_node="">, a crescent disc displaying the zodiac, and two falcon automata dropping balls into vases.</span><sup class="reference" data-dcnode-id="5171" id="cite_ref-16"><a data-dcnode-id="5172" href="#cite_note-16"><span data-dcnode-id="5173" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5170" instrument_node="">
</span></p><span data-dcnode-id="5168" instrument_node="">
</span><h3 data-dcnode-id="5158"><span class="mw-headline" data-dcnode-id="5166" id="Astronomical_clock_of_Taqi_al-Din"><span data-dcnode-id="5167" instrument_node="">Astronomical clock of Taqi al-Din</span></span><span class="mw-editsection" data-dcnode-id="5159"><span class="mw-editsection-bracket" data-dcnode-id="5164"><span data-dcnode-id="5165" instrument_node="">[</span></span><a data-dcnode-id="5162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D13" title="Edit section: Astronomical clock of Taqi al-Din"><span data-dcnode-id="5163" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5157" instrument_node="">
</span><p data-dcnode-id="5125"><span data-dcnode-id="5156" instrument_node="">The </span><a data-dcnode-id="5154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="5155" instrument_node="">Ottoman</span></a><span data-dcnode-id="5153" instrument_node=""> engineer </span><a class="mw-redirect" data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taqi_al-Din_Muhammad_ibn_Ma%2527ruf" title="Taqi al-Din Muhammad ibn Ma'ruf"><span data-dcnode-id="5152" instrument_node="">Taqi al-Din</span></a><span data-dcnode-id="5150" instrument_node=""> described a weight-driven clock with a </span><a data-dcnode-id="5148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Verge_escapement" title="Verge escapement"><span data-dcnode-id="5149" instrument_node="">verge-and-foliot escapement</span></a><span data-dcnode-id="5147" instrument_node="">, a striking train of gears, an </span><a data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alarm_clock" title="Alarm clock"><span data-dcnode-id="5146" instrument_node="">alarm</span></a><span data-dcnode-id="5144" instrument_node="">, and a representation of the moon's phases in his book </span><i data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">The Brightest Stars for the Construction of Mechanical Clocks</span></i><span data-dcnode-id="5141" instrument_node=""> (</span><i data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Al-Kawākib al-durriyya fī wadh' al-bankāmat al-dawriyya</span></i><span data-dcnode-id="5138" instrument_node="">), written around 1565.</span><sup class="reference" data-dcnode-id="5135" id="cite_ref-17"><a data-dcnode-id="5136" href="#cite_note-17"><span data-dcnode-id="5137" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5134" instrument_node=""> The clock also displayed the zodiac.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5127" style="white-space:nowrap;"><span data-dcnode-id="5133" instrument_node="">[</span><i data-dcnode-id="5129"><a data-dcnode-id="5130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5131" title="This claim needs references to reliable sources. (May 2010)"><span data-dcnode-id="5132" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5128" instrument_node="">]</span></sup><span data-dcnode-id="5126" instrument_node="">
</span></p><span data-dcnode-id="5124" instrument_node="">
</span><h2 data-dcnode-id="5114"><span class="mw-headline" data-dcnode-id="5122" id="Interior_clocks_and_watches"><span data-dcnode-id="5123" instrument_node="">Interior clocks and watches</span></span><span class="mw-editsection" data-dcnode-id="5115"><span class="mw-editsection-bracket" data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">[</span></span><a data-dcnode-id="5118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D14" title="Edit section: Interior clocks and watches"><span data-dcnode-id="5119" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5116"><span data-dcnode-id="5117" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5113" instrument_node="">
</span><h3 data-dcnode-id="5102"><span data-dcnode-id="5112" id="The_Rasmus_S.C3.B8rnes_Clock"></span><span class="mw-headline" data-dcnode-id="5110" id="The_Rasmus_Sørnes_Clock"><span data-dcnode-id="5111" instrument_node="">The Rasmus Sørnes Clock</span></span><span class="mw-editsection" data-dcnode-id="5103"><span class="mw-editsection-bracket" data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">[</span></span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D15" title="Edit section: The Rasmus Sørnes Clock"><span data-dcnode-id="5107" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5104"><span data-dcnode-id="5105" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5101" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5092"><div class="thumbinner" data-dcnode-id="5093" style="width:222px;"><a class="image" data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARasmusSornesClock.jpg"><img alt="" class="thumbimage" data-dcnode-id="5100" data-file-height="2532" data-file-width="1788" decoding="async" height="312" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/RasmusSornesClock.jpg/220px-RasmusSornesClock.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/RasmusSornesClock.jpg/330px-RasmusSornesClock.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f9/RasmusSornesClock.jpg/440px-RasmusSornesClock.jpg 2x" width="220"></a><span data-dcnode-id="5098" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5094"><div class="magnify" data-dcnode-id="5096"><a class="internal" data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ARasmusSornesClock.jpg" title="Enlarge"></a></div><span data-dcnode-id="5095" instrument_node="">The Rasmus Sørnes Clock.</span></div></div></div><span data-dcnode-id="5091" instrument_node="">
</span><p data-dcnode-id="5065"><span data-dcnode-id="5090" instrument_node="">Arguably the most complicated of its kind ever constructed, the last of a total of four astronomical clocks designed and made by Norwegian </span><a data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rasmus_S%25C3%25B8rnes" title="Rasmus Sørnes"><span data-dcnode-id="5089" instrument_node="">Rasmus Sørnes</span></a><span data-dcnode-id="5087" instrument_node=""> (1893–1967), is characterized by its superior complexity compactly housed in a casing with the modest measurements of 0.70 x 0.60 x 2.10 m. Features include locations of the sun and moon in the zodiac, </span><a data-dcnode-id="5085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_calendar" title="Julian calendar"><span data-dcnode-id="5086" instrument_node="">Julian calendar</span></a><span data-dcnode-id="5084" instrument_node="">, </span><a data-dcnode-id="5082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_calendar" title="Gregorian calendar"><span data-dcnode-id="5083" instrument_node="">Gregorian calendar</span></a><span data-dcnode-id="5081" instrument_node="">, </span><a data-dcnode-id="5079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidereal_time" title="Sidereal time"><span data-dcnode-id="5080" instrument_node="">sidereal time</span></a><span data-dcnode-id="5078" instrument_node="">, GMT, local time with daylight saving time and leap year, solar and lunar cycle corrections, eclipses, local sunset and sunrise, moon phase, tides, </span><a data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunspot" title="Sunspot"><span data-dcnode-id="5077" instrument_node="">sunspot</span></a><span data-dcnode-id="5075" instrument_node=""> cycles and a </span><a data-dcnode-id="5073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetarium" title="Planetarium"><span data-dcnode-id="5074" instrument_node="">planetarium</span></a><span data-dcnode-id="5072" instrument_node=""> including </span><a data-dcnode-id="5070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pluto" title="Pluto"><span data-dcnode-id="5071" instrument_node="">Pluto</span></a><span data-dcnode-id="5069" instrument_node="">'s 248-year orbit and the 25 800-year periods of the polar ecliptics (</span><a data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precession" title="Precession"><span data-dcnode-id="5068" instrument_node="">precession</span></a><span data-dcnode-id="5066" instrument_node=""> of the Earth's axis). All wheels are in brass and gold-plated. Dials are silver-plated. The clock has an electromechanical pendulum.
</span></p><p data-dcnode-id="5057"><span data-dcnode-id="5064" instrument_node="">Sørnes also made the necessary tools and based his work on his own astronomical observations. Having been exhibited at the Time Museum in Rockford, Illinois, and at The Chicago Museum of Science and Industry, the clock was sold in 2002 and its current location is not known. The Rasmus Sørnes Astronomical Clock No. 3, the precursor to the Chicago Clock, his tools, patents, drawings, telescope, and other items, are exhibited at the </span><a data-dcnode-id="5062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Borgarsyssel_Museum" title="Borgarsyssel Museum"><span data-dcnode-id="5063" instrument_node="">Borgarsyssel Museum</span></a><span data-dcnode-id="5061" instrument_node=""> in </span><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarpsborg" title="Sarpsborg"><span data-dcnode-id="5060" instrument_node="">Sarpsborg</span></a><span data-dcnode-id="5058" instrument_node="">, Norway.
</span></p><span data-dcnode-id="5056" instrument_node="">
</span><h3 data-dcnode-id="5046"><span class="mw-headline" data-dcnode-id="5054" id="Table_clocks"><span data-dcnode-id="5055" instrument_node="">Table clocks</span></span><span class="mw-editsection" data-dcnode-id="5047"><span class="mw-editsection-bracket" data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">[</span></span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D16" title="Edit section: Table clocks"><span data-dcnode-id="5051" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5045" instrument_node="">
</span><p data-dcnode-id="5037"><span data-dcnode-id="5044" instrument_node="">There are many examples of astronomical table clocks, due to their popularity as showpieces. To become a master clockmaker in 17th-century </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Augsburg" title="Augsburg"><span data-dcnode-id="5043" instrument_node="">Augsburg</span></a><span data-dcnode-id="5041" instrument_node="">, candidates had to design and build a 'masterpiece' clock, an astronomical table-top clock of formidable complexity. Examples can be found in museums, such as London's </span><a data-dcnode-id="5039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Museum" title="British Museum"><span data-dcnode-id="5040" instrument_node="">British Museum</span></a><span data-dcnode-id="5038" instrument_node="">.
</span></p><p data-dcnode-id="5035"><span data-dcnode-id="5036" instrument_node="">Currently Edmund Scientific among other retailers offers a mechanical Tellurium clock, perhaps the first mechanical astronomical clock to be mass-marketed.
</span></p><p data-dcnode-id="5027"><span data-dcnode-id="5034" instrument_node="">In Japan, </span><a data-dcnode-id="5032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tanaka_Hisashige" title="Tanaka Hisashige"><span data-dcnode-id="5033" instrument_node="">Tanaka Hisashige</span></a><span data-dcnode-id="5031" instrument_node=""> made a </span><a data-dcnode-id="5029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myriad_year_clock" title="Myriad year clock"><span data-dcnode-id="5030" instrument_node="">Myriad year clock</span></a><span data-dcnode-id="5028" instrument_node=""> in 1851.
</span></p><span data-dcnode-id="5026" instrument_node="">
</span><div data-dcnode-id="5025" style="clear:both;"></div><span data-dcnode-id="5024" instrument_node="">
</span><h3 data-dcnode-id="5014"><span class="mw-headline" data-dcnode-id="5022" id="Watches"><span data-dcnode-id="5023" instrument_node="">Watches</span></span><span class="mw-editsection" data-dcnode-id="5015"><span class="mw-editsection-bracket" data-dcnode-id="5020"><span data-dcnode-id="5021" instrument_node="">[</span></span><a data-dcnode-id="5018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_clock%26action%3Dedit%26section%3D17" title="Edit section: Watches"><span data-dcnode-id="5019" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5013" instrument_node="">
</span><p data-dcnode-id="5000"><span data-dcnode-id="5012" instrument_node="">More recently, independent clockmaker </span><a class="new" data-dcnode-id="5010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChristiaan_van_der_Klaauw%26action%3Dedit%26redlink%3D1" title="Christiaan van der Klaauw (page does not exist)"><span data-dcnode-id="5011" instrument_node="">Christiaan van der Klaauw</span></a><span class="noprint" data-dcnode-id="5005" style="font-size:85%; font-style: normal;"><span data-dcnode-id="5009" instrument_node="">&nbsp;[</span><a class="extiw" data-dcnode-id="5007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nl.wikipedia.org/wiki/Christiaan_van_der_Klaauw" title="nl:Christiaan van der Klaauw"><span data-dcnode-id="5008" instrument_node="">nl</span></a><span data-dcnode-id="5006" instrument_node="">]</span></span><span data-dcnode-id="5004" instrument_node=""> created a wristwatch astrolabe, the "Astrolabium" in addition to the "Planetarium 2000", the "Eclipse 2001" and the "Real Moon."  </span><a data-dcnode-id="5002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulysse_Nardin" title="Ulysse Nardin"><span data-dcnode-id="5003" instrument_node="">Ulysse Nardin</span></a><span data-dcnode-id="5001" instrument_node=""> also sells several astronomical wristwatches, the "Astrolabium," "Planetarium", and the "Tellurium J. Kepler."
