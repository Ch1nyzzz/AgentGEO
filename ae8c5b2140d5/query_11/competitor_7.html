</span><h2 class="contentheading" data-dcnode-id="323"><span data-dcnode-id="327" instrument_node="">
</span><a class="" data-dcnode-id="325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14297-a-new-optical-technology-made-in-spain-to-detect-sars-cov-2"><span data-dcnode-id="326" instrument_node="">
			A new optical technology Made in Spain to detect SARS-Cov-2</span></a><span data-dcnode-id="324" instrument_node="">
</span></h2><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><img alt="portada es" data-dcnode-id="321" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/stories/News2021/art_covid2.png&amp;raw" style="margin-bottom: 15px; margin-right: 15px; float: left;" width="380"></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="316"><strong data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Almería (Spain), February 18th, 2022</span></strong></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="311" style="text-align: justify;"><strong data-dcnode-id="312"><em data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">A team of Spanish researchers, coordinated by the University of Seville, with participation of Calar Alto Observatory and the Institute of Astrophysics of Andalusia (IAA-CSIC), was able to detect the coronavirus that causes COVID-19 using a new optical methodology. This tool could be potentially usable for massive, fast and easy-to implement screening.</span></em></strong></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308" style="text-align: justify;"><span data-dcnode-id="309" instrument_node="">A multidisciplinary collaboration, whose first results are published in the journal Scientific Reports, from the Nature Group, has obtained a sensitivity of 100% and a specificity of 87.5% in the detection of SARS-CoV-2 in nasopharyngeal exudate (the same samples used in a PCR test) from symptomatic people. It has also been possible to detect the presence of SARS-CoV-2 in fresh saliva of asymptomatic people, as well as to detect, differentiate and quantify two types of synthetic viruses (lentiviruses and synthetic coronaviruses) in two biofluids (saline solution and artificial saliva).</span></p><span data-dcnode-id="307" instrument_node="">
</span><p class="readmore" data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">
</span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14297-a-new-optical-technology-made-in-spain-to-detect-sars-cov-2"><span data-dcnode-id="305" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="303" instrument_node="">
</span></p><span data-dcnode-id="301" instrument_node="">
</span><div class="item-separator" data-dcnode-id="300"></div><span data-dcnode-id="299" instrument_node="">
</span></div><span data-dcnode-id="297" instrument_node="">

</span><div class="items-row cols-2 row-0 row-fluid" data-dcnode-id="217"><span data-dcnode-id="294" instrument_node="">
</span><div class="item column-1 span6" data-dcnode-id="260" itemprop="blogPost" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="293" instrument_node="">
</span><h2 class="contentheading" data-dcnode-id="288"><span data-dcnode-id="292" instrument_node="">
</span><a class="" data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14275-re-encounter-with-a-planetary-nebula-nearly-30-years-later"><span data-dcnode-id="291" instrument_node="">
			Re-encounter with a planetary nebula nearly 30 years later</span></a><span data-dcnode-id="289" instrument_node="">
</span></h2><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="285"><img alt="portada" data-dcnode-id="286" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/prel/ES_IC4997/portada.png&amp;raw" style="margin-right: 15px; margin-bottom: 15px; float: left;" width="297"></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="281"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">January 13th 2022</span></strong></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="273" style="text-align: justify;"><strong data-dcnode-id="277"><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">T</span></em></strong><strong data-dcnode-id="274"><em data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">he Institute of Astrophysics of Andalusia (IAA-CSIC) leads a study based on data from Calar Alto Observatory (CAHA), showing the variability of the planetary nebula IC4997. The changes can be seen comparing observations taken nearly 30 years apart with the CAHA 2.2-meter telescope. This suggests that the central star of this planetary nebula probably hides a companion star. </span></em></strong></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270" style="text-align: justify;"><span data-dcnode-id="271" instrument_node="">Planetary nebulae represent one of the final stages in the life of low- and intermediate-mass stars, similar to the Sun. After exhausting their fuel, the outer layers of such stars are taken off, forming a fluorescent envelope around a white dwarf star (the "naked" core of the star after the expulsion of its outer layers). In some tens of thousands of years, the nebula will disperse in the interstellar medium and the central star will become extinct, so that all planetary nebulae are expected to be (very slowly) variable. However, some of them present a variability unrelated to their natural evolution, which reveals processes that deviate from the norm. This is the case of IC4997, a nebula with which a Spanish team led by the Institute of Astrophysics of Andalusia (IAA-CSIC) has found itself again, thirty years later.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p class="readmore" data-dcnode-id="264"><span data-dcnode-id="268" instrument_node="">
</span><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14275-re-encounter-with-a-planetary-nebula-nearly-30-years-later"><span data-dcnode-id="267" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="265" instrument_node="">
</span></p><span data-dcnode-id="263" instrument_node="">
</span><div class="item-separator" data-dcnode-id="262"></div><span data-dcnode-id="261" instrument_node="">
</span></div><span data-dcnode-id="259" instrument_node="">
</span><div class="item column-2 span6" data-dcnode-id="219" itemprop="blogPost" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="258" instrument_node="">
</span><h2 class="contentheading" data-dcnode-id="253"><span data-dcnode-id="257" instrument_node="">
</span><a class="" data-dcnode-id="255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14157-the-first-binary-star-of-its-kind-discovered-with-the-schmidt-telescope"><span data-dcnode-id="256" instrument_node="">
			The first binary star of its kind discovered with the Schmidt telescope</span></a><span data-dcnode-id="254" instrument_node="">
</span></h2><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><img alt="portada" data-dcnode-id="251" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/prel/BINARIA_SMT/portada.png&amp;raw" style="margin-bottom: 15px; margin-right: 15px; float: left;" width="350"></p><span data-dcnode-id="249" instrument_node="">
</span><p data-dcnode-id="246"><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">November 23rd 2021</span></strong></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="241" style="text-align: justify;"><strong data-dcnode-id="242"><em data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Pointing the Schmidt telescope at Calar Alto, a volunteer scientist observing for the European Space Agency has discovered a new type of cataclysmic variable star, the first eclipsing stream-fed intermediate polar binary star. In this kind of “violent couple”, one of the stars (the white dwarf) pulls out matter from its partner (the red dwarf) towards its magnetic poles in huge streams of gas and dust.</span></em></strong></p><span data-dcnode-id="240" instrument_node="">
</span><p data-dcnode-id="229" style="text-align: justify;"><span data-dcnode-id="239" instrument_node="">Using the Calar Alto Schmidt telescope as part of the </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Situational_Awareness_Programme"><span data-dcnode-id="238" instrument_node="">Space Situational Awareness Program</span></a><span data-dcnode-id="236" instrument_node=""> of the </span><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.esa.int/About_Us/ESAC/Space_Situational_Awareness_-_SSA"><span data-dcnode-id="235" instrument_node="">European Space Agency</span></a><span data-dcnode-id="233" instrument_node=""> (ESA), </span><a data-dcnode-id="231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.erwinschwab.de/"><span data-dcnode-id="232" instrument_node="">Erwin Schwab</span></a><span data-dcnode-id="230" instrument_node="">, an amateur astronomer and volunteer scientist for ESA, was searching for the lost comet P/2012 K3 (Gibbs). In the night from July 26 to 27, 2019, he took series of images from the predicted position in the constellation Sagittarius. The comet was not there… Yet, during the data inspection, Schwab noticed a star in the field, which suddenly disappeared from one picture to the next.&nbsp; The faint variable object was cataloged as J1832.4-1627 from its coordinates on the sky. After further observing nights with the Schmidt and other telescopes, he was able to detect several deep eclipses of the star, which occurred every 9 hours or so.</span></p><span data-dcnode-id="228" instrument_node="">
</span><p class="readmore" data-dcnode-id="223"><span data-dcnode-id="227" instrument_node="">
</span><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14157-the-first-binary-star-of-its-kind-discovered-with-the-schmidt-telescope"><span data-dcnode-id="226" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="224" instrument_node="">
</span></p><span data-dcnode-id="222" instrument_node="">
</span><div class="item-separator" data-dcnode-id="221"></div><span data-dcnode-id="220" instrument_node="">
</span></div><span data-dcnode-id="218" instrument_node="">
</span></div><span data-dcnode-id="216" instrument_node="">
</span><div class="items-row cols-2 row-1 row-fluid" data-dcnode-id="152"><span data-dcnode-id="215" instrument_node="">
</span><div class="item column-1 span6" data-dcnode-id="184" itemprop="blogPost" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="214" instrument_node="">
</span><h2 class="contentheading" data-dcnode-id="209"><span data-dcnode-id="213" instrument_node="">
</span><a class="" data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14239-first-time-detection-of-oxygen-in-the-atmosphere-of-an-ultra-hot-exoplanet"><span data-dcnode-id="212" instrument_node="">
			First-time detection of oxygen in the atmosphere of an ultra-hot exoplanet</span></a><span data-dcnode-id="210" instrument_node="">
</span></h2><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><img alt="portada es" data-dcnode-id="207" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/stories/News2021/nasa-jpl-caltech.png&amp;raw" style="margin-bottom: 15px; margin-right: 15px; float: left;" width="450"></p><span data-dcnode-id="205" instrument_node="">
</span><p data-dcnode-id="202"><strong data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">December 22nd 2021</span></strong></p><span data-dcnode-id="201" instrument_node="">
</span><p data-dcnode-id="197" style="text-align: justify;"><strong data-dcnode-id="198"><em data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Reanalyzing CARMENES observations of the Kelt-9b exoplanet, taken at Calar Alto, an international team with participation of the Institute of Astrophysics of Andalusia (IAA-CSIC) has revealed the presence of oxygen in this exoplanet atmosphere, the hottest known to date. It is the very first time that atoms of oxygen are detected in a planet outside the Solar System.</span></em></strong></p><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194" style="text-align: justify;"><span data-dcnode-id="195" instrument_node="">Since the discovery, in 1995, of the first planet outside of our Solar System, more than four thousand exoplanets have been detected. During these decades, science teams from all over the world have tried to characterize their atmospheres and to explain why these new worlds are so different from the planets of the Solar System. Now, an international team, with participation of the Institute of Astrophysics of Andalusia, publishes in the Nature Astronomy journal the finding of atoms of oxygen in the exoplanet named Kelt-9b. It is the very first detection of the compound, that human beings commonly associate to life, in the atmosphere of an exoplanet.</span></p><span data-dcnode-id="193" instrument_node="">
</span><p class="readmore" data-dcnode-id="188"><span data-dcnode-id="192" instrument_node="">
</span><a data-dcnode-id="190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14239-first-time-detection-of-oxygen-in-the-atmosphere-of-an-ultra-hot-exoplanet"><span data-dcnode-id="191" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="189" instrument_node="">
</span></p><span data-dcnode-id="187" instrument_node="">
</span><div class="item-separator" data-dcnode-id="186"></div><span data-dcnode-id="185" instrument_node="">
</span></div><span data-dcnode-id="183" instrument_node="">
</span><div class="item column-2 span6" data-dcnode-id="154" itemprop="blogPost" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="182" instrument_node="">
</span><h2 class="contentheading" data-dcnode-id="177"><span data-dcnode-id="181" instrument_node="">
</span><a class="" data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14144-calar-alto-is-involved-in-an-international-campaign-to-study-changes-in-the-brightness-of-venus"><span data-dcnode-id="180" instrument_node="">
			Calar Alto is involved in an international campaign to study changes in the brightness of Venus</span></a><span data-dcnode-id="178" instrument_node="">
</span></h2><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="172"><strong data-dcnode-id="173"><img alt="venus01" data-dcnode-id="175" height="210" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/prel/VENUS/venus01.png&amp;raw" style="margin-right: 15px; margin-bottom: 15px; float: left;" width="380"><span data-dcnode-id="174" instrument_node="">September 24th 2021</span></strong></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="167" style="text-align: justify;"><strong data-dcnode-id="168"><em data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">The planet Venus is permanently covered by high clouds that extend over a thick atmosphere that hide from direct view the hottest planetary surface (about 460°C) in the Solar System. Three Calar Alto telescopes participate in an ambitious campaign of Venus observations combining data from different space missions and ground-based telescopes to understand Venus’ cloud layers and possible changes in the planet’s brightness. The first results of this campaign are presented these days at the Europlanet Science Congress.</span></em></strong></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164" style="text-align: justify;"><span data-dcnode-id="165" instrument_node="">Venus is the planet that has the closest approach to Earth, but its surface remains invisible, fully hidden by thick layers of clouds that reflect most of the sunlight making Venus the brightest planet as observed from Earth. Despite being so close and bright, Venus holds several mysteries in its atmosphere and its surface. One of the most recently discovered is the changes in the global brightness of the upper clouds detected when comparing images of Venus obtained on different years. What causes those changes, and what is their impact in the atmosphere and surface are still largely unknown.</span></p><span data-dcnode-id="163" instrument_node="">
</span><p class="readmore" data-dcnode-id="158"><span data-dcnode-id="162" instrument_node="">
</span><a data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14144-calar-alto-is-involved-in-an-international-campaign-to-study-changes-in-the-brightness-of-venus"><span data-dcnode-id="161" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="159" instrument_node="">
</span></p><span data-dcnode-id="157" instrument_node="">
</span><div class="item-separator" data-dcnode-id="156"></div><span data-dcnode-id="155" instrument_node="">
</span></div><span data-dcnode-id="153" instrument_node="">
</span></div><span data-dcnode-id="151" instrument_node="">
</span><div class="items-row cols-2 row-2 row-fluid" data-dcnode-id="75"><span data-dcnode-id="150" instrument_node="">
</span><div class="item column-1 span6" data-dcnode-id="116" itemprop="blogPost" itemscope="" itemtype="https://schema.org/BlogPosting"><span data-dcnode-id="149" instrument_node="">
</span><h2 class="contentheading" data-dcnode-id="144"><span data-dcnode-id="148" instrument_node="">
</span><a class="" data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14194-giant-planets-could-reach-maturity-sooner-than-expected"><span data-dcnode-id="147" instrument_node="">
			Giant planets could reach maturity sooner than expected</span></a><span data-dcnode-id="145" instrument_node="">
</span></h2><span data-dcnode-id="143" instrument_node="">
</span><p data-dcnode-id="141"><img alt="portada en" data-dcnode-id="142" height="269" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/prel/CARMENES-GIANT/portada_en.png&amp;raw" style="margin-right: 15px; margin-bottom: 15px; float: left;" width="450"></p><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="137"><strong data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">December 2nd 2021</span></strong></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="132" style="text-align: justify;"><strong data-dcnode-id="133"><em data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Calar Alto Observatory and the Institute of Astrophysics of Andalusia (IAA-CSIC) participate in the study of the giant planets of the V1298 Tauri system, which in just twenty million years have already reached their final size: a contraction time much shorter than expected. The finding has been possible thanks, in particular, to radial velocity measurements from the HARPS-N spectrographs, at Roque de los Muchachos Observatory (ORM), and from CARMENES, at Calar Alto Observatory (CAHA)</span></em></strong></p><span data-dcnode-id="131" instrument_node="">
</span><p data-dcnode-id="126" style="text-align: justify;"><span data-dcnode-id="130" instrument_node="">Current theories of planetary evolution predict that giant planets, such as Jupiter or Saturn, are born with large dimensions and very low densities and that, after hundreds of millions of years of slow contraction, they reach their final size. However, these expectations do not have corroborating evidence, and a recent finding shows that they may not correspond to reality in some cases. An international scientific team has measured the mass of the planets of the V1298 Tauri system, one of the youngest known, and concludes that the giant planets could complete their contraction much faster than expected. The result is published in the journal </span><em data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Nature Astronomy</span></em><span data-dcnode-id="127" instrument_node="">.</span></p><span data-dcnode-id="125" instrument_node="">
</span><p class="readmore" data-dcnode-id="120"><span data-dcnode-id="124" instrument_node="">
</span><a data-dcnode-id="122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14194-giant-planets-could-reach-maturity-sooner-than-expected"><span data-dcnode-id="123" instrument_node="">
					Read more ...</span></a><span data-dcnode-id="121" instrument_node="">
</span></p><span data-dcnode-id="119" instrument_node="">

</span><a class="" data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/news/releases-mainmenu-163/14105-remote-detection-of-viruses-on-surfaces"><span data-dcnode-id="112" instrument_node="">
			Remote detection of viruses on surfaces</span></a><span data-dcnode-id="110" instrument_node="">
</span></h2><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="106"><img alt="cclean foto1" data-dcnode-id="107" height="334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.caha.es/images/prel/INVCOVID19/cclean_foto1.jpg&amp;raw" style="margin-right: 15px; margin-bottom: 15px; float: left;" width="250"></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="101" style="text-align: justify;"><strong data-dcnode-id="102"><em data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">August 10th 2021</span></em></strong></p><span data-dcnode-id="100" instrument_node="">
</span><p data-dcnode-id="96" style="text-align: justify;"><strong data-dcnode-id="97"><em data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Researchers from the Universidad de Sevilla have developed and patented a prototype to detect remotely viruses (including synthetic SARS-CoV-2) deposited on surfaces, analyzing images taken at multiple wavelengths – the so-called hyperspectral imaging – a technique commonly used in astrophysics. Astronomers from Calar Alto and IAA-CSIC have participated in the reduction and analysis of the spectra. The research is ongoing on human samples of coronavirus.</span></em></strong></p><span data-dcnode-id="95" instrument_node="">
</span><p data-dcnode-id="87" style="text-align: justify;"><span data-dcnode-id="94" instrument_node="">A group of researchers based in Spain and, particularly, in Andalusia, has designed a new optical technique allowing them to detect the presence of viruses in drops of fluids or in dry residuals spread over a surface. The work is led by Prof. Emilio Gómez-González, full professor of applied physics at </span><a data-dcnode-id="92" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.etsi.us.es/en" rel="noopener" target="_blank"><span data-dcnode-id="93" instrument_node="">ETS Engineering School</span></a><span data-dcnode-id="91" instrument_node=""> at Universidad de Sevilla. The research, sponsored by the </span><a data-dcnode-id="89" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eng.isciii.es/eng.isciii.es/Paginas/Inicio.html" rel="noopener" target="_blank"><span data-dcnode-id="90" instrument_node="">Institute of Health ‘Carlos III’</span></a><span data-dcnode-id="88" instrument_node="">, has resulted in a patented technique able to analyze simultaneously numerous samples, without the need to touch them nor to use reagents.</span></p><span data-dcnode-id="86" instrument_node="">
</span><p class="readmore" data-dcnode-id="81"><span data-dcnode-id="85" instrument_node="">
