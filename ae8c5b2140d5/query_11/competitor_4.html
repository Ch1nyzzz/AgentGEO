</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="4836" id="firstHeading"><span data-dcnode-id="4837" instrument_node="">Astronomical seeing</span></h1><span data-dcnode-id="4835" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="571" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="580"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="4817" style="display:none"><span data-dcnode-id="4818" instrument_node="">Atmospheric distortions of light</span></div><span data-dcnode-id="4816" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4807"><div class="thumbinner" data-dcnode-id="4808" style="width:258px;"><a class="image" data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtmos_struct_imaging.svg"><img alt="" class="thumbimage" data-dcnode-id="4815" data-file-height="220" data-file-width="256" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Atmos_struct_imaging.svg/256px-Atmos_struct_imaging.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Atmos_struct_imaging.svg/384px-Atmos_struct_imaging.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Atmos_struct_imaging.svg/512px-Atmos_struct_imaging.svg.png 2x" width="256"></a><span data-dcnode-id="4813" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4809"><div class="magnify" data-dcnode-id="4811"><a class="internal" data-dcnode-id="4812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAtmos_struct_imaging.svg" title="Enlarge"></a></div><span data-dcnode-id="4810" instrument_node="">Schematic diagram illustrating how optical wavefronts from a distant star may be perturbed by a layer of turbulent mixing in the atmosphere. The vertical scale of the wavefronts plotted is highly exaggerated.</span></div></div></div><span data-dcnode-id="4806" instrument_node="">
</span><p data-dcnode-id="4756"><span data-dcnode-id="4805" instrument_node="">In </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy" title="Astronomy"><span data-dcnode-id="4804" instrument_node="">astronomy</span></a><span data-dcnode-id="4802" instrument_node="">, </span><b data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">seeing</span></b><span data-dcnode-id="4799" instrument_node=""> refers to the degradation of the </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_image" title="Real image"><span data-dcnode-id="4798" instrument_node="">image</span></a><span data-dcnode-id="4796" instrument_node=""> of an </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_object" title="Astronomical object"><span data-dcnode-id="4795" instrument_node="">astronomical object</span></a><span data-dcnode-id="4793" instrument_node=""> due to </span><a data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turbulence" title="Turbulence"><span data-dcnode-id="4792" instrument_node="">turbulent airflows</span></a><span data-dcnode-id="4790" instrument_node=""> in the </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atmosphere_of_Earth" title="Atmosphere of Earth"><span data-dcnode-id="4789" instrument_node="">atmosphere of Earth</span></a><span data-dcnode-id="4787" instrument_node=""> that may become visible as blurring, </span><a data-dcnode-id="4785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twinkling" title="Twinkling"><span data-dcnode-id="4786" instrument_node="">twinkling</span></a><span data-dcnode-id="4784" instrument_node=""> or variable </span><a data-dcnode-id="4782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distortion_%28optics%29" title="Distortion (optics)"><span data-dcnode-id="4783" instrument_node="">distortion</span></a><span data-dcnode-id="4781" instrument_node="">. The origin of this effect are rapidly changing variations of the optical </span><a data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refractive_index" title="Refractive index"><span data-dcnode-id="4780" instrument_node="">refractive index</span></a><span data-dcnode-id="4778" instrument_node=""> along the light path of the object.
Seeing is a major limitation to the </span><a data-dcnode-id="4776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angular_resolution" title="Angular resolution"><span data-dcnode-id="4777" instrument_node="">angular resolution</span></a><span data-dcnode-id="4775" instrument_node=""> in astronomical observations with </span><a data-dcnode-id="4773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="4774" instrument_node="">telescopes</span></a><span data-dcnode-id="4772" instrument_node=""> that would otherwise be </span><a data-dcnode-id="4770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angular_resolution%23The_Rayleigh_criterion" title="Angular resolution"><span data-dcnode-id="4771" instrument_node="">limited</span></a><span data-dcnode-id="4769" instrument_node=""> through </span><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="4768" instrument_node="">diffraction</span></a><span data-dcnode-id="4766" instrument_node=""> by the size of the telescope </span><a data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture" title="Aperture"><span data-dcnode-id="4765" instrument_node="">aperture</span></a><span data-dcnode-id="4763" instrument_node="">.
Today, many large scientific ground-based </span><a data-dcnode-id="4761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_telescope" title="Optical telescope"><span data-dcnode-id="4762" instrument_node="">optical telescopes</span></a><span data-dcnode-id="4760" instrument_node=""> include </span><a data-dcnode-id="4758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="4759" instrument_node="">adaptive optics</span></a><span data-dcnode-id="4757" instrument_node=""> to overcome seeing.
</span></p><p data-dcnode-id="4725"><span data-dcnode-id="4755" instrument_node="">The strength of seeing is often characterized by the angular diameter of the long-exposure image of a star (</span><i data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">seeing disk</span></i><span data-dcnode-id="4752" instrument_node="">) or by the </span><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fried_parameter" title="Fried parameter"><span data-dcnode-id="4751" instrument_node="">Fried parameter</span></a><span data-dcnode-id="4749" instrument_node=""> </span><i data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">r</span></i><sub data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">0</span></sub><span data-dcnode-id="4744" instrument_node="">. The diameter of the seeing disk is the </span><a data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_width_at_half_maximum" title="Full width at half maximum"><span data-dcnode-id="4743" instrument_node="">full width at half maximum</span></a><span data-dcnode-id="4741" instrument_node=""> of its optical intensity. An exposure time of several tens of milliseconds can be considered </span><i data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">long</span></i><span data-dcnode-id="4738" instrument_node=""> in this context. The Fried parameter describes the size of an imaginary telescope aperture for which the diffraction limited angular resolution is equal to the resolution limited by seeing. Both the size of the seeing disc and the Fried parameter depend on the optical wavelength, but it is common to specify them for 500 nanometers.
A seeing disk smaller than 0.4 </span><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minute_and_second_of_arc" title="Minute and second of arc"><span data-dcnode-id="4737" instrument_node="">arcseconds</span></a><span data-dcnode-id="4735" instrument_node=""> or a Fried parameter larger than 30 centimeters can be considered excellent seeing. The best conditions are typically found at high-altitude </span><a data-dcnode-id="4733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observatory" title="Observatory"><span data-dcnode-id="4734" instrument_node="">observatories</span></a><span data-dcnode-id="4732" instrument_node=""> on small islands such as </span><a class="mw-redirect" data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mauna_Kea_Observatory" title="Mauna Kea Observatory"><span data-dcnode-id="4731" instrument_node="">Mauna Kea</span></a><span data-dcnode-id="4729" instrument_node=""> or </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roque_de_los_Muchachos_Observatory" title="Roque de los Muchachos Observatory"><span data-dcnode-id="4728" instrument_node="">La Palma</span></a><span data-dcnode-id="4726" instrument_node="">.
</span></p><span data-dcnode-id="4724" instrument_node="">

</span><table class="wikitable" data-dcnode-id="4529" style="width:300px; float:right; margin: 1em 1em 1em 1em"><tbody data-dcnode-id="4530"><tr data-dcnode-id="4563"><td data-dcnode-id="4564"><a class="image" data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AZeta_bootis_short_exposure.png"><img alt="Zeta bootis short exposure.png" data-dcnode-id="4567" data-file-height="92" data-file-width="98" decoding="async" height="276" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/8/81/Zeta_bootis_short_exposure.png&amp;raw" width="294"></a><span data-dcnode-id="4565" instrument_node="">
</span></td></tr><tr data-dcnode-id="4531"><td data-dcnode-id="4532"><span data-dcnode-id="4560" instrument_node="">Typical short-exposure negative image of a binary star (</span><a data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeta_Bo%25C3%25B6tis" title="Zeta Boötis"><span data-dcnode-id="4559" instrument_node="">Zeta Boötis</span></a><span data-dcnode-id="4557" instrument_node=""> in this case) as seen through atmospheric seeing. Each star should appear as a single </span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disk" title="Airy disk"><span data-dcnode-id="4556" instrument_node="">Airy pattern</span></a><span data-dcnode-id="4554" instrument_node="">, but the atmosphere causes the images of the two stars to break up into two patterns of </span><i data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">speckles</span></i><span data-dcnode-id="4551" instrument_node=""> (one pattern above left, the other below right). The speckles are a little difficult to make out in this image due to the coarse pixel size on the camera used (see the simulated images below for a clearer example). The speckles move around rapidly, so that each star appears as a single fuzzy blob in long exposure images (called a </span><i data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">seeing disc</span></i><span data-dcnode-id="4548" instrument_node="">). The telescope used had a diameter of about 7</span><i data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">r</span></i><sub data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">0</span></sub><span data-dcnode-id="4543" instrument_node=""> (see definition of </span><i data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">r</span></i><sub data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">0</span></sub><span data-dcnode-id="4538" instrument_node=""> below, and example simulated image through a 7</span><i data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">r</span></i><sub data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">0</span></sub><span data-dcnode-id="4533" instrument_node=""> telescope).
</span></td></tr></tbody></table><span data-dcnode-id="4528" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4505"><div class="thumbinner" data-dcnode-id="4506" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="4524"><video class="thumbimage" data-dcnode-id="4527" data-durationhint="30" data-mwprovider="wikimediacommons" data-mwtitle="Szintillation.Sirius.480.webm" disabled="disabled" height="124" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Szintillation.Sirius.480.webm/220px--Szintillation.Sirius.480.webm.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="4525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASzintillation.Sirius.480.webm" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="4526"></span></a></span><span data-dcnode-id="4523" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4507"><div class="magnify" data-dcnode-id="4521"><a class="internal" data-dcnode-id="4522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASzintillation.Sirius.480.webm" title="Enlarge"></a></div><span data-dcnode-id="4520" instrument_node="">Twinkling of the brightest star of the night sky </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sirius" title="Sirius"><span data-dcnode-id="4519" instrument_node="">Sirius</span></a><span data-dcnode-id="4517" instrument_node=""> (</span><a data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apparent_magnitude" title="Apparent magnitude"><span data-dcnode-id="4516" instrument_node="">apparent magnitude</span></a><span data-dcnode-id="4514" instrument_node=""> = -1,1) in the evening shortly before </span><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culmination" title="Culmination"><span data-dcnode-id="4513" instrument_node="">culmination</span></a><span data-dcnode-id="4511" instrument_node=""> on the southern </span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meridian_%28astronomy%29" title="Meridian (astronomy)"><span data-dcnode-id="4510" instrument_node="">meridian</span></a><span data-dcnode-id="4508" instrument_node=""> at a height of 20 degrees above the horizon. During 29 seconds Sirius moves on an arc of 7.5 minutes from the left to the right.</span></div></div></div><span data-dcnode-id="4504" instrument_node="">
</span><p data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Astronomical seeing has several effects:
</span></p><span data-dcnode-id="4501" instrument_node="">
</span><ol data-dcnode-id="4461"><li data-dcnode-id="4490"><span data-dcnode-id="4500" instrument_node="">It causes the images of </span><a data-dcnode-id="4498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Point_source" title="Point source"><span data-dcnode-id="4499" instrument_node="">point sources</span></a><span data-dcnode-id="4497" instrument_node=""> (such as stars), which in the absence of atmospheric turbulence would be steady </span><a data-dcnode-id="4495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disk" title="Airy disk"><span data-dcnode-id="4496" instrument_node="">Airy patterns</span></a><span data-dcnode-id="4494" instrument_node=""> produced by diffraction, to break up into speckle patterns, which change very rapidly with time (the resulting speckled images can be processed using </span><a data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speckle_imaging" title="Speckle imaging"><span data-dcnode-id="4493" instrument_node="">speckle imaging</span></a><span data-dcnode-id="4491" instrument_node="">)</span></li><span data-dcnode-id="4489" instrument_node="">
</span><li data-dcnode-id="4485"><span data-dcnode-id="4488" instrument_node="">Long exposure images of these changing speckle patterns result in a blurred image of the point source, called a </span><i data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">seeing disc</span></i></li><span data-dcnode-id="4484" instrument_node="">
</span><li data-dcnode-id="4479"><span data-dcnode-id="4483" instrument_node="">The brightness of stars appears to fluctuate in a process known as </span><a class="mw-redirect" data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scintillation_%28astronomy%29" title="Scintillation (astronomy)"><span data-dcnode-id="4482" instrument_node="">scintillation</span></a><span data-dcnode-id="4480" instrument_node=""> or twinkling</span></li><span data-dcnode-id="4478" instrument_node="">
</span><li data-dcnode-id="4473"><span data-dcnode-id="4477" instrument_node="">Atmospheric seeing causes the fringes in an </span><a data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_interferometer" title="Astronomical interferometer"><span data-dcnode-id="4476" instrument_node="">astronomical interferometer</span></a><span data-dcnode-id="4474" instrument_node=""> to move rapidly</span></li><span data-dcnode-id="4472" instrument_node="">
</span><li data-dcnode-id="4462"><span data-dcnode-id="4471" instrument_node="">The distribution of atmospheric seeing through the atmosphere (the C</span><sub data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">N</span></sub><sup data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">2</span></sup><span data-dcnode-id="4466" instrument_node=""> profile described below) causes the image quality in </span><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="4465" instrument_node="">adaptive optics</span></a><span data-dcnode-id="4463" instrument_node=""> systems to degrade the further you look from the location of reference star</span></li></ol><span data-dcnode-id="4460" instrument_node="">
</span><p data-dcnode-id="4441"><span data-dcnode-id="4459" instrument_node="">The effects of atmospheric seeing were indirectly responsible for the belief that there were </span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martian_canal" title="Martian canal"><span data-dcnode-id="4458" instrument_node="">canals on Mars</span></a><span data-dcnode-id="4456" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4449" style="white-space:nowrap;"><span data-dcnode-id="4455" instrument_node="">[</span><i data-dcnode-id="4451"><a data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4453" title="This claim needs references to reliable sources. (January 2011)"><span data-dcnode-id="4454" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4450" instrument_node="">]</span></sup><span data-dcnode-id="4448" instrument_node="">  In viewing a bright object such as Mars, occasionally a </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isoplanetic_patch" title="Isoplanetic patch"><span data-dcnode-id="4447" instrument_node="">still patch</span></a><span data-dcnode-id="4445" instrument_node=""> of air will come in front of the planet, resulting in a brief moment of clarity.  Before the use of </span><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charge-coupled_device" title="Charge-coupled device"><span data-dcnode-id="4444" instrument_node="">charge-coupled devices</span></a><span data-dcnode-id="4442" instrument_node="">, there was no way of recording the image of the planet in the brief moment other than having the observer remember the image and draw it later.  This had the effect of having the image of the planet be dependent on the observer's memory and preconceptions which led the belief that Mars had linear features.
</span></p><p data-dcnode-id="4431"><span data-dcnode-id="4440" instrument_node="">The effects of atmospheric seeing are qualitatively similar throughout the visible and near </span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared" title="Infrared"><span data-dcnode-id="4439" instrument_node="">infrared</span></a><span data-dcnode-id="4437" instrument_node=""> wavebands. At large telescopes the long exposure image resolution is generally slightly higher at longer wavelengths, and the timescale (</span><i data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">t</span></i><sub data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">0</span></sub><span data-dcnode-id="4432" instrument_node=""> - see below) for the changes in the dancing speckle patterns is substantially lower.
</span></p><span data-dcnode-id="4430" instrument_node="">
</span><h2 data-dcnode-id="4420"><span class="mw-headline" data-dcnode-id="4428" id="Measures"><span data-dcnode-id="4429" instrument_node="">Measures</span></span><span class="mw-editsection" data-dcnode-id="4421"><span class="mw-editsection-bracket" data-dcnode-id="4426"><span data-dcnode-id="4427" instrument_node="">[</span></span><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_seeing%26action%3Dedit%26section%3D2" title="Edit section: Measures"><span data-dcnode-id="4425" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4419" instrument_node="">
</span><p data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">There are three common descriptions of the astronomical seeing conditions at an observatory:
</span></p><span data-dcnode-id="4416" instrument_node="">
</span><ul data-dcnode-id="4389"><li data-dcnode-id="4414"><span data-dcnode-id="4415" instrument_node="">The full width at half maximum (FWHM) of the seeing disc</span></li><span data-dcnode-id="4413" instrument_node="">
</span><li data-dcnode-id="4398"><i data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">r</span></i><sub data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">0</span></sub><span data-dcnode-id="4408" instrument_node=""> (the size of a typical "lump" of uniform air within the turbulent atmosphere</span><sup class="reference" data-dcnode-id="4405" id="cite_ref-1"><a data-dcnode-id="4406" href="#cite_note-1"><span data-dcnode-id="4407" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4404" instrument_node="">) and </span><i data-dcnode-id="4402"><span data-dcnode-id="4403" instrument_node="">t</span></i><sub data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">0</span></sub><span data-dcnode-id="4399" instrument_node=""> (the time-scale over which the changes in the turbulence become significant)</span></li><span data-dcnode-id="4397" instrument_node="">
</span><li data-dcnode-id="4390"><span data-dcnode-id="4396" instrument_node="">The C</span><sub data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">N</span></sub><sup data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">2</span></sup><span data-dcnode-id="4391" instrument_node=""> profile</span></li></ul><span data-dcnode-id="4388" instrument_node="">
</span><p data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">These are described in the sub-sections below:
</span></p><span data-dcnode-id="4385" instrument_node="">
</span><h3 data-dcnode-id="4374"><span data-dcnode-id="4384" id="The_full_width_at_half_maximum_.28FWHM.29_of_the_seeing_disc"></span><span class="mw-headline" data-dcnode-id="4382" id="The_full_width_at_half_maximum_(FWHM)_of_the_seeing_disc"><span data-dcnode-id="4383" instrument_node="">The full width at half maximum (FWHM) of the seeing disc</span></span><span class="mw-editsection" data-dcnode-id="4375"><span class="mw-editsection-bracket" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">[</span></span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_seeing%26action%3Dedit%26section%3D3" title="Edit section: The full width at half maximum (FWHM) of the seeing disc"><span data-dcnode-id="4379" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4373" instrument_node="">
</span><p data-dcnode-id="4352"><span data-dcnode-id="4372" instrument_node="">Without an atmosphere, a small star would have an apparent size, an "</span><a data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disk" title="Airy disk"><span data-dcnode-id="4371" instrument_node="">Airy disk</span></a><span data-dcnode-id="4369" instrument_node="">", in a telescope image determined by </span><a data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="4368" instrument_node="">diffraction</span></a><span data-dcnode-id="4366" instrument_node=""> and would be inversely proportional to the diameter of the telescope.  However, when light enters the </span><a class="mw-redirect" data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth%2527s_atmosphere" title="Earth's atmosphere"><span data-dcnode-id="4365" instrument_node="">Earth's atmosphere</span></a><span data-dcnode-id="4363" instrument_node="">, the different temperature layers and different wind speeds distort the light waves, leading to distortions in the image of a star. The effects of the atmosphere can be modeled as rotating cells of air moving turbulently. At most observatories, the turbulence is only significant on scales larger than </span><i data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">r</span></i><sub data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">0</span></sub><span data-dcnode-id="4358" instrument_node=""> (see below—the seeing parameter </span><i data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">r</span></i><sub data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">0</span></sub><span data-dcnode-id="4353" instrument_node=""> is 10–20&nbsp;cm at visible wavelengths under the best conditions) and this limits the resolution of telescopes to be about the same as given by a space-based 10–20&nbsp;cm telescope.
</span></p><p data-dcnode-id="4341"><span data-dcnode-id="4351" instrument_node="">The distortion changes at a high rate, typically more frequently than 100 times a second. In a typical astronomical image of a star with an </span><a class="mw-redirect" data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exposure_time" title="Exposure time"><span data-dcnode-id="4350" instrument_node="">exposure time</span></a><span data-dcnode-id="4348" instrument_node=""> of seconds or even minutes, the different distortions average out as a filled disc called the "seeing disc". The </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diameter" title="Diameter"><span data-dcnode-id="4347" instrument_node="">diameter</span></a><span data-dcnode-id="4345" instrument_node=""> of the seeing disk, most often defined as the </span><a data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_width_at_half_maximum" title="Full width at half maximum"><span data-dcnode-id="4344" instrument_node="">full width at half maximum</span></a><span data-dcnode-id="4342" instrument_node=""> (FWHM), is a measure of the astronomical seeing conditions.
</span></p><p data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">It follows from this definition that seeing is always a variable quantity, different from place to place, from night to night, and even variable on a scale of minutes. Astronomers often talk about "good" nights with a low average seeing disc diameter, and "bad" nights where the seeing diameter was so high that all observations were worthless.
</span></p><span data-dcnode-id="4338" instrument_node="">
</span><div data-dcnode-id="4305" style="float:right"><ul class="gallery mw-gallery-traditional" data-dcnode-id="4306"><span data-dcnode-id="4337" instrument_node="">
</span><li class="gallerybox" data-dcnode-id="4308" style="width: 155px"><div data-dcnode-id="4309" style="width: 155px"><span data-dcnode-id="4336" instrument_node="">
</span><div class="thumb" data-dcnode-id="4332" style="width: 150px;"><div data-dcnode-id="4333" style="margin:15px auto;"><a class="image" data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEps_aql_movie_not_2000.gif"><img alt="" data-dcnode-id="4335" data-file-height="128" data-file-width="128" decoding="async" height="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ed/Eps_aql_movie_not_2000.gif/120px-Eps_aql_movie_not_2000.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/e/ed/Eps_aql_movie_not_2000.gif 1.5x" width="120"></a></div></div><span data-dcnode-id="4331" instrument_node="">
</span><div class="gallerytext" data-dcnode-id="4311"><span data-dcnode-id="4330" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4329" instrument_node="">Slow motion movie of the image seen at a telescope when looking at a star at high magnification (negative images). The telescope used had a diameter of about 7</span><i data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">r</span></i><sub data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">0</span></sub><span data-dcnode-id="4324" instrument_node=""> (see definition of </span><i data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">r</span></i><sub data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">0</span></sub><span data-dcnode-id="4319" instrument_node=""> below, and example simulated image through a 7</span><i data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">r</span></i><sub data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">0</span></sub><span data-dcnode-id="4314" instrument_node=""> telescope). The star breaks up into multiple blobs (speckles) -- entirely an atmospheric effect. Some telescope vibration is also noticeable.
</span></p><span data-dcnode-id="4312" instrument_node="">
</span></div><span data-dcnode-id="4310" instrument_node="">
</span></div></li><span data-dcnode-id="4307" instrument_node="">
</span></ul></div><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4293"><span data-dcnode-id="4303" instrument_node="">The FWHM of the seeing disc (or just "seeing") is usually measured in </span><a class="mw-redirect" data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arcsecond" title="Arcsecond"><span data-dcnode-id="4302" instrument_node="">arcseconds</span></a><span data-dcnode-id="4300" instrument_node="">, abbreviated with the symbol (″). A 1.0″ seeing is a good one for average astronomical sites. The seeing of an urban environment is usually much worse. Good seeing nights tend to be clear, cold nights without wind gusts. Warm air rises (</span><a data-dcnode-id="4298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convection" title="Convection"><span data-dcnode-id="4299" instrument_node="">convection</span></a><span data-dcnode-id="4297" instrument_node="">), degrading the seeing, as do wind and clouds. At the best high-altitude mountaintop </span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observatory" title="Observatory"><span data-dcnode-id="4296" instrument_node="">observatories</span></a><span data-dcnode-id="4294" instrument_node="">, the wind brings in stable air which has not previously been in contact with the ground, sometimes providing seeing as good as 0.4".
</span></p><span data-dcnode-id="4292" instrument_node="">
</span><h3 data-dcnode-id="4274"><span class="mw-headline" data-dcnode-id="4282" id="r0_and_t0"><i data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">r</span></i><sub data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">0</span></sub><span data-dcnode-id="4287" instrument_node=""> and </span><i data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">t</span></i><sub data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">0</span></sub></span><span class="mw-editsection" data-dcnode-id="4275"><span class="mw-editsection-bracket" data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">[</span></span><a data-dcnode-id="4278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_seeing%26action%3Dedit%26section%3D4" title="Edit section: r0 and t0"><span data-dcnode-id="4279" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4273" instrument_node="">
</span><p data-dcnode-id="4261"><span data-dcnode-id="4272" instrument_node="">The astronomical seeing conditions at an observatory can be conveniently described by the parameters </span><i data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">r</span></i><sub data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">0</span></sub><span data-dcnode-id="4267" instrument_node=""> and </span><i data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">t</span></i><sub data-dcnode-id="4263"><span data-dcnode-id="4264" instrument_node="">0</span></sub><span data-dcnode-id="4262" instrument_node="">.
</span></p><p data-dcnode-id="4254"><span data-dcnode-id="4260" instrument_node="">For telescopes with diameters smaller than </span><i data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">r</span></i><sub data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">0</span></sub><span data-dcnode-id="4255" instrument_node="">, the resolution of long-exposure images is determined primarily by diffraction and the size of the Airy pattern and thus is inversely proportional to the telescope diameter.
</span></p><p data-dcnode-id="4219"><span data-dcnode-id="4253" instrument_node="">For telescopes with diameters larger than </span><i data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">r</span></i><sub data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">0</span></sub><span data-dcnode-id="4248" instrument_node="">, the image resolution is determined primarily by the atmosphere and is independent of telescope diameter, remaining constant at the value given by a telescope of diameter equal to </span><i data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">r</span></i><sub data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">0</span></sub><span data-dcnode-id="4243" instrument_node="">. </span><i data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">r</span></i><sub data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">0</span></sub><span data-dcnode-id="4238" instrument_node=""> also corresponds to the length-scale over which the turbulence becomes significant (10–20&nbsp;cm at visible wavelengths at good observatories), and </span><i data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">t</span></i><sub data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">0</span></sub><span data-dcnode-id="4233" instrument_node=""> corresponds to the time-scale over which the changes in the turbulence become significant. </span><i data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">r</span></i><sub data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">0</span></sub><span data-dcnode-id="4228" instrument_node=""> determines the spacing of the actuators needed in an </span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="4227" instrument_node="">adaptive optics</span></a><span data-dcnode-id="4225" instrument_node=""> system, and </span><i data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">t</span></i><sub data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">0</span></sub><span data-dcnode-id="4220" instrument_node=""> determines the correction speed required to compensate for the effects of the atmosphere.
</span></p><p data-dcnode-id="4207"><span data-dcnode-id="4218" instrument_node="">The parameters </span><i data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">r</span></i><sub data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">0</span></sub><span data-dcnode-id="4213" instrument_node=""> and </span><i data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">t</span></i><sub data-dcnode-id="4209"><span data-dcnode-id="4210" instrument_node="">0</span></sub><span data-dcnode-id="4208" instrument_node=""> vary with the wavelength used for the astronomical imaging, allowing slightly higher resolution imaging at longer wavelengths using large telescopes.
</span></p><p data-dcnode-id="4183"><span data-dcnode-id="4206" instrument_node="">The seeing parameter </span><i data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">r</span></i><sub data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">0</span></sub><span data-dcnode-id="4201" instrument_node=""> is often known as the </span><a data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fried_parameter" title="Fried parameter"><span data-dcnode-id="4200" instrument_node="">Fried parameter</span></a><span data-dcnode-id="4198" instrument_node=""> (pronounced "freed"), named after </span><a data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_L._Fried" title="David L. Fried"><span data-dcnode-id="4197" instrument_node="">David L. Fried</span></a><span data-dcnode-id="4195" instrument_node="">. The atmospheric time constant </span><i data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">t</span></i><sub data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">0</span></sub><span data-dcnode-id="4190" instrument_node=""> is often referred to as the </span><a data-dcnode-id="4188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwood_frequency" title="Greenwood frequency"><span data-dcnode-id="4189" instrument_node="">Greenwood time constant</span></a><span data-dcnode-id="4187" instrument_node="">, after </span><a class="new" data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDarryl_Greenwood%26action%3Dedit%26redlink%3D1" title="Darryl Greenwood (page does not exist)"><span data-dcnode-id="4186" instrument_node="">Darryl Greenwood</span></a><span data-dcnode-id="4184" instrument_node="">.
</span></p><span data-dcnode-id="4182" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="4119"><div class="thumbinner" data-dcnode-id="4120" style="width:222px;"><a class="image" data-dcnode-id="4139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAst_seeing_7r0.png"><img alt="" class="thumbimage" data-dcnode-id="4140" data-file-height="402" data-file-width="397" decoding="async" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Ast_seeing_7r0.png/220px-Ast_seeing_7r0.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Ast_seeing_7r0.png/330px-Ast_seeing_7r0.png 1.5x, //upload.wikimedia.org/wikipedia/commons/9/9e/Ast_seeing_7r0.png 2x" width="220"></a><span data-dcnode-id="4138" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4121"><div class="magnify" data-dcnode-id="4136"><a class="internal" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAst_seeing_7r0.png" title="Enlarge"></a></div><span data-dcnode-id="4135" instrument_node="">Simulated negative image showing what a single (point-like) star would look like through a ground-based telescope with a diameter of 7</span><i data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">r</span></i><sub data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">0</span></sub><span data-dcnode-id="4130" instrument_node="">, on the same angular scale as the 2</span><i data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">r</span></i><sub data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">0</span></sub><span data-dcnode-id="4125" instrument_node=""> image above. The atmosphere makes the image break up into several blobs (</span><i data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">speckles</span></i><span data-dcnode-id="4122" instr </span><h2 data-dcnode-id="1230"><span class="mw-headline" data-dcnode-id="1238" id="Mitigation"><span data-dcnode-id="1239" instrument_node="">Mitigation</span></span><span class="mw-editsection" data-dcnode-id="1231"><span class="mw-editsection-bracket" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">[</span></span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAstronomical_seeing%26action%3Dedit%26section%3D9" title="Edit section: Mitigation"><span data-dcnode-id="1235" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1229" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1219"><div class="thumbinner" data-dcnode-id="1220" style="width:152px;"><a class="image" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASeeing_Moon.gif"><img alt="" class="thumbimage" data-dcnode-id="1228" data-file-height="150" data-file-width="150" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/e/ef/Seeing_Moon.gif&amp;raw" width="150"></a><span data-dcnode-id="1226" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">An animated image of the </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="1224" instrument_node="">Moon</span></a><span data-dcnode-id="1222" instrument_node="">'s surface showing the effects of Earth's atmosphere on the view</span></div></div></div><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1217" instrument_node="">The first answer to this problem was </span><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speckle_imaging" title="Speckle imaging"><span data-dcnode-id="1216" instrument_node="">speckle imaging</span></a><span data-dcnode-id="1214" instrument_node="">, which allowed bright objects with simple morphology to be observed with diffraction-limited angular resolution. Later came </span><a data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NASA" title="NASA"><span data-dcnode-id="1213" instrument_node="">NASA</span></a><span data-dcnode-id="1211" instrument_node="">'s </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_Space_Telescope" title="Hubble Space Telescope"><span data-dcnode-id="1210" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1208" instrument_node="">, working outside the atmosphere and thus not having any seeing problems and allowing observations of faint targets for the first time (although with poorer resolution than speckle observations of bright sources from ground-based telescopes because of Hubble's smaller telescope diameter). The highest resolution visible and infrared images currently come from imaging optical </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_interferometer" title="Astronomical interferometer"><span data-dcnode-id="1207" instrument_node="">interferometers</span></a><span data-dcnode-id="1205" instrument_node=""> such as the </span><a class="mw-redirect" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navy_Prototype_Optical_Interferometer" title="Navy Prototype Optical Interferometer"><span data-dcnode-id="1204" instrument_node="">Navy Prototype Optical Interferometer</span></a><span data-dcnode-id="1202" instrument_node=""> or </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambridge_Optical_Aperture_Synthesis_Telescope" title="Cambridge Optical Aperture Synthesis Telescope"><span data-dcnode-id="1201" instrument_node="">Cambridge Optical Aperture Synthesis Telescope</span></a><span data-dcnode-id="1199" instrument_node="">, but those can only be used on very bright stars.
</span></p><p data-dcnode-id="1181"><span data-dcnode-id="1197" instrument_node="">Starting in the 1990s, many telescopes have developed </span><a data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="1196" instrument_node="">adaptive optics</span></a><span data-dcnode-id="1194" instrument_node=""> systems that partially solve the seeing problem. The best systems so far built, such as </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spectro-Polarimetric_High-Contrast_Exoplanet_Research" title="Spectro-Polarimetric High-Contrast Exoplanet Research"><span data-dcnode-id="1193" instrument_node="">SPHERE</span></a><span data-dcnode-id="1191" instrument_node=""> on the ESO </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Large_Telescope" title="Very Large Telescope"><span data-dcnode-id="1190" instrument_node="">VLT</span></a><span data-dcnode-id="1188" instrument_node=""> and </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gemini_Planet_Imager" title="Gemini Planet Imager"><span data-dcnode-id="1187" instrument_node="">GPI</span></a><span data-dcnode-id="1185" instrument_node=""> on the Gemini telescope, achieve a </span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strehl_ratio" title="Strehl ratio"><span data-dcnode-id="1184" instrument_node="">Strehl ratio</span></a><span data-dcnode-id="1182" instrument_node=""> of 90% at a wavelength of 2.2 micrometers, but only within a very small region of the sky at a time.
</span></p><span data-dcnode-id="1180" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="1168"><div class="thumbinner" data-dcnode-id="1169" style="width:222px;"><a class="image" data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Mix_of_Colours_and_Wonder.jpg"><img alt="" class="thumbimage" data-dcnode-id="1179" data-file-height="3326" data-file-width="7000" decoding="async" height="105" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/A_Mix_of_Colours_and_Wonder.jpg/220px-A_Mix_of_Colours_and_Wonder.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/A_Mix_of_Colours_and_Wonder.jpg/330px-A_Mix_of_Colours_and_Wonder.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/A_Mix_of_Colours_and_Wonder.jpg/440px-A_Mix_of_Colours_and_Wonder.jpg 2x" width="220"></a><span data-dcnode-id="1177" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1170"><div class="magnify" data-dcnode-id="1175"><a class="internal" data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_Mix_of_Colours_and_Wonder.jpg" title="Enlarge"></a></div><span data-dcnode-id="1174" instrument_node="">Astronomers can make use of an artificial star by shining a powerful laser to correct for the blurring caused by the atmosphere.</span><sup class="reference" data-dcnode-id="1171" id="cite_ref-11"><a data-dcnode-id="1172" href="#cite_note-11"><span data-dcnode-id="1173" instrument_node="">[11]</span></a></sup></div></div></div><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node=""> A wider field of view can be obtained by using multiple deformable mirrors conjugated to several atmospheric heights and measuring the vertical structure of the turbulence, in a technique known as Multiconjugate Adaptive Optics.
</span></p><div class="thumb tright" data-dcnode-id="1157"><div class="thumbinner" data-dcnode-id="1158" style="width:222px;"><a class="image" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJupiter_with_Lucky_Imaging.jpg"><img alt="" class="thumbimage" data-dcnode-id="1165" data-file-height="769" data-file-width="769" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/2/22/Jupiter_with_Lucky_Imaging.jpg/220px-Jupiter_with_Lucky_Imaging.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/2/22/Jupiter_with_Lucky_Imaging.jpg/330px-Jupiter_with_Lucky_Imaging.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/2/22/Jupiter_with_Lucky_Imaging.jpg/440px-Jupiter_with_Lucky_Imaging.jpg 2x" width="220"></a><span data-dcnode-id="1163" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1159"><div class="magnify" data-dcnode-id="1161"><a class="internal" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJupiter_with_Lucky_Imaging.jpg" title="Enlarge"></a></div><span data-dcnode-id="1160" instrument_node="">This amateur lucky imaging stack using the best of 1800 frames of Jupiter captured using a relatively small telescope approaches the theoretical maximum resolution for the telescope, rather than being limited by seeing.</span></div></div></div><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1155" instrument_node="">Another cheaper technique, </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucky_imaging" title="Lucky imaging"><span data-dcnode-id="1154" instrument_node="">lucky imaging</span></a><span data-dcnode-id="1152" instrument_node="">, has had good results on smaller telescopes. This idea dates back to pre-war naked-eye observations of moments of good seeing, which were followed by observations of the planets on cine film after </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="1151" instrument_node="">World War II</span></a><span data-dcnode-id="1149" instrument_node="">. The technique relies on the fact that every so often the effects of the atmosphere will be negligible, and hence by recording large numbers of images in real-time, a 'lucky' excellent image can be picked out. This happens more often when the number of r0-size </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isoplanetic_patch" title="Isoplanetic patch"><span data-dcnode-id="1148" instrument_node="">patches</span></a><span data-dcnode-id="1146" instrument_node=""> over the telescope pupil is not too large, and the technique consequently breaks down for very large telescopes. It can nonetheless outperform adaptive optics in some cases and is accessible to amateurs. It does require very much longer observation times than </span><a data-dcnode-id="1144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="1145" instrument_node="">adaptive optics</span></a><span data-dcnode-id="1143" instrument_node=""> for imaging faint targets, and is limited in its maximum resolution.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1136" style="white-space:nowrap;"><span data-dcnode-id="1142" instrument_node="">[</span><i data-dcnode-id="1138"><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1140" title="This claim needs references to reliable sources. (November 2016)"><span data-dcnode-id="1141" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1137" instrument_node="">]</span></sup><span data-dcnode-id="1135" instrument_node="">
</span></p><span data-dcnode-id="1133" instrument_node="">
