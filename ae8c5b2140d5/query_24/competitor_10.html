</span><span class="marker before-article" data-dcnode-id="1702"></span><div class="md-sentinel--spy-target" data-dcnode-id="1701"></div><section data-dcnode-id="1569" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1680"><strong data-dcnode-id="1698"><span data-dcnode-id="1700" id="ref842883"></span><span data-dcnode-id="1699" instrument_node="">Comet Shoemaker-Levy 9</span></strong><span data-dcnode-id="1697" instrument_node="">,  comet whose disrupted nucleus crashed into </span><span data-dcnode-id="1696" id="ref842885"></span><a class="md-crosslink" data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Jupiter-planet"><span data-dcnode-id="1695" instrument_node="">Jupiter</span></a><span data-dcnode-id="1693" instrument_node=""> over the period of July 16–22, 1994. The cataclysmic event, the first collision between two solar system bodies ever predicted and observed, was monitored from Earth-based </span><a class="md-crosslink" data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope"><span data-dcnode-id="1692" instrument_node="">telescopes</span></a><span data-dcnode-id="1690" instrument_node=""> worldwide, the </span><a class="md-crosslink" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope"><span data-dcnode-id="1689" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1687" instrument_node=""> and other </span><a class="md-crosslink" data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1686" instrument_node="">Earth</span></a><span data-dcnode-id="1684" instrument_node="">-orbiting instruments, and the </span><a class="md-crosslink" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Galileo-spacecraft"><span data-dcnode-id="1683" instrument_node="">Galileo</span></a><span data-dcnode-id="1681" instrument_node=""> spacecraft, which was en route to Jupiter.</span></p><span class="marker p1" data-dcnode-id="1678"></span><div class="assemblies" data-dcnode-id="1662"><div class="w-100" data-dcnode-id="1663"><figure class="md-assembly card print-false" data-assembly-id="71540" data-dcnode-id="1664"><div class="md-assembly-wrapper card-media" data-dcnode-id="1672" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1673" data-href="/media/1/687804/71540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/84/75384-050-EDB44779/Fragments-Comet-Shoemaker-Levy-9-pieces-comet-path-1992.jpg" style="--aspect-ratio: 16/9"><img alt="Comet Shoemaker-Levy 9" data-dcnode-id="1676" data-height="332" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/84/75384-050-EDB44779/Fragments-Comet-Shoemaker-Levy-9-pieces-comet-path-1992.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1674"><em class="material-icons link-blue" data-dcnode-id="1675" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1665"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1670" data-href="/media/1/687804/71540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/84/75384-050-EDB44779/Fragments-Comet-Shoemaker-Levy-9-pieces-comet-path-1992.jpg"><span data-dcnode-id="1671" instrument_node="">Comet Shoemaker-Levy 9</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Fragments of Comet Shoemaker-Levy 9 lined up along the comet's orbital path, in a composite of images taken by the Hubble Space Telescope in 1994. A close encounter with Jupiter in 1992 broke up the comet's single nucleus into more than 20 pieces, which subsequently assumed their notable “string-of-pearls” appearance.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">NASA/STScI/H.A. Weaver and T.E. Smith</span></cite></figcaption></figure></div></div><span class="marker AM1 am-inline" data-dcnode-id="1659"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1657"></span><p class="topic-paragraph" data-dcnode-id="1619"><span data-dcnode-id="1656" instrument_node="">On March 25, 1993, a previously unknown </span><a class="md-crosslink" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/comet-astronomy"><span data-dcnode-id="1655" instrument_node="">comet</span></a><span data-dcnode-id="1653" instrument_node=""> positioned close to Jupiter was discovered by </span><a class="md-crosslink" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Gene-Shoemaker"><span data-dcnode-id="1652" instrument_node="">Eugene</span></a><span data-dcnode-id="1650" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Carolyn-Shoemaker"><span data-dcnode-id="1649" instrument_node="">Carolyn Shoemaker</span></a><span data-dcnode-id="1647" instrument_node=""> and </span><a class="md-crosslink autoxref" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/David-Levy"><span data-dcnode-id="1646" instrument_node="">David Levy</span></a><span data-dcnode-id="1644" instrument_node=""> in photographs taken by using the 18-inch (46-cm) </span><a class="md-crosslink" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope/The-Schmidt-telescope%23ref44209"><span data-dcnode-id="1643" instrument_node="">Schmidt telescope</span></a><span data-dcnode-id="1641" instrument_node=""> at </span><a class="md-crosslink" data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Palomar-Observatory"><span data-dcnode-id="1640" instrument_node="">Palomar Observatory</span></a><span data-dcnode-id="1638" instrument_node=""> in </span><a class="md-crosslink autoxref" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/California-state"><span data-dcnode-id="1637" instrument_node="">California</span></a><span data-dcnode-id="1635" instrument_node="">. Its appearance was very unusual—it </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1633" data-term="comprised" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/comprised"><span data-dcnode-id="1634" instrument_node="">comprised</span></a><span data-dcnode-id="1632" instrument_node=""> at least a dozen active cometary nuclei lined up like glowing pearls on a string. As the nuclei spread farther apart, a total of 21 fragments were seen. An analysis of their common </span><a class="md-crosslink" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/orbit-astronomy"><span data-dcnode-id="1631" instrument_node="">orbit</span></a><span data-dcnode-id="1629" instrument_node=""> revealed that the original comet had been revolving about the </span><a class="md-crosslink" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1628" instrument_node="">Sun</span></a><span data-dcnode-id="1626" instrument_node=""> and had been captured into orbit around Jupiter, most probably around 1929. It had passed only 0.31 Jupiter radii, about 22,100 km [13,800 miles], above the cloud tops of Jupiter’s atmosphere on July 8, 1992. At that distance, tidal forces from the giant planet’s </span><a class="md-crosslink autoxref" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/gravity-physics"><span data-dcnode-id="1625" instrument_node="">gravity</span></a><span data-dcnode-id="1623" instrument_node=""> broke the original nucleus (estimated to be 1.6 km [1 mile] in diameter) into many pieces. The resulting 21 nuclei followed a highly </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1621" data-term="eccentric" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/eccentric"><span data-dcnode-id="1622" instrument_node="">eccentric</span></a><span data-dcnode-id="1620" instrument_node=""> two year orbit around Jupiter. Gravitational perturbations by the Sun then changed the orbit and lowered the perijove (point of closest approach to Jupiter) to less than the planet’s radius, causing the 21 nuclei to impact Jupiter in July 1994.</span></p><span class="marker p2" data-dcnode-id="1617"></span><span class="marker AM2 am-inline" data-dcnode-id="1615"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1613"></span><p class="topic-paragraph" data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">The train of fragments from Shoemaker-Levy 9 smashed into Jupiter’s atmosphere with a velocity of 221,000 km (137,300 miles) per hour beginning on July 16, 1994. They all hit on the unobservable night side beyond the limb of Jupiter as seen from Earth. Fortunately, NASA’s Galileo spacecraft, then en route to Jupiter, was in a position to see the night side and observed the impacts directly. For Earth-based observers, the planet’s 9.92-hour rotation period quickly brought each impact site into view. Separated in time by an average of seven to eight hours, each fragment plunged deep into the Jovian atmosphere, exploding with </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1610" data-term="tremendous" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/tremendous"><span data-dcnode-id="1611" instrument_node="">tremendous</span></a><span data-dcnode-id="1609" instrument_node=""> energy and creating a bubble of super-hot gas called a “fireball.” As the fireball rose back out of the Jovian atmosphere, it deposited dark clouds of ejecta on top of the Jovian clouds. aligned along a zone near latitude 44° S. Those clouds were composed of fine organic cometary dust and dust from the fireball burning in Jupiter’s atmosphere. About one-third of the fragments produced little or no observable effects, suggesting that their nuclei were very small, probably less than 100 metres (330 feet) in diameter.</span></p><span class="marker p3" data-dcnode-id="1606"></span><div class="assemblies" data-dcnode-id="1591"><div class="w-100" data-dcnode-id="1592"><figure class="md-assembly card print-false" data-assembly-id="71541" data-dcnode-id="1593"><div class="md-assembly-wrapper card-media" data-dcnode-id="1601" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1602" data-href="/media/1/687804/71541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/83/75383-050-144E53EE/southern-hemisphere-Jupiter-collisions-fragments-scars-Comet-July-22-1994.jpg" style="--aspect-ratio: 16/9"><img alt="Jupiter's southern hemisphere" data-dcnode-id="1605" data-height="1286" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/83/75383-050-144E53EE/southern-hemisphere-Jupiter-collisions-fragments-scars-Comet-July-22-1994.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1603"><em class="material-icons link-blue" data-dcnode-id="1604" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1594"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1599" data-href="/media/1/687804/71541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/83/75383-050-144E53EE/southern-hemisphere-Jupiter-collisions-fragments-scars-Comet-July-22-1994.jpg"><span data-dcnode-id="1600" instrument_node="">Jupiter's southern hemisphere</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Jupiter's southern hemisphere, showing several dark scars created by collisions of fragments of Comet Shoemaker-Levy 9. The image was made by the Hubble Space Telescope on July 22, 1994, the last day of the impacts.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">NASA/Hubble Space Telescope Comet Team</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="1589"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1587"></span><p class="topic-paragraph" data-dcnode-id="1576"><span data-dcnode-id="1586" instrument_node="">Astronomers labeled the individual fragments with capital letters in order of arrival. Fragment G, with an estimated diameter of 350–600 metres (1,100–2,000 feet), was probably the largest and heaviest. It left a multiringed black cloud larger than Earth’s diameter. Its impact delivered energy equivalent to at least 48 billion tons of </span><a class="md-crosslink" data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/trinitrotoluene"><span data-dcnode-id="1585" instrument_node="">TNT</span></a><span data-dcnode-id="1583" instrument_node="">—many times the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1581" data-term="yield" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/yield"><span data-dcnode-id="1582" instrument_node="">yield</span></a><span data-dcnode-id="1580" instrument_node=""> of the world’s supply of nuclear weapons. The dark clouds glowed warmly in </span><a class="md-crosslink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="1579" instrument_node="">infrared</span></a><span data-dcnode-id="1577" instrument_node=""> images of Jupiter as they slowly expanded and cooled over a few days, and they remained visible for weeks. They faded slowly and eventually disappeared.</span></p><span class="marker p4" data-dcnode-id="1574"></span><span class="marker AM4 am-inline" data-dcnode-id="1572"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1570"></span></section><span data-dcnode-id="1568" instrument_node="">

</span><div class="in-the-news-section mt-10" data-dcnode-id="1204"><span data-dcnode-id="1211" instrument_node="">
				Mar. 30, 2022, 6:18 PM ET -  Data from the Hubble Space Telescope has revealed </span><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2022/3/30/23002980/earendel-hubble-most-distant-star-gravitational-lensing-jwst" rel="noopener" target="_blank"><span data-dcnode-id="1210" instrument_node="">the most distant star</span></a><span data-dcnode-id="1208" instrument_node=""> ever observed. Officially known as WHL0137-LS, though called Earendel by the researchers who spotted it, the star's light took 12.9 billion years to reach Hubble, </span><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/feature/goddard/2022/record-broken-hubble-spots-farthest-star-ever-seen" rel="noopener" target="_blank"><span data-dcnode-id="1207" instrument_node="">according to NASA</span></a><span data-dcnode-id="1205" instrument_node="">.</span></div><span data-dcnode-id="1203" instrument_node="">
</span></div><span class="marker before-article" data-dcnode-id="1200"></span><div class="md-sentinel--spy-target" data-dcnode-id="1199"></div><section data-dcnode-id="840" data-has-spy="true" data-level="1" id="ref1"><div class="assemblies inline-video" data-dcnode-id="1177"><div class="w-100" data-dcnode-id="1178"><figure class="md-assembly card print-false" data-assembly-id="220323" data-dcnode-id="1179"><div class="md-assembly-wrapper card-media" data-dcnode-id="1192" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="1193" data-id="191912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/191912/astronomy-Hubble-Space-Telescope-impact" style="--aspect-ratio: 16/9"><img alt="How the Hubble Space Telescope works—and why it's important" data-dcnode-id="1198" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/12/191912-138-F307BA1E/astronomy-Hubble-Space-Telescope-impact.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="1194" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="1195" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="1180"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">How the Hubble Space Telescope works—and why it's important</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Learn about the Hubble Space Telescope's impact on astronomy.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">© Behind the News (</span><a class="external" data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//corporate.britannica.com/behind-the-news-abc-news-australia/" rel="noopener" target="_blank"><span data-dcnode-id="1186" instrument_node="">A Britannica Publishing Partner</span></a><span data-dcnode-id="1184" instrument_node="">)</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope/images-videos"><span data-dcnode-id="1182" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="1151"><strong data-dcnode-id="1174"><span data-dcnode-id="1176" id="ref82386"></span><span data-dcnode-id="1175" instrument_node="">Hubble Space Telescope (HST)</span></strong><span data-dcnode-id="1173" instrument_node="">,  the first </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1171" data-term="sophisticated" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/sophisticated"><span data-dcnode-id="1172" instrument_node="">sophisticated</span></a><span data-dcnode-id="1170" instrument_node=""> optical observatory placed into </span><a class="md-crosslink" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/orbit-astronomy"><span data-dcnode-id="1169" instrument_node="">orbit</span></a><span data-dcnode-id="1167" instrument_node=""> around </span><a class="md-crosslink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1166" instrument_node="">Earth</span></a><span data-dcnode-id="1164" instrument_node="">. Earth’s </span><a class="md-crosslink" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atmosphere"><span data-dcnode-id="1163" instrument_node="">atmosphere</span></a><span data-dcnode-id="1161" instrument_node=""> obscures ground-based astronomers’ view of celestial objects by absorbing or distorting </span><a class="md-crosslink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/light"><span data-dcnode-id="1160" instrument_node="">light</span></a><span data-dcnode-id="1158" instrument_node=""> rays from them. A </span><a class="md-crosslink" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope"><span data-dcnode-id="1157" instrument_node="">telescope</span></a><span data-dcnode-id="1155" instrument_node=""> stationed in outer space is entirely above the atmosphere, however, and receives images of much greater brightness, clarity, and detail than do ground-based telescopes with comparable </span><a class="md-crosslink" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optics"><span data-dcnode-id="1154" instrument_node="">optics</span></a><span data-dcnode-id="1152" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1149"></span><div class="assemblies" data-dcnode-id="1130"><div class="w-100" data-dcnode-id="1131"><figure class="md-assembly card print-false" data-assembly-id="11785" data-dcnode-id="1132"><div class="md-assembly-wrapper card-media" data-dcnode-id="1143" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1144" data-href="/media/1/274508/11785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg" style="--aspect-ratio: 16/9"><img alt="Hubble Space Telescope" data-dcnode-id="1147" data-height="707" data-width="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1145"><em class="material-icons link-blue" data-dcnode-id="1146" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1133"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1141" data-href="/media/1/274508/11785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg"><span data-dcnode-id="1142" instrument_node="">Hubble Space Telescope</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node="">Hubble Space Telescope in the cargo bay of the orbiting space shuttle </span><em data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Discovery</span></em><span data-dcnode-id="1137" instrument_node=""> (STS-82) after its servicing by astronauts and prior to its release, February 1997.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">NASA</span></cite></figcaption></figure></div></div><span class="marker AM1 am-inline" data-dcnode-id="1127"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1125"></span><p class="topic-paragraph" data-dcnode-id="1107"><span data-dcnode-id="1124" instrument_node="">After the </span><a class="md-crosslink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Congress-of-the-United-States"><span data-dcnode-id="1123" instrument_node="">U.S. Congress</span></a><span data-dcnode-id="1121" instrument_node=""> had authorized its construction in 1977, the Hubble Space Telescope (HST) was built under the supervision of the </span><a class="md-crosslink" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/NASA"><span data-dcnode-id="1120" instrument_node="">National Aeronautics and Space Administration</span></a><span data-dcnode-id="1118" instrument_node=""> (NASA) of the United States and was named after </span><span data-dcnode-id="1117" id="ref1285068"></span><a class="md-crosslink" data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble"><span data-dcnode-id="1116" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="1114" instrument_node="">, the foremost American astronomer of the 20th century. The HST was placed into orbit about 600 km (370 miles) above Earth by the crew of the </span><a class="md-crosslink" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/space-shuttle"><span data-dcnode-id="1113" instrument_node="">space shuttle</span></a><span data-dcnode-id="1111" instrument_node=""> </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Discovery</span></em><span data-dcnode-id="1108" instrument_node=""> on April 25, 1990.</span></p><span class="marker p2" data-dcnode-id="1105"></span><div class="assemblies" data-dcnode-id="1090"><div class="w-100" data-dcnode-id="1091"><figure class="md-assembly card print-false" data-assembly-id="11786" data-dcnode-id="1092"><div class="md-assembly-wrapper card-media" data-dcnode-id="1100" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1101" data-href="/media/1/274508/11786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg" style="--aspect-ratio: 16/9"><img alt="Hubble Space Telescope" data-dcnode-id="1104" data-height="300" data-width="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1102"><em class="material-icons link-blue" data-dcnode-id="1103" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1093"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1098" data-href="/media/1/274508/11786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg"><span data-dcnode-id="1099" instrument_node="">Hubble Space Telescope</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Cutaway of the NASA Hubble Space Telescope, revealing the Optical Telescope Assembly, the heart of the spacecraft, built by Hughes Danbury Optical Systems, Inc.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Courtesy of Hughes Danbury Optical Systems, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM2 am-inline" data-dcnode-id="1088"></span><a class="info-module quiz-module p-5 d-block border m-sm-50 mb-30" data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/quiz/a-history-of- </span></a><span class="marker MOD2 mod-inline" data-dcnode-id="1061"></span><p class="topic-paragraph" data-dcnode-id="1025"><span data-dcnode-id="1060" instrument_node="">The HST is a large reflecting telescope whose </span><a class="md-crosslink" data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/mirror-optics"><span data-dcnode-id="1059" instrument_node="">mirror</span></a><span data-dcnode-id="1057" instrument_node=""> </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1055" data-term="optics" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/optics"><span data-dcnode-id="1056" instrument_node="">optics</span></a><span data-dcnode-id="1054" instrument_node=""> gather light from celestial objects and direct it into two </span><a class="md-crosslink" data-dcnode-id="1052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/camera"><span data-dcnode-id="1053" instrument_node="">cameras</span></a><span data-dcnode-id="1051" instrument_node=""> and two spectrographs (which separate </span><a class="md-crosslink" data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/radiation"><span data-dcnode-id="1050" instrument_node="">radiation</span></a><span data-dcnode-id="1048" instrument_node=""> into a spectrum and record the spectrum). The HST has a 2.4-metre (94-inch) primary mirror, a smaller secondary mirror, and various recording instruments that can detect visible, </span><a class="md-crosslink" data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ultraviolet-radiation"><span data-dcnode-id="1047" instrument_node="">ultraviolet</span></a><span data-dcnode-id="1045" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="1044" instrument_node="">infrared light</span></a><span data-dcnode-id="1042" instrument_node="">. The most important of these instruments, the </span><span data-dcnode-id="1041" id="ref82387"></span><a class="md-crosslink" data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/wide-field-planetary-camera"><span data-dcnode-id="1040" instrument_node="">wide-field planetary camera</span></a><span data-dcnode-id="1038" instrument_node="">, can take either wide-field or high-resolution images of the </span><a class="md-crosslink" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/planet"><span data-dcnode-id="1037" instrument_node="">planets</span></a><span data-dcnode-id="1035" instrument_node=""> and of galactic and extragalactic objects. This camera is designed to achieve image resolutions 10 times greater than that of even the largest Earth-based telescope. A faint-object camera can detect an object 50 times fainter than anything observable by any ground-based telescope; a faint-object spectrograph gathers data on the object’s chemical </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1033" data-term="composition" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/composition"><span data-dcnode-id="1034" instrument_node="">composition</span></a><span data-dcnode-id="1032" instrument_node="">. A high-resolution spectrograph receives distant objects’ </span><a class="md-crosslink autoxref" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ultraviolet-radiation"><span data-dcnode-id="1031" instrument_node="">ultraviolet light</span></a><span data-dcnode-id="1029" instrument_node=""> that cannot reach Earth because of atmospheric </span><a class="md-crosslink" data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/absorption-physics"><span data-dcnode-id="1028" instrument_node="">absorption</span></a><span data-dcnode-id="1026" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="1023"></span><div class="assemblies" data-dcnode-id="1008"><div class="w-100" data-dcnode-id="1009"><figure class="md-assembly card print-false" data-assembly-id="11789" data-dcnode-id="1010"><div class="md-assembly-wrapper card-media" data-dcnode-id="1018" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1019" data-href="/media/1/274508/11789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg" style="--aspect-ratio: 16/9"><img alt="MyCn18 nebula" data-dcnode-id="1022" data-height="450" data-width="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1020"><em class="material-icons link-blue" data-dcnode-id="1021" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1011"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1016" data-href="/media/1/274508/11789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg"><span data-dcnode-id="1017" instrument_node="">MyCn18 nebula</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Image of MyCn18, a young planetary nebula located about 8,000 light-years away, taken with the Wide Field and Planetary Camera 2 aboard NASA's Hubble Space Telescope.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Photo AURA/STScl/NASA/JPL (NASA photo # STScl-PRC96-07)</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="1006"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1004"></span><p class="topic-paragraph" data-dcnode-id="982"><span data-dcnode-id="1003" instrument_node="">About one month after launch, it became apparent that the HST’s large primary mirror had been ground to the wrong shape owing to faulty testing procedures by the mirror’s manufacturer. The resulting optical defect, spherical </span><a class="md-crosslink" data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/aberration"><span data-dcnode-id="1002" instrument_node="">aberration</span></a><span data-dcnode-id="1000" instrument_node="">, caused the mirror to produce fuzzy rather than sharp images. The HST also developed problems with its </span><a class="md-crosslink" data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/gyroscope"><span data-dcnode-id="999" instrument_node="">gyroscopes</span></a><span data-dcnode-id="997" instrument_node=""> and with its </span><a class="md-crosslink" data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/solar-power-1868606"><span data-dcnode-id="996" instrument_node="">solar-power</span></a><span data-dcnode-id="994" instrument_node=""> arrays. On December 2–13, 1993, a mission of the NASA space shuttle </span><em data-dcnode-id="990"><span data-dcnode-id="993" id="ref82388"></span><a class="md-crosslink" data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Endeavour-United-States-space-shuttle"><span data-dcnode-id="992" instrument_node="">Endeavour</span></a></em><span data-dcnode-id="989" instrument_node=""> sought to correct the telescope’s optical system and other problems. In five space walks, the shuttle astronauts replaced the HST’s wide-field planetary camera and installed a new device containing 10 tiny mirrors to correct the light paths from the primary mirror to the other three scientific instruments. The mission proved an unqualified success, and the HST soon began operating at its full potential, returning spectacular </span><a class="md-crosslink" data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/technology-of-photography"><span data-dcnode-id="988" instrument_node="">photographs</span></a><span data-dcnode-id="986" instrument_node=""> of various </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="984" data-term="cosmic" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/cosmic"><span data-dcnode-id="985" instrument_node="">cosmic</span></a><span data-dcnode-id="983" instrument_node=""> phenomena.</span></p><span class="marker p4" data-dcnode-id="980"></span><span class="marker AM4 am-inline" data-dcnode-id="978"></span><span class="marker MOD4 mod-inline" data-dcnode-id="976"></span><p class="topic-paragraph" data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">Three subsequent space shuttle missions in 1997, 1999, and 2002 repaired the HST’s gyroscopes and added new instruments including a near-infrared spectrometer and a wide-field camera. The final space shuttle mission to service the HST, intended to install a new camera and an ultraviolet spectrograph, was launched in 2009. The HST is scheduled to remain operational through at least 2021, after which it is expected to be replaced by the </span><a class="md-crosslink" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/James-Webb-Space-Telescope"><span data-dcnode-id="974" instrument_node="">James Webb Space Telescope</span></a><span data-dcnode-id="972" instrument_node="">, equipped with a mirror seven times larger than that of the HST.</span></p><span class="marker p5" data-dcnode-id="969"></span><div class="assemblies medialist slider js-slider position-relative d-inline-flex align-items-center mw-100" data-dcnode-id="931" data-type="other"><div class="slider-container js-slider-container overflow-hidden d-flex rw-slider rw-prev-disabled" data-dcnode-id="936"><div class="rw-track d-flex align-items-center" data-dcnode-id="937"><div class="rw-slide col-100 px-20" data-dcnode-id="952"><figure class="md-assembly card print-false" data-assembly-id="126945" data-dcnode-id="953"><div class="md-assembly-wrapper card-media" data-dcnode-id="964" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="965" data-href="/media/1/274508/126945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg" style="--aspect-ratio: 16/9"><img alt="astronauts John Grunsfeld and Richard Linnehan with the Hubble Space Telescope, 2002" data-dcnode-id="968" data-height="1600" data-width="1592" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="966"><em class="material-icons link-blue" data-dcnode-id="967" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="954"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="962" data-href="/media/1/274508/126945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg"><span data-dcnode-id="963" instrument_node="">astronauts John Grunsfeld and Richard Linnehan with the Hubble Space Telescope, 2002</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="957"><span data-dcnode-id="961" instrument_node="">Astronauts John Grunsfeld and Richard Linnehan near the Hubble Space Telescope, temporarily hosted in the space shuttle </span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Columbia</span></em><span data-dcnode-id="958" instrument_node="">'s cargo bay, March 8, 2002.</span></div><cite class="credit d-block mt-5" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">NASA</span></cite></figcaption></figure></div><div class="rw-slide col-100 px-20" data-dcnode-id="938"><figure class="md-assembly card print-false" data-assembly-id="230722" data-dcnode-id="939"><div class="md-assembly-wrapper card-media" data-dcnode-id="947" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="948" data-href="/media/1/274508/230722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg" style="--aspect-ratio: 16/9"><img alt="Sagittarius star cloud" data-dcnode-id="951" data-height="1570" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="949"><em class="material-icons link-blue" data-dcnode-id="950" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="940"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="945" data-href="/media/1/274508/230722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg"><span data-dcnode-id="946" instrument_node="">Sagittarius star cloud</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">The Hubble Space Telescope captured this dazzling image of a star cloud in the constellation Sagittarius. Most of these stars are fairly faint and are orange or red, which are the main colours of the Sun. The blue and green stars are hotter than the Sun, while the bright red stars are red giants, which are much cooler stars that are near the end of their lives.</span></div><cite class="credit d-block mt-5" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">The Hubble Heritage Team (AURA/STScI/NASA)</span></cite></figcaption></figure></div></div></div><button class="prev-button js-prev-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20 rw-disabled" data-dcnode-id="934" disabled=""><span class="material-icons" data-dcnode-id="935" data-icon="keyboard_arrow_left"></span></button><button class="next-button js-next-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20" data-dcnode-id="932"><span class="material-icons" data-dcnode-id="933" data-icon="keyboard_arrow_right"></span></button></div><span class="marker AM5 am-inline" data-dcnode-id="929"></span><span class="marker MOD5 mod-inline" data-dcnode-id="927"></span><div class="assemblies inline-video" data-dcnode-id="908"><div class="w-100" data-dcnode-id="909"><figure class="md-assembly card print-false" data-assembly-id="245559" data-dcnode-id="910"><div class="md-assembly-wrapper card-media" data-dcnode-id="920" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="921" data-id="214997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/214997/Hubble-Space-Telescope-overview-important-discoveries" style="--aspect-ratio: 16/9"><img alt="Explore the working principle of the Hubble Space Telescope" data-dcnode-id="926" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/97/214997-138-39BD486D/Hubble-Space-Telescope-overview-important-discoveries.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="922" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="923" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="911"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Explore the working principle of the Hubble Space Telescope</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Overview of the Hubble Space Telescope, including how it works and its important discoveries.</span></div><cite class="credit d-block mt-5" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Encyclopædia Britannica, Inc.</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope/images-videos"><span data-dcnode-id="913" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="862"><span data-dcnode-id="907" instrument_node="">The HST’s discoveries have revolutionized </span><a class="md-crosslink" data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy"><span data-dcnode-id="906" instrument_node="">astronomy</span></a><span data-dcnode-id="904" instrument_node="">. Observations of </span><span data-dcnode-id="903" id="ref1285066"></span><a class="md-crosslink" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Cepheid-variable"><span data-dcnode-id="902" instrument_node="">Cepheid variables</span></a><span data-dcnode-id="900" instrument_node=""> in nearby </span><a class="md-crosslink" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="899" instrument_node="">galaxies</span></a><span data-dcnode-id="897" instrument_node=""> allowed the first accurate determination of </span><span data-dcnode-id="896" id="ref1285067"></span><a class="md-crosslink" data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Hubble-constant"><span data-dcnode-id="895" instrument_node="">Hubble’s constant</span></a><span data-dcnode-id="893" instrument_node="">, which is the rate of the </span><a class="md-crosslink autoxref" data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/universe"><span data-dcnode-id="892" instrument_node="">universe’s</span></a><span data-dcnode-id="890" instrument_node=""> expansion. The HST photographed young </span><a class="md-crosslink" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="889" instrument_node="">stars</span></a><span data-dcnode-id="887" instrument_node=""> with disks that will eventually become planetary systems. The </span><span data-dcnode-id="886" id="ref1244461"></span><a class="md-crosslink" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Deep-Field"><span data-dcnode-id="885" instrument_node="">Hubble Deep Field</span></a><span data-dcnode-id="883" instrument_node="">, a photograph of about 1,500 galaxies, revealed galactic evolution over nearly the entire history of the universe. Within the </span><a class="md-crosslink" data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="882" instrument_node="">solar system</span></a><span data-dcnode-id="880" instrument_node="">, the HST was also used to discover </span><span data-dcnode-id="879" id="ref1262238"></span><a class="md-crosslink" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hydra-moon-of-Pluto"><span data-dcnode-id="878" instrument_node="">Hydra</span></a><span data-dcnode-id="876" instrument_node=""> and </span><span data-dcnode-id="875" id="ref1262239"></span><a class="md-crosslink" data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Nix-moon-of-Pluto"><span data-dcnode-id="874" instrument_node="">Nix</span></a><span data-dcnode-id="872" instrument_node="">, two </span><a class="md-crosslink" data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/moon-natural-satellite"><span data-dcnode-id="871" instrument_node="">moons</span></a><span data-dcnode-id="869" instrument_node=""> of the </span><a class="md-crosslink" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/dwarf-planet"><span data-dcnode-id="868" instrument_node="">dwarf planet</span></a><span data-dcnode-id="866" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Pluto-dwarf-planet"><span data-dcnode-id="865" instrument_node="">Pluto</span></a><span data-dcnode-id="863" instrument_node="">.</span></p><span class="marker p6" data-dcnode-id="860"></span><div class="assemblies" data-dcnode-id="845"><div class="w-100" data-dcnode-id="846"><figure class="md-assembly card print-false" data-assembly-id="11788" data-dcnode-id="847"><div class="md-assembly-wrapper card-media" data-dcnode-id="855" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="856" data-href="/media/1/274508/11788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/34/1334-004-8DD71496/NGC-604-image-Hubble-Space-Telescope-Triangulum.jpg" style="--aspect-ratio: 16/9"><img alt="NGC 604 nebula" data-dcnode-id="859" data-height="300" data-width="280" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/34/1334-004-8DD71496/NGC-604-image-Hubble-Space-Telescope-Triangulum.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="857"><em class="material-icons link-blue" data-dcnode-id="858" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="848"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="853" data-href="/media/1/274508/11788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/34/1334-004-8DD71496/NGC-604-image-Hubble-Space-Telescope-Triangulum.jpg"><span data-dcnode-id="854" instrument_node="">NGC 604 nebula</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Hubble Space Telescope image of NGC 604, a nebula in the neighbouring spiral galaxy M33, located 2.7 million light-years away in the constellation Triangulum.</span></div><cite class="credit d-block mt-5" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Hui Yang (University of Illinois), Jeff J. Hester (University of Arizona), and the National Aeronautics and Space Administration</span></cite></figcaption></figure></div></div><span class="marker AM6 am-inline" data-dcnode-id="843"></span><span class="marker MOD6 mod-inline" data-dcnode-id="841"></span></section><span data-dcnode-id="839" instrument_node=""> </span><span class="md-signature" data-dcnode-id="836"><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/editor/The-Editors-of-Encyclopaedia-Britannica/4419"><span data-dcnode-id="838" instrument_node="">The Editors of Encyclopaedia Britannica</span></a></span><span class="md-signature" data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">This article was most recently revised and updated by </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/editor/Erik-Gregersen/6723"><span data-dcnode-id="834" instrument_node="">Erik Gregersen</span></a><span data-dcnode-id="832" instrument_node="">.</span></span><span class="marker end-of-content" data-dcnode-id="829"></span><span class="marker after-article" data-dcnode-id="827"></span></div><span data-dcnode-id="825" instrument_node="">
