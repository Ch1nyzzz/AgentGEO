</span><span class="marker before-article" data-dcnode-id="1726"></span><div class="md-sentinel--spy-target" data-dcnode-id="1725"></div><section data-dcnode-id="1531" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1698"><strong data-dcnode-id="1722"><span data-dcnode-id="1724" id="ref225755"></span><span data-dcnode-id="1723" instrument_node="">Magellanic Cloud</span></strong><span data-dcnode-id="1721" instrument_node="">,  either of two satellite </span><a class="md-crosslink" data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1720" instrument_node="">galaxies</span></a><span data-dcnode-id="1718" instrument_node=""> of the </span><a class="md-crosslink" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Milky-Way-Galaxy"><span data-dcnode-id="1717" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1715" instrument_node="">, the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1713" data-term="vast" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/vast"><span data-dcnode-id="1714" instrument_node="">vast</span></a><span data-dcnode-id="1712" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1711" instrument_node="">star</span></a><span data-dcnode-id="1709" instrument_node=""> system of which </span><a class="md-crosslink" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1708" instrument_node="">Earth</span></a><span data-dcnode-id="1706" instrument_node=""> is a minor component. These companion galaxies were named for the Portuguese navigator </span><span data-dcnode-id="1705" id="ref225756"></span><a class="md-crosslink" data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Ferdinand-Magellan"><span data-dcnode-id="1704" instrument_node="">Ferdinand Magellan</span></a><span data-dcnode-id="1702" instrument_node="">, whose crew discovered them during the first voyage around the world (1519–22). The Magellanic Clouds were recognized early in the 20th century as companion objects to the Milky Way Galaxy. When American astronomer </span><a class="md-crosslink" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble"><span data-dcnode-id="1701" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="1699" instrument_node=""> established the extragalactic nature of what are now called galaxies, it became plain that the Magellanic Clouds had to be separate systems.</span></p><span class="marker p1" data-dcnode-id="1696"></span><div class="assemblies medialist slider js-slider position-relative d-inline-flex align-items-center mw-100" data-dcnode-id="1661" data-type="other"><div class="slider-container js-slider-container overflow-hidden d-flex rw-slider rw-prev-disabled" data-dcnode-id="1666"><div class="rw-track d-flex align-items-center" data-dcnode-id="1667"><div class="rw-slide col-100 px-20" data-dcnode-id="1681"><figure class="md-assembly card print-false" data-assembly-id="17787" data-dcnode-id="1682"><div class="md-assembly-wrapper card-media" data-dcnode-id="1690" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1691" data-href="/media/1/356551/17787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/47/21247-050-3EBE4755/composite-NGC-1850-cluster-Large-Magellanic-Cloud-1850.jpg" style="--aspect-ratio: 16/9"><img alt="globular cluster NGC 1850 in the Large Magellanic Cloud" data-dcnode-id="1694" data-height="1519" data-width="1502" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/47/21247-050-3EBE4755/composite-NGC-1850-cluster-Large-Magellanic-Cloud-1850.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1692"><em class="material-icons link-blue" data-dcnode-id="1693" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1683"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1688" data-href="/media/1/356551/17787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/47/21247-050-3EBE4755/composite-NGC-1850-cluster-Large-Magellanic-Cloud-1850.jpg"><span data-dcnode-id="1689" instrument_node="">globular cluster NGC 1850 in the Large Magellanic Cloud</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">  Most of the globular cluster NGC 1850 consists of yellow stars; the bright white stars are members of a second, open cluster about 200 light-years beyond NGC 1850. This picture is a composite of images taken by the Hubble Space Telescope. </span></div><cite class="credit d-block mt-5" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">R. Gilmozzi, Space Telescope Science Institute/European Space Agency; Shawn Ewald, JPL; and NASA</span></cite></figcaption></figure></div><div class="rw-slide col-100 px-20" data-dcnode-id="1668"><figure class="md-assembly card print-false" data-assembly-id="17797" data-dcnode-id="1669"><div class="md-assembly-wrapper card-media" data-dcnode-id="1675" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1676" data-href="/media/1/356551/17797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/56/21256-004-7D4BF2A3/remnants-N132D-supernova-Large-Magellanic-Cloud-Hubble.jpg" style="--aspect-ratio: 16/9"><img alt="N132D, remnants of a supernova in the Large Magellanic Cloud, as observed by the Hubble Space Telescope." data-dcnode-id="1679" data-height="300" data-width="301" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/56/21256-004-7D4BF2A3/remnants-N132D-supernova-Large-Magellanic-Cloud-Hubble.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1677"><em class="material-icons link-blue" data-dcnode-id="1678" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1670"><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">N132D, remnants of a supernova in the Large Magellanic Cloud, as observed by the Hubble Space Telescope.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Photo AURA/STScI/NASA/JPL (NASA photo # STScI-PF95-13)</span></cite></figcaption></figure></div></div></div><button class="prev-button js-prev-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20 rw-disabled" data-dcnode-id="1664" disabled=""><span class="material-icons" data-dcnode-id="1665" data-icon="keyboard_arrow_left"></span></button><button class="next-button js-next-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20" data-dcnode-id="1662"><span class="material-icons" data-dcnode-id="1663" data-icon="keyboard_arrow_right"></span></button></div><span class="marker AM1 am-inline" data-dcnode-id="1659"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1657"></span><p class="topic-paragraph" data-dcnode-id="1641"><span data-dcnode-id="1656" instrument_node="">The Magellanic Clouds are irregular galaxies that share a gaseous envelope and lie about 22° apart in the sky near the south celestial pole. One of them, the </span><span data-dcnode-id="1655" id="ref225757"></span><a class="md-crosslink" data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Large-Magellanic-Cloud"><span data-dcnode-id="1654" instrument_node="">Large Magellanic Cloud</span></a><span data-dcnode-id="1652" instrument_node=""> (LMC), is a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1650" data-term="luminous" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/luminous"><span data-dcnode-id="1651" instrument_node="">luminous</span></a><span data-dcnode-id="1649" instrument_node=""> patch about 5° in diameter, and the other, the </span><span data-dcnode-id="1648" id="ref225758"></span><a class="md-crosslink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Small-Magellanic-Cloud"><span data-dcnode-id="1647" instrument_node="">Small Magellanic Cloud</span></a><span data-dcnode-id="1645" instrument_node=""> (SMC), measures less than 2° across. The Magellanic Clouds are visible to the unaided eye in the Southern Hemisphere, but they cannot be observed from most northern latitudes. The LMC is about 160,000 </span><a class="md-crosslink" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/light-year"><span data-dcnode-id="1644" instrument_node="">light-years</span></a><span data-dcnode-id="1642" instrument_node=""> from Earth, and the SMC lies 190,000 light-years away. The LMC and SMC are 14,000 and 7,000 light-years in diameter, respectively—smaller than the Milky Way Galaxy, which is about 140,000 light-years across.</span></p><span class="marker p2" data-dcnode-id="1639"></span><div class="assemblies" data-dcnode-id="1624"><div class="w-100" data-dcnode-id="1625"><figure class="md-assembly card print-false" data-assembly-id="138846" data-dcnode-id="1626"><div class="md-assembly-wrapper card-media" data-dcnode-id="1634" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1635" data-href="/media/1/356551/138846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/39/136039-050-FD49B29B/Infant-stars-Small-Magellanic-Cloud.jpg" style="--aspect-ratio: 16/9"><img alt="Small Magellanic Cloud" data-dcnode-id="1638" data-height="1600" data-width="1499" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/39/136039-050-FD49B29B/Infant-stars-Small-Magellanic-Cloud.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1636"><em class="material-icons link-blue" data-dcnode-id="1637" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1627"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1632" data-href="/media/1/356551/138846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/39/136039-050-FD49B29B/Infant-stars-Small-Magellanic-Cloud.jpg"><span data-dcnode-id="1633" instrument_node="">Small Magellanic Cloud</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Infant stars in the Small Magellanic Cloud.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">A. Nota–ESA/NASA</span></cite></figcaption></figure></div></div><span class="marker AM2 am-inline" data-dcnode-id="1622"></span><a class="info-module read-more-module p-5 d-block border m-sm-50" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy%23ref559175"><span data-dcnode-id="1621" instrument_node="">

</span><div class="question font-14 text-muted lh-base" data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">It is now known that the nearest external galaxies are the </span><strong data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Magellanic Cloud</span></strong><span data-dcnode-id="1603" instrument_node="">s, two patchy irregular objects visible in the...</span></div><span data-dcnode-id="1601" instrument_node="">
</span></div><span data-dcnode-id="1599" instrument_node="">
</span></div><span data-dcnode-id="1597" instrument_node="">
</span></div><span data-dcnode-id="1595" instrument_node="">
</span></a><span class="marker MOD2 mod-inline" data-dcnode-id="1592"></span><p class="topic-paragraph" data-dcnode-id="1577"><span data-dcnode-id="1591" instrument_node="">The Magellanic Clouds were formed at about the same time as the Milky Way Galaxy, approximately 13 billion years ago. They are presently captured in orbits around the </span><span data-dcnode-id="1590" id="ref225759"></span><a class="md-crosslink" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Milky-Way-Galaxy"><span data-dcnode-id="1589" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1587" instrument_node=""> and have experienced several tidal </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1585" data-term="encounters" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/encounters"><span data-dcnode-id="1586" instrument_node="">encounters</span></a><span data-dcnode-id="1584" instrument_node=""> with each other and with the Galaxy. They contain numerous young stars and </span><a class="md-crosslink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-cluster"><span data-dcnode-id="1583" instrument_node="">star clusters</span></a><span data-dcnode-id="1581" instrument_node="">, as well as some much older stars. One of these star clusters contains R136a1, the most massive star known, with a mass 265 times that of the </span><a class="md-crosslink" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1580" instrument_node="">Sun</span></a><span data-dcnode-id="1578" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="1575"></span><div class="assemblies" data-dcnode-id="1560"><div class="w-100" data-dcnode-id="1561"><figure class="md-assembly card print-false" data-assembly-id="17781" data-dcnode-id="1562"><div class="md-assembly-wrapper card-media" data-dcnode-id="1570" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1571" data-href="/media/1/356551/17781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/41/21241-004-6E49D271/knot-ring-Supernova-1987A-Hubble-Space-Telescope-1997.jpg" style="--aspect-ratio: 16/9"><img alt="Supernova 1987A" data-dcnode-id="1574" data-height="300" data-width="494" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/41/21241-004-6E49D271/knot-ring-Supernova-1987A-Hubble-Space-Telescope-1997.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1572"><em class="material-icons link-blue" data-dcnode-id="1573" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1563"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1568" data-href="/media/1/356551/17781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/41/21241-004-6E49D271/knot-ring-Supernova-1987A-Hubble-Space-Telescope-1997.jpg"><span data-dcnode-id="1569" instrument_node="">Supernova 1987A</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">A knot in the central ring of Supernova 1987A, as observed by the Hubble Space Telescope in 1994 (left) and 1997 (right).The knot is caused by the collision of the supernova's blast wave with a slower-moving ring of matter it had ejected earlier. The bright spot on the lower left is an unrelated star.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Photo AURA/STScI/NASA/JPL (NASA photo # STScI-PRC98-08b)</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="1558"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1556"></span><p class="topic-paragraph" data-dcnode-id="1538"><span data-dcnode-id="1555" instrument_node="">The Magellanic Clouds serve as excellent laboratories for the study of very active stellar formation and evolution. For example, the Tarantula Nebula (also called </span><span data-dcnode-id="1554" id="ref1228919"></span><a class="md-crosslink" data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Tarantula-Nebula"><span data-dcnode-id="1553" instrument_node="">30 Doradus</span></a><span data-dcnode-id="1551" instrument_node="">) is an immense ionized-hydrogen region that contains many young, hot stars. The total mass of 30 Doradus is about one million solar masses, and its diameter is 550 light-years, making it the largest region of ionized gas in the entire </span><a class="md-crosslink" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Local-Group"><span data-dcnode-id="1550" instrument_node="">Local Group</span></a><span data-dcnode-id="1548" instrument_node=""> of galaxies. With the </span><a class="md-crosslink" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope"><span data-dcnode-id="1547" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1545" instrument_node=""> it is possible for astronomers to study the kinds of stars, star </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1543" data-term="clusters" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/clusters"><span data-dcnode-id="1544" instrument_node="">clusters</span></a><span data-dcnode-id="1542" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/nebula"><span data-dcnode-id="1541" instrument_node="">nebulae</span></a><span data-dcnode-id="1539" instrument_node=""> that previously could be observed in great detail only in the Milky Way Galaxy.</span></p><span class="marker p4" data-dcnode-id="1536"></span><span class="marker AM4 am-inline" data-dcnode-id="1534"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1532"></span></section><span data-dcnode-id="1530" instrument_node="">

				Mar. 30, 2022, 6:18 PM ET -  Data from the Hubble Space Telescope has revealed </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2022/3/30/23002980/earendel-hubble-most-distant-star-gravitational-lensing-jwst" rel="noopener" target="_blank"><span data-dcnode-id="1176" instrument_node="">the most distant star</span></a><span data-dcnode-id="1174" instrument_node=""> ever observed. Officially known as WHL0137-LS, though called Earendel by the researchers who spotted it, the star's light took 12.9 billion years to reach Hubble, </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/feature/goddard/2022/record-broken-hubble-spots-farthest-star-ever-seen" rel="noopener" target="_blank"><span data-dcnode-id="1173" instrument_node="">according to NASA</span></a><span data-dcnode-id="1171" instrument_node="">.</span></div><span data-dcnode-id="1169" instrument_node="">
</span></div><span class="marker before-article" data-dcnode-id="1166"></span><div class="md-sentinel--spy-target" data-dcnode-id="1165"></div><section data-dcnode-id="806" data-has-spy="true" data-level="1" id="ref1"><div class="assemblies inline-video" data-dcnode-id="1143"><div class="w-100" data-dcnode-id="1144"><figure class="md-assembly card print-false" data-assembly-id="220323" data-dcnode-id="1145"><div class="md-assembly-wrapper card-media" data-dcnode-id="1158" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="1159" data-id="191912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/191912/astronomy-Hubble-Space-Telescope-impact" style="--aspect-ratio: 16/9"><img alt="How the Hubble Space Telescope works—and why it's important" data-dcnode-id="1164" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/12/191912-138-F307BA1E/astronomy-Hubble-Space-Telescope-impact.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="1160" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="1161" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="1146"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">How the Hubble Space Telescope works—and why it's important</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Learn about the Hubble Space Telescope's impact on astronomy.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node="">© Behind the News (</span><a class="external" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//corporate.britannica.com/behind-the-news-abc-news-australia/" rel="noopener" target="_blank"><span data-dcnode-id="1152" instrument_node="">A Britannica Publishing Partner</span></a><span data-dcnode-id="1150" instrument_node="">)</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope/images-videos"><span data-dcnode-id="1148" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="1117"><strong data-dcnode-id="1140"><span data-dcnode-id="1142" id="ref82386"></span><span data-dcnode-id="1141" instrument_node="">Hubble Space Telescope (HST)</span></strong><span data-dcnode-id="1139" instrument_node="">,  the first </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1137" data-term="sophisticated" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/sophisticated"><span data-dcnode-id="1138" instrument_node="">sophisticated</span></a><span data-dcnode-id="1136" instrument_node=""> optical observatory placed into </span><a class="md-crosslink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/orbit-astronomy"><span data-dcnode-id="1135" instrument_node="">orbit</span></a><span data-dcnode-id="1133" instrument_node=""> around </span><a class="md-crosslink" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1132" instrument_node="">Earth</span></a><span data-dcnode-id="1130" instrument_node="">. Earth’s </span><a class="md-crosslink" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atmosphere"><span data-dcnode-id="1129" instrument_node="">atmosphere</span></a><span data-dcnode-id="1127" instrument_node=""> obscures ground-based astronomers’ view of celestial objects by absorbing or distorting </span><a class="md-crosslink" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/light"><span data-dcnode-id="1126" instrument_node="">light</span></a><span data-dcnode-id="1124" instrument_node=""> rays from them. A </span><a class="md-crosslink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope"><span data-dcnode-id="1123" instrument_node="">telescope</span></a><span data-dcnode-id="1121" instrument_node=""> stationed in outer space is entirely above the atmosphere, however, and receives images of much greater brightness, clarity, and detail than do ground-based telescopes with comparable </span><a class="md-crosslink" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optics"><span data-dcnode-id="1120" instrument_node="">optics</span></a><span data-dcnode-id="1118" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1115"></span><div class="assemblies" data-dcnode-id="1096"><div class="w-100" data-dcnode-id="1097"><figure class="md-assembly card print-false" data-assembly-id="11785" data-dcnode-id="1098"><div class="md-assembly-wrapper card-media" data-dcnode-id="1109" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1110" data-href="/media/1/274508/11785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg" style="--aspect-ratio: 16/9"><img alt="Hubble Space Telescope" data-dcnode-id="1113" data-height="707" data-width="768" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1111"><em class="material-icons link-blue" data-dcnode-id="1112" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1099"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1107" data-href="/media/1/274508/11785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/1331-050-582781A6/Hubble-Space-Telescope-cargo-bay-space-shuttle-February-1997.jpg"><span data-dcnode-id="1108" instrument_node="">Hubble Space Telescope</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">Hubble Space Telescope in the cargo bay of the orbiting space shuttle </span><em data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Discovery</span></em><span data-dcnode-id="1103" instrument_node=""> (STS-82) after its servicing by astronauts and prior to its release, February 1997.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">NASA</span></cite></figcaption></figure></div></div><span class="marker AM1 am-inline" data-dcnode-id="1093"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1091"></span><p class="topic-paragraph" data-dcnode-id="1073"><span data-dcnode-id="1090" instrument_node="">After the </span><a class="md-crosslink" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Congress-of-the-United-States"><span data-dcnode-id="1089" instrument_node="">U.S. Congress</span></a><span data-dcnode-id="1087" instrument_node=""> had authorized its construction in 1977, the Hubble Space Telescope (HST) was built under the supervision of the </span><a class="md-crosslink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/NASA"><span data-dcnode-id="1086" instrument_node="">National Aeronautics and Space Administration</span></a><span data-dcnode-id="1084" instrument_node=""> (NASA) of the United States and was named after </span><span data-dcnode-id="1083" id="ref1285068"></span><a class="md-crosslink" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Edwin-Hubble"><span data-dcnode-id="1082" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="1080" instrument_node="">, the foremost American astronomer of the 20th century. The HST was placed into orbit about 600 km (370 miles) above Earth by the crew of the </span><a class="md-crosslink" data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/space-shuttle"><span data-dcnode-id="1079" instrument_node="">space shuttle</span></a><span data-dcnode-id="1077" instrument_node=""> </span><em data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Discovery</span></em><span data-dcnode-id="1074" instrument_node=""> on April 25, 1990.</span></p><span class="marker p2" data-dcnode-id="1071"></span><div class="assemblies" data-dcnode-id="1056"><div class="w-100" data-dcnode-id="1057"><figure class="md-assembly card print-false" data-assembly-id="11786" data-dcnode-id="1058"><div class="md-assembly-wrapper card-media" data-dcnode-id="1066" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1067" data-href="/media/1/274508/11786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg" style="--aspect-ratio: 16/9"><img alt="Hubble Space Telescope" data-dcnode-id="1070" data-height="300" data-width="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1068"><em class="material-icons link-blue" data-dcnode-id="1069" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1059"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1064" data-href="/media/1/274508/11786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/32/1332-004-5D2096C6/Cutaway-spacecraft-NASA-Hubble-Space-Telescope-heart.jpg"><span data-dcnode-id="1065" instrument_node="">Hubble Space Telescope</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Cutaway of the NASA Hubble Space Telescope, revealing the Optical Telescope Assembly, the heart of the spacecraft, built by Hughes Danbury Optical Systems, Inc.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Courtesy of Hughes Danbury Optical Systems, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM2 am-inline" data-dcnode-id="1054"></span><a class="info-module quiz-module p-5 d-block border m-sm-50 mb-30" data-dcnode-id="1029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/quiz/a-history-of- </span><div class="font-14 text-muted lh-base" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Have you ever wanted a nonchronological history of technologies that became, during one era or another, part of everyday experience? And have you wanted that history in the form of a quiz? You’re in luck! Test your knowledge. Take this quiz. </span></div><span data-dcnode-id="1036" instrument_node="">

</span></a><span class="marker MOD2 mod-inline" data-dcnode-id="1027"></span><p class="topic-paragraph" data-dcnode-id="991"><span data-dcnode-id="1026" instrument_node="">The HST is a large reflecting telescope whose </span><a class="md-crosslink" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/mirror-optics"><span data-dcnode-id="1025" instrument_node="">mirror</span></a><span data-dcnode-id="1023" instrument_node=""> </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1021" data-term="optics" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/optics"><span data-dcnode-id="1022" instrument_node="">optics</span></a><span data-dcnode-id="1020" instrument_node=""> gather light from celestial objects and direct it into two </span><a class="md-crosslink" data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/camera"><span data-dcnode-id="1019" instrument_node="">cameras</span></a><span data-dcnode-id="1017" instrument_node=""> and two spectrographs (which separate </span><a class="md-crosslink" data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/radiation"><span data-dcnode-id="1016" instrument_node="">radiation</span></a><span data-dcnode-id="1014" instrument_node=""> into a spectrum and record the spectrum). The HST has a 2.4-metre (94-inch) primary mirror, a smaller secondary mirror, and various recording instruments that can detect visible, </span><a class="md-crosslink" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ultraviolet-radiation"><span data-dcnode-id="1013" instrument_node="">ultraviolet</span></a><span data-dcnode-id="1011" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="1010" instrument_node="">infrared light</span></a><span data-dcnode-id="1008" instrument_node="">. The most important of these instruments, the </span><span data-dcnode-id="1007" id="ref82387"></span><a class="md-crosslink" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/wide-field-planetary-camera"><span data-dcnode-id="1006" instrument_node="">wide-field planetary camera</span></a><span data-dcnode-id="1004" instrument_node="">, can take either wide-field or high-resolution images of the </span><a class="md-crosslink" data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/planet"><span data-dcnode-id="1003" instrument_node="">planets</span></a><span data-dcnode-id="1001" instrument_node=""> and of galactic and extragalactic objects. This camera is designed to achieve image resolutions 10 times greater than that of even the largest Earth-based telescope. A faint-object camera can detect an object 50 times fainter than anything observable by any ground-based telescope; a faint-object spectrograph gathers data on the object’s chemical </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="999" data-term="composition" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/composition"><span data-dcnode-id="1000" instrument_node="">composition</span></a><span data-dcnode-id="998" instrument_node="">. A high-resolution spectrograph receives distant objects’ </span><a class="md-crosslink autoxref" data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ultraviolet-radiation"><span data-dcnode-id="997" instrument_node="">ultraviolet light</span></a><span data-dcnode-id="995" instrument_node=""> that cannot reach Earth because of atmospheric </span><a class="md-crosslink" data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/absorption-physics"><span data-dcnode-id="994" instrument_node="">absorption</span></a><span data-dcnode-id="992" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="989"></span><div class="assemblies" data-dcnode-id="974"><div class="w-100" data-dcnode-id="975"><figure class="md-assembly card print-false" data-assembly-id="11789" data-dcnode-id="976"><div class="md-assembly-wrapper card-media" data-dcnode-id="984" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="985" data-href="/media/1/274508/11789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg" style="--aspect-ratio: 16/9"><img alt="MyCn18 nebula" data-dcnode-id="988" data-height="450" data-width="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="986"><em class="material-icons link-blue" data-dcnode-id="987" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="977"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="982" data-href="/media/1/274508/11789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/37/21237-004-74E7BE1D/MyCn18-Image-Wide-Field-and-Planetary-Camera.jpg"><span data-dcnode-id="983" instrument_node="">MyCn18 nebula</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Image of MyCn18, a young planetary nebula located about 8,000 light-years away, taken with the Wide Field and Planetary Camera 2 aboard NASA's Hubble Space Telescope.</span></div><cite class="credit d-block mt-5" data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Photo AURA/STScl/NASA/JPL (NASA photo # STScl-PRC96-07)</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="972"></span><span class="marker MOD3 mod-inline" data-dcnode-id="970"></span><p class="topic-paragraph" data-dcnode-id="948"><span data-dcnode-id="969" instrument_node="">About one month after launch, it became apparent that the HST’s large primary mirror had been ground to the wrong shape owing to faulty testing procedures by the mirror’s manufacturer. The resulting optical defect, spherical </span><a class="md-crosslink" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/aberration"><span data-dcnode-id="968" instrument_node="">aberration</span></a><span data-dcnode-id="966" instrument_node="">, caused the mirror to produce fuzzy rather than sharp images. The HST also developed problems with its </span><a class="md-crosslink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/gyroscope"><span data-dcnode-id="965" instrument_node="">gyroscopes</span></a><span data-dcnode-id="963" instrument_node=""> and with its </span><a class="md-crosslink" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/solar-power-1868606"><span data-dcnode-id="962" instrument_node="">solar-power</span></a><span data-dcnode-id="960" instrument_node=""> arrays. On December 2–13, 1993, a mission of the NASA space shuttle </span><em data-dcnode-id="956"><span data-dcnode-id="959" id="ref82388"></span><a class="md-crosslink" data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Endeavour-United-States-space-shuttle"><span data-dcnode-id="958" instrument_node="">Endeavour</span></a></em><span data-dcnode-id="955" instrument_node=""> sought to correct the telescope’s optical system and other problems. In five space walks, the shuttle astronauts replaced the HST’s wide-field planetary camera and installed a new device containing 10 tiny mirrors to correct the light paths from the primary mirror to the other three scientific instruments. The mission proved an unqualified success, and the HST soon began operating at its full potential, returning spectacular </span><a class="md-crosslink" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/technology-of-photography"><span data-dcnode-id="954" instrument_node="">photographs</span></a><span data-dcnode-id="952" instrument_node=""> of various </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="950" data-term="cosmic" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/cosmic"><span data-dcnode-id="951" instrument_node="">cosmic</span></a><span data-dcnode-id="949" instrument_node=""> phenomena.</span></p><span class="marker p4" data-dcnode-id="946"></span><span class="marker AM4 am-inline" data-dcnode-id="944"></span><span class="marker MOD4 mod-inline" data-dcnode-id="942"></span><p class="topic-paragraph" data-dcnode-id="937"><span data-dcnode-id="941" instrument_node="">Three subsequent space shuttle missions in 1997, 1999, and 2002 repaired the HST’s gyroscopes and added new instruments including a near-infrared spectrometer and a wide-field camera. The final space shuttle mission to service the HST, intended to install a new camera and an ultraviolet spectrograph, was launched in 2009. The HST is scheduled to remain operational through at least 2021, after which it is expected to be replaced by the </span><a class="md-crosslink" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/James-Webb-Space-Telescope"><span data-dcnode-id="940" instrument_node="">James Webb Space Telescope</span></a><span data-dcnode-id="938" instrument_node="">, equipped with a mirror seven times larger than that of the HST.</span></p><span class="marker p5" data-dcnode-id="935"></span><div class="assemblies medialist slider js-slider position-relative d-inline-flex align-items-center mw-100" data-dcnode-id="897" data-type="other"><div class="slider-container js-slider-container overflow-hidden d-flex rw-slider rw-prev-disabled" data-dcnode-id="902"><div class="rw-track d-flex align-items-center" data-dcnode-id="903"><div class="rw-slide col-100 px-20" data-dcnode-id="918"><figure class="md-assembly card print-false" data-assembly-id="126945" data-dcnode-id="919"><div class="md-assembly-wrapper card-media" data-dcnode-id="930" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="931" data-href="/media/1/274508/126945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg" style="--aspect-ratio: 16/9"><img alt="astronauts John Grunsfeld and Richard Linnehan with the Hubble Space Telescope, 2002" data-dcnode-id="934" data-height="1600" data-width="1592" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="932"><em class="material-icons link-blue" data-dcnode-id="933" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="920"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="928" data-href="/media/1/274508/126945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/98/78098-050-7998488E/Astronauts-John-Grunsfeld-space-shuttle-Richard-Linnehan-March-8-2002.jpg"><span data-dcnode-id="929" instrument_node="">astronauts John Grunsfeld and Richard Linnehan with the Hubble Space Telescope, 2002</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Astronauts John Grunsfeld and Richard Linnehan near the Hubble Space Telescope, temporarily hosted in the space shuttle </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Columbia</span></em><span data-dcnode-id="924" instrument_node="">'s cargo bay, March 8, 2002.</span></div><cite class="credit d-block mt-5" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">NASA</span></cite></figcaption></figure></div><div class="rw-slide col-100 px-20" data-dcnode-id="904"><figure class="md-assembly card print-false" data-assembly-id="230722" data-dcnode-id="905"><div class="md-assembly-wrapper card-media" data-dcnode-id="913" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="914" data-href="/media/1/274508/230722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg" style="--aspect-ratio: 16/9"><img alt="Sagittarius star cloud" data-dcnode-id="917" data-height="1570" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="915"><em class="material-icons link-blue" data-dcnode-id="916" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="906"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="911" data-href="/media/1/274508/230722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/23/95123-050-01C96987/colours-image-Sagittarius-Hubble-Space-Telescope-star.jpg"><span data-dcnode-id="912" instrument_node="">Sagittarius star cloud</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The Hubble Space Telescope captured this dazzling image of a star cloud in the constellation Sagittarius. Most of these stars are fairly faint and are orange or red, which are the main colours of the Sun. The blue and green stars are hotter than the Sun, while the bright red stars are red giants, which are much cooler stars that are near the end of their lives.</span></div><cite class="credit d-block mt-5" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">The Hubble Heritage Team (AURA/STScI/NASA)</span></cite></figcaption></figure></div></div></div><button class="prev-button js-prev-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20 rw-disabled" data-dcnode-id="900" disabled=""><span class="material-icons" data-dcnode-id="901" data-icon="keyboard_arrow_left"></span></button><button class="next-button js-next-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20" data-dcnode-id="898"><span class="material-icons" data-dcnode-id="899" data-icon="keyboard_arrow_right"></span></button></div><span class="marker AM5 am-inline" data-dcnode-id="895"></span><span class="marker MOD5 mod-inline" data-dcnode-id="893"></span><div class="assemblies inline-video" data-dcnode-id="874"><div class="w-100" data-dcnode-id="875"><figure class="md-assembly card print-false" data-assembly-id="245559" data-dcnode-id="876"><div class="md-assembly-wrapper card-media" data-dcnode-id="886" data-type="video"><a class="d-flex justify-content-center" data-dcnode-id="887" data-id="214997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/video/214997/Hubble-Space-Telescope-overview-important-discoveries" style="--aspect-ratio: 16/9"><img alt="Explore the working principle of the Hubble Space Telescope" data-dcnode-id="892" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/97/214997-138-39BD486D/Hubble-Space-Telescope-overview-important-discoveries.jpg%3Fw%3D800%26h%3D450%26c%3Dcrop&amp;raw"><div class="btn btn-xl btn-white btn-circle position-absolute shadow" data-dcnode-id="888" style="top: 50%; transform: translateY(-50%)"><em class="material-icons" data-dcnode-id="889" data-icon="play_arrow"></em></div></a></div><figcaption class="card-body" data-dcnode-id="877"><div class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Explore the working principle of the Hubble Space Telescope</span></div><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Overview of the Hubble Space Telescope, including how it works and its important discoveries.</span></div><cite class="credit d-block mt-5" data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Encyclopædia Britannica, Inc.</span></cite><a class="font-14 mt-10 d-inline-block" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Space-Telescope/images-videos"><span data-dcnode-id="879" instrument_node="">See all videos for this article</span></a></figcaption></figure></div></div><p class="topic-paragraph" data-dcnode-id="828"><span data-dcnode-id="873" instrument_node="">The HST’s discoveries have revolutionized </span><a class="md-crosslink" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy"><span data-dcnode-id="872" instrument_node="">astronomy</span></a><span data-dcnode-id="870" instrument_node="">. Observations of </span><span data-dcnode-id="869" id="ref1285066"></span><a class="md-crosslink" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Cepheid-variable"><span data-dcnode-id="868" instrument_node="">Cepheid variables</span></a><span data-dcnode-id="866" instrument_node=""> in nearby </span><a class="md-crosslink" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="865" instrument_node="">galaxies</span></a><span data-dcnode-id="863" instrument_node=""> allowed the first accurate determination of </span><span data-dcnode-id="862" id="ref1285067"></span><a class="md-crosslink" data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Hubble-constant"><span data-dcnode-id="861" instrument_node="">Hubble’s constant</span></a><span data-dcnode-id="859" instrument_node="">, which is the rate of the </span><a class="md-crosslink autoxref" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/universe"><span data-dcnode-id="858" instrument_node="">universe’s</span></a><span data-dcnode-id="856" instrument_node=""> expansion. The HST photographed young </span><a class="md-crosslink" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="855" instrument_node="">stars</span></a><span data-dcnode-id="853" instrument_node=""> with disks that will eventually become planetary systems. The </span><span data-dcnode-id="852" id="ref1244461"></span><a class="md-crosslink" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hubble-Deep-Field"><span data-dcnode-id="851" instrument_node="">Hubble Deep Field</span></a><span data-dcnode-id="849" instrument_node="">, a photograph of about 1,500 galaxies, revealed galactic evolution over nearly the entire history of the universe. Within the </span><a class="md-crosslink" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="848" instrument_node="">solar system</span></a><span data-dcnode-id="846" instrument_node="">, the HST was also used to discover </span><span data-dcnode-id="845" id="ref1262238"></span><a class="md-crosslink" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hydra-moon-of-Pluto"><span data-dcnode-id="844" instrument_node="">Hydra</span></a><span data-dcnode-id="842" instrument_node=""> and </span><span data-dcnode-id="841" id="ref1262239"></span><a class="md-crosslink" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Nix-moon-of-Pluto"><span data-dcnode-id="840" instrument_node="">Nix</span></a><span data-dcnode-id="838" instrument_node
