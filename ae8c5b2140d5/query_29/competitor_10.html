        astronomers and astrophysicists took advantage of a powerful array of 

        new tools and technologies. These devices helped move cosmology from a 

        speculative science to the much firmer ground of prediction, observation 

        and verification. For the first time, astronomers began to make detailed 

        and comprehensive studies of the sky at wavelengths other than the visible. 

        At the same time, they began to use rockets to lift their instruments 

        far above the Earth’s surface. Eventually, they succeeded in placing 

        instruments in space that brought dramatic confirmation of the Big Bang 

        hypothesis — and pointed to yet stranger features of the universe.</span><br data-dcnode-id="1275"><span data-dcnode-id="1274" instrument_node="">

        1932, as the Great Depression</span></strong></font><font data-dcnode-id="1187" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="1188" instrument_node=""> 

        took hold, Karl Jansky was a 28 year old scientist working for Bell Telephone 

        Laboratories in New Jersey. His assignment was to investigate static that 

        might interfere with voice transmission by radio. Jansky built an antenna 

        that could rotate in any direction. It could detect signals at a frequency 

        of 20.5 MhZ (about 14.5 meters wavelength) in the slice of the electromagnetic 

        spectrum used today by FM radio and television stations. He recorded signals 

        from all directions over several months and was able to identify static 

        sources from thunderstorms.</span></font></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1182"><font data-dcnode-id="1183" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="1184" instrument_node="">But Jansky 

        also picked up a faint hiss of unknown origin that was coming from all 

        directions. At first, Jansky thought he might be detecting some radiation 

        emitted from the Sun. After he followed the signal for several more weeks, 

        he saw that the "loudest" part of the signal moved away from 

        the Sun’s position. It repeated itself every 23 hours and 56 minutes. 

        That meant the signal would take one year (4 minutes times 365 days) to 

        circle back to the same position near the Sun, as seen from Earth. This 

        was just what would be expected for a signal from an object far beyond 

        our solar system, observed during Earth’s yearly journey around 

        the Sun. Jansky realized that the constant hiss he was hearing came from 

        the direction of the center of our Milky Way galaxy. The story of our 

        "noisy galaxy" received widespread attention in newspapers. 

        Bell Labs’ managers, however, were satisfied that the cosmic hiss 

        Jansky detected posed no problem for radio communication, and soon moved 

        Jansky to another research project. Astronomers, meanwhile, took scant 

        notice of his work.</span></font></p><span data-dcnode-id="1181" instrument_node="">

        discovery did catch</span></strong></font><font data-dcnode-id="1061" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="1063" instrument_node=""> 

        the attention of a few people. One of them was Grote Reber, who described 

        himself as an "ardent radio amateur and distance communication addict." 

        In 1937, at the cost of a few thousand dollars, Reber built a 31-foot-diameter 

        radio antenna in his backyard in Wheaton, Illinois. He undertook the first 

        systematic survey of radio waves from the sky. He had to do the work at 

        night because there was too much interference from the sparks in automobile 

        engines during the daytime. Despite his efforts, astronomers would have 

        to wait for new technologies before they could start any major effort 

        to investigate the radio universe.</span><a data-dcnode-id="1062" name="reber"></a></font></p><span data-dcnode-id="1059" instrument_node="">

        Astronomy Grows</span></strong></font></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1019"><font data-dcnode-id="1025" face="Georgia, Times New Roman, Times, serif" size="+1"><strong data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">T</span></strong></font><font data-dcnode-id="1022" face="Georgia, Times New Roman, Times, serif"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">he 

        rush to develop radio and radar</span></strong></font><font data-dcnode-id="1020" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="1021" instrument_node=""> 

        technologies for military purposes during World War Two had a tremendous 

        impact on astronomy. After the war’s end, astronomy programs all 

        over the world began working eagerly to explore the radio spectrum, using 

        the technologies — and often the surplus equipment — created 

        during the fighting. They were stimulated in part by Reber’s research 

        during the war. Much of the new effort was concentrated in places where 

        observing conditions for traditional optical astronomy were poor, like 

        cloudy Great Britain and the Netherlands. Many traditional astronomers 

        expected that little would be learned by looking at the universe in the 

        radio part of the spectrum. So the new methods gave an opening for countries 

        (like Australia) and professions (like electronic engineering) that had 

        contributed little to cosmology in the past.</span></font></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1015"><font data-dcnode-id="1016" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="1017" instrument_node="">Caltech, 

        Harvard, and other schools in the US initiated programs in radio astronomy. 

        They were joined by a National Radio Astronomy Observatory funded by the 

        new National Science Foundation. Like many other areas of science, radio 

        astronomy quickly became a focus of a major federal investment in science. 

        Much of this was in support of national security goals, since radio telescopes 

        and radar could watch for hostile activity as well as distant stars. </span></font></p><span data-dcnode-id="1014" instrument_node="">

</span><p data-dcnode-id="938"><font data-dcnode-id="939" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="941" instrument_node="">Again the 

        setting is Bell Labs. Arno Penzias and Robert Wilson, two researchers 

        at the lab, were using a very sensitive device to detect microwaves — 

        the type of radiation, between infrared rays and radio waves, developed 

        for radar during the war (and used today in microwave ovens). Bell was 

        interested in using it for communication using satellites. But a station 

        for satellite communications was successfully completed in Europe, and 

        Bell Labs managers encouraged Penzias and Wilson to use the antenna for 

        radio astronomy instead. Aiming to study the radio emissions from the 

        Milky Way, they soon found that they were picking up an unexpected form 

        of background noise that had no obvious explanation. It appeared to come 

        from all directions, which suggested it came from sources beyond our galaxy.</span><a data-dcnode-id="940" name="pigeon"></a></font></p><span data-dcnode-id="937" instrument_node="">

        and Wilson visited nearby Princeton University where they met with physicist 

        Robert Dicke. He had earlier theorized that if the universe had been formed 

        in the manner of the Big Bang theory, the explosion would have created 

        a blast of radiation throughout space. As the universe expanded this radiation 

        would have cooled by now to a very low temperature.</span></font></p><span data-dcnode-id="804" instrument_node="">

        we've been scooped!</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
</span></font></b></font></span><font color="#221C9B" data-dcnode-id="790" face="Verdana, Arial, Helvetica, sans-serif" size="2"><b data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></b></font><font color="#750075" data-dcnode-id="784" face="Verdana, Arial, Helvetica, sans-serif" size="2"><b data-dcnode-id="785"><em data-dcnode-id="786"><span data-dcnode-id="789" instrument_node="">—Robert

</span></em></b></font><em data-dcnode-id="777"><font color="#221C9B" data-dcnode-id="781" face="Verdana, Arial, Helvetica, sans-serif" size="2"><b data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></b></font><font color="#750075" data-dcnode-id="778" face="Verdana, Arial, Helvetica, sans-serif" size="2"><b data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Wilson 

        described the radiation they had detected.</span></b></font></em><font data-dcnode-id="775" face="Verdana, Arial, Helvetica, sans-serif"><img alt="end quote" data-dcnode-id="776" height="19" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/images-tools/quote-bottom.gif&amp;raw" width="450"></font><font data-dcnode-id="773" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="774" instrument_node="">
</span></font></p><span data-dcnode-id="771" instrument_node="">

        decided that Penzias and Wilson had indeed discovered the signature of 

        a massive explosion, a relic of the earliest days of the universe. </span></font></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="757"><font data-dcnode-id="764" face="Georgia, Times New Roman, Times, serif"><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">T</span></strong></font><font data-dcnode-id="758" face="Georgia, Times New Roman, Times, serif" size="2"><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">o 

        many scientists the discovery by Penzias and Wilson</span></strong><span data-dcnode-id="761" instrument_node=""> looked like 

        solid proof for the Big Bang theory. Adherents of the Steady State presented 

        counter-arguments, however. The radiation could have come from different 

        sources at different temperatures. Only by measuring the curve of intensity 

        over a range of wavelengths could astronomers say whether it matched the 

        curve predicted from the Big Bang, with a temperature slightly under three 

        degrees. Microwave and infrared radiation was very difficult to measure, 

        and for some wavelengths the instruments had to be lifted by balloons 

        to avoid interference from the Earth’s atmosphere. It took more 

        than a decade of work by various groups before nearly everyone was satisfied 

        that the radiation had the characteristics predicted by the Big Bang theory.</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span></font></p><span data-dcnode-id="756" instrument_node="">

</span><p align="left" class="Text111" data-dcnode-id="696"><font color="#0f024F" data-dcnode-id="697" face="Verdana, Arial, Helvetica, sans-serif" size="2"><strong data-dcnode-id="698"><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Left:</span></em><span data-dcnode-id="706" instrument_node=""> 

        Theorists calculate that a colorless "black body" at a temperature 

        three degrees above absolute zero emits radiation whose intensity peaks 

        at a wavelength just above 1 mm (solid line). Penzias and Wilson’s 

        one point fell near this curve. Within a decade, scientists had measured 

        more points (open circles) and upper limits (circles with arrows). Observers 

        were challenged to measure the infrared wavelengths that would tell whether

</span><strong data-dcnode-id="496"><font color="#0f024F" data-dcnode-id="497" face="Verdana, Arial, Helvetica, sans-serif" size="2"><span data-dcnode-id="498" instrument_node="">Herbert

</span><p data-dcnode-id="485"><font data-dcnode-id="486" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="487" instrument_node="">Herbert 

        Friedman at the U. S. Naval Research Laboratory discovered that our Sun 

        weakly emits X-rays, as predicted. Astronomers did not expect to find 

        sources of strong X-rays in the universe. For such X-rays could only come 

        from extremely hot or violent processes, which were scarcely imagined. 

        But when a sense of emergency swept the nation after the Soviet Union 

        launched the Sputnik satellite, the government offered abundant money 

        for astronomical research. A group led by Riccardo Giacconi, with funding 

        from the Air Force Cambridge Research Laboratories, identified the first 

        cosmic X-ray source in 1962. Friedman’s group detected a second 

        source in 1963, and both groups quickly found more.</span></font></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="473"><font data-dcnode-id="481" face="Georgia, Times New Roman, Times, serif"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">N</span></strong></font><font data-dcnode-id="477" face="Georgia, Times New Roman, Times, serif" size="2"><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">ASA 

        then funded a rocket</span></strong><span data-dcnode-id="478" instrument_node=""> survey program, and in 1970 launched a small 

        satellite devoted exclusively to X-ray astronomy. Its instruments detected 

        binary X-ray pulsars —</span></font><span data-dcnode-id="476" instrument_node=""> </span><font data-dcnode-id="474" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="475" instrument_node="">neutron 

        stars whose energies arise from infalling matter from companion stars. 

        The Einstein X-ray telescope, launched in 1978, revealed that individual 

        sources account for much of the X-ray background radiation. </span></font></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="469"><font data-dcnode-id="470" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="471" instrument_node="">The opening 

        of the X-ray part of the spectrum attracted many new scientists. A single 

        paper on X-ray astronomy was published in 1962, but 311 papers a decade 

        later. There were about 500 American astronomers in 1962 but only four 

        of them worked with X-rays. A decade later, when there were about 1,500 

        American astronomers, 170 of them worked with X-rays.</span></font></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="465"><font data-dcnode-id="466" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="467" instrument_node="">More energetic 

        than X-rays are gamma rays. They arise from nuclear reactions, which create 

        elements in stars — and from the explosion of nuclear bombs. Indeed, 

        the first observation of cosmic gamma rays was made in 1973 from a satellite 

        watching for nuclear weapons tests. The Compton Gamma Ray Observatory, 

        deployed from a space shuttle in 1991, has recorded nearly daily bursts 

        of gamma radiation, perhaps when extremely distant neutron stars merge 

        into black holes. Such a burst of gamma radiation is more luminous than 

        a million galaxies. If one happened in our galaxy, it would destroy the 

        Earth’s ozone layer, kill all life, and leave our planet’s 

        surface radioactive for thousands of years. </span></font></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="460"><font data-dcnode-id="461" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="463" instrument_node="">Gravitational 

        waves (disturbances in space-time itself) coming from such events in distant 

        galaxies may be detected someday by a Laser Interferometric Gravitation-wave 

        Observatory (LIGO). Construction of this ambitious instrument— which 

        bounces light beams down a pair of evacuated tubes each two km long—began 

        in 1999, and it is gradually being made more sensitive. </span><a data-dcnode-id="462" name="heao"></a></font></p></td><td data-dcnode-id="429" rowspan="2" valign="top" width="126"><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">&nbsp;</span></p><span data-dcnode-id="455" instrument_node="">

</span><p data-dcnode-id="324"><font data-dcnode-id="333" face="Georgia, Times New Roman, Times, serif" size="2"><a data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/pic-new-tools-hubble.htm"><img border="1" data-dcnode-id="338" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/images-tools/new-S82E5938_n.jpg&amp;raw" width="145"><br data-dcnode-id="337"><span data-dcnode-id="336" instrument_node="">
</span></a><span data-dcnode-id="334" instrument_node=""> </span></font><font color="#FF0000" data-dcnode-id="326" face="Georgia, Times New Roman, Times, serif" size="2"><font color="#0f024F" data-dcnode-id="327" face="Verdana, Arial, Helvetica, sans-serif"><b data-dcnode-id="328"><span data-dcnode-id="332" instrument_node="">The 

        Hubble Space Telescope, launched by NASA in 1990, was named after astronomer 

        </span><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/ideas/hubble.htm"><span data-dcnode-id="331" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="329" instrument_node="">. With a diameter of 2.4 

        meters (about 95 inches), the mirror is smaller than the mirrors in many 

        Earth-bound telescopes, but its position above the turbulent atmosphere 

        gives Hubble a view of matchless clarity.</span></b></font></font><span data-dcnode-id="325" instrument_node=""> </span></p></td><td data-dcnode-id="251" rowspan="2" valign="top" width="453"><span data-dcnode-id="321" instrument_node=""> </span><p align="left" class="Text111" data-dcnode-id="311"><font data-dcnode-id="317" face="Georgia, Times New Roman, Times, serif" size="2"><strong data-dcnode-id="318"><font data-dcnode-id="319" size="+1"><span data-dcnode-id="320" instrument_node="">T</span></font></strong></font><font data-dcnode-id="314" face="Georgia, Times New Roman, Times, serif"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">he 

        universe looks quiet</span></strong></font><font data-dcnode-id="312" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="313" instrument_node=""> 

        in ordinary light, for the most part changing only over many millions 

        of years. Not so the universe seen in other wavelengths, as revealed by 

        radio telescopes and satellites. Here the most prominent features are 

        violently energetic. The fierce radiation of quasars, for example, can 

        be seen over billions of light-years, helping astronomers map the entire 

        universe. And it is in non-visual wavelengths that astronomers can best 

        observe that most violent feature of all, the initial cosmic explosion.</span></font></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="304"><font data-dcnode-id="305" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="309" instrument_node="">An example 

        of how the deployment of new tools can lead to important developments 

        in cosmology is the Cosmic Background Explorer satellite (COBE). In 1989, 

        NASA launched COBE after taking several years to build it at a cost of 

        some $160 million dollars. The mission was designed to measure the cosmic 

        background radiation with extreme precision, to see whether there were 

        tiny differences from uniformity. These differences had been predicted 

        by theorists who proposed a sudden "</span><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/ideas/journey.htm"><span data-dcnode-id="308" instrument_node="">inflationary" 

        expansion of the universe</span></a><span data-dcnode-id="306" instrument_node=""> immediately after the big bang. Eventually 

        the experiment involved the work of over a thousand people and had stunning 

        success in finding what it sought. COBE was an indication of how new tools 

        were transforming cosmology into "Big Science," in contrast 

        to the "lone wolf" approach of theorists a half-century earlier.</span></font></p><span data-dcnode-id="303" instrument_node="">
</span><span data-dcnode-id="302" instrument_node="">
</span><span data-dcnode-id="301" instrument_node="">
</span><span data-dcnode-id="289" instrument_node="">
</span><span data-dcnode-id="285" instrument_node="">
</span><span data-dcnode-id="283" instrument_node="">
</span><table align="center" border="1" data-dcnode-id="281" width="452"><tbody data-dcnode-id="282"><tr data-dcnode-id="284"><td data-dcnode-id="290" width="184"><p align="center" data-dcnode-id="297"><font color="#0f024F" data-dcnode-id="298" face="Verdana, Arial, Helvetica, sans-serif" size="2"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">COBE 

              detector</span></strong></font></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="291"><font color="#FF0000" data-dcnode-id="292" face="Georgia, Times New Roman, Times, serif" size="2"><font color="#0f024F" data-dcnode-id="293" face="Verdana, Arial, Helvetica, sans-serif"><b data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">This 

              microwave detector was included in the COBE satellite. The "switch 

              block" switched between the two "horn antennas" that 

              received radiation. By comparing two different parts of the sky 

              it detected tiny differences that theorists predicted in the cosmic 

              background radiation.</span></b></font></font></p></td><td data-dcnode-id="286" width="252"><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/pic-new-tools-cobe.htm"><img align="right" border="1" data-dcnode-id="288" height="201" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/images-tools/new-cobeslide26.jpg&amp;raw" width="250"></a></td></tr></tbody></table><span data-dcnode-id="280" instrument_node="">
</span><br data-dcnode-id="279"><span data-dcnode-id="278" instrument_node="">
</span><font data-dcnode-id="275" face="Georgia, Times New Roman, Times, serif" size="+1"><strong data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">T</span></strong></font><font data-dcnode-id="272" face="Georgia, Times New Roman, Times, serif"><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">he 

      recent revolution in non-optical cosmology</span></strong></font><font data-dcnode-id="270" face="Georgia, Times New Roman, Times, serif" size="2"><span data-dcnode-id="271" instrument_node=""> 

      has important policy implications. In the allocation of scarce funds among 

      proposed scientific projects, should policy makers direct research funds 

      into observations that can extend and consolidate mature theories? Or should 

      they favor the early stages of development of new fields, when practitioners 

      fumble along without any fixed conceptual framework? Cosmological discoveries 

      outside the visible light spectrum have followed largely from technological 

      innovations, with little prediction or justification for their search in 

      advance, and stumbled upon many unimagined new things. How much effort should 

      be spent in hopes of more such lucky breaks? </span></font><span data-dcnode-id="269" instrument_node=""> </span><p data-dcnode-id="265"><font data-dcnode-id="266" face="Georgia, Times New Roman, Times, serif" size="2"><a data-dcnode-id="268" name="tools"></a><span data-dcnode-id="267" instrument_node="">Traditional 

        optical astronomy has also made great advances by going above the atmosphere. 

        The Hubble Space Telescope may be ranked by future historians with the 

        Palomar 200-inch as one of the greatest scientific instruments of all 

        time. Meanwhile, more than a dozen huge new telescopes with innovative 

        designs have joined the 200-inch on the Earth’s surface. In tandem 

        with Hubble, by counting far distant supernovae these instruments are 

        pinning down the precise age of the universe and the nature of its expansion. 

        And by surveying vast numbers of galaxies, they have revealed unexpected 

        patterns in the clustering of matter — skeins of many thousands 

        of galaxies separated by colossal voids where almost nothing is seen. 

        Theorists have managed to make computer models that match this “foamy” 

        large-scale structure by calculating the evolution of the distribution 

        of matter, from the irregularities seen in the microwave data down through 

        billions of years. Their results point to new theories about the dynamics 

        of the universe. Observations from the many devices that point at the 

        heavens today continue to press theorists to revise and refine their ideas 

        about the origins, the nature, and the destiny of our universe.</span></font></p><span data-dcnode-id="264" instrument_node="">
</span><p align="left" class="Text111" data-dcnode-id="254"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/pic-new-tools-gemini.htm"><img align="right" border="1" data-dcnode-id="263" height="200" hspace="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//history.aip.org/exhibits/cosmology/tools/images-tools/new-pachon.jpg&amp;raw" width="200"></a><a data-dcnode-id="261" name="gemini"></a><br data-dcnode-id="260"><span data-dcnode-id="259" instrument_node="">
</span><font color="#0f024F" data-dcnode-id="256" face="Verdana, Arial, Helvetica, sans-serif" size="2"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">The 

        Gemini telescope at Cerro Pachon, Chile, with a mirror 8 meters (315 inches) 

        in diameter, is only one of several huge new observatories with innovative 

        designs that continue to probe our Milky Way galaxy and far beyond.</span></strong></font><span data-dcnode-id="255" instrument_node="">
</span></p><span data-dcnode-id="253" instrument_node="">
