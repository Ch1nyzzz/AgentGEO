</span><div class="conflist_inline" data-dcnode-id="6699"><div class="conflist_value" data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">This workshop will focus on geometric aspects of the Swampland Program, with a special emphasis on the interelation between general properties of quantum gravity and algebraic geometry. The workshop aims to bring together theoretical physicists and geometers, in order to explore the many connections between fields which have recently emerged in the study of the Swampland Conjectures.  This activity is a joint initiative of the Institute of Mathematical Sciences (ICMAT) and the Institute of Theoretical Physics (IFT) in Madrid. The workshop will be held at the CFTMAT in Madrid, C/ Nicolás Cabrera, nº 13-15, Campus de Cantoblanco, UAM, 28049 Madrid SPAIN. If possible, this activity will take place on-site.</span></div></div><span data-dcnode-id="6698" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="6618"><div class="conflist_value" data-dcnode-id="6619"><span data-dcnode-id="6623" instrument_node="">The IAA-CSIC Severo Ochoa Advanced School on Galaxy Evolution will be held in Granada, from Monday, May 23th, to Friday, May 27th, 2022. This school is directed at researchers of all levels who have a special interest in relevant aspects of the formation and evolution of galaxies.  The school will present a panoramic overview of the state of the art in the area, aiming to go well beyond the standard textbook knowledge, and providing updated information on the current frontiers of research, with theory and observations.</span><p data-dcnode-id="6622"></p><p class="spaced" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">The lectures and tutorials will be highly interactive, leaving room for questions and discussion; with this aim, several panel discussion sessions and evening tutorials will be scheduled along the week, promoting an interactive atmosphere. The participants will be encouraged to present a summary of their ongoing work or/and future projects during the panel sessions.</span></p></div></div><span data-dcnode-id="6617" instrument_node="">

</span><div class="sub_title" data-dcnode-id="6561"><div class="conflist_value conflist_title" data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">From Planck to the Future of CMB</span></div></div><span data-dcnode-id="6560" instrument_node="">
</span><div class="dates_location" data-dcnode-id="6557"><div class="conflist_value" data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">23 May 2022 - 27 May 2022 • Ferrara, Italy</span></div></div><span data-dcnode-id="6556" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="6547"><div class="conflist_label" data-dcnode-id="6548"><span data-dcnode-id="6549" instrument_node="">Abstract:</span></div></div><span data-dcnode-id="6546" instrument_node="">
</span><div class="conflist_inline" data-dcnode-id="6543"><div class="conflist_value" data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">Planck‘s recent measurements of the temperature and polarization anisotropies of the Cosmic Microwave Background (CMB) have established a cosmological framework that will remain the standard for many years to come. From space, the LiteBIRD mission will pick up on this legacy in the next decade, with the aim to improve dramatically on polarization observations at large angular scales. In a later time frame, ESA’s recently issued future scientific programme – Voyage 2050 – has highlighted the need for a large space mission to focus on high-precision spectroscopy of the CMB. And both ground-based and balloon-borne observatories are also expected in the coming years to improve significantly on Planck’s observations of the polarized anisotropies of the CMB, especially on smaller angular scales. In order to meet their ambitious objectives, all of these upcoming experiments will have to address and overcome very significant technical and data analysis challenges, some of which have already been revealed by Planck. It is therefore appropriate at this time to examine these challenges from the perspective of the experience accumulated by Planck in the design and operation of its instruments and in the preparation, conduct, and analysis of its all-sky surveys. In this context, the workshop is designed to bring together key members of the Planck and future experiment teams to foster discussion on some of the most challenging topics.</span></div></div><span data-dcnode-id="6542" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="6071"><div class="conflist_value" data-dcnode-id="6072"><span data-dcnode-id="6073" instrument_node="">The conference takes place in Trieste on the occasion of the centenary of Margherita Hack's birth and is held in a hybrid format, with a preference for in-person participation and a limited number of online presentations. The meeting is intended to deliver a historical retrospective on Margherita’s work and legacy, focusing on astrophysical spectroscopy, both in the stellar and extragalactic fields. We also have sessions dedicated to the present ground based and space facilities and to future cutting-edge instrumentation. Given Margherita's commitment to the field of outreach and dissemination of astronomy, and her strong link with the town, we have planned a parallel program of events dedicated to the public.</span></div></div><span data-dcnode-id="6070" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5963"><div class="conflist_value" data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">Maldacena’s 1997 discovery of gauge/gravity duality promised to provide a complete understanding of quantum effects in gravity, by relating gravitating quantum systems to conventional quantum field theories on fixed backgrounds. Although much has been learned, this initial promise has not been completely fulfilled, due to lingering questions associated with the basic dictionary describing the way observables are mapped between one description and the other. While the dictionary is under good control for observables near the boundary, and also at the level of perturbation theory about a classical bulk spacetime for observables further in, non-perturbative questions critical for a full resolution of the black hole information problem remain to be fully answered.   In the last few years, however, a number of developments arising from the application of quantum information theory to AdS/CFT seem to be indicating that it may now be possible to address some of these questions. This GGI workshop brings together experts and young researchers, in order to capitalize on these developments. </span></div></div><span data-dcnode-id="5962" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5885"><div class="conflist_value" data-dcnode-id="5886"><span data-dcnode-id="5887" instrument_node="">The goal of this meeting is to bring together theoreticians, modelers, and observers to discuss the computational astrophysics and observational challenges for the next generation of observatories, focusing on the next generation Very Large Array (ngVLA). The formation of planetary systems, the evolution of galaxies, and the observation of electromagnetic counterparts of gravitational wave events will be fertile grounds for discovery in the next decades and are core science goals for the ngVLA. The challenge to simulators is to develop predictive models that can be accurately compared against observations, while observers need to generate measurements that can effectively constrain the models.</span></div></div><span data-dcnode-id="5884" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5810"><div class="conflist_value" data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">This workshop will focus on geometric aspects of the Swampland Program, with a special emphasis on the interelation between general properties of quantum gravity and algebraic geometry. The workshop aims to bring together theoretical physicists and geometers, in order to explore the many connections between fields which have recently emerged in the study of the Swampland Conjectures.  This activity is a joint initiative of the Institute of Mathematical Sciences (ICMAT) and the Institute of Theoretical Physics (IFT) in Madrid. The workshop will be held at the CFTMAT in Madrid, C/ Nicolás Cabrera, nº 13-15, Campus de Cantoblanco, UAM, 28049 Madrid SPAIN. If possible, this activity will take place on-site.</span></div></div><span data-dcnode-id="5809" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5658"><div class="conflist_value" data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">Radioactive nuclei play a significant role in many current astrophysical pursuits, from the origin of the elements to the driving of emissions from supernovae (56Ni) and kilonovae (r-process radioactivity). Radioactive nuclei are crucial for direct studies of galactic enrichment (7Be, 26Al, 44Ti, 60Fe, 99Tc, 244Pu) and stellar explosions (56Ni, 44Ti). Stars and their explosions, galaxies and their evolving interstellar medium, and the origin of the solar system are among the targeted astrophysical objects. Stardust, meteorites, ocean floor deposits, cosmic-rays, and gamma-ray spectroscopy provide a rich variety of astronomy to exploit the inherent power of radioactivity. Investigation tools range from numerical models, astronomical instrumentation, and laboratory experiments to derive material compositions and nuclear reaction rates. The aim of the conference is to bring together researchers from all these different fields to promote interaction through the common ground of radioactivity.</span></div></div><span data-dcnode-id="5657" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5572"><div class="conflist_value" data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">On 13 June 2022, the Gaia DR3 catalogue will be released which will provide a wealth of information for more than a billion stars, including ultra-precise astrometry, radial velocities, photometric colours, binary solutions, etc. This new release will enable even more stringent astrophysical constraints when performing asteroseismic modelling to derive fundamental stellar parameters. This will push forward several asteroseismic applications such as exoplanet host star characterization and galactic archaeology. The aim of this workshop is to bring together experts on asteroseismology, galactic archaeology, stellar evolution, exoplanets, and Gaia data. Participants will discuss the synergies that combining Gaia data with datasets from Kepler and TESS offers, as well as the opportunities to eliminate the remaining stumbling blocks.</span></div></div><span data-dcnode-id="5571" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5334"><div class="conflist_value" data-dcnode-id="5335"><span data-dcnode-id="5336" instrument_node="">The Torino Workshops series started in Torino in 1995. Since then, 12 workshops have been held by various institutions around the world. Traditionally, the Torino Workshop focuses on the physics of asymptotic giant branch (AGB) stars and many related topics: stellar evolution and nucleosynthesis, observations (photometry, spectrometry, and asteroseismology), stellar winds, dust and presolar grain formation, galactic chemical evolution, theoretical and experimental nuclear astrophysics. The workshop will bring together experts, and friends, involved in these research fields to identify current key scientific questions and the possible ways to address them by interdisciplinary approaches. This meeting edition will celebrate Prof. Maurizio M. Busso on the occasion of his 70th birthday. Maurizio is among the founders of the Torino Workshop and during  his career he has given important contributions to the study of AGB stars and related fields covered in the workshop.</span></div></div><span data-dcnode-id="5333" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5162"><div class="conflist_value" data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">The Nuclear Spectroscopic Telescope Array (NuSTAR) is the first focusing hard X-ray (&gt;10 keV) satellite in orbit, and is providing unprecedented data on energetic phenomena ranging from the solar system to distant quasars. Since 2015, the observatory has primarily been run as a guest observer facility, with programs competitively selected by time allocation committees. A significant fraction of NuSTAR observatory time is coordinated with other high-energy observatories. This conference will be an opportunity to explore the range of science that NuSTAR is conducting, with sessions focused on topics including Galactic binaries, extreme transients, ultraluminous X-ray sources (ULXs), the census of obscured AGN in the local universe, black hole physics, and future high-energy facilities. Talks and posters on additional topics are also expected and encouraged.</span></div></div><span data-dcnode-id="5161" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="5085"><div class="conflist_value" data-dcnode-id="5086"><span data-dcnode-id="5090" instrument_node="">In the last decade, increasingly strong efforts have been devoted to understand the role of active galactic nuclei (AGN) during the cosmic evolution of galaxies, groups and clusters of galaxies. Chandra, XMM-Newton, and Hitomi have unveiled spectacular interactions of the central supermassive black hole (SMBH) with the host atmosphere in the form of resolved X-ray cavities, shocks, metal uplifts, and turbulence. At the same time, the hot halos of galaxies, groups, and clusters recurrently condense in localized regions forming multiphase filaments and clouds that rain onto the central SMBH and that are detected via optical/IR/radio telescopes (e.g., HST, Magellan, VLT, IRAM, SOFIA). In the nuclear region, spectroscopical studies of AGN have discovered an amazing diversity of feeding and feedback phenomena, including ultrafast outflows, warm absorbers, massive ionized, neutral and molecular outflows. With the advent of next-generation telescopes (e.g., ALMA, MUSE, JWST, XARM, Athena, LOFAR/SKA), we are starting to learn that multiphase outflows are an ubiquitous phenomenon in cosmic structures of different masses and ages. Linking the macro to micro scales — and vice versa — of feeding and feedback processes is thus vital to advance our knowledge on the (co)evolution of black holes, galaxies, and clusters of galaxies.</span><p data-dcnode-id="5089"></p><p class="spaced" data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">The aim of the workshop is to bring together active researchers in the above tightly related — but often disjointed — fields in order to discuss the latest results, confront state-of-the-art simulations/models and observations, as well as promote new collaborations and set the path to future observational and numerical campaigns.</span></p></div></div><span data-dcnode-id="5084" ins </span><div class="conflist_inline" data-dcnode-id="4785"><div class="conflist_value" data-dcnode-id="4786"><span data-dcnode-id="4790" instrument_node="">The symposium will take an ecumenical view of SETI as the astronomical search for technosignatures, and as a subfield of astrobiology. It will encompass technosignatures across and beyond the electromagnetic spectrum, including (but not limited to) radio, microwave, optical, and NIR signals compressed in the time and frequency domains; multimessenger astronomy; megastructures in transit and thermal emission; and solar system SETI.</span><p data-dcnode-id="4789"></p><p class="spaced" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">The symposium will lean heavily towards astronomical, observational programs that can detect or put quantitative upper limits on technosignatures, and theoretical work in direct support of such programs such as calculations of relative and absolute figures of merit of past and current programs, or target selection and observation strategy work. Abstracts on putting current efforts in a historical context, interfaces with the social sciences, the funding and cultural landscape of SETI, and curricular and academic dimensions of the field are also welcome.</span></p></div></div><span data-dcnode-id="4784" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4584"><div class="conflist_value" data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">The 2020 edition had to be postponed due to the pandemic situation related to the COVID-19. We are now glad to announce that the Symposium will take place in 2022 and, for the first time, it will be held in Barcelona, hosted by the Institut de Ciències del Cosmos (ICCUB) of the University of Barcelona. It will closely follow the guidelines and structure of the previous Symposia, covering all major observational and theoretical aspects of the field with an emphasis on the high (GeV) and very high (TeV) energy intervals of the electromagnetic spectrum.</span></div></div><span data-dcnode-id="4583" instrument_node="">
</span></div><span data-dcnode-id="4581" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4573"><div class="conflist_value" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">Scientific topics will range from the origin of galactic and extragalactic cosmic rays to the physics and astrophysics of compact objects and their relativistic outflows (Pulsars, Microquasars, Blazars, GRBs), PWNe, SNRs, Star Forming Regions, Giant molecular clouds and Interstellar Medium, as well as extragalactic non-thermal objects like Starburst Galaxies, Radio Galaxies and Galaxy Clusters. Cosmological issues related to Dark Matter, Intergalactic radiation and magnetic fields, and topics relevant to fundamental physics will also be addressed.</span></div></div><span data-dcnode-id="4572" instrument_node="">

</span><div class="sub_title" data-dcnode-id="4528"><div class="conflist_value conflist_title" data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">  From galaxies to cosmology with deep spectroscopic surveys --  A tribute to Olivier Le Fèvre</span></div></div><span data-dcnode-id="4527" instrument_node="">
</span><div class="dates_location" data-dcnode-id="4524"><div class="conflist_value" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">04 Jul 2022 - 08 Jul 2022 • Marseille, France</span></div></div><span data-dcnode-id="4523" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4514"><div class="conflist_label" data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Abstract:</span></div></div><span data-dcnode-id="4513" instrument_node="">
</span><div class="conflist_inline" data-dcnode-id="4510"><div class="conflist_value" data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">For four decades, wide and deep spectroscopic surveys have been a major tool for extragalactic studies. From precursor surveys with a few hundred galaxies (such as the CFRS in the 1990s) to current projects aimed at collecting several million z&gt;1 redshifts (such as Euclid, PFS), several generations of increasingly deep and massive spectroscopic surveys have revolutionised our understanding of the universe. They have enabled detailed studies, on statistically significant samples, of galaxy evolution processes such as star formation, mass assembly, merging and interaction with the environment in a cosmological context. Advances in instrumentation have pushed observational limits, now allowing us to probe the epoch of reionization with unprecedented large samples of objects. With the current generation of large spectroscopic surveys about to begin, we are now entering the era of precision cosmology. These surveys will profoundly improve our understanding of dark matter, dark energy and of the detailed physics of galaxies in relation to their local (circumgalactic) and large-scale intergalactic environments. Olivier Le Fèvre has pioneered, led and tirelessly promoted several of the largest spectroscopic surveys to date. He has been at the forefront of these scientific topics for decades. This conference is a tribute to his legacy.</span></div></div><span data-dcnode-id="4509" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4369"><div class="conflist_value" data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Asteroseismology in the Era of Surveys from Space and the Ground: Stars, Planets, and the Milky Way</span></div></div><span data-dcnode-id="4368" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4358"><div class="conflist_value" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">Asteroseismology is a young and rapidly developing field in stellar astrophysics. It enables efficient probes of stellar interiors and provides critical input to many fields in contemporary astrophysics. Being very sensitive to the total time span and precision of individual stellar brightness measurements, observational asteroseismology has experienced significant boosts with the launch of space-missions such as CoRoT, Kepler/K2, and TESS. The interior macro- and micro-physics are being probed with unprecedented precision for isolated stars, as well as small- to intermediate-sized stellar populations across the entire HR-diagram. Powerful synergies between asteroseismology and fields such as binary stars, exoplanets, clusters, galactic archeology, are emerging fast. In this joint 6th/13th in a series of TASC/KASC workshops, we aim to put asteroseismology in a wider context, reaching out to other fields in astrophysics, focusing on the above synergies with specific attention to joint exploitation of large-scale space- and ground-based surveys. We will celebrate the 10th anniversary of “Kepler Asteroseismology in Action” started during KASC3 at Aarhus University, where Kepler asteroseismology was put into practice for the first time, opening a new horizon for observational asteroseismology as we know it today. KASC6/TASC13 will highlight the first results emerging from the full-sky, double-hemisphere TESS data exploration, in synergy with other and complementary large-scale surveys. The TASC6/KASC13 workshop will take place from 11-15 July 2022 at KU Leuven, Belgium - one of the most active asteroseismic centres in Europe - and the scientific programme covers a broad range of research topics.</span></div></div><span data-dcnode-id="4357" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="4062"><div class="conflist_value" data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Understanding how planetary systems form is becoming an increasingly interdisciplinary field of study that is approaching the limits of insight being gained from individual disciplines. The composition of planetary bodies and the astrochemical processes that shape it represent the common thread helping us to navigate the multifaceted problem of planetary formation. Future studies will become even more interdependent and will require combining the information supplied by meteorites and polluted white dwarfs, the interstellar medium and protoplanetary disks, comets and asteroids, planetary surfaces and exoplanetary atmospheres, and more. This event aims to offer an interdisciplinary venue to bring together researchers studying the Solar System, exoplanets, star formation, protoplanetary disks, main sequence and evolved stars to combine the insights provided by their theoretical and experimental perspectives, as well as by observations from ground-based and space-borne facilities.</span></div></div><span data-dcnode-id="4061" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="3988"><div class="conflist_value" data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">Cosmology School is addressed to young astronomers and physicists interested in observational cosmology. It involves lectures, workshops and student sessions. The lectures will cover such topics as: large-scale structure of the Universe, dark matter and dark energy, cosmic web, galaxy formation and evolution, galaxy surveys and astronomical observations, computer simulations, gravitational waves and multi-messenger astronomy. During the workshops, the participants will have the opportunity to get a practical knowledge of: numerical simulations, SED fitting, VO tools, TOPCAT and Aladin, ADQL, VO in cosmology. The School is intended for undergraduate, MSc and PhD students, as well as young postdoctoral researchers.</span></div></div><span data-dcnode-id="3987" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="3766"><div class="conflist_value" data-dcnode-id="3767"><span data-dcnode-id="3771" instrument_node="">The 2022 Sagan Summer Workshop will focus on the topic of exoplanet science in the Gaia era. The ESA Gaia mission has been mapping the Galaxy for over seven years, measuring very accurate positions and motions of over 1 billion stars. It has already greatly contributed to exoplanet science through the determination of more accurate stellar parameters, which in turn improve planet parameters, the detection of stellar companions, and the identification and characterization of young moving groups. In the near future, the unprecedented astrometric accuracy will result in the discovery of new exoplanets, as well as the characterization of known planets. The workshop will introduce the basics of astrometry, the impact of Gaia astrometry on astrophysics, and the astrometric detection and characterization of exoplanets. The synergy between the different planet detection techniques of astrometry, transits, radial velocities, and imaging will be discussed, as well as future advances in astrometry. </span><p data-dcnode-id="3770"></p><p class="spaced" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">The Sagan Summer Workshops are aimed at advanced undergraduates, grad students, and postdocs, however all are welcome to attend. There is no registration fee for these workshops and the registration link will be available in February 2022.</span></p></div></div><span data-dcnode-id="3765" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="3680"><div class="conflist_value" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">CSQCD has brought together, for over 20 years, QCD physicists (working on phases of quark matter) and astrophysicists working on compact stars. Over the last two decades, the two communities learned from each other and collaborated on novel theoretical and experimental avenues to explore the QCD phase diagram. The Banff meeting will focus on recent explorations of the quark-gluon phase using colliders (e.g. RHIC and LHC) and on the renewed interest in neutron and quark matter in astrophysics, particularly in the gravitational wave era.4</span></div></div><span data-dcnode-id="3679" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="3479"><div class="conflist_value" data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">Winds form an integral part of astronomy - from regulating rotation of stars through enriching galaxies with fresh materials, winds persist during the entire lives of stars and play a key role in shaping the observed exoplanet demographics. In order to gain insight in the physics and the modelling tools used by different communities, we wish to bring together researchers working on winds of close-in exoplanets (atmospheric escape), winds of low- and high-mass stars and the solar wind in a symposium dedicated to "winds". This will foster communication between these different communities and drive advances in the field. </span></div></div><span data-dcnode-id="3478" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="3033"><div class="conflist_value" data-dcnode-id="3034"><span data-dcnode-id="3038" instrument_node="">The Origin of Life on Earth is one of the most fascinating questions arising from the studies of our planet, and of the wider Universe. There are two main hypotheses describing the source of the organic compounds that could have served as the basis of abiogenesis: (1) the in situ synthesis of prebiotic molecules on the primitive Earth and (2) their formation in the Solar Nebula or in its parent molecular cloud, followed by their exogenous delivery onto Earth via asteroids, comets, and their smaller fragments. </span><p data-dcnode-id="3037"></p><p class="spaced" data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">The school will be devoted to the exogenous hypothesis leading to the origin of life. We will discuss how astronomy and theoretical and experimental astrochemistry act together to explore this hypothesis, and to go beyond our Solar System in the search for extraterrestrial life and other habitable planets.</span></p></div></div><span data-dcnode-id="3032" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="2936"><div class="conflist_value" data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">We are witnessing a profound rapid change in our understanding of the phenomenon of Gravitation. We are exploring various implications of the general theory of relativity, and of its modified versions, in which gravitation is a consequence of the curvature of spacetime and also various investigations into the mathematical foundations of the general theory of relativity, the nature of spacetime, and the imprints of quantum mechanics. We have been commissioning sophisticated high energy experiments aiming at understanding the elementary particles that are the fundamental constituents of baryonic and leptonic matter and their underlying forces.</span></div></div><span data-dcnode-id="2935" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="2817"><div class="conflist_value" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">The school, organised by the Department of Physics of the University of Genova, Italy, within the ‘Dipartimenti di Eccellenza MIUR’ project, is primarily aimed at Ph.D students interested in optical astronomy. The lectures will cover: science with optical telescopes in the multi-messenger era, with examples from ongoing and future experiments and links to multi-disciplinary topics, hardware and software for optical telescopes, a practical hands-on session with a 80-cm robotic telescope, featuring joint observations with other telescopes throughout Italy. A flash-talk session, where all participants will have the chance to show their work, will also take place.</span></div></div><span data-dcnode-id="2816" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="2124"><div class="conflist_value" data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">One hundred years ago, Russian mathematician and physicist Alexander A. Friedmann applied the system of Einstein equations to the hypersphere with a time varying radius. In this way, he obtained a nonlinear ordinary differential equation which is called the Friedmann equation after him and serves now as a cornerstone of the standard cosmological model. Unfortunately, it is well known that this model exhibits a number of paradoxes. The main goal of the CSS 2022 conference is to discuss whether and how the Friedmann equation can be applied at various spatial scales, from our local cosmic neighborhood up to the whole Universe; and if the existence of dark matter and dark energy are merely artifacts of excessive extrapolations. So, it is timely to gather specialists from various branches of astronomy and astrophysics to discuss these issues.</span></div></div><span data-dcnode-id="2123" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1897"><div class="conflist_value" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The conference is jointly organised by INFN-Sezione di Genova and the Department of Physics of the University of Genova. It aims at gathering an overview of the status and future prospects of astrophysics and cosmology with a multi-messenger approach. The conference will feature only plenary sessions that will deal with astrophysics with electromagnetic waves, astrophysics with gravitational waves, astroparticle physics and neutrino astrophysics, nuclear astrophysics, cosmology. The sessions and the talks will be organised according to astrophysical sources and phenomena: compact objects, neutron star mergers, supernovae, active galactic nuclei, CMB, ..... highlighting the current status of the knowledge and the benefit of a multi-messenger approach.</span></div></div><span data-dcnode-id="1896" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1812"><div class="conflist_value" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">The synthetic approach towards understanding Ricci curvature in the Riemannian setting has lead to groundbreaking results over the past quarter century.  Recent advances towards developing a synthetic version of sectional and Ricci curvature in the Lorentzian setting and of Scalar curvature in the Riemannian setting is highly promising and should lead to deeper understanding of Einstein's theory of gravity.  Identifying the relevant notions of convergence for spacetimes is another topic of current interest encompassed by this workshop.</span></div></div><span data-dcnode-id="1811" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1734"><div class="conflist_value" data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">During the conference, we will make a journey through space and time, starting from interstellar clouds and then moving to cloud filaments and dense cores on the verge of star formation, to protostars and their embedded disks, to planet-forming disks to exoplanet and finally landing in our Solar System, while delving into laboratory facilities and theoretical calculations and simulations. Each evening, before dinner, there will be a general talk on each topic of the conference (the “aperitive talk”), to allow all communities to understand better the “big picture” and to facilitate finding links across disciplines, which always provide fertile ground in our journey towards understanding our astrochemical origins.  </span><p data-dcnode-id="1738"></p><p class="spaced" data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Students and young researchers will be encouraged to attend and interact with all participants, to present their work and broaden their horizons. Some financial help will be available for them upon request. </span></p></div></div><span data-dcnode-id="1733" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1663"><div class="conflist_value" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">The two Fermi instruments have been surveying the high-energy sky since August 2008. The Large Area Telescope (LAT) has discovered more than a thousand new sources and many new source classes, bringing the importance of gamma-ray astrophysics to an ever-broadening community. The LAT catalog includes supernova remnants, pulsar wind nebulae, pulsars, binary systems, novae, several classes of active galaxies, starburst galaxies, normal galaxies, and a large number of unidentified sources. Continuous monitoring of the high-energy gamma-ray sky has uncovered numerous outbursts from a wide range of transients. Fermi LAT's study of diffuse gamma-ray emission in our galaxy revealed giant bubbles shining in gamma rays. The direct measurement of a harder-than-expected cosmic-ray electron spectrum may imply the presence of nearby cosmic-ray accelerators. LAT data have provided stringent constraints on new phenomena such as supersymmetric dark-matter annihilations as well as tests of fundamental physics. The Gamma-ray Burst Monitor (GBM) continues to be a prolific detector of gamma-ray transients: magnetars, solar flares, terrestrial gamma-ray flashes and gamma-ray bursts at keV to MeV energies, complementing the higher energy LAT observations of those sources in addition to providing valuable science return in their own right.</span></div></div><span data-dcnode-id="1662" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1580"><div class="conflist_value" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">This program is motivated by the recent observational insights concerning white dwarfs as individuals and as a population, based on the astrometry from Gaia and large photometric (Kepler, TESS, ZTF, VeraRubin) and spectroscopic (SDSS-V, DESI, WEAVE, 4MOST) surveys. Some of the questions that these data, combined with improved input physics and white dwarf models, will answer are: How does crystallization affect white dwarf cooling? How good is our understanding of convection, overshoot, and mixing in general? How good are the predictions of the low-frequency gravitational wave foreground and thermonuclear supernovae rates (SN Ia, Iax, Ca transients)? What is the nature of the recently discovered stellar remnants of thermonuclear supernova and/or their donors? What are the architectures of planetary systems that survive the metamorphosis of their host stars into white dwarfs, and what is their ultimate fate?</span></div></div><span data-dcnode-id="1579" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1506"><div class="conflist_value" data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Our meeting intends to create a dialogue between observers, modelers and theoreticians to share problems, ideas and methods around stellar multiplicity and interaction. This is only one side of the coin: even if for some research fields stellar multiplicity is a given and well embedded in methods, its importance is controversial in other fields, despite observational and/or theoretical evidence. Our meeting also aims at addressing these controversies by providing a stage for the latest arguments, and a constructive environment for dialogue and fostering scientific collaboration.</span></div></div><span data-dcnode-id="1505" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1220"><div class="conflist_value" data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Astrometric, photometric and spectroscopic all-sky surveys provide the first complete, unbiased view of the Galactic population of the most abundant type of stellar remnants: white dwarfs. This wealth of observational data provides an array of opportunities to use white dwarfs as probes of a wide range of astrophysics, including the formation and evolution of stars and planets, the star formation rate of the Galaxy, and the populations of low-frequency gravitational wave sources and progenitors of thermonuclear supernovae. These applications require improved models of these electron-degenerate stars, which in turn rely on developments in the relevant input physics, including equations of state and opacities. This conference will provide a joint platform for experts in the observational and theoretical study of white dwarfs, scientists working on the underlying fundamental physics, and astronomers using white dwarfs as diagnostic tools to gain a panoramic overview of the state-of-the-art, to identify remaining limitations of the current models, and to explore novel scientific opportunities arising from the new data.</span></div></div><span data-dcnode-id="1219" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1094"><div class="conflist_value" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The last several years have seen rapid development of a new language for conformal field theory(CFT), including insights from the conformal bootstrap program. This conference will bring to bear the modern arsenal of conformal field theory on the foundations of holography and quantum gravity. A theme of the conference will be the extent to which consistency conditions on quantum gravity are inherited from those of CFT, and whether they naturally lead to string/M-theory. By bringing together scientists on both sides of holographic duality, we hope to explore these issues in a broad way.Topics to be covered include large N bootstrap and the structure of holographic CFTs dual to general relativity; CFT sum rules and gravitational effective field theory; aspects of supersymmetry in holography; low-dimensional holography, modularity and quantum chaos; black holes from strongly-coupled finite temperature physics; symmetry constraints on gravitational path integrals and AdS vacua; S-matrices, their relation to CFT correlators, and holography away from AdS.</span></div></div><span data-dcnode-id="1093" instrument_node="">

</span><div class="conflist_inline" data-dcnode-id="1005"><div class="conflist_value" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">The cosmic web of the matter distribution in the universe provides the framework for the formation and evolution of galaxies and is fundamental to connect galactic properties to cosmology. This conference will address the effects of the cosmic web upon galaxies and vice versa. The aim is to create both a broad-brush and then, for some aspects, a more detailed, early to late time joint history of the web and galaxies. Indeed, the web reflects what the universe is on intermediate scales, which are informative, both in terms of cosmic evolution and quantity of data. It acts as a dynamically relevant intermediate-density bridge (easier to model) between cosmology and galaxies. It is also the source of all anisotropy, critical for angular momentum acquisition, which is the number two parameter in galaxy formation.</span></div></div><span data-dcnode-id="1004" instrument_node="">
