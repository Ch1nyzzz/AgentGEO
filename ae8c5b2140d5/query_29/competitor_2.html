</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="201"><div class="field-items" data-dcnode-id="202"><div class="field-item even" data-dcnode-id="203" property="content:encoded"><h3 data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Astronomy, Cosmology and Gravity (ACG)</span></h3><p data-dcnode-id="258"><img alt="" data-dcnode-id="259" height="275" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/physics/sites/www2.iitb.ac.in.physics/files/research/images/ACG-homepage-banner.jpg&amp;raw" width="690"></p><p data-dcnode-id="255"><sup data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">(Image credits:&nbsp;LIGO/Caltech/Sonoma State (Aurore Simonnet) )</span></sup></p><p data-dcnode-id="242"><a data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/content/varun-bhalerao"><span data-dcnode-id="254" instrument_node="">Varun Bhalerao</span></a><span data-dcnode-id="252" instrument_node=""> works in the fields of observational astrophysics and instrumentation. His current primary focus is the search and study astrophysical transients, and the electromagnetic counterparts to gravitational wave sources. For this purpose, his colleagues and he built the 0.7m fully autonomous optical telescope at Hanle, Ladakh as a part of the </span><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//growth.caltech.edu/"><span data-dcnode-id="251" instrument_node="">GROWTH</span></a><span data-dcnode-id="249" instrument_node="">-India project. He is part of the team that built AstroSat, and is responsible for the detection and study of transients with </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//astrosat.iucaa.in/czti/"><span data-dcnode-id="248" instrument_node="">CZTI</span></a><span data-dcnode-id="246" instrument_node="">. He is currently exploring the possibility of building a space instrument at IIT Bombay. More details about his work can be found </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/content/varun-bhalerao"><span data-dcnode-id="245" instrument_node="">here</span></a><span data-dcnode-id="243" instrument_node="">.</span></p><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Keywords: Astrophysics, Transients, Gravitational Waves, Instrumentation</span></p><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">&nbsp;</span></p><p data-dcnode-id="228"><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/content/archana-pai"><span data-dcnode-id="237" instrument_node="">Archana Pai</span></a><span data-dcnode-id="235" instrument_node=""> works in gravitational wave physics and astronomy. The main research focus is developing detection algorithms for the modeled as well as unmodeled astrophysical gravitational wave sources, probing astrophysical parameters using interferometric detectors such as LIGO, Virgo etc as well as from joint observation of events in gravitational wave and electromagnetic window and developing optimal multi-detector techniques for compact binaries with neutron stars and black holes. The group is a member of </span><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ligo.org/"><span data-dcnode-id="234" instrument_node="">LIGO Scientific Collaboration</span></a><span data-dcnode-id="232" instrument_node=""> and is currently involved in the intermediate mass black hole binary search with the joint observational data. &nbsp;For details on the list of compact binary merger events observed by the LIGO-Virgo network can be found </span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//losc.ligo.org/about/"><span data-dcnode-id="231" instrument_node="">here</span></a><span data-dcnode-id="229" instrument_node="">.</span></p><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Keywords: Gravitational Wave Astrophysics, Signal Processing, Testing General Relativity</span></p><p data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">&nbsp;</span></p><p data-dcnode-id="217"><a data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/employee-profile/vikram-rentala"><span data-dcnode-id="223" instrument_node="">Vikram Rentala</span></a><span data-dcnode-id="221" instrument_node=""> is a particle-astrophysicist interested in understanding the nature of the mysterious dark matter that appears to constitute most of the mass of the universe. His main interests are 1) Exploring cosmological and astrophysical signatures of dark matter self-interactions, 2) Looking for signals of dark matter annihilations and decays in cosmic rays, 3) Understanding the impact of astrophysical uncertainties on direct detection searches for dark matter, and 4) Searching for dark matter at particle colliders (such as at the Large Hadron Collider at CERN). More details about his research can be found </span><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/vikramrentalahome/home"><span data-dcnode-id="220" instrument_node="">here</span></a><span data-dcnode-id="218" instrument_node="">.</span></p><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Keywords: Dark Matter, cosmology, particle astrophysics</span></p><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">&nbsp;</span></p><p data-dcnode-id="206"><a data-dcnode-id="211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.phy.iitb.ac.in/en/content/shankaranarayanan-s"><span data-dcnode-id="212" instrument_node="">Shankaranarayanan's</span></a><span data-dcnode-id="210" instrument_node=""> fields of interest are gravitational physics and quantum field theory, with emphasis on early-universe, cosmology and black-holes. His work has focused on (i) understanding the origin of micro-Gauss strength magnetic fields in the galaxies and clusters of galaxies, (ii) Using cosmic microwave background as a tool to probe new physics near the scale of inflation and (iii) Quantum entanglement as a source of black-hole entropy. (iv) Fluid-gravity correspondence. More about his work can be found </span><a data-dcnode-id="208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//home.iitb.ac.in/~shanki/research.html"><span data-dcnode-id="209" instrument_node="">here</span></a><span data-dcnode-id="207" instrument_node="">.</span></p><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Keywords: Early Universe Cosmology, blackhole physics, modified gravity, magnetogenesis</span></p></div></div></div><div class="field field-name-field-group-name field-type-link-field field-label-above" data-dcnode-id="182"><div class="field-label" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Research Groups in this area:&nbsp;</span></div><div class="field-items" data-dcnode-id="183"><div class="field-item even" data-dcnode-id="196"><a class="groupurl" data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.phy.iitb.ac.in/en/content/varun-bhalerao" target="_blank"><span data-dcnode-id="198" instrument_node="">Varun Bhalerao Group</span></a></div><div class="field-item odd" data-dcnode-id="193"><a class="groupurl" data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//home.iitb.ac.in/~shanki/" target="_blank"><span data-dcnode-id="195" instrument_node="">S. Shankaranarayanan Group</span></a></div><div class="fie
