</span><span class="caption-text" data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">The universe is full of stars, gas clouds, galaxies, black holes and a whole lot more. Cosmologists ask, "Why?"</span></span><span data-dcnode-id="2694" instrument_node="">
</span><span class="credit" data-dcnode-id="2692" itemprop="copyrightHolder"><span data-dcnode-id="2693" instrument_node="">(Image credit: NASA Images)</span></span><span data-dcnode-id="2691" instrument_node="">

</span><div data-dcnode-id="2676" itemprop="image" itemscope="" itemtype="https://schema.org/ImageObject"><span data-dcnode-id="2683" instrument_node="">
</span><meta content="https://cdn.mos.cms.futurecdn.net/BtN5ZhNyU6kckJkAHwvYah.jpg" data-dcnode-id="2682" itemprop="url"><span data-dcnode-id="2681" instrument_node="">

</span></div><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">For thousands of years, humans have watched the stars and wondered how the universe came to be. But it wasn't until the years of World War I that researchers developed the first observational instruments and theoretical tools to transform those big questions into a precise field of study: cosmology.</span></p><div class="ad-unit" data-dcnode-id="2672" id="ad-unit-1"></div><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">"I think of cosmology as one of the oldest subjects of human interest but as one of the newest sciences," said Paul Steinhardt, a cosmologist at Princeton University who studies whether time has a beginning.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2669" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="5730512298150456000" data-widget-type="seasonal"></aside><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Cosmology, in a nutshell, studies the cosmos as one entity, rather than analyzing separately the stars, black holes and galaxies that fill it. This field asks big questions: Where did the universe come from? Why does it have stars, galaxies and galaxy clusters? What's going to happen next? "Cosmology is attempting to make a very large-scale picture of the nature of the universe," said Glennys Farrar, a particle physicist at New York University.</span></p><div class="in-article ad-unit" data-dcnode-id="2622" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2623" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2624"><div data-dcnode-id="2625"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2626" id="trc_wrapper_72348" style="ov 4 4h10.074V21.478h-4.011zM74.5 11.85a3.7 3.7 0 10-5.232 5.232c5.125 5.125 7.947 11.938 7.947 19.185 0 7.246-2.822 14.058-7.947 19.182a3.7 3.7 0 105.232 5.233c6.523-6.522 10.115-15.193 10.115-24.415 0-9.224-3.592-17.895-10.115-24.417z" data-dcnode-id="2242"></path><path d="M85.266 1.084a3.7 3.7 0 10-5.232 5.232c16.513 16.514 16.513 43.385 0 59.899a3.7 3.7 0 105.232 5.232c19.4-19.4 19.4-50.964 0-70.363zM64.176 22.174a3.7 3.7 0 00-5.233 5.232 12.449 12.449 0 013.67 8.86 12.44 12.44 0 01-3.67 8.856 3.701 3.701 0 005.233 5.233 19.792 19.792 0 005.837-14.088 19.8 19.8 0 00-5.837-14.093z" data-dcnode-id="2241"></path></g></svg></div></div></div></div></div></div></div></div><p data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">Because this discipline grapples with many phenomena, from particles in the vacuum to the fabric of space and time, cosmology draws heavily on many fields, including astronomy, astrophysics and, increasingly, particle physics.</span></p><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">"Cosmology has parts of it that are fully in physics, parts that are fully in astrophysics, and parts that go back and forth," Steinhardt said. "That's part of the excitement."</span></p><div class="ad-unit" data-dcnode-id="2226" id="ad-unit-2"></div><h2 data-dcnode-id="2224" id="a-history-of-the-history-of-the-universe"><span data-dcnode-id="2225" instrument_node=""> A history of the history of the universe</span></h2><p data-dcnode-id="2219"><span data-dcnode-id="2223" instrument_node="">The interdisciplinary nature of the field helps explain its comparatively late start. Our modern picture of the universe started to come together only in the 1920s, shortly after Albert Einstein developed the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2221" data-url="https://www.livescience.com/32216-what-is-relativity.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/32216-what-is-relativity.html"><span data-dcnode-id="2222" instrument_node="">theory of general relativity,</span></a><span data-dcnode-id="2220" instrument_node=""> a mathematical framework that describes gravity as a consequence of the bending of space and time.</span></p><p data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">"Before you understand the nature of gravity, you can't really make a theory of why things are the way they are," Steinhardt said. Other forces have greater effects on particles, but gravity is the major player in the arena of planets, stars and galaxies. Isaac Newton's description of gravity often works in that realm too, but it treats space (and time) as a rigid and unchanging backdrop against which to measure events. Einstein's work showed that space itself could expand and contract, shifting the universe from stage to actor and bringing it into the fray as a dynamic object to study.</span></p><p data-dcnode-id="2212"><span data-dcnode-id="2216" instrument_node="">In the mid-1920s, astronomer Edwin Hubble made observations from the recently built 100-inch (254 centimeters) Hooker telescope at the Mount Wilson Observatory in California. He was attempting to settle a debate about the location of certain clouds in space that astronomers could see. Hubble proved that these "nebulae" weren't small, local clouds but instead were vast, distant star clusters similar to our own Milky Way — "island universes" in the parlance of the time. Today, we call them galaxies and know that they </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2214" data-url="https://www.nytimes.com/2016/10/18/science/two-trillion-galaxies-at-the-very-least.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/10/18/science/two-trillion-galaxies-at-the-very-least.html"><span data-dcnode-id="2215" instrument_node="">number in the trillions</span></a><span data-dcnode-id="2213" instrument_node="">.</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2211" instrument_node="">The biggest upheavals in cosmic perspective were yet to come. Hubble's work in the late 1920s suggested that </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2209" data-url="https://www.livescience.com/64527-edwin-hubble-universe-expanding.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/64527-edwin-hubble-universe-expanding.html"><span data-dcnode-id="2210" instrument_node="">galaxies in every direction are speeding away</span></a><span data-dcnode-id="2208" instrument_node=""> from us, triggering decades of further debate. Eventual measurements of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2206" data-url="https://www.space.com/33892-cosmic-microwave-background.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/33892-cosmic-microwave-background.html"><span data-dcnode-id="2207" instrument_node="">cosmic microwave background</span></a><span data-dcnode-id="2205" instrument_node=""> (CMB) — light left over from the universe's early years and since stretched into microwaves — in the 1960s proved that reality matched one of the possibilities suggested by general relativity: Starting out small and hot, the universe has been getting bigger and colder ever since. The concept became known as </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2203" data-url="https://www.livescience.com/32278-was-the-big-bang-really-an-explosion.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/32278-was-the-big-bang-really-an-explosion.html"><span data-dcnode-id="2204" instrument_node="">the Big Bang theory</span></a><span data-dcnode-id="2202" instrument_node="">, and it rattled cosmologists because it implied that even the universe could have a beginning and an end.</span></p><div class="bordeaux-slot" data-dcnode-id="2200" data-feat-ref="bordeaux-feat-id-64" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2199" data-feat-ref="bordeaux-feat-id-65" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="2184"><div class="image-full-width-wrapper" data-dcnode-id="2190"><div class="image-widthsetter" data-dcnode-id="2191" style="max-width:1500px;"><p class="vanilla-image-block" data-dcnode-id="2192" style="padding-top:66.67%;"><picture data-dcnode-id="2193"><source alt="The universe began with a bang. Cosmologists have predicted that stars didn&amp;#39;t form for another 180 million years." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="2198" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="The universe began with a bang. Cosmologists have predicted that stars didn&amp;#39;t form for another 180 million years." class="pull- expandable lazy-image-van optional-image" data-dcnode-id="2197" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2194"><img alt="The universe began with a bang. Cosmologists have predicted that stars didn&amp;#39;t form for another 180 million years." class="pull- expandable lazy-image-van optional-image loaded" data-dcnode-id="2196" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/livescience/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/livescience/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/kMChxjg6MPHUGGcCparx7b-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2195"></div></figure><p></p></div></div><figcaption class="pull-" data-dcnode-id="2185" itemprop="caption description"><span class="caption-text" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">The universe began with a bang. Cosmologists have predicted that stars didn't form for another 180 million years. </span></span><span class="credit" data-dcnode-id="2186" itemprop="copyrightHolder"><span data-dcnode-id="2187" instrument_node="">(Image credit: Shutterstock)</span></span></figcaption></figure><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">But at least those astronomers could see the galaxies' motion in their telescopes. One of cosmology's most seismic shifts, said Farrar, is the idea that the vast majority of the stuff out there is made of something else, something completely invisible. The material we can see amounts to little more than a cosmic rounding error — only about 5% of everything in the universe.</span></p><p data-dcnode-id="2177"><span data-dcnode-id="2181" instrument_node="">The first denizen of the other 95% of the universe, what's come to be called the "dark sector," reared its head in the 1970s. Back then, astronomer Vera Rubin realized that galaxies were pinwheeling around so fast they </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2179" data-url="https://www.livescience.com/56380-where-is-the-rest-of-the-universe.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/56380-where-is-the-rest-of-the-universe.html"><span data-dcnode-id="2180" instrument_node="">ought to spin themselves apart</span></a><span data-dcnode-id="2178" instrument_node="">. More than hard-to-see matter, Farrar said, the stuff keeping galaxies together had to be something totally unknown to physicists, something that — except for its gravitational pull — completely ignores ordinary matter and light. Later mapping revealed that the galaxies we see are simply nuclei in the center of colossal "dark matter" spheres. The filaments of visible matter that stretch across the universe hang on a dark frame that outweighs visible particles five to one.</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2176" instrument_node="">The Hubble Space Telescope then uncovered signs of an unexpected variety of energy — which cosmologists now say accounts for the remaining 70% of the universe after accounting for dark matter (25%) and visible matter (5%) — in the 1990s, when it clocked the expansion of the universe as </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2174" data-url="https://arxiv.org/abs/astro-ph/9805201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arxiv.org/abs/astro-ph/9805201"><span data-dcnode-id="2175" instrument_node="">speeding up like a runaway train</span></a><span data-dcnode-id="2173" instrument_node="">. "Dark energy," possibly a type of energy </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2171" data-url="https://www.livescience.com/59283-why-universe-is-accelerating.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/59283-why-universe-is-accelerating.html"><span data-dcnode-id="2172" instrument_node="">inherent to space itself</span></a><span data-dcnode-id="2170" instrument_node="">, is pushing the universe apart faster than gravity can draw the cosmos together. In a trillion years, any astronomers left in the Milky Way will find themselves in a true island universe, enveloped by darkness.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">"We are at a transition point in the history of the universe, from where it's dominated by matter to where it's dominated by a new form of energy," Steinhardt said. "Dark matter determined our past. Dark energy will determine our future."</span></p><div class="jwplayer__wi _node="">Current cosmology packages these landmark discoveries into its crowning achievement, the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1805" data-url="https://lambda.gsfc.nasa.gov/education/graphic_history/univ_evol.cfm" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambda.gsfc.nasa.gov/education/graphic_history/univ_evol.cfm"><span data-dcnode-id="1806" instrument_node="">Lambda-CDM model</span></a><span data-dcnode-id="1804" instrument_node="">. Sometimes called the standard model of cosmology, this bundle of equations describes the universe from about its first second onward. The model assumes a certain amount of dark energy (lambda, for its representation in general relativity) and cold dark matter (CDM) and makes similar guesses about the amount of visible matter, the shape of the universe and other characteristics, all determined by experiments and observations.</span></p><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Play that baby-universe film forward 13.8 billion years, and cosmologists get a snapshot that "statistically has everything we can measure up to a certain point," Steinhardt said. This model represents the target to beat as cosmologists push their descriptions of the universe deeper into the past and into the future.</span></p><p data-dcnode-id="1796"><span data-dcnode-id="1800" instrument_node="">As successful as Lambda-CDM has been, it still has plenty of kinks that need working out. </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1798" data-url="https://www.livescience.com/65332-hubble-wrong-speed.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/65332-hubble-wrong-speed.html"><span data-dcnode-id="1799" instrument_node="">Cosmologists get conflicting results</span></a><span data-dcnode-id="1797" instrument_node=""> when they try to study the universe's current expansion, depending on whether they measure it directly in nearby galaxies or infer it from the CMB. This model doesn't say anything about the makeup of dark matter or energy, either.</span></p><p data-dcnode-id="1791"><span data-dcnode-id="1795" instrument_node="">Then there's that troublesome first second of existence, when the universe presumably went from infinitesimal speck to relativistically well-behaved bubble. "</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1793" data-url="https://www.space.com/25075-cosmic-inflation-universe-expansion-big-bang-infographic.html?_ga=2.34635938.2083763051.1556497061-488769505.1555003312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/25075-cosmic-inflation-universe-expansion-big-bang-infographic.html%3F_ga%3D2.34635938.2083763051.1556497061-488769505.1555003312"><span data-dcnode-id="1794" instrument_node="">Inflation</span></a><span data-dcnode-id="1792" instrument_node="">" is a popular theory that tries to handle this period, explaining how a brief moment of even quicker expansion blew up minuscule primordial variations into the large-scale unevenness of today's galaxies, as well as how the Lambda-CDM inputs got their values.</span></p><p data-dcnode-id="1786"><span data-dcnode-id="1790" instrument_node="">No one knows how inflation worked in detail, however, or why it stopped where it presumably did. Steinhardt said that inflation should have continued in many regions of space, implying that our universe is </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1788" data-url="https://www.livescience.com/15530-multiverse-universe-eternal-inflation-test.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/15530-multiverse-universe-eternal-inflation-test.html"><span data-dcnode-id="1789" instrument_node="">just one slice of a "multiverse"</span></a><span data-dcnode-id="1787" instrument_node=""> containing every possible physical reality — an untestable idea that many experimentalists find disquieting.</span></p><p data-dcnode-id="1778"><span data-dcnode-id="1785" instrument_node="">To make progress on questions like these, cosmologists look to precision measurements from space-based telescopes like the Hubble Space Telescope and the upcoming James Webb Space Telescope, as well as experiments in the emerging field of gravitational wave astronomy, such as the National Science Foundation's Laser Interferometer Gravitational-Wave Observatory. Cosmologists also join </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1783" data-url="https://www.livescience.com/65301-physicists-hunt-for-dark-world-particles.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/65301-physicists-hunt-for-dark-world-particles.html"><span data-dcnode-id="1784" instrument_node="">particle physicists</span></a><span data-dcnode-id="1782" instrument_node=""> and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1780" data-url="https://www.livescience.com/58939-gamma-ray-signal-not-dark-matter.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/58939-gamma-ray-signal-not-dark-matter.html"><span data-dcnode-id="1781" instrument_node="">astrophysicists</span></a><span data-dcnode-id="1779" instrument_node=""> in an interdisciplinary race to detect particles of dark matter.</span></p><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Just as cosmology couldn't begin until other branches of physics had matured, it won't be able to finish revealing the history of the universe until other areas are more complete."To get the story straight, you have to work out essentially all the laws of physics at all energy scales and at all conditions," Steinhardt said. "And a change in any one of those could radically change the cosmological story."</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Farrar said she doesn't know if that will happen but marvels that people have grasped the complexities of the universe as much as they have. "It's amazing that the human brain has evolved to the point that these questions can apparently be answered," she said. "Some of them at least."</span></p><p data-dcnode-id="1767"><strong data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Additional </span></strong><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">resources</span></strong><strong data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">: </span></strong></p><ul data-dcnode-id="1751"><li data-dcnode-id="1762"><span data-dcnode-id="1766" instrument_node="">Cosmologist </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1764" data-url="http://www.preposterousuniverse.com/blog/2019/01/12/true-facts-about-cosmology-or-misconceptions-skewered" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.preposterousuniverse.com/blog/2019/01/12/true-facts-about-cosmology-or-misconceptions-skewered"><span data-dcnode-id="1765" instrument_node="">Sean Carroll corrects your common misconceptions</span></a><span data-dcnode-id="1763" instrument_node=""> about the universe.</span></li><li data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node="">Read about </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1759" data-url="https://science.nasa.gov/astrophysics/focus-areas/what-is-dark-energy" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.nasa.gov/astrophysics/focus-areas/what-is-dark-energy"><span data-dcnode-id="1760" instrument_node="">NASA's mission to uncover the dark sector</span></a><span data-dcnode-id="1758" instrument_node="">.</span></li><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">Watch </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1754" data-url="https://www.youtube.com/watch?v=72cM_E6bsOs" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D72cM_E6bsOs"><span data-dcnode-id="1755" instrument_node="">PBS's "Space Time" explain one crisis</span></a><span data-dcnode-id="1753" instrument_node=""> in cosmology's standard model.</span></li></ul><span data-dcnode-id="1750" instrument_node="">
