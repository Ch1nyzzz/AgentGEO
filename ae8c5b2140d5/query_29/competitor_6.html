</span><p data-dcnode-id="2554"><span data-dcnode-id="2567" instrument_node="">Cosmology is a branch of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2565" data-url="https://www.space.com/16014-astronomy.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16014-astronomy.html"><span data-dcnode-id="2566" instrument_node="">astronomy</span></a><span data-dcnode-id="2564" instrument_node=""> that involves the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2562" data-url="https://www.space.com/13320-big-bang-universe-10-steps-explainer.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/13320-big-bang-universe-10-steps-explainer.html"><span data-dcnode-id="2563" instrument_node="">origin and evolution of the universe</span></a><span data-dcnode-id="2561" instrument_node="">, from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2559" data-url="https://www.space.com/52-the-expanding-universe-from-the-big-bang-to-today.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/52-the-expanding-universe-from-the-big-bang-to-today.html"><span data-dcnode-id="2560" instrument_node="">Big Bang</span></a><span data-dcnode-id="2558" instrument_node=""> to today and on into the future. According to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2556" data-url="https://map.gsfc.nasa.gov/cosmology/cosmology.html#:~:text=Cosmology%20is%20the%20scientific%20study,fate%20of%20the%20entire%20Universe." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//map.gsfc.nasa.gov/cosmology/cosmology.html%23%3A~%3Atext%3DCosmology%2520is%2520the%2520scientific%2520study%2Cfate%2520of%2520the%2520entire%2520Universe." target="_blank"><span data-dcnode-id="2557" instrument_node="">NASA</span></a><span data-dcnode-id="2555" instrument_node="">, the definition of cosmology is "the scientific study of the large scale properties of the universe as a whole."</span></p><div class="ad-unit" data-dcnode-id="2553" id="ad-unit-1"></div><p data-dcnode-id="2539"><span data-dcnode-id="2552" instrument_node="">Cosmologists puzzle over exotic concepts like string theory, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20930-dark-matter.html"><span data-dcnode-id="2551" instrument_node="">dark matter</span></a><span data-dcnode-id="2549" instrument_node=""> and </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20929-dark-energy.html"><span data-dcnode-id="2548" instrument_node="">dark energy</span></a><span data-dcnode-id="2546" instrument_node=""> and whether there is one universe or many (sometimes called the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/how-real-is-the-multiverse"><span data-dcnode-id="2545" instrument_node="">multiverse</span></a><span data-dcnode-id="2543" instrument_node="">). While other aspects astronomy deal with individual objects and phenomena or collections of objects, cosmology spans the entire </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2541" data-url="https://www.space.com/13336-universe-history-structure-evolution-infographic.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/13336-universe-history-structure-evolution-infographic.html"><span data-dcnode-id="2542" instrument_node="">universe from birth to death</span></a><span data-dcnode-id="2540" instrument_node="">, with a wealth of mysteries at every stage.&nbsp;</span></p><h3 class="article-body__section" data-dcnode-id="2536" id="section-history-of-cosmology-astronomy"><span data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">History of cosmology &amp; astronomy</span></span></h3><p data-dcnode-id="2513"><span data-dcnode-id="2535" instrument_node="">Humanity's understanding of the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/52-the-expanding-universe-from-the-big-bang-to-today.html"><span data-dcnode-id="2534" instrument_node="">universe</span></a><span data-dcnode-id="2532" instrument_node=""> has evolved significantly over time. In the early history of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16014-astronomy.html"><span data-dcnode-id="2531" instrument_node="">astronomy</span></a><span data-dcnode-id="2529" instrument_node="">, Earth was regarded as the center of all things, with planets and stars orbiting it. In the 16th century, Polish scientist </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2527" data-url="https://www.space.com/15684-nicolaus-copernicus.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15684-nicolaus-copernicus.html"><span data-dcnode-id="2528" instrument_node="">Nicolaus Copernicus</span></a><span data-dcnode-id="2526" instrument_node=""> suggested that Earth and the other </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16080-solar-system-planets.html"><span data-dcnode-id="2525" instrument_node="">planets in the solar system</span></a><span data-dcnode-id="2523" instrument_node=""> in fact orbited the sun, creating a profound shift in the understanding of the cosmos, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2521" data-url="https://royalsocietypublishing.org/doi/abs/10.1098/rspa.1974.0009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//royalsocietypublishing.org/doi/abs/10.1098/rspa.1974.0009" target="_blank"><span data-dcnode-id="2522" instrument_node="">The Royal Society</span></a><span data-dcnode-id="2520" instrument_node="">. In the late 17th century, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2518" data-url="https://www.space.com/15898-isaac-newton.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15898-isaac-newton.html"><span data-dcnode-id="2519" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="2517" instrument_node=""> calculated how the forces between planets — specifically the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/classical-gravity.html"><span data-dcnode-id="2516" instrument_node="">gravitational forces</span></a><span data-dcnode-id="2514" instrument_node=""> — interacted.</span></p><div class="in-article ad-unit" data-dcnode-id="2468" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2469" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2470"><div data-dcnode-id="2471"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2472" id="trc_wrapper_46302" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2496" id="trc_header_46302"><div class="trc_header_ext" data-dcnode-id="2498"><div class="logoDiv link-di bcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/why-is-there-a-cosmology-crisis"><span data-dcnode-id="2036" instrument_node="">Why is there a 'crisis' in cosmology?</span></a></p><p data-dcnode-id="2031"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/what-came-before-big-bang.html"><span data-dcnode-id="2033" instrument_node="">What happened before the Big Bang?</span></a></p><p data-dcnode-id="2028"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/25303-how-many-galaxies-are-in-the-universe.html"><span data-dcnode-id="2030" instrument_node="">How many galaxies are there?</span></a></p></div></div><p data-dcnode-id="2010"><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2024" data-url="https://www.space.com/15665-edwin-powell-hubble.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15665-edwin-powell-hubble.html"><span data-dcnode-id="2025" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="2023" instrument_node=""> calculated the distance to a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2021" data-url="https://www.space.com/15590-andromeda-galaxy-m31.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15590-andromeda-galaxy-m31.html"><span data-dcnode-id="2022" instrument_node="">fuzzy nebulous object</span></a><span data-dcnode-id="2020" instrument_node=""> in the sky and determined that it lay outside of the Milky Way, proving our galaxy to be a small drop in the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/24073-how-big-is-the-universe.html"><span data-dcnode-id="2019" instrument_node="">enormous universe</span></a><span data-dcnode-id="2017" instrument_node="">, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2015" data-url="https://www.jstor.org/stable/24941551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/24941551" target="_blank"><span data-dcnode-id="2016" instrument_node="">Scientific American</span></a><span data-dcnode-id="2014" instrument_node="">. Using General Relativity to lay the framework, Hubble measured other </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2012" data-url="https://www.space.com/15680-galaxies.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15680-galaxies.html"><span data-dcnode-id="2013" instrument_node="">galaxies</span></a><span data-dcnode-id="2011" instrument_node=""> and determined that they were rushing away from the us, leading him to conclude that the universe was not static but expanding.</span></p><div class="ad-unit" data-dcnode-id="2009" id="ad-unit-2"></div><p data-dcnode-id="2001"><span data-dcnode-id="2008" instrument_node="">In recent decades, cosmologist </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2006" data-url="https://www.space.com/15923-stephen-hawking.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15923-stephen-hawking.html"><span data-dcnode-id="2007" instrument_node="">Stephen Hawking</span></a><span data-dcnode-id="2005" instrument_node=""> determined that the universe itself is not infinite but has a definite size. However, it lacks a definite boundary. This is similar to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/54-earth-history-composition-and-atmosphere.html"><span data-dcnode-id="2004" instrument_node="">Earth</span></a><span data-dcnode-id="2002" instrument_node="">; although the planet is finite, a person traveling around it would never find the "end" but would instead constantly circle the globe. Hawking also proposed that the universe would not continue on forever but would eventually end.</span></p><h3 class="article-body__section" data-dcnode-id="1998" id="section-cosmological-missions-instruments"><span data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Cosmological missions &amp; instruments</span></span></h3><p data-dcnode-id="1993"><span data-dcnode-id="1997" instrument_node="">Launched in November 1989, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1995" data-url="https://science.nasa.gov/missions/cobe" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.nasa.gov/missions/cobe" target="_blank"><span data-dcnode-id="1996" instrument_node="">NASA's Cosmic Background Explorer</span></a><span data-dcnode-id="1994" instrument_node=""> (COBE) took precise measurements of radiation across the sky. The mission operated until 1993.</span></p><p data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node="">Although NASA's Hubble Space Telescope is probably best known for its astounding images, a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1990" data-url="https://www.nasa.gov/mission_pages/hubble/story/index.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/mission_pages/hubble/story/index.html" target="_blank"><span data-dcnode-id="1991" instrument_node="">primary mission</span></a><span data-dcnode-id="1989" instrument_node=""> was cosmological. By more accurately measuring the distances to Cepheid variables, stars with a well-defined ratio between their brightness and their pulsations, Hubble helped to refine measurements regarding how the universe is expanding. Since its launch, astronomers have continued to use Hubble to make cosmological measurements and refine existing ones.</span></p><div class="bordeaux-slot" data-dcnode-id="1987" data-feat-ref="bordeaux-feat-id-72" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1986" data-feat-ref="bordeaux-feat-id-75" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1973"><div class="image-full-width-wrapper" data-dcnode-id="1979"><div class="image-widthsetter" data-dcnode-id="1980" style="max-width:1024px;"><p class="vanilla-image-block" data-dcnode-id="1981" style="padding-top:75.10%;"><picture data-dcnode-id="1982"><source alt="COBE image" class="lazy-image-van optional-image" data-dcnode-id="1985" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg.webp 970w" type="image/webp"><source alt="COBE image" class="lazy-image-van optional-image" data-dcnode-id="1984" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg 970w" type="image/jpeg"><img alt="COBE image" class="lazy-image-van optional-image loaded" data-dcnode-id="1983" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-320-80.jpeg 320w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-650-80.jpeg 650w, https://cdn.mos.cms.futurecdn.net/9qxdnUGHJw5gc7pBUnKW93-970-80.jpeg 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="1974" itemprop="caption description"><span class="caption-text" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">NASA's COBE satellite precisely mapped cosmic microwave background.&nbsp; </span></span><span class="credit" data-dcnode-id="1975" itemprop="copyrightHolder"><span data-dcnode-id="1976" instrument_node="">(Image credit: NASA)</span></span></figcaption></figure><p data-dcnode-id="1965"><span data-dcnode-id="1972" instrument_node="">Thanks to Hubble, "If you put in a box all the ways that dark energy might differ from the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/cosmological-constant"><span data-dcnode-id="1971" instrument_node="">cosmological constant</span></a><span data-dcnode-id="1969" instrument_node="">, that box would now be three times smaller," cosmologist Adam Riess of the Space Telescope Science Institute said in a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1967" data-url="http://hubblesite.org/news_release/news/2009-08/27-distant-galaxies" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/news_release/news/2009-08/27-distant-galaxies" target="_blank"><span data-dcnode-id="1968" instrument_node="">statement</span></a><span data-dcnode-id="1966" instrument_node="">. "That's progress, but we still have a long way to go to pin down the nature of dark energy."</span></p><p data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">NASA's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1962" data-url="https://map.gsfc.nasa.gov/universe/bb_theory.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//map.gsfc.nasa.gov/universe/bb_theory.html" target="_blank"><span data-dcnode-id="1963" instrument_node="">Wilkinson Microwave Anisotropy Probe</span></a><span data-dcnode-id="1961" instrument_node=""> (WMAP) was a spacecraft that operated from 2001 to 2010. WMAP mapped tiny fluctuations in the cosmic microwave background (CMB), the ancient light from the early universe, and determined that ordinary atoms make up only 4.6 percent of the universe, while dark matter makes up 24 percent.</span></p><p data-dcnode-id="1955"><span data-dcnode-id="1959" instrument_node="">"Lingering doubts about the existence of dark energy and the composition of the universe dissolved when the WMAP satellite took the most detailed picture ever of the cosmic microwave background," said cosmologist Charles Seife in the journal </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1957" data-url="http://science.sciencemag.org/content/302/5653/2038/tab-pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//science.sciencemag.org/content/302/5653/2038/tab-pdf" target="_blank"><span data-dcnode-id="1958" instrument_node="">Science</span></a><span data-dcnode-id="1956" instrument_node="">.</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">The European Space Agency's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1952" data-url="http://www.esa.int/Our_Activities/Space_Science/Planck" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esa.int/Our_Activities/Space_Science/Planck" target="_blank"><span data-dcnode-id="1953" instrument_node="">Planck space mission</span></a><span data-dcnode-id="1951" instrument_node=""> ran from 2009 to 2013 and continued the study of the cosmic microwave background.</span></p><p data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node="">ESA is currently developing the Euclid mission, which should launch in 2023, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1947" data-url="https://sci.esa.int/web/euclid/-/fact-sheet" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci.esa.int/web/euclid/-/fact-sheet" target="_blank"><span data-dcnode-id="1948" instrument_node="">ESA's fact sheet</span></a><span data-dcnode-id="1946" instrument_node="">. Euclid will study dark matter and dark energy with greater precision, tracing its distribution and evolution through the universe.</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">"At the heart of the mission is one of the billion pound questions of physics," the ESA's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1942" data-url="https://www.eurekalert.org/pub_releases/2012-06/usa-itd062012.php" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurekalert.org/pub_releases/2012-06/usa-itd062012.php" target="_blank"><span data-dcnode-id="1943" instrument_node="">David Parker said in a statement</span></a><span data-dcnode-id="1941" instrument_node="">.</span></p><h3 class="article-body__section" data-dcnode-id="1937" id="section-common-cosmological-questions"><span data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Common cosmological questions</span></span></h3><p data-dcnode-id="1928"><em data-dcnode-id="1934"><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">What came before the Big Bang?</span></strong></em><br data-dcnode-id="1933"><span data-dcnode-id="1932" instrument_node="">
Because of the enclosed and finite nature of the universe, we cannot see "outside" of our own universe. Space and time began with the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1930" data-url="https://www.space.com/13219-photos-big-bang-early-universe-history.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/13219-photos-big-bang-early-universe-history.html"><span data-dcnode-id="1931" instrument_node="">Big Bang</span></a><span data-dcnode-id="1929" instrument_node="">. While there are a number of speculations about the existence of other universes, there is no practical way to observe them, and as such there will never be any evidence for (or against!) them.</span></p><p data-dcnode-id="1919"><em data-dcnode-id="1925"><strong data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Where did the Big Bang happen?</span></strong></em><br data-dcnode-id="1924"><span data-dcnode-id="1923" instrument_node="">
The Big Bang did not happen at a single point but instead was the appearance of space and time throughout the entire universe at once, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1921" data-url="https://www.livescience.com/65254-what-happened-before-big-big.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.livescience.com/65254-what-happened-before-big-big.html" target="_blank"><span data-dcnode-id="1922" instrument_node="">Live Science</span></a><span data-dcnode-id="1920" instrument_node="">.</span></p><div class="bordeaux-slot" data-dcnode-id="1918" data-feat-ref="bordeaux-feat-id-73" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1917" data-feat-ref="bordeaux-feat-id-76" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1904"><div class="image-full-width-wrapper" data-dcnode-id="1910"><div class="image-widthsetter" data-dcnode-id="1911" style="max-width:1280px;"><p class="vanilla-image-block" data-dcnode-id="1912" style="padding-top:63.67%;"><picture data-dcnode-id="1913"><source alt="Expanding universe" class="lazy-image-van optional-image" data-dcnode-id="1916" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg.webp 970w" type="image/webp"><source alt="Expanding universe" class="lazy-image-van optional-image" data-dcnode-id="1915" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg 970w" type="image/jpeg"><img alt="Expanding universe" class="lazy-image-van optional-image loaded" data-dcnode-id="1914" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/Xub58vuiCCEKHLGuM4QWBU-970-80.jpg 970w"></picture></p></div></div><figcaption class="inline-layout" data-dcnode-id="1905" itemprop="caption description"><span class="caption-text" data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">The expansion of the universe&nbsp;gradually slowed down&nbsp;as the matter in the universe pulled on itself via gravity. </span></span><span class="credit" data-dcnode-id="1906" itemprop="copyrightHolder"><span data-dcnode-id="1907" instrument_node="">(Image credit: Getty)</span></span></figcaption></figure><p data-dcnode-id="1895"><em data-dcnode-id="1901"><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">If other galaxies all seem to be rushing away from us, doesn't that place us at the center of the universe?</span></strong></em><br data-dcnode-id="1900"><span data-dcnode-id="1899" instrument_node="">
No, because if we were to travel to a distant galaxy, it would seem that all surrounding galaxies were similarly rushing away. Think of the universe as a giant balloon. If you mark multiple points on the balloon, then blow it up, you would note that each point is moving away from all of the others, though none are at the center. The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1897" data-url="https://www.space.com/52-the-expanding-universe-from-the-big-bang-to-today.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/52-the-expanding-universe-from-the-big-bang-to-today.html"><span data-dcnode-id="1898" instrument_node="">expansion of the universe</span></a><span data-dcnode-id="1896" instrument_node=""> functions in much the same way.</span></p><p data-dcnode-id="1886"><em data-dcnode-id="1892"><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">How old is the universe?</span></strong></em><br data-dcnode-id="1891"><span data-dcnode-id="1890" instrument_node="">
According to data released by the Planck team in 2013, the universe is 13.8 billion years old, give or take a hundred million years or so, according to the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1888" data-url="https://www.researchgate.net/profile/Espen-Haug-2/publication/350874725_The_Collision_Time_of_the_Observable_Universe_is_138_Billion_Years_per_Planck_time_A_New_Understanding_of_the_Cosmos_based_on_Collision_Space-Time/links/60a6fadaa6fdcc6d62365255/The-Collision-Time-of-the-Observable-Universe-is-138-Billion-Years-per-Planck-time-A-New-Understanding-of-the-Cosmos-based-on-Collision-Space-Time.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Espen-Haug-2/publication/350874725_The_Collision_Time_of_the_Observable_Universe_is_138_Billion_Years_per_Planck_time_A_New_Understanding_of_the_Cosmos_based_on_Collision_Space-Time/links/60a6fadaa6fdcc6d62365255/The-Collision-Time-of-the-Observable-Universe-is-138-Billion-Years-per-Planck-time-A-New-Understanding-of-the-Cosmos-based-on-Collision-Space-Time.pdf" target="_blank"><span data-dcnode-id="1889" instrument_node="">Norwegian University of Life Sciences</span></a><span data-dcnode-id="1887" instrument_node="">. Planck determined the age after mapping tiny temperature fluctuations in the CMB.</span></p><p data-dcnode-id="1881"><span data-dcnode-id="1885" instrument_node="">"Patterns over huge patches of sky tell us about what was happening on the tiniest of scales in the moments just after our universe was born," said Charles Lawrence, the U.S. project scientist for Planck, in a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1883" data-url="https://www.nasa.gov/mission_pages/planck/news/planck20130321.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/mission_pages/planck/news/planck20130321.html" target="_blank"><span data-dcnode-id="1884" instrument_node="">statement</span></a><span data-dcnode-id="1882" instrument_node="">.</span></p><p data-dcnode-id="1872"><em data-dcnode-id="1878"><strong data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">Will the universe end? If so, how?</span></strong></em><br data-dcnode-id="1877"><span data-dcnode-id="1876" instrument_node="">
Whether or not the universe will come to an end depends on its density — how spread out the matter within it might be. Scientists have calculated a "critical density" for the universe. If its true density is greater than their calculations, eventually the expansion of the universe will slow and then, ultimately, reverse until it collapses. However, if the density is less than the critical density, the universe will continue to expand forever, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/24309-shape-of-the-universe.html"><span data-dcnode-id="1875" instrument_node="">Space.com previously reported</span></a><span data-dcnode-id="1873" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="1860"><em data-dcnode-id="1869"><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Which came first, the galaxy or the stars?</span></strong></em><br data-dcnode-id="1868"><span data-dcnode-id="1867" instrument_node="">
The post-Big Bang universe was composed predominantly of hydrogen, with a little bit of helium thrown in for good measure, according to </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1865" data-url="https://www.nasa.gov/feature/the-universe-s-first-type-of-molecule-is-found-at-last" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasa.gov/feature/the-universe-s-first-type-of-molecule-is-found-at-last" target="_blank"><span data-dcnode-id="1866" instrument_node="">NASA</span></a><span data-dcnode-id="1864" instrument_node="">. Gravity caused the hydrogen to collapse inward, forming structures. According to the Department of Physics and Astronomy at </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1862" data-url="https://www.physics.uu.se/research/astronomy-and-space-physics/research/galaxies/first-stars-galaxies/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physics.uu.se/research/astronomy-and-space-physics/research/galaxies/first-stars-galaxies/" target="_blank"><span data-dcnode-id="1863" instrument_node="">Uppsala University</span></a><span data-dcnode-id="1861" instrument_node="">, the first stars are likely to have formed before the first galaxies, when the universe was about 100 million years old.</span></p><h3 class="article-body__section" data-dcnode-id="1857" id="section-additional-resources"><span data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Additional resources</span></span></h3><p data-dcnode-id="1849"><span data-dcnode-id="1856" instrument_node="">You can read more about cosmology and the foundations of the Big Bang model in </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1854" data-url="https://map.gsfc.nasa.gov/universe/WMAP_Universe.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//map.gsfc.nasa.gov/universe/WMAP_Universe.pdf" target="_blank"><span data-dcnode-id="1855" instrument_node="">Wilkinson Microwave Anisotropy Probe's Introduction to Cosmology</span></a><span data-dcnode-id="1853" instrument_node=""> by NASA. For more answers to common cosmology questions, go to NASA's </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1851" data-url="https://imagine.gsfc.nasa.gov/ask_astro/cosmology.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.gsfc.nasa.gov/ask_astro/cosmology.html" target="_blank"><span data-dcnode-id="1852" instrument_node="">Ask an Astrophysicist </span></a><span data-dcnode-id="1850" instrument_node="">page.</span></p><h3 class="article-body__section" data-dcnode-id="1846" id="section-bibliography"><span data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Bibliography</span></span></h3><p data-dcnode-id="1842"><span data-dcnode-id="1845" instrument_node="">"Edwin Hubble and the Expanding Universe". Scientific American (1993). </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1843" data-url="https://www.jstor.org/stable/24941551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/24941551" target="_blank"><span data-dcnode-id="1844" instrument_node="">https://www.jstor.org/stable/24941551</span></a></p><p data-dcnode-id="1838"><span data-dcnode-id="1841" instrument_node="">"Illuminating the Dark Universe". Science (2003). </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1839" data-url="https://www.science.org/doi/10.1126/science.302.5653.2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.science.org/doi/10.1126/science.302.5653.2038" target="_blank"><span data-dcnode-id="1840" instrument_node="">https://www.science.org/doi/10.1126/science.302.5653.2038</span></a></p><p data-dcnode-id="1834"><span data-dcnode-id="1837" instrument_node="">"The Collision Time of the Observable Universe is 13.8 Billion Years per Planck time: A New Understanding of the Cosmos based on Collision Space-Time". Norwegian University of Life Sciences (2021). </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1835" data-url="https://www.researchgate.net/publication/350874725_The_Collision_Time_of_the_Observable_Universe_is_138_Billion_Years_per_Planck_time_A_New_Understanding_of_the_Cosmos_based_on_Collision_Space-Time" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/350874725_The_Collision_Time_of_the_Observable_Universe_is_138_Billion_Years_per_Planck_time_A_New_Understanding_of_the_Cosmos_based_on_Collision_Space-Time" target="_blank"><span data-dcnode-id="1836" instrument_node="">https://www.researchgate.net/publication/350874725</span></a></p><p data-dcnode-id="1830"><span data-dcnode-id="1833" instrument_node="">"The First Stars and Galaxies". Department of Physics and Astronomy, Uppsala University (2021). </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1831" data-url="https://www.physics.uu.se/research/astronomy-and-space-physics/research/galaxies/first-stars-galaxies/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physics.uu.se/research/astronomy-and-space-physics/research/galaxies/first-stars-galaxies/" target="_blank"><span data-dcnode-id="1832" instrument_node="">https://www.physics.uu.se/research/astronomy-and-space-physics/research</span></a></p><p data-dcnode-id="1826"><span data-dcnode-id="1829" instrument_node="">"The work of Nicolaus Copernicus". Proceedings of The Royal Society A (1974). </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1827" data-url="https://royalsocietypublishing.org/doi/abs/10.1098/rspa.1974.0009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//royalsocietypublishing.org/doi/abs/10.1098/rspa.1974.0009" target="_bla
