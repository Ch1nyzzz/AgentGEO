</span><section class="article-section article-section__abstract" data-dcnode-id="3581" data-lang="en" id="section-1-en" lang="en" style=""><span data-dcnode-id="3590" instrument_node="">
</span><h2 class="article-section__header section__title main abstractlang_en main" data-dcnode-id="3588" id="d265139"><span data-dcnode-id="3589" instrument_node="">Abstract</span></h2><span data-dcnode-id="3587" instrument_node="">
</span><div class="article-section__content en main" data-dcnode-id="3583"><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Due to their important physiological functions, ion channels are key therapeutic targets for a variety of disorders. However, electrophysiological assessment of ion channel activity is technically challenging and has been a bottleneck in the discovery of drugs that modulate channel function. To address this issue, automated patch clamp platforms have been developed with improved throughput and broader applications. An overview of the current status of high-throughput electrophysiology and its applications in drug discovery is provided. © 2019 The Authors.</span></p></div><span data-dcnode-id="3582" instrument_node="">
</span></section><span data-dcnode-id="3580" instrument_node="">
</span></div><span data-dcnode-id="3578" instrument_node="">
</span><div class="pb-dropzone" data-dcnode-id="3576" data-pb-dropzone="below-abstract-group"></div><span data-dcnode-id="3575" instrument_node="">
</span><section class="article-section article-section__full" data-dcnode-id="802"><span data-dcnode-id="3574" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="2944" id="cpph69-sec-0010"><span data-dcnode-id="3573" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="3571" id="cpph69-sec-0010-title"><span data-dcnode-id="3572" instrument_node=""> INTRODUCTION</span></h2><span data-dcnode-id="3570" instrument_node="">
</span><p data-dcnode-id="3542"><span data-dcnode-id="3569" instrument_node="">Ion channels are macromolecular complexes that control ion flow across the plasma membrane and membranes of intracellular organelles (Hille, </span><span data-dcnode-id="3566"><a class="bibLink tab-link" data-dcnode-id="3567" data-tab="pane-pcw-references" href="#cpph69-bib-0014" id="cpph69-bib-0014R"><span data-dcnode-id="3568" instrument_node="">2001</span></a></span><span data-dcnode-id="3565" instrument_node="">). The opening and closing of the ion-conducting channel pore can be regulated by voltage, temperature, osmolarity, mechanical force, and/or the binding of chemical ligands. The electrical signals mediated by ion channel activity are essential for diverse physiological functions ranging from cognition, sensation, muscle contraction, and volume regulation to cellular signaling. Inherited dysfunction of ion channels can cause a variety of diseases (i.e., channelopathies), such as epilepsy, cardiac arrhythmia, and myotonia (Ptacek, </span><span data-dcnode-id="3562"><a class="bibLink tab-link" data-dcnode-id="3563" data-tab="pane-pcw-references" href="#cpph69-bib-0024" id="cpph69-bib-0024R"><span data-dcnode-id="3564" instrument_node="">2015</span></a></span><span data-dcnode-id="3561" instrument_node="">; Ryan &amp; Ptacek, </span><span data-dcnode-id="3558"><a class="bibLink tab-link" data-dcnode-id="3559" data-tab="pane-pcw-references" href="#cpph69-bib-0026" id="cpph69-bib-0026R"><span data-dcnode-id="3560" instrument_node="">2010</span></a></span><span data-dcnode-id="3557" instrument_node="">). Many ion channels have been pursued as key therapeutic targets (Wickenden, Priest, &amp; Erdemli, </span><span data-dcnode-id="3554"><a class="bibLink tab-link" data-dcnode-id="3555" data-tab="pane-pcw-references" href="#cpph69-bib-0034" id="cpph69-bib-0034R"><span data-dcnode-id="3556" instrument_node="">2012</span></a></span><span data-dcnode-id="3553" instrument_node="">). Indeed, ion channels represent the second largest class of targets, behind G-protein-coupled receptors, for drugs approved by the US Food and Drug Administration (Overington, Al-Lazikani, &amp; Hopkins, </span><span data-dcnode-id="3550"><a class="bibLink tab-link" data-dcnode-id="3551" data-tab="pane-pcw-references" href="#cpph69-bib-0022" id="cpph69-bib-0022R"><span data-dcnode-id="3552" instrument_node="">2006</span></a></span><span data-dcnode-id="3549" instrument_node="">). Unintended drug effects on ion channels cause significant toxicity risks that can be life threatening. For example, unintended block of </span><i data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">hERG</span></i><span data-dcnode-id="3546" instrument_node=""> K</span><sup data-dcnode-id="3544"><span data-dcnode-id="3545" instrument_node="">+</span></sup><span data-dcnode-id="3543" instrument_node=""> channels can result in QT prolongation, ventricular arrhythmia, and sudden cardiac death. In recent years, high-throughput electrophysiology has emerged to meet the increasing demand to assess ion channel function. In this article, we provide an overview of the current status of high-throughput electrophysiology, practical considerations, and applications.</span></p><span data-dcnode-id="3541" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="3492" id="cpph69-sec-0020"><span data-dcnode-id="3540" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="3538" id="cpph69-sec-0020-title"><span data-dcnode-id="3539" instrument_node=""> Manual Patch Clamp</span></h3><span data-dcnode-id="3537" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3536" instrument_node="">The biophysical properties of ion channel function is routinely studied by manual patch clamp, an electrophysiological procedure developed in the 1970s by Neher and Sakmann (</span><span data-dcnode-id="3533"><a class="bibLink tab-link" data-dcnode-id="3534" data-tab="pane-pcw-references" href="#cpph69-bib-0019" id="cpph69-bib-0019R"><span data-dcnode-id="3535" instrument_node="">1976</span></a></span><span data-dcnode-id="3532" instrument_node="">) who were later awarded a Nobel prize for this revolutionary invention. A typical manual patch clamp experiment begins with the fabrication of fine-tipped glass microelectrodes as recording pipettes. The pipette tip is placed onto the surface of a cell (Fig. </span><a data-dcnode-id="3530" href="#cpph69-fig-0001"><span data-dcnode-id="3531" instrument_node="">1</span></a><span data-dcnode-id="3529" instrument_node="">A), and when gentle back-suction is applied, a tight electrical seal with a resistance of several gigaohms (GΩ) is achieved between the pipette tip and the cell membrane. This tight seal is critical for lowering background noise recording of bioelectrical currents across the membrane. To gain electrical access to the interior of the cell, the small piece of membrane within the pipette tip is ruptured by brief negative pressure or an electric pulse, or the membrane is perforated by including a pore-forming antibiotic (e.g., nystatin) in the recording pipette. The resulting “whole-cell” configuration allows precise control of transmembrane voltage (i.e., voltage clamp) and the recording of currents across the entire plasma membrane in response to stepped change in transmembrane voltage in accordance with the electrochemical gradient of the permeant ion(s). In addition to the whole-cell configuration of voltage clamp, single-channel currents can be recorded from a membrane patch in inside-out or outside-out configurations. Although patch clamp is considered the gold standard for high-fidelity analysis of ion channel function, it requires considerable training and is notoriously labor intensive. A highly skilled electrophysiologist can usually generate 15 to 30 data points per day, which is a very low-throughput rate considering that a typical chemical library consists of millions of compounds.</span></p><span data-dcnode-id="3527" instrument_node="">
</span><section class="article-section__inline-figure" data-dcnode-id="3494"><span data-dcnode-id="3526" instrument_node="">
</span><figure class="figure" data-dcnode-id="3496" id="cpph69-fig-0001"><a data-dcnode-id="3521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//currentprotocols.onlinelibrary.wiley.com/cms/asset/473a7fdb-af93-4da3-aca9-7661ba109dcd/cpph69-fig-0001-m.jpg" target="_blank"><picture data-dcnode-id="3522"><span data-dcnode-id="3525" instrument_node="">

</span><div class="figure__caption figure__caption-text" data-dcnode-id="3500"><span data-dcnode-id="3507" instrument_node="">A comparison between conventional manual patch clamp and automated electrophysiology. (</span><b data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">A</span></b><span data-dcnode-id="3504" instrument_node="">) Schematic of manual patch clamp recording (left panel) under whole-cell configuration. A single cell is recorded using a glass recording pipette. Compounds can be applied to the extracellular solution (blue), whereas the artificial intracellular solution (green) is contained in the pipette. Right panel: voltage pulse protocol and representative transient inward Nav1.7 channel current. (</span><b data-dcnode-id="3502"><span data-dcnode-id="3503" instrument_node="">B</span></b><span data-dcnode-id="3501" instrument_node="">) Schematic of planar array–based automated electrophysiology experiment. A single cell is recorded through a micropore in a single well (upper left) from a chip containing 384 wells (upper right). Both extracellular (blue) and intracellular (green) solutions can be changed by perfusion. Lower panel: representative result from one Syncropatch run. Wells were color coded based on seal resistance. Resistance, cells: green, &gt;0.5 GΩ, 350/384; blue, 100 to 500 MΩ, 30/384; white, &lt;100 MΩ, 4/384. Current traces within each well were autoscaled for maximum display.</span></div><span data-dcnode-id="3499" instrument_node="">

</span><section class="article-section__sub-content" data-dcnode-id="2946" id="cpph69-sec-0030"><span data-dcnode-id="3490" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="3488" id="cpph69-sec-0030-title"><span data-dcnode-id="3489" instrument_node=""> Automated Electrophysiology Platforms</span></h3><span data-dcnode-id="3487" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3486" instrument_node="">Given the low throughput and technical challenges of manual patch clamp, there has been considerable effort to automate the technique. Several automated patch clamp platforms have been invented since the 1990s (Dunlop, Bowlby, Peri, Vasilyev, &amp; Arias, </span><span data-dcnode-id="3483"><a class="bibLink tab-link" data-dcnode-id="3484" data-tab="pane-pcw-references" href="#cpph69-bib-0010" id="cpph69-bib-0010R"><span data-dcnode-id="3485" instrument_node="">2008</span></a></span><span data-dcnode-id="3482" instrument_node="">). In general, these platforms can utilize either glass pipettes or planar arrays.</span></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3479" instrument_node="">Pipette-based automated patch clamp platforms are based on the same physical principles as manual patch clamp but automate the processes of pipette handling, tight seal formation, achievement of whole-cell recording configuration, and compound application. There are major differences in cell catching and GΩ seal formation among pipette-based platforms. For examples, semi-automated Apatchi-1 (Asmild et&nbsp;al., </span><span data-dcnode-id="3476"><a class="bibLink tab-link" data-dcnode-id="3477" data-tab="pane-pcw-references" href="#cpph69-bib-0001" id="cpph69-bib-0001R"><span data-dcnode-id="3478" instrument_node="">2003</span></a></span><span data-dcnode-id="3475" instrument_node="">) and fully automated Robopatch (Vasilyev, Merrill, Iwanow, Dunlop, &amp; Bowlby, </span><span data-dcnode-id="3472"><a class="bibLink tab-link" data-dcnode-id="3473" data-tab="pane-pcw-references" href="#cpph69-bib-0032" id="cpph69-bib-0032R"><span data-dcnode-id="3474" instrument_node="">2006</span></a></span><span data-dcnode-id="3471" instrument_node="">) employ robots to mimic the conventional patch clamp procedure. Cells are randomly encountered by the recording pipettes and are patched in the solution or air/liquid interface. In contrast, for Flyscreen the cell suspension is flushed to the inside of a glass pipette to achieve GΩ seals with a single cell at the tip of the pipette (Lepple-Wienhues, Ferlinz, Seeger, &amp; Schafer, </span><span data-dcnode-id="3468"><a class="bibLink tab-link" data-dcnode-id="3469" data-tab="pane-pcw-references" href="#cpph69-bib-0015" id="cpph69-bib-0015R"><span data-dcnode-id="3470" instrument_node="">2003</span></a></span><span data-dcnode-id="3467" instrument_node="">). These glass pipette–based platforms reduce technical difficulties while maintaining a high quality of ionic current recording. Several platforms enable parallel recordings of multiple cells. For example, the Patchserver system (Multichannel Systems Inc., Germany) is capable of recording up to four cells simultaneously. As these systems only moderately increase throughput compared with manual patch clamp, they are inadequate for conducting large-scale drug screens.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3452"><span data-dcnode-id="3464" instrument_node="">Planar array–based automated patch clamp platforms include multiple commercially available instruments (Dunlop et&nbsp;al., </span><span data-dcnode-id="3461"><a class="bibLink tab-link" data-dcnode-id="3462" data-tab="pane-pcw-references" href="#cpph69-bib-0010" id="cpph69-bib-0010R"><span data-dcnode-id="3463" instrument_node="">2008</span></a></span><span data-dcnode-id="3460" instrument_node="">). Instead of recording currents using glass pipettes, planar array–based platforms utilize a planar chip containing multiple micropores that capture cells dispensed onto the chips (Fig. </span><a data-dcnode-id="3458" href="#cpph69-fig-0001"><span data-dcnode-id="3459" instrument_node="">1</span></a><span data-dcnode-id="3457" instrument_node="">B). Suspended cells are drawn towards the micropores by applying negative pressure to facilitate formation of an electrical seal. The pore-delineated membrane is disrupted to form the whole-cell recording configuration by applying further negative pressure or by exposing the membrane to a perforating reagent. Because of the parallel recordings from multiple wells in the same plate/chip, planar array–based automated patch clamp platforms usually allow for much higher throughput. IonWorks HT is the first system (Molecular Devices) allowing data collection from a 384-well plate format (Schroeder, Neagle, Trezise, &amp; Worley, </span><span data-dcnode-id="3454"><a class="bibLink tab-link" data-dcnode-id="3455" data-tab="pane-pcw-references" href="#cpph69-bib-0028" id="cpph69-bib-0028R"><span data-dcnode-id="3456" instrument_node="">2003</span></a></span><span data-dcnode-id="3453" instrument_node="">). Later models such as IonWorks Quattro and Barracuda adopted a perforated patch clamp approach that increases recording stability. While all of these platforms increase throughput rates, because of suboptimal seal resistance (&lt;200 MΩ), their data quality is below that obtained using the conventional patch clamp approach.</span></p><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3423"><span data-dcnode-id="3450" instrument_node="">Several other planar array automated patch clamp formats enable formation of GΩ seals and a corresponding enhancement in recording quality. The throughput rates of these devices range from low (Port-a-Patch, Nanion Technologies) to medium (PatchXpress, Molecular Devices; Patchliner, Nanion Technologies; QPatch, Sophion Bioscience) to high (Syncropatch 384/768PE, Nanion Technologies; Qube, Sophion Bioscience) as shown in Table </span><a class="tableLink scrollableLink" data-dcnode-id="3448" href="#cpph69-tbl-0001" title="Link to table"><span data-dcnode-id="3449" instrument_node="">1</span></a><span data-dcnode-id="3447" instrument_node=""> (Bell &amp; Dallas, </span><span data-dcnode-id="3444"><a class="bibLink tab-link" data-dcnode-id="3445" data-tab="pane-pcw-references" href="#cpph69-bib-0003" id="cpph69-bib-0003R"><span data-dcnode-id="3446" instrument_node="">2018</span></a></span><span data-dcnode-id="3443" instrument_node="">; Li &amp; Chen, </span><span data-dcnode-id="3440"><a class="bibLink tab-link" data-dcnode-id="3441" data-tab="pane-pcw-references" href="#cpph69-bib-0016" id="cpph69-bib-0016R"><span data-dcnode-id="3442" instrument_node="">2018</span></a></span><span data-dcnode-id="3439" instrument_node="">). The GΩ seal–based recordings of these devices are made possible by using precisely controlled negative pressure and by using fluoride ions in the internal solution. For platforms such as Patchliner and Syncropatch, a “seal enhancer” solution containing a high concentration of Ca</span><sup data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">2+</span></sup><span data-dcnode-id="3436" instrument_node=""> (10 to 40 mM) is added to boost GΩ seal formation and is subsequently washed out before commencing current recordings. Port-a-Patch, Patchliner, QPatch, and Qube adopt microfluidic designs that allow for relatively rapid solution switching (e.g., &lt;50 ms). This feature is important for fast-desensitizing ligand-gated ion channels such as the α7 nicotinic acetylcholine receptor (Dunlop et&nbsp;al., </span><span data-dcnode-id="3433"><a class="bibLink tab-link" data-dcnode-id="3434" data-tab="pane-pcw-references" href="#cpph69-bib-0011" id="cpph69-bib-0011R"><span data-dcnode-id="3435" instrument_node="">2007</span></a></span><span data-dcnode-id="3432" instrument_node="">; Friis, Mathes, Sunesen, Bowlby, &amp; Dunlop, </span><span data-dcnode-id="3429"><a class="bibLink tab-link" data-dcnode-id="3430" data-tab="pane-pcw-references" href="#cpph69-bib-0013" id="cpph69-bib-0013R"><span data-dcnode-id="3431" instrument_node="">2009</span></a></span><span data-dcnode-id="3428" instrument_node="">; see Current Protocols article: Obergrussberger et&nbsp;al., </span><span data-dcnode-id="3425"><a class="bibLink tab-link" data-dcnode-id="3426" data-tab="pane-pcw-references" href="#cpph69-bib-0021" id="cpph69-bib-0021R"><span data-dcnode-id="3427" instrument_node="">2014</span></a></span><span data-dcnode-id="3424" instrument_node="">). The microfluidic design also enables accurate control and testing of multiple compound concentrations on a single cell. The Syncropatch platform uses accessory instruments (e.g., Biomek, Beckman Coulter Life Sciences) for liquid handling and pipettes to add and aspirate solutions.</span></p><span data-dcnode-id="3422" instrument_node="">
</span><div class="article-table-content" data-dcnode-id="2998" id="cpph69-tbl-0001"><span data-dcnode-id="3421" instrument_node="">

            </span></span><span data-dcnode-id="3418" instrument_node="">Features of GΩ Seal Planar Automated Patch Clamp Platforms</span><span class="section-footNote" data-dcnode-id="3403"><a aria-controls="cpph69-tbl1-note-0001_23" aria-expanded="false" aria-haspopup="false" aria-label="Note" class="noteLink scrollableLink" data-dcnode-id="3416" href="#cpph69-tbl1-note-0001_23" id="cpph69-tbl1-note-0001_23-controller" title="Link to note"><span data-dcnode-id="3417" instrument_node="">a</span></a><span aria-labelledby="cpph69-tbl1-note-0001_23-controller" class="footNotePopup" data-dcnode-id="3404" id="cpph69-tbl1-note-0001_23" style="display: none;"><button class="footNoteClose" data-dcnode-id="3414"><i aria-hidden="true" class="icon-tools_close" data-dcnode-id="3415"></i></button><span aria-labelledby="Footnote 1" class="footNotePopup__item" data-dcnode-id="3406" title="Footnote 1"><span data-dcnode-id="3409"><sup data-dcnode-id="3411"><i data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">a</span></i></sup><span data-dcnode-id="3410" instrument_node=""> </span></span><span data-dcnode-id="3408" instrument_node="">Some platforms may not be commercially available; please contact vendors for details.</span><br data-dcnode-id="3407"></span><span class="chevronDown" data-dcnode-id="3405"></span></span></span></header><span data-dcnode-id="3401" instrument_node="">

</span><li aria-labelledby="Footnote 1" class="footNotePopup__item" data-dcnode-id="3022" id="cpph69-tbl1-note-0001" title="Footnote 1"><span data-dcnode-id="3024"><sup data-dcnode-id="3026"><i data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">a</span></i></sup><span data-dcnode-id="3025" instrument_node=""> </span></span><span data-dcnode-id="3023" instrument_node="">Some platforms may not be commercially available; please contact vendors for details.</span></li><span data-dcnode-id="3021" instrument_node="">
</span><li aria-labelledby="Footnote 2" class="footNotePopup__item" data-dcnode-id="3014" id="cpph69-tbl1-note-0002" title="Footnote 2"><span data-dcnode-id="3016"><sup data-dcnode-id="3018"><i data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">b</span></i></sup><span data-dcnode-id="3017" instrument_node=""> </span></span><span data-dcnode-id="3015" instrument_node="">PPC (population patch clamp) is a recording of ensemble current from 2 to 36 cells.</span></li><span data-dcnode-id="3013" instrument_node="">
</span><li aria-labelledby="Footnote 3" class="footNotePopup__item" data-dcnode-id="3006" id="cpph69-tbl1-note-0003" title="Footnote 3"><span data-dcnode-id="3008"><sup data-dcnode-id="3010"><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">c</span></i></sup><span data-dcnode-id="3009" instrument_node=""> </span></span><span data-dcnode-id="3007" instrument_node="">Solution exchange is not complete due to lack of flow-through design.</span></li><span data-dcnode-id="3005" instrument_node="">

</span><div class="paragraph-element" data-dcnode-id="2948"><span data-dcnode-id="2996" instrument_node="">In addition to their higher throughput, the planar array–based automated patch clamp platforms offer several capabilities that are difficult to achieve using manual electrophysiology recording techniques. These include:

               </span><ul class="rlist hanging" data-dcnode-id="2950"><span data-dcnode-id="2995" instrument_node="">
</span><li data-dcnode-id="2981"><span class="number" data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">1. </span></span><i data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Population patch clamp recording</span></i><span data-dcnode-id="2990" instrument_node="">. Under this configuration, a single well contains multiple micropores so that currents from a population of cells can be recorded at once. The number of cells recorded in each well can be customized in some platforms (20 cells for Ionflux; 4 or 8 cells for Syncropatch; and 2, 6, 10, 16, and 36 cells for Qube). Population patch clamp significantly improves the success rate and data consistency across the chip plate (Dale, Townsend, Hollands, &amp; Trezise, </span><span data-dcnode-id="2987"><a class="bibLink tab-link" data-dcnode-id="2988" data-tab="pane-pcw-references" href="#cpph69-bib-0009" id="cpph69-bib-0009R"><span data-dcnode-id="2989" instrument_node="">2007</span></a></span><span data-dcnode-id="2986" instrument_node="">; Finkel et&nbsp;al., </span><span data-dcnode-id="2983"><a class="bibLink tab-link" data-dcnode-id="2984" data-tab="pane-pcw-references" href="#cpph69-bib-0012" id="cpph69-bib-0012R"><span data-dcnode-id="2985" instrument_node="">2006</span></a></span><span data-dcnode-id="2982" instrument_node="">). However, resolution and recording stability can be compromised using this approach.</span></li><span data-dcnode-id="2980" instrument_node="">
</span><li data-dcnode-id="2970"><span class="number" data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">2. </span></span><i data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Internal solution exchange</span></i><span data-dcnode-id="2975" instrument_node="">. Changing the internal solution is difficult with manual patch clamp as it requires exchange of the internal solution contained within the small volume and access to the restricted space of the recording electrode. In contrast, for planar array–based platforms, the internal solution is more readily perfused and exchanged. For example, the effect of intracellular pH on the TREK-1 channel has been analyzed using Syncropatch (Sauter, Sorensen, Rapedius, Bruggemann, &amp; Novak, </span><span data-dcnode-id="2972"><a class="bibLink tab-link" data-dcnode-id="2973" data-tab="pane-pcw-references" href="#cpph69-bib-0027" id="cpph69-bib-0027R"><span data-dcnode-id="2974" instrument_node="">2016</span></a></span><span data-dcnode-id="2971" instrument_node="">).</span></li><span data-dcnode-id="2969" instrument_node="">
</span><li data-dcnode-id="2963"><span class="number" data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">3. </span></span><i data-dcnode-id="2965"><span data-dcnode-id="2966" instrument_node="">Test of rare samples</span></i><span data-dcnode-id="2964" instrument_node="">. Automated platforms usually require only a small solution volume (e.g., 50 µl), as opposed to a few milliliters needed when conducting manual electrophysiology experiments. This feature facilitates analysis of samples that are available in only limited quantities, such as peptide toxins.</span></li><span data-dcnode-id="2962" instrument_node="">
</span><li data-dcnode-id="2952"><span class="number" data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">4. </span></span><i data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Temperature control</span></i><span data-dcnode-id="2957" instrument_node="">. Most automated patch clamp platforms offer the option of temperature control, a useful feature for compound screening at physiological temperature and for the study of temperature-sensitive ion channels (Papakosta et&nbsp;al., </span><span data-dcnode-id="2954"><a class="bibLink tab-link" data-dcnode-id="2955" data-tab="pane-pcw-references" href="#cpph69-bib-0023" id="cpph69-bib-0023R"><span data-dcnode-id="2956" instrument_node="">2011</span></a></span><span data-dcnode-id="2953" instrument_node="">).</span></li><span data-dcnode-id="2951" instrument_node="">
</span></ul><span data-dcnode-id="2949" instrument_node="">
</span></div><span data-dcnode-id="2947" instrument_node="">
</span></section><span data-dcnode-id="2945" instrument_node="">
</span></section><span data-dcnode-id="2943" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="2889" id="cpph69-sec-0040"><span data-dcnode-id="2942" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="2940" id="cpph69-sec-0040-title"><span data-dcnode-id="2941" instrument_node=""> PRACTICAL CONSIDERATIONS</span></h2><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">It is no small undertaking to implement automated electrophysiology platforms. Beside the initial investment on instruments, consumable cost can be substantial and should be taken into consideration. To run experiments successfully, hardware settings, voltage protocols, solution protocols, membrane conditions, and target expression levels should be optimized. Often a significant amount of effort is spent on optimizing conditions and troubleshooting. Additionally, results from automated patch clamp experiments should be corroborated by different platforms and conventional electrophysiology. Hence, automated patch clamp does require technical expertise and highly trained personnel. Due to these considerations, many companies opt to rely on contract research organizations for their electrophysiology needs. In the following section, we focus on the technical aspects of automated patch clamp experiments.</span></p><span data-dcnode-id="2936" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2917" id="cpph69-sec-0050"><span data-dcnode-id="2935" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2933" id="cpph69-sec-0050-title"><span data-dcnode-id="2934" instrument_node=""> Cell Lines and Expression System</span></h3><span data-dcnode-id="2932" instrument_node="">
</span><p data-dcnode-id="2926"><span data-dcnode-id="2931" instrument_node="">Because a typical automated patch clamp experiment requires tens of millions of cells, stable cell lines expressing the ion channel of interest are most commonly used. Factors often taken into consideration are host cell background, existence of auxiliary subunits, basal current contamination (by constitutively expressed ion channels), current density, and homogeneity. Several rounds of clone selection are often needed to develop a high-quality stable cell line, with automated electrophysiology being particularly useful for large-scale testing. For example, by using Syncropatch, a 384-well formatted automated patch clamp system, it is possible to simultaneously test 24 clones, with 16 cells per clone. In addition to stable cell lines, transiently transfected cells have also been used for automated electrophysiology (Vanoye et&nbsp;al., </span><span data-dcnode-id="2928"><a class="bibLink tab-link" data-dcnode-id="2929" data-tab="pane-pcw-references" href="#cpph69-bib-0031" id="cpph69-bib-0031R"><span data-dcnode-id="2930" instrument_node="">2018</span></a></span><span data-dcnode-id="2927" instrument_node="">), although this can sometimes suffer from variable levels of channel/receptor expression. Theoretically, a baculoviral expression system may also lend itself for use in automated electrophysiology.</span></p><span data-dcnode-id="2925" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2924" instrument_node="">With conventional electrophysiology experiments, cells are examined visually, and the “best” cells are selected for study. In contrast, with automated electrophysiology experiments, cells are caught randomly from a large pool, making the use of uniform high-quality cells essential. In our experience, using a gentle cell dissociation protocol, removing cell debris, maintaining cells at lower temperature, and adjusting cell densities are effective ways to improve the overall condition of the cells (Li et&nbsp;al., </span><span data-dcnode-id="2921"><a class="bibLink tab-link" data-dcnode-id="2922" data-tab="pane-pcw-references" href="#cpph69-bib-0017" id="cpph69-bib-0017R"><span data-dcnode-id="2923" instrument_node="">2017</span></a></span><span data-dcnode-id="2920" instrument_node="">).</span></p><span data-dcnode-id="2918" instrument_node="">
</span></section><span data-dcnode-id="2916" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2904" id="cpph69-sec-0060"><span data-dcnode-id="2915" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2913" id="cpph69-sec-0060-title"><span data-dcnode-id="2914" instrument_node=""> Quality Control</span></h3><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2911" instrument_node="">Quality control of automated patch clamp experiments should be implemented at multiple levels. First, a number of electrophysiology parameters should be optimized, including initial cell capture resistance (&gt;10 MΩ), seal resistance (&gt;500 MΩ), current amplitude (&gt;200 pA), and recording stability by monitoring changes in cell capacitance (&lt;2 fold) and series resistance (&lt;1.7 fold; Li et&nbsp;al., </span><span data-dcnode-id="2908"><a class="bibLink tab-link" data-dcnode-id="2909" data-tab="pane-pcw-references" href="#cpph69-bib-0017" id="cpph69-bib-0017R"><span data-dcnode-id="2910" instrument_node="">2017</span></a></span><span data-dcnode-id="2907" instrument_node="">). This optimization is accomplished during the assay development stage by exploring parameters in hardware settings, vacuum pressure, voltage protocols, solution composition, and washing conditions. Another important quality control issue is current stability. Current runup (amplitude increase) or rundown (amplitude decrease) without compound modulation is a common problem that should be monitored. For example, 20% or more rundown can occur with voltage-gated sodium channels during a 10-min recording. While the causes of rundown can include seal deterioration, accumulation of inactivation, and channel turnover, such data must be accounted for during data analysis. Proper positive and negative controls and effects of compound vehicle should be included in the assay. Results should be reassessed if the potency of reference compounds deviates significantly from historical values.</span></p><span data-dcnode-id="2905" instrument_node="">
</span></section><span data-dcnode-id="2903" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2891" id="cpph69-sec-0070"><span data-dcnode-id="2902" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2900" id="cpph69-sec-0070-title"><span data-dcnode-id="2901" instrument_node=""> Compound Concentration</span></h3><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2893"><span data-dcnode-id="2898" instrument_node="">Many automated patch clamp platforms use microfluidic designs to ensure a rapid solution switch. For example, Ionflux Mercury switches between pressurized solution streams to reduce solution exchange time. Patchliner, QPatch, and Qube allow rapid, low-volume replacement of solution in the recording compartments. Other planar array-based systems, such as Syncropatch 384/768PE and PatchXpress, directly add and remove compounds in the recording wells. The effects of different methods of solution application have not been investigated systematically. Additionally, the material for chips can potentially influence effective compound concentrations. For example, lipophilic compounds are known to adhere to the microfluidic surfaces and are reported to be absorbed by excess cells in the recording wells (Bridgland-Taylor et&nbsp;al., </span><span data-dcnode-id="2895"><a class="bibLink tab-link" data-dcnode-id="2896" data-tab="pane-pcw-references" href="#cpph69-bib-0004" id="cpph69-bib-0004R"><span data-dcnode-id="2897" instrument_node="">2006</span></a></span><span data-dcnode-id="2894" instrument_node="">). Compounds are more likely to adhere to chips made of polydimethylsiloxane (via lipophilic partitioning) than to glass-coated chips. For these and other reasons, compound potencies derived from automated electrophysiology experiments can be underestimated. Therefore, key findings should be corroborated by conventional electrophysiology experiments.</span></p><span data-dcnode-id="2892" instrument_node="">
</span></section><span data-dcnode-id="2890" instrument_node="">
</span></section><span data-dcnode-id="2888" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="2765" id="cpph69-sec-0080"><span data-dcnode-id="2887" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="2885" id="cpph69-sec-0080-title"><span data-dcnode-id="2886" instrument_node=""> EXAMPLES OF AUTOMATED PATCH CLAMP APPLICATIONS</span></h2><span data-dcnode-id="2884" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2841" id="cpph69-sec-0090"><span data-dcnode-id="2883" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2881" id="cpph69-sec-0090-title"><span data-dcnode-id="2882" instrument_node=""> Ligand Finding</span></h3><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2879" instrument_node="">A major challenge in ion channel drug discovery is the identification of tractable lead compounds. This is often achieved through high-throughput screening and lead optimization. At the high-throughput screening stage, hundreds of thousands to millions of compounds are screened against the target of interest. For ion channels, high-throughput screening is usually conducted using radioligand binding or fluorescence-based assays. However, automated electrophysiology is playing an increasingly important role in validating the results from high-throughput screening assays, hits confirmation, lead optimization, and mechanistic studies (Fig. </span><a data-dcnode-id="2877" href="#cpph69-fig-0002"><span data-dcnode-id="2878" instrument_node="">2</span></a><span data-dcnode-id="2876" instrument_node="">). In a recent study aimed at identifying Nav1.7-selective blockers, electrophysiology experiments using Syncropatch revealed that a conventional fluorescence-based membrane potential assay is biased to detect pore blockers only. Given this limitation, we designed an assay using a mutant Nav1.7 channel that retained sensitivity to voltage sensor domain 4 (VSD4) blockers while losing sensitivity to pore blockers (Chernov-Rogan et&nbsp;al., </span><span data-dcnode-id="2873"><a class="bibLink tab-link" data-dcnode-id="2874" data-tab="pane-pcw-references" href="#cpph69-bib-0008" id="cpph69-bib-0008R"><span data-dcnode-id="2875" instrument_node="">2018</span></a></span><span data-dcnode-id="2872" instrument_node="">). By combining the use of this mutant channel with its activator 1KαPMTX, a derivative of wasp venom toxin, we designed a membrane potential assay favoring the identification of compounds with non-pore-blocking mechanisms. Following high-throughput screening, we utilized high-throughput electrophysiology to test several thousands of the identified hits on various Nav isoforms to determine potency and subtype selectivity. Also, by testing compounds on channels containing targeted mutations in the pore, VSD4, and other domains, we gained information on drug binding sites and mechanisms of action.</span></p><span data-dcnode-id="2870" instrument_node="">
</span><section class="article-section__inline-figure" data-dcnode-id="2843"><span data-dcnode-id="2869" instrument_node="">
</span><figure class="figure" data-dcnode-id="2845" id="cpph69-fig-0002"><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//currentprotocols.onlinelibrary.wiley.com/cms/asset/7f478822-4424-4ddb-aaf0-302ac28640e9/cpph69-fig-0002-m.jpg" target="_blank"><picture data-dcnode-id="2865"><span data-dcnode-id="2868" instrument_node="">
</span><source data-dcnode-id="2867" media="(min-width: 1650px)" srcset="/cms/asset/7f478822-4424-4ddb-aaf0-302ac28640e9/cpph69-fig-0002-m.jpg"><img alt="Details are in the caption following the image" class="figure__image" data-dcnode-id="2866" data-lg-src="/cms/asset/7f478822-4424-4ddb-aaf0-302ac28640e9/cpph69-fig-0002-m.jpg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//currentprotocols.onlinelibrary.wiley.com/cms/asset/f5d9e6f6-36a0-4f61-8ddd-8e27ccaa0daf/cpph69-fig-0002-m.png&amp;raw"></picture></a><figcaption class="figure__caption" data-dcnode-id="2847"><span data-dcnode-id="2863" instrument_node="">
</span><div class="figure__caption__header" data-dcnode-id="2852"><strong class="figure__title" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Figure 2</span></strong><div class="figure-extra" data-dcnode-id="2854"><a class="open-figure-link" data-dcnode-id="2859" href="#"><span data-dcnode-id="2860" instrument_node="">Open in figure viewer</span></a><a class="ppt-figure-link" data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//currentprotocols.onlinelibrary.wiley.com/action/downloadFigures%3Fid%3Dcpph69-fig-0002%26doi%3D10.1002%252Fcpph.69"><i aria-hidden="true" class="icon-Icon_Download" data-dcnode-id="2858"></i><span data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">PowerPoint</span></span></a></div><span data-dcnode-id="2853" instrument_node="">
</span></div><span data-dcnode-id="2851" instrument_node="">
</span><div class="figure__caption figure__caption-text" data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">Examples of automated electrophysiology application. APC, automated patch clamp.</span></div><span data-dcnode-id="2848" instrument_node="">
</span></figcaption><span data-dcnode-id="2846" instrument_node="">

</span></section><span data-dcnode-id="2842" instrument_node="">
</span></section><span data-dcnode-id="2840" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2822" id="cpph69-sec-0100"><span data-dcnode-id="2839" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2837" id="cpph69-sec-0100-title"><span data-dcnode-id="2838" instrument_node=""> Mechanism of Action Study</span></h3><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2824"><span data-dcnode-id="2835" instrument_node="">Automated electrophysiology has proven useful for mechanism of action studies. For example, detailed kinetics properties of the </span><i data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">N</span></i><span data-dcnode-id="2832" instrument_node="">-methyl-</span><span class="smallCaps" data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">D</span></span><span data-dcnode-id="2829" instrument_node="">-aspartate receptor, a target for neurological diseases, were characterized in response to over 100 GluN2A-subtype-selective positive allosteric modulators (Volgraf et&nbsp;al., </span><span data-dcnode-id="2826"><a class="bibLink tab-link" data-dcnode-id="2827" data-tab="pane-pcw-references" href="#cpph69-bib-0033" id="cpph69-bib-0033R"><span data-dcnode-id="2828" instrument_node="">2016</span></a></span><span data-dcnode-id="2825" instrument_node="">). These positive allosteric modulators are thiazolopyrimidinone-containing compounds with prolonged deactivation kinetics as the primary means of positive modulation. Using IonFlux HT (Fluxion Biosciences), correlation between GluN2A potentiation and deactivation kinetics was examined. The study led to the classification of compounds based on different aromatic right-hand groups and the rational design of compounds.</span></p><span data-dcnode-id="2823" instrument_node="">
</span></section><span data-dcnode-id="2821" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2809" id="cpph69-sec-0110"><span data-dcnode-id="2820" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2818" id="cpph69-sec-0110-title"><span data-dcnode-id="2819" instrument_node=""> Structure–Function Study</span></h3><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2816" instrument_node="">High-throughput electrophysiology has been applied to structure–function studies. We studied Nav1.7 inhibition by Protoxin-II (ProTx2), a 30-residue cysteine-knot peptide toxin isolated from the Peruvian green velvet tarantula&nbsp;(Xu et&nbsp;al., </span><span data-dcnode-id="2813"><a class="bibLink tab-link" data-dcnode-id="2814" data-tab="pane-pcw-references" href="#cpph69-bib-0035" id="cpph69-bib-0035R"><span data-dcnode-id="2815" instrument_node="">2019</span></a></span><span data-dcnode-id="2812" instrument_node="">). Structural studies revealed that ProTx2 forms a complex with VSD2 in both activated and deactivated states of the channel. To interrogate the ProTx2 receptor site, we tested over 50 mutant channels and 18 toxin variants using Syncropatch. The results revealed that ProTx2 regulates Nav1.7 via an electrostatic interaction and that this mechanism is conserved for other related toxins, thereby providing a template and rationale for the design of a new class of Nav1.7-selective compounds.</span></p><span data-dcnode-id="2810" instrument_node="">
</span></section><span data-dcnode-id="2808" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2792" id="cpph69-sec-0120"><span data-dcnode-id="2807" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2805" id="cpph69-sec-0120-title"><span data-dcnode-id="2806" instrument_node=""> Disease Mutation Characterization</span></h3><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2803" instrument_node="">Mutations in ion channels underline many human disorders (Ptacek, </span><span data-dcnode-id="2800"><a class="bibLink tab-link" data-dcnode-id="2801" data-tab="pane-pcw-references" href="#cpph69-bib-0024" id="cpph69-bib-0024R"><span data-dcnode-id="2802" instrument_node="">2015</span></a></span><span data-dcnode-id="2799" instrument_node="">). Advances in genetic testing have led to an increase in the number of identified ion channel gene variants. Determining the potential pathogenicity of these variants is now possible with the advent of high-throughput electrophysiology. Syncropatch was used to characterize 30 known KCNQ1 variants and demonstrated strong concordance between Syncropatch and historical data (Vanoye et&nbsp;al., </span><span data-dcnode-id="2796"><a class="bibLink tab-link" data-dcnode-id="2797" data-tab="pane-pcw-references" href="#cpph69-bib-0031" id="cpph69-bib-0031R"><span data-dcnode-id="2798" instrument_node="">2018</span></a></span><span data-dcnode-id="2795" instrument_node="">). Next, 48 new variants were characterized over a period of 12 weeks, with ∼70% of the variants classified on the basis of functional data. All variants were transiently expressed by electroporation. Hence the combination of transient transfection and high-throughput electrophysiology enables high-throughput characterization of disease-associated variants.</span></p><span data-dcnode-id="2793" instrument_node="">
</span></section><span data-dcnode-id="2791" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="2767" id="cpph69-sec-0130"><span data-dcnode-id="2790" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="2788" id="cpph69-sec-0130-title"><span data-dcnode-id="2789" instrument_node=""> Recordings from Primary Cells</span></h3><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2786" instrument_node="">Due to their fragile surface membrane and irregular shapes, manual electrophysiology recordings from primary cells can be challenging. Nevertheless, progress has been made using automated patch clamp platforms for primary cell studies. Patchliner was applied successfully to record primary cells derived from blood vessels, arthritic joints, and the immune and nervous systems (Milligan et&nbsp;al., </span><span data-dcnode-id="2783"><a class="bibLink tab-link" data-dcnode-id="2784" data-tab="pane-pcw-references" href="#cpph69-bib-0018" id="cpph69-bib-0018R"><span data-dcnode-id="2785" instrument_node="">2009</span></a></span><span data-dcnode-id="2782" instrument_node="">). Patchliner has also been used to evaluate human cardiomyocytes derived from pluripotent stem cells (Becker et&nbsp;al., </span><span data-dcnode-id="2779"><a class="bibLink tab-link" data-dcnode-id="2780" data-tab="pane-pcw-references" href="#cpph69-bib-0002" id="cpph69-bib-0002R"><span data-dcnode-id="2781" instrument_node="">2013</span></a></span><span data-dcnode-id="2778" instrument_node="">; Rajamohan et&nbsp;al., </span><span data-dcnode-id="2775"><a class="bibLink tab-link" data-dcnode-id="2776" data-tab="pane-pcw-references" href="#cpph69-bib-0025" id="cpph69-bib-0025R"><span data-dcnode-id="2777" instrument_node="">2016</span></a></span><span data-dcnode-id="2774" instrument_node="">). In an effort to record rat primary T lymphocytes, we tested various parameters on Syncropatch and optimized the conditions to produce the best results (two 1000-ms suction pulses of 200 mBar and 10-MΩ high-resistance chip). Under these conditions, it was possible to obtain successful recordings on 10% of the primary T cells (Li et&nbsp;al., </span><span data-dcnode-id="2771"><a class="bibLink tab-link" data-dcnode-id="2772" data-tab="pane-pcw-references" href="#cpph69-bib-0017" id="cpph69-bib-0017R"><span data-dcnode-id="2773" instrument_node="">2017</span></a></span><span data-dcnode-id="2770" instrument_node="">).</span></p><span data-dcnode-id="2768" instrument_node="">
</span></section><span data-dcnode-id="2766" instrument_node="">
</span></section><span data-dcnode-id="2764" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="2756" id="cpph69-sec-0140"><span data-dcnode-id="2763" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="2761" id="cpph69-sec-0140-title"><span data-dcnode-id="2762" instrument_node=""> OUTLOOK</span></h2><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">The past 15 years have witnessed tremendous progress and evolution in automated patch clamp platforms. These technologies have been successfully integrated into ion channel drug discovery programs, from ligand discovery to lead optimization and mechanistic studies. It is estimated that most ion channel clinical candidates discovered in recent years have been characterized by automated patch clamp. In addition, automated patch clamp has been extensively applied to drug safety testing against hERG, Nav1.5, and other ion channels, resulting in safer drugs. Despite this progress, the current automated patch clamp platforms do not offer adequate throughput to be used as primary tools for high-throughput screening, and cost of instruments and consumables remains high. Compared to manual patch clamp, automated patch clamp has minimized technical challenges but still requires highly trained personnel. Quality control and the analysis of high volumes of data remain challenging. Hence, continued improvement in these areas is expected. Advances in automated patch clamp technologies, along with new technologies such as optical electrophysiology, will facilitate future efforts aimed at the discovery of ion channel modulators.</span></p><span data-dcnode-id="2757" instrument_node="">
</span></section><span data-dcnode-id="2755" instrument_node="">
</span><div class="article-section__content" data-dcnode-id="2745"><span data-dcnode-id="2754" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="2752" id="cpph69-sec-0150-title"><span data-dcnode-id="2753" instrument_node=""> ACKNOWLEDGMENTS</span></h2><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">The authors thank members of the Ion Channel Group in Genentech for their support. This article is primarily based on work conducted at Genentech.</span></p><span data-dcnode-id="2748" instrument_node="">
</span><ol data-dcnode-id="2747"></ol><span data-dcnode-id="2746" instrument_node="">

</span><section class="article-section article-section__references" data-dcnode-id="804" id="references-section"><span data-dcnode-id="2743" instrument_node="">
</span><div class="accordion article-accordion" data-dcnode-id="806"><span data-dcnode-id="2742" instrument_node="">
</span><h2 data-dcnode-id="2735"><span data-dcnode-id="2741" instrument_node="">
