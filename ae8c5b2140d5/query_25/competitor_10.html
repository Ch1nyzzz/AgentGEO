</span><meta content="The Tara Oceans expedition (2009–2013) sampled contrasting ecosystems of the world oceans, collecting environmental data and plankton, from viruses to metazoans, for later analysis using modern sequencing and state-of-the-art imaging technologies. It surveyed 210 ecosystems in 20 biogeographic provinces, collecting over 35,000 samples of seawater and plankton. The interpretation of such an extensive collection of samples in their ecological context requires means to explore, assess and access raw and validated data sets. To address this challenge, the Tara Oceans Consortium offers open science resources, including the use of open access archives for nucleotides (ENA) and for environmental, biogeochemical, taxonomic and morphological data (PANGAEA), and the development of on line discovery tools and collaborative annotation tools for sequences and images. Here, we present an overview of Tara Oceans Data, and we provide detailed registries (data sets) of all campaigns (from port-to-port), stations and sampling events. Machine-accessible metadata file describing the reported data (ISA-Tab format)" data-dcnode-id="6239" name="dc.description"><span data-dcnode-id="6238" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="5271" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5272" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5285" id="Abs1"><span data-dcnode-id="5286" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5273" id="Abs1-content"><p data-dcnode-id="5274"><span data-dcnode-id="5284" instrument_node="">The </span><i data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">Tara</span></i><span data-dcnode-id="5281" instrument_node=""> Oceans expedition (2009–2013) sampled contrasting ecosystems of the world oceans, collecting environmental data and plankton, from viruses to metazoans, for later analysis using modern sequencing and state-of-the-art imaging technologies. It surveyed 210 ecosystems in 20 biogeographic provinces, collecting over 35,000 samples of seawater and plankton. The interpretation of such an extensive collection of samples in their ecological context requires means to explore, assess and access raw and validated data sets. To address this challenge, the </span><i data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Tara</span></i><span data-dcnode-id="5278" instrument_node=""> Oceans Consortium offers open science resources, including the use of open access archives for nucleotides (ENA) and for environmental, biogeochemical, taxonomic and morphological data (PANGAEA), and the development of on line discovery tools and collaborative annotation tools for sequences and images. Here, we present an overview of </span><i data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Tara</span></i><span data-dcnode-id="5275" instrument_node=""> Oceans Data, and we provide detailed registries (data sets) of all campaigns (from port-to-port), stations and sampling events.</span></p></div></div></section><section data-dcnode-id="5232" lang="en"><div class="c-article-section" data-dcnode-id="5233" id="Abs2-section"><div class="c-article-section__content" data-dcnode-id="5234" id="Abs2-content"><span data-dcnode-id="5270" instrument_node="">

</span></noscript><span data-dcnode-id="5228" instrument_node="">
</span><section data-dcnode-id="5111" data-title="Background &amp; Summary"><div class="c-article-section" data-dcnode-id="5112" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5226" id="Sec1"><span data-dcnode-id="5227" instrument_node="">Background &amp; Summary</span></h2><div class="c-article-section__content" data-dcnode-id="5113" id="Sec1-content"><p data-dcnode-id="5198"><span data-dcnode-id="5225" instrument_node="">Over many centuries, global expeditions have led to major scientific breakthroughs, notably with the early voyages of the H.M.S. Beagle (1831–1836) and the H.M.S. Challenger (1872–1876). Ocean exploration now provides promising first steps towards understanding the role of the ocean in global biogeochemical cycles and the impact of global climate change on ocean processes and marine biodiversity. Recently, the </span><i data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">Sorcerer II</span></i><span data-dcnode-id="5222" instrument_node=""> expeditions (2003–2010)</span><sup data-dcnode-id="5219"><a aria-label="Reference 1" data-dcnode-id="5220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d38177337e1712" title=""><span data-dcnode-id="5221" instrument_node="">1</span></a></sup><span data-dcnode-id="5218" instrument_node=""> and the Malaspina expedition (2010–2011)</span><sup data-dcnode-id="5215"><a aria-label="Reference 2" data-dcnode-id="5216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d38177337e1716" title=""><span data-dcnode-id="5217" instrument_node="">2</span></a></sup><span data-dcnode-id="5214" instrument_node=""> carried out global surveys of prokaryotic metagenomes from the ocean’s surface and bathypelagic layer (&gt;1,000 m), respectively. The </span><i data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">Tara</span></i><span data-dcnode-id="5211" instrument_node=""> Oceans Expedition (2009–2013) complemented these surveys by collecting a wide variety of planktonic organisms (from viruses to fish larvae) from the ocean’s surface (0–200 m) and mesopelagic zone (200–1,000 m) at a global scale. Overall, </span><i data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">Tara</span></i><span data-dcnode-id="5208" instrument_node=""> Oceans surveyed 210 ecosystems in 20 biogeographic provinces, collecting over 35,000 samples of seawater and plankton. Organising such a knowledge base is essential to safeguard, discover and share </span><i data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">Tara</span></i><span data-dcnode-id="5205" instrument_node=""> Oceans data. To address this challenge, </span><i data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">Tara</span></i><span data-dcnode-id="5202" instrument_node=""> Oceans offers open science resources, including the use of open access data archives and the development of online tools for the collaborative annotation of sequences and images, and the discovery of </span><i data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">Tara</span></i><span data-dcnode-id="5199" instrument_node=""> Oceans data.</span></p><p data-dcnode-id="5185"><i data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">Tara</span></i><span data-dcnode-id="5195" instrument_node=""> Oceans adopts the principle of open access and early release of raw and validated data sets. In the case of molecular data, raw short sequence reads are archived at the European Bioinformatics Institute </span><i data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">short read archive</span></i><span data-dcnode-id="5192" instrument_node=""> (</span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ebi.ac.uk/ena/"><span data-dcnode-id="5191" instrument_node="">http://www.ebi.ac.uk/ena/</span></a><span data-dcnode-id="5189" instrument_node="">) and made available immediately after manual curation of metadata. More advanced data (assemblies, annotations, etc.) will be released immediately after validation and before publication, and other versions will be released when available. In the case of environmental, biogeochemical, taxonomic and morphological measurements, data are published at PANGAEA, Data Publisher for Earth and Environmental Science (</span><a data-dcnode-id="5187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pangaea.de/"><span data-dcnode-id="5188" instrument_node="">http://www.pangaea.de</span></a><span data-dcnode-id="5186" instrument_node="">) and made available immediately after manual curation of metadata.</span></p><p data-dcnode-id="5173"><span data-dcnode-id="5184" instrument_node="">By combining modern sequencing and state-of-the-art imaging technologies, </span><i data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Tara</span></i><span data-dcnode-id="5181" instrument_node=""> Oceans is at the cutting edge of marine science</span><sup data-dcnode-id="5178"><a aria-label="Reference 3" data-dcnode-id="5179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d38177337e1764" title=""><span data-dcnode-id="5180" instrument_node="">3</span></a></sup><span data-dcnode-id="5177" instrument_node="">. The amount of data generated by these technologies is unprecedented in the field of plankton ecology and requires adapted storage infrastructures and collaborative platforms to carry out manual and automated annotation of sequences and high throughput images. These open science resources are currently being developed by </span><i data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Tara</span></i><span data-dcnode-id="5174" instrument_node=""> Oceans.</span></p><p data-dcnode-id="5149"><span data-dcnode-id="5172" instrument_node="">A first series of publications has demonstrated the potential of </span><i data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">Tara</span></i><span data-dcnode-id="5169" instrument_node=""> Oceans data to study the ecology of plankton and the structural and functional diversity of viruses, prokaryotes and eukaryotes in the global ocean</span><sup data-dcnode-id="5163"><a aria-label="Reference 4" data-dcnode-id="5167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d38177337e1777" title=""><span data-dcnode-id="5168" instrument_node="">4</span></a><span data-dcnode-id="5166" instrument_node="">–</span><a aria-label="Reference 11" data-dcnode-id="5164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d38177337e1780" title=""><span data-dcnode-id="5165" instrument_node="">11</span></a></sup><span data-dcnode-id="5162" instrument_node="">. These publications are based on a fraction of the samples analysed so far and thus represent only the tip of the iceberg. The exploration of </span><i data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">Tara</span></i><span data-dcnode-id="5159" instrument_node=""> Oceans data by the scientific community will undoubtedly lead to new hypotheses and emerging concepts in domains unforeseen by the </span><i data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">Tara</span></i><span data-dcnode-id="5156" instrument_node=""> Oceans Consortium. The current discovery portal of </span><i data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">Tara</span></i><span data-dcnode-id="5153" instrument_node=""> Oceans offers a simple map interface that links each sampling location to available environmental and molecular data (</span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.taraoceans-dataportal.org/"><span data-dcnode-id="5152" instrument_node="">http://www.taraoceans-dataportal.org/</span></a><span data-dcnode-id="5150" instrument_node="">). It will however evolve to offer advanced search functionalities based on geospatial, methodological, environmental, morphological, taxonomic, phylogenetic and ecological criteria.</span></p><p data-dcnode-id="5114"><span data-dcnode-id="5148" instrument_node="">Here, we present an overview of the sampling strategy and size-fractionation approach of the </span><i data-dcnode-id="5146"><span data-dcnode-id="5147" instrument_node="">Tara</span></i><span data-dcnode-id="5145" instrument_node=""> Oceans Expedition (</span><b data-dcnode-id="5142"><i data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Methods Section</span></i></b><span data-dcnode-id="5141" instrument_node="">) and we explain the rationale behind the choice of sampling devices (</span><b data-dcnode-id="5138"><i data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Technical Validation Section</span></i></b><span data-dcnode-id="5137" instrument_node="">). Most importantly, we provide registries (data sets) describing all campaigns (from port-to-port), stations and sampling events (</span><b data-dcnode-id="5134"><i data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">Data Records Section</span></i></b><span data-dcnode-id="5133" instrument_node="">). These registries contain geospatial, temporal and methodological information that will be essential for researchers to explore and assess the quality of </span><i data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">Tara</span></i><span data-dcnode-id="5130" instrument_node=""> Oceans data. Environmental data sets are already available openly, in whole or in part, and additional data sets will be progressively released to the community. We intend to submit additional publications describing specific data types (e.g., </span><a aria-label="Reference Data Citations 1" data-dcnode-id="5128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d38177337e1820" title=""><span data-dcnode-id="5129" instrument_node="">Data Citations 1</span></a><span data-dcnode-id="5127" instrument_node="">,</span><a aria-label="Reference 2" data-dcnode-id="5125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d38177337e1823" title=""><span data-dcnode-id="5126" instrument_node="">2</span></a><span data-dcnode-id="5124" instrument_node="">, </span><a aria-label="Reference 3" data-dcnode-id="5122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d38177337e1826" title=""><span data-dcnode-id="5123" instrument_node="">3</span></a><span data-dcnode-id="5121" instrument_node="">, </span><a aria-label="Reference 4" data-dcnode-id="5119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d38177337e1829" title=""><span data-dcnode-id="5120" instrument_node="">4</span></a><span data-dcnode-id="5118" instrument_node="">, </span><a aria-label="Reference 5" data-dcnode-id="5116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d38177337e1832" title=""><span data-dcnode-id="5117" instrument_node="">5</span></a><span data-dcnode-id="5115" instrument_node="">) in more detail, further extending the value of this resource as the data becomes available.</span></p></div></div></section><section data-dcnode-id="4422" data-title="Methods"><div class="c-article-section" data-dcnode-id="4423" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5109" id="Sec2"><span data-dcnode-id="5110" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="4424" id="Sec2-content"><p data-dcnode-id="5098"><span data-dcnode-id="5108" instrument_node="">As a research infrastructure, the </span><i data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">Tara</span></i><span data-dcnode-id="5105" instrument_node=""> Oceans Expedition mobilised over 100 scientists to sample the world oceans on board a 36 m long schooner (SV </span><i data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Tara</span></i><span data-dcnode-id="5102" instrument_node="">) refitted to operate state-of-the-art oceanographic equipment (</span><a data-dcnode-id="5100" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5101" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5099" instrument_node="">). On board the schooner, the team was consistently composed of five sailors and six scientists, including one chief scientist, two oceanography engineers in charge of deck operations, instrument maintenance and data management, two biology engineers preparing and preserving samples for later morphological and genetic analyses, and one optics engineer in charge of imaging live samples on board. A winch equipped with 2,400 m of cable was installed to deploy sampling devices from the stern of the ship, and an industrial peristaltic pump was installed on starboard to sample large volumes of water from various depths down to 60 m. Peristaltic and vacuum filtration systems used to concentrate plankton on membranes of various pore sizes were setup in a laboratory container (wet lab) located outside on port side. Flow-through instruments connected to the continuous surface sampling system were installed in the fore peak and in a laboratory (dry lab) inside the schooner at the centre of the ship on port side.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5020" data-test="figure" data-title="Sampling devices and working areas on-board SV Tara. " id="figure-1"><figure data-dcnode-id="5021"><figcaption data-dcnode-id="5092"><b class="c-article-section__figure-caption" data-dcnode-id="5093" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5097" instrument_node="">Figure 1: Sampling devices and working areas on-board SV </span><i data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">Tara</span></i><span data-dcnode-id="5094" instrument_node="">. </span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5032"><div class="c-article-section__figure-item" data-dcnode-id="5087"><a class="c-article-section__figure-link" data-dcnode-id="5088" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/1" rel="nofollow"><picture data-dcnode-id="5089"><source data-dcnode-id="5091" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig1_HTML.jpg?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5090" height="487" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/sdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig1_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5033" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5034"><span data-dcnode-id="5086" instrument_node="">Sampling devices and working areas on-board SV </span><i data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Tara</span></i><span data-dcnode-id="5083" instrument_node=""> are shown from the vessel’s </span><b data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">[a]</span></b><span data-dcnode-id="5080" instrument_node=""> side-view, </span><b data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">[b]</span></b><span data-dcnode-id="5077" instrument_node=""> bird’s-eye-view of the deck, and </span><b data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">[c]</span></b><span data-dcnode-id="5074" instrument_node=""> inside-view. They consist of the </span><b data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">[1]</span></b><span data-dcnode-id="5071" instrument_node=""> Continuous Surface Sampling System [CSSS]; </span><b data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">[2]</span></b><span data-dcnode-id="5068" instrument_node=""> Rosette Vertical Sampling System [RVSS]; </span><b data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">[3]</span></b><span data-dcnode-id="5065" instrument_node=""> wet lab and storage in liquid nitrogen; </span><b data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">[4]</span></b><span data-dcnode-id="5062" instrument_node=""> High Volume Peristaltic pump [HVP-PUMP]; </span><b data-dcnode-id="5060"><span data-dcnode-id="5061" instrument_node="">[5]</span></b><span data-dcnode-id="5059" instrument_node=""> dry lab; </span><b data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">[6]</span></b><span data-dcnode-id="5056" instrument_node=""> oceanography engineers data acquisition and processing area; </span><b data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">[7]</span></b><span data-dcnode-id="5053" instrument_node=""> winch; </span><b data-dcnode-id="5051"><span data-dcnode-id="5052" instrument_node="">[8]</span></b><span data-dcnode-id="5050" instrument_node=""> video imaging area; </span><b data-dcnode-id="5048"><span data-dcnode-id="5049" instrument_node="">[9]</span></b><span data-dcnode-id="5047" instrument_node=""> storage areas at room temperature; </span><b data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">[10]</span></b><span data-dcnode-id="5044" instrument_node=""> storage areas at +4 °C and −20 °C; </span><b data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">[11]</span></b><span data-dcnode-id="5041" instrument_node=""> MilliQ water system and AC-s system; </span><b data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">[12]</span></b><span data-dcnode-id="5038" instrument_node=""> diving equipment, flowcytobot and ALPHA instruments; and </span><b data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">[13]</span></b><span data-dcnode-id="5035" instrument_node=""> storage boxes. The flow of seawater from the continuous surface sampling system to the dry lab is shown in blue.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5022"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5023" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/1" rel="nofollow"><span data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5024" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5025" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5026" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5029" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5028" fill-rule="evenodd"></path><span data-dcnode-id="5027" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4990"><span data-dcnode-id="5019" instrument_node="">The sampling strategy and methodology of the </span><i data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Tara</span></i><span data-dcnode-id="5016" instrument_node=""> Oceans Expedition is presented in six sub-sections. The first four describe why and how the environmental context was determined </span><b data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">[1]</span></b><span data-dcnode-id="5013" instrument_node=""> at the mesoscale using remote sensing and meteorological data; </span><b data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">[2]</span></b><span data-dcnode-id="5010" instrument_node=""> from sensors mounted on the continuous surface water sampling system; </span><b data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">[3]</span></b><span data-dcnode-id="5007" instrument_node=""> from sensors mounted on the vertical profile sampling system; and </span><b data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">[4]</span></b><span data-dcnode-id="5004" instrument_node=""> from discrete water samplers (Niskin bottles) mounted on the vertical profile sampling system. The last two Sub-Sections describe how </span><b data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">[5]</span></b><span data-dcnode-id="5001" instrument_node=""> environmental features were selected and sampled; and how </span><b data-dcnode-id="4999"><span data-dcnode-id="5000" instrument_node="">[6]</span></b><span data-dcnode-id="4998" instrument_node=""> plankton were collected for imaging and genetic analyses. These methods were also described briefly in Karsenti </span><i data-dcnode-id="4996"><span data-dcnode-id="4997" instrument_node="">et al.</span></i><span data-dcnode-id="4995" instrument_node=""> (2011)</span><sup data-dcnode-id="4992"><a aria-label="Reference 3" data-dcnode-id="4993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d38177337e1958" title=""><span data-dcnode-id="4994" instrument_node="">3</span></a></sup><span data-dcnode-id="4991" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4988" id="Sec3"><span data-dcnode-id="4989" instrument_node="">[1] Atmospheric and oceanographic context at the mesoscale</span></h3><p data-dcnode-id="4977"><span data-dcnode-id="4987" instrument_node="">The regular sampling programme was designed to study a variety of marine ecosystems and to target well-defined meso- to large-scale features such as gyres, eddies, currents, frontal zones, upwellings, hot spots of biodiversity, low pH or low oxygen concentrations. A total of 210 stations were characterised at the mesoscale to provide richer environmental context for the morphological and genomic study of plankton (</span><a data-dcnode-id="4985" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="4986" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4984" instrument_node="">). In order to identify these features before sampling but also to assess </span><i data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">a posteriori</span></i><span data-dcnode-id="4981" instrument_node=""> if sampling events carried out during a station were taken within a relatively homogeneous environment, the atmospheric and oceanographic context were determined at the mesoscale, using climatologies, remote sensing products and arrays of Argo profiling floats. Meteorological forecast services, satellite observations (Chlorophyll </span><i data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">a</span></i><span data-dcnode-id="4978" instrument_node="">, sea surface temperature (SST) and altimetry) and real-time ocean model outputs (Mercator Ocean) were also used on a daily basis to revise sampling positions with respect to the selected oceanographic features.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4941" data-test="figure" data-title="Sampling route and stations of the Tara Oceans Expedition. " id="figure-2"><figure data-dcnode-id="4942"><figcaption data-dcnode-id="4971"><b class="c-article-section__figure-caption" data-dcnode-id="4972" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="4976" instrument_node="">Figure 2: Sampling route and stations of the </span><i data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">Tara</span></i><span data-dcnode-id="4973" instrument_node=""> Oceans Expedition. </span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4953"><div class="c-article-section__figure-item" data-dcnode-id="4966"><a class="c-article-section__figure-link" data-dcnode-id="4967" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/2" rel="nofollow"><picture data-dcnode-id="4968"><source data-dcnode-id="4970" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="4969" height="383" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/sdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig2_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4954" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="4955"><span data-dcnode-id="4965" instrument_node="">Sampling route of the </span><i data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Tara</span></i><span data-dcnode-id="4962" instrument_node=""> Oceans Expedition (green track), showing station labels and areas (blue shade) where the annual mean oxygen concentration is &lt;2 ml/l (WOA09), usually corresponding also to high CO</span><sub data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">2</span></sub><span data-dcnode-id="4959" instrument_node=""> concentration and low pH. Detailed information about each station is given in (</span><a aria-label="Reference Data Citation 7" data-dcnode-id="4957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e1998" title=""><span data-dcnode-id="4958" instrument_node="">Data Citation 7</span></a><span data-dcnode-id="4956" instrument_node="">).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4943"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="4944" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/2" rel="nofollow"><span data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4945" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4946" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4947" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4950" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4949" fill-rule="evenodd"></path><span data-dcnode-id="4948" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4936"><span data-dcnode-id="4940" instrument_node="">Mapped altimetry from AVISO (Archiving Validation and Interpretation of Satellite Data in Oceanography), mapped operational SST (OSTIA), and satellite ocean colour (ACRI-ST GlobColour service) were used to describe the spatial and temporal variability of key environmental parameters at each sampling station. In addition, Temperature-Salinity profiles available around sampling stations were compiled from the Argo autonomous network array. Finally, a [BATOS] meteorological station mounted on-board </span><i data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">Tara</span></i><span data-dcnode-id="4937" instrument_node=""> continuously measured wind speed and direction, and air temperature, pressure and humidity, which helped determine the variability of atmospheric conditions and vertical mixing of surface waters.</span></p><p data-dcnode-id="4901"><span data-dcnode-id="4935" instrument_node="">In addition to the regular sampling programme, topical experiments were designed to study ocean processes that operate at spatial and/or temporal scales larger or smaller than the mesoscale (</span><a data-dcnode-id="4933" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4934" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4932" instrument_node="">). Topics included, for example, diurnal processes, storm-induced perturbation of community structure and functions, latitudinal diversity gradients, oxygen minimum zone</span><sup data-dcnode-id="4929"><a aria-label="Reference 6" data-dcnode-id="4930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d38177337e2022" title=""><span data-dcnode-id="4931" instrument_node="">6</span></a></sup><span data-dcnode-id="4928" instrument_node="">, island effects on iron fertilization, and longitudinal transport by Agulhas rings across the South Atlantic Ocean</span><sup data-dcnode-id="4925"><a aria-label="Reference 11" data-dcnode-id="4926" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d38177337e2026" title=""><span data-dcnode-id="4927" instrument_node="">11</span></a></sup><span data-dcnode-id="4924" instrument_node="">. For topical experiments, oceanographic context was sometimes enriched by using automated underwater vehicles (e.g., gliders</span><sup data-dcnode-id="4921"><a aria-label="Reference 12" data-dcnode-id="4922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d38177337e2030" title=""><span data-dcnode-id="4923" instrument_node="">12</span></a></sup><span data-dcnode-id="4920" instrument_node="">, ProvBio</span><sup data-dcnode-id="4917"><a aria-label="Reference 13" data-dcnode-id="4918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d38177337e2034" title=""><span data-dcnode-id="4919" instrument_node="">13</span></a></sup><span data-dcnode-id="4916" instrument_node="">), surface-tethered Argo drifters, lowered ADCP mounted on the rosette, basin scale eddy-field simulations and climatologies, and state-of-the-art physical models of global ocean circulation with biogeochemistry and genome-informed models of microbial processes</span><sup data-dcnode-id="4913"><a aria-label="Reference 14" data-dcnode-id="4914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d38177337e2039" title=""><span data-dcnode-id="4915" instrument_node="">14</span></a></sup><span data-dcnode-id="4912" instrument_node="">. The specific sampling strategy of each topical experiment is available in the respective campaign summary reports (see </span><b data-dcnode-id="4909"><i data-dcnode-id="4910"><span data-dcnode-id="4911" instrument_node="">Data Records Section</span></i></b><span data-dcnode-id="4908" instrument_node="">). </span><i data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">Tara</span></i><span data-dcnode-id="4905" instrument_node=""> Oceans data corresponding to methods described in this section are in part already open to the public at PANGAEA (</span><a aria-label="Reference Data Citation 1" data-dcnode-id="4903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d38177337e2048" title=""><span data-dcnode-id="4904" instrument_node="">Data Citation 1</span></a><span data-dcnode-id="4902" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4864" data-test="figure" data-title="Sampling route, stations and topical experiments of the Tara Oceans Expedition. " id="figure-3"><figure data-dcnode-id="4865"><figcaption data-dcnode-id="4895"><b class="c-article-section__figure-caption" data-dcnode-id="4896" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="4900" instrument_node="">Figure 3: Sampling route, stations and topical experiments of the </span><i data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">Tara</span></i><span data-dcnode-id="4897" instrument_node=""> Oceans Expedition. </span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4876"><div class="c-article-section__figure-item" data-dcnode-id="4890"><a class="c-article-section__figure-link" data-dcnode-id="4891" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/3" rel="nofollow"><picture data-dcnode-id="4892"><source data-dcnode-id="4894" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="4893" height="380" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/sdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig3_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4877" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4878"><span data-dcnode-id="4889" instrument_node="">Sampling route of the </span><i data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">Tara</span></i><span data-dcnode-id="4886" instrument_node=""> Oceans Expedition (green track), showing stations where plankton were sampled in their environmental context (full red dots) and where only environmental conditions were measured (open red dots). Topical experiments are identified along the sampling route (light blue). Longhurst biogeographical provinces</span><sup data-dcnode-id="4883"><a aria-label="Reference 34" data-dcnode-id="4884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d38177337e2071" title=""><span data-dcnode-id="4885" instrument_node="">34</span></a></sup><span data-dcnode-id="4882" instrument_node=""> are shown in the background and those sampled during </span><i data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">Tara</span></i><span data-dcnode-id="4879" instrument_node=""> Oceans Expedition are highlighted in blue.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4866"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4867" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/3" rel="nofollow"><span data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4868" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4869" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4870" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4873" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4872" fill-rule="evenodd"></path><span data-dcnode-id="4871" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="4862" id="Sec4"><span data-dcnode-id="4863" instrument_node="">[2] Properties of seawater and particulate matter from physical, optical and imaging sensors mounted on the continuous surface water sampling system</span></h3><p data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">Continuous measurements of surface water physical, chemical and biological properties serve the dual purpose of a) assessing the boundaries and the homogeneity/heterogeneity of an ecosystem studied during a station, and b) assessing the connectivity between stations. Underway measurements were often used to fine tune the location of sampling stations that were initially selected based on satellite images.</span></p><p data-dcnode-id="4842"><span data-dcnode-id="4859" instrument_node="">The in-line, Continuous Surface Sampling System [CSSS] installed on SV </span><i data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Tara</span></i><span data-dcnode-id="4856" instrument_node=""> (15,000 miles long track) comprised a SeaBird [TSG] temperature and conductivity sensor, a WETLabs [AC-S] spectrophotometer, a WETLabs chlorophyll [Fluorometer], and a Fast Repetition Rate Fluorometer [FRRF] to assess photosynthetic efficiency. All data were recorded simultaneously and archived daily in a single file, including navigation, date/time and GPS position. Water was pumped at the front of the vessel from ~2 m depth, then de-bubbled and circulated through the [AC-S], [TSG], [Fluorometer], and [FRRF]. An automated switching system provided periodic 0.2 μm filtered samples to the [AC-S], such that its particulate optical properties were not affected by instrument drift</span><sup data-dcnode-id="4853"><a aria-label="Reference 15" data-dcnode-id="4854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d38177337e2100" title=""><span data-dcnode-id="4855" instrument_node="">15</span></a></sup><span data-dcnode-id="4852" instrument_node="">. Systems maintenance (instrument cleaning, flushing) was done approximately once a week and in port between successive campaigns. In the Arctic Ocean and Arctic Seas (2013 campaigns), additional sensors for pH, PCO</span><sub data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">2</span></sub><span data-dcnode-id="4849" instrument_node="">, optical backscattering (3 wavelengths), fluorescence emission [ALFA] and surface Photosynthetically Active Radiation [PAR] were added to the in-line system. A [FlowCytobot] also recorded images of microplankton every 20 min. Using daily discrete measurements of CDOM absorption with an [UltraPath] system, we calibrated the [AC-S] to also provide hourly CDOM absorption (besides particulate absorption and attenuation). Data were processed, quality-controlled, and are consistent with remote sensing. A total of 60 tracks of continuous measurements corresponding to methods described in this section are in large part already open to the public at PANGAEA (</span><a aria-label="Reference Data Citation 2" data-dcnode-id="4847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d38177337e2105" title=""><span data-dcnode-id="4848" instrument_node="">Data Citation 2</span></a><span data-dcnode-id="4846" instrument_node=""> and </span><a aria-label="Reference Data Citation 3" data-dcnode-id="4844" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d38177337e2108" title=""><span data-dcnode-id="4845" instrument_node="">Data Citation 3</span></a><span data-dcnode-id="4843" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4840" id="Sec5"><span data-dcnode-id="4841" instrument_node="">[3] Properties of seawater and particulate &amp; dissolved matter from physical, optical and imaging sensors mounted on the vertical profile sampling system</span></h3><p data-dcnode-id="4828"><span data-dcnode-id="4839" instrument_node="">Repeated deployments of a Rosette Vertical Sampling System [RVSS] during day and night also served the dual purpose of a) assessing the boundaries and the homogeneity/heterogeneity of mesoscale features during a station, and b) assessing the connectivity between stations. These deployments were essential to locate features that have a vertical component and have a signature below the surface, such as eddies, upwellings, fronts, deep chlorophyll maxima, and oxygen minimum zones. The [RVSS] was specifically designed with various sensors, comprising 2 pairs of conductivity and temperature sensors (Sea-Bird), chrorophyll and CDOM fluorometers (WETLabs), a 25 cm transmissiometer for particles 0.5–20 μm (WETLabs), a one-wavelength backscatter meter for particles 0.5–20 μm (WETLabs), and a Underwater Vision Profiler</span><sup data-dcnode-id="4836"><a aria-label="Reference 16" data-dcnode-id="4837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d38177337e2121" title=""><span data-dcnode-id="4838" instrument_node="">16</span></a></sup><span data-dcnode-id="4835" instrument_node=""> for particles &gt;100 μm and zooplankton &gt;600 μm (Hydroptic). A sbe43 oxygen sensor (Sea-Bird) and an In Situ Ultraviolet Spectrophotometer (ISUS) nitrate sensor (SATLANTIC) were also mounted on the Rosette. In the Arctic Ocean and Arctic Seas (2013 campaigns), a second sbe43 oxygen sensor (Sea-Bird) and a four frequency acoustic profiler (Aquascat) were added. Each component was powered on specific Li-Ion batteries and CTD data were self-recorded at 24 Hz. All sensors were calibrated in factory before, during and after the four year programme. Oxygen data were validated using climatologies. Nitrate and Fluorescence data were adjusted with discrete measurements from Niskin bottles mounted on the Rosette, and dark calibrations of the optical sensors were performed monthly on-board. A total of 837 vertical profiles were made during the Expedition. Additional stand-alone Sea-Bird components [sbe19] and [sbe9S] were exceptionally mounted directly on the oceanographic cable during harsh sea conditions, when the deployment of the rosette was not safe. In addition, apparent optical properties of sea water were measured using a surface tethered [RADIOMETRE-TSRB] in 2009–2012 and a profiling [RADIOMETRE-COPS] in 2013. Finally, a total of 101 deployments of the Secchi disk [SECCHI] provide a valuable, world-wide contribution to historical records of this very simple and yet fundamental sampling device. </span><i data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Tara</span></i><span data-dcnode-id="4832" instrument_node=""> Oceans data corresponding to methods described in this section are already open to the public at PANGAEA (</span><a aria-label="Reference Data Citation 4" data-dcnode-id="4830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d38177337e2127" title=""><span data-dcnode-id="4831" instrument_node="">Data Citation 4</span></a><span data-dcnode-id="4829" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4826" id="Sec6"><span data-dcnode-id="4827" instrument_node="">[4] Properties of seawater and particulate &amp; dissolved matter from discrete water samples</span></h3><p data-dcnode-id="4791"><span data-dcnode-id="4825" instrument_node="">In addition to sensors mounted on the Rosette Vertical Sampling System [RVSS], seawater was collected using Niskin bottles [NISKIN] (6×8-L Niskins and 4×12-L Niskins) in order to further characterise environmental conditions in the ecosystem under study. Measurements include pigment concentrations from HPLC analysis (10 depths per vertical profile; 25 pigments per depth), the carbonate system (Surface and 400 m; pHT, CO</span><sub data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">2</span></sub><span data-dcnode-id="4822" instrument_node="">, pCO</span><sub data-dcnode-id="4820"><span data-dcnode-id="4821" instrument_node="">2</span></sub><span data-dcnode-id="4819" instrument_node="">, fCO</span><sub data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">2</span></sub><span data-dcnode-id="4816" instrument_node="">, HCO</span><sub data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">3</span></sub><span data-dcnode-id="4813" instrument_node="">, CO</span><sub data-dcnode-id="4811"><span data-dcnode-id="4812" instrument_node="">3</span></sub><span data-dcnode-id="4810" instrument_node="">, Total alkalinity, Total carbon, OmegaAragonite, OmegaCalcite, and quality Flag), nutrients (10 depths per vertical profile; NO</span><sub data-dcnode-id="4808"><span data-dcnode-id="4809" instrument_node="">2</span></sub><span data-dcnode-id="4807" instrument_node="">, PO</span><sub data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">4</span></sub><span data-dcnode-id="4804" instrument_node="">, N0</span><sub data-dcnode-id="4802"><span data-dcnode-id="4803" instrument_node="">2</span></sub><span data-dcnode-id="4801" instrument_node="">/NO</span><sub data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">3</span></sub><span data-dcnode-id="4798" instrument_node="">, SI, quality Flags), DOC, CDOM, and dissolved oxygen isotopes. More than 200 vertical profiles of these properties were made across the world ocean. DOC, CDOM and dissolved oxygen isotopes are available only for the Arctic Ocean and Arctic Seas (2013 campaigns). </span><i data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">Tara</span></i><span data-dcnode-id="4795" instrument_node=""> Oceans data corresponding to methods described in this section are already open to the public at PANGAEA (</span><a aria-label="Reference Data Citation 5" data-dcnode-id="4793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d38177337e2160" title=""><span data-dcnode-id="4794" instrument_node="">Data Citation 5</span></a><span data-dcnode-id="4792" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4789" id="Sec7"><span data-dcnode-id="4790" instrument_node="">[5] Environmental features and sampling stations</span></h3><p data-dcnode-id="4777"><span data-dcnode-id="4788" instrument_node="">During the </span><i data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">Tara</span></i><span data-dcnode-id="4785" instrument_node=""> Oceans Expedition (2009–2013), plankton were sampled from 5–10-m thick layers in the water column, corresponding to specific environmental features that were characterised on-board from sensor measurements. Environmental features are defined by controlled vocabularies in the environmental ontology (EnvO; </span><a data-dcnode-id="4783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//environmentontology.org/"><span data-dcnode-id="4784" instrument_node="">http://environmentontology.org/</span></a><span data-dcnode-id="4782" instrument_node="">)</span><sup data-dcnode-id="4779"><a aria-label="Reference 17" data-dcnode-id="4780" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d38177337e2182" title=""><span data-dcnode-id="4781" instrument_node="">17</span></a></sup><span data-dcnode-id="4778" instrument_node="">.</span></p><p data-dcnode-id="4744"><span data-dcnode-id="4776" instrument_node="">The </span><b data-dcnode-id="4773"><i data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4772" instrument_node=""> (ENVO:00002042), sometimes labelled in the literature and databases as “surface”, “SRF”, “SUR”, “SURF” or “S”, was simply defined as a layer between 3 and 7 m below the sea surface. The </span><b data-dcnode-id="4769"><i data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4768" instrument_node=""> (ENVO:01000326), often labelled in the literature and databases as “DCM” or “D”, was determined from the chlorophyll fluorometer (WETLabs optical sensors) mounted on the Rosette Vertical Sampling System [RVSS]. The presence of a DCM may indicate a maximum in the abundance of plankton bearing chlorophyll pigments, or it may result from the higher chlorophyll content of plankton living in a darker environment</span><sup data-dcnode-id="4765"><a aria-label="Reference 18" data-dcnode-id="4766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d38177337e2195" title=""><span data-dcnode-id="4767" instrument_node="">18</span></a></sup><span data-dcnode-id="4764" instrument_node="">. This can be assessed </span><i data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">a posteriori</span></i><span data-dcnode-id="4761" instrument_node=""> using water samples analysed for pigments by HPLC methods and from plankton counts. The </span><b data-dcnode-id="4758"><i data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4757" instrument_node=""> (ENVO:00000213), also labelled in the literature and databases as “MESO” or “M”, corresponds to the layer between 200 and 1000 m depths. The sampling depth within the </span><b data-dcnode-id="4754"><i data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4753" instrument_node=""> was selected based on vertical profiles of temperature, salinity, fluorescence, nutrients, oxygen, and particulate matter. The selected depth varied from station to station, targeting for example a nutricline, a minimum concentration of oxygen, a maximum concentration of particulate matter, or a fixed depth of ca. 400 m when no particular feature could be identified. Other environmental features of special scientific interest include the </span><b data-dcnode-id="4750"><i data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">oxygen minimum zone</span></i></b><span data-dcnode-id="4749" instrument_node=""> (ENVO:01000065), often labelled in the literature and data sets as “OMZ” or “O”, and the </span><b data-dcnode-id="4746"><i data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">epipelagic mixing layer</span></i></b><span data-dcnode-id="4745" instrument_node=""> (ENVO:01000061), also labelled in the literature and data sets as “ML”, “MIX” or “X”.</span></p><p data-dcnode-id="4703"><span data-dcnode-id="4743" instrument_node="">A complete sampling station consisted of collecting plankton from three distinct environmental features, typically the </span><b data-dcnode-id="4740"><i data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4739" instrument_node="">, </span><b data-dcnode-id="4736"><i data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4735" instrument_node="">, and </span><b data-dcnode-id="4732"><i data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4731" instrument_node=""> (</span><a data-dcnode-id="4729" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4730" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4728" instrument_node="">). Such a station lasted typically 24–48 h and special care was taken to reposition </span><i data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">SV Tara</span></i><span data-dcnode-id="4725" instrument_node=""> in order to remain within a radius of 10 km and sample a homogeneous ecosystem as much as possible (see previous two sub-sections). The sequence of sampling deployments varied but generally followed the order illustrated in </span><a data-dcnode-id="4723" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4724" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4722" instrument_node="">, i.e., </span><b data-dcnode-id="4719"><i data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4718" instrument_node=""> and </span><b data-dcnode-id="4715"><i data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4714" instrument_node=""> during daytime on the first day, night sampling over fixed depths, and </span><b data-dcnode-id="4711"><i data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4710" instrument_node=""> during daytime on the second day. Sampling devices consisted essentially of a High Volume Peristaltic pump [HVP-PUMP], a Rosette Vertical Sampling System [RVSS] equipped with sensors and [NISKIN] bottles, instrumented plankton nets [NET</span><i data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">-TYPE-MESH</span></i><span data-dcnode-id="4707" instrument_node="">], a [SECCHI] disc, and a [RADIOMETRE] (</span><a data-dcnode-id="4705" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4706" instrument_node="">Table 1</span></a><span data-dcnode-id="4704" instrument_node=""> (available online only)).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4661" data-test="figure" data-title="Spatial representation and chronology of sampling events during a 24-48 h station." id="figure-4"><figure data-dcnode-id="4662"><figcaption data-dcnode-id="4700"><b class="c-article-section__figure-caption" data-dcnode-id="4701" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="4702" instrument_node="">Figure 4: Spatial representation and chronology of sampling events during a 24-48 h station.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4673"><div class="c-article-section__figure-item" data-dcnode-id="4695"><a class="c-article-section__figure-link" data-dcnode-id="4696" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/4" rel="nofollow"><picture data-dcnode-id="4697"><source data-dcnode-id="4699" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig4_HTML.jpg?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="4698" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/sdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig4_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4674" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="4675"><span data-dcnode-id="4694" instrument_node="">Coloured markers along the route of </span><i data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">SV Tara</span></i><span data-dcnode-id="4691" instrument_node=""> (yellow surface track) correspond to sampling events targeting the </span><b data-dcnode-id="4688"><i data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4687" instrument_node=""> (red, ), </span><b data-dcnode-id="4684"><i data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4683" instrument_node=""> (green, here at 50 m), and the </span><b data-dcnode-id="4680"><i data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4679" instrument_node=""> (blue, here at 400 m). At some stations, an Argo drifter (10-m floating anchor and satellite positioning) was used to follow the water mass during sampling (black surface track). White and grey markers correspond to day and night time deployments, respectively, of plankton nets [</span><i data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">TYPE-MESH</span></i><span data-dcnode-id="4676" instrument_node="">] and rosette [RVSS] casts that covered fixed depth layers of 0–100 m, 0–500 m or 0–1,000 m.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4663"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="4664" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/4" rel="nofollow"><span data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4665" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4666" xlink:href=
