</span></a></div></figure></div><p data-dcnode-id="4609"><span data-dcnode-id="4642" instrument_node="">Plankton were sampled from a total of 210 stations, of which: 51 stations did not target a specific environmental feature and conducted classical vertical profiles of physical and optical sensors and depth integrated net tows; 57 stations sampled only the </span><b data-dcnode-id="4639"><i data-dcnode-id="4640"><span data-dcnode-id="4641" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4638" instrument_node="">; 62 stations sampled the </span><b data-dcnode-id="4635"><i data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4634" instrument_node=""> and a second depth-specific feature; and 40 stations sampled the </span><b data-dcnode-id="4631"><i data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4630" instrument_node="">, the </span><b data-dcnode-id="4627"><i data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4626" instrument_node=""> and a third depth-specific feature. </span><i data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">Tara</span></i><span data-dcnode-id="4623" instrument_node=""> Oceans data corresponding to methods described in this section are already open to the public at PANGAEA (</span><a aria-label="Reference Data Citations 6" data-dcnode-id="4621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38177337e3430" title=""><span data-dcnode-id="4622" instrument_node="">Data Citations 6</span></a><span data-dcnode-id="4620" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="4618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e3433" title=""><span data-dcnode-id="4619" instrument_node="">7</span></a><span data-dcnode-id="4617" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="4615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38177337e3436" title=""><span data-dcnode-id="4616" instrument_node="">8</span></a><span data-dcnode-id="4614" instrument_node="">) and are described in the </span><b data-dcnode-id="4611"><i data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">Data Records Section</span></i></b><span data-dcnode-id="4610" instrument_node=""> of the present paper.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4607" id="Sec8"><span data-dcnode-id="4608" instrument_node="">[6] Marine plankton</span></h3><p data-dcnode-id="4544"><span data-dcnode-id="4606" instrument_node="">Plankton sampled during the </span><i data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Tara</span></i><span data-dcnode-id="4603" instrument_node=""> Oceans Expedition cover six orders of magnitude in size (10</span><sup data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">−2</span></sup><span data-dcnode-id="4600" instrument_node="">–10</span><sup data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">5</span></sup><span data-dcnode-id="4597" instrument_node=""> μm) and correspond to viruses, giant viruses (giruses), prokaryotes (bacteria and archaea), unicellular eukaryotes (protists), and multicellular eukaryotes (metazoans). These five groups form the bulk of biomass throughout the oceans and drive the global biogeochemical cycles that regulate the Earth system</span><sup data-dcnode-id="4591"><a aria-label="Reference 19" data-dcnode-id="4595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d38177337e3458" title=""><span data-dcnode-id="4596" instrument_node="">19</span></a><span data-dcnode-id="4594" instrument_node="">–</span><a aria-label="Reference 21" data-dcnode-id="4592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38177337e3461" title=""><span data-dcnode-id="4593" instrument_node="">21</span></a></sup><span data-dcnode-id="4590" instrument_node="">. Ocean viruses play an important role in plankton ecology by inducing mortality, horizontal gene transfer, and modulating microbial metabolism</span><sup data-dcnode-id="4587"><a aria-label="Reference 22" data-dcnode-id="4588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d38177337e3465" title=""><span data-dcnode-id="4589" instrument_node="">22</span></a></sup><span data-dcnode-id="4586" instrument_node="">. They are thought to target diverse prokaryotic and eukaryotic hosts including microalgae and heterotrophic protists, and to play a role in the evolution of their hosts</span><sup data-dcnode-id="4583"><a aria-label="Reference 23" data-dcnode-id="4584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d38177337e3470" title=""><span data-dcnode-id="4585" instrument_node="">23</span></a></sup><span data-dcnode-id="4582" instrument_node="">. Small viruses (&lt;0.2 μm) are known to be ubiquitous and the most abundant plankton in seawater, while the larger </span><i data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">giant viruses</span></i><span data-dcnode-id="4579" instrument_node=""> or </span><i data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">giruses</span></i><span data-dcnode-id="4576" instrument_node=""> (0.2–1 μm) were discovered more recently and are increasingly observed in marine samples</span><sup data-dcnode-id="4570"><a aria-label="Reference 24" data-dcnode-id="4574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d38177337e3480" title=""><span data-dcnode-id="4575" instrument_node="">24</span></a><span data-dcnode-id="4573" instrument_node="">,</span><a aria-label="Reference 25" data-dcnode-id="4571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d38177337e3483" title=""><span data-dcnode-id="4572" instrument_node="">25</span></a></sup><span data-dcnode-id="4569" instrument_node="">. Prokaryotes are believed to be responsible for 30% of primary production and 95% of community respiration in oceans</span><sup data-dcnode-id="4566"><a aria-label="Reference 26" data-dcnode-id="4567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d38177337e3487" title=""><span data-dcnode-id="4568" instrument_node="">26</span></a></sup><span data-dcnode-id="4565" instrument_node=""> and are thus a fundamental component of marine food webs and biogeochemical processes. They are often divided and studied as two size fractions: the free-living prokaryotes range in size from 0.22–3 μm, and those that are attached to larger cells, particles, or aggregates are found in the 3–20 μm size-fraction</span><sup data-dcnode-id="4562"><a aria-label="Reference 27" data-dcnode-id="4563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d38177337e3491" title=""><span data-dcnode-id="4564" instrument_node="">27</span></a></sup><span data-dcnode-id="4561" instrument_node="">. In most cases, they are very difficult to culture. Unicellular eukaryotes, or protists, cover a broad range of cell size (0.8–2,000 μm). They are taxonomically very diverse with representatives in all of the 8 super-groups of the eukaryotic tree of life</span><sup data-dcnode-id="4558"><a aria-label="Reference 28" data-dcnode-id="4559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d38177337e3496" title=""><span data-dcnode-id="4560" instrument_node="">28</span></a></sup><span data-dcnode-id="4557" instrument_node="">, whose roles in marine and Earth systems ecology are largely unexplored. Only the most abundant groups, such as diatoms and dinoflagellates, have been studied extensively in the field and cultured successfully</span><sup data-dcnode-id="4554"><a aria-label="Reference 29" data-dcnode-id="4555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38177337e3500" title=""><span data-dcnode-id="4556" instrument_node="">29</span></a></sup><span data-dcnode-id="4553" instrument_node="">. Meso-zooplankton (metazoans; multicellular eukaryotes) range in size from 50 μm to tens of metres in colonial forms, and play a pivotal role in both the transfer of energy to higher trophic levels such as fish and other large predators, and in the vertical export of particulate matter produced at the surface of the ocean</span><sup data-dcnode-id="4550"><a aria-label="Reference 30" data-dcnode-id="4551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d38177337e3504" title=""><span data-dcnode-id="4552" instrument_node="">30</span></a></sup><span data-dcnode-id="4549" instrument_node="">. Their life history (e.g., metabolism, development, locomotion, reproduction, feeding) and their body-size are important properties affecting these two processes</span><sup data-dcnode-id="4546"><a aria-label="Reference 31" data-dcnode-id="4547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d38177337e3508" title=""><span data-dcnode-id="4548" instrument_node="">31</span></a></sup><span data-dcnode-id="4545" instrument_node="">.</span></p><p data-dcnode-id="4538"><span data-dcnode-id="4543" instrument_node="">Various sampling methods were used to capture the diversity of both the dominant and less abundant organisms described above (see </span><b data-dcnode-id="4540"><i data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">Technical Validation Section</span></i></b><span data-dcnode-id="4539" instrument_node="">). These methods effectively separated organisms into 10 size fractions: &lt;5 μm (or &lt;3 μm), 5–20 μm (or 3–20 μm), &lt;20 μm, 20–180 μm and 180–2,000 μm for planktonic viruses, prokaryotes and unicellular eukaryotes, and &gt;50 μm, &gt;200 μm, &gt;300 μm, &gt;500 μm and &gt;680 μm for large planktonic unicellular eukaryotes and metazoans. Whenever possible, replicate sampling was performed to assess plankton natural variability and to ensure long-term storage of samples in view of future re-analysis using new technologies, notably in the fields of high throughput imaging and –omics which are evolving extremely rapidly.</span></p><p data-dcnode-id="4530"><span data-dcnode-id="4537" instrument_node="">Detailed protocols concerning the filtration, preservation and storage of plankton samples will be described in detail as a separate publication. Morphological data will be openly released at PANGAEA (</span><a data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pangaea.de/"><span data-dcnode-id="4536" instrument_node="">http://www.pangaea.de</span></a><span data-dcnode-id="4534" instrument_node="">) and nucleotides data will be openly released as they become available at the European Nucleotide Archive (</span><a data-dcnode-id="4532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ebi.ac.uk/ena/"><span data-dcnode-id="4533" instrument_node="">http://www.ebi.ac.uk/ena/</span></a><span data-dcnode-id="4531" instrument_node="">).</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4526" id="Sec9"><span data-dcnode-id="4529" instrument_node="">[6a] </span><i data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">Sampling planktonic viruses, prokaryotes and unicellular eukaryotes</span></i></h4><p data-dcnode-id="4518"><span data-dcnode-id="4525" instrument_node="">Sampling devices used to collect small size organisms (&lt;20 μm size fractions) include Niskin bottles [NISKIN] mounted on the rosette [RVSS] or occasionally attached individually on the oceanographic cable, a High Volume Peristaltic Pump [HVP-PUMP], and exceptionally a 10-L plastic bucket [BUCKET] (</span><a data-dcnode-id="4523" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4524" instrument_node="">Table 1</span></a><span data-dcnode-id="4522" instrument_node=""> (available online only)). Waste waters from </span><i data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Tara</span></i><span data-dcnode-id="4519" instrument_node=""> were not released automatically at sea and were not purged during stations. The pump [HVP-PUMP] was fixed on deck and connected to a 40 mm diameter flexible tube, lowered from either starboard to sample surface water (3–7 m) or from the stern to sample other depths down to 60 m. At the beginning of each sampling activity, the tube was rinsed by letting seawater flow overboard for 10 min. A single deployment of the pump [HVP-PUMP] brought back up to 1,000 l, whereas 4–6 deployments of the rosette [RVSS] [NISKIN] were necessary to collect 400–600 l of seawater.</span></p><p data-dcnode-id="4504"><span data-dcnode-id="4517" instrument_node="">The choice of the sampling device was determined by weather conditions and the depth of the targeted environmental features. The </span><b data-dcnode-id="4514"><i data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">surface water layer</span></i></b><span data-dcnode-id="4513" instrument_node=""> was systematically sampled using the pump [HVP-PUMP], and exceptionally (at 3 stations) using a 10-Litres plastic bucket [BUCKET]. The </span><b data-dcnode-id="4510"><i data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">deep chlorophyll maximum layer</span></i></b><span data-dcnode-id="4509" instrument_node=""> was sampled preferentially with the pump [HVP-PUMP] or alternatively using multiple deployments of the rosette [RVSS] [NISKIN] when the sampling depth was &gt;60 m. A WETLabs three-optical-sensor [ECOTriplet], measuring pressure, temperature, CDOM and chlorophyll fluorescence, was attached to the intake of the pump tube to monitor sampling depth, temperature and chlorophyll concentrations in real time during pumping. The </span><b data-dcnode-id="4506"><i data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">mesopelagic zone</span></i></b><span data-dcnode-id="4505" instrument_node=""> was systematically sampled using multiple deployments of the rosette [RVSS] [NISKIN].</span></p><p data-dcnode-id="4493"><b data-dcnode-id="4501"><i data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Whole seawater</span></i></b><span data-dcnode-id="4500" instrument_node=""> collected by these devices was then pre-filtered successively on nylon conical sieves with a mesh of 200 μm and 20 μm, and additionally 5 μm for protists (</span><a data-dcnode-id="4498" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4499" instrument_node="">Table 1</span></a><span data-dcnode-id="4497" instrument_node=""> (available online only)). The filtrate was collected in four to six 100-L polyethylene containers, which were thoroughly washed with 0.1% bleach, rinsed twice with fresh water and rinsed again twice with the filtrate. Depending on protocols, the &lt;5 μm and &lt;20 μm filtrates were further fractionated on-board using one or a combination of membranes with pore sizes 0.1 μm, 0.2 μm, 0.45 μm, 0.7 μm, 0.8 μm, 1.6 μm or 3 μm. The retention efficiency of meshes, pore-membranes and fibre-filters is a constant debate in plankton ecology. Organisms display various shapes, including high length-to-width ratios, some may easily “squeeze” through pores smaller than their “normal” size, and others may form colonies or tend to aggregate into particles much larger than their individual size. We do not intend to assess the efficiency of the various meshes and filters in retaining the different groups of organisms targeted during the </span><i data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Tara</span></i><span data-dcnode-id="4494" instrument_node=""> Oceans Expedition. We simply picked commonly used size-fractions and accept the fact that organisms or parts of organisms from the different groups may be present in several size-fractions.</span></p><p data-dcnode-id="4480"><span data-dcnode-id="4492" instrument_node="">The choice of size thresholds used to collect small eukaryotes, and prokaryotes associated with small particles or with eukaryotes varied during the </span><i data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">Tara</span></i><span data-dcnode-id="4489" instrument_node=""> Oceans Expedition, between 3–20 μm and 5–20 μm. Plankton from that size fraction comprise organisms that are often not abundant enough in </span><b data-dcnode-id="4486"><i data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">whole seawater</span></i></b><span data-dcnode-id="4485" instrument_node=""> and often too fragile to be collected with plankton nets that are themselves too delicate to be deployed in rough seas. The sampling method was therefore weather-dependent and often a combination of using either the pump [HVP-PUMP] or Niskin bottles [RVSS] [NISKIN] for </span><b data-dcnode-id="4482"><i data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">whole seawater</span></i></b><span data-dcnode-id="4481" instrument_node="">, and using a plankton net with a mesh size of 5 μm [NET-SINGLE-5] when sea conditions allowed.</span></p><p data-dcnode-id="4471"><span data-dcnode-id="4479" instrument_node="">When the pump [HVP-PUMP] or Niskin bottles [RVSS] [NISKIN] were used to collect the 3–20 μm or 5–20 μm size-fraction, </span><b data-dcnode-id="4476"><i data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">whole seawater</span></i></b><span data-dcnode-id="4475" instrument_node=""> was pre-filtered successively on 200 μm and 20 μm, and either collected on 3 μm membrane filters (1 to 5 replicates) or concentrated in a conical, 5 μm mesh nylon sieve [SIEVE-5]. The volume of water passing through each 3 μm pore size membrane was consistently 100 l, whereas the volume passing through the [SIEVE-5] was estimated by recording the pumping rate and the start and end time of pumping. Material collected in the [SIEVE-5] was washed-off into an 8-L polyethylene bottle using seawater pre-filtered on 0.1 μm, up to a final volume of 3 l. The 3–20 μm method was used throughout the </span><i data-dcnode-id="4473"><span data-dcnode-id="4474" instrument_node="">Tara</span></i><span data-dcnode-id="4472" instrument_node=""> Oceans Expedition (2009–2013), whereas the 5–20 μm method was used only in 2009–2012, i.e., not in the Arctic.</span></p><p data-dcnode-id="4465"><span data-dcnode-id="4470" instrument_node="">When nets [NET-SINGLE-5] were used for the 5–20 μm size-fraction, they were lowered to the selected environmental feature and towed horizontally for 5–15 min at a speed of 0.3 m/s. Net samples from the cod-end were sieved through 20 μm [SIEVE-20] and poured into an 8-L polyethylene bottle, which was thoroughly pre-washed with 0.1% bleach, rinsed twice with fresh water and rinsed again twice with seawater pre-filtered on 0.1 μm. The volume of </span><b data-dcnode-id="4467"><i data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">net sample</span></i></b><span data-dcnode-id="4466" instrument_node=""> was adjusted to 3 l with 0.1 μm pre-filtered seawater. After each use, nets, cod-ends, and sieves were rinsed with fresh water and checked for holes. That method was used only in 2009–2012, i.e., not in the Arctic.</span></p><p data-dcnode-id="4459"><span data-dcnode-id="4464" instrument_node="">Plankton from the 20–180 μm size-fraction were collected using a double plankton net with a 20 μm mesh size [NET-DOUBLE-20]. Nets were lowered to the selected environmental feature and towed horizontally for 5–15 min at a speed of 0.3 m/s. Net samples from the two cod-ends were sieved through 180 μm [SIEVE-180] and poured into an 8-L polyethylene bottle, which was thoroughly pre-washed with 0.1% bleach, rinsed twice with fresh water and rinsed again twice with seawater pre-filtered on 0.1 μm. The volume of </span><b data-dcnode-id="4461"><i data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">net sample</span></i></b><span data-dcnode-id="4460" instrument_node=""> was adjusted to 3 l with 0.1 μm pre-filtered seawater. After each use, nets, cod-ends, and sieves were rinsed with fresh water and checked for holes.</span></p><p data-dcnode-id="4453"><span data-dcnode-id="4458" instrument_node="">Plankton from the 180–2,000 μm size-fraction were collected using a 180 μm Bongo Net [NET-BONGO-180]. Nets were lowered to the selected environmental feature and towed horizontally for 5–15 min at a speed of 0.3 m/s. Net samples from the two cod-ends were sieved through 2,000 μm [SIEVE-2000] and poured into an 8-L polyethylene bottle, which was thoroughly pre-washed with 0.1% bleach, rinsed twice with freshwater and rinsed again twice with seawater pre-filtered on 0.1 μm. The volume of </span><b data-dcnode-id="4455"><i data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">net sample</span></i></b><span data-dcnode-id="4454" instrument_node=""> was adjusted to 3 l with 0.1 μm pre-filtered seawater. After each use, nets, cod-ends, and sieves were rinsed with fresh water and checked for holes.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4449" id="Sec10"><span data-dcnode-id="4452" instrument_node="">[6b] </span><i data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">Sampling large planktonic unicellular eukaryotes and metazoans</span></i></h4><p data-dcnode-id="4438"><span data-dcnode-id="4448" instrument_node="">Sampling devices used to concentrate and collect the larger and less abundant organisms (&gt;50 μm size fractions) consisted of plankton nets with mesh sizes ranging from 50 to 680 μm [NET-</span><i data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">TYPE-MESH</span></i><span data-dcnode-id="4445" instrument_node="">] and metal pan-shaped sieves [SIEVE-</span><i data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">MESH</span></i><span data-dcnode-id="4442" instrument_node="">] to remove large organisms as needed (</span><a data-dcnode-id="4440" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4441" instrument_node="">Table 1</span></a><span data-dcnode-id="4439" instrument_node=""> (available online only)). All nets were equipped with a flow meter and a temperature-depth recorder, and their depth was monitored and adjusted during deployments using an acoustic SCANMAR system. Upon recovery, all nets were rinsed from the outside with running seawater. Cod-ends and metal sieves used to size-fractionate samples were rinsed with running seawater pre-filtered successively on 25 μm and 0.1 μm, using Polygard-CR Cartridge Filters (CR2501006, CRK101006). After each use, nets, cod-ends, and sieves were rinsed with fresh water and checked for holes.</span></p><p data-dcnode-id="4429"><span data-dcnode-id="4437" instrument_node="">Organism-selectivity and capture-efficiency of plankton nets depend on the mesh size and deployment methods, i.e., depth, tow method (oblique/vertical/horizontal), tow speed and time of day</span><sup data-dcnode-id="4434"><a aria-label="Reference 32" data-dcnode-id="4435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d38177337e3638" title=""><span data-dcnode-id="4436" instrument_node="">32</span></a></sup><span data-dcnode-id="4433" instrument_node="">. During the </span><i data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Tara</span></i><span data-dcnode-id="4430" instrument_node=""> Oceans Expedition, plankton nets were deployed during day and night in order to capture the nycthemeral vertical migrations. Both [NET-WPII-50] and [NET-WPII-200] were towed vertically or obliquely from a depth of 100 m to the surface, during night and daytime, at a speed of 0.3–0.5 m/s depending on weather conditions. Both [NET-BONGO-300] and [NET-REGENT-680] were towed obliquely from a depth of 500 m to the surface, during night and daytime, at a speed of 0.5 m/s depending on weather conditions. Net samples were preserved on-board with buffered formaldehyde, ethanol or RNA-Later for later morphological and/or molecular analyses.</span></p><p data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">Where time and weather allowed, a multiple opening-closing net equipped with 5 nets of 300 μm mesh size [NET-MULTI-300] was deployed preferentially at night or during daytime to study the vertical distribution of zooplankton. Nets opened and closed at selected depths between 1,000 m and the surface, according to water column features identified from vertical profiles of temperature, salinity, fluorescence, nutrients, oxygen, and particulate matter. Samples were preserved on-board in buffered formaldehyde. The Underwater Vision Profiler (UVP) mounted on the rosette was also used to study the vertical distribution of zooplankton &gt;600 μm during day and night.</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">In 2011–2013, a neuston net [NET-MANTA-500] was towed at the surface for about 1 h at a speed of 0.7 m/s in order to collect plastic particles and associated organisms. Samples were preserved in ethanol for later morphological and molecular analyses. Finally, a Continuous Plankton Recorder (CPR) was deployed between stations in 2013. Samples were preserved in formaldehyde and sent to the Sir Alister Hardy Foundation for Ocean Science (SAHFOS) for later morphological and molecular analyses.</span></p></div></div></section><section data-dcnode-id="4190" data-title="Data Records"><div class="c-article-section" data-dcnode-id="4191" id="Sec11-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4420" id="Sec11"><span data-dcnode-id="4421" instrument_node="">Data Records</span></h2><div class="c-article-section__content" data-dcnode-id="4192" id="Sec11-content"><p data-dcnode-id="4400"><i data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Tara</span></i><span data-dcnode-id="4417" instrument_node=""> Oceans developed best practices for the standardisation and interoperability of data generated across environmental, morphological and molecular analyses. This effort contributed to the publication of a set of standards for reporting and serving data in Marine Microbial Biodiversity, Bioinformatics and Biotechnology (M2B3)</span><sup data-dcnode-id="4414"><a aria-label="Reference 33" data-dcnode-id="4415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d38177337e3663" title=""><span data-dcnode-id="4416" instrument_node="">33</span></a></sup><span data-dcnode-id="4413" instrument_node="">. Here we describe three levels of the M2B3 reporting standard: </span><b data-dcnode-id="4410"><i data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">campaigns</span></i></b><span data-dcnode-id="4409" instrument_node="">, </span><b data-dcnode-id="4406"><i data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">stations</span></i></b><span data-dcnode-id="4405" instrument_node=""> and </span><b data-dcnode-id="4402"><i data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">events</span></i></b><span data-dcnode-id="4401" instrument_node="">. For each level, we provide a registry of all campaigns/stations/events, pdf documents describing each campaign/station/event, and universal resource locator (URL) queries to access related nucleotides and environmental data.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4398" id="Sec12"><span data-dcnode-id="4399" instrument_node="">Labels</span></h3><p data-dcnode-id="4396"><span data-dcnode-id="4397" instrument_node="">Labels that identify each campaign, station or event are built using a consistent syntax that has the following format:</span></p><p data-dcnode-id="4391"><b data-dcnode-id="4393"><i data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">Campaign</span></i></b><span data-dcnode-id="4392" instrument_node=""> labels: TARA_date(yyyymmddZ), e.g.,TARA_20110401Z</span></p><p data-dcnode-id="4386"><b data-dcnode-id="4388"><i data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Station</span></i></b><span data-dcnode-id="4387" instrument_node=""> labels: TARA_station#(001-210), e.g.,TARA_100</span></p><p data-dcnode-id="4381"><b data-dcnode-id="4383"><i data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Event</span></i></b><span data-dcnode-id="4382" instrument_node=""> labels: TARA_datetime(yyyymmddThhmmZ)_station#(001-210)_EVENT_TYPE, e.g.,TARA_20110416T1306Z_100_EVENT_CAST</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4379" id="Sec13"><span data-dcnode-id="4380" instrument_node="">Registries</span></h3><p data-dcnode-id="4374"><span data-dcnode-id="4378" instrument_node="">The </span><i data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">Tara</span></i><span data-dcnode-id="4375" instrument_node=""> Oceans Expedition (2009–2013) comprised 60 campaigns (from port-to-port), 210 stations and over 3200 sampling events. Three registries listing the campaigns, stations and events are published at PANGAEA, Data Publisher for Earth and Environmental Science:</span></p><p data-dcnode-id="4366"><b data-dcnode-id="4371"><i data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">Campaigns</span></i></b><span data-dcnode-id="4370" instrument_node=""> registry (</span><a aria-label="Reference Data Citation 6" data-dcnode-id="4368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38177337e3713" title=""><span data-dcnode-id="4369" instrument_node="">Data Citation 6</span></a><span data-dcnode-id="4367" instrument_node="">)</span></p><p data-dcnode-id="4358"><b data-dcnode-id="4363"><i data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Stations</span></i></b><span data-dcnode-id="4362" instrument_node=""> registry (</span><a aria-label="Reference Data Citation 7" data-dcnode-id="4360" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e3721" title=""><span data-dcnode-id="4361" instrument_node="">Data Citation 7</span></a><span data-dcnode-id="4359" instrument_node="">) </span></p><p data-dcnode-id="4350"><b data-dcnode-id="4355"><i data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Events</span></i></b><span data-dcnode-id="4354" instrument_node=""> registry (</span><a aria-label="Reference Data Citation 8" data-dcnode-id="4352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38177337e3729" title=""><span data-dcnode-id="4353" instrument_node="">Data Citation 8</span></a><span data-dcnode-id="4351" instrument_node="">)</span></p><p data-dcnode-id="4344"><span data-dcnode-id="4349" instrument_node="">The </span><b data-dcnode-id="4346"><i data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">campaigns</span></i></b><span data-dcnode-id="4345" instrument_node=""> registry provides details about the scientific interest of each campaign, a list of scientists on board, and URLs for the corresponding campaign summary report (pdf), environmental data sets and nucleotides data sets.</span></p><p data-dcnode-id="4331"><span data-dcnode-id="4343" instrument_node="">The </span><b data-dcnode-id="4340"><i data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">stations</span></i></b><span data-dcnode-id="4339" instrument_node=""> registry provides details about the geographic context of each station, including mean and maximum bathymetric depth (extracted from the General Bathymetric Chart of the Oceans; GEBCO), minimum distance from the coast, the corresponding marine biomes and biogeographical provinces defined by Longhurst</span><sup data-dcnode-id="4336"><a aria-label="Reference 34" data-dcnode-id="4337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d38177337e3746" title=""><span data-dcnode-id="4338" instrument_node="">34</span></a></sup><span data-dcnode-id="4335" instrument_node="">, and when applicable information about the corresponding exclusive economic zone and related legal aspects. Additionally for each station, we provide information about the environmental features that were sampled and their depth, and the number of deployments carried out with the different sampling devices listed in </span><a data-dcnode-id="4333" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4334" instrument_node="">Table 1</span></a><span data-dcnode-id="4332" instrument_node=""> (available online only). URLs provide access to the corresponding oceanographic context report (pdf), environmental data sets and nucleotides data sets.</span></p><p data-dcnode-id="4322"><span data-dcnode-id="4330" instrument_node="">The </span><b data-dcnode-id="4327"><i data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">events</span></i></b><span data-dcnode-id="4326" instrument_node=""> registry provides details about the sampling date, time, location and methodology of each event. URLs provide access to the corresponding event log sheet (pdf), environmental data sets and nucleotides data sets. Sampling events occurring outside the context of a station were assigned the station label TARA_999. Such events include for example underway measurements of the on-board meteorological station [BATOS] and of the continuous surface sampling system [CSSS], and exceptional deployments of plankton nets [NET-</span><i data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">TYPE-MESH</span></i><span data-dcnode-id="4323" instrument_node="">] or of the rosette vertical sampling system [RVSS].</span></p><p data-dcnode-id="4317"><span data-dcnode-id="4321" instrument_node="">All available metadata information about a single campaign/station/event can be extracted from the respective registries using a web service (description: </span><a data-dcnode-id="4319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws.pangaea.de/dds-fdp/"><span data-dcnode-id="4320" instrument_node="">https://ws.pangaea.de/dds-fdp/</span></a><span data-dcnode-id="4318" instrument_node="">). Here we provide an example for each registry:</span></p><p data-dcnode-id="4310"><b data-dcnode-id="4314"><i data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">Campaign</span></i></b><span data-dcnode-id="4313" instrument_node="">-specific metadata query: </span><a data-dcnode-id="4311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842191%26filterParameter%3DCampaign%26filterValue%3DTARA_20110401Z"><span data-dcnode-id="4312" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842191&amp;filterParameter=Campaign&amp;filterValue=TARA_20110401Z</span></a></p><p data-dcnode-id="4303"><b data-dcnode-id="4307"><i data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Station</span></i></b><span data-dcnode-id="4306" instrument_node="">-specific metadata query: </span><a data-dcnode-id="4304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842237%26filterParameter%3DStation%26filterValue%3DTARA_100"><span data-dcnode-id="4305" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842237&amp;filterParameter=Station&amp;filterValue=TARA_100</span></a></p><p data-dcnode-id="4296"><b data-dcnode-id="4300"><i data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Event</span></i></b><span data-dcnode-id="4299" instrument_node=""> specific metadata query: </span><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842227%26filterParameter%3DEvent%26filterValue%3DTARA_20110416T1306Z_100_EVENT_CAST"><span data-dcnode-id="4298" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842227&amp;filterParameter=Event&amp;filterValue=TARA_20110416T1306Z_100_EVENT_CAST</span></a></p><p data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Additionally, the same web service can be used to extract information about all stations from a campaign, all events from a campaign, or all events from a station as shown in these examples:</span></p><p data-dcnode-id="4287"><b data-dcnode-id="4291"><i data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Stations-from-a-campaign</span></i></b><span data-dcnode-id="4290" instrument_node=""> metadata query: </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842237%26filterParameter%3DCampaign%26filterValue%3DTARA_20110401Z"><span data-dcnode-id="4289" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842237&amp;filterParameter=Campaign&amp;filterValue=TARA_20110401Z</span></a></p><p data-dcnode-id="4280"><b data-dcnode-id="4284"><i data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Events-from-a-campaign</span></i></b><span data-dcnode-id="4283" instrument_node=""> metadata query: </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842227%26filterParameter%3DCampaign%26filterValue%3DTARA_20110401Z"><span data-dcnode-id="4282" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842227&amp;filterParameter=Campaign&amp;filterValue=TARA_20110401Z</span></a></p><p data-dcnode-id="4273"><b data-dcnode-id="4277"><i data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">Events-from-a-station</span></i></b><span data-dcnode-id="4276" instrument_node=""> metadata query: </span><a data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1594/PANGAEA.842227%26filterParameter%3DStation%26filterValue%3DTARA_100"><span data-dcnode-id="4275" instrument_node="">https://ws.pangaea.de/dds-fdp/rest/panquery?datasetDOI=doi.pangaea.de/10.1594/PANGAEA.842227&amp;filterParameter=Station&amp;filterValue=TARA_100</span></a></p><h3 class="c-article__sub-heading" data-dcnode-id="4271" id="Sec14"><span data-dcnode-id="4272" instrument_node="">Reports and log sheets</span></h3><p data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Campaign reports were written by the chief scientist and scientific crew in order to document the objectives and main achievements of each campaign, as well as any deviations from the regular sampling programme (e.g.,TARA_20110401Z_report.pdf). The station reports were written by Flavian Kokoszka, Rémi Laxenaire and Sabrina Speich to provide background knowledge of the physical oceanography at each station (e.g.,TARA_100_oceanographic_context_report.pdf). Finally, event log sheets were filled on board each time a sampling device was deployed, recording the position, date, time, type of device, sampling depths, volume sampled, ID and filename of sensor outputs, operator’s comments, and unique identifiers (barcodes) of samples collected during the event (e.g.,TARA_20110415T1312Z_100_EVENT_CAST.pdf). Most of the information found in reports and log sheets was extracted manually, quality checked using controlled vocabularies, and archived in the campaigns, stations and events registries. Nevertheless, these narrative documents remain a valuable and complementary source of information. The three registries contain universal resource locators (URLs) pointing to the reports and log sheets of each campaign/station/event. Reports and log sheets can also be browsed directly in the PANGAEA store:</span></p><p data-dcnode-id="4262"><b data-dcnode-id="4266"><i data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">Campaign</span></i></b><span data-dcnode-id="4265" instrument_node=""> reports: </span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.pangaea.de/Projects/TARA-OCEANS/Campaign_Reports/"><span data-dcnode-id="4264" instrument_node="">http://store.pangaea.de/Projects/TARA-OCEANS/Campaign_Reports/</span></a></p><p data-dcnode-id="4255"><b data-dcnode-id="4259"><i data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Station</span></i></b><span data-dcnode-id="4258" instrument_node=""> reports: </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.pangaea.de/Projects/TARA-OCEANS/Station_Reports/"><span data-dcnode-id="4257" instrument_node="">http://store.pangaea.de/Projects/TARA-OCEANS/Station_Reports/</span></a></p><p data-dcnode-id="4248"><b data-dcnode-id="4252"><i data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Event</span></i></b><span data-dcnode-id="4251" instrument_node=""> log sheets: </span><a data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.pangaea.de/Projects/TARA-OCEANS/Logsheets_Event/"><span data-dcnode-id="4250" instrument_node="">http://store.pangaea.de/Projects/TARA-OCEANS/Logsheets_Event/</span></a></p><h3 class="c-article__sub-heading" data-dcnode-id="4246" id="Sec15"><span data-dcnode-id="4247" instrument_node="">Up-to-date lists of available nucleotides and environmental data sets</span></h3><p data-dcnode-id="4242"><i data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">Tara</span></i><span data-dcnode-id="4243" instrument_node=""> Oceans data will progressively be released openly following their analysis and validation. Up-to-date lists of nucleotides and environmental data sets can be obtained from universal resource locator (URL) queries that are made specific to any campaign/station/event by using labels from the campaigns, stations and events registries.</span></p><p data-dcnode-id="4228"><span data-dcnode-id="4241" instrument_node="">A list of environmental data sets published at PANGAEA can be obtained by combining the following base URL: http://www.pangaea.de/search?q= with a search term. The URL query is made specific to any </span><i data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Tara</span></i><span data-dcnode-id="4238" instrument_node=""> Oceans campaign, station or event by adding the corresponding label as the search term, see examples below. Already-built URL queries for each campaign, station or event are provided in the three respective registries (</span><a aria-label="Reference Data Citations 6" data-dcnode-id="4236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38177337e3899" title=""><span data-dcnode-id="4237" instrument_node="">Data Citations 6</span></a><span data-dcnode-id="4235" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="4233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e3902" title=""><span data-dcnode-id="4234" instrument_node="">7</span></a><span data-dcnode-id="4232" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="4230" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38177337e3905" title=""><span data-dcnode-id="4231" instrument_node="">8</span></a><span data-dcnode-id="4229" instrument_node="">).</span></p><p data-dcnode-id="4221"><b data-dcnode-id="4225"><i data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Campaign</span></i></b><span data-dcnode-id="4224" instrument_node="">-specific environmental data query: </span><a data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pangaea.de/search%3Fq%3DTARA_20110401Z"><span data-dcnode-id="4223" instrument_node="">http://www.pangaea.de/search?q=TARA_20110401Z</span></a></p><p data-dcnode-id="4214"><b data-dcnode-id="4218"><i data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Station</span></i></b><span data-dcnode-id="4217" instrument_node="">-specific environmental data query: </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pangaea.de/search%3Fq%3DTARA_100"><span data-dcnode-id="4216" instrument_node="">http://www.pangaea.de/search?q=TARA_100</span></a></p><p data-dcnode-id="4207"><b data-dcnode-id="4211"><i data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Event</span></i></b><span data-dcnode-id="4210" instrument_node="">-specific environmental data query: </span><a data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pangaea.de/search%3Fq%3DTARA_20110416T1306Z_100_EVENT_CAST"><span data-dcnode-id="4209" instrument_node="">http://www.pangaea.de/search?q=TARA_20110416T1306Z_100_EVENT_CAST</span></a></p><p data-dcnode-id="4193"><span data-dcnode-id="4206" instrument_node="">A list of nucleotides data published at ENA can be obtained by combining the following base URL: http://www.ebi.ac.uk/ena/data/search?query= with a search term. The URL query is made specific to any </span><i data-dcnode-id="4204"><span data-dcnode-id="4205" instrument_node="">Tara</span></i><span data-dcnode-id="4203" instrument_node=""> Oceans campaign, station or event by adding the corresponding label as the search term. Already-built URL queries for each campaign, station or event are provided in the three respective registries (</span><a aria-label="Reference Data Citations 6" data-dcnode-id="4201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38177337e3948" title=""><span data-dcnode-id="4202" instrument_node="">Data Citations 6</span></a><span data-dcnode-id="4200" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="4198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e3951" title=""><span data-dcnode-id="4199" instrument_node="">7</span></a><span data-dcnode-id="4197" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="4195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38177337e3954" title=""><span data-dcnode-id="4196" instrument_node="">8</span></a><span data-dcnode-id="4194" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="4058" data-title="Technical Validation"><div class="c-article-section" data-dcnode-id="4059" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4188" id="Sec16"><span data-dcnode-id="4189" instrument_node="">Technical Validation</span></h2><div class="c-article-section__content" data-dcnode-id="4060" id="Sec16-content"><p data-dcnode-id="4177"><span data-dcnode-id="4187" instrument_node="">Here we provide a first order validation of the </span><i data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Tara</span></i><span data-dcnode-id="4184" instrument_node=""> Oceans sampling methodology by compiling published values of plankton cell/body size, natural abundance and richness (</span><a data-dcnode-id="4182" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4183" instrument_node="">Table 2</span></a><span data-dcnode-id="4181" instrument_node="">). These are compared to the sampling volume and mesh size of the different sampling methods (</span><a data-dcnode-id="4179" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4180" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4178" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4162" data-test="inline-table" id="table-3"><figure data-dcnode-id="4163"><figcaption class="c-article-table__figcaption" data-dcnode-id="4174"><b data-dcnode-id="4175" data-test="table-caption" id="Tab2"><span data-dcnode-id="4176" instrument_node="">Table 2 Cell/body size, abundance and species richness reported in the literature for the four groups of plankton in coastal and oceanic environments.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4164"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="4165" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/tables/3" rel="nofollow"><span data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4166" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4167" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4168" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4171" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4170" fill-rule="evenodd"></path><span data-dcnode-id="4169" instrument_node="">
</span></a></div></figure></div><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4132" data-test="figure" data-title="Empirical basis for the size-fractionation approach and the choice of sampling devices." id="figure-5"><figure data-dcnode-id="4133"><figcaption data-dcnode-id="4159"><b class="c-article-section__figure-caption" data-dcnode-id="4160" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="4161" instrument_node="">Figure 5: Empirical basis for the size-fractionation approach and the choice of sampling devices.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4144"><div class="c-article-section__figure-item" data-dcnode-id="4154"><a class="c-article-section__figure-link" data-dcnode-id="4155" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/5" rel="nofollow"><picture data-dcnode-id="4156"><source data-dcnode-id="4158" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fsdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig5_HTML.jpg?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="4157" height="664" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/sdata.2015.23/MediaObjects/41597_2015_Article_BFsdata201523_Fig5_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4145" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="4146"><span data-dcnode-id="4153" instrument_node="">The horizontal plane shows the range of body/cell size and natural abundances reported in the literature (</span><a data-dcnode-id="4151" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4152" instrument_node="">Table 2</span></a><span data-dcnode-id="4150" instrument_node="">) for viruses (including giant viruses), prokaryotes, protists and metazoans (coloured boxes). The sampling devices used to collect plankton &lt;5 μm in size (i.e., high volume peristaltic pump and rosette with Niskin bottles) and &gt;5 μm in size (i.e., plankton nets) are illustrated as well on the horizontal plane. The vertical plane shows the volume of seawater required to capture 100, 75 and 50% of species richness reported in the literature (</span><a data-dcnode-id="4148" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4149" instrument_node="">Table 2</span></a><span data-dcnode-id="4147" instrument_node="">) for viruses (including giant viruses), prokaryotes, protists and metazoans (shaded boxes). The typical volume of seawater collected by sampling devices are shown in comparison (horizontal thick lines). Also illustrated on the vertical plane: Sieves were used to remove large organisms from protists net samples.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4134"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="4135" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/sdata201523/figures/5" rel="nofollow"><span data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4136" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4137" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4138" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4141" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4140" fill-rule="evenodd"></path><span data-dcnode-id="4139" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4083"><span data-dcnode-id="4131" instrument_node="">Life history traits such as cell/body size and the natural range of abundance determine the general structure and dynamics of food webs and other ecological networks, across multiple scales of organisation</span><sup data-dcnode-id="4125"><a aria-label="Reference 31" data-dcnode-id="4129" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d38177337e6466" title=""><span data-dcnode-id="4130" instrument_node="">31</span></a><span data-dcnode-id="4128" instrument_node="">, </span><a aria-label="Reference 35" data-dcnode-id="4126" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d38177337e6469" title=""><span data-dcnode-id="4127" instrument_node="">35</span></a></sup><span data-dcnode-id="4124" instrument_node="">. Here we characterise the five groups of plankton by their size and abundance in seawater, using values from the literature (</span><a data-dcnode-id="4122" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4123" instrument_node="">Table 2</span></a><span data-dcnode-id="4121" instrument_node="">). The range of these characteristics are summarised for each plankton group using coloured areas on the horizontal plane of </span><a data-dcnode-id="4119" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4120" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4118" instrument_node="">. As already described for a wide range of organisms</span><sup data-dcnode-id="4115"><a aria-label="Reference 36" data-dcnode-id="4116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d38177337e6479" title=""><span data-dcnode-id="4117" instrument_node="">36</span></a></sup><span data-dcnode-id="4114" instrument_node="">, the literature shows an inverse relationship between plankton size and abundance in the natural environment, so that small viruses (10</span><sup data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">−2</span></sup><span data-dcnode-id="4111" instrument_node="">–10</span><sup data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">0</span></sup><span data-dcnode-id="4108" instrument_node=""> μm) generally form the most abundant group (10</span><sup data-dcnode-id="4106"><span data-dcnode-id="4107" instrument_node="">7</span></sup><span data-dcnode-id="4105" instrument_node="">–10</span><sup data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">11</span></sup><span data-dcnode-id="4102" instrument_node=""> ind. L</span><sup data-dcnode-id="4100"><span data-dcnode-id="4101" instrument_node="">−1</span></sup><span data-dcnode-id="4099" instrument_node="">), whereas the larger metazoans (10</span><sup data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">1</span></sup><span data-dcnode-id="4096" instrument_node="">–10</span><sup data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">5</span></sup><span data-dcnode-id="4093" instrument_node=""> μm) are generally the least abundant group (10</span><sup data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">−4</span></sup><span data-dcnode-id="4090" instrument_node="">–10</span><sup data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">3</span></sup><span data-dcnode-id="4087" instrument_node=""> ind. L</span><sup data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">−1</span></sup><span data-dcnode-id="4084" instrument_node="">).</span></p><p data-dcnode-id="4066"><span data-dcnode-id="4082" instrument_node="">Species richness and evenness are used to estimate species diversity, and should therefore be considered when designing sampling strategies and methodologies for biodiversity studies. Here we characterise the five groups of plankton by their species richness in seawater, using values from the literature (</span><a data-dcnode-id="4080" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4081" instrument_node="">Table 2</span></a><span data-dcnode-id="4079" instrument_node="">, refs. </span><a aria-label="Reference 37" data-dcnode-id="4077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d38177337e6510" title=""><span data-dcnode-id="4078" instrument_node="">37</span></a><span data-dcnode-id="4076" instrument_node="">–</span><a aria-label="Reference 68" data-dcnode-id="4074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d38177337e6513" title=""><span data-dcnode-id="4075" instrument_node="">68</span></a><span data-dcnode-id="4073" instrument_node="">). From these values we made “back of the envelope” calculations of the volume of seawater required to capture 100, 75 and 50% of species within each group of plankton (</span><a data-dcnode-id="4071" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4072" instrument_node="">Fig. 5</span></a><span data-dcnode-id="4070" instrument_node="">; coloured areas on the vertical plane). The effectiveness of our sampling strategy can be assessed by comparing these coloured areas with the sampling volume of the various sampling devices used during the </span><i data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">Tara</span></i><span data-dcnode-id="4067" instrument_node=""> Oceans Expedition (horizontal full lines on the vertical plane).</span></p><p data-dcnode-id="4061"><span data-dcnode-id="4065" instrument_node="">Based on this assessment, it appears that our sampling strategy would capture &lt;50% of total richness for viruses and small size protists (0.8–5 μm). Accordingly, one would need to filter thousands of litres of seawater in order to capture 75% of total richness for these groups. This is both impractical for most field campaigns and dependent on how one defines the currency of richness for these groups, i.e., the concept of species. In all other groups and size fractions, our sampling strategy appears to capture &gt;75% of species richness, and 100% in the case of large size protists and metazoans. It is important to note that data about plankton richness is very scarce in the literature, so that this assessment is only a first approximation. </span><i data-dcnode-id="4063"><span data-dcnode-id="4064" instrument_node="">Tara</span></i><span data-dcnode-id="4062" instrument_node=""> Oceans data will undoubtedly contribute to fill this knowledge gap and improve the sampling design of future ocean biodiversity surveys.</span></p></div></div></section><section data-dcnode-id="4026" data-title="Usage Notes"><div class="c-article-section" data-dcnode-id="4027" id="Sec17-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4056" id="Sec17"><span data-dcnode-id="4057" instrument_node="">Usage Notes</span></h2><div class="c-article-section__content" data-dcnode-id="4028" id="Sec17-content"><p data-dcnode-id="4029"><span data-dcnode-id="4055" instrument_node="">The </span><i data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Tara</span></i><span data-dcnode-id="4052" instrument_node=""> Oceans data policy follows the open science principle of open access and early release of raw and validated data sets. All data presented here (</span><a aria-label="Reference Data Citations 6" data-dcnode-id="4050" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38177337e6539" title=""><span data-dcnode-id="4051" instrument_node="">Data Citations 6</span></a><span data-dcnode-id="4049" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="4047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38177337e6542" title=""><span data-dcnode-id="4048" instrument_node="">7</span></a><span data-dcnode-id="4046" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="4044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38177337e6545" title=""><span data-dcnode-id="4045" instrument_node="">8</span></a><span data-dcnode-id="4043" instrument_node="">) are published under the Creative Commons Attribution 3.0 Unported (CC-by 3.0) and must therefore be cited when used in scientific papers, posters or presentations. As with most scholarly publications, data citations have authors, a title, a year of publication and a digital object identifier (see data citations in the Reference Section). Furthermore, we kindly ask to include the </span><b data-dcnode-id="4040"><i data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Tara</span></i></b><span data-dcnode-id="4039" instrument_node=""> </span><b data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Oceans Consortium</span></b><span data-dcnode-id="4036" instrument_node=""> in the acknowledgements. When referring to the </span><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Tara</span></i><span data-dcnode-id="4033" instrument_node=""> Oceans Data or to the sampling strategy and methodology of the </span><i data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Tara</span></i><span data-dcnode-id="4030" ins
