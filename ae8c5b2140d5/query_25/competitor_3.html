rticles/s41598-019-47941-8/figures/2" rel="nofollow"><span data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3204" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3205" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3206" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3209" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3208" fill-rule="evenodd"></path><span data-dcnode-id="3207" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3198" id="Sec4"><span data-dcnode-id="3199" instrument_node="">The Third-Order Nonlinear Optical Responses of the Samples</span></h3><p data-dcnode-id="3190"><span data-dcnode-id="3197" instrument_node="">The Z-scan method was used for the determination of the magnitude of the nonlinear optical parameters of Cu NPs and CuO NEs using the 60 fs fundamental (λ = 800 nm) pulses, and its second harmonic generation (λ = 400 nm) from Ti:S laser. Figure&nbsp;</span><a data-dcnode-id="3195" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3196" instrument_node="">3</span></a><span data-dcnode-id="3194" instrument_node=""> shows the Z-scans of CuO NEs suspension and the optical limiting (OL) in this suspension using the 800 nm, 60 fs probe pulses. In case of CuO NEs suspension the positive nonlinear refractive properties were observed in the field of femtosecond pulses with 1 kHz repetition rate. (Fig.&nbsp;</span><a data-dcnode-id="3192" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3193" instrument_node="">3(a)</span></a><span data-dcnode-id="3191" instrument_node="">, filled squares).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3160" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="3161"><figcaption data-dcnode-id="3187"><b class="c-article-section__figure-caption" data-dcnode-id="3188" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3189" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3172"><div class="c-article-section__figure-item" data-dcnode-id="3182"><a class="c-article-section__figure-link" data-dcnode-id="3183" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/3" rel="nofollow"><picture data-dcnode-id="3184"><source data-dcnode-id="3186" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-019-47941-8/MediaObjects/41598_2019_47941_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3185" height="255" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-019-47941-8/MediaObjects/41598_2019_47941_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3173" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3174"><span data-dcnode-id="3181" instrument_node="">(</span><b data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">a</span></b><span data-dcnode-id="3178" instrument_node="">) Z-scans using open-aperture (OA) and closed-aperture (CA) schemes. The Cu NEs were synthesized using ablation by the 800 nm, 200 ps pulses. </span><b data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">(b)</span></b><span data-dcnode-id="3175" instrument_node=""> Optical limiting curve of self-aggregated CuO NEs suspension with the same linear transmittance of 80% at 800 nm.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3162"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3163" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/3" rel="nofollow"><span data-dcnode-id="3170"><span data-dcnode-id="3171" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3164" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3165" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3166" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3169" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3168" fill-rule="evenodd"></path><span data-dcnode-id="3167" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3122"><span data-dcnode-id="3159" instrument_node="">The magnitudes of the nonlinear optical parameters of the CuO NEs at λ = 800 nm were determined to be </span><i data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">γ</span></i><span data-dcnode-id="3156" instrument_node=""> = 1.2 × 10</span><sup data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">−15</span></sup><span data-dcnode-id="3153" instrument_node=""> cm</span><sup data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">2</span></sup><span data-dcnode-id="3150" instrument_node=""> W</span><sup data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">−1</span></sup><span data-dcnode-id="3147" instrument_node="">, and </span><i data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">β</span></i><span data-dcnode-id="3144" instrument_node=""> = 1.0 × 10</span><sup data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">−10</span></sup><span data-dcnode-id="3141" instrument_node=""> cm W</span><sup data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">−1</span></sup><span data-dcnode-id="3138" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="3136" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3137" instrument_node="">3(a)</span></a><span data-dcnode-id="3135" instrument_node="">). Open aperture (OA) Z-scan allowed analyzing the optical limiting properties of CuO NEs suspension at the wavelength of 800 nm, 60 fs pulses. The suspension was contained in 1-mm thick quartz cuvette. A linear transmittance of CuO NEs suspension was equal to 80%. Figure&nbsp;</span><a data-dcnode-id="3133" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3134" instrument_node="">4(b)</span></a><span data-dcnode-id="3132" instrument_node=""> shows OL in CuO NEs suspension that was attributed to the two-photon absorption (2PA) measured by using the Z-scans (Fig.&nbsp;</span><a data-dcnode-id="3130" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3131" instrument_node="">3(a)</span></a><span data-dcnode-id="3129" instrument_node="">, empty circles). The linear part of this dependence between output energy and input energy of 800 nm, 60 fs pulses in the OL curve was observed up to the energies of ~ 0.6 </span><i data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">μ</span></i><span data-dcnode-id="3126" instrument_node="">J (Fig.&nbsp;</span><a data-dcnode-id="3124" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3125" instrument_node="">3(b)</span></a><span data-dcnode-id="3123" instrument_node="">). The deviation from linearity of this curve occurs with further growth of the input pulse energy from 0.6 to 1.6 μJ. The pure water was also studied in this energy range of propagated laser pulses and did not show the OL properties. The slope of linear fitting for pure deionized water at different input pulse energies was equal to 1.0, while the slope of linear fitting of CuO NEs at small energies was equal to 0.8. Further decrease of output energy was attributed to OL due to 2PA. We did not observe the OL in the Cu NPs using 800 nm, 60 fs probe pulses at the same range of pulse energies as in case of CuO NEs.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3092" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="3093"><figcaption data-dcnode-id="3119"><b class="c-article-section__figure-caption" data-dcnode-id="3120" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3121" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3104"><div class="c-article-section__figure-item" data-dcnode-id="3114"><a class="c-article-section__figure-link" data-dcnode-id="3115" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/4" rel="nofollow"><picture data-dcnode-id="3116"><source data-dcnode-id="3118" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-019-47941-8/MediaObjects/41598_2019_47941_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3117" height="261" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-019-47941-8/MediaObjects/41598_2019_47941_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3105" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3106"><span data-dcnode-id="3113" instrument_node="">Z-scans of copper NPs and copper oxide NEs suspensions (wavelength 400 nm, pulse duration 60 fs): (</span><b data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">a</span></b><span data-dcnode-id="3110" instrument_node="">) CA, and (</span><b data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">b</span></b><span data-dcnode-id="3107" instrument_node="">) OA Z-scans.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3094"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3095" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/4" rel="nofollow"><span data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3096" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3097" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3098" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3101" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3100" fill-rule="evenodd"></path><span data-dcnode-id="3099" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3073"><span data-dcnode-id="3091" instrument_node="">The comparative analysis of the nonlinear optical response of Cu NPs and CuO NEs suspensions was performed using the 400 nm radiation. Figure&nbsp;</span><a data-dcnode-id="3089" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3090" instrument_node="">4</span></a><span data-dcnode-id="3088" instrument_node=""> shows the CA and OA Z-scan dependences of these suspensions. The nonlinear optical parameters of samples, measured using 400 nm, 60 fs probe pulses, are presented in Table&nbsp;</span><a data-dcnode-id="3086" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="3087" instrument_node="">1</span></a><span data-dcnode-id="3085" instrument_node="">. The four-fold increase of nonlinear refractive index in these two suspensions can be associated with the decrease of the band gap of CuO NEs. Detailed explanation of this behavior was given by Sheik-Bahae </span><i data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">et al</span></i><span data-dcnode-id="3082" instrument_node="">.</span><sup data-dcnode-id="3079"><a aria-label="Reference 21" data-dcnode-id="3080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d307961903e885" title="Sheik-Bahae, M., Hutchings, D. C., Hagan, D. J. &amp; Van Stryland, E. W. Dispersion of bound electronic nonlinear refraction in solids. IEEE J. Quantum Elect. 27, 1296–1309 (1991)."><span data-dcnode-id="3081" instrument_node="">21</span></a></sup><span data-dcnode-id="3078" instrument_node="">. The band gap and refractive index are related with each other as follows</span><sup data-dcnode-id="3075"><a aria-label="Reference 22" data-dcnode-id="3076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d307961903e889" title="Ravindra, N. M., Ganapathy, P. &amp; Choi, J. Energy gap–refractive index relations in semiconductors – An overview. Infra. Phys.&amp; Techn. 50, 21–29 (2007)."><span data-dcnode-id="3077" instrument_node="">22</span></a></sup><span data-dcnode-id="3074" instrument_node="">:</span></p><div class="c-article-equation" data-dcnode-id="3064" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="3067"><span class="mathjax-tex" data-dcnode-id="3068"><span class="MathJax_Preview" data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">{n}^{4}{E}_{g}=95\,eV</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3065"><span data-dcnode-id="3066" instrument_node="">
                    (2)
                </span></div></div><div class="c-article-table" data-container-section="table" data-dcnode-id="3049" data-test="inline-table" id="table-1"><figure data-dcnode-id="3050"><figcaption class="c-article-table__figcaption" data-dcnode-id="3061"><b data-dcnode-id="3062" data-test="table-caption" id="Tab1"><span data-dcnode-id="3063" instrument_node="">Table 1 Nonlinear optical characteristics of the Cu nanoparticles and CuO nanoellipsoids.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3051"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3052" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/tables/1" rel="nofollow"><span data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3053" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3054" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3055" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3058" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3057" fill-rule="evenodd"></path><span data-dcnode-id="3056" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3017"><span data-dcnode-id="3048" instrument_node="">According to this relation, the refractive index of a semiconductor can be determined by knowledge the energy band gap (</span><i data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">E</span></i><sub data-dcnode-id="3043"><i data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">g</span></i></sub><span data-dcnode-id="3042" instrument_node="">). This relation is based on the general assumption that all energy levels in a solid are scaled down by a factor of 1/</span><span class="mathjax-tex" data-dcnode-id="3037"><span class="MathJax_Preview" data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">{\varepsilon }_{eff}^{2}</span></span></span><span data-dcnode-id="3036" instrument_node="">, where </span><i data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">ε</span></i><sub data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">eff</span></sub><span data-dcnode-id="3031" instrument_node=""> is the effective dielectric constant of the samples. The relation between the 2PA coefficient and band gap was analyzed by Van Stryland </span><i data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">et al</span></i><span data-dcnode-id="3028" instrument_node="">.</span><sup data-dcnode-id="3025"><a aria-label="Reference 23" data-dcnode-id="3026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d307961903e1237" title="Van Stryland, E. W., Woodall, M. A., Vanherzeele, H. &amp; Soileau, M. J. Energy band-gap dependence of two-photon absorption. Opt. Lett. 10, 490–492 (1985)."><span data-dcnode-id="3027" instrument_node="">23</span></a></sup><span data-dcnode-id="3024" instrument_node="">. It was shown that the 2PA varies as </span><span class="mathjax-tex" data-dcnode-id="3019"><span class="MathJax_Preview" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">{E}_{g}^{-3}</span></span></span><span data-dcnode-id="3018" instrument_node="">. This dependence can be represented by the following equation:</span></p><div class="c-article-equation" data-dcnode-id="3008" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="3011"><span class="mathjax-tex" data-dcnode-id="3012"><span class="MathJax_Preview" data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">{\beta }_{2PA}=K\sqrt{{E}_{p}}F(2h\nu /{E}_{g})/{n}^{3}{E}_{g}^{3}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="2962"><span data-dcnode-id="3007" instrument_node="">where </span><i data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">K</span></i><span data-dcnode-id="3004" instrument_node=""> is a material-independent constant, </span><i data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">n</span></i><span data-dcnode-id="3001" instrument_node=""> is the linear refractive index, and </span><span class="mathjax-tex" data-dcnode-id="2996"><span class="MathJax_Preview" data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">{E}_{p}=8{P}^{2}m/{h}^{2}</span></span></span><span data-dcnode-id="2995" instrument_node=""> (where </span><i data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">P</span></i><span data-dcnode-id="2992" instrument_node=""> is the Kane momentum parameter and </span><i data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">m</span></i><span data-dcnode-id="2989" instrument_node=""> is the electron mass) is nearly material independent for a wide variety of semiconductors. This equation permits a prediction of 2PA coefficients of materials at different wavelengths. The function </span><i data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">F</span></i><span data-dcnode-id="2986" instrument_node="">, whose exact form depends on the assumed band structure, is a function only of the ratio of the photon energy </span><i data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">hv</span></i><span data-dcnode-id="2983" instrument_node=""> to </span><i data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">E</span></i><sub data-dcnode-id="2978"><i data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">g</span></i></sub><span data-dcnode-id="2977" instrument_node="">, which determines the states that are optically coupled. In our case we demonstrated the variation of 2PA coefficient due to different band gap energies of Cu NPs and CuO NEs. The values of </span><i data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">β</span></i><span data-dcnode-id="2974" instrument_node="">, </span><i data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">γ</span></i><span data-dcnode-id="2971" instrument_node="">, and </span><i data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">χ</span></i><sup data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">(3)</span></sup><span data-dcnode-id="2966" instrument_node=""> calculated from the experimental data are presented in Table&nbsp;</span><a data-dcnode-id="2964" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2965" instrument_node="">1</span></a><span data-dcnode-id="2963" instrument_node="">.</span></p><p data-dcnode-id="2944"><span data-dcnode-id="2961" instrument_node="">The large third-order optical nonlinearities of spherical nanoparticles of the Cu</span><sub data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">2−x</span></sub><span data-dcnode-id="2958" instrument_node="">S for strong localized surface plasmon resonances (LSPR) absorption bands in the near infrared region were investigated by Hamanaka </span><i data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">et al</span></i><span data-dcnode-id="2955" instrument_node="">.</span><sup data-dcnode-id="2952"><a aria-label="Reference 24" data-dcnode-id="2953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d307961903e1505" title="Hamanaka, Y., Hirose, T., Tamada, K. &amp; Kuzuya, T. Plasmonic enhancement of third-order nonlinear optical susceptibilities in self-doped Cu2−xS nanoparticles. Opt. Mat. Express 6, 3838–3848 (2016)."><span data-dcnode-id="2954" instrument_node="">24</span></a></sup><span data-dcnode-id="2951" instrument_node="">. The resonantly enhanced nonlinear susceptibility was observed in the vicinity of the LSPR peak, similar to the case of noble metal nanoparticles. The aim of our work was to shown the variation of the third-order optical nonlinearities depending on the band gaps of Cu NPs and CuO NEs. We compared the third-order nonlinear optical parameters of our samples with Cu</span><sub data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">2−x</span></sub><span data-dcnode-id="2948" instrument_node="">S nanoparticles and showed the enhancement of the third-order nonlinearity of these nanostructures due to the influence of LSPR. In our case of 400 nm, 60 fs probe pulses the large nonlinear susceptibilities of CuO NEs were obtained (see Table&nbsp;</span><a data-dcnode-id="2946" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2947" instrument_node="">1</span></a><span data-dcnode-id="2945" instrument_node="">). We also compared the nonlinear optical parameters of CuO NEs and Cu NPs at the same conditions. Our aim was to show the advantages of CuO NEs compared with Cu NPs at the same wavelength of exciting laser radiation.</span></p><p data-dcnode-id="2938"><span data-dcnode-id="2943" instrument_node="">We carried out the pump-probe measurements to study the temporal response of the CuO NEs using 400 nm, 60 fs pulses. During these studies we did not observe the temporal response of the transient absorption profile of CuO NEs. Earlier, the transient absorption spectroscopy using an above-bandgap pump beam and below-bandgap probe beam to analyze the relaxation and recombination dynamics of the CuO nanocrystals at various pump fluencies was reported in ref.</span><sup data-dcnode-id="2940"><a aria-label="Reference 25" data-dcnode-id="2941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d307961903e1517" title="Born, B. et al. Ultrafast charge-carrier dynamics of copper oxide nanocrystals. ACS Photon. 3, 2475–2481 (2016)."><span data-dcnode-id="2942" instrument_node="">25</span></a></sup><span data-dcnode-id="2939" instrument_node="">. They used the pulses of 1550 nm (1.6 eV) radiation as the probe beam and 780 nm (0.8 eV) radiation as the pump beam. In the meantime, the band gap of 50 nm CuO NPs was 1.5 eV. The three time constants were reported in those studies. The first time constant varied with pump fluence from 330 fs to 630 fs, and was attributed to momentum relaxation via carrier-carrier scattering in the valence band as well as exciton-exciton annihilation. The second time constant was unchanged at 2 ps and was attributed to the energy relaxation via carrier-phonon scattering within the valence band.</span></p><p data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">In our case, the probe and pump beam were higher than band gap of CuO NEs. We also used as a probe beam the 800 nm, 60 fs pulses and second harmonic generation of Ti:S laser at the 400 nm, 60 fs as a pump beam, however, did not observed the temporal variations of the nonlinear optical response of NEs.</span></p><p data-dcnode-id="2927"><span data-dcnode-id="2935" instrument_node="">The third-order nonlinear response analyzed in refs</span><sup data-dcnode-id="2929"><a aria-label="Reference 26" data-dcnode-id="2933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d307961903e1527" title="Shahmiri, M. et al. Third-order nonlinear optical properties of chemically synthesized copper oxide nanosheets. Phys. E 54, 109–114 (2013)."><span data-dcnode-id="2934" instrument_node="">26</span></a><span data-dcnode-id="2932" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="2930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d307961903e1530" title="Chen, A. et al. Optical limiting properties in copper oxide thin films under a high-repetition-rate femtosecond laser. Mater. Lett. 91, 319–322 (2013)."><span data-dcnode-id="2931" instrument_node="">27</span></a></sup><span data-dcnode-id="2928" instrument_node=""> is based on the thermal effect. High repetition rate of probing pulses led to the accumulative thermal effects, which resulted in the formation of the thermal lens. In our case, we observed the nonlinear refraction based on the Kerr nonlinearities depending on the band gaps of Cu NPs and CuO NEs. We demonstrated the advantages of CuO NEs compared with Cu NPs.</span></p><p data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">The main difference between the CuO NEs and CuO NPs is that CuO NEs have a 3D ellipsoidal shape, while CuO NP-contained nanosheets have a 2D sheet shape. 3D nanomaterials have the tunable properties, while 2D nanomaterials possess the exceptional inherent properties. During our study, we observed the variation of the properties of self-aggregated CuO NEs originated from Cu NPs. In the meantime the 3D shape of CuO NEs can play important role during the studies of the high-order nonlinearities of these species. We analyzed HHG in the plasmas containing CuO NEs.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2923" id="Sec5"><span data-dcnode-id="2924" instrument_node="">The High-Order Nonlinear Response of CuO NEs via HHG</span></h3><p data-dcnode-id="2918"><span data-dcnode-id="2922" instrument_node="">The highest order nonlinear optical properties of CuO NEs were analyzed using high-order harmonic generation of 800 nm, 60 fs laser pulses. The plasma plumes containing CuO NEs were created using 800 nm 200 ps heating pulses at vacuum conditions. The same fluence of heating ablation pulses, which was applied during formation of CuO NEs and nanoparticles, was used for creation of laser-produced plasma plumes. In Fig.&nbsp;</span><a data-dcnode-id="2920" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2921" instrument_node="">5</span></a><span data-dcnode-id="2919" instrument_node="">, the spectra of high-order harmonic generation (HHG) are presented.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2894" data-test="figure" data-title="Figure 5" id="figure-5"><figure data-dcnode-id="2895"><figcaption data-dcnode-id="2915"><b class="c-article-section__figure-caption" data-dcnode-id="2916" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="2917" instrument_node="">Figure 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2906"><div class="c-article-section__figure-item" data-dcnode-id="2910"><a class="c-article-section__figure-link" data-dcnode-id="2911" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/5" rel="nofollow"><picture data-dcnode-id="2912"><source data-dcnode-id="2914" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-019-47941-8/MediaObjects/41598_2019_47941_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="2913" height="506" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-019-47941-8/MediaObjects/41598_2019_47941_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2907" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">Spectra of harmonics obtained using single-color (solid blue line) and two-color (dashed red line) pumps of CuO NEs containing plasma. Odd and even harmonics were generated in the CuO containing plasma plumes using 800 nm and 400 nm, 60 fs pulses as the driving pulses. Plasma plumes were produced on the surfaces of bulk Cu target using 800 nm, 200 ps heating pulses. Correspondingly, the highest order harmonic with cutoff energy (51 eV) and (35 eV) in the cases of single–color pump and two-color pump schemes were obtained.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2896"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="2897" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/5" rel="nofollow"><span data-dcnode-id="2904"><span data-dcnode-id="2905" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2898" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2899" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2900" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2903" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2902" fill-rule="evenodd"></path><span data-dcnode-id="2901" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2875"><span data-dcnode-id="2893" instrument_node="">The analysis of harmonic spectra generated in CuO plasma plumes allows concluding about the attractive properties of CuO NPs as the emitters of coherent extreme ultraviolet radiation. We compared our results with early studies of HHG in copper plasma</span><sup data-dcnode-id="2890"><a aria-label="Reference 15" data-dcnode-id="2891" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d307961903e1568" title="Wöstmann, M. et al. High-order harmonic generation in plasmas from nanoparticle and mixed metal targets at 1-kHz repetition rate. Appl. Phys. B 120, 17–24 (2015)."><span data-dcnode-id="2892" instrument_node="">15</span></a></sup><span data-dcnode-id="2889" instrument_node="">. The plasma contained singly-charged ions and atoms of Cu during ablation using pulses of different duration. Harmonic generation up to the 17</span><sup data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">th</span></sup><span data-dcnode-id="2886" instrument_node=""> order was reported in those studies. Meanwhile, in our case, when the plasma contained CuO nanostructures, the harmonics up to the 31</span><sup data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">st</span></sup><span data-dcnode-id="2883" instrument_node=""> order were observed, which was attributed to the influence of small-sized quantum dots with larger recombination cross-section</span><sup data-dcnode-id="2877"><a aria-label="Reference 28" data-dcnode-id="2881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d307961903e1576" title="Ganeev, R. A. et al. and Guo, Ch. Effective high-order harmonic generation from metal sulfide quantum dots. Opt. Express 26, 5013–35025 (2018)."><span data-dcnode-id="2882" instrument_node="">28</span></a><span data-dcnode-id="2880" instrument_node="">,</span><a aria-label="Reference 29" data-dcnode-id="2878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d307961903e1579" title="Lahon, S. &amp; Mohan, M. High harmonic generation in quantum dots in short pulse. J. At. Mol. Conden. &amp; Nano. Phys. 3, 151–158 (2016)."><span data-dcnode-id="2879" instrument_node="">29</span></a></sup><span data-dcnode-id="2876" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="2853" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="2854" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2870" id="Sec6"><span data-dcnode-id="2871" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="2855" id="Sec6-content"><p data-dcnode-id="2856"><span data-dcnode-id="2869" instrument_node="">In summary, the Cu NPs and CuO NEs were synthesized during laser ablation process of bulk copper target in deionized water using 800 nm, 200 ps pulses. The self-aggregation of Cu NPs to the CuO NEs led to the change of the band gaps of these nanostructures. Our nonlinear optical studies of these suspensions have shown that the nonlinear refractive properties of CuO NEs depend on the band gap. We observed the increase of the nonlinear refractive index by decreasing the band gap of CuO nanostructures. The nonlinear refractive index and nonlinear absorption coefficient of suspensions at the wavelength of 800 nm, 60 fs probe pulses were 1.23 × 10</span><sup data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">−15</span></sup><span data-dcnode-id="2866" instrument_node=""> W cm</span><sup data-dcnode-id="2864"><span data-dcnode-id="2865" instrument_node="">−1</span></sup><span data-dcnode-id="2863" instrument_node=""> and 1.0 × 10</span><sup data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">−11</span></sup><span data-dcnode-id="2860" instrument_node=""> W cm</span><sup data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">−1</span></sup><span data-dcnode-id="2857" instrument_node="">. We also analyzed the high-order nonlinear response of CuO NEs through high-order harmonic generation of 800 nm, 60 fs pulses in the plasma containing ablated CuO NEs from thin films. We demonstrated the high harmonic up to 35th order (E = 50 eV) in the case of single-color pump and 24th order (30 eV) in case of two-color pump.</span></p></div></div></section><section data-dcnode-id="2624" data-title="Methods"><div class="c-article-section" data-dcnode-id="2625" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2851" id="Sec7"><span data-dcnode-id="2852" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="2626" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="2849" id="Sec8"><span data-dcnode-id="2850" instrument_node="">Synthesis of CuO NEs from Cu NPs in the water</span></h3><p data-dcnode-id="2841"><span data-dcnode-id="2848" instrument_node="">The CuO NEs was synthesized from ablated Cu target in water using picosecond pulses (Spitfire Ace, Spectra Physics). The output characteristics of the uncompressed pulses of this laser system were as follows: wavelength λ = 800 nm, pulse duration t = 200 ps, 1 kHz pulse repetition rate. The bulk Cu target with sizes 10 × 10 × 2 mm</span><sup data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">2</span></sup><span data-dcnode-id="2845" instrument_node=""> was immersed in a 20 mm thick quartz cell filled with deionized water. The focusing lens with 100 mm focal length was used for focusing laser radiation on the surface of bulk copper target [Fig.&nbsp;</span><a data-dcnode-id="2843" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="2844" instrument_node="">6(a)</span></a><span data-dcnode-id="2842" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2811" data-test="figure" data-title="Figure 6" id="figure-6"><figure data-dcnode-id="2812"><figcaption data-dcnode-id="2838"><b class="c-article-section__figure-caption" data-dcnode-id="2839" data-test="figure-caption-text" id="Fig6"><span data-dcnode-id="2840" instrument_node="">Figure 6</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2823"><div class="c-article-section__figure-item" data-dcnode-id="2833"><a class="c-article-section__figure-link" data-dcnode-id="2834" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/6" rel="nofollow"><picture data-dcnode-id="2835"><source data-dcnode-id="2837" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-019-47941-8/MediaObjects/41598_2019_47941_Fig6_HTML.png?as=webp" type="image/webp"><img alt="figure 6" aria-describedby="Fig6" data-dcnode-id="2836" height="272" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-019-47941-8/MediaObjects/41598_2019_47941_Fig6_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2824" data-test="bottom-caption" id="figure-6-desc"><p data-dcnode-id="2825"><span data-dcnode-id="2832" instrument_node="">(</span><b data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">a</span></b><span data-dcnode-id="2829" instrument_node="">) Laser ablation of copper target in liquids: HB, heating beam; M, mirror; FL, focusing lens. </span><b data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">(b)</span></b><span data-dcnode-id="2826" instrument_node=""> Z-scan scheme: PB, probe beam, FL, focusing lens; S, sample; BS, beam splitter, PD1 and PD2, photodiodes; A, aperture.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2813"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="2814" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/6" rel="nofollow"><span data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2815" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2816" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2817" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2820" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2819" fill-rule="evenodd"></path><span data-dcnode-id="2818" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2803"><span data-dcnode-id="2810" instrument_node="">The radiation fluence on the surface of ablated target was measured to be 30 J cm</span><sup data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">−2</span></sup><span data-dcnode-id="2807" instrument_node="">. The Cu was ablated during 30 min. The volume ratio of synthesized Cu NPs in suspension was estimated to be 1 × 10</span><sup data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">−4</span></sup><span data-dcnode-id="2804" instrument_node="">. The target was moved to maintain the efficiency of laser ablation on the fresh surface of Cu target. The suspension was rinsed during ablation to decrease the absorption of laser radiation in front of the surface of copper target. No surfactants were added in the suspension to prevent the aggregation of nanoparticles. Copper nanoparticles were studied using TEM and SEM. The optical absorption of Cu NPs suspension was analyzed by spectrometer (Agilent Technology). The oxidation of ablated suspension occurred during ablation. The stability of CuO NEs was controlled during the nonlinear optical studies of suspension. We also analyzed the morphology of Cu NPs in water a days after laser ablation.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2801" id="Sec9"><span data-dcnode-id="2802" instrument_node="">Z-scan technique</span></h3><p data-dcnode-id="2792"><span data-dcnode-id="2800" instrument_node="">The investigation of the nonlinear optical characteristics of nanoparticle suspension in water was performed at the wavelengths of 800 nm and 400 nm (t = 60 fs) using the Z-scan technique</span><sup data-dcnode-id="2797"><a aria-label="Reference 30" data-dcnode-id="2798" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d307961903e1656" title="Sheik-Bahae, M., Said, A. A., Wei, T. H., Hagan, D. J. &amp; Van Stryland, E. W. Sensitive measurement of optical nonlinearities using a single beam. IEEE J. Quantum Elect. 26, 760–769 (1990)."><span data-dcnode-id="2799" instrument_node="">30</span></a></sup><span data-dcnode-id="2796" instrument_node="">. The suspensions containing Cu NPs and CuO NEs in a 2 mm thick quartz cells was moved along the Z-axis through the focal plane of 400 mm focal length lens using a translation stage controlled by a computer (Fig.&nbsp;</span><a data-dcnode-id="2794" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="2795" instrument_node="">6(b)</span></a><span data-dcnode-id="2793" instrument_node="">).</span></p><p data-dcnode-id="2771"><span data-dcnode-id="2791" instrument_node="">By defining the relative coordinate </span><i data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">x</span></i><span data-dcnode-id="2788" instrument_node=""> = </span><i data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">z/z</span></i><sub data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">0</span></sub><span data-dcnode-id="2783" instrument_node="">, </span><i data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">z</span></i><sub data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">0</span></sub><span data-dcnode-id="2778" instrument_node=""> being the Rayleigh length, the dependence of the normalized transmittance </span><i data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">T(x)</span></i><span data-dcnode-id="2775" instrument_node=""> in the case of closed-aperture (CA) Z-scan can be written as</span><sup data-dcnode-id="2772"><a aria-label="Reference 31" data-dcnode-id="2773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d307961903e1681" title="Liu, X., Guo, S., Wang, H. &amp; Hou, L. Theoretical study on the closed-aperture Z-scan curves in the materials with nonlinear refraction and strong nonlinear absorption. Opt. Commun. 197, 431–437 (2001)."><span data-dcnode-id="2774" instrument_node="">31</span></a></sup></p><div class="c-article-equation" data-dcnode-id="2762" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="2765"><span class="mathjax-tex" data-dcnode-id="2766"><span class="MathJax_Preview" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">T(x)=1-\frac{4x}{({x}^{2}+9)({x}^{2}+1)}{\rm{\Delta }}{\Phi }_{0}+\frac{2({x}^{2}+3)}{({x}^{2}+9)({x}^{2}+1)}{\rm{\Delta }}{\Psi }_{0}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">

                </span></div></div><p data-dcnode-id="2662"><span data-dcnode-id="2761" instrument_node="">Here, </span><i data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">z</span></i><sub data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">0</span></sub><span data-dcnode-id="2756" instrument_node=""> = 0.</span><i data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">5kw</span></i><sub data-dcnode-id="2751"><i data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">o</span></i></sub><sup data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">2</span></sup><span data-dcnode-id="2748" instrument_node="">, </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">ΔΦ</span></i><sub data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">0</span></sub><span data-dcnode-id="2743" instrument_node=""> = </span><i data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">kγL</span></i><sub data-dcnode-id="2738"><i data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">eff</span></i></sub><i data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">I</span></i><sub data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">0</span></sub><span data-dcnode-id="2733" instrument_node="">, Δ</span><i data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Ψ</span></i><span data-dcnode-id="2730" instrument_node="">=</span><i data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">βI</span></i><sub data-dcnode-id="2725"><i data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">0</span></i></sub><i data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">L</span></i><sub data-dcnode-id="2720"><i data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">eff</span></i></sub><span data-dcnode-id="2719" instrument_node="">/2, </span><i data-dcnode-id="2717"><span data- t_node="">L</span></i><span data-dcnode-id="2677" instrument_node="">)]/</span><i data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">α</span></i><sub data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">0</span></sub><span data-dcnode-id="2672" instrument_node=""> is the effective length of nonlinear medium, </span><i data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">L</span></i><span data-dcnode-id="2669" instrument_node=""> is the sample thickness and </span><i data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">α</span></i><span data-dcnode-id="2666" instrument_node=""> is the linear absorption coefficient of suspension. The nonlinear refraction index and nonlinear absorption coefficient were determined by theoretical fitting of experimental data using Eq. (</span><a data-dcnode-id="2664" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="2665" instrument_node="">4</span></a><span data-dcnode-id="2663" instrument_node="">). The error bars for determination of the absolute values of nonlinear absorption and refraction coefficients were estimated to be ± 25% due to uncertainty in the measurements of the beam waist of focused probe beam.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2660" id="Sec10"><span data-dcnode-id="2661" instrument_node="">High-order harmonic generation in laser-produced plasmas</span></h3><p data-dcnode-id="2651"><span data-dcnode-id="2659" instrument_node="">The high-order harmonic generation was performed at the vacuum conditions (Fig.&nbsp;</span><a data-dcnode-id="2657" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="2658" instrument_node="">7</span></a><span data-dcnode-id="2656" instrument_node="">). Here we present our experimental arrangements for HHG in laser-produced plasmas. We used 800 nm, 60 fs laser pulses as the probe pulses, which were converted to the harmonics in the plasmas created on the surface of the thin film containing CuO NEs using 800 nm, 200 ps heating pulses. More details about the experimental setup of HHG in the LPP of thin films were reported in ref.</span><sup data-dcnode-id="2653"><a aria-label="Reference 32" data-dcnode-id="2654" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d307961903e1990" title="Rout, A. et al. Nonlinear optical studies of gold nanoparticle films. Nanomater. 9, 291 (2019)."><span data-dcnode-id="2655" instrument_node="">32</span></a></sup><span data-dcnode-id="2652" instrument_node="">. The thin film target on the surfaces of glass substrate was prepared from CuO suspension using spin-coating machine at the normal conditions. The uncompressed picosecond heating pulses were used for ablation of CuO NEs. The ablated CuO NEs entered the interaction area with probe femtosecond pulses (800 nm, 30 fs, 1 kHz) after 70 ns delay time. The delay time between heating and probe pulses was adjusted using optical delay line. The position of the target was adjusted using the translating stage to achieve the maximal harmonic yield generated in LPP. The extreme ultraviolet spectrometer containing a cylindrical mirror and a 1200 grooves/mm flat field grating with variable line spacing allowed detecting the harmonic up to 71th order. The spectra of harmonics were recorded by a micro-channel plate with phosphor screen, and the harmonics were imaged by a CCD camera.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2627" data-test="figure" data-title="Figure 7" id="figure-7"><figure data-dcnode-id="2628"><figcaption data-dcnode-id="2648"><b class="c-article-section__figure-caption" data-dcnode-id="2649" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="2650" instrument_nod
