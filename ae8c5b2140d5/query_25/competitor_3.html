</span><meta content="Recently, nonspherical nanoparticles took attention due to advanced properties of these structures. We report the study of the nonlinear optical properties of copper oxide nanoellipsoids using 800 nm and 400 nm, 60 fs pulses. The optical limiting effect of copper oxide nanoellipsoids is analyzed. The influence of band gap of copper nanoparticles and copper oxide nanoellipsoids on their nonlinear optical response was studied. For the first time, the low- and high-order nonlinear optical responses of copper nanoellipsoids were studied. The magnitudes of nonlinear optical parameters of the suspension of copper oxide nanoellipsoids were measured to be γ = 1.23 × 10−15 cm2 W−1, and β = 1.0 × 10−11 cm W−1 respectively. We observed the four-fold enhancement of the nonlinear optical refraction of copper oxide nanoellipsoids at the wavelength of 400 nm, 60 fs probe pulses compared to 800 nm radiation. We also analyzed the high-order nonlinear response of CuO nanoellipsoids through generation of high-order harmonics of 800 nm, 60 fs pulses in the plasmas produced during laser ablation of the nanoellipsoid-contained targets. We demonstrated the harmonics up to the 35th order (E = 50 eV) in case of single-color pump and 24th (30 eV) in case of two-color pump." data-dcnode-id="4507" name="dc.description"><span data-dcnode-id="4506" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3507" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3508" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3533" id="Abs1"><span data-dcnode-id="3534" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3509" id="Abs1-content"><p data-dcnode-id="3510"><span data-dcnode-id="3532" instrument_node="">Recently, nonspherical nanoparticles took attention due to advanced properties of these structures. We report the study of the nonlinear optical properties of copper oxide nanoellipsoids using 800 nm and 400 nm, 60 fs pulses. The optical limiting effect of copper oxide nanoellipsoids is analyzed. The influence of band gap of copper nanoparticles and copper oxide nanoellipsoids on their nonlinear optical response was studied. For the first time, the low- and high-order nonlinear optical responses of copper nanoellipsoids were studied. The magnitudes of nonlinear optical parameters of the suspension of copper oxide nanoellipsoids were measured to be </span><i data-dcnode-id="3530"><span data-dcnode-id="3531" instrument_node="">γ</span></i><span data-dcnode-id="3529" instrument_node=""> = 1.23 × 10</span><sup data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">−15</span></sup><span data-dcnode-id="3526" instrument_node=""> cm</span><sup data-dcnode-id="3524"><span data-dcnode-id="3525" instrument_node="">2</span></sup><span data-dcnode-id="3523" instrument_node=""> W</span><sup data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">−1</span></sup><span data-dcnode-id="3520" instrument_node="">, and </span><i data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">β</span></i><span data-dcnode-id="3517" instrument_node=""> = 1.0 × 10</span><sup data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">−11</span></sup><span data-dcnode-id="3514" instrument_node=""> cm W</span><sup data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">−1</span></sup><span data-dcnode-id="3511" instrument_node=""> respectively. We observed the four-fold enhancement of the nonlinear optical refraction of copper oxide nanoellipsoids at the wavelength of 400 nm, 60 fs probe pulses compared to 800 nm radiation. We also analyzed the high-order nonlinear response of CuO nanoellipsoids through generation of high-order harmonics of 800 nm, 60 fs pulses in the plasmas produced during laser ablation of the nanoellipsoid-contained targets. We demonstrated the harmonics up to the 35th order (E = 50 eV) in case of single-color pump and 24th (30 eV) in case of two-color pump.</span></p></div></div></section><span data-dcnode-id="3506" instrument_node="">

</span><section data-dcnode-id="3371" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3372" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3501" id="Sec1"><span data-dcnode-id="3502" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3373" id="Sec1-content"><p data-dcnode-id="3466"><span data-dcnode-id="3500" instrument_node="">The nanostructures of transition metal oxides have attracted significant attention in recent years due to their mechanical, electrical, optical and magnetic properties</span><sup data-dcnode-id="3497"><a aria-label="Reference 1" data-dcnode-id="3498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d307961903e426" title="Zhang, Q. et al. CuO nanostructures: Synthesis, characterization, growth mechanisms, fundamental properties, and applications. Prog. in Mater. Sci. 60, 208–337 (2014)."><span data-dcnode-id="3499" instrument_node="">1</span></a></sup><span data-dcnode-id="3496" instrument_node="">. Analysis of electronic structures in transition metals has shown that appearance of defect states affects the band gap of the nanoparticles</span><sup data-dcnode-id="3493"><a aria-label="Reference 2" data-dcnode-id="3494" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d307961903e430" title="Darugar, Q., Qian, W., El-Sayed, M. A. &amp; Pileni, M. Size-dependent ultrafast electronic energy relaxation and enhanced fluorescence of copper nanoparticles. J. Phys. Chem. B 110, 143–149 (2006)."><span data-dcnode-id="3495" instrument_node="">2</span></a></sup><span data-dcnode-id="3492" instrument_node="">. In most cases the chemical methods were used for synthesis of the uniform nanostructures of transition metal oxides</span><sup data-dcnode-id="3486"><a aria-label="Reference 3" data-dcnode-id="3490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d307961903e434" title="Neupane, M. P. et al. Temperature driven morphological changes of hydrothermally prepared copper oxide nanoparticles. Surf. Interface Anal. 41, 259–263 (2009)."><span data-dcnode-id="3491" instrument_node="">3</span></a><span data-dcnode-id="3489" instrument_node="">,</span><a aria-label="Reference 4" data-dcnode-id="3487" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d307961903e437" title="Sun, S. et al. Facile water-assisted synthesis of cupric oxide nanourchins and their application as nonenzymatic glucose biosensor. ACS Appl. Mater. Inter. 5, 4429–4437 (2013)."><span data-dcnode-id="3488" instrument_node="">4</span></a></sup><span data-dcnode-id="3485" instrument_node="">. Meanwhile, laser ablation is also useful for preparation of nanoparticles from bulk metal or semiconductor targets</span><sup data-dcnode-id="3482"><a aria-label="Reference 5" data-dcnode-id="3483" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d307961903e441" title="Semaltianos, N. G. Nanoparticles by Laser Ablation. Critical reviews in solid state and materials sciences 35, 105–124 (2010)."><span data-dcnode-id="3484" instrument_node="">5</span></a></sup><span data-dcnode-id="3481" instrument_node="">. Particularly, the influence of surrounding liquid media and the ablating conditions resulted in fabrication of Cu nanoparticles (NPs) in acetone and CuO NPs in chloroform was reported by Gondal </span><i data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">et al</span></i><span data-dcnode-id="3478" instrument_node="">.</span><sup data-dcnode-id="3475"><a aria-label="Reference 6" data-dcnode-id="3476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d307961903e449" title="Gondal, M. A., Qahtan, T. F., Dastageer, M. A., Maganda, Y. W. &amp; Anjum, D. H. Synthesis of Cu/Cu2O nanoparticles by laser ablation in deionized water and their annealing transformation into CuO nanoparticles. J. of Nanosci. and Nanotech. 13, 5759–5766 (2013)."><span data-dcnode-id="3477" instrument_node="">6</span></a></sup><span data-dcnode-id="3474" instrument_node="">. The influence of virgin coconut oil to the sizes of Cu NPs was demonstrated by Sadrolhosseini, </span><i data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">et al</span></i><span data-dcnode-id="3471" instrument_node="">.</span><sup data-dcnode-id="3468"><a aria-label="Reference 7" data-dcnode-id="3469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d307961903e456" title="Sadrolhosseini, A. R. et al. Laser ablation synthesis and optical properties of copper nanoparticles. J. Mater. Res. 28, 2629–2636 (2013)."><span data-dcnode-id="3470" instrument_node="">7</span></a></sup><span data-dcnode-id="3467" instrument_node="">. It was shown that the increase of ablation time of copper in suspension of virgin coconut oil led to the decrease of the sizes of NPs.</span></p><p data-dcnode-id="3391"><span data-dcnode-id="3465" instrument_node="">The investigation of the nonlinear optical properties of metal oxides, such as Co</span><sub data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">3</span></sub><span data-dcnode-id="3462" instrument_node="">O</span><sub data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">4</span></sub><span data-dcnode-id="3459" instrument_node="">, V</span><sub data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">2</span></sub><span data-dcnode-id="3456" instrument_node="">O</span><sub data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">5</span></sub><span data-dcnode-id="3453" instrument_node="">, CuO, Fe</span><sub data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">2</span></sub><span data-dcnode-id="3450" instrument_node="">O</span><sub data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">3</span></sub><span data-dcnode-id="3447" instrument_node="">, Mn</span><sub data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">3</span></sub><span data-dcnode-id="3444" instrument_node="">O</span><sub data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">4</span></sub><span data-dcnode-id="3441" instrument_node="">, Cr</span><sub data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">2</span></sub><span data-dcnode-id="3438" instrument_node="">O</span><sub data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">3</span></sub><span data-dcnode-id="3435" instrument_node=""> have shown larger nonlinear responses compared to non-oxidized nanostructures</span><sup data-dcnode-id="3429"><a aria-label="Reference 8" data-dcnode-id="3433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d307961903e484" title="Ando, M., Kadono, K., Haruta, M., Sakaguchi, T. &amp; Miya, M. Large third-order optical nonlinearities in transition-metal oxides. Nat. 374, 625–627 (1995)."><span data-dcnode-id="3434" instrument_node="">8</span></a><span data-dcnode-id="3432" instrument_node="">,</span><a aria-label="Reference 9" data-dcnode-id="3430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d307961903e487" title="Zhu, X. et al. Linear and nonlinear optical properties of Co3O4 nanoparticle-doped polyvinyl-alcohol thin films. Opt. Mat. Express 2, 103–110 (2012)."><span data-dcnode-id="3431" instrument_node="">9</span></a></sup><span data-dcnode-id="3428" instrument_node="">. Among the advantages of the metal oxides are the large optical nonlinearities (10</span><sup data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">−8</span></sup><span data-dcnode-id="3425" instrument_node="">–10</span><sup data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">−7</span></sup><span data-dcnode-id="3422" instrument_node=""> esu), good thermal and chemical stability as well as mechanical strength. In particular, the copper oxide nanostructures have the largest figure of merit based on the ratio of the magnitude of the optical nonlinearity to the linear optical absorption. The nonlinear optical properties of spherical copper nanoparticles doped in indium tin oxide matrix by ion implantation were studied by Ryasnyansky </span><i data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">et al</span></i><span data-dcnode-id="3419" instrument_node="">.</span><sup data-dcnode-id="3416"><a aria-label="Reference 10" data-dcnode-id="3417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d307961903e499" title="Ryasnyansky, A. I., Palpant, B., Debrus, S., Khaibullin, R. I. &amp; Stepanov, A. L. Nonlinear optical properties of copper nanoparticles synthesized in indium tin oxide matrix by ion implantation. J. Opt. Soc. Am. B 23, 1348–1353 (2006)."><span data-dcnode-id="3418" instrument_node="">10</span></a></sup><span data-dcnode-id="3415" instrument_node="">. Third-order susceptibility of copper nanoparticles was estimated by Huang </span><i data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">et al</span></i><span data-dcnode-id="3412" instrument_node="">.</span><sup data-dcnode-id="3409"><a aria-label="Reference 11" data-dcnode-id="3410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d307961903e506" title="Huang, H. H. et al. Synthesis, characterization, and nonlinear optical properties of copper nanoparticles. Langmuir 13, 172–175 (1997)."><span data-dcnode-id="3411" instrument_node="">11</span></a></sup><span data-dcnode-id="3408" instrument_node="">. The </span><i data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">χ</span></i><sup data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">(3)</span></sup><span data-dcnode-id="3403" instrument_node="">/</span><i data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">α</span></i><sub data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">0</span></sub><span data-dcnode-id="3398" instrument_node=""> values for copper colloids were obtained to be of the magnitude of 10</span><sup data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">−12</span></sup><span data-dcnode-id="3395" instrument_node=""> to 10</span><sup data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">−11</span></sup><span data-dcnode-id="3392" instrument_node=""> esu cm. Meanwhile, no comparative analysis of the influence of band gaps on the nonlinear optical properties of CuO nanostructures was reported.</span></p><p data-dcnode-id="3376"><span data-dcnode-id="3390" instrument_node="">The studies of laser-produced plasmas (LPP) created on the surfaces of solid copper target using femtosecond and picosecond laser pulses for generation of low- and high-order harmonics was reported in refs</span><sup data-dcnode-id="3378"><a data-dcnode-id="3388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d307961903e526" title="López-Arias, M. et al. Low-order harmonic generation in metal ablation plasmas in nanosecond and picosecond regimes. J. Appl. Phys. 111, 043111 (2012)."><span data-dcnode-id="3389" instrument_node="">12</span></a><span data-dcnode-id="3387" instrument_node="">,</span><a data-dcnode-id="3385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d307961903e526_1" title="Ganeev, R. A., Boltaev, G. S., Satlikov, N. K. &amp; Usmanov, T. Harmonic generation of picosecond Nd:YAG laser radiation in ablation-produced plasmas. J. Opt. 14, 095202 (2012)."><span data-dcnode-id="3386" instrument_node="">13</span></a><span data-dcnode-id="3384" instrument_node="">,</span><a data-dcnode-id="3382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d307961903e526_2" title="Ganeev, R. A. et al. Resonant and non-resonant high-order harmonic generation in plasmas produced by 1 kHz picosecond and femtosecond pulses. Eur. Phys. J. D 68, 325 (2014)."><span data-dcnode-id="3383" instrument_node="">14</span></a><span data-dcnode-id="3381" instrument_node="">,</span><a aria-label="Reference 15" data-dcnode-id="3379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d307961903e529" title="Wöstmann, M. et al. High-order harmonic generation in plasmas from nanoparticle and mixed metal targets at 1-kHz repetition rate. Appl. Phys. B 120, 17–24 (2015)."><span data-dcnode-id="3380" instrument_node="">15</span></a></sup><span data-dcnode-id="3377" instrument_node="">. Those studies revealed that the harmonic yields from the plasmas produced by picosecond and femtosecond pulses of the same fluence were comparable, despite the significant difference in the intensities of the heating pulses. The component of the plasma can cause constructive or destructive action on the overall nonlinear optical response of a whole ensemble of plasma particles. The decrease of conversion efficiency of high harmonic generation (HHG) generally was caused by some components (e.g. free electrons, quantum dots or aggregated nanoparticles and microparticles) of plasma plumes evaporated during laser ablation using ultrashort laser pulses. This behavior was caused due to the nature of these particles, which reached the interaction area with probe femtosecond pulses. In our studies we took the attention for analysis of the high-order nonlinear response of CuO nanoellipsoids (NEs) via generation of high-order harmonics.</span></p><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">In this paper, we study the synthesis of Cu NPs and self-aggregated CuO NEs produced during laser ablation. We analyze the change of the band gap of oxidized Cu NPs in water. This process leads to formation of CuO NEs with 2.4 eV band gap due to “bottom-up” aggregation of Cu NPs in deionized water. We analyze an influence of the band gaps of Cu NPs and CuO NEs on their nonlinear optical properties. The enhancement of the nonlinear refraction index of suspension and the red-shifted band gap of CuO NEs is observed. We also analyze the high-order nonlinear response of CuO nanostructures via HHG in laser-produced plasmas containing these species.</span></p></div></div></section><section data-dcnode-id="2872" data-title="Results and Discussion"><div class="c-article-section" data-dcnode-id="2873" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3369" id="Sec2"><span data-dcnode-id="3370" instrument_node="">Results and Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2874" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3367" id="Sec3"><span data-dcnode-id="3368" instrument_node="">The Morphology and Linear Optical Responses of the Samples</span></h3><p data-dcnode-id="3358"><span data-dcnode-id="3366" instrument_node="">Prior to carrying the study of third order optical nonlinearities of CuO NEs we provided analysis the morphological and linear absorptive characteristics of Cu NPs and CuO NEs. In the case of Cu NPs the broad surface plasmon resonance (SPR) peaks was observed at 620 nm that was attributed to the presence of spherical nanoparticles (Fig.&nbsp;</span><a data-dcnode-id="3364" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3365" instrument_node="">1(a)</span></a><span data-dcnode-id="3363" instrument_node="">), similarity to the results of ref.</span><sup data-dcnode-id="3360"><a aria-label="Reference 16" data-dcnode-id="3361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d307961903e551" title="Ganeev, R. A., Boltaev, G. S., Tugushev, R. I. &amp; Usmanov, T. Nanoparticle formation during laser ablation of metals at different pressures of surrounding noble gases. Appl. Phys. A 100, 119–123 (2010)."><span data-dcnode-id="3362" instrument_node="">16</span></a></sup><span data-dcnode-id="3359" instrument_node="">. The green color of Cu NPs suspension was attributed to the strong absorption near the infrared range of spectrum. In the case of CuO NEs, the broad surface plasmon resonance (SPR) peak was observed at 300 nm, which is a characteristic of these nanoellipsoids in deionized water. The increase in the band gap of the CuO NEs points out the quantum confinement effect arising due to presence of the small nanoparticles and nanoellipsoids.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3328" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="3329"><figcaption data-dcnode-id="3355"><b class="c-article-section__figure-caption" data-dcnode-id="3356" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3357" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3340"><div class="c-article-section__figure-item" data-dcnode-id="3350"><a class="c-article-section__figure-link" data-dcnode-id="3351" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/1" rel="nofollow"><picture data-dcnode-id="3352"><source data-dcnode-id="3354" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-019-47941-8/MediaObjects/41598_2019_47941_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3353" height="254" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-019-47941-8/MediaObjects/41598_2019_47941_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3341" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3342"><span data-dcnode-id="3349" instrument_node="">(</span><b data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">a</span></b><span data-dcnode-id="3346" instrument_node="">) Absorption spectra of Cu nanoparticles during laser ablation using 200 ps, 800 nm pulses and self-aggregated CuO nanoellipsoids from Cu nanoparticles in the deionized water. (</span><b data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">b)</span></b><span data-dcnode-id="3343" instrument_node=""> The XRD of CuO nanoellipsoids. Inset: SEM of CuO nanoellipsoids.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3330"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3331" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-019-47941-8/figures/1" rel="nofollow"><span data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3332" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3333" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3334" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3337" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3336" fill-rule="evenodd"></path><span data-dcnode-id="3335" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">The volume ratio of small-sized nanostructures is the most important parameter in the quantum confinement effect. The red-shift of plasmonic peaks shows the growth of the sizes of nanostructures. In the meantime, the ratio of surface area to volume for a materials or substances containing nanoparticles has a significant effect on the optical properties of the material. It means that this ratio increases with a decrease of the radius of the spheres. The number of carriers increases with the blue-shift of SPR. The enhancement of third-order nonlinearity can be explained by a high concentration of the carriers on the surfaces of CuO nanoellipsoids.</span></p><p data-dcnode-id="3302"><span data-dcnode-id="3325" instrument_node="">We calculated the band gaps based on the Tauc’s model. The Tauc’s model allows determining the band gap energies of Cu nanoparticles and CuO nanoellipsoids by extrapolation of the absorption spectra measured by spectrophotometer. Though the Tauc’s plot extrapolation has been widely adopted for extracting bandgap energies of semiconductors, there is a lack of theoretical consideration for applying it for the nanocrystals. The optical transitions in CuO NEs have been formulated based on a purely theoretical approach. For α-Fe</span><sub data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">2</span></sub><span data-dcnode-id="3322" instrument_node="">O</span><sub data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">3</span></sub><span data-dcnode-id="3319" instrument_node="">, α-Cu</span><sub data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">2</span></sub><span data-dcnode-id="3316" instrument_node="">V</span><sub data-dcnode-id="3314"><span data-dcnode-id="3315" instrument_node="">2</span></sub><span data-dcnode-id="3313" instrument_node="">O</span><sub data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">7</span></sub><span data-dcnode-id="3310" instrument_node="">, and monoclinic-BiVO</span><sub data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">4</span></sub><span data-dcnode-id="3307" instrument_node=""> phases, the Automated Tauc Analysis methodology has been developed in ref.</span><sup data-dcnode-id="3304"><a aria-label="Reference 17" data-dcnode-id="3305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d307961903e598" title="Suram, S. K., Newhouse, P. F. &amp; Gregoire, J. M. High throughput light absorber discovery, Part 1: An algorithm for automated Tauc analysis. ACS Comb. Sci. 18, 673–681 (2016)."><span data-dcnode-id="3306" instrument_node="">17</span></a></sup><span data-dcnode-id="3303" instrument_node="">. We used this methodology for extrapolation of the absorption spectra of CuO NEs to estimate the band gaps of these materials.</span></p><p data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">The optical band gaps of samples were estimated by fitting the equation</span></p><div class="c-article-equation" data-dcnode-id="3291" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="3294"><span class="mathjax-tex" data-dcnode-id="3295"><span class="MathJax_Preview" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">{\alpha }_{0}h\nu =C{(h\nu -{E}_{g})}^{1/2}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="3280"><span data-dcnode-id="3290" instrument_node="">with the linear absorption spectra (see inset in Fig.&nbsp;</span><a data-dcnode-id="3288" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3289" instrument_node="">1(a)</span></a><span data-dcnode-id="3287" instrument_node="">). Here </span><i data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">h</span></i><span data-dcnode-id="3284" instrument_node="">, </span><i data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">v</span></i><span data-dcnode-id="3281" instrument_node=""> and C are the Planck’s constant, frequency and constant, respectively. The band gaps of Cu NPs and CuO NEs were defined to be 3.5 and 2.4 eV.</span></p><p data-dcnode-id="3271"><span data-dcnode-id="3279" instrument_node="">The presence of CuO NEs was confirmed using the X-ray diffraction spectroscopy (Fig.&nbsp;</span><a data-dcnode-id="3277" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3278" instrument_node="">1(b)</span></a><span data-dcnode-id="3276" instrument_node="">). The atomic ratio of Cu to O was 1:1. The XRD of CuO nanoellipsoids has earlier been analyzed in ref.</span><sup data-dcnode-id="3273"><a aria-label="Reference 18" data-dcnode-id="3274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d307961903e703" title="Zhang, X. et al. Nanoparticle-aggregated CuO nanoellipsoids for high-performance non-enzymatic glucose detection. J. Mater. Chem. A 2, 10073 (2014)."><span data-dcnode-id="3275" instrument_node="">18</span></a></sup><span data-dcnode-id="3272" instrument_node="">, and showed the crystalline structure of these species. In our studies, the diffraction patterns were observed at 2θ = 31.7 (110), 35.49 (−111), 38.68 (111), and 61.45° (−123), which were assigned to the reflection lines from monoclinic CuO NEs. Our results were found to be in agreement with the reported diffraction patterns of CuO NEs from above refereed paper, thus confirming the crystalline structure of our NEs.</span></p><p data-dcnode-id="3254"><span data-dcnode-id="3270" instrument_node="">The inset in Fig.&nbsp;</span><a data-dcnode-id="3268" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3269" instrument_node="">1(b)</span></a><span data-dcnode-id="3267" instrument_node=""> shows the SEM of CuO NEs. The sizes of the orthogonal axes of these NEs were 150 and 200 nm. We analyzed the statistics of the sizes of CuO NEs using SEM and TEM of these nanostructures. The majority of NEs had the sizes, which were equal to </span><i data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">a</span></i><span data-dcnode-id="3264" instrument_node=""> = 200 nm </span><i data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">b</span></i><span data-dcnode-id="3261" instrument_node=""> = 150 nm. The ellipticity of CuO NEs was equal to 0.75. The dispersion of sizes was 40 nm by </span><i data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">a</span></i><span data-dcnode-id="3258" instrument_node=""> axis and 30 nm by </span><i data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">b</span></i><span data-dcnode-id="3255" instrument_node=""> axis. The ellipticity of NEs did not change during the change of the sizes of NEs. The ellipticity of these particles was in the range of 0.7–0.75, which is relatively similar to the ellipsoidal particles.</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3253" instrument_node="">The morphology of CuO nanoellipsoids was studied during three days after laser ablation of Cu target in water. For the first day we observed the small-sized Cu nanoparticles, which caused the variation of the absorption spectra of fresh ablated samples. After three days the morphology of Cu NPs was changed. The synthesized CuO NEs were attached to each other to form the small CuO nanocrystals, which were identified by XRD peaks (Fig.&nbsp;</span><a data-dcnode-id="3251" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3252" instrument_node="">1b</span></a><span data-dcnode-id="3250" instrument_node="">). The most important parameters of nanostructures are their dimensions. In the case of self-aggregated metal oxide nanoparticles their sizes are distributed in a broad range. For example, the dimensional parameters of such self-aggregated CuO nanostructures were analyzed in ref.</span><sup data-dcnode-id="3247"><a aria-label="Reference 19" data-dcnode-id="3248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d307961903e731" title="Xu, X., Yang, H. &amp; Liu, Y. Self-assembled structures of CuO primary crystals synthesized from Cu(CH3COO)2–NaOH aqueous systems. Cryst. Eng. Commun. 14, 5289–5298 (2012)."><span data-dcnode-id="3249" instrument_node="">19</span></a></sup><span data-dcnode-id="3246" instrument_node="">.</span></p><p data-dcnode-id="3230"><span data-dcnode-id="3244" instrument_node="">We also analyzed the TEM of CuO NEs (Fig.&nbsp;</span><a data-dcnode-id="3242" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3243" instrument_node="">2(a)</span></a><span data-dcnode-id="3241" instrument_node="">). The formation of copper nanoellipsoids can be explained by the “bottom-up” approach</span><sup data-dcnode-id="3238"><a aria-label="Reference 20" data-dcnode-id="3239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d307961903e741" title="Zhang, Z. et al. Three-dimensionally oriented aggregation of a few hundred nanoparticles into monocrystalline architectures. Adv. Mater. 17, 42–47 (2005)."><span data-dcnode-id="3240" instrument_node="">20</span></a></sup><span data-dcnode-id="3237" instrument_node="">. The aggregation based on this mechanism results in formation of the single crystalline assemblies of CuO NEs containing a few hundred quantum dots. We observed the small monocrystalline structures, which aggregated during oxidation of Cu NPs in deionized water (Fig.&nbsp;</span><a data-dcnode-id="3235" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3236" instrument_node="">2(b)</span></a><span data-dcnode-id="3234" instrument_node="">). The formation of ellipsoids-like particles was observed (with the width of these particles in the range of 120–180 nm and the length 200–250 nm). The TEM images of these particles revealed the simultaneous presence of some grain-like particles (Fig.&nbsp;</span><a data-dcnode-id="3232" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3233" instrument_node="">2b</span></a><span data-dcnode-id="3231" instrument_node="">), which were undetected in the SEM micrographs. The TEM image of single NE clearly showed the roughness of the surface around the edges thus suggesting that these seeds were formed by the accumulation of other smaller sized particles.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3200" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="3201"><figcaption data-dcnode-id="3227"><b class="c-article-section__figure-caption" data-dcnode-id="3228" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3229" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode
