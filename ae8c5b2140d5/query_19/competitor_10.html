</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">NASA's James Webb Space Telescope is currently poised to launch and become the most powerful telescope in space. But how will its photos compare to Hubble's?</span></p><div class="ad-unit" data-dcnode-id="2138" id="ad-unit-1"></div><p data-dcnode-id="2133"><span data-dcnode-id="2137" instrument_node="">The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15892-hubble-space-telescope.html"><span data-dcnode-id="2136" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="2134" instrument_node=""> launched into low Earth orbit in April 1990. Over the three decades since, the famous observatory has expanded our view of the cosmos and held our attention with the stunning images it collects. What once was a faint and mysterious abyss became a detailed and colorful universe, and we could see stars and galaxies as they'd never been seen before.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2132" data-feat-ref="hawk-id-0" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="4104006063235094000" data-widget-type="seasonal"></aside><p data-dcnode-id="2121"><span data-dcnode-id="2131" instrument_node="">But the </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/21925-james-webb-space-telescope-jwst.html"><u data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">James Webb Space Telescope</span></u><span data-dcnode-id="2128" instrument_node="">,</span></a><span data-dcnode-id="2126" instrument_node=""> which is scheduled to launch on Dec. 24, will do things a bit differently. With its giant gold mirror and infrared light observation tools, Webb is designed to "see" objects 10 to 100 times fainter than what Hubble can see, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2123" data-url="https://jwst.nasa.gov/content/about/faqs/faq.html#sharp" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jwst.nasa.gov/content/about/faqs/faq.html%23sharp" target="_blank"><u data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">according to a NASA fact sheet</span></u></a><span data-dcnode-id="2122" instrument_node="">. So, how will Webb's view compare to Hubble's?</span></p><div class="in-article ad-unit" data-dcnode-id="2076" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2077" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2078"><div data-dcnode-id="2079"><div class="trc_rbox thumbnails-a-mid trc-content-sponsored" data-dcnode-id="2080" id="trc_wrapper_33543" style="overflow: hidden; display: block;"><div class="trc_rbox_header trc_rbox_border_elm" data-dcnode-id="2104" id="trc_header_33543"><div class="trc_header_ext" data-dcnode-id="2106"><div class="logoDiv link-disclosure attribution-disclosure-link-sponsored" data-dcnode-id="2114"><a class="trc_desktop_disclosure_link trc_attribution_position_top" data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.com/en/%3Ftemplate%3Dcolorbox%26utm_source%3Dfutureplc-space%26utm_medium%3Dreferral%26utm_content%3Dthumbnails-a-mid%3AMid%2520Article%3A" rel="nofollow sponsored noopener" target="_blank"><span data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Sponsored Links</span></span></a><a class="trc_mobile_disclosure_link trc_attribution_position_top" data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//popup.taboola.co " title="Glucose Monitoring So Convenient, You'll Forget You're Wearing It"><span class="video-label-box trc-main-label" data-dcnode-id="2091"><span class="video-label video-title trc_ellipsis" data-dcnode-id="2094" style="-webkit-line-clamp: 2;"><span data-dcnode-id="2095" instrument_node="">Glucose Monitoring So Convenient, You'll Forget You're Wearing It</span></span><span class="branding" data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Dexcom</span></span></span></a><div class="trc_user_exclude_btn" data-dcnode-id="2089" title="Remove this item"></div><div class="trc_exclude_overlay trc_fade" data-dcnode-id="2088"></div><div class="trc_undo_btn" data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">Undo</span></div></div></div></div></div><div class="trc_clearer" data-dcnode-id="2081"></div></div></div></div></div></div><div class="in-article ad-unit" data-dcnode-id="2074" id="mobile-in-article"><div data-dcnode-id="2075" id="mobile-taboola-mid-article"></div></div><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">One thing's for sure: The images Webb will capture "will be detailed and spectacular," according to the sheet.</span></p><p data-dcnode-id="2066"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Live updates: </span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/news/live/james-webb-space-telescope-updates"><u data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">NASA's James Webb Space Telescope launch</span></u></a></p><div class="ad-unit" data-dcnode-id="2065" id="ad-unit-2"></div><div class="jwplayer__widthsetter" data-dcnode-id="2046"><div class="jwplayer__wrapper" data-dcnode-id="2047"><div class="future__jwplayer" data-dcnode-id="2048" id="futr_botr_VJ7iDCnC_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="2061" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/VJ7iDCnC/webb-space-telescopes-first-29-days-in-space-will-be-nail-biter%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="2063" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="2049" id="botr_VJ7iDCnC_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="2050"><div class="jw-icon jw-reset" data-dcnode-id="2056"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="2057" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="2058"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="2051"><div class="jw-error-text jw-reset-text" data-dcnode-id="2052" data-nosnippet="" dir="auto"><span data-dcnode-id="2055" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="2054"></span><span data-dcnode-id="2053" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h2 data-dcnode-id="2044" id="not-a-replacement-telescope"><span data-dcnode-id="2045" instrument_node="">Not a replacement telescope</span></h2><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Webb is often described as Hubble's replacement or successor. But despite a handful of glitches over the years, Hubble's science instruments are still going strong, and the two big scopes are set to observe together (albeit far apart from one another) in space.&nbsp;</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Hubble is pretty close to us in low Earth orbit, but Webb will travel out much farther, to a gravitationally stable spot 930,000 miles (1.5 million kilometers) from Earth known as the Sun-Earth Lagrange point 2 (L2).&nbsp;</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Additionally, while both Hubble and Webb are large space telescopes (though Webb is considerably bigger), the two actually "see" the universe very differently.&nbsp;</span></p><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">"It will take amazing images; they will be better than what Hubble did," Klaus Pontoppidan, Webb project scientist at the Space Telescope Science Institute in Baltimore, said during a news conference in May. But, while better in ways, Webb's images will also be fundamentally "different, because it's different wavelengths," Pontoppidan said.</span></p><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">While Hubble observes light at primarily optical and ultraviolet wavelengths, Webb is designed to detect primarily infrared light.&nbsp;</span></p><h2 data-dcnode-id="2032" id="beauty-in-infrared"><span data-dcnode-id="2033" instrument_node="">Beauty in infrared</span></h2><div class="bordeaux-slot" data-dcnode-id="2031" data-feat-ref="bordeaux-feat-id-75" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="2030" data-feat-ref="bordeaux-feat-id-78" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="2015"><div class="image-full-width-wrapper" data-dcnode-id="2021"><div class="image-widthsetter" data-dcnode-id="2022" style="max-width:1280px;"><p class="vanilla-image-block" data-dcnode-id="2023" style="padding-top:56.25%;"><picture data-dcnode-id="2024"><so mirrors." class="expandable lazy-image-van optional-image loaded" data-dcnode-id="2027" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/z4NRcKgKXuUFMbr6qpjHoS-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2026"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="2016" itemprop="caption description"><span class="caption-text" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Comparison of the NASA/ESA Hubble Space Telescope and the NASA/ESA/CSA James Webb Space Telescope's respective mirrors. </span></span><span class="credit" data-dcnode-id="2017" itemprop="copyrightHolder"><span data-dcnode-id="2018" instrument_node="">(Image credit: ESA/M. Kornmesser)</span></span></figcaption></figure><p data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">By observing in infrared, Webb will capture uniquely beautiful images.&nbsp;</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">"I think it'll be fantastic," Pontoppidan said, "but it's very difficult to predict what it will look like," as this will be the first space telescope mission of its kind.</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">"It will look very, very different than Hubble," Pontoppidan said. "The stars themselves fade away they get fainter and fainter [when you] go to [a] longer wavelength, but interstellar clouds go brighter and brighter and brighter."</span></p><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Some gas and dust features become a bit wispy as you start to edge into the infrared light part of the spectrum, Pontoppidan explained. But that's not necessarily a bad thing.&nbsp;</span></p><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">"I think maybe there was some concern that, you know, you don't want images that end up looking wispy," Pontoppidan said. "But as it turns out, actually, if you just go a little bit further out into infrared … the dust itself lights up in thermal light. You get a nebula that shines."</span></p><p data-dcnode-id="1999"><strong data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Related:</span></strong><span data-dcnode-id="2002" instrument_node="">&nbsp;</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/nasa-james-webb-space-telescope-mirror-explained"><span data-dcnode-id="2001" instrument_node="">NASA's James Webb Space Telescope has a shiny giant mirror made of gold hexagons. Here's why.</span></a></p><div class="jwplayer__widthsetter" data-dcnode-id="1980"><div class="jwplayer__wrapper" data-dcnode-id="1981"><div class="future__jwplayer" data-dcnode-id="1982" id="futr_botr_6SprDuOh_bQHItauA_div"><div class="carousel-showcase" data-dcnode-id="1995" style="text-align: right; background-color: black; padding: 10px; color: white;"><a class="hawk-link-parsed" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videos.space.com/m/6SprDuOh/watch-the-webb-telescope-launch-in-this-stunning-animation%3Flist%3D9wzCTV4g" target="_blank"><span data-dcnode-id="1997" instrument_node="">Click here for more Space.com videos...</span></a></div><div class="jw-error jw-reset" data-dcnode-id="1983" id="botr_6SprDuOh_bQHItauA_div" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="1984"><div class="jw-icon jw-reset" data-dcnode-id="1990"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="1991" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="1992"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="1985"><div class="jw-error-text jw-reset-text" data-dcnode-id="1986" data-nosnippet="" dir="auto"><span data-dcnode-id="1989" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="1988"></span><span data-dcnode-id="1987" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div></div></div></div><h2 data-dcnode-id="1978" id="differences-in-infrared"><span data-dcnode-id="1979" instrument_node="">Differences in infrared</span></h2><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Hubble can see light that in a wavelength range from about 200 nanometers (nm) to 2.4 microns, whereas Webb's range will go from about &nbsp;600 nm to 28 microns, according to the fact sheet, which added that visible light ranges from about 700 to 400 nm.&nbsp;</span></p><p data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Even though Webb primarily observes infrared light, it will still be able to see the red/orange portion of the visible light spectrum. The gold coating of its mirrors absorbs blue light from the visible spectrum, but it does reflect yellow and red visible light that will be detected.</span></p><div class="bordeaux-slot" data-dcnode-id="1973" data-feat-ref="bordeaux-feat-id-76" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1972" data-feat-ref="bordeaux-feat-id-79" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1957"><div class="image-full-width-wrapper" data-dcnode-id="1963"><div class="image-widthsetter" data-dcnode-id="1964" style="max-width:500px;"><p class="vanilla-image-block" data-dcnode-id="1965" style="padding-top:70.20%;"><picture data-dcnode-id="1966"><source alt="These are two images taken by the Hubble Space Telescope, one (left) viewing the Carina Nebula in visible light and the other (right) seeing it in infrared." class="expandable lazy-image-van optional-image" data-dcnode-id="1971" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/KdXYHLtW4eJLsdhS4H5jGX.jpeg" data-pin-media="https://cdn.mos.cms.futurecdn.net/KdXYHLtW4eJLsdhS4H5jGX.jpeg" data-srcset="https://cdn.mos.cms.futurecdn.net/KdXYHLtW4eJLsdhS4H5jGX-320-80.jpeg.webp 320w, https://cdn.mos.cms.futurecdn.net/KdXYHLtW4eJLsdhS4H5jGX-650-80.jpeg.webp 650w, https://cdn.mos.cms.futurecdn.net/KdXYHLtW4eJLsdhS4H5jGX-970-80.jpeg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="These are two images taken by the Hubble Space Telescope, one (left) vie .cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/cgFNe4Uq4eYNhTTxTMEkbc-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1937"></div></figure><p></p></div></div><figcaption class="inline-layout" data-dcnode-id="1927" itemprop="caption description"><span class="caption-text" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">This Hubble image, captured and released to celebrate the telescope’s 23rd year in orbit, shows part of the sky in the constellation of Orion (The Hunter) in infrared light. Rising like a giant seahorse from turbulent waves of dust and gas is the Horsehead Nebula, otherwise known as Barnard 33. Image released April 19, 2013. </span></span><span class="credit" data-dcnode-id="1928" itemprop="copyrightHolder"><span data-dcnode-id="1929" instrument_node="">(Image credit: NASA/ESA/Hubble Heritage Team (AURA/STScI))</span></span></figcaption></figure><h2 data-dcnode-id="1924" id="the-power-of-infrared"><span data-dcnode-id="1925" instrument_node="">The power of infrared</span></h2><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Hubble has provided the world with stunning images for decades and has similar sharpness to Webb. "Webb's angular resolution, or sharpness of vision, will be the same as Hubble's," according to the fact sheet. "Webb images will appear just as sharp as Hubble's do," the sheet reads. According to NASA, Webb's resolution would allow it to see the details of an object the size of a U.S. penny 24 miles (40 km) away.</span></p><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Despite this similarity, Webb has a much larger mirror — 21.3 feet (6.5 m) wide, compared to 7.8 feet (2.4 m) — cutting-edge detectors and is designed to see deeper into the infrared spectrum than Hubble.&nbsp;</span></p><p data-dcnode-id="1914"><span data-dcnode-id="1919" instrument_node="">By observing in infrared, Webb will allow scientists to see much farther out into the universe, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1916" data-url="https://www.jwst.nasa.gov/content/about/comparisonWebbVsHubble.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jwst.nasa.gov/content/about/comparisonWebbVsHubble.html"><u data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">NASA has explained</span></u></a><span data-dcnode-id="1915" instrument_node="">. Its larger mirror also gives it more surface area to collect light, enabling the scope to peer even farther out into space, which essentially allows scientists to look "back in time," at the universe billions of years in the past.&nbsp;</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Webb was designed to be able to "see" the first stars and galaxies that ever formed in the early universe. It can detect objects 10 billion times fainter than the faintest stars visible with no telescope, or 10 to100 times fainter than what Hubble can observe.</span></p><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Webb is equipped with four scientific instruments to help it make its observations. These include the Near Infrared Camera (NIRCam), the Near-Infrared Spectrograph (NIRSpec), the Mid-Infrared Instrument (MIRI) and the Fine Guidance Sensor/Near Infrared Imager and Slitless Spectrograph (FGS-NIRISS).</span></p><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">With these tools, Webb "can do what we call imaging spectroscopy," Pontoppidan said, "where it can take an image, but it will take a spectrum and every pixel of the image as well." In imaging spectroscopy, there is information on the spectrum of wavelengths present in each tiny piece of the image. This can help clue scientists in as to what elements or chemicals might have created that spectrum.</span></p><div class="bordeaux-slot" data-dcnode-id="1907" data-feat-ref="bordeaux-feat-id-74" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><div class="fancy-box" data-dcnode-id="1886"><div class="fancy_box-title" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Related Stories:</span></div><div class="fancy_box_body" data-dcnode-id="1887"><p data-dcnode-id="1899"><span data-dcnode-id="1904" instrument_node="">&nbsp;</span><strong data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">—&nbsp;</span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/james-webb-space-telescope-deployment-points-of-failure"><span data-dcnode-id="1901" instrument_node="">There are over 300 ways that the new James Webb Space Telescope could fail, NASA says</span></a></p><p data-dcnode-id="1894"><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">—&nbsp;</span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/nasa-james-webb-space-telescope-cleanroom-photos"><span data-dcnode-id="1896" instrument_node="">NASA's James Webb Space Telescope looks squeaky clean at spaceport for December launch (photos)</span></a></p><p data-dcnode-id="1888"><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">—&nbsp;</span></strong><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/nasa-not-renaming-james-webb-space-telescope"><span data-dcnode-id="1891" instrument_node="">Despite complaints, NASA won't rename James Webb Space Telescope: report</span></a><span data-dcnode-id="1889" instrument_node="">&nbsp;</span></p></div></div><p data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Pontoppidan added that Webb's unique suite of imaging tools will allow it to do all sorts of other scientific work, such as observing exoplanets transiting in front of stars or determining the composition of a cloud in a star-forming region; he pointed to studies that may look for ice, water and complex organics in the atmospheres of exoplanets.</span></p><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">The James Webb Space Telescope is a joint effort involving NASA, the European Space Agency and the Canadian Space Agency.</span></p><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">After an additional delay, Webb is still on track to launch on Dec. 24, 2021, atop an Arianespace </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/40551-ariane-5-rocket.html"><span data-dcnode-id="1880" instrument_node="">Ariane 5 </span></a><span data-dcnode-id="1878" instrument_node="">rocket from Europe's Spaceport in Kourou, French Guiana.</span></p><p data-dcnode-id="1862"><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Email Chelsea Gohd at cgohd@space.com or follow her on Twitter </span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1871" data-url="https://twitter.com/chelsea_gohd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/chelsea_gohd"><u data-dcnode-id="1872"><em data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">@chelsea_gohd</span></em></u></a><em data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">. Follow us on Twitter</span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1865" data-url="https://twitter.com/SPACEdotcom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/SPACEdotcom"><u data-dcnode-id="1866"><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node=""> @Spacedotcom</span></em></u></a><em data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node=""> and on Facebook.</span></em></p><span data-dcnode-id="1861" instrument_node="">
