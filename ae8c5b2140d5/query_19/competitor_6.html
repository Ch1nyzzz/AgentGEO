</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">WASHINGTON — For most of its 25 years in space, the Hubble Space Telescope has been amazing people around the world with its beautiful images.</span></p><div class="ad-unit" data-dcnode-id="2476" id="ad-unit-1"></div><p data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">But the spacecraft — a collaboration involving NASA and the European Space Agency — produces much more than pretty pictures. Its scientific instruments have revolutionized our understanding of </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2473" data-url="https://www.space.com/13320-big-bang-universe-10-steps-explainer.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/13320-big-bang-universe-10-steps-explainer.html"><span data-dcnode-id="2474" instrument_node="">the universe</span></a><span data-dcnode-id="2472" instrument_node=""> and its history, researchers say.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2470" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="3806395969987034000" data-widget-type="seasonal"></aside><p data-dcnode-id="2465"><span data-dcnode-id="2469" instrument_node="">"We hoped [Hubble] would change our view of the universe," Colleen Hartman told Space.com here last week at a screening of "Hubble's Cosmic Journey," a documentary that premiered last night (April 20) on National Geographic Channel. Hartman serves as the deputy director for science, operations and program performance at NASA's Goddard Space Flight Center in Greenbelt, Maryland. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="2467" data-url="https://www.space.com/28546-hubble-space-telescope-25th-anniversary-photos.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/28546-hubble-space-telescope- ;"></div><div class="bordeaux-slot" data-dcnode-id="2010" data-feat-ref="bordeaux-feat-id-80" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-left" data-bordeaux-image-check="" data-dcnode-id="1995"><div class="image-full-width-wrapper" data-dcnode-id="2001"><div class="image-widthsetter" data-dcnode-id="2002"><p class="vanilla-image-block" data-dcnode-id="2003" style="padding-top:56.25%;"><picture data-dcnode-id="2004"><source alt="NASA's Hubble Telescope discovered four of Pluto's five known moons." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="2009" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="NASA's Hubble Telescope discovered four of Pluto's five known moons." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="2008" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="2005"><img alt="NASA's Hubble Telescope discovered four of Pluto's five known moons." class="pull-left expandable lazy-image-van optional-image loaded" data-dcnode-id="2007" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/G29wNPujnZLZdKjsQuC74R-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="2006"></div></figure><p></p></div></div><figcaption class="pull-left" data-dcnode-id="1996" itemprop="caption description"><span class="caption-text" data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">NASA's Hubble Telescope discovered four of Pluto's five known moons. </span></span><span class="credit" data-dcnode-id="1997" itemprop="copyrightHolder"><span data-dcnode-id="1998" instrument_node="">(Image credit: NASA, ESA and M. Showalter (SETI Institute))</span></span></figcaption></figure><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">American astronomer Lyman Spitzer began to lobby for a space-based instrument in 1946, and a little more than two decades later, NASA started designing the "Large Space Telescope." (It was named after famous astronomer Edwin Hubble in 1983.)</span></p><p data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node="">The </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1990" data-url="https://www.space.com/15892-hubble-space-telescope.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15892-hubble-space-telescope.html"><span data-dcnode-id="1991" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1989" instrument_node=""> reached space with a flawed mirror and initially returned blurry images of the cosmos. But astronauts fixed the problem during a servicing mission in 1993, and Hubble began to produce the beautiful, iconic images for which it is now known.</span></p><p data-dcnode-id="1983"><span data-dcnode-id="1987" instrument_node="">Not long after the fix, </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1985" data-url="https://www.space.com/19855-shoemaker-levy-9.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/19855-shoemaker-levy-9.html"><span data-dcnode-id="1986" instrument_node="">Comet Shoemaker-Levy 9</span></a><span data-dcnode-id="1984" instrument_node=""> slammed into Jupiter. Hubble captured the comet as it broke up, offering insights into the role comets may have played in delivering water and other material to the solar system's planets, including Earth. Other images of Jupiter revealed unexpectedly low amounts of water in the atmosphere of the gas giant.</span></p><p data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">Hubble also captured images that revealed bright and dark regions on the surface of the dwarf planet Ceres, the largest object in the main asteroid belt between Mars and Jupiter. NASA's Dawn spacecraft will attempt to determine the composition of Ceres' mysterious bright spots when its science mission begins on April 23. Hubble also studied the geology of the asteroid Vesta, which Dawn orbited from July 2011 through September 2012. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1980" data-url="https://www.space.com/20765-hubble-space-telescope-infographic.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/20765-hubble-space-telescope-infographic.html"><span data-dcnode-id="1981" instrument_node="">How the Hubble Space Telescope Works (Infographic)</span></a><span data-dcnode-id="1979" instrument_node="">]</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1977" instrument_node="">Hubble has also peered at the distant dwarf planet Pluto, helping astronomers make maps of its surface, and even </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1975" data-url="https://www.space.com/16531-pluto-fifth-moon-hubble-discovery.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/16531-pluto-fifth-moon-hubble-discovery.html"><span data-dcnode-id="1976" instrument_node="">discovering four new Pluto moons</span></a><span data-dcnode-id="1974" instrument_node="">. NASA's New Horizons mission will begin taking images to rival Hubble's in May 2015, but it took the craft more than nine years to get close enough to give the space telescope a run for its money. (New Horizons launched in January 2006 and will fly by the Pluto system on July 14.)</span></p><h2 data-dcnode-id="1971" id="the-life-of-the-universe"><span data-dcnode-id="1972" instrument_node="">The life of the universe</span></h2><p data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">NASA's most famous space telescope was named for American scientist </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1968" data-url="https://www.space.com/15665-edwin-powell-hubble.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15665-edwin-powell-hubble.html"><span data-dcnode-id="1969" instrument_node="">Edwin Hubble</span></a><span data-dcnode-id="1967" instrument_node="">, who determined that the universe is not static but expanding. One of the main goals for Hubble was to determine just how quickly the universe is stretching.</span></p><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">The telescope has also provided evidence for the existence of dark energy, the mysterious force that counteracts gravity, causing galaxies to move away from one another at an accelerating pace.</span></p><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">Prior to Hubble's launch, estimates for the age of the universe ranged from 10 to 20 billion years — a significant gap. By studying special pulsating stars known as Cepheid variables, Hubble helped astronomers nail down the age of the universe with an accuracy of about 5 percent. The current best estimate is 13.82 billion years. [</span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1961" data-url="https://www.space.com/17-amazing-hubble-discoveries.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/17-amazing-hubble-discoveries.html"><span data-dcnode-id="1962" instrument_node="">Most Amazing Hubble Space Telescope Discoveries</span></a><span data-dcnode-id="1960" instrument_node="">]</span></p><h2 data-dcnode-id="1957" id="the-milky-way-and-beyond"><span data-dcnode-id="1958" instrument_node="">The Milky Way and beyond</span></h2><div class="bordeaux-slot" data-dcnode-id="1956" data-feat-ref="bordeaux-feat-id-77" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1955" data-feat-ref="bordeaux-feat-id-81" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-right" data-bordeaux-image-check="" data-dcnode-id="1940"><div class="image-full-width-wrapper" data-dcnode-id="1946"><div class="image-widthsetter" data-dcnode-id="1947"><p class="vanilla-image-block" data-dcnode-id="1948" style="padding-top:56.25%;"><picture data-dcnode-id="1949"><source alt="In 2008, Hubble captured the first photograph of a planet beyond the solar system." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="1954" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="In 2008, Hubble captured the first photograph of a planet beyond the solar system." class="pull-right expandable lazy-image-van optional-image" data-dcnode-id="1953" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1950"><img alt="In 2008, Hubble captured the first photograph of a planet beyond the solar system." class="pull-right expandable lazy-image-van optional-image loaded" data-dcnode-id="1952" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/qJ4bzNnhCWRxcCfvuHgDXR-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1951"></div></figure><p></p></div></div><figcaption class="pull-right" data-dcnode-id="1941" itemprop="caption description"><span class="caption-text" data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">In 2008, Hubble captured the first photograph of a planet beyond the solar system. </span></span><span class="credit" data-dcnode-id="1942" itemprop="copyrightHolder"><span data-dcnode-id="1943" instrument_node="">(Image credit: NASA, ESA, P. Kalas, J. Graham, E. Chiang, E. Kite (University of California, Berkeley), M. Clampin (NASA Goddard Space Flight Center), M. Fitzgerald (Lawrence Livermore National Laboratory), and K. Stapelfeldt and J. Krist (NASA Jet Propulsion Laboratory)</span></span></figcaption></figure><p data-dcnode-id="1935"><span data-dcnode-id="1939" instrument_node="">Our Milky Way galaxy is set to suffer a </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1937" data-url="https://www.space.com/15949-milkyway-galaxy-crash-andromeda-hubble.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/15949-milkyway-galaxy-crash-andromeda-hubble.html"><span data-dcnode-id="1938" instrument_node="">head-on collision</span></a><span data-dcnode-id="1936" instrument_node=""> with its neighbor, the Andromeda galaxy, and the world has Hubble to thank for the heads-up. By measuring the sideways motion of the approaching Andromeda galaxy, scientists were able to determine that the two will merge in approximately four billion years.</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Mergers are common beyond the Milky Way, as Hubble has shown. When scientists discovered galaxies with long tails of gas and dust — the remnants of mergers — they turned Hubble toward them to reveal details. The space telescope probed the core of these collisions and uncovered a new class of exceptionally large and bright star clusters.</span></p><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Hubble has helped survey galaxies that existed when the universe was only 600 million years old. Previous estimates had suggested that galaxies didn't form until the universe was at least two billion years old. The instrument's images have helped scientists understand how galaxies evolve.</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Hubble also helped turned a staple of science fiction into science fact.</span></p><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">"When I was a young kid, black holes were fantasy, something on 'Star Trek,'" Ed Weiler, who served as NASA chief scientist for Hubble from 1979 to 1998, told Space.com.</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">But Hubble showed that supermassive black holes, which weigh in at millions or billions of times the mass of the sun, exist at the center of most if not all galaxies.</span></p><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">"Hubble has not only proved that supermassive black holes exist; it has taken black holes from science fantasy to reality," Weiler said.</span></p><h2 data-dcnode-id="1921" id="the-end-of-stellar-lives"><span data-dcnode-id="1922" instrument_node="">The end of stellar lives</span></h2><div class="bordeaux-slot" data-dcnode-id="1920" data-feat-ref="bordeaux-feat-id-78" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1919" data-feat-ref="bordeaux-feat-id-82" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-left" data-bordeaux-image-check="" data-dcnode-id="1904"><div class="image-full-width-wrapper" data-dcnode-id="1910"><div class="image-widthsetter" data-dcnode-id="1911"><p class="vanilla-image-block" data-dcnode-id="1912" style="padding-top:56.25%;"><picture data-dcnode-id="1913"><source alt="By capturing images of a special class of pulsing stars, Hubble helped astronomers to measure the age and expansion of the universe." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="1918" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/webp"><source alt="By capturing images of a special class of pulsing stars, Hubble helped astronomers to measure the age and expansion of the universe." class="pull-left expandable lazy-image-van optional-image" data-dcnode-id="1917" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-970-80.jpg 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" type="image/jpeg"></picture></p><figure class="expandable-image" data-dcnode-id="1914"><img alt="By capturing images of a special class of pulsing stars, Hubble helped astronomers to measure the age and expansion of the universe." class="pull-left expandable lazy-image-van optional-image loaded" data-dcnode-id="1916" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-970-80.jpg 970w" loading="lazy" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') !== -1){return true;};this.parentNode.replaceChild(window.missingImage(),this)" sizes="(min-width: 1000px) 970px, calc(100vw - 40px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/space/media/img/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/nHNnQaCqwvsvnGWMJPupT7-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1915"></div></figure><p></p></div></div><figcaption class="pull-left" data-dcnode-id="1905" itemprop="caption description"><span class="caption-text" data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">By capturing images of a special class of pulsing stars, Hubble helped astronomers to measure the age and expansion of the universe. </span></span><span class="credit" data-dcnode-id="1906" itemprop="copyrightHolder"><span data-dcnode-id="1907" instrument_node="">(Image credit: Jeffrey Newman (Univ. of California at Berkeley) and NASA)</span></span></figcaption></figure><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">When massive stars reach the end of their lives, they explode in a fiery death known as a supernova. These violent blowouts may leave behind black holes or supercompact neutron stars even as they blow the heavy elements that form in the heart of the star through their galaxy. Hubble has helped scientists to better understand the supernova process.</span></p><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Since it first began photographing the universe, Hubble has captured images of SN 1987 A, a supernova that exploded three years before the telescope launched. Hubble has continued to observe the supernova, taking hundreds of pictures to help researchers understand how it has changed over time.</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Hubble has also put in time studying the unstable star Eta Carinae, an object that appears to be an explosion in progress. The telescope has allowed scientists to make detailed studies of the structure of the unusual object, including the remnants of the violent outbursts it has experienced for 200 years.</span></p><h2 data-dcnode-id="1896" id="the-search-for-other-planets"><span data-dcnode-id="1897" instrument_node="">The search for other planets</span></h2><p data-dcnode-id="1891"><span data-dcnode-id="1895" instrument_node="">Today, when people hear about exoplanets, the first instrument they probably think of is NASA's planet-hunting </span><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1893" data-url="https://www.space.com/24903-kepler-space-telescope.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.space.com/24903-kepler-space-telescope.html"><span data-dcnode-id="1894" instrument_node="">Kepler spacecraft</span></a><span data-dcnode-id="1892" instrument_node="">. But in 2008, Hubble captured the first photograph of a planet in orbit around another star, Fomalhaut b.</span></p><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Even before that, Hubble helped to find 16 potential planets orbiting other stars by monitoring the dips in starlight as each planetary candidate passed between its star and Earth. The instrument has also helped to study the atmospheres of distant planets.</span></p><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Indirectly, Hubble helped to set the stage for Kepler. Hubble revealed billions of stars that were potential planetary hosts, opening up the immensity of the universe. And putting Hubble into space demonstrated that a level of technological expertise had been met, NASA officials said.</span></p><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">"It became reasonable to think we could build something like Kepler," Hartman said.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1884" data-feat-ref="bordeaux-feat-id-79" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><div class="bordeaux-slot" data-dcnode-id="1883" data-feat-ref="bordeaux-feat-id-83" id="bordeaux-static-slot-12" style="display: flex; flex-direction: column; margin: auto;"></div><figure class="van-image-figure pull-" data-bordeaux-image-check="" data-dcnode-id="1873"><div class="image-full-width-wrapper" data-dcnode-id="1874"><div class="image-widthsetter" data-dcnode-id="1875"><p class="vanilla-image-block" data-dcnode-id="1876" style="padding-top:56.25%;"><picture data-dcnode-id="1877"><source alt="" class="pull- expandable lazy-image-van optional-image" data-dcnode-id="1882" data-normal="https://vanilla.futurecdn.net/space/media/img/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC-320-80.jpg.webp 320w, https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC-650-80.jpg.webp 650w, https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC-970-80.jpg.webp 970w" onerror="if(this.src &amp;&amp; this.src.indexOf('missing-image.svg') 2UpT8FQZWXGFYMhvt8mFmC-320-80.jpg 320w, https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC-650-80.jpg 650w, https://cdn.mos.cms.futurecdn.net/2UpT8FQZWXGFYMhvt8mFmC-970-80.jpg 970w"><div class="expand icon icon-expand-image" data-dcnode-id="1879"></div></figure><p></p></div></div></figure><h2 data-dcnode-id="1871" id="a-continuing-mission"><span data-dcnode-id="1872" instrument_node="">A continuing mission</span></h2><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Hubble was designed to be serviced, allowing astronauts to replace parts as needed and to change out the scientific instruments. This approach has kept the spacecraft operational for a quarter of a century. The last servicing mission in 2009 replaced worn parts, and Weiler estimates the craft will keep collecting data for another five or six years.</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1868" instrument_node="">John Grunsfeld, associate administrator of NASA's Science Mission Directorate and a former astronaut who serviced Hubble on three different space missions, lauded the spacecraft at the screening of "</span><a class="hawk-link-parsed" data-component-tracked="1" data-custom-tracking-id="1411201457993364000" data-dcnode-id="1866" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="skimlinks" data-label="Hubble's Cosmic Journey" data-merchant-id="undefined" data-merchant-name="SkimLinks - nationalgeographic.com" data-merchant-network="undefined" data-merchant-url="undefined" data-placeholder-url="https://go.redirectingat.com/?id=92X1588396&amp;xcust=hawk-custom-tracking&amp;xs=1&amp;url=http%3A%2F%2Fchannel.nationalgeographic.com%2Fepisodes%2Fhubbles-cosmic-journey%2F&amp;sref=https%3A%2F%2Fwww.space.com%2F29157-hubble-space-telescope-science-legacy.html" data-url="http://channel.nationalgeographic.com/episodes/hubbles-cosmic-journey/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//go.redirectingat.com/%3Fid%3D92X1588396%26xcust%3Dspace_us_1411201457993364000%26xs%3D1%26url%3Dhttp%253A%252F%252Fchannel.nationalgeographic.com%252Fepisodes%252Fhubbles-cosmic-journey%252F%26sref%3Dhttps%253A%252F%252Fwww.space.com%252F29157-hubble-space-telescope-science-legacy.html" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><span data-dcnode-id="1867" instrument_node="">Hubble's Cosmic Journey</span></a><span data-dcnode-id="1865" instrument_node="">."</span></p><p data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">"Hubble still has a tremendous journey ahead of it," Grunsfeld said to a packed auditorium. "I'm still convinced that its greatest discovery lies ahead."</span></p><p data-dcnode-id="1859"><em data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Editors note: This story was corrected to say that Hubble has been operational for a quarter of a century, not a quarter of a decade. </span></em></p><p data-dcnode-id="1836"><em data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Follow us </span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1854" data-url="http://twitter.com/spacedotcom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/spacedotcom"><em data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">@Spacedotcom</span></em></a><em data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">, </span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1849" data-url="https://www.facebook.com/spacecom" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/spacecom"><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Facebook</span></em></a><em data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node=""> or </span></em><a class="hawk-link-parsed" data-component-tracked="1" data-dcnode-id="1844" dat
