Sooner or later, every stargazer decides it's time to be </span><a data-component="link" data-dcnode-id="1247" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/astronomy-basics-4133556"><span data-dcnode-id="1248" instrument_node="">buying a telescope</span></a><span data-dcnode-id="1246" instrument_node="">. It's an exciting next step to further exploration of the cosmos. However, as with any other major purchase, there's a lot to learn about these "universe exploration" engines, ranging from power to price. The first thing a user wants to do is figure out their observational goals. Are they interested in planetary observing? Deep-sky exploration? Astrophotography? A little of everything? How much money do they want to spend? Knowing the answer to those questions will help narrow down a telescope choice.

</span><span class="heading-toc" data-dcnode-id="949" id="toc-refractors-and-how-they-work"></span><span data-dcnode-id="948" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="943" id="mntl-sc-block_1-0-4"><span data-dcnode-id="947" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node=""> Refractors and How They Work </span></span><span data-dcnode-id="944" instrument_node=""> </span></h2><span data-dcnode-id="942" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="940" id="mntl-sc-block_1-0-5"><span data-dcnode-id="941" instrument_node="">
A refractor is a telescope that uses two lenses to deliver a view of a celestial object. At one end (the one farther away from the viewer), it has a large lens, called the "objective lens" or "object glass." On the other end is the lens the user looks through. It is called the "ocular" or "eyepiece." They work together to deliver the sky view.
</span></p><span data-dcnode-id="939" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="938" id="mntl-sc-block_1-0-6"></div><span data-dcnode-id="937" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="935" id="mntl-sc-block_1-0-7"><span data-dcnode-id="936" instrument_node="">
The objective collects light and focuses it as a sharp image. This image gets magnified and is what the stargazer sees through the ocular. This eyepiece is adjusted by sliding it in and out of the telescope body to focus the image.
</span></p><span data-dcnode-id="934" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="923" id="mntl-sc-block_1-0-8"><div class="comp mntl-block" data-dcnode-id="924" id="mntl-block_6-0"><span data-dcnode-id="933" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="926" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="932" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="928" id="mntl-native__adunit_2-0"><span data-dcnode-id="931" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="921" id="toc-reflectors-and-how-they-work"></span><span data-dcnode-id="920" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="915" id="mntl-sc-block_1-0-9"><span data-dcnode-id="919" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node=""> Reflectors and How They Work </span></span><span data-dcnode-id="916" instrument_node=""> </span></h2><span data-dcnode-id="914" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="912" id="mntl-sc-block_1-0-10"><span data-dcnode-id="913" instrument_node="">
A reflector works a bit differently. Light is gathered at the bottom of the scope by a concave mirror, called the primary. The primary has a parabolic shape. There are several ways the primary can focus the light, and how it is done determines the type of reflecting telescope.
</span></p><span data-dcnode-id="911" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="910" id="mntl-sc-block_1-0-11"></div><span data-dcnode-id="909" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="903" id="mntl-sc-block_1-0-12"><span data-dcnode-id="908" instrument_node="">
Many observatory telescopes, such as Gemini in Hawai'i or the orbiting </span><a data-component="link" data-dcnode-id="905" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/cosmic-beauty-at-your-fingertips-3072101"><em data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Hubble Space Telescope</span></em></a><span data-dcnode-id="904" instrument_node="">&nbsp;use a photographic plate to focus the image. Called the "prime focus position", the plate is located near the top of the scope. Other such scopes use a secondary mirror, placed in a similar position as the photographic plate, to reflect the image back down the body of the scope, where it is viewed through a hole in the primary mirror. This is known as a Cassegrain focus.&nbsp;
</span></p><span data-dcnode-id="902" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="891" id="mntl-sc-block_1-0-13"><div class="comp mntl-block" data-dcnode-id="892" id="mntl-block_7-0"><span data-dcnode-id="901" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard3-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="894" data-height="600" id="ref-billboard3-sticky-dynamic_2-0" style="height: 600px; top: 1991px;"><span data-dcnode-id="900" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="889" id="toc-newtonians-and-how-they-work"></span><span data-dcnode-id="888" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="883" id="mntl-sc-block_1-0-14"><span data-dcnode-id="887" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node=""> Newtonians and How They Work </span></span><span data-dcnode-id="884" instrument_node=""> </span></h2><span data-dcnode-id="882" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="877" id="mntl-sc-block_1-0-15"><span data-dcnode-id="881" instrument_node="">
Then, there's the Newtonian, a kind of reflecting telescope. It got its name when&nbsp;</span><a data-component="link" data-dcnode-id="879" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/biography-sir-isaac-newton-4072880"><span data-dcnode-id="880" instrument_node="">Sir Isaac Newton</span></a><span data-dcnode-id="878" instrument_node=""> dreamed up the basic design. In a Newtonian telescope, a flat mirror is placed at an angle in the same position as the secondary mirror in a Cassegrain. This secondary mirror focuses the image into an eyepiece located in the side of the tube, near the top of the scope.
</span></p><span data-dcnode-id="876" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="875" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="874" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="873" id="toc-catadioptric-telescopes"></span><span data-dcnode-id="872" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="867" id="mntl-sc-block_1-0-17"><span data-dcnode-id="871" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node=""> Catadioptric Telescopes </span></span><span data-dcnode-id="868" instrument_node=""> </span></h2><span data-dcnode-id="866" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="864" id="mntl-sc-block_1-0-18"><span data-dcnode-id="865" instrument_node="">
Finally, there are catadioptric telescopes, which combine elements of refractors and reflectors in their design. The first such telescope was created by German astronomer Bernhard Schmidt in 1930. It used a primary mirror at the back of the telescope with a glass corrector plate in the front of the telescope, which was designed to remove spherical aberration. In the original telescope, photographic film was placed at the prime focus. There were no secondary mirror or eyepieces. The descendant of that original design, called the Schmidt-Cassegrain design, is the most popular type of telescope. Invented in the 1960s, it has a secondary mirror that bounces light through a hole in the primary mirror to an eyepiece.
</span></p><span data-dcnode-id="863" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="852" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="853" id="mntl-block_8-0"><span data-dcnode-id="862" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="849" id="mntl-sc-block_1-0-20"><span data-dcnode-id="850" instrument_node="">
The second style of catadioptric telescope was invented by a Russian astronomer, D. Maksutov. (A Dutch astronomer, A. Bouwers, created a similar design in 1941, before Maksutov.) In the Maksutov telescope, a more spherical corrector lens than in the Schmidt is utilized. Otherwise, the designs are quite similar. Today’s models are known as Maksutov –Cassegrain.
</span></p><span data-dcnode-id="848" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="847" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="846" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="845" id="toc-refractor-telescope-advantages-and-disadvantages"></span><span data-dcnode-id="844" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="839" id="mntl-sc-block_1-0-22"><span data-dcnode-id="843" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node=""> Refractor Telescope Advantages and Disadvantages </span></span><span data-dcnode-id="840" instrument_node=""> </span></h2><span data-dcnode-id="838" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="836" id="mntl-sc-block_1-0-23"><span data-dcnode-id="837" instrument_node="">
After initial alignment, which is necessary to have the optics work well together, refractor optics are resistant to misalignment. The glass surfaces are sealed inside the tube and rarely need cleaning. The sealing also minimizes effects from air currents that can muddy the view. This is one way that users can get steady sharp views of the sky. Disadvantages include a number of possible aberrations of the lenses. Also, since lenses need to be edge supported, this limits the size of any refractor.
</span></p><span data-dcnode-id="835" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="824" id="mntl-sc-block_1-0-24"><div class="comp mntl-block" data-dcnode-id="825" id="mntl-block_9-0"><span data-dcnode-id="834" instrument_node="">
</span><div class="comp scads-to-load right-rail__item ref-billboard5-sticky-dynamic mntl-sc-sticky-billboard is-hidden" data-dcnode-id="827" data-height="600" id="ref-billboard5-sticky-dynamic_2-0" style="height: 600px;"><span data-dcnode-id="833" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="822" id="toc-reflector-telescope-advantages-and-disadvantages"></span><span data-dcnode-id="821" instrument_node=""> </span><h2 class="comp mntl-sc-block reference-sc-block-heading mntl-sc-block-heading" data-dcnode-id="816" id="mntl-sc-block_1-0-25"><span data-dcnode-id="820" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node=""> Reflector Telescope Advantages and Disadvantages </span></span><span data-dcnode-id="817" instrument_node=""> </span></h2><span data-dcnode-id="815" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="813" id="mntl-sc-block_1-0-26"><span data-dcnode-id="814" instrument_node="">
Reflectors do not suffer from chromatic aberration. Their mirrors are easier to build without defects than lenses are since only one side of a mirror is used. Also, because the support for a mirror is from the back, very large mirrors can be built, making larger scopes. The disadvantages include ease of misalignment, the need for frequent cleaning, and possible spherical aberration, which is a defect in the actual lens that can blur the view.
</span></p><span data-dcnode-id="812" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="811" id="mntl-sc-block_1-0-27"></div><span data-dcnode-id="810" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="808" id="mntl-sc-block_1-0-28"><span data-dcnode-id="809" instrument_node="">
Once a user has a basic understanding of the types of scopes on the market, they can focus on getting the right-sized one to view their favorite targets with. They can learn more about some mid-range-priced telescopes on the market. It never hurts to browse the marketplace and learn more about specific instruments.&nbsp;And, the best way to "sample" different telescopes is to go to a star party and ask other scope owners if they're willing to let someone take a look through their instruments. It's an easy way to compare and contrast the view through different instruments.
</span></p><span data-dcnode-id="807" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="796" id="mntl-sc-block_1-0-29"><div class="comp mntl-block" data-dcnode-id="797" id="mntl-block_10-0"><span data-dcnode-id="806" instrument_node="">
