</span><h2 data-dcnode-id="865"><strong data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">What are catadioptric telescopes?</span></strong></h2><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Catadioptric Telescopic designs are a variant of optical telescopes that form an image by combining specially designed mirrors and lenses. This telescopic configuration is intended to obtain a greater degree of error rectification overall compared to all-mirror or all-lens telescopes. The catadioptric design provides a wider aberration-free field of view. These designs incorporate “correctors” that are lens or curved mirror elements in the image-forming optical system for correcting the reflective or refractive aberrations caused by its counterpart.</span></p><span data-dcnode-id="861" instrument_node="">
</span><h2 data-dcnode-id="858"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Catadioptric Telescope History</span></strong></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Several designs of early optical systems incorporated the catadioptric setup. Augustin-Jean Fresnel is credited for designing several catadioptric lighthouse reflectors in the late 1820s. A. Mangin, a French engineer designed the Mangin mirror in the year 1876. The Mangin mirror is a concave glass reflector that has a silver surface present on the glass’s rear side. Many catadioptric telescopes are built incorporating the Mangin mirror. </span></p><span data-dcnode-id="854" instrument_node="">
</span><h2 data-dcnode-id="851"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Parts of Catadioptric telescope</span></strong></h2><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="846"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Lenses:</span></strong><span data-dcnode-id="847" instrument_node=""> Every catadioptric telescopic design incorporates one or more lenses. The lenses are generally placed at the objective and receives the incoming light. Typically, biconcave lenses are used in such designs. However, the use of plano-convex or concavo-convex lenses is also seen in certain catadioptric designs. The use of lens-mirror arrangement reduces the aberrations and produces a better quality image.</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Mirrors:</span></strong><span data-dcnode-id="842" instrument_node=""> Every catadioptric telescopic design incorporates one or more mirrors. The mirrors can be placed as an objective setup along with lenses or as secondary reflectors depending on the telescopic design. Typically, two spherical mirrors are used in such designs, one as primary mirror and the other as secondary. In this form of arrangement, the lenses are used for reducing the divergence of the light rays. The use of lens-mirror arrangement reduces the aberrations and produces a better quality image.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="836"><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Telescope tube:</span></strong><span data-dcnode-id="837" instrument_node=""> The telescope tube serves as the body of the telescope. The telescopic tube is designed corresponding to the lens-mirror arrangement used. Typically, a telescopic tube comes with a radius of around 10 cm or 4 inches. The telescopic tube has a knob built below the visual back. This knob helps to adjust the focal length setting of the system.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="831"><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Corrector plate:</span></strong><span data-dcnode-id="832" instrument_node=""> Some catadioptric telescopic designs use corrector plates to improve image quality. These corrector plates, as the name suggests is either a single thin lens or a group of thin lenses that are strategically placed in front of a catadioptric telescopic design for correcting the aberrations caused by the telescopic system. These corrector plates are sometimes also referred as correcting lenses. We can see the application of such corrector plates in the Schmidt-Cassegrain catadioptric reflector.</span></p><span data-dcnode-id="830" instrument_node="">
</span><h2 data-dcnode-id="827"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">What are Catadioptric dialytes?</span></strong></h2><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Catadioptric dialytes are considered to be one of the initial varieties of catadioptric telescope. This design comprises a silver-backed negative lens (comparable to a Mangin mirror) and a single-element refracting telescope objective. The first Catadioptric dialyte was proposed by W.F. Hamilton in 1814 and was known as the Hamiltonian telescope. Another design proposed by German optician Ludwig Schupmann in the 19th century known as the Schupmann medial telescope had the catadioptric mirror placed after the primary refractor’s focus. This design also added a third correcting or focusing lens to the telescopic configuration.</span></p><span data-dcnode-id="823" instrument_node="">
</span><h2 data-dcnode-id="820"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">How does a catadioptric telescope work?</span></strong></h2><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Catadioptric telescopes are found in several variants and each variant has its own specialized system of working. However, all these variants follow the same primary lens-mirror principle. These telescopes use both reflection and refraction of light to form images.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">The incident light rays, entering the tube falls on the primary objective. This objective can be a single lens, a lens system, or a lens-mirror system (common). In the lens-mirror objective system, the lens converges the diverged beam of light entering the telescope and makes it fall on the mirror. This primary mirror then reflects the light to the second spherical mirror that is placed at either side of the telescopic opening. The reflected light received by the secondary mirror is then reflected again to form the final image on the focal plane.</span></p><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="810"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Why do catadioptric telescopes use both concave and convex mirrors?</span></strong></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Some catadioptric telescope designs use both concave and convex mirrors to reduce the spherical aberrations caused by marginal rays. These mirrors can be placed as corrector plates or as a part of the objective depending on the requirements. Obtaining a proper degree of divergence and convergence is necessary for accurate image formation. These lenses are strategically placed to suit the need of the particular telescope.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h2 class="has-background" data-dcnode-id="803" style="background-color:#c6ffea"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">THE ADVANTAGES OF CATADIOPTRIC TELESCOPES</span></strong></h2><span data-dcnode-id="802" instrument_node="">
</span><ul data-dcnode-id="789"><li data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Catadioptric Telescopic designs operate with a folded-path optical system, unlike refractors and Newtonian reflecting telescopes that use a linear optical path. This allows the telescope to be shorter than the size implied by its focal length.</span></li><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">These telescopes and telescopic mounts are designed to be compact and weigh a lot less compared to telescopes of other designs having the same configuration.</span></li><li data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Catadioptric Telescopic designs have increased portability and are easy to transport. This is because they have a reduced mechanical size and weight.</span></li><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">These telescopes use mirrors that have purely spherical figures and refractive elements that can be conveniently (generally termed as corrector lenses). Using such elements reduces the overall manufacturing costs of the telescope.&nbsp;</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">The Catadioptric telescope’s secondary mirror provides additional power while reflecting the cone of light coming out of the primary mirror.&nbsp;</span></li><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">A large aperture Catadioptric Telescopic design provides a better inherent angular resolution and better light gathering ability than a small aperture telescope.&nbsp;</span></li></ul><span data-dcnode-id="788" instrument_node="">
</span><h2 class="has-background" data-dcnode-id="785" style="background-color:#ffcfd0"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">THE DISADVANTAGES OF CATADIOPTRIC TELESCOPES</span></strong></h2><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">1. With an increase in aperture, the Catadioptric Telescopic designs tend to become heavier rather quickly.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">2. These telescopes have the requirement to be optically aligned more frequently compared to refractors. The methods of aligning these telescopes is also a bit complex.&nbsp;</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">3. The mobile parts of a catadioptric telescopic design are generally more complex or complicated in design than those present in reflector or refractor telescopes.</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">4. Catadioptric telescopes face an intrinsic optical performance inadequacy due to the central obscuration of their aperture produced by their own secondary mirror. However, this particular issue is also experienced in Newtonian and classical Cassegrain reflecting telescopes. </span></p><span data-dcnode-id="772" instrument_node="">
</span><h2 data-dcnode-id="766"><strong data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">What are the different variants of Catadioptric </span><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Telescopic design</span></strong><span data-dcnode-id="768" instrument_node="">s?</span></strong></h2><span data-dcnode-id="765" instrument_node="">
</span><h3 data-dcnode-id="760"><strong data-dcnode-id="761"><span data-dcnode-id="764" instrument_node="">Argunov-Cassegrain Catadioptric </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Telescopic design</span></strong></strong></h3><span data-dcnode-id="759" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="746"><figure class="aligncenter size-large is-resized" data-dcnode-id="747"><img alt="" class="wp-image-30141" data-dcnode-id="758" height="181" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/wp-content/uploads/2020/09/Diagram_Reflector_ArgunovCassegrain.svg-1-1024x614.png&amp;raw" width="324"><figcaption data-dcnode-id="748"><span data-dcnode-id="757" instrument_node="">Image source: </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/User%3AHHahn" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="756" instrument_node="">HHahn</span></a><span data-dcnode-id="754" instrument_node="">,&nbsp;</span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADiagram%2520Reflector%2520ArgunovCassegrain.svg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="753" instrument_node="">Diagram Reflector ArgunovCassegrain</span></a><span data-dcnode-id="751" instrument_node="">,&nbsp;</span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0/legalcode" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="750" instrument_node="">CC BY-SA 3.0</span></a></figcaption></figure></div><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">The Argunov-Cassegrain telescope is a variant of the Catadioptric Cassegrain telescope in which the majority of the optical instruments used are spherical. P.P Argunov introduced this design in 1972. These lens elements are placed at the focus of the larger objective. The&nbsp;</span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mangin_mirror" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="743" instrument_node="">Mangin mirror</span></a><span data-dcnode-id="741" instrument_node="">&nbsp;element is placed furthest from the primary mirror and works as a second surface mirror with a surface reflective coating applied to its sky-facing side.</span></p><span data-dcnode-id="739" instrument_node="">
</span><h3 data-dcnode-id="736"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Maksutov-Cassegrain Catadioptric Telescopic design</span></strong></h3><span data-dcnode-id="735" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="722"><figure class="aligncenter size-large is-resized" data-dcnode-id="723"><img alt="catadioptric telescope" class="wp-image-30140" data-dcnode-id="734" height="206" loading="lazy" sizes="(max-width: 412px) 100vw, 412px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1-1024x512.png&amp;raw" srcset="https://lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1-1024x512.png 1024w, https://lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1-300x150.png 300w, https://lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1-768x384.png 768w, https://lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1-1536x768.png 1536w, https://lambdageeks.com/wp-content/uploads/2020/09/Maksutov-Cassegrain-Telescope.svg-1.png 1920w" width="412"><figcaption data-dcnode-id="724"><span data-dcnode-id="733" instrument_node="">Image source: </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/User%3AGriffenjbs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">Griffenjbs</span></a><span data-dcnode-id="730" instrument_node="">,&nbsp;</span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3AMaksutov-Cassegrain-Telescope.svg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="729" instrument_node="">Maksutov-Cassegrain-Telescope</span></a><span data-dcnode-id="727" instrument_node="">, marked as public domain, more details on&nbsp;</span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Template%3APD-self" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="726" instrument_node="">Wikimedia Commons</span></a></figcaption></figure></div><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">The Maksutov-Cassegrain is a&nbsp;</span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maksutov_telescope" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="719" instrument_node="">Maksutov telescope</span></a><span data-dcnode-id="717" instrument_node="">&nbsp;variant that is named after the Russian astronomer and optician Dmitri Dmitrievich Maksutov. This variant comprises an optically transparent corrector lens along with a section of a hollow sphere. This design requires a spherical primary mirror and a spherical secondary mirror, which is usually a section of mirrored section corrector lenses. The Maksutov telescope can be air-sealed and collimated, so these telescopes are considered to be low maintenance.</span></p><span data-dcnode-id="715" instrument_node="">
</span><h3 data-dcnode-id="712"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Klevtsov-Cassegrain Catadioptric Reflector</span></strong></h3><span data-dcnode-id="711" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="698"><figure class="aligncenter size-large is-resized" data-dcnode-id="699"><img alt="" class="wp-image-30142" data-dcnode-id="710" height="195" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/wp-content/uploads/2020/09/Diagram_Reflector_KlevtsovCassegrain.svg-1-1024x614.png&amp;raw" width="350"><figcaption data-dcnode-id="700"><span data-dcnode-id="709" instrument_node="">Image source: </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/User%3AHHahn" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="708" instrument_node="">HHahn</span></a><span data-dcnode-id="706" instrument_node="">,&nbsp;</span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ADiagram%2520Reflector%2520KlevtsovCassegrain.svg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">Diagram Reflector KlevtsovCassegrain</span></a><span data-dcnode-id="703" instrument_node="">,&nbsp;</span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0/legalcode" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="702" instrument_node="">CC BY-SA 3.0</span></a></figcaption></figure></div><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The Klevtsov-Cassegrain has a similar design and mechanism to the Argunov-Cassegrain telescope. This telescopic design was first envisioned by G. I. Popov and was practically implemented by Yuri A. Klevtsov. This instrument is fitted with a sub-aperture corrector, a small meniscus lens, and a Mangin mirror as its “secondary mirror”. The corrector and the Mangin mirror are held with a spider vane in an open telescopic tube.</span></p><span data-dcnode-id="694" instrument_node="">
</span><h3 data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Schmidt-Cassegrain Catadioptric Reflector</span></strong></h3><span data-dcnode-id="690" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="677"><figure class="aligncenter size-large is-resized" data-dcnode-id="678"><img alt="" class="wp-image-30139" data-dcnode-id="689" height="206" loading="lazy" sizes="(max-width: 411px) 100vw, 411px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1-1024x512.png&amp;raw" srcset="https://lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1-1024x512.png 1024w, https://lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1-300x150.png 300w, https://lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1-768x384.png 768w, https://lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1-1536x768.png 1536w, https://lambdageeks.com/wp-content/uploads/2020/09/Schmidt-Cassegrain-Telescope.svg-1.png 1920w" width="411"><figcaption data-dcnode-id="679"><span data-dcnode-id="688" instrument_node="">Image source: </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/User%3AGriffenjbs" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="687" instrument_node="">Griffenjbs</span></a><span data-dcnode-id="685" instrument_node="">,&nbsp;</span><a data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%3ASchmidt-Cassegrain-Telescope.svg" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="684" instrument_node="">Schmidt-Cassegrain-Telescope</span></a><span data-dcnode-id="682" instrument_node="">, marked as public domain, more details on&nbsp;</span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/Template%3APD-self" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="681" instrument_node="">Wikimedia Commons</span></a></figcaption></figure></div><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">The Schmidt-Cassegrain reflector was influenced by the wide-field Schmidt camera in 1940 by James Gilbert Baker. The Cassegrain setup gives us a comparatively narrower field of view. The&nbsp;</span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schmidt_corrector_plate" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="674" instrument_node="">Schmidt corrector plate</span></a><span data-dcnode-id="672" instrument_node="">&nbsp;is known for being one of the first optical element. It works by the generation of a vacuum on one end of the plate and accurately adjusting for rectifying the spherical aberration generated by the spherical primary mirror. Amateur astronomers widely use these telescopes.&nbsp;</span></p><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">What is Photographic catadioptric lenses or short tube catadioptric equatorial reflector telescope?</span></strong></h2><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Several variants of catadioptric lenses (CATs) are incorporated into camera lenses. These lenses are also known as mirror lenses and reflex lenses. The design in which these lenses are incorporated reduces the length of the entire optical setup by folding the optical path and by the telephoto effect of the convex secondary mirror. This effect is used for multiplying the focal length of the optical system by 3 to 4 times. These lens systems are therefore much more compact and have a tube length ranging from 200mm to 1000mm. The photographic catadioptric lens system also reduces or eliminates the chromatic and off-axis aberrations. The images formed by such an optical system can fill the large focal plane of a camera.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h2 data-dcnode-id="660"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Catadioptric telescope vs Reflector vs Refractors</span></strong></h2><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">A Reflector telescope incorporates the use of only mirrors in its design to gather and focus light for forming images. The Newtonian reflector is the most common example of a reflecting telescope that is built with a primary and a secondary mirror. Reflectors or reflective telescopes often have to deal with the issues of off-axis aberrations. The primary mirror gathers the light and directs it towards the secondary mirror that further reflects the light towards the eyepiece.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">A refractor or a refracting telescope incorporates the use of only lenses in its design to gather and focus light for forming images. These telescopes often have very long tubes and therefore, suffer from chromatic aberrations. One lens is used to gather light and form an inverted image falling on the focal point of the magnifying eyepiece lens. </span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">A Catadioptric telescope, as mentioned above forms an image by combining specially built mirrors and lenses. The chromatic and off-axis aberration is eliminated in the case of these telescopes.</span></p><span data-dcnode-id="650" instrument_node="">
</span><h2 data-dcnode-id="647"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Catadioptric telescope uses:</span></strong></h2><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Catadioptric telescopes have a shorter tube length, a better balancing structure, lighter weight, and adjustable eyepieces. All these factors contribute to making these telescopic variants convenient for astronomical observation at different locations by amateur astronomers. These telescopes are also modified and combined with digital technology for astrophotography. These telescopes can also be used as general function telescopes. A large aperture telescope provides a better inherent angular resolution and better light gathering ability than a small aperture telescope.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="642"></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="640" instrument_node="">To know more about telescopes </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/reflecting-telescope/"><span data-dcnode-id="639" instrument_node="">https://lambdageeks.com/reflecting-telescope/</span></a><span data-dcnode-id="637" instrument_node=""> &amp; </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/steps-to-use-a-telescope-parts-of-a-telescope/"><span data-dcnode-id="636" instrument_node="">https://lambdageeks.com/steps-to-use-a-telescope-parts-of-a-telescope/</span></a></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="632"></p><span data-dcnode-id="631" instrument_node="">
</span><footer class="author_bio_section" data-dcnode-id="618"><i data-dcnode-id="628"><p class="author_name" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">About Sanchari Chakraborty</span></p></i><i data-dcnode-id="620"><p class="author_details" data-dcnode-id="621"><img alt="" class="avatar avatar-90 photo" data-dcnode-id="627" height="90" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambdageeks.com/wp-content/uploads/2021/01/Sanchari-Chakraborty-150x150.jpg&amp;raw" srcset="https://lambdageeks.com/wp-content/uploads/2021/01/Sanchari-Chakraborty-150x150.jpg 2x" width="90"><span data-dcnode-id="626" instrument_node="">I am an eager learner, currently invested in the field of Applied Optics and Photonics. I am also an active member of SPIE (International society for optics and photonics) and OSI(Optical Society of India). My articles are aimed towards bringing quality science research topics to light in a simple yet informative way. Science has been evolving since time immemorial. So, I try my bit to tap into the evolution and present it to the readers.</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">
