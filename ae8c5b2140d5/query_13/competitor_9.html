</span><p class="posted_info desc lighter ipsType_small" data-dcnode-id="3976"><span data-dcnode-id="3980" instrument_node="">
					Posted </span><abbr class="published" data-dcnode-id="3978" itemprop="commentTime" title="2017-06-28T13:05:39+00:00"><span data-dcnode-id="3979" instrument_node="">28 June 2017 - 08:05 AM</span></abbr><span data-dcnode-id="3977" instrument_node="">
</span></p><span data-dcnode-id="3975" instrument_node="">
</span><div class="post entry-content" data-dcnode-id="3931" itemprop="commentText"><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">Viking 1, There have been a few historical brief partial&nbsp;write-ups on Rick Singmaster's Starmaster Portable Telescopes over the years. I am a little fuzzy on when his scopes became commercially available but my best recollection is about the mid 1990's with scopes that were painted with grey paint and were in the 10"-12.5" sizes which were fairly large scopes for that era. Rick was using John Hall's mirrors I think along with Alan Raycraft.</span></p><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">In the late 90's and/or early 2000's, Rick really came into his own with several innovations. One brilliant idea was to take a bunch of thin 7.1" 3/4" "ash tray" pieces of glass into mirrors&nbsp;and have numerous opticians figure them for a very inexpensive sonatube alt/az Newtonian called an Oak Classic. These scopes were generally exceptional performers and very moderately priced at about $599-999. One of the opticians that emerged from about 5 opticians that were willing to figure the mirrors for something like $75-100/each was Carl Zambuto. Carl produced about 40 mirrors for Rick and all of those scopes have become sought after pieces with the most expensive one being sold for over $4000.00. I in fact owned that particular scope and the fellow that sold it to me asked for it back as he had a buyer that was willing to pay that enormous sum. I sold the scope back to him for what I had paid&nbsp;and off it went to the ultimate buyer.</span></p><span data-dcnode-id="3964" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3961" instrument_node="">
</span><p data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">As the Oak Classic was taking off, Rick Singmaster was getting enough sales to begin producing his legendary line of Newtonian telescopes that ranged from 7.1" up to 30". Rick who was an accomplished amateur astronomer and former civil engineer (OJT trained primarily IIRC), paired up with Victor McKeegan of Sky Engineering (who is a formally trained engineer)&nbsp;and developed with about a reported 3000 hours of combined invested time, the finest (at that time) integrated GOTO/Tracking system for large Newtonian telescopes. To this day, there have only been two reported cases of a gearbox failure in the hundreds of scopes that were equipped with his stepper-based tracking systems.</span></p><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3955" instrument_node="">
</span><p data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Many of us, including myself who recently purchased my 35th Starmaster and one of the last two telescopes to come out of his shop in 2015, recognized that Singmaster's talents were in being able to make relatively simple, non-complex designs that were functionally elegant and&nbsp;worked as well as anything on the market. As many of us owners liked to mention, Starmaster telescopes could be equaled but not bested on the fields they operated on for the majority of time that the scopes were being manufactured. Another of Singmaster's significant accomplishments was to identify opticians that could produce the level of quality that Rick demanded from his suppliers. Rick was instrumental in boosting the careers of folks like John Hall of Pegasus Optical, Carl Zambuto of Zambuto Optical, Steve Kennedy of Kennedy Optical, and Mike Lockwood of Lockwood Optics. With the exception of Steve Kennedy who had been making mirrors commercially for a prolonged period of time and whos mirrors were used for a limited time in Starmasters, Singmaster's use of the above-mentioned relatively unknown opticians&nbsp;at the time of Singmaster's adoption of their products&nbsp;really helped to cement their (opticians)&nbsp;reputations in the industry. The marriage of decent structures with excellent mirrors was the glue that propelled Starmaster and the above-named opticians into the Newtonian limelight. Additionally, Rick was always looking for ways to spur sales and improve his products and he&nbsp;with the help of his opticians designed thinner and faster mirrors which for the most part worked well in his wiffle-tree designed mirror cells and&nbsp;helped shape the overall Newtonian&nbsp;telescope industry.&nbsp;&nbsp;</span></p><span data-dcnode-id="3952" instrument_node="">
</span><p data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">One of the reasons that you will not find a lot of "chest thumping" coming from Rick Singmaster is that he purposely let his telescopes do his talking rather than getting on these forums and self-promoting. He would occasionally quietly discuss other maker's scope performance if cajoled&nbsp;but distained manufacturers who publicly disparaged their competition in open forums or on the observing field.&nbsp;He would frequently opine to me that it was not his place to knock or disparage another&nbsp;persons equipment because he felt it was a bad practice for the shared love we have of Newtonians and astronomy in general. IIRC, Singmaster did his Herschel 400 with a 13.1" Coulter tube Newtonian before building Starmasters.&nbsp;Rick was known to help a fellow astronomer collimate or fix some problem of a scope that was not a Starmaster.&nbsp;Another of Singmaster's attributes is that he attempted to star test every telescope that left his shop and would generally try and have a comparative scope out during the testing to insure that it was not the atmosphere that was impacting his scope evaluations. Rick would quietly return any mirrors that he found to be not up to his standards to the various opticians and did not make a big deal out of it. These activities essentially insured for the most part that customers would not have to worry about getting a scope with glaring defects in workmanship or mirror quality. Rick also somewhat tirelessly for&nbsp;much of his telescope building career was&nbsp;experimenting with different designs and features, many of which never came to light and were quietly shelved because they did not meet his stringent expectations for performance.</span></p><span data-dcnode-id="3946" instrument_node="">
</span><p data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3943" instrument_node="">
</span><p data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">One of the most endearing and phenomenal things about buying a Starmaster telescope was that Rick was available 7 days a week to answer any questions or patiently troubleshoot a problem with one of his scopes. He additionally stated that his 2-year warranty would be extended for the life of the telescope, no matter who owned it,&nbsp;as long as you didn't&nbsp;tick him off. Singmaster would simply&nbsp;suggest&nbsp;that he is a tough, straight talking&nbsp;Kansan that wanted to look through excellent telescopes and somewhat eschewed the accolades and effete words/attitudes that some of us (I'm guilty)&nbsp;brought to the fore.</span></p><span data-dcnode-id="3940" instrument_node="">
</span><br data-dcnode-id="3939"><span data-dcnode-id="3938" instrument_node="">
</span><p class="edit" data-dcnode-id="3933"><span data-dcnode-id="3937" instrument_node="">
</span><strong data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Edited by Bob S., 28 June 2017 - 03:24 PM.</span></strong><span data-dcnode-id="3934" instrument_node="">
</span></p><span data-dcnode-id="3932" instrument_node="">

					Posted </span><abbr class="published" data-dcnode-id="3148" itemprop="commentTime" title="2018-07-07T02:27:31+00:00"><span data-dcnode-id="3149" instrument_node="">06 July 2018 - 09:27 PM</span></abbr><span data-dcnode-id="3147" instrument_node="">
</span></p><span data-dcnode-id="3145" instrument_node="">
</span><div class="post entry-content" data-dcnode-id="3116" itemprop="commentText"><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">I just stumbled across this thread and it has been a pleasure to read it. I have been a member of the Astronomical Society of Kansas City for over 30 years. My first experience with Rick's telescopes were when he brought a couple of them to a club meeting and offered them for sale. He was known as that guy from down around Ft. Scott who was building telescopes. And the color? I remember them being black. Now I am aware of the gray fleck paint on the early Starmasters but I also remember these being black. My first experience with Rick, that I can remember, was during the annular solar eclipse of 1994. Center line for that eclipse went through his backyard. Rick invited everyone over and a bunch of us went over and spent the night there. We looked though his personal telescope. I think it was a 13”? Maybe the Coulter? But it gave fantastic views of the planets. Did he re-figure the mirror in the 13”? Or maybe I am thinking of great planetary views though one of his later Starmasters?</span></p><span data-dcnode-id="3140" instrument_node="">
</span><p data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node="">Yes, he did work on telescopes for other people. At the time I had a 16” Meade Starfinder on a German Equatorial mount. It had a 4” secondary and the spider was so weak that the mirror would sag. The primary cell was not designed well either. Rick told me that if I ordered the Novak secondary system he would install it in the Meade for me. He also changed how the primary mounted in the cell and he gave me a 3.1 secondary. That reduced the secondary obstruction and made the secondary less flexible. Rick didn't charge me a dime to do that.</span></p><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">In September of 1998 I answered an add on Astromart and I purchased a used 20” F 4.5 Starmaster. As it turns out this is Starmaster 20-#1, the first 20” Starmaster Rick ever built. It was also the first Starmaster to have Sky Commander on it. In January of 2000 Rick emailed me and told me that he was redesigning the primary mirror cells. He had found a flaw in the first few 20” cells. He offered to sell me a new cell or send mine in and have it modified. This was the wiffle tree cell. This 20” saw first light at the Texas Star Party in 1996. I still have this telescope. I have owned it for almost 20 years now. And if you have a Starmaster owners manual for the larger truss telescopes you have seen my 20”. It is on the cover of the owners manuals. Later Rick introduced GOTO and I took my 20” to the Starmaster Factory in Arcadia and had Rick put GOTO on it.</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Speaking of 7” Oak Classics. I have one of them too. Now this story may get long, and may get funny, and it may give you an insight to Rick, one you may have known about. I purchased my 7” in March of&nbsp; 1999. I purchased it used, and I gave a used price for it too! A bargain. If I remember correctly, Rick and I talked about the history of the Oak Classic. If I remember correctly Rick told me he made about 150 Oak Classics. But it is the last 38 or 40 that have become sought after. Those have the Zambuto primaries in them and the 2” JSL Crayford focusers. I have a printed copy of an email from Rick saying that those sold for $900 but he knew of people who were paying $1,000 for used ones. Rick sent that email to me in March of 1999, which should have been about the time he stopped making the Oak Classic. Who remembers the 7” F 5.6 Self Storing Telescope that Rick made? I have a printed Starmaster catalog, YES, Rick actually mailed printed catalogs back then. This “self storing telescope” was not listed as an Oak Classic. It had gray “stone” finish, a 2” Rhol Trax focuser, and a Tel Rad. Priced at $599. It was a hybrid telescope. The “tube” would separate from the mirror box with 4 hand bolt, then you turn the tube over and bolt it in the mirror box. I really unique telescope, I will see if I can get that section of the catalog uploaded. The 7” F 5.6 Widefield Oak Classic is also listed in the catalog. The same 2” Rhol Trax focuser and Tel Rad. Priced at $499!</span></p><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Back to my Oak Classic. After I picked it up I noticed that the altitude movement was very stiff. Bad enough that I had trouble keeping an object in the field of view. I called Rick and told him that I felt the 1” X 2” that set the distance between the two rocker boards was too short. Rick asked what 1x2? He told me that he never put a 1x2 between the rockers. He told me to bring it over. I took it over and I showed him. Showed him how it squeezed the rockers together and how the gray drawer slides were being pinched. Rick got ****! He never put a 1x2 in there and he never used gray drawer slides as friction between the rockers and the square box that the tube fit in. Someone had modified one of his telescopes. Then he pointed out that additional screws had been used when the 1x2 was put in the scope. And the screw heads had been put in the rocker boards without counter sinking a hole large enough to let the screw head go in to the plywood. But the modifier had screwed the heads into the plywood anyway. Rick tried to be careful, and he told me that the plywood would probably split but the screws had to be removed. Snap, a screw head broke. Rick went to the other side and tried it. Snap, the wood split. Rick grabs a hammer and says something about some SOB thinks they can build a better telescope than I can, and he takes the hammer to the 1x2. It goes flying. Then Rick picks up the tube assembly and sets it in the rockers and the telescope moves very freely! But the rocker boards have been splintered. Now, knowing Rick, I was not worried, but he did ask me if I was freaked out yet? I said no. Rick said that he was busy and to not bug him but that he would give me a call one of these days. I figured a month or so. Well, six days later Rick called and told me to come over. He had made two new rocker boards. He took my mount apart and when he was done it looked like, and worked like, new.</span></p><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">I have the certification papers on my 20” but I didn't have any on the 7”. I emailed Carl and he agreed to send me the papers on the 7”. Mine is Zambuto 7” Starmaster #8. That scope still performs like a refractor. I love it.</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">In addition to the 20” and the 7” I also have a 10” F 6 Starmaster truss telescope. Built in September of 1996, the same year as my 20”, it is just a smaller version of the 20”. It has an Allen Raycraft mirror in it. Rick took it in on trade and I bought it from him sight unseen. Something was wrong with the secondary holder so Rick put a new one in it a few months after I purchased it.</span></p><span data-dcnode-id="3122" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">I live less than an hour from Rick and I saw him last year. He is still the fun loving guy we all remember.</span></p><span data-dcnode-id="3119" instrument_node="">

</span><p data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">Mike, Thanks for a close-up account of Rick's exploits. I can't believe it but I think I am up to 37 or 38 total Starmasters over the past 17 years. I currently have a 14.5" f/4 Hybrid Starmaster with all of the bells and whistles and I plan to keep this scope forever. I purchased a complete backup drive system from a fellow Starmaster owner and will not ever have to worry about spares for as long as I want to use the scope. The nice thing about Rick's scopes is that if you take any reasonable care of them, they will essentially run trouble-free, forever. The reliability of Starmasters is really what legends are made of given how simple yet elegant the designs were/are. Thanks again for sharing as someone who has lived near Rick for a long time and been a great supporter of his works. Bob</span></p><span data-dcnode-id="2861" instrument_node="">

</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">for any big piece of glass to come close to the ambient temperature, IF it ever does.</span></p><span data-dcnode-id="2118" instrument_node="">

</span><div class="post entry-content" data-dcnode-id="1653" itemprop="commentText"><span data-dcnode-id="1681" instrument_node="">
</span><p class="citation" data-dcnode-id="1676"><span data-dcnode-id="1679" instrument_node="">Starman1, on 08 Jul 2018 - 2:21 PM, said:</span><a class="snapback right" data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com/index.php%3Fapp%3Dforums%26module%3Dforums%26section%3Dfindpost%26pid%3D8690340" rel="citation"><img data-dcnode-id="1678" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com//public/style_images/master/snapback.png&amp;raw"></a></p><blockquote class="ipsBlockquote built" data-author="Starman1" data-cid="8690340" data-dcnode-id="1669" data-time="1531084870"><p data-dcnode-id="1670"><span data-dcnode-id="1675" instrument_node="">I hope, however, that you add a fan or fans.&nbsp; Rick obviously lives someplace where the nighttime temperature barely drops from the daytime temps.</span><br data-dcnode-id="1674"><span data-dcnode-id="1673" instrument_node="">If you live in a place of dropping temperatures at night, you will need fans to come anywhere close to equilibrium.&nbsp; Without fan(s), it'll take hours</span><br data-dcnode-id="1672"><span data-dcnode-id="1671" instrument_node="">for any big piece of glass to come close to the ambient temperature, IF it ever does.</span></p></blockquote><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">Rick is no fan of fans. </span><span data-dcnode-id="1665" rel="lightbox"><img alt="grin.gif" class="bbc_img" data-dcnode-id="1666" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com//public/style_emoticons/default/grin.gif&amp;raw" title=":grin:"></span><br data-dcnode-id="1664"><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">I rarely have a need for them because in Florida the temperature drops are usually slight. Plus, Rick used thin mirrors and an open design exposing the back of the mirror. It also helps that the mirror is detachable, so if it's warm, I'll keep the mirror in its transport box as long as possible. I do have a fan that attaches to the back frame with string (similar to Dick's), but I've only needed to use it once or twice.
					
					</span><br data-dcnode-id="1661"><span data-dcnode-id="1660" instrument_node="">

</span><div data-dcnode-id="1230"><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Different horses for different courses, I guess.</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">I have 3 fans on a thin 12.5" mirror, and need to have them run all night to keep the mirror at ambient.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">(I get a 30-40° drop in temperature from day to night where I observe)</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">As you point out, though, it's simple enough to add a fan or fans.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Mini-bungee cords make excellent attachment methods to eliminate vibration.</span></p><span data-dcnode-id="1231" instrument_node="">
</span></div><span data-dcnode-id="1229" instrument_node="">
</span></blockquote><span data-dcnode-id="1227" instrument_node="">

</span><div class="post_body" data-dcnode-id="1037"><span data-dcnode-id="1100" instrument_node="">
</span><p class="posted_info desc lighter ipsType_small" data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">
					Posted </span><abbr class="published" data-dcnode-id="1097" itemprop="commentTime" title="2018-07-10T00:44:18+00:00"><span data-dcnode-id="1098" instrument_node="">09 July 2018 - 07:44 PM</span></abbr><span data-dcnode-id="1096" instrument_node="">
</span></p><span data-dcnode-id="1094" instrument_node="">
</span><div class="post entry-content" data-dcnode-id="1062" itemprop="commentText"><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">To paraphrase what someone else told me a while back - don't use the "f-word" with Rick, that word being "fan"!</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Rick told me that he had observed fans causing cooling-induced astigmatism in telescopes, and he wanted none of it in *his* telescopes.&nbsp; He was the first to really pay attention to the mirror cell and evolve and improve its design to help avoid edge support distortion, and he did not want to screw that up.</span></p><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1079" instrument_node="">I don't agree with avoiding fans - I think they are a necessity unless you live in Florida or similar climates </span><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">and</span></strong><span data-dcnode-id="1076" instrument_node=""> your area get a nice sea breeze through the night.&nbsp; The limited temperature drop makes equilibration possible, and the breeze (instead of fans) equilibrates air, ground, and telescopes.&nbsp; Together, these result in the conditions we all long for at the Winter Star Party.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">Most of us, though, need </span><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">even</span></strong><span data-dcnode-id="1067" instrument_node=""> cooling on the front and back of the mirror through most of the night to maximize performance.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span><span data-dcnode-id="1059" instrument_node="">

</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">I don't agree with avoiding fans - I think they are a necessity unless you live in Florida or similar climates and your area get a nice sea breeze through the night.&nbsp; The limited temperature drop makes equilibration possible, and the breeze (instead of fans) equilibrates air, ground, and telescopes.&nbsp; Together, these result in the conditions we all long for at the Winter Star Party.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">&nbsp;</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Most of us, though, need even cooling on the front and back of the mirror through most of the night to maximize performance.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">&nbsp;</span></p><span data-dcnode-id="922" instrument_node="">
</span></blockquote><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">&nbsp;</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><img alt=":waytogo:" class="bbc_emoticon" data-dcnode-id="916" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cloudynights.com//public/style_emoticons/default/waytogo.gif&amp;raw"></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">&nbsp;</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">I live in a mild climate a few miles from the ocean but unlike Florida, it's a cool ocean so the humidity is lower and the evening breeze brings cool air in off the ocean.&nbsp; The temperature typically drops several degrees around sunset, fans are an important if I want to get the good planetary and double star views.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">&nbsp;</span></p><span data-dcnode-id="905" instrument_node="">
