</span><li data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">X-ray</span></li><span data-dcnode-id="3448" instrument_node="">
</span></ul><span data-dcnode-id="3446" instrument_node="">
</span><h2 data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Introduction</span></h2><span data-dcnode-id="3443" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3442" instrument_node="">Many scientists interact directly with what they are studying. Biologists can collect cells, seeds, or sea urchins and put them in a controlled laboratory environment. Physicists can subject metals to stress or smash atoms into each other. Geologists can chip away at rocks to see what is inside. But&nbsp;</span><strong data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">astronomers</span></strong><span data-dcnode-id="3439" instrument_node="">, scientists who study the universe beyond Earth, rarely have a chance for direct contact with their subject. Astronomers observe their subjects at a distance, usually a very large distance!</span></p><span data-dcnode-id="3437" instrument_node="">
</span><h2 data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Electromagnetic Radiation</span></h2><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3433" instrument_node="">Earth is separated from the rest of the universe by very large expanses of space. Very rarely matter from outside Earth’s environment reaches us, such as when a meteorite makes it through the atmosphere from elsewhere in the solar system. But for the most part, astronomers have one main source for their data — light. Light can travel across empty space, and as it does, so it carries both energy and information. Light is one type of</span><strong data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">electromagnetic (EM) radiation</span></strong><span data-dcnode-id="3430" instrument_node="">, energy that is transmitted through space as a wave.</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3417"><span data-dcnode-id="3427" instrument_node="">These videos discuss infrared, ultraviolet, and radio telescopes, as well as telescopes that detect visible light, and reveal tremendous features of the stars and galaxies around the Universe&nbsp;</span><strong data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">(2d)</span></strong><span data-dcnode-id="3424" instrument_node="">:&nbsp;</span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DAK-gtuAJ-B4"><span data-dcnode-id="3423" instrument_node="">http://www.youtube.com/watch?v=AK-gtuAJ-B4</span></a><span data-dcnode-id="3421" instrument_node="">&nbsp;(2:19),&nbsp;</span><a data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youtube.com/watch%3Fv%3DaQJQH7lS27s"><span data-dcnode-id="3420" instrument_node="">http://www.youtube.com/watch?v=aQJQH7lS27s</span></a><span data-dcnode-id="3418" instrument_node="">&nbsp;(5:30).</span></p><span data-dcnode-id="3416" instrument_node="">

</span><h3 data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">The Speed of Light</span></h3><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Light travels faster than anything else in the universe. In the almost completely empty vacuum of space, light travels at a speed of approximately 300,000,000 meters per second (670,000,000 miles per hour). To give you an idea of how fast that is, a beam of light could travel from New York to Los Angeles and back again nearly 40 times in just one second. Even though light travels extremely fast, objects in space are so far away that it takes a significant amount of time for light from those objects to reach us. For example, light from the Sun takes about 8 minutes to reach Earth.</span></p><span data-dcnode-id="2276" instrument_node="">
</span><h3 data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Light-Years</span></h3><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2272" instrument_node="">Since astronomical distances are so large, it helps to have a unit of measurement that is good for expressing those large distances. A&nbsp;</span><strong data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">light-year</span></strong><span data-dcnode-id="2269" instrument_node="">&nbsp;is a unit of distance that is defined as the distance that light travels in one year. One light-year is approximately equal to 9,500,000,000,000 (9.5 trillion) kilometers, or 5,900,000,000,000 (5.9 trillion) miles (</span><strong data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Figure</span></strong><span data-dcnode-id="2266" instrument_node="">&nbsp; below). That’s a long way! But by astronomical standards, it’s actually a pretty short distance.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Proxima Centauri, the closest star to us after the Sun, is 4.22 light-years away. That means the light from Proxima Centauri takes 4.22 years to reach us. The galaxy we live in, the Milky Way Galaxy, is about 100,000 light-years across. How long does it take light to travel from one side of the galaxy to the other? 100,000 years! If an astronomer looks through a telescope at a star that is 1,000 light years away, is she seeing the star as it is now?</span></p><span data-dcnode-id="2261" instrument_node="">
</span><div data-dcnode-id="2252"><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2257"><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d665317f6e764beec2b8ea15b798c6b0244246f0f5113fed6d5786f0eIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="2259" longdesc="#The%20smallest%20red-shifted%20galaxies%20are%20among%20the%20most%20distant%20galaxies%20we%20have%20detected%20so%20far%20at%2013%20billion%20light-years%20away.%20That%27s%20over%20a%20hundred-billion-trillion%20%28100%2C000%2C000%2C000%2C000%2C000%2C000%2C000%29%20kilometers%21%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d665317f6e764beec2b8ea15b798c6b0244246f0f5113fed6d5786f0eIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="2256" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">The smallest red-shifted galaxies are among the most distant galaxies we have detected so far at 13 billion light-years away. That’s over a hundred-billion-trillion (100,000,000,000,000,000,000,000) kilometers!</span></p><span data-dcnode-id="2253" instrument_node="">
</span></div><span data-dcnode-id="2251" instrument_node="">
</span><h3 data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Looking Back in Time</span></h3><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2247" instrument_node="">When we look at astronomical objects such as stars and galaxies, we are not just seeing over great distances—we are also seeing back in time. Because light takes time to travel, the image we see of a distant galaxy is an image of how the galaxy used to look. For example, the Andromeda Galaxy, shown in (</span><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Figure</span></strong><span data-dcnode-id="2244" instrument_node="">&nbsp; below), is about 2.5 million light years from Earth. If you look at the Andromeda Galaxy through a telescope, what are you seeing? You are seeing the galaxy as it was 2.5 million years ago. If the galaxy ceased to exist 1 million years ago, when would you know that? If you want to see the galaxy as it is now, you will have to wait and look again 2.5 million years into the future.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><div data-dcnode-id="2233"><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2238"><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dd4241d835e842143447f48a0bd1361bbfc722e2acc5dd0ba824c07bfIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="2240" longdesc="#This%20recent%20picture%20of%20the%20Andromeda%20Galaxy%20actually%20shows%20the%20galaxy%20as%20it%20was%20about%202.5%20million%20years%20ago.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dd4241d835e842143447f48a0bd1361bbfc722e2acc5dd0ba824c07bfIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">This recent picture of the Andromeda Galaxy actually shows the galaxy as it was about 2.5 million years ago.</span></p><span data-dcnode-id="2234" instrument_node="">
</span></div><span data-dcnode-id="2232" instrument_node="">
</span><h3 data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Electromagnetic Waves</span></h3><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2228" instrument_node="">Light is one type of EM radiation; light is energy that travels in the form of an&nbsp;</span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">electromagnetic wave</span></em><span data-dcnode-id="2225" instrument_node="">. (</span><strong data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Figure</span></strong><span data-dcnode-id="2222" instrument_node="">&nbsp; below) shows a diagram of an electromagnetic wave. An EM wave has two components: an electric field and a magnetic field. Each of these components oscillates between positive and negative values, which is what makes the “wavy” shape in the diagram.</span></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2212"><span data-dcnode-id="2219" instrument_node="">The distance between two adjacent oscillations is called&nbsp;</span><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">wavelength</span></strong><span data-dcnode-id="2216" instrument_node="">. A related value is&nbsp;</span><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">frequency</span></strong><span data-dcnode-id="2213" instrument_node="">, which measures the number of wavelengths that pass a given point every second. Wavelength and frequency are reciprocal, which means that as one increases, the other decreases.</span></p><span data-dcnode-id="2211" instrument_node="">
</span><div data-dcnode-id="2202"><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2207"><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d52472f3d9eca199e9349c65b9b7984e65e084356592321a3d9d5f37eIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="2209" longdesc="#An%20electromagnetic%20wave%20consists%20of%20oscillating%20electric%20and%20magnetic%20fields.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d52472f3d9eca199e9349c65b9b7984e65e084356592321a3d9d5f37eIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">An electromagnetic wave consists of oscillating electric and magnetic fields.</span></p><span data-dcnode-id="2203" instrument_node="">
</span></div><span data-dcnode-id="2201" instrument_node="">
</span><h3 data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">The Electromagnetic Spectrum</span></h3><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2188"><strong data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">Visible light</span></strong><span data-dcnode-id="2195" instrument_node="">&nbsp;— the light that human eyes can see — comes in a variety of colors. The color of visible light is determined by its wavelength. Visible light ranges from wavelengths of 400 nm to 700 nm, corresponding to the colors violet through red. EM radiation with wavelengths shorter than 400 nm or longer than 700 nm exists all around you — you just can’t see it. The full range of electromagnetic radiation, or the</span><strong data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">electromagnetic spectrum</span></strong><span data-dcnode-id="2192" instrument_node="">, is shown in&nbsp;</span><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Figure</span></strong><span data-dcnode-id="2189" instrument_node="">&nbsp; below.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><div data-dcnode-id="2178"><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2183"><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d99e58a1a9a5c5c782eed5b695a2ab42d88e7b55dd53cb084cc1102acIMAGEIMAGE.1"><img alt="" data-dcnode-id="2185" longdesc="#%28a%29%20Visible%20light%20is%20part%20of%20the%20electromagnetic%20spectrum%2C%20which%20ranges%20from%20gamma%20rays%20with%20very%20short%20wavelengths%2C%20to%20radio%20waves%20with%20very%20long%20wavelengths.%20%28b%29%20These%20are%20images%20of%20the%20same%20scene.%20In%20the%20top%2C%20only%20the%20wavelengths%20of%20visible%20light%20show.%20In%20the%20bottom%2C%20a%20layer%20of%20thick%20clouds%20appears%20in%20the%20infrared%20wavelengths.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/sm_f-d99e58a1a9a5c5c782eed5b695a2ab42d88e7b55dd53cb084cc1102acIMAGEIMAGE.1.jpg&amp;raw" title=""></a></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">(a) Visible light is part of the electromagnetic spectrum, which ranges from gamma rays with very short wavelengths, to radio waves with very long wavelengths. (b) These are images of the same scene. In the top, only the wavelengths of visible light show. In the bottom, a layer of thick clouds appears in the infrared wavelengths.</span></p><span data-dcnode-id="2179" instrument_node="">
</span></div><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Like our Sun, every star emits light at a wide range of wavelengths, all across the visible spectrum and even outside the visible spectrum. Astronomers can learn a lot from studying the details of the spectrum of light from a star.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2173" instrument_node="">Some very hot stars emit light primarily at&nbsp;</span><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">ultraviolet (UV)</span></strong><span data-dcnode-id="2170" instrument_node="">&nbsp;wavelengths, while some very cool stars emit mostly in the&nbsp;</span><strong data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">infrared</span></strong><span data-dcnode-id="2167" instrument_node="">. There are extremely hot objects that emit&nbsp;</span><strong data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">X-rays</span></strong><span data-dcnode-id="2164" instrument_node="">&nbsp;and even&nbsp;</span><strong data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">gamma rays</span></strong><span data-dcnode-id="2161" instrument_node="">. Light from some of the faintest, most distant objects is in the form of&nbsp;</span><strong data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">radio waves</span></strong><span data-dcnode-id="2158" instrument_node="">. In fact, a lot of the objects most interesting to astronomers today can’t even be seen with the naked eye. Astronomers use telescopes to detect the faint light from distant objects and to see objects at wavelengths all across the electromagnetic spectrum.</span></p><span data-dcnode-id="2156" instrument_node="">
</span><p data-dcnode-id="2151"><span data-dcnode-id="2155" instrument_node="">To learn more about star’s spectra, check out&nbsp;</span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.colorado.edu/physics/PhysicsInitiative/Physics2000/quantumzone/"><span data-dcnode-id="2154" instrument_node="">http://www.colorado.edu/physics/PhysicsInitiative/Physics2000/quantumzone/</span></a><span data-dcnode-id="2152" instrument_node="">.</span></p><span data-dcnode-id="2150" instrument_node="">
</span><h2 data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Types of Telescopes</span></h2><span data-dcnode-id="2147" instrument_node="">
</span><h3 data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Optical Telescopes</span></h3><span data-dcnode-id="2144" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2143" instrument_node="">People have been making and using lenses for magnification for thousands of years. However, the first true telescopes were made in Europe in the late 16th century. These telescopes used a combination of two lenses to make distant objects appear both nearer and larger. The term&nbsp;</span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">telescope</span></em><span data-dcnode-id="2140" instrument_node="">was coined by the Italian scientist and mathematician Galileo Galilei (1564–1642). Galileo built his first telescope in 1608 and subsequently made many improvements to telescope design.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2137" instrument_node="">Telescopes that rely on the refraction, or bending, of light by lenses are called&nbsp;</span><strong data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">refracting telescopes</span></strong><span data-dcnode-id="2134" instrument_node="">, or simply&nbsp;</span><em data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">refractors</span></em><span data-dcnode-id="2131" instrument_node="">. The earliest telescopes, including Galileo’s, were all refractors. Many of the small telescopes used by amateur astronomers today are refractors. Refractors are particularly good for viewing details within our solar system, such as the surface of Earth’s moon or the rings around Saturn (</span><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Figure</span></strong><span data-dcnode-id="2128" instrument_node="">&nbsp; below).</span></p><span data-dcnode-id="2126" instrument_node="">
</span><div data-dcnode-id="2117"><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2122"><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d03fb3219140eaad4bf6007920bb343958fddaf8df55a90065b8e1adeIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="2124" longdesc="#The%20largest%20refracting%20telescope%20in%20the%20world%20is%20at%20the%20University%20of%20Chicago%27s%20Yerkes%20Observatory%20in%20Wisconsin%20and%20was%20built%20in%201897.%20Its%20largest%20lens%20has%20a%20diameter%20of%20102%20cm.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d03fb3219140eaad4bf6007920bb343958fddaf8df55a90065b8e1adeIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">The largest refracting telescope in the world is at the University of Chicago’s Yerkes Observatory in Wisconsin and was built in 1897. Its largest lens has a diameter of 102 cm.</span></p><span data-dcnode-id="2118" instrument_node="">
</span></div><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2115" instrument_node="">Around 1670, another famous scientist and mathematician — Sir Isaac Newton (1643–1727) — built a different kind of telescope. Newton used curved mirrors to focus light and so created the first&nbsp;</span><strong data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">reflecting telescopes</span></strong><span data-dcnode-id="2112" instrument_node="">, or&nbsp;</span><em data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">reflectors</span></em><span data-dcnode-id="2109" instrument_node="">&nbsp;(</span><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Figure</span></strong><span data-dcnode-id="2106" instrument_node="">&nbsp; below). The mirrors in a reflecting telescope are much lighter than the heavy glass lenses in a refractor. This is significant, because:</span></p><span data-dcnode-id="2104" instrument_node="">
</span><ul data-dcnode-id="2093"><span data-dcnode-id="2103" instrument_node="">
</span><li data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">To support the thick glass lenses a refractor must be strong and heavy.</span></li><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Mirrors are easier to make precisely than it is to make glass lenses.</span></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Because they do not need to be as heavy to support the same size lens, reflectors can be made larger than refractors.</span></li><span data-dcnode-id="2094" instrument_node="">
</span></ul><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Larger telescopes can collect more light and so they can study dimmer or more distant objects. The largest optical telescopes in the world today are reflectors.</span></p><span data-dcnode-id="2089" instrument_node="">
</span><div data-dcnode-id="2080"><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2085"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d323d4e677c4940afc27f1ad9b3f4e8633ba59336fe5d849107530fcfIMAGEIMAGE.1"><img alt="" data-dcnode-id="2087" longdesc="#%28a%29%20Reflecting%20telescopes%20used%20by%20amateur%20astronomers%20today%20are%20similar%20to%20the%20one%20designed%20by%20Isaac%20Newton%20in%20the%2017th%20century.%20%28b%29%20The%20South%20African%20Large%20Telescope%20%28SALT%29%20is%20one%20of%20the%20largest%20reflecting%20telescopes%20on%20Earth.%20SALT%27s%20primary%20mirror%20consists%20of%2091%20smaller%20hexagonal%20mirrors%2C%20each%20with%20sides%201%20m%20long.%20%28c%29%20Many%20amateur%20astronomers%20today%20use%20catadioptric%20telescopes.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/sm_f-d323d4e677c4940afc27f1ad9b3f4e8633ba59336fe5d849107530fcfIMAGEIMAGE.1.jpg&amp;raw" title=""></a></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">(a) Reflecting telescopes used by amateur astronomers today are similar to the one designed by Isaac Newton in the 17th century. (b) The South African Large Telescope (SALT) is one of the largest reflecting telescopes on Earth. SALT’s primary mirror consists of 91 smaller hexagonal mirrors, each with sides 1 m long. (c) Many amateur astronomers today use catadioptric telescopes.</span></p><span data-dcnode-id="2081" instrument_node="">
</span></div><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2075"><strong data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Catadioptric telescopes</span></strong><span data-dcnode-id="2076" instrument_node="">&nbsp;have a combination of mirrors and lenses to focus light. Catadioptric telescopes have large mirrors to collect a lot of light, but short tubes for portability.</span></p><span data-dcnode-id="2074" instrument_node="">
</span><h4 data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">KQED: Amateur Astronomers</span></h4><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2070" instrument_node="">Amateur astronomers enjoy observing and studying stars and other celestial objects. Both professional and amateur astronomers use telescopes. A telescope is an instrument that makes faraway objects look closer. Learn more at:&nbsp;</span><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//science.kqed.org/quest/video/amateur-astronomers/"><span data-dcnode-id="2069" instrument_node="">http://science.kqed.org/quest/video/amateur-astronomers/</span></a><span data-dcnode-id="2067" instrument_node="">.</span></p><span data-dcnode-id="2065" instrument_node="">

</span><h3 data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Radio Telescopes</span></h3><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1537" instrument_node="">Notice it says above that the largest&nbsp;</span><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">optical</span></em><span data-dcnode-id="1534" instrument_node="">&nbsp;telescopes in the world are reflectors. Optical telescopes collect visible light. Even larger telescopes are built to collect light at longer wavelengths — radio waves. What do you think these telescopes are called?&nbsp;</span><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Radio telescopes</span></strong><span data-dcnode-id="1531" instrument_node="">&nbsp;look a lot like satellite dishes because both are designed to do the same thing — to collect and focus radio waves or&nbsp;</span><strong data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">microwaves</span></strong><span data-dcnode-id="1528" instrument_node="">&nbsp;(the shortest wavelength waves) from space.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1525" instrument_node="">The largest single telescope in the world is at the Arecibo Observatory in Puerto Rico (</span><strong data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Figure</span></strong><span data-dcnode-id="1522" instrument_node="">&nbsp; below). This telescope is located in a naturally occurring sinkhole that formed when water flowing underground dissolved the limestone rock. If this telescope were not supported by the ground, it would collapse under its own weight. Since the telescope is set into the ground it cannot be aimed to different parts of the sky and so can only observe the part of the sky that happens to be overhead at a given time.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><div data-dcnode-id="1511"><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d6e27036aeb83d57ead9d01c24fe2d6d5848736af7d0e58ab86d20ee1IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="1518" longdesc="#The%20radio%20telescope%20at%20the%20Arecibo%20Observatory%20has%20a%20diameter%20of%20305%20m.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d6e27036aeb83d57ead9d01c24fe2d6d5848736af7d0e58ab86d20ee1IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">The radio telescope at the Arecibo Observatory has a diameter of 305 m.</span></p><span data-dcnode-id="1512" instrument_node="">
</span></div><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">A group of radio telescopes can be linked together with a computer so that they are all observing the same object (</span><strong data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Figure</span></strong><span data-dcnode-id="1506" instrument_node="">&nbsp; below). The computer combines the data, making the group function like one single telescope.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node="">For more on radio telescopes and radio astronomy in general, go to&nbsp;</span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nrao.edu/whatisra/index.shtml"><span data-dcnode-id="1502" instrument_node="">http://www.nrao.edu/whatisra/index.shtml</span></a><span data-dcnode-id="1500" instrument_node="">.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><div data-dcnode-id="1489"><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1494"><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d0834f56b3bf4d02bdc70e1fba8298ff5be5f5d328d22e9944c316601IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="1496" longdesc="#The%20Very%20Large%20Array%20in%20New%20Mexico%20has%2027%20radio%20dishes%2C%20each%2025%20m%20in%20diameter.%20When%20all%20the%20dishes%20are%20pointed%20at%20the%20same%20object%2C%20they%20are%20like%20a%20single%20telescope%20with%20a%20diameter%20of%2022.3%20mi.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d0834f56b3bf4d02bdc70e1fba8298ff5be5f5d328d22e9944c316601IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">The Very Large Array in New Mexico has 27 radio dishes, each 25 m in diameter. When all the dishes are pointed at the same object, they are like a single telescope with a diameter of 22.3 mi.</span></p><span data-dcnode-id="1490" instrument_node="">
</span></div><span data-dcnode-id="1488" instrument_node="">
</span><h4 data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">KQED: SETI: The New Search for ET</span></h4><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1484" instrument_node="">Scientists have upped their search for extraterrestrial intelligence with the Allen Telescope Array, a string of 350 radio telescopes, located 300 miles north of San Francisco. Find out why SETI scientists now say we might be hearing from ET sooner than you think. Learn more at:</span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//science.kqed.org/quest/video/seti-the-new-search-for-et/"><span data-dcnode-id="1483" instrument_node="">http://science.kqed.org/quest/video/seti-the-new-search-for-et/</span></a><span data-dcnode-id="1481" instrument_node="">.</span></p><span data-dcnode-id="1479" instrument_node="">

node-id="447" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="448" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="446" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="441"><use class="ytp-svg-shadow" data-dcnode-id="443" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="444" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="442" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=QwEm3WHvNHI" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><span data-dcnode-id="422" instrument_node="">
</span><h3 data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Space Telescopes</span></h3><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">Telescopes on Earth all have one significant limitation: the electromagnetic radiation they gather must pass through Earth’s atmosphere. The atmosphere blocks some radiation in the infrared part of the spectrum and almost all radiation in the ultraviolet and higher frequency ranges. Furthermore, motion in the atmosphere distorts light. That distortion is why stars twinkle in the night sky. To minimize these problems, many observatories are built on high mountains, where there is less atmosphere above the telescope. Even better,&nbsp;</span><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">space telescopes</span></strong><span data-dcnode-id="415" instrument_node="">&nbsp;avoid such problems completely because they orbit outside Earth’s atmosphere in space. Space telescopes can carry instruments to observe objects emitting various types of electromagnetic radiation such as visible, infrared or ultraviolet light; gamma rays; or x-rays. X-ray telescopes, such as the Chandra X-ray Observatory, use X-ray optics to observe remote objects in the X-ray spectrum.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="412" instrument_node="">The Hubble Space Telescope (HST), shown in (</span><strong data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Figure</span></strong><span data-dcnode-id="409" instrument_node="">&nbsp; below), is perhaps the best known space telescope. The Hubble was put into orbit by the Space Shuttle Atlantis in 1990. Once it was in orbit, scientists discovered that there was a flaw in the shape of the mirror. A servicing mission to the Hubble by the Space Shuttle Endeavor in 1994 corrected the problem. Since that time, the Hubble has provided huge amounts of data that have helped to answer many of the biggest questions in astronomy.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">Find out more by visiting the Hubble Space Telescope website at&nbsp;</span><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/"><span data-dcnode-id="405" instrument_node="">http://hubblesite.org</span></a><span data-dcnode-id="403" instrument_node="">.</span></p><span data-dcnode-id="401" instrument_node="">
</span><div data-dcnode-id="392"><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="397"><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dba3a7638be5c414ed4be887a2da84df569a2c22c0947223539395440IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="399" longdesc="#%28a%29%20The%20Hubble%20Space%20Telescope%20orbits%20Earth%20at%20an%20altitude%20of%20589%20km%20%28366%20mi%29.%20It%20collects%20data%20in%20visible%2C%20infrared%2C%20and%20ultraviolet%20wavelengths.%20%28b%29%20This%20starburst%20cluster%20is%20one%20of%20the%20many%20fantastic%20images%20taken%20by%20the%20HST%20over%20the%20past%20two%20decades.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dba3a7638be5c414ed4be887a2da84df569a2c22c0947223539395440IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">(a) The Hubble Space Telescope orbits Earth at an altitude of 589 km (366 mi). It collects data in visible, infrared, and ultraviolet wavelengths. (b) This starburst cluster is one of the many fantastic images taken by the HST over the past two decades.</span></p><span data-dcnode-id="393" instrument_node="">
</span></div><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="390" instrument_node="">The National Aeronautics and Space Administration (NASA) has placed three other major space telescopes in orbit, comprising what NASA calls the ‘Great Observatories’. Each of these telescopes specializes in a different part of the electromagnetic spectrum (</span><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Figure</span></strong><span data-dcnode-id="387" instrument_node="">&nbsp; below). NASA is planning for another telescope, the James Webb Space Telescope, to serve as a replacement for the aging Hubble. The James Webb is scheduled to launch in 2018.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="384" instrument_node="">To learn more about NASA’s great observatories, check out</span><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nasa.gov/audience/forstudents/postsecondary/features/F_NASA_Great_Observatories_PS.html"><span data-dcnode-id="383" instrument_node="">http://www.nasa.gov/audience/forstudents/postsecondary/features/F_NASA_Great_Observatories_PS.html</span></a><span data-dcnode-id="381" instrument_node="">.</span></p><span data-dcnode-id="379" instrument_node="">
</span><div data-dcnode-id="370"><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375"><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d0b02ce0d3f5797cdd7fb36a0a02771f779c5e8cd5ffa6539577d265fIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="377" longdesc="#NASA%27s%20four%20space-based%20Great%20Observatories%20were%20designed%20to%20view%20the%20universe%20in%20different%20ranges%20of%20the%20electromagnetic%20spectrum.%20A.%20Hubble%20Space%20Telescope%3A%20visible%2C%20infrared%20and%20ultraviolet%20light%3B%20B.%20Compton%20Gamma%20Ray%20Observatory%20%28inactive%29%3A%20gamma%20ray%3B%20C.%20Spitzer%20Space%20Telescope%3A%20infrared%3B%20D.%20Chandra%20X-ray%20Observatory%3A%20X-ray.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d0b02ce0d3f5797cdd7fb36a0a02771f779c5e8cd5ffa6539577d265fIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">NASA’s four space-based Great Observatories were designed to view the universe in different ranges of the electromagnetic spectrum. A. Hubble Space Telescope: visible, infrared and ultraviolet light; B. Compton Gamma Ray Observatory (inactive): gamma ray; C. Spitzer Space Telescope: infrared; D. Chandra X-ray Observatory: X-ray.</span></p><span data-dcnode-id="371" instrument_node="">
</span></div><span data-dcnode-id="369" instrument_node="">
</span><h2 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Observations with Telescopes</span></h2><span data-dcnode-id="366" instrument_node="">
</span><h3 data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Ancient Astronomers</span></h3><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">Humans have been studying the night sky for thousands of years. Observing the patterns and motions in the sky helped ancient peoples keep track of time (</span><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Figure</span></strong><span data-dcnode-id="359" instrument_node="">&nbsp; below). By understanding annual rhythms, people could know when to plant crops. They also timed many of their religious ceremonies to coincide with events in the heavens.</span></p><span data-dcnode-id="357" instrument_node="">
</span><div data-dcnode-id="348"><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="353"><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d2c3ab148b2a7c96f2af1c21924192b6f5a0d007b718f1f1338b8b380IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="355" longdesc="#Many%20archaeologists%20think%20that%20Stonehenge%20was%20used%20to%20observe%20the%20movement%20of%20the%20moon%20and%20the%20sun.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d2c3ab148b2a7c96f2af1c21924192b6f5a0d007b718f1f1338b8b380IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Many archaeologists think that Stonehenge was used to observe the movement of the moon and the sun.</span></p><span data-dcnode-id="349" instrument_node="">
</span></div><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="346" instrument_node="">The ancient Greeks made careful observations of the locations of stars in the sky. They noticed that some of the ‘stars’ moved against the background of other stars. They called these bright and odd bodies in the sky&nbsp;</span><strong data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">planets</span></strong><span data-dcnode-id="343" instrument_node="">, which in Greek means “wanderers.” Today we know that the planets are not stars, but members of our solar system that orbit the Sun. Greeks also identified&nbsp;</span><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">constellations</span></strong><span data-dcnode-id="340" instrument_node="">, patterns of stars in the sky (</span><strong data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Figure</span></strong><span data-dcnode-id="337" instrument_node="">&nbsp; below). They associated the constellations with stories and myths from their culture.</span></p><span data-dcnode-id="335" instrument_node="">
</span><div data-dcnode-id="326"><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="331"><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d1b8b0fa3d8f53221528ce365b5073578d1793bc170747bb3713daf36IMAGE_THUMB_LARGEIMAGE_THUMB_LARGE.1"><img alt="" data-dcnode-id="333" longdesc="#Stars%20in%20the%20constellation%20Orion.%20Constellations%20help%20astronomers%20today%20identify%20different%20regions%20of%20the%20night%20sky.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d1b8b0fa3d8f53221528ce365b5073578d1793bc170747bb3713daf36IMAGE_THUMB_LARGEIMAGE_THUMB_LARGE.1&amp;raw" title=""></a></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Stars in the constellation Orion. Constellations help astronomers today identify different regions of the night sky.</span></p><span data-dcnode-id="327" instrument_node="">
</span></div><span data-dcnode-id="325" instrument_node="">
</span><h3 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Galileo’s Observations</span></h3><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Ancient astronomers knew a lot about the patterns of stars and the movement of objects in the sky, but they did not know what these objects actually were. That understanding began in the year 1610, when Galileo turned a telescope toward the heavens. With his telescope, Galileo made the following discoveries (among others):</span></p><span data-dcnode-id="319" instrument_node="">
</span><ul data-dcnode-id="296"><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">There are more stars in the night sky than the naked eye can see.</span></li><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The band of stars called the Milky Way consists of many stars.</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">The Moon has craters (</span><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Figure</span></strong><span data-dcnode-id="308" instrument_node="">&nbsp; below).</span></li><span data-dcnode-id="306" instrument_node="">
</span><li data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Venus has phases like the Moon.</span></li><span data-dcnode-id="303" instrument_node="">
</span><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Jupiter has orbiting moons.</span></li><span data-dcnode-id="300" instrument_node="">
</span><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">There are dark spots that move across the surface of the Sun.</span></li><span data-dcnode-id="297" instrument_node="">
</span></ul><span data-dcnode-id="295" instrument_node="">
</span><div data-dcnode-id="286"><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="291"><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dcc72070571f68619a48e99ee70daf708c4895ca08f0d31bb50b3dfb7IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="293" longdesc="#Galileo%20was%20the%20first%20person%20known%20to%20look%20at%20the%20Moon%20through%20a%20telescope.%20Galileo%20made%20the%20drawing%20on%20the%20left%20in%201610%3B%20on%20the%20right%20is%20a%20modern%20photograph%20of%20the%20Moon.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-dcc72070571f68619a48e99ee70daf708c4895ca08f0d31bb50b3dfb7IMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Galileo was the first person known to look at the Moon through a telescope. Galileo made the drawing on the left in 1610; on the right is a modern photograph of the Moon.</span></p><span data-dcnode-id="287" instrument_node="">
</span></div><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Galileo’s observations challenged people to think in new ways about the universe and Earth’s place in it. About 100 years before Galileo, Nicolaus Copernicus had proposed a controversial new model of the universe in which Earth and the other planets revolve around the Sun. In Galileo’s time, most people still believed that the Sun and planets revolved around Earth. Galileo’s observations provided direct evidence to support Copernicus’ model.</span></p><span data-dcnode-id="282" instrument_node="">
</span><h3 data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Observations with Modern Telescopes</span></h3><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Equipped with no more than a good pair of binoculars, you can see all of the things Galileo saw, and more. You can even see sunspots, but be sure to use special filters on the lenses to protect your eyes. With a basic telescope like those used by many amateur astronomers, you can see more than Galileo saw, such as polar caps on Mars, the rings of Saturn, and bands in the atmosphere of Jupiter.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="275" instrument_node="">All of the objects mentioned above are within our solar system. With a telescope you can also see many times more stars than without a telescope. However, because they are so far away, the stars will appear as points of light. This is true even of the most powerful professional telescopes, with one rare exception (</span><strong data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Figure</span></strong><span data-dcnode-id="272" instrument_node="">&nbsp; below).</span></p><span data-dcnode-id="270" instrument_node="">
</span><div data-dcnode-id="261"><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="266"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d9b04fc878f76a448cf984debdd9ffc8cb3e0fe889f7aa407d014c8ccIMAGE_THUMB_LARGEIMAGE_THUMB_LARGE.1"><img alt="" data-dcnode-id="268" longdesc="#This%20ultraviolet%20image%20of%20the%20red%20supergiant%20star%20Betelgeuse%20taken%20with%20the%20Hubble%20Space%20Telescope%20in%201996%20was%20the%20first%20direct%20image%20taken%20of%20the%20disk%20of%20a%20star%20other%20than%20the%20Sun.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d9b04fc878f76a448cf984debdd9ffc8cb3e0fe889f7aa407d014c8ccIMAGE_THUMB_LARGEIMAGE_THUMB_LARGE.1&amp;raw" title=""></a></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">This ultraviolet image of the red supergiant star Betelgeuse taken with the Hubble Space Telescope in 1996 was the first direct image taken of the disk of a star other than the Sun.</span></p><span data-dcnode-id="262" instrument_node="">
</span></div><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Very few professional astronomers today look directly through the eyepiece of a telescope. Instead, they attach to the telescopes sophisticated instruments that capture and process the light. The astronomers then look at the images or data shown on these instruments. Most often the instruments then pass the data on to a computer where the data can be stored for later use. An astronomer may take weeks or months to analyze all the data collected from just a single night.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="256" instrument_node="">Astronomers use&nbsp;</span><strong data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">spectrometers</span></strong><span data-dcnode-id="253" instrument_node="">&nbsp;to study the light from a telescope. A spectrometer uses a prism or other device to break light down into its component colors. The spectrum produced can be observed directly, captured on film, or stored digitally on a computer (</span><strong data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Figure</span></strong><span data-dcnode-id="250" instrument_node="">&nbsp; below).</span></p><span data-dcnode-id="248" instrument_node="">
</span><div data-dcnode-id="239"><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="244"><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d3dcd6b196c848f5316f2056dd302d68f97c1a7d1e7c00019a70fc21bIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1"><img alt="" data-dcnode-id="246" longdesc="#A%20simplified%20example%20of%20starlight%20after%20it%20passes%20through%20a%20spectrometer.%20The%20dark%20lines%20in%20a%20star%27s%20spectrum%20are%20caused%20by%20gases%20absorbing%20light%20in%20the%20star%27s%20outer%20atmosphere.%20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-us-west-2.amazonaws.com/candimgs/fk0c9E/f-d3dcd6b196c848f5316f2056dd302d68f97c1a7d1e7c00019a70fc21bIMAGE_THUMB_POSTCARDIMAGE_THUMB_POSTCARD.1&amp;raw" title=""></a></p><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">A simplified example of starlight after it passes through a spectrometer. The dark lines in a star’s spectrum are caused by gases absorbing light in the star’s outer atmosphere.</span></p><span data-dcnode-id="240" instrument_node="">
</span></div><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">From a single spectrum of a star, an astronomer can tell:</span></p><span data-dcnode-id="235" instrument_node="">
</span><ul data-dcnode-id="224"><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">How hot the star is (by the relative brightness of different colors).</span></li><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">What elements the star contains (by the pattern of dark lines).</span></li><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Whether and how fast the star is moving toward or away from Earth (by how far the dark lines are shifted from their normal positions).</span></li><span data-dcnode-id="225" instrument_node="">
</span></ul><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Using telescopes, astronomers can also learn how stars evolve, what kind of matter is found throughout the universe, how that matter is distributed, and even how the universe might have formed.</span></p><span data-dcnode-id="220" instrument_node="">
</span><h2 data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Lesson Summary</span></h2><span data-dcnode-id="217" instrument_node="">
</span><ul data-dcnode-id="179"><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Astronomers study light from distant objects.</span></li><span data-dcnode-id="213" instrument_node="">
</span><li data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Light travels at 300,000,000 meters per second — faster than anything else in the universe.</span></li><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">A light-year is equal to the distance light travels in one year, 9.5 trillion kilometers.</span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">When we see distant objects, we see them as they were in the past, because their light has been traveling to us for many years.</span></li><span data-dcnode-id="204" instrument_node="">
</span><li data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Visible light is part of the electromagnetic spectrum.</span></li><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Telescopes make distant objects appear both nearer and larger.</span></li><span data-dcnode-id="198" instrument_node="">
</span><li data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Optical telescopes collect visible light. The three main types are reflecting telescopes, refracting telescopes, and catadioptric telescopes.</span></li><span data-dcnode-id="195" instrument_node="">
</span><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Radio telescopes collect and focus radio waves from distant objects.</span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Space telescopes orbit Earth, collecting wavelengths of light that are normally blocked by the atmosphere.</span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Galileo was the first person known to use a telescope to study the sky. His discoveries helped change the way humans think about the universe.</span></li><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Modern telescopes collect data that can be stored on a computer.</span></li><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Astronomers can learn a lot about a star by studying its spectrum.</span></li><span data-dcnode-id="180" instrument_node="">
</span></ul><span data-dcnode-id="178" instrument_node="">
</span><h2 data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Review Questions</span></h2><span data-dcnode-id="175" instrument_node="">
</span><ol data-dcnode-id="155"><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Betelgeuse is around 640 light-years from Earth. Light travels 9.5 trillion kilometers in one year. How far away is Betelgeuse in kilometers?</span></li><span data-dcnode-id="171" instrument_node="">
</span><li data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Identify four regions of the electromagnetic spectrum that astronomers use when observing objects in space.</span></li><span data-dcnode-id="168" instrument_node="">
</span><li data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">List the three main types of optical telescopes, and describe their differences.</span></li><span data-dcnode-id="165" instrument_node="">
</span><li data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">Explain the advantages of putting a telescope into orbit around Earth.</span></li><span data-dcnode-id="162" instrument_node="">
</span><li data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Describe two observations that Galileo was the first to make with his telescope.</span></li><span data-dcnode-id="159" instrument_node="">
</span><li data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">List three things that an astronomer can learn about a star by studying its spectrum.</span></li><span data-dcnode-id="156" instrument_node="">
</span></ol><span data-dcnode-id="154" instrument_node="">
</span><h2 data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Further Reading / Supplemental Links</span></h2><span data-dcnode-id="151" instrument_node="">

</span><li data-dcnode-id="146"><span data-dcnode-id="149" instrument_node="">Lots of news and information from NASA at&nbsp;</span><a data-dcnode-id="147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nasa.gov/"><span data-dcnode-id="148" instrument_node="">http://www.nasa.gov/</span></a></li><span data-dcnode-id="145" instrument_node="">
</span><li data-dcnode-id="141"><span data-dcnode-id="144" instrument_node="">The first stars in the Universe:&nbsp;</span><a data-dcnode-id="142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//science.nasa.gov/headlines/y2002/08feb_gravlens.htm"><span data-dcnode-id="143" instrument_node="">http://science.nasa.gov/headlines/y2002/08feb_gravlens.htm</span></a></li><span data-dcnode-id="140" instrument_node="">

</span><li data-dcnode-id="126"><span data-dcnode-id="129" instrument_node="">An activity found online with directions for how to determine if that bright point you see in the sky is a planet or a star:</span><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cse.ssl.berkeley.edu/SegwayEd/lessons/findplanets/Find-hmpg2.html"><span data-dcnode-id="128" instrument_node="">http://cse.ssl.berkeley.edu/SegwayEd/lessons/findplanets/Find-hmpg2.html</span></a></li><span data-dcnode-id="125" instrument_node="">
</span></ul><span data-dcnode-id="123" instrument_node="">
</span><h2 data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">Points to Consider</span></h2><span data-dcnode-id="120" instrument_node="">
</span><ul data-dcnode-id="112"><span data-dcnode-id="119" instrument_node="">
</span><li data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">Radio waves are used for communicating with spacecraft. A round-trip communication from Earth to Mars takes anywhere from 6 to 42 minutes. What challenges does this present for sending unmanned spacecraft and probes to Mars?</span></li><span data-dcnode-id="116" instrument_node="">
</span><li data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">The Hubble Space Telescope is a very important source of data for astronomers. The fascinating and beautiful images from the Hubble also help to maintain public support for science. However, the Hubble is growing old. Missions to service and maintain the telescope are extremely expensive and put the lives of astronauts at risk. Do you think there should be another servicing mission to the Hubble?</span></li><span data-dcnode-id="113" instrument_node="">
</span></ul><span data-dcnode-id="111" instrument_node="">
