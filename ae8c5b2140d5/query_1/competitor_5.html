</span><h1 class="page-title" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">    Galileo: Revealing the Universe
  </span></h1><span data-dcnode-id="1746" instrument_node="">
</span><div class="media-image media-image--large has-image-info" data-dcnode-id="1716"><span data-dcnode-id="1745" instrument_node="">
</span><img alt="Giuseppe Bertini, Galileo Galilei Showing the Doge of Venice How to use the Telescope, 1858." data-dcnode-id="1744" height="520" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edsitement.neh.gov/sites/default/files/styles/teaser/public/resource/galileo-large.jpg%3Fitok%3DuunP4qDG&amp;raw" width="750"><span data-dcnode-id="1743" instrument_node="">
</span><div class="image-info has-no-caption-accordion" data-dcnode-id="1718"><span data-dcnode-id="1742" instrument_node="">
</span><div class="image-info__icon" data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Photo caption</span></div><span data-dcnode-id="1739" instrument_node="">
</span><div class="image-info__content" data-dcnode-id="1720"><span data-dcnode-id="1738" instrument_node="">
</span><div class="image-info__content-inner" data-dcnode-id="1722"><span data-dcnode-id="1737" instrument_node="">
</span><div class="image-info__caption" data-dcnode-id="1731"><p data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">Giuseppe Bertini, </span><em data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Galileo Galilei Showing the Doge of Venice How to use the Telescope</span></em><span data-dcnode-id="1733" instrument_node="">, 1858.</span></p></div><span data-dcnode-id="1730" instrument_node="">
</span><div class="image-info__credit" data-dcnode-id="1724"><p data-dcnode-id="1726"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commons.wikimedia.org/wiki/File%3ABertini_fresco_of_Galileo_Galilei_and_Doge_of_Venice.jpg" rel="noopener" target="_blank"><span data-dcnode-id="1729" instrument_node="">Wikimedia Commons</span></a><span data-dcnode-id="1727" instrument_node="">.</span></p><span data-dcnode-id="1725" instrument_node="">
</span></div><span data-dcnode-id="1723" instrument_node="">
</span></div><span data-dcnode-id="1721" instrument_node="">
</span></div><span data-dcnode-id="1719" instrument_node="">
</span></div><span data-dcnode-id="1717" instrument_node="">
</span></div><span data-dcnode-id="1715" instrument_node="">
</span><section class="rich-text" data-dcnode-id="1698"><span data-dcnode-id="1714" instrument_node="">
</span><blockquote data-dcnode-id="1700"><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">"… for the Galaxy is nothing else but a mass of innumerable stars planted together in clusters."</span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1709" instrument_node="">—Galileo Galilei</span><em data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">, Sidereus Nuncius</span></em><span data-dcnode-id="1706" instrument_node=""> (</span><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="1703" instrument_node="">), 1610</span></p><span data-dcnode-id="1701" instrument_node="">
</span></blockquote><span data-dcnode-id="1699" instrument_node="">
</span></section><span data-dcnode-id="1697" instrument_node="">
</span><section class="rich-text" data-dcnode-id="1680"><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">In the 2nd century CE, a Roman astronomer named Ptolemy refined this view, stating that all planets moved in perfect circles, attached to perfect spheres, all of which rotated around the Earth: a theory that predicted the paths of the planets fairly well. This view, accepted for 1,400 years, was challenged by new astronomers, aided by instruments that enabled them to see the skies as they had never been seen before. Chief among them was Galileo, bolstering his observations with a revolutionary telescope he invented.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1692" instrument_node="">He carefully explored the night sky, turning his telescope to what looked like “dark” parts and discovering that they were filled with stars too dim to be seen without the telescope’s enhancement. In 1610, he published his observations of the solar system and distant stars in a volume called </span><em data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Sidereus Nuncius</span></em><span data-dcnode-id="1689" instrument_node="">, or </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="1686" instrument_node="">.&nbsp;In this lesson, students will practice close reading of passages from Galileo’s </span><em data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="1683" instrument_node=""> concerning his observations of the stars and constellations through a telescope. They will develop an understanding of how he constructed his arguments to challenge the established views of his time using new technology and logical reasoning.</span></p><span data-dcnode-id="1681" instrument_node="">
</span></section><span data-dcnode-id="1679" instrument_node="">
</span><section class="l-section l-section--strong-title l-section--accent-lines" data-dcnode-id="1652"><span data-dcnode-id="1678" instrument_node="">
</span><h3 class="l-section__title" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Guiding Questions</span></h3><span data-dcnode-id="1675" instrument_node="">
</span><div class="l-section__content" data-dcnode-id="1654"><span data-dcnode-id="1674" instrument_node="">
</span><div class="l-grid l-grid--2col" data-dcnode-id="1656"><span data-dcnode-id="1673" instrument_node="">
</span><div class="box box--shadow" data-dcnode-id="1666"><span data-dcnode-id="1672" instrument_node="">
</span><div class="box__content" data-dcnode-id="1668"><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">What did Galileo see when he looked at the sky through his telescope?</span></p><span data-dcnode-id="1669" instrument_node="">
</span></div><span data-dcnode-id="1667" instrument_node="">
</span></div><span data-dcnode-id="1665" instrument_node="">
</span><div class="box box--shadow" data-dcnode-id="1658"><span data-dcnode-id="1664" instrument_node="">
</span><div class="box__content" data-dcnode-id="1660"><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">How did Galileo’s observations change our view of the universe and the Earth’s place in it?</span></p><span data-dcnode-id="1661" instrument_node="">
</span></div><span data-dcnode-id="1659" instrument_node="">
</span></div><span data-dcnode-id="1657" instrument_node="">
</span></div><span data-dcnode-id="1655" instrument_node="">
</span></div><span data-dcnode-id="1653" instrument_node="">
</span></section><span data-dcnode-id="1651" instrument_node="">

</span><div class="objective" data-dcnode-id="1637"><span data-dcnode-id="1645" instrument_node="">
</span><div class="objective__stripe" data-dcnode-id="1644"></div><span data-dcnode-id="1643" instrument_node="">
</span><div class="objective__item" data-dcnode-id="1639"><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Cite specific textual evidence to support analysis of a passage from Galileo’s Starry Messenger dealing with his observations of stars, constellations, and the Milky Way.</span></p><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span></div><span data-dcnode-id="1636" instrument_node=""> </span><div class="objective" data-dcnode-id="1627"><span data-dcnode-id="1635" instrument_node="">

</span><div class="objective__item" data-dcnode-id="1629"><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Explain the significance of Galileo’s ideas to our understanding of the stars and the universe.</span></p><span data-dcnode-id="1630" instrument_node="">

</span><div class="l-section__content" data-dcnode-id="439"><span data-dcnode-id="1547" instrument_node="">
</span><section class="accordion" data-dcnode-id="441"><span data-dcnode-id="1546" instrument_node="">
</span><div class="accordion-item" data-dcnode-id="1469"><span data-dcnode-id="1545" instrument_node="">
</span><div class="accordion-item__title" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Background</span></div><span data-dcnode-id="1542" instrument_node="">
</span><div class="accordion-item__teaser" data-dcnode-id="1471"><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Ancient astronomers constructed explanations of the motions of the celestial bodies based on mathematics, philosophy, and careful observations of the skies as visible to the human eye. They recorded the positions of these heavenly bodies over time. Based on this method, ancient astronomers concluded that Earth was the center of the universe and that all other objects in the sky revolved around it.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">In addition to addressing content in Earth and Space Science as articulated in the Next Generation Science Standards, the lesson also supports the development of ideas pertaining to Scale and Proportion, one of the NGSS’s crosscutting themes. For example, in </span><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="1532" instrument_node="">, Galileo reported that he saw at least ten times as many stars through the telescope as with the naked eye. From his observations he deduced that the nebulae and the Milky Way were collections of stars too small and far away to be seen as individual stars by the naked eye.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1529" instrument_node="">This lesson also helps to support the development of the following science and engineering practices as articulated in the National Research Council’s</span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node=""> A Science Framework for K–12 Science Education</span></em><em data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">:</span></em></p><span data-dcnode-id="1523" instrument_node="">
</span><ul data-dcnode-id="1510"><li data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Asking questions (for science) and defining problems (for engineering);</span></li><span data-dcnode-id="1520" instrument_node="">
</span><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Constructing explanations (for science) and designing solutions (for engineering);</span></li><span data-dcnode-id="1517" instrument_node="">
</span><li data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Engaging in argument from evidence;</span></li><span data-dcnode-id="1514" instrument_node="">
</span><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Obtaining, evaluating, and communicating information.</span></li><span data-dcnode-id="1511" instrument_node="">
</span></ul><p data-dcnode-id="1507"><strong data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Further Background</span></strong></p><span data-dcnode-id="1506" instrument_node="">
</span><ul data-dcnode-id="1472"><li data-dcnode-id="1503"><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edsitement.neh.gov/sites/default/files/2018-07/teacher_science_background.pdf" target="_blank"><span data-dcnode-id="1505" instrument_node="">Additional background for the teacher</span></a></li><span data-dcnode-id="1502" instrument_node="">
</span><li data-dcnode-id="1497"><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nextgenscience.org/sites/ngss/files/Appendix%2520F%2520%2520Science%2520and%2520Engineering%2520Practices%2520in%2520the%2520NGSS%2520.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1501" instrument_node="">National Research Council.</span><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node=""> A Science Framework for K–12 Science Education</span></em></a></li><span data-dcnode-id="1496" instrument_node="">
</span><li data-dcnode-id="1492"><span data-dcnode-id="1495" instrument_node="">American Association for the Advancement of Science, </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sciencenetlinks.com/lessons/looking-into-space/" rel="noopener" target="_blank"><span data-dcnode-id="1494" instrument_node="">Science NetLinks</span></a></li><span data-dcnode-id="1491" instrument_node="">

</span><li data-dcnode-id="1481"><span data-dcnode-id="1484" instrument_node="">Sky Watching: </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sciencenetlinks.com/lessons/looking-into-space/" rel="noopener" target="_blank"><span data-dcnode-id="1483" instrument_node="">Looking into Space</span></a></li><span data-dcnode-id="1480" instrument_node="">

</span><div class="accordion-item__title" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Content Standards</span></div><span data-dcnode-id="1464" instrument_node="">
</span><div class="accordion-item__teaser" data-dcnode-id="1401"><h2 data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Anchor Standard</span></h2><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">CCSS.ELA-Literacy.CCRA.R.1: Read closely to determine what the text says explicitly and to make logical inferences from it; cite specific textual evidence when writing or speaking to support conclusions drawn from the text.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1455"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Science and Technical Subjects:</span></strong></p><span data-dcnode-id="1454" instrument_node="">
</span><ul data-dcnode-id="1444"><li data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">CCSS.ELA-Literacy.RST.6–8.4: Determine the meaning of symbols, key terms, and other domain-specific words and phrases as they are used in a specific scientific or technical context relevant to grades 6–8 texts and topics.</span></li><span data-dcnode-id="1451" instrument_node="">
</span><li data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">CCSS.ELA-Literacy. RST.6–8.7: Integrate quantitative or technical information expressed in words in a text with a version of that information expressed visually (e.g., in a flowchart, diagram, model, graph, or table);</span></li><span data-dcnode-id="1448" instrument_node="">
</span><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">CCSS. ELA-Literacy.RST.6–8.9: Compare and contrast the information gained from experiments, simulation, video or multimedia sources with that gained from reading a text on the same topic.</span></li><span data-dcnode-id="1445" instrument_node="">
</span></ul><p data-dcnode-id="1439"><strong data-dcnode-id="1440"><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nextgenscience.org/msess1-earth-place-universe" rel="noopener" target="_blank"><span data-dcnode-id="1443" instrument_node="">NGSS Earth and Space Science Strand</span></a><span data-dcnode-id="1441" instrument_node=""> (ESS):</span></strong></p><span data-dcnode-id="1438" instrument_node="">
</span><ul data-dcnode-id="1428"><li data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">ESS1: Earth’s Place in the Universe</span></li><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">ESS1.A: The Universe and Its Stars</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">ESS1.B: Earth and Solar System</span></li><span data-dcnode-id="1429" instrument_node="">
</span></ul><p data-dcnode-id="1425"><strong data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Practice Skills</span></strong></p><span data-dcnode-id="1424" instrument_node="">
</span><ul data-dcnode-id="1402"><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">constructing and evaluating evidence-based arguments</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">engaging in discourse by explaining phenomena scientifically</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">evaluating and designing scientific enquiry, and</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">interpreting data and evidence scientifically</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">identify a variety of credible sources for research</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">collecting information from a variety of places</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">synthesizing information appropriately</span></li><span data-dcnode-id="1403" instrument_node="">
</span></ul></div><span data-dcnode-id="1400" instrument_node="">

</span><div class="accordion-item__title" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Preparation</span></div><span data-dcnode-id="1394" instrument_node="">
</span><div class="accordion-item__teaser" data-dcnode-id="1259"><p data-dcnode-id="1391"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Prerequisite skills: By the end of Grade 5, students should know that stars range greatly in size and distance from Earth and this can explain their relative brightness. You may wish to review these concepts with the class before beginning this lesson.</span></strong></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node="">Students utilize close reading strategies, using passages from Galileo’s </span><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Sidereal Messenger</span></em><span data-dcnode-id="1386" instrument_node=""> (</span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Sidereus Nuncius</span></em><span data-dcnode-id="1383" instrument_node="">) in which he records his early observations of the moon, the stars (the belt of Orion and the Pleiades), and the moons of Jupiter. The science content will focus specifically on the stars and constellations. The student activity version (Launchpad) may be used to guide students through a sequence of activities outlined below. The activities may be taught with or without this aid.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">The teacher may also wish to give students a brief explanation concerning the Sword and Belt of Orion, which Galileo mentions in Section 5 of the close reading of Activity 2. The Star Search interactive for Orion from the AAAS’s Science NetLinks may also be used.</span></p><span data-dcnode-id="1378" instrument_node="">

16 Z" data-dcnode-id="760" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="740" title="Full screen (f)"><svg data-dcnode-id="741" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="754"><use class="ytp-svg-shadow" data-dcnode-id="756" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="757" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="755" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="750"><use class="ytp-svg-shadow" data-dcnode-id="752" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="753" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="751" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="746"><use class="ytp-svg-shadow" data-dcnode-id="748" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="749" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="747" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="742"><use class="ytp-svg-shadow" data-dcnode-id="744" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="745" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="743" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=2J0-ZbbrD6U" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="724" instrument_node="">
</span></div><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">The following questions for students after viewing the video necessitate an understanding of the academic vocabulary listed on both the teacher and student versions of the vocabulary handout.</span></p><span data-dcnode-id="719" instrument_node="">
</span><ul data-dcnode-id="694"><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">What was the general understanding of the relative position of the earth to the sun before Galileo? What important model reflected this understanding?</span></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">What did early astronomers believe about the position of the stars relative to each other?</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">How did they group them in order to make sense of them?</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">What role did the Greeks play in applying mathematical models to the heavens? Why was this important?</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">What crucial observation did Aristotle make?</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Which astronomer before Galileo proposed a different model of the solar system? What did he get right? What did he get wrong?</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">In his book </span><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="697" instrument_node="">, what did Galileo write about? What did he do that was different than what had been done before?</span></li><span data-dcnode-id="695" instrument_node="">
</span></ul><p data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Bridge to Activity 2.</span></strong></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">In order to bring together what students have learned through the video about the state of astronomical observation and the close reading of </span><em data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="686" instrument_node=""> in Activity 2, assign a short homework assignment in looking at the night sky.</span></p><span data-dcnode-id="684" instrument_node="">
</span><ul data-dcnode-id="671"><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Have students locate a common, bright celestial object (the Moon or Venus, for example) and record how it appears to the naked eye;</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Are its contours clearly demarcated? If the surface is visible, is it rough, smooth? How about color? Is there any other heavenly body near it?</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Now ask them to use a device with some type of magnification to view this same body. This can be the zoom feature on a camera or smartphone, a pair of binoculars, or other hand lenses;</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Tell students to record the magnification of the device and compare this view with what they could discern without the tool.</span></li><span data-dcnode-id="672" instrument_node="">
</span></ul><p data-dcnode-id="668"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Resources</span></strong></p><span data-dcnode-id="667" instrument_node="">
</span><ul data-dcnode-id="653"><li data-dcnode-id="663"><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DcuK2mq0OAjI" rel="noopener" target="_blank"><span data-dcnode-id="666" instrument_node="">Stargazing Before Galileo</span></a><span data-dcnode-id="664" instrument_node=""> (Interactive)</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="659"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/teachers_vocabulary_list.pdf" target="_blank"><span data-dcnode-id="661" instrument_node="">Teacher’s vocabulary list</span></a></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="655"><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/student_vocabulary_0.pdf" target="_blank"><span data-dcnode-id="657" instrument_node="">Student’s vocabulary list</span></a></li><span data-dcnode-id="654" instrument_node="">
</span></ul><h2 data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Activity 2. Close Reading of Galileo’s "Starry Messenger"</span></h2><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="649" instrument_node="">To help students gain an understanding of key scientific terms and concepts, as well as integrate textual and visual information, the teacher will model a guided </span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/student_close_reading_0.pdf" target="_blank"><span data-dcnode-id="648" instrument_node="">close reading activity</span></a><span data-dcnode-id="646" instrument_node=""> using the first of seven sections from Galileo’s </span><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="643" instrument_node="">, which deals with his observations of the stars through a telescope.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Suggested reading methods are given in the teacher’s version of the close reading. The teacher may also wish to give students a brief explanation concerning the Sword and Belt of Orion, which Galileo mentions in Section 5 of the close reading. (Note: vocabulary items appear in most of the focus questions and on the teacher’s and student’s vocabulary lists.)</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Formative Assessment</span></strong></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Have the students as a group think back to the state of astronomy before Galileo in Activity 1, and compare that to what he has noted here about the nature of the stars as seen through a telescope (as opposed, for example, to the planets). Ask them to write down some examples from the text that point to his overall argument for using such a scientific device. Encourage the class to refine their own answers and come to consensus about the best responses to the questions</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="628"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Resources</span></strong></p><span data-dcnode-id="627" instrument_node="">
</span><ul data-dcnode-id="600"><li data-dcnode-id="622"><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/starry_messenger_teachers_close_reading_0.pdf" target="_blank"><em data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="624" instrument_node="">, close reading, teacher’s version (annotated)</span></a></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="616"><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/student_close_reading_0.pdf" target="_blank"><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="618" instrument_node="">, close reading, student's version</span></a></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="612"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/activity_2_drawing_pleiades-new_0.pdf" target="_blank"><span data-dcnode-id="614" instrument_node="">Galileo’s Drawing of the Pleiades Group</span></a></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="608"><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/activity_2_drawing_orion_0.pdf" target="_blank"><span data-dcnode-id="610" instrument_node="">Galileo’s Drawing of the Constellation Orion</span></a></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="602"><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edsitement.neh.gov/launchpad-galileo-and-his-starry-messenger"><span data-dcnode-id="606" instrument_node="">Study Activity: Galileo and the </span><em data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Starry Messenger</span></em></a></li><span data-dcnode-id="601" instrument_node="">
</span></ul><h2 data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Activity 3. Comparing Galileo’s Drawing of the Pleiades to NASA Photographs</span></h2><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">Student will compare and contrast their knowledge about the Pleiades gained from a NASA photograph with that gained from Galileo’s drawings and descriptions of them in the </span><em data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="593" instrument_node="">. The goal is to engage them in an analysis of the accuracy of the astronomer’s conclusions about these systems.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Have students use the </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/pleiades_graphic_organizer.pdf" target="_blank"><span data-dcnode-id="589" instrument_node="">star comparison graphic organizer</span></a><span data-dcnode-id="587" instrument_node="">, (also available from the student Launchpad), to compare and contrast Galileo’s drawings of the Pleiades system with the NASA photograph taken using modern space telescopes. (Optional vocabulary appears in the teacher’s and student’s vocabulary lists but not on the Study Activity.)</span></p><span data-dcnode-id="585" instrument_node="">
</span><ul data-dcnode-id="572"><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Using the organizer, model an initial compare and contrast exercise with the whole class before having students work independently;</span></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Guide groups of 2–3 students in looking for differences in detail, scale, and clarity. (See the Launchpad for the student-led versions of these questions.)</span></li><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">Ask them to try and match the larger stars that Galileo drew to the ones seen in the NASA image. If they are having trouble making the comparison, remind them that they may need to reorient the images in order to match the stars and prompt them to look for visual clues that can help them do that. (You can use the images </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.indigotide.com/astronomy/m45.html" rel="noopener" target="_blank"><span data-dcnode-id="577" instrument_node="">here</span></a><span data-dcnode-id="575" instrument_node=""> to aid identification.)</span></li><span data-dcnode-id="573" instrument_node="">
</span></ul><p data-dcnode-id="569"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Formative Assessment</span></strong></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Ask students to individually write a short paragraph stating how accurate Galileo was in his conclusions about the placement of the stars; their scale, and clarity, based upon modern astrophotography.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="562"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Resources</span></strong></p><span data-dcnode-id="561" instrument_node="">
</span><ul data-dcnode-id="548"><li data-dcnode-id="558"><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/nasa_photo_of_the_pleiades.pdf" target="_blank"><span data-dcnode-id="560" instrument_node="">NASA Photograph of the Pleiades System</span></a></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="554"><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/activity_2_drawing_pleiades-new_0.pdf" target="_blank"><span data-dcnode-id="556" instrument_node="">Galileo’s Drawing of the Pleiades Group</span></a></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="550"><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/pleiades_graphic_organizer.pdf" target="_blank"><span data-dcnode-id="552" instrument_node="">Star Comparison Graphic Organizer: Pleiades</span></a></li><span data-dcnode-id="549" instrument_node="">
</span></ul></div><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span><div class="accordion-item" data-dcnode-id="517"><span data-dcnode-id="543" instrument_node="">
</span><div class="accordion-item__title" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Assessment</span></div><span data-dcnode-id="540" instrument_node="">
</span><div class="accordion-item__teaser" data-dcnode-id="519"><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Students will incorporate their comparison of images from Activity 3 into their comparison of a news release from a NASA story about the Pleiades (“Hubble Refines Distance to Pleiades Star Cluster”). This story presents new scientific information about measuring distances to distant stars developed as a result of analysis of images from the Hubble Space Telescope. It will serve as a comprehensive review of student’s general understanding of measurement and distance obtained through their comparisons of the close reading with the drawing and the photograph.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">After reading the news story, have students comment about the progress of astronomical observation by writing a short (one- to two-page) analysis comparing the current state of knowledge regarding the Pleiades nebula to what Galileo wrote in the passages from </span><em data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Sidereus Nuncius</span></em><span data-dcnode-id="533" instrument_node=""> in Activity 2. Remind them to incorporate their comparison of images from Activity 3.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="528"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Resources</span></strong></p><span data-dcnode-id="527" instrument_node="">
</span><ul data-dcnode-id="520"><li data-dcnode-id="522"><span data-dcnode-id="526" instrument_node="">NASA story, "</span><a data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/newscenter/archive/releases/2004/20/image/a/" rel="noopener" target="_blank"><span data-dcnode-id="525" instrument_node="">Hubble Redefines Distance to Pleiades Star Cluster</span></a><span data-dcnode-id="523" instrument_node="">"</span></li><span data-dcnode-id="521" instrument_node="">
</span></ul></div><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span><div class="accordion-item" data-dcnode-id="443"><span data-dcnode-id="515" instrument_node="">
</span><div class="accordion-item__title" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Lesson Extensions</span></div><span data-dcnode-id="512" instrument_node="">
</span><div class="accordion-item__teaser" data-dcnode-id="445"><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Working with the constellation Orion presents a visually more challenging extension of the culminating activity of this lesson and will deepen students’ skills in analyzing complex scientific media and in making more subtle observations about the actual state of galaxies, with their dust and gas clouds.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">This activity should be done by pairs of students or by individual students.</span></p><span data-dcnode-id="506" instrument_node="">
</span><ul data-dcnode-id="493"><li data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">As above, have students use the fill out the </span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/2018-07/orion_graphic_organizer.pdf" target="_blank"><span data-dcnode-id="504" instrument_node="">star comparison graphic organizer</span></a><span data-dcnode-id="502" instrument_node="">, this time for the Orion system;</span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Instruct them to use the same types of categories and strategies that they used when comparing the images of the Pleiades. (If they are having trouble making the comparison, remind them that they may need to reorient the images in order to match the stars and prompt them to look for visual clues that can help them do that.)</span></li><span data-dcnode-id="497" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">You might also have them use the background on this constellation at the AAAS’s Science NetLinks interactive for the constellation Orion.</span></li><span data-dcnode-id="494" instrument_node="">
</span></ul><h2 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Assessment</span></h2><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Instruct students to read the NASA story about the Orion nebula (“Hubble Panoramic View of Orion Nebulae Reveals Thousands of Stars”), which presents new scientific information on the density and variety of stars in the Orion nebula developed as a result of analysis of images from the Hubble Space Telescope.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="486" instrument_node="">After reading the news stories, have students comment about the progress of in astronomical observation of the understanding of the constellation by writing a short (one- to two-page) analysis comparing the current state of knowledge regarding the Orion nebula to what Galileo wrote about the constellation in the passages from </span><em data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Sidereus Nuncius</span></em><span data-dcnode-id="483" instrument_node=""> in Activity 2. Instruct students to incorporate their comparison of images from the earlier part of this extension activity.</span></p><span data-dcnode-id="481" instrument_node="">
