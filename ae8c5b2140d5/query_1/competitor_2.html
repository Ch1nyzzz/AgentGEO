            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="304"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body alink="#FF0000" background="../gifs/chalk.jpg" bgcolor="#eeeeee" data-dcnode-id="2" link="#0000FF" text="#000000" vlink="#e500FF"><span data-dcnode-id="310" instrument_node="">
</span><title data-dcnode-id="308">Galileo:  The Telescope &amp; The Laws of Dynamics
</title><span data-dcnode-id="307" instrument_node="">
</span><span data-dcnode-id="305" instrument_node="">
</span><span data-dcnode-id="303" instrument_node="">
</span><span data-dcnode-id="302" instrument_node="">
</span><hr data-dcnode-id="301" size="5"><span data-dcnode-id="300" instrument_node="">
</span><img align="left" data-dcnode-id="299" height="83" hspace="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/saturn-small.gif&amp;raw" width="132"><span data-dcnode-id="298" instrument_node="">
</span><b data-dcnode-id="3"><font data-dcnode-id="294" size="+3"><span data-dcnode-id="297" instrument_node="">Galileo:  the Telescope &amp; </span><br data-dcnode-id="296"><span data-dcnode-id="295" instrument_node="">
the Laws of Dynamics</span></font><span data-dcnode-id="293" instrument_node="">
</span><b data-dcnode-id="4"><span data-dcnode-id="292" instrument_node="">
</span><br clear="all" data-dcnode-id="291"><span data-dcnode-id="290" instrument_node="">
</span><hr data-dcnode-id="289" size="3"><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="287" instrument_node="">
</span><img align="right" data-dcnode-id="286" height="130" hspace="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/galileo.gif&amp;raw" vspace="5" width="90"><span data-dcnode-id="285" instrument_node="">
Galileo Galilei (1564-1642) was a pivotal figure in the development of modern
astronomy, both because of his contributions directly
to astronomy, and because of his
work in physics and its relation to astronomy.  He provided the crucial
observations that proved the Copernican hypothesis, and also laid the
foundations for a correct understanding of how objects moved on the surface of
the earth (dynamics) and of gravity.  
</span></p><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">
Newton, who was born the same year that Galileo died,
 would build on Galileo's ideas to demonstrate that the laws of motion in the
heavens and the laws of motion on the earth were one and the same.  Thus,
Galileo began and Newton completed a synthesis of astronomy and physics 
in which the former was recognized as 
but a particular example of the latter, and
that would banish the notions of Aristotle almost completely from both.
</span></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">
One could, with considerable justification, view Galileo as the father both of
modern astronomy and of modern  physics.

</span></p><h2 data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The Telescope</span></h2><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
</span></p><center data-dcnode-id="273"><img data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/gp1.jpg&amp;raw"></center><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">
Galileo did not invent the telescope.  The Dutch, notably Christine Huygens, were the first
to invent and experiment with lenses (to improve eye sight).  But Galileo was the first to use the telescope to study
the heavens
systematically.  His 
little telescope
 was poorer than even a cheap
modern amateur telescope, but what he observed in the heavens rocked the very
foundations of Aristotle's universe and the theological-philosophical worldview
that it supported.  It is said that what Galileo  saw was so
disturbing for some officials of the Church that they refused to even
look through
his telescope; they reasoned that the Devil was capable of making
anything appear in the telescope, so  
it was best not to look through it.  That is, the telescope was an instrument of the Devil.
That such was so could be no clearer than the image of the moon as it appeared through
Galileo's telescope:
</span></p><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">
</span></p><center data-dcnode-id="263"><span data-dcnode-id="268" instrument_node=""> </span><img data-dcnode-id="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/phys361/moon.gif&amp;raw"><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">
</span></p></center><span data-dcnode-id="262" instrument_node="">
For the moon was not perfect, it had blemishes and scars.  A year later, when other
copies of the telescope were made, many others made sketches of the moon, concerning
its imperfect nature:
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">
</span></p><center data-dcnode-id="258"><img data-dcnode-id="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/phys361/others.jpg&amp;raw"></center><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="256" instrument_node="">
Opps </span><img data-dcnode-id="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/hand.gif&amp;raw"><span data-dcnode-id="254" instrument_node=""> it does not appear that all of the objects in Aristotle's Universe are,
in fact, perfect.  The moon has defects!
</span></p><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">
Well if the moon had defects then Saturn was way whacked out:
</span></p><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">
</span></p><center data-dcnode-id="244"><img data-dcnode-id="248" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/gsat.gif&amp;raw"><p data-dcnode-id="245"><img data-dcnode-id="247" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/image6big.jpg&amp;raw"><span data-dcnode-id="246" instrument_node=""> </span></p></center><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">
</span></p><h3 data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Sunspots</span></h3><span data-dcnode-id="238" instrument_node="">
</span><img align="right" data-dcnode-id="237" height="135" hspace="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/sunspots.gif&amp;raw" width="120"><span data-dcnode-id="236" instrument_node="">
Galileo observed the Sun through his telescope and saw that the
Sun had 
dark patches on it that we now call </span><i data-dcnode-id="234"><span data-dcnode-id="235" instrument_node=""> sunspots </span></i><span data-dcnode-id="233" instrument_node="">
(he eventually
went blind, perhaps from damage suffered by looking at the Sun with his
telescope).  Furthermore, he observed motion of the sunspots indicating that
the Sun was rotating on an axis.  These "blemishes" on the Sun were contrary to
the doctrine of an unchanging perfect
substance in the heavens, and the rotation of the
Sun made it less strange that the Earth might rotate on an axis too, as
required in the Copernican model.  Both represented new facts that were unknown
to Aristotle and Ptolemy.

</span><a data-dcnode-id="228" name="jmoons"><span data-dcnode-id="232" instrument_node="">
</span><h3 data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">The Moons of Jupiter</span></h3><span data-dcnode-id="229" instrument_node="">
</span></a><span data-dcnode-id="227" instrument_node="">
</span><img align="left" data-dcnode-id="226" height="180" hspace="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/jovemoons.gif&amp;raw" vspace="5" width="230"><span data-dcnode-id="225" instrument_node="">
Galileo observed 4 points of light that changed their
positions with time
around the planet Jupiter on a nightly basis. He concluded that these were objects in
orbit around Jupiter.  Indeed, they were the 4 brightest moons of Jupiter,
which are now 
commonly called the </span><em data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Galilean moons</span></em><span data-dcnode-id="222" instrument_node=""> (Galileo himself called them
the </span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node=""> Medicea Siderea</span></em><span data-dcnode-id="219" instrument_node="">---the ``Medician Stars'').  Here is a
</span><a data-dcnode-id="217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/run/galileo2"><span data-dcnode-id="218" instrument_node=""> simulation </span></a><span data-dcnode-id="216" instrument_node=""> of the
system which approximates Galileo's field of view and the poor optics of
his telescope (which is why the images are not sharp).
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">
In this simulation you can observe the "real" system of Jupiter and its moons
over the course of a 14 hour night.  The simulation will pause 1/2 way through
so that you can notice the change in positions on a 7 hour timescale.  The simulation then 
transitions to a 10 hour day light period where Galileo is shown to have random
daytime thoughts about physics.  The next night is then available and the positions of
the moons have advanced 10 hours forward and Galileo can then make another set 
of observations of the configuration of the moons as he builds up his log book:
</span></p><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">
</span></p><center data-dcnode-id="210"><img data-dcnode-id="211" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/full-galileo_jupiter.gif&amp;raw"></center><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">
Galileo's observations were done over the course of 15 nights in January of 1610; two
of which were cloudy:</span></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">
</span></p><center data-dcnode-id="198"><img data-dcnode-id="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/grecords.jpg&amp;raw"><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">
</span></p><p data-dcnode-id="199"><span data-dcnode-id="201" instrument_node=""> </span><img data-dcnode-id="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/sidnunanim.gif&amp;raw"></p></center><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">
Clearly, the nightly changes in the positions of the moons relative to
Jupiter was obvious for Galileo (and anyone else that observed
the system).
</span></p><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">
These
observations again showed that there were new things in the heavens that
Aristotle and Ptolemy had known nothing about.  Furthermore, they demonstrated 
that a planet could have moons circling it that would not be left behind as the
planet moved around its orbit.  One of the arguments against the 
Copernican
system (and the original heliocentric idea of Aristarchus)
had been that if the moon were in orbit around the Earth and the Earth
in orbit around the Sun, the Earth would leave the Moon behind as it moved
around its orbit.  

</span></p><h3 data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">The Phases of Venus</span></h3><span data-dcnode-id="190" instrument_node="">
</span><img align="right" data-dcnode-id="189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/Venus_phases.jpg&amp;raw"><span data-dcnode-id="188" instrument_node="">Galileo used his telescope to show that Venus went
through a complete set of 
phases, just like the Moon. </span><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">
  This observation was
among the most important in human history, for it provided the first conclusive
observational proof that was consistent with the 
Copernican system but not the
Ptolemaic system.
The crucial point is the empirical fact that Venus
is never very far from the Sun, in terms of angular displacement, in our sky
Thus, as the following diagrams
indicate, in the Ptolemaic system Venus should always be in crescent phase as
viewed from the Earth because as it moves around its epicycle it can never be
far from the direction of the sun (which lies beyond it), 
but in the Copernican system Venus should exhibit a
complete set of phases over time as viewed from the Earth because it is
illuminated from the center of its orbit.

</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">
</span></p><center data-dcnode-id="163"><span data-dcnode-id="183" instrument_node="">
</span><span data-dcnode-id="182" instrument_node="">
</span><span data-dcnode-id="181" instrument_node="">
</span><span data-dcnode-id="178" instrument_node="">
</span><span data-dcnode-id="176" instrument_node="">
</span><span data-dcnode-id="175" instrument_node="">
</span><span data-dcnode-id="169" instrument_node="">
</span><span data-dcnode-id="167" instrument_node="">
</span><table bgcolor="#ffffe0" border="7" cellpadding="10" data-dcnode-id="165"><tbody data-dcnode-id="166"><tr data-dcnode-id="177"><td data-dcnode-id="179"><img data-dcnode-id="180" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/venusphase.gif&amp;raw" width="420"></td></tr><tr data-dcnode-id="168"><td align="center" data-dcnode-id="170"><b data-dcnode-id="172"><font color="purple" data-dcnode-id="173" face="helvetica" size="-1"><span data-dcnode-id="174" instrument_node="">
Phases of Venus in the Ptolemaic and Copernican systems
</span></font></b><span data-dcnode-id="171" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="164" instrument_node="">
</span></center><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="154"><span data-dcnode-id="161" instrument_node="">

It is important to note that this was the first empirical
evidence (coming almost a century after Copernicus) that allowed a
definitive test of the two models.  Until that point, both 
the Ptolemaic and Copernican models  described the
available data.  The primary attraction of the Copernican system was that it
described the data in a </span><em data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">simpler</span></em><span data-dcnode-id="158" instrument_node=""> fashion, but here finally was
conclusive evidence that not only was the Ptolemaic universe more complicated, 
it also was </span><em data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">incorrect</span></em><span data-dcnode-id="155" instrument_node="">. 

</span></p><h3 data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Myriad Observations Showing Phenomena Unknown to Aristotle</span></h3><span data-dcnode-id="151" instrument_node="">
In addition to the observations noted above, Galileo made many other
observations that undermined the authority on which the Ptolemaic universe was
built.  Some of these included
</span><ol data-dcnode-id="135"><span data-dcnode-id="150" instrument_node="">
</span><li data-dcnode-id="146"><span data-dcnode-id="149" instrument_node="">Showing that the planets were disks, not points of light, as seen through
the telescope.
</span><p data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">
</span></p></li><li data-dcnode-id="142"><span data-dcnode-id="145" instrument_node="">Showing that the great "cloud" called the Milky Way (which we now know to
be the disk of our spiral galaxy) was composed of enormous numbers of stars
that had not been seen before.
</span><p data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">
</span></p></li><li data-dcnode-id="138"><span data-dcnode-id="141" instrument_node="">Observing that the planet Saturn had "ears".  We now know that Galileo was
observing the rings of Saturn, but his telescope was not good enough to show
them as more than extensions on either side of the planet.
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">
</span></p></li><li data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Showing that the Moon was not smooth, as had been assumed, but was covered
by mountains and craters.
</span></li></ol><span data-dcnode-id="134" instrument_node="">

As each new wonder was observed, increasing doubt was cast on the prevailing
notion that there was nothing new to be observed in the heavens because they
were made from a perfect, unchanging substance.  It also raised the 
credibility issue:
could the authority of
Aristotle and Ptolemy be trusted concerning the nature of the
Universe if there were so many things in the Universe about which they had been
completely unaware? 

</span><a data-dcnode-id="129" name="leaning"><span data-dcnode-id="133" instrument_node="">
</span><h2 data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Galileo and the Leaning Tower</span></h2><span data-dcnode-id="130" instrument_node="">
</span></a><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="127"></p><center data-dcnode-id="124"><img data-dcnode-id="126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/pisa.gif&amp;raw"><img data-dcnode-id="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/angl.gif&amp;raw"></center><span data-dcnode-id="123" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">
Galileo made extensive contributions to our understanding of the laws governing
the motion of objects.  The famous Leaning Tower of Pisa experiment may be
apocryphal.  It is likely that Galileo himself did not drop two objects of very
different weight from the tower to prove that (contrary to popular
expectations) they would hit the ground at the
same time.  However, it is certain that Galileo understood the principle
involved, and probably did similar experiments.  The realization that, as we
would say in modern terms, the acceleration due to gravity is independent of
the weight of an object was important to the formulation
of a theory of gravitation by
Newton.  
</span></p><p data-dcnode-id="116"><span data-dcnode-id="120" instrument_node="">
Galileo also did experiments on </span><a data-dcnode-id="118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//galileo.rice.edu/lib/student_work/experiment95/paraintr.html"><span data-dcnode-id="119" instrument_node="">  projectile motion </span></a><span data-dcnode-id="117" instrument_node="">  to clearly show just how
wrong the Arisotelian concepts were:
</span></p><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">
</span></p><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">
</span></p><h2 data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Galileo and the Concept of Inertia</span></h2><span data-dcnode-id="109" instrument_node="">

Perhaps Galileo's greatest
contribution to physics was his formulation of the concept of </span><em data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">inertia</span></em><span data-dcnode-id="106" instrument_node="">:
an object in a state of motion possesses an  ``inertia'' that
causes it to remain in that state of motion unless an
external force acts on it. 
</span><p data-dcnode-id="101"><span data-dcnode-id="105" instrument_node="">
Most objects in
a state of motion do NOT remain in that state of motion.  For example, a block
of wood pushed at constant speed across a table quickly comes to rest when we
stop pushing.  Thus, Aristotle held that
objects at rest remained at rest
unless a force acted on them, but that objects in motion did not remain in
motion unless a force acted constantly on them.  Galileo, by virtue of a 
series of experiments (many with objects sliding down inclined planes),
realized that the analysis of Aristotle was incorrect because it failed to
account properly
for a hidden force:  the </span><em data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">frictional force</span></em><span data-dcnode-id="102" instrument_node=""> between the surface
and the object.  
</span></p><p data-dcnode-id="97"><span data-dcnode-id="100" instrument_node="">
</span><img align="left" data-dcnode-id="99" height="150" hspace="20" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/friction.gif&amp;raw" vspace="5" width="200"><span data-dcnode-id="98" instrument_node="">
Thus, as we push the block of wood across the table, there are
two opposing forces that act:  the force associated with the push,
and a force that is
associated with the friction and that acts in the opposite direction.
Galileo realized that as the frictional forces were decreased (for
example, by placing oil on the table) the object would move further and further
before stopping.  From this he abstracted a basic form of
the law of inertia:  if the
frictional forces could be reduced to exactly zero (not possible in a realistic
experiment, but  it can be approximated to high precision) 
an object pushed at constant speed
across a frictionless surface of infinite extent will continue at that speed
forever after we stop pushing, unless a new force acts on it at a later time.

</span></p><ul data-dcnode-id="91"><li data-dcnode-id="92"><font color="dark" data-dcnode-id="93" gold=""><span data-dcnode-id="96" instrument_node=""> Key aspect of methodology </span><img data-dcnode-id="95" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homework.uoregon.edu/pub/class/301/hand.gif&amp;raw"><span data-dcnode-id="94" instrument_node=""> understanding
that ratios can lead to physical understanding as long as a consistent
measurement is done.  
 </span></font></li></ul><font color="dark" data-dcnode-id="89" gold=""><span data-dcnode-id="90" instrument_node=""> </span></font><span data-dcnode-id="88" instrument_node="">
</span><h2 data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">Galileo and the Church</span></h2><span data-dcnode-id="85" instrument_node="">

Galileo's challenge of the Church's authority through his assault on the
Aristotelian conception of the Universe eventually got him into deep trouble
with the Inquisition. Late in his life he was 
forced to 
recant publicly his Copernican views
and spent his last years essentially under house arrest.  
His story certainly constitutes one of the sadder examples of the conflict
between the scientific method and "science" based on unquestioned
authority.  Unfortunately, there still are many forces in modern society that
would shackle the scientific method of open enquiry in ideological
chains of one kind or another.


</span><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">
</span></p><center data-dcnode-id="36"><span data-dcnode-id="82" instrument_node="">
Summarizing Aristotle's View 
</span><p data-dcnode-id="67"><span data-dcnode-id="81" instrument_node=""> </span><span data-dcnode-id="80" instrument_node="">
</span><table border="0" data-dcnode-id="69" width="80%"><tbody data-dcnode-id="70"><tr data-dcnode-id="71"><td data-dcnode-id="72"><h3 data-dcnode-id="73"><span data-dcnode-id="79" instrument_node="">
Aristotle held that there are two kinds of motion for inanimate matter, natural and unnatural. Unnatural (or
"violent") motion is when something is being pushed, and in this case the speed of motion is proportional to
the force of the push. (This was probably deduced from watching ox-carts and boats.) Natural motion is when
something is seeking its natural place in the universe, such as a stone falling, or fire rising. (We are only
talking here about substances composed of earth, water, air and fire, the "natural circular motion" of the
planets, composed of aither, is considered separately). 
</span><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">

For the natural motion of heavy objects falling to earth, Aristotle asserted that the speed of fall was
proportional to the weight, and inversely proportional to the density of the medium the body was falling
through. He did also mention that there was some acceleration, as the body approached more closely its
own element, its weight increased and it speeded up. However, these remarks in Aristotle are very brief and
vague, and certainly not quantitative. 
</span></p><p data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">

Actually, these views of Aristotle did not go unchallenged even in ancient Athens. Thirty years or so after
Aristotle's death, Strato pointed out that a stone dropped from a greater height had a greater impact on the
ground, suggesting that the stone picked up more speed as it fell from the greater height. 
</span></p><p data-dcnode-id="74"></p></h3></td></tr></tbody></table><span data-dcnode-id="68" instrument_node="">
Galileo disputes all of Aristotle's ideas in a satirical manner:
</span></p><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">
Two New Sciences
</span></p><p data-dcnode-id="64"></p><p data-dcnode-id="37"><span data-dcnode-id="63" instrument_node=""> </span><span data-dcnode-id="62" instrument_node="">
</span><table border="0" data-dcnode-id="39" width="80%"><tbody data-dcnode-id="40"><tr data-dcnode-id="41"><td data-dcnode-id="42"><h3 data-dcnode-id="43"><span data-dcnode-id="61" instrument_node="">
Galileo set out his ideas about falling bodies, and about projectiles in general, in a book called "Two New
Sciences". The two were the science of motion, which became the foundation-stone of physics, and the
science of materials and construction, an important contribution to engineering.</span><p data-dcnode-id="59"><span data-dcnode-id="60" instrument_node="">
The ideas are presented in lively fashion as a dialogue involving three characters, Salviati, Sagredo and
Simplicio. The official Church point of view, that is, Aristotelianism, is put forward by the character called
Simplicio, and usually demolished by the others. Galileo's defense when accused of heresy in a similar book
was that he was just setting out all points of view, but this is somewhat disingenuous---Simplicio is almost
invariably portrayed as simpleminded. </span></p><p data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">
</span></p><p data-dcnode-id="55"><span data-dcnode-id="56" instrument_node="">
Salviati states:
</span></p><p data-dcnode-id="50"><span data-dcnode-id="54" instrument_node="">
</span><i data-dcnode-id="52"><span data-dcnode-id="53" instrument_node="">

I greatly doubt that Aristotle ever tested by experiment whether it be true that two stones, one weighing ten times
as much as the other, if allowed to fall, at the same instant, from a height of, say, 100 cubits, would so differ in
speed that when the heavier had reached the ground, the other would not have fallen more than 10 cubits. </span></i><span data-dcnode-id="51" instrument_node="">
</span></p><p data-dcnode-id="47"><font color="dark" data-dcnode-id="48" gold=""><span data-dcnode-id="49" instrument_node="">
This then marks the beginning of the modern era in science---the attitude that assertions about the
physical world by authorities, no matter how wise or revered, stand or fall by experimental test.
</span></font></p><p data-dcnode-id="44"><font color="dark" data-dcnode-id="45" gold=""><span data-dcnode-id="46" instrument_node="">
</span></font></p></h3></td></tr></tbody></table><span data-dcnode-id="38" instrument_node="">
</span></p></center><span data-dcnode-id="35" instrument_node="">
</span><p data-dcnode-id="33"><span data-dcnode-id="34" instrument_node="">
</span></p><p data-dcnode-id="28"><span data-dcnode-id="32" instrument_node="">
</span><a data-dcnode-id="30" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/wgbh/nova/galileo/experiments.html"><span data-dcnode-id="31" instrument_node="">
Galileo's Virtual Experiments </span></a><span data-dcnode-id="29" instrument_node="">  (Go Here and Learn)

</span></p><p data-dcnode-id="26"><span data-dcnode-id="27" instrument_node="">
</span></p><p data-dcnode-id="24"><span data-dcnode-id="25" instrument_node="">
</span></p><h4 data-dcnode-id="11"><span data-dcnode-id="23" instrument_node="">
</span><font color="dark" data-dcnode-id="12" gold=""><span data-dcnode-id="22" instrument_node="">
Galileo was an exacting experimentalist, fully aware of the value
of precise measurements and repeatable experimental detail:
</span><p data-dcnode-id="20"><span data-dcnode-id="21" instrument_node="">
Translated Quote from one of Galileo's Journals: </span></p><p data-dcnode-id="16"><span data-dcnode-id="19" instrument_node="">
</span><i data-dcnode-id="17"><span data-dcnode-id="18" instrument_node="">

A piece of wooden moulding or scantling, about 12 cubits long, half a cubit wide, and three finger-breadths
thick, was taken; on its edge was cut a channel a little more than one finger in breadth; having made this groove
very straight, smooth, and polished, and having lined it with parchment, also as smooth and polished as
possible, we rolled along it a hard, smooth, and very round bronze ball. Having placed this board in a sloping
position, by raising one end some one or two cubits above the other, we rolled the ball, as I was just saying,
along the channel, noting, in a manner presently to be described, the time required to make the descent. We
repeated this experiment more than once in order to measure the time with an accuracy such that the deviation
between two observations never exceeded one-tenth of a pulse-beat. Having performed this operation and
having assured ourselves of its reliability, we now rolled the ball only one-quarter the length of the channel; and
having measured the time of its descent, we found it precisely one-half of the former. Next we tried other
distances, compared the time for the whole length with that for the half, or with that for two-thirds, or
three-fourths, or indeed for any fraction; in such experiments, repeated a full hundred times, we always found
that the spaces traversed were to each other as the squares of the times, and this was true for all inclinations
of the plane, i.e., of the channel, along which we rolled the ball. We also observed that the times of descent, for
various inclinations of the plane, bore to one another precisely that ratio which, as we shall see later, the Author
had predicted and demonstrated for them. 

</span></i></p><p data-dcnode-id="13"><i data-dcnode-id="14"><span data-dcnode-id="15" instrument_node="">
For the measurement of time, we employed a large vessel of water placed in an elevated position; to the bottom
of this vessel was soldered a pipe of small diameter giving a thin jet of water which we collected in a small glass
during the time of each descent, whether for the whole length of the channel or for part of its length; the water
thus collected was weighed, after each descent, on a very accurate balance; the differences and ratios of these
weights gave us the differences and ratios of the times, and this with such accuracy that although the operation
was repeated many, many times, there was no appreciable discrepancy in the results. 
</span></i></p></font></h4><font color="dark" data-dcnode-id="9" gold=""><span data-dcnode-id="10" instrument_node="">
</span></font><p data-dcnode-id="5"><font color="dark" data-dcnode-id="7" gold=""><span data-dcnode-id="8" instrument_node="">
</span></font><span data-dcnode-id="6" instrument_node="">
</span></p></b></b>
