</span><article class="post-36425 post type-post status-publish format-standard has-post-thumbnail hentry category-astronomy category-guide-to-space tag-cmb tag-cosmic-inflation tag-cosmic-micorwave-background-radiation tag-featured tag-steady-state-theory tag-the-big-bang-theory tag-the-universe" data-dcnode-id="1167" id="post-36425"><span data-dcnode-id="5458" instrument_node="">
</span><header class="entry-header" data-dcnode-id="5437"><span data-dcnode-id="5457" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="5442"><span class="posted-on" data-dcnode-id="5448"><span class="screen-reader-text" data-dcnode-id="5455"><span data-dcnode-id="5456" instrument_node="">Posted on</span></span><span data-dcnode-id="5454" instrument_node=""> </span><a data-dcnode-id="5449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/36425/what-is-the-universe-3/" rel="bookmark"><time class="entry-date published" data-dcnode-id="5452" datetime="2017-05-10T20:14:47-04:00"><span data-dcnode-id="5453" instrument_node="">May 10, 2017</span></time><time class="updated" data-dcnode-id="5450" datetime="2017-05-14T23:53:30-04:00"><span data-dcnode-id="5451" instrument_node="">May 14, 2017</span></time></a></span><span class="byline" data-dcnode-id="5443"><span data-dcnode-id="5447" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="5444"><a class="url fn n" data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/author/mwill/"><span data-dcnode-id="5446" instrument_node="">Matt Williams</span></a></span></span></div><div class="unive-8447f57ad94f8821d18adc452fd3db5e unive-above-header" data-dcnode-id="5441" id="unive-8447f57ad94f8821d18adc452fd3db5e"></div><h1 class="entry-title" data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">The Universe</span></h1><span data-dcnode-id="5438" instrument_node=""> </span></header><span data-dcnode-id="5436" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1219"><span data-dcnode-id="5435" instrument_node="">
</span><p data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">What is the Universe? That is one immensely loaded question! No matter what angle one took to answer that question, one could spend years answering that question and still barely scratch the surface. In terms of time and space, it is unfathomably large (and possibly even infinite) and incredibly old by human standards. Describing it in detail is therefore a monumental task. But we here at Universe Today are determined to try!</span></p><span data-dcnode-id="5432" instrument_node="">
</span><p data-dcnode-id="5430"><span data-dcnode-id="5431" instrument_node="">So what is the Universe? Well, the short answer is that it is the sum total of all existence. It is the entirety of time, space, matter and energy that began expanding some 13.8 billion years ago and has continued to expand ever since. No one is entirely certain how extensive the Universe truly is, and no one is entirely sure how it will all end. But ongoing research and study has taught us a great deal in the course of human history.</span></p><span data-dcnode-id="5429" instrument_node="">
</span><h2 data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Definition:</span></h2><span data-dcnode-id="5426" instrument_node="">
</span><p data-dcnode-id="5424"><span data-dcnode-id="5425" instrument_node="">The term “the Universe” is derived from the Latin word “universum”, which was used by Roman statesman Cicero and later Roman authors to refer to the world and the cosmos as they knew it. This consisted of the Earth and all living creatures that dwelt therein, as well as the Moon, the Sun, the then-known planets (Mercury, Venus, Mars, Jupiter, Saturn) and the stars.</span></p><div class="unive-content unive-target" data-advadstrackbid="1" data-advadstrackid="155349" data-dcnode-id="5401" id="unive-626799574"><a class="adv-link" data-dcnode-id="5402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/universetoday"><div data-dcnode-id="5406" id="go-ad-free"><span data-dcnode-id="5423" instrument_node="">

</span></a></div><span data-dcnode-id="5400" instrument_node="">
</span><figure aria-describedby="caption-attachment-121500" class="wp-caption aligncenter" data-dcnode-id="5394" id="attachment_121500" style="width: 580px"><a data-dcnode-id="5398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2012/03/Copernican.jpg"><img alt="" class="size-medium wp-image-121500" data-dcnode-id="5399" height="427" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2012/03/Copernican-580x427.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2012/03/Copernican-580x427.jpg 580w, https://www.universetoday.com/wp-content/uploads/2012/03/Copernican-250x184.jpg 250w, https://www.universetoday.com/wp-content/uploads/2012/03/Copernican.jpg 1000w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="5395" id="caption-attachment-121500"><em data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">Illuminated illustration of the Ptolemaic geocentric conception of the Universe by Portuguese cosmographer and cartographer Bartolomeu Velho (?-1568) in his work Cosmographia (1568). Credit: Bibilotèque nationale de France, Paris</span></em></figcaption></figure><span data-dcnode-id="5393" instrument_node="">
</span><p data-dcnode-id="5382"><span data-dcnode-id="5392" instrument_node="">The term “cosmos” is often used interchangeably with the Universe. It is derived from the Greek word </span><em data-dcnode-id="5390"><span data-dcnode-id="5391" instrument_node="">kosmos</span></em><span data-dcnode-id="5389" instrument_node="">, which literally means “the world”. Other words commonly used to define the entirety of existence include “Nature” (derived from the Germanic word </span><em data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">natur</span></em><span data-dcnode-id="5386" instrument_node="">) and the English word “everything”, who’s use can be seen in scientific terminology – i.e. “</span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/18213/podcast-the-search-for-the-theory-of-everything/"><span data-dcnode-id="5385" instrument_node="">Theory Of Everything</span></a><span data-dcnode-id="5383" instrument_node="">” (TOE).</span></p><span data-dcnode-id="5381" instrument_node="">
</span><p data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Today, this term is often to used to refer to all things that exist within the known Universe – the Solar System, the Milky Way, and all known galaxies and superstructures. In the context of modern science, astronomy and astrophysics, it also refers to all spacetime, all forms of energy (i.e. electromagnetic radiation and matter) and the physical laws that bind them.</span></p><span data-dcnode-id="5378" instrument_node="">
</span><h2 data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">Origin of the Universe:</span></h2><span data-dcnode-id="5375" instrument_node="">
</span><p data-dcnode-id="5364"><span data-dcnode-id="5374" instrument_node="">The current scientific consensus is that the Universe expanded from a point of super high matter and energy density roughly 13.8 billion years ago. This theory, known as the </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/54756/what-is-the-big-bang-theory/"><span data-dcnode-id="5373" instrument_node="">Big Bang Theory</span></a><span data-dcnode-id="5371" instrument_node="">, is not the only cosmological model for explaining the origins of the Universe and its evolution – for example, there is the </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/science/space/universe/questions_and_ideas/steady_state_theory"><span data-dcnode-id="5370" instrument_node="">Steady State Theory</span></a><span data-dcnode-id="5368" instrument_node=""> or the </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/38195/oscillating-universe-theory/"><span data-dcnode-id="5367" instrument_node="">Oscillating Universe Theory</span></a><span data-dcnode-id="5365" instrument_node="">.</span></p><div class="unive-e4b864961d692c02e31bd538c52e6d41 unive-in-content" data-dcnode-id="5363" id="unive-e4b864961d692c02e31bd538c52e6d41"></div><span data-dcnode-id="5362" instrument_node="">
</span><p data-dcnode-id="5357"><span data-dcnode-id="5361" instrument_node="">It is, however, the most widely-accepted and popular. This is due to the fact that the Big Bang theory alone is able to explain the origin of all known matter, the laws of physics, and the large scale structure of the Universe. It also accounts for the expansion of the Universe, the existence of the </span><a data-dcnode-id="5359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/110221/what-is-the-cosmic-microwave-background-radiation/"><span data-dcnode-id="5360" instrument_node="">Cosmic Microwave Background</span></a><span data-dcnode-id="5358" instrument_node="">, and a broad range of other phenomena.</span></p><span data-dcnode-id="5356" instrument_node="">
</span><figure aria-describedby="caption-attachment-92134" class="wp-caption aligncenter" data-dcnode-id="5350" id="attachment_92134" style="width: 580px"><a data-dcnode-id="5354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2011/12/history.bigbang.jpg"><img alt="Illustration of the Big Bang Theory" class="size-medium wp-image-92134" data-dcnode-id="5355" height="391" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2011/12/history.bigbang-580x391.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2011/12/history.bigbang-580x391.jpg 580w, https://www.universetoday.com/wp-content/uploads/2011/12/history.bigbang-250x168.jpg 250w, https://www.universetoday.com/wp-content/uploads/2011/12/history.bigbang-1024x691.jpg 1024w, https://www.universetoday.com/wp-content/uploads/2011/12/history.bigbang.jpg 1361w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="5351" id="caption-attachment-92134"><em data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">The Big Bang Theory: A history of the Universe starting from a singularity and expanding ever since. Credit: grandunificationtheory.com</span></em></figcaption></figure><span data-dcnode-id="5349" instrument_node="">
</span><p data-dcnode-id="5347"><span data-dcnode-id="5348" instrument_node="">Working backwards from the current state of the Universe, scientists have theorized that it must have originated at a single point of infinite density and finite time that began to expand. After the initial expansion, the theory maintains that Universe cooled sufficiently to allow for the formation of subatomic particles, and later simple atoms. Giant clouds of these primordial elements later coalesced through gravity to form stars and galaxies.</span></p><span data-dcnode-id="5346" instrument_node="">
</span><p data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">This all began roughly 13.8 billion years ago, and is thus considered to be the age of the Universe. Through the testing of theoretical principles, experiments involving particle accelerators and high-energy states, and astronomical studies that have observed the deep Universe, scientists have constructed a timeline of events that began with the Big Bang and has led to the current state of cosmic evolution.</span></p><span data-dcnode-id="5343" instrument_node="">
</span><p data-dcnode-id="5335"><span data-dcnode-id="5342" instrument_node="">However, the earliest times of the Universe – lasting from approximately 10</span><sup data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">-43</span></sup><span data-dcnode-id="5339" instrument_node=""> to 10</span><sup data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">-11</span></sup><span data-dcnode-id="5336" instrument_node=""> seconds after the Big Bang –&nbsp; are the subject of extensive speculation. Given that the laws of physics as we know them could not have existed at this time, it is difficult to fathom how the Universe could have been governed. What’s more, experiments that can create the kinds of energies involved are in their infancy.</span></p><span data-dcnode-id="5334" instrument_node="">
</span><p data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">Still, many theories prevail as to what took place in this initial instant in time, many of which are compatible. In accordance with many of these theories, the instant following the Big Bang can be broken down into the following time periods: the Singularity Epoch, the Inflation Epoch, and the Cooling Epoch.</span></p><span data-dcnode-id="5331" instrument_node="">

d="4840" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="4841" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="4839" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="4834"><use class="ytp-svg-shadow" data-dcnode-id="4836" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="4837" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="4835" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="4830"><use class="ytp-svg-shadow" data-dcnode-id="4832" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="4833" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="4831" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=xtrYF_hxxUM" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></p><span data-dcnode-id="4810" instrument_node="">
</span><p data-dcnode-id="4805"><span data-dcnode-id="4809" instrument_node="">Also known as the </span><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hyperphysics.phy-astr.gsu.edu/hbase/astro/planck.html%23c3"><span data-dcnode-id="4808" instrument_node="">Planck Epoch</span></a><span data-dcnode-id="4806" instrument_node=""> (or Planck Era), the Singularity Epoch was the earliest known period of the Universe. At this time, all matter was condensed on a single point of infinite density and extreme heat. During this period, it is believed that the quantum effects of gravity dominated physical interactions and that no other physical forces were of equal strength to gravitation.</span></p><div class="unive-a11708419ae818dc198681163aad5282 unive-in-content" data-dcnode-id="4804" id="unive-a11708419ae818dc198681163aad5282"></div><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4788"><span data-dcnode-id="4802" instrument_node="">This Planck period of time extends from point 0 to approximately 10</span><sup data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">-43 </span></sup><span data-dcnode-id="4799" instrument_node="">seconds, and is so named because it can only be measured in Planck time. Due to the extreme heat and density of matter, the state of the Universe was highly unstable. It thus began to expand and cool, leading to the manifestation of the fundamental forces of physics. </span><span class="mw-headline" data-dcnode-id="4797" id="Grand_unification_epoch"><span data-dcnode-id="4798" instrument_node="">From approximately </span></span><span data-dcnode-id="4796" instrument_node="">10</span><sup data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">-43</span></sup><span data-dcnode-id="4793" instrument_node=""> second and 10</span><sup data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">-36</span></sup><span class="mw-headline" data-dcnode-id="4789" id="Grand_unification_epoch"><span data-dcnode-id="4790" instrument_node="">, the Universe began to cross transition temperatures. </span></span></p><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4772"><span class="mw-headline" data-dcnode-id="4785" id="Grand_unification_epoch"><span data-dcnode-id="4786" instrument_node="">It is here that the fundamental forces that govern the Universe are believed to have began separating from each other. The first step in this was the force of gravitation </span></span><span class="mw-headline" data-dcnode-id="4783" id="Grand_unification_epoch"><span data-dcnode-id="4784" instrument_node="">separating from gauge forces, which account for strong and weak nuclear forces and electromagnetism. </span></span><span data-dcnode-id="4782" instrument_node="">Then, from 10</span><sup data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">-36 </span></sup><span data-dcnode-id="4779" instrument_node="">to 10</span><sup data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">-32 </span></sup><span data-dcnode-id="4776" instrument_node="">seconds after the Big Bang, the temperature of the Universe was low enough (10</span><sup data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">28</span></sup><span data-dcnode-id="4773" instrument_node=""> K) that electromagnetism and weak nuclear force were able to separate as well.</span></p><span data-dcnode-id="4771" instrument_node="">
</span><p data-dcnode-id="4766"><span data-dcnode-id="4770" instrument_node="">With the creation of the first fundamental forces of the Universe, the Inflation Epoch began, lasting from 10</span><sup data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">-32 </span></sup><span data-dcnode-id="4767" instrument_node="">seconds in Planck time to an unknown point. Most cosmological models suggest that the Universe at this point was filled homogeneously with a high-energy density, and that the incredibly high temperatures and pressure gave rise to rapid expansion and cooling.</span></p><span data-dcnode-id="4765" instrument_node="">
</span><p data-dcnode-id="4762"><span class="embed-youtube" data-dcnode-id="4763" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="4764" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Y6hBthfoosI%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="4761" instrument_node="">
</span><p data-dcnode-id="4754"><span class="mw-headline" data-dcnode-id="4759" id="Grand_unification_epoch"><span data-dcnode-id="4760" instrument_node="">This began at </span></span><span data-dcnode-id="4758" instrument_node="">10</span><sup data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">-37</span></sup><span data-dcnode-id="4755" instrument_node=""> seconds, where the phase transition that caused for the separation of forces also led to a period where the Universe grew exponentially. It was also at this point in time that baryogenesis occurred, which refers to a hypothetical event where temperatures were so high that the random motions of particles occurred at relativistic speeds.</span></p><span data-dcnode-id="4753" instrument_node="">
</span><p data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">As a result of this, particle–antiparticle pairs of all kinds were being continuously created and destroyed in collisions, which is believed to have led to the predominance of matter over antimatter in the present Universe. After inflation stopped, the Universe consisted of a quark–gluon plasma, as well as all other elementary particles. From this point onward, the Universe began to cool and matter coalesced and formed.</span></p><span data-dcnode-id="4750" instrument_node="">
</span><p data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">As the Universe continued to decrease in density and temperature, the Cooling Epoch began. This was characterized by the energy of particles decreasing and phase transitions continuing until the fundamental forces of physics and elementary particles changed into their present form. Since particle energies would have dropped to values that can be obtained by particle physics experiments, this period onward is subject to less speculation.</span></p><div class="unive-275843f504f4494a30bd05f1258d701e unive-in-content" data-dcnode-id="4747" id="unive-275843f504f4494a30bd05f1258d701e"></div><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4738"><span data-dcnode-id="4745" instrument_node="">For example, scientists believe that about 10</span><sup data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">-11</span></sup><span data-dcnode-id="4742" instrument_node=""> seconds after the Big Bang, particle energies dropped considerably. At about 10</span><sup data-dcnode-id="4740"><span data-dcnode-id="4741" instrument_node="">-6</span></sup><span data-dcnode-id="4739" instrument_node=""> seconds, quarks and gluons combined to form baryons such as protons and neutrons, and a small excess of quarks over antiquarks led to a small excess of baryons over antibaryons.</span></p><span data-dcnode-id="4737" instrument_node="">

</span><p data-dcnode-id="4211"><span data-dcnode-id="4215" instrument_node="">Since temperatures were not high enough to create new proton-antiproton pairs (or neutron-anitneutron pairs), mass annihilation immediately followed, leaving just one in 10</span><sup data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">10</span></sup><span data-dcnode-id="4212" instrument_node=""> of the original protons and neutrons and none of their antiparticles. A similar process happened at about 1 second after the Big Bang for electrons and positrons.</span></p><span data-dcnode-id="4210" instrument_node="">
</span><p data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">After these annihilations, the remaining protons, neutrons and electrons were no longer moving relativistically and the energy density of the Universe was dominated by photons – and to a lesser extent, neutrinos. A few minutes into the expansion, the period known as Big Bang nucleosynthesis also began.</span></p><span data-dcnode-id="4207" instrument_node="">
</span><p data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Thanks to temperatures dropping to 1 billion kelvin and energy densities dropping to about the equivalent of air, neutrons and protons began to combine to form the Universe’s first deuterium (a stable isotope of hydrogen) and helium atoms. However, most of the Universe’s protons remained uncombined as hydrogen nuclei.</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4199"><span data-dcnode-id="4203" instrument_node="">After about 379,000 years, electrons combined with these nuclei to form atoms (again, mostly hydrogen), while the radiation decoupled from matter and continued to expand through space, largely unimpeded. This radiation is now known to be what constitutes the </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/110221/what-is-the-cosmic-microwave-background-radiation/"><span data-dcnode-id="4202" instrument_node="">Cosmic Microwave Background</span></a><span data-dcnode-id="4200" instrument_node=""> (CMB), which today is the oldest light in the Universe.</span></p><span data-dcnode-id="4198" instrument_node="">

"#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="3708" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="3706" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="3701"><use class="ytp-svg-shadow" data-dcnode-id="3703" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="3704" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="3702" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="3697"><use class="ytp-svg-shadow" data-dcnode-id="3699" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="3700" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="3698" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="3684"><span data-dcnode-id="3685" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=cBroWdozyWk" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></p><span data-dcnode-id="3677" instrument_node="">
</span><p data-dcnode-id="3656"><span data-dcnode-id="3676" instrument_node="">As the CMB expanded, it gradually lost density and energy, and is currently estimated to have a temperature of </span><span class="nowrap" data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">2.7260 ± 0.0013&nbsp;K</span></span><span data-dcnode-id="3673" instrument_node=""> (-270.424 °C/ -454.763 °F ) and an energy density of </span><span class="nowrap" data-dcnode-id="3669"><span data-dcnode-id="3672" instrument_node="">0.25&nbsp;eV/cm</span><sup data-dcnode-id="3670"><span data-dcnode-id="3671" instrument_node="">3</span></sup></span><span data-dcnode-id="3668" instrument_node=""> (or </span><span class="nowrap" data-dcnode-id="3661"><span data-dcnode-id="3667" instrument_node="">4.005×10</span><sup data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">-14</span></sup><span data-dcnode-id="3664" instrument_node="">&nbsp;J/m</span><sup data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">3</span></sup></span><span data-dcnode-id="3660" instrument_node="">; 400–500&nbsp;photons/cm</span><sup data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">3</span></sup><span data-dcnode-id="3657" instrument_node="">). The CMB can be seen in all directions at a distance of roughly 13.8 billion light years, but estimates of its actual distance place it at about 46 billion light years from the center of the Universe.</span></p><div class="unive-af856f3b8d059fa0a5342e70a4152fcb unive-in-content" data-dcnode-id="3655" id="unive-af856f3b8d059fa0a5342e70a4152fcb"></div><span data-dcnode-id="3654" instrument_node="">
</span><h2 data-dcnode-id="3649"><span data-dcnode-id="3653" instrument_node="">Evolution of the Universe:</span><strong data-dcnode-id="3650"><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">
</span></strong></h2><span data-dcnode-id="3648" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Over the course of the several billion years that followed, the slightly denser regions of the Universe’s matter (which was almost uniformly distributed) began to become gravitationally attracted to each other. They therefore grew even denser, forming gas clouds, stars, galaxies, and the other astronomical structures that we regularly observe today.</span></p><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">This is what is known as the Structure Epoch, since it was during this time that the modern Universe began to take shape. This consisted of visible matter distributed in structures of various sizes (i.e. stars and planets to galaxies, galaxy clusters, and super clusters) where matter is concentrated, and which are separated by enormous gulfs containing few galaxies.</span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3641" instrument_node="">The details of this process depend on the amount and type of matter in the Universe. Cold dark matter, warm dark matter, hot dark matter, and baryonic matter are the four suggested types. However, the </span><a data-dcnode-id="3639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cosmology.berkeley.edu/Education/CosmologyEssays/The_Standard_Cosmology.html"><span data-dcnode-id="3640" instrument_node="">Lambda-Cold Dark Matter</span></a><span data-dcnode-id="3638" instrument_node=""> model (Lambda-CDM), in which the dark matter particles moved slowly compared to the speed of light, is the considered to be the standard model of Big Bang cosmology, as it best fits the available data.</span></p><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3598"><span class="embed-youtube" data-dcnode-id="3599" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="3600" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/sHkIh46_zC0%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"><html data-cast-api-enabled="true" data-dcnode-id="3602" dir="ltr" lang="en"><head data-dcnode-id="3611"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="3632" name="viewport"/><link data-dcnode-id="3627" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="6bQANEYjnswweSfseGkX2A" rel="stylesheet"/><title data-dcnode-id="3614">YouTube</title><link data-dcnode-id="3613" href="https://www.youtube.com/watch?v=sHkIh46_zC0" rel="canonical"/><link data-dcnode-id="3612" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="BkRxnyUSzogOxVAuiCJBWg" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="3603" dir="ltr"><div data-dcnode-id="3610" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=sHkIh46_zC0" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></p><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3589"><span data-dcnode-id="3596" instrument_node="">In this model, cold dark matter is estimated to make up about 23% of the matter/energy of the Universe, while baryonic matter makes up about 4.6%. The Lambda refers to the </span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/55680/cosmological-constant/"><span data-dcnode-id="3595" instrument_node="">Cosmological Constant</span></a><span data-dcnode-id="3593" instrument_node="">, a theory originally proposed by </span><a data-dcnode-id="3591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/78558/albert-einsteins-inventions/"><span data-dcnode-id="3592" instrument_node="">Albert Einstein</span></a><span data-dcnode-id="3590" instrument_node=""> that attempted to show that the balance of mass-energy in the Universe remains static.</span></p><span data-dcnode-id="3588" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3587" instrument_node="">In this case, it is associated with </span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/119363/how-do-we-know-dark-energy-exists/"><span data-dcnode-id="3586" instrument_node="">dark energy</span></a><span data-dcnode-id="3584" instrument_node="">, which served to accelerate the expansion of the Universe and keep its large-scale structure largely uniform. The existence of dark energy is based on multiple lines of evidence, all of which indicate that the Universe is permeated by it. Based on observations, it is estimated that 73% of the Universe is made up of this energy.</span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">During the earliest phases of the Universe, when all of the baryonic matter was more closely space together, gravity predominated. However, after billions of years of expansion, the growing abundance of dark energy led it to begin dominating interactions between galaxies. This triggered an acceleration, which is known as the Cosmic Acceleration Epoch.</span></p><div class="unive-093179aba6aafd7a8a833c86eb5c5d2f unive-in-content" data-dcnode-id="3579" id="unive-093179aba6aafd7a8a833c86eb5c5d2f"></div><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">When this period began is subject to debate, but it is estimated to have began roughly 8.8 billion years after the Big Bang (5 billion years ago). Cosmologists rely on both quantum mechanics and Einstein’s General Relativity to describe the process of cosmic evolution that took place during this period and any time after the Inflationary Epoch.</span></p><span data-dcnode-id="3575" instrument_node="">

</span><p data-dcnode-id="3049"><span data-dcnode-id="3053" instrument_node="">Through a rigorous process of observations and modeling, scientists have determined that this evolutionary period does accord with Einstein’s field equations, though the true nature of dark energy remains illusive. What’s more, there are no well-supported models that are capable of determining what took place in the Universe prior to the period predating 10</span><sup data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">-15 </span></sup><span data-dcnode-id="3050" instrument_node="">seconds after the Big Bang.</span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3047" instrument_node="">However, ongoing experiments using CERN’s Large Hadron Collider (LHC) seek to recreate the energy conditions that would have existed during the Big Bang, which is also expected to reveal physics that go beyond the realm of the </span><a data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.cern/about/physics/standard-model"><span data-dcnode-id="3046" instrument_node="">Standard Model</span></a><span data-dcnode-id="3044" instrument_node="">.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3041" instrument_node="">Any breakthroughs in this area will likely lead to a unified theory of quantum gravitation, where scientists will finally be able to understand how gravity interacts with the three other fundamental forces of the physics – electromagnetism, weak nuclear force and strong nuclear force. This, in turn, will also help us to understand what truly happened during the earliest epochs of the Universe.</span></p><span data-dcnode-id="3039" instrument_node="">
</span><h2 data-dcnode-id="3037"><span data-dcnode-id="3038" instrument_node="">Structure of the Universe:</span></h2><span data-dcnode-id="3036" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3035" instrument_node="">The actual size, shape and large-scale structure of the Universe has been the subject of ongoing research. Whereas the oldest light in the Universe that can be observed is 13.8 billion light years away (the CMB), this is not the actual extent of the Universe. Given that the Universe has been in a state of expansion for billion of years, and at velocities that exceed the speed of light, the actual boundary extends far beyond what we can see.</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Our current cosmological models indicate that the Universe measures some 91 billion light years (28 billion parsecs) in diameter. In other words, the observable Universe extends outwards from our Solar System to a distance of roughly 46 billion light years in all directions. However, given that the edge of the Universe is not observable, it is not yet clear whether the Universe actually has an edge. For all we know, it goes on forever!</span></p><div class="unive-f1a9ddc6bf03653072a790ca8d4b1f77 unive-in-content" data-dcnode-id="3030" id="unive-f1a9ddc6bf03653072a790ca8d4b1f77"></div><span data-dcnode-id="3029" instrument_node="">
</span><figure aria-describedby="caption-attachment-123936" class="wp-caption aligncenter" data-dcnode-id="3023" id="attachment_123936" style="width: 580px"><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe.jpg"><img alt="" class="size-medium wp-image-123936" data-dcnode-id="3028" height="327" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe-580x327.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe-580x327.jpg 580w, https://www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe-250x141.jpg 250w, https://www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe-768x432.jpg 768w, https://www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe-1024x577.jpg 1024w, https://www.universetoday.com/wp-content/uploads/2010/02/Accelerated_Expansion_of_the_Universe.jpg 1362w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="3024" id="caption-attachment-123936"><em data-dcnode-id="3025"><span data-dcnode-id="3026" instrument_node="">Diagram showing the Lambda-CBR Universe, from the Big Bang to the the current era. Credit: Alex Mittelmann/Coldcreation</span></em></figcaption></figure><span data-dcnode-id="3022" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3021" instrument_node="">Within the observable Universe, matter is distributed in a highly structured fashion. Within galaxies, this consists of large concentrations – i.e. planets, stars, and nebulas – interspersed with large areas of empty space (i.e. interplanetary space and the interstellar medium).</span></p><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Things are much the same at larger scales, with galaxies being separated by volumes of space filled with gas and dust. At the largest scale, where galaxy clusters and superclusters exist, you have a wispy network of large-scale structures consisting of dense filaments of matter and gigantic cosmic voids.</span></p><span data-dcnode-id="3016" instrument_node="">
</span><p data-dcnode-id="3011"><span data-dcnode-id="3015" instrument_node="">In terms of its </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/120157/what-shape-is-the-universe/"><span data-dcnode-id="3014" instrument_node="">shape</span></a><span data-dcnode-id="3012" instrument_node="">, spacetime may exist in one of three possible configurations – positively-curved, negatively-curved and flat. These possibilities are based on the existence of at least four dimensions of space-time (an x-coordinate, a y-coordinate, a z-coordinate, and time), and depend upon the nature of cosmic expansion and whether or not the Universe is finite or infinite.</span></p><span data-dcnode-id="3010" instrument_node="">
</span><p data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">A positively-curved (or closed) Universe would resemble a four-dimensional sphere that would be finite in space and with no discernible edge. A negatively-curved (or open) Universe would look like a four-dimensional “saddle” and would have no boundaries in space or time.</span></p><span data-dcnode-id="3007" instrument_node="">
</span><figure aria-describedby="caption-attachment-86276" class="wp-caption aligncenter" data-dcnode-id="3000" id="attachment_86276" style="width: 580px"><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2011/06/End_of_universe2.jpg"><img alt="" class="size-medium wp-image-86276" data-dcnode-id="3006" height="341" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2011/06/End_of_universe2-580x341.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2011/06/End_of_universe2-580x341.jpg 580w, https://www.universetoday.com/wp-content/uploads/2011/06/End_of_universe2-250x147.jpg 250w, https://www.universetoday.com/wp-content/uploads/2011/06/End_of_universe2.jpg 731w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="3001" id="caption-attachment-86276"><em data-dcnode-id="3002"><span data-dcnode-id="3004" instrument_node="">Various possible shapes of the observable Universe – where mass/energy density is too high; too low – or just right, so that Euclidean geometry where the three anles of a triable do add up to 180 degrees. Credit: Wikipedia Commons</span><br data-dcnode-id="3003"></em></figcaption></figure><span data-dcnode-id="2999" instrument_node="">
</span><p data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">In the former scenario, the Universe would have to stop expanding due to an overabundance of energy. In the latter, it would contain too little energy to ever stop expanding. In the third and final scenario – a flat Universe – a critical amount of energy would exist and its expansion woudl only halt after an infinite amount of time.</span></p><span data-dcnode-id="2996" instrument_node="">
</span><h2 data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Fate of the Universe:</span></h2><span data-dcnode-id="2993" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">Hypothesizing that the Universe had a starting point naturally gives rise to questions about a possible end point. If the Universe began as a tiny point of infinite density that started to expand, does that mean it will continue to expand indefinitely? Or will it one day run out of expansive force, and begin retreating inward until all matter crunches back into a tiny ball?</span></p><div class="unive-7bb237c1732b99ec4d39942c277a2dd0 unive-in-content" data-dcnode-id="2990" id="unive-7bb237c1732b99ec4d39942c277a2dd0"></div><span data-dcnode-id="2989" instrument_node="">
</span><p data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Answering this question has been a major focus of cosmologists ever since the debate about which model of the Universe was the correct one began. With the acceptance of the Big Bang Theory, but prior to the observation of dark energy in the 1990s, cosmologists had come to agree on two scenarios as being the most likely outcomes for our Universe.</span></p><span data-dcnode-id="2986" instrument_node="">
</span><p data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node="">In the first, commonly known as the “Big Crunch” scenario, the Universe will reach a maximum size and then begin to collapse in on itself. This will only be possible if the mass density of the Universe is greater than the critical density. In other words, as long as the density of matter remains at or above a certain value (1-3 ×10</span><sup class="reference" data-dcnode-id="2983" id="cite_ref-kolb_c3_40-1"><span data-dcnode-id="2984" instrument_node="">-26</span></sup><span data-dcnode-id="2982" instrument_node=""> kg of matter per m³), the Universe will eventually contract.</span></p><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2460"><span class="embed-youtube" data-dcnode-id="2461" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="2462" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/RWnduAnxLQ4%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"><html data-cast-api-enabled="true" data-dcnode-id="2464" dir="ltr" lang="en"><head data-dcnode-id="2954"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="2974" name="viewport"/><link data-dcnode-id="2969" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="ZdjwyM60ANh5xFoOzw+iEw" rel="stylesheet"/><title data-dcnode-id="2956">YouTube</title><link data-dcnode-id="2955" href="https://www.youtube.com/watch?v=RWnduAnxLQ4" rel="canonical"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="2465" dir="ltr"><div data-dcnode-id="2472" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="2473" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="2952" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="2953" playsinline="" style="width: 525px; height: 296px; left: 0px; top: -296px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="2951" data-layer="1"></div><div class="ytp-chrome-top </span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Alternatively, if the density in the Universe were equal to or below the critical density, the expansion would slow down but never stop. In this scenario, known as the “Big Freeze”, the Universe would go on until star formation eventually ceased with the consumption of all the interstellar gas in each galaxy. Meanwhile, all existing stars would burn out and become white dwarfs, neutron stars, and black holes.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Very gradually, collisions between these black holes would result in mass accumulating into larger and larger black holes. The average temperature of the Universe would approach absolute zero, and black holes would evaporate after emitting the last of their Hawking radiation. Finally, the entropy of the Universe would increase to the point where no organized form of energy could be extracted from it (a scenarios known as “heat death”).</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Modern observations, which include the existence of dark energy and its influence on cosmic expansion, have led to the conclusion that more and more of the currently visible Universe will pass beyond our event horizon (i.e. the CMB, the edge of what we can see) and become invisible to us. The eventual result of this is not currently known, but “heat death” is considered a likely end point in this scenario too.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Other explanations of dark energy, called phantom energy theories, suggest that ultimately galaxy clusters, stars, planets, atoms, nuclei, and matter itself will be torn apart by the ever-increasing expansion. This scenario is known as the “Big Rip”, in which the expansion of the Universe itself will eventually be its undoing.</span></p><div class="unive-366726168d966858134fc3889678fcb7 unive-in-content" data-dcnode-id="2447" id="unive-366726168d966858134fc3889678fcb7"></div><span data-dcnode-id="2446" instrument_node="">
