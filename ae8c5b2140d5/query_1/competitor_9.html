ata-dcnode-id="1955" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1956" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="1954" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="1949"><use class="ytp-svg-shadow" data-dcnode-id="1951" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1952" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="1950" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="1945"><use class="ytp-svg-shadow" data-dcnode-id="1947" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1948" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="1946" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=Y6hBthfoosI" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></span></p><span data-dcnode-id="1925" instrument_node="">
</span><h2 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">History of Study:</span></h2><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Strictly speaking, human beings have been contemplating and studying the nature of the Universe since prehistoric times. As such, the earliest accounts of how the Universe came to be were mythological in nature and passed down orally from one generation to the next. In these stories, the world, space, time, and all life began with a creation event, where a God or Gods were responsible for creating everything.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">Astronomy also began to emerge as a field of study by the time of the Ancient Babylonians. Systems of constellations and astrological calendars prepared by Babylonian scholars as early as the 2nd millennium BCE would go on to inform the cosmological and astrological traditions of cultures for thousands of years to come.</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">By Classical Antiquity, the notion of a Universe that was dictated by physical laws began to emerge. Between Greek and Indian scholars, explanations for creation began to become philosophical in nature, emphasizing cause and effect rather than divine agency. The earliest examples include Thales and Anaximander, two pre-Socratic Greek scholars who argued that everything was born of a primordial form of matter.</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">By the 5th century BCE, pre-Socratic philosopher Empedocles became the first western scholar to propose a Universe composed of four elements – earth, air, water and fire. This philosophy became very popular in western circles, and was similar to the Chinese system of five elements – metal, wood, water, fire, and earth – that emerged around the same time.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><figure aria-describedby="caption-attachment-123823" class="wp-caption aligncenter" data-dcnode-id="1904" id="attachment_123823" style="width: 580px"><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/12/atoms_shape-e1449784784148.jpg"><img alt="" class="size-medium wp-image-123823" data-dcnode-id="1909" height="372" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/12/atoms_shape-e1449784784148-580x372.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2015/12/atoms_shape-e1449784784148-580x372.jpg 580w, https://www.universetoday.com/wp-content/uploads/2015/12/atoms_shape-e1449784784148-250x160.jpg 250w, https://www.universetoday.com/wp-content/uploads/2015/12/atoms_shape-e1449784784148.jpg 1024w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1905" id="caption-attachment-123823"><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Early atomic theory stated that different materials had differently shaped atoms. Credit: github.com</span></em></figcaption></figure><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">It was not until Democritus, the 5th/4th century BCE Greek philosopher, that a Universe composed of indivisible particles (atoms) was proposed. The Indian philosopher Kanada (who lived in the 6th or 2nd century BCE) took this philosophy further by proposing that light and heat were the same substance in different form. The 5th century CE Buddhist philosopher Dignana took this even further, proposing that all matter was made up of energy.</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">The notion of finite time was also a key feature of the Abrahamic religions – Judaism, Christianity and Islam. Perhaps inspired by the Zoroastrian concept of the Day of Judgement, the belief that the Universe had a beginning and end would go on to inform western concepts of cosmology even to the present day.</span></p><div class="unive-d78b38c44a2fa48dd9dd782017c23aec unive-in-content" data-dcnode-id="1897" id="unive-d78b38c44a2fa48dd9dd782017c23aec"></div><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Between the 2nd millennium BCE and the 2nd century CE, astronomy and astrology continued to develop and evolve. In addition to monitoring the proper motions of the planets and the movement of the constellations through the Zodiac, Greek astronomers also articulated the geocentric model of the Universe, where the Sun, planets and stars revolve around the Earth.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1892" instrument_node="">These traditions are best described in the 2nd century CE mathematical and astronomical treatise, the&nbsp;</span><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bertie.ccsu.edu/naturesci/Cosmology/Ptolemy.html"><em data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Almagest</span></em></a><span data-dcnode-id="1888" instrument_node="">, which was written by Greek-Egyptian astronomer Claudius Ptolemaeus (aka. Ptolemy). This treatise and the cosmological model it espoused would be considered canon by medieval European and Islamic scholars for over a thousand years to come.</span></p><span data-dcnode-id="1886" instrument_node="">
</span><figure aria-describedby="caption-attachment-121160" class="wp-caption aligncenter" data-dcnode-id="1880" id="attachment_121160" style="width: 580px"><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric.jpg"><img alt="" class="size-medium wp-image-121160" data-dcnode-id="1885" height="310" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric-580x310.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric-580x310.jpg 580w, https://www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric-250x133.jpg 250w, https://www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric-1024x547.jpg 1024w, https://www.universetoday.com/wp-content/uploads/2009/11/geocentric_heliocentric.jpg 1090w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1881" id="caption-attachment-121160"><em data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">A comparison of the geocentric and heliocentric models of the Universe. Credit: history.ucsb.edu</span></em></figcaption></figure><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">However, even before the Scientific Revolution (ca. 16th to 18th centuries), there were astronomers who proposed a heliocentric model of the Universe – where the Earth, planets and stars revolved around the Sun. These included Greek astronomer Aristarchus of Samos (ca. 310 – 230 BCE), and Hellenistic astronomer and philosopher Seleucus of Seleucia (190 – 150 BCE).</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">During the Middle Ages, Indian, Persian and Arabic philosophers and scholars maintained and expanded on Classical astronomy. In addition to keeping Ptolemaic and non-Aristotelian ideas alive, they also proposed revolutionary ideas like the rotation of the Earth. Some scholars – such as Indian astronomer Aryabhata and Persian astronomers Albumasar and Al-Sijzi – even advanced versions of a heliocentric Universe.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1872" instrument_node="">By the 16th century, </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/45091/copernicus/"><span data-dcnode-id="1871" instrument_node="">Nicolaus Copernicus</span></a><span data-dcnode-id="1869" instrument_node=""> proposed the most complete concept of a heliocentric Universe by resolving lingering mathematical problems with the theory. His ideas were first expressed in the 40-page manuscript titled </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//copernicus.torun.pl/en/archives/astronomical/1/%3Fview%3Dtranskrypcja%26lang%3Den"><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Commentariolus</span></em></a><span data-dcnode-id="1865" instrument_node=""> (“Little Commentary”), which described a heliocentric model based on seven general principles. These seven principles stated that:</span></p><span data-dcnode-id="1863" instrument_node="">
</span><ol data-dcnode-id="1840"><span data-dcnode-id="1862" instrument_node="">
</span><li data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Celestial bodies do not all revolve around a single point</span></li><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">The center of Earth is the center of the lunar sphere—the orbit of the moon around Earth; all the spheres rotate around the Sun, which is near the center of the Universe</span></li><span data-dcnode-id="1856" instrument_node="">
</span><li data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">The distance between Earth and the Sun is an insignificant fraction of the distance from Earth and Sun to the stars, so parallax is not observed in the stars</span></li><span data-dcnode-id="1853" instrument_node="">
</span><li data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">The stars are immovable – their apparent daily motion is caused by the daily rotation of Earth</span></li><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Earth is moved in a sphere around the Sun, causing the apparent annual migration of the Sun</span></li><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Earth has more than one motion</span></li><span data-dcnode-id="1844" instrument_node="">
</span><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Earth’s orbital motion around the Sun causes the seeming reverse in direction of the motions of the planets.</span></li><span data-dcnode-id="1841" instrument_node="">
</span></ol><span data-dcnode-id="1839" instrument_node="">
</span><figure aria-describedby="caption-attachment-123277" class="wp-caption aligncenter" data-dcnode-id="1833" id="attachment_123277" style="width: 580px"><a data-dcnode-id="1837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/11/Galileos_Dialogue_Title_Page.png"><img alt="" class="size-medium wp-image-123277" data-dcnode-id="1838" height="422" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/11/Galileos_Dialogue_Title_Page-580x422.png&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2015/11/Galileos_Dialogue_Title_Page-580x422.png 580w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileos_Dialogue_Title_Page-250x182.png 250w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileos_Dialogue_Title_Page.png 1000w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1834" id="caption-attachment-123277"><em data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Frontispiece and title page of the Dialogue, 1632. Credit: moro.imss.fi.it</span></em></figcaption></figure><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1831" instrument_node="">A more comprehensive treatment of his ideas was released in 1532, when Copernicus completed his magnum opus – </span><i data-dcnode-id="1827"><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ads.harvard.edu/books/1543droc.book/"><span data-dcnode-id="1830" instrument_node="">De revolutionibus orbium coelestium</span></a><span data-dcnode-id="1828" instrument_node=""> </span></i><em data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">(On the Revolutions of the Heavenly Spheres)</span></em><i data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">. </span></i><span data-dcnode-id="1822" instrument_node="">In it, he advanced his seven major arguments, but in more detailed form and with detailed computations to back them up. Due to fears of persecution and backlash, this volume was not released until his death in 1542.</span></p><div class="unive-cbda4e9ab3383687ae826044674e19ad unive-in-content" data-dcnode-id="1820" id="unive-cbda4e9ab3383687ae826044674e19ad"></div><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1818" instrument_node="">His ideas would be further refined by 16th/17th century mathematicians, astronomer and inventor </span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/48756/galileo-facts/"><span data-dcnode-id="1817" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="1815" instrument_node="">. Using a telescope of his own creation, Galileo would make recorded observations of the Moon, the Sun, and Jupiter which demonstrated flaws in the geocentric model of the Universe while also showcasing the internal consistency of the Copernican model.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1812" instrument_node="">His observations were published in several different volumes throughout the early 17th century. His observations of the cratered surface of the Moon and his observations of Jupiter and its largest moons were detailed in 1610 with his </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homepages.wmich.edu/~mcgrew/Siderius.pdf"><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Sidereus Nuncius </span></em></a><span data-dcnode-id="1808" instrument_node="">(</span><em data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">The Starry Messenger</span></em><span data-dcnode-id="1805" instrument_node="">) while his observations were sunspots were described in </span><em data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">On the Spots Observed in the Sun</span></em><span data-dcnode-id="1802" instrument_node=""> (1610).</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1792"><span data-dcnode-id="1799" instrument_node="">Galileo also recorded his observations about the </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/106062/what-is-the-milky-way-2/"><span data-dcnode-id="1798" instrument_node="">Milky Way</span></a><span data-dcnode-id="1796" instrument_node=""> in the </span><em data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Starry Messenger</span></em><span data-dcnode-id="1793" instrument_node="">, which was previously believed to be nebulous. Instead, Galileo found that it was a multitude of stars packed so densely together that it appeared from a distance to look like clouds, but which were actually stars that were much farther away than previously thought.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1788"><span class="embed-youtube" data-dcnode-id="1789" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1790" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/H8iuu543-4M%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1786" instrument_node="">In 1632, Galileo finally addressed the “Great Debate” in his treatise&nbsp;</span><i data-dcnode-id="1783"><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//law2.umkc.edu/faculty/projects/ftrials/galileo/dialogue.html"><span data-dcnode-id="1785" instrument_node="">Dialogo sopra i due massimi sistemi del mondo</span></a></i><span data-dcnode-id="1782" instrument_node=""> (</span><i data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Dialogue Concerning the Two Chief World Systems)</span></i><span data-dcnode-id="1779" instrument_node="">, in which he advocated the heliocentric model over the geocentric. Using his own telescopic observations, modern physics and rigorous logic, Galileo’s arguments effectively undermined the basis of Aristotle’s and Ptolemy’s system for a growing and receptive audience.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1773"><a data-dcnode-id="1775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/12301/happy-birthday-johannes-kepler/"><span data-dcnode-id="1776" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="1774" instrument_node=""> advanced the model further with his theory of the elliptical orbits of the planets. Combined with accurate tables that predicted the positions of the planets, the Copernican model was effectively proven. From the middle of the seventeenth century onward, there were few astronomers who were not Copernicans.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1771" instrument_node="">The next great contribution came from </span><a data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/91785/isaac-newton/"><span data-dcnode-id="1770" instrument_node="">Sir Isaac Newton</span></a><span data-dcnode-id="1768" instrument_node=""> (1642/43 – 1727), who’s work with </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/55423/keplers-law/"><span data-dcnode-id="1767" instrument_node="">Kepler’s Laws of Planetary Motion</span></a><span data-dcnode-id="1765" instrument_node=""> led him to develop his theory of Universal Gravitation. In 1687, he published his famous treatise </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cudl.lib.cam.ac.uk/view/PR-ADV-B-00039-00001/9"><i data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Philosophiæ Naturalis Principia Mathematica</span></i></a><span data-dcnode-id="1761" instrument_node=""> (“Mathematical Principles of Natural Philosophy”), which detailed his </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/53898/who-discovered-gravity/"><span data-dcnode-id="1760" instrument_node="">Three Laws of Motion</span></a><span data-dcnode-id="1758" instrument_node="">. These laws stated that:</span></p><div class="unive-979eb9cdfdb3fd90e75e2e7eeb80f3aa unive-in-content" data-dcnode-id="1756" id="unive-979eb9cdfdb3fd90e75e2e7eeb80f3aa"></div><span data-dcnode-id="1755" instrument_node="">
</span><ol data-dcnode-id="1731"><span data-dcnode-id="1754" instrument_node="">
</span><li data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">When viewed in an inertial reference frame, an object either remains at rest or continues to move at a constant velocity, unless acted upon by an external force.</span></li><span data-dcnode-id="1751" instrument_node="">
</span><li data-dcnode-id="1736"><span data-dcnode-id="1750" instrument_node="">The vector sum of the external forces (</span><span class="texhtml" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">F)</span></span><span data-dcnode-id="1747" instrument_node=""> on an object is equal to the mass (</span><span class="texhtml" data-dcnode-id="1744"><i data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">m)</span></i></span><span data-dcnode-id="1743" instrument_node=""> of that object multiplied by the acceleration vector (</span><span class="texhtml" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">a)</span></span><span data-dcnode-id="1740" instrument_node=""> of the object. In mathematical form, this is expressed as: F=</span><em data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">m</span></em><span data-dcnode-id="1737" instrument_node="">a</span></li><span data-dcnode-id="1735" instrument_node="">
</span><li data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">When one body exerts a force on a second body, the second body simultaneously exerts a force equal in magnitude and opposite in direction on the first body.</span></li><span data-dcnode-id="1732" instrument_node="">
</span></ol><span data-dcnode-id="1730" instrument_node="">
</span><figure aria-describedby="caption-attachment-127832" class="wp-caption aligncenter" data-dcnode-id="1724" id="attachment_127832" style="width: 580px"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2016/03/Planet_Nine_animation.gif"><img alt="" class="size-medium wp-image-127832" data-dcnode-id="1729" height="435" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2016/03/Planet_Nine_animation-580x435.gif&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2016/03/Planet_Nine_animation-580x435.gif 580w, https://www.universetoday.com/wp-content/uploads/2016/03/Planet_Nine_animation-250x188.gif 250w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1725" id="caption-attachment-127832"><em data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Animated diagram showing the spacing of the Solar Systems planet’s, the unusually closely spaced orbits of six of the most distant KBOs, and the possible “Planet 9”. Credit: Caltech/nagualdesign</span></em></figcaption></figure><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1722" instrument_node="">Together, these laws described the relationship between any object, the forces acting upon it, and the resulting motion, thus laying the foundation for classical mechanics. </span><span class="ng-scope" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">The laws also allowed Newton to calculate the mass of each planet, calculate the flattening of the Earth at the poles and the bulge at the equator, and how the gravitational pull of the Sun and Moon create the Earth’s tides.</span></span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1717" instrument_node="">His calculus-like method of geometrical analysis was also able to account for the speed of sound in air (based on </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/73852/boyles-law/"><span data-dcnode-id="1716" instrument_node="">Boyle’s Law</span></a><span data-dcnode-id="1714" instrument_node="">), the precession of the equinoxes – which he showed were a result of the Moon’s gravitational attraction to the Earth – and determine the orbits of the comets. This volume would have a profound effect on the sciences, with its principles remaining canon for the following 200 years.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Another major discovery took place in 1755, when Immanuel Kant proposed that the Milky Way was a large collection of stars held together by mutual gravity. Just like the Solar System, this collection of stars would be rotating and flattened out as a disk, with the Solar System embedded within it.</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1708" instrument_node="">Astronomer William Herschel attempted to actually map out the shape of the Milky Way in 1785, but he didn’t realize that large portions of the galaxy are obscured by gas and dust, which hides its true shape. The next great leap in the study of the Universe and the laws that govern it did not come until the 20th century, with the development of Einstein’s theories of </span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/45484/einsteins-theory-of-relativity/"><span data-dcnode-id="1707" instrument_node="">Special and General Relativity</span></a><span data-dcnode-id="1705" instrument_node="">.</span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1700"><span class="embed-youtube" data-dcnode-id="1701" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1702" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/q74suqg5pCk%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1698" instrument_node="">Einstein’s groundbreaking theories about space and time (summed up simply as </span><em data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">E=mc²</span></em><span data-dcnode-id="1695" instrument_node="">) were in part the result of his attempts to resolve Newton’s laws of mechanics with the laws of electromagnetism (as characterized by </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hyperphysics.phy-astr.gsu.edu/hbase/electric/maxeq.html"><span data-dcnode-id="1694" instrument_node="">Maxwell’s equations</span></a><span data-dcnode-id="1692" instrument_node=""> and the </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Lorentz-force"><span data-dcnode-id="1691" instrument_node="">Lorentz force law</span></a><span data-dcnode-id="1689" instrument_node="">). Eventually, Einstein would resolve the inconsistency between these two fields by proposing Special Relativity in his 1905 paper, “</span><i data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">On the Electrodynamics of Moving Bodies</span></i><span data-dcnode-id="1686" instrument_node="">“.</span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1683" instrument_node="">Basically, this theory stated that the speed of light is the same in all inertial reference frames. This broke with the previously-held consensus that light traveling through a moving medium would be dragged along by that medium, which meant that the speed of the light is the sum of its speed </span><i data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">through</span></i><span data-dcnode-id="1680" instrument_node=""> a medium plus the speed </span><i data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">of</span></i><span data-dcnode-id="1677" instrument_node=""> that medium. This theory led to multiple issues that proved insurmountable prior to Einstein’s theory.</span></p><div class="unive-986d08732ad732f1ef5ec0b57df1fd65 unive-in-content" data-dcnode-id="1675" id="unive-986d08732ad732f1ef5ec0b57df1fd65"></div><span data-dcnode-id="1674" instrument_node="">
</span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Special Relativity not only reconciled Maxwell’s equations for electricity and magnetism with the laws of mechanics, but also simplified the mathematical calculations by doing away with extraneous explanations used by other scientists. It also made the existence of a medium entirely superfluous, accorded with the directly observed speed of light, and accounted for the observed aberrations.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1670" instrument_node="">Between 1907 and 1911, Einstein began considering how Special Relativity could be applied to gravity fields – what would come to be known as the Theory of General Relativity. This culminated in 1911 with the publications of&nbsp; “</span><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">On the Influence of Gravitation on the Propagation of Light</span></em><span data-dcnode-id="1667" instrument_node="">“, in which he predicted that time is relative to the observer&nbsp; and dependent on their position within a gravity field.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1662"><span class="embed-youtube" data-dcnode-id="1663" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1664" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/Ya0BS9fznd4%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1660" instrument_node="">He also advanced what is known as the </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hyperphysics.phy-astr.gsu.edu/hbase/relativ/grel.html"><span data-dcnode-id="1659" instrument_node="">Equivalence Principle</span></a><span data-dcnode-id="1657" instrument_node="">, which states that gravitational mass is identical to inertial mass. Einstein also predicted the phenomenon of gravitational time dilation – where two observers situated at varying distances from a gravitating mass perceive a difference in the amount of time between two events. Another major outgrowth of his theories were the existence of Black Holes and an expanding Universe.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1654" instrument_node="">In 1915, a few months after Einstein had published his Theory of General Relativity, German physicist and astronomer Karl Schwarzschild found a solution to the Einstein field equations that described the gravitational field of a point and spherical mass. This solution, now called the </span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hyperphysics.phy-astr.gsu.edu/hbase/astro/blkhol.html"><span data-dcnode-id="1653" instrument_node="">Schwarzschild radius</span></a><span data-dcnode-id="1651" instrument_node="">, </span><span class="_Tgc" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">describes a point where the mass of a sphere is so compressed that the escape velocity from the surface would equal the speed of light.</span></span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">In 1931, Indian-American astrophysicist Subrahmanyan Chandrasekhar calculated, using Special Relativity, that a non-rotating body of electron-degenerate matter above a certain limiting mass would collapse in on itself. In 1939, Robert Oppenheimer and others concurred with Chandrasekhar’s analysis, claiming that neutron stars above a prescribed limit would collapse into black holes.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Another consequence of General Relativity was the prediction that the Universe was either in a state of expansion or contraction. In 1929, Edwin Hubble confirmed that the former was the case. At the time, this appeared to disprove Einstein’s theory of a Cosmological Constant, which was a force which “held back gravity” to ensure that the distribution of matter in the Universe remained uniform over time.</span></p><div class="unive-e7668eb334b16a71e7e522694a992546 unive-in-content" data-dcnode-id="1641" id="unive-e7668eb334b16a71e7e522694a992546"></div><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1637"><span class="embed-youtube" data-dcnode-id="1638" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1639" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/j1hHgqk0IJg%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">To this, Edwin Hubble demonstrated using redshift&nbsp; measurements that galaxies were moving away from the Milky Way. What’s more, he showed that the galaxies that were farther from Earth appeared to be receding faster – a phenomena that would come to be known as </span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/40064/hubbles-law/"><span data-dcnode-id="1634" instrument_node="">Hubble’s Law</span></a><span data-dcnode-id="1632" instrument_node="">. Hubble attempted to constrain the value of the expansion factor – which he estimated at 500 km/sec per Megaparsec of space (which has since been revised).</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">And then in 1931, Georges Lemaitre, a Belgian physicist and Roman Catholic priest, articulated an idea that would give rise to the </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/54756/what-is-the-big-bang-theory/"><span data-dcnode-id="1628" instrument_node="">Big Bang Theory</span></a><span data-dcnode-id="1626" instrument_node="">. After confirming independently that the Universe was in a state of expansion, he suggested that the current expansion of the Universe meant that the father back in time one went, the smaller the Universe would be.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node="">In other words, at some point in the past, the entire mass of the Universe would have been concentrated on a single point. These discoveries triggered a debate between physicists throughout the 1920s and 30s, with the majority advocating that the Universe was in a steady state (i.e. the </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cosmology.carnegiescience.edu/timeline/1949"><span data-dcnode-id="1622" instrument_node="">Steady State Theory</span></a><span data-dcnode-id="1620" instrument_node="">). In this model, new matter is continuously created as the Universe expands, thus preserving the uniformity and density of matter over time.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">After World War II, the debate came to a head between proponents of the Steady State Model and proponents of the Big Bang Theory – which was growing in popularity. Eventually, the observational evidence began to favor the Big Bang over the Steady State, which included the discovery and confirmation of the CMB in 1965. Since that time, astronomers and cosmologists have sought to resolve theoretical problems arising from this model.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1612"><span class="embed-youtube" data-dcnode-id="1613" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1614" height="296" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/qZXWwGz9Tzw%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="525"></iframe></span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1610" instrument_node="">In the 1960s, for example, </span><a data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/119297/how-do-we-know-dark-matter-exists/"><span data-dcnode-id="1609" instrument_node="">Dark Matter</span></a><span data-dcnode-id="1607" instrument_node=""> (originally proposed in 1932 by Jan Oort) was proposed as an explanation for the apparent “missing mass” of the Universe. In addition, papers submitted by </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/123487/who-is-stephen-hawking/"><span data-dcnode-id="1606" instrument_node="">Stephen Hawking</span></a><span data-dcnode-id="1604" instrument_node=""> and other physicists showed that singularities were an inevitable initial condition of general relativity and a Big Bang model of cosmology.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1601" instrument_node="">In 1981, physicist Alan Guth theorized a period of rapid cosmic expansion (aka. the “Inflation” Epoch) that resolved other theoretical problems. The 1990s also saw the rise of </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/119363/how-do-we-know-dark-energy-exists/"><span data-dcnode-id="1600" instrument_node="">Dark Energy</span></a><span data-dcnode-id="1598" instrument_node=""> as an attempt to resolve outstanding issues in cosmology. In addition to providing an explanation as to the Universe’s missing mass (along with </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/119297/how-do-we-know-dark-matter-exists/"><span data-dcnode-id="1597" instrument_node="">Dark Matter</span></a><span data-dcnode-id="1595" instrument_node="">) it also provided an explanation as to why the Universe is still accelerating, and offered a resolution to Einstein’s Cosmological Constant.</span></p><div class="unive-6cb8b21149423be0c8304a1b3e78797d unive-in-content" data-dcnode-id="1593" id="unive-6cb8b21149423be0c8304a1b3e78797d"></div><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Significant progress has been made in our study of the Universe thanks to advances in telescopes, satellites, and computer simulations. These have allowed astronomers and cosmologists to see farther into the Universe (and hence, farther back in time). This has in turn helped them to gain a better understanding of its true age, and make more precise calculations of its matter-energy density.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1588" instrument_node="">The introduction of space telescopes – such as the </span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lambda.gsfc.nasa.gov/product/cobe/"><span data-dcnode-id="1587" instrument_node="">Cosmic Background Explorer</span></a><span data-dcnode-id="1585" instrument_node=""> (COBE), the </span><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hubblesite.org/"><span data-dcnode-id="1584" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="1582" instrument_node="">, </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//map.gsfc.nasa.gov/"><span data-dcnode-id="1581" instrument_node="">Wilkinson Microwave Anisotropy Probe</span></a><span data-dcnode-id="1579" instrument_node=""> (WMAP) and the </span><a data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.esa.int/Our_Activities/Space_Science/Planck"><span data-dcnode-id="1578" instrument_node="">Planck Observatory</span></a><span data-dcnode-id="1576" instrument_node=""> – has also been of immeasurable value. These have not only allowed for deeper views of the cosmos, but allowed astronomers to test theoretical models to observations.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><figure aria-describedby="caption-attachment-130519" class="wp-caption aligncenter" data-dcnode-id="1568" id="attachment_130519" style="width: 580px"><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2016/08/HFF.jpg"><img alt="" class="size-medium wp-image-130519" data-dcnode-id="1573" height="435" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2016/08/HFF-580x435.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2016/08/HFF-580x435.jpg 580w, https://www.universetoday.com/wp-content/uploads/2016/08/HFF-250x187.jpg 250w, https://www.universetoday.com/wp-content/uploads/2016/08/HFF.jpg 722w" width="580"></a><figcaption class="wp-caption-text" data-dcnode-id="1569" id="caption-attachment-130519"><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Illustration of the depth by which Hubble imaged galaxies in prior Deep Field initiatives, in units of the Age of the Universe. Credit: NASA and A. Feild (STScI)</span></em></figcaption></figure><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">For example, in </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/129304/hubble-constant-just-got-constantier/"><span data-dcnode-id="1565" instrument_node="">June of 2016</span></a><span data-dcnode-id="1563" instrument_node="">, NASA announced findings that indicate that the Universe is expanding even faster than previously thought. Based on new data provided by the Hubble Space Telescope (which was then compared to data from the WMAP and the Planck Observatory) it appeared that the Hubble Constant was 5% to 9% greater than expected.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">Next-generation telescopes like the </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jwst.nasa.gov/"><span data-dcnode-id="1559" instrument_node="">James Webb Space Telescope</span></a><span data-dcnode-id="1557" instrument_node=""> (JWST) and ground-based telescopes like the </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eso.org/public/teles-instr/elt/"><span data-dcnode-id="1556" instrument_node="">Extremely Large Telescope</span></a><span data-dcnode-id="1554" instrument_node=""> (ELT) are also expected to allow for additional breakthroughs in our understanding of the Universe in the coming years and decades.</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Without a doubt, the Universe is beyond the reckoning of our minds. Our best estimates say hat it is unfathomably vast, but for all we know, it could very well extend to infinity. What’s more, its age in almost impossible to contemplate in strictly human terms. In the end, our understanding of it is nothing less than the result of thousands of years of constant and progressive study.</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">And in spite of that, we’ve only really begun to scratch the surface of the grand enigma that it is the Universe. Perhaps some day we will be able to see to the edge of it (assuming it has one) and be able to resolve the most fundamental questions about how all things in the Universe interact. Until that time, all we can do is measure what we don’t know by what we do, and keep exploring!</span></p><div class="unive-d45ef8ab9505ca89f9ccf5e373b9a4dc unive-in-content" data-dcnode-id="1546" id="unive-d45ef8ab9505ca89f9ccf5e373b9a4dc"></div><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">To speed you on your way, here is a list of topics we hope you will enjoy and that will answer your questions. Good luck with your exploration!</span></p><span data-dcnode-id="1542" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="1156" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/815d54da4344b430c467471a1d677e89%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/815d54da4344b430c467471a1d677e89?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="1155" instrument_node=""> </span><b class="fn" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">micha_sky</span></b><span data-dcnode-id="1152" instrument_node=""> </span><span class="says" data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">says:</span></span><span data-dcnode-id="1149" instrument_node=""> </span></div><span data-dcnode-id="1147" instrument_node="">

</span><a data-dcnode-id="1143" href="#comment-157640"><time data-dcnode-id="1144" datetime="2017-05-10T21:41:49-04:00"><span data-dcnode-id="1145" instrument_node="">May 10, 2017 at 9:41 PM</span></time></a><span data-dcnode-id="1142" instrument_node=""> </span></div><span data-dcnode-id="1140" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1124"><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">When you talk about the CMB appearing equidistant around us, at a distance which is a function of the expansion of space over time, you are describing what may well be an absolute limit to our perception.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">It does not follow that the universe is being perceived in full here. We’re may just be seeing ourselves at the heart of a bubble somewhere inside of and made by infinity. Its that we could be ‘the infinitesimals’, looking at ‘the first 1’ rolled out in time, what the word and meaning anchor for me. </span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">tl;dr; space, as a turtle, is expanding so slowly that it takes a really long time for enough of it to expand at a rate that is faster than the speed of light. this time is measured in units of space. the distance at which the speed of the expansions of the space-in-between matches that of the speed of light is the farthest we can see directly. That’s hard enough! </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">its highly unlikely that the universe is of finite size and probable that we’re simply bumping into hard limits of what’s measurable. so. universe.. way bigger than what we could ever see at light-speed!</span></p><span data-dcnode-id="1125" instrument_node="">
</span></div><span data-dcnode-id="1123" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">It seems pretty well established that the universe is 13.8 billion years old, given the observed red-shift of the CMB. It also seems well established that the CMB started as photons of visible light 380 million years after the Big Bang. Therefore, the universe has been expanding for a finite period of time. Ergo, space-time must also be finite. Indeed, it is estimated that our universe is some 48 billion light years across. Unlike matter (stars and galaxies) which cannot move faster than light, space-time has no such speed limit. As space-time expands, it carries the galaxies along with it and once that expansion exceeds light speed, then we can never observe those galaxies in our telescopes.</span></p><span data-dcnode-id="1093" instrument_node="">
</span></div><span data-dcnode-id="1091" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="1078" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/15e9e7bbaadd8a633176c66ecfd3432c%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/15e9e7bbaadd8a633176c66ecfd3432c?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="1077" instrument_node=""> </span><b class="fn" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Starreeyed</span></b><span data-dcnode-id="1074" instrument_node=""> </span><span class="says" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">says:</span></span><span data-dcnode-id="1071" instrument_node=""> </span></div><span data-dcnode-id="1069" instrument_node="">

</span><a data-dcnode-id="1065" href="#comment-157642"><time data-dcnode-id="1066" datetime="2017-05-11T02:36:18-04:00"><span data-dcnode-id="1067" instrument_node="">May 11, 2017 at 2:36 AM</span></time></a><span data-dcnode-id="1064" instrument_node=""> </span></div><span data-dcnode-id="1062" instrument_node="">

</span><p data-dcnode-id="1055"><span data-dcnode-id="1058" instrument_node="">Many aspects of the Big Bang theory puzzle me, but there is one that is especially puzzling. The theory states that the universe began from a single point of infinite density and that at the instant time began, space-time began expanding and has been expanding ever since. Within the singularity in the beginning, the theory says that gravity was the the dominant force. The only analogy we have for the singularity is a black hole. If that is a true analog and noting that gravity inside a black hole’s singularity is so strong that not even light can escape, then how is it possible that the Big Bang, banged? If gravity was the dominant force, I fail to understand how it was possible for the Big Bang to occur.</span><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node="">
I know that I’m missing something; what it could be I can only speculate. One possible speculation concerns dark energy. Dark energy has been proposed as an explanation for the acceleration in the expansion of the universe, such acceleration dating from some 5 billion years ago as I understand it. I would not think that dark energy would only be in existence for the past 5 billion years. Rather, I should think it has existed since the very beginning. If that is so, then might not dark energy have been the strongest force in the singularity, stronger than gravity, and that dark energy drove the Big Bang?</span></p><span data-dcnode-id="1054" instrument_node="">
</span></div><span data-dcnode-id="1052" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="1044" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/418ac3923c0ff1cde71a6147d6a8fc94%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/418ac3923c0ff1cde71a6147d6a8fc94?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="1043" instrument_node=""> </span><b class="fn" data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Gusssss</span></b><span data-dcnode-id="1040" instrument_node=""> </span><span class="says" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">says:</span></span><span data-dcnode-id="1037" instrument_node=""> </span></div><span data-dcnode-id="1035" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">There is a difference from the black hole analogy, which is that a black hole is a singularity of infinite density, from which nothing can escape into the surrounding space, while the primordial atom was not surrounded by any space. All space emerged from it with all the matter.</span></p><span data-dcnode-id="1022" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="1011" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/2786e78bd972d8a53f3fa5b641f9923a%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/2786e78bd972d8a53f3fa5b641f9923a?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="1010" instrument_node=""> </span><b class="fn" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">weeasle</span></b><span data-dcnode-id="1007" instrument_node=""> </span><span class="says" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">says:</span></span><span data-dcnode-id="1004" instrument_node=""> </span></div><span data-dcnode-id="1002" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="996"><span data-dcnode-id="1001" instrument_node="">
</span><a data-dcnode-id="998" href="#comment-157649"><time data-dcnode-id="999" datetime="2017-05-11T23:37:30-04:00"><span data-dcnode-id="1000" instrument_node="">May 11, 2017 at 11:37 PM</span></time></a><span data-dcnode-id="997" instrument_node=""> </span></div><span data-dcnode-id="995" instrument_node="">

</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">“The only analogy we have for the singularity is a black hole. If that is a true analog and noting that gravity inside a black hole’s singularity is so strong that not even light can escape, then how is it possible that the Big Bang, banged?”</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Great question!</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">A simplistic (though not simple) answers is “vacuum energy”. If you had a zero point vacuum (total nothingness) and exposed it to matter you would have something akin to a powerful antimatter/matter explosion – As the different densities reach equilibrium a violent reaction occurs… Which leads me nicely to Einstein’s Theory of Dynamic Equilibrium.. It was left by Einstein in his desk drawer unpublished in 1931 because apparently the prevailing big bang model was simpler to explain – The idea of (non-empty) space being self-generating with regards to entropy balancing expansion would have been hard to explain at the time and may have encountered rough opposition to the prevailing standard ‘Big Bang’ Cosmological Model … Which brings us to a cyclical model of the Big Bang where vacuum energy and baryonic energy interplay in a dynamic equilibrium…</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="982" instrument_node="">Quoting:</span><br data-dcnode-id="981"><span data-dcnode-id="980" instrument_node="">
</span><a data-dcnode-id="978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//adsabs.harvard.edu/abs/2015AAS" rel="nofollow ugc"><span data-dcnode-id="979" instrument_node="">http://adsabs.harvard.edu/abs/2015AAS</span></a><span data-dcnode-id="977" instrument_node="">…22521504S</span><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">
“… In its basics, it is identical to Lemaître’s 1927 dynamic equilibrium theory, also reported on only recently. …Because of the relatively recent discovery of vacuum energy, cosmology could come full circle back to an old idea abandoned by two of the greatest cosmologists: dynamic equilibrium. Quintessentially, a vacuum energy filled universe in balance, changing but always steady, eternal but ever-reborn, is exactly what we observe.”</span></p><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">

</span><div class="comment-content" data-dcnode-id="879"><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Excellent article! I first heard about the Big Bang and Steady State in 1967 from a middle school teacher who was a creationist. He put aside in personal bias and give an excellent intro. He gave both equal weight to both theory and refuse to discussed a religious view of point, saving that for his Sunday School class. The hardest thing the class had was understanding that the expansion of the Big Bang was something into to nothing. No air, no stuff, nothing, not even vacuum exists until the Universe expanding. He has an inspiration.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">At first, I preferred the Steady State. But it required a mysterious process called “continuous creation” – as the universe expanding, when stuff appeared out of nothing to maintain the universe in the Steady State. I accepted this mystery until I learned about the CMB and the Steady State became left on the Boulevard of Broken Theories like Z-rays and phlogiston.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">I so glad to read that “What’s more, there are no well-supported models that are capable of determining what took place in the Universe prior to the period predating 10-15 seconds after the Big Bang.” Cosmic Inflation is bug in my brain that driving to scream “EPICYCLES”. I first read about it in the Eighties in Scientific American in an article by Alan Guth himself. It really has shaken my faith in science. I can’t do the math, therefore I take all theoretical cosmology in faith, but this is too much. Alan Watts you have to learn Chinese to really understand Zen and I believe you have to learn the higher maths to understand astrophysics.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">In my dreams, I gain the superpowers to do the scary math to truly understand this weirdness. Or correct it. But Steven Weinberg said, “the universe doesn’t care about what makes theoretical physicists happy”. The same holds true for this elderly rock’n’roller who reads too much.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="886" instrument_node="">And I remember…</span><br data-dcnode-id="885"><span data-dcnode-id="884" instrument_node="">
Albert Einstein, “God do not play dice”</span><br data-dcnode-id="883"><span data-dcnode-id="882" instrument_node="">
Niels Bohr, “Einstein, don’t tell God what to do!”</span></p><span data-dcnode-id="880" instrument_node="">
</span></div><span data-dcnode-id="878" instrument_node="">

</span><footer class="comment-meta" data-dcnode-id="852"><span data-dcnode-id="871" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="869" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/b332531100c9e5129fe96996d425b1e4%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/b332531100c9e5129fe96996d425b1e4?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="868" instrument_node=""> </span><b class="fn" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">xinhangshen</span></b><span data-dcnode-id="865" instrument_node=""> </span><span class="says" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">says:</span></span><span data-dcnode-id="862" instrument_node=""> </span></div><span data-dcnode-id="860" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="854"><span data-dcnode-id="859" instrument_node="">
</span><a data-dcnode-id="856" href="#comment-157677"><time data-dcnode-id="857" datetime="2017-05-17T16:30:52-04:00"><span data-dcnode-id="858" instrument_node="">May 17, 2017 at 4:30 PM</span></time></a><span data-dcnode-id="855" instrument_node=""> </span></div><span data-dcnode-id="853" instrument_node="">
</span></footer><span data-dcnode-id="851" instrument_node="">
</span><div class="comment-content" data-dcnode-id="820"><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">The big bang theory is wrong because Einstein’s relativity theory has already been disproved both logically and experimentally (see “Challenge to the special theory of relativity”, March 1, 2016). </span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="846" instrument_node="">The most obvious and indisputable experimental evidence, which everybody with basic knowledge of special relativity should immediately understand: is the existence of the absolute time shown by the universally synchronized clocks on the GPS satellites which move at high velocities relative to each other while special relativity claims that time is relative (i.e. the time on each reference frame is different) and can never be synchronized on clocks moving with relative velocities.</span><br data-dcnode-id="845"><span data-dcnode-id="844" instrument_node="">
Many physicists claim that clocks on the GPS satellites are corrected according to both special relativity and general relativity. This is not true. The corrections of the atomic clocks on the GPS satellites are nothing to do with relativistic effects because the corrections are absolute changes of the clocks, none of which is relative as claimed by special relativity. After all corrections, the clocks are synchronized not only relative to the ground clocks but also relative to each other.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Some people may argue that the clocks are only synchronized in the earth centered inertial reference frame, and are not synchronized in the reference frames of the GPS satellites. If it were true, then the time difference between a clock on a GPS satellite and a clock on the ground observed in the satellite reference frame would grow while the same clocks observed on the earth centered reference frame were keeping synchronized. If you corrected the clock on the satellite when the difference became significant, the correction would break the synchronization of the clocks observed in the earth centered frame. That is, there is no way to make a correction without breaking the synchronization of the clocks observed in the earth centered frame. Therefore, it is wrong to think that the clocks are not synchronized in the satellite frame. </span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Actually, on the paper mentioned above, I have proved that if clocks are synchronized in one inertial reference frame, then they are synchronized in all inertial reference frames because clock time is absolute and universal.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Similarly, all the differences of the clocks in Hefele-Keating experiment were also absolute (i.e., they were the same no matter whether you observe them on the moon or on the space station). Therefore, they are nothing to do with relative velocity caused time dilation as claimed by special relativity. It is simply a wrong interpretation that the differences of the displayed times of the clocks are the results of relativity.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">The increase of the life of a muon in a circular accelerator or going through the atmosphere is also an absolute change which is the same observed in all reference frames. </span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Therefore, all these so-called relativistic effects are not relative at all, nothing to do with relativity.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">The simplest thought experiment to disprove special relativity is the symmetric twin paradox: two twins made separate space travels in the same velocity and acceleration relative to the earth all the time during their entire trips but in opposite directions. According to special relativity, each twin should find the other twin’s clock ticking more slowly than his own clock during the entire trip because of the relative velocity between them as we know that acceleration did not have any effect on kinematic time dilation in special relativity. But when they came back to the earth, they found their clocks had exact the same time because of symmetry. This is a contradiction that has disproved special relativity. This thought experiment demonstrates that relativistic time is not our physical time and can never be materialized on physical clocks.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">That is, time is absolute and space is 3D Euclidean.</span></p><span data-dcnode-id="821" instrument_node="">
</span></div><span data-dcnode-id="819" instrument_node="">
