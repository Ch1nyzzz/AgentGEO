</span><article class="post-15763 post type-post status-publish format-standard has-post-thumbnail hentry category-astronomy category-guide-to-space tag-featured tag-galileo-galilei tag-galileos-telescope tag-jupiters-moons tag-museo-galileo tag-refractor-telescope tag-saturns-rings tag-the-moon tag-the-starry-messenger" data-dcnode-id="896" id="post-15763"><span data-dcnode-id="1233" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1212"><span data-dcnode-id="1232" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1217"><span class="posted-on" data-dcnode-id="1223"><span class="screen-reader-text" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Posted on</span></span><span data-dcnode-id="1229" instrument_node=""> </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/15763/galileos-telescope/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1227" datetime="2016-07-13T15:00:31-04:00"><span data-dcnode-id="1228" instrument_node="">July 13, 2016</span></time><time class="updated" data-dcnode-id="1225" datetime="2016-07-13T13:40:11-04:00"><span data-dcnode-id="1226" instrument_node="">July 13, 2016</span></time></a></span><span class="byline" data-dcnode-id="1218"><span data-dcnode-id="1222" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1219"><a class="url fn n" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/author/tammy/"><span data-dcnode-id="1221" instrument_node="">Tammy Plotner</span></a></span></span></div><div class="unive-b232fea5180a40a3793523b6f9065cdb unive-above-header" data-dcnode-id="1216" id="unive-b232fea5180a40a3793523b6f9065cdb"></div><h1 class="entry-title" data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">What is Galileo’s Telescope?</span></h1><span data-dcnode-id="1213" instrument_node=""> </span></header><span data-dcnode-id="1211" instrument_node="">
</span><div class="entry-content" data-dcnode-id="954"><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">In 1610, Italian astronomer Galileo Galilei looked up at the heavens using a telescope of his making. And what he saw would forever revolutionize the field of astronomy, our understanding of the Universe, and our place in it. Centuries later, Galileo’s is still held in such high esteem; not only for the groundbreaking research he conducted, but because of his immense ingenuity in developing his own research tools.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">And at the center of it all is Galileo’s famous telescope, which still inspires curiosity centuries later. How exactly did he invent it. How exactly was it an improvement on then-current designs? What exactly did he see with it when he looked up at the night sky? And what has become of it today? Luckily, all of these are questions we are able to answer.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><h2 data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Description:</span></h2><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1200" instrument_node="">Galileo’s telescope was the prototype of the modern day refractor telescope. As you can see from this diagram below, which is taken from Galileo’s own work – </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homepages.wmich.edu/~mcgrew/Siderius.pdf"><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Sidereus Nuncius </span></em></a><span data-dcnode-id="1196" instrument_node="">(“The Starry Messenger”) – it was a simple arrangement of lenses that first began with optician’s glass fixed to either end of a hollow cylinder.</span></p><div class="unive-content unive-target" data-advadstrackbid="1" data-advadstrackid="155349" data-dcnode-id="1172" id="unive-1323968531"><a class="adv-link" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/universetoday"><div data-dcnode-id="1177" id="go-ad-free"><span data-dcnode-id="1194" instrument_node="">
</span><img alt="Universe Today" class="custom-logo" data-dcnode-id="1193" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2020/10/cropped-cleanutlogo-1.png&amp;raw"><span data-dcnode-id="1192" instrument_node="">

</span></div><span data-dcnode-id="1176" instrument_node="">
</span></a></div><span data-dcnode-id="1171" instrument_node="">
</span><figure aria-describedby="caption-attachment-129864" class="wp-caption aligncenter" data-dcnode-id="1163" id="attachment_129864" style="width: 580px"><img alt="Diagram of Galileo's telescope, taken from Sidereus Nuncius. Credit: hps.cam.ac.uk" class="size-medium wp-image-129864" data-dcnode-id="1170" height="374" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2008/07/galtelelrg-580x374.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2008/07/galtelelrg-580x374.jpg 580w, https://www.universetoday.com/wp-content/uploads/2008/07/galtelelrg-250x161.jpg 250w, https://www.universetoday.com/wp-content/uploads/2008/07/galtelelrg-768x495.jpg 768w, https://www.universetoday.com/wp-content/uploads/2008/07/galtelelrg-1024x659.jpg 1024w, https://www.universetoday.com/wp-content/uploads/2008/07/galtelelrg.jpg 2000w" width="580"><figcaption class="wp-caption-text" data-dcnode-id="1164" id="caption-attachment-129864"><em data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Diagram of Galileo’s refractor telescope, taken from </span></em><span data-dcnode-id="1167" instrument_node="">Sidereus Nuncius (1610)</span><em data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">. Credit: hps.cam.ac.uk</span></em></figcaption></figure><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Galileo had no diagrams to work from, and instead relied on his own system of trial and error to achieve the proper placement of the lenses. In Galileo’s telescope the objective lens was convex and the eye lens was concave (today’s telescopes make use of two convex lenses). Galileo knew that light from an object placed at a distance from a convex lens created an identical image on the opposite side of the lens.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">He also knew that if he used a concave lens, the object would appear on the same side of the lens where the object was located. If moved at a distance, it appeared larger than the object. It took a lot of work and different arrangements to get the lens the proper sizes and distances apart, but Galileo’s telescope remained the most powerful and accurately built for a great many years.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><h2 data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">History of Galileo’s Telescope:</span></h2><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Naturally, Galileo’s telescope had some historical antecedents. In the late summer of 1608, a new invention was all the rage in Europe – the spyglass. These low power telescopes were likely made by almost all advanced opticians, but the very first was credited to Hans Lippershey of Holland. These primitive telescopes only magnified the view a few times over.</span></p><div class="unive-7c797f2bd36ffd9259b5e390bc10bf9c unive-in-content" data-dcnode-id="1150" id="unive-7c797f2bd36ffd9259b5e390bc10bf9c"></div><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Much like our modern times, the manufacturers were quickly trying to corner the market with their invention. But Galileo Galilei’s friends convinced his own government to wait – sure that he could improve the design. When Galileo heard of this new optical instrument he set about engineering and making improved versions, with higher magnification.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><figure aria-describedby="caption-attachment-123275" class="wp-caption aligncenter" data-dcnode-id="1141" id="attachment_123275" style="width: 580px"><img alt="Galileo Galilei showing the Doge of Venice how to use the telescope by Giuseppe Bertini (1858). Credit: gabrielevanin.it" class="size-medium wp-image-123275" data-dcnode-id="1145" height="516" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2009/12/Galileo_Bertini_fresco_of_Galileo_Galilei_and_Doge_of_Venice-e1446672024312-580x516.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2009/12/Galileo_Bertini_fresco_of_Galileo_Galilei_and_Doge_of_Venice-e1446672024312-580x516.jpg 580w, https://www.universetoday.com/wp-content/uploads/2009/12/Galileo_Bertini_fresco_of_Galileo_Galilei_and_Doge_of_Venice-e1446672024312-250x222.jpg 250w, https://www.universetoday.com/wp-content/uploads/2009/12/Galileo_Bertini_fresco_of_Galileo_Galilei_and_Doge_of_Venice-e1446672024312.jpg 738w" width="580"><figcaption class="wp-caption-text" data-dcnode-id="1142" id="caption-attachment-123275"><em data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Galileo Galilei showing the Doge of Venice how to use the telescope by Giuseppe Bertini (1858). Credit: gabrielevanin.it</span></em></figcaption></figure><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Galileo’s telescope was similar to how a pair of opera glasses work – a simple arrangement of glass lenses to magnify objects. His first versions only improved the view to the eighth power, but Galileo’s telescope steadily improved. Within a few years, he began grinding his own lenses and changing his arrays. Galileo’s telescope was now capable of magnifying normal vision by a factor of 10, but it had a very narrow field of view.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">However, this limited ability didn’t stop Galileo from using his telescope to make some amazing observations of the heavens. And what he saw, and recorded for posterity, was nothing short of game-changing.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><h2 data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">What Galileo Observed:</span></h2><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">One fine Fall evening, Galileo pointed his telescope towards the one thing that people thought was perfectly smooth and as polished as a gemstone – </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/19424/the-moon/"><span data-dcnode-id="1129" instrument_node="">the Moon</span></a><span data-dcnode-id="1127" instrument_node="">. Imagine his surprise when found that it, in his own words, was “uneven, rough, full of cavities and prominences.” Galileo’s telescope had its flaws, such as a narrow field of view that could only show about one quarter of the lunar disk without repositioning.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Nevertheless, a revolution in astronomy had begun! Months passed, and Galileo’s telescope improved. On January 7th, 1610, he turned his new 30 power telescope towards Jupiter, and found three small, bright “stars” near the planet. One was off to the west, the other two were to the east, and all three were in a straight line. The following evening, Galileo once again took a look at Jupiter, and found that all three of the “stars” were now west of the planet – still in a straight line!</span></p><span data-dcnode-id="1122" instrument_node="">
</span><figure aria-describedby="caption-attachment-123276" class="wp-caption aligncenter" data-dcnode-id="1114" id="attachment_123276" style="width: 580px"><img alt="Cardinal Bellarmine had written in 1615 that the Copernican system could not be defended without &quot;a true physical demonstration that the sun does not circle the earth but the earth circles the sun&quot;. Galileo considered his theory of the tides to provide the required physical proof of the motion of the earth. This theory was so important to him that he originally intended to entitle his Dialogue on the Two Chief World Systems the Dialogue on the Ebb and Flow of the Sea. For Galileo, the tides were caused by the sloshing back and forth of water in the seas as a point on the Earth's surface sped up and slowed down because of the Earth's rotation on its axis and revolution around the Sun. He circulated his first account of the tides in 1616, addressed to Cardinal Orsini. His theory gave the first insight into the importance of the shapes of ocean basins in the size and timing of tides; he correctly accounted, for instance, for the negligible tides halfway along the Adriatic Sea compared to those at the ends. As a general account of the cause of tides, however, his theory was a failure. If this theory were correct, there would be only one high tide per day. Galileo and his contemporaries were aware of this inadequacy because there are two daily high tides at Venice instead of one, about twelve hours apart. Galileo dismissed this anomaly as the result of several secondary causes including the shape of the sea, its depth, and other factors. Against the assertion that Galileo was deceptive in making these arguments, Albert Einstein expressed the opinion that Galileo developed his &quot;fascinating arguments&quot; and accepted them uncritically out of a desire for physical proof of the motion of the Earth. Galileo dismissed the idea, held by his contemporary Johannes Kepler, that the moon caused the tides. He also refused to accept Kepler's elliptical orbits of the planets, considering the circle the &quot;perfect&quot; shape for planetary orbits.Cardinal Bellarmine had written in 1615 that the Copernican system could not be defended without &quot;a true physical demonstration that the sun does not circle the earth but the earth circles the sun&quot;. Galileo considered his theory of the tides to provide the required physical proof of the motion of the earth. This theory was so important to him that he originally intended to entitle his Dialogue on the Two Chief World Systems the Dialogue on the Ebb and Flow of the Sea. For Galileo, the tides were caused by the sloshing back and forth of water in the seas as a point on the Earth's surface sped up and slowed down because of the Earth's rotation on its axis and revolution around the Sun. He circulated his first account of the tides in 1616, addressed to Cardinal Orsini. His theory gave the first insight into the importance of the shapes of ocean basins in the size and timing of tides; he correctly accounted, for instance, for the negligible tides halfway along the Adriatic Sea compared to those at the ends. As a general account of the cause of tides, however, his theory was a failure. If this theory were correct, there would be only one high tide per day. Galileo and his contemporaries were aware of this inadequacy because there are two daily high tides at Venice instead of one, about twelve hours apart. Galileo dismissed this anomaly as the result of several secondary causes including the shape of the sea, its depth, and other factors. Against the assertion that Galileo was deceptive in making these arguments, Albert Einstein expressed the opinion that Galileo developed his &quot;fascinating arguments&quot; and accepted them uncritically out of a desire for physical proof of the motion of the Earth. Galileo dismissed the idea, held by his contemporary Johannes Kepler, that the moon caused the tides. He also refused to accept Kepler's elliptical orbits of the planets, considering the circle the &quot;perfect&quot; shape for planetary orbits." class="size-medium wp-image-123276" data-dcnode-id="1121" height="442" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/11/Galileo_sidereus-580x442.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_sidereus-580x442.jpg 580w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_sidereus-250x191.jpg 250w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_sidereus.jpg 1000w" width="580"><figcaption class="wp-caption-text" data-dcnode-id="1115" id="caption-attachment-123276"><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Galileo’s </span></em><span data-dcnode-id="1118" instrument_node="">Sidereus Nuncius</span><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node=""> (“Starry Messenger”) shared the discoveries he made of Jupiter with his telescope. Credit and Copyright: brunelleschi.imss.fi.it</span></em></figcaption></figure><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1112" instrument_node="">And there were more </span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/10259/what-did-galileo-see/"><span data-dcnode-id="1111" instrument_node="">discoveries awaiting Galileo’s telescope</span></a><span data-dcnode-id="1109" instrument_node="">: the appearance of bumps next to the planet Saturn (the edges of Saturn’s rings), spots on the Sun’s surface (aka. Sunspots), and seeing Venus change from a full disk to a slender crescent. Galileo Galilei published all of these findings in a small book titled </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Sidereus Nuncius </span></em><span data-dcnode-id="1106" instrument_node="">(“The Starry Messenger”) in 1610.</span></p><div class="unive-7ca8120c45e0c852f291622f54f762b6 unive-in-content" data-dcnode-id="1104" id="unive-7ca8120c45e0c852f291622f54f762b6"></div><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">While Galileo was not the first astronomer to point a telescope towards the heavens, he was the first to do so scientifically and methodically. Not only that, but the comprehensive notes he took on his observations, and the publication of his discoveries, would have a revolutionary impact on astronomy and many other fields of science.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><h2 data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Galileo’s Telescope Today:</span></h2><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node="">Today, over 400 years later, Galileo’s Telescope still survives under the constant care of the </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imss.fi.it/"><span data-dcnode-id="1095" instrument_node="">Istituto e Museo di Storia della Scienza</span></a><span data-dcnode-id="1093" instrument_node=""> (renamed the Museo Galileo in 2010) in Italy. The Museum holds exhibitions on Galileo’s telescope and the observations he made with it. The displays consist of these rare and precious instruments – including the objective lens created by the master and the only two existing telescopes built by Galileo himself.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Thanks to Galileo’s careful record keeping, craftsmen around the world have recreated Galileo’s telescope for museums and replicas are now sold for amateurs and collectors as well. Despite the fact that astronomers now have telescopes of immense power at their disposal, many still prefer to go the DIY route, just like Galileo!</span></p><span data-dcnode-id="1088" instrument_node="">
</span><figure aria-describedby="caption-attachment-123292" class="wp-caption aligncenter" data-dcnode-id="1083" id="attachment_123292" style="width: 580px"><img alt="A replica of the earliest surviving telescope attributed to Galileo Galilei, on display at the Griffith Observatory. Credit: Wikipedia Commons/Mike Dunn" class="size-medium wp-image-123292" data-dcnode-id="1087" height="435" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/wp-content/uploads/2015/11/Galileo_telescope_replica-580x435.jpg&amp;raw" srcset="https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_telescope_replica-580x435.jpg 580w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_telescope_replica-250x188.jpg 250w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_telescope_replica-1024x768.jpg 1024w, https://www.universetoday.com/wp-content/uploads/2015/11/Galileo_telescope_replica.jpg 1600w" width="580"><figcaption class="wp-caption-text" data-dcnode-id="1084" id="caption-attachment-123292"><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">A replica of the earliest surviving telescope attributed to Galileo Galilei, on display at the Griffith Observatory. Credit: Wikipedia Commons/Mike Dunn</span></em></figcaption></figure><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Few scientists and astronomers have had the same impact Galileo had. Even fewer are regarded as pioneers in the sciences, or revolutionary thinkers who forever changed humanity’s perception of the heavens and their place within it. Little wonder then why his most prized instrument is kept so well preserved, and is still the subject of study over four centuries later.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">We have written many interesting articles on Galileo here at Universe Today. Here’s</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1075" instrument_node="">Astronomy Cast also has an interesting episode on telescope making – </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DL3YbYHlHmK8"><span data-dcnode-id="1074" instrument_node="">Episode 327: Telescope Making, Part I</span></a></p><div class="unive-b345b8efd91507b8f06fbc1145160e30 unive-in-content" data-dcnode-id="1071" id="unive-b345b8efd91507b8f06fbc1145160e30"></div><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1069" instrument_node="">For more information, be sure to check out the </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.museogalileo.it/en/index.html%3F_ga%3D1.195628328.56868631.1468428107"><span data-dcnode-id="1068" instrument_node="">Museo Galileo</span></a><span data-dcnode-id="1066" instrument_node="">‘s website.</span></p><div class="unive-69c3b90d63aaf97c2ce9e932d7e8feaa unive-body-newsletter-box-dynamic-and-randomized-values" data-dcnode-id="1064" id="unive-69c3b90d63aaf97c2ce9e932d7e8feaa"></div><span data-dcnode-id="1063" instrument_node="">

</span><img alt="" class="avatar avatar-100 photo" data-dcnode-id="885" height="100" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9561816f388c6a13a35dcf97d07d1cfc%3Fs%3D100%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9561816f388c6a13a35dcf97d07d1cfc?s=200&amp;d=mm&amp;r=g 2x" width="100"><span data-dcnode-id="884" instrument_node=""> </span><b class="fn" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Aqua4U</span></b><span data-dcnode-id="881" instrument_node=""> </span><span class="says" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">says:</span></span><span data-dcnode-id="878" instrument_node=""> </span></div><span data-dcnode-id="876" instrument_node="">
</span><div class="comment-metadata" data-dcnode-id="870"><span data-dcnode-id="875" instrument_node="">
</span><a data-dcnode-id="872" href="#comment-154924"><time data-dcnode-id="873" datetime="2016-07-13T15:56:53-04:00"><span data-dcnode-id="874" instrument_node="">July 13, 2016 at 3:56 PM</span></time></a><span data-dcnode-id="871" instrument_node=""> </span></div><span data-dcnode-id="869" instrument_node="">
</span></footer><span data-dcnode-id="867" instrument_node="">
</span><div class="comment-content" data-dcnode-id="856"><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Just try to imagine what if felt like to be the first one to see the moons of Jupiter or the rings of Saturn! Talk about mind blowing! </span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Even today we have ‘Old school’ scientists who refuse to accept change. Rather like the clergy in Gallileo’s time? Such is the nature of collectivized thought. One needs reproducible evidence and bonified credentials to even be heard.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Bottom line is… Seek a higher level education if you have a desire to change science. That is IF you can afford it! This ‘filtering’ down effect is crucial for the integrity of our sciences, but on wonders what has been sidelined or ignored due to the process…</span></p><span data-dcnode-id="857" instrument_node="">
