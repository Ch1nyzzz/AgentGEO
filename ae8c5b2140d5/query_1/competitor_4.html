</span><p data-dcnode-id="2190"><span data-dcnode-id="2199" instrument_node="">Each month, I spend hundreds of hours and thousands of dollars keeping </span><em data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">The Marginalian</span></em><span data-dcnode-id="2196" instrument_node=""> (</span><a data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2021/10/22/brain-pickings-becoming-the-marginalian"><span data-dcnode-id="2195" instrument_node="">formerly </span><em data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Brain Pickings</span></em></a><span data-dcnode-id="2191" instrument_node="">) going. For fifteen years, it has remained free and ad-free and alive thanks to patronage from readers. I have no staff, no interns, not even an assistant — a thoroughly one-woman labor of love that is also my life and my livelihood. If this labor has made your own life more livable in the past year (or the past decade), please consider aiding its sustenance with a one-time or loyal donation. Your support makes all the difference.</span></p><span data-dcnode-id="2189" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="1656"><span data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">The Art-Science of Perspective: How an Innovation in Figurative Drawing Powered Galileo’s Astronomical Revolution</span></span></h1><span data-dcnode-id="1655" instrument_node="">
</span><h2 data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">A journey from the farthest cosmic horizons of reality to the depths of our poetic truth. </span></h2><span data-dcnode-id="1652" instrument_node="">
</span><h3 class="byline" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">By Maria Popova</span></h3><span data-dcnode-id="1649" instrument_node="">
</span><div class="entry_content" data-dcnode-id="336"><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1645"><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/exec/obidos/ASIN/1524748137/braipick-20" target="_blank"><img alt="The Art-Science of Perspective: How an Innovation in Figurative Drawing Powered Galileo’s Astronomical Revolution" class="cover alignright size-medium jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="1647" data-lazy-loaded="1" height="486" loading="eager" sizes="(max-width: 320px) 100vw, 320px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg%3Ffit%3D320%252C486%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg?w=1200&amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg?resize=240%2C365&amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg?resize=320%2C486&amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg?resize=768%2C1167&amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2018/10/figuring_jacket_final.jpg?resize=600%2C912&amp;ssl=1 600w" width="320"></a></p><p data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">I have been thinking a great deal lately about the notion of </span><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">perspective</span></em><span data-dcnode-id="1641" instrument_node="">. We speak of taking another’s perspective — an admirable moral aspiration but, in a strict sense, a physical impossibility. Even the most well-intentioned and empathetic among us are creatures invariably bound by our frames of reference, with our vantage point confined to our own corner of reality. And yet we aim, as we must, to transcend our perspectival blindnesses and see the world from different points of view — that, it seems to me, is one of the fundamental requirements of human decency and one of the great paradoxes of morality. </span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1638" instrument_node="">In such considerations, we use the word </span><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">perspective</span></em><span data-dcnode-id="1635" instrument_node=""> in its figurative sense, but that sense — far more so than for most words — is deeply entwined with the word’s literal meaning and its history. Even the word </span><em data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">figurative</span></em><span data-dcnode-id="1632" instrument_node=""> is part of the history of perspective. </span></p><span data-dcnode-id="1630" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1626" id="attachment_66651"><img alt="" class="size-full wp-image-66651" data-dcnode-id="1629" data-recalc-dims="1" height="487" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg%3Fresize%3D680%252C487%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg?w=1200&amp;ssl=1 1200w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg?resize=240%2C172&amp;ssl=1 240w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg?resize=320%2C229&amp;ssl=1 320w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg?resize=768%2C550&amp;ssl=1 768w, https://i0.wp.com/www.themarginalian.org/wp-content/uploads/2019/01/galileo_harriot_moon.jpg?resize=600%2C430&amp;ssl=1 600w" width="680"><figcaption class="wp-caption-text" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Left: Galileo Galilei’s Moon drawings, 1610. Right: Thomas Harriot’s Moon maps, 1610.</span></figcaption></figure><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1624" instrument_node="">This passage from </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2018/11/01/figuring/"><em data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Figuring</span></em></a><span data-dcnode-id="1620" instrument_node=""> traces the interleaving of art and science in the development of perspective, responsible for one of our greatest leaps in understanding the nature of reality:</span></p><span data-dcnode-id="1618" instrument_node="">
</span><blockquote data-dcnode-id="1604"><p data-dcnode-id="1605"><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Euclid’s Elements</span></em><span data-dcnode-id="1615" instrument_node=""> remains one of the most influential scientific texts of all time, on a par with Newton’s </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Principia</span></em><span data-dcnode-id="1612" instrument_node="">. For centuries after Euclid’s death, his geometry remained our only model of understanding space. This breakthrough in science shaped art through the development of perspective — a technique originally called </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">geometric figuring</span></em><span data-dcnode-id="1609" instrument_node="">, which invited architecture and the figurative arts into the three-dimensional world for the first time, then through them gave back to science. Galileo’s Moon drawings were so revolutionary in large part because, trained in perspective, he depicted the topography of its mountains and craters, emanating the radical suggestion that our satellite is not a perfectly smooth orb of ethereal matter but as solid and rugged as the Earth — not a heavenly body but a material one. Mere months earlier, the English mathematician and astronomer Thomas Harriot had become the first person known to make a drawing of the Moon seen through a telescope. Untrained in perspective and ignorant of the Euclid-informed projective geometries that had made their way to Florence but not yet to England, he depicted the Moon as a dappled disc resembling an engraved medal. The genius that led Galileo to see what Harriot could not was indelibly </span><em data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">genius loci</span></em><span data-dcnode-id="1606" instrument_node="">, as much a function of his mind as of his time and place.</span></p></blockquote><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1602" instrument_node="">This question of the relationship between perspective in the scientific sense and perspective in the moral sense was recently reignited when I watched the iconic 1977 film </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Powers of Ten</span></em><span data-dcnode-id="1599" instrument_node=""> by </span><a data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/tag/eames"><span data-dcnode-id="1598" instrument_node="">Charles and Ray Eames</span></a><span data-dcnode-id="1596" instrument_node=""> — a perspectival masterpiece that did for our understanding of scale and orders of magnitude what Edwin Abbott Abbott’s Victorian novella </span><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2017/12/20/flatland-epilogue/"><em data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Flatland</span></em></a><span data-dcnode-id="1592" instrument_node=""> did for our understanding of dimensions. I had seen </span><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Powers of Ten</span></em><span data-dcnode-id="1589" instrument_node=""> numerous times before, but this time — perhaps because I watched it projected onto a ceiling, lying flat on my back, with an astrophysicist beside me — its genius struck a deeper chord. It belongs to that rare species of science communication that transcends the scientific and reaches into the poetic, effecting not mere explanation, not even just elucidation, but </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2016/10/26/explainer-elucidator-enchanter-great-writing/"><span data-dcnode-id="1588" instrument_node="">enchantment</span></a><span data-dcnode-id="1586" instrument_node="">.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><p data-dcnode-id="1237"></p><div class="fluid-width-video-wrapper" data-dcnode-id="1238" style="padding-top: 75%;"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="1239" frameborder="0" id="fitvid0" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/0fKBhvDjuy0%3Ffeature%3Doembed%26rel%3D0%26controls%3D0%26showinfo%3D0%26iv_load_policy%3D3&amp;raw" title="Powers of Ten™ (1977)"><html data-cast-api-enabled="true" data-dcnode-id="1241" dir="ltr" lang="en"><head data-dcnode-id="1559"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1579" name="viewport"/><link data-dcnode-id="1574" href="https://www.youtube.com/s/player/596ef930/www-player.css" name="www-player" nonce="ZegU2w6QcvXyfNdx+yr+Qg" rel="stylesheet"/><title data-dcnode-id="1561">YouTube</title><link data-dcnode-id="1560" href="https://www.youtube.com/watch?v=0fKBhvDjuy0" rel="canonical"/></meta></head><body class="date-20220425 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="1242" dir="ltr"><div data-dcnode-id="1249" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-hide-controls ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-pause-overlay-controls-hidden" data-dcnode-id="1250" data-version="/s/player/596ef930/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="1557" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="1558" playsinline="" style="width: 580px; height: 435px; left: 0px; top: -435px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="1556" data-layer="1"></div><div class="ytp-chrome-top ytp-show-ca </span><p data-dcnode-id="1221"><span data-dcnode-id="1235" instrument_node="">The film was made months after the launch of the </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2018/05/09/a-brave-and-startling-truth-maya-angelou/"><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Voyager</span></em></a><span data-dcnode-id="1231" instrument_node=""> mission, in an era infused with Carl Sagan’s poetic sensibility and ablaze with the thrill of cosmic curiosity — a time when humanity’s prosthetic eye first left our corner of the Solar System and set out for its farthest reaches, in order to view our cosmic neighborhood from a perspective other than the one allotted us by gravity. To watch </span><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Powers of Ten</span></em><span data-dcnode-id="1228" instrument_node=""> — and to take </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2017/12/21/reflection/"><span data-dcnode-id="1227" instrument_node="">the telescopic perspective</span></a><span data-dcnode-id="1225" instrument_node=""> in any way — is to humble ourselves, to dwarf our hyperlocal human dramas against the backdrop of a far vaster reality. If only we could move through the world with the continual awareness that we are each but tiny particles of universal matter, yet we each contain entire cosmoses of physical and psychic reality — we do, as much as everyone we see as </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">other</span></em><span data-dcnode-id="1222" instrument_node=""> does. </span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1213"><em data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Powers of Ten</span></em><span data-dcnode-id="1217" instrument_node=""> ends its perspectival extension into the largest scale at 100 million lightyears from Earth, or 10</span><sup data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">24</span></sup><span data-dcnode-id="1214" instrument_node=""> meters — the limit of our vision in 1977. In the decades since, humanity’s prosthetic eye — our Earth-tethered instruments, our space telescopes, our data modeling — has extended beyond this horizon, further calibrating our parochial cosmic perspective. In 2009, the American Museum of Natural History teamed up with the Rubin Museum to produce a visualization of the scale of the universe, to the extent that it was then known. While it lacks the poetic enchantment of the Eames classic and ventures only into the large scales, omitting the subatomic, it offers an astounding journey to our cosmic horizon in space and time, as far as 13.7 billion years of light travel away from Earth, to regions of spacetime illuminated by the light of the baby universe — the afterglow of the Big Bang:</span></p><span data-dcnode-id="1212" instrument_node="">

</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">A visualization produced five years later, in 2014, explores more recent scientific discoveries about the largest known structures in the universe, superclusters — regions of spacetime densely packed with galaxies — and how our own home supercluster, Laniakea, fits into the biggest picture of reality we have yet painted:</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="822"></p><div class="fluid-width-video-wrapper" data-dcnode-id="823" style="padding-top: 56.3235%;"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="824" frameborder="0" id="fitvid2" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/rENyyRwxpHo%3Ffeature%3Doembed%26rel%3D0%26controls%3D0%26showinfo%3D0%26iv_load_policy%3D3&amp;raw" title="Laniakea: Our home supercluster"><html data-cast-api-enabled="true" data-dcnode-id="826" dir="ltr" lang="en"><head data-dcnode-id="835"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="856" name="viewport"/><link data-dcnode-id="851" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="UHyrD6sgrCY5npeDNaU0Iw" rel="stylesheet"/><title data-dcnode-id="838">YouTube</title><link data-dcnode-id="837" href="https://www.youtube.com/watch?v=rENyyRwxpHo" rel="canonical"/><link data-dcnode-id="836" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="KcJkn0Hr99M+d2osmwNzPQ" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="827" dir="ltr"><div data-dcnode-id="834" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=rENyyRwxpHo" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><p></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="820" instrument_node="">But I side with Susan Sontag in the conviction that </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2016/12/19/susan-sontag-the-conscience-of-words/"><span data-dcnode-id="819" instrument_node="">“information will never replace illumination”</span></a><span data-dcnode-id="817" instrument_node=""> and with Rachel Carson in her </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2017/08/28/rachel-carson-house-of-life-writing-loneliness/"><span data-dcnode-id="816" instrument_node="">lifelong ethos</span></a><span data-dcnode-id="814" instrument_node=""> that the scientific and the poetic must converge to illuminate nature in a way that not only informs us but moves us to transcend the limitations of our vantage point. To me, far superior than any data visualization in broadening our perspective — </span><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">perspective</span></em><span data-dcnode-id="811" instrument_node=""> in the humanistic sense as well as the cosmic sense — is Marie Howe’s stunning poem “Singularity,” written for and </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/2018/05/22/singularity-marie-howe-stephen-hawking/"><span data-dcnode-id="810" instrument_node="">originally performed</span></a><span data-dcnode-id="808" instrument_node=""> at the second annual </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.themarginalian.org/the-universe-in-verse/"><em data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Universe in Verse</span></em></a><span data-dcnode-id="804" instrument_node=""> at Pioneer Works:</span></p><span data-dcnode-id="802" instrument_node="">
