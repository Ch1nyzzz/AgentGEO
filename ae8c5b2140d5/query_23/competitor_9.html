 image forming instruments, and optics of metals and crystals. The text covers the elements of the theories of interference, interferometers, and diffraction. The book tackles several behaviors of light, including its diffraction when exposed to ultrasonic waves.  The selection will be most useful to researchers whose work involves understanding the behavior of light.</span></div></details><details class="AccordionItem_details__1jTtY" data-dcnode-id="425" data-testid="tableOfContents" id="tableOfContents"><summary class="AccordionItem_summary__8YDzg" data-dcnode-id="1419" data-testid="summary-tableOfContents"><h2 data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Table of Contents</span></h2><svg class="AccordionItem_accordionArrow__2ayMB" data-dcnode-id="1420" height="24" viewBox="0 0 92 128" width="18"><path d="M1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="1421"></path></svg></summary><div class="TableOfContents_toc__3MYRt" data-dcnode-id="426"><ul data-dcnode-id="427"><li data-dcnode-id="428"><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">Historical Introduction</span><br data-dcnode-id="1416"><br data-dcnode-id="1415"><span data-dcnode-id="1414" instrument_node="">I. Basic Properties of the Electromagnetic Field</span><br data-dcnode-id="1413"><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">     1.1. The Electromagnetic Field</span><br data-dcnode-id="1410"><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">          1.1.1. Maxwell's Equations</span><br data-dcnode-id="1407"><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">          1.1.2. Material Equations</span><br data-dcnode-id="1404"><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">          1.1.3. Boundary Conditions at a Surface of Discontinuity</span><br data-dcnode-id="1401"><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">          1.1.4
