</span><h1 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">ACOUSTO-OPTIC PHYSICAL PRINCIPLES - MAIN EQUATIONS</span></h1><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="583"><span class="courant" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">An RF signal applied to a piezo-electric transducer, bonded to a suitable crystal, will generate an acoustic wave. This acts like a “phase grating”, traveling through the crystal at the acoustic velocity of the material and with an acoustic wavelength dependent on the frequency of the RF signal. Any incident laser beam will be diffracted by this grating, generally giving a number of diffracted beams.</span></span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="575"><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
</span><span class="titre" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Interaction conditions</span></span><span class="courantBleuBold" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node=""> </span></span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="563"><span class="courant" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">A parameter called the “quality factor, </span></span><span class="courantNoirBold1" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Q</span></span><span class="courant" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">”, determines the interaction regime. </span></span><span class="courantNoirBold1" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Q</span></span><span class="courant" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node=""> is given by:</span></span></p><span data-dcnode-id="562" instrument_node="">
</span><div align="center" data-dcnode-id="556"><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="558"><span class="courantBleuBold" data-dcnode-id="559"><img alt="" border="0" data-dcnode-id="560" height="52" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Q.gif&amp;raw" width="100"></span></p><span data-dcnode-id="557" instrument_node="">
</span></div><span data-dcnode-id="555" instrument_node="">
</span><div align="left" data-dcnode-id="521"><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="523"><span class="courantBleuBold" data-dcnode-id="551"><br data-dcnode-id="553"><span data-dcnode-id="552" instrument_node="">
</span></span><span class="courant" data-dcnode-id="547"><span data-dcnode-id="550" instrument_node="">where </span><img align="absmiddle" alt="" border="0" data-dcnode-id="549" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Symbole1.gif&amp;raw" width="15"><span data-dcnode-id="548" instrument_node=""> is the wavelength of the laser beam, </span></span><span class="courantNoirBold1" data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">n</span></span><span class="courant" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node=""> is the refractive index of the crystal, </span></span><span class="courantNoirBold1" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">L</span></span><span class="courant" data-dcnode-id="535"><span data-dcnode-id="540" instrument_node=""> is the distance the laser beam travels through the acoustic wave and </span><img align="absmiddle" alt="" border="0" data-dcnode-id="539" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole2.gif&amp;raw" width="12"><span data-dcnode-id="538" instrument_node=""> is the acoustic wavelength.</span><br data-dcnode-id="537"><span data-dcnode-id="536" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="532"><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
</span></span><span class="courantNoirBold1" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Q&lt;&lt;1</span></span><span class="courant" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node=""> :This is the </span></span><span class="courantNoirBold1" data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Raman-Nath regime</span></span><span class="courant" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">. The laser beam is incident roughly normal to the acoustic beam and there are several diffraction orders (...-2 -1 0 1 2 3...) with intensities given by Bessel functions.</span></span></p><span data-dcnode-id="522" instrument_node="">
</span></div><span data-dcnode-id="520" instrument_node="">
</span><div align="center" data-dcnode-id="514"><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="516"><span class="courantBleuBold" data-dcnode-id="517"><img alt="" border="0" data-dcnode-id="518" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Raman.gif&amp;raw" width="289"></span></p><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span><div align="left" data-dcnode-id="499"><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="501"><span class="courantNoirBold1" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Q&gt;&gt;1</span></span><span class="courant" data-dcnode-id="508"><span data-dcnode-id="509" instrument_node=""> : This is the </span></span><span class="courantNoirBold1" data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Bragg regime</span></span><span class="courant" data-dcnode-id="502"><span data-dcnode-id="505" instrument_node="">. At one particular incidence angle </span><img align="absmiddle" alt="" border="0" data-dcnode-id="504" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole3.gif&amp;raw" width="16"><span data-dcnode-id="503" instrument_node="">, only one diffraction order is produced - the others are annihilated by destructive interference.</span></span></p><span data-dcnode-id="500" instrument_node="">
</span></div><span data-dcnode-id="498" instrument_node="">
</span><div align="center" data-dcnode-id="492"><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="494"><span class="courantBleuBold" data-dcnode-id="495"><img alt="" border="0" data-dcnode-id="496" height="122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Bragg2.gif&amp;raw" width="346"></span></p><span data-dcnode-id="493" instrument_node="">
</span></div><span data-dcnode-id="491" instrument_node="">
</span><div align="left" data-dcnode-id="469"><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="487"><span class="courant" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">In the intermediate situation, an analytical treatment isn't possible and a numerical analysis would need to be performed by computer.</span></span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="475"><span class="courant" data-dcnode-id="482"><span data-dcnode-id="485" instrument_node="">Most acousto-optic devices operate in the Bragg regime, the common exception being acousto-optic mode lockers and Q-switches.</span><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="479"><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
</span></span><span class="titre" data-dcnode-id="476"><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">
								Wave vectors constructions</span></span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="471"><span class="courant" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">An acousto-optic interaction can be described using wave vectors. Momentum conservation gives us</span></span></p><span data-dcnode-id="470" instrument_node="">
</span></div><span data-dcnode-id="468" instrument_node="">
</span><div align="center" data-dcnode-id="462"><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><span class="courant" data-dcnode-id="465"><img alt="" border="0" data-dcnode-id="466" height="37" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation2.gif&amp;raw" width="120"></span></p><span data-dcnode-id="463" instrument_node="">
</span></div><span data-dcnode-id="461" instrument_node="">
</span><div align="left" data-dcnode-id="354"><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="440"><span class="courantBleuBold" data-dcnode-id="457"><img align="absmiddle" alt="" border="0" data-dcnode-id="459" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation32.gif&amp;raw" width="87"><span data-dcnode-id="458" instrument_node=""> </span></span><span class="courant" data-dcnode-id="453"><span data-dcnode-id="456" instrument_node="">- wave vector of the incident beam.</span><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="450"><img align="absmiddle" alt="" border="0" data-dcnode-id="452" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation42.gif&amp;raw" width="90"><span data-dcnode-id="451" instrument_node=""> </span></span><span class="courant" data-dcnode-id="446"><span data-dcnode-id="449" instrument_node="">- wave vector of the diffracted beam.</span><br data-dcnode-id="448"><span data-dcnode-id="447" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="443"><img align="absmiddle" alt="" border="0" data-dcnode-id="445" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation52.gif&amp;raw" width="75"><span data-dcnode-id="444" instrument_node=""> </span></span><span class="courant" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">- wave vector of the acoustic wave.</span></span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="420"><span class="courant" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Here F is the frequency of the acoustic wave traveling at velocity </span></span><span class="courantNoirBold1" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">v</span></span><span class="courant" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">. </span></span><span class="courantNoirBold1" data-dcnode-id="429"><span data-dcnode-id="432" instrument_node="">n</span><sub data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">i</span></sub></span><span class="courant" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node=""> and </span></span><span class="courantNoirBold1" data-dcnode-id="423"><span data-dcnode-id="426" instrument_node="">n</span><sub data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">d</span></sub></span><span class="courant" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node=""> are the refractive indexes experienced by the incident and diffracted beams (these are not necessarily the same).</span></span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="408"><span class="courant" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Energy conservation leads to : </span></span><span class="courantNoirBold1" data-dcnode-id="409"><span data-dcnode-id="416" instrument_node="">F</span><sub data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">d</span></sub><span data-dcnode-id="413" instrument_node=""> = F</span><sub data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">i</span></sub><span data-dcnode-id="410" instrument_node=""> +/- F</span></span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="392"><span class="courant" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">So, the optical frequency of the diffracted beam is by an amount equal to the frequency of the acoustic wave. This “Doppler shift” can generally be neglected since </span></span><span class="courantNoirBold1" data-dcnode-id="401"><span data-dcnode-id="404" instrument_node="">F&lt;&lt;F</span><sub data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">d</span></sub></span><span class="courant" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node=""> or </span></span><span class="courantNoirBold1" data-dcnode-id="395"><span data-dcnode-id="398" instrument_node="">F</span><sub data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">i</span></sub></span><span class="courant" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">, but can be of great interest in heterodyning applications.</span></span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="374"><span class="courant" data-dcnode-id="387"><span data-dcnode-id="390" instrument_node="">Acousto-optic components use a range of different materials in a variety of configurations. These can be heard described by terms such as longitudinal- and shear-mode, isotropic and anisotropic. While these all share the basic principles of momentum and energy conservation, these different modes of operation have very different performances - as shall be seen.</span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="382"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">
</span><br data-dcnode-id="384"><span data-dcnode-id="383" instrument_node="">
</span></span><span class="titre" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Characteristics of the diffracted light</span></span><span class="courantBleuBold" data-dcnode-id="375"><br data-dcnode-id="379"><span data-dcnode-id="378" instrument_node="">
</span><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">
								Isotropic Interactions</span></span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="356"><span class="courant" data-dcnode-id="367"><span data-dcnode-id="372" instrument_node="">An isotropic interaction is also referred to as a longitudinal-mode interaction. In such a situation, the acoustic wave travels longitudinally in the crystal and the incident and diffracted laser beams see the same refractive index. This is a situation of great symmetry and the angle of incidence is found to match the angle of diffraction. There is no change in polarization associated with the interaction.</span><br data-dcnode-id="371"><span data-dcnode-id="370" instrument_node="">
								These interactions usually occur in homogenous crystals, or in birefringent crystals cut appropriately.</span><br data-dcnode-id="369"><span data-dcnode-id="368" instrument_node="">
</span></span><span class="courantBleuBold" data-dcnode-id="364"><br data-dcnode-id="366"><span data-dcnode-id="365" instrument_node="">
</span></span><span class="courant" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">In the isotropic situation, the angle of incidence of the light must be equal to the Bragg angle,</span></span><span class="courantBleuBold" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node=""> </span></span><span class="courant" data-dcnode-id="357"><img align="absmiddle" alt="" border="0" data-dcnode-id="359" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole3.gif&amp;raw" width="16"><span data-dcnode-id="358" instrument_node=""> :</span></span></p><span data-dcnode-id="355" instrument_node="">
</span></div><span data-dcnode-id="353" instrument_node="">
</span><div align="center" data-dcnode-id="347"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="349"><span class="courantBleuBold" data-dcnode-id="350"><img alt="" border="0" data-dcnode-id="351" height="52" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation6.gif&amp;raw" width="63"></span></p><span data-dcnode-id="348" instrument_node="">
</span></div><span data-dcnode-id="346" instrument_node="">
</span><div align="left" data-dcnode-id="320"><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="328"><span class="courant" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">where</span></span><span class="courantBleuBold" data-dcnode-id="339"><span data-dcnode-id="342" instrument_node=""> </span><img align="absmiddle" alt="" border="0" data-dcnode-id="341" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation72.gif&amp;raw" width="59"><span data-dcnode-id="340" instrument_node=""> i</span></span><span class="courant" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">s the wavelength inside the crystal, </span></span><span class="courantNoirBold1" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">v</span></span><span class="courant" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node=""> is the acoustic velocity and </span></span><span class="courantNoirBold1" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">F</span></span><span class="courant" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node=""> is the RF frequency.</span></span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="322"><span class="courant" data-dcnode-id="323"><span data-dcnode-id="326" instrument_node="">The separation angle </span><img align="absmiddle" alt="" border="0" data-dcnode-id="325" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole4.gif&amp;raw" width="8"><span data-dcnode-id="324" instrument_node=""> between the first order and zero order beams is twice the angle of incidence and, therefore, twice the Bragg angle.</span></span></p><span data-dcnode-id="321" instrument_node="">
</span></div><span data-dcnode-id="319" instrument_node="">
</span><div align="center" data-dcnode-id="313"><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="315"><span class="courantBleuBold" data-dcnode-id="316"><img alt="" border="0" data-dcnode-id="317" height="174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/isotropic.gif&amp;raw" width="326"></span></p><span data-dcnode-id="314" instrument_node="">
</span></div><span data-dcnode-id="312" instrument_node="">
</span><div align="left" data-dcnode-id="296"><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="298"><span class="courant" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">The diffracted light intensity </span></span><span class="courantNoirBold1" data-dcnode-id="305"><span data-dcnode-id="308" instrument_node="">I</span><sub data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">1</span></sub></span><span class="courant" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node=""> is directly controlled by the acoustic power </span></span><span class="courantNoirBold1" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">P</span></span><span class="courant" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node=""> </span></span></p><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">
</span><div align="center" data-dcnode-id="289"><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="291"><span class="courantBleuBold" data-dcnode-id="292"><img alt="" border="0" data-dcnode-id="293" height="55" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation9.gif&amp;raw" width="326"></span></p><span data-dcnode-id="290" instrument_node="">
</span></div><span data-dcnode-id="288" instrument_node="">
</span><div align="left" data-dcnode-id="247"><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="262"><span class="courant" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Here </span></span><span class="courantNoirBold1" data-dcnode-id="281"><span data-dcnode-id="284" instrument_node="">I</span><sub data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">0</span></sub></span><span class="courant" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node=""> is the incident light intensity, </span></span><span class="courantNoirBold1" data-dcnode-id="275"><span data-dcnode-id="278" instrument_node="">M</span><sub data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">2</span></sub></span><span class="courant" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node=""> is the acousto-optic figure of merit for the crystal and </span></span><span class="courantNoirBold1" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">H</span></span><span class="courant" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node=""> and </span></span><span class="courantNoirBold1" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">L</span></span><span class="courant" data-dcnode-id="263"><span data-dcnode-id="266" instrument_node=""> are the height and length of the acoustic beam. </span><img align="absmiddle" alt="" border="0" data-dcnode-id="265" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Symbole1.gif&amp;raw" width="15"><span data-dcnode-id="264" instrument_node=""> is the wavelength of the incident beam.</span></span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="249"><span class="courant" data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Diffraction efficiency (relative) is the ratio </span></span><span class="courantNoirBold1" data-dcnode-id="252"><span data-dcnode-id="258" instrument_node="">I</span><sub data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">1</span></sub><span data-dcnode-id="255" instrument_node="">/I</span><sub data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">0</span></sub></span><span class="courant" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">:</span></span></p><span data-dcnode-id="248" instrument_node="">
</span></div><span data-dcnode-id="246" instrument_node="">
</span><div align="center" data-dcnode-id="240"><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="242"><span class="courantBleuBold" data-dcnode-id="243"><img alt="" border="0" data-dcnode-id="244" height="53" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation10.gif&amp;raw" width="305"></span></p><span data-dcnode-id="241" instrument_node="">
</span></div><span data-dcnode-id="239" instrument_node="">
</span><div align="left" data-dcnode-id="219"><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="225"><span class="courant" data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">For a given orientation, if the RF frequency is slightly different from that required to match the Bragg criterion, diffraction will still occur. However, the diffraction efficiency will drop. The situation is shown in the figure below, where the acoustic wave-vector, </span></span><span class="courantNoirBold1" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">K</span></span><span class="courant" data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">, is longer than the ideal “Bragg” wave-vector, </span></span><span class="courantNoirBold1" data-dcnode-id="228"><span data-dcnode-id="231" instrument_node="">K</span><sub data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">0</span></sub></span><span class="courant" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">.</span></span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="221"><span class="courant" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">A complicated analysis leads to the result:</span></span></p><span data-dcnode-id="220" instrument_node="">
</span></div><span data-dcnode-id="218" instrument_node="">
</span><div align="center" data-dcnode-id="212"><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="214"><span class="courantBleuBold" data-dcnode-id="215"><img alt="" border="0" data-dcnode-id="216" height="53" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation11.gif&amp;raw" width="161"></span></p><span data-dcnode-id="213" instrument_node="">
</span></div><span data-dcnode-id="211" instrument_node="">
</span><div align="left" data-dcnode-id="175"><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="205"><span class="courant" data-dcnode-id="206"><span data-dcnode-id="209" instrument_node="">where </span><img align="absmiddle" alt="" border="0" data-dcnode-id="208" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation12.gif&amp;raw" width="78"><span data-dcnode-id="207" instrument_node=""> and is called the “phase asynchronism”.</span></span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="199"><span class="courant" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">In the isotropic case :</span></span><span class="courantBleuBold" data-dcnode-id="200"><img align="absmiddle" alt="" border="0" data-dcnode-id="201" height="46" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation13.gif&amp;raw" width="123"></span></p><span data-dcnode-id="198" instrument_node="">
</span><p data-dcnode-id="177"><span class="courant" data-dcnode-id="178"><span data-dcnode-id="197" instrument_node="">At the correct Bragg frequency, </span><img align="absmiddle" alt="" border="0" data-dcnode-id="196" height="17" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/equation14.gif&amp;raw" width="94"><span data-dcnode-id="195" instrument_node=""> and efficiency is maximum</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">
								When </span><img align="absmiddle" alt="" border="0" data-dcnode-id="192" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole5.gif&amp;raw" width="20"><span data-dcnode-id="191" instrument_node=""> increases, diffraction efficiency decreases and will continue to decrease down to zero.</span><br data-dcnode-id="190"><span data-dcnode-id="189" instrument_node="">
								If there is a lower limit on the acceptable diffraction efficiency, then this puts a limit on </span><img align="absmiddle" alt="" border="0" data-dcnode-id="188" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole5.gif&amp;raw" width="20"><span data-dcnode-id="187" instrument_node="">. This, in turn, implies a maximum </span><img align="absmiddle" alt="" border="0" data-dcnode-id="186" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Delta_F.gif&amp;raw" width="20"><span data-dcnode-id="185" instrument_node=""> - and defines the RF bandwidth for the device.</span><br data-dcnode-id="184"><span data-dcnode-id="183" instrument_node="">
								To increase this RF bandwidth, the ratio </span><img align="absmiddle" alt="" border="0" data-dcnode-id="182" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole6.gif&amp;raw" width="33"><span data-dcnode-id="181" instrument_node=""> (the acoustic divergence) can be increased.</span><br data-dcnode-id="180"><span data-dcnode-id="179" instrument_node="">
								As the RF frequency varies, the diffracted beam's direction changes. This is the basis behind acousto-optic deflectors.</span></span></p><span data-dcnode-id="176" instrument_node="">
</span></div><span data-dcnode-id="174" instrument_node="">
</span><div align="center" data-dcnode-id="159"><span data-dcnode-id="173" instrument_node="">
</span><span data-dcnode-id="172" instrument_node="">
</span><span data-dcnode-id="171" instrument_node="">
</span><span data-dcnode-id="168" instrument_node="">
</span><span data-dcnode-id="165" instrument_node="">
</span><span data-dcnode-id="163" instrument_node="">
</span><table border="0" cellpadding="0" cellspacing="5" data-dcnode-id="161" width="122"><tbody data-dcnode-id="162"><tr data-dcnode-id="164"><td data-dcnode-id="169"><img alt="" border="0" data-dcnode-id="170" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Crobar1.gif&amp;raw" width="294"></td><td data-dcnode-id="166"><img alt="" border="0" data-dcnode-id="167" height="215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Efficicency_versus_RF.gif&amp;raw" width="307"></td></tr></tbody></table><span data-dcnode-id="160" instrument_node="">
</span></div><span data-dcnode-id="158" instrument_node="">
</span><div align="left" data-dcnode-id="111"><span data-dcnode-id="157" instrument_node="">
</span><p data-dcnode-id="122"><span class="courantBleuBold" data-dcnode-id="154"><br data-dcnode-id="156"><span data-dcnode-id="155" instrument_node="">
</span></span><span class="titre" data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Anisotropic interaction</span></span><span class="courantBleuBold" data-dcnode-id="147"><br data-dcnode-id="151"><span data-dcnode-id="150" instrument_node="">
</span><br data-dcnode-id="149"><span data-dcnode-id="148" instrument_node="">
</span></span><span class="courant" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">In an </span></span><span class="courantBleuBold" data-dcnode-id="142"><span class="courant" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">anisotropic</span></span></span><span class="courant" data-dcnode-id="140"><span data-dcnode-id="141" instrument_node=""> interaction, on the other hand, the refractive indexes of the incident and diffracted beams will be </span></span><span class="courantBleuBold" data-dcnode-id="137"><span class="courant" data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">different</span></span></span><span class="courant" data-dcnode-id="135"><span data-dcnode-id="136" instrument_node=""> due to a change in polarization associated with the interaction. This can be seen in the figure below where the acoustic wave vector </span></span><span class="courantNoirBold1" data-dcnode-id="131"><span data-dcnode-id="134" instrument_node="">K</span><sub data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">1</span></sub></span><span class="courant" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node=""> connects the index curves of the incident and diffracted waves. (</span></span><span class="courantNoirBold1" data-dcnode-id="125"><span data-dcnode-id="128" instrument_node="">K</span><sub data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">2</span></sub></span><span class="courant" data-dcnode-id="123"><span data-dcnode-id="124" instrument_node=""> simply represents a similar interaction at a very different RF frequency).</span></span></p><span data-dcnode-id="121" instrument_node="">
</span><p data-dcnode-id="113"><span class="courant" data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">The same asymmetry which causes the difference in refractive indexes also causes the acoustic wave to travel in a </span></span><span class="courantBleuBold" data-dcnode-id="116"><span class="courant" data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">“shear-mode”</span></span></span><span class="courant" data-dcnode-id="114"><span data-dcnode-id="115" instrument_node=""> and, in the particular example of tellurium dioxide, this results in a drastic reduction in the acoustic velocity.</span></span></p><span data-dcnode-id="112" instrument_node="">
</span></div><span data-dcnode-id="110" instrument_node="">
</span><div align="center" data-dcnode-id="104"><span data-dcnode-id="109" instrument_node="">
</span><p data-dcnode-id="106"><span class="courantBleuBold" data-dcnode-id="107"><img alt="" border="0" data-dcnode-id="108" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/anisotropic.gif&amp;raw" width="341"></span></p><span data-dcnode-id="105" instrument_node="">
</span></div><span data-dcnode-id="103" instrument_node="">
</span><div align="left" data-dcnode-id="93"><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="99"><span class="courant" data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">Anisotropic interactions generally offer an increase in efficiency and in both acoustic and optical bandwidth. They are used almost universally in large aperture devices. The reduction in the acoustic velocity, seen in shear-mode tellurium dioxide, lends this material to be used in high resolution deflectors.</span></span></p><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="95"><span class="courant" data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">The increased bandwidth available from shear-mode devices can be seen most immediately in the figure below where the interaction configuration is chosen so that the acoustic wave-vector lies tangential to the diffracted beam's index ellipse.</span></span></p><span data-dcnode-id="94" instrument_node="">
</span></div><span data-dcnode-id="92" instrument_node="">
</span><div align="center" data-dcnode-id="86"><span data-dcnode-id="91" instrument_node="">
</span><p data-dcnode-id="88"><span class="courantBleuBold" data-dcnode-id="89"><img alt="" border="0" data-dcnode-id="90" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/anisotropic2.gif&amp;raw" width="338"></span></p><span data-dcnode-id="87" instrument_node="">
</span></div><span data-dcnode-id="85" instrument_node="">
</span><div align="left" data-dcnode-id="60"><span data-dcnode-id="84" instrument_node="">
</span><p data-dcnode-id="72"><span class="courantBleuBold" data-dcnode-id="79"><br data-dcnode-id="83"><span data-dcnode-id="82" instrument_node="">
</span><br data-dcnode-id="81"><span data-dcnode-id="80" instrument_node="">
</span></span><span class="courant" data-dcnode-id="73"><span data-dcnode-id="78" instrument_node="">This means that the length of the acoustic wave-vector can vary quite grossly while only producing small changes in the length of the diffracted beam's wave-vector. So, in this situation, </span><img align="absmiddle" alt="" border="0" data-dcnode-id="77" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/Delta_K.gif&amp;raw" width="23"><span data-dcnode-id="76" instrument_node=""> (and, hence, </span><img align="absmiddle" alt="" border="0" data-dcnode-id="75" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.acoustooptic.com/Images/symbole5.gif&amp;raw" width="20"><span data-dcnode-id="74" instrument_node="">) is quite insensitive to changes in RF frequency.</span></span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="68"><span class="courant" data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">Shear-mode interactions are very much more complex to analyze, requiring detailed information on crystal cut, refractive indexes, orientation. However, these</span></span></p><span data-dcnode-id="67" instrument_node="">
</span><p data-dcnode-id="62"><span class="courant" data-dcnode-id="63"><span data-dcnode-id="66" instrument_node="">interactions have a lot of advantages and most deflectors and all AOTFs will use shear-mode interactions. The reduced acoustic velocity makes these devices very much slower than longitudinal-mode units and this can be seen as a disadvantage in some circumstances.</span><br data-dcnode-id="65"><span data-dcnode-id="64" instrument_node="">
</span></span></p><span data-dcnode-id="61" instrument_node="">
</span></div><span data-dcnode-id="59" instrument_node="">
