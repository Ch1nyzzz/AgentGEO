</span><p data-dcnode-id="717"><span data-dcnode-id="754" instrument_node="">Although research into </span><a class="mw-redirect" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_data_storage" title="Optical data storage"><span data-dcnode-id="753" instrument_node="">optical data storage</span></a><span data-dcnode-id="751" instrument_node=""> has been ongoing for many decades, the first popular system was the </span><a class="mw-redirect" data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compact_Disc" title="Compact Disc"><span data-dcnode-id="750" instrument_node="">Compact Disc</span></a><span data-dcnode-id="748" instrument_node="">, introduced in 1982,</span><sup class="reference" data-dcnode-id="745" id="cite_ref-1"><a data-dcnode-id="746" href="#cite_note-1"><span data-dcnode-id="747" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="742" id="cite_ref-2"><a data-dcnode-id="743" href="#cite_note-2"><span data-dcnode-id="744" instrument_node="">[2]</span></a></sup><span data-dcnode-id="741" instrument_node=""> adapted from audio (</span><a class="mw-redirect" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CD-DA" title="CD-DA"><span data-dcnode-id="740" instrument_node="">CD-DA</span></a><span data-dcnode-id="738" instrument_node="">) to data storage (the </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CD-ROM" title="CD-ROM"><span data-dcnode-id="737" instrument_node="">CD-ROM</span></a><span data-dcnode-id="735" instrument_node=""> format) with the 1985 </span><i data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Yellow Book</span></i><span data-dcnode-id="732" instrument_node="">, and re-adapted as the first mass market optical storage medium with </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CD-R" title="CD-R"><span data-dcnode-id="731" instrument_node="">CD-R</span></a><span data-dcnode-id="729" instrument_node=""> and </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CD-RW" title="CD-RW"><span data-dcnode-id="728" instrument_node="">CD-RW</span></a><span data-dcnode-id="726" instrument_node=""> in 1988. Compact Disc is still the </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_facto_standard" title="De facto standard"><i data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">de facto</span></i><span data-dcnode-id="723" instrument_node=""> standard</span></a><span data-dcnode-id="721" instrument_node=""> for audio recordings, although its place for other multimedia recordings and optical data storage has largely been superseded by </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD" title="DVD"><span data-dcnode-id="720" instrument_node="">DVD</span></a><span data-dcnode-id="718" instrument_node="">.
</span></p><p data-dcnode-id="694"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD" title="DVD"><span data-dcnode-id="716" instrument_node="">DVD</span></a><span data-dcnode-id="714" instrument_node=""> (initially an initialism abbreviation of "Digital Video Disc," then modified to "Digital Versatile Disc," then officially just "DVD") was the mass-market successor to CD.</span><sup class="reference" data-dcnode-id="711" id="cite_ref-3"><a data-dcnode-id="712" href="#cite_note-3"><span data-dcnode-id="713" instrument_node="">[3]</span></a></sup><span data-dcnode-id="710" instrument_node=""> DVD was rolled out in 1996, again initially for video and audio. </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD_recordable" title="DVD recordable"><span data-dcnode-id="709" instrument_node="">DVD recordable</span></a><span data-dcnode-id="707" instrument_node=""> formats developed some time later: </span><a class="mw-redirect" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD-R" title="DVD-R"><span data-dcnode-id="706" instrument_node="">DVD-R</span></a><span data-dcnode-id="704" instrument_node=""> in late 1997 and </span><a class="mw-redirect" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DVD%252BR" title="DVD+R"><span data-dcnode-id="703" instrument_node="">DVD+R</span></a><span data-dcnode-id="701" instrument_node=""> in 2002. Although DVD was initially intended to prevent a </span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Format_war" title="Format war"><span data-dcnode-id="700" instrument_node="">format war</span></a><span data-dcnode-id="698" instrument_node=""> in fact one did arise between these two formats. It was resolved with both surviving however: DVD-R predominating for stand-alone DVD recorders and players, and (for computers) most DVD devices being engineered as </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dual_format" title="Dual format"><span data-dcnode-id="697" instrument_node="">dual format</span></a><span data-dcnode-id="695" instrument_node="">, to be compatible with both.
</span></p><p data-dcnode-id="680"><span data-dcnode-id="693" instrument_node="">With the development of </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-definition_television" title="High-definition television"><span data-dcnode-id="692" instrument_node="">high-definition television</span></a><span data-dcnode-id="690" instrument_node="">, and the popularization of </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadband" title="Broadband"><span data-dcnode-id="689" instrument_node="">broadband</span></a><span data-dcnode-id="687" instrument_node=""> and digital storage of movies, a further format development took place, again giving rise to two camps: </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HD_DVD" title="HD DVD"><span data-dcnode-id="686" instrument_node="">HD DVD</span></a><span data-dcnode-id="684" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blu-ray_Disc" title="Blu-ray Disc"><span data-dcnode-id="683" instrument_node="">Blu-ray Disc</span></a><span data-dcnode-id="681" instrument_node="">, based upon a switch from red to blue-violet laser and tighter engineering tolerances. After suffering a number of significant losses to Blu-ray, Toshiba announced their withdrawal from HD DVD on 19 February 2008.
</span></p><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">In 2004, development of the </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holographic_Versatile_Disc" title="Holographic Versatile Disc"><span data-dcnode-id="678" instrument_node="">Holographic Versatile Disc</span></a><span data-dcnode-id="676" instrument_node=""> (HVD) commenced, which promised the storage of several terabytes of data per disc. However, development stagnated towards the late 2000s due to lack of funding.
</span></p><p data-dcnode-id="666"><span data-dcnode-id="674" instrument_node="">In 2006, it was reported that Japanese researchers developed ultraviolet ray lasers with a wave length of 210 nanometers, which would enable a higher </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bit" title="Bit"><span data-dcnode-id="673" instrument_node="">bit</span></a><span data-dcnode-id="671" instrument_node=""> density than Blu-ray discs.</span><sup class="reference" data-dcnode-id="668" id="cite_ref-4"><a data-dcnode-id="669" href="#cite_note-4"><span data-dcnode-id="670" instrument_node="">[4]</span></a></sup><span data-dcnode-id="667" instrument_node=""> As of 2022, no updates on that project have been reported.
</span></p><p data-dcnode-id="660"><span data-dcnode-id="665" instrument_node="">As of 2007</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="662" style="display:none;"><a class="external text" data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_optical_storage_media%26action%3Dedit"><span data-dcnode-id="664" instrument_node="">[update]</span></a></sup><span data-dcnode-id="661" instrument_node="">, future development beyond Blu-ray Disc appear to be based upon one or more of the following technologies, all in varying stages of development:
</span></p><span data-dcnode-id="659" instrument_node="">
</span><ul data-dcnode-id="610"><li data-dcnode-id="655"><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holographic_data_storage" title="Holographic data storage"><span data-dcnode-id="658" instrument_node="">Holographic data storage</span></a><span data-dcnode-id="656" instrument_node="">.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="650"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/3D_optical_data_storage" title="3D optical data storage"><span data-dcnode-id="653" instrument_node="">3D optical data storage</span></a><span data-dcnode-id="651" instrument_node="">.</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="646"><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Near-field_optics" title="Near-field optics"><span data-dcnode-id="648" instrument_node="">Near-field optics</span></a></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="644" instrument_node="">Solid immersion optics (allowing an extremely high </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numerical_aperture" title="Numerical aperture"><span data-dcnode-id="643" instrument_node="">numerical aperture</span></a><span data-dcnode-id="641" instrument_node="">).</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="638" instrument_node="">Discs utilizing very short wavelengths such as </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraviolet" title="Ultraviolet"><span data-dcnode-id="637" instrument_node="">UV</span></a><span data-dcnode-id="635" instrument_node=""> or </span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray" title="X-ray"><span data-dcnode-id="634" instrument_node="">X-rays</span></a><span data-dcnode-id="632" instrument_node="">.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">Layer selection discs (</span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LS-R" title="LS-R"><span data-dcnode-id="628" instrument_node="">LS-R</span></a><span data-dcnode-id="626" instrument_node="">).</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="620"><a class="mw-redirect" data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MultiLevel" title="MultiLevel"><span data-dcnode-id="623" instrument_node="">Multi-level</span></a><span data-dcnode-id="621" instrument_node=""> technology.</span></li><span data-dcnode-id="619" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Complex pit shapes allowing multiple channels to be stored on one track.</span></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Wavelength </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiplexing" title="Multiplexing"><span data-dcnode-id="614" instrument_node="">multiplexing</span></a><span data-dcnode-id="612" instrument_node=""> techniques.</span></li></ul><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">As of 2020, </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/5D_optical_data_storage" title="5D optical data storage"><span data-dcnode-id="607" instrument_node="">5D optical data storage</span></a><span data-dcnode-id="605" instrument_node=""> has the potential to store hundreds of terabytes of data for thousands of years. 
</span></p><span data-dcnode-id="603" instrument_node="">
