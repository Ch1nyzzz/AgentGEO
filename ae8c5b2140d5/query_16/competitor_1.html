      baloon111/iStock/GettyImages
    </span></div></div></div><span data-dcnode-id="496" instrument_node=""> </span></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="490"><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Optical storage devices store and read data using light, often recording information on what's called an optical disk. The most common types of optical storage devices are drives that read and write CDs, DVDs and Blu-ray discs. Scientists continue to research ways to pack more data onto discs that can fit into a compact space.</span></p><span data-dcnode-id="491" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="483"><div class="inline-ad inline-ad--mobile" data-dcnode-id="484"><p class="inline-ad__label ui-label" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">
      Advertisement

    Optical Storage Definition
  </span></h2></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="476"><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Optical storage refers to recording data using light. Typically, that's done using a drive that can contain a removable disk and a system based on lasers that can read or write to the disk. If you've ever used a DVD player to watch a movie, put a CD in a player to listen to music or used similar disks in your desktop or laptop computer, you've used optical storage.</span></p><span data-dcnode-id="477" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="469"><div class="inline-ad inline-ad--mobile" data-dcnode-id="470"><p class="inline-ad__label ui-label" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="473" instrument_node=""> </span><div class="inline-ad__wrapper inline-ad__wrapper_runway" data-dcnode-id="471"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="1" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.techwalla.mw/slot1-2" data-ad-refresh="false" data-ad-sizes="[[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_2&quot;}" data-ad-type="gpt" data-dcnode-id="472" id="slot1-2" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-jwplayer-wrapper" data-dcnode-id="447"><div class="component-article-section-jwplayer" data-dcnode-id="448"><p class="component-article-section-jwplayer-label" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">
      Video of the Day
    </span></p><span data-dcnode-id="466" instrument_node=""> </span><div class="component-article-section-jwplayer-container-outer" data-dcnode-id="449"><div class="component-article-section-jwplayer-container" data-dcnode-id="450"><div class="jw-error jw-reset" data-dcnode-id="454" id="lg-jwplayer" style="width: 100%; height: 360px;"><div class="jw-error-msg jw-info-overlay jw-reset" data-dcnode-id="455"><div class="jw-icon jw-reset" data-dcnode-id="461"><svg class="jw-svg-icon jw-svg-icon-error" data-dcnode-id="462" focusable="false" style="width:100%;height:100%;" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><path d="M34.6 20.2L10 33.2 27.6 16l7 3.7a.4.4 0 0 1 .2.5.4.4 0 0 1-.2.2zM33.3 0L21 12.2 9 6c-.2-.3-.6 0-.6.5V25L0 33.6 2.5 36 36 2.7z" data-dcnode-id="463"></path></svg></div><div class="jw-info-container jw-reset" data-dcnode-id="456"><div class="jw-error-text jw-reset-text" data-dcnode-id="457" data-nosnippet="" dir="auto"><span data-dcnode-id="460" instrument_node="">Sorry, the video player failed to load.</span><span class="jw-break jw-reset" data-dcnode-id="459"></span><span data-dcnode-id="458" instrument_node="">(Error&nbsp;Code:&nbsp;100013)</span></div></div></div></div><span data-dcnode-id="453" instrument_node=""> </span><div data-dcnode-id="451" id="lg-jwplayer-close"><span class="close-x" data-dcnode-id="452"></span></div></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="437"><p data-dcnode-id="439"><span data-dcnode-id="446" instrument_node="">Compared to other types of storage such as magnetic hard drives, the disks used in optical storage can be quite </span><strong data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">inexpensive and lightweight</span></strong><span data-dcnode-id="443" instrument_node="">, making them easy to ship and transport. They also have the advantage of being </span><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">removable</span></strong><span data-dcnode-id="440" instrument_node="">, unlike disks in typical hard drive, and they're able to store much more information than previous types of removable media such as floppy disks.</span></p><span data-dcnode-id="438" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="430"><div class="inline-ad inline-ad--mobile" data-dcnode-id="431"><p class="inline-ad__label ui-label" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="434" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="432"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.techwalla.mw/slot1-3" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_3&quot;}" data-ad-type="gpt" data-dcnode-id="433" id="slot1-3" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="426"><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">One downside of optical disks is that they can become scratched, giving some drives difficulty writing them, although drives and the software they work with do include error-correction systems designed to prevent data loss in such circumstances.</span></p><span data-dcnode-id="427" instrument_node="">
</span></div><div class="component-article-section-heading article-section-content" data-dcnode-id="423"><h2 data-dcnode-id="424" id="types-of-optical-storage-devices"><span data-dcnode-id="425" instrument_node="">
    Types of Optical Storage Devices
  </span></h2></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="416"><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">Among the most familiar types of optical storage devices are the CD, DVD and Blu-ray disc drives commonly found in computers. Initially, many of these drives were </span><strong data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">read-only</span></strong><span data-dcnode-id="419" instrument_node="">, meaning they could only access data on already created disks and couldn't write new content to existing or blank disks. Still, the read-only devices called CD-ROM drives revolutionized home and business computing in the 1990s, making it possible to distribute multimedia material like graphically rich games, encyclopedias and video material that anyone could access on a computer. Now, most drives can both read and write the types of optical disks they are compatible with.</span></p><span data-dcnode-id="417" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="409"><div class="inline-ad inline-ad--mobile" data-dcnode-id="410"><p class="inline-ad__label ui-label" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">
      Advertisement
    </span></p><span data-dcnode-id="413" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="411"><div class="component-ad-gpt ad slot ad-mobile" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="small" data-ad-path="/6117/dmd.techwalla.mw/slot1-4" data-ad-refresh="false" data-ad-sizes="[[300,250],[320,50],[320,100]]" data-ad-targeting="{&quot;loc&quot;:&quot;ad_4&quot;}" data-ad-type="gpt" data-dcnode-id="412" id="slot1-4" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-inline-ad" data-dcnode-id="403"><div class="inline-ad inline-ad--desktop" data-dcnode-id="404"><span data-dcnode-id="407" instrument_node=""> </span><div class="inline-ad__wrapper" data-dcnode-id="405"><div class="component-ad-gpt ad inline ad-desktop" data-ad-batch="2" data-ad-bidding="true" data-ad-breakpoint="medium,large" data-ad-path="/6117/dmd.techwalla/inline1-2" data-ad-refresh="false" data-ad-rendered="true" data-ad-sizes="[[728,90],[300,250]]" data-ad-targeting="{&quot;loc&quot;:&quot;inline_2&quot;}" data-ad-type="gpt" data-dcnode-id="406" id="inline1-2" reve-ad-refresh="false"></div></div></div></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="390"><p data-dcnode-id="392"><span data-dcnode-id="402" instrument_node="">Disks are available that can be written once, usually marked with the letter "</span><strong data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">R</span></strong><span data-dcnode-id="399" instrument_node="">" as in </span><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">"DVD-R,"</span></strong><span data-dcnode-id="396" instrument_node=""> or that can be written multiple times, usually marked with the letters "</span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">RW</span></strong><span data-dcnode-id="393" instrument_node="">." Similar drives are also found in most modern home video game consoles in order to read game software. Drives in computers and gaming systems can typically play movies and music on optical disks as well. Make sure you buy disks that are compatible with your drives and players.</span></p><span data-dcnode-id="391" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="383"><div class="inline-ad inline-ad--mobile" data-dcnode-id="384"><p class="inline-ad__label ui-label" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">

</span></div><div class="component-article-section-heading article-section-content" data-dcnode-id="376"><h2 data-dcnode-id="377" id="when-other-storage-is-used"><span data-dcnode-id="378" instrument_node="">

  </span></h2></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="372"><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Hard drives are still used in many computers for situations where data must be read and written quickly. They're typically faster than optical drives and easier to edit in particular parts.</span></p><span data-dcnode-id="373" instrument_node="">
</span></div><div class="component-article-section-inline-ad" data-dcnode-id="365"><div class="inline-ad inline-ad--mobile" data-dcnode-id="366"><p class="inline-ad__label ui-label" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">

</span></div><div class="component-article-section-content ui-body component-article-section-content ui-body article-section-content" data-dcnode-id="354"><p data-dcnode-id="356"><span data-dcnode-id="360" instrument_node="">USB sticks, which contain </span><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">flash memory</span></strong><span data-dcnode-id="357" instrument_node=""> that can be swiftly written and read, have also begun to replace optical devices for transporting data in many circumstances. The internet has also cut into the demand for optical storage devices and media, since while for a time computer software, music, movies and video games were typically delivered via optical disk, they're now at least as likely to be sold or rented digitally online.</span></p><span data-dcnode-id="355" instrument_node="">
