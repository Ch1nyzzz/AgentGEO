</span><div class="elementor-element elementor-element-92751ad elementor-widget elementor-widget-text-editor" data-dcnode-id="504" data-element_type="widget" data-id="92751ad" data-settings="{&quot;ekit_we_effect_on&quot;:&quot;none&quot;}" data-widget_type="text-editor.default"><span data-dcnode-id="589" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="508"><span data-dcnode-id="587" instrument_node="">
</span><h2 class="page__title title" data-dcnode-id="583" id="page-title"><span data-dcnode-id="585" style="font-size: 24px;"><span data-dcnode-id="586" instrument_node="">History of the Videogram Regulatory Board (VRB) and the Optical Media Board (OMB)</span></span><br data-dcnode-id="584"></h2><article class="node-3 node node-page view-mode-full clearfix" data-dcnode-id="510"><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="512"><div class="field-items" data-dcnode-id="514"><div class="field-item even" data-dcnode-id="548"><span data-dcnode-id="582" instrument_node="">
</span><h4 data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">A. Beginnings of Piracy</span></h4><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Piracy&nbsp; of&nbsp; films&nbsp; and&nbsp; music&nbsp; in&nbsp; one&nbsp; form&nbsp; or&nbsp; another&nbsp; has&nbsp; proliferated&nbsp; from&nbsp; the&nbsp; time technology for reproduction became easily accessible to the public.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">In&nbsp; the&nbsp; 1970’s,&nbsp; when&nbsp; the&nbsp; cassette&nbsp; became&nbsp; a&nbsp; popular&nbsp; musical&nbsp; format,&nbsp; it&nbsp; opened&nbsp; up&nbsp; a whole new market for portable music. Soon, as the demand for products skyrocketed, so did the&nbsp; demand&nbsp; for&nbsp; tape&nbsp; recorders,&nbsp; which&nbsp; eventually&nbsp; became&nbsp; cheap&nbsp; and&nbsp; openly&nbsp; available&nbsp; to&nbsp; the market leading to the problem of pirated music cassettes.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">In&nbsp; the&nbsp; mid-80’s,&nbsp; the&nbsp; Betamax&nbsp; became&nbsp; the&nbsp; first&nbsp; audio-visual&nbsp; playback&nbsp; device&nbsp; that allowed&nbsp; the&nbsp; public&nbsp; to&nbsp; record&nbsp; a&nbsp; show,&nbsp; and&nbsp; to&nbsp; make&nbsp; multiple&nbsp; copies&nbsp; of&nbsp; one&nbsp; show&nbsp; on&nbsp; a minimum of two videocassette recorders.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">This&nbsp; soon&nbsp; brought&nbsp; about&nbsp; a&nbsp; trend&nbsp; in&nbsp; the&nbsp; Philippines.&nbsp; During&nbsp; Martial&nbsp; Law&nbsp; however, access&nbsp; to&nbsp; foreign&nbsp; materials&nbsp; was&nbsp; limited&nbsp; on&nbsp; the&nbsp; government-controlled&nbsp; media.&nbsp; There&nbsp; was&nbsp; a delay of several months before a movie could be seen in local theatres.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">The&nbsp; phenomenon&nbsp; of&nbsp; video&nbsp; rental&nbsp; shops&nbsp; was&nbsp; born. Video&nbsp; rental&nbsp; shop&nbsp; owners&nbsp; would record&nbsp; programs&nbsp; from&nbsp; satellite&nbsp; feeds,&nbsp; make&nbsp; copies,&nbsp; and&nbsp; rent&nbsp; them&nbsp; out&nbsp; to&nbsp; the&nbsp; middle&nbsp; and upper&nbsp; classes. The&nbsp; facility&nbsp; of&nbsp; Filipinos&nbsp; in&nbsp; understanding&nbsp; the&nbsp; English&nbsp; language,&nbsp; coupled&nbsp; with colonial&nbsp; mentality,&nbsp; helped&nbsp; make&nbsp; the&nbsp; first&nbsp; video&nbsp; rental&nbsp; shops&nbsp; a&nbsp; haven&nbsp; for&nbsp; the&nbsp; entertainment- hungry public. Betamax players soon became obsolete in other parts of the world, and were replaced&nbsp; by&nbsp; the&nbsp; video&nbsp; home&nbsp; system&nbsp; (VHS)&nbsp; tapes&nbsp; and&nbsp; laser&nbsp; discs.&nbsp; Nonetheless,&nbsp; they&nbsp; did&nbsp; not become&nbsp; obsolete&nbsp; in&nbsp; the&nbsp; Philippines.&nbsp; On&nbsp; the&nbsp; contrary,&nbsp; because&nbsp; of&nbsp; the&nbsp; obsolescence&nbsp; of&nbsp; the Betamax in other parts of the world, the price of Betamax players in the Philippines suddenly dropped and became very affordable. Its popularity therefore dramatically increased.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">The movie industry started to feel the effects of film piracy as more and more families bought&nbsp; cheap&nbsp; beta&nbsp; machines&nbsp; and&nbsp; stayed&nbsp; home&nbsp; to&nbsp; watch&nbsp; movies&nbsp; before&nbsp; they&nbsp; were&nbsp; made available in the market.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">The&nbsp; movie&nbsp; industry&nbsp; started&nbsp; to&nbsp; decline.&nbsp; At&nbsp; the&nbsp; same &nbsp;time,&nbsp; there&nbsp; was&nbsp; much&nbsp; public clamor&nbsp; about&nbsp; the&nbsp; lack&nbsp; of&nbsp; regulation&nbsp; of&nbsp; video&nbsp; shops&nbsp; and&nbsp; products&nbsp; and&nbsp; the&nbsp; disregard&nbsp; for censorship and copyright laws. In addition, Government was not collecting any taxes.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">This brought about the creation of the Videogram Regulatory Board (VRB), which was the government regulatory agency mandated to protect not only the copyrights of the various film &amp; music producers, but also functioned as a classification and ratings entity.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">In as much as the VRB was an effective deterrent on piracy in magnetic media format, the&nbsp; government&nbsp; unfortunately&nbsp; could&nbsp; not&nbsp; keep&nbsp; up&nbsp; with&nbsp; the&nbsp; rapid&nbsp; pace&nbsp; of&nbsp; technology,&nbsp; which quickly&nbsp; introduced&nbsp; optical&nbsp; media&nbsp; to&nbsp; the&nbsp; consuming&nbsp; public.&nbsp;&nbsp; The&nbsp; proliferation&nbsp; of&nbsp; this&nbsp; type&nbsp; of media&nbsp; brought&nbsp; about&nbsp; an&nbsp; easier&nbsp; and&nbsp; faster&nbsp; way&nbsp; of&nbsp; piracy,&nbsp; and&nbsp; soon&nbsp; the&nbsp; Optical&nbsp; Media&nbsp; Board (OMB) was created by Congress through R.A. 9239 to address this menace.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The Republic Act No. 9239 is an act regulating optical media, reorganizing for this purpose the VRB, providing penalties therefore, and for other purposes.&nbsp; This Act is known as the Optical Media Act of 2003.</span></p><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span><h4 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">B. The Optical Media Board</span></h4><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The Optical Media Board (OMB), under the direct supervision of the Office of the President, was&nbsp; created&nbsp; pursuant&nbsp; to&nbsp; Republic&nbsp; Act&nbsp; (R.A.)&nbsp; No.&nbsp; 9239&nbsp; known&nbsp; as&nbsp; the&nbsp; Optical&nbsp; Media&nbsp; Act&nbsp; of 2003. The coverage&nbsp; of&nbsp; authority&nbsp; is&nbsp; the&nbsp; entire&nbsp; territory&nbsp; of&nbsp; the&nbsp; Republic&nbsp; of&nbsp; the&nbsp; Philippines including the economic zones as defined both under R.A. Nos. 9239 and 7916.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">The act is governed by laws established to regulate activities such as mastering, manufacture, replication, importation and exportation of optical and magnetic media.</span></p><span data-dcnode-id="538" instrument_node="">
</span><h5 data-dcnode-id="535"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">VISION</span></strong></h5><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">“An&nbsp; Economy&nbsp; that&nbsp; is&nbsp; FREE&nbsp; from&nbsp; Digital&nbsp; Piracy&nbsp; Where&nbsp; there&nbsp; is&nbsp; a&nbsp; Level&nbsp; Playing Field for All Legitimate Players.”</span></p><span data-dcnode-id="531" instrument_node="">
</span><h5 data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">MISSION</span></h5><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">“To Protect &amp; Promote Intellectual Property Rights in Digital Form.”</span></p><span data-dcnode-id="525" instrument_node="">
</span><h5 data-dcnode-id="522"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">MANDATE</span></strong></h5><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The&nbsp; Optical&nbsp; Media&nbsp; Board&nbsp; (OMB)&nbsp; regulates&nbsp; the&nbsp; mastering,&nbsp; manufacturing, importation&nbsp;&nbsp; and&nbsp;&nbsp; exportation&nbsp;&nbsp; of&nbsp;&nbsp; optical&nbsp;&nbsp; media&nbsp;&nbsp; products&nbsp;&nbsp; and&nbsp;&nbsp; manufacturing materials as part of ensuring the protection and promotion of intellectual property rights.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">In&nbsp; line&nbsp; with&nbsp; its&nbsp; mandate&nbsp; as&nbsp; one&nbsp; of&nbsp; the&nbsp; anti-piracy&nbsp; agencies&nbsp; in&nbsp; the&nbsp; Philippines,&nbsp; the&nbsp; OMB performs&nbsp; regulatory&nbsp; functions&nbsp; through&nbsp; the&nbsp; exercise&nbsp; of&nbsp; its&nbsp; enforcement&nbsp; and&nbsp; quasi-judicial powers that facilitate the apprehension and eventual prosecution of violators of RA 9239.</span></p><span data-dcnode-id="515" instrument_node="">
</span></div><span data-dcnode-id="513" instrument_node="">
</span></div><span data-dcnode-id="511" instrument_node="">
