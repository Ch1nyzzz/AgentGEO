</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="661" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="670"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="4260" style="display:none"><span data-dcnode-id="4261" instrument_node="">Microscope that uses visible light</span></div><span data-dcnode-id="4259" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">
</span></p><span data-dcnode-id="4256" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4245"><div class="thumbinner" data-dcnode-id="4246" style="width:302px;"><a class="image" data-dcnode-id="4254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScientists_are_working_in_the_lab.9.jpg"><img alt="" class="thumbimage" data-dcnode-id="4255" data-file-height="3648" data-file-width="5472" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Scientists_are_working_in_the_lab.9.jpg/300px-Scientists_are_working_in_the_lab.9.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Scientists_are_working_in_the_lab.9.jpg/450px-Scientists_are_working_in_the_lab.9.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Scientists_are_working_in_the_lab.9.jpg/600px-Scientists_are_working_in_the_lab.9.jpg 2x" width="300"></a><span data-dcnode-id="4253" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4247"><div class="magnify" data-dcnode-id="4251"><a class="internal" data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AScientists_are_working_in_the_lab.9.jpg" title="Enlarge"></a></div><span data-dcnode-id="4250" instrument_node="">Scientists use optical microscopes to examine growing </span><a data-dcnode-id="4248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_%28biology%29" title="Cell (biology)"><span data-dcnode-id="4249" instrument_node=""> cells</span></a></div></div></div><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4221"><span data-dcnode-id="4243" instrument_node="">The </span><b data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">optical microscope</span></b><span data-dcnode-id="4240" instrument_node="">, also referred to as a </span><b data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">light microscope</span></b><span data-dcnode-id="4237" instrument_node="">, is a type of </span><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microscope" title="Microscope"><span data-dcnode-id="4236" instrument_node="">microscope</span></a><span data-dcnode-id="4234" instrument_node=""> that commonly uses </span><a data-dcnode-id="4232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visible_spectrum" title="Visible spectrum"><span data-dcnode-id="4233" instrument_node="">visible light</span></a><span data-dcnode-id="4231" instrument_node=""> and a system of </span><a class="mw-redirect" data-dcnode-id="4229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="4230" instrument_node="">lenses</span></a><span data-dcnode-id="4228" instrument_node=""> to generate magnified images of small objects. Optical microscopes are the oldest design of microscope and were possibly invented in their present compound form in the 17th century. Basic optical microscopes can be very simple, although many complex designs aim to improve </span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_resolution" title="Optical resolution"><span data-dcnode-id="4227" instrument_node="">resolution</span></a><span data-dcnode-id="4225" instrument_node=""> and sample </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contrast_%28vision%29" title="Contrast (vision)"><span data-dcnode-id="4224" instrument_node="">contrast</span></a><span data-dcnode-id="4222" instrument_node="">. 
</span></p><p data-dcnode-id="4207"><span data-dcnode-id="4220" instrument_node="">The object is placed on a </span><b data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">stage</span></b><span data-dcnode-id="4217" instrument_node=""> and may be directly viewed through one or two </span><a data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4216" instrument_node="">eyepieces</span></a><span data-dcnode-id="4214" instrument_node=""> on the microscope. In high-power microscopes, both eyepieces typically show the same image, but with a </span><a data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereo_microscope" title="Stereo microscope"><span data-dcnode-id="4213" instrument_node="">stereo microscope</span></a><span data-dcnode-id="4211" instrument_node="">, slightly different images are used to create a 3-D effect. A camera is typically used to capture the image (</span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Micrograph" title="Micrograph"><span data-dcnode-id="4210" instrument_node="">micrograph</span></a><span data-dcnode-id="4208" instrument_node="">).
</span></p><p data-dcnode-id="4193"><span data-dcnode-id="4206" instrument_node="">The sample can be lit in a variety of ways. Transparent objects can be lit from below and solid objects can be lit with light coming through (</span><a data-dcnode-id="4204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bright-field_microscopy" title="Bright-field microscopy"><span data-dcnode-id="4205" instrument_node="">bright field</span></a><span data-dcnode-id="4203" instrument_node="">) or around (</span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark-field_microscopy" title="Dark-field microscopy"><span data-dcnode-id="4202" instrument_node="">dark field</span></a><span data-dcnode-id="4200" instrument_node="">) the objective lens. </span><a class="mw-redirect" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarised_light" title="Polarised light"><span data-dcnode-id="4199" instrument_node="">Polarised light</span></a><span data-dcnode-id="4197" instrument_node=""> may be used to determine crystal orientation of metallic objects. </span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase-contrast_imaging" title="Phase-contrast imaging"><span data-dcnode-id="4196" instrument_node="">Phase-contrast imaging</span></a><span data-dcnode-id="4194" instrument_node=""> can be used to increase image contrast by highlighting small details of differing refractive index.
</span></p><p data-dcnode-id="4188"><span data-dcnode-id="4192" instrument_node="">A range of </span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="4191" instrument_node="">objective</span></a><span data-dcnode-id="4189" instrument_node=""> lenses with different magnification are usually provided mounted on a turret, allowing them to be rotated into place and providing an ability to zoom-in. The maximum magnification power of optical microscopes is typically limited to around 1000x because of the limited resolving power of visible light. While larger magnifications are possible no additional details of the object are resolved. 
</span></p><p data-dcnode-id="4177"><span data-dcnode-id="4187" instrument_node="">Alternatives to optical microscopy which do not use visible light include </span><a class="mw-redirect" data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_electron_microscopy" title="Scanning electron microscopy"><span data-dcnode-id="4186" instrument_node="">scanning electron microscopy</span></a><span data-dcnode-id="4184" instrument_node=""> and </span><a data-dcnode-id="4182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transmission_electron_microscopy" title="Transmission electron microscopy"><span data-dcnode-id="4183" instrument_node="">transmission electron microscopy</span></a><span data-dcnode-id="4181" instrument_node=""> and </span><a data-dcnode-id="4179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_probe_microscopy" title="Scanning probe microscopy"><span data-dcnode-id="4180" instrument_node="">scanning probe microscopy</span></a><span data-dcnode-id="4178" instrument_node=""> and as a result, can achieve much greater magnifications.
</span></p><span data-dcnode-id="4176" instrument_node="">

</span><p data-dcnode-id="3808"><span data-dcnode-id="3818" instrument_node="">There are two basic types of optical microscopes: simple microscopes and compound microscopes. A simple microscope uses the </span><a data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_power" title="Optical power"><span data-dcnode-id="3817" instrument_node="">optical power</span></a><span data-dcnode-id="3815" instrument_node=""> of single lens or group of lenses for magnification. A compound microscope uses a system of lenses (one set enlarging the image produced by another) to achieve much higher magnification of an object. The vast majority of modern </span><a data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Research" title="Research"><span data-dcnode-id="3814" instrument_node="">research</span></a><span data-dcnode-id="3812" instrument_node=""> microscopes are compound microscopes while some cheaper commercial </span><a data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_microscope" title="Digital microscope"><span data-dcnode-id="3811" instrument_node="">digital microscopes</span></a><span data-dcnode-id="3809" instrument_node=""> are simple single lens microscopes. Compound microscopes can be further divided into a variety of other types of microscopes which differ in their optical configurations, cost, and intended purposes.
</span></p><span data-dcnode-id="3807" instrument_node="">
</span><h3 data-dcnode-id="3797"><span class="mw-headline" data-dcnode-id="3805" id="Simple_microscope"><span data-dcnode-id="3806" instrument_node="">Simple microscope</span></span><span class="mw-editsection" data-dcnode-id="3798"><span class="mw-editsection-bracket" data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">[</span></span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D2" title="Edit section: Simple microscope"><span data-dcnode-id="3802" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3795" instrument_node="">A simple microscope uses a lens or set of lenses to enlarge an object through angular magnification alone, giving the viewer an erect enlarged </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_image" title="Virtual image"><span data-dcnode-id="3794" instrument_node="">virtual image</span></a><span data-dcnode-id="3792" instrument_node="">.</span><sup class="reference" data-dcnode-id="3789" id="cite_ref-1"><a data-dcnode-id="3790" href="#cite_note-1"><span data-dcnode-id="3791" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3786" id="cite_ref-2"><a data-dcnode-id="3787" href="#cite_note-2"><span data-dcnode-id="3788" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3785" instrument_node=""> The use of a single convex lens or groups of lenses are found in simple magnification devices such as the </span><a data-dcnode-id="3783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnifying_glass" title="Magnifying glass"><span data-dcnode-id="3784" instrument_node="">magnifying glass</span></a><span data-dcnode-id="3782" instrument_node="">, </span><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Loupe" title="Loupe"><span data-dcnode-id="3781" instrument_node="">loupes</span></a><span data-dcnode-id="3779" instrument_node="">, and </span><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3778" instrument_node="">eyepieces</span></a><span data-dcnode-id="3776" instrument_node=""> for telescopes and microscopes.
</span></p><span data-dcnode-id="3774" instrument_node="">
</span><h3 data-dcnode-id="3764"><span class="mw-headline" data-dcnode-id="3772" id="Compound_microscope"><span data-dcnode-id="3773" instrument_node="">Compound microscope</span></span><span class="mw-editsection" data-dcnode-id="3765"><span class="mw-editsection-bracket" data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">[</span></span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D3" title="Edit section: Compound microscope"><span data-dcnode-id="3769" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3763" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3754"><div class="thumbinner" data-dcnode-id="3755" style="width:152px;"><a class="image" data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMicroscope_compound_diagram.png"><img alt="" class="thumbimage" data-dcnode-id="3762" data-file-height="1241" data-file-width="564" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Microscope_compound_diagram.png/150px-Microscope_compound_diagram.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Microscope_compound_diagram.png/225px-Microscope_compound_diagram.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Microscope_compound_diagram.png/300px-Microscope_compound_diagram.png 2x" width="150"></a><span data-dcnode-id="3760" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3756"><div class="magnify" data-dcnode-id="3758"><a class="internal" data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMicroscope_compound_diagram.png" title="Enlarge"></a></div><span data-dcnode-id="3757" instrument_node="">Diagram of a compound microscope</span></div></div></div><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3731"><span data-dcnode-id="3752" instrument_node="">A compound microscope uses a lens close to the object being viewed to collect light (called the </span><a data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3751" instrument_node="">objective</span></a><span data-dcnode-id="3749" instrument_node=""> lens) which focuses a </span><a data-dcnode-id="3747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_image" title="Real image"><span data-dcnode-id="3748" instrument_node="">real image</span></a><span data-dcnode-id="3746" instrument_node=""> of the object inside the microscope (image 1). That image is then magnified by a second lens or group of lenses (called the </span><a data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3745" instrument_node="">eyepiece</span></a><span data-dcnode-id="3743" instrument_node="">) that gives the viewer an enlarged inverted virtual image of the object (image 2).</span><sup class="reference" data-dcnode-id="3740" id="cite_ref-Watt_3-0"><a data-dcnode-id="3741" href="#cite_note-Watt-3"><span data-dcnode-id="3742" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3739" instrument_node=""> The use of a compound objective/eyepiece combination allows for much higher magnification. Common compound microscopes often feature exchangeable objective lenses, allowing the user to quickly adjust the magnification.</span><sup class="reference" data-dcnode-id="3736" id="cite_ref-Watt_3-1"><a data-dcnode-id="3737" href="#cite_note-Watt-3"><span data-dcnode-id="3738" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3735" instrument_node=""> A compound microscope also enables more advanced illumination setups, such as </span><a class="mw-redirect" data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase_contrast" title="Phase contrast"><span data-dcnode-id="3734" instrument_node="">phase contrast</span></a><span data-dcnode-id="3732" instrument_node="">.
</span></p><span data-dcnode-id="3730" instrument_node="">
</span><h3 data-dcnode-id="3720"><span class="mw-headline" data-dcnode-id="3728" id="Other_microscope_variants"><span data-dcnode-id="3729" instrument_node="">Other microscope variants</span></span><span class="mw-editsection" data-dcnode-id="3721"><span class="mw-editsection-bracket" data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">[</span></span><a data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D4" title="Edit section: Other microscope variants"><span data-dcnode-id="3725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3719" instrument_node="">
</span><p data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">There are many variants of the compound optical microscope design for specialized purposes. Some of these are physical design differences allowing specialization for certain purposes:
</span></p><span data-dcnode-id="3716" instrument_node="">
</span><ul data-dcnode-id="3690"><li data-dcnode-id="3712"><a data-dcnode-id="3714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereo_microscope" title="Stereo microscope"><span data-dcnode-id="3715" instrument_node="">Stereo microscope</span></a><span data-dcnode-id="3713" instrument_node="">, a low-powered microscope which provides a stereoscopic view of the sample, commonly used for dissection.</span></li><span data-dcnode-id="3711" instrument_node="">
</span><li data-dcnode-id="3707"><a data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comparison_microscope" title="Comparison microscope"><span data-dcnode-id="3710" instrument_node="">Comparison microscope</span></a><span data-dcnode-id="3708" instrument_node="">, which has two separate light paths allowing direct comparison of two samples via one image in each eye.</span></li><span data-dcnode-id="3706" instrument_node="">
</span><li data-dcnode-id="3702"><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inverted_microscope" title="Inverted microscope"><span data-dcnode-id="3705" instrument_node="">Inverted microscope</span></a><span data-dcnode-id="3703" instrument_node="">, for studying samples from below; useful for cell cultures in liquid, or for metallography.</span></li><span data-dcnode-id="3701" instrument_node="">
</span><li data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Fiber optic connector inspection microscope, designed for connector end-face inspection</span></li><span data-dcnode-id="3698" instrument_node="">
</span><li data-dcnode-id="3691"><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traveling_microscope" title="Traveling microscope"><span data-dcnode-id="3697" instrument_node="">Traveling microscope</span></a><span data-dcnode-id="3695" instrument_node="">, for studying samples of high </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_resolution" title="Optical resolution"><span data-dcnode-id="3694" instrument_node="">optical resolution</span></a><span data-dcnode-id="3692" instrument_node="">.</span></li></ul><span data-dcnode-id="3689" instrument_node="">
</span><p data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Other microscope variants are designed for different illumination techniques:
</span></p><span data-dcnode-id="3686" instrument_node="">
</span><ul data-dcnode-id="3622"><li data-dcnode-id="3682"><a data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petrographic_microscope" title="Petrographic microscope"><span data-dcnode-id="3685" instrument_node="">Petrographic microscope</span></a><span data-dcnode-id="3683" instrument_node="">, whose design usually includes a polarizing filter, rotating stage and gypsum plate to facilitate the study of minerals or other crystalline materials whose optical properties can vary with orientation.</span></li><span data-dcnode-id="3681" instrument_node="">
</span><li data-dcnode-id="3677"><a class="mw-redirect" data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarizing_microscope" title="Polarizing microscope"><span data-dcnode-id="3680" instrument_node="">Polarizing microscope</span></a><span data-dcnode-id="3678" instrument_node="">, similar to the petrographic microscope.</span></li><span data-dcnode-id="3676" instrument_node="">
</span><li data-dcnode-id="3672"><a class="mw-redirect" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase-contrast_microscope" title="Phase-contrast microscope"><span data-dcnode-id="3675" instrument_node="">Phase-contrast microscope</span></a><span data-dcnode-id="3673" instrument_node="">, which applies the phase contrast illumination method.</span></li><span data-dcnode-id="3671" instrument_node="">
</span><li data-dcnode-id="3667"><a class="mw-redirect" data-dcnode-id="3669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epifluorescence_microscope" title="Epifluorescence microscope"><span data-dcnode-id="3670" instrument_node="">Epifluorescence microscope</span></a><span data-dcnode-id="3668" instrument_node="">, designed for analysis of samples which include fluorophores.</span></li><span data-dcnode-id="3666" instrument_node="">
</span><li data-dcnode-id="3662"><a class="mw-redirect" data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confocal_microscope" title="Confocal microscope"><span data-dcnode-id="3665" instrument_node="">Confocal microscope</span></a><span data-dcnode-id="3663" instrument_node="">, a widely used variant of epifluorescent illumination which uses a scanning laser to illuminate a sample for fluorescence.</span></li><span data-dcnode-id="3661" instrument_node="">
</span><li data-dcnode-id="3657"><a data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-photon_excitation_microscopy" title="Two-photon excitation microscopy"><span data-dcnode-id="3660" instrument_node="">Two-photon microscope</span></a><span data-dcnode-id="3658" instrument_node="">, used to image fluorescence deeper in scattering media and reduce photobleaching, especially in living samples.</span></li><span data-dcnode-id="3656" instrument_node="">
</span><li data-dcnode-id="3651"><span data-dcnode-id="3655" instrument_node="">Student microscope – an often low-power microscope with simplified controls and sometimes low quality optics designed for school use or as a starter instrument for children.</span><sup class="reference" data-dcnode-id="3652" id="cite_ref-4"><a data-dcnode-id="3653" href="#cite_note-4"><span data-dcnode-id="3654" instrument_node="">[4]</span></a></sup></li><span data-dcnode-id="3650" instrument_node="">
</span><li data-dcnode-id="3641"><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultramicroscope" title="Ultramicroscope"><span data-dcnode-id="3649" instrument_node="">Ultramicroscope</span></a><span data-dcnode-id="3647" instrument_node="">, an adapted light microscope that uses </span><a class="mw-redirect" data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_scattering" title="Light scattering"><span data-dcnode-id="3646" instrument_node="">light scattering</span></a><span data-dcnode-id="3644" instrument_node=""> to allow viewing of tiny particles whose diameter is below or near the wavelength of visible light (around 500 nanometers); mostly obsolete since the advent of </span><a data-dcnode-id="3642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electron_microscope" title="Electron microscope"><span data-dcnode-id="3643" instrument_node="">electron microscopes</span></a></li><span data-dcnode-id="3640" instrument_node="">
</span><li data-dcnode-id="3623"><a data-dcnode-id="3638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tip-enhanced_Raman_spectroscopy" title="Tip-enhanced Raman spectroscopy"><span data-dcnode-id="3639" instrument_node="">Tip-enhanced Raman microscope</span></a><span data-dcnode-id="3637" instrument_node="">, is a variant of optical microscope based on </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tip-enhanced_Raman_spectroscopy" title="Tip-enhanced Raman spectroscopy"><span data-dcnode-id="3636" instrument_node="">tip-enhanced Raman spectroscopy</span></a><span data-dcnode-id="3634" instrument_node="">, without traditional wavelength-based resolution limits.</span><sup class="reference" data-dcnode-id="3631" id="cite_ref-5"><a data-dcnode-id="3632" href="#cite_note-5"><span data-dcnode-id="3633" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="3628" id="cite_ref-6"><a data-dcnode-id="3629" href="#cite_note-6"><span data-dcnode-id="3630" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3627" instrument_node=""> This microscope primarily realized on the </span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_probe_microscopy" title="Scanning probe microscopy"><span data-dcnode-id="3626" instrument_node="">scanning-probe microscope</span></a><span data-dcnode-id="3624" instrument_node=""> platforms using all optical tools.</span></li></ul><span data-dcnode-id="3621" instrument_node="">
</span><h3 data-dcnode-id="3611"><span class="mw-headline" data-dcnode-id="3619" id="Digital_microscope"><span data-dcnode-id="3620" instrument_node="">Digital microscope</span></span><span class="mw-editsection" data-dcnode-id="3612"><span class="mw-editsection-bracket" data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">[</span></span><a data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D5" title="Edit section: Digital microscope"><span data-dcnode-id="3616" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3610" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3598"><div class="thumbinner" data-dcnode-id="3599" style="width:202px;"><a class="image" data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg"><img alt="" class="thumbimage" data-dcnode-id="3609" data-file-height="1536" data-file-width="2048" decoding="async" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg/200px-2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg/300px-2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7a/2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg/400px-2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg 2x" width="200"></a><span data-dcnode-id="3607" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3600"><div class="magnify" data-dcnode-id="3605"><a class="internal" data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2008Computex_DnI_Award_AnMo_Dino-Lite_Digital_Microscope.jpg" title="Enlarge"></a></div><span data-dcnode-id="3604" instrument_node="">A miniature </span><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USB_microscope" title="USB microscope"><span data-dcnode-id="3603" instrument_node="">USB microscope</span></a><span data-dcnode-id="3601" instrument_node="">.</span></div></div></div><span data-dcnode-id="3597" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3591" role="note"><span data-dcnode-id="3594" instrument_node="">Main article: </span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_microscope" title="Digital microscope"><span data-dcnode-id="3593" instrument_node="">Digital microscope</span></a></div><span data-dcnode-id="3590" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3589" instrument_node="">A </span><a data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_microscope" title="Digital microscope"><span data-dcnode-id="3588" instrument_node="">digital microscope</span></a><span data-dcnode-id="3586" instrument_node=""> is a microscope equipped with a </span><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_camera" title="Digital camera"><span data-dcnode-id="3585" instrument_node="">digital camera</span></a><span data-dcnode-id="3583" instrument_node=""> allowing observation of a sample via a </span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer" title="Computer"><span data-dcnode-id="3582" instrument_node="">computer</span></a><span data-dcnode-id="3580" instrument_node="">. Microscopes can also be partly or wholly computer-controlled with various levels of automation. Digital microscopy allows greater analysis of a microscope image, for example, measurements of distances and areas and quantitation of a fluorescent or </span><a data-dcnode-id="3578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Histology" title="Histology"><span data-dcnode-id="3579" instrument_node="">histological</span></a><span data-dcnode-id="3577" instrument_node=""> stain.
</span></p><p data-dcnode-id="3556"><span data-dcnode-id="3575" instrument_node="">Low-powered digital microscopes, </span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USB_microscope" title="USB microscope"><span data-dcnode-id="3574" instrument_node="">USB microscopes</span></a><span data-dcnode-id="3572" instrument_node="">, are also commercially available. These are essentially </span><a data-dcnode-id="3570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Webcam" title="Webcam"><span data-dcnode-id="3571" instrument_node="">webcams</span></a><span data-dcnode-id="3569" instrument_node=""> with a high-powered </span><a class="mw-redirect" data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macro_lens" title="Macro lens"><span data-dcnode-id="3568" instrument_node="">macro lens</span></a><span data-dcnode-id="3566" instrument_node=""> and generally do not use </span><a data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transillumination" title="Transillumination"><span data-dcnode-id="3565" instrument_node="">transillumination</span></a><span data-dcnode-id="3563" instrument_node="">. The camera attached directly to the </span><a data-dcnode-id="3561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USB" title="USB"><span data-dcnode-id="3562" instrument_node="">USB</span></a><span data-dcnode-id="3560" instrument_node=""> port of a computer so that the images are shown directly on the monitor. They offer modest magnifications (up to about 200×) without the need to use eyepieces, and at very low cost. High power illumination is usually provided by an </span><a class="mw-redirect" data-dcnode-id="3558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LED" title="LED"><span data-dcnode-id="3559" instrument_node="">LED</span></a><span data-dcnode-id="3557" instrument_node=""> source or sources adjacent to the camera lens.
</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3555" instrument_node="">Digital microscopy with very low light levels to avoid damage to vulnerable biological samples is available using sensitive </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photon_counting" title="Photon counting"><span data-dcnode-id="3554" instrument_node="">photon-counting</span></a><span data-dcnode-id="3552" instrument_node=""> digital cameras. It has been demonstrated that a light source providing pairs of </span><a class="mw-redirect" data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photon_entanglement" title="Photon entanglement"><span data-dcnode-id="3551" instrument_node="">entangled photons</span></a><span data-dcnode-id="3549" instrument_node=""> may minimize the risk of damage to the most light-sensitive samples. In this application of </span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ghost_imaging" title="Ghost imaging"><span data-dcnode-id="3548" instrument_node="">ghost imaging</span></a><span data-dcnode-id="3546" instrument_node=""> to photon-sparse microscopy, the sample is illuminated with infrared photons, each of which is spatially correlated with an entangled partner in the visible band for efficient imaging by a photon-counting camera.</span><sup class="reference" data-dcnode-id="3543" id="cite_ref-AspdenGemmell2015_7-0"><a data-dcnode-id="3544" href="#cite_note-AspdenGemmell2015-7"><span data-dcnode-id="3545" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3542" instrument_node="">
</span></p><span data-dcnode-id="3540" instrument_node="">
</span><h2 data-dcnode-id="3530"><span class="mw-headline" data-dcnode-id="3538" id="History"><span data-dcnode-id="3539" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="3531"><span class="mw-editsection-bracket" data-dcnode-id="3536"><span data-dcnode-id="3537" instrument_node="">[</span></span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D6" title="Edit section: History"><span data-dcnode-id="3535" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3529" instrument_node="">
</span><link data-dcnode-id="3528" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3521" role="note"><span data-dcnode-id="3527" instrument_node="">See also: </span><a data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_optics" title="History of optics"><span data-dcnode-id="3526" instrument_node="">History of optics</span></a><span data-dcnode-id="3524" instrument_node=""> and </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_microscope_technology" title="Timeline of microscope technology"><span data-dcnode-id="3523" instrument_node="">Timeline of microscope technology</span></a></div><span data-dcnode-id="3520" instrument_node="">
</span><h3 data-dcnode-id="3510"><span class="mw-headline" data-dcnode-id="3518" id="Invention"><span data-dcnode-id="3519" instrument_node="">Invention</span></span><span class="mw-editsection" data-dcnode-id="3511"><span class="mw-editsection-bracket" data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">[</span></span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D7" title="Edit section: Invention"><span data-dcnode-id="3515" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3509" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3508" instrument_node="">The earliest microscopes were single </span><a class="mw-redirect" data-dcnode-id="3506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="3507" instrument_node="">lens</span></a><span data-dcnode-id="3505" instrument_node=""> </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnifying_glass" title="Magnifying glass"><span data-dcnode-id="3504" instrument_node="">magnifying glasses</span></a><span data-dcnode-id="3502" instrument_node=""> with limited magnification which date at least as far back as the widespread use of lenses in </span><a class="mw-redirect" data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyeglasses" title="Eyeglasses"><span data-dcnode-id="3501" instrument_node="">eyeglasses</span></a><span data-dcnode-id="3499" instrument_node=""> in the 13th century.</span><sup class="reference" data-dcnode-id="3496" id="cite_ref-8"><a data-dcnode-id="3497" href="#cite_note-8"><span data-dcnode-id="3498" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3495" instrument_node="">
</span></p><p data-dcnode-id="3475"><span data-dcnode-id="3493" instrument_node="">Compound microscopes first appeared in Europe around 1620</span><sup class="reference" data-dcnode-id="3490" id="cite_ref-9"><a data-dcnode-id="3491" href="#cite_note-9"><span data-dcnode-id="3492" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3487" id="cite_ref-10"><a data-dcnode-id="3488" href="#cite_note-10"><span data-dcnode-id="3489" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3486" instrument_node=""> including one demonstrated by </span><a data-dcnode-id="3484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cornelis_Drebbel" title="Cornelis Drebbel"><span data-dcnode-id="3485" instrument_node="">Cornelis Drebbel</span></a><span data-dcnode-id="3483" instrument_node=""> in London (around 1621) and one exhibited in Rome in 1624.</span><sup class="reference" data-dcnode-id="3480" id="cite_ref-Raymond_J._Seeger_2016,_page_24_11-0"><a data-dcnode-id="3481" href="#cite_note-Raymond_J._Seeger_2016,_page_24-11"><span data-dcnode-id="3482" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="3477" id="cite_ref-J._William_Rosenthal_1996,_page_391_12-0"><a data-dcnode-id="3478" href="#cite_note-J._William_Rosenthal_1996,_page_391-12"><span data-dcnode-id="3479" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3476" instrument_node="">
</span></p><p data-dcnode-id="3435"><span data-dcnode-id="3474" instrument_node="">The actual inventor of the compound microscope is unknown although many claims have been made over the years. These include a claim 35</span><sup class="reference" data-dcnode-id="3471" id="cite_ref-13"><a data-dcnode-id="3472" href="#cite_note-13"><span data-dcnode-id="3473" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3470" instrument_node=""> years after they appeared by </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dutch_people" title="Dutch people"><span data-dcnode-id="3469" instrument_node="">Dutch</span></a><span data-dcnode-id="3467" instrument_node=""> spectacle-maker Johannes Zachariassen that his father, </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zacharias_Janssen" title="Zacharias Janssen"><span data-dcnode-id="3466" instrument_node="">Zacharias Janssen</span></a><span data-dcnode-id="3464" instrument_node="">, invented the compound microscope and/or the telescope as early as 1590. Johannes' (some claim dubious)</span><sup class="reference" data-dcnode-id="3461" id="cite_ref-14"><a data-dcnode-id="3462" href="#cite_note-14"><span data-dcnode-id="3463" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3458" id="cite_ref-15"><a data-dcnode-id="3459" href="#cite_note-15"><span data-dcnode-id="3460" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="3455" id="cite_ref-16"><a data-dcnode-id="3456" href="#cite_note-16"><span data-dcnode-id="3457" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3454" instrument_node=""> testimony pushes the invention date so far back that Zacharias would have been a child at the time, leading to speculation that, for Johannes' claim to be true, the compound microscope would have to have been invented by Johannes' grandfather, Hans Martens.</span><sup class="reference" data-dcnode-id="3451" id="cite_ref-17"><a data-dcnode-id="3452" href="#cite_note-17"><span data-dcnode-id="3453" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3450" instrument_node=""> Another claim is that Janssen's competitor, </span><a class="mw-redirect" data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="3449" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="3447" instrument_node=""> (who applied for the first telescope patent in 1608) also invented the compound microscope.</span><sup class="reference" data-dcnode-id="3444" id="cite_ref-18"><a data-dcnode-id="3445" href="#cite_note-18"><span data-dcnode-id="3446" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3443" instrument_node=""> Other historians point to the Dutch innovator Cornelis Drebbel with his 1621 compound microscope.</span><sup class="reference" data-dcnode-id="3440" id="cite_ref-Raymond_J._Seeger_2016,_page_24_11-1"><a data-dcnode-id="3441" href="#cite_note-Raymond_J._Seeger_2016,_page_24-11"><span data-dcnode-id="3442" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="3437" id="cite_ref-J._William_Rosenthal_1996,_page_391_12-1"><a data-dcnode-id="3438" href="#cite_note-J._William_Rosenthal_1996,_page_391-12"><span data-dcnode-id="3439" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3436" instrument_node="">
</span></p><p data-dcnode-id="3377"><a data-dcnode-id="3433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="3434" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="3432" instrument_node=""> is also sometimes cited as a compound microscope inventor. After 1610, he found that he could close focus his telescope to view small objects, such as flies, close up</span><sup class="reference" data-dcnode-id="3429" id="cite_ref-19"><a data-dcnode-id="3430" href="#cite_note-19"><span data-dcnode-id="3431" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3428" instrument_node=""> and/or could look through the wrong end in reverse to magnify small objects.</span><sup class="reference" data-dcnode-id="3425" id="cite_ref-20"><a data-dcnode-id="3426" href="#cite_note-20"><span data-dcnode-id="3427" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3424" instrument_node=""> The only drawback was that his 2 foot long telescope had to be extended out to 6 feet to view objects that close.</span><sup class="reference" data-dcnode-id="3421" id="cite_ref-21"><a data-dcnode-id="3422" href="#cite_note-21"><span data-dcnode-id="3423" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3420" instrument_node=""> After seeing the compound microscope built by  Drebbel exhibited in Rome in 1624, Galileo built his own improved version.</span><sup class="reference" data-dcnode-id="3417" id="cite_ref-Raymond_J._Seeger_2016,_page_24_11-2"><a data-dcnode-id="3418" href="#cite_note-Raymond_J._Seeger_2016,_page_24-11"><span data-dcnode-id="3419" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="3414" id="cite_ref-J._William_Rosenthal_1996,_page_391_12-2"><a data-dcnode-id="3415" href="#cite_note-J._William_Rosenthal_1996,_page_391-12"><span data-dcnode-id="3416" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3413" instrument_node=""> In 1625, </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Faber" title="Giovanni Faber"><span data-dcnode-id="3412" instrument_node="">Giovanni Faber</span></a><span data-dcnode-id="3410" instrument_node=""> coined the name </span><i data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">microscope</span></i><span data-dcnode-id="3407" instrument_node=""> for the compound microscope Galileo submitted to the </span><a data-dcnode-id="3405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accademia_dei_Lincei" title="Accademia dei Lincei"><span data-dcnode-id="3406" instrument_node="">Accademia dei Lincei</span></a><span data-dcnode-id="3404" instrument_node=""> in 1624 </span><sup class="reference" data-dcnode-id="3401" id="cite_ref-22"><a data-dcnode-id="3402" href="#cite_note-22"><span data-dcnode-id="3403" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3400" instrument_node=""> (Galileo had called it the "</span><i data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">occhiolino</span></i><span data-dcnode-id="3397" instrument_node="">" or "</span><i data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">little eye</span></i><span data-dcnode-id="3394" instrument_node="">"). Faber coined the name from the </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_language" title="Greek language"><span data-dcnode-id="3393" instrument_node="">Greek</span></a><span data-dcnode-id="3391" instrument_node=""> words </span><i data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">μικρόν</span></i><span data-dcnode-id="3388" instrument_node=""> (micron) meaning "small", and </span><i data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">σκοπεῖν</span></i><span data-dcnode-id="3385" instrument_node=""> (skopein) meaning "to look at", a name meant to be analogous with "</span><a data-dcnode-id="3383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="3384" instrument_node="">telescope</span></a><span data-dcnode-id="3382" instrument_node="">", another word coined by the Linceans.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-23"><a data-dcnode-id="3380" href="#cite_note-23"><span data-dcnode-id="3381" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3378" instrument_node="">
</span></p><p data-dcnode-id="3370"><a data-dcnode-id="3375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="3376" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="3374" instrument_node="">, another Dutchman, developed a simple 2-lens ocular system in the late 17th century that was </span><a data-dcnode-id="3372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="3373" instrument_node="">achromatically</span></a><span data-dcnode-id="3371" instrument_node=""> corrected, and therefore a huge step forward in microscope development. The Huygens ocular is still being produced to this day, but suffers from a small field size, and other minor disadvantages.
</span></p><span data-dcnode-id="3369" instrument_node="">
</span><h3 data-dcnode-id="3359"><span class="mw-headline" data-dcnode-id="3367" id="Popularization"><span data-dcnode-id="3368" instrument_node="">Popularization</span></span><span class="mw-editsection" data-dcnode-id="3360"><span class="mw-editsection-bracket" data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">[</span></span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D8" title="Edit section: Popularization"><span data-dcnode-id="3364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3358" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3343"><div class="thumbinner" data-dcnode-id="3344" style="width:222px;"><a class="image" data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStelluti_bees1630.jpg"><img alt="" class="thumbimage" data-dcnode-id="3357" data-file-height="1330" data-file-width="827" decoding="async" height="354" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Stelluti_bees1630.jpg/220px-Stelluti_bees1630.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Stelluti_bees1630.jpg/330px-Stelluti_bees1630.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Stelluti_bees1630.jpg/440px-Stelluti_bees1630.jpg 2x" width="220"></a><span data-dcnode-id="3355" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3345"><div class="magnify" data-dcnode-id="3353"><a class="internal" data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStelluti_bees1630.jpg" title="Enlarge"></a></div><span data-dcnode-id="3352" instrument_node="">The oldest published image known to have been made with a microscope: bees by </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francesco_Stelluti" title="Francesco Stelluti"><span data-dcnode-id="3351" instrument_node="">Francesco Stelluti</span></a><span data-dcnode-id="3349" instrument_node="">, 1630</span><sup class="reference" data-dcnode-id="3346" id="cite_ref-24"><a data-dcnode-id="3347" href="#cite_note-24"><span data-dcnode-id="3348" instrument_node="">[24]</span></a></sup></div></div></div><span data-dcnode-id="3342" instrument_node="">
</span><p data-dcnode-id="3322"><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antonie_van_Leeuwenhoek" title="Antonie van Leeuwenhoek"><span data-dcnode-id="3341" instrument_node="">Antonie van Leeuwenhoek</span></a><span data-dcnode-id="3339" instrument_node=""> (1632–1724) is credited with bringing the microscope to the attention of biologists, even though simple magnifying lenses were already being produced in the 16th century. Van Leeuwenhoek's home-made microscopes were simple microscopes, with a single very small, yet strong lens. They were awkward in use, but enabled van Leeuwenhoek to see detailed images. It took about 150 years of optical development before the compound microscope was able to provide the same quality image as van Leeuwenhoek's simple microscopes, due to difficulties in configuring multiple lenses. In the 1850s, </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Leonard_Riddell" title="John Leonard Riddell"><span data-dcnode-id="3338" instrument_node="">John Leonard Riddell</span></a><span data-dcnode-id="3336" instrument_node="">, Professor of Chemistry at </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tulane_University" title="Tulane University"><span data-dcnode-id="3335" instrument_node="">Tulane University</span></a><span data-dcnode-id="3333" instrument_node="">, invented the first practical binocular microscope while carrying out one of the earliest and most extensive American microscopic investigations of </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cholera" title="Cholera"><span data-dcnode-id="3332" instrument_node="">cholera</span></a><span data-dcnode-id="3330" instrument_node="">.</span><sup class="reference" data-dcnode-id="3327" id="cite_ref-Riddell_25-0"><a data-dcnode-id="3328" href="#cite_note-Riddell-25"><span data-dcnode-id="3329" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="3324" id="cite_ref-Cassedy_26-0"><a data-dcnode-id="3325" href="#cite_note-Cassedy-26"><span data-dcnode-id="3326" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3323" instrument_node="">
</span></p><span data-dcnode-id="3321" instrument_node="">
</span><h3 data-dcnode-id="3311"><span class="mw-headline" data-dcnode-id="3319" id="Lighting_techniques"><span data-dcnode-id="3320" instrument_node="">Lighting techniques</span></span><span class="mw-editsection" data-dcnode-id="3312"><span class="mw-editsection-bracket" data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">[</span></span><a data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D9" title="Edit section: Lighting techniques"><span data-dcnode-id="3316" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3310" instrument_node="">
</span><p data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">While basic microscope technology and optics have been available for over 400 years it is much more recently that techniques in sample illumination were developed to generate the high quality images seen today.
</span></p><p data-dcnode-id="3297"><span data-dcnode-id="3307" instrument_node="">In August 1893, </span><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/August_K%25C3%25B6hler" title="August Köhler"><span data-dcnode-id="3306" instrument_node="">August Köhler</span></a><span data-dcnode-id="3304" instrument_node=""> developed </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K%25C3%25B6hler_illumination" title="Köhler illumination"><span data-dcnode-id="3303" instrument_node="">Köhler illumination</span></a><span data-dcnode-id="3301" instrument_node="">. This method of sample illumination gives rise to extremely even lighting and overcomes many limitations of older techniques of sample illumination. Before development of Köhler illumination the image of the light source, for example a </span><a class="mw-redirect" data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lightbulb" title="Lightbulb"><span data-dcnode-id="3300" instrument_node="">lightbulb</span></a><span data-dcnode-id="3298" instrument_node=""> filament, was always visible in the image of the sample.
</span></p><p data-dcnode-id="3268"><span data-dcnode-id="3296" instrument_node="">The </span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nobel_Prize" title="Nobel Prize"><span data-dcnode-id="3295" instrument_node="">Nobel Prize</span></a><span data-dcnode-id="3293" instrument_node=""> in physics was awarded to Dutch physicist </span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frits_Zernike" title="Frits Zernike"><span data-dcnode-id="3292" instrument_node="">Frits Zernike</span></a><span data-dcnode-id="3290" instrument_node=""> in 1953 for his development of </span><a class="mw-redirect" data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase_contrast" title="Phase contrast"><span data-dcnode-id="3289" instrument_node="">phase contrast</span></a><span data-dcnode-id="3287" instrument_node=""> illumination which allows imaging of transparent samples. By using </span><a class="mw-redirect" data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interference_%28wave_propagation%29" title="Interference (wave propagation)"><span data-dcnode-id="3286" instrument_node="">interference</span></a><span data-dcnode-id="3284" instrument_node=""> rather than </span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absorption_%28electromagnetic_radiation%29" title="Absorption (electromagnetic radiation)"><span data-dcnode-id="3283" instrument_node="">absorption</span></a><span data-dcnode-id="3281" instrument_node=""> of light, extremely transparent samples, such as live </span><a class="mw-redirect" data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mammalian" title="Mammalian"><span data-dcnode-id="3280" instrument_node="">mammalian</span></a><span data-dcnode-id="3278" instrument_node=""> cells, can be imaged without having to use staining techniques. Just two years later, in 1955, </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georges_Nomarski" title="Georges Nomarski"><span data-dcnode-id="3277" instrument_node="">Georges Nomarski</span></a><span data-dcnode-id="3275" instrument_node=""> published the theory for </span><a class="mw-redirect" data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Differential_interference_contrast" title="Differential interference contrast"><span data-dcnode-id="3274" instrument_node="">differential interference contrast</span></a><span data-dcnode-id="3272" instrument_node=""> microscopy, another </span><a class="mw-redirect" data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interference_%28wave_propagation%29" title="Interference (wave propagation)"><span data-dcnode-id="3271" instrument_node="">interference</span></a><span data-dcnode-id="3269" instrument_node="">-based imaging technique.
</span></p><span data-dcnode-id="3267" instrument_node="">
</span><h3 data-dcnode-id="3257"><span class="mw-headline" data-dcnode-id="3265" id="Fluorescence_microscopy"><span data-dcnode-id="3266" instrument_node="">Fluorescence microscopy</span></span><span class="mw-editsection" data-dcnode-id="3258"><span class="mw-editsection-bracket" data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">[</span></span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D10" title="Edit section: Fluorescence microscopy"><span data-dcnode-id="3262" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3255" instrument_node="">Modern biological microscopy depends heavily on the development of </span><a class="mw-redirect" data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fluorescent" title="Fluorescent"><span data-dcnode-id="3254" instrument_node="">fluorescent</span></a><span data-dcnode-id="3252" instrument_node=""> </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hybridization_probe" title="Hybridization probe"><span data-dcnode-id="3251" instrument_node="">probes</span></a><span data-dcnode-id="3249" instrument_node=""> for specific structures within a cell. In contrast to normal transilluminated light microscopy, in </span><a class="mw-redirect" data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fluorescence_microscopy" title="Fluorescence microscopy"><span data-dcnode-id="3248" instrument_node="">fluorescence microscopy</span></a><span data-dcnode-id="3246" instrument_node=""> the sample is illuminated through the objective lens with a narrow set of wavelengths of light. This light interacts with fluorophores in the sample which then emit light of a longer </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="3245" instrument_node="">wavelength</span></a><span data-dcnode-id="3243" instrument_node="">. It is this emitted light which makes up the image.
</span></p><p data-dcnode-id="3222"><span data-dcnode-id="3241" instrument_node="">Since the mid-20th century chemical fluorescent stains, such as </span><a data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DAPI" title="DAPI"><span data-dcnode-id="3240" instrument_node="">DAPI</span></a><span data-dcnode-id="3238" instrument_node=""> which binds to </span><a data-dcnode-id="3236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/DNA" title="DNA"><span data-dcnode-id="3237" instrument_node="">DNA</span></a><span data-dcnode-id="3235" instrument_node="">, have been used to label specific structures within the cell. More recent developments include </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immunofluorescence" title="Immunofluorescence"><span data-dcnode-id="3234" instrument_node="">immunofluorescence</span></a><span data-dcnode-id="3232" instrument_node="">, which uses fluorescently labelled </span><a class="mw-redirect" data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antibodies" title="Antibodies"><span data-dcnode-id="3231" instrument_node="">antibodies</span></a><span data-dcnode-id="3229" instrument_node=""> to recognise specific proteins within a sample, and fluorescent proteins like </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_fluorescent_protein" title="Green fluorescent protein"><span data-dcnode-id="3228" instrument_node="">GFP</span></a><span data-dcnode-id="3226" instrument_node=""> which a live cell can </span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gene_expression" title="Gene expression"><span data-dcnode-id="3225" instrument_node="">express</span></a><span data-dcnode-id="3223" instrument_node=""> making it fluorescent.
</span></p><span data-dcnode-id="3221" instrument_node="">
</span><h2 data-dcnode-id="3211"><span class="mw-headline" data-dcnode-id="3219" id="Components"><span data-dcnode-id="3220" instrument_node="">Components</span></span><span class="mw-editsection" data-dcnode-id="3212"><span class="mw-editsection-bracket" data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">[</span></span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D11" title="Edit section: Components"><span data-dcnode-id="3216" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3210" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3201"><div class="thumbinner" data-dcnode-id="3202" style="width:302px;"><a class="image" data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptical_microscope_nikon_alphaphot.jpg"><img alt="" class="thumbimage" data-dcnode-id="3209" data-file-height="1817" data-file-width="1200" decoding="async" height="454" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Optical_microscope_nikon_alphaphot.jpg/300px-Optical_microscope_nikon_alphaphot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Optical_microscope_nikon_alphaphot.jpg/450px-Optical_microscope_nikon_alphaphot.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Optical_microscope_nikon_alphaphot.jpg/600px-Optical_microscope_nikon_alphaphot.jpg 2x" width="300"></a><span data-dcnode-id="3207" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3203"><div class="magnify" data-dcnode-id="3205"><a class="internal" data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptical_microscope_nikon_alphaphot.jpg" title="Enlarge"></a></div><span data-dcnode-id="3204" instrument_node="">Basic optical transmission microscope elements (1990s)</span></div></div></div><span data-dcnode-id="3200" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3199" instrument_node="">All modern optical microscopes designed for viewing samples by transmitted light share the same basic components of the light path. In addition, the vast majority of microscopes have the same 'structural' components</span><sup class="reference" data-dcnode-id="3196" id="cite_ref-27"><a data-dcnode-id="3197" href="#cite_note-27"><span data-dcnode-id="3198" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3195" instrument_node=""> (numbered below according to the image on the right):
</span></p><span data-dcnode-id="3193" instrument_node="">
</span><ul data-dcnode-id="3152"><li data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Eyepiece (ocular lens) (1)</span></li><span data-dcnode-id="3190" instrument_node="">
</span><li data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">Objective turret, revolver, or revolving nose piece (to hold multiple objective lenses) (2)</span></li><span data-dcnode-id="3187" instrument_node="">
</span><li data-dcnode-id="3183"><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3186" instrument_node="">Objective lenses</span></a><span data-dcnode-id="3184" instrument_node=""> (3)</span></li><span data-dcnode-id="3182" instrument_node="">
</span><li data-dcnode-id="3174"><span data-dcnode-id="3181" instrument_node="">Focus knobs (to move the stage)
</span><ul data-dcnode-id="3175"><li data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">Coarse adjustment (4)</span></li><span data-dcnode-id="3178" instrument_node="">
</span><li data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Fine adjustment (5)</span></li></ul></li><span data-dcnode-id="3173" instrument_node="">
</span><li data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Stage (to hold the specimen) (6)</span></li><span data-dcnode-id="3170" instrument_node="">
</span><li data-dcnode-id="3162"><span data-dcnode-id="3169" instrument_node="">Light source (a </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="3168" instrument_node="">light</span></a><span data-dcnode-id="3166" instrument_node=""> or a </span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mirror" title="Mirror"><span data-dcnode-id="3165" instrument_node="">mirror</span></a><span data-dcnode-id="3163" instrument_node="">) (7)</span></li><span data-dcnode-id="3161" instrument_node="">
</span><li data-dcnode-id="3156"><span data-dcnode-id="3160" instrument_node="">Diaphragm and </span><a class="mw-redirect" data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condenser_%28microscope%29" title="Condenser (microscope)"><span data-dcnode-id="3159" instrument_node="">condenser</span></a><span data-dcnode-id="3157" instrument_node=""> (8)</span></li><span data-dcnode-id="3155" instrument_node="">
</span><li data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Mechanical stage (9)</span></li></ul><span data-dcnode-id="3151" instrument_node="">
</span><h3 data-dcnode-id="3140"><span data-dcnode-id="3150" id="Eyepiece_.28ocular_lens.29"></span><span class="mw-headline" data-dcnode-id="3148" id="Eyepiece_(ocular_lens)"><span data-dcnode-id="3149" instrument_node="">Eyepiece (ocular lens)</span></span><span class="mw-editsection" data-dcnode-id="3141"><span class="mw-editsection-bracket" data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">[</span></span><a data-dcnode-id="3144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D12" title="Edit section: Eyepiece (ocular lens)"><span data-dcnode-id="3145" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3139" instrument_node="">
</span><link data-dcnode-id="3138" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3134" role="note"><span data-dcnode-id="3137" instrument_node="">Main article: </span><a data-dcnode-id="3135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3136" instrument_node="">Eyepiece</span></a></div><span data-dcnode-id="3133" instrument_node="">
</span><p data-dcnode-id="3125"><span data-dcnode-id="3132" instrument_node="">The </span><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3131" instrument_node="">eyepiece</span></a><span data-dcnode-id="3129" instrument_node="">, or ocular lens, is a cylinder containing two or more lenses; its function is to bring the image into focus for the eye. The eyepiece is inserted into the top end of the body tube. Eyepieces are interchangeable and many different eyepieces can be inserted with different degrees of magnification. Typical magnification values for eyepieces include 5×, 10× (the most common), 15× and 20×. In some high performance microscopes, the optical configuration of the objective lens and eyepiece are matched to give the best possible optical performance. This occurs most commonly with </span><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apochromat" title="Apochromat"><span data-dcnode-id="3128" instrument_node="">apochromatic</span></a><span data-dcnode-id="3126" instrument_node=""> objectives.
</span></p><span data-dcnode-id="3124" instrument_node="">
</span><h3 data-dcnode-id="3113"><span data-dcnode-id="3123" id="Objective_turret_.28revolver_or_revolving_nose_piece.29"></span><span class="mw-headline" data-dcnode-id="3121" id="Objective_turret_(revolver_or_revolving_nose_piece)"><span data-dcnode-id="3122" instrument_node="">Objective turret (revolver or revolving nose piece)</span></span><span class="mw-editsection" data-dcnode-id="3114"><span class="mw-editsection-bracket" data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">[</span></span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D13" title="Edit section: Objective turret (revolver or revolving nose piece)"><span data-dcnode-id="3118" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">Objective turret, revolver, or revolving nose piece is the part that holds the set of objective lenses. It allows the user to switch between objective lenses.
</span></p><span data-dcnode-id="3109" instrument_node="">
</span><h3 data-dcnode-id="3099"><span class="mw-headline" data-dcnode-id="3107" id="Objective_lens"><span data-dcnode-id="3108" instrument_node="">Objective lens</span></span><span class="mw-editsection" data-dcnode-id="3100"><span class="mw-editsection-bracket" data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">[</span></span><a data-dcnode-id="3103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D14" title="Edit section: Objective lens"><span data-dcnode-id="3104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3098" instrument_node="">
</span><link data-dcnode-id="3097" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3093" role="note"><span data-dcnode-id="3096" instrument_node="">Main article: </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3095" instrument_node="">Objective (optics)</span></a></div><span data-dcnode-id="3092" instrument_node="">
