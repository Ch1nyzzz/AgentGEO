</span><p data-dcnode-id="3069"><span data-dcnode-id="3091" instrument_node="">At the lower end of a typical compound optical microscope, there are one or more </span><a class="mw-redirect" data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_lens" title="Objective lens"><span data-dcnode-id="3090" instrument_node="">objective lenses</span></a><span data-dcnode-id="3088" instrument_node=""> that collect light from the sample. The objective is usually in a cylinder housing containing a glass single or multi-element compound lens. Typically there will be around three objective lenses screwed into a circular nose piece which may be rotated to select the required objective lens. These arrangements are designed to be </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parfocal_lens" title="Parfocal lens"><span data-dcnode-id="3087" instrument_node="">parfocal</span></a><span data-dcnode-id="3085" instrument_node="">, which means that when one changes from one lens to another on a microscope, the sample stays in </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focus_%28optics%29" title="Focus (optics)"><span data-dcnode-id="3084" instrument_node="">focus</span></a><span data-dcnode-id="3082" instrument_node="">. Microscope objectives are characterized by two parameters, namely, </span><a data-dcnode-id="3080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3081" instrument_node="">magnification</span></a><span data-dcnode-id="3079" instrument_node=""> and </span><a data-dcnode-id="3077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numerical_aperture" title="Numerical aperture"><span data-dcnode-id="3078" instrument_node="">numerical aperture</span></a><span data-dcnode-id="3076" instrument_node="">. The former typically ranges from 5× to 100× while the latter ranges from 0.14 to 0.7, corresponding to </span><a data-dcnode-id="3074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_length" title="Focal length"><span data-dcnode-id="3075" instrument_node="">focal lengths</span></a><span data-dcnode-id="3073" instrument_node=""> of about 40 to 2&nbsp;mm, respectively. Objective lenses with higher magnifications normally have a higher numerical aperture and a shorter </span><a data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Depth_of_field" title="Depth of field"><span data-dcnode-id="3072" instrument_node="">depth of field</span></a><span data-dcnode-id="3070" instrument_node=""> in the resulting image. Some high performance objective lenses may require matched eyepieces to deliver the best optical performance.
</span></p><span data-dcnode-id="3068" instrument_node="">
</span><h4 data-dcnode-id="3058"><span class="mw-headline" data-dcnode-id="3066" id="Oil_immersion_objective"><span data-dcnode-id="3067" instrument_node="">Oil immersion objective</span></span><span class="mw-editsection" data-dcnode-id="3059"><span class="mw-editsection-bracket" data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">[</span></span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D15" title="Edit section: Oil immersion objective"><span data-dcnode-id="3063" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3057" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3045"><div class="thumbinner" data-dcnode-id="3046" style="width:302px;"><a class="image" data-dcnode-id="3055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeica_EpifluorescenceMicroscope_ObjectiveLens.jpg"><img alt="" class="thumbimage" data-dcnode-id="3056" data-file-height="1984" data-file-width="3904" decoding="async" height="152" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg/300px-Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg/450px-Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg/600px-Leica_EpifluorescenceMicroscope_ObjectiveLens.jpg 2x" width="300"></a><span data-dcnode-id="3054" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3047"><div class="magnify" data-dcnode-id="3052"><a class="internal" data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALeica_EpifluorescenceMicroscope_ObjectiveLens.jpg" title="Enlarge"></a></div><span data-dcnode-id="3051" instrument_node="">Two Leica </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_immersion" title="Oil immersion"><span data-dcnode-id="3050" instrument_node="">oil immersion</span></a><span data-dcnode-id="3048" instrument_node=""> microscope objective lenses: 100× (left) and 40× (right)</span></div></div></div><span data-dcnode-id="3044" instrument_node="">
</span><link data-dcnode-id="3043" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3039" role="note"><span data-dcnode-id="3042" instrument_node="">Main article: </span><a data-dcnode-id="3040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_immersion" title="Oil immersion"><span data-dcnode-id="3041" instrument_node="">Oil immersion</span></a></div><span data-dcnode-id="3038" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3037" instrument_node="">Some microscopes make use of </span><a class="mw-redirect" data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil-immersion_objective" title="Oil-immersion objective"><span data-dcnode-id="3036" instrument_node="">oil-immersion objectives</span></a><span data-dcnode-id="3034" instrument_node=""> or water-immersion objectives for greater resolution at high magnification. These are used with </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Index-matching_material" title="Index-matching material"><span data-dcnode-id="3033" instrument_node="">index-matching material</span></a><span data-dcnode-id="3031" instrument_node=""> such as </span><a class="mw-redirect" data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immersion_oil" title="Immersion oil"><span data-dcnode-id="3030" instrument_node="">immersion oil</span></a><span data-dcnode-id="3028" instrument_node=""> or water and a matched cover slip between the objective lens and the sample. The refractive index of the index-matching material is higher than air allowing the objective lens to have a larger numerical aperture (greater than 1) so that the light is transmitted from the specimen to the outer face of the objective lens with minimal refraction. Numerical apertures as high as 1.6 can be achieved.</span><sup class="reference" data-dcnode-id="3025" id="cite_ref-28"><a data-dcnode-id="3026" href="#cite_note-28"><span data-dcnode-id="3027" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3024" instrument_node=""> The larger numerical aperture allows collection of more light making detailed observation of smaller details possible. An oil immersion lens usually has a magnification of 40 to 100×.
</span></p><span data-dcnode-id="3022" instrument_node="">
</span><h3 data-dcnode-id="3012"><span class="mw-headline" data-dcnode-id="3020" id="Focus_knobs"><span data-dcnode-id="3021" instrument_node="">Focus knobs</span></span><span class="mw-editsection" data-dcnode-id="3013"><span class="mw-editsection-bracket" data-dcnode-id="3018"><span data-dcnode-id="3019" instrument_node="">[</span></span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D16" title="Edit section: Focus knobs"><span data-dcnode-id="3017" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3014"><span data-dcnode-id="3015" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3011" instrument_node="">
</span><p data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Adjustment knobs move the stage up and down with separate adjustment for coarse and fine focusing. The same controls enable the microscope to adjust to specimens of different thickness. In older designs of microscopes, the focus adjustment wheels move the microscope tube up or down relative to the stand and had a fixed stage.
</span></p><span data-dcnode-id="3008" instrument_node="">
</span><h3 data-dcnode-id="2998"><span class="mw-headline" data-dcnode-id="3006" id="Frame"><span data-dcnode-id="3007" instrument_node="">Frame</span></span><span class="mw-editsection" data-dcnode-id="2999"><span class="mw-editsection-bracket" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">[</span></span><a data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D17" title="Edit section: Frame"><span data-dcnode-id="3003" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">The whole of the optical assembly is traditionally attached to a rigid arm, which in turn is attached to a robust U-shaped foot to provide the necessary rigidity. The arm angle may be adjustable to allow the viewing angle to be adjusted.
</span></p><p data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">The frame provides a mounting point for various microscope controls. Normally this will include controls for focusing, typically a large knurled wheel to adjust coarse focus, together with a smaller knurled wheel to control fine focus. Other features may be lamp controls and/or controls for adjusting the condenser.
</span></p><span data-dcnode-id="2992" instrument_node="">
</span><h3 data-dcnode-id="2982"><span class="mw-headline" data-dcnode-id="2990" id="Stage"><span data-dcnode-id="2991" instrument_node="">Stage</span></span><span class="mw-editsection" data-dcnode-id="2983"><span class="mw-editsection-bracket" data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">[</span></span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D18" title="Edit section: Stage"><span data-dcnode-id="2987" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2980" instrument_node="">The stage is a platform below the objective lens which supports the specimen being viewed. In the center of the stage is a hole through which light passes to illuminate the specimen. The stage usually has arms to hold </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microscope_slide" title="Microscope slide"><span data-dcnode-id="2979" instrument_node="">slides</span></a><span data-dcnode-id="2977" instrument_node=""> (rectangular glass plates with typical dimensions of 25×75&nbsp;mm, on which the specimen is mounted).
</span></p><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">At magnifications higher than 100× moving a slide by hand is not practical. A mechanical stage, typical of medium and higher priced microscopes, allows tiny movements of the slide via control knobs that reposition the sample/slide as desired. If a microscope did not originally have a mechanical stage it may be possible to add one.
</span></p><p data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">All stages move up and down for focus. With a mechanical stage slides move on two horizontal axes for positioning the specimen to examine specimen details.
</span></p><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Focusing starts at lower magnification in order to center the specimen by the user on the stage. Moving to a higher magnification requires the stage to be moved higher vertically for re-focus at the higher magnification and may also require slight horizontal specimen position adjustment. Horizontal specimen position adjustments are the reason for having a mechanical stage.
</span></p><p data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Due to the difficulty in preparing specimens and mounting them on slides, for children it's best to begin with prepared slides that are centered and focus easily regardless of the focus level used.
</span></p><span data-dcnode-id="2967" instrument_node="">
</span><h3 data-dcnode-id="2957"><span class="mw-headline" data-dcnode-id="2965" id="Light_source"><span data-dcnode-id="2966" instrument_node="">Light source</span></span><span class="mw-editsection" data-dcnode-id="2958"><span class="mw-editsection-bracket" data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">[</span></span><a data-dcnode-id="2961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D19" title="Edit section: Light source"><span data-dcnode-id="2962" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2956" instrument_node="">
</span><p data-dcnode-id="2939"><span data-dcnode-id="2955" instrument_node="">Many sources of light can be used. At its simplest, daylight is directed via a </span><a data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mirror" title="Mirror"><span data-dcnode-id="2954" instrument_node="">mirror</span></a><span data-dcnode-id="2952" instrument_node="">. Most microscopes, however, have their own adjustable and controllable light source – often a </span><a data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halogen_lamp" title="Halogen lamp"><span data-dcnode-id="2951" instrument_node="">halogen lamp</span></a><span data-dcnode-id="2949" instrument_node="">, although illumination using </span><a class="mw-redirect" data-dcnode-id="2947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LED" title="LED"><span data-dcnode-id="2948" instrument_node="">LEDs</span></a><span data-dcnode-id="2946" instrument_node=""> and </span><a data-dcnode-id="2944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laser" title="Laser"><span data-dcnode-id="2945" instrument_node="">lasers</span></a><span data-dcnode-id="2943" instrument_node=""> are becoming a more common provision. </span><a data-dcnode-id="2941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/K%25C3%25B6hler_illumination" title="Köhler illumination"><span data-dcnode-id="2942" instrument_node="">Köhler illumination</span></a><span data-dcnode-id="2940" instrument_node=""> is often provided on more expensive instruments.
</span></p><span data-dcnode-id="2938" instrument_node="">
</span><h3 data-dcnode-id="2928"><span class="mw-headline" data-dcnode-id="2936" id="Condenser"><span data-dcnode-id="2937" instrument_node="">Condenser</span></span><span class="mw-editsection" data-dcnode-id="2929"><span class="mw-editsection-bracket" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">[</span></span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D20" title="Edit section: Condenser"><span data-dcnode-id="2933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2910"><span data-dcnode-id="2926" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Condenser_%28microscope%29" title="Condenser (microscope)"><span data-dcnode-id="2925" instrument_node="">condenser</span></a><span data-dcnode-id="2923" instrument_node=""> is a lens designed to focus light from the illumination source onto the sample. The condenser may also include other features, such as a </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diaphragm_%28optics%29" title="Diaphragm (optics)"><span data-dcnode-id="2922" instrument_node="">diaphragm</span></a><span data-dcnode-id="2920" instrument_node=""> and/or filters, to manage the quality and intensity of the illumination. For illumination techniques like </span><a class="mw-redirect" data-dcnode-id="2918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_field" title="Dark field"><span data-dcnode-id="2919" instrument_node="">dark field</span></a><span data-dcnode-id="2917" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase_contrast" title="Phase contrast"><span data-dcnode-id="2916" instrument_node="">phase contrast</span></a><span data-dcnode-id="2914" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Differential_interference_contrast" title="Differential interference contrast"><span data-dcnode-id="2913" instrument_node="">differential interference contrast</span></a><span data-dcnode-id="2911" instrument_node=""> microscopy additional optical components must be precisely aligned in the light path.
</span></p><span data-dcnode-id="2909" instrument_node="">
</span><h3 data-dcnode-id="2899"><span class="mw-headline" data-dcnode-id="2907" id="Magnification"><span data-dcnode-id="2908" instrument_node="">Magnification</span></span><span class="mw-editsection" data-dcnode-id="2900"><span class="mw-editsection-bracket" data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">[</span></span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D21" title="Edit section: Magnification"><span data-dcnode-id="2904" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2890"><span data-dcnode-id="2897" instrument_node="">The actual power or </span><a data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="2896" instrument_node="">magnification</span></a><span data-dcnode-id="2894" instrument_node=""> of a compound optical microscope is the product of the powers of the </span><a data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="2893" instrument_node="">eyepiece</span></a><span data-dcnode-id="2891" instrument_node=""> and the objective lens. For example a 10x eyepiece magnification and a 100x objective lens magnification gives a total magnification of 1,000×.  Modified environments such as the use of oil or ultraviolet light can increase the resolution and allow for resolved details at magnifications larger than 1,000x. 
</span></p><span data-dcnode-id="2889" instrument_node="">
</span><h2 data-dcnode-id="2879"><span class="mw-headline" data-dcnode-id="2887" id="Operation"><span data-dcnode-id="2888" instrument_node="">Operation</span></span><span class="mw-editsection" data-dcnode-id="2880"><span class="mw-editsection-bracket" data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">[</span></span><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D22" title="Edit section: Operation"><span data-dcnode-id="2884" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2878" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2852"><div class="thumbinner" data-dcnode-id="2853" style="width:252px;"><a class="image" data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACBP_checking_authenticity_of_a_travel_document.jpg"><img alt="" class="thumbimage" data-dcnode-id="2877" data-file-height="2704" data-file-width="4064" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/CBP_checking_authenticity_of_a_travel_document.jpg/250px-CBP_checking_authenticity_of_a_travel_document.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7a/CBP_checking_authenticity_of_a_travel_document.jpg/375px-CBP_checking_authenticity_of_a_travel_document.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7a/CBP_checking_authenticity_of_a_travel_document.jpg/500px-CBP_checking_authenticity_of_a_travel_document.jpg 2x" width="250"></a><span data-dcnode-id="2875" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2854"><div class="magnify" data-dcnode-id="2873"><a class="internal" data-dcnode-id="2874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACBP_checking_authenticity_of_a_travel_document.jpg" title="Enlarge"></a></div><span data-dcnode-id="2872" instrument_node="">U.S. </span><a data-dcnode-id="2870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Customs_and_Border_Protection" title="U.S. Customs and Border Protection"><span data-dcnode-id="2871" instrument_node="">CBP</span></a><span data-dcnode-id="2869" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_Field_Operations" title="Office of Field Operations"><span data-dcnode-id="2868" instrument_node="">Office of Field Operations</span></a><span data-dcnode-id="2866" instrument_node=""> agent checking the </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authentication" title="Authentication"><span data-dcnode-id="2865" instrument_node="">authenticity</span></a><span data-dcnode-id="2863" instrument_node=""> of a </span><a data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Travel_document" title="Travel document"><span data-dcnode-id="2862" instrument_node="">travel document</span></a><span data-dcnode-id="2860" instrument_node=""> at an </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_airport" title="International airport"><span data-dcnode-id="2859" instrument_node="">international airport</span></a><span data-dcnode-id="2857" instrument_node=""> using a </span><a data-dcnode-id="2855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereo_microscope" title="Stereo microscope"><span data-dcnode-id="2856" instrument_node="">stereo microscope</span></a></div></div></div><span data-dcnode-id="2851" instrument_node="">
</span><h3 data-dcnode-id="2841"><span class="mw-headline" data-dcnode-id="2849" id="Illumination_techniques"><span data-dcnode-id="2850" instrument_node="">Illumination techniques</span></span><span class="mw-editsection" data-dcnode-id="2842"><span class="mw-editsection-bracket" data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">[</span></span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D23" title="Edit section: Illumination techniques"><span data-dcnode-id="2846" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2840" instrument_node="">
</span><link data-dcnode-id="2839" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2835" role="note"><span data-dcnode-id="2838" instrument_node="">Main article: </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microscopy" title="Microscopy"><span data-dcnode-id="2837" instrument_node="">Microscopy</span></a></div><span data-dcnode-id="2834" instrument_node="">
</span><p data-dcnode-id="2811"><span data-dcnode-id="2833" instrument_node="">Many techniques are available which modify the light path to generate an improved </span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contrast_%28vision%29" title="Contrast (vision)"><span data-dcnode-id="2832" instrument_node="">contrast</span></a><span data-dcnode-id="2830" instrument_node=""> image from a sample. Major techniques for generating increased contrast from the sample include </span><a data-dcnode-id="2828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarized_light_microscopy" title="Polarized light microscopy"><span data-dcnode-id="2829" instrument_node="">cross-polarized light</span></a><span data-dcnode-id="2827" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_field" title="Dark field"><span data-dcnode-id="2826" instrument_node="">dark field</span></a><span data-dcnode-id="2824" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phase_contrast" title="Phase contrast"><span data-dcnode-id="2823" instrument_node="">phase contrast</span></a><span data-dcnode-id="2821" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Differential_interference_contrast" title="Differential interference contrast"><span data-dcnode-id="2820" instrument_node="">differential interference contrast</span></a><span data-dcnode-id="2818" instrument_node=""> illumination. A recent technique (</span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarfus" title="Sarfus"><span data-dcnode-id="2817" instrument_node="">Sarfus</span></a><span data-dcnode-id="2815" instrument_node="">) combines </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarized_light_microscopy" title="Polarized light microscopy"><span data-dcnode-id="2814" instrument_node="">cross-polarized light</span></a><span data-dcnode-id="2812" instrument_node=""> and specific contrast-enhanced slides for the visualization of nanometric samples.

</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Modern microscopes allow more than just observation of transmitted light image of a sample; there are many techniques which can be used to extract other kinds of data. Most of these require additional equipment in addition to a basic compound microscope.

</span><h2 data-dcnode-id="2657"><span class="mw-headline" data-dcnode-id="2665" id="Applications"><span data-dcnode-id="2666" instrument_node="">Applications</span></span><span class="mw-editsection" data-dcnode-id="2658"><span class="mw-editsection-bracket" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">[</span></span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D25" title="Edit section: Applications"><span data-dcnode-id="2662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2656" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2641"><div class="thumbinner" data-dcnode-id="2642" style="width:222px;"><a class="image" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVaginal_wet_mount_of_candidal_vulvovaginitis.jpg"><img alt="" class="thumbimage" data-dcnode-id="2655" data-file-height="923" data-file-width="907" decoding="async" height="224" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg/220px-Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg/330px-Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/38/Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg/440px-Vaginal_wet_mount_of_candidal_vulvovaginitis.jpg 2x" width="220"></a><span data-dcnode-id="2653" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2643"><div class="magnify" data-dcnode-id="2651"><a class="internal" data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVaginal_wet_mount_of_candidal_vulvovaginitis.jpg" title="Enlarge"></a></div><span data-dcnode-id="2650" instrument_node="">A 40x magnification image of cells in a medical </span><a class="mw-redirect" data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smear_test" title="Smear test"><span data-dcnode-id="2649" instrument_node="">smear test</span></a><span data-dcnode-id="2647" instrument_node=""> taken through an optical microscope using a </span><a class="mw-redirect" data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wet_mount" title="Wet mount"><span data-dcnode-id="2646" instrument_node="">wet mount</span></a><span data-dcnode-id="2644" instrument_node=""> technique, placing the specimen on a glass slide and mixing with a salt solution</span></div></div></div><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2639" instrument_node="">Optical microscopy is used extensively in microelectronics, nanophysics, biotechnology, pharmaceutic research, mineralogy and microbiology.</span><sup class="reference" data-dcnode-id="2636" id="cite_ref-30"><a data-dcnode-id="2637" href="#cite_note-30"><span data-dcnode-id="2638" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2635" instrument_node="">
</span></p><p data-dcnode-id="2623"><span data-dcnode-id="2633" instrument_node="">Optical microscopy is used for </span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_diagnosis" title="Medical diagnosis"><span data-dcnode-id="2632" instrument_node="">medical diagnosis</span></a><span data-dcnode-id="2630" instrument_node="">, the field being termed </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Histopathology" title="Histopathology"><span data-dcnode-id="2629" instrument_node="">histopathology</span></a><span data-dcnode-id="2627" instrument_node=""> when dealing with tissues, or in </span><a class="mw-redirect" data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smear_test" title="Smear test"><span data-dcnode-id="2626" instrument_node="">smear tests</span></a><span data-dcnode-id="2624" instrument_node=""> on free cells or tissue fragments.
</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2622" instrument_node="">In industrial use, binocular microscopes are common. Aside from applications needing true </span><a data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stereo_microscope" title="Stereo microscope"><span data-dcnode-id="2621" instrument_node="">depth perception</span></a><span data-dcnode-id="2619" instrument_node="">, the use of dual eyepieces reduces </span><a class="mw-redirect" data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asthenopia" title="Asthenopia"><span data-dcnode-id="2618" instrument_node="">eye strain</span></a><span data-dcnode-id="2616" instrument_node=""> associated with long workdays at a microscopy station. In certain applications, long-working-distance or long-focus microscopes</span><sup class="reference" data-dcnode-id="2613" id="cite_ref-macrolensdb_31-0"><a data-dcnode-id="2614" href="#cite_note-macrolensdb-31"><span data-dcnode-id="2615" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2612" instrument_node=""> are beneficial.  An item may need to be examined behind a </span><a data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_window" title="Optical window"><span data-dcnode-id="2611" instrument_node="">window</span></a><span data-dcnode-id="2609" instrument_node="">, or industrial subjects may be a hazard to the objective.  Such optics resemble telescopes with close-focus capabilities.</span><sup class="reference" data-dcnode-id="2606" id="cite_ref-questar_32-0"><a data-dcnode-id="2607" href="#cite_note-questar-32"><span data-dcnode-id="2608" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="2603" id="cite_ref-fta_33-0"><a data-dcnode-id="2604" href="#cite_note-fta-33"><span data-dcnode-id="2605" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2602" instrument_node="">
</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2600" instrument_node="">Measuring microscopes are used for precision measurement.  There are two basic types.
One has a </span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reticle" title="Reticle"><span data-dcnode-id="2599" instrument_node="">reticle</span></a><span data-dcnode-id="2597" instrument_node=""> graduated to allow measuring distances in the focal plane.</span><sup class="reference" data-dcnode-id="2594" id="cite_ref-34"><a data-dcnode-id="2595" href="#cite_note-34"><span data-dcnode-id="2596" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2593" instrument_node="">  The other (and older) type has simple </span><a class="mw-redirect" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crosshairs" title="Crosshairs"><span data-dcnode-id="2592" instrument_node="">crosshairs</span></a><span data-dcnode-id="2590" instrument_node=""> and a micrometer mechanism for moving the subject relative to the microscope.</span><sup class="reference" data-dcnode-id="2587" id="cite_ref-35"><a data-dcnode-id="2588" href="#cite_note-35"><span data-dcnode-id="2589" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2586" instrument_node="">
</span></p><p data-dcnode-id="2579"><span data-dcnode-id="2584" instrument_node="">Very small, portable microscopes have found some usage in places where a laboratory microscope would be a burden.</span><sup class="reference" data-dcnode-id="2581" id="cite_ref-36"><a data-dcnode-id="2582" href="#cite_note-36"><span data-dcnode-id="2583" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2580" instrument_node="">
</span></p><span data-dcnode-id="2578" instrument_node="">
</span><h2 data-dcnode-id="2568"><span class="mw-headline" data-dcnode-id="2576" id="Limitations"><span data-dcnode-id="2577" instrument_node="">Limitations</span></span><span class="mw-editsection" data-dcnode-id="2569"><span class="mw-editsection-bracket" data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">[</span></span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D26" title="Edit section: Limitations"><span data-dcnode-id="2573" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2567" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2555"><div class="thumbinner" data-dcnode-id="2556" style="width:222px;"><a class="image" data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AErnst-Abbe-Denkmal_Jena_F%25C3%25BCrstengraben_-_20140802_125709.jpg"><img alt="" class="thumbimage" data-dcnode-id="2566" data-file-height="1836" data-file-width="3264" decoding="async" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Ernst-Abbe-Denkmal_Jena_F%25C3%25BCrstengraben_-_20140802_125709.jpg/220px-Ernst-Abbe-Denkmal_Jena_F%25C3%25BCrstengraben_-_20140802_125709.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Ernst-Abbe-Denkmal_Jena_F%C3%BCrstengraben_-_20140802_125709.jpg/330px-Ernst-Abbe-Denkmal_Jena_F%C3%BCrstengraben_-_20140802_125709.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/46/Ernst-Abbe-Denkmal_Jena_F%C3%BCrstengraben_-_20140802_125709.jpg/440px-Ernst-Abbe-Denkmal_Jena_F%C3%BCrstengraben_-_20140802_125709.jpg 2x" width="220"></a><span data-dcnode-id="2564" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2557"><div class="magnify" data-dcnode-id="2562"><a class="internal" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AErnst-Abbe-Denkmal_Jena_F%25C3%25BCrstengraben_-_20140802_125709.jpg" title="Enlarge"></a></div><span data-dcnode-id="2561" instrument_node="">The diffraction limit set in stone on a monument for </span><a data-dcnode-id="2559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ernst_Abbe" title="Ernst Abbe"><span data-dcnode-id="2560" instrument_node="">Ernst Abbe</span></a><span data-dcnode-id="2558" instrument_node="">.</span></div></div></div><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2553" instrument_node="">At very high magnifications with transmitted light, point objects are seen as fuzzy discs surrounded by </span><a data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="2552" instrument_node="">diffraction</span></a><span data-dcnode-id="2550" instrument_node=""> rings. These are called </span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disk" title="Airy disk"><span data-dcnode-id="2549" instrument_node="">Airy disks</span></a><span data-dcnode-id="2547" instrument_node="">. The </span><i data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">resolving power</span></i><span data-dcnode-id="2544" instrument_node=""> of a microscope is taken as the ability to distinguish between two closely spaced Airy disks (or, in other words the ability of the microscope to reveal adjacent structural detail as distinct and separate). It is these impacts of diffraction that limit the ability to resolve fine details. The extent and magnitude of the diffraction patterns are affected by both the </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="2543" instrument_node="">wavelength</span></a><span data-dcnode-id="2541" instrument_node=""> of </span><a data-dcnode-id="2539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="2540" instrument_node="">light</span></a><span data-dcnode-id="2538" instrument_node=""> (λ), the refractive materials used to manufacture the objective lens and the </span><a data-dcnode-id="2536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numerical_aperture" title="Numerical aperture"><span data-dcnode-id="2537" instrument_node="">numerical aperture</span></a><span data-dcnode-id="2535" instrument_node=""> (NA) of the objective lens. There is therefore a finite limit beyond which it is impossible to resolve separate points in the objective field, known as the </span><a data-dcnode-id="2533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction-limited_system" title="Diffraction-limited system"><span data-dcnode-id="2534" instrument_node="">diffraction limit</span></a><span data-dcnode-id="2532" instrument_node="">. Assuming that optical aberrations in the whole optical set-up are negligible, the resolution </span><i data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">d</span></i><span data-dcnode-id="2529" instrument_node="">, can be stated as:
</span></p><span data-dcnode-id="2527" instrument_node="">

</span><p data-dcnode-id="2461"><span data-dcnode-id="2478" instrument_node="">Usually a wavelength of 550&nbsp;nm is assumed, which corresponds to </span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green" title="Green"><span data-dcnode-id="2477" instrument_node="">green</span></a><span data-dcnode-id="2475" instrument_node=""> light. With </span><a class="mw-redirect" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth%2527s_atmosphere" title="Earth's atmosphere"><span data-dcnode-id="2474" instrument_node="">air</span></a><span data-dcnode-id="2472" instrument_node=""> as the external medium, the highest practical </span><i data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">NA</span></i><span data-dcnode-id="2469" instrument_node=""> is 0.95, and with oil, up to 1.5. In practice the lowest value of </span><i data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">d</span></i><span data-dcnode-id="2466" instrument_node=""> obtainable with conventional lenses is about 200&nbsp;nm. A new type of lens using multiple scattering of light allowed to improve the resolution to below 100&nbsp;nm.</span><sup class="reference" data-dcnode-id="2463" id="cite_ref-fb_37-0"><a data-dcnode-id="2464" href="#cite_note-fb-37"><span data-dcnode-id="2465" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2462" instrument_node="">
</span></p><span data-dcnode-id="2460" instrument_node="">
</span><h3 data-dcnode-id="2450"><span class="mw-headline" data-dcnode-id="2458" id="Surpassing_the_resolution_limit"><span data-dcnode-id="2459" instrument_node="">Surpassing the resolution limit</span></span><span class="mw-editsection" data-dcnode-id="2451"><span class="mw-editsection-bracket" data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">[</span></span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D27" title="Edit section: Surpassing the resolution limit"><span data-dcnode-id="2455" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2448" instrument_node="">Multiple techniques are available for reaching resolutions higher than the transmitted light limit described above. Holographic techniques, as described by Courjon and Bulabois in 1979, are also capable of breaking this resolution limit, although resolution was restricted in their experimental analysis.</span><sup class="reference" data-dcnode-id="2445" id="cite_ref-38"><a data-dcnode-id="2446" href="#cite_note-38"><span data-dcnode-id="2447" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2444" instrument_node="">
</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2442" instrument_node="">Using fluorescent samples more techniques are available. Examples include </span><a class="mw-redirect" data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vertico_SMI" title="Vertico SMI"><span data-dcnode-id="2441" instrument_node="">Vertico SMI</span></a><span data-dcnode-id="2439" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Near_field_scanning_optical_microscopy" title="Near field scanning optical microscopy"><span data-dcnode-id="2438" instrument_node="">near field scanning optical microscopy</span></a><span data-dcnode-id="2436" instrument_node=""> which uses </span><a class="mw-redirect" data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evanescent_waves" title="Evanescent waves"><span data-dcnode-id="2435" instrument_node="">evanescent waves</span></a><span data-dcnode-id="2433" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/STED_microscope" title="STED microscope"><span data-dcnode-id="2432" instrument_node="">stimulated emission depletion</span></a><span data-dcnode-id="2430" instrument_node="">. In 2005, a microscope capable of detecting a single molecule was described as a teaching tool.</span><sup class="reference" data-dcnode-id="2427" id="cite_ref-39"><a data-dcnode-id="2428" href="#cite_note-39"><span data-dcnode-id="2429" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2426" instrument_node="">
</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Despite significant progress in the last decade, techniques for surpassing the diffraction limit remain limited and specialized.
</span></p><p data-dcnode-id="2418"><span data-dcnode-id="2422" instrument_node="">While most techniques focus on increases in lateral resolution there are also some techniques which aim to allow analysis of extremely thin samples. For example, </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sarfus" title="Sarfus"><span data-dcnode-id="2421" instrument_node="">sarfus</span></a><span data-dcnode-id="2419" instrument_node=""> methods place the thin sample on a contrast-enhancing surface and thereby allows to directly visualize films as thin as 0.3 nanometers.
</span></p><p data-dcnode-id="2394"><span data-dcnode-id="2417" instrument_node="">On 8 October 2014, the </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nobel_Prize_in_Chemistry" title="Nobel Prize in Chemistry"><span data-dcnode-id="2416" instrument_node="">Nobel Prize in Chemistry</span></a><span data-dcnode-id="2414" instrument_node=""> was awarded to </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Betzig" title="Eric Betzig"><span data-dcnode-id="2413" instrument_node="">Eric Betzig</span></a><span data-dcnode-id="2411" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Moerner" title="William Moerner"><span data-dcnode-id="2410" instrument_node="">William Moerner</span></a><span data-dcnode-id="2408" instrument_node=""> and </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stefan_Hell" title="Stefan Hell"><span data-dcnode-id="2407" instrument_node="">Stefan Hell</span></a><span data-dcnode-id="2405" instrument_node=""> for the development of super-resolved </span><a data-dcnode-id="2403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fluorescence_microscope" title="Fluorescence microscope"><span data-dcnode-id="2404" instrument_node="">fluorescence microscopy</span></a><span data-dcnode-id="2402" instrument_node="">.</span><sup class="reference" data-dcnode-id="2399" id="cite_ref-AP-20141008-KR_40-0"><a data-dcnode-id="2400" href="#cite_note-AP-20141008-KR-40"><span data-dcnode-id="2401" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="2396" id="cite_ref-NYT-20141008-KC_41-0"><a data-dcnode-id="2397" href="#cite_note-NYT-20141008-KC-41"><span data-dcnode-id="2398" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2395" instrument_node="">
</span></p><span data-dcnode-id="2393" instrument_node="">
</span><h4 data-dcnode-id="2383"><span class="mw-headline" data-dcnode-id="2391" id="Structured_illumination_SMI"><span data-dcnode-id="2392" instrument_node="">Structured illumination SMI</span></span><span class="mw-editsection" data-dcnode-id="2384"><span class="mw-editsection-bracket" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">[</span></span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D28" title="Edit section: Structured illumination SMI"><span data-dcnode-id="2388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2381" instrument_node="">SMI (spatially modulated illumination microscopy) is a light optical process of the so-called </span><a data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Point_spread_function" title="Point spread function"><span data-dcnode-id="2380" instrument_node="">point spread function</span></a><span data-dcnode-id="2378" instrument_node=""> (PSF) engineering. These are processes which modify the PSF of a </span><a data-dcnode-id="2376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microscope" title="Microscope"><span data-dcnode-id="2377" instrument_node="">microscope</span></a><span data-dcnode-id="2375" instrument_node=""> in a suitable manner to either increase the optical resolution, to maximize the precision of </span><a data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distance" title="Distance"><span data-dcnode-id="2374" instrument_node="">distance</span></a><span data-dcnode-id="2372" instrument_node=""> measurements of fluorescent objects that are small relative to the </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="2371" instrument_node="">wavelength</span></a><span data-dcnode-id="2369" instrument_node=""> of the illuminating light, or to extract other structural parameters in the nanometer range.</span><sup class="reference" data-dcnode-id="2366" id="cite_ref-42"><a data-dcnode-id="2367" href="#cite_note-42"><span data-dcnode-id="2368" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="2363" id="cite_ref-43"><a data-dcnode-id="2364" href="#cite_note-43"><span data-dcnode-id="2365" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2362" instrument_node="">
</span></p><span data-dcnode-id="2360" instrument_node="">
</span><h4 data-dcnode-id="2350"><span class="mw-headline" data-dcnode-id="2358" id="Localization_microscopy_SPDMphymod"><span data-dcnode-id="2359" instrument_node="">Localization microscopy SPDMphymod</span></span><span class="mw-editsection" data-dcnode-id="2351"><span class="mw-editsection-bracket" data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">[</span></span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D29" title="Edit section: Localization microscopy SPDMphymod"><span data-dcnode-id="2355" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2349" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2340"><div class="thumbinner" data-dcnode-id="2341" style="width:602px;"><a class="image" data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png"><img alt="3D Dual Color Super Resolution Microscopy Cremer from 2010" class="thumbimage" data-dcnode-id="2348" data-file-height="1280" data-file-width="3486" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1a/3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png/600px-3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1a/3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png/900px-3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1a/3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png/1200px-3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png 2x" width="600"></a><span data-dcnode-id="2346" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2342"><div class="magnify" data-dcnode-id="2344"><a class="internal" data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A3D_Dual_Color_Super_Resolution_Microscopy_Cremer_2010.png" title="Enlarge"></a></div><span data-dcnode-id="2343" instrument_node="">3D dual color super resolution microscopy with Her2 and Her3 in breast cells, standard dyes: Alexa 488, Alexa 568 LIMON</span></div></div></div><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2338" instrument_node="">SPDM (spectral precision distance microscopy), the basic localization microscopy technology is a light optical process of </span><a class="mw-redirect" data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fluorescence_microscopy" title="Fluorescence microscopy"><span data-dcnode-id="2337" instrument_node="">fluorescence microscopy</span></a><span data-dcnode-id="2335" instrument_node=""> which allows position, distance and angle measurements on "optically isolated" particles (e.g. molecules) well below the theoretical </span><a class="new" data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DLimit_of_resolution%26action%3Dedit%26redlink%3D1" title="Limit of resolution (page does not exist)"><span data-dcnode-id="2334" instrument_node="">limit of resolution</span></a><span data-dcnode-id="2332" instrument_node=""> for light microscopy. "Optically isolated" means that at a given point in time, only a single particle/molecule within a region of a size determined by conventional optical resolution (typically approx. 200–250&nbsp;nm </span><a data-dcnode-id="2330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diameter" title="Diameter"><span data-dcnode-id="2331" instrument_node="">diameter</span></a><span data-dcnode-id="2329" instrument_node="">) is being registered. This is possible when </span><a class="mw-redirect" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molecules" title="Molecules"><span data-dcnode-id="2328" instrument_node="">molecules</span></a><span data-dcnode-id="2326" instrument_node=""> within such a region all carry different spectral markers (e.g. different colors or other usable differences in the </span><a class="mw-redirect" data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_emission" title="Light emission"><span data-dcnode-id="2325" instrument_node="">light emission</span></a><span data-dcnode-id="2323" instrument_node=""> of different particles).</span><sup class="reference" data-dcnode-id="2320" id="cite_ref-44"><a data-dcnode-id="2321" href="#cite_note-44"><span data-dcnode-id="2322" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="2317" id="cite_ref-45"><a data-dcnode-id="2318" href="#cite_note-45"><span data-dcnode-id="2319" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="2314" id="cite_ref-46"><a data-dcnode-id="2315" href="#cite_note-46"><span data-dcnode-id="2316" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="2311" id="cite_ref-47"><a data-dcnode-id="2312" href="#cite_note-47"><span data-dcnode-id="2313" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2310" instrument_node="">
</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2308" instrument_node="">Many standard fluorescent dyes like </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_fluorescent_protein" title="Green fluorescent protein"><span data-dcnode-id="2307" instrument_node="">GFP</span></a><span data-dcnode-id="2305" instrument_node="">, Alexa dyes, Atto dyes, Cy2/Cy3 and fluorescein molecules can be used for localization microscopy, provided certain photo-physical conditions are present. Using this so-called SPDMphymod (physically modifiable fluorophores) technology a single laser wavelength of suitable intensity is sufficient for nanoimaging.</span><sup class="reference" data-dcnode-id="2302" id="cite_ref-48"><a data-dcnode-id="2303" href="#cite_note-48"><span data-dcnode-id="2304" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2301" instrument_node="">
</span></p><span data-dcnode-id="2299" instrument_node="">
</span><h4 data-dcnode-id="2289"><span class="mw-headline" data-dcnode-id="2297" id="3D_super_resolution_microscopy"><span data-dcnode-id="2298" instrument_node="">3D super resolution microscopy</span></span><span class="mw-editsection" data-dcnode-id="2290"><span class="mw-editsection-bracket" data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">[</span></span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D30" title="Edit section: 3D super resolution microscopy"><span data-dcnode-id="2294" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2288" instrument_node="">
</span><p data-dcnode-id="2282"><span data-dcnode-id="2287" instrument_node="">3D super resolution microscopy with standard fluorescent dyes can be achieved by combination of localization microscopy for standard fluorescent dyes SPDMphymod and structured illumination SMI.</span><sup class="reference" data-dcnode-id="2284" id="cite_ref-49"><a data-dcnode-id="2285" href="#cite_note-49"><span data-dcnode-id="2286" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2283" instrument_node="">
</span></p><span data-dcnode-id="2281" instrument_node="">
</span><h4 data-dcnode-id="2271"><span class="mw-headline" data-dcnode-id="2279" id="STED"><span data-dcnode-id="2280" instrument_node="">STED</span></span><span class="mw-editsection" data-dcnode-id="2272"><span class="mw-editsection-bracket" data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">[</span></span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D31" title="Edit section: STED"><span data-dcnode-id="2276" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2270" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2261"><div class="thumbinner" data-dcnode-id="2262" style="width:302px;"><a class="image" data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMAX_052913_STED_Phallloidin.png"><img alt="" class="thumbimage" data-dcnode-id="2269" data-file-height="4093" data-file-width="4089" decoding="async" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/58/MAX_052913_STED_Phallloidin.png/300px-MAX_052913_STED_Phallloidin.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/58/MAX_052913_STED_Phallloidin.png/450px-MAX_052913_STED_Phallloidin.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/58/MAX_052913_STED_Phallloidin.png/600px-MAX_052913_STED_Phallloidin.png 2x" width="300"></a><span data-dcnode-id="2267" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2263"><div class="magnify" data-dcnode-id="2265"><a class="internal" data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMAX_052913_STED_Phallloidin.png" title="Enlarge"></a></div><span data-dcnode-id="2264" instrument_node="">Stimulated emission depletion (STED) microscopy image of actin filaments within a cell.</span></div></div></div><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2249"><a class="mw-redirect" data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/STED_microscope" title="STED microscope"><span data-dcnode-id="2259" instrument_node="">Stimulated emission depletion</span></a><span data-dcnode-id="2257" instrument_node=""> is a simple example of how higher resolution surpassing the diffraction limit is possible, but it has major limitations. STED is a fluorescence microscopy technique which uses a combination of light pulses to induce fluorescence in a small sub-population of fluorescent molecules in a sample. Each molecule produces a diffraction-limited spot of light in the image, and the centre of each of these spots corresponds to the location of the molecule. As the number of fluorescing molecules is low the spots of light are unlikely to overlap and therefore can be placed accurately. This process is then repeated many times to generate the image. </span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stefan_Hell" title="Stefan Hell"><span data-dcnode-id="2256" instrument_node="">Stefan Hell</span></a><span data-dcnode-id="2254" instrument_node=""> of the Max Planck Institute for Biophysical Chemistry was awarded the 10th German Future Prize in 2006 and Nobel Prize for Chemistry in 2014 for his development of the STED microscope and associated methodologies.</span><sup class="reference" data-dcnode-id="2251" id="cite_ref-50"><a data-dcnode-id="2252" href="#cite_note-50"><span data-dcnode-id="2253" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2250" instrument_node="">
</span></p><span data-dcnode-id="2248" instrument_node="">
</span><h2 data-dcnode-id="2238"><span class="mw-headline" data-dcnode-id="2246" id="Alternatives"><span data-dcnode-id="2247" instrument_node="">Alternatives</span></span><span class="mw-editsection" data-dcnode-id="2239"><span class="mw-editsection-bracket" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">[</span></span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_microscope%26action%3Dedit%26section%3D32" title="Edit section: Alternatives"><span data-dcnode-id="2243" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">In order to overcome the limitations set by the diffraction limit of visible light other microscopes have been designed which use other waves.
</span></p><span data-dcnode-id="2234" instrument_node="">
</span><ul data-dcnode-id="2202"><li data-dcnode-id="2230"><a class="mw-redirect" data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_force_microscope" title="Atomic force microscope"><span data-dcnode-id="2233" instrument_node="">Atomic force microscope</span></a><span data-dcnode-id="2231" instrument_node=""> (AFM)</span></li><span data-dcnode-id="2229" instrument_node="">
</span><li data-dcnode-id="2225"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_electron_microscope" title="Scanning electron microscope"><span data-dcnode-id="2228" instrument_node="">Scanning electron microscope</span></a><span data-dcnode-id="2226" instrument_node=""> (SEM)</span></li><span data-dcnode-id="2224" instrument_node="">
</span><li data-dcnode-id="2220"><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_ion-conductance_microscopy" title="Scanning ion-conductance microscopy"><span data-dcnode-id="2223" instrument_node="">Scanning ion-conductance microscopy</span></a><span data-dcnode-id="2221" instrument_node=""> (SICM)</span></li><span data-dcnode-id="2219" instrument_node="">
</span><li data-dcnode-id="2215"><a data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scanning_tunneling_microscope" title="Scanning tunneling microscope"><span data-dcnode-id="2218" instrument_node="">Scanning tunneling microscope</span></a><span data-dcnode-id="2216" instrument_node=""> (STM)</span></li><span data-dcnode-id="2214" instrument_node="">
</span><li data-dcnode-id="2210"><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transmission_electron_microscopy" title="Transmission electron microscopy"><span data-dcnode-id="2213" instrument_node="">Transmission electron microscopy</span></a><span data-dcnode-id="2211" instrument_node=""> (TEM)</span></li><span data-dcnode-id="2209" instrument_node="">
</span><li data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Ultraviolet microscope</span></li><span data-dcnode-id="2206" instrument_node="">
</span><li data-dcnode-id="2203"><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray_microscope" title="X-ray microscope"><span data-dcnode-id="2205" instrument_node="">X-ray microscope</span></a></li></ul><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">It is important to note that higher frequency waves have limited interaction with matter, for example soft tissues are relatively transparent to X-rays resulting in distinct sources of contrast and different target applications.
</span></p><p data-dcnode-id="2194"><span data-dcnode-id="2198" instrument_node="">The use of electrons and X-rays in place of light allows much higher resolution – the wavelength of the radiation is shorter so the diffraction limit is lower. To make the
short-wavelength probe non-destructive, the atomic beam imaging system (</span><a class="mw-redirect" data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_nanoscope" title="Atomic nanoscope"><span data-dcnode-id="2197" instrument_node="">atomic nanoscope</span></a><span data-dcnode-id="2195" instrument_node="">) has been proposed and widely discussed in the literature, but it is not yet competitive with conventional imaging systems.
</span></p><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">STM and AFM are scanning probe techniques using a small probe which is scanned over the sample surface. Resolution in these cases is limited by the size of the probe; micromachining techniques can produce probes with tip radii of 5–10&nbsp;nm.
</span></p><p data-dcnode-id="2175"><span data-dcnode-id="2191" instrument_node="">Additionally, methods such as electron or X-ray microscopy use a vacuum or partial vacuum, which limits their use for live and biological samples (with the exception of an </span><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_scanning_electron_microscope" title="Environmental scanning electron microscope"><span data-dcnode-id="2190" instrument_node="">environmental scanning electron microscope</span></a><span data-dcnode-id="2188" instrument_node="">). The specimen chambers needed for all such instruments also limits sample size, and sample manipulation is more difficult. Color cannot be seen in images made by these methods, so some information is lost. They are however, essential when investigating molecular or atomic effects, such as </span><a class="mw-redirect" data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_hardening" title="Age hardening"><span data-dcnode-id="2187" instrument_node="">age hardening</span></a><span data-dcnode-id="2185" instrument_node=""> in </span><a data-dcnode-id="2183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluminium_alloy" title="Aluminium alloy"><span data-dcnode-id="2184" instrument_node="">aluminium alloys</span></a><span data-dcnode-id="2182" instrument_node="">, or the </span><a data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microstructure" title="Microstructure"><span data-dcnode-id="2181" instrument_node="">microstructure</span></a><span data-dcnode-id="2179" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polymers" title="Polymers"><span data-dcnode-id="2178" instrument_node="">polymers</span></a><span data-dcnode-id="2176" instrument_node="">.
</span></p><span data-dcnode-id="2174" instrument_node="">
