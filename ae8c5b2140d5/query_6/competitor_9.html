lass="inner" data-dcnode-id="3884" data-v-b33947ae=""><div class="drop-box" data-dcnode-id="3910" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="3913" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/how-open-access-publishing-with-intechopen-works"><span data-dcnode-id="3914" instrument_node="">What is Open Access?</span></a><p data-dcnode-id="3911" data-v-b33947ae=""><span data-dcnode-id="3912" instrument_node="">Open Access is an initiative that aims to make scientific research freely available to all. To date our community has made over 100 million downloads. It’s based on principles of collaboration, unobstructed discovery, and, most importantly, scientific progression. As PhD students, we found it difficult to access the research we needed, so we decided to create a new Open Access publisher that levels the playing field for scientists across the world. How? By making research easy to access, and puts the academic needs of the researchers before the business interests of publishers.</span></p></div><div class="drop-box" data-dcnode-id="3905" data-v-b33947ae=""><a class="drop-item" data-dcnode-id="3908" data-v-b33947ae="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/authors-and-editors"><span data-dcnode-id="3909" instrument_node="">Our authors and editors</span></a><p data-dcnode-id="3906" data-v-b33947ae=""><span data-dcnode-id="3907" instrument_node="">We are a community of more than 103,000 authors and editors from 3,291 institutions spanning 160 countries, including Nobel Prize winners and some of the world’s most-cited researchers. Publishing on IntechOpen allows authors to earn citations and find new collaborators, meaning more people see your work not only from your own field of study, but from other related fields too.</span></p></div><div class="drop-box" data-dcnode-id="3896" data-v-b33947ae=""><a class="drop-item" data-dcnode-i                             Advertisement
                        </span></a><div class="ads-link" data-dcnode-id="3608" data-v-e85dd3ce="" id="intechopen-intechopen-5" style="padding-bottom: 4.5rem;"></div></div></div></aside><div class="middle-col" data-dcnode-id="483" data-v-e85dd3ce=""><div class="intro" data-dcnode-id="3597" data-v-46823712="" data-v-e85dd3ce=""><h2 class="title" data-dcnode-id="3601" data-v-46823712=""><span data-dcnode-id="3602" instrument_node="">Abstract</span></h2><div class="body" data-dcnode-id="3598" data-v-46823712=""><p data-dcnode-id="3599" data-v-46823712=""><span data-dcnode-id="3600" instrument_node="">Three-dimensional optical manipulation of microparticles, cells, and biomolecules in a noncontact and noninvasive manner is crucial for biophotonic, nanophotonic, and biomedical fields. Optical tweezers, as a standard optical manipulation technique, have some limitations in precise manipulation of micro-objects in microfluidics and in&nbsp;vivo because of their bulky lens system and limited penetration depth. Moreover, when applied for trapping nanoscale objects, especially with sizes smaller than 100&nbsp;nm, the strength of optical tweezers becomes significantly weak due to the diffraction limit of light. The emerging near-field methods, such as plasmon tweezers and photonic crystal resonators, have enabled surpassing of the diffraction limit. However, these methods msay lead to local heating effects that will damage the biological specimens and reduce the trapping stability. Furthermore, the available near-field techniques rely on complex nanostructures fixed on substrates, which are usually used for 2D manipulation. The optical tweezers are of great potential for the applications including nanostructure assembly, cancer cell sorting, targeted drug delivery, single-molecule studies, and biosensing.</span></p></div></div><div class="keywords keywords-chapters" data-dcnode-id="3583" data-v-260fc791="" data-v-e85dd3ce=""><h3 class="subTitle" data-dcnode-id="3595" data-v-260fc791=""><span data-dcnode-id="3596" instrument_node="">Keywords</span></h3><ul data-dcnode-id="3584" data-v-260fc791=""><li class="item" data-dcnode-id="3593" data-v-260fc791=""><span data-dcnode-id="3594" instrument_node="">optical tweezers</span></li><li class="item" data-dcnode-id="3591" data-v-260fc791=""><span data-dcnode-id="3592" instrument_node=""> optical force</span></li><li class="item" data-dcnode-id="3589" data-v-260fc791=""><span data-dcnode-id="3590" instrument_node=""> optical manipulation</span></li><li class="item" data-dcnode-id="3587" data-v-260fc791=""><span data-dcnode-id="3588" instrument_node=""> biophotonics</span></li><li class="item" data-dcnode-id="3585" data-v-260fc791=""><span data-dcnode-id="3586" instrument_node=""> biotechnology</span></li></ul></div><div class="info collapsed" data-dcnode-id="3556" data-v-7ab7a970="" data-v-e85dd3ce="" id="section-chapter-and-author"><div class="toggle-header" data-dcnode-id="3578" data-v-7ab7a970=""><h2 class="title" data-dcnode-id="3581" data-v-7ab7a970=""><span data-dcnode-id="3582" instrument_node="">Author Information</span></h2><a class="title" data-dcnode-id="3579" data-v-7ab7a970=""><span data-dcnode-id="3580" instrument_node="">Show +</span></a></div><div class="wrap" data-dcnode-id="3557" data-v-7ab7a970=""><ul data-dcnode-id="3560" data-v-7ab7a970=""><li class="authorsItem" data-dcnode-id="3570" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="3575" data-v-7ab7a970=""><span data-dcnode-id="3577" instrument_node="">Zhiyong Gong</span></h4><span class="position" data-dcnode-id="3571" data-v-7ab7a970=""><ul class="list" data-dcnode-id="3572"><li data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Institute of Nanophotonics, Jinan University, Guangzhou, China</span></li></ul></span></li><li class="authorsItem" data-dcnode-id="3561" data-v-7ab7a970=""><h4 class="author" data-dcnode-id="3566" data-v-7ab7a970=""><span data-dcnode-id="3569" instrument_node="">Yuchao Li</span><span data-dcnode-id="3567" data-v-7ab7a970=""><span data-dcnode-id="3568" instrument_node="">*</span></span></h4><span class="position" data-dcnode-id="3562" data-v-7ab7a970=""><ul class="list" data-dcnode-id="3563"><li data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">Institute of Nanophotonics, Jinan University, Guangzhou, China</span></li></ul></span></li></ul><p class="title" data-dcnode-id="3558" data-v-7ab7a970=""><span data-dcnode-id="3559" instrument_node="">*Address all correspondence to: liyuchao@jnu.edu.cn</span></p></div></div><div class="reader-body reader-body" data-dcnode-id="1052" data-v-2206b564="" data-v-e85dd3ce=""><span data-dcnode-id="3554" instrument_node="">
</span><div class="section" data-dcnode-id="1386" data-lvl="1" id="sec_1"><span data-dcnode-id="3553" instrument_node="">
</span><h2 class="heading main-title" data-dcnode-id="3551"><span data-dcnode-id="3552" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="3550" instrument_node="">
</span><p data-dcnode-id="3536" id="p2"><span data-dcnode-id="3549" instrument_node="">As early as the 1970s, Maxwell revealed that electromagnetic waves can carry momentum in his famous electromagnetic field theory. When electromagnetic waves are applied to objects, they will transmit momentum. Therefore, electromagnetic waves can exert force on objects, and then the concept of electromagnetic force is proposed [</span><a class="ref-link" data-dcnode-id="3547" data-ref-style="bibr" href="#B1"><span data-dcnode-id="3548" instrument_node="">1</span></a><span data-dcnode-id="3546" instrument_node="">]. Until the beginning of the twentieth century, Einstein proposed the concept of photonic quantum, which believes that light is composed of a group of photons with both mass and momentum. When light is irradiated on the surface of the object, it can cause changes in the photon momentum to produce radiation pressure on the object due to the scattering and absorption of light. Subsequently, Lebedev, Nichol, and Hull first demonstrated the existence of radiation pressure experimentally. The experiment used arc lamps and torsion scales to observe the effect of light in the macroscopic physical world. However, the light produced by the arc lamp is very weak and difficult to practically apply. Until 1960, the invention of the laser provided a high-intensity optical source for studying optical force, which greatly promoted the application of optical manipulation. Arthur Ashkin, a scientist at Bell Experiments in the United States, first used the radiation pressure generated by the laser beam to push tiny particles in the liquid environment [</span><a class="ref-link" data-dcnode-id="3544" data-ref-style="bibr" href="#B2"><span data-dcnode-id="3545" instrument_node="">2</span></a><span data-dcnode-id="3543" instrument_node="">] and then used two opposing laser beams to capture microparticles and even atoms. However, the experimental setup used in the dual-beam capture method is too complex and can only limit microparticles in a two-dimensional plane. Scientists hope to use a single laser to achieve three-dimensional trapping of microparticles. To this end, in 1986, Ashkin et&nbsp;al. used a high-numerical-aperture objective to focus a single laser to trap microparticles and named the technology “single beam gradient force trap” [</span><a class="ref-link" data-dcnode-id="3541" data-ref-style="bibr" href="#B3"><span data-dcnode-id="3542" instrument_node="">3</span></a><span data-dcnode-id="3540" instrument_node="">]. A year later, Ashkin et&nbsp;al. continued to improve this technology and achieved optical trapping and manipulation of tiny bacteria and viruses. They officially named the technology “optical tweezers” [</span><a class="ref-link" data-dcnode-id="3538" data-ref-style="bibr" href="#B3"><span data-dcnode-id="3539" instrument_node="">3</span></a><span data-dcnode-id="3537" instrument_node="">]. Compared with traditional macro-mechanical tweezers, the optical tweezers have the advantages of noncontact and no damage and can perform high-precision manipulation of microscopic particles. Therefore, since the birth of the optical tweezer technology, it has played an important role in the fields of biomedicine and physical chemistry.</span></p><span data-dcnode-id="3535" instrument_node="">
</span><div class="section" data-dcnode-id="1680" data-lvl="2" id="sec_1_2"><span data-dcnode-id="3534" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="3532"><span data-dcnode-id="3533" instrument_node="">1.1 Traditional optical tweezers</span></h3><span data-dcnode-id="3531" instrument_node="">
</span><div class="section" data-dcnode-id="1780" data-lvl="3" id="sec_1_3"><span data-dcnode-id="3530" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">1.1.1 Basic principles</span></h4><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3516" id="p3"><span data-dcnode-id="3526" instrument_node="">The core component of the traditional optical tweezers is a highly focused beam, as shown in </span><a class="ref-link" data-dcnode-id="3524" data-ref-style="fig" href="#F1"><span data-dcnode-id="3525" instrument_node="">
Figure 1a
</span></a><span data-dcnode-id="3523" instrument_node=""> [</span><a class="ref-link" data-dcnode-id="3521" data-ref-style="bibr" href="#B4"><span data-dcnode-id="3522" instrument_node="">4</span></a><span data-dcnode-id="3520" instrument_node="">]. When the incident laser (usually a near-infrared laser with a wavelength of 1064&nbsp;nm) is focused by a high-numerical-aperture objective lens, the microparticles in the liquid environment will be exposed to optical force near the focus. This force is derived from the momentum transfer effect between light and particles. Specifically, the optical forces are divided into two components: one component along the direction of the optical gradient, called the optical gradient force, which is caused by the microparticles being in a nonuniform optical field, and the optical gradient force, which drives the particles to the area where the optical intensity is greatest; another component along the direction of optical propagation, called optical scattering force, is caused by the scattering and absorption of particles, and the optical scattering force causes the microparticles to move along the direction of optical propagation. By modulating the focused beam, the magnitude of two forces can be varied to achieve different functions such as capture, acceleration, and rotation of the microparticles. For traditional optical tweezers to construct a stable trap, it is necessary to focus the incident laser with a high-numerical-aperture (generally NA&nbsp;=&nbsp;1.0~1.4) objective lens. The resulting optical gradient force is greater than the optical scattering force, so the microparticles or the cells can be stably trapped in the focus of light [</span><a class="ref-link" data-dcnode-id="3518" data-ref-style="bibr" href="#B5"><span data-dcnode-id="3519" instrument_node="">5</span></a><span data-dcnode-id="3517" instrument_node="">].</span></p><span data-dcnode-id="3515" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="3502" id="F1"><div class="media" data-dcnode-id="3513"><img alt="" class="figure-link" data-dcnode-id="3514" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F1.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="3503"><h4 data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">Figure 1.</span></h4><p data-dcnode-id="3510"></p><p data-dcnode-id="3505" id="p4" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3509" instrument_node="">Schematic diagram of the traditional optical tweezers. (a) A single microparticle is trapped to the focused spot of a laser beam by gradient force and scattering force to [</span><xref data-dcnode-id="3507" ref-type="bibr" rid="B4"><span data-dcnode-id="3508" instrument_node="">4</span></xref><span data-dcnode-id="3506" instrument_node="">]. (b) A simple harmonic oscillator model for the optical trapping of the microparticle.</span></p><p data-dcnode-id="3504"></p></figcaption></figure><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3488" id="p5"><span data-dcnode-id="3500" instrument_node="">The model in which the object is trapped by the optical tweezers can be equivalent to a simple oscillator, as shown in </span><a class="ref-link" data-dcnode-id="3498" data-ref-style="fig" href="#F1"><span data-dcnode-id="3499" instrument_node="">
Figure 1b
</span></a><span data-dcnode-id="3497" instrument_node="">. The magnitude of the object’s received optical force (</span><em data-dcnode-id="3494"><italic data-dcnode-id="3495" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3496" instrument_node="">F</span></italic></em><span data-dcnode-id="3493" instrument_node="">) is proportional to the object’s distance from the focus (</span><em data-dcnode-id="3490"><italic data-dcnode-id="3491" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3492" instrument_node="">d</span></italic></em><span data-dcnode-id="3489" instrument_node="">), which is</span></p><span data-dcnode-id="3487" instrument_node="">
</span><div class="formula panel" data-dcnode-id="3447" id="df_E1"><span data-dcnode-id="3486" instrument_node="">
</span><span class="MathJax_Preview" data-dcnode-id="3485" style="color: inherit; display: none;"></span><span class="MathJax" data-dcnode-id="3453" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow><mrow><mi>F</mi><mo>=</mo><mo>&amp;#x2212;</mo><mi mathvariant=&quot;italic&quot;>kd</mi></mrow></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="position: relative;" tabindex="0"><nobr aria-hidden="true" data-dcnode-id="3466"><span class="math" data-dcnode-id="3467" id="MathJax-Span-1" style="width: 4.008em; display: inline-block;"><span data-dcnode-id="3469" style="display: inline-block; position: relative; width: 3.883em; height: 0px; font-size: 103%;"><span data-dcnode-id="3470" style="position: absolute; clip: rect(1.343em, 1003.89em, 2.444em, -1000em); top: -2.184em; left: 0em;"><span class="mrow" data-dcnode-id="3472" id="MathJax-Span-2"><span class="mrow" data-dcnode-id="3473" id="MathJax-Span-3"><span class="mrow" data-dcnode-id="3474" id="MathJax-Span-4"><span class="mi" data-dcnode-id="3482" id="MathJax-Span-5"><img data-dcnode-id="3484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/336/0046.png%3FV%3D2.7.1&amp;raw" style="width: 12px; height: 11px; margin-right: -0.101em;"><span data-dcnode-id="3483" style="display: inline-block; overflow: hidden; height: 1px; width: 0.101em;"></span></span><span class="mo" data-dcnode-id="3480" id="MathJax-Span-6" style="padding-left: 0.278em;"><img data-dcnode-id="3481" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/336/003D.png%3FV%3D2.7.1&amp;raw" style="width: 11px; height: 4px; vertical-align: 2px; margin-right: 0.053em;"></span><span class="mo" data-dcnode-id="3478" id="MathJax-Span-7" style="padding-left: 0.278em;"><img data-dcnode-id="3479" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Main/Regular/336/2212.png%3FV%3D2.7.1&amp;raw" style="width: 11px; height: 1px; vertical-align: 3px; margin-right: 0.08em;"></span><span class="mi" data-dcnode-id="3475" id="MathJax-Span-8" style="padding-left: 0.167em;"><img data-dcnode-id="3477" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/336/006B.png%3FV%3D2.7.1&amp;raw" style="width: 8px; height: 11px; vertical-align: 0px; margin-right: 0.017em;"><img data-dcnode-id="3476" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/fonts/HTML-CSS/TeX/png/Math/Italic/336/0064.png%3FV%3D2.7.1&amp;raw" style="width: 8px; height: 11px; vertical-align: 0px; margin-right: -0.003em;"></span></span></span></span><span data-dcnode-id="3471" style="display: inline-block; width: 0px; height: 2.184em;"></span></span></span><span data-dcnode-id="3468" style="display: inline-block; overflow: hidden; vertical-align: -0.143em; border-left: 0px solid; width: 0px; height: 0.885em;"></span></span></nobr><span class="MJX_Assistive_MathML" data-dcnode-id="3454" role="presentation"><math data-dcnode-id="3455" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="3456"><mrow data-dcnode-id="3457"><mi data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">F</span></mi><mo data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">=</span></mo><mo data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">−</span></mo><mi data-dcnode-id="3458" mathvariant="italic"><span data-dcnode-id="3459" instrument_node="">kd</span></mi></mrow></mrow></math></span></span><span data-dcnode-id="3450" instrument_node="">
</span><span class="equ" data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">E1</span></span></div><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3429" id="p6"><span data-dcnode-id="3445" instrument_node="">where the constant </span><em data-dcnode-id="3442"><italic data-dcnode-id="3443" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3444" instrument_node="">k</span></italic></em><span data-dcnode-id="3441" instrument_node=""> represents the spring constant of the spring oscillator and the strength of the trap. Therefore, when we know the motion of an object in a trap, the magnitude of the optical force can be calculated by </span><a class="ref-link" data-dcnode-id="3439" data-ref-style="disp-formula" href="#E1"><span data-dcnode-id="3440" instrument_node="">Formula 1</span></a><span data-dcnode-id="3438" instrument_node="">. However, in the more general case, we want to quantitatively analyze the optical force when the unknown object motions and then other optical theories are needed. The theoretical analysis of optical tweezers needs to be determined according to the size of the object, specifically divided into three cases: first, when the radius (</span><em data-dcnode-id="3435"><italic data-dcnode-id="3436" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3437" instrument_node="">R</span></italic></em><span data-dcnode-id="3434" instrument_node="">) of the particle is much larger than the wavelength (</span><em data-dcnode-id="3431"><italic data-dcnode-id="3432" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3433" instrument_node="">λ</span></italic></em><span data-dcnode-id="3430" instrument_node="">) of the incident light, then a simple geometric optical method can be used to analyze the force of the object; second, if the size of the particle is much smaller than the wavelength of the incident light, the particle can be equivalent to the dipole in the electric field, and a dipole approximation model is needed; and third, if the size of the particles is close to the wavelength of the light, the situation becomes complicated, and the Maxwell equation is needed to solve the problem.</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3408" id="p7"><span data-dcnode-id="3427" instrument_node="">We first analyze the Rayleigh nanoparticle (</span><em data-dcnode-id="3424"><italic data-dcnode-id="3425" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3426" instrument_node="">R&nbsp;&lt;&lt;λ</span></italic></em><span data-dcnode-id="3423" instrument_node="">). At this time, the nanoparticle can be regarded as a dipole in a nonuniform electromagnetic field, and the optical gradient force (</span><strong data-dcnode-id="3417"><bold data-dcnode-id="3418" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3422" instrument_node="">
</span><italic data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">F</span></italic><span data-dcnode-id="3419" instrument_node="">
</span></bold></strong><span data-dcnode-id="3416" instrument_node="">
</span><em data-dcnode-id="3410"><italic data-dcnode-id="3411" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="3415" instrument_node="">
</span><sub data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">grad</span></sub><span data-dcnode-id="3412" instrument_node="">

</span><h4 class="heading subsection-title" data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">1.1.2 Applications of the optical tweezers</span></h4><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1770" id="p18"><span data-dcnode-id="1774" instrument_node="">Professor Ashkin, the pioneer of optical tweezers, predicted that optical tweezers as the manipulation technology of tiny particles will be widely used in the research of molecular biology, cell biology, and mesoscopic physics, especially to promote the development of many interdisciplinary subjects [</span><a class="ref-link" data-dcnode-id="1772" data-ref-style="bibr" href="#B9"><span data-dcnode-id="1773" instrument_node="">9</span></a><span data-dcnode-id="1771" instrument_node="">]. As an example, we will introduce some of the applications of the optical tweezers in the following aspects:</span></p><span data-dcnode-id="1769" instrument_node="">
</span><div class="section" data-dcnode-id="1735" data-lvl="4" id="sec_2_4"><span data-dcnode-id="1768" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">1.1.2.1 Capture, separation, and assembly of microparticles and cells</span></h4><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1754" id="p19"><span data-dcnode-id="1764" instrument_node="">The invention of optical tweezers was used to capture and manipulate tiny particles such as polystyrene microspheres, biological cells, viruses, and bacteria [</span><a class="ref-link" data-dcnode-id="1762" data-ref-style="bibr" href="#B12"><span data-dcnode-id="1763" instrument_node="">12</span></a><span data-dcnode-id="1761" instrument_node="">]. By capturing these tiny particles, the Brownian motion of particles can be overcome and fixed in the field of the microscope for the researcher to observe and detect. When the particles are stably captured, they can be moved to a specific position and arranged in a regular pattern, which is applied to the ordered assembly of particles and cell arrays (as shown in </span><a class="ref-link" data-dcnode-id="1759" data-ref-style="fig" href="#F2"><span data-dcnode-id="1760" instrument_node="">
Figure 2a
</span></a><span data-dcnode-id="1758" instrument_node="">), giving it a specific function. Further, by measuring the mechanical properties of particles and cell array, the interaction between the particles or cells can be studied. In addition, since different types of particles and cells are affected by the magnitude and direction of optical force, separation and screening of particles and cells can be achieved. With the maturity of optical tweezer technology, the system of optical tweezers is gradually combined with Raman technology, fluorescence technology [</span><a class="ref-link" data-dcnode-id="1756" data-ref-style="bibr" href="#B13"><span data-dcnode-id="1757" instrument_node="">13</span></a><span data-dcnode-id="1755" instrument_node="">], confocal technology, and femtosecond laser technology and achieves real-time detection of captured targets, which will enrich the applications of optical tweezers in cell biology and colloidal physics.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1737" id="F2"><div class="media" data-dcnode-id="1751"><img alt="" class="figure-link" data-dcnode-id="1752" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F2.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1738"><h4 data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Figure 2.</span></h4><p data-dcnode-id="1748"></p><p data-dcnode-id="1740" id="p20" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1747" instrument_node="">Several application examples of traditional optical tweezers. (a) Order and assemble microparticles and cells. (b) Study the interaction of nucleic acid molecules using micron media balls as handles [</span><xref data-dcnode-id="1745" ref-type="bibr" rid="B10"><span data-dcnode-id="1746" instrument_node="">10</span></xref><span data-dcnode-id="1744" instrument_node="">]. (c) Rotating the microspheres using a vortex beam [</span><xref data-dcnode-id="1742" ref-type="bibr" rid="B11"><span data-dcnode-id="1743" instrument_node="">11</span></xref><span data-dcnode-id="1741" instrument_node="">]. (d) Stretching human red blood cells using a micron media ball as a handle.</span></p><p data-dcnode-id="1739"></p></figcaption></figure><span data-dcnode-id="1736" instrument_node="">
</span></div><span data-dcnode-id="1734" instrument_node="">
</span><div class="section" data-dcnode-id="1714" data-lvl="4" id="sec_3_4"><span data-dcnode-id="1733" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">1.1.2.2 Study of optical tweezers and single molecules</span></h4><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1716" id="p21"><span data-dcnode-id="1729" instrument_node="">The optical technology has a high mechanical resolution (10</span><sup data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">−12</span></sup><span data-dcnode-id="1726" instrument_node="">–10</span><sup data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">−15</span></sup><span data-dcnode-id="1723" instrument_node="">&nbsp;N), which is sufficient for the study of individual biomacromolecules. For example, the basic laws of life movement are explained by measuring the physical forces such as the tiny force of biological single molecule and the motion step size. Optical tweezer technology has become an indispensable tool for quantitatively studying life processes and transforming life activities. Since the diameter of biomolecules is generally between 1 and 10 nanometers, the optical tweezer system cannot directly observe and manipulate. In order to see a single molecule, it is necessary to combine fluorescence imaging technology; in order to manipulate a single molecule, it is necessary to connect the molecule to the microsphere and indirectly manipulate and measure by using the small microsphere as the “handle” of the manipulation. For example, the two ends of the DNA molecular chain are, respectively, connected to two microspheres, and the microspheres are manipulated by a double-beam tweezers to stretch the DNA molecular chain and measure its elastic properties (as shown in </span><a class="ref-link" data-dcnode-id="1721" data-ref-style="fig" href="#F2"><span data-dcnode-id="1722" instrument_node="">
Figure 2b
</span></a><span data-dcnode-id="1720" instrument_node="">) [</span><a class="ref-link" data-dcnode-id="1718" data-ref-style="bibr" href="#B10"><span data-dcnode-id="1719" instrument_node="">10</span></a><span data-dcnode-id="1717" instrument_node="">]. By rotating the two microspheres in the opposite direction, the binding force of the DNA molecular chain can be calculated. Using similar methods, researchers can also study the properties of various biomacromolecules: RNA transcription, kinesin movement, the role of polymerases, etc. These are the basic processes of life activities. Its high-precision measurement can reveal the basic laws of life activities and lay the foundation for the research and application of biomedicine.</span></p><span data-dcnode-id="1715" instrument_node="">
</span></div><span data-dcnode-id="1713" instrument_node="">
</span><div class="section" data-dcnode-id="1696" data-lvl="4" id="sec_4_4"><span data-dcnode-id="1712" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">1.1.2.3 Optical rotator</span></h4><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1698" id="p22"><span data-dcnode-id="1708" instrument_node="">The optical rotator is a branch of the optical tweezers that not only captures the microparticles but also allows the angular rotation of the microparticles as shown in </span><a class="ref-link" data-dcnode-id="1706" data-ref-style="fig" href="#F2"><span data-dcnode-id="1707" instrument_node="">
Figure 2c
</span></a><span data-dcnode-id="1705" instrument_node=""> [</span><a class="ref-link" data-dcnode-id="1703" data-ref-style="bibr" href="#B11"><span data-dcnode-id="1704" instrument_node="">11</span></a><span data-dcnode-id="1702" instrument_node="">]. This technique is based on the moment applied by the angular momentum of the light to the object. In order to achieve the rotation of the particles, the optical rotator requires a special beam of angular momentum, such as a Laguerre-Gauss beam [</span><a class="ref-link" data-dcnode-id="1700" data-ref-style="bibr" href="#B14"><span data-dcnode-id="1701" instrument_node="">14</span></a><span data-dcnode-id="1699" instrument_node="">]. Rotating particles or cells are used in many fields, such as rotating a tiny mechanical motor in a liquid environment to control the movement of local water flow. In addition, by rotating living cells, it can be imaged at various angles, which is beneficial to observe the full three-dimensional appearance of cells.</span></p><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span><div class="section" data-dcnode-id="1684" data-lvl="4" id="sec_5_4"><span data-dcnode-id="1694" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">1.1.2.4 Optical stretchers</span></h4><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1686" id="p23"><span data-dcnode-id="1690" instrument_node="">Stretching cells can study the elasticity of cell membranes, and the elasticity of cell membranes is closely related to many cellular diseases and can be used to reflect the activity of cells and even the health of the human body. There are many optical stretching methods based on optical tweezers, such as direct stretching of double-beam tweezers, stretching by microsphere handle, time-division multiplexed stretching, and so on. The method based on the microsphere handle-stretching method is more commonly used because of the high measurement precision. The method is shown in </span><a class="ref-link" data-dcnode-id="1688" data-ref-style="fig" href="#F2"><span data-dcnode-id="1689" instrument_node="">
Figure 2d
</span></a><span data-dcnode-id="1687" instrument_node="">: two microspheres are adhered to the cell surface by chemical coupling, and then the microspheres are controlled to move in opposite directions by the tweezers. At this time, the cell membrane is stretched by shearing force. By recording the shape variables of the cells and measuring the force of stretching the microspheres, physical parameters such as the elastic modulus of the cell membrane can be calculated.</span></p><span data-dcnode-id="1685" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span></div><span data-dcnode-id="1681" instrument_node="">
</span></div><span data-dcnode-id="1679" instrument_node="">
</span><div class="section" data-dcnode-id="1613" data-lvl="2" id="sec_8_2"><span data-dcnode-id="1678" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">1.2 Holographic optical tweezers</span></h3><span data-dcnode-id="1675" instrument_node="">
</span><div class="section" data-dcnode-id="1664" data-lvl="3" id="sec_8_3"><span data-dcnode-id="1674" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">1.2.1 Basic principles</span></h4><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1666" id="p24"><span data-dcnode-id="1670" instrument_node="">Traditional optical tweezers based on single beam can only capture and manipulate one or a few particles at a time. However, researchers want to improve the efficiency of capture, such as controlling multiple particles at the same time. Based on this goal, scientists invented holographic optical tweezers. The core component of holographic optical tweezers is a hologram element: an interference pattern formed by recording the object light and reference light through the film. The wave front can be adjusted by holographic elements to construct a light field with a specific function. The holographic optical tweezers were firstly invented in 1998 by Professor Grier of the University of Chicago and his collaborators [</span><a class="ref-link" data-dcnode-id="1668" data-ref-style="bibr" href="#B15"><span data-dcnode-id="1669" instrument_node="">15</span></a><span data-dcnode-id="1667" instrument_node="">]. They used a holographic element (diffraction grating) to split the collimated single laser beam into multiple independent beams, and then an array of grating is formed by focusing the lens to capture a large number of microparticles. The earliest holographic elements were prepared by coherent-optical interferometry, but the holographic elements obtained by this method have low diffraction efficiency and poor versatility, and thus this method has not been widely used. In order to improve diffraction efficiency and applicability, conventional holographic elements are often composed of spatial light modulators. The spatial light modulators include liquid crystal spatial light modulators, acousto-optic modulators, and digital microlens arrays. The spatial light modulator is controlled by a computer, and each focused beam can be individually controlled by changing the hologram element so that the formed trap well can be dynamically changed. Such holographic optical tweezers not only capture a plurality of microparticles at the same time but also control the movement of each microparticle to be arranged in different shapes, thereby achieving ordered assembly of the microparticles.</span></p><span data-dcnode-id="1665" instrument_node="">
</span></div><span data-dcnode-id="1663" instrument_node="">
</span><div class="section" data-dcnode-id="1615" data-lvl="3" id="sec_9_3"><span data-dcnode-id="1662" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">1.2.2 Applications of the holographic optical tweezers</span></h4><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1645" id="p25"><span data-dcnode-id="1658" instrument_node="">As an emerging optical technology, holographic optical tweezers can trap and manipulate a large number of particles, showing great application prospects in the fields of particle assembly and construction of three-dimensional cell microstructure (</span><a class="ref-link" data-dcnode-id="1656" data-ref-style="fig" href="#F3"><span data-dcnode-id="1657" instrument_node="">
Figure 3
</span></a><span data-dcnode-id="1655" instrument_node="">). For example, Glen R.&nbsp;Kirkham et&nbsp;al. of the United Kingdom used holographic optical tweezers to assemble one-, two-, and three-dimensional embryonic stem cell array structures (as shown in </span><a class="ref-link" data-dcnode-id="1653" data-ref-style="fig" href="#F4"><span data-dcnode-id="1654" instrument_node="">
Figure 4
</span></a><span data-dcnode-id="1652" instrument_node="">) to provide a new means to study the directed differentiation of stem cells [</span><a class="ref-link" data-dcnode-id="1650" data-ref-style="bibr" href="#B16"><span data-dcnode-id="1651" instrument_node="">16</span></a><span data-dcnode-id="1649" instrument_node="">]. Moreover, Jesacher and his colleagues from Austria regulated the amplitude and phase of the incident light field through a liquid crystal spatial light modulator, which not only realized trapping potential wells of special shapes such as line, cross, circle, and rectangle but also controlled the microparticle movement along a specific path. In addition, holographic optical tweezer technology can also produce beams with special modes, such as Bessel beams, Laguerre-Gauss beams, and Airy beams [</span><a class="ref-link" data-dcnode-id="1647" data-ref-style="bibr" href="#B18"><span data-dcnode-id="1648" instrument_node="">18</span></a><span data-dcnode-id="1646" instrument_node="">]. These special-mode beams have peculiar phase distribution and propagation characteristics and can generate trapped potential wells with special functions, such as rotating particles with a Laguerre-Gauss beam, which can be used to construct micro- and nano-motors and study the transfer of orbital angular momentum; Airy beam or Bessel beam can be used to transport particles for sorting different types of particles and cells.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1631" id="F3"><div class="media" data-dcnode-id="1642"><img alt="" class="figure-link" data-dcnode-id="1643" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F3.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1632"><h4 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Figure 3.</span></h4><p data-dcnode-id="1639"></p><p data-dcnode-id="1634" id="p26" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1638" instrument_node="">Bright-field optical micrographs and confocal fluorescence micrographs of one-, two-, and three-dimensional microarray structures of embryonic stem cells assembled by holographic optical tweezers [</span><xref data-dcnode-id="1636" ref-type="bibr" rid="B16"><span data-dcnode-id="1637" instrument_node="">16</span></xref><span data-dcnode-id="1635" instrument_node="">].</span></p><p data-dcnode-id="1633"></p></figcaption></figure><span data-dcnode-id="1630" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1617" id="F4"><div class="media" data-dcnode-id="1628"><img alt="" class="figure-link" data-dcnode-id="1629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F4.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1618"><h4 data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Figure 4.</span></h4><p data-dcnode-id="1625"></p><p data-dcnode-id="1620" id="p27" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1624" instrument_node="">The basic principle of the fiber-based optical tweezers. (a) Schematic diagram of the optical gradient force (Fg) and scattering force (Fs) applied to the microparticles by the fiber-based optical tweezers. (b) Simulation of electric field intensity distribution of the fiber-based optical tweezers. (c) A chain of yeast cells was trapped by the fiber-based optical tweezers [</span><xref data-dcnode-id="1622" ref-type="bibr" rid="B17"><span data-dcnode-id="1623" instrument_node="">17</span></xref><span data-dcnode-id="1621" instrument_node="">].</span></p><p data-dcnode-id="1619"></p></figcaption></figure><span data-dcnode-id="1616" instrument_node="">
</span></div><span data-dcnode-id="1614" instrument_node="">
</span></div><span data-dcnode-id="1612" instrument_node="">
</span><div class="section" data-dcnode-id="1533" data-lvl="2" id="sec_11_2"><span data-dcnode-id="1611" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">1.3 Fiber-based optical tweezers</span></h3><span data-dcnode-id="1608" instrument_node="">
</span><div class="section" data-dcnode-id="1574" data-lvl="3" id="sec_11_3"><span data-dcnode-id="1607" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">1.3.1 Basic principles</span></h4><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1587" id="p28"><span data-dcnode-id="1603" instrument_node="">Due to the low integration of conventional optical tweezer systems, it is difficult to manipulate particles located in a narrow position, such as particles inside a microfluidic channel or red blood cells in a blood vessel. The newly developed fiber-based optical tweezers are promising candidates because of its compact structure and flexible operation, which can overcome the problems of traditional optical tweezers [</span><a class="ref-link" data-dcnode-id="1601" data-ref-style="bibr" href="#B19"><span data-dcnode-id="1602" instrument_node="">19</span></a><span data-dcnode-id="1600" instrument_node="">]. Fiber-based optical tweezers use the output light from the end face of the fiber to achieve particle capture and manipulation, as shown in </span><a class="ref-link" data-dcnode-id="1598" data-ref-style="fig" href="#F5"><span data-dcnode-id="1599" instrument_node="">
Figure 5a
</span></a><span data-dcnode-id="1597" instrument_node="">. When the laser beam passes into the fiber, it converges through the end of fiber and form a highly focused beam. The microparticles located near the tip of the fiber will be captured by the longitudinal gradient force onto the optical axis of the fiber and then captured by the lateral gradient force at the focus of the emitted light or move along the optical axis under the action of optical scattering force. For fiber-based optical tweezers, the distribution of the exiting light field depends on the shape of the fiber tip, which is a highly focused beam, to create a three-dimensional trapping potential. Currently, the tip of the fiber-based optical tweezers is generally designed as a parabolic, spherical, or conical structure. Different shapes of fiber tip can be prepared by physical polishing, heating stretching, chemical etching, and femtosecond laser processing. By changing the physical parameters of the preparation method, such as temperature, speed, time, etc., the shape and size of the fiber tip can be controlled to achieve different functions. </span><a class="ref-link" data-dcnode-id="1595" data-ref-style="fig" href="#F5"><span data-dcnode-id="1596" instrument_node="">
Figure 5b
</span></a><span data-dcnode-id="1594" instrument_node=""> shows the output light field distribution of a typical tapered fiber. It can be seen that the light is concentrated at the front end of fiber so that the cells can be trapped on the axis of the front end of the fiber and arranged into an ordered structure, as shown in </span><a class="ref-link" data-dcnode-id="1592" data-ref-style="fig" href="#F5"><span data-dcnode-id="1593" instrument_node="">
Figure 5c
</span></a><span data-dcnode-id="1591" instrument_node=""> [</span><a class="ref-link" data-dcnode-id="1589" data-ref-style="bibr" href="#B17"><span data-dcnode-id="1590" instrument_node="">17</span></a><span data-dcnode-id="1588" instrument_node="">].</span></p><span data-dcnode-id="1586" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1576" id="F5"><div class="media" data-dcnode-id="1584"><img alt="" class="figure-link" data-dcnode-id="1585" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F5.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1577"><h4 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Figure 5.</span></h4><p data-dcnode-id="1581"></p><p data-dcnode-id="1579" id="p29" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1580" instrument_node="">This schematic shows a versatile fiber-based optical tweezers: number 1 indicates the capture, transport, and sorting of cells, number 2 indicates the optical stretching and deformation of cells, and numbers 3 indicates the optical rotation of cells.</span></p><p data-dcnode-id="1578"></p></figcaption></figure><span data-dcnode-id="1575" instrument_node="">
</span></div><span data-dcnode-id="1573" instrument_node="">
</span><div class="section" data-dcnode-id="1535" data-lvl="3" id="sec_12_3"><span data-dcnode-id="1572" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">1.3.2 Application of fiber-based optical tweezers</span></h4><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1551" id="p30"><span data-dcnode-id="1568" instrument_node="">Since the fiber-based optical tweezers have the advantages of simple fabrication, flexible operation, compact structure, and easy integration, it has applications in many fields. For example, Xin et&nbsp;al. used a flame heating and melting taper to prepare a fiber-based optical tweezers with a tapered tip, which enables the capture of submicron-sized polystyrene particles and </span><em data-dcnode-id="1565"><italic data-dcnode-id="1566" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1567" instrument_node="">E. coli</span></italic></em><span data-dcnode-id="1564" instrument_node=""> cells [</span><a class="ref-link" data-dcnode-id="1562" data-ref-style="bibr" href="#B20"><span data-dcnode-id="1563" instrument_node="">20</span></a><span data-dcnode-id="1561" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1559" data-ref-style="bibr" href="#B21"><span data-dcnode-id="1560" instrument_node="">21</span></a><span data-dcnode-id="1558" instrument_node="">]. Xu et&nbsp;al. realized the rotation of single silver nanowires using two tapered fibers, which provide a controlled and optical method for assembling plasmonic nanostructures [</span><a class="ref-link" data-dcnode-id="1556" data-ref-style="bibr" href="#B22"><span data-dcnode-id="1557" instrument_node="">22</span></a><span data-dcnode-id="1555" instrument_node="">]. Fiber-based optical tweezers will be developed in the direction of high integration and multifunctionality to adapt to lab-on-a-chip and in&nbsp;vivo requirements. In the future, the fiber-based optical tweezers may integrate multiple functions on a single-fiber probe, as shown in </span><a class="ref-link" data-dcnode-id="1553" data-ref-style="fig" href="#F6"><span data-dcnode-id="1554" instrument_node="">
Figure 6
</span></a><span data-dcnode-id="1552" instrument_node="">, such as simultaneously capturing, transporting, sorting, stretching, deforming, and rotating various cells and pathogens in the microfluidics or living blood.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1537" id="F6"><div class="media" data-dcnode-id="1548"><img alt="" class="figure-link" data-dcnode-id="1549" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F6.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1538"><h4 data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Figure 6.</span></h4><p data-dcnode-id="1545"></p><p data-dcnode-id="1540" id="p31" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1544" instrument_node="">Slot waveguide optical tweezers. (a) Schematic diagram of the optical gradient force and scattering force of nanoparticles in the slot waveguide. (b) A simulation result of the light intensity distribution of the slot waveguide in an aqueous environment. (c) An electron scanning micrograph of a waveguide having a slit of 100&nbsp;nm. (d) The slot waveguide captures a large number of polystyrene particles of 75&nbsp;nm in diameter in the water flow [</span><xref data-dcnode-id="1542" ref-type="bibr" rid="B23"><span data-dcnode-id="1543" instrument_node="">23</span></xref><span data-dcnode-id="1541" instrument_node="">].</span></p><p data-dcnode-id="1539"></p></figcaption></figure><span data-dcnode-id="1536" instrument_node="">
</span></div><span data-dcnode-id="1534" instrument_node="">
</span></div><span data-dcnode-id="1532" instrument_node="">
</span><div class="section" data-dcnode-id="1388" data-lvl="2" id="sec_14_2"><span data-dcnode-id="1531" instrument_node="">
</span><h3 class="heading section-title" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">1.4 Nano-optical tweezers</span></h3><span data-dcnode-id="1528" instrument_node="">
</span><div class="section" data-dcnode-id="1470" data-lvl="3" id="sec_14_3"><span data-dcnode-id="1527" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">1.4.1 Planar waveguide optical tweezers</span></h4><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1522" id="p32"><span data-dcnode-id="1523" instrument_node="">When the light is transmitted in the waveguide, an evanescent wave is generated on the surface of the waveguide due to the total reflection. The evanescent wave is limited to a near-field range of 100 nanometers from the surface of the waveguide. When a nanoparticle enters the evanescent wave, the gradient of the light intensity changes greatly in the direction perpendicular to the waveguide, so the nanoparticles will be trapped on the surface of the waveguide by a strong optical gradient force. In the direction of light propagation, the evanescent wave can be considered to be uniformly distributed. Therefore, there is no optical gravity force in this direction. Only the optical scattering force exists. The nanoparticles move along the direction of light propagation due to the optical scattering force. Therefore, planar waveguide optical tweezers are often used for the transport of nanoparticles. Moreover, since the optical waveguide device is easily integrated into the microfluidic chip, the planar waveguide optical tweezers play an important role in the field of microfluidics. Current planar waveguide optical tweezers can be classified into three types: rectangular waveguide optical tweezers, slot waveguide optical tweezers, and nanofiber waveguide optical tweezers.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1513" id="p33"><span data-dcnode-id="1520" instrument_node="">The manipulation of microparticles by a rectangular waveguide optical tweezers was first implemented by Kawata et&nbsp;al. [</span><a class="ref-link" data-dcnode-id="1518" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1519" instrument_node="">5</span></a><span data-dcnode-id="1517" instrument_node="">]. They use rectangular waveguides to perform noncontact optical transport of different sizes of microparticles. This method can deliver cells or drugs over long distances. After this groundbreaking work, more and more researchers have entered this field and designed rectangular waveguides with different structures for transporting metal particles, media particles, microbial cells, etc. [</span><a class="ref-link" data-dcnode-id="1515" data-ref-style="bibr" href="#B5"><span data-dcnode-id="1516" instrument_node="">5</span></a><span data-dcnode-id="1514" instrument_node="">].</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1501" id="p34"><span data-dcnode-id="1511" instrument_node="">Since the evanescent wave of the rectangular waveguide has limited light confinement, it is challenging for the rectangular waveguide to capture particles and biomolecules below 100&nbsp;nm. To solve this limitation, the researchers developed slot waveguide nanotweezers [</span><a class="ref-link" data-dcnode-id="1509" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1510" instrument_node="">23</span></a><span data-dcnode-id="1508" instrument_node="">]. The slot waveguide is an air slit having a width of nanometers by photolithography or electron beam etching. The large refractive index contrast between low refractive index slot and high refractive index waveguide material makes the light energy highly confined in the slot region, which produces a strong optical gradient force and scattering force on the nanoparticles entering the slot. Using this property, Yang et&nbsp;al. achieved capture and transport of polystyrene particles and DNA molecules with sizes below 100 nanometers (as shown in </span><a class="ref-link" data-dcnode-id="1506" data-ref-style="fig" href="#F7"><span data-dcnode-id="1507" instrument_node="">
Figure 7
</span></a><span data-dcnode-id="1505" instrument_node="">) [</span><a class="ref-link" data-dcnode-id="1503" data-ref-style="bibr" href="#B23"><span data-dcnode-id="1504" instrument_node="">23</span></a><span data-dcnode-id="1502" instrument_node="">].</span></p><span data-dcnode-id="1500" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1481" id="F7"><div class="media" data-dcnode-id="1498"><img alt="" class="figure-link" data-dcnode-id="1499" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F7.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1482"><h4 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Figure 7.</span></h4><p data-dcnode-id="1495"></p><p data-dcnode-id="1484" id="p35" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1494" instrument_node="">Photonic crystal optical tweezers. (a) Schematic representation of a single-dimensional photonic crystal resonator capturing a single nanoparticle [</span><xref data-dcnode-id="1492" ref-type="bibr" rid="B24"><span data-dcnode-id="1493" instrument_node="">24</span></xref><span data-dcnode-id="1491" instrument_node="">]. (b) Schematic representation of a two-dimensional photonic crystal resonator capturing a single </span><italic data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">E. coli</span></italic><span data-dcnode-id="1488" instrument_node=""> [</span><xref data-dcnode-id="1486" ref-type="bibr" rid="B25"><span data-dcnode-id="1487" instrument_node="">25</span></xref><span data-dcnode-id="1485" instrument_node="">].</span></p><p data-dcnode-id="1483"></p></figcaption></figure><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1472" id="p36"><span data-dcnode-id="1479" instrument_node="">A common problem with rectangular waveguide optical tweezers and slot waveguide optical tweezers is that they must be fixed on the substrate, making it difficult to operate. The emerging nanofiber waveguide optical tweezers can solve this problem. Li et&nbsp;al. used fibers with a diameter of 500–700&nbsp;nm to achieve stable trap, bidirectional transport, optical separation, and controlled release of nanoparticles and micro-pathogens in microfluidics [</span><a class="ref-link" data-dcnode-id="1477" data-ref-style="bibr" href="#B26"><span data-dcnode-id="1478" instrument_node="">26</span></a><span data-dcnode-id="1476" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1474" data-ref-style="bibr" href="#B27"><span data-dcnode-id="1475" instrument_node="">27</span></a><span data-dcnode-id="1473" instrument_node="">]. The nanofiber waveguide optical tweezers have the advantages of low cost, production, and large control range and have important research value and application prospects in cell transportation, drug delivery, and particle collection.</span></p><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span><div class="section" data-dcnode-id="1429" data-lvl="3" id="sec_15_3"><span data-dcnode-id="1468" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">1.4.2 Photonic crystal optical tweezers</span></h4><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1448" id="p37"><span data-dcnode-id="1464" instrument_node="">Optical tweezers based on rectangular waveguides, slot waveguides, and nanofiber waveguides can only move particles along the waveguide surface but cannot be used to stably trap nanoparticles. In order to stably capture the nanoparticles, a photonic crystal optical tweezers were developed. The photonic crystal optical tweezers are based on one- or two-dimensional photonic crystal resonator structures (as shown in </span><a class="ref-link" data-dcnode-id="1462" data-ref-style="fig" href="#F8"><span data-dcnode-id="1463" instrument_node="">
Figure 8
</span></a><span data-dcnode-id="1461" instrument_node="">) [</span><a class="ref-link" data-dcnode-id="1459" data-ref-style="bibr" href="#B24"><span data-dcnode-id="1460" instrument_node="">24</span></a><span data-dcnode-id="1458" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1456" data-ref-style="bibr" href="#B25"><span data-dcnode-id="1457" instrument_node="">25</span></a><span data-dcnode-id="1455" instrument_node="">]. When the laser that satisfies the wavelength matching condition is coupled into the photonic crystal resonator, static interference will occur in the cavity. With the resonance effect, the intensity of the light is greatly enhanced, and the size of the light spot is strongly suppressed, thereby enhancing the optical force of nanoparticles. Based on this principle, Erickson and Mandal et&nbsp;al. achieved stable capture and controlled release of nano-objects such as polystyrene particles, semiconductor quantum dots, and serum protein molecules in a liquid environment [</span><a class="ref-link" data-dcnode-id="1453" data-ref-style="bibr" href="#B30"><span data-dcnode-id="1454" instrument_node="">30</span></a><span data-dcnode-id="1452" instrument_node="">]. In addition, this method can also be used to study the angular rotation of silver nanowires or carbon nanotubes [</span><a class="ref-link" data-dcnode-id="1450" data-ref-style="bibr" href="#B31"><span data-dcnode-id="1451" instrument_node="">31</span></a><span data-dcnode-id="1449" instrument_node="">].</span></p><span data-dcnode-id="1447" instrument_node="">
</span><figure class="media-panel" data-dcnode-id="1431" id="F8"><div class="media" data-dcnode-id="1445"><img alt="" class="figure-link" data-dcnode-id="1446" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intechopen.com/media/chapter/66782/media/F8.png&amp;raw"></div><figcaption class="caption" data-dcnode-id="1432"><h4 data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Figure 8.</span></h4><p data-dcnode-id="1442"></p><p data-dcnode-id="1434" id="p38" xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><span data-dcnode-id="1441" instrument_node="">Plasmon optical tweezers. (a) Schematic diagram of a metal film having nanopores. (b) Schematic diagram of magnified metal nanopore capture nanoparticles. (c) SEM image of the metal nano-antenna structure and motion trajectory after the nanoparticles are captured. (d) Schematic representation of metal nano-antenna structures [</span><xref data-dcnode-id="1439" ref-type="bibr" rid="B28"><span data-dcnode-id="1440" instrument_node="">28</span></xref><span data-dcnode-id="1438" instrument_node="">]. (e) SEM image of a metal nano-bowtie structure. (f) Schematic diagram of metal bow nanostructure [</span><xref data-dcnode-id="1436" ref-type="bibr" rid="B29"><span data-dcnode-id="1437" instrument_node="">29</span></xref><span data-dcnode-id="1435" instrument_node="">].</span></p><p data-dcnode-id="1433"></p></figcaption></figure><span data-dcnode-id="1430" instrument_node="">
</span></div><span data-dcnode-id="1428" instrument_node="">
</span><div class="section" data-dcnode-id="1390" data-lvl="3" id="sec_16_3"><span data-dcnode-id="1427" instrument_node="">
</span><h4 class="heading subsection-title" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">1.4.3 Plasmon optical tweezers</span></h4><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1392" id="p39"><span data-dcnode-id="1423" instrument_node="">Plasmon is a near-field electromagnetic wave formed by the resonance of free electrons on a metal surface and incident photons. Under such resonance conditions, the energy of the electromagnetic field will be converted into the collective vibrational energy of the free electrons on the metal surface, thereby forming a special electromagnetic field: the light is confined to the sub-wavelength of the metal surface and greatly enhanced. The effect is called the plasmon effect. Since the plasmon effect localizes the light in the near-field range of the nanometer order, it is widely used in the fields of fluorescence signal enhancement, near-field super-resolution imaging, high-density optical storage, integrated optical circuits, etc. [</span><a class="ref-link" data-dcnode-id="1421" data-ref-style="bibr" href="#B32"><span data-dcnode-id="1422" instrument_node="">32</span></a><span data-dcnode-id="1420" instrument_node="">]. In recent years, the plasmon effect has also been applied in the field of optical trapping and manipulation. The plasmon effect is divided into two types: surface plasmon resonance (SPR) and local surface plasmon resonance (LSPR), both of which can be used to enhance optical force. Researchers used a prismatic total internal reflection to couple incident light into a metal micro-disk on the substrate, which will increase the optical force of the particle by two orders of magnitude and realize the capture of the microparticle. However, the SPR-based optical tweezers can only enhance the optical force of the particle in a two-dimensional plane. Therefore, researchers have proposed an LSPR-based nano-optical tweezers to enhance the optical force of the nanoparticle in three dimensions, including metal nanopores (</span><a class="ref-link" data-dcnode-id="1418" data-ref-style="fig" href="#F8"><span data-dcnode-id="1419" instrument_node="">
Figure 8a
</span></a><span data-dcnode-id="1417" instrument_node="">,</span><a class="ref-link" data-dcnode-id="1415" data-ref-style="fig" href="#F8"><span data-dcnode-id="1416" instrument_node="">
b
</span></a><span data-dcnode-id="1414" instrument_node="">), metal nano-antennas (</span><a class="ref-link" data-dcnode-id="1412" data-ref-style="fig" href="#F8"><span data-dcnode-id="1413" instrument_node="">
Figure 8c
</span></a><span data-dcnode-id="1411" instrument_node="">,</span><a class="ref-link" data-dcnode-id="1409" data-ref-style="fig" href="#F8"><span data-dcnode-id="1410" instrument_node="">
d
</span></a><span data-dcnode-id="1408" instrument_node="">) [</span><a class="ref-link" data-dcnode-id="1406" data-ref-style="bibr" href="#B28"><span data-dcnode-id="1407" instrument_node="">28</span></a><span data-dcnode-id="1405" instrument_node="">], metal nano-bows (</span><a class="ref-link" data-dcnode-id="1403" data-ref-style="fig" href="#F8"><span data-dcnode-id="1404" instrument_node="">
Figure 8e
</span></a><span data-dcnode-id="1402" instrument_node="">,</span><a class="ref-link" data-dcnode-id="1400" data-ref-style="fig" href="#F8"><span data-dcnode-id="1401" instrument_node="">
f
</span></a><span data-dcnode-id="1399" instrument_node="">) [</span><a class="ref-link" data-dcnode-id="1397" data-ref-style="bibr" href="#B29"><span data-dcnode-id="1398" instrument_node="">29</span></a><span data-dcnode-id="1396" instrument_node="">], and metal nano-double holes [</span><a class="ref-link" data-dcnode-id="1394" data-ref-style="bibr" href="#B33"><span data-dcnode-id="1395" instrument_node="">33</span></a><span data-dcnode-id="1393" instrument_node="">]. By using these nano-optical tweezers to achieve trapping of various nanoparticles, such as polystyrene particles, protein molecules, gold particles, micro-pathogenic bacteria, and so on.</span></p><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span></div><span data-dcnode-id="1387" instrument_node="">
</span></div><span data-dcnode-id="1385" instrument_node="">
</span><div class="section" data-dcnode-id="1077" data-lvl="1" id="sec_19"><span data-dcnode-id="1384" instrument_node="">

strument_node="">&nbsp;</span></div></div><h2 class="heading main-title" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">2. Conclusions</span></h2><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1079" id="p40"><span data-dcnode-id="1122" instrument_node="">The noncontact and noninvasive optical trapping and manipulation of microparticles, cells, and biomolecules in liquid environments has broad application prospect in the fields of biomedicine and nanomaterial science [</span><a class="ref-link" data-dcnode-id="1120" data-ref-style="bibr" href="#B34"><span data-dcnode-id="1121" instrument_node="">34</span></a><span data-dcnode-id="1119" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1117" data-ref-style="bibr" href="#B35"><span data-dcnode-id="1118" instrument_node="">35</span></a><span data-dcnode-id="1116" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1114" data-ref-style="bibr" href="#B36"><span data-dcnode-id="1115" instrument_node="">36</span></a><span data-dcnode-id="1113" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1111" data-ref-style="bibr" href="#B37"><span data-dcnode-id="1112" instrument_node="">37</span></a><span data-dcnode-id="1110" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1108" data-ref-style="bibr" href="#B38"><span data-dcnode-id="1109" instrument_node="">38</span></a><span data-dcnode-id="1107" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1105" data-ref-style="bibr" href="#B39"><span data-dcnode-id="1106" instrument_node="">39</span></a><span data-dcnode-id="1104" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1102" data-ref-style="bibr" href="#B40"><span data-dcnode-id="1103" instrument_node="">40</span></a><span data-dcnode-id="1101" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1099" data-ref-style="bibr" href="#B41"><span data-dcnode-id="1100" instrument_node="">41</span></a><span data-dcnode-id="1098" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1096" data-ref-style="bibr" href="#B42"><span data-dcnode-id="1097" instrument_node="">42</span></a><span data-dcnode-id="1095" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1093" data-ref-style="bibr" href="#B43"><span data-dcnode-id="1094" instrument_node="">43</span></a><span data-dcnode-id="1092" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1090" data-ref-style="bibr" href="#B44"><span data-dcnode-id="1091" instrument_node="">44</span></a><span data-dcnode-id="1089" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1087" data-ref-style="bibr" href="#B45"><span data-dcnode-id="1088" instrument_node="">45</span></a><span data-dcnode-id="1086" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1084" data-ref-style="bibr" href="#B46"><span data-dcnode-id="1085" instrument_node="">46</span></a><span data-dcnode-id="1083" instrument_node="">, </span><a class="ref-link" data-dcnode-id="1081" data-ref-style="bibr" href="#B47"><span data-dcnode-id="1082" instrument_node="">47</span></a><span data-dcnode-id="1080" instrument_node="">]. Traditional optical tweezers and holographic optical tweezers play an important role in the study of microscale optical manipulation. However, in the rapid development of nanoscience, traditional optical tweezers and holographic optical tweezers are difficult to adapt integration and nano-precision requirements due to the large volume and diffraction limitations. The developed nano-optical manipulation techniques, such as planar waveguides, plasmon optical tweezers, and photonic crystal resonators, can overcome the problem of difficult integration and diffraction limitations of conventional optical tweezers and holographic optical tweezers, which hold great promise in biophotonic and biomedical applications.</span></p><span data-dcnode-id="1078" instrument_node="">
