</span></p><p data-dcnode-id="4996"><span data-dcnode-id="5003" instrument_node="">For a survey of a given area, the field of view is just as important as raw light gathering power. Survey telescopes such as the </span><a class="mw-redirect" data-dcnode-id="5001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Synoptic_Survey_Telescope" title="Large Synoptic Survey Telescope"><span data-dcnode-id="5002" instrument_node="">Large Synoptic Survey Telescope</span></a><span data-dcnode-id="5000" instrument_node=""> try to maximize the product of mirror area and field of view (or </span><a data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Etendue" title="Etendue"><span data-dcnode-id="4999" instrument_node="">etendue</span></a><span data-dcnode-id="4997" instrument_node="">) rather than raw light gathering ability alone.
</span></p><span data-dcnode-id="4995" instrument_node="">
</span><h3 data-dcnode-id="4985"><span class="mw-headline" data-dcnode-id="4993" id="Magnification"><span data-dcnode-id="4994" instrument_node="">Magnification</span></span><span class="mw-editsection" data-dcnode-id="4986"><span class="mw-editsection-bracket" data-dcnode-id="4991"><span data-dcnode-id="4992" instrument_node="">[</span></span><a data-dcnode-id="4989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D10" title="Edit section: Magnification"><span data-dcnode-id="4990" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4984" instrument_node="">
</span><p data-dcnode-id="4971"><span data-dcnode-id="4983" instrument_node="">The magnification through a telescope makes an object appear larger while limiting the FOV. Magnification is often misleading as the optical power of the telescope, its characteristic is the most misunderstood term used to describe the observable world.</span><sup class="noprint Inline-Template" data-dcnode-id="4976" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="4982" instrument_node="">[</span><i data-dcnode-id="4978"><a data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="4980" title="The text near this tag may need clarification or removal of jargon. (April 2019)"><span data-dcnode-id="4981" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="4977" instrument_node="">]</span></sup><span data-dcnode-id="4975" instrument_node=""> At higher magnifications the image quality significantly reduces, usage of a </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barlow_lens" title="Barlow lens"><span data-dcnode-id="4974" instrument_node="">Barlow lens</span></a><span data-dcnode-id="4972" instrument_node=""> increases the effective focal length of an optical system—multiplies image quality reduction.
</span></p><p data-dcnode-id="4966"><span data-dcnode-id="4970" instrument_node="">Similar minor effects may be present when using </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_diagonal" title="Star diagonal"><span data-dcnode-id="4969" instrument_node="">star diagonals</span></a><span data-dcnode-id="4967" instrument_node="">, as light travels through a multitude of lenses that increase or decrease effective focal length. The quality of the image generally depends on the quality of the optics (lenses) and viewing conditions—not on magnification.
</span></p><p data-dcnode-id="4961"><span data-dcnode-id="4965" instrument_node="">Magnification itself is limited by optical characteristics. With any telescope or microscope, beyond a practical maximum magnification, the image looks bigger but shows no more detail. It occurs when the finest detail the instrument can resolve is magnified to match the finest detail the eye can see. Magnification beyond this maximum is sometimes called </span><i data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">empty magnification</span></i><span data-dcnode-id="4962" instrument_node="">.
</span></p><p data-dcnode-id="4956"><span data-dcnode-id="4960" instrument_node="">To get the most detail out of a telescope, it is critical to choose the right magnification for the object being observed. Some objects appear best at low power, some at high power, and many at a moderate magnification. There are two values for magnification, a minimum and maximum. A wider field of view </span><a data-dcnode-id="4958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4959" instrument_node="">eyepiece</span></a><span data-dcnode-id="4957" instrument_node=""> may be used to keep the same eyepiece focal length whilst providing the same magnification through the telescope. For a good quality telescope operating in good atmospheric conditions, the maximum usable magnification is limited by diffraction.
</span></p><span data-dcnode-id="4955" instrument_node="">
</span><h4 data-dcnode-id="4945"><span class="mw-headline" data-dcnode-id="4953" id="Visual"><span data-dcnode-id="4954" instrument_node="">Visual</span></span><span class="mw-editsection" data-dcnode-id="4946"><span class="mw-editsection-bracket" data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">[</span></span><a data-dcnode-id="4949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D11" title="Edit section: Visual"><span data-dcnode-id="4950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4947"><span data-dcnode-id="4948" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4944" instrument_node="">

><span data-dcnode-id="4754" instrument_node="">

</span><h4 data-dcnode-id="4414"><span class="mw-headline" data-dcnode-id="4422" id="Optimum"><span data-dcnode-id="4423" instrument_node="">Optimum</span></span><span class="mw-editsection" data-dcnode-id="4415"><span class="mw-editsection-bracket" data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">[</span></span><a data-dcnode-id="4418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D13" title="Edit section: Optimum"><span data-dcnode-id="4419" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4413" instrument_node="">
</span><p data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">A useful reference is: 
</span></p><span data-dcnode-id="4410" instrument_node="">
</span><ul data-dcnode-id="4392"><li data-dcnode-id="4405"><span data-dcnode-id="4409" instrument_node="">For small objects with low surface brightness (such as </span><a class="mw-redirect" data-dcnode-id="4407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxies" title="Galaxies"><span data-dcnode-id="4408" instrument_node="">galaxies</span></a><span data-dcnode-id="4406" instrument_node="">), use a moderate magnification.</span></li><span data-dcnode-id="4404" instrument_node="">
</span><li data-dcnode-id="4399"><span data-dcnode-id="4403" instrument_node="">For small objects with high surface brightness (such as </span><a class="mw-redirect" data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_nebulae" title="Planetary nebulae"><span data-dcnode-id="4402" instrument_node="">planetary nebulae</span></a><span data-dcnode-id="4400" instrument_node="">), use a high magnification.</span></li><span data-dcnode-id="4398" instrument_node="">
</span><li data-dcnode-id="4393"><span data-dcnode-id="4397" instrument_node="">For large objects regardless of surface brightness (such as </span><a class="mw-redirect" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffuse_nebulae" title="Diffuse nebulae"><span data-dcnode-id="4396" instrument_node="">diffuse nebulae</span></a><span data-dcnode-id="4394" instrument_node="">), use low magnification, often in the range of minimum magnification.</span></li></ul><span data-dcnode-id="4391" instrument_node="">
</span><p data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Only personal experience determines the best optimum magnifications for objects, relying on observational skills and seeing conditions.
</span></p><span data-dcnode-id="4388" instrument_node="">
</span><h3 data-dcnode-id="4378"><span class="mw-headline" data-dcnode-id="4386" id="Field_of_view"><span data-dcnode-id="4387" instrument_node="">Field of view</span></span><span class="mw-editsection" data-dcnode-id="4379"><span class="mw-editsection-bracket" data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">[</span></span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D14" title="Edit section: Field of view"><span data-dcnode-id="4383" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4363"><span data-dcnode-id="4376" instrument_node="">Field of view is the extent of the observable world seen at any given moment, through an instrument (e.g., telescope or </span><a data-dcnode-id="4374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Binoculars" title="Binoculars"><span data-dcnode-id="4375" instrument_node="">binoculars</span></a><span data-dcnode-id="4373" instrument_node="">), or by naked eye. There are various expressions of field of view, being a specification of an </span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4372" instrument_node="">eyepiece</span></a><span data-dcnode-id="4370" instrument_node=""> or a characteristic determined from an </span><a data-dcnode-id="4368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4369" instrument_node="">eyepiece</span></a><span data-dcnode-id="4367" instrument_node=""> and telescope combination. A physical limit derives from the combination where the FOV cannot be viewed larger than a defined maximum, due to </span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="4366" instrument_node="">diffraction</span></a><span data-dcnode-id="4364" instrument_node=""> of the optics.
</span></p><span data-dcnode-id="4362" instrument_node="">
</span><h4 data-dcnode-id="4352"><span class="mw-headline" data-dcnode-id="4360" id="Apparent"><span data-dcnode-id="4361" instrument_node="">Apparent</span></span><span class="mw-editsection" data-dcnode-id="4353"><span class="mw-editsection-bracket" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node="">[</span></span><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D15" title="Edit section: Apparent"><span data-dcnode-id="4357" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4343"><span data-dcnode-id="4350" instrument_node="">Apparent field of view (commonly referred to as AFOV) is the perceived angular size of the field stop of the </span><a data-dcnode-id="4348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4349" instrument_node="">eyepiece</span></a><span data-dcnode-id="4347" instrument_node="">, typically measured in </span><a data-dcnode-id="4345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Degree_%28angle%29" title="Degree (angle)"><span data-dcnode-id="4346" instrument_node="">degrees</span></a><span data-dcnode-id="4344" instrument_node="">. It is a fixed property of the eyepiece's optical design, with common commercially available eyepieces offering a range of apparent fields from 40° to 120°. The apparent field of view of an eyepiece is limited by a combination of the eyepiece's field stop diameter, and focal length, and is independent of magnification used.
</span></p><p data-dcnode-id="4338"><span data-dcnode-id="4342" instrument_node="">In an eyepiece with a very wide apparent field of view, the observer may perceive that the view through the telescope stretches out to their </span><a data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peripheral_vision" title="Peripheral vision"><span data-dcnode-id="4341" instrument_node="">peripheral vision</span></a><span data-dcnode-id="4339" instrument_node="">, giving a sensation that they are no longer looking through an eyepiece, or that they are closer to the subject of interest than they really are. In contrast, an eyepiece with a narrow apparent field of view may give the sensation of looking through a tunnel or small porthole window, with the black field stop of the eyepiece occupying most of the observer's vision. 
</span></p><p data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">A wider apparent field of view permits the observer to see more of the subject of interest (that is, a wider true field of view) without reducing magnification to do so. However, the relationship between true field of view, apparent field of view, and magnification is not direct, due to increasing distortion characteristics that correlate with wider apparent fields of view. Instead, both true field of view and apparent field of view are consequences of the eyepiece's field stop diameter.
</span></p><p data-dcnode-id="4331"><span data-dcnode-id="4335" instrument_node="">Apparent field of view differs from true field of view in so far as true field of view varies with magnification, whereas apparent field of view does not. The wider field stop of a wide angle eyepiece permits the viewing of a wider section of the </span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_image" title="Real image"><span data-dcnode-id="4334" instrument_node="">real image</span></a><span data-dcnode-id="4332" instrument_node=""> formed at the telescope's focal plane, thus impacting the calculated true field of view.
</span></p><p data-dcnode-id="4323"><span data-dcnode-id="4330" instrument_node="">An eyepiece's apparent field of view can influence total view brightness as perceived by the eye, since the apparent angular size of the field stop will determine how much of the observer's retina is illuminated by the </span><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exit_pupil" title="Exit pupil"><span data-dcnode-id="4329" instrument_node="">exit pupil</span></a><span data-dcnode-id="4327" instrument_node=""> formed by the eyepiece. However, apparent field of view has no impact on the apparent </span><a data-dcnode-id="4325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surface_brightness" title="Surface brightness"><span data-dcnode-id="4326" instrument_node="">surface brightness</span></a><span data-dcnode-id="4324" instrument_node=""> (that is, brightness per unit area) of objects contained within the field of view.
</span></p><span data-dcnode-id="4322" instrument_node="">
</span><h4 data-dcnode-id="4312"><span class="mw-headline" data-dcnode-id="4320" id="True"><span data-dcnode-id="4321" instrument_node="">True</span></span><span class="mw-editsection" data-dcnode-id="4313"><span class="mw-editsection-bracket" data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">[</span></span><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D16" title="Edit section: True"><span data-dcnode-id="4317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4311" instrument_node="">
</span><p data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">True FOV is the width of what is actually seen through any given eyepiece / telescope combination. 
</span></p><p data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">There are two formulae for calculating true field of view:
</span></p><span data-dcnode-id="4306" instrument_node="">
</span><ol data-dcnode-id="3993"><li data-dcnode-id="4163"><span data-dcnode-id="4305" instrument_node="">Apparent field of view method given by </span><span class="mwe-math-element" data-dcnode-id="4252"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="4254" style="display: none;"><math alttext="{\displaystyle v_{t}={\frac {v_{a}}{M}}}" data-dcnode-id="4255" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="4304" instrument_node="">

</span><h2 data-dcnode-id="3775"><span class="mw-headline" data-dcnode-id="3783" id="Observing_through_a_telescope"><span data-dcnode-id="3784" instrument_node="">Observing through a telescope</span></span><span class="mw-editsection" data-dcnode-id="3776"><span class="mw-editsection-bracket" data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">[</span></span><a data-dcnode-id="3779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D18" title="Edit section: Observing through a telescope"><span data-dcnode-id="3780" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3773" instrument_node="">There are many properties of optical telescopes and the complexity of observation using one can be a daunting task; experience and experimentation are the major contributors to understanding how to maximize one's observations. In practice, only two main properties of a telescope determine how observation differs: the focal length and aperture. These relate as to how the optical system views an object or range and how much light is gathered through an ocular </span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3772" instrument_node="">eyepiece</span></a><span data-dcnode-id="3770" instrument_node="">. Eyepieces further determine how the field of view and </span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3769" instrument_node="">magnification</span></a><span data-dcnode-id="3767" instrument_node=""> of the observable world change.
</span></p><span data-dcnode-id="3765" instrument_node="">
</span><h3 data-dcnode-id="3755"><span class="mw-headline" data-dcnode-id="3763" id="Observable_world"><span data-dcnode-id="3764" instrument_node="">Observable world</span></span><span class="mw-editsection" data-dcnode-id="3756"><span class="mw-editsection-bracket" data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">[</span></span><a data-dcnode-id="3759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D19" title="Edit section: Observable world"><span data-dcnode-id="3760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3740"><span data-dcnode-id="3753" instrument_node="">The observable world is what can be seen using a telescope. When viewing an object or range, the observer may use many different techniques. Understanding what can be viewed and how to view it depends on the field of view. Viewing an object at a size that fits entirely in the field of view is measured using the two telescope properties—focal length and aperture, with the inclusion of an ocular </span><a data-dcnode-id="3751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3752" instrument_node="">eyepiece</span></a><span data-dcnode-id="3750" instrument_node=""> with suitable focal length (or diameter). Comparing the observable world and the </span><a data-dcnode-id="3748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angular_diameter" title="Angular diameter"><span data-dcnode-id="3749" instrument_node="">angular diameter</span></a><span data-dcnode-id="3747" instrument_node=""> of an object shows how much of the object we see. However, the relationship with the optical system may not result in high </span><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surface_brightness" title="Surface brightness"><span data-dcnode-id="3746" instrument_node="">surface brightness</span></a><span data-dcnode-id="3744" instrument_node="">. Celestial objects are often dim because of their vast distance, and detail may be limited by </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="3743" instrument_node="">diffraction</span></a><span data-dcnode-id="3741" instrument_node=""> or unsuitable optical properties.
</span></p><span data-dcnode-id="3739" instrument_node="">
</span><h3 data-dcnode-id="3729"><span class="mw-headline" data-dcnode-id="3737" id="Field_of_view_and_magnification_relationship"><span data-dcnode-id="3738" instrument_node="">Field of view and magnification relationship</span></span><span class="mw-editsection" data-dcnode-id="3730"><span class="mw-editsection-bracket" data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">[</span></span><a data-dcnode-id="3733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D20" title="Edit section: Field of view and magnification relationship"><span data-dcnode-id="3734" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3728" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3727" instrument_node="">Finding what can be seen through the optical system begins with the </span><a data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3726" instrument_node="">eyepiece</span></a><span data-dcnode-id="3724" instrument_node=""> providing the field of view and </span><a data-dcnode-id="3722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3723" instrument_node="">magnification</span></a><span data-dcnode-id="3721" instrument_node="">; the magnification is given by the division of the telescope and eyepiece focal lengths. Using an example of an amateur telescope such as a </span><a data-dcnode-id="3719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newtonian_telescope" title="Newtonian telescope"><span data-dcnode-id="3720" instrument_node="">Newtonian telescope</span></a><span data-dcnode-id="3718" instrument_node=""> with an aperture </span><span class="mwe-math-element" data-dcnode-id="3698"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="3700" style="display: none;"><math alttext="{\displaystyle D}" data-dcnode-id="3701" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="3717" instrument_node="">

</span></p><span data-dcnode-id="3449" instrument_node="">
</span><h3 data-dcnode-id="3439"><span class="mw-headline" data-dcnode-id="3447" id="Brightness_factor"><span data-dcnode-id="3448" instrument_node="">Brightness factor</span></span><span class="mw-editsection" data-dcnode-id="3440"><span class="mw-editsection-bracket" data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">[</span></span><a data-dcnode-id="3443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D21" title="Edit section: Brightness factor"><span data-dcnode-id="3444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3438" instrument_node="">
</span><p data-dcnode-id="3427"><span data-dcnode-id="3437" instrument_node="">The </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surface_brightness" title="Surface brightness"><span data-dcnode-id="3436" instrument_node="">surface brightness</span></a><span data-dcnode-id="3434" instrument_node=""> at such a magnification significantly reduces, resulting in a far dimmer appearance. A dimmer appearance results in less visual detail of the object. Details such as matter, rings, spiral arms, and gases may be completely hidden from the observer, giving a far less </span><i data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">complete</span></i><span data-dcnode-id="3431" instrument_node=""> view of the object or range. Physics dictates that at the theoretical minimum magnification of the telescope, the surface brightness is at 100%. Practically, however, various factors prevent 100% brightness; these include telescope limitations (focal length, </span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3430" instrument_node="">eyepiece</span></a><span data-dcnode-id="3428" instrument_node=""> focal length, etc.) and the age of the observer.
</span></p><p data-dcnode-id="3292"><span data-dcnode-id="3426" instrument_node="">Age plays a role in brightness, as a contributing factor is the observer's </span><a data-dcnode-id="3424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pupil" title="Pupil"><span data-dcnode-id="3425" instrument_node="">pupil</span></a><span data-dcnode-id="3423" instrument_node="">. With age the pupil naturally shrinks in diameter; generally accepted a young adult may have a 7&nbsp;mm diameter pupil, an older adult as little as 5&nbsp;mm, and a younger person larger at 9&nbsp;mm. The </span><a data-dcnode-id="3421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3422" instrument_node="">minimum magnification</span></a><span data-dcnode-id="3420" instrument_node=""> </span><span class="mwe-math-element" data-dcnode-id="3400"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="3402" style="display: none;"><math alttext="{\displaystyle m}" data-dcnode-id="3403" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="3419" instrument_node="">

</span></p><p data-dcnode-id="3235"><span data-dcnode-id="3291" instrument_node="">Some telescopes cannot achieve the theoretical surface brightness of 100%, while some telescopes can achieve it using a very small-diameter eyepiece. To find what eyepiece is required to get </span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3290" instrument_node="">minimum magnification</span></a><span data-dcnode-id="3288" instrument_node=""> one can rearrange the magnification formula, where it is now the division of the telescope's focal length over the minimum magnification: </span><span class="mwe-math-element" data-dcnode-id="3237"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="3239" style="display: none;"><math alttext="{\displaystyle {\frac {F}{m}}={\frac {650}{18.6}}\approx 35}" data-dcnode-id="3240" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="3287" instrument_node="">

</span><h2 data-dcnode-id="2265"><span class="mw-headline" data-dcnode-id="2273" id="Imperfect_images"><span data-dcnode-id="2274" instrument_node="">Imperfect images</span></span><span class="mw-editsection" data-dcnode-id="2266"><span class="mw-editsection-bracket" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">[</span></span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D24" title="Edit section: Imperfect images"><span data-dcnode-id="2270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2263" instrument_node="">No telescope can form a perfect image. Even if a reflecting telescope could have a perfect mirror, or a refracting telescope could have a perfect lens, the effects of aperture diffraction are unavoidable. In reality, perfect mirrors and perfect lenses do not exist, so image </span><a class="mw-redirect" data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aberration_in_optical_systems" title="Aberration in optical systems"><span data-dcnode-id="2262" instrument_node="">aberrations</span></a><span data-dcnode-id="2260" instrument_node=""> in addition to aperture diffraction must be taken into account. Image aberrations can be broken down into two main classes, monochromatic, and polychromatic. In 1857, </span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philipp_Ludwig_von_Seidel" title="Philipp Ludwig von Seidel"><span data-dcnode-id="2259" instrument_node="">Philipp Ludwig von Seidel</span></a><span data-dcnode-id="2257" instrument_node=""> (1821–1896) decomposed the first order monochromatic aberrations into five constituent aberrations. They are now commonly referred to as the five Seidel Aberrations.
</span></p><span data-dcnode-id="2255" instrument_node="">
</span><h3 data-dcnode-id="2245"><span class="mw-headline" data-dcnode-id="2253" id="The_five_Seidel_aberrations"><span data-dcnode-id="2254" instrument_node="">The five Seidel aberrations</span></span><span class="mw-editsection" data-dcnode-id="2246"><span class="mw-editsection-bracket" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">[</span></span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D25" title="Edit section: The five Seidel aberrations"><span data-dcnode-id="2250" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2244" instrument_node="">
</span><link data-dcnode-id="2243" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2239" role="note"><span data-dcnode-id="2242" instrument_node="">Main article: </span><a data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_aberration" title="Optical aberration"><span data-dcnode-id="2241" instrument_node="">Optical aberration</span></a></div><span data-dcnode-id="2238" instrument_node="">
</span><dl data-dcnode-id="2196"><dt data-dcnode-id="2235"><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="2237" instrument_node="">Spherical aberration</span></a></dt><span data-dcnode-id="2234" instrument_node="">
</span><dd data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">The difference in focal length between paraxial rays and marginal rays, proportional to the square of the objective diameter.</span></dd><span data-dcnode-id="2231" instrument_node="">
</span><dt data-dcnode-id="2228"><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coma_%28optics%29" title="Coma (optics)"><span data-dcnode-id="2230" instrument_node="">Coma</span></a></dt><span data-dcnode-id="2227" instrument_node="">
</span><dd data-dcnode-id="2222"><span data-dcnode-id="2226" instrument_node="">A defect by which points appear as comet-like asymmetrical patches of light with tails, which makes measurement very imprecise. Its magnitude is usually deduced from the </span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_sine_theorem" title="Optical sine theorem"><span data-dcnode-id="2225" instrument_node="">optical sine theorem</span></a><span data-dcnode-id="2223" instrument_node="">.</span></dd><span data-dcnode-id="2221" instrument_node="">
</span><dt data-dcnode-id="2218"><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astigmatism_%28optical_systems%29" title="Astigmatism (optical systems)"><span data-dcnode-id="2220" instrument_node="">Astigmatism</span></a></dt><span data-dcnode-id="2217" instrument_node="">
</span><dd data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The image of a point forms focal lines at the sagittal and tangental foci and in between (in the absence of coma) an elliptical shape.</span></dd><span data-dcnode-id="2214" instrument_node="">
</span><dt data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Curvature of Field</span></dt><span data-dcnode-id="2211" instrument_node="">
</span><dd data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node="">The </span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petzval_field_curvature" title="Petzval field curvature"><span data-dcnode-id="2209" instrument_node="">Petzval field curvature</span></a><span data-dcnode-id="2207" instrument_node=""> means that the image, instead of lying in a plane, actually lies on a curved surface, described as hollow or round. This causes problems when a flat imaging device is used e.g., a photographic plate or CCD image sensor.</span></dd><span data-dcnode-id="2205" instrument_node="">
</span><dt data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Distortion</span></dt><span data-dcnode-id="2202" instrument_node="">
</span><dd data-dcnode-id="2197"><span data-dcnode-id="2201" instrument_node="">Either barrel or pincushion, a radial distortion that must be corrected when combining multiple images (similar to stitching multiple photos into a </span><a data-dcnode-id="2199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panoramic_photography" title="Panoramic photography"><span data-dcnode-id="2200" instrument_node="">panoramic photo</span></a><span data-dcnode-id="2198" instrument_node="">).</span></dd></dl><span data-dcnode-id="2195" instrument_node="">
</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Optical defects are always listed in the above order, since this expresses their interdependence as first order aberrations via moves of the exit/entrance pupils. The first Seidel aberration, Spherical Aberration, is independent of the position of the exit pupil (as it is the same for axial and extra-axial pencils). The second, coma, changes as a function of pupil distance and spherical aberration, hence the well-known result that it is impossible to correct the coma in a lens free of spherical aberration by simply moving the pupil. Similar dependencies affect the remaining aberrations in the list.
</span></p><span data-dcnode-id="2192" instrument_node="">
</span><h3 data-dcnode-id="2182"><span class="mw-headline" data-dcnode-id="2190" id="Chromatic_aberrations"><span data-dcnode-id="2191" instrument_node="">Chromatic aberrations</span></span><span class="mw-editsection" data-dcnode-id="2183"><span class="mw-editsection-bracket" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">[</span></span><a data-dcnode-id="2186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D26" title="Edit section: Chromatic aberrations"><span data-dcnode-id="2187" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2181" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2172"><div class="thumbinner" data-dcnode-id="2173" style="width:222px;"><a class="image" data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AComparison_axial_lateral_chromatic_aberration.svg"><img alt="" class="thumbimage" data-dcnode-id="2180" data-file-height="256" data-file-width="512" decoding="async" height="110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Comparison_axial_lateral_chromatic_aberration.svg/220px-Comparison_axial_lateral_chromatic_aberration.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Comparison_axial_lateral_chromatic_aberration.svg/330px-Comparison_axial_lateral_chromatic_aberration.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Comparison_axial_lateral_chromatic_aberration.svg/440px-Comparison_axial_lateral_chromatic_aberration.svg.png 2x" width="220"></a><span data-dcnode-id="2178" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2174"><div class="magnify" data-dcnode-id="2176"><a class="internal" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AComparison_axial_lateral_chromatic_aberration.svg" title="Enlarge"></a></div><span data-dcnode-id="2175" instrument_node="">Comparison of an ideal image of a ring (1) and ones with only axial (2) and only transverse (3) chromatic aberration</span></div></div></div><span data-dcnode-id="2171" instrument_node="">
</span><dl data-dcnode-id="2162"><dd data-dcnode-id="2166"><span data-dcnode-id="2170" instrument_node="">Longitudinal </span><a data-dcnode-id="2168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="2169" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="2167" instrument_node="">: As with spherical aberration this is the same for axial and oblique pencils.</span></dd><span data-dcnode-id="2165" instrument_node="">
</span><dd data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Transverse chromatic aberration (chromatic aberration of magnification)</span></dd></dl><span data-dcnode-id="2161" instrument_node="">
</span><h2 data-dcnode-id="2151"><span class="mw-headline" data-dcnode-id="2159" id="Astronomical_research_telescopes"><span data-dcnode-id="2160" instrument_node="">Astronomical research telescopes</span></span><span class="mw-editsection" data-dcnode-id="2152"><span class="mw-editsection-bracket" data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">[</span></span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D27" title="Edit section: Astronomical research telescopes"><span data-dcnode-id="2156" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2150" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2135"><div class="thumbinner" data-dcnode-id="2136" style="width:222px;"><a class="image" data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATwo_Unit_Telescopes_VLT.jpg"><img alt="" class="thumbimage" data-dcnode-id="2149" data-file-height="2832" data-file-width="4256" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Two_Unit_Telescopes_VLT.jpg/220px-Two_Unit_Telescopes_VLT.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Two_Unit_Telescopes_VLT.jpg/330px-Two_Unit_Telescopes_VLT.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Two_Unit_Telescopes_VLT.jpg/440px-Two_Unit_Telescopes_VLT.jpg 2x" width="220"></a><span data-dcnode-id="2147" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2137"><div class="magnify" data-dcnode-id="2145"><a class="internal" data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATwo_Unit_Telescopes_VLT.jpg" title="Enlarge"></a></div><span data-dcnode-id="2144" instrument_node="">Two of the four Unit Telescopes that make up the </span><a class="mw-redirect" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ESO" title="ESO"><span data-dcnode-id="2143" instrument_node="">ESO</span></a><span data-dcnode-id="2141" instrument_node="">'s </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Large_Telescope" title="Very Large Telescope"><span data-dcnode-id="2140" instrument_node="">VLT</span></a><span data-dcnode-id="2138" instrument_node="">, on a remote mountaintop, 2600 metres above sea level in the Chilean Atacama Desert.</span></div></div></div><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2133" instrument_node="">Optical telescopes have been used in astronomical research since the time of their invention in the early 17th century. Many types have been constructed over the years depending on the optical technology, such as refracting and reflecting, the nature of the light or object being imaged, and even where they are placed, such as </span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_telescope" title="Space telescope"><span data-dcnode-id="2132" instrument_node="">space telescopes</span></a><span data-dcnode-id="2130" instrument_node="">. Some are classified by the task they perform such as </span><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_telescope" title="Solar telescope"><span data-dcnode-id="2129" instrument_node="">Solar telescopes</span></a><span data-dcnode-id="2127" instrument_node="">.
</span></p><span data-dcnode-id="2125" instrument_node="">
</span><h3 data-dcnode-id="2115"><span class="mw-headline" data-dcnode-id="2123" id="Large_reflectors"><span data-dcnode-id="2124" instrument_node="">Large reflectors</span></span><span class="mw-editsection" data-dcnode-id="2116"><span class="mw-editsection-bracket" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">[</span></span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D28" title="Edit section: Large reflectors"><span data-dcnode-id="2120" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Nearly all large research-grade astronomical telescopes are reflectors. Some reasons are: 
</span></p><span data-dcnode-id="2111" instrument_node="">
</span><ul data-dcnode-id="2093"><li data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">In a lens the entire volume of material has to be free of imperfection and inhomogeneities, whereas in a mirror, only one surface has to be perfectly polished.</span></li><span data-dcnode-id="2108" instrument_node="">
</span><li data-dcnode-id="2103"><span data-dcnode-id="2107" instrument_node="">Light of different colors travels through a medium other than vacuum at different speeds. This causes </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="2106" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="2104" instrument_node="">.</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2097"><span data-dcnode-id="2101" instrument_node="">Reflectors work in a wider </span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spectrum" title="Spectrum"><span data-dcnode-id="2100" instrument_node="">spectrum</span></a><span data-dcnode-id="2098" instrument_node=""> of light since certain wavelengths are absorbed when passing through glass elements like those found in a refractor or catadioptric.</span></li><span data-dcnode-id="2096" instrument_node="">
</span><li data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">There are technical difficulties involved in manufacturing and manipulating large-diameter lenses. One of them is that all real materials sag in gravity. A lens can only be held by its perimeter. A mirror, on the other hand, can be supported by the whole side opposite to its reflecting face.</span></li></ul><span data-dcnode-id="2092" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="2083"><div class="thumbinner" data-dcnode-id="2084" style="width:222px;"><a class="image" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AComparison_optical_telescope_primary_mirrors.svg"><img alt="" class="thumbimage" data-dcnode-id="2091" data-file-height="536" data-file-width="512" decoding="async" height="230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Comparison_optical_telescope_primary_mirrors.svg/220px-Comparison_optical_telescope_primary_mirrors.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Comparison_optical_telescope_primary_mirrors.svg/330px-Comparison_optical_telescope_primary_mirrors.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Comparison_optical_telescope_primary_mirrors.svg/440px-Comparison_optical_telescope_primary_mirrors.svg.png 2x" width="220"></a><span data-dcnode-id="2089" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2085"><div class="magnify" data-dcnode-id="2087"><a class="internal" data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AComparison_optical_telescope_primary_mirrors.svg" title="Enlarge"></a></div><span data-dcnode-id="2086" instrument_node="">Comparison of nominal sizes of primary mirrors of some notable optical telescopes</span></div></div></div><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2081" instrument_node="">Most large research reflectors operate at different focal planes, depending on the type and size of the instrument being used. These including the </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope%23Prime_focus" title="Reflecting telescope"><span data-dcnode-id="2080" instrument_node="">prime focus</span></a><span data-dcnode-id="2078" instrument_node=""> of the main mirror, the </span><a class="mw-redirect" data-dcnode-id="2076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassegrain_telescope" title="Cassegrain telescope"><span data-dcnode-id="2077" instrument_node="">cassegrain focus</span></a><span data-dcnode-id="2075" instrument_node=""> (light bounced back down behind the primary mirror), and even external to the telescope all together (such as the </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope%23Nasmyth_and_coud%25C3%25A9_focus" title="Reflecting telescope"><span data-dcnode-id="2074" instrument_node="">Nasmyth and coudé focus</span></a><span data-dcnode-id="2072" instrument_node="">).</span><sup class="reference" data-dcnode-id="2069" id="cite_ref-28"><a data-dcnode-id="2070" href="#cite_note-28"><span data-dcnode-id="2071" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2068" instrument_node="">
</span></p><p data-dcnode-id="2056"><span data-dcnode-id="2066" instrument_node="">A new era of telescope making was inaugurated by the </span><a class="mw-redirect" data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiple_Mirror_Telescope" title="Multiple Mirror Telescope"><span data-dcnode-id="2065" instrument_node="">Multiple Mirror Telescope</span></a><span data-dcnode-id="2063" instrument_node=""> (MMT), with a mirror composed of six segments synthesizing a mirror of 4.5 </span><a data-dcnode-id="2061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Metre" title="Metre"><span data-dcnode-id="2062" instrument_node="">meters</span></a><span data-dcnode-id="2060" instrument_node=""> diameter. This has now been replaced by a single 6.5 m mirror. Its example was followed by the </span><a class="mw-redirect" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keck_telescope" title="Keck telescope"><span data-dcnode-id="2059" instrument_node="">Keck telescopes</span></a><span data-dcnode-id="2057" instrument_node=""> with 10 m segmented mirrors.
</span></p><p data-dcnode-id="2048"><span data-dcnode-id="2055" instrument_node="">The largest current ground-based telescopes have a </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_mirror" title="Primary mirror"><span data-dcnode-id="2054" instrument_node="">primary mirror</span></a><span data-dcnode-id="2052" instrument_node=""> of between 6 and 11 meters in diameter. In this generation of telescopes, the mirror is usually very thin, and is kept in an optimal shape by an array of actuators (see </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_optics" title="Active optics"><span data-dcnode-id="2051" instrument_node="">active optics</span></a><span data-dcnode-id="2049" instrument_node="">). This technology has driven new designs for future telescopes with diameters of 30, 50 and even 100 meters.
</span></p><span data-dcnode-id="2047" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2033"><div class="thumbinner" data-dcnode-id="2034" style="width:222px;"><a class="image" data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSA_harlan_j_smith_telescope_TX.jpg"><img alt="" class="thumbimage" data-dcnode-id="2046" data-file-height="2272" data-file-width="1704" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/31/USA_harlan_j_smith_telescope_TX.jpg/220px-USA_harlan_j_smith_telescope_TX.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/31/USA_harlan_j_smith_telescope_TX.jpg/330px-USA_harlan_j_smith_telescope_TX.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/31/USA_harlan_j_smith_telescope_TX.jpg/440px-USA_harlan_j_smith_telescope_TX.jpg 2x" width="220"></a><span data-dcnode-id="2044" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2035"><div class="magnify" data-dcnode-id="2042"><a class="internal" data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AUSA_harlan_j_smith_telescope_TX.jpg" title="Enlarge"></a></div><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harlan_J._Smith_Telescope" title="Harlan J. Smith Telescope"><span data-dcnode-id="2041" instrument_node="">Harlan J. Smith Telescope</span></a><span data-dcnode-id="2039" instrument_node=""> reflecting telescope at </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/McDonald_Observatory" title="McDonald Observatory"><span data-dcnode-id="2038" instrument_node="">McDonald Observatory</span></a><span data-dcnode-id="2036" instrument_node="">, Texas</span></div></div></div><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2031" instrument_node="">Relatively cheap, mass-produced ~2 meter telescopes have recently been developed and have made a significant impact on astronomy research. These allow many astronomical targets to be monitored continuously, and for large areas of sky to be surveyed. Many are </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robotic_telescope" title="Robotic telescope"><span data-dcnode-id="2030" instrument_node="">robotic telescopes</span></a><span data-dcnode-id="2028" instrument_node="">, computer controlled over the internet (see </span><i data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">e.g.</span></i><span data-dcnode-id="2025" instrument_node=""> the </span><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liverpool_Telescope" title="Liverpool Telescope"><span data-dcnode-id="2024" instrument_node="">Liverpool Telescope</span></a><span data-dcnode-id="2022" instrument_node=""> and the </span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faulkes_Telescope_North" title="Faulkes Telescope North"><span data-dcnode-id="2021" instrument_node="">Faulkes Telescope North</span></a><span data-dcnode-id="2019" instrument_node=""> and </span><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faulkes_Telescope_South" title="Faulkes Telescope South"><span data-dcnode-id="2018" instrument_node="">South</span></a><span data-dcnode-id="2016" instrument_node="">), allowing automated follow-up of astronomical events.
</span></p><p data-dcnode-id="1998"><span data-dcnode-id="2014" instrument_node="">Initially the </span><a class="mw-redirect" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detector" title="Detector"><span data-dcnode-id="2013" instrument_node="">detector</span></a><span data-dcnode-id="2011" instrument_node=""> used in telescopes was the </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_eye" title="Human eye"><span data-dcnode-id="2010" instrument_node="">human eye</span></a><span data-dcnode-id="2008" instrument_node="">. Later, the sensitized </span><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photographic_plate" title="Photographic plate"><span data-dcnode-id="2007" instrument_node="">photographic plate</span></a><span data-dcnode-id="2005" instrument_node=""> took its place, and the </span><a class="mw-redirect" data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spectrograph" title="Spectrograph"><span data-dcnode-id="2004" instrument_node="">spectrograph</span></a><span data-dcnode-id="2002" instrument_node=""> was introduced, allowing the gathering of spectral information. After the photographic plate, successive generations of electronic detectors, such as the </span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charge-coupled_device" title="Charge-coupled device"><span data-dcnode-id="2001" instrument_node="">charge-coupled device</span></a><span data-dcnode-id="1999" instrument_node=""> (CCDs), have been perfected, each with more sensitivity and resolution, and often with a wider wavelength coverage.
</span></p><p data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Current research telescopes have several instruments to choose from such as: 
</span></p><span data-dcnode-id="1995" instrument_node="">
</span><ul data-dcnode-id="1983"><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">imagers, of different spectral responses</span></li><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">spectrographs, useful in different regions of the spectrum</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1984"><span data-dcnode-id="1988" instrument_node="">polarimeters, that detect light </span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarization_%28waves%29" title="Polarization (waves)"><span data-dcnode-id="1987" instrument_node="">polarization</span></a><span data-dcnode-id="1985" instrument_node="">.</span></li></ul><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1953"><span data-dcnode-id="1981" instrument_node="">The phenomenon of optical </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction" title="Diffraction"><span data-dcnode-id="1980" instrument_node="">diffraction</span></a><span data-dcnode-id="1978" instrument_node=""> sets a limit to the resolution and image quality that a telescope can achieve, which is the effective area of the </span><a class="mw-redirect" data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airy_disc" title="Airy disc"><span data-dcnode-id="1977" instrument_node="">Airy disc</span></a><span data-dcnode-id="1975" instrument_node="">, which limits how close two such discs can be placed. This absolute limit is called the </span><a class="mw-redirect" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diffraction_limit" title="Diffraction limit"><span data-dcnode-id="1974" instrument_node="">diffraction limit</span></a><span data-dcnode-id="1972" instrument_node=""> (and may be approximated by the </span><a class="mw-redirect" data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rayleigh_criterion" title="Rayleigh criterion"><span data-dcnode-id="1971" instrument_node="">Rayleigh criterion</span></a><span data-dcnode-id="1969" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawes_limit" title="Dawes limit"><span data-dcnode-id="1968" instrument_node="">Dawes limit</span></a><span data-dcnode-id="1966" instrument_node=""> or </span><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sparrow%2527s_resolution_limit" title="Sparrow's resolution limit"><span data-dcnode-id="1965" instrument_node="">Sparrow's resolution limit</span></a><span data-dcnode-id="1963" instrument_node="">). This limit depends on the wavelength of the studied light (so that the limit for red light comes much earlier than the limit for blue light) and on the </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diameter" title="Diameter"><span data-dcnode-id="1962" instrument_node="">diameter</span></a><span data-dcnode-id="1960" instrument_node=""> of the telescope mirror. This means that a telescope with a certain mirror diameter can theoretically resolve up to a certain limit at a certain wavelength. For conventional telescopes on Earth, the diffraction limit is not relevant for telescopes bigger than about 10&nbsp;cm. Instead, the </span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_seeing" title="Astronomical seeing"><span data-dcnode-id="1959" instrument_node="">seeing</span></a><span data-dcnode-id="1957" instrument_node="">, or blur caused by the atmosphere, sets the resolution limit. But in space, or if </span><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="1956" instrument_node="">adaptive optics</span></a><span data-dcnode-id="1954" instrument_node=""> are used, then reaching the diffraction limit is sometimes possible. At this point, if greater resolution is needed at that wavelength, a wider mirror has to be built or aperture synthesis performed using an array of nearby telescopes.
</span></p><p data-dcnode-id="1939"><span data-dcnode-id="1952" instrument_node="">In recent years, a number of technologies to overcome the distortions caused by </span><a class="mw-redirect" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth%2527s_atmosphere" title="Earth's atmosphere"><span data-dcnode-id="1951" instrument_node="">atmosphere</span></a><span data-dcnode-id="1949" instrument_node=""> on ground-based telescopes have been developed, with good results. See </span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="1948" instrument_node="">adaptive optics</span></a><span data-dcnode-id="1946" instrument_node="">, </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speckle_imaging" title="Speckle imaging"><span data-dcnode-id="1945" instrument_node="">speckle imaging</span></a><span data-dcnode-id="1943" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_interferometry%23Astronomical_optical_interferometry" title="Optical interferometry"><span data-dcnode-id="1942" instrument_node="">optical interferometry</span></a><span data-dcnode-id="1940" instrument_node="">.
</span></p><span data-dcnode-id="1938" instrument_node="">
