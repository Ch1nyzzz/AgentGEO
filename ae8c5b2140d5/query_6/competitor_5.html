</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="633" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="642"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="7501" style="display:none"><span data-dcnode-id="7502" instrument_node="">Telescope for observations with visible light</span></div><span data-dcnode-id="7500" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7488"><div class="thumbinner" data-dcnode-id="7489" style="width:222px;"><a class="image" data-dcnode-id="7498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALargeBinoTelescope_NASA%25C2%25BD.jpg"><img alt="" class="thumbimage" data-dcnode-id="7499" data-file-height="1300" data-file-width="1100" decoding="async" height="260" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/94/LargeBinoTelescope_NASA%25C2%25BD.jpg/220px-LargeBinoTelescope_NASA%25C2%25BD.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/94/LargeBinoTelescope_NASA%C2%BD.jpg/330px-LargeBinoTelescope_NASA%C2%BD.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/94/LargeBinoTelescope_NASA%C2%BD.jpg/440px-LargeBinoTelescope_NASA%C2%BD.jpg 2x" width="220"></a><span data-dcnode-id="7497" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7490"><div class="magnify" data-dcnode-id="7495"><a class="internal" data-dcnode-id="7496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALargeBinoTelescope_NASA%25C2%25BD.jpg" title="Enlarge"></a></div><span data-dcnode-id="7494" instrument_node="">The </span><a data-dcnode-id="7492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Binocular_Telescope" title="Large Binocular Telescope"><span data-dcnode-id="7493" instrument_node="">Large Binocular Telescope</span></a><span data-dcnode-id="7491" instrument_node=""> uses two curved mirrors to gather light</span></div></div></div><span data-dcnode-id="7487" instrument_node="">
</span><p data-dcnode-id="7458"><span data-dcnode-id="7486" instrument_node="">An </span><b data-dcnode-id="7484"><span data-dcnode-id="7485" instrument_node="">optical telescope</span></b><span data-dcnode-id="7483" instrument_node=""> is a </span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="7482" instrument_node="">telescope</span></a><span data-dcnode-id="7480" instrument_node=""> that gathers and </span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focus_%28optics%29" title="Focus (optics)"><span data-dcnode-id="7479" instrument_node="">focuses</span></a><span data-dcnode-id="7477" instrument_node=""> </span><a data-dcnode-id="7475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="7476" instrument_node="">light</span></a><span data-dcnode-id="7474" instrument_node=""> mainly from the </span><a data-dcnode-id="7472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visible_spectrum" title="Visible spectrum"><span data-dcnode-id="7473" instrument_node="">visible</span></a><span data-dcnode-id="7471" instrument_node=""> part of the </span><a data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetic_spectrum" title="Electromagnetic spectrum"><span data-dcnode-id="7470" instrument_node="">electromagnetic spectrum</span></a><span data-dcnode-id="7468" instrument_node="">, to create a </span><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="7467" instrument_node="">magnified</span></a><span data-dcnode-id="7465" instrument_node=""> image for direct visual inspection, to make a </span><a data-dcnode-id="7463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photograph" title="Photograph"><span data-dcnode-id="7464" instrument_node="">photograph</span></a><span data-dcnode-id="7462" instrument_node="">, or to collect data through electronic </span><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Image_sensor" title="Image sensor"><span data-dcnode-id="7461" instrument_node="">image sensors</span></a><span data-dcnode-id="7459" instrument_node="">.
</span></p><p data-dcnode-id="7456"><span data-dcnode-id="7457" instrument_node="">There are three primary types of optical telescope:
</span></p><span data-dcnode-id="7455" instrument_node="">
</span><ul data-dcnode-id="7425"><li data-dcnode-id="7442"><a data-dcnode-id="7453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope" title="Refracting telescope"><span data-dcnode-id="7454" instrument_node="">Refracting telescopes</span></a><span data-dcnode-id="7452" instrument_node="">, which use </span><a class="mw-redirect" data-dcnode-id="7450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="7451" instrument_node="">lenses</span></a><span data-dcnode-id="7449" instrument_node=""> and less commonly also </span><a data-dcnode-id="7447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prism" title="Prism"><span data-dcnode-id="7448" instrument_node="">prisms</span></a><span data-dcnode-id="7446" instrument_node=""> (</span><a data-dcnode-id="7444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dioptrics" title="Dioptrics"><span data-dcnode-id="7445" instrument_node="">dioptrics</span></a><span data-dcnode-id="7443" instrument_node="">)</span></li><span data-dcnode-id="7441" instrument_node="">
</span><li data-dcnode-id="7431"><a data-dcnode-id="7439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="7440" instrument_node="">Reflecting telescopes</span></a><span data-dcnode-id="7438" instrument_node="">, which use </span><a data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mirror" title="Mirror"><span data-dcnode-id="7437" instrument_node="">mirrors</span></a><span data-dcnode-id="7435" instrument_node=""> (</span><a data-dcnode-id="7433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catoptrics" title="Catoptrics"><span data-dcnode-id="7434" instrument_node="">catoptrics</span></a><span data-dcnode-id="7432" instrument_node="">)</span></li><span data-dcnode-id="7430" instrument_node="">
</span><li data-dcnode-id="7426"><a data-dcnode-id="7428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catadioptric_system%23Catadioptric_telescopes" title="Catadioptric system"><span data-dcnode-id="7429" instrument_node="">Catadioptric telescopes</span></a><span data-dcnode-id="7427" instrument_node="">, which combine lenses and mirrors</span></li></ul><span data-dcnode-id="7424" instrument_node="">
</span><p data-dcnode-id="7416"><span data-dcnode-id="7423" instrument_node="">An optical telescope's ability to resolve small details is directly related to the diameter (or </span><a data-dcnode-id="7421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture" title="Aperture"><span data-dcnode-id="7422" instrument_node="">aperture</span></a><span data-dcnode-id="7420" instrument_node="">) of its </span><a data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="7419" instrument_node="">objective</span></a><span data-dcnode-id="7417" instrument_node=""> (the primary lens or mirror that collects and focuses the light), and its light-gathering power is related to the area of the objective.  The larger the objective, the more light the telescope collects and the finer detail it resolves.
</span></p><p data-dcnode-id="7381"><span data-dcnode-id="7415" instrument_node="">People use optical telescopes (including </span><a data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monocular" title="Monocular"><span data-dcnode-id="7414" instrument_node="">monoculars</span></a><span data-dcnode-id="7412" instrument_node=""> and </span><a data-dcnode-id="7410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Binoculars" title="Binoculars"><span data-dcnode-id="7411" instrument_node="">binoculars</span></a><span data-dcnode-id="7409" instrument_node="">) for </span><a class="mw-redirect" data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outdoor_activities" title="Outdoor activities"><span data-dcnode-id="7408" instrument_node="">outdoor activities</span></a><span data-dcnode-id="7406" instrument_node=""> such as </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observational_astronomy" title="Observational astronomy"><span data-dcnode-id="7405" instrument_node="">observational astronomy</span></a><span data-dcnode-id="7403" instrument_node="">, </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ornithology" title="Ornithology"><span data-dcnode-id="7402" instrument_node="">ornithology</span></a><span data-dcnode-id="7400" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pilotage" title="Pilotage"><span data-dcnode-id="7399" instrument_node="">pilotage</span></a><span data-dcnode-id="7397" instrument_node="">, </span><a data-dcnode-id="7395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hunting" title="Hunting"><span data-dcnode-id="7396" instrument_node="">hunting</span></a><span data-dcnode-id="7394" instrument_node=""> and </span><a data-dcnode-id="7392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconnaissance" title="Reconnaissance"><span data-dcnode-id="7393" instrument_node="">reconnaissance</span></a><span data-dcnode-id="7391" instrument_node="">, as well as indoor/semi-outdoor activities such as </span><a class="mw-redirect" data-dcnode-id="7389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opera_glass" title="Opera glass"><span data-dcnode-id="7390" instrument_node="">watching</span></a><span data-dcnode-id="7388" instrument_node=""> </span><a data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Performance_art" title="Performance art"><span data-dcnode-id="7387" instrument_node="">performance arts</span></a><span data-dcnode-id="7385" instrument_node=""> and </span><a data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spectator_sport" title="Spectator sport"><span data-dcnode-id="7384" instrument_node="">spectator sports</span></a><span data-dcnode-id="7382" instrument_node="">.

</span><p data-dcnode-id="7006"><span data-dcnode-id="7073" instrument_node="">The telescope is more a discovery of optical craftsmen than an invention of a scientist.</span><sup class="reference" data-dcnode-id="7070" id="cite_ref-1"><a data-dcnode-id="7071" href="#cite_note-1"><span data-dcnode-id="7072" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="7067" id="cite_ref-LZZginzib4C_page_55_2-0"><a data-dcnode-id="7068" href="#cite_note-LZZginzib4C_page_55-2"><span data-dcnode-id="7069" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7066" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="7065" instrument_node="">lens</span></a><span data-dcnode-id="7063" instrument_node=""> and the properties of refracting and reflecting light had been known since </span><a data-dcnode-id="7061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ancient_history" title="Ancient history"><span data-dcnode-id="7062" instrument_node="">antiquity</span></a><span data-dcnode-id="7060" instrument_node="">, and theory on how they worked was developed by ancient </span><a class="mw-redirect" data-dcnode-id="7058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_philosophy" title="Greek philosophy"><span data-dcnode-id="7059" instrument_node="">Greek</span></a><span data-dcnode-id="7057" instrument_node=""> philosophers, preserved and expanded on in the </span><a data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_Golden_Age" title="Islamic Golden Age"><span data-dcnode-id="7056" instrument_node="">medieval Islamic world</span></a><span data-dcnode-id="7054" instrument_node="">, and had reached a significantly advanced state by the time of the telescope's invention in </span><a data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_modern_Europe" title="Early modern Europe"><span data-dcnode-id="7053" instrument_node="">early modern Europe</span></a><span data-dcnode-id="7051" instrument_node="">.</span><sup class="reference" data-dcnode-id="7048" id="cite_ref-3"><a data-dcnode-id="7049" href="#cite_note-3"><span data-dcnode-id="7050" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7045" id="cite_ref-4"><a data-dcnode-id="7046" href="#cite_note-4"><span data-dcnode-id="7047" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7044" instrument_node=""> But the most significant step cited in the invention of the telescope was the development of lens manufacture for </span><a data-dcnode-id="7042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasses" title="Glasses"><span data-dcnode-id="7043" instrument_node="">spectacles</span></a><span data-dcnode-id="7041" instrument_node="">,</span><sup class="reference" data-dcnode-id="7038" id="cite_ref-LZZginzib4C_page_55_2-1"><a data-dcnode-id="7039" href="#cite_note-LZZginzib4C_page_55-2"><span data-dcnode-id="7040" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="7035" id="cite_ref-5"><a data-dcnode-id="7036" href="#cite_note-5"><span data-dcnode-id="7037" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="7032" id="cite_ref-6"><a data-dcnode-id="7033" href="#cite_note-6"><span data-dcnode-id="7034" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7031" instrument_node=""> first in Venice and Florence in the thirteenth century,</span><sup class="reference" data-dcnode-id="7028" id="cite_ref-7"><a data-dcnode-id="7029" href="#cite_note-7"><span data-dcnode-id="7030" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7027" instrument_node=""> and later in the spectacle making centers in both the </span><a data-dcnode-id="7025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="7026" instrument_node="">Netherlands</span></a><span data-dcnode-id="7024" instrument_node=""> and Germany.</span><sup class="reference" data-dcnode-id="7021" id="cite_ref-8"><a data-dcnode-id="7022" href="#cite_note-8"><span data-dcnode-id="7023" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7020" instrument_node=""> It is in the Netherlands in 1608 where the first documents describing a </span><a data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope" title="Refracting telescope"><span data-dcnode-id="7019" instrument_node="">refracting optical telescope</span></a><span data-dcnode-id="7017" instrument_node=""> surfaced in the form of a patent filed by spectacle maker </span><a class="mw-redirect" data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="7016" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="7014" instrument_node="">, followed a few weeks later by claims by </span><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Metius" title="Jacob Metius"><span data-dcnode-id="7013" instrument_node="">Jacob Metius</span></a><span data-dcnode-id="7011" instrument_node="">, and a third unknown applicant, that they also knew of this "art".</span><sup class="reference" data-dcnode-id="7008" id="cite_ref-9"><a data-dcnode-id="7009" href="#cite_note-9"><span data-dcnode-id="7010" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7007" instrument_node="">
</span></p><p data-dcnode-id="6975"><span data-dcnode-id="7005" instrument_node="">Word of the invention spread fast and </span><a data-dcnode-id="7003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="7004" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="7002" instrument_node="">, on hearing of the device, was making his own improved designs within a year and was the first to publish astronomical results using a telescope.</span><sup class="reference" data-dcnode-id="6999" id="cite_ref-10"><a data-dcnode-id="7000" href="#cite_note-10"><span data-dcnode-id="7001" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6998" instrument_node=""> Galileo's telescope used a convex </span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="6997" instrument_node="">objective lens</span></a><span data-dcnode-id="6995" instrument_node=""> and a concave </span><a data-dcnode-id="6993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="6994" instrument_node="">eye lens</span></a><span data-dcnode-id="6992" instrument_node="">, a design is now called a </span><a class="mw-redirect" data-dcnode-id="6990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_telescope" title="Galilean telescope"><span data-dcnode-id="6991" instrument_node="">Galilean telescope</span></a><span data-dcnode-id="6989" instrument_node="">. </span><a data-dcnode-id="6987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Kepler" title="Johannes Kepler"><span data-dcnode-id="6988" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="6986" instrument_node=""> proposed an improvement on the design</span><sup class="reference" data-dcnode-id="6983" id="cite_ref-11"><a data-dcnode-id="6984" href="#cite_note-11"><span data-dcnode-id="6985" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6982" instrument_node=""> that used a convex </span><a data-dcnode-id="6980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="6981" instrument_node="">eyepiece</span></a><span data-dcnode-id="6979" instrument_node="">, often called the </span><a class="mw-redirect" data-dcnode-id="6977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keplerian_Telescope" title="Keplerian Telescope"><span data-dcnode-id="6978" instrument_node="">Keplerian Telescope</span></a><span data-dcnode-id="6976" instrument_node="">.
</span></p><p data-dcnode-id="6955"><span data-dcnode-id="6974" instrument_node="">The next big step in the development of refractors was the advent of the </span><a data-dcnode-id="6972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="6973" instrument_node="">Achromatic lens</span></a><span data-dcnode-id="6971" instrument_node=""> in the early 18th century,</span><sup class="reference" data-dcnode-id="6968" id="cite_ref-12"><a data-dcnode-id="6969" href="#cite_note-12"><span data-dcnode-id="6970" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6967" instrument_node=""> which corrected the </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="6966" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="6964" instrument_node=""> in Keplerian telescopes up to that time—allowing for much shorter instruments with much larger objectives.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6957" style="white-space:nowrap;"><span data-dcnode-id="6963" instrument_node="">[</span><i data-dcnode-id="6959"><a data-dcnode-id="6960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6961" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="6962" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6958" instrument_node="">]</span></sup><span data-dcnode-id="6956" instrument_node="">
</span></p><p data-dcnode-id="6860"><span data-dcnode-id="6954" instrument_node="">For </span><a data-dcnode-id="6952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="6953" instrument_node="">reflecting telescopes</span></a><span data-dcnode-id="6951" instrument_node="">, which use a </span><a class="mw-redirect" data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curved_mirrors" title="Curved mirrors"><span data-dcnode-id="6950" instrument_node="">curved mirror</span></a><span data-dcnode-id="6948" instrument_node=""> in place of the objective lens, theory preceded practice. The theoretical basis for </span><a class="mw-redirect" data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curved_mirrors" title="Curved mirrors"><span data-dcnode-id="6947" instrument_node="">curved mirrors</span></a><span data-dcnode-id="6945" instrument_node=""> behaving similar to lenses was probably established by </span><a class="mw-redirect" data-dcnode-id="6943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alhazen" title="Alhazen"><span data-dcnode-id="6944" instrument_node="">Alhazen</span></a><span data-dcnode-id="6942" instrument_node="">, whose theories had been widely disseminated in Latin translations of his work.</span><sup class="reference" data-dcnode-id="6939" id="cite_ref-13"><a data-dcnode-id="6940" href="#cite_note-13"><span data-dcnode-id="6941" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6938" instrument_node=""> Soon after the invention of the refracting telescope, Galileo, </span><a data-dcnode-id="6936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Francesco_Sagredo" title="Giovanni Francesco Sagredo"><span data-dcnode-id="6937" instrument_node="">Giovanni Francesco Sagredo</span></a><span data-dcnode-id="6935" instrument_node="">, and others, spurred on by their knowledge that curved mirrors had similar properties to lenses, discussed the idea of building a telescope using a mirror as the image forming objective.</span><sup class="reference" data-dcnode-id="6932" id="cite_ref-14"><a data-dcnode-id="6933" href="#cite_note-14"><span data-dcnode-id="6934" instrument_node="">[14]</span></a></sup><span data-dcnode-id="6931" instrument_node=""> The potential advantages of using </span><a data-dcnode-id="6929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parabolic_reflector" title="Parabolic reflector"><span data-dcnode-id="6930" instrument_node="">parabolic mirrors</span></a><span data-dcnode-id="6928" instrument_node=""> (primarily a reduction of </span><a data-dcnode-id="6926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="6927" instrument_node="">spherical aberration</span></a><span data-dcnode-id="6925" instrument_node=""> with elimination of </span><a data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="6924" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="6922" instrument_node="">) led to several proposed designs for reflecting telescopes,</span><sup class="reference" data-dcnode-id="6919" id="cite_ref-15"><a data-dcnode-id="6920" href="#cite_note-15"><span data-dcnode-id="6921" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6918" instrument_node=""> the most notable of which was published in 1663 by </span><a class="mw-redirect" data-dcnode-id="6916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Gregory_%28astronomer_and_mathematician%29" title="James Gregory (astronomer and mathematician)"><span data-dcnode-id="6917" instrument_node="">James Gregory</span></a><span data-dcnode-id="6915" instrument_node=""> and came to be called the </span><a data-dcnode-id="6913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_telescope" title="Gregorian telescope"><span data-dcnode-id="6914" instrument_node="">Gregorian telescope</span></a><span data-dcnode-id="6912" instrument_node="">,</span><sup class="reference" data-dcnode-id="6909" id="cite_ref-16"><a data-dcnode-id="6910" href="#cite_note-16"><span data-dcnode-id="6911" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="6906" id="cite_ref-17"><a data-dcnode-id="6907" href="#cite_note-17"><span data-dcnode-id="6908" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6905" instrument_node=""> but no working models were built. </span><a data-dcnode-id="6903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="6904" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="6902" instrument_node=""> has been generally credited with constructing the first practical reflecting telescopes, the </span><a data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newtonian_telescope" title="Newtonian telescope"><span data-dcnode-id="6901" instrument_node="">Newtonian telescope</span></a><span data-dcnode-id="6899" instrument_node="">, in 1668</span><sup class="reference" data-dcnode-id="6896" id="cite_ref-books.google.com_18-0"><a data-dcnode-id="6897" href="#cite_note-books.google.com-18"><span data-dcnode-id="6898" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6895" instrument_node=""> although due to their difficulty of construction and the poor performance of the </span><a data-dcnode-id="6893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speculum_metal" title="Speculum metal"><span data-dcnode-id="6894" instrument_node="">speculum metal</span></a><span data-dcnode-id="6892" instrument_node=""> mirrors used it took over 100 years for reflectors to become popular. Many of the advances in reflecting telescopes included the perfection of </span><a data-dcnode-id="6890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parabolic_reflector" title="Parabolic reflector"><span data-dcnode-id="6891" instrument_node="">parabolic mirror</span></a><span data-dcnode-id="6889" instrument_node=""> fabrication in the 18th century,</span><sup class="reference" data-dcnode-id="6886" id="cite_ref-19"><a data-dcnode-id="6887" href="#cite_note-19"><span data-dcnode-id="6888" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6885" instrument_node=""> silver coated glass mirrors in the 19th century, long-lasting aluminum coatings in the 20th century,</span><sup class="reference" data-dcnode-id="6882" id="cite_ref-20"><a data-dcnode-id="6883" href="#cite_note-20"><span data-dcnode-id="6884" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6881" instrument_node=""> </span><a data-dcnode-id="6879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Segmented_mirror" title="Segmented mirror"><span data-dcnode-id="6880" instrument_node="">segmented mirrors</span></a><span data-dcnode-id="6878" instrument_node=""> to allow larger diameters, and </span><a data-dcnode-id="6876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_optics" title="Active optics"><span data-dcnode-id="6877" instrument_node="">active optics</span></a><span data-dcnode-id="6875" instrument_node=""> to compensate for gravitational deformation. A mid-20th century innovation was </span><a data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catadioptric_system" title="Catadioptric system"><span data-dcnode-id="6874" instrument_node="">catadioptric</span></a><span data-dcnode-id="6872" instrument_node=""> telescopes such as the </span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schmidt_camera" title="Schmidt camera"><span data-dcnode-id="6871" instrument_node="">Schmidt camera</span></a><span data-dcnode-id="6869" instrument_node="">, which uses both a lens (corrector plate) and mirror as primary optical elements, mainly used for wide field imaging without spherical aberration.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6862" style="white-space:nowrap;"><span data-dcnode-id="6868" instrument_node="">[</span><i data-dcnode-id="6864"><a data-dcnode-id="6865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6866" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="6867" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6863" instrument_node="">]</span></sup><span data-dcnode-id="6861" instrument_node="">
</span></p><p data-dcnode-id="6841"><span data-dcnode-id="6859" instrument_node="">The late 20th century has seen the development of </span><a data-dcnode-id="6857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="6858" instrument_node="">adaptive optics</span></a><span data-dcnode-id="6856" instrument_node=""> and </span><a data-dcnode-id="6854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_telescope" title="Space telescope"><span data-dcnode-id="6855" instrument_node="">space telescopes</span></a><span data-dcnode-id="6853" instrument_node=""> to overcome the problems of </span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_seeing" title="Astronomical seeing"><span data-dcnode-id="6852" instrument_node="">astronomical seeing</span></a><span data-dcnode-id="6850" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6843" style="white-space:nowrap;"><span data-dcnode-id="6849" instrument_node="">[</span><i data-dcnode-id="6845"><a data-dcnode-id="6846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6847" title="This claim needs references to reliable sources. (February 2021)"><span data-dcnode-id="6848" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6844" instrument_node="">]</span></sup><span data-dcnode-id="6842" instrument_node="">
</span></p><p data-dcnode-id="6805"><span data-dcnode-id="6840" instrument_node="">The electronics revolution of the early 21st century led to the development of computer-connected telescopes in the 2010s that allow non-professional skywatchers to observe stars and satellites using relatively low-cost equipment by taking advantage of </span><a data-dcnode-id="6838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_photography" title="Digital photography"><span data-dcnode-id="6839" instrument_node="">digital</span></a><span data-dcnode-id="6837" instrument_node=""> </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrophotography" title="Astrophotography"><span data-dcnode-id="6836" instrument_node="">astrophotographic</span></a><span data-dcnode-id="6834" instrument_node=""> techniques developed by professional astronomers over previous decades. An electronic connection to a computer (</span><a data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smartphone" title="Smartphone"><span data-dcnode-id="6833" instrument_node="">smartphone</span></a><span data-dcnode-id="6831" instrument_node="">, </span><a data-dcnode-id="6829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tablet_computer" title="Tablet computer"><span data-dcnode-id="6830" instrument_node="">pad</span></a><span data-dcnode-id="6828" instrument_node="">, or laptop) is </span><a data-dcnode-id="6826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afocal_photography" title="Afocal photography"><span data-dcnode-id="6827" instrument_node="">required to make astronomical observations</span></a><span data-dcnode-id="6825" instrument_node=""> from the telescopes. The digital technology allows </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark-frame_subtraction" title="Dark-frame subtraction"><span data-dcnode-id="6824" instrument_node="">multiple images to be stacked while subtracting the noise component of the observation</span></a><span data-dcnode-id="6822" instrument_node=""> producing images of </span><a class="mw-redirect" data-dcnode-id="6820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Messier_objects" title="Messier objects"><span data-dcnode-id="6821" instrument_node="">Messier objects</span></a><span data-dcnode-id="6819" instrument_node=""> and </span><a data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star%23Magnitude" title="Star"><span data-dcnode-id="6818" instrument_node="">faint stars</span></a><span data-dcnode-id="6816" instrument_node=""> as dim as an </span><a data-dcnode-id="6814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apparent_magnitude" title="Apparent magnitude"><span data-dcnode-id="6815" instrument_node="">apparent magnitude</span></a><span data-dcnode-id="6813" instrument_node=""> of 15 with consumer-grade equipment.</span><sup class="reference" data-dcnode-id="6810" id="cite_ref-ciel201811_21-0"><a data-dcnode-id="6811" href="#cite_note-ciel201811-21"><span data-dcnode-id="6812" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6807" id="cite_ref-sa20171010_22-0"><a data-dcnode-id="6808" href="#cite_note-sa20171010-22"><span data-dcnode-id="6809" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6806" instrument_node="">
</span></p><span data-dcnode-id="6804" instrument_node="">
</span><h2 data-dcnode-id="6794"><span class="mw-headline" data-dcnode-id="6802" id="Principles"><span data-dcnode-id="6803" instrument_node="">Principles</span></span><span class="mw-editsection" data-dcnode-id="6795"><span class="mw-editsection-bracket" data-dcnode-id="6800"><span data-dcnode-id="6801" instrument_node="">[</span></span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D2" title="Edit section: Principles"><span data-dcnode-id="6799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6796"><span data-dcnode-id="6797" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6793" instrument_node="">
</span><link data-dcnode-id="6792" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6781" role="note"><span data-dcnode-id="6791" instrument_node="">For specific designs of telescope, see </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="6790" instrument_node="">Reflecting telescope</span></a><span data-dcnode-id="6788" instrument_node="">, </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope" title="Refracting telescope"><span data-dcnode-id="6787" instrument_node="">Refracting telescope</span></a><span data-dcnode-id="6785" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catadioptric" title="Catadioptric"><span data-dcnode-id="6784" instrument_node="">Catadioptric</span></a><span data-dcnode-id="6782" instrument_node="">.</span></div><span data-dcnode-id="6780" instrument_node="">
</span><p data-dcnode-id="6754"><span data-dcnode-id="6779" instrument_node="">The basic scheme is that the primary light-gathering element, the </span><a data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="6778" instrument_node="">objective</span></a><span data-dcnode-id="6776" instrument_node=""> (1) (the </span><a class="mw-redirect" data-dcnode-id="6774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convex_lens" title="Convex lens"><span data-dcnode-id="6775" instrument_node="">convex lens</span></a><span data-dcnode-id="6773" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concave_mirror" title="Concave mirror"><span data-dcnode-id="6772" instrument_node="">concave mirror</span></a><span data-dcnode-id="6770" instrument_node=""> used to gather the incoming light), focuses that light from the distant object (4) to a focal plane where it forms a </span><a data-dcnode-id="6768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_image" title="Real image"><span data-dcnode-id="6769" instrument_node="">real image</span></a><span data-dcnode-id="6767" instrument_node=""> (5). This image may be recorded or viewed through an </span><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="6766" instrument_node="">eyepiece</span></a><span data-dcnode-id="6764" instrument_node=""> (2), which acts like a </span><a data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnifying_glass" title="Magnifying glass"><span data-dcnode-id="6763" instrument_node="">magnifying glass</span></a><span data-dcnode-id="6761" instrument_node="">. The eye (3) then sees an inverted, </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="6760" instrument_node="">magnified</span></a><span data-dcnode-id="6758" instrument_node=""> </span><a data-dcnode-id="6756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_image" title="Virtual image"><span data-dcnode-id="6757" instrument_node="">virtual image</span></a><span data-dcnode-id="6755" instrument_node=""> (6) of the object.
</span></p><span data-dcnode-id="6753" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6738"><div class="thumbinner" data-dcnode-id="6739" style="width:352px;"><a class="image" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKepschem.png"><img alt="" class="thumbimage" data-dcnode-id="6752" data-file-height="319" data-file-width="708" decoding="async" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kepschem.png/350px-Kepschem.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kepschem.png/525px-Kepschem.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kepschem.png/700px-Kepschem.png 2x" width="350"></a><span data-dcnode-id="6750" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6740"><div class="magnify" data-dcnode-id="6748"><a class="internal" data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKepschem.png" title="Enlarge"></a></div><span data-dcnode-id="6747" instrument_node="">Schematic of a </span><a class="mw-redirect" data-dcnode-id="6745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keplerian_telescope" title="Keplerian telescope"><span data-dcnode-id="6746" instrument_node="">Keplerian</span></a><span data-dcnode-id="6744" instrument_node=""> </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope" title="Refracting telescope"><span data-dcnode-id="6743" instrument_node="">refracting telescope</span></a><span data-dcnode-id="6741" instrument_node="">. The arrow at (4) is a (notional) representation of the original image; the arrow at (5) is the inverted image at the focal plane; the arrow at (6) is the virtual image that forms in the viewer's visual sphere. The red rays produce the midpoint of the arrow; two other sets of rays (each black) produce its head and tail.</span></div></div></div><span data-dcnode-id="6737" instrument_node="">
</span><h3 data-dcnode-id="6727"><span class="mw-headline" data-dcnode-id="6735" id="Inverted_images"><span data-dcnode-id="6736" instrument_node="">Inverted images</span></span><span class="mw-editsection" data-dcnode-id="6728"><span class="mw-editsection-bracket" data-dcnode-id="6733"><span data-dcnode-id="6734" instrument_node="">[</span></span><a data-dcnode-id="6731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D3" title="Edit section: Inverted images"><span data-dcnode-id="6732" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6729"><span data-dcnode-id="6730" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6726" instrument_node="">
</span><link data-dcnode-id="6725" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6718" role="note"><span data-dcnode-id="6724" instrument_node="">Further information: </span><a data-dcnode-id="6722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_diagonal" title="Star diagonal"><span data-dcnode-id="6723" instrument_node="">Star diagonal</span></a><span data-dcnode-id="6721" instrument_node=""> and </span><a data-dcnode-id="6719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Relay_lens" title="Relay lens"><span data-dcnode-id="6720" instrument_node="">Relay lens</span></a></div><span data-dcnode-id="6717" instrument_node="">
</span><p data-dcnode-id="6691"><span data-dcnode-id="6716" instrument_node="">Most telescope designs produce an inverted image at the focal plane; these are referred to as </span><i data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">inverting telescopes</span></i><span data-dcnode-id="6713" instrument_node="">. In fact, the image is both turned upside down and reversed left to right, so that altogether it is rotated by 180 degrees from the object orientation. In astronomical telescopes the rotated view is normally not corrected, since it does not affect how the telescope is used. However, a mirror diagonal is often used to place the eyepiece in a more convenient viewing location, and in that case the image is erect, but still reversed left to right. In terrestrial telescopes such as </span><a data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spotting_scope" title="Spotting scope"><span data-dcnode-id="6712" instrument_node="">spotting scopes</span></a><span data-dcnode-id="6710" instrument_node="">, </span><a data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monocular" title="Monocular"><span data-dcnode-id="6709" instrument_node="">monoculars</span></a><span data-dcnode-id="6707" instrument_node=""> and </span><a data-dcnode-id="6705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Binoculars" title="Binoculars"><span data-dcnode-id="6706" instrument_node="">binoculars</span></a><span data-dcnode-id="6704" instrument_node="">, prisms (e.g., </span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Porro_prism" title="Porro prism"><span data-dcnode-id="6703" instrument_node="">Porro prisms</span></a><span data-dcnode-id="6701" instrument_node="">) or a relay lens between objective and eyepiece are used to correct the image orientation. There are telescope designs that do not present an inverted image such as the </span><a data-dcnode-id="6699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope%23Refracting_telescope_designs" title="Refracting telescope"><span data-dcnode-id="6700" instrument_node="">Galilean refractor</span></a><span data-dcnode-id="6698" instrument_node=""> and the </span><a data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_telescope" title="Gregorian telescope"><span data-dcnode-id="6697" instrument_node="">Gregorian reflector</span></a><span data-dcnode-id="6695" instrument_node="">. These are referred to as </span><i data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">erecting telescopes</span></i><span data-dcnode-id="6692" instrument_node="">.
</span></p><span data-dcnode-id="6690" instrument_node="">
</span><h3 data-dcnode-id="6680"><span class="mw-headline" data-dcnode-id="6688" id="Design_variants"><span data-dcnode-id="6689" instrument_node="">Design variants</span></span><span class="mw-editsection" data-dcnode-id="6681"><span class="mw-editsection-bracket" data-dcnode-id="6686"><span data-dcnode-id="6687" instrument_node="">[</span></span><a data-dcnode-id="6684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D4" title="Edit section: Design variants"><span data-dcnode-id="6685" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6682"><span data-dcnode-id="6683" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6679" instrument_node="">
</span><p data-dcnode-id="6671"><span data-dcnode-id="6678" instrument_node="">Many types of telescope fold or divert the optical path with secondary or tertiary mirrors. These may be integral part of the optical design (</span><a data-dcnode-id="6676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newtonian_telescope" title="Newtonian telescope"><span data-dcnode-id="6677" instrument_node="">Newtonian telescope</span></a><span data-dcnode-id="6675" instrument_node="">, </span><a data-dcnode-id="6673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassegrain_reflector" title="Cassegrain reflector"><span data-dcnode-id="6674" instrument_node="">Cassegrain reflector</span></a><span data-dcnode-id="6672" instrument_node=""> or similar types), or may simply be used to place the eyepiece or detector at a more convenient position. Telescope designs may also use specially designed additional lenses or mirrors to improve image quality over a larger field of view. 
</span></p><span data-dcnode-id="6670" instrument_node="">
</span><h2 data-dcnode-id="6660"><span class="mw-headline" data-dcnode-id="6668" id="Characteristics"><span data-dcnode-id="6669" instrument_node="">Characteristics</span></span><span class="mw-editsection" data-dcnode-id="6661"><span class="mw-editsection-bracket" data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">[</span></span><a data-dcnode-id="6664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D5" title="Edit section: Characteristics"><span data-dcnode-id="6665" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6662"><span data-dcnode-id="6663" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6659" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6648"><div class="thumbinner" data-dcnode-id="6649" style="width:252px;"><a class="image" data-dcnode-id="6657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEightInchTelescope.JPG"><img alt="" class="thumbimage" data-dcnode-id="6658" data-file-height="640" data-file-width="480" decoding="async" height="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d0/EightInchTelescope.JPG/250px-EightInchTelescope.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d0/EightInchTelescope.JPG/375px-EightInchTelescope.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/d/d0/EightInchTelescope.JPG 2x" width="250"></a><span data-dcnode-id="6656" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6650"><div class="magnify" data-dcnode-id="6654"><a class="internal" data-dcnode-id="6655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEightInchTelescope.JPG" title="Enlarge"></a></div><span data-dcnode-id="6653" instrument_node="">Eight-inch refracting telescope at </span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chabot_Space_and_Science_Center" title="Chabot Space and Science Center"><span data-dcnode-id="6652" instrument_node="">Chabot Space and Science Center</span></a></div></div></div><span data-dcnode-id="6647" instrument_node="">
</span><p data-dcnode-id="6630"><span data-dcnode-id="6646" instrument_node="">Design specifications relate to the characteristics of the telescope and how it performs optically. Several properties of the specifications may change with the equipment or accessories used with the telescope; such as </span><a data-dcnode-id="6644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barlow_lens" title="Barlow lens"><span data-dcnode-id="6645" instrument_node="">Barlow lenses</span></a><span data-dcnode-id="6643" instrument_node="">, </span><a data-dcnode-id="6641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star_diagonal" title="Star diagonal"><span data-dcnode-id="6642" instrument_node="">star diagonals</span></a><span data-dcnode-id="6640" instrument_node=""> and </span><a data-dcnode-id="6638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="6639" instrument_node="">eyepieces</span></a><span data-dcnode-id="6637" instrument_node="">. These interchangeable accessories don't alter the specifications of the telescope, however they alter the way the telescope's properties function, typically </span><a data-dcnode-id="6635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="6636" instrument_node="">magnification</span></a><span data-dcnode-id="6634" instrument_node="">, apparent </span><a data-dcnode-id="6632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Field_of_view" title="Field of view"><span data-dcnode-id="6633" instrument_node="">field of view</span></a><span data-dcnode-id="6631" instrument_node=""> (FOV) and actual field of view.
</span></p><span data-dcnode-id="6629" instrument_node="">
</span><h3 data-dcnode-id="6619"><span class="mw-headline" data-dcnode-id="6627" id="Surface_resolvability"><span data-dcnode-id="6628" instrument_node="">Surface resolvability</span></span><span class="mw-editsection" data-dcnode-id="6620"><span class="mw-editsection-bracket" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">[</span></span><a data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D6" title="Edit section: Surface resolvability"><span data-dcnode-id="6624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6618" instrument_node="">
</span><p data-dcnode-id="6470"><span data-dcnode-id="6617" instrument_node="">The smallest resolvable surface area of an object, as seen through an optical telescope, is the limited physical area that can be resolved. It is analogous to </span><a data-dcnode-id="6615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angular_resolution" title="Angular resolution"><span data-dcnode-id="6616" instrument_node="">angular resolution</span></a><span data-dcnode-id="6614" instrument_node="">, but differs in definition: instead of separation ability between point-light sources it refers to the physical area that can be resolved. A familiar way to express the characteristic is the resolvable ability of features such as </span><a data-dcnode-id="6612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="6613" instrument_node="">Moon</span></a><span data-dcnode-id="6611" instrument_node=""> craters or </span><a data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="6610" instrument_node="">Sun</span></a><span data-dcnode-id="6608" instrument_node=""> spots. Expression using the formula is given by twice the resolving power </span><span class="mwe-math-element" data-dcnode-id="6588"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="6590" style="display: none;"><math alttext="{\displaystyle R}" data-dcnode-id="6591" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="6607" instrument_node="">

</span><p data-dcnode-id="5615"><span data-dcnode-id="5619" instrument_node="">The equation shows that, all else being equal, the larger the aperture, the better the angular resolution. The resolution is not given by the maximum </span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="5618" instrument_node="">magnification</span></a><span data-dcnode-id="5616" instrument_node=""> (or "power") of a telescope. Telescopes marketed by giving high values of the maximum power often deliver poor images.
</span></p><p data-dcnode-id="5598"><span data-dcnode-id="5614" instrument_node="">For large ground-based telescopes, the resolution is limited by </span><a data-dcnode-id="5612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_seeing" title="Astronomical seeing"><span data-dcnode-id="5613" instrument_node="">atmospheric seeing</span></a><span data-dcnode-id="5611" instrument_node="">. This limit can be overcome by placing the telescopes above the atmosphere, e.g., on the summits of high mountains, on balloons and high-flying airplanes, or </span><a data-dcnode-id="5609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_telescope" title="Space telescope"><span data-dcnode-id="5610" instrument_node="">in space</span></a><span data-dcnode-id="5608" instrument_node="">. Resolution limits can also be overcome by </span><a data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="5607" instrument_node="">adaptive optics</span></a><span data-dcnode-id="5605" instrument_node="">, </span><a data-dcnode-id="5603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speckle_imaging" title="Speckle imaging"><span data-dcnode-id="5604" instrument_node="">speckle imaging</span></a><span data-dcnode-id="5602" instrument_node=""> or </span><a data-dcnode-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucky_imaging" title="Lucky imaging"><span data-dcnode-id="5601" instrument_node="">lucky imaging</span></a><span data-dcnode-id="5599" instrument_node=""> for ground-based telescopes.
</span></p><p data-dcnode-id="5587"><span data-dcnode-id="5597" instrument_node="">Recently, it has become practical to perform </span><a data-dcnode-id="5595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture_synthesis" title="Aperture synthesis"><span data-dcnode-id="5596" instrument_node="">aperture synthesis</span></a><span data-dcnode-id="5594" instrument_node=""> with arrays of optical telescopes. Very high resolution images can be obtained with groups of widely spaced smaller telescopes, linked together by carefully controlled optical paths, but </span><a data-dcnode-id="5592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_astronomical_interferometers_at_visible_and_infrared_wavelengths" title="List of astronomical interferometers at visible and infrared wavelengths"><span data-dcnode-id="5593" instrument_node="">these interferometers</span></a><span data-dcnode-id="5591" instrument_node=""> can only be used for imaging bright objects such as stars or measuring the bright cores of </span><a class="mw-redirect" data-dcnode-id="5589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_galaxies" title="Active galaxies"><span data-dcnode-id="5590" instrument_node="">active galaxies</span></a><span data-dcnode-id="5588" instrument_node="">.
</span></p><span data-dcnode-id="5586" instrument_node="">
</span><h3 data-dcnode-id="5576"><span class="mw-headline" data-dcnode-id="5584" id="Focal_length_and_focal_ratio"><span data-dcnode-id="5585" instrument_node="">Focal length and focal ratio</span></span><span class="mw-editsection" data-dcnode-id="5577"><span class="mw-editsection-bracket" data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">[</span></span><a data-dcnode-id="5580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D8" title="Edit section: Focal length and focal ratio"><span data-dcnode-id="5581" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5578"><span data-dcnode-id="5579" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5575" instrument_node="">
</span><p data-dcnode-id="5477"><span data-dcnode-id="5574" instrument_node="">The </span><a data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_length" title="Focal length"><span data-dcnode-id="5573" instrument_node="">focal length</span></a><span data-dcnode-id="5571" instrument_node=""> of an </span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optics" title="Optics"><span data-dcnode-id="5570" instrument_node="">optical</span></a><span data-dcnode-id="5568" instrument_node=""> system is a measure of how strongly the system converges or diverges </span><a data-dcnode-id="5566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="5567" instrument_node="">light</span></a><span data-dcnode-id="5565" instrument_node="">. For an optical system in air, it is the distance over which initially </span><a class="mw-redirect" data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collimated" title="Collimated"><span data-dcnode-id="5564" instrument_node="">collimated</span></a><span data-dcnode-id="5562" instrument_node=""> rays are brought to a focus. A system with a shorter focal length has greater </span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_power" title="Optical power"><span data-dcnode-id="5561" instrument_node="">optical power</span></a><span data-dcnode-id="5559" instrument_node=""> than one with a long focal length; that is, it bends the </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ray_%28optics%29" title="Ray (optics)"><span data-dcnode-id="5558" instrument_node="">rays</span></a><span data-dcnode-id="5556" instrument_node=""> more strongly, bringing them to a focus in a shorter distance. In astronomy, the f-number is commonly referred to as the </span><i data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">focal ratio</span></i><span data-dcnode-id="5553" instrument_node=""> notated as </span><span class="mwe-math-element" data-dcnode-id="5533"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="5535" style="display: none;"><math alttext="{\displaystyle N}" data-dcnode-id="5536" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="5552" instrument_node="">

</span></p><p data-dcnode-id="5385"><span data-dcnode-id="5416" instrument_node="">Numerically large </span><a data-dcnode-id="5414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-number" title="F-number"><span data-dcnode-id="5415" instrument_node="">Focal ratios</span></a><span data-dcnode-id="5413" instrument_node=""> are said to be </span><i data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">long</span></i><span data-dcnode-id="5410" instrument_node=""> or </span><i data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">slow</span></i><span data-dcnode-id="5407" instrument_node="">. Small numbers are </span><i data-dcnode-id="5405"><span data-dcnode-id="5406" instrument_node="">short</span></i><span data-dcnode-id="5404" instrument_node=""> or </span><i data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">fast</span></i><span data-dcnode-id="5401" instrument_node="">. There are no sharp lines for determining when to use these terms, and an individual may consider their own standards of determination. Among contemporary astronomical telescopes, any telescope with a </span><a data-dcnode-id="5399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-number" title="F-number"><span data-dcnode-id="5400" instrument_node="">focal ratio</span></a><span data-dcnode-id="5398" instrument_node=""> slower (bigger number) than f/12 is generally considered slow, and any telescope with a focal ratio faster (smaller number) than f/6, is considered fast. Faster systems often have more </span><a class="mw-redirect" data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_aberrations" title="Optical aberrations"><span data-dcnode-id="5397" instrument_node="">optical aberrations</span></a><span data-dcnode-id="5395" instrument_node=""> away from the center of the field of view and are generally more demanding of eyepiece designs than slower ones. A fast system is often desired for practical purposes in </span><a data-dcnode-id="5393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrophotography" title="Astrophotography"><span data-dcnode-id="5394" instrument_node="">astrophotography</span></a><span data-dcnode-id="5392" instrument_node=""> with the purpose of gathering more </span><a class="mw-redirect" data-dcnode-id="5390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photons" title="Photons"><span data-dcnode-id="5391" instrument_node="">photons</span></a><span data-dcnode-id="5389" instrument_node=""> in a given time period than a slower system, allowing time lapsed </span><a data-dcnode-id="5387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photography" title="Photography"><span data-dcnode-id="5388" instrument_node="">photography</span></a><span data-dcnode-id="5386" instrument_node=""> to process the result faster.
</span></p><p data-dcnode-id="5365"><span data-dcnode-id="5384" instrument_node="">Wide-field telescopes (such as </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrograph" title="Astrograph"><span data-dcnode-id="5383" instrument_node="">astrographs</span></a><span data-dcnode-id="5381" instrument_node="">), are used to track </span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellite" title="Satellite"><span data-dcnode-id="5380" instrument_node="">satellites</span></a><span data-dcnode-id="5378" instrument_node=""> and </span><a data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asteroid" title="Asteroid"><span data-dcnode-id="5377" instrument_node="">asteroids</span></a><span data-dcnode-id="5375" instrument_node="">, for </span><a data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_ray" title="Cosmic ray"><span data-dcnode-id="5374" instrument_node="">cosmic-ray</span></a><span data-dcnode-id="5372" instrument_node=""> research, and for </span><a data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_survey" title="Astronomical survey"><span data-dcnode-id="5371" instrument_node="">astronomical surveys</span></a><span data-dcnode-id="5369" instrument_node=""> of the sky. It is more difficult to reduce </span><a class="mw-redirect" data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_aberrations" title="Optical aberrations"><span data-dcnode-id="5368" instrument_node="">optical aberrations</span></a><span data-dcnode-id="5366" instrument_node=""> in telescopes with low f-ratio than in telescopes with larger f-ratio.
</span></p><span data-dcnode-id="5364" instrument_node="">
</span><h3 data-dcnode-id="5354"><span class="mw-headline" data-dcnode-id="5362" id="Light-gathering_power"><span data-dcnode-id="5363" instrument_node="">Light-gathering power</span></span><span class="mw-editsection" data-dcnode-id="5355"><span class="mw-editsection-bracket" data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">[</span></span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DOptical_telescope%26action%3Dedit%26section%3D9" title="Edit section: Light-gathering power"><span data-dcnode-id="5359" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5353" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="5335"><div class="thumbinner" data-dcnode-id="5336" style="width:222px;"><a class="image" data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKeckObservatory20071013.jpg"><img alt="" class="thumbimage" data-dcnode-id="5346" data-file-height="900" data-file-width="600" decoding="async" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/78/KeckObservatory20071013.jpg/220px-KeckObservatory20071013.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/78/KeckObservatory20071013.jpg/330px-KeckObservatory20071013.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/78/KeckObservatory20071013.jpg/440px-KeckObservatory20071013.jpg 2x" width="220"></a><span data-dcnode-id="5344" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5337"><div class="magnify" data-dcnode-id="5342"><a class="internal" data-dcnode-id="5343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKeckObservatory20071013.jpg" title="Enlarge"></a></div><span data-dcnode-id="5341" instrument_node="">The </span><a data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/W._M._Keck_Observatory" title="W. M. Keck Observatory"><span data-dcnode-id="5340" instrument_node="">Keck II telescope</span></a><span data-dcnode-id="5338" instrument_node=""> gathers light by using 36 segmented hexagonal mirrors to create a 10 m (33 ft) aperture primary mirror</span></div></div></div><span data-dcnode-id="5334" instrument_node="">
</span><p data-dcnode-id="5244"><span data-dcnode-id="5333" instrument_node="">The light-gathering power of an optical telescope, also referred to as light grasp or aperture gain, is the ability of a telescope to collect a lot more light than the human eye. Its light-gathering power is probably its most important feature. The telescope acts as a </span><i data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">light bucket</span></i><span data-dcnode-id="5330" instrument_node="">, collecting all of the photons that come down on it from a far away object, where a larger bucket catches more </span><a class="mw-redirect" data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photons" title="Photons"><span data-dcnode-id="5329" instrument_node="">photons</span></a><span data-dcnode-id="5327" instrument_node=""> resulting in more received light in a given time period, effectively brightening the image. This is why the pupils of your eyes enlarge at night so that more light reaches the retinas. The gathering power </span><span class="mwe-math-element" data-dcnode-id="5307"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="5309" style="display: none;"><math alttext="{\displaystyle P}" data-dcnode-id="5310" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="5326" instrument_node="">
