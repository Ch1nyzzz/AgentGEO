</span><h1 data-dcnode-id="1240"><span class="markup" data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Science in the </span><span class="non-italic" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">17</span></span><span data-dcnode-id="1242" instrument_node="">th century: From Europe to St Andrews</span></span></h1><span data-dcnode-id="1239" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span></div><span data-dcnode-id="1235" instrument_node="">
</span><hr data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
</span><div class="row" data-dcnode-id="325"><span data-dcnode-id="1232" instrument_node="">
</span><div class="col-md-12" data-dcnode-id="327"><span data-dcnode-id="1231" instrument_node="">
</span><span class="markup" data-dcnode-id="329"><div class="grey-block" data-dcnode-id="1220"><span data-dcnode-id="1230" instrument_node="">On </span><span class="non-italic" data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">30</span></span><span data-dcnode-id="1227" instrument_node=""> May </span><span class="non-italic" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">2016</span></span><span data-dcnode-id="1224" instrument_node="">, M Pilar Gil submitted her thesis </span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Collecting science in St Andrews. A history in context</span></em><span data-dcnode-id="1221" instrument_node=""> in application for the degree of M.Litt. in Museums and Gallery Studies to the School of Art History of the University of St Andrews. We reproduce below the first chapter of this thesis to which we have made very minor editorial changes:</span></div><span data-dcnode-id="1219" instrument_node="">
</span><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">
</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">The Scientific revolution. </span></strong><span data-dcnode-id="1214" instrument_node="">
</span><br data-dcnode-id="1213"><span data-dcnode-id="1212" instrument_node="">
</span><br data-dcnode-id="1211"><span data-dcnode-id="1210" instrument_node="">
During the </span><span class="non-italic" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">17</span></span><span data-dcnode-id="1207" instrument_node="">th century, Europe experienced a series of changes in thought, knowledge and beliefs that affected society, influenced politics and produced a cultural transformation. It was a revolution of the mind, a desire to know how nature worked, to understand the natural laws. The advances in knowledge resulted in a powerful wave that, emerging from astronomy and mathematics, swept the habits, the culture, and the social behaviour of an era.
</span><br data-dcnode-id="1206"><span data-dcnode-id="1205" instrument_node="">
</span><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">
This period in the history of Europe is known as the Scientific Revolution. The expression is controversial, as historians are still debating when the revolution started and finished, who were the main actors, and how it developed </span><span class="non-italic" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">[</span></span><span data-dcnode-id="1200" instrument_node="">Hatch </span><span class="non-italic" data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">2002</span></span><span data-dcnode-id="1197" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">03]</span></span><span data-dcnode-id="1194" instrument_node="">. Although some historians favour the figure of </span><a aria-expanded="false" class="mlink" data-dcnode-id="1192" data-popup="../../Biographies/Copernicus/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Copernicus/"><span data-dcnode-id="1193" instrument_node="">Nicolaus Copernicus</span></a><span data-dcnode-id="1191" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">(1473</span></span><span data-dcnode-id="1188" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">1543)</span></span><span data-dcnode-id="1185" instrument_node=""> and the heliocentric theory to mark the beginning of the Scientific Revolution, others situate the origin in Francis Bacon </span><span class="non-italic" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">(1561</span></span><span data-dcnode-id="1182" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">1626)</span></span><span data-dcnode-id="1179" instrument_node=""> and his description of the scientific method. Some other key figures of this period were </span><a aria-expanded="false" class="mlink" data-dcnode-id="1177" data-popup="../../Biographies/Brahe/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Brahe/"><span data-dcnode-id="1178" instrument_node="">Tycho Brahe</span></a><span data-dcnode-id="1176" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">(1546</span></span><span data-dcnode-id="1173" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">1601)</span></span><span data-dcnode-id="1170" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="1168" data-popup="../../Biographies/Descartes/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Descartes/"><span data-dcnode-id="1169" instrument_node="">Rene Descartes</span></a><span data-dcnode-id="1167" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">(1596</span></span><span data-dcnode-id="1164" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">1650)</span></span><span data-dcnode-id="1161" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="1159" data-popup="../../Biographies/Kepler/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Kepler/"><span data-dcnode-id="1160" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="1158" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">(1571</span></span><span data-dcnode-id="1155" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">1630)</span></span><span data-dcnode-id="1152" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="1150" data-popup="../../Biographies/Galileo/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Galileo/"><span data-dcnode-id="1151" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="1149" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">(1564</span></span><span data-dcnode-id="1146" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">1642)</span></span><span data-dcnode-id="1143" instrument_node=""> and </span><a aria-expanded="false" class="mlink" data-dcnode-id="1141" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="1142" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="1140" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">(1642</span></span><span data-dcnode-id="1137" instrument_node="">-</span><span class="non-italic" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">1727)</span></span><span data-dcnode-id="1134" instrument_node="">.
</span><br data-dcnode-id="1133"><span data-dcnode-id="1132" instrument_node="">
</span><br data-dcnode-id="1131"><span data-dcnode-id="1130" instrument_node="">
During centuries, the study of the universe and the understanding of the world was founded on deep thinking, on mulling over different questions trying to unearth the reasons or explanations that gave clues to understanding the phenomena. By the </span><span class="non-italic" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">16</span></span><span data-dcnode-id="1127" instrument_node="">th and </span><span class="non-italic" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">17</span></span><span data-dcnode-id="1124" instrument_node="">th centuries, the paradigm started to shift as some natural philosophers were rejecting unproven theories and using precise tools to obtain exact measurements to base their discoveries on observation and experimentation </span><span class="non-italic" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">[</span></span><span data-dcnode-id="1121" instrument_node="">Hakim </span><span class="non-italic" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">2005</span></span><span data-dcnode-id="1118" instrument_node="">, </span><span class="non-italic" data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">19]</span></span><span data-dcnode-id="1115" instrument_node="">.
</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">
</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
This was the idea that Francis Bacon defended in his work </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">The New Organon</span></em><span data-dcnode-id="1108" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">(1620)</span></span><span data-dcnode-id="1105" instrument_node="">. Bacon was a philosopher who did not perform any experiment himself but showed the way and paved the road to knowledge with his vision. </span><a aria-expanded="false" class="mlink" data-dcnode-id="1103" data-popup="../../Biographies/Descartes/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Descartes/"><span data-dcnode-id="1104" instrument_node="">René Descartes</span></a><span data-dcnode-id="1102" instrument_node="">, a French mathematician and philosopher, expanded the scientific method proposed by Bacon introducing the concept of analysis and describing its method in his book </span><em data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The Discourse on the Method of Rightly Conducting the Reason and Seeking the Truth in the Sciences</span></em><span data-dcnode-id="1099" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">(1637)</span></span><span data-dcnode-id="1096" instrument_node="">. There, </span><a aria-expanded="false" class="mlink" data-dcnode-id="1094" data-popup="../../Biographies/Descartes/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Descartes/"><span data-dcnode-id="1095" instrument_node="">Descartes</span></a><span data-dcnode-id="1093" instrument_node=""> proposes that any problem in science, despite its complexity, can be solved by breaking the problems into parts and solving each part separately, because the parts would help to understand the whole. Reason and mathematical proof would shed light on almost any question.
</span><br data-dcnode-id="1092"><span data-dcnode-id="1091" instrument_node="">
</span><br data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
</span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Economy, politics and religion. </span></strong><span data-dcnode-id="1086" instrument_node="">
</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">
</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">
As stated previously, mathematics and astronomy were the branches of science that pushed forward the Scientific Revolution. The main reason for that was the economy. Trade was the principal source of income at the time and patrons were interested in obtaining new tools to ensure safer navigation and in having precise charts of the sky to read the stars. New navigational devices such as mariner's astrolabes, quadrants, compasses and nocturnals were designed and produced </span><span class="non-italic" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">[</span></span><span data-dcnode-id="1079" instrument_node="">Macpherson </span><span class="non-italic" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">1805]</span></span><span data-dcnode-id="1076" instrument_node="">. To make observations and to record the exact position of the stars in the sky, astronomers used new and improved armillary spheres and celestial globes. The use of new tools to obtain exact observations reached its zenith with the invention of the telescope, improved by </span><a aria-expanded="false" class="mlink" data-dcnode-id="1074" data-popup="../../Biographies/Galileo/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Galileo/"><span data-dcnode-id="1075" instrument_node="">Galileo</span></a><span data-dcnode-id="1073" instrument_node=""> who, turning it to the skies, observed and described the Moon, the Sun, Jupiter and the Milky Way </span><span class="non-italic" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">(</span></span><em data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Sidereus nuncius</span></em><span data-dcnode-id="1068" instrument_node=""> </span><span data-dcnode-id="1063"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="1066" data-popup="<span class=&quot;markup&quot;>The starry messenger</span>"><span data-dcnode-id="1067" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;The starry messenger&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="1062" instrument_node="">, </span><span class="non-italic" data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">1610)</span></span><span data-dcnode-id="1059" instrument_node=""> and whose optical mechanism was described by </span><a aria-expanded="false" class="mlink" data-dcnode-id="1057" data-popup="../../Biographies/Kepler/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Kepler/"><span data-dcnode-id="1058" instrument_node="">Kepler</span></a><span data-dcnode-id="1056" instrument_node=""> </span><span class="non-italic" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">(</span></span><em data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Dioptrice</span></em><span data-dcnode-id="1051" instrument_node=""> </span><span data-dcnode-id="1046"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="1049" data-popup="<span class=&quot;markup&quot;>Dioptics</span>"><span data-dcnode-id="1050" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;Dioptics&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="1045" instrument_node="">, </span><span class="non-italic" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">1611)</span></span><span data-dcnode-id="1042" instrument_node="">.
</span><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">
Another source of patronage during the </span><span class="non-italic" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">17</span></span><span data-dcnode-id="1035" instrument_node="">th century were the princely courts. The courts provided support to the sciences, not only securing a livelihood for the natural philosopher, but giving him a forum where his ideas could be heard and discussed. Emperors and courtesans surrounded themselves with mathematicians, natural philosophers and, above all, astrologers that, knowing the position of stars and planets, would predict the outcome of battles, the fate of new-born children or the fortune of marriages. This was the case of the astronomer </span><a aria-expanded="false" class="mlink" data-dcnode-id="1033" data-popup="../../Biographies/Brahe/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Brahe/"><span data-dcnode-id="1034" instrument_node="">Tycho Brahe</span></a><span data-dcnode-id="1032" instrument_node=""> and the mathematician </span><a aria-expanded="false" class="mlink" data-dcnode-id="1030" data-popup="../../Biographies/Kepler/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Kepler/"><span data-dcnode-id="1031" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="1029" instrument_node="">, both employed in the court of the Holy Roman Emperor Rudolf II, who used their knowledge of astrology to obtain the favour of the emperor so that they could pursue their true interest in obtaining precise astronomical observations and understanding the motion of the planets and their orbits. As </span><a aria-expanded="false" class="mlink" data-dcnode-id="1027" data-popup="../../Biographies/Kepler/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Kepler/"><span data-dcnode-id="1028" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="1026" instrument_node=""> affirmed in his book </span><em data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Tertius Interveniens</span></em><span data-dcnode-id="1023" instrument_node=""> </span><span data-dcnode-id="1018"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="1021" data-popup="<span class=&quot;markup&quot;>A third intervention</span>"><span data-dcnode-id="1022" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;A third intervention&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="1017" instrument_node="">, written in </span><span class="non-italic" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">1610</span></span><span data-dcnode-id="1014" instrument_node="">: 
</span><blockquote data-dcnode-id="1002"><span data-dcnode-id="1013" instrument_node="">Now, this Astrology is a foolish daughter </span><span class="non-italic" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">(</span></span><span data-dcnode-id="1010" instrument_node="">as I wrote in my book 'de Stella' Chap. XII </span><span class="non-italic" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">)</span></span><span data-dcnode-id="1007" instrument_node="">. But dear Lord, what would happen to her mother, the highly reasonable Astronomy, if she did not have this foolish daughter. The world, after all, is much more foolish, indeed is so foolish, that this old sensible mother, Astronomy, is talked into things and lied to as a result of her daughter's foolish pranks ...
</span><br data-dcnode-id="1006"><span data-dcnode-id="1005" instrument_node="">
</span><br data-dcnode-id="1004"><span data-dcnode-id="1003" instrument_node="">
The mathematician's pay would be so low, that the mother would starve, if the daughter did not earn anything. If formerly no one had been foolish enough to hope to learn of the future from the sky, then, Mr Astronomer, you would not have become so clever as to think that the course of the heavens should be made known for God's honour and glory. In fact, you would have known nothing of the course of the heavens.</span></blockquote><span data-dcnode-id="1001" instrument_node="">
The natural philosophers of the </span><span class="non-italic" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">17</span></span><span data-dcnode-id="998" instrument_node="">th century aspired to grasp the laws of nature with the aim of understanding God's mind. They described their discoveries with a desire to glorify the Creator, placing their findings and deductions within the context of the religious systems and philosophical doctrines of the times. Similarly, philosophers had the need to follow the new system in science, to adapt their discourses to the new discoveries </span><span data-dcnode-id="990"><span class="non-italic" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="993" data-popup="<span class=&quot;markup&quot;>J Langone, Bruce Stutz and Andrea Gianopoulos, <em>Theories for everything: an illustrated history of science from the invention of numbers to string theory</em> <span class=&quot;non-italic&quot;>(</span>National Geographic, Washington, D.C., <span class=&quot;non-italic&quot;>2006)</span>.</span>" href="#reference-7"><span class="non-italic" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">7</span></span></a><span class="non-italic" data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">]</span></span></span><span data-dcnode-id="989" instrument_node="">. It was different for the religious establishment; Christian authorities reacted to the new science rejecting its discoveries and accusing some natural philosophers of heresy. For centuries the Catholic Church had worked to 'Christianise' ancient philosophies, for instance to accept the teachings of Aristotle, Ptolemy and Galen, shaping them so that their writings were compatible with the Scriptures and could be read according to the doctrines of the Church. The new system of science and philosophy questioned the authority of these thinkers of the past, debated their ideas, and refused some of their claims </span><span data-dcnode-id="981"><span class="non-italic" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="984" data-popup="<span class=&quot;markup&quot;>S Shapin, <em>The scientific revolution</em> <span class=&quot;non-italic&quot;>(</span>University of Chicago Press, Chicago, IL, <span class=&quot;non-italic&quot;>1996)</span>.</span>" href="#reference-14"><span class="non-italic" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">14</span></span></a><span class="non-italic" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">]</span></span></span><span data-dcnode-id="980" instrument_node="">.
</span><br data-dcnode-id="979"><span data-dcnode-id="978" instrument_node="">
</span><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">
To some branches of the church, this challenge to the traditional science was taken as an attack on Christianity. Some orders applauded the new concepts in natural philosophy, admitted the benefits that experimentation provided, played with telescopes and other new inventions such microscopes and barometers, but worked hard to give an Aristotelian patina to the role of experience in natural philosophy. Many members of the Society of Jesus </span><span class="non-italic" data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">(</span></span><span data-dcnode-id="973" instrument_node="">usually called the Jesuits</span><span class="non-italic" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">)</span></span><span data-dcnode-id="970" instrument_node=""> pursued mathematical and scientific research and, although historically their teachings have been considered as obscurantist and conservative, putting a stick in the spokes of the new science, recent evidence based on an examination of the archives of the Order, have shown that several Jesuits made significant contributions to the scientific culture of the </span><span class="non-italic" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">17</span></span><span data-dcnode-id="967" instrument_node="">th century </span><span data-dcnode-id="959"><span class="non-italic" data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="962" data-popup="<span class=&quot;markup&quot;>M Feingold, <em>The new science and Jesuit science: seventeenth century perspectives</em> <span class=&quot;non-italic&quot;>(</span>Kluwer Academic Publishers, Dordrecht, <span class=&quot;non-italic&quot;>2003)</span>.</span>" href="#reference-3"><span class="non-italic" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">3</span></span></a><span class="non-italic" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">]</span></span></span><span data-dcnode-id="958" instrument_node="">.
</span><br data-dcnode-id="957"><span data-dcnode-id="956" instrument_node="">
</span><br data-dcnode-id="955"><span data-dcnode-id="954" instrument_node="">
</span><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">National differences. </span></strong><span data-dcnode-id="951" instrument_node="">
</span><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
</span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">
The Scientific Revolution was not a homogenous process that affected the whole of Europe in the same way. Regional and national differences shaped the way that society responded to the transformations imposed by the scientific method </span><span data-dcnode-id="939"><span class="non-italic" data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="942" data-popup="<span class=&quot;markup&quot;>R Porter and Mikulás Teich, <em>The Scientific revolution in national context</em> <span class=&quot;non-italic&quot;>(</span>Cambridge University Press, Cambridge, <span class=&quot;non-italic&quot;>1992)</span>.</span>" href="#reference-11"><span class="non-italic" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">11</span></span></a><span class="non-italic" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">]</span></span></span><span data-dcnode-id="938" instrument_node="">. The diverse national contexts render it difficult to talk about a uniform Scientific Revolution but rather of Revolutions taking place in different parts of Europe at the same time.
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
In the period that followed the Dark Ages into the transition to the Modern, Europe experienced profound changes that shook its core. One of the developments was the Renaissance, characterized by the rediscovery of the works of Antiquity. The revival of this ancient culture led to the appreciation and admiration of the physical world and of the human body, and had a strong influence on the arts and the sciences resulting in remarkable cultural and intellectual progress. Simultaneously, the Reformation, initiated by Martin Luther's divulgation of his ninety-five theses against indulgences, divided Europe into Catholic and Protestant regions, and as a result brought more than a hundred years of turmoil and wars in the different territories. The changing religious beliefs and practices and the different appreciation of the cosmos resulted in new ways of interpreting the universe. An engaging curiosity towards science and technology produced many technological inventions, many of them as ground-breaking as the printing press that had a profound influence in communicating and disseminating ideas and thoughts and to make literature popular and accessible. These scenarios were the perfect breeding ground for the events, theories and ideas that are known as the Scientific Revolution </span><span data-dcnode-id="926"><span class="non-italic" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="929" data-popup="<span class=&quot;markup&quot;>J E Carney, <em>Renaissance and Reformation, <span class=&quot;non-italic&quot;>1500</span>-<span class=&quot;non-italic&quot;>1620</span>: a biographical dictionary</em> <span class=&quot;non-italic&quot;>(</span>Greenwood Press, Westport, Conn, <span class=&quot;non-italic&quot;>2001)</span>.</span>" href="#reference-2"><span class="non-italic" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">2</span></span></a><span class="non-italic" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">]</span></span></span><span data-dcnode-id="925" instrument_node="">.
</span><br data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">
</span><br data-dcnode-id="922"><span data-dcnode-id="921" instrument_node="">
</span><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">The Scientific Revolution in England.</span></strong><span data-dcnode-id="918" instrument_node="">
</span><br data-dcnode-id="917"><span data-dcnode-id="916" instrument_node="">
</span><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">
In England, the scientific revolution reached its zenith during the second part of the </span><span class="non-italic" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">17</span></span><span data-dcnode-id="911" instrument_node="">th century. But it was many years before, around the year </span><span class="non-italic" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">1600</span></span><span data-dcnode-id="908" instrument_node="">, that Francis Bacon, the Lord Chancellor to the King James I and known nowadays as the 'Father of modern science', had set the foundation of a pragmatic view of the world and its knowledge, had opened the door to man's ability to control nature, and stated that knowing the laws of nature will bring 'the empire of man over things' </span><span class="non-italic" data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">(</span></span><em data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Novum Organum</span></em><span data-dcnode-id="903" instrument_node=""> </span><span data-dcnode-id="898"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="901" data-popup="<span class=&quot;markup&quot;>A new instrument</span>"><span data-dcnode-id="902" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;A new instrument&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="897" instrument_node="">, </span><span class="non-italic" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">1623)</span></span><span data-dcnode-id="894" instrument_node="">. Other influential English figures from the beginning of the century were William Gilbert </span><span class="non-italic" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">(1544</span></span><span data-dcnode-id="891" instrument_node="">-</span><span class="non-italic" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">1603)</span></span><span data-dcnode-id="888" instrument_node="">, who introduced the concept of Earth magnetism </span><span class="non-italic" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">(</span></span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">De magnete</span></em><span data-dcnode-id="883" instrument_node=""> </span><span data-dcnode-id="878"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="881" data-popup="<span class=&quot;markup&quot;>The magnet</span>"><span data-dcnode-id="882" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;The magnet&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="877" instrument_node="">, </span><span class="non-italic" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">1600)</span></span><span data-dcnode-id="874" instrument_node="">, and William Harvey, who discovered and described the circulation of the blood </span><span class="non-italic" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">(</span></span><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">De motu cordis et sanguinis</span></em><span data-dcnode-id="869" instrument_node=""> </span><span data-dcnode-id="864"><a aria-expanded="false" class="translation nonoscript non-italic" data-dcnode-id="867" data-popup="<span class=&quot;markup&quot;>The circulation of the blood</span>"><span data-dcnode-id="868" instrument_node="">Ⓣ</span></a><noscript data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">&lt;span class="non-italic"&gt;(&lt;/span&gt;&lt;span class="markup"&gt;The circulation of the blood&lt;/span&gt;&lt;span class="non-italic"&gt;)&lt;/span&gt;</span></noscript></span><span data-dcnode-id="863" instrument_node="">, </span><span class="non-italic" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">1628)</span></span><span data-dcnode-id="860" instrument_node="">. All three of them had the privileges and obligations that were afforded by being advisers to the royal family, and in the case of Harvey, for instance, he had rapid access to all the game that James I and his court hunted, so that he could dissect and observe the blood </span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">in situ</span></em><span data-dcnode-id="857" instrument_node="">.
</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">
</span><br data-dcnode-id="854"><span data-dcnode-id="853" instrument_node="">
By mid-century, England turned to science, after a period of political instability marked by the Civil War, the establishment of the Commonwealth and Cromwell's protectorate. After </span><span class="non-italic" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">1650</span></span><span data-dcnode-id="850" instrument_node="">, and before the return of the king Charles II, the new science was practiced for its economic benefits, to find new resources for commerce and technology, and for its social status as, for the society of the time, turning to intellectual amusements had become fashionable </span><span data-dcnode-id="842"><span class="non-italic" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="845" data-popup="<span class=&quot;markup&quot;>L Jardine, Britain and the rise of science, <em>BBC History</em> <span class=&quot;non-italic&quot;>(17</span> February <span class=&quot;non-italic&quot;>2011)</span>. <a href=&quot;http://www.bbc.co.uk/history/british/empire_seapower/jardineih_01.shtml&quot;>http://www.bbc.co.uk/history/british/empire_seapower/jardineih_<span class=&quot;non-italic&quot;>01</span>.shtml</a></span>" href="#reference-6"><span class="non-italic" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">6</span></span></a><span class="non-italic" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">]</span></span></span><span data-dcnode-id="841" instrument_node="">.
</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
With the foundation of scientific societies and academies, in England as well as on the Continent, experimental natural philosophers, learned gentlemen and amateur experimentalist had a forum where they could exchange ideas, disclose theories and communicate results. The societies enjoyed state patronage, promoted collaboration between their members and had mottos that reflected the commitment of their members to experimentation -the Royal Society motto was '</span><em data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Nullius in verba</span></em><span data-dcnode-id="834" instrument_node="">' </span><span class="non-italic" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">(</span></span><span data-dcnode-id="831" instrument_node="">take nobody's word for it</span><span class="non-italic" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">)</span></span><span data-dcnode-id="828" instrument_node=""> and the one of the </span><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Accademia del Cimento</span></em><span data-dcnode-id="825" instrument_node="">, in Florence, was '</span><em data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Provando e riprovando' </span></em><span class="non-italic" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">(</span></span><span data-dcnode-id="820" instrument_node="">Try and Try again</span><span class="non-italic" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">)</span></span><span data-dcnode-id="817" instrument_node=""> - </span><span data-dcnode-id="809"><span class="non-italic" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="812" data-popup="<span class=&quot;markup&quot;>S Shapin, <em>The scientific revolution</em> <span class=&quot;non-italic&quot;>(</span>University of Chicago Press, Chicago, IL, <span class=&quot;non-italic&quot;>1996)</span>.</span>" href="#reference-14"><span class="non-italic" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">14</span></span></a><span class="non-italic" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">]</span></span></span><span data-dcnode-id="808" instrument_node="">.
</span><br data-dcnode-id="807"><span data-dcnode-id="806" instrument_node="">
</span><br data-dcnode-id="805"><span data-dcnode-id="804" instrument_node="">
Many important men of science were members of the Royal Society and contributed to numerous technological discoveries. This is the case for </span><a aria-expanded="false" class="mlink" data-dcnode-id="802" data-popup="../../Biographies/Boyle/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Boyle/"><span data-dcnode-id="803" instrument_node="">Robert Boyle</span></a><span data-dcnode-id="801" instrument_node=""> </span><span class="non-italic" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">(1627</span></span><span data-dcnode-id="798" instrument_node="">-</span><span class="non-italic" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">1691)</span></span><span data-dcnode-id="795" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="793" data-popup="../../Biographies/Hooke/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Hooke/"><span data-dcnode-id="794" instrument_node="">Robert Hooke</span></a><span data-dcnode-id="792" instrument_node=""> </span><span class="non-italic" data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">(1635</span></span><span data-dcnode-id="789" instrument_node="">-</span><span class="non-italic" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">1703)</span></span><span data-dcnode-id="786" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="784" data-popup="../../Biographies/Wren/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Wren/"><span data-dcnode-id="785" instrument_node="">Christopher Wren</span></a><span data-dcnode-id="783" instrument_node=""> </span><span class="non-italic" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">(1632</span></span><span data-dcnode-id="780" instrument_node="">-</span><span class="non-italic" data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">1723)</span></span><span data-dcnode-id="777" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="775" data-popup="../../Biographies/Halley/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Halley/"><span data-dcnode-id="776" instrument_node="">Edmond Halley</span></a><span data-dcnode-id="774" instrument_node=""> </span><span class="non-italic" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">(1656</span></span><span data-dcnode-id="771" instrument_node="">-</span><span class="non-italic" data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">1742)</span></span><span data-dcnode-id="768" instrument_node=""> and </span><a aria-expanded="false" class="mlink" data-dcnode-id="766" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="767" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="765" instrument_node="">. </span><a aria-expanded="false" class="mlink" data-dcnode-id="763" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="764" instrument_node="">Newton</span></a><span data-dcnode-id="762" instrument_node=""> was president of the Royal Society in </span><span class="non-italic" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">1703</span></span><span data-dcnode-id="759" instrument_node="">.
</span><br data-dcnode-id="758"><span data-dcnode-id="757" instrument_node="">
</span><br data-dcnode-id="756"><span data-dcnode-id="755" instrument_node="">
Approaching the end of the century, in the year </span><span class="non-italic" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">1687</span></span><span data-dcnode-id="752" instrument_node="">, </span><a aria-expanded="false" class="mlink" data-dcnode-id="750" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="751" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="749" instrument_node=""> published his </span><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">opera magna, Philosophiæ Naturalis Principia Mathematica, </span></em><span data-dcnode-id="746" instrument_node="">one of the most significant works on the history of science, where he sets the foundation for classical mechanics, describes the Law of the Universal Gravitation and introduces Calculus, a new mathematical system to study motion and change. In this book, </span><a aria-expanded="false" class="mlink" data-dcnode-id="744" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="745" instrument_node="">Newton</span></a><span data-dcnode-id="743" instrument_node=""> unifies mathematics with mechanics, both terrestrial and celestial. The concept of a quantitative universe, imperfect and changing, replaces the idea of a perfect and constant cosmos described by the ancient philosophers. The laws that governed nature here on Earth, were the same that ruled the Universe, absolute space and absolute motion, all was one. Historians see the publication of the </span><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Principia </span></em><span data-dcnode-id="740" instrument_node="">as the culmination of the Scientific Revolution </span><span data-dcnode-id="732"><span class="non-italic" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="735" data-popup="<span class=&quot;markup&quot;>J Hakim, <em>The story of science: Newton at the center </em><span class=&quot;non-italic&quot;>(</span>Smithsonian Books, Washington, <span class=&quot;non-italic&quot;>2005)</span>.</span>" href="#reference-4"><span class="non-italic" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">4</span></span></a><span class="non-italic" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">]</span></span></span><span data-dcnode-id="731" instrument_node="">, </span><span data-dcnode-id="723"><span class="non-italic" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="726" data-popup="<span class=&quot;markup&quot;>S Shapin, <em>The scientific revolution</em> <span class=&quot;non-italic&quot;>(</span>University of Chicago Press, Chicago, IL, <span class=&quot;non-italic&quot;>1996)</span>.</span>" href="#reference-14"><span class="non-italic" data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">14</span></span></a><span class="non-italic" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">]</span></span></span><span data-dcnode-id="722" instrument_node="">.
</span><br data-dcnode-id="721"><span data-dcnode-id="720" instrument_node="">
</span><br data-dcnode-id="719"><span data-dcnode-id="718" instrument_node="">
</span><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">The Scientific Revolution in Scotland.</span></strong><span data-dcnode-id="715" instrument_node="">
</span><br data-dcnode-id="714"><span data-dcnode-id="713" instrument_node="">
</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
The effect of the Scientific Revolution in Scotland</span><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node=""> </span></strong><span data-dcnode-id="708" instrument_node="">was more limited in its scope. During the </span><span class="non-italic" data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">16</span></span><span data-dcnode-id="705" instrument_node="">th and </span><span class="non-italic" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">17</span></span><span data-dcnode-id="702" instrument_node="">th centuries, many Scottish natural philosophers abandoned their homeland for the Continent and made significant contributions elsewhere. This exodus of learned men left the university in the hands of the clergy and the teaching of science was limited to commentaries on Aristotle. Ecclesiastical authorities, predominately Calvinists, were occupied in the Bishop's war and rebellions, and preoccupied about the possible arrival and extension of the ideas of </span><a aria-expanded="false" class="mlink" data-dcnode-id="700" data-popup="../../Biographies/Descartes/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Descartes/"><span data-dcnode-id="701" instrument_node="">Descartes</span></a><span data-dcnode-id="699" instrument_node="">. The professors who knew about its writings, particularly those of </span><a aria-expanded="false" class="mlink" data-dcnode-id="697" data-popup="../../Biographies/Kepler/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Kepler/"><span data-dcnode-id="698" instrument_node="">Kepler</span></a><span data-dcnode-id="696" instrument_node=""> and </span><a aria-expanded="false" class="mlink" data-dcnode-id="694" data-popup="../../Biographies/Galileo/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Galileo/"><span data-dcnode-id="695" instrument_node="">Galileo</span></a><span data-dcnode-id="693" instrument_node="">, introduced some of their concepts and ideas into their teaching but denied heliocentrism as the hypothesis of a moving Earth was in opposition to the Scriptures.
</span><br data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
The second half of the </span><span class="non-italic" data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">17</span></span><span data-dcnode-id="686" instrument_node="">th century, following the restoration of the monarchy, saw a shift in the rigidness of the Kirk and a profound change in the teaching of natural philosophy in Scottish universities. Teachers and students embraced the ideas of Descartes, accepted </span><a aria-expanded="false" class="mlink" data-dcnode-id="684" data-popup="../../Biographies/Copernicus/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Copernicus/"><span data-dcnode-id="685" instrument_node="">Copernicus</span></a><span data-dcnode-id="683" instrument_node="">'s heliocentric theories and advocated the need of experimentation and observation.
</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
The main reason for the acceptance of the new theories was the opening of communications by the creation of links between Scottish learned men and English natural philosophers. The presence of Scots in the </span><a class="aclink" data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Societies/RS/" target="_blank"><span data-dcnode-id="678" instrument_node="">Royal Society of London</span></a><span data-dcnode-id="676" instrument_node=""> and the frequent correspondence of some mathematicians with the mathematical community in England fuelled the transformation of the Scottish universities and transformed the cultural and scientific scene in Scotland.
</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
</span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Role of the Universities. </span></strong><span data-dcnode-id="669" instrument_node="">
</span><br data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><br data-dcnode-id="666"><span data-dcnode-id="665" instrument_node="">
There is a general consensus between historians that the Scientific Revolution happened only in Europe and not in other parts of the world. The reasons for this are varied and complex. It has been speculated that despite the existence of different vernacular, the use of a common language in Europe, Latin, acted as a </span><em data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">lingua franca</span></em><span data-dcnode-id="662" instrument_node=""> facilitating the exchange of ideas and the access to written texts. At the same time, the role of the Catholic Church translating and adapting the works of the classical philosophers, mathematicians and astronomers, helped to spread the ideas of </span><a aria-expanded="false" class="mlink" data-dcnode-id="660" data-popup="../../Biographies/Aristotle/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Aristotle/"><span data-dcnode-id="661" instrument_node="">Aristotle</span></a><span data-dcnode-id="659" instrument_node=""> and </span><a aria-expanded="false" class="mlink" data-dcnode-id="657" data-popup="../../Biographies/Ptolemy/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Ptolemy/"><span data-dcnode-id="658" instrument_node="">Ptolemy</span></a><span data-dcnode-id="656" instrument_node=""> and other thinkers of the past. As stated above, the needs for better navigation tools and aids for trade, wars and exploration provided resources to artists, artisans and mathematicians to improve existing instruments and to create new ones. Nonetheless these conditions were also true for other parts of the world. There were vast empires that also had a common language, had a past rich in philosophies and doctrines, and were also in need of improving their instruments and tools for war and commerce. So, what was different in the case of Europe?
</span><br data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
</span><br data-dcnode-id="653"><span data-dcnode-id="652" instrument_node="">
The answer may be in the universities, institutions that provided a supportive environment for study and research </span><span data-dcnode-id="644"><span class="non-italic" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="647" data-popup="<span class=&quot;markup&quot;>J R McNeill and William Hardy McNeill, <em>The human web: a bird's-eye view of world history</em> <span class=&quot;non-italic&quot;>(</span>W W Norton, New York, <span class=&quot;non-italic&quot;>2003)</span>.</span>" href="#reference-8"><span class="non-italic" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">8</span></span></a><span class="non-italic" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">]</span></span></span><span data-dcnode-id="643" instrument_node="">. The first universities </span><span class="non-italic" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">(</span></span><span data-dcnode-id="640" instrument_node="">schools at the time</span><span class="non-italic" data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">)</span></span><span data-dcnode-id="637" instrument_node=""> appeared in Europe in the </span><span class="non-italic" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">11</span></span><span data-dcnode-id="634" instrument_node="">th century and by the </span><span class="non-italic" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">15</span></span><span data-dcnode-id="631" instrument_node="">th century there were more than one hundred. In many cases, the proliferation of universities was due to the secession of groups from the initial university that went on to found another where they were able to spread their own ideas. The first universities prepared their students to be members of the clergy, physicians or for the study of law. </span><span data-dcnode-id="623"><span class="non-italic" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="626" data-popup="<span class=&quot;markup&quot;>W Rüegg, and H De Ridder-Symoens, <em>A history of the university in Europe <span class=&quot;non-italic&quot;>1</span>, <span class=&quot;non-italic&quot;>1</span></em> <span class=&quot;non-italic&quot;>(</span>Cambridge University Press, Cambridge, <span class=&quot;non-italic&quot;>1992)</span>.</span>" href="#reference-13"><span class="non-italic" data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">13</span></span></a><span class="non-italic" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">]</span></span></span><span data-dcnode-id="622" instrument_node="">. After the medieval period, most universities based their curricula on the texts of ancient writers, mostly Aristotle and the peripatetic philosophy. In a changing world, this interest in classical knowledge prompted some students to reconsider the principles behind the writings, to question their validity and supremacy. In </span><span class="non-italic" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">1661</span></span><span data-dcnode-id="619" instrument_node="">, a young </span><a aria-expanded="false" class="mlink" data-dcnode-id="617" data-popup="../../Biographies/Newton/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Newton/"><span data-dcnode-id="618" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="616" instrument_node=""> wrote in his notebook at Cambridge a motto that he probably adapted from </span><a aria-expanded="false" class="mlink" data-dcnode-id="614" data-popup="../../Biographies/Bacon/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Bacon/"><span data-dcnode-id="615" instrument_node="">Roger Bacon</span></a><span data-dcnode-id="613" instrument_node="">'s writings: </span><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">"Amicus Plato amicus Aristoteles magis amica veritas"</span></em><span data-dcnode-id="610" instrument_node=""> </span><span class="non-italic" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">(</span></span><a aria-expanded="false" class="mlink" data-dcnode-id="606" data-popup="../../Biographies/Plato/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Plato/"><span data-dcnode-id="607" instrument_node="">Plato</span></a><span data-dcnode-id="605" instrument_node=""> is my friend, </span><a aria-expanded="false" class="mlink" data-dcnode-id="603" data-popup="../../Biographies/Aristotle/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Aristotle/"><span data-dcnode-id="604" instrument_node="">Aristotle</span></a><span data-dcnode-id="602" instrument_node=""> is my friend, but a greater friend is truth</span><span class="non-italic" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">)</span></span><span data-dcnode-id="599" instrument_node="">. The doctrines of Francis Bacon and </span><a aria-expanded="false" class="mlink" data-dcnode-id="597" data-popup="../../Biographies/Descartes/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Descartes/"><span data-dcnode-id="598" instrument_node="">Descartes</span></a><span data-dcnode-id="596" instrument_node=""> transformed the curricula of the vast majority of universities that, adapting to the times, promoted scientific enquiry and the search for knowledge. Universities in the </span><span class="non-italic" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">17</span></span><span data-dcnode-id="593" instrument_node="">th century facilitated the communication between scholars and presented a safe haven for natural philosophers.
</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">
</span><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">
But some academics and scholars dissented from the rigidity of the universities, claiming that the authoritarianism thwarted the progress of knowledge. This was one of the motives behind the foundation and spread of the learned societies, the need of having a new organizational form where one could discuss scientific progress based on civic concerns rather than on religious matters. The bishop Thomas Sprat in his </span><em data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">History of the Royal Society of London </span></em><span class="non-italic" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">(1667)</span></span><span data-dcnode-id="584" instrument_node=""> mentions that: 
</span><blockquote data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The second error, which is hereby endeavour'd to be remedied, is, that the seats of knowledge have been for the most part heretofore, not laboratories, as they ought to be; but only schools, where some have taught, and all the rest subscrib'd. The consequences of this are very mischievous.</span></blockquote><span data-dcnode-id="581" instrument_node="">
</span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The University of St Andrews during the Scientific Revolution. </span></strong><span data-dcnode-id="578" instrument_node="">
</span><br data-dcnode-id="577"><span data-dcnode-id="576" instrument_node="">
</span><br data-dcnode-id="575"><span data-dcnode-id="574" instrument_node="">
The Papal Bull of Foundation of the University of St Andrews, issued on August </span><span class="non-italic" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">1413</span></span><span data-dcnode-id="571" instrument_node="">, stated that: </span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">"...</span></em><span data-dcnode-id="568" instrument_node=""> </span><em data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">we are led to hope that this city, which the divine bounty has enriched with so many gifts, may become the fountain of science. ..."</span></em><span data-dcnode-id="565" instrument_node=""> </span><span data-dcnode-id="557"><span class="non-italic" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="560" data-popup="<span class=&quot;markup&quot;>J J O'Connor and E F Robertson, History topic: Mathematics in St Andrews to <span class=&quot;non-italic&quot;>1700</span>, <em>MacTutor History of Mathematics</em> <span class=&quot;non-italic&quot;>(1996)</span>. <a href=&quot;../../HistTopics/U_of_St_Andrews_History/&quot;>http://www-history.mcs.st-andrews.ac.uk/HistTopics/U_of_St_Andrews_History.html</a></span>" href="#reference-10"><span class="non-italic" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">10</span></span></a><span class="non-italic" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">]</span></span></span><span data-dcnode-id="556" instrument_node="">. However, despite Benedict XIII's designs, the University did not flourished in the sciences or mathematics until the second half of the </span><span class="non-italic" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">17</span></span><span data-dcnode-id="553" instrument_node="">th century, </span><span class="non-italic" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">250</span></span><span data-dcnode-id="550" instrument_node=""> years after its foundation. During its first two centuries, students in the University received instruction in Arts, mainly in the study of Aristotle </span><span data-dcnode-id="542"><span class="non-italic" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="545" data-popup="<span class=&quot;markup&quot;>J J O'Connor and E F Robertson, History topic: Mathematics in St Andrews to <span class=&quot;non-italic&quot;>1700</span>, <em>MacTutor History of Mathematics</em> <span class=&quot;non-italic&quot;>(1996)</span>. <a href=&quot;../../HistTopics/U_of_St_Andrews_History/&quot;>http://www-history.mcs.st-andrews.ac.uk/HistTopics/U_of_St_Andrews_History.html</a></span>" href="#reference-10"><span class="non-italic" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">10</span></span></a><span class="non-italic" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">]</span></span></span><span data-dcnode-id="541" instrument_node="">.
</span><br data-dcnode-id="540"><span data-dcnode-id="539" instrument_node="">
</span><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node="">
The impact of the Scientific Revolution on the University of St Andrews was similar to its effects in the other Scottish Universities. As stated above, Scotland was a latecomer to the mathematical and scientific advances.
</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
By the end of the </span><span class="non-italic" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">16</span></span><span data-dcnode-id="530" instrument_node="">th century the University of St Andrews consisted on three collegiate societies: St Salvator's and St Leonard's Colleges dedicated to the teaching of philosophy and the arts, and St Mary's College that focused on theology. The professors were regents, teachers in charge of the same group of students during the </span><span class="non-italic" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">4</span></span><span data-dcnode-id="527" instrument_node=""> years of the curriculum. After the reforms of </span><span class="non-italic" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">1579</span></span><span data-dcnode-id="524" instrument_node="">, the University appointed for the first time professors that were specialists on specifics subjects, one of them was a professor of Mathematics, attached to St Salvator's College. But Mathematics was not well thought of in the University and the professors were considered as an unwanted burden. </span><span data-dcnode-id="516"><span class="non-italic" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="519" data-popup="<span class=&quot;markup&quot;>H C Rawson, <em>Treasures of the University: an examination of the identification, presentation and responses to artefacts of significance at the University of St Andrews, from <span class=&quot;non-italic&quot;>1410</span> to the mid-<span class=&quot;non-italic&quot;>19</span>th century; with an additional consideration of the development of the portrait collection to the early <span class=&quot;non-italic&quot;>21</span>st century</em> <span class=&quot;non-italic&quot;>(</span>Art History Theses, University of St Andrews, <span class=&quot;non-italic&quot;>2010)</span>.</span>" href="#reference-12"><span class="non-italic" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">12</span></span></a><span class="non-italic" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">]</span></span></span><span data-dcnode-id="515" instrument_node="">
</span><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node="">
</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">
Mathematical teaching and research at the University began in </span><span class="non-italic" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">1668</span></span><span data-dcnode-id="508" instrument_node=""> with the appointment of </span><a aria-expanded="false" class="mlink" data-dcnode-id="506" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="507" instrument_node="">James Gregory</span></a><span data-dcnode-id="505" instrument_node=""> as the first holder of the Regius Chair of Mathematics in St Andrews. </span><a aria-expanded="false" class="mlink" data-dcnode-id="503" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="504" instrument_node="">James Gregory</span></a><span data-dcnode-id="502" instrument_node=""> was proposed for the chair by his friend Robert Moray, a graduate of St Andrews and member of the </span><a class="aclink" data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Societies/RS/" target="_blank"><span data-dcnode-id="501" instrument_node="">Royal Society</span></a><span data-dcnode-id="499" instrument_node="">. Moray together with Archbishop Sharp of St Andrews persuaded Charles II to found the professorship. The chair was not attached to any college, and </span><a aria-expanded="false" class="mlink" data-dcnode-id="497" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="498" instrument_node="">James Gregory</span></a><span data-dcnode-id="496" instrument_node="">, who had just become a member of the </span><a class="aclink" data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Societies/RS/" target="_blank"><span data-dcnode-id="495" instrument_node="">Royal Society</span></a><span data-dcnode-id="493" instrument_node="">, worked in the Upper Hall of the university library </span><span data-dcnode-id="485"><span class="non-italic" data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="488" data-popup="<span class=&quot;markup&quot;>R G Cant, <em>The University of St Andrews: A Short History</em> <span class=&quot;non-italic&quot;>(</span>Oliver and Boyd, Edinburgh, <span class=&quot;non-italic&quot;>1946)</span>.</span>" href="#reference-1"><span class="non-italic" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">1</span></span></a><span class="non-italic" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">]</span></span></span><span data-dcnode-id="484" instrument_node="">.
</span><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
</span><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
</span><a aria-expanded="false" class="mlink" data-dcnode-id="478" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="479" instrument_node="">Gregory</span></a><span data-dcnode-id="477" instrument_node=""> occupied the Regius chair for six years. During his years in St Andrews </span><a aria-expanded="false" class="mlink" data-dcnode-id="475" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="476" instrument_node="">Gregory</span></a><span data-dcnode-id="474" instrument_node=""> carried out important work in the field of mathematics and astronomy and modernised the teachings of these subjects, introducing the latest developments and theories in these areas. He corresponded with leading natural philosophers in England and the Continent, and was a key figure in introducing the ideas of the Scientific Revolution to the community of the University of St Andrews.
</span><br data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">
</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node="">
Unfortunately, </span><a aria-expanded="false" class="mlink" data-dcnode-id="468" data-popup="../../Biographies/Gregory/popup/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathshistory.st-andrews.ac.uk/Biographies/Gregory/"><span data-dcnode-id="469" instrument_node="">Gregory</span></a><span data-dcnode-id="467" instrument_node="">'s time in St Andrews was cut short. When he was in his apogee, involved in the design and planning of the first observatory in Britain, he left for the University of Edinburgh. The construction of the observatory continued despite his absence but neither the building nor the instruments intended to be housed there were ever fully brought to use and the structure, erected at the south end of St Mary's College, became derelict in the eighteenth century and was demolished by the nineteenth </span><span data-dcnode-id="459"><span class="non-italic" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">[</span></span><a aria-expanded="false" class="reference" data-dcnode-id="462" data-popup="<span class=&quot;markup&quot;>H C Rawson, <em>Treasures of the University: an examination of the identification, presentation and responses to artefacts of significance at the University of St Andrews, from <span class=&quot;non-italic&quot;>1410</span> to the mid-<span class=&quot;non-italic&quot;>19</span>th century; with an additional consideration of the development of the portrait collection to the early <span class=&quot;non-italic&quot;>21</span>st century</em> <span class=&quot;non-italic&quot;>(</span>Art History Theses, University of St Andrews, <span class=&quot;non-italic&quot;>2010)</span>.</span>" href="#reference-12"><span class="non-italic" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">12</span></span></a><span class="non-italic" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">]</span></span></span><span data-dcnode-id="458" instrument_node="">.
