</span><h1 class="t3m-ScienceLab-article-headline" data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">
                  Infinity Optical Systems
                </span></h1><span data-dcnode-id="986" instrument_node="">
</span><span data-dcnode-id="984" instrument_node="">
</span><h2 class="t3m-ScienceLab-article-subheadline h3" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">
                      From Infinity Optics to the Infinity Port
                    </span></h2><span data-dcnode-id="981" instrument_node="">
</span><span data-dcnode-id="979" instrument_node="">
</span><div class="t3m-ScienceLab-article-summary" data-dcnode-id="954"><span data-dcnode-id="978" instrument_node="">
</span><span data-dcnode-id="976" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="966" id="c175059"><div class="ce-textpic ce-center ce-above" data-dcnode-id="967"><div class="ce-bodytext" data-dcnode-id="968"><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">“Infinity Optics” refers to the concept of a beam path with parallel rays between the objective and the tube lens of a microscope. Flat optical components can be brought into this “Infinity Space” without influencing image formation, which is critical for the utilization of contrast methods such as </span><acronym data-dcnode-id="973" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="974" instrument_node="">DIC</span></acronym><span data-dcnode-id="972" instrument_node=""> or fluorescence. 
</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Modern microscopy techniques require the addition of multiple optical instruments, such as light sources or laser devices, into the infinite light path. Different approaches to fulfill this need have emerged and are described here.</span></p></div></div></div><span data-dcnode-id="965" instrument_node="">
</span><span data-dcnode-id="963" instrument_node="">

</span><div class="t3m-Section-body" data-dcnode-id="471"><span data-dcnode-id="767" instrument_node="">
</span><div class="t3m-ScienceLab-article-row" data-dcnode-id="473"><span data-dcnode-id="766" instrument_node="">
</span><div class="t3m-ScienceLab-article-col-1 col-xl" data-dcnode-id="765"></div><span data-dcnode-id="764" instrument_node="">
</span><div class="t3m-ScienceLab-article-content t3m-ScienceLab-article-col-2 col-xl t3m-ScienceLab-toc" data-dcnode-id="478"><span data-dcnode-id="763" instrument_node="">
</span><span data-dcnode-id="761" instrument_node="">
</span><span data-dcnode-id="759" instrument_node="">
</span><span data-dcnode-id="757" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="719" id="c175061"><header data-dcnode-id="754"><h2 class="" data-dcnode-id="755" id="tocItem0"><span data-dcnode-id="756" instrument_node="">
				From Anton van Leeuwenhoek to compound microscopes
			</span></h2></header><div class="ce-textpic ce-left ce-below" data-dcnode-id="720"><div class="ce-bodytext" data-dcnode-id="729"><p data-dcnode-id="743"><span data-dcnode-id="753" instrument_node="">Since the invention of glass by the Romans in the first century, people discovered that a magnification effect was created by round-shaped pearls of glass. Later on this effect was scientifically investigated and further developed, resulting in the simple magnification glasses of the 16</span><sup data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">th</span></sup><span data-dcnode-id="750" instrument_node=""> and 17</span><sup data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">th</span></sup><span data-dcnode-id="747" instrument_node=""> centuries, e.g., those invented by Hans and Zacharias Jansen or Anton van Leeuwenhoek. Historically, this was the hour of </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/a-brief-history-of-light-microscopy-from-the-medieval-reading-stone-to-super-resolution/"><span data-dcnode-id="746" instrument_node="">the birth of microscopy</span></a><span data-dcnode-id="744" instrument_node="">. 
</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">By definition, the “microscope” is an instrument that magnifies objects that are not normally resolvable by the human eye, and so these single lens tools were already – microscopes (s. Figure 1 top). Nowadays we think of something different when we talk about a microscope. This is due to the fact that people soon realized that the combination of two separate lenses (or lens systems) in a row is a more effective visual tool than a single lens.
</span></p><p data-dcnode-id="730"><span data-dcnode-id="740" instrument_node=""> To describe such a set-up the term “compound microscope” was created. </span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/optical-microscopes-some-basics/"><span data-dcnode-id="739" instrument_node="">Compound microscopes</span></a><span data-dcnode-id="737" instrument_node=""> consist of an </span><b data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">objective</span></b><span data-dcnode-id="734" instrument_node=""> magnifying the specimen and an </span><b data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">eyepiece</span></b><span data-dcnode-id="731" instrument_node=""> (respectively two) magnifying the image produced by the objective (s. Figure 1 middle). </span></p></div><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="721"><div class="ce-row" data-dcnode-id="722"><div class="ce-column" data-dcnode-id="723"><figure class="image" data-dcnode-id="724"><a class="fancybox" data-caption="Fig. 1: Top: Microscopy started with simple magnifying devices in the 16th and 17th centuries. The objective in this case is a single lens magnifying a specimen. Middle: A compound microscope with finite optics consists of a two lens system. The objective magnifies the specimen, and the eyepiece magnifies the image produced by the objective. The distance between the objective shoulder and the ocular shoulder is called mechanical tube length. Bottom: A compound microscope with Infinity Optics holds an additional tube lens (TL)." data-dcnode-id="727" data-fancybox="fancybox-175061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg" rel="fancybox-175061"><img alt="" class="image-embed-item" data-dcnode-id="728" height="684" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/7/b/csm_Figure_1_0204a3a6a3.jpg 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/7/b/csm_Figure_1_cd7e6f4ecf.jpg 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_1.jpg 1799w" width="864"></a><figcaption class="image-caption" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">
        Fig. 1: Top: Microscopy started with simple magnifying devices in the 16th and 17th centuries. The objective in this case is a single lens magnifying a specimen. Middle: A compound microscope with finite optics consists of a two lens system. The objective magnifies the specimen, and the eyepiece magnifies the image produced by the objective. The distance between the objective shoulder and the ocular shoulder is called mechanical tube length. Bottom: A compound microscope with Infinity Optics holds an additional tube lens (TL).
      </span></figcaption></figure></div></div></div></div></div><span data-dcnode-id="718" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="674" id="c175065"><header data-dcnode-id="715"><h2 class="" data-dcnode-id="716" id="tocItem1"><span data-dcnode-id="717" instrument_node="">
				Introduction of infinity optics
			</span></h2></header><div class="ce-textpic ce-left ce-below" data-dcnode-id="675"><div class="ce-bodytext" data-dcnode-id="684"><p data-dcnode-id="701"><span data-dcnode-id="714" instrument_node="">The distance between the objective shoulder and the ocular shoulder is called </span><b data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">mechanical tube length </span></b><span data-dcnode-id="711" instrument_node="">(s. Figure 1 middle). For standardization this value was set to 160 mm by the </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.rms.org.uk/" target="_blank" title="Royal Microscopical Society"><span data-dcnode-id="710" instrument_node="">Royal Microscopical Society</span></a><span data-dcnode-id="708" instrument_node=""> in the 19</span><sup data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">th</span></sup><span data-dcnode-id="705" instrument_node=""> century. Over the years this design turned out to have some drawbacks. Adding additional optical elements into the light path, such as prisms for Differential Interference Contrast (</span><acronym data-dcnode-id="703" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="704" instrument_node="">DIC</span></acronym><span data-dcnode-id="702" instrument_node="">), polarizers, etc., changed the effective tube length and introduced aberrations, which had to be accepted, or corrected with the addition of other hardware components. 
</span></p><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">For this reason the microscope manufacturer Reichert started to experiment with so called </span><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">infinite optics </span></b><span data-dcnode-id="697" instrument_node="">in the 1930’s, and this technology was later adopted by all other microscope companies. Objectives of these infinite optical systems project a specimen image to infinity, meaning that all light rays derived from a single point of the specimen emit from the objective in a parallel way. Those rays within the center of the specimen (and the objective) run parallel to the optical axis. Those outside the center of the specimen run parallel to each other, but not to the optical axis. 
</span></p><p data-dcnode-id="685"><span data-dcnode-id="695" instrument_node="">The virtual image produced by an infinity-corrected objective has to be captured by an additional lens – the </span><b data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">tube lens </span></b><span data-dcnode-id="692" instrument_node="">– to bring it to the front focal point of the eyepiece lens (s. Figure 1 bottom). This approach enables the addition of optical instruments such as </span><acronym data-dcnode-id="690" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="691" instrument_node="">DIC</span></acronym><span data-dcnode-id="689" instrument_node=""> prisms into the “</span><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Infinity Space</span></b><span data-dcnode-id="686" instrument_node="">” between the objective and the tube lens without influencing image quality. Neither location nor the focal point of the image is altered (s. Figure 2).</span></p></div><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="676"><div class="ce-row" data-dcnode-id="677"><div class="ce-column" data-dcnode-id="678"><figure class="image" data-dcnode-id="679"><a class="fancybox" data-caption="Fig. 2: Top: A finite optical system consists of an objective and an eyepiece. The object is placed between the single and double focal point of the objective. The intermediate image produced by the objective is focused between the front focal point of the eyepiece and the eyepiece. Users can view the image through the eyepiece. Bottom: In an infinity-corrected system the specimen is placed in the focal point of the objective. In this case all rays coming from one point of the specimen are parallel after the objective, like an object placed in infinity. Rays coming from the specimen’s center will leave the objective parallel to the optical axis (not shown). Rays coming from a single point of the specimen’s periphery will leave the objective parallel to each other but not to the optical axis. The space between the objective and tube lens is called Infinity Space. Flat optical devices brought into this space will hardly affect the image since all rays coming from a single point of the specimen will experience the same optical influence. The tube lens forms a virtual image, which can be viewed through the eyepiece." data-dcnode-id="682" data-fancybox="fancybox-175065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg" rel="fancybox-175065"><img alt="" class="image-embed-item" data-dcnode-id="683" height="684" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/1/c/csm_Figure_2_acbfc15e5a.jpg 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/1/c/csm_Figure_2_1d581232ab.jpg 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_2.jpg 1799w" width="864"></a><figcaption class="image-caption" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">
        Fig. 2: Top: A finite optical system consists of an objective and an eyepiece. The object is placed between the single and double focal point of the objective. The intermediate image produced by the objective is focused between the front focal point of the eyepiece and the eyepiece. Users can view the image through the eyepiece. Bottom: In an infinity-corrected system the specimen is placed in the focal point of the objective. In this case all rays coming from one point of the specimen are parallel after the objective, like an object placed in infinity. Rays coming from the specimen’s center will leave the objective parallel to the optical axis (not shown). Rays coming from a single point of the specimen’s periphery will leave the objective parallel to each other but not to the optical axis. The space between the objective and tube lens is called Infinity Space. Flat optical devices brought into this space will hardly affect the image since all rays coming from a single point of the specimen will experience the same optical influence. The tube lens forms a virtual image, which can be viewed through the eyepiece.
      </span></figcaption></figure></div></div></div></div></div><span data-dcnode-id="673" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="630" id="c175067"><header data-dcnode-id="670"><h2 class="" data-dcnode-id="671" id="tocItem2"><span data-dcnode-id="672" instrument_node="">
				Advantages of infinity optics
			</span></h2></header><div class="ce-textpic ce-left ce-below" data-dcnode-id="631"><div class="ce-bodytext" data-dcnode-id="646"><p data-dcnode-id="659"><span data-dcnode-id="669" instrument_node="">Several </span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/optical-contrast-methods/"><span data-dcnode-id="668" instrument_node="">contrast methods</span></a><span data-dcnode-id="666" instrument_node=""> require the introduction of special optical components into the microscope’s light path. For example, prisms and polarizers for </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/differential-interference-contrast-dic/"><span data-dcnode-id="665" instrument_node="">DIC</span></a><span data-dcnode-id="663" instrument_node="">, or dichroics and filters for </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/an-introduction-to-fluorescence/"><span data-dcnode-id="662" instrument_node="">fluorescence</span></a><span data-dcnode-id="660" instrument_node=""> microscopy, are indispensable for the relevant technique. Introducing such optical components between the objective and the eyepiece of a microscope with finite optics alters the effective tube length and introduces spherical aberrations. These can be corrected with the introduction of additional optical elements, but at the expense of diminished light intensities or increased magnification. 
</span></p><p data-dcnode-id="652"><span data-dcnode-id="658" instrument_node="">In comparison, a microscope with infinity-corrected optics can hold extra equipment for contrast methods without optical damage by introducing them into the Infinity Space. Devices installed in the infinite light path alter neither </span><b data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">imaging scale nor</span></b><b data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">location</span></b><span data-dcnode-id="653" instrument_node=""> of the intermediate image. This is due to the fact that all light rays coming from a single point of the specimen will leave the objective in a parallel way.
</span></p><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">Overall image quality is not the only thing that benefits from infinity optics. Since the magnification doesn’t change when shifting different optical devices into the infinite light path, one can easily compare the exact same sample using different contrast methods. For example, specimens can be imaged in </span><acronym data-dcnode-id="649" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="650" instrument_node="">DIC</span></acronym><span data-dcnode-id="648" instrument_node=""> and fluorescence simultaneously (s. Figure 3).</span></p></div><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="632"><div class="ce-row" data-dcnode-id="633"><div class="ce-column" data-dcnode-id="634"><figure class="image" data-dcnode-id="635"><a class="fancybox" data-caption="Fig. 3: Optical devices, such as DIC prisms or fluorescence filters, brought into the light path of finite optics, harm the image. Introduced aberrations have to be fixed with the use of additional optical components. This goes along with an increased magnification of the object. Optical components introduced into the Infinity Space don’t have an influence on magnification. Thus DIC images (left) and fluorescence images (middle) can be received simultaneously (right). " data-dcnode-id="644" data-fancybox="fancybox-175067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_c03d50e85d.png" rel="fancybox-175067"><img alt="" class="image-embed-item" data-dcnode-id="645" height="562" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_165e7cfc5d.png&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_70f7cd3bda.png 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_8f858c6728.png 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_0846a1bbdb.png 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_2ae451c695.png 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_50cd70b697.png 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/4/9/csm_Figure_3_85321fa8dc.png 1799w" width="1647"></a><figcaption class="image-caption" data-dcnode-id="636"><span data-dcnode-id="643" instrument_node="">
        Fig. 3: Optical devices, such as </span><acronym data-dcnode-id="641" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="642" instrument_node="">DIC</span></acronym><span data-dcnode-id="640" instrument_node=""> prisms or fluorescence filters, brought into the light path of finite optics, harm the image. Introduced aberrations have to be fixed with the use of additional optical components. This goes along with an increased magnification of the object. Optical components introduced into the Infinity Space don’t have an influence on magnification. Thus </span><acronym data-dcnode-id="638" lang="en" title="Differential Interference Contrast"><span data-dcnode-id="639" instrument_node="">DIC</span></acronym><span data-dcnode-id="637" instrument_node=""> images (left) and fluorescence images (middle) can be received simultaneously (right). 
      </span></figcaption></figure></div></div></div></div></div><span data-dcnode-id="629" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="621" id="c175069"><div class="ce-textpic ce-center ce-above" data-dcnode-id="622"><div class="ce-bodytext" data-dcnode-id="623"><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">With a few exceptions, most microscopes have an objective revolver where different objectives can be installed and changed according to the desired magnification. </span><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Parfocality</span></b><span data-dcnode-id="625" instrument_node=""> allows users to switch between objectives without needing to refocus the specimen. With infinity optics parfocality can be maintained even if additional optical instruments are added to the Infinity Space.</span></p></div></div></div><span data-dcnode-id="620" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="590" id="c175071"><header data-dcnode-id="617"><h2 class="" data-dcnode-id="618" id="tocItem3"><span data-dcnode-id="619" instrument_node="">
				How to get even more devices into the infinite light path
			</span></h2></header><div class="ce-textpic ce-right ce-intext" data-dcnode-id="591"><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="606"><div class="ce-row" data-dcnode-id="607"><div class="ce-column" data-dcnode-id="608"><figure class="image" data-dcnode-id="609"><a class="fancybox" data-caption="Fig 4: .Some microscopy techniques demand the simultaneous coupling of additional light sources or lasers. For example, bleaching during the course of FRAP experiments is executed by a laser coupled into the infinite light path." data-dcnode-id="615" data-fancybox="fancybox-175071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_c4c550ce37.png" rel="fancybox-175071"><img alt="" class="image-embed-item" data-dcnode-id="616" height="210" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_1be3dd56f4.png&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_7938ad35d7.png 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_f3813194f1.png 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_8822b0928c.png 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_f239346f88.png 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_3399cdd0c5.png 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/3/e/csm_Figure_4_67777de38a.png 1799w" width="300"></a><figcaption class="image-caption" data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">
        Fig 4: .Some microscopy techniques demand the simultaneous coupling of additional light sources or lasers. For example, bleaching during the course of </span><acronym data-dcnode-id="612" lang="en" title="Fluorescence Recovery after Photo Bleaching"><span data-dcnode-id="613" instrument_node="">FRAP</span></acronym><span data-dcnode-id="611" instrument_node=""> experiments is executed by a laser coupled into the infinite light path.
      </span></figcaption></figure></div></div></div><div class="ce-bodytext" data-dcnode-id="592"><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Optical microscopy is still an evolving field. Development of new techniques requires access to the microscope’s light path, for example to include additional light sources or laser devices. Fluorescence Recovery After Photobleaching (</span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.leica-microsystems.com/science-lab/fluorescence-recovery-after-photobleaching-frap-and-its-offspring/"><span data-dcnode-id="604" instrument_node="">FRAP</span></a><span data-dcnode-id="602" instrument_node="">), for instance, needs a laser to bleach fluorophores (s. Figure 4). Digital Mirror Devices, another example, are used for optogenetics, uncaging, and photo-bleaching/activation. 
</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">The introduction of Infinity Optics paved the way for these methods since it simplifies the coupling of the necessary components into the microscope’s light path via the Infinity Space. 
</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">By now new approaches have been invented to get additional devices to the infinite light path. Technically there are two ways to enter the Infinity Space: Either in the imaging path between objective and tube lens, or in the illumination path between the objective and the light source (s.&nbsp;Figure 5). Access through the imaging path has the advantage that dedicated modules, for example motorized fast filter wheels and shutters, can be introduced into the microscope very comfortably. 
</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Nevertheless one should keep in mind that the Infinity Space – although its name would suggest otherwise – cannot be extended endlessly by stacking modules into the microscope. The reason is that only light rays coming from the center of the specimen are parallel to the optical axis. 
</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Off-centered light rays coming from one point of the specimen are parallel to each other but will strike the tube lens in a certain angle. Logically enlarging the imaging path between objective and tube lens will result in a loss of light. More precisely, this induces vignetting and will reduce the field of view.</span></p></div></div></div><span data-dcnode-id="589" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="579" id="c175073"><div class="ce-textpic ce-left ce-above" data-dcnode-id="580"><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="581"><div class="ce-row" data-dcnode-id="582"><div class="ce-column" data-dcnode-id="583"><figure class="image" data-dcnode-id="584"><a class="fancybox" data-caption="Fig. 5: Access to the infinite light path of the microscope can be achieved either in the imaging path (top) between the objective and the tube lens (TL), or in the illumination path (bottom) between the light source (L) and the objective. The former approach requires stacking of the relevant module into the microscope and thereby elongates the imaging path. The second approach allows users access to multiple applications on the microscope by utilizing mirrors and beam splitters in the illumination path." data-dcnode-id="587" data-fancybox="fancybox-175073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg" rel="fancybox-175073"><img alt="" class="image-embed-item" data-dcnode-id="588" height="684" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/f/4/csm_Figure_5_5d9f8683ae.jpg 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/f/4/csm_Figure_5_9ac1ceed0c.jpg 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_5.jpg 1799w" width="864"></a><figcaption class="image-caption" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">
        Fig. 5: Access to the infinite light path of the microscope can be achieved either in the imaging path (top) between the objective and the tube lens (TL), or in the illumination path (bottom) between the light source (L) and the objective. The former approach requires stacking of the relevant module into the microscope and thereby elongates the imaging path. The second approach allows users access to multiple applications on the microscope by utilizing mirrors and beam splitters in the illumination path.
      </span></figcaption></figure></div></div></div></div></div><span data-dcnode-id="578" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="573" id="c191982"><header data-dcnode-id="575"><h2 class="" data-dcnode-id="576" id="tocItem4"><span data-dcnode-id="577" instrument_node="">
				Video: The Leica DMi8 Infinity Port 
			</span></h2></header><div class="ce-textpic ce-center ce-above" data-dcnode-id="574"></div></div><span data-dcnode-id="572" instrument_node="">
</span><div class="frame frame-default frame-type-html frame-layout-0" data-dcnode-id="535" id="c191978"><iframe allowfullscreen="" data-dcnode-id="536" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/LM2LWMebu_M&amp;raw" width="560"><html data-cast-api-enabled="true" data-dcnode-id="538" dir="ltr" lang="en"><head data-dcnode-id="547"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="568" name="viewport"/><link data-dcnode-id="563" href="https://www.youtube.com/s/player/9cdfefcf/www-player.css" name="www-player" nonce="b5Hu15AKgiEKxdbMnkMg/A" rel="stylesheet"/><title data-dcnode-id="550">YouTube</title><link data-dcnode-id="549" href="https://www.youtube.com/watch?v=LM2LWMebu_M" rel="canonical"/><link data-dcnode-id="548" data-loaded="true" href="https://www.youtube.com/s/player/9cdfefcf/www-player.css" id="css-2498650825" nonce="c1wQl+PidEMVNOVTgUC2XQ" rel="stylesheet"/></meta></head><body class="date-20220429 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="539" dir="ltr"><div data-dcnode-id="546" id="player" style="width: 100%; height: 100%;"></div><noscript data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=LM2LWMebu_M" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></div><span data-dcnode-id="534" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="515" id="c175075"><div class="ce-textpic ce-left ce-below" data-dcnode-id="516"><div class="ce-bodytext" data-dcnode-id="525"><p data-dcnode-id="526"><span data-dcnode-id="533" instrument_node="">Entering the Infinity Space through the illumination path of the microscope, such as through the </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.leica-microsystems.com/products/light-microscopes/life-science-research/inverted-microscopes/the-leica-dmi8/%3Fnlc%3D20161122-SFDC-001887%26utm_source%3DScienceLab%26utm_medium%3DArticle%26utm_campaign%3DDMi8" target="_blank" title="DMi8 Inverted Microscope"><span data-dcnode-id="532" instrument_node="">Leica Infinity Port</span></a><span data-dcnode-id="530" instrument_node="">, circumvents the issue of elongating the imaging light path (s. Figure 6). Beyond preserving image quality, this feature has the advantage of being more universal. With the correct adapter at hand, any device can be attached to the microscope. Homebuilders, in particular, can build and connect their own devices, 3</span><sup data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">rd</span></sup><span data-dcnode-id="527" instrument_node=""> party, and Leica instruments, to create a customized imaging solution.</span></p></div><div class="ce-gallery" data-ce-columns="1" data-ce-images="1" data-dcnode-id="517"><div class="ce-row" data-dcnode-id="518"><div class="ce-column" data-dcnode-id="519"><figure class="image" data-dcnode-id="520"><a class="fancybox" data-caption="Fig. 6: Stacking methods elongate the microscope’s imaging infinite light path. This can lead to loss of those light rays that are not derived from the center of the specimen. Leica Microsystems’ Infinity Port neither elongates the imaging light path nor does it require additional components in the imaging light path, which is another drawback of stacking systems." data-dcnode-id="523" data-fancybox="fancybox-175075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_6.jpg" rel="fancybox-175075"><img alt="" class="image-embed-item" data-dcnode-id="524" height="475" loading="lazy" sizes="(min-width: 1200px) 50vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//webcdn.leica-microsystems.com/fileadmin/_processed_/f/d/csm_Figure_6_01d1aa3aa0.jpg&amp;raw" srcset="https://webcdn.leica-microsystems.com/fileadmin/_processed_/f/d/csm_Figure_6_294ba66782.jpg 575w,
                                      https://webcdn.leica-microsystems.com/fileadmin/_processed_/f/d/csm_Figure_6_e9e328efaa.jpg 768w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_6.jpg 991w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_6.jpg 1199w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_6.jpg 1499w,
                                      https://webcdn.leica-microsystems.com/fileadmin/academy/user_upload/Figure_6.jpg 1799w" width="600"></a><figcaption class="image-caption" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">
        Fig. 6: Stacking methods elongate the microscope’s imaging infinite light path. This can lead to loss of those light rays that are not derived from the center of the specimen. Leica Microsystems’ Infinity Port neither elongates the imaging light path nor does it require additional components in the imaging light path, which is another drawback of stacking systems.
      </span></figcaption></figure></div></div></div></div></div><span data-dcnode-id="514" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="502" id="c175077"><header data-dcnode-id="511"><h2 class="" data-dcnode-id="512" id="tocItem5"><span data-dcnode-id="513" instrument_node="">
				Summary
			</span></h2></header><div class="ce-textpic ce-center ce-above" data-dcnode-id="503"><div class="ce-bodytext" data-dcnode-id="504"><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">The introduction of infinity-corrected optics considerably improved the functionality of the modern microscope. The necessity to correct aberrations introduced by prisms or other optical instruments needed for contrast methods is a thing of the past. Besides improved ease-of-use, infinity optics allow the simultaneous coupling of multiple light sources into the microscope. 
</span></p><p data-dcnode-id="505"><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.leica-microsystems.com/products/light-microscopes/life-science-research/inverted-microscopes/the-leica-dmi8/%3Fnlc%3D20161122-SFDC-001887%26utm_source%3DScienceLab%26utm_medium%3DArticle%26utm_campaign%3DDMi8" target="_blank" title="Leica DMi8 Inverted Microscope Platform"><span data-dcnode-id="508" instrument_node="">Leica’s Infinity Port</span></a><span data-dcnode-id="506" instrument_node=""> enables direct access to the infinite light path of the microscope stand, circumventing problems that are created by stacking methods. This opens the door for researchers to easily connect additional optical devices without sacrificing image quality and to keep pace with the latest microscopy trends. </span></p></div></div></div><span data-dcnode-id="501" instrument_node="">
</span><div class="frame frame-default frame-type-textmedia frame-layout-0" data-dcnode-id="487" id="c175147"><div class="ce-textpic ce-center ce-above" data-dcnode-id="488"><div class="ce-bodytext" data-dcnode-id="489"><p data-dcnode-id="494"><span data-dcnode-id="500" instrument_node="">This article is also published in: </span><a data-dcnode-id="498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1002/opph.201600002/abstract%3FOptical" target="_blank" title="Intifity"><span data-dcnode-id="499" instrument_node="">Optik &amp; Photonik, Volume 11,&nbsp;Issue 1,&nbsp;pages 34–37,&nbsp;February 2016</span></a><span data-dcnode-id="497" instrument_node="">; </span><br data-dcnode-id="496"><span data-dcnode-id="495" instrument_node="">DOI:&nbsp;10.1002/opph.201600002.
</span></p><p data-dcnode-id="490"><span data-dcnode-id="493" instrument_node="">Here you can donwload the pdf version: </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1002/opph.201600002/epdf" target="_blank"><span data-dcnode-id="492" instrument_node="">http://onlinelibrary.wiley.com/doi/10.1002/opph.201600002/epdf</span></a></p></div></div></div><span data-dcnode-id="486" instrument_node="">
