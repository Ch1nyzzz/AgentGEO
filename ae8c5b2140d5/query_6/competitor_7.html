</span><li data-dcnode-id="7700"><span data-dcnode-id="7719" instrument_node="">The </span><a data-dcnode-id="7717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="7718" instrument_node="">Vietnam War</span></a><span data-dcnode-id="7716" instrument_node=""> caused </span><a data-dcnode-id="7714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War_casualties" title="Vietnam War casualties"><span data-dcnode-id="7715" instrument_node="">two million deaths</span></a><span data-dcnode-id="7713" instrument_node="">, changed the dynamics between the </span><a data-dcnode-id="7711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="7712" instrument_node="">Eastern</span></a><span data-dcnode-id="7710" instrument_node=""> and </span><a data-dcnode-id="7708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Bloc" title="Western Bloc"><span data-dcnode-id="7709" instrument_node="">Western Blocs</span></a><span data-dcnode-id="7707" instrument_node="">, and altered </span><a class="mw-redirect" data-dcnode-id="7705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North%25E2%2580%2593South_divide_in_the_World" title="North–South divide in the World"><span data-dcnode-id="7706" instrument_node="">North-South relations</span></a><span data-dcnode-id="7704" instrument_node="">.</span><sup class="reference" data-dcnode-id="7701" id="cite_ref-32"><a data-dcnode-id="7702" href="#cite_note-32"><span data-dcnode-id="7703" instrument_node="">[32]</span></a></sup></li><span data-dcnode-id="7699" instrument_node="">
</span><li data-dcnode-id="7691"><span data-dcnode-id="7698" instrument_node="">The </span><a data-dcnode-id="7696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="7697" instrument_node="">Soviet War in Afghanistan</span></a><span data-dcnode-id="7695" instrument_node=""> caused one million deaths and contributed to the downfall of the Soviet Union.</span><sup class="reference" data-dcnode-id="7692" id="cite_ref-bmj.com_31-1"><a data-dcnode-id="7693" href="#cite_note-bmj.com-31"><span data-dcnode-id="7694" instrument_node="">[31]</span></a></sup></li><span data-dcnode-id="7690" instrument_node="">
</span><li data-dcnode-id="7658"><span data-dcnode-id="7689" instrument_node="">The </span><a data-dcnode-id="7687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="7688" instrument_node="">revolutions of 1989</span></a><span data-dcnode-id="7686" instrument_node=""> released Eastern and Central Europe from </span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Empire" title="Soviet Empire"><span data-dcnode-id="7685" instrument_node="">Soviet supremacy</span></a><span data-dcnode-id="7683" instrument_node="">. Soon thereafter, the </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="7682" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7680" instrument_node="">, </span><a data-dcnode-id="7678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_Czechoslovakia" title="Dissolution of Czechoslovakia"><span data-dcnode-id="7679" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="7677" instrument_node="">, and </span><a data-dcnode-id="7675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Breakup_of_Yugoslavia" title="Breakup of Yugoslavia"><span data-dcnode-id="7676" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="7674" instrument_node=""> dissolved, the latter violently over several years, into </span><a class="mw-redirect" data-dcnode-id="7672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Successor_state" title="Successor state"><span data-dcnode-id="7673" instrument_node="">successor states</span></a><span data-dcnode-id="7671" instrument_node="">, many rife with </span><a data-dcnode-id="7669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_nationalism" title="Ethnic nationalism"><span data-dcnode-id="7670" instrument_node="">ethnic nationalism</span></a><span data-dcnode-id="7668" instrument_node="">. Meanwhile, </span><a data-dcnode-id="7666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="7667" instrument_node="">East Germany</span></a><span data-dcnode-id="7665" instrument_node=""> and </span><a data-dcnode-id="7663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="7664" instrument_node="">West Germany</span></a><span data-dcnode-id="7662" instrument_node=""> </span><a data-dcnode-id="7660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_reunification" title="German reunification"><span data-dcnode-id="7661" instrument_node="">were reunified in 1990</span></a><span data-dcnode-id="7659" instrument_node="">.</span></li><span data-dcnode-id="7657" instrument_node="">
</span><li data-dcnode-id="7652"><span data-dcnode-id="7656" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="7654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiananmen_Square_protests_of_1989" title="Tiananmen Square protests of 1989"><span data-dcnode-id="7655" instrument_node="">Tiananmen Square protests of 1989</span></a><span data-dcnode-id="7653" instrument_node="">, culminating in the deaths of hundreds of civilian protesters, were a series of demonstrations in and near Tiananmen Square in Beijing, China. Led mainly by students and intellectuals, the protests occurred in a year that saw the collapse of a number of communist governments around the world.</span></li><span data-dcnode-id="7651" instrument_node="">
</span><li data-dcnode-id="7644"><a data-dcnode-id="7649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_integration" title="European integration"><span data-dcnode-id="7650" instrument_node="">European integration</span></a><span data-dcnode-id="7648" instrument_node=""> began in earnest in the 1950s, and eventually led to the </span><a data-dcnode-id="7646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="7647" instrument_node="">European Union</span></a><span data-dcnode-id="7645" instrument_node="">, a political and economic union that comprised 15 countries at the end of the 20th century.</span></li></ul><span data-dcnode-id="7642" instrument_node="">
</span><h2 data-dcnode-id="7632"><span class="mw-headline" data-dcnode-id="7640" id="Culture_and_entertainment"><span data-dcnode-id="7641" instrument_node="">Culture and entertainment</span></span><span class="mw-editsection" data-dcnode-id="7633"><span class="mw-editsection-bracket" data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">[</span></span><a data-dcnode-id="7636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D7" title="Edit section: Culture and entertainment"><span data-dcnode-id="7637" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7634"><span data-dcnode-id="7635" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7631" instrument_node="">
</span><link data-dcnode-id="7630" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7626" role="note"><span data-dcnode-id="7629" instrument_node="">Main article: </span><a data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th_century_in_literature" title="20th century in literature"><span data-dcnode-id="7628" instrument_node="">20th century in literature</span></a></div><span data-dcnode-id="7625" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7607"><div class="thumbinner" data-dcnode-id="7608" style="width:222px;"><a class="image" data-dcnode-id="7623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChagall_IandTheVillage.jpg"><img alt="" class="thumbimage" data-dcnode-id="7624" data-file-height="599" data-file-width="476" decoding="async" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/e/e7/Chagall_IandTheVillage.jpg/220px-Chagall_IandTheVillage.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/e/e7/Chagall_IandTheVillage.jpg/330px-Chagall_IandTheVillage.jpg 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/e/e7/Chagall_IandTheVillage.jpg/440px-Chagall_IandTheVillage.jpg 2x" width="220"></a><span data-dcnode-id="7622" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7609"><div class="magnify" data-dcnode-id="7620"><a class="internal" data-dcnode-id="7621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChagall_IandTheVillage.jpg" title="Enlarge"></a></div><i data-dcnode-id="7617"><a data-dcnode-id="7618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_and_the_Village" title="I and the Village"><span data-dcnode-id="7619" instrument_node="">I and the Village</span></a></i><span data-dcnode-id="7616" instrument_node="">, 1911, by </span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marc_Chagall" title="Marc Chagall"><span data-dcnode-id="7615" instrument_node="">Marc Chagall</span></a><span data-dcnode-id="7613" instrument_node="">, a </span><a data-dcnode-id="7611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_modern_artists" title="List of modern artists"><span data-dcnode-id="7612" instrument_node="">modern painter</span></a><span data-dcnode-id="7610" instrument_node="">.</span></div></div></div><span data-dcnode-id="7606" instrument_node="">
</span><ul data-dcnode-id="7558"><li data-dcnode-id="7601"><span data-dcnode-id="7605" instrument_node="">As the century began, Paris was the artistic capital of the world, where both French and foreign writers, composers and visual artists gathered. By the end of the century </span><a data-dcnode-id="7603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="7604" instrument_node="">New York City</span></a><span data-dcnode-id="7602" instrument_node=""> had become the artistic capital of the world.</span></li><span data-dcnode-id="7600" instrument_node="">
</span><li data-dcnode-id="7598"><span data-dcnode-id="7599" instrument_node="">Theater, films, music and the media had a major influence on fashion and trends in all aspects of life. As many films and much music originate from the United States, American culture spread rapidly over the world.</span></li><span data-dcnode-id="7597" instrument_node="">
</span><li data-dcnode-id="7592"><span data-dcnode-id="7596" instrument_node="">1953 saw the </span><a class="mw-redirect" data-dcnode-id="7594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coronation_of_Queen_Elizabeth_II" title="Coronation of Queen Elizabeth II"><span data-dcnode-id="7595" instrument_node="">coronation of Queen Elizabeth II</span></a><span data-dcnode-id="7593" instrument_node="">, an iconic figure of the century.</span></li><span data-dcnode-id="7591" instrument_node="">
</span><li data-dcnode-id="7587"><a data-dcnode-id="7589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_culture" title="Visual culture"><span data-dcnode-id="7590" instrument_node="">Visual culture</span></a><span data-dcnode-id="7588" instrument_node=""> became more dominant not only in films but in comics and television as well. During the century a new skilled understanding of narrativist imagery was developed.</span></li><span data-dcnode-id="7586" instrument_node="">
</span><li data-dcnode-id="7584"><span data-dcnode-id="7585" instrument_node="">Computer games and internet surfing became new and popular form of entertainment during the last 25 years of the century.</span></li><span data-dcnode-id="7583" instrument_node="">
</span><li data-dcnode-id="7559"><span data-dcnode-id="7582" instrument_node="">In literature, science fiction, </span><a data-dcnode-id="7580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fantasy" title="Fantasy"><span data-dcnode-id="7581" instrument_node="">fantasy</span></a><span data-dcnode-id="7579" instrument_node=""> (with well-developed fictional worlds, rich in detail), and </span><a data-dcnode-id="7577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternate_history" title="Alternate history"><span data-dcnode-id="7578" instrument_node="">alternative history</span></a><span data-dcnode-id="7576" instrument_node=""> fiction gained unprecedented popularity. </span><a data-dcnode-id="7574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Detective_fiction" title="Detective fiction"><span data-dcnode-id="7575" instrument_node="">Detective fiction</span></a><span data-dcnode-id="7573" instrument_node=""> gained unprecedented popularity in the </span><a data-dcnode-id="7571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interwar_period" title="Interwar period"><span data-dcnode-id="7572" instrument_node="">interwar period</span></a><span data-dcnode-id="7570" instrument_node="">. In the United States in 1961 </span><a data-dcnode-id="7568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grove_Press" title="Grove Press"><span data-dcnode-id="7569" instrument_node="">Grove Press</span></a><span data-dcnode-id="7567" instrument_node=""> published </span><i data-dcnode-id="7564"><a data-dcnode-id="7565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropic_of_Cancer_%28novel%29" title="Tropic of Cancer (novel)"><span data-dcnode-id="7566" instrument_node="">Tropic of Cancer</span></a></i><span data-dcnode-id="7563" instrument_node=""> a novel by </span><a data-dcnode-id="7561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Miller" title="Henry Miller"><span data-dcnode-id="7562" instrument_node="">Henry Miller</span></a><span data-dcnode-id="7560" instrument_node=""> redefining pornography and censorship in publishing in America.</span></li></ul><span data-dcnode-id="7557" instrument_node="">
</span><h3 data-dcnode-id="7547"><span class="mw-headline" data-dcnode-id="7555" id="Music"><span data-dcnode-id="7556" instrument_node="">Music</span></span><span class="mw-editsection" data-dcnode-id="7548"><span class="mw-editsection-bracket" data-dcnode-id="7553"><span data-dcnode-id="7554" instrument_node="">[</span></span><a data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D8" title="Edit section: Music"><span data-dcnode-id="7552" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7549"><span data-dcnode-id="7550" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7546" instrument_node="">
</span><link data-dcnode-id="7545" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7541" role="note"><span data-dcnode-id="7544" instrument_node="">Main article: </span><a data-dcnode-id="7542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th-century_music" title="20th-century music"><span data-dcnode-id="7543" instrument_node="">20th-century music</span></a></div><span data-dcnode-id="7540" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7523"><div class="thumbinner" data-dcnode-id="7524" style="width:222px;"><a class="image" data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AElvis_Presley_first_national_television_appearance_1956.jpg"><img alt="" class="thumbimage" data-dcnode-id="7539" data-file-height="741" data-file-width="567" decoding="async" height="288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Elvis_Presley_first_national_television_appearance_1956.jpg/220px-Elvis_Presley_first_national_television_appearance_1956.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Elvis_Presley_first_national_television_appearance_1956.jpg/330px-Elvis_Presley_first_national_television_appearance_1956.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Elvis_Presley_first_national_television_appearance_1956.jpg/440px-Elvis_Presley_first_national_television_appearance_1956.jpg 2x" width="220"></a><span data-dcnode-id="7537" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7525"><div class="magnify" data-dcnode-id="7535"><a class="internal" data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AElvis_Presley_first_national_television_appearance_1956.jpg" title="Enlarge"></a></div><a data-dcnode-id="7533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elvis_Presley" title="Elvis Presley"><span data-dcnode-id="7534" instrument_node="">Elvis Presley</span></a><span data-dcnode-id="7532" instrument_node=""> in 1956, a leading figure of </span><a class="mw-redirect" data-dcnode-id="7530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_%2526_roll" title="Rock &amp; roll"><span data-dcnode-id="7531" instrument_node="">rock &amp; roll</span></a><span data-dcnode-id="7529" instrument_node=""> and </span><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rockabilly" title="Rockabilly"><span data-dcnode-id="7528" instrument_node="">rockabilly</span></a><span data-dcnode-id="7526" instrument_node="">.</span></div></div></div><span data-dcnode-id="7522" instrument_node="">
</span><p data-dcnode-id="7511"><span data-dcnode-id="7521" instrument_node="">The invention of music recording technologies such as the </span><a data-dcnode-id="7519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phonograph_record" title="Phonograph record"><span data-dcnode-id="7520" instrument_node="">phonograph record</span></a><span data-dcnode-id="7518" instrument_node="">, and dissemination technologies such as </span><a data-dcnode-id="7516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_broadcasting" title="Radio broadcasting"><span data-dcnode-id="7517" instrument_node="">radio broadcasting</span></a><span data-dcnode-id="7515" instrument_node="">, massively expanded the audience for music. Prior to the 20th century, music was generally only experienced in </span><a data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concert" title="Concert"><span data-dcnode-id="7514" instrument_node="">live performances</span></a><span data-dcnode-id="7512" instrument_node="">. Many new genres of music were established during the 20th century.
</span></p><span data-dcnode-id="7510" instrument_node="">
</span><ul data-dcnode-id="7391"><li data-dcnode-id="7506"><a data-dcnode-id="7508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Igor_Stravinsky" title="Igor Stravinsky"><span data-dcnode-id="7509" instrument_node="">Igor Stravinsky</span></a><span data-dcnode-id="7507" instrument_node=""> revolutionized classical composition.</span></li><span data-dcnode-id="7505" instrument_node="">
</span><li data-dcnode-id="7497"><span data-dcnode-id="7504" instrument_node="">In the 1920s, </span><a data-dcnode-id="7502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnold_Schoenberg" title="Arnold Schoenberg"><span data-dcnode-id="7503" instrument_node="">Arnold Schoenberg</span></a><span data-dcnode-id="7501" instrument_node=""> developed the </span><a data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twelve-tone_technique" title="Twelve-tone technique"><span data-dcnode-id="7500" instrument_node="">twelve-tone technique</span></a><span data-dcnode-id="7498" instrument_node="">, which became widely influential on 20th-century composers.</span></li><span data-dcnode-id="7496" instrument_node="">
</span><li data-dcnode-id="7482"><span data-dcnode-id="7495" instrument_node="">In classical music, </span><a data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Musical_composition" title="Musical composition"><span data-dcnode-id="7494" instrument_node="">composition</span></a><span data-dcnode-id="7492" instrument_node=""> branched out into many completely new domains, including </span><a class="mw-redirect" data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dodecaphony" title="Dodecaphony"><span data-dcnode-id="7491" instrument_node="">dodecaphony</span></a><span data-dcnode-id="7489" instrument_node="">, </span><a data-dcnode-id="7487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleatoric_music" title="Aleatoric music"><span data-dcnode-id="7488" instrument_node="">aleatoric</span></a><span data-dcnode-id="7486" instrument_node=""> (chance) music, and </span><a data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimalism" title="Minimalism"><span data-dcnode-id="7485" instrument_node="">minimalism</span></a><span data-dcnode-id="7483" instrument_node="">.</span></li><span data-dcnode-id="7481" instrument_node="">
</span><li data-dcnode-id="7477"><a data-dcnode-id="7479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentine_tango" title="Argentine tango"><span data-dcnode-id="7480" instrument_node="">Tango</span></a><span data-dcnode-id="7478" instrument_node=""> was created in Argentina and became extremely popular in the rest of the Americas and Europe.</span></li><span data-dcnode-id="7476" instrument_node="">
</span><li data-dcnode-id="7469"><a data-dcnode-id="7474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blues" title="Blues"><span data-dcnode-id="7475" instrument_node="">Blues</span></a><span data-dcnode-id="7473" instrument_node=""> and </span><a data-dcnode-id="7471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jazz" title="Jazz"><span data-dcnode-id="7472" instrument_node="">jazz</span></a><span data-dcnode-id="7470" instrument_node=""> music became popularized during the 1910s, 1920s and 1930s in the United States.</span></li><span data-dcnode-id="7468" instrument_node="">
</span><li data-dcnode-id="7464"><a data-dcnode-id="7466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Country_music" title="Country music"><span data-dcnode-id="7467" instrument_node="">Country music</span></a><span data-dcnode-id="7465" instrument_node=""> develops in the 1920s and 1930s in the United States.</span></li><span data-dcnode-id="7463" instrument_node="">
</span><li data-dcnode-id="7452"><span data-dcnode-id="7462" instrument_node="">Blues and country went on to influence </span><a data-dcnode-id="7460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_and_roll" title="Rock and roll"><span data-dcnode-id="7461" instrument_node="">rock and roll</span></a><span data-dcnode-id="7459" instrument_node=""> in the 1950s, which along with </span><a data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_folk_music_revival" title="American folk music revival"><span data-dcnode-id="7458" instrument_node="">folk music</span></a><span data-dcnode-id="7456" instrument_node="">, increased in popularity with the </span><a data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Invasion" title="British Invasion"><span data-dcnode-id="7455" instrument_node="">British Invasion</span></a><span data-dcnode-id="7453" instrument_node=""> of the mid-to-late 1960s.</span></li><span data-dcnode-id="7451" instrument_node="">
</span><li data-dcnode-id="7434"><span data-dcnode-id="7450" instrument_node="">Rock soon branched into many different genres, including </span><a data-dcnode-id="7448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Folk_rock" title="Folk rock"><span data-dcnode-id="7449" instrument_node="">folk rock</span></a><span data-dcnode-id="7447" instrument_node="">, </span><a data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavy_metal_music" title="Heavy metal music"><span data-dcnode-id="7446" instrument_node="">heavy metal</span></a><span data-dcnode-id="7444" instrument_node="">, </span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Punk_rock" title="Punk rock"><span data-dcnode-id="7443" instrument_node="">punk rock</span></a><span data-dcnode-id="7441" instrument_node="">, and </span><a data-dcnode-id="7439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_rock" title="Alternative rock"><span data-dcnode-id="7440" instrument_node="">alternative rock</span></a><span data-dcnode-id="7438" instrument_node=""> and became the dominant genre of </span><a data-dcnode-id="7436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_music" title="Popular music"><span data-dcnode-id="7437" instrument_node="">popular music</span></a><span data-dcnode-id="7435" instrument_node="">.</span></li><span data-dcnode-id="7433" instrument_node="">
</span><li data-dcnode-id="7428"><span data-dcnode-id="7432" instrument_node="">This was challenged with the rise of </span><a data-dcnode-id="7430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hip_hop_music" title="Hip hop music"><span data-dcnode-id="7431" instrument_node="">hip hop</span></a><span data-dcnode-id="7429" instrument_node=""> in the 1980s and 1990s.</span></li><span data-dcnode-id="7427" instrument_node="">
</span><li data-dcnode-id="7413"><span data-dcnode-id="7426" instrument_node="">Other genres such as </span><a data-dcnode-id="7424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_music" title="House music"><span data-dcnode-id="7425" instrument_node="">house</span></a><span data-dcnode-id="7423" instrument_node="">, </span><a data-dcnode-id="7421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Techno" title="Techno"><span data-dcnode-id="7422" instrument_node="">techno</span></a><span data-dcnode-id="7420" instrument_node="">, </span><a data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reggae" title="Reggae"><span data-dcnode-id="7419" instrument_node="">reggae</span></a><span data-dcnode-id="7417" instrument_node="">, and </span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soul_music" title="Soul music"><span data-dcnode-id="7416" instrument_node="">soul</span></a><span data-dcnode-id="7414" instrument_node=""> all developed during the latter half of the century and went through various periods of popularity.</span></li><span data-dcnode-id="7412" instrument_node="">
</span><li data-dcnode-id="7392"><span data-dcnode-id="7411" instrument_node="">Synthesizers began to be employed widely in music and crossed over into the mainstream with </span><a data-dcnode-id="7409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_wave_music" title="New wave music"><span data-dcnode-id="7410" instrument_node="">new wave music</span></a><span data-dcnode-id="7408" instrument_node=""> in the 1980s. </span><a class="mw-redirect" data-dcnode-id="7406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_instruments" title="Electronic instruments"><span data-dcnode-id="7407" instrument_node="">Electronic instruments</span></a><span data-dcnode-id="7405" instrument_node=""> have been widely deployed in all manners of popular music and has led to the development of such genres as </span><a data-dcnode-id="7403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_music" title="House music"><span data-dcnode-id="7404" instrument_node="">house</span></a><span data-dcnode-id="7402" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Synthpop" title="Synthpop"><span data-dcnode-id="7401" instrument_node="">synth-pop</span></a><span data-dcnode-id="7399" instrument_node="">, </span><a data-dcnode-id="7397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronic_dance_music" title="Electronic dance music"><span data-dcnode-id="7398" instrument_node="">electronic dance music</span></a><span data-dcnode-id="7396" instrument_node="">, and </span><a data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_music" title="Industrial music"><span data-dcnode-id="7395" instrument_node="">industrial</span></a><span data-dcnode-id="7393" instrument_node="">.</span></li></ul><span data-dcnode-id="7390" instrument_node="">
</span><h3 data-dcnode-id="7379"><span data-dcnode-id="7389" id="Film.2C_television_and_theatre"></span><span class="mw-headline" data-dcnode-id="7387" id="Film,_television_and_theatre"><span data-dcnode-id="7388" instrument_node="">Film, television and theatre</span></span><span class="mw-editsection" data-dcnode-id="7380"><span class="mw-editsection-bracket" data-dcnode-id="7385"><span data-dcnode-id="7386" instrument_node="">[</span></span><a data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D9" title="Edit section: Film, television and theatre"><span data-dcnode-id="7384" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7381"><span data-dcnode-id="7382" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7378" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7360"><div class="thumbinner" data-dcnode-id="7361" style="width:222px;"><a class="image" data-dcnode-id="7376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChaplin_The_Kid_edit.jpg"><img alt="" class="thumbimage" data-dcnode-id="7377" data-file-height="3040" data-file-width="2248" decoding="async" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Chaplin_The_Kid_edit.jpg/220px-Chaplin_The_Kid_edit.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Chaplin_The_Kid_edit.jpg/330px-Chaplin_The_Kid_edit.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Chaplin_The_Kid_edit.jpg/440px-Chaplin_The_Kid_edit.jpg 2x" width="220"></a><span data-dcnode-id="7375" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7362"><div class="magnify" data-dcnode-id="7373"><a class="internal" data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChaplin_The_Kid_edit.jpg" title="Enlarge"></a></div><a data-dcnode-id="7371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charlie_Chaplin" title="Charlie Chaplin"><span data-dcnode-id="7372" instrument_node="">Charlie Chaplin</span></a><span data-dcnode-id="7370" instrument_node=""> in his 1921 film </span><i data-dcnode-id="7367"><a data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Kid_%281921_film%29" title="The Kid (1921 film)"><span data-dcnode-id="7369" instrument_node="">The Kid</span></a></i><span data-dcnode-id="7366" instrument_node="">, with </span><a data-dcnode-id="7364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jackie_Coogan" title="Jackie Coogan"><span data-dcnode-id="7365" instrument_node="">Jackie Coogan</span></a><span data-dcnode-id="7363" instrument_node="">.</span></div></div></div><span data-dcnode-id="7359" instrument_node="">
</span><link data-dcnode-id="7358" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7354" role="note"><span data-dcnode-id="7357" instrument_node="">See also: </span><a data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_film" title="History of film"><span data-dcnode-id="7356" instrument_node="">History of film</span></a></div><span data-dcnode-id="7353" instrument_node="">
</span><p data-dcnode-id="7308"><span data-dcnode-id="7352" instrument_node="">Film as an artistic medium was created in the 20th century. The first modern movie theatre was established in </span><a data-dcnode-id="7350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pittsburgh" title="Pittsburgh"><span data-dcnode-id="7351" instrument_node="">Pittsburgh</span></a><span data-dcnode-id="7349" instrument_node=""> in 1905.</span><sup class="reference" data-dcnode-id="7346" id="cite_ref-33"><a data-dcnode-id="7347" href="#cite_note-33"><span data-dcnode-id="7348" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7345" instrument_node=""> </span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hollywood%2C_Los_Angeles" title="Hollywood, Los Angeles"><span data-dcnode-id="7344" instrument_node="">Hollywood</span></a><span data-dcnode-id="7342" instrument_node=""> developed as the center of American film production. While the first films were in </span><a data-dcnode-id="7340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_and_white" title="Black and white"><span data-dcnode-id="7341" instrument_node="">black and white</span></a><span data-dcnode-id="7339" instrument_node="">, </span><a data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technicolor" title="Technicolor"><span data-dcnode-id="7338" instrument_node="">technicolor</span></a><span data-dcnode-id="7336" instrument_node=""> was developed in the 1920s to allow for color films. </span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sound_film" title="Sound film"><span data-dcnode-id="7335" instrument_node="">Sound films</span></a><span data-dcnode-id="7333" instrument_node=""> were developed, with the first full-length feature film, </span><i data-dcnode-id="7330"><a data-dcnode-id="7331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Jazz_Singer" title="The Jazz Singer"><span data-dcnode-id="7332" instrument_node="">The Jazz Singer</span></a></i><span data-dcnode-id="7329" instrument_node="">, released in 1927. The </span><a data-dcnode-id="7327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_Awards" title="Academy Awards"><span data-dcnode-id="7328" instrument_node="">Academy Awards</span></a><span data-dcnode-id="7326" instrument_node=""> were established in 1929. Animation was also developed in the 1920s, with the first full-length </span><a class="mw-redirect" data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cel_animated" title="Cel animated"><span data-dcnode-id="7325" instrument_node="">cel animated</span></a><span data-dcnode-id="7323" instrument_node=""> feature film </span><i data-dcnode-id="7320"><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Snow_White_and_the_Seven_Dwarfs_%281937_film%29" title="Snow White and the Seven Dwarfs (1937 film)"><span data-dcnode-id="7322" instrument_node="">Snow White and the Seven Dwarfs</span></a></i><span data-dcnode-id="7319" instrument_node="">, released in 1937. </span><a data-dcnode-id="7317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer-generated_imagery" title="Computer-generated imagery"><span data-dcnode-id="7318" instrument_node="">Computer-generated imagery</span></a><span data-dcnode-id="7316" instrument_node=""> was developed in the 1980s, with the first full-length </span><a data-dcnode-id="7314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_animation" title="Computer animation"><span data-dcnode-id="7315" instrument_node="">CGI-animated</span></a><span data-dcnode-id="7313" instrument_node=""> film </span><i data-dcnode-id="7310"><a data-dcnode-id="7311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toy_Story" title="Toy Story"><span data-dcnode-id="7312" instrument_node="">Toy Story</span></a></i><span data-dcnode-id="7309" instrument_node=""> was released in 1995.

="">James Cameron</span></a><span data-dcnode-id="7078" instrument_node="">, </span><a data-dcnode-id="7076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Friedkin" title="William Friedkin"><span data-dcnode-id="7077" instrument_node="">William Friedkin</span></a><span data-dcnode-id="7075" instrument_node="">, </span><a data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ezz_El-Dine_Zulficar" title="Ezz El-Dine Zulficar"><span data-dcnode-id="7074" instrument_node="">Ezz El-Dine Zulficar</span></a><span data-dcnode-id="7072" instrument_node=""> and </span><a data-dcnode-id="7070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Lucas" title="George Lucas"><span data-dcnode-id="7071" instrument_node="">George Lucas</span></a><span data-dcnode-id="7069" instrument_node=""> are among the most important and popular filmmakers of the 20th century.</span></li><span data-dcnode-id="7067" instrument_node="">
</span><li data-dcnode-id="7035"><span data-dcnode-id="7066" instrument_node="">In theater, sometimes referred to as </span><a class="mw-redirect" data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadway_theater" title="Broadway theater"><span data-dcnode-id="7065" instrument_node="">Broadway</span></a><span data-dcnode-id="7063" instrument_node=""> in </span><a data-dcnode-id="7061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_City" title="New York City"><span data-dcnode-id="7062" instrument_node="">New York City</span></a><span data-dcnode-id="7060" instrument_node="">, playwrights such as </span><a data-dcnode-id="7058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugene_O%2527Neill" title="Eugene O'Neill"><span data-dcnode-id="7059" instrument_node="">Eugene O'Neill</span></a><span data-dcnode-id="7057" instrument_node="">, </span><a data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Beckett" title="Samuel Beckett"><span data-dcnode-id="7056" instrument_node="">Samuel Beckett</span></a><span data-dcnode-id="7054" instrument_node="">, </span><a data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Albee" title="Edward Albee"><span data-dcnode-id="7053" instrument_node="">Edward Albee</span></a><span data-dcnode-id="7051" instrument_node="">, </span><a data-dcnode-id="7049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Miller" title="Arthur Miller"><span data-dcnode-id="7050" instrument_node="">Arthur Miller</span></a><span data-dcnode-id="7048" instrument_node=""> and </span><a data-dcnode-id="7046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tennessee_Williams" title="Tennessee Williams"><span data-dcnode-id="7047" instrument_node="">Tennessee Williams</span></a><span data-dcnode-id="7045" instrument_node=""> introduced innovative language and ideas to the idiom. In musical theater, figures such as </span><a data-dcnode-id="7043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodgers_and_Hammerstein" title="Rodgers and Hammerstein"><span data-dcnode-id="7044" instrument_node="">Rodgers and Hammerstein</span></a><span data-dcnode-id="7042" instrument_node="">, </span><a data-dcnode-id="7040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lerner_and_Loewe" title="Lerner and Loewe"><span data-dcnode-id="7041" instrument_node="">Lerner and Loewe</span></a><span data-dcnode-id="7039" instrument_node="">, and </span><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irving_Berlin" title="Irving Berlin"><span data-dcnode-id="7038" instrument_node="">Irving Berlin</span></a><span data-dcnode-id="7036" instrument_node=""> had an enormous impact on both film and the culture in general.</span></li><span data-dcnode-id="7034" instrument_node="">
</span><li data-dcnode-id="6997"><a class="mw-redirect" data-dcnode-id="7032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_Dance" title="Modern Dance"><span data-dcnode-id="7033" instrument_node="">Modern Dance</span></a><span data-dcnode-id="7031" instrument_node=""> is born in America as both a 'rebellion' against centuries-old European ballet, as well as born from the oppression in America. </span><a class="mw-redirect" data-dcnode-id="7029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dancers" title="Dancers"><span data-dcnode-id="7030" instrument_node="">Dancers</span></a><span data-dcnode-id="7028" instrument_node=""> and choreographers </span><a data-dcnode-id="7026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alvin_Ailey" title="Alvin Ailey"><span data-dcnode-id="7027" instrument_node="">Alvin Ailey</span></a><span data-dcnode-id="7025" instrument_node="">, </span><a data-dcnode-id="7023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isadora_Duncan" title="Isadora Duncan"><span data-dcnode-id="7024" instrument_node="">Isadora Duncan</span></a><span data-dcnode-id="7022" instrument_node="">, </span><a data-dcnode-id="7020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaslav_Nijinsky" title="Vaslav Nijinsky"><span data-dcnode-id="7021" instrument_node="">Vaslav Nijinsky</span></a><span data-dcnode-id="7019" instrument_node="">, </span><a data-dcnode-id="7017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_St._Denis" title="Ruth St. Denis"><span data-dcnode-id="7018" instrument_node="">Ruth St. Denis</span></a><span data-dcnode-id="7016" instrument_node="">, </span><a data-dcnode-id="7014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mahmoud_Reda" title="Mahmoud Reda"><span data-dcnode-id="7015" instrument_node="">Mahmoud Reda</span></a><span data-dcnode-id="7013" instrument_node="">, </span><a data-dcnode-id="7011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martha_Graham" title="Martha Graham"><span data-dcnode-id="7012" instrument_node="">Martha Graham</span></a><span data-dcnode-id="7010" instrument_node="">, </span><a data-dcnode-id="7008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9_Lim%25C3%25B3n" title="José Limón"><span data-dcnode-id="7009" instrument_node="">José Limón</span></a><span data-dcnode-id="7007" instrument_node="">, </span><a data-dcnode-id="7005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doris_Humphrey" title="Doris Humphrey"><span data-dcnode-id="7006" instrument_node="">Doris Humphrey</span></a><span data-dcnode-id="7004" instrument_node="">, </span><a data-dcnode-id="7002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merce_Cunningham" title="Merce Cunningham"><span data-dcnode-id="7003" instrument_node="">Merce Cunningham</span></a><span data-dcnode-id="7001" instrument_node="">, and </span><a data-dcnode-id="6999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Taylor_%28choreographer%29" title="Paul Taylor (choreographer)"><span data-dcnode-id="7000" instrument_node="">Paul Taylor</span></a><span data-dcnode-id="6998" instrument_node=""> re-defined movement, struggling to bring it back to its 'natural' roots and along with Jazz, created a solely American art form. Alvin Ailey is credited with popularizing modern dance and revolutionizing African-American participation in 20th-century concert dance. His company gained the nickname "Cultural Ambassador to the World" because of its extensive international touring. Ailey's choreographic masterpiece Revelations is believed to be the best known and most often seen modern dance performance.</span></li></ul><span data-dcnode-id="6995" instrument_node="">

</span><div class="thumb tright" data-dcnode-id="6963"><div class="thumbinner" data-dcnode-id="6964" style="width:222px;"><a class="image" data-dcnode-id="6976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagnavox-Odyssey-Console-Set.jpg"><img alt="" class="thumbimage" data-dcnode-id="6977" data-file-height="2940" data-file-width="5800" decoding="async" height="112" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Magnavox-Odyssey-Console-Set.jpg/220px-Magnavox-Odyssey-Console-Set.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Magnavox-Odyssey-Console-Set.jpg/330px-Magnavox-Odyssey-Console-Set.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/99/Magnavox-Odyssey-Console-Set.jpg/440px-Magnavox-Odyssey-Console-Set.jpg 2x" width="220"></a><span data-dcnode-id="6975" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6965"><div class="magnify" data-dcnode-id="6973"><a class="internal" data-dcnode-id="6974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMagnavox-Odyssey-Console-Set.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="6971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ralph_Baer" title="Ralph Baer"><span data-dcnode-id="6972" instrument_node="">Ralph Baer</span></a><span data-dcnode-id="6970" instrument_node="">'s </span><i data-dcnode-id="6967"><a data-dcnode-id="6968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnavox_Odyssey" title="Magnavox Odyssey"><span data-dcnode-id="6969" instrument_node="">Magnavox Odyssey</span></a></i><span data-dcnode-id="6966" instrument_node="">, the first video game console, released in 1972.</span></div></div></div><span data-dcnode-id="6962" instrument_node="">
</span><link data-dcnode-id="6961" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6957" role="note"><span data-dcnode-id="6960" instrument_node="">Main article: </span><a data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_video_games" title="History of video games"><span data-dcnode-id="6959" instrument_node="">History of video games</span></a></div><span data-dcnode-id="6956" instrument_node="">
</span><p data-dcnode-id="6948"><span data-dcnode-id="6955" instrument_node="">Video games—due to the great technological steps forward in </span><a data-dcnode-id="6953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computing" title="Computing"><span data-dcnode-id="6954" instrument_node="">computing</span></a><span data-dcnode-id="6952" instrument_node=""> since the second </span><a data-dcnode-id="6950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-war" title="Post-war"><span data-dcnode-id="6951" instrument_node="">post-war</span></a><span data-dcnode-id="6949" instrument_node=""> period—are the new form of entertainment emerged in the 20th century alongside films.
</span></p><span data-dcnode-id="6947" instrument_node="">
</span><ul data-dcnode-id="6868"><li data-dcnode-id="6886"><span data-dcnode-id="6946" instrument_node="">While already conceptualized in the </span><a data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1940s" title="1940s"><span data-dcnode-id="6945" instrument_node="">1940s</span></a><span data-dcnode-id="6943" instrument_node="">–</span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1950s" title="1950s"><span data-dcnode-id="6942" instrument_node="">50s</span></a><span data-dcnode-id="6940" instrument_node="">, video games only emerged as an industry during the </span><a data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1970s" title="1970s"><span data-dcnode-id="6939" instrument_node="">1970s</span></a><span data-dcnode-id="6937" instrument_node="">, and then exploded into social and cultural phenomenon such as the </span><a data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_age_of_arcade_video_games" title="Golden age of arcade video games"><span data-dcnode-id="6936" instrument_node="">golden age of arcade video games</span></a><span data-dcnode-id="6934" instrument_node="">, with notable releases such as </span><a class="mw-redirect" data-dcnode-id="6932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taito_Corporation" title="Taito Corporation"><span data-dcnode-id="6933" instrument_node="">Taito</span></a><span data-dcnode-id="6931" instrument_node="">'s </span><i data-dcnode-id="6928"><a data-dcnode-id="6929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Invaders" title="Space Invaders"><span data-dcnode-id="6930" instrument_node="">Space Invaders</span></a></i><span data-dcnode-id="6927" instrument_node="">, </span><a data-dcnode-id="6925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atari%2C_Inc." title="Atari, Inc."><span data-dcnode-id="6926" instrument_node="">Atari</span></a><span data-dcnode-id="6924" instrument_node="">'s </span><i data-dcnode-id="6921"><a data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asteroids_%28video_game%29" title="Asteroids (video game)"><span data-dcnode-id="6923" instrument_node="">Asteroids</span></a></i><span data-dcnode-id="6920" instrument_node="">, and </span><a data-dcnode-id="6918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Namco" title="Namco"><span data-dcnode-id="6919" instrument_node="">Namco</span></a><span data-dcnode-id="6917" instrument_node="">'s </span><i data-dcnode-id="6914"><a data-dcnode-id="6915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pac-Man" title="Pac-Man"><span data-dcnode-id="6916" instrument_node="">Pac-Man</span></a></i><span data-dcnode-id="6913" instrument_node="">,</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-Whittaker-122_34-0"><a data-dcnode-id="6911" href="#cite_note-Whittaker-122-34"><span data-dcnode-id="6912" instrument_node="">[34]</span></a></sup><span data-dcnode-id="6909" instrument_node=""> the worldwide success of </span><a data-dcnode-id="6907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nintendo" title="Nintendo"><span data-dcnode-id="6908" instrument_node="">Nintendo</span></a><span data-dcnode-id="6906" instrument_node="">'s </span><i data-dcnode-id="6903"><a data-dcnode-id="6904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Super_Mario_Bros." title="Super Mario Bros."><span data-dcnode-id="6905" instrument_node="">Super Mario Bros.</span></a></i><sup class="reference" data-dcnode-id="6900" id="cite_ref-35"><a data-dcnode-id="6901" href="#cite_note-35"><span data-dcnode-id="6902" instrument_node="">[35]</span></a></sup><span data-dcnode-id="6899" instrument_node=""> and the release in the </span><a data-dcnode-id="6897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1990s" title="1990s"><span data-dcnode-id="6898" instrument_node="">1990s</span></a><span data-dcnode-id="6896" instrument_node=""> of </span><a data-dcnode-id="6894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sony" title="Sony"><span data-dcnode-id="6895" instrument_node="">Sony</span></a><span data-dcnode-id="6893" instrument_node=""> </span><a data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PlayStation_%28console%29" title="PlayStation (console)"><span data-dcnode-id="6892" instrument_node="">PlayStation</span></a><span data-dcnode-id="6890" instrument_node=""> console, the first one to break the record of 100 million units sold.</span><sup class="reference" data-dcnode-id="6887" id="cite_ref-36"><a data-dcnode-id="6888" href="#cite_note-36"><span data-dcnode-id="6889" instrument_node="">[36]</span></a></sup></li><span data-dcnode-id="6885" instrument_node="">
</span><li data-dcnode-id="6869"><a data-dcnode-id="6883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_game_design" title="Video game design"><span data-dcnode-id="6884" instrument_node="">Video game design</span></a><span data-dcnode-id="6882" instrument_node=""> becomes a discipline and a job. Some game designers in this century stand out for their work, as </span><a data-dcnode-id="6880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shigeru_Miyamoto" title="Shigeru Miyamoto"><span data-dcnode-id="6881" instrument_node="">Shigeru Miyamoto</span></a><span data-dcnode-id="6879" instrument_node="">, </span><a data-dcnode-id="6877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hideo_Kojima" title="Hideo Kojima"><span data-dcnode-id="6878" instrument_node="">Hideo Kojima</span></a><span data-dcnode-id="6876" instrument_node="">, </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sid_Meier" title="Sid Meier"><span data-dcnode-id="6875" instrument_node="">Sid Meier</span></a><span data-dcnode-id="6873" instrument_node=""> and </span><a data-dcnode-id="6871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Will_Wright_%28game_designer%29" title="Will Wright (game designer)"><span data-dcnode-id="6872" instrument_node="">Will Wright</span></a><span data-dcnode-id="6870" instrument_node="">.</span></li></ul><span data-dcnode-id="6867" instrument_node="">
</span><h3 data-dcnode-id="6857"><span class="mw-headline" data-dcnode-id="6865" id="Art_and_architecture"><span data-dcnode-id="6866" instrument_node="">Art and architecture</span></span><span class="mw-editsection" data-dcnode-id="6858"><span class="mw-editsection-bracket" data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">[</span></span><a data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D11" title="Edit section: Art and architecture"><span data-dcnode-id="6862" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6856" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6844"><div class="thumbinner" data-dcnode-id="6845" style="width:172px;"><a class="image" data-dcnode-id="6854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmpire_State_Building_%28HDR%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6855" data-file-height="3874" data-file-width="2617" decoding="async" height="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Empire_State_Building_%2528HDR%2529.jpg/170px-Empire_State_Building_%2528HDR%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Empire_State_Building_%28HDR%29.jpg/255px-Empire_State_Building_%28HDR%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Empire_State_Building_%28HDR%29.jpg/340px-Empire_State_Building_%28HDR%29.jpg 2x" width="170"></a><span data-dcnode-id="6853" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6846"><div class="magnify" data-dcnode-id="6851"><a class="internal" data-dcnode-id="6852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmpire_State_Building_%28HDR%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6850" instrument_node="">The </span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_State_Building" title="Empire State Building"><span data-dcnode-id="6849" instrument_node="">Empire State Building</span></a><span data-dcnode-id="6847" instrument_node=""> is an iconic building of the 1930s.</span></div></div></div><span data-dcnode-id="6843" instrument_node="">
</span><link data-dcnode-id="6842" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6838" role="note"><span data-dcnode-id="6841" instrument_node="">Main article: </span><a data-dcnode-id="6839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th-century_art" title="20th-century art"><span data-dcnode-id="6840" instrument_node="">20th-century art</span></a></div><span data-dcnode-id="6837" instrument_node="">
</span><ul data-dcnode-id="6760"><li data-dcnode-id="6799"><span data-dcnode-id="6836" instrument_node="">The art world experienced the development of new styles and explorations such as </span><a data-dcnode-id="6834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fauvism" title="Fauvism"><span data-dcnode-id="6835" instrument_node="">fauvism</span></a><span data-dcnode-id="6833" instrument_node="">, </span><a data-dcnode-id="6831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expressionism" title="Expressionism"><span data-dcnode-id="6832" instrument_node="">expressionism</span></a><span data-dcnode-id="6830" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dadaism" title="Dadaism"><span data-dcnode-id="6829" instrument_node="">Dadaism</span></a><span data-dcnode-id="6827" instrument_node="">, </span><a data-dcnode-id="6825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cubism" title="Cubism"><span data-dcnode-id="6826" instrument_node="">cubism</span></a><span data-dcnode-id="6824" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_stijl" title="De stijl"><span data-dcnode-id="6823" instrument_node="">de stijl</span></a><span data-dcnode-id="6821" instrument_node="">, </span><a data-dcnode-id="6819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surrealism" title="Surrealism"><span data-dcnode-id="6820" instrument_node="">surrealism</span></a><span data-dcnode-id="6818" instrument_node="">, </span><a data-dcnode-id="6816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstract_expressionism" title="Abstract expressionism"><span data-dcnode-id="6817" instrument_node="">abstract expressionism</span></a><span data-dcnode-id="6815" instrument_node="">, </span><a data-dcnode-id="6813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_field" title="Color field"><span data-dcnode-id="6814" instrument_node="">color field</span></a><span data-dcnode-id="6812" instrument_node="">, </span><a data-dcnode-id="6810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pop_art" title="Pop art"><span data-dcnode-id="6811" instrument_node="">pop art</span></a><span data-dcnode-id="6809" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimal_art" title="Minimal art"><span data-dcnode-id="6808" instrument_node="">minimal art</span></a><span data-dcnode-id="6806" instrument_node="">, </span><a data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyrical_abstraction" title="Lyrical abstraction"><span data-dcnode-id="6805" instrument_node="">lyrical abstraction</span></a><span data-dcnode-id="6803" instrument_node="">, and </span><a data-dcnode-id="6801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conceptual_art" title="Conceptual art"><span data-dcnode-id="6802" instrument_node="">conceptual art</span></a><span data-dcnode-id="6800" instrument_node="">.</span></li><span data-dcnode-id="6798" instrument_node="">
</span><li data-dcnode-id="6784"><span data-dcnode-id="6797" instrument_node="">The </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_art" title="Modern art"><span data-dcnode-id="6796" instrument_node="">modern art</span></a><span data-dcnode-id="6794" instrument_node=""> movement revolutionized art and culture and set the stage for both </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernism" title="Modernism"><span data-dcnode-id="6793" instrument_node="">Modernism</span></a><span data-dcnode-id="6791" instrument_node=""> and its counterpart </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postmodern_art" title="Postmodern art"><span data-dcnode-id="6790" instrument_node="">postmodern art</span></a><span data-dcnode-id="6788" instrument_node=""> as well as other </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contemporary_art" title="Contemporary art"><span data-dcnode-id="6787" instrument_node="">contemporary art</span></a><span data-dcnode-id="6785" instrument_node=""> practices.</span></li><span data-dcnode-id="6783" instrument_node="">
</span><li data-dcnode-id="6779"><a data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Art_Nouveau" title="Art Nouveau"><span data-dcnode-id="6782" instrument_node="">Art Nouveau</span></a><span data-dcnode-id="6780" instrument_node=""> began as advanced architecture and design but fell out of fashion after World War I. The style was dynamic and inventive but unsuited to the depression of the Great War.</span></li><span data-dcnode-id="6778" instrument_node="">
</span><li data-dcnode-id="6767"><span data-dcnode-id="6777" instrument_node="">In Europe, </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_architecture" title="Modern architecture"><span data-dcnode-id="6776" instrument_node="">modern architecture</span></a><span data-dcnode-id="6774" instrument_node=""> departed from the decorated styles of the </span><a data-dcnode-id="6772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Victorian_era" title="Victorian era"><span data-dcnode-id="6773" instrument_node="">Victorian era</span></a><span data-dcnode-id="6771" instrument_node="">. Streamlined forms inspired by machines became commonplace, enabled by developments in </span><a class="mw-redirect" data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Building_materials" title="Building materials"><span data-dcnode-id="6770" instrument_node="">building materials</span></a><span data-dcnode-id="6768" instrument_node=""> and technologies. Before World War II, many European architects moved to the United States, where modern architecture continued to develop.</span></li><span data-dcnode-id="6766" instrument_node="">
</span><li data-dcnode-id="6761"><span data-dcnode-id="6765" instrument_node="">The automobile increased the mobility of people in the Western countries in the early-to-mid-century, and in many other places by the end of the 20th century. </span><a data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urban_planning" title="Urban planning"><span data-dcnode-id="6764" instrument_node="">City design</span></a><span data-dcnode-id="6762" instrument_node=""> throughout most of the West became focused on transport via car.</span></li></ul><span data-dcnode-id="6759" instrument_node="">
</span><h3 data-dcnode-id="6749"><span class="mw-headline" data-dcnode-id="6757" id="Sport"><span data-dcnode-id="6758" instrument_node="">Sport</span></span><span class="mw-editsection" data-dcnode-id="6750"><span class="mw-editsection-bracket" data-dcnode-id="6755"><span data-dcnode-id="6756" instrument_node="">[</span></span><a data-dcnode-id="6753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D12" title="Edit section: Sport"><span data-dcnode-id="6754" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6748" instrument_node="">
</span><ul data-dcnode-id="6733"><li data-dcnode-id="6746"><span data-dcnode-id="6747" instrument_node="">The popularity of sport increased considerably—both as an activity for all, and as entertainment, particularly on television.</span></li><span data-dcnode-id="6745" instrument_node="">
</span><li data-dcnode-id="6740"><span data-dcnode-id="6744" instrument_node="">The modern </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Olympic_Games" title="Olympic Games"><span data-dcnode-id="6743" instrument_node="">Olympic Games</span></a><span data-dcnode-id="6741" instrument_node="">, first held in 1896, grew to include tens of thousands of athletes in dozens of sports.</span></li><span data-dcnode-id="6739" instrument_node="">
</span><li data-dcnode-id="6734"><span data-dcnode-id="6738" instrument_node="">The </span><a data-dcnode-id="6736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FIFA_World_Cup" title="FIFA World Cup"><span data-dcnode-id="6737" instrument_node="">FIFA World Cup</span></a><span data-dcnode-id="6735" instrument_node=""> was first held in 1930, and was held every four years after World War II.</span></li></ul><span data-dcnode-id="6732" instrument_node="">
</span><h2 data-dcnode-id="6722"><span class="mw-headline" data-dcnode-id="6730" id="Science"><span data-dcnode-id="6731" instrument_node="">Science</span></span><span class="mw-editsection" data-dcnode-id="6723"><span class="mw-editsection-bracket" data-dcnode-id="6728"><span data-dcnode-id="6729" instrument_node="">[</span></span><a data-dcnode-id="6726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D13" title="Edit section: Science"><span data-dcnode-id="6727" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6721" instrument_node="">
