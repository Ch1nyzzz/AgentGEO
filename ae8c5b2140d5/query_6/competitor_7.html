rble" title="The Blue Marble"><span data-dcnode-id="9562" instrument_node="">seen</span></a><span data-dcnode-id="9560" instrument_node=""> from </span><a data-dcnode-id="9558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollo_17" title="Apollo 17"><span data-dcnode-id="9559" instrument_node="">Apollo 17</span></a><span data-dcnode-id="9557" instrument_node=""> in December 1972. The photograph was taken by LMP </span><a data-dcnode-id="9555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harrison_Schmitt" title="Harrison Schmitt"><span data-dcnode-id="9556" instrument_node="">Harrison Schmitt</span></a><span data-dcnode-id="9554" instrument_node="">. The second half of the 20th century saw humanity's first </span><a data-dcnode-id="9552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_exploration" title="Space exploration"><span data-dcnode-id="9553" instrument_node="">space exploration</span></a><span data-dcnode-id="9551" instrument_node="">.</span></div></div></div><span data-dcnode-id="9547" instrument_node="">
</span><p data-dcnode-id="9499"><span data-dcnode-id="9546" instrument_node="">The </span><b data-dcnode-id="9544"><span data-dcnode-id="9545" instrument_node="">20th</span></b><span data-dcnode-id="9543" instrument_node=""> (</span><b data-dcnode-id="9541"><span data-dcnode-id="9542" instrument_node="">twentieth</span></b><span data-dcnode-id="9540" instrument_node="">) </span><b data-dcnode-id="9538"><span data-dcnode-id="9539" instrument_node="">century</span></b><span data-dcnode-id="9537" instrument_node=""> began on
January 1, 1901 (</span><a data-dcnode-id="9535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1901" title="1901"><span data-dcnode-id="9536" instrument_node="">MCMI</span></a><span data-dcnode-id="9534" instrument_node="">), and ended on December 31, 2000 (</span><a data-dcnode-id="9532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2000" title="2000"><span data-dcnode-id="9533" instrument_node="">MM</span></a><span data-dcnode-id="9531" instrument_node="">).</span><sup class="reference" data-dcnode-id="9528" id="cite_ref-The_New_York_Times_1-0"><a data-dcnode-id="9529" href="#cite_note-The_New_York_Times-1"><span data-dcnode-id="9530" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9527" instrument_node=""> The 20th century was dominated by significant events that defined the modern era: </span><a data-dcnode-id="9525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_flu" title="Spanish flu"><span data-dcnode-id="9526" instrument_node="">Spanish flu pandemic</span></a><span data-dcnode-id="9524" instrument_node="">, </span><a data-dcnode-id="9522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="9523" instrument_node="">World War I</span></a><span data-dcnode-id="9521" instrument_node=""> and </span><a data-dcnode-id="9519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="9520" instrument_node="">World War II</span></a><span data-dcnode-id="9518" instrument_node="">, </span><a data-dcnode-id="9516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon" title="Nuclear weapon"><span data-dcnode-id="9517" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="9515" instrument_node="">, </span><a data-dcnode-id="9513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power" title="Nuclear power"><span data-dcnode-id="9514" instrument_node="">nuclear power</span></a><span data-dcnode-id="9512" instrument_node=""> and </span><a data-dcnode-id="9510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_exploration" title="Space exploration"><span data-dcnode-id="9511" instrument_node="">space exploration</span></a><span data-dcnode-id="9509" instrument_node="">, </span><a data-dcnode-id="9507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalism" title="Nationalism"><span data-dcnode-id="9508" instrument_node="">nationalism</span></a><span data-dcnode-id="9506" instrument_node=""> and </span><a data-dcnode-id="9504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decolonization" title="Decolonization"><span data-dcnode-id="9505" instrument_node="">decolonization</span></a><span data-dcnode-id="9503" instrument_node="">, technological advances, and the </span><a data-dcnode-id="9501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="9502" instrument_node="">Cold War</span></a><span data-dcnode-id="9500" instrument_node=""> and post-Cold War conflicts. These reshaped the political and social structure of the globe.
</span></p><p data-dcnode-id="9479"><span data-dcnode-id="9498" instrument_node="">The 20th century saw a massive transformation of humanity's relationship with the natural world. Global </span><a data-dcnode-id="9496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_population" title="World population"><span data-dcnode-id="9497" instrument_node="">population</span></a><span data-dcnode-id="9495" instrument_node="">, </span><a data-dcnode-id="9493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sea_level_rise" title="Sea level rise"><span data-dcnode-id="9494" instrument_node="">sea level rise</span></a><span data-dcnode-id="9492" instrument_node="">, and </span><a data-dcnode-id="9490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_collapse" title="Ecological collapse"><span data-dcnode-id="9491" instrument_node="">ecological collapses</span></a><span data-dcnode-id="9489" instrument_node=""> increased while competition for land and dwindling resources accelerated </span><a data-dcnode-id="9487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deforestation" title="Deforestation"><span data-dcnode-id="9488" instrument_node="">deforestation</span></a><span data-dcnode-id="9486" instrument_node="">, water depletion, and the </span><a data-dcnode-id="9484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holocene_extinction" title="Holocene extinction"><span data-dcnode-id="9485" instrument_node="">mass extinction</span></a><span data-dcnode-id="9483" instrument_node=""> of many of the world's species and decline in the population of others. </span><a data-dcnode-id="9481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attribution_of_recent_climate_change" title="Attribution of recent climate change"><span data-dcnode-id="9482" instrument_node="">Man-made global warming</span></a><span data-dcnode-id="9480" instrument_node=""> increased the risk of extreme weather conditions.
</span></p><p data-dcnode-id="9419"><span data-dcnode-id="9478" instrument_node="">Additional themes include </span><a data-dcnode-id="9476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_organization" title="Intergovernmental organization"><span data-dcnode-id="9477" instrument_node="">intergovernmental organizations</span></a><span data-dcnode-id="9475" instrument_node=""> and </span><a data-dcnode-id="9473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_homogenization" title="Cultural homogenization"><span data-dcnode-id="9474" instrument_node="">cultural homogenization</span></a><span data-dcnode-id="9472" instrument_node=""> through developments in </span><a data-dcnode-id="9470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emerging_technologies" title="Emerging technologies"><span data-dcnode-id="9471" instrument_node="">emerging</span></a><span data-dcnode-id="9469" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="9467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transportation" title="Transportation"><span data-dcnode-id="9468" instrument_node="">transportation</span></a><span data-dcnode-id="9466" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communications_technology" title="Communications technology"><span data-dcnode-id="9465" instrument_node="">communications technology</span></a><span data-dcnode-id="9463" instrument_node="">; </span><a data-dcnode-id="9461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty_reduction" title="Poverty reduction"><span data-dcnode-id="9462" instrument_node="">poverty reduction</span></a><span data-dcnode-id="9460" instrument_node=""> and </span><a data-dcnode-id="9458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_population" title="World population"><span data-dcnode-id="9459" instrument_node="">world population</span></a><span data-dcnode-id="9457" instrument_node=""> growth, awareness of </span><a data-dcnode-id="9455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_degradation" title="Environmental degradation"><span data-dcnode-id="9456" instrument_node="">environmental degradation</span></a><span data-dcnode-id="9454" instrument_node="">, </span><a data-dcnode-id="9452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecological_extinction" title="Ecological extinction"><span data-dcnode-id="9453" instrument_node="">ecological extinction</span></a><span data-dcnode-id="9451" instrument_node="">;</span><sup class="reference" data-dcnode-id="9448" id="cite_ref-Wilson_2-0"><a data-dcnode-id="9449" href="#cite_note-Wilson-2"><span data-dcnode-id="9450" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="9445" id="cite_ref-3"><a data-dcnode-id="9446" href="#cite_note-3"><span data-dcnode-id="9447" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9444" instrument_node=""> and the birth of the </span><a data-dcnode-id="9442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_Revolution" title="Digital Revolution"><span data-dcnode-id="9443" instrument_node="">Digital Revolution</span></a><span data-dcnode-id="9441" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="9439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automobile" title="Automobile"><span data-dcnode-id="9440" instrument_node="">Automobiles</span></a><span data-dcnode-id="9438" instrument_node="">, </span><a data-dcnode-id="9436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airplane" title="Airplane"><span data-dcnode-id="9437" instrument_node="">airplanes</span></a><span data-dcnode-id="9435" instrument_node=""> and the use of </span><a data-dcnode-id="9433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_appliance" title="Home appliance"><span data-dcnode-id="9434" instrument_node="">home appliances</span></a><span data-dcnode-id="9432" instrument_node=""> became common, as did </span><a class="mw-redirect" data-dcnode-id="9430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_recording" title="Video recording"><span data-dcnode-id="9431" instrument_node="">video</span></a><span data-dcnode-id="9429" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Audio_recording" title="Audio recording"><span data-dcnode-id="9428" instrument_node="">audio recording</span></a><span data-dcnode-id="9426" instrument_node="">. Great advances in power generation, communication, and medical technology allowed for </span><a data-dcnode-id="9424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="9425" instrument_node="">near-instantaneous worldwide computer communication</span></a><span data-dcnode-id="9423" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genetic_modification" title="Genetic modification"><span data-dcnode-id="9422" instrument_node="">genetic modification</span></a><span data-dcnode-id="9420" instrument_node=""> of life.
</span></p><p data-dcnode-id="9383"><span data-dcnode-id="9418" instrument_node="">The repercussions of the World Wars, Cold War, and globalization crafted a world where people are more united than any previous time in human history, as exemplified by the establishment of </span><a data-dcnode-id="9416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="9417" instrument_node="">international law</span></a><span data-dcnode-id="9415" instrument_node="">, </span><a data-dcnode-id="9413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aid" title="Aid"><span data-dcnode-id="9414" instrument_node="">international aid</span></a><span data-dcnode-id="9412" instrument_node="">, and the </span><a data-dcnode-id="9410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="9411" instrument_node="">United Nations</span></a><span data-dcnode-id="9409" instrument_node="">. The </span><a data-dcnode-id="9407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="9408" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="9406" instrument_node="">—which spent $13 billion ($110&nbsp;billion in 2020 U.S. dollars)</span><sup class="reference" data-dcnode-id="9403" id="cite_ref-inflation-USGDP_4-0"><a data-dcnode-id="9404" href="#cite_note-inflation-USGDP-4"><span data-dcnode-id="9405" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9402" instrument_node=""> to rebuild the economies of post-war nations—launched "</span><a data-dcnode-id="9400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pax_Americana" title="Pax Americana"><span data-dcnode-id="9401" instrument_node="">Pax Americana</span></a><span data-dcnode-id="9399" instrument_node="">". Throughout the latter half of the 20th century, the rivalry between the United States and the </span><a data-dcnode-id="9397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="9398" instrument_node="">Soviet Union</span></a><span data-dcnode-id="9396" instrument_node=""> created enormous tensions around the world which manifested in various armed proxy regional conflicts and the omnipresent danger of </span><a data-dcnode-id="9394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_proliferation" title="Nuclear proliferation"><span data-dcnode-id="9395" instrument_node="">nuclear proliferation</span></a><span data-dcnode-id="9393" instrument_node="">. The </span><a data-dcnode-id="9391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="9392" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="9390" instrument_node=""> in 1991 after the </span><a data-dcnode-id="9388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="9389" instrument_node="">collapse of its European alliance</span></a><span data-dcnode-id="9387" instrument_node=""> was heralded by the West as the end of </span><a data-dcnode-id="9385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="9386" instrument_node="">communism</span></a><span data-dcnode-id="9384" instrument_node="">, though by the century's end roughly one in six people on Earth lived under communist rule, mostly in China which was rapidly rising as an economic and geopolitical power.
</span></p><p data-dcnode-id="9329"><span data-dcnode-id="9382" instrument_node="">It took over two hundred thousand years of modern human history and 6 million years of human evolution for the world's population to reach 1 billion in 1804;</span><sup class="reference" data-dcnode-id="9379" id="cite_ref-5"><a data-dcnode-id="9380" href="#cite_note-5"><span data-dcnode-id="9381" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9378" instrument_node=""> </span><a data-dcnode-id="9376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_population_milestones" title="World population milestones"><span data-dcnode-id="9377" instrument_node="">world population</span></a><span data-dcnode-id="9375" instrument_node=""> reached an estimated 2 billion in 1927; by late 1999, the global population reached 6 billion, with over half in East, South and Southeast Asia.</span><sup class="reference" data-dcnode-id="9372" id="cite_ref-6"><a data-dcnode-id="9373" href="#cite_note-6"><span data-dcnode-id="9374" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="9369" id="cite_ref-7"><a data-dcnode-id="9370" href="#cite_note-7"><span data-dcnode-id="9371" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="9366" id="cite_ref-8"><a data-dcnode-id="9367" href="#cite_note-8"><span data-dcnode-id="9368" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9365" instrument_node=""> Global </span><a data-dcnode-id="9363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy" title="Literacy"><span data-dcnode-id="9364" instrument_node="">literacy</span></a><span data-dcnode-id="9362" instrument_node=""> averaged 80%. </span><a data-dcnode-id="9360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penicillin" title="Penicillin"><span data-dcnode-id="9361" instrument_node="">Penicillin</span></a><span data-dcnode-id="9359" instrument_node=""> and other medical breakthroughs combined with the </span><a data-dcnode-id="9357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Health_Organization" title="World Health Organization"><span data-dcnode-id="9358" instrument_node="">World Health Organization</span></a><span data-dcnode-id="9356" instrument_node="">'s global </span><a data-dcnode-id="9354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaccine" title="Vaccine"><span data-dcnode-id="9355" instrument_node="">vaccination</span></a><span data-dcnode-id="9353" instrument_node=""> campaigns to eradicate smallpox and other diseases responsible for more human deaths than all wars and natural disasters combined yielded unprecedented results; smallpox now only existed in labs.</span><sup class="reference" data-dcnode-id="9350" id="cite_ref-9"><a data-dcnode-id="9351" href="#cite_note-9"><span data-dcnode-id="9352" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="9347" id="cite_ref-10"><a data-dcnode-id="9348" href="#cite_note-10"><span data-dcnode-id="9349" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9346" instrument_node=""> Machines came to be used in all areas of production, feeding increasingly intricate supply chains that allowed mankind for the first time to be constrained not by how much it could produce, but by peoples' willingness to consume. Trade improvements greatly expanded upon the limited set of food-producing techniques used since the </span><a data-dcnode-id="9344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neolithic_Revolution" title="Neolithic Revolution"><span data-dcnode-id="9345" instrument_node="">Neolithic</span></a><span data-dcnode-id="9343" instrument_node=""> period, multiplying the diversity of foods available and boosting the quality of </span><a data-dcnode-id="9341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_nutrition" title="Human nutrition"><span data-dcnode-id="9342" instrument_node="">human nutrition</span></a><span data-dcnode-id="9340" instrument_node="">. Until the early 19th century, </span><a data-dcnode-id="9338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_expectancy" title="Life expectancy"><span data-dcnode-id="9339" instrument_node="">life expectancy</span></a><span data-dcnode-id="9337" instrument_node=""> from birth was about thirty in most populations; global lifespan-averages exceeded 40 years for the first time in history, with over half achieving 70 or more years (three decades </span><i data-dcnode-id="9335"><span data-dcnode-id="9336" instrument_node="">longer</span></i><span data-dcnode-id="9334" instrument_node=""> than a century earlier).</span><sup class="reference" data-dcnode-id="9331" id="cite_ref-11"><a data-dcnode-id="9332" href="#cite_note-11"><span data-dcnode-id="9333" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9330" instrument_node="">
</span></p><span data-dcnode-id="9328" instrument_node="">

</span><link data-dcnode-id="9036" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9032" role="note"><span data-dcnode-id="9035" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="9033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th-century_events" title="20th-century events"><span data-dcnode-id="9034" instrument_node="">20th-century events</span></a></div><span data-dcnode-id="9031" instrument_node="">
</span><link data-dcnode-id="9030" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9026" role="note"><span data-dcnode-id="9029" instrument_node="">See also: </span><a data-dcnode-id="9027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_the_20th_century" title="Timeline of the 20th century"><span data-dcnode-id="9028" instrument_node="">Timeline of the 20th century</span></a></div><span data-dcnode-id="9025" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9010"><div class="thumbinner" data-dcnode-id="9011" style="width:252px;"><a class="image" data-dcnode-id="9023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg"><img alt="" class="thumbimage" data-dcnode-id="9024" data-file-height="1432" data-file-width="1815" decoding="async" height="197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/32/Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg/250px-Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/32/Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg/375px-Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/32/Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg/500px-Arthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg 2x" width="250"></a><span data-dcnode-id="9022" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9012"><div class="magnify" data-dcnode-id="9020"><a class="internal" data-dcnode-id="9021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AArthur_Mees_Flags_of_A_Free_Empire_1910_Cornell_CUL_PJM_1167_01.jpg" title="Enlarge"></a></div><span data-dcnode-id="9019" instrument_node="">Map of the </span><a data-dcnode-id="9017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="9018" instrument_node="">British Empire</span></a><span data-dcnode-id="9016" instrument_node=""> (as of 1910). At its height, it was the </span><a data-dcnode-id="9014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_largest_empires" title="List of largest empires"><span data-dcnode-id="9015" instrument_node="">largest empire</span></a><span data-dcnode-id="9013" instrument_node=""> in history.</span></div></div></div><span data-dcnode-id="9009" instrument_node="">
</span><p data-dcnode-id="8981"><span data-dcnode-id="9008" instrument_node="">The 20th (twentieth) century began on
January 1, 1901,</span><sup class="reference" data-dcnode-id="9005" id="cite_ref-The_New_York_Times_1-1"><a data-dcnode-id="9006" href="#cite_note-The_New_York_Times-1"><span data-dcnode-id="9007" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9004" instrument_node=""> and ended on December 31, 2000.</span><sup class="reference" data-dcnode-id="9001" id="cite_ref-12"><a data-dcnode-id="9002" href="#cite_note-12"><span data-dcnode-id="9003" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9000" instrument_node=""> It was the tenth and final century of the </span><a data-dcnode-id="8998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2nd_millennium" title="2nd millennium"><span data-dcnode-id="8999" instrument_node="">2nd millennium</span></a><span data-dcnode-id="8997" instrument_node="">. Unlike most century years, the year </span><a data-dcnode-id="8995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2000" title="2000"><span data-dcnode-id="8996" instrument_node="">2000</span></a><span data-dcnode-id="8994" instrument_node=""> was a </span><a data-dcnode-id="8992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leap_year" title="Leap year"><span data-dcnode-id="8993" instrument_node="">leap year</span></a><span data-dcnode-id="8991" instrument_node="">, and the second </span><a data-dcnode-id="8989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Century_leap_year" title="Century leap year"><span data-dcnode-id="8990" instrument_node="">century leap year</span></a><span data-dcnode-id="8988" instrument_node=""> in the </span><a data-dcnode-id="8986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_calendar" title="Gregorian calendar"><span data-dcnode-id="8987" instrument_node="">Gregorian calendar</span></a><span data-dcnode-id="8985" instrument_node=""> after </span><a data-dcnode-id="8983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1600" title="1600"><span data-dcnode-id="8984" instrument_node="">1600</span></a><span data-dcnode-id="8982" instrument_node="">.
</span></p><p data-dcnode-id="8952"><span data-dcnode-id="8980" instrument_node="">The century had the first </span><a data-dcnode-id="8978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_war" title="World war"><span data-dcnode-id="8979" instrument_node="">global-scale</span></a><span data-dcnode-id="8977" instrument_node=""> </span><a data-dcnode-id="8975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_war" title="Total war"><span data-dcnode-id="8976" instrument_node="">total wars</span></a><span data-dcnode-id="8974" instrument_node=""> between world powers across continents and oceans in </span><a data-dcnode-id="8972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8973" instrument_node="">World War I</span></a><span data-dcnode-id="8971" instrument_node=""> and </span><a data-dcnode-id="8969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="8970" instrument_node="">World War II</span></a><span data-dcnode-id="8968" instrument_node="">. </span><a data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalism" title="Nationalism"><span data-dcnode-id="8967" instrument_node="">Nationalism</span></a><span data-dcnode-id="8965" instrument_node=""> became a major political issue in the world in the 20th century, acknowledged in </span><a data-dcnode-id="8963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_law" title="International law"><span data-dcnode-id="8964" instrument_node="">international law</span></a><span data-dcnode-id="8962" instrument_node=""> along with the right of </span><a data-dcnode-id="8960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nation" title="Nation"><span data-dcnode-id="8961" instrument_node="">nations</span></a><span data-dcnode-id="8959" instrument_node=""> to </span><a data-dcnode-id="8957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-determination" title="Self-determination"><span data-dcnode-id="8958" instrument_node="">self-determination</span></a><span data-dcnode-id="8956" instrument_node="">, official </span><a data-dcnode-id="8954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decolonization" title="Decolonization"><span data-dcnode-id="8955" instrument_node="">decolonization</span></a><span data-dcnode-id="8953" instrument_node=""> in the mid-century, and related regional conflicts.
</span></p><p data-dcnode-id="8882"><span data-dcnode-id="8951" instrument_node="">The century saw a major shift in the way that many people lived, with changes in politics, ideology, economics, society, culture, science, technology, and medicine. The 20th century may have seen more technological and scientific progress than all the other centuries combined since the dawn of civilization. Terms like </span><i data-dcnode-id="8948"><a data-dcnode-id="8949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalism" title="Nationalism"><span data-dcnode-id="8950" instrument_node="">nationalism</span></a></i><span data-dcnode-id="8947" instrument_node="">, </span><i data-dcnode-id="8944"><a data-dcnode-id="8945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalism" title="Globalism"><span data-dcnode-id="8946" instrument_node="">globalism</span></a></i><span data-dcnode-id="8943" instrument_node="">, </span><i data-dcnode-id="8940"><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmentalism" title="Environmentalism"><span data-dcnode-id="8942" instrument_node="">environmentalism</span></a></i><span data-dcnode-id="8939" instrument_node="">, </span><i data-dcnode-id="8936"><a data-dcnode-id="8937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideology" title="Ideology"><span data-dcnode-id="8938" instrument_node="">ideology</span></a></i><span data-dcnode-id="8935" instrument_node="">, </span><i data-dcnode-id="8932"><a data-dcnode-id="8933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_war" title="World war"><span data-dcnode-id="8934" instrument_node="">world war</span></a></i><span data-dcnode-id="8931" instrument_node="">, </span><i data-dcnode-id="8927"><a data-dcnode-id="8929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genocide" title="Genocide"><span data-dcnode-id="8930" instrument_node="">genocide</span></a><span data-dcnode-id="8928" instrument_node="">,</span></i><span data-dcnode-id="8926" instrument_node=""> and </span><i data-dcnode-id="8923"><a class="mw-redirect" data-dcnode-id="8924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_war" title="Nuclear war"><span data-dcnode-id="8925" instrument_node="">nuclear war</span></a></i><span data-dcnode-id="8922" instrument_node=""> entered common usage. Scientific discoveries, such as the </span><a data-dcnode-id="8920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory_of_relativity" title="Theory of relativity"><span data-dcnode-id="8921" instrument_node="">theory of relativity</span></a><span data-dcnode-id="8919" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quantum_physics" title="Quantum physics"><span data-dcnode-id="8918" instrument_node="">quantum physics</span></a><span data-dcnode-id="8916" instrument_node="">, profoundly changed the foundational models of physical science, forcing scientists to realize that the universe was more complex than previously believed, and dashing the hopes (or fears) at the end of the 19th century that the last few details of scientific knowledge were about to be filled in. It was a century that started with </span><a data-dcnode-id="8914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horse" title="Horse"><span data-dcnode-id="8915" instrument_node="">horses</span></a><span data-dcnode-id="8913" instrument_node="">, simple automobiles, and </span><a data-dcnode-id="8911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cargo_ship" title="Cargo ship"><span data-dcnode-id="8912" instrument_node="">freighters</span></a><span data-dcnode-id="8910" instrument_node=""> but ended with </span><a data-dcnode-id="8908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High-speed_rail" title="High-speed rail"><span data-dcnode-id="8909" instrument_node="">high-speed rail</span></a><span data-dcnode-id="8907" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cruise_ships" title="Cruise ships"><span data-dcnode-id="8906" instrument_node="">cruise ships</span></a><span data-dcnode-id="8904" instrument_node="">, global </span><a data-dcnode-id="8902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airline" title="Airline"><span data-dcnode-id="8903" instrument_node="">commercial air travel</span></a><span data-dcnode-id="8901" instrument_node=""> and the </span><a data-dcnode-id="8899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Shuttle" title="Space Shuttle"><span data-dcnode-id="8900" instrument_node="">Space Shuttle</span></a><span data-dcnode-id="8898" instrument_node="">. Horses and other </span><a data-dcnode-id="8896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pack_animal" title="Pack animal"><span data-dcnode-id="8897" instrument_node="">pack animals</span></a><span data-dcnode-id="8895" instrument_node="">, every society's basic form of personal transportation for thousands of years, were replaced by automobiles and buses within a few decades. These developments were made possible by the exploitation of </span><a data-dcnode-id="8893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_fuel" title="Fossil fuel"><span data-dcnode-id="8894" instrument_node="">fossil fuel</span></a><span data-dcnode-id="8892" instrument_node=""> resources, which offered energy in an easily portable form, but also caused concern about pollution and long-term impact on the </span><a class="mw-redirect" data-dcnode-id="8890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environment_%28biophysical%29" title="Environment (biophysical)"><span data-dcnode-id="8891" instrument_node="">environment</span></a><span data-dcnode-id="8889" instrument_node="">. Humans explored </span><a data-dcnode-id="8887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outer_space" title="Outer space"><span data-dcnode-id="8888" instrument_node="">space</span></a><span data-dcnode-id="8886" instrument_node=""> for the first time, taking their first footsteps on the </span><a data-dcnode-id="8884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="8885" instrument_node="">Moon</span></a><span data-dcnode-id="8883" instrument_node="">.
</span></p><span data-dcnode-id="8881" instrument_node="">
</span><div class="center" data-dcnode-id="8862"><div class="thumb tnone" data-dcnode-id="8863"><div class="thumbinner" data-dcnode-id="8864" style="width:752px;"><a class="image" data-dcnode-id="8879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWorld_1914_empires_colonies_territory.PNG"><img alt="" class="thumbimage" data-dcnode-id="8880" data-file-height="628" data-file-width="1522" decoding="async" height="309" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/45/World_1914_empires_colonies_territory.PNG/750px-World_1914_empires_colonies_territory.PNG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/45/World_1914_empires_colonies_territory.PNG/1125px-World_1914_empires_colonies_territory.PNG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/45/World_1914_empires_colonies_territory.PNG/1500px-World_1914_empires_colonies_territory.PNG 2x" width="750"></a><span data-dcnode-id="8878" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8865"><div class="magnify" data-dcnode-id="8876"><a class="internal" data-dcnode-id="8877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWorld_1914_empires_colonies_territory.PNG" title="Enlarge"></a></div><div class="center" data-dcnode-id="8866" style="width:auto; margin-left:auto; margin-right:auto;"><span data-dcnode-id="8875" instrument_node="">World powers and empires in 1914, just before the First World War. </span><br data-dcnode-id="8874"><span data-dcnode-id="8873" instrument_node=""> (The </span><a data-dcnode-id="8871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="8872" instrument_node="">Austro-Hungarian</span></a><span data-dcnode-id="8870" instrument_node=""> flag should be shown instead of the </span><a data-dcnode-id="8868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austrian_Empire" title="Austrian Empire"><span data-dcnode-id="8869" instrument_node="">Austrian Empire</span></a><span data-dcnode-id="8867" instrument_node="">'s one)</span></div></div></div></div></div><span data-dcnode-id="8861" instrument_node="">
</span><p data-dcnode-id="8837"><span data-dcnode-id="8860" instrument_node="">Mass media, telecommunications, and information technology (especially computers, </span><a class="mw-redirect" data-dcnode-id="8858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paperback_book" title="Paperback book"><span data-dcnode-id="8859" instrument_node="">paperback books</span></a><span data-dcnode-id="8857" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_education" title="Public education"><span data-dcnode-id="8856" instrument_node="">public education</span></a><span data-dcnode-id="8854" instrument_node="">, and the </span><a data-dcnode-id="8852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="8853" instrument_node="">Internet</span></a><span data-dcnode-id="8851" instrument_node="">) made the world's knowledge more widely available. Advancements in </span><a class="mw-redirect" data-dcnode-id="8849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_technology" title="Medical technology"><span data-dcnode-id="8850" instrument_node="">medical technology</span></a><span data-dcnode-id="8848" instrument_node=""> also improved the health of many people: the global life expectancy increased from 35 years to 65 years. Rapid technological advancements, however, also allowed warfare to reach unprecedented levels of destruction. World War II alone killed over 60 million people, while </span><a class="mw-redirect" data-dcnode-id="8846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons" title="Nuclear weapons"><span data-dcnode-id="8847" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="8845" instrument_node=""> gave humankind the means to annihilate itself in a short time. However, these same wars resulted in the destruction of the imperial system. For the first time in human history, </span><a data-dcnode-id="8843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire" title="Empire"><span data-dcnode-id="8844" instrument_node="">empires</span></a><span data-dcnode-id="8842" instrument_node=""> and their wars of expansion and colonization ceased to be a factor in international affairs, resulting in a far more globalized and cooperative world. The last time major powers clashed openly was in 1945, and since then, violence has seen an unprecedented decline.</span><sup class="reference" data-dcnode-id="8839" id="cite_ref-13"><a data-dcnode-id="8840" href="#cite_note-13"><span data-dcnode-id="8841" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8838" instrument_node="">
</span></p><p data-dcnode-id="8820"><span data-dcnode-id="8836" instrument_node="">The world also became more </span><a data-dcnode-id="8834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_homogenization" title="Cultural homogenization"><span data-dcnode-id="8835" instrument_node="">culturally homogenized</span></a><span data-dcnode-id="8833" instrument_node=""> than ever with developments in transportation and communications technology, </span><a data-dcnode-id="8831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_music" title="Popular music"><span data-dcnode-id="8832" instrument_node="">popular music</span></a><span data-dcnode-id="8830" instrument_node=""> and other influences of </span><a data-dcnode-id="8828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="8829" instrument_node="">Western culture</span></a><span data-dcnode-id="8827" instrument_node="">, </span><a data-dcnode-id="8825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multinational_corporation" title="Multinational corporation"><span data-dcnode-id="8826" instrument_node="">international corporations</span></a><span data-dcnode-id="8824" instrument_node="">, and what was arguably a truly </span><a data-dcnode-id="8822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_globalization" title="Economic globalization"><span data-dcnode-id="8823" instrument_node="">global economy</span></a><span data-dcnode-id="8821" instrument_node=""> by the end of the 20th century.
</span></p><span data-dcnode-id="8819" instrument_node="">
</span><h3 data-dcnode-id="8809"><span class="mw-headline" data-dcnode-id="8817" id="Summary"><span data-dcnode-id="8818" instrument_node="">Summary</span></span><span class="mw-editsection" data-dcnode-id="8810"><span class="mw-editsection-bracket" data-dcnode-id="8815"><span data-dcnode-id="8816" instrument_node="">[</span></span><a data-dcnode-id="8813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D2" title="Edit section: Summary"><span data-dcnode-id="8814" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8811"><span data-dcnode-id="8812" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8808" instrument_node="">
</span><p data-dcnode-id="8728"><span data-dcnode-id="8807" instrument_node="">Technological advancements during </span><a data-dcnode-id="8805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8806" instrument_node="">World War I</span></a><span data-dcnode-id="8804" instrument_node=""> changed the way war was fought, as new inventions such as </span><a data-dcnode-id="8802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tank" title="Tank"><span data-dcnode-id="8803" instrument_node="">tanks</span></a><span data-dcnode-id="8801" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_weapons" title="Chemical weapons"><span data-dcnode-id="8800" instrument_node="">chemical weapons</span></a><span data-dcnode-id="8798" instrument_node="">, and </span><a data-dcnode-id="8796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aircraft" title="Aircraft"><span data-dcnode-id="8797" instrument_node="">aircraft</span></a><span data-dcnode-id="8795" instrument_node=""> modified tactics and strategy. After more than four years of </span><a data-dcnode-id="8793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trench_warfare" title="Trench warfare"><span data-dcnode-id="8794" instrument_node="">trench warfare</span></a><span data-dcnode-id="8792" instrument_node=""> in </span><a data-dcnode-id="8790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="8791" instrument_node="">Western Europe</span></a><span data-dcnode-id="8789" instrument_node="">, and up to 22 million dead, the powers that had formed the </span><a data-dcnode-id="8787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triple_Entente" title="Triple Entente"><span data-dcnode-id="8788" instrument_node="">Triple Entente</span></a><span data-dcnode-id="8786" instrument_node=""> (</span><a data-dcnode-id="8784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Third_Republic" title="French Third Republic"><span data-dcnode-id="8785" instrument_node="">France</span></a><span data-dcnode-id="8783" instrument_node="">, </span><a data-dcnode-id="8781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_of_Great_Britain_and_Ireland" title="United Kingdom of Great Britain and Ireland"><span data-dcnode-id="8782" instrument_node="">Britain</span></a><span data-dcnode-id="8780" instrument_node="">, and </span><a data-dcnode-id="8778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="8779" instrument_node="">Russia</span></a><span data-dcnode-id="8777" instrument_node="">, later replaced by the United States and joined by </span><a data-dcnode-id="8775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Italy" title="Kingdom of Italy"><span data-dcnode-id="8776" instrument_node="">Italy</span></a><span data-dcnode-id="8774" instrument_node=""> and </span><a data-dcnode-id="8772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Romania" title="Kingdom of Romania"><span data-dcnode-id="8773" instrument_node="">Romania</span></a><span data-dcnode-id="8771" instrument_node="">) emerged victorious over the </span><a data-dcnode-id="8769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Powers" title="Central Powers"><span data-dcnode-id="8770" instrument_node="">Central Powers</span></a><span data-dcnode-id="8768" instrument_node=""> (</span><a data-dcnode-id="8766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="8767" instrument_node="">Germany</span></a><span data-dcnode-id="8765" instrument_node="">, </span><a data-dcnode-id="8763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria-Hungary" title="Austria-Hungary"><span data-dcnode-id="8764" instrument_node="">Austria-Hungary</span></a><span data-dcnode-id="8762" instrument_node="">, the </span><a data-dcnode-id="8760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="8761" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="8759" instrument_node=""> and </span><a data-dcnode-id="8757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Bulgaria" title="Kingdom of Bulgaria"><span data-dcnode-id="8758" instrument_node="">Bulgaria</span></a><span data-dcnode-id="8756" instrument_node="">). In addition to annexing many of the </span><a data-dcnode-id="8754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony" title="Colony"><span data-dcnode-id="8755" instrument_node="">colonial possessions</span></a><span data-dcnode-id="8753" instrument_node=""> of the vanquished states, the Triple Entente exacted punitive restitution payments from them, plunging Germany in particular into </span><a data-dcnode-id="8751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyperinflation_in_the_Weimar_Republic" title="Hyperinflation in the Weimar Republic"><span data-dcnode-id="8752" instrument_node="">economic depression</span></a><span data-dcnode-id="8750" instrument_node="">. The Austro-Hungarian and Ottoman empires were dismantled at the war's conclusion. The </span><a data-dcnode-id="8748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="8749" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="8747" instrument_node=""> resulted in the overthrow of the </span><a data-dcnode-id="8745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsar" title="Tsar"><span data-dcnode-id="8746" instrument_node="">Tsarist</span></a><span data-dcnode-id="8744" instrument_node=""> regime of </span><a class="mw-redirect" data-dcnode-id="8742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_II" title="Nicholas II"><span data-dcnode-id="8743" instrument_node="">Nicholas II</span></a><span data-dcnode-id="8741" instrument_node=""> and the onset of the </span><a data-dcnode-id="8739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="8740" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="8738" instrument_node="">. The victorious </span><a data-dcnode-id="8736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="8737" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="8735" instrument_node=""> then established the </span><a data-dcnode-id="8733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8734" instrument_node="">Soviet Union</span></a><span data-dcnode-id="8732" instrument_node="">, the world's first </span><a data-dcnode-id="8730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_state" title="Communist state"><span data-dcnode-id="8731" instrument_node="">communist state</span></a><span data-dcnode-id="8729" instrument_node="">.
</span></p><span data-dcnode-id="8727" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8705"><div class="thumbinner" data-dcnode-id="8706" style="width:222px;"><a class="image" data-dcnode-id="8725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg"><img alt="" class="thumbimage" data-dcnode-id="8726" data-file-height="509" data-file-width="800" decoding="async" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Bundesarchiv_Bild_101I-020-1268-36%252C_Russland%252C_russischer_Gefallener%252C_Panzer_BT_7%252C.jpg/220px-Bundesarchiv_Bild_101I-020-1268-36%252C_Russland%252C_russischer_Gefallener%252C_Panzer_BT_7%252C.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Bundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg/330px-Bundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Bundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg/440px-Bundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg 2x" width="220"></a><span data-dcnode-id="8724" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8707"><div class="magnify" data-dcnode-id="8722"><a class="internal" data-dcnode-id="8723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_101I-020-1268-36%2C_Russland%2C_russischer_Gefallener%2C_Panzer_BT_7%2C.jpg" title="Enlarge"></a></div><span data-dcnode-id="8721" instrument_node="">Ukraine, early days of the 1941 </span><a data-dcnode-id="8719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Barbarossa" title="Operation Barbarossa"><span data-dcnode-id="8720" instrument_node="">Nazi invasion</span></a><span data-dcnode-id="8718" instrument_node="">. The </span><a data-dcnode-id="8716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8717" instrument_node="">Soviet Union</span></a><span data-dcnode-id="8715" instrument_node=""> lost around 27 million people between 1941 and 1945,</span><sup class="reference" data-dcnode-id="8712" id="cite_ref-14"><a data-dcnode-id="8713" href="#cite_note-14"><span data-dcnode-id="8714" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8711" instrument_node=""> almost half of all </span><a data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II_casualties" title="World War II casualties"><span data-dcnode-id="8710" instrument_node="">World War II deaths</span></a><span data-dcnode-id="8708" instrument_node="">.</span></div></div></div><span data-dcnode-id="8704" instrument_node="">
</span><p data-dcnode-id="8593"><span data-dcnode-id="8703" instrument_node="">At the beginning of the period, the </span><a data-dcnode-id="8701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="8702" instrument_node="">British Empire</span></a><span data-dcnode-id="8700" instrument_node=""> was the world's most powerful nation,</span><sup class="reference" data-dcnode-id="8697" id="cite_ref-ferguson_15-0"><a data-dcnode-id="8698" href="#cite_note-ferguson-15"><span data-dcnode-id="8699" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8696" instrument_node=""> having </span><a data-dcnode-id="8694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pax_Britannica" title="Pax Britannica"><span data-dcnode-id="8695" instrument_node="">acted as the world's policeman</span></a><span data-dcnode-id="8693" instrument_node=""> for the past century. </span><a data-dcnode-id="8691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="8692" instrument_node="">Fascism</span></a><span data-dcnode-id="8690" instrument_node="">, a movement which grew out of post-war </span><a data-dcnode-id="8688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angst" title="Angst"><span data-dcnode-id="8689" instrument_node="">angst</span></a><span data-dcnode-id="8687" instrument_node=""> and which accelerated during the </span><a data-dcnode-id="8685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="8686" instrument_node="">Great Depression</span></a><span data-dcnode-id="8684" instrument_node=""> of the 1930s, gained momentum in </span><a class="mw-redirect" data-dcnode-id="8682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_Fascism" title="Italian Fascism"><span data-dcnode-id="8683" instrument_node="">Italy</span></a><span data-dcnode-id="8681" instrument_node="">, </span><a data-dcnode-id="8679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazism" title="Nazism"><span data-dcnode-id="8680" instrument_node="">Germany</span></a><span data-dcnode-id="8678" instrument_node="">, and </span><a data-dcnode-id="8676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falangism" title="Falangism"><span data-dcnode-id="8677" instrument_node="">Spain</span></a><span data-dcnode-id="8675" instrument_node=""> in the 1920s and 1930s, culminating in </span><a data-dcnode-id="8673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="8674" instrument_node="">World War II</span></a><span data-dcnode-id="8672" instrument_node="">, sparked by </span><a data-dcnode-id="8670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="8671" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="8669" instrument_node="">'s aggressive expansion at the expense of its neighbors. Meanwhile, </span><a data-dcnode-id="8667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Japan" title="Empire of Japan"><span data-dcnode-id="8668" instrument_node="">Japan</span></a><span data-dcnode-id="8666" instrument_node=""> had rapidly transformed itself into a technologically advanced industrial power and, along with Germany and Italy, formed the </span><a data-dcnode-id="8664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Axis_powers" title="Axis powers"><span data-dcnode-id="8665" instrument_node="">Axis powers</span></a><span data-dcnode-id="8663" instrument_node="">. Japan's military </span><a data-dcnode-id="8661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expansionism" title="Expansionism"><span data-dcnode-id="8662" instrument_node="">expansionism</span></a><span data-dcnode-id="8660" instrument_node=""> in </span><a data-dcnode-id="8658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Asia" title="East Asia"><span data-dcnode-id="8659" instrument_node="">East Asia</span></a><span data-dcnode-id="8657" instrument_node=""> and the </span><a data-dcnode-id="8655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_Ocean" title="Pacific Ocean"><span data-dcnode-id="8656" instrument_node="">Pacific Ocean</span></a><span data-dcnode-id="8654" instrument_node=""> brought it into conflict with the United States, culminating in </span><a data-dcnode-id="8652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attack_on_Pearl_Harbor" title="Attack on Pearl Harbor"><span data-dcnode-id="8653" instrument_node="">a surprise attack</span></a><span data-dcnode-id="8651" instrument_node=""> which drew the US into World War II. After some years of dramatic military success, Germany was </span><a data-dcnode-id="8649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Instrument_of_Surrender" title="German Instrument of Surrender"><span data-dcnode-id="8650" instrument_node="">defeated</span></a><span data-dcnode-id="8648" instrument_node=""> in 1945, having been </span><a data-dcnode-id="8646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Allied_invasion_of_Germany" title="Western Allied invasion of Germany"><span data-dcnode-id="8647" instrument_node="">invaded</span></a><span data-dcnode-id="8645" instrument_node=""> by the </span><a data-dcnode-id="8643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8644" instrument_node="">Soviet Union</span></a><span data-dcnode-id="8642" instrument_node=""> and </span><a data-dcnode-id="8640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish_Armed_Forces_in_the_East" title="Polish Armed Forces in the East"><span data-dcnode-id="8641" instrument_node="">Poland</span></a><span data-dcnode-id="8639" instrument_node=""> </span><a data-dcnode-id="8637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28World_War_II%29" title="Eastern Front (World War II)"><span data-dcnode-id="8638" instrument_node="">from the East</span></a><span data-dcnode-id="8636" instrument_node=""> and by the United States, the United Kingdom, Canada, and </span><a data-dcnode-id="8634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_France" title="Free France"><span data-dcnode-id="8635" instrument_node="">France</span></a><span data-dcnode-id="8633" instrument_node=""> </span><a data-dcnode-id="8631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Front_%28World_War_II%29" title="Western Front (World War II)"><span data-dcnode-id="8632" instrument_node="">from the West</span></a><span data-dcnode-id="8630" instrument_node="">. After the victory of the </span><a data-dcnode-id="8628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allies_of_World_War_II" title="Allies of World War II"><span data-dcnode-id="8629" instrument_node="">Allies</span></a><span data-dcnode-id="8627" instrument_node=""> in Europe, the </span><a data-dcnode-id="8625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacific_War" title="Pacific War"><span data-dcnode-id="8626" instrument_node="">war in Asia</span></a><span data-dcnode-id="8624" instrument_node=""> ended with the </span><a data-dcnode-id="8622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_invasion_of_Manchuria" title="Soviet invasion of Manchuria"><span data-dcnode-id="8623" instrument_node="">Soviet invasion of Manchuria</span></a><span data-dcnode-id="8621" instrument_node=""> and the </span><a data-dcnode-id="8619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_bombings_of_Hiroshima_and_Nagasaki" title="Atomic bombings of Hiroshima and Nagasaki"><span data-dcnode-id="8620" instrument_node="">dropping of two atomic bombs</span></a><span data-dcnode-id="8618" instrument_node=""> on Japan by the US, the first nation to develop </span><a class="mw-redirect" data-dcnode-id="8616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons" title="Nuclear weapons"><span data-dcnode-id="8617" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="8615" instrument_node=""> and the only one to use them in warfare. In total, World War II left some 60 million people dead. After the war, Germany was </span><a data-dcnode-id="8613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied-occupied_Germany" title="Allied-occupied Germany"><span data-dcnode-id="8614" instrument_node="">occupied</span></a><span data-dcnode-id="8612" instrument_node=""> and divided between the </span><a data-dcnode-id="8610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Bloc" title="Western Bloc"><span data-dcnode-id="8611" instrument_node="">Western</span></a><span data-dcnode-id="8609" instrument_node=""> powers and the Soviet Union. </span><a data-dcnode-id="8607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="8608" instrument_node="">East Germany</span></a><span data-dcnode-id="8606" instrument_node=""> and the rest of </span><a data-dcnode-id="8604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="8605" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="8603" instrument_node=""> became Soviet </span><a class="mw-redirect" data-dcnode-id="8601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puppet_states" title="Puppet states"><span data-dcnode-id="8602" instrument_node="">puppet states</span></a><span data-dcnode-id="8600" instrument_node=""> under communist rule. Western Europe was rebuilt with the aid of the American </span><a data-dcnode-id="8598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="8599" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="8597" instrument_node="">, resulting in a major </span><a data-dcnode-id="8595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post%25E2%2580%2593World_War_II_economic_expansion" title="Post–World War II economic expansion"><span data-dcnode-id="8596" instrument_node="">post-war economic boom</span></a><span data-dcnode-id="8594" instrument_node="">, and many of the affected nations became close allies of the United States.
</span></p><p data-dcnode-id="8519"><span data-dcnode-id="8592" instrument_node="">With the Axis defeated and Britain and France rebuilding, the United States and the Soviet Union were left standing as the world's only </span><a data-dcnode-id="8590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superpower" title="Superpower"><span data-dcnode-id="8591" instrument_node="">superpowers</span></a><span data-dcnode-id="8589" instrument_node="">. Allies during the war, they soon became hostile to one another as their competing ideologies of </span><a data-dcnode-id="8587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="8588" instrument_node="">communism</span></a><span data-dcnode-id="8586" instrument_node=""> and </span><a data-dcnode-id="8584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_capitalism" title="Democratic capitalism"><span data-dcnode-id="8585" instrument_node="">democratic capitalism</span></a><span data-dcnode-id="8583" instrument_node=""> proliferated in Europe, which became divided by the </span><a data-dcnode-id="8581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="8582" instrument_node="">Iron Curtain</span></a><span data-dcnode-id="8580" instrument_node=""> and the </span><a data-dcnode-id="8578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Wall" title="Berlin Wall"><span data-dcnode-id="8579" instrument_node="">Berlin Wall</span></a><span data-dcnode-id="8577" instrument_node="">. They formed competing military alliances (</span><a data-dcnode-id="8575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="8576" instrument_node="">NATO</span></a><span data-dcnode-id="8574" instrument_node=""> and the </span><a data-dcnode-id="8572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="8573" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="8571" instrument_node="">) which engaged in a decades-long standoff known as the </span><a data-dcnode-id="8569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="8570" instrument_node="">Cold War</span></a><span data-dcnode-id="8568" instrument_node="">. The period was marked by a </span><a data-dcnode-id="8566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_arms_race" title="Nuclear arms race"><span data-dcnode-id="8567" instrument_node="">new arms race</span></a><span data-dcnode-id="8565" instrument_node=""> as the USSR became the second nation to develop nuclear weapons, which were produced by both sides in sufficient numbers to </span><a data-dcnode-id="8563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_holocaust" title="Nuclear holocaust"><span data-dcnode-id="8564" instrument_node="">end most human life on the planet</span></a><span data-dcnode-id="8562" instrument_node=""> had a large-scale nuclear exchange ever occurred. </span><a data-dcnode-id="8560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mutual_assured_destruction" title="Mutual assured destruction"><span data-dcnode-id="8561" instrument_node="">Mutually assured destruction</span></a><span data-dcnode-id="8559" instrument_node=""> is credited by many historians as having prevented such an exchange, each side being unable to </span><a class="mw-redirect" data-dcnode-id="8557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pre-emptive_nuclear_strike" title="Pre-emptive nuclear strike"><span data-dcnode-id="8558" instrument_node="">strike first</span></a><span data-dcnode-id="8556" instrument_node=""> at the other without ensuring an equally devastating </span><a data-dcnode-id="8554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_strike" title="Second strike"><span data-dcnode-id="8555" instrument_node="">retaliatory strike</span></a><span data-dcnode-id="8553" instrument_node="">. Unable to engage one another directly, the conflict played out in a series of </span><a data-dcnode-id="8551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_war" title="Proxy war"><span data-dcnode-id="8552" instrument_node="">proxy wars</span></a><span data-dcnode-id="8550" instrument_node=""> around the world—particularly in </span><a data-dcnode-id="8548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Civil_War" title="Chinese Civil War"><span data-dcnode-id="8549" instrument_node="">China</span></a><span data-dcnode-id="8547" instrument_node="">, </span><a data-dcnode-id="8545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="8546" instrument_node="">Korea</span></a><span data-dcnode-id="8544" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_revolution" title="Cuban revolution"><span data-dcnode-id="8543" instrument_node="">Cuba</span></a><span data-dcnode-id="8541" instrument_node="">, </span><a data-dcnode-id="8539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="8540" instrument_node="">Vietnam</span></a><span data-dcnode-id="8538" instrument_node="">, and </span><a data-dcnode-id="8536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="8537" instrument_node="">Afghanistan</span></a><span data-dcnode-id="8535" instrument_node="">—as the USSR sought to </span><a data-dcnode-id="8533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_communism" title="World communism"><span data-dcnode-id="8534" instrument_node="">export communism</span></a><span data-dcnode-id="8532" instrument_node=""> while the US attempted to </span><a data-dcnode-id="8530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Containment" title="Containment"><span data-dcnode-id="8531" instrument_node="">contain it</span></a><span data-dcnode-id="8529" instrument_node="">. The technological competition between the two sides led to substantial investment in </span><a data-dcnode-id="8527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Research_and_development" title="Research and development"><span data-dcnode-id="8528" instrument_node="">research and development</span></a><span data-dcnode-id="8526" instrument_node=""> which produced innovations that reached far beyond the battlefield, such as </span><a data-dcnode-id="8524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Race" title="Space Race"><span data-dcnode-id="8525" instrument_node="">space exploration</span></a><span data-dcnode-id="8523" instrument_node=""> and the </span><a data-dcnode-id="8521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="8522" instrument_node="">Internet</span></a><span data-dcnode-id="8520" instrument_node="">.
</span></p><span data-dcnode-id="8518" instrument_node="">
