</span><div class="thumb tright" data-dcnode-id="8504"><div class="thumbinner" data-dcnode-id="8505" style="width:172px;"><a class="image" data-dcnode-id="8516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlbert_Einstein_Head.jpg"><img alt="" class="thumbimage" data-dcnode-id="8517" data-file-height="4333" data-file-width="3250" decoding="async" height="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Albert_Einstein_Head.jpg/170px-Albert_Einstein_Head.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Albert_Einstein_Head.jpg/255px-Albert_Einstein_Head.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Albert_Einstein_Head.jpg/340px-Albert_Einstein_Head.jpg 2x" width="170"></a><span data-dcnode-id="8515" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8506"><div class="magnify" data-dcnode-id="8513"><a class="internal" data-dcnode-id="8514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlbert_Einstein_Head.jpg" title="Enlarge"></a></div><a data-dcnode-id="8511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Einstein" title="Albert Einstein"><span data-dcnode-id="8512" instrument_node="">Albert Einstein</span></a><span data-dcnode-id="8510" instrument_node=""> is often regarded as the father of </span><a data-dcnode-id="8508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_physics" title="Modern physics"><span data-dcnode-id="8509" instrument_node="">modern physics</span></a><span data-dcnode-id="8507" instrument_node="">.</span></div></div></div><span data-dcnode-id="8503" instrument_node="">
</span><p data-dcnode-id="8435"><span data-dcnode-id="8502" instrument_node="">In the latter half of the century, most of the </span><a data-dcnode-id="8500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_colonialism" title="History of colonialism"><span data-dcnode-id="8501" instrument_node="">European-colonized world</span></a><span data-dcnode-id="8499" instrument_node=""> in Africa and Asia gained independence in a process of </span><a data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decolonization" title="Decolonization"><span data-dcnode-id="8498" instrument_node="">decolonization</span></a><span data-dcnode-id="8496" instrument_node="">. Meanwhile, </span><a data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="8495" instrument_node="">globalization</span></a><span data-dcnode-id="8493" instrument_node=""> opened the door for several nations to exert a strong influence over many world affairs. The US's global military presence spread </span><a data-dcnode-id="8491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture_of_the_United_States" title="Culture of the United States"><span data-dcnode-id="8492" instrument_node="">American culture</span></a><span data-dcnode-id="8490" instrument_node=""> around the world with the advent of the </span><a data-dcnode-id="8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cinema_of_the_United_States" title="Cinema of the United States"><span data-dcnode-id="8489" instrument_node="">Hollywood motion picture industry</span></a><span data-dcnode-id="8487" instrument_node="">, </span><a data-dcnode-id="8485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Broadway_%28Manhattan%29" title="Broadway (Manhattan)"><span data-dcnode-id="8486" instrument_node="">Broadway</span></a><span data-dcnode-id="8484" instrument_node="">, </span><a data-dcnode-id="8482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rock_and_roll" title="Rock and roll"><span data-dcnode-id="8483" instrument_node="">rock and roll</span></a><span data-dcnode-id="8481" instrument_node="">, </span><a data-dcnode-id="8479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pop_music" title="Pop music"><span data-dcnode-id="8480" instrument_node="">pop music</span></a><span data-dcnode-id="8478" instrument_node="">, </span><a data-dcnode-id="8476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fast_food" title="Fast food"><span data-dcnode-id="8477" instrument_node="">fast food</span></a><span data-dcnode-id="8475" instrument_node="">, </span><a data-dcnode-id="8473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big-box_store" title="Big-box store"><span data-dcnode-id="8474" instrument_node="">big-box stores</span></a><span data-dcnode-id="8472" instrument_node="">, and the </span><a class="mw-redirect" data-dcnode-id="8470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hip-hop" title="Hip-hop"><span data-dcnode-id="8471" instrument_node="">hip-hop</span></a><span data-dcnode-id="8469" instrument_node=""> lifestyle. Britain also continued to influence world </span><a data-dcnode-id="8467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture" title="Culture"><span data-dcnode-id="8468" instrument_node="">culture</span></a><span data-dcnode-id="8466" instrument_node="">, including the "</span><a data-dcnode-id="8464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Invasion" title="British Invasion"><span data-dcnode-id="8465" instrument_node="">British Invasion</span></a><span data-dcnode-id="8463" instrument_node="">" into </span><a data-dcnode-id="8461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Music_of_the_United_States" title="Music of the United States"><span data-dcnode-id="8462" instrument_node="">American music</span></a><span data-dcnode-id="8460" instrument_node="">, leading many </span><a data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Band_%28rock_and_pop%29" title="Band (rock and pop)"><span data-dcnode-id="8459" instrument_node="">rock bands</span></a><span data-dcnode-id="8457" instrument_node=""> from other countries (such as Swedish </span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ABBA" title="ABBA"><span data-dcnode-id="8456" instrument_node="">ABBA</span></a><span data-dcnode-id="8454" instrument_node="">) to sing in English. After </span><a data-dcnode-id="8452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="8453" instrument_node="">the Soviet Union collapsed</span></a><span data-dcnode-id="8451" instrument_node=""> under internal pressure in 1991, most of the communist governments it had supported around the world </span><a data-dcnode-id="8449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989" title="Revolutions of 1989"><span data-dcnode-id="8450" instrument_node="">were dismantled</span></a><span data-dcnode-id="8448" instrument_node="">—with the notable exceptions of China, </span><a data-dcnode-id="8446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="8447" instrument_node="">North Korea</span></a><span data-dcnode-id="8445" instrument_node="">, </span><a data-dcnode-id="8443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="8444" instrument_node="">Cuba</span></a><span data-dcnode-id="8442" instrument_node="">, </span><a data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="8441" instrument_node="">Vietnam</span></a><span data-dcnode-id="8439" instrument_node="">, and </span><a data-dcnode-id="8437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laos" title="Laos"><span data-dcnode-id="8438" instrument_node="">Laos</span></a><span data-dcnode-id="8436" instrument_node="">—followed by awkward transitions into market economies.
</span></p><p data-dcnode-id="8412"><span data-dcnode-id="8434" instrument_node="">Following World War II, the </span><a data-dcnode-id="8432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="8433" instrument_node="">United Nations</span></a><span data-dcnode-id="8431" instrument_node="">, successor to the </span><a data-dcnode-id="8429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="8430" instrument_node="">League of Nations</span></a><span data-dcnode-id="8428" instrument_node="">, was established as an international forum in which the world's nations could discuss issues diplomatically. It enacted </span><a data-dcnode-id="8426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_resolution" title="United Nations resolution"><span data-dcnode-id="8427" instrument_node="">resolutions</span></a><span data-dcnode-id="8425" instrument_node=""> on such topics as the conduct of warfare, environmental protection, international </span><a data-dcnode-id="8423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereignty" title="Sovereignty"><span data-dcnode-id="8424" instrument_node="">sovereignty</span></a><span data-dcnode-id="8422" instrument_node="">, and </span><a data-dcnode-id="8420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="8421" instrument_node="">human rights</span></a><span data-dcnode-id="8419" instrument_node="">. </span><a data-dcnode-id="8417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peacekeeping" title="Peacekeeping"><span data-dcnode-id="8418" instrument_node="">Peacekeeping</span></a><span data-dcnode-id="8416" instrument_node=""> forces consisting of troops provided by various countries, with various United Nations and other aid agencies, helped to relieve famine, disease, and poverty, and to suppress some local armed conflicts. Europe slowly united, economically and, in some ways, politically, to form the </span><a data-dcnode-id="8414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="8415" instrument_node="">European Union</span></a><span data-dcnode-id="8413" instrument_node="">, which consisted of 15 European countries by the end of the 20th century.
</span></p><span data-dcnode-id="8411" instrument_node="">
</span><h3 data-dcnode-id="8401"><span class="mw-headline" data-dcnode-id="8409" id="Nature_of_innovation_and_change"><span data-dcnode-id="8410" instrument_node="">Nature of innovation and change</span></span><span class="mw-editsection" data-dcnode-id="8402"><span class="mw-editsection-bracket" data-dcnode-id="8407"><span data-dcnode-id="8408" instrument_node="">[</span></span><a data-dcnode-id="8405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D3" title="Edit section: Nature of innovation and change"><span data-dcnode-id="8406" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8403"><span data-dcnode-id="8404" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8400" instrument_node="">
</span><p data-dcnode-id="8350"><span data-dcnode-id="8399" instrument_node="">Due to continuing industrialization and expanding trade, many significant changes of the century were, directly or indirectly, economic and technological in nature. Inventions such as the </span><a class="mw-redirect" data-dcnode-id="8397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light_bulb" title="Light bulb"><span data-dcnode-id="8398" instrument_node="">light bulb</span></a><span data-dcnode-id="8396" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="8394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automobile" title="Automobile"><span data-dcnode-id="8395" instrument_node="">automobile</span></a><span data-dcnode-id="8393" instrument_node="">, and the </span><a data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telephone" title="Telephone"><span data-dcnode-id="8392" instrument_node="">telephone</span></a><span data-dcnode-id="8390" instrument_node=""> in the late 19th century, followed by </span><a class="mw-redirect" data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supertanker" title="Supertanker"><span data-dcnode-id="8389" instrument_node="">supertankers</span></a><span data-dcnode-id="8387" instrument_node="">, </span><a data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airliner" title="Airliner"><span data-dcnode-id="8386" instrument_node="">airliners</span></a><span data-dcnode-id="8384" instrument_node="">, motorways, </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio" title="Radio"><span data-dcnode-id="8383" instrument_node="">radio</span></a><span data-dcnode-id="8381" instrument_node="">, </span><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television" title="Television"><span data-dcnode-id="8380" instrument_node="">television</span></a><span data-dcnode-id="8378" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antibiotics" title="Antibiotics"><span data-dcnode-id="8377" instrument_node="">antibiotics</span></a><span data-dcnode-id="8375" instrument_node="">, </span><a data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power" title="Nuclear power"><span data-dcnode-id="8374" instrument_node="">nuclear power</span></a><span data-dcnode-id="8372" instrument_node="">, </span><a data-dcnode-id="8370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frozen_food" title="Frozen food"><span data-dcnode-id="8371" instrument_node="">frozen food</span></a><span data-dcnode-id="8369" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computers" title="Computers"><span data-dcnode-id="8368" instrument_node="">computers</span></a><span data-dcnode-id="8366" instrument_node=""> and </span><a data-dcnode-id="8364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microcomputer" title="Microcomputer"><span data-dcnode-id="8365" instrument_node="">microcomputers</span></a><span data-dcnode-id="8363" instrument_node="">, the </span><a data-dcnode-id="8361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="8362" instrument_node="">Internet</span></a><span data-dcnode-id="8360" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_telephone" title="Mobile telephone"><span data-dcnode-id="8359" instrument_node="">mobile telephones</span></a><span data-dcnode-id="8357" instrument_node=""> affected people's </span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quality_of_life" title="Quality of life"><span data-dcnode-id="8356" instrument_node="">quality of life</span></a><span data-dcnode-id="8354" instrument_node=""> across the developed world. Scientific research, engineering professionalization and technological development—much of it motivated by the </span><a data-dcnode-id="8352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="8353" instrument_node="">Cold War</span></a><span data-dcnode-id="8351" instrument_node=""> arms race—drove changes in everyday life.
</span></p><span data-dcnode-id="8349" instrument_node="">
</span><h3 data-dcnode-id="8339"><span class="mw-headline" data-dcnode-id="8347" id="Social_change"><span data-dcnode-id="8348" instrument_node="">Social change</span></span><span class="mw-editsection" data-dcnode-id="8340"><span class="mw-editsection-bracket" data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">[</span></span><a data-dcnode-id="8343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D4" title="Edit section: Social change"><span data-dcnode-id="8344" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8341"><span data-dcnode-id="8342" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8338" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8321"><div class="thumbinner" data-dcnode-id="8322" style="width:222px;"><a class="image" data-dcnode-id="8336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMartin_Luther_King_-_March_on_Washington.jpg"><img alt="" class="thumbimage" data-dcnode-id="8337" data-file-height="1403" data-file-width="1296" decoding="async" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Martin_Luther_King_-_March_on_Washington.jpg/220px-Martin_Luther_King_-_March_on_Washington.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/81/Martin_Luther_King_-_March_on_Washington.jpg/330px-Martin_Luther_King_-_March_on_Washington.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/81/Martin_Luther_King_-_March_on_Washington.jpg/440px-Martin_Luther_King_-_March_on_Washington.jpg 2x" width="220"></a><span data-dcnode-id="8335" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8323"><div class="magnify" data-dcnode-id="8333"><a class="internal" data-dcnode-id="8334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMartin_Luther_King_-_March_on_Washington.jpg" title="Enlarge"></a></div><a data-dcnode-id="8331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="8332" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="8330" instrument_node="">, an </span><a data-dcnode-id="8328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Americans" title="African Americans"><span data-dcnode-id="8329" instrument_node="">African American</span></a><span data-dcnode-id="8327" instrument_node=""> civil rights leader (</span><a data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/I_Have_a_Dream" title="I Have a Dream"><span data-dcnode-id="8326" instrument_node="">Washington, August 1963</span></a><span data-dcnode-id="8324" instrument_node="">)</span></div></div></div><span data-dcnode-id="8320" instrument_node="">
</span><p data-dcnode-id="8280"><span data-dcnode-id="8319" instrument_node="">At the beginning of the century, strong discrimination based on race and sex was significant in most societies. Although the </span><a data-dcnode-id="8317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlantic_slave_trade" title="Atlantic slave trade"><span data-dcnode-id="8318" instrument_node="">Atlantic slave trade</span></a><span data-dcnode-id="8316" instrument_node=""> had ended in the 19th century, movements for equality for non-white people in the white-dominated societies of </span><a data-dcnode-id="8314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="8315" instrument_node="">North America</span></a><span data-dcnode-id="8313" instrument_node="">, Europe, and </span><a data-dcnode-id="8311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apartheid" title="Apartheid"><span data-dcnode-id="8312" instrument_node="">South Africa</span></a><span data-dcnode-id="8310" instrument_node=""> continued. By the end of the 20th century, in many parts of the world, women had the same legal rights as men, and </span><a data-dcnode-id="8308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Racism" title="Racism"><span data-dcnode-id="8309" instrument_node="">racism</span></a><span data-dcnode-id="8307" instrument_node=""> had come to be seen as unacceptable, often backed up by legislation.</span><sup class="reference" data-dcnode-id="8304" id="cite_ref-16"><a data-dcnode-id="8305" href="#cite_note-16"><span data-dcnode-id="8306" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8303" instrument_node=""> Attitudes towards </span><a data-dcnode-id="8301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexuality" title="Homosexuality"><span data-dcnode-id="8302" instrument_node="">homosexuality</span></a><span data-dcnode-id="8300" instrument_node=""> also began to change in the later part of the century. When the </span><a data-dcnode-id="8298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="8299" instrument_node="">Republic of India</span></a><span data-dcnode-id="8297" instrument_node=""> was </span><a data-dcnode-id="8295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_India" title="Constitution of India"><span data-dcnode-id="8296" instrument_node="">constituted</span></a><span data-dcnode-id="8294" instrument_node="">, the disadvantaged classes of the </span><a data-dcnode-id="8292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caste_system_in_India" title="Caste system in India"><span data-dcnode-id="8293" instrument_node="">caste system in India</span></a><span data-dcnode-id="8291" instrument_node=""> became entitled to </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Affirmative_action" title="Affirmative action"><span data-dcnode-id="8290" instrument_node="">affirmative action</span></a><span data-dcnode-id="8288" instrument_node=""> benefits in education, employment and government.</span><sup class="reference" data-dcnode-id="8285" id="cite_ref-17"><a data-dcnode-id="8286" href="#cite_note-17"><span data-dcnode-id="8287" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8282" id="cite_ref-18"><a data-dcnode-id="8283" href="#cite_note-18"><span data-dcnode-id="8284" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8281" instrument_node="">
</span></p><span data-dcnode-id="8279" instrument_node="">
</span><h3 data-dcnode-id="8269"><span class="mw-headline" data-dcnode-id="8277" id="Earth_at_the_end_of_the_20th_century"><span data-dcnode-id="8278" instrument_node="">Earth at the end of the 20th century</span></span><span class="mw-editsection" data-dcnode-id="8270"><span class="mw-editsection-bracket" data-dcnode-id="8275"><span data-dcnode-id="8276" instrument_node="">[</span></span><a data-dcnode-id="8273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D5" title="Edit section: Earth at the end of the 20th century"><span data-dcnode-id="8274" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8271"><span data-dcnode-id="8272" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8268" instrument_node="">
</span><p data-dcnode-id="8257"><span data-dcnode-id="8267" instrument_node="">Communications and information technology, transportation technology, and medical advances had radically altered daily lives. Europe appeared to be at a sustainable peace for the first time in recorded history. The people of the </span><a data-dcnode-id="8265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_subcontinent" title="Indian subcontinent"><span data-dcnode-id="8266" instrument_node="">Indian subcontinent</span></a><span data-dcnode-id="8264" instrument_node="">, a sixth of the world population at the end of the 20th century, had attained an </span><a data-dcnode-id="8262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partition_of_India" title="Partition of India"><span data-dcnode-id="8263" instrument_node="">indigenous independence</span></a><span data-dcnode-id="8261" instrument_node=""> for the first time in centuries. China, an ancient nation comprising a fifth of the world population, was finally </span><a data-dcnode-id="8259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_economic_reform" title="Chinese economic reform"><span data-dcnode-id="8260" instrument_node="">open to the world</span></a><span data-dcnode-id="8258" instrument_node="">, creating a new state after the near-complete destruction of the old cultural order. With the end of colonialism and the Cold War, nearly a billion people in Africa were left in new nation states after centuries of foreign domination.
</span></p><p data-dcnode-id="8249"><span data-dcnode-id="8256" instrument_node="">The world was undergoing its second major period of </span><a data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="8255" instrument_node="">globalization</span></a><span data-dcnode-id="8253" instrument_node="">; the first, which started in the 18th century, having been terminated by World War I. Since the US was in a dominant position, a major part of the process was </span><a data-dcnode-id="8251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americanization" title="Americanization"><span data-dcnode-id="8252" instrument_node="">Americanization</span></a><span data-dcnode-id="8250" instrument_node="">. The influence of China and India was also rising, as the world's largest populations were rapidly integrating with the world economy.
</span></p><p data-dcnode-id="8239"><a data-dcnode-id="8247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="8248" instrument_node="">Terrorism</span></a><span data-dcnode-id="8246" instrument_node="">, </span><a data-dcnode-id="8244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictatorship" title="Dictatorship"><span data-dcnode-id="8245" instrument_node="">dictatorship</span></a><span data-dcnode-id="8243" instrument_node="">, and the spread of </span><a data-dcnode-id="8241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon" title="Nuclear weapon"><span data-dcnode-id="8242" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="8240" instrument_node=""> were pressing global issues. The world was still blighted by small-scale wars and other violent conflicts, fueled by competition over resources and by ethnic conflicts.
</span></p><p data-dcnode-id="8222"><span data-dcnode-id="8238" instrument_node="">Disease threatened to destabilize many regions of the world. New viruses such as the </span><a data-dcnode-id="8236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Nile_virus" title="West Nile virus"><span data-dcnode-id="8237" instrument_node="">West Nile virus</span></a><span data-dcnode-id="8235" instrument_node=""> continued to spread. </span><a data-dcnode-id="8233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malaria" title="Malaria"><span data-dcnode-id="8234" instrument_node="">Malaria</span></a><span data-dcnode-id="8232" instrument_node=""> and other diseases affected large populations. Millions were infected with </span><a data-dcnode-id="8230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV" title="HIV"><span data-dcnode-id="8231" instrument_node="">HIV</span></a><span data-dcnode-id="8229" instrument_node="">, the virus which causes </span><a class="mw-redirect" data-dcnode-id="8227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AIDS" title="AIDS"><span data-dcnode-id="8228" instrument_node="">AIDS</span></a><span data-dcnode-id="8226" instrument_node="">. The virus was becoming an </span><a class="mw-redirect" data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/AIDS_in_Africa" title="AIDS in Africa"><span data-dcnode-id="8225" instrument_node="">epidemic in southern Africa</span></a><span data-dcnode-id="8223" instrument_node="">.
</span></p><p data-dcnode-id="8197"><span data-dcnode-id="8221" instrument_node="">Based on research done by climate scientists, the majority of the scientific community consider that in the long term environmental problems may threaten the planet's habitability.</span><sup class="reference" data-dcnode-id="8218" id="cite_ref-19"><a data-dcnode-id="8219" href="#cite_note-19"><span data-dcnode-id="8220" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8217" instrument_node=""> One argument is that of </span><a class="mw-redirect" data-dcnode-id="8215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="8216" instrument_node="">global warming</span></a><span data-dcnode-id="8214" instrument_node=""> occurring due to human-caused emission of </span><a data-dcnode-id="8212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gas" title="Greenhouse gas"><span data-dcnode-id="8213" instrument_node="">greenhouse gases</span></a><span data-dcnode-id="8211" instrument_node="">, particularly </span><a data-dcnode-id="8209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_dioxide" title="Carbon dioxide"><span data-dcnode-id="8210" instrument_node="">carbon dioxide</span></a><span data-dcnode-id="8208" instrument_node=""> produced by the burning of </span><a data-dcnode-id="8206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_fuel" title="Fossil fuel"><span data-dcnode-id="8207" instrument_node="">fossil fuels</span></a><span data-dcnode-id="8205" instrument_node="">.</span><sup class="reference" data-dcnode-id="8202" id="cite_ref-20"><a data-dcnode-id="8203" href="#cite_note-20"><span data-dcnode-id="8204" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8201" instrument_node=""> This prompted many nations to negotiate and sign the </span><a data-dcnode-id="8199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="8200" instrument_node="">Kyoto treaty</span></a><span data-dcnode-id="8198" instrument_node="">, which set mandatory limits on carbon dioxide emissions.
</span></p><p data-dcnode-id="8186"><a data-dcnode-id="8195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_population" title="World population"><span data-dcnode-id="8196" instrument_node="">World population</span></a><span data-dcnode-id="8194" instrument_node=""> increased from about 1.6&nbsp;billion people in 1901 to 6.1&nbsp;billion at the century's end.</span><sup class="reference" data-dcnode-id="8191" id="cite_ref-21"><a data-dcnode-id="8192" href="#cite_note-21"><span data-dcnode-id="8193" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="8188" id="cite_ref-22"><a data-dcnode-id="8189" href="#cite_note-22"><span data-dcnode-id="8190" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8187" instrument_node="">
</span></p><span data-dcnode-id="8185" instrument_node="">
</span><h2 data-dcnode-id="8175"><span class="mw-headline" data-dcnode-id="8183" id="Wars_and_politics"><span data-dcnode-id="8184" instrument_node="">Wars and politics</span></span><span class="mw-editsection" data-dcnode-id="8176"><span class="mw-editsection-bracket" data-dcnode-id="8181"><span data-dcnode-id="8182" instrument_node="">[</span></span><a data-dcnode-id="8179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D6" title="Edit section: Wars and politics"><span data-dcnode-id="8180" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8177"><span data-dcnode-id="8178" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8174" instrument_node="">
</span><link data-dcnode-id="8173" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8154" role="note"><span data-dcnode-id="8172" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="8170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations_of_the_Great_Powers_%281814%25E2%2580%25931919%29" title="International relations of the Great Powers (1814–1919)"><span data-dcnode-id="8171" instrument_node="">International relations of the Great Powers (1814–1919)</span></a><span data-dcnode-id="8169" instrument_node="">, </span><a data-dcnode-id="8167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_history_of_World_War_I" title="Diplomatic history of World War I"><span data-dcnode-id="8168" instrument_node="">Diplomatic history of World War I</span></a><span data-dcnode-id="8166" instrument_node="">, </span><a data-dcnode-id="8164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations_%281919%25E2%2580%25931939%29" title="International relations (1919–1939)"><span data-dcnode-id="8165" instrument_node="">International relations (1919–1939)</span></a><span data-dcnode-id="8163" instrument_node="">, </span><a data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_history_of_World_War_II" title="Diplomatic history of World War II"><span data-dcnode-id="8162" instrument_node="">Diplomatic history of World War II</span></a><span data-dcnode-id="8160" instrument_node="">, </span><a data-dcnode-id="8158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="8159" instrument_node="">Cold War</span></a><span data-dcnode-id="8157" instrument_node="">, and </span><a data-dcnode-id="8155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations_since_1989" title="International relations since 1989"><span data-dcnode-id="8156" instrument_node="">International relations since 1989</span></a></div><span data-dcnode-id="8153" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8141"><div class="thumbinner" data-dcnode-id="8142" style="width:222px;"><a class="image" data-dcnode-id="8151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_Europe_1923-en.svg"><img alt="" class="thumbimage" data-dcnode-id="8152" data-file-height="704" data-file-width="1037" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/41/Map_Europe_1923-en.svg/220px-Map_Europe_1923-en.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/41/Map_Europe_1923-en.svg/330px-Map_Europe_1923-en.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/41/Map_Europe_1923-en.svg/440px-Map_Europe_1923-en.svg.png 2x" width="220"></a><span data-dcnode-id="8150" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8143"><div class="magnify" data-dcnode-id="8148"><a class="internal" data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMap_Europe_1923-en.svg" title="Enlarge"></a></div><span data-dcnode-id="8147" instrument_node="">Map of territorial changes in Europe after </span><a data-dcnode-id="8145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8146" instrument_node="">World War I</span></a><span data-dcnode-id="8144" instrument_node=""> (as of 1923).</span></div></div></div><span data-dcnode-id="8140" instrument_node="">
</span><p data-dcnode-id="8109"><span data-dcnode-id="8139" instrument_node="">The number of people killed during the century by government actions was in the hundreds of millions. This includes deaths caused by wars, genocide, politicide and mass murders. The deaths from acts of war during the two world wars alone have been estimated at between 50 and 80 million.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8132" style="white-space:nowrap;"><span data-dcnode-id="8138" instrument_node="">[</span><i data-dcnode-id="8134"><a data-dcnode-id="8135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8136" title="also contradicted by figure of 100m by Tilly, below (February 2015)"><span data-dcnode-id="8137" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8133" instrument_node="">]</span></sup><span data-dcnode-id="8131" instrument_node=""> Political scientist </span><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rudolph_Rummel" title="Rudolph Rummel"><span data-dcnode-id="8130" instrument_node="">Rudolph Rummel</span></a><span data-dcnode-id="8128" instrument_node=""> estimated 262,000,000 deaths caused by </span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democide" title="Democide"><span data-dcnode-id="8127" instrument_node="">democide</span></a><span data-dcnode-id="8125" instrument_node="">, which excludes those killed in war battles, civilians unintentionally killed in war and killings of rioting mobs.</span><sup class="reference" data-dcnode-id="8122" id="cite_ref-23"><a data-dcnode-id="8123" href="#cite_note-23"><span data-dcnode-id="8124" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8121" instrument_node=""> According to </span><a data-dcnode-id="8119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charles_Tilly" title="Charles Tilly"><span data-dcnode-id="8120" instrument_node="">Charles Tilly</span></a><span data-dcnode-id="8118" instrument_node="">, "Altogether, about 100 million people died as a direct result of action by organized military units backed by one government or another over the course of the century. Most likely a comparable number of civilians died of war-induced disease and other indirect effects."</span><sup class="reference" data-dcnode-id="8115" id="cite_ref-24"><a data-dcnode-id="8116" href="#cite_note-24"><span data-dcnode-id="8117" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8114" instrument_node=""> It is estimated that approximately 70 million Europeans died through war, violence and famine between 1914 and 1945.</span><sup class="reference" data-dcnode-id="8111" id="cite_ref-25"><a data-dcnode-id="8112" href="#cite_note-25"><span data-dcnode-id="8113" instrument_node="">[25]</span></a></sup><span data-dcnode-id="8110" instrument_node="">
</span></p><span data-dcnode-id="8108" instrument_node="">
</span><ul data-dcnode-id="7944"><li data-dcnode-id="8073"><span data-dcnode-id="8107" instrument_node="">The </span><a data-dcnode-id="8105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenian_genocide" title="Armenian genocide"><span data-dcnode-id="8106" instrument_node="">Armenian</span></a><span data-dcnode-id="8104" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seyfo" title="Seyfo"><span data-dcnode-id="8103" instrument_node="">Syriac</span></a><span data-dcnode-id="8101" instrument_node=""> and </span><a data-dcnode-id="8099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_genocide" title="Greek genocide"><span data-dcnode-id="8100" instrument_node="">Greek genocide</span></a><span data-dcnode-id="8098" instrument_node=""> were the systematic destruction, mass murder and expulsion of the </span><a class="mw-redirect" data-dcnode-id="8096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Armenian_people" title="Armenian people"><span data-dcnode-id="8097" instrument_node="">Armenians</span></a><span data-dcnode-id="8095" instrument_node="">, </span><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyrian_people" title="Assyrian people"><span data-dcnode-id="8094" instrument_node="">Assyrians</span></a><span data-dcnode-id="8092" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_people" title="Greek people"><span data-dcnode-id="8091" instrument_node="">Greeks</span></a><span data-dcnode-id="8089" instrument_node=""> in the </span><a data-dcnode-id="8087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_Empire" title="Ottoman Empire"><span data-dcnode-id="8088" instrument_node="">Ottoman Empire</span></a><span data-dcnode-id="8086" instrument_node=""> during </span><a data-dcnode-id="8084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="8085" instrument_node="">World War&nbsp;I</span></a><span data-dcnode-id="8083" instrument_node="">, spearheaded by the ruling </span><a data-dcnode-id="8081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Committee_of_Union_and_Progress" title="Committee of Union and Progress"><span data-dcnode-id="8082" instrument_node="">Committee of Union and Progress</span></a><span data-dcnode-id="8080" instrument_node=""> (CUP).</span><sup class="reference" data-dcnode-id="8077" id="cite_ref-FOOTNOTESuny2015245,_330_26-0"><a data-dcnode-id="8078" href="#cite_note-FOOTNOTESuny2015245,_330-26"><span data-dcnode-id="8079" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8074" id="cite_ref-FOOTNOTEBozarslanDuclertKévorkian2015187_27-0"><a data-dcnode-id="8075" href="#cite_note-FOOTNOTEBozarslanDuclertK%C3%A9vorkian2015187-27"><span data-dcnode-id="8076" instrument_node="">[27]</span></a></sup></li><span data-dcnode-id="8072" instrument_node="">
</span><li data-dcnode-id="8058"><span data-dcnode-id="8071" instrument_node="">Rising nationalism and increasing national awareness were among the many causes of World War I (1914–1918), the first of two wars to involve many major world powers including Germany, France, Italy, Japan, Russia/</span><a class="mw-redirect" data-dcnode-id="8069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USSR" title="USSR"><span data-dcnode-id="8070" instrument_node="">USSR</span></a><span data-dcnode-id="8068" instrument_node="">, the </span><a data-dcnode-id="8066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Empire" title="British Empire"><span data-dcnode-id="8067" instrument_node="">British Empire</span></a><span data-dcnode-id="8065" instrument_node=""> and the United States. World War I led to </span><a data-dcnode-id="8063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aftermath_of_World_War_I%23Territorial_gains_and_losses" title="Aftermath of World War I"><span data-dcnode-id="8064" instrument_node="">the creation of many new countries</span></a><span data-dcnode-id="8062" instrument_node="">, especially in Eastern Europe. At the time, it was said by many to be the "</span><a data-dcnode-id="8060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_war_to_end_war" title="The war to end war"><span data-dcnode-id="8061" instrument_node="">war to end all wars</span></a><span data-dcnode-id="8059" instrument_node="">".</span></li><span data-dcnode-id="8057" instrument_node="">
</span><li data-dcnode-id="8049"><span data-dcnode-id="8056" instrument_node="">After gaining political rights in the United States and much of Europe in the first part of the century, and with the advent of new </span><a data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_control" title="Birth control"><span data-dcnode-id="8055" instrument_node="">birth control</span></a><span data-dcnode-id="8053" instrument_node=""> techniques, </span><a data-dcnode-id="8051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="8052" instrument_node="">women became more independent</span></a><span data-dcnode-id="8050" instrument_node=""> throughout the century.</span></li><span data-dcnode-id="8048" instrument_node="">
</span><li data-dcnode-id="8029"><a data-dcnode-id="8046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_warfare" title="Industrial warfare"><span data-dcnode-id="8047" instrument_node="">Industrial warfare</span></a><span data-dcnode-id="8045" instrument_node=""> greatly increased in its scale and complexity during the first half of the 20th century. Notable developments included </span><a data-dcnode-id="8043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_warfare" title="Chemical warfare"><span data-dcnode-id="8044" instrument_node="">chemical warfare</span></a><span data-dcnode-id="8042" instrument_node="">, the introduction of </span><a data-dcnode-id="8040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_aviation" title="Military aviation"><span data-dcnode-id="8041" instrument_node="">military aviation</span></a><span data-dcnode-id="8039" instrument_node=""> and the widespread use of </span><a class="mw-redirect" data-dcnode-id="8037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Submarines" title="Submarines"><span data-dcnode-id="8038" instrument_node="">submarines</span></a><span data-dcnode-id="8036" instrument_node="">. The introduction of </span><a data-dcnode-id="8034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_warfare" title="Nuclear warfare"><span data-dcnode-id="8035" instrument_node="">nuclear warfare</span></a><span data-dcnode-id="8033" instrument_node=""> in the mid-20th century marked the definite transition to </span><a data-dcnode-id="8031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_warfare" title="Modern warfare"><span data-dcnode-id="8032" instrument_node="">modern warfare</span></a><span data-dcnode-id="8030" instrument_node="">.</span></li><span data-dcnode-id="8028" instrument_node="">
</span><li data-dcnode-id="8013"><span data-dcnode-id="8027" instrument_node="">Civil wars occurred in many nations. A violent </span><a data-dcnode-id="8025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_Civil_War" title="Spanish Civil War"><span data-dcnode-id="8026" instrument_node="">civil war</span></a><span data-dcnode-id="8024" instrument_node=""> broke out in Spain in 1936 when General </span><a data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francisco_Franco" title="Francisco Franco"><span data-dcnode-id="8023" instrument_node="">Francisco Franco</span></a><span data-dcnode-id="8021" instrument_node=""> rebelled against the </span><a data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Spanish_Republic" title="Second Spanish Republic"><span data-dcnode-id="8020" instrument_node="">Second Spanish Republic</span></a><span data-dcnode-id="8018" instrument_node="">. Many</span><sup class="reference" data-dcnode-id="8015" id="cite_ref-28"><a data-dcnode-id="8016" href="#cite_note-28"><span data-dcnode-id="8017" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8014" instrument_node=""> consider this war as a testing battleground for World War II, as the fascist armies bombed some Spanish territories.</span></li><span data-dcnode-id="8012" instrument_node="">
</span><li data-dcnode-id="8001"><span data-dcnode-id="8011" instrument_node="">The </span><a data-dcnode-id="8009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="8010" instrument_node="">Great Depression</span></a><span data-dcnode-id="8008" instrument_node=""> in the 1930s led to the rise of </span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="8007" instrument_node="">Fascism</span></a><span data-dcnode-id="8005" instrument_node=""> and </span><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazism" title="Nazism"><span data-dcnode-id="8004" instrument_node="">Nazism</span></a><span data-dcnode-id="8002" instrument_node=""> in Europe.</span></li><span data-dcnode-id="8000" instrument_node="">

pan><a data-dcnode-id="7980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Holocaust" title="The Holocaust"><span data-dcnode-id="7981" instrument_node="">the Holocaust</span></a><span data-dcnode-id="7979" instrument_node="">.</span></li><span data-dcnode-id="7977" instrument_node="">
</span><li data-dcnode-id="7945"><span data-dcnode-id="7976" instrument_node="">During World War I, in the </span><a data-dcnode-id="7974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="7975" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="7973" instrument_node=""> of 1917, 300 years of </span><a data-dcnode-id="7971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Romanov" title="House of Romanov"><span data-dcnode-id="7972" instrument_node="">Romanov</span></a><span data-dcnode-id="7970" instrument_node=""> reign were ended and the </span><a data-dcnode-id="7968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="7969" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="7967" instrument_node="">, under the leadership of </span><a data-dcnode-id="7965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Lenin" title="Vladimir Lenin"><span data-dcnode-id="7966" instrument_node="">Vladimir Lenin</span></a><span data-dcnode-id="7964" instrument_node="">, established the </span><a class="mw-redirect" data-dcnode-id="7962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_SFSR" title="Russian SFSR"><span data-dcnode-id="7963" instrument_node="">world's first Communist state</span></a><span data-dcnode-id="7961" instrument_node="">. After the </span><a data-dcnode-id="7959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union_in_World_War_II" title="Soviet Union in World War II"><span data-dcnode-id="7960" instrument_node="">Soviet Union's involvement in World War II</span></a><span data-dcnode-id="7958" instrument_node="">, communism became a major force in </span><a data-dcnode-id="7956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_politics" title="Global politics"><span data-dcnode-id="7957" instrument_node="">global politics</span></a><span data-dcnode-id="7955" instrument_node="">, notably in Eastern Europe, China, </span><a class="mw-redirect" data-dcnode-id="7953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indochina" title="Indochina"><span data-dcnode-id="7954" instrument_node="">Indochina</span></a><span data-dcnode-id="7952" instrument_node=""> and </span><a data-dcnode-id="7950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="7951" instrument_node="">Cuba</span></a><span data-dcnode-id="7949" instrument_node="">, where </span><a data-dcnode-id="7947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_party" title="Communist party"><span data-dcnode-id="7948" instrument_node="">communist parties</span></a><span data-dcnode-id="7946" instrument_node=""> gained near-absolute power.</span></li></ul><span data-dcnode-id="7943" instrument_node="">

-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="7934" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="7932" instrument_node=""> aboard the </span><a data-dcnode-id="7928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/USS_Sequoia_%28presidential_yacht%29" title="USS Sequoia (presidential yacht)"><span data-dcnode-id="7931" instrument_node="">USS </span><i data-dcnode-id="7929"><span data-dcnode-id="7930" instrument_node="">Sequoia</span></i></a><span data-dcnode-id="7927" instrument_node="">, June 19, 1973</span></div></div></div><span data-dcnode-id="7923" instrument_node="">
</span><ul data-dcnode-id="7778"><li data-dcnode-id="7900"><span data-dcnode-id="7922" instrument_node="">The Cold War (1947–1989) caused an </span><a data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arms_race" title="Arms race"><span data-dcnode-id="7921" instrument_node="">arms race</span></a><span data-dcnode-id="7919" instrument_node=""> and increasing competition between the two major players in the world: the Soviet Union and the United States. This competition included the development and improvement of </span><a data-dcnode-id="7917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon" title="Nuclear weapon"><span data-dcnode-id="7918" instrument_node="">nuclear weapons</span></a><span data-dcnode-id="7916" instrument_node=""> and the </span><a data-dcnode-id="7914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Race" title="Space Race"><span data-dcnode-id="7915" instrument_node="">Space Race</span></a><span data-dcnode-id="7913" instrument_node="">. This led to the </span><a data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_war" title="Proxy war"><span data-dcnode-id="7912" instrument_node="">proxy wars</span></a><span data-dcnode-id="7910" instrument_node=""> with the </span><a class="mw-redirect" data-dcnode-id="7908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_bloc" title="Western bloc"><span data-dcnode-id="7909" instrument_node="">Western bloc</span></a><span data-dcnode-id="7907" instrument_node="">, including wars in </span><a data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="7906" instrument_node="">Korea</
