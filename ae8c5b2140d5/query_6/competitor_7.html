</span><link data-dcnode-id="6714" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6710" role="note"><span data-dcnode-id="6713" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="6711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Science" title="Big Science"><span data-dcnode-id="6712" instrument_node="">Big Science</span></a></div><span data-dcnode-id="6709" instrument_node="">
</span><h3 data-dcnode-id="6699"><span class="mw-headline" data-dcnode-id="6707" id="Mathematics"><span data-dcnode-id="6708" instrument_node="">Mathematics</span></span><span class="mw-editsection" data-dcnode-id="6700"><span class="mw-editsection-bracket" data-dcnode-id="6705"><span data-dcnode-id="6706" instrument_node="">[</span></span><a data-dcnode-id="6703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D14" title="Edit section: Mathematics"><span data-dcnode-id="6704" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6698" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6684"><div class="thumbinner" data-dcnode-id="6685" style="width:172px;"><a class="image" data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlan_Turing_portr%25C3%25A9.jpg"><img alt="" class="thumbimage" data-dcnode-id="6697" data-file-height="304" data-file-width="256" decoding="async" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/07/Alan_Turing_portr%25C3%25A9.jpg/170px-Alan_Turing_portr%25C3%25A9.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/07/Alan_Turing_portr%C3%A9.jpg/255px-Alan_Turing_portr%C3%A9.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/0/07/Alan_Turing_portr%C3%A9.jpg 2x" width="170"></a><span data-dcnode-id="6695" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6686"><div class="magnify" data-dcnode-id="6693"><a class="internal" data-dcnode-id="6694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlan_Turing_portr%25C3%25A9.jpg" title="Enlarge"></a></div><span data-dcnode-id="6692" instrument_node="">The pioneer of </span><a data-dcnode-id="6690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_science" title="Computer science"><span data-dcnode-id="6691" instrument_node="">computer science</span></a><span data-dcnode-id="6689" instrument_node="">, </span><a data-dcnode-id="6687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alan_Turing" title="Alan Turing"><span data-dcnode-id="6688" instrument_node="">Alan Turing</span></a></div></div></div><span data-dcnode-id="6683" instrument_node="">
</span><p data-dcnode-id="6654"><span data-dcnode-id="6682" instrument_node="">Multiple new fields of </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematics" title="Mathematics"><span data-dcnode-id="6681" instrument_node="">mathematics</span></a><span data-dcnode-id="6679" instrument_node=""> were developed in the 20th century. In the first part of the 20th century, </span><a class="mw-redirect" data-dcnode-id="6677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Measure_theory" title="Measure theory"><span data-dcnode-id="6678" instrument_node="">measure theory</span></a><span data-dcnode-id="6676" instrument_node="">, </span><a data-dcnode-id="6674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_analysis" title="Functional analysis"><span data-dcnode-id="6675" instrument_node="">functional analysis</span></a><span data-dcnode-id="6673" instrument_node="">, and </span><a data-dcnode-id="6671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Topology" title="Topology"><span data-dcnode-id="6672" instrument_node="">topology</span></a><span data-dcnode-id="6670" instrument_node=""> were established, and significant developments were made in fields such as </span><a data-dcnode-id="6668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstract_algebra" title="Abstract algebra"><span data-dcnode-id="6669" instrument_node="">abstract algebra</span></a><span data-dcnode-id="6667" instrument_node=""> and </span><a data-dcnode-id="6665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Probability" title="Probability"><span data-dcnode-id="6666" instrument_node="">probability</span></a><span data-dcnode-id="6664" instrument_node="">. The development of </span><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Set_theory" title="Set theory"><span data-dcnode-id="6663" instrument_node="">set theory</span></a><span data-dcnode-id="6661" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Formal_logic" title="Formal logic"><span data-dcnode-id="6660" instrument_node="">formal logic</span></a><span data-dcnode-id="6658" instrument_node=""> led to </span><a data-dcnode-id="6656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G%25C3%25B6del%27s_incompleteness_theorems" title="Gödel's incompleteness theorems"><span data-dcnode-id="6657" instrument_node="">Gödel's incompleteness theorems</span></a><span data-dcnode-id="6655" instrument_node="">.
</span></p><p data-dcnode-id="6629"><span data-dcnode-id="6653" instrument_node="">Later in the 20th century, the development of </span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer" title="Computer"><span data-dcnode-id="6652" instrument_node="">computers</span></a><span data-dcnode-id="6650" instrument_node=""> led to the establishment of a </span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theory_of_computation" title="Theory of computation"><span data-dcnode-id="6649" instrument_node="">theory of computation</span></a><span data-dcnode-id="6647" instrument_node="">.</span><sup class="reference" data-dcnode-id="6644" id="cite_ref-BoyerMath_37-0"><a data-dcnode-id="6645" href="#cite_note-BoyerMath-37"><span data-dcnode-id="6646" instrument_node="">[37]</span></a></sup><span data-dcnode-id="6643" instrument_node=""> Other computationally-intense results include the study of </span><a data-dcnode-id="6641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fractal" title="Fractal"><span data-dcnode-id="6642" instrument_node="">fractals</span></a><sup class="reference" data-dcnode-id="6638" id="cite_ref-38"><a data-dcnode-id="6639" href="#cite_note-38"><span data-dcnode-id="6640" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6637" instrument_node=""> and a proof of the </span><a data-dcnode-id="6635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_color_theorem" title="Four color theorem"><span data-dcnode-id="6636" instrument_node="">four color theorem</span></a><span data-dcnode-id="6634" instrument_node=""> in 1976.</span><sup class="reference" data-dcnode-id="6631" id="cite_ref-39"><a data-dcnode-id="6632" href="#cite_note-39"><span data-dcnode-id="6633" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6630" instrument_node="">
</span></p><span data-dcnode-id="6628" instrument_node="">
</span><h3 data-dcnode-id="6618"><span class="mw-headline" data-dcnode-id="6626" id="Physics"><span data-dcnode-id="6627" instrument_node="">Physics</span></span><span class="mw-editsection" data-dcnode-id="6619"><span class="mw-editsection-bracket" data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">[</span></span><a data-dcnode-id="6622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D15" title="Edit section: Physics"><span data-dcnode-id="6623" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6620"><span data-dcnode-id="6621" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6617" instrument_node="">
</span><ul data-dcnode-id="6555"><li data-dcnode-id="6597"><span data-dcnode-id="6616" instrument_node="">New areas of </span><a data-dcnode-id="6614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physics" title="Physics"><span data-dcnode-id="6615" instrument_node="">physics</span></a><span data-dcnode-id="6613" instrument_node="">, like </span><a data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_relativity" title="Special relativity"><span data-dcnode-id="6612" instrument_node="">special relativity</span></a><span data-dcnode-id="6610" instrument_node="">, </span><a data-dcnode-id="6608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_relativity" title="General relativity"><span data-dcnode-id="6609" instrument_node="">general relativity</span></a><span data-dcnode-id="6607" instrument_node="">, and </span><a data-dcnode-id="6605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quantum_mechanics" title="Quantum mechanics"><span data-dcnode-id="6606" instrument_node="">quantum mechanics</span></a><span data-dcnode-id="6604" instrument_node="">, were developed during the first half of the century. In the process, the internal structure of </span><a data-dcnode-id="6602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atom" title="Atom"><span data-dcnode-id="6603" instrument_node="">atoms</span></a><span data-dcnode-id="6601" instrument_node=""> came to be clearly understood, followed by the discovery of </span><a data-dcnode-id="6599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elementary_particle" title="Elementary particle"><span data-dcnode-id="6600" instrument_node="">elementary particles</span></a><span data-dcnode-id="6598" instrument_node="">.</span></li><span data-dcnode-id="6596" instrument_node="">
</span><li data-dcnode-id="6579"><span data-dcnode-id="6595" instrument_node="">It was found that all the known </span><a data-dcnode-id="6593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Force" title="Force"><span data-dcnode-id="6594" instrument_node="">forces</span></a><span data-dcnode-id="6592" instrument_node=""> can be traced to only four </span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fundamental_interaction" title="Fundamental interaction"><span data-dcnode-id="6591" instrument_node="">fundamental interactions</span></a><span data-dcnode-id="6589" instrument_node="">. It was discovered further that two forces, </span><a data-dcnode-id="6587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetism" title="Electromagnetism"><span data-dcnode-id="6588" instrument_node="">electromagnetism</span></a><span data-dcnode-id="6586" instrument_node=""> and </span><a data-dcnode-id="6584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weak_interaction" title="Weak interaction"><span data-dcnode-id="6585" instrument_node="">weak interaction</span></a><span data-dcnode-id="6583" instrument_node="">, can be merged in the </span><a data-dcnode-id="6581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electroweak_interaction" title="Electroweak interaction"><span data-dcnode-id="6582" instrument_node="">electroweak interaction</span></a><span data-dcnode-id="6580" instrument_node="">, leaving only three different fundamental interactions.</span></li><span data-dcnode-id="6578" instrument_node="">
</span><li data-dcnode-id="6567"><span data-dcnode-id="6577" instrument_node="">Discovery of </span><a data-dcnode-id="6575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_reaction" title="Nuclear reaction"><span data-dcnode-id="6576" instrument_node="">nuclear reactions</span></a><span data-dcnode-id="6574" instrument_node="">, in particular </span><a data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_fusion" title="Nuclear fusion"><span data-dcnode-id="6573" instrument_node="">nuclear fusion</span></a><span data-dcnode-id="6571" instrument_node="">, finally revealed the source of </span><a data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="6570" instrument_node="">solar</span></a><span data-dcnode-id="6568" instrument_node=""> energy.</span></li><span data-dcnode-id="6566" instrument_node="">
</span><li data-dcnode-id="6556"><a data-dcnode-id="6564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiocarbon_dating" title="Radiocarbon dating"><span data-dcnode-id="6565" instrument_node="">Radiocarbon dating</span></a><span data-dcnode-id="6563" instrument_node=""> was invented, and became a powerful technique for determining the age of </span><a data-dcnode-id="6561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prehistory" title="Prehistory"><span data-dcnode-id="6562" instrument_node="">prehistoric</span></a><span data-dcnode-id="6560" instrument_node=""> animals and plants as well as </span><a data-dcnode-id="6558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History" title="History"><span data-dcnode-id="6559" instrument_node="">historical</span></a><span data-dcnode-id="6557" instrument_node=""> objects.</span></li></ul><span data-dcnode-id="6554" instrument_node="">
</span><h3 data-dcnode-id="6544"><span class="mw-headline" data-dcnode-id="6552" id="Astronomy"><span data-dcnode-id="6553" instrument_node="">Astronomy</span></span><span class="mw-editsection" data-dcnode-id="6545"><span class="mw-editsection-bracket" data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">[</span></span><a data-dcnode-id="6548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D16" title="Edit section: Astronomy"><span data-dcnode-id="6549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6546"><span data-dcnode-id="6547" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6543" instrument_node="">
</span><ul data-dcnode-id="6495"><li data-dcnode-id="6532"><span data-dcnode-id="6542" instrument_node="">A much better understanding of the evolution of the </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universe" title="Universe"><span data-dcnode-id="6541" instrument_node="">universe</span></a><span data-dcnode-id="6539" instrument_node=""> was achieved, its </span><a data-dcnode-id="6537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_the_universe" title="Age of the universe"><span data-dcnode-id="6538" instrument_node="">age</span></a><span data-dcnode-id="6536" instrument_node=""> (about 13.8 billion years) was determined, and the </span><a data-dcnode-id="6534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Bang" title="Big Bang"><span data-dcnode-id="6535" instrument_node="">Big Bang</span></a><span data-dcnode-id="6533" instrument_node=""> theory on its origin was proposed and generally accepted.</span></li><span data-dcnode-id="6531" instrument_node="">
</span><li data-dcnode-id="6517"><span data-dcnode-id="6530" instrument_node="">The age of the </span><a data-dcnode-id="6528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="6529" instrument_node="">Solar System</span></a><span data-dcnode-id="6527" instrument_node="">, including </span><a data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth" title="Earth"><span data-dcnode-id="6526" instrument_node="">Earth</span></a><span data-dcnode-id="6524" instrument_node="">, was determined, and it turned out to be much older than believed earlier: more than 4&nbsp;billion years, rather than the 20 million years suggested by </span><a class="mw-redirect" data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lord_Kelvin" title="Lord Kelvin"><span data-dcnode-id="6523" instrument_node="">Lord Kelvin</span></a><span data-dcnode-id="6521" instrument_node=""> in 1862.</span><sup class="reference" data-dcnode-id="6518" id="cite_ref-40"><a data-dcnode-id="6519" href="#cite_note-40"><span data-dcnode-id="6520" instrument_node="">[40]</span></a></sup></li><span data-dcnode-id="6516" instrument_node="">
</span><li data-dcnode-id="6505"><span data-dcnode-id="6515" instrument_node="">The planets of the Solar System and their moons were closely observed via numerous </span><a data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_probe" title="Space probe"><span data-dcnode-id="6514" instrument_node="">space probes</span></a><span data-dcnode-id="6512" instrument_node="">. </span><a data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pluto" title="Pluto"><span data-dcnode-id="6511" instrument_node="">Pluto</span></a><span data-dcnode-id="6509" instrument_node=""> was discovered in 1930 on the edge of the solar system, although in the early 21st century, it was reclassified as a </span><a data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwarf_planet" title="Dwarf planet"><span data-dcnode-id="6508" instrument_node="">dwarf planet</span></a><span data-dcnode-id="6506" instrument_node=""> instead of a planet proper, leaving eight planets.</span></li><span data-dcnode-id="6504" instrument_node="">
</span><li data-dcnode-id="6496"><span data-dcnode-id="6503" instrument_node="">No trace of </span><a data-dcnode-id="6501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life" title="Life"><span data-dcnode-id="6502" instrument_node="">life</span></a><span data-dcnode-id="6500" instrument_node=""> was discovered on any of the other planets in the Solar System (or elsewhere in the universe), although it remained undetermined whether some forms of primitive life might exist, or might have existed, somewhere. </span><a class="mw-redirect" data-dcnode-id="6498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extrasolar_planets" title="Extrasolar planets"><span data-dcnode-id="6499" instrument_node="">Extrasolar planets</span></a><span data-dcnode-id="6497" instrument_node=""> were observed for the first time.</span></li></ul><span data-dcnode-id="6494" instrument_node="">

ucing the age of antibiotics.</span></div></div></div><span data-dcnode-id="6346" instrument_node="">

u/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MMR_vaccine" title="MMR vaccine"><span data-dcnode-id="6298" instrument_node="">rubella (German measles)</span></a><span data-dcnode-id="6296" instrument_node="">, </span><a data-dcnode-id="6294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Varicella_vaccine" title="Varicella vaccine"><span data-dcnode-id="6295" instrument_node="">chickenpox</span></a><span data-dcnode-id="6293" instrument_node="">, </span><a data-dcnode-id="6291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hepatitis_A_vaccine" title="Hepatitis A vaccine"><span data-dcnode-id="6292" instrument_node="">hepatitis A</span></a><span data-dcnode-id="6290" instrument_node="">, and </span><a data-dcnode-id="6288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hepatitis_B_vaccine" title="Hepatitis B vaccine"><span data-dcnode-id="6289" instrument_node="">hepatitis B</span></a><span data-dcnode-id="6287" instrument_node="">.</span></li><span data-dcnode-id="6285" instrument_node="">
</span><li data-dcnode-id="6275"><a data-dcnode-id="6283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epidemiology" title="Epidemiology"><span data-dcnode-id="6284" instrument_node="">Epidemiology</span></a><span data-dcnode-id="6282" instrument_node=""> and </span><a data-dcnode-id="6280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vaccination" title="Vaccination"><span data-dcnode-id="6281" instrument_node="">vaccination</span></a><span data-dcnode-id="6279" instrument_node=""> led to the eradication of the </span><a data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smallpox" title="Smallpox"><span data-dcnode-id="6278" instrument_node="">smallpox</span></a><span data-dcnode-id="6276" instrument_node=""> virus in humans.</span></li><span data-dcnode-id="6274" instrument_node="">
</span><li data-dcnode-id="6261"><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray" title="X-ray"><span data-dcnode-id="6273" instrument_node="">X-rays</span></a><span data-dcnode-id="6271" instrument_node=""> became powerful diagnostic tool for wide spectrum of diseases, from bone fractures to cancer. In the 1960s, </span><a class="mw-redirect" data-dcnode-id="6269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computerized_tomography" title="Computerized tomography"><span data-dcnode-id="6270" instrument_node="">computerized tomography</span></a><span data-dcnode-id="6268" instrument_node=""> was invented. Other important diagnostic tools developed were </span><a class="mw-redirect" data-dcnode-id="6266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sonography" title="Sonography"><span data-dcnode-id="6267" instrument_node="">sonography</span></a><span data-dcnode-id="6265" instrument_node=""> and </span><a data-dcnode-id="6263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnetic_resonance_imaging" title="Magnetic resonance imaging"><span data-dcnode-id="6264" instrument_node="">magnetic resonance imaging</span></a><span data-dcnode-id="6262" instrument_node="">.</span></li><span data-dcnode-id="6260" instrument_node="">
</span><li data-dcnode-id="6252"><span data-dcnode-id="6259" instrument_node="">Development of </span><a class="mw-redirect" data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitamins" title="Vitamins"><span data-dcnode-id="6258" instrument_node="">vitamins</span></a><span data-dcnode-id="6256" instrument_node=""> virtually eliminated </span><a data-dcnode-id="6254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scurvy" title="Scurvy"><span data-dcnode-id="6255" instrument_node="">scurvy</span></a><span data-dcnode-id="6253" instrument_node=""> and other vitamin-deficiency diseases from industrialized societies.</span></li><span data-dcnode-id="6251" instrument_node="">
</span><li data-dcnode-id="6237"><span data-dcnode-id="6250" instrument_node="">New psychiatric drugs were developed. These include </span><a data-dcnode-id="6248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antipsychotic" title="Antipsychotic"><span data-dcnode-id="6249" instrument_node="">antipsychotics</span></a><span data-dcnode-id="6247" instrument_node=""> for treating </span><a data-dcnode-id="6245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hallucination" title="Hallucination"><span data-dcnode-id="6246" instrument_node="">hallucinations</span></a><span data-dcnode-id="6244" instrument_node=""> and </span><a data-dcnode-id="6242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delusion" title="Delusion"><span data-dcnode-id="6243" instrument_node="">delusions</span></a><span data-dcnode-id="6241" instrument_node="">, and </span><a data-dcnode-id="6239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antidepressant" title="Antidepressant"><span data-dcnode-id="6240" instrument_node="">antidepressants</span></a><span data-dcnode-id="6238" instrument_node=""> for treating depression.</span></li><span data-dcnode-id="6236" instrument_node="">
</span><li data-dcnode-id="6228"><span data-dcnode-id="6235" instrument_node="">The role of </span><a data-dcnode-id="6233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tobacco_smoking" title="Tobacco smoking"><span data-dcnode-id="6234" instrument_node="">tobacco smoking</span></a><span data-dcnode-id="6232" instrument_node=""> in the causation of cancer and other diseases was proven during the 1950s (see </span><a data-dcnode-id="6230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_Doctors_Study" title="British Doctors Study"><span data-dcnode-id="6231" instrument_node="">British Doctors Study</span></a><span data-dcnode-id="6229" instrument_node="">).</span></li><span data-dcnode-id="6227" instrument_node="">
</span><li data-dcnode-id="6210"><span data-dcnode-id="6226" instrument_node="">New methods for cancer treatment, including </span><a data-dcnode-id="6224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemotherapy" title="Chemotherapy"><span data-dcnode-id="6225" instrument_node="">chemotherapy</span></a><span data-dcnode-id="6223" instrument_node="">, </span><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiation_therapy" title="Radiation therapy"><span data-dcnode-id="6222" instrument_node="">radiation therapy</span></a><span data-dcnode-id="6220" instrument_node="">, and </span><a data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immunotherapy" title="Immunotherapy"><span data-dcnode-id="6219" instrument_node="">immunotherapy</span></a><span data-dcnode-id="6217" instrument_node="">, were developed. As a result, cancer could often be </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cure" title="Cure"><span data-dcnode-id="6216" instrument_node="">cured</span></a><span data-dcnode-id="6214" instrument_node=""> or placed in </span><a data-dcnode-id="6212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remission_%28medicine%29" title="Remission (medicine)"><span data-dcnode-id="6213" instrument_node="">remission</span></a><span data-dcnode-id="6211" instrument_node="">.</span></li><span data-dcnode-id="6209" instrument_node="">
</span><li data-dcnode-id="6198"><span data-dcnode-id="6208" instrument_node="">The development of </span><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_type" title="Blood type"><span data-dcnode-id="6207" instrument_node="">blood typing</span></a><span data-dcnode-id="6205" instrument_node=""> and </span><a data-dcnode-id="6203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_bank" title="Blood bank"><span data-dcnode-id="6204" instrument_node="">blood banking</span></a><span data-dcnode-id="6202" instrument_node=""> made </span><a data-dcnode-id="6200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blood_transfusion" title="Blood transfusion"><span data-dcnode-id="6201" instrument_node="">blood transfusion</span></a><span data-dcnode-id="6199" instrument_node=""> safe and widely available.</span></li><span data-dcnode-id="6197" instrument_node="">
</span><li data-dcnode-id="6183"><span data-dcnode-id="6196" instrument_node="">The </span><a data-dcnode-id="6194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invention" title="Invention"><span data-dcnode-id="6195" instrument_node="">invention</span></a><span data-dcnode-id="6193" instrument_node=""> and development of </span><a data-dcnode-id="6191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immunosuppressive_drug" title="Immunosuppressive drug"><span data-dcnode-id="6192" instrument_node="">immunosuppressive drugs</span></a><span data-dcnode-id="6190" instrument_node=""> and </span><a data-dcnode-id="6188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tissue_typing" title="Tissue typing"><span data-dcnode-id="6189" instrument_node="">tissue typing</span></a><span data-dcnode-id="6187" instrument_node=""> made </span><a class="mw-redirect" data-dcnode-id="6185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organ_transplant" title="Organ transplant"><span data-dcnode-id="6186" instrument_node="">organ and tissue transplantation</span></a><span data-dcnode-id="6184" instrument_node=""> a clinical reality.</span></li><span data-dcnode-id="6182" instrument_node="">
</span><li data-dcnode-id="6171"><span data-dcnode-id="6181" instrument_node="">New methods for </span><a class="mw-redirect" data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heart_surgery" title="Heart surgery"><span data-dcnode-id="6180" instrument_node="">heart surgery</span></a><span data-dcnode-id="6178" instrument_node=""> were developed, including </span><a class="mw-redirect" data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pacemaker" title="Pacemaker"><span data-dcnode-id="6177" instrument_node="">pacemakers</span></a><span data-dcnode-id="6175" instrument_node=""> and </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_heart" title="Artificial heart"><span data-dcnode-id="6174" instrument_node="">artificial hearts</span></a><span data-dcnode-id="6172" instrument_node="">.</span></li><span data-dcnode-id="6170" instrument_node="">
</span><li data-dcnode-id="6145"><a data-dcnode-id="6168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cocaine" title="Cocaine"><span data-dcnode-id="6169" instrument_node="">Cocaine</span></a><span data-dcnode-id="6167" instrument_node=""> and </span><a data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heroin" title="Heroin"><span data-dcnode-id="6166" instrument_node="">heroin</span></a><span data-dcnode-id="6164" instrument_node=""> were widely illegalized after being found to be addictive and destructive. </span><a data-dcnode-id="6162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychoactive_drug" title="Psychoactive drug"><span data-dcnode-id="6163" instrument_node="">Psychoactive drugs</span></a><span data-dcnode-id="6161" instrument_node=""> such as </span><a class="mw-redirect" data-dcnode-id="6159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LSD" title="LSD"><span data-dcnode-id="6160" instrument_node="">LSD</span></a><span data-dcnode-id="6158" instrument_node=""> and </span><a data-dcnode-id="6156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MDMA" title="MDMA"><span data-dcnode-id="6157" instrument_node="">MDMA</span></a><span data-dcnode-id="6155" instrument_node=""> were discovered and subsequently prohibited in many countries. </span><a data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prohibition_of_drugs" title="Prohibition of drugs"><span data-dcnode-id="6154" instrument_node="">Prohibition of drugs</span></a><span data-dcnode-id="6152" instrument_node=""> caused a growth in the black market drug industry, and </span><a data-dcnode-id="6150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_drugs" title="War on drugs"><span data-dcnode-id="6151" instrument_node="">expanded enforcement</span></a><span data-dcnode-id="6149" instrument_node=""> led to a larger prison population in some countries.</span><sup class="reference" data-dcnode-id="6146" id="cite_ref-43"><a data-dcnode-id="6147" href="#cite_note-43"><span data-dcnode-id="6148" instrument_node="">[43]</span></a></sup></li><span data-dcnode-id="6144" instrument_node="">
</span><li data-dcnode-id="6137"><a class="mw-redirect" data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contraceptive" title="Contraceptive"><span data-dcnode-id="6143" instrument_node="">Contraceptive</span></a><span data-dcnode-id="6141" instrument_node=""> drugs were developed, which reduced population growth rates in industrialized countries, as well as decreased the taboo of </span><a data-dcnode-id="6139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premarital_sex" title="Premarital sex"><span data-dcnode-id="6140" instrument_node="">premarital sex</span></a><span data-dcnode-id="6138" instrument_node=""> throughout many western countries.</span></li><span data-dcnode-id="6136" instrument_node="">
</span><li data-dcnode-id="6128"><span data-dcnode-id="6135" instrument_node="">The development of medical </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insulin" title="Insulin"><span data-dcnode-id="6134" instrument_node="">insulin</span></a><span data-dcnode-id="6132" instrument_node=""> during the 1920s helped raise the life expectancy of </span><a data-dcnode-id="6130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diabetes" title="Diabetes"><span data-dcnode-id="6131" instrument_node="">diabetics</span></a><span data-dcnode-id="6129" instrument_node=""> to three times of what it had been earlier.</span></li><span data-dcnode-id="6127" instrument_node="">
</span><li data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">Vaccines, hygiene and clean water improved health and decreased mortality rates, especially among infants and the young.</span></li></ul><span data-dcnode-id="6123" instrument_node="">
</span><h4 data-dcnode-id="6113"><span class="mw-headline" data-dcnode-id="6121" id="Notable_diseases"><span data-dcnode-id="6122" instrument_node="">Notable diseases</span></span><span class="mw-editsection" data-dcnode-id="6114"><span class="mw-editsection-bracket" data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">[</span></span><a data-dcnode-id="6117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D20" title="Edit section: Notable diseases"><span data-dcnode-id="6118" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6112" instrument_node="">
</span><ul data-dcnode-id="6062"><li data-dcnode-id="6104"><span data-dcnode-id="6111" instrument_node="">An </span><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Influenza" title="Influenza"><span data-dcnode-id="6110" instrument_node="">influenza</span></a><span data-dcnode-id="6108" instrument_node=""> pandemic, </span><a class="mw-redirect" data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1918_flu_pandemic" title="1918 flu pandemic"><span data-dcnode-id="6107" instrument_node="">Spanish Flu</span></a><span data-dcnode-id="6105" instrument_node="">, killed anywhere from 17 to 100 million people between 1918 and 1919.</span></li><span data-dcnode-id="6103" instrument_node="">
</span><li data-dcnode-id="6089"><span data-dcnode-id="6102" instrument_node="">A new </span><a data-dcnode-id="6100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virus" title="Virus"><span data-dcnode-id="6101" instrument_node="">viral</span></a><span data-dcnode-id="6099" instrument_node=""> disease, called the </span><a class="mw-redirect" data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_Immunodeficiency_Virus" title="Human Immunodeficiency Virus"><span data-dcnode-id="6098" instrument_node="">Human Immunodeficiency Virus</span></a><span data-dcnode-id="6096" instrument_node="">, or HIV, arose in Africa and subsequently killed millions of people throughout the world. HIV leads to a syndrome called </span><a class="mw-redirect" data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acquired_Immunodeficiency_Syndrome" title="Acquired Immunodeficiency Syndrome"><span data-dcnode-id="6095" instrument_node="">Acquired Immunodeficiency Syndrome</span></a><span data-dcnode-id="6093" instrument_node="">, or AIDS. Treatments for HIV remained inaccessible to many people living with AIDS and HIV in </span><a class="mw-redirect" data-dcnode-id="6091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developing_countries" title="Developing countries"><span data-dcnode-id="6092" instrument_node="">developing countries</span></a><span data-dcnode-id="6090" instrument_node="">, and a cure has yet to be discovered.</span></li><span data-dcnode-id="6088" instrument_node="">
</span><li data-dcnode-id="6071"><span data-dcnode-id="6087" instrument_node="">Because of increased </span><a data-dcnode-id="6085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_expectancy" title="Life expectancy"><span data-dcnode-id="6086" instrument_node="">life spans</span></a><span data-dcnode-id="6084" instrument_node="">, the </span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prevalence" title="Prevalence"><span data-dcnode-id="6083" instrument_node="">prevalence</span></a><span data-dcnode-id="6081" instrument_node=""> of cancer, </span><a data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alzheimer%2527s_disease" title="Alzheimer's disease"><span data-dcnode-id="6080" instrument_node="">Alzheimer's disease</span></a><span data-dcnode-id="6078" instrument_node="">, </span><a data-dcnode-id="6076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parkinson%2527s_disease" title="Parkinson's disease"><span data-dcnode-id="6077" instrument_node="">Parkinson's disease</span></a><span data-dcnode-id="6075" instrument_node="">, and other diseases of </span><a data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_age" title="Old age"><span data-dcnode-id="6074" instrument_node="">old age</span></a><span data-dcnode-id="6072" instrument_node=""> increased slightly.</span></li><span data-dcnode-id="6070" instrument_node="">
</span><li data-dcnode-id="6063"><a data-dcnode-id="6068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sedentary_lifestyle" title="Sedentary lifestyle"><span data-dcnode-id="6069" instrument_node="">Sedentary lifestyles</span></a><span data-dcnode-id="6067" instrument_node="">, due to labor-saving devices and technology, along with the increase in home entertainment and technology such as television, video games, and the internet contributed to an "epidemic" of </span><a data-dcnode-id="6065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Obesity" title="Obesity"><span data-dcnode-id="6066" instrument_node="">obesity</span></a><span data-dcnode-id="6064" instrument_node="">, at first in the rich countries, but by the end of the 20th century spreading to the developing world.</span></li></ul><span data-dcnode-id="6061" instrument_node="">
</span><h3 data-dcnode-id="6051"><span class="mw-headline" data-dcnode-id="6059" id="Energy_and_the_environment"><span data-dcnode-id="6060" instrument_node="">Energy and the environment</span></span><span class="mw-editsection" data-dcnode-id="6052"><span class="mw-editsection-bracket" data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">[</span></span><a data-dcnode-id="6055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D21" title="Edit section: Energy and the environment"><span data-dcnode-id="6056" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6053"><span data-dcnode-id="6054" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6050" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6033"><div class="thumbinner" data-dcnode-id="6034" style="width:222px;"><a class="image" data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOilfields_California.jpg"><img alt="" class="thumbimage" data-dcnode-id="6049" data-file-height="7009" data-file-width="9126" decoding="async" height="169" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/66/Oilfields_California.jpg/220px-Oilfields_California.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/66/Oilfields_California.jpg/330px-Oilfields_California.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/66/Oilfields_California.jpg/440px-Oilfields_California.jpg 2x" width="220"></a><span data-dcnode-id="6047" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6035"><div class="magnify" data-dcnode-id="6045"><a class="internal" data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOilfields_California.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oil_field" title="Oil field"><span data-dcnode-id="6044" instrument_node="">Oil field</span></a><span data-dcnode-id="6042" instrument_node=""> in California, 1938.  The first modern oil well was drilled in 1848 by Russian engineer F.N. Semyonov, on the </span><a class="mw-redirect" data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apsheron_Peninsula" title="Apsheron Peninsula"><span data-dcnode-id="6041" instrument_node="">Apsheron Peninsula</span></a><span data-dcnode-id="6039" instrument_node=""> north-east of </span><a data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baku" title="Baku"><span data-dcnode-id="6038" instrument_node="">Baku</span></a><span data-dcnode-id="6036" instrument_node="">.</span></div></div></div><span data-dcnode-id="6032" instrument_node="">
</span><ul data-dcnode-id="5959"><li data-dcnode-id="6024"><span data-dcnode-id="6031" instrument_node="">The dominant use of </span><a class="mw-redirect" data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_source" title="Fossil source"><span data-dcnode-id="6030" instrument_node="">fossil sources</span></a><span data-dcnode-id="6028" instrument_node=""> and </span><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_power" title="Nuclear power"><span data-dcnode-id="6027" instrument_node="">nuclear power</span></a><span data-dcnode-id="6025" instrument_node="">, considered the conventional energy sources.</span></li><span data-dcnode-id="6023" instrument_node="">
</span><li data-dcnode-id="6012"><span data-dcnode-id="6022" instrument_node="">Widespread use of petroleum in industry—both as a chemical precursor to plastics and as a fuel for the automobile and </span><a data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Airplane" title="Airplane"><span data-dcnode-id="6021" instrument_node="">airplane</span></a><span data-dcnode-id="6019" instrument_node="">—led to the geopolitical importance of petroleum resources. The Middle East, home to many of the world's oil deposits, became a center of geopolitical and military tension throughout the latter half of the century. (For example, oil was a factor in Japan's decision to go to war against the United States in 1941, and the oil cartel, </span><a data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OPEC" title="OPEC"><span data-dcnode-id="6018" instrument_node="">OPEC</span></a><span data-dcnode-id="6016" instrument_node="">, used an oil embargo of sorts in the wake of the </span><a data-dcnode-id="6014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yom_Kippur_War" title="Yom Kippur War"><span data-dcnode-id="6015" instrument_node="">Yom Kippur War</span></a><span data-dcnode-id="6013" instrument_node=""> in the 1970s).</span></li><span data-dcnode-id="6011" instrument_node="">
</span><li data-dcnode-id="6000"><span data-dcnode-id="6010" instrument_node="">The increase in </span><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fossil_fuel" title="Fossil fuel"><span data-dcnode-id="6009" instrument_node="">fossil fuel</span></a><span data-dcnode-id="6007" instrument_node=""> consumption also fueled a major scientific controversy over its effect on air pollution, </span><a class="mw-redirect" data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="6006" instrument_node="">global warming</span></a><span data-dcnode-id="6004" instrument_node="">, and global </span><a data-dcnode-id="6002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="6003" instrument_node="">climate change</span></a><span data-dcnode-id="6001" instrument_node="">.</span></li><span data-dcnode-id="5999" instrument_node="">
</span><li data-dcnode-id="5986"><a data-dcnode-id="5997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pesticide" title="Pesticide"><span data-dcnode-id="5998" instrument_node="">Pesticides</span></a><span data-dcnode-id="5996" instrument_node="">, </span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbicide" title="Herbicide"><span data-dcnode-id="5995" instrument_node="">herbicides</span></a><span data-dcnode-id="5993" instrument_node=""> and other </span><a data-dcnode-id="5991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Toxicity" title="Toxicity"><span data-dcnode-id="5992" instrument_node="">toxic</span></a><span data-dcnode-id="5990" instrument_node=""> </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_substance" title="Chemical substance"><span data-dcnode-id="5989" instrument_node="">chemicals</span></a><span data-dcnode-id="5987" instrument_node=""> accumulated in the environment, including in the bodies of humans and other animals.</span></li><span data-dcnode-id="5985" instrument_node="">
</span><li data-dcnode-id="5975"><a data-dcnode-id="5983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Population_growth" title="Population growth"><span data-dcnode-id="5984" instrument_node="">Population growth</span></a><span data-dcnode-id="5982" instrument_node=""> and worldwide </span><a data-dcnode-id="5980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deforestation" title="Deforestation"><span data-dcnode-id="5981" instrument_node="">deforestation</span></a><span data-dcnode-id="5979" instrument_node=""> diminished the </span><a data-dcnode-id="5977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_quality" title="Environmental quality"><span data-dcnode-id="5978" instrument_node="">quality of the environment</span></a><span data-dcnode-id="5976" instrument_node="">.</span></li><span data-dcnode-id="5974" instrument_node="">
</span><li data-dcnode-id="5960"><span data-dcnode-id="5973" instrument_node="">In the last third of the century, concern about humankind's impact on the Earth's </span><a class="mw-redirect" data-dcnode-id="5971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environment_%28biophysical%29" title="Environment (biophysical)"><span data-dcnode-id="5972" instrument_node="">environment</span></a><span data-dcnode-id="5970" instrument_node=""> made </span><a data-dcnode-id="5968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmentalism" title="Environmentalism"><span data-dcnode-id="5969" instrument_node="">environmentalism</span></a><span data-dcnode-id="5967" instrument_node=""> popular. In many countries, especially in Europe, the movement was channeled into politics through </span><a data-dcnode-id="5965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_party" title="Green party"><span data-dcnode-id="5966" instrument_node="">Green parties</span></a><span data-dcnode-id="5964" instrument_node="">. Increasing awareness of </span><a class="mw-redirect" data-dcnode-id="5962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="5963" instrument_node="">global warming</span></a><span data-dcnode-id="5961" instrument_node=""> began in the 1980s, commencing decades of social and political debate.</span></li></ul><span data-dcnode-id="5958" instrument_node="">
</span><h2 data-dcnode-id="5948"><span class="mw-headline" data-dcnode-id="5956" id="Engineering_and_technology"><span data-dcnode-id="5957" instrument_node="">Engineering and technology</span></span><span class="mw-editsection" data-dcnode-id="5949"><span class="mw-editsection-bracket" data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">[</span></span><a data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D22" title="Edit section: Engineering and technology"><span data-dcnode-id="5953" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5947" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5928"><div class="thumbinner" data-dcnode-id="5929" style="width:222px;"><a class="image" data-dcnode-id="5945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFirst_flight2.jpg"><img alt="" class="thumbimage" data-dcnode-id="5946" data-file-height="4280" data-file-width="6603" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/86/First_flight2.jpg/220px-First_flight2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/86/First_flight2.jpg/330px-First_flight2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/86/First_flight2.jpg/440px-First_flight2.jpg 2x" width="220"></a><span data-dcnode-id="5944" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5930"><div class="magnify" data-dcnode-id="5942"><a class="internal" data-dcnode-id="5943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFirst_flight2.jpg" title="Enlarge"></a></div><span data-dcnode-id="5941" instrument_node="">First flight of the </span><a data-dcnode-id="5939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wright_brothers" title="Wright brothers"><span data-dcnode-id="5940" instrument_node="">Wright brothers</span></a><span data-dcnode-id="5938" instrument_node="">' </span><i data-dcnode-id="5935"><a data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wright_Flyer" title="Wright Flyer"><span data-dcnode-id="5937" instrument_node="">Wright Flyer</span></a></i><span data-dcnode-id="5934" instrument_node=""> on December 17, 1903, in </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kitty_Hawk%2C_North_Carolina" title="Kitty Hawk, North Carolina"><span data-dcnode-id="5933" instrument_node="">Kitty Hawk, North Carolina</span></a><span data-dcnode-id="5931" instrument_node="">; Orville piloting with Wilbur running at wingtip.</span></div></div></div><span data-dcnode-id="5927" instrument_node="">
</span><p data-dcnode-id="5925"><span data-dcnode-id="5926" instrument_node="">One of the prominent traits of the 20th century was the dramatic growth of technology. Organized research and practice of science led to advancement in the fields of communication, electronics, engineering, travel, medicine, and war.
</span></p><span data-dcnode-id="5924" instrument_node="">
</span><ul data-dcnode-id="5822"><li data-dcnode-id="5895"><span data-dcnode-id="5923" instrument_node="">Basic </span><a data-dcnode-id="5921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_appliance" title="Home appliance"><span data-dcnode-id="5922" instrument_node="">home appliances</span></a><span data-dcnode-id="5920" instrument_node=""> including </span><a data-dcnode-id="5918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washing_machine" title="Washing machine"><span data-dcnode-id="5919" instrument_node="">washing machines</span></a><span data-dcnode-id="5917" instrument_node="">, </span><a data-dcnode-id="5915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clothes_dryer" title="Clothes dryer"><span data-dcnode-id="5916" instrument_node="">clothes dryers</span></a><span data-dcnode-id="5914" instrument_node="">, furnaces, </span><a data-dcnode-id="5912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exercise_machine" title="Exercise machine"><span data-dcnode-id="5913" instrument_node="">exercise machines</span></a><span data-dcnode-id="5911" instrument_node="">, </span><a data-dcnode-id="5909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refrigerator" title="Refrigerator"><span data-dcnode-id="5910" instrument_node="">refrigerators</span></a><span data-dcnode-id="5908" instrument_node="">, freezers, </span><a data-dcnode-id="5906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electric_stove" title="Electric stove"><span data-dcnode-id="5907" instrument_node="">electric stoves</span></a><span data-dcnode-id="5905" instrument_node=""> and </span><a data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vacuum_cleaner" title="Vacuum cleaner"><span data-dcnode-id="5904" instrument_node="">vacuum cleaners</span></a><span data-dcnode-id="5902" instrument_node=""> became popular from the 1920s through the 1950s. </span><a data-dcnode-id="5900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio" title="Radio"><span data-dcnode-id="5901" instrument_node="">Radios</span></a><span data-dcnode-id="5899" instrument_node=""> were popularized as a form of entertainment during the 1920s, which extended to </span><a data-dcnode-id="5897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television" title="Television"><span data-dcnode-id="5898" instrument_node="">television</span></a><span data-dcnode-id="5896" instrument_node=""> during the 1950s.</span></li><span data-dcnode-id="5894" instrument_node="">
</span><li data-dcnode-id="5882"><span data-dcnode-id="5893" instrument_node="">The first airplane, the </span><i data-dcnode-id="5890"><a data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wright_Flyer" title="Wright Flyer"><span data-dcnode-id="5892" instrument_node="">Wright Flyer</span></a></i><span data-dcnode-id="5889" instrument_node="">, was flown in 1903. With the engineering of the faster </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jet_engine" title="Jet engine"><span data-dcnode-id="5888" instrument_node="">jet engine</span></a><span data-dcnode-id="5886" instrument_node=""> in the 1940s, mass </span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_travel" title="Air travel"><span data-dcnode-id="5885" instrument_node="">air travel</span></a><span data-dcnode-id="5883" instrument_node=""> became commercially viable.</span></li><span data-dcnode-id="5881" instrument_node="">
</span><li data-dcnode-id="5870"><span data-dcnode-id="5880" instrument_node="">The </span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assembly_line" title="Assembly line"><span data-dcnode-id="5879" instrument_node="">assembly line</span></a><span data-dcnode-id="5877" instrument_node=""> made mass production of the automobile viable. By the end of the 20th century, billions of people had automobiles for personal transportation. The combination of the automobile, </span><a class="mw-redirect" data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motor_boat" title="Motor boat"><span data-dcnode-id="5876" instrument_node="">motor boats</span></a><span data-dcnode-id="5874" instrument_node=""> and air travel allowed for unprecedented personal mobility. In western nations, motor vehicle accidents became the greatest cause of death for young people. However, expansion of </span><a class="mw-redirect" data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divided_highway" title="Divided highway"><span data-dcnode-id="5873" instrument_node="">divided highways</span></a><span data-dcnode-id="5871" instrument_node=""> reduced the death rate.</span></li><span data-dcnode-id="5869" instrument_node="">
</span><li data-dcnode-id="5864"><span data-dcnode-id="5868" instrument_node="">The </span><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triode" title="Triode"><span data-dcnode-id="5867" instrument_node="">triode tube</span></a><span data-dcnode-id="5865" instrument_node=""> was invented.</span></li><span data-dcnode-id="5863" instrument_node="">
</span><li data-dcnode-id="5834"><span data-dcnode-id="5862" instrument_node="">New materials, most notably </span><a data-dcnode-id="5860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stainless_steel" title="Stainless steel"><span data-dcnode-id="5861" instrument_node="">stainless steel</span></a><span data-dcnode-id="5859" instrument_node="">, </span><a data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Velcro" title="Velcro"><span data-dcnode-id="5858" instrument_node="">Velcro</span></a><span data-dcnode-id="5856" instrument_node="">, </span><a data-dcnode-id="5854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicone" title="Silicone"><span data-dcnode-id="5855" instrument_node="">silicone</span></a><span data-dcnode-id="5853" instrument_node="">, </span><a data-dcnode-id="5851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytetrafluoroethylene" title="Polytetrafluoroethylene"><span data-dcnode-id="5852" instrument_node="">teflon</span></a><span data-dcnode-id="5850" instrument_node="">, and </span><a data-dcnode-id="5848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plastic" title="Plastic"><span data-dcnode-id="5849" instrument_node="">plastics</span></a><span data-dcnode-id="5847" instrument_node=""> such as </span><a data-dcnode-id="5845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polystyrene" title="Polystyrene"><span data-dcnode-id="5846" instrument_node="">polystyrene</span></a><span data-dcnode-id="5844" instrument_node="">, </span><a data-dcnode-id="5842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyvinyl_chloride" title="Polyvinyl chloride"><span data-dcnode-id="5843" instrument_node="">PVC</span></a><span data-dcnode-id="5841" instrument_node="">, </span><a data-dcnode-id="5839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polyethylene" title="Polyethylene"><span data-dcnode-id="5840" instrument_node="">polyethylene</span></a><span data-dcnode-id="5838" instrument_node="">, and </span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nylon" title="Nylon"><span data-dcnode-id="5837" instrument_node="">nylon</span></a><span data-dcnode-id="5835" instrument_node=""> came into widespread use for many various applications. These materials typically have tremendous performance gains in strength, temperature, chemical resistance, or mechanical properties over those known prior to the 20th century.</span></li><span data-dcnode-id="5833" instrument_node="">
</span><li data-dcnode-id="5829"><a class="mw-redirect" data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluminum" title="Aluminum"><span data-dcnode-id="5832" instrument_node="">Aluminum</span></a><span data-dcnode-id="5830" instrument_node=""> became an inexpensive metal and became second only to iron in use.</span></li><span data-dcnode-id="5828" instrument_node="">
</span><li data-dcnode-id="5823"><span data-dcnode-id="5827" instrument_node="">Thousands of </span><a class="mw-redirect" data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical" title="Chemical"><span data-dcnode-id="5826" instrument_node="">chemicals</span></a><span data-dcnode-id="5824" instrument_node=""> were developed for industrial processing and home use.</span></li></ul><span data-dcnode-id="5821" instrument_node="">
</span><h3 data-dcnode-id="5811"><span class="mw-headline" data-dcnode-id="5819" id="Space_exploration"><span data-dcnode-id="5820" instrument_node="">Space exploration</span></span><span class="mw-editsection" data-dcnode-id="5812"><span class="mw-editsection-bracket" data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">[</span></span><a data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D23" title="Edit section: Space exploration"><span data-dcnode-id="5816" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5810" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5789"><div class="thumbinner" data-dcnode-id="5790" style="width:222px;"><a class="image" data-dcnode-id="5808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABuzz_salutes_the_U.S._Flag.jpg"><img alt="" class="thumbimage" data-dcnode-id="5809" data-file-height="3967" data-file-width="3929" decoding="async" height="222" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Buzz_salutes_the_U.S._Flag.jpg/220px-Buzz_salutes_the_U.S._Flag.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Buzz_salutes_the_U.S._Flag.jpg/330px-Buzz_salutes_the_U.S._Flag.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Buzz_salutes_the_U.S._Flag.jpg/440px-Buzz_salutes_the_U.S._Flag.jpg 2x" width="220"></a><span data-dcnode-id="5807" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5791"><div class="magnify" data-dcnode-id="5805"><a class="internal" data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABuzz_salutes_the_U.S._Flag.jpg" title="Enlarge"></a></div><span data-dcnode-id="5804" instrument_node="">Photo of American astronaut </span><a data-dcnode-id="5802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Buzz_Aldrin" title="Buzz Aldrin"><span data-dcnode-id="5803" instrument_node="">Buzz Aldrin</span></a><span data-dcnode-id="5801" instrument_node=""> during the </span><a data-dcnode-id="5799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollo_11" title="Apollo 11"><span data-dcnode-id="5800" instrument_node="">first moonwalk</span></a><span data-dcnode-id="5798" instrument_node=""> in 1969, taken by </span><a data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Armstrong" title="Neil Armstrong"><span data-dcnode-id="5797" instrument_node="">Neil Armstrong</span></a><span data-dcnode-id="5795" instrument_node="">. The relatively young </span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerospace_engineering" title="Aerospace engineering"><span data-dcnode-id="5794" instrument_node="">aerospace engineering</span></a><span data-dcnode-id="5792" instrument_node=""> industries rapidly grew in the 66 years after the Wright brothers' first flight.</span></div></div></div><span data-dcnode-id="5788" instrument_node="">
</span><ul data-dcnode-id="5710"><li data-dcnode-id="5753"><span data-dcnode-id="5787" instrument_node="">The </span><a data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Race" title="Space Race"><span data-dcnode-id="5786" instrument_node="">Space Race</span></a><span data-dcnode-id="5784" instrument_node=""> between the United States and the </span><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5783" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5781" instrument_node=""> gave a peaceful outlet to the political and military tensions of the </span><a data-dcnode-id="5779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="5780" instrument_node="">Cold War</span></a><span data-dcnode-id="5778" instrument_node="">, leading to the first </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_spaceflight" title="Human spaceflight"><span data-dcnode-id="5777" instrument_node="">human spaceflight</span></a><span data-dcnode-id="5775" instrument_node=""> with the Soviet Union's </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vostok_1" title="Vostok 1"><span data-dcnode-id="5774" instrument_node="">Vostok 1</span></a><span data-dcnode-id="5772" instrument_node=""> mission in 1961, and man's first landing on another world—the </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="5771" instrument_node="">Moon</span></a><span data-dcnode-id="5769" instrument_node="">—with America's </span><a data-dcnode-id="5767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apollo_11" title="Apollo 11"><span data-dcnode-id="5768" instrument_node="">Apollo 11</span></a><span data-dcnode-id="5766" instrument_node=""> mission in 1969. Later, the first </span><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_station" title="Space station"><span data-dcnode-id="5765" instrument_node="">space station</span></a><span data-dcnode-id="5763" instrument_node=""> was launched by the </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_space_program" title="Soviet space program"><span data-dcnode-id="5762" instrument_node="">Soviet space program</span></a><span data-dcnode-id="5760" instrument_node="">. The United States developed the first reusable spacecraft system with the </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Shuttle_program" title="Space Shuttle program"><span data-dcnode-id="5759" instrument_node="">Space Shuttle program</span></a><span data-dcnode-id="5757" instrument_node="">, first launched in 1981. As the century ended, a permanent manned presence in space was being founded with the ongoing construction of the </span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Space_Station" title="International Space Station"><span data-dcnode-id="5756" instrument_node="">International Space Station</span></a><span data-dcnode-id="5754" instrument_node="">.</span></li><span data-dcnode-id="5752" instrument_node="">
</span><li data-dcnode-id="5720"><span data-dcnode-id="5751" instrument_node="">In addition to human spaceflight, unmanned space probes became a practical and relatively inexpensive form of exploration. The first orbiting space probe, </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sputnik_1" title="Sputnik 1"><span data-dcnode-id="5750" instrument_node="">Sputnik 1</span></a><span data-dcnode-id="5748" instrument_node="">, was launched by the </span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5747" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5745" instrument_node=""> in 1957. Over time, a massive system of artificial satellites was placed into orbit around Earth. These satellites greatly advanced navigation, communications, military intelligence, geology, climate, and numerous other fields. Also, by the end of the 20th century, unmanned probes had visited the Moon, </span><a data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercury_%28planet%29" title="Mercury (planet)"><span data-dcnode-id="5744" instrument_node="">Mercury</span></a><span data-dcnode-id="5742" instrument_node="">, </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus" title="Venus"><span data-dcnode-id="5741" instrument_node="">Venus</span></a><span data-dcnode-id="5739" instrument_node="">, </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mars" title="Mars"><span data-dcnode-id="5738" instrument_node="">Mars</span></a><span data-dcnode-id="5736" instrument_node="">, </span><a data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jupiter" title="Jupiter"><span data-dcnode-id="5735" instrument_node="">Jupiter</span></a><span data-dcnode-id="5733" instrument_node="">, </span><a data-dcnode-id="5731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saturn" title="Saturn"><span data-dcnode-id="5732" instrument_node="">Saturn</span></a><span data-dcnode-id="5730" instrument_node="">, </span><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uranus" title="Uranus"><span data-dcnode-id="5729" instrument_node="">Uranus</span></a><span data-dcnode-id="5727" instrument_node="">, </span><a data-dcnode-id="5725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neptune" title="Neptune"><span data-dcnode-id="5726" instrument_node="">Neptune</span></a><span data-dcnode-id="5724" instrument_node="">, and various asteroids and comets. The </span><a data-dcnode-id="5722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_Space_Telescope" title="Hubble Space Telescope"><span data-dcnode-id="5723" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="5721" instrument_node="">, launched in 1990, greatly expanded our understanding of the Universe and brought brilliant images to TV and computer screens around the world.</span></li><span data-dcnode-id="5719" instrument_node="">
</span><li data-dcnode-id="5711"><span data-dcnode-id="5718" instrument_node="">The </span><a data-dcnode-id="5716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Positioning_System" title="Global Positioning System"><span data-dcnode-id="5717" instrument_node="">Global Positioning System</span></a><span data-dcnode-id="5715" instrument_node="">, a series of satellites that allow land-based receivers to determine their exact location, was developed and deployed.</span><sup class="reference" data-dcnode-id="5712" id="cite_ref-44"><a data-dcnode-id="5713" href="#cite_note-44"><span data-dcnode-id="5714" instrument_node="">[44]</span></a></sup></li></ul><span data-dcnode-id="5709" instrument_node="">
</span><h3 data-dcnode-id="5699"><span class="mw-headline" data-dcnode-id="5707" id="Digital_revolution"><span data-dcnode-id="5708" instrument_node="">Digital revolution</span></span><span class="mw-editsection" data-dcnode-id="5700"><span class="mw-editsection-bracket" data-dcnode-id="5705"><span data-dcnode-id="5706" instrument_node="">[</span></span><a data-dcnode-id="5703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D20th_century%26action%3Dedit%26section%3D24" title="Edit section: Digital revolution"><span data-dcnode-id="5704" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5698" instrument_node="">
