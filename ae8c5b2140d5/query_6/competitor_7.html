</span><div class="thumb tright" data-dcnode-id="5668"><div class="thumbinner" data-dcnode-id="5669" style="width:222px;"><a class="image" data-dcnode-id="5696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMOSFET_Structure.png"><img alt="" class="thumbimage" data-dcnode-id="5697" data-file-height="408" data-file-width="613" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a5/MOSFET_Structure.png/220px-MOSFET_Structure.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a5/MOSFET_Structure.png/330px-MOSFET_Structure.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a5/MOSFET_Structure.png/440px-MOSFET_Structure.png 2x" width="220"></a><span data-dcnode-id="5695" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5670"><div class="magnify" data-dcnode-id="5693"><a class="internal" data-dcnode-id="5694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMOSFET_Structure.png" title="Enlarge"></a></div><span data-dcnode-id="5692" instrument_node="">The </span><a data-dcnode-id="5690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOSFET" title="MOSFET"><span data-dcnode-id="5691" instrument_node="">MOSFET</span></a><span data-dcnode-id="5689" instrument_node=""> (MOS transistor) is central to the </span><a data-dcnode-id="5687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_Revolution" title="Digital Revolution"><span data-dcnode-id="5688" instrument_node="">Digital Revolution</span></a><span data-dcnode-id="5686" instrument_node="">, and the </span><a class="mw-redirect" data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_best-selling_electronic_devices" title="List of best-selling electronic devices"><span data-dcnode-id="5685" instrument_node="">most widely manufactured device</span></a><span data-dcnode-id="5683" instrument_node=""> in history. It was invented by </span><a class="mw-redirect" data-dcnode-id="5681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohamed_Atalla" title="Mohamed Atalla"><span data-dcnode-id="5682" instrument_node="">Mohamed Atalla</span></a><span data-dcnode-id="5680" instrument_node=""> and </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawon_Kahng" title="Dawon Kahng"><span data-dcnode-id="5679" instrument_node="">Dawon Kahng</span></a><span data-dcnode-id="5677" instrument_node=""> at </span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bell_Labs" title="Bell Labs"><span data-dcnode-id="5676" instrument_node="">Bell Labs</span></a><span data-dcnode-id="5674" instrument_node=""> in </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/November_1959" title="November 1959"><span data-dcnode-id="5673" instrument_node="">November 1959</span></a><span data-dcnode-id="5671" instrument_node="">.</span></div></div></div><span data-dcnode-id="5667" instrument_node="">
</span><p data-dcnode-id="5598"><span data-dcnode-id="5666" instrument_node="">A technological revolution began in the late 20th century, variously called the </span><a data-dcnode-id="5664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_Revolution" title="Digital Revolution"><span data-dcnode-id="5665" instrument_node="">Digital Revolution</span></a><span data-dcnode-id="5663" instrument_node="">, the </span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_revolution" title="Information revolution"><span data-dcnode-id="5662" instrument_node="">information revolution</span></a><span data-dcnode-id="5660" instrument_node="">,</span><sup class="reference" data-dcnode-id="5657" id="cite_ref-triumph_45-0"><a data-dcnode-id="5658" href="#cite_note-triumph-45"><span data-dcnode-id="5659" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="5654" id="cite_ref-Raymer_46-0"><a data-dcnode-id="5655" href="#cite_note-Raymer-46"><span data-dcnode-id="5656" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="5651" id="cite_ref-Wong_47-0"><a data-dcnode-id="5652" href="#cite_note-Wong-47"><span data-dcnode-id="5653" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5650" instrument_node=""> the </span><a data-dcnode-id="5648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronics" title="Electronics"><span data-dcnode-id="5649" instrument_node="">electronics</span></a><span data-dcnode-id="5647" instrument_node=""> revolution,</span><sup class="reference" data-dcnode-id="5644" id="cite_ref-48"><a data-dcnode-id="5645" href="#cite_note-48"><span data-dcnode-id="5646" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5643" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microelectronic" title="Microelectronic"><span data-dcnode-id="5642" instrument_node="">microelectronic</span></a><span data-dcnode-id="5640" instrument_node=""> revolution,</span><sup class="reference" data-dcnode-id="5637" id="cite_ref-Zimbovskaya_49-0"><a data-dcnode-id="5638" href="#cite_note-Zimbovskaya-49"><span data-dcnode-id="5639" instrument_node="">[49]</span></a></sup><span data-dcnode-id="5636" instrument_node=""> the </span><a data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_Age" title="Information Age"><span data-dcnode-id="5635" instrument_node="">Information Age</span></a><span data-dcnode-id="5633" instrument_node="">,</span><sup class="reference" data-dcnode-id="5630" id="cite_ref-Manuel_50-0"><a data-dcnode-id="5631" href="#cite_note-Manuel-50"><span data-dcnode-id="5632" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5629" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon_revolution" title="Silicon revolution"><span data-dcnode-id="5628" instrument_node="">silicon revolution</span></a><span data-dcnode-id="5626" instrument_node="">,</span><sup class="reference" data-dcnode-id="5623" id="cite_ref-Feldman_51-0"><a data-dcnode-id="5624" href="#cite_note-Feldman-51"><span data-dcnode-id="5625" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5620" id="cite_ref-Dabrowski_52-0"><a data-dcnode-id="5621" href="#cite_note-Dabrowski-52"><span data-dcnode-id="5622" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5619" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon_Age" title="Silicon Age"><span data-dcnode-id="5618" instrument_node="">Silicon Age</span></a><span data-dcnode-id="5616" instrument_node="">,</span><sup class="reference" data-dcnode-id="5613" id="cite_ref-Feldman_51-1"><a data-dcnode-id="5614" href="#cite_note-Feldman-51"><span data-dcnode-id="5615" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5610" id="cite_ref-Dabrowski_52-1"><a data-dcnode-id="5611" href="#cite_note-Dabrowski-52"><span data-dcnode-id="5612" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="5607" id="cite_ref-Siffert_53-0"><a data-dcnode-id="5608" href="#cite_note-Siffert-53"><span data-dcnode-id="5609" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5606" instrument_node=""> and/or the </span><a class="mw-redirect" data-dcnode-id="5604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_industrial_revolution" title="Third industrial revolution"><span data-dcnode-id="5605" instrument_node="">third industrial revolution</span></a><span data-dcnode-id="5603" instrument_node="">.</span><sup class="reference" data-dcnode-id="5600" id="cite_ref-54"><a data-dcnode-id="5601" href="#cite_note-54"><span data-dcnode-id="5602" instrument_node="">[54]</span></a></sup><span data-dcnode-id="5599" instrument_node="">
</span></p><span data-dcnode-id="5597" instrument_node="">
</span><ul data-dcnode-id="5221"><li data-dcnode-id="5570"><span data-dcnode-id="5596" instrument_node="">The first </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transistor" title="Transistor"><span data-dcnode-id="5595" instrument_node="">transistor</span></a><span data-dcnode-id="5593" instrument_node=""> was invented by </span><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Bardeen" title="John Bardeen"><span data-dcnode-id="5592" instrument_node="">John Bardeen</span></a><span data-dcnode-id="5590" instrument_node=""> and </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Walter_Houser_Brattain" title="Walter Houser Brattain"><span data-dcnode-id="5589" instrument_node="">Walter Houser Brattain</span></a><span data-dcnode-id="5587" instrument_node=""> at </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bell_Labs" title="Bell Labs"><span data-dcnode-id="5586" instrument_node="">Bell Labs</span></a><span data-dcnode-id="5584" instrument_node=""> in 1947.</span><sup class="reference" data-dcnode-id="5581" id="cite_ref-Manuel_50-1"><a data-dcnode-id="5582" href="#cite_note-Manuel-50"><span data-dcnode-id="5583" instrument_node="">[50]</span></a></sup><span data-dcnode-id="5580" instrument_node=""> However, early </span><a class="mw-redirect" data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Junction_transistor" title="Junction transistor"><span data-dcnode-id="5579" instrument_node="">junction transistors</span></a><span data-dcnode-id="5577" instrument_node=""> were relatively bulky devices that were difficult to manufacture on a </span><a class="mw-redirect" data-dcnode-id="5575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass-production" title="Mass-production"><span data-dcnode-id="5576" instrument_node="">mass-production</span></a><span data-dcnode-id="5574" instrument_node=""> basis, which limited them to a number of specialised applications.</span><sup class="reference" data-dcnode-id="5571" id="cite_ref-Moskowitz_55-0"><a data-dcnode-id="5572" href="#cite_note-Moskowitz-55"><span data-dcnode-id="5573" instrument_node="">[55]</span></a></sup></li><span data-dcnode-id="5569" instrument_node="">
</span><li data-dcnode-id="5504"><span data-dcnode-id="5568" instrument_node="">The </span><a data-dcnode-id="5566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOSFET" title="MOSFET"><span data-dcnode-id="5567" instrument_node="">MOSFET</span></a><span data-dcnode-id="5565" instrument_node=""> (metal-oxide-silicon field-effect transistor), also known as the MOS transistor, was invented by </span><a data-dcnode-id="5563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohamed_M._Atalla" title="Mohamed M. Atalla"><span data-dcnode-id="5564" instrument_node="">Mohamed M. Atalla</span></a><span data-dcnode-id="5562" instrument_node=""> and </span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawon_Kahng" title="Dawon Kahng"><span data-dcnode-id="5561" instrument_node="">Dawon Kahng</span></a><span data-dcnode-id="5559" instrument_node=""> at Bell Labs,</span><sup class="reference" data-dcnode-id="5556" id="cite_ref-computerhistory_56-0"><a data-dcnode-id="5557" href="#cite_note-computerhistory-56"><span data-dcnode-id="5558" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="5553" id="cite_ref-Lojek_57-0"><a data-dcnode-id="5554" href="#cite_note-Lojek-57"><span data-dcnode-id="5555" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="5550" id="cite_ref-computerhistory-transistor_58-0"><a data-dcnode-id="5551" href="#cite_note-computerhistory-transistor-58"><span data-dcnode-id="5552" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="5547" id="cite_ref-triumph_45-1"><a data-dcnode-id="5548" href="#cite_note-triumph-45"><span data-dcnode-id="5549" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5546" instrument_node=""> in </span><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/November_1959" title="November 1959"><span data-dcnode-id="5545" instrument_node="">November 1959</span></a><span data-dcnode-id="5543" instrument_node="">.</span><sup class="reference" data-dcnode-id="5540" id="cite_ref-Bassett22_59-0"><a data-dcnode-id="5541" href="#cite_note-Bassett22-59"><span data-dcnode-id="5542" instrument_node="">[59]</span></a></sup><span data-dcnode-id="5539" instrument_node=""> It was the first truly compact transistor that could be </span><a class="mw-redirect" data-dcnode-id="5537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOSFET_scaling" title="MOSFET scaling"><span data-dcnode-id="5538" instrument_node="">miniaturised</span></a><span data-dcnode-id="5536" instrument_node=""> and mass-produced for a wide range of uses.</span><sup class="reference" data-dcnode-id="5533" id="cite_ref-Moskowitz_55-1"><a data-dcnode-id="5534" href="#cite_note-Moskowitz-55"><span data-dcnode-id="5535" instrument_node="">[55]</span></a></sup><span data-dcnode-id="5532" instrument_node=""> The widespread adoption of MOSFETs revolutionized the </span><a data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electronics_industry" title="Electronics industry"><span data-dcnode-id="5531" instrument_node="">electronics industry</span></a><span data-dcnode-id="5529" instrument_node="">,</span><sup class="reference" data-dcnode-id="5526" id="cite_ref-Chan_60-0"><a data-dcnode-id="5527" href="#cite_note-Chan-60"><span data-dcnode-id="5528" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5525" instrument_node=""> becoming the fundamental building block of the Digital Revolution</span><sup class="reference" data-dcnode-id="5522" id="cite_ref-61"><a data-dcnode-id="5523" href="#cite_note-61"><span data-dcnode-id="5524" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="5519" id="cite_ref-triumph_45-2"><a data-dcnode-id="5520" href="#cite_note-triumph-45"><span data-dcnode-id="5521" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5518" instrument_node=""> and "the base technology" of the late 20th to early 21st centuries.</span><sup class="reference" data-dcnode-id="5515" id="cite_ref-triumph_45-3"><a data-dcnode-id="5516" href="#cite_note-triumph-45"><span data-dcnode-id="5517" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5514" instrument_node=""> The MOSFET went on to become the </span><a class="mw-redirect" data-dcnode-id="5512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_best-selling_electronic_devices" title="List of best-selling electronic devices"><span data-dcnode-id="5513" instrument_node="">most widely manufactured device</span></a><span data-dcnode-id="5511" instrument_node=""> in history.</span><sup class="reference" data-dcnode-id="5508" id="cite_ref-computerhistory2018_62-0"><a data-dcnode-id="5509" href="#cite_note-computerhistory2018-62"><span data-dcnode-id="5510" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="5505" id="cite_ref-Baker_63-0"><a data-dcnode-id="5506" href="#cite_note-Baker-63"><span data-dcnode-id="5507" instrument_node="">[63]</span></a></sup></li><span data-dcnode-id="5503" instrument_node="">
</span><li data-dcnode-id="5464"><a data-dcnode-id="5501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semiconductor" title="Semiconductor"><span data-dcnode-id="5502" instrument_node="">Semiconductor</span></a><span data-dcnode-id="5500" instrument_node=""> materials were discovered, and methods of production and purification developed for use in electronic devices. </span><a data-dcnode-id="5498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon" title="Silicon"><span data-dcnode-id="5499" instrument_node="">Silicon</span></a><span data-dcnode-id="5497" instrument_node=""> became one of the purest substances ever produced. The wide adoption of the MOSFET led to silicon becoming the dominant manufacturing material during the late 20th century to early 21st century,</span><sup class="reference" data-dcnode-id="5494" id="cite_ref-Feldman_51-2"><a data-dcnode-id="5495" href="#cite_note-Feldman-51"><span data-dcnode-id="5496" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5491" id="cite_ref-Dabrowski_52-2"><a data-dcnode-id="5492" href="#cite_note-Dabrowski-52"><span data-dcnode-id="5493" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5490" instrument_node=""> a period that has been called the Silicon Age,</span><sup class="reference" data-dcnode-id="5487" id="cite_ref-Feldman_51-3"><a data-dcnode-id="5488" href="#cite_note-Feldman-51"><span data-dcnode-id="5489" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5484" id="cite_ref-Dabrowski_52-3"><a data-dcnode-id="5485" href="#cite_note-Dabrowski-52"><span data-dcnode-id="5486" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="5481" id="cite_ref-Siffert_53-1"><a data-dcnode-id="5482" href="#cite_note-Siffert-53"><span data-dcnode-id="5483" instrument_node="">[53]</span></a></sup><span data-dcnode-id="5480" instrument_node=""> similar to how the </span><a data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stone_Age" title="Stone Age"><span data-dcnode-id="5479" instrument_node="">Stone Age</span></a><span data-dcnode-id="5477" instrument_node="">, </span><a data-dcnode-id="5475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bronze_Age" title="Bronze Age"><span data-dcnode-id="5476" instrument_node="">Bronze Age</span></a><span data-dcnode-id="5474" instrument_node=""> and </span><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Age" title="Iron Age"><span data-dcnode-id="5473" instrument_node="">Iron Age</span></a><span data-dcnode-id="5471" instrument_node=""> were defined by the dominant materials during their respective </span><a data-dcnode-id="5469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three-age_system" title="Three-age system"><span data-dcnode-id="5470" instrument_node="">ages of civilization</span></a><span data-dcnode-id="5468" instrument_node="">.</span><sup class="reference" data-dcnode-id="5465" id="cite_ref-Feldman_51-4"><a data-dcnode-id="5466" href="#cite_note-Feldman-51"><span data-dcnode-id="5467" instrument_node="">[51]</span></a></sup></li><span data-dcnode-id="5463" instrument_node="">
</span><li data-dcnode-id="5416"><span data-dcnode-id="5462" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="5460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MOS_integrated_circuit" title="MOS integrated circuit"><span data-dcnode-id="5461" instrument_node="">MOS integrated circuit</span></a><span data-dcnode-id="5459" instrument_node=""> chip (a silicon </span><a data-dcnode-id="5457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Integrated_circuit" title="Integrated circuit"><span data-dcnode-id="5458" instrument_node="">integrated circuit</span></a><span data-dcnode-id="5456" instrument_node=""> chip built from MOSFETs) revolutionized electronics and </span><a class="mw-redirect" data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computers" title="Computers"><span data-dcnode-id="5455" instrument_node="">computers</span></a><span data-dcnode-id="5453" instrument_node="">. The MOS chip was invented in the early 1960s.</span><sup class="reference" data-dcnode-id="5450" id="cite_ref-ieee_64-0"><a data-dcnode-id="5451" href="#cite_note-ieee-64"><span data-dcnode-id="5452" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5449" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon-gate" title="Silicon-gate"><span data-dcnode-id="5448" instrument_node="">silicon-gate</span></a><span data-dcnode-id="5446" instrument_node=""> MOS chip later developed by </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federico_Faggin" title="Federico Faggin"><span data-dcnode-id="5445" instrument_node="">Federico Faggin</span></a><span data-dcnode-id="5443" instrument_node=""> in 1968 was the basis for the first single-chip </span><a data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microprocessor" title="Microprocessor"><span data-dcnode-id="5442" instrument_node="">microprocessor</span></a><span data-dcnode-id="5440" instrument_node="">, the </span><a data-dcnode-id="5438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intel_4004" title="Intel 4004"><span data-dcnode-id="5439" instrument_node="">Intel 4004</span></a><span data-dcnode-id="5437" instrument_node="">, in 1971.</span><sup class="reference" data-dcnode-id="5434" id="cite_ref-65"><a data-dcnode-id="5435" href="#cite_note-65"><span data-dcnode-id="5436" instrument_node="">[65]</span></a></sup><span data-dcnode-id="5433" instrument_node=""> MOS integrated circuits and microprocessors led to the </span><a class="mw-redirect" data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microcomputer_revolution" title="Microcomputer revolution"><span data-dcnode-id="5432" instrument_node="">microcomputer revolution</span></a><span data-dcnode-id="5430" instrument_node="">,</span><sup class="reference" data-dcnode-id="5427" id="cite_ref-66"><a data-dcnode-id="5428" href="#cite_note-66"><span data-dcnode-id="5429" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5426" instrument_node=""> the proliferation of the </span><a data-dcnode-id="5424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Personal_computer" title="Personal computer"><span data-dcnode-id="5425" instrument_node="">personal computer</span></a><span data-dcnode-id="5423" instrument_node=""> in the 1980s, and then </span><a class="mw-redirect" data-dcnode-id="5421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cell_phones" title="Cell phones"><span data-dcnode-id="5422" instrument_node="">cell phones</span></a><span data-dcnode-id="5420" instrument_node=""> and the public-use </span><a data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="5419" instrument_node="">Internet</span></a><span data-dcnode-id="5417" instrument_node=""> in the 1990s.</span></li><span data-dcnode-id="5415" instrument_node="">

ta-dcnode-id="5348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dolby_Digital" title="Dolby Digital"><span data-dcnode-id="5349" instrument_node="">Dolby Digital</span></a><span data-dcnode-id="5347" instrument_node=""> (1991)</span><sup class="reference" data-dcnode-id="5344" id="cite_ref-Luo_74-0"><a data-dcnode-id="5345" href="#cite_note-Luo-74"><span data-dcnode-id="5346" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="5341" id="cite_ref-75"><a data-dcnode-id="5342" href="#cite_note-75"><span data-dcnode-id="5343" instrument_node="">[75]</span></a></sup><span data-dcnode-id="5340" instrument_node=""> and </span><a data-dcnode-id="5338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MP3" title="MP3"><span data-dcnode-id="5339" instrument_node="">MP3</span></a><span data-dcnode-id="5337" instrument_node=""> (1994),</span><sup class="reference" data-dcnode-id="5334" id="cite_ref-Stankovic_73-1"><a data-dcnode-id="5335" href="#cite_note-Stankovic-73"><span data-dcnode-id="5336" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5333" instrument_node=""> and </span><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_television" title="Digital television"><span data-dcnode-id="5332" instrument_node="">digital television</span></a><span data-dcnode-id="5330" instrument_node=""> standards such as </span><a class="mw-redirect" data-dcnode-id="5328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video-on-demand" title="Video-on-demand"><span data-dcnode-id="5329" instrument_node="">video-on-demand</span></a><span data-dcnode-id="5327" instrument_node=""> (VOD)</span><sup class="reference" data-dcnode-id="5324" id="cite_ref-Lea_70-1"><a data-dcnode-id="5325" href="#cite_note-Lea-70"><span data-dcnode- </span><li data-dcnode-id="5307"><span data-dcnode-id="5314" instrument_node="">The number and types of </span><a class="mw-redirect" data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_appliances" title="Home appliances"><span data-dcnode-id="5313" instrument_node="">home appliances</span></a><span data-dcnode-id="5311" instrument_node=""> increased dramatically due to advancements in technology, the wide adoption of MOSFETs, electricity availability, the transition from analog to digital media, and increases in wealth and leisure time. The </span><a data-dcnode-id="5309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microwave_oven" title="Microwave oven"><span data-dcnode-id="5310" instrument_node="">microwave oven</span></a><span data-dcnode-id="5308" instrument_node=""> became popular during the 1980s and have become a standard in all homes by the 1990s. Cable and satellite television spread rapidly during the 1980s and 1990s. Personal computers began to enter the home during the 1970s–1980s as well.</span></li><span data-dcnode-id="5306" instrument_node="">
</span><li data-dcnode-id="5299"><a class="mw-redirect" data-dcnode-id="5304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Video_games" title="Video games"><span data-dcnode-id="5305" instrument_node="">Video games</span></a><span data-dcnode-id="5303" instrument_node=""> were popularized during the late 1970s to 1980s, with the </span><a data-dcnode-id="5301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Golden_age_of_arcade_video_games" title="Golden age of arcade video games"><span data-dcnode-id="5302" instrument_node="">golden age of arcade video games</span></a><span data-dcnode-id="5300" instrument_node="">.</span></li><span data-dcnode-id="5298" instrument_node="">

n data-dcnode-id="5279" instrument_node=""> in the late 1970s. These were in turn replaced by the digital </span><a data-dcnode-id="5277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compact_disc" title="Compact disc"><span data-dcnode-id="5278" instrument_node="">compact disc</span></a><span data-dcnode-id="5276" instrument_node=""> (CD) during the 1980s to 1990s. The proliferation of the </span><a class="mw-redirect" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MDCT" title="MDCT"><span data-dcnode-id="5275" instrument_node="">MDCT</span></a><span data-dcnode-id="5273" instrument_node="">-based MP3 </span><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Audio_coding_format" title="Audio coding format"><span data-dcnode-id="5272" instrument_node="">audio coding format</span></a><sup class="reference" data-dcnode-id="5268" id="cite_ref-Stankovic_73-2"><a data-dcnode-id="5269" href="#cite_note-Stankovic-73"><span data-dcnode-id="5270" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5267" instrument_node=""> on the Internet during the mid-to-late 1990s made </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Digital_distribution" title="Digital distribution"><span data-dcnode-id="5266" instrument_node="">digital distribution</span></a><span data-dcnode-id="5264" instrument_node=""> of music possible.</span></li><span data-dcnode-id="5262" instrument_node="">

less communications"><span data-dcnode-id="5234" instrument_node="">wireless communications</span></a><span data-dcnode-id="5232" instrument_node=""> such as </span><a class="mw-redirect" data-dcnode-id="5230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cellular_networks" title="Cellular networks"><span data-dcnode-id="5231" instrument_node="">cellular networks</span></a><span data-dcnode-id="5229" instrument_node=""> and </span><a data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_telephony" title="Mobile telephony"><span data-dcnode-id="5228" instrument_node="">mobile telephony</span></a><span data-dcnode-id="5226" instrument_node="">.</span><sup class="reference" data-dcnode-id="5223" id="cite_ref-Srivastava_77-0"><a data-dcnode-id="5224" href="#cite_note-Srivastava-77"><span data-dcnode-id="5225" instrument_node="">[77]</span></a></sup></li></ul><span data-dcnode-id="5220" instrument_node="">
