class="ToolTip_image__1fLvV" data-dcnode-id="970" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vedantu.com/cdn/images/seo-templates/copy.png&amp;raw"></div></div><div data-dcnode-id="541"><div class="topicPage_leftSection__2WOwK" data-dcnode-id="542" id="leftSection"><div class="AdBanner_bannerContainer__2AsLX" data-dcnode-id="966" id="AdBannerCont"><img alt="Dhristi JEE 2022-24" data-dcnode-id="967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seo-manager.s3.ap-southeast-1.amazonaws.com/prod/public/seo/add_banner/1743238c-ccbb-48f1-95d6-5ac0c0c07cb0&amp;raw"></div><div class="HeadSection_HeadDescriptionWrapper__1hWNB" data-dcnode-id="948" id="headWrapper"><div class="HeadSection_subTitleWrapper__3nNuF" data-dcnode-id="963"><h2 class="HeadSection_subTitleSection__iv2iB" data-dcnode-id="964" id="#undefined" itemprop="name"><span data-dcnode-id="965" instrument_node="">More About Optical Telescope</span></h2></div><div data-dcnode-id="949" id="TopicFeedback"><div class="false TopicFeedback_TopicFeedbackWrapper__3cPAr" data-dcnode-id="950" id="TopicFeedbackWrapper"><div class="LikesComponent_likesContainer__1Xkc- TopicFeedback_topicLike__3fIGz" data-dcnode-id="956"><div class="LikesComponent_wrapperViewLikes__yuVOw" data-dcnode-id="957"><div class="LikesComponent_likesDislikescontainer__SZG-e" data-dcnode-id="958"><div class="LikesComponent_likesCount__1F27H" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Is this page helpful?</span></div><img class="LikesComponent_upVoteFalseButton__1-WeJ" data-dcnode-id="960" id="likeContainer"><img class="LikesComponent_downVoteFalseButton__1R7KV" data-dcnode-id="959" id="dislikeContainer"></div></div></div><div class="CommentIcon_CommentIcon__GdlFw" data-dcnode-id="955"></div><div data-dcnode-id="953" id="bookmark"><div class="BookmarkIcon_topicBookMarkOutline__1eOa3" data-dcnode-id="954" height="20" style="cursor: pointer;" width="15"></div></div><div class="TopicFeedback_moreOptions__18Wsa" data-dcnode-id="951"><div class="TopicFeedback_dotsSection__15PI5" data-dcnode-id="952"></div></div></div></div></div><div data-dcnode-id="947" id="mainModuleContainerWrapper"></div><div class="uploadDocument_documentWrapper__37fC4" data-dcnode-id="682"><div data-dcnode-id="697"><div class="uploadDocument_parsedHtml__1mS12" data-dcnode-id="698" id="parsed-html-holder"><p data-dcnode-id="944" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="945" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="946" instrument_node="">Given the mysterious beauty of the boundless cosmos, there’s no doubt that telescopes are in the middle of the most fascinating instruments in the field of science.&nbsp;</span></span></p><p data-dcnode-id="942" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="943" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="939" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="940" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="941" instrument_node="">Telescope</span></span></h3><p data-dcnode-id="936" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="937" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="938" instrument_node="">The word ‘Telescope’ was coined by Giovanni Demisiani in 1611.&nbsp;</span></span></p><p data-dcnode-id="934" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="935" instrument_node="">&nbsp;</span></p><p data-dcnode-id="931" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="932" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="933" instrument_node="">Telescope, is an instrument used to form magnified images of distant particles. The first telescope's invention is a bit hazy. A telescope is an optical device that observes distant objects using lenses, curved mirrors, or a combination of the two. It may also be used to observe distant objects using electromagnetic radiation emission, absorption, or reflection.</span></span></p><p data-dcnode-id="929" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="930" instrument_node="">&nbsp;</span></p><p data-dcnode-id="926" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="927" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="928" instrument_node="">The first practical telescopes were refracting telescopes with glass lenses, which Galileo discovered in the Netherlands at the beginning of the 17th century. The telescope is the most important research tool in astronomy. Telescopes enable you to absorb and analyse radiation from astronomical phenomena, including those that are far apart in the cosmos.</span></span></p><p data-dcnode-id="924" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="925" instrument_node="">&nbsp;</span></p><p data-dcnode-id="921" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="922" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="923" instrument_node="">Eyeglass-makers had been experimenting with lenses before 1600. The first mention of a telescope happens in a letter written in 1608, by Hans Lippershey, who was a Dutch spectacle maker in the process of seeking a patent for a telescope. The patent was denied because of easy telescope duplication, and&nbsp; there was difficulty in the process of patent enforcement. The instrument spread very rapidly. Galileo made sense of it in the early 1600s, and he made improvements in lens grinding that did increase the magnification from a relatively low value of two to as much as thirty. With these powerful telescopes, he made observations in the Milky Way, of the mountains on the Moon, the phases of Venus, and the moons in the planet Jupiter. These early telescopes were a type of ‘opera glass,’ which produced erect or right side up images. But they had very limited magnification. When Johannes Kepler, who was a German mathematician and astronomer working in Prague under Tycho Brahe, heard of Galileo’s discoveries, he perfected a more different kind of telescope. Kepler’s design inverts the image in general , it is much more than everything else.</span></span></p><p data-dcnode-id="919" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="920" instrument_node="">&nbsp;</span></p><p data-dcnode-id="916" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="917" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="918" instrument_node="">The reflecting telescope makes use of mirrors to collect and focus light. Telescope now implies the diverse range of instruments that are capable of detecting various regions of the electromagnetic spectrum</span></span></p><p data-dcnode-id="914" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="915" instrument_node="">&nbsp;</span></p><p data-dcnode-id="911" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="912" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="913" instrument_node="">In the twentieth century, new types of telescopes were discovered, including radio telescopes in the 1930s and infrared telescopes in the 1960s. Let's discuss the types of telescopes and their names.</span></span></p><p data-dcnode-id="909" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="910" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="906" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="907" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="908" instrument_node="">Types of Telescope</span></span></h3><ol data-dcnode-id="889" style="margin-top:0;margin-bottom:0;padding-inline-start:48px;"><li aria-level="1" data-dcnode-id="902" dir="ltr" style="list-style-type:decimal;font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;"><p data-dcnode-id="903" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="904" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="905" instrument_node="">Optical telescopes</span></span></p></li><li aria-level="1" data-dcnode-id="898" dir="ltr" style="list-style-type:decimal;font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;"><p data-dcnode-id="899" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="900" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="901" instrument_node="">Radio telescopes</span></span></p></li><li aria-level="1" data-dcnode-id="894" dir="ltr" style="list-style-type:decimal;font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;"><p data-dcnode-id="895" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="896" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="897" instrument_node="">X-ray telescopes</span></span></p></li><li aria-level="1" data-dcnode-id="890" dir="ltr" style="list-style-type:decimal;font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;"><p data-dcnode-id="891" dir="ltr" role="presentation" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:10pt;"><span data-dcnode-id="892" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="893" instrument_node="">Gamma-ray telescopes</span></span></p></li></ol><p data-dcnode-id="886" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="887" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="888" instrument_node="">As we know there are different types of telescope available for different observations. Here, we will discuss optical telescopes and their types.</span></span></p><p data-dcnode-id="884" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="885" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="881" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="882" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="883" instrument_node="">Optical Telescopes</span></span></h3><p data-dcnode-id="875" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="876" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="880" instrument_node="">An optical telescope converges and focuses light mostly from the visible part of the electromagnetic spectrum (while some </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vedantu.com/physics/work"><span data-dcnode-id="879" instrument_node="">work</span></a><span data-dcnode-id="877" instrument_node=""> in the infrared and ultraviolet). Optical telescopes increase the observed angular size of distant objects along with their observed brightness.</span></span></p><p data-dcnode-id="873" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="874" instrument_node="">&nbsp;</span></p><p data-dcnode-id="870" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="871" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="872" instrument_node="">An optical telescope creates a magnified image for direct view, or to make a photograph, also for collecting data through electronic image sensors.</span></span></p><p data-dcnode-id="868" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="869" instrument_node="">&nbsp;</span></p><p data-dcnode-id="865" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="866" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="867" instrument_node="">(Image will be uploaded soon)</span></span></p><p data-dcnode-id="863" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="864" instrument_node="">&nbsp;</span></p><p data-dcnode-id="860" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="861" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="862" instrument_node="">Telescopes use one or more curved optical components, normally made of glass lenses and mirrors, to collect light and other electromagnetic radiation and carry it to a focal point, allowing the image to be viewed, photographed, analysed, and sent to a device.</span></span></p><p data-dcnode-id="859" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"></p><p data-dcnode-id="857"><br data-dcnode-id="858"></p><p data-dcnode-id="856"></p><p data-dcnode-id="853" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="854" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="855" instrument_node="">A telescope is used in many non-astronomical instruments as well as in astronomy, including theodolites, spotting scopes, monoculars, binoculars, camera lenses, and spy glasses. Optical telescopes use polished mirrors or glass lenses to focus observable light as it comes in through the hole. The word is most often applied to a monocular with a fixed mount for observing the sky and handheld binoculars are widely used for a variety of purposes.</span></span></p><p data-dcnode-id="851" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="852" instrument_node="">&nbsp;</span></p><p data-dcnode-id="848" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="849" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="850" instrument_node="">There are Three Main Optical Telescope Types: reflecting and refracting telescopes.</span></span></p><p data-dcnode-id="847" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"></p><p data-dcnode-id="845"><br data-dcnode-id="846"></p><p data-dcnode-id="844"></p><p data-dcnode-id="841" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="842" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="843" instrument_node="">Please observe the following image, the difference between reflecting and refracting is represented easily.</span></span></p><p data-dcnode-id="839" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="840" instrument_node="">&nbsp;</span></p><p data-dcnode-id="836" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="837" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="838" instrument_node="">(Image will be uploaded soon)</span></span></p><h4 data-dcnode-id="834" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="835" instrument_node="">&nbsp;</span></h4><h3 data-dcnode-id="831" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="832" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="833" instrument_node="">Refracting Telescopes</span></span></h3><p data-dcnode-id="828" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="829" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="830" instrument_node="">A refracting telescope is also called a refractor telescope.&nbsp; This telescope is a type of optical telescope that uses a lens as its main purpose is to form an image. This telescope is used in spy glasses and astronomical instruments, as well as it is used for long-focus camera lenses. The magnification of a refractor is measured by measuring the focal length of the object lens by the focal length of the telescope's eyepiece.</span></span></p><p data-dcnode-id="826" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="827" instrument_node="">&nbsp;</span></p><p data-dcnode-id="823" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="824" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="825" instrument_node="">A lens is usually at the front, followed by a long tube, and then an eyepiece or instrumentation at the back, where the telescope image is brought into focus. The diameter of the design is referred to as the hole its ranges from a few centimetres for small spotting telescopes up to one meter for the largest refractor in existence. The design, as well as the eyepiece, may have specific components. Small spotting telescopes may contain an extra lens in the back of the eyepiece to erect the image so that it does not appear upside-down.</span></span></p><p data-dcnode-id="821" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="822" instrument_node="">&nbsp;</span></p><p data-dcnode-id="818" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="819" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="820" instrument_node="">(Image will be uploaded soon)</span></span></p><p data-dcnode-id="816" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="817" instrument_node="">&nbsp;</span></p><p data-dcnode-id="813" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="814" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="815" instrument_node="">However, refracting telescopes is very common in the second half of the nineteenth century, reflecting telescopes have since replaced them for more scientific purposes, as they allow for a larger hole.</span></span></p><p data-dcnode-id="811" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="812" instrument_node="">&nbsp;</span></p><p data-dcnode-id="808" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="809" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="810" instrument_node="">Telescopes which make use of the refractive property of lenses are called refractors. If a refractor has a large light-gathering power (a necessity for astronomical observations), the lenses should be quite large. The instrument at the Yerkes Observatory has an objective lens with a diameter of 1 m. Lenses of such size are tough to manufacture. They have great weight and are subjected to cracking due to temperature changes. For these reasons, large diameter refractors are not practical instruments. Very few of them are still in use for astronomical research operations.</span></span></p><p data-dcnode-id="806" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="807" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="803" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="804" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="805" instrument_node="">Difference Between Reflectors and Refractors</span></span></h3><p data-dcnode-id="800" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="801" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="802" instrument_node="">Refractor telescopes use specialized lenses that make them a favourite for deep space objects like galaxies. On the other hand, reflector telescopes are more popular with larger and brighter objects like the moon and planets. Refractors telescopes utilize specially designed lenses to focus the light on an image. A Reflector telescope uses mirrors, which causes light to reflect at different angles within the optical tube and extends the overall light path. Reflecting telescopes have many advantages as compared to refracting telescopes.&nbsp; The reflector telescope price is cheaper to make than refractors of the same size. Because the light is reflecting off the objective, compared to passing through it, only one side of the reflector telescope's objective needs to be perfect. Hence the reflector telescope price is less than the refracting telescope.</span></span></p><p data-dcnode-id="798" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="799" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="795" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="796" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="797" instrument_node="">Reflecting Telescopes</span></span></h3><p data-dcnode-id="792" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="793" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="794" instrument_node="">A reflecting telescope is also called a reflector. It works by using signals or a collection of curved mirrors to reflect light and create an image. In the seventeenth century, a reflecting telescope was discovered by sir Isaac Newton as a replacement for the refracting telescope, at that time, was a design that had a lot of chromatic aberration on it.&nbsp; The telescope design allows for very large diameter objectives. Since the mirror is used in telescope, the design of the telescope is referred to as a "catoptric" telescope. It is a telescope that uses a combination of curved mirrors to reflect light and produce an image of a distant object. It is used to examine the visible region of the electromagnetic region as well as the shorter ( i.e ultraviolet) and longer (i.e infrared) wavelength regions adjacent to it. Reflecting telescope is so called because the primary mirror reflects the light to a focus instead of refracting it. The primary mirror is a concave spherical or parabolic shape and inverts the image at the focal plane. A secondary curved mirror which is in combination with an eyepiece, is used to observe the image.</span></span></p><p data-dcnode-id="790" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="791" instrument_node="">&nbsp;</span></p><p data-dcnode-id="787" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="788" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="789" instrument_node="">(Image will be uploaded soon)</span></span></p><p data-dcnode-id="785" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="786" instrument_node="">&nbsp;</span></p><p data-dcnode-id="782" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="783" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="784" instrument_node="">Reflecting telescopes are extraordinarily popular for astronomy and many famous telescopes such as the ‘hubble space telescope’ and ‘popular amateur models’ use the design of the reflecting telescope. Besides, the reflected telescope concept has been extended to other wavelengths of light, and for example, x-ray telescopes also use the reflection principle to make image forming optics.</span></span></p><p data-dcnode-id="780" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="781" instrument_node="">&nbsp;</span></p><p data-dcnode-id="777" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="778" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="779" instrument_node="">Let's discuss some reflecting type telescopes and their major differences. These include the Newtonian, Cassegrain, and schmidt-cassegrain telescopes.</span></span></p><p data-dcnode-id="775" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="776" instrument_node="">&nbsp;</span></p><h3 data-dcnode-id="772" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="773" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="774" instrument_node="">Newtonian Telescope</span></span></h3><p data-dcnode-id="769" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="770" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="771" instrument_node="">Newtonian telescope also called the Newtonian reflector telescope. These telescopes are usually less expensive for any given objective diameter than any quality telescopes of other types. This telescope was invented by the english scientist sir isaac newton therefore the telescope is also called as isaac newton telescope. Since only one surface must be ground and polished to achieve a complex form, fabrication is much simpler than other telescope designs.</span></span></p><p data-dcnode-id="767" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="768" instrument_node="">&nbsp;</span></p><p data-dcnode-id="764" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="765" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="766" instrument_node="">A short focal ratio can be more easily obtained and leads to a wider field of view.</span></span></p><p data-dcnode-id="762" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="763" instrument_node="">&nbsp;</span></p><p data-dcnode-id="759" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="760" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="761" instrument_node="">Light approaches the telescope from the left side and hits the primary mirror at the back of the telescope. A focused image is bounced off of a secondary mirror, via an eyepiece, and to the observer's eye. In a reflecting telescope, a secondary mirror focuses light from the main mirror to a different focal point. The eyepiece of a telescope is present at the top end of the telescope. Newtonian telescopes are generally cheaper as compared to the other telescopes with a similar configuration for any given aperture. The production of these telescopes is simple. They involve only one surface that requires ground. They get polished into a complex shape.</span></span></p><p data-dcnode-id="757" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="758" instrument_node="">&nbsp;</span></p><p data-dcnode-id="754" dir="ltr" style="line-height:1.38;text-align: center;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="755" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="756" instrument_node="">(Image will be uploaded soon)</span></span></p><h3 data-dcnode-id="752" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="753" instrument_node="">&nbsp;</span></h3><h3 data-dcnode-id="749" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="750" style="font-size:13.999999999999998pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="751" instrument_node="">Cassegrain Reflector Telescope</span></span></h3><p data-dcnode-id="746" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="747" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="748" instrument_node="">The cassegrain reflector is a composition of a primary concave mirror and a secondary convex mirror. In a symmetrical cassegrain telescope, both mirrors are aligned about the optical axis, and the primary mirror generally contains a hole in the centre, thus enabling the light to reach an eyepiece, a microphone, or an image sensor. The cassegrain configuration uses a parabolic reflector as the primary and the hyperbolic reflector as a secondary mirror.&nbsp;</span></span></p><p data-dcnode-id="744" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="745" instrument_node="">&nbsp;</span></p><p data-dcnode-id="741" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="742" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="743" instrument_node="">In a cassegrain telescope, the primary mirror and secondary mirror both are curved. The light hits the concave primary mirror, which reflects the convex secondary mirror. The convex secondary mirror then reflects the light through a small hole in the concave primary mirror to the eyepiece. Hence the design allows the shorter tube relative to its mirror diameter because the telescope's focal length is longer than the length of the tube.</span></span></p><p data-dcnode-id="739" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="740" instrument_node="">&nbsp;</span></p><p data-dcnode-id="736" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="737" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:700;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="738" instrument_node="">Variations of cassegrain reflector telescopes:</span></span></p><p data-dcnode-id="733" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="734" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="735" instrument_node="">Ritchey–Chrétien telescope</span></span></p><p data-dcnode-id="730" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="731" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="732" instrument_node="">Dall–Kirkham telescope</span></span></p><p data-dcnode-id="727" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="728" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="729" instrument_node="">Off-axis configuration</span></span></p><p data-dcnode-id="724" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="725" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="726" instrument_node="">Schiefspiegler telescope</span></span></p><p data-dcnode-id="721" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="722" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="723" instrument_node="">Yolo reflector</span></span></p><p data-dcnode-id="718" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="719" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="720" instrument_node="">Catadioptric Cassegrains&nbsp;</span></span></p><p data-dcnode-id="715" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="716" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="717" instrument_node="">Schmidt-Cassegrain Telescope</span></span></p><p data-dcnode-id="712" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="713" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="714" instrument_node="">Maksutov-Cassegrain Telescope</span></span></p><p data-dcnode-id="709" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;padding:0pt 0pt 10pt 0pt;"><span data-dcnode-id="710" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="711" instrument_node="">Argunov-Cassegrain Telescope</span></span></p><p data-dcnode-id="706" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="707" style="font-size:13pt;color:#000000;background-color:transparent;font-weight:400;font-style:normal;font-variant:normal;text-decoration:none;vertical-align:baseline;white-space:pre;white-space:pre-wrap;"><span data-dcnode-id="708" instrument_node="">Klevtsov-Cassegrain telescope</span></span></p><p data-dcnode-id="704" dir="ltr" style="line-height:1.38;text-align: justify;background-color:#ffffff;margin-top:0pt;margin-bottom:0pt;"><span data-dcnode-id="705" instrument_node="">&nbsp;</ button data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">2</span></button></li><li class="" data-dcnode-id="549"><button data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">3</span></button></li></ul></div></div></div><div data-dcnode-id="544" id="listModulesContainer"></div><div data-dcnode-id="543" id="footerMag"></div></div></div></div></div><div class="topicPage_faqs__u8rwC" data-dcnode-id="432" id="faqs"><div data-dcnode-id="433"><div class="FAQReadMore_classHolder__32c40" data-dcnode-id="434" id="faqHeader"><div class="FAQReadMore_faq_seo_container__uZZe0" data-dcnode-id="435"><div class="FAQReadMore_faq__heading__203-F" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">FAQs (Frequently Asked Questions)</span></div><div class="FAQReadMore_faqSection__2HErX" data-dcnode-id="436"><div class="FAQReadMore_questionCard__wdFN3 FAQReadMore_active__tp5sp" data-dcnode-id="522"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="529"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="532"><p data-dcnode-id="533" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="534" style="color: #000000;background-color: transparent;"><b data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">1. How do reflecting telescopes work?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="530"><span class="FAQReadMore_arrowDown__3Odsr" data-dcnode-id="531"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="523"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="525"><p data-dcnode-id="526" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="527" style="color: #000000;background-color: transparent;"><span data-dcnode-id="528" instrument_node="">Reflecting telescopes are used for mirrors instead of lenses to collect light. In a reflector, the light travels from the telescope tube to the large concave primary mirror, which reflects the light up the tube to the smaller convex secondary mirror, which in turn reflects the light with regards to the eyepiece. Reflecting telescopes are shorter than refractors because the light is reflected back and forth rather than travelling in a straight line from one end of the telescope tube to the other.</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="524"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="504"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="511"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="514"><p data-dcnode-id="515"><span data-dcnode-id="518" style="color: rgb(0, 0, 0);text-align: justify;"><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">2. What is the difference between a reflecting telescope and refracting telescope?</span></b></span><br data-dcnode-id="516"></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="512"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="513"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="505"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="507"><p data-dcnode-id="508" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="509" style="color: #000000;background-color: transparent;"><span data-dcnode-id="510" instrument_node="">The difference between a reflecting telescope and refracting telescopes is that a reflecting telescope has a single or a combination of curved mirrors in order to reflect the light rays and form an image. And the refracting telescope has a lens as its objective lens to form an image. A reflecting telescope, the main component is a mirror that bounces the light rays and then focuses it into a small area. And the refracting telescope uses lenses to focus the light rays as it travels towards the other end of the telescope.</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="506"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="482"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="494"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="497"><p data-dcnode-id="498"><span data-dcnode-id="501" style="color: rgb(0, 0, 0);text-align: justify;"><span data-dcnode-id="502" instrument_node="">3. What is the difference between optical telescopes and radio telescopes?</span></span><br data-dcnode-id="499"></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="495"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="496"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="483"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="485"><p data-dcnode-id="491" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="492" style="color: #000000;background-color: transparent;"><span data-dcnode-id="493" instrument_node="">If an image is to be observed and studied, these telescopes work by employing one or more curved optical lenses or mirrors. They gather light and bring that light or radiation to a focal point. Optical telescopes are mostly used for astronomical projects and in camera lenses, binoculars. There are three main types of optical telescopes : Refractive telescopes make use of the lenses to form an image, The reflecting telescope arranges mirrors to form an image, The catadioptric telescope uses mirrors with lenses to form an image.&nbsp;</span></span></p><p data-dcnode-id="489" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="490" instrument_node="">&nbsp;</span></p><p data-dcnode-id="486" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="487" style="color: #000000;background-color: transparent;"><span data-dcnode-id="488" instrument_node="">Radio telescopes, on the other hand, collect and correlate signals. With this, high resolution images can be formed. Radio telescopes collect microwave radiation which has the capacity to pass through gases, dust clouds and the atmosphere. They use longer wavelengths.&nbsp;</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="484"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="467"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="474"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="477"><p data-dcnode-id="478" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="479" style="color: #000000;background-color: transparent;"><b data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">4. What are gamma ray telescopes ?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="475"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="476"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="468"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="470"><p data-dcnode-id="471" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="472" style="color: #000000;background-color: transparent;"><span data-dcnode-id="473" instrument_node="">X Ray, Gamma ray telescopes are installed on Earth orbiting satellites and high flying balloons. Higher energy X ray and Gamma ray telescopes don't allow to focus completely and use coded aperture masks.&nbsp; The patterns created by the masks are used to reconstruct an image. Detecting high energy gamma rays with higher frequency and shorter wavelength is tougher. It is different from detecting regular gamma rays.</span></span></p></div><div class="FAQReadMore_top__QQVRB" data-dcnode-id="469"></div></div></div><div class="FAQReadMore_questionCard__wdFN3" data-dcnode-id="437"><div class="FAQReadMore_questionSection__3QaKZ" data-dcnode-id="459"><div class="FAQReadMore_question__3h6qH" data-dcnode-id="462"><p data-dcnode-id="463" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="464" style="color: #000000;background-color: transparent;"><b data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">5. What are the other types of telescopes?</span></b></span></p></div><div class="FAQReadMore_changingSign__3PVWQ" data-dcnode-id="460"><span class="FAQReadMore_arrowUp__37hCN" data-dcnode-id="461"></span></div></div><div class="FAQReadMore_answerSection__1Iyhx" data-dcnode-id="438"><div class="FAQReadMore_top__QQVRB" data-dcnode-id="440"><p data-dcnode-id="456" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="457" style="color: #000000;background-color: transparent;"><span data-dcnode-id="458" instrument_node="">Cosmic ray telescopes detect cosmic rays. They have an array of different detector types which are spread out over a large area.</span></span></p><p data-dcnode-id="454" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="455" instrument_node="">&nbsp;</span></p><p data-dcnode-id="451" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="452" style="color: #000000;background-color: transparent;"><span data-dcnode-id="453" instrument_node="">Energetic neutral atom instruments study the magnetosphere of various bodies. They detect fast moving electrically neutral atoms detected by solar wind.</span></span></p><p data-dcnode-id="449" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="450" instrument_node="">&nbsp;</span></p><p data-dcnode-id="446" dir="ltr" style="text-align: justify;background-color: #ffffff;"><span data-dcnode-id="447" style="color: #000000;background-color: transparent;"><span data-dcnode-id="448" instrument_node="">Neutrino detectors are used for neutrino astronomy.&nbsp;</span></span></p><p data-dcnode-id="444" dir="ltr" style="text-align:
