</span><h1 data-dcnode-id="356" style="font-size:16pt !important; margin-top:-5px; color:black !important;"><span data-dcnode-id="357" instrument_node="">How Do Telescopes Work?</span></h1><span data-dcnode-id="355" instrument_node="">
</span></div><span data-dcnode-id="353" instrument_node="">
</span><div class="content" data-dcnode-id="197"><span data-dcnode-id="352" instrument_node="">
</span><span class="standardFontSize" data-dcnode-id="199"><span data-dcnode-id="351" instrument_node="">
</span><div class="wh-featured-snippet" data-dcnode-id="339" style="position:relative"><span data-dcnode-id="350" instrument_node="">
</span><div data-dcnode-id="341" style="border:5px solid #01118e;padding:25px;max-width:100%;margin:15px 0; border-radius:30px;"><span data-dcnode-id="349" instrument_node="">
</span><div data-dcnode-id="346" style="position: absolute;top:-15px;margin-left: 25px;background: #fff;padding: 5px;"><strong data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">The Short Answer:</span></strong></div><span data-dcnode-id="345" instrument_node="">
</span><div data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">
			Early telescopes focused light using pieces of curved, clear glass, called lenses. However, most telescopes today use curved mirrors to gather light from the night sky. The shape of the mirror or lens in a telescope concentrates light. That light is what we see when we look into a telescope.
		</span></div><span data-dcnode-id="342" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span><center data-dcnode-id="328"><span data-dcnode-id="337" instrument_node="">
</span><div class="image-with-caption" data-dcnode-id="330"><span data-dcnode-id="336" instrument_node="">
</span><img alt="Illustration of the silhouettes of stargazers with a telescope." data-dcnode-id="335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/telescopes/en/Stargazers.en.jpg&amp;raw" style="border-radius:30px; max-width:100%;"><span data-dcnode-id="334" instrument_node="">
</span><p class="caption" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Credit: NASA/JPL-Caltech</span></p><span data-dcnode-id="331" instrument_node="">
</span></div><span data-dcnode-id="329" instrument_node="">
</span></center><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="326" instrument_node="">A </span><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">telescope</span></strong><span data-dcnode-id="323" instrument_node=""> is a tool that astronomers use to see faraway objects. Most telescopes, and all large telescopes, work by using curved </span><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">mirrors</span></strong><span data-dcnode-id="320" instrument_node=""> to gather and focus light from the night sky.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">The first telescopes focused light by using pieces of curved, clear glass, called lenses. So why do we use mirrors today? Because mirrors are lighter, and they are easier than lenses to make perfectly smooth.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The mirrors or lenses in a telescope are called the “optics.” Really powerful telescopes can see very dim things and things that are really far away. To do that, the optics—be they mirrors or lenses—have to be really big.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">The bigger the mirrors or lenses, the more light the telescope can gather. Light is then concentrated by the shape of the optics. That light is what we see when we look into the telescope.</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">The optics of a telescope must be almost perfect. That means the mirrors and lenses have to be just the right shape to concentrate the light. They can’t have any spots, scratches or other flaws. If they do have such problems, the image gets warped or blurry and is difficult to see. It’s hard to make a perfect mirror, but it’s even harder to make a perfect lens.</span></p><span data-dcnode-id="306" instrument_node="">
</span><br data-dcnode-id="305"><span data-dcnode-id="304" instrument_node="">
</span><h2 class="Quicksand" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Lenses</span></h2><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="300" instrument_node="">A telescope made with lenses is called a </span><strong data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">refracting telescope</span></strong><span data-dcnode-id="297" instrument_node="">.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">A lens, just like in eyeglasses, bends light passing through it. In eyeglasses, this makes things less blurry. In a telescope, it makes faraway things seem closer.</span></p><span data-dcnode-id="292" instrument_node="">
</span><center data-dcnode-id="282"><span data-dcnode-id="291" instrument_node="">
</span><div class="image-with-caption" data-dcnode-id="284"><span data-dcnode-id="290" instrument_node="">
</span><img alt="Illustration of a simple refracting telescope." data-dcnode-id="289" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/telescopes/en/refracting_telescope_wavy.en.jpg&amp;raw" style="border-radius:30px; max-width:100%;"><span data-dcnode-id="288" instrument_node="">
</span><p class="caption" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">A simple refracting telescope uses lenses to make images bigger and more visible. Credit: NASA/JPL-Caltech</span></p><span data-dcnode-id="285" instrument_node="">
</span></div><span data-dcnode-id="283" instrument_node="">
</span></center><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">People with especially poor eyesight need thick lenses in their glasses. Big, thick lenses are more powerful. The same is true for telescopes. If you want to see far away, you need a big powerful lens. Unfortunately, a big lens is very heavy.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Heavy lenses are hard to make and difficult to hold in the right place. Also, as they get thicker the glass stops more of the light passing through them.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Because the light is passing through the lens, the surface of the lens has to be extremely smooth. Any flaws in the lens will change the image. It would be like looking through a dirty window.</span></p><span data-dcnode-id="272" instrument_node="">
</span><br data-dcnode-id="271"><span data-dcnode-id="270" instrument_node="">
</span><h2 class="Quicksand" data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Why Mirrors Work Better</span></h2><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="266" instrument_node="">A telescope that uses mirrors is called a </span><strong data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">reflecting telescope</span></strong><span data-dcnode-id="263" instrument_node="">.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Unlike a lens, a mirror can be very thin. A bigger mirror does not also have to be thicker. Light is concentrated by bouncing off of the mirror. So the mirror just has to have the right curved shape.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">It is much easier to make a large, near-perfect mirror than to make a large, near-perfect lens. Also, since mirrors are one-sided, they are easier than lenses to clean and polish.</span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">But mirrors have their own problems. Have you ever looked into a spoon and noticed your reflection is upside down? The curved mirror in a telescope is like a spoon: It flips the image. Luckily, the solution is simple. We just use other mirrors to flip it back.</span></p><span data-dcnode-id="252" instrument_node="">
</span><center data-dcnode-id="242"><span data-dcnode-id="251" instrument_node="">
</span><div class="image-with-caption" data-dcnode-id="244"><span data-dcnode-id="250" instrument_node="">
</span><img alt="Illustration of a simple reflecting telescope using mirrors." data-dcnode-id="249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/telescopes/en/reflecting_telescope_wavy.en.jpg&amp;raw" style="border-radius:30px; max-width:100%;"><span data-dcnode-id="248" instrument_node="">
</span><p class="caption" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">A simple reflecting telescope uses mirrors to help us see faraway objects. Credit: NASA/JPL-Caltech</span></p><span data-dcnode-id="245" instrument_node="">
</span></div><span data-dcnode-id="243" instrument_node="">
</span></center><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">The number-one benefit of using mirrors is that they’re not heavy. Since they are much lighter than lenses, mirrors are a lot easier to launch into space.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="237" instrument_node="">Space telescopes such as the </span><strong data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Hubble Space Telescope</span></strong><span data-dcnode-id="234" instrument_node=""> and the </span><strong data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Spitzer Space Telescope</span></strong><span data-dcnode-id="231" instrument_node=""> have allowed us to capture views of galaxies and nebulas far away from our own solar system. Set to launch in December 2021, the </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/james-webb-space-telescope/en/"><span data-dcnode-id="230" instrument_node="">James Webb Space Telescope</span></a><span data-dcnode-id="228" instrument_node=""> is the largest, most powerful space telescope ever built. It will allow scientists to look at what our universe was like about 200 million years after the Big Bang.</span></p><span data-dcnode-id="226" instrument_node="">
</span><center data-dcnode-id="216"><span data-dcnode-id="225" instrument_node="">
</span><div class="image-with-caption" data-dcnode-id="218"><span data-dcnode-id="224" instrument_node="">
</span><img alt="Image of the Crab Nebula." data-dcnode-id="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/telescopes/en/crab-nebula.en.png&amp;raw" style="border-radius:30px; max-width:100%;"><span data-dcnode-id="222" instrument_node="">
</span><p class="caption" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">This image of the Crab Nebula was created with information from the Hubble Space Telescope, the Spitzer Space Telescope, the Chandra X-ray Observatory, European Space Agency's XMM-Newton and the Very Large Array. Credit: NASA, ESA, NRAO/AUI/NSF and G. Dubner (University of Buenos Aires)</span></p><span data-dcnode-id="219" instrument_node="">
</span></div><span data-dcnode-id="217" instrument_node="">
</span></center><span data-dcnode-id="215" instrument_node="">
</span><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">
