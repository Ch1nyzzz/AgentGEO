noopener noreferrer" target="_blank"><span data-dcnode-id="640" instrument_node=""> </span><img alt="Hani Kittaneh" data-dcnode-id="639" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/03/Hani.jpg%3Ffit%3D300%252C188%26ssl%3D1&amp;raw"><span data-dcnode-id="638" instrument_node=""> </span></a><div class="elementor-author-box__text" data-dcnode-id="631"><span data-dcnode-id="636" instrument_node=""> </span><a data-dcnode-id="632" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/hani-kittaneh/" rel="external noopener noreferrer" target="_blank"><h5 class="elementor-author-box__name" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Hani Kittaneh</span></h5><span data-dcnode-id="633" instrument_node=""> </span></a></div></div></div></div></div></div></div><div class="elementor-column elementor-col-33 elementor-top-column elementor-element elementor-element-80bc7bc" data-dcnode-id="177" data-element_type="column" data-id="80bc7bc"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="178"><div class="elementor-widget-wrap" data-dcnode-id="179"><div class="elementor-element elementor-element-7256a286 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="253" data-element_type="widget" data-id="7256a286" data-widget_type="theme-post-content.default"><div class="elementor-widget-container" data-dcnode-id="254"><div class="elementor elementor-3542" data-dcnode-id="255" data-elementor-id="3542" data-elementor-type="wp-post"><div class="elementor-inner" data-dcnode-id="256"><div class="elementor-section-wrap" data-dcnode-id="257"><section class="elementor-section elementor-top-section elementor-element elementor-element-c56c458 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="594" data-element_type="section" data-id="c56c458"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="595"><div class="elementor-row" data-dcnode-id="596"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-6c66156" data-dcnode-id="597" data-element_type="column" data-id="6c66156"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="598"><div class="elementor-widget-wrap" data-dcnode-id="599"><div class="elementor-element elementor-element-447373d elementor-widget elementor-widget-text-editor" data-dcnode-id="600" data-element_type="widget" data-id="447373d" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="601"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="602"><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Telescopes are among the most amazing tools in the world. They help us see faraway objects in the night sky that we may never reach. It is like piercing through the veil of dreams, so near, yet so far, what we see is mesmerizing thanks to these wonderful inventions.</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">But how do telescopes actually work? We know that the first telescope was patented in 1608, and since the last 400 years these magical instruments have greatly increased in complexity. As such, today we are going to answer questions such as:</span></p><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="603"><li data-dcnode-id="616"><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">How do telescopes work?</span></strong></li><li data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">What are the lenses?</span></strong></li><li data-dcnode-id="610"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Why mirrors work better?</span></strong></li><li data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Who invented the telescope?</span></strong></li><li data-dcnode-id="604"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">What is the most powerful telescope?</span></strong></li></ul></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-f8a0cb2 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="580" data-element_type="section" data-id="f8a0cb2"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="581"><div class="elementor-row" data-dcnode-id="582"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-8a67764" data-dcnode-id="583" data-element_type="column" data-id="8a67764"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="584"><div class="elementor-widget-wrap" data-dcnode-id="585"><div class="elementor-element elementor-element-eb30573 elementor-widget elementor-widget-image" data-dcnode-id="586" data-element_type="widget" data-id="eb30573" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="587"><div class="elementor-image" data-dcnode-id="588"><figure class="wp-caption" data-dcnode-id="589"><span data-dcnode-id="593" instrument_node=""> </span><img alt="Telescope" class="attachment-large size-large jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="592" data-lazy-loaded="1" height="528" loading="eager" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/1.jpg%3Ffit%3D768%252C528%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/1.jpg?w=768&amp;ssl=1 768w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/1.jpg?resize=300%2C206&amp;ssl=1 300w" width="768"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-00aa1c2 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="570" data-element_type="section" data-id="00aa1c2"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="571"><div class="elementor-row" data-dcnode-id="572"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-cdd71ef" data-dcnode-id="573" data-element_type="column" data-id="cdd71ef"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="574"><div class="elementor-widget-wrap" data-dcnode-id="575"><div class="elementor-element elementor-element-8483f77 elementor-widget elementor-widget-heading" data-dcnode-id="576" data-element_type="widget" data-id="8483f77" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="577"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">How do telescopes work?</span></h2></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-5b542a2 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="552" data-element_type="section" data-id="5b542a2"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="553"><div class="elementor-row" data-dcnode-id="554"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-bad1a2c" data-dcnode-id="555" data-element_type="column" data-id="bad1a2c"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="556"><div class="elementor-widget-wrap" data-dcnode-id="557"><div class="elementor-element elementor-element-24d4bb8 elementor-widget elementor-widget-text-editor" data-dcnode-id="558" data-element_type="widget" data-id="24d4bb8" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="559"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="560"><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">The earliest telescopes, and even many today, focused light using pieces of curved, clear glass, called lenses. Today, there is a second method to gather light, and that is by the use of curved mirrors [</span><a data-dcnode-id="567" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spaceplace.nasa.gov/telescopes/en/%23%3A~%3Atext%3DA%2520telescope%2520is%2520a%2520tool%2Clight%2520from%2520the%2520night%2520sky.%26text%3DThe%2520bigger%2520the%2520mirrors%2520or%2Cthe%2520shape%2520of%2520the%2520optics." rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="568" instrument_node="">1</span></a><span data-dcnode-id="566" instrument_node="">].</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The principle remains the same, the shape of the lens or mirror in a telescope concentrates light, and that is what we see when we look into a telescope.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">These elements are called optics. The most powerful telescopes today can see very dim objects which are unfathomably far, however, what dictates their power is how big their optics are, be it lenses or mirrors.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-adf91b3 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="538" data-element_type="section" data-id="adf91b3"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="539"><div class="elementor-row" data-dcnode-id="540"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-0cd5e60" data-dcnode-id="541" data-element_type="column" data-id="0cd5e60"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="542"><div class="elementor-widget-wrap" data-dcnode-id="543"><div class="elementor-element elementor-element-34de792 elementor-widget elementor-widget-image" data-dcnode-id="544" data-element_type="widget" data-id="34de792" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="545"><div class="elementor-image" data-dcnode-id="546"><figure class="wp-caption" data-dcnode-id="547"><span data-dcnode-id="551" instrument_node=""> </span><img alt="Telescope parts" class="attachment-large size-large jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="550" data-lazy-loaded="1" height="663" loading="eager" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg%3Ffit%3D1024%252C663%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg?resize=300%2C194&amp;ssl=1 300w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg?resize=768%2C497&amp;ssl=1 768w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg?resize=1536%2C994&amp;ssl=1 1536w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/2-scaled.jpg?resize=2048%2C1325&amp;ssl=1 2048w" width="1024"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-c84bb24 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="523" data-element_type="section" data-id="c84bb24"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="524"><div class="elementor-row" data-dcnode-id="525"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-90f00d1" data-dcnode-id="526" data-element_type="column" data-id="90f00d1"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="527"><div class="elementor-widget-wrap" data-dcnode-id="528"><div class="elementor-element elementor-element-a5c253f elementor-widget elementor-widget-text-editor" data-dcnode-id="529" data-element_type="widget" data-id="a5c253f" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="530"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="531"><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Size matters when it comes to telescopes, the bigger the optics, the more light the telescope can gather, this is called the aperture. Light is then concentrated by the shape of the optics.</span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">The two general properties of a telescope are how well it can collect light, and how much it can magnify the image. The magnification depends on the combination of lenses used.</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The eyepiece, which is the lens near the eye, acts as ordinary magnifying glass, thus enlarging the image. This feature by almost any telescope by using different eyepieces that fit and this is why aperture is a more important feature.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-2ee1fbc elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="513" data-element_type="section" data-id="2ee1fbc"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="514"><div class="elementor-row" data-dcnode-id="515"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-0a0d685" data-dcnode-id="516" data-element_type="column" data-id="0a0d685"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="517"><div class="elementor-widget-wrap" data-dcnode-id="518"><div class="elementor-element elementor-element-126fec6 elementor-widget elementor-widget-heading" data-dcnode-id="519" data-element_type="widget" data-id="126fec6" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="520"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">What are the lenses?</span></h2></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-13dcde6 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="500" data-element_type="section" data-id="13dcde6"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="501"><div class="elementor-row" data-dcnode-id="502"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-4d5fb1a" data-dcnode-id="503" data-element_type="column" data-id="4d5fb1a"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="504"><div class="elementor-widget-wrap" data-dcnode-id="505"><div class="elementor-element elementor-element-471f8c3 elementor-widget elementor-widget-text-editor" data-dcnode-id="506" data-element_type="widget" data-id="471f8c3" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="507"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="508"><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Lenses form images by refraction and are usually made out of glass or plastic. The mechanism is simple, the lens gathers light from distant objects and bends them so that they can converge to a single point called the focal point.</span></p><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">The distance from the lens to the focal point is called the focal length of the lens. Refracting telescopes use this type of lenses. Most refracting telescopes use two types of lenses.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-607c1fd elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="486" data-element_type="section" data-id="607c1fd"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="487"><div class="elementor-row" data-dcnode-id="488"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-721feff" data-dcnode-id="489" data-element_type="column" data-id="721feff"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="490"><div class="elementor-widget-wrap" data-dcnode-id="491"><div class="elementor-element elementor-element-182af81 elementor-widget elementor-widget-image" data-dcnode-id="492" data-element_type="widget" data-id="182af81" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="493"><div class="elementor-image" data-dcnode-id="494"><figure class="wp-caption" data-dcnode-id="495"><span data-dcnode-id="499" instrument_node=""> </span><img alt="Telescope parts" class="attachment-large size-large jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="498" data-lazy-loaded="1" height="221" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/3.jpg%3Ffit%3D300%252C221%26ssl%3D1&amp;raw" width="300"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-155b20c elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="468" data-element_type="section" data-id="155b20c"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="469"><div class="elementor-row" data-dcnode-id="470"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-a6654b2" data-dcnode-id="471" data-element_type="column" data-id="a6654b2"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="472"><div class="elementor-widget-wrap" data-dcnode-id="473"><div class="elementor-element elementor-element-9adbf25 elementor-widget elementor-widget-text-editor" data-dcnode-id="474" data-element_type="widget" data-id="9adbf25" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="475"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="476"><p data-dcnode-id="481"><span data-dcnode-id="485" instrument_node="">A large lense, which is called the objective lens, and the smaller lens used for viewing, is called the eyepiece lens. The size of an image produced by a lens is proportional to the focal length of the lens [</span><a data-dcnode-id="483" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.howstuffworks.com/telescope1.htm" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="484" instrument_node="">2</span></a><span data-dcnode-id="482" instrument_node="">].</span></p><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">The longer the focal length, the larger the image. Image brightness partially depends on how much light is collected by the telescope, and the light collected depends directly on how large the objective lens is.</span></p><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">If the diameter of an objective lens is doubled, the light-gathering power also increases by a factor of 4. The magnifying power, on the other hand, is the ration of an object’s angular diameter to its naked eye diameter. This depends both on the focal length of both lenses.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-00b56ff elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="458" data-element_type="section" data-id="00b56ff"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="459"><div class="elementor-row" data-dcnode-id="460"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-bf5e445" data-dcnode-id="461" data-element_type="column" data-id="bf5e445"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="462"><div class="elementor-widget-wrap" data-dcnode-id="463"><div class="elementor-element elementor-element-13ad555 elementor-widget elementor-widget-heading" data-dcnode-id="464" data-element_type="widget" data-id="13ad555" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="465"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Why mirrors work better?</span></h2></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-7f18b5a elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="442" data-element_type="section" data-id="7f18b5a"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="443"><div class="elementor-row" data-dcnode-id="444"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-508df6b" data-dcnode-id="445" data-element_type="column" data-id="508df6b"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="446"><div class="elementor-widget-wrap" data-dcnode-id="447"><div class="elementor-element elementor-element-9c52516 elementor-widget elementor-widget-text-editor" data-dcnode-id="448" data-element_type="widget" data-id="9c52516" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="449"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="450"><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Lenses have limitations since they create a type of image distortion known as chromatic aberration. As light passes through the lens, different colors bend through different angles and are brought to a focus at different points.</span></p><p data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">This creates a halo that surrounds whatever you see through the telescope. However, by adding a thin lens of a different kind of glass behind the objective lens, you can correct image aberration [</span><a data-dcnode-id="453" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asd.gsfc.nasa.gov/archive/mwmw/mmw_telescope.html" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="454" instrument_node="">3</span></a><span data-dcnode-id="452" instrument_node="">].</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-74e174b elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="428" data-element_type="section" data-id="74e174b"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="429"><div class="elementor-row" data-dcnode-id="430"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-0b0ba7b" data-dcnode-id="431" data-element_type="column" data-id="0b0ba7b"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="432"><div class="elementor-widget-wrap" data-dcnode-id="433"><div class="elementor-element elementor-element-9258b7d elementor-widget elementor-widget-image" data-dcnode-id="434" data-element_type="widget" data-id="9258b7d" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="435"><div class="elementor-image" data-dcnode-id="436"><figure class="wp-caption" data-dcnode-id="437"><span data-dcnode-id="441" instrument_node=""> </span><img alt="Telescope parts" class="attachment-large size-large jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="440" data-lazy-loaded="1" height="451" loading="eager" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg%3Ffit%3D1024%252C451%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg?resize=300%2C132&amp;ssl=1 300w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg?resize=768%2C338&amp;ssl=1 768w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg?resize=1536%2C677&amp;ssl=1 1536w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/4-scaled.jpg?resize=2048%2C902&amp;ssl=1 2048w" width="1024"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-e961a72 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="411" data-element_type="section" data-id="e961a72"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="412"><div class="elementor-row" data-dcnode-id="413"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-3fe3b46" data-dcnode-id="414" data-element_type="column" data-id="3fe3b46"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="415"><div class="elementor-widget-wrap" data-dcnode-id="416"><div class="elementor-element elementor-element-f58e304 elementor-widget elementor-widget-text-editor" data-dcnode-id="417" data-element_type="widget" data-id="f58e304" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="418"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="419"><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Lenses have other problems though, they are difficult and expensive to make without any defects. Glass also absorbs more ultraviolet light, and visible light is dimmed as it passes through the lens.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The reflector type telescopes, on the other hand, use mirrors instead of lenses. Unlike a lens, a mirror can be very thin, and regardless of its size, the thickness doesn’t necessarily increase.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Light is concentrated by bouncing off of the mirror in reflector telescopes. The mirror must have the right curved shape, and since mirrors are one-sided, they are much easier to clean and polish than lenses.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">However, mirrors also have their own problems. The curved mirror in a telescope flips the image upsidown, but this is easy to solve by using another image to flip it back.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-e2b3544 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="397" data-element_type="section" data-id="e2b3544"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="398"><div class="elementor-row" data-dcnode-id="399"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-4ba1349" data-dcnode-id="400" data-element_type="column" data-id="4ba1349"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="401"><div class="elementor-widget-wrap" data-dcnode-id="402"><div class="elementor-element elementor-element-dec8e8e elementor-widget elementor-widget-image" data-dcnode-id="403" data-element_type="widget" data-id="dec8e8e" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="404"><div class="elementor-image" data-dcnode-id="405"><figure class="wp-caption" data-dcnode-id="406"><span data-dcnode-id="410" instrument_node=""> </span><img alt="Electromagnetic spectrum" class="attachment-large size-large jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="409" data-lazy-loaded="1" height="605" loading="eager" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg%3Ffit%3D1024%252C605%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg?resize=300%2C177&amp;ssl=1 300w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg?resize=768%2C453&amp;ssl=1 768w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg?resize=1536%2C907&amp;ssl=1 1536w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/5-scaled.jpg?resize=2048%2C1209&amp;ssl=1 2048w" width="1024"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-e77e698 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="380" data-element_type="section" data-id="e77e698"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="381"><div class="elementor-row" data-dcnode-id="382"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-5ac9b15" data-dcnode-id="383" data-element_type="column" data-id="5ac9b15"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="384"><div class="elementor-widget-wrap" data-dcnode-id="385"><div class="elementor-element elementor-element-30a4bb1 elementor-widget elementor-widget-text-editor" data-dcnode-id="386" data-element_type="widget" data-id="30a4bb1" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="387"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="388"><p data-dcnode-id="389"><span data-dcnode-id="396" instrument_node="">Probably the best benefit of mirrors is their weight. They are much lighter than lenses, and this is why space telescopes such as the </span><a data-dcnode-id="394" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thespacemystery.com/telescopes/hubble-space-telescope-features-and-discoveries/" rel="noopener noreferrer" target="_self"><span data-dcnode-id="395" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="393" instrument_node="">, and the Spitzer Space Telescope use them [</span><a data-dcnode-id="391" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spacemath.gsfc.nasa.gov/Grade35/10Page40.pdf" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="392" instrument_node="">4</span></a><span data-dcnode-id="390" instrument_node="">].</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-9ed1cb7 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="370" data-element_type="section" data-id="9ed1cb7"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="371"><div class="elementor-row" data-dcnode-id="372"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-c3ca92d" data-dcnode-id="373" data-element_type="column" data-id="c3ca92d"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="374"><div class="elementor-widget-wrap" data-dcnode-id="375"><div class="elementor-element elementor-element-c066633 elementor-widget elementor-widget-heading" data-dcnode-id="376" data-element_type="widget" data-id="c066633" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="377"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Who invented the telescope?</span></h2></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-d628f2f elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="344" data-element_type="section" data-id="d628f2f"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="345"><div class="elementor-row" data-dcnode-id="346"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-b4512cb" data-dcnode-id="347" data-element_type="column" data-id="b4512cb"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="348"><div class="elementor-widget-wrap" data-dcnode-id="349"><div class="elementor-element elementor-element-18492af elementor-widget elementor-widget-text-editor" data-dcnode-id="350" data-element_type="widget" data-id="18492af" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="351"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="352"><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">The telescope is probably one of the most awe-inspiring inventions of humanity. Though it may be a simple device, which makes far-away things appear near, the telescope gave observers a new perspective of how vast the universe is.</span></p><p data-dcnode-id="363"><span data-dcnode-id="367" instrument_node="">But who invented the telescope? In 1608, a Dutch eyeglass maker named Hans Lippershey applied for a patent, his invention, a telescope. He claimed that this device could magnify objects three times [</span><a data-dcnode-id="365" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_telescope" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="366" instrument_node="">5</span></a><span data-dcnode-id="364" instrument_node="">].</span></p><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">This fist telescope had a concave eyepiece aligned with a convex objective lens, and there are two tales of how Lippershey came up with the idea of such an invention.</span></p><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">&nbsp;</span></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">The first one goes like this, Lippershey observed two children in his shop holding up two lenses that made a distant weather vane appear closer, and thus his inspiration for the telescope.</span></p><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">The second tale is a bit more shaddy. Some say that Lippershey stole the design of the telescope from another eyeglass maker, Zacharias Jansen. Both men lived in the same town and worked on optical instruments.</span></p><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">However, scholars disagree with this, since there is no real evidence that Lippershey didn’t develop the telescope on his own. He was the first to apply a patent for this creation, and thus he is the most credited for the invention of the telescope.</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-7b7b4d4 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="334" data-element_type="section" data-id="7b7b4d4"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="335"><div class="elementor-row" data-dcnode-id="336"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-cfedab5" data-dcnode-id="337" data-element_type="column" data-id="cfedab5"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="338"><div class="elementor-widget-wrap" data-dcnode-id="339"><div class="elementor-element elementor-element-383c451 elementor-widget elementor-widget-heading" data-dcnode-id="340" data-element_type="widget" data-id="383c451" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="341"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">What is the most powerful telescope?</span></h2></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-fb85d2b elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="317" data-element_type="section" data-id="fb85d2b"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="318"><div class="elementor-row" data-dcnode-id="319"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-18d3176" data-dcnode-id="320" data-element_type="column" data-id="18d3176"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="321"><div class="elementor-widget-wrap" data-dcnode-id="322"><div class="elementor-element elementor-element-51b96b6 elementor-widget elementor-widget-text-editor" data-dcnode-id="323" data-element_type="widget" data-id="51b96b6" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="324"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="325"><p data-dcnode-id="326"><span data-dcnode-id="333" instrument_node="">Times have changed greatly in the world of telescopes. From Galileo Galilei’s crude telescope, which helped him establish that not all things revolve around </span><a data-dcnode-id="331" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thespacemystery.com/space-facts/earth-planet-facts/" rel="noopener noreferrer" target="_self"><span data-dcnode-id="332" instrument_node="">Earth</span></a><span data-dcnode-id="330" instrument_node="">, to today’s modern space telescopes, such as the Hubble Space Telescope, which observes distant galaxies and stars at unfathomable distances [</span><a data-dcnode-id="328" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//solarsystem.nasa.gov/missions/hubble-space-telescope/in-depth/" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="329" instrument_node="">6</span></a><span data-dcnode-id="327" instrument_node="">].</span></p></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-ccde2db elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="303" data-element_type="section" data-id="ccde2db"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="304"><div class="elementor-row" data-dcnode-id="305"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-53236b8" data-dcnode-id="306" data-element_type="column" data-id="53236b8"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="307"><div class="elementor-widget-wrap" data-dcnode-id="308"><div class="elementor-element elementor-element-a075727 elementor-widget elementor-widget-image" data-dcnode-id="309" data-element_type="widget" data-id="a075727" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="310"><div class="elementor-image" data-dcnode-id="311"><figure class="wp-caption" data-dcnode-id="312"><span data-dcnode-id="316" instrument_node=""> </span><img alt="Hubble Space Telescope" class="attachment-large size-large jetpack-lazy-image" data-dcnode-id="315" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/6-scaled.jpg?fit=1024%2C677&amp;ssl=1&amp;is-pending-load=1" data-lazy-srcset="https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/6-scaled.jpg?w=1024&amp;ssl=1 1024w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/6-scaled.jpg?resize=300%2C198&amp;ssl=1 300w, https://i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/6-scaled.jpg?resize=768%2C508&amp;ssl=1 768w" height="677" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.thespacemystery.com/wp-content/uploads/2020/09/6-scaled.jpg%3Ffit%3D1024%252C677%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1024"><figcaption class="widget-image-caption wp-caption-text" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Credit: NASA</span></figcaption></figure></div></div></div></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-17dda55 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="283" data-element_type="section" data-id="17dda55"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="284"><div class="elementor-row" data-dcnode-id="285"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-5f87eb4" data-dcnode-id="286" data-element_type="column" data-id="5f87eb4"><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="287"><div class="elementor-widget-wrap" data-dcnode-id="288"><div class="elementor-element elementor-element-ae5c3dc elementor-widget elementor-widget-text-editor" data-dcnode-id="289" data-element_type="widget" data-id="ae5c3dc" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="290"><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="291"><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">But what is the most powerful telescope in the world? Can we continue improving the telescope? Undoundebtly, the most powerful telescopes in the world are the space telescopes.</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">These devices do not suffer the consequences of Earth’s atmosphere which limits their viewing capabilities. For a long time, the Hubble Space Telescope has reigned supreme in its own right, but things change.</span></p><p data-dcnode-id="294"><span data-dcnode-id="298" instrument_node="">Today, the James Webb Space Telescope is on its way to being launched into space. It will eclipse the Hubble Space Telescope on all fronts. It was designed since 1996, and scientists still work on it to this day [</span><a data-dcnode-id="296" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jwst.nasa.gov/" rel="external noopener noreferrer" target="_blank"><span data-dcnode-id="297" instrument_node="">7</span></a><span data-dcnode-id="295" instrument_node="">].</span></p><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Some predict that it will be released in March 2021. The JWST was designed by NASA, the European Space Agency, and the Canadian Space Agency.</span></p
