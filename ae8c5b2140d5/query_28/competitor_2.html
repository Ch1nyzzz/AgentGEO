-id="625"><span data-dcnode-id="633" instrument_node=""> </span><picture data-dcnode-id="627"><source data-dcnode-id="632" srcset="https://img-aws.ehowcdn.com/180x110/s3-us-west-1.amazonaws.com/contentlab.studiod/getty/cache.gettyimages.com/5e867a341806415eade4b28277da582b.jpg?type=webp" type="image/webp"><span data-dcnode-id="631" instrument_node=""> </span><source data-dcnode-id="630" srcset="https://img-aws.ehowcdn.com/180x110/s3-us-west-1.amazonaws.com/contentlab.studiod/getty/cache.gettyimages.com/5e867a341806415eade4b28277da582b.jpg" type="image/jpeg"><img alt="The Focal Length of Microscope Objectives" data-dcnode-id="629" loading="lazy" onerror="this.src='/public/images/logo-fallback.png';this.onerror='';" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/180x110/s3-us-west-1.amazonaws.com/contentlab.studiod/getty/cache.gettyimages.com/5e867a341806415eade4b28277da582b.jpg&amp;raw"><span data-dcnode-id="628" instrument_node=""> </span></picture><span data-dcnode-id="626" instrument_node=""> </span></div><span data-dcnode-id="624" instrument_node=""> </span><div class="card-small-title-container sciencing" data-dcnode-id="615"><span data-dcnode-id="623" instrument_node=""> </span><div data-dcnode-id="620"><span class="card-category sciencing" data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Related</span></span></div><span data-dcnode-id="619" instrument_node=""> </span><h3 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">The Focal Length of Microscope Objectives</span></h3><span data-dcnode-id="616" instrument_node=""> </span></div><span data-dcnode-id="614" instrument_node=""> </span></a><span data-dcnode-id="612" instrument_node=""> </span></div><span data-dcnode-id="610" instrument_node=""> </span></div><span data-dcnode-id="608" instrument_node=""> </span></div><span data-dcnode-id="606" instrument_node=""> </span><div class="article-content-center" data-dcnode-id="318"><span data-dcnode-id="605" instrument_node=""> </span><div class="article-desktop-byline-container" data-dcnode-id="589"><span data-dcnode-id="604" instrument_node=""> </span><div class="article-writer-image-container" data-dcnode-id="600"><span data-dcnode-id="603" instrument_node=""> </span><img alt="writer bio picture" class="article-writer-image" data-dcnode-id="602" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/60x60p/s3.amazonaws.com/cme_public_images/www_demandstudios_com/sitelife.studiod.com/ver1.0/Content/images/store/11/15/0b72ee81-7970-454c-9f7e-9f5299035d65.Small.jpg&amp;raw"><span data-dcnode-id="601" instrument_node=""> </span></div><span data-dcnode-id="599" instrument_node=""> </span><div class="article-writer-container" data-dcnode-id="591"><span data-dcnode-id="598" instrument_node=""> </span><div class="last-update" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Updated April 24, 2017</span></div><span data-dcnode-id="595" instrument_node=""> </span><div class="writer" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">By Joan Reinbold</span></div><span data-dcnode-id="592" instrument_node=""> </span></div><span data-dcnode-id="590" instrument_node=""> </span></div><span data-dcnode-id="588" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="557"><span data-dcnode-id="587" instrument_node=""> </span><div class="section section-0" data-dcnode-id="582"><span data-dcnode-id="586" instrument_node=""> </span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Reflecting telescopes are generally built with two mirrors, a large one called the "primary mirror" and a small one called the "secondary mirror." The primary mirror is usually placed at one end of the telescope's tube, and the secondary mirror is placed in the eyepiece's line of sight. The eyepiece contains a magnifying lens.</span></p><span data-dcnode-id="583" instrument_node=""> </span></div><span data-dcnode-id="581" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="580"></div><div class="section section-1" data-dcnode-id="575"><span data-dcnode-id="579" instrument_node=""> </span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">A principle of reflection is that when light hits a mirror at any angle, it is reflected at that same angle. This means that the reflected image is not changed.</span></p><span data-dcnode-id="576" instrument_node=""> </span></div><span data-dcnode-id="574" instrument_node=""> </span><div class="section section-2" data-dcnode-id="569"><span data-dcnode-id="573" instrument_node=""> </span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Depending on the type of reflecting telescope, the two mirrors can be a combination of concave, convex and flat mirrors. The secondary mirror, when flat, is placed at a 45-degree angle.</span></p><span data-dcnode-id="570" instrument_node=""> </span></div><span data-dcnode-id="568" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="567"></div><span data-dcnode-id="566" instrument_node=""> </span><div class="no-print" data-="" data-ad-unit-name="sticky-video-player" data-dcnode-id="565"></div><span data-dcnode-id="564" instrument_node=""> </span><div class="section section-3" data-dcnode-id="559"><span data-dcnode-id="563" instrument_node=""> </span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">To obtain an image, the telescope is aimed at an object, and the light enters the tube. The light hits the primary mirror and is reflected to the secondary mirror. It is then reflected from the secondary mirror to the eyepiece, where the image is magnified and sent to the eye.</span></p><span data-dcnode-id="560" instrument_node=""> </span></div><span data-dcnode-id="558" instrument_node=""> </span></div><span data-dcnode-id="556" instrument_node=""> </span><div class="main-ad-container" data-dcnode-id="545"><span data-dcnode-id="555" instrument_node=""> </span><div class="main-ad no-print" data-ad-unit-name="adblock-adsense-main-has-loaded" data-dcnode-id="551"><span data-dcnode-id="554" instrument_node="">
