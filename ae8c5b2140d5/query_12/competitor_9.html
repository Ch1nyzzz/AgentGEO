</span></div><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">The 28-inch Greenwich refracting telescope is the largest of its kind in the UK.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">It was commissioned in 1885&nbsp;by Astronomer Royal William Christie, and built by&nbsp;the Grubb Telescope Company in Dublin. The telescope was finally installed in 1893.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Learn more about its history below.</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1786"><a class="button button--primary" data-dcnode-id="1787" data-gtm-detail="formatted content" data-gtm-name="CTA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rmg.co.uk/royal-observatory"><span data-dcnode-id="1788" instrument_node="">Visit the Royal Observatory</span></a></p><span data-dcnode-id="1785" instrument_node="">
</span></div><span data-dcnode-id="1783" instrument_node="">
</span></div><span data-dcnode-id="1781" instrument_node="">

</span><div data-dcnode-id="1735"><div class="image-text slice" data-dcnode-id="1737"><span data-dcnode-id="1776" instrument_node="">

</span><div data-dcnode-id="1765"><span data-dcnode-id="1768" instrument_node=""> </span><img alt="Historic photograph showing the construction of the Onion Dome roof at the Royal Observatory" data-dcnode-id="1767" height="998" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rmg.co.uk/sites/default/files/styles/large/public/2022-01/B5698-A.jpeg%3Fitok%3DkDpIUMye&amp;raw" typeof="foaf:Image" width="1200"><span data-dcnode-id="1766" instrument_node="">
</span></div><span data-dcnode-id="1764" instrument_node="">

</span><div class="image-text__contain" data-dcnode-id="1741"><span data-dcnode-id="1757" instrument_node="">
</span><h3 data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Construction begins</span></h3><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">The Great Equatorial Telescope was designed to keep the Royal Observatory at the forefront of contemporary astronomy and more active in the growing disciplines of astrophysics and photography.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">The job of constructing the telescope was given to Howard Grubb, an Irish optical manufacturer who was then the world leader in the field.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Work began on the new 'onion dome' roof to house the telescope in 1892, and the telescope was installed a year later.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">
</span></div><span data-dcnode-id="1742" instrument_node="">
</span></div><span data-dcnode-id="1740" instrument_node="">
</span></div><span data-dcnode-id="1738" instrument_node="">
</span></div><span data-dcnode-id="1736" instrument_node="">
</span></div><span data-dcnode-id="1734" instrument_node="">
</span><div data-dcnode-id="1695"><div class="image-text slice slice__light" data-dcnode-id="1697"><span data-dcnode-id="1733" instrument_node="">
</span><div class="image-text__row image-text__row--right" data-dcnode-id="1699"><span data-dcnode-id="1732" instrument_node="">
</span><div class="image-text__media" data-dcnode-id="1716"><span data-dcnode-id="1731" instrument_node="">
</span><article data-dcnode-id="1718"><span data-dcnode-id="1730" instrument_node="">
</span><div data-dcnode-id="1720"><span data-dcnode-id="1729" instrument_node="">
</span><div class="visually-hidden" data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Image</span></div><span data-dcnode-id="1726" instrument_node="">
</span><div data-dcnode-id="1722"><span data-dcnode-id="1725" instrument_node=""> </span><img alt="Historic photograph showing an astronomer peering into the eyepiece of the Great Equatorial Telescope at the Royal Observatory. Another astronomer is taking notes to the left" data-dcnode-id="1724" height="899" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rmg.co.uk/sites/default/files/styles/large/public/2022-01/B5698-D.jpeg%3Fitok%3DBkzyDKaf&amp;raw" typeof="foaf:Image" width="1200"><span data-dcnode-id="1723" instrument_node="">
</span></div><span data-dcnode-id="1721" instrument_node="">
</span></div><span data-dcnode-id="1719" instrument_node="">
</span></article><span data-dcnode-id="1717" instrument_node="">
</span></div><span data-dcnode-id="1715" instrument_node="">
</span><div class="image-text__contain" data-dcnode-id="1701"><span data-dcnode-id="1714" instrument_node="">
</span><h3 data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Pioneering research</span></h3><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">The 28-inch lens was to be of revolutionary design, allowing the telescope to perform as an observational and photographic instrument.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">After detailed testing however, the proposed role of the Great Equatorial Telescope was changed. Its new main purpose would be to observe and measure 'double stars', planets and comets. This is continued to do for more than 70 years.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span></div><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span></div><span data-dcnode-id="1696" instrument_node="">
</span></div><span data-dcnode-id="1694" instrument_node="">
</span><div data-dcnode-id="1152"><div class="text-block slice slice__light" data-dcnode-id="1154"><span data-dcnode-id="1693" instrument_node="">
</span><div class="text-block__row" data-dcnode-id="1156"><span data-dcnode-id="1692" instrument_node="">
</span><div class="text-block__contain" data-dcnode-id="1158"><span data-dcnode-id="1691" instrument_node="">
</span><div class="text-block__title" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">
</span></div><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">In 1925 King George V and Queen Mary visited Greenwich to mark 250 years of the Royal Observatory. Pathé news footage captured the royal couple as they toured the Observatory grounds.</span></p><span data-dcnode-id="1685" instrument_node="">

</span><h3 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">What are double stars?</span></h3><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Double or binary stars are stars that share a common centre of gravity and are in orbit around that centre.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Little was known about the nature of stars in the 19th century, and the idea that they could be associated physically as well as visually was new. Today it is known that at least 50 per cent of stars are binary stars in orbit around one another.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Measurement of the orbits of binary stars allows their masses to be determined by applying Newton's Law of Gravitation. This is the only method by which astronomers can directly measure the masses of stars.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">
</span><a data-dcnode-id="1116" data-gtm-detail="image with text block" data-gtm-name="CTA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.nasa.gov/details-PIA09228" rel="noopener noreferrer" target="__blank"><span data-dcnode-id="1117" instrument_node="">
          Image courtesy of NASA
      </span></a><span data-dcnode-id="1115" instrument_node="">

</span><div class="image-text__contain" data-dcnode-id="1069"><span data-dcnode-id="1085" instrument_node="">
</span><h3 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">A strange shape</span></h3><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The mount for the Great Equatorial Telescope had originally been built for an earlier, smaller instrument. Because of this, the new telescope had to be tapered in the middle in order to fit between the mount's central spokes.&nbsp;This is why the telescope is round at each end but rectangular in the middle.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Unlike the fixed telescopes elsewhere in the Observatory, the Great Equatorial Telescope can be rotated from east to west to keep it moving in sync with the stars. It is aligned with the Earth’s axis, and moves parallel to the celestial equator — hence the name.</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Starlight is collected by the huge 28-inch (71 cm) diameter lens and then focused down to the eyepiece.</span></p><span data-dcnode-id="1073" instrument_node="">

</span><div class="image-text__contain" data-dcnode-id="1029"><span data-dcnode-id="1042" instrument_node="">
</span><h3 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The onion dome</span></h3><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">The distinctive 'onion dome' roof was designed specifically to house the Great Equatorial Telescope.</span></p><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">The original dome construction was a riveted iron frame covered with papier mâché. At its widest, the dome bulges out about 1.5 metres (5 feet) beyond the Observatory walls.</span></p><span data-dcnode-id="1033" instrument_node="">

</span><h3 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">War disrupts observations</span></h3><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Twice in its history, observations with the Great Equatorial Telescope have been disturbed.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The first time was during the First World War. Then, with the outbreak of the Second World War in 1939, the valuable object glass was removed and sent to a place of safety.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">This was just as well. The Observatory was damaged by bombing during the war, and in 1944 the covering of the dome itself was almost completely destroyed by a V1 flying bomb.</span></p><span data-dcnode-id="990" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">

</span><h3 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">A new home in Sussex</span></h3><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">In 1947, the telescope was dismantled and sent to the Royal Observatory's new home at Herstmonceux in Sussex, away from the smoke and light pollution of London.&nbsp;</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">It continued to be used for research, before eventually being 'retired' in 1970.</span></p><span data-dcnode-id="950" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">

</span><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">A royal return to Greenwich</span></h3><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">The telescope was returned to Greenwich in 1971.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">The BBC's Sky at Night programme </span><a data-dcnode-id="910" data-gtm-detail="formatted content" data-gtm-name="CTA" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/programmes/p014hv0c" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="911" instrument_node="">captured the moment</span></a><span data-dcnode-id="909" instrument_node=""> the telescope was lifted back into place, with presenter Sir Patrick Moore declaring, 'The great 28-inch telescope is coming home where it belongs'.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">In 1975 the Great Equatorial Telescope was officially opened to the public by the Queen and the Duke of Edinburgh.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Since then it&nbsp;has become a central part of educational programmes at the Royal Observatory. With the recent addition of a computer-aided guidance system and CCD camera, it continues to work as an excellent visual aid to observing the night sky.</span></p><span data-dcnode-id="901" instrument_node="">
</span><div class="image-text__ctas" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">
