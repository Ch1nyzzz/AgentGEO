294" instrument_node=""> </span><span class="acsb-profile-text" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Clear flashes &amp; reduces color</span></span><span data-dcnode-id="1291" instrument_node=""> </span><i class="acsbi-vibrate" data-dcnode-id="1290"></i><span data-dcnode-id="1289" instrument_node=""> </span></div><span data-dcnode-id="1287" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node=""> This profile enables epileptic and seizure prone users to browse safely by eliminating the risk of seizures that result from flashing or blinking animations and risky color combinations. </span></div><span data-dcnode-id="1284" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1283"></i><span data-dcnode-id="1282" instrument_node=""> </span></div><span data-dcnode-id="1280" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-vision" data-acsb-action="visionProfile" data-dcnode-id="1250" role="button" tabindex="0"><span data-dcnode-id="1279" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1268"><span data-dcnode-id="1278" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1270"><span data-dcnode-id="1277" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">OFF</span></span><span data-dcnode-id="1274" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-on" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">ON</span></span><span data-dcnode-id="1271" instrument_node=""> </span></div><span data-dcnode-id="1269" instrument_node=""> </span></div><span data-dcnode-id="1267" instrument_node=""> </span><div class="acsb-profile-content" data-dcnode-id="1257"><span data-dcnode-id="1266" instrument_node=""> </span><span class="acsb-profile-name" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Vision Impaired Profile</span></span><span data-dcnode-id="1263" instrument_node=""> </span><span class="acsb-profile-text" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Enhances website's visuals</span></span><span data-dcnode-id="1260" instrument_node=""> </span><i class="acsbi-eye" data-dcnode-id="1259"></i><span data-dcnode-id="1258" instrument_node=""> </span></div><span data-dcnode-id="1256" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node=""> This profile adjusts the website, so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others. </span></div><span data-dcnode-id="1253" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1252"></i><span data-dcnode-id="1251" instrument_node=""> </span></div><span data-dcnode-id="1249" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-adhd" data-acsb-action="adhdProfile" data-dcnode-id="1219" role="button" tabindex="0"><span data-dcnode-id="1248" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1237"><span data-dcnode-id="1247" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">OFF</span></span><span data-dcnode-id="1243" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-on" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">ON</span></span><span data-dcnode-id="1240" instrument_node=""> </span></div><span data-dcnode-id="1238" instrument_node=""> </span></div><span data-dcnode-id="1236" instrument_node=""> </span><div class="acsb-profile-content" data-dcnode-id="1226"><span data-dcnode-id="1235" instrument_node=""> </span><span class="acsb-profile-name" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">ADHD Friendly Profile</span></span><span data-dcnode-id="1232" instrument_node=""> </span><span class="acsb-profile-text" data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">More focus &amp; fewer distractions</span></span><span data-dcnode-id="1229" instrument_node=""> </span><i class="acsbi-target" data-dcnode-id="1228"></i><span data-dcnode-id="1227" instrument_node=""> </span></div><span data-dcnode-id="1225" instrument_node=""> </span><div class="acsb-profile-description" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node=""> This profile significantly reduces distractions, to help people with ADHD and Neurodevelopmental disorders browse, read, and focus on the essential elements of the website more easily. </span></div><span data-dcnode-id="1222" instrument_node=""> </span><i class="acsb-profile-connected acsbi-chain" data-dcnode-id="1221"></i><span data-dcnode-id="1220" instrument_node=""> </span></div><span data-dcnode-id="1218" instrument_node=""> </span><div aria-pressed="false" class="acsb-profile acsb-profile-cognitive" data-acsb-action="cognitiveProfile" data-dcnode-id="1188" role="button" tabindex="0"><span data-dcnode-id="1217" instrument_node=""> </span><div aria-hidden="true" class="acsb-profile-toggle" data-dcnode-id="1206"><span data-dcnode-id="1216" instrument_node=""> </span><div class="acsb-toggle acsb-toggle-off" data-dcnode-id="1208"><span data-dcnode-id="1215" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-option-off" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">OFF</span></span><span data-dcnode-id="1212" instrument_node=""> </span><span class="acsb-toggle-option acsb-toggle-op ode-id="323" instrument_node="">日本語</span></span><span data-dcnode-id="321" instrument_node=""> </span></div><span data-dcnode-id="319" instrument_node=""> </span></div><span data-dcnode-id="317" instrument_node="">
</span></div><span data-dcnode-id="315" instrument_node=""> </span></div><span data-dcnode-id="313" instrument_node=""> </span></div><span data-dcnode-id="311" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="129" tabindex="0"><span data-dcnode-id="309" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="308"></div><span data-dcnode-id="307" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="131" role="dialog"><span data-dcnode-id="306" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="302" role="button" tabindex="0"><span data-dcnode-id="305" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="304"></i><span data-dcnode-id="303" instrument_node=""> </span></span><span data-dcnode-id="301" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="133"><span data-dcnode-id="300" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="135"><strong class="acsb-title-main" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Compliance status</span></strong><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="280" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="274" instrument_node="">
</span><ol data-dcnode-id="248"><span data-dcnode-id="273" instrument_node="">
</span><li data-dcnode-id="261"><strong class="acsb-title" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="270" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="269"><br data-dcnode-id="268"><span data-dcnode-id="267" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="266"><br data-dcnode-id="265"><span data-dcnode-id="264" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="263"><br data-dcnode-id="262"></li><span data-dcnode-id="260" instrument_node="">
</span><li data-dcnode-id="250"><strong class="acsb-title" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="257" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="256"><br data-dcnode-id="255"><span data-dcnode-id="254" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="253"><br data-dcnode-id="252"><span data-dcnode-id="251" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="249" instrument_node="">
</span></ol><span data-dcnode-id="247" instrument_node="">
</span><strong data-dcnode-id="244" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="245" lang="EN-US"><span data-dcnode-id="246" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="243" instrument_node="">
</span><ul data-dcnode-id="211"><span data-dcnode-id="242" instrument_node="">
</span><li data-dcnode-id="238"><strong class="acsb-title" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="239" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="237" instrument_node="">
</span><li data-dcnode-id="233"><strong class="acsb-title" data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="234" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="228"><strong class="acsb-title" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="229" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="227" instrument_node="">
</span><li data-dcnode-id="223"><strong class="acsb-title" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="224" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="218"><strong class="acsb-title" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="219" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="217" instrument_node="">
</span><li data-dcnode-id="213"><strong class="acsb-title" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="214" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="212" instrument_node="">
</span></ul><span data-dcnode-id="210" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="207"><span data-dcnode-id="208" lang="EN-US"><span data-dcnode-id="209" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="206" instrument_node="">
</span><ol data-dcnode-id="148"><span data-dcnode-id="205" instrument_node="">
</span><li data-dcnode-id="198"><strong class="acsb-title" data-dcnode-id="201"><span data-dcnode-id="203" lang="EN-US"><span data-dcnode-id="204" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="202" instrument_node="">–</span></strong><span data-dcnode-id="199" lang="EN-US"><span data-dcnode-id="200" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="190"><span data-dcnode-id="193" lang="EN-US"><strong class="acsb-title" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="194" instrument_node="">&nbsp;</span></span><span data-dcnode-id="191" lang="EN-US"><span data-dcnode-id="192" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="183"><span data-dcnode-id="185" lang="EN-US"><strong class="acsb-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Animations –</span></strong><span data-dcnode-id="186" instrument_node="">&nbsp;</span></span><span data-dcnode-id="184" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="182" instrument_node="">
</span><li data-dcnode-id="175"><span data-dcnode-id="178" lang="EN-US"><strong class="acsb-title" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="179" instrument_node="">&nbsp;</span></span><span data-dcnode-id="176" lang="EN-US"><span data-dcnode-id="177" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="174" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="170" lang="EN-US"><strong class="acsb-title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="171" instrument_node="">&nbsp;</span></span><span data-dcnode-id="168" lang="EN-US"><span data-dcnode-id="169" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="159"><span data-dcnode-id="162" lang="EN-US"><strong class="acsb-title" data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="163" instrument_node="">&nbsp;</span></span><span data-dcnode-id="160" lang="EN-US"><span data-dcnode-id="161" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="158" instrument_node="">
</span><li data-dcnode-id="150"><strong class="acsb-title" data-dcnode-id="155"><span data-dcnode-id="156" lang="EN-US"><span data-dcnode-id="157" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="151" lang="EN-US"><strong class="acsb-title" data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">–</span></strong><span data-dcnode-id="152" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="149" instrument_node="">
</span></ol><span data-dcnode-id="147" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="141" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="138" instrument_node="">
