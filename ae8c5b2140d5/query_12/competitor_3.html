            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="317"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"></head><body alink="#00ffff" bgcolor="#ffffff" data-dcnode-id="2" link="#0018d5" text="#000000" vlink="#ff0000"><span data-dcnode-id="321" instrument_node="">
</span><title data-dcnode-id="319">THE ROLE OF ASTRONOMY IN ISLAM</title><span data-dcnode-id="318" instrument_node="">
</span><span data-dcnode-id="316" instrument_node="">
</span><span data-dcnode-id="315" instrument_node="">
</span><span data-dcnode-id="314" instrument_node="">
</span><span data-dcnode-id="313" instrument_node="">
</span><table data-dcnode-id="3" width="700"><tbody data-dcnode-id="4"><tr data-dcnode-id="5"><td data-dcnode-id="6"><span data-dcnode-id="312" instrument_node="">
</span><center data-dcnode-id="301"><b data-dcnode-id="302"><span data-dcnode-id="311" instrument_node="">
</span><h1 data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">THE ROLE OF ASTRONOMY IN ISLAM</span></h1><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="307" instrument_node="">Dr. Shirin Haque-Copilah</span><br data-dcnode-id="306"><span data-dcnode-id="305" instrument_node="">Physics Dept, Univ. of the West Indies</span></p><span data-dcnode-id="303" instrument_node="">
</span></b></center><b data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">
</span></b><span data-dcnode-id="298" instrument_node="">
</span><h2 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Introduction</span></h2><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="292"><b data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">“We have not
created the heaven and the earth and all that is between them in mere idle
play. None of this have We created without an inner truth: but most of them
understand it not.” (44: 38-39)</span></b></p><b data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">
</span></b><p data-dcnode-id="287"><b data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">“In the creation of the heavens and
earth, and the alternation of the night and day, and the ships which sail the
seas to people's benefit, and the water which Allah sends down from the sky --
by which He brings the earth to life when it was dead and scatters about in it
creatures of every kind -- and the varying direction of the winds, and the
clouds subservient between heaven and earth, there are signs for people who use
their intellect.” (2:164)</span></b></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="285" instrument_node="">Need more be said? One of the purposes of the Holy
Qur'an's revelation is to invite people to think. What can possibly be more
straightforward than that regarding our conduct here on earth with respect to
the use of our intellect to understand the world around us. The holy Qur’an
delves into the many signs of Allah in nature, around us and within us to
convey a deep sense of awe at the many signs of our Lord, apparent to those who
use intellect. It is truly remarkable
that the Qur’an revealed between 610 and 632 CE contains in it, scientific
knowledge that has taken centuries to be discovered. The only explanation for
this is that without a doubt, it is divine in origin. We Muslims believe that
the Qur’an, in original Arabic, is the actual word of Allah, the Most
High. A proper understanding of the
Qur’an therefore also requires an understanding of science. It is not the
purpose of the Qur’an to explain science to us but it encourages persons to
reflect on the works of creation so that we may realize the greatness of
Almighty God. Before we delve any further, it is necessary to make clear a very
important distinction – that between </span><i data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Astronomy
</span></i><span data-dcnode-id="282" instrument_node="">and </span><i data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Astrology </span></i><span data-dcnode-id="279" instrument_node=""> – the
two terms are often confused by many persons as meaning the same. They cannot
be further from each other. Astronomy
is a science and </span><i data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">halal</span></i><span data-dcnode-id="276" instrument_node=""> whereas
astrology is a pseudo science and </span><i data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">haram</span></i><span data-dcnode-id="273" instrument_node="">.
Astronomy deals with the study of the heavens in an effort to understand the
underlying principles governing the behaviour of the planets, stars and
galaxies and the Universe in general. Astrology claims to predict the destinies of persons as a result of the ‘action’ of planets and so on, on their lives.
There has not been to date any contradiction between Astronomy, as we understand it,
and the Qur’an.</span></p><span data-dcnode-id="271" instrument_node="">
</span><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">The Qur’an deals with many areas of science such as
geology of earth, the animal and vegetable kingdom, human reproduction and
Astronomy. This article concentrates on
the position of Astronomy in Islam with emphasis on observed facts and not
theories. A theory is used to explain an observed or hypothesized phenomena and
it may be modified, changed, or rejected in due course depending on how
appropriate it may be against observational data. Theories can be subjective in
nature. An observation is a fact and is not liable to be changed but may be
further refined. </span></p><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">This article does not deal with speculative
Astronomy. Because like all sciences, we do not understand everything and there
are many things that remain as models. It should be borne in mind that a
thousand experiments will not prove a theory correct but one experiment can
disprove it. Understanding the
underlying principles behind the clockwork of the Universe endows us with a far
deeper sense of awe and appreciation of the One that created it. The sentiment
is similar to that expressed by Physicist Richard Feynman:</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">“I have a friend who's an artist and he's sometimes
taken a view which I don't agree with very well. He'll hold up a flower and
say. “Look how beautiful it is,“ and I'll agree, I think. And he says
- “ you see, I as an artist can see how beautiful this is, but you as a
scientist, oh, take this all apart and it becomes a dull thing.“ And I
think that he's kind of nutty. First of all, the beauty that he sees is
available to other people and to me, too, I believe, although I might not be
quite as refined aesthetically as he is, but I can appreciate the beauty of a
flower. At the same time I see much more about the flower than he sees. I could
imagine the cells in there, the complicated actions inside which also have a
beauty. I mean it's not just beauty at this dimension of one centimeter, there
is also beauty at a smaller dimension, the inner structure. Also the processes,
the fact that the colors in the flower are evolved in order to attract insects
to pollinate it is interesting - it means that insects can see the color. It
adds a question: Does this aesthetic sense also exist in the lower form? Why is
it aesthetic? All kinds of interesting questions which a science knowledge only
adds to the excitement and mystery and the awe of a flower. It only adds; I
don't understand how it subtracts.“ - Richard P. Feynman (1918-1988) </span></p><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">It not only adds, but enriches, it deepens.
Understanding and developing an appreciation of creations of Allah using the
tools of science can enrich and deepen a believer’s consciousness of the
Creator.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">If there is any religion that invites man to the
study and understanding of the heavens, it is Islam. An understanding of the discipline of Astronomy is essential for
the appreciation of the religion of Islam. No other religion uses or relies on
the heavens and the motion of the moon and sun for timekeeping and calendars as
Islam does. Allah created this tremendous Universe that we live in and we are
invited to reflect upon it, to understand it so that we may be able to practise
our religion with conviction based on reason to the best of our abilities. By God’s laws, the laws of Physics, we are
glued to the planet earth yet Almighty God granted us eyes, intellect and
knowledge that we may see far in excess of our ordinary reach- surely in these
things are signs of the omnipotence of our Creator.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="253"><b data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">“Allah is He, who created the sun, the moon, and the stars (all) governed
by laws under His commandment.” (7:54)</span></b></p><b data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">
</span></b><p data-dcnode-id="248"><b data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">“He has made subject to you, the night and the day; the sun and the moon;
and the stars in subjection by His command.” (14:33; 16:12)</span></b></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="246"></p><h2 data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Astronomy in the Qur’an</span></h2><p data-dcnode-id="243"></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Just pause and try and imagine the Arabian night
skies – crisp and clear, twinkling
gently and kindly …invitingly, literally showing mankind the way. We see below a sampling of some of the
mentions of Astronomy in the Qur’an. It is by no means a catalogue. The Qur’an
tells us that the stars are there to guide us on land and sea.</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="238" instrument_node="">
</span><b data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">“And it is He who ordained the
stars for you that you may be guided thereby in the darkness of the land and
the sea.” (6:97) </span></b></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="231"><b data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">“And marks and sign-posts and by the
stars, (men) guide themselves.” (16:16)</span></b></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">If you become familiar with the constellations and
the stars in the sky, one can never be lost anywhere in the world. They are
truly a guiding light in the canopy of the heavens. You can be anywhere in the world and immediately on looking up
in the night sky and by recognizing stars, you can know what latitude you are
at and where is north and thereby all the other directions. You can know what time of the year it is in
the absence of any calendars. It is
rather appropriate that the crescent moon and star is used as signs to
represent matters of religion among Muslims. The moon holds a most important position for the reckoning of time among
Muslims. The lunar calendar is one of the oldest and a natural calendar system
and astronomers acknowledge that the Muslim calendar is the only purely lunar
calendar in wide use</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="223"><span data-dcnode-id="226" instrument_node="">
</span><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">“They ask you about new crescent
moons, say they are to mark fixed times for mankind and Hajj.” (2:189) </span></b></p><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="221" instrument_node="">
</span><b data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">“And He who made the night for rest
and sun and moon for reckoning of time. This is the decree of the Exalted, the
All-knowing.” (6:96)</span></b></p><b data-dcnode-id="213"><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">“It is He who made sun a lamp, and moon a light and
measured stages so you know number of years and count (of time).” (10:5) </span></p><span data-dcnode-id="214" instrument_node="">
</span></b><p data-dcnode-id="210"><b data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">“And He subjected the sun and the moon (to His law);
each one runs its course for a term appointed.” (13:2), (31:29), (35:13),
and (39:5)</span></b></p><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">It is interesting to note that that the Qur’an
refers to many heavens and earths. It is remarkable that one of the more recent
discoveries in Astronomy has been that of other worlds such as ours.It was as recently as 1995 that the first planet
outside of our solar system was discovered. To date several such planets have
been found and extrasolar planets seem to be the rule rather than the
exception. How many many aeons ago the
Qur’an mentioned this!</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="203"><b data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">“God is the One Who created seven heavens and of the
earth a similar number. The command descends upon them so that you know that
God has power over all things and comprehends all things in His knowledge.”
(65:12)</span></b></p><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="201" instrument_node="">The Qur’an always refers to the sun and moon
differently. The sun is referred to as </span><i data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">siraj</span></i><span data-dcnode-id="198" instrument_node="">
(light) and </span><i data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">zia</span></i><span data-dcnode-id="195" instrument_node=""> (signifies that light
which exists by itself) while the moon is referred to as </span><i data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">nur</span></i><span data-dcnode-id="192" instrument_node=""> – which means derived
light. This is very accurate since the sun is a celestial body that gives off
its own light because of nuclear processes in its interior. However the moon
shines only by reflected light. </span></p><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="187"><b data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">“And made the moon a light in their
midst and made the sun as a (Glorious) lamp.” (71:16) </span></b></p><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">At the time of revelation of the Qur’an, it was a
commonly held belief that the earth stood still and that the sun orbited around
us. After all it seemed logical. Man’s ego was bigger than the universe or so
he thought. It was easier to believe that he lived in the centre of the
universe. </span></p><span data-dcnode-id="183" instrument_node="">
</span><p data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">It was not until the16th century that the astronomer
Copernicus showed otherwise, that the earth orbited around the sun instead.
Just pause and look at the time interval when that piece of information was in
the holy Qur’an. Hostility to Science
generally and Astronomy particularly was the misfortune of the Catholic Church
in the early 16th and 17th century. Let us not imitate them.</span></p><span data-dcnode-id="180" instrument_node="">
</span><p data-dcnode-id="177"><b data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">“It is He who created the night and the day, and the
sun and the moon, all (the celestial bodies) swim along, each in its
orbit.” (21:33)</span></b></p><b data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">
</span></b><p data-dcnode-id="172"><b data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">“And the
moon, we have measured for her mansions (to traverse) till she returns like the
old, (withered, and curved-up like a sickle) date-palm. It is not permitted for
sun to catch-up the moon, nor can the night outstrip the day; each swims along
in (its own) orbit.” (36:39-40) </span></b></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">The stars adorn our night skies and endow one with a sense
of peace with their gentle twinkling. The Qur’an says:</span></p><span data-dcnode-id="168" instrument_node="">
</span><b data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">“Consider those (stars) that rise only to set. And move (in
their orbits) with steady motion. And float
(through space) with floating serene. And yet
overtake (one another) with swift overtaking. And thus
fulfil the (Creator’s) behest!” (79:1-5)</span></b><p data-dcnode-id="165"></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">It is only on the scale of the galaxy that this verse
comes to light! A galaxy is composed of millions and millions of stars. A
galaxy like ours, the Milky Way is a spiral galaxy and rotates. Yes, the stars
do move in an orbit and with steady motion too as they float through
space. They do overtake one another
because in any spiral structure that is rotating, the outer arms will move at a
faster rate than the inner sections and will thereby overtake the stars on the
interior in their motion. The spiral nature of our galaxy was only discovered
in this century since its spiral nature is not easily evident to us as we
reside inside. </span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">There is order, cosmos…not chaos in this tremendous
universe. The moon and earth float in
orbits and they are predictable in their behaviour. It has been shown that if one planet was removed from our
system, our solar system is no longer stable. Comets are predictable and they
return as expected bound by the laws of Physics, God’s laws. Man can never truly invent, he can only
discover. The Universe is predictable
in its behaviour because Allah has subjugated its constituents and they obey
him scrupulously, unlike man who has been granted will.</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="154"><b data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">“Then He turned to the sky when it had
been gas and said to it and the earth, condense willingly or unwillingly. And
they said, “We condensed willingly.” (41:11)</span></b><span data-dcnode-id="155" instrument_node=""> </span></p><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="140"><span data-dcnode-id="152" instrument_node="">Allah only has to say ‘Be’ and a thing is. It is important
to note that present day physics cannot go back to the beginning of time but
only very close to the ‘beginning’. The understanding of the physics of the
universe begins at t = 10 </span><sup data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">–43</span></sup><span data-dcnode-id="149" instrument_node=""> s, i.e. at
0.0000000000000000000000000000000000000000001 s. We now understand that the
early universe was composed of hydrogen and helium gases and some regions were
slightly colder or denser than other regions, these regions condensed to become
galaxies composed off numerous stars within them.</span><span data-dcnode-id="147" style="mso-spacerun:
yes"><span data-dcnode-id="148" instrument_node="">&nbsp; </span></span><span data-dcnode-id="146" instrument_node="">It is as recent as the 1950’s that such ideas have been explored.
Yet there it is in the Qur’an as plain as daylight so many many hundreds of
years ago. Even the concept of time is
worthy of reflecting over. The order of
a second may be comfortable to us but we have been able to use atomic clocks
for timekeeping which have an accuracy of one part in 10</span><sup data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">12</span></sup><sub data-dcnode-id="142"><span data-dcnode-id="143" instrument_node=""> .</span></sub><span data-dcnode-id="141" instrument_node="">or
meaning that if two Caesium clocks are
operated they will differ by no more than 1 s after running for 6000 years! In
these things are signs of our Lord…. Allah alone is worthy of praise!</span></p><span data-dcnode-id="139" instrument_node="">
</span><p data-dcnode-id="136"><b data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">“Consider the
flight of time!” (103:1)</span></b></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">With respect to the expansion of the universe we
find the following verse in the Qur’an:</span></p><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="129"><b data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">“And the universe, we constructed
with power and skill and verily we are expanding it.” (51:47)</span></b></p><span data-dcnode-id="128" instrument_node="">
</span><p data-dcnode-id="126"><span data-dcnode-id="127" instrument_node="">To date all observations show that the Universe is
expanding. Galaxies have been observed
to be receding away from us at higher and higher speeds, the further away they
are. This indicates that we live in an expanding universe. This was discovered
in 1926 by Edwin Hubble. The concept of an expanding universe was so alien at
the time that it owes to it the famous fudge factor by Albert Einstein. His calculations showed that the Universe
should be expanding, but the concept was so bizarre that he included a constant
into the equations so as to obtain a static Universe! This he modified later
when Hubble observed that the Universe was expanding. It is far easier to be
comfortable with the concept of a static universe than one that is
expanding. Yet the Qur’an mentions even
this, our expanding Universe.</span></p><span data-dcnode-id="125" instrument_node="">
</span><p data-dcnode-id="121"><b data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">“He Who created the seven heavens, one
above another: No want of proportion will you see in the creation of Most
Gracious, so turn your face again; Do you see any flaw ... .... And We have
adorned the lowest heaven with lamps ....” (67:3-5)</span></b><span data-dcnode-id="122" instrument_node=""> </span></p><span data-dcnode-id="120" instrument_node="">
</span><h2 data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Contribution of Muslim scholars to the development of Astronomy</span></h2><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">The first verse that was ever revealed to Prophet
Muhammad (UWBP) implores man towards the acquisition of knowledge:</span></p><span data-dcnode-id="114" instrument_node="">
</span><p data-dcnode-id="111"><b data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">“Read in the name of thy Sustainer, who has created –
created man out of a germ cell! Read – for thy
Sustainer is the Most Bountiful One. Who has taught
(man) the use of the pen – Taught man
what he did not know!” (96: 1-5)</span></b></p><b data-dcnode-id="98"><span data-dcnode-id="110" instrument_node="">
</span><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">A quick browsing through the holy Qur’an shows many
Surahs beginning with astronomical references: “Consider
those (stars) that rise only to set” (79:1)</span></p><span data-dcnode-id="107" instrument_node="">
</span><p“consider (85:1)<="" constellations”="" data-dcnode-id="99" full="" great="" of="" p="" sky="" the=""><span data-dcnode-id="106" instrument_node="">
</span><p data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">“Consider the
heavens and that which comes in the night” (86:1)</span></p><span data-dcnode-id="103" instrument_node="">
</span><p data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">“Consider the
sun and its radiant brightness and the moon as it reflects the sun!” (91:1)” …… “Consider the sky
and its wondrous make” (91:5)</span></p><span data-dcnode-id="100" instrument_node="">
</span></p“consider></b><p data-dcnode-id="95"><b data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">“Consider the
night as it veils (the earth) in darkness” (92:1)</span></b></p><span data-dcnode-id="94" instrument_node="">
</span><p data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">It is our moral obligation to study Astronomy! Given the
exposition in the previous section, it would seem natural that Astronomy should
get its impetus first and foremost from Muslim Scholars. And so it was in the
early years of Islam. Sadly, this trend
has suffered a serious decline in the last few centuries. It is really
interesting to note that Muslims were in fact the first to differentiate and
separate the science of Astronomy from the pseudo science of astrology. The development of Astronomy suffered a
great decline and the last of the great Muslim astronomers was Fakhr al-Din
al-Razi (d. 1228 CE). Let us venture back in time and see the richness of the
pursuit of knowledge particularly in Astronomy in the early days of Islam.
Contributions to Astronomy by Muslim scholars will naturally include
contributions to Mathematics and Physics that are indispensable tools for the
study of Astronomy. If the tradition of seeking knowledge as Islam emphasizes
had continued, Astronomy would have continued to flourish among Muslim scholars
and no doubt have been centuries ahead of our time as we have seen from the
expositions in the previous sections as highlighted in the holy Qur’an. </span></p><span data-dcnode-id="91" instrument_node="">
</span><p data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">Greek works were translated by Muslim scholars in Arabic
and they also added encyclopaedias of their own. When Europe later re-awoke,
they translated the Arabic works and the Arabic translations of the Greek
works. Star names were not translated
but transliterated so that to date many many stars names are Arabic in origin.
A look through any catalogue of stars, and one is immediately struck by the
numerous names that appear to be Arabic in origin such as Aldabaran and Deneb.
In an astronomical catalogue of almost 250 stars, over 140 of them had names
that were Arabic in origin. Many new stars were discovered by Muslims. The book
on stars of 'Abd al-Rahman al-Sufi was in fact translated into Spanish by
Alfonso X el Sabio. The Muslims carried out many observations that were
contained in astronomical tables called Zij. One of the most keen observers was
al-Battani. The zij of al-Ma'mun observed in Baghdad, the Hakimite zij of
Cairo, the Toledan Tables of al-Zarqali and his associates, the el-Khanid zij
of Nasir al-Din al-Tusi observed in Maraghah, and the zij of Ulugh-Beg from
Samarqand are among the most famous Islamic astronomical tables. These tables
had significant influence upon Western Astronomy up to the time of Astronomer
Tycho Brahe.</span></p><span data-dcnode-id="88" instrument_node="">
</span><p data-dcnode-id="86"><span data-dcnode-id="87" instrument_node="">In Astronomy the Muslims integrated the astronomical
traditions of the Indians, Persians, the ancient Near East and especially the
Greeks from the 8th century onward. The Almagest of Ptolemy, the name of which
is Arabic in origin, was thoroughly studied and its planetary theory criticized
by several astronomers of both the eastern and western lands of Islam. A major
critique of the theory was developed by Nasir al-Din al-Tusi and his students
especially Qutb al-Din al-Shirazi, in the 13th century. </span></p><span data-dcnode-id="85" instrument_node="">
</span><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">The first astronomical observatory as a scientific
institution was the observatory of Maraghah in Persia established by al-Tusi.
Later European observatories indirectly followed this model. The most famous
astronomical instrument, the astrolabe was developed by Muslims to carry out
observation. There existed even mechanical astrolabes perfected by Ibn Samh
that can be considered as the predecessor of the mechanical clock. </span></p><span data-dcnode-id="82" instrument_node="">
</span><p data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">The Muslims also applied their astronomical knowledge to
questions of time-keeping and the calendar in making almanacs, this word too
being Arabic in origin. The most exact solar calendar existing to this day is
the Jalali calendar which was developed under the direction of 'Umar Khayyam in the 12th century. This is still in use in Persia and
Afghanistan. </span></p><span data-dcnode-id="79" instrument_node="">
</span><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">In the field of Mathematics, Muslims began by integrating
Greek and Indian mathematics. The first great Muslim mathematician,
al-Khwarazmi, who lived in the 9th century, wrote a treatise on arithmetic that
brought the Arabic numerals to the West. He is also the author of the first
book on algebra. The term algebra itself comes from the first part of the name
of the book of al-Khwarazmi, entitled Kirah al-jabr wa'l-muqabalah. Abu Kamil
al-Shuja' discussed algebraic equations with five unknowns. The science was
further developed by such figures as al-Karaji until it reached its peak with
Khayyam who classified by kind and class algebraic equations up to the third
degree. The brothers Banu Musa who lived in the 9th century may be said to be
the first outstanding Muslims in the field of geometry while their contemporary
Thabit ibn Qurrah helped lay foundations of integral calculus. Muslims scholars
also developed trigonometry that was established as a distinct branch of
mathematics by al-Biruni. Calculus, trigonometry and geometry are the
cornerstones of solving problems in Astronomy.</span></p><span data-dcnode-id="76" instrument_node="">
</span><p data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">Other Muslim mathematicians such as Khayyam and al-Tusi
examined Euclidean geometry that is the geometry of flat surfaces. The Muslim
mathematicians, especially al-Battani, Abu'l-Wafa', Ibn Yunus and Ibn
al-Haytham, also developed spherical Astronomy. Euclidean and spherical
geometry are particularly useful in studying the overall geometry of the
Universe in the study of cosmology.</span></p><span data-dcnode-id="73" instrument_node="">
</span><p data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">The works of Ibn Sina, Abu'l-Barakat al-Baghdadi, Ibn
Bajjah and others led to the development of the idea of impetus and momentum,
principles in Physics that are applied to motion of bodies in Astronomy. Another area that is important in Astronomy
is optics. It is very relevant in the development of tools for observation like
telescopes that employ lenses or mirrors. Ibn al-Haytham (the Latin Alhazen)
who lived in the 11th century was one of the greatest student of optics between
Ptolemy and Witelo. Ibn al-Haytham's main work on optics, the Kitab al-manazir,
was also well known in the West as Thesaurus opticus. Ibn al-Haytham studied
the property of lenses, discovered the camera obscura, explained correctly the
process of vision, studied the structure of the eye, and explained for the
first time why the sun and the moon appear larger on the horizon (very simply
put, it is because the thicker layer of atmosphere at the horizon acts as
magnifying lens compared to overhead). His interest in optics was carried out
two centuries later by Qutb al-Din al-Shirazi and Kamal al-Din al-Farisi. It
was Qutb al-Din who gave the first correct explanation of the formation of the
rainbow. </span></p><span data-dcnode-id="70" instrument_node="">
</span><p data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">Muhammad ibn Jabir al-Battani , one of the top twenty
astronomers in the history of civilization comments</span></p><span data-dcnode-id="67" instrument_node="">
</span><p data-dcnode-id="64"><i data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">“ [Astronomy] has a well earned place among
disciplines for its tremendous share in helping man calculate years and months,
provide accurate time, mark seasons, observe increase and decrease in duration
of days and nights, watch locations and eclipses of the sun and the moon,
witness the movements of planets in their faring in alternating places and
signs. Much more may be added by it
through study and scrutiny that invariably leads to further proof and knowledge
of the greatness, wisdom, and power of the Creator (SWT)”</span></i></p><span data-dcnode-id="63" instrument_node="">
</span><p data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">The holy Qur’an is full of gems of expositions in
Astronomy - a sprinkling of which have been highlighted in this article. That in itself should be an inspiration to
Muslim scholars to continue in the present day the pursuit of knowledge in the
Sciences. Like in the days of yore, we
should strive to develop a culture that is scientifically rich in the
understanding of natural phenomena by “men of understanding”. </span></p><span data-dcnode-id="60" instrument_node="">
</span><p data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">In the past few years, there has been a concerted effort
by many well-informed Muslims of the need to use Astronomy for the
establishment of the beginning of the months. In this connection it is useful
to note the following verse from the holy Qur’an:</span></p><span data-dcnode-id="57" instrument_node="">
</span><p data-dcnode-id="54"><b data-dcnode-id="55"><span data-dcnode-id="56" instrument_node="">“The sun and moon
(are subjected) to calculations.” (55:05)</span></b></p><span data-dcnode-id="53" instrument_node="">
</span><p data-dcnode-id="51"><span data-dcnode-id="52" instrument_node="">The informed Muslim community are now taking these matters
very seriously and </span></p><span data-dcnode-id="50" instrument_node="">
</span><p data-dcnode-id="45"><span data-dcnode-id="49" instrument_node="">there is an international effort via CFCO (Committee For
Crescent Observation), an active society since 1978, and the more recent ICOP (Islamic Crescent
Observation Project), both of which include members from all over the world
whose job it is to observe the crescent young moon not only for the months
indicating the beginning Ramadan or its end, but all year long. This issue has been a bone of contention
time and time again among Muslims. In this connection, it would be useful to
highlight the words of noted fiqh scholar Dr. Taha Jabir al-Alwani from his
book Ijtihad</span><sup data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">1</span></sup><span data-dcnode-id="46" instrument_node=""> with respect to the sighting of the moon for the start
and end of the holy month of Ramadan. Dr. al-Alwani in pointing out the necessity and significance of Ijtihad
in relation to Time-Space factor uses the sighting of the moon as an example,
and I quote him:</span></p><span data-dcnode-id="44" instrument_node="">
</span><p data-dcnode-id="41"><i data-dcnode-id="42"><span data-dcnode-id="43" instrument_node="">Ijtihad (1993) Published by
International Institute of Islamic Thought,USA. p. 27</span></i></p><span data-dcnode-id="40" instrument_node="">
</span><p data-dcnode-id="37"><i data-dcnode-id="38"><span data-dcnode-id="39" instrument_node="">”…It could never have
been the prophet’s intention to make life so difficult when he established that
rule. He was, at that time, addressing illiterate people, and the best they
could do to establish the beginning of the month was to see the moon with the
naked eye. They had no other means and Allah (SWT) did not wish to make matters
difficult or impossible for them. But
when there exists more accurate instruments to determine the same fact, it
would be totally unacceptable, and indeed backward looking, if insistence is on
using out-dated and inadequate methods. The message of Islam is intended for all people in all ages; it was
never restricted to the first hijri century Arabs of Makkah. Therefore, to stick to the literal meaning
irrespective of the time factor is a benighted approach which is conducive
neither to enlightment nor to progress.”</span></i></p><span data-dcnode-id="36" instrument_node="">
</span><p data-dcnode-id="34"><span data-dcnode-id="35" instrument_node="">One can be guided by astronomical calculations to help one
to know when and where to search for the crescent moon. This has brought to
light that many countries have hitherto been in error in establishing the
beginning of the new month, Saudi Arabia included. Some have accepted they have been in error and are now revising
their position on that count. It is important that we do not follow blindly but
we seek to understand and convince ourselves of the correctness of methods
employed. The modern era of internet
access and electronic communication seeks to educate and unite us as Muslims
like we never could before.</span></p><span data-dcnode-id="33" instrument_node="">
</span><p data-dcnode-id="28"><span data-dcnode-id="32" instrument_node="">There are now several different softwares available for
calculating the dates and times of new moons, prayer times and qibla
direction. The study of Astronomy is
not something to be afraid of - it enlightens us and guides to a deeper
understanding and appreciation of our religion and recognition of the
omnipotence of our Creator. There is
nothing wrong if in searching for the crescent moon we know when and where to
look for it. Over and over the Qur’an
emphasizes the aspect “for men of understanding”.</span><span data-dcnode-id="30" style="mso-spacerun:
yes"><span data-dcnode-id="31" instrument_node="">&nbsp; </span></span><span data-dcnode-id="29" instrument_node="">We need to listen to that, surely there is great importance and
relevance for it to be repeated so many times</span></p><span data-dcnode-id="27" instrument_node="">
</span><p data-dcnode-id="25"><span data-dcnode-id="26" instrument_node="">The Prophet Muhammad (PBUH) has said “ Seek knowledge from
the cradle to the grave”. Islam is about a lifetime of learning. A lifetime of
learning means we can never know or understand everything. It is a dynamic process
and we must continue to strive at all times.</span></p><span data-dcnode-id="24" instrument_node="">
</span><p data-dcnode-id="21"><b data-dcnode-id="22"><span data-dcnode-id="23" instrument_node="">“Verily, in the
creation of the heavens and the earth, and in the succession of night and day,
there are indeed messages for all who are endowed with insight, (3:190)</span></b></p><b data-dcnode-id="16"><span data-dcnode-id="20" instrument_node="">
</span><p data-dcnode-id="18"><span data-dcnode-id="19" instrument_node="">(and) who
remember God when they stand, and when they sit, and when they lie down to
sleep, and (thus) reflect on the creation of the heavens and the earth: “ O our
Sustainer! Thou hast not created (aught of) this without meaning and purpose.
Limitless art Thou in Thy glory! Keep us safe, then from suffering through
fire!” (3:191)</span></p><span data-dcnode-id="17" instrument_node="">
</span></b><p data-dcnode-id="13"><b data-dcnode-id="14"><span data-dcnode-id="15" instrument_node="">“Praise the
name of your Lord, the Most High, Who creates
and proportions well, Who determines
and guides” (87:1-3)</span></b></p><span data-dcnode-id="12" instrument_node="">
