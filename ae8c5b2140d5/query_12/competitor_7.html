</span><article class="post-12938 ratopic type-ratopic status-publish has-post-thumbnail hentry ratopic_type-basics" data-dcnode-id="542" id="post-12938"><span data-dcnode-id="1077" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">The History of Radio Astronomy</span></h1><span data-dcnode-id="1073" instrument_node=""> </span></header><span data-dcnode-id="1070" instrument_node="">
</span><div class="entry-content" data-dcnode-id="549"><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Radio astronomy is a relatively young branch of astronomical science. Today, some of the most important discoveries about our universe come from radio telescopes.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><div class="nrao-image-cont alignleft" data-dcnode-id="1057" style="width:234px"><a class="open-popup-link" data-dcnode-id="1060" href="#2407"><div class="expand-hover" data-dcnode-id="1062"><svg aria-hidden="true" class="svg-inline--fa fa-expand-arrows-alt fa-w-14" data-dcnode-id="1064" data-fa-i2svg="" data-icon="expand-arrows-alt" data-prefix="fas" focusable="false" role="img" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M448 344v112a23.94 23.94 0 0 1-24 24H312c-21.39 0-32.09-25.9-17-41l36.2-36.2L224 295.6 116.77 402.9 153 439c15.09 15.1 4.39 41-17 41H24a23.94 23.94 0 0 1-24-24V344c0-21.4 25.89-32.1 41-17l36.19 36.2L184.46 256 77.18 148.7 41 185c-15.1 15.1-41 4.4-41-17V56a23.94 23.94 0 0 1 24-24h112c21.39 0 32.09 25.9 17 41l-36.2 36.2L224 216.4l107.23-107.3L295 73c-15.09-15.1-4.39-41 17-41h112a23.94 23.94 0 0 1 24 24v112c0 21.4-25.89 32.1-41 17l-36.19-36.2L263.54 256l107.28 107.3L407 327.1c15.1-15.2 41-4.5 41 16.9z" data-dcnode-id="1065" fill="currentColor"></path></svg></div><img alt="Karl Jansky and his map of the Milky Way" class="attachment-medium size-medium" data-dcnode-id="1061" height="300" loading="lazy" sizes="(max-width: 234px) 100vw, 234px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large-234x300.jpg&amp;raw" srcset="https://public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large-234x300.jpg 234w, https://public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large-600x768.jpg 600w, https://public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large-768x983.jpg 768w, https://public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large-800x1024.jpg 800w, https://public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large.jpg 1500w" width="234"></a><figcaption class="wp-caption-text" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Karl Janksy circa 1930's</span></figcaption></div><div class="lightbox-container" data-dcnode-id="1051"><div class="white-popup mfp-hide" data-dcnode-id="1052" id="2407" style="width:1500px"><img alt="" data-dcnode-id="1056" height="1920" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//public.nrao.edu/wp-content/uploads/2013/09/gallery-images-largeJanskywGraph_large.jpg&amp;raw" width="1500"><span data-dcnode-id="1055" instrument_node="">
</span><div class="lightbox-caption" data-dcnode-id="1053" style="width:100%"><span data-dcnode-id="1054" instrument_node="">Karl Janksy circa 1930's</span></div></div></div><span data-dcnode-id="1050" instrument_node="">
</span><div data-dcnode-id="1031"><span data-dcnode-id="1049" instrument_node="">
</span><h3 class="jumpto-section" data-dcnode-id="1047" id="accidental"><span data-dcnode-id="1048" instrument_node="">A Surprise Discovery Leads to Radio Astronomy</span></h3><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Radio astronomy was born early in the 20th century. In 1932, a young engineer for Bell Laboratories named Karl G. Jansky tackled a puzzling problem: noisy static was interfering with short-wave radio transatlantic voice communications. After months of tracking the source, he noticed that it shifted slowly across the sky. What could this be? Stumped, he consulted with an astronomer and came to a startling conclusion:</span></p><span data-dcnode-id="1043" instrument_node="">
</span><blockquote data-dcnode-id="1036"><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">“I have taken more data which indicated definitely that the stuff, whatever it is, comes from something not only extraterrestrial, but from outside the solar system. It comes from a direction that is fixed in space and the surprising thing is that …[it] is in the direction towards which the solar system is moving in space. According to Skellett…there are clouds of “cosmic dust” in that direction…”</span></p><span data-dcnode-id="1040" instrument_node="">
</span><div class="attribution" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Karl Jansky</span></div><span data-dcnode-id="1037" instrument_node="">
</span></blockquote><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Jansky had discovered something at the heart of the Milky Way Galaxy. His work led to one of the most important papers in the history of astronomy in the 20th century, called “Radio Waves from Outside the Solar System”, published in 1933. His work laid the foundation for the science of radio astronomy!</span></p><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1030" instrument_node="">
</span><h3 class="jumpto-section" data-dcnode-id="1028" id="lgm"><span data-dcnode-id="1029" instrument_node="">Radio Astronomy and “Little Green Men”</span></h3><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">One of the most famous radio astronomy discoveries occurred in 1967 when a young graduate student named Jocelyn Bell noticed a strange signal in a printout from a radio telescope she helped to build.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><blockquote data-dcnode-id="1017"><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">“My eureka moment was in the dead of night, the early hours of the morning, on a cold, cold night, and my feet were so cold they were aching. But when the result poured out of the charts, you just forget all that. You realize instantly how significant this is – what you’ve really landed on – and it’s great!”</span></p><span data-dcnode-id="1021" instrument_node="">
</span><div class="attribution" data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Jocelyn Bell</span></div><span data-dcnode-id="1018" instrument_node="">
</span></blockquote><span data-dcnode-id="1016" instrument_node="">
</span><div class="nrao-image-cont alignright" data-dcnode-id="1007" style="width:300px"><a class="open-popup-link" data-dcnode-id="1010" href="#11412"><div class="expand-hover" data-dcnode-id="1012"><svg aria-hidden="true" class="svg-inline--fa fa-expand-arrows-alt fa-w-14" data-dcnode-id="1014" data-fa-i2svg="" data-icon="expand-arrows-alt" data-prefix="fas" focusable="false" role="img" viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg"><path d="M448 344v112a23.94 23.94 0 0 1-24 24H312c-21.39 0-32.09-25.9-17-41l36.2-36.2L224 295.6 116.77 402.9 153 439c15.09 15.1 4.39 41-17 41H24a23.94 23.94 0 0 1-24-24V344c0-21.4 25.89-32.1 41-17l36.19 36.2L184.46 256 77.18 148.7 41 185c-15.1 15.1-41 4.4-41-17V56a23.94 23.94 0 0 1 24-24h112c21.39 0 32.09 25.9 17 41l-36.2 36.2L224 216.4l107.23-107.3L295 73c-15.09-15.1-4.39-41 17-41h112a23.94 23.94 0 0 1 24 24v112c0 21.4-25.89 32.1-41 17l-36.19-36.2L263.54 256l107.28 107.3L407 327.1c15.1-15.2 41-4.5 41 16.9z" data-dcnode-id="1015" fill="currentColor"></path></svg></div><img alt="Picture2" class="attachment-medium size-medium" data-dcnode-id="1011" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//public.nrao.edu/wp-content/uploads/2018/08/Picture2-300x200.jpg&amp;raw" srcset="https://public.nrao.edu/wp-content/uploads/2018/08/Picture2-300x200.jpg 300w, https://public.nrao.edu/wp-content/uploads/2018/08/Picture2.jpg 468w" width="300"></a><figcaption class="wp-caption-text" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Jocelyn Bell at Cambridge in 1968</span></figcaption></div><div class="lightbox-container" data-dcnode-id="1001"><div class="white-popup mfp-hide" data-dcnode-id="1002" id="11412" style="width:468px"><img alt="" data-dcnode-id="1006" height="312" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//public.nrao.edu/wp-content/uploads/2018/08/Picture2.jpg&amp;raw" width="468"><span data-dcnode-id="1005" instrument_node="">
</span><div class="lightbox-caption" data-dcnode-id="1003" style="width:100%"><span data-dcnode-id="1004" instrument_node="">Jocelyn Bell at Cambridge in 1968</span></div></div></div><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">What did she find? At first it wasn’t clear. The object produced strong radio pulses at a regular rate, about 30 times a second. Bell and her colleagues first called the object LGM-1, since they joked that the regular pulses could be from “Little Green Men,” though they understood that it was an as-yet-unexplained natural phenomenon.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="996" instrument_node="">The signals turned out to be flashes of radio emissions from a weird object called a pulsar. Pulsars are what remains after a massive star collapses and then explodes as a </span><span class="mytooltip" data-dcnode-id="985"><span class="glossary-word" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">supernova</span></span><span class="tooltiptext lefttooltip" data-dcnode-id="986" style="left: 0px;"><span class="close-tip" data-dcnode-id="990"><svg aria-hidden="true" class="svg-inline--fa fa-times fa-w-11 close-tip" data-dcnode-id="992" data-fa-i2svg="" data-icon="times" data-prefix="fa" focusable="false" role="img" viewBox="0 0 352 512" xmlns="http://www.w3.org/2000/svg"><path d="M242.72 256l100.07-100.07c12.28-12.28 12.28-32.19 0-44.48l-22.24-22.24c-12.28-12.28-32.19-12.28-44.48 0L176 189.28 75.93 89.21c-12.28-12.28-32.19-12.28-44.48 0L9.21 111.45c-12.28 12.28-12.28 32.19 0 44.48L109.28 256 9.21 356.07c-12.28 12.28-12.28 32.19 0 44.48l22.24 22.24c12.28 12.28 32.2 12.28 44.48 0L176 322.72l100.07 100.07c12.28 12.28 32.2 12.28 44.48 0l22.24-22.24c12.28-12.28 12.28-32.19 0-44.48L242.72 256z" data-dcnode-id="993" fill="currentColor"></path></svg></span><span class="tooltipterm" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Supernova</span></span><span data-dcnode-id="987" instrument_node="">The extremely violent explosion of a star many times more massive than our Sun after the nuclear furnace at its core can no longer balance out the force of gravity. During this explosion, these stars may become as bright as all the other stars in a galaxy combined, and in which a great deal of matter is thrown off into space at high velocity and high energy. The remnant of these massive stars collapse into either a neutron star or a black hole.</span></span></span><span data-dcnode-id="984" instrument_node="">. It sends clouds of debris into space, leaving behind a massive compressed object made entirely of neutrons. The pulsar Bell discovered spins on its axis 30 times a second, sending out a beacon with each spin. It is almost like the ticking of a clock.</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Today, we know of more than 2,000 pulsars. For some, such as the pulsar at the center of the Crab Nebula, we can also see the glowing debris of the massive star. Radio astronomers focus on the ticking pulsar at the heart of the explosion.</span></p><span data-dcnode-id="979" instrument_node="">
</span><h3 class="jumpto-section" data-dcnode-id="977" id="blocks"><span data-dcnode-id="978" instrument_node="">Radio Astronomy and the Building Blocks of Planetary Systems</span></h3><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">One of the most intriguing questions we can ask is about our own place in the universe, the solar system. How did it form? What conditions had to exist to allow life to form on our planet? The Atacama Large Millimeter/submillimeter Array (ALMA) was built to study the cold, dark portions of the universe, like the regions that give birth to infant solar systems. These regions are known as stellar nurseries. The Orion Nebula is a well-known stellar nursery that also appears to have infant planetary systems embedded in its clouds of gas and dust. ALMA scientists continue to study this nebula. Radio emissions as well as infrared light can travel right through those thick clouds of gas and dust, “lifting the veil” on the processes of star and planet formation.</span></p><span data-dcnode-id="973" instrument_node="">
</span><figure aria-describedby="caption-attachment-10066" class="wp-caption aligncenter" data-dcnode-id="969" id="attachment_10066" style="width: 1170px"><img alt="Image of part of the Orion Nebula" class="wp-image-10066 size-full" data-dcnode-id="972" height="246" sizes="(max-width: 1170px) 100vw, 1170px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6.jpg&amp;raw" srcset="https://public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6.jpg 1170w, https://public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6-600x126.jpg 600w, https://public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6-300x63.jpg 300w, https://public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6-768x161.jpg 768w, https://public.nrao.edu/wp-content/uploads/2018/03/nrao18cb6-1024x215.jpg 1024w" width="1170"><figcaption class="wp-caption-text" data-dcnode-id="970" id="caption-attachment-10066"><span data-dcnode-id="971" instrument_node="">This spectacular and unusual image shows part of the famous Orion Nebula, a star formation region lying about 1350 light-years from Earth. It combines a mosaic of millimeter wavelength images from the Atacama Large Millimeter/submillimeter Array (ALMA) and the IRAM 30-metre telescope, shown in red, with a more familiar infrared view from the HAWK-I instrument on ESO’s Very Large Telescope shown in blue. The group of bright blue-white stars at the left is the Trapezium Cluster, hot young stars that are only a few million years old.</span></figcaption></figure><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">What have astronomers found using radio astronomy to study this region? The cloud is threaded with filaments of cold gas that could well collapse someday to form stars and their planets.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Elsewhere in the galaxy, ALMA has detected traces of a molecule called called methyl isocyanate. This poisonous material turns out to be a precursor molecule that can combine with other molecules to form pre-biotic organic compounds called peptides which are one of the early building blocks of DNA.. In other words, ALMA is helping astronomers to detect precursors to life and giving clues to how life might have arisen in our own solar system billions of years ago.</span></p><span data-dcnode-id="962" instrument_node="">
</span><h3 class="jumpto-section" data-dcnode-id="960" id="gravWaves"><span data-dcnode-id="961" instrument_node="">Radio Astronomy Helps Understand the Cause of Gravitational Waves</span></h3><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="958" instrument_node="">Gravitational waves grabbed the headlines in recent years when they were first detected. But what causes them? The Karl G. Jansky Very Large Array played a role in studying the physics of these cosmic catastrophes. Three months of observations from several observatories led researchers to a titanic collision of neutron stars in a galaxy 130 million light-years from Earth. </span><span class="mytooltip" data-dcnode-id="947"><span class="glossary-word" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Neutron stars</span></span><span class="tooltiptext lefttooltip" data-dcnode-id="948" style="left: 0px;"><span class="close-tip" data-dcnode-id="952"><svg aria-hidden="true" class="svg-inline--fa fa-times fa-w-11 close-tip" data-dcnode-id="954" data-fa-i2svg="" data-icon="times" data-prefix="fa" focusable="false" role="img" viewBox="0 0 352 512" xmlns="http://www.w3.org/2000/svg"><path d="M242.72 256l100.07-100.07c12.28-12.28 12.28-32.19 0-44.48l-22.24-22.24c-12.28-12.28-32.19-12.28-44.48 0L176 189.28 75.93 89.21c-12.28-12.28-32.19-12.28-44.48 0L9.21 111.45c-12.28 12.28-12.28 32.19 0 44.48L109.28 256 9.21 356.07c-12.28 12.28-12.28 32.19 0 44.48l22.24 22.24c12.28 12.28 32.2 12.28 44.48 0L176 322.72l100.07 100.07c12.28 12.28 32.2 12.28 44.48 0l22.24-22.24c12.28-12.28 12.28-32.19 0-44.48L242.72 256z" data-dcnode-id="955" fill="currentColor"></path></svg></span><span class="tooltipterm" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Neutron Star</span></span><span data-dcnode-id="949" instrument_node="">A small compressed core of a star that has gone through supernova (star explosion). These stars are almost completely made up of only neutrons and have a strong gravitational field. </span></span></span><span data-dcnode-id="946" instrument_node=""> are superdense objects left over from the deaths of massive stars. They are magnetically active, and have very strong gravitational fields. When these monsters collide, they not only send gravitational waves out through space, but they also give off strong radio emissions. That’s what the VLA, plus the Australia Telescope Compact Array and the Giant Metrewave Radio Telescope in India combined to study. The merger set off a huge outburst of energy and material and gave scientists new insight into the phenomenon behind the creation of gravitational waves.</span></p><span data-dcnode-id="944" instrument_node="">
</span><div data-dcnode-id="577" style="padding: 56.25% 0 0 0; position: relative;"><iframe allowfullscreen="allowfullscreen" data-dcnode-id="578" frameborder="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/237773390%3Fbyline%3D0%26portrait%3D0&amp;raw" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"><html data-dcnode-id="580" lang="en"><head data-dcnode-id="918"><meta charset="utf-8"><span data-dcnode-id="942" instrument_node=""> </span><meta charset="utf-8" data-dcnode-id="941"/><span data-dcnode-id="940" instrument_node=""> </span><meta content="width=device-width,initial-scale=1,user-scalable=yes" data-dcnode-id="939" name="viewport"/><span data-dcnode-id="938" instrument_node=""> </span><link data-dcnode-id="937" href="https://vimeo.com/237773390" rel="canonical"/><span data-dcnode-id="936" instrument_node=""> </span><title data-dcnode-id="934">Radio Waves: Unlocking Secrets of Neutron-Star Collision from NRAO Outreach on Vimeo</title><span data-dcnode-id="933" instrument_node=""> </span><span data-dcnode-id="930" instrument_node=""> </span><span data-dcnode-id="925" instrument_node=""> </span><span data-dcnode-id="923" instrument_node=""> </span><link data-dcnode-id="922" href="https://f.vimeocdn.com/p/4.0.5/css/player.css" rel="stylesheet"/></meta></head><span data-dcnode-id="917" instrument_node=""> </span><body class="vp-center" data-dcnode-id="581"><span data-dcnode-id="916" instrument_node=""> </span><span data-dcnode-id="915" instrument_node=""> </span><div class="player player-9af06fbd-3729-484e-b854-a735184e9147 js-player-fullscreen with-fullscreen with-sticky-custom-logo player-normal player-md player-cardsCorner" data-dcnode-id="586" id="player" style="max-width: calc(177.778vh); height: calc(56.25vw);"><div class="vp-video-wrapper transparent" data-dcnode-id="899"><div class="vp-video" data-dcnode-id="911"><div class="vp-telecine invisible" data-dcnode-id="912"><video data
