</span><p data-dcnode-id="937"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Meade 16" LX200GPS Schmidt-Cassegrain Astronomical Telescope</span></strong><span data-dcnode-id="938" instrument_node="">:</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="935" instrument_node="">Now installed in hundreds of school and college observatories, as well as those of advanced amateurs, around the world, </span><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Meade LX200 GPS 16" Telescope</span></strong><span data-dcnode-id="932" instrument_node=""> is the largest </span><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Schmidt-Cassegrain Telescope</span></strong><span data-dcnode-id="929" instrument_node=""> currently in production. For the advanced amateur who can appreciate what a research-class instrument can bring to his or her observing program, or for the school or college astronomy department seeking a first-class </span><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">teaching telescope</span></strong><span data-dcnode-id="926" instrument_node="">, </span><strong data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsplanet.com/meade-16-lx200gps-telescopes.html"><span data-dcnode-id="925" instrument_node="">Meade 16" LX 200 GPS</span></a></strong><span data-dcnode-id="922" instrument_node=""> is without equal. As imaging tools, </span><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Meade 16" LX200GPS Schmidt-Cassegrains</span></strong><span data-dcnode-id="919" instrument_node=""> have been responsible for some of the most impressive results ever obtained by amateurs or professionals.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Features of Meade LX200GPS Telescopes</span></strong><span data-dcnode-id="914" instrument_node="">:</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="902"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">1.</span></strong><span data-dcnode-id="909" instrument_node=""> </span><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Meade Ultra High Transmission Coatings UHTC</span></strong><span data-dcnode-id="906" instrument_node="">: </span><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Meade UHTC Group</span></strong><span data-dcnode-id="903" instrument_node=""> increases total light transmission and image brightness by nearly 20% over Meade's standard coatings. Objects such as stars, galaxies and nebulae will appear significantly brighter.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="886"><img align="left" alt="Meade Autostar II" border="0" controls="" data-dcnode-id="900" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op1.0ps.us/external/meade-autostar-ii.jpg&amp;raw"><span data-dcnode-id="899" instrument_node=""> </span><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">2.</span></strong><span data-dcnode-id="896" instrument_node=""> </span><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">State-of-the-Art Optical System</span></strong><span data-dcnode-id="893" instrument_node="">: Water white glass is standard equipment in all</span><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node=""> Meade Schmidt-Cassegrain Telescopes</span></strong><span data-dcnode-id="890" instrument_node=""> corrector lenses. Water white glass delivers an increase of light transmission in excess of 10% as compared to competing </span><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Schmidt Cassegrain Telescopes</span></strong><span data-dcnode-id="887" instrument_node=""> using green soda lime glass.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="876"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">3.</span></strong><span data-dcnode-id="882" instrument_node=""> </span><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Zero Image-Shift Microfocuser</span></strong><span data-dcnode-id="879" instrument_node=""> allows you to obtain precise image focus with no image movement. Operates at 4 speeds. Accepts both </span><strong data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">2" and 1.25" telescope eyepieces.</span></strong></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="868"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">4.</span></strong><span data-dcnode-id="872" instrument_node=""> </span><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Primary Mirror Lock</span></strong><span data-dcnode-id="869" instrument_node=""> locks the mirror in place during long-exposure photography.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="850"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">5.</span></strong><span data-dcnode-id="864" instrument_node=""> </span><strong data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Oversize Primary Mirror</span></strong><span data-dcnode-id="861" instrument_node=""> diameters are greater than their listed aperture (e.g., the diameter of the </span><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Meade 8" LX200 GPS</span></strong><span data-dcnode-id="858" instrument_node=""> is actually 8.25"). This additional 1/4" yields a wide, fully illuminated field-of-view. The result is that </span><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Meade LX200GPS Schmidt Cassegrains</span></strong><span data-dcnode-id="855" instrument_node=""> have brighter off-axis field illuminations (aperture-for aperture) than competing </span><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Schmidt Cassegrain Telescopes</span></strong><span data-dcnode-id="852" instrument_node=""> using non-oversized mirrors.</span><img align="right" alt="Meade LX200 GPS Focuser" border="0" controls="" data-dcnode-id="851" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op1.0ps.us/external/meade-lx200-gps-focuser.jpg&amp;raw"></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="839"><strong data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">6.</span></strong><span data-dcnode-id="846" instrument_node=""> </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Meade Smart Drive</span></strong><span data-dcnode-id="843" instrument_node=""> provides permanent </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">periodic error correction</span></strong><span data-dcnode-id="840" instrument_node=""> (PPEC) on both axes by learning and averaging error over the course of one or more training periods, thereby minimizing guiding corrections during long-exposure photographs. PPEC is available on both axes and functions in both polar and altazimuth modes.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="828"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">7.</span></strong><span data-dcnode-id="835" instrument_node=""> </span><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Sony GPS Receiver Sensor</span></strong><span data-dcnode-id="832" instrument_node=""> automatically inputs precise time, date, and geographical location to help quickly and precisely align </span><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Meade LX200 GPS Telescope</span></strong><span data-dcnode-id="829" instrument_node="">.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="812"><img align="left" alt="Meade LX200 GPS Auto Align" border="0" data-dcnode-id="826" hspace="10" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//op1.0ps.us/external/meade-lnt-align.jpg&amp;raw"><span data-dcnode-id="825" instrument_node=""> </span><strong data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">8.</span></strong><span data-dcnode-id="822" instrument_node=""> </span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Meade LNT</span></strong><span data-dcnode-id="819" instrument_node=""> - Patented </span><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Level-North Technology</span></strong><span data-dcnode-id="816" instrument_node=""> allows you to quickly and precisely align your telescope by automatically leveling </span><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Meade LX 200 GPS Telescope</span></strong><span data-dcnode-id="813" instrument_node=""> and determining True North. It then automatically slews the telescope to the first alignment star.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="804"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">9.</span></strong><span data-dcnode-id="808" instrument_node=""> </span><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Meade Smart Mount</span></strong><span data-dcnode-id="805" instrument_node=""> constantly refines pointing accuracy each time an object is centered and updated. Compatible with both equatorial and altazimuth mounts.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="781"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">10.</span></strong><span data-dcnode-id="800" instrument_node=""> </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Meade AutoStar II Controller</span></strong><span data-dcnode-id="797" instrument_node=""> features "Hot Keys" for quick access to a 145,000 celestial object database. </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Meade AutoStar II Telescope Computer Controller</span></strong><span data-dcnode-id="794" instrument_node=""> can be updated with the latest software upgrades, guided tours and timely objects like comets free. </span><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Meade AutoStar II Computer Controller</span></strong><span data-dcnode-id="791" instrument_node=""> helps you quickly find, and GoTo over 145,000 objects in the night sky. View planets, stars, galaxies, nebulae and comets-all at the push of a button. You don't already know the night sky? Let </span><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Meade Preprogrammed Tonight's Best</span></strong><span data-dcnode-id="788" instrument_node=""> tour in your </span><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">AutoStar</span></strong><span data-dcnode-id="785" instrument_node=""> automatically point your </span><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Meade LX200GPS Telescope</span></strong><span data-dcnode-id="782" instrument_node=""> to the best objects in the sky. Astronomy has never been so easy and rewarding.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="764"><strong data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Equatorial Wedges</span></strong><span data-dcnode-id="777" instrument_node="">: For placement of </span><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Meade LX200GPS Telescopes</span></strong><span data-dcnode-id="774" instrument_node=""> in the equatorial mode during long-exposure CCD imaging or photography, three optional equatorial wedges are available: </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opticsplanet.com/meade-8in-equatorial-wedge-for-8in-lx200-series.html"><span data-dcnode-id="773" instrument_node="">Meade Standard Equatorial Wedge for 8" Meade SCT Telescopes</span></a><span data-dcnode-id="771" instrument_node="">; </span><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Meade 10"/12" Superwedge for 10" and 12" LX200GPS models</span></strong><span data-dcnode-id="768" instrument_node="">; and </span><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Meade 14" Superwedge for Meade 14" LX200 GPS Telescope</span></strong><span data-dcnode-id="765" instrument_node="">.</span></p><span data-dcnode-id="763" instrument_node="">
