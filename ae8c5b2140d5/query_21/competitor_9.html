</span><div class="wrapper-post-content" data-dcnode-id="475"><span data-dcnode-id="1145" instrument_node="">
</span><div class="content content--post" data-dcnode-id="557"><span data-dcnode-id="1144" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="1143" data-url="https://skyandtelescope.org/astronomy-equipment/how-to-choose-a-telescope/"></div><span data-dcnode-id="1142" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="1140"><img alt="" class="wp-image-255507462628" data-dcnode-id="1141" height="488" loading="lazy" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/WEB_HEADER-800x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-800x600.jpg 800w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-253x190.jpg 253w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-113x85.jpg 113w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-768x576.jpg 768w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-1044x783.jpg 1044w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-632x474.jpg 632w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER-536x402.jpg 536w, https://skyandtelescope.org/wp-content/uploads/WEB_HEADER.jpg 1300w" width="650"></figure><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">This is an exciting time to become an amateur astronomer. Never before have novice stargazers been presented with such a vast array of telescopes and accessories to pursue their hobby. Naturally, this brings the burden of choice: the bewildering variety makes it hard for an uninformed consumer to make the right decision on what type of telescope to buy.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Whether you're seriously considering buying your first telescope or just daydreaming about it, this guide will help you narrow your options. We'll start by exploring the basic features common to all telescopes, and then look at some specific designs. We'll also look at the tradeoffs, because every instrument has its advantages and disadvantages.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">Before you buy anything, you must determine what's important to </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">you</span></em><span data-dcnode-id="1129" instrument_node="">. What do you most want to look at? How dark is your sky? How experienced an observer are you? How much are you prepared to spend? Where will you store your telescope, and how much weight are you willing to carry? Answer these key questions, familiarize yourself with what's on the market, and you'll be well on your way to choosing a telescope that will satisfy you for many years to come.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">This guide concentrates on visual observing, as opposed to astrophotography. It’s easy to take snapshots of the Moon through any telescope, but long-exposure photos of galaxies and nebulae require lots of time, patience, and specialized equipment. If you’re new to astronomy, it’s smart to gain a thorough grounding in visual astronomy before you contemplate astrophotography. It’s often cheaper to buy one telescope that’s specialized for visual observing and a separate scope for astrophotography than to buy a single scope that is suitable for both jobs.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Before examining the different telescopes available, it's worth knowing the basics of how they work.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><h2 data-dcnode-id="1119" id="h-aperture-a-telescope-s-most-crucial-specification"><span data-dcnode-id="1120" instrument_node="">Aperture: A Telescope's Most Crucial Specification</span></h2><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1117" instrument_node="">The most important aspect of any telescope is its </span><strong data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">aperture</span></strong><span data-dcnode-id="1114" instrument_node="">, the diameter of its main optical component, which can be either a lens or a mirror. A scope's aperture determines both its light-gathering ability (how </span><em data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">bright</span></em><span data-dcnode-id="1111" instrument_node=""> the image appears) and its resolving power (how </span><em data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">sharp</span></em><span data-dcnode-id="1108" instrument_node=""> the image appears). Apertures commonly recommended for beginner telescopes range anywhere from 2.8 inches (70 mm) up to 10 inches.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">In general, the larger a telescope’s aperture, the more impressive any given object will look. Let’s compare the extremes: Small objects such as planets appear much crisper and more detailed through a 10-inch scope, and faint objects such as galaxies and nebulae appear bolder. That’s hardly surprising considering that the large aperture gathers nearly 13 time more light than one only 2.8 inches across.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Does that mean you should rush out and buy the biggest telescope that you can afford? Not necessarily. Telescopes with big lenses or mirrors tend to be heavy and bulky. That may not be a problem if you keep your scope stored in a shed and wheel it out for use, but a bulky telescope could be a show-stopper if you need to carry it up and down many flights of stairs, want to take it on an airplane, or store it in a cramped apartment.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Although it may be less capable, even the smallest telescope is a huge improvement over your unaided eyes, which have a measly 7 mm (0.28 inch) aperture at best. That means that a little 70-mm scope gathers 100 times as much light as your eyes, revealing amazing detail on the Moon and pleasing views of all the planets, as well as showing hundreds of star clusters, nebulae, and galaxies.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/subscribe" id="subscribepost" rel="noopener" target="_blank"><img alt="" class="wp-image-255507457195" data-dcnode-id="1094" height="90" loading="lazy" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a.jpg 720w, https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a-300x38.jpg 300w, https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a-113x14.jpg 113w" width="720"></a></figure><span data-dcnode-id="1091" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1090"><span data-dcnode-id="1089" instrument_node="">
</span><h2 data-dcnode-id="1087" id="h-magnification"><span data-dcnode-id="1088" instrument_node="">Magnification</span></h2><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1085" instrument_node="">When seeing a telescope for the first time, a novice often asks, "How much does it magnify?" The answer is, "Any amount you want." Any telescope can provide an almost infinite range of magnifications, depending on the </span><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">eyepiece</span></strong><span data-dcnode-id="1082" instrument_node=""> that you use with it.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1079" instrument_node="">But don't get the idea that super-high powers will do you much good. Two main factors limit how much power you can use productively with a given instrument: </span><em data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">aperture</span></em><span data-dcnode-id="1076" instrument_node=""> (again) and </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">atmospheric conditions</span></em><span data-dcnode-id="1073" instrument_node="">.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Only so much detail exists in the image created by a telescope's main mirror or lens, so you must find the optimum range of magnifications to see this detail — without spreading out the target's precious light too much, making a dim object too dim to see, or turning a bright object into a big blur.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1061"><img alt="View through different telescopes" class="wp-image-255507461049" data-dcnode-id="1067" height="328" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Saturn-three-ways-900x328.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Saturn-three-ways-900x328.jpg 900w, https://skyandtelescope.org/wp-content/uploads/Saturn-three-ways-300x109.jpg 300w, https://skyandtelescope.org/wp-content/uploads/Saturn-three-ways-113x41.jpg 113w, https://skyandtelescope.org/wp-content/uploads/Saturn-three-ways-768x280.jpg 768w, https://skyandtelescope.org/wp-content/uploads/Saturn-three-ways.jpg 1000w" width="900"><figcaption data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node="">These images were made by manipulating a Hubble Space Telescope photo to simulate Saturn’s appearance through different size telescopes. The image at left shows how Saturn looks through a 2.8-inch scope. This view can be made bigger by using an eyepiece with higher magnification (center), but then the view is dim and fuzzy. To see a comparably bright and crisp view, you'd need a bigger aperture (right). </span><br data-dcnode-id="1065"><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">NASA / JPL</span></em></figcaption></figure><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">How much power is too much? As a good rule of thumb, a telescope’s top useful magnification is </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">50 times your telescope's aperture in inches,</span></em><span data-dcnode-id="1056" instrument_node=""> or </span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">twice its aperture in millimeters</span></em><span data-dcnode-id="1053" instrument_node="">. And that's if the scope has perfect optics and the night air happens to be unusually steady. In other words, a high-quality 4-inch (100-mm) scope should not be pushed much beyond 200×. So if you see a 60-mm department-store telescope scope labeled as delivering "300 power!!!", you'll know it's advertising hype, and you’d be wise to keep shopping.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1044"><img alt="" class="wp-image-255493460" data-dcnode-id="1050" height="275" loading="lazy" sizes="(max-width: 480px) 100vw, 480px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Markarians-chain-Joe-Renzetti-480x274.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Markarians-chain-Joe-Renzetti-480x274.jpg 480w, https://skyandtelescope.org/wp-content/uploads/Markarians-chain-Joe-Renzetti-480x274-300x172.jpg 300w" width="480"><figcaption data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">This field near the center of the Virgo Galaxy Cluster is spectacular when viewed at low magnification through a large-aperture telescope under pristine dark skies. </span><br data-dcnode-id="1048"><em data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Joe Renzetti</span></em></figcaption></figure><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">In practice, the optimum magnification for most objects is somewhere between about 8× and 40× per inch of aperture — toward the low end for most deep-sky objects (star clusters, nebulae, and galaxies) and the high end for the Moon and planets. And deep-sky observers frequently use magnifications of 4× per inch of aperture or even lower to achieve the largest possible field of view. That’s important when viewing huge objects like the Pleiades Cluster and Andromeda Galaxy, or for browsing fields containing multiple galaxies, star clusters, or nebulae.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">So the overall range of practical magnifications is roughly 4× to 50× per inch of aperture, with powers between 8× and 40× per inch of aperture being especially useful.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1036"><span data-dcnode-id="1035" instrument_node="">
</span><div class="c-ad--label" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Advertisement</span></div><span data-dcnode-id="1032" instrument_node="">
</span><div data-dcnode-id="1028" id="div-gpt-ad-2755042-4"><span data-dcnode-id="1031" instrument_node="">
</span></div><span data-dcnode-id="1027" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1023" id="h-focal-length-and-eyepieces"><span data-dcnode-id="1024" instrument_node="">Focal Length and Eyepieces</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Now you know the range of useful magnifications for any given instrument. But how do you get them? What do those little numbers on the eyepieces tell you about the magnification they give?</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1018" instrument_node="">Every scope has a </span><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">focal length</span></strong><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">,</span></em><span data-dcnode-id="1013" instrument_node=""> which is effectively the distance from the main lens or mirror to the image it forms. (This is not always the same as the length of the tube, since, as we'll see later, some telescopes "fold" the light path internally.) Focal length is the large number you'll often see printed or engraved on the front or back of the scope, usually between about 400 and 3,000 millimeters.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><figure class="wp-block-image size-medium is-resized" data-dcnode-id="1004"><img alt="" class="wp-image-255507462091" data-dcnode-id="1010" sizes="(max-width: 296px) 100vw, 296px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/galileo-label-296x190.png&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/galileo-label-296x190.png 296w, https://skyandtelescope.org/wp-content/uploads/galileo-label-113x73.png 113w, https://skyandtelescope.org/wp-content/uploads/galileo-label.png 492w" width="310"><figcaption data-dcnode-id="1005"><span data-dcnode-id="1009" instrument_node="">The focal length is often found on the front or back of the telescope. For this 135 mm (5.3-inch) Galileo telescope, it is 1,100 mm.</span><br data-dcnode-id="1008"><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Sean Walker / Sky &amp; Telescope</span></em></figcaption></figure><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">Eyepieces have focal lengths too — 25mm or 10mm, for example&nbsp;. To find the magnification any combination of telescope and eyepiece yields, simply divide the focal length of the scope by that of the eyepiece. For instance, a 1,000-mm focal-length scope, used with a 25-mm eyepiece, delivers 1,000 / 25 = 40 power (or 40×). Switch to an eyepiece with a shorter focal length for higher magnifications: a 10-mm eyepiece used on the same scope delivers 1,000 / 25 = 100×. Notice that it’s only the telescope’s focal length that matters here — the size of its main mirror or lens does not affect the magnification. Our </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/observing/telescope-calculator/"><span data-dcnode-id="1001" instrument_node="">telescope calculator tool</span></a><span data-dcnode-id="999" instrument_node=""> offers an easy way to make these calculations.</span></p><span data-dcnode-id="997" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="990"><img alt="" class="wp-image-255507462093" data-dcnode-id="996" height="600" loading="lazy" sizes="(max-width: 287px) 100vw, 287px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Plossl-32mm-copy-287x600.png&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Plossl-32mm-copy-287x600.png 287w, https://skyandtelescope.org/wp-content/uploads/Plossl-32mm-copy-91x190.png 91w, https://skyandtelescope.org/wp-content/uploads/Plossl-32mm-copy-54x113.png 54w, https://skyandtelescope.org/wp-content/uploads/Plossl-32mm-copy.png 331w" width="287"><figcaption data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">This classic Plossl eyepiece has a focal length of 32 mm.</span><br data-dcnode-id="994"><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Sean Walker / Sky &amp; Telescope</span></em></figcaption></figure><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">A telescope’s focal length divided by its aperture is called its </span><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">focal ratio</span></strong><span data-dcnode-id="985" instrument_node="">, which is conventionally written as “f/” followed by a number. For instance, a 6-inch f/8 telescope has an aperture of 6 inches and a focal ratio of f/8. That means that its focal length is 6×8 = 48 inches, or roughly 1,200 mm. Focal ratios for most mass-market telescopes range from about f/4 to f/15.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">For visual observing, the focal ratio determines your choice of eyepieces. To get a telescope’s theoretical maximum 50× per inch of aperture, you use an eyepiece whose focal length in mm is half the focal ratio: 2 mm for an f/4 scope and 7.5 mm for an f/15 scope. To get 4× per inch, the eyepiece’s focal length would be 25 mm for an f/4 scope and 95 mm for an f/15 scope.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Unfortunately, no commercially available eyepiece has a focal length anywhere near 95 mm. That’s because an eyepiece with such a long focal length would be too big to fit into any normal telescope’s focuser tube. So while scopes between f/10 and f/15 generally work very well at the high magnifications needed for planetary observing, they have limited capability to provide the wide-field low-power views treasured by many deep-sky observers.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">At the opposite extreme, telescopes with focal ratios of f/4 and f/4.5 can provide great low-power views, but they typically work best with more complex (and therefore expensive) eyepieces, and can be tricky to focus at high power unless the scope is equipped with a precision focuser. Focal ratios between f/5 and f/8 are a nice compromise, easy on eyepieces yet providing decent wide-field capability.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">One way to improve a telescope’s wide-field performance is to choose one fitted to accept bigger eyepieces. Almost all modern eyepieces have barrels (the narrow end) either 1¼ or 2 inches in diameter. Budget-priced telescopes usually accept only the smaller size, but most premium-quality scopes accept both sizes. That allows them to use long-focal-length eyepieces that provide low magnifications and wide fields of view.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">For an in-depth exploration of this subject, see the article “</span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/astronomy-equipment/choosing-your-telescopes-magnification/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="969" instrument_node="">How to Choose Your Telescope Magnification</span></a><span data-dcnode-id="967" instrument_node="">” by the legendary eyepiece designer Al Nagler.</span></p><span data-dcnode-id="965" instrument_node="">
</span><h2 data-dcnode-id="963" id="h-why-does-the-moon-look-fuzzy"><span data-dcnode-id="964" instrument_node="">Why Does the Moon Look Fuzzy?</span></h2><span data-dcnode-id="962" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="955"><img alt="Animation of wavy Moon." class="wp-image-255507460805" data-dcnode-id="961" height="219" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/rsw-0038-MoonWavey.gif&amp;raw" width="300"><figcaption data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">Even the best telescope will give fuzzy views on nights of poor atmospheric 'seeing.' This lunar image shows the Altai Scarp mountain range leading to the 90-km-diameter crater Piccolomini (lower right). It's a frame from a short GIF movie that you can run by clicking the image, showing how turbulent air ripples and distorts the view, blurring fine detail.</span><br data-dcnode-id="959"><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Adrian Ashford</span></em></figcaption></figure><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Even with the best telescope, you'll notice that you can discern finer lunar or planetary detail on some nights than on others. Often the sharpness of the view even changes from one second to the next. At high power, you'll see that planets and stars shimmer and blur on most nights. The fault lies not with the scope but with Earth's turbulent atmosphere, and sometimes with very local conditions such as warm air rising from a nearby asphalt driveway that soaked up solar heat all day. Astronomers refer to turbulent nights as having bad "seeing."</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Large apertures allow observers to pick out faint objects and fine detail on the Moon and planets, but regardless of aperture, the better the seeing, the better the view. Since steady air is so important, large telescopes — even those in the 10-inch-plus category — are often limited to 250× or 300× on all but the very steadiest nights.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">It’s important to have realistic expectations and patience. Most people are familiar with images taken by spacecraft orbiting just above the planets’ surfaces. There’s no way you can possibly see that level of detail across the vastness of interplanetary space while looking through Earth’s thick blanket of image-impairing air.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">But don’t despair; any experienced observer will tell you that with practice, you'll see more detail in an image — not only because you become more experienced, but because the longer you look, the better your chance of catching a few moments of unusually steady atmospheric seeing.</span></p><span data-dcnode-id="942" instrument_node="">
</span><h2 data-dcnode-id="940" id="h-why-can-t-i-see-the-andromeda-galaxy"><span data-dcnode-id="941" instrument_node="">Why Can’t I See the Andromeda Galaxy?</span></h2><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Everyone is thrilled by their first view of Saturn and its amazing rings, even when the sky conditions are mediocre. But many people are disappointed by their first view of a galaxy — even a “bright” one. In fact some novices can’t see galaxies at all.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">There are three main culprits: unrealistic expectations (again), light pollution, and inexperience.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Any way you slice it, galaxies are faint. Our own Milky Way is a perfect example. Few sights in nature are as beautiful as its soft glow arching across the sky on a clear moonless night far from city lights. It is the stuff of legends, a sight familiar to all humanity before the electric light was invented. Yet it’s estimated that most people in the industrialized world have never seen the Milky Way at all, because for all of its grandeur, our galaxy is very faint. Light pollution near any major city overwhelms the Milky Way’s subtle light.</span></p><span data-dcnode-id="930" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="923"><img alt="The Andromeda Galaxy, Messier 31, and its brightest companions, Messier 32 and 110." class="wp-image-255507461372" data-dcnode-id="929" height="600" loading="lazy" sizes="(max-width: 652px) 100vw, 652px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch-652x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch-652x600.jpg 652w, https://skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch-207x190.jpg 207w, https://skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch-113x104.jpg 113w, https://skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch-768x707.jpg 768w, https://skyandtelescope.org/wp-content/uploads/Andromeda-1photo-2sketch.jpg 1000w" width="652"><figcaption data-dcnode-id="924"><span data-dcnode-id="928" instrument_node="">The Andromeda Galaxy, Messier 31, appears six Moon-width’s across under dark skies, stretching any telescope’s wide-field capability to the utmost. The long, dark dust lanes that are so obvious in photographs are challenging to see through a telescope’s eyepiece, as the rural-sky sketch shows. Under suburban skies only the area inside the innermost dust lane is visible, and only the bright core is visible from a city center. </span><br data-dcnode-id="927"><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Photograph by Andrei Pleskatsevich, sketches by Tony Flanders. </span></em></figcaption></figure><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Telescopes cannot fix that. They make celestial objects appear bigger, but they cannot make their light more intense. If your backyard is too bright for you to see the Milky Way with your unaided eyes, you won’t be able to see the faint, outer regions of any other galaxy either — not even through the world’s biggest telescope. The only part of a galaxy that’s bright enough to shine through heavy light pollution is its small, relatively intense core. (We can’t see the Milky Way’s center because it’s completely blocked from view by clouds of interstellar dust.)</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">Fortunately for urban and suburban astronomers, many deep-sky objects are bright enough to shine through heavy light pollution, though you may need more aperture to see them than you would from a dark location. These urban-friendly deep-sky objects include star clusters, double stars, and small </span><em data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">planetary nebulae</span></em><span data-dcnode-id="915" instrument_node="">.</span></p><span data-dcnode-id="913" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="906"><img alt="Messier 57, the Ring Nebula" class="wp-image-255507461381" data-dcnode-id="912" height="450" loading="lazy" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-600x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-600x600.jpg 600w, https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-190x190.jpg 190w, https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-113x113.jpg 113w, https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-550x550.jpg 550w, https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula-470x470.jpg 470w, https://skyandtelescope.org/wp-content/uploads/Messier_57_Ring_Nebula.jpg 761w" width="450"><figcaption data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">Messier 57, the Ring Nebula, is tiny but bright, making it a good target for urban and suburban stargazers. </span><br data-dcnode-id="910"><i data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Wikimedia Commons/Mpyat2</span></i></figcaption></figure><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">As for galaxies, urbanites still </span><em data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">can</span></em><span data-dcnode-id="901" instrument_node=""> see their bright centers; in fact even small binoculars can show the core of the Andromeda Galaxy from the middle of a major city. It may not look like much, but remember what you’re seeing: a system of roughly one trillion stars, most presumably orbited by multiple planets, host to anyone’s guess number of sentient species. Its light has traveled across intergalactic space for 2.5 million years. Wouldn’t it be a shame to pass up the opportunity to glimpse it?</span></p><span data-dcnode-id="899" instrument_node="">
</span><h2 data-dcnode-id="897" id="h-types-of-telescopes"><span data-dcnode-id="898" instrument_node="">Types of Telescopes</span></h2><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">Having gained an appreciation of a few important principles governing a telescope's performance, we can now explore the different </span><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">types</span></em><span data-dcnode-id="892" instrument_node=""> available.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="889" instrument_node="">You'll be forgiven for thinking there's an infinite variety from the ads in the astronomical press. Yet for all their varied shapes and sizes, telescopes can be divided into three classes: </span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">refractors</span></strong><span data-dcnode-id="886" instrument_node="">, </span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">reflectors</span></strong><span data-dcnode-id="883" instrument_node="">, and </span><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">catadioptrics</span></strong><span data-dcnode-id="880" instrument_node="">.</span></p><span data-dcnode-id="878" instrument_node="">
</span><h3 data-dcnode-id="876" id="h-types-of-telescopes-refractors"><span data-dcnode-id="877" instrument_node="">Types of Telescopes: Refractors</span></h3><span data-dcnode-id="875" instrument_node="">
</span><figure class="wp-block-image size-large is-resized" data-dcnode-id="868"><img alt="" class="wp-image-255507462363" data-dcnode-id="874" sizes="(max-width: 709px) 100vw, 709px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/REFRACTOR-709x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/REFRACTOR-709x600.jpg 709w, https://skyandtelescope.org/wp-content/uploads/REFRACTOR-225x190.jpg 225w, https://skyandtelescope.org/wp-content/uploads/REFRACTOR-113x96.jpg 113w, https://skyandtelescope.org/wp-content/uploads/REFRACTOR-768x650.jpg 768w, https://skyandtelescope.org/wp-content/uploads/REFRACTOR.jpg 1300w" width="500"><figcaption data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">A cross-section of a modern refracting telescope. </span><br data-dcnode-id="872"><em data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">SkyWatch</span></em></figcaption></figure><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">A </span><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">refractor</span></strong><span data-dcnode-id="863" instrument_node=""> is the stereotype of how a telescope is supposed to look — a long, gleaming tube with a large lens in front and the eyepiece at the back.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">When properly designed and built, refractors generally deliver sharper and brighter images per inch of aperture than any other design. That’s partly because lenses are somewhat more efficient than mirrors and partly because almost all other designs have a secondary mirror up front that blocks some of the incoming light. In general, a top-quality 4-inch refractor shows deep-sky objects about as well as a 5-inch reflector or catadioptric, and might even do a bit better on the planets.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Most telescopes with apertures of 80 mm or less are refractors. That’s because small lenses are easy and cheap to build, and because it’s in those tiny apertures that the refractor’s performance edge matters most. Therefore, refractors dominate both the bottom end of the market, where people can only afford very small apertures and also the market for highly portable high-performance telescopes.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Another advantage of refractors is that they’re generally more rugged than other types of scopes, because their lenses are less likely to come out of alignment. Small refractors also perform to full capacity almost as soon as you bring them outside, whereas large reflectors and catadioptrics deliver mediocre high-power images until their mirrors reach the temperature of the outside air, which can take an hour or more. For these reasons small refractors are well suited to those seeking a "grab and go" instrument or who have no desire to tinker with the optics.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Unfortunately, refractors do not scale up well, for several reasons. The cost of building a good lens rises very steeply as the aperture increases — much more so than for mirrors. That’s why very few amateurs own refractors with apertures greater than 6 inches. By contrast, a 6-inch reflector is considered rather small for a beginner, and many advanced observers own reflectors with mirrors 12 to 30 inches in diameter.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">Refractors&nbsp;suffer inherently from </span><em data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">false color</span></em><span data-dcnode-id="845" instrument_node="">, which can make a bright star look like a rainbow-tinted blur rather than a point of light if it’s bad enough. False color can be a serious problem for people who want to view the Moon and planetsat high power, but it can be minimized by using either long focal ratios or special glasses.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">For </span><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">achromats</span></strong><span data-dcnode-id="839" instrument_node="">, whose lenses are made with traditional flint and crown glass, false color is essentially invisible when the focal ratio is at least three times the aperture in inches. That means that for optimal planetary views a 3-inch achromat needs to be f/9, with a focal length of 3 * 9 = 27 inches. That’s an altogether manageable tube size. But to work equally well at high power a 6-inch achromat would need to be f/18, with a tube 6 * 18 = 108 inches, or 9 feet long!</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Long tubes are especially problematic for refractors because the eyepiece is at the bottom of the telescope. That means that the pivot point needs to be above your head, and that in turn requires a tall, heavy, expensive tripod.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">In recent years, achromats with focal ratios between f/4 and f/6 have become quite popular. These so-called </span><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">short-tube achromats</span></strong><span data-dcnode-id="830" instrument_node=""> sacrifice a certain degree of high-power performance in favor of portability and a wide field of view. They’re not ideal for the Moon and planets, but they’re great for viewing big star clusters like the Pleiades, for browsing wide swaths of the Milky Way, and for viewing terrestrial subjects such as birds and distant ships.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="827" instrument_node="">Fortunately, modern technology makes it possible to combine the benefits of short-tube and long-tube refractors — at a price. </span><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Apochromats</span></strong><span data-dcnode-id="824" instrument_node="">, or </span><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">APO</span></strong><span data-dcnode-id="821" instrument_node="">s, use lenses made with extra-low dispersion (ED) glasses and other materials to reduce false color dramatically. That makes it possible to build a refractor that’s effectively color-free with a short focal ratio. Not only does this alleviate the problem of overlong tubes, it also allows these scopes to deliver gorgeous wide-field views at low magnifications as well as flawless high-power images. APOs are also particularly good for wide-field astrophotography.</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Apochromats used to be extremely expensive, but prices have come down significantly in recent years. The cheaper (but still excellent!) models are often marketed as ED refractors rather than as APOs; the distinction is somewhat arbitrary. An ED refractor is now a plausible choice for a beginner who wants a rugged, portable, highly versatile telescope and is willing to accept the limited image brightness and resolution that are inevitable consequences of small aperture.</span></p><span data-dcnode-id="816" instrument_node="">
</span><h3 data-dcnode-id="814" id="h-types-of-telescopes-reflectors"><span data-dcnode-id="815" instrument_node="">Types of Telescopes: Reflectors</span></h3><span data-dcnode-id="813" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="806"><img alt="" class="wp-image-255507462357" data-dcnode-id="812" height="600" loading="lazy" sizes="(max-width: 496px) 100vw, 496px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/REFLECTOR-1-496x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/REFLECTOR-1-496x600.jpg 496w, https://skyandtelescope.org/wp-content/uploads/REFLECTOR-1-157x190.jpg 157w, https://skyandtelescope.org/wp-content/uploads/REFLECTOR-1-93x113.jpg 93w, https://skyandtelescope.org/wp-content/uploads/REFLECTOR-1-768x930.jpg 768w, https://skyandtelescope.org/wp-content/uploads/REFLECTOR-1.jpg 950w" width="496"><figcaption data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">A cross-section of a typical reflecting telescope. Dollar for dollar, a reflector is the best-value scope you can buy. Occasional cleaning and realignment of the optics may lessen its appeal to some users.</span><br data-dcnode-id="810"><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">SkyWatch</span></em></figcaption></figure><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">The second type of telescope, the </span><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">reflector</span></strong><span data-dcnode-id="801" instrument_node="">, uses a mirror to gather and focus light. Its most common form is the Newtonian reflector (invented by Isaac Newton), with a specially curved concave (dish-shaped) primary mirror at the bottom end of the telescope. Near the top, a small, flat, diagonal secondary mirror directs the light from the primary to the side of the tube, where it's met by a conveniently placed eyepiece.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">If you want the most aperture for your money, the reflector is the scope for you. When well made and maintained, a reflector can provide sharp, contrasty images of all manner of celestial objects at a small fraction of the cost of an equal-aperture refractor.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">Newtonians have two additional important advantages. They work well at focal ratios from f/4 to f/8, allowing them to deliver wide fields of view relative to their aperture. And the eyepiece is at the top of the tube, meaning that the pivot point is well below your head. That allows them to be used with low tripods or, in the case of the popular </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Dobsonian</span></strong><span data-dcnode-id="792" instrument_node=""> design, with no tripod at all. (We’ll discuss Dobsonian mounts next in more detail; suffice to say that they are simple, inexpensive, easy to use, and extremely effective.) In general, a Newtonian on a Dobsonian mount delivers by far the brightest and most detailed images possible per dollar.</span></p><span data-dcnode-id="790" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="783"><img alt="Dobsonian" class="wp-image-246610835" data-dcnode-id="789" height="304" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Dobsonian_m.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/Dobsonian_m.jpg 200w, https://skyandtelescope.org/wp-content/uploads/Dobsonian_m-197x300.jpg 197w" width="200"><figcaption data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">A variant of the Newtonian telescope known as the Dobsonian —or “Dob,” for short —, shown here, has become extremely popular thanks to its low cost, ease of use, and portability.</span><br data-dcnode-id="787"><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">SkyWatch / Craig Michael Utter</span></em></figcaption></figure><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">Newtonians do require occasional maintenance. Unlike a refractor's solidly mounted lens, a reflector's mirrors can get out of alignment and hence need periodic collimation (adjustment) to ensure peak performance, particularly if the telescope is moved frequently. This isn’t a big deal once you get the hang of it. The mirrors of the average Newtonian may not require tweaking for months at a time. But for those not mechanically inclined, </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/astronomy-resources/how-to-align-your-newtonian-reflector-telescope/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="780" instrument_node="">having to collimate a Newtonian reflector</span></a><span data-dcnode-id="778" instrument_node=""> even occasionally may be frustrating.</span></p><span data-dcnode-id="776" instrument_node="">
</span><h3 data-dcnode-id="774" id="h-types-of-telescopes-catadioptrics"><span data-dcnode-id="775" instrument_node="">Types of Telescopes: Catadioptrics</span></h3><span data-dcnode-id="773" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="766"><img alt="" class="wp-image-255507462365" data-dcnode-id="772" height="600" loading="lazy" sizes="(max-width: 496px) 100vw, 496px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/COMPOUND-496x600.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/COMPOUND-496x600.jpg 496w, https://skyandtelescope.org/wp-content/uploads/COMPOUND-157x190.jpg 157w, https://skyandtelescope.org/wp-content/uploads/COMPOUND-93x113.jpg 93w, https://skyandtelescope.org/wp-content/uploads/COMPOUND-768x930.jpg 768w, https://skyandtelescope.org/wp-content/uploads/COMPOUND.jpg 950w" width="496"><figcaption data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">A cross-section of a compound telescope. Roughly midway in price between Newtonians and refractors, catadioptrics are both compact and easy to upgrade owing to a wide range of accessories. </span><br data-dcnode-id="770"><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">SkyWatch</span></em></figcaption></figure><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">Then there's the third type of telescope, the </span><strong data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">catadioptric</span></strong><span data-dcnode-id="761" instrument_node=""> or </span><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">compound</span></strong><span data-dcnode-id="758" instrument_node=""> telescope. These were invented in the 1930s out of a desire to marry the best characteristics of refractors and reflectors: they employ both lenses and mirrors to form an image. The greatest appeal of these instruments is that, in their commonly encountered forms (the Schmidt-Cassegrain and Maksutov-Cassegrain), they are very compact. Their tubes are just two to three times as long as wide, an arrangement allowed by "optical folding" of the light. The smaller tube can use a lighter and thus more manageable mounting. The upshot is that you can obtain a large-aperture, long-focus telescope that's very transportable.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">But here too there are caveats. Most Schmidt-Cassegrains have an f/10 focal ratio, and Maksutov-Cassegrains usually have even longer focal ratios. That means that they are unable to produce genuinely wide, low-power fields of view. Some but not all models allow for the addition of a focal reducer to reduce the effective focal ratio to f/6 or thereabouts, which helps considerably.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Like the Newtonian, the Schmidt-Cassegrain telescope needs occasional optical collimation that lessens its appeal to those disinclined to tinker. In terms of cost, aperture for aperture, the catadioptric lies midway between the reflector and the refractor. Like a Newtonian, the popular forms of compound telescopes have a secondary mirror in the light path, and this slightly degrades performance for high-magnification lunar and planetary observing. Even so, when well made, a Schmidt-Cassegrain or Maksutov will deliver very fine images of a wide variety of celestial objects.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">If you live in an area where dew occurs (which is almost everywhere), some sort of tube extension is a must to prevent dew from forming on the exposed corrector plate at the front of the tube. Many people in humid climates also use electric dew heaters. Catadioptrics also take longer than any other design to cool down to the temperature of the night air, which is necessary to produce pristine high-power images. So unless you can leave your scope outside to pre-cool, catadioptrics are a poor choice for quick, casual looks at the planets.</span></p><span data-dcnode-id="747" instrument_node="">
</span><h2 data-dcnode-id="745" id="h-types-of-telescope-mounts"><span data-dcnode-id="746" instrument_node="">Types of Telescope Mounts</span></h2><span data-dcnode-id="744" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="737"><img alt="Altazimuth mount" class="wp-image-246610834" data-dcnode-id="743" height="243" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/alt_az_m.jpg&amp;raw" width="230"><figcaption data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">The Dobsonian telescope, as illustrated here, is a prime example of an instrument on an alt-azimuth, or “alt-az” mount. The tube moves up-and-down (in altitude) and left-to-right (in azimuth). Other alt-az mounts may have slow-motion controls to permit easy tracking at high powers.</span><br data-dcnode-id="741"><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Sky &amp; Telescope / Chuck Baker</span></em></figcaption></figure><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">The best telescope in the world </span><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">is useless</span></em><span data-dcnode-id="732" instrument_node=""> unless it's on a stable, smoothly-working mount that enables you to aim the scope and follow a celestial object smoothly and precisely as the Earth’s rotation moves your target through the scope’s field of view.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Low-quality mounts are by far the most common problem with budget-priced telescopes. That’s especially true of “toy” telescopes sold in department stores, but even reputable vendors often cut costs by packaging perfectly good optical tubes with undersized mounts. That can make observing painful at best and impossible at worst.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">In realistic terms, a “stable” mount is one that won’t vibrate for more than a second or so after you rap the tube. In particular, the view shouldn't wiggle so much that when you touch the focus knob that you can’t tell when you’ve found the sharpest image. And when you let go, the aim must not jump to one side.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="723" instrument_node="">All telescope mounts fit into a few broad categories. The oldest and simplest design is the manually adjusted </span><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">altitude-azimuth</span></strong><span data-dcnode-id="720" instrument_node=""> mount, often referred to as an </span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">alt-az</span></strong><span data-dcnode-id="717" instrument_node="">. These work like the pan-and-tilt heads on photo tripods, moving the scope up-down (in altitude) and left-right (in azimuth). In fact, robust photo tripods work fine for small telescopes at low and medium magnifications.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">If you intend to use a small telescope for casual sky viewing or daytime use (say, birdwatching), you'll find an alt-az mounts preferable because of its simplicity, compactness, and light weight. Alt-az mounts designed for high-power use often have finely threaded slow-motion controls that enable the scope to be moved smoothly by tiny amounts.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">The </span><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Dobsonian</span></strong><span data-dcnode-id="708" instrument_node=""> mount dispenses with the tripod and places the pan-tilt head directly on the ground. Dobsonian mounts are typically built of wood or particleboard, and the large, stable bearings are usually constructed with Teflon. This results in a very sturdy, low-cost mount that (ideally) glides smoothly about both axes with fingertip control. A Newtonian reflector mounted in this fashion is not only extremely easy to set up and use, but very good value, too.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Galileo’s 1610 telescope, which revolutionized astronomy, used an alt-az </span><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">tabletop</span></strong><span data-dcnode-id="702" instrument_node=""> mount, designed to be placed on a solid table. Tabletop mounts have made a comeback in recent years; models based on the Dobsonian design are now packaged with many of the best scopes in the sub-$150 price category.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="699" instrument_node="">The </span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">equatorial</span></strong><span data-dcnode-id="696" instrument_node=""> mount is basically just an alt-az tilted over so that the azimuth axis (the </span><em data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">polar axis</span></em><span data-dcnode-id="693" instrument_node="">) is parallel to Earth’s spin axis and rotates in a plane parallel to the equator rather than the ground. That makes it easy to track celestial objects as they drift across the sky — or more precisely, appear to move as Earth rotates beneath you. All you have to do to keep the scope aimed at your target is turn the polar axis at a rate equal and opposite to Earth’s rotation. This can be done easily with brief twists of a slow-motion knob, or you can equip an equatorial mount with a motor to achieve automatic tracking. Motorized tracking is especially valuable at high power.</span></p><span data-dcnode-id="691" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="684"><img alt="Equatorial mount" class="wp-image-246610929" data-dcnode-id="690" height="275" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/Equi_Scope_Multiexp_m.jpg&amp;raw" width="180"><figcaption data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">An equatorial mount makes the tracking of celestial objects easier as the Earth turns. Once correctly set up, the scope need only be turned about one axis to follow an object across the sky — and a drive motor can do this automatically. </span><br data-dcnode-id="688"><em data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Sky &amp; Telescope / Chuck Baker</span></em></figcaption></figure><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="682" instrument_node="">Equatorial mounts suffer from two main drawbacks. They’re heavier and bulkier than comparable alt-az mounts, and they tend to place the telescope’s eyepiece in awkward positions. Despite that, their tracking capability made them essential for almost all serious amateur telescopes until the advent of the motorized Dobsonian mount and computerized alt-az </span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Go To</span></strong><span data-dcnode-id="679" instrument_node=""> mount.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">With a Go To mount, you just enter the object’s name, and the mount then looks up its celestial coordinates, calculates where it will appear at a given time and location, and points the telescope to that spot in the sky. That can be a big time-saver, especially in light-polluted settings, where there are few reference stars to aid you in finding the objects yourself. Go To mounts can also follow objects across the sky just by recalculating the position every second or so and making the necessary corrections. That makes it possible to combine the mechanical and ergonomic benefits of alt-az mounts with automatic tracking, something not possible before the computer age.</span></p><span data-dcnode-id="674" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="667"><img alt="Roboscope" class="wp-image-6138" data-dcnode-id="673" height="157" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/MeadeAutostar_m.jpg&amp;raw" width="150"><figcaption data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Go To telescopes have a built-in computer and database to make finding objects simple, in theory. The downside is that most designs require you to perform an alignment procedure each time you use it, so you still need to know your naked-eye stars.</span><br data-dcnode-id="671"><em data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">S&amp;T / Craig Michael Utter</span></em></figcaption></figure><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">There are a number of cautions to bear in mind when it comes to Go To technology. First, most Go To mounts need to be initialized so that they know the time and location as well as their orientation. Some of the priciest models can do this completely automatically, but most entry-level Go To scopes do the initialization by asking you to point them at specific stars. The process can initially be daunting to beginners unfamiliar with the constellations, but it becomes quick and easy with a bit of practice.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Good Go To mounts aren’t cheap. So if you have a limited budget, you might do better to put all of your money into good optics and a sturdy manual mount rather than diverting half of it to Go To capability. Finally, most Go To mounts require either big batteries or access to the power grid.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">Yet another option is </span><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Push To</span></strong><span data-dcnode-id="656" instrument_node=""> technology, which is essentially Go To without motors. Instead of actually moving the scope itself, this style of mount calculates your target’s location and then tells you how to push the scope to reach that spot.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">The biggest downside is that you lose automatic tracking; once the scope has located the object, it’s your job to keep it in view. Push To technology is particularly popular for Dobsonians, which are easy for humans to push accurately due to the leverage provided by their long tubes, and relatively hard to motorize for exactly the same reason. Push To scopes are cheaper and lighter than comparable Go To scopes, and they can run for long periods on tiny batteries.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h2 data-dcnode-id="649" id="h-finders"><span data-dcnode-id="650" instrument_node="">Finders</span></h2><span data-dcnode-id="648" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="644"><img alt="Telescope finders" class="wp-image-255507461386" data-dcnode-id="647" height="506" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/two-finders-relabeled-900x506.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled-900x506.jpg 900w, https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled-300x169.jpg 300w, https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled-113x64.jpg 113w, https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled-768x432.jpg 768w, https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled-1536x864.jpg 1536w, https://skyandtelescope.org/wp-content/uploads/two-finders-relabeled.jpg 1920w" width="900"><figcaption data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Most telescopes come with some kind of sighting device. The most common types are a low-power finderscope and a red-dot finder.</span></figcaption></figure><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">Most telescopes come with some kind of sighting device. The most common types are a low-power </span><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">finderscope</span></em><span data-dcnode-id="639" instrument_node=""> and a </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">red-dot finder</span></em><span data-dcnode-id="636" instrument_node="">.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">When used at medium to high power, a telescope shows you only a tiny little bit of sky. This makes aiming at a target a frustrating process unless the scope has some kind of sighting device, or </span><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">finder</span></strong><span data-dcnode-id="630" instrument_node="">.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="627" instrument_node="">The traditional solution is a </span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">finderscope</span></strong><span data-dcnode-id="624" instrument_node="">, a miniature telescope equipped with crosshairs like a gunsight. Two popular alternatives are </span><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">red-dot finders</span></strong><span data-dcnode-id="621" instrument_node=""> and </span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">red-circle finders</span></strong><span data-dcnode-id="618" instrument_node="">, which project patterns onto a transparent window through which you view the sky. Once you align the finder correctly with the main scope, centering an object on the dot, circle, or crosshairs gets it into the main telescope's view.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">At the bottom end of the market, beware of 5× finderscopes, most of which have very poor quality. Otherwise, don’t worry too much what finder is packaged with your scope. If you don’t like it, it’s easy to change to a different one at fairly modest cost — or to add another. Many people find the combination of a finderscope and a red-circle finder to be the best of all possible worlds.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611" id="h-everything-has-its-price"><span data-dcnode-id="612" instrument_node="">Everything Has Its Price</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">While it may be tempting, resist the urge to buy the cheapest telescope available. Most will be poor quality optically, mechanically, or both, and will disappoint. It’s possible to buy a decent telescope for $150 or less, but only if you shop carefully. And even then, you’ll get a scope with very modest aperture. The cheapest scope that makes no serious compromises would be a 6- or 8-inch Dob, priced anywhere from roughly $300 to $500</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">On the other hand, even if you have lots of money to spend, don't buy the largest, most expensive telescope you can afford just yet. Start smaller and more manageable. Most serious observers own two or more telescopes for different purposes. It makes sense to start with a cheaper one until you have explored your options and discovered where your long-term interests lie.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">Also, be sure to save some of your astro budget for additional eyepieces to expand the scope's magnification range, a detailed </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shopatsky.com/maps-globes/sky-atlases/%3Futm_source%3Dskyandtelescope.com%26utm_medium%3Dreferral%26utm_campaign%3Dsky-mya-at-160601" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="602" instrument_node="">sky atlas</span></a><span data-dcnode-id="600" instrument_node="">, good guidebooks, and any number of other accessories. For instance, many people find an adjustable-height chair to be worth its weight in gold.</span></p><span data-dcnode-id="598" instrument_node="">
</span><h2 data-dcnode-id="596" id="h-what-are-you-waiting-for"><span data-dcnode-id="597" instrument_node="">What Are You Waiting For?</span></h2><span data-dcnode-id="595" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="588"><img alt="Under the Stars" class="wp-image-246609699" data-dcnode-id="594" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/StevenandLydia_m2.jpg&amp;raw" width="250"><figcaption data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">Whoever you are and wherever you live, there's a telescope just right for you. One of the rewards of amateur astronomy is sharing the universe with others through your scope — and you're never too young to start!</span><br data-dcnode-id="592"><em data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">S&amp;T / Craig Michael Utter</span></em></figcaption></figure><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">So, is there a perfect telescope out there waiting for you? Yes. As experienced observers are fond of noting, the “best” telescope is the one you use most often. If you heed our advice, you will end up with just such an instrument — one that you’ll be eager to use every clear night.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="583" instrument_node="">One additional piece of advice: Contact </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/astronomy-clubs-organizations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="582" instrument_node="">your local astronomy club</span></a><span data-dcnode-id="580" instrument_node="">, which may have observing nights in which you can try various scopes and chat with their owners. Don't be shy. Your local club wouldn't have put itself in our database unless they wanted you to call. And </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//skyandtelescope.org/subscribe/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="579" instrument_node="">consider subscribing</span></a><span data-dcnode-id="577" instrument_node=""> to </span><em data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Sky &amp; Telescope</span></em><span data-dcnode-id="574" instrument_node=""> for a monthly dose of observing advice!</span></p><span data-dcnode-id="572" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="567"><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/subscribe" id="subscribepost" rel="noopener" target="_blank"><img alt="" class="wp-image-255507457195" data-dcnode-id="569" height="90" loading="lazy" sizes="(max-width: 720px) 100vw, 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a.jpg&amp;raw" srcset="https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a.jpg 720w, https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a-300x38.jpg 300w, https://skyandtelescope.org/wp-content/uploads/ST_Web_sub_ad_720x90_3a-113x14.jpg 113w" width="720"></a></figure><span data-dcnode-id="566" instrument_node="">
</span><div class="at-below-post addthis_tool" data-dcnode-id="560" data-url="https://skyandtelescope.org/astronomy-equipment/how-to-choose-a-telescope/"></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span><div class="comments" data-dcnode-id="477"><span data-dcnode-id="555" instrument_node="">
</span><h2 class="c-comment gamma" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Comments</span></h2><span data-dcnode-id="552" instrument_node="">
</span><br data-dcnode-id="551"><span data-dcnode-id="550" instrument_node="">
