20" instrument_node="">Who invented telescopes?</span></h1></section><div class="article__subdeck t-p-border-color" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">
</span></div></header><div class="article__meta" data-dcnode-id="1002"><div class="article__name-date" data-dcnode-id="1003"><div class="article__author" data-dcnode-id="1010"><ul class="t-p-color article__noLabel article__ul" data-dcnode-id="1011" itemprop="author"><li class="article__author-list t-p-background-color__before" data-dcnode-id="1012"><span class="article__author-name t-p-color" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Sun Reporter</span></span></li></ul></div><ul class="article__time" data-dcnode-id="1004"><li class="article__published" data-dcnode-id="1005"><span class="article__datestamp" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">12:02 ET, </span></span><span class="article__timestamp" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Dec 3 2021</span></span></li></ul></div></div></div></div><div class="article-switcheroo" data-dcnode-id="287"><div class="article__content" data-dcnode-id="369"><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">BEING able to reach for the stars has been made a lot easier thanks to the telescope - which allows us to see them all up close.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">The telescope has seen a lot of developments since it was first invented over 400 years ago. But who invented the telescope, and why?</span></p><div class="advert-wrapper advert-wrapper--header" data-dcnode-id="993"><div class="dfp-ad advert--header" data-dcnode-id="994" id="header"></div></div><span data-dcnode-id="992" instrument_node="">
</span><figure class="article__media" data-dcnode-id="980"><div class="article__media-img-container open-gallery" data-dcnode-id="986" data-index="751188"><a data-dcnode-id="990" href="#"><img alt="Telescopes mean that we can look at the night sky as this woman lid before a solar eclipse in 2017" class="lazyloaded" data-credit="Reuters" data-dcnode-id="991" data-img="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?strip=all&amp;w=960" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=2480 2480w" height="677" sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg&amp;raw" srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000347046954.jpg?w=2480 2480w" width="960"></a><div class="article__gallery-count" data-dcnode-id="987"><span class="article__gallery-count-value" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">3</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="981"><span class="article__media-span" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Telescopes mean that we can look at the night sky as this woman lid before a solar eclipse in 2017</span></span><span class="article__credit" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Credit: Reuters</span></span></figcaption></figure><span data-dcnode-id="979" instrument_node="">
</span><h2 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Who invented telescopes?</span></h2><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Hans Lippershey, a Dutch eyeglass maker, made the first widely distributed telescope, and applied for the first telescope patent in 1608.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Lots of inventors were working on similar designs around the same time, but Lippershey made an important observation.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">He discovered that reducing the light in the telescope and focusing it meant he could see images even further away.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">His original </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-sun.com/lifestyle/tech-old/2816033/how-to-see-mercury-in-may-2/"><span data-dcnode-id="965" instrument_node="">telescope</span></a><span data-dcnode-id="963" instrument_node=""> could magnify up to three times.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Lippershey first showed his telescope to Prince Maurice of Nassau in September 1608.</span></p><div class="advert-wrapper advert-wrapper--outstream" data-dcnode-id="957"><div class="dfp-ad advert--outstream" data-dcnode-id="958" id="outstream"></div></div><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">But he was denied the patent he applied for on October 2, 1608, because other scientists and glass makers came forward with similar devices.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Another Dutch man, Jacob Metius, presented his own telescope a few weeks after Lippershey - but was also denied a patent, because of Lippershey's application.</span></p><span data-dcnode-id="950" instrument_node="">
</span><figure class="article__media" data-dcnode-id="938"><div class="article__media-img-container open-gallery" data-dcnode-id="944" data-index="751189"><a data-dcnode-id="948" href="#"><img alt="woman looking through a telescope in her bedroom" class="lazyloaded" data-credit="Getty - Contributor" data-dcnode-id="949" data-img="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?strip=all&amp;w=960" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=2480 2480w" height="640" sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg&amp;raw" srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000480050569.jpg?w=2480 2480w" width="960"></a><div class="article__gallery-count" data-dcnode-id="945"><span class="article__gallery-count-value" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">3</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="939"><span class="article__media-span" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">woman looking through a telescope in her bedroom</span></span><span class="article__credit" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Credit: Getty - Contributor</span></span></figcaption></figure><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">And Zacharias Janssen, also a Dutch eyeglass maker, was another contemporary working on his own version of the telescope.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Janssen was once claimed to have got their first - but this has since been proved to be inaccurate.</span></p><div class="advert-wrapper advert-wrapper--articlempu" data-dcnode-id="930"><div class="dfp-ad advert--inarticle" data-dcnode-id="931" id="articlempu"></div></div><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Today, Lippershey generally gets credit for inventing the telescope, while Janssen is credited with creating the upright compound microscope.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Lippershey was given a government contract for the use of his design, and telescopes could be found all over Europe within six months.</span></p><span data-dcnode-id="923" instrument_node="">
</span><figure class="article__media" data-dcnode-id="911"><div class="article__media-img-container open-gallery" data-dcnode-id="917" data-index="751190"><a data-dcnode-id="921" href="#"><img alt="Galileo Galilei (1564-1642) portrait by Giusto Sustermans, 1636" class="lazyloaded" data-credit="Alamy" data-dcnode-id="922" data-img="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?strip=all&amp;w=756" data-sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" data-src="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg" data-srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=2480 2480w" height="960" sizes="(max-width: 375px) 335px, (max-width: 520px) 480px, 620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg&amp;raw" srcset="https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=335 335w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=480 480w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=620 620w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=670 670w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=960 960w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1240 1240w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1005 1005w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1440 1440w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1860 1860w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1340 1340w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=1920 1920w, https://www.thesun.co.uk/wp-content/uploads/2021/07/NINTCHDBPICT000650395096.jpg?w=2480 2480w" width="756"></a><div class="article__gallery-count" data-dcnode-id="918"><span class="article__gallery-count-value" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">3</span></span></div></div><figcaption class="article__media-caption" data-dcnode-id="912"><span class="article__media-span" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Galileo Galilei (1564-1642) portrait by Giusto Sustermans, 1636</span></span><span class="article__credit" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Credit: Alamy</span></span></figcaption></figure><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Astronomer Galileo Galilei made significant modifications to Lippershey’s telescope, before making his observations of space.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Galileo’s final version could magnify up to 30 times.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The word telescope comes from the Italian "telescopio", which first appeared early in the 1600s, and first appeared in English in 1650.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu" data-dcnode-id="900"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="901" id="advert-inarticle-mpu"></div></div><span data-dcnode-id="899" instrument_node="">
</span><h2 data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Why were telescopes invented?</span></h2><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="889"><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-sun.com/news/3628240/nasa-james-webb-telescope-launch-date/"><span data-dcnode-id="895" instrument_node="">Telescopes </span></a><span data-dcnode-id="893" instrument_node="">were invented because of natural developments in the technology and science of magnifying lenses, and a desire to see and </span><a data-dcnode-id="891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-sun.com/news/science/3336771/aliens-real-ufo-sightings-evidence/"><span data-dcnode-id="892" instrument_node="">understand the cosmos</span></a><span data-dcnode-id="890" instrument_node="">.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Lenses for glasses existed as early as the 1400s but were not of sufficient quality for use in astronomy.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">These had improved significantly by the 1600s, and glasses makers were able to polish and refine the lenses.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Lippershey made glasses in the Netherlands, and he and many others were investigating the power and potential of lenses.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu-1" data-dcnode-id="878"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="879" id="advert-inarticle-mpu-1"></div></div><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">At the same time, the Renaissance - a period of cultural, artistic and economic "rebirth" in Europe - was fuelling an interest in understanding and seeing other space objects.</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">The telescope was used to prove Copernicus' theory that the Sun was at the centre of the universe.</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">It also enabled the first sightings of </span><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-sun.com/lifestyle/tech-old/1036783/nasa-alien-life-jupiter-moon-europa-ocean/"><span data-dcnode-id="869" instrument_node="">Jupiter’s moons</span></a><span data-dcnode-id="867" instrument_node="">, and the first observations of objects orbiting others.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Galileo was first credited with these observations, but he was not the only one to gaze at the stars.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu-2" data-dcnode-id="861"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="862" id="advert-inarticle-mpu-2"></div></div><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Galileo did not necessarily get there first, but he published his findings and had them distributed widely.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">A Brit, Thomas Harriot, also designed a telescope, and he made more accurate observations and sketches of the moon than Galileo - but he did not publicise his work the way Galileo did.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">German astronomer Simon Marius made more accurate observations of Jupiter’s moons than Galileo.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">He was passed off as a faker when he tried to claim this in his lifetime, but he is widely believed now.</span></p><div class="advert-wrapper advert-wrapper--advert-inarticle-mpu-3" data-dcnode-id="847"><div class="dfp-ad advert--in-article-mpu nuk-ad-placeholder" data-ad-label="inArticleMPU" data-dcnode-id="848" id="advert-inarticle-mpu-3"></div></div><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">And another German astronomer, Christoph Scheiner, observed independently from Galileo that the Sun was not a perfect sphere, and noticed sun spots.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">And another important observation made with the first telescopes was that the moon is not round, and has mountains and craters.</span></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Previously the moon was thought to be like a pearl, or a translucent sphere.</span></p><span data-dcnode-id="837" instrument_node="">
</span><h3 data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">History of the telescope</span></h3><span data-dcnode-id="834" instrument_node="">
</span><ul data-dcnode-id="729"><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="829"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">1608:</span></strong><span data-dcnode-id="830" instrument_node=""> Hans Lippershey applied to patent his telescope.</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="824"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">1609:</span></strong><span data-dcnode-id="825" instrument_node=""> Galileo modifies Lippershey's telescope for astronomic use.</span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="819"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">1611:</span></strong><span data-dcnode-id="820" instrument_node=""> Johannes Kepler described an improved lens for the telescope.</span></li><span data-dcnode-id="818" instrument_node="">
</span><li data-dcnode-id="814"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">1655:</span></strong><span data-dcnode-id="815" instrument_node=""> Christiaan Huygens was building a Keplerian telescope, based on Kepler's description. This used convex lens to help view distant objects.</span></li><span data-dcnode-id="813" instrument_node="">
</span><li data-dcnode-id="809"><strong data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">1668:</span></strong><span data-dcnode-id="810" instrument_node=""> Isaac Newton built the first telescope with a mirror reflecting to an eye-piece on the side of the telescope - a reflector. This helps objects appear brighter through the eyepiece.</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="804"><strong data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">1672:</span></strong><span data-dcnode-id="805" instrument_node=""> Laurent Cassegrain improves on Newton's design, creating the achromatic lens. This helped to improve colour distortion through the eyepiece.</span></li><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="799"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">1721:</span></strong><span data-dcnode-id="800" instrument_node=""> John Hadley made paraboloid mirrors, which collected energy from light, sound, or radio waves.</span></li><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="794"><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">1733:</span></strong><span data-dcnode-id="795" instrument_node=""> Chester Moor Hall built the first telescope to incorporate the chromatic lens. This meant telescopes could be made shorter, and were more accurate when it comes to colour.</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="789"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">1758:</span></strong><span data-dcnode-id="790" instrument_node=""> John Dollond began commercial production of telescopes based on Hall's design.</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="784"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">1855:</span></strong><span data-dcnode-id="785" instrument_node=""> Leon Foucault introduced the idea of silvering glass mirrors, which tested the shape of a reflector mirror to see whether or not it was perfectly spherical. This spherical shape allowed for optimal performance of the telescope.</span></li><span data-dcnode-id="783" instrument_node="">
</span><li data-dcnode-id="779"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">1897:</span></strong><span data-dcnode-id="780" instrument_node=""> The Yerkes Observatory Refractor was built - home of the largest refracting telescope ever built, with a main lens that measures over one metre in diameter.</span></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="774"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">1900:</span></strong><span data-dcnode-id="775" instrument_node=""> Glass-mirror reflectors, such as the Mount Wilson, began to be built. After this, most major telescopes were reflector telescopes.</span></li><span data-dcnode-id="773" instrument_node="">
</span><li data-dcnode-id="769"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">1910:</span></strong><span data-dcnode-id="770" instrument_node=""> The Ritchey-Chretien form of the Cassegrain reflector was developed, but not widely used. It gave a much wider field of view.</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="764"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">1917:</span></strong><span data-dcnode-id="765" instrument_node=""> The Hooker Telescope was built. This measured 2.5 metres, and was the world's largest telescope from 1917 to 1949. It was used by Edwin Hubble in 1922 to prove that the Universe extends beyond the Milky Way galaxy.</span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">1931:</span></strong><span data-dcnode-id="760" instrument_node=""> Karl Guthe Jansky discovered an astronomical radio source that enabled the development of radio and other wave-length telescopes.</span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="754"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">1948:</span></strong><span data-dcnode-id="755" instrument_node=""> The Hale Telescope was built, measuring over five metres. This telescope was groundbreaking, and made many important discoveries, including two moons of the Planet Uranus in 1997.</span></li><span data-dcnode-id="753" instrument_node="">
</span><li data-dcnode-id="749"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">1960:</span></strong><span data-dcnode-id="750" instrument_node=""> Observatories began to be built, enabling the use of longer wave-length bands such as X-rays and infrared to be used.</span></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">1970: Computer-controlled telescopes at elevated positions began to be used, such as at Alt-Azimuth Mount and Active Optics.</span></li><span data-dcnode-id="745" instrument_node="">
</span><li data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">1990: </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-sun.com/lifestyle/tech-old/2480490/nasa-shuts-down-hubble-space-telescope-following-mysterious-error/"><span data-dcnode-id="743" instrument_node="">The Hubble Space Telescope</span></a><span data-dcnode-id="741" instrument_node=""> was launched. It is 13.2 metres long and has a 4.2 metre diameter, and has made more than 1.3 million observations.</span></li><span data-dcnode-id="739" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">1993: Other large telescopes began to be manufactured, such as the Keck telescopes, up to ten metres, the ESO eight-metre telescopes, Gemini Observatory, and the Subaru Telescope.</span></li><span data-dcnode-id="736" instrument_node="">
