            <template shadowrootmode="closed"><html data-dcnode-id="1"><head data-dcnode-id="424"><meta name="robots" content="noindex, nofollow"><meta charset="utf-8"><title data-dcnode-id="427"> History of Astronomy </title></head><body data-dcnode-id="2"><span data-dcnode-id="426" instrument_node="">
</span><link data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/ast121/lectures/default.css&amp;raw" rel="stylesheet"><span data-dcnode-id="423" instrument_node="">
</span><u data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">History of Astronomy</span></u><span data-dcnode-id="420" instrument_node="">:</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">

We have very little in the form of recorded information on early man's impression of
the heavens, mostly some drawings of eclipses, comets, supernovae such as
the Pueblo Petrograph (see below).  However, early man was clearly frightened/overwhelmed by the sky. 
One of the earliest recorded astronomical observations is the Nebra sky disk from
northern Europe dating approximately 1,600 BC.
This 30 cm bronze disk depicts the Sun, a lunar
crescent and stars (including the Pleiades star cluster).  </span></p><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">
</span></p><center data-dcnode-id="413"><img data-dcnode-id="415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/Nebra_Scheibe.jpg&amp;raw" width="50%"><p data-dcnode-id="414"></p></center><span data-dcnode-id="412" instrument_node="">

The disk is
probably a religious symbol as well as a crude astronomical instrument or
calendar.  In the Western hemisphere, similar understanding of basic
stellar and planetary behavior was developing.  For example, Native
American culture around the same time were leaving rock drawings, or
petroglyphs, of astronomical phenomenon.  The clearest example is found below,
a petroglyph which depicts the 1,006 AD supernova
that resulted in the Crab Nebula.</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">
</span></p><center data-dcnode-id="407"><img data-dcnode-id="409" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/petroglyph.jpg&amp;raw"><p data-dcnode-id="408"></p></center><span data-dcnode-id="406" instrument_node="">

Early man also believed that the heavens held power over earthy existence (psychology
of the unknown) which is the origins of the pseudo-science astrology as an attempt to
understand, predict and influence events </span><p data-dcnode-id="401"><span data-dcnode-id="405" instrument_node="">

The earliest written records (i.e. history) were astronomical observations produced
by the Babylonians (~1600 B.C.) who recorded positions of planets, times of eclipses,
etc.  There is also evidence of interest in astronomical phenomenon from early
Chinese, Central American and North European cultures such as </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/stonehenge.html"><span data-dcnode-id="404" instrument_node="">Stonehenge</span></a><span data-dcnode-id="402" instrument_node="">, which is a big computer for
calculating the position of planets and the Sun (i.e.  when to have that big blowout
Solstice thing) </span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">
</span></p><center data-dcnode-id="394"><span data-dcnode-id="398" instrument_node="">
</span><img data-dcnode-id="397" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/stonehenge_sunset.gif&amp;raw"><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">
</span></p></center><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">
Thus, Astronomy was the 1st science, as it was the first thing we recorded
observations for. </span></p><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">

Later in history, 5,000 to 20,000 years ago, humankind begins to organize
themselves and develop what we now call culture.  A greater sense of permanence
in your daily existences leads to the development of culture, where people develop
narrative stories for cultural unity which we now call myths.</span></p><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">
</span></p><center data-dcnode-id="385"><img data-dcnode-id="387" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/celestial_art.jpg&amp;raw"><p data-dcnode-id="386"></p></center><span data-dcnode-id="384" instrument_node="">

Most myths maintain supernatural themes, with gods, divine and semi-divine figures,
but there was usually an internal logical consistence to the narrative.  For example,
myths are often attempts at a rational explanation off events in the everyday world,
their goal is to teach.  Even if we consider some of the stories to be ridiculous,
they were, in some sense, our first scientific theories.  They also, usually, follow
a particular religion, and so this time is characterized by a close marriage of
science and religion.</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">
</span></p><hr data-dcnode-id="381" noshade=""><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">
</span></p><center data-dcnode-id="376"><img data-dcnode-id="378" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/stargazers.gif&amp;raw"><p data-dcnode-id="377"></p></center><span data-dcnode-id="375" instrument_node="">
</span><u data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Hellenistic Culture</span></u><span data-dcnode-id="372" instrument_node=""> (~500 B.C.):</span><p data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">

About 1,000 years later, the ancient Greeks inherited astronomical records from the
Babylonians and applied the data to construct a cosmological framework. Data was not
just used for practical goals, such as navigation, but also to think of </span><i data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">new</span></i><span data-dcnode-id="368" instrument_node="">
experiments, the origin of what we call natural philosophers. </span></p><p data-dcnode-id="359"><span data-dcnode-id="366" instrument_node="">

Of the many natural philosophers before the time of Socrates (the Presocratics) was
</span><a data-dcnode-id="364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/thales.html"><span data-dcnode-id="365" instrument_node="">Thales</span></a><span data-dcnode-id="363" instrument_node=""> (~480 B.C.).  His combination of math
and Babylonian data allowed him to predict </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/eclipse.html"><span data-dcnode-id="362" instrument_node="">eclipses</span></a><span data-dcnode-id="360" instrument_node="">.</span></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node=""> Between the cosmological
foundation set by the Presocratics and the world of Ideas introduced by Plato was a
set of fundamental calculations on the size of the Earth, Moon, Sun and the distances
between the nearby planets performed by Eratosthenes and Aristarchus (c. 250 BC).
Using some simple geometry, these two natural philosophers were able to, for the
first time, place some estimate of the size of the cosmos in Earth terms.</span></p><p data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">

For a long time it was realized that the earth's surface was curved by
people familiar with the behavior of incoming and outgoing ships.  For it
was obvious that as a ship passed over the horizon, the hull disappeared
first, then the topmost sailing masts (although one could argue this is an
effect of refraction in the atmosphere).  Ancient astronomers could see
with their eyes that the Sun and the Moon were round.  And the shadow of
the Earth, cast on the lunar surface during a 
</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/lunar_ec_Sep96.gif"><span data-dcnode-id="355" instrument_node="">lunar eclipse</span></a><span data-dcnode-id="353" instrument_node="">, is curved.  A
sphere is the simplest shape to explain the Earth's shadow (a disk would
sometimes display a shadow shaped like a line or oval).</span></p><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">
</span></p><center data-dcnode-id="347"><img data-dcnode-id="349" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/Eratosthenes.gif&amp;raw"><p data-dcnode-id="348"></p></center><span data-dcnode-id="346" instrument_node="">

Eratosthenes used a spherical Earth model, and some simple geometry, to
calculate its circumference.  Eratosthenes knows that on a special day (the
summer solstice) at noon in the Egyptian city of Syene, a stick placed in
the ground will cast no shadow (i.e., it is parallel to the Sun's rays).  A
stick in the ground at Alexandria, to the north, will cast a shadow at an
angle of 7 degrees.  Eratosthenes realizes that the ratio of a complete
circle (360 degrees) to 7 degrees is the same as the ratio of the
circumference of the Earth to the distance from Alexandria to Swenet.
Centuries of surveying by Egyptian pharaohs scribes gave him the distance
between the two cities of 4900 stadia, approximately 784 kilometers.  This
resulting in a circumference of 40,320 kilometers, which is amazingly close
to the modern value of 40,030 kilometers.  With this calculation,
Eratosthenes becomes the father of geography eventually drawing up the
first maps of the known world and determining the size of the most
fundamental object in the Universe, our own planet.</span><p data-dcnode-id="338"><span data-dcnode-id="345" instrument_node="">
</span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/hipparchus.html"><span data-dcnode-id="344" instrument_node="">Hipparchus</span></a><span data-dcnode-id="342" instrument_node=""> (100 B.C.)
produced first star catalog and recorded the names of </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.campus.bt.com/public/ScienceNet/astron/const/Constellation.html"><span data-dcnode-id="341" instrument_node="">constellations</span></a><span data-dcnode-id="339" instrument_node="">.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">

During the times before the invention of the telescope, there were only seven objects
visible to the ancients, the Sun and the Moon, plus the five planets, Mercury, Venus,
Mars, Jupiter and Saturn.  It was obvious that the planets were not on the celestial
sphere since the Moon clearly passes in front of the Sun and planets Mercury and
Venus can be seen to transit the Sun (the Sun passes in front of Mars, Jupiter and
Saturn).  Plato first proposed that the planets followed perfect circular orbits
around the Earth (for the circle is the most perfect shape).  Later, Heraclides (330
B.C.) developed the first Solar System model, placing the planets in order from the
Earth it was is now called the geocentric solar system model and the beginning of the
geocentric versus heliocentric debate. </span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">
</span></p><center data-dcnode-id="331"><img data-dcnode-id="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/Heraclides_SS.gif&amp;raw"><p data-dcnode-id="332"></p></center><span data-dcnode-id="330" instrument_node="">

Note that orbits are perfect circles (for philosophical reasons = all
things in the Heavens are "perfect") </span><p data-dcnode-id="325"><span data-dcnode-id="329" instrument_node="">

Slightly later,
</span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/aristarchus.html"><span data-dcnode-id="328" instrument_node="">Aristarchus</span></a><span data-dcnode-id="326" instrument_node=""> (270 B.C.)
proposed an alternative model of the Solar System placing the Sun at the center
with the Earth and the planets in circular orbit around it.  The Moon orbits around
the Earth.  This model became known as the heliocentric model.</span></p><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">
</span></p><center data-dcnode-id="320"><img data-dcnode-id="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/Aristarchus_SS.gif&amp;raw"><p data-dcnode-id="321"></p></center><span data-dcnode-id="319" instrument_node="">

Aristarchus was the first to propose a "new" Sun centered cosmology and
one of the primary objections to the heliocentric
model is that the stars display no parallax (the apparent shift of nearby
stars on the sky due to the Earth's motion around the Sun).  However,
Aristarchus believed that the stars were very distant and, thus, display
parallax's that are too small to be seen with the eye (in fact, the first
parallax will not by measured until 1838 by Friedrich Bessel).  The Sun is
like the fixed stars, states Aristarchus, unmoving on a sphere with the Sun
at its center.  For Aristarchus it was absurd that the "Hearth" of the sky,
the Sun, should move and eclipses are easy to explain by the motion of the
Moon around the Earth.</span><p data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">
</span><u data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Problems for Heliocentric Theory</span></u><span data-dcnode-id="315" instrument_node="">: </span></p><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">

While today we know that the Sun is at the center of the solar system, this was not
obvious for the technology of the times pre-1500's.  In particular, Aristarchus'
model was ruled out by the philosophers at the time for three reasons:</span></p><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">
</span></p><ol data-dcnode-id="291"><span data-dcnode-id="309" instrument_node="">
</span><li data-dcnode-id="307"><span data-dcnode-id="308" instrument_node=""> Earth in orbit around Sun means that the Earth is in motion. Before the
discovery of Newton's law of motion, it was impossible to imagine motion without
being able to `feel' it.  Clearly, no motion is detected (although trade winds are
due to the Earth's rotation).  

</span></li><li data-dcnode-id="294"><span data-dcnode-id="306" instrument_node=""> If the Earth undergoes a circular orbit, then nearby stars would have a </span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/parallax.html"><span data-dcnode-id="305" instrument_node="">parallax</span></a><span data-dcnode-id="303" instrument_node="">.  A parallax is an apparent shift in
the position of nearby stars relative to distant stars.</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">
</span></p><center data-dcnode-id="299"><img data-dcnode-id="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/parallax.gif&amp;raw"></center><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">

Of course, if all the stars are implanted on the crystal celestial sphere, then
there is no parallax.</span></p><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">
</span></p></li><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node=""> Lastly, geocentric ideas seem more `natural' to a philosopher.  Earth at the
center of the Universe is a very ego-centric idea, and has an aesthetic appeal.

</span></li></ol><span data-dcnode-id="290" instrument_node="">
</span><a data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/ptolemy.html"><span data-dcnode-id="289" instrument_node="">Ptolemy</span></a><span data-dcnode-id="287" instrument_node=""> (200 A.D.) was an ancient
astronomer, geographer, and mathematician who took the geocentric theory of the solar
system and gave it a mathematical foundation (called the "Ptolemaic system"). He did
this in order to simultaneously produce a cosmological theory based on Aristotle's
physics (circular motion, no voids, geocentric) and one that would provide a
technically accurate description of planetary astronomy.  Ptolemy's system is one of
the first examples of scientists attempting to "save the phenomena", to develop a
combination of perfect circles to match the irregular motion of the planets, i.e.,
using concepts asserted by pure reason that match the observed phenomenon.  </span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">

Ptolemy wrote a great treatise on the celestial sphere and the motion of the planets
call the Almagest.  The Almagest is divided into 13 books, each of which deals with
certain astronomical concepts pertaining to stars and to objects in the solar system.
It was, no doubt, the encyclopedic nature of the work that made the Almagest so
useful to later astronomers and that gave the views contained in it so profound an
influence. In essence, it is a synthesis of the results obtained by Greek astronomy;
it is also the major source of knowledge about the work of Hipparchus, who made a map
of the heavens and named the constellations.</span></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">
</span></p><center data-dcnode-id="279"><img data-dcnode-id="282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/aristotelian_cosmo.gif&amp;raw"><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">

The Christian Aristotelian cosmos, engraving from Peter Apian's
Cosmographia, 1524</span></p></center><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">

In the first book of the Almagest, Ptolemy describes his geocentric system and gives
various arguments to prove that, in its position at the center of the universe, the
Earth must be immovable.  Not least, he showed that if the Earth moved, as some
earlier philosophers had suggested, then certain phenomena should in consequence be
observed.  In particular, Ptolemy argued that since all bodies fall to the center of
the universe, the Earth must be fixed there at the center, otherwise falling objects
would not be seen to drop toward the center of the Earth. Again, if the Earth rotated
once every 24 hours, a body thrown vertically upward should not fall back to the same
place, as it was seen to do. Ptolemy was able to demonstrate, however, that no
contrary observations had ever been obtained.</span></p><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
</span></p><center data-dcnode-id="271"><span data-dcnode-id="274" instrument_node="">
</span><img data-dcnode-id="273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/Apparent_retrograde_motion_of_Mars_in_2003.gif&amp;raw"><span data-dcnode-id="272" instrument_node="">
</span></center><p data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">

Ptolemy accepted the following order for celestial objects in the solar system: Earth
(center), Moon, Mercury, Venus, Sun, Mars, Jupiter, and Saturn.  However, when the
detailed observations of the planets in the skies is examined, the planets undergo
motion which is impossible to explain in the geocentric model, a backward track for
the outer planets.  This behavior is called retrograde motion.</span></p><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">
</span></p><center data-dcnode-id="263"><span data-dcnode-id="266" instrument_node="">
</span><img data-dcnode-id="265" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/retro.gif&amp;raw"><span data-dcnode-id="264" instrument_node="">
</span></center><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">

The solution to retrograde motion was to use a system of circles on circles to
explain the orbits of the planets called epicycles and deferents. The main orbit is
the deferent, the smaller orbit is the epicycle.  Although only one epicycle is shown
in the figure below, over 28 were required to explain the actual orbits of the
planets.</span></p><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">
</span></p><center data-dcnode-id="256"><img data-dcnode-id="258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/epicycle_deferent.gif&amp;raw"><p data-dcnode-id="257"></p></center><span data-dcnode-id="255" instrument_node="">

In the Ptolemaic system, deferents were large circles centered on the Earth, and
epicycles were small circles whose centers moved around the circumferences of the
deferents. The Sun, Moon, and planets moved around the circumference of their own
epicycles. In the movable eccentric, there was one circle; this was centered on a
point displaced from the Earth, with the planet moving around the circumference.
These were mathematically equivalent schemes.</span><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">
</span></p><center data-dcnode-id="250"><img data-dcnode-id="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/e1.gif&amp;raw"><p data-dcnode-id="251"></p></center><span data-dcnode-id="249" instrument_node="">

Although Ptolemy realized that the planets were much closer to the Earth than the
"fixed" stars, he seems to have believed in the physical existence of crystalline
spheres, to which the heavenly bodies were said to be attached. Outside the sphere of
the fixed stars, Ptolemy proposed other spheres, ending with the Primum Mobile
("prime mover"), which provided the motive power for the remaining spheres that
constituted his conception of the universe.  His resulting solar system model looked
like the following, although the planets had as many as 28 epicycles (not shown) to
account for all the details of their motion.</span><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">
</span></p><center data-dcnode-id="244"><img data-dcnode-id="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/e2.gif&amp;raw"><p data-dcnode-id="245"></p></center><span data-dcnode-id="243" instrument_node="">

This model, while complicated, was a complete description of the Solar
System that explained, and predicted, the </span><i data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">apparent</span></i><span data-dcnode-id="240" instrument_node=""> motions of all
the planets. The Ptolemic system began the 1st mathematical paradigm or
framework for our understanding of Nature.</span><p data-dcnode-id="235"><span data-dcnode-id="239" instrument_node="">

We know from history that the great library at Alexandria burns in 272 AD, destroying
a great deal of the astronomical data for the time.  Roman culture collapses and we
enter the Dark Ages.  But, the Roman Catholic Church absorbs </span><a data-dcnode-id="237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/aristotle.html"><span data-dcnode-id="238" instrument_node="">Aristotle's</span></a><span data-dcnode-id="236" instrument_node=""> scientific methods and Ptolemy's
model into its own doctrine. Thus, preserving the scientific method and Ptolemy's
Solar System.  Unfortunately, the geocentric model was accepted as doctrine and,
therefore, was not subjected to the scientific method for hundreds of years.</span></p><p data-dcnode-id="230"><span data-dcnode-id="234" instrument_node="">

Until ... the </span><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/botticelli_venus.jpg"><span data-dcnode-id="233" instrument_node="">Renaissance</span></a><span data-dcnode-id="231" instrument_node="">,
where new ideas were more important than dogma.</span></p><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">
</span></p><center data-dcnode-id="225"><img data-dcnode-id="227" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/copernicus.gif&amp;raw"><p data-dcnode-id="226"></p></center><span data-dcnode-id="224" instrument_node="">
</span><a data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/copernicus.html"><span data-dcnode-id="223" instrument_node="">Copernicus</span></a><span data-dcnode-id="221" instrument_node=""> (1500's) reinvented the
heliocentric theory and challenged Church doctrine.  Copernicus (c.  1520) was not
the first astronomer to challenge the geocentric model of Ptolemy, but he was the
first to successfully formulate a heliocentric model and publish his model.  He was
able to overcome centuries of resistance to the heliocentric model for a series of
political and scientific reasons.  Politically, the authority of the Church was
weakening in Northern Europe in the 15th century allowing more diversity in
scientific thinking (although the new Protestant faiths were also not quick to
embrace the heliocentric model).  Scientifically, a better understanding of motion
(particularly inertia) was undermining the whole concept of an unmoving Earth.  A
rotating Earth is a much simpler explanation for the </span><a data-dcnode-id="219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diurnal_cycle"><span data-dcnode-id="220" instrument_node="">diurnal</span></a><span data-dcnode-id="218" instrument_node=""> motion of stars, an Earth
that rotates is only one step away from an Earth that revolves around the Sun.  The
heliocentric model had a greater impact than simply an improvement to solve
retrograde motion.  By placing the Sun at the center of the Solar System, Copernicus
forced a change in our worldview = </span><a data-dcnode-id="216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/paradigm.html"><span data-dcnode-id="217" instrument_node="">paradigm
shift or science revolution</span></a><span data-dcnode-id="215" instrument_node="">.</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">
</span></p><center data-dcnode-id="210"><img data-dcnode-id="212" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/e3.gif&amp;raw"><p data-dcnode-id="211"></p></center><span data-dcnode-id="209" instrument_node="">

Copernicus began his quest for an improved solar system model with some basic
principles.  Foremost was the postulate that the Earth was not the center of the
Universe, only the center of local gravity and the Moon.  Second, the postulate that
the Sun was the center of the solar system, all planets revolved around the Sun.  In
this fashion, retrograde motion is not cause by the planets themselves, but rather by
the orbit of the Earth.</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">

While Copernicus includes a rotating Earth in his heliocentric model, he
continues to cling to Aristotle's celestial motions, i.e. orbits that are
perfect circles (rather than their true shape, an ellipse).  This forces
Copernicus to adopt a series of moving sphere's for each planet to explain
longitude motion.  While Copernicus has fewer sphere's, since more of the
retrograde motion is accounted for, his system is still extremely
complicated in a computational sense.  It's two greatest advantages is that
it places the inferior planets near the Sun, naturally explaining their
lack of large eastern or western elongations, and removing any extreme
motions, such as that needed to explain durnal changes.</span></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">

Copernicus also changes the immovable empyrean heaven into a fixed sphere
of stars, severing theology from cosmology.  However, Copernicus fails to
produce a mechanically simple scheme for astrologers to cast horoscopes or
astronomers to produce almanacs, for ultimately the tables he produces are
as complicated as Ptolemy's and he did not publish all his results in the
final edition of his work, "On the Revolutions of the Heavenly Spheres".</span></p><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">
</span></p><center data-dcnode-id="200"><img data-dcnode-id="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/geo_hel.gif&amp;raw"><p data-dcnode-id="201"></p></center><span data-dcnode-id="199" instrument_node="">

However, Copernicus, like Ptolemy, also used circular orbits and had to
resort to epicycles and deferents to explain retrograde motions. In fact,
Copernicus was forced to use more epicycles than Ptolemy, i.e. a more
complicated system of circles on circles.  Thus, Copernicus' model would
have failed our modern criteria that a scientific model be as simple as
possible (</span><a data-dcnode-id="197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/occams_razor.html"><span data-dcnode-id="198" instrument_node="">Occam's
Razor</span></a><span data-dcnode-id="196" instrument_node="">).</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">
</span></p><hr data-dcnode-id="193" noshade="" width="90%"><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">
</span></p><center data-dcnode-id="189"><img align="right" data-dcnode-id="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/tycho.gif&amp;raw" width="250"></center><p data-dcnode-id="178"><span data-dcnode-id="188" instrument_node="">
</span><a data-dcnode-id="186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/brahe.html"><span data-dcnode-id="187" instrument_node="">Tycho Brahe</span></a><span data-dcnode-id="185" instrument_node=""> (1580's) was
astronomy's 1st true observer. He built the Danish Observatory (using
</span><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/sextant.html"><span data-dcnode-id="184" instrument_node="">sextant's</span></a><span data-dcnode-id="182" instrument_node=""> since telescopes
had not been invented yet) from which he measured positions of
planets and stars to the highest degree of accuracy for that time
period (1st modern database).  He showed that the Sun was much farther
than the Moon from the Earth, using simple </span><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/trigonometry.html"><span data-dcnode-id="181" instrument_node="">trigonometry</span></a><span data-dcnode-id="179" instrument_node=""> of the angle
between the Moon and the Sun at 1st Quarter.</span></p><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">
</span></p><center data-dcnode-id="174"><img data-dcnode-id="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/moon_sun_angle.gif&amp;raw"></center><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">

The Earth's motion, as a simple matter of dynamics, was extremely
perplexing to the medieval thinker.  The size and mass of the Earth was
approximately known since Eratosthenes had measured the circumference of
the Earth (thus, the volume is known and one could simply multiple the
volume with the mean density of rock to obtain a rough mass estimate).  The
force required to move the Earth seemed impossible to the average medieval
natural philosopher.</span></p><p data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">

Brahe had additional reason to question the motion of the Earth, for his
excellent stellar positional observations continued to fail to detect any
parallax.  This lack of annual parallax implied that the celestial sphere
was "immeasurably large".  Brahe had also attempted to measure the size of
stars, not understanding that the apparent size of a star simply reflects
the blurring caused by the passage of starlight through the atmosphere.
Brahe's estimate for the size of stars would place them larger than the
current day estimate of the size of the Earth's orbit.  Such "titanic"
stars are absurd according to Brahe's understanding of stars at the
time.</span></p><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">
</span></p><center data-dcnode-id="166"><img data-dcnode-id="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/helio_geo1.gif&amp;raw"></center><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">

Beyond Tycho Brahe's accomplishments in the observational arena, he is also
remembered for introducing two compromise solutions to the solar system
model
now referred to as the geoheliocentric models.  Brahe was strongly
influenced by the idea of Mercury and Venus revolving around the Sun to
explain the fact that their apparent motion across the sky never takes them
more than a few tens of degrees from the Sun (called their greatest
elongation).  The behavior of inner worlds differs from the orbital
behavior of the outer planets, which can be found at any place on the
elliptic during their orbital cycle.</span></p><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">
</span></p><center data-dcnode-id="160"><img data-dcnode-id="161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/helio_geo2.gif&amp;raw"></center><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">

Brahe proposed a hybrid solutions to the geocentric model which preserves
the geocentric nature of the Earth at the center of the Universe, but
placed the inner planets (Mercury and Venus) in orbit around the Sun.  This
configuration resolves the problem of Mercury and Venus lack of large
angular distances from the Sun, but saves the key criticism of the
heliocentric model, that the Earth is in motion.  In other works, Brahe's
geoheliocentric model fit the available data but followed the philosophical
intuition of a non-moving Earth.</span></p><p data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">

Neither successfully predicts the motion of the planets.  The solution will
be discovered by a student of Tycho's, who finally resolves the
heliocentric cosmology with the use of elliptical orbits.</span></p><p data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">
</span></p><hr data-dcnode-id="153" noshade="" width="90%"><p data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">
</span></p><center data-dcnode-id="149"><img data-dcnode-id="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/kepler.jpg&amp;raw"></center><p data-dcnode-id="141"><span data-dcnode-id="148" instrument_node="">
</span><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/kepler.html"><span data-dcnode-id="147" instrument_node="">Kepler</span></a><span data-dcnode-id="145" instrument_node=""> (1600's) a student of
Tycho who used Brahe's database to formulate the Laws of Planetary Motion
which corrects the problems of epicycles in the heliocentric theory by
using </span><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/ellipse.html"><span data-dcnode-id="144" instrument_node="">ellipses</span></a><span data-dcnode-id="142" instrument_node=""> instead of
circles for orbits of the planets.</span></p><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">
</span></p><center data-dcnode-id="136"><img data-dcnode-id="138" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/equal_areas.gif&amp;raw"><p data-dcnode-id="137"></p></center><span data-dcnode-id="135" instrument_node="">

This is a key mathematical formulation because the reason Copernicus'
heliocentric model has to use epicycles is due to the fact that he assumed
perfectly circular orbits.  With the use of ellipses, the heliocentric
model eliminates the need for epicycles and deferents.  The orbital motion
of a planet is completely described by six elements: the semi-major axis,
the eccentricity, the inclination, the longitude of the ascending node,
the argument of the perihelion and the time of the perihelion.</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">
</span></p><center data-dcnode-id="130"><img data-dcnode-id="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/orbital_elements.gif&amp;raw"><p data-dcnode-id="131"></p></center><span data-dcnode-id="129" instrument_node="">

The formulation of a highly accurate system of determining the
motions of all the planets marks the beginning of the </span><a data-dcnode-id="127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/clockwork_universe.html"><span data-dcnode-id="128" instrument_node="">clockwork Universe</span></a><span data-dcnode-id="126" instrument_node="">
concept, and another paradigm shift in our philosophy of science.
</span><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">
</span></p><hr data-dcnode-id="123" noshade="" width="90%"><p data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">
</span></p><center data-dcnode-id="119"><img data-dcnode-id="120" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/galileo.jpg&amp;raw"></center><p data-dcnode-id="114"><span data-dcnode-id="118" instrument_node="">
</span><u data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">Galileo</span></u><span data-dcnode-id="115" instrument_node="">:</span></p><p data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">

Kepler's laws are a mathematical formulation of the solar system.  But, is
the solar system `really' composed of elliptical orbits, or is this just a
computational trick and the `real' solar system is geocentric.  Of course,
the
answer to questions of this nature is observation.</span></p><p data-dcnode-id="104"><span data-dcnode-id="111" instrument_node="">

The pioneer of astronomical observation in a modern context is Galileo.
</span><a data-dcnode-id="109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/galileo.html"><span data-dcnode-id="110" instrument_node="">Galileo</span></a><span data-dcnode-id="108" instrument_node=""> (1620's) developed laws
of motion (natural versus forced motion, rest versus uniform motion).
Then, with a small refracting </span><a data-dcnode-id="106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/galileo_telescope.jpg"><span data-dcnode-id="107" instrument_node="">telescope</span></a><span data-dcnode-id="105" instrument_node=""> (3-inches),
destroyed the the
idea of a "perfect", geocentric Universe with the following 5
discoveries:</span></p><p data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">
</span></p><center data-dcnode-id="86"><span data-dcnode-id="101" instrument_node="">
</span><img data-dcnode-id="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/harriot_ss1.gif&amp;raw"><p data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">
spots on the Sun</span></p><p data-dcnode-id="95"><span data-dcnode-id="97" instrument_node="">
</span><img data-dcnode-id="96" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/g_sidnun_moon.gif&amp;raw"></p><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">
mountains and "seas" (maria) on the Moon</span></p><p data-dcnode-id="90"><span data-dcnode-id="92" instrument_node="">
</span><img data-dcnode-id="91" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/galileo_3.gif&amp;raw"></p><p data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">
Milky Way is made of lots of stars</span></p><p data-dcnode-id="87"></p></center><span data-dcnode-id="85" instrument_node="">

These first three are more of an aesthetic nature.  Plato requires a
`perfect'
Universe.  Spots, craters and a broken Milky Way are all features of
imperfection
and at odds with Plato's ideas on purely philosophical grounds.  However,
the laws
of motion are as pure as Plato's celestial sphere, but clearly are not easy
to apply
in the world of friction and air currents etc.  So these observations, by
themselves, are not fatal to the geocentric theory.  The next two are fatal
and can
only be explained by a heliocentric model.</span><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">
</span></p><center data-dcnode-id="76"><span data-dcnode-id="82" instrument_node="">
</span><img data-dcnode-id="81" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/venus_orbit.gif&amp;raw"><p data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">
Venus has phases</span></p><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">
</span></p></center><span data-dcnode-id="75" instrument_node="">
</span><span data-dcnode-id="73" instrument_node="">
</span><span data-dcnode-id="71" instrument_node="">
</span><center data-dcnode-id="64"><span data-dcnode-id="70" instrument_node="">
</span><img data-dcnode-id="69" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/journal_jup1.gif&amp;raw"><p data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">
Jupiter has moons (Galilean moons: Io, Europa, Callisto, Ganymede)</span></p><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">
</span></p></center><span data-dcnode-id="63" instrument_node="">

Notice that planets with phases are possible in a geocentric model.  But
for a
planet to change in apparent size with its phases, like Venus is impossible
if the
planet orbits the same distance from the Earth.  And, lastly, if all bodies
orbit
around the Earth, then the moons of Jupiter, which clearly orbit around
that planet,
are definitive proof that the geocentric model is wrong.</span><p data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">
</span></p><center data-dcnode-id="58"><img data-dcnode-id="60" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/images/digges_universe.gif&amp;raw"><p data-dcnode-id="59"></p></center><span data-dcnode-id="57" instrument_node="">
</span><a data-dcnode-id="55" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//abyss.uoregon.edu/~js/glossary/newton.html"><span data-dcnode-id="56" instrument_node="">Newton</span></a><span data-dcnode-id="54" instrument_node=""> (1680's) developed the law of Universal Gravitation, laws of
accelerated motion, invented calculus (math tool), the 1st reflecting
telescope and theory of light.</span><p data-dcnode-id="52"><span data-dcnode-id="53" instrument_node="">

... off to the 18-20th century, with discovery of the outer planets
and where astronomy moves towards discoveries
in stellar and galactic areas, next paradigm shift occurs in early
1960's with NASA deep space probes</span></p><p data-dcnode-id="50"><span data-dcnode-id="51" instrument_node="">
</span></p><center data-dcnode-id="45"><span data-dcnode-id="49" instrument_node="">
</span><a data-dcnode-id="47" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fourmilab.ch/cgi-bin/uncgi/Solar"><span data-dcnode-id="48" instrument_node="">Solar System
Right Now</span></a><p data-dcnode-id="46"></p></center><span data-dcnode-id="44" instrument_node="">
</span><hr data-dcnode-id="43" noshade=""><p data-dcnode-id="3"><span data-dcnode-id="42" instrument_node="">
