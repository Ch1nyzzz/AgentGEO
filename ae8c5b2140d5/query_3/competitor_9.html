 instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1566" instrument_node=""> and out to distant </span><a class="md-crosslink" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1565" instrument_node="">galaxies</span></a><span data-dcnode-id="1563" instrument_node=""> billions of light-years away.</span></p></div></div><h3 class="accordion--question p-10 pr-25 bg-gray-100 mb-0 mt-5" data-dcnode-id="1557" data-value="2"><div class="pe-none" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">How is astronomy different from cosmology?</span></div></h3><div class="accordion--answer hidden border border-top-0" data-dcnode-id="1529"><div class="accordion--answer-copy p-20 bg-gray-50" data-dcnode-id="1530"><p class="font-16 lh-sm" data-dcnode-id="1531"><span data-dcnode-id="1556" instrument_node="">Astronomy is the study of objects and phenomena beyond </span><a class="md-crosslink" data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1555" instrument_node="">Earth</span></a><span data-dcnode-id="1553" instrument_node="">, whereas </span><a class="md-crosslink" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/cosmology-astronomy"><span data-dcnode-id="1552" instrument_node="">cosmology</span></a><span data-dcnode-id="1550" instrument_node=""> is a branch of astronomy that studies the origin of the universe and how it has evolved. For example, the </span><a class="md-crosslink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/big-bang-model"><span data-dcnode-id="1549" instrument_node="">big bang</span></a><span data-dcnode-id="1547" instrument_node="">, the origin of the </span><a class="md-crosslink" data-dcnode-id="1545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/chemical-element"><span data-dcnode-id="1546" instrument_node="">chemical elements</span></a><span data-dcnode-id="1544" instrument_node="">, and the </span><a class="md-crosslink" data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/cosmic-microwave-background"><span data-dcnode-id="1543" instrument_node="">cosmic microwave background</span></a><span data-dcnode-id="1541" instrument_node=""> are all subjects of cosmology. However, other subjects such as </span><a class="md-crosslink" data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/extrasolar-planet"><span data-dcnode-id="1540" instrument_node="">extrasolar planets</span></a><span data-dcnode-id="1538" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1537" instrument_node="">stars</span></a><span data-dcnode-id="1535" instrument_node=""> in the present </span><a class="md-crosslink" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Milky-Way-Galaxy"><span data-dcnode-id="1534" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1532" instrument_node=""> are not.&nbsp;</span></p></div></div></div><span class="marker before-article" data-dcnode-id="1526"></span><div class="md-sentinel--spy-target" data-dcnode-id="1525"></div><section data-dcnode-id="1462" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1469"><strong data-dcnode-id="1522"><span data-dcnode-id="1524" id="ref406855"></span><span data-dcnode-id="1523" instrument_node="">astronomy</span></strong><span data-dcnode-id="1521" instrument_node="">,  </span><a class="md-crosslink autoxref" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/science"><span data-dcnode-id="1520" instrument_node="">science</span></a><span data-dcnode-id="1518" instrument_node=""> that </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1516" data-term="encompasses" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/encompasses"><span data-dcnode-id="1517" instrument_node="">encompasses</span></a><span data-dcnode-id="1515" instrument_node=""> the study of all extraterrestrial objects and phenomena. Until the invention of the </span><a class="md-crosslink" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope"><span data-dcnode-id="1514" instrument_node="">telescope</span></a><span data-dcnode-id="1512" instrument_node=""> and the discovery of the </span><a class="md-crosslink" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Newtons-laws-of-motion"><span data-dcnode-id="1511" instrument_node="">laws of motion</span></a><span data-dcnode-id="1509" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/gravity-physics"><span data-dcnode-id="1508" instrument_node="">gravity</span></a><span data-dcnode-id="1506" instrument_node=""> in the 17th century, astronomy was primarily concerned with noting and predicting the positions of the </span><a class="md-crosslink" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1505" instrument_node="">Sun</span></a><span data-dcnode-id="1503" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Moon"><span data-dcnode-id="1502" instrument_node="">Moon</span></a><span data-dcnode-id="1500" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/planet"><span data-dcnode-id="1499" instrument_node="">planets</span></a><span data-dcnode-id="1497" instrument_node="">, originally for </span><a class="md-crosslink" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/calendar"><span data-dcnode-id="1496" instrument_node="">calendrical</span></a><span data-dcnode-id="1494" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/astrology"><span data-dcnode-id="1493" instrument_node="">astrological</span></a><span data-dcnode-id="1491" instrument_node=""> purposes and later for </span><a class="md-crosslink" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/navigation-technology"><span data-dcnode-id="1490" instrument_node="">navigational</span></a><span data-dcnode-id="1488" instrument_node=""> uses and scientific interest. The catalog of objects now studied is much broader and includes, in order of increasing distance, the </span><a class="md-crosslink" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1487" instrument_node="">solar system</span></a><span data-dcnode-id="1485" instrument_node="">, the </span><a class="md-crosslink" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1484" instrument_node="">stars</span></a><span data-dcnode-id="1482" instrument_node=""> that make up the </span><a class="md-crosslink" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Milky-Way-Galaxy"><span data-dcnode-id="1481" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1479" instrument_node="">, and other, more distant </span><a class="md-crosslink" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1478" instrument_node="">galaxies</span></a><span data-dcnode-id="1476" instrument_node="">. With the advent of scientific space probes, </span><a class="md-crosslink" data-dcnode-id="1474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1475" instrument_node="">Earth</span></a><span data-dcnode-id="1473" instrument_node=""> also has come to be studied as one of the planets, though its more-detailed investigation remains the domain of the </span><a class="md-crosslink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Earth-sciences"><span data-dcnode-id="1472" instrument_node="">Earth sciences</span></a><span data-dcnode-id="1470" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1467"></span><span class="marker AM1 am-inline" data-dcnode-id="1465"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1463"></span></section><span data-dcnode-id="1461" instrument_node=""> </span><span class="marker h2" data-dcnode-id="1459"></span><div class="md-sentinel--spy-target" data-dcnode-id="1458"></div><section data-dcnode-id="1135" data-has-spy="true" data-level="1" id="ref257777"><h2 class="h1" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">The scope of astronomy</span></h2><span data-dcnode-id="1455" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1409"><span data-dcnode-id="1454" instrument_node="">Since the late 19th century, astronomy has expanded to include </span><span data-dcnode-id="1453" id="ref406856"></span><a class="md-crosslink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astrophysics"><span data-dcnode-id="1452" instrument_node="">astrophysics</span></a><span data-dcnode-id="1450" instrument_node="">, the application of </span><a class="md-crosslink" data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/physics-science"><span data-dcnode-id="1449" instrument_node="">physical</span></a><span data-dcnode-id="1447" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/chemistry"><span data-dcnode-id="1446" instrument_node="">chemical</span></a><span data-dcnode-id="1444" instrument_node=""> knowledge to an understanding of the nature of celestial objects and the physical processes that control their formation, evolution, and emission of </span><a class="md-crosslink" data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/radiation"><span data-dcnode-id="1443" instrument_node="">radiation</span></a><span data-dcnode-id="1441" instrument_node="">. In addition, the </span><a class="md-crosslink" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/gas-state-of-matter"><span data-dcnode-id="1440" instrument_node="">gases</span></a><span data-dcnode-id="1438" instrument_node=""> and dust particles around and between the stars have become the subjects of much research. Study of the </span><a class="md-crosslink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/nuclear-reaction"><span data-dcnode-id="1437" instrument_node="">nuclear reactions</span></a><span data-dcnode-id="1435" instrument_node=""> that provide the </span><a class="md-crosslink autoxref" data-dcnode-id="1433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/energy"><span data-dcnode-id="1434" instrument_node="">energy</span></a><span data-dcnode-id="1432" instrument_node=""> radiated by stars has shown how the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1430" data-term="diversity" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/diversity"><span data-dcnode-id="1431" instrument_node="">diversity</span></a><span data-dcnode-id="1429" instrument_node=""> of </span><a class="md-crosslink" data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atom"><span data-dcnode-id="1428" instrument_node="">atoms</span></a><span data-dcnode-id="1426" instrument_node=""> found in nature can be derived from a </span><a class="md-crosslink autoxref" data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/universe"><span data-dcnode-id="1425" instrument_node="">universe</span></a><span data-dcnode-id="1423" instrument_node=""> that, following the first few minutes of its existence, consisted only of </span><a class="md-crosslink" data-dcnode-id="1421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/hydrogen"><span data-dcnode-id="1422" instrument_node="">hydrogen</span></a><span data-dcnode-id="1420" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/helium-chemical-element"><span data-dcnode-id="1419" instrument_node="">helium</span></a><span data-dcnode-id="1417" instrument_node="">, and a trace of </span><a class="md-crosslink" data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/lithium-chemical-element"><span data-dcnode-id="1416" instrument_node="">lithium</span></a><span data-dcnode-id="1414" instrument_node="">. Concerned with phenomena on the largest scale is </span><span data-dcnode-id="1413" id="ref406857"></span><a class="md-crosslink" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/cosmology-astronomy"><span data-dcnode-id="1412" instrument_node="">cosmology</span></a><span data-dcnode-id="1410" instrument_node="">, the study of the evolution of the universe. Astrophysics has transformed cosmology from a purely speculative activity to a modern science capable of predictions that can be tested.</span></p><span class="marker p2" data-dcnode-id="1407"></span><span class="marker AM2 am-inline" data-dcnode-id="1405"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1403"></span><span data-dcnode-id="1402" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1364"><span data-dcnode-id="1401" instrument_node="">Its great advances notwithstanding, astronomy is still subject to a major constraint: it is inherently an observational rather than an experimental science. Almost all measurements must be performed at great distances from the objects of interest, with no control over such quantities as their </span><a class="md-crosslink" data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/temperature"><span data-dcnode-id="1400" instrument_node="">temperature</span></a><span data-dcnode-id="1398" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/pressure"><span data-dcnode-id="1397" instrument_node="">pressure</span></a><span data-dcnode-id="1395" instrument_node="">, or chemical </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1393" data-term="composition" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/composition"><span data-dcnode-id="1394" instrument_node="">composition</span></a><span data-dcnode-id="1392" instrument_node="">. There are a few exceptions to this limitation—namely, </span><a class="md-crosslink" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/meteorite"><span data-dcnode-id="1391" instrument_node="">meteorites</span></a><span data-dcnode-id="1389" instrument_node=""> (most of which are from the asteroid belt, though some are from the Moon or </span><a class="md-crosslink" data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mars-planet"><span data-dcnode-id="1388" instrument_node="">Mars</span></a><span data-dcnode-id="1386" instrument_node="">), rock and soil samples brought back from the </span><a class="md-crosslink" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Moon"><span data-dcnode-id="1385" instrument_node="">Moon</span></a><span data-dcnode-id="1383" instrument_node="">, samples of </span><a class="md-crosslink" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/comet-astronomy"><span data-dcnode-id="1382" instrument_node="">comet</span></a><span data-dcnode-id="1380" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/asteroid"><span data-dcnode-id="1379" instrument_node="">asteroid</span></a><span data-dcnode-id="1377" instrument_node=""> dust returned by robotic </span><a class="md-crosslink autoxref" data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/spacecraft"><span data-dcnode-id="1376" instrument_node="">spacecraft</span></a><span data-dcnode-id="1374" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/interplanetary-dust-particle"><span data-dcnode-id="1373" instrument_node="">interplanetary dust particles</span></a><span data-dcnode-id="1371" instrument_node=""> collected in or above the </span><a class="md-crosslink" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/stratosphere"><span data-dcnode-id="1370" instrument_node="">stratosphere</span></a><span data-dcnode-id="1368" instrument_node="">. These can be examined with laboratory techniques to provide information that cannot be obtained in any other way. In the future, space missions may return surface materials from Mars, or other objects, but much of astronomy appears otherwise </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1366" data-term="confined" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/confined"><span data-dcnode-id="1367" instrument_node="">confined</span></a><span data-dcnode-id="1365" instrument_node=""> to Earth-based observations augmented by observations from orbiting satellites and long-range space probes and supplemented by theory.</span></p><span class="marker p3" data-dcnode-id="1362"></span><div class="assemblies" data-dcnode-id="1347"><div class="w-100" data-dcnode-id="1348"><figure class="md-assembly card print-false" data-assembly-id="151757" data-dcnode-id="1349"><div class="md-assembly-wrapper card-media" data-dcnode-id="1357" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1358" data-href="/media/1/40047/151757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/92/146992-050-84313BB6/meteorite-Arizona-Canyon-Diablo.jpg" style="--aspect-ratio: 16/9"><img alt="nickel-iron meteorite" data-dcnode-id="1361" data-height="559" data-width="800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/92/146992-050-84313BB6/meteorite-Arizona-Canyon-Diablo.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1359"><em class="material-icons link-blue" data-dcnode-id="1360" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1350"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1355" data-href="/media/1/40047/151757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/92/146992-050-84313BB6/meteorite-Arizona-Canyon-Diablo.jpg"><span data-dcnode-id="1356" instrument_node="">nickel-iron meteorite</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Nickel-iron meteorite, from Canyon Diablo, Arizona.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">© Kenneth V. Pilon/Shutterstock.com</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="1345"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1343"></span><span data-dcnode-id="1342" instrument_node=""> </span><div class="md-sentinel--spy-target" data-dcnode-id="1341"></div><section data-dcnode-id="1137" data-has-spy="true" data-level="2" id="ref257778"><h2 class="h2" data-dcnode-id="1336"><span data-dcnode-id="1340" instrument_node="">Determining astronomical </span><span data-dcnode-id="1339" id="ref910460"></span><a class="md-crosslink" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/distance-physics"><span data-dcnode-id="1338" instrument_node="">distances</span></a></h2><span data-dcnode-id="1334" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1265"><span data-dcnode-id="1333" instrument_node="">A central undertaking in astronomy is the determination of distances. Without a knowledge of astronomical distances, the size of an observed object in space would remain nothing more than an angular diameter and the brightness of a </span><a class="md-crosslink" data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1332" instrument_node="">star</span></a><span data-dcnode-id="1330" instrument_node=""> could not be converted into its true radiated power, or </span><a class="md-crosslink" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/luminosity"><span data-dcnode-id="1329" instrument_node="">luminosity</span></a><span data-dcnode-id="1327" instrument_node="">. Astronomical distance measurement began with a knowledge of </span><a class="md-crosslink" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1326" instrument_node="">Earth’s</span></a><span data-dcnode-id="1324" instrument_node=""> diameter, which provided a base for triangulation. Within the inner </span><a class="md-crosslink" data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1323" instrument_node="">solar system</span></a><span data-dcnode-id="1321" instrument_node="">, some distances can now be better determined through the timing of </span><a class="md-crosslink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/radar"><span data-dcnode-id="1320" instrument_node="">radar</span></a><span data-dcnode-id="1318" instrument_node=""> reflections or, in the case of the </span><a class="md-crosslink" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Moon"><span data-dcnode-id="1317" instrument_node="">Moon</span></a><span data-dcnode-id="1315" instrument_node="">, through </span><a class="md-crosslink" data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/laser"><span data-dcnode-id="1314" instrument_node="">laser</span></a><span data-dcnode-id="1312" instrument_node=""> ranging. For the outer planets, triangulation is still used. Beyond the solar system, distances to the closest </span><span data-dcnode-id="1311" id="ref910462"></span><a class="md-crosslink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1310" instrument_node="">stars</span></a><span data-dcnode-id="1308" instrument_node=""> are determined through triangulation, in which the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1306" data-term="diameter" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/diameter"><span data-dcnode-id="1307" instrument_node="">diameter</span></a><span data-dcnode-id="1305" instrument_node=""> of Earth’s </span><a class="md-crosslink" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/orbit-astronomy"><span data-dcnode-id="1304" instrument_node="">orbit</span></a><span data-dcnode-id="1302" instrument_node=""> serves as the baseline and shifts in stellar </span><span data-dcnode-id="1301" id="ref406858"></span><a class="md-crosslink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/parallax"><span data-dcnode-id="1300" instrument_node="">parallax</span></a><span data-dcnode-id="1298" instrument_node=""> are the measured quantities. Stellar distances are commonly expressed by astronomers in </span><span data-dcnode-id="1297" id="ref406859"></span><a class="md-crosslink" data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/parsec"><span data-dcnode-id="1296" instrument_node="">parsecs</span></a><span data-dcnode-id="1294" instrument_node=""> (pc), kiloparsecs, or megaparsecs. (1&nbsp;pc&nbsp;=&nbsp;3.086&nbsp;×&nbsp;10</span><sup data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">18</span></sup><span data-dcnode-id="1291" instrument_node=""> cm, or about 3.26 light-years [1.92 × 10</span><sup data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">13</span></sup><span data-dcnode-id="1288" instrument_node=""> miles].) Distances can be measured out to around a kiloparsec by trigonometric parallax (</span><em data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">see</span></em><span data-dcnode-id="1285" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy/Distances-to-the-stars%23ref52809"><span data-dcnode-id="1284" instrument_node="">star: Determining stellar distances</span></a><span data-dcnode-id="1282" instrument_node="">). The accuracy of measurements made from Earth’s surface is limited by </span><a class="md-crosslink" data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atmosphere"><span data-dcnode-id="1281" instrument_node="">atmospheric</span></a><span data-dcnode-id="1279" instrument_node=""> effects, but measurements made from the </span><span data-dcnode-id="1278" id="ref910461"></span><a class="md-crosslink" data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Hipparcos"><span data-dcnode-id="1277" instrument_node="">Hipparcos</span></a><span data-dcnode-id="1275" instrument_node=""> </span><a class="md-crosslink autoxref" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/satellite"><span data-dcnode-id="1274" instrument_node="">satellite</span></a><span data-dcnode-id="1272" instrument_node=""> in the 1990s extended the scale to stars as far as 650 parsecs, with an accuracy of about a thousandth of an arc second. The </span><a class="md-crosslink" data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Gaia-European-Space-Agency-satellite"><span data-dcnode-id="1271" instrument_node="">Gaia</span></a><span data-dcnode-id="1269" instrument_node=""> satellite is expected to measure stars as far away as 10 kiloparsecs to an accuracy of 20 percent. Less-direct measurements must be used for more-distant stars and for </span><a class="md-crosslink" data-dcnode-id="1267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1268" instrument_node="">galaxies</span></a><span data-dcnode-id="1266" instrument_node="">.</span></p><span class="marker p4" data-dcnode-id="1263"></span><div class="assemblies" data-dcnode-id="1248"><div class="w-100" data-dcnode-id="1249"><figure class="md-assembly card print-false" data-assembly-id="148686" data-dcnode-id="1250"><div class="md-assembly-wrapper card-media" data-dcnode-id="1258" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1259" data-href="/media/1/40047/148686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/77/114277-050-65067AD7/distances.jpg" style="--aspect-ratio: 16/9"><img alt="stellar distances" data-dcnode-id="1262" data-height="1600" data-width="835" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/77/114277-050-65067AD7/distances.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1260"><em class="material-icons link-blue" data-dcnode-id="1261" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1251"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1256" data-href="/media/1/40047/148686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/77/114277-050-65067AD7/distances.jpg"><span data-dcnode-id="1257" instrument_node="">stellar distances</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Calculating stellar distances.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM4 am-inline" data-dcnode-id="1246"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1244"></span><span data-dcnode-id="1243" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1201"><span data-dcnode-id="1242" instrument_node="">Two general methods for determining </span><span data-dcnode-id="1241" id="ref910463"></span><a class="md-crosslink" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1240" instrument_node="">galactic</span></a><span data-dcnode-id="1238" instrument_node=""> distances are described here. In the first, a clearly identifiable type of star is used as a reference standard because its luminosity has been well determined. This requires observation of such stars that are close enough to Earth that their distances and luminosities have been reliably measured. Such a star is termed a “</span><span data-dcnode-id="1237" id="ref910455"></span><a class="md-crosslink" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Standard-Candle"><span data-dcnode-id="1236" instrument_node="">standard candle</span></a><span data-dcnode-id="1234" instrument_node="">.” Examples are </span><a class="md-crosslink" data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Cepheid-variable"><span data-dcnode-id="1233" instrument_node="">Cepheid variables</span></a><span data-dcnode-id="1231" instrument_node="">, whose brightness varies periodically in well-documented ways, and certain types of </span><a class="md-crosslink" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/supernova"><span data-dcnode-id="1230" instrument_node="">supernova</span></a><span data-dcnode-id="1228" instrument_node=""> explosions that have enormous brilliance and can thus be seen out to very great distances. Once the luminosities of such nearer standard candles have been </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1226" data-term="calibrated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/calibrated"><span data-dcnode-id="1227" instrument_node="">calibrated</span></a><span data-dcnode-id="1225" instrument_node="">, the distance to a farther standard candle can be calculated from its calibrated luminosity and its actual measured intensity. (The measured intensity [</span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">I</span></em><span data-dcnode-id="1222" instrument_node="">] is related to the luminosity [</span><em data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">L</span></em><span data-dcnode-id="1219" instrument_node="">] and distance [</span><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">d</span></em><span data-dcnode-id="1216" instrument_node="">] by the formula </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">I</span></em><span data-dcnode-id="1213" instrument_node="">&nbsp;=&nbsp;</span><em data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">L</span></em><span data-dcnode-id="1210" instrument_node="">/4π</span><em data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">d</span></em><sup data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">2</span></sup><span data-dcnode-id="1205" instrument_node="">.) A standard candle can be identified by means of its spectrum or the pattern of regular variations in brightness. (Corrections may have to be made for the absorption of starlight by </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1203" data-term="interstellar" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/interstellar"><span data-dcnode-id="1204" instrument_node="">interstellar</span></a><span data-dcnode-id="1202" instrument_node=""> gas and dust over great distances.) This method forms the basis of measurements of distances to the closest galaxies.</span></p><span class="marker p5" data-dcnode-id="1199"></span><span class="marker AM5 am-inline" data-dcnode-id="1197"></span><span class="marker MOD5 mod-inline" data-dcnode-id="1195"></span><span data-dcnode-id="1194" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1159"><span data-dcnode-id="1193" instrument_node="">The second method for galactic distance measurements makes use of the observation that the distances to galaxies generally correlate with the speeds with which those </span><span data-dcnode-id="1192" id="ref910466"></span><a class="md-crosslink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galactic-recession"><span data-dcnode-id="1191" instrument_node="">galaxies are receding</span></a><span data-dcnode-id="1189" instrument_node=""> from Earth (as determined from the </span><a class="md-crosslink" data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Doppler-effect"><span data-dcnode-id="1188" instrument_node="">Doppler shift</span></a><span data-dcnode-id="1186" instrument_node=""> in the wavelengths of their emitted light). This correlation is expressed in the </span><span data-dcnode-id="1185" id="ref910464"></span><a class="md-crosslink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Hubbles-law"><span data-dcnode-id="1184" instrument_node="">Hubble law</span></a><span data-dcnode-id="1182" instrument_node="">: velocity&nbsp;=&nbsp;</span><em data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">H</span></em><span data-dcnode-id="1179" instrument_node="">&nbsp;×&nbsp;distance, in which </span><em data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">H</span></em><span data-dcnode-id="1176" instrument_node=""> denotes </span><span data-dcnode-id="1175" id="ref406860"></span><a class="md-crosslink" data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Hubble-constant"><span data-dcnode-id="1174" instrument_node="">Hubble’s constant</span></a><span data-dcnode-id="1172" instrument_node="">, which must be determined from observations of the rate at which the galaxies are receding. There is widespread agreement that </span><em data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">H</span></em><span data-dcnode-id="1169" instrument_node=""> lies between 67 and 73 kilometres per second per megaparsec (km/sec/Mpc). </span><em data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">H</span></em><span data-dcnode-id="1166" instrument_node=""> has been used to determine distances to remote galaxies in which standard candles have not been found. (For additional discussion of the recession of galaxies, the Hubble law, and galactic distance determination, </span><em data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">see</span></em><span data-dcnode-id="1163" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/physical-science/Developments-and-trends-of-the-20th-and-21st-centuries%23ref32556"><span data-dcnode-id="1162" instrument_node="">physical science: Astronomy</span></a><span data-dcnode-id="1160" instrument_node="">.)</span></p><span class="marker p6" data-dcnode-id="1157"></span><div class="assemblies" data-dcnode-id="1142"><div class="w-100" data-dcnode-id="1143"><figure class="md-assembly card print-false" data-assembly-id="141128" data-dcnode-id="1144"><div class="md-assembly-wrapper card-media" data-dcnode-id="1152" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1153" data-href="/media/1/40047/141128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/49/97249-050-2103161D/Doppler-shift.jpg" style="--aspect-ratio: 16/9"><img alt="Doppler shift" data-dcnode-id="1156" data-height="747" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/49/97249-050-2103161D/Doppler-shift.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1154"><em class="material-icons link-blue" data-dcnode-id="1155" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1145"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1150" data-href="/media/1/40047/141128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/49/97249-050-2103161D/Doppler-shift.jpg"><span data-dcnode-id="1151" instrument_node="">Doppler shift</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Doppler shift.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM6 am-inline" data-dcnode-id="1140"></span><span class="marker MOD6 mod-inline" data-dcnode-id="1138"></span></section><span data-dcnode-id="1136" instrument_node=""> </span></section><span class="marker end-of-content" data-dcnode-id="1133"></span><span class="marker after-article" data-dcnode-id="1131"></span></div><span data-dcnode-id="1129" instrument_node="">
