</span><span class="marker before-article" data-dcnode-id="1113"></span><div class="md-sentinel--spy-target" data-dcnode-id="1112"></div><section data-dcnode-id="523" data-has-spy="true" data-level="2" id="ref257779"><h1 class="h2" data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Study of the </span><span data-dcnode-id="1110" id="ref406861"></span><a class="md-crosslink" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1109" instrument_node="">solar system</span></a></h1><span data-dcnode-id="1105" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1045"><span data-dcnode-id="1104" instrument_node="">The </span><a class="md-crosslink" data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1103" instrument_node="">solar system</span></a><span data-dcnode-id="1101" instrument_node=""> took shape 4.57 billion years ago, when it condensed within a large cloud of gas and dust. Gravitational attraction holds the </span><a class="md-crosslink" data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/planet"><span data-dcnode-id="1100" instrument_node="">planets</span></a><span data-dcnode-id="1098" instrument_node=""> in their </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1096" data-term="elliptical" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/elliptical"><span data-dcnode-id="1097" instrument_node="">elliptical</span></a><span data-dcnode-id="1095" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/orbit-astronomy"><span data-dcnode-id="1094" instrument_node="">orbits</span></a><span data-dcnode-id="1092" instrument_node=""> around the </span><span data-dcnode-id="1091" id="ref910467"></span><a class="md-crosslink" data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1090" instrument_node="">Sun</span></a><span data-dcnode-id="1088" instrument_node="">. In addition to </span><span data-dcnode-id="1087" id="ref910468"></span><a class="md-crosslink" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1086" instrument_node="">Earth</span></a><span data-dcnode-id="1084" instrument_node="">, five major planets (</span><span data-dcnode-id="1083" id="ref910469"></span><a class="md-crosslink" data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mercury-planet"><span data-dcnode-id="1082" instrument_node="">Mercury</span></a><span data-dcnode-id="1080" instrument_node="">, </span><span data-dcnode-id="1079" id="ref910470"></span><a class="md-crosslink" data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Venus-planet"><span data-dcnode-id="1078" instrument_node="">Venus</span></a><span data-dcnode-id="1076" instrument_node="">, </span><span data-dcnode-id="1075" id="ref910471"></span><a class="md-crosslink" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mars-planet"><span data-dcnode-id="1074" instrument_node="">Mars</span></a><span data-dcnode-id="1072" instrument_node="">, </span><span data-dcnode-id="1071" id="ref910472"></span><a class="md-crosslink" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Jupiter-planet"><span data-dcnode-id="1070" instrument_node="">Jupiter</span></a><span data-dcnode-id="1068" instrument_node="">, and </span><span data-dcnode-id="1067" id="ref910473"></span><a class="md-crosslink" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Saturn-planet"><span data-dcnode-id="1066" instrument_node="">Saturn</span></a><span data-dcnode-id="1064" instrument_node="">) have been known from ancient times. Since then only two more have been discovered: </span><span data-dcnode-id="1063" id="ref910474"></span><a class="md-crosslink" data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Uranus-planet"><span data-dcnode-id="1062" instrument_node="">Uranus</span></a><span data-dcnode-id="1060" instrument_node=""> by accident in 1781 and </span><span data-dcnode-id="1059" id="ref910475"></span><a class="md-crosslink" data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Neptune-planet"><span data-dcnode-id="1058" instrument_node="">Neptune</span></a><span data-dcnode-id="1056" instrument_node=""> in 1846 after a deliberate search following a theoretical prediction based on observed irregularities in the orbit of Uranus. </span><span data-dcnode-id="1055" id="ref910476"></span><a class="md-crosslink" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Pluto-dwarf-planet"><span data-dcnode-id="1054" instrument_node="">Pluto</span></a><span data-dcnode-id="1052" instrument_node="">, discovered in 1930 after a search for a planet predicted to lie beyond Neptune, was considered a major planet until 2006, when it was redesignated a </span><a class="md-crosslink" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/dwarf-planet"><span data-dcnode-id="1051" instrument_node="">dwarf planet</span></a><span data-dcnode-id="1049" instrument_node=""> by the </span><a class="md-crosslink" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/International-Astronomical-Union"><span data-dcnode-id="1048" instrument_node="">International Astronomical Union</span></a><span data-dcnode-id="1046" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1043"></span><div class="assemblies" data-dcnode-id="1028"><div class="w-100" data-dcnode-id="1029"><figure class="md-assembly card print-false" data-assembly-id="17762" data-dcnode-id="1030"><div class="md-assembly-wrapper card-media" data-dcnode-id="1038" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1039" data-href="/media/1/40047/17762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/08/21208-050-D228E4D8/planets-planet-sun-Jupiter-one-Great-Red-1979.jpg" style="--aspect-ratio: 16/9"><img alt="Jupiter" data-dcnode-id="1042" data-height="840" data-width="840" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/08/21208-050-D228E4D8/planets-planet-sun-Jupiter-one-Great-Red-1979.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1040"><em class="material-icons link-blue" data-dcnode-id="1041" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1031"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1036" data-href="/media/1/40047/17762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/08/21208-050-D228E4D8/planets-planet-sun-Jupiter-one-Great-Red-1979.jpg"><span data-dcnode-id="1037" instrument_node="">Jupiter</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Jupiter, the fifth planet from the Sun and largest planet in the solar system. The Great Red Spot is visible in the lower left. This image is based on observations made by the Voyager 1 spacecraft in 1979.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Photo NASA/JPL/Caltech (NASA photo # PIA00343)</span></cite></figcaption></figure></div></div><span class="marker AM1 am-inline" data-dcnode-id="1026"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1024"></span><span data-dcnode-id="1023" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1008"><span data-dcnode-id="1022" instrument_node="">The average Earth-Sun distance, which originally defined the </span><span data-dcnode-id="1021" id="ref406862"></span><a class="md-crosslink" data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomical-unit"><span data-dcnode-id="1020" instrument_node="">astronomical unit</span></a><span data-dcnode-id="1018" instrument_node=""> (AU), provides a convenient measure for distances within the solar system. The astronomical unit was originally defined by observations of the mean radius of Earth’s orbit but is now defined as 149,597,870.7 km (about 93 million miles). Mercury, at 0.4 AU, is the closest planet to the Sun, while Neptune, at 30.1 AU, is the farthest. Pluto’s orbit, with a mean radius of 39.5 AU, is sufficiently </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1016" data-term="eccentric" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/eccentric"><span data-dcnode-id="1017" instrument_node="">eccentric</span></a><span data-dcnode-id="1015" instrument_node=""> that at times it is closer to the Sun than is Neptune. The planes of the planetary orbits are all within a few degrees of the </span><a class="md-crosslink" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ecliptic"><span data-dcnode-id="1014" instrument_node="">ecliptic</span></a><span data-dcnode-id="1012" instrument_node="">, the plane that contains Earth’s orbit around the Sun. As viewed from far above Earth’s </span><a class="md-crosslink" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/North-Pole"><span data-dcnode-id="1011" instrument_node="">North Pole</span></a><span data-dcnode-id="1009" instrument_node="">, all planets move in the same (counterclockwise) direction in their orbits.</span></p><span class="marker p2" data-dcnode-id="1006"></span><div class="assemblies" data-dcnode-id="991"><div class="w-100" data-dcnode-id="992"><figure class="md-assembly card print-false" data-assembly-id="229186" data-dcnode-id="993"><div class="md-assembly-wrapper card-media" data-dcnode-id="1001" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1002" data-href="/media/1/40047/229186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/196316-050-4B922FAE/Distances-solar-system-units.jpg" style="--aspect-ratio: 16/9"><img alt="scale of the solar system" data-dcnode-id="1005" data-height="1067" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/196316-050-4B922FAE/Distances-solar-system-units.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1003"><em class="material-icons link-blue" data-dcnode-id="1004" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="994"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="999" data-href="/media/1/40047/229186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/196316-050-4B922FAE/Distances-solar-system-units.jpg"><span data-dcnode-id="1000" instrument_node="">scale of the solar system</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Distances in the solar system as measured in astronomical units (AU).</span></div><cite class="credit d-block mt-5" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM2 am-inline" data-dcnode-id="989"></span><span class="marker MOD2 mod-inline" data-dcnode-id="987"></span><span data-dcnode-id="986" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="950"><span data-dcnode-id="985" instrument_node="">Most of the mass of the solar system is concentrated in the Sun, with its 1.99&nbsp;×&nbsp;10</span><sup data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">33</span></sup><span data-dcnode-id="982" instrument_node=""> grams. Together, all of the planets amount to 2.7&nbsp;×&nbsp;10</span><sup data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">30</span></sup><span data-dcnode-id="979" instrument_node=""> grams (i.e., about one-thousandth of the Sun’s mass), and Jupiter alone accounts for 71 percent of this amount. The solar system also contains five known objects of intermediate size classified as dwarf planets and a very large number of much smaller objects collectively called </span><span data-dcnode-id="978" id="ref910477"></span><a class="md-crosslink" data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/small-body"><span data-dcnode-id="977" instrument_node="">small bodies</span></a><span data-dcnode-id="975" instrument_node="">. The small bodies, roughly in order of decreasing size, are the </span><a class="md-crosslink" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/asteroid"><span data-dcnode-id="974" instrument_node="">asteroids</span></a><span data-dcnode-id="972" instrument_node="">, or minor planets; </span><a class="md-crosslink" data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/comet-astronomy"><span data-dcnode-id="971" instrument_node="">comets</span></a><span data-dcnode-id="969" instrument_node="">, including </span><a class="md-crosslink" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Kuiper-belt"><span data-dcnode-id="968" instrument_node="">Kuiper belt</span></a><span data-dcnode-id="966" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Centaur-object"><span data-dcnode-id="965" instrument_node="">Centaur</span></a><span data-dcnode-id="963" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Oort-cloud"><span data-dcnode-id="962" instrument_node="">Oort cloud</span></a><span data-dcnode-id="960" instrument_node=""> objects; </span><a class="md-crosslink" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/meteor"><span data-dcnode-id="959" instrument_node="">meteoroids</span></a><span data-dcnode-id="957" instrument_node="">; and </span><a class="md-crosslink" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/interplanetary-dust-particle"><span data-dcnode-id="956" instrument_node="">interplanetary dust particles</span></a><span data-dcnode-id="954" instrument_node="">. Because of their starlike appearance when discovered, the largest of these bodies were termed </span><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">asteroids</span></em><span data-dcnode-id="951" instrument_node="">, and that name is widely used, but, now that the rocky nature of these bodies is understood, their more descriptive name is minor planets.</span></p><span class="marker p3" data-dcnode-id="948"></span><div class="assemblies" data-dcnode-id="933"><div class="w-100" data-dcnode-id="934"><figure class="md-assembly card print-false" data-assembly-id="74702" data-dcnode-id="935"><div class="md-assembly-wrapper card-media" data-dcnode-id="943" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="944" data-href="/media/1/40047/74702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/01/81401-050-8EB87030/planets-solar-system-Pluto-montage-images-Sun.jpg" style="--aspect-ratio: 16/9"><img alt="solar system to scale" data-dcnode-id="947" data-height="660" data-width="2020" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/01/81401-050-8EB87030/planets-solar-system-Pluto-montage-images-Sun.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="945"><em class="material-icons link-blue" data-dcnode-id="946" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="936"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="941" data-href="/media/1/40047/74702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/01/81401-050-8EB87030/planets-solar-system-Pluto-montage-images-Sun.jpg"><span data-dcnode-id="942" instrument_node="">solar system to scale</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The eight planets of the solar system and Pluto, in a montage of images scaled to show the approximate sizes of the bodies relative to one another. Outward from the Sun, which is represented to scale by the yellow segment at the extreme left, are the four rocky terrestrial planets (Mercury, Venus, Earth, and Mars), the four hydrogen-rich giant planets (Jupiter, Saturn, Uranus, and Neptune), and icy, comparatively tiny Pluto.</span></div><cite class="credit d-block mt-5" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">NASA/Lunar and Planetary Laboratory</span></cite></figcaption></figure></div></div><span class="marker AM3 am-inline" data-dcnode-id="931"></span><span class="marker MOD3 mod-inline" data-dcnode-id="929"></span><span data-dcnode-id="928" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="911"><span data-dcnode-id="927" instrument_node="">The four inner, terrestrial planets—Mercury, Venus, Earth, and Mars—along with the Moon have average </span><a class="md-crosslink" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/density"><span data-dcnode-id="926" instrument_node="">densities</span></a><span data-dcnode-id="924" instrument_node=""> in the range of 3.9–5.5 grams per cubic cm, setting them apart from the four outer, giant planets—Jupiter, Saturn, Uranus, and Neptune—whose densities are all close to 1 gram per cubic cm, the density of </span><a class="md-crosslink" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/water"><span data-dcnode-id="923" instrument_node="">water</span></a><span data-dcnode-id="921" instrument_node="">. The </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="919" data-term="compositions" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/compositions"><span data-dcnode-id="920" instrument_node="">compositions</span></a><span data-dcnode-id="918" instrument_node=""> of these two groups of planets must therefore be significantly different. This dissimilarity is thought to be attributable to conditions that prevailed during the early development of the solar system (</span><em data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">see below</span></em><span data-dcnode-id="915" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy/Investigations-of-the-smaller-bodies%23ref257784"><span data-dcnode-id="914" instrument_node="">Theories of origin</span></a><span data-dcnode-id="912" instrument_node="">). Planetary temperatures now range from around 170 °C (330 °F, 440 K) on Mercury’s surface through the typical 15 °C (60 °F, 290 K) on Earth to −135 °C (−210 °F, 140 K) on Jupiter near its cloud tops and down to −210 °C (−350 °F, 60 K) near Neptune’s cloud tops. These are average temperatures; large variations exist between dayside and nightside for planets closest to the Sun, except for Venus with its thick atmosphere.</span></p><span class="marker p4" data-dcnode-id="909"></span><div class="assemblies" data-dcnode-id="894"><div class="w-100" data-dcnode-id="895"><figure class="md-assembly card print-false" data-assembly-id="74721" data-dcnode-id="896"><div class="md-assembly-wrapper card-media" data-dcnode-id="904" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="905" data-href="/media/1/40047/74721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/00/81400-050-8BBE1CDA/Saturn-rings-composite-images-spacecraft-Cassini-Shadows-October-6-2004.jpg" style="--aspect-ratio: 16/9"><img alt="Saturn" data-dcnode-id="908" data-height="746" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/00/81400-050-8BBE1CDA/Saturn-rings-composite-images-spacecraft-Cassini-Shadows-October-6-2004.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="906"><em class="material-icons link-blue" data-dcnode-id="907" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="897"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="902" data-href="/media/1/40047/74721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/00/81400-050-8BBE1CDA/Saturn-rings-composite-images-spacecraft-Cassini-Shadows-October-6-2004.jpg"><span data-dcnode-id="903" instrument_node="">Saturn</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Saturn and its spectacular rings, in a natural-colour composite of 126 images taken by the Cassini spacecraft on October 6, 2004. The view is directed toward Saturn's southern hemisphere, which is tipped toward the Sun. Shadows cast by the rings are visible against the bluish northern hemisphere, while the planet's shadow is projected on the rings to the left.</span></div><cite class="credit d-block mt-5" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">NASA/JPL/Space Science Institute</span></cite></figcaption></figure></div></div><span class="marker AM4 am-inline" data-dcnode-id="892"></span><span class="marker MOD4 mod-inline" data-dcnode-id="890"></span><span data-dcnode-id="889" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="862"><span data-dcnode-id="888" instrument_node="">The surfaces of the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="886" data-term="terrestrial" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/terrestrial"><span data-dcnode-id="887" instrument_node="">terrestrial</span></a><span data-dcnode-id="885" instrument_node=""> planets and many satellites show extensive cratering, produced by high-speed impacts (</span><em data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">see</span></em><span data-dcnode-id="882" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/meteorite-crater"><span data-dcnode-id="881" instrument_node="">meteorite crater</span></a><span data-dcnode-id="879" instrument_node="">). On Earth, with its large quantities of water and an active </span><a class="md-crosslink" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atmosphere"><span data-dcnode-id="878" instrument_node="">atmosphere</span></a><span data-dcnode-id="876" instrument_node="">, many of these cosmic footprints have </span><a class="md-crosslink" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/erosion-geology"><span data-dcnode-id="875" instrument_node="">eroded</span></a><span data-dcnode-id="873" instrument_node="">, but remnants of very large craters can be seen in aerial and </span><a class="md-crosslink autoxref" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/spacecraft"><span data-dcnode-id="872" instrument_node="">spacecraft</span></a><span data-dcnode-id="870" instrument_node=""> photographs of the terrestrial surface. On Mercury, Mars, and the </span><span data-dcnode-id="869" id="ref406863"></span><a class="md-crosslink" data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Moon"><span data-dcnode-id="868" instrument_node="">Moon</span></a><span data-dcnode-id="866" instrument_node="">, the absence of water and any significant atmosphere has left the craters unchanged for billions of years, apart from disturbances produced by infrequent later impacts. Volcanic activity has been an important force in the shaping of the surfaces of the Moon and the terrestrial planets. Seismic activity on the Moon has been monitored by means of seismometers left on its surface by </span><a class="md-crosslink" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Apollo-space-program"><span data-dcnode-id="865" instrument_node="">Apollo</span></a><span data-dcnode-id="863" instrument_node=""> astronauts and by Lunokhod robotic rovers. Cratering on the largest scale seems to have ceased about three billion years ago, although on the Moon there is clear evidence for a continued cosmic drizzle of small particles, with the larger objects churning (“gardening”) the lunar surface and the smallest producing microscopic impact pits in crystals in the lunar rocks.</span></p><span class="marker p5" data-dcnode-id="860"></span><div class="assemblies" data-dcnode-id="845"><div class="w-100" data-dcnode-id="846"><figure class="md-assembly card print-false" data-assembly-id="116648" data-dcnode-id="847"><div class="md-assembly-wrapper card-media" data-dcnode-id="855" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="856" data-href="/media/1/40047/116648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/25/110325-050-7CFFCBBB/Meteorite-crater-rays-material-probe-photograph-Mercury-January-14-2008.jpg" style="--aspect-ratio: 16/9"><img alt="Mercury" data-dcnode-id="859" data-height="1024" data-width="1016" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/25/110325-050-7CFFCBBB/Meteorite-crater-rays-material-probe-photograph-Mercury-January-14-2008.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="857"><em class="material-icons link-blue" data-dcnode-id="858" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="848"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="853" data-href="/media/1/40047/116648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/25/110325-050-7CFFCBBB/Meteorite-crater-rays-material-probe-photograph-Mercury-January-14-2008.jpg"><span data-dcnode-id="854" instrument_node="">Mercury</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Meteorite crater surrounded by rays of ejected material on Mercury, in a photograph taken by the Messenger probe, January 14, 2008. A chain of craters crosses the centre of the rayed crater.</span></div><cite class="credit d-block mt-5" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">NASA/Johns Hopkins University Applied Physics Laboratory/Carnegie Institution of Washington</span></cite></figcaption></figure></div></div><span class="marker AM5 am-inline" data-dcnode-id="843"></span><span class="marker MOD5 mod-inline" data-dcnode-id="841"></span><span data-dcnode-id="840" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="826"><span data-dcnode-id="839" instrument_node="">All of the planets apart from the two closest to the Sun (Mercury and Venus) have natural satellites (</span><a class="md-crosslink" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/moon-natural-satellite"><span data-dcnode-id="838" instrument_node="">moons</span></a><span data-dcnode-id="836" instrument_node="">) that are very </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="834" data-term="diverse" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/diverse"><span data-dcnode-id="835" instrument_node="">diverse</span></a><span data-dcnode-id="833" instrument_node=""> in appearance, size, and structure, as revealed in close-up observations from long-range space probes. The four outer dwarf planets have moons; Pluto has at least five moons, including one, </span><a class="md-crosslink" data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Charon-astronomy"><span data-dcnode-id="832" instrument_node="">Charon</span></a><span data-dcnode-id="830" instrument_node="">, fully half the size of Pluto itself. Over 200 asteroids and 80 Kuiper belt objects also have moons. Four planets (Jupiter, Saturn, Uranus, and Neptune), one dwarf planet (</span><a class="md-crosslink" data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Haumea"><span data-dcnode-id="829" instrument_node="">Haumea</span></a><span data-dcnode-id="827" instrument_node="">), and one Centaur object (Chariklo) have rings, disklike systems of small rocks and particles that orbit their parent bodies.</span></p><span class="marker p6" data-dcnode-id="824"></span><div class="assemblies" data-dcnode-id="809"><div class="w-100" data-dcnode-id="810"><figure class="md-assembly card print-false" data-assembly-id="229187" data-dcnode-id="811"><div class="md-assembly-wrapper card-media" data-dcnode-id="819" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="820" data-href="/media/1/40047/229187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/183533-050-2957012E/moon-Pluto-photo-Charon-New-Horizons-spacecraft-July-13-2015.jpg" style="--aspect-ratio: 16/9"><img alt="Charon" data-dcnode-id="823" data-height="794" data-width="1050" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/183533-050-2957012E/moon-Pluto-photo-Charon-New-Horizons-spacecraft-July-13-2015.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="821"><em class="material-icons link-blue" data-dcnode-id="822" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="812"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="817" data-href="/media/1/40047/229187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/183533-050-2957012E/moon-Pluto-photo-Charon-New-Horizons-spacecraft-July-13-2015.jpg"><span data-dcnode-id="818" instrument_node="">Charon</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Pluto's moon Charon, in a photo taken by the New Horizons spacecraft, July 13, 2015.</span></div><cite class="credit d-block mt-5" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">NASA/Johns Hopkins University Applied Physics Laboratory/Southwest Research Institute</span></cite></figcaption></figure></div></div><span class="marker AM6 am-inline" data-dcnode-id="807"></span><span class="marker MOD6 mod-inline" data-dcnode-id="805"></span><span data-dcnode-id="804" instrument_node=""> </span><span data-dcnode-id="803" data-level="2" id="ref257779"></span><div class="md-sentinel--spy-target" data-dcnode-id="802"></div><section data-dcnode-id="747" data-has-spy="true" data-level="3" id="ref257780"><h2 class="h3" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Lunar exploration</span></h2><span data-dcnode-id="798" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="769"><span data-dcnode-id="797" instrument_node="">During the U.S. </span><a class="md-crosslink" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Apollo-space-program"><span data-dcnode-id="796" instrument_node="">Apollo</span></a><span data-dcnode-id="794" instrument_node=""> missions a total </span><a class="md-crosslink autoxref" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/weight"><span data-dcnode-id="793" instrument_node="">weight</span></a><span data-dcnode-id="791" instrument_node=""> of 381.7 kg (841.5 pounds) of lunar material was collected; an additional 300 grams (0.66 pounds) was brought back by unmanned Soviet </span><a class="md-crosslink" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/Luna-space-probe"><span data-dcnode-id="790" instrument_node="">Luna</span></a><span data-dcnode-id="788" instrument_node=""> vehicles. About 15 percent of the Apollo samples have been distributed for analysis, with the remainder stored at the </span><a class="md-crosslink" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/NASA"><span data-dcnode-id="787" instrument_node="">NASA</span></a><span data-dcnode-id="785" instrument_node=""> Johnson Space Center, Houston, Texas. The opportunity to employ a wide range of laboratory techniques on these lunar samples has revolutionized planetary </span><a class="md-crosslink autoxref" data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/science"><span data-dcnode-id="784" instrument_node="">science</span></a><span data-dcnode-id="782" instrument_node="">. The results of the analyses have enabled investigators to determine the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="780" data-term="composition" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/composition"><span data-dcnode-id="781" instrument_node="">composition</span></a><span data-dcnode-id="779" instrument_node=""> and age of the lunar surface. Seismic observations have made it possible to probe the lunar interior. In addition, retroreflectors left on the Moon’s surface by Apollo astronauts have allowed high-power laser beams to be sent from Earth to the Moon and back, permitting scientists to monitor the Earth-Moon distance to an accuracy of a few centimetres. This experiment, which has provided data used in calculations of the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="777" data-term="dynamics" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/dynamics"><span data-dcnode-id="778" instrument_node="">dynamics</span></a><span data-dcnode-id="776" instrument_node=""> of the Earth-Moon system, has shown that the separation of the two bodies is increasing by 4.4 cm (1.7 inches) each year. (For additional information on lunar studies, </span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">see</span></em><span data-dcnode-id="773" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/moon-natural-satellite"><span data-dcnode-id="772" instrument_node="">Moon</span></a><span data-dcnode-id="770" instrument_node="">.)</span></p><span class="marker p7" data-dcnode-id="767"></span><div class="assemblies" data-dcnode-id="752"><div class="w-100" data-dcnode-id="753"><figure class="md-assembly card print-false" data-assembly-id="60514" data-dcnode-id="754"><div class="md-assembly-wrapper card-media" data-dcnode-id="762" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="763" data-href="/media/1/40047/60514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/14/414-050-80F443C9/geologist-astronaut-Apollo-17-foot-split-boulder-mission-December-13-1972.jpg" style="--aspect-ratio: 16/9"><img alt="Apollo 17 astronaut Harrison Schmitt on the Moon, 1972" data-dcnode-id="766" data-height="883" data-width="1109" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/14/414-050-80F443C9/geologist-astronaut-Apollo-17-foot-split-boulder-mission-December-13-1972.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="764"><em class="material-icons link-blue" data-dcnode-id="765" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="755"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="760" data-href="/media/1/40047/60514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/14/414-050-80F443C9/geologist-astronaut-Apollo-17-foot-split-boulder-mission-December-13-1972.jpg"><span data-dcnode-id="761" instrument_node="">Apollo 17 astronaut Harrison Schmitt on the Moon, 1972</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Apollo 17 geologist-astronaut Harrison Schmitt at the foot of a huge split boulder, December 13, 1972, during the mission's third extravehicular exploration of the Taurus-Littrow Valley landing site on the Moon.</span></div><cite class="credit d-block mt-5" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">NASA</span></cite></figcaption></figure></div></div><span class="marker AM7 am-inline" data-dcnode-id="750"></span><span class="marker MOD7 mod-inline" data-dcnode-id="748"></span></section><span data-dcnode-id="746" instrument_node=""> </span><span data-dcnode-id="745" data-level="2" id="ref257779"></span><div class="md-sentinel--spy-target" data-dcnode-id="744"></div><section data-dcnode-id="525" data-has-spy="true" data-level="3" id="ref257781"><h2 class="h3" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Planetary studies</span></h2><span data-dcnode-id="740" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="682"><a class="md-crosslink" data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mercury-planet"><span data-dcnode-id="739" instrument_node="">Mercury</span></a><span data-dcnode-id="737" instrument_node=""> is too hot to retain an atmosphere, but </span><a class="md-crosslink" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Venus-planet"><span data-dcnode-id="736" instrument_node="">Venus</span></a><span data-dcnode-id="734" instrument_node="">’s brilliant white appearance is the result of its being completely enveloped in thick clouds of </span><a class="md-crosslink" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/carbon-dioxide"><span data-dcnode-id="733" instrument_node="">carbon dioxide</span></a><span data-dcnode-id="731" instrument_node="">, impenetrable at visible wavelengths. Below the upper clouds, Venus has a hostile atmosphere containing clouds of </span><a class="md-crosslink" data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/sulfuric-acid"><span data-dcnode-id="730" instrument_node="">sulfuric acid</span></a><span data-dcnode-id="728" instrument_node=""> droplets. The cloud cover shields the planet’s surface from direct </span><a class="md-crosslink autoxref" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/sunlight-solar-radiation"><span data-dcnode-id="727" instrument_node="">sunlight</span></a><span data-dcnode-id="725" instrument_node="">, but the </span><a class="md-crosslink autoxref" data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/energy"><span data-dcnode-id="724" instrument_node="">energy</span></a><span data-dcnode-id="722" instrument_node=""> that does filter through warms the surface, which then radiates at </span><a class="md-crosslink" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="721" instrument_node="">infrared</span></a><span data-dcnode-id="719" instrument_node=""> wavelengths. The long-wavelength </span><a class="md-crosslink autoxref" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/infrared-radiation"><span data-dcnode-id="718" instrument_node="">infrared radiation</span></a><span data-dcnode-id="716" instrument_node=""> is trapped by the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="714" data-term="dense" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/dense"><span data-dcnode-id="715" instrument_node="">dense</span></a><span data-dcnode-id="713" instrument_node=""> clouds such that an efficient </span><a class="md-crosslink" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/greenhouse-effect"><span data-dcnode-id="712" instrument_node="">greenhouse effect</span></a><span data-dcnode-id="710" instrument_node=""> keeps the surface </span><a class="md-crosslink autoxref" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/temperature"><span data-dcnode-id="709" instrument_node="">temperature</span></a><span data-dcnode-id="707" instrument_node=""> near 465 °C (870 °F, 740 K). </span><a class="md-crosslink" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/radar"><span data-dcnode-id="706" instrument_node="">Radar</span></a><span data-dcnode-id="704" instrument_node="">, which can penetrate the thick Venusian clouds, has been used to map the planet’s surface. In contrast, the atmosphere of </span><a class="md-crosslink" data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mars-planet"><span data-dcnode-id="703" instrument_node="">Mars</span></a><span data-dcnode-id="701" instrument_node=""> is very thin and is composed mostly of carbon dioxide (95 percent), with very little </span><a class="md-crosslink" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/water"><span data-dcnode-id="700" instrument_node="">water</span></a><span data-dcnode-id="698" instrument_node=""> vapour; the planet’s surface pressure is only about 0.006 that of </span><a class="md-crosslink" data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="697" instrument_node="">Earth</span></a><span data-dcnode-id="695" instrument_node="">. The outer planets have atmospheres composed largely of </span><a class="md-crosslink autoxref" data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/light"><span data-dcnode-id="694" instrument_node="">light</span></a><span data-dcnode-id="692" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/gas-state-of-matter"><span data-dcnode-id="691" instrument_node="">gases</span></a><span data-dcnode-id="689" instrument_node="">, mainly </span><a class="md-crosslink" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/hydrogen"><span data-dcnode-id="688" instrument_node="">hydrogen</span></a><span data-dcnode-id="686" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/helium-chemical-element"><span data-dcnode-id="685" instrument_node="">helium</span></a><span data-dcnode-id="683" instrument_node="">.</span></p><span class="marker p8" data-dcnode-id="680"></span><div class="assemblies" data-dcnode-id="665"><div class="w-100" data-dcnode-id="666"><figure class="md-assembly card print-false" data-assembly-id="69378" data-dcnode-id="667"><div class="md-assembly-wrapper card-media" data-dcnode-id="675" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="676" data-href="/media/1/40047/69378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/75516-050-C40070F2/Photo-mosaic-Mercury-Mariner-10-spacecraft-1974.jpg" style="--aspect-ratio: 16/9"><img alt="Mercury" data-dcnode-id="679" data-height="1600" data-width="1046" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/75516-050-C40070F2/Photo-mosaic-Mercury-Mariner-10-spacecraft-1974.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="677"><em class="material-icons link-blue" data-dcnode-id="678" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="668"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="673" data-href="/media/1/40047/69378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/16/75516-050-C40070F2/Photo-mosaic-Mercury-Mariner-10-spacecraft-1974.jpg"><span data-dcnode-id="674" instrument_node="">Mercury</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Photo mosaic of Mercury, taken by the Mariner 10 spacecraft, 1974.</span></div><cite class="credit d-block mt-5" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">NASA/JPL</span></cite></figcaption></figure></div></div><span class="marker AM8 am-inline" data-dcnode-id="663"></span><span class="marker MOD8 mod-inline" data-dcnode-id="661"></span><span data-dcnode-id="660" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="649"><span data-dcnode-id="659" instrument_node="">Each planet rotates on its axis, and nearly all of them rotate in the same direction—counterclockwise as viewed from above the ecliptic. The two exceptions are Venus, which rotates in the clockwise direction beneath its cloud cover, and </span><a class="md-crosslink" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Uranus-planet"><span data-dcnode-id="658" instrument_node="">Uranus</span></a><span data-dcnode-id="656" instrument_node="">, which has its rotation </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="654" data-term="axis" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/axis"><span data-dcnode-id="655" instrument_node="">axis</span></a><span data-dcnode-id="653" instrument_node=""> very nearly in the plane of the </span><a class="md-crosslink" data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/ecliptic"><span data-dcnode-id="652" instrument_node="">ecliptic</span></a><span data-dcnode-id="650" instrument_node="">.</span></p><span class="marker p9" data-dcnode-id="647"></span><span class="marker AM9 am-inline" data-dcnode-id="645"></span><span class="marker MOD9 mod-inline" data-dcnode-id="643"></span><span data-dcnode-id="642" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="597"><span data-dcnode-id="641" instrument_node="">Some of the planets have </span><span data-dcnode-id="640" id="ref406865"></span><a class="md-crosslink" data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/magnetic-field"><span data-dcnode-id="639" instrument_node="">magnetic fields</span></a><span data-dcnode-id="637" instrument_node="">. </span><a class="md-crosslink" data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/geomagnetic-field"><span data-dcnode-id="636" instrument_node="">Earth’s field</span></a><span data-dcnode-id="634" instrument_node=""> extends outward until it is disturbed by the </span><span data-dcnode-id="633" id="ref910478"></span><a class="md-crosslink" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-wind"><span data-dcnode-id="632" instrument_node="">solar wind</span></a><span data-dcnode-id="630" instrument_node="">—an outward flow of </span><a class="md-crosslink" data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/proton-subatomic-particle"><span data-dcnode-id="629" instrument_node="">protons</span></a><span data-dcnode-id="627" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/electron"><span data-dcnode-id="626" instrument_node="">electrons</span></a><span data-dcnode-id="624" instrument_node=""> from the </span><a class="md-crosslink" data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="623" instrument_node="">Sun</span></a><span data-dcnode-id="621" instrument_node="">—which carries a </span><a class="md-crosslink autoxref" data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/magnetic-field"><span data-dcnode-id="620" instrument_node="">magnetic field</span></a><span data-dcnode-id="618" instrument_node=""> along with it. Through processes not yet fully understood, particles from the solar wind and galactic </span><a class="md-crosslink" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/cosmic-ray"><span data-dcnode-id="617" instrument_node="">cosmic rays</span></a><span data-dcnode-id="615" instrument_node=""> (high-speed particles from outside the solar system) populate two doughnut-shaped regions called the </span><span data-dcnode-id="614" id="ref910479"></span><a class="md-crosslink" data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Van-Allen-radiation-belt"><span data-dcnode-id="613" instrument_node="">Van Allen radiation belts</span></a><span data-dcnode-id="611" instrument_node="">. The inner belt extends from about 1,000 to 5,000 km (600 to 3,000 miles) above Earth’s surface, and the outer from roughly 15,000 to 25,000 km (9,300 to 15,500 miles). In these belts, trapped particles spiral along paths that take them around Earth while bouncing back and forth between the Northern and Southern hemispheres, with their orbits controlled by </span><a class="md-crosslink autoxref" data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/geomagnetic-field"><span data-dcnode-id="610" instrument_node="">Earth’s magnetic field</span></a><span data-dcnode-id="608" instrument_node="">. During periods of increased solar activity, these regions of trapped particles are disturbed, and some of the particles move down into Earth’s atmosphere, where they collide with </span><a class="md-crosslink" data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/atom"><span data-dcnode-id="607" instrument_node="">atoms</span></a><span data-dcnode-id="605" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/molecule"><span data-dcnode-id="604" instrument_node="">molecules</span></a><span data-dcnode-id="602" instrument_node=""> to produce </span><span data-dcnode-id="601" id="ref910480"></span><a class="md-crosslink" data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/aurora-atmospheric-phenomenon"><span data-dcnode-id="600" instrument_node="">auroras</span></a><span data-dcnode-id="598" instrument_node="">.</span></p><span class="marker p10" data-dcnode-id="595"></span><div class="assemblies" data-dcnode-id="580"><div class="w-100" data-dcnode-id="581"><figure class="md-assembly card print-false" data-assembly-id="60532" data-dcnode-id="582"><div class="md-assembly-wrapper card-media" data-dcnode-id="590" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="591" data-href="/media/1/40047/60532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/6031-050-4C58F9DB/Van-Allen-radiation-belts-magnetosphere-Earth-Pressure.jpg" style="--aspect-ratio: 16/9"><img alt="Van Allen radiation belts" data-dcnode-id="594" data-height="1510" data-width="1600" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/6031-050-4C58F9DB/Van-Allen-radiation-belts-magnetosphere-Earth-Pressure.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="592"><em class="material-icons link-blue" data-dcnode-id="593" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="583"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="588" data-href="/media/1/40047/60532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/31/6031-050-4C58F9DB/Van-Allen-radiation-belts-magnetosphere-Earth-Pressure.jpg"><span data-dcnode-id="589" instrument_node="">Van Allen radiation belts</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The Van Allen radiation belts contained within Earth's magnetosphere. Pressure from the solar wind is responsible for the asymmetrical shape of the magnetosphere and the belts.</span></div><cite class="credit d-block mt-5" data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div><span class="marker AM10 am-inline" data-dcnode-id="578"></span><span class="marker MOD10 mod-inline" data-dcnode-id="576"></span><span data-dcnode-id="575" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="547"><a class="md-crosslink" data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Jupiter-planet"><span data-dcnode-id="574" instrument_node="">Jupiter</span></a><span data-dcnode-id="572" instrument_node=""> has a magnetic field far stronger than Earth’s and many more trapped electrons, whose </span><a class="md-crosslink" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/synchrotron-radiation"><span data-dcnode-id="571" instrument_node="">synchrotron radiation</span></a><span data-dcnode-id="569" instrument_node=""> (</span><a class="md-crosslink" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/electromagnetic-radiation"><span data-dcnode-id="568" instrument_node="">electromagnetic radiation</span></a><span data-dcnode-id="566" instrument_node=""> </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="564" data-term="emitted" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/emitted"><span data-dcnode-id="565" instrument_node="">emitted</span></a><span data-dcnode-id="563" instrument_node=""> by high-speed charged particles that are forced to move in curved paths, as under the influence of a magnetic field) is detectable from Earth. Bursts of increased </span><a class="md-crosslink autoxref" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/radio"><span data-dcnode-id="562" instrument_node="">radio</span></a><span data-dcnode-id="560" instrument_node=""> emission are correlated with the position of </span><a class="md-crosslink" data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Io-satellite-of-Jupiter"><span data-dcnode-id="559" instrument_node="">Io</span></a><span data-dcnode-id="557" instrument_node="">, the innermost of the four Galilean moons of Jupiter. </span><a class="md-crosslink" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Saturn-planet"><span data-dcnode-id="556" instrument_node="">Saturn</span></a><span data-dcnode-id="554" instrument_node=""> has a magnetic field that is much weaker than Jupiter’s, but it too has a region of trapped particles. Mercury has a weak magnetic field that is only about 1 percent as strong as Earth’s and shows no evidence of trapped particles. Uranus and </span><a class="md-crosslink" data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Neptune-planet"><span data-dcnode-id="553" instrument_node="">Neptune</span></a><span data-dcnode-id="551" instrument_node=""> have fields that are less than one-tenth the strength of Saturn’s and appear much more complex than that of Earth. No field has been detected around Venus or </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="549" data-term="Mars" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/Mars"><span data-dcnode-id="550" instrument_node="">Mars</span></a><span data-dcnode-id="548" instrument_node="">.</span></p><span class="marker p11" data-dcnode-id="545"></span><div class="assemblies" data-dcnode-id="530"><div class="w-100" data-dcnode-id="531"><figure class="md-assembly card print-false" data-assembly-id="210921" data-dcnode-id="532"><div class="md-assembly-wrapper card-media" data-dcnode-id="540" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="541" data-href="/media/1/40047/210921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/190533-050-6EEC8D4B/magnetosphere-Jupiter-spacecraft-Cassini-solar-system-2000.jpg" style="--aspect-ratio: 16/9"><img alt="Jupiter's magnetosphere" data-dcnode-id="544" data-height="728" data-width="1288" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/190533-050-6EEC8D4B/magnetosphere-Jupiter-spacecraft-Cassini-solar-system-2000.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="542"><em class="material-icons link-blue" data-dcnode-id="543" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="533"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="538" data-href="/media/1/40047/210921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/33/190533-050-6EEC8D4B/magnetosphere-Jupiter-spacecraft-Cassini-solar-system-2000.jpg"><span data-dcnode-id="539" instrument_node="">Jupiter's magnetosphere</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Jupiter's magnetosphere as observed by the Cassini spacecraft in 2000. The magnetosphere is the largest object in the solar system. </span></div><cite class="credit d-block mt-5" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">NASA/JPL/Johns Hopkins University Applied Physics Laboratory</span></cite></figcaption></figure></div></div><span class="marker AM11 am-inline" data-dcnode-id="528"></span><span class="marker MOD11 mod-inline" data-dcnode-id="526"></span></section><span data-dcnode-id="524" instrument_node=""> </span></section><span class="marker end-of-content" data-dcnode-id="521"></span><span class="marker after-article" data-dcnode-id="519"></span></div><span data-dcnode-id="517" instrument_node="">
