</span><meta content="In the summer of 1609, Galileo Galilei started to improve upon the Dutch spyglass. Only a few months were needed to increase the magnifying power of the instrument up to 30 times. This transformation allowed Galileo to perform astronomical observations destined to change the traditional Universe. At present, the Institute and Museum of History of Science of Florence is conducting a research programme on the lenses of early telescopes. Historical research is combined with scientific analyses conducted by the National Institute of Applied Optics in Arcetri, the National Institute of Nuclear Physics in Florence, and the Glass Experimental Station in Murano. The shape and composition of the lenses are studied by applying different techniques. Moreover, the composition of early lenses and scientific glass objects are compared. Finally, Galileo’s observations are checked with an optical replica of Galileo’s telescope held at the Astrophysical Observatory in Arcetri." data-dcnode-id="2345" name="dc.description"><span data-dcnode-id="2344" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="520" data-track-component="article body"><span data-dcnode-id="1804" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="1797" data-gtm-vis-first-on-screen-50443292_562="708" data-gtm-vis-first-on-screen-50443292_563="708" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="708" data-gtm-vis-recent-on-screen-50443292_563="708" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="1798" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1802" id="Abs1"><span data-dcnode-id="1803" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="1799" id="Abs1-content"><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">In the summer of 1609, Galileo Galilei started to improve upon the Dutch spyglass. Only a few months were needed to increase the magnifying power of the instrument up to 30 times. This transformation allowed Galileo to perform astronomical observations destined to change the traditional Universe. At present, the Institute and Museum of History of Science of Florence is conducting a research programme on the lenses of early telescopes. Historical research is combined with scientific analyses conducted by the National Institute of Applied Optics in Arcetri, the National Institute of Nuclear Physics in Florence, and the Glass Experimental Station in Murano. The shape and composition of the lenses are studied by applying different techniques. Moreover, the composition of early lenses and scientific glass objects are compared. Finally, Galileo’s observations are checked with an optical replica of Galileo’s telescope held at the Astrophysical Observatory in Arcetri.</span></p></div></div></section><span data-dcnode-id="1796" instrument_node="">
</span><section data-dcnode-id="1758" data-gtm-vis-first-on-screen-50443292_562="708" data-gtm-vis-first-on-screen-50443292_563="708" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="708" data-gtm-vis-recent-on-screen-50443292_563="708" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Premise"><div class="c-article-section" data-dcnode-id="1759" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1794" id="Sec1"><span data-dcnode-id="1795" instrument_node="">Premise</span></h2><div class="c-article-section__content" data-dcnode-id="1760" id="Sec1-content"><p data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Within a year of its appearance, the Dutch spyglass spread across Europe. After this, the so-called “Galilean” telescope dominated the scientific scene, especially in the Italian States, for about 30&nbsp;years. Such a formidable impact raises the following problems concerning the early evolution of the telescope:
</span></p><ol class="u-list-style-none" data-dcnode-id="1763"><span data-dcnode-id="1791" instrument_node="">
</span><li data-dcnode-id="1783"><span data-dcnode-id="1790" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">1.</span></span><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">How did Galileo Galilei transform the Dutch spyglass into a powerful telescope?</span></p><span data-dcnode-id="1784" instrument_node="">
</span></li><span data-dcnode-id="1782" instrument_node="">
</span><li data-dcnode-id="1774"><span data-dcnode-id="1781" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">2.</span></span><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">What use did Galileo make of his improved telescope, and how was the instrument perceived in the scientific context of the time?</span></p><span data-dcnode-id="1775" instrument_node="">
</span></li><span data-dcnode-id="1773" instrument_node="">
</span><li data-dcnode-id="1765"><span data-dcnode-id="1772" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">3.</span></span><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">How can the functioning of Galileo’s telescope be explained, especially considering the initial failure of a new type of telescope devised by Johann Kepler?</span></p><span data-dcnode-id="1766" instrument_node="">
</span></li><span data-dcnode-id="1764" instrument_node="">
</span></ol><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">The historical discussion of these problems will be combined with a presentation of the provisional results of the scientific research still being conducted on the early telescopes of the Institute and Museum of History of Science (IMSS) in Florence.</span></p></div></div></section><section data-dcnode-id="1399" data-gtm-vis-first-on-screen-50443292_562="708" data-gtm-vis-first-on-screen-50443292_563="709" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="708" data-gtm-vis-recent-on-screen-50443292_563="709" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Galileo’s development of the telescope"><div class="c-article-section" data-dcnode-id="1400" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1756" id="Sec2"><span data-dcnode-id="1757" instrument_node="">Galileo’s development of the telescope</span></h2><div class="c-article-section__content" data-dcnode-id="1401" id="Sec2-content"><p data-dcnode-id="1748"><span data-dcnode-id="1755" instrument_node="">Galileo began to recount his improvements upon the Dutch spyglass in a letter to the Venetian Doge Leonardo Donato, dated August 24, 1609. In it he claimed he would be glad to present the Doge with an “eyeglass invented by applying the most profound theories of optics”, by means of which “something at a distance of nine miles appears as if it is only one mile far”. This device could be very useful in detecting enemy ships or forces approaching.</span><sup data-dcnode-id="1750"><a data-dcnode-id="1751" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Footnote </span></span><span data-dcnode-id="1752" instrument_node="">1</span></a></sup><span data-dcnode-id="1749" instrument_node="">
</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1747" instrument_node="">Galileo embellished this story in a letter to his brother-in-law Benedetto Landucci, dated August 29, 1609. He explained that between June and July 1609 he had received news that a Dutchman had shown Maurice of Nassau an eyeglass by which far objects could be seen as if close to the observer. Galileo had thought about the device, and worked out the principle of its functioning. As a result, he had made an instrument which he was called to present to the Senate of the Venetian Republic. On August 22 or 23, from one of the bell towers of Venice, he was able to show a ship at a distance of 50&nbsp;miles as if it were just 5&nbsp;miles away.</span><sup data-dcnode-id="1742"><a data-dcnode-id="1743" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Footnote </span></span><span data-dcnode-id="1744" instrument_node="">2</span></a></sup><span data-dcnode-id="1741" instrument_node="">
</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1739" instrument_node="">Galileo gave a third report on the story of the telescope in the </span><i data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1736" instrument_node=""> (Starry Messenger), printed in Venice on March 1610. In it he said that he had received confirmation of the invention of the Flemish optical device from one of his former pupils at the University of Padua. As a result, he had set out to develop the instrument by applying the principles of optics. He constructed an eyeglass with a magnifying power of only three times by inserting a plano-convex objective and a plano-concave ocular into a lead pipe. After this instrument, he was able to make a second one with a magnifying power of eight times. Finally, he prepared a high-power instrument, by means of which far things could be observed about 30 times closer.</span><sup data-dcnode-id="1731"><a data-dcnode-id="1732" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Footnote </span></span><span data-dcnode-id="1733" instrument_node="">3</span></a></sup><span data-dcnode-id="1730" instrument_node="">
</span></p><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Galileo’s reports raise a series of interesting questions:</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">1. Did Galileo see one of the Dutch spyglasses before he began to develop his own telescope? In order to answer this question, I will mention a few examples of the early circulation of Dutch spyglasses through the Italian States.</span></p><p data-dcnode-id="1714"><span data-dcnode-id="1724" instrument_node="">In his </span><i data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Telescopium</span></i><span data-dcnode-id="1721" instrument_node=""> (The Telescope), published in 1618, Girolamo Sirtori, from Milan, claimed that in May 1609 a spyglass was delivered to the Count of Fuentes, in Milan, by a French gentleman.</span><sup data-dcnode-id="1716"><a data-dcnode-id="1717" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Footnote </span></span><span data-dcnode-id="1718" instrument_node="">4</span></a></sup><span data-dcnode-id="1715" instrument_node="">
</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1713" instrument_node="">In a letter to Paolo Gualdo dated August 1st, 1609, the Paduan historian Lorenzo Pignoria wrote that one of those eyeglasses that Gualdo had mentioned in one of his former letters had just appeared in Padua. The instrument had been carried to the city by someone coming from beyond the Alps.</span><sup data-dcnode-id="1708"><a data-dcnode-id="1709" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Footnote </span></span><span data-dcnode-id="1710" instrument_node="">5</span></a></sup><span data-dcnode-id="1707" instrument_node="">
</span></p><p data-dcnode-id="1692"><span data-dcnode-id="1705" instrument_node="">In a letter dated August 28, the Neapolitan natural magician Giovanni Battista della Porta told Prince Federico Cesi, the founder of the </span><i data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Accademia dei Lincei</span></i><span data-dcnode-id="1702" instrument_node=""> in Rome, that he had finally seen a spyglass. He clamed it was “a hoax” that was taken from his </span><i data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">De refractione</span></i><span data-dcnode-id="1699" instrument_node=""> (On Refraction), published in 1593. No reference to a spyglass can be found in this book. However, in his letter, della Porta explained that the instrument was made of a palm-size tin pipe into which a secondary smaller pipe could slide back and forth for focusing. Two spectacle lenses were fitted at either end of the tube. The first lens, to correct presbyopia, produced fuzzy magnified images; the other, to correct myopia, made the images clear.</span><sup data-dcnode-id="1694"><a data-dcnode-id="1695" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Footnote </span></span><span data-dcnode-id="1696" instrument_node="">6</span></a></sup><span data-dcnode-id="1693" instrument_node="">
</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1691" instrument_node="">Finally, in a second letter to Gualdo dated August 31, Pignoria mentioned another spyglass that was sent from Flanders to Cardinal Scipione Borghese in Rome. This seems to be the same instrument that Gualdo had already mentioned to Pignoria as a sample, before August 1609. In addition, Pignoria stated that the spyglass market had appeared to meet with great success in Padua.</span><sup data-dcnode-id="1686"><a data-dcnode-id="1687" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Footnote </span></span><span data-dcnode-id="1688" instrument_node="">7</span></a></sup><span data-dcnode-id="1685" instrument_node="">
</span></p><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">These examples show that between May and August 1609 several Dutch spyglasses had been distributed in Italy. They probably came from France and had filtered down from the north to the south of Italy. In particular, many spyglasses had been sold in Padua, where Galileo had been professor of mathematics at the University since 1592. Therefore, although Galileo never claimed to have seen a Dutch spyglass, it is very hard to believe he had not.</span></p><p data-dcnode-id="1665"><span data-dcnode-id="1681" instrument_node="">2. Did Galileo improve upon the Dutch spyglass by applying the laws of optics? From Galileo’s writings one can deduce that he had a limited knowledge of optics. The only extensive optical text in Galileo’s handwriting is a copy of the </span><i data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Theorica speculi concavi sphaerici</span></i><span data-dcnode-id="1678" instrument_node=""> (Theory of the spherical concave mirror) by the mid-sixteenth century Venetian mathematician Ettore Ausonio.</span><sup data-dcnode-id="1673"><a data-dcnode-id="1674" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Footnote </span></span><span data-dcnode-id="1675" instrument_node="">8</span></a></sup><span data-dcnode-id="1672" instrument_node=""> Ausonio’s manuscript was in the library of the nobleman Giovan Vincenzo Pinelli, in Padua. Galileo made a copy of the manuscript after his arrival to the city in 1592 and before leaving for Florence in 1610.</span><sup data-dcnode-id="1667"><a data-dcnode-id="1668" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Footnote </span></span><span data-dcnode-id="1669" instrument_node="">9</span></a></sup><span data-dcnode-id="1666" instrument_node="">
</span></p><p data-dcnode-id="1651"><span data-dcnode-id="1664" instrument_node="">Another confirmation of Galileo’s not being particularly interested in optics until he heard of the Dutch spyglass can be found by comparing the drawings included in the Medieval and Renaissance works on optics to the drawings of the telescope included in the </span><i data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1661" instrument_node="">. As to the former, see for instance the formation of images in a convex mirror in the </span><i data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Della Prospettiva</span></i><span data-dcnode-id="1658" instrument_node=""> (On optics), by the fifteenth century physician and mathematician Giovanni Fontana. In order to investigate where the images of a ruler appear on a spherical mirror, Fontana marked on paper several positions of the eye. He then connected the different spots by a careful net of straight visual rays that locate the supposed real or virtual images of the ruler.</span><sup data-dcnode-id="1653"><a data-dcnode-id="1654" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Footnote </span></span><span data-dcnode-id="1655" instrument_node="">10</span></a></sup><span data-dcnode-id="1652" instrument_node="">
</span></p><p data-dcnode-id="1619"><span data-dcnode-id="1650" instrument_node="">Nothing of a similar accuracy can be found in Galileo’s manuscript of the </span><i data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1647" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="1645" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1646" instrument_node="">1</span></a><span data-dcnode-id="1644" instrument_node="">a). The telescope appears as a slightly flaring quadrilateral, with two holes. The rough rendering of these holes gives the false impression that the instrument is made of two bi-convex lenses. Of course, this is not the optical structure of the telescope, which, in Galileo’s explanation, has a plano-convex lens in </span><i data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">cd</span></i><span data-dcnode-id="1641" instrument_node=""> and a plano-concave lens in </span><i data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">ab</span></i><span data-dcnode-id="1638" instrument_node="">. As for the light rays, only two parallel straight lines are drawn exiting on the side of the objective, and two divergent straight lines entering the eye in </span><i data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">e</span></i><span data-dcnode-id="1635" instrument_node="">.</span><sup data-dcnode-id="1630"><a data-dcnode-id="1631" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Footnote </span></span><span data-dcnode-id="1632" instrument_node="">11</span></a></sup><span data-dcnode-id="1629" instrument_node=""> This is not the accuracy that one can expect from an expert in optics, a fact which is confirmed by the printed version of the same drawing (Fig.&nbsp;</span><a data-dcnode-id="1627" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="1628" instrument_node="">1</span></a><span data-dcnode-id="1626" instrument_node="">b).</span><sup data-dcnode-id="1621"><a data-dcnode-id="1622" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Footnote </span></span><span data-dcnode-id="1623" instrument_node="">12</span></a></sup><span data-dcnode-id="1620" instrument_node=""> In any case, Galileo made no attempt to determine the image formation by geometric construction.
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1586" data-gtm-vis-first-on-screen-50443292_561="707" data-gtm-vis-has-fired-50443292_561="1" data-gtm-vis-recent-on-screen-50443292_561="707" data-gtm-vis-total-visible-time-50443292_561="10000" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="1587"><figcaption data-dcnode-id="1616"><b class="c-article-section__figure-caption" data-dcnode-id="1617" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="1618" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1598"><div class="c-article-section__figure-item" data-dcnode-id="1611"><a class="c-article-section__figure-link" data-dcnode-id="1612" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/1" rel="nofollow"><picture data-dcnode-id="1613"><source data-dcnode-id="1615" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10686-009-9142-0/MediaObjects/10686_2009_9142_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="1614" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10686-009-9142-0/MediaObjects/10686_2009_9142_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1599" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="1600"><span data-dcnode-id="1610" instrument_node="">Scheme of the telescope (G. Galilei, </span><i data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1607" instrument_node="">, 1610): </span><b data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">a</span></b><span data-dcnode-id="1604" instrument_node=""> manuscript; </span><b data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">b</span></b><span data-dcnode-id="1601" instrument_node=""> printed version</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1588"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1589" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/1" rel="nofollow"><span data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1590" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1591" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1592" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1595" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1594" fill-rule="evenodd"></path><span data-dcnode-id="1593" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Although Galileo was not really interested in optics, he was not un-prepared to tackle the Dutch spyglass. As a natural philosopher, he was trying to solve the scientific problems by means of “sound reasoning”, but also by means of “sensible experiences”, that is, with the attention to the data arising from both observation and experimentation. Therefore, in addition to the mathematical components of his thought, Galileo needed to devise and make the instruments to analyze the world of reality.</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1582" instrument_node="">Around 1597, he devised a new type of compass, which he produced, or had produced in several copies by his private craftsman, Marcantonio Mazzoleni. This compass could be employed to make calculations, and also for measuring angles, which was useful in surveying, cartography, ballistics, and even astronomy, as Galileo stated in his </span><i data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Le operazioni del compasso geometrico et militare</span></i><span data-dcnode-id="1579" instrument_node=""> (Operations of the Geometrical and Military Compass), published in Padua in 1606.</span><sup data-dcnode-id="1574"><a data-dcnode-id="1575" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Footnote </span></span><span data-dcnode-id="1576" instrument_node="">13</span></a></sup><span data-dcnode-id="1573" instrument_node="">
</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1571" instrument_node="">This was not the only instrument that Galileo devised and made in Padua. After William Gilbert had published his </span><i data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">De magnete</span></i><span data-dcnode-id="1568" instrument_node=""> (On the Magnet) in 1600, Galileo tried to determine how the power of suitable pieces of magnetite could be increased. In a few months he learnt how to transform pieces of mineral into powerful magnets. He sent one of them to his friend the nobleman Giovanfrancesco Sagredo, in Venice, and planned to sell another to the Grand Duke of Tuscany, Ferdinand I de’ Medici.</span><sup data-dcnode-id="1563"><a data-dcnode-id="1564" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Footnote </span></span><span data-dcnode-id="1565" instrument_node="">14</span></a></sup><span data-dcnode-id="1562" instrument_node="">
</span></p><p data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">In addition, between 1602 and 1609 Galileo conducted studies on the mathematical law governing the motion of falling bodies. Once again, in order to accomplish reliable experiments he made suitable apparatus, including a sort of water clock to measure short time intervals. The invention of the thermoscope is also attributable to Galileo’s Paduan period.</span><sup data-dcnode-id="1555"><a data-dcnode-id="1556" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Footnote </span></span><span data-dcnode-id="1557" instrument_node="">15</span></a></sup><span data-dcnode-id="1554" instrument_node="">
</span></p><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">In brief, the constant dealing with the making and improving of instruments, made Galileo well prepared for the news of the Dutch optical device. His ability in handcrafting instruments made it possible for him to grasp the secret of the spyglass more readily than most of his contemporaries.</span></p><p data-dcnode-id="1546"><span data-dcnode-id="1550" instrument_node="">3. How did Galileo improve upon the Dutch spyglass? The three stories that he recounted about the telescope are in agreement in that they distinguish three main steps. Initially, between July and August 1609, Galileo made a spyglass with a magnification power of three times out of a tube of lead. This instrument is only mentioned in the </span><i data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1547" instrument_node="">, and was just an imitation of what Galileo had heard or seen of the Dutch spyglass. Perhaps it was made by using two spectacle lenses.</span></p><p data-dcnode-id="1529"><span data-dcnode-id="1545" instrument_node="">As a second step, in August 1609, Galileo made another instrument capable of magnifying distant objects eight, nine or ten times. A magnification of nine is confirmed in a report by the Venetian nobleman Antonio Priuli, dated August 21, on Galileo’s demonstration for the Senators of the Republic.</span><sup data-dcnode-id="1540"><a data-dcnode-id="1541" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Footnote </span></span><span data-dcnode-id="1542" instrument_node="">16</span></a></sup><span data-dcnode-id="1539" instrument_node=""> Apparently, Galileo mentioned the higher figure to his brother in law, and the lower figure in the </span><i data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1536" instrument_node="">, perhaps in order to emphasise his final achievement with the telescope. This second instrument was made of a tin tube, covered with reddish cotton frieze. It was about 60&nbsp;cm long, and about 4&nbsp;cm in diameter.</span><sup data-dcnode-id="1531"><a data-dcnode-id="1532" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Footnote </span></span><span data-dcnode-id="1533" instrument_node="">17</span></a></sup><span data-dcnode-id="1530" instrument_node=""> From the length of this telescope it is possible to argue that Galileo needed a spectacle lens for a moderately far-sighted individual as an objective, and a lens for an extremely near-sighted individual as an ocular. Since the time interval between the first and second attempt in telescope making was short, it is unlikely that Galileo was able to instruct any craftsmen to meet his special lens requests. We can only guess that, in order to obtain a suitable combination, Galileo searched in spectacle-makers’ workshops for very well polished lenses.</span></p><p data-dcnode-id="1509"><span data-dcnode-id="1528" instrument_node="">As for the third step in telescope making, from the </span><i data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1525" instrument_node=""> we can only obtain the information that Galileo’s best instrument had a magnifying power of 30 times. Galileo spent no words on describing the construction of this telescope, perhaps to maintain secret a process that, when replicated, would have deprived him of scientific and material rewards.</span><sup data-dcnode-id="1520"><a data-dcnode-id="1521" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Footnote </span></span><span data-dcnode-id="1522" instrument_node="">18</span></a></sup><span data-dcnode-id="1519" instrument_node=""> Notwithstanding his silence, a precious private document casts light on the instrument. On November 23, 1609, Ottavio Brenzoni sent a letter to Galileo. On the occasion of a trip from Padua to Venice, Galileo used the blank part of the letter to jot down a list of items to look for while in Venice. The list begins with “Slippers and small hat for Vincenzo [Galileo’s son]; The case with Marina’s things [Galileo’s lady friend]”, and continues with: “Lentils, chick peas, rice, raisins, einkorn [...]”. However, the list suddenly becomes a little bit disconcerting: “Artillery balls no. 2; Organ pipe made of tin; German flat glasses; [...]; Tripoli; [...]; Colophony; Felt, mirror for rubbing; [...]”. The list also singles out shops where some of these items could be found: “The mirror-maker at the sign of the King; In Calle delle Aqque they make chisels”. It also includes </span><i data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">desiderata</span></i><span data-dcnode-id="1516" instrument_node=""> from the furnishers: “Deal for iron bowls, or to be made of stone, as for the artillery balls”.</span><sup data-dcnode-id="1511"><a data-dcnode-id="1512" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Footnote </span></span><span data-dcnode-id="1513" instrument_node="">19</span></a></sup><span data-dcnode-id="1510" instrument_node="">
</span></p><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">This shopping list has great significance for the construction process of Galileo’s best telescope. The list contains adhesives, abrasives, basic instruments for grinding and polishing, and the rough materials to produce lenses. Finally, it contains the moulds to be used to create the lenses. Indeed, for grinding concave lenses Galileo planned to use cannon balls. As for the convex lenses, he was wondering if it would be possible to use iron or stone bowls. Did Galileo have success in finding the items included in the list? As a document, the list only shows that, by the end of 1609, Galileo was not satisfied with the lenses from spectacle-making shops, and that he managed to set up his own lens-making workshop. However, the evidence that Galileo had some success is indirect: by the end of 1609 he completed his most powerful telescope.</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1506" instrument_node="">The surviving documents allow us to outline the story of this telescope. Between December 1609 and January 1610, Galileo used it to study the Moon, the Milky Way, and to discover the four satellites of Jupiter. Immediately after the publication of the </span><i data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1503" instrument_node="">, he sent a still unbound copy of the booklet to the new Grand Duke of Tuscany, Cosimo II, along with the telescope. In the accompanying letters, Galileo pointed out that such a telescope was without aesthetic value, its importance consisting of the exceptional discoveries made with it.</span><sup data-dcnode-id="1498"><a data-dcnode-id="1499" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Footnote </span></span><span data-dcnode-id="1500" instrument_node="">20</span></a></sup><span data-dcnode-id="1497" instrument_node=""> The Grand Duke appreciated the gifts, and invited Galileo to come to Tuscany during the summer. The telescope became part of the Grand-ducal collection of scientific instruments. In less than 30&nbsp;years, the tube and the ocular were lost, and the objective broke into several pieces. In 1677, the objective was salvaged, put back together, and inserted in a precious frame (Fig.&nbsp;</span><a data-dcnode-id="1495" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1496" instrument_node="">2</span></a><span data-dcnode-id="1494" instrument_node="">).</span><sup data-dcnode-id="1489"><a data-dcnode-id="1490" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Footnote </span></span><span data-dcnode-id="1491" instrument_node="">21</span></a></sup><span data-dcnode-id="1488" instrument_node="">
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1463" data-test="figure" data-title="Fig.&nbsp;2" id="figure-2"><figure data-dcnode-id="1464"><figcaption data-dcnode-id="1484"><b class="c-article-section__figure-caption" data-dcnode-id="1485" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="1486" instrument_node="">Fig.&nbsp;2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1475"><div class="c-article-section__figure-item" data-dcnode-id="1479"><a class="c-article-section__figure-link" data-dcnode-id="1480" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/2" rel="nofollow"><picture data-dcnode-id="1481"><source data-dcnode-id="1483" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10686-009-9142-0/MediaObjects/10686_2009_9142_Fig2_HTML.gif?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="1482" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10686-009-9142-0/MediaObjects/10686_2009_9142_Fig2_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1476" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Galileo’s broken objective lens, detail (IMSS, inv. 2429)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1465"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1466" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/2" rel="nofollow"><span data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1467" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1468" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1469" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1472" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1471" fill-rule="evenodd"></path><span data-dcnode-id="1470" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1461" instrument_node="">Recently, the lens has been examined with state-of-the-art scientific techniques. For instance, the interferometer map obtained at the National Institute of Applied Optics at Arcetri (INOA), Florence, by Giuseppe Molesini and his colleagues, has revealed Galileo’s ability to shape very good lenses. Regrettably, the map also has revealed two different series of parallel interference fringes, one for each of the two major pieces of the lens. This implies that the individual who, in the past, had put together the pieces of the objective was not able to carry out a perfect restoration.</span><sup data-dcnode-id="1456"><a data-dcnode-id="1457" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Footnote </span></span><span data-dcnode-id="1458" instrument_node="">22</span></a></sup><span data-dcnode-id="1455" instrument_node="">
</span></p><p data-dcnode-id="1446"><span data-dcnode-id="1453" instrument_node="">In 2007, with the hope of revealing the glass recipe of the lens, a portable X-Ray Fluorescence-detecting apparatus was brought to the IMSS by a team of the National Institute of Nuclear Physics (INFN) in Florence, coordinated by Pier Andrea Mandò. No lead was found in the glass of Galileo’s broken objective. This confirms of course that Galileo did not use “optical lead glass”, which was not developed until the eighteenth century. However, did Galileo really use the flat German glass he was looking for in Venice, as we know from his shopping list? Unfortunately, the study conducted by Marco Verità of the Experimental Glass Station of Murano, Venice, has led us to conclude that someone, in the past, may have varnished the surface of the lens in order to protect it from weathering, or that the lens is undergoing such a weathering process, and is in need of restoration. Further analyses will reveal the true problem and will aid in identifying the provenance of the glass.</span><sup data-dcnode-id="1448"><a data-dcnode-id="1449" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Footnote </span></span><span data-dcnode-id="1450" instrument_node="">23</span></a></sup><span data-dcnode-id="1447" instrument_node="">
</span></p><p data-dcnode-id="1435"><span data-dcnode-id="1445" instrument_node="">After the plain telescope he had sent to Florence in March 1610, Galileo had to maintain his promise to furnish the Grand Duke of Tuscany with ornate telescopes. He did this once he was nominated “first mathematician” at the University of Pisa and “first mathematician and philosopher” of the Grand Duke. Galileo’s presentation telescope was carefully preserved in the grand-ducal collection of scientific instruments (Fig.&nbsp;</span><a data-dcnode-id="1443" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1444" instrument_node="">3</span></a><span data-dcnode-id="1442" instrument_node="">). In order to make the tube, Galileo glued a series of strips of wood onto a piece of black fabric. Successively, he rolled the tube and covered it in brown and red leather. As a result, the tube was very strong, capable of resisting the pressure that was needed to emboss it with a gilt decoration. Galileo stopped the objective, 37&nbsp;mm in diameter, to an aperture of 15&nbsp;mm with a diaphragm. This reveals that he learned very early the importance of eliminating the contribution from the rim of a lens to obtain sharper images. The magnification of the instrument, the original ocular of which was lost at the end of the nineteenth century, is 21 times. The field of view is only 15&nbsp;arcminutes.</span><sup data-dcnode-id="1437"><a data-dcnode-id="1438" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Footnote </span></span><span data-dcnode-id="1439" instrument_node="">24</span></a></sup><span data-dcnode-id="1436" instrument_node="">
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1411" data-test="figure" data-title="Fig.&nbsp;3" id="figure-3"><figure data-dcnode-id="1412"><figcaption data-dcnode-id="1432"><b class="c-article-section__figure-caption" data-dcnode-id="1433" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1434" instrument_node="">Fig.&nbsp;3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1423"><div class="c-article-section__figure-item" data-dcnode-id="1427"><a class="c-article-section__figure-link" data-dcnode-id="1428" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/3" rel="nofollow"><picture data-dcnode-id="1429"><source data-dcnode-id="1431" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10686-009-9142-0/MediaObjects/10686_2009_9142_Fig3_HTML.gif?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1430" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10686-009-9142-0/MediaObjects/10686_2009_9142_Fig3_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1424" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Galileo’s presentation telescope, detail (IMSS, inv. 2428)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1413"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1414" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/3" rel="nofollow"><span data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1415" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1416" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1417" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1420" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1419" fill-rule="evenodd"></path><span data-dcnode-id="1418" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1409" instrument_node="">What a plain Galilean telescope really looked like can be seen in another instrument at the IMSS. The tube is slightly conical and consists of two grooved wooden shells held together by copper threads and covered in paper. The housings of the objective and ocular are also made of wood, and can slide inside the main tube for focusing. Once again, the objective, 51&nbsp;mm in diameter, is stopped to an aperture of 26&nbsp;mm. The magnification is only 14 times.</span><sup data-dcnode-id="1404"><a data-dcnode-id="1405" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Footnote </span></span><span data-dcnode-id="1406" instrument_node="">25</span></a></sup><span data-dcnode-id="1403" instrument_node="">
</span></p></div></div></section><section data-dcnode-id="1191" data-title="Galileo’s discoveries"><div class="c-article-section" data-dcnode-id="1192" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1397" id="Sec3"><span data-dcnode-id="1398" instrument_node="">Galileo’s discoveries</span></h2><div class="c-article-section__content" data-dcnode-id="1193" id="Sec3-content"><p data-dcnode-id="1383"><span data-dcnode-id="1396" instrument_node="">Galileo aimed the telescope towards the stars during the summer of 1609. Perhaps he used telescopes with a magnifying power that was intermediate between the instrument he presented to the Venetian Senators in August 1609 and his best telescope made in December 1609. This is confirmed by replicated observations made at the Arcetri Astrophysical Observatory, Florence, by a group co-ordinated by Francesco Palla. The astronomers used an optical replica of Galileo’s presentation telescope that is capable of a magnification of 21. As a result, the Moon appears a little bit less detailed in Galileo’s first watercolours (Fig.&nbsp;</span><a data-dcnode-id="1394" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1395" instrument_node="">4</span></a><span data-dcnode-id="1393" instrument_node="">a) </span><sup data-dcnode-id="1388"><a data-dcnode-id="1389" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Footnote </span></span><span data-dcnode-id="1390" instrument_node="">26</span></a></sup><span data-dcnode-id="1387" instrument_node=""> than through the optical replica (Fig.&nbsp;</span><a data-dcnode-id="1385" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1386" instrument_node="">4</span></a><span data-dcnode-id="1384" instrument_node="">b).
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1353" data-test="figure" data-title="Fig.&nbsp;4" id="figure-4"><figure data-dcnode-id="1354"><figcaption data-dcnode-id="1380"><b class="c-article-section__figure-caption" data-dcnode-id="1381" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="1382" instrument_node="">Fig.&nbsp;4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1365"><div class="c-article-section__figure-item" data-dcnode-id="1375"><a class="c-article-section__figure-link" data-dcnode-id="1376" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/4" rel="nofollow"><picture data-dcnode-id="1377"><source data-dcnode-id="1379" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10686-009-9142-0/MediaObjects/10686_2009_9142_Fig4_HTML.gif?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="1378" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10686-009-9142-0/MediaObjects/10686_2009_9142_Fig4_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1366" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="1367"><span data-dcnode-id="1374" instrument_node="">The Moon before the first quarter as it appears: </span><b data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">a</span></b><span data-dcnode-id="1371" instrument_node=""> in Galileo’s watercolour, </span><b data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">b</span></b><span data-dcnode-id="1368" instrument_node=""> through a replica of Galileo’s presentation telescope</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1355"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="1356" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10686-009-9142-0/figures/4" rel="nofollow"><span data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1357" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1358" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1359" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1362" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1361" fill-rule="evenodd"></path><span data-dcnode-id="1360" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1351" instrument_node="">In 1609, Galileo also began to observe the Milky Way and the Ptolemaic nebulae. However, it was not until January 1610 that he realized the importance of his celestial discoveries. On the night of January 7, he observed three faint stars aligned with Jupiter. Additional observations led him to distinguish a fourth faint star on January 13, and to understand that, like the other three, it was orbiting Jupiter.</span><sup data-dcnode-id="1346"><a data-dcnode-id="1347" href="#Fn27"><span class="u-visually-hidden" data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Footnote </span></span><span data-dcnode-id="1348" instrument_node="">27</span></a></sup><span data-dcnode-id="1345" instrument_node=""> This was the impetus that caused Galileo to publish. Between February and March he continued to perform observations, worked upon the manuscript of the </span><i data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1342" instrument_node="">, and frequently travelled from Padua to Venice to meet the publisher and correct proofs. By the end of March, the booklet was printed, and sold out.</span></p><p data-dcnode-id="1330"><span data-dcnode-id="1340" instrument_node="">The first discovery which the </span><i data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1337" instrument_node=""> communicated to the world was the terrestrial nature of the Moon. By using his telescope Galileo was able to distinguish that the lunar surface was not perfectly smooth as astronomers had usually believed. In particular, the observations contradicted the Aristotelian tradition that the celestial bodies, the Moon included, were made of perfect and incorruptible special matter, the so-called “quintessence”. Like the Earth, the Moon had valleys and mountains. To emphasize this conclusion, Galileo calculated that the lunar mountains were about four Italian miles high.</span><sup data-dcnode-id="1332"><a data-dcnode-id="1333" href="#Fn28"><span class="u-visually-hidden" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Footnote </span></span><span data-dcnode-id="1334" instrument_node="">28</span></a></sup><span data-dcnode-id="1331" instrument_node="">
</span></p><p data-dcnode-id="1322"><span data-dcnode-id="1329" instrument_node="">As a second discovery, Galileo described the stellar constitution of the Milky Way. He set aside any traditional notion of this celestial entity by claiming that its nebulosity was due to the eye of the observer being unaided. When the eye was aided by the telescope, the nebulosity disappeared, revealing an incredible number of faint stars. Such a conclusion was also valid for the Ptolemaic nebulae: the Head of Orion and the Heart of Cancer.</span><sup data-dcnode-id="1324"><a data-dcnode-id="1325" href="#Fn29"><span class="u-visually-hidden" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Footnote </span></span><span data-dcnode-id="1326" instrument_node="">29</span></a></sup><span data-dcnode-id="1323" instrument_node=""> Apparently, the telescope was the means to reduce anything appearing fuzzy to the geometrical forms in which the book of nature was written.</span></p><p data-dcnode-id="1305"><span data-dcnode-id="1321" instrument_node="">Galileo’s third discovery was the existence of four new stars orbiting Jupiter. In the </span><i data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1318" instrument_node="">, Galileo recounted the occasion of the discovery, and included daily observations of the planet up to March 2, 1610.</span><sup data-dcnode-id="1313"><a data-dcnode-id="1314" href="#Fn30"><span class="u-visually-hidden" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Footnote </span></span><span data-dcnode-id="1315" instrument_node="">30</span></a></sup><span data-dcnode-id="1312" instrument_node=""> Galileo’s desire to include up-to-date observations shows that the satellites of Jupiter formed the central topic of the work. Their discovery invalidated a classic objection to the Copernican world-system. In the Ptolemaic geocentric system, all the planets orbited the central immobile Earth. In the Copernican heliocentric system all the planets orbited the immobile Sun, excluding the Moon. The latter formed an exception, as it was the only celestial body to orbit the Earth. Jupiter’s satellites provided evidence that other planets also had moons.</span><sup data-dcnode-id="1307"><a data-dcnode-id="1308" href="#Fn31"><span class="u-visually-hidden" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Footnote </span></span><span data-dcnode-id="1309" instrument_node="">31</span></a></sup><span data-dcnode-id="1306" instrument_node="">
</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1304" instrument_node="">The </span><i data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1301" instrument_node=""> gave rise to conflicting opinions within the scientific community. Lenses were considered as magical attractions in the </span><i data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">wunderkammern</span></i><span data-dcnode-id="1298" instrument_node="">, the princely rooms destined to contain collections of natural, scientific and artistic items. Therefore, several detractors of the Copernican theory claimed that Galileo’s celestial novelties were produced by the lenses. Since a single lens could produce fictitious images, a combination of two lenses could produce kaleidoscopic effects, and show mountains on the Moon, multiply the stars, and create moons of whatever planet.</span><sup data-dcnode-id="1293"><a data-dcnode-id="1294" href="#Fn32"><span class="u-visually-hidden" data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Footnote </span></span><span data-dcnode-id="1295" instrument_node="">32</span></a></sup><span data-dcnode-id="1292" instrument_node="">
</span></p><p data-dcnode-id="1271"><span data-dcnode-id="1290" instrument_node="">Galileo’s celestial discoveries were welcomed by those individuals that had a firm Copernican belief. For example, immediately after the publication of the </span><i data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1287" instrument_node="">, on April 19, Johann Kepler, Imperial Mathematician of Rudolph II in Prague, wrote an enthusiastic letter to Galileo. He complimented the natural philosopher on the impact his discoveries had for supporting the heliocentric world-system.</span><sup data-dcnode-id="1282"><a data-dcnode-id="1283" href="#Fn33"><span class="u-visually-hidden" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Footnote </span></span><span data-dcnode-id="1284" instrument_node="">33</span></a></sup><span data-dcnode-id="1281" instrument_node=""> Galileo appreciated Kepler’s commendation and, as soon as the letter was published in Prague with the title of </span><i data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Dissertatio cum Nuncio Sidereo</span></i><span data-dcnode-id="1278" instrument_node=""> (Dissertation on the Starry Messenger), Galileo wanted it to be published also in Florence.</span><sup data-dcnode-id="1273"><a data-dcnode-id="1274" href="#Fn34"><span class="u-visually-hidden" data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Footnote </span></span><span data-dcnode-id="1275" instrument_node="">34</span></a></sup><span data-dcnode-id="1272" instrument_node="">
</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1270" instrument_node="">As Galileo began to confront the different opinions the </span><i data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Sidereus Nuncius</span></i><span data-dcnode-id="1267" instrument_node=""> provoked, he also continued to make important celestial discoveries. On July 30, 1610, he wrote a letter to Belisario Vinta, Secretary of State of Cosimo II, announcing that Saturn was a compound of three stars. At first glance, this discovery provided additional evidence for the existence of satellites orbiting other planets. However, from night to night, Saturn’s companions appeared to remain immobile.</span><sup data-dcnode-id="1262"><a data-dcnode-id="1263" href="#Fn35"><span class="u-visually-hidden" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Footnote </span></span><span data-dcnode-id="1264" instrument_node="">35</span></a></sup><span data-dcnode-id="1261" instrument_node=""> In 1612, they temporarily disappeared,</span><sup data-dcnode-id="1256"><a data-dcnode-id="1257" href="#Fn36"><span class="u-visually-hidden" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Footnote </span></span><span data-dcnode-id="1258" instrument_node="">36</span></a></sup><span data-dcnode-id="1255" instrument_node=""> and when they reappeared in 1616, they looked like two ears or handles on either side of the body of the planet.</span><sup data-dcnode-id="1250"><a data-dcnode-id="1251" href="#Fn37"><span class="u-visually-hidden" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Footnote </span></span><span data-dcnode-id="1252" instrument_node="">37</span></a></sup><span data-dcnode-id="1249" instrument_node=""> These puzzling appearances caused Galileo to discard Saturn as another point in favour of the Copernican theory. However, Saturn gave Galileo the possibility of focusing on the importance of having very good telescopes. Only a perfect telescope could show Saturn’s companions. A weak instrument would only have revealed an olive-shaped planet.</span><sup data-dcnode-id="1244"><a data-dcnode-id="1245" href="#Fn38"><span class="u-visually-hidden" data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Footnote </span></span><span data-dcnode-id="1246" instrument_node="">38</span></a></sup><span data-dcnode-id="1243" instrument_node="">
</span></p><p data-dcnode-id="1228"><span data-dcnode-id="1241" instrument_node="">On December 11, 1610, Galileo wrote to Giuliano de’ Medici, Ambassador of Cosimo II in Prague, about a new discovery.</span><sup data-dcnode-id="1236"><a data-dcnode-id="1237" href="#Fn39"><span class="u-visually-hidden" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Footnote </span></span><span data-dcnode-id="1238" instrument_node="">39</span></a></sup><span data-dcnode-id="1235" instrument_node=""> Galileo provisionally sent him an anagram that was solved on January 1, 1611. Venus revealed phases very similar to those of the Moon. In Galileo’s mind, such phases formed additional evidence for the Copernican world-system.</span><sup data-dcnode-id="1230"><a data-dcnode-id="1231" href="#Fn40"><span class="u-visually-hidden" data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Footnote </span></span><span data-dcnode-id="1232" instrument_node="">40</span></a></sup><span data-dcnode-id="1229" instrument_node=""> In the Ptolemaic geocentric system, Venus orbited the Earth along two circles, the second of which always had its centre on the Earth-Sun segment. This implied that, at maximum illumination, the planet could be observed from the Earth as a crescent. Instead, in the Copernican heliocentric system, Venus orbited the Sun. This fact implied that the planet would display a complete series of phases when viewed from the Earth, as Galileo had confirmed.</span></p><p data-dcnode-id="1214"><span data-dcnode-id="1227" instrument_node="">Paradoxically, Jupiter’s satellites and Venus’ phases did not create any problem from the ecclesiastic point of view. In the spring of 1611, Galileo went to Rome to show his telescope to the Jesuit Fathers of the Roman College. On this occasion, the mathematician Christoph Clavius honestly confirmed the soundness of Galileo’s discoveries,</span><sup data-dcnode-id="1222"><a data-dcnode-id="1223" href="#Fn41"><span class="u-visually-hidden" data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Footnote </span></span><span data-dcnode-id="1224" instrument_node="">41</span></a></sup><span data-dcnode-id="1221" instrument_node=""> and stated that it was indispensable to modify the architecture of the cosmos accordingly.</span><sup data-dcnode-id="1216"><a data-dcnode-id="1217" href="#Fn42"><span class="u-visually-hidden" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Footnote </span></span><span data-dcnode-id="1218" instrument_node="">42</span></a></sup><span data-dcnode-id="1215" instrument_node=""> Of course, neither Clavius nor the other Jesuits gave weight to Galileo’s conclusion on the validity of the Copernican theory. Instead, they accepted the system of the world that the Danish astronomer Tycho Brahe had expounded in 1588. In this system, the Moon and the Sun orbited the immovable Earth, and all the other planets orbited the Sun. It is clear that the phases of Venus fit into this system perfectly.</span></p><p data-dcnode-id="1194"><span data-dcnode-id="1213" instrument_node="">The Jesuits were more puzzled by the terrestrial nature of the Moon. This discovery effaced the cosmological gap between the super- and the sub-lunar worlds established by Aristotle.</span><sup data-dcnode-id="1208"><a data-dcnode-id="1209" href="#Fn43"><span class="u-visually-hidden" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Footnote </span></span><span data-dcnode-id="1210" instrument_node="">43</span></a></sup><span data-dcnode-id="1207" instrument_node=""> This also explains the controversy that existed between Galileo and the Jesuit Father Christoph Scheiner on the nature of sunspots.</span><sup data-dcnode-id="1202"><a data-dcnode-id="1203" href="#Fn44"><span class="u-visually-hidden" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Footnote </span></span><span data-dcnode-id="1204" instrument_node="">44</span></a></sup><span data-dcnode-id="1201" instrument_node=""> When Galileo observed the sunspots, he immediately interpreted them as evidence that, like the Moon, the Sun also had a terrestrial nature. The Sun was not perfect and incorruptible; it was a place of continuous mutations. In Galileo’s opinion, sunspots might be dense clouds moving across its bright surface.</span><sup data-dcnode-id="1196"><a data-dcnode-id="1197" href="#Fn45"><span class="u-visually-hidden" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Footnote </span></span><span data-dcnode-id="1198" instrument_node="">45</span></a></sup><span data-dcnode-id="1195" instrument_node="">
</span></p></div></div></section><section data-dcnode-id="1139" data-title="Conclusions: early evolution of the telescope"><div class="c-article-section" data-dcnode-id="1140" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1189" id="Sec4"><span data-dcnode-id="1190" instrument_node="">Conclusions: early evolution of the telescope</span></h2><div class="c-article-section__content" data-dcnode-id="1141" id="Sec4-content"><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">The early evolution of the telescope reveals an interesting impasse. Galileo was able to improve upon the magnification of the Dutch spyglass, going from three to 30 times in a few months, and nobody else was able to improve upon Galileo’s telescope for more than 20&nbsp;years. Even more astonishing is the fact that, after the quick development of the telescope between 1609 and 1610, Galileo himself was not able to further improve the instrument. This suggests that, in 1610, he had at hand an optical device that could not be developed further.</span></p><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Both the Dutch spyglass and the Galilean telescope were formed by combining a convex lens as an objective, and a concave lens as an ocular. The combination has the advantage of showing erect images. However, the combination also produces a small field of view, which progressively diminishes as the magnifying power increases. This drawback depends on the concave ocular, which has the property of sharpening the distant objects seen through the objective, but diminishing the apparent diameter of the objective.</span></p><p data-dcnode-id="1168"><span data-dcnode-id="1184" instrument_node="">The appearance of a new type of telescope had no effect on the evolution of astronomy until the new social figure of the specialized optician came into being. Note that, in order to observe the four satellites of Jupiter, Kepler had to search for a good telescope. When he finally found a suitable instrument on loan, it was the one that Galileo had made for the Elector of Cologne.</span><sup data-dcnode-id="1179"><a data-dcnode-id="1180" href="#Fn46"><span class="u-visually-hidden" data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Footnote </span></span><span data-dcnode-id="1181" instrument_node="">46</span></a></sup><span data-dcnode-id="1178" instrument_node=""> Nevertheless, on the basis of his thorough knowledge of optics, Kepler himself had conceived a new type of telescope that he expounded in the </span><i data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Dioptrice</span></i><span data-dcnode-id="1175" instrument_node="">.</span><sup data-dcnode-id="1170"><a data-dcnode-id="1171" href="#Fn47"><span class="u-visually-hidden" data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Footnote </span></span><span data-dcnode-id="1172" instrument_node="">47</span></a></sup><span data-dcnode-id="1169" instrument_node=""> This was published in 1611, that is, the same year he received Galileo’s telescope on loan...</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">From the theoretical point of view, Kepler’s telescope, made of two convex lenses, had great advantages. Although the instrument created upside-down images, it was capable of a higher magnification and a larger field of view. However, for technical reasons this type of telescope became a reality only in the 1630s. Indeed, Kepler’s combination of lenses amplifies optical aberrations more than Galileo’s.</span></p><p data-dcnode-id="1158"><span data-dcnode-id="1165" instrument_node="">The transition to Kepler’s telescope required more precise lens grinding and polishing techniques, especially by the use of appropriate metal moulds. A careful scientific study of the lenses made by Jacopo Mariani, Evangelista Torricelli, Eustachio Divini, and Giuseppe Campani is presently contributing to clarify the early evolution of the telescope. At present, micro-interferometric maps made by the INOA have revealed that the surface of Divini’s objectives had a lower roughness. Interferometric maps of the lenses have also revealed that Campani’s objectives had an overall good shape. However, micro-photographs of the surface of Campani’s lenses show tracks left by abrasive grains. The presence of these tracks testifies that, after grinding, Campani used very soft polishing.</span><sup data-dcnode-id="1160"><a data-dcnode-id="1161" href="#Fn48"><span class="u-visually-hidden" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Footnote </span></span><span data-dcnode-id="1162" instrument_node="">48</span></a></sup><span data-dcnode-id="1159" instrument_node="">
</span></p><p data-dcnode-id="1150"><span data-dcnode-id="1157" instrument_node="">In addition to controlled grinding methods, the improvement of the telescope was partly due to a careful selection of the glass. For instance, we know that Divini usually bought a large quantity of flat glass, but only few pieces successfully passed a careful examination with a microscope and became telescope objectives. Spectral transmittance analysis made by the INOA has revealed an overall similarity in the glass used by early telescope makers. In particular, the absorption curves obtained have revealed the presence of manganese. This element was employed to eliminate green coloration due to the presence of metal impurities in the glass.</span><sup data-dcnode-id="1152"><a data-dcnode-id="1153" href="#Fn49"><span class="u-visually-hidden" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Footnote </span></span><span data-dcnode-id="1154" instrument_node="">49</span></a></sup><span data-dcnode-id="1151" instrument_node="">
</span></p><p data-dcnode-id="1142"><span data-dcnode-id="1149" instrument_node="">X-Ray Fluorescence analysis by the INFN has revealed that, as for Galileo’s objective lens, the glass recipe for lens making did not include lead. Moreover, a comparison with a few glass instruments made for the Galilean Accademia del Cimento—which was active in Florence between 1657 and 1667—has revealed other interesting information. The white glass from the furnace installed in the garden of the Pitti Palace of Florence to produce blown glass items is very similar to the white glass used for lenses.</span><sup data-dcnode-id="1144"><a data-dcnode-id="1145" href="#Fn50"><span class="u-visually-hidden" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Footnote </span></span><span data-dcnode-id="1146" instrument_node="">50</span></a></sup><span data-dcnode-id="1143" instrument_node=""> Such a similarity forms additional evidence that the evolution of early telescopes was based upon grinding and polishing methods. Varying the glass composition was not yet considered important.</span></p></div></div></section><span data-dcnode-id="1138" instrument_node="">
</span><section data-dcnode-id="791" data-title="Notes"><div class="c-article-section" data-dcnode-id="792" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1136" id="notes"><span data-dcnode-id="1137" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="793" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="794"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1129" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1130"><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">G. Galilei [</span><a aria-label="Reference 7" data-dcnode-id="1133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d146954708e326" title="Galilei, G., Opere (A. Favaro ed.). Barbèra, Florence (1890–1909)"><span data-dcnode-id="1134" instrument_node="">7</span></a><span data-dcnode-id="1132" instrument_node="">], v. 10, p. 250.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1125" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1126"><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Ibid., pp. 253–254. See also Antonio Priuli’s report: ibid., v. 19, pp. 587–588, and Giovanni Bartoli’s letter to Belisario Vinta, dated August 22, 1609: ibid., v. 10, p. 250.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1112" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1113"><p data-dcnode-id="1114"><span data-dcnode-id="1124" instrument_node="">G. Galilei [</span><a aria-label="Reference 6" data-dcnode-id="1122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link
