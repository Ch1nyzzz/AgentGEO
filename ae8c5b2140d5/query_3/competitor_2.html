</span><section class="learning-objectives" data-dcnode-id="1316" data-depth="1" id="fs-id1167470683129"><h3 data-dcnode-id="1333" data-type="title"><span data-dcnode-id="1334" instrument_node="">Learning Objectives</span></h3><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330" id="fs-id1168583221512"><span data-dcnode-id="1331" instrument_node="">By the end of this section, you will be able to:</span></p><span data-dcnode-id="1329" instrument_node="">
</span><ul data-dcnode-id="1318" id="fs-id1167470611713"><span data-dcnode-id="1328" instrument_node="">
</span><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Recognize the largest visible-light and infrared telescopes in operation today</span></li><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Discuss the factors relevant to choosing an appropriate telescope site</span></li><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Define the technique of adaptive optics and describe the effects of the atmosphere on astronomical observations</span></li><span data-dcnode-id="1319" instrument_node="">
</span></ul><span data-dcnode-id="1317" instrument_node="">
</span></section><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310" id="fs-id1167470920016"><span data-dcnode-id="1314" instrument_node="">Since Newton’s time, when the sizes of the mirrors in telescopes were measured in inches, reflecting telescopes have grown ever larger. In 1948, US astronomers built a telescope with a 5-meter (200-inch) diameter mirror on Palomar Mountain in Southern California. It remained the largest visible-light telescope in the world for several decades. The giants of today, however, have primary mirrors (the largest mirrors in the telescope) that are 8- to 10-meters in diameter, and larger ones are being built (</span><a class="autogenerated-content" data-dcnode-id="1312" href="#OSC_Astro_06_02_Mirror"><span data-dcnode-id="1313" instrument_node="">Figure 6.7</span></a><span data-dcnode-id="1311" instrument_node="">).</span></p><span data-dcnode-id="1309" instrument_node="">

</span><section data-dcnode-id="691" data-depth="1" id="fs-id1167470626442"><h3 data-dcnode-id="1277" data-type="title"><span data-dcnode-id="1278" instrument_node="">Modern Visible-Light and Infrared Telescopes</span></h3><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1271" id="fs-id1167470606391"><span data-dcnode-id="1275" instrument_node="">The decades starting in 1990 saw telescope building around the globe grow at an unprecedented rate. (See </span><a class="autogenerated-content" data-dcnode-id="1273" href="#fs-id1167470615449"><span data-dcnode-id="1274" instrument_node="">Table 6.1</span></a><span data-dcnode-id="1272" instrument_node="">, which also includes websites for each telescope in case you want to visit or learn more about them.) Technological advancements had finally made it possible to build telescopes significantly larger than the 5-meter telescope at Palomar at a reasonable cost. New technologies have also been designed to work well in the infrared, and not just visible, wavelengths.</span></p><span data-dcnode-id="1270" instrument_node="">

</span><p data-dcnode-id="902" id="fs-id1167470901718"><span data-dcnode-id="906" instrument_node="">The differences between the Palomar telescope and the modern Gemini North telescope (to take an example) are easily seen in </span><a class="autogenerated-content" data-dcnode-id="904" href="#OSC_Astro_06_02_RefTele"><span data-dcnode-id="905" instrument_node="">Figure 6.8</span></a><span data-dcnode-id="903" instrument_node="">. The Palomar telescope is a massive steel structure designed to hold the 14.5-ton primary mirror with a 5-meter diameter. Glass tends to sag under its own weight; hence, a huge steel structure is needed to hold the mirror. A mirror 8 meters in diameter, the size of the Gemini North telescope, if it were built using the same technology as the Palomar telescope, would have to weigh at least eight times as much and would require an enormous steel structure to support it.</span></p><span data-dcnode-id="901" instrument_node="">
</span><div class="os-figure" data-dcnode-id="872" id="OSC_Astro_06_02_RefTele"><figure data-dcnode-id="894" data-id="OSC_Astro_06_02_RefTele"><span data-dcnode-id="900" instrument_node="">
</span><span data-alt="Photographs of two modern reflecting telescopes. At left (a) is the Palomar 5-m reflector. This telescope was designed in the 1930s and built with the best technology available at the time. The mounting, telescope tube, and mirror supports are massive steel structures, especially compared to the relatively small primary mirror. On the right (b) is the Gemini North 8-m telescope. Thin mirror technology coupled with new alloys and modern composite materials result in a much lighter and less massive telescope structure, and a larger primary mirror." data-dcnode-id="896" data-type="media" id="fs-id1167470703908"><span data-dcnode-id="899" instrument_node="">
</span><img alt="Photographs of two modern reflecting telescopes. At left (a) is the Palomar 5-m reflector. This telescope was designed in the 1930s and built with the best technology available at the time. The mounting, telescope tube, and mirror supports are massive steel structures, especially compared to the relatively small primary mirror. On the right (b) is the Gemini North 8-m telescope. Thin mirror technology coupled with new alloys and modern composite materials result in a much lighter and less massive telescope structure, and a larger primary mirror." data-dcnode-id="898" data-media-type="image/jpeg" id="4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/ec530a0ab58aa32d1dcd16ad7932cd945c6ab7ca&amp;raw"><span data-dcnode-id="897" instrument_node="">
</span></span><span data-dcnode-id="895" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="874"><span data-dcnode-id="893" instrument_node="">

</span><span class="os-title" data-dcnode-id="882" data-type="title" id="3"><span data-dcnode-id="883" instrument_node="">Modern Reflecting Telescopes.</span></span><span data-dcnode-id="881" instrument_node="">
</span><span class="os-divider" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node=""> </span></span><span data-dcnode-id="878" instrument_node="">
</span><span class="os-caption" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">(a) The Palomar 5-meter reflector: The Hale telescope on Palomar Mountain has a complex mounting structure that enables the telescope (in the open “tube” pointing upward in this photo) to swing easily into any position. (b) The Gemini North 8-meter telescope: The Gemini North mirror has a larger area than the Palomar mirror, but note how much less massive the whole instrument seems. (credit a: modification of work by Caltech/Palomar Observatory; credit b: modification of work by Gemini Observatory/AURA)</span></span><span data-dcnode-id="875" instrument_node="">
</span></div><span data-dcnode-id="873" instrument_node="">
</span></div><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="866" id="fs-id1167470700614"><span data-dcnode-id="870" instrument_node="">The 8-meter Gemini North telescope looks like a featherweight by contrast, and indeed it is. The mirror is only about 8 inches thick and weighs 24.5 tons, less than twice as much as the Palomar mirror. The Gemini North telescope was completed about 50 years after the Palomar telescope. Engineers took advantage of new technologies to build a telescope that is much lighter in weight relative to the size of the primary mirror. The Gemini mirror does sag, but with modern computers, it is possible to measure that sag many times each second and apply forces at 120 different locations to the back of the mirror to correct the sag, a process called </span><em data-dcnode-id="868" data-effect="italics"><span data-dcnode-id="869" instrument_node="">active control</span></em><span data-dcnode-id="867" instrument_node="">. Seventeen telescopes with mirrors 6.5 meters in diameter and larger have been constructed since 1990.</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860" id="fs-id1167470623577"><span data-dcnode-id="864" instrument_node="">The twin 10-meter Keck telescopes on Maunakea, which were the first of these new-technology instruments, use precision control in an entirely novel way. Instead of a single primary mirror 10 meters in diameter, each Keck telescope achieves its larger aperture by combining the light from 36 separate hexagonal mirrors, each 1.8 meters wide (</span><a class="autogenerated-content" data-dcnode-id="862" href="#OSC_Astro_06_02_Thirtysix"><span data-dcnode-id="863" instrument_node="">Figure 6.9</span></a><span data-dcnode-id="861" instrument_node="">). Computer-controlled actuators (motors) constantly adjust these 36 mirrors so that the overall reflecting surface acts like a single mirror with just the right shape to collect and focus the light into a sharp image.</span></p><span data-dcnode-id="859" instrument_node="">
</span><div class="os-figure" data-dcnode-id="830" id="OSC_Astro_06_02_Thirtysix"><figure data-dcnode-id="852" data-id="OSC_Astro_06_02_Thirtysix"><span data-dcnode-id="858" instrument_node="">

</span><span class="os-number" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">6.9</span></span><span data-dcnode-id="845" instrument_node="">

</span><span class="os-divider" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node=""> </span></span><span data-dcnode-id="836" instrument_node="">
</span><span class="os-caption" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">The mirror of the 10-meter Keck telescope is composed of 36 hexagonal sections. (credit: NASA)</span></span><span data-dcnode-id="833" instrument_node="">

</span><div class="astronomy link-to-learning ui-has-child-title" data-dcnode-id="812" data-type="note" id="fs-id1167470677205"><header data-dcnode-id="823"><h3 class="os-title" data-dcnode-id="824" data-type="title"><span data-dcnode-id="828" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Link to Learning</span></span><span data-dcnode-id="825" instrument_node="">
</span></h3></header><section data-dcnode-id="813"><span data-dcnode-id="822" instrument_node="">
</span><div class="os-note-body" data-dcnode-id="814"><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="816" id="fs-id1167471052455"><span data-dcnode-id="820" instrument_node="">Learn more about the </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/l/30KeckObserv" rel="noopener nofollow" target="_blank"><span data-dcnode-id="819" instrument_node="">Keck Observatory on Maunakea</span></a><span data-dcnode-id="817" instrument_node=""> through this History Channel clip on the telescopes and the work that they do.</span></p><span data-dcnode-id="815" instrument_node="">
</span></div></section></div><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809" id="fs-id1167470862031"><span data-dcnode-id="810" instrument_node="">In addition to holding the mirror, the steel structure of a telescope is designed so that the entire telescope can be pointed quickly toward any object in the sky. Since Earth is rotating, the telescope must have a motorized drive system that moves it very smoothly from east to west at exactly the same rate that Earth is rotating from west to east, so it can continue to point at the object being observed. All this machinery must be housed in a dome to protect the telescope from the elements. The dome has an opening in it that can be positioned in front of the telescope and moved along with it, so that the light from the objects being observed is not blocked.</span></p><span data-dcnode-id="808" instrument_node="">
</span><div class="astronomy voyagers-in-astronomy ui-has-child-title" data-dcnode-id="693" data-type="note" id="fs-id1167470692657"><header data-dcnode-id="802"><h3 class="os-title" data-dcnode-id="803" data-type="title"><span data-dcnode-id="807" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Voyagers in Astronomy</span></span><span data-dcnode-id="804" instrument_node="">
</span></h3></header><section data-dcnode-id="694"><span data-dcnode-id="801" instrument_node="">
</span><div class="os-note-body" data-dcnode-id="695"><h4 class="os-subtitle" data-dcnode-id="796" data-type="title" id="7"><span data-dcnode-id="800" instrument_node="">
</span><span class="os-subtitle-label" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">George Ellery Hale: Master Telescope Builder</span></span><span data-dcnode-id="797" instrument_node="">
</span></h4><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="787" id="fs-id1167470699124"><span data-dcnode-id="794" instrument_node="">George Ellery </span><span class="no-emphasis" data-dcnode-id="792" data-type="term" group-by="H" id="term255"><span data-dcnode-id="793" instrument_node="">Hale</span></span><span data-dcnode-id="791" instrument_node=""> (</span><a class="autogenerated-content" data-dcnode-id="789" href="#OSC_Astro_06_04_GeorgeHale"><span data-dcnode-id="790" instrument_node="">Figure 6.10</span></a><span data-dcnode-id="788" instrument_node="">) was a giant among early telescope builders. Not once, but four times, he initiated projects that led to the construction of what was the world’s largest telescope at the time. And he was a master at winning over wealthy benefactors to underwrite the construction of these new instruments.</span></p><span data-dcnode-id="786" instrument_node="">
</span><div class="os-figure" data-dcnode-id="757" id="OSC_Astro_06_04_GeorgeHale"><figure data-dcnode-id="779" data-id="OSC_Astro_06_04_GeorgeHale"><span data-dcnode-id="785" instrument_node="">
</span><span data-alt="Photograph of George Ellery Hale." data-dcnode-id="781" data-type="media" id="fs-id1167470657871"><span data-dcnode-id="784" instrument_node="">
</span><img alt="Photograph of George Ellery Hale." data-dcnode-id="783" data-media-type="image/jpeg" id="9" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/255302965f27a822a6a04086a91d0e53e2826804&amp;raw"><span data-dcnode-id="782" instrument_node="">
</span></span><span data-dcnode-id="780" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="759"><span data-dcnode-id="778" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Figure </span></span><span data-dcnode-id="775" instrument_node="">
</span><span class="os-number" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">6.10</span></span><span data-dcnode-id="772" instrument_node="">
</span><span class="os-divider" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node=""> </span></span><span data-dcnode-id="769" instrument_node="">
</span><span class="os-title" data-dcnode-id="767" data-type="title" id="8"><span data-dcnode-id="768" instrument_node="">George Ellery Hale (1868–1938).</span></span><span data-dcnode-id="766" instrument_node="">
</span><span class="os-divider" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node=""> </span></span><span data-dcnode-id="763" instrument_node="">
</span><span class="os-caption" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Hale’s work led to the construction of several major telescopes, including the 40-inch refracting telescope at Yerkes Observatory, and three reflecting telescopes: the 60-inch Hale and 100-inch Hooker telescopes at Mount Wilson Observatory, and the 200-inch Hale Telescope at Palomar Observatory.</span></span><span data-dcnode-id="760" instrument_node="">
</span></div><span data-dcnode-id="758" instrument_node="">
</span></div><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="751" id="fs-id1167470964182"><span data-dcnode-id="755" instrument_node="">Hale’s training and early research were in solar physics. In 1892, at age 24, he was named associate professor of astral physics and director of the astronomical observatory at the University of Chicago. At the time, the largest telescope in the world was the 36-inch refractor at the Lick Observatory near San Jose, California. Taking advantage of an existing glass blank for a 40-inch telescope, Hale set out to raise money for a larger telescope than the one at Lick. One prospective donor was Charles T. </span><span class="no-emphasis" data-dcnode-id="753" data-type="term" group-by="Y" id="term256"><span data-dcnode-id="754" instrument_node="">Yerkes</span></span><span data-dcnode-id="752" instrument_node="">, who, among other things, ran the trolley system in Chicago.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="745" id="fs-id1167470693304"><span data-dcnode-id="749" instrument_node="">Hale wrote to Yerkes, encouraging him to support the construction of the giant telescope by saying that “the donor could have no more enduring monument. It is certain that Mr. Lick’s name would not have been nearly so widely known today were it not for the famous observatory established as a result of his munificence.” Yerkes agreed, and the new telescope was completed in May 1897; it remains the largest refractor in the world (</span><a class="autogenerated-content" data-dcnode-id="747" href="#OSC_Astro_06_04_Yerkes"><span data-dcnode-id="748" instrument_node="">Figure 6.11</span></a><span data-dcnode-id="746" instrument_node="">).</span></p><span data-dcnode-id="744" instrument_node="">
</span><div class="os-figure" data-dcnode-id="715" id="OSC_Astro_06_04_Yerkes"><figure data-dcnode-id="737" data-id="OSC_Astro_06_04_Yerkes"><span data-dcnode-id="743" instrument_node="">
</span><span data-alt="Photograph of the 40-inch refracting telescope at Yerkes Observatory." data-dcnode-id="739" data-type="media" id="fs-id1167470755909"><span data-dcnode-id="742" instrument_node="">
</span><img alt="Photograph of the 40-inch refracting telescope at Yerkes Observatory." data-dcnode-id="741" data-media-type="image/jpeg" id="11" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/b819096a2f9ad2e9c1bccc3efaff5c0674aa81b5&amp;raw"><span data-dcnode-id="740" instrument_node="">
</span></span><span data-dcnode-id="738" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="717"><span data-dcnode-id="736" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Figure </span></span><span data-dcnode-id="733" instrument_node="">
</span><span class="os-number" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">6.11</span></span><span data-dcnode-id="730" instrument_node="">
</span><span class="os-divider" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node=""> </span></span><span data-dcnode-id="727" instrument_node="">
</span><span class="os-title" data-dcnode-id="725" data-type="title" id="10"><span data-dcnode-id="726" instrument_node="">World’s Largest Refractor.</span></span><span data-dcnode-id="724" instrument_node="">
</span><span class="os-divider" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node=""> </span></span><span data-dcnode-id="721" instrument_node="">
</span><span class="os-caption" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">The Yerkes 40-inch (1-meter) telescope.</span></span><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712" id="fs-id1167470902350"><span data-dcnode-id="713" instrument_node="">Even before the completion of the Yerkes refractor, Hale was not only dreaming of building a still larger telescope but was also taking concrete steps to achieve that goal. In the 1890s, there was a major controversy about the relative quality of refracting and reflecting telescopes. Hale realized that 40 inches was close to the maximum feasible aperture for refracting telescopes. If telescopes with significantly larger apertures were to be built, they would have to be reflecting telescopes.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709" id="fs-id1167470627091"><span data-dcnode-id="710" instrument_node="">Using funds borrowed from his own family, Hale set out to construct a 60-inch reflector. For a site, he left the Midwest for the much better conditions on Mount Wilson—at the time, a wilderness peak above the small city of Los Angeles. In 1904, at the age of 36, Hale received funds from the Carnegie Foundation to establish the Mount Wilson Observatory. The 60-inch mirror was placed in its mount in December 1908.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703" id="fs-id1167470702320"><span data-dcnode-id="707" instrument_node="">Two years earlier, in 1906, Hale had already approached John D. Hooker, who had made his fortune in hardware and steel pipe, with a proposal to build a 100-inch telescope. The technological risks were substantial. The 60-inch telescope was not yet complete, and the usefulness of large reflectors for astronomy had yet to be demonstrated. George Ellery Hale’s brother called him “the greatest gambler in the world.” Once again, Hale successfully obtained funds, and the 100-inch telescope was completed in November 1917. (It was with this telescope that Edwin </span><span class="no-emphasis" data-dcnode-id="705" data-type="term" group-by="H" id="term257"><span data-dcnode-id="706" instrument_node="">Hubble</span></span><span data-dcnode-id="704" instrument_node=""> was able to establish that the spiral nebulae were separate islands of stars—or galaxies—quite removed from our own Milky Way.)</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697" id="fs-id1167470758768"><span data-dcnode-id="701" instrument_node="">Hale was not through dreaming. In 1926, he wrote an article in </span><em data-dcnode-id="699" data-effect="italics"><span data-dcnode-id="700" instrument_node="">Harper’s Magazine</span></em><span data-dcnode-id="698" instrument_node=""> about the scientific value of a still larger telescope. This article came to the attention of the Rockefeller Foundation, which granted $6 million for the construction of a 200-inch telescope. Hale died in 1938, but the 200-inch (5-meter) telescope on Palomar Mountain was dedicated 10 years later and is now named in Hale’s honor.</span></p><span data-dcnode-id="696" instrument_node="">
</span></div></section></div><span data-dcnode-id="692" instrument_node="">
</span></section><span data-dcnode-id="690" instrument_node="">
</span><section data-dcnode-id="593" data-depth="1" id="fs-id1167471053079"><h3 data-dcnode-id="688" data-type="title"><span data-dcnode-id="689" instrument_node="">Picking the Best Observing Sites</span></h3><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685" id="fs-id1167470771707"><span data-dcnode-id="686" instrument_node="">A telescope like the Gemini or Keck telescope costs about $100 million to build. That kind of investment demands that the telescope be placed in the best possible site. Since the end of the nineteenth century, astronomers have realized that the best observatory sites are on mountains, far from the lights and pollution of cities. Although a number of urban observatories remain, especially in the large cities of Europe, they have become administrative centers or museums. The real action takes place far away, often on desert mountains or isolated peaks in the Atlantic and Pacific Oceans, where we find the staff’s living quarters, computers, electronic and machine shops, and of course the telescopes themselves. A large observatory today requires a supporting staff of 20 to 100 people in addition to the astronomers.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682" id="fs-id1167470689136"><span data-dcnode-id="683" instrument_node="">The performance of a telescope is determined not only by the size of its mirror but also by its location. Earth’s atmosphere, so vital to life, presents challenges for the observational astronomer. In at least four ways, our air imposes limitations on the usefulness of telescopes:</span></p><span data-dcnode-id="681" instrument_node="">
</span><ol data-dcnode-id="661" id="fs-id1167470623385" type="1"><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The most obvious limitation is weather conditions such as clouds, wind, and rain. At the best sites, the weather is clear as much as 75% of the time.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Even on a clear night, the atmosphere filters out a certain amount of starlight, especially in the infrared, where the absorption is due primarily to water vapor. Astronomers therefore prefer dry sites, generally found at high altitudes.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">The sky above the telescope should be dark. Near cities, the air scatters the glare from lights, producing an illumination that hides the faintest stars and limits the distances that can be probed by telescopes. (Astronomers call this effect </span><span data-dcnode-id="671" data-type="term" group-by="l" id="term258"><span data-dcnode-id="672" instrument_node="">light pollution</span></span><span data-dcnode-id="670" instrument_node="">.) Observatories are best located at least 100 miles from the nearest large city.</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Finally, the air is often unsteady; light passing through this turbulent air is disturbed, resulting in blurred star images. Astronomers call these effects “bad </span><span data-dcnode-id="665" data-type="term" group-by="s" id="term259"><span data-dcnode-id="666" instrument_node="">seeing</span></span><span data-dcnode-id="664" instrument_node="">.” When seeing is bad, images of celestial objects are distorted by the constant twisting and bending of light rays by turbulent air.</span></li><span data-dcnode-id="662" instrument_node="">
</span></ol><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="655" id="fs-id1167470680693"><span data-dcnode-id="659" instrument_node="">The best observatory sites are therefore high, dark, and dry. The world’s largest telescopes are found in such remote mountain locations as the Andes Mountains of Chile (</span><a class="autogenerated-content" data-dcnode-id="657" href="#OSC_Astro_06_02_Drysite"><span data-dcnode-id="658" instrument_node="">Figure 6.12</span></a><span data-dcnode-id="656" instrument_node="">), the desert peaks of Arizona, the Canary Islands in the Atlantic Ocean, and Maunakea in Hawaii, a dormant volcano with an altitude of 13,700 feet (4200 meters).</span></p><span data-dcnode-id="654" instrument_node="">
</span><div class="astronomy link-to-learning ui-has-child-title" data-dcnode-id="625" data-type="note" id="fs-id1167470602139"><header data-dcnode-id="648"><h3 class="os-title" data-dcnode-id="649" data-type="title"><span data-dcnode-id="653" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Link to Learning</span></span><span data-dcnode-id="650" instrument_node="">
</span></h3></header><section data-dcnode-id="626"><span data-dcnode-id="647" instrument_node="">
</span><div class="os-note-body" data-dcnode-id="627"><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="629" id="fs-id1167470549450"><span data-dcnode-id="645" instrument_node="">Light pollution is a problem not just for professional astronomers but for everyone who wants to enjoy the beauty of the night sky. In addition research is now showing that it can disrupt the life cycle of animals with whom we share the urban and suburban landscape. And the light wasted shining into the sky leads to unnecessary municipal expenses and use of fossil fuels. Concerned people have formed an organization, the International Dark-Sky Association, whose </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/l/30IntDSA" rel="noopener nofollow" target="_blank"><span data-dcnode-id="644" instrument_node="">website</span></a><span data-dcnode-id="642" instrument_node=""> is full of good information. A citizen science project called </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/l/30GlbatNght" rel="noopener nofollow" target="_blank"><em data-dcnode-id="640" data-effect="italics"><span data-dcnode-id="641" instrument_node="">Globe at Night</span></em></a><span data-dcnode-id="638" instrument_node=""> allows you to measure the light levels in your community by counting stars and to compare it to others around the world. Recently, a new threat to dark skies has emerged. A number of commercial companies are planning and launching large swarms of satellites into low-Earth orbit to provide internet access around the world. Unfortunately, these satellites reflect sunlight and have already begun to ruin astronomical photographs the world over. See the </span><a data-dcnode-id="636" data-page-fragment="fs-id1167470964084" data-page-slug="6-for-further-exploration" data-page-uuid="94b32e09-6550-5449-bb47-295534061a48" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/books/astronomy/pages/6-for-further-exploration"><span data-dcnode-id="637" instrument_node="">Further Exploration</span></a><span data-dcnode-id="635" instrument_node=""> section at the end of this chapter for more resources on this topic. If you get interested in this topic and want to do a paper for your astronomy course or another course while you are in college, the </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/l/30DNSGuide" rel="noopener nofollow" target="_blank"><em data-dcnode-id="633" data-effect="italics"><span data-dcnode-id="634" instrument_node="">Dark Night Skies</span></em><span data-dcnode-id="632" instrument_node=""> guide</span></a><span data-dcnode-id="630" instrument_node=""> can point you to a variety of resources on the topic.</span></p><span data-dcnode-id="628" instrument_node="">
</span></div></section></div><span data-dcnode-id="624" instrument_node="">
</span><div class="os-figure" data-dcnode-id="595" id="OSC_Astro_06_02_Drysite"><figure data-dcnode-id="617" data-id="OSC_Astro_06_02_Drysite"><span data-dcnode-id="623" instrument_node="">
</span><span data-alt="Photograph of four telescope buildings of the European Southern Observatory’s Very Large Telescope array, taken at night. In the distance, the building holding VISTA is visible." data-dcnode-id="619" data-type="media" id="fs-id1167470890407"><span data-dcnode-id="622" instrument_node="">
</span><img alt="Photograph of four telescope buildings of the European Southern Observatory’s Very Large Telescope array, taken at night. In the distance, the building holding VISTA is visible." data-dcnode-id="621" data-media-type="image/jpeg" id="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/c3ab015a8bd6ff0b5a2d74a95caaa6b6e1499020&amp;raw"><span data-dcnode-id="620" instrument_node="">
</span></span><span data-dcnode-id="618" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="597"><span data-dcnode-id="616" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Figure </span></span><span data-dcnode-id="613" instrument_node="">
</span><span class="os-number" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">6.12</span></span><span data-dcnode-id="610" instrument_node="">
</span><span class="os-divider" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node=""> </span></span><span data-dcnode-id="607" instrument_node="">
</span><span class="os-title" data-dcnode-id="605" data-type="title" id="12"><span data-dcnode-id="606" instrument_node="">High and Dry Site.</span></span><span data-dcnode-id="604" instrument_node="">
</span><span class="os-divider" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node=""> </span></span><span data-dcnode-id="601" instrument_node="">
</span><span class="os-caption" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Cerro Paranal, a mountain summit 2.7 kilometers above sea level in Chile’s Atacama Desert, is the site of the European Southern Observatory’s Very Large Telescope. This photograph shows the four 8-meter telescope buildings on the site and vividly illustrates that astronomers prefer high, dry sites for their instruments. The 4.1-meter Visible and Infrared Survey Telescope for Astronomy (VISTA) can be seen in the distance on the next mountain peak. (credit: ESO)</span></span><span data-dcnode-id="598" instrument_node="">
</span></div><span data-dcnode-id="596" instrument_node="">
</span></div><span data-dcnode-id="594" instrument_node="">
</span></section><span data-dcnode-id="592" instrument_node="">
</span><section data-dcnode-id="493" data-depth="1" id="fs-id1167470941611"><h3 data-dcnode-id="590" data-type="title"><span data-dcnode-id="591" instrument_node="">The Resolution of a Telescope</span></h3><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584" id="fs-id1167470615699"><span data-dcnode-id="588" instrument_node="">In addition to gathering as much light as they can, astronomers also want to have the sharpest images possible. </span><span data-dcnode-id="586" data-type="term" group-by="R" id="term260"><span data-dcnode-id="587" instrument_node="">Resolution</span></span><span data-dcnode-id="585" instrument_node=""> refers to the precision of detail present in an image: that is, the smallest features that can be distinguished. Astronomers are always eager to make out more detail in the images they study, whether they are following the weather on Jupiter or trying to peer into the violent heart of a “cannibal galaxy” that recently ate its neighbor for lunch.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581" id="fs-id1167471052433"><span data-dcnode-id="582" instrument_node="">One factor that determines how good the resolution will be is the size of the telescope. Larger apertures produce sharper images. Until very recently, however, visible-light and infrared telescopes on Earth’s surface could not produce images as sharp as the theory of light said they should.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578" id="fs-id1167471084189"><span data-dcnode-id="579" instrument_node="">The problem—as we saw earlier in this chapter—is our planet’s atmosphere, which is turbulent. It contains many small-scale blobs or cells of gas that range in size from inches to several feet. Each cell has a slightly different temperature from its neighbor, and each cell acts like a lens, bending (refracting) the path of the light by a small amount. This bending slightly changes the position where each light ray finally reaches the detector in a telescope. The cells of air are in motion, constantly being blown through the light path of the telescope by winds, often in different directions at different altitudes. As a result, the path followed by the light is constantly changing.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575" id="fs-id1167470709434"><span data-dcnode-id="576" instrument_node="">For an analogy, think about watching a parade from a window high up in a skyscraper. You decide to throw some confetti down toward the marchers. Even if you drop a handful all at the same time and in the same direction, air currents will toss the pieces around, and they will reach the ground at different places. As we described earlier, we can think of the light from the stars as a series of parallel beams, each making its way through the atmosphere. Each path will be slightly different, and each will reach the detector of the telescope at a slightly different place. The result is a blurred image, and because the cells are being blown by the wind, the nature of the blur will change many times each second. You have probably noticed this effect as the “twinkling” of stars seen from Earth. The light beams are bent enough that part of the time they reach your eye, and part of the time some of them miss, thereby making the star seem to vary in brightness. In space, however, the light of the stars is steady.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572" id="fs-id1167470679458"><span data-dcnode-id="573" instrument_node="">Astronomers search the world for locations where the amount of atmospheric blurring, or turbulence, is as small as possible. It turns out that the best sites are in coastal mountain ranges and on isolated volcanic peaks in the middle of an ocean. Air that has flowed long distances over water before it encounters land is especially stable.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566" id="fs-id1167470632380"><span data-dcnode-id="570" instrument_node="">The resolution of an image is measured in units of angle on the sky, typically in units of arcseconds. One arcsecond is 1/3600 degree, and there are 360 degrees in a full circle. So we are talking about tiny angles on the sky. To give you a sense of just how tiny, we might note that 1 arcsecond is how big a quarter would look when seen from a distance of 5 kilometers. The best images obtained from the ground with traditional techniques reveal details as small as several tenths of an arcsecond across. This image size is remarkably good. One of the main reasons for launching the </span><span class="no-emphasis" data-dcnode-id="568" data-type="term" group-by="H" id="term261"><span data-dcnode-id="569" instrument_node="">Hubble Space Telescope</span></span><span data-dcnode-id="567" instrument_node=""> was to escape Earth’s atmosphere and obtain even sharper images.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="557" id="fs-id1167470614614"><span data-dcnode-id="564" instrument_node="">But since we can’t put every telescope into space, astronomers have devised a technique called </span><span data-dcnode-id="562" data-type="term" group-by="a" id="term262"><span data-dcnode-id="563" instrument_node="">adaptive optics</span></span><span data-dcnode-id="561" instrument_node=""> that can beat Earth’s atmosphere at its own game of blurring. This technique (which is most effective in the infrared region of the spectrum with our current technology) makes use of a small flexible mirror placed in the beam of a telescope. A sensor measures how much the atmosphere has distorted the image, and as often as 500 times per second, it sends instructions to the flexible mirror on how to change shape in order to compensate for distortions produced by the atmosphere. The light is thus brought back to an almost perfectly sharp focus at the detector. </span><a class="autogenerated-content" data-dcnode-id="559" href="#OSC_Astro_06_02_Adaptive"><span data-dcnode-id="560" instrument_node="">Figure 6.13</span></a><span data-dcnode-id="558" instrument_node=""> shows just how effective this technique is. With adaptive optics, ground-based telescopes can achieve resolutions of 0.1 arcsecond or a little better in the infrared region of the spectrum. This impressive figure is the equivalent of the resolution that the Hubble Space Telescope achieves in the visible-light region of the spectrum.</span></p><span data-dcnode-id="556" instrument_node="">
</span><div class="os-figure" data-dcnode-id="524" id="OSC_Astro_06_02_Adaptive"><figure data-dcnode-id="549" data-id="OSC_Astro_06_02_Adaptive"><span data-dcnode-id="555" instrument_node="">
</span><span data-alt="Image of the planet Jupiter taken in infrared light with adaptive optics with the Very Large Telescope in Chile. This high resolution image shows cloud details on Jupiter that rival those taken by the Hubble Space Telescope in Earth orbit." data-dcnode-id="551" data-type="media" id="fs-id1167470699459"><span data-dcnode-id="554" instrument_node="">
</span><img alt="Image of the planet Jupiter taken in infrared light with adaptive optics with the Very Large Telescope in Chile. This high resolution image shows cloud details on Jupiter that rival those taken by the Hubble Space Telescope in Earth orbit." data-dcnode-id="553" data-media-type="image/jpeg" id="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openstax.org/apps/archive/20220325.143432/resources/9148fb184c8934a32fa6957295c52b783d1169ee&amp;raw"><span data-dcnode-id="552" instrument_node="">
</span></span><span data-dcnode-id="550" instrument_node="">
</span></figure><div class="os-caption-container" data-dcnode-id="526"><span data-dcnode-id="548" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Figure </span></span><span data-dcnode-id="545" instrument_node="">
</span><span class="os-number" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">6.13</span></span><span data-dcnode-id="542" instrument_node="">
</span><span class="os-divider" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node=""> </span></span><span data-dcnode-id="539" instrument_node="">
</span><span class="os-title" data-dcnode-id="537" data-type="title" id="14"><span data-dcnode-id="538" instrument_node="">Power of Adaptive Optics.</span></span><span data-dcnode-id="536" instrument_node="">
</span><span class="os-divider" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node=""> </span></span><span data-dcnode-id="533" instrument_node="">
</span><span class="os-caption" data-dcnode-id="528"><span data-dcnode-id="532" instrument_node="">One of the clearest pictures of </span><span class="no-emphasis" data-dcnode-id="530" data-type="term" group-by="J" id="term263"><span data-dcnode-id="531" instrument_node="">Jupiter</span></span><span data-dcnode-id="529" instrument_node=""> ever taken from the ground, this image was produced with adaptive optics using an 8-meter-diameter telescope at the Very Large Telescope in Chile. Adaptive optics uses infrared wavelengths to remove atmospheric blurring, resulting in a much clearer image. (credit: modification of work by ESO, F.Marchis, M.Wong (UC Berkeley); E.Marchetti, P.Amico, S.Tordo (ESO))</span></span><span data-dcnode-id="527" instrument_node="">
</span></div><span data-dcnode-id="525" instrument_node="">
</span></div><span data-dcnode-id="523" instrument_node="">
</span><div class="astronomy astronomy-basics ui-has-child-title" data-dcnode-id="495" data-type="note" id="fs-id1167470881216"><header data-dcnode-id="517"><h3 class="os-title" data-dcnode-id="518" data-type="title"><span data-dcnode-id="522" instrument_node="">
</span><span class="os-title-label" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Astronomy Basics</span></span><span data-dcnode-id="519" instrument_node="">
</span></h3></header><section data-dcnode-id="496"><span data-dcnode-id="516" instrument_node="">
</span><div class="os-note-body" data-dcnode-id="497"><h4 class="os-subtitle" data-dcnode-id="511" data-type="title" id="16"><span data-dcnode-id="515" instrument_node="">
</span><span class="os-subtitle-label" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">How Astronomers Really Use Telescopes</span></span><span data-dcnode-id="512" instrument_node="">
</span></h4><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508" id="fs-id1167470602154"><span data-dcnode-id="509" instrument_node="">In the popular view (and some bad movies), an astronomer spends most nights in a cold observatory peering through a telescope, but this is not very accurate today. Most astronomers do not live at observatories, but near the universities or laboratories where they work. An astronomer might spend only a week or so each year observing at the telescope and the rest of the time measuring or analyzing the data acquired from large project collaborations and dedicated surveys. Many astronomers use radio telescopes for space experiments, which work just as well during the daylight hours. Still others work at purely theoretical problems using supercomputers and never observe at a telescope of any kind.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505" id="fs-id1167470675776"><span data-dcnode-id="506" instrument_node="">Even when astronomers are observing with large telescopes, they seldom peer through them. Electronic detectors permanently record the data for detailed analysis later. At some observatories, observations may be made remotely, with the astronomer sitting at a computer thousands of miles away from the telescope.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502" id="fs-id1167470666308"><span data-dcnode-id="503" instrument_node="">Time on major telescopes is at a premium, and an observatory director will typically receive many more requests for telescope time than can be accommodated during the year. Astronomers must therefore write a convincing proposal explaining how they would like to use the telescope and why their observations will be important to the progress of astronomy. A committee of astronomers is then asked to judge and rank the proposals, and time is assigned only to those with the greatest merit. Even if your proposal is among the high-rated ones, you may have to wait many months for your turn. If the skies are cloudy on the nights you have been assigned, it may be more than a year before you get another chance.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499" id="fs-id1167470623939"><span data-dcnode-id="500" instrument_node="">Some older astronomers still remember long, cold nights spent alone in an observatory dome, with only music from a tape recorder or an all-night radio station for company. The sight of the stars shining brilliantly hour after hour through the open slit in the observatory dome was unforgettable. So, too, was the relief as the first pale light of dawn announced the end of a 12-hour observation session. Astronomy is much easier today, with teams of observers working together, often at their computers, in a warm room. Those who are more nostalgic, however, might argue that some of the romance has gone from the field, too.</span></p><span data-dcnode-id="498" instrument_node="">
</span></div></section></div><span data-dcnode-id="494" instrument_node="">
</span></section><span data-dcnode-id="492" instrument_node="">
