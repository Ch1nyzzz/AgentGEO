</span><figure class="wp-caption alignnone" data-dcnode-id="1448"><span data-dcnode-id="1451" instrument_node="">
</span><img alt="" class="attachment-full size-full wp-post-image" data-dcnode-id="1450" height="742" loading="lazy" sizes="(max-width: 990px) 100vw, 990px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intercelestial.com/wp-content/uploads/2017/12/galileo-telescope.jpg&amp;raw" srcset="https://intercelestial.com/wp-content/uploads/2017/12/galileo-telescope.jpg 990w, https://intercelestial.com/wp-content/uploads/2017/12/galileo-telescope-300x225.jpg 300w, https://intercelestial.com/wp-content/uploads/2017/12/galileo-telescope-768x576.jpg 768w, https://intercelestial.com/wp-content/uploads/2017/12/galileo-telescope-780x585.jpg 780w" title="galileo telescope" width="990"><span data-dcnode-id="1449" instrument_node="">
</span></figure><span data-dcnode-id="1447" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1429"><span data-dcnode-id="1446" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1444" itemprop="headline"><span data-dcnode-id="1445" instrument_node="">The Galilean Glasses</span></h1><span data-dcnode-id="1443" instrument_node=""> </span><span class="byline" data-dcnode-id="1437"><span data-dcnode-id="1442" instrument_node=""> By </span><span class="entry-author vcard" data-dcnode-id="1438" itemprop="author" itemscope="itemscope" itemtype="http://schema.org/person"><a class="url fn n" data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intercelestial.com/author/Enigma/" itemprop="url" title="Permalink to: Enigma"><span data-dcnode-id="1440" itemprop="name"><span data-dcnode-id="1441" instrument_node="">Enigma</span></span></a></span></span><span class="posted-on" data-dcnode-id="1433"><span data-dcnode-id="1436" instrument_node="">Posted on </span><time class="entry-date published updated" data-dcnode-id="1434" datetime="2017-12-24T10:30:46+00:00" itemprop="dateModified"><span data-dcnode-id="1435" instrument_node="">December 24, 2017</span></time></span><span class="gmr-view" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">6,129,673 views</span></span><span data-dcnode-id="1430" instrument_node=""> </span></header><span data-dcnode-id="1427" instrument_node="">
</span><div class="entry-content entry-content-single" data-dcnode-id="1356" itemprop="text"><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">At the same time, Galileo turned his “optical tube” to the sky and invented the telescope. She was growing 30 times. He improved the definition of the movement of bodies in space, developing the concept of inertia. This notion allowed him to explain the movement of a mass in the field of gravity. Though a follower of Aristotle’s natural philosophy, he considered that bodies were not naturally at rest.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">In his eyes, rest was not the end of the movement. The bodies were at rest only in relation to other animated bodies of the same speed.</span></p><div class="soractrl" data-dcnode-id="1415"><div data-dcnode-id="1416" id="intercelestial-com_336x280"><span data-dcnode-id="1420" instrument_node="">
</span><span data-dcnode-id="1417" instrument_node="">
</span></div></div><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">But Galileo could not explain the fundamental reason for the movement of bodies and the relative displacement of objects. He explained the changes in positions as the result of an “efficient” cause, an idea faithful to the school of Aristotle.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">By observing the phases of Venus and the other planets Galileo managed to confirm the heliocentric system of Copernicus. He discovered the sunspots, the satellites of Jupiter, the relief of the Moon and the fact that the Milky Way consisted of myriads of stars. But as everyone knows, his discoveries were against the doctrine of the Church and led Galileo before the Inquisition … [11]</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">In his Paradise Lost, John Milton [12] who lived in Galileo’s day, translated the impression that every observer feels when he observes the sky for the first time through a telescope: “Before their eyes suddenly appear the secrets from the old Abyss, a dark, boundless, dimensionless ocean, where length, breadth and depth, time and space are lost. ” The effect that Galileo’s telescope has on his contemporaries is a wonderful reflection of the sensations we experience in our turn, when this reality is separated from its subject by a temporal chasm of more than three centuries.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><figure aria-describedby="caption-attachment-272" class="wp-caption aligncenter" data-dcnode-id="1401" id="attachment_272" style="width: 547px"><img alt="" class="wp-image-272 size-full" data-dcnode-id="1404" height="200" loading="lazy" sizes="(max-width: 547px) 100vw, 547px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//intercelestial.com/wp-content/uploads/2017/12/galileo1-horz.jpg&amp;raw" srcset="https://intercelestial.com/wp-content/uploads/2017/12/galileo1-horz.jpg 547w, https://intercelestial.com/wp-content/uploads/2017/12/galileo1-horz-300x110.jpg 300w" width="547"><figcaption class="wp-caption-text" data-dcnode-id="1402" id="caption-attachment-272"><span data-dcnode-id="1403" instrument_node="">On the left and in the center, Galileo pacing the sky and its famous astronomical telescope exposed to the Museo Galileo. On the right, Galileo explaining his discoveries to two cardinals. Gouache painting on 26×22.9 cm paper made by Belgian illustrator Jean-Léon Huens commissioned by the National Geographic Society for its May 1974 edition.</span></figcaption></figure><span data-dcnode-id="1400" instrument_node="">
