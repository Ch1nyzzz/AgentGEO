</span></div><span class="marker before-article" data-dcnode-id="1606"></span><div class="md-sentinel--spy-target" data-dcnode-id="1605"></div><section data-dcnode-id="1485" data-has-spy="true" data-level="1" id="ref1"><p class="topic-paragraph" data-dcnode-id="1594"><strong data-dcnode-id="1602"><span data-dcnode-id="1604" id="ref481086"></span><span data-dcnode-id="1603" instrument_node="">telescope</span></strong><span data-dcnode-id="1601" instrument_node="">,  device used to form magnified images of distant objects. The telescope is undoubtedly the most important investigative tool in </span><a class="md-crosslink" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/astronomy"><span data-dcnode-id="1600" instrument_node="">astronomy</span></a><span data-dcnode-id="1598" instrument_node="">. It provides a means of collecting and analyzing radiation from celestial objects, even those in the far reaches of the </span><a class="md-crosslink" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/universe"><span data-dcnode-id="1597" instrument_node="">universe</span></a><span data-dcnode-id="1595" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1592"></span><span class="marker AM1 am-inline" data-dcnode-id="1590"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1588"></span><p class="topic-paragraph" data-dcnode-id="1552"><span data-dcnode-id="1587" id="ref481081"></span><a class="md-crosslink" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Galileo-Galilei"><span data-dcnode-id="1586" instrument_node="">Galileo</span></a><span data-dcnode-id="1584" instrument_node=""> revolutionized astronomy when he applied the </span><span data-dcnode-id="1583" id="ref481082"></span><a class="md-crosslink" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/Galilean-telescope"><span data-dcnode-id="1582" instrument_node="">telescope</span></a><span data-dcnode-id="1580" instrument_node=""> to the study of extraterrestrial bodies in the early 17th century. Until then, magnification instruments had never been used for this purpose. Since Galileo’s pioneering work, increasingly more powerful optical telescopes have been developed, as has a wide array of instruments capable of detecting and measuring radiation in every region of the </span><a class="md-crosslink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/electromagnetic-spectrum"><span data-dcnode-id="1579" instrument_node="">electromagnetic spectrum</span></a><span data-dcnode-id="1577" instrument_node="">. Observational capability has been further </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1575" data-term="enhanced" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/enhanced"><span data-dcnode-id="1576" instrument_node="">enhanced</span></a><span data-dcnode-id="1574" instrument_node=""> by the invention of various kinds of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1572" data-term="auxiliary" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/auxiliary"><span data-dcnode-id="1573" instrument_node="">auxiliary</span></a><span data-dcnode-id="1571" instrument_node=""> instruments (e.g., the </span><a class="md-crosslink" data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/camera"><span data-dcnode-id="1570" instrument_node="">camera</span></a><span data-dcnode-id="1568" instrument_node="">, spectrograph, and </span><a class="md-crosslink" data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/CCD"><span data-dcnode-id="1567" instrument_node="">charge-coupled device</span></a><span data-dcnode-id="1565" instrument_node="">) and by the use of electronic </span><a class="md-crosslink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/computer"><span data-dcnode-id="1564" instrument_node="">computers</span></a><span data-dcnode-id="1562" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/rocket-jet-propulsion-device-and-vehicle"><span data-dcnode-id="1561" instrument_node="">rockets</span></a><span data-dcnode-id="1559" instrument_node="">, and spacecraft in conjunction with telescope systems. These developments have contributed dramatically to advances in scientific knowledge about the </span><a class="md-crosslink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1558" instrument_node="">solar system</span></a><span data-dcnode-id="1556" instrument_node="">, the </span><a class="md-crosslink" data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Milky-Way-Galaxy"><span data-dcnode-id="1555" instrument_node="">Milky Way Galaxy</span></a><span data-dcnode-id="1553" instrument_node="">, and the universe as a whole.</span></p><span class="marker p2" data-dcnode-id="1550"></span><div class="assemblies" data-dcnode-id="1535"><div class="w-100" data-dcnode-id="1536"><figure class="md-assembly card print-false" data-assembly-id="2916" data-dcnode-id="1537"><div class="md-assembly-wrapper card-media" data-dcnode-id="154 </span></a><span class="marker MOD2 mod-inline" data-dcnode-id="1506"></span><p class="topic-paragraph" data-dcnode-id="1492"><span data-dcnode-id="1505" instrument_node="">This article describes the operating principles and historical development of optical telescopes. For explanation of instruments that operate in other portions of the electromagnetic spectrum, </span><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">see</span></em><span data-dcnode-id="1502" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/radio-telescope"><span data-dcnode-id="1501" instrument_node="">radio telescope</span></a><span data-dcnode-id="1499" instrument_node="">; </span><a class="md-crosslink" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/X-ray-telescope"><span data-dcnode-id="1498" instrument_node="">X-ray telescope</span></a><span data-dcnode-id="1496" instrument_node="">; and </span><a class="md-crosslink" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/gamma-ray-telescope"><span data-dcnode-id="1495" instrument_node="">gamma-ray telescope</span></a><span data-dcnode-id="1493" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="1490"></span><span class="marker AM3 am-inline" data-dcnode-id="1488"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1486"></span></section><span data-dcnode-id="1484" instrument_node=""> </span><span class="marker h2" data-dcnode-id="1482"></span><div class="md-sentinel--spy-target" data-dcnode-id="1481"></div><section data-dcnode-id="1290" data-has-spy="true" data-level="1" id="ref44206"><h2 class="h1" data-dcnode-id="1477"><span data-dcnode-id="1480" id="ref481087"></span><a class="md-crosslink" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/refracting-telescope"><span data-dcnode-id="1479" instrument_node="">Refracting telescopes</span></a></h2><span data-dcnode-id="1476" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1412"><span data-dcnode-id="1475" instrument_node="">Commonly known as refractors, telescopes of this kind are typically used to examine the </span><a class="md-crosslink" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/moon-natural-satellite"><span data-dcnode-id="1474" instrument_node="">Moon</span></a><span data-dcnode-id="1472" instrument_node="">, other objects of the </span><a class="md-crosslink" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/solar-system"><span data-dcnode-id="1471" instrument_node="">solar system</span></a><span data-dcnode-id="1469" instrument_node=""> such as </span><a class="md-crosslink" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Jupiter-planet"><span data-dcnode-id="1468" instrument_node="">Jupiter</span></a><span data-dcnode-id="1466" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mars-planet"><span data-dcnode-id="1465" instrument_node="">Mars</span></a><span data-dcnode-id="1463" instrument_node="">, and </span><a class="md-crosslink" data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/binary-star"><span data-dcnode-id="1462" instrument_node="">binary stars</span></a><span data-dcnode-id="1460" instrument_node="">. The name </span><em data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">refractor</span></em><span data-dcnode-id="1457" instrument_node=""> is </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1455" data-term="derived" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/derived"><span data-dcnode-id="1456" instrument_node="">derived</span></a><span data-dcnode-id="1454" instrument_node=""> from the term </span><em data-dcnode-id="1450"><span data-dcnode-id="1453" id="ref481088"></span><a class="md-crosslink" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/refraction"><span data-dcnode-id="1452" instrument_node="">refraction</span></a></em><span data-dcnode-id="1449" instrument_node="">, which is the bending of </span><a class="md-crosslink" data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/light"><span data-dcnode-id="1448" instrument_node="">light</span></a><span data-dcnode-id="1446" instrument_node=""> when it passes from one medium to another of different density—e.g., from </span><a class="md-crosslink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/air"><span data-dcnode-id="1445" instrument_node="">air</span></a><span data-dcnode-id="1443" instrument_node=""> to </span><a class="md-crosslink" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/glass"><span data-dcnode-id="1442" instrument_node="">glass</span></a><span data-dcnode-id="1440" instrument_node="">. The glass is referred to as a </span><span data-dcnode-id="1439" id="ref481089"></span><a class="md-crosslink" data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/lens-optics"><span data-dcnode-id="1438" instrument_node="">lens</span></a><span data-dcnode-id="1436" instrument_node=""> and may have one or more components. The physical shape of the components may be convex, concave, or plane-parallel. </span><span class="link-blue media-overlay-link asmref" data-dcnode-id="1434" data-href="/media/1/430495/3701"><span data-dcnode-id="1435" instrument_node="">This diagram</span></span><span data-dcnode-id="1433" instrument_node=""> illustrates the principle of refraction and the term </span><span data-dcnode-id="1432" id="ref481090"></span><a class="md-crosslink" data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/focal-length"><span data-dcnode-id="1431" instrument_node="">focal length</span></a><span data-dcnode-id="1429" instrument_node="">. The </span><span data-dcnode-id="1428" id="ref481091"></span><a class="md-crosslink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/focal-point"><span data-dcnode-id="1427" instrument_node="">focus</span></a><span data-dcnode-id="1425" instrument_node=""> is the point, or plane, at which light rays from infinity converge after passing through a lens and traveling a distance of one focal length. In a refractor the first lens through which light from a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1423" data-term="celestial" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/celestial"><span data-dcnode-id="1424" instrument_node="">celestial</span></a><span data-dcnode-id="1422" instrument_node=""> object passes is called the </span><span data-dcnode-id="1421" id="ref481092"></span><a class="md-crosslink" data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/objective-lens"><span data-dcnode-id="1420" instrument_node="">objective lens</span></a><span data-dcnode-id="1418" instrument_node="">. It should be noted that the light will be inverted at the focal plane. A second lens, referred to as the </span><span data-dcnode-id="1417" id="ref481093"></span><span data-dcnode-id="1416" instrument_node="">eyepiece lens, is placed behind the focal plane and enables the observer to view the enlarged, or magnified, image. Thus, the simplest form of refractor consists of an objective and an eyepiece, as illustrated in </span><span class="link-blue media-overlay-link asmref" data-dcnode-id="1414" data-href="/media/1/430495/3702"><span data-dcnode-id="1415" instrument_node="">the diagram</span></span><span data-dcnode-id="1413" instrument_node="">.</span></p><span class="marker p4" data-dcnode-id="1410"></span><div class="assemblies medialist slider js-slider position-relative d-inline-flex align-items-center mw-100" data-dcnode-id="1361" data-type="other"><div class="slider-container js-slider-container overflow-hidden d-flex rw-slider rw-prev-disabled" data-dcnode-id="1366"><div class="rw-track d-flex align-items-center" data-dcnode-id="1367"><div class="rw-slide col-100 px-20" data-dcnode-id="1396"><figure class="md-assembly card print-false" data-assembly-id="120956" data-dcnode-id="1397"><div class="md-assembly-wrapper card-media" data-dcnode-id="1405" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1406" data-href="/media/1/430495/120956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/51/126351-050-49B6EF61/refractor-Lick-Observatory-Mount-Hamilton-San-Jose.jpg" style="--aspect-ratio: 16/9"><img alt="refractor at Lick Observatory" data-dcnode-id="1409" data-height="533" data-width="800" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/51/126351-050-49B6EF61/refractor-Lick-Observatory-Mount-Hamilton-San-Jose.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1407"><em class="material-icons link-blue" data-dcnode-id="1408" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1398"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1403" data-href="/media/1/430495/120956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/51/126351-050-49B6EF61/refractor-Lick-Observatory-Mount-Hamilton-San-Jose.jpg"><span data-dcnode-id="1404" instrument_node="">refractor at Lick Observatory</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">The historical 91-cm (36-inch) refractor at the Lick Observatory on Mount Hamilton, near San Jose, California, U.S.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">© Joe Mercier/Shutterstock.com</span></cite></figcaption></figure></div><div class="rw-slide col-100 px-20" data-dcnode-id="1382"><figure class="md-assembly card print-false" data-assembly-id="3701" data-dcnode-id="1383"><div class="md-assembly-wrapper card-media" data-dcnode-id="1391" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1392" data-href="/media/1/430495/3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/27/4627-004-E3B847C3/length-lens.jpg" style="--aspect-ratio: 16/9"><img alt="focal length of a lens" data-dcnode-id="1395" data-height="309" data-width="456" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/27/4627-004-E3B847C3/length-lens.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1393"><em class="material-icons link-blue" data-dcnode-id="1394" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1384"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1389" data-href="/media/1/430495/3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/27/4627-004-E3B847C3/length-lens.jpg"><span data-dcnode-id="1390" instrument_node="">focal length of a lens</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Focal length of a lens.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div><div class="rw-slide col-100 px-20" data-dcnode-id="1368"><figure class="md-assembly card print-false" data-assembly-id="3702" data-dcnode-id="1369"><div class="md-assembly-wrapper card-media" data-dcnode-id="1377" data-type="image"><a class="position-relative d-flex align-items-center justify-content-center media-overlay-link card-media" data-dcnode-id="1378" data-href="/media/1/430495/3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/28/4628-004-9CBBDBD2/Refracting-telescope.jpg" style="--aspect-ratio: 16/9"><img alt="refracting telescope" data-dcnode-id="1381" data-height="159" data-width="333" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/28/4628-004-9CBBDBD2/Refracting-telescope.jpg%3Fw%3D690%26h%3D388%26c%3Dcrop&amp;raw"><button aria-label="Zoom in" class="btn btn-circle position-absolute shadow btn-white" data-dcnode-id="1379"><em class="material-icons link-blue" data-dcnode-id="1380" data-icon="zoom_in"></em></button></a></div><figcaption class="card-body" data-dcnode-id="1370"><a class="md-assembly-title font-weight-bold mb-5 d-inline-block font-16 font-sans-serif media-overlay-link" data-dcnode-id="1375" data-href="/media/1/430495/3702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/28/4628-004-9CBBDBD2/Refracting-telescope.jpg"><span data-dcnode-id="1376" instrument_node="">refracting telescope</span></a><div class="md-assembly-caption text-muted font-14 font-serif" data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Refracting telescope.</span></div><cite class="credit d-block mt-5" data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Encyclopædia Britannica, Inc.</span></cite></figcaption></figure></div></div></div><button class="prev-button js-prev-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20 rw-disabled" data-dcnode-id="1364" disabled=""><span class="material-icons" data-dcnode-id="1365" data-icon="keyboard_arrow_left"></span></button><button class="next-button js-next-button position-absolute btn btn-circle shadow btn-lg btn-blue m-20" data-dcnode-id="1362"><span class="material-icons" data-dcnode-id="1363" data-icon="keyboard_arrow_right"></span></button></div><span class="marker AM4 am-inline" data-dcnode-id="1359"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1357"></span><span data-dcnode-id="1356" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1334"><span data-dcnode-id="1355" instrument_node="">The diameter of the objective is referred to as the </span><span data-dcnode-id="1354" id="ref481094"></span><a class="md-crosslink" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/aperture-optics"><span data-dcnode-id="1353" instrument_node="">aperture</span></a><span data-dcnode-id="1351" instrument_node="">; it typically ranges from a few centimetres for small spotting telescopes up to one metre for the largest refractor in existence. The objective, as well as the eyepiece, may have several components. Small spotting telescopes may contain an extra lens behind the eyepiece to erect the image so that it does not appear upside-down. When an object is viewed with a refractor, the image may not appear sharply defined, or it may even have a predominant colour in it. Such distortions, or </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1349" data-term="aberrations" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/aberrations"><span data-dcnode-id="1350" instrument_node="">aberrations</span></a><span data-dcnode-id="1348" instrument_node="">, are sometimes introduced when the lens is polished into its design shape. The major kind of distortion in a refractor is </span><span data-dcnode-id="1347" id="ref481095"></span><a class="md-crosslink" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/chromatic-aberration"><span data-dcnode-id="1346" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="1344" instrument_node="">, which is the failure of the differently coloured light rays to come to a common focus. Chromatic </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1342" data-term="aberration" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/aberration"><span data-dcnode-id="1343" instrument_node="">aberration</span></a><span data-dcnode-id="1341" instrument_node=""> can be minimized by adding components to the objective. In lens-design </span><a class="md-crosslink autoxref" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/technology"><span data-dcnode-id="1340" instrument_node="">technology</span></a><span data-dcnode-id="1338" instrument_node="">, the coefficients of expansion of different kinds of glass are carefully matched to minimize the aberrations that result from </span><a class="md-crosslink" data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/temperature"><span data-dcnode-id="1337" instrument_node="">temperature</span></a><span data-dcnode-id="1335" instrument_node=""> changes of the telescope at night.</span></p><span class="marker p5" data-dcnode-id="1332"></span><span class="marker AM5 am-inline" data-dcnode-id="1330"></span><span class="marker MOD5 mod-inline" data-dcnode-id="1328"></span><span data-dcnode-id="1327" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1297"><span data-dcnode-id="1326" id="ref481096"></span><a class="md-crosslink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/eyepiece"><span data-dcnode-id="1325" instrument_node="">Eyepieces</span></a><span data-dcnode-id="1323" instrument_node="">, which are used with both refractors and reflectors (</span><em data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">see below</span></em><span data-dcnode-id="1320" instrument_node=""> </span><a class="md-crosslink" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/optical-telescope/Reflecting-telescopes%23ref44208"><span data-dcnode-id="1319" instrument_node="">Reflecting telescopes</span></a><span data-dcnode-id="1317" instrument_node="">), have a wide variety of applications and provide observers with the ability to select the </span><span data-dcnode-id="1316" id="ref481097"></span><a class="md-crosslink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/magnification"><span data-dcnode-id="1315" instrument_node="">magnification</span></a><span data-dcnode-id="1313" instrument_node=""> of their instruments. The magnification, sometimes referred to as magnifying power, is determined by dividing the focal length of the objective by the focal length of the eyepiece. For example, if the objective has a focal length of 254 cm (100 inches) and the eyepiece has a focal length of 2.54 cm (1 inch), then the magnification will be 100. Large magnifications are very useful for observing the Moon and the </span><a class="md-crosslink" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/planet"><span data-dcnode-id="1312" instrument_node="">planets</span></a><span data-dcnode-id="1310" instrument_node="">. However, since </span><a class="md-crosslink" data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1309" instrument_node="">stars</span></a><span data-dcnode-id="1307" instrument_node=""> appear as point sources owing to their great distances, magnification provides no additional advantage when viewing them. Another important factor that one must take into </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1305" data-term="consideration" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/consideration"><span data-dcnode-id="1306" instrument_node="">consideration</span></a><span data-dcnode-id="1304" instrument_node=""> when attempting to view at high magnification is the stability of the telescope </span><span data-dcnode-id="1303" id="ref481098"></span><span data-dcnode-id="1302" instrument_node="">mounting. Any vibration in the mounting will also be magnified and may severely reduce the quality of the observed image. Thus, great care is usually taken to provide a stable platform for the telescope. This problem should not be associated with that of atmospheric </span><span data-dcnode-id="1301" id="ref481099"></span><a class="md-crosslink" data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/seeing"><span data-dcnode-id="1300" instrument_node="">seeing</span></a><span data-dcnode-id="1298" instrument_node="">, which may introduce a disturbance to the image because of fluctuating air currents in the path of the light from a celestial or terrestrial object. Generally, most of the seeing disturbance arises in the first 30 metres (100 feet) of air above the telescope. Large telescopes are frequently installed on mountain peaks in order to get above the seeing disturbances.</span></p><span class="marker p6" data-dcnode-id="1295"></span><span class="marker AM6 am-inline" data-dcnode-id="1293"></span><span class="marker MOD6 mod-inline" data-dcnode-id="1291"></span></section><span data-dcnode-id="1289" instrument_node=""> </span><span class="marker end-of-content" data-dcnode-id="1287"></span><span class="marker after-article" data-dcnode-id="1285"></span></div><span data-dcnode-id="1283" instrument_node="">

</span><span class="marker before-article" data-dcnode-id="1267"></span><span class="marker h3" data-dcnode-id="1265"></span><div class="md-sentinel--spy-target" data-dcnode-id="1264"></div><section data-dcnode-id="526" data-has-spy="true" data-level="1" id="ref44207"><h1 class="h1" data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Light gathering and resolution</span></h1><span data-dcnode-id="1260" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1246"><span data-dcnode-id="1259" instrument_node="">The most important of all the powers of an optical telescope is its light-gathering power. This </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1257" data-term="capacity" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/capacity"><span data-dcnode-id="1258" instrument_node="">capacity</span></a><span data-dcnode-id="1256" instrument_node=""> is strictly a function of the diameter of the clear objective—that is, the aperture—of the telescope. Comparisons of different-sized apertures for their light-gathering power are calculated by the ratio of their diameters squared; for example, a 25-cm (10-inch) objective will collect four times the light of a 12.5-cm (5-inch) objective ([25 × 25] ÷ [12.5 × 12.5] = 4). The advantage of collecting more light with a larger-aperture telescope is that one can observe fainter </span><a class="md-crosslink" data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/star-astronomy"><span data-dcnode-id="1255" instrument_node="">stars</span></a><span data-dcnode-id="1253" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/nebula"><span data-dcnode-id="1252" instrument_node="">nebulae</span></a><span data-dcnode-id="1250" instrument_node="">, and very distant </span><a class="md-crosslink" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/galaxy"><span data-dcnode-id="1249" instrument_node="">galaxies</span></a><span data-dcnode-id="1247" instrument_node="">.</span></p><span class="marker p1" data-dcnode-id="1244"></span><span class="marker AM1 am-inline" data-dcnode-id="1242"></span><span class="marker MOD1 mod-inline" data-dcnode-id="1240"></span><span data-dcnode-id="1239" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1219"><span data-dcnode-id="1238" id="ref481100"></span><a class="md-crosslink" data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/resolving-power"><span data-dcnode-id="1237" instrument_node="">Resolving power</span></a><span data-dcnode-id="1235" instrument_node=""> is another important feature of a telescope. This is the ability of the instrument to distinguish clearly between two points whose angular separation is less than the smallest angle that the observer’s eye can resolve. The resolving power of a telescope can be calculated by the following formula: resolving power = 11.25 seconds of arc/</span><em data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">d,</span></em><span data-dcnode-id="1232" instrument_node=""> where </span><em data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">d</span></em><span data-dcnode-id="1229" instrument_node=""> is the </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1227" data-term="diameter" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/diameter"><span data-dcnode-id="1228" instrument_node="">diameter</span></a><span data-dcnode-id="1226" instrument_node=""> of the objective expressed in centimetres. Thus, a 25-cm-diameter objective has a theoretical resolution of 0.45 second of arc and a 250-cm (100-inch) telescope has one of 0.045 second of arc. An important application of resolving power is in the observation of visual </span><a class="md-crosslink" data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/binary-star"><span data-dcnode-id="1225" instrument_node="">binary stars</span></a><span data-dcnode-id="1223" instrument_node="">. There, one star is routinely observed as it revolves around a second star. Many observatories conduct extensive visual binary observing programs and publish catalogs of their observational results. One of the major contributors in this field is the </span><a class="md-crosslink" data-dcnode-id="1221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/United-States-Naval-Observatory"><span data-dcnode-id="1222" instrument_node="">United States Naval Observatory</span></a><span data-dcnode-id="1220" instrument_node=""> in Washington, D.C.</span></p><span class="marker p2" data-dcnode-id="1217"></span><span class="marker AM2 am-inline" data-dcnode-id="1215"></span><span class="marker MOD2 mod-inline" data-dcnode-id="1213"></span><span data-dcnode-id="1212" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1154"><span data-dcnode-id="1211" instrument_node="">Most refractors currently in use at observatories have </span><span data-dcnode-id="1210" id="ref481101"></span><a class="md-crosslink" data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/equatorial-mounting"><span data-dcnode-id="1209" instrument_node="">equatorial mountings</span></a><span data-dcnode-id="1207" instrument_node="">. The </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1205" data-term="mounting" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/mounting"><span data-dcnode-id="1206" instrument_node="">mounting</span></a><span data-dcnode-id="1204" instrument_node=""> describes the orientation of the physical bearings and structure that permits a telescope to be pointed at a celestial object for viewing. In the equatorial mounting, the </span><span data-dcnode-id="1203" id="ref481102"></span><span data-dcnode-id="1202" instrument_node="">polar axis of the telescope is constructed parallel to </span><a class="md-crosslink" data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Earth"><span data-dcnode-id="1201" instrument_node="">Earth</span></a><span data-dcnode-id="1199" instrument_node="">’s axis. The polar axis supports the </span><span data-dcnode-id="1198" id="ref481103"></span><span data-dcnode-id="1197" instrument_node="">declination axis of the instrument. </span><span data-dcnode-id="1196" id="ref481104"></span><a class="md-crosslink" data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/declination"><span data-dcnode-id="1195" instrument_node="">Declination</span></a><span data-dcnode-id="1193" instrument_node=""> is measured on the celestial sky north or south from the </span><span data-dcnode-id="1192" id="ref481105"></span><a class="md-crosslink" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/celestial-equator"><span data-dcnode-id="1191" instrument_node="">celestial equator</span></a><span data-dcnode-id="1189" instrument_node="">. The declination axis makes it possible for the telescope to be pointed at various declination angles as the instrument is rotated about the polar axis with respect to </span><span data-dcnode-id="1188" id="ref481106"></span><a class="md-crosslink" data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/right-ascension"><span data-dcnode-id="1187" instrument_node="">right ascension</span></a><span data-dcnode-id="1185" instrument_node="">. Right ascension is measured along the celestial equator from the vernal </span><a class="md-crosslink" data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/equinox-astronomy"><span data-dcnode-id="1184" instrument_node="">equinox</span></a><span data-dcnode-id="1182" instrument_node=""> (i.e., the position on the </span><a class="md-crosslink" data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/celestial-sphere"><span data-dcnode-id="1181" instrument_node="">celestial sphere</span></a><span data-dcnode-id="1179" instrument_node=""> where the </span><a class="md-crosslink" data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Sun"><span data-dcnode-id="1178" instrument_node="">Sun</span></a><span data-dcnode-id="1176" instrument_node=""> crosses the celestial equator from south to north on the first day of spring). Declination and right ascension are the two coordinates that define a celestial object on the celestial sphere. Declination is </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="1174" data-term="analogous" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/analogous"><span data-dcnode-id="1175" instrument_node="">analogous</span></a><span data-dcnode-id="1173" instrument_node=""> to </span><a class="md-crosslink" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/latitude"><span data-dcnode-id="1172" instrument_node="">latitude</span></a><span data-dcnode-id="1170" instrument_node="">, and right ascension is analogous to longitude. Graduated dials are mounted on the axis to permit the observer to point the telescope precisely. To track an object, the telescope’s polar axis is driven smoothly by an </span><a class="md-crosslink autoxref" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/electric-motor"><span data-dcnode-id="1169" instrument_node="">electric motor</span></a><span data-dcnode-id="1167" instrument_node=""> at a sidereal rate—namely, at a rate equal to the rate of rotation of Earth with respect to the stars. Thus, one can track or observe with a telescope for long periods of time if the sidereal rate of the motor is very accurate. High-accuracy motor-driven systems have become readily available with the rapid advancement of </span><a class="md-crosslink" data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/quartz"><span data-dcnode-id="1166" instrument_node="">quartz</span></a><span data-dcnode-id="1164" instrument_node="">-clock </span><a class="md-crosslink autoxref" data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/technology"><span data-dcnode-id="1163" instrument_node="">technology</span></a><span data-dcnode-id="1161" instrument_node="">. Most major observatories now rely on either quartz or </span><a class="md-crosslink" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/atomic-clock"><span data-dcnode-id="1160" instrument_node="">atomic clocks</span></a><span data-dcnode-id="1158" instrument_node=""> to provide accurate </span><a class="md-crosslink autoxref" data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/sidereal-time"><span data-dcnode-id="1157" instrument_node="">sidereal time</span></a><span data-dcnode-id="1155" instrument_node=""> for observations as well as to drive telescopes at an extremely uniform rate.</span></p><span class="marker p3" data-dcnode-id="1152"></span><span class="marker AM3 am-inline" data-dcnode-id="1150"></span><span class="marker MOD3 mod-inline" data-dcnode-id="1148"></span><span data-dcnode-id="1147" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="1112"><span data-dcnode-id="1146" instrument_node="">A notable example of a refracting telescope is the 66-cm (26-inch) refractor of the </span><span data-dcnode-id="1145" id="ref481107"></span><a class="md-crosslink" data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/United-States-Naval-Observatory"><span data-dcnode-id="1144" instrument_node="">U.S. Naval Observatory</span></a><span data-dcnode-id="1142" instrument_node="">. This instrument was used by the astronomer </span><a class="md-crosslink" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Asaph-Hall"><span data-dcnode-id="1141" instrument_node="">Asaph Hall</span></a><span data-dcnode-id="1139" instrument_node=""> to discover the two </span><a class="md-crosslink" data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/moon-natural-satellite"><span data-dcnode-id="1138" instrument_node="">moons</span></a><span data-dcnode-id="1136" instrument_node=""> of </span><a class="md-crosslink" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Mars-planet"><span data-dcnode-id="1135" instrument_node="">Mars</span></a><span data-dcnode-id="1133" instrument_node="">, </span><a class="md-crosslink" data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Phobos-moon-of-Mars"><span data-dcnode-id="1132" instrument_node="">Phobos</span></a><span data-dcnode-id="1130" instrument_node=""> and </span><a class="md-crosslink" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Deimos-moon-of-Mars"><span data-dcnode-id="1129" instrument_node="">Deimos</span></a><span data-dcnode-id="1127" instrument_node="">, in 1877. Today, the telescope is used primarily for observing </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="1125" data-term="binary" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/binary"><span data-dcnode-id="1126" instrument_node="">binary</span></a><span data-dcnode-id="1124" instrument_node=""> stars. The 91-cm (36-inch) refractor at </span><a class="md-crosslink" data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Lick-Observatory"><span data-dcnode-id="1123" instrument_node="">Lick Observatory</span></a><span data-dcnode-id="1121" instrument_node=""> on Mount Hamilton, California, U.S., is the largest refracting system currently in operation. (The 1-metre [40-inch] instrument at </span><a class="md-crosslink" data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Yerkes-Observatory"><span data-dcnode-id="1120" instrument_node="">Yerkes Observatory</span></a><span data-dcnode-id="1118" instrument_node=""> in Williams Bay, Wisconsin, U.S., has been inactive since 2018 [</span><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">see</span></em><span data-dcnode-id="1115" instrument_node=""> </span><span data-dcnode-id="1114" id="ref809"></span><span data-dcnode-id="1113" instrument_node="">table].)</span></p><span class="marker p4" data-dcnode-id="1110"></span><span class="marker AM4 am-inline" data-dcnode-id="1108"></span><span class="marker MOD4 mod-inline" data-dcnode-id="1106"></span><span class="md-raw-html" data-dcnode-id="547"><div class="table-title" data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">

</span></span><span data-dcnode-id="546" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="533"><span data-dcnode-id="545" instrument_node="">Another type of refracting telescope is the </span><span data-dcnode-id="544" id="ref481108"></span><span data-dcnode-id="543" instrument_node="">astrograph, which usually has an objective diameter of approximately 20 cm (8 inches). The astrograph has a photographic plateholder mounted in the focal plane of the objective so that photographs of the celestial sphere can be taken. The photographs are usually taken on </span><a class="md-crosslink autoxref" data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/glass"><span data-dcnode-id="542" instrument_node="">glass</span></a><span data-dcnode-id="540" instrument_node=""> plates. The principal application of the astrograph is to determine the positions of a large number of faint stars. These positions are then published in catalogs such as the </span><em data-dcnode-id="535"><a class="md-crosslink" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/AG-catalog"><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">AGK</span></em><span data-dcnode-id="537" instrument_node="">3</span></a></em><span data-dcnode-id="534" instrument_node=""> and serve as reference points for deep-space photography.</span></p><span class="marker p5" data-dcnode-id="531"></span><span class="marker AM5 am-inline" data-dcnode-id="529"></span><span class="marker MOD5 mod-inline" data-dcnode-id="527"></span></section><span data-dcnode-id="525" instrument_node=""> </span><span class="marker end-of-content" data-dcnode-id="523"></span><span class="marker after-article" data-dcnode-id="521"></span></div><span data-dcnode-id="519" instrument_node="">
