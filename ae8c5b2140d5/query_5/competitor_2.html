</span><div class="value" data-dcnode-id="878"><p data-dcnode-id="1068"><span data-dcnode-id="1095" style="font-size: medium;"><span data-dcnode-id="1096" style="font-family: 'arial black', 'avant garde';"><span data-dcnode-id="1098" instrument_node="">CELESTRON - NexStar Evolution 6" (150mm) Computerized SCT Reflector w/ WiFi &nbsp;- 12090</span><br data-dcnode-id="1097"></span></span><span data-dcnode-id="1069" style="font-family: verdana, geneva;"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Celestron’s</span></strong><span data-dcnode-id="1092" instrument_node=""> landmark telescopes reach a new level with the</span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node=""> NexStar Evolution 6</span></strong><span data-dcnode-id="1089" instrument_node="">, the first of a series of </span><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Celestron Schmidt-Cassegrain</span></strong><span data-dcnode-id="1086" instrument_node=""> telescopes with </span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">integrated WiFi standard</span></strong><span data-dcnode-id="1083" instrument_node="">. &nbsp;Forget the hand control &nbsp;and </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">slew to all the best celestial objects with a touch of a smartphone or tablet</span></strong><span data-dcnode-id="1080" instrument_node="">. Simply connect the device to NexStar Evolution’s built-in wireless network, and enjoy viewing the universe with the Celestron mobile app for</span><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node=""> iOS and Android. &nbsp;&nbsp;</span></strong><em data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Plus,</span></em><strong data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node=""> Celestron's standard&nbsp;Planetarium Interface</span></strong><span data-dcnode-id="1073" instrument_node=""> allows viewers to scan the night sky in real time or display a list of celestial objects currently visible based on the time and location of the scope. Celestron's proprietary </span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">SkyAlign™</span></strong><span data-dcnode-id="1070" instrument_node="">&nbsp;alignment procedure is built into the Celestron mobile app, so users are ready to observe within minutes.</span></span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" style="font-size: small;"><strong data-dcnode-id="1063"><span data-dcnode-id="1066" instrument_node="">THE MOST USER-FRIENDLY TELESCOPE, </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">EVER!</span></em></strong><br data-dcnode-id="1062"></span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1052" style="font-family: verdana, geneva;"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Celestron</span></strong><span data-dcnode-id="1056" instrument_node=""> engineers designed the NexStar Evolution series based on</span><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node=""> years of customer feedback</span></strong><span data-dcnode-id="1053" instrument_node="">. It offers many thoughtful design features that combine to provide the best possible experience under the stars.</span></span><br data-dcnode-id="1051"><span data-dcnode-id="1043" style="font-family: verdana, geneva;"><span data-dcnode-id="1050" instrument_node="">No longer will batteries or external power supply be necessary for a computerized viewing session. For the first time ever on a consumer telescope, NexStar Evolution includes its own</span><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node=""> Built-in Lithium-ion Battery.</span></strong><span data-dcnode-id="1047" instrument_node=""> &nbsp;Stargazing marathons lasting up to</span><strong data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node=""> 10 hours are now possible on a single charge.</span></strong><span data-dcnode-id="1044" instrument_node=""> And the NexStar Evolution’s USB charge port is available to top off the other devices that need to stay powered-on during an observing session.</span></span><br data-dcnode-id="1042"><span data-dcnode-id="1040" style="font-family: verdana, geneva;"><span data-dcnode-id="1041" instrument_node="">Setting up the new NexStar Evolution is quick and painless with large, ergonomic handles. The steel tripod features leg etchings to help achieve a level, uniform height for the telescope. Manual clutches in both Altitude and Azimuth offer greater flexibility to manually point the telescope when powered off. &nbsp;Store up to 7 eyepieces in 2 accessory trays, including one with an adjustable red LED illuminator.</span></span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1034"><strong data-dcnode-id="1035"><span data-dcnode-id="1036" style="font-size: small;"><span data-dcnode-id="1037" instrument_node="">FINER TRACKING ACCURACY FOR ASTROIMAGING</span></span></strong></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1025" style="font-family: verdana, geneva;"><span data-dcnode-id="1032" instrument_node="">For Astronomers interested in astro-imaging, the 6 inch NexStar Evolution is an excellent, affordable way to get started. &nbsp;It’s the only fork-mounted telescope in its price range that offers worm gears and greatly improved motors standard. NexStar Evolution’s tracking accuracy is so impressive, capturing images of deep-sky objects like the Orion Nebula can be achieved by simply attaching most any </span><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">DSLR camera</span></strong><span data-dcnode-id="1029" instrument_node="">. As users progress in the hobby of astro-imaging Celestron's Pro HD Wedge can be added to facilitate longer exposures for more detailed astrophotos.&nbsp;Of course, the Schmidt-Cassegrain optical system offers bright, sharp views with</span><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node=""> StarBright XLT™ optical coatings</span></strong><span data-dcnode-id="1026" instrument_node="">—a great choice for visual observers and budding astro-imagers alike.</span></span><br data-dcnode-id="1024"><span data-dcnode-id="1020" style="font-family: verdana, geneva;"><span data-dcnode-id="1023" instrument_node="">NexStar Evolution </span><strong data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">includes a StarPointer finderscope, two 1.25” Plossl eyepieces, a 1.25” star diagonal, AC adapter, and NexStar+ &nbsp;hand control.</span></strong></span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-size: small;"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">EXCLUSIVE SKYALIGN™ TECHNOLOGY</span></strong></span></p><span data-dcnode-id="1013" instrument_node="">
</span><p class="p1" data-dcnode-id="994"><span data-dcnode-id="1006" style="font-family: verdana, geneva;"><span class="s1" data-dcnode-id="1008"><span data-dcnode-id="1012" instrument_node="">With </span><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Celestron SkyAlign,</span></strong><span data-dcnode-id="1009" instrument_node=""> setting up and using a computerized telescope is faster and easier than ever before.</span></span><span data-dcnode-id="1007" instrument_node="">&nbsp;Point the telescope at three bright objects in the sky, and the telescope tells you what the objects are. You don’t need to know the names of the stars—you can even pick the Moon or bright planets- SkyAlign is the simplest method to align a computerized telescope, providing ease of use for beginners while retaining the accuracy demanded by experienced users.</span></span><br data-dcnode-id="1005"><span data-dcnode-id="995" style="font-family: verdana, geneva;"><span data-dcnode-id="1004" instrument_node="">Input the date, time, and current location, (</span><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">GPS-equipped</span></strong><span data-dcnode-id="1001" instrument_node=""> telescopes obtain all this information automatically), and then point the telescope at any three bright objects. There is</span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node=""> no need to point the telescope north</span></strong><span data-dcnode-id="998" instrument_node=""> or to level the optical tube as in previous alignment methods: the </span><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">initial position of the telescope is irrelevant.&nbsp;</span></strong></span></p><span data-dcnode-id="993" instrument_node="">
</span><p class="p1" data-dcnode-id="989"><span data-dcnode-id="990" style="font-size: small;"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">SUPERIOR STARBRIGHT XLT OPTICAL COATINGS</span></strong></span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="986" style="font-family: verdana, geneva;"><span data-dcnode-id="987" instrument_node="">The purpose of a telescope is to collect as much light as possible. The amount of light gathered affects the brightness of the resulting image. Unfortunately, there are sources of light loss at each optical surface and within each lens. Fortunately, the right optical coatings and lens materials can minimize the amount of light lost to these sources.&nbsp;Optical coatings are very thin layers of material that are applied to the glass in a process called “vacuum deposition.” The physical properties and thickness of each layer in the coating, as well as their orientation with each other and the glass to which they are applied, determine how well they will do their job.</span></span><br data-dcnode-id="985"><span data-dcnode-id="977" style="font-family: verdana, geneva;"><span data-dcnode-id="984" instrument_node="">Since the function of a mirror is to collect light by way of reflection, Celestron uses only highly-reflective metallic coatings on these optical elements. A mirror without coatings reflects about 4% of the light that hits its surface, but a mirror coated with standard aluminum coatings reflects about 86-88%—and a mirror coated with </span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">StarBright XLT reflects 95%.</span></strong><span data-dcnode-id="981" instrument_node=""> &nbsp;&nbsp;The materials used in Celestron's reflective and anti-reflective coatings are the</span><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node=""> purest available (exceeding 99.99%</span></strong><span data-dcnode-id="978" instrument_node="">) and include aluminum (Al), hafnium oxide (HfO2), titanium dioxide (TiO2), silicon dioxide (SiO2), and magnesium fluoride (MgF2).</span></span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" style="font-size: small;"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">CELESTRON NEXSTAR EVOLUTION 6 FEATURES:</span></strong></span></p><span data-dcnode-id="966" instrument_node="">
</span><ul data-dcnode-id="924"><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="961"><strong data-dcnode-id="962"><span data-dcnode-id="963" style="font-family: verdana, geneva;"><span data-dcnode-id="964" instrument_node="">Control your telescope wirelessly from your iOS or Android smartphone or tablet with the free Celestron mobile app with planetarium interface and SkyAlign technology</span></span></strong></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="956"><strong data-dcnode-id="957"><span data-dcnode-id="958" style="font-family: verdana, geneva;"><span data-dcnode-id="959" instrument_node="">Compact, portable 6 inch Schmidt-Cassegrain optical tube with StarBright XLT optical coatings and Fastar compatibility</span></span></strong></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="951"><strong data-dcnode-id="952"><span data-dcnode-id="953" style="font-family: verdana, geneva;"><span data-dcnode-id="954" instrument_node="">Computerized GoTo mount with high-performance worm gears and motors for improved tracking accuracy, along with reduced gear backlash</span></span></strong></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="946"><strong data-dcnode-id="947"><span data-dcnode-id="948" style="font-family: verdana, geneva;"><span data-dcnode-id="949" instrument_node="">Rechargeable lithium-ion battery with enough power for 10 hours of continuous observing</span></span></strong></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="941"><strong data-dcnode-id="942"><span data-dcnode-id="943" style="font-family: verdana, geneva;"><span data-dcnode-id="944" instrument_node="">Improved industrial design with manual clutches and integrated carry handles, plus the added convenience of two accessory trays and a USB charge port for your smart device</span></span></strong></li><span data-dcnode-id="940" instrument_node="">
</span><li data-dcnode-id="936"><strong data-dcnode-id="937"><span data-dcnode-id="938" style="font-family: verdana, geneva;"><span data-dcnode-id="939" instrument_node="">Unique enhanced multi-layer mirror coatings made from precise layers of aluminum, SiO2 (quartz), TiO2 (titanium dioxide), and Si02 (silicon dioxide). Reflectivity is fairly flat across the spectrum, optimizing it for both imaging and visual observing.</span></span></strong></li><span data-dcnode-id="935" instrument_node="">
</span><li data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" style="font-family: verdana, geneva;"><span data-dcnode-id="934" instrument_node="">Multi-layer anti-reflective coatings made from precise layers of MgF2 (magnesium fluoride) and HfO2 (hafnium dioxide). Hafnium—a rare element that costs nearly $2,000 per kilogram—gives a wider band pass than the titanium used in competing coatings.</span></span></strong></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="926"><strong data-dcnode-id="927"><span data-dcnode-id="928" style="font-family: verdana, geneva;"><span data-dcnode-id="929" instrument_node="">High-transmission water white glass is used instead of soda lime glass for the corrector lens. Water white glass transmits about 90.5% without anti-reflective coatings; that’s 3.5% better transmission than uncoated soda lime glass. When water white glass is used in conjunction with StarBright XLT’s anti-reflective coatings, the average transmission reaches 97.4%: an 8% improvement.</span></span></strong></li><span data-dcnode-id="925" instrument_node="">
</span></ul><span data-dcnode-id="923" instrument_node="">
