div class="popup" data-dcnode-id="1304" id="np-popup-next"><img alt="" data-dcnode-id="1305" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn2.skiesunlimited.com/skin/ultra/images/loading.gif&amp;raw" title="" width="32"></div></div><span data-dcnode-id="1302" instrument_node=""> </span><span data-dcnode-id="1299" instrument_node=""> </span><div data-dcnode-id="1298" style="height:30px"></div><span data-dcnode-id="1297" instrument_node=""> </span><div class="finetabs justified blue br-on border-off" data-dcnode-id="1116"><span data-dcnode-id="1296" instrument_node=""> </span><input checked="checked" class="ftab" data-dcnode-id="1295" id="description" name="tabs_product" type="radio"><span data-dcnode-id="1294" instrument_node=""> </span><label class="ftab" data-dcnode-id="1292" for="description"><span data-dcnode-id="1293" instrument_node="">Description</span></label><span data-dcnode-id="1291" instrument_node=""> </span><div class="finetab" data-dcnode-id="1272"><span data-dcnode-id="1290" instrument_node=""> </span><div class="card card-block" data-dcnode-id="1274"><span data-dcnode-id="1289" instrument_node=""> </span><table data-dcnode-id="1276"><tbody data-dcnode-id="1277"><tr data-dcnode-id="1278"><td data-dcnode-id="1279"><span data-dcnode-id="1288" instrument_node="">Used Edmund's Scientific Astroscan telescope in very good condition.&nbsp;</span><h2 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Description (Wikipedia)</span></h2><span data-dcnode-id="1285" instrument_node=""> </span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">The Astroscan had a Newtonian reflector layout with a 4⅛" clear-inch (105mm) diameter f/4.2 aluminized and overcoated borosilicate glass parabolic primary mirror with a focal length of 17½ inches (445mm).[1] The telescope's secondary mirror was mounted on a flat optical window at the front of the tube. The telescope was designed by Norman Sperling and Mike Simmons to be used as an introductory telescope.[2] Rather than using a more traditional equatorial or altazimuth mount the Astroscan features a spherical housing around the primary reflector which sat in a cast aluminum cradle. The design was durable and allowed for simple operation by novice amateur astronomers; it won an Industrial Design Award in 1976.[1] The telescope body was made from high impact acrylonitrile butadiene styrene (ABS) plastic and was equipped with a carrying strap to aid portability.</span></p><span data-dcnode-id="1282" instrument_node=""> </span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">This telescope includes a quality 28mm Plossl eyepiece that yields 16x magnification with a 3 degree true field of view.  The Andromeda galaxy would actually look pretty good at that level of magnification. 28 mm may seem like an odd focal length for an eyepiece, but it yields an exit pupil near the practical limit of 7 mm, much like many popular astronomical binoculars. </span></p></td></tr></tbody></table><span data-dcnode-id="1275" instrument_node=""> </span></div><span data-dcnode-id="1273" instrument_node=""> </span></div><span data-dcnode-id="1271" instrument_node=""> </span><input class="ftab" data-dcnode-id="1270" id="reviews" name="tabs_product" type="radio"><span data-dcnode-id="1269" instrument_node=""> </span><label class="ftab" data-dcnode-id="1267" for="reviews"><span data-dcnode-id="1268" instrument_node="">Reviews</span></label><span data-dcnode-id="1266" instrument_node=""> </span><div class="finetab" data-dcnode-id="1224"><span data-dcnode-id="1265" instrument_node=""> </span><div class="card card-block" data-dcnode-id="1226"><span data-dcnode-id="1264" instrument_node=""> </span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node=""> </span><div class="acr-reviews-list acr-tab" data-dcnode-id="1253"><span data-dcnode-id="1261" instrument_node=""> </span><span class="text-info font
