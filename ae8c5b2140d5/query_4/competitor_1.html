</span><span class="uag-toc__heading-anchor" data-dcnode-id="1344" id="best-telescope-for-under-200-guide"></span><h2 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Best telescope for under 200 guide</span></h2><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1340" instrument_node="">This telescope buying guide is for entry level backyard stargazers with a budget of under 200 dollars, and covers what to look for in a best starter telescope as well as </span><a data-dcnode-id="1338" data-id="10808" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/what-to-look-for-in-a-telescope/"><span data-dcnode-id="1339" instrument_node="">what to expect in a telescope</span></a><span data-dcnode-id="1337" instrument_node=""> in this price range.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">People look for these cheaper telescopes when seeking gifts for kids or when they’re not wanting to outlay too much in the way of cost for a beginner’s telescope. </span></p><span data-dcnode-id="1332" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1331" id="brands-of-telescopes-in-the-beginner-range"></span><h2 data-dcnode-id="1329" id="compare"><span data-dcnode-id="1330" instrument_node="">Brands of telescopes in the beginner range</span></h2><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">There are several brands of telescopes in the budget range. Three well-thought-of brands in the US are:</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">☞ Celestron</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">☞ Orion</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">☞ SkyWatcher</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Celestron markets popular telescopes in the US. In operation for over 50 years – since 1960 –  it is a reputable brand name. Orion is another such brand, which has been around for over 40 years. SkyWatcher is another, but you’re not likely to find this brand in the lower price range for telescopes.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1312" instrument_node="">Learn more about these brands at &gt;&gt;&gt; my article on </span><a data-dcnode-id="1310" data-id="22285" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/celestron-vs-orion-vs-skywatcher/"><span data-dcnode-id="1311" instrument_node="">Orion vs Celestron vs Skywatcher telescopes</span></a><span data-dcnode-id="1309" instrument_node="">.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1306" id="best-beginner-telescope"></span><h2 data-dcnode-id="1304" id="reviews"><span data-dcnode-id="1305" instrument_node="">Best beginner telescope</span></h2><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1302" instrument_node="">What are the best telescopes for beginners? </span><strong data-dcnode-id="1294"><span data-dcnode-id="1301" instrument_node="">A </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Dobsonian</div><div class=glossaryItemBody>&amp;lt;span style=&quot;white-space: pre-wrap;&quot;&amp;gt;A Dobsonian, named after its creator John Dobson, is a reflector telescope, which means it(...)&amp;lt;/span&amp;gt;</div>" data-dcnode-id="1299" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/dobsonian/" target="_blank"><span data-dcnode-id="1300" instrument_node="">Dobsonian</span></a><span data-dcnode-id="1298" instrument_node=""> will fit this bill of the best beginner telescope because it involves a simple set up, and for the price, it offers a larger </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>aperture</div><div class=glossaryItemBody>The size of the primary lens or mirror measured as its diameter in either inches or(...)</div>" data-dcnode-id="1296" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/aperture/" target="_blank"><span data-dcnode-id="1297" instrument_node="">aperture</span></a><span data-dcnode-id="1295" instrument_node=""> for greater light gathering compared to that of others.</span></strong></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1291" instrument_node="">A </span><a data-dcnode-id="1289" data-id="19129" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/dobsonian-telescope-advantages-and-disadvantages/"><span data-dcnode-id="1290" instrument_node="">Dobsonian has many advantages</span></a><span data-dcnode-id="1288" instrument_node=""> for beginner amateur astronomers. </span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">In any case, as a novice, you’ll probably want the best affordable telescope to learn the technicalities of night sky watching before moving onto something more sophisticated. </span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Here are four to consider in this price range…</span></p><span data-dcnode-id="1280" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1279" id="1-orion-starblast-astro-reflector-telescopes"></span><h2 data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">#1. Orion StarBlast Astro reflector telescopes</span></h2><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Here are two reflector telescopes for beginners from Orion: a compact Dobsonian telescope and a Newtonian telescope in the StarBlast range.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">While they are both reflectors with mirrors rather than lenses, a Dobsonian and a Newtonian reflector differ in regard to their telescope mounts. Dobsonian optical tubes sit on a simple mount that rotates — best explained by the diagrams in </span><a data-dcnode-id="1270" data-id="19561" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/telescope-mounts-explained/"><span data-dcnode-id="1271" instrument_node="">my article about the different types</span></a><span data-dcnode-id="1269" instrument_node="">.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1266" instrument_node="">Both have </span><strong data-dcnode-id="1262"><span data-dcnode-id="1265" instrument_node="">4.5″ </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>aperture</div><div class=glossaryItemBody>The size of the primary lens or mirror measured as its diameter in either inches or(...)</div>" data-dcnode-id="1263" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/aperture/" target="_blank"><span data-dcnode-id="1264" instrument_node="">Aperture</span></a></strong><span data-dcnode-id="1261" instrument_node=""> — a primary mirror size of 114 mm (4½”). </span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1243"><strong data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Wider field viewing</span></strong><span data-dcnode-id="1256" instrument_node=""> — Each having a focal length of 450 mm (18″) giving a focal ratio of four (f/4), makes these two Orion beginner telescopes best for wide field viewing of the night sky objects such as bright galaxies, distant cloudy nebulas, and sparkling </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>star</div><div class=glossaryItemBody>Star (def): A spherical mass of plasma held together by gravity. There are several types of(...)</div>" data-dcnode-id="1254" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/star/" target="_blank"><span data-dcnode-id="1255" instrument_node="">star</span></a><span data-dcnode-id="1253" instrument_node=""> clusters. Such types that are better suited to viewing </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>deep space</div><div class=glossaryItemBody>Also known as outer space. There is no definite official delineation of the space beyond the(...)</div>" data-dcnode-id="1251" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/deep-space/" target="_blank"><span data-dcnode-id="1252" instrument_node="">deep space</span></a><span data-dcnode-id="1250" instrument_node=""> objects, rather than the features of our </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Solar System</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Solar System&amp;lt;/strong&amp;gt; (def): The Earth is one of 8 planets orbiting the Sun in the Solar System. The(...)</div>" data-dcnode-id="1248" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/solar-system/" target="_blank"><span data-dcnode-id="1249" instrument_node="">solar system</span></a><span data-dcnode-id="1247" instrument_node=""> objects (the planets), are called fast telescopes. They are also great for viewing the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Moon</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Moon&amp;lt;/strong&amp;gt; (def): A natural satellite orbiting a planet or other celestial body. Earth has one moon,(...)</div>" data-dcnode-id="1245" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/moon/" target="_blank"><span data-dcnode-id="1246" instrument_node="">Moon</span></a><span data-dcnode-id="1244" instrument_node="">.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The telescopes’ maximum magnification that’s useful is given as 228× and the lowest is 16×.</span></p><span data-dcnode-id="1239" instrument_node="">

</span><span class="uag-toc__heading-anchor" data-dcnode-id="799" id="what-to-expect-of-telescopes-in-this-budget-range"></span><h2 data-dcnode-id="797" id="features"><span data-dcnode-id="798" instrument_node="">What to expect of telescopes in this budget range</span></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="795" instrument_node="">Some main features to consider when buying </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/what-you-can-expect-to-see-with-a-home-telescope/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="794" instrument_node="">a home telescope </span></a><span data-dcnode-id="792" instrument_node="">for under $200 are the sturdiness of the tripod, the light gathering limits of the aperture size, and the type of mount. You’ll find more on this in</span><a data-dcnode-id="790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/what-to-look-for-in-a-telescope/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="791" instrument_node=""> my article that looks at the different telescope features</span></a><span data-dcnode-id="789" instrument_node="">.</span></p><span data-dcnode-id="787" instrument_node="">
</span><h3 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Telescope Types – mirrors vs lenses</span></h3><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">These are the types of telescopes: </span></p><span data-dcnode-id="781" instrument_node="">
</span><ul data-dcnode-id="776"><li data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Reflector telescopes</span></li><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Refractor telescopes</span></li></ul><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">The main difference is a reflector uses a primary and secondary mirror to gather light and the refractor uses lenses. </span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">You’ll find refractors more so than reflectors in telescopes under 100 dollars — the most inexpensive telescope range.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h3 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Aperture Size</span></h3><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">The aperture size refers to the diameter of the primary mirror or lens. The sharpness and brightness of the view improve with the size of the aperture, which is about light-gathering. You’ll pay more as the diameter increases, i.e., a telescope with a larger aperture size will generally cost more in each type of telescope. (</span><a data-dcnode-id="763" data-id="18810" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/refractor-vs-reflector-telescope/"><span data-dcnode-id="764" instrument_node="">Refractors differ to reflectors.</span></a><span data-dcnode-id="762" instrument_node="">)</span></p><span data-dcnode-id="760" instrument_node="">
</span><h3 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Mounts</span></h3><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="756" instrument_node="">The EQ (equatorial mount or GEM) allows the telescope&nbsp;to follow a particular&nbsp;object with the&nbsp;</span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Earth</div><div class=glossaryItemBody>Where we live. The third planet from the Sun in the Solar System, the Earth rotates once per(...)</div>" data-dcnode-id="754" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/earth/" target="_blank"><span data-dcnode-id="755" instrument_node="">Earth</span></a><span data-dcnode-id="753" instrument_node="">’s rotation along a single axis. It has one axis tilted to your latitude and the other parallel to the celestial equator (a projection of Earth’s equator onto the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>celestial sphere</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Celestial sphere&amp;lt;/strong&amp;gt; (def): The sphere around the Earth that is imagined for the purpose of(...)</div>" data-dcnode-id="751" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/celestial-sphere/" target="_blank"><span data-dcnode-id="752" instrument_node="">celestial sphere</span></a><span data-dcnode-id="750" instrument_node="">).</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">The Altazimuth (or alt-az), which is used with a Dobsonian, allows for manual tracking of objects with the Earth’s rotation on a two-axis basis (altitude and </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>azimuth</div><div class=glossaryItemBody>The horizontal bearing of a celestial object. It is measured clockwise from a given direction.</div>" data-dcnode-id="745" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/azimuth/" target="_blank"><span data-dcnode-id="746" instrument_node="">azimuth</span></a><span data-dcnode-id="744" instrument_node="">). </span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Choosing a telescope with a simple mount will save you $$$ as well as frustration. If you’re a beginner you don’t have to coordinate too many controls with a simple set up as found with Dobsonian telescopes.</span></p><span data-dcnode-id="739" instrument_node="">
</span><h3 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Tripods</span></h3><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Some of the cheaper telescopes have spindly collapsible tripods. While such a design might be prefered for portability, realise that it can hurt your views as these cheaper types tend to quiver and quake.</span></p><span data-dcnode-id="733" instrument_node="">
</span><section class="wp-block-uagb-section uagb-section__wrap uagb-section__background-undefined uagb-block-2aed4417" data-dcnode-id="704"><div class="uagb-section__overlay" data-dcnode-id="732"></div><div class="uagb-section__inner-wrap" data-dcnode-id="705"><span data-dcnode-id="731" instrument_node="">
</span><div class="wp-block-uagb-blockquote uagb-blockquote__outer-wrap uagb-block-52b5a393" data-dcnode-id="707"><div class="uagb-blockquote__wrap uagb-blockquote__skin-quotation uagb-blockquote__align-center uagb-blockquote__style-style_1 uagb-blockquote__with-tweet uagb-blockquote__tweet-style-link uagb-blockquote__tweet-icon_text uagb-blockquote__stack-img-tablet" data-dcnode-id="708"><blockquote class="uagb-blockquote" data-dcnode-id="709"><div class="uagb-blockquote__icon-wrap" data-dcnode-id="727"><span class="uagb-blockquote__icon" data-dcnode-id="728"><svg data-dcnode-id="729" height="20" viewBox="0 0 32 32" width="20"><path d="M7.031 14c3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7l-0.031-1c0-7.732 6.268-14 14-14v4c-2.671 0-5.182 1.040-7.071 2.929-0.364 0.364-0.695 0.751-0.995 1.157 0.357-0.056 0.724-0.086 1.097-0.086zM25.031 14c3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7l-0.031-1c0-7.732 6.268-14 14-14v4c-2.671 0-5.182 1.040-7.071 2.929-0.364 0.364-0.695 0.751-0.995 1.157 0.358-0.056 0.724-0.086 1.097-0.086z" data-dcnode-id="730"></path></svg></span></div><div class="uagb-blockquote__content-wrap" data-dcnode-id="710"><div class="uagb-blockquote__content" data-dcnode-id="724"><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">One of the chief defects of so-called beginners’ telescope is inadequate jiggly mounts that make aiming the instrument an exercise in frustration. An economical and effective alternative is the simple and stable Dobsonian mount…</span></p></div><footer data-dcnode-id="711"><div class="uagb-blockquote__author-wrap uagb-blockquote__author-at-left" data-dcnode-id="717"><cite class="uagb-blockquote__author" data-dcnode-id="718"><span data-dcnode-id="723" instrument_node="">Terence Dickinson, </span><a data-dcnode-id="721" href="#sources"><span data-dcnode-id="722" instrument_node="">NightWatch</span></a><sup data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">1</span></sup></cite></div><a class="uagb-blockquote__tweet-button" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/" rel="noopener noreferrer" target="_blank"><svg data-dcnode-id="715" height="20" viewBox="0 0 512 512" width="20"><path d="M459.37 151.716c.325 4.548.325 9.097.325 13.645 0 138.72-105.583 298.558-298.558 298.558-59.452 0-114.68-17.219-161.137-47.106 8.447.974 16.568 1.299 25.34 1.299 49.055 0 94.213-16.568 130.274-44.832-46.132-.975-84.792-31.188-98.112-72.772 6.498.974 12.995 1.624 19.818 1.624 9.421 0 18.843-1.3 27.614-3.573-48.081-9.747-84.143-51.98-84.143-102.985v-1.299c13.969 7.797 30.214 12.67 47.431 13.319-28.264-18.843-46.781-51.005-46.781-87.391 0-19.492 5.197-37.36 14.294-52.954 51.655 63.675 129.3 105.258 216.365 109.807-1.624-7.797-2.599-15.918-2.599-24.04 0-57.828 46.782-104.934 104.934-104.934 30.213 0 57.502 12.67 76.67 33.137 23.715-4.548 46.456-13.32 66.599-25.34-7.798 24.366-24.366 44.833-46.132 57.827 21.117-2.273 41.584-8.122 60.426-16.243-14.292 20.791-32.161 39.308-52.628 54.253z" data-dcnode-id="716"></path></svg><span class="uagb-blockquote__tweet-label" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Tweet this</span></span></a></footer></div></blockquote></div></div><span data-dcnode-id="706" instrument_node="">
</span></div></section><span data-dcnode-id="703" instrument_node="">
</span><h3 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Glass of optics</span></h3><span data-dcnode-id="700" instrument_node="">
</span><ul data-dcnode-id="691"><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Soda-lime </span></li><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Borosilicate</span></li><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">BK-7</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">BaK4</span></li></ul><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Soda-lime is the most common type of glass. It’s main constituent is silicon dioxide. It’s used in telescopes because it is relatively cheap and chemically stable. </span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="683"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.differencebetween.com/difference-between-soda-lime-glass-and-borosilicate-glass/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="686" instrument_node="">Borosilicate, vs soda-lime</span></a><span data-dcnode-id="684" instrument_node="">, is more resistant to thermal shock. Borosilicate glass contains silicon dioxide but also boron trioxide.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">BK-7 refers to a type of borosilicate glass.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="675"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.celestron.com/blogs/knowledgebase/what-is-the-difference-between-bak-4-bk-7-and-k-9-glass" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="678" instrument_node="">BaK4</span></a><span data-dcnode-id="676" instrument_node=""> is a superior quality glass. It is a light barium crown glass that is relatively expensive, which is why you won’t find it in the telescopes under 200 or thereabouts. You’ll find it used in the more expensive range of telescopes — the high end type.</span></p><span data-dcnode-id="674" instrument_node="">
</span><h3 data-dcnode-id="672" id="diffraction-limited"><span data-dcnode-id="673" instrument_node="">Optical quality</span></h3><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="667"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Diffraction limited</span></strong><span data-dcnode-id="668" instrument_node="">: This means the limitation of the image you see is determined by the physical properties of the light, rather than by optical imperfections in the telescope.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">City lights and other light pollution will limit your viewing experience.</span></p><span data-dcnode-id="663" instrument_node="">
</span><h3 data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Other Features and Options</span></h3><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="659" instrument_node="">Extras can include a </span><a aria-label="Barlow lens (opens in a new tab)" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/how-do-you-use-barlow-lenses-for-telescopes/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="658" instrument_node="">Barlow lens</span></a><span data-dcnode-id="656" instrument_node=""> that increases the eyepiece magnification, a </span><a data-dcnode-id="654" data-id="23816" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/finderscope-upside-down/"><span data-dcnode-id="655" instrument_node="">finder scope</span></a><span data-dcnode-id="653" instrument_node="">, and software. A </span><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">star diagonal</span></strong><span data-dcnode-id="650" instrument_node=""> can improve your viewing comfort in the right-side-up way the image is presented. A </span><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">moon filter</span></strong><span data-dcnode-id="647" instrument_node=""> helps dim the brightness of the moon to better distinguish its features. </span></p><span data-dcnode-id="645" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="644" id="what-to-avoid-if-choosing-a-telescope-under-200"></span><h2 data-dcnode-id="642" id="what-matters"><span data-dcnode-id="643" instrument_node="">What to avoid if choosing a telescope under 200</span></h2><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">What is a good telescope? What telescope should I buy? Knowing where to start, where to buy a telescope, and which telescope to buy is confusing for the beginner or anyone interested in buying a telescope on a limited budget.&nbsp;Here’s what to avoid.</span></p><span data-dcnode-id="638" instrument_node="">
</span><h3 data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Trash buys </span></h3><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">This is important when searching for a telescope to buy.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">You’re looking for the best telescope for the money you are willing to spend. But, it’s best to get something you’re more likely to enjoy. That way you’ll get the most value out of using it. </span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">There’s not a wide range of available options to give you great views when looking to spend under 200 dollars. But as a choice for beginners, if you’re budget limit is 200, then this guide is about helping you find that best beginner telescope.</span></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Pinning your choice on the extras</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">You might find the extras, like the Barlow lens, that come with a telescope for under $200 are cheaply made and won’t perform as well as could be expected with better quality. So, I suggest that you don’t make their inclusion the deciding factor. You can always get extra eyepieces or a Barlow lens when you can afforded them at a later time.</span></p><span data-dcnode-id="620" instrument_node="">
</span><h3 data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Overdoing your expectations</span></h3><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">So, you should consider your intended purpose and your expectations. Why do you want a telescope? </span></p><span data-dcnode-id="614" instrument_node="">
</span><ul data-dcnode-id="605"><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Do you want to observe finer details of the moon or planets?</span></li><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Are you wanting to&nbsp;view large faint objects like galaxies?</span></li><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Do you want a telescope that is lightweight and portable?</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Are you interested in astrophotography?</span></li></ul><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">In the case of a limited budget, you might need to lower your expectations. Consider whether you want to outlay more to meet your expectations or start with something within your budget and gain confidence before making that larger outlay?</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Not all telescope types are suited to astrophotography. The Dobsonian telescopes, for example, are not ideal for this unless you just want simple shots of the Moon as they can’t track objects across the night sky to allow good astrophotography.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">My research and experience suggests that the ideal astrophotography set up is way above this entry level price range in telescopes.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h3 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Flimsy tripods  </span></h3><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">In this budget range of under 200, watch for tripods that are flimsy. A good stable tripod will make a difference when trying to view objects in the sky and avoid you experiencing a lot of frustration. </span></p><span data-dcnode-id="589" instrument_node="">
</span><h3 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Automatic positioning</span></h3><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">If you are wanting a telescope with automatic positioning (Go-Tos), you’ll find I cover these in </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-telescope-for-viewing-planets/"><span data-dcnode-id="584" instrument_node="">my article that looks at telescopes for viewing planets</span></a><span data-dcnode-id="582" instrument_node="">.&nbsp;You’ll pay more for these types of telescopes.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">With a budget that’s under 200, your option is a telescope with manual positioning. </span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">A manual way of positioning is fine. It just means you’ll need know the positions of celestial objects at specific times at your location and set your telescope up to target accordingly.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="573" instrument_node="">As a beginner, this is a good way to broaden your knowledge of astronomy and there are ample </span><a data-dcnode-id="571" data-id="18542" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/tips-on-using-sky-maps-and-star-charts/"><span data-dcnode-id="572" instrument_node="">sky maps</span></a><span data-dcnode-id="570" instrument_node=""> online, </span><a data-dcnode-id="568" data-id="23014" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-books-to-learn-astronomy-as-a-beginner/"><span data-dcnode-id="569" instrument_node="">amateur astronomy books</span></a><span data-dcnode-id="567" instrument_node="">, and apps that can help you out. </span></p><span data-dcnode-id="565" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="564" id="final-thoughts-on-best-telescopes-under-200"></span><h2 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Final thoughts on best telescopes under 200</span></h2><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">I hope you’ve gleaned some understanding of what’s on offer when seeking a best telescope for beginners under $200. </span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Again…what’s the best telescope to buy? Answer: One that you’ll use. No joke. Whether you’re looking for the best budget telescope for beginners, top rated telescopes for advanced users, or a telescope for kids, this principle applies. </span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">One that’s enjoyed and gets used the most is the best telescope to buy. </span></p><span data-dcnode-id="552" instrument_node="">

</span><p data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">If you are on a tight budget, apart from a cheap telescope, you could instead consider </span><a data-dcnode-id="540" data-id="12306" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-binoculars-for-astronomy/"><span data-dcnode-id="541" instrument_node="">getting a good set of binoculars for astronomy</span></a><span data-dcnode-id="539" instrument_node=""> instead.</span></p><span data-dcnode-id="537" instrument_node="">
