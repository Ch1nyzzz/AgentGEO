</span><span class="posted-on" data-dcnode-id="810"><time class="updated" data-dcnode-id="813" datetime="2022-03-16T05:50:59+00:00" itemprop="dateModified"><span data-dcnode-id="814" instrument_node="">March 16, 2022</span></time><time class="entry-date published" data-dcnode-id="811" datetime="2020-07-01T17:11:31+00:00" itemprop="datePublished"><span data-dcnode-id="812" instrument_node="">July 1, 2020</span></time></span><span data-dcnode-id="809" instrument_node=""> </span><span class="byline" data-dcnode-id="803"><span data-dcnode-id="808" instrument_node="">by </span><span class="author vcard" data-dcnode-id="804" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/author/p7sdh/" itemprop="url" rel="author" title="View all posts by Marcus"><span class="author-name" data-dcnode-id="806" itemprop="name"><span data-dcnode-id="807" instrument_node="">Marcus</span></span></a></span></span><span data-dcnode-id="802" instrument_node=""> </span></div><span data-dcnode-id="800" instrument_node="">

</span><div class="featured-image page-header-image-single" data-dcnode-id="794"><span data-dcnode-id="797" instrument_node="">
</span><img alt="Jupiter-and-moons-via-sct-8-public-domain-from-flickr" class="attachment-full size-full" data-dcnode-id="796" height="492" itemprop="image" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr.jpg&amp;raw" srcset="https://telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr.jpg 800w, https://telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr-300x185.jpg 300w, https://telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr-768x472.jpg 768w" width="800"><span data-dcnode-id="795" instrument_node="">

</span><div class="entry-content" data-dcnode-id="418" itemprop="text"><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">If you own a telescope you may be wondering what magnification works best for observing </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Jupiter</div><div class=glossaryItemBody>Planet of the Solar System, fifth from the Sun. It is the largest planet in our solar system(...)</div>" data-dcnode-id="789" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/jupiter/" target="_blank"><span data-dcnode-id="790" instrument_node="">Jupiter</span></a><span data-dcnode-id="788" instrument_node=""> and what features are you likely to see? Moons? Rings? The Great Red Spot? You know how great Jupiter looks through the eyes of NASA, but what about Jupiter through telescope types available to you…</span></p><span data-dcnode-id="786" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="781"><a data-dcnode-id="784" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-through-telescope-moons-too.jpg" rel="noopener noreferrer" target="_blank"><img alt="Jupiter through telescope of NASA and it's four larger moons" class="wp-image-20313" data-dcnode-id="785" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-through-telescope-moons-too.jpg&amp;raw"></a><figcaption data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Beautiful image of Jupiter and it’s four Galilean moons</span></figcaption></figure><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="779" instrument_node="">From music and the arts to its place in the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Solar System</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Solar System&amp;lt;/strong&amp;gt; (def): The Earth is one of 8 planets orbiting the Sun in the Solar System. The(...)</div>" data-dcnode-id="777" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/solar-system/" target="_blank"><span data-dcnode-id="778" instrument_node="">solar system</span></a><span data-dcnode-id="776" instrument_node="">, as the biggest </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>solar</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Solar&amp;lt;/strong&amp;gt; (def): of the Sun. Adjective.</div>" data-dcnode-id="774" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/solar/" target="_blank"><span data-dcnode-id="775" instrument_node="">solar</span></a><span data-dcnode-id="773" instrument_node=""> system </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>planet</div><div class=glossaryItemBody>A planet is a large celestial body that orbits a star. In our solar system, there are eight(...)</div>" data-dcnode-id="771" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/planet/" target="_blank"><span data-dcnode-id="772" instrument_node="">planet</span></a><span data-dcnode-id="770" instrument_node="">, Jupiter has always conveyed </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>magnitude</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Magnitude&amp;lt;/strong&amp;gt; (def): In the context of a celestial body, its brightness as a measure, either(...)</div>" data-dcnode-id="768" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/magnitude/" target="_blank"><span data-dcnode-id="769" instrument_node="">magnitude</span></a><span data-dcnode-id="767" instrument_node=""> and majesty.</span></p><span data-dcnode-id="765" instrument_node="">
</span><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The standout Jupiter features</span></h2><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="761" instrument_node="">Jupiter has moons, rings, and clouds (as covered </span><a class="rank-math-link" data-dcnode-id="759" href="#moons"><span data-dcnode-id="760" instrument_node="">below</span></a><span data-dcnode-id="758" instrument_node="">), but the most distinctive feature of the planetary king of our solar system is the </span><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Great Red Spot. </span></strong></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="753" instrument_node="">Visible since the early 19</span><sup data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">th</span></sup><span data-dcnode-id="750" instrument_node=""> century, Jupiter’s Great Red Spot as seen from </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Earth</div><div class=glossaryItemBody>Where we live. The third planet from the Sun in the Solar System, the Earth rotates once per(...)</div>" data-dcnode-id="748" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/earth/" target="_blank"><span data-dcnode-id="749" instrument_node="">Earth</span></a><span data-dcnode-id="747" instrument_node=""> is really a massive storm (bigger than Earth itself!) that rotates clockwise. </span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Such storms on Jupiter rage for hours, weeks, or even centuries and can generate wind speeds of up to 100 miles per second.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h3 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Jupiter through telescope: what are you likely to see? </span></h3><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Jupiter has an apparent diameter of 45 arcseconds. When viewing Jupiter through </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-telescope-for-viewing-planets/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="737" instrument_node="">telescope types, particularly ones best suited for viewing planets</span></a><span data-dcnode-id="735" instrument_node="">, you should see several cloud bands made up of zones (lighter bands) and belts (darker bands) running parallel to the equator from north to south. </span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The detail you see will depend on your telescope’s capacity but also on the observational conditions at the time. </span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Though Jupiter is not the closest planet to Earth, it is the king of planets with respect to size and so you’ll get to observe more details of Jupiter through telescope eyepieces than with your naked eye. </span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="714"><strong data-dcnode-id="719"><span data-dcnode-id="726" instrument_node="">Jupiter has an </span><a data-dcnode-id="724" data-id="26968" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/star-brightness-luminosity-and-magnitude-what-to-know/"><span data-dcnode-id="725" instrument_node="">apparent magnitude</span></a><span data-dcnode-id="723" instrument_node=""> or brightness as seen from Earth on average of -2.20. It is brighter than the brightest </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>star</div><div class=glossaryItemBody>Star (def): A spherical mass of plasma held together by gravity. There are several types of(...)</div>" data-dcnode-id="721" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/star/" target="_blank"><span data-dcnode-id="722" instrument_node="">star</span></a><span data-dcnode-id="720" instrument_node=""> in the night sky, Sirius.</span></strong><span data-dcnode-id="718" instrument_node=""> So when it’s comes to </span><a data-dcnode-id="716" data-id="25069" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/how-to-find-planets/"><span data-dcnode-id="717" instrument_node="">finding planets</span></a><span data-dcnode-id="715" instrument_node="">, it is easy to spot.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">Can you see the moons of Jupiter? I cover more of </span><a class="rank-math-link" data-dcnode-id="710" href="#how-to-see-Jupiter"><span data-dcnode-id="711" instrument_node="">what you’re likely to see below</span></a><span data-dcnode-id="709" instrument_node="">. But first, it helps to know what you’re going to be looking at…</span></p><span data-dcnode-id="707" instrument_node="">
</span><h2 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Just how big is Jupiter? </span></h2><span data-dcnode-id="704" instrument_node="">
</span><p class="response-box" data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">Jupiter has a radius of roughly 43,440.7 miles (69,911 km). To put that into context, that’s 318 times bigger than Earth </span><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">and</span></em><span data-dcnode-id="700" instrument_node=""> 2.5 times bigger than all the rest of the planets in the solar system combined. A quote from </span><a class="rank-math-link" data-dcnode-id="698" href="#source"><span data-dcnode-id="699" instrument_node="">NASA</span></a><span data-dcnode-id="697" instrument_node="">: “If Earth were the size of a grape, Jupiter would be the size of a basketball” explains it best.</span></p><span data-dcnode-id="695" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="690"><a data-dcnode-id="693" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/06/Saturn-moons-79.jpg" rel="noopener noreferrer" target="_blank"><img alt="Jupiter facts" class="wp-image-20292" data-dcnode-id="694" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Saturn-moons-79-1024x640.jpg&amp;raw"></a><figcaption data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Jupiter size in relation to other planets and other facts and figures</span></figcaption></figure><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="688" instrument_node="">There’s a catch to this enormity, however – if Jupiter were to get bigger </span><a class="rank-math-link rank-math-link" data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.universetoday.com/15182/interesting-facts-about-jupiter/"><span data-dcnode-id="687" instrument_node="">it would actually </span><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">shrink</span></em></a><span data-dcnode-id="683" instrument_node=""> as gravitational forces of added mass and density would start to pull inward.</span></p><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">While it’s massive, Jupiter is still the fastest spinning planet in the solar system. Jupiter is a giant gas planet, primarily consisting of hydrogen (H</span><sub data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">2</span></sub><span data-dcnode-id="677" instrument_node="">) and helium (He).</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">The Greeks called this planet Zeus, but the Romans renamed it after their  God, Jupiter. The naming, in both cases, reflects the king deity of their pantheons and this understandably corresponds to the king-size of this planet.</span></p><span data-dcnode-id="672" instrument_node="">
</span><h2 data-dcnode-id="670" id="moons"><span data-dcnode-id="671" instrument_node="">How many moons does Jupiter have 2019 tally</span></h2><span data-dcnode-id="669" instrument_node="">
</span><p class="response-box" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Jupiter moons number at least 79. Fifty-three of these are named. The four largest (Ganymede, Io, Callisto, and Europa) were discovered as far back as 1610 by Galileo Galilei, hence, the term “Galilean moons”. These were the first orbital objects, apart from a planet, to be discovered. </span></p><span data-dcnode-id="666" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="662"><figure class="aligncenter size-large" data-dcnode-id="663"><a data-dcnode-id="664" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/06/Jupiter-Galilean-moons-and-chart-of-sizes.jpg" rel="noopener noreferrer" target="_blank"><img alt="Jupiter's moons and chart of sizes" class="wp-image-20369" data-dcnode-id="665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-Galilean-moons-and-chart-of-sizes-768x768.jpg&amp;raw"></a></figure></div><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="660" instrument_node="">The four Galilean moons of Jupiter are some of the largest objects in the solar system, with </span><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Ganymede</span></strong><span data-dcnode-id="657" instrument_node=""> outsizing </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Mercury</div><div class=glossaryItemBody>Mercury is a planet of the Solar System, closet to the Sun, and is one of the four inner(...)</div>" data-dcnode-id="655" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/mercury/" target="_blank"><span data-dcnode-id="656" instrument_node="">Mercury</span></a><span data-dcnode-id="654" instrument_node=""> and so you are likely to see these moons of Jupiter through telescope types available for home use. </span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="651" instrument_node="">Appropriately, all the Galilean moons of Jupiter have been named from figures that the deities of Jupiter and Zeus “interact with”. So, if you are into viewing these moons… check out my article on what you can expect to see and </span><a data-dcnode-id="649" data-id="30465" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/how-to-identify-jupiters-moons/"><span data-dcnode-id="650" instrument_node="">how to identify the moons of Jupiter.</span></a></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">Seeing the four Galilean moons of Jupiter through telescope types setup for planet viewing is possible under the right conditions. More on that </span><a class="rank-math-link" data-dcnode-id="644" href="#how-to-see-Jupiter"><span data-dcnode-id="645" instrument_node="">below</span></a><span data-dcnode-id="643" instrument_node="">.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h2 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Does Jupiter have clouds?</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The stripes and swirls that you see in images are known as the clouds of Jupiter, but these are not the clouds we know of on Earth. NASA tells us these are actually cold, windy clouds of ammonia and water.</span></p><span data-dcnode-id="635" instrument_node="">
</span><h2 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Does Jupiter have rings? Jupiter rings facts</span></h2><span data-dcnode-id="632" instrument_node="">
</span><p class="response-box" data-dcnode-id="624"><span data-dcnode-id="631" instrument_node="">While we typically associate rings with </span><a aria-label="Saturn (opens in a new tab)" class="rank-math-link" data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/how-to-see-saturn/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="630" instrument_node="">Saturn</span></a><span data-dcnode-id="628" instrument_node="">, Jupiter has them as well. Though, the rings of Jupiter are much fainter to observe than the rings of </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Saturn</div><div class=glossaryItemBody>Planet of the Solar System, sixth from the Sun. It&amp;#039;s known for its rings, which can be seen(...)</div>" data-dcnode-id="626" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/saturn/" target="_blank"><span data-dcnode-id="627" instrument_node="">Saturn</span></a><span data-dcnode-id="625" instrument_node="">. Dust comprises most of Jupiter’s rings, involving four components: an inner halo, a bright but thin main ring, and two gossamer outer rings. This compares to Saturn’s rings, which comprise ice. Though, like Saturn’s, the rings of Jupiter are slowly dissipating.</span></p><span data-dcnode-id="623" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="617"><figure class="aligncenter size-large is-resized" data-dcnode-id="618"><a data-dcnode-id="621" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-rings.jpg" rel="noopener noreferrer" target="_blank"><img alt="image showing Jupiter's rings" class="wp-image-20309" data-dcnode-id="622" height="450" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-rings.jpg&amp;raw" width="650"></a><figcaption data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Rings of Jupiter</span></figcaption></figure></div><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Jupiter’s rings and other features are clearly evident in images from spacecraft observations of Jupiter. The Juno Orbiter, the latest spacecraft exploring Jupiter, is among other satellites and spacecraft imaging the giant, including the Pioneer 10, Pioneer 11, Voyager 1, Voyager 2, Ulysses, Cassini, and New Horizons. </span></p><span data-dcnode-id="613" instrument_node="">
</span><h2 data-dcnode-id="611" id="how-to-see-Jupiter"><span data-dcnode-id="612" instrument_node="">How to see Jupiter yourself</span></h2><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">In terms of viewing Jupiter for yourself, the planet’s size and brightness make that far easier to do than many other celestial objects in the night sky.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">First, you’ll want to make sure that Jupiter is actually “in the sky” the night you plan to observe. Of course, it’s “there,” but as celestial bodies move and lighting and darkness conditions change throughout the year, it may be visible some nights more so than others.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><h3 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">How to see the king of planets in the night sky</span></h3><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="600" instrument_node="">Check a </span><a aria-label="star chart (opens in a new tab)" class="rank-math-link" data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/tips-on-using-sky-maps-and-star-charts/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="599" instrument_node="">star chart</span></a><span data-dcnode-id="597" instrument_node=""> or use a star-charting app such as Stellarium to make sure you stand a fair chance of spotting Jupiter through </span><a aria-label="a cheap telescope (opens in a new tab)" class="rank-math-link" data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-telescope-under-200/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="596" instrument_node="">a cheap telescope</span></a><span data-dcnode-id="594" instrument_node="">, </span><a aria-label="binoculars (opens in a new tab)" class="rank-math-link" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-binoculars-for-astronomy/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="593" instrument_node="">binoculars</span></a><span data-dcnode-id="591" instrument_node="">, or even with the naked eye. I find </span><a class="rank-math-link" data-dcnode-id="589" href="#source"><span data-dcnode-id="590" instrument_node="">timeanddate.com</span></a><span data-dcnode-id="588" instrument_node=""> has a useful page for checking the night sky for the planets that are visible on a given night and the time expected at your particular location. </span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">You’ll also want to make sure that you have configured the settings of your star map app for the right hemisphere. What celestial bodies appear at what times in your area will depend on this. </span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">So, make sure you choose your location on Stellarium or check whether the star chart you are using is for the Northern or Southern Hemisphere.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="579" instrument_node="">Jupiter is the third brightest celestial feature most nights after the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Moon</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Moon&amp;lt;/strong&amp;gt; (def): A natural satellite orbiting a planet or other celestial body. Earth has one moon,(...)</div>" data-dcnode-id="577" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/moon/" target="_blank"><span data-dcnode-id="578" instrument_node="">Moon</span></a><span data-dcnode-id="576" instrument_node=""> and </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Venus</div><div class=glossaryItemBody>Venus is the second planet from the Sun, the first being Mercury. Venus, like Earth, is an(...)</div>" data-dcnode-id="574" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/venus-2/" target="_blank"><span data-dcnode-id="575" instrument_node="">Venus</span></a><span data-dcnode-id="573" instrument_node=""> (I wrote about this in </span><a data-dcnode-id="571" data-id="26235" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/what-does-venus-look-like/"><span data-dcnode-id="572" instrument_node="">What Does Venus Look Like Through a Telescope</span></a><span data-dcnode-id="570" instrument_node="">), so if you’re looking at something fairly bright, there’s a reasonable chance you’re on the right track. </span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">That said, you’ll also need the conditions to be reasonably dark and clear. Trying to find Jupiter in a city full of light pollution is difficult.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">If you’re lucky enough to have good viewing conditions, first, locate Jupiter in the night sky with your unaided eyes with the help of a star chart. Next, looking through the telescope, start with low magnification (larger eyepiece focal length) to focus in on the planet. Once you’ve got your telescope lined up, scale-up in magnification (smaller eyepiece focal length). </span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="558"><span data-dcnode-id="561" instrument_node="">By the way, if you need to wear glasses you’re best using eyepieces that cater for the depth you need to comfortably look through the eyepiece. I cover this in </span><a data-dcnode-id="559" data-id="18136" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/using-telescope-with-astigmatism/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="560" instrument_node="">my article on using telescopes with glasses. </span></a></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">To see the bands of Jupiter, you may only need magnification of 100x. For distinguishing the Galilean moons of Jupiter through telescope eyepieces, choose ones that give you say 120x or 150x  magnification. </span></p><span data-dcnode-id="554" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="548"><figure class="aligncenter size-large is-resized" data-dcnode-id="549"><a data-dcnode-id="552" data-featherlight="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr.jpg"><img alt="" class="wp-image-20607" data-dcnode-id="553" height="369" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/wp-content/uploads/2020/09/Jupiter-and-moons-via-sct-8-public-domain-from-flickr.jpg&amp;raw" width="600"></a><figcaption data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Jupiter and moons – 7-16-19 with Europa in transit; image taken via a SCT8 telescope</span></figcaption></figure></div><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Working out eyepiece sizes:</span></strong></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Eyepiece focal length = telescope focal length ÷ magnification</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">So, for example, a 10 mm eyepiece on a scope with a 750 focal length will give you 75x magnification only. To get the 120x to 150x, you’ll need eyepieces in the 5 or 6 mm range. Alternately, using a 2x Barlow </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>lens</div><div class=glossaryItemBody>Lens can refer to telescope optics or gravitational light deflection from distant galaxies.(...)</div>" data-dcnode-id="537" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/lens/" target="_blank"><span data-dcnode-id="538" instrument_node="">lens</span></a><span data-dcnode-id="536" instrument_node=""> with the 10 mm eyepiece would give you 150x magnification. </span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">The chosen magnifications work as long as they are within your telescope’s maximum useful magnification, which is typically listed in its specifications. The telescope’s </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>aperture</div><div class=glossaryItemBody>The size of the primary lens or mirror measured as its diameter in either inches or(...)</div>" data-dcnode-id="531" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/aperture/" target="_blank"><span data-dcnode-id="532" instrument_node="">aperture</span></a><span data-dcnode-id="530" instrument_node=""> size will determine this. As a guide, it&nbsp;is 50 times the aperture in inches (or 2x the aperture in millimeters).</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="527" instrument_node="">I cover how to work out magnifications and eyepiece sizes for planet viewing in more depth in </span><a aria-label=" (opens in a new tab)" class="rank-math-link" data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/best-telescope-eyepieces-to-buy-as-extras/%23best-telescope-eyepiece-for-planets" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="526" instrument_node="">my article on the best eyepieces to use.</span></a></p><span data-dcnode-id="523" instrument_node="">
</span><h3 data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Rings of Jupiter</span></h3><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Even if you crank it up to 150x or even higher, you’ll struggle to spot the Jupiter rings. These are much fainter than the rings of Saturn and they were only discovered in 1979 by NASA’s Voyager 1 spacecraft.</span></p><span data-dcnode-id="517" instrument_node="">
</span><h2 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Best time to see Jupiter</span></h2><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="513" instrument_node="">Your best chance of seeing majestic views of Jupiter is when it is “in </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>opposition</div><div class=glossaryItemBody>In astronomy, &quot;opposition&quot; means that it is on the opposite side of the Earth from the Sun(...)</div>" data-dcnode-id="511" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/opposition/" target="_blank"><span data-dcnode-id="512" instrument_node="">opposition</span></a><span data-dcnode-id="510" instrument_node="">.” This essentially means that Jupiter, the Earth, and the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Sun</div><div class=glossaryItemBody>The star at the center of our Solar System is the Sun. The surface temperature of the Sun is(...)</div>" data-dcnode-id="508" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/sun/" target="_blank"><span data-dcnode-id="509" instrument_node="">sun</span></a><span data-dcnode-id="507" instrument_node=""> are aligned. This happens roughly every 13 months. The closer you are to this point, the easier it is to see Jupiter, as it is when it is closer to and in alignment with the Earth as opposed to elsewhere in its orbit.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">As of this article, the next three Jupiter oppositions will occur on 14 July 2020, August of 2021, and September of 2022. On the 14 July 2020, it is expected to be shining at magnitude –2.8 and spanning 47.6 arcseconds.</span></p><span data-dcnode-id="502" instrument_node="">
</span><h3 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Christmas star</span></h3><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="498" instrument_node="">Jupiter coinciding with Saturn in the night sky is a rare sight. You’ll see this around the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>solstice</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Solstice&amp;lt;/strong&amp;gt; (def): The farthest point either north or south of the equator that the Sun reaches(...)</div>" data-dcnode-id="496" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/solstice/" target="_blank"><span data-dcnode-id="497" instrument_node="">solstice</span></a><span data-dcnode-id="495" instrument_node=""> night sky of 21 December 2020. Look for this </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>conjunction</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Conjunction&amp;lt;/strong&amp;gt; (def): The occasion when two celestial bodies align on the celestial sphere; this(...)</div>" data-dcnode-id="493" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/conjunction/" target="_blank"><span data-dcnode-id="494" instrument_node="">conjunction</span></a><span data-dcnode-id="492" instrument_node=""> low in the west at dusk.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="489" instrument_node="">Colloquially called, the Christmas </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>star</div><div class=glossaryItemBody>Star (def): A spherical mass of plasma held together by gravity. There are several types of(...)</div>" data-dcnode-id="487" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/star/" target="_blank"><span data-dcnode-id="488" instrument_node="">Star</span></a><span data-dcnode-id="486" instrument_node="">, it’s spectacular and rare to view Jupiter and Saturn together like this from Earth, an event that has not been seen for hundreds of years.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="483" instrument_node="">You’ll see Jupiter with Saturn in the same </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>field of view</div><div class=glossaryItemBody>Area of the sky that you see through an optical instrument. This applies to telescopes,(...)</div>" data-dcnode-id="481" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/field-of-view/" target="_blank"><span data-dcnode-id="482" instrument_node="">field of view</span></a><span data-dcnode-id="480" instrument_node="">. Jupiter will be the brightest of the two, and Saturn will be in a tilted position beside it. With the right magnification, you should see the major moons of Jupiter.</span></p><span data-dcnode-id="478" instrument_node="">
</span><h2 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">What about seeing Jupiter’s most notable feature, the Great Red Spot?</span></h2><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">That will be tricky, even if you crank up the magnification on your home telescope.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Jupiter’s brightness and size are one thing to see, but for something that specific, you often need a slightly more refined telescope, though there’s nothing wrong with giving it a try and seeing if you can get lucky.</span></p><span data-dcnode-id="469" instrument_node="">
</span><h2 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">What makes Jupiter majestic?</span></h2><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="465" instrument_node="">Jupiter is possibly one of those few celestial bodies claiming a majestically exalted place not only in the </span><a aria-describedby="tt" class="glossaryLink" data-cmtooltip="<div class=glossaryItemTitle>Cosmos</div><div class=glossaryItemBody>&amp;lt;strong&amp;gt;Cosmos&amp;lt;/strong&amp;gt; (def): Another name for the observable universe as a whole.</div>" data-dcnode-id="463" data-gt-translate-attributes="[{&quot;attribute&quot;:&quot;data-cmtooltip&quot;, &quot;format&quot;:&quot;html&quot;}]" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/glossary/cosmos/" target="_blank"><span data-dcnode-id="464" instrument_node="">cosmos</span></a><span data-dcnode-id="462" instrument_node=""> but also in our hearts. At least…if you listen to Gustav Holst’s orchestral suite “The Planets” (and really, what better music to stargaze by?), you’ll find the Jupiter section to be among the most triumphant and jubilant. </span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Small wonder Holst named the Jupiter section “The Bringer of Jollity,” or why the United Kingdom adapted its music in 1921 for the post-WWI patriotic hymn “I Vow to Thee, My Country.”</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">As the biggest and most massive planet in the solar system (and we’ll soon get to how massive this gas giant really is), Jupiter has been visible since antiquity. </span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">While it may be the “Bringer of Jollity,” things are far from peaceful within the atmosphere of this gas giant. </span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">With all the above mind, we can see that Jupiter is special and worth trying to get a good view through your</span><a aria-label="a home telescope (opens in a new tab)" class="rank-math-link rank-math-link" data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//telescopenights.com/what-you-can-expect-to-see-with-a-home-telescope/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="449" instrument_node=""> home telescope</span></a><span data-dcnode-id="447" instrument_node="">.</span></p><span data-dcnode-id="445" instrument_node="">
</span><h2 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Final thoughts</span></h2><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Just as his namesake looms large in Greco-Roman mythology, so too does Jupiter loom large in our solar system and, indeed, our imaginations. Since human beings have turned their eyes skyward, it has always been one of the most recognizable features in the night sky. If you are interested in astronomy, taking your telescope and trying to find “The Bringer of Jollity” can certainly bring joy and a sense of awe.</span></p><span data-dcnode-id="439" instrument_node="">
