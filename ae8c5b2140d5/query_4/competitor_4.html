</span><h1 class="entry-title" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Telescope Lenses: A Basic Primer</span></h1><span data-dcnode-id="1355" instrument_node="">

</span><picture data-dcnode-id="1328"><source data-dcnode-id="1332" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2021/04/male20171084013724304.jpg.webp" srcset="https://opticgearlab.com/wp-content/uploads/2021/04/male20171084013724304.jpg.webp" type="image/webp"><img class="avatar pp-user-avatar avatar-100 photo webpexpress-processed entered lazyloaded" data-dcnode-id="1331" data-del="avatar" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2021/04/male20171084013724304.jpg" data-ll-status="loaded" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2021/04/male20171084013724304.jpg&amp;raw" width="100"><noscript data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">&lt;img data-del="avatar" src="https://opticgearlab.com/wp-content/uploads/2021/04/male20171084013724304.jpg" class="avatar pp-user-avatar avatar-100 photo  webpexpress-processed" height="100" width="100"&gt;</span></noscript></picture><span data-dcnode-id="1327" instrument_node=""> </span></div><span data-dcnode-id="1325" instrument_node="">
</span><div class="meta-author-wrapped" data-dcnode-id="1318"><span data-dcnode-id="1324" instrument_node="">Written by </span><span class="vcard author" data-dcnode-id="1320"><span class="fn" data-dcnode-id="1321"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/author/kane-dane"><span data-dcnode-id="1323" instrument_node="">Kane Dane</span></a></span></span><span data-dcnode-id="1319" instrument_node="">
</span></div><span data-dcnode-id="1317" instrument_node="">
</span></div><span data-dcnode-id="1315" instrument_node="">
</span><div class="entry-content" data-dcnode-id="990"><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">The first thing that meets your eye when you look through a telescope is the telescope eyepiece. The name is appropriate because this is the lens that is closest to your eye when you look through the telescope.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The eyepiece is a type of lens that in fact determines the amount of magnification. Actually, the focal point of the eyepiece determines the magnification, but we’ll get to that part a little later in this text.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Another important part of the telescope is the telescope lens. Depending on the type of construction of the telescope, there can be one or several lenses. Let’s talk a bit more about the basics of lenses and their properties.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><h2 data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Definition of lens and basics</span></h2><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">A lens is an optical device that transmits a light beam by refracting it. The lens is most commonly made from glass, and/or some types of plastic and the material is ground and polished to the proper shape. The basic operating principle of a lens is that it focuses the light to create an image.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1293"><picture data-dcnode-id="1294"><source data-dcnode-id="1298" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-768x512.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-810x539.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose.jpg.webp 1024w" sizes="(max-width: 680px) 100vw, 680px" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-768x512.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-810x539.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose.jpg.webp 1024w" type="image/webp"><img alt="telescope upclose" class="alignnone size-large wp-image-4076 webpexpress-processed entered lazyloaded" data-dcnode-id="1297" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose.jpg 1024w" data-ll-status="loaded" height="453" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg&amp;raw" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose.jpg 1024w" width="680"><noscript data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">&lt;img class="alignnone size-large wp-image-4076 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg" alt="telescope upclose" width="680" height="453" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-upclose.jpg 1024w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Most lenses are spherical lenses – the surfaces of the lens are a part of a sphere. The surfaces can be convex (protruding outwards), concave (depressed inwards) or planar (flat).</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">The lenses that focus the light beam into a focus spot are called positive or converging lens; the lenses that scatter the light beam are called negative or diverging lenses. These types of lenses are the most common in telescopes, binoculars, monocular and other optical instruments, and the ones we’ll talk about some more.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><h3 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">What is aperture?</span></h3><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">On the front part of the telescope, the diameter of the opening where the light enters is called the aperture and is most commonly measured in inches or mm. This is also an important measure when we talk about telescopes and other optical devices that are directly dependent on light.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1274"><picture data-dcnode-id="1275"><source data-dcnode-id="1279" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-350x234.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1.jpg.webp 700w" sizes="(max-width: 680px) 100vw, 680px" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-350x234.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1.jpg.webp 700w" type="image/webp"><img alt="telescope on rocks" class="alignnone size-large wp-image-4077 webpexpress-processed entered lazyloaded" data-dcnode-id="1278" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-350x234.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1.jpg 700w" data-ll-status="loaded" height="454" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg&amp;raw" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-350x234.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1.jpg 700w" width="680"><noscript data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">&lt;img class="alignnone size-large wp-image-4077 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg" alt="telescope on rocks" width="680" height="454" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1-350x234.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-on-rocks-1.jpg 700w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The aperture of a telescope is usually the diameter of the lens or mirror to the edges that hold it in place. The aperture is given in linear measurements, and when speaking about the performance of a telescope, this is a very important measure to know.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><h3 data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">What is focal length?</span></h3><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The point where the beam of light that passes through the lens is called a focus and the length between the center of the lens and the focus point is called focal point. This is the most important measure for the lens.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">The focal length is measured in millimeters (mm) and it points to the power of magnification of the telescope. The longer the focal length of a telescope eyepiece is, the higher the magnification and narrower field of view and vice versa.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><h3 data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">How is magnification power measured?</span></h3><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">We have mentioned above that the focal length is in direct correlation to the magnification power of the telescope. The magnification power is the resulting number of dividing the focal length of the telescope and the focal length of the eyepiece.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1249"><picture data-dcnode-id="1250"><source data-dcnode-id="1254" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-768x511.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-810x539.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1.jpg.webp 1140w" sizes="(max-width: 680px) 100vw, 680px" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-768x511.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-810x539.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1.jpg.webp 1140w" type="image/webp"><img alt="telescope" class="alignnone size-large wp-image-4078 webpexpress-processed entered lazyloaded" data-dcnode-id="1253" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-768x511.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1.jpg 1140w" data-ll-status="loaded" height="453" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg&amp;raw" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-768x511.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1.jpg 1140w" width="680"><noscript data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">&lt;img class="alignnone size-large wp-image-4078 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg" alt="telescope" width="680" height="453" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-768x511.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1-810x539.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-1.jpg 1140w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">So, by using telescope eyepieces with different focal lenses, you will get different degrees of magnification, thus getting the most of your telescope.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">We should note here that there is a limit to the magnification power of the telescope, and this is called highest useful magnification. Going above the highest useful magnification means that the image will have low contrast and will be dim.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The common rule is that the highest useful magnification is 60 times the aperture of the telescope. For example, a telescope with 6-inch aperture will have a maximum power of 6 x 60 = 360x. Do not be fooled when someone will advertise a telescope with a ridiculously high power of magnification, and with very small aperture.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><h3 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">What are exit pupil and eye relief?</span></h3><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The exit pupil is the image of the object that is created by the eyepiece. The exit pupil size is the ratio between the aperture and the magnification of the telescope. The distance where you put your eye to see the full field of view in relation to the eyepiece is called the eye relief and is directly correlated to the exit pupil.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1227"><picture data-dcnode-id="1228"><source data-dcnode-id="1232" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-350x263.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-768x576.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-810x608.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured.jpg.webp 1024w" sizes="(max-width: 680px) 100vw, 680px" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-350x263.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-768x576.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-810x608.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured.jpg.webp 1024w" type="image/webp"><img alt="" class="alignnone size-large wp-image-4079 webpexpress-processed entered lazyloaded" data-dcnode-id="1231" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-350x263.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-768x576.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-810x608.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured.jpg 1024w" data-ll-status="loaded" height="510" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg&amp;raw" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-350x263.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-768x576.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-810x608.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured.jpg 1024w" width="680"><noscript data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">&lt;img class="alignnone size-large wp-image-4079 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg" alt="" width="680" height="510" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-680x510.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-350x263.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-768x576.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured-810x608.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/national-geographic-telescope-featured.jpg 1024w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The increase of the power of the telescope lowers the exit pupil. Also, the human eye has a pupil that extends between 0.5mm and 7mm, so when you are looking for appropriate eyepieces for your telescope, the exit pupil size (in relation to the telescope) should be between 2mm and 6mm.</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The eye relief is an important factor with the telescope eyepiece. The larger eye relief means that the optimal viewing distance is further from the eyepiece, facilitating the viewing. But too large eye relief makes it harder for the viewer to remain the correct viewing position.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">The most common eye relief distances are between 2mm and 20mm. This length should accommodate for the human eyelashes and should not cause discomfort. People wearing eyeglasses should consider longer eye relief to accommodate for glasses.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h3 data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">What is a field of view?</span></h3><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Short definition – field of view is the extent of the observable world seen at a given moment. In terms of telescope eyepieces, the field of view is the area that can be seen when looking through the eyepiece.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1205"><picture data-dcnode-id="1206"><source data-dcnode-id="1210" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-768x512.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-810x540.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount.jpg.webp 1024w" sizes="(max-width: 680px) 100vw, 680px" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-768x512.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-810x540.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount.jpg.webp 1024w" type="image/webp"><img alt="" class="alignnone size-large wp-image-4080 webpexpress-processed entered lazyloaded" data-dcnode-id="1209" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-810x540.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount.jpg 1024w" data-ll-status="loaded" height="454" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg&amp;raw" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-810x540.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount.jpg 1024w" width="680"><noscript data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&lt;img class="alignnone size-large wp-image-4080 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg" alt="" width="680" height="454" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-680x454.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount-810x540.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/telescope-mount.jpg 1024w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">This measurement varies depending on the magnification and design of the eyepieces. This is important to know when considering the size of the sky that will be visible when the eyepiece is used.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><h3 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Barrel diameter of the eyepiece</span></h3><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">The eyepiece on a telescope is interchangeable. This way they can accommodate increase and decrease of the magnification, and enable the viewer to have a more varied performance from the same telescope. For this to happen, the telescope eyepieces come in standardized barrel diameter.</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">The telescope eyepieces come in six standard barrel diameters, measured in inches:</span></p><span data-dcnode-id="1192" instrument_node="">
</span><ul data-dcnode-id="1142"><span data-dcnode-id="1191" instrument_node="">
</span><li data-dcnode-id="1184"><strong data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">0.965 in</span></strong><span data-dcnode-id="1188" instrument_node=""> – usually found in small telescopes like toy telescopes or shopping mall retail telescopes. These are usually </span><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">made from plastic</span></strong><span data-dcnode-id="1185" instrument_node=""> and even have plastic lenses. More expensive manufacturers usually do not produce this kind of standard barrel diameter eyepiece.</span></li><span data-dcnode-id="1183" instrument_node="">
</span><li data-dcnode-id="1176"><strong data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">1.25 in</span></strong><span data-dcnode-id="1180" instrument_node=""> – the most common and popular eyepiece diameter. This eyepiece barrel diameter is </span><strong data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">limited to a 32mm focal length</span></strong><span data-dcnode-id="1177" instrument_node="">, because of the actual diameter of the barrel and the physical limit of its size. This telescope eyepiece barrel diameter is an excellent choice for the beginner size telescopes. It works with 30mm filters.</span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1168"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">2 in</span></strong><span data-dcnode-id="1172" instrument_node=""> – the 2-inch eyepiece barrel diameter has a </span><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">focal limit of 55mm</span></strong><span data-dcnode-id="1169" instrument_node="">, and gives more freedom in viewing, but can be more expensive, and heavier, even tipping the telescope. These work with 48mm filters.</span></li><span data-dcnode-id="1167" instrument_node="">
</span><li data-dcnode-id="1160"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">2.7 in</span></strong><span data-dcnode-id="1164" instrument_node=""> – these eyepiece barrel diameters are </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">more expensive and are made by fewer manufacturers</span></strong><span data-dcnode-id="1161" instrument_node="">. These have nice, wide field of view.</span></li><span data-dcnode-id="1159" instrument_node="">
</span><li data-dcnode-id="1152"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">3 in</span></strong><span data-dcnode-id="1156" instrument_node=""> – the 3-inch barrel diameter allows for </span><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">120 degrees of field of view</span></strong><span data-dcnode-id="1153" instrument_node=""> and very long focal lengths. These are, however, very expensive and heavy and only large telescopes can accept them.</span></li><span data-dcnode-id="1151" instrument_node="">
</span><li data-dcnode-id="1144"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">4 in</span></strong><span data-dcnode-id="1148" instrument_node=""> – the largest barrel diameter eyepieces, these are </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">used only in observatories</span></strong><span data-dcnode-id="1145" instrument_node="">. They are made by highly specialized manufacturers.</span></li><span data-dcnode-id="1143" instrument_node="">
</span></ul><span data-dcnode-id="1141" instrument_node="">
</span><h2 data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Telescope eyepiece design</span></h2><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Above we have mentioned the basics related to the telescope eyepiece. Now we shall get more into the design, and mention the various models of eyepieces available.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Galilean (negative) lens eyepiece</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">The simple negative lens placed in front of the focus of the objective gives an erect image but has a low field of view and suits low magnification. This is found on very cheap telescopes and binoculars.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1123"><picture data-dcnode-id="1124"><source data-dcnode-id="1128" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-680x453.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-350x233.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-768x512.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-810x540.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length.jpg.webp 1140w" sizes="(max-width: 680px) 100vw, 680px" type="image/webp"><img alt="" class="alignnone size-large wp-image-4075 webpexpress-processed" data-dcnode-id="1127" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-680x453.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-810x540.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length.jpg 1140w" height="453" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20680%20453'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">&lt;img class="alignnone size-large wp-image-4075 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-680x453.jpg" alt="" width="680" height="453" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-680x453.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-350x233.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-768x512.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length-810x540.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/focal-length.jpg 1140w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1122" instrument_node="">
</span><h3 data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Convex lens eyepiece</span></h3><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">The simple convex lens placed after the focus gives and inverted magnified image. This kind of eyepiece was used in the past but rarely used today.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><h3 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Huygens and Ramsden eyepiece</span></h3><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">These two designs are very similar, but not very good by today’s standards. The Huygens lens eyepiece can still be found on cheaply made telescopes, where the Ramsden lens eyepiece is not in use in modern telescopes.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><h3 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Kellner (Achromatic) eyepiece</span></h3><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The Kellner eyepiece has 3 – lens design. They are inexpensive to make and have good low to medium magnification with good image reproduction. Their design requires for the suitable surface coating to prevent internal reflections. These are a good choice for telescopes with small to medium apertures.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Plossl (Symmetrical) eyepiece</span></h3><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">The most common eyepiece design on the market today is the Plossl eyepiece. It consists of two sets of identical doublets (double lenses with a different shape). The Plossl lens has a field of view of 50 – 52 degrees, making it very useful for planetary observation and deep sky viewing.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1092"><picture data-dcnode-id="1093"><source data-dcnode-id="1097" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-680x612.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-350x315.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-768x691.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-810x729.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses.jpg.webp 1140w" sizes="(max-width: 680px) 100vw, 680px" type="image/webp"><img alt="Telescope_Lenses" class="alignnone size-large wp-image-4081 webpexpress-processed" data-dcnode-id="1096" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-680x612.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-680x612.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-350x315.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-768x691.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-810x729.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses.jpg 1140w" height="612" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20680%20612'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">&lt;img class="alignnone size-large wp-image-4081 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-680x612.jpg" alt="Telescope_Lenses" width="680" height="612" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-680x612.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-350x315.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-768x691.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses-810x729.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Telescope_Lenses.jpg 1140w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The Plossl eyepiece has shorter eye relief than other more common eyepiece designs, which can be somewhat limiting for eyeglass wearers. However, today it is a very popular design, and the name Plossl covers a variety of eyepieces with four or five optical elements.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">The quality of these depends on the materials used and the production process. There are noticeable differences between a cheap and a more quality made Plossl lens eyepiece.</span></p><span data-dcnode-id="1085" instrument_node="">
</span><h3 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Orthoscopic (Abbe) eyepiece</span></h3><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">This eyepiece has a very good design, having an almost perfect image quality and good eye relief. However, the narrow field of view of 40 degrees, and the increase of the popularity of the Plossl eyepiece, these have fallen out of use in more recent times.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h3 data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Monocentric eyepiece</span></h3><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">This design has achromatic triplet lens (lens containing three different shaped lenses cemented together), with curved surfaces that have a common center.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1067"><picture data-dcnode-id="1068"><source data-dcnode-id="1072" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-680x468.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-350x241.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-768x528.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-810x557.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-145x100.jpg.webp 145w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b.jpg.webp 1024w" sizes="(max-width: 680px) 100vw, 680px" type="image/webp"><img alt="telescope" class="alignnone size-large wp-image-4082 webpexpress-processed" data-dcnode-id="1071" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-680x468.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-680x468.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-350x241.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-768x528.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-810x557.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-145x100.jpg 145w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b.jpg 1024w" height="468" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20680%20468'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">&lt;img class="alignnone size-large wp-image-4082 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-680x468.jpg" alt="telescope" width="680" height="468" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-680x468.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-350x241.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-768x528.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-810x557.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b-145x100.jpg 145w, https://opticgearlab.com/wp-content/uploads/2017/08/3461850112_2bb82fb0db_b.jpg 1024w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">This kind of eyepiece gives high contrasting images and is preferred among planetary observers.</span></p><span data-dcnode-id="1063" instrument_node="">
</span><h3 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Erfle eyepiece</span></h3><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">This design has 5 optical elements and gives the very wide field of view of about 60 degrees. These are popular because of their large eye lenses, good eye relief and comfort of use.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><h3 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">König eyepiece</span></h3><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">This is sort of simplified orthoscopic design; it has high magnification with remarkable eye relief and a field of view of about 55 degrees. This is also a popular design with similar performance as the Plossl eyepiece.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><h3 data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">RKE eyepiece</span></h3><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">This design is a variation of the Kellner eyepiece, with a wider field of view.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><h3 data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Nagler eyepiece</span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">This design has a several different elements and a very wide field of view of 82 degrees.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1033"><picture data-dcnode-id="1034"><source data-dcnode-id="1038" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-680x458.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-350x236.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-768x517.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-810x546.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12.jpg.webp 879w" sizes="(max-width: 680px) 100vw, 680px" type="image/webp"><img alt="lenses" class="alignnone size-large wp-image-4083 webpexpress-processed" data-dcnode-id="1037" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-680x458.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-680x458.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-350x236.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-768x517.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-810x546.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12.jpg 879w" height="458" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20680%20458'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">&lt;img class="alignnone size-large wp-image-4083 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-680x458.jpg" alt="lenses" width="680" height="458" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-680x458.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-350x236.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-768x517.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12-810x546.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Screenshot_4-12.jpg 879w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">The optical elements inside are combined in such a way that the viewer gets a very good quality image with long focal length and eye relief. They are, however, very expensive and heavy, and are considered as a luxury for enthusiasts.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><h3 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The basics about Barlow lens</span></h3><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Another type of lens commonly used with telescopes is the Barlow lens. This is a very useful accessory to any telescope eyepiece. This is a diverging lens which is used in series in an optical system increasing the focal length of the optical system.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Now in simple words: the Barlow lens practically doubles the magnification of the image.This is an inexpensive method of increasing the magnifying power of your telescope. The standard Barlow lens has 2x magnification and connects directly under the eyepiece, doubling its magnification.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">There is also a 3x Barlow lens, and even adjustable Barlow lenses are available, however, these do not fit all the telescopes.The Barlow lens is housed in a tube that is one Barlow focal length long – so you will get a 2x magnification. If the length of a 2x Barlow lens is doubled, then it will become 3x Barlow lens and so forth.</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1011"><picture data-dcnode-id="1012"><source data-dcnode-id="1016" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-680x455.jpg.webp 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-350x234.jpg.webp 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-768x514.jpg.webp 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-810x542.jpg.webp 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens.jpg.webp 1024w" sizes="(max-width: 680px) 100vw, 680px" type="image/webp"><img alt="" class="alignnone size-large wp-image-4084 webpexpress-processed" data-dcnode-id="1015" data-lazy-sizes="(max-width: 680px) 100vw, 680px" data-lazy-src="https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-680x455.jpg" data-lazy-srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-680x455.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-350x234.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-768x514.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-810x542.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens.jpg 1024w" height="455" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20680%20455'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&lt;img class="alignnone size-large wp-image-4084 webpexpress-processed" src="https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-680x455.jpg" alt="" width="680" height="455" srcset="https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-680x455.jpg 680w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-350x234.jpg 350w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-768x514.jpg 768w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens-810x542.jpg 810w, https://opticgearlab.com/wp-content/uploads/2017/08/Vivitar_Series_1_Solid_Catadioptric_600mm_f8_lens.jpg 1024w" sizes="(max-width: 680px) 100vw, 680px"&gt;</span></noscript></picture></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">These lenses are great and affordable, but they have its limitations. The image you will receive through a Barlow lens will be slightly degraded, due to the extra layer of glass through which the light passes through.The Barlow lens should be chosen to fit the barrel diameter of your eyepiece; it is installed into the focuser and the eyepiece is connected to it.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><h2 data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">How to use the telescope eyepiece?</span></h2><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">The eyepiece consists of optical elements contained in the housing. The image is brought in focus by bringing the eyepiece nearer or further from the objective. Most eyepieces have internal focusing mechanism to allow focusing.Here we have to note that the quality of the image seen through your telescope is a result of several factors: the quality of the eyepiece, the quality of the lenses, and the viewing conditions.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h2 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Concluding thoughts</span></h2><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">In simple words: your telescope is as good as the eyepiece you are using. Even with a more quality telescope, with a low-quality eyepiece, the image you will see will be of poor quality.So, now you know the basics related to telescope eyepieces and lenses. Make sure that you use the best one you can afford to get the most of your telescope.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">And also, make sure you share your thoughts and experiences with us in the comments below.</span></strong></p><span data-dcnode-id="991" instrument_node="">
