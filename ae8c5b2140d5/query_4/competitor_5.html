</span><h1 data-dcnode-id="2412"><center data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Best Telescope Under $2000 (Essential 2022 Buying Guide)</span></center></h1><span data-dcnode-id="2411" instrument_node="">
</span></div><span data-dcnode-id="2409" instrument_node="">
</span></div><span data-dcnode-id="2407" instrument_node="">
</span></div><span data-dcnode-id="2405" instrument_node="">
</span><div class="site grid-container container hfeed grid-parent" data-dcnode-id="186" id="page"><span data-dcnode-id="2404" instrument_node="">
</span><div class="site-content" data-dcnode-id="188" id="content"><span data-dcnode-id="2403" instrument_node="">
</span><div class="content-area grid-parent mobile-grid-100 grid-65 tablet-grid-65" data-dcnode-id="244" id="primary"><span data-dcnode-id="2402" instrument_node="">
</span><main class="site-main" data-dcnode-id="246" id="main"><span data-dcnode-id="2401" instrument_node="">
</span><article class="post-1919 post type-post status-publish format-standard has-post-thumbnail category-guides category-reviews no-featured-image-padding" data-dcnode-id="301" id="post-1919" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2400" instrument_node="">
</span><div class="inside-article" data-dcnode-id="303"><span data-dcnode-id="2399" instrument_node="">
</span><div class="entry-content" data-dcnode-id="332" itemprop="text"><span data-dcnode-id="2398" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="2380" style="margin: 8px 0; clear: both;"><span data-dcnode-id="2397" instrument_node="">
</span><span data-dcnode-id="2395" instrument_node="">
</span><div data-dcnode-id="2384" id="ezoic-pub-ad-placeholder-103"><span data-dcnode-id="2394" instrument_node="">
</span><span data-dcnode-id="2392" instrument_node="">
</span><span data-dcnode-id="2390" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-7896920432596358" data-ad-format="auto" data-ad-slot="8856885142" data-dcnode-id="2389" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="2388" instrument_node="">
</span><span data-dcnode-id="2385" instrument_node="">
</span></div><span data-dcnode-id="2383" instrument_node="">
</span><span data-dcnode-id="2381" instrument_node="">
</span></div><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">When it comes to purchasing a telescope, the common approach is to sift through dozens if not hundreds of telescopes until you finally decide on one.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">It may be a particular feature, recommendation, or “gut feeling”; either way this takes a considerable amount of time and you may end up with a telescope that isn’t quite what you were looking for.</span></p><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Thankfully, I’ve conducted countless hours of research, discussed spec with numerous fellow astronomers, and run detailed comparisons to find the best telescope for our particular budget.</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Will it be as powerful as a NASA Telescope? Not quite, but at $2000 it will be considerably better than cheaper telescopes in the $100-$500 range. With your budget, you are able to purchase some seriously good kit to observe the night sky.</span></p><span data-dcnode-id="2367" instrument_node="">

</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">The completely automated GoTo mount (and database of 40,000+ celestial objects) plus the innovative SkyAlign technology will get you aligned and observing in minutes.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Regardless of your experience observing the night sky, you can easily and easily isolate a new target of your choice.</span></p><div class="code-block code-block-4" data-dcnode-id="1413" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1429" instrument_node="">
</span><span data-dcnode-id="1427" instrument_node="">

</span></div><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">The specs of this telescope are quite frankly incredible considering the price (it comes in at the bottom of the $2000 budget). It has a focal length of 2032mm (8″) and a max magnification of 480x.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">The 8SE is able to reveal details of even the faintest celestial objects due to its high light-gathering ability. Users report the success of being able to see Cassini’s Division in Saturn’s rings, the cloud bands on Jupiter, and the Great Red Spot.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Outside of the solar system, the 8SE can show you hundreds of pinpoint stars in the Hercules Globular Cluster, the spiral arms of the Whirlpool Galaxy, and far more.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h4 class="section-title" data-dcnode-id="1399"><span data-dcnode-id="1400" id="Pros"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Pros</span></strong></span></h4><span data-dcnode-id="1398" instrument_node="">

</span><li class="joomdev_wpc_pro_single" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">You can control your telescope using your iPhone or iPad with the SkyQ Link, or add GPS functionality with SkySync.</span></li><span data-dcnode-id="1391" instrument_node="">
</span><li class="joomdev_wpc_pro_single" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Fully automated, GoTo mount with a database of 40,000+ celestial objects automatically locates and tracks objects for you.</span></li><span data-dcnode-id="1388" instrument_node="">
</span><li class="joomdev_wpc_pro_single" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">SkyAlign technology aligns the scope quickly (in a couple of minutes). Great for beginners without a knowledge of the night sky.</span></li><span data-dcnode-id="1385" instrument_node="">

</span><h2 data-dcnode-id="567"><span data-dcnode-id="568" id="Finding_The_Best_Telescope"><strong data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Finding The Best Telescope</span></strong></span></h2><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Whether you want to observe the planets and the stars, or delve deeper and explore deep space objects like nebulae, galaxies, comets, and asteroids, then you are going to want to get the best scope you can for your budget.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">There are a lot of things to look out for, particularly spec, functionality, and features. Below I will outline some of the different types of telescopes that are available to purchase:</span></p><span data-dcnode-id="560" instrument_node="">
</span><h3 data-dcnode-id="556"><span data-dcnode-id="557" id="Refractors_vs_Reflectors"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Refractors vs Reflectors</span></strong></span></h3><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="554" instrument_node="">In a simple sense, there are two kinds of telescopes that are available to buy; </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astronomyscope.com/difference-between-reflecting-and-refracting-telescopes/"><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Refractors and Reflectors</span></strong></a><span data-dcnode-id="550" instrument_node="">.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">In many ways they work in a similar fashion; they both use an objective that collects light. However, they mainly differ in the sense that they both use a different kind of objective lens.</span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Refractors utilize a glass lens as their objective. If you are a beginner in astronomy, this typically does not pose a problem or limitation.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">However, glass proves to be an inferior material when used in larger telescopes. This is due to what is known as “lens sagging” – where the weight of glass causes it to sag and bow resulting in a distortion of the images.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Older, traditional and simple Refractor telescopes are called Galilean telescopes. These are not normally used by astronomers in the 21st Century due to their relatively distorted view and a narrow field of view.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">In many ways, they are inconvenient for the modern-day astronomer and you will rarely see them recommended or promoted.</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">A significant improvement in the design led to the modern-day version – the Keplerian telescope.</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">This warrants a much wider field of view and provides greater eye relief.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Additionally, they provide a much higher magnification. However, this all results in their primary disadvantage – images appear inverted (upside-down and left-to-right) to the user.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Reflecting telescopes, on the other hand, utilize mirrors instead of lenses. The primary benefit of this is that it reduces/eliminates the main problems of Refractors.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">The Newtonian telescopes are notable and prove effective for beginners, but some are put off by the design which leads to having to observe an object in the sky from the side of the telescope. The Cassegrain design removes this problem.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Now you may be thinking that any telescope that is not a Cassegrain is automatically inferior considering the factors stated above.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">This is not necessarily true. It is important to note that each type of telescope comes with its own pros and cons. Some are more suited to you than others would be – it ultimately comes down to preference and compromise.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Specific telescope styles may have inconveniences, but this could be in order to provide better quality images and views and a larger resolution for less cost, as an example.</span></p><span data-dcnode-id="509" instrument_node="">
</span><h2 data-dcnode-id="505"><span data-dcnode-id="506" id="Features_To_Consider_In_A_Telescope"><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Features To Consider In A Telescope</span></strong></span></h2><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Alongside an understanding of the different types of telescopes, another thing to consider is the features and functionality.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">It is these very things that ensure you opt for a scope that suits your own unique needs makes sure you get the best quality you can for your budget and the price.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">In order of importance:</span></p><span data-dcnode-id="495" instrument_node="">
</span><h3 data-dcnode-id="491"><span data-dcnode-id="492" id="Aperture"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Aperture</span></strong></span></h3><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">If you are not familiar with the term Aperture; then this is perhaps the most significant spec to consider.</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">The majority of astronomers would agree that Aperture is the central spec that dictates the power of a telescope.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">So, this is one of those things to check on any scope you consider.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">In its simplest sense, Aperture is the terminology used to describe how wide the objective is in the scope.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">It is usually measured in millimeters (mm) and it is the measure of the diameter of the light-gathering objective.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Regardless of whether the objective is a mirror or a lens (Refractor/Reflector), the importance is the size of the objective – the larger it is the sharper and brighter the images provided. So, a larger Aperture means you can observe fainter and more distant objects in the night sky.</span></p><span data-dcnode-id="472" instrument_node="">
</span><h3 data-dcnode-id="468"><span data-dcnode-id="469" id="Focal_Length"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Focal Length</span></strong></span></h3><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Another very important factor to consider is the Focal Length. This is essentially the distance between the objective and the point at which the light rays meet together to focus.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Simply stated, the focal length dictates the magnifying power of a telescope (how much you can “zoom”.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">It follows that the larger the focal length, the more magnification.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">When it comes to identifying what Focal Length is best for you; you should consider what you want to look at. If you want to look at certain celestial objects, a larger focal length could be more appropriate.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">However, if you want to look further afield at more distant solar systems and entire galaxies, a smaller focal length will likely be more advantageous.</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Now, this is where it gets a little difficult.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">A large focal length will only be beneficial if the Aperture of the scope is high enough to start with.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Consider it this way – if you were to zoom into an image with a low resolution you will not be able to identify any detail better than not zooming in at all. It just becomes more blurred.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">However, if you were to zoom into an image with a high resolution – you’ll be able to identify more (and benefit in the process).</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">To identify the magnification of a telescope, there’s a simple calculation that you can run:</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="434" style="text-align: center;"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">2x the objective’s diameter in millimeters.</span></strong></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431" style="text-align: left;"><span data-dcnode-id="432" instrument_node="">So, as an example, a 100mm telescope would have a 200x magnification (at its highest).</span></p><span data-dcnode-id="430" instrument_node="">
</span><h3 data-dcnode-id="426"><span data-dcnode-id="427" id="Portability"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Portability</span></strong></span></h3><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">The larger a telescope is the better in terms of Aperture and Focal Length (providing better image quality and magnification).</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">But having a huge telescope not only costs more, but it reduces the portability (which may or may not be an issue for you depending on your preferences).</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Certain telescopes are harder to move and transport than others.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Consider the fact that some telescopes will require a car to be transported. So if you want to take a telescope with you on the go, then ensure you have this access.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Having said all this, you may not want to take your telescope with you anywhere.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">You may be purchasing it specifically for home use, and you may even leave it in the same place year-round.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">So consider where and when you will be using your scope. The more static you plan to be, a larger telescope would be advised.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Ultimately this is all down to personal preference, but if you go for a telescope in between portability and size then you can hedge your bets and use it in both contexts. So if you did decide to suddenly take it with you on a trip, you can.</span></p><span data-dcnode-id="401" instrument_node="">
</span><h3 data-dcnode-id="397"><span data-dcnode-id="398" id="Mount"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Mount</span></strong></span></h3><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Not all telescopes come with a mount, but if you are paying in the $2000 range, you typically will get one as part of the package.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">This is something that you should investigate before any purchase.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The mount is an integral component of a telescope in the fact that it provides a platform and structure to your telescope.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">The mount is used to connect to a tripod which in turn provides stability and elevation. Plus, you’ll also benefit from ease of use, comfort, portability, and stability.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Like all telescope components, there are different types and styles available. Alt-Azimuth mounts are some of the easiest to use, ideal for beginners, and also smaller and lighter telescopes.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="380" instrument_node="">The </span><strong data-dcnode-id="376"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.astronomyscope.com/how-to-set-up-a-telescope-with-an-equatorial-mount/"><span data-dcnode-id="379" instrument_node="">Equatorial</span></a><span data-dcnode-id="377" instrument_node=""> </span></strong><span data-dcnode-id="375" instrument_node="">mount is best for larger and heavier telescopes. They are typically used by astronomers who partake in Astrophotography.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Certain Equatorial mounts offer computerized functionality. This is a terrific, simple, and effective way to identify objects in the sky, especially for beginners.</span></p><span data-dcnode-id="370" instrument_node="">
</span><h2 data-dcnode-id="366"><span data-dcnode-id="367" id="Conclusion"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Conclusion</span></strong></span></h2><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Hopefully, this buyer’s guide has helped you to make a decision on what will be the right scope for you, at the very least, it would have helped you to compare spec and functionality.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">At this kind of price range, every model is going to have excellent optics and provide you with extraordinary views of the sky.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">But, there are always going to be slight differences and individual preferences that dictate what will be best for you. Without being able to test each model, you will not be able to understand the subtle differences between them.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">If you’re struggling to make a decision, consider what you are looking to see (galaxies and clusters of stars and planets) and how you are going to use your scope.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Do you want it to be more versatile or more powerful? Or something in between?</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Another piece of advice is to ensure that you consider the overall package and what you are getting with the telescope.</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Sure you can find cheaper models, but they typically do not come with all the additional accessories that you need. you will likely end up having to buy them separately and I wouldn’t be surprised if this ends up costing you more.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">So even if a bundle does seem more expensive always try to weigh it up.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">All the telescopes in this list come with the essentials and more; typically tripods, eyepieces, viewfinders, mounts, and other additional gear.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">I hope you enjoyed this guide and I wish you all the best. If you have any questions on the models or astronomy in general, be sure to drop a comment below!</span></p><span data-dcnode-id="335" instrument_node="">
</span><span data-dcnode-id="333" instrument_node="">
