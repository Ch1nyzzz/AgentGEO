</span><h3 data-dcnode-id="193" id="book-page-title"><span data-dcnode-id="194" instrument_node="">Arab Astronomy</span></h3><hr data-dcnode-id="192"><span data-dcnode-id="191" instrument_node="">
</span><div data-dcnode-id="150" id="book-page-contents"><span data-dcnode-id="190" instrument_node="">
</span><div class="book-paragraph-wrapper" data-dcnode-id="175"><div alt="&nbsp;Islamic Celestial Globe, 1630 A.D. This brass globe served both as a map of the heavens, as viewed from outside the starry sphere, and as a precision tool for making astronomical calculations. Engraved on its surface are various coordinate lines, constellation figures, and Arabic inscriptions. The stars are made of embedded bits of silver. The globe is hollow and was cast in one seamless piece. It was originally set in a cradle of rings, which depicted the horizon and other astronomical circles." class="astropedia-image-container wrap-left>" data-caption="&nbsp;Islamic Celestial Globe, 1630 A.D. This brass globe served both as a map of the heavens, as viewed from outside the starry sphere, and as a precision tool for making astronomical calculations. Engraved on its surface are various coordinate lines, constellation figures, and Arabic inscriptions. The stars are made of embedded bits of silver. The globe is hollow and was cast in one seamless piece. It was originally set in a cradle of rings, which depicted the horizon and other astronomical circles." data-dcnode-id="184" data-fancybox="alexa" href="//content.teachastronomy.com/taweb/images/textbook/c837b47d1aa88a67b2a1a8f23f23969ed9749ad6.jpg" style="width:212px;"><img class="astropedia-image" data-dcnode-id="189" data-filename="c837b47d1aa88a67b2a1a8f23f23969ed9749ad6.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.teachastronomy.com/taweb/images/textbook/hrthumbs/c837b47d1aa88a67b2a1a8f23f23969ed9749ad6.jpg&amp;raw" style="width:212px;"><br data-dcnode-id="188"><div -2="" class="astropedia-image-caption" data-dcnode-id="185"><div class="astropedia-image-caption-gradient" data-dcnode-id="187" data-expanded="0"></div><span data-dcnode-id="186" instrument_node="">&nbsp;Islamic Celestial Globe, 1630 A.D. This brass globe served both as a map of the heavens, as viewed from outside the starry sphere, and as a precision tool for making astronomical calculations. Engraved on its surface are various coordinate lines, constellation figures, and Arabic inscriptions. The stars are made of embedded bits of silver. The globe is hollow and was cast in one seamless piece. It was originally set in a cradle of rings, which depicted the horizon and other astronomical circles.</span></div></div><p data-dcnode-id="176"><span data-dcnode-id="183" instrument_node="">Arab scholars kept alive some of the Greek knowledge and preserved a few copies of Greek books. Pre-Islamic Arabs relied entirely on </span><a class="glossary-tooltip-target" data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/empirical" target="_blank" title="Derived from observation or experiment."><span data-dcnode-id="182" instrument_node="">empirical</span></a><span data-dcnode-id="180" instrument_node=""> observations of the sky, primarily the rising and setting of particular stars. A century after the </span><a class="glossary-tooltip-target" data-dcnode-id="178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/time" target="_blank" title="A measure of the flow of events."><span data-dcnode-id="179" instrument_node="">time</span></a><span data-dcnode-id="177" instrument_node=""> of the Muslim prophet Muhammad, around 760 A.D., Islamic leaders in the new capital of Baghdad began to sponsor translation and distribution of surviving Greek texts. This started an Islamic flowering of science. Astronomy began to incorporate mathematical methods. There was a religious obligation to follow set prayer times and observe particular festival days, and this spurred better observations of the sky. Ptolemy's work came down to us in an Arabic translation called al-Magiste or "The Greatest." Although Arabic astronomer accepted the Ptolemaic system, they were aware of its limitation and they made a number of improvements. Astronomers had status and prestige in the caliphate of the early Islamic countries, and they flourished.</span></p></div><div class="book-paragraph-wrapper" data-dcnode-id="154"><div alt="An illustration from an astronomer al-Biruni's astronomical works, explains the different phases of the Moon." class="astropedia-image-container wrap-right>" data-caption="An illustration from an astronomer al-Biruni's astronomical works, explains the different phases of the Moon." data-dcnode-id="169" data-fancybox="alexa" href="//content.teachastronomy.com/taweb/images/textbook/aa3eb19f2ebcaac62eabd3d63e6d5fb3e385d366.jpg" style="width:212px;"><img class="astropedia-image" data-dcnode-id="174" data-filename="aa3eb19f2ebcaac62eabd3d63e6d5fb3e385d366.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.teachastronomy.com/taweb/images/textbook/hrthumbs/aa3eb19f2ebcaac62eabd3d63e6d5fb3e385d366.jpg&amp;raw" style="width:212px;"><br data-dcnode-id="173"><div -2="" class="astropedia-image-caption" data-dcnode-id="170"><div class="astropedia-image-caption-gradient" data-dcnode-id="172" data-expanded="0"></div><span data-dcnode-id="171" instrument_node="">An illustration from an astronomer al-Biruni's astronomical works, explains the different phases of the Moon.</span></div></div><p data-dcnode-id="155"><span data-dcnode-id="168" instrument_node="">Arab astronomers did not just revive and transmit Greek knowledge; they made real advances. Islamic scholars refined the </span><a class="glossary-tooltip-target" data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/measurement" target="_blank" title="A quantitative way to present scientific evidence, in the form of a number, an error or uncertainty, and a unit that represents the type of measurement."><span data-dcnode-id="167" instrument_node="">measurement</span></a><span data-dcnode-id="165" instrument_node=""> of Earth's circumference in 820 A.D., coming within 4% of the actual circumference. In 850 A.D., al-Farghani wrote an </span><a class="glossary-tooltip-target" data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/astronomy" target="_blank" title="The study of all matter and energy in the universe."><span data-dcnode-id="164" instrument_node="">astronomy</span></a><span data-dcnode-id="162" instrument_node=""> compendium that corrected a number of errors made by Ptolemy. He also improved measurements of the Earth's orbital tilt, the </span><a class="glossary-tooltip-target" data-dcnode-id="160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/precession" target="_blank" title="The wobble in the position of a planet's rotation axis caused by external forces. Also, the change in a coordinate system (tied to any planet) caused by such a wobble."><span data-dcnode-id="161" instrument_node="">precession</span></a><span data-dcnode-id="159" instrument_node=""> of the greatest distances of the Sun and Moon from the Earth, and the Earth's circumference. The book was translated into Latin so became influential in Western Europe. Arab naturalists also advanced the field of </span><a class="glossary-tooltip-target" data-dcnode-id="157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teachastronomy.com/glossary/optics" target="_blank" title="The manipulation of light by reflection or refraction, usually to make an image."><span data-dcnode-id="158" instrument_node="">optics</span></a><span data-dcnode-id="156" instrument_node="">. They recognized that the eye is an optical device, and studied the ways in which light reflected. They also invented the pinhole camera and used it for accurate observation of stellar positions. They build a number of major observatories. They fashioned a number of exquisite measuring devices: armillary spheres, astrolabes, and sundials. No new cosmological models were developed because the Koran forbids pictorial representations of the heavens.</span></p></div><p data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">The influence of Arab astronomy remains in the night sky. We still use Arabic names for many mathematical and chemical terms and names for many stars, as indicated by the Arab prefix, "al-." Examples are algebra, algorithm, alkali, alcohol, and the stars Algol, Alcor, and others. Travel in hot desert countries was best done at night, so Arabs were intimately acquainted with the constellations and other patterns of stars. By 1000, the Islamic empire had spread to Spain, carrying the old Greek knowledge and the new Arab discoveries into Europe. Spanish astronomers published astronomical tables using a longitude system with 0° in Cordoba (rather than Greenwich, England, as in the modern longitude system, introduced when Britannia ruled the waves). We have an incomplete understanding of Arab astronomy&nbsp;since over 10,000 manuscripts have been found, most of which have not been read or even cataloged.</span></p><span data-dcnode-id="151" instrument_node="">
</span></div><span data-dcnode-id="149" instrument_node="">
