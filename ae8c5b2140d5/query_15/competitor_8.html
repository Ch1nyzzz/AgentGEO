</span><p data-dcnode-id="2964"><span data-dcnode-id="2969" instrument_node="">Of the topics approached with the tools of theoretical physics, particular consideration is often given to stellar photospheres, stellar atmospheres, the solar atmosphere, planetary atmospheres, gaseous nebulae, nonstationary stars, and the interstellar medium. Special attention is given to the internal structure of stars.</span><sup class="reference" data-dcnode-id="2966" id="cite_ref-Sobolev_5-0"><a data-dcnode-id="2967" href="#cite_note-Sobolev-5"><span data-dcnode-id="2968" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2965" instrument_node="">
</span></p><span data-dcnode-id="2963" instrument_node="">
</span><h3 data-dcnode-id="2953"><span class="mw-headline" data-dcnode-id="2961" id="Weak_equivalence_principle"><span data-dcnode-id="2962" instrument_node="">Weak equivalence principle</span></span><span class="mw-editsection" data-dcnode-id="2954"><span class="mw-editsection-bracket" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">[</span></span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D8" title="Edit section: Weak equivalence principle"><span data-dcnode-id="2958" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2951" instrument_node="">The observation of a neutrino burst within 3 h of the associated optical burst from </span><a class="mw-redirect" data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supernova_1987A" title="Supernova 1987A"><span data-dcnode-id="2950" instrument_node="">Supernova 1987A</span></a><span data-dcnode-id="2948" instrument_node=""> in the </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Magellanic_Cloud" title="Large Magellanic Cloud"><span data-dcnode-id="2947" instrument_node="">Large Magellanic Cloud</span></a><span data-dcnode-id="2945" instrument_node=""> (LMC) gave theoretical astrophysicists an opportunity to test that neutrinos and photons follow the same trajectories in the gravitational field of the galaxy.</span><sup class="reference" data-dcnode-id="2942" id="cite_ref-Krauss_6-0"><a data-dcnode-id="2943" href="#cite_note-Krauss-6"><span data-dcnode-id="2944" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2941" instrument_node="">
</span></p><span data-dcnode-id="2939" instrument_node="">
</span><h3 data-dcnode-id="2929"><span class="mw-headline" data-dcnode-id="2937" id="Thermodynamics_for_stationary_black_holes"><span data-dcnode-id="2938" instrument_node="">Thermodynamics for stationary black holes</span></span><span class="mw-editsection" data-dcnode-id="2930"><span class="mw-editsection-bracket" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">[</span></span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D9" title="Edit section: Thermodynamics for stationary black holes"><span data-dcnode-id="2934" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2919"><span data-dcnode-id="2927" instrument_node="">A general form of the first law of thermodynamics for stationary </span><a data-dcnode-id="2925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_hole" title="Black hole"><span data-dcnode-id="2926" instrument_node="">black holes</span></a><span data-dcnode-id="2924" instrument_node=""> can be derived from the microcanonical functional integral for the gravitational field.</span><sup class="reference" data-dcnode-id="2921" id="cite_ref-Brown_7-0"><a data-dcnode-id="2922" href="#cite_note-Brown-7"><span data-dcnode-id="2923" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2920" instrument_node=""> The boundary data
</span></p><span data-dcnode-id="2918" instrument_node="">
</span><ol data-dcnode-id="2912"><li data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">the gravitational field as described with a microcanonical system in a spatially finite region and</span></li><span data-dcnode-id="2915" instrument_node="">
</span><li data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">the density of states expressed formally as a functional integral over Lorentzian metrics and as a functional of the geometrical boundary data that are fixed in the corresponding action,</span></li></ol><span data-dcnode-id="2911" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2910" instrument_node="">are the thermodynamical extensive variables, including the energy and angular momentum of the system.</span><sup class="reference" data-dcnode-id="2907" id="cite_ref-Brown_7-1"><a data-dcnode-id="2908" href="#cite_note-Brown-7"><span data-dcnode-id="2909" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2906" instrument_node=""> For the simpler case of nonrelativistic mechanics as is often observed in astrophysical phenomena associated with a black hole event horizon, the density of states can be expressed as a real-time functional integral and subsequently used to deduce Feynman's imaginary-time functional integral for the canonical partition function.</span><sup class="reference" data-dcnode-id="2903" id="cite_ref-Brown_7-2"><a data-dcnode-id="2904" href="#cite_note-Brown-7"><span data-dcnode-id="2905" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2902" instrument_node="">
</span></p><span data-dcnode-id="2900" instrument_node="">
</span><h2 data-dcnode-id="2890"><span class="mw-headline" data-dcnode-id="2898" id="Theoretical_astrochemistry"><span data-dcnode-id="2899" instrument_node="">Theoretical astrochemistry</span></span><span class="mw-editsection" data-dcnode-id="2891"><span class="mw-editsection-bracket" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">[</span></span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D10" title="Edit section: Theoretical astrochemistry"><span data-dcnode-id="2895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2888" instrument_node="">Reaction equations and large reaction networks are an important tool in theoretical astrochemistry, especially as applied to the gas-grain chemistry of the interstellar medium.</span><sup class="reference" data-dcnode-id="2885" id="cite_ref-Vasyunin_8-0"><a data-dcnode-id="2886" href="#cite_note-Vasyunin-8"><span data-dcnode-id="2887" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2884" instrument_node=""> Theoretical astrochemistry offers the prospect of being able to place constraints on the inventory of organics for exogenous delivery to the early Earth.
</span></p><span data-dcnode-id="2882" instrument_node="">
</span><h3 data-dcnode-id="2872"><span class="mw-headline" data-dcnode-id="2880" id="Interstellar_organics"><span data-dcnode-id="2881" instrument_node="">Interstellar organics</span></span><span class="mw-editsection" data-dcnode-id="2873"><span class="mw-editsection-bracket" data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">[</span></span><a data-dcnode-id="2876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D11" title="Edit section: Interstellar organics"><span data-dcnode-id="2877" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2870" instrument_node="">"An important goal for theoretical astrochemistry is to elucidate which organics are of true interstellar origin, and to identify possible interstellar precursors and reaction pathways for those molecules which are the result of aqueous alterations."</span><sup class="reference" data-dcnode-id="2867" id="cite_ref-Ehrenfreund_9-0"><a data-dcnode-id="2868" href="#cite_note-Ehrenfreund-9"><span data-dcnode-id="2869" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2866" instrument_node=""> One of the ways this goal can be achieved is through the study of carbonaceous material as found in some meteorites. Carbonaceous chondrites (such as C1 and C2) include organic compounds such as amines and amides; alcohols, aldehydes, and ketones; aliphatic and aromatic hydrocarbons; sulfonic and phosphonic acids; amino, hydroxycarboxylic, and carboxylic acids; purines and pyrimidines; and </span><a data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kerogen" title="Kerogen"><span data-dcnode-id="2865" instrument_node="">kerogen</span></a><span data-dcnode-id="2863" instrument_node="">-type material.</span><sup class="reference" data-dcnode-id="2860" id="cite_ref-Ehrenfreund_9-1"><a data-dcnode-id="2861" href="#cite_note-Ehrenfreund-9"><span data-dcnode-id="2862" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2859" instrument_node=""> The organic inventories of primitive meteorites display large and variable enrichments in deuterium, </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon-13" title="Carbon-13"><span data-dcnode-id="2858" instrument_node="">carbon-13</span></a><span data-dcnode-id="2856" instrument_node=""> (</span><sup data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">13</span></sup><span data-dcnode-id="2853" instrument_node="">C), and </span><a class="mw-redirect" data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nitrogen-15" title="Nitrogen-15"><span data-dcnode-id="2852" instrument_node="">nitrogen-15</span></a><span data-dcnode-id="2850" instrument_node=""> (</span><sup data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">15</span></sup><span data-dcnode-id="2847" instrument_node="">N), which is indicative of their retention of an interstellar heritage.</span><sup class="reference" data-dcnode-id="2844" id="cite_ref-Ehrenfreund_9-2"><a data-dcnode-id="2845" href="#cite_note-Ehrenfreund-9"><span data-dcnode-id="2846" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2843" instrument_node="">
</span></p><span data-dcnode-id="2841" instrument_node="">
</span><h3 data-dcnode-id="2831"><span class="mw-headline" data-dcnode-id="2839" id="Chemistry_in_cometary_comae"><span data-dcnode-id="2840" instrument_node="">Chemistry in cometary comae</span></span><span class="mw-editsection" data-dcnode-id="2832"><span class="mw-editsection-bracket" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">[</span></span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D12" title="Edit section: Chemistry in cometary comae"><span data-dcnode-id="2836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2806"><span data-dcnode-id="2829" instrument_node="">The chemical composition of comets should reflect both the conditions in the outer solar nebula some 4.5 × 10</span><sup data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">9</span></sup><span data-dcnode-id="2826" instrument_node=""> ayr, and the nature of the natal interstellar cloud from which the </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="2825" instrument_node="">Solar System</span></a><span data-dcnode-id="2823" instrument_node=""> was formed.</span><sup class="reference" data-dcnode-id="2820" id="cite_ref-Rodgers_10-0"><a data-dcnode-id="2821" href="#cite_note-Rodgers-10"><span data-dcnode-id="2822" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2819" instrument_node=""> While comets retain a strong signature of their ultimate interstellar origins, significant processing must have occurred in the protosolar nebula.</span><sup class="reference" data-dcnode-id="2816" id="cite_ref-Rodgers_10-1"><a data-dcnode-id="2817" href="#cite_note-Rodgers-10"><span data-dcnode-id="2818" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2815" instrument_node=""> Early models of coma chemistry showed that reactions can occur rapidly in the inner coma, where the most important reactions are proton transfer reactions.</span><sup class="reference" data-dcnode-id="2812" id="cite_ref-Rodgers_10-2"><a data-dcnode-id="2813" href="#cite_note-Rodgers-10"><span data-dcnode-id="2814" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2811" instrument_node=""> Such reactions can potentially cycle deuterium between the different coma molecules, altering the initial D/H ratios released from the nuclear ice, and necessitating the construction of accurate models of cometary deuterium chemistry, so that gas-phase coma observations can be safely extrapolated to give nuclear D/H ratios.</span><sup class="reference" data-dcnode-id="2808" id="cite_ref-Rodgers_10-3"><a data-dcnode-id="2809" href="#cite_note-Rodgers-10"><span data-dcnode-id="2810" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2807" instrument_node="">
</span></p><span data-dcnode-id="2805" instrument_node="">
</span><h2 data-dcnode-id="2795"><span class="mw-headline" data-dcnode-id="2803" id="Theoretical_chemical_astronomy"><span data-dcnode-id="2804" instrument_node="">Theoretical chemical astronomy</span></span><span class="mw-editsection" data-dcnode-id="2796"><span class="mw-editsection-bracket" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">[</span></span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D13" title="Edit section: Theoretical chemical astronomy"><span data-dcnode-id="2800" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">While the lines of conceptual understanding between theoretical astrochemistry and theoretical chemical astronomy often become blurred so that the goals and tools are the same, there are subtle differences between the two sciences. Theoretical chemistry as applied to astronomy seeks to find new ways to observe chemicals in celestial objects, for example. This often leads to theoretical astrochemistry having to seek new ways to describe or explain those same observations.
</span></p><span data-dcnode-id="2791" instrument_node="">
</span><h3 data-dcnode-id="2781"><span class="mw-headline" data-dcnode-id="2789" id="Astronomical_spectroscopy"><span data-dcnode-id="2790" instrument_node="">Astronomical spectroscopy</span></span><span class="mw-editsection" data-dcnode-id="2782"><span class="mw-editsection-bracket" data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">[</span></span><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D14" title="Edit section: Astronomical spectroscopy"><span data-dcnode-id="2786" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2779" instrument_node="">The new era of chemical astronomy had to await the clear enunciation of the chemical principles of spectroscopy and the applicable theory.</span><sup class="reference" data-dcnode-id="2776" id="cite_ref-Merrill_11-0"><a data-dcnode-id="2777" href="#cite_note-Merrill-11"><span data-dcnode-id="2778" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2775" instrument_node="">
</span></p><span data-dcnode-id="2773" instrument_node="">
</span><h3 data-dcnode-id="2763"><span class="mw-headline" data-dcnode-id="2771" id="Chemistry_of_dust_condensation"><span data-dcnode-id="2772" instrument_node="">Chemistry of dust condensation</span></span><span class="mw-editsection" data-dcnode-id="2764"><span class="mw-editsection-bracket" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">[</span></span><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D15" title="Edit section: Chemistry of dust condensation"><span data-dcnode-id="2768" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2761" instrument_node="">Supernova radioactivity dominates light curves and the chemistry of dust condensation is also dominated by radioactivity.</span><sup class="reference" data-dcnode-id="2758" id="cite_ref-Clayton_12-0"><a data-dcnode-id="2759" href="#cite_note-Clayton-12"><span data-dcnode-id="2760" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2757" instrument_node=""> Dust is usually either carbon or oxides depending on which is more abundant, but Compton electrons dissociate the CO molecule in about one month.</span><sup class="reference" data-dcnode-id="2754" id="cite_ref-Clayton_12-1"><a data-dcnode-id="2755" href="#cite_note-Clayton-12"><span data-dcnode-id="2756" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2753" instrument_node=""> The new chemical astronomy of supernova solids depends on the supernova radioactivity:
</span></p><span data-dcnode-id="2751" instrument_node="">
</span><ol data-dcnode-id="2727"><li data-dcnode-id="2743"><span data-dcnode-id="2750" instrument_node="">the radiogenesis of </span><sup data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">44</span></sup><span data-dcnode-id="2747" instrument_node="">Ca  from </span><sup data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">44</span></sup><span data-dcnode-id="2744" instrument_node="">Ti decay after carbon condensation establishes their supernova source,</span></li><span data-dcnode-id="2742" instrument_node="">
</span><li data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">their opacity suffices to shift emission lines blueward after 500 d and emits significant infrared luminosity,</span></li><span data-dcnode-id="2739" instrument_node="">
</span><li data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">parallel kinetic rates determine trace isotopes in meteoritic supernova graphites,</span></li><span data-dcnode-id="2736" instrument_node="">
</span><li data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">the chemistry is kinetic rather than due to thermal equilibrium and</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2728"><span data-dcnode-id="2732" instrument_node="">is made possible by radiodeactivation of the CO trap for carbon.</span><sup class="reference" data-dcnode-id="2729" id="cite_ref-Clayton_12-2"><a data-dcnode-id="2730" href="#cite_note-Clayton-12"><span data-dcnode-id="2731" instrument_node="">[12]</span></a></sup></li></ol><span data-dcnode-id="2726" instrument_node="">
</span><h2 data-dcnode-id="2716"><span class="mw-headline" data-dcnode-id="2724" id="Theoretical_physical_astronomy"><span data-dcnode-id="2725" instrument_node="">Theoretical physical astronomy</span></span><span class="mw-editsection" data-dcnode-id="2717"><span class="mw-editsection-bracket" data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">[</span></span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D16" title="Edit section: Theoretical physical astronomy"><span data-dcnode-id="2721" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2714" instrument_node="">Like theoretical chemical astronomy, the lines of conceptual understanding between theoretical astrophysics and theoretical physical astronomy are often blurred, but, again, there are subtle differences between these two sciences. Theoretical physics as applied to astronomy seeks to find new ways to observe physical phenomena in celestial objects and what to look for, for example. This often leads to theoretical astrophysics having to seek new ways to describe or explain those same observations, with hopefully a convergence to improve our understanding of the local environment of Earth and the physical </span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universe" title="Universe"><span data-dcnode-id="2713" instrument_node="">Universe</span></a><span data-dcnode-id="2711" instrument_node="">.
</span></p><span data-dcnode-id="2709" instrument_node="">
</span><h3 data-dcnode-id="2699"><span class="mw-headline" data-dcnode-id="2707" id="Weak_interaction_and_nuclear_double_beta_decay"><span data-dcnode-id="2708" instrument_node="">Weak interaction and nuclear double beta decay</span></span><span class="mw-editsection" data-dcnode-id="2700"><span class="mw-editsection-bracket" data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">[</span></span><a data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D17" title="Edit section: Weak interaction and nuclear double beta decay"><span data-dcnode-id="2704" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2697" instrument_node="">Nuclear matrix elements of relevant operators as extracted from data and from a shell-model and theoretical approximations both for the two-neutrino and neutrinoless modes of decay are used to explain the weak interaction and nuclear structure aspects of nuclear double beta decay.</span><sup class="reference" data-dcnode-id="2694" id="cite_ref-Suhonen_13-0"><a data-dcnode-id="2695" href="#cite_note-Suhonen-13"><span data-dcnode-id="2696" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2693" instrument_node="">
</span></p><span data-dcnode-id="2691" instrument_node="">
</span><h3 data-dcnode-id="2681"><span class="mw-headline" data-dcnode-id="2689" id="Neutron-rich_isotopes"><span data-dcnode-id="2690" instrument_node="">Neutron-rich isotopes</span></span><span class="mw-editsection" data-dcnode-id="2682"><span class="mw-editsection-bracket" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">[</span></span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D18" title="Edit section: Neutron-rich isotopes"><span data-dcnode-id="2686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2679" instrument_node="">New neutron-rich isotopes, </span><sup data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">34</span></sup><span data-dcnode-id="2676" instrument_node="">Ne, </span><sup data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">37</span></sup><span data-dcnode-id="2673" instrument_node="">Na, and </span><sup data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">43</span></sup><span data-dcnode-id="2670" instrument_node="">Si have been produced unambiguously for the first time, and convincing evidence for the particle instability of three others, </span><sup data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">33</span></sup><span data-dcnode-id="2667" instrument_node="">Ne, </span><sup data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">36</span></sup><span data-dcnode-id="2664" instrument_node="">Na, and </span><sup data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">39</span></sup><span data-dcnode-id="2661" instrument_node="">Mg has been obtained.</span><sup class="reference" data-dcnode-id="2658" id="cite_ref-Notani_14-0"><a data-dcnode-id="2659" href="#cite_note-Notani-14"><span data-dcnode-id="2660" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2657" instrument_node=""> These experimental findings compare with recent theoretical predictions.</span><sup class="reference" data-dcnode-id="2654" id="cite_ref-Notani_14-1"><a data-dcnode-id="2655" href="#cite_note-Notani-14"><span data-dcnode-id="2656" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2653" instrument_node="">
</span></p><span data-dcnode-id="2651" instrument_node="">
</span><h2 data-dcnode-id="2640"><span class="mw-headline" data-dcnode-id="2648" id="Theory_of_astronomical_time_keeping"><span data-dcnode-id="2650" instrument_node="">Theory of astronomical time keeping</span><span class="anchor" data-dcnode-id="2649" id="Time_keeping"></span></span><span class="mw-editsection" data-dcnode-id="2641"><span class="mw-editsection-bracket" data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">[</span></span><a data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D19" title="Edit section: Theory of astronomical time keeping"><span data-dcnode-id="2645" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2639" instrument_node="">
</span><link data-dcnode-id="2638" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2634" role="note"><span data-dcnode-id="2637" instrument_node="">Main category: </span><a data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3ATime_in_astronomy" title="Category:Time in astronomy"><span data-dcnode-id="2636" instrument_node="">Time in astronomy</span></a></div><span data-dcnode-id="2633" instrument_node="">
</span><link data-dcnode-id="2632" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2628" role="note"><span data-dcnode-id="2631" instrument_node="">See also: </span><a data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_in_physics" title="Time in physics"><span data-dcnode-id="2630" instrument_node="">Time in physics</span></a></div><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">Until recently all the time units that appear natural to us are caused by astronomical phenomena:
</span></p><span data-dcnode-id="2624" instrument_node="">
</span><ol data-dcnode-id="2613"><li data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Earth's orbit around the Sun =&gt; the year, and the seasons,</span></li><span data-dcnode-id="2621" instrument_node="">
</span><li data-dcnode-id="2617"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="2620" instrument_node="">Moon</span></a><span data-dcnode-id="2618" instrument_node="">'s orbit around the Earth =&gt; the month,</span></li><span data-dcnode-id="2616" instrument_node="">
</span><li data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Earth's rotation and the succession of brightness and darkness =&gt; the day (and night).</span></li></ol><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">High precision appears problematic:
</span></p><span data-dcnode-id="2609" instrument_node="">
</span><ol data-dcnode-id="2597"><li data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">ambiguities arise in the exact definition of a rotation or revolution,</span></li><span data-dcnode-id="2606" instrument_node="">
</span><li data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">some astronomical processes are uneven and irregular, such as the noncommensurability of year, month, and day,</span></li><span data-dcnode-id="2603" instrument_node="">
</span><li data-dcnode-id="2598"><span data-dcnode-id="2602" instrument_node="">there are a multitude of time scales and calendars to solve the first two problems.</span><sup class="reference" data-dcnode-id="2599" id="cite_ref-Husfeld_15-0"><a data-dcnode-id="2600" href="#cite_note-Husfeld-15"><span data-dcnode-id="2601" instrument_node="">[15]</span></a></sup></li></ol><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2582"><span data-dcnode-id="2595" instrument_node="">Some of these </span><a data-dcnode-id="2593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_standard" title="Time standard"><span data-dcnode-id="2594" instrument_node="">time standard</span></a><span data-dcnode-id="2592" instrument_node=""> scales are </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sidereal_time" title="Sidereal time"><span data-dcnode-id="2591" instrument_node="">sidereal time</span></a><span data-dcnode-id="2589" instrument_node="">, </span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_time" title="Solar time"><span data-dcnode-id="2588" instrument_node="">solar time</span></a><span data-dcnode-id="2586" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_time" title="Universal time"><span data-dcnode-id="2585" instrument_node="">universal time</span></a><span data-dcnode-id="2583" instrument_node="">.
</span></p><span data-dcnode-id="2581" instrument_node="">
</span><h3 data-dcnode-id="2571"><span class="mw-headline" data-dcnode-id="2579" id="Atomic_time"><span data-dcnode-id="2580" instrument_node="">Atomic time</span></span><span class="mw-editsection" data-dcnode-id="2572"><span class="mw-editsection-bracket" data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">[</span></span><a data-dcnode-id="2575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D20" title="Edit section: Atomic time"><span data-dcnode-id="2576" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2570" instrument_node="">
</span><link data-dcnode-id="2569" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2565" role="note"><span data-dcnode-id="2568" instrument_node="">Main article: </span><a data-dcnode-id="2566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Atomic_Time" title="International Atomic Time"><span data-dcnode-id="2567" instrument_node="">International Atomic Time</span></a></div><span data-dcnode-id="2564" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2552"><div class="thumbinner" data-dcnode-id="2553" style="width:252px;"><a class="image" data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClock_accuracy.jpg"><img alt="" class="thumbimage" data-dcnode-id="2563" data-file-height="273" data-file-width="460" decoding="async" height="148" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Clock_accuracy.jpg/250px-Clock_accuracy.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Clock_accuracy.jpg/375px-Clock_accuracy.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/5b/Clock_accuracy.jpg 2x" width="250"></a><span data-dcnode-id="2561" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2554"><div class="magnify" data-dcnode-id="2559"><a class="internal" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClock_accuracy.jpg" title="Enlarge"></a></div><span data-dcnode-id="2558" instrument_node="">Historical accuracy of atomic clocks from </span><a class="mw-redirect" data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NIST" title="NIST"><span data-dcnode-id="2557" instrument_node="">NIST</span></a><span data-dcnode-id="2555" instrument_node="">.</span></div></div></div><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2550" instrument_node="">From the </span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_System_of_Units" title="International System of Units"><span data-dcnode-id="2549" instrument_node="">Systeme Internationale</span></a><span data-dcnode-id="2547" instrument_node=""> (SI) comes the second as defined by the duration of 9 192 631 770 cycles of a particular hyperfine structure transition in the ground state of </span><a class="mw-redirect" data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caesium-133" title="Caesium-133"><span data-dcnode-id="2546" instrument_node="">caesium-133</span></a><span data-dcnode-id="2544" instrument_node=""> (</span><sup data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">133</span></sup><span data-dcnode-id="2541" instrument_node="">Cs).</span><sup class="reference" data-dcnode-id="2538" id="cite_ref-Husfeld_15-1"><a data-dcnode-id="2539" href="#cite_note-Husfeld-15"><span data-dcnode-id="2540" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2537" instrument_node=""> For practical usability a device is required that attempts to produce the SI second (s) such as an </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atomic_clock" title="Atomic clock"><span data-dcnode-id="2536" instrument_node="">atomic clock</span></a><span data-dcnode-id="2534" instrument_node="">. But not all such clocks agree. The weighted mean of many clocks distributed over the whole Earth defines the </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Atomic_Time" title="International Atomic Time"><span data-dcnode-id="2533" instrument_node="">Temps Atomique International</span></a><span data-dcnode-id="2531" instrument_node="">; i.e., the Atomic Time TAI.</span><sup class="reference" data-dcnode-id="2528" id="cite_ref-Husfeld_15-2"><a data-dcnode-id="2529" href="#cite_note-Husfeld-15"><span data-dcnode-id="2530" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2527" instrument_node=""> From the </span><a class="mw-redirect" data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_theory_of_relativity" title="General theory of relativity"><span data-dcnode-id="2526" instrument_node="">General theory of relativity</span></a><span data-dcnode-id="2524" instrument_node=""> the time measured depends on the altitude on earth and the spatial velocity of the clock so that TAI refers to a location on sea level that rotates with the Earth.</span><sup class="reference" data-dcnode-id="2521" id="cite_ref-Husfeld_15-3"><a data-dcnode-id="2522" href="#cite_note-Husfeld-15"><span data-dcnode-id="2523" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2520" instrument_node="">
</span></p><span data-dcnode-id="2518" instrument_node="">
</span><h3 data-dcnode-id="2508"><span class="mw-headline" data-dcnode-id="2516" id="Ephemeris_time"><span data-dcnode-id="2517" instrument_node="">Ephemeris time</span></span><span class="mw-editsection" data-dcnode-id="2509"><span class="mw-editsection-bracket" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">[</span></span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D21" title="Edit section: Ephemeris time"><span data-dcnode-id="2513" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2507" instrument_node="">
</span><link data-dcnode-id="2506" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2502" role="note"><span data-dcnode-id="2505" instrument_node="">Main article: </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephemeris_time" title="Ephemeris time"><span data-dcnode-id="2504" instrument_node="">Ephemeris time</span></a></div><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2500" instrument_node="">Since the Earth's rotation is irregular, any time scale derived from it such as </span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwich_Mean_Time" title="Greenwich Mean Time"><span data-dcnode-id="2499" instrument_node="">Greenwich Mean Time</span></a><span data-dcnode-id="2497" instrument_node=""> led to recurring problems in predicting the </span><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephemeris" title="Ephemeris"><span data-dcnode-id="2496" instrument_node="">Ephemerides</span></a><span data-dcnode-id="2494" instrument_node=""> for the positions of the </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="2493" instrument_node="">Moon</span></a><span data-dcnode-id="2491" instrument_node="">, </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="2490" instrument_node="">Sun</span></a><span data-dcnode-id="2488" instrument_node="">, </span><a data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planet" title="Planet"><span data-dcnode-id="2487" instrument_node="">planets</span></a><span data-dcnode-id="2485" instrument_node=""> and their </span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Natural_satellite" title="Natural satellite"><span data-dcnode-id="2484" instrument_node="">natural satellites</span></a><span data-dcnode-id="2482" instrument_node="">.</span><sup class="reference" data-dcnode-id="2479" id="cite_ref-Husfeld_15-4"><a data-dcnode-id="2480" href="#cite_note-Husfeld-15"><span data-dcnode-id="2481" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2478" instrument_node=""> In 1976 the </span><a data-dcnode-id="2476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Astronomical_Union" title="International Astronomical Union"><span data-dcnode-id="2477" instrument_node="">International Astronomical Union</span></a><span data-dcnode-id="2475" instrument_node=""> (IAU) resolved that the theoretical basis for ephemeris time (ET) was wholly non-relativistic, and therefore, beginning in 1984 ephemeris time would be replaced by two further time scales with allowance for relativistic corrections. Their names, assigned in 1979,</span><sup class="reference" data-dcnode-id="2472" id="cite_ref-Guinot_16-0"><a data-dcnode-id="2473" href="#cite_note-Guinot-16"><span data-dcnode-id="2474" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2471" instrument_node=""> emphasized their dynamical nature or origin, </span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barycentric_Dynamical_Time" title="Barycentric Dynamical Time"><span data-dcnode-id="2470" instrument_node="">Barycentric Dynamical Time</span></a><span data-dcnode-id="2468" instrument_node=""> (TDB) and </span><a class="mw-redirect" data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrestrial_Dynamical_Time" title="Terrestrial Dynamical Time"><span data-dcnode-id="2467" instrument_node="">Terrestrial Dynamical Time</span></a><span data-dcnode-id="2465" instrument_node=""> (TDT).  Both were defined for continuity with ET and were based on what had become the standard SI second, which in turn had been derived from the measured second of ET.
</span></p><span data-dcnode-id="2463" instrument_node="">
</span><link data-dcnode-id="2462" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2458" role="note"><span data-dcnode-id="2461" instrument_node="">See also: </span><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dynamical_time_scale" title="Dynamical time scale"><span data-dcnode-id="2460" instrument_node="">Dynamical time scale</span></a></div><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2456" instrument_node="">During the period 1991–2006, the TDB and TDT time scales were both redefined and replaced, owing to difficulties or inconsistencies in their original definitions. The current fundamental relativistic time scales are </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geocentric_Coordinate_Time" title="Geocentric Coordinate Time"><span data-dcnode-id="2455" instrument_node="">Geocentric Coordinate Time</span></a><span data-dcnode-id="2453" instrument_node=""> (TCG) and </span><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barycentric_Coordinate_Time" title="Barycentric Coordinate Time"><span data-dcnode-id="2452" instrument_node="">Barycentric Coordinate Time</span></a><span data-dcnode-id="2450" instrument_node=""> (TCB). Both of these have rates that are based on the SI second in respective reference frames (and hypothetically outside the relevant gravity well), but due to relativistic effects, their rates would appear slightly faster when observed at the Earth's surface, and therefore diverge from local Earth-based time scales using the SI second at the Earth's surface.</span><sup class="reference" data-dcnode-id="2447" id="cite_ref-Klioner_17-0"><a data-dcnode-id="2448" href="#cite_note-Klioner-17"><span data-dcnode-id="2449" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2446" instrument_node="">
</span></p><p data-dcnode-id="2436"><span data-dcnode-id="2444" instrument_node="">The currently defined IAU time scales also include </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrestrial_Time" title="Terrestrial Time"><span data-dcnode-id="2443" instrument_node="">Terrestrial Time</span></a><span data-dcnode-id="2441" instrument_node=""> (TT) (replacing TDT, and now defined as a re-scaling of TCG, chosen to give TT a rate that matches the SI second when observed at the Earth's surface),</span><sup class="reference" data-dcnode-id="2438" id="cite_ref-Resol_18-0"><a data-dcnode-id="2439" href="#cite_note-Resol-18"><span data-dcnode-id="2440" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2437" instrument_node=""> and a redefined Barycentric Dynamical Time (TDB), a re-scaling of TCB to give TDB a rate that matches the SI second at the Earth's surface.
</span></p><span data-dcnode-id="2435" instrument_node="">
</span><h3 data-dcnode-id="2425"><span class="mw-headline" data-dcnode-id="2433" id="Extraterrestrial_time-keeping"><span data-dcnode-id="2434" instrument_node="">Extraterrestrial time-keeping</span></span><span class="mw-editsection" data-dcnode-id="2426"><span class="mw-editsection-bracket" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">[</span></span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D22" title="Edit section: Extraterrestrial time-keeping"><span data-dcnode-id="2430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2424" instrument_node="">
</span><link data-dcnode-id="2423" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2416" role="note"><span data-dcnode-id="2422" instrument_node="">Main articles: </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timekeeping_on_Mars" title="Timekeeping on Mars"><span data-dcnode-id="2421" instrument_node="">Timekeeping on Mars</span></a><span data-dcnode-id="2419" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martian_calendar" title="Martian calendar"><span data-dcnode-id="2418" instrument_node="">Martian calendar</span></a></div><span data-dcnode-id="2415" instrument_node="">
</span><h3 data-dcnode-id="2405"><span class="mw-headline" data-dcnode-id="2413" id="Stellar_dynamical_time_scale"><span data-dcnode-id="2414" instrument_node="">Stellar dynamical time scale</span></span><span class="mw-editsection" data-dcnode-id="2406"><span class="mw-editsection-bracket" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">[</span></span><a data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D23" title="Edit section: Stellar dynamical time scale"><span data-dcnode-id="2410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2390"><span data-dcnode-id="2403" instrument_node="">For a </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="2402" instrument_node="">star</span></a><span data-dcnode-id="2400" instrument_node="">, the dynamical time scale is defined as the time that would be taken for a test particle released at the surface to fall under the </span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="2399" instrument_node="">star</span></a><span data-dcnode-id="2397" instrument_node="">'s potential to the centre point, if pressure forces were negligible.  In other words, the dynamical time scale measures the amount of time it would take a certain </span><a data-dcnode-id="2395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="2396" instrument_node="">star</span></a><span data-dcnode-id="2394" instrument_node=""> to collapse in the absence of any </span><a data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_pressure" title="Internal pressure"><span data-dcnode-id="2393" instrument_node="">internal pressure</span></a><span data-dcnode-id="2391" instrument_node="">.  By appropriate manipulation of the equations of stellar structure this can be found to be
</span></p><p data-dcnode-id="2256"><span class="mwe-math-element" data-dcnode-id="2258"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="2260" style="display: none;"><math alttext="{\displaystyle \tau _{dynamical}\simeq {\frac {R}{v}}={\sqrt {\frac {R^{3}}{2GM}}}\sim 1/{\sqrt {G\rho }}}" data-dcnode-id="2261" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="2389" instrument_node="">

</span></p><p data-dcnode-id="2234"><span data-dcnode-id="2238" instrument_node="">The 'fundamental' oscillatory mode of a star will be at approximately the dynamical time scale. Oscillations at this frequency are seen in </span><a class="mw-redirect" data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cepheid_variables" title="Cepheid variables"><span data-dcnode-id="2237" instrument_node="">Cepheid variables</span></a><span data-dcnode-id="2235" instrument_node="">.

</span><h2 data-dcnode-id="2223"><span class="mw-headline" data-dcnode-id="2231" id="Theory_of_astronomical_navigation"><span data-dcnode-id="2232" instrument_node="">Theory of astronomical navigation</span></span><span class="mw-editsection" data-dcnode-id="2224"><span class="mw-editsection-bracket" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">[</span></span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D24" title="Edit section: Theory of astronomical navigation"><span data-dcnode-id="2228" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2222" instrument_node="">
</span><h3 data-dcnode-id="2212"><span class="mw-headline" data-dcnode-id="2220" id="On_Earth"><span data-dcnode-id="2221" instrument_node="">On Earth</span></span><span class="mw-editsection" data-dcnode-id="2213"><span class="mw-editsection-bracket" data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">[</span></span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D25" title="Edit section: On Earth"><span data-dcnode-id="2217" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2211" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">The basic characteristics of applied astronomical navigation are
</span></p><span data-dcnode-id="2208" instrument_node="">
</span><ol data-dcnode-id="2190"><li data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">usable in all areas of sailing around the Earth,</span></li><span data-dcnode-id="2205" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">applicable autonomously (does not depend on others&nbsp;– persons or states) and passively (does not emit energy),</span></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">conditional usage via optical visibility (of horizon and celestial bodies), or state of cloudiness,</span></li><span data-dcnode-id="2199" instrument_node="">
</span><li data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">precisional measurement, sextant is 0.1', altitude and position is between 1.5' and 3.0'.</span></li><span data-dcnode-id="2196" instrument_node="">
</span><li data-dcnode-id="2191"><span data-dcnode-id="2195" instrument_node="">temporal determination takes a couple of minutes (using the most modern equipment) and ≤ 30 min (using classical equipment).</span><sup class="reference" data-dcnode-id="2192" id="cite_ref-Stajic_19-0"><a data-dcnode-id="2193" href="#cite_note-Stajic-19"><span data-dcnode-id="2194" instrument_node="">[19]</span></a></sup></li></ol><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2188" instrument_node="">The superiority of satellite navigation systems to astronomical navigation are currently undeniable, especially with the development and use of GPS/NAVSTAR.</span><sup class="reference" data-dcnode-id="2185" id="cite_ref-Stajic_19-1"><a data-dcnode-id="2186" href="#cite_note-Stajic-19"><span data-dcnode-id="2187" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2184" instrument_node=""> This global satellite system
</span></p><span data-dcnode-id="2182" instrument_node="">
</span><ol data-dcnode-id="2157"><li data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">enables automated three-dimensional positioning at any moment,</span></li><span data-dcnode-id="2179" instrument_node="">
</span><li data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">automatically determines position continuously (every second or even more often),</span></li><span data-dcnode-id="2176" instrument_node="">
</span><li data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">determines position independent of weather conditions (visibility and cloudiness),</span></li><span data-dcnode-id="2173" instrument_node="">
</span><li data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">determines position in real time to a few meters (two carrying frequencies) and 100 m (modest commercial receivers), which is two to three orders of magnitude better than by astronomical observation,</span></li><span data-dcnode-id="2170" instrument_node="">
</span><li data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">is simple even without expert knowledge,</span></li><span data-dcnode-id="2167" instrument_node="">
</span><li data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">is relatively cheap, comparable to equipment for astronomical navigation, and</span></li><span data-dcnode-id="2164" instrument_node="">
</span><li data-dcnode-id="2158"><span data-dcnode-id="2163" instrument_node="">allows incorporation into integrated and automated systems of control and ship steering.</span><sup class="reference" data-dcnode-id="2160" id="cite_ref-Stajic_19-2"><a data-dcnode-id="2161" href="#cite_note-Stajic-19"><span data-dcnode-id="2162" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2159" instrument_node=""> The use of astronomical or celestial navigation is disappearing from the surface and beneath or above the surface of the Earth.</span></li></ol><span data-dcnode-id="2156" instrument_node="">
</span><link data-dcnode-id="2155" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2145" role="note"><span data-dcnode-id="2154" instrument_node="">See also: </span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geodetic_astronomy" title="Geodetic astronomy"><span data-dcnode-id="2153" instrument_node="">Geodetic astronomy</span></a><span data-dcnode-id="2151" instrument_node="">, </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Figure_of_the_Earth" title="Figure of the Earth"><span data-dcnode-id="2150" instrument_node="">Figure of the Earth</span></a><span data-dcnode-id="2148" instrument_node="">, and </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Earth_Rotation_and_Reference_Systems_Service" title="International Earth Rotation and Reference Systems Service"><span data-dcnode-id="2147" instrument_node="">International Earth Rotation and Reference Systems Service</span></a></div><span data-dcnode-id="2144" instrument_node="">

</span><p data-dcnode-id="1990"><span data-dcnode-id="2027" instrument_node="">The </span><b data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Deep Space Network</span></b><span data-dcnode-id="2024" instrument_node="">, or </span><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">DSN</span></b><span data-dcnode-id="2021" instrument_node="">, is an international </span><a class="extiw" data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/network" title="wiktionary:network"><span data-dcnode-id="2020" instrument_node="">network</span></a><span data-dcnode-id="2018" instrument_node=""> of large </span><a data-dcnode-id="2016" href="#Antennas"><span data-dcnode-id="2017" instrument_node="">antennas</span></a><span data-dcnode-id="2015" instrument_node=""> and communication facilities that supports </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interplanetary_spaceflight" title="Interplanetary spaceflight"><span data-dcnode-id="2014" instrument_node="">interplanetary</span></a><span data-dcnode-id="2012" instrument_node=""> </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spacecraft" title="Spacecraft"><span data-dcnode-id="2011" instrument_node="">spacecraft</span></a><span data-dcnode-id="2009" instrument_node=""> missions, and </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_astronomy" title="Radio astronomy"><span data-dcnode-id="2008" instrument_node="">radio</span></a><span data-dcnode-id="2006" instrument_node=""> and </span><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radar_astronomy" title="Radar astronomy"><span data-dcnode-id="2005" instrument_node="">radar astronomy</span></a><span data-dcnode-id="2003" instrument_node=""> observations for the exploration of the </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="2002" instrument_node="">Solar System</span></a><span data-dcnode-id="2000" instrument_node=""> and the </span><a data-dcnode-id="1998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universe" title="Universe"><span data-dcnode-id="1999" instrument_node="">universe</span></a><span data-dcnode-id="1997" instrument_node="">. The network also supports selected Earth-orbiting missions. DSN is part of the </span><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NASA" title="NASA"><span data-dcnode-id="1996" instrument_node="">NASA</span></a><span data-dcnode-id="1994" instrument_node=""> </span><a data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jet_Propulsion_Laboratory" title="Jet Propulsion Laboratory"><span data-dcnode-id="1993" instrument_node="">Jet Propulsion Laboratory</span></a><span data-dcnode-id="1991" instrument_node=""> (JPL).

</span><p data-dcnode-id="1969"><span data-dcnode-id="1977" instrument_node="">An observer becomes a deep space explorer upon escaping Earth's orbit.</span><sup class="reference" data-dcnode-id="1974" id="cite_ref-Kawakatsu_20-0"><a data-dcnode-id="1975" href="#cite_note-Kawakatsu-20"><span data-dcnode-id="1976" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1973" instrument_node=""> While the </span><a class="mw-redirect" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deep_Space_Network" title="Deep Space Network"><span data-dcnode-id="1972" instrument_node="">Deep Space Network</span></a><span data-dcnode-id="1970" instrument_node=""> maintains communication and enables data download from an exploratory vessel, any local probing performed by sensors or active systems aboard usually require astronomical navigation, since the enclosing network of satellites to ensure accurate positioning is absent.
