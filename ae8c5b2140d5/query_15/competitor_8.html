</span><p data-dcnode-id="3965"><b data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">Theoretical astronomy</span></b><span data-dcnode-id="3978" instrument_node=""> is the use of </span><a data-dcnode-id="3976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematical_model" title="Mathematical model"><span data-dcnode-id="3977" instrument_node="">analytical</span></a><span data-dcnode-id="3975" instrument_node=""> and </span><a data-dcnode-id="3973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computational_model" title="Computational model"><span data-dcnode-id="3974" instrument_node="">computational models</span></a><span data-dcnode-id="3972" instrument_node=""> based on principles from physics and chemistry to describe and explain </span><a data-dcnode-id="3970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_object" title="Astronomical object"><span data-dcnode-id="3971" instrument_node="">astronomical objects</span></a><span data-dcnode-id="3969" instrument_node=""> and </span><a data-dcnode-id="3967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Celestial_event" title="Celestial event"><span data-dcnode-id="3968" instrument_node="">astronomical phenomena</span></a><span data-dcnode-id="3966" instrument_node="">. Theorists in astronomy endeavor to create theoretical models and from the results predict observational consequences of those models. The observation of a phenomenon predicted by a model allows astronomers to select between several alternate or conflicting models as the one best able to describe the phenomena.
</span></p><p data-dcnode-id="3943"><a data-dcnode-id="3963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ptolemy" title="Ptolemy"><span data-dcnode-id="3964" instrument_node="">Ptolemy</span></a><span data-dcnode-id="3962" instrument_node="">'s </span><a data-dcnode-id="3960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Almagest" title="Almagest"><span data-dcnode-id="3961" instrument_node="">Almagest</span></a><span data-dcnode-id="3959" instrument_node="">, although a brilliant treatise on theoretical </span><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy" title="Astronomy"><span data-dcnode-id="3958" instrument_node="">astronomy</span></a><span data-dcnode-id="3956" instrument_node=""> combined with a practical handbook for computation, nevertheless includes many compromises to reconcile discordant observations. Modern theoretical astronomy is usually assumed to have begun with the work of </span><a data-dcnode-id="3954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Kepler" title="Johannes Kepler"><span data-dcnode-id="3955" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="3953" instrument_node=""> (1571–1630), particularly with </span><a data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kepler%2527s_laws_of_planetary_motion" title="Kepler's laws of planetary motion"><span data-dcnode-id="3952" instrument_node="">Kepler's laws</span></a><span data-dcnode-id="3950" instrument_node="">. The history of the descriptive and theoretical aspects of the </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="3949" instrument_node="">Solar System</span></a><span data-dcnode-id="3947" instrument_node=""> mostly spans from the late </span><a class="mw-redirect" data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_science_in_the_Renaissance" title="History of science in the Renaissance"><span data-dcnode-id="3946" instrument_node="">sixteenth century</span></a><span data-dcnode-id="3944" instrument_node=""> to the end of the nineteenth century. 
</span></p><p data-dcnode-id="3920"><span data-dcnode-id="3942" instrument_node="">Theoretical astronomy is built on the work of </span><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observational_astronomy" title="Observational astronomy"><span data-dcnode-id="3941" instrument_node="">observational astronomy</span></a><span data-dcnode-id="3939" instrument_node="">, </span><a data-dcnode-id="3937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrometry" title="Astrometry"><span data-dcnode-id="3938" instrument_node="">astrometry</span></a><span data-dcnode-id="3936" instrument_node="">, </span><a data-dcnode-id="3934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrochemistry" title="Astrochemistry"><span data-dcnode-id="3935" instrument_node="">astrochemistry</span></a><span data-dcnode-id="3933" instrument_node="">, and </span><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrophysics" title="Astrophysics"><span data-dcnode-id="3932" instrument_node="">astrophysics</span></a><span data-dcnode-id="3930" instrument_node="">. Astronomy was early to adopt computational techniques to model stellar and galactic formation and celestial mechanics. From the point of view of theoretical astronomy, not only must the mathematical expression be reasonably accurate but it should preferably exist in a form which is amenable to further mathematical analysis when used in specific problems. Most of theoretical astronomy uses </span><a data-dcnode-id="3928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravity" title="Gravity"><span data-dcnode-id="3929" instrument_node="">Newtonian theory of gravitation</span></a><span data-dcnode-id="3927" instrument_node="">, considering that the effects of </span><a data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_relativity" title="General relativity"><span data-dcnode-id="3926" instrument_node="">general relativity</span></a><span data-dcnode-id="3924" instrument_node=""> are weak for most celestial objects. Theoretical astronomy does not attempt to predict the position, size and temperature of every object in the </span><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universe" title="Universe"><span data-dcnode-id="3923" instrument_node="">universe</span></a><span data-dcnode-id="3921" instrument_node="">, but by and large has concentrated upon analyzing the apparently complex but periodic motions of celestial objects.
</span></p><span data-dcnode-id="3919" instrument_node="">

</span><link data-dcnode-id="3406" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3402" role="note"><span data-dcnode-id="3405" instrument_node="">Main article: </span><a data-dcnode-id="3403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrochemistry" title="Astrochemistry"><span data-dcnode-id="3404" instrument_node="">Astrochemistry</span></a></div><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3385"><b data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">Astrochemistry</span></b><span data-dcnode-id="3398" instrument_node="">, the overlap of the disciplines of </span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy" title="Astronomy"><span data-dcnode-id="3397" instrument_node="">astronomy</span></a><span data-dcnode-id="3395" instrument_node=""> and </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemistry" title="Chemistry"><span data-dcnode-id="3394" instrument_node="">chemistry</span></a><span data-dcnode-id="3392" instrument_node="">, is the study of the abundance and reactions of </span><a class="mw-redirect" data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_elements" title="Chemical elements"><span data-dcnode-id="3391" instrument_node="">chemical elements</span></a><span data-dcnode-id="3389" instrument_node=""> and molecules in space, and their interaction with radiation. The formation, atomic and chemical composition, evolution and fate of </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molecular_cloud" title="Molecular cloud"><span data-dcnode-id="3388" instrument_node="">molecular gas clouds</span></a><span data-dcnode-id="3386" instrument_node="">, is of special interest because it is from these clouds that solar systems form.
</span></p><p data-dcnode-id="3359"><span data-dcnode-id="3384" instrument_node="">Infrared astronomy, for example, has revealed that the </span><a data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstellar_medium" title="Interstellar medium"><span data-dcnode-id="3383" instrument_node="">interstellar medium</span></a><span data-dcnode-id="3381" instrument_node=""> contains a suite of complex gas-phase carbon compounds called aromatic hydrocarbons, often abbreviated (</span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polycyclic_aromatic_hydrocarbon" title="Polycyclic aromatic hydrocarbon"><span data-dcnode-id="3380" instrument_node="">PAHs</span></a><span data-dcnode-id="3378" instrument_node=""> or PACs). These molecules composed primarily of fused rings of carbon (either neutral or in an ionized state) are said to be the most common class of carbon compound in the galaxy. They are also the most common class of carbon molecule in </span><a data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meteorite" title="Meteorite"><span data-dcnode-id="3377" instrument_node="">meteorites</span></a><span data-dcnode-id="3375" instrument_node=""> and in cometary and asteroidal dust (</span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_dust" title="Cosmic dust"><span data-dcnode-id="3374" instrument_node="">cosmic dust</span></a><span data-dcnode-id="3372" instrument_node="">). These compounds, as well as the amino acids, nucleobases, and many other compounds in meteorites, carry </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deuterium" title="Deuterium"><span data-dcnode-id="3371" instrument_node="">deuterium</span></a><span data-dcnode-id="3369" instrument_node=""> (</span><sup data-dcnode-id="3367"><span data-dcnode-id="3368" instrument_node="">2</span></sup><span data-dcnode-id="3366" instrument_node="">H) and </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isotope" title="Isotope"><span data-dcnode-id="3365" instrument_node="">isotopes</span></a><span data-dcnode-id="3363" instrument_node=""> of carbon, nitrogen, and oxygen that are very rare on earth, attesting to their extraterrestrial origin. The PAHs are thought to form in hot circumstellar environments (around dying carbon rich </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_giant" title="Red giant"><span data-dcnode-id="3362" instrument_node="">red giant</span></a><span data-dcnode-id="3360" instrument_node=""> stars).
</span></p><p data-dcnode-id="3308"><span data-dcnode-id="3358" instrument_node="">The sparseness of interstellar and interplanetary space results in some unusual chemistry, since symmetry-forbidden reactions cannot occur except on the longest of timescales. For this reason, molecules and molecular ions which are unstable on earth can be highly abundant in space, for example the </span><a class="mw-redirect" data-dcnode-id="3352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protonated_molecular_hydrogen" title="Protonated molecular hydrogen"><span data-dcnode-id="3357" instrument_node="">H</span><sub data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">3</span></sub><sup data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">+</span></sup></a><span data-dcnode-id="3351" instrument_node=""> ion. Astrochemistry overlaps with </span><a data-dcnode-id="3349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrophysics" title="Astrophysics"><span data-dcnode-id="3350" instrument_node="">astrophysics</span></a><span data-dcnode-id="3348" instrument_node=""> and </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_physics" title="Nuclear physics"><span data-dcnode-id="3347" instrument_node="">nuclear physics</span></a><span data-dcnode-id="3345" instrument_node=""> in characterizing the nuclear reactions which occur in stars, the consequences for </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_evolution" title="Stellar evolution"><span data-dcnode-id="3344" instrument_node="">stellar evolution</span></a><span data-dcnode-id="3342" instrument_node="">, as well as stellar 'generations'. Indeed, the nuclear reactions in stars produce every naturally occurring </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chemical_element" title="Chemical element"><span data-dcnode-id="3341" instrument_node="">chemical element</span></a><span data-dcnode-id="3339" instrument_node="">. As the stellar 'generations' advance, the mass of the newly formed elements increases. A first-generation star uses elemental </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrogen" title="Hydrogen"><span data-dcnode-id="3338" instrument_node="">hydrogen</span></a><span data-dcnode-id="3336" instrument_node=""> (H) as a fuel source and produces </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helium" title="Helium"><span data-dcnode-id="3335" instrument_node="">helium</span></a><span data-dcnode-id="3333" instrument_node=""> (He). Hydrogen is the most abundant element, and it is the basic building block for all other elements as its nucleus has only one </span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proton" title="Proton"><span data-dcnode-id="3332" instrument_node="">proton</span></a><span data-dcnode-id="3330" instrument_node="">. Gravitational pull toward the center of a star creates massive amounts of heat and pressure, which cause </span><a data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_fusion" title="Nuclear fusion"><span data-dcnode-id="3329" instrument_node="">nuclear fusion</span></a><span data-dcnode-id="3327" instrument_node="">. Through this process of merging nuclear mass, heavier elements are formed. </span><a data-dcnode-id="3325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithium" title="Lithium"><span data-dcnode-id="3326" instrument_node="">Lithium</span></a><span data-dcnode-id="3324" instrument_node="">, </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon" title="Carbon"><span data-dcnode-id="3323" instrument_node="">carbon</span></a><span data-dcnode-id="3321" instrument_node="">, </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nitrogen" title="Nitrogen"><span data-dcnode-id="3320" instrument_node="">nitrogen</span></a><span data-dcnode-id="3318" instrument_node=""> and </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxygen" title="Oxygen"><span data-dcnode-id="3317" instrument_node="">oxygen</span></a><span data-dcnode-id="3315" instrument_node=""> are examples of elements that form in stellar fusion. After many stellar generations, very heavy elements are formed (e.g. </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron" title="Iron"><span data-dcnode-id="3314" instrument_node="">iron</span></a><span data-dcnode-id="3312" instrument_node=""> and </span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lead" title="Lead"><span data-dcnode-id="3311" instrument_node="">lead</span></a><span data-dcnode-id="3309" instrument_node="">).
</span></p><span data-dcnode-id="3307" instrument_node="">
</span><h2 data-dcnode-id="3297"><span class="mw-headline" data-dcnode-id="3305" id="Tools_of_theoretical_astronomy"><span data-dcnode-id="3306" instrument_node="">Tools of theoretical astronomy</span></span><span class="mw-editsection" data-dcnode-id="3298"><span class="mw-editsection-bracket" data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">[</span></span><a data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D3" title="Edit section: Tools of theoretical astronomy"><span data-dcnode-id="3302" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3295" instrument_node="">Theoretical astronomers use a wide variety of tools which include </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematical_model" title="Mathematical model"><span data-dcnode-id="3294" instrument_node="">analytical models</span></a><span data-dcnode-id="3292" instrument_node="">  (for example, </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polytrope" title="Polytrope"><span data-dcnode-id="3291" instrument_node="">polytropes</span></a><span data-dcnode-id="3289" instrument_node=""> to approximate the behaviors of a </span><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Star" title="Star"><span data-dcnode-id="3288" instrument_node="">star</span></a><span data-dcnode-id="3286" instrument_node="">) and </span><a data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computation" title="Computation"><span data-dcnode-id="3285" instrument_node="">computational</span></a><span data-dcnode-id="3283" instrument_node=""> </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Numerical_analysis" title="Numerical analysis"><span data-dcnode-id="3282" instrument_node="">numerical simulations</span></a><span data-dcnode-id="3280" instrument_node="">. Each has some advantages. Analytical models of a process are generally better for giving insight into the heart of what is going on. Numerical models can reveal the existence of phenomena and effects that would otherwise not be seen.</span><sup class="reference" data-dcnode-id="3277" id="cite_ref-Roth_2-0"><a data-dcnode-id="3278" href="#cite_note-Roth-2"><span data-dcnode-id="3279" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3274" id="cite_ref-Eddington_3-0"><a data-dcnode-id="3275" href="#cite_note-Eddington-3"><span data-dcnode-id="3276" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3273" instrument_node="">
</span></p><p data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Astronomy theorists endeavor to create theoretical models and figure out the observational consequences of those models. This helps observers look for data that can refute a model or help in choosing between several alternate or conflicting models.
</span></p><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Theorists also try to generate or modify models to take into account new data. Consistent with the general scientific approach, in the case of an inconsistency, the general tendency is to try to make minimal modifications to the model to fit the data. In some cases, a large amount of inconsistent data over time may lead to total abandonment of a model.
</span></p><span data-dcnode-id="3267" instrument_node="">
</span><h2 data-dcnode-id="3257"><span class="mw-headline" data-dcnode-id="3265" id="Topics_of_theoretical_astronomy"><span data-dcnode-id="3266" instrument_node="">Topics of theoretical astronomy</span></span><span class="mw-editsection" data-dcnode-id="3258"><span class="mw-editsection-bracket" data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">[</span></span><a data-dcnode-id="3261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D4" title="Edit section: Topics of theoretical astronomy"><span data-dcnode-id="3262" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Topics studied by theoretical astronomers include:
</span></p><span data-dcnode-id="3253" instrument_node="">
</span><ol data-dcnode-id="3209"><li data-dcnode-id="3246"><a data-dcnode-id="3251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_dynamics" title="Stellar dynamics"><span data-dcnode-id="3252" instrument_node="">stellar dynamics</span></a><span data-dcnode-id="3250" instrument_node=""> and </span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stellar_evolution" title="Stellar evolution"><span data-dcnode-id="3249" instrument_node="">evolution</span></a><span data-dcnode-id="3247" instrument_node="">;</span></li><span data-dcnode-id="3245" instrument_node="">
</span><li data-dcnode-id="3241"><a data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxy_formation_and_evolution" title="Galaxy formation and evolution"><span data-dcnode-id="3244" instrument_node="">galaxy formation</span></a><span data-dcnode-id="3242" instrument_node="">;</span></li><span data-dcnode-id="3240" instrument_node="">
</span><li data-dcnode-id="3230"><a class="mw-redirect" data-dcnode-id="3238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large-scale_structure_of_the_universe" title="Large-scale structure of the universe"><span data-dcnode-id="3239" instrument_node="">large-scale structure</span></a><span data-dcnode-id="3237" instrument_node="">  of </span><a data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matter" title="Matter"><span data-dcnode-id="3236" instrument_node="">matter</span></a><span data-dcnode-id="3234" instrument_node="">  in the </span><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universe" title="Universe"><span data-dcnode-id="3233" instrument_node="">Universe</span></a><span data-dcnode-id="3231" instrument_node="">;</span></li><span data-dcnode-id="3229" instrument_node="">
</span><li data-dcnode-id="3224"><span data-dcnode-id="3228" instrument_node="">origin of </span><a data-dcnode-id="3226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_ray" title="Cosmic ray"><span data-dcnode-id="3227" instrument_node="">cosmic rays</span></a><span data-dcnode-id="3225" instrument_node="">;</span></li><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3210"><a data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_relativity" title="General relativity"><span data-dcnode-id="3222" instrument_node="">general relativity</span></a><span data-dcnode-id="3220" instrument_node=""> and </span><a data-dcnode-id="3218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physical_cosmology" title="Physical cosmology"><span data-dcnode-id="3219" instrument_node="">physical cosmology</span></a><span data-dcnode-id="3217" instrument_node="">, including </span><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/String_theory" title="String theory"><span data-dcnode-id="3216" instrument_node="">string</span></a><span data-dcnode-id="3214" instrument_node=""> cosmology and </span><a data-dcnode-id="3212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astroparticle_physics" title="Astroparticle physics"><span data-dcnode-id="3213" instrument_node="">astroparticle physics</span></a><span data-dcnode-id="3211" instrument_node="">.</span></li></ol><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3197"><span data-dcnode-id="3207" instrument_node="">Astrophysical relativity serves as a tool to gauge the properties of large scale structures for which gravitation plays a significant role in physical phenomena investigated and as the basis for </span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_hole" title="Black hole"><span data-dcnode-id="3206" instrument_node="">black hole</span></a><span data-dcnode-id="3204" instrument_node=""> (astro)</span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physics" title="Physics"><span data-dcnode-id="3203" instrument_node="">physics</span></a><span data-dcnode-id="3201" instrument_node=""> and the study of </span><a class="mw-redirect" data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravitational_waves" title="Gravitational waves"><span data-dcnode-id="3200" instrument_node="">gravitational waves</span></a><span data-dcnode-id="3198" instrument_node="">.
</span></p><span data-dcnode-id="3196" instrument_node="">
</span><h2 data-dcnode-id="3186"><span class="mw-headline" data-dcnode-id="3194" id="Astronomical_models"><span data-dcnode-id="3195" instrument_node="">Astronomical models</span></span><span class="mw-editsection" data-dcnode-id="3187"><span class="mw-editsection-bracket" data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">[</span></span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTheoretical_astronomy%26action%3Dedit%26section%3D5" title="Edit section: Astronomical models"><span data-dcnode-id="3191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3185" instrument_node="">
</span><p data-dcnode-id="3168"><span data-dcnode-id="3184" instrument_node="">Some widely accepted and studied theories and models in astronomy, now included in the </span><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lambda-CDM_model" title="Lambda-CDM model"><span data-dcnode-id="3183" instrument_node="">Lambda-CDM model</span></a><span data-dcnode-id="3181" instrument_node=""> are the </span><a data-dcnode-id="3179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_Bang" title="Big Bang"><span data-dcnode-id="3180" instrument_node="">Big Bang</span></a><span data-dcnode-id="3178" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_inflation" title="Cosmic inflation"><span data-dcnode-id="3177" instrument_node="">Cosmic inflation</span></a><span data-dcnode-id="3175" instrument_node="">, </span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dark_matter" title="Dark matter"><span data-dcnode-id="3174" instrument_node="">dark matter</span></a><span data-dcnode-id="3172" instrument_node="">, and fundamental theories of </span><a data-dcnode-id="3170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physics" title="Physics"><span data-dcnode-id="3171" instrument_node="">physics</span></a><span data-dcnode-id="3169" instrument_node="">.
