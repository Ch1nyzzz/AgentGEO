</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="1802" id="2393617" scrollto-destination="2393617"><span data-dcnode-id="1803" instrument_node="">Abstract</span></h2><span data-dcnode-id="1801" instrument_node="">
</span><section class="abstract" data-dcnode-id="1798"><p class="chapter-para" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Robotics is an engineering discipline that has much to offer astronomy. Although its application to planetary science is broadly appreciated, its potential for astronomy is not so widely known. We present a brief outline of some of the benefits of using robots in space-based astronomy. We hope to engage the astronomy community in demonstrating the capabilities of robotics and how this type of technology can be deployed to maximize the scientific return from space-based astronomy missions. We consider in particular the role of the European Robotic Arm (ERA) mounted on the International Space Station (ISS) in the proposed XEUS (X-ray Evolving Universe Spectroscopy) mission. We also consider other potential areas in which robotics can enhance astronomical technology. We submit that robotics will become increasingly important for astronomy as an observational discipline for future generations of astronomy platforms in space.</span></p></section><span data-dcnode-id="1797" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="1788"><div class="article-metadata-tocSections" data-dcnode-id="1789"><span data-dcnode-id="1796" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Issue Section:</span></div><span data-dcnode-id="1793" instrument_node="">
</span><a data-dcnode-id="1791" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/astrogeo/search-results%3Ff_TocHeadingTitle%3DFeatures"><span data-dcnode-id="1792" instrument_node="">Features</span></a><span data-dcnode-id="1790" instrument_node="">
</span></div></div><span data-dcnode-id="1787" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1769"><span data-dcnode-id="1786" instrument_node="">The role of robotics' cousin discipline — artificial intelligence (AI) — in astronomy is well understood. The primary role for AI is in aiding the human astronomer in coping with large amounts of data, a task to which the human brain is not well suited. Neural networks have found several applications such as in data classification and image processing. Similarly, expert systems have found similar utility in data classification, particularly for large data sets. Less well understood is the role that robotics itself can play in astronomy. The primary role of robotics in space missions is to augment or replace human activity in space. The role of robotics in planetary exploration is readily appreciated — robotic landers, rovers, penetrators, manipulator arms, aerobots, cryobots, snakebots etc are enabling technologies that provide the means to deliver scientific instruments to selected targets of interest above, on or in planetary locations (</span><span class="xrefLink" data-dcnode-id="1785" id="jumplink-bib5"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1783" data-google-interstitial="false" data-open="bib5" href="javascript:;" reveal-id="bib5"><span data-dcnode-id="1784" instrument_node="">Ellery 2002a</span></a><span data-dcnode-id="1782" instrument_node="">.</span><span class="xrefLink" data-dcnode-id="1781" id="jumplink-bib6"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1779" data-google-interstitial="false" data-open="bib6" href="javascript:;" reveal-id="bib6"><span data-dcnode-id="1780" instrument_node="">b</span></a><span data-dcnode-id="1778" instrument_node="">,</span><span class="xrefLink" data-dcnode-id="1777" id="jumplink-bib7"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1775" data-google-interstitial="false" data-open="bib7" href="javascript:;" reveal-id="bib7"><span data-dcnode-id="1776" instrument_node="">c</span></a><span data-dcnode-id="1774" instrument_node="">, </span><span class="xrefLink" data-dcnode-id="1773" id="jumplink-bib8"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1771" data-google-interstitial="false" data-open="bib8" href="javascript:;" reveal-id="bib8"><span data-dcnode-id="1772" instrument_node="">2003</span></a><span data-dcnode-id="1770" instrument_node="">). Less well appreciated is the role that robotics can play in advancing astronomical instrumentation.</span></p><p class="chapter-para" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Of interest to astronomers is the use of astronauts for servicing or repairing space astronomy platforms, so spectacularly demonstrated on the Solar Maximum Repair Mission of 1984 and the first Hubble Space Telescope Repair Mission of 1993. Using astronauts is expensive — NASA costs extravehicular activity at $70 000 per hour, not including the substantial costs of neutral buoyancy training, and the cost of each shuttle launch (nominally $1 bn). The first HST repair mission needed 35.5 hours EVA and 400 hours of neutral buoyancy training; unofficial estimates of the mission costs are $700 m. Robotics, acting as transmitters of human capabilities in remote environments, offers great flexibility in the deployment of scientific instruments and experiments, and the possibility of servicing of astronomical payloads at much lower cost.</span></p><p class="chapter-para" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Although there have been several developments in using the internet for the robotic control and scheduling of ground-based telescopes, I shall outline the role of robotics in space-based astronomical platforms. In particular, I shall describe the proposed XEUS (X-ray Evolving Universe Spectroscopy) mission as an indication of the future direction of space-based astronomy. I shall also be outlining a series of possible roles for robotics in astronomy of the future in enhancing the scientific returns from observations and enhancing the productivity of astronomers.</span></p><span data-dcnode-id="1764" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1762" data-legacy-id="ss1" id="2393622" scrollto-destination="2393622"><span data-dcnode-id="1763" instrument_node="">X-ray Evolving Universe Spectroscopy — XEUS</span></h2><span data-dcnode-id="1761" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1752"><span data-dcnode-id="1760" instrument_node="">The X-ray Evolving Universe Spectroscopy (XEUS) mission is being proposed as the successor to the European X-ray observatory XMM-Newton (launched in 1999) with a sensitivity some 250 times greater than XMM-Newton, at ˜50—30 000 eV (</span><span class="xrefLink" data-dcnode-id="1759" id="jumplink-bib13"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1757" data-google-interstitial="false" data-open="bib13" href="javascript:;" reveal-id="bib13"><span data-dcnode-id="1758" instrument_node="">Parmar 2002</span></a><span data-dcnode-id="1756" instrument_node="">). XEUS observations should begin in 2012. In particular, XEUS will be focusing on detecting super-massive black holes of ˜10</span><sup data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">6</span></sup><span data-dcnode-id="1753" instrument_node=""> M⊙ that are believed to have formed in the early universe by the collapse of massive clouds of hydrogen. These large black holes may have been prime movers in the coalescence of galaxies and the instigation of the first generation of stars. Such faint objects can be detected by X-ray emissions from infalling matter of surrounding accretion disks, especially when they become enriched with metals from nearby stars. Fe atoms in black-hole accretion disks emit a characteristic X-ray of energy 6.4 keV which will be Doppler shifted according to its motion in the disk. X-rays will also be gravitationally redshifted because of their energy loss in overcoming the gravitational potential of the black hole. In addition, by virtue of the great distances to such early epochs, a cosmological redshift will be imposed.</span></p><p class="chapter-para" data-dcnode-id="1747"><span data-dcnode-id="1751" instrument_node="">XEUS will be constructed and upgraded in stages using the International Space Station, offering the possibility of a permanent X-ray observatory in space. XEUS will consist of two spacecraft flying in formation in low Earth orbit (LEO) at 600 km altitude — much lower than traditional X-ray astronomy missions. The satellite formation — the Detector and Mirror craft flying about 50 m apart — maintains the focal length of the telescope at 50 m (compared to 7.5 m for XMM-Newton) by means of automatic control of the Detector spacecraft's eight thrusters to within ˜1 mm using laser rangefinders. The Mirror spacecraft is a 6–30 m</span><sup data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">2</span></sup><span data-dcnode-id="1748" instrument_node=""> collector with a sensitivity to 2 keV X-rays and an angular resolution of 2 eV. It collects X-rays and focuses them by glancing them off the inside faces of the parabolic/hyperbolic mirror elements on to the Detector spacecraft equipped with semiconductor and superconductor detectors. The mirror assembly comprises Wolter-1 open-surface grazing-incidence Ni cells integrated into “petals”. Each petal will be individually actuated to provide the required spatial resolution of 2–5 arcsec. The wide-field detector array will use semiconductor technology. The narrow-field detector array of bolometers or quantum tunnelling junctions will require cooling to temperatures ˜50 mK using adiabatic demagnetization technology. The front-end electronics will be based on Superconducting Quantum Interference Devices. The Detector spacecraft supports all spacecraft housekeeping and payload support systems.</span></p><p class="chapter-para" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">The XEUS mission plan involves regular refurbishment and upgrading at the ISS, every 4–5 years. The launch will put in place XEUS 1, comprising a 4.5 m diameter assembly of 300 mirror elements in two concentric rings of 16 petals each. During the first upgrade, XEUS 1 will become XEUS 2. XEUS 2 will have a 10 m diameter assembly of 500 mirror elements arranged in three additional rings of eight sectors, each sector of 12 petals. The first stage of the upgrade will require the XEUS Mirror spacecraft to re-dock with the Detector spacecraft and the combination to then manoeuvre, intercept and dock with ISS at 350 km altitude. This will consume most of the Detector spacecraft's propellant, so it will require either refuelling or wholesale replacement with a new Detector spacecraft equipped with better detector technology. The Mirror spacecraft will dock with the Russian segment of ISS to receive additional eight-mirror sectors (previously delivered to ISS) from the European Robotic Arm, transforming it into XEUS 2. The XEUS 2 Mirror spacecraft will then re-insert itself into its 600 km altitude operational orbit at its correct focal distance from the Detector spacecraft. This will give XEUS an operational lifetime of 25 years and increase its sensitivity from 40 times that of XMM-Newton to 250 times. The Detector spacecraft may be upgraded independently as required.</span></p><span data-dcnode-id="1744" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1742" data-legacy-id="ss2" id="2393626" scrollto-destination="2393626"><span data-dcnode-id="1743" instrument_node="">European Robotic Arm</span></h2><span data-dcnode-id="1741" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1735"><span data-dcnode-id="1740" instrument_node="">The European Robotic Arm (see </span><span class="xrefLink" data-dcnode-id="1739" id="jumplink-fig1"></span><a class="link link-reveal link-table xref-fig" data-dcnode-id="1737" data-google-interstitial="false" data-open="fig1" href="javascript:;" reveal-id="fig1"><span data-dcnode-id="1738" instrument_node="">figure 1</span></a><span data-dcnode-id="1736" instrument_node="">) was originally built for Hermes; its usefullness now on ISS illustrates the flexibility of robotics for space missions. Its primary role on ISS is for the installation and replacement of large solar arrays, external inspection of the station (including non-destructive structure testing via infrared sensors), handling ORUs (Orbital Replacement Units) and equipment boxes of mass 20—100 kg, and handling of external payloads such as the XEUS mirror sectors to minimize the need for EVA. Its use in the retrieval and deployment of free-flying platforms, for the deployment of mini-satellites and for the assembly of large spacecraft in LEO are derived from these design capabilities.</span></p><span data-dcnode-id="1734" instrument_node=""> </span><a data-dcnode-id="1733" data-google-interstitial="false" id="2393628" scrollto-destination="2393628"></a><span data-dcnode-id="1732" instrument_node="">
</span><div class="fig fig-section js-fig-section" data-dcnode-id="1719" data-id="fig1"><div class="label fig-label" data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">1:</span></div><div class="graphic-wrap" data-dcnode-id="1723"><img alt="The European Robotic Arm has undergone a number of guises, illustrating its diverse utility for space operations. Designed and built by Fokker Space as prime contractor, it is due to be deployed on the Science and Power Platform of the Russian segment of the ISS. ERA was originally designed as HERA (HErmes Robotic Arm) for the movement of cargo from the now-cancelled Hermes spaceplane cargo bay to the Columbus Man Tended Free Flyer (now the Columbus laboratory of the ISS). Its subsequent re-badging for a new general-purpose role on ISS illustrates the flexibility of robotics in space missions." class="content-image" data-dcnode-id="1729" data-path-from-xml="44-3-3.23-fig001.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/astrogeo/44/3/10.1046/j.1468-4004.2003.44323.x/2/m_44-3-3.23-fig001.gif%3FExpires%3D1653545750%26Signature%3DkxhsAIxmRtuHdztmgg1muCbzZL-rqE2NlHiAwIYD5TVvqg0ufVLkbgAL4BRPUbaDJjSeWDDJbmSXMP07NEqEzynvJhXi9kp0SnhxaiTQt7khbAQRjYvgYN8eS0b28i13av2sDRXzpnnBZKLbSV~IcKH7JRhEpSsmukGsLw90JE2h-LLFcfDyQGB76Qkt~0dGimqaj3xRzD37Wu9ioe4YOuJOm1uGzzT3Pi40q4FKe8zcUbusOTjRe8s4348HTmtS8ltXMymwTq5EsJ1fvy2lYXhMuKaACkTJM6g3A58WE98i6jW4EZpsbOQ8SJGlMuBByizQ0T7FoKbWRFF~mulCVQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="1724"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="1727" data-google-interstitial="false" data-path-from-xml="44-3-3.23-fig001.gif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/2393628/44-3-3.23-fig001.gif" target="_blank"><span data-dcnode-id="1728" instrument_node="" ment_node="">1:</span></div><div class="graphic-wrap" data-dcnode-id="1710"><img alt="The European Robotic Arm has undergone a number of guises, illustrating its diverse utility for space operations. Designed and built by Fokker Space as prime contractor, it is due to be deployed on the Science and Power Platform of the Russian segment of the ISS. ERA was originally designed as HERA (HErmes Robotic Arm) for the movement of cargo from the now-cancelled Hermes spaceplane cargo bay to the Columbus Man Tended Free Flyer (now the Columbus laboratory of the ISS). Its subsequent re-badging for a new general-purpose role on ISS illustrates the flexibility of robotics in space missions." class="content-image" data-dcnode-id="1716" data-path-from-xml="44-3-3.23-fig001.gif" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/astrogeo/44/3/10.1046/j.1468-4004.2003.44323.x/2/m_44-3-3.23-fig001.gif%3FExpires%3D1653545750%26Signature%3DkxhsAIxmRtuHdztmgg1muCbzZL-rqE2NlHiAwIYD5TVvqg0ufVLkbgAL4BRPUbaDJjSeWDDJbmSXMP07NEqEzynvJhXi9kp0SnhxaiTQt7khbAQRjYvgYN8eS0b28i13av2sDRXzpnnBZKLbSV~IcKH7JRhEpSsmukGsLw90JE2h-LLFcfDyQGB76Qkt~0dGimqaj3xRzD37Wu9ioe4YOuJOm1uGzzT3Pi40q4FKe8zcUbusOTjRe8s4348HTmtS8ltXMymwTq5EsJ1fvy2lYXhMuKaACkTJM6g3A58WE98i6jW4EZpsbOQ8SJGlMuBByizQ0T7FoKbWRFF~mulCVQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA&amp;raw"><div class="fig-orig original-slide" data-dcnode-id="1711"><a class="fig-view-orig js-view-large openInAnotherWindow" data-dcnode-id="1714" data-google-interstitial="false" data-path-from-xml="44-3-3.23-fig001.gif" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/view-large/figure/2393628/44-3-3.23-fig001.gif" target="_blank"><span data-dcnode-id="1715" instrument_node="">Open in new tab</span></a><a class="download-slide" data-dcnode-id="1712" data-google-interstitial="false" data-path-from-xml="44-3-3.23-fig001.gif" data-section="2393628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/DownloadFile/DownloadImage.aspx%3Fimage%3Dhttps%3A//oup.silverchair-cdn.com/oup/backfile/Content_public/Journal/astrogeo/44/3/10.1046/j.1468-4004.2003.44323.x/2/44-3-3.23-fig001.gif%3FExpires%3D1653545750%26Signature%3DxE60hVrN8MekXW4Erg2hR7xAxRNwYJ5EelFX1C7oDaBhMX4PGMX1LK23~Z7p1HYTC5RKQgWLKtFBp1zlUOT6SAksEkzBByI83OeRAxK6C3xxGddHqp99cG-RflnrUa9YOQLE92WqVfXsIZd5MOEsMik15h6bWD5ubmK87TIjLo7x2T0xdfV-WwEIIAtyXlN8Bun6pkzOAwXwYd3TU3peCO7ucUmJkUErV9~lbx1mtSeq9UXLwljLIRcK3JqmWhhPieTG8WSXrvnnF0P9kJN5J4482Bc07O-KEII0srJ~50636fzviUrSO-UOF-~1fgN1v2CL43~CDTdusH6c3iTaDQ__%26Key-Pair-Id%3DAPKAIE5G5CRDK6RD3PGA%26sec%3D2393628%26ar%3D217190%26xsltPath%3D~/UI/app/XSLT%26imagename%3D%26siteId%3D5264"><span data-dcnode-id="1713" instrument_node="">Download slide</span></a></div></div><div class="caption fig-caption" data-dcnode-id="1707"><p class="chapter-para" data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The European Robotic Arm has undergone a number of guises, illustrating its diverse utility for space operations. Designed and built by Fokker Space as prime contractor, it is due to be deployed on the Science and Power Platform of the Russian segment of the ISS. ERA was originally designed as HERA (HErmes Robotic Arm) for the movement of cargo from the now-cancelled Hermes spaceplane cargo bay to the Columbus Man Tended Free Flyer (now the Columbus laboratory of the ISS). Its subsequent re-badging for a new general-purpose role on ISS illustrates the flexibility of robotics in space missions.</span></p></div></div><p class="chapter-para" data-dcnode-id="1700"><span data-dcnode-id="1705" instrument_node="">ERA has a total mass of 630 kg with a maximum payload capacity of 8 tonnes (and minimum dimensions of 0.5×0.5×0.5 m) and a minimum positioning accuracy of 3 mm (</span><span class="xrefLink" data-dcnode-id="1704" id="jumplink-bib1"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1702" data-google-interstitial="false" data-open="bib1" href="javascript:;" reveal-id="bib1"><span data-dcnode-id="1703" instrument_node="">Boumans and Heemskerk 1998</span></a><span data-dcnode-id="1701" instrument_node="">). It is 11.3 m long, in three modular segments and consumes 800 W (peak), 475 W (average) and 250 W (hibernation). It is built like a human arm, with two symmetrical segments of carbon fibre joined to a single-degree-of-freedom elbow joint. Each arm has identical grippers each mounted on to a three-degrees-of-freedom wrist — ERA thus has seven degrees of freedom in total. It sports four identical CCD cameras with integrated lighting units and integrated vision-processing electronics, one at each end and two mounted close to and either side of the elbow joint. ERA can transfer data, CCIR video and 120 V/27 V power through its electrical connectors and can latch to grapple fixtures and transmit mechanical force/torque — it even has a built-in screwdriver (Integrated Service Tool, IST). Thanks to its onboard computer, ERA can “walk” hand-over-hand between fixed base-points around the exterior of the station, limited by its maximum speed of movement of 0.2 m/s. ERA may be operated by an astronaut within the station or from a ground station, or through supervised autonomy.</span></p><p class="chapter-para" data-dcnode-id="1690"><span data-dcnode-id="1699" instrument_node="">ERA may be further enhanced by adding small, lightweight dextrous manipulators such as JERICO (</span><span class="xrefLink" data-dcnode-id="1698" id="jumplink-bib10"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1696" data-google-interstitial="false" data-open="bib10" href="javascript:;" reveal-id="bib10"><span data-dcnode-id="1697" instrument_node="">Heemskerk 1998</span></a><span data-dcnode-id="1695" instrument_node="">). Such a manipulator system may be used for the handling of non-standard mechanical interfaces, handling of small objects (smaller objects are more common than larger ones), removal of protective covers, handling of thermal blankets, and the management of external scientific experiments, among others. Activities relevant to scientific payload tending may include enhanced experiment interaction, cleaning of optical surfaces, recoating of sensitive surfaces, and restoration of sputtered surfaces, and recalibration of pointing mechanisms, thus extending instrument operational lifetimes, simplifying instrument design, and allowing more flexible experimental procedures (</span><span class="xrefLink" data-dcnode-id="1694" id="jumplink-bib11"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1692" data-google-interstitial="false" data-open="bib11" href="javascript:;" reveal-id="bib11"><span data-dcnode-id="1693" instrument_node="">Heemskerk and Didot 1998</span></a><span data-dcnode-id="1691" instrument_node="">).</span></p><span data-dcnode-id="1689" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1687" data-legacy-id="ss3" id="2393631" scrollto-destination="2393631"><span data-dcnode-id="1688" instrument_node="">Further roles for robotics in astronomy</span></h2><span data-dcnode-id="1686" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Although XEUS uses only two formation-flying spacecraft, future missions may involve large swarms of micro-sats flying in “constellations” to reduce costs and increasing onboard autonomy. The most popular approach to this is to avoid centralized planning in favour of distributed artificial intelligence (DAI). In DAI, the emphasis is on limited processing power of individual units enhanced by peer-to-peer communication — this implements an effectively parallel, breadth-first search algorithm. Variations on this are possible, for example using master—slave interactions that may be dynamic such as the blackboard system used extensively in robotics for planning.</span></p><p class="chapter-para" data-dcnode-id="1674"><span data-dcnode-id="1683" instrument_node="">Station-keeping capabilities such as those developed for XEUS can also be applied to space telescopes to maintain high pointing accuracy and improve stability to drift (</span><span class="xrefLink" data-dcnode-id="1682" id="jumplink-bib2"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1680" data-google-interstitial="false" data-open="bib2" href="javascript:;" reveal-id="bib2"><span data-dcnode-id="1681" instrument_node="">Delamere 1983</span></a><span data-dcnode-id="1679" instrument_node="">). Most space observatories tend to be integrated into the spacecraft structure rather than employing independent instrument gimballing, imposing the requirement for high-precision attitude control system capabilities. However, </span><span class="xrefLink" data-dcnode-id="1678" id="jumplink-bib4"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1676" data-google-interstitial="false" data-open="bib4" href="javascript:;" reveal-id="bib4"><span data-dcnode-id="1677" instrument_node="">Ellery (2000)</span></a><span data-dcnode-id="1675" instrument_node=""> has developed a feedforward compensation scheme for space-mounted manipulators that may be readily adapted to independent gimballing pointing control on spacecraft in conjunction with image motion compensation. Such technologies will be critical on projects such as the proposed Darwin interferometric telescope, STEP (Satellite Test of the Equivalence Principle) and LISA (Laser Interferometer Space Antenna).</span></p><p class="chapter-para" data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Robotic telescopy has enjoyed success in ground-based observations. Wireless LAN (local area network) technology provides the basis for using the internet for remote control of a robotic telescope and the scheduling of observing periods. The simplest form of automatic control is the accommodation of temperature-induced changes in the telescope structure which affects the focal plane of the telescope, using feedback-controlled stepper motors with encoders. More sophisticated automation of the telescope drive system has been implemented in several ground-based systems — a telescope model that implements a form of model-referenced adaptive control for coordinate transformations and the minimization of pointing errors has been adopted on the Keck telescope.</span></p><p class="chapter-para" data-dcnode-id="1656"><span data-dcnode-id="1671" instrument_node="">Beyond these forms of feedback control automation, robotic telescopes offer the observer the possibility of interacting with a remote telescope robotically. This interaction may be through time-division multiplexing of block-allocated periods for direct teleoperation (which is inefficient) or through full automation, removing the observer from the operation of the telescope during the observing run. Fully automated telescopes can operate with minimal or no staffing for extended periods of time. Multiple astronomers can submit observation requests through the internet for the telescope which may be automatically scheduled for an observing run that is accessible over the internet via a number of protocols. An example of this facility is APA (associate principal astronomer software which supports a human principal astronomer) which applies selection rules for scheduling of the observing run based on a database of observation histories (</span><span class="xrefLink" data-dcnode-id="1670" id="jumplink-bib3"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1668" data-google-interstitial="false" data-open="bib3" href="javascript:;" reveal-id="bib3"><span data-dcnode-id="1669" instrument_node="">Drummond 1995</span></a><span data-dcnode-id="1667" instrument_node="">). An objective function of multiple priority-weighted schedule characteristics (e.g. minimization of slewing requirements etc) applies heuristic “rules of thumb” to search the space of possible schedules and implement the most efficient schedule. Generally such scheduling is an NP-hard problem (being analagous to the Travelling Salesman Problem) in that there are </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">n</span></em><span data-dcnode-id="1664" instrument_node="">! possible schedules for </span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">n</span></em><span data-dcnode-id="1661" instrument_node=""> tasks and well-understood search algorithms can eliminate most of the least promising options. Most importantly, dynamic rescheduling may be necessary (e.g. a requested target hidden by clouds). This type of problem is recurrent in robotic planning which involves the scheduling of robotic actions, resolution of conflicts and re-planning on the fly when planning goals are not met. Indeed, the automated navigation software Remote Agent onboard Deep Space 1 has successfully demonstrated this type of automated scheduling and rescheduling process on a space exploration mission (</span><span class="xrefLink" data-dcnode-id="1660" id="jumplink-bib12"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1658" data-google-interstitial="false" data-open="bib12" href="javascript:;" reveal-id="bib12"><span data-dcnode-id="1659" instrument_node="">Muscettola 1997</span></a><span data-dcnode-id="1657" instrument_node="">). APA uses “just-in-case” scheduling to minimize the advent of errors and conflicts by generating robust, contingent schedules similar in spirit to the “just-in-time” scheduling in modern manufacturing plants. A local weather station may be used to augment a robotic telescope and monitor the local environment to minimize the errors resultant from poor observing conditions (cloud cover for ground-based observers may be a problem for photometry but not for spectroscopy); the Bradford robotic telescope has such a facility.</span></p><span data-dcnode-id="1655" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="1653" data-legacy-id="ss4" id="2393636" scrollto-destination="2393636"><span data-dcnode-id="1654" instrument_node="">Conclusions</span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="1646"><span data-dcnode-id="1651" instrument_node="">Many of these robotics and automation techniques are partially adopted on space-based telescopes. However, space telescopes are still supported by extensive human management which involves long lead times and reduced reactivity to events. Some of these activities may be suitable to automation. There is no doubt that the expense of space-based astronomy missions (some 40% of mission costs) justifies the expense of human support to a considerable degree, but there is little doubt that automation of aspects of the management and scheduling of observing time would be beneficial. In particular, astronomy satellites have limited windows of opportunity for taking measurements and imaging dictated by their orbits. Scheduling must ensure maximum efficiency of the use of such expensive spacecraft within the constraints of safety and this is best accomplished robotically (</span><span class="xrefLink" data-dcnode-id="1650" id="jumplink-bib9"></span><a class="link link-ref link-reveal xref-bibr" data-dcnode-id="1648" data-google-interstitial="false" data-open="bib9" href="javascript:;" reveal-id="bib9"><span data-dcnode-id="1649" instrument_node="">Harrison 1999</span></a><span data-dcnode-id="1647" instrument_node="">).</span></p><p class="chapter-para" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">We have indicated how robotics technologies and techniques can enhance observational astronomy in a multitude of ways, in no way meant to be exhaustive. In particular, my focus has been on space-based astronomy, stressing the role of robotics in the servicing of space platforms to extend their operational lifetimes and expanding their capabilities, using XEUS as an example. The UK Space &amp; Planetary Robotics Network (SPRN) is a loose aggregate of universities and companies specifically interested in applying robotics and related technologies to solving suitable problems in space or associated with space. Currently, the application of robotics to astronomy is under-realized, a situation that SPRN is committed to remedying. We invite the astronomy community to engage in collaboration with us to determine the most appropriate ways in which we can enhance your scientific goals and aspirations.</span></p><span data-dcnode-id="1643" instrument_node=""> </span><h2 class="backreferences-title js-splitscreen-backreferences-title" data-dcnode-id="1641" id="2393639" scrollto-destination="2393639"><span data-dcnode-id="1642" instrument_node="">References</span></h2><span data-dcnode-id="1640" instrument_node="">
