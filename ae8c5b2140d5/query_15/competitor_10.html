</span><div data-dcnode-id="148" data-page-json="{&quot;section_slug&quot;: &quot;overview&quot;, &quot;degree&quot;: {&quot;id&quot;: 245, &quot;name&quot;: &quot;Astronomy&quot;, &quot;slug&quot;: &quot;astronomy-degree&quot;, &quot;education_levels&quot;: [7, 8, 9], &quot;cip_code&quot;: &quot;40.0201&quot;, &quot;description&quot;: &quot;&quot;, &quot;small_thumbnail&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/c_fill,h_160,q_80,w_160/v1580505760/lblm4m2jftziqratuucc.jpg&quot;, &quot;banner_image&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/e_gradient_fade:50,y_-0.99/e_gradient_fade:15,x_0.99/c_fill,f_auto,h_350,o_85,w_1170/v1580505760/lblm4m2jftziqratuucc.jpg&quot;, &quot;degree_level&quot;: 3, &quot;status&quot;: 3}, &quot;degree_lowercase_name&quot;: &quot;astronomy&quot;, &quot;degree_income_stat&quot;: {&quot;degree&quot;: 245, &quot;education_level&quot;: 7, &quot;years_after_grad&quot;: null, &quot;is_overall&quot;: true, &quot;name&quot;: &quot;mean&quot;, &quot;value&quot;: 90884, &quot;year&quot;: 2017, &quot;source&quot;: 8}, &quot;degree_satisfaction_stat&quot;: null, &quot;degree_cost_stat&quot;: {&quot;degree_id&quot;: 245, &quot;id&quot;: 6256, &quot;source&quot;: 8, &quot;year&quot;: 2017, &quot;education_level&quot;: 7, &quot;school_type&quot;: 1, &quot;location_type&quot;: 1, &quot;avg_annual_cost&quot;: 11779.9927536232}, &quot;degree_category&quot;: {&quot;id&quot;: 1898, &quot;name&quot;: &quot;Astronomy and Related Studies&quot;, &quot;slug&quot;: &quot;astronomy-and-related-studies-category&quot;, &quot;education_levels&quot;: [], &quot;cip_code&quot;: &quot;40.02&quot;, &quot;description&quot;: &quot;&quot;, &quot;small_thumbnail&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/c_fill,h_160,q_80,w_160/v1582138004/gyp6hr00thjsp11mvzwu.jpg&quot;, &quot;banner_image&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/e_gradient_fade:50,y_-0.99/e_gradient_fade:15,x_0.99/c_fill,f_auto,h_350,o_85,w_1170/v1582138004/gyp6hr00thjsp11mvzwu.jpg&quot;, &quot;degree_level&quot;: 2, &quot;status&quot;: 3, &quot;public&quot;: true, &quot;parent_category&quot;: {&quot;id&quot;: 1895, &quot;name&quot;: &quot;Physical Sciences&quot;, &quot;slug&quot;: &quot;physical-sciences&quot;, &quot;education_levels&quot;: [], &quot;cip_code&quot;: &quot;40&quot;, &quot;description&quot;: &quot;The diversity of the physical sciences field means that it appeals to people with different, but related interests. Astronomy degree programs teach students about celestial bodies and the forces exerted by their interaction. Meteorology students learn how to predict weather conditions. Degree programs in chemistry focus on investigating the substances that make up matter and how scientists can use chemical processes to form new substances. Students of geology learn about the history, evolution, and climates of the earth. Physics students study matter and energy and learn about the relationships between the velocity, electric field, and kinetics of the universe. And material science majors examine the chemical composition of materials so that they can create new materials and build better products. \r\n\r\nIf you are fascinated with natural phenomena of the earth, the physical sciences may be the place for you.&quot;, &quot;small_thumbnail&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/c_fill,h_160,q_80,w_160/v1579912853/chjwfstu5astidptt0xl.jpg&quot;, &quot;banner_image&quot;: &quot;https://res.cloudinary.com/hnpb47ejt/image/upload/e_gradient_fade:50,y_-0.99/e_gradient_fade:15,x_0.99/c_fill,f_auto,h_350,o_85,w_1170/v1579912853/chjwfstu5astidptt0xl.jpg&quot;, &quot;degree_level&quot;: 1, &quot;status&quot;: 3, &quot;public&quot;: true, &quot;parent_category&quot;: null}}, &quot;can_render&quot;: {&quot;overview&quot;: true, &quot;tuition&quot;: true, &quot;career-paths&quot;: false, &quot;satisfaction&quot;: false, &quot;salary&quot;: true, &quot;diversity&quot;: false, &quot;personality&quot;: false}, &quot;path_name&quot;: &quot;/degrees/astronomy-degree/&quot;, &quot;degree_page_text_sections&quot;: [{&quot;degree_id&quot;: 245, &quot;page&quot;: 1, &quot;title&quot;: &quot;What is an Astronomy Degree?&quot;, &quot;summary_markdown&quot;: &quot;Astronomy degree programs teach students about celestial bodies and the energy and forces exerted by their interaction. This means that the curriculum is concerned with the study of objects in space, from the smallest neutrinos to planets, stars, solar systems, galaxies, asteroids, comets, and black holes. Aspiring [astronomers](/careers/astronomer) learn about when these objects were born, how they evolved, how some of them became extinct, and how they move in space. They develop skills to theorize about the origin of the cosmos and to predict future events in the universe. In addition, they study the mechanics involved in building and deploying space stations, satellites, space crafts, and transportation systems.&quot;, &quot;content_markdown&quot;: &quot;These are among the courses that make up an astronomy program:\r\n\r\n- Mathematics / Calculus\r\n- Statistics\r\n- Chemistry\r\n- Physics\r\n- Astrophysics\r\n- Cosmology \u2013 the science of the origin and development of the universe\r\n- Electromagnetism\r\n- Structure and Evolution of Stars\r\n- Planetary Geology\r\n- Computer Science\r\n- Computer Programming\r\n\r\n*Note:* Astronomy is the science of measuring the positions and characteristics of celestial bodies. Astrophysics is the application of the laws of physics to understand and interpret astronomy. As the difference is merely technical, the terms astronomy and astrophysics are used interchangeably.&quot;, &quot;content_html&quot;: &quot;<p>These are among the courses that make up an astronomy program:</p>\n<ul>\n<li>Mathematics / Calculus</li>\n<li>Statistics</li>\n<li>Chemistry</li>\n<li>Physics</li>\n<li>Astrophysics</li>\n<li>Cosmology \u2013 the science of the origin and development of the universe</li>\n<li>Electromagnetism</li>\n<li>Structure and Evolution of Stars</li>\n<li>Planetary Geology</li>\n<li>Computer Science</li>\n<li>Computer Programming</li>\n</ul>\n<p><em>Note:</em> Astronomy is the science of measuring the positions and characteristics of celestial bodies. Astrophysics is the application of the laws of physics to understand and interpret astronomy. As the difference is merely technical, the terms astronomy and astrophysics are used interchangeably.</p>&quot;, &quot;display_order&quot;: 1, &quot;created_at&quot;: &quot;2019-08-29T17:56:38.091512-07:00&quot;, &quot;updated_at&quot;: &quot;2022-01-18T13:08:32.934916-08:00&quot;}, {&quot;degree_id&quot;: 245, &quot;page&quot;: 1, &quot;title&quot;: &quot;Program Options&quot;, &quot;summary_markdown&quot;: &quot;**Bachelor\u2019s Degree in Astronomy \u2013 Four Year Duration**  \r\nAt the bachelor\u2019s level, astronomy students learn about the mathematics, chemistry, biology, physics, and engineering concepts that apply to the field. They are introduced to the two subfields of astronomy:\r\n\r\n- Observational Astronomy \u2013 the acquiring and analyzing of data using the principles of physics\r\n- Theoretical Astronomy \u2013 the design of computer models to study astronomical objects and phenomena\r\n\r\nCoursework includes:\r\n\r\n- Linear Algebra for Science\r\n- Calculus for Science\r\n- Chemical Reaction / Kinetics Laboratory\r\n- Dynamics, Waves, Electricity, and Magnetism\r\n- Experimental Physics Seminar\r\n- Astrophysics\r\n- Stars and Stellar Evolution\r\n- Computational Physics \u2013 Introductory\r\n- Geometrical and Physical Optics\r\n- Quantum Physics \u2013 Introductory\r\n- Galaxies\r\n- Astronomical/Astrophysical Observations, Instrumentation, and Data Analysis\r\n- Thermal Physics\r\n- Mechanics&quot;, &quot;content_markdown&quot;: &quot;**Master\u2019s Degree in Astronomy \u2013 Two Year Duration**  \r\nThis graduate degree program provides students with a broad understanding of the techniques used in both observational and theoretical astronomy. The curriculum emphasizes extensive research and experience in presenting it.\r\n\r\nHere is a sample of the coursework required:\r\n\r\n- Astronomical Dynamics\r\n- Cosmology / Black Holes\r\n- Neutron Stars\r\n- Galaxies\r\n- Particle Physics / High-energy Astrophysics\r\n- Planetary Astronomy\r\n- Stars / Stellar Structure\r\n- Astronomical Statistics\r\n- Observational Astronomy Techniques\r\n- Thesis \u2013 Master of Science in Astronomy\r\n\r\n**Doctoral Degree in Astronomy \u2013 Four Year Duration**  \r\nHolders of an astronomy Ph.D. often have careers as university professors and/or researchers in the field. The focus of a doctoral degree program in astronomy is conducting research to complete and defend an original dissertation. Students\u2019 coursework, therefore, depends on the research topic that they choose.\r\n\r\nThese are examples of possible areas of research:\r\n\r\n- Auroras\r\n- Asteroids\r\n- Big Bang theory\r\n- Comets\r\n- Mars water\r\n- Quasars\r\n- Remote sensing\r\n- Sagan effect\r\n- Supernova&quot;, &quot;content_html&quot;: &quot;<p><strong>Master\u2019s Degree in Astronomy \u2013 Two Year Duration</strong><br />\nThis graduate degree program provides students with a broad understanding of the techniques used in both observational and theoretical astronomy. The curriculum emphasizes extensive research and experience in presenting it.</p>\n<p>Here is a sample of the coursework required:</p>\n<ul>\n<li>Astronomical Dynamics</li>\n<li>Cosmology / Black Holes</li>\n<li>Neutron Stars</li>\n<li>Galaxies</li>\n<li>Particle Physics / High-energy Astrophysics</li>\n<li>Planetary Astronomy</li>\n<li>Stars / Stellar Structure</li>\n<li>Astronomical Statistics</li>\n<li>Observational Astronomy Techniques</li>\n<li>Thesis \u2013 Master of Science in Astronomy</li>\n</ul>\n<p><strong>Doctoral Degree in Astronomy \u2013 Four Year Duration</strong><br />\nHolders of an astronomy Ph.D. often have careers as university professors and/or researchers in the field. The focus of a doctoral degree program in astronomy is conducting research to complete and defend an original dissertation. Students\u2019 coursework, therefore, depends on the research topic that they choose.</p>\n<p>These are examples of possible areas of research:</p>\n<ul>\n<li>Auroras</li>\n<li>Asteroids</li>\n<li>Big Bang theory</li>\n<li>Comets</li>\n<li>Mars water</li>\n<li>Quasars</li>\n<li>Remote sensing</li>\n<li>Sagan effect</li>\n<li>Supernova</li>\n</ul>&quot;, &quot;display_order&quot;: 2, &quot;created_at&quot;: &quot;2019-08-29T17:56:38.093947-07:00&quot;, &quot;updated_at&quot;: &quot;2022-01-18T13:02:20.366610-08:00&quot;}, {&quot;degree_id&quot;: 245, &quot;page&quot;: 1, &quot;title&quot;: &quot;Degrees Similar to Astronomy&quot;, &quot;summary_markdown&quot;: &quot;**[Aerospace Engineering](/degrees/aerospace-engineering-degree/)**  \r\nThis field is dedicated to the design and development of aircraft, spacecraft, and missiles. Degree programs include the study of aerodynamics, orbits, launch, flight controls, and engines.\r\n\r\n**[Engineering Physics](/degrees/engineering-physics-degree/)**  \r\nStudents of this discipline focus on learning how to use physics to solve practical problems. For this reason, it is sometimes referred to as the bridge between physics and engineering.\r\n\r\n**[Meteorology](/degrees/meteorology-degree/) / Atmospheric Sciences**  \r\nThe field of meteorology is concerned with the Earth\u2019s atmosphere. Astronomy is concerned with objects beyond the atmosphere. The connections between the two disciplines are especially clear in these definitions:\r\n\r\n- Dynamic Meteorology \u2013 the study of the motions of the atmosphere based on the Earth\u2019s rapid rotation\r\n- Physical Meteorology \u2013 the study of the optical, electrical, acoustical, and thermodynamic phenomena in the atmosphere; the physics of clouds and precipitation&quot;, &quot;content_markdown&quot;: &quot;**[Geology](/degrees/geology-degree/)**  \r\nGeology is about the history of the Earth and the forces that act upon it. Geology coursework covers subjects like geochemistry, geophysics, and mineralogy.\r\n\r\n**[Mathematics](/degrees/mathematics-degree/)**  \r\nDegree programs in mathematics typically teach both the theory of *pure mathematics* and its practical application to the world, known as *applied mathematics*. In other words, math majors study more than algebra, geometry, calculus, and statistics. They learn about how math concepts are used in business management, computer science, economics, finance, music, philosophy, physics, and sports science.\r\n\r\n**[Physics](/degrees/physics-degree/)**  \r\nPhysics is a field that keeps changing as discoveries are made. This means that the field asks at least as many questions as it answers. Students of physics degree programs study matter and energy. They learn about the relationships between the measurable quantities in the universe, which include velocity, electric field, and kinetic energy. In simple terms, the study of physics is an attempt to figure out why objects move in the way that they do.&quot;, &quot;content_html&quot;: &quot;<p><strong><a href=\&quot;/degrees/geology-degree/\&quot;>Geology</a></strong><br />\nGeology is about the history of the Earth and the forces that act upon it. Geology coursework covers subjects like geochemistry, geophysics, and mineralogy.</p>\n<p><strong><a href=\&quot;/degrees/mathematics-degree/\&quot;>Mathematics</a></strong><br />\nDegree programs in mathematics typically teach both the theory of <em>pure mathematics</em> and its practical application to the world, known as <em>applied mathematics</em>. In other words, math majors study more than algebra, geometry, calculus, and statistics. They learn about how math concepts are used in business management, computer science, economics, finance, music, philosophy, physics, and sports science.</p>\n<p><strong><a href=\&quot;/degrees/physics-degree/\&quot;>Physics</a></strong><br />\nPhysics is a field that keeps changing as discoveries are made. This means that the field asks at least as many questions as it answers. Students of physics degree programs study matter and energy. They learn about the relationships between the measurable quantities in the universe, which include velocity, electric field, and kinetic energy. In simple terms, the study of physics is an attempt to figure out why objects move in the way that they do.</p>&quot;, &quot;display_order&quot;: 3, &quot;created_at&quot;: &quot;2019-08-29T17:56:38.096171-07:00&quot;, &quot;updated_at&quot;: &quot;2022-01-18T13:03:16.872265-08:00&quot;}, {&quot;degree_id&quot;: 245, &quot;page&quot;: 1, &quot;title&quot;: &quot;Skills You’ll Learn&quot;, &quot;summary_markdown&quot;: &quot;The study of the stars and other celestial bodies leaves astronomy grads with a skill set that employers in every sector appreciate:\r\n\r\n- Math and science\r\n- Research\r\n- Data analysis\r\n- Critical thinking\r\n- Complex problem-solving\r\n- Computer software\r\n- Patience\r\n- Flexibility\r\n- Dedication to ongoing learning&quot;, &quot;content_markdown&quot;: &quot;&quot;, &quot;content_html&quot;: &quot;<p>The study of the stars and other celestial bodies leaves astronomy grads with a skill set that employers in every sector appreciate:</p>\n<ul>\n<li>Math and science</li>\n<li>Research</li>\n<li>Data analysis</li>\n<li>Critical thinking</li>\n<li>Complex problem-solving</li>\n<li>Computer software</li>\n<li>Patience</li>\n<li>Flexibility</li>\n<li>Dedication to ongoing learning</li>\n</ul>&quot;, &quot;display_order&quot;: 4, &quot;created_at&quot;: &quot;2019-08-29T17:56:38.098472-07:00&quot;, &quot;updated_at&quot;: &quot;2021-11-18T13:55:38.626793-08:00&quot;}, {&quot;degree_id&quot;: 245, &quot;page&quot;: 1, &quot;title&quot;: &quot;What Can You Do with an Astronomy Degree?&quot;, &quot;summary_markdown&quot;: &quot;**Research and Education**  \r\nThe majority of [astronomers](/careers/astronomer/) work at universities and colleges. In most cases, they both teach astronomy and conduct research in the field. For this reason, a Doctorate in Astronomy is the degree that is pursued by many students.\r\n\r\n**Aerospace**  \r\nIn the aerospace industry, astronomers may apply their knowledge to the manufacturing, testing, and monitoring of civil or commercial aircraft, military aircraft, missiles, rockets, spacecraft, lunar vehicles, and space stations.\r\n\r\n**Data Science and Programming**  \r\nIn this sector, astronomers use their skills to develop science-related software.\r\n\r\n**Finance and Law**  \r\nWith their ability to process large sets of data, astronomy graduates may be hired by financial and law firms to manage information and records.&quot;, &quot;content_markdown&quot;: &quot;**Government / Federal Agencies**  \r\nAgencies like these often hire astronomers: NASA, National Optical Astronomy Observatories, National Radio Astronomy Observatories, U.S. Naval Observatory, Space Telescope Science Institute, Naval Research Observatory\r\n\r\n**Museums, Planetariums, Observatories, and Science Centers**  \r\nAll of these institutions provide art and science public outreach and education.\r\n\r\n**Science / Technical Writing**  \r\nThis is a potential career option for astronomy grads with interests in both science and communication.&quot;, &quot;content_html&quot;: &quot;<p><strong>Government / Federal Agencies</strong><br />\nAgencies like these often hire astronomers: NASA, National Optical Astronomy Observatories, National Radio Astronomy Observatories, U.S. Naval Observatory, Space Telescope Science Institute, Naval Research Observatory</p>\n<p><strong>Museums, Planetariums, Observatories, and Science Centers</strong><br />\nAll of these institutions provide art and science public outreach and education.</p>\n<p><strong>Science / Technical Writing</strong><br />\nThis is a potential career option for astronomy grads with interests in both science and communication.</p>&quot;, &quot;display_order&quot;: 5, &quot;created_at&quot;: &quot;2019-08-29T17:56:38.100610-07:00&quot;, &quot;updated_at&quot;: &quot;2022-01-18T13:04:01.803360-08:00&quot;}], &quot;degree_specializations&quot;: []}" id="page-body"><div class="degree-page overview layout--sidebar" data-dcnode-id="149"><div class="page-head overview" data-dcnode-id="612" data-testid="page-head"><div class="grid-container" data-dcnode-id="613"><div class="chiclet-nav__wrapper" data-dcnode-id="643" id="mobile-chiclet-nav-wrapper"><div class="chiclet-nav" data-dcnode-id="648" id="mobile-chiclet-nav"><a class="chiclet chiclet-nav__item overview active" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/astronomy-degree/overview/"><div class="chiclet-nav__item__name" data-dcnode-id="677"><span class="word-0" data-dcnode-id="678"><span data-dcnode-id="680" instrument_node="">Overview</span><span data-dcnode-id="679" instrument_node="">&nbsp;</span></span></div></a><a class="chiclet chiclet-nav__item tuition" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/astronomy-degree/tuition/"><div data-dcnode-id="671"><div class="chiclet-nav__item__label" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">In-State Tuition</span></div><div class="chiclet-nav__item__stat" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">$11k</span></div></div></a><a class="chiclet chiclet-nav__item satisfaction" data-dcnode-id="664" href="#"><div data-dcnode-id="665"><div class="chiclet-nav__item__label" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Satisfaction</span></div><div class="chiclet-nav__item__stat" data-dcnode-id="666"><span data-dcnod op="itemListElement" itemscope="" itemtype="http://schema.org/ListItem"><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/astronomy-degree/overview/" itemprop="item"><span data-dcnode-id="621" itemprop="name"><span data-dcnode-id="622" instrument_node="">Overview</span></span></a><meta content="5" data-dcnode-id="619" itemprop="position"></li></ol></nav><h1 class="page-head__title" data-dcnode-id="614" data-testid="h1"><span data-dcnode-id="615" instrument_node="">Astronomy degree overview</span></h1></div></div><div class="layout--sidebar__body" data-dcnode-id="150"><div class="layout--sidebar__body__bg" data-dcnode-id="611" style="background-image: url(&quot;https://res.cloudinary.com/hnpb47ejt/image/upload/e_gradient_fade:50,y_-0.99/e_gradient_fade:15,x_0.99/c_fill,f_auto,h_350,o_85,w_1170/v1580505760/lblm4m2jftziqratuucc.jpg&quot;);"></div><div class="grid-container" data-dcnode-id="151"><main class="layout--sidebar__body__main" data-dcnode-id="200" data-testid="main" role="document"><span aria-hidden="true" class="sr-only" data-dcnode-id="609" id="top"><span data-dcnode-id="610" instrument_node="">top</span></span><div class="TableOfContents TableOfContents--inactive" data-dcnode-id="590" id="table-of-contents" role="directory" tabindex="0" title="Table of contents"><h3 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">In this article:</span></h3><ol data-dcnode-id="591"><li data-dcnode-id="604"><a data-dcnode-id="605" href="#What-is-an-Astronomy-Degree"><span data-dcnode-id="606" instrument_node="">What is an Astronomy Degree?</span></a></li><li data-dcnode-id="601"><a data-dcnode-id="602" href="#Program-Options"><span data-dcnode-id="603" instrument_node="">Program Options</span></a></li><li data-dcnode-id="598"><a data-dcnode-id="599" href="#Degrees-Similar-to-Astronomy"><span data-dcnode-id="600" instrument_node="">Degrees Similar to Astronomy</span></a></li><li data-dcnode-id="595"><a data-dcnode-id="596" href="#Skills-You'll-Learn"><span data-dcnode-id="597" instrument_node="">Skills You’ll Learn</span></a></li><li data-dcnode-id="592"><a data-dcnode-id="593" href="#What-Can-You-Do-with-an-Astronomy-Degree"><span data-dcnode-id="594" instrument_node="">What Can You Do with an Astronomy Degree?</span></a></li></ol></div><div data-dcnode-id="533" id="What-is-an-Astronomy-Degree"><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">What is an Astronomy Degree?</span></h2><div data-dcnode-id="582"><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">Astronomy degree programs teach students about celestial bodies and the energy and forces exerted by their interaction. This means that the curriculum is concerned with the study of objects in space, from the smallest neutrinos to planets, stars, solar systems, galaxies, asteroids, comets, and black holes. Aspiring </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/careers/astronomer"><span data-dcnode-id="586" instrument_node="">astronomers</span></a><span data-dcnode-id="584" instrument_node=""> learn about when these objects were born, how they evolved, how some of them became extinct, and how they move in space. They develop skills to theorize about the origin of the cosmos and to predict future events in the universe. In addition, they study the mechanics involved in building and deploying space stations, satellites, space crafts, and transportation systems.</span></p></div><details class="collapsible" data-dcnode-id="534"><summary aria-hidden="true" data-dcnode-id="579"><span data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Read more</span></span></summary><div data-dcnode-id="535" style="max-height: 0px;"><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">These are among the courses that make up an astronomy program:</span></p><span data-dcnode-id="576" instrument_node="">
</span><ul data-dcnode-id="541"><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Mathematics / Calculus</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Statistics</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Chemistry</span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Physics</span></li><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Astrophysics</span></li><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Cosmology – the science of the origin and development of the universe</span></li><span data-dcnode-id="557" instrument_node="">
</span><li data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Electromagnetism</span></li><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Structure and Evolution of Stars</span></li><span data-dcnode-id="551" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Planetary Geology</span></li><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Computer Science</span></li><span data-dcnode-id="545" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Computer Programming</span></li><span data-dcnode-id="542" instrument_node="">
</span></ul><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="536"><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Note:</span></em><span data-dcnode-id="537" instrument_node=""> Astronomy is the science of measuring the positions and characteristics of celestial bodies. Astrophysics is the application of the laws of physics to understand and interpret astronomy. As the difference is merely technical, the terms astronomy and astrophysics are used interchangeably.</span></p></div></details></div><div data-dcnode-id="379" id="Program-Options"><h2 data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Program Options</span></h2><div data-dcnode-id="467"><p data-dcnode-id="525"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Bachelor’s Degree in Astronomy – Four Year Duration</span></strong><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
</span><span data-dcnode-id="526" instrument_node="">At the bachelor’s level, astronomy students learn about the mathematics, chemistry, biology, physics, and engineering concepts that apply to the field. They are introduced to the two subfields of astronomy:</span></p><span data-dcnode-id="524" instrument_node="">
</span><ul data-dcnode-id="516"><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Observational Astronomy – the acquiring and analyzing of data using the principles of physics</span></li><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Theoretical Astronomy – the design of computer models to study astronomical objects and phenomena</span></li><span data-dcnode-id="517" instrument_node="">
</span></ul><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Coursework includes:</span></p><span data-dcnode-id="512" instrument_node="">
</span><ul data-dcnode-id="468"><span data-dcnode-id="511" instrument_node="">

</span><li data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Stars and Stellar Evolution</span></li><span data-dcnode-id="490" instrument_node="">

</span><li data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Astronomical/Astrophysical Observations, Instrumentation, and Data Analysis</span></li><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Thermal Physics</span></li><span data-dcnode-id="472" instrument_node="">

</span></ul></div><details class="collapsible" data-dcnode-id="380"><summary aria-hidden="true" data-dcnode-id="464"><span data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Read more</span></span></summary><div data-dcnode-id="381" style="max-height: 0px;"><p data-dcnode-id="458"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Master’s Degree in Astronomy – Two Year Duration</span></strong><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node="">
</span><span data-dcnode-id="459" instrument_node="">This graduate degree program provides students with a broad understanding of the techniques used in both observational and theoretical astronomy. The curriculum emphasizes extensive research and experience in presenting it.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Here is a sample of the coursework required:</span></p><span data-dcnode-id="454" instrument_node="">

</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Thesis – Master of Science in Astronomy</span></li><span data-dcnode-id="423" instrument_node="">
</span></ul><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="415"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Doctoral Degree in Astronomy – Four Year Duration</span></strong><br data-dcnode-id="418"><span data-dcnode-id="417" instrument_node="">
</span><span data-dcnode-id="416" instrument_node="">Holders of an astronomy Ph.D. often have careers as university professors and/or researchers in the field. The focus of a doctoral degree program in astronomy is conducting research to complete and defend an original dissertation. Students’ coursework, therefore, depends on the research topic that they choose.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">These are examples of possible areas of research:</span></p><span data-dcnode-id="411" instrument_node="">
</span><ul data-dcnode-id="382"><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Auroras</span></li><span data-dcnode-id="407" instrument_node="">

</span><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Remote sensing</span></li><span data-dcnode-id="389" instrument_node="">
</span><li data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Sagan effect</span></li><span data-dcnode-id="386" instrument_node="">
</span><li data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Supernova</span></li><span data-dcnode-id="383" instrument_node="">
</span></ul></div></details></div><div data-dcnode-id="308" id="Degrees-Similar-to-Astronomy"><h2 data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Degrees Similar to Astronomy</span></h2><div data-dcnode-id="343"><p data-dcnode-id="370"><strong data-dcnode-id="374"><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/aerospace-engineering-degree/"><span data-dcnode-id="376" instrument_node="">Aerospace Engineering</span></a></strong><br data-dcnode-id="373"><span data-dcnode-id="372" instrument_node="">
</span><span data-dcnode-id="371" instrument_node="">This field is dedicated to the design and development of aircraft, spacecraft, and missiles. Degree programs include the study of aerodynamics, orbits, launch, flight controls, and engines.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="362"><strong data-dcnode-id="366"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/engineering-physics-degree/"><span data-dcnode-id="368" instrument_node="">Engineering Physics</span></a></strong><br data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">
</span><span data-dcnode-id="363" instrument_node="">Students of this discipline focus on learning how to use physics to solve practical problems. For this reason, it is sometimes referred to as the bridge between physics and engineering.</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="353"><strong data-dcnode-id="357"><a data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/meteorology-degree/"><span data-dcnode-id="360" instrument_node="">Meteorology</span></a><span data-dcnode-id="358" instrument_node=""> / Atmospheric Sciences</span></strong><br data-dcnode-id="356"><span data-dcnode-id="355" instrument_node="">
</span><span data-dcnode-id="354" instrument_node="">The field of meteorology is concerned with the Earth’s atmosphere. Astronomy is concerned with objects beyond the atmosphere. The connections between the two disciplines are especially clear in these definitions:</span></p><span data-dcnode-id="352" instrument_node="">
</span><ul data-dcnode-id="344"><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Dynamic Meteorology – the study of the motions of the atmosphere based on the Earth’s rapid rotation</span></li><span data-dcnode-id="348" instrument_node="">
</span><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Physical Meteorology – the study of the optical, electrical, acoustical, and thermodynamic phenomena in the atmosphere; the physics of clouds and precipitation</span></li><span data-dcnode-id="345" instrument_node="">
</span></ul></div><details class="collapsible" data-dcnode-id="309"><summary aria-hidden="true" data-dcnode-id="340"><span data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Read more</span></span></summary><div data-dcnode-id="310" style="max-height: 0px;"><p data-dcnode-id="333"><strong data-dcnode-id="337"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/geology-degree/"><span data-dcnode-id="339" instrument_node="">Geology</span></a></strong><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">
</span><span data-dcnode-id="334" instrument_node="">Geology is about the history of the Earth and the forces that act upon it. Geology coursework covers subjects like geochemistry, geophysics, and mineralogy.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="319"><strong data-dcnode-id="329"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/mathematics-degree/"><span data-dcnode-id="331" instrument_node="">Mathematics</span></a></strong><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node="">
</span><span data-dcnode-id="326" instrument_node="">Degree programs in mathematics typically teach both the theory of </span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">pure mathematics</span></em><span data-dcnode-id="323" instrument_node=""> and its practical application to the world, known as </span><em data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">applied mathematics</span></em><span data-dcnode-id="320" instrument_node="">. In other words, math majors study more than algebra, geometry, calculus, and statistics. They learn about how math concepts are used in business management, computer science, economics, finance, music, philosophy, physics, and sports science.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="311"><strong data-dcnode-id="315"><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/physics-degree/"><span data-dcnode-id="317" instrument_node="">Physics</span></a></strong><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">
</span><span data-dcnode-id="312" instrument_node="">Physics is a field that keeps changing as discoveries are made. This means that the field asks at least as many questions as it answers. Students of physics degree programs study matter and energy. They learn about the relationships between the measurable quantities in the universe, which include velocity, electric field, and kinetic energy. In simple terms, the study of physics is an attempt to figure out why objects move in the way that they do.</span></p></div></details></div><div data-dcnode-id="271" id="Skills-You'll-Learn"><h2 data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Skills You’ll Learn</span></h2><div data-dcnode-id="273"><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The study of the stars and other celestial bodies leaves astronomy grads with a skill set that employers in every sector appreciate:</span></p><span data-dcnode-id="303" instrument_node="">
</span><ul data-dcnode-id="274"><span data-dcnode-id="302" instrument_node="">
</span><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Math and science</span></li><span data-dcnode-id="299" instrument_node="">
</span><li data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Research</span></li><span data-dcnode-id="296" instrument_node="">
</span><li data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Data analysis</span></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Critical thinking</span></li><span data-dcnode-id="290" instrument_node="">
</span><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Complex problem-solving</span></li><span data-dcnode-id="287" instrument_node="">
</span><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Computer software</span></li><span data-dcnode-id="284" instrument_node="">
</span><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Patience</span></li><span data-dcnode-id="281" instrument_node="">
</span><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Flexibility</span></li><span data-dcnode-id="278" instrument_node="">
</span><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Dedication to ongoing learning</span></li><span data-dcnode-id="275" instrument_node="">
</span></ul></div><span data-dcnode-id="272" instrument_node=""></span></div><div data-dcnode-id="212" id="What-Can-You-Do-with-an-Astronomy-Degree"><h2 data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">What Can You Do with an Astronomy Degree?</span></h2><div data-dcnode-id="238"><p data-dcnode-id="260"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Research and Education</span></strong><br data-dcnode-id="266"><span data-dcnode-id="265" instrument_node="">
</span><span data-dcnode-id="264" instrument_node="">The majority of </span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/careers/astronomer/"><span data-dcnode-id="263" instrument_node="">astronomers</span></a><span data-dcnode-id="261" instrument_node=""> work at universities and colleges. In most cases, they both teach astronomy and conduct research in the field. For this reason, a Doctorate in Astronomy is the degree that is pursued by many students.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="253"><strong data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Aerospace</span></strong><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">
</span><span data-dcnode-id="254" instrument_node="">In the aerospace industry, astronomers may apply their knowledge to the manufacturing, testing, and monitoring of civil or commercial aircraft, military aircraft, missiles, rockets, spacecraft, lunar vehicles, and space stations.</span></p><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="246"><strong data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Data Science and Programming</span></strong><br data-dcnode-id="249"><span data-dcnode-id="248" instrument_node="">
</span><span data-dcnode-id="247" instrument_node="">In this sector, astronomers use their skills to develop science-related software.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="239"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Finance and Law</span></strong><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node="">
</span><span data-dcnode-id="240" instrument_node="">With their ability to process large sets of data, astronomy graduates may be hired by financial and law firms to manage information and records.</span></p></div><details class="collapsible" data-dcnode-id="213"><summary aria-hidden="true" data-dcnode-id="235"><span data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Read more</span></span></summary><div data-dcnode-id="214" style="max-height: 0px;"><p data-dcnode-id="229"><strong data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Government / Federal Agencies</span></strong><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">
</span><span data-dcnode-id="230" instrument_node="">Agencies like these often hire astronomers: NASA, National Optical Astronomy Observatories, National Radio Astronomy Observatories, U.S. Naval Observatory, Space Telescope Science Institute, Naval Research Observatory</span></p><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="222"><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Museums, Planetariums, Observatories, and Science Centers</span></strong><br data-dcnode-id="225"><span data-dcnode-id="224" instrument_node="">
</span><span data-dcnode-id="223" instrument_node="">All of these institutions provide art and science public outreach and education.</span></p><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="215"><strong data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">Science / Technical Writing</span></strong><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">
</span><span data-dcnode-id="216" instrument_node="">This is a potential career option for astronomy grads with interests in both science and communication.</span></p></div></details></div><div data-dcnode-id="211" id="back-top-container"></div><div class="UpNextCard UpNextCard--tuition" data-dcnode-id="201"><div class="UpNextCard__copy" data-dcnode-id="203"><h2 class="UpNextCard__title" data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Tuition</span></h2><p class="UpNextCard__description" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">See which schools are the most and least expensive.</span></p><span data-dcnode-id="204"><a class="UpNextCard__cta" data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/degrees/astronomy-degree/tuition/"><span data-dcnode-id="206" instrument_node="">Read about Tuition</span></a></span></div><img alt="" aria-hidden="true" class="UpNextCard__art lazyloaded" data-dcnode-id="202" data-src="/static/compiled/images/up-next-blobs/3-vert.svg" height="337" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.careerexplorer.com/static/compiled/images/up-next-blobs/3-vert.svg&amp;raw" width="213"></div></main><div class="layout--sidebar__body__aside" data-dcnode-id="152"><div class="Sidebar" data-dcnode-id="153"><div class="Sidebar__scroll-container" data-dcnode-id="154"><header class="Sidebar__header" data-dcnode-id="191"><img alt="Astronomy" class="Sidebar__thumbnail" data-dcnode-id="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//res.cloudinary.com/hnpb47ejt/image/upload/c_fill%2Ch_160%2Cq_80%2Cw_160/v1580505760/lblm4m2jftziqratuucc.jpg&amp;raw"><div data-dcnode-id="192"><h2 class="Sidebar__title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Astronomy</span></h2><span data-dcnode-id="196" instrument_node=""></span><div data-dcnode-id="193"><s
