</span><h1 data-dcnode-id="709"><span data-dcnode-id="712" instrument_node="">
COLLEGE OF ARTS &amp; SCIENCES
</span><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">ASTRONOMY
</span></h1><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Detailed course offerings (Time Schedule) are available for</span></p><ul data-dcnode-id="692"><span data-dcnode-id="705" instrument_node="">
</span><li data-dcnode-id="702"><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washington.edu/students/timeschd/SPR2022/astro.html"><span data-dcnode-id="704" instrument_node="">Spring Quarter 2022</span></a></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="698"><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washington.edu/students/timeschd/SUM2022/astro.html"><span data-dcnode-id="700" instrument_node="">Summer Quarter 2022</span></a></li><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="694"><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washington.edu/students/timeschd/AUT2022/astro.html"><span data-dcnode-id="696" instrument_node="">Autumn Quarter 2022</span></a></li><span data-dcnode-id="693" instrument_node="">
</span></ul><p data-dcnode-id="691"></p><span data-dcnode-id="690" instrument_node="">
</span><a data-dcnode-id="689" name="astr101"></a><p data-dcnode-id="680"><a data-dcnode-id="683" name="astr101"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">ASTR 101 Astronomy (5) NW, QSR</span></b><br data-dcnode-id="686"><span data-dcnode-id="685" instrument_node="">Introduction to the universe, with emphasis on conceptual, as contrasted with mathematical, comprehension. Modern theories, observations; ideas concerning nature, evolution of galaxies; quasars, stars, black holes, planets, solar system. Not open for credit to students who have taken ASTR 102 or ASTR 301; not open to upper-division students majoring in physical sciences or engineering. Offered: AWSpS.</span><br data-dcnode-id="684"></a><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR101" target="_blank"><span data-dcnode-id="682" instrument_node="">View course details in MyPlan: ASTR 101</span></a></p><span data-dcnode-id="679" instrument_node="">
</span><a data-dcnode-id="678" name="astr102"></a><p data-dcnode-id="669"><a data-dcnode-id="672" name="astr102"><b data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">ASTR 102 Introduction to Astronomy (5) NW, QSR</span></b><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">Emphasis on mathematical and physical comprehension of nature, the sun, stars, galaxies, and cosmology. Designed for students who have had algebra and trigonometry and high school or introductory-level college physics. Cannot be taken for credit in combination with ASTR 101 or ASTR 301. Offered: A.</span><br data-dcnode-id="673"></a><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR102" target="_blank"><span data-dcnode-id="671" instrument_node="">View course details in MyPlan: ASTR 102</span></a></p><span data-dcnode-id="668" instrument_node="">
</span><a data-dcnode-id="667" name="astr105"></a><p data-dcnode-id="656"><a data-dcnode-id="659" name="astr105"><b data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">ASTR 105 Exploring the Moon (5) NW</span></b><i data-dcnode-id="663"><span data-dcnode-id="664" instrument_node=""> Smith</span></i><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">Examines the questions why did we go to the moon, what did we learn, and why do we want to go back. Offered: W.</span><br data-dcnode-id="660"></a><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR105" target="_blank"><span data-dcnode-id="658" instrument_node="">View course details in MyPlan: ASTR 105</span></a></p><span data-dcnode-id="655" instrument_node="">
</span><a data-dcnode-id="654" name="astr109"></a><p data-dcnode-id="643"><a data-dcnode-id="646" name="astr109"><b data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">ASTR 109 Measuring the Universe (3) I&amp;S/NW</span></b><i data-dcnode-id="650"><span data-dcnode-id="651" instrument_node=""> M. McQuinn</span></i><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">How did we measure the distance to the Sun, the mass of the Earth, the age of the Universe?  How do we know that everyday matter is composed of atoms?  Provides a mostly descriptive, historical introduction to the methods different societies have devised to solve such quandaries, in the process constraining nature's laws and shaping the physical sciences into their modern form.</span><br data-dcnode-id="647"></a><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR109" target="_blank"><span data-dcnode-id="645" instrument_node="">View course details in MyPlan: ASTR 109</span></a></p><span data-dcnode-id="642" instrument_node="">
</span><a data-dcnode-id="641" name="astr115"></a><p data-dcnode-id="630"><a data-dcnode-id="633" name="astr115"><b data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">ASTR 115 Astrobiology: Life in the Universe (5) NW</span></b><i data-dcnode-id="637"><span data-dcnode-id="638" instrument_node=""> David C. Catling, Roger Buick, Victoria S Meadows, Woodruff T Sullivan</span></i><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">Introduction to the new science of astrobiology, study of the origin and evolution of life on Earth, and the search for microbial and intelligent life elsewhere in the Universe. Designed for non-science, liberal arts majors. Offered: jointly with ASTBIO 115/BIOL 114/ESS 115/OCEAN 115.</span><br data-dcnode-id="634"></a><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR115" target="_blank"><span data-dcnode-id="632" instrument_node="">View course details in MyPlan: ASTR 115</span></a></p><span data-dcnode-id="629" instrument_node="">
</span><a data-dcnode-id="628" name="astr150"></a><p data-dcnode-id="619"><a data-dcnode-id="622" name="astr150"><b data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">ASTR 150 The Planets (5) NW, QSR</span></b><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node="">For liberal arts and beginning science students. Survey of the planets of the solar system, with emphases on recent space exploration of the planets and on the comparative evolution of the Earth and the other planets. Offered: AWSpS.</span><br data-dcnode-id="623"></a><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR150" target="_blank"><span data-dcnode-id="621" instrument_node="">View course details in MyPlan: ASTR 150</span></a></p><span data-dcnode-id="618" instrument_node="">
</span><a data-dcnode-id="617" name="astr160"></a><p data-dcnode-id="608"><a data-dcnode-id="611" name="astr160"><b data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">ASTR 160 Introduction to Exoplanets (3/5) NW</span></b><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">Introduction to exoplanets. Explores how studies of extrasolar planets have changed our views of how planets and planetary systems form and evolve. Examines the science behind the search for Earth-like planets and life beyond our Solar System. May not earn credit if credit earned in ASTR 419.</span><br data-dcnode-id="612"></a><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR160" target="_blank"><span data-dcnode-id="610" instrument_node="">View course details in MyPlan: ASTR 160</span></a></p><span data-dcnode-id="607" instrument_node="">
</span><a data-dcnode-id="606" name="astr190"></a><p data-dcnode-id="597"><a data-dcnode-id="600" name="astr190"><b data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">ASTR 190 Modern Topics in Astronomy for Non-Science Majors (3/5, max. 10) NW</span></b><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node="">Topics of current interest, such as origin of chemical elements, novae and supernovae, white dwarfs, neutron stars, black holes, active galaxies, quasars, or interstellar medium and astrochemistry. Choice of topics depends on instructor and class interest. Prerequisite: either one 100- or one 200-level ASTR course.</span><br data-dcnode-id="601"></a><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR190" target="_blank"><span data-dcnode-id="599" instrument_node="">View course details in MyPlan: ASTR 190</span></a></p><span data-dcnode-id="596" instrument_node="">
</span><a data-dcnode-id="595" name="astr192"></a><p data-dcnode-id="586"><a data-dcnode-id="589" name="astr192"><b data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">ASTR 192 Pre-Major in Astronomy Research Seminar (3-5) NW</span></b><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">Introduction to astronomical computing and research methods for students interested in astronomy and in the premajor-in-astronomy program. Co-requisite: ASTR 102. Offered: A.</span><br data-dcnode-id="590"></a><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR192" target="_blank"><span data-dcnode-id="588" instrument_node="">View course details in MyPlan: ASTR 192</span></a></p><span data-dcnode-id="585" instrument_node="">
</span><a data-dcnode-id="584" name="astr201"></a><p data-dcnode-id="575"><a data-dcnode-id="578" name="astr201"><b data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">ASTR 201 The Universe and the Origin of Life (5) NW, QSR</span></b><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">Sequel to 101 or 102, emphasizing modern views of the atomic and molecular evolution of the universe from the initial "big bang" through the formation of the solar system and the emergence of biological forms on the earth. The latter part of the course considers questions about the existence of, and communication with, extraterrestrial intelligent life, and finally the ultimate fate of the cosmos.</span><br data-dcnode-id="579"></a><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR201" target="_blank"><span data-dcnode-id="577" instrument_node="">View course details in MyPlan: ASTR 201</span></a></p><span data-dcnode-id="574" instrument_node="">
</span><a data-dcnode-id="573" name="astr210"></a><p data-dcnode-id="564"><a data-dcnode-id="567" name="astr210"><b data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">ASTR 210 Distance and Time: Size and Age in the Universe (5) NW, QSR</span></b><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">Space and time as basic concepts in physical science. How we define and measure them, how the concepts have developed over the centuries, and how modern measurements allow us to determine the size and age of the universe.</span><br data-dcnode-id="568"></a><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR210" target="_blank"><span data-dcnode-id="566" instrument_node="">View course details in MyPlan: ASTR 210</span></a></p><span data-dcnode-id="563" instrument_node="">
</span><a data-dcnode-id="562" name="astr211"></a><p data-dcnode-id="553"><a data-dcnode-id="556" name="astr211"><b data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">ASTR 211 The Universe and Change (5) NW, QSR</span></b><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">Gravity as central to the form and evolution of the universe. Conceptual formulation of gravity from the Renaissance to Einstein. Its consequences from the falling of an apple to the slowing of the expansion of the universe. Offered: W.</span><br data-dcnode-id="557"></a><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR211" target="_blank"><span data-dcnode-id="555" instrument_node="">View course details in MyPlan: ASTR 211</span></a></p><span data-dcnode-id="552" instrument_node="">
</span><a data-dcnode-id="551" name="astr216"></a><p data-dcnode-id="540"><a data-dcnode-id="543" name="astr216"><b data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">ASTR 216 The Impact Threat to Earth (3) NW</span></b><i data-dcnode-id="547"><span data-dcnode-id="548" instrument_node=""> Chris Laws, Toby R. Smith</span></i><br data-dcnode-id="546"><span data-dcnode-id="545" instrument_node="">Earth has been hit by large rocks in the past, and will be hit by such rocks in the future. Explores the history and future of impacts on Earth.  Investigates why and how often we are hit, how big is the material that hits us.  What can we do about it? Recommended: ASTR 101 or ASTR 150. Offered: Sp.</span><br data-dcnode-id="544"></a><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR216" target="_blank"><span data-dcnode-id="542" instrument_node="">View course details in MyPlan: ASTR 216</span></a></p><span data-dcnode-id="539" instrument_node="">
</span><a data-dcnode-id="538" name="astr270"></a><p data-dcnode-id="529"><a data-dcnode-id="532" name="astr270"><b data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">ASTR 270 Public Outreach in Astronomy (3) VLPA/NW</span></b><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">Emphasis on giving effective scientific presentations, developing and giving educational programs to school-age groups, and communicating knowledge of astronomy to others. Give talks at the Jacobsen Observatory on campus and presentations in the Astronomy Department's planetarium. Learn to operate a telescope and the planetarium equipment. Prerequisite: one astronomy course at either the 100-, 200-, or 300-level. Offered: Sp.</span><br data-dcnode-id="533"></a><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR270" target="_blank"><span data-dcnode-id="531" instrument_node="">View course details in MyPlan: ASTR 270</span></a></p><span data-dcnode-id="528" instrument_node="">
</span><a data-dcnode-id="527" name="astr300"></a><p data-dcnode-id="518"><a data-dcnode-id="521" name="astr300"><b data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">ASTR 300 Introduction to Programming for Astronomical  Applications (3) QSR</span></b><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">Introduction to programming needed for astronomical applications: Linux operating systems, PERL, IDL. Recommended for astronomy majors planning to take 400-level astronomy courses, to pursue individual research projects, or to apply for research experience for undergraduate appointments. Prerequisite: either ASTR 321, ASTR 322, or ASTR 323, any of which may be taken concurrently.  Offered: AW.</span><br data-dcnode-id="522"></a><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR300" target="_blank"><span data-dcnode-id="520" instrument_node="">View course details in MyPlan: ASTR 300</span></a></p><span data-dcnode-id="517" instrument_node="">
</span><a data-dcnode-id="516" name="astr301"></a><p data-dcnode-id="507"><a data-dcnode-id="510" name="astr301"><b data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">ASTR 301 Astronomy for Scientists and Engineers (3) NW</span></b><br data-dcnode-id="513"><span data-dcnode-id="512" instrument_node="">Introduction to astronomy for students in the physical sciences or engineering. Topics similar to ASTR 101, but the approach uses more mathematics and physics. Prerequisite: PHYS 123.</span><br data-dcnode-id="511"></a><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR301" target="_blank"><span data-dcnode-id="509" instrument_node="">View course details in MyPlan: ASTR 301</span></a></p><span data-dcnode-id="506" instrument_node="">
</span><a data-dcnode-id="505" name="astr302"></a><p data-dcnode-id="496"><a data-dcnode-id="499" name="astr302"><b data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">ASTR 302 Python for Astronomy (3) NW, QSR</span></b><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">Teaches how to effectively use Python for research and astronomical data analysis. Introduction to key tools and libraries used in astronomy and how to use these to analyze data , visualize datasets, automate analyses, and apply this knowledge to reproducing results of some key astronomy papers. Prerequisite: ASTR 300; recommended: knowledge of Python and related astronomy libraries at the ASTR 300 level highly recommended.</span><br data-dcnode-id="500"></a><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR302" target="_blank"><span data-dcnode-id="498" instrument_node="">View course details in MyPlan: ASTR 302</span></a></p><span data-dcnode-id="495" instrument_node="">
</span><a data-dcnode-id="494" name="astr313"></a><p data-dcnode-id="485"><a data-dcnode-id="488" name="astr313"><b data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">ASTR 313 Science in Civilization: Physics and Astrophysics Since 1850 (5) I&amp;S/NW</span></b><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node="">Organization and pursuit of the physical and astrophysical sciences, focusing on the major unifying principles of physics and astronomy and the social and cultural settings in which they were created. Offered: jointly with HSTCMP 313.</span><br data-dcnode-id="489"></a><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR313" target="_blank"><span data-dcnode-id="487" instrument_node="">View course details in MyPlan: ASTR 313</span></a></p><span data-dcnode-id="484" instrument_node="">
</span><a data-dcnode-id="483" name="astr321"></a><p data-dcnode-id="474"><a data-dcnode-id="477" name="astr321"><b data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">ASTR 321 The Solar System (3) NW</span></b><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node="">Solar system; planetary atmospheres, surfaces and interiors, the moon, comets. The solar wind and interplanetary medium. Formation of the solar system. Prerequisite: PHYS 224 which may be taken concurrently. Offered: Sp.</span><br data-dcnode-id="478"></a><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR321" target="_blank"><span data-dcnode-id="476" instrument_node="">View course details in MyPlan: ASTR 321</span></a></p><span data-dcnode-id="473" instrument_node="">
</span><a data-dcnode-id="472" name="astr322"></a><p data-dcnode-id="463"><a data-dcnode-id="466" name="astr322"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">ASTR 322 The Contents of Our Galaxy (3) NW</span></b><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">Introduction to astronomy. Basic properties of stars, stellar systems, interstellar dust and gas, and the structure of our galaxy. Prerequisite: PHYS 224 which may be taken concurrently. Offered: A.</span><br data-dcnode-id="467"></a><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR322" target="_blank"><span data-dcnode-id="465" instrument_node="">View course details in MyPlan: ASTR 322</span></a></p><span data-dcnode-id="462" instrument_node="">
</span><a data-dcnode-id="461" name="astr323"></a><p data-dcnode-id="452"><a data-dcnode-id="455" name="astr323"><b data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">ASTR 323 Extragalactic Astronomy and Cosmology (3) NW</span></b><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">Galaxies, optical and radio morphology and properties. Clusters of galaxies, radio sources, and quasars. Observational cosmology. Prerequisite: ASTR 322 which may be taken concurrently. Offered: W.</span><br data-dcnode-id="456"></a><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR323" target="_blank"><span data-dcnode-id="454" instrument_node="">View course details in MyPlan: ASTR 323</span></a></p><span data-dcnode-id="451" instrument_node="">
</span><a data-dcnode-id="450" name="astr324"></a><p data-dcnode-id="439"><a data-dcnode-id="442" name="astr324"><b data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">ASTR 324 Introduction to Astrostatistics and Machine Learning in Astronomy (3) QSR</span></b><i data-dcnode-id="446"><span data-dcnode-id="447" instrument_node=""> Mario Juric</span></i><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">Introduces students to data science tools and techniques commonly used in data driven astronomy and astrophysics. Combines introductory theoretical background with hands-on work on examples of data analysis with modern astronomical datasets. Prerequisite: MATH 124 or MATH 134; MATH 125 or MATH 135; MATH 126; and ASTR 300  or ASTR 302; recommended: basic understanding of scientific measurement and statistics at the level of a first-year undergraduate lab. Offered: Sp.</span><br data-dcnode-id="443"></a><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR324" target="_blank"><span data-dcnode-id="441" instrument_node="">View course details in MyPlan: ASTR 324</span></a></p><span data-dcnode-id="438" instrument_node="">
</span><a data-dcnode-id="437" name="astr400"></a><p data-dcnode-id="428"><a data-dcnode-id="431" name="astr400"><b data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">ASTR 400 Undergraduate Research Seminar (1) NW</span></b><br data-dcnode-id="434"><span data-dcnode-id="433" instrument_node="">Introduces research topics conducted by astronomy faculty. Each week a faculty member describes her/his current research and the opportunities available for interested majors to participate in the research. Credit/no-credit only. Offered: A.</span><br data-dcnode-id="432"></a><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR400" target="_blank"><span data-dcnode-id="430" instrument_node="">View course details in MyPlan: ASTR 400</span></a></p><span data-dcnode-id="427" instrument_node="">
</span><a data-dcnode-id="426" name="astr419"></a><p data-dcnode-id="417"><a data-dcnode-id="420" name="astr419"><b data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">ASTR 419 Exoplanets (3) NW</span></b><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">Exoplanet properties, discovery, and habitability. Examines the science involved in the search for Earth-like planets and life beyond our Solar System. Topics include: exoplanet environments, modelling exoplanet planetary systems, planetary habitability, detection, and properties of exoplanets. May not earn credit if credit earned in ASTR 160. Prerequisite: ASTR 321.</span><br data-dcnode-id="421"></a><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR419" target="_blank"><span data-dcnode-id="419" instrument_node="">View course details in MyPlan: ASTR 419</span></a></p><span data-dcnode-id="416" instrument_node="">
</span><a data-dcnode-id="415" name="astr421"></a><p data-dcnode-id="406"><a data-dcnode-id="409" name="astr421"><b data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">ASTR 421 Stellar Observations and Theory (3) NW</span></b><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">Observations and theory of the atmospheres, chemical composition, internal structure, energy sources, and evolutionary history of stars. Prerequisite: ASTR 322. Offered: W.</span><br data-dcnode-id="410"></a><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR421" target="_blank"><span data-dcnode-id="408" instrument_node="">View course details in MyPlan: ASTR 421</span></a></p><span data-dcnode-id="405" instrument_node="">
</span><a data-dcnode-id="404" name="astr423"></a><p data-dcnode-id="395"><a data-dcnode-id="398" name="astr423"><b data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">ASTR 423 High-Energy Astrophysics (3) NW</span></b><br data-dcnode-id="401"><span data-dcnode-id="400" instrument_node="">High-energy phenomena in the universe. Includes supernova, pulsars, neutron stars, x-ray and gamma-ray sources, black holes, cosmic rays, quasi stellar objects, active galactic nuclei, diffuse background radiations. Radiative emission, absorption processes, and models derived from observational data. Prerequisite: PHYS 224; PHYS 225.</span><br data-dcnode-id="399"></a><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR423" target="_blank"><span data-dcnode-id="397" instrument_node="">View course details in MyPlan: ASTR 423</span></a></p><span data-dcnode-id="394" instrument_node="">
</span><a data-dcnode-id="393" name="astr425"></a><p data-dcnode-id="384"><a data-dcnode-id="387" name="astr425"><b data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">ASTR 425 Cosmology (3) QSR</span></b><br data-dcnode-id="390"><span data-dcnode-id="389" instrument_node="">Studies the universe as a whole. Overview of fundamental observations of cosmology and an introduction to general relativity. Examines theories of the past and future history of the universe, the nature of dark matter and dark energy, and the origin of ordinary matter on the large-scale structure. Prerequisite: PHYS 224; PHYS 225. Instructors: Agol, Connolly, Quinn</span><br data-dcnode-id="388"></a><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR425" target="_blank"><span data-dcnode-id="386" instrument_node="">View course details in MyPlan: ASTR 425</span></a></p><span data-dcnode-id="383" instrument_node="">
</span><a data-dcnode-id="382" name="astr427"></a><p data-dcnode-id="371"><a data-dcnode-id="374" name="astr427"><b data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">ASTR 427 Methods of Computational Astrophysics (3) NW</span></b><i data-dcnode-id="378"><span data-dcnode-id="379" instrument_node=""> Quinn</span></i><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">Provides hands-on experiences in writing computer programs to solve astrophysics problems. Topics include: interpolation and extrapolation, integration, ordinary, differential equations, root finding, optimization, linear algebra, Monte-Carlo partial differential equations, and parallel techniques.</span><br data-dcnode-id="375"></a><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR427" target="_blank"><span data-dcnode-id="373" instrument_node="">View course details in MyPlan: ASTR 427</span></a></p><span data-dcnode-id="370" instrument_node="">
</span><a data-dcnode-id="369" name="astr480"></a><p data-dcnode-id="360"><a data-dcnode-id="363" name="astr480"><b data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">ASTR 480 Introduction to Astronomical Data Analysis (5) NW</span></b><br data-dcnode-id="366"><span data-dcnode-id="365" instrument_node="">Hands-on experience with electronic imaging devices (CCDs) and software for image reduction and analysis. Introduction to operating systems, reduction software, and statistical analysis with applications to CCD photometry. Prerequisite: ASTR 300; ASTR 323, which may be taken concurrently. Offered: Sp.</span><br data-dcnode-id="364"></a><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR480" target="_blank"><span data-dcnode-id="362" instrument_node="">View course details in MyPlan: ASTR 480</span></a></p><span data-dcnode-id="359" instrument_node="">
</span><a data-dcnode-id="358" name="astr481"></a><p data-dcnode-id="349"><a data-dcnode-id="352" name="astr481"><b data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">ASTR 481 Introduction to Astronomical Observation (5) NW</span></b><br data-dcnode-id="355"><span data-dcnode-id="354" instrument_node="">Theory and practice of obtaining optical data at a telescope. Preparation, obtaining data with a CCD on a telescope, and subsequent data analysis for completion of a research project. Prerequisite: ASTR 480. Offered: S.</span><br data-dcnode-id="353"></a><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR481" target="_blank"><span data-dcnode-id="351" instrument_node="">View course details in MyPlan: ASTR 481</span></a></p><span data-dcnode-id="348" instrument_node="">
</span><a data-dcnode-id="347" name="astr482"></a><p data-dcnode-id="338"><a data-dcnode-id="341" name="astr482"><b data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">ASTR 482 Writing Scientific Papers (2)</span></b><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node="">Principles of organizing, developing, and writing resumes, scientific research papers for journals, and astronomy articles for general public interest. Prerequisite: ASTR 481, ASTR 499, PHYS 494, PHYS 495, or PHYS 496, any of which may be taken concurrently. Instructors: Szkody Offered: A.</span><br data-dcnode-id="342"></a><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR482" target="_blank"><span data-dcnode-id="340" instrument_node="">View course details in MyPlan: ASTR 482</span></a></p><span data-dcnode-id="337" instrument_node="">
</span><a data-dcnode-id="336" name="astr497"></a><p data-dcnode-id="327"><a data-dcnode-id="330" name="astr497"><b data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">ASTR 497 Topics in Current Astronomy (1-3, max. 9) NW</span></b><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node="">Recent developments in one field of astronomy or astrophysics.</span><br data-dcnode-id="331"></a><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR497" target="_blank"><span data-dcnode-id="329" instrument_node="">View course details in MyPlan: ASTR 497</span></a></p><span data-dcnode-id="326" instrument_node="">
</span><a data-dcnode-id="325" name="astr498"></a><p data-dcnode-id="316"><a data-dcnode-id="319" name="astr498"><b data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">ASTR 498 Independent Study (1-3, max. 15) NW</span></b><br data-dcnode-id="322"><span data-dcnode-id="321" instrument_node="">Astronomy-related projects supervised by a faculty member. Projects may be hardware, software, or library work in preparation for conducting astronomical research. Credit/no-credit only.</span><br data-dcnode-id="320"></a><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR498" target="_blank"><span data-dcnode-id="318" instrument_node="">View course details in MyPlan: ASTR 498</span></a></p><span data-dcnode-id="315" instrument_node="">
</span><a data-dcnode-id="314" name="astr499"></a><p data-dcnode-id="305"><a data-dcnode-id="308" name="astr499"><b data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">ASTR 499 Undergraduate Research (*, max. 15)</span></b><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">Special astronomical problems and observational projects, by arrangement with instructor.</span><br data-dcnode-id="309"></a><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR499" target="_blank"><span data-dcnode-id="307" instrument_node="">View course details in MyPlan: ASTR 499</span></a></p><span data-dcnode-id="304" instrument_node="">

</span><a data-dcnode-id="292" name="astr507"></a><p data-dcnode-id="283"><a data-dcnode-id="286" name="astr507"><b data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">ASTR 507 Physical Foundations of Astrophysics I (3)</span></b><br data-dcnode-id="289"><span data-dcnode-id="288" instrument_node="">Thermodynamics from an astronomer's point of view: black body radiation, basic radiative transfer, equation of state, degenerate gases, crystallization at high density.</span><br data-dcnode-id="287"></a><a data-dcnode-id="284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR507" target="_blank"><span data-dcnode-id="285" instrument_node="">View course details in MyPlan: ASTR 507</span></a></p><span data-dcnode-id="282" instrument_node="">
</span><a data-dcnode-id="281" name="astr508"></a><p data-dcnode-id="272"><a data-dcnode-id="275" name="astr508"><b data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">ASTR 508 Physical Foundations of Astrophysics II (3)</span></b><br data-dcnode-id="278"><span data-dcnode-id="277" instrument_node="">Introduction to astronomical hydrodynamics and magnetohydrodynamics, basic theorems and application to stellar and interstellar magnetic fields. Introduction to plasma physics and waves in a plasma.</span><br data-dcnode-id="276"></a><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR508" target="_blank"><span data-dcnode-id="274" instrument_node="">View course details in MyPlan: ASTR 508</span></a></p><span data-dcnode-id="271" instrument_node="">
</span><a data-dcnode-id="270" name="astr509"></a><p data-dcnode-id="261"><a data-dcnode-id="264" name="astr509"><b data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">ASTR 509 Physical Foundations of Astrophysics III (3)</span></b><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">Potential theory as applied to astrophysical systems. Orbits. Integrals of motion. Equilibrium and stability of stellar systems. Encounters of stellar systems. Kinetic theory of collisional systems. Applications of stellar dynamics to star clusters, galaxies, and large-scale structure.</span><br data-dcnode-id="265"></a><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR509" target="_blank"><span data-dcnode-id="263" instrument_node="">View course details in MyPlan: ASTR 509</span></a></p><span data-dcnode-id="260" instrument_node="">
</span><a data-dcnode-id="259" name="astr510"></a><p data-dcnode-id="250"><a data-dcnode-id="253" name="astr510"><b data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">ASTR 510 Nuclear Astrophysics (3)</span></b><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">Big bang nucleosynthesis; nuclear reactions in stars; solar neutrinos and neutrino oscillations; core-collapse supernovae; nucleosynthesis in stars, novae, and supernovae; neutron starts; composition and sources of cosmic rays; gamma ray bursts; atmospheric neutrinos. Offered: jointly with PHYS 554; A.</span><br data-dcnode-id="254"></a><a data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR510" target="_blank"><span data-dcnode-id="252" instrument_node="">View course details in MyPlan: ASTR 510</span></a></p><span data-dcnode-id="249" instrument_node="">
</span><a data-dcnode-id="248" name="astr511"></a><p data-dcnode-id="239"><a data-dcnode-id="242" name="astr511"><b data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">ASTR 511 Galactic Structure (3)</span></b><br data-dcnode-id="245"><span data-dcnode-id="244" instrument_node="">Kinematics, dynamics, and contents of the galaxy. Spiral structure. Structure and evolution of galaxies.</span><br data-dcnode-id="243"></a><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR511" target="_blank"><span data-dcnode-id="241" instrument_node="">View course details in MyPlan: ASTR 511</span></a></p><span data-dcnode-id="238" instrument_node="">
</span><a data-dcnode-id="237" name="astr512"></a><p data-dcnode-id="228"><a data-dcnode-id="231" name="astr512"><b data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">ASTR 512 Extragalactic Astronomy (3)</span></b><br data-dcnode-id="234"><span data-dcnode-id="233" instrument_node="">Types of galaxies. Integrated properties, content, and dynamics. Extragalactic distance scale, groups and clusters. Radio sources. Observational cosmology.</span><br data-dcnode-id="232"></a><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR512" target="_blank"><span data-dcnode-id="230" instrument_node="">View course details in MyPlan: ASTR 512</span></a></p><span data-dcnode-id="227" instrument_node="">
</span><a data-dcnode-id="226" name="astr513"></a><p data-dcnode-id="217"><a data-dcnode-id="220" name="astr513"><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">ASTR 513 Cosmology and Particle Astrophysics (3)</span></b><br data-dcnode-id="223"><span data-dcnode-id="222" instrument_node="">Big bang cosmology; relativistic world models and classical tests; background radiation; cosmological implications of nucleosynthesis; baryogenesis; inflation; galaxy and large-scale structure formation; quasars; intergalactic medium; dark matter.</span><br data-dcnode-id="221"></a><a data-dcnode-id="218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR513" target="_blank"><span data-dcnode-id="219" instrument_node="">View course details in MyPlan: ASTR 513</span></a></p><span data-dcnode-id="216" instrument_node="">
</span><a data-dcnode-id="215" name="astr519"></a><p data-dcnode-id="206"><a data-dcnode-id="209" name="astr519"><b data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">ASTR 519 Radiative Processes in Astrophysics (3)</span></b><br data-dcnode-id="212"><span data-dcnode-id="211" instrument_node="">Theory and applications of astrophysical radiation processes: transfer theory; thermal radiation; theory of radiation fields and radiation from moving charges; bremsstrahlung; synchrotron; Compton scattering; plasma effects.</span><br data-dcnode-id="210"></a><a data-dcnode-id="207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR519" target="_blank"><span data-dcnode-id="208" instrument_node="">View course details in MyPlan: ASTR 519</span></a></p><span data-dcnode-id="205" instrument_node="">
</span><a data-dcnode-id="204" name="astr521"></a><p data-dcnode-id="195"><a data-dcnode-id="198" name="astr521"><b data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">ASTR 521 Stellar Atmospheres (3)</span></b><br data-dcnode-id="201"><span data-dcnode-id="200" instrument_node="">Theory of continuous radiation and spectral line formation. Applications to the sun and stars. Prerequisite: PHYS 421 or equivalent.</span><br data-dcnode-id="199"></a><a data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR521" target="_blank"><span data-dcnode-id="197" instrument_node="">View course details in MyPlan: ASTR 521</span></a></p><span data-dcnode-id="194" instrument_node="">
</span><a data-dcnode-id="193" name="astr531"></a><p data-dcnode-id="184"><a data-dcnode-id="187" name="astr531"><b data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">ASTR 531 Stellar Interiors (4)</span></b><br data-dcnode-id="190"><span data-dcnode-id="189" instrument_node="">Physical laws governing the temperature, pressure, and mass distribution in stars. Equation of state, opacity, nuclear energy generation, computational methods. Models of main sequence stars and star formation. Prerequisite: PHYS 421 or equivalent.</span><br data-dcnode-id="188"></a><a data-dcnode-id="185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR531" target="_blank"><span data-dcnode-id="186" instrument_node="">View course details in MyPlan: ASTR 531</span></a></p><span data-dcnode-id="183" instrument_node="">
</span><a data-dcnode-id="182" name="astr532"></a><p data-dcnode-id="173"><a data-dcnode-id="176" name="astr532"><b data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">ASTR 532 Stellar Evolution (3)</span></b><br data-dcnode-id="179"><span data-dcnode-id="178" instrument_node="">Theoretical and observational approaches to stellar evolution. Structure of red giants, supernovae, and white dwarfs. Observations of star clusters and the chemical composition of stars as they relate to the theory of stellar structure. Prerequisite: ASTR 531.</span><br data-dcnode-id="177"></a><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR532" target="_blank"><span data-dcnode-id="175" instrument_node="">View course details in MyPlan: ASTR 532</span></a></p><span data-dcnode-id="172" instrument_node="">
</span><a data-dcnode-id="171" name="astr541"></a><p data-dcnode-id="162"><a data-dcnode-id="165" name="astr541"><b data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">ASTR 541 Interstellar Matter (3)</span></b><br data-dcnode-id="168"><span data-dcnode-id="167" instrument_node="">Physical conditions and motions of neutral and ionized gas in interstellar space. Interstellar dust, magnetic fields, formation of grains, clouds, and stars. Prerequisite: modern physics or permission of instructor.</span><br data-dcnode-id="166"></a><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR541" target="_blank"><span data-dcnode-id="164" instrument_node="">View course details in MyPlan: ASTR 541</span></a></p><span data-dcnode-id="161" instrument_node="">
</span><a data-dcnode-id="160" name="astr555"></a><p data-dcnode-id="151"><a data-dcnode-id="154" name="astr555"><b data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">ASTR 555 Planetary Atmospheres (3)</span></b><br data-dcnode-id="157"><span data-dcnode-id="156" instrument_node="">Problems of origin, evolution, and structure of planetary atmospheres, emphasizing elements common to all; roles of radiation, chemistry, and dynamical processes; new results on the atmospheres of Venus, Mars, Jupiter, and other solar system objects in the context of comparative planetology. Offered: jointly with ATM S 555/ESS 581.</span><br data-dcnode-id="155"></a><a data-dcnode-id="152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR555" target="_blank"><span data-dcnode-id="153" instrument_node="">View course details in MyPlan: ASTR 555</span></a></p><span data-dcnode-id="150" instrument_node="">
</span><a data-dcnode-id="149" name="astr557"></a><p data-dcnode-id="140"><a data-dcnode-id="143" name="astr557"><b data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">ASTR 557 Origin of the Solar System (3)</span></b><br data-dcnode-id="146"><span data-dcnode-id="145" instrument_node="">Nebular and nonnebular theories of the solar system origin; collapse from the interstellar medium, grain growth in the solar nebula, formation of planetesimals and planets, early evolution of the planets and other possible planetary systems; physical and chemical evidence upon which the ideas concerning the origin of the solar system are based. Offered: jointly with ESS 583.</span><br data-dcnode-id="144"></a><a data-dcnode-id="141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR557" target="_blank"><span data-dcnode-id="142" instrument_node="">View course details in MyPlan: ASTR 557</span></a></p><span data-dcnode-id="139" instrument_node="">
</span><a data-dcnode-id="138" name="astr558"></a><p data-dcnode-id="129"><a data-dcnode-id="132" name="astr558"><b data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">ASTR 558 Exoplanets (3)</span></b><br data-dcnode-id="135"><span data-dcnode-id="134" instrument_node="">Modern theory and observations of extrasolar planets, including detection and characterization techniques, orbital dynamics, atmospheric structure and dynamics, and planet formation. Prerequisite: either ASTR 507, ASTR 508, ASTR 519, or permission of instructor. Offered: W.</span><br data-dcnode-id="133"></a><a data-dcnode-id="130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR558" target="_blank"><span data-dcnode-id="131" instrument_node="">View course details in MyPlan: ASTR 558</span></a></p><span data-dcnode-id="128" instrument_node="">
</span><a data-dcnode-id="127" name="astr561"></a><p data-dcnode-id="118"><a data-dcnode-id="121" name="astr561"><b data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">ASTR 561 High Energy Astrophysics (3)</span></b><br data-dcnode-id="124"><span data-dcnode-id="123" instrument_node="">Observed properties of supernovae, x-ray stars, radio sources, quasars. Theories explaining such objects. Origin of cosmic rays.</span><br data-dcnode-id="122"></a><a data-dcnode-id="119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR561" target="_blank"><span data-dcnode-id="120" instrument_node="">View course details in MyPlan: ASTR 561</span></a></p><span data-dcnode-id="117" instrument_node="">

</span><a data-dcnode-id="105" name="astr576"></a><p data-dcnode-id="96"><a data-dcnode-id="99" name="astr576"><b data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">ASTR 576 Astronomy Colloquium (1, max. 20)</span></b><br data-dcnode-id="102"><span data-dcnode-id="101" instrument_node="">Current research topics in astronomy and astrophysics. Prerequisite: permission of department. Credit/no-credit only.</span><br data-dcnode-id="100"></a><a data-dcnode-id="97" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR576" target="_blank"><span data-dcnode-id="98" instrument_node="">View course details in MyPlan: ASTR 576</span></a></p><span data-dcnode-id="95" instrument_node="">
</span><a data-dcnode-id="94" name="astr581"></a><p data-dcnode-id="85"><a data-dcnode-id="88" name="astr581"><b data-dcnode-id="92"><span data-dcnode-id="93" instrument_node="">ASTR 581 Techniques in Optical Astronomy (5)</span></b><br data-dcnode-id="91"><span data-dcnode-id="90" instrument_node="">Theory and practice of obtaining optical data. Astronomical photoelectric photometers, spectrographs, interferometers, CCDs, and infrared equipment. Data-reduction techniques with emphasis on statistical analysis using digital computers. Observations with MRO thirty-inch telescope.</span><br data-dcnode-id="89"></a><a data-dcnode-id="86" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//myplan.washington.edu/course/%23/courses/ASTR581" target="_blank"><span data-dcnode-id="87" instrument_node="">View course details in MyPlan: ASTR 581</span></a></p><span data-dcnode-id="84" instrument_node="">
