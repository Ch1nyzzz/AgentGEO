amp;strip=1&amp;webp=1 424w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/astronaut-3751046_640.png?lossy=1&amp;strip=1&amp;webp=1 640w" title="Math in Astronomy 101 2" width="640"><noscript data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">&lt;img width="640" height="594" src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/astronaut-3751046_640.png?lossy=1&amp;strip=1&amp;webp=1" class="attachment-large size-large wp-post-image" alt="math in astronomy" itemprop="image" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/astronaut-3751046_640.png?size=212x197&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/astronaut-3751046_640.png?size=424x394&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 424w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/astronaut-3751046_640.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 640w" sizes="(max-width: 640px) 100vw, 640px" title="Math in Astronomy 101 2"&gt;</span></noscript></div></header><div class="entry-content clear" data-dcnode-id="438" itemprop="text"><p class="has-medium-font-size" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Math or Mathematics&nbsp;and&nbsp;astronomy&nbsp;have a long history.</span></p><p class="has-medium-font-size" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node=""> The two sciences were once inseparable and remain so today. While physics provides much of the mathematics used to interpret the knowledge gained from astronomical observations, some special needs conditions intertwine mathematics with phenomena that do not yet have adequate physics to describe the observations.</span></p><p class="has-medium-font-size" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Both of these uses of mathematics make mathematical astronomy an ongoing challenge.</span></p><div class="no_bullets contracted" data-dcnode-id="759" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="817"><span data-dcnode-id="824" instrument_node="">Contents</span><span data-dcnode-id="823" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">[</span><a data-dcnode-id="820" href="#"><span data-dcnode-id="821" instrument_node="">show</span></a><span data-dcnode-id="819" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="760" style="display: none;"><li data-dcnode-id="812"><a data-dcnode-id="813" href="#What_type_of_math_do_astronomers_use"><span class="toc_number toc_depth_1" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">1</span></span><span data-dcnode-id="814" instrument_node=""> What type of math do astronomers use?</span></a></li><li data-dcnode-id="807"><a data-dcnode-id="808" href="#How_astronomers_use_algebra"><span class="toc_number toc_depth_1" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">2</span></span><span data-dcnode-id="809" instrument_node=""> How astronomers use algebra?</span></a></li><li data-dcnode-id="802"><a data-dcnode-id="803" href="#How_astronomers_use_math_in_their_jobsnbsp"><span class="toc_number toc_depth_1" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">3</span></span><span data-dcnode-id="804" instrument_node=""> How astronomers use math in their jobs?&nbsp;</span></a></li><li data-dcnode-id="766"><a data-dcnode-id="798" href="#What_kind_of_math_is_used_in_astronomy"><span class="toc_number toc_depth_1" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">4</span></span><span data-dcnode-id="799" instrument_node=""> What kind of math is used in astronomy?</span></a><ul data-dcnode-id="767"><li data-dcnode-id="793"><a data-dcnode-id="794" href="#Trigonometry"><span class="toc_number toc_depth_2" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">4.1</span></span><span data-dcnode-id="795" instrument_node=""> Trigonometry</span></a></li><li data-dcnode-id="788"><a data-dcnode-id="789" href="#Conicsnbsp"><span class="toc_number toc_depth_2" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">4.2</span></span><span data-dcnode-id="790" instrument_node=""> Conics&nbsp;</span></a></li><li data-dcnode-id="783"><a data-dcnode-id="784" href="#The_nondegenerate_conic_sections"><span class="toc_number toc_depth_2" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">4.3</span></span><span data-dcnode-id="785" instrument_node=""> The nondegenerate conic sections</span></a></li><li data-dcnode-id="778"><a data-dcnode-id="779" href="#Differential_and_integral_calculus"><span class="toc_number toc_depth_2" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">4.4</span></span><span data-dcnode-id="780" instrument_node=""> Differential and integral calculus</span></a></li><li data-dcnode-id="773"><a data-dcnode-id="774" href="#Differential_geometry"><span class="toc_number toc_depth_2" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">4.5</span></span><span data-dcnode-id="775" instrument_node=""> Differential geometry</span></a></li><li data-dcnode-id="768"><a data-dcnode-id="769" href="#Statistics_and_probabilities"><span class="toc_number toc_depth_2" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">4.6</span></span><span data-dcnode-id="770" instrument_node=""> Statistics and probabilities</span></a></li></ul></li><li data-dcnode-id="761"><a data-dcnode-id="762" href="#Astronomy_Math_Problems"><span class="toc_number toc_depth_1" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">5</span></span><span data-dcnode-id="763" instrument_node=""> Astronomy Math Problems</span></a></li></ul></div><h2 data-dcnode-id="755"><span data-dcnode-id="756" id="What_type_of_math_do_astronomers_use"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">What type of math do astronomers use?</span></strong></span></h2><p class="has-medium-font-size" data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">Unlike “classical”&nbsp;astronomy, </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomerguide.com/beginner-in-astronomy-this-is-a-genuine-guide-how-to-become-astronomer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="753" instrument_node="">astronomers</span></a><span data-dcnode-id="751" instrument_node=""> conduct little or no research. His primary responsibility is to develop mathematical models that are as precise as possible. Astronomer explains the formation of the celestial bodies, as well as their future and history.</span></p><p class="has-medium-font-size" data-dcnode-id="742"><span data-dcnode-id="749" instrument_node="">It is involved in moving the&nbsp;</span><strong data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">planets</span></strong><span data-dcnode-id="746" instrument_node="">&nbsp;and&nbsp;</span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">satellites&nbsp;</span></strong><span data-dcnode-id="743" instrument_node="">of our solar system, as well as :</span></p><div class="ub_styled_list" data-dcnode-id="734" id="ub_styled_list-02490721-7d97-4717-9db7-cae04a29f3e1"><ul class="fa-ul" data-dcnode-id="735"><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&nbsp;-exoplanets</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">&nbsp;-small bodies (from dwarf planets to dust, via asteroids and comets), — – artificial satellites</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">– their debris using complex equations that combine their evolution with their spinning, their past with their inner structure.</span></li></ul></div><p class="has-medium-font-size" data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">One of astronomers considerations is the stability of these orbits, as well as many of the powers that may add to&nbsp;</span><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">gravity</span></strong><span data-dcnode-id="730" instrument_node="">, such as :&nbsp;</span></p><div class="ub_styled_list" data-dcnode-id="719" id="ub_styled_list-7a60bc28-66eb-4e50-b8c7-fe4933fc5cb0"><ul class="fa-ul" data-dcnode-id="720"><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">stresses</span></li><li data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">relativistic impacts</span></li><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">gas phenomena</span></li><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">and atmosphere brakes</span></li></ul></div><p class="has-medium-font-size" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">&nbsp;&nbsp;…. which greatly complicates the explanation of the structures.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Technology and mathematics that  has been used in space exploration missions and has led to significant discoveries.</span></p><p class="has-medium-font-size" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">The Neptune planet was discovered by mathematical computation and not by empirical experimentation, as some did.</span></p><div class="wp-block-image" data-dcnode-id="706"><figure class="aligncenter size-large" data-dcnode-id="707"><img alt="Neptun" class="wp-image-2904 lazyloaded" data-dcnode-id="712" data-sizes="(max-width: 422px) 100vw, 422px" data-src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?size=212x161&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?lossy=1&amp;strip=1&amp;webp=1 422w" height="320" sizes="(max-width: 422px) 100vw, 422px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?size=212x161&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?lossy=1&amp;strip=1&amp;webp=1 422w" title="Math in Astronomy 101 3" width="422"><noscript data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">&lt;img width="422" height="320" src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="Neptun" class="wp-image-2904" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?size=212x161&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Neptunn.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 422w" sizes="(max-width: 422px) 100vw, 422px" title="Math in Astronomy 101 3"&gt;</span></noscript><figcaption data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">The Neptune planet (Crédits : NASA)</span></figcaption></figure></div><p class="has-medium-font-size" data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">This profession is often compared to that of a cosmologist, who is more interested in the&nbsp;</span><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">universe</span></strong><span data-dcnode-id="702" instrument_node="">&nbsp;as a whole, its planetary history, rather than human bodies, and is more commonly a teaching physicist.</span></p><p class="has-medium-font-size" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Strong computers and specialized software are needed to complete all of this work. These mathematicians are also called upon to present lectures or to publish papers in specialized journals.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Math that astronomers are using:</span></p><div class="ub_styled_list" data-dcnode-id="685" id="ub_styled_list-b5c72c92-87f1-4303-afee-58add056448a"><ul class="fa-ul" data-dcnode-id="686"><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Trigonometry</span></li><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Conics</span></li><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Differential and integral calculus</span></li><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Differential geometry</span></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Statistics and probabilities</span></li></ul></div><p data-dcnode-id="684"></p><div class="wp-block-image is-style-default" data-dcnode-id="675"><figure class="aligncenter size-large is-resized" data-dcnode-id="676"><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31oFzGp" rel="noopener" target="_blank"><img alt="Astronomy-Andrew-Fraknoi-ebook" class="wp-image-3230 lazyloaded" data-dcnode-id="683" data-sizes="(max-width: 340px) 100vw, 340px" data-src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?size=212x274&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?lossy=1&amp;strip=1&amp;webp=1 386w" height="440" sizes="(max-width: 340px) 100vw, 340px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?size=212x274&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?lossy=1&amp;strip=1&amp;webp=1 386w" title="Math in Astronomy 101 4" width="340"><noscript data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">&lt;img src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="Astronomy-Andrew-Fraknoi-ebook" class="wp-image-3230" width="340" height="440" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?size=212x274&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Astronomy.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 386w" sizes="(max-width: 340px) 100vw, 340px" title="Math in Astronomy 101 4"&gt;</span></noscript></a><figcaption data-dcnode-id="677"><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/31oFzGp" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="679" instrument_node="">Free Astronomy Book</span></a></figcaption></figure></div><div class="ub-buttons align-button-center" data-dcnode-id="668" id="ub-button-a3c8f181-7ad0-42b1-8bc8-773ddac4bb85"><div class="ub-button-container" data-dcnode-id="669"><span data-dcnode-id="674" instrument_node=""> </span><a class="ub-button-block-main ub-button-medium" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomerguide.com/math-in-astronomy-101" rel="noopener noreferrer nofollow" role="button" target="_blank"><div class="ub-button-content-holder" data-dcnode-id="671"><span class="ub-button-block-btn" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Download For FREE</span></span></div></a></div></div><p data-dcnode-id="667"></p><h2 data-dcnode-id="663"><span data-dcnode-id="664" id="How_astronomers_use_algebra"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">How astronomers use algebra?</span></strong></span></h2><p class="has-medium-font-size" data-dcnode-id="653"><span data-dcnode-id="662" instrument_node="">Almost all&nbsp;</span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomerguide.com/astronomy/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">astronomers</span></strong><span data-dcnode-id="659" instrument_node="">&nbsp;</span></a><span data-dcnode-id="657" instrument_node="">are scholars, which necessitates the use of&nbsp;</span><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">algebra</span></strong><span data-dcnode-id="654" instrument_node="">. Some are scientists who are focusing on rules governing the formation of astronomical phenomena. Others examine massive volumes of data gathered from observatories and satellites and write papers about their observations. Certain astronomers usually work as part of a team to run ground-based telescopes.</span></p><p class="has-medium-font-size" data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">However, astronomers may spend only a few weeks each year making observations with</span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomerguide.com/best/telescope-for-viewing-planets/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="651" instrument_node=""> optical telescopes</span></a><span data-dcnode-id="649" instrument_node="">, radio telescopes, and other instruments. Over the years, satellites and other space-based instruments have provided us with astronomical data.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="643"><span data-dcnode-id="647" instrument_node="">New&nbsp;</span><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">technologies</span></strong><span data-dcnode-id="644" instrument_node="">&nbsp;that improve analytical techniques and instruments, such as computers, telescopes, and mounts, are reappearing in ground-based research. In museums that house planetariums, a limited number of astronomers operate. These astronomers create programs that are publicly viewed and will guide the planetarium’s operations.</span></p><div class="wp-block-image" data-dcnode-id="636"><figure class="aligncenter size-large is-resized" data-dcnode-id="637"><img alt="hubble telescope" class="wp-image-2905 lazyloaded" data-dcnode-id="642" data-sizes="(max-width: 770px) 100vw, 770px" data-src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=212x135&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=424x271&amp;lossy=1&amp;strip=1&amp;webp=1 424w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=636x406&amp;lossy=1&amp;strip=1&amp;webp=1 636w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble-768x491.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?lossy=1&amp;strip=1&amp;webp=1 844w" height="492" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=212x135&amp;lossy=1&amp;strip=1&amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=424x271&amp;lossy=1&amp;strip=1&amp;webp=1 424w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=636x406&amp;lossy=1&amp;strip=1&amp;webp=1 636w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble-768x491.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?lossy=1&amp;strip=1&amp;webp=1 844w" title="Math in Astronomy 101 5" width="770"><noscript data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">&lt;img src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="hubble telescope" class="wp-image-2905" width="770" height="492" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=212x135&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 212w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=424x271&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 424w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?size=636x406&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 636w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble-768x491.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Huble.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 844w" sizes="(max-width: 770px) 100vw, 770px" title="Math in Astronomy 101 5"&gt;</span></noscript><figcaption data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Photo of the Hubble space telescope during mission STS-125 (2009). (Crédits NASA / Wikipedia)&nbsp;</span></figcaption></figure></div><p class="has-medium-font-size" data-dcnode-id="631"><span data-dcnode-id="635" instrument_node="">Often astronomers use algebra in their work to achieve their goals. Without algebra, it will be difficult to find such things as the&nbsp;</span><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Hubble</span></strong><span data-dcnode-id="632" instrument_node="">&nbsp;space telescope (HST). Algebra is used to measure speed and monitor motion rate. There is that some astronomers best represented those achievements. Without them, their use of algebraic science and technology will not flourish.&nbsp;</span></p><p data-dcnode-id="627" style="font-size:22px"><span data-dcnode-id="630" instrument_node="">Our knowledge of stars and space is based on those astronomers.</span><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">&nbsp;</span></strong></p><h2 data-dcnode-id="623"><span data-dcnode-id="624" id="How_astronomers_use_math_in_their_jobsnbsp"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">How astronomers use math in their jobs?&nbsp;</span></strong></span></h2><p class="has-medium-font-size" data-dcnode-id="619"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Astronomers have used mathematicians in the past for complex calculations.</span></strong><span data-dcnode-id="620" instrument_node="">&nbsp;This is particularly useful when using a telescope to observe celestial objects.</span></p><p data-dcnode-id="618"></p><p class="has-medium-font-size" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The telescope’s camera simply records a series of numbers (basically translates or measures photons or electrons and records a sequence of numbers), which may refer to the sum of light produced from various objects in the sky (stars, star clusters …), the type of light, etc. In order to understand the information contained in these numbers, we must use mathematics and statistics to explain them.</span></p><p class="has-medium-font-size" data-dcnode-id="612"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Astronomers also use mathematics</span></strong><span data-dcnode-id="613" instrument_node="">&nbsp;to establish and test hypotheses regarding the physical laws that govern celestial phenomena. The principle is made up of formulas that compare quantities. (A basic example is Newton’s second law, which states that force equals mass times acceleration).</span></p><p class="has-medium-font-size" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node=""> In order to test these theories and use them to predict what we will observe in the sky, astronomers must use mathematics to manipulate the equation.</span></p><div class="wp-block-image" data-dcnode-id="603"><figure class="aligncenter size-large is-resized" data-dcnode-id="604"><img alt="Isasac Newton" class="wp-image-2907 lazyloaded" data-dcnode-id="609" data-sizes="(max-width: 362px) 100vw, 362px" data-src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=72x88&amp;lossy=1&amp;strip=1&amp;webp=1 72w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=144x177&amp;lossy=1&amp;strip=1&amp;webp=1 144w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?lossy=1&amp;strip=1&amp;webp=1 218w" height="444" sizes="(max-width: 362px) 100vw, 362px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=72x88&amp;lossy=1&amp;strip=1&amp;webp=1 72w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=144x177&amp;lossy=1&amp;strip=1&amp;webp=1 144w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?lossy=1&amp;strip=1&amp;webp=1 218w" title="Math in Astronomy 101 6" width="362"><noscript data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">&lt;img src="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="Isasac Newton" class="wp-image-2907" width="362" height="444" srcset="https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=72x88&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 72w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?size=144x177&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 144w, https://368464.smushcdn.com/2018531/wp-content/uploads/2021/05/Isasac-Nevton.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 218w" sizes="(max-width: 362px) 100vw, 362px" title="Math in Astronomy 101 6"&gt;</span></noscript><figcaption data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Isaac Newton&nbsp; (Crédit Wikipedia)&nbsp;</span></figcaption></figure></div><h2 data-dcnode-id="599"><span data-dcnode-id="600" id="What_kind_of_math_is_used_in_astronomy"><strong data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">What kind of math is used in astronomy?</span></strong></span></h2><p class="has-medium-font-size" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Mathematics and astronomy, these two sciences have developed together and have enriched each other, hence in astronomy, precise kinds of mathematics are used to discover the maximum of the mysterious secrets of the sky.</span></p><h3 data-dcnode-id="593"><span data-dcnode-id="594" id="Trigonometry"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Trigonometry</span></strong></span></h3><p class="has-medium-font-size" data-dcnode-id="585"><span data-dcnode-id="592" instrument_node="">One of the first duties assigned to&nbsp;</span><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">astronomy</span></strong><span data-dcnode-id="589" instrument_node="">&nbsp;was to explain and chart the sky’s changes. To do so, they needed to create appropriate geometric instruments. Trigonometry was the primary instrument of ancient astronomy (the word comes from Greek and means “measurement of triangles”; it is, therefore, the art of measuring angles). Indeed, the need for such a&nbsp;</span><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">science</span></strong><span data-dcnode-id="586" instrument_node="">&nbsp;arose to measure the distance between two stars by measuring the angle they form between them from the observer’s point of view.</span></p><p class="has-medium-font-size" data-dcnode-id="574"><span data-dcnode-id="584" instrument_node="">The Greek astronomer Hipparchus, who lived in the second century B.C, founded trigonometry and calculated the first trigonometric tables (calculation of sine, cosine, and tangent of an angle) in order to predict regular astronomical phenomena. He developed a method to measure the ratio of distances between the&nbsp;</span><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Earth</span></strong><span data-dcnode-id="581" instrument_node="">, the&nbsp;</span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Moon</span></strong><span data-dcnode-id="578" instrument_node="">, and the&nbsp;</span><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Sun</span></strong><span data-dcnode-id="575" instrument_node="">.</span></p><p class="has-medium-font-size" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">When the Moon is exactly at one of the quarters (i.e., when we see precisely half of it), ESM is a right-angled triangle in M. The angle Alpha≈ 89.52 °, or a distance Earth-Sun 390 times greater than the distance Earth-Moon; Aristarchus found Alpha≈ 87 ° and a distance Earth-Sun only 19 times greater than the distance Earth-Moon. The method of Aristarchus was, therefore, good, but the measurements not very accurate.</span></p><p class="has-medium-font-size" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Observations allowed us to quantify the lengths of chords and angles; a mathematical method allowing us to move from a chord to the corresponding arc of a circle in order to determine the lengths of trajectory was thus required: the trigonometric calculation was born, thanks to Ptolemy who discovered these formulas.</span></p><h3 data-dcnode-id="566"><span data-dcnode-id="567" id="Conicsnbsp"><strong data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Conics&nbsp;</span></strong></span></h3><p class="has-medium-font-size" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Conics are curves introduced in the 4th century B.C. by the Greek mathematician Menechma in order to solve the purely mathematical problem of the duplication of the cube. Another Greek, Pappus of Alexandria (4th century), described them as the intersection of a plane and a cone.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="550"><span data-dcnode-id="563" instrument_node="">Thus, these conic sections, thus defined by the Greeks, highlight different types of curves that can be classified according to four major families: the&nbsp;</span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">circle</span></strong><span data-dcnode-id="560" instrument_node="">, the&nbsp;</span><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">ellipse</span></strong><span data-dcnode-id="557" instrument_node="">, the&nbsp;</span><strong data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">parabola</span></strong><span data-dcnode-id="554" instrument_node="">, and the&nbsp;</span><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">hyperbola</span></strong><span data-dcnode-id="551" instrument_node="">.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-4-3 wp-has-aspect-ratio" data-dcnode-id="546"><div class="wp-block-embed__wrapper" data-dcnode-id="547"><div class="ast-oembed-container" data-dcnode-id="548"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="549" data-src="https://www.youtube.com/embed/HO2zAU3Eppo?feature=oembed" frameborder="0" height="795" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="Conic Section 3D Animation" width="1060"></iframe></div></div></figure><h3 data-dcnode-id="543"><span data-dcnode-id="544" id="The_nondegenerate_conic_sections"><span data-dcnode-id="545" instrument_node="">The nondegenerate conic sections</span></span></h3><p class="has-medium-font-size" data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">The ellipse became one of the most studied figures in astronomy since&nbsp;</span><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Kepler</span></strong><span data-dcnode-id="539" instrument_node="">&nbsp;discovered orbital motion. Both bodies that orbit the Sun, including planets, comets, asteroids, and so on, have an elliptical orbit. The ray-vector that connects the center of the Earth to the center of the Sun sweeps equal regions for equal lengths of time.</span></p><p class="has-medium-font-size" data-dcnode-id="533"><span data-dcnode-id="537" instrument_node="">Consequently,&nbsp;</span><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">planet</span></strong><span data-dcnode-id="534" instrument_node="">&nbsp;P has a higher speed when it is close to the Sun and a lower rate when it is far from the Sun. The speed of the planet is thus maximum at the perihelion and minimum at the aphelion.</span></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">illustration of Kepler’s second law, known as the “law of areas.”</span></p><p data-dcnode-id="530"></p><h3 data-dcnode-id="526"><span data-dcnode-id="527" id="Differential_and_integral_calculus"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Differential and integral calculus</span></strong></span></h3><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="522"><div class="wp-block-embed__wrapper" data-dcnode-id="523"><div class="ast-oembed-container" data-dcnode-id="524"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="525" data-src="https://www.youtube.com/embed/c9shwPMpSq8?feature=oembed" frameborder="0" height="596" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="The Universal Law of Gravitation - Part 1 | Physics | Don't Memorise" width="1060"></iframe></div></div></figure><p class="has-medium-font-size" data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">The bases of differential and integral calculus were discovered in the second half of the 17th century by Leibniz (1646-1716) and Newton (1643-1727). Newton’s understanding of these mathematical ideas allowed him to develop the laws of “classical” mechanics, including the three basic laws of physics and the law of&nbsp;</span><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">universal gravitation</span></strong><span data-dcnode-id="518" instrument_node="">.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Through calculation, Newton found Kepler’s laws describing the motion of the planets around the Sun.</span></p><p data-dcnode-id="513" style="font-size:22px"><span data-dcnode-id="514" instrument_node="">In the Newtonian theory, the force of gravitational attraction between two bodies is inversely proportional to the square of their distance:&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">In the middle of the 19th century, the astronomer’s John Couch Adam and Urbain Le Verrier established the existence of the planet Neptune by means of calculations. Their calculations were based on the perturbations of the observed orbit of Uranus with respect to its orbit predicted by Newton’s laws. At the beginning of the 20th century, the same type of method was used to predict the existence of Pluto.</span></p><h3 data-dcnode-id="507"><span data-dcnode-id="508" id="Differential_geometry"><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Differential geometry</span></strong></span></h3><p class="has-medium-font-size" data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">It was not until 1905 and 1916 and the formulation of the&nbsp;</span><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">theory of Relativity</span></strong><span data-dcnode-id="503" instrument_node="">&nbsp;(special and then general) by Albert Einstein (1879-1955) that an explanation of these phenomena was found.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">The mathematical framework of the theory of Relativity is that of differential geometry, precisely Lorentzian varieties.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">When Einstein formulated his theory, differential geometry was about sixty years old. It was Bernhard Riemann (1826-1866), who is 1854, who laid the foundations.</span></p><p class="has-medium-font-size" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Riemann’s motivations were then purely mathematical. Einstein was oriented towards Riemann’s work and non-Euclidean geometries by his mathematician friend Marcel Grossmann (1878-1936), who also introduced him to the tensor calculus, which is the primary language of the relativity theory.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="488"><span data-dcnode-id="495" instrument_node="">In this new theory,&nbsp;</span><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">gravitation</span></strong><span data-dcnode-id="492" instrument_node="">&nbsp;is not a force but the manifestation of the deformation of space (in fact of&nbsp;</span><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">space-time</span></strong><span data-dcnode-id="489" instrument_node="">) produced by the distribution of matter.</span></p><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="476"><div class="wp-block-embed__wrapper" data-dcnode-id="477"><div class="ast-oembed-container" data-dcnode-id="478"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" class="lazyload" data-dcnode-id="479" data-src="https://www.youtube.com/embed/a7uTKwbsFtg?feature=oembed" frameborder="0" height="596" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" title="Gravity3Dspacetime" width="1060"><html data-dcnode-id="481" style="height: 100%;"><head data-dcnode-id="484"><meta charset="utf-8"><meta content="width=device-width, minimum-scale=0.1" data-dcnode-id="487" name="viewport"/><title data-dcnode-id="485">gif (1×1)</title></meta></head><body data-dcnode-id="482" style="margin: 0px; height: 100%"><img data-dcnode-id="483" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" style="-webkit-user-select: none;"/></body></html></iframe></div></div></figure><p class="has-medium-font-size" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">A massive object deforms space-time.</span></p><h3 data-dcnode-id="470"><span data-dcnode-id="471" id="Statistics_and_probabilities"><strong data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Statistics and probabilities</span></strong></span></h3><p class="has-medium-font-size" data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">One topic fascinates astrophysicists and, to a lesser extent, most of humankind in the hunt for&nbsp;</span><strong data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">exoplanets</span></strong><span data-dcnode-id="466" instrument_node="">: is there life on another planet?&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">The Earth demonstrates that a form of life that depends primarily on carbon may occur whether the mechanisms that caused life to evolve on Earth may have happened on another planet.</span></p><p class="has-medium-font-size" data-dcnode-id="458"><span data-dcnode-id="462" instrument_node="">The question of&nbsp;</span><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">extra-terrestrial</span></strong><span data-dcnode-id="459" instrument_node="">&nbsp;life is not posed in terms of possibility but its probability, its frequency of occurrence. This mathematical tool is used to extract information from large samples of measurements.&nbsp;</span></p><p class="has-medium-font-size" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">The mathematical principles outlined here for exoplanets apply to other situations. Statistics inevitably follows from theoretical questions such as “how many planets are there in our galaxy?” or “what masses do they have?” or “what distances do they have from their host stars?”. These questions are crucial to understand the formation and evolution of planets and to help in the search for extra-terrestrial life.</span></p><h2 data-dcnode-id="453"><span data-dcnode-id="454" id="Astronomy_Math_Problems"><span data-dcnode-id="455" instrument_node="">Astronomy Math Problems</span></span></h2><p class="has-medium-font-size" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Update. I found a few math astronomical tasks, so if you want to check it out.</span></p><p data-dcnode-id="450"></p><div class="ub-buttons align-button-center" data-dcnode-id="443" id="ub-button-ae09ae31-3a97-446d-b99f-423ec079b1b8"><div class="ub-button-container" data-dcnode-id="444"><span data-dcnode-id="449" instrument_node=""> </span><a class="ub-button-block-main ub-button-large" data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spacemath.gsfc.nasa.gov/Search.html" rel="noopener noreferrer nofollow" role="button" target="_blank"><div class="ub-button-content-holder" data-dcnode-id="446"><span class="ub-button-block-btn" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Astronomy Math Problems</span></span></div></a></div></div><p class="has-medium-font-size" data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">If I had a Youtube channel, I would say subscribe or like the page because I update the text regularly :).</span></p><p class="has-medium-font-size" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node=""> Thank you</span></p></div></div></article><div class="ast-single-author-box" data-dcnode-id="416" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><div class="ast-author-meta" data-dcnode-id="417"><div class="about-author-title-wrapper" data-dcnode-id="431"><h3 class="about-author" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">About The Author</span></h3></div><div class="ast-author-details" data-dcnode-id="418"><div class="post-author-avatar" data-dcnode-id="427"><img alt="" class="avatar avatar-100 photo lazyload" data-dcnode-id="430" data-src="https://secure.gravatar.com/avatar/f09eadbdad0a8edb724a984930743656?s=100&amp;d=mm&amp;r=g" data-srcset="https://secure.gravatar.com/avatar/f09eadbdad0a8edb724a984930743656?s=200&amp;d=mm&amp;r=g 2x" height="100" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="100"><noscript data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">&lt;img alt='' src='https://secure.gravatar.com/avatar/f09eadbdad0a8edb724a984930743656?s=100&amp;#038;d=mm&amp;#038;r=g' srcset='https://secure.gravatar.com/avatar/f09eadbdad0a8edb724a984930743656?s=200&amp;#038;d=mm&amp;#038;r=g 2x' class='avatar avatar-100 photo' height='100' width='100' /&gt;</span></noscript></div><div class="post-author-bio" data-dcnode-id="419"><span data-dcnode-id="426" instrument_node=""> </span><a class="url fn n" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astronomerguide.com/about/" itemprop="url" rel="author"><h4 class="author-title" data-dcnode-id="424" itemprop="name"><span data-dcnode-id="425" instrument_node="">Dennis</span></h4><span data-dcnode-id="423" instrument_node=""> </span></a><div class="post-author-desc" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Dennis has been studying astronomy off and on since the age of seven. At the age of nineteen, he began dedicating his time to astrophotography, monitoring the night sky for leisure, and eventually was prompted by his peers to create an online resource for other budding astronomers. Dennis mentions “I didn’t have a resource like this growing up, and it would have been infinitely helpful when I didn’t know what I was doing.” His mission is to help you with your astronomer journey and the neverending cycle of education that comes with it.</span></div></div></div></div></div><div class="comments-area" data-dcnode-id="370" id="comments"><div class="comment-respond" data-dcnode-id="372" id="respond"><h3 class="comment-reply-title" data-dcnode-id="411" id="reply-title"><span data-dcnode-id="415" instrument_node="">Leave a Comment </span><small data-dcnode-id="4
