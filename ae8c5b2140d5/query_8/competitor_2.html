</span></p><p data-dcnode-id="2535"><span data-dcnode-id="2551" instrument_node="">There is a further problem of glass defects, striae or small </span><a class="mw-redirect" data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_bubble" title="Air bubble"><span data-dcnode-id="2550" instrument_node="">air bubbles</span></a><span data-dcnode-id="2548" instrument_node=""> trapped within the glass. In addition, glass is </span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opacity_%28optics%29" title="Opacity (optics)"><span data-dcnode-id="2547" instrument_node="">opaque</span></a><span data-dcnode-id="2545" instrument_node=""> to certain </span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="2544" instrument_node="">wavelengths</span></a><span data-dcnode-id="2542" instrument_node="">, and even </span><a class="mw-redirect" data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_spectrum" title="Optical spectrum"><span data-dcnode-id="2541" instrument_node="">visible light</span></a><span data-dcnode-id="2539" instrument_node=""> is dimmed by reflection and absorption when it crosses the air-glass interfaces and passes through the glass itself. Most of these problems are avoided or diminished in </span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="2538" instrument_node="">reflecting telescopes</span></a><span data-dcnode-id="2536" instrument_node="">, which can be made in far larger apertures and which have all but replaced refractors for astronomical research.
</span></p><p data-dcnode-id="2523"><span data-dcnode-id="2534" instrument_node="">The ISS-WAC on the </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voyager_1" title="Voyager 1"><span data-dcnode-id="2533" instrument_node="">Voyager 1</span></a><span data-dcnode-id="2531" instrument_node="">/</span><a data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voyager_2" title="Voyager 2"><span data-dcnode-id="2530" instrument_node="">2</span></a><span data-dcnode-id="2528" instrument_node=""> used a 6&nbsp;cm (2.36″) lens, launched into space in the late 1970s, an example of the use of refractors in space.</span><sup class="reference" data-dcnode-id="2525" id="cite_ref-astrov_36-0"><a data-dcnode-id="2526" href="#cite_note-astrov-36"><span data-dcnode-id="2527" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2524" instrument_node="">
</span></p><span data-dcnode-id="2522" instrument_node="">
</span><h2 data-dcnode-id="2512"><span class="mw-headline" data-dcnode-id="2520" id="Applications_and_achievements"><span data-dcnode-id="2521" instrument_node="">Applications and achievements</span></span><span class="mw-editsection" data-dcnode-id="2513"><span class="mw-editsection-bracket" data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">[</span></span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D8" title="Edit section: Applications and achievements"><span data-dcnode-id="2517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2511" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2502"><div class="thumbinner" data-dcnode-id="2503" style="width:302px;"><a class="image" data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreat_Refractor_Potsdam.jpg"><img alt="" class="thumbimage" data-dcnode-id="2510" data-file-height="1536" data-file-width="2048" decoding="async" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Great_Refractor_Potsdam.jpg/300px-Great_Refractor_Potsdam.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/Great_Refractor_Potsdam.jpg/450px-Great_Refractor_Potsdam.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/Great_Refractor_Potsdam.jpg/600px-Great_Refractor_Potsdam.jpg 2x" width="300"></a><span data-dcnode-id="2508" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2504"><div class="magnify" data-dcnode-id="2506"><a class="internal" data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreat_Refractor_Potsdam.jpg" title="Enlarge"></a></div><span data-dcnode-id="2505" instrument_node="">The "Große Refraktor" a double telescope with a 80cm (31.5") and 50 cm (19.5") lenses, was used to discover calcium as an interstellar medium in 1904.</span></div></div></div><span data-dcnode-id="2501" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2492"><div class="thumbinner" data-dcnode-id="2493" style="width:222px;"><a class="image" data-dcnode-id="2499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJessica_Meir_Photography_Training.jpg"><img alt="" class="thumbimage" data-dcnode-id="2500" data-file-height="3712" data-file-width="5568" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jessica_Meir_Photography_Training.jpg/220px-Jessica_Meir_Photography_Training.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jessica_Meir_Photography_Training.jpg/330px-Jessica_Meir_Photography_Training.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/36/Jessica_Meir_Photography_Training.jpg/440px-Jessica_Meir_Photography_Training.jpg 2x" width="220"></a><span data-dcnode-id="2498" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2494"><div class="magnify" data-dcnode-id="2496"><a class="internal" data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJessica_Meir_Photography_Training.jpg" title="Enlarge"></a></div><span data-dcnode-id="2495" instrument_node="">Astronaut trains with camera with large lens</span></div></div></div><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2490" instrument_node="">Refracting telescopes were noted for their use in astronomy as well as for terrestrial viewing. Many early discoveries of the </span><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_System" title="Solar System"><span data-dcnode-id="2489" instrument_node="">Solar System</span></a><span data-dcnode-id="2487" instrument_node=""> were made with singlet refractors.
</span></p><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">The use of refracting telescopic optics are ubiquitous in photography, and are also used in Earth orbit.
</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">One of the more famous applications of the refracting telescope was when Galileo used it to discover the four largest moons of Jupiter in 1609. Furthermore, early refractors were also used several decades later to discover Titan, the largest moon of Saturn, along with three more of Saturn's moons.
</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">In the 19th century, refracting telescopes were used for pioneering work on astrophotography and spectroscopy, and the related instrument, the heliometer, was used to calculate the distance to another star for the first time. Their modest apertures did not lead to as many discoveries and typically so small in aperture that many astronomical objects were simply not observeable until the advent of long-exposure photography, by which time the reputation and quirks of reflecting telescopes were beginning to exceed those of the refractors. Despite this, some discoveries include the Moons of Mars, a fifth Moon of Jupiter, and many double star discoveries including Sirius (the Dog star). Refactors were often used for positional astronomy, besides from the other uses in photography and terrestrial viewing.
</span></p><span data-dcnode-id="2479" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="2470"><div class="thumbinner" data-dcnode-id="2471" style="width:222px;"><a class="image" data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASpyglass.jpg"><img alt="" class="thumbimage" data-dcnode-id="2478" data-file-height="1600" data-file-width="719" decoding="async" height="490" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Spyglass.jpg/220px-Spyglass.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Spyglass.jpg/330px-Spyglass.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Spyglass.jpg/440px-Spyglass.jpg 2x" width="220"></a><span data-dcnode-id="2476" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2472"><div class="magnify" data-dcnode-id="2474"><a class="internal" data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASpyglass.jpg" title="Enlarge"></a></div><span data-dcnode-id="2473" instrument_node="">Touristic telescope pointed to Matterhorn in Switzerland</span></div></div></div><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2465"><b data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Singlets</span></b><span data-dcnode-id="2466" instrument_node="">
The Galilean moons and many other moons of the solar system, were discovered with single-element objectives and aerial telescopes.
</span></p><p data-dcnode-id="2454"><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="2464" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="2462" instrument_node="">'s discovered the </span><a class="mw-redirect" data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_satellites" title="Galilean satellites"><span data-dcnode-id="2461" instrument_node="">Galilean satellites</span></a><span data-dcnode-id="2459" instrument_node=""> of Jupiter in 1610 with a refracting telescope.</span><sup class="reference" data-dcnode-id="2456" id="cite_ref-Bakich_2000_37-0"><a data-dcnode-id="2457" href="#cite_note-Bakich_2000-37"><span data-dcnode-id="2458" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2455" instrument_node="">
</span></p><p data-dcnode-id="2439"><span data-dcnode-id="2453" instrument_node="">The planet Saturn's moon, </span><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28moon%29" title="Titan (moon)"><span data-dcnode-id="2452" instrument_node="">Titan</span></a><span data-dcnode-id="2450" instrument_node="">, was discovered on March 25, 1655, by the Dutch astronomer </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="2449" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="2447" instrument_node="">.</span><sup class="reference" data-dcnode-id="2444" id="cite_ref-38"><a data-dcnode-id="2445" href="#cite_note-38"><span data-dcnode-id="2446" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="2441" id="cite_ref-39"><a data-dcnode-id="2442" href="#cite_note-39"><span data-dcnode-id="2443" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2440" instrument_node="">
</span></p><p data-dcnode-id="2435"><b data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Doublets</span></b><span data-dcnode-id="2436" instrument_node="">
In 1861, the brightest star in the night sky, Sirius, was found to have smaller stellar companion using the 18 and half-inch Dearborn refracting telescope.
</span></p><p data-dcnode-id="2427"><span data-dcnode-id="2434" instrument_node="">By the 18th century refractors began to have major competition from reflectors, which could be made quite large and did not normally suffer from the same inherent problem with chromatic aberration. Nevertheless, the astronomical community continued to use doublet refractors of modest aperture in comparison to modern instruments. Noted discoveries include the </span><a data-dcnode-id="2432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moons_of_Mars" title="Moons of Mars"><span data-dcnode-id="2433" instrument_node="">Moons of Mars</span></a><span data-dcnode-id="2431" instrument_node=""> and a fifth moon of Jupiter, </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amalthea_%28moon%29" title="Amalthea (moon)"><span data-dcnode-id="2430" instrument_node="">Amalthea</span></a><span data-dcnode-id="2428" instrument_node="">.
</span></p><p data-dcnode-id="2385"><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asaph_Hall" title="Asaph Hall"><span data-dcnode-id="2426" instrument_node="">Asaph Hall</span></a><span data-dcnode-id="2424" instrument_node=""> discovered </span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deimos_%28moon%29" title="Deimos (moon)"><span data-dcnode-id="2423" instrument_node="">Deimos</span></a><span data-dcnode-id="2421" instrument_node=""> on 12 August 1877 at about 07:48 </span><a data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coordinated_Universal_Time" title="Coordinated Universal Time"><span data-dcnode-id="2420" instrument_node="">UTC</span></a><span data-dcnode-id="2418" instrument_node=""> and </span><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phobos_%28moon%29" title="Phobos (moon)"><span data-dcnode-id="2417" instrument_node="">Phobos</span></a><span data-dcnode-id="2415" instrument_node=""> on 18 August 1877, at the </span><a class="mw-redirect" data-dcnode-id="2413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_Naval_Observatory" title="US Naval Observatory"><span data-dcnode-id="2414" instrument_node="">US Naval Observatory</span></a><span data-dcnode-id="2412" instrument_node=""> in </span><a data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="2411" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="2409" instrument_node="">, at about 09:14 </span><a class="mw-redirect" data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GMT" title="GMT"><span data-dcnode-id="2408" instrument_node="">GMT</span></a><span data-dcnode-id="2406" instrument_node=""> (contemporary sources, using the pre-1925 </span><a data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_day" title="Astronomical day"><span data-dcnode-id="2405" instrument_node="">astronomical convention</span></a><span data-dcnode-id="2403" instrument_node=""> that began the day at noon,</span><sup class="reference" data-dcnode-id="2400" id="cite_ref-Campbell_&quot;Beginning&quot;_40-0"><a data-dcnode-id="2401" href="#cite_note-Campbell_%22Beginning%22-40"><span data-dcnode-id="2402" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2399" instrument_node=""> give the time of discovery as 11 August 14:40 and 17 August 16:06 </span><a class="mw-redirect" data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_mean_time" title="Washington mean time"><span data-dcnode-id="2398" instrument_node="">Washington mean time</span></a><span data-dcnode-id="2396" instrument_node=""> respectively).</span><sup class="reference" data-dcnode-id="2393" id="cite_ref-41"><a data-dcnode-id="2394" href="#cite_note-41"><span data-dcnode-id="2395" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="2390" id="cite_ref-42"><a data-dcnode-id="2391" href="#cite_note-42"><span data-dcnode-id="2392" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="2387" id="cite_ref-Morley1989_43-0"><a data-dcnode-id="2388" href="#cite_note-Morley1989-43"><span data-dcnode-id="2389" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2386" instrument_node="">
</span></p><p data-dcnode-id="2372"><span data-dcnode-id="2384" instrument_node="">The telescope used for the discovery was the 26-inch (66&nbsp;cm) refractor (telescope with a lens) then located at </span><a data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foggy_Bottom" title="Foggy Bottom"><span data-dcnode-id="2383" instrument_node="">Foggy Bottom</span></a><span data-dcnode-id="2381" instrument_node="">.</span><sup class="reference" data-dcnode-id="2378" id="cite_ref-44"><a data-dcnode-id="2379" href="#cite_note-44"><span data-dcnode-id="2380" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2377" instrument_node=""> In 1893 the lens was remounted and put in a new dome, where it remains into the 21st century.</span><sup class="reference" data-dcnode-id="2374" id="cite_ref-45"><a data-dcnode-id="2375" href="#cite_note-45"><span data-dcnode-id="2376" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2373" instrument_node="">
</span></p><p data-dcnode-id="2350"><span data-dcnode-id="2371" instrument_node="">Jupiter's moon Amalthea was discovered on 9 September 1892, by </span><a data-dcnode-id="2369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Emerson_Barnard" title="Edward Emerson Barnard"><span data-dcnode-id="2370" instrument_node="">Edward Emerson Barnard</span></a><span data-dcnode-id="2368" instrument_node=""> using the </span><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Lick_telescope" title="James Lick telescope"><span data-dcnode-id="2367" instrument_node="">36 inches (91&nbsp;cm) refractor telescope</span></a><span data-dcnode-id="2365" instrument_node=""> at </span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lick_Observatory" title="Lick Observatory"><span data-dcnode-id="2364" instrument_node="">Lick Observatory</span></a><span data-dcnode-id="2362" instrument_node="">.</span><sup class="reference" data-dcnode-id="2359" id="cite_ref-46"><a data-dcnode-id="2360" href="#cite_note-46"><span data-dcnode-id="2361" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="2356" id="cite_ref-Observatory1894_47-0"><a data-dcnode-id="2357" href="#cite_note-Observatory1894-47"><span data-dcnode-id="2358" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2355" instrument_node=""> It was discovered by direct visual observation with the doublet-lens refractor.</span><sup class="reference" data-dcnode-id="2352" id="cite_ref-Bakich_2000_37-1"><a data-dcnode-id="2353" href="#cite_note-Bakich_2000-37"><span data-dcnode-id="2354" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2351" instrument_node="">
</span></p><p data-dcnode-id="2328"><span data-dcnode-id="2349" instrument_node="">In 1904, one of the discoveries made using Great Refractor of Potsdam (a double telescope with two doublets) was of the </span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interstellar_medium" title="Interstellar medium"><span data-dcnode-id="2348" instrument_node="">interstellar medium</span></a><span data-dcnode-id="2346" instrument_node="">.</span><sup class="reference" data-dcnode-id="2343" id="cite_ref-:5_48-0"><a data-dcnode-id="2344" href="#cite_note-:5-48"><span data-dcnode-id="2345" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2342" instrument_node=""> The astronomer </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Franz_Hartmann" title="Johannes Franz Hartmann"><span data-dcnode-id="2341" instrument_node="">Professor Hartmann</span></a><span data-dcnode-id="2339" instrument_node=""> determined from observations of the binary star </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mintaka" title="Mintaka"><span data-dcnode-id="2338" instrument_node="">Mintaka</span></a><span data-dcnode-id="2336" instrument_node=""> in Orion, that there was the element </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Calcium" title="Calcium"><span data-dcnode-id="2335" instrument_node="">calcium</span></a><span data-dcnode-id="2333" instrument_node=""> in the intervening space.</span><sup class="reference" data-dcnode-id="2330" id="cite_ref-:5_48-1"><a data-dcnode-id="2331" href="#cite_note-:5-48"><span data-dcnode-id="2332" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2329" instrument_node="">
</span></p><span data-dcnode-id="2327" instrument_node="">
</span><dl data-dcnode-id="2324"><dt data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Triplets</span></dt></dl><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2308"><span data-dcnode-id="2322" instrument_node="">Planet </span><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pluto" title="Pluto"><span data-dcnode-id="2321" instrument_node="">Pluto</span></a><span data-dcnode-id="2319" instrument_node=""> was discovered by looking at photographs (i.e. 'plates' in astronomy vernacular) in a </span><a data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blink_comparator" title="Blink comparator"><span data-dcnode-id="2318" instrument_node="">blink comparator</span></a><span data-dcnode-id="2316" instrument_node=""> taken with a refracting telescope, an astrograph with a 3 element 13-inch lens.</span><sup class="reference" data-dcnode-id="2313" id="cite_ref-49"><a data-dcnode-id="2314" href="#cite_note-49"><span data-dcnode-id="2315" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="2310" id="cite_ref-50"><a data-dcnode-id="2311" href="#cite_note-50"><span data-dcnode-id="2312" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2309" instrument_node="">
</span></p><span data-dcnode-id="2307" instrument_node="">
</span><link data-dcnode-id="2306" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2302" role="note"><span data-dcnode-id="2305" instrument_node="">Further information: </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_discovery_of_Solar_System_planets_and_their_moons" title="Timeline of discovery of Solar System planets and their moons"><span data-dcnode-id="2304" instrument_node="">Timeline of discovery of Solar System planets and their moons</span></a></div><span data-dcnode-id="2301" instrument_node="">
