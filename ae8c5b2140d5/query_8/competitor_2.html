</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="3547" id="firstHeading"><span data-dcnode-id="3548" instrument_node="">Refracting telescope</span></h1><span data-dcnode-id="3546" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="722" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="731"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3528" style="display:none"><span data-dcnode-id="3529" instrument_node="">Type of optical telescope</span></div><span data-dcnode-id="3527" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3520" role="note"><span data-dcnode-id="3524" instrument_node="">"Keplerian telescope" redirects here. Not to be confused with </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kepler_space_telescope" title="Kepler space telescope"><span data-dcnode-id="3523" instrument_node="">Kepler space telescope</span></a><span data-dcnode-id="3521" instrument_node="">.</span></div><span data-dcnode-id="3519" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">
</span></p><span data-dcnode-id="3516" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3505"><div class="thumbinner" data-dcnode-id="3506" style="width:222px;"><a class="image" data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AZeiss2.jpg"><img alt="" class="thumbimage" data-dcnode-id="3515" data-file-height="709" data-file-width="479" decoding="async" height="326" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/71/Zeiss2.jpg/220px-Zeiss2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/71/Zeiss2.jpg/330px-Zeiss2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/71/Zeiss2.jpg/440px-Zeiss2.jpg 2x" width="220"></a><span data-dcnode-id="3513" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3507"><div class="magnify" data-dcnode-id="3511"><a class="internal" data-dcnode-id="3512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AZeiss2.jpg" title="Enlarge"></a></div><span data-dcnode-id="3510" instrument_node="">A 200 mm refracting telescope at the </span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pozna%25C5%2584_Observatory" title="Poznań Observatory"><span data-dcnode-id="3509" instrument_node="">Poznań Observatory</span></a></div></div></div><span data-dcnode-id="3504" instrument_node="">
</span><p data-dcnode-id="3455"><span data-dcnode-id="3503" instrument_node="">A </span><b data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">refracting telescope</span></b><span data-dcnode-id="3500" instrument_node=""> (also called a </span><b data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">refractor</span></b><span data-dcnode-id="3497" instrument_node="">) is a type of </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_telescope" title="Optical telescope"><span data-dcnode-id="3496" instrument_node="">optical telescope</span></a><span data-dcnode-id="3494" instrument_node=""> that uses a </span><a class="mw-redirect" data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="3493" instrument_node="">lens</span></a><span data-dcnode-id="3491" instrument_node=""> as its </span><a data-dcnode-id="3489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3490" instrument_node="">objective</span></a><span data-dcnode-id="3488" instrument_node=""> to form an image (also referred to a </span><b data-dcnode-id="3482"><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dioptrics" title="Dioptrics"><span data-dcnode-id="3487" instrument_node="">dioptric</span></a><span data-dcnode-id="3485" instrument_node=""> </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="3484" instrument_node="">telescope</span></a></b><span data-dcnode-id="3481" instrument_node="">). The refracting telescope design was originally used in spyglasses and </span><a data-dcnode-id="3479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomy" title="Astronomy"><span data-dcnode-id="3480" instrument_node="">astronomical</span></a><span data-dcnode-id="3478" instrument_node=""> telescopes but is also used for </span><a data-dcnode-id="3476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Long-focus_lens" title="Long-focus lens"><span data-dcnode-id="3477" instrument_node="">long-focus</span></a><span data-dcnode-id="3475" instrument_node=""> </span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camera_lens" title="Camera lens"><span data-dcnode-id="3474" instrument_node="">camera lenses</span></a><span data-dcnode-id="3472" instrument_node="">. Although large refracting telescopes were very popular in the second half of the 19th century, for most research purposes, the refracting telescope has been superseded by the </span><a data-dcnode-id="3470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="3471" instrument_node="">reflecting telescope</span></a><span data-dcnode-id="3469" instrument_node="">, which allows larger </span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture" title="Aperture"><span data-dcnode-id="3468" instrument_node="">apertures</span></a><span data-dcnode-id="3466" instrument_node="">. A refractor's </span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3465" instrument_node="">magnification</span></a><span data-dcnode-id="3463" instrument_node=""> is calculated by dividing the focal length of the objective lens by that of the </span><a data-dcnode-id="3461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3462" instrument_node="">eyepiece</span></a><span data-dcnode-id="3460" instrument_node="">.</span><sup class="reference" data-dcnode-id="3457" id="cite_ref-1"><a data-dcnode-id="3458" href="#cite_note-1"><span data-dcnode-id="3459" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3456" instrument_node="">
</span></p><p data-dcnode-id="3450"><span data-dcnode-id="3454" instrument_node="">Refracting telescopes typically have a lens at the front, then a </span><a data-dcnode-id="3452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_train" title="Optical train"><span data-dcnode-id="3453" instrument_node="">long tube</span></a><span data-dcnode-id="3451" instrument_node="">, then an eyepiece or instrumentation at the rear, where the telescope view comes to focus. Originally, telescopes had an objective of one element, but a century later, two and even three element lenses were made.
</span></p><p data-dcnode-id="3436"><span data-dcnode-id="3449" instrument_node="">Refracting telescope is a technology that has often been applied to other optical devices, such as </span><a data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Binoculars" title="Binoculars"><span data-dcnode-id="3448" instrument_node="">binoculars</span></a><span data-dcnode-id="3446" instrument_node=""> and </span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zoom_lens" title="Zoom lens"><span data-dcnode-id="3445" instrument_node="">zoom lenses</span></a><span data-dcnode-id="3443" instrument_node="">/</span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telephoto_lens" title="Telephoto lens"><span data-dcnode-id="3442" instrument_node="">telephoto lens</span></a><span data-dcnode-id="3440" instrument_node="">/</span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Long-focus_lens" title="Long-focus lens"><span data-dcnode-id="3439" instrument_node="">long-focus lens</span></a><span data-dcnode-id="3437" instrument_node="">.

</span><h2 data-dcnode-id="3305"><span class="mw-headline" data-dcnode-id="3313" id="Invention"><span data-dcnode-id="3314" instrument_node="">Invention</span></span><span class="mw-editsection" data-dcnode-id="3306"><span class="mw-editsection-bracket" data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">[</span></span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D1" title="Edit section: Invention"><span data-dcnode-id="3310" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3304" instrument_node="">
</span><link data-dcnode-id="3303" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3299" role="note"><span data-dcnode-id="3302" instrument_node="">Main article: </span><a data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_telescope" title="History of the telescope"><span data-dcnode-id="3301" instrument_node="">History of the telescope</span></a></div><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3270"><span data-dcnode-id="3297" instrument_node="">Refractors were the earliest type of </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optical_telescope" title="Optical telescope"><span data-dcnode-id="3296" instrument_node="">optical telescope</span></a><span data-dcnode-id="3294" instrument_node="">. The first record of a refracting telescope appeared in the </span><a data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3293" instrument_node="">Netherlands</span></a><span data-dcnode-id="3291" instrument_node=""> about 1608, when a spectacle maker from </span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middelburg%2C_Zeeland" title="Middelburg, Zeeland"><span data-dcnode-id="3290" instrument_node="">Middelburg</span></a><span data-dcnode-id="3288" instrument_node=""> named </span><a class="mw-redirect" data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="3287" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="3285" instrument_node=""> unsuccessfully tried to patent one.</span><sup class="reference" data-dcnode-id="3282" id="cite_ref-2"><a data-dcnode-id="3283" href="#cite_note-2"><span data-dcnode-id="3284" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3281" instrument_node=""> News of the patent spread fast and </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="3280" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="3278" instrument_node="">, happening to be in </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice" title="Venice"><span data-dcnode-id="3277" instrument_node="">Venice</span></a><span data-dcnode-id="3275" instrument_node=""> in the month of May 1609, heard of the invention, constructed a version of his own, and applied it to making astronomical discoveries.</span><sup class="reference" data-dcnode-id="3272" id="cite_ref-:0_3-0"><a data-dcnode-id="3273" href="#cite_note-:0-3"><span data-dcnode-id="3274" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3271" instrument_node="">
</span></p><span data-dcnode-id="3269" instrument_node="">
</span><h2 data-dcnode-id="3259"><span class="mw-headline" data-dcnode-id="3267" id="Refracting_telescope_designs"><span data-dcnode-id="3268" instrument_node="">Refracting telescope designs</span></span><span class="mw-editsection" data-dcnode-id="3260"><span class="mw-editsection-bracket" data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">[</span></span><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D2" title="Edit section: Refracting telescope designs"><span data-dcnode-id="3264" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3258" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3250"><div class="thumbinner" data-dcnode-id="3251" style="width:402px;"><a class="image" data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKepschem.png"><img alt="Kepschem.png" class="thumbimage" data-dcnode-id="3257" data-file-height="319" data-file-width="708" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kepschem.png/400px-Kepschem.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Kepschem.png/600px-Kepschem.png 1.5x, //upload.wikimedia.org/wikipedia/commons/2/26/Kepschem.png 2x" width="400"></a><span data-dcnode-id="3255" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3252"><div class="magnify" data-dcnode-id="3253"><a class="internal" data-dcnode-id="3254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AKepschem.png" title="Enlarge"></a></div></div></div></div><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3214"><span data-dcnode-id="3248" instrument_node="">All refracting telescopes use the same principles. The combination of an </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3247" instrument_node="">objective</span></a><span data-dcnode-id="3245" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="3244" instrument_node="">lens</span></a><span data-dcnode-id="3242" instrument_node=""> </span><b data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">1</span></b><span data-dcnode-id="3239" instrument_node=""> and some type of </span><a data-dcnode-id="3237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3238" instrument_node="">eyepiece</span></a><span data-dcnode-id="3236" instrument_node=""> </span><b data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">2</span></b><span data-dcnode-id="3233" instrument_node=""> is used to gather more light than the human eye is able to collect on its own, focus it </span><b data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">5</span></b><span data-dcnode-id="3230" instrument_node="">, and present the viewer with a </span><a data-dcnode-id="3228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brightness" title="Brightness"><span data-dcnode-id="3229" instrument_node="">brighter</span></a><span data-dcnode-id="3227" instrument_node="">, </span><a class="extiw" data-dcnode-id="3225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wiktionary.org/wiki/clarity" title="wikt:clarity"><span data-dcnode-id="3226" instrument_node="">clearer</span></a><span data-dcnode-id="3224" instrument_node="">, and </span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3223" instrument_node="">magnified</span></a><span data-dcnode-id="3221" instrument_node=""> </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virtual_image" title="Virtual image"><span data-dcnode-id="3220" instrument_node="">virtual image</span></a><span data-dcnode-id="3218" instrument_node=""> </span><b data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">6</span></b><span data-dcnode-id="3215" instrument_node="">.
</span></p><p data-dcnode-id="3193"><span data-dcnode-id="3213" instrument_node="">The objective in a refracting telescope </span><a data-dcnode-id="3211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refraction" title="Refraction"><span data-dcnode-id="3212" instrument_node="">refracts</span></a><span data-dcnode-id="3210" instrument_node=""> or bends </span><a data-dcnode-id="3208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Light" title="Light"><span data-dcnode-id="3209" instrument_node="">light</span></a><span data-dcnode-id="3207" instrument_node="">. This refraction causes </span><a data-dcnode-id="3205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parallel_%28geometry%29" title="Parallel (geometry)"><span data-dcnode-id="3206" instrument_node="">parallel</span></a><span data-dcnode-id="3204" instrument_node=""> light rays to converge at a </span><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focus_%28optics%29" title="Focus (optics)"><span data-dcnode-id="3203" instrument_node="">focal point</span></a><span data-dcnode-id="3201" instrument_node="">; while those not parallel converge upon a </span><a class="mw-redirect" data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_plane" title="Focal plane"><span data-dcnode-id="3200" instrument_node="">focal plane</span></a><span data-dcnode-id="3198" instrument_node="">. The telescope converts a bundle of parallel rays to make an angle α, with the optical axis to a second parallel bundle with angle β. The ratio β/α is called the angular magnification. It equals the ratio between the retinal image sizes obtained with and without the telescope.</span><sup class="reference" data-dcnode-id="3195" id="cite_ref-4"><a data-dcnode-id="3196" href="#cite_note-4"><span data-dcnode-id="3197" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3194" instrument_node="">
</span></p><p data-dcnode-id="3185"><span data-dcnode-id="3192" instrument_node="">Refracting telescopes can come in many different configurations to correct for image orientation and types of aberration. Because the image was formed by the bending of light, or refraction, these telescopes are called </span><i data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">refracting telescopes</span></i><span data-dcnode-id="3189" instrument_node=""> or </span><i data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">refractors</span></i><span data-dcnode-id="3186" instrument_node="">.
</span></p><span data-dcnode-id="3184" instrument_node="">
</span><h3 data-dcnode-id="3174"><span class="mw-headline" data-dcnode-id="3182" id="Galilean_telescope"><span data-dcnode-id="3183" instrument_node="">Galilean telescope</span></span><span class="mw-editsection" data-dcnode-id="3175"><span class="mw-editsection-bracket" data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">[</span></span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D3" title="Edit section: Galilean telescope"><span data-dcnode-id="3179" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3173" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3133"><div class="thumbinner" data-dcnode-id="3134" style="width:402px;"><a class="image" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileantelescope.png"><img alt="" class="thumbimage" data-dcnode-id="3172" data-file-height="326" data-file-width="924" decoding="async" height="141" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Galileantelescope.png/400px-Galileantelescope.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Galileantelescope.png/600px-Galileantelescope.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Galileantelescope.png/800px-Galileantelescope.png 2x" width="400"></a><span data-dcnode-id="3170" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3135"><div class="magnify" data-dcnode-id="3168"><a class="internal" data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileantelescope.png" title="Enlarge"></a></div><b data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Optical diagram of Galilean telescope</span></b><span data-dcnode-id="3165" instrument_node=""> </span><b data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">y</span></b><span data-dcnode-id="3162" instrument_node=""> – Distant object; </span><b data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">y′</span></b><span data-dcnode-id="3159" instrument_node=""> – Real image from objective; </span><b data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node=""> y″</span></b><span data-dcnode-id="3156" instrument_node=""> – Magnified virtual image from eyepiece; </span><b data-dcnode-id="3154"><span data-dcnode-id="3155" instrument_node="">D</span></b><span data-dcnode-id="3153" instrument_node=""> – Entrance pupil diameter; </span><b data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">d</span></b><span data-dcnode-id="3150" instrument_node=""> – Virtual exit pupil diameter; </span><b data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node=""> L1</span></b><span data-dcnode-id="3147" instrument_node=""> – Objective lens; </span><b data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node=""> L2</span></b><span data-dcnode-id="3144" instrument_node=""> – Eyepiece lens </span><b data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">e</span></b><span data-dcnode-id="3141" instrument_node=""> – Virtual exit pupil – </span><b data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Telescope equals</span></b><sup class="reference" data-dcnode-id="3136" id="cite_ref-5"><a data-dcnode-id="3137" href="#cite_note-5"><span data-dcnode-id="3138" instrument_node="">[5]</span></a></sup></div></div></div><span data-dcnode-id="3132" instrument_node="">
</span><p data-dcnode-id="3107"><span data-dcnode-id="3131" instrument_node="">The design </span><a data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="3130" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="3128" instrument_node=""> used </span><abbr data-dcnode-id="3126" title="circa"><span data-dcnode-id="3127" instrument_node="">c.</span></abbr><span data-dcnode-id="3124" style="white-space:nowrap;"><span data-dcnode-id="3125" instrument_node=""> 1609</span></span><span data-dcnode-id="3123" instrument_node=""> is commonly called a </span><b data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Galilean telescope</span></b><span data-dcnode-id="3120" instrument_node="">.</span><sup class="reference" data-dcnode-id="3117" id="cite_ref-:3_6-0"><a data-dcnode-id="3118" href="#cite_note-:3-6"><span data-dcnode-id="3119" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3116" instrument_node=""> It used a convergent (plano-convex) objective lens and a divergent (plano-concave) eyepiece lens (Galileo, 1610).</span><sup class="reference" data-dcnode-id="3113" id="cite_ref-7"><a data-dcnode-id="3114" href="#cite_note-7"><span data-dcnode-id="3115" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3112" instrument_node=""> A Galilean telescope, because the design has no intermediary focus, results in a non-inverted and, with the help of some devices, an upright image.</span><sup class="reference" data-dcnode-id="3109" id="cite_ref-:6_8-0"><a data-dcnode-id="3110" href="#cite_note-:6-8"><span data-dcnode-id="3111" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3108" instrument_node="">
</span></p><p data-dcnode-id="3066"><span data-dcnode-id="3106" instrument_node="">Galileo's most powerful telescope, with a total length of 980 millimetres (3&nbsp;ft 3&nbsp;in),</span><sup class="reference" data-dcnode-id="3103" id="cite_ref-:3_6-1"><a data-dcnode-id="3104" href="#cite_note-:3-6"><span data-dcnode-id="3105" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3102" instrument_node=""> </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="3101" instrument_node="">magnified</span></a><span data-dcnode-id="3099" instrument_node=""> objects about 30 times.</span><sup class="reference" data-dcnode-id="3096" id="cite_ref-:6_8-1"><a data-dcnode-id="3097" href="#cite_note-:6-8"><span data-dcnode-id="3098" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3095" instrument_node=""> Because of flaws in its design, such as the shape of the lens and the narrow field of view,</span><sup class="reference" data-dcnode-id="3092" id="cite_ref-:6_8-2"><a data-dcnode-id="3093" href="#cite_note-:6-8"><span data-dcnode-id="3094" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3091" instrument_node=""> the images were blurry and distorted. Despite these flaws, the telescope was still good enough for Galileo to explore the sky. He used it to view </span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Impact_crater" title="Impact crater"><span data-dcnode-id="3090" instrument_node="">craters</span></a><span data-dcnode-id="3088" instrument_node=""> on the </span><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="3087" instrument_node="">Moon</span></a><span data-dcnode-id="3085" instrument_node="">,</span><sup class="reference" data-dcnode-id="3082" id="cite_ref-9"><a data-dcnode-id="3083" href="#cite_note-9"><span data-dcnode-id="3084" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3081" instrument_node=""> the four </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_moons" title="Galilean moons"><span data-dcnode-id="3080" instrument_node="">largest moons of Jupiter</span></a><span data-dcnode-id="3078" instrument_node="">,</span><sup class="reference" data-dcnode-id="3075" id="cite_ref-10"><a data-dcnode-id="3076" href="#cite_note-10"><span data-dcnode-id="3077" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3074" instrument_node=""> and the </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phases_of_Venus" title="Phases of Venus"><span data-dcnode-id="3073" instrument_node="">phases of Venus</span></a><span data-dcnode-id="3071" instrument_node="">.</span><sup class="reference" data-dcnode-id="3068" id="cite_ref-11"><a data-dcnode-id="3069" href="#cite_note-11"><span data-dcnode-id="3070" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3067" instrument_node="">
</span></p><p data-dcnode-id="3049"><span data-dcnode-id="3065" instrument_node="">Parallel rays of light from a distant object (</span><b data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">y</span></b><span data-dcnode-id="3062" instrument_node="">) would be brought to a focus in the focal plane of the objective lens (</span><b data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">F′ L1 / y′</span></b><span data-dcnode-id="3059" instrument_node="">). The (diverging) eyepiece (</span><b data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">L2</span></b><span data-dcnode-id="3056" instrument_node="">) lens intercepts these rays and renders them parallel once more. Non-parallel rays of light from the object traveling at an angle </span><b data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">α1</span></b><span data-dcnode-id="3053" instrument_node=""> to the optical axis travel at a larger angle (</span><b data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">α2 &gt; α1</span></b><span data-dcnode-id="3050" instrument_node="">)  after they passed through the eyepiece. This leads to an increase in the apparent angular size and is responsible for the perceived magnification.
</span></p><p data-dcnode-id="3044"><span data-dcnode-id="3048" instrument_node="">The final image (</span><b data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">y″</span></b><span data-dcnode-id="3045" instrument_node="">) is a virtual image, located at infinity and is the same way up as the object.
</span></p><span data-dcnode-id="3043" instrument_node="">
</span><h3 data-dcnode-id="3033"><span class="mw-headline" data-dcnode-id="3041" id="Keplerian_telescope"><span data-dcnode-id="3042" instrument_node="">Keplerian telescope</span></span><span class="mw-editsection" data-dcnode-id="3034"><span class="mw-editsection-bracket" data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">[</span></span><a data-dcnode-id="3037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D4" title="Edit section: Keplerian telescope"><span data-dcnode-id="3038" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3032" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3020"><div class="thumbinner" data-dcnode-id="3021" style="width:222px;"><a class="image" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHoughton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg"><img alt="" class="thumbimage" data-dcnode-id="3031" data-file-height="3879" data-file-width="4635" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%252C_Machinae_coelestis%252C_1673.jpg/220px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%252C_Machinae_coelestis%252C_1673.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg/330px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg/440px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg 2x" width="220"></a><span data-dcnode-id="3029" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3022"><div class="magnify" data-dcnode-id="3027"><a class="internal" data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHoughton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg" title="Enlarge"></a></div><span data-dcnode-id="3026" instrument_node="">Engraved illustration of a 46&nbsp;m (150&nbsp;ft) focal length Keplerian astronomical refracting telescope built by Johannes Hevelius.</span><sup class="reference" data-dcnode-id="3023" id="cite_ref-12"><a data-dcnode-id="3024" href="#cite_note-12"><span data-dcnode-id="3025" instrument_node="">[12]</span></a></sup></div></div></div><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="3018" instrument_node="">The </span><b data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">Keplerian telescope</span></b><span data-dcnode-id="3015" instrument_node="">, invented by </span><a data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Kepler" title="Johannes Kepler"><span data-dcnode-id="3014" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="3012" instrument_node=""> in 1611, is an improvement on Galileo's design.</span><sup class="reference" data-dcnode-id="3009" id="cite_ref-13"><a data-dcnode-id="3010" href="#cite_note-13"><span data-dcnode-id="3011" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3008" instrument_node=""> It uses a convex lens as the eyepiece instead of Galileo's concave one. The advantage of this arrangement is that the rays of light emerging from the eyepiece</span><sup class="noprint Inline-Template" data-dcnode-id="2996" style="white-space:nowrap;"><span data-dcnode-id="3007" instrument_node="">[</span><i data-dcnode-id="2998"><a data-dcnode-id="3004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAccuracy_dispute%23Disputed_statement" title="Wikipedia:Accuracy dispute"><span data-dcnode-id="3005" title="The material near this tag is possibly inaccurate or nonfactual. (November 2019)"><span data-dcnode-id="3006" instrument_node="">dubious</span></span></a><span data-dcnode-id="3003" instrument_node=""> </span><span class="metadata" data-dcnode-id="2999"><span data-dcnode-id="3002" instrument_node=""> – </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3ARefracting_telescope%23Dubious" title="Talk:Refracting telescope"><span data-dcnode-id="3001" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="2997" instrument_node="">]</span></sup><span data-dcnode-id="2995" instrument_node=""> are converging. This allows for a much wider field of view and greater </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eye_relief" title="Eye relief"><span data-dcnode-id="2994" instrument_node="">eye relief</span></a><span data-dcnode-id="2992" instrument_node="">, but the image for the viewer is inverted. Considerably higher magnifications can be reached with this design, but to overcome aberrations the simple objective lens needs to have a very high </span><a class="mw-redirect" data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_ratio" title="Focal ratio"><span data-dcnode-id="2991" instrument_node="">f-ratio</span></a><span data-dcnode-id="2989" instrument_node=""> (</span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Hevelius" title="Johannes Hevelius"><span data-dcnode-id="2988" instrument_node="">Johannes Hevelius</span></a><span data-dcnode-id="2986" instrument_node=""> built one with a 46-metre (150&nbsp;ft) </span><a data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_length" title="Focal length"><span data-dcnode-id="2985" instrument_node="">focal length</span></a><span data-dcnode-id="2983" instrument_node="">, and even longer tubeless "</span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerial_telescope" title="Aerial telescope"><span data-dcnode-id="2982" instrument_node="">aerial telescopes</span></a><span data-dcnode-id="2980" instrument_node="">" were constructed). The design also allows for use of a </span><a data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Filar_micrometer%23Prior_devices" title="Filar micrometer"><span data-dcnode-id="2979" instrument_node="">micrometer</span></a><span data-dcnode-id="2977" instrument_node=""> at the focal plane (to determine the angular size and/or distance between objects observed).
</span></p><p data-dcnode-id="2965"><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantijn_Huygens_Jr." title="Constantijn Huygens Jr."><span data-dcnode-id="2975" instrument_node="">Huygens</span></a><span data-dcnode-id="2973" instrument_node=""> built an aerial telescope for </span><a class="mw-redirect" data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Society_of_London" title="Royal Society of London"><span data-dcnode-id="2972" instrument_node="">Royal Society of London</span></a><span data-dcnode-id="2970" instrument_node=""> with a 19&nbsp;cm (7.5″)  single-element lens.</span><sup class="reference" data-dcnode-id="2967" id="cite_ref-stjarnhimlen.se_14-0"><a data-dcnode-id="2968" href="#cite_note-stjarnhimlen.se-14"><span data-dcnode-id="2969" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2966" instrument_node="">
</span></p><span data-dcnode-id="2964" instrument_node="">
</span><h3 data-dcnode-id="2954"><span class="mw-headline" data-dcnode-id="2962" id="Achromatic_refractors"><span data-dcnode-id="2963" instrument_node="">Achromatic refractors</span></span><span class="mw-editsection" data-dcnode-id="2955"><span class="mw-editsection-bracket" data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">[</span></span><a data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D5" title="Edit section: Achromatic refractors"><span data-dcnode-id="2959" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2956"><span data-dcnode-id="2957" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2953" instrument_node="">
</span><link data-dcnode-id="2952" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2948" role="note"><span data-dcnode-id="2951" instrument_node="">Main article: </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_telescope" title="Achromatic telescope"><span data-dcnode-id="2950" instrument_node="">Achromatic telescope</span></a></div><span data-dcnode-id="2947" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2938"><div class="thumbinner" data-dcnode-id="2939" style="width:222px;"><a class="image" data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYerkes_Observatory_Astro4p6.jpg"><img alt="" class="thumbimage" data-dcnode-id="2946" data-file-height="354" data-file-width="450" decoding="async" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/87/Yerkes_Observatory_Astro4p6.jpg/220px-Yerkes_Observatory_Astro4p6.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/87/Yerkes_Observatory_Astro4p6.jpg/330px-Yerkes_Observatory_Astro4p6.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/87/Yerkes_Observatory_Astro4p6.jpg/440px-Yerkes_Observatory_Astro4p6.jpg 2x" width="220"></a><span data-dcnode-id="2944" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2940"><div class="magnify" data-dcnode-id="2942"><a class="internal" data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYerkes_Observatory_Astro4p6.jpg" title="Enlarge"></a></div><span data-dcnode-id="2941" instrument_node="">Alvan Clark polishes the big Yerkes achromatic objective lens, over 1 meter across, in 1896.</span></div></div></div><span data-dcnode-id="2937" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2928"><div class="thumbinner" data-dcnode-id="2929" style="width:222px;"><a class="image" data-dcnode-id="2935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIrving_Porter_Church_Telescope.jpg"><img alt="" class="thumbimage" data-dcnode-id="2936" data-file-height="1536" data-file-width="2048" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/18/Irving_Porter_Church_Telescope.jpg/220px-Irving_Porter_Church_Telescope.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/18/Irving_Porter_Church_Telescope.jpg/330px-Irving_Porter_Church_Telescope.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/18/Irving_Porter_Church_Telescope.jpg/440px-Irving_Porter_Church_Telescope.jpg 2x" width="220"></a><span data-dcnode-id="2934" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2930"><div class="magnify" data-dcnode-id="2932"><a class="internal" data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIrving_Porter_Church_Telescope.jpg" title="Enlarge"></a></div><span data-dcnode-id="2931" instrument_node="">This 12 inch refractor is mounted in dome and a mount the rotates with the turn of the Earth</span></div></div></div><span data-dcnode-id="2927" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2926" instrument_node="">The next major step in the evolution of refracting telescopes was the invention of the </span><b data-dcnode-id="2923"><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="2925" instrument_node="">achromatic lens</span></a></b><span data-dcnode-id="2922" instrument_node="">, a lens with multiple elements that helped solve problems with chromatic aberration and allowed shorter focal lengths. It was invented in 1733 by an English barrister named </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chester_Moore_Hall" title="Chester Moore Hall"><span data-dcnode-id="2921" instrument_node="">Chester Moore Hall</span></a><span data-dcnode-id="2919" instrument_node="">, although it was independently invented and patented by </span><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dollond" title="John Dollond"><span data-dcnode-id="2918" instrument_node="">John Dollond</span></a><span data-dcnode-id="2916" instrument_node=""> around 1758. The design overcame the need for very long focal lengths in refracting telescopes by using an objective made of two pieces of </span><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glass" title="Glass"><span data-dcnode-id="2915" instrument_node="">glass</span></a><span data-dcnode-id="2913" instrument_node=""> with different </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dispersion_%28optics%29" title="Dispersion (optics)"><span data-dcnode-id="2912" instrument_node="">dispersion</span></a><span data-dcnode-id="2910" instrument_node="">, '</span><a data-dcnode-id="2908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crown_glass_%28optics%29" title="Crown glass (optics)"><span data-dcnode-id="2909" instrument_node="">crown</span></a><span data-dcnode-id="2907" instrument_node="">' and '</span><a data-dcnode-id="2905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flint_glass" title="Flint glass"><span data-dcnode-id="2906" instrument_node="">flint glass</span></a><span data-dcnode-id="2904" instrument_node="">', to reduce </span><a data-dcnode-id="2902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="2903" instrument_node="">chromatic</span></a><span data-dcnode-id="2901" instrument_node=""> and </span><a data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="2900" instrument_node="">spherical aberration</span></a><span data-dcnode-id="2898" instrument_node="">. Each side of each piece is ground and </span><a data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polishing" title="Polishing"><span data-dcnode-id="2897" instrument_node="">polished</span></a><span data-dcnode-id="2895" instrument_node="">, and then the two pieces are assembled together. Achromatic lenses are corrected to bring two </span><a data-dcnode-id="2893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wavelength" title="Wavelength"><span data-dcnode-id="2894" instrument_node="">wavelengths</span></a><span data-dcnode-id="2892" instrument_node=""> (typically red and blue) into focus in the same plane.
</span></p><p data-dcnode-id="2885"><span data-dcnode-id="2890" instrument_node="">Chester More Hall is noted as having made the first twin color corrected lens in 1730.</span><sup class="reference" data-dcnode-id="2887" id="cite_ref-15"><a data-dcnode-id="2888" href="#cite_note-15"><span data-dcnode-id="2889" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2886" instrument_node="">
</span></p><p data-dcnode-id="2868"><span data-dcnode-id="2884" instrument_node="">Dollond achromats were quite popular in the 18th century.</span><sup class="reference" data-dcnode-id="2881" id="cite_ref-16"><a data-dcnode-id="2882" href="#cite_note-16"><span data-dcnode-id="2883" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="2878" id="cite_ref-:4_17-0"><a data-dcnode-id="2879" href="#cite_note-:4-17"><span data-dcnode-id="2880" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2877" instrument_node=""> A major appeal was they could be made shorter.</span><sup class="reference" data-dcnode-id="2874" id="cite_ref-:4_17-1"><a data-dcnode-id="2875" href="#cite_note-:4-17"><span data-dcnode-id="2876" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2873" instrument_node=""> However, problems with glass making meant that the glass objectives were not made more than about four inches in diameter.</span><sup class="reference" data-dcnode-id="2870" id="cite_ref-:4_17-2"><a data-dcnode-id="2871" href="#cite_note-:4-17"><span data-dcnode-id="2872" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2869" instrument_node="">
</span></p><p data-dcnode-id="2848"><span data-dcnode-id="2867" instrument_node="">In the late 19th century, the Swiss optician Pierre-Louis Guinand</span><sup class="reference" data-dcnode-id="2864" id="cite_ref-18"><a data-dcnode-id="2865" href="#cite_note-18"><span data-dcnode-id="2866" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2863" instrument_node=""> developed a way to make higher quality glass blanks of greater than four inches.</span><sup class="reference" data-dcnode-id="2860" id="cite_ref-:4_17-3"><a data-dcnode-id="2861" href="#cite_note-:4-17"><span data-dcnode-id="2862" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="2857" id="cite_ref-19"><a data-dcnode-id="2858" href="#cite_note-19"><span data-dcnode-id="2859" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2856" instrument_node=""> He passed this technology to his apprentice </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_von_Fraunhofer" title="Joseph von Fraunhofer"><span data-dcnode-id="2855" instrument_node="">Joseph von Fraunhofer</span></a><span data-dcnode-id="2853" instrument_node="">, who further developed this technology and also developed the Fraunhofer doublet lens design.</span><sup class="reference" data-dcnode-id="2850" id="cite_ref-:4_17-4"><a data-dcnode-id="2851" href="#cite_note-:4-17"><span data-dcnode-id="2852" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2849" instrument_node=""> The breakthrough in glass making techniques led to the great refractors of the 19th century, that became progressively larger through the decade, eventually reaching over 1 meter by the end of that century before being superseded by silvered-glass reflecting telescopes in astronomy.
</span></p><p data-dcnode-id="2842"><span data-dcnode-id="2847" instrument_node="">Noted lens makers of the 19th century include:</span><sup class="reference" data-dcnode-id="2844" id="cite_ref-20"><a data-dcnode-id="2845" href="#cite_note-20"><span data-dcnode-id="2846" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2843" instrument_node="">
</span></p><span data-dcnode-id="2841" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2832"><div class="thumbinner" data-dcnode-id="2833" style="width:222px;"><a class="image" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_28-inch_Telescope.jpg"><img alt="" class="thumbimage" data-dcnode-id="2840" data-file-height="1418" data-file-width="724" decoding="async" height="431" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/The_28-inch_Telescope.jpg/220px-The_28-inch_Telescope.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/The_28-inch_Telescope.jpg/330px-The_28-inch_Telescope.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/The_28-inch_Telescope.jpg/440px-The_28-inch_Telescope.jpg 2x" width="220"></a><span data-dcnode-id="2838" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2834"><div class="magnify" data-dcnode-id="2836"><a class="internal" data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AThe_28-inch_Telescope.jpg" title="Enlarge"></a></div><span data-dcnode-id="2835" instrument_node="">The Greenwich 28-inch refractor is a popular tourist attraction in 21st century London</span></div></div></div><span data-dcnode-id="2831" instrument_node="">
</span><ul data-dcnode-id="2780"><li data-dcnode-id="2828"><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alvan_Clark_%2526_Sons" title="Alvan Clark &amp; Sons"><span data-dcnode-id="2830" instrument_node="">Alvan Clark</span></a></li><span data-dcnode-id="2827" instrument_node="">
</span><li data-dcnode-id="2822"><span data-dcnode-id="2826" instrument_node="">Brashear</span><sup class="reference" data-dcnode-id="2823" id="cite_ref-21"><a data-dcnode-id="2824" href="#cite_note-21"><span data-dcnode-id="2825" instrument_node="">[21]</span></a></sup></li><span data-dcnode-id="2821" instrument_node="">
</span><li data-dcnode-id="2818"><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chance_Brothers" title="Chance Brothers"><span data-dcnode-id="2820" instrument_node="">Chance Brothers</span></a></li><span data-dcnode-id="2817" instrument_node="">
</span><li data-dcnode-id="2811"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert-Agla%25C3%25A9_Cauchoix" title="Robert-Aglaé Cauchoix"><span data-dcnode-id="2816" instrument_node="">Cauchoix</span></a><sup class="reference" data-dcnode-id="2812" id="cite_ref-22"><a data-dcnode-id="2813" href="#cite_note-22"><span data-dcnode-id="2814" instrument_node="">[22]</span></a></sup></li><span data-dcnode-id="2810" instrument_node="">
</span><li data-dcnode-id="2804"><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_von_Fraunhofer" title="Joseph von Fraunhofer"><span data-dcnode-id="2809" instrument_node="">Fraunhofer</span></a><sup class="reference" data-dcnode-id="2805" id="cite_ref-23"><a data-dcnode-id="2806" href="#cite_note-23"><span data-dcnode-id="2807" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="2803" instrument_node="">
</span><li data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Gautier</span></li><span data-dcnode-id="2800" instrument_node="">
</span><li data-dcnode-id="2797"><a data-dcnode-id="2798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grubb_Parsons" title="Grubb Parsons"><span data-dcnode-id="2799" instrument_node="">Grubb</span></a></li><span data-dcnode-id="2796" instrument_node="">
</span><li data-dcnode-id="2793"><a data-dcnode-id="2794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Henry_and_Prosper_Henry" title="Paul Henry and Prosper Henry"><span data-dcnode-id="2795" instrument_node="">Henry Brothers</span></a></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2791" instrument_node="">Lerebours</span><sup class="reference" data-dcnode-id="2788" id="cite_ref-:42_24-0"><a data-dcnode-id="2789" href="#cite_note-:42-24"><span data-dcnode-id="2790" instrument_node="">[24]</span></a></sup></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2781"><span data-dcnode-id="2785" instrument_node="">Tulley</span><sup class="reference" data-dcnode-id="2782" id="cite_ref-25"><a data-dcnode-id="2783" href="#cite_note-25"><span data-dcnode-id="2784" instrument_node="">[25]</span></a></sup></li></ul><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2778" instrument_node="">Some famous 19th century doublet refractors are the </span><a data-dcnode-id="2776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Lick_telescope" title="James Lick telescope"><span data-dcnode-id="2777" instrument_node="">James Lick telescope</span></a><span data-dcnode-id="2775" instrument_node=""> (91&nbsp;cm/36 in) and the </span><a data-dcnode-id="2773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenwich_28_inch_refractor" title="Greenwich 28 inch refractor"><span data-dcnode-id="2774" instrument_node="">Greenwich 28 inch refractor</span></a><span data-dcnode-id="2772" instrument_node=""> (71&nbsp;cm). An example of an older refractor is the </span><a data-dcnode-id="2770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shuckburgh_telescope" title="Shuckburgh telescope"><span data-dcnode-id="2771" instrument_node="">Shuckburgh telescope</span></a><span data-dcnode-id="2769" instrument_node=""> (dating to the late 1700s). A famous refractor was the "Trophy Telescope", presented at the 1851 </span><a data-dcnode-id="2767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Exhibition" title="Great Exhibition"><span data-dcnode-id="2768" instrument_node="">Great Exhibition</span></a><span data-dcnode-id="2766" instrument_node=""> in London. The era of the '</span><a data-dcnode-id="2764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_refractor" title="Great refractor"><span data-dcnode-id="2765" instrument_node="">great refractors</span></a><span data-dcnode-id="2763" instrument_node="">' in the 19th century saw large achromatic lenses, culminating with the largest achromatic refractor ever built, the </span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Paris_Exhibition_Telescope_of_1900" title="Great Paris Exhibition Telescope of 1900"><span data-dcnode-id="2762" instrument_node="">Great Paris Exhibition Telescope of 1900</span></a><span data-dcnode-id="2760" instrument_node="">.
</span></p><p data-dcnode-id="2743"><span data-dcnode-id="2758" instrument_node="">In the </span><a data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Observatory%2C_Greenwich" title="Royal Observatory, Greenwich"><span data-dcnode-id="2757" instrument_node="">Royal Observatory, Greenwich</span></a><span data-dcnode-id="2755" instrument_node=""> an 1838 instrument named the </span><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sheepshanks_equatorial" title="Sheepshanks equatorial"><span data-dcnode-id="2754" instrument_node="">Sheepshanks telescope</span></a><span data-dcnode-id="2752" instrument_node=""> includes an objective by Cauchoix.</span><sup class="reference" data-dcnode-id="2749" id="cite_ref-26"><a data-dcnode-id="2750" href="#cite_note-26"><span data-dcnode-id="2751" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2748" instrument_node=""> The Sheepshanks had a 6.7 inches (17&nbsp;cm) wide lens, and was the biggest telescope at Greenwich for about twenty years.</span><sup class="reference" data-dcnode-id="2745" id="cite_ref-27"><a data-dcnode-id="2746" href="#cite_note-27"><span data-dcnode-id="2747" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2744" instrument_node="">
</span></p><p data-dcnode-id="2736"><span data-dcnode-id="2742" instrument_node="">
An 1840 report from the Observatory noted of the then-new Sheepshanks telescope with the Cauchoix doublet:</span><sup class="reference" data-dcnode-id="2739" id="cite_ref-:32_28-0"><a data-dcnode-id="2740" href="#cite_note-:32-28"><span data-dcnode-id="2741" instrument_node="">[28]</span></a></sup></p><blockquote class="templatequote" data-dcnode-id="2733"><p data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">The power and general goodness of this telescope make it a most welcome addition to the instruments of the observatory</span></p></blockquote><p data-dcnode-id="2720"><span data-dcnode-id="2732" instrument_node="">In the 1900s a noted optics maker was Zeiss.</span><sup class="reference" data-dcnode-id="2729" id="cite_ref-:2_29-0"><a data-dcnode-id="2730" href="#cite_note-:2-29"><span data-dcnode-id="2731" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2728" instrument_node=""> An example of prime achievements of refractors, over 7 million people have been able to view through the 12-inch Zeiss refractor at </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Griffith_Observatory" title="Griffith Observatory"><span data-dcnode-id="2727" instrument_node="">Griffith Observatory</span></a><span data-dcnode-id="2725" instrument_node=""> since its opening in 1935; this is the most people to have viewed through any telescope.</span><sup class="reference" data-dcnode-id="2722" id="cite_ref-:2_29-1"><a data-dcnode-id="2723" href="#cite_note-:2-29"><span data-dcnode-id="2724" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2721" instrument_node="">
</span></p><p data-dcnode-id="2712"><span data-dcnode-id="2719" instrument_node="">Achromats were popular in astronomy for making star catalogs, and they required less maintenance than metal mirrors. Some famous discoveries using achromats are the planet </span><a data-dcnode-id="2717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neptune" title="Neptune"><span data-dcnode-id="2718" instrument_node="">Neptune</span></a><span data-dcnode-id="2716" instrument_node=""> and the </span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moons_of_Mars" title="Moons of Mars"><span data-dcnode-id="2715" instrument_node="">Moons of Mars</span></a><span data-dcnode-id="2713" instrument_node="">.
</span></p><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">The long achromats, despite having smaller aperture than the larger reflectors, were often favoured for "prestige" observatories. In the late 18th century, every few years, a larger and longer refractor would debut.
</span></p><p data-dcnode-id="2704"><span data-dcnode-id="2709" instrument_node="">For example, the Nice Observatory debuted with 77-centimetre (30.31&nbsp;in) refractor, the largest at the time, but was surpassed within only a couple of years.</span><sup class="reference" data-dcnode-id="2706" id="cite_ref-list1914_30-0"><a data-dcnode-id="2707" href="#cite_note-list1914-30"><span data-dcnode-id="2708" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2705" instrument_node="">
</span></p><span data-dcnode-id="2703" instrument_node="">
</span><div data-dcnode-id="2702" style="clear:both;"></div><span data-dcnode-id="2701" instrument_node="">
</span><h3 data-dcnode-id="2691"><span class="mw-headline" data-dcnode-id="2699" id="Apochromatic_refractors"><span data-dcnode-id="2700" instrument_node="">Apochromatic refractors</span></span><span class="mw-editsection" data-dcnode-id="2692"><span class="mw-editsection-bracket" data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">[</span></span><a data-dcnode-id="2695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D6" title="Edit section: Apochromatic refractors"><span data-dcnode-id="2696" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2690" instrument_node="">
</span><link data-dcnode-id="2689" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2685" role="note"><span data-dcnode-id="2688" instrument_node="">Main article: </span><a data-dcnode-id="2686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apochromat" title="Apochromat"><span data-dcnode-id="2687" instrument_node="">Apochromat</span></a></div><span data-dcnode-id="2684" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2675"><div class="thumbinner" data-dcnode-id="2676" style="width:222px;"><a class="image" data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AApochromat.svg"><img alt="Apochromat lens.svg" class="thumbimage" data-dcnode-id="2683" data-file-height="213" data-file-width="599" decoding="async" height="78" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/91/Apochromat.svg/220px-Apochromat.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/91/Apochromat.svg/330px-Apochromat.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/91/Apochromat.svg/440px-Apochromat.svg.png 2x" width="220"></a><span data-dcnode-id="2681" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2677"><div class="magnify" data-dcnode-id="2679"><a class="internal" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AApochromat.svg" title="Enlarge"></a></div><span data-dcnode-id="2678" instrument_node="">The Apochromatic lens usually comprises three elements that bring light of three different frequencies to a common focus</span></div></div></div><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2655"><b data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">Apochromatic refractors</span></b><span data-dcnode-id="2671" instrument_node=""> have objectives built with special, extra-low dispersion materials. They are designed to bring three wavelengths (typically red, green, and blue) into focus in the same plane. The residual color error (tertiary spectrum) can be down to an order of magnitude less than that of an achromatic lens.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2664" style="white-space:nowrap;"><span data-dcnode-id="2670" instrument_node="">[</span><i data-dcnode-id="2666"><a data-dcnode-id="2667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2668" title="This claim needs references to reliable sources. (November 2011)"><span data-dcnode-id="2669" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2665" instrument_node="">]</span></sup><span data-dcnode-id="2663" instrument_node=""> Such telescopes contain elements of </span><a data-dcnode-id="2661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fluorite" title="Fluorite"><span data-dcnode-id="2662" instrument_node="">fluorite</span></a><span data-dcnode-id="2660" instrument_node=""> or special, extra-low dispersion (ED) glass in the objective and produce a very crisp image that is virtually free of chromatic aberration.</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-31"><a data-dcnode-id="2658" href="#cite_note-31"><span data-dcnode-id="2659" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2656" instrument_node=""> Due to the special materials needed in the fabrication, apochromatic refractors are usually more expensive than telescopes of other types with a comparable aperture.
</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2654" instrument_node="">In the 18th century, Dollond, a popular maker of doublet telescopes, also made a triplet, although they were not really as popular as the two element telescopes.</span><sup class="reference" data-dcnode-id="2651" id="cite_ref-:4_17-5"><a data-dcnode-id="2652" href="#cite_note-:4-17"><span data-dcnode-id="2653" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2650" instrument_node="">
</span></p><p data-dcnode-id="2611"><span data-dcnode-id="2648" instrument_node="">One of the famous triplet objectives is the </span><a data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cooke_triplet" title="Cooke triplet"><span data-dcnode-id="2647" instrument_node="">Cooke triplet</span></a><span data-dcnode-id="2645" instrument_node="">, noted for being able to correct the Seidal aberrations.</span><sup class="reference" data-dcnode-id="2642" id="cite_ref-32"><a data-dcnode-id="2643" href="#cite_note-32"><span data-dcnode-id="2644" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2641" instrument_node=""> It is recognized as one of the most important </span><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="2640" instrument_node="">objective</span></a><span data-dcnode-id="2638" instrument_node=""> designs in the field of photography.</span><sup class="reference" data-dcnode-id="2635" id="cite_ref-33"><a data-dcnode-id="2636" href="#cite_note-33"><span data-dcnode-id="2637" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="2632" id="cite_ref-:1_34-0"><a data-dcnode-id="2633" href="#cite_note-:1-34"><span data-dcnode-id="2634" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2631" instrument_node=""> The Cooke triplet can correct, with only three elements, for one wavelength, </span><a data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="2630" instrument_node="">spherical aberration</span></a><span data-dcnode-id="2628" instrument_node="">, </span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coma_%28optics%29" title="Coma (optics)"><span data-dcnode-id="2627" instrument_node="">coma</span></a><span data-dcnode-id="2625" instrument_node="">, </span><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astigmatism_%28optical_systems%29" title="Astigmatism (optical systems)"><span data-dcnode-id="2624" instrument_node="">astigmatism</span></a><span data-dcnode-id="2622" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Field_curvature" title="Field curvature"><span data-dcnode-id="2621" instrument_node="">field curvature</span></a><span data-dcnode-id="2619" instrument_node="">, and </span><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distortion_%28optics%29" title="Distortion (optics)"><span data-dcnode-id="2618" instrument_node="">distortion</span></a><span data-dcnode-id="2616" instrument_node="">.</span><sup class="reference" data-dcnode-id="2613" id="cite_ref-:1_34-1"><a data-dcnode-id="2614" href="#cite_note-:1-34"><span data-dcnode-id="2615" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2612" instrument_node="">
</span></p><span data-dcnode-id="2610" instrument_node="">
</span><h2 data-dcnode-id="2600"><span class="mw-headline" data-dcnode-id="2608" id="Technical_considerations"><span data-dcnode-id="2609" instrument_node="">Technical considerations</span></span><span class="mw-editsection" data-dcnode-id="2601"><span class="mw-editsection-bracket" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">[</span></span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DRefracting_telescope%26action%3Dedit%26section%3D7" title="Edit section: Technical considerations"><span data-dcnode-id="2605" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2599" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2587"><div class="thumbinner" data-dcnode-id="2588" style="width:222px;"><a class="image" data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYerkes_Observatory_Astro4p7.jpg"><img alt="" class="thumbimage" data-dcnode-id="2598" data-file-height="1248" data-file-width="2021" decoding="async" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Yerkes_Observatory_Astro4p7.jpg/220px-Yerkes_Observatory_Astro4p7.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Yerkes_Observatory_Astro4p7.jpg/330px-Yerkes_Observatory_Astro4p7.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Yerkes_Observatory_Astro4p7.jpg/440px-Yerkes_Observatory_Astro4p7.jpg 2x" width="220"></a><span data-dcnode-id="2596" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2589"><div class="magnify" data-dcnode-id="2594"><a class="internal" data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYerkes_Observatory_Astro4p7.jpg" title="Enlarge"></a></div><span data-dcnode-id="2593" instrument_node="">The 102 centimetres (40&nbsp;in) refractor, at </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yerkes_Observatory" title="Yerkes Observatory"><span data-dcnode-id="2592" instrument_node="">Yerkes Observatory</span></a><span data-dcnode-id="2590" instrument_node="">, the largest achromatic refractor ever put into astronomical use (photo taken on 6 May 1921, as Einstein was visiting)</span></div></div></div><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2567"><span data-dcnode-id="2585" instrument_node="">Refractors suffer from residual </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="2584" instrument_node="">chromatic</span></a><span data-dcnode-id="2582" instrument_node=""> and </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="2581" instrument_node="">spherical aberration</span></a><span data-dcnode-id="2579" instrument_node="">. This affects shorter </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-number%23Focal_ratio" title="F-number"><span data-dcnode-id="2578" instrument_node="">focal ratios</span></a><span data-dcnode-id="2576" instrument_node=""> more than longer ones. A 100&nbsp;mm (4&nbsp;in) </span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-number" title="F-number"><span data-dcnode-id="2574" style="font-style:italic;font-family:Trebuchet MS,Candara,Georgia,Calibri,Corbel,serif"><span data-dcnode-id="2575" instrument_node="">f</span></span><span data-dcnode-id="2573" instrument_node="">/6</span></a><span data-dcnode-id="2571" instrument_node=""> achromatic refractor is likely to show considerable color fringing (generally a purple halo around bright objects). A 100&nbsp;mm (4&nbsp;in) </span><span data-dcnode-id="2569" style="font-style:italic;font-family:Trebuchet MS,Candara,Georgia,Calibri,Corbel,serif"><span data-dcnode-id="2570" instrument_node="">f</span></span><span data-dcnode-id="2568" instrument_node="">/16 has little color fringing.
</span></p><p data-dcnode-id="2552"><span data-dcnode-id="2566" instrument_node="">In very large apertures, there is also a problem of </span><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_sag" title="Lens sag"><span data-dcnode-id="2565" instrument_node="">lens sagging</span></a><span data-dcnode-id="2563" instrument_node="">, a result of </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravity" title="Gravity"><span data-dcnode-id="2562" instrument_node="">gravity</span></a><span data-dcnode-id="2560" instrument_node=""> deforming </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glass" title="Glass"><span data-dcnode-id="2559" instrument_node="">glass</span></a><span data-dcnode-id="2557" instrument_node="">. Since a lens can only be held in place by its edge, the center of a large lens sags due to gravity, distorting the images it produces. The largest practical lens size in a refracting telescope is around 1 meter (39&nbsp;in).</span><sup class="reference" data-dcnode-id="2554" id="cite_ref-35"><a data-dcnode-id="2555" href="#cite_note-35"><span data-dcnode-id="2556" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2553" instrument_node="">
