" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/BTA-6" title="BTA-6"><span data-dcnode-id="3348" instrument_node="">BTA-6</span></a><span data-dcnode-id="3346" instrument_node=""> in Russia twenty-seven years later. The Hale reflector introduced several technical innovations used in future telescopes, including </span><a class="mw-redirect" data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hydrostatic_bearings" title="Hydrostatic bearings"><span data-dcnode-id="3345" instrument_node="">hydrostatic bearings</span></a><span data-dcnode-id="3343" instrument_node=""> for very low friction, the </span><a data-dcnode-id="3341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serrurier_truss" title="Serrurier truss"><span data-dcnode-id="3342" instrument_node="">Serrurier truss</span></a><span data-dcnode-id="3340" instrument_node=""> for equal deflections of the two mirrors as the tube sags under gravity, and the use of </span><a data-dcnode-id="3338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pyrex" title="Pyrex"><span data-dcnode-id="3339" instrument_node="">Pyrex</span></a><span data-dcnode-id="3337" instrument_node=""> low-expansion glass for the mirrors. The arrival of substantially larger telescopes had to await the introduction of methods other than the rigidity of glass to maintain the proper shape of the mirror.
</span></p><span data-dcnode-id="3335" instrument_node="">
</span><h4 data-dcnode-id="3332"><span class="mw-headline" data-dcnode-id="3333" id="Active_and_adaptive_optics"><span data-dcnode-id="3334" instrument_node="">Active and adaptive optics</span></span></h4><span data-dcnode-id="3331" instrument_node="">
</span><link data-dcnode-id="3330" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3323" role="note"><span data-dcnode-id="3329" instrument_node="">See also: </span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="3328" instrument_node="">Adaptive optics</span></a><span data-dcnode-id="3326" instrument_node=""> and </span><a data-dcnode-id="3324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_largest_optical_reflecting_telescopes" title="List of largest optical reflecting telescopes"><span data-dcnode-id="3325" instrument_node="">List of largest optical reflecting telescopes</span></a></div><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3321" instrument_node="">The 1980s saw the introduction of two new technologies for building larger telescopes and improving image quality,
known as </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_optics" title="Active optics"><span data-dcnode-id="3320" instrument_node="">active optics</span></a><span data-dcnode-id="3318" instrument_node=""> and </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="3317" instrument_node="">adaptive optics</span></a><span data-dcnode-id="3315" instrument_node="">. In active optics, an image analyser senses the aberrations of a star image
a few times per minute, and a computer adjusts many support forces on the primary mirror and the location of the secondary mirror
to maintain the optics in optimal shape and alignment. This is too slow to correct for atmospheric blurring effects, but enables the use of thin single mirrors up to 8&nbsp;m diameter, or even larger segmented mirrors. This method was pioneered by the ESO </span><a data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Technology_Telescope" title="New Technology Telescope"><span data-dcnode-id="3314" instrument_node="">New Technology Telescope</span></a><span data-dcnode-id="3312" instrument_node=""> in the late 1980s.
</span></p><p data-dcnode-id="3297"><span data-dcnode-id="3310" instrument_node="">The 1990s saw a new generation of giant telescopes appear using active optics, beginning with the construction of the first of the two 10&nbsp;m (390&nbsp;in) </span><a class="mw-redirect" data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keck_telescope" title="Keck telescope"><span data-dcnode-id="3309" instrument_node="">Keck telescopes</span></a><span data-dcnode-id="3307" instrument_node=""> in 1993. Other giant telescopes built since then include: the two </span><a class="mw-redirect" data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gemini_telescope" title="Gemini telescope"><span data-dcnode-id="3306" instrument_node="">Gemini telescopes</span></a><span data-dcnode-id="3304" instrument_node="">, the four separate telescopes of the </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Large_Telescope" title="Very Large Telescope"><span data-dcnode-id="3303" instrument_node="">Very Large Telescope</span></a><span data-dcnode-id="3301" instrument_node="">, and the </span><a data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Binocular_Telescope" title="Large Binocular Telescope"><span data-dcnode-id="3300" instrument_node="">Large Binocular Telescope</span></a><span data-dcnode-id="3298" instrument_node="">.
</span></p><span data-dcnode-id="3296" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3279"><div class="thumbinner" data-dcnode-id="3280" style="width:222px;"><a class="image" data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AESO_Very_Large_Telescope.jpg"><img alt="" class="thumbimage" data-dcnode-id="3295" data-file-height="2832" data-file-width="4256" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/ESO_Very_Large_Telescope.jpg/220px-ESO_Very_Large_Telescope.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/ESO_Very_Large_Telescope.jpg/330px-ESO_Very_Large_Telescope.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b8/ESO_Very_Large_Telescope.jpg/440px-ESO_Very_Large_Telescope.jpg 2x" width="220"></a><span data-dcnode-id="3293" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3281"><div class="magnify" data-dcnode-id="3291"><a class="internal" data-dcnode-id="3292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AESO_Very_Large_Telescope.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ESO" title="ESO"><span data-dcnode-id="3290" instrument_node="">ESO</span></a><span data-dcnode-id="3288" instrument_node="">'s </span><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Large_Telescope" title="Very Large Telescope"><span data-dcnode-id="3287" instrument_node="">VLT</span></a><span data-dcnode-id="3285" instrument_node=""> boasts advanced </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adaptive_optics" title="Adaptive optics"><span data-dcnode-id="3284" instrument_node="">adaptive optics</span></a><span data-dcnode-id="3282" instrument_node=""> systems, which counteract the blurring effects of the Earth's atmosphere.</span></div></div></div><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3277" instrument_node="">Adaptive optics uses a similar principle, but applying corrections several hundred times per second to
compensate the effects of rapidly changing optical distortion due to the motion of turbulence in the Earth's atmosphere. Adaptive optics works by measuring the distortions in a wavefront and then compensating for them by rapid changes of </span><a data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Actuator" title="Actuator"><span data-dcnode-id="3276" instrument_node="">actuators</span></a><span data-dcnode-id="3274" instrument_node=""> applied to a small deformable mirror or with a </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liquid_crystal" title="Liquid crystal"><span data-dcnode-id="3273" instrument_node="">liquid crystal</span></a><span data-dcnode-id="3271" instrument_node=""> array filter. AO was first envisioned by </span><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Horace_W._Babcock" title="Horace W. Babcock"><span data-dcnode-id="3270" instrument_node="">Horace W. Babcock</span></a><span data-dcnode-id="3268" instrument_node=""> in 1953, but did not come into common usage in astronomical telescopes until advances in computer and detector technology during the 1990s made it possible to calculate the compensation needed in </span><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real-time_computing" title="Real-time computing"><span data-dcnode-id="3267" instrument_node="">real time</span></a><span data-dcnode-id="3265" instrument_node="">.</span><sup class="reference" data-dcnode-id="3262" id="cite_ref-71"><a data-dcnode-id="3263" href="#cite_note-71"><span data-dcnode-id="3264" instrument_node="">[71]</span></a></sup><span data-dcnode-id="3261" instrument_node=""> In adaptive optics, the high-speed corrections needed mean that a fairly bright star is needed very close to the target of interest (or an artificial star is created by a laser). Also, with a single star or laser the corrections are only effective over a very narrow field (tens of arcsec), and current systems operating on several 8-10m telescopes work mainly in near-infrared wavelengths for single-object observations.
</span></p><p data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">Developments of adaptive optics include systems with multiple lasers over a wider corrected field, and/or working above kiloHertz rates for good correction at visible wavelengths; these are currently in progress but not yet in routine operation as of 2015.
</span></p><span data-dcnode-id="3257" instrument_node="">
</span><h2 data-dcnode-id="3254"><span class="mw-headline" data-dcnode-id="3255" id="Other_wavelengths"><span data-dcnode-id="3256" instrument_node="">Other wavelengths</span></span></h2><span data-dcnode-id="3253" instrument_node="">
</span><p data-dcnode-id="3239"><span data-dcnode-id="3252" instrument_node="">The twentieth century saw the construction of telescopes which could produce images using wavelengths other than </span><a class="mw-redirect" data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visible_light" title="Visible light"><span data-dcnode-id="3251" instrument_node="">visible light</span></a><span data-dcnode-id="3249" instrument_node=""> starting in 1931 when </span><a class="mw-redirect" data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Jansky" title="Karl Jansky"><span data-dcnode-id="3248" instrument_node="">Karl Jansky</span></a><span data-dcnode-id="3246" instrument_node=""> discovered astronomical objects gave off radio emissions; this prompted a new era of observational astronomy after World War II, with telescopes being developed for other parts of the </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetic_spectrum" title="Electromagnetic spectrum"><span data-dcnode-id="3245" instrument_node="">electromagnetic spectrum</span></a><span data-dcnode-id="3243" instrument_node=""> from radio to </span><a class="mw-redirect" data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma-rays" title="Gamma-rays"><span data-dcnode-id="3242" instrument_node="">gamma-rays</span></a><span data-dcnode-id="3240" instrument_node="">.
</span></p><span data-dcnode-id="3238" instrument_node="">
</span><h3 data-dcnode-id="3235"><span class="mw-headline" data-dcnode-id="3236" id="Radio_telescopes"><span data-dcnode-id="3237" instrument_node="">Radio telescopes</span></span></h3><span data-dcnode-id="3234" instrument_node="">
</span><link data-dcnode-id="3233" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3226" role="note"><span data-dcnode-id="3232" instrument_node="">See also: </span><a data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_telescope" title="Radio telescope"><span data-dcnode-id="3231" instrument_node="">Radio telescope</span></a><span data-dcnode-id="3229" instrument_node=""> and </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_astronomy" title="Radio astronomy"><span data-dcnode-id="3228" instrument_node="">Radio astronomy</span></a></div><span data-dcnode-id="3225" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3210"><div class="thumbinner" data-dcnode-id="3211" style="width:222px;"><a class="image" data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALovell_Telescope_2.jpg"><img alt="" class="thumbimage" data-dcnode-id="3224" data-file-height="1920" data-file-width="2560" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Lovell_Telescope_2.jpg/220px-Lovell_Telescope_2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Lovell_Telescope_2.jpg/330px-Lovell_Telescope_2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Lovell_Telescope_2.jpg/440px-Lovell_Telescope_2.jpg 2x" width="220"></a><span data-dcnode-id="3222" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3212"><div class="magnify" data-dcnode-id="3220"><a class="internal" data-dcnode-id="3221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALovell_Telescope_2.jpg" title="Enlarge"></a></div><span data-dcnode-id="3219" instrument_node="">The 250-foot (76&nbsp;m) </span><a data-dcnode-id="3217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lovell_Telescope" title="Lovell Telescope"><span data-dcnode-id="3218" instrument_node="">Lovell radio telescope</span></a><span data-dcnode-id="3216" instrument_node=""> at </span><a class="mw-redirect" data-dcnode-id="3214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jodrell_Bank" title="Jodrell Bank"><span data-dcnode-id="3215" instrument_node="">Jodrell Bank</span></a><span data-dcnode-id="3213" instrument_node=""> Observatory.</span></div></div></div><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3180"><span data-dcnode-id="3208" instrument_node="">Radio astronomy began in 1931 when </span><a class="mw-redirect" data-dcnode-id="3206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Jansky" title="Karl Jansky"><span data-dcnode-id="3207" instrument_node="">Karl Jansky</span></a><span data-dcnode-id="3205" instrument_node=""> discovered that the </span><a data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milky_Way" title="Milky Way"><span data-dcnode-id="3204" instrument_node="">Milky Way</span></a><span data-dcnode-id="3202" instrument_node=""> was a source of radio emission while doing research on terrestrial static with a direction antenna. Building on Jansky's work, </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grote_Reber" title="Grote Reber"><span data-dcnode-id="3201" instrument_node="">Grote Reber</span></a><span data-dcnode-id="3199" instrument_node=""> built a more sophisticated purpose-built radio telescope in 1937, with a 31.4-foot (9.6&nbsp;m) dish; using this, he discovered various unexplained radio sources in the sky. Interest in radio astronomy grew after the Second World War when much larger dishes were built including: the 250-foot (76&nbsp;m) </span><a class="mw-redirect" data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jodrell_bank" title="Jodrell bank"><span data-dcnode-id="3198" instrument_node="">Jodrell bank</span></a><span data-dcnode-id="3196" instrument_node=""> telescope (1957), the 300-foot (91&nbsp;m) </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Bank_Telescope" title="Green Bank Telescope"><span data-dcnode-id="3195" instrument_node="">Green Bank Telescope</span></a><span data-dcnode-id="3193" instrument_node=""> (1962), and the 100-metre (330&nbsp;ft) </span><a class="mw-redirect" data-dcnode-id="3191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Effelsberg" title="Effelsberg"><span data-dcnode-id="3192" instrument_node="">Effelsberg</span></a><span data-dcnode-id="3190" instrument_node=""> telescope (1971). The huge 1,000-foot (300&nbsp;m) </span><a class="mw-redirect" data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arecibo_telescope" title="Arecibo telescope"><span data-dcnode-id="3189" instrument_node="">Arecibo telescope</span></a><span data-dcnode-id="3187" instrument_node=""> (1963) was so large that it was fixed into a natural depression in the ground; the central antenna could be steered to allow the telescope to study objects up to twenty degrees from the </span><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zenith" title="Zenith"><span data-dcnode-id="3186" instrument_node="">zenith</span></a><span data-dcnode-id="3184" instrument_node="">. However, not every radio telescope is of the dish type. For example, the </span><a data-dcnode-id="3182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mills_Cross_Telescope" title="Mills Cross Telescope"><span data-dcnode-id="3183" instrument_node="">Mills Cross Telescope</span></a><span data-dcnode-id="3181" instrument_node=""> (1954) was an early example of an array which used two perpendicular lines of antennae 1,500 feet (460&nbsp;m) in length to survey the sky.
</span></p><p data-dcnode-id="3166"><span data-dcnode-id="3179" instrument_node="">High-energy radio waves are known as </span><a class="mw-redirect" data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microwaves" title="Microwaves"><span data-dcnode-id="3178" instrument_node="">microwaves</span></a><span data-dcnode-id="3176" instrument_node=""> and this has been an important area of astronomy ever since the discovery of the </span><a class="mw-redirect" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_microwave_background_radiation" title="Cosmic microwave background radiation"><span data-dcnode-id="3175" instrument_node="">cosmic microwave background radiation</span></a><span data-dcnode-id="3173" instrument_node=""> in 1964. Many ground-based </span><a class="mw-redirect" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_telescopes" title="Radio telescopes"><span data-dcnode-id="3172" instrument_node="">radio telescopes</span></a><span data-dcnode-id="3170" instrument_node=""> can study microwaves. Short wavelength microwaves are best studied from space because water vapor (even at high altitudes) strongly weakens the signal. The </span><a data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cosmic_Background_Explorer" title="Cosmic Background Explorer"><span data-dcnode-id="3169" instrument_node="">Cosmic Background Explorer</span></a><span data-dcnode-id="3167" instrument_node=""> (1989) revolutionized the study of the microwave background radiation.
</span></p><p data-dcnode-id="3155"><span data-dcnode-id="3165" instrument_node="">Because radio telescopes have low resolution, they were the first instruments to use </span><a data-dcnode-id="3163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interferometry" title="Interferometry"><span data-dcnode-id="3164" instrument_node="">interferometry</span></a><span data-dcnode-id="3162" instrument_node=""> allowing two or more widely separated instruments to simultaneously observe the same source. </span><a class="mw-redirect" data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_long_baseline_interferometry" title="Very long baseline interferometry"><span data-dcnode-id="3161" instrument_node="">Very long baseline interferometry</span></a><span data-dcnode-id="3159" instrument_node=""> extended the technique over thousands of kilometers and allowed resolutions down to a few </span><a class="mw-redirect" data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arcseconds" title="Arcseconds"><span data-dcnode-id="3158" instrument_node="">milli-arcseconds</span></a><span data-dcnode-id="3156" instrument_node="">.
</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3154" instrument_node="">A telescope like the </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Large_Millimeter_Telescope" title="Large Millimeter Telescope"><span data-dcnode-id="3153" instrument_node="">Large Millimeter Telescope</span></a><span data-dcnode-id="3151" instrument_node=""> (active since 2006) observes from 0.85 to 4&nbsp;mm (850 to 4,000&nbsp;μm), bridging between the far-infrared/</span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Submillimetre_astronomy" title="Submillimetre astronomy"><span data-dcnode-id="3150" instrument_node="">submillimeter telescopes</span></a><span data-dcnode-id="3148" instrument_node=""> and longer wavelength radio telescopes including the microwave band from about 1&nbsp;mm (1,000&nbsp;μm) to 1,000&nbsp;mm (1.0&nbsp;m) in wavelength.
</span></p><span data-dcnode-id="3146" instrument_node="">
</span><h3 data-dcnode-id="3142"><span data-dcnode-id="3145" id="Infrared_telescopes_.28700_nm.2F_0.7_.C2.B5m_.E2.80.93_1000_.C2.B5m.2F1_mm.29"></span><span class="mw-headline" data-dcnode-id="3143" id="Infrared_telescopes_(700_nm/_0.7_µm_–_1000_µm/1_mm)"><span data-dcnode-id="3144" instrument_node="">Infrared telescopes (700 nm/ 0.7 µm – 1000 µm/1 mm)</span></span></h3><span data-dcnode-id="3141" instrument_node="">
</span><link data-dcnode-id="3140" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3130" role="note"><span data-dcnode-id="3139" instrument_node="">See also: </span><a data-dcnode-id="3137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_telescope" title="Infrared telescope"><span data-dcnode-id="3138" instrument_node="">Infrared telescope</span></a><span data-dcnode-id="3136" instrument_node="">, </span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_astronomy" title="Infrared astronomy"><span data-dcnode-id="3135" instrument_node="">Infrared astronomy</span></a><span data-dcnode-id="3133" instrument_node="">, and </span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Far-infrared_astronomy" title="Far-infrared astronomy"><span data-dcnode-id="3132" instrument_node="">Far-infrared astronomy</span></a></div><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3128" instrument_node="">Although most </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared" title="Infrared"><span data-dcnode-id="3127" instrument_node="">infrared</span></a><span data-dcnode-id="3125" instrument_node=""> radiation is absorbed by the atmosphere, infrared astronomy at certain wavelengths can be conducted on high mountains where there is little absorption by atmospheric </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_vapor" title="Water vapor"><span data-dcnode-id="3124" instrument_node="">water vapor</span></a><span data-dcnode-id="3122" instrument_node="">. Ever since suitable detectors became available, most optical telescopes at high-altitudes have been able to image at infrared wavelengths. Some telescopes such as the 3.8-metre (150&nbsp;in) </span><a class="mw-redirect" data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UKIRT" title="UKIRT"><span data-dcnode-id="3121" instrument_node="">UKIRT</span></a><span data-dcnode-id="3119" instrument_node="">, and the 3-metre (120&nbsp;in) </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NASA_Infrared_Telescope_Facility" title="NASA Infrared Telescope Facility"><span data-dcnode-id="3118" instrument_node="">IRTF</span></a><span data-dcnode-id="3116" instrument_node=""> — both on </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mauna_Kea" title="Mauna Kea"><span data-dcnode-id="3115" instrument_node="">Mauna Kea</span></a><span data-dcnode-id="3113" instrument_node=""> — are dedicated infrared telescopes. The launch of the </span><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/IRAS" title="IRAS"><span data-dcnode-id="3112" instrument_node="">IRAS</span></a><span data-dcnode-id="3110" instrument_node=""> satellite in 1983 revolutionized infrared astronomy from space. This reflecting telescope which had a 60-centimetre (24&nbsp;in) mirror, operated for nine months until its supply of coolant (</span><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liquid_helium" title="Liquid helium"><span data-dcnode-id="3109" instrument_node="">liquid helium</span></a><span data-dcnode-id="3107" instrument_node="">) ran out. It surveyed the entire sky detecting 245,000 infrared sources—more than 100 times the number previously known.
</span></p><span data-dcnode-id="3105" instrument_node="">
</span><h3 data-dcnode-id="3101"><span data-dcnode-id="3104" id="Ultra-violet_telescopes_.2810_nm_.E2.80.93_400_nm.29"></span><span class="mw-headline" data-dcnode-id="3102" id="Ultra-violet_telescopes_(10_nm_–_400_nm)"><span data-dcnode-id="3103" instrument_node="">Ultra-violet telescopes (10 nm – 400 nm)</span></span></h3><span data-dcnode-id="3100" instrument_node="">
</span><link data-dcnode-id="3099" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3095" role="note"><span data-dcnode-id="3098" instrument_node="">See also: </span><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraviolet_astronomy" title="Ultraviolet astronomy"><span data-dcnode-id="3097" instrument_node="">Ultraviolet astronomy</span></a></div><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3093" instrument_node="">Although optical telescopes can image the near ultraviolet, the </span><a data-dcnode-id="3091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_layer" title="Ozone layer"><span data-dcnode-id="3092" instrument_node="">ozone layer</span></a><span data-dcnode-id="3090" instrument_node=""> in the </span><a data-dcnode-id="3088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stratosphere" title="Stratosphere"><span data-dcnode-id="3089" instrument_node="">stratosphere</span></a><span data-dcnode-id="3087" instrument_node=""> absorbs </span><a data-dcnode-id="3085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultraviolet" title="Ultraviolet"><span data-dcnode-id="3086" instrument_node="">ultraviolet</span></a><span data-dcnode-id="3084" instrument_node=""> radiation shorter than 300&nbsp;nm so most ultra-violet astronomy is conducted with satellites. Ultraviolet telescopes resemble optical telescopes, but conventional </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aluminium" title="Aluminium"><span data-dcnode-id="3083" instrument_node="">aluminium</span></a><span data-dcnode-id="3081" instrument_node="">-coated mirrors cannot be used and alternative coatings such as </span><a data-dcnode-id="3079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnesium_fluoride" title="Magnesium fluoride"><span data-dcnode-id="3080" instrument_node="">magnesium fluoride</span></a><span data-dcnode-id="3078" instrument_node=""> or </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithium_fluoride" title="Lithium fluoride"><span data-dcnode-id="3077" instrument_node="">lithium fluoride</span></a><span data-dcnode-id="3075" instrument_node=""> are used instead. The </span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orbiting_Solar_Observatory" title="Orbiting Solar Observatory"><span data-dcnode-id="3074" instrument_node="">Orbiting Solar Observatory</span></a><span data-dcnode-id="3072" instrument_node=""> satellite carried out observations in the ultra-violet as early as 1962. The </span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Ultraviolet_Explorer" title="International Ultraviolet Explorer"><span data-dcnode-id="3071" instrument_node="">International Ultraviolet Explorer</span></a><span data-dcnode-id="3069" instrument_node=""> (1978) systematically surveyed the sky for eighteen years, using a 45-centimetre (18&nbsp;in) aperture telescope with two </span><a class="mw-redirect" data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spectroscope" title="Spectroscope"><span data-dcnode-id="3068" instrument_node="">spectroscopes</span></a><span data-dcnode-id="3066" instrument_node="">. Extreme-ultraviolet astronomy (10–100&nbsp;nm) is a discipline in its own right and involves many of the techniques of X-ray astronomy; the </span><a data-dcnode-id="3064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_Ultraviolet_Explorer" title="Extreme Ultraviolet Explorer"><span data-dcnode-id="3065" instrument_node="">Extreme Ultraviolet Explorer</span></a><span data-dcnode-id="3063" instrument_node=""> (1992) was a satellite operating at these wavelengths.
</span></p><span data-dcnode-id="3061" instrument_node="">
</span><h3 data-dcnode-id="3057"><span data-dcnode-id="3060" id="X-ray_telescopes_.280.01_nm_.E2.80.93_10_nm.29"></span><span class="mw-headline" data-dcnode-id="3058" id="X-ray_telescopes_(0.01_nm_–_10_nm)"><span data-dcnode-id="3059" instrument_node="">X-ray telescopes (0.01 nm – 10 nm)</span></span></h3><span data-dcnode-id="3056" instrument_node="">
</span><link data-dcnode-id="3055" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3048" role="note"><span data-dcnode-id="3054" instrument_node="">See also: </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray_telescope" title="X-ray telescope"><span data-dcnode-id="3053" instrument_node="">X-ray telescope</span></a><span data-dcnode-id="3051" instrument_node=""> and </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-ray_astronomy" title="X-ray astronomy"><span data-dcnode-id="3050" instrument_node="">X-ray astronomy</span></a></div><span data-dcnode-id="3047" instrument_node="">
</span><p data-dcnode-id="3007"><a class="mw-redirect" data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-rays" title="X-rays"><span data-dcnode-id="3046" instrument_node="">X-rays</span></a><span data-dcnode-id="3044" instrument_node=""> from space do not reach the Earth's surface so X-ray astronomy has to be conducted above the Earth's atmosphere. The first X-ray experiments were conducted on </span><a class="mw-redirect" data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-orbital" title="Sub-orbital"><span data-dcnode-id="3043" instrument_node="">sub-orbital</span></a><span data-dcnode-id="3041" instrument_node=""> </span><a data-dcnode-id="3039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rocket" title="Rocket"><span data-dcnode-id="3040" instrument_node="">rocket</span></a><span data-dcnode-id="3038" instrument_node=""> flights which enabled the first detection of X-rays from the </span><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="3037" instrument_node="">Sun</span></a><span data-dcnode-id="3035" instrument_node=""> (1948) and the first galactic X-ray sources: </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scorpius_X-1" title="Scorpius X-1"><span data-dcnode-id="3034" instrument_node="">Scorpius X-1</span></a><span data-dcnode-id="3032" instrument_node=""> (June 1962) and the </span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crab_Nebula" title="Crab Nebula"><span data-dcnode-id="3031" instrument_node="">Crab Nebula</span></a><span data-dcnode-id="3029" instrument_node=""> (October 1962). Since then, X-ray telescopes (</span><a data-dcnode-id="3027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wolter_telescope" title="Wolter telescope"><span data-dcnode-id="3028" instrument_node="">Wolter telescopes</span></a><span data-dcnode-id="3026" instrument_node="">) have been built using nested grazing-incidence mirrors which deflect X-rays to a detector. Some of the </span><a data-dcnode-id="3024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orbiting_Astronomical_Observatory" title="Orbiting Astronomical Observatory"><span data-dcnode-id="3025" instrument_node="">OAO satellites</span></a><span data-dcnode-id="3023" instrument_node=""> conducted X-ray astronomy in the late 1960s, but the first dedicated X-ray satellite was the </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uhuru_%28satellite%29" title="Uhuru (satellite)"><span data-dcnode-id="3022" instrument_node="">Uhuru</span></a><span data-dcnode-id="3020" instrument_node=""> (1970) which discovered 300 sources. More recent X-ray satellites include: the </span><a data-dcnode-id="3018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EXOSAT" title="EXOSAT"><span data-dcnode-id="3019" instrument_node="">EXOSAT</span></a><span data-dcnode-id="3017" instrument_node=""> (1983), </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ROSAT" title="ROSAT"><span data-dcnode-id="3016" instrument_node="">ROSAT</span></a><span data-dcnode-id="3014" instrument_node=""> (1990), </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chandra_X-ray_Observatory" title="Chandra X-ray Observatory"><span data-dcnode-id="3013" instrument_node="">Chandra</span></a><span data-dcnode-id="3011" instrument_node=""> (1999), and </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/XMM-Newton" title="XMM-Newton"><span data-dcnode-id="3010" instrument_node="">Newton</span></a><span data-dcnode-id="3008" instrument_node=""> (1999).
</span></p><span data-dcnode-id="3006" instrument_node="">
</span><h3 data-dcnode-id="3002"><span data-dcnode-id="3005" id="Gamma-ray_telescopes_.28less_than_0.01_nm.29"></span><span class="mw-headline" data-dcnode-id="3003" id="Gamma-ray_telescopes_(less_than_0.01_nm)"><span data-dcnode-id="3004" instrument_node="">Gamma-ray telescopes (less than 0.01 nm)</span></span></h3><span data-dcnode-id="3001" instrument_node="">
</span><link data-dcnode-id="3000" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2996" role="note"><span data-dcnode-id="2999" instrument_node="">See also: </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma-ray_astronomy" title="Gamma-ray astronomy"><span data-dcnode-id="2998" instrument_node="">Gamma-ray astronomy</span></a></div><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2946"><a class="mw-redirect" data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma_rays" title="Gamma rays"><span data-dcnode-id="2994" instrument_node="">Gamma rays</span></a><span data-dcnode-id="2992" instrument_node=""> are absorbed high in the </span><a class="mw-redirect" data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth%2527s_atmosphere" title="Earth's atmosphere"><span data-dcnode-id="2991" instrument_node="">Earth's atmosphere</span></a><span data-dcnode-id="2989" instrument_node=""> so most gamma-ray astronomy is conducted with </span><a class="mw-redirect" data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellites" title="Satellites"><span data-dcnode-id="2988" instrument_node="">satellites</span></a><span data-dcnode-id="2986" instrument_node="">. Gamma-ray telescopes use </span><a class="mw-redirect" data-dcnode-id="2984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scintillation_counters" title="Scintillation counters"><span data-dcnode-id="2985" instrument_node="">scintillation counters</span></a><span data-dcnode-id="2983" instrument_node="">, </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spark_chamber" title="Spark chamber"><span data-dcnode-id="2982" instrument_node="">spark chambers</span></a><span data-dcnode-id="2980" instrument_node=""> and more recently, </span><a class="mw-redirect" data-dcnode-id="2978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solid_state_%28electronics%29" title="Solid state (electronics)"><span data-dcnode-id="2979" instrument_node="">solid-state</span></a><span data-dcnode-id="2977" instrument_node=""> detectors. The angular resolution of these devices is typically very poor. There were </span><a data-dcnode-id="2975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balloon" title="Balloon"><span data-dcnode-id="2976" instrument_node="">balloon</span></a><span data-dcnode-id="2974" instrument_node="">-borne experiments in the early 1960s, but gamma-ray astronomy really began with the launch of the </span><a data-dcnode-id="2972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OSO_3" title="OSO 3"><span data-dcnode-id="2973" instrument_node="">OSO 3</span></a><span data-dcnode-id="2971" instrument_node=""> satellite in 1967; the first dedicated gamma-ray satellites were </span><a class="mw-redirect" data-dcnode-id="2969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Small_Astronomy_Satellite" title="Second Small Astronomy Satellite"><span data-dcnode-id="2970" instrument_node="">SAS B</span></a><span data-dcnode-id="2968" instrument_node=""> (1972) and </span><a data-dcnode-id="2966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cos-B" title="Cos-B"><span data-dcnode-id="2967" instrument_node="">Cos B</span></a><span data-dcnode-id="2965" instrument_node=""> (1975). The </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compton_Gamma_Ray_Observatory" title="Compton Gamma Ray Observatory"><span data-dcnode-id="2964" instrument_node="">Compton Gamma Ray Observatory</span></a><span data-dcnode-id="2962" instrument_node=""> (1991) was a big improvement on previous surveys. Very high-energy gamma-rays (above 200&nbsp;GeV) can be detected from the ground via the </span><a class="mw-redirect" data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cerenkov_radiation" title="Cerenkov radiation"><span data-dcnode-id="2961" instrument_node="">Cerenkov radiation</span></a><span data-dcnode-id="2959" instrument_node=""> produced by the passage of the gamma-rays in the Earth's atmosphere. Several Cerenkov imaging telescopes have been built around the world including: the </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HEGRA" title="HEGRA"><span data-dcnode-id="2958" instrument_node="">HEGRA</span></a><span data-dcnode-id="2956" instrument_node=""> (1987), </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/STACEE" title="STACEE"><span data-dcnode-id="2955" instrument_node="">STACEE</span></a><span data-dcnode-id="2953" instrument_node=""> (2001), </span><a data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/High_Energy_Stereoscopic_System" title="High Energy Stereoscopic System"><span data-dcnode-id="2952" instrument_node="">HESS</span></a><span data-dcnode-id="2950" instrument_node=""> (2003), and </span><a data-dcnode-id="2948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MAGIC_%28telescope%29" title="MAGIC (telescope)"><span data-dcnode-id="2949" instrument_node="">MAGIC</span></a><span data-dcnode-id="2947" instrument_node=""> (2004).
</span></p><span data-dcnode-id="2945" instrument_node="">
</span><h2 data-dcnode-id="2942"><span class="mw-headline" data-dcnode-id="2943" id="Interferometric_telescopes"><span data-dcnode-id="2944" instrument_node="">Interferometric telescopes</span></span></h2><span data-dcnode-id="2941" instrument_node="">
</span><link data-dcnode-id="2940" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2936" role="note"><span data-dcnode-id="2939" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_interferometry" title="Astronomical interferometry"><span data-dcnode-id="2938" instrument_node="">Astronomical interferometry</span></a></div><span data-dcnode-id="2935" instrument_node="">
</span><p data-dcnode-id="2915"><span data-dcnode-id="2934" instrument_node="">In 1868, </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hippolyte_Fizeau" title="Hippolyte Fizeau"><span data-dcnode-id="2933" instrument_node="">Fizeau</span></a><span data-dcnode-id="2931" instrument_node=""> noted that the purpose of the arrangement of mirrors or glass lenses in a conventional telescope was simply to provide an approximation to a </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourier_transform" title="Fourier transform"><span data-dcnode-id="2930" instrument_node="">Fourier transform</span></a><span data-dcnode-id="2928" instrument_node=""> of the optical wave field entering the telescope. As this mathematical transformation was well understood and could be performed mathematically on paper, he noted that by using an array of small instruments it would be possible to measure the diameter of a star with the same precision as a single telescope which was as large as the whole array— a technique which later became known as </span><a class="mw-redirect" data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astronomical_interferometry" title="Astronomical interferometry"><span data-dcnode-id="2927" instrument_node="">astronomical interferometry</span></a><span data-dcnode-id="2925" instrument_node="">. It was not until 1891 that </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_A._Michelson" title="Albert A. Michelson"><span data-dcnode-id="2924" instrument_node="">Albert A. Michelson</span></a><span data-dcnode-id="2922" instrument_node=""> successfully used this technique for the measurement of astronomical angular diameters: the diameters of Jupiter's satellites (Michelson 1891). Thirty years later, a direct interferometric measurement of a stellar diameter was finally realized by Michelson &amp; </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_G._Pease" title="Francis G. Pease"><span data-dcnode-id="2921" instrument_node="">Francis G. Pease</span></a><span data-dcnode-id="2919" instrument_node=""> (1921) which was applied by their 20&nbsp;ft (6.1 m) interferometer mounted on the </span><a class="mw-redirect" data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooker_telescope" title="Hooker telescope"><span data-dcnode-id="2918" instrument_node="">100 inch Hooker Telescope</span></a><span data-dcnode-id="2916" instrument_node=""> on Mount Wilson.
</span></p><p data-dcnode-id="2895"><span data-dcnode-id="2914" instrument_node="">The next major development came in 1946 when </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Ryle" title="Martin Ryle"><span data-dcnode-id="2913" instrument_node="">Ryle</span></a><span data-dcnode-id="2911" instrument_node=""> and Vonberg (Ryle and Vonberg 1946) located a number of new cosmic radio sources by constructing a radio analogue of the </span><a data-dcnode-id="2909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Michelson_interferometer" title="Michelson interferometer"><span data-dcnode-id="2910" instrument_node="">Michelson interferometer</span></a><span data-dcnode-id="2908" instrument_node="">. The signals from two radio antennas were added electronically to produce interference. Ryle and Vonberg's telescope used the rotation of the Earth to scan the sky in one dimension. With the development of larger arrays and of computers which could rapidly perform the necessary Fourier transforms, the first </span><a data-dcnode-id="2906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture_synthesis" title="Aperture synthesis"><span data-dcnode-id="2907" instrument_node="">aperture synthesis</span></a><span data-dcnode-id="2905" instrument_node=""> imaging instruments were soon developed which could obtain high resolution images without the need of a giant parabolic reflector to perform the Fourier transform. This technique is now used in most radio astronomy observations. Radio astronomers soon developed the </span><a data-dcnode-id="2903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Closure_phase" title="Closure phase"><span data-dcnode-id="2904" instrument_node="">mathematical methods</span></a><span data-dcnode-id="2902" instrument_node=""> to perform </span><a data-dcnode-id="2900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture_synthesis" title="Aperture synthesis"><span data-dcnode-id="2901" instrument_node="">aperture synthesis</span></a><span data-dcnode-id="2899" instrument_node=""> Fourier imaging using much larger arrays of telescopes —often spread across more than one continent. In the 1980s, the </span><a data-dcnode-id="2897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aperture_synthesis" title="Aperture synthesis"><span data-dcnode-id="2898" instrument_node="">aperture synthesis</span></a><span data-dcnode-id="2896" instrument_node=""> technique was extended to visible light as well as infrared astronomy, providing the first very high resolution optical and infrared images of nearby stars.
</span></p><p data-dcnode-id="2875"><span data-dcnode-id="2894" instrument_node="">In 1995 this imaging technique was demonstrated on </span><a class="mw-redirect" data-dcnode-id="2892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambridge_Optical_Aperture_Synthesis_Telescope_%28COAST%29" title="Cambridge Optical Aperture Synthesis Telescope (COAST)"><span data-dcnode-id="2893" instrument_node="">an array of separate optical telescopes</span></a><span data-dcnode-id="2891" instrument_node=""> for the first time, allowing a further improvement in resolution, and also allowing even higher resolution </span><a class="external text" data-dcnode-id="2889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/19971021083400/http%3A//www.mrao.cam.ac.uk/telescopes/coast/astronomy.html%23supergiants02-04" rel="nofollow"><span data-dcnode-id="2890" instrument_node="">imaging of stellar surfaces</span></a><span data-dcnode-id="2888" instrument_node="">. The same techniques have now been applied at a number of other astronomical telescope arrays including: the </span><a class="mw-redirect" data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navy_Prototype_Optical_Interferometer" title="Navy Prototype Optical Interferometer"><span data-dcnode-id="2887" instrument_node="">Navy Prototype Optical Interferometer</span></a><span data-dcnode-id="2885" instrument_node="">, the </span><a data-dcnode-id="2883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CHARA_array" title="CHARA array"><span data-dcnode-id="2884" instrument_node="">CHARA array</span></a><span data-dcnode-id="2882" instrument_node="">, and the </span><a data-dcnode-id="2880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared_Optical_Telescope_Array" title="Infrared Optical Telescope Array"><span data-dcnode-id="2881" instrument_node="">IOTA</span></a><span data-dcnode-id="2879" instrument_node=""> array. A detailed description of the development of astronomical optical interferometry can be found here [</span><a class="external free" data-dcnode-id="2877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webcitation.org/5kmngkBFy%3Furl%3Dhttp%3A//www.geocities.com/CapeCanaveral/2309/page1.html" rel="nofollow"><span data-dcnode-id="2878" instrument_node="">https://www.webcitation.org/5kmngkBFy?url=http://www.geocities.com/CapeCanaveral/2309/page1.html</span></a><span data-dcnode-id="2876" instrument_node="">
</span></p><p data-dcnode-id="2864"><span data-dcnode-id="2874" instrument_node="">In 2008, </span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Max_Tegmark" title="Max Tegmark"><span data-dcnode-id="2873" instrument_node="">Max Tegmark</span></a><span data-dcnode-id="2871" instrument_node=""> and </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matias_Zaldarriaga" title="Matias Zaldarriaga"><span data-dcnode-id="2870" instrument_node="">Matias Zaldarriaga</span></a><span data-dcnode-id="2868" instrument_node=""> proposed a "</span><a class="mw-redirect" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fast_Fourier_Transform_Telescope" title="Fast Fourier Transform Telescope"><span data-dcnode-id="2867" instrument_node="">Fast Fourier Transform Telescope</span></a><span data-dcnode-id="2865" instrument_node="">" design in which the lenses and mirrors could be dispensed with altogether when computers become fast enough to perform all the necessary transforms.
</span></p><span data-dcnode-id="2863" instrument_node="">
