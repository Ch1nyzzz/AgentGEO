</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="546" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="555"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="5072" style="display:none"><span data-dcnode-id="5073" instrument_node="">Aspect of history</span></div><span data-dcnode-id="5071" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">
</span></p><span data-dcnode-id="5068" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5059"><div class="thumbinner" data-dcnode-id="5060" style="width:277px;"><a class="image" data-dcnode-id="5066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmblemata_1624.jpg"><img alt="" class="thumbimage" data-dcnode-id="5067" data-file-height="1120" data-file-width="1645" decoding="async" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Emblemata_1624.jpg/275px-Emblemata_1624.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/Emblemata_1624.jpg/413px-Emblemata_1624.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/Emblemata_1624.jpg/550px-Emblemata_1624.jpg 2x" width="275"></a><span data-dcnode-id="5065" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5061"><div class="magnify" data-dcnode-id="5063"><a class="internal" data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmblemata_1624.jpg" title="Enlarge"></a></div><span data-dcnode-id="5062" instrument_node="">Early depiction of a "Dutch telescope" from 1624.</span></div></div></div><span data-dcnode-id="5058" instrument_node="">
</span><p data-dcnode-id="5019"><span data-dcnode-id="5057" instrument_node="">The </span><b data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">history of the telescope</span></b><span data-dcnode-id="5054" instrument_node=""> can be traced to before the invention of the earliest known </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="5053" instrument_node="">telescope</span></a><span data-dcnode-id="5051" instrument_node="">, which appeared in 1608 in the </span><a data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="5050" instrument_node="">Netherlands</span></a><span data-dcnode-id="5048" instrument_node="">, when a patent was submitted by </span><a class="mw-redirect" data-dcnode-id="5046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="5047" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="5045" instrument_node="">, an </span><a class="mw-redirect" data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyeglass" title="Eyeglass"><span data-dcnode-id="5044" instrument_node="">eyeglass</span></a><span data-dcnode-id="5042" instrument_node=""> maker. Although Lippershey did not receive his patent, news of the invention soon spread across Europe. The design of these early </span><a data-dcnode-id="5040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refracting_telescope" title="Refracting telescope"><span data-dcnode-id="5041" instrument_node="">refracting telescopes</span></a><span data-dcnode-id="5039" instrument_node=""> consisted of a convex </span><a data-dcnode-id="5037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="5038" instrument_node="">objective</span></a><span data-dcnode-id="5036" instrument_node=""> lens and a concave </span><a data-dcnode-id="5034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="5035" instrument_node="">eyepiece</span></a><span data-dcnode-id="5033" instrument_node="">. </span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="5032" instrument_node="">Galileo</span></a><span data-dcnode-id="5030" instrument_node=""> improved on this design the following year and applied it to astronomy. In 1611, </span><a data-dcnode-id="5028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Kepler" title="Johannes Kepler"><span data-dcnode-id="5029" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="5027" instrument_node=""> described how a far more useful telescope could be made with a convex objective lens and a convex eyepiece lens. By 1655, astronomers such as </span><a data-dcnode-id="5025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="5026" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="5024" instrument_node=""> were building powerful but unwieldy Keplerian telescopes with compound eyepieces.</span><sup class="reference" data-dcnode-id="5021" id="cite_ref-1"><a data-dcnode-id="5022" href="#cite_note-1"><span data-dcnode-id="5023" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5020" instrument_node="">
</span></p><p data-dcnode-id="5012"><a data-dcnode-id="5017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="5018" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="5016" instrument_node=""> is credited with building the first reflector in 1668 with a design that incorporated a small flat diagonal mirror to reflect the light to an eyepiece mounted on the side of the telescope. </span><a data-dcnode-id="5014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laurent_Cassegrain" title="Laurent Cassegrain"><span data-dcnode-id="5015" instrument_node="">Laurent Cassegrain</span></a><span data-dcnode-id="5013" instrument_node=""> in 1672 described the design of a reflector with a small convex secondary mirror to reflect light through a central hole in the main mirror.
</span></p><p data-dcnode-id="4994"><span data-dcnode-id="5011" instrument_node="">The </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="5010" instrument_node="">achromatic lens</span></a><span data-dcnode-id="5008" instrument_node="">, which greatly reduced color aberrations in objective lenses and allowed for shorter and more functional telescopes, first appeared in a 1733 telescope made by </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chester_Moore_Hall" title="Chester Moore Hall"><span data-dcnode-id="5007" instrument_node="">Chester Moore Hall</span></a><span data-dcnode-id="5005" instrument_node="">, who did not publicize it. </span><a data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dollond" title="John Dollond"><span data-dcnode-id="5004" instrument_node="">John Dollond</span></a><span data-dcnode-id="5002" instrument_node=""> learned of Hall's invention</span><sup class="reference" data-dcnode-id="4999" id="cite_ref-2"><a data-dcnode-id="5000" href="#cite_note-2"><span data-dcnode-id="5001" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="4996" id="cite_ref-3"><a data-dcnode-id="4997" href="#cite_note-3"><span data-dcnode-id="4998" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4995" instrument_node=""> and began producing telescopes using it in commercial quantities, starting in 1758.
</span></p><p data-dcnode-id="4963"><span data-dcnode-id="4993" instrument_node="">Important developments in reflecting telescopes were </span><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Hadley" title="John Hadley"><span data-dcnode-id="4992" instrument_node="">John Hadley</span></a><span data-dcnode-id="4990" instrument_node="">'s production of larger </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paraboloid" title="Paraboloid"><span data-dcnode-id="4989" instrument_node="">paraboloidal</span></a><span data-dcnode-id="4987" instrument_node=""> mirrors in 1721; the process of </span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silvering" title="Silvering"><span data-dcnode-id="4986" instrument_node="">silvering</span></a><span data-dcnode-id="4984" instrument_node=""> glass mirrors introduced by </span><a data-dcnode-id="4982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9on_Foucault" title="Léon Foucault"><span data-dcnode-id="4983" instrument_node="">Léon Foucault</span></a><span data-dcnode-id="4981" instrument_node=""> in 1857;</span><sup class="reference" data-dcnode-id="4978" id="cite_ref-4"><a data-dcnode-id="4979" href="#cite_note-4"><span data-dcnode-id="4980" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4977" instrument_node="">  and the adoption of long-lasting aluminized coatings on reflector mirrors in 1932.</span><sup class="reference" data-dcnode-id="4974" id="cite_ref-5"><a data-dcnode-id="4975" href="#cite_note-5"><span data-dcnode-id="4976" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4973" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="4971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ritchey-Chretien" title="Ritchey-Chretien"><span data-dcnode-id="4972" instrument_node="">Ritchey-Chretien</span></a><span data-dcnode-id="4970" instrument_node=""> variant of </span><a data-dcnode-id="4968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassegrain_reflector" title="Cassegrain reflector"><span data-dcnode-id="4969" instrument_node="">Cassegrain reflector</span></a><span data-dcnode-id="4967" instrument_node=""> was invented around 1910, but not widely adopted until after 1950; many modern telescopes including the </span><a data-dcnode-id="4965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubble_Space_Telescope" title="Hubble Space Telescope"><span data-dcnode-id="4966" instrument_node="">Hubble Space Telescope</span></a><span data-dcnode-id="4964" instrument_node=""> use this design, which gives a wider field of view than a classic Cassegrain.
</span></p><p data-dcnode-id="4931"><span data-dcnode-id="4962" instrument_node="">During the period 1850–1900, reflectors suffered from problems with speculum metal mirrors, and a considerable number of "Great Refractors" were built from 60&nbsp;cm to 1 metre aperture, culminating in the </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yerkes_Observatory" title="Yerkes Observatory"><span data-dcnode-id="4961" instrument_node="">Yerkes Observatory</span></a><span data-dcnode-id="4959" instrument_node=""> refractor in 1897; however, starting from the early 1900s a series of ever-larger reflectors with glass mirrors were built, including the Mount Wilson 60-inch (1.5 metre), the 100-inch (2.5 metre) </span><a class="mw-redirect" data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooker_Telescope" title="Hooker Telescope"><span data-dcnode-id="4958" instrument_node="">Hooker Telescope</span></a><span data-dcnode-id="4956" instrument_node=""> (1917) and the 200-inch (5 metre) </span><a class="mw-redirect" data-dcnode-id="4954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hale_telescope" title="Hale telescope"><span data-dcnode-id="4955" instrument_node="">Hale telescope</span></a><span data-dcnode-id="4953" instrument_node=""> (1948); essentially all major research telescopes since 1900 have been reflectors. A number of 4-metre class (160 inch) telescopes were built on superior higher altitude sites including Hawaii and the Chilean desert in the 1975–1985 era. The development of the computer-controlled </span><a class="mw-redirect" data-dcnode-id="4951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alt-azimuth_mount" title="Alt-azimuth mount"><span data-dcnode-id="4952" instrument_node="">alt-azimuth mount</span></a><span data-dcnode-id="4950" instrument_node=""> in the 1970s and </span><a data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Active_optics" title="Active optics"><span data-dcnode-id="4949" instrument_node="">active optics</span></a><span data-dcnode-id="4947" instrument_node=""> in the 1980s enabled a new generation of even larger telescopes, starting with the 10-metre (400 inch) </span><a class="mw-redirect" data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keck_telescopes" title="Keck telescopes"><span data-dcnode-id="4946" instrument_node="">Keck telescopes</span></a><span data-dcnode-id="4944" instrument_node=""> in 1993/1996, and a number of 8-metre telescopes including the </span><a class="mw-redirect" data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ESO" title="ESO"><span data-dcnode-id="4943" instrument_node="">ESO</span></a><span data-dcnode-id="4941" instrument_node=""> </span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Very_Large_Telescope" title="Very Large Telescope"><span data-dcnode-id="4940" instrument_node="">Very Large Telescope</span></a><span data-dcnode-id="4938" instrument_node="">, </span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gemini_Observatory" title="Gemini Observatory"><span data-dcnode-id="4937" instrument_node="">Gemini Observatory</span></a><span data-dcnode-id="4935" instrument_node=""> and </span><a data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subaru_Telescope" title="Subaru Telescope"><span data-dcnode-id="4934" instrument_node="">Subaru Telescope</span></a><span data-dcnode-id="4932" instrument_node="">.
</span></p><p data-dcnode-id="4905"><span data-dcnode-id="4930" instrument_node="">The era of </span><a data-dcnode-id="4928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_telescope" title="Radio telescope"><span data-dcnode-id="4929" instrument_node="">radio telescopes</span></a><span data-dcnode-id="4927" instrument_node=""> (along with </span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_astronomy" title="Radio astronomy"><span data-dcnode-id="4926" instrument_node="">radio astronomy</span></a><span data-dcnode-id="4924" instrument_node="">) was born with </span><a data-dcnode-id="4922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Guthe_Jansky" title="Karl Guthe Jansky"><span data-dcnode-id="4923" instrument_node="">Karl Guthe Jansky</span></a><span data-dcnode-id="4921" instrument_node="">'s </span><a data-dcnode-id="4919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serendipity" title="Serendipity"><span data-dcnode-id="4920" instrument_node="">serendipitous</span></a><span data-dcnode-id="4918" instrument_node=""> discovery of an astronomical radio source in 1931. Many types of telescopes were developed in the 20th century for a wide range of wavelengths from radio to </span><a class="mw-redirect" data-dcnode-id="4916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamma-ray_telescope" title="Gamma-ray telescope"><span data-dcnode-id="4917" instrument_node="">gamma-rays</span></a><span data-dcnode-id="4915" instrument_node="">.  The development of </span><a class="mw-redirect" data-dcnode-id="4913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_observatories" title="Space observatories"><span data-dcnode-id="4914" instrument_node="">space observatories</span></a><span data-dcnode-id="4912" instrument_node=""> after 1960 allowed access
to several bands impossible to observe from the ground, including </span><a class="mw-redirect" data-dcnode-id="4910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/X-rays" title="X-rays"><span data-dcnode-id="4911" instrument_node="">X-rays</span></a><span data-dcnode-id="4909" instrument_node=""> and longer wavelength </span><a data-dcnode-id="4907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infrared" title="Infrared"><span data-dcnode-id="4908" instrument_node="">infrared</span></a><span data-dcnode-id="4906" instrument_node=""> bands.
</span></p><span data-dcnode-id="4904" instrument_node="">

</span><h3 data-dcnode-id="4665"><span class="mw-headline" data-dcnode-id="4666" id="Optical_foundations"><span data-dcnode-id="4667" instrument_node="">Optical foundations</span></span></h3><span data-dcnode-id="4664" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4658" role="note"><span data-dcnode-id="4661" instrument_node="">See also: </span><a data-dcnode-id="4659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_optics" title="History of optics"><span data-dcnode-id="4660" instrument_node="">History of optics</span></a></div><span data-dcnode-id="4657" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4643"><div class="thumbinner" data-dcnode-id="4644" style="width:222px;"><a class="image" data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptics_from_Roger_Bacon%2527s_De_multiplicatone_specierum.jpg"><img alt="" class="thumbimage" data-dcnode-id="4656" data-file-height="624" data-file-width="1328" decoding="async" height="103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/86/Optics_from_Roger_Bacon%2527s_De_multiplicatone_specierum.jpg/220px-Optics_from_Roger_Bacon%2527s_De_multiplicatone_specierum.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/86/Optics_from_Roger_Bacon%27s_De_multiplicatone_specierum.jpg/330px-Optics_from_Roger_Bacon%27s_De_multiplicatone_specierum.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/86/Optics_from_Roger_Bacon%27s_De_multiplicatone_specierum.jpg/440px-Optics_from_Roger_Bacon%27s_De_multiplicatone_specierum.jpg 2x" width="220"></a><span data-dcnode-id="4654" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4645"><div class="magnify" data-dcnode-id="4652"><a class="internal" data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOptics_from_Roger_Bacon%2527s_De_multiplicatone_specierum.jpg" title="Enlarge"></a></div><span data-dcnode-id="4651" instrument_node="">Optical diagram showing light being refracted by a spherical glass container full of water, from </span><a data-dcnode-id="4649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Bacon" title="Roger Bacon"><span data-dcnode-id="4650" instrument_node="">Roger Bacon</span></a><span data-dcnode-id="4648" instrument_node="">, </span><i data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">De multiplicatione specierum</span></i></div></div></div><span data-dcnode-id="4642" instrument_node="">
</span><link data-dcnode-id="4641" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4637" role="note"><span data-dcnode-id="4640" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="4638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29%23History" title="Lens (optics)"><span data-dcnode-id="4639" instrument_node="">Lens (optics) §&nbsp;History</span></a></div><span data-dcnode-id="4636" instrument_node="">
</span><p data-dcnode-id="4594"><span data-dcnode-id="4635" instrument_node="">Objects resembling </span><a class="mw-redirect" data-dcnode-id="4633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lens_%28optics%29" title="Lens (optics)"><span data-dcnode-id="4634" instrument_node="">lenses</span></a><span data-dcnode-id="4632" instrument_node=""> date back 4000 years although it is unknown if they were used for their optical properties or just as decoration.</span><sup class="reference" data-dcnode-id="4629" id="cite_ref-ReferenceA_6-0"><a data-dcnode-id="4630" href="#cite_note-ReferenceA-6"><span data-dcnode-id="4631" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4628" instrument_node="">
Greek accounts of the optical properties of water-filled spheres (5th century BC) were followed by many centuries of writings on optics, including </span><a data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ptolemy" title="Ptolemy"><span data-dcnode-id="4627" instrument_node="">Ptolemy</span></a><span data-dcnode-id="4625" instrument_node=""> (2nd century) in his </span><i data-dcnode-id="4622"><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optics_%28Ptolemy%29" title="Optics (Ptolemy)"><span data-dcnode-id="4624" instrument_node="">Optics</span></a></i><span data-dcnode-id="4621" instrument_node="">, who wrote about the properties of light including </span><a data-dcnode-id="4619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflection_%28physics%29" title="Reflection (physics)"><span data-dcnode-id="4620" instrument_node="">reflection</span></a><span data-dcnode-id="4618" instrument_node="">, </span><a data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refraction" title="Refraction"><span data-dcnode-id="4617" instrument_node="">refraction</span></a><span data-dcnode-id="4615" instrument_node="">, and </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color" title="Color"><span data-dcnode-id="4614" instrument_node="">color</span></a><span data-dcnode-id="4612" instrument_node="">, followed by </span><a data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_Sahl_%28mathematician%29" title="Ibn Sahl (mathematician)"><span data-dcnode-id="4611" instrument_node="">Ibn Sahl</span></a><span data-dcnode-id="4609" instrument_node=""> (10th century) and </span><a class="mw-redirect" data-dcnode-id="4607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ibn_Al-Haytham" title="Ibn Al-Haytham"><span data-dcnode-id="4608" instrument_node="">Ibn Al-Haytham</span></a><span data-dcnode-id="4606" instrument_node=""> (11th century).</span><sup class="reference" data-dcnode-id="4603" id="cite_ref-PL_7-0"><a data-dcnode-id="4604" href="#cite_note-PL-7"><span data-dcnode-id="4605" instrument_node="">[7]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="4596" style="white-space:nowrap;"><span data-dcnode-id="4602" instrument_node="">[</span><i data-dcnode-id="4598"><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AReliable_sources" title="Wikipedia:Reliable sources"><span data-dcnode-id="4600" title="The material near this tag may rely on an unreliable source. (November 2017)"><span data-dcnode-id="4601" instrument_node="">unreliable source?</span></span></a></i><span data-dcnode-id="4597" instrument_node="">]</span></sup><span data-dcnode-id="4595" instrument_node="">
</span></p><p data-dcnode-id="4567"><span data-dcnode-id="4593" instrument_node="">Actual use of lenses dates back to the widespread manufacture and use of </span><a class="mw-redirect" data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyeglasses" title="Eyeglasses"><span data-dcnode-id="4592" instrument_node="">eyeglasses</span></a><span data-dcnode-id="4590" instrument_node=""> in Northern Italy beginning in the late 13th century.</span><sup class="reference" data-dcnode-id="4587" id="cite_ref-Bardell2004_8-0"><a data-dcnode-id="4588" href="#cite_note-Bardell2004-8"><span data-dcnode-id="4589" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="4584" id="cite_ref-ReferenceA_6-1"><a data-dcnode-id="4585" href="#cite_note-ReferenceA-6"><span data-dcnode-id="4586" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="4581" id="cite_ref-9"><a data-dcnode-id="4582" href="#cite_note-9"><span data-dcnode-id="4583" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="4578" id="cite_ref-10"><a data-dcnode-id="4579" href="#cite_note-10"><span data-dcnode-id="4580" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="4575" id="cite_ref-11"><a data-dcnode-id="4576" href="#cite_note-11"><span data-dcnode-id="4577" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4574" instrument_node=""> The invention of the use of concave lenses to correct </span><a data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Myopia" title="Myopia"><span data-dcnode-id="4573" instrument_node="">near-sightedness</span></a><span data-dcnode-id="4571" instrument_node=""> is ascribed to </span><a data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicholas_of_Cusa" title="Nicholas of Cusa"><span data-dcnode-id="4570" instrument_node="">Nicholas of Cusa</span></a><span data-dcnode-id="4568" instrument_node=""> in 1451.
</span></p><span data-dcnode-id="4566" instrument_node="">
</span><h3 data-dcnode-id="4563"><span class="mw-headline" data-dcnode-id="4564" id="Invention"><span data-dcnode-id="4565" instrument_node="">Invention</span></span></h3><span data-dcnode-id="4562" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4553"><div class="thumbinner" data-dcnode-id="4554" style="width:222px;"><a class="image" data-dcnode-id="4560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALipperhey.jpg"><img alt="" class="thumbimage" data-dcnode-id="4561" data-file-height="222" data-file-width="328" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/84/Lipperhey.jpg/220px-Lipperhey.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/8/84/Lipperhey.jpg 1.5x" width="220"></a><span data-dcnode-id="4559" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4555"><div class="magnify" data-dcnode-id="4557"><a class="internal" data-dcnode-id="4558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALipperhey.jpg" title="Enlarge"></a></div><span data-dcnode-id="4556" instrument_node="">Notes on Hans Lippershey's unsuccessful telescope patent in 1608</span></div></div></div><span data-dcnode-id="4552" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4551" instrument_node="">The first record of a telescope comes from the Netherlands in 1608. It is in a patent filed by </span><a data-dcnode-id="4549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middelburg%2C_Zeeland" title="Middelburg, Zeeland"><span data-dcnode-id="4550" instrument_node="">Middelburg</span></a><span data-dcnode-id="4548" instrument_node=""> spectacle-maker </span><a class="mw-redirect" data-dcnode-id="4546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="4547" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="4545" instrument_node=""> with the </span><a data-dcnode-id="4543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/States_General_of_the_Netherlands" title="States General of the Netherlands"><span data-dcnode-id="4544" instrument_node="">States General of the Netherlands</span></a><span data-dcnode-id="4542" instrument_node=""> on 2 October 1608 for his instrument "</span><i data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">for seeing things far away as if they were nearby</span></i><span data-dcnode-id="4539" instrument_node="">".</span><sup class="reference" data-dcnode-id="4536" id="cite_ref-12"><a data-dcnode-id="4537" href="#cite_note-12"><span data-dcnode-id="4538" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4535" instrument_node=""> A few weeks later another Dutch instrument-maker, </span><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacob_Metius" title="Jacob Metius"><span data-dcnode-id="4534" instrument_node="">Jacob Metius</span></a><span data-dcnode-id="4532" instrument_node=""> also applied for a patent. The States General did not award a patent since the knowledge of the device already seemed to be ubiquitous</span><sup class="reference" data-dcnode-id="4529" id="cite_ref-13"><a data-dcnode-id="4530" href="#cite_note-13"><span data-dcnode-id="4531" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4526" id="cite_ref-14"><a data-dcnode-id="4527" href="#cite_note-14"><span data-dcnode-id="4528" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4525" instrument_node=""> but the Dutch </span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government" title="Government"><span data-dcnode-id="4524" instrument_node="">government</span></a><span data-dcnode-id="4522" instrument_node=""> awarded Lippershey with a contract for copies of his </span><a data-dcnode-id="4520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Design" title="Design"><span data-dcnode-id="4521" instrument_node="">design</span></a><span data-dcnode-id="4519" instrument_node="">.
</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4517" instrument_node="">The original Dutch telescopes were composed of a </span><a class="mw-redirect" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biconcave" title="Biconcave"><span data-dcnode-id="4516" instrument_node="">convex</span></a><span data-dcnode-id="4514" instrument_node=""> and a </span><a class="mw-redirect" data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biconcave_lens" title="Biconcave lens"><span data-dcnode-id="4513" instrument_node="">concave lens</span></a><span data-dcnode-id="4511" instrument_node="">—telescopes that are constructed this way do not invert the image. Lippershey's original design had only 3x </span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnification" title="Magnification"><span data-dcnode-id="4510" instrument_node="">magnification</span></a><span data-dcnode-id="4508" instrument_node="">. Telescopes seem to have been made in the Netherlands in considerable numbers soon after this date of "invention", and rapidly found their way all over Europe.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4501" style="white-space:nowrap;"><span data-dcnode-id="4507" instrument_node="">[</span><i data-dcnode-id="4503"><a data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4505" title="This claim needs references to reliable sources. (November 2009)"><span data-dcnode-id="4506" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4502" instrument_node="">]</span></sup><span data-dcnode-id="4500" instrument_node="">
</span></p><span data-dcnode-id="4498" instrument_node="">
</span><h4 data-dcnode-id="4495"><span class="mw-headline" data-dcnode-id="4496" id="Claims_of_prior_invention"><span data-dcnode-id="4497" instrument_node="">Claims of prior invention</span></span></h4><span data-dcnode-id="4494" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4476"><div class="thumbinner" data-dcnode-id="4477" style="width:222px;"><a class="image" data-dcnode-id="4492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJaansen_Microscope.jpg"><img alt="" class="thumbimage" data-dcnode-id="4493" data-file-height="1944" data-file-width="2592" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Jaansen_Microscope.jpg/220px-Jaansen_Microscope.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/99/Jaansen_Microscope.jpg/330px-Jaansen_Microscope.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/99/Jaansen_Microscope.jpg/440px-Jaansen_Microscope.jpg 2x" width="220"></a><span data-dcnode-id="4491" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4478"><div class="magnify" data-dcnode-id="4489"><a class="internal" data-dcnode-id="4490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJaansen_Microscope.jpg" title="Enlarge"></a></div><span data-dcnode-id="4488" instrument_node="">Reproduction of one of the four optical devices that Zacharias Snijder in 1841 claimed were early telescopes built by </span><a data-dcnode-id="4486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zacharias_Janssen" title="Zacharias Janssen"><span data-dcnode-id="4487" instrument_node="">Zacharias Janssen</span></a><span data-dcnode-id="4485" instrument_node="">. Its actual function and creator has been disputed over the years.</span><sup class="reference" data-dcnode-id="4482" id="cite_ref-15"><a data-dcnode-id="4483" href="#cite_note-15"><span data-dcnode-id="4484" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="4479" id="cite_ref-The_Origins_of_the_Telescope_p.32-36_16-0"><a data-dcnode-id="4480" href="#cite_note-The_Origins_of_the_Telescope_p.32-36-16"><span data-dcnode-id="4481" instrument_node="">[16]</span></a></sup></div></div></div><span data-dcnode-id="4475" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4474" instrument_node="">In 1655 Dutch diplomat </span><a data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Willem_Boreel" title="Willem Boreel"><span data-dcnode-id="4473" instrument_node="">William de Boreel</span></a><span data-dcnode-id="4471" instrument_node=""> tried to solve the mystery of who invented the telescope. He had a local magistrate in Middelburg follow up on Boreel's childhood and early adult recollections of a spectacle maker named "Hans" who he remembered as the inventor of the telescope. The magistrate was contacted by a then unknown claimant, Middelburg spectacle maker Johannes Zachariassen, who testified that his father, </span><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zacharias_Janssen" title="Zacharias Janssen"><span data-dcnode-id="4470" instrument_node="">Zacharias Janssen</span></a><span data-dcnode-id="4468" instrument_node=""> invented the telescope and the microscope as early as 1590. This testimony seemed convincing to Boreel, who now recollected that Zacharias and his father, Hans Martens, must have been who he remembered.</span><sup class="reference" data-dcnode-id="4465" id="cite_ref-HeldenDupré2010_17-0"><a data-dcnode-id="4466" href="#cite_note-HeldenDupr%C3%A92010-17"><span data-dcnode-id="4467" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4464" instrument_node=""> Boreel's conclusion that Zacharias Janssen invented the telescope a little ahead of another spectacle maker, </span><a class="mw-redirect" data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hans_Lippershey" title="Hans Lippershey"><span data-dcnode-id="4463" instrument_node="">Hans Lippershey</span></a><span data-dcnode-id="4461" instrument_node="">, was adopted by </span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Borel" title="Pierre Borel"><span data-dcnode-id="4460" instrument_node="">Pierre Borel</span></a><span data-dcnode-id="4458" instrument_node=""> in his 1656 book </span><i data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">De vero telescopii inventore</span></i><span data-dcnode-id="4455" instrument_node="">.</span><sup class="reference" data-dcnode-id="4452" id="cite_ref-18"><a data-dcnode-id="4453" href="#cite_note-18"><span data-dcnode-id="4454" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="4449" id="cite_ref-19"><a data-dcnode-id="4450" href="#cite_note-19"><span data-dcnode-id="4451" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4448" instrument_node=""> Discrepancies in Boreel's investigation and Zachariassen's testimony (including Zachariassen misrepresenting his date of birth and role in the invention) has led some historians to consider this claim dubious.</span><sup class="reference" data-dcnode-id="4445" id="cite_ref-20"><a data-dcnode-id="4446" href="#cite_note-20"><span data-dcnode-id="4447" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4444" instrument_node=""> The "Janssen" claim would continue over the years and be added on to with </span><a class="new" data-dcnode-id="4442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DZacharias_Snijder%26action%3Dedit%26redlink%3D1" title="Zacharias Snijder (page does not exist)"><span data-dcnode-id="4443" instrument_node="">Zacharias Snijder</span></a><span data-dcnode-id="4441" instrument_node=""> in 1841 presenting 4 iron tubes with lenses in them claimed to be 1590 examples of Janssen's telescope</span><sup class="reference" data-dcnode-id="4438" id="cite_ref-The_Origins_of_the_Telescope_p.32-36_16-1"><a data-dcnode-id="4439" href="#cite_note-The_Origins_of_the_Telescope_p.32-36-16"><span data-dcnode-id="4440" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4437" instrument_node=""> and historian </span><a data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cornelis_de_Waard" title="Cornelis de Waard"><span data-dcnode-id="4436" instrument_node="">Cornelis de Waard</span></a><span data-dcnode-id="4434" instrument_node="">'s 1906 claim that the man who tried to sell a broken telescope to astronomer </span><a data-dcnode-id="4432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simon_Marius" title="Simon Marius"><span data-dcnode-id="4433" instrument_node="">Simon Marius</span></a><span data-dcnode-id="4431" instrument_node=""> at the 1608 </span><a data-dcnode-id="4429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frankfurt_Book_Fair" title="Frankfurt Book Fair"><span data-dcnode-id="4430" instrument_node="">Frankfurt Book Fair</span></a><span data-dcnode-id="4428" instrument_node=""> must have been Janssen.</span><sup class="reference" data-dcnode-id="4425" id="cite_ref-21"><a data-dcnode-id="4426" href="#cite_note-21"><span data-dcnode-id="4427" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4424" instrument_node="">
</span></p><p data-dcnode-id="4335"><span data-dcnode-id="4422" instrument_node="">In 1682,</span><sup class="reference" data-dcnode-id="4419" id="cite_ref-22"><a data-dcnode-id="4420" href="#cite_note-22"><span data-dcnode-id="4421" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4418" instrument_node=""> the minutes of the </span><a data-dcnode-id="4416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Society" title="Royal Society"><span data-dcnode-id="4417" instrument_node="">Royal Society</span></a><span data-dcnode-id="4415" instrument_node=""> in London </span><a data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Hooke" title="Robert Hooke"><span data-dcnode-id="4414" instrument_node="">Robert Hooke</span></a><span data-dcnode-id="4412" instrument_node=""> noted </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Digges" title="Thomas Digges"><span data-dcnode-id="4411" instrument_node="">Thomas Digges</span></a><span data-dcnode-id="4409" instrument_node="">' 1571 </span><i data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Pantometria</span></i><span data-dcnode-id="4406" instrument_node="">, (a book on measurement, partially based on his father </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonard_Digges_%28scientist%29" title="Leonard Digges (scientist)"><span data-dcnode-id="4405" instrument_node="">Leonard Digges</span></a><span data-dcnode-id="4403" instrument_node="">' notes and observations) seemed to support an English claim to the invention of the telescope, describing Leonard as having a </span><i data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">fare seeing glass</span></i><span data-dcnode-id="4400" instrument_node=""> in the mid 1500s based on an idea by </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roger_Bacon" title="Roger Bacon"><span data-dcnode-id="4399" instrument_node="">Roger Bacon</span></a><span data-dcnode-id="4397" instrument_node="">.</span><sup class="reference" data-dcnode-id="4394" id="cite_ref-23"><a data-dcnode-id="4395" href="#cite_note-23"><span data-dcnode-id="4396" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="4391" id="cite_ref-24"><a data-dcnode-id="4392" href="#cite_note-24"><span data-dcnode-id="4393" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4390" instrument_node=""> Thomas described it as "</span><i data-dcnode-id="4388"><span data-dcnode-id="4389" instrument_node="">by proportional Glasses duly situate in convenient angles, not only discovered things far off, read letters, numbered pieces of money with the very coin and superscription thereof, cast by some of his friends of purpose upon downs in open fields, but also seven miles off declared what hath been done at that instant in private places</span></i><span data-dcnode-id="4387" instrument_node="">." Comments on the use of proportional or "perspective glass" are also made in the writings of </span><a class="mw-redirect" data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dee_%28mathematician%29" title="John Dee (mathematician)"><span data-dcnode-id="4386" instrument_node="">John Dee</span></a><span data-dcnode-id="4384" instrument_node=""> (1575) and  </span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Bourne_%28mathematician%29" title="William Bourne (mathematician)"><span data-dcnode-id="4383" instrument_node="">William Bourne</span></a><span data-dcnode-id="4381" instrument_node=""> (1585).</span><sup class="reference" data-dcnode-id="4378" id="cite_ref-25"><a data-dcnode-id="4379" href="#cite_note-25"><span data-dcnode-id="4380" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4377" instrument_node=""> Bourne was asked in 1580 to investigate the Diggs device by </span><a class="mw-redirect" data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen_Elizabeth_I" title="Queen Elizabeth I"><span data-dcnode-id="4376" instrument_node="">Queen Elizabeth I</span></a><span data-dcnode-id="4374" instrument_node="">'s chief advisor </span><a data-dcnode-id="4372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Cecil%2C_1st_Baron_Burghley" title="William Cecil, 1st Baron Burghley"><span data-dcnode-id="4373" instrument_node="">Lord Burghley</span></a><span data-dcnode-id="4371" instrument_node="">. Bourne's is the best description of it, and from his writing it seemed to consist of peering into a large curved mirror that reflected the image produced by a large lens.</span><sup class="reference" data-dcnode-id="4368" id="cite_ref-Patrick_Moore_2012,_page_9_26-0"><a data-dcnode-id="4369" href="#cite_note-Patrick_Moore_2012,_page_9-26"><span data-dcnode-id="4370" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4367" instrument_node=""> The idea of an "Elizabethan Telescope" has been expanded over the years, including astronomer and historian </span><a data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colin_Ronan" title="Colin Ronan"><span data-dcnode-id="4366" instrument_node="">Colin Ronan</span></a><span data-dcnode-id="4364" instrument_node=""> concluding in the 1990s that this reflecting/refracting </span><a data-dcnode-id="4362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="4363" instrument_node="">telescope</span></a><span data-dcnode-id="4361" instrument_node=""> was built by Leonard Digges between 1540 and 1559.</span><sup class="reference" data-dcnode-id="4358" id="cite_ref-chocky.demon.co.uk_27-0"><a data-dcnode-id="4359" href="#cite_note-chocky.demon.co.uk-27"><span data-dcnode-id="4360" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="4355" id="cite_ref-Ronan_1991_28-0"><a data-dcnode-id="4356" href="#cite_note-Ronan_1991-28"><span data-dcnode-id="4357" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="4352" id="cite_ref-watson_29-0"><a data-dcnode-id="4353" href="#cite_note-watson-29"><span data-dcnode-id="4354" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4351" instrument_node=""> This "backwards" </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="4350" instrument_node="">reflecting telescope</span></a><span data-dcnode-id="4348" instrument_node=""> would have been unwieldy, it needed very large mirrors and lens to work, the observer had to stand backwards to look at an upside down view, and Bourne noted it had a very narrow field of view making it unsuitable for military purposes.</span><sup class="reference" data-dcnode-id="4345" id="cite_ref-Patrick_Moore_2012,_page_9_26-1"><a data-dcnode-id="4346" href="#cite_note-Patrick_Moore_2012,_page_9-26"><span data-dcnode-id="4347" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4344" instrument_node=""> The optical performance required to see the details of coins lying about in fields, or private activities seven miles away, seems to be far beyond the technology of the time</span><sup class="reference" data-dcnode-id="4341" id="cite_ref-watson40_30-0"><a data-dcnode-id="4342" href="#cite_note-watson40-30"><span data-dcnode-id="4343" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4340" instrument_node=""> and it could be the "perspective glass" being described was a far simpler idea, originating with Bacon, of using a single lens held in front of the eye to magnify a distant view.</span><sup class="reference" data-dcnode-id="4337" id="cite_ref-31"><a data-dcnode-id="4338" href="#cite_note-31"><span data-dcnode-id="4339" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4336" instrument_node="">
</span></p><p data-dcnode-id="4317"><span data-dcnode-id="4334" instrument_node="">Translations of the notebooks of </span><a data-dcnode-id="4332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonardo_da_Vinci" title="Leonardo da Vinci"><span data-dcnode-id="4333" instrument_node="">Leonardo da Vinci</span></a><span data-dcnode-id="4331" instrument_node=""> and </span><a data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Girolamo_Fracastoro" title="Girolamo Fracastoro"><span data-dcnode-id="4330" instrument_node="">Girolamo Fracastoro</span></a><span data-dcnode-id="4328" instrument_node=""> shows both using water filled crystals or a combination of lenses to magnify the Moon, although the descriptions are too sketchy to determine if they were arranged like a telescope.</span><sup class="reference" data-dcnode-id="4325" id="cite_ref-32"><a data-dcnode-id="4326" href="#cite_note-32"><span data-dcnode-id="4327" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="4322" id="cite_ref-33"><a data-dcnode-id="4323" href="#cite_note-33"><span data-dcnode-id="4324" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="4319" id="cite_ref-34"><a data-dcnode-id="4320" href="#cite_note-34"><span data-dcnode-id="4321" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4318" instrument_node="">
</span></p><p data-dcnode-id="4308"><span data-dcnode-id="4316" instrument_node="">A 1959 research paper by Simon de Guilleuma claimed that evidence he had uncovered pointed to the French born spectacle maker </span><a data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juan_Roget" title="Juan Roget"><span data-dcnode-id="4315" instrument_node="">Juan Roget</span></a><span data-dcnode-id="4313" instrument_node=""> (died before 1624) as another possible builder of an early telescope that predated Hans Lippershey's patent application.</span><sup class="reference" data-dcnode-id="4310" id="cite_ref-35"><a data-dcnode-id="4311" href="#cite_note-35"><span data-dcnode-id="4312" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4309" instrument_node="">
</span></p><span data-dcnode-id="4307" instrument_node="">
</span><h4 data-dcnode-id="4304"><span class="mw-headline" data-dcnode-id="4305" id="Spread_of_the_invention"><span data-dcnode-id="4306" instrument_node="">Spread of the invention</span></span></h4><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4279"><span data-dcnode-id="4302" instrument_node="">Lippershey's application for a patent was mentioned at the end of a diplomatic report on an embassy to Holland from the </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ayutthaya_Kingdom" title="Ayutthaya Kingdom"><span data-dcnode-id="4301" instrument_node="">Kingdom of Siam</span></a><span data-dcnode-id="4299" instrument_node=""> sent by the Siamese king </span><a data-dcnode-id="4297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ekathotsarot" title="Ekathotsarot"><span data-dcnode-id="4298" instrument_node="">Ekathotsarot</span></a><span data-dcnode-id="4296" instrument_node="">: </span><i data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Ambassades du Roy de Siam envoyé à l'Excellence du Prince Maurice, arrivé à La Haye le 10 Septemb. 1608</span></i><span data-dcnode-id="4293" instrument_node=""> (</span><i data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">Embassy of the King of Siam sent to his Excellency Prince Maurice, arrived at The Hague on 10 September 1608</span></i><span data-dcnode-id="4290" instrument_node="">). This report was issued in October 1608 and distributed across Europe, leading to experiments by other scientists, such as the Italian </span><a data-dcnode-id="4288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paolo_Sarpi" title="Paolo Sarpi"><span data-dcnode-id="4289" instrument_node="">Paolo Sarpi</span></a><span data-dcnode-id="4287" instrument_node="">, who received the report in November, and the English mathematician and astronomer </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Harriot" title="Thomas Harriot"><span data-dcnode-id="4286" instrument_node="">Thomas Harriot</span></a><span data-dcnode-id="4284" instrument_node="">, who used a six-powered telescope by the summer of 1609 to observe features on the moon.</span><sup class="reference" data-dcnode-id="4281" id="cite_ref-36"><a data-dcnode-id="4282" href="#cite_note-36"><span data-dcnode-id="4283" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4280" instrument_node="">
</span></p><span data-dcnode-id="4278" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4260"><div class="thumbinner" data-dcnode-id="4261" style="width:202px;"><a class="image" data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo_Donato.jpg"><img alt="" class="thumbimage" data-dcnode-id="4277" data-file-height="1770" data-file-width="2379" decoding="async" height="149" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Galileo_Donato.jpg/200px-Galileo_Donato.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/93/Galileo_Donato.jpg/300px-Galileo_Donato.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/93/Galileo_Donato.jpg/400px-Galileo_Donato.jpg 2x" width="200"></a><span data-dcnode-id="4275" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4262"><div class="magnify" data-dcnode-id="4273"><a class="internal" data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo_Donato.jpg" title="Enlarge"></a></div><span data-dcnode-id="4272" instrument_node="">19th-century painting depicting </span><a data-dcnode-id="4270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4271" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="4269" instrument_node=""> displaying his </span><a data-dcnode-id="4267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="4268" instrument_node="">telescope</span></a><span data-dcnode-id="4266" instrument_node=""> to </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonardo_Donato" title="Leonardo Donato"><span data-dcnode-id="4265" instrument_node="">Leonardo Donato</span></a><span data-dcnode-id="4263" instrument_node=""> in 1609.</span></div></div></div><span data-dcnode-id="4259" instrument_node="">
</span><p data-dcnode-id="4218"><span data-dcnode-id="4258" instrument_node="">The Italian polymath </span><a data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4257" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="4255" instrument_node=""> was in </span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice" title="Venice"><span data-dcnode-id="4254" instrument_node="">Venice</span></a><span data-dcnode-id="4252" instrument_node=""> in June 1609</span><sup class="reference" data-dcnode-id="4249" id="cite_ref-37"><a data-dcnode-id="4250" href="#cite_note-37"><span data-dcnode-id="4251" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4248" instrument_node=""> and there heard of the "Dutch perspective glass", a military </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monocular" title="Monocular"><span data-dcnode-id="4247" instrument_node="">spyglass</span></a><span data-dcnode-id="4245" instrument_node="">,</span><sup class="reference" data-dcnode-id="4242" id="cite_ref-38"><a data-dcnode-id="4243" href="#cite_note-38"><span data-dcnode-id="4244" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4241" instrument_node=""> by means of which distant objects appeared nearer and larger. Galileo states that he solved the problem of the construction of a telescope the first night after his return to </span><a data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Padua" title="Padua"><span data-dcnode-id="4240" instrument_node="">Padua</span></a><span data-dcnode-id="4238" instrument_node=""> from Venice and made his first telescope the next day by using a convex objective lens in one extremity of a leaden tube and a concave </span><a data-dcnode-id="4236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="4237" instrument_node="">eyepiece</span></a><span data-dcnode-id="4235" instrument_node=""> lens in the other end, an arrangement that came to be called a </span><a class="mw-redirect" data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_telescope" title="Galilean telescope"><span data-dcnode-id="4234" instrument_node="">Galilean telescope</span></a><span data-dcnode-id="4232" instrument_node="">.</span><sup class="reference" data-dcnode-id="4229" id="cite_ref-autogenerated1_39-0"><a data-dcnode-id="4230" href="#cite_note-autogenerated1-39"><span data-dcnode-id="4231" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4228" instrument_node=""> A few days afterwards, having succeeded in making a better telescope than the first, he took it to Venice where he communicated the details of his invention to the public and presented the instrument itself to the </span><a data-dcnode-id="4226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doge_of_Venice" title="Doge of Venice"><span data-dcnode-id="4227" instrument_node="">doge</span></a><span data-dcnode-id="4225" instrument_node=""> </span><a data-dcnode-id="4223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonardo_Donato" title="Leonardo Donato"><span data-dcnode-id="4224" instrument_node="">Leonardo Donato</span></a><span data-dcnode-id="4222" instrument_node="">, who was sitting in full council. The </span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senate" title="Senate"><span data-dcnode-id="4221" instrument_node="">senate</span></a><span data-dcnode-id="4219" instrument_node=""> in return settled him for life in his lectureship at Padua and doubled his salary.
</span></p><span data-dcnode-id="4217" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4206"><div class="thumbinner" data-dcnode-id="4207" style="width:222px;"><a class="image" data-dcnode-id="4215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo-picture.jpg"><img alt="" class="thumbimage" data-dcnode-id="4216" data-file-height="326" data-file-width="244" decoding="async" height="294" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Galileo-picture.jpg/220px-Galileo-picture.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/f/f7/Galileo-picture.jpg 1.5x" width="220"></a><span data-dcnode-id="4214" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4208"><div class="magnify" data-dcnode-id="4212"><a class="internal" data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGalileo-picture.jpg" title="Enlarge"></a></div><span data-dcnode-id="4211" instrument_node="">Portrait of </span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4210" instrument_node="">Galileo Galilei</span></a></div></div></div><span data-dcnode-id="4205" instrument_node="">
</span><p data-dcnode-id="4169"><span data-dcnode-id="4204" instrument_node="">Galileo set himself to improving the telescope, producing telescopes of increased power. His first telescope had a 3x magnification, but he soon made instruments which magnified 8x and finally, one nearly a meter long with a 37mm objective (which he would stop down to 16mm or 12mm) and a 23x magnification.</span><sup class="reference" data-dcnode-id="4201" id="cite_ref-40"><a data-dcnode-id="4202" href="#cite_note-40"><span data-dcnode-id="4203" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4200" instrument_node=""> With this last instrument he began a series of astronomical observations in October or November 1609, discovering the </span><a class="mw-redirect" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_moon" title="Galilean moon"><span data-dcnode-id="4199" instrument_node="">satellites</span></a><span data-dcnode-id="4197" instrument_node=""> of </span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jupiter" title="Jupiter"><span data-dcnode-id="4196" instrument_node="">Jupiter</span></a><span data-dcnode-id="4194" instrument_node="">, hills and valleys on the </span><a data-dcnode-id="4192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moon" title="Moon"><span data-dcnode-id="4193" instrument_node="">Moon</span></a><span data-dcnode-id="4191" instrument_node="">, the phases of </span><a data-dcnode-id="4189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus" title="Venus"><span data-dcnode-id="4190" instrument_node="">Venus</span></a><sup class="reference" data-dcnode-id="4186" id="cite_ref-palmieri_41-0"><a data-dcnode-id="4187" href="#cite_note-palmieri-41"><span data-dcnode-id="4188" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4185" instrument_node=""> and observed </span><a data-dcnode-id="4183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunspot" title="Sunspot"><span data-dcnode-id="4184" instrument_node="">spots on the sun</span></a><span data-dcnode-id="4182" instrument_node=""> (using the projection method rather than direct observation). Galileo noted that the revolution of the satellites of Jupiter, the phases of Venus, rotation of the </span><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="4181" instrument_node="">Sun</span></a><span data-dcnode-id="4179" instrument_node=""> and the tilted path its spots followed for part of the year pointed to the validity of the sun-centered </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copernican_heliocentrism" title="Copernican heliocentrism"><span data-dcnode-id="4178" instrument_node="">Copernican system</span></a><span data-dcnode-id="4176" instrument_node=""> over other </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geocentric_model" title="Geocentric model"><span data-dcnode-id="4175" instrument_node="">Earth-centered systems</span></a><span data-dcnode-id="4173" instrument_node=""> such as the one proposed by </span><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ptolemy" title="Ptolemy"><span data-dcnode-id="4172" instrument_node="">Ptolemy</span></a><span data-dcnode-id="4170" instrument_node="">.
</span></p><p data-dcnode-id="4139"><span data-dcnode-id="4168" instrument_node="">Galileo's instrument was the first to be given the name "telescope". The name was invented by the Greek poet/theologian </span><a data-dcnode-id="4166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Demisiani" title="Giovanni Demisiani"><span data-dcnode-id="4167" instrument_node="">Giovanni Demisiani</span></a><span data-dcnode-id="4165" instrument_node=""> at a banquet held on April 14, 1611 by Prince </span><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federico_Cesi" title="Federico Cesi"><span data-dcnode-id="4164" instrument_node="">Federico Cesi</span></a><span data-dcnode-id="4162" instrument_node=""> to make </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galileo_Galilei" title="Galileo Galilei"><span data-dcnode-id="4161" instrument_node="">Galileo Galilei</span></a><span data-dcnode-id="4159" instrument_node=""> a member of the </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Accademia_dei_Lincei" title="Accademia dei Lincei"><span data-dcnode-id="4158" instrument_node="">Accademia dei Lincei</span></a><span data-dcnode-id="4156" instrument_node="">.</span><sup class="reference" data-dcnode-id="4153" id="cite_ref-42"><a data-dcnode-id="4154" href="#cite_note-42"><span data-dcnode-id="4155" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4152" instrument_node=""> The word was created from the </span><a data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greek_language" title="Greek language"><span data-dcnode-id="4151" instrument_node="">Greek</span></a><span data-dcnode-id="4149" instrument_node=""> </span><i data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">tele</span></i><span data-dcnode-id="4146" instrument_node=""> = 'far' and </span><i data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">skopein</span></i><span data-dcnode-id="4143" instrument_node=""> = 'to look or see'; </span><i data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">teleskopos</span></i><span data-dcnode-id="4140" instrument_node=""> = 'far-seeing'.
</span></p><p data-dcnode-id="4124"><span data-dcnode-id="4138" instrument_node="">By 1626 knowledge of the telescope had spread to China when German Jesuit and astronomer </span><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johann_Adam_Schall_von_Bell" title="Johann Adam Schall von Bell"><span data-dcnode-id="4137" instrument_node="">Johann Adam Schall von Bell</span></a><span data-dcnode-id="4135" instrument_node=""> published </span><i data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Yuan jing shuo</span></i><span data-dcnode-id="4132" instrument_node="">, (</span><i data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Explanation of the Telescope</span></i><span data-dcnode-id="4129" instrument_node="">) in Chinese and Latin.</span><sup class="reference" data-dcnode-id="4126" id="cite_ref-43"><a data-dcnode-id="4127" href="#cite_note-43"><span data-dcnode-id="4128" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4125" instrument_node="">
</span></p><span data-dcnode-id="4123" instrument_node="">
</span><h3 data-dcnode-id="4120"><span class="mw-headline" data-dcnode-id="4121" id="Further_refinements"><span data-dcnode-id="4122" instrument_node="">Further refinements</span></span></h3><span data-dcnode-id="4119" instrument_node="">
</span><h4 data-dcnode-id="4116"><span class="mw-headline" data-dcnode-id="4117" id="Refracting_telescopes"><span data-dcnode-id="4118" instrument_node="">Refracting telescopes</span></span></h4><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4095"><a data-dcnode-id="4113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Kepler" title="Johannes Kepler"><span data-dcnode-id="4114" instrument_node="">Johannes Kepler</span></a><span data-dcnode-id="4112" instrument_node=""> first explained the theory and some of the practical advantages of a telescope constructed of two convex lenses in his </span><i data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Catoptrics</span></i><span data-dcnode-id="4109" instrument_node=""> (1611). The first person who actually constructed a telescope of this form was the </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Society_of_Jesus" title="Society of Jesus"><span data-dcnode-id="4108" instrument_node="">Jesuit</span></a><span data-dcnode-id="4106" instrument_node=""> </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christoph_Scheiner" title="Christoph Scheiner"><span data-dcnode-id="4105" instrument_node="">Christoph Scheiner</span></a><span data-dcnode-id="4103" instrument_node=""> who gives a description of it in his </span><i data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Rosa Ursina</span></i><span data-dcnode-id="4100" instrument_node=""> (1630).</span><sup class="reference" data-dcnode-id="4097" id="cite_ref-autogenerated1_39-1"><a data-dcnode-id="4098" href="#cite_note-autogenerated1-39"><span data-dcnode-id="4099" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4096" instrument_node="">
</span></p><p data-dcnode-id="4075"><a data-dcnode-id="4093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Gascoigne_%28scientist%29" title="William Gascoigne (scientist)"><span data-dcnode-id="4094" instrument_node="">William Gascoigne</span></a><span data-dcnode-id="4092" instrument_node=""> was the first who commanded a chief advantage of the form of telescope suggested by Kepler: that a small material object could be placed at the common </span><a class="mw-redirect" data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Focal_plane" title="Focal plane"><span data-dcnode-id="4091" instrument_node="">focal plane</span></a><span data-dcnode-id="4089" instrument_node=""> of the objective and the eyepiece. This led to his invention of the </span><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Micrometer_%28device%29" title="Micrometer (device)"><span data-dcnode-id="4088" instrument_node="">micrometer</span></a><span data-dcnode-id="4086" instrument_node="">, and his application of telescopic sights to precision astronomical instruments. It was not till about the middle of the 17th century that Kepler's telescope came into general use: not so much because of the advantages pointed out by Gascoigne, but because its </span><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Field_of_view" title="Field of view"><span data-dcnode-id="4085" instrument_node="">field of view</span></a><span data-dcnode-id="4083" instrument_node=""> was much larger than in the </span><a class="mw-redirect" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_telescope" title="Galilean telescope"><span data-dcnode-id="4082" instrument_node="">Galilean telescope</span></a><span data-dcnode-id="4080" instrument_node="">.</span><sup class="reference" data-dcnode-id="4077" id="cite_ref-autogenerated1_39-2"><a data-dcnode-id="4078" href="#cite_note-autogenerated1-39"><span data-dcnode-id="4079" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4076" instrument_node="">
</span></p><p data-dcnode-id="4053"><span data-dcnode-id="4074" instrument_node="">The first powerful telescopes of Keplerian construction were made by </span><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="4073" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="4071" instrument_node=""> after much labor—in which his brother assisted him. With one of these: an objective diameter of 2.24 inches (57&nbsp;mm) and a 12&nbsp;ft (3.7&nbsp;m) focal length,</span><sup class="reference" data-dcnode-id="4068" id="cite_ref-autogenerated2_44-0"><a data-dcnode-id="4069" href="#cite_note-autogenerated2-44"><span data-dcnode-id="4070" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4067" instrument_node=""> he discovered the brightest of Saturn's satellites (</span><a data-dcnode-id="4065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Titan_%28moon%29" title="Titan (moon)"><span data-dcnode-id="4066" instrument_node="">Titan</span></a><span data-dcnode-id="4064" instrument_node="">) in 1655; in 1659, he published his "</span><i data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Systema Saturnium</span></i><span data-dcnode-id="4061" instrument_node="">" which, for the first time, gave a true explanation of Saturn's </span><a class="mw-redirect" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_ring" title="Planetary ring"><span data-dcnode-id="4060" instrument_node="">ring</span></a><span data-dcnode-id="4058" instrument_node="">—founded on observations made with the same instrument.</span><sup class="reference" data-dcnode-id="4055" id="cite_ref-autogenerated1_39-3"><a data-dcnode-id="4056" href="#cite_note-autogenerated1-39"><span data-dcnode-id="4057" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4054" instrument_node="">
</span></p><span data-dcnode-id="4052" instrument_node="">
</span><h5 data-dcnode-id="4049"><span class="mw-headline" data-dcnode-id="4050" id="Long_focal_length_refractors"><span data-dcnode-id="4051" instrument_node="">Long focal length refractors</span></span></h5><span data-dcnode-id="4048" instrument_node="">
