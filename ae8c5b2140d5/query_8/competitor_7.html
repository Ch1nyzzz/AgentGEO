</span><div class="thumb tleft" data-dcnode-id="4033"><div class="thumbinner" data-dcnode-id="4034" style="width:222px;"><a class="image" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHoughton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg"><img alt="" class="thumbimage" data-dcnode-id="4047" data-file-height="3879" data-file-width="4635" decoding="async" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%252C_Machinae_coelestis%252C_1673.jpg/220px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%252C_Machinae_coelestis%252C_1673.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg/330px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg/440px-Houghton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg 2x" width="220"></a><span data-dcnode-id="4045" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4035"><div class="magnify" data-dcnode-id="4043"><a class="internal" data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHoughton_Typ_620.73.451_-_Johannes_Hevelius%2C_Machinae_coelestis%2C_1673.jpg" title="Enlarge"></a></div><span data-dcnode-id="4042" instrument_node="">Engraved illustration of a 45&nbsp;m (148&nbsp;ft) focal length Keplerian astronomical refracting telescope built by </span><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Hevelius" title="Johannes Hevelius"><span data-dcnode-id="4041" instrument_node="">Johannes Hevelius</span></a><span data-dcnode-id="4039" instrument_node="">. From his book, "</span><i data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Machina coelestis</span></i><span data-dcnode-id="4036" instrument_node="">" (first part), published in 1673.</span></div></div></div><span data-dcnode-id="4032" instrument_node="">
</span><p data-dcnode-id="4005"><span data-dcnode-id="4031" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sharpness_%28visual%29" title="Sharpness (visual)"><span data-dcnode-id="4030" instrument_node="">sharpness</span></a><span data-dcnode-id="4028" instrument_node=""> of the image in Kepler's telescope was limited by the </span><a data-dcnode-id="4026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="4027" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="4025" instrument_node=""> introduced by the non-uniform refractive properties of the objective lens. The only way to overcome this limitation at high magnifying powers was to create objectives with very long focal lengths. </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Domenico_Cassini" title="Giovanni Domenico Cassini"><span data-dcnode-id="4024" instrument_node="">Giovanni Cassini</span></a><span data-dcnode-id="4022" instrument_node=""> discovered </span><a class="mw-redirect" data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saturn%2527s" title="Saturn's"><span data-dcnode-id="4021" instrument_node="">Saturn's</span></a><span data-dcnode-id="4019" instrument_node=""> fifth satellite (</span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhea_%28moon%29" title="Rhea (moon)"><span data-dcnode-id="4018" instrument_node="">Rhea</span></a><span data-dcnode-id="4016" instrument_node="">) in 1672 with a telescope 35 feet (11&nbsp;m) long. Astronomers such as </span><a data-dcnode-id="4014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Hevelius" title="Johannes Hevelius"><span data-dcnode-id="4015" instrument_node="">Johannes Hevelius</span></a><span data-dcnode-id="4013" instrument_node=""> were constructing telescopes with focal lengths as long as 150 feet (46&nbsp;m). Besides having really long tubes these telescopes needed scaffolding or long masts and cranes to hold them up. Their value as research tools was minimal since the telescope's frame "tube" flexed and vibrated in the slightest breeze and sometimes collapsed altogether.</span><sup class="reference" data-dcnode-id="4010" id="cite_ref-AIP_45-0"><a data-dcnode-id="4011" href="#cite_note-AIP-45"><span data-dcnode-id="4012" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="4007" id="cite_ref-Cartage_46-0"><a data-dcnode-id="4008" href="#cite_note-Cartage-46"><span data-dcnode-id="4009" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4006" instrument_node="">
</span></p><span data-dcnode-id="4004" instrument_node="">
</span><h5 data-dcnode-id="4001"><span class="mw-headline" data-dcnode-id="4002" id="Aerial_telescopes"><span data-dcnode-id="4003" instrument_node="">Aerial telescopes</span></span></h5><span data-dcnode-id="4000" instrument_node="">
</span><link data-dcnode-id="3999" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3995" role="note"><span data-dcnode-id="3998" instrument_node="">Main article: </span><a data-dcnode-id="3996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerial_telescope" title="Aerial telescope"><span data-dcnode-id="3997" instrument_node="">Aerial telescope</span></a></div><span data-dcnode-id="3994" instrument_node="">
</span><p data-dcnode-id="3955"><span data-dcnode-id="3993" instrument_node="">In some of the very long refracting telescopes constructed after 1675, no tube was employed at all. The objective was mounted on a swiveling ball-joint on top of a pole, tree, or any available tall structure and aimed by means of string or connecting rod. The eyepiece was handheld or mounted on a stand at the focus, and the image was found by trial and error. These were consequently termed </span><a data-dcnode-id="3991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerial_telescope" title="Aerial telescope"><span data-dcnode-id="3992" instrument_node="">aerial telescopes</span></a><span data-dcnode-id="3990" instrument_node="">.</span><sup class="reference" data-dcnode-id="3987" id="cite_ref-47"><a data-dcnode-id="3988" href="#cite_note-47"><span data-dcnode-id="3989" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3986" instrument_node=""> and have been attributed to </span><a data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christiaan_Huygens" title="Christiaan Huygens"><span data-dcnode-id="3985" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="3983" instrument_node=""> and his brother </span><a class="mw-redirect" data-dcnode-id="3981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constantijn_Huygens%2C_Jr." title="Constantijn Huygens, Jr."><span data-dcnode-id="3982" instrument_node="">Constantijn Huygens, Jr.</span></a><sup class="reference" data-dcnode-id="3978" id="cite_ref-AIP_45-1"><a data-dcnode-id="3979" href="#cite_note-AIP-45"><span data-dcnode-id="3980" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="3975" id="cite_ref-48"><a data-dcnode-id="3976" href="#cite_note-48"><span data-dcnode-id="3977" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3974" instrument_node=""> although it is not clear that they invented it.</span><sup class="reference" data-dcnode-id="3971" id="cite_ref-49"><a data-dcnode-id="3972" href="#cite_note-49"><span data-dcnode-id="3973" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3970" instrument_node=""> Christiaan Huygens and his brother made objectives up to 8.5 inches (220&nbsp;mm) diameter</span><sup class="reference" data-dcnode-id="3967" id="cite_ref-autogenerated2_44-1"><a data-dcnode-id="3968" href="#cite_note-autogenerated2-44"><span data-dcnode-id="3969" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3966" instrument_node=""> and 210&nbsp;ft (64&nbsp;m) focal length and others such as </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adrien_Auzout" title="Adrien Auzout"><span data-dcnode-id="3965" instrument_node="">Adrien Auzout</span></a><span data-dcnode-id="3963" instrument_node=""> made telescopes with focal lengths up to 600&nbsp;ft (180&nbsp;m). Telescopes of such great length were naturally difficult to use and must have taxed to the utmost the skill and patience of the observers.</span><sup class="reference" data-dcnode-id="3960" id="cite_ref-autogenerated1_39-4"><a data-dcnode-id="3961" href="#cite_note-autogenerated1-39"><span data-dcnode-id="3962" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3959" instrument_node=""> Aerial telescopes were employed by several other astronomers. Cassini discovered Saturn's third and fourth satellites in 1684 with aerial telescope objectives made by </span><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giuseppe_Campani" title="Giuseppe Campani"><span data-dcnode-id="3958" instrument_node="">Giuseppe Campani</span></a><span data-dcnode-id="3956" instrument_node=""> that were 100 and 136&nbsp;ft (30 and 41&nbsp;m) in focal length.
</span></p><span data-dcnode-id="3954" instrument_node="">
</span><h4 data-dcnode-id="3951"><span class="mw-headline" data-dcnode-id="3952" id="Reflecting_telescopes"><span data-dcnode-id="3953" instrument_node="">Reflecting telescopes</span></span></h4><span data-dcnode-id="3950" instrument_node="">
</span><link data-dcnode-id="3949" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3945" role="note"><span data-dcnode-id="3948" instrument_node="">See also: </span><a data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope" title="Reflecting telescope"><span data-dcnode-id="3947" instrument_node="">Reflecting telescope</span></a></div><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3913"><span data-dcnode-id="3943" instrument_node="">The ability of a </span><a data-dcnode-id="3941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curved_mirror" title="Curved mirror"><span data-dcnode-id="3942" instrument_node="">curved mirror</span></a><span data-dcnode-id="3940" instrument_node=""> to form an image may have been known since the time of </span><a data-dcnode-id="3938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euclid" title="Euclid"><span data-dcnode-id="3939" instrument_node="">Euclid</span></a><sup class="reference" data-dcnode-id="3935" id="cite_ref-50"><a data-dcnode-id="3936" href="#cite_note-50"><span data-dcnode-id="3937" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3934" instrument_node=""> and had been extensively studied by </span><a class="mw-redirect" data-dcnode-id="3932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alhazen" title="Alhazen"><span data-dcnode-id="3933" instrument_node="">Alhazen</span></a><span data-dcnode-id="3931" instrument_node=""> in the 11th century. Galileo, </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giovanni_Francesco_Sagredo" title="Giovanni Francesco Sagredo"><span data-dcnode-id="3930" instrument_node="">Giovanni Francesco Sagredo</span></a><span data-dcnode-id="3928" instrument_node="">, and others, spurred on by their knowledge that curved mirrors had similar properties to lenses, discussed the idea of building a telescope using a mirror as the image forming objective.</span><sup class="reference" data-dcnode-id="3925" id="cite_ref-51"><a data-dcnode-id="3926" href="#cite_note-51"><span data-dcnode-id="3927" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3924" instrument_node=""> </span><a data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Niccol%25C3%25B2_Zucchi" title="Niccolò Zucchi"><span data-dcnode-id="3923" instrument_node="">Niccolò Zucchi</span></a><span data-dcnode-id="3921" instrument_node="">, an Italian Jesuit astronomer and physicist, wrote in his book </span><i data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Optica philosophia</span></i><span data-dcnode-id="3918" instrument_node=""> of 1652 that he tried replacing the lens of a refracting telescope with a bronze concave mirror in 1616. Zucchi tried looking into the mirror with a hand held concave lens but did not get a satisfactory image, possibly due to the poor quality of the mirror, the angle it was tilted at, or the fact that his head partially obstructed the image.</span><sup class="reference" data-dcnode-id="3915" id="cite_ref-52"><a data-dcnode-id="3916" href="#cite_note-52"><span data-dcnode-id="3917" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3914" instrument_node="">
</span></p><span data-dcnode-id="3912" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3900"><div class="thumbinner" data-dcnode-id="3901" style="width:352px;"><a class="image" data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALanature1873_telescope_gregory.png"><img alt="" class="thumbimage" data-dcnode-id="3911" data-file-height="121" data-file-width="515" decoding="async" height="82" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Lanature1873_telescope_gregory.png/350px-Lanature1873_telescope_gregory.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/6/6d/Lanature1873_telescope_gregory.png 1.5x" width="350"></a><span data-dcnode-id="3909" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3902"><div class="magnify" data-dcnode-id="3907"><a class="internal" data-dcnode-id="3908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALanature1873_telescope_gregory.png" title="Enlarge"></a></div><span data-dcnode-id="3906" instrument_node="">Light path in a </span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_telescope" title="Gregorian telescope"><span data-dcnode-id="3905" instrument_node="">Gregorian telescope</span></a><span data-dcnode-id="3903" instrument_node="">.</span></div></div></div><span data-dcnode-id="3899" instrument_node="">
</span><p data-dcnode-id="3875"><span data-dcnode-id="3898" instrument_node="">In 1636 </span><a data-dcnode-id="3896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marin_Mersenne" title="Marin Mersenne"><span data-dcnode-id="3897" instrument_node="">Marin Mersenne</span></a><span data-dcnode-id="3895" instrument_node=""> proposed a telescope consisting of a paraboloidal primary mirror and a paraboloidal secondary mirror bouncing the image through a hole in the primary, solving the problem of viewing the image.</span><sup class="reference" data-dcnode-id="3892" id="cite_ref-53"><a data-dcnode-id="3893" href="#cite_note-53"><span data-dcnode-id="3894" instrument_node="">[53]</span></a></sup><span data-dcnode-id="3891" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Gregory_%28astronomer_and_mathematician%29" title="James Gregory (astronomer and mathematician)"><span data-dcnode-id="3890" instrument_node="">James Gregory</span></a><span data-dcnode-id="3888" instrument_node=""> went into further detail in his book </span><i data-dcnode-id="3886"><span data-dcnode-id="3887" instrument_node="">Optica Promota</span></i><span data-dcnode-id="3885" instrument_node=""> (1663), pointing out that a reflecting telescope with a mirror that was shaped like the part of a </span><a data-dcnode-id="3883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conic_section" title="Conic section"><span data-dcnode-id="3884" instrument_node="">conic section</span></a><span data-dcnode-id="3882" instrument_node="">, would correct </span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spherical_aberration" title="Spherical aberration"><span data-dcnode-id="3881" instrument_node="">spherical aberration</span></a><span data-dcnode-id="3879" instrument_node=""> as well as the chromatic aberration seen in refractors. The design he came up with bears his name: the "</span><a data-dcnode-id="3877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gregorian_telescope" title="Gregorian telescope"><span data-dcnode-id="3878" instrument_node="">Gregorian telescope</span></a><span data-dcnode-id="3876" instrument_node="">"; but according to his own confession, Gregory had no practical skill and he could find no optician capable of realizing his ideas and after some fruitless attempts, was obliged to abandon all hope of bringing his telescope into practical use.
</span></p><span data-dcnode-id="3874" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3862"><div class="thumbinner" data-dcnode-id="3863" style="width:352px;"><a class="image" data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALaNature1873_coupe_telescope_foucault.png"><img alt="" class="thumbimage" data-dcnode-id="3873" data-file-height="129" data-file-width="499" decoding="async" height="90" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaNature1873_coupe_telescope_foucault.png/350px-LaNature1873_coupe_telescope_foucault.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/0/0f/LaNature1873_coupe_telescope_foucault.png 1.5x" width="350"></a><span data-dcnode-id="3871" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3864"><div class="magnify" data-dcnode-id="3869"><a class="internal" data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALaNature1873_coupe_telescope_foucault.png" title="Enlarge"></a></div><span data-dcnode-id="3868" instrument_node="">Light path in a </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newtonian_telescope" title="Newtonian telescope"><span data-dcnode-id="3867" instrument_node="">Newtonian telescope</span></a><span data-dcnode-id="3865" instrument_node="">.</span></div></div></div><span data-dcnode-id="3861" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3846"><div class="thumbinner" data-dcnode-id="3847" style="width:222px;"><a class="image" data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANewtonsTelescopeReplica.jpg"><img alt="" class="thumbimage" data-dcnode-id="3860" data-file-height="891" data-file-width="1024" decoding="async" height="191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/NewtonsTelescopeReplica.jpg/220px-NewtonsTelescopeReplica.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cc/NewtonsTelescopeReplica.jpg/330px-NewtonsTelescopeReplica.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cc/NewtonsTelescopeReplica.jpg/440px-NewtonsTelescopeReplica.jpg 2x" width="220"></a><span data-dcnode-id="3858" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3848"><div class="magnify" data-dcnode-id="3856"><a class="internal" data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANewtonsTelescopeReplica.jpg" title="Enlarge"></a></div><span data-dcnode-id="3855" instrument_node="">A replica of Newton's second reflecting telescope which was presented to the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Society" title="Royal Society"><span data-dcnode-id="3854" instrument_node="">Royal Society</span></a><span data-dcnode-id="3852" instrument_node=""> in 1672.</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-54"><a data-dcnode-id="3850" href="#cite_note-54"><span data-dcnode-id="3851" instrument_node="">[54]</span></a></sup></div></div></div><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3766"><span data-dcnode-id="3844" instrument_node="">In 1666 </span><a data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Isaac_Newton" title="Isaac Newton"><span data-dcnode-id="3843" instrument_node="">Isaac Newton</span></a><span data-dcnode-id="3841" instrument_node="">, based on his theories of refraction and color, perceived that the faults of the refracting telescope were due more to a lens's varying refraction of light of different colors than to a lens's imperfect shape. He concluded that light could not be refracted through a lens without causing chromatic aberrations, although he incorrectly concluded from some rough experiments</span><sup class="reference" data-dcnode-id="3838" id="cite_ref-55"><a data-dcnode-id="3839" href="#cite_note-55"><span data-dcnode-id="3840" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3837" instrument_node=""> that </span><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">all</span></i><span data-dcnode-id="3834" instrument_node=""> refracting substances would diverge the prismatic colors in a constant proportion to their mean refraction. From these experiments Newton concluded that no improvement could be made in the refracting telescope.</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-56"><a data-dcnode-id="3832" href="#cite_note-56"><span data-dcnode-id="3833" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3830" instrument_node=""> Newton's experiments with mirrors showed that they did not suffer from the chromatic errors of lenses, for all colors of light the </span><a data-dcnode-id="3828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angle_of_incidence_%28optics%29" title="Angle of incidence (optics)"><span data-dcnode-id="3829" instrument_node="">angle of incidence</span></a><span data-dcnode-id="3827" instrument_node=""> reflected in a mirror was equal to the </span><a class="mw-redirect" data-dcnode-id="3825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angle_of_reflection" title="Angle of reflection"><span data-dcnode-id="3826" instrument_node="">angle of reflection</span></a><span data-dcnode-id="3824" instrument_node="">, so as a proof to his theories Newton set out to build a reflecting telescope.</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-57"><a data-dcnode-id="3822" href="#cite_note-57"><span data-dcnode-id="3823" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3820" instrument_node=""> Newton completed his </span><a class="mw-redirect" data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newton%2527s_Reflector" title="Newton's Reflector"><span data-dcnode-id="3819" instrument_node="">first telescope</span></a><span data-dcnode-id="3817" instrument_node=""> in 1668 and it is the earliest known functional reflecting telescope.</span><sup class="reference" data-dcnode-id="3814" id="cite_ref-mymathdone.com_58-0"><a data-dcnode-id="3815" href="#cite_note-mymathdone.com-58"><span data-dcnode-id="3816" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3813" instrument_node="">  After much experiment, he chose an </span><a data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alloy" title="Alloy"><span data-dcnode-id="3812" instrument_node="">alloy</span></a><span data-dcnode-id="3810" instrument_node=""> (</span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speculum_metal" title="Speculum metal"><span data-dcnode-id="3809" instrument_node="">speculum metal</span></a><span data-dcnode-id="3807" instrument_node="">) of </span><a data-dcnode-id="3805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tin" title="Tin"><span data-dcnode-id="3806" instrument_node="">tin</span></a><span data-dcnode-id="3804" instrument_node=""> and </span><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copper" title="Copper"><span data-dcnode-id="3803" instrument_node="">copper</span></a><span data-dcnode-id="3801" instrument_node=""> as the most suitable material for his </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3800" instrument_node="">objective</span></a><span data-dcnode-id="3798" instrument_node="">  mirror. He later devised means for grinding and polishing them, but chose a spherical shape for his mirror instead of a parabola to simplify construction. He added to his reflector what is the hallmark of the design of a "</span><i data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">Newtonian telescope</span></i><span data-dcnode-id="3795" instrument_node="">", a secondary "diagonal" mirror near the primary mirror's focus to reflect the image at 90° angle to an </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eyepiece" title="Eyepiece"><span data-dcnode-id="3794" instrument_node="">eyepiece</span></a><span data-dcnode-id="3792" instrument_node=""> mounted on the side of the telescope. This unique addition allowed the image to be viewed with minimal obstruction of the objective mirror. He also made all the tube, </span><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope_mount" title="Telescope mount"><span data-dcnode-id="3791" instrument_node="">mount</span></a><span data-dcnode-id="3789" instrument_node="">, and fittings. Newton's first compact reflecting telescope had a mirror diameter of 1.3&nbsp;inches and a </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/F-number%23Focal_ratio_in_telescopes" title="F-number"><span data-dcnode-id="3788" instrument_node="">focal ratio</span></a><span data-dcnode-id="3786" instrument_node=""> of f/5.</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-59"><a data-dcnode-id="3784" href="#cite_note-59"><span data-dcnode-id="3785" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3782" instrument_node=""> With it he found that he could see the four </span><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galilean_moons" title="Galilean moons"><span data-dcnode-id="3781" instrument_node="">Galilean moons</span></a><span data-dcnode-id="3779" instrument_node=""> of </span><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jupiter" title="Jupiter"><span data-dcnode-id="3778" instrument_node="">Jupiter</span></a><span data-dcnode-id="3776" instrument_node=""> and the </span><a data-dcnode-id="3774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venus%23Observability" title="Venus"><span data-dcnode-id="3775" instrument_node="">crescent phase of the planet Venus</span></a><span data-dcnode-id="3773" instrument_node="">. Encouraged by this success, he made a second telescope with a magnifying power of 38x which he presented to the </span><a class="mw-redirect" data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Society_of_London" title="Royal Society of London"><span data-dcnode-id="3772" instrument_node="">Royal Society of London</span></a><span data-dcnode-id="3770" instrument_node=""> in December 1672. This type of telescope is still called a </span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newtonian_telescope" title="Newtonian telescope"><span data-dcnode-id="3769" instrument_node="">Newtonian telescope</span></a><span data-dcnode-id="3767" instrument_node="">.
</span></p><span data-dcnode-id="3765" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3753"><div class="thumbinner" data-dcnode-id="3754" style="width:352px;"><a class="image" data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALanature1873_telescope_cassegrain.png"><img alt="" class="thumbimage" data-dcnode-id="3764" data-file-height="111" data-file-width="516" decoding="async" height="75" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Lanature1873_telescope_cassegrain.png/350px-Lanature1873_telescope_cassegrain.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/3/3c/Lanature1873_telescope_cassegrain.png 1.5x" width="350"></a><span data-dcnode-id="3762" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3755"><div class="magnify" data-dcnode-id="3760"><a class="internal" data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALanature1873_telescope_cassegrain.png" title="Enlarge"></a></div><span data-dcnode-id="3759" instrument_node="">Light path in a </span><a class="mw-redirect" data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassegrain_telescope" title="Cassegrain telescope"><span data-dcnode-id="3758" instrument_node="">Cassegrain telescope</span></a><span data-dcnode-id="3756" instrument_node="">.</span></div></div></div><span data-dcnode-id="3752" instrument_node="">
</span><p data-dcnode-id="3741"><span data-dcnode-id="3751" instrument_node="">A third form of reflecting telescope, the "</span><a data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cassegrain_reflector" title="Cassegrain reflector"><span data-dcnode-id="3750" instrument_node="">Cassegrain reflector</span></a><span data-dcnode-id="3748" instrument_node="">" was devised in 1672 by </span><a data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laurent_Cassegrain" title="Laurent Cassegrain"><span data-dcnode-id="3747" instrument_node="">Laurent Cassegrain</span></a><span data-dcnode-id="3745" instrument_node="">. The telescope had a small convex </span><a data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hyperboloid" title="Hyperboloid"><span data-dcnode-id="3744" instrument_node="">hyperboloidal</span></a><span data-dcnode-id="3742" instrument_node=""> secondary mirror placed near the prime focus to reflect light through a central hole in the main mirror.
</span></p><p data-dcnode-id="3704"><span data-dcnode-id="3740" instrument_node="">No further practical advance appears to have been made in the design or construction of the reflecting telescopes for another 50 years until </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Hadley" title="John Hadley"><span data-dcnode-id="3739" instrument_node="">John Hadley</span></a><span data-dcnode-id="3737" instrument_node=""> (best known as the inventor of the </span><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Octant_%28instrument%29" title="Octant (instrument)"><span data-dcnode-id="3736" instrument_node="">octant</span></a><span data-dcnode-id="3734" instrument_node="">) developed ways to make precision aspheric and </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parabolic_reflector" title="Parabolic reflector"><span data-dcnode-id="3733" instrument_node="">parabolic</span></a><span data-dcnode-id="3731" instrument_node=""> speculum metal mirrors. In 1721 he showed the first parabolic Newtonian reflector to the Royal Society.</span><sup class="reference" data-dcnode-id="3728" id="cite_ref-60"><a data-dcnode-id="3729" href="#cite_note-60"><span data-dcnode-id="3730" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3727" instrument_node=""> It had a 6-inch (15&nbsp;cm) diameter, </span><span class="frac" data-dcnode-id="3716" role="math"><span data-dcnode-id="3724" instrument_node="">62</span><span class="sr-only" data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">+</span></span><span class="num" data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">3</span></span><span data-dcnode-id="3719" instrument_node="">⁄</span><span class="den" data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">4</span></span></span><span data-dcnode-id="3715" instrument_node="">-inch (159&nbsp;cm) focal length speculum metal objective mirror. The instrument was examined by </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Pound" title="James Pound"><span data-dcnode-id="3714" instrument_node="">James Pound</span></a><span data-dcnode-id="3712" instrument_node=""> and </span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Bradley" title="James Bradley"><span data-dcnode-id="3711" instrument_node="">James Bradley</span></a><span data-dcnode-id="3709" instrument_node="">.</span><sup class="reference" data-dcnode-id="3706" id="cite_ref-61"><a data-dcnode-id="3707" href="#cite_note-61"><span data-dcnode-id="3708" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3705" instrument_node=""> After remarking that Newton's telescope had lain neglected for fifty years, they stated that Hadley had sufficiently shown that the invention did not consist in bare theory. They compared its performance with that of a 7.5 inches (190&nbsp;mm) diameter aerial telescope originally presented to the Royal Society by Constantijn Huygens, Jr. and found that Hadley's reflector, "will bear such a charge as to make it magnify the object as many times as the latter with its due charge", and that it represents objects as distinct, though not altogether so clear and bright.
</span></p><p data-dcnode-id="3695"><span data-dcnode-id="3703" instrument_node="">Bradley and </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Molyneux" title="Samuel Molyneux"><span data-dcnode-id="3702" instrument_node="">Samuel Molyneux</span></a><span data-dcnode-id="3700" instrument_node="">, having been instructed by Hadley in his methods of polishing speculum metal, succeeded in producing large reflecting telescopes of their own, one of which had a focal length of 8&nbsp;ft (2.4&nbsp;m). These methods of fabricating mirrors were passed on by Molyneux to two London opticians —Scarlet and Hearn— who started a business manufacturing telescopes.</span><sup class="reference" data-dcnode-id="3697" id="cite_ref-62"><a data-dcnode-id="3698" href="#cite_note-62"><span data-dcnode-id="3699" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3696" instrument_node="">
</span></p><p data-dcnode-id="3684"><span data-dcnode-id="3694" instrument_node="">The British mathematician, optician </span><a data-dcnode-id="3692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Short_%28mathematician%29" title="James Short (mathematician)"><span data-dcnode-id="3693" instrument_node="">James Short</span></a><span data-dcnode-id="3691" instrument_node=""> began experimenting with building telescopes based on Gregory's designs in the 1730s. He first tried making his mirrors out of glass as suggested by Gregory, but he later switched to speculum metal mirrors creating Gregorian telescopes with original designers </span><a data-dcnode-id="3689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parabolic_reflector" title="Parabolic reflector"><span data-dcnode-id="3690" instrument_node="">parabolic</span></a><span data-dcnode-id="3688" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elliptic" title="Elliptic"><span data-dcnode-id="3687" instrument_node="">elliptic</span></a><span data-dcnode-id="3685" instrument_node=""> figures. Short then adopted telescope-making as his profession which he practised first in Edinburgh, and afterward in London. All Short's telescopes were of the Gregorian form. Short died in London in 1768, having made a considerable fortune selling telescopes.
</span></p><p data-dcnode-id="3669"><span data-dcnode-id="3683" instrument_node="">Since speculum metal mirror secondaries or diagonal mirrors greatly reduced the light that reached the eyepiece, several reflecting telescope designers tried to do away with them. In 1762 </span><a data-dcnode-id="3681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Lomonosov" title="Mikhail Lomonosov"><span data-dcnode-id="3682" instrument_node="">Mikhail Lomonosov</span></a><span data-dcnode-id="3680" instrument_node=""> presented a reflecting telescope before the </span><a data-dcnode-id="3678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Academy_of_Sciences" title="Russian Academy of Sciences"><span data-dcnode-id="3679" instrument_node="">Russian Academy of Sciences</span></a><span data-dcnode-id="3677" instrument_node=""> forum. It had its primary mirror tilted at four degrees to telescope's axis so the image could be viewed via an eyepiece mounted at the front of the telescope tube without the observer's head blocking the incoming light. This innovation was not published until 1827, so this type came to be called the Herschelian telescope after a similar design by </span><a data-dcnode-id="3675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Herschel" title="William Herschel"><span data-dcnode-id="3676" instrument_node="">William Herschel</span></a><span data-dcnode-id="3674" instrument_node="">.</span><sup class="reference" data-dcnode-id="3671" id="cite_ref-63"><a data-dcnode-id="3672" href="#cite_note-63"><span data-dcnode-id="3673" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3670" instrument_node="">
</span></p><span data-dcnode-id="3668" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3654"><div class="thumbinner" data-dcnode-id="3655" style="width:222px;"><a class="image" data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png"><img alt="" class="thumbimage" data-dcnode-id="3667" data-file-height="2477" data-file-width="2113" decoding="async" height="258" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png/220px-40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b8/40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png/330px-40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b8/40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png/440px-40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png 2x" width="220"></a><span data-dcnode-id="3665" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3656"><div class="magnify" data-dcnode-id="3663"><a class="internal" data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A40_foot_telescope_120_cm_48_inch_reflecting_telescope_William_Herschel.png" title="Enlarge"></a></div><a data-dcnode-id="3661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Herschel" title="William Herschel"><span data-dcnode-id="3662" instrument_node="">William Herschel</span></a><span data-dcnode-id="3660" instrument_node="">'s 49-inch (1,200&nbsp;mm) "40-foot" telescope of 1789. Illustration from </span><a data-dcnode-id="3658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Encyclop%25C3%25A6dia_Britannica_Third_Edition" title="Encyclopædia Britannica Third Edition"><span data-dcnode-id="3659" instrument_node="">Encyclopædia Britannica Third Edition</span></a><span data-dcnode-id="3657" instrument_node=""> published in 1797.</span></div></div></div><span data-dcnode-id="3653" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3652" instrument_node="">About the year 1774 William Herschel (then a teacher of music in </span><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bath%2C_Somerset" title="Bath, Somerset"><span data-dcnode-id="3651" instrument_node="">Bath</span></a><span data-dcnode-id="3649" instrument_node="">, </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/England" title="England"><span data-dcnode-id="3648" instrument_node="">England</span></a><span data-dcnode-id="3646" instrument_node="">) began to occupy his leisure hours with the construction of reflector telescope mirrors, finally devoted himself entirely to their construction and use in astronomical research. In 1778, he selected a </span><link data-dcnode-id="3645" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="3636" role="math"><span data-dcnode-id="3644" instrument_node="">6</span><span class="sr-only" data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">+</span></span><span class="num" data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">1</span></span><span data-dcnode-id="3639" instrument_node="">⁄</span><span class="den" data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">4</span></span></span><span data-dcnode-id="3635" instrument_node="">-inch (16&nbsp;cm) reflector mirror (the best of some 400 telescope mirrors which he had made) and with it, built a 7-foot (2.1&nbsp;m) focal length telescope. Using this telescope, he made his early brilliant astronomical discoveries. In 1783, Herschel completed a reflector of approximately 18 inches (46&nbsp;cm) in diameter and 20&nbsp;ft (6.1&nbsp;m) focal length. He observed the heavens with this telescope for some twenty years, replacing the mirror several times. In 1789 Herschel finished building his largest reflecting telescope with a mirror of 49 inches (120&nbsp;cm) and a focal length of 40&nbsp;ft (12&nbsp;m), (commonly known as his </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/40-foot_telescope" title="40-foot telescope"><span data-dcnode-id="3634" instrument_node="">40-foot telescope</span></a><span data-dcnode-id="3632" instrument_node="">) at his new home, at </span><a data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Observatory_House" title="Observatory House"><span data-dcnode-id="3631" instrument_node="">Observatory House</span></a><span data-dcnode-id="3629" instrument_node=""> in </span><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slough" title="Slough"><span data-dcnode-id="3628" instrument_node="">Slough</span></a><span data-dcnode-id="3626" instrument_node="">, England. To cut down on the light loss from the poor reflectivity of the speculum mirrors of that day, Herschel eliminated the small diagonal mirror from his design and tilted his primary mirror so he could view the formed image directly. This design has come to be called the </span><a data-dcnode-id="3624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reflecting_telescope%23Reflecting_telescope_designs" title="Reflecting telescope"><span data-dcnode-id="3625" instrument_node="">Herschelian telescope</span></a><span data-dcnode-id="3623" instrument_node="">. He discovered Saturn's sixth known moon, </span><a class="mw-redirect" data-dcnode-id="3621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enceladus_%28moon%29" title="Enceladus (moon)"><span data-dcnode-id="3622" instrument_node="">Enceladus</span></a><span data-dcnode-id="3620" instrument_node="">, the first night he used it (August 28, 1789), and on September 17, its seventh known moon, Mimas. This telescope was world's largest telescope for over 50 years. However, this large scope was difficult to handle and thus less used than his favorite 18.7-inch reflector.
</span></p><p data-dcnode-id="3608"><span data-dcnode-id="3618" instrument_node="">In 1845 </span><a data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Parsons%2C_3rd_Earl_of_Rosse" title="William Parsons, 3rd Earl of Rosse"><span data-dcnode-id="3617" instrument_node="">William Parsons, 3rd Earl of Rosse</span></a><span data-dcnode-id="3615" instrument_node=""> built his 72-inch (180&nbsp;cm) Newtonian reflector called the "</span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leviathan_of_Parsonstown" title="Leviathan of Parsonstown"><span data-dcnode-id="3614" instrument_node="">Leviathan of Parsonstown</span></a><span data-dcnode-id="3612" instrument_node="">" with which he discovered the spiral form of </span><a class="mw-redirect" data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Galaxies" title="Galaxies"><span data-dcnode-id="3611" instrument_node="">galaxies</span></a><span data-dcnode-id="3609" instrument_node="">.
</span></p><p data-dcnode-id="3603"><span data-dcnode-id="3607" instrument_node="">All of these larger reflectors suffered from the poor reflectivity and fast tarnishing nature of their speculum metal mirrors. This meant they need more than one mirror per telescope since mirrors had to be frequently removed and re-polished. This was time-consuming since the polishing process could change the curve of the mirror, so it usually had to be "</span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Figuring" title="Figuring"><span data-dcnode-id="3606" instrument_node="">re-figured</span></a><span data-dcnode-id="3604" instrument_node="">" to the correct shape.
</span></p><span data-dcnode-id="3602" instrument_node="">
</span><h4 data-dcnode-id="3599"><span class="mw-headline" data-dcnode-id="3600" id="Achromatic_refracting_telescopes"><span data-dcnode-id="3601" instrument_node="">Achromatic refracting telescopes</span></span></h4><span data-dcnode-id="3598" instrument_node="">
</span><link data-dcnode-id="3597" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3593" role="note"><span data-dcnode-id="3596" instrument_node="">See also: </span><a data-dcnode-id="3594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="3595" instrument_node="">Achromatic lens</span></a></div><span data-dcnode-id="3592" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3580"><div class="thumbinner" data-dcnode-id="3581" style="width:222px;"><a class="image" data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAchromat_doublet_en.svg"><img alt="" class="thumbimage" data-dcnode-id="3591" data-file-height="350" data-file-width="500" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Achromat_doublet_en.svg/220px-Achromat_doublet_en.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Achromat_doublet_en.svg/330px-Achromat_doublet_en.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/46/Achromat_doublet_en.svg/440px-Achromat_doublet_en.svg.png 2x" width="220"></a><span data-dcnode-id="3589" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3582"><div class="magnify" data-dcnode-id="3587"><a class="internal" data-dcnode-id="3588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAchromat_doublet_en.svg" title="Enlarge"></a></div><span data-dcnode-id="3586" instrument_node="">Light path through an </span><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="3585" instrument_node="">achromatic lens</span></a><span data-dcnode-id="3583" instrument_node="">.</span></div></div></div><span data-dcnode-id="3579" instrument_node="">
</span><p data-dcnode-id="3570"><span data-dcnode-id="3578" instrument_node="">From the time of the invention of the first refracting telescopes it was generally supposed that chromatic errors seen in lenses simply arose from errors in the spherical figure of their surfaces. Opticians tried to construct lenses of varying forms of curvature to correct these errors.</span><sup class="reference" data-dcnode-id="3575" id="cite_ref-autogenerated1_39-5"><a data-dcnode-id="3576" href="#cite_note-autogenerated1-39"><span data-dcnode-id="3577" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3574" instrument_node=""> Isaac Newton discovered in 1666 that chromatic colors actually arose from the un-even refraction of light as it passed through the glass medium. This led opticians to experiment with lenses constructed of more than one type of glass in an attempt to canceling the errors produced by each type of glass. It was hoped that this would create an "</span><a data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Achromatic_lens" title="Achromatic lens"><span data-dcnode-id="3573" instrument_node="">achromatic lens</span></a><span data-dcnode-id="3571" instrument_node="">"; a lens that would focus all colors to a single point, and produce instruments of much shorter focal length.
</span></p><p data-dcnode-id="3537"><span data-dcnode-id="3569" instrument_node="">The first person who succeeded in making a practical achromatic refracting telescope was </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chester_Moore_Hall" title="Chester Moore Hall"><span data-dcnode-id="3568" instrument_node="">Chester Moore Hall</span></a><span data-dcnode-id="3566" instrument_node=""> from </span><a class="mw-redirect" data-dcnode-id="3564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Essex%2C_England" title="Essex, England"><span data-dcnode-id="3565" instrument_node="">Essex, England</span></a><span data-dcnode-id="3563" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3556" style="white-space:nowrap;"><span data-dcnode-id="3562" instrument_node="">[</span><i data-dcnode-id="3558"><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3560" title="This claim needs references to reliable sources. (August 2008)"><span data-dcnode-id="3561" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3557" instrument_node="">]</span></sup><span data-dcnode-id="3555" instrument_node=""> He argued that the different humours of the human eye refract rays of light to produce an image on the </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Retina" title="Retina"><span data-dcnode-id="3554" instrument_node="">retina</span></a><span data-dcnode-id="3552" instrument_node=""> which is free from color, and he reasonably argued that it might be possible to produce a like result by combining lenses composed of different refracting media. After devoting some time to the inquiry he found that by combining two lenses formed of different kinds of glass, he could make an achromatic lens where the effects of the unequal refractions of two colors of light (red and blue) was corrected. In 1733, he succeeded in constructing telescope lenses which exhibited much reduced </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chromatic_aberration" title="Chromatic aberration"><span data-dcnode-id="3551" instrument_node="">chromatic aberration</span></a><span data-dcnode-id="3549" instrument_node="">. One of his instruments had an objective measuring </span><link data-dcnode-id="3548" href="mw-data:TemplateStyles:r1020198016" rel="mw-deduplicated-inline-style"><span class="frac" data-dcnode-id="3539" role="math"><span data-dcnode-id="3547" instrument_node="">2</span><span class="sr-only" data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">+</span></span><span class="num" data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">1</span></span><span data-dcnode-id="3542" instrument_node="">⁄</span><span class="den" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">2</span></span></span><span data-dcnode-id="3538" instrument_node=""> inches (6.4&nbsp;cm) with a relatively short focal length of 20 inches (51&nbsp;cm).
</span></p><p data-dcnode-id="3529"><span data-dcnode-id="3536" instrument_node="">Hall was a man of independent means and seems to have been careless of fame; at least he took no trouble to communicate his invention to the world. At a trial in Westminster Hall about the patent rights granted to </span><a data-dcnode-id="3534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dollond" title="John Dollond"><span data-dcnode-id="3535" instrument_node="">John Dollond</span></a><span data-dcnode-id="3533" instrument_node=""> (Watkin v. Dollond), Hall was admitted to be the first inventor of the achromatic telescope. However, it was ruled by </span><a class="mw-redirect" data-dcnode-id="3531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lord_Mansfield" title="Lord Mansfield"><span data-dcnode-id="3532" instrument_node="">Lord Mansfield</span></a><span data-dcnode-id="3530" instrument_node=""> that it was not the original inventor who ought to profit from such invention, but the one who brought it forth for the benefit of mankind.
</span></p><p data-dcnode-id="3518"><span data-dcnode-id="3528" instrument_node="">In 1747, </span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonhard_Euler" title="Leonhard Euler"><span data-dcnode-id="3527" instrument_node="">Leonhard Euler</span></a><span data-dcnode-id="3525" instrument_node=""> sent to the </span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prussian_Academy_of_Sciences" title="Prussian Academy of Sciences"><span data-dcnode-id="3524" instrument_node="">Prussian Academy of Sciences</span></a><span data-dcnode-id="3522" instrument_node=""> a paper in which he tried to prove the possibility of correcting both the chromatic and the spherical aberration of a lens. Like Gregory and Hall, he argued that since the various humours of the human eye were so combined as to produce a perfect image, it should be possible by suitable combinations of lenses of different refracting media to construct a perfect telescope </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Objective_%28optics%29" title="Objective (optics)"><span data-dcnode-id="3521" instrument_node="">objective</span></a><span data-dcnode-id="3519" instrument_node="">. Adopting a hypothetical law of the dispersion of differently colored rays of light, he proved analytically the possibility of constructing an achromatic objective composed of lenses of glass and water.
</span></p><p data-dcnode-id="3499"><span data-dcnode-id="3517" instrument_node="">All of Euler's efforts to produce an actual objective of this construction were fruitless—a failure which he attributed solely to the difficulty of procuring lenses that worked precisely to the requisite curves.</span><sup class="reference" data-dcnode-id="3514" id="cite_ref-64"><a data-dcnode-id="3515" href="#cite_note-64"><span data-dcnode-id="3516" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3513" instrument_node=""> </span><a data-dcnode-id="3511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Dollond" title="John Dollond"><span data-dcnode-id="3512" instrument_node="">John Dollond</span></a><span data-dcnode-id="3510" instrument_node=""> agreed with the accuracy of Euler's analysis, but disputed his hypothesis on the grounds that it was purely a theoretical assumption: that the theory was opposed to the results of Newton's </span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_method" title="Scientific method"><span data-dcnode-id="3509" instrument_node="">experiments</span></a><span data-dcnode-id="3507" instrument_node=""> on the refraction of light, and that it was impossible to determine a </span><a class="mw-redirect" data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physical_law" title="Physical law"><span data-dcnode-id="3506" instrument_node="">physical law</span></a><span data-dcnode-id="3504" instrument_node=""> from analytical reasoning alone.</span><sup class="reference" data-dcnode-id="3501" id="cite_ref-65"><a data-dcnode-id="3502" href="#cite_note-65"><span data-dcnode-id="3503" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3500" instrument_node="">
</span></p><p data-dcnode-id="3494"><span data-dcnode-id="3498" instrument_node="">In 1754, Euler sent to the Berlin Academy a further paper in which starting from the hypothesis that light consists of vibrations excited in an elastic fluid by luminous bodies—and that the difference of color of light is due to the greater or lesser </span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electromagnetic_spectrum" title="Electromagnetic spectrum"><span data-dcnode-id="3497" instrument_node="">frequency</span></a><span data-dcnode-id="3495" instrument_node=""> of these vibrations in a given time— he deduced his previous results. He did not doubt the accuracy of Newton's experiments quoted by Dollond.
</span></p><p data-dcnode-id="3486"><span data-dcnode-id="3493" instrument_node="">Dollond did not reply to this, but soon afterwards he received an abstract of a paper by the </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sweden" title="Sweden"><span data-dcnode-id="3492" instrument_node="">Swedish</span></a><span data-dcnode-id="3490" instrument_node=""> mathematician and astronomer, </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Klingenstierna" title="Samuel Klingenstierna"><span data-dcnode-id="3489" instrument_node="">Samuel Klingenstierna</span></a><span data-dcnode-id="3487" instrument_node="">, which led him to doubt the accuracy of the results deduced by Newton on the dispersion of refracted light. Klingenstierna showed from purely geometrical considerations (fully appreciated by Dollond) that the results of Newton's experiments could not be brought into harmony with other universally accepted facts of refraction.
</span></p><span data-dcnode-id="3485" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3476"><div class="thumbinner" data-dcnode-id="3477" style="width:222px;"><a class="image" data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AG%25C3%25B6ttingen-Dollond-Teleskop.JPG"><img alt="" class="thumbimage" data-dcnode-id="3484" data-file-height="2136" data-file-width="2848" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/G%25C3%25B6ttingen-Dollond-Teleskop.JPG/220px-G%25C3%25B6ttingen-Dollond-Teleskop.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8d/G%C3%B6ttingen-Dollond-Teleskop.JPG/330px-G%C3%B6ttingen-Dollond-Teleskop.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8d/G%C3%B6ttingen-Dollond-Teleskop.JPG/440px-G%C3%B6ttingen-Dollond-Teleskop.JPG 2x" width="220"></a><span data-dcnode-id="3482" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3478"><div class="magnify" data-dcnode-id="3480"><a class="internal" data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AG%25C3%25B6ttingen-Dollond-Teleskop.JPG" title="Enlarge"></a></div><span data-dcnode-id="3479" instrument_node="">Dollond telescope.</span></div></div></div><span data-dcnode-id="3475" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3474" instrument_node="">As a practical man, Dollond at once put his doubts to the test of experiment: he confirmed the conclusions of Klingenstierna, discovered a difference far beyond his hopes in the refractive qualities of different kinds of glass with respect to the </span><a data-dcnode-id="3472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refraction" title="Refraction"><span data-dcnode-id="3473" instrument_node="">divergence</span></a><span data-dcnode-id="3471" instrument_node=""> of colors, and was thus rapidly led to the construction of lenses in which first the chromatic aberration—and afterwards—the spherical aberration were corrected.</span><sup class="reference" data-dcnode-id="3468" id="cite_ref-autogenerated3_66-0"><a data-dcnode-id="3469" href="#cite_note-autogenerated3-66"><span data-dcnode-id="3470" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3467" instrument_node="">
</span></p><p data-dcnode-id="3457"><span data-dcnode-id="3465" instrument_node="">Dollond was aware of the conditions necessary for the attainment of achromatism in refracting telescopes, but relied on the accuracy of experiments made by Newton. His writings show that with the exception of his </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Courage" title="Courage"><span data-dcnode-id="3464" instrument_node="">bravado</span></a><span data-dcnode-id="3462" instrument_node="">, he would have arrived sooner at a discovery for which his mind was fully prepared. Dollond's paper</span><sup class="reference" data-dcnode-id="3459" id="cite_ref-autogenerated3_66-1"><a data-dcnode-id="3460" href="#cite_note-autogenerated3-66"><span data-dcnode-id="3461" instrument_node="">[66]</span></a></sup><span data-dcnode-id="3458" instrument_node=""> recounts the successive steps by which he arrived at his discovery independently of Hall's earlier invention—and the logical processes by which these steps were suggested to his mind.
</span></p><p data-dcnode-id="3444"><span data-dcnode-id="3456" instrument_node="">In 1765 Peter Dollond (son of John Dollond) introduced the triple objective, which consisted of a combination of two convex lenses of crown glass with a concave </span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flint_glass" title="Flint glass"><span data-dcnode-id="3455" instrument_node="">flint</span></a><span data-dcnode-id="3453" instrument_node=""> lens between them. He made many telescopes of this kind.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3446" style="white-space:nowrap;"><span data-dcnode-id="3452" instrument_node="">[</span><i data-dcnode-id="3448"><a data-dcnode-id="3449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3450" title="This claim needs references to reliable sources. (August 2008)"><span data-dcnode-id="3451" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3447" instrument_node="">]</span></sup><span data-dcnode-id="3445" instrument_node="">
</span></p><p data-dcnode-id="3439"><span data-dcnode-id="3443" instrument_node="">The difficulty of procuring disks of glass (especially of flint glass) of suitable purity and homogeneity limited the diameter and light gathering power of the lenses found in the achromatic telescope. It was in vain that the </span><a data-dcnode-id="3441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Academy_of_Sciences" title="French Academy of Sciences"><span data-dcnode-id="3442" instrument_node="">French Academy of Sciences</span></a><span data-dcnode-id="3440" instrument_node=""> offered prizes for large perfect disks of optical flint glass.
</span></p><p data-dcnode-id="3417"><span data-dcnode-id="3438" instrument_node="">The difficulties with the impractical metal mirrors of reflecting telescopes led to the construction of large refracting telescopes. By 1866 refracting telescopes had reached 18 inches (46&nbsp;cm) in aperture with many larger "</span><i data-dcnode-id="3435"><a data-dcnode-id="3436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_refractor" title="Great refractor"><span data-dcnode-id="3437" instrument_node="">Great refractors</span></a></i><span data-dcnode-id="3434" instrument_node="">" being built in the mid to late 19th century. In 1897, the refractor reached its maximum practical limit in a research telescope with the construction of the </span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yerkes_Observatory" title="Yerkes Observatory"><span data-dcnode-id="3433" instrument_node="">Yerkes Observatorys</span></a><span data-dcnode-id="3431" instrument_node="">' 40-inch (100&nbsp;cm) refractor (although a larger refractor </span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Paris_Exhibition_Telescope_of_1900" title="Great Paris Exhibition Telescope of 1900"><span data-dcnode-id="3430" instrument_node="">Great Paris Exhibition Telescope of 1900</span></a><span data-dcnode-id="3428" instrument_node=""> with an objective of 49.2 inches (1.25&nbsp;m) diameter was temporarily exhibited at the </span><a class="mw-redirect" data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_1900_Exposition" title="Paris 1900 Exposition"><span data-dcnode-id="3427" instrument_node="">Paris 1900 Exposition</span></a><span data-dcnode-id="3425" instrument_node="">). No larger refractors could be built because of </span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gravity" title="Gravity"><span data-dcnode-id="3424" instrument_node="">gravity</span></a><span data-dcnode-id="3422" instrument_node="">'s effect on the lens. Since a lens can only be held in place by its edge, the center of a large lens will sag due to gravity, distorting the image it produces.</span><sup class="reference" data-dcnode-id="3419" id="cite_ref-67"><a data-dcnode-id="3420" href="#cite_note-67"><span data-dcnode-id="3421" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3418" instrument_node="">
</span></p><span data-dcnode-id="3416" instrument_node="">
</span><h3 data-dcnode-id="3413"><span class="mw-headline" data-dcnode-id="3414" id="Large_reflecting_telescopes"><span data-dcnode-id="3415" instrument_node="">Large reflecting telescopes</span></span></h3><span data-dcnode-id="3412" instrument_node="">
</span><link data-dcnode-id="3411" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3407" role="note"><span data-dcnode-id="3410" instrument_node="">See also: </span><a data-dcnode-id="3408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_largest_optical_telescopes_historically" title="List of largest optical telescopes historically"><span data-dcnode-id="3409" instrument_node="">List of largest optical telescopes historically</span></a></div><span data-dcnode-id="3406" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3392"><div class="thumbinner" data-dcnode-id="3393" style="width:222px;"><a class="image" data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APalomar_arp_600pix.jpg"><img alt="" class="thumbimage" data-dcnode-id="3405" data-file-height="542" data-file-width="600" decoding="async" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/df/Palomar_arp_600pix.jpg/220px-Palomar_arp_600pix.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/df/Palomar_arp_600pix.jpg/330px-Palomar_arp_600pix.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/df/Palomar_arp_600pix.jpg/440px-Palomar_arp_600pix.jpg 2x" width="220"></a><span data-dcnode-id="3403" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3394"><div class="magnify" data-dcnode-id="3401"><a class="internal" data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APalomar_arp_600pix.jpg" title="Enlarge"></a></div><span data-dcnode-id="3400" instrument_node="">The 200-inch (5.1&nbsp;m) </span><a class="mw-redirect" data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hale_telescope" title="Hale telescope"><span data-dcnode-id="3399" instrument_node="">Hale telescope</span></a><span data-dcnode-id="3397" instrument_node=""> at </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palomar_Observatory" title="Palomar Observatory"><span data-dcnode-id="3396" instrument_node="">Mount Palomar</span></a></div></div></div><span data-dcnode-id="3391" instrument_node="">
</span><p data-dcnode-id="3383"><span data-dcnode-id="3390" instrument_node="">In 1856–57, </span><a class="mw-redirect" data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_August_von_Steinheil" title="Karl August von Steinheil"><span data-dcnode-id="3389" instrument_node="">Karl August von Steinheil</span></a><span data-dcnode-id="3387" instrument_node=""> and </span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25A9on_Foucault" title="Léon Foucault"><span data-dcnode-id="3386" instrument_node="">Léon Foucault</span></a><span data-dcnode-id="3384" instrument_node=""> introduced a process of depositing a layer of silver on glass telescope mirrors. The silver layer was not only much more reflective and longer lasting than the finish on speculum mirrors, it had the advantage of being able to be removed and re-deposited without changing the shape of the glass substrate. Towards the end of the 19th century very large silver on glass mirror reflecting telescopes were built.
</span></p><p data-dcnode-id="3336"><span data-dcnode-id="3382" instrument_node="">The beginning of the 20th century saw construction of the first of the "modern" large research reflectors, designed for precision photographic imaging and located at remote high altitude clear sky locations</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-68"><a data-dcnode-id="3380" href="#cite_note-68"><span data-dcnode-id="3381" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3378" instrument_node=""> such as the </span><a class="mw-redirect" data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/60-inch_Hale_telescope" title="60-inch Hale telescope"><span data-dcnode-id="3377" instrument_node="">60-inch Hale telescope</span></a><span data-dcnode-id="3375" instrument_node=""> of 1908, and the 100-inch (2.5&nbsp;m) </span><a class="mw-redirect" data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hooker_telescope" title="Hooker telescope"><span data-dcnode-id="3374" instrument_node="">Hooker telescope</span></a><span data-dcnode-id="3372" instrument_node=""> in 1917, both located at </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mount_Wilson_Observatory" title="Mount Wilson Observatory"><span data-dcnode-id="3371" instrument_node="">Mount Wilson Observatory</span></a><span data-dcnode-id="3369" instrument_node="">.</span><sup class="reference" data-dcnode-id="3366" id="cite_ref-69"><a data-dcnode-id="3367" href="#cite_note-69"><span data-dcnode-id="3368" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3365" instrument_node=""> These and other telescopes of this size had to have provisions to allow for the removal of their main mirrors for re-silvering every few months. John Donavan Strong, a young physicist at the </span><a data-dcnode-id="3363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California_Institute_of_Technology" title="California Institute of Technology"><span data-dcnode-id="3364" instrument_node="">California Institute of Technology</span></a><span data-dcnode-id="3362" instrument_node="">, developed a technique for coating a mirror with a much longer lasting aluminum coating using thermal </span><a data-dcnode-id="3360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vacuum_evaporation" title="Vacuum evaporation"><span data-dcnode-id="3361" instrument_node="">vacuum evaporation</span></a><span data-dcnode-id="3359" instrument_node="">. In 1932, he became the first person to "aluminize" a mirror; three years later the 60-inch (1,500&nbsp;mm) and 100-inch (2,500&nbsp;mm) telescopes became the first large astronomical telescopes to have their mirrors aluminized.</span><sup class="reference" data-dcnode-id="3356" id="cite_ref-70"><a data-dcnode-id="3357" href="#cite_note-70"><span data-dcnode-id="3358" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3355" instrument_node=""> 1948 saw the completion of the 200-inch (510&nbsp;cm) </span><a class="mw-redirect" data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hale_telescope" title="Hale telescope"><span data-dcnode-id="3354" instrument_node="">Hale reflector</span></a><span data-dcnode-id="3352" instrument_node=""> at </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palomar_Observatory" title="Palomar Observatory"><span data-dcnode-id="3351" instrument_node="">Mount Palomar</span></a><span data-dcnode-id="3349" instrument_node=""> which was the largest telescope in the world up until the completion of the massive 605&nbsp;cm (238&nbsp;in) </span><a data-dcnode-id="3347
