strument_node=""> </span><span class="date-container" data-dcnode-id="1104"><i data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">(</span><span class="date" data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">December 2013</span></span><span data-dcnode-id="1106" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="1097"><i data-dcnode-id="1098"><span data-dcnode-id="1103" instrument_node=""> (</span><small data-dcnode-id="1100"><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="1102" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="1099" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1090" instrument_node="">The following are lists of devices categorized as types of telescopes or devices associated with </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telescope" title="Telescope"><span data-dcnode-id="1089" instrument_node="">telescopes</span></a><span data-dcnode-id="1087" instrument_node="">. They are broken into major classifications with many variations due to professional, amateur, and commercial sub-types. Telescopes can be classified by optical design or mechanical design/construction. Telescopes can also be classified by where they are placed, such as </span><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_telescope" title="Space telescope"><span data-dcnode-id="1086" instrument_node="">space telescopes</span></a><span data-dcnode-id="1084" instrument_node="">. One major determining factor is type of light, or particle being observed including devices referred to as "telescopes" that do not form an image or use optics. Some telescopes are classified by the task they perform; for example </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Solar_telescope" title="Solar telescope"><span data-dcnode-id="1083" instrument_node="">Solar telescopes</span></a><span data-dcnode-id="1081" instrument_node=""> are all designs that look at the </span><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sun" title="Sun"><span data-dcnode-id="1080" instrument_node="">Sun</span></a><span data-dcnode-id="1078" instrument_node="">, </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dobsonian_telescope" title="Dobsonian telescope"><span data-dcnode-id="1077" instrument_node="">Dobsonian telescopes</span></a><span data-dcnode-id="1075" instrument_node=""> are designed to be low cost and portable, </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aerial_telescope" title="Aerial telescope"><span data-dcnode-id="1074" instrument_node="">Aerial telescopes</span></a><span data-dcnode-id="1072" instrument_node=""> overcame the optical shortcomings of 17th-century objective lenses, etc.
