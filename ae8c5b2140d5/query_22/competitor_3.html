</span><h1 data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Galilean Relativity and Galileo's Ship</span></h1><span data-dcnode-id="318" instrument_node="">
</span><div class="cs_control CS_Element_Schedule" data-dcnode-id="205" id="cs_control_653"><div data-dcnode-id="206" id="CS_Element_maincontent" title=""><div class="cs_GridRow" data-dcnode-id="207" id="gridRow_1_1_653"><div class="cs_GridColumn" data-dcnode-id="208" id="gridCol_1_1_1_1_653"><a data-dcnode-id="317" id="textblocknohdr1305"></a><a data-dcnode-id="316" id="CP_JUMP_1305"></a><div class="cs_control CS_Element_Textblock" data-dcnode-id="209" id="cs_control_1305"><span data-dcnode-id="315" instrument_node="">
</span><span class="rawhtml" data-dcnode-id="211"><p data-dcnode-id="312"><span data-dcnode-id="314" instrument_node="">Galileo Galilei helped usher in the age of modern science with his revolutionary ideas and inventions. He's perhaps best known for his vast improvements to early telescopes, allowing him to study heavenly bodies in unprecedented detail.</span><br data-dcnode-id="313"></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">He also challenged common conceptions about our place in the cosmos. Before Galileo, philosophers and theologians widely believed that the Earth sat at the center of the universe, and they thought that the heavenly bodies revolved around our pale blue dot. Instead, Galileo, supported the idea that the earth and planets moved around a motionless sun — a belief pioneered by the Polish monk Copernicus. The idea initially drew condemnation from the Catholic Church, but eventually, Galileo's heliocentrism prevailed.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">At the time, many thought that a moving Earth contradicted common experience and, in the Church's opinion, "Holy Scripture." To demonstrate how a moving Earth could be consistent with our everyday experience, Galileo introduced a thought experiment in his 1632 book titled "Dialogues Concerning the Two Chief World Systems."
</span></p><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">This work proved effective at the time, and he even received approval to publish the book from the Pope. Although the "Galileo's Ship" thought experiment may seem obvious nowadays, this thought experiment helped blaze the trail for Einstein's mind-bending Special Relativity.</span></p><span data-dcnode-id="303" instrument_node="">
</span><h3 data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The Experiment</span></h3><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Imagine Galileo (in finger puppet form) sitting in the hull of a windowless ship, unable to see outside into the sea. His ship speeds up until it's moving at a constant velocity; at this point, being in the ship's hull will feel as though the ship were at rest in a calm harbor.</span></p><span data-dcnode-id="297" instrument_node="">
</span><a data-dcnode-id="295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.physicscentral.com/explore/plus/images/Galileo-s-Ship-large.jpg" id="http://www.physicscentral.com/explore/plus/images/Galileo-s-Ship-large.jpg" onmouseover="return window.status='http://www.physicscentral.com/explore/plus/images/Galileo-s-Ship-large.jpg'" style="cursor:hand"><img alt="Galileo's ship is moving at a constant speed to the left. The fish remains stationary relative to the Earth. Galileo drops a ball at time t-1 that hits the ground at time t-2. The fish's position is displayed at both times." border="0" data-dcnode-id="296" height="274" hspace="0" id="http://www.physicscentral.com/explore/plus/images/Galileo-s-Ship-large.jpg||CPIMAGE:49570|" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.physicscentral.com/explore/plus/images/Galileo-s-Ship.jpg&amp;raw" title="Galileo's ship is moving at a constant speed to the left. The fish remains stationary relative to the Earth. Galileo drops a ball at time t-1 that hits the ground at time t-2. The fish's position is displayed at both times." vspace="0" width="480"></a><p align="left" data-dcnode-id="282"><strong data-dcnode-id="283"><span data-dcnode-id="294" instrument_node="">Galileo's ship is moving at a constant speed to the left. The fish remains stationary relative to the Earth. Galileo drops a ball at time t</span><sub data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">1</span></sub><span data-dcnode-id="291" instrument_node=""> that hits the ground at time t</span><sub data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">2</span></sub><span data-dcnode-id="288" instrument_node="">. The fish's position is displayed at both times. Click for a larger image. Galileo image courtesy the </span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.philosophersguild.com/Galileo-Galieli-Finger-Puppet.html" id="http://www.philosophersguild.com/Galileo-Galieli-Finger-Puppet.html|"><span data-dcnode-id="287" instrument_node="">Unemployed Philosophers Guild. </span><br data-dcnode-id="286"></a><br data-dcnode-id="284"></strong></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Upon reaching a constant velocity (toward the left in the image above), Galileo starts conducting simple mechanical experiments. For our example, let's imagine that he is simply dropping a ball from the top of the ship's cabin to the floor, noting where it lands.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">If the ship were stationary at the dock, the ball would drop straight to the floor directly beneath where Galileo were holding it. But what would happen if the ship were moving at a constant velocity?</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Galileo actually conducted a similar experiment and discovered that the ball would simply fall directly below where it's dropped, just as if the ship were stationary. From Galileo's point of view in the ship's hull, there was no difference between a ship with constant velocity and a stationary one.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="271" instrument_node="">But differences arise when you consider other reference frames. In the drawing above, the front of the ship passes a stationary (relative to the Earth) fish at a specific time called t</span><sub data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">1</span></sub><span data-dcnode-id="268" instrument_node="">. Seconds later at time t</span><sub data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2</span></sub><span data-dcnode-id="265" instrument_node="">, the ball hits the floor of the ship as the middle of the ship passes over the fish.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">From the fish's perspective, the ball not only dropped vertically but also moved horizontally several feet. Similarly, if Galileo had a porthole to look through, he would notice the fish moving relative to the ship.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="259" instrument_node="">This means that there is </span><a data-dcnode-id="257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//physics.ucr.edu/~wudka/Physics7/Notes_www/node47.html" id="http://physics.ucr.edu/~wudka/Physics7/Notes_www/node47.html|"><span data-dcnode-id="258" instrument_node="">no "absolute" velocity</span></a><span data-dcnode-id="256" instrument_node="">. Velocity measurements will differ depending upon the reference frame in which they are measured. For instance, Galileo's ball had no horizontal velocity from his reference frame in the windowless ship. The fish, however, would see the ball having a horizontal velocity equal to that of the entire ship floating overhead.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Neither measurement is "correct." Quite simply, it's all relative.</span></p><span data-dcnode-id="251" instrument_node="">
</span><h3 data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">So What?</span></h3><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="247" instrument_node="">Galileo used this experiment to demonstrate that Earth could, in fact, move without conflicting with our everyday sense of the world. Even if the Earth were moving, everything on its surface would move at the same speed. Consequently, doing these experiments in the geocentric universe of the Church and the heliocentric universe Galileo had in mind would be indistinguishable.</span><br data-dcnode-id="246"></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">Galileo had stumbled upon a type of relativity that now bears his own name. Reflecting upon several simple mechanical experiments like the falling ball, Galileo </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//physics.syr.edu/courses/modules/LIGHTCONE/galileo.html" id="http://physics.syr.edu/courses/modules/LIGHTCONE/galileo.html|"><span data-dcnode-id="242" instrument_node="">concluded</span></a><span data-dcnode-id="240" instrument_node="">:</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="235"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">You will discover not the least change in all the effects named, nor could you tell from any of them whether the ship was moving or standing still.</span></strong></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">In other words, conducting mechanical experiments in two different reference frames that are moving at constant velocities relative to one another (such as Galileo's ship and the sea) will yield the same results.
</span></p><p data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">Galileo's thought experiment was one of the first expositions on "reference frames," although that term </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//plato.stanford.edu/entries/spacetime-iframes/" id="http://plato.stanford.edu/entries/spacetime-iframes/|"><span data-dcnode-id="230" instrument_node="">wasn't coined</span></a><span data-dcnode-id="228" instrument_node=""> until the 19th century.</span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="225" instrument_node="">Einstein refined Galileo's ideas with his theory of Special Relativity in the early 1900's, and you can learn more about the conflict between Galilean relativity and Einstein's relativity in the </span><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//plato.stanford.edu/entries/spacetime-iframes/%23IneFra20tCenSpeGenRel" id="http://plato.stanford.edu/entries/spacetime-iframes/#IneFra20tCenSpeGenRel|"><span data-dcnode-id="224" instrument_node="">Stanford Encyclopedia of Philosophy</span></a><span data-dcnode-id="222" instrument_node="">.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Galileo's simple thought (and real) experiments have guided scientific thought for centuries, and you too can test this out for yourself. Next time you're in a car, train, or airplane traveling at constant velocity, take notice. It should feel as though you're at rest. Assuming there's no potholes or turbulence to disrupt your ride and change your velocity, that is.</span></p><span data-dcnode-id="217" instrument_node="">
</span><br data-dcnode-id="216"><br data-dcnode-id="215"><span data-dcnode-id="214" instrument_node="">
-</span><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Brian Jacobsmeyer</span></strong></span><span data-dcnode-id="210" instrument_node="">
</span></div></div></div></div></div><span data-dcnode-id="204" instrument_node="">
