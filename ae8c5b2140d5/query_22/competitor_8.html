</span><p class="quotation" data-dcnode-id="1276"><em data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">How can a system such as human language arise in the mind/brain, or for that matter in the organic world, in which one seems not to find anything like the basic properties of human language?</span></em><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node=""> —</span><em data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">The Minimalist Program</span></em><sup data-dcnode-id="1277" id="footnote-1"><a class="ct-js-tooltip-trigger" data-dcnode-id="1278" href="#endnote-1"><span data-dcnode-id="1279" instrument_node="">1</span></a></sup></p><span data-dcnode-id="1275" instrument_node="">
</span><p class="section-break" data-dcnode-id="1269"><span class="drop-cap" data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">I</span></span><span class="small-caps" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">n the early</span></span><span data-dcnode-id="1270" instrument_node=""> days of the modern scientific revolution, the great founders of modern science expressed their awe and wonder at the facts of language. “But surpassing all stupendous inventions,” Galileo remarked, </span></p><span data-dcnode-id="1268" instrument_node="">
</span><blockquote data-dcnode-id="1263"><span data-dcnode-id="1267" instrument_node="">what sublimity of mind was his who dreamed of finding means to communicate his deepest thoughts to any other person, though distant by mighty intervals of place and time! Of talking with those who are in India; of speaking to those who are not yet born and will not be born for a thousand or ten thousand years; and with what facility, by the different arrangements of twenty characters upon a page!</span><sup data-dcnode-id="1264" id="footnote-2"><a class="ct-js-tooltip-trigger" data-dcnode-id="1265" href="#endnote-2"><span data-dcnode-id="1266" instrument_node="">2</span></a></sup></blockquote><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1261" instrument_node="">In their influential </span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Grammaire générale</span></em><span data-dcnode-id="1258" instrument_node="">, Antoine Arnauld and Claude Lancelot expressed the same sense of awe and wonder:</span></p><span data-dcnode-id="1256" instrument_node="">
</span><blockquote data-dcnode-id="1251"><span data-dcnode-id="1255" instrument_node="">It remains for us to consider what is, in fact, one of the great spiritual advantages of human beings compared to other animals, and which is one of the most significant proofs of reason: that is, the method by which we are able to express our thoughts, the marvelous invention by which using twenty five or thirty sounds we can create the infinite variety of words, which having nothing themselves in common with what is passing in our minds nonetheless permit us to express all our secrets, and which allow us to understand what is not present to consciousness, in effect, everything that we can conceive and the most diverse movements of our soul.</span><sup data-dcnode-id="1252" id="footnote-3"><a class="ct-js-tooltip-trigger" data-dcnode-id="1253" href="#endnote-3"><span data-dcnode-id="1254" instrument_node="">3</span></a></sup></blockquote><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1249" instrument_node="">René Descartes was one of the most important influences on the </span><em data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Grammaire générale</span></em><span data-dcnode-id="1246" instrument_node="">. In his </span><em data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Second Meditation</span></em><span data-dcnode-id="1243" instrument_node="">, he argued that a new creative principle was required to explain the human capacity for the unbounded and appropriate use of language:</span></p><span data-dcnode-id="1241" instrument_node="">
</span><blockquote data-dcnode-id="1236"><span data-dcnode-id="1240" instrument_node="">This is because the will simply consists in our ability to do or not do something (that is, to affirm or deny, to pursue or avoid); or rather, it consists simply in the fact that when the intellect puts something forward for affirmation or denial or for pursuit or avoidance, our inclinations are such that we do not feel we are determined by any external force.</span><sup data-dcnode-id="1237" id="footnote-4"><a class="ct-js-tooltip-trigger" data-dcnode-id="1238" href="#endnote-4"><span data-dcnode-id="1239" instrument_node="">4</span></a></sup></blockquote><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1234" instrument_node="">In the </span><em data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Discourse on Method</span></em><span data-dcnode-id="1231" instrument_node="">, Part V, Descartes argued that the creative use of language marked the distinction between human beings and other animals, and between human beings and machines. A machine may be impelled to act in a certain way, but it cannot be inclined; with human beings, it is often the reverse.</span><sup data-dcnode-id="1228" id="footnote-5"><a class="ct-js-tooltip-trigger" data-dcnode-id="1229" href="#endnote-5"><span data-dcnode-id="1230" instrument_node="">5</span></a></sup><span data-dcnode-id="1227" instrument_node=""> Explaining why this is so, is the Galilean challenge.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">In the modern era, the challenge, although occasionally expressed, was also widely ignored. Wilhelm von Humboldt is an especially suggestive case to the contrary:</span></p><span data-dcnode-id="1222" instrument_node="">
</span><blockquote data-dcnode-id="1214"><span data-dcnode-id="1221" instrument_node="">The processes of language must provide for the possibility of producing an undefinable set of phenomena, defined by the conditions imposed upon it by thought.&nbsp;… </span><em data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">It must, therefore, make infinite use of finite means</span></em><span data-dcnode-id="1218" instrument_node="">… [emphasis added]</span><sup data-dcnode-id="1215" id="footnote-6"><a class="ct-js-tooltip-trigger" data-dcnode-id="1216" href="#endnote-6"><span data-dcnode-id="1217" instrument_node="">6</span></a></sup></blockquote><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">The capacity for language is species specific, something shared by humans and unique to them. It is the most striking feature of this curious organism, and a foundation for its remarkable achievements. This is in its full generality the Galilean challenge. The challenge is very real, and should, I think, be recognized as one of the deepest questions in the rich two-thousand-five-hundred-year history of linguistic thought.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Until the twentieth century, there was never much to say about the Galilean challenge beyond a few phrases. There is a good reason why inquiry languished. Intellectual tools were not available for formulating the problem in a way clear enough to be seriously addressed. That changed thanks to the work of Alonzo Church, Kurt Gödel, Emil Post, and Alan Turing, who established the general theory of computability. Their work demonstrated how a finite object like the brain could generate an infinite variety of expressions. It became possible, for the first time, to address part of the Galilean challenge directly, even though the earlier history remained unknown.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1206" instrument_node="">With these intellectual tools available, it becomes possible to formulate what we may call the Basic Property of human language. The language faculty of the human brain provides the means to construct a digitally infinite array of structured expressions; each is semantically interpreted as expressing a thought, and each can be externalized by some sensory modality, such as speech. The infinite set of semantically interpreted objects constitutes what has sometimes been called a language of thought.</span><sup data-dcnode-id="1203" id="footnote-7"><a class="ct-js-tooltip-trigger" data-dcnode-id="1204" href="#endnote-7"><span data-dcnode-id="1205" instrument_node="">7</span></a></sup><span data-dcnode-id="1202" instrument_node=""> It is a system that is then capable of linguistic expression, and that enters into reflection, inference, planning, and other mental processes. When externalized, it can be used for social interactions, although this is only a first approximation to what may properly be called thought. There is much more to say about this challenging topic.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">There is good reason to suppose that the language faculty is common to the human species. There are no known group differences in language capacity, and individual variation is at the margins. Although speech is the usual form of sensorimotor externalization, we now know that signing, or even touching, does just as well. These are discoveries that require a slight reformulation of the Galilean challenge. A more fundamental qualification has to do with the way the challenge is formulated; traditional formulations were in terms of the production of expressions. In these terms, the challenge overlooked some basic issues. Like perception, production accesses an internal language, but cannot be identified with it. We must distinguish the internalized system of knowledge from the processes that access it. The theory of computability enables us to establish the distinction, which is an important one, familiar in other domains.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">In studying human arithmetical competence, we distinguish the internal system of knowledge from the actions that access it. When multiplying numbers in our heads, we depend on many factors beyond our intrinsic knowledge of arithmetic. Constraints of memory are the obvious example. The same is true of language. Production and perception access the internal language, but involve other factors as well, including short-term memory. When the Galilean challenge was addressed in the 1950s, these were matters that began to be studied with some care.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">There has been considerable progress in understanding the nature of the internal language, but its free creative use remains a mystery. This should come as no surprise. In a recent review of far simpler cases of voluntary action, neuroscientists Emilio Bizzi and Robert Ajemian remark, in the case of something so simple as raising one’s arm, that</span></p><span data-dcnode-id="1191" instrument_node="">
</span><blockquote data-dcnode-id="1186"><span data-dcnode-id="1190" instrument_node="">the detail of this complicated process, which critically involves coordinate and variable transformations from spatial movement goals to muscle activations, needs to be elaborated further. Phrased more fancifully, we have some idea as to the intricate design of the puppet and the puppet strings, but we lack insight into the mind of the puppeteer.</span><sup data-dcnode-id="1187" id="footnote-8"><a class="ct-js-tooltip-trigger" data-dcnode-id="1188" href="#endnote-8"><span data-dcnode-id="1189" instrument_node="">8</span></a></sup></blockquote><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">The normal creative use of language is an even more dramatic example. This is the unique human capacity that so impressed the founders of modern science.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The fundamental task of inquiry into language is to determine the nature of the Basic Property, and so the genetic endowment that underlies the faculty of language. To the extent that its properties are understood, we can investigate particular internal languages, each an instantiation of the Basic Property, much as each individual visual system is an instantiation of the human faculty of vision. The Biolinguistic Program involves an investigation into how internal languages are acquired and used, and how they function in the human brain. It is also committed to studying the evolution of the language faculty and its basis in human genetics. Universal Grammar is the theory of the genetically-based language faculty; Generative Grammar, the theory of each individual language.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1178" instrument_node="">Languages appear to be extremely complex, varying radically from one another. A standard belief among professional linguists sixty years ago was that languages can vary in arbitrary ways; each must be studied without preconceptions. Biologists held similar views about organisms. As recently as 1984, Gunther Stent, in a review of J. M. W. Slack’s </span><em data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">From Egg to Embryo</span></em><span data-dcnode-id="1175" instrument_node="">, remarked that, “…we cannot expect to discover a general theory of development; rather we are faced with a near infinitude of particulars, which have to be sorted out case by case.”</span><sup data-dcnode-id="1172" id="footnote-9"><a class="ct-js-tooltip-trigger" data-dcnode-id="1173" href="#endnote-9"><span data-dcnode-id="1174" instrument_node="">9</span></a></sup></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">When understanding is thin, we expect to see extreme variety and complexity.</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1166" instrument_node="">A great deal has been learned since then. It is now recognized that the variety of life is very limited, so much so that the hypothesis of a universal genome has been seriously advanced.</span><sup data-dcnode-id="1163" id="footnote-10"><a class="ct-js-tooltip-trigger" data-dcnode-id="1164" href="#endnote-10"><span data-dcnode-id="1165" instrument_node="">10</span></a></sup><span data-dcnode-id="1162" instrument_node=""> My own feeling is that linguistics has undergone a similar development.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1159" instrument_node="">The Basic Property takes language to be a computational system, which we therefore expect to respect general conditions on computational efficiency. A computational system consists of a set of atomic elements, and rules to construct more complex structures from them. In the generation of the language of thought, the atomic elements are word-like, though not exactly words; for each language, the set of these elements is its lexicon.</span><sup data-dcnode-id="1156" id="footnote-11"><a class="ct-js-tooltip-trigger" data-dcnode-id="1157" href="#endnote-11"><span data-dcnode-id="1158" instrument_node="">11</span></a></sup><span data-dcnode-id="1155" instrument_node=""> Lexical items are commonly regarded as cultural products, varying widely with experience, and linked to extra-mental entities. The latter assumption is expressed in the titles of standard works, such as W.&nbsp;V.&nbsp;O. Quine’s influential study, </span><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Word and Object</span></em><span data-dcnode-id="1152" instrument_node="">.</span><sup data-dcnode-id="1149" id="footnote-12"><a class="ct-js-tooltip-trigger" data-dcnode-id="1150" href="#endnote-12"><span data-dcnode-id="1151" instrument_node="">12</span></a></sup><span data-dcnode-id="1148" instrument_node=""> Closer examination of even the simplest words reveals a very different picture, one that poses many mysteries.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1145" instrument_node="">In the analysis of the Basic Property, we are bound to seek the simplest computational procedure consistent with the data of language. Simplicity is implicit in the basic goals of scientific inquiry. It has long been recognized that only simple theories can attain a rich explanatory depth. “Nature never doth that by many things, which may be done by a few,” Galileo remarked, and this maxim has guided the sciences since their modern origins.</span><sup data-dcnode-id="1142" id="footnote-13"><a class="ct-js-tooltip-trigger" data-dcnode-id="1143" href="#endnote-13"><span data-dcnode-id="1144" instrument_node="">13</span></a></sup><span data-dcnode-id="1141" instrument_node=""> It is the task of the scientist to demonstrate this, from the motion of the planets, to an eagle’s flight, to the inner workings of a cell, to the growth of language in the mind of a child. Linguistics seeks the simplest theory for an additional reason: it must face the problem of evolvability. Not a great deal is known about the evolution of modern humans. The few facts that are well established, and others that have recently been coming to light, are rather suggestive. They conform to the conclusion that the language faculty is very simple; it may, perhaps, even be computationally optimal, precisely what is suggested on methodological grounds.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1138" instrument_node="">One fact appears to be well established. The faculty of language is a true species property, invariant among human groups, and unique to humans in its essential properties. It follows that there has been little or no evolution of the faculty since human groups separated from one another. Recent genomic studies place this date not very long after the appearance of anatomically modern humans about two hundred thousand years ago.</span><sup data-dcnode-id="1135" id="footnote-14"><a class="ct-js-tooltip-trigger" data-dcnode-id="1136" href="#endnote-14"><span data-dcnode-id="1137" instrument_node="">14</span></a></sup><span data-dcnode-id="1134" instrument_node=""> It was at this time that the San group in Africa separated from other groups. There is little evidence of anything like human language, or symbolic behavior altogether, before the emergence of modern humans. That leads us to expect that the faculty of language emerged along with modern humans or not long after, a very brief moment in evolutionary time. It follows, then, that the Basic Property should indeed be very simple. The conclusion conforms to what has been discovered in recent years about the nature of language, a welcome convergence.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1131" instrument_node="">Discoveries about the early separation of the San people are highly suggestive. Although Khoisan speakers appear to possess the general human language capacity, their languages are all and only those with phonetic clicks, with corresponding adaptations in the vocal tract. The most likely explanation for these facts, developed in detail by the Dutch linguist Riny Huijbregts, is that their possession of an internal language preceded their separation from other groups; this in turn preceded the externalization of their language.</span><sup data-dcnode-id="1128" id="footnote-15"><a class="ct-js-tooltip-trigger" data-dcnode-id="1129" href="#endnote-15"><span data-dcnode-id="1130" instrument_node="">15</span></a></sup><span data-dcnode-id="1127" instrument_node=""> Other groups proceeded in somewhat different ways. Externalization seems to be associated with the first signs of symbolic behavior in the archaeological record. We may be reaching a stage of understanding where the account of language evolution can be fleshed out in ways that were unimaginable until recently.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The genetic endowment for the computational system of language appears to be quite simple. It is a major challenge for research to show how the facts of language are explained in terms of a simple formulation of the Basic Property. Whatever the formulation, it must appeal to the interaction of the Basic Property with specific experiences and language-independent principles. These will, no doubt, include principles of computational efficiency. In this regard, the child’s own experiences have only limited relevance, whether in acquiring the meaning of the simplest words, or the syntactic structures and the semantic properties of the language of thought.</span></p><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1121" instrument_node="">Universal properties of the language faculty came to light as soon as serious efforts were undertaken to construct generative grammars. These included simple properties that had never before been noticed, and that remain quite puzzling. One such property is structure-dependence. The rules that yield the language of thought appeal only to structural properties, ignoring properties of the externalized signal, even such simple properties as linear order. Take, say, the sentence </span><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">The boy and the girl are here</span></em><span data-dcnode-id="1118" instrument_node="">. With marginal exceptions, no one is tempted to say </span><em data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">is here</span></em><span data-dcnode-id="1115" instrument_node="">, even though the closest local relation is “girl + copula.” The bigram frequency, which measures the likelihood or frequency of word combinations, is far higher for phrases of the form </span><em data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">girl is</span></em><span data-dcnode-id="1112" instrument_node=""> than </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">girl are</span></em><span data-dcnode-id="1109" instrument_node="">. Bigram frequency is a common measure used in computational cognitive science and Big Data analysis. Without instruction, we rely on structure not linearity, taking the phrase and not the local noun to determine agreement. Or take the sentence </span><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">He saw the man with the telescope</span></em><span data-dcnode-id="1106" instrument_node="">, which is ambiguous, depending on what we take to be the phrases, although the pronunciation and linear order do not change under either interpretation.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1103" instrument_node="">To take a subtler example, consider the ambiguous sentence </span><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Birds that fly instinctively swim. </span></em><span data-dcnode-id="1100" instrument_node="">The adverb “instinctively” can be associated with the preceding verb (</span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">fly instinctively</span></em><span data-dcnode-id="1097" instrument_node="">), or the following one (</span><em data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">instinctively swim</span></em><span data-dcnode-id="1094" instrument_node="">). Suppose now that we extract the adverb from the sentence, forming </span><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Instinctively, birds that fly swim. </span></em><span data-dcnode-id="1091" instrument_node="">The ambiguity is now resolved. The adverb is interpreted only with the linearly more remote but structurally closer verb </span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">swim</span></em><span data-dcnode-id="1088" instrument_node="">, not the linearly closer but structurally more remote verb </span><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">fly. </span></em><span data-dcnode-id="1085" instrument_node="">The only possible interpretation—</span><em data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">birds swim</span></em><span data-dcnode-id="1082" instrument_node="">—is unnatural. That doesn’t matter. The rules apply rigidly, independent of meaning and fact, ignoring the simple computation of linear distance, and keeping to the far more complex computation of structural distance.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">The property of structure-dependence holds for all constructions in all languages, and it is, indeed, puzzling.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1076" instrument_node="">Furthermore, it is known without relevant evidence, as is clear in cases like the one I just gave, and innumerable others. Experiments show that quite without instruction children understand structure-dependence by about the age of three.</span><sup data-dcnode-id="1073" id="footnote-16"><a class="ct-js-tooltip-trigger" data-dcnode-id="1074" href="#endnote-16"><span data-dcnode-id="1075" instrument_node="">16</span></a></sup><span data-dcnode-id="1072" instrument_node=""> We can be quite confident that structure-dependence follows from principles of universal grammar deeply rooted in the human language faculty.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1069" instrument_node="">Structure-dependence is one of the few non-trivial properties of language that usage-based approaches to language have sought to accommodate. The attempts have been reviewed in detail elsewhere.</span><sup data-dcnode-id="1066" id="footnote-17"><a class="ct-js-tooltip-trigger" data-dcnode-id="1067" href="#endnote-17"><span data-dcnode-id="1068" instrument_node="">17</span></a></sup><span data-dcnode-id="1065" instrument_node=""> All fail. Totally. Few of them even ask the right question. Why does </span><em data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">this</span></em><span data-dcnode-id="1062" instrument_node=""> property hold for all languages, and all constructions? Other cases fare no better.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1059" instrument_node="">Other sources support the conclusion that structure-dependence is a true linguistic universal, deeply rooted in language design. Research conducted in Milan a decade ago, initiated by Andrea Moro, showed that invented languages keeping to the principle of structure-dependence elicit normal activation in the language areas of the brain. Simpler systems using linear order in violation of these principles yield diffuse activation, implying that experimental subjects are treating them as a puzzle, not a language.</span><sup data-dcnode-id="1056" id="footnote-18"><a class="ct-js-tooltip-trigger" data-dcnode-id="1057" href="#endnote-18"><span data-dcnode-id="1058" instrument_node="">18</span></a></sup><span data-dcnode-id="1055" instrument_node=""> Neil Smith and Ianthi-Maria Tsimpli had found similar results in their investigation of a cognitively deficient but linguistically gifted subject.</span><sup data-dcnode-id="1052" id="footnote-19"><a class="ct-js-tooltip-trigger" data-dcnode-id="1053" href="#endnote-19"><span data-dcnode-id="1054" instrument_node="">19</span></a></sup><span data-dcnode-id="1051" instrument_node=""> They also made the interesting observation that normal subjects can solve the problem if it is presented to them as a puzzle, but not if it is presented as a language. If presented as a language, the language faculty, although presumably activated, would be unable to make sense of the data.</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Structure-dependence must be an innate property of the language faculty.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Why this should be so? There is only one known answer. It is the answer we seek for general reasons. The computational operations of language are the simplest possible. This is the outcome that we hope to reach on methodological grounds, and that is to be expected in the light of evidence about the evolution of language.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">To see why this is the case, consider the simplest recursive operation, embedded in one or another way in all others. This operation takes two objects already constructed, say X and Y, and forms a new object Z, without modifying either X or Y, or adding any further structure to them. Z can be taken to be just the set {X, Y}. In current work, the operation is called Merge. Since Merge imposes no order, the objects constructed, however complex, will be hierarchically structured, but unordered; operations on them will necessarily keep to structural distance, ignoring linear distance. The linguistic operations yielding the language of thought must be structure-dependent, as indeed is the case. An appeal to simplicity appears to answer the question why all human languages must exhibit structure-dependence.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The externalization of language maps internal structures into some sensorimotor modality, usually speech. The sensorimotor system requires linear order; we cannot speak in parallel. But the language of thought keeps to structural relations. Externalization seems to be a peripheral aspect of language. It does not enter into the core function of providing a language of thought. This is at odds with the traditional formulation of the Galilean challenge itself.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1036" instrument_node="">Perception yields further evidence in support of this conclusion. The auditory systems of apes are quite similar to those of humans, even attuned to the phonetic features that are used in language. But the shared auditory-perceptual systems leave apes without anything remotely like the human faculty of language. Apes can, of course, gesture, but even with arduous training cannot use their gestural systems with even the most elementary properties of language, though as is now known, sign languages are developed spontaneously by humans even without any linguistic input.</span><sup data-dcnode-id="1033" id="footnote-20"><a class="ct-js-tooltip-trigger" data-dcnode-id="1034" href="#endnote-20"><span data-dcnode-id="1035" instrument_node="">20</span></a></sup><span data-dcnode-id="1032" instrument_node=""> Similarly, recent research with dogs has found that they are attuned to the phonological and intonational features of human language.</span><sup data-dcnode-id="1029" id="footnote-21"><a class="ct-js-tooltip-trigger" data-dcnode-id="1030" href="#endnote-21"><span data-dcnode-id="1031" instrument_node="">21</span></a></sup><span data-dcnode-id="1028" instrument_node=""> They may even have similar hemispheric specialization, but, of course, that provides them with no step at all towards the acquisition of language. Many such results support the conclusion that our internal language is independent of externalization, and that it evolved quite independently. It is language design that provides the most powerful evidence for this thesis. The linguistic universal of structure-dependence follows from the null hypothesis that the computational system is optimal. It is for this reason indifferent to linear order, which is, of course, the most elementary feature of externalization.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Not long ago it would have seemed absurd to propose that the operations of human language could be reduced to Merge, along with language-independent principles of computational efficiency. Work of the past few years has shown that quite intricate properties of language follow directly from such assumptions.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1022" instrument_node="">Displacement is a ubiquitous and puzzling property of language. Phrases are heard in one position but interpreted in two, both in their original position and in some other position that is silent, but grammatically possible. The sentence, “Which book will you read?” means roughly, “For which book </span><em data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">x</span></em><span data-dcnode-id="1019" instrument_node="">, you will read the book </span><em data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">x</span></em><span data-dcnode-id="1016" instrument_node="">,” with the nominal phrase </span><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">book </span></em><span data-dcnode-id="1013" instrument_node="">heard in one position but interpreted in two. Displacement is never built into artificial symbolic systems for metamathematics, programming, or other purposes. It had long been assumed to be a peculiar and puzzling imperfection of natural language. Merge automatically yields displacement with copies—in this case, two copies of </span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">which book</span></em><span data-dcnode-id="1010" instrument_node="">. The correct semantic interpretation follows directly. Far from being an imperfection, displacement with copies is a predicted property of the simplest system. Displacement is, in some respects, even simpler than Merge, since it calls on far more limited computational resources.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">The same processes provide intricate semantic interpretations for such properties as referential dependence and quantifier-variable interaction. They also have further implications about the nature of language. Consider the sentence “the boys expect to see each other,” where “each other” refers to the boys, thus obeying an obvious locality condition of referential dependency. Consider now the sentence, “Which girls do the boys expect to see each other?” The phrase “each other” does not refer back to the closest antecedent, “the boys,” as such phrases universally do; rather, it refers back to the more remote antecedent, “which girls.” The sentence means “For which girls the boys expected those girls to see each other?” That is what reaches the mind under Merge-based computation with automatic copies, although not what reaches the ear. What reaches the ear violates the locality condition of referential dependency.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1004" instrument_node="">Deletion of the copy in externalization causes processing problems. Such filler-gap problems, as they are called, can become quite severe, and are among the major problems of automatic parsing and perception. In the sentence, for example, “</span><em data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Who do you think ____ left the show early?</span></em><span data-dcnode-id="1001" instrument_node="">” the gap marks the place from which the interrogative has been moved, creating a long-distance dependency between the interrogative and the finite verb. If the interrogative copy were not deleted, the problem would be much reduced. Why is it deleted? The principles of efficient computation restrict what is computed to the minimum. At least one copy must appear or there is no evidence that displacement took place at all. In English and languages like English, that copy must be structurally the most prominent one. The result is to leave gaps that must be filled by the hearer. This is a matter that can become quite intricate.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">These examples illustrate a significant general phenomenon. Language design appears to maximize computational efficiency, but disregards communicative efficiency. In every known case in which computational and communicative efficiency conflict, communicative efficiency is ignored. These facts run counter to the common belief, often virtual dogma, that communication is the basic function of language. They also further undermine the assumption that human language evolved continuously from animal communication. And they provide further evidence that externalization, which is necessary for communication, is a peripheral aspect of language.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">There are methodological and evolutionary reasons to expect that the basic design of language will be quite simple, perhaps even close to optimal. With regard to externalization, the same methodological arguments hold, as they always do, but the evolutionary arguments do not apply. The externalization of language may not, in fact, involve evolution at all. The sensorimotor systems were in place long before the appearance of language. Mapping the language of thought to some sensorimotor system is a hard cognitive problem, one that involves coordinating a computationally efficient internal system and an unrelated sensory modality. The variety, complexity, and easy mutability of observed languages might lie primarily in externalization. It seems increasingly clear that this is the case—something that should be expected. Children know the principles of the internal language without evidence; as, indeed, they know a great deal more about language, including almost all semantic and most syntactic properties. This is a matter of contention, but solidly established, I think.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="992" instrument_node="">There is by now some reason to hope that the emerging science of neurolinguistics might identify the brain circuits that underlie the computational system. The neuroscientist Angela Friederici reviews a great deal of promising work in a forthcoming book.</span><sup data-dcnode-id="989" id="footnote-22"><a class="ct-js-tooltip-trigger" data-dcnode-id="990" href="#endnote-22"><span data-dcnode-id="991" instrument_node="">22</span></a></sup><span data-dcnode-id="988" instrument_node=""> Publication is scheduled to coincide with the fiftieth anniversary of Eric Lenneberg’s classic study, </span><em data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Biological Foundations of Language</span></em><span data-dcnode-id="985" instrument_node="">.</span><sup data-dcnode-id="982" id="footnote-23"><a class="ct-js-tooltip-trigger" data-dcnode-id="983" href="#endnote-23"><span data-dcnode-id="984" instrument_node="">23</span></a></sup><span data-dcnode-id="981" instrument_node=""> Friederici’s own work leads to some bold and challenging proposals. She provides evidence that a crucial element in linguistic computation is a white matter dorsal fiber tract that connects a specific region in Broca’s area, part of Brodmann area 44, to the posterior temporal cortex. She suggests that this pathway might be “the missing link which has to evolve in order to make the full language capacity possible.” Evidence indicates that this dorsal pathway is very weak in macaques and chimpanzees, and weak and poorly myelinated in newborns, but strong in adult humans with language mastery. The increasing strength of this pathway, Friederici remarks, “correlates directly with the increasing ability to process complex syntactic structures.” A variety of experimental results suggest that “[t]his fiber tract may thus be one of the reasons for the difference in the language ability in human adults compared to the prelinguistic infant and the monkey.” These structures, Friederici suggests, appear to “have evolved to subserve the human capacity to process syntax, which is at the core of the human language faculty.” Quite intriguing discoveries might be forthcoming in these domains.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Let us return to the second component of a computational system, its atomic elements. In the case of language, these will be its lexical items. The conventional view is that these are cultural products, and that the basic ones are associated with extra-mental entities. This representationalist doctrine has been almost universally adopted in the modern period. The doctrine appears to hold for animal communication. Monkey calls are associated with specific physical events. The doctrine is radically false for human language, something recognized in classical Greece.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">How can we cross the same river twice, asked Heraclitus? Why are two appearances understood to be two stages of the same river? When we look into the question, puzzles abound. Suppose that the flow of the river has been reversed. It is still the same river. Suppose that what is flowing becomes ninety-five percent arsenic because of discharges from an upstream plant. It is still the same river. The same is true of other quite radical changes.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="972" instrument_node="">On the other hand, with very slight changes it will no longer be a river at all. If its sides are lined with fixed barriers and it is used for oil tankers, it is a canal, not a river. If its surface undergoes a slight phase change and is hardened, a line is painted down the middle, and it is used to commute to town, then it is a highway, no longer a river.</span><sup data-dcnode-id="969" id="footnote-24"><a class="ct-js-tooltip-trigger" data-dcnode-id="970" href="#endnote-24"><span data-dcnode-id="971" instrument_node="">24</span></a></sup><span data-dcnode-id="968" instrument_node=""> Exploring the matter further, we discover that what counts as a river depends on mental acts and constructions. The same is true of even the most elementary concepts: </span><em data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">tree</span></em><span data-dcnode-id="965" instrument_node="">, </span><em data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">water</span></em><span data-dcnode-id="962" instrument_node="">,</span><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node=""> house, person</span></em><span data-dcnode-id="959" instrument_node="">, </span><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">London</span></em><span data-dcnode-id="956" instrument_node="">, or, in fact, any of the basic words of human language. Human language and thought systematically violate the representationalist doctrine.</span><sup data-dcnode-id="953" id="footnote-25"><a class="ct-js-tooltip-trigger" data-dcnode-id="954" href="#endnote-25"><span data-dcnode-id="955" instrument_node="">25</span></a></sup></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="950" instrument_node="">Our intricate knowledge of what even the simplest words mean is acquired virtually without experience. At peak periods of language acquisition, children acquire about a word an hour, often on one presentation.</span><sup data-dcnode-id="947" id="footnote-26"><a class="ct-js-tooltip-trigger" data-dcnode-id="948" href="#endnote-26"><span data-dcnode-id="949" instrument_node="">26</span></a></sup><span data-dcnode-id="946" instrument_node=""> The rich meaning of even the most elementary words must be substantially innate.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">The evolutionary origin of such concepts is a complete mystery.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">The Galilean challenge must be reformulated to distinguish language from speech, and to distinguish production from internal knowledge. Our internal computational system yields a language of thought, a system that might be remarkably simple, conforming to what the evolutionary record suggests. Secondary processes map the structures of language to one or another sensorimotor system for externalization. These processes appear to be the locus of the complexity and variety of linguistic behavior, and its mutability over time.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The origins of computational atoms remain a complete mystery. So does the Cartesian question of how language can be used in its normal creative way, in a manner appropriate to situations, but not caused by them, incited and inclined, but not compelled. The mystery holds for even the simplest forms of voluntary motion.</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">A great deal has been learned about language since the Biolinguistic Program was initiated. It is fair to say, I think, that more has been learned about the nature of language, and about a very wide variety of typologically different languages, than in the entire two-thousand-five-hundred-year prior history of inquiry into language. New questions have arisen, some quite puzzling. Some surprising answers lead us to revise what has long been believed about language, and mental processes generally. The more we learn, the more we discover what we do not know.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">And the more puzzling it often seems.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="922"><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">This essay is based on a talk originally given by the author at the Bibliothèque nationale de France on November 24, 2016</span></em><span data-dcnode-id="926" instrument_node="">.</span><sup data-dcnode-id="923" id="footnote-27"><a class="ct-js-tooltip-trigger" data-dcnode-id="924" href="#endnote-27"><span data-dcnode-id="925" instrument_node="">27</span></a></sup></p><span data-dcnode-id="921" instrument_node="">
</span></article><span data-dcnode-id="919" instrument_node="">
