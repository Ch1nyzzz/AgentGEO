n data-dcnode-id="505" instrument_node=""> </span><span aria-label="breadcrumb separator" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">/</span></span><span data-dcnode-id="502" instrument_node=""> </span><span class="breadcrumb-link-wrap" data-dcnode-id="498" itemprop="itemListElement" itemscope="" itemtype="https://schema.org/ListItem"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.differencebetween.com/category/science-nature/nature/universe/" itemprop="item"><span data-dcnode-id="500" itemprop="name"><span data-dcnode-id="501" instrument_node="">Universe</span></span></a></span><span data-dcnode-id="497" instrument_node=""> </span><span aria-label="breadcrumb separator" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">/</span></span><span data-dcnode-id="494" instrument_node=""> Difference Between Planet and Moon</span></div><article class="post-33220 post type-post status-publish format-standard category-universe tag-moon tag-planet entry" data-dcnode-id="308" itemscope="" itemtype="https://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="480"><h1 class="entry-title" data-dcnode-id="491" itemprop="headline"><span data-dcnode-id="492" instrument_node="">Difference Between Planet and Moon</span></h1><span data-dcnode-id="490" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="481"><time class="entry-time" data-dcnode-id="488" datetime="2013-03-18T08:21:30+00:00" itemprop="datePublished"><span data-dcnode-id="489" instrument_node="">March 18, 2013</span></time><span data-dcnode-id="487" instrument_node=""> Posted by </span><span class="entry-author" data-dcnode-id="483" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.differencebetween.com/author/admin/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="485" itemprop="name"><span data-dcnode-id="486" instrument_node="">Admin</span></span></a></span><span data-dcnode-id="482" instrument_node=""> </span></p></header><div class="entry-content jpibfi_container" data-dcnode-id="323" itemprop="text"><div class="at-above-post addthis_tool" data-dcnode-id="479" data-url="https://www.differencebetween.com/difference-between-planet-and-vs-moon/"></div><input class="jpibfi" data-dcnode-id="478" type="hidden"><span data-dcnode-id="477" instrument_node="">
</span><span data-dcnode-id="474" instrument_node="">
</span><div align="center" class="arti-top-ad-div" data-dcnode-id="463"><span data-dcnode-id="473" instrument_node="">
</span><span data-dcnode-id="471" instrument_node="">
</span><span data-dcnode-id="469" instrument_node="">
</span><ins class="adsbygoogle arti-top-oct14-resp" data-ad-client="ca-pub-4745434794451545" data-ad-slot="4526780888" data-dcnode-id="468" style="display:inline-block;"></ins><span data-dcnode-id="467" instrument_node="">
</span><span data-dcnode-id="464" instrument_node="">
</span></div><p class="txtcolor" data-dcnode-id="454" style="text-align: left;"><strong data-dcnode-id="458"><span data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">  Planet vs Moon </span></span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">
</span></strong><span data-dcnode-id="457" instrument_node=""> </span><span data-dcnode-id="455" id="diffbwCompCheck"><span data-dcnode-id="456" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451" style="text-align: justify;"><span data-dcnode-id="452" instrument_node="">Celestial objects are curious things. From the very first days of civilization, human have wondered about the secrets and the majesty of the night sky. Captured in their imagination, these celestial objects were given life in the form of deities. These mysterious objects were an important part of their understanding of the universe and believed to influence their lives in many ways.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448" style="text-align: justify;"><span data-dcnode-id="449" instrument_node="">As science developed, study of these celestial wonders became more logical and understanding about the planets changed completely. Study of their motion gave rise to new scientific theories, and some theories were validated using these observations.</span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="444" style="text-align: justify;"><strong data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Planet</span></strong></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441" style="text-align: justify;"><span data-dcnode-id="442" instrument_node="">Planet is an astronomical body orbiting around a star, which has taken a spherical or nearly spherical shape under its own gravity and has a stable clear orbit.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438" style="text-align: justify;"><span data-dcnode-id="439" instrument_node="">Planets were known to men from the ancient times. Knowledge of their presence can be found in almost every ancient civilization of the world. In many societies, these fascinating objects in the sky are considered to be divine, and their knowledge on these depended, basically, on the naked eye observation.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435" style="text-align: justify;"><span data-dcnode-id="436" instrument_node="">Greek civilization supported intellectual discovery into many fields, and astronomy was one of them. Their observations led them to call these unusual objects compared to stars as wanderers. This name was given because, relative to the background stars, these moved forward, westward, sometimes eastward in the night sky. Therefore, they were considered separate from the rest of the stars.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432" style="text-align: justify;"><span data-dcnode-id="433" instrument_node="">In the ancient world, the existence of 7 planets only was known. Ordered according to the increasing distance from the sun, they are Mercury, Venus, Earth, Mars, Jupiter and Saturn. These were named after the deities of the mount Olympus in Greek mythology.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429" style="text-align: justify;"><span data-dcnode-id="430" instrument_node="">The discovery of telescope led to the discovery of more planets and, taken together with the sun, it is called the solar system. According to modern understanding there are 8 planets in the solar system, with Uranus and Neptune being the last two. First four planets of the solar system are terrestrial planets with a solid surface visible from outer space. Each of these planets has atmospheres but very different from each other. The outer four planets are known as the Jovian planets or the gas giants. These planets are made of primarily gases, therefore, has enormous atmospheres. Mercury is the smallest planet, and Jupiter is the largest planet.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426" style="text-align: justify;"><span data-dcnode-id="427" instrument_node="">Discovered in 1930 by Clyde Tombaugh, the Pluto was considered as the outermost planet of the solar system. But the definition brought forward by the International Astronomical Union (IAU) in 2006 caused the demotion of the Pluto to a dwarf planet. Conditions for an astronomical object to be considered as a planet are given below.</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="422" style="text-align: justify; padding-left: 30px;"><em data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">1. The object orbit around the sun, or a star or a stellar remnant</span></em></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="418" style="text-align: justify; padding-left: 30px;"><em data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">2. The object is in hydrostatic equilibrium</span></em></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="414" style="text-align: justify; padding-left: 30px;"><em data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">3. The object has cleared the neighborhood of the orbit and dominant in the vicinity of the orbit.</span></em></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411" style="text-align: justify;"><span data-dcnode-id="412" instrument_node="">Any object that satisfies first and the second condition but violates the third is known as a dwarf planet. The orbit of Pluto is heavily influenced by the gravity of Neptune; therefore, not considered as dominant and has cleared the neighborhood of the orbit. There are 5 known dwarf planets in the solar system. Those are Ceres, Pluto, Haumea, Makemake and Eris.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408" style="text-align: justify;"><span data-dcnode-id="409" instrument_node="">Planets beyond our solar system also have been discovered. The advancement of observation technologies has led to this discovery by direct observation or deductions from indirect evidence. Planets orbiting the stars other than sun are generally called extrasolar planets or “Exoplanets”. Planets, varying from many times larger than Jupiter to small as earth, have been discovered, but the small ones may exist without being discovered because of the size.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="404" style="text-align: justify;"><strong data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Moon</span></strong></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401" style="text-align: justify;"><span data-dcnode-id="402" instrument_node="">Moon is a natural satellite orbiting around a planet. Our planet has a natural satellite and it is called “moon”. But the term has evolved into a give broader sense, and it can be used to refer to any natural satellite orbiting a planet.</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398" style="text-align: justify;"><span data-dcnode-id="399" instrument_node="">The first moons to be observed apart from the moon of the earth are the four Galilean satellites Io, Europa, Ganymede, and Callisto of the Jupiter system. Ganymede is the largest moon in the solar system, and Jupiter has 67 moons and Saturn have 62 moons. Mars has two moons; Phobos and Deimos. Uranus has 27 planets, and Neptune has 13 moons. The dwarf planet Pluto has 5 confirmed moons, and Haumea has 2.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395" style="text-align: justify;"><span data-dcnode-id="396" instrument_node="">Some of the large moons are terrestrial, i.e. made of rocky or metallic material. Some of the moons are made plainly of ice while some are made of a mixture of ice and rock. Several moons in the solar system have interesting characteristics. Lo, the closest moon to Jupiter has the highest volcanic activity anywhere in the solar system, as a result of the strong tidal forces acting in the interior of the moon. Europa is an icy moon. The surface is covered with ice while the interior is in liquid form as a result of the temperature generated by the tidal forces.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391"><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">What is the difference between Planet and Moon?</span></strong></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">• Planets are objects orbiting stars while moons are objects orbiting planets.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">• On average planets are larger than moons, but there can be exceptions to this. However, the moon is always smaller than the host planet.</span></p><span data-dcnode-id="384" instrument_node="">
</span><div data-dcnode-id="373" style=" text-align: center;  margin-bottom: 10px;"><span data-dcnode-id="383" instrument_node="">
