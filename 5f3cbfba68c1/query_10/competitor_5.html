</span><h1 class="detail-header gray" data-dcnode-id="1019"><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/our-work/"><span data-dcnode-id="1021" instrument_node="">Our Work</span></a></h1><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1016" instrument_node="">
</span><div class="wide" data-dcnode-id="1004"><span data-dcnode-id="1015" instrument_node="">

</span><h1 class="detail-header purple" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Guaranteed Income</span></h1><span data-dcnode-id="1010" instrument_node="">
</span><div class="row" data-dcnode-id="1006"><span data-dcnode-id="1009" instrument_node="">
</span><img alt="Guaranteed Income" class="" data-dcnode-id="1008" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/assets/jfi-illustration-guaranteedincome.jpg&amp;raw"><span data-dcnode-id="1007" instrument_node="">
</span></div><span data-dcnode-id="1005" instrument_node="">
</span></div><span data-dcnode-id="1003" instrument_node="">
</span></div><span data-dcnode-id="1001" instrument_node="">
</span><div class="row basic-grid" data-dcnode-id="966"><span data-dcnode-id="1000" instrument_node="">
</span><div data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">
</span><h2 class="detail-header gray" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Introduction</span></h2><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="994" instrument_node="">
</span><div class="main-content wide" data-dcnode-id="968"><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="992"></p><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">We build pilots, design policy, and conduct research on guaranteed income alongside international partners in government, philanthropy, and academia.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The nature of work is changing, and in an era of widening inequality, legacy social safety net programs are inadequate and inefficient. Our society has the resources to raise the standard of living for all people, and the responsibility to find the most just and efficient means.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">Since 2016, we’ve worked to study direct cash transfer programs and basic income initiatives in the US and around the world. We have built out a global network of fellows, advisors, and partners that provides a unique view into the variety of ways cash transfer programs can be structured and implemented. Our </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/from-idea-to-reality-the-future-of-guaranteed-income/"><span data-dcnode-id="984" instrument_node="">in-depth white paper series</span></a><span data-dcnode-id="982" instrument_node=""> covers disbursement infrastructure, interactions with existing benefits, and optimal guaranteed income design.</span></p><span data-dcnode-id="980" instrument_node="">
</span><h2 data-dcnode-id="978" id="working-with-us"><span data-dcnode-id="979" instrument_node="">Working with us</span></h2><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">If you’re interested in working with us, email </span><a data-dcnode-id="974" href="mailto:jfi@jainfamilyinstitute.org"><span data-dcnode-id="975" instrument_node="">jfi@jainfamilyinstitute.org</span></a><span data-dcnode-id="973" instrument_node="">. We primarily partner with policymakers, local government officials (mayors, state representatives and senators, economic development teams within cities, etc), academics, and foundations. We provide research expertise and local insights on all aspects of guaranteed income policy. Our areas of knowledge include pilot and research design, strategy, operationalization, and implementation; assembly of academic advisory boards; consulting on cash transfer legislation, policy, and media; and analysis.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="970"></p><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span></div><span data-dcnode-id="965" instrument_node="">
</span><div class="row basic-grid" data-dcnode-id="945"><span data-dcnode-id="964" instrument_node="">
</span><div data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">
</span><h2 class="detail-header gray" data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Scholarship</span></h2><span data-dcnode-id="960" instrument_node="">
</span></div><span data-dcnode-id="958" instrument_node="">
</span><div class="main-content wide" data-dcnode-id="947"><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="956"></p><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">In the literature on guaranteed income, there are many open questions, from details like the optimal size and frequency of the transfer, to policy considerations around eligibility and universality, to the problem of funding, to concerns about detrimental interactions with other benefits, to uncertainty about large-scale societal and economic effects. The social, psychological, and economic impacts of unconditional cash have been difficult to predict and observe. Data is integral to informing and facilitating new policies.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">JFI conducts a wide range of interdisciplinary research on guaranteed income and related policies and theories, with a focus on defining and investigating those open questions, through pilot design, program evaluation, macroeconomic modeling, and sovereign wealth fund research.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="949"></p><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span></div><span data-dcnode-id="944" instrument_node="">
</span><div class="row basic-grid" data-dcnode-id="906"><span data-dcnode-id="943" instrument_node="">
</span><div data-dcnode-id="938"><span data-dcnode-id="942" instrument_node="">
</span><h2 class="detail-header gray" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Pilot Design</span></h2><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><div class="main-content wide" data-dcnode-id="908"><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="935"></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">JFI designs and implements pilots and conducts research to evaluate their impacts. This includes assembling academic advisory boards and building connections with expert advisors in social science, economics, and policy; developing analysis plans and data collection instruments; writing grants; and, where warranted, taking on the role of primary investigators.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">We work with other nonprofits, research institutions, cities and municipalities at every stage to create pilot-for-policy design that suits the community.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="928" instrument_node="">We are design and research partners on the Compton Pledge, </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/news/jfi-mayor-aja-brown-and-fund-for-guaranteed-income-announce-largest-city-based-guaranteed-income-initiative/"><span data-dcnode-id="927" instrument_node="">announced in October, 2020</span></a><span data-dcnode-id="925" instrument_node="">. Led by Compton, California mayor Aja Brown alongside JFI and the Fund for Guaranteed Income, this 800-recipient, two-year initiative is the largest city-led pilot in US history. More details about the program are available in the </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yh0.12e.myftpupload.com/wp-content/uploads/2020/10/FINAL-PRESS-RELEASE.pdf"><span data-dcnode-id="924" instrument_node="">press release</span></a><span data-dcnode-id="922" instrument_node=""> or on the </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//comptonpledge.org/"><span data-dcnode-id="921" instrument_node="">Compton Pledge website</span></a><span data-dcnode-id="919" instrument_node="">.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">Elsewhere in the US, we have helped to create research or pilot designs in </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/news/a-pre-analysis-plan-for-stockton/"><span data-dcnode-id="915" instrument_node="">Stockton, California</span></a><span data-dcnode-id="913" instrument_node="">; Chicago, Illinois; Atlanta, Georgia; Hudson, New York; and Newark, New Jersey, among other places. We have worked closely with peer organizations including the Economic Security Project and the Stanford Basic Income Lab.</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="910"></p><span data-dcnode-id="909" instrument_node="">
</span></div><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span><div class="row basic-grid" data-dcnode-id="876"><span data-dcnode-id="904" instrument_node="">
</span><div data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">
</span><h2 class="detail-header gray" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Policy Evaluation</span></h2><span data-dcnode-id="900" instrument_node="">
</span></div><span data-dcnode-id="898" instrument_node="">
</span><div class="main-content wide" data-dcnode-id="878"><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="896"></p><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">As interest in guaranteed income and UBI grows, more municipalities around the world are implementing cash transfer policies.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">Since 2019, we have collaborated with the city of Maricá, Brazil to evaluate the Citizens' Basic Income policy, one of the largest implementations of guaranteed income in history. Our bilingual website </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maricabasicincome.com/"><span data-dcnode-id="891" instrument_node="">maricabasicincome.com</span></a><span data-dcnode-id="889" instrument_node=""> contains comprehensive information about the study, publications, advisory board, news, and more.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">With our partners at the Federal Fluminense University (UFF), a prominent public research university in neighboring Niterói, Brazil, we’ve designed multiple analyses and evaluations of the program’s impact on Maricá’s citizens, in addition to helping the city find how it can most effectively use its revenue to support a guaranteed income in the long term. We’ve begun a mixed-methods study that combines semi-structured interviews with quantitative analysis. We also work closely with RBRB, the Brazilian Basic Income Network, in support of their work of guaranteed income implementation across Brazil.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Domestically, we’ve provided expert testimony in the New York City Council and for the Alaska State Legislature on their cash transfer programs.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="880"></p><span data-dcnode-id="879" instrument_node="">
</span></div><span data-dcnode-id="877" instrument_node="">
</span></div><span data-dcnode-id="875" instrument_node="">
</span><div class="row basic-grid" data-dcnode-id="846"><span data-dcnode-id="874" instrument_node="">
</span><div data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">
</span><h2 class="detail-header gray" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Unifying the Field</span></h2><span data-dcnode-id="870" instrument_node="">
</span></div><span data-dcnode-id="868" instrument_node="">
</span><div class="main-content wide" data-dcnode-id="848"><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="866"></p><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">To study guaranteed income requires combining research from multiple disciplinary approaches; to take maximum advantage of the information offered by multiple studies, however, requires strategic and systematic thinking about their design. In our high-level research initiatives, we shift from our specific applied projects to take a wider, collaborative view.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">First, we are responding to the Covid-19 crisis and the increasing prominence of guaranteed income in a series of papers that lay out what is needed, and what the research shows, for a large-scale policy: the necessary infrastructure, the ideal benefit, the financing, and the political viability. </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/from-idea-to-reality-the-future-of-guaranteed-income/"><span data-dcnode-id="861" instrument_node="">Find that series here</span></a><span data-dcnode-id="859" instrument_node="">.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">Second, we are taking on one of the hardest (and most under-discussed) questions in the field–the question of funding–through research; convening experts in sovereign and </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/social-wealth-seminar/"><span data-dcnode-id="855" instrument_node="">social wealth funds</span></a><span data-dcnode-id="853" instrument_node="">, finance, and impact investing; and partnerships with municipalities.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="850"></p><span data-dcnode-id="849" instrument_node="">

</span><li data-dcnode-id="825"><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Toolkit for creating a guaranteed income in your community:</span></strong><span data-dcnode-id="829" instrument_node=""> Our toolkit, published May 2021 and </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/assets/JFI-U.S.-Guaranteed-Income-Toolkit-May-2021.pdf"><span data-dcnode-id="828" instrument_node="">available here</span></a><span data-dcnode-id="826" instrument_node="">, provides a concrete starting point for anyone interested in supporting a guaranteed income for their community, particularly by launching a guaranteed income pilot. It begins by answering some of the key questions that arise in this undertaking, including what guaranteed income is, why it is gaining attention right now, what the open questions are that a pilot might answer, and what is involved in the creation of a local pilot.</span></li><span data-dcnode-id="824" instrument_node="">

</span><h2 class="gray" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Q&amp;A</span></h2><span data-dcnode-id="692" instrument_node="">

</span><ul class="faq-list" data-dcnode-id="239"><span data-dcnode-id="688" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="687" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="682"><a data-dcnode-id="683" href="#what-is-a-guaranteed-income"><span data-dcnode-id="686" instrument_node="">What is a guaranteed income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">→</span></span></a></h3><span data-dcnode-id="681" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="674" id="#what-is-a-guaranteed-income"><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Guaranteed income is a type of cash transfer program that provides continuous unconditional and unrestricted cash transfers to individuals or households. This differs from typical social safety net policies by providing a steady, predictable stream of cash to recipients to spend however they see fit without limitations.</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Guaranteed income policies and their variants, including basic income, citizen dividends, partial basic income, and universal basic income, have minimal or no eligibility requirements. A guaranteed income may or may not meet basic needs.</span></p><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="649"><span data-dcnode-id="670" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="665"><a data-dcnode-id="666" href="#whats-the-difference-between-guaranteed-income-and-a-cash-transfer-program-whats-the-difference-between-conditional-and-unconditional-programs"><span data-dcnode-id="669" instrument_node="">What’s the difference between guaranteed income and a cash transfer program? What’s the difference between conditional and unconditional programs?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">→</span></span></a></h3><span data-dcnode-id="664" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="651" id="#whats-the-difference-between-guaranteed-income-and-a-cash-transfer-program-whats-the-difference-between-conditional-and-unconditional-programs"><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Cash transfer programs are a broader category that includes guaranteed income programs. A cash transfer program is any program that offers direct cash assistance to an individual or household.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Cash transfers are called conditional when recipients must perform certain activities such as working or attending school in order to continue receiving benefits. Most existing safety net programs are conditional.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Cash transfers are called unconditional when receiving the cash doesn’t depend upon whether recipients perform any particular activities. A guaranteed income is an unconditional cash transfer. Another specification is that a cash transfer may be a one-off, while guaranteed income is regular.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><img alt="A graphic outlining different kinds of cash transfer programs." data-dcnode-id="654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/assets/faq-graphic.png&amp;raw"></p><span data-dcnode-id="652" instrument_node="">
</span></div><span data-dcnode-id="650" instrument_node="">
</span></li><span data-dcnode-id="648" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="647" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="642"><a data-dcnode-id="643" href="#what-is-basic-income"><span data-dcnode-id="646" instrument_node="">What is basic income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">→</span></span></a></h3><span data-dcnode-id="641" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="639" id="#what-is-basic-income"><span data-dcnode-id="640" instrument_node="">Basic income is a type of cash transfer program that provides cash sufficient to meet basic needs of all individuals or households in a given area. (We want to acknowledge that, as cash transfer policies have grown in prominence, the definitions have shifted, and some do not take the term basic income to require any particular amount) The amount offered may be pegged to area median income or the local poverty rate. Variations on this policy include targeted basic income, which has a selection criteria, a partial basic income that provides cash transfers which are not sufficient to meet basic needs, and Universal Basic Income.</span></div><span data-dcnode-id="638" instrument_node="">
</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="635" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="630"><a data-dcnode-id="631" href="#what-is-universal-basic-income-or-ubi"><span data-dcnode-id="634" instrument_node="">What is Universal Basic Income or UBI?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">→</span></span></a></h3><span data-dcnode-id="629" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="627" id="#what-is-universal-basic-income-or-ubi"><span data-dcnode-id="628" instrument_node="">A universal basic income is a type of basic income that would be provided to everybody in a community, regardless of socioeconomic or employment status. UBI policies have very few or no eligibility restrictions (e.g., employment, household income, or other similar factors are not considered).</span></div><span data-dcnode-id="626" instrument_node="">
</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="623" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="618"><a data-dcnode-id="619" href="#how-is-guaranteed-income-different-from-existing-benefit-programs-in-the-united-states"><span data-dcnode-id="622" instrument_node="">How is guaranteed income different from existing benefit programs in the United States?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">→</span></span></a></h3><span data-dcnode-id="617" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="615" id="#how-is-guaranteed-income-different-from-existing-benefit-programs-in-the-united-states"><span data-dcnode-id="616" instrument_node="">Guaranteed income provides direct cash assistance whereas U.S. social safety net policies such as EITC, Medicaid, and SNAP provide conditional, means-tested, and often in-kind benefits (like food or housing). Additionally, U.S. safety net programs typically target specific populations (disabled; income or assets below a particular value; or the presence of minors in the household), and the benefits typically come with conditions such as employment, enrollment in educational or training programs, or maintaining a&nbsp; criminal record free of convictions for drug-related offenses,. While these programs are valuable, they come with restricted use. For example, a housing voucher cannot pay for education or clothes.</span></div><span data-dcnode-id="614" instrument_node="">
</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="611" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="606"><a data-dcnode-id="607" href="#if-a-guaranteed-income-program-were-to-be-implemented-would-recipients-have-to-give-up-any-existing-benefits-they-qualify-for"><span data-dcnode-id="610" instrument_node="">If a guaranteed income program were to be implemented, would recipients have to give up any existing benefits they qualify for?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">→</span></span></a></h3><span data-dcnode-id="605" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="603" id="#if-a-guaranteed-income-program-were-to-be-implemented-would-recipients-have-to-give-up-any-existing-benefits-they-qualify-for"><span data-dcnode-id="604" instrument_node="">Guaranteed income policies are implemented by governments. The impact on benefits therefore depends on the policy choices of local, state, and federal entities. In the case of smaller, privately run pilots, researchers can make arrangements with governmental entities to prevent distributed funds from interfering with other benefits. Protecting people’s benefits is very important to the governments that JFI works with; in each of our exploratory demonstrations and pilots, we have worked with federal, state and local government officials to protect recipients’ benefits during and after the pilots.</span></div><span data-dcnode-id="602" instrument_node="">
</span></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="581"><span data-dcnode-id="599" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="594"><a data-dcnode-id="595" href="#what-are-some-arguments-in-support-of-creating-a-guaranteed-income-policy-such-as-universal-basic-income"><span data-dcnode-id="598" instrument_node="">What are some arguments in support of creating a guaranteed income policy such as universal basic income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">→</span></span></a></h3><span data-dcnode-id="593" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="583" id="#what-are-some-arguments-in-support-of-creating-a-guaranteed-income-policy-such-as-universal-basic-income"><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">The effects of direct cash support have been researched for decades. There is robust evidence that a UBI would reduce poverty and financial insecurity, improve education and health outcomes for kids, and promote housing stability. Many of these effects can also be observed to result from existing cash support programs targeted at parents like the EITC or the Child Tax Credit, both of which significantly reduce the number of families living in poverty. A universal basic income would increase these benefits and extend them to everyone.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">A universal basic income is increasingly recognized as a solution to many of the persistent shortcomings of the existing safety net. The work requirements, burdensome application processes, and exclusion of vulnerable groups which are a part of many existing programs ensure that millions do not receive the assistance they need, especially when jobs disappear or crises happen. Both the Great Recession and the COVID pandemic brought attention to many of these shortcomings and necessitated broad cash support legislation to keep people afloat. A UBI would provide a long-term solution that provides financial security both during national crises and during the smaller financial emergencies that millions of Americans face every day.&nbsp;</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">A UBI does more than ensure that everyone can meet their basic needs; it also empowers them to pursue new opportunities and take risks like moving to a new city, starting a business, searching for a new job, or advancing their education. Financial precarity often holds people back from pursuing riskier opportunities that might leave them better off in the long term. A UBI can unlock this suppressed potential by providing people with breathing room to focus on thriving, not just surviving.</span></p><span data-dcnode-id="584" instrument_node="">
</span></div><span data-dcnode-id="582" instrument_node="">
</span></li><span data-dcnode-id="580" instrument_node="">
</span><li data-dcnode-id="563"><span data-dcnode-id="579" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="574"><a data-dcnode-id="575" href="#some-people-talk-about-guaranteed-income-and-automation-together.-what-is-the-relationship-between-guaranteed-income-and-automation"><span data-dcnode-id="578" instrument_node="">Some people talk about guaranteed income and automation together. What is the relationship between guaranteed income and automation?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">→</span></span></a></h3><span data-dcnode-id="573" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="565" id="#some-people-talk-about-guaranteed-income-and-automation-together.-what-is-the-relationship-between-guaranteed-income-and-automation"><span data-dcnode-id="572" instrument_node="">The idea that automation poses a unique threat to everyone’s employment is </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aeaweb.org/articles%3Fid%3D10.1257/jep.29.3.3"><span data-dcnode-id="571" instrument_node="">controversial</span></a><span data-dcnode-id="569" instrument_node=""> and ultimately not necessary to make the case for a guaranteed income. It is true that some of the most vocal current advocates of a guaranteed income (for example, Andrew Yang or </span><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/elon-musk-universal-basic-income-2017-2"><span data-dcnode-id="568" instrument_node="">Elon Musk</span></a><span data-dcnode-id="566" instrument_node="">) argue that we need this policy because of the threat of automation. However, scholars, government officials, and community leaders have advocated for guaranteed income programs for decades and for many different reasons. Generally speaking, guaranteed income provides financial stability to people who would otherwise fall through the cracks during times of significant economic change, including automation, as well as individual challenges and crises.</span></div><span data-dcnode-id="564" instrument_node="">
</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="543"><span data-dcnode-id="561" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="556"><a data-dcnode-id="557" href="#what-are-some-arguments-against-creating-a-guaranteed-income-policy-such-as-universal-basic-income"><span data-dcnode-id="560" instrument_node="">What are some arguments against creating a guaranteed income policy such as universal basic income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">→</span></span></a></h3><span data-dcnode-id="555" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="545" id="#what-are-some-arguments-against-creating-a-guaranteed-income-policy-such-as-universal-basic-income"><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">One common counterargument is that a universal basic income would be expensive ($3 trillion a year in the US, </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w25538"><span data-dcnode-id="553" instrument_node="">by one estimate</span></a><span data-dcnode-id="551" instrument_node="">) and that money might be better spent in other ways. A related critique focuses on the value of universal versus targeted transfers: is it better to give some money to many people or a larger amount to a smaller, needier group of people?</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Some have argued that individuals may spend benefits on “temptation goods” like drugs, cigarettes, and alcohol or use the money for unnecessary purposes. But see below–this argument has no grounding in research. Another common argument, that guaranteed income leads to people quitting their jobs, is also not supported by evidence.</span></p><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
</span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="541" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="536"><a data-dcnode-id="537" href="#does-the-research-show-that-guaranteed-income-cash-transfer-recipients-quit-their-jobs-and-spend-the-money-on-alcohol-cigarettes-or-drugs"><span data-dcnode-id="540" instrument_node="">Does the research show that guaranteed income cash transfer recipients quit their jobs and spend the money on alcohol, cigarettes, or drugs?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">→</span></span></a></h3><span data-dcnode-id="535" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="528" id="#does-the-research-show-that-guaranteed-income-cash-transfer-recipients-quit-their-jobs-and-spend-the-money-on-alcohol-cigarettes-or-drugs"><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">No. This is a common misconception. Numerous studies of cash transfer programs around the world have shown that recipients do not increase their use of alcohol or drugs. While some individuals do work less, the overall effect is modest. Those who do cut back on work also appear to devote more time to socially beneficial activities like job training, education, or taking care of children.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Extensive social science research on cash transfer programs around the world shows that cash transfer recipients spend their benefits responsibly on food, housing, bills, durable goods (e.g. a cow, a car, a refrigerator), and improvement of well-being. In other words, they spend it on taking care of themselves and their families.</span></p><span data-dcnode-id="529" instrument_node="">
</span></div><span data-dcnode-id="527" instrument_node="">
</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="514"><span data-dcnode-id="524" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="519"><a data-dcnode-id="520" href="#how-do-we-study-what-recipients-spend-their-money-on"><span data-dcnode-id="523" instrument_node="">How do we study what recipients spend their money on?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">→</span></span></a></h3><span data-dcnode-id="518" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="516" id="#how-do-we-study-what-recipients-spend-their-money-on"><span data-dcnode-id="517" instrument_node="">Researchers survey recipients about how they’re using the money — and how the money affects their finances, decision-making, wellbeing, and more — throughout a pilot and afterwards. Social scientists have developed a variety of established surveying techniques to get accurate information from recipients. For some guaranteed income studies, researchers use administrative data, health records, and so on to see how recipients fare.</span></div><span data-dcnode-id="515" instrument_node="">
</span></li><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="488"><span data-dcnode-id="512" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="507"><a data-dcnode-id="508" href="#does-ubi-have-broader-effects-on-income-distribution-or-inflation"><span data-dcnode-id="511" instrument_node="">Does UBI have broader effects on income distribution or inflation? &nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">→</span></span></a></h3><span data-dcnode-id="506" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="490" id="#does-ubi-have-broader-effects-on-income-distribution-or-inflation"><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Research on the cost-effectiveness and “distributional” implications of guaranteed income programs is still in its infancy, but with our macroeconomic modelling work, JFI will provide answers to some of the questions that underlie this debate.</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="502" instrument_node="">JFI is also exploring the question of inflation using macroeconomic models and simulations, as well as in our work on the large-scale policy implemented in </span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maricabasicincome.com/"><span data-dcnode-id="501" instrument_node="">Maricá, Brazil.</span></a><span data-dcnode-id="499" instrument_node=""> This work is parallel to our pilot efforts and is informed, in part, by findings from them.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">&nbsp;Early evidence from Kenya, Mexico, and our own </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/news/universal-basic-income-in-nyc-working-paper-on-macroeconomic-effects/"><span data-dcnode-id="495" instrument_node="">macroeconomic modeling research</span></a><span data-dcnode-id="493" instrument_node=""> focused on NYC suggests that inflation effects are unsubstantiated.</span></p><span data-dcnode-id="491" instrument_node="">
</span></div><span data-dcnode-id="489" instrument_node="">
</span></li><span data-dcnode-id="487" instrument_node="">
</span><li data-dcnode-id="450"><span data-dcnode-id="486" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="481"><a data-dcnode-id="482" href="#are-any-guaranteed-income-pilots-or-policies-currently-operating-in-the-us-and-how-much-money-do-participants-receive"><span data-dcnode-id="485" instrument_node="">Are any guaranteed income pilots or policies currently operating in the US, and how much money do participants receive?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">→</span></span></a></h3><span data-dcnode-id="480" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="452" id="#are-any-guaranteed-income-pilots-or-policies-currently-operating-in-the-us-and-how-much-money-do-participants-receive"><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Yes, there are several pilots and policies currently running or in development. Among pilots, the size of the transfers vary, but the amount is meant to make a substantive difference in citizens’ lives. Recent pilots include:</span></p><span data-dcnode-id="477" instrument_node="">
</span><ul data-dcnode-id="463"><span data-dcnode-id="476" instrument_node="">
</span><li data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Compton Pledge (Compton, CA) - $300-600 per month on a quarterly or bi-monthly disbursement schedule</span></li><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Stockton SEED (Stockton, CA) - $500/month</span></li><span data-dcnode-id="470" instrument_node="">
</span><li data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Magnolia Mothers Trust (Jackson, MS) - $1000/month</span></li><span data-dcnode-id="467" instrument_node="">
</span><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">People’s Prosperity (St. Paul, MN) - $500 per month</span></li><span data-dcnode-id="464" instrument_node="">
</span></ul><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">The oldest active guaranteed income policy in the US is the Alaska Permanent Fund Dividend, which was implemented in 1976 and distributes public earnings from state oil revenue in the form of a yearly lump sum payment to all Alaska residents that have lived within the state for a full calendar year and intend to remain Alaska residents indefinitely. Residents receive $1500-$2500 per year. The Dividend has been and continues to be the subject of </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D3118343"><span data-dcnode-id="460" instrument_node="">research</span></a><span data-dcnode-id="458" instrument_node=""> that can provide insights into the effects of cash transfers more generally.</span></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Some Native American tribes also distribute guaranteed incomes to their members. For example, The Eastern Band of Cherokee Indians have provided a guaranteed income to members since 1996, drawing from casino revenue.</span></p><span data-dcnode-id="453" instrument_node="">
</span></div><span data-dcnode-id="451" instrument_node="">
</span></li><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="435"><span data-dcnode-id="448" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="443"><a data-dcnode-id="444" href="#how-are-these-pilots-being-funded-both-the-disbursement-and-research"><span data-dcnode-id="447" instrument_node="">How are these pilots being funded (both the disbursement and research)?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">→</span></span></a></h3><span data-dcnode-id="442" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="437" id="#how-are-these-pilots-being-funded-both-the-disbursement-and-research"><span data-dcnode-id="441" instrument_node="">Almost all guaranteed income pilots currently underway in the U.S. have been privately funded with philanthropic dollars and/or institutional grants. In one case, the city of St. Paul, Minnesota was able to allocate local funds from the CARES Act to a local guaranteed income pilot. The city of Los Angeles announced a pilot in spring 2021 that uses </span><a data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/2021/04/19/los-angeles-guaranteed-income-poor-residents-eric-garcetti-la-monthly-payments/"><span data-dcnode-id="440" instrument_node="">American Rescue Plan stimulus funds</span></a><span data-dcnode-id="438" instrument_node="">. San Francisco’s Abundant Birth pilot and Chelsea, MA also used government funding.</span></div><span data-dcnode-id="436" instrument_node="">
</span></li><span data-dcnode-id="434" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="433" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="428"><a data-dcnode-id="429" href="#how-would-a-policy-for-an-entire-city-state-or-country-be-funded"><span data-dcnode-id="432" instrument_node="">How would a policy for an entire city, state, or country be funded?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">→</span></span></a></h3><span data-dcnode-id="427" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="416" id="#how-would-a-policy-for-an-entire-city-state-or-country-be-funded"><span data-dcnode-id="426" instrument_node="">A universal guaranteed income policy at the municipal, state, or federal level can potentially be funded through a VAT tax, a carbon tax, a wealth tax, an increase in progressive income tax, a budget reallocation, or dividend from some kind of fund, like natural resources, casino revenue, some kind of sovereign or </span><a data-dcnode-id="424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplespolicyproject.org/projects/social-wealth-fund/"><span data-dcnode-id="425" instrument_node="">social wealth fund</span></a><span data-dcnode-id="423" instrument_node="">. This is an area of </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/8f41/49ca356089d17a2d9e33570bb5fd02251494.pdf"><span data-dcnode-id="422" instrument_node="">ongoing research</span></a><span data-dcnode-id="420" instrument_node="">. Permanent funding for a city-level basic income is unusual, but in </span><a data-dcnode-id="418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maricabasicincome.com/"><span data-dcnode-id="419" instrument_node="">Maricá, Brazil</span></a><span data-dcnode-id="417" instrument_node="">, where we’re conducting research, the 42,000-recipient basic income is funded by oil revenues.</span></div><span data-dcnode-id="415" instrument_node="">
</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="379"><span data-dcnode-id="412" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="407"><a data-dcnode-id="408" href="#why-conduct-more-pilots"><span data-dcnode-id="411" instrument_node="">Why conduct more pilots?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">→</span></span></a></h3><span data-dcnode-id="406" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="381" id="#why-conduct-more-pilots"><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">JFI believes that guaranteed income programs are supported by extensive evidence for the effectiveness of direct cash support. However, we believe that there is still a lot to learn about the individual, community, and large-scale effects of these policies and about how best to implement them at scale. While we know a fair amount about how a guaranteed income works, well-designed pilots can help us learn more about what an optimal or feasible guaranteed income policy would look like in different environments. JFI pilots serve these purposes by</span></p><span data-dcnode-id="403" instrument_node="">
</span><ul data-dcnode-id="386"><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Allowing policymakers to incorporate evidence into their decision-making</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Building out disbursement systems that would be used in a full-scale policy</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Testing logistics and other tools critical to implementation</span></li><span data-dcnode-id="393" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Inviting citizens to have an impact on policies that will affect them</span></li><span data-dcnode-id="390" instrument_node="">
</span><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Evaluating long-term effects on individuals and the broader economy</span></li><span data-dcnode-id="387" instrument_node="">
</span></ul><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">On the academic side, we can study important effects and research questions of a large regular cash transfer that have not been deeply studied. These include changes in time use, impacts on labor and leisure, time and investment in child-care and job training, changes in community engagement, and qualitative understandings of lived experience and well-being.</span></p><span data-dcnode-id="382" instrument_node="">
</span></div><span data-dcnode-id="380" instrument_node="">
</span></li><span data-dcnode-id="378" instrument_node="">
</span><li data-dcnode-id="356"><span data-dcnode-id="377" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="372"><a data-dcnode-id="373" href="#whats-the-history-of-guaranteed-income"><span data-dcnode-id="376" instrument_node="">What's the history of guaranteed income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">→</span></span></a></h3><span data-dcnode-id="371" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="358" id="#whats-the-history-of-guaranteed-income"><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Although the conversation around UBI is having a recent revival, the concept is perennial, with early references to a guaranteed minimum income dating as far back as the sixteenth century. In Utopia, Thomas More proposed that providing “everyone with some means of livelihood” would be a more effective deterrence for theft than the death sentence.&nbsp;</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The sentiment that the state should guarantee citizens a secure subsistence has been echoed in the writings of Montesquieu, Thomas Paine, Charles Fourier, John Stuart Mill, Bertrand Russell, Milton Friedman, and Martin Luther King, among others, though the underlying motivations and details of the proposals vary widely. Whereas Paine argued for a basic income on the premise of common ownership of the earth, others focused on the decoupling of work and income, equality of opportunity, redistribution of wealth, freedom (from state paternalism), or simplification of the welfare state.&nbsp;</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="364" instrument_node="">For more, see </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/basic-income/history/"><span data-dcnode-id="363" instrument_node="">this overview from basicincome.org</span></a><span data-dcnode-id="361" instrument_node="">.</span></p><span data-dcnode-id="359" instrument_node="">
</span></div><span data-dcnode-id="357" instrument_node="">
</span></li><span data-dcnode-id="355" instrument_node="">
</span><li data-dcnode-id="344"><span data-dcnode-id="354" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="349"><a data-dcnode-id="350" href="#does-the-jain-family-institute-advocate-a-full-scale-guaranteed-income-policy"><span data-dcnode-id="353" instrument_node="">Does the Jain Family Institute advocate a full-scale guaranteed income policy?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">→</span></span></a></h3><span data-dcnode-id="348" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="346" id="#does-the-jain-family-institute-advocate-a-full-scale-guaranteed-income-policy"><span data-dcnode-id="347" instrument_node="">In light of extensive research that clearly supports the benefits of unconditional cash transfers as a means of reducing poverty and improving well-being, JFI supports the creation of more robust unconditional cash transfer policies as a part of the safety net. At the same time, there are many open questions around the optimal form that a guaranteed income might take. JFI supports efforts to implement guaranteed income policy without being committed to any one particular design. JFI’s work implicitly endorses policies that are supported by robust evidence, including our own research: a range of cash and safety net policies fall under this purview.</span></div><span data-dcnode-id="345" instrument_node="">
</span></li><span data-dcnode-id="343" instrument_node="">
</span><li data-dcnode-id="326"><span data-dcnode-id="342" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="337"><a data-dcnode-id="338" href="#does-the-jain-family-institute-work-with-any-guaranteed-income-projects-that-are-currently-underway"><span data-dcnode-id="341" instrument_node="">Does the Jain Family Institute work with any guaranteed income projects that are currently underway?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">→</span></span></a></h3><span data-dcnode-id="336" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="328" id="#does-the-jain-family-institute-work-with-any-guaranteed-income-projects-that-are-currently-underway"><span data-dcnode-id="335" instrument_node="">We are researchers on one of the world’s largest guaranteed income policies, the Citizens’ Basic Income in </span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.maricabasicincome.com/"><span data-dcnode-id="334" instrument_node="">Maricá, Brazil</span></a><span data-dcnode-id="332" instrument_node="">. We are also researchers for the </span><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.comptonpledge.org/"><span data-dcnode-id="331" instrument_node="">Compton Pledge</span></a><span data-dcnode-id="329" instrument_node="">, one of the largest municipal guaranteed income pilots in the United States. JFI staff serve as advisors on SEED, the Stockton guaranteed income pilot, and as members of Newark, New Jersey’s Guaranteed Income Task Force. We are also advising on or developing several pilots conducted by states, cities, and nonprofits that are not yet public.</span></div><span data-dcnode-id="327" instrument_node="">
</span></li><span data-dcnode-id="325" instrument_node="">
</span><li data-dcnode-id="294"><span data-dcnode-id="324" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="319"><a data-dcnode-id="320" href="#what-else-does-the-jain-family-institute-do-on-guaranteed-income"><span data-dcnode-id="323" instrument_node="">What else does the Jain Family Institute do on guaranteed income?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">→</span></span></a></h3><span data-dcnode-id="318" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="296" id="#what-else-does-the-jain-family-institute-do-on-guaranteed-income"><p data-dcnode-id="304"><span data-dcnode-id="317" instrument_node="">In addition to pilots, JFI is working on several other projects to advance the field.&nbsp; Our ongoing whitepaper series </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/from-idea-to-reality-the-future-of-guaranteed-income/"><span data-dcnode-id="316" instrument_node="">From Idea to Reality: Getting to Guaranteed Income</span></a><span data-dcnode-id="314" instrument_node=""> includes “</span><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/parts/building-a-helicopter-pathways-for-targeting-distributing-a-us-guaranteed-income/"><span data-dcnode-id="313" instrument_node="">Building a Helicopter: Pathways for Targeting &amp; Distributing a US Guaranteed Income</span></a><span data-dcnode-id="311" instrument_node="">” and “</span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/projects/parts/reweaving-the-safety-net-the-best-fit-for-guaranteed-income/"><span data-dcnode-id="310" instrument_node="">Reweaving the Safety Net: The Best Fit for Guaranteed Income</span></a><span data-dcnode-id="308" instrument_node="">” with two more papers forthcoming. We have also released a </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/news/a-toolkit-on-guaranteed-income-in-the-u.s./"><span data-dcnode-id="307" instrument_node="">toolkit</span></a><span data-dcnode-id="305" instrument_node=""> which provides a practical starting point for anyone interested in supporting a guaranteed income in their community, including the creation of a pilot.</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="302" instrument_node="">We are also supporting work to model the effects of guaranteed income policies at a metropolitan or national level to understand how such policies would affect employment, GDP and housing markets and how these effects would vary according to financing approach (e.g., paid for through income taxes, sales taxes, carbon taxes, etc.). See, for example, this JFI-supported </span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jainfamilyinstitute.org/news/universal-basic-income-in-nyc-working-paper-on-macroeconomic-effects/"><span data-dcnode-id="301" instrument_node="">macromodel of a UBI in New York City</span></a><span data-dcnode-id="299" instrument_node="">, released in March 2021.</span></p><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">
</span></li><span data-dcnode-id="293" instrument_node="">
</span><li data-dcnode-id="282"><span data-dcnode-id="292" instrument_node="">
</span><h3 class="detail-header purple reveal" data-dcnode-id="287"><a data-dcnode-id="288" href="#can-i-be-a-guaranteed-income-recipient-in-a-ubi-pilot"><span data-dcnode-id="291" instrument_node="">Can I be a guaranteed income recipient in a UBI pilot?&nbsp;</span><span class="unicode-symbol faq-arrow" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">→</span></span></a></h3><span data-dcnode-id="286" instrument_node="">
</span><div class="faq-text main-content hidden" data-dcnode-id="284" id="#can-i-be-a-guaranteed-income-recipient-in-a-ubi-pilot"><span data-dcnode-id="285" instrument_node="">The work we do on pilots and demonstrations is experimental and randomized, so no one can currently opt into a pilot. (Randomization is a key aspect of social science experimental research.) Studies are randomized to allow unbiased collection of data.</span></div><span data-dcnode-id="283" instrument_node="">
