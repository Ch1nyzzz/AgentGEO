</span><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-84695" data-dcnode-id="1010" id="menu-item-84695"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.actblue.com/donate/epi"><span data-dcnode-id="1012" instrument_node="">Donate</span></a></li><span data-dcnode-id="1009" instrument_node="">

</span><div class="row first-row" data-dcnode-id="968"><span data-dcnode-id="996" instrument_node="">
</span><div class="row-content" data-dcnode-id="970"><span data-dcnode-id="995" instrument_node="">
</span><div class="ip-header-and-excerpt" data-dcnode-id="972"><span data-dcnode-id="994" instrument_node="">
</span><span data-dcnode-id="992" instrument_node="">
</span><h1 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">
				Guaranteed retirement accounts			</span></h1><span data-dcnode-id="989" instrument_node="">
</span><span data-dcnode-id="987" instrument_node="">
</span><div class="excerpt" data-dcnode-id="974"><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="979"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">We need a retirement system that meets the needs of a 21st century workforce.</span></strong><span data-dcnode-id="983" instrument_node=""> American workers switch jobs more frequently than those in most other high-income countries, and most are living longer than they did in decades before. Half of all American workers have nothing saved for retirement.</span><sup data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">1</span></sup><span data-dcnode-id="980" instrument_node="">&nbsp;Thus it is no surprise that running out of money in retirement is a major source of anxiety for Americans of all ages.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">The good news is that we have a proposal to ensure that all workers can easily save and, when they retire, receive a monthly paycheck for life. It’s called a Guaranteed Retirement Account.</span></p><span data-dcnode-id="975" instrument_node="">
</span></div><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span></div><span data-dcnode-id="969" instrument_node="">
</span></div><span data-dcnode-id="967" instrument_node="">
</span><div class="row" data-dcnode-id="383"><span data-dcnode-id="966" instrument_node="">
</span><div class="row-content ip-main-v2" data-dcnode-id="385" id="content"><span data-dcnode-id="965" instrument_node="">
</span><article data-dcnode-id="387" id="page-169550"><span data-dcnode-id="964" instrument_node="">
</span><span data-dcnode-id="962" instrument_node="">
</span><div class="issuepage-post-content" data-dcnode-id="555"><span data-dcnode-id="961" instrument_node="">
</span><h3 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">1. What is the Guaranteed Retirement Account (GRA) plan?</span></h3><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The GRA is a retirement plan for all employees who are not participating in an equal or better retirement plan through their employer. Self-employed workers would also participate.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h3 data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">2. How would the GRA plan work?</span></h3><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Employees would contribute 1.5 percent of every paycheck into the account. Employers would contribute another 1.5 percent. (Self-employed workers would contribute both the employee and employer portion, for a total of 3.0 percent.) Employers and employees (and self-employed workers) could contribute more if they wanted to.</span></p><span data-dcnode-id="949" instrument_node="">
</span><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">3. If I already struggle to pay my bills, how can I afford to save for retirement?</span></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">The GRA plan provides a tax credit equal to 1.5 percent of pay up to $600 a year to all participants. If you make under $40,000 a year, nothing would be taken out of your paycheck.</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">4. Is there a cap?</span></h3><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Yes, neither employees nor employers have to contribute on any earnings that exceed $200,000 a year.</span></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">5. How would my contributions be invested?</span></h3><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">You would be able to choose from a list of fund managers, with well-diversified investment choices that are pooled, professionally managed, and offer low fees.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h3 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">6. When would I start saving?</span></h3><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">You would start saving in your GRA as soon as you start working, which is what people should be doing to ensure a secure retirement. With a GRA, your first day of work would also be the first day you contribute to your own retirement account!</span></p><span data-dcnode-id="925" instrument_node="">
</span><h3 data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">7. What would happen to my GRA when I get a new job?</span></h3><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Your GRA will travel with you wherever you go. If your new job does not offer a retirement plan that is equivalent to or better than the GRA plan, you would keep contributing to your GRA at your new job. However, if the new job offers a retirement plan that is equivalent to or better than your GRA, you could join that plan instead. Meanwhile, the money in your GRA account would continue to earn investment income.</span></p><span data-dcnode-id="919" instrument_node="">
</span><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">8. What would happen when I retire?</span></h3><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">At age 62 or later—whenever you choose to retire—you would be eligible to receive a guaranteed monthly check for the rest of your life. The amount of your monthly check would be determined based on the amount you have in your GRA at retirement, and it would gradually increase over time to keep up with inflation. GRA benefits would be similar to a lifetime pension.</span></p><span data-dcnode-id="913" instrument_node="">
</span><h3 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">9. How much would a GRA increase my retirement income?</span></h3><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">If an employee, who is an average earner, and employer kept to the 3.0 percent contribution, the employee would increase his or her Social Security benefit by roughly a third.{{2}}</span></p><span data-dcnode-id="907" instrument_node="">
</span><h3 data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">10. Has a plan like the GRA ever been implemented outside of the United States?</span></h3><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">The GRA is a tried and tested idea. Similar plans have worked well in several countries, including Australia.</span></p><span data-dcnode-id="901" instrument_node="">
</span><h3 data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">11. Why do policymakers need to ensure workers are prepared for retirement?</span></h3><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Half of working Americans have no retirement savings.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">One reason for this is that some small businesses owners do not feel they have the expertise to set up a retirement plan for their employees. The GRA plan would level the playing field so that all workers have the opportunity to save for retirement, regardless of who their employer is. Policymakers have a moral obligation to provide people with the opportunity to build a secure financial future for themselves.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">12. What do people think of the Guaranteed Retirement Account plan?</span></h3><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">In a nationwide poll, the vast majority of respondents—including 78 percent of Democrats, 77 percent of Republicans, and 86 percent of millennials in 2018—supported this plan, as shown in </span><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Figure A</span></strong><span data-dcnode-id="885" instrument_node="">.</span></p><span data-dcnode-id="883" instrument_node="">
</span><span data-dcnode-id="881" instrument_node="">

</span><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">13. How does this program work with Social Security?</span></h3><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Social Security benefits will replace roughly 40 percent of earnings in retirement for an average worker. This is less than in the past—and it isn’t enough. Social Security should be expanded and strengthened for all Americans.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The GRA plan would replace an additional 14 percent of earnings for an average earner who participates in the plan for his or her entire career.{{3}} It is designed to bridge the gap for workers whose employers don’t currently contribute to their retirement through a pension or 401(k)-style plan. Unlike Social Security expansion, the GRA plan would not directly affect workers who already receive good employer benefits. Instead, it would lift the floor for the roughly half of workers who currently receive meager or no retirement benefit from their employers, while ensuring that steady contributions are made on behalf of all workers throughout their working lives.</span></p><span data-dcnode-id="579" instrument_node="">
</span><hr data-dcnode-id="578"><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="576" instrument_node="">{{1.}} Jennifer Brown, Joelle Saad-Lessler, and Diane Oakley, </span><em data-dcnode-id="573"><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nirsonline.org/wp-content/uploads/2018/09/SavingsCrisis_Final.pdf"><span data-dcnode-id="575" instrument_node="">Retirement in America: Out of Reach for Working Americans?</span></a></em><span data-dcnode-id="572" instrument_node="">, National Institute on Retirement Security, September 2018.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="569" instrument_node="">{{2.}}&nbsp;Source: EPI estimate based on Social Security Administration’s “scaled medium earner” for a worker age 21 in 2019 (Michael Clingman, Kyle Burkhalter, and Chris Chaplain, </span><em data-dcnode-id="566"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/oact/NOTES/ran9/an2018-9.pdf"><span data-dcnode-id="568" instrument_node="">Replacement Rates for Hypothetical Retired Workers</span></a></em><span data-dcnode-id="565" instrument_node="">, Social Security Administration Actuarial Note no. 2018.9, June 2018). The worker is assumed to retire at Social Security’s normal retirement age (67 for workers in this age cohort), with earnings at ages 66 and 67 assumed to equal earnings at age 65 in nominal terms. Price inflation (2.6 percent), wage inflation (3.8 percent), and life expectancy (23 years at age 65) assumptions are based on Social Security Administration, </span><em data-dcnode-id="562"><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssa.gov/oact/tr/2018/lrIndex.html"><span data-dcnode-id="564" instrument_node="">Single-Year Tables Consistent with 2018 OASDI Trustees Report</span></a></em><span data-dcnode-id="561" instrument_node="">, (Tables V.A5 and V.B1). Outcomes will depend on investment returns, which may be less than the assumed 6 percent (3.4 percent adjusted for inflation). Amounts are expressed in 2019 dollars. Benefits increase over time to keep up with inflation.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">{{3.}} Replacement rates are based on wage-indexed average earnings, similar to the methodology used by Social Security Administration actuaries. Assumptions are the same as in note 2.</span></p><span data-dcnode-id="556" instrument_node="">
