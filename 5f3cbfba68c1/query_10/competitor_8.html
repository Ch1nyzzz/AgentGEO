2&amp;url=https%3A//www.teenvogue.com/story/universal-basic-income-explained"><span data-dcnode-id="460" instrument_node="">universal basic income</span></a><span data-dcnode-id="458" instrument_node=""> (UBI). It was a </span><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/andrew-yang-explains-why-young-voters-are-drawn-to-his-candidacy"><span data-dcnode-id="457" instrument_node="">cornerstone of the 2020 presidential campaign of Andrew Yang</span></a><span data-dcnode-id="455" instrument_node="">, who </span><a class="external-link" data-dcnode-id="453" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html&quot;}" data-offer-url="https://www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="454" instrument_node="">offered a $1,000 monthly “Freedom Dividend”</span></a><span data-dcnode-id="452" instrument_node=""> to American adults. During the COVID-19 pandemic, some lawmakers have </span><a class="external-link" data-dcnode-id="450" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html&quot;}" data-offer-url="https://www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/03/18/us/politics/universal-basic-income-andrew-yang.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="451" instrument_node="">pushed for the government to provide monthly direct payments</span></a><span data-dcnode-id="449" instrument_node=""> to all households so people could pay rent or other expenses. As Rebekka Ayres wrote for </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Teen Vogue</span></em><span data-dcnode-id="446" instrument_node="">, UBI basically proposes “that the government provides every citizen with a lump sum of income every year, no strings attached.”</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="444" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">But are you familiar with a guaranteed income (G.I.)? The concepts are related, but not identical. And some advocates fighting for economic equality have come around to thinking a G.I. might be a more achievable proposal that would better address income inequality. So it’s worth teasing out the differences between the two.</span></p><h2 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">What is a G.I., or a guaranteed minimum income?</span></h2><p data-dcnode-id="435"><span data-dcnode-id="439" instrument_node="">Rather than providing equal and unrestricted cash payments to every resident, guaranteed income </span><a class="external-link" data-dcnode-id="437" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.economicsecurityproject.org/guaranteedincome/&quot;}" data-offer-url="https://www.economicsecurityproject.org/guaranteedincome/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economicsecurityproject.org/guaranteedincome/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="438" instrument_node="">argues for providing cash payments to specific, targeted communities of people</span></a><span data-dcnode-id="436" instrument_node=""> with the express goal of addressing income inequality. G.I. focuses on people living below the poverty line or with inconsistent or no income, and it serves as a built-in income floor for those without one. People who already have an income that allows them to meet their basic needs likely would not be eligible for cash payments through a G.I. program.</span></p><h2 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Why are some people championing G.I. over UBI?</span></h2><p data-dcnode-id="419"><span data-dcnode-id="432" instrument_node="">Most recent and current UBI pilot programs in the U.S. prioritize random participants and objectivity while also endeavoring to meet the economic needs of participants. One famous example is the </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/news-desk/the-promising-results-of-a-citywide-basic-income-experiment"><span data-dcnode-id="431" instrument_node="">UBI pilot program</span></a><span data-dcnode-id="429" instrument_node=""> launched by Michael Tubbs, the former mayor of Stockton, California, in February 2019. Funded by donors including the </span><a class="external-link" data-dcnode-id="427" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.stocktondemonstration.org/&quot;}" data-offer-url="https://www.stocktondemonstration.org/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stocktondemonstration.org/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="428" instrument_node="">Economic Security Project (ESP)</span></a><span data-dcnode-id="426" instrument_node="">, the initiative provided 125 residents with a fully unrestricted and unregulated $500 per month for the duration of its 18-month-run. Tubbs often </span><a class="external-link" data-dcnode-id="424" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.abc10.com/article/news/local/stockton/dr-kings-dream-lives-on-in-stockton-mayors-income-experiment/103-535290381&quot;}" data-offer-url="https://www.abc10.com/article/news/local/stockton/dr-kings-dream-lives-on-in-stockton-mayors-income-experiment/103-535290381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abc10.com/article/news/local/stockton/dr-kings-dream-lives-on-in-stockton-mayors-income-experiment/103-535290381" rel="nofollow noopener" target="_blank"><span data-dcnode-id="425" instrument_node="">cited</span></a><span data-dcnode-id="423" instrument_node=""> Dr. Martin Luther King’s 1967 </span><em data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Where Do We Go From Here: Chaos or Community?,</span></em><span data-dcnode-id="420" instrument_node=""> which calls for a guaranteed income, as an argument for the policy.</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="416" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="418"></div><div class="journey-unit" data-dcnode-id="417"></div></div><p data-dcnode-id="408"><span data-dcnode-id="415" instrument_node="">Yet many other </span><a class="external-link" data-dcnode-id="413" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator&quot;}" data-offer-url="https://www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator" rel="nofollow noopener" target="_blank"><span data-dcnode-id="414" instrument_node="">UBI supporters</span></a><span data-dcnode-id="412" instrument_node=""> promote the policy primarily as the saving grace of an increasingly automated world, anticipating the future of a workforce that may largely be replaced by A.I. technology. This argument, </span><a class="external-link" data-dcnode-id="410" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator&quot;}" data-offer-url="https://www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2016/jun/22/silicon-valley-universal-basic-income-y-combinator" rel="nofollow noopener" target="_blank"><span data-dcnode-id="411" instrument_node="">backed by venture capitalists and Silicon Valley elites</span></a><span data-dcnode-id="409" instrument_node="">, sometimes veers dangerously close to suggesting a UBI could release employers of any responsibility to pay fair wages. A company might even feel justified in underpaying its employees under the assumption that a UBI would make up for the difference. While some argue that the vast income inequality in the United States is evidence of capitalism’s failings, a capitalist might see UBI policies as a cure-all for income inequality that lets them avoid institutional accountability for creating that inequality in the first place.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="384"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="385"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="387"><div class="Container-imGeBO ftlPuP" data-dcnode-id="393" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy cOXgPu" data-dcnode-id="394" data-testid="cne-interlude-container-right-rail"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU byjIhE kIoYMT" data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">WATCH</span></p><figure class="CneVideoEmbedFigure-bJIZil dApMCp cne-video-embed" data-dcnode-id="398"><div data-dcnode-id="399" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="401" id="f8a0a4f4-cc44-ba0-b25a-76e7e243e03c" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="402" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU gRUVAY dhOqoy csoDwQ" data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/video/watch/riverdale-s-cole-sprouse-kj-apa-compete-in-a-compliment-battle" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeRightRailTitle-fiGQEr eTiIvU lhdBHp cWonjf" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Riverdale's Cole Sprouse &amp; KJ Apa Compete in a Compliment Battle</span></p></a></figure></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="391"><div class="ad__slot ad__slot--rail" data-dcnode-id="392" data-node-id="nxszwk"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="388" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="390"></div><div class="journey-unit" data-dcnode-id="389"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="386"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="380"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="381"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="382" data-node-id="ker3fc"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="336"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="347"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="348" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="349"><p data-dcnode-id="363"><span data-dcnode-id="379" instrument_node="">In comparison, guaranteed minimum income programs like the </span><a class="external-link" data-dcnode-id="377" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.economicsecurityproject.org/the-magnolia-mothers-trust/&quot;}" data-offer-url="https://www.economicsecurityproject.org/the-magnolia-mothers-trust/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economicsecurityproject.org/the-magnolia-mothers-trust/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="378" instrument_node="">Magnolia Mother’s Trust</span></a><span data-dcnode-id="376" instrument_node=""> are aimed at deliberately reaching and supporting already economically disenfranchised communities. That program, also partially funded by ESP, provided "</span><a class="external-link" data-dcnode-id="374" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.economicsecurityproject.org/the-magnolia-mothers-trust/&quot;}" data-offer-url="https://www.economicsecurityproject.org/the-magnolia-mothers-trust/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economicsecurityproject.org/the-magnolia-mothers-trust/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="375" instrument_node="">$1,000 a month for one year to 20 Black mothers living in extreme poverty</span></a><span data-dcnode-id="373" instrument_node="">" in Jackson, Mississippi in the first year of their program, and expanded to support&nbsp;</span><a class="external-link" data-dcnode-id="371" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://springboardto.org/index.php/page/the-magnolia-mothers-trust&quot;}" data-offer-url="http://springboardto.org/index.php/page/the-magnolia-mothers-trust" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//springboardto.org/index.php/page/the-magnolia-mothers-trust" rel="nofollow noopener" target="_blank"><span data-dcnode-id="372" instrument_node="">110 mothers</span></a><span data-dcnode-id="370" instrument_node=""> in its second year. G.I. proponents argue that establishing a guaranteed minimum income — a cash advance that prioritizes the economically disempowered rather than a blanket payment for everyone — is rooted in fighting racial capitalism. G.I.’s primary goal is to deliberately reinvest in Black communities that have been ravaged by generations of racist policies and disinvestment, finally taking aim at a racial income gap </span><a class="external-link" data-dcnode-id="368" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.sociologicalscience.com/download/vol-5/march/SocSci_v5_182to205.pdf&quot;}" data-offer-url="https://www.sociologicalscience.com/download/vol-5/march/SocSci_v5_182to205.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sociologicalscience.com/download/vol-5/march/SocSci_v5_182to205.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="369" instrument_node="">that has remained nearly identical</span></a><span data-dcnode-id="367" instrument_node=""> since the 1960s. By </span><a class="external-link" data-dcnode-id="365" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://medium.com/economicsecproj/centering-blackness-the-path-to-economic-liberation-for-all-f6c2c7398281&quot;}" data-offer-url="https://medium.com/economicsecproj/centering-blackness-the-path-to-economic-liberation-for-all-f6c2c7398281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/economicsecproj/centering-blackness-the-path-to-economic-liberation-for-all-f6c2c7398281" rel="nofollow noopener" target="_blank"><span data-dcnode-id="366" instrument_node="">centering the needs and vulnerabilities of disenfranchised Black communities</span></a><span data-dcnode-id="364" instrument_node="">, policies like G.I. are intended to address and correct inequality with direct, material solutions to immediate financial need.</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="361"><div class="ad__slot ad__slot--in-content" data-dcnode-id="362" data-node-id="8qhgy"></div></div><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">“If you’re thinking about it from a wealth-building perspective and [about] racial and gender wealth inequality — I think a guaranteed income is a much better way to do it,” explains Jhumpa Bhattacharya, vice president of programs and strategy at the Insight Center for Community Economic Development. “This should really be something that allows us to make up for the fact that there are people who are working — not just one job, but two and three jobs — who still aren’t making enough to have a roof over their heads, put food on the table for their kids, and [keep] the lights on.”</span></p><h2 data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">So are UBI and G.I. at odds with each other?</span></h2><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Not necessarily. There’s a reason why the terms are so often used interchangeably. At the end of the day, both economic strategies emphasize consistent, unrestricted cash payments and are aimed at standardizing the quality of life for every individual; meeting one’s basic needs wouldn’t depend on profit margins or employment status. One strategy simply advocates for a blanket, universal application while the other advocates for a more directed approach.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="354" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">“There are so many different ways one could create an income floor in America. There are so many policy choices,” explains Natalie Foster, cochair of the Economic Security Project. “At their heart, they have one thing in common, which is cash with no strings attached — the idea that there is a floor through which no one can fall and that in the richest country on earth, we can guarantee a set of living standards. We can guarantee a good life for people.”</span></p><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Guaranteed minimum income leverages the idea of unrestricted economic support to focus on addressing income inequality, most pointedly along racial and gender lines. Like universal basic income, G.I. would be made available to people regardless of employment status, providing economic relief for unemployed people, part-time workers, contract workers, seasonal workers, and everyone in between. But unlike UBI, most programs have some kind of income cap, living condition, demographic, or family status qualification to prevent people without those needs from receiving direct cash support. In short, a guaranteed income program is basically UBI with qualifications.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="337"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="338"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="340"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="345"><div class="ad__slot ad__slot--rail" data-dcnode-id="346" data-node-id="scxgsd"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="342" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="344"></div><div class="journey-unit" data-dcnode-id="343"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="341" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="339"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="333"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="334"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="335" data-node-id="u4szs"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="287"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="298"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="299" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="300"><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">“It sits alongside a whole host of other guarantees that are needed, from housing guarantees to health care guarantees, but it’s specifically cash with no strings attached,” Foster said. “[It’s] non-labor income — meaning money that comes in each month that you can count on regardless of what you do in the world.”</span></p><h2 data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">How could G.I. impact the racial income gap?</span></h2><p data-dcnode-id="324"><span data-dcnode-id="328" instrument_node="">Research into the racial income gap in the United States has </span><a class="external-link" data-dcnode-id="326" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.brookings.edu/blog/up-front/2020/02/27/examining-the-black-white-wealth-gap/&quot;}" data-offer-url="https://www.brookings.edu/blog/up-front/2020/02/27/examining-the-black-white-wealth-gap/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/blog/up-front/2020/02/27/examining-the-black-white-wealth-gap/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="327" instrument_node="">demonstrated</span></a><span data-dcnode-id="325" instrument_node=""> repeatedly that Black Americans are still struggling to recover financially from generations of institutionalized policy and violence. G.I. supporters argue that establishing a minimum income would reduce the racial income gap and finally bring many Black families and individuals above the poverty line while also providing consistent funds to remain above that level.</span></p><p data-dcnode-id="316"><span data-dcnode-id="323" instrument_node="">The COVID-19 pandemic has thrown the existing racial disparity into particularly sharp relief. The Bureau of Labor Statistics reports that Black and Latinx workers experienced </span><a class="external-link" data-dcnode-id="321" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://inequality.org/facts/racial-inequality/&quot;}" data-offer-url="https://inequality.org/facts/racial-inequality/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inequality.org/facts/racial-inequality/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="322" instrument_node="">higher rates of unemployment</span></a><span data-dcnode-id="320" instrument_node=""> at the beginning of the pandemic, and their rates remained higher — particularly for Black workers — than the rest of the population through the end of 2020. Women of color are also already the hardest hit by poverty and economic precarity. </span><a class="external-link" data-dcnode-id="318" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://nwlc-ciw49tixgw5lbab.stackpathdns.com/wp-content/uploads/2019/10/PovertySnapshot2019-1.pdf&quot;}" data-offer-url="https://nwlc-ciw49tixgw5lbab.stackpathdns.com/wp-content/uploads/2019/10/PovertySnapshot2019-1.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nwlc-ciw49tixgw5lbab.stackpathdns.com/wp-content/uploads/2019/10/PovertySnapshot2019-1.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="319" instrument_node="">A 2019 report</span></a><span data-dcnode-id="317" instrument_node=""> from the National Women’s Law Center found that while the poverty rate for white men rests at 7%, the average poverty rate is roughly 18% for Latinas, 20% for Black women, and 22% for Indigenous women.</span></p><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">“The overlay of COVID and the health and economic crisis that happened is shedding a light on things that women of color in particular, and Black women in particular, have known for years — that the decks are stacked against them. Why would we go back to old ways of thinking and old ways of governing, which was about race-neutral policies and upholding the status quo?” Bhattacharya said. “Now is the time we should be talking about targeted policies. The house of racist cards is tumbling. And we have to start doing things differently, otherwise the next catastrophe — which will happen, I mean, it’s bound to happen — will have the same results.”</span></p><p data-dcnode-id="303"><span data-dcnode-id="313" instrument_node="">Similar to the CARES Act provision that </span><a class="external-link" data-dcnode-id="311" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://home.treasury.gov/policy-issues/cares/assistance-for-american-workers-and-families#:~:text=The%20CARES%20Act%20initially%20provided,for%20a%20family%20of%20four.&quot;}" data-offer-url="https://home.treasury.gov/policy-issues/cares/assistance-for-american-workers-and-families#:~:text=The%20CARES%20Act%20initially%20provided,for%20a%20family%20of%20four." href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.treasury.gov/policy-issues/cares/assistance-for-american-workers-and-families%23%3A~%3Atext%3DThe%2520CARES%2520Act%2520initially%2520provided%2Cfor%2520a%2520family%2520of%2520four." rel="nofollow noopener" target="_blank"><span data-dcnode-id="312" instrument_node="">limited stimulus checks</span></a><span data-dcnode-id="310" instrument_node=""> to households making less than a certain amount, guaranteed minimum income programs would also be limited in scope. Because Black and brown people, and more specifically, women of color, are disproportionately represented at the lower end of the economic spectrum, they’d stand to benefit the most from any kind of cash advance policy, but a targeted program might allow the economic benefits to stretch even further. G.I. programs could also be designed to support other under-resourced populations like </span><a class="external-link" data-dcnode-id="308" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.prisonpolicy.org/reports/outofwork.html#fn:13&quot;}" data-offer-url="https://www.prisonpolicy.org/reports/outofwork.html#fn:13" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prisonpolicy.org/reports/outofwork.html%23fn%3A13" rel="nofollow noopener" target="_blank"><span data-dcnode-id="309" instrument_node="">previously incarcerated people</span></a><span data-dcnode-id="307" instrument_node=""> and </span><a class="external-link" data-dcnode-id="305" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.va.gov/vetdata/docs/SpecialReports/Minority_Veterans_Report.pdf&quot;}" data-offer-url="https://www.va.gov/vetdata/docs/SpecialReports/Minority_Veterans_Report.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.va.gov/vetdata/docs/SpecialReports/Minority_Veterans_Report.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="306" instrument_node="">veterans</span></a><span data-dcnode-id="304" instrument_node=""> — both groups that experience high unemployment rates. And predictably, Black people are overrepresented in both groups.</span></p><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">In theory, a guaranteed minimum income would ultimately elevate the class status of those more economically vulnerable, thus allowing them to better participate in and contribute to the economy — and more importantly, lead lives with dignity without having to worry about meeting their everyday needs.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="288"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="289"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="291"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="296"><div class="ad__slot ad__slot--rail" data-dcnode-id="297" data-node-id="tt3nsb"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="293" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="295"></div><div class="journey-unit" data-dcnode-id="294"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="292" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="290"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="284"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="285"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="286" data-node-id="uurt8q"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="235"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="245"><div class="BodyWrapper-ctnerm cneCLK body body__cont
