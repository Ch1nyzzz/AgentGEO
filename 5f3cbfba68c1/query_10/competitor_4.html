</span><div class="elementor-widget-container" data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="673"><h1 class="elementor-heading-title elementor-size-default elementor-inline-editing pen" data-dcnode-id="674" data-elementor-setting-key="title" data-pen-placeholder="Type Here..." style="font-family: 'Work Sans', sans-serif; font-size: 45px; font-style: normal; font-weight: 600; margin-bottom: 0px; line-height: 1.2em; color: #000000; text-align: left;"><span data-dcnode-id="675" instrument_node="">Cash is one of the most direct and effective ways to provide financial stability to those who most need it.</span></h1></div><span data-dcnode-id="672" instrument_node="">
</span></div><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><div class="elementor-element elementor-element-ba40c22 elementor-widget elementor-widget-text-editor" data-dcnode-id="657" data-element_type="widget" data-id="ba40c22" data-widget_type="text-editor.default"><span data-dcnode-id="667" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="659"><span data-dcnode-id="666" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="661"><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Instead of a patriarchal approach of dictating how, where and on what terms individuals can build their lives, cash offers the dignity and self-determination that recognizes a one-size-fits-all approach is antiquated and rooted in distrust. Years of research show that when given unrestricted payments, recipients are able to pull themselves out of poverty and create economic stability for themselves and their families. That’s why we have invested in both on-the-ground and policy efforts to put more cash in the pockets of Americans who need it most.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">The Economic Security Project has channeled over $10 million through direct, aligned and in-kind support to groundbreaking research and projects that have moved the debate on how to alleviate economic instability, city-led pilots that have challenged conventional wisdom on the root causes of poverty and viable state campaigns to modernize and expand the Earned Income Tax Credit (just passed in California and Maine). We did this by making strategic – sometimes risky – bets, and creating a diverse and collaborative network. A few highlights include:</span></p></div><span data-dcnode-id="660" instrument_node="">
