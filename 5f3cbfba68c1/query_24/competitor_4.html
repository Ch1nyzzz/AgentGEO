</span><h1 data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Barcelona</span></h1><span data-dcnode-id="3043" instrument_node="">
</span><span class="topic" data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">Urban poverty</span></span><span data-dcnode-id="3040" instrument_node="">
</span><h2 data-dcnode-id="3036"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">B-MINCOME - Combining guaranteed minimum income and active social policies in deprived urban areas </span></span><span data-dcnode-id="3037" instrument_node="">
</span></h2><span data-dcnode-id="3035" instrument_node="">
</span></div><span data-dcnode-id="3033" instrument_node="">
</span></div><span data-dcnode-id="3031" instrument_node="">
</span><div class="left col-sm-8" data-dcnode-id="487"><span data-dcnode-id="3030" instrument_node="">
</span><div class="field field--name-field-citation field--type-entity-reference field--label-hidden field__item" data-dcnode-id="3018"><div class="eck-entity" data-dcnode-id="3020"><span data-dcnode-id="3029" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-citation field--type-text-long field--label-hidden field__item" data-dcnode-id="3025"><p data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">"There is a municipal commitment to implement a guaranteed minimum income to complement the income of Barcelona residents, raising them above the at risk of poverty threshold and reducing inequality levels. It should provide households and individuals with security, freedom and greater responsibility as a lever in overcoming poverty.&nbsp; B MINCOME, as a pilot project, will compare the effects that this income with different conditions and modalities will have on mitigating poverty and in improving inclusion of the persons receiving it."</span></p><span data-dcnode-id="3026" instrument_node="">
</span></div><span data-dcnode-id="3024" instrument_node="">
</span><div class="field field--name-field-author field--type-string field--label-hidden field__item" data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">Laia Ortiz, Deputy Mayor of the Social Rights Department. Barcelona City Council</span></div><span data-dcnode-id="3021" instrument_node="">
</span></div><span data-dcnode-id="3019" instrument_node="">
</span></div><span data-dcnode-id="3017" instrument_node="">
</span><div class="mobile-number" data-dcnode-id="2953"><span data-dcnode-id="3016" instrument_node="">
</span><div class="field field--name-field-project-number field--type-entity-reference field--label-above" data-dcnode-id="2964"><span data-dcnode-id="3015" instrument_node="">
</span><div class="field__label" data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">The project in numbers</span></div><span data-dcnode-id="3012" instrument_node="">
</span><div class="field__items" data-dcnode-id="2966"><span data-dcnode-id="3011" instrument_node="">
</span><div class="field__item" data-dcnode-id="3001"><div class="eck-entity" data-dcnode-id="3003"><span data-dcnode-id="3010" instrument_node="">
</span><div class="field field--name-field-number field--type-string field--label-hidden field__item" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">114.000</span></div><span data-dcnode-id="3007" instrument_node="">
</span><div class="field field--name-field-text-number field--type-string-long field--label-hidden field__item" data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">inhabitants in the Besos district, most deprived and poorest area in Barcelona</span></div><span data-dcnode-id="3004" instrument_node="">
</span></div><span data-dcnode-id="3002" instrument_node="">
</span></div><span data-dcnode-id="3000" instrument_node="">
</span><div class="field__item" data-dcnode-id="2990"><div class="eck-entity" data-dcnode-id="2992"><span data-dcnode-id="2999" instrument_node="">
</span><div class="field field--name-field-number field--type-string field--label-hidden field__item" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">12,3%</span></div><span data-dcnode-id="2996" instrument_node="">
</span><div class="field field--name-field-text-number field--type-string-long field--label-hidden field__item" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">of the population in the Besos area is unemployed (Barcelona rate is 8,6%)</span></div><span data-dcnode-id="2993" instrument_node="">
</span></div><span data-dcnode-id="2991" instrument_node="">
</span></div><span data-dcnode-id="2989" instrument_node="">
</span><div class="field__item" data-dcnode-id="2979"><div class="eck-entity" data-dcnode-id="2981"><span data-dcnode-id="2988" instrument_node="">
</span><div class="field field--name-field-number field--type-string field--label-hidden field__item" data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">40-50%</span></div><span data-dcnode-id="2985" instrument_node="">
</span><div class="field field--name-field-text-number field--type-string-long field--label-hidden field__item" data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">the family income rate is around 40-50 % of the average of the city</span></div><span data-dcnode-id="2982" instrument_node="">
</span></div><span data-dcnode-id="2980" instrument_node="">
</span></div><span data-dcnode-id="2978" instrument_node="">
</span><div class="field__item" data-dcnode-id="2968"><div class="eck-entity" data-dcnode-id="2970"><span data-dcnode-id="2977" instrument_node="">
</span><div class="field field--name-field-number field--type-string field--label-hidden field__item" data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">13,5%</span></div><span data-dcnode-id="2974" instrument_node="">
</span><div class="field field--name-field-text-number field--type-string-long field--label-hidden field__item" data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">the rate of uneducated population in the Besos district when the average rate of the city is 7% </span></div><span data-dcnode-id="2971" instrument_node="">
</span></div><span data-dcnode-id="2969" instrument_node="">
</span></div><span data-dcnode-id="2967" instrument_node="">
</span></div><span data-dcnode-id="2965" instrument_node="">
</span></div><span data-dcnode-id="2963" instrument_node="">
</span><div class="erdf" data-dcnode-id="2955"><span data-dcnode-id="2962" instrument_node="">
</span><div class="field field--name-field-erdf field--type-string field--label-hidden field__item" data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node="">EUR 4,854,088.56</span></div><span data-dcnode-id="2959" instrument_node="">
</span><span data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Total ERDF budget granted</span></span><span data-dcnode-id="2956" instrument_node="">
</span></div><span data-dcnode-id="2954" instrument_node="">
</span></div><span data-dcnode-id="2952" instrument_node="">
</span><div class="field field--name-field-description-project field--type-entity-reference field--label-hidden field__items" data-dcnode-id="2820"><span data-dcnode-id="2951" instrument_node="">
</span><div class="field__item" data-dcnode-id="2939"><div class="eck-entity" data-dcnode-id="2941"><span data-dcnode-id="2950" instrument_node="">
</span><div class="field field--name-title field--type-string field--label-hidden field__item" data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Challenge addressed</span></div><span data-dcnode-id="2947" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-description-wysiwyg field--type-text-long field--label-hidden field__item" data-dcnode-id="2943"><p data-dcnode-id="2945"><span data-dcnode-id="2946" instrument_node="">Poverty and social inequality have increased in Barcelona since the financial crisis began. Income per capita has increased 11% in rich districts, while it has fallen by 27% in the poorest districts. The income gap has more than doubled over the past five years. This gap has not only affected the most excluded social sectors, where poverty has become chronic; It has also hardly affected immigrants, families with children, single parents and significant parts of the middle class. Poverty also affects the employed, who have either low wages, precarious or part-time jobs (or all these combined). Expressions of poverty result from a series of interconnected factors that accumulates on the same groups: lack of income is combined with difficulties in finding affordable housing, school dropout rates, health problems cy or energy poverty, among others. Finally, among the most affected population by the crisis, their feeling is that they are passive subjects, with very small space to intervene in proposing real solutions to their situation, so they respond migrating abroad, making social protests or trying to subsist in informal economy.</span></p><span data-dcnode-id="2944" instrument_node="">
</span></div><span data-dcnode-id="2942" instrument_node="">
</span></div><span data-dcnode-id="2940" instrument_node="">
</span></div><span data-dcnode-id="2938" instrument_node="">
</span><div class="field__item" data-dcnode-id="2923"><div class="eck-entity" data-dcnode-id="2925"><span data-dcnode-id="2937" instrument_node="">
</span><div class="field field--name-title field--type-string field--label-hidden field__item" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">Solution proposed</span></div><span data-dcnode-id="2934" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-description-wysiwyg field--type-text-long field--label-hidden field__item" data-dcnode-id="2927"><p data-dcnode-id="2932"><span data-dcnode-id="2933" instrument_node="">The project is based on the city's decision to implement a guaranteed minimum income (GMI) to supplement income in the most deprived and poor areas or the city. It is expected that 1,000 households will receive this minimum income on a trial basis. The implementation of the GMI among households in situations of poverty should also prompt a comparative analysis concerning the costs of policies aimed at fighting poverty, with the ultimate goal of developing more efficient welfare services. It is a new solution adapted to the new poverty related phenomena occurring in the city. The municipal GMI system will provide families with security, freedom and greater responsibility as a lever in overcoming poverty. The new strategy is based on new core elements: Testing several types of GMI; Combine GMI with integrated one-stop-shop public and private active policies and Strengthening inhabitant and community’s initiative.</span></p><span data-dcnode-id="2931" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">This innovative ecosystem in the fight against poverty includes also a set of services made available to persons receiving the income; a better understanding of poverty, based on the life stories of those affected; a social currency to cover a part of the GMI, and new forms of co-creation, interrelation between services, community involvement and public-private cooperation.</span></p><span data-dcnode-id="2928" instrument_node="">
</span></div><span data-dcnode-id="2926" instrument_node="">
</span></div><span data-dcnode-id="2924" instrument_node="">
</span></div><span data-dcnode-id="2922" instrument_node="">

</span><div class="clearfix text-formatted field field--name-field-description-wysiwyg field--type-text-long field--label-hidden field__item" data-dcnode-id="2866"><p data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">Monetary poverty will be significantly reduced among homes receiving the GMI, with a positive impact on other poverty related dimensions. Likewise, implementation of the GMI will have a positive impact on the effectiveness and efficiency of social inclusion policies, by better relating services with users, better coordinating them throughout the area and providing an improved understanding of poverty. The experience will offer an improved understanding of the factors that generate poverty, community involvement in the implementation of the GMI and greater participation of the beneficiaries in community life. Recipients of the GMI will develop processes that favour their autonomy and ability to take decisions regarding their life options and reducing their dependence on subsidies in a mid and long term. It is expected that meaningful conclusions and learnings regarding the most effective and efficient means of fighting poverty will be reached, through ongoing quantitative and qualitative evaluation processes, comparing the different GMI, service use and the behaviour of recipients.</span></p><span data-dcnode-id="2867" instrument_node="">
