</span><article class="post post-3842 type-post status-publish format-standard has-post-thumbnail hentry category-seo category-internet-marketing category-sem category-folsom category-el-dorado-hills category-sacramento category-inbound-marketing" data-dcnode-id="335" id="post-3842"><span data-dcnode-id="1506" instrument_node="">
</span><span class="entry-title" data-dcnode-id="1504" style="display: none;"><span data-dcnode-id="1505" instrument_node="">Google Guaranteed</span></span><span data-dcnode-id="1503" instrument_node="">
</span><div class="post-content" data-dcnode-id="1172"><span data-dcnode-id="1502" instrument_node="">
</span><div class="fusion-fullwidth fullwidth-box fusion-builder-row-1 nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="1174" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;"><div class="fusion-builder-row fusion-row" data-dcnode-id="1175"><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_1 fusion-builder-column-0 fusion-one-full fusion-column-first fusion-column-last 1_1" data-dcnode-id="1176" style="margin-top:0px;margin-bottom:0px;"><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="1177" style="padding: 0px; background-position: left top; background-repeat: no-repeat; background-size: cover; height: auto;"><div class="fusion-text" data-dcnode-id="1179"><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="1500" data-fontsize="28" data-lineheight="37.24px" style="--fontSize:28; line-height: 1.33;"><span data-dcnode-id="1501" instrument_node="">Google Guaranteed&nbsp;(The Good, Bad &amp; Ugly)</span></h2><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><img alt="Google Guaranteed Home Services Logo - IconGoogle Guaranteed Home Services Logo - Icon" class="alignnone size-full wp-image-3849" data-dcnode-id="1498" height="500" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-200x100.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-300x150.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-400x200.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-600x300.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-768x384.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo-800x400.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Home_Services_Logo.jpg 1000w" width="1000"></p><span data-dcnode-id="1496" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1494" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1495" instrument_node="">Google Launches Google Guaranteed for Locksmiths, Plumbers, and Handymen… What we found was interesting!</span></h3><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1490"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Update:</span></strong></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1488" instrument_node="">Here is the link to sign up for Google Guaranteed: </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ads.google.com/localservices/signup" rel="noopener" target="_blank"><span data-dcnode-id="1487" instrument_node="">https://ads.google.com/localservices/signup</span></a></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Well, on a daily search for a current client in the contractor&nbsp;world, we stumbled upon something pretty interesting; Google Guaranteed.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">It looks like “</span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//services.google.com/fb/forms/googleguaranteed/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1479" instrument_node="">Google Guaranteed</span></a><span data-dcnode-id="1477" instrument_node="">” is rolling out a plan for guaranteeing work provided by locksmiths, plumbers, and handymen. This is to protect homeowners against locksmiths, plumbers, and handymen who are not licensed, bonded and screened.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Also, Google is making a step in increasing its measures on security against fraud and online scams.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1469"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">What does it look like?</span></strong></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><img alt="Google Guaranteed Screenshot" class="alignnone size-full wp-image-3851" data-dcnode-id="1467" height="483" loading="lazy" sizes="(max-width: 948px) 100vw, 948px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-200x102.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-300x153.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-400x204.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-600x306.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-768x391.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01-800x408.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_Guaranteed_Screenshot_01.jpg 948w" width="948"></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">The Search Engine Journal wrote an article about this a while ago, stating;</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1458"><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Google is fighting back against fraud with an advanced verification process for handymen, plumbers, and locksmiths</span></em><span data-dcnode-id="1459" instrument_node="">.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Locksmiths, plumbers, and handymen who are not licensed, bonded and screened are going to have a hard time going through this process to get a listing on Google My Business.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1451"><strong data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Showing Proof of License, Bond or Insurance will be Mandatory</span></strong></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">If they do manage to get a listing or already have a listing on </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/business/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1448" instrument_node="">Google My Business</span></a><span data-dcnode-id="1446" instrument_node="">, they will need to show proof that they are “Google Guaranteed” by uploading documents showing that they are licensed, bonded and screened.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Failure to prove that their company is&nbsp;licensed, bonded and screened will result in Google My Business removing their Google My Business page (YIKES). That will end up being hundreds of locksmith who will be in need of some serious recovery services.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1439" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1440" instrument_node="">How to Get Google Guaranteed?</span></h3><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><img alt="how to get Google Guaranteed " class="alignnone size-full wp-image-3850" data-dcnode-id="1437" height="231" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-200x46.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-300x69.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-400x92.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-600x139.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-768x177.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed-800x185.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/how_to_get_Google_Guaranteed.jpg 1000w" width="1000"></p><span data-dcnode-id="1435" instrument_node="">
</span><ol data-dcnode-id="1386"><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Create Your Listing on Google My Business</span></li><span data-dcnode-id="1431" instrument_node="">
</span><li data-dcnode-id="1426"><span data-dcnode-id="1430" instrument_node="">Navigate to “</span><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ads.google.com/local-services-ads" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1429" instrument_node="">Local Service Ads</span></a><span data-dcnode-id="1427" instrument_node="">” of Google</span></li><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1421"><span data-dcnode-id="1424" instrument_node="">Enter in your </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/bnap-citations-local-seo/"><span data-dcnode-id="1423" instrument_node="">NAP (Name, Address, Phone)</span></a></li><span data-dcnode-id="1420" instrument_node="">
</span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Select and Set your Hours</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Select and Set your Cities</span></li><span data-dcnode-id="1414" instrument_node="">
</span><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Select and Set your Services</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Enter License Number</span></li><span data-dcnode-id="1408" instrument_node="">
</span><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Request reviews from clients</span></li><span data-dcnode-id="1405" instrument_node="">
</span><li data-dcnode-id="1397"><span data-dcnode-id="1404" instrument_node="">Background Check
</span><ol data-dcnode-id="1399"><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Also background checks for all employees who enter customers home</span></li><span data-dcnode-id="1400" instrument_node="">
</span></ol><span data-dcnode-id="1398" instrument_node="">
</span></li><span data-dcnode-id="1396" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Upload insurance/bond/etc.</span></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Enter Billing</span></li><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Publish your local service ad</span></li><span data-dcnode-id="1387" instrument_node="">
</span></ol><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1378"><em data-dcnode-id="1381"><span data-dcnode-id="1384" instrument_node="">Keep in mind, we had to </span><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">bold</span></strong></em><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node=""> out “Enter Your License Number”&nbsp;</span></em></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">After you have rolled through all the steps to complete your submission, you then need to complete advanced verification by finishing your application with a separate third-party website. This is all so new in the world of Google.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><ul data-dcnode-id="1366"><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1368"><em data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Finish your application with Google’s trusted partners at Pinkerton:&nbsp;</span></em><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinkerton.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1370" instrument_node="">pinkerton.com</span></a></li><span data-dcnode-id="1367" instrument_node="">
</span></ul><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1364" instrument_node="">Here is the crazy part: Your application is going to take an additional two-four weeks to process and verify, that is if they are all caught up and on time. </span><em data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">From Google directly; Complete your application with Pinkerton (this usually takes about 30 minutes).</span></em><span data-dcnode-id="1361" instrument_node=""> After you have finished your application, you will be notified within that two-week period if your application has been successful or denied. If you do not hear back of if you have any questions, you can email Google support directly at </span><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">advancedverification@google.com</span></strong><span data-dcnode-id="1358" instrument_node="">.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1354" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1355" instrument_node="">Will Google Guaranteed affect more than&nbsp;Locksmiths and Plumbers?</span></h3><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><img alt="How will Guaranteed affect us? " class="alignnone size-full wp-image-3852" data-dcnode-id="1352" height="231" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-200x46.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-300x69.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-400x92.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-600x139.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-768x177.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more-800x185.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Will_Google_Guaranteed_affect_more.jpg 1000w" width="1000"></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">This is the whole reason why we wrote this post in the first place.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">We can see where you are heading with this one, Google.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1343" instrument_node="">Not that this is a bad thing for the homeowners and people looking to do business on a local level, but it definitely makes the </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/seo-folsom/"><span data-dcnode-id="1342" instrument_node="">local SEO companies</span></a><span data-dcnode-id="1340" instrument_node="">&nbsp;jump through a couple more hoops to get set-up.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">Any </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/inbound-marketing/"><span data-dcnode-id="1336" instrument_node="">Inbound Marketing company</span></a><span data-dcnode-id="1334" instrument_node=""> is going to have to get familiar with this process to better understand how Google is now working with these industries.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1329"><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Will Google Guaranteed Spread to More Industries?</span></strong></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">This is a huge deal, not just for&nbsp;Locksmiths, plumbers, and handyman business models.</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">We can see the Google Guaranteed trend and the process to get Google Guaranteed spreading to any service that needs a license, bond, and insurance plan to do business. Google Guaranteed might have an effect on many industries: landscapers, kitchen builders, general contractors, flooring installers, arborist’s, carpet cleaners and basically any other service that has to be either “Certified” or “Licensed” in their field of expertise.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1320" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1321" instrument_node="">Why did Google Launch Google Guaranteed? — Locksmith Scams</span></h3><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><img alt="Why did Google Launch Guaranteed" class="alignnone size-full wp-image-3853" data-dcnode-id="1318" height="231" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-200x46.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-300x69.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-400x92.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-600x139.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-768x177.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed-800x185.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Why_Google_Launch_Guaranteed.jpg 1000w" width="1000"></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1313"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">So how does the locksmith scam work?</span></strong></p><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1289"><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">You get locked out</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">You call a locksmith</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The call is re-routed to an off-shore call center</span></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">They sell the lead to a shady locksmith</span></li><span data-dcnode-id="1299" instrument_node="">
</span><li data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Shady locksmith shows up</span></li><span data-dcnode-id="1296" instrument_node="">
</span><li data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Shady locksmith drills your lock instead of picking it (or looking for alternate method)</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">You get slapped with a big locksmith bill</span></li><span data-dcnode-id="1290" instrument_node="">
</span></ul><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">The same scenario can be applied to almost any industry: plumbing, handyman, landscapers, contractors, etc. Most of whom are not licensed and just want to make an overly paid quick buck without providing any level of Quality Assurance.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1283" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1284" instrument_node="">Literally, Google will “Guarantee” the Work</span></h3><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><img alt=" Google will " class="alignnone size-full wp-image-3854" data-dcnode-id="1281" height="231" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-200x46.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-300x69.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-400x92.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-600x139.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-768x177.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work-800x185.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Google_will_Guarantee_the_work.jpg 1000w" width="1000"></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Pros that are pre-screened and insured is the goal that Google is going for here.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><blockquote data-dcnode-id="1269"><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1274" instrument_node="">Google guarantees the job will be done right or your money back. </span><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.google.com/ads/answer/7125526" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1273" instrument_node="">Learn More Here</span></a></p><span data-dcnode-id="1270" instrument_node="">
</span></blockquote><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">How The Google Guarantee Works</span></strong></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">To reap the benefits from Google Guarantee, there are two steps:</span></p><span data-dcnode-id="1261" instrument_node="">
</span><ul data-dcnode-id="1253"><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Step 1:&nbsp;Activate the Google Guarantee by filling out a form on the link provided above. Once you enter in a few details about the job and the company name.</span></li><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Step 2: Submit a claim about the company if issues do arise. You can also CALL GOOGLE DIRECTLY at (844) 885-0761 to submit a claim (This is a new one as well). The Google claim team will investigate the company and claim against the company to determine if your claim is valid or not. The team investigates and decides on a resolution.</span></li><span data-dcnode-id="1254" instrument_node="">
</span></ul><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1249"><strong data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">What the Google Guarantee&nbsp;Covers</span></strong></p><span data-dcnode-id="1248" instrument_node="">
</span><blockquote data-dcnode-id="1243"><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">If you are dissatisfied with work quality, we’ll cover claims up to the job invoice amount, with a lifetime cap of $2,000.</span></p><span data-dcnode-id="1244" instrument_node="">
</span></blockquote><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1235"><strong data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The Catch:</span></strong><span data-dcnode-id="1239" instrument_node=""> The job must be booked through the home services section of Google. Any additional payments to the contractor, locksmith, plumber or handyman will not be covered.&nbsp;Jobs completed before September 14, 2016, are not covered. Google just wants homeowners to be protected against fraud, which is understandable. You can also read the </span><a data-dcnode-id="1237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//support.google.com/ads/answer/7126601" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1238" instrument_node="">Google Guarantee FAQ section here</span></a><span data-dcnode-id="1236" instrument_node="">.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1232" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1233" instrument_node="">How Does Google Guaranteed Look in the Future?</span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1229"><img alt="Future of Google Guaranteed" class="alignnone size-full wp-image-3855" data-dcnode-id="1230" height="231" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-200x46.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-300x69.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-400x92.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-600x139.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-768x177.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed-800x185.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/The_Future_of_Google_Guaranteed.jpg 1000w" width="1000"></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">This is why we wrote this whole post. The future of&nbsp;Google Guaranteed is a little grey right now. No one has a true grasp on what&nbsp;Google Guaranteed can mean for local SEO companies or even every local service industry that needs a license number to operate.&nbsp;Google Guaranteed in the future may apply to every service industry on a local level.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">This would include landscapers, kitchen builders, general contractors, flooring installers, arborist’s, carpet cleaners and basically any other service that has to be either “Certified” or “Licensed” in their field of expertise.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1221" instrument_node="">Again, this is not a bad thing. It is just a very interesting shift in Google’s positioning towards </span><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/ssl-website-security/"><span data-dcnode-id="1220" instrument_node="">security with SSL’s</span></a><span data-dcnode-id="1218" instrument_node=""> and preventing scam and fraud on the internet.</span></p><span data-dcnode-id="1216" instrument_node="">
</span><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="1214" data-fontsize="26" data-lineheight="28.34px" style="--fontSize:26; line-height: 1.09;"><span data-dcnode-id="1215" instrument_node="">What we thought was crazy about Google Guaranteed</span></h3><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><img alt="" class="alignnone size-full wp-image-3856" data-dcnode-id="1212" height="453" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results.jpg&amp;raw" srcset="https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-200x91.jpg 200w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-300x136.jpg 300w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-400x181.jpg 400w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-600x272.jpg 600w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-768x348.jpg 768w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results-800x362.jpg 800w, https://frontstreetmedia.com/wp-content/uploads/2017/01/Handyman_Search_Results.jpg 1000w" width="1000"></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">After doing a search for “Outdoor Kitchen Builder Sacramento” and “Outdoor Kitchens Sacramento” on a mobile device, our client is still number one organically; however, dropped off the map. This was interesting because the map listing had been replaced with—you guessed it—HANDYMAN listings. NOOOOO, Google. No.</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">In what world does a homeowner want a handyman to show up and build them a $100,000 outdoor kitchen. In no world, that’s where.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">We understand Google is still testing this new feature and we are sure that they will eventually fix this mistake.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Until then, it is going to be interesting to see what results they will display for home builders, contractors, remodelers and other higher priced items through Google Guaranteed.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Is Google testing other industries with new Google Guaranteed listings just to spread the word?</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1191"><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Note: We are not affiliated with Google.</span></strong><span data-dcnode-id="1192" instrument_node=""> Front Street Media is a front-end web design team located in El Dorado Hills, CA.</span></p><span data-dcnode-id="1190" instrument_node="">

</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Our large 30+ year old licensed and successful Bay Area home services company is going through the GLSA verification process with EvidentID and we have been denied participation in the program due to our company’s background check results. The reason? We got sued last year by a customer who said his AC wasn’t as cold he wanted, it is pending in civil court and our insurance is settling with him. Apparently we are a bunch of crooks according to Google. It matters not that we have hundreds of employees with clean background, have no criminal complaints against us, are award winning and well loved by customers on every review site. Google has arbitrarily decided that our company is not worthy to be verified and on their platform because one customer wasn’t happy with his AC. I hope other companies realize what a huge deal it is that Google has made themselves the judge on our viability to do business. I am terrified where this is heading for all of us.</span></p><span data-dcnode-id="613" instrument_node="">

</span><div class="comment-text" data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Bryan – I just searched “commercial electrician Seattle” as well and see the same results. The thing about Google Guaranteed (GG) is that they have not fine-tuned the actual results. Google has not yet determined the difference between B2B and B2C on their display ads. Also, in the backend of GG you can’t control what keywords you rank for. Google determines that (as of now). I have tested GG searches hundreds of times for hyper-niche keywords that some clients “should” rank for and they don’t. I think eventually GG display ads will be more relevant for the long-tail keywords and Google will continue to open it up for more industries in order to get the keywords more accurate. There are only about 20 approved industries. GG will only continue to grow into more industries all while fine-tuning their results.</span></p><span data-dcnode-id="521" instrument_node="">
