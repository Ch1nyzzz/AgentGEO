</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Fundrise developed the Supplemental Income for those who want to generate regular passive payment through dividends rather than investment appreciation.</span></p><span data-dcnode-id="1950" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node="">Which means that you will receive a regular returns in the form of quarterly dividends, but your overall </span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/compounding-investment-returns-easy-step-by-step-guide/"><span data-dcnode-id="1948" instrument_node="">investment returns</span></a><span data-dcnode-id="1946" instrument_node=""> at the end might be lower than the other plans.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">The company invests in assets that generate predictable returns from the moment it makes the investment.</span></p><span data-dcnode-id="1941" instrument_node="">

</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">As depicted in the photo below, its income-focused assets comprise 70% – 80% while its Growth assets are only 20% – 30%.</span></p><span data-dcnode-id="1427" instrument_node="">

</span><h2 class="has-black-color has-pale-cyan-blue-background-color has-text-color has-background" data-dcnode-id="1416"><span class="ez-toc-section" data-dcnode-id="1420" id="What_Are_The_Assets_Under_The_Fundrise_Supplemental_Income"></span><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">What Are The Assets Under The Fundrise Supplemental Income</span></strong><span class="ez-toc-section-end" data-dcnode-id="1417"></span></h2><span data-dcnode-id="1415" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">The Supplemental Income eREIT focuses primarily on making debt investments in commercial real estate assets that generate steady cash flow.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">But first, what is an eREIT?</span></p><span data-dcnode-id="1409" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1403"><p data-dcnode-id="1406"><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">An eREIT is a professionally managed, diversified portfolio of commercial real estate assets, such as apartments, hotels, shopping centers, and office buildings from across the country. Similar to an ETF or mutual fund but specifically for commercial real estate, an eREIT allows an investor to diversify across many properties at a relatively low cost and with minimal effort.</span></em></p><cite data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">As quoted from retirebeforedad</span></cite></blockquote><span data-dcnode-id="1402" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1398"><figure class="aligncenter size-full" data-dcnode-id="1399"><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3JeYjJY"><img alt="TikTok Stock Price 2022 - Turn $100 into $12000 in weeks" class="wp-image-23949" data-dcnode-id="1401" height="280" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2021/12/Ad_1_336x280.gif&amp;raw" width="336"></a></figure></div><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1396"></p><span data-dcnode-id="1395" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Up to now, the Income eREIT identify and curates quality assets that are sought out by institutional investors or simply those big-time real estate investors.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">These quality assets which have a slightly smaller size are usually in an urban metro markets.</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Fundrise sticks to three core principles in selecting projects for investment:</span></p><span data-dcnode-id="1386" instrument_node="">
</span><ul class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1379"><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Small Assets – assets that institutional investors and banks might overlook because of their size</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Regulatory Inefficiencies – due to the deregulation in the&nbsp;financial&nbsp;industry that permitted banks to engage in hedge fund trading with derivatives in 2008, this created new opportunities in the market for more lenders</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Urban Infill Location – assets in large cities have higher demand and of course higher pricing because of higher population and relative lack of supply.</span></li></ul><span data-dcnode-id="1378" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1373"><figure class="aligncenter size-large is-resized" data-dcnode-id="1374"><img alt="Fundrise Supplemental Income Review -  Fundrise Supplemental Income Asset Allocation" class="wp-image-20033" data-dcnode-id="1377" height="581" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2020/10/Assets-Under-Supplemental-Income-Plan.jpg&amp;raw" srcset="https://successfultradings.com/wp-content/uploads/2020/10/Assets-Under-Supplemental-Income-Plan.jpg 903w, https://successfultradings.com/wp-content/uploads/2020/10/Assets-Under-Supplemental-Income-Plan-300x205.jpg 300w, https://successfultradings.com/wp-content/uploads/2020/10/Assets-Under-Supplemental-Income-Plan-768x525.jpg 768w, https://successfultradings.com/wp-content/uploads/2020/10/Assets-Under-Supplemental-Income-Plan-50x34.jpg 50w" width="850"><figcaption data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Fundrise Supplemental Income Asset Allocation</span></figcaption></figure></div><span data-dcnode-id="1372" instrument_node="">
</span><h2 data-dcnode-id="1367"><span class="ez-toc-section" data-dcnode-id="1371" id="What_Is_The_Performance_Of_Fundrise_Supplemental_Income"></span><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">What Is The Performance Of Fundrise Supplemental Income</span></strong><span class="ez-toc-section-end" data-dcnode-id="1368"></span></h2><span data-dcnode-id="1366" instrument_node="">
</span><div class="wp-duotone-1900d8-ffa96b-1 wp-block-image" data-dcnode-id="1360"><figure class="aligncenter size-large is-resized" data-dcnode-id="1361"><img alt="Fundrise Supplemenetal Income Review - Fundrise Supplemental Income Historical Net Returns" class="wp-image-20021" data-dcnode-id="1365" height="542" loading="lazy" sizes="(max-width: 942px) 100vw, 942px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns-1024x589.jpg&amp;raw" srcset="https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns-1024x589.jpg 1024w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns-300x173.jpg 300w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns-768x442.jpg 768w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns-50x29.jpg 50w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Historical-Net-Returns.jpg 1065w" width="942"><figcaption data-dcnode-id="1362"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Fundrise Supplemental Income Historical Net Returns</span></strong></figcaption></figure></div><span data-dcnode-id="1359" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">As show in the table above, starting from its inception in 2015 Fundrise Income eREIT has a generally positive return.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">But comparing its 2020 and 2019 run, the 2020 total return is actually slightly lower.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">But that is understandable since the pandemic affected every aspect of the economy and the data is only up till September of this year.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h2 class="has-black-color has-pale-cyan-blue-background-color has-text-color has-background" data-dcnode-id="1345"><span class="ez-toc-section" data-dcnode-id="1349" id="How_Can_You_Earn_Money_With_Fundrise_Supplemental_Income"></span><strong data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">How Can You Earn Money With Fundrise Supplemental Income</span></strong><span class="ez-toc-section-end" data-dcnode-id="1346"></span></h2><span data-dcnode-id="1344" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">You can earn money with the Supplemental Income through two ways.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1336"><span data-dcnode-id="1340" instrument_node="">First is via quarterly </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/blog/the-dividend-hunter-review/"><span data-dcnode-id="1339" instrument_node="">dividends</span></a><span data-dcnode-id="1337" instrument_node="">, and Second is via an appreciation of the assets in your portfolio.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">These returns occur from rental income collected, interest or the potential appreciation in the property’s value.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1331"></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1329"></p><span data-dcnode-id="1328" instrument_node="">
</span><h2 class="has-black-color has-pale-cyan-blue-background-color has-text-color has-background" data-dcnode-id="1323"><span class="ez-toc-section" data-dcnode-id="1327" id="When_Can_You_Recieve_Your_Fundrise_Supplemental_Dividends"></span><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">When Can You Recieve Your Fundrise Supplemental Dividends</span></strong><span class="ez-toc-section-end" data-dcnode-id="1324"></span></h2><span data-dcnode-id="1322" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1317"><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Dividends are typically distributed in the middle of the month following the end of each quarter, e.g. mid-April for dividends earned during the first quarter. You may also receive additional periodic cash distributions, as certain underlying properties are sold. The value of your shares is also typically re-calculated on a quarterly or semi-annual&nbsp;basis.</span></p><cite data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">As quoted from Fundrise website</span></cite></blockquote><span data-dcnode-id="1316" instrument_node="">
</span><h2 data-dcnode-id="1311"><span class="ez-toc-section" data-dcnode-id="1315" id="How_Can_You_Redeem_Your_Fundrise_Supplemetal_Income_Shares"></span><strong data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">How Can You Redeem Your Fundrise Supplemetal Income Shares</span></strong><span class="ez-toc-section-end" data-dcnode-id="1312"></span></h2><span data-dcnode-id="1310" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1305"><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Real estate is inherently a long-term, illiquid investment. Fundrise is intended for investors who have a minimum time horizon of approximately five years. However, we have adopted a redemption plan whereby an investor may obtain liquidity quarterly for the eREITs, or monthly after a minimum 60-day waiting period for the eFunds, subject to certain limitations.</span></p><cite data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">As quoted from Fundrise website</span></cite></blockquote><span data-dcnode-id="1304" instrument_node="">
</span><h2 class="has-black-color has-pale-cyan-blue-background-color has-text-color has-background" data-dcnode-id="1299"><span class="ez-toc-section" data-dcnode-id="1303" id="What_Are_The_Fees_Related_To_The_Supplemental_Income_Plan"></span><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">What Are The Fees Related To The Supplemental Income Plan</span></strong><span class="ez-toc-section-end" data-dcnode-id="1300"></span></h2><span data-dcnode-id="1298" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1293"><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Projected return and dividend figures displayed on this page are net of fees. The offerings in this plan pay a 0.85% annual asset management fee. In addition, investors pay a 0.15% annual investment advisory fee, which may be waived under certain circumstances. This all-in 1% annual pricing model is up to&nbsp;40% more cost-efficient than publicly available&nbsp;investments.</span></p><cite data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">As quoted from Fundrise website</span></cite></blockquote><span data-dcnode-id="1292" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1287"><figure class="aligncenter size-large is-resized" data-dcnode-id="1288"><img alt="Fundrise Supplemental Income Review - Fundrise Supplemental Income Annual Costs" class="wp-image-20023" data-dcnode-id="1291" height="441" loading="lazy" sizes="(max-width: 496px) 100vw, 496px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Annual-Costs.jpg&amp;raw" srcset="https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Annual-Costs.jpg 625w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Annual-Costs-300x267.jpg 300w, https://successfultradings.com/wp-content/uploads/2020/10/Fundrise-Supplemental-Income-Annual-Costs-50x44.jpg 50w" width="496"><figcaption data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Fundrise Supplemental Income Annual Costs</span></figcaption></figure></div><span data-dcnode-id="1286" instrument_node="">
</span><h2 class="has-black-color has-pale-cyan-blue-background-color has-text-color has-background" data-dcnode-id="1280"><span class="ez-toc-section" data-dcnode-id="1285" id="What_Are_The_Tax_Documents_That_You_Will_Receive"></span><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">What Are The Tax Documents That You Will Receive</span></strong><span data-dcnode-id="1282" instrument_node=""> </span><span class="ez-toc-section-end" data-dcnode-id="1281"></span></h2><span data-dcnode-id="1279" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1274"><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Investors in the Supplemental Income plan can expect to receive a Form 1099-DIV&nbsp;for each eREIT&nbsp;in the plan’s&nbsp;allocation.</span></p><cite data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">As quoted from Fundrise website</span></cite></blockquote><span data-dcnode-id="1273" instrument_node="">
</span><h2 class="has-black-color has-text-color" data-dcnode-id="1267"><span class="ez-toc-section" data-dcnode-id="1272" id="What_Are_People_Saying_About_Fundrise_Supplemental_Income"></span><strong data-dcnode-id="1269"><strong data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">What Are People Saying About Fundrise Supplemental Income</span></strong></strong><span class="ez-toc-section-end" data-dcnode-id="1268"></span></h2><span data-dcnode-id="1266" instrument_node="">
</span><p class="has-pale-cyan-blue-background-color has-background" data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">These are the reviews we found online in Financial Samurai:</span></p><span data-dcnode-id="1263" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1248"><p data-dcnode-id="1252"><span data-dcnode-id="1262" instrument_node="">One thing I realized after being with Fundrise for a while is</span><br data-dcnode-id="1261"><br data-dcnode-id="1260"><span data-dcnode-id="1259" instrument_node="">(1) hoo boy, this thing has great returns but is super tax inefficient – strongly consider putting your (Roth IRA) money here, rather than keeping Fundrise taxable and holding stocks/bonds in your IRA. I honestly think my returns would near-double if I had it in a tax-sheltered account.</span><br data-dcnode-id="1258"><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">(2) “Ramping Up” eREITs are a massive drag on your returns – always try to buy eREITs/funds that are going to give dividends soon</span><br data-dcnode-id="1255"><br data-dcnode-id="1254"><span data-dcnode-id="1253" instrument_node="">I’m primarily in Heartland and East Coast to diversify, they’ve all been in the 7-8% range, except those ramping up, which are 0% sadly. I got tricked into putting money into the ramping-up funds through the “dividend reinvestment”, which just targets a portfolio.</span></p><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Fat Tony January 16, 2019</span></p><p data-dcnode-id="1249"></p></blockquote><span data-dcnode-id="1247" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1243"><figure class="aligncenter size-full is-resized" data-dcnode-id="1244"><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3JeYjJY"><img alt="TikTok Stock price - Make Moeny during recession" class="wp-image-23945" data-dcnode-id="1246" height="125" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2021/12/Ad_4_320x50.gif&amp;raw" width="800"></a></figure></div><span data-dcnode-id="1242" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1235"><p data-dcnode-id="1238"><span data-dcnode-id="1241" instrument_node="">I’ve invested in heartland, income, and the west. Had a small drop in the dividend on the Q4 2018 due to an issue with one of the investments but it’s back again to normal dividend rate. So far the dividend rate is about 7-8% very happy with that.</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">Income has the highest dividend rate so far.</span></p><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">dustball April 16, 2019</span></p></blockquote><span data-dcnode-id="1234" instrument_node="">
</span><p class="has-pale-cyan-blue-background-color has-background" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">In Reddit:</span></p><span data-dcnode-id="1231" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1224"><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Income I and Income II eREITs are income producing eREITs at the moment, which will give you dividends. Income V and Balanced eREITs are still ramping up and aren’t going to produce any or very little yield at the moment. The truth is that you do have to “sacrifice” some of your initial investment so that you can get access to do direct investment capability to the income producing eREITs. There really is no way around it. Eventually the Income V and Balanced eREITs will produce yield, so it is not a lost cause.</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Best advice is invest just the initial $1000 minimum in the supplemental income plan and once that clears, do direct investments into the Income I and Income II eREITs to beef up your dividend earning potential.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">ericdabbs 4 months ago</span></p></blockquote><span data-dcnode-id="1223" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1218"><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Agree with ericdabbs. Would like to stress that Fundrise is a long-term investment. My early returns were not great, but they keep increasing each year as my investments mature. Fundrise auto-invest and dividend reinvest features tend to put you in the newest eREITs, which are ramping up and feel like dead money for a while.</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">dklemchuk 4 months ago</span></p></blockquote><span data-dcnode-id="1217" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1212"><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">I’ve been with them for 1.5 years and my total return (capital + dividends) has been 11%. They regularly pay out dividends straight to my bank account.</span></p><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">anonymous 2 years ago</span></p></blockquote><span data-dcnode-id="1211" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1206"><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Nope, after about a year’s trial I cashed out. I was getting less than 5% return. Additionally, It took them 4 months to liquidate my account (quarterly schedule). Fundrise is a scam with high risks, low returns, and terribly liquidity.</span></p><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">jhirai20 2 years ago</span></p></blockquote><span data-dcnode-id="1205" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1193"><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">I’ve been with them for 2.5 years. Overall, I’m very happy with the service and I think it’s an excellent vehicle for alternative investment.</span></p><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Personally, I miss the older days on the platform when accredited individuals could make individual equity &amp; debt investments. I’ve actually had a few of those from 2 years ago term and return principal + on average about 13% return.</span></p><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">The platform now is more mass market with all available options being some version of commercial real estate REITs. I have found the ability to get a solid understanding of return much weaker in these vehicles. Depending on the fund returns seem between 5% (growth funds with accrued upside) to 8% (more income styled funds).</span></p><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">I like the platform, but less with its new model. I think it’s worth an allocation of your portfolio but definitely would not go higher than 10%. They are still too young and unproven.</span></p><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">feadrus 2 years ago</span></p><p data-dcnode-id="1194"></p></blockquote><span data-dcnode-id="1192" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1188"><figure class="aligncenter size-full" data-dcnode-id="1189"><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit.ly/3JeYjJY"><img alt="TikTok Stock Price 2022 - Turn $100 into $12000 in weeks" class="wp-image-23949" data-dcnode-id="1191" height="280" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//successfultradings.com/wp-content/uploads/2021/12/Ad_1_336x280.gif&amp;raw" width="336"></a></figure></div><span data-dcnode-id="1187" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1167"><p data-dcnode-id="1182"><span data-dcnode-id="1186" instrument_node="">I and my family invested with Fundrise in their eREIT products and still have holdings with them. There are several reasons I would tell you to [</span><em data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">avoid</span></em><span data-dcnode-id="1183" instrument_node="">] investing with them based on my experience.</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">The funds are illiquid – there is a 5 Year lockup period and you can’t get your money out like more liquid investments (without paying up to 3% penalty fees), or if suddenly there’s a ‘run on the bank’ and more than a certain % of shares want to cash out. Oh btw they will always redeem your last investment first, so adding more through a dividend reinvestment or lump sum will reset the clock!</span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">They inflate performance by eating your principal; the Net Asset Value keeps deteriorating from your original investment</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">They charge high management fees</span></p><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">They speculate in real estate and are tied to the weakening housing/commercial market, which is currently under pressure with higher interest rates</span></p><p data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Their business model is built around charging high-interest loans, so investors turn to them as financiers of last resort, adding more risk (normal banks won’t loan the same people the money they ask for)</span></p><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">If you choose to invest, be sure you know all the strings attached to getting your money out and understand the risks.</span></p><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">jcwj 1 year go</span></p></blockquote><span data-dcnode-id="1166" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1159"><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">I invested a lot of money through Fundrise early last year and I just withdrew all of it after 3 months waiting period. Overall, I lost money with&nbsp;Fundrise.com due to minimal dividends and a 3% penalty for redeeming investment after 15 months. Also, the tax implications of investments with Fundrise are not favorable for most investors IMO. It cuts into the return heavily at yearend.</span></p><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">They say their real estate investment is for long term 5-7 years, but after calculating taxes and (tax preparer fees), your investments amount to a mere 1-2% return. I feel you are better off investing in REIT O, a CD, index fund, or any other place but Fundrise or any such alternative.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">re-emerald 1 year ago</span></p></blockquote><span data-dcnode-id="1158" instrument_node="">

</span><p class="has-black-color has-text-color has-medium-font-size" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Their dividend distribution also varies as it is a monthly distribution with Realty Mogul and quarterly for Fundrise.</span></p><span data-dcnode-id="1143" instrument_node="">
