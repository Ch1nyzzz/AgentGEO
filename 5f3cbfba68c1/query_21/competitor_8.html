" data-dcnode-id="3104"><div class="edu-art-hero-container edu-ah-hide-stamp" data-dcnode-id="3105"><div class="edu-ah-left-head" data-dcnode-id="3109"><h1 class="edu-ah-h1 extra-bold-font text-select" data-dcnode-id="3126" itemprop="name"><span data-dcnode-id="3127" instrument_node="">Usage-Based Insurance (UBI)</span></h1><div class="edu-art-sub-head bold-font" data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">What is usage-based insurance and 2021's best UBI companies.</span></div><p class="edu-ah-author semi-bold-font text-select" data-dcnode-id="3110" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><a class="edu-ah-author-name" data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/profile/13747527i" itemprop="url" rel="author"><span data-dcnode-id="3122" instrument_node="">Karl  Eisenhower</span></a><span data-dcnode-id="3118" instrument_node="">, </span><span data-dcnode-id="3116"><span data-dcnode-id="3117" instrument_node="">Car Insurance Editor</span></span><span class="edu-art-date" data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Jul 1, 2021</span></span><meta content="Karl  Eisenhower" data-dcnode-id="3111" itemprop="name"></p></div><div class="edu-ah-right-head" data-dcnode-id="3107"><img alt="usage based insurance" class="edu-ah-thumb" data-dcnode-id="3108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/wallethub/posts/83002/usage-based-insurance.png&amp;raw"></div></div></div><meta content="Jul 1, 2021" data-dcnode-id="3101" itemprop="datePublished"><meta content="Jul 1, 2021" data-dcnode-id="3100" itemprop="dateModified"><meta content="Usage-Based Insurance (UBI)" data-dcnode-id="3099" itemprop="headline"><meta content="https://cdn.wallethub.com/wallethub/posts/83002/usage-based-insurance.png" data-dcnode-id="3098" itemprop="image"><meta content="https://wallethub.com/edu/ci/usage-based-insurance/14118" data-dcnode-id="3096" itemprop="url"><span data-dcnode-id="3091" hidden="true" itemprop="publisher" itemscope="" itemtype="http://schema.org/Organization"><meta content="WalletHub" data-dcnode-id="3095" itemprop="name"><meta content="https://wallethub.com" data-dcnode-id="3094" itemprop="url"><span data-dcnode-id="3092" itemprop="logo" itemscope="" itemtype="https://schema.org/ImageObject"><meta content="https://cdn.wallethub.com/images/ng2-images/app_logo_V000c1fb_.jpg" data-dcnode-id="3093" itemprop="url"></span></span><div class="edu-art-with-side edu-art-square-social" data-dcnode-id="287"><div class="edu-art-main" data-dcnode-id="405"><div class="social-share-box" data-dcnode-id="3078"><social-share class="social-share-mobile-only" data-dcnode-id="3079" ng-position-sticky="" style="position:;"><button aria-label="Share on Facebook" class="edu-ss-link edu-ss-fb" data-dcnode-id="3087" tabindex="0"><em aria-hidden="true" class="bf-icon-social-fbk" data-dcnode-id="3088" tabindex="-1"></em></button><button aria-label="Share on Twitter" class="edu-ss-link edu-ss-tw" data-dcnode-id="3085" tabindex="0"><em aria-hidden="true" class="bf-icon-social-tw" data-dcnode-id="3086" tabindex="-1"></em></button><button aria-label="Share on LinkedIn" class="edu-ss-link edu-ss-in" data-dcnode-id="3083" tabindex="0"><em aria-hidden="true" class="bf-icon-social-in" data-dcnode-id="3084" tabindex="-1"></em></button><button aria-label="Share via Email" class="edu-ss-link edu-ss-email" data-dcnode-id="3081" tabindex="0"><em aria-hidden="true" class="bf-icon-social-email" data-dcnode-id="3082" tabindex="-1"></em></button></social-share></div><div class="edu-author-container" data-dcnode-id="3060"><div class="edu-auth-avatar" data-dcnode-id="3074"><img alt="Author Avatar" data-dcnode-id="3075" data-src="https://cdn.wallethub.com/common/profile/images/150/karleisenhower-avatar_141513747527i.jpg" style="opacity:0;"></div><div class="edu-auth-details" data-dcnode-id="3061"><a class="edu-ah-author-name-mob" data-dcnode-id="3071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/profile/13747527i"><span data-dcnode-id="3072" instrument_node="">Karl  Eisenhower</span></a><span data-dcnode-id="3068" instrument_node="">, </span><span data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Car Insurance Editor</span></span><br data-dcnode-id="3063"><span data-dcnode-id="3062" instrument_node=""> Jul 1, 2021 </span></div></div><div class="edu-art-content-table with-links text-select" data-dcnode-id="1761"><p data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Usage-based insurance is a type of car insurance that bases the cost of a policy on how safe a driver’s habits are. Data for usage-based insurance (UBI) is collected by the driver’s vehicle and analyzed by the insurer, which then uses it to determine how much of a discount the driver is eligible to receive. The better the driver, the better the discount.</span></p><span data-dcnode-id="3055" instrument_node="">
</span><h2 class="small" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Key Things to Know About Usage-Based Insurance (UBI)</span></h2><span data-dcnode-id="3052" instrument_node="">
</span><ul data-dcnode-id="3035"><span data-dcnode-id="3051" instrument_node="">
</span><li data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Drivers usually save 10% to 15% annually with usage-based insurance.</span></li><span data-dcnode-id="3048" instrument_node="">
</span><li data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">The best discounts go to safe drivers who don’t rack up a lot of mileage, though pricing factors vary between companies.</span></li><span data-dcnode-id="3045" instrument_node="">
</span><li data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">Data is gathered directly from your vehicle’s telematics system or through a device plugged into the car’s diagnostic port.</span></li><span data-dcnode-id="3042" instrument_node="">

Get Usage-Based Insurance</span></span></a><a aria-label="Ask The Experts: Privacy Issues And UBI" class="tbl-oc-anchor semi-bold-font" data-dcnode-id="2451" data-jump-to="ask-the-experts" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/embed/i_tz8Ccthv0%3Frel%3D0%26showinfo%3D0%26cc_load_policy%3D1%26playsinline%3D1%26modestbranding%3D1%23ask-the-experts"><span aria-hidden="true" class="bf-icon-right-arrow" data-dcnode-id="2454" tabindex="-1"></span><span aria-hidden="true" data-dcnode-id="2452" tabindex="-1"><span data-dcnode-id="2453" instrument_node="">Ask The Experts: Privacy Issues And UBI</span></span></a><a aria-label="Usage-Based Insurance FAQ" class="tbl-oc-anchor semi-bold-font" data-dcnode-id="2447" data-jump-to="qanda" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/embed/i_tz8Ccthv0%3Frel%3D0%26showinfo%3D0%26cc_load_policy%3D1%26playsinline%3D1%26modestbranding%3D1%23qanda"><span aria-hidden="true" class="bf-icon-right-arrow" data-dcnode-id="2450" tabindex="-1"></span><span aria-hidden="true" data-dcnode-id="2448" tabindex="-1"><span data-dcnode-id="2449" instrument_node="">Usage-Based Insurance FAQ</span></span></a></div><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><a data-dcnode-id="2444" name="right-for-you"></a></p><span data-dcnode-id="2442" instrument_node="">
</span><h2 data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Is Usage-Based Insurance Right For You?</span></h2><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">The greatest discounts for usage-based insurance are given to safe drivers who drive fewer miles than the average motorist. That makes these plans ideal for some students, retirees, stay-at-home parents, and drivers who don’t commute in a car because they work from home or take public transit to work. You can reference the checklist below for more specifics.</span></p><span data-dcnode-id="2436" instrument_node="">
</span><p data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Usage-based insurance is right for you if:</span></p><span data-dcnode-id="2433" instrument_node="">
</span><ul data-dcnode-id="2416"><span data-dcnode-id="2432" instrument_node="">
</span><li data-dcnode-id="2428"><strong data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">You drive less than 11,500 miles per year. </span></strong><span data-dcnode-id="2429" instrument_node="">That’s how many miles the average driver logs annually, according to the Federal Highway Administration. So if you drive that much or more, you aren’t likely to save on premiums by picking a usage-based program.</span></li><span data-dcnode-id="2427" instrument_node="">
</span><li data-dcnode-id="2423"><strong data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">You drive gently. </span></strong><span data-dcnode-id="2424" instrument_node="">Many insurers track your driving style, and they will penalize you for things like braking hard or driving at high speeds.</span></li><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2418"><strong data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">You don’t mind being tracked.</span></strong><span data-dcnode-id="2419" instrument_node=""> Make sure you are comfortable with your insurance company monitoring your daily driving, which in some cases can include location data. Given that most of us carry Internet-connected cell phones with GPS location tracking, adding your car insurance company to the list of corporations that can track your movements may not be of great concern.</span></li><span data-dcnode-id="2417" instrument_node="">
</span></ul><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">If you pass those tests, read on to learn the ins and outs of usage-based insurance plans.</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><a data-dcnode-id="2411" name="how-it-works"></a></p><span data-dcnode-id="2409" instrument_node="">
</span><h2 data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">How Usage-Based Insurance Works</span></h2><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">To get started with usage-based insurance, you need a way to transmit data about your driving to your insurance company. You may be able to use built-in telematics systems like OnStar or SYNC. If your car doesn’t have a compatible system built in, your insurance company will provide a device that will plug into your car’s diagnostic port. Or, you might be able to use a smartphone app to track your driving habits.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">As an incentive to sign up, you’ll generally start with an introductory discount of 5% - 10%. Then, after a data collection period of up to 6 months, the insurer will calculate a discount tailored to your driving that, in most cases, will be applied at the start of your next renewal period. While some insurers say a discount of up to 50% is possible, discounts for most drivers will fall somewhere in the range of 10% - 15%.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">Most insurance companies promise that data collected about your driving will be used only for discounts, </span><em data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">not </span></em><span data-dcnode-id="2396" instrument_node="">to increase your premiums. Progressive and Geico are the exception to this rule: It is possible to get a surcharge instead of a discount with their programs. Also be aware that, as with any auto insurance policy, your base premium may increase each time your policy is renewed, diluting the value of your discount.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">To help you save and to encourage safety behind the wheel, most programs provide feedback on your driving. If you use this information to improve your habits, you can save even more. Some examples of available tools are:</span></p><span data-dcnode-id="2391" instrument_node="">
</span><ul data-dcnode-id="2380"><span data-dcnode-id="2390" instrument_node="">
</span><li data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Some Progressive Snapshot devices will beep to notify you when you’re braking hard enough to be penalized.</span></li><span data-dcnode-id="2387" instrument_node="">
</span><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Smartphone apps from Allstate Drivewise and Metromile analyze driving habits and display reports after every trip.</span></li><span data-dcnode-id="2384" instrument_node="">
</span><li data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">In almost all cases, you can log into the insurance company’s website to see how your driving is affecting your insurance premiums.</span></li><span data-dcnode-id="2381" instrument_node="">
</span></ul><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">The details of each program ultimately vary pretty widely, though. Each insurer emphasizes different behaviors as they apply discounts.</span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2372"><strong data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Emphasis on low mileage.</span></strong><span data-dcnode-id="2373" instrument_node=""> Travelers and National General only track miles driven, and discounts are purely based on how many miles you log.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2367"><strong data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Emphasis on safe driving.</span></strong><span data-dcnode-id="2368" instrument_node=""> Allstate Drivewise does not offer low-mileage discounts. They just want to see that you avoid unsafe behavior, such as hard braking, high-speed driving and using your car during late-night hours.</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2362"><strong data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">One-time scoring of driving habits. </span></strong><span data-dcnode-id="2363" instrument_node="">Nationwide only tracks your driving for an initial period to score your driving habits. You then send the tracking device back, and any discount will be applied for as long as you keep your Nationwide auto coverage.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Safeco’s Rewind offering works similarly. It’s an accident forgiveness program that gives you a 4-month opportunity to prove that your driving habits are safer than your driving record would indicate.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2354"><strong data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">“Pay as you drive.”</span></strong><span data-dcnode-id="2355" instrument_node=""> Metromile puts you in direct control of how much insurance you buy each month. Their policies start with a low base insurance rate, and when you use your car, you’re charged an additional fee for every mile driven.</span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">There are currently 19 major insurance companies offering some form of usage-based insurance. You can see details on each of their offerings in the table below. Keep in mind that not all of these programs are available in all states.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><p data-dcnode-id="2348"><a data-dcnode-id="2349" name="where-to-get"></a></p><span data-dcnode-id="2347" instrument_node="">

</span><h2 class="small" data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">How Allstate Drivewise Works&nbsp;</span></h2><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Allstate Drivewise works by tracking drivers' habits through the Allstate mobile app. Users do not have to take any action to log trips on the app. Your phone just needs to be charged to at least 25% and have location services enabled in order for your trip to be detected. Once you've traveled at least 20 mph for a short distance, the app will begin tracking you.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">However, if you're a passenger in a moving vehicle and not the driver, you will have to either delete the trip from the app or put the app into “sleep” mode for the duration of your trip.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Drivewise does not affect premiums directly, instead offering cash rebates to drivers based on their performance. So if you practice unsafe driving habits while using Drivewise, your rates won't go up. But drivers who practice good habits can expect to earn lucrative rewards.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><h2 class="small" data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">Allstate Drivewise Rewards</span></h2><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">If you're a current Allstate customer, you can earn up to 10% of your premium in cash back rewards just for signing up. Depending on your driving habits, you can earn up to 25% cash back every six months by using the program.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Drivewise also allows users to earn Allstate Rewards points, which can be redeemed for daily deals, gift cards, sweepstakes, and more. Even if you're not an Allstate customer, you can still sign up for Drivewise in order to earn points. Drivers earn 10,000 points after signing up, and can earn bonus points for completing safe driving challenges such as going three consecutive days with no high speeds or sudden braking.</span></p><span data-dcnode-id="1583" instrument_node="">
</span><h2 class="small" data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">How to Sign Up For Allstate Drivewise</span></h2><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">To sign up for Drivewise, the primary policyholder needs to download the Allstate mobile app on their smartphone and activate the program. Then, additional drivers on the policy who want to use Drivewise can download the app and enter an activation code.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Drivers who aren't Allstate customers can also create an account on the app in order to earn rewards.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="1565"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="1570" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1571" itemprop="upvoteCount"><span data-dcnode-id="1572" instrument_node="">0</span></span></div><div aria-label="1 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1566" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1567" itemprop="downvoteCount"><span data-dcnode-id="1568" instrument_node="">1</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="1479" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="1554" itemprop="name"><a class="qna-q-title link" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/allstate-pay-per-mile-2140757988/" ng-focus="" rel="noopener"><span data-dcnode-id="1558" instrument_node="">Does Allstate offer pay per mile insurance?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="1549"><div class="qna-q-upvotes-count" data-dcnode-id="1552" itemprop="upvoteCount"><span data-dcnode-id="1553" instrument_node="">2</span></div><span class="bold-font" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="1530"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="1541" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="1542" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="1531"><div aria-label="2 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="1536" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">2</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1532" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="1480"><div class="qna-q-ans basic-trans" data-dcnode-id="1483" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="1515"><div class="avatar" data-dcnode-id="1527"><img alt="user avatar" class="avatar-img" data-dcnode-id="1528" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="1516"><div class="full-name semi-bold-font" data-dcnode-id="1523"><span data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="1518" tabindex="-1"><span data-dcnode-id="1521" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="1494" data-pos="1-0" itemprop="text"><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Allstate offers pay-per-mile insurance through a program called Milewise. Allstate's pay-per-mile insurance program works by charging customers a base amount plus a small fee per mile driven, making it a good choice for low-mileage drivers. For instance, Allstate provides an example rate of $1.50 per day plus 6¢ per mile.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><h2 class="small" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">How Allstate Pay-per-Mile Works</span></h2><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Milewise has a mileage cap of 250 miles in some states, which means that drivers won't be charged for any miles beyond this limit. As a result, long road trips will only cost up to a certain maximum amount. Unlike most insurance premiums, Milewise charges policyholders immediately after they take a trip, so drivers must keep a certain balance in their Milewise account.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><h2 class="small" data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Allstate Milewise Tracking and Availability</span></h2><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Milewise is available in 18 states, including Florida, Texas, and New Jersey. Milewise tracks mileage using a device that plugs into your car underneath the dashboard, which is compatible with most cars from 1996 or later.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1499" instrument_node="">Keep in mind that Milewise is different from Drivewise. Drivewise is a </span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="1498" instrument_node="">usage-based insurance</span></a><span data-dcnode-id="1496" instrument_node=""> program from Allstate that gives policyholders cashback on a traditional policy based on driving habits such as speed, braking, and the time of day that you drive.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="1485"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="1490" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1491" itemprop="upvoteCount"><span data-dcnode-id="1492" instrument_node="">0</span></span></div><div aria-label="1 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1486" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1487" itemprop="downvoteCount"><span data-dcnode-id="1488" instrument_node="">1</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="1381" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="1474" itemprop="name"><a class="qna-q-title link" data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/pay-as-you-go-car-insurance-2140742472/" ng-focus="" rel="noopener"><span data-dcnode-id="1478" instrument_node="">How does pay-as-you-go car insurance work?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="1469"><div class="qna-q-upvotes-count" data-dcnode-id="1472" itemprop="upvoteCount"><span data-dcnode-id="1473" instrument_node="">2</span></div><span class="bold-font" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="1450"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="1461" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="1462" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="1451"><div aria-label="2 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="1456" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">2</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1452" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="1382"><div class="qna-q-ans basic-trans" data-dcnode-id="1385" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="1435"><div class="avatar" data-dcnode-id="1447"><img alt="user avatar" class="avatar-img" data-dcnode-id="1448" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="1436"><div class="full-name semi-bold-font" data-dcnode-id="1443"><span data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="1438" tabindex="-1"><span data-dcnode-id="1441" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="1396" data-pos="2-0" itemprop="text"><p data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node="">Pay-as-you-go car insurance calculates a policyholder's premium based on how many miles they drive each month. The policyholder's mileage is tracked through a mobile app or device plugged into the vehicle, and customers who drive fewer miles pay a lower rate. Companies that offer pay-as-you-go car insurance, which can also be referred to as pay-per-mile or </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="1433" instrument_node="">usage-based coverage</span></a><span data-dcnode-id="1431" instrument_node="">, usually charge a monthly base rate and then add a fee for each mile driven.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><h2 class="small" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Pay-as-You-Go Car Insurance Options</span></h2><span data-dcnode-id="1426" instrument_node="">
</span><ul data-dcnode-id="1412"><span data-dcnode-id="1425" instrument_node="">
</span><li data-dcnode-id="1422"><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/profile/ci/nationwide-13303759i"><span data-dcnode-id="1424" instrument_node="">Nationwide SmartMiles</span></a></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1418"><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/profile/ci/allstate-13012586i"><span data-dcnode-id="1420" instrument_node="">Allstate Milewise</span></a></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1414"><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/profile/ci/metromile-13015725i"><span data-dcnode-id="1416" instrument_node="">Metromile</span></a></li><span data-dcnode-id="1413" instrument_node="">
</span></ul><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Other major insurers offer usage-based programs that give drivers a discounted rate based on various driving habits, including miles driven. If your annual mileage is lower than the average driver, you may also qualify for a low-mileage discount.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><h2 class="small" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Who Should Consider Pay-as-You-Go Car Insurance</span></h2><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1404" instrument_node="">Pay-as-you-go car insurance is often a </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/answers/ci/is-pay-as-you-go-car-insurance-worth-it-2140714567/"><span data-dcnode-id="1403" instrument_node="">good investment</span></a><span data-dcnode-id="1401" instrument_node=""> for people who don't drive frequently, like students and seasonal workers. To learn more, check out WalletHub's guide to </span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="1400" instrument_node="">usage-based insurance</span></a><span data-dcnode-id="1398" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="1387"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="1392" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1393" itemprop="upvoteCount"><span data-dcnode-id="1394" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1388" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1389" itemprop="downvoteCount"><span data-dcnode-id="1390" instrument_node="">0</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="1154" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="1376" itemprop="name"><a class="qna-q-title link" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/geico-telematics-2140699892/" ng-focus="" rel="noopener"><span data-dcnode-id="1380" instrument_node="">Does Geico use telematics?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="1371"><div class="qna-q-upvotes-count" data-dcnode-id="1374" itemprop="upvoteCount"><span data-dcnode-id="1375" instrument_node="">3</span></div><span class="bold-font" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="1352"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="1363" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="1364" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="1353"><div aria-label="3 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="1358" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">3</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1354" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="1155"><div class="qna-q-ans basic-trans" data-dcnode-id="1158" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="1335"><div class="avatar" data-dcnode-id="1349"><img alt="user avatar" class="avatar-img" data-dcnode-id="1350" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WH_Content-avatar_205415995521i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="1336"><div class="full-name semi-bold-font" data-dcnode-id="1343"><span data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Anamarie  Waite</span></span><span class="author-cap" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">, Car Insurance Writer</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="1338" tabindex="-1"><span data-dcnode-id="1341" instrument_node="">@anamarie.waite</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="1169" data-pos="3-0" itemprop="text"><p data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">Geico started using telematics to monitor participating customers' driving habits electronically in 2019, when the company launched its </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geico.com/driveeasy/"><span data-dcnode-id="1333" instrument_node="">DriveEasy</span></a><span data-dcnode-id="1331" instrument_node="">&nbsp;program. Since then, Geico has expanded DiveEasy and its telematics program across 17 states and plans to offer access to more states in the near future.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Geico is testing the smartphone app in certain markets first because telematics programs are still pretty new to consumers. Only 10% to 15% of U.S. drivers had tried one, as of mid-2019.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">The Geico telematics app, DriveEasy, automatically detects when you're driving without you having to open and close the app during trips. DriveEasy provides feedback on your driving and scores your habits to determine your discount. Currently, the app monitors:</span></p><span data-dcnode-id="1323" instrument_node="">
</span><ul data-dcnode-id="1309"><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Distracted driving</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Hard braking</span></li><span data-dcnode-id="1316" instrument_node="">
</span><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Time of day</span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Miles logged</span></li><span data-dcnode-id="1310" instrument_node="">
</span></ul><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Some of these behaviors impact your score more than others. Distracted driving and total driving distance are given the most weight since they are the most likely to increase your risk of an accident. Although the app logs both handheld phone calls and active phone use, it won't penalize you for hands-free calls or mounting your phone on the dashboard to use the GPS.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">The app can tell if you're the driver or passenger by using your phone's sensors and GPS location, so you won't have other people's driving habits affecting your score. If DriveEasy incorrectly makes you a driver on a trip, you are able to correct it.</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Geico guarantees you'll get the full discount just for participating, which could be as much as 20%. How much you'll save for trying the app depends on your location. Feedback from the DriveEasy app won't be used to increase your premiums, but your discount may be reduced based on your score. The user agreement does say that Geico can use information from the app as part of its investigation of a claim, though.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><h2 class="big" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">States Where Geico's DriveEasy Program is Available</span></h2><span data-dcnode-id="1296" instrument_node="">

/span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1127" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="1069"><div class="qna-q-ans basic-trans" data-dcnode-id="1072" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="1110"><div class="avatar" data-dcnode-id="1122"><img alt="user avatar" class="avatar-img" data-dcnode-id="1123" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="1111"><div class="full-name semi-bold-font" data-dcnode-id="1118"><span data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="1113" tabindex="-1"><span data-dcnode-id="1116" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="1083" data-pos="4-0" itemprop="text"><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Yes, Esurance offers a type of pay-per-mile insurance called DriveSense. This is technically usage-based insurance, which is similar to pay-per-mile coverage because it factors mileage into premium calculations, but it also considers driving habits such as braking and acceleration.</span></p><span data-dcnode-id="1107" instrument_node="">
</span><h2 class="small" data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">DriveSense Considers:</span></h2><span data-dcnode-id="1104" instrument_node="">
</span><ul data-dcnode-id="1090"><span data-dcnode-id="1103" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Miles driven</span></li><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Speed</span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The time of day that you drive</span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Braking</span></li><span data-dcnode-id="1091" instrument_node="">
</span></ul><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">It's important to note that these factors collectively affect a customer's insurance premium, so DriveSense is not strictly pay-per-mile. However, it's still a good option for safe, low-mileage drivers who don't mind being tracked for insurance purposes. For more information, check out WalletHub's guide to </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="1087" instrument_node="">usage-based insurance</span></a><span data-dcnode-id="1085" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="1074"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="1079" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1080" itemprop="upvoteCount"><span data-dcnode-id="1081" instrument_node="">0</span></span></div><div aria-label="1 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1075" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1076" itemprop="downvoteCount"><span data-dcnode-id="1077" instrument_node="">1</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="952" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="1063" itemprop="name"><a class="qna-q-title link" data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/is-pay-per-mile-insurance-worth-it-2140754736/" ng-focus="" rel="noopener"><span data-dcnode-id="1067" instrument_node="">Is pay-per-mile car insurance worth it?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="1058"><div class="qna-q-upvotes-count" data-dcnode-id="1061" itemprop="upvoteCount"><span data-dcnode-id="1062" instrument_node="">3</span></div><span class="bold-font" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="1039"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="1050" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="1051" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="1040"><div aria-label="3 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="1045" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">3</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="1041" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="953"><div class="qna-q-ans basic-trans" data-dcnode-id="956" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="1024"><div class="avatar" data-dcnode-id="1036"><img alt="user avatar" class="avatar-img" data-dcnode-id="1037" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="1025"><div class="full-name semi-bold-font" data-dcnode-id="1032"><span data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="1027" tabindex="-1"><span data-dcnode-id="1030" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="967" data-pos="5-0" itemprop="text"><p data-dcnode-id="1013"><span data-dcnode-id="1023" instrument_node="">Yes, pay-per-mile car insurance is worth it for people who drive fewer than 12,000 miles per year, which is the national average. </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/pay-per-mile-insurance/92456"><span data-dcnode-id="1022" instrument_node="">Pay-per-mile insurance</span></a><span data-dcnode-id="1020" instrument_node=""> is a type of car insurance policy that charges drivers a daily or monthly base rate in addition to a per-mile fee, and it's an affordable policy alternative for </span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/answers/ci/low-mileage-insurance-discount-2140724360/"><span data-dcnode-id="1019" instrument_node="">low-mileage</span></a><span data-dcnode-id="1017" instrument_node=""> drivers. For example, </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/metromile-car-insurance-review/63734"><span data-dcnode-id="1016" instrument_node="">Metromile</span></a><span data-dcnode-id="1014" instrument_node=""> advertises that customers save an average of $611 per year when they switch from standard insurers.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><h2 class="small" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Drivers Who Could Benefit From Pay-Per-Mile Insurance</span></h2><span data-dcnode-id="1009" instrument_node="">
</span><ul data-dcnode-id="986"><span data-dcnode-id="1008" instrument_node="">
</span><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">People who work from home</span></li><span data-dcnode-id="1005" instrument_node="">
</span><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Weekend drivers</span></li><span data-dcnode-id="1002" instrument_node="">
</span><li data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">People who frequently bike, walk, or use public transportation</span></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Retirees who don't drive often</span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">College students who don't commute</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Drivers whose leased cars have strict mileage limits</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Individuals with an extra vehicle that's rarely used</span></li><span data-dcnode-id="987" instrument_node="">
</span></ul><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="984" instrument_node="">If you're curious about how much you can save with pay-per-mile insurance, you should first estimate your annual mileage, then compare quotes from different companies. Some insurers like </span><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/metromile-car-insurance-review/63734"><span data-dcnode-id="983" instrument_node="">Metromile</span></a><span data-dcnode-id="981" instrument_node=""> exclusively sell pay-per-mile insurance, while other major insurers like </span><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/allstate-car-insurance-review/62759"><span data-dcnode-id="980" instrument_node="">Allstate</span></a><span data-dcnode-id="978" instrument_node=""> and </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/nationwide-car-insurance-review/62589"><span data-dcnode-id="977" instrument_node="">Nationwide</span></a><span data-dcnode-id="975" instrument_node=""> sell pay-per-mile insurance in addition to standard policies.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">To learn more, check out WalletHub's </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/pay-per-mile-insurance/92456"><span data-dcnode-id="971" instrument_node="">guide to pay-per-mile insurance</span></a><span data-dcnode-id="969" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="958"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="963" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="964" itemprop="upvoteCount"><span data-dcnode-id="965" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="959" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="960" itemprop="downvoteCount"><span data-dcnode-id="961" instrument_node="">0</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="847" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="947" itemprop="name"><a class="qna-q-title link" data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/car-insurance-mileage-exceeded-2140758515/" ng-focus="" rel="noopener"><span data-dcnode-id="951" instrument_node="">What happens if you exceed the mileage limit on your insurance?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="942"><div class="qna-q-upvotes-count" data-dcnode-id="945" itemprop="upvoteCount"><span data-dcnode-id="946" instrument_node="">0</span></div><span class="bold-font" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="923"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="934" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="935" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="924"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="929" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="925" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="848"><div class="qna-q-ans basic-trans" data-dcnode-id="851" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="908"><div class="avatar" data-dcnode-id="920"><img alt="user avatar" class="avatar-img" data-dcnode-id="921" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="909"><div class="full-name semi-bold-font" data-dcnode-id="916"><span data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="911" tabindex="-1"><span data-dcnode-id="914" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="862" data-pos="6-0" itemprop="text"><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">If you exceed the mileage limit on your insurance and have a low-mileage discount or a classic car plan, you may see an increase in your premiums. You cannot really exceed the mileage limit on your insurance if you have a standard plan, however, since the average insurance policy does not involve a mileage limit.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">Yes, you are asked to declare your annual mileage when purchasing an insurance plan. But this is not a strict limit, and exceeding your stated mileage will at most lead to higher rates when you renew your policy. After all, annual mileage is one of the</span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/factors-that-affect-car-insurance-rates/69302"><span data-dcnode-id="903" instrument_node=""> factors</span></a><span data-dcnode-id="901" instrument_node=""> auto insurance companies use to determine rates.</span></p><span data-dcnode-id="899" instrument_node="">
</span><h2 class="small" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">When Mileage Limits Can Impact Insurance</span></h2><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Low Mileage Discount</span></h3><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="892" instrument_node="">If you currently have a low-mileage discount applied to your insurance plan and you exceed the limit of miles per year, you will no longer be eligible to receive the discounted premiums. For example, in order to qualify for </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/answers/ci/state-farm-low-mileage-discount-2140734502/"><span data-dcnode-id="891" instrument_node="">State Farm's low mileage discount</span></a><span data-dcnode-id="889" instrument_node="">, you must drive less than 7,500 miles per year.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Your insurer may track your mileage and driving habits using telematics or a smartphone app, or they may ask you to provide proof of your mileage. &nbsp;</span></p><span data-dcnode-id="884" instrument_node="">
</span><h3 data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Classic Car Plans</span></h3><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="877"><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wallethub.com/answers/ci/classic-car-insurance-cost-2140685881/"><span data-dcnode-id="880" instrument_node="">Classic car insurance</span></a><span data-dcnode-id="878" instrument_node=""> often includes specific driving limits that policyholders must meet to continue qualifying for coverage. For example, in Liberty Mutual's classic car insurance plan, the car must be driven fewer than 5,000 miles annually. Failure to adhere to this restriction could result in you being dropped as a customer or not receiving a claim payout.</span></p><span data-dcnode-id="876" instrument_node="">
</span><h3 data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Pay-Per-Mile Plans</span></h3><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="869"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/pay-per-mile-insurance/92456"><span data-dcnode-id="872" instrument_node="">Pay-per-mile insurance</span></a><span data-dcnode-id="870" instrument_node=""> charges a base rate for coverage and a small fee for every mile driven. These miles are tracked using a small device you plug in under the dash. The good news is that most pay-per-mile plans have a maximum number of miles that they will charge you for in one day. If you go over that mileage cap, you won't be charged for those extra miles.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">To learn more, check out WalletHub's guide to </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/how-does-car-insurance-work/69331"><span data-dcnode-id="866" instrument_node="">how car insurance works</span></a><span data-dcnode-id="864" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="853"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="858" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="859" itemprop="upvoteCount"><span data-dcnode-id="860" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="854" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="855" itemprop="downvoteCount"><span data-dcnode-id="856" instrument_node="">0</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="758" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="842" itemprop="name"><a class="qna-q-title link" data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/allstate-telematics-2140759165/" ng-focus="" rel="noopener"><span data-dcnode-id="846" instrument_node="">Does Allstate use telematics?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="837"><div class="qna-q-upvotes-count" data-dcnode-id="840" itemprop="upvoteCount"><span data-dcnode-id="841" instrument_node="">2</span></div><span class="bold-font" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="818"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="829" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="830" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="819"><div aria-label="2 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="824" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">2</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="820" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="759"><div class="qna-q-ans basic-trans" data-dcnode-id="762" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="803"><div class="avatar" data-dcnode-id="815"><img alt="user avatar" class="avatar-img" data-dcnode-id="816" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="804"><div class="full-name semi-bold-font" data-dcnode-id="811"><span data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="806" tabindex="-1"><span data-dcnode-id="809" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="773" data-pos="7-0" itemprop="text"><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Yes, Allstate uses telematics through Drivewise, its usage-based program, and Milewise, its mileage-based program. Milewise only measures a driver's mileage in order to calculate a daily rate for their policy, while Drivewise tracks several habits and rewards good drivers with a rebate of up to 25%.</span></p><span data-dcnode-id="800" instrument_node="">
</span><h2 class="small" data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">What Allstate Telematics Tracks</span></h2><span data-dcnode-id="797" instrument_node="">
</span><ul data-dcnode-id="786"><span data-dcnode-id="796" instrument_node="">
</span><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Acceleration</span></li><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Braking</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The time of day that you drive</span></li><span data-dcnode-id="787" instrument_node="">
</span></ul><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">In order to use Drivewise, drivers need to plug the tracking device into their vehicle's OBD port or download the Allstate mobile app, which will automatically log trips when it detects driving activity. After you start logging trips, the rebate will be applied every six months. Because Drivewise gives drivers a rebate instead of a discount, your rate will not go up if you practice bad driving habits while enrolled in the program. Currently, Drivewise is available in all states except California.</span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Milewise, on the other hand, works a bit differently. Instead of offering a rebate, Allstate uses the program to calculate a driver's payment based on their daily mileage. Customers are charged a small base premium, and then a fee for each mile that they drive, up to 250 miles per day in some states. As a result, Milewise is a good choice for policyholders who don't drive often.</span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">To learn more, check out WalletHub's </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="777" instrument_node="">guide to usage-based insurance</span></a><span data-dcnode-id="775" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="764"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="769" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="770" itemprop="upvoteCount"><span data-dcnode-id="771" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="765" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="766" itemprop="downvoteCount"><span data-dcnode-id="767" instrument_node="">0</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="663" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="753" itemprop="name"><a class="qna-q-title link" data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/state-farm-pay-per-mile-2140757986/" ng-focus="" rel="noopener"><span data-dcnode-id="757" instrument_node="">Does State Farm offer pay per mile insurance?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="748"><div class="qna-q-upvotes-count" data-dcnode-id="751" itemprop="upvoteCount"><span data-dcnode-id="752" instrument_node="">1</span></div><span class="bold-font" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Upvote</span></span></div><div class="qna-q-actions" data-dcnode-id="729"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="740" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="741" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="730"><div aria-label="1 up vote" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="735" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">1</span></span></div><div aria-label="0 down vote" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="731" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="664"><div class="qna-q-ans basic-trans" data-dcnode-id="667" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="714"><div class="avatar" data-dcnode-id="726"><img alt="user avatar" class="avatar-img" data-dcnode-id="727" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="715"><div class="full-name semi-bold-font" data-dcnode-id="722"><span data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="717" tabindex="-1"><span data-dcnode-id="720" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="678" data-pos="8-0" itemprop="text"><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Yes, State Farm offers a type of pay-per-mile insurance called Drive Safe &amp; Save. This is technically usage-based insurance, which is similar to pay-per-mile coverage because it factors mileage into premium calculations, but it also considers driving habits such as distracted driving.</span></p><span data-dcnode-id="711" instrument_node="">
</span><h2 class="small" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Drive Safe &amp; Save Considers:</span></h2><span data-dcnode-id="708" instrument_node="">
</span><ul data-dcnode-id="685"><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Miles driven</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Acceleration</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Braking</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Turns</span></li><span data-dcnode-id="695" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Speed</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Distracted driving</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Time of day driven</span></li><span data-dcnode-id="686" instrument_node="">
</span></ul><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">It's important to note that these factors collectively affect a customer's insurance premium, so Drive Safe &amp; Save is not strictly pay-per-mile. However, it's still a good option for safe, low-mileage drivers who don't mind being tracked for insurance purposes. For more information, check out WalletHub's guide to </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/edu/ci/usage-based-insurance/14118"><span data-dcnode-id="682" instrument_node="">usage-based insurance</span></a><span data-dcnode-id="680" instrument_node="">.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="669"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="674" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="675" itemprop="upvoteCount"><span data-dcnode-id="676" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="670" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="671" itemprop="downvoteCount"><span data-dcnode-id="672" instrument_node="">0</span></span></div></div></div></div></article><article class="qna-question-item" data-dcnode-id="573" itemprop="mainEntity" itemscope="" itemtype="http://schema.org/Question"><h3 class="qna-q-title-box bold-font" data-dcnode-id="658" itemprop="name"><a class="qna-q-title link" data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube-nocookie.com/answers/ci/geico-usage-based-insurance-2140699502/" ng-focus="" rel="noopener"><span data-dcnode-id="662" instrument_node="">Who should get Geico's Usage-Based Insurance?</span></a></h3><div class="qna-q-upvotes" data-dcnode-id="653"><div class="qna-q-upvotes-count" data-dcnode-id="656" itemprop="upvoteCount"><span data-dcnode-id="657" instrument_node="">3</span></div><span class="bold-font" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Upvotes</span></span></div><div class="qna-q-actions" data-dcnode-id="634"><div class="qna-q-reply link semi-bold-font" data-dcnode-id="645" ng-focus="" role="button" tabindex="0"><span data-dcnode-id="646" instrument_node="">Reply</span></div><div class="qna-q-thumbs" data-dcnode-id="635"><div aria-label="3 up votes" class="up vote bf-icon-upvote progress-indicator qna-qvt" data-dcnode-id="640" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">3</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="636" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">0</span></span></div></div></div><div class="qna-q-answers" data-dcnode-id="574"><div class="qna-q-ans basic-trans" data-dcnode-id="577" itemprop="acceptedAnswer" itemscope="" itemtype="http://schema.org/Answer"><div class="qna-qa-top" data-dcnode-id="619"><div class="avatar" data-dcnode-id="631"><img alt="user avatar" class="avatar-img" data-dcnode-id="632" height="40" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.wallethub.com/common/profile/images/150/WalletHub-avatar_004813302181i.jpg&amp;raw" width="40"></div><div class="qna-qa-names text-select" data-dcnode-id="620"><div class="full-name semi-bold-font" data-dcnode-id="627"><span data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">WalletHub</span></span></div><div aria-hidden="true" class="second-name" data-dcnode-id="622" tabindex="-1"><span data-dcnode-id="625" instrument_node="">@WalletHub</span></div></div></div><div class="qna-q-ans-content with-links text-select" data-dcnode-id="588" data-pos="9-0" itemprop="text"><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Usage-based insurance from Geico benefits safe drivers who drive less than the average person (roughly 12,000 miles per year), but only Geico customers in Pennsylvania and Connecticut can sign up for the program right now. More states will get access soon. All eligible drivers should consider giving it a try, though. Geico offers a discount of up to 20% simply for participating, depending on where you live.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Geico's usage-based insurance relies on a smartphone app called </span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.geico.com/driveeasy/"><span data-dcnode-id="614" instrument_node="">DriveEasy</span></a><span data-dcnode-id="612" instrument_node="">, which automatically detects your driving—you don't even have to open and close the program. DriveEasy gives feedback on your driving and scores your habits to determine your discount. Geico guarantees you'll get the full discount for participating the first term. After that, feedback from the DriveEasy app won't be used to increase your premiums, but your discount may be reduced based on your score.</span></p><span data-dcnode-id="610" instrument_node="">
</span><h3 data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Geico's DriveEasy app monitors:</span></strong></h3><span data-dcnode-id="606" instrument_node="">
</span><ul data-dcnode-id="592"><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Distracted driving</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Hard braking</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Time of day</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Distance driven</span></li><span data-dcnode-id="593" instrument_node="">
</span></ul><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Some of the habits and behaviors that DriveEasy tracks will impact your safe-driver score and discount potential more than others. Distracted driving and total distance driven are given the most weight. The app logs both handheld phone calls and active phone use, but it won't penalize you for hands-free calls or mounting your phone on the dashboard to use the GPS.</span></p></div><div class="qna-q-thumbs" data-dcnode-id="579"><div aria-label="0 up votes" class="up vote bf-icon-upvote progress-indicator" data-dcnode-id="584" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="585" itemprop="upvoteCount"><span data-dcnode-id="586" instrument_node="">0</span></span></div><div aria-label="0 down votes" class="dn vote bf-icon-downvote progress-indicator" data-dcnode-id="580" role="button" tabindex="0"><span class="vote-text" data-dcnode-id="581" itemprop="downvoteCount"><span data-dcnode-id="582" instrument_node="">0</span></span></div></div></div></div></article></div><div class="qna-q-get-more" data-dcnode-id="557"><button aria-label="View More Questions" class="btn blue-brds tall with-loader no-disabled bold-font" data-dcnode-id="564"><span class="bt-text" data-dcnode-id="566"><span class="qna-qgm-mhide" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">View </span></span><span data-dcnode-id="567" instrument_node="">More Questions</span></span><i aria-hidden="true" class="btn-loader" data-dcnode-id="565" tabindex="-1"></i></button><button aria-label="Ask Your Question" class="btn tall qna-qgm-btn-last blue-brds bold-font" data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">Ask </span><span class="qna-qgm-mhide" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Your</span></span><span data-dcnode-id="559" instrument_node=""> Question</span></button></div><modal-dialog data-dcnode-id="554" title=""></modal-dialog></section><aside
