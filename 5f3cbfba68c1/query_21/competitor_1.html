</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">In this article, we will understand about National Payments Corporation of India (NPCI) in detail.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><div data-dcnode-id="1372" id="ToC"></div><span data-dcnode-id="1371" instrument_node="">
</span><h2 data-dcnode-id="1368" id=""><span data-dcnode-id="1370" instrument_node="">What is NPCI?</span><span data-dcnode-id="1369" id="what"></span></h2><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">National Payments Corporation of India (NPCI), an initiative of the Reserve Bank of India (RBI) and Indian Banks’ Association (IBA), is an umbrella organisation for operating retail payments and settlement systems in India. NPCI has ten core promoter banks—State Bank of India, Punjab National Bank, Bank of Baroda, Canara Bank, Bank of India, HDFC Bank, Citibank, HSBC, and ICICI Bank.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><h2 data-dcnode-id="1361" id=""><span data-dcnode-id="1363" instrument_node="">How does it work?</span><span data-dcnode-id="1362" id="how"></span></h2><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The organisation functions under the provisions of the Payment and Settlement Systems Act, 2007 in order to create robust payments and settlement infrastructure for India. It is a non-profit organisation set up under the provisions of Section 25 of Companies Act, 1956 (now, Section 8 of Companies Act, 2013). NPCI aims to provide infrastructure to the whole banking industry, both physical and electronic payment and settlements system.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><h2 data-dcnode-id="1354" id=""><span data-dcnode-id="1356" instrument_node="">What does the NPCI offer?</span><span data-dcnode-id="1355" id="offer"></span></h2><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">NPCI has made its valuable contribution to the banking sector through its products from time to time. The products and their significance are listed below:</span></p><span data-dcnode-id="1350" instrument_node="">
</span><ul data-dcnode-id="1290"><li data-dcnode-id="1346"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">NFS:</span></strong><span data-dcnode-id="1347" instrument_node=""> National Financial Switch (NFS) ATM network with 37 member banks and connecting 50,000 ATMs was taken to NPCI’s authority from the Institute for Development and Research in Banking Technology (IDRBT) on 14 December 2009. After taking over, NFS ATM network has grown many folds. As on 31 July 2019, there were 1,140 members with more than 2.41 lakh ATMs connected to the network.</span></li><li data-dcnode-id="1342"><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">IMPS:</span></strong><span data-dcnode-id="1343" instrument_node=""> Immediate Payment Service (IMPS) lets you transfer money in real-time around the clock, 365 days of the year. At the time of introducing IMPS, consumers only had the NEFT and RTGS facilities that were limited to the bank working hours. NPCI conducted a pilot study of the technology with banks such as SBI, BOI, UBI, and ICICI in August 2010. It was publicly launched on 22 November 2010.</span></li><li data-dcnode-id="1338"><strong data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">AePS:</span></strong><span data-dcnode-id="1339" instrument_node=""> Aadhaar-enabled Payment Service (AePS) is a result of the attempt to further speed track financial inclusion in the country. AePS is a bank-led model that allows online interoperable financial inclusion transaction at PoS of any bank using the Aadhaar authentication through the retail merchant. A customer must provide details such as bank identification, Aadhaar number, and fingerprint to complete such a transaction.</span></li><li data-dcnode-id="1334"><strong data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">CTS:</span></strong><span data-dcnode-id="1335" instrument_node=""> Cheque Truncation System (CTS) facilitates extended cut-off time to accept customer cheques by banks and reduces timelines for clearing. CTS has also eliminated the cost involved in the paper movement. It uses the digital signature/encryption methods to prevent manipulation of data/image during transit.</span></li><li data-dcnode-id="1330"><strong data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">RuPay:</span></strong><span data-dcnode-id="1331" instrument_node=""> RuPay is a new card payment system launched to satisfy RBI’s vision to offer a domestic, open-loop, and the multilateral system. This made it easier for Indian banks and financial institutions to implement electronic payments. The term ‘RuPay’ is a combination of Rupee and Payment. NPCI also developed RuPay Contactless payments technology using open standards.</span></li><li data-dcnode-id="1326"><strong data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">NACH:</span></strong><span data-dcnode-id="1327" instrument_node=""> National Automated Clearing House (NACH) is a web-based solution that facilitates interbank, high volume electronic transactions that are repetitive in nature. They are well suited for bulk transactions towards the distribution of dividends, interest, subsidies, salary, pension, and more.</span></li><li data-dcnode-id="1322"><strong data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">APBS:</span></strong><span data-dcnode-id="1323" instrument_node=""> Aadhaar Payment Bridge (APB) System is used by the government and government agencies to make direct benefit transfers with respect to various Central and state-sponsored schemes.</span></li><li data-dcnode-id="1318"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">*99#:</span></strong><span data-dcnode-id="1319" instrument_node=""> *99# is a USSD-based mobile banking service of NPCI launched in November 2012. Then, the service had limited reach as it was available only with MTNL and BSNL networks. In August 2014, *99# was reintroduced with a wider ecosystem including 11 telephone service providers by the Prime Minister. After the launch of UPI in 2016, the *99# service aimed to take banking services to every common man in the country.</span></li><li data-dcnode-id="1314"><strong data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">UPI:</span></strong><span data-dcnode-id="1315" instrument_node=""> Unified Payments Interface (UPI) is a system that makes multiple bank accounts to be accessed from a single mobile application. Users can make instant money transfers through mobile devices round the clock, any day of the year. The technology also features peer-to-peer collect request service with a scheduling facility.</span></li><li data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Bharat BillPay:</span></strong><span data-dcnode-id="1311" instrument_node=""> Bharat BillPay is a system conceptualised by the Reserve Bank of India (RBI) and driven by NPCI. It is a one-stop-shop for all bill payments, such as mutual funds, insurance premiums, school fees, telecom, electricity, DTH, gas, water and more. It provides an interoperable and accessible service to across India. The system is reliable and safe for usage. You can also set up recurring payments on the window. A confirmation of the payment will be sent to you via SMS or receipt.</span></li><li data-dcnode-id="1306"><strong data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">NETC:</span></strong><span data-dcnode-id="1307" instrument_node=""> National Electronic Toll Collection (NETC) is a nation-wide programme designed to meet the electronic tolling requirements in India. It is an interoperable toll payment solution that includes clearing house services for settlement and dispute management. NETC uses a common set of processes that enables customers to use FASTag as a payment mode at toll plazas irrespective of who controls the toll plaza.</span></li><li data-dcnode-id="1299"><strong data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">BHIM:</span></strong><span data-dcnode-id="1303" instrument_node=""> The introduction of the concept of UPI, an app named Bharat Interface for Money (</span><a aria-label="BHIM (opens in a new tab)" data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wp.d.cleartax.co/s/bhim-upi-app/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1302" instrument_node="">BHIM</span></a><span data-dcnode-id="1300" instrument_node="">) was launched to make payments simpler and easier. Instant bank-to-bank payments can be made using a mobile number or virtual payment address (UPI ID).</span></li><li data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">BharatQR:</span></strong><span data-dcnode-id="1296" instrument_node=""> Basically, a QR code is a series of black squares arranged in a square grid that can be read by a camera. NPCI, together with the international card schemes, developed a common standard QR code specification. This led to the creation of Bharat QR (BQR), a person-to-merchant mobile payment solution. When a merchant displays a BQR code, the user can scan the code via BQR-enabled mobile banking app and make the payment using a card-linked account.</span></li><li data-dcnode-id="1291"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">BHIM Aadhaar Pay:</span></strong><span data-dcnode-id="1292" instrument_node=""> This is a payment interface through which you can make real-time payments to merchants using Aadhaar number or VPA of the customer followed by a round of authentication through biometrics. Such a transaction is limited to Rs.10,000 per transaction.</span></li></ul><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1286"></p><span data-dcnode-id="1285" instrument_node="">
