</span><article class="post post-282620 type-post status-publish format-standard has-post-thumbnail hentry category-debtloans category-home-purchasing category-real-estate-investing-investing" data-dcnode-id="1526"><span data-dcnode-id="1826" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1821"><span data-dcnode-id="1825" instrument_node="">
</span><h1 class="ribbon" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">How to Use Leverage and the Differences Between Good and Bad Debt</span></h1><span data-dcnode-id="1822" instrument_node="">
</span></header><span data-dcnode-id="1820" instrument_node="">
</span><div class="post-meta" data-dcnode-id="1795"><span data-dcnode-id="1819" instrument_node="">
</span><time data-dcnode-id="1815" datetime="2021-12-29"><span data-dcnode-id="1818" instrument_node="">December 29, 2021 </span><span data-dcnode-id="1816" title="Mountain Standard Time"><span data-dcnode-id="1817" instrument_node="">MST</span></span></time><span data-dcnode-id="1814" instrument_node="">
</span><div class="categories" data-dcnode-id="1803"><span data-dcnode-id="1813" instrument_node="">
Category: </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/category/debtloans/" rel="category tag"><span data-dcnode-id="1812" instrument_node="">Debt/Loans</span></a><span data-dcnode-id="1810" instrument_node="">, </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/category/personal-finance/home-purchasing/" rel="category tag"><span data-dcnode-id="1809" instrument_node="">Home Purchasing</span></a><span data-dcnode-id="1807" instrument_node="">, </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/category/investing/real-estate-investing-investing/" rel="category tag"><span data-dcnode-id="1806" instrument_node="">Real Estate Investing</span></a><span data-dcnode-id="1804" instrument_node=""> </span></div><span data-dcnode-id="1802" instrument_node="">
</span><div class="comments" data-dcnode-id="1797"><span data-dcnode-id="1801" instrument_node="">
</span><a data-dcnode-id="1799" href="#comments"><span data-dcnode-id="1800" instrument_node="">
18 Comments </span></a><span data-dcnode-id="1798" instrument_node="">
</span></div><span data-dcnode-id="1796" instrument_node="">
</span></div><span data-dcnode-id="1794" instrument_node="">
</span><div class="post-content" data-dcnode-id="1528"><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1786"><em data-dcnode-id="1787"><span data-dcnode-id="1788" style="color: #4a4444;"><strong data-dcnode-id="1789"><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith.png"><img alt="Daniel Smith" class="alignleft size-full wp-image-279667" data-dcnode-id="1792" height="100" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith.png&amp;raw" srcset="https://www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith.png 100w, https://www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith-24x24.png 24w, https://www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith-48x48.png 48w, https://www.whitecoatinvestor.com/wp-content/uploads/2021/08/Daniel-Smith-96x96.png 96w" width="100"></a><span data-dcnode-id="1790" instrument_node="">By Dr. Daniel Smith, WCI Columnist</span></strong></span></em></p><span data-dcnode-id="1785" instrument_node="">
</span><blockquote data-dcnode-id="1782"><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">“Give me a lever long enough and a fulcrum on which to place it, and I shall move the world.” — Archimedes</span></p></blockquote><span data-dcnode-id="1781" instrument_node="">
</span><div class="abc abc-12737 alignright" data-dcnode-id="1778"><a class="abc-link" data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/dia/l/drdisability" rel="nofollow" target="_blank"><img alt="" class="attachment-full size-full" data-dcnode-id="1780" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2016/01/500x500-WCI-3-e1612282215856.png&amp;raw" width="250"></a></div><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1776" instrument_node="">Leverage has practically become common investing parlance today. You’ve got debt detractors like Dave Ramsey who believe </span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/use-debt-to-your-advantage/" rel="noopener" target="_blank"><span data-dcnode-id="1775" instrument_node="">leverage</span></a><span data-dcnode-id="1773" instrument_node=""> is investing apostasy, the fast track to the poor house. On the other side of the conversation, you’ve got Thomas Anderson who literally wrote the book </span><a data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3EQm20f" rel="noopener" target="_blank"><span data-dcnode-id="1772" instrument_node="">The Value of Debt</span></a><span data-dcnode-id="1770" instrument_node=""> (i.e., leverage) and </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/the-value-of-debt-in-retirement-a-review/" rel="noopener" target="_blank"><span data-dcnode-id="1769" instrument_node="">who advocates up to 30% of your net worth leveraged with your “human capital” as functional collateral</span></a><span data-dcnode-id="1767" instrument_node="">. Further stoking the conversation about leverage is the historic amount of capital being pumped into our nation’s economy by politicians. With bond yields low, cash generating a negative real return, and stock prices at 20-year-high P/Es, the question of how to safely boost returns deserves a thoughtful exposition on the use of leverage.</span></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1762" instrument_node="">
</span><h2 data-dcnode-id="1759"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">What Is Leverage?</span></strong></h2><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1757" instrument_node="">Returning to your physics 101 class, leverage is the use of a tool to functionally increase force by increasing the lever arm through which force travels. In finance, leverage is the use of borrowed money or securities to finance a transaction in the hopes of producing a higher return. Examples in our sphere include borrowing for medical, dental, or law school or taking out a loan to purchase or start a practice. The downside is that borrowed money must be repaid and with a reasonable rate of interest to whoever lent you the money. If your financial plans are poorly made, then you’re </span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/how-to-think-about-debt/" rel="noopener" target="_blank"><span data-dcnode-id="1756" instrument_node="">stuck with the debt</span></a><span data-dcnode-id="1754" instrument_node=""> but without the return ostensibly meant to repay it like </span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bogleheads.org/forum/viewtopic.php%3Ft%3D11742" rel="noopener" target="_blank"><span data-dcnode-id="1753" instrument_node="">this poor fellow</span></a><span data-dcnode-id="1751" instrument_node="">.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Though some will pedantically say that no leverage is good leverage, I would argue that leverage is just a tool. When used properly, tools serve a good purpose and make us more efficient; picture trying to dig a hole without a shovel. When used improperly, tools are not useful and can cause harm; now picture using a sledgehammer to drive finishing nails into your drywall.</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1743" instrument_node="">
</span><h2 data-dcnode-id="1740"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">What Does ‘Good' Leverage Look Like?</span></strong></h2><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Good leverage generally has three qualities: the borrowed amount befits the need, the borrowed amount is non-callable, and the borrowed amount’s interest is reasonable. A good example of leverage embodying these qualities would be a mortgage for your home. The amount of the loan is usually a sizable fraction of your home’s value but not more. It’s non-callable in that no matter how badly the bank or Fannie Mae needs your monthly mortgage payment, they can’t call you and ask for the balance of the loan or for payments to be made more frequently than your mortgage specifies. The rate of interest for most mortgages in this country is fixed over the term of the loan, and it can be shopped through banks, credit unions, or mortgage brokers. There’s also the bonus of deducting the interest from a mortgage on your taxes if your itemized deductions exceed the standard deduction.</span></p><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">Clearly, there are exceptions for mortgages. You can get a “fixer-upper” loan which covers the cost of the property and renovation costs. You can also have your mortgage accelerated (which means the full amount is immediately due) if you don’t make the payments. Last, you can choose an adjustable-rate mortgage (ARM), which can vary based on fluctuating interest rates. However, on the whole, mortgages are an example of a reasonable use of leverage.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">For my own part, I recently had the opportunity to invest in a real estate deal in which the conservative estimate of cash-on-cash return was around 9% before equity pay-down. After I’d committed myself to the deal for a low five-figure amount, I soon found a significant portion of my roof had begun to leak. Not wanting to spend my emergency fund on either the deal or the roof, even though it’s arguable that the roof might have indeed constituted an “emergency,” I opted for a home equity loan. Not only is this tax-deductible as I was ostensibly using the money to pay for the roof, but it freed up cash for me to execute the real estate deal. I was, in effect, borrowing at roughly 3% (before deducting the interest on my taxes) to invest at a presumed 9% cash-on-cash return, not counting capital appreciation or equity pay-down.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1727" instrument_node="">
</span><h2 data-dcnode-id="1724"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">What Does ‘Bad' Leverage Look Like?</span></strong></h2><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1720" instrument_node="">
</span><h3 data-dcnode-id="1717"><strong data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Doesn’t Fit a Need</span></strong></h3><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">If good leverage looks like a mortgage, bad leverage looks like a credit card or margin loan on a brokerage account. Credit cards, by definition, give you access to money you wish to have access to quickly, even if you don’t have it yet. It’s a rolling line of credit at a high-interest rate. If you’re reading this blog and out of training, then a credit card is likely not a true need. Instead, it's a device of convenience. The best that can be said for a credit card is that you </span><a data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/two-unique-ways-to-make-money-with-your-credit-card/" rel="noopener" target="_blank"><span data-dcnode-id="1714" instrument_node="">can earn points</span></a><span data-dcnode-id="1712" instrument_node=""> or cash back on purchases you would otherwise make with current cash. Instead of a credit card, you can easily use a debit card for most small- or medium-sized purchases. So, credit card debt fails the first test of “good” leverage.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><div class="abc abc-270672 alignright" data-dcnode-id="1707"><a class="abc-link" data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/slr/l/splash" rel="nofollow" target="_blank"><img alt="" class="attachment-full size-full" data-dcnode-id="1709" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2021/06/WhiteCoat-Investor-Ad-%25E2%2580%2593-01.20.2022-e1642804463544.png&amp;raw" width="250"></a></div><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1703" instrument_node="">
</span><h3 data-dcnode-id="1700"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Is High Interest</span></strong></h3><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node="">Credit card interest is exorbitantly high. It’s perhaps not quite as high as a payday loan or the rate your bookie charges on the local horse races, but it’s bad enough. Nobody really arbitrages credit card debt and comes out a winner, except maybe if you have an introductory grace period of several months where you can use the money elsewhere for something like filling up a retirement account. Even then, is that few thousand bucks you manage to stuff into your </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/in-defense-of-the-401k/" rel="noopener" target="_blank"><span data-dcnode-id="1697" instrument_node="">401(k)</span></a><span data-dcnode-id="1695" instrument_node=""> as a resident really going to make a big difference over your lifetime of investing? Quick use of the future value function in Excel tells me that investing $3,000 in a retirement account which compounds at 5% real return will only net you a little less than $13,000 in 30 years. One large, unexpected expense that exceeds your emergency fund balance leaves you at the mercy of that 20+% APY interest rate on the credit card, compounded daily, until you pay it off.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1690" instrument_node="">
</span><h3 data-dcnode-id="1687"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Is Callable</span></strong></h3><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Margin loans are a spectacular way to put yourself behind in investing. Not only is there an interest rate on the loan (Interactive Brokers is the lowest rate I’ve seen at 0.75% for “qualified investors”), but the loan is callable. You make a bet that stock “RISK” is going to the moon from its current $100 price and call your broker who is only too happy to loan you $10,000 to fulfill your dreams. Your broker pockets the commission and then uses your existing portfolio of $20,000 of stock “GONE” as collateral.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">Then, </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/elonmusk/status/1340590280848908288%3Fref_src%3Dtwsrc%255Etfw" rel="noopener" target="_blank"><span data-dcnode-id="1681" instrument_node="">Elon Musk tweets</span></a><span data-dcnode-id="1679" instrument_node=""> that he’s bought the direct and only competitor to “RISK” the next day and is pumping a half-billion dollars into the firm to make it the dominant force in the market. “RISK” plunges 40%, and your castle in the sky morphs into a mud hovel. Recall that while your debt to the broker is still $10,000, your newly-acquired portion of “RISK” is only worth $6,000. Your broker politely rings you and asks whether you’d like to cover the shortfall with cash or if you'd like to liquidate your portfolio of “GONE” instead. Salt, meet wound. Your broker doesn’t care about your belief that “RISK” should rebound just fine. They're not interested in waiting on that possibility nor are they willing to cover your loan for you. With a smile, your broker calmly submits the sell order on your portfolio of “GONE.”</span></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1676" instrument_node="">Storytime again. Before I ever read The White Coat Investor, I was of the opinion that all doctors did (or should) live in opulent mansions, drive luxury cars, and dress to the nines. To that end, I decided that my first purchase out of medical school should be a BMW—a new BMW, and a lease at that. At that point, </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/best-financial-books-for-doctors/" rel="noopener" target="_blank"><span data-dcnode-id="1675" instrument_node="">I probably should have read</span></a><span data-dcnode-id="1673" instrument_node=""> </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3IIxX2I" rel="noopener" target="_blank"><span data-dcnode-id="1672" instrument_node="">The Millionaire Next Door</span></a><span data-dcnode-id="1670" instrument_node=""> before even the White Coat Investor. It was a 128i, and I remember the black-on-black color scheme, the six-speed transmission, and the sporty look with which I charitably envisioned myself while driving it.</span></p><span data-dcnode-id="1668" instrument_node="">
</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">OK, rose-tinted glasses off now. I made lease payments on a car I didn’t own with money I hadn’t yet made, and I was about to move to a state where there’s a 6.6% ad valorem tax on the “fair market value” of my new luxury vehicle . . . *ahem Georgia.* By the way, did you know that the state determines its own fair market value? Very convenient.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Anyway, at the end of my lease term, I own absolutely 0% of the car but BMW could generously sell that same car to me and “give” me a portion of those lease payments toward the car’s sale price. In reality, they’re just discounting the price of a formerly leased car and would probably sell it at that price to any Theresa, Dianne, or Henrietta.</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node="">Because I loved that car so dearly, I decided to buy it. Fun fact: in the state of Georgia, if you register a leased car in the state, you pay the ad valorem tax. If you then purchase that same car from the company, you pay that ad valorem tax </span><em data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">again</span></em><span data-dcnode-id="1658" instrument_node=""> to the Peach State for the privilege of driving the exact same car down the exact same roads.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1655" instrument_node="">But how exactly does this really relate to leverage? The first is that I didn’t have the money to buy the car, and so I effectively rented the right to use the car for the next three years, paying on a monthly installment fashion. I essentially borrowed money from BMW for the rights to use its car at a price the company set. Doesn’t leasing sound like a sound financial decision to you? The second is that this particular kind of debt came with hidden costs as most do, and you can tell I’m still particularly salty about having to pay that ad valorem tax twice. The third is that the monthly payments stretched my resident budget much thinner than it needed to be, which wouldn’t have been the case if I’d have either kept my current car or </span><a data-dcnode-id="1653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/drive-a-beater-get-rich/" rel="noopener" target="_blank"><span data-dcnode-id="1654" instrument_node="">purchased a beater</span></a><span data-dcnode-id="1652" instrument_node="">.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1647" instrument_node="">
</span><h2 data-dcnode-id="1644"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">How You’re Using Leverage Already</span></strong></h2><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Most of us already use leverage of some sort, whether out of convenience, financial torpidity, or necessity. Let’s run down a non-comprehensive list of common uses of leverage of which you may not be aware.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><img alt="using leverage" class="alignright size-full wp-image-285507" data-dcnode-id="1639" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2021/12/using-leverage-img.jpg&amp;raw" width="238"></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1636" instrument_node="">You own stocks, and many stocks are leveraged. Many publicly traded and private companies issue bonds, which is debt that they’ve guaranteed against future income so they can grow or maintain operations. The debt that these companies issue is bought by other entities for the purpose of securing that coupon or interest payment. Enron is a classic example of a company built on mountains of debt which it used to purchase companies, build gargantuan energy infrastructure, and pay huge bonuses to executives in anticipation of future earnings. </span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3pNVczQ" rel="noopener" target="_blank"><span data-dcnode-id="1635" instrument_node="">The Smartest Guys in the Room</span></a><span data-dcnode-id="1633" instrument_node="">&nbsp;by Bethany McLean is a fascinating look into the now eponymous tale of financial malfeasance if you’re looking for some continuing financial education until </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.cvent.com/event/89489395-3ca2-4c74-a5cd-e9211a7a9047/summary" rel="noopener" target="_blank"><span data-dcnode-id="1632" instrument_node="">WCICON22</span></a><span data-dcnode-id="1630" instrument_node="">.</span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">You have a mortgage. While interest rates are tantalizingly low at the time of this writing, mortgage debt is still leverage. You’re using borrowed money to finance other things in your life: groceries, vacations, furniture, daycare, utilities, that new Tesla Model Plaid, etc. If you have mortgage debt, that's perfectly fine. Just know everything you buy until then is on borrowed money. As an aside, did Elon Musk have to pay royalties to “Spaceballs” for appropriating the “</span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/VO15qTiUhLI%3Ft%3D207" rel="noopener" target="_blank"><span data-dcnode-id="1626" instrument_node="">Plaid</span></a><span data-dcnode-id="1624" instrument_node="">” moniker?</span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">You have a home equity loan or home equity line of credit (HEL or HELOC). Similar to the mortgage, this is also borrowing against your home, ostensibly for needed repairs or renovations. Similar to mortgages, you can deduct HEL/HELOC interest on your taxes as long as you’re using it to repair or remodel your home.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">You have real estate used for business. Of course, you think leverage is the main mechanism by which most individuals </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//passiveincomemd.com/how-leverage-can-multiply-your-returns-create-massive-wealth-part-1/" rel="noopener" target="_blank"><span data-dcnode-id="1617" instrument_node="">benefit from real estate</span></a><span data-dcnode-id="1615" instrument_node=""> in the first place, myself included. However, as we’ve seen with eviction moratoriums and abandoned offices during the pandemic, cash flows from real estate are not a sure thing. I’d suggest making sure you can pay the mortgage note yourself or carry large cash reserves if you’re a small-time landlord. Alternatively, look to diversify among multiple properties or occupants if you’re a landlord of more ample means.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">You own leveraged ETFs. Most leveraged ETFs use derivatives to “control” more securities than the fund could buy outright. While some funds lever safer securities-like bonds in a “risk parity” style portfolio, most funds are levering equities. Those ETFs which leverage equities outright, sometimes with a generous bond allocation as ballast, simply make a bet on the long-term direction of equities and hope they can hold on for the ride. I suppose they don’t call it a bull for nothing. These, I think, are the most interesting, because the conventional wisdom is that, over a long enough time period, equities outperform bonds. However, economist Gary Shilling (or </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//quoteinvestigator.com/2011/08/09/remain-solvent/" rel="noopener" target="_blank"><span data-dcnode-id="1611" instrument_node="">maybe it was John Maynard Keynes</span></a><span data-dcnode-id="1609" instrument_node="">?) presciently noted, “The stock market can remain irrational longer than you can remain solvent . . .” One more thought on leveraged funds. The use of leverage isn’t free. Options are paid for via a premium, and that premium is paid at purchase. That, combined with “leverage decay” (the principle that high volatility diminishes returns) and the inherent tax liabilities of very active management, makes leveraged ETFs more risky than people realize, even if you’re right.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">You have student loan debt. Regardless of the political winds, if you have student loans you owe that money to someone until it’s paid back or forgiven on your behalf. Some student loan forgiveness is even considered a taxable event, and it may still be a taxable event if it’s “forgiven” by the government. Imagine your $200,000 loans are forgiven, only for the IRS to attribute that amount to you as income. Happy April 15! Forgiveness or not, student loan debt is one of a few debts that can be shopped around for </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/student-loan-refinancing/" rel="noopener" target="_blank"><span data-dcnode-id="1605" instrument_node="">a lower rate of interest</span></a><span data-dcnode-id="1603" instrument_node="">. If it were me, I’d take the sure thing of a lower interest rate than bet that Uncle Sam looks upon my six-figure salary with financial solicitude.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">You have credit card debt, personal loans, car loans, money you owe your bookie, etc. I don’t think I need to discourse in depth about why these are 1) unnecessary for high-income professionals or 2) incredibly financially injudicious. Yeah, maybe that car note is six months interest-free, but unless you have the cash ready to hand to the dealership at the end of that six months, you’re playing a sucker’s game.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1595" instrument_node="">
</span><h2 data-dcnode-id="1592"><strong data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Judicious Uses of Leverage</span></strong></h2><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Let’s forgo for now discussions of leveraged ETFs, options, futures, and margin trading and look at a realistic leverage scenario in which most of us will find ourselves.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1587" instrument_node="">You’re 40 years old and settled into a career with a spouse and two children. Your new home, cheaply procured with today’s splendid mortgage rates, is serviced by a mortgage of $400,000. You and your spouse both work and contribute the maximum elective deferral of $19,500 each for, conveniently, $39,000 per year. You already hold a three-month emergency fund (knowing that your </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/websites-2/insurance/" rel="noopener" target="_blank"><span data-dcnode-id="1586" instrument_node="">disability insurance</span></a><span data-dcnode-id="1584" instrument_node=""> policy kicks in after 90 days). Your spouse, who happens to be an avid reader of investment literature, believes that long-term equity returns will be a nominal 7%, while your mortgage is at 3%. Using your handy future value calculator, you calculate that the 4% arbitrage (7% assumed return of equities minus the 3% you pay for use of the bank’s money via your mortgage) of $39,000 per year over 30 years should return around $2.2 million.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">The above example is an excellent use of leverage. You assume (hope?) that the market will return more than what the costs are of borrowing that amount. Odds are that you will be right. There are a few caveats, however. One admittedly small source of friction is that you’re now required to increase the amount of your emergency fund and sustain the drag on the cash that you must keep. The extra amount totals to be $4,975 (mortgage payment of $20,407.70 per year divided by 12 months multiplied by 3 months) held in cash for the next 30 years. This would only amount to ~$40,000 if invested at 7% over 30 years, but it’s worth mentioning.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><div class="abc abc-280628 alignright" data-dcnode-id="1576"><a class="abc-link" data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/crs/l/conference" rel="nofollow" target="_blank"><img alt="" class="attachment-full size-full" data-dcnode-id="1578" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitecoatinvestor.com/wp-content/uploads/2021/08/invest-in-yourself-INSTA-e1635357961322.jpg&amp;raw" width="250"></a></div><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">The bigger worry is that the market may not return what you thought it would. We’ve been the recipients of a rather superlative bull market over the last decade, and market cycles are still a real and present risk. You may be mentally kicking yourself if the next several years’ returns look meager. Worse still may be a scenario in which you have unexpected expenses above that which can be covered by your emergency fund. Sure, you can always get a 401(k) loan, a HELOC, or a hard-money loan; however, nothing to which you can get access will be without cost.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The last item to consider in this scenario is that you’re not going to immediately receive the difference between your investment and your loan. If you’re investing at 7% in a retirement account and being charged 3% interest, you’re probably not accessing those 7% returns to cover the 3%. That means you’re cash flowing the entirety of the mortgage payment while sending the retirement account contributions to whatever custodial institution is keeping them.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Let’s throw in one more wrinkle to this leverage example and say you’re financing the same home for the same amount. However, now you’re investing the $39,000 per year in a taxable brokerage. Assuming the same 7% equity returns, you’re faced with a new set of questions. Do you cash flow the mortgage while not touching the money in the brokerage account? If so, you’re still having to trim your monthly cash flow by the mortgage amount as well as pay taxes on dividends and capital gains from your investment (this is about a half-percent per year for something like VTSAX at the top marginal tax bracket). If you were to take those returns out every year to pay the mortgage, then you’d pay taxes on (most of) the returns at your marginal tax rate because non-qualified dividends and short-term capital gains are taxed as ordinary income.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">I’m going to assume that most readers of this site pay 24%-37% at their marginal federal tax bracket. Let’s say that you pay at the 32% federal level; this lowers a 7% return to an after-tax return of 4.76%. (although could be a little better if the return is solely qualified dividends and LTCGs). After your mortgage payment of 3%, you’re only netting 1.76%. Over 30 years, you’re still ahead $1.5 million, which is far from chump change, but it does require you to actually *invest* the money instead of spending it.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1560" instrument_node="">
</span><h2 data-dcnode-id="1557"><strong data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Last Words</span></strong></h2><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">This post is getting a bit long in the tooth, so let’s wrap up with a few parting thoughts:</span></p><span data-dcnode-id="1553" instrument_node="">
</span><ul data-dcnode-id="1536"><span data-dcnode-id="1552" instrument_node="">
</span><li data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Good leverage is non-callable, with a reasonable interest rate, and not more than is needed</span></li><span data-dcnode-id="1549" instrument_node="">
</span><li data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Most readers of this blog don’t need to use leverage</span></li><span data-dcnode-id="1546" instrument_node="">
</span><li data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Leverage sometimes produces greater returns but always incurs a demand upon your finances</span></li><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Judicious use of leverage can drastically increase your returns</span></li><span data-dcnode-id="1540" instrument_node="">
</span><li data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Most leverage use isn’t judicious</span></li><span data-dcnode-id="1537" instrument_node="">
</span></ul><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1532"><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Do you use leverage in your investing life? Do you think it's a good tool, or do you just try to avoid it because you're worried about being sledge-hammered? Comment below!</span></em></p><span data-dcnode-id="1531" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1530"></div><span data-dcnode-id="1529" instrument_node="">
</span></div><span data-dcnode-id="1527" instrument_node="">

</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">We bought a large multi-family apartment building in 2021. We used leverage to do so. </span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The purpose behind this was to access bonus depreciation to shelter our 2021 income from taxes. The loan is 80% LTV, 5 year balloon, at 3.25%. The property has already appreciated significantly despite the recent closing. There were some risks to this purchase, but overall the growth in our net worth due to this purchase has already been quite impressive. </span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Judicious use of leverage is the key. And defining judicious for yourself is also key. What are the risks, the potential downsides, what are the upsides, and how does it all balance out given your financial goals?</span></p><span data-dcnode-id="1354" instrument_node="">

</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">This is true but a lot of real estate investors also made out big time during the recession. Can’t just give the bad stories and ignore the good ones. People that weren’t over leveraged and were still cash flowing did very well and were buying up. If you keep good cash reserves and don’t get overleveraged for when bad times do come, people in real estate can make big gains when the economy does worse. It’s not like people all of a sudden don’t need places to live during recessions. And rent moratoriums are extremely rare and less likely to be an issue in certain states. It’s basically about being mindful of risk mitigation. Personally, I think it’s riskier to only rely on one source of income.</span></p><span data-dcnode-id="1217" instrument_node="">

</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Several years back asked my brother the actuary whether we should pay off the mortgage. His aggressive argument for refinancing and maxing the loan to invest in stocks and options (we had previously enabled him to become a qualified investor by managing some of our money) plus a growing conviction that option losses might match the gains over time (especially given time spent doing the extra tax paperwork) made me decide instead to pay off the mortgage very promptly; even incurred some capital gains. In a “when you’ve won the game quit playing” scenario we have been quite pleased as we retired and reduced our monthly income to have $2-3000 less in bills to pay each month. So we are almost unleveraged. Still though use the credit cards for a few weeks of leverage each month and a few $100 in plane travel and bag fees for the $99 annual fee.</span></p><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">

</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Excellent post, I really enjoyed it. The thread about margin calls linked in the second paragraph gave me agita. Worth reading if only to remind oneself that: if you think you are the smartest person in the whole internet you probably aren’t, and if you think you have figured out a clever new way to make money you probably haven’t. That thread reminded me of many of the posts on real estate investing forums in the past few years: “How can I get around debt-to-income limits?” “how can I borrow more if the bank says I’m maxed?”. I don’t know if or when a RE correction is coming but it’s scary to read.</span></p><span data-dcnode-id="882" instrument_node="">
