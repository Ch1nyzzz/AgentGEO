</span><article class="et_pb_post post-22684 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-basic-income-experiment tag-documentary tag-switzerland" data-dcnode-id="926" id="post-22684"><span data-dcnode-id="1024" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/10/switzerland-a-basic-income-experiment-is-on-the-verge-of-starting-in-switzerland/"><span data-dcnode-id="1023" instrument_node="">
</span><img alt="Switzerland: A basic income experiment is on the verge of starting in Switzerland" class="" data-dcnode-id="1022" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/10/repa_portrait.jpg&amp;raw" width="1080"><span data-dcnode-id="1021" instrument_node=""> </span></a><span data-dcnode-id="1019" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1016"><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/10/switzerland-a-basic-income-experiment-is-on-the-verge-of-starting-in-switzerland/"><span data-dcnode-id="1018" instrument_node="">Switzerland: A basic income experiment is on the verge of starting in Switzerland</span></a></h2><span data-dcnode-id="1015" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1004"><span data-dcnode-id="1014" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1011"><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/andre-coelho/" rel="author" title="Posts by Andre Coelho"><span data-dcnode-id="1013" instrument_node="">Andre Coelho</span></a></span><span data-dcnode-id="1010" instrument_node=""> | </span><span class="published" data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Oct 8, 2018</span></span><span data-dcnode-id="1007" instrument_node=""> | </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="1006" instrument_node="">News</span></a></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Rebecca Panian</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">&nbsp;</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">The Swiss village of Rheinau is being targeted for a basic income experiment. The idea is being promoted and produced by the </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dorftestetzukunft.ch/"><span data-dcnode-id="996" instrument_node="">Dorf Testet Zukunft</span></a><span data-dcnode-id="994" instrument_node=""> organization (Village of the Future Test). It started in 2016, through a popular initiative, and it had already been approved by more than 25% of the Reinhau population, at the time. Although Reinhau is only habited by 1300 people, 813 have already registered for the experiment. That is above what the organization needed for starting funding, which was 651 registrations.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">The basic income test itself is planned to start as early as 2019, given enough funding is secured, which starts now. The Dorf Testet Zukunft will have to raise over 5 million Swiss Francs (4,4 million Euros). The plan is for this amount to be distributed unconditionally to all registered participants, for a year. The money will be distributed according to age, such that until 18 years old children receive 550 €/month, the 18-22 years old bracket receive 1100 €/month, from 22 to 25 years old 1640 €/month and above that a 2190 €/month stipend is specified. According to the organization, income from other sources will be discounted over the basic income, up to its maximum value. However, no one will be left with less income than presently, and all people with less income than the basic income value will have more than before (during the experiment). The exact and appropriate experimental mechanism and values are in accordance with villagers and the local council, since the project is open to comment and contributions from all involved.</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&nbsp;</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="982" instrument_node="">Dorf Testet Zukunft’s team is composed by several dedicated people, headed by project initiator and filmmaker </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rebeccapanian.ch/about/"><span data-dcnode-id="981" instrument_node="">Rebecca Panian</span></a><span data-dcnode-id="979" instrument_node="">, Reto Ormos (financial expert) and Reda El Arbi (Communications), among others. There is also a scientific team dedicated to the project, including Jens Martignoni (FleXibles), Aleksandra Gnach (linguistics professor at </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zhaw.ch/en/university/"><span data-dcnode-id="978" instrument_node="">ZHAW</span></a><span data-dcnode-id="976" instrument_node="">), Theo Wehner (</span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ethz-foundation.ch/en/%3Fgclid%3DEAIaIQobChMIxaTxvtry3QIV7TLTCh2Z7gCFEAAYASAAEgJF-vD_BwE"><span data-dcnode-id="975" instrument_node="">ETH Zurich</span></a><span data-dcnode-id="973" instrument_node="">) and </span><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alanus.edu/de/hochschule/menschen/detail/sascha-liebermann/3771bfd5a2bcf43efbd94ec928ebb1fe/"><span data-dcnode-id="972" instrument_node="">Sascha Liebermann</span></a><span data-dcnode-id="970" instrument_node=""> (Alanus Hochschule). Other support come from activists like </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.grundeinkommen.ch/uber-uns/"><span data-dcnode-id="969" instrument_node="">Daniel Häni</span></a><span data-dcnode-id="967" instrument_node="">, </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/G%25C3%25B6tz_Werner"><span data-dcnode-id="966" instrument_node="">Götz Werner</span></a><span data-dcnode-id="964" instrument_node=""> and </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//enno-schmidt.ch/%231474802619856-d97920ef-c889"><span data-dcnode-id="963" instrument_node="">Enno Schmidt</span></a><span data-dcnode-id="961" instrument_node="">.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">&nbsp;</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="955" instrument_node="">Funding is planned to be done through a crowdfunding process, using </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wemakeit.com/pages/about"><span data-dcnode-id="954" instrument_node="">Wemakeit</span></a><span data-dcnode-id="952" instrument_node="">, a crowdfunding platform founded in Switzerland in 2012. Data is to be collected from recipients during its duration, with a focus on answering general questions such as “What happens to the people?” and “What happens in the community?”, and analyzed afterwards. A documentary film is also planned, directed by Rebecca Panian, which main drive is a search for an answer for “how we want to live in the future”.</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">&nbsp;</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The idea is, in a nutshell, can be condensed in the following words written in the Dorf Testet Zukunft’s website:</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">&nbsp;</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">“We want to test a possible new future as realistic as possible. This requires pioneers who dare and try it out. Best case: we can encourage people to discuss about the idea of the basic income because we are convinced that a system change must come from the people. Not prescribed from a government.”</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">&nbsp;</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">More information at:</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="931" instrument_node="">Dorf Testet Zukunft </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dorftestetzukunft.ch/en/"><span data-dcnode-id="930" instrument_node="">website</span></a></p><span data-dcnode-id="927" instrument_node="">
</span></article><span data-dcnode-id="925" instrument_node="">
</span><article class="et_pb_post post-21723 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-switzerland" data-dcnode-id="539" id="post-21723"><span data-dcnode-id="924" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/06/switzerland-filmmaker-and-village-collaborate-to-plan-basic-income-trial/"><span data-dcnode-id="923" instrument_node="">
</span><img alt="SWITZERLAND: Filmmaker and Village Collaborate to Plan “Basic Income” Trial" class="" data-dcnode-id="922" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/06/8355084032_c3d6ed7b9f_k.jpg&amp;raw" width="1080"><span data-dcnode-id="921" instrument_node=""> </span></a><span data-dcnode-id="919" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="916"><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/06/switzerland-filmmaker-and-village-collaborate-to-plan-basic-income-trial/"><span data-dcnode-id="918" instrument_node="">SWITZERLAND: Filmmaker and Village Collaborate to Plan “Basic Income” Trial</span></a></h2><span data-dcnode-id="915" instrument_node="">
</span><p class="post-meta" data-dcnode-id="904"><span data-dcnode-id="914" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="911"><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="913" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="910" instrument_node=""> | </span><span class="published" data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Jun 23, 2018</span></span><span data-dcnode-id="907" instrument_node=""> | </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="906" instrument_node="">News</span></a></p><p data-dcnode-id="901"><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">What’s the Buzz from Rheinau?</span></b></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="898" style="font-weight: 400;"><span data-dcnode-id="899" instrument_node="">Earlier in the month, headlines made such proclamations as “</span></span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.swissinfo.ch/eng/live-trial_swiss-municipality-to-offer-guaranteed-income/44170802"><span data-dcnode-id="896" style="font-weight: 400;"><span data-dcnode-id="897" instrument_node="">Swiss municipality to offer guaranteed income</span></span></a><span data-dcnode-id="893" style="font-weight: 400;"><span data-dcnode-id="894" instrument_node="">” (</span></span><i data-dcnode-id="890"><span data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="892" instrument_node="">SWI</span></span></i><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node="">), “</span></span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thestar.com/business/2018/06/07/swiss-village-considers-a-crowdfunded-basic-income-for-all-inhabitants.html"><span data-dcnode-id="886" style="font-weight: 400;"><span data-dcnode-id="887" instrument_node="">Swiss village considers a crowdfunded basic income for all inhabitants</span></span></a><span data-dcnode-id="883" style="font-weight: 400;"><span data-dcnode-id="884" instrument_node="">” (</span></span><i data-dcnode-id="880"><span data-dcnode-id="881" style="font-weight: 400;"><span data-dcnode-id="882" instrument_node="">Toronto Star</span></span></i><span data-dcnode-id="878" style="font-weight: 400;"><span data-dcnode-id="879" instrument_node="">), and “</span></span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thelocal.ch/20180606/swiss-town-set-for-universal-basic-income-experiment-rheinau"><span data-dcnode-id="876" style="font-weight: 400;"><span data-dcnode-id="877" instrument_node="">Swiss town set for universal basic income experiment</span></span></a><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node="">” (</span></span><i data-dcnode-id="870"><span data-dcnode-id="871" style="font-weight: 400;"><span data-dcnode-id="872" instrument_node="">The Local Switzerland</span></span></i><span data-dcnode-id="868" style="font-weight: 400;"><span data-dcnode-id="869" instrument_node="">), referring to Rheinau, a town of about 1300 people in the north of the country.</span></span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="864" style="font-weight: 400;"><span data-dcnode-id="865" instrument_node="">To preclude misunderstanding about what is happening in Rheinau, it should be stressed that the village is not enacting a basic income, nor is its government deliberating an implementation of the policy, nor is it running a state-sponsored trial. Moreover, to avoid possible confusion, it is specifically worth noting that this latest news from Rheinau is unrelated to previously reported discussions of basic income pilots by Swiss political bodies, such as the investigation of municipal basic income pilots initiated </span></span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/12/switzerland-zurich-city-parliament-decides-examine-basic-income-pilot-project-two-city-districts/"><span data-dcnode-id="862" style="font-weight: 400;"><span data-dcnode-id="863" instrument_node="">last year in nearby Zurich</span></span></a><span data-dcnode-id="859" style="font-weight: 400;"><span data-dcnode-id="860" instrument_node="">. &nbsp;</span></span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="855" style="font-weight: 400;"><span data-dcnode-id="856" instrument_node="">Instead, the news is this: the city council has agreed to permit an independent filmmaker </span></span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rebeccapanian.ch/about/"><span data-dcnode-id="853" style="font-weight: 400;"><span data-dcnode-id="854" instrument_node="">Rebecca Panian</span></span></a><span data-dcnode-id="850" style="font-weight: 400;"><span data-dcnode-id="851" instrument_node=""> to make the village the site of privately funded one-year trial of a program similar to basic income, involving at least half of the town’s population, which would serve as the basis for a documentary. The project’s main purpose is to provoke interest, discussion, and further research into the idea of basic income. </span></span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" style="font-weight: 400;"><span data-dcnode-id="847" instrument_node="">While the village’s council has given the green light to the documentary project, the ultimate execution of the project remains contingent on enrolling the desired number of participants and raising sufficient funds. Moreover, the design and duration of the trial remains liable to change during the course of discussion with the local council and inhabitants of Rheinau.</span></span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">&nbsp;</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="838"><b data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">The Payment Scheme: Unconditional, Subject to Repayment </span></b></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" style="font-weight: 400;"><span data-dcnode-id="836" instrument_node="">If the trial does come to fruition as currently planned, it will not, strictly speaking, test a basic income: participants in the trial over the age of 25 will be given a cash payment of 2500 Swiss francs (CHF) (about 2151 EUR) at the start of each month, with reduced amounts given to minors and young adults, irrespective of income, household status, work, or need; however, if participants receive additional income during the month, they will be expected to repay this money in part or full. </span></span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" style="font-weight: 400;"><span data-dcnode-id="832" instrument_node="">Stated otherwise, participants over age 25 will be granted 2500 CHF at the start of each month, but will be permitted to keep only as much as necessary to ensure that their total income for the month is at least 2500 CHF (with lower amounts for younger age groups). If they earn above 2500 CHF, they will repay the entire amount of the grant.</span></span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="827" style="font-weight: 400;"><span data-dcnode-id="828" instrument_node="">To many, this feature of the design might cause the project to seem not a test of basic income at all; after all, according to the Basic Income Earth Network, a basic income is by </span></span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/basic-income/"><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">definition</span></span></a><span data-dcnode-id="822" style="font-weight: 400;"><span data-dcnode-id="823" instrument_node=""> delivered without means test. For the project’s initiators, however, the repayment requirement is a way to attempt to more accurately simulate what a basic income would feel like if actually implemented in Switzerland, where many individuals, earning high salaries, would presumably “repay” any amount paid out as a basic income in personal income taxes. “[It] is important to us not to spread the illusion that an unconditional basic income simply means more money in your pocket,” Panian tell </span></span><i data-dcnode-id="819"><span data-dcnode-id="820" style="font-weight: 400;"><span data-dcnode-id="821" instrument_node="">Basic Income News</span></span></i><span data-dcnode-id="817" style="font-weight: 400;"><span data-dcnode-id="818" instrument_node="">, “It just means that the basic income is unconditional. &nbsp;Everybody gets it so nobody needs to fear angst (existenzangst) again.”</span></span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="814" instrument_node="">Since the cash allowance is paid upfront, the plan is distinct from a negative income tax or top-up scheme in which individuals are “reimbursed” if there earned income falls below a certain threshold. One might say it loosely resembles a basic income accompanied by an increase in individual income tax.</span></span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" style="font-weight: 400;"><span data-dcnode-id="810" instrument_node="">That being said, this provisional design has not been set in stone, and documentary team will consult with residents of Rheinau later in the year to produce a finalized design. </span></span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">&nbsp;</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="801"><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Motivation: “Too Many Questions Unanswered” </span></b></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="798" style="font-weight: 400;"><span data-dcnode-id="799" instrument_node="">Like many in both Switzerland and abroad, Panian first heard about basic income when a referendum to enact the policy was </span></span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/06/switzerlands-basic-income-referendum-a-retrospective/"><span data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" instrument_node="">put on the ballot in the 2016 Swiss general elections</span></span></a><span data-dcnode-id="793" style="font-weight: 400;"><span data-dcnode-id="794" instrument_node="">. Although the referendum left open the amount of the basic income — it stated only, “Legislation will determine the funding for the system and the actual amount of the basic income” — a monthly payment of 2500 CHF was often discussed during the campaign. </span></span></p><span data-dcnode-id="791" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="787" id="attachment_21735" style="width: 426px"><img alt="" aria-describedby="caption-attachment-21735" class="wp-image-21735" data-dcnode-id="790" height="278" loading="lazy" sizes="(max-width: 416px) 100vw, 416px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/06/27446748011_87ff568c2b_z-420x281.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2018/06/27446748011_87ff568c2b_z-420x281.jpg 420w, https://basicincome.org/wp-content/uploads/2018/06/27446748011_87ff568c2b_z-272x182.jpg 272w, https://basicincome.org/wp-content/uploads/2018/06/27446748011_87ff568c2b_z.jpg 640w" width="416"><p class="wp-caption-text" data-dcnode-id="788" id="caption-attachment-21735"><span data-dcnode-id="789" instrument_node="">Celebrating 23% Yes referendum vote, CC BY 2.0 Generation Grundeinkommen</span></p></div><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" instrument_node="">Panian was intrigued by the idea as a possible solution for challenges posed by the future of work. In her view, a society based on the goal of full employment is unsustainable in the face of accelerating automation, and attempting to maintain such a system will result in “mass unemployment and lots of people with no money, no support, and no perspective.” </span></span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="780" style="font-weight: 400;"><span data-dcnode-id="781" instrument_node="">At the same time, she was not surprised that the referendum failed at the ballot box, telling </span></span><i data-dcnode-id="777"><span data-dcnode-id="778" style="font-weight: 400;"><span data-dcnode-id="779" instrument_node="">Basic Income News</span></span></i><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">, “there were too many questions unanswered, and in the mind of many people this idea remained a crazy, non-realistic vision.”</span></span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node="">Panian herself does not express certainty that basic income is the new system needed by Switzerland and other nations facing the threat of automation, but she believes that “we better test it as well as we can before we throw it in the bin and do nothing.”</span></span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="767" style="font-weight: 400;"><span data-dcnode-id="768" instrument_node="">This goal — opening people to the idea of basic income as a serious proposal — provided the motivation that would ultimately lead the filmmaker to Rheinau: </span></span><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node="">“I figured out that in order to become more open to the idea, people need more time, and they need to ‘see’ it happening. That’s how I came up with the idea to start a test it in a village. … Everybody who watches the experiment going on in a village can sympathize with the villagers and with that get more connected with the idea.” </span></span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&nbsp;</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="757"><b data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The Village: A “Mini-Switzerland”</span></b></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="754" style="font-weight: 400;"><span data-dcnode-id="755" instrument_node="">Other privately financed and administered “basic income” projects, including Germany’s lottery-style </span></span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mein-grundeinkommen.de/"><i data-dcnode-id="751"><span data-dcnode-id="752" style="font-weight: 400;"><span data-dcnode-id="753" instrument_node="">Mein Grundeinkommen</span></span></i></a><span data-dcnode-id="749" instrument_node=""> </span><span data-dcnode-id="747" style="font-weight: 400;"><span data-dcnode-id="748" instrument_node="">and the in-progress US documentary </span></span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bootstrapsfilm.com/"><i data-dcnode-id="744"><span data-dcnode-id="745" style="font-weight: 400;"><span data-dcnode-id="746" instrument_node="">Bootstraps</span></span></i></a><span data-dcnode-id="741" style="font-weight: 400;"><span data-dcnode-id="742" instrument_node="">, have focused on individual-level effects of unconditional monthly cash grants. </span></span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="737" style="font-weight: 400;"><span data-dcnode-id="738" instrument_node="">Like the directors of </span></span><i data-dcnode-id="734"><span data-dcnode-id="735" style="font-weight: 400;"><span data-dcnode-id="736" instrument_node="">Bootstraps</span></span></i><span data-dcnode-id="732" style="font-weight: 400;"><span data-dcnode-id="733" instrument_node="">, Panian hopes to document the lives of individual participants in the Rheinau project. But Panian is also interested in the community-level impact of a basic income, and for this reason decided to situation her study in small village in which the majority of residents would be able to take part. </span></span></p><span data-dcnode-id="730" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="726" id="attachment_21729" style="width: 430px"><img alt="" aria-describedby="caption-attachment-21729" class="size-medium wp-image-21729" data-dcnode-id="729" height="279" loading="lazy" sizes="(max-width: 420px) 100vw, 420px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/06/640px-2010-05-14_15-46-33_Switzerland_Zurich_Alt-Rheinau-420x279.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2018/06/640px-2010-05-14_15-46-33_Switzerland_Zurich_Alt-Rheinau-420x279.jpg 420w, https://basicincome.org/wp-content/uploads/2018/06/640px-2010-05-14_15-46-33_Switzerland_Zurich_Alt-Rheinau-272x182.jpg 272w, https://basicincome.org/wp-content/uploads/2018/06/640px-2010-05-14_15-46-33_Switzerland_Zurich_Alt-Rheinau.jpg 640w" width="420"><p class="wp-caption-text" data-dcnode-id="727" id="caption-attachment-21729"><span data-dcnode-id="728" instrument_node="">Rheinau Abbey, CC BY SA 3.0 Hansueli Krapf</span></p></div><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">Panian first announced her plans in January of this year, putting forth a call for Swiss municipalities to serve as the site of the documentary. In some cases, city councils placed bids to be the site of the basic income test. In others, individual residents wrote to Panian to nominate their own communities. </span></span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="719" style="font-weight: 400;"><span data-dcnode-id="720" instrument_node="">Panian ultimately selected Rheinau out of more than 100 applicants, in part on the basis that its demographic structure reflects Switzerland as whole. As she describes it to </span></span><i data-dcnode-id="716"><span data-dcnode-id="717" style="font-weight: 400;"><span data-dcnode-id="718" instrument_node="">Basic Income News</span></span></i><span data-dcnode-id="714" style="font-weight: 400;"><span data-dcnode-id="715" instrument_node="">, the community is “small but like a mini-country.”</span></span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="710" style="font-weight: 400;"><span data-dcnode-id="711" instrument_node="">According to Panian, Rheinau was also a favorite due “fantastic communication with the local council” and the council’s “real interest in the experiment.” </span></span><i data-dcnode-id="707"><span data-dcnode-id="708" style="font-weight: 400;"><span data-dcnode-id="709" instrument_node="">Neue Zürcher Zeitung</span></span></i><span data-dcnode-id="706" instrument_node=""> </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nzz.ch/zuerich/grundeinkommen-soll-in-zuercher-gemeinde-rheinau-getestet-werden-ld.1391466"><span data-dcnode-id="704" style="font-weight: 400;"><span data-dcnode-id="705" instrument_node="">reports</span></span></a><span data-dcnode-id="701" style="font-weight: 400;"><span data-dcnode-id="702" instrument_node=""> that the village rejected the country’s basic income referendum with 72% no vote in July 2016, but that its mayor and councilors have been receptive to involving the community in a small-scale test of a similar program. In a statement quoted on the </span></span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dorf-testet-zukunft.ch/page1.html"><span data-dcnode-id="699" style="font-weight: 400;"><span data-dcnode-id="700" instrument_node="">official website</span></span></a><span data-dcnode-id="696" style="font-weight: 400;"><span data-dcnode-id="697" instrument_node=""> of the planned documentary, the council declares that basic income “deserves to be tested” and “encourage[s] the population to participate” in the trial and film project.</span></span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">&nbsp;</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="688"><b data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">The Research Team</span></b></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="685" style="font-weight: 400;"><span data-dcnode-id="686" instrument_node="">In addition to Panian, a team of social scientists — including an economist (</span></span><a data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zhaw.ch/en/about-us/person/gnaa/"><span data-dcnode-id="683" style="font-weight: 400;"><span data-dcnode-id="684" instrument_node="">Jens Martignoni</span></span></a><span data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" instrument_node="">), organizational psychologist (</span></span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ethz.ch/de/die-eth-zuerich/organisation/who-is-who/emeritierte-professorinnen-und-professoren/details.html%3Fpersid%3D79532"><span data-dcnode-id="678" style="font-weight: 400;"><span data-dcnode-id="679" instrument_node="">Theo Wehner</span></span></a><span data-dcnode-id="675" style="font-weight: 400;"><span data-dcnode-id="676" instrument_node="">), linguist (</span></span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zhaw.ch/en/about-us/person/gnaa/"><span data-dcnode-id="673" style="font-weight: 400;"><span data-dcnode-id="674" instrument_node="">Aleksandra Gnach</span></span></a><span data-dcnode-id="670" style="font-weight: 400;"><span data-dcnode-id="671" instrument_node="">), and sociologist (</span></span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alanus.edu/de/hochschule/menschen/detail/sascha-liebermann/3771bfd5a2bcf43efbd94ec928ebb1fe/"><span data-dcnode-id="668" style="font-weight: 400;"><span data-dcnode-id="669" instrument_node="">Sascha Liebermann</span></span></a><span data-dcnode-id="665" style="font-weight: 400;"><span data-dcnode-id="666" instrument_node="">) — is fronting the basic income project in Rheinau. </span></span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="661" style="font-weight: 400;"><span data-dcnode-id="662" instrument_node="">The four scientists are currently designing a study about of the effects of the program on the community. However, as Martignoni stressed in correspondence with </span></span><i data-dcnode-id="658"><span data-dcnode-id="659" style="font-weight: 400;"><span data-dcnode-id="660" instrument_node="">Basic Income News</span></span></i><span data-dcnode-id="656" style="font-weight: 400;"><span data-dcnode-id="657" instrument_node="">, the research project is in an early stage of development, and it is too early to tell what can be learned from the trial. &nbsp;</span></span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="652" style="font-weight: 400;"><span data-dcnode-id="653" instrument_node="">In addition to assessing the effects of the program on the well-being of participants and the community, the researchers hope to examine its effects on their opinions on basic income itself. &nbsp;Liebermann tells </span></span><i data-dcnode-id="649"><span data-dcnode-id="650" style="font-weight: 400;"><span data-dcnode-id="651" instrument_node="">Basic Income News</span></span></i><span data-dcnode-id="647" style="font-weight: 400;"><span data-dcnode-id="648" instrument_node="">, “I am curious to find out how the people in Rheinau think about the basic income and how their thinking about it might change during the trial and in what direction,” which he plans to investigate through in-depth interviews. </span></span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" style="font-weight: 400;"><span data-dcnode-id="644" instrument_node="">Like Panian, both Martignoni and Liebermann emphasize that cooperation with the local community is an important aspect of the Rheinau experiment, in contrast to other past and ongoing trials of basic income and negative income tax, with the people of Rheinau to themselves be included in the development of a final model. The researchers also emphasize that the Rheinau project is unique in that its goal is not to fight unemployment or poverty.</span></span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">&nbsp;</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635"><b data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Basic Income in a “Rich Country”</span></b></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="632" style="font-weight: 400;"><span data-dcnode-id="633" instrument_node="">In regions where governments are </span></span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/10/overview-of-current-basic-income-related-experiments-october-2017/"><span data-dcnode-id="630" style="font-weight: 400;"><span data-dcnode-id="631" instrument_node="">currently sponsoring or overseeing trials</span></span></a><span data-dcnode-id="627" style="font-weight: 400;"><span data-dcnode-id="628" instrument_node=""> of basic income or other income guarantees — including Finland, the Netherlands, Ontario, Barcelona, and Stockton — the main objective is to address unemployment or poverty.</span></span></p><span data-dcnode-id="625" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="621" id="attachment_21731" style="width: 448px"><img alt="" aria-describedby="caption-attachment-21731" class="wp-image-21731" data-dcnode-id="624" height="292" loading="lazy" sizes="(max-width: 438px) 100vw, 438px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/06/10092172586_6e8cb3d349_z-420x280.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2018/06/10092172586_6e8cb3d349_z-420x280.jpg 420w, https://basicincome.org/wp-content/uploads/2018/06/10092172586_6e8cb3d349_z-272x182.jpg 272w, https://basicincome.org/wp-content/uploads/2018/06/10092172586_6e8cb3d349_z.jpg 640w" width="438"><p class="wp-caption-text" data-dcnode-id="622" id="caption-attachment-21731"><span data-dcnode-id="623" instrument_node="">Generation Grundeinkommen demonstration, CC BY-NC 2.0</span></p></div><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="618" style="font-weight: 400;"><span data-dcnode-id="619" instrument_node="">While Switzerland is </span></span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thelocal.ch/20170516/report-half-a-million-live-in-poverty-in-switzerland"><span data-dcnode-id="616" style="font-weight: 400;"><span data-dcnode-id="617" instrument_node="">not without poverty</span></span></a><span data-dcnode-id="613" style="font-weight: 400;"><span data-dcnode-id="614" instrument_node="">, it is known as a relatively wealthy nation. The median salary was </span></span><a data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lenews.ch/2015/11/30/median-swiss-salary-up-and-well-ahead-of-the-us-and-uk/"><span data-dcnode-id="611" style="font-weight: 400;"><span data-dcnode-id="612" instrument_node="">reported in 2015</span></span></a><span data-dcnode-id="608" style="font-weight: 400;"><span data-dcnode-id="609" instrument_node=""> as 6189 CHF per month, and the average household income was </span></span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thelocal.ch/20171122/study-swiss-households-have-7000-francs-in-disposable-income"><span data-dcnode-id="606" style="font-weight: 400;"><span data-dcnode-id="607" instrument_node="">reported in 2017</span></span></a><span data-dcnode-id="603" style="font-weight: 400;"><span data-dcnode-id="604" instrument_node=""> at 6957 CHF per month. According to the </span></span><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bfs.admin.ch/bfs/en/home/statistics/economic-social-situation-population/economic-and-social-situation-of-the-population/inqualities-income-ditribution/income-distribution.html"><span data-dcnode-id="601" style="font-weight: 400;"><span data-dcnode-id="602" instrument_node="">Federal Statistical Office</span></span></a><span data-dcnode-id="598" style="font-weight: 400;"><span data-dcnode-id="599" instrument_node="">, only 10% of people living in Switzerland have a monthly disposable income below 2243 CHF — suggesting that relatively few might stand to benefit from a monthly 2500 CHF grant subject to repayment. </span></span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="594" style="font-weight: 400;"><span data-dcnode-id="595" instrument_node="">Panian herself believes that, for this reason, a Swiss experiment would have the potential shed a fresh perspective on the basic income debate, “Switzerland is famous as a ‘rich’ country. If we test it, we don’t do it primarily to fight unemployment or poverty.” Martignoni also points out that the trial planned in Rheinau would be unique among basic income experiments as one that is “not restricted to a poor part of the population but to </span></span><i data-dcnode-id="591"><span data-dcnode-id="592" style="font-weight: 400;"><span data-dcnode-id="593" instrument_node="">all</span></span></i><span data-dcnode-id="589" style="font-weight: 400;"><span data-dcnode-id="590" instrument_node=""> in a developed (‘rich’) country.”</span></span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" style="font-weight: 400;"><span data-dcnode-id="586" instrument_node="">That said, if the filmmaker believes that main reason to implement basic income in rich nation like Switzerland would be as a sort of insurance against future automation and digitization, then one might wonder what impact she hopes or expects to observe during a one-year trial in 2019. Indeed, if it most Swiss workers are already earning well above 2500 CHF per month, one might wonder if the trial will have any effect on participants (except, perhaps, the minor inconvenience of the required monthly repayments). Asked about this concern, Panian noted that, while very few Swiss men have monthly salaries below 2500 CHF, a significant proportion of women still lack their own income. Since the benefit will be paid on individual rather than household basis, women without a personal income will be able to keep the entire monthly payment. Thus, Panian predicts that families with children and stay-at-home mothers will be prime beneficiaries. </span></span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" style="font-weight: 400;"><span data-dcnode-id="582" instrument_node="">She adds, however, that individual monetary benefits are not, in her view, the only “benefit” of basic income: “I talked to many people, and it became obvious that most of them only think about how they could or would not profit on a monetary basis from the basic income. What they seem to forget is that if you live in a society where people don’t have to fear for their basic needs, they might get more content, and this will have a positive effect on the whole community.”</span></span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" style="font-weight: 400;"><span data-dcnode-id="578" instrument_node="">In any case, the discussion of potential benefits to Rheinau itself should not obscure the fact that, for the team behind the trial, the major goal is not to produce measurable results but to reinvigorate discussion of basic income in Switzerland and beyond. According to Panian, the best case scenario is one which the project “inspires others to organize more experiments on their own in their communities and motivates people to think about what future they want.”</span></span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="573" style="font-weight: 400;"><span data-dcnode-id="574" instrument_node="">Enno Schmidt, the filmmaker behind an </span></span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Basic_Income"><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">earlier basic income documentary</span></span></a><span data-dcnode-id="568" style="font-weight: 400;"><span data-dcnode-id="569" instrument_node=""> and cofounder of the referendum campaign, agrees that the greatest promise of the project is to catalyze further discussion: “it is one first fresh new activity after the referendum; it keeps the topic in Switzerland a little awake. It encourages other communities to think about whether or not they will also introduce a basic income on a trial basis.”</span></span></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">&nbsp;</span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="561" style="font-weight: 400;"><span data-dcnode-id="562" instrument_node="">For more information and updates on the Rheinau basic income project, see&nbsp;</span></span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dorf-testet-zukunft.ch/page1.html"><span data-dcnode-id="559" style="font-weight: 400;"><span data-dcnode-id="560" instrument_node="">https://www.dorf-testet-zukunft.ch/page1.html</span></span></a><span data-dcnode-id="557" instrument_node="">.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">&nbsp;</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">* * *</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" style="font-weight: 400;"><span data-dcnode-id="548" instrument_node="">Article reviewed by Patrick Hoare.</span></span></p><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="544" instrument_node="">Cover image:&nbsp;Rheinau, CC BY-NC 2.0&nbsp;</span><a class="owner-name truncate" data-dcnode-id="542" data-rapid_p="49" data-track="attributionNameClick" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/wisigreter/" title="Go to Wisi Greter's photostream"><span data-dcnode-id="543" instrument_node="">Wisi Greter</span></a></p><span data-dcnode-id="540" instrument_node="">
</span></article><span data-dcnode-id="538" instrument_node="">

</span><a class="entry-featured-image-url" data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/01/switzerland-chief-investment-officer-credit-suisse-argues-favour-unconditional-basic-income/"><span data-dcnode-id="536" instrument_node="">
</span><img alt="SWITZERLAND: Chief Investment Officer of Credit Suisse argues in favour of an Unconditional Basic Income" class="" data-dcnode-id="535" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2018/01/Michael-Strobaek.jpg&amp;raw" width="1080"><span data-dcnode-id="534" instrument_node=""> </span></a><span data-dcnode-id="532" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="529"><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/01/switzerland-chief-investment-officer-credit-suisse-argues-favour-unconditional-basic-income/"><span data-dcnode-id="531" instrument_node="">SWITZERLAND: Chief Investment Officer of Credit Suisse argues in favour of an Unconditional Basic Income</span></a></h2><span data-dcnode-id="528" instrument_node="">
</span><p class="post-meta" data-dcnode-id="517"><span data-dcnode-id="527" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="524"><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/albert/" rel="author" title="Posts by Albert Joerimann"><span data-dcnode-id="526" instrument_node="">Albert Joerimann</span></a></span><span data-dcnode-id="523" instrument_node=""> | </span><span class="published" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Jan 4, 2018</span></span><span data-dcnode-id="520" instrument_node=""> | </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="519" instrument_node="">News</span></a></p><p data-dcnode-id="501"><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/research/stocks/people/person.asp%3FpersonId%3D33377840%26privcapId%3D405739"><span data-dcnode-id="516" instrument_node="">Michael Strobaek</span></a><span data-dcnode-id="514" instrument_node="">, Global Chief Investment Officer (CIO) of Switzerland’s second largest bank </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.credit-suisse.com/ch/en/articles/private-banking/cio-michael-strobaek-ich-investiere-langfristig-und-diversifiziert-201703.html"><span data-dcnode-id="513" instrument_node="">Credit Suisse</span></a><span data-dcnode-id="511" instrument_node=""> (CS), is interviewed in the December 2017 </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publications.credit-suisse.com/tasks/render/file/index.cfm%3Ffileid%3DDFF1C5F9-9C97-88B7-C78AE2C5C6F490F6"><span data-dcnode-id="510" instrument_node="">issue</span></a><span data-dcnode-id="508" instrument_node=""> of CS’s “Bulletin“, dedicated to questions around aging. According to Strobaek, it will be crucial to secure the livelihood of the millions of people who will be unemployed through technological development, automation and robotization, and that this has to be done through some sort of unconditional basic income (UBI). Although Strobaek has not provided any specifics about UBI, he is clear that it is required by future unemployment. This future unemployment, however has not been proven as a fact. Despite often cited </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxfordmartin.ox.ac.uk/downloads/academic/The_Future_of_Employment.pdf"><span data-dcnode-id="507" instrument_node="">reports</span></a><span data-dcnode-id="505" instrument_node="">, there is still no proven link between automation and net job loss, since these reports focus on job destruction, not job creation. For an alternative view, that finds that new technology will create new jobs as well as destroying old ones, see Ursula Huws’&nbsp;</span><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ursulahuws.wordpress.com/2017/01/29/the-future-of-work/"><span data-dcnode-id="504" instrument_node="">article</span></a><span data-dcnode-id="502" instrument_node="">.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">&nbsp;</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">Asked who would be supposed to pay for the UBI, Strobaek answers: “The taxpayer. But the question then becomes just what is being taxed? Bill Gates proposed a </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/02/bill-gates-wrong-dont-tax-robots/"><span data-dcnode-id="495" instrument_node="">robot tax</span></a><span data-dcnode-id="493" instrument_node=""> to replace the income tax and social security contributions that will be lost through automation. As a society, we still need to find answers to this question.” But according to Strobaek the main challenge relates to future possibilities for human activities when there is very little paid work left. He suggests that “the structures of the world of work will need to be replaced by individual and self-selected structures. Intrinsic motivations will replace extrinsic ones. (…) When people have material security, then they will be able to become involved in the care of older people or of children”. This, however, seems to be in conflict with a deep job-centered logic that he defends throughout the interview, alongside a defence of large families, fearing for population and social security system decline.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">&nbsp;</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Although Strobaek’s interview supports UBI, there is no information indicating whether this is the view of the CS board of directors, or of CS in general. Big banks do not usually publicize particular positions or make their own proposals, except about taxation and regulation within their own framework or on behalf of their clients, since they are doing business with a wide variety of clients, who support all political orientations. There is also no evidence in the interview of an alternative view to Strobaek’s support for UBI. This is consistent with the fact that large financial institutions are generally not criticized in any way in Switzerland, except at times by the political Left.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">&nbsp;</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">&nbsp;</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">More information at:</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">“</span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publications.credit-suisse.com/tasks/render/file/index.cfm%3Ffileid%3DDFF1C5F9-9C97-88B7-C78AE2C5C6F490F6"><span data-dcnode-id="474" instrument_node="">The New Old Age</span></a><span data-dcnode-id="472" instrument_node="">“, Credit Suisse Bulletin 4th Trimester 2017</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">Ursula Huws, “</span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ursulahuws.wordpress.com/2017/01/29/the-future-of-work/"><span data-dcnode-id="468" instrument_node="">The future of work</span></a><span data-dcnode-id="466" instrument_node="">“, personal blog, January 29th 2017</span></p><span data-dcnode-id="464" instrument_node="">

</span><article class="et_pb_post post-18265 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-south-africa tag-switzerland" data-dcnode-id="340" id="post-18265"><span data-dcnode-id="455" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/06/18265/"><span data-dcnode-id="454" instrument_node="">
</span><img alt="South African businessman Johann Rupert calls for basic income" class="" data-dcnode-id="453" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/06/13053625433_4a29841329_z.jpg&amp;raw" width="1080"><span data-dcnode-id="452" instrument_node=""> </span></a><span data-dcnode-id="450" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="447"><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/06/18265/"><span data-dcnode-id="449" instrument_node="">South African businessman Johann Rupert calls for basic income</span></a></h2><span data-dcnode-id="446" instrument_node="">
</span><p class="post-meta" data-dcnode-id="435"><span data-dcnode-id="445" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="442"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="444" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="441" instrument_node=""> | </span><span class="published" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Jun 16, 2017</span></span><span data-dcnode-id="438" instrument_node=""> | </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="437" instrument_node="">News</span></a></p><p data-dcnode-id="422"><b data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Billionaire businessman Johann Rupert, chairman of Swiss luxury goods company </span></b><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.richemont.com/"><b data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Richemont</span></b></a><b data-dcnode-id="428"><span data-dcnode-id="429" instrument_node=""> and South African investment holding company </span></b><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.remgro.com/"><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Remgro Limited</span></b></a><b data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">, has recently been speaking in favor of basic income.</span></b></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="419" style="font-weight: 400;"><span data-dcnode-id="420" instrument_node="">In March, Rupert spoke to the Swiss economic newspaper </span></span><i data-dcnode-id="416"><span data-dcnode-id="417" style="font-weight: 400;"><span data-dcnode-id="418" instrument_node="">Finanz und Wirtschaft </span></span></i><span data-dcnode-id="414" style="font-weight: 400;"><span data-dcnode-id="415" instrument_node="">about the state of the Swiss watch industry. While the interview mainly focused on this specific industry and Rupert’s company Richemont, it eventually turned to some more general questions. </span></span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="410" style="font-weight: 400;"><span data-dcnode-id="411" instrument_node="">Asked about his biggest worries for the future of the economy, Rupert mentioned growing inequality and threat of job losses due to automation; in his view, such social and economic changes would intensify political extremism and hatred in society. &nbsp;</span></span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">When then questioned about potential solutions, Rupert brought up basic income, stating, “In order to mitigate the job losses through automation, we will have to talk about forms of unconditional basic income [German: Formen eines bedingungs­losen Grundeinkommens].”</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="403" style="font-weight: 400;"><span data-dcnode-id="404" instrument_node="">In May, </span></span><i data-dcnode-id="400"><span data-dcnode-id="401" style="font-weight: 400;"><span data-dcnode-id="402" instrument_node="">Financial Times </span></span></i><span data-dcnode-id="398" style="font-weight: 400;"><span data-dcnode-id="399" instrument_node="">reported that Rupert had told journalists, “I’m a proponent of universal basic income. We have to give time to people to re-skill themselves for a new economy.”</span></span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="394" style="font-weight: 400;"><span data-dcnode-id="395" instrument_node="">According </span></span><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/africa-billionaires/list/"><span data-dcnode-id="392" style="font-weight: 400;"><span data-dcnode-id="393" instrument_node="">to Forbes</span></span></a><span data-dcnode-id="389" style="font-weight: 400;"><span data-dcnode-id="390" instrument_node="">, Rupert is Africa’s fourth richest person.</span></span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">&nbsp;</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="381"><b data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">References </span></b></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="378" style="font-weight: 400;"><span data-dcnode-id="379" instrument_node="">Mark Dittli and Pascal Meisser, “</span></span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fuw.ch/article/die-lage-in-china-hat-sich-normalisiert-2/"><span data-dcnode-id="376" style="font-weight: 400;"><span data-dcnode-id="377" instrument_node="">Die Lage in China hat sich normalisiert</span></span></a><span data-dcnode-id="373" style="font-weight: 400;"><span data-dcnode-id="374" instrument_node="">,” </span></span><i data-dcnode-id="370"><span data-dcnode-id="371" style="font-weight: 400;"><span data-dcnode-id="372" instrument_node="">Finanz und Wirtschaft</span></span></i><span data-dcnode-id="368" style="font-weight: 400;"><span data-dcnode-id="369" instrument_node="">, March 24, 2017. (In German)</span></span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="364" style="font-weight: 400;"><span data-dcnode-id="365" instrument_node="">Ralph Atkins, “</span></span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/90af2da4-36ec-11e7-99bd-13beb0903fa3"><span data-dcnode-id="362" style="font-weight: 400;"><span data-dcnode-id="363" instrument_node="">Richemont founder backs universal basic income</span></span></a><span data-dcnode-id="359" style="font-weight: 400;"><span data-dcnode-id="360" instrument_node="">,” </span></span><i data-dcnode-id="356"><span data-dcnode-id="357" style="font-weight: 400;"><span data-dcnode-id="358" instrument_node="">Financial Times</span></span></i><span data-dcnode-id="354" style="font-weight: 400;"><span data-dcnode-id="355" instrument_node="">, May 12, 2017.</span></span></p><span data-dcnode-id="352" instrument_node="">

</span><a class="entry-featured-image-url" data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/03/new-book-financing-basic-income-addressing-cost-objection/"><span data-dcnode-id="337" instrument_node="">
</span><img alt="NEW BOOK – Financing Basic Income: Addressing the Cost Objection" class="" data-dcnode-id="336" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/03/6748965761_110d18f752_z.jpg&amp;raw" width="1080"><span data-dcnode-id="335" instrument_node=""> </span></a><span data-dcnode-id="333" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="330"><a data-dcnode-id="331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/03/new-book-financing-basic-income-addressing-cost-objection/"><span data-dcnode-id="332" instrument_node="">NEW BOOK – Financing Basic Income: Addressing the Cost Objection</span></a></h2><span data-dcnode-id="329" instrument_node="">
</span><p class="post-meta" data-dcnode-id="318"><span data-dcnode-id="328" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="325"><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="327" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="324" instrument_node=""> | </span><span class="published" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Mar 28, 2017</span></span><span data-dcnode-id="321" instrument_node=""> | </span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="320" instrument_node="">News</span></a></p><p data-dcnode-id="306"><a data-dcnode-id="312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.springer.com/us/book/9783319542676"><i data-dcnode-id="313"><span data-dcnode-id="314" style="font-weight: 400;"><img alt="" class="size-full wp-image-16973 alignright" data-dcnode-id="317" height="217" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/03/9783319542676.jpg&amp;raw" width="153"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Financing Basic Income: Addressing the Cost Objection</span></strong></span></i></a><strong data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">, edited by Richard Pereira (University of Birmingham, UK), is the latest addition to the Palgrave Macmillan series </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.springer.com/series/14981%3FdetailsPage%3Dtitles"><span data-dcnode-id="310" instrument_node="">Exploring the Basic Income Guarantee</span></a><span data-dcnode-id="308" instrument_node="">. </span></strong></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" style="font-weight: 400;"><span data-dcnode-id="304" instrument_node="">Contributors include Pereira, Albert Jörimann (Basic Income Earth Network, Switzerland) and Gary Flomenhoft (University of Vermont, USA; University of Queensland, Australia).</span></span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">&nbsp;</span></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" style="font-weight: 400;"><strong data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Publisher’s summary</span></strong></span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">This Palgrave Pivot argues that basic income at a decent level is, in fact, affordable. The contributors approach the topic from the perspectives of three different countries—Canada, Switzerland, and Australia—to overcome objections that a universal program to keep all citizens above the poverty line would be too expensive to implement. They assess the complex array of revenue sources that can make universal basic income feasible, from the underestimated value of public program redundancies to new and so far unaccounted publicly owned assets.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">&nbsp;</span></p><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" style="font-weight: 400;"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Contents</span></strong></span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" style="font-size: 0.95em;"><span data-dcnode-id="281" instrument_node="">1. Introduction by Richard Pereira</span></span></p><span data-dcnode-id="278" instrument_node="">

</span><p data-dcnode-id="271"><span data-dcnode-id="272" style="font-weight: 400;"><span data-dcnode-id="273" instrument_node="">3. “Cost Feasibility of Basic Income in Europe: A Financing Case Study from Switzerland” by Albert Jörimann</span></span></p><span data-dcnode-id="270" instrument_node="">
