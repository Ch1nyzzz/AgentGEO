 data-dcnode-id="820"><span data-dcnode-id="1103" instrument_node="">
</span><h2 data-dcnode-id="1101" id="682y8pm8dci"><span data-dcnode-id="1102" instrument_node="">Introduction</span></h2><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">If money grew on trees, would everyone want a tree? Probably. What if it was Monopoly money? Probably not. However, if the local bakery, barbershop, or movie theatre started accepting Monopoly money, it would definitely be more enticing. Circles is an application and new money system that offers its own version of Monopoly money. It cannot be exchanged for any fiat currencies like Euros or US Dollars, but it can be transacted with in real life as long as both parties agree to it… similar to fiat money. And thanks to smart contracts and blockchain technology, Circles users receive regular payments of the platform’s cryptocurrency for free, like taking money off of a money tree. This parallel economy and free distribution of Circles cash are supposed to reflect the start of a financial system with a Universal Basic Income (UBI).</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Plenty of reasons exist for why various economies could use a basic income. Perhaps it’d be nice if citizens’ basic needs were covered so they could explore job opportunities that interest them. It could also help the unlucky better manage job loss from technological innovation and outsourcing of labor. Debatable topics like automation/globalization and the effects on jobs, how to combat the growing wealth inequality, and issues surrounding welfare have sparked conversations regarding a Universal Basic Income. UBI has never been tested on a large scale. Maybe it’s unfeasible, maybe having a more confident populace threatens a government’s power, maybe the infrastructure doesn’t exist to administer it meaningfully. If the latter is the main reason, Circles’ attempt at UBI may highlight that blockchain is the correct infrastructure for its implementation.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1088"><img alt="Dollar - Universal Basic Income" data-dcnode-id="1093" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/36ZcsslUhKy9ZR0-vwITpf24ZTP9GwgNVe25AYRrGKdo-YEkwNnRC8k98Bknl8RknGC2FsaQ4Pm_d8giaYRy0-1yZrgvPBoQ4GE7HGd2aywPACB4jJe02KpmVMsYFfFf1mGsbpjR&amp;raw"><figcaption data-dcnode-id="1089"><span data-dcnode-id="1092" instrument_node="">Credit: Karolina Grabowska on </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/photo/hands-holding-a-10-dollar-bill-4968382/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1091" instrument_node="">Pexels</span></a></figcaption></figure><span data-dcnode-id="1087" instrument_node="">
</span><h2 data-dcnode-id="1085" id="24kfqasa4bp"><span data-dcnode-id="1086" instrument_node="">What is Universal Basic Income (UBI)?</span></h2><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">According to a thorough and politically agnostic </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/pulse/primer-universal-basic-income-ray-dalio/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1082" instrument_node="">UBI research paper</span></a><span data-dcnode-id="1080" instrument_node=""> from Bridgewater Associates, the research team defined UBI as a cash transfer that is:</span></p><span data-dcnode-id="1078" instrument_node="">
</span><ol data-dcnode-id="1061"><li data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Universal</span></strong><span data-dcnode-id="1075" instrument_node="">: every citizen receives the transfer regardless of employment status or income.</span></li><li data-dcnode-id="1070"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Unconditional</span></strong><span data-dcnode-id="1071" instrument_node="">: recipients have no restrictions on how they can spend the cash.</span></li><li data-dcnode-id="1066"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Basic</span></strong><span data-dcnode-id="1067" instrument_node="">: the amount will cover “basic needs” and will constitute a “living wage.”</span></li><li data-dcnode-id="1062"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Long-term</span></strong><span data-dcnode-id="1063" instrument_node="">: the cash transfers will last for the long term (e.g. entirety of the recipient’s life).</span></li></ol><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1059" instrument_node="">Universal Basic Income in its simplest form is a social safety net where everyone gets enough money to live. It is not a particularly new idea — as US founding father Thomas Paine proposed a UBI in his pamphlet “Agrarian Justice” in 1797 —&nbsp;but it has seen a rise in popularity in recent years. According to the research paper, UBI has never been implemented. Some Middle Eastern </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/life-qatar-worlds-richest-country-doha-hamad-royal-world-cup-2011-9%3Fop%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1058" instrument_node="">Gulf States</span></a><span data-dcnode-id="1056" instrument_node=""> make generous payments to their citizens, covering electricity, water, and health care, but are in a unique situation where the country’s resources are responsible for the government’s high wealth per citizen, and hence, are excluded from the analysis. The analysis includes very localized attempts at UBI-type unconditional cash transfers to citizens, though no example meets all the necessary criteria.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><figure class="wp-block-image is-resized" data-dcnode-id="1048"><img alt="Cash Transfers" data-dcnode-id="1053" height="394" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh5.googleusercontent.com/G989WKNtqwM4KtjvzxcZ8vPHB5tkrlfPzzz4-muG4thCmqQi7ipWy1rJEe94EMHr110gtuWmU7dJ_sEkOjnRLNkkjpjXqh9S9ox7lQ2ML9it02ypNUUIqI1cn_0O7EzEPDBGZdIk&amp;raw" width="838"><figcaption data-dcnode-id="1049"><span data-dcnode-id="1052" instrument_node="">Credit: </span><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/pulse/primer-universal-basic-income-ray-dalio/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1051" instrument_node="">UBI Research Paper</span></a></figcaption></figure><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node="">Universal Basic Income shockingly doesn’t define party lines in American politics; this fact is proven by historical attempts at putting it into policy. On page 66 in </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S105353570400109X" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1045" instrument_node="">The Journal of Socio-Economics 34</span></a><span data-dcnode-id="1043" instrument_node=""> from 2005, Karl Widerquist of Oxford University explains that there were two instances when a form of UBI was almost implemented in the United States, one from Richard Nixon’s (Republican) presidency and the other from Jimmy Carter’s (Democrat). Both took elements of the Negative Income Tax idea as originally proposed by economist Milton Friedman. Neither plan was passed; however, Widerquist described Nixon’s plan as closer to “guaranteed income” than Carter’s.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">Like Nixon and Carter, both liberal and conservative thinkers can support UBI. The </span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/politics/archive/2014/08/why-arent-reformicons-pushing-a-guaranteed-basic-income/375600/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1039" instrument_node="">conservative case</span></a><span data-dcnode-id="1037" instrument_node=""> is based on simplifying a bloated welfare system and giving individuals the freedom to spend money in a way that would best benefit their unique situation (unlike food stamps that are restricted to food). Typical liberal arguments focus on the potential reduction in wealth inequality and taking pressure off people losing jobs to automation and globalization. Both sides tend to agree that UBI could encourage risk-taking in the economy.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1031"><img alt="" data-dcnode-id="1034" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/PdwgyTXOOKQ-JAJSnqbb8xZP4tPR_yRaEJqEXzvnvCCAWfe8HERT2n2o0VJhG1bzdBMR5EvGsAUa7u_tD4tHRE2aId0KFriXaV_8jnJ9lH546cGCVUnpJsCYqt8xLRPB61qhpBVr&amp;raw"><figcaption data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Credit: (From left) Nixon portrait by J. Anthony Wills, Carter portrait by Herbert E. Abrams.</span></figcaption></figure><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Critics of UBI also fall on both sides of the left-right political spectrum. The liberal criticisms express that an unproven cash transfer scheme like UBI would destroy the proven legacy welfare system that took years to implement. Conservative critics argue that UBI would reduce incentives to work and that money would be </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivethirtyeight.com/features/universal-basic-income/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1028" instrument_node="">spent on vices</span></a><span data-dcnode-id="1026" instrument_node=""> and not necessities like food and rent. A critique that tends to get bipartisan support is that UBI would be too expensive.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1023" instrument_node="">The research paper highlighted minor differences in the results of the case studies from developed and developing countries. It appeared the criticisms regarding human decision-making were unfounded while other </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20201222040319/https%3A//www.odi.org/sites/odi.org.uk/files/resource-documents/10748.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1022" instrument_node="">benefits</span></a><span data-dcnode-id="1020" instrument_node=""> were discovered like female empowerment (mothers now had an income stream) and a decrease in child labor. Analyzing the feasibility of Universal Basic Income in the United States, Bridgewater Associates calculated the costs of the US government providing $12,000 a year to each citizen while possibly funding it by replacing existing programs. It also calculated the costs if UBI were to be reduced by 10 cents per $1 earned, meaning that if someone makes $120,000 they would not receive a basic income, but if they make $60,000 they would receive half (i.e. $6000). The second situation is technically not a pure UBI; however, it maintains the essence of UBI and is much more cost-effective to implement.</span></p><span data-dcnode-id="1018" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="1012"><img alt="USA - Basic Universal Income" data-dcnode-id="1017" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/xaWm4z6Z5h2HI54oc4_8a75mjeIF-X0GH7MTpRiH_NleWTDaVGaq7ARQrLp5RWJ-bpzGKRQQ3pt_ulEqq-gkm0OtgFZvjylEaUORzRxlSl5wBHb9QLO6_8OeRfC-Strg-O7zW4Q8&amp;raw"><figcaption data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">Credit: </span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/pulse/primer-universal-basic-income-ray-dalio/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1015" instrument_node="">UBI Research Paper</span></a></figcaption></figure><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1008"><em data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">A note on Bridgewater Associates:</span></em></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="989"><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Bridgewater Associates is one of the </span></em><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/personal-finance/011515/worlds-top-10-hedge-fund-firms.asp" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">largest</span></em></a><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node=""> and </span></em><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.institutionalinvestor.com/article/b16m71ft1vxr80/the-top-earning-hedge-fund-firms-of-all-time" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">top-earning</span></em></a><em data-dcnode-id="995"><span data-dcnode-id="996" instrument_node=""> hedge funds of all time. It seeks to conduct the most honest and accurate research in order to capitalize on real market conditions. Its analysis of UBI is simply a pure attempt to understand how markets and people react to a basic income; it does this without any political or ideological bias. Although the paper was written over three years ago, the analysis is timeless. If you’d like to get a better understanding of the analysis that the Bridgewater Associates team conducted, you can read the paper from founder </span></em><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/pulse/primer-universal-basic-income-ray-dalio/" rel="noreferrer noopener" target="_blank"><em data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Ray Dalio’s LinkedIn</span></em></a><em data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">.</span></em></p><span data-dcnode-id="988" instrument_node="">
</span><h2 data-dcnode-id="986" id="qku2ygxof6a"><span data-dcnode-id="987" instrument_node="">The Circles UBI Money System</span></h2><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="975"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joincircles.net/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="984" instrument_node="">Circles</span></a><span data-dcnode-id="982" instrument_node=""> is an alternative economic system that acts similar to UBI. It operates on the </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stakingrewards.com/earn/xdai/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="981" instrument_node="">xDai</span></a><span data-dcnode-id="979" instrument_node=""> Ethereum sidechain which is a stable payments EVM (Ethereum Virtual Machine) blockchain designed for fast and inexpensive transactions. Circles is not to be confused with </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.circle.com/en/about-circle" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">Circle</span></a><span data-dcnode-id="976" instrument_node="">, the blockchain-focused financial services and payments company responsible for USD Coin.</span></p><span data-dcnode-id="974" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="972"><img alt="xDAI as Universal Basic Income?" data-dcnode-id="973" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh3.googleusercontent.com/6D0HYB4Yw0eI2wvp-qMXQ2TAb6Z_V8hUmuK2eGwROlDOo1QKqjcAQ-InQOra_FLNqQLAVHtvVb3rrtGLrBcUK9oz1jnl1SaS76LLEzFWMq-dOFxG5g9ik9BI7UGG4I12Zw5fC-63&amp;raw"></figure><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">Circles is a unique money system whose cryptocurrencies are more fungible (interchangeable) than NFTs (Non-Fungible Tokens) but less fungible than normal cryptocurrencies that can be found on exchanges. Every time a new user joins Circles, the smart contracts create a new personal cryptocurrency for that user, and that same personal currency is then regularly minted and added to the user’s account. This process is supposed to form the basis of Circles’ UBI properties. To transact on Circles, users must trust the personal currencies of others, creating what Circles calls a “social graph.” The Circles team believes that as more people become connected on the social graph, personal currencies will “converge on one single global monetary system.” The </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handbook.joincircles.net/docs/developers/whitepaper" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="969" instrument_node="">whitepaper</span></a><span data-dcnode-id="967" instrument_node=""> goes more in-depth on the Circles money system.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">Circles excited a lot of potential users pre-launch. Whereas most blockchain attempts at UBI tended to be </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trustwallet.com/blog/a-crypto-powered-universal-basic-income-experiment" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">hyper-local</span></a><span data-dcnode-id="961" instrument_node="">, Circles created a globally accessible UBI for anyone savvy enough to transact with cryptocurrencies. It garnered so much attention and hype that when it launched, the servers </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CirclesUBI/status/1317390444880400384%3Fref_src%3Dtwsrc%255Etfw%257Ctwcamp%255Etweetembed%257Ctwterm%255E1317390444880400384%257Ctwgr%255E%257Ctwcon%255Es1_c10%26ref_url%3Dhttps%253A%252F%252Fdecrypt.co%252F45419%252Funiversal-basic-income-app-launches-gives-users-free-crypto" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="960" instrument_node="">crashed</span></a><span data-dcnode-id="958" instrument_node="">, struggling to handle the large activity. A year later, it is slowly growing as it maintains an active Twitter account that transmits updates and relevant news regarding Circles and its UBI goals to about 10.7K followers. The Circles Coop and Bitpossessed Collective help to maintain the technology and infrastructure. The Coop also supports groups and businesses who want to join the network and use Circles.</span></p><span data-dcnode-id="956" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="954"><img alt="Local Economy" data-dcnode-id="955" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh6.googleusercontent.com/2J0sR2Bi3rFxhhJqupSm2mMdjzBmp2Dmqk0JYgcJRUX2Ggh7sFl4r1wSVndsGbA_wu1ey-VUQZXetfVjv182P_ErwrcTfAzeVQamc9XbovAcPqlBm5XMCKocv5_7eBIa7Bi2mPL9&amp;raw"></figure><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="952" instrument_node="">Circles claims to have gained some traction with a few Berlin-based businesses on its </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joincircles.net/businesses" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="951" instrument_node="">website</span></a><span data-dcnode-id="949" instrument_node="">. It provides a video of interviews with people from the various businesses; however, their language does not indicate that any of them use Circles. The CEO of </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.toca.site/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="948" instrument_node="">Toca</span></a><span data-dcnode-id="946" instrument_node=""> mentions that he “</span><em data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">likes the idea</span></em><span data-dcnode-id="943" instrument_node=""> [of Circles] to explore a different direction that lies outside the current economic system.” The CEO of </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//o-water.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="942" instrument_node="">O-Water</span></a><span data-dcnode-id="940" instrument_node=""> says that she “</span><em data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">would</span></em><span data-dcnode-id="937" instrument_node=""> accept Circles as a method of payment.” None of these statements ensure that they accept or use Circles. Furthermore, neither the Toca nor O-Water website accepts Circles as a valid payment method.</span></p><span data-dcnode-id="935" instrument_node="">
</span><h2 data-dcnode-id="933" id="tppaw2t8sib"><span data-dcnode-id="934" instrument_node="">Is Circles UBI actually UBI?</span></h2><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">In short, no. It encompasses pieces of the four qualities that define UBI but falls short.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Is Circles universal? It is universal in the sense that it doesn’t discriminate based on employment status or income. It is, however, a bit exclusive. You need three people upon signing up to verify you. This is probably a barrier for anyone outside of Berlin. Some new users have undermined the founders’ intentions by posting their verification links to social media, eventually getting verified and gaining access to the platform.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Unconditional? Yes, in a way. If someone were to receive a basic income from the American government, it would come in the form of US Dollars. There are no restrictions on US Dollars anywhere, they can be used at a restaurant, massage parlor, grocery store, anywhere. There are social and technical restrictions on Circles. Most businesses do not accept Circles and people can choose to not trust your account, limiting your usability to whoever trusts you. Circles doesn’t administer restrictions as a government does with food stamps, but the restrictions are inherent in the design.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Basic? Not at all. For Circles to be basic, the value of administered Circles would need to equal your living expenses. It would also need to be widely adopted so you could use it to at least pay for your basic needs. Circles doesn’t expect it to be basic income right away, but it hopes that it could turn into that someday.</span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Long-term? Yes. More than anything, Circles is long-term. There is no end defined in its code and will continue to pay out to users.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Circles isn’t a true UBI. It’s a good attempt, but cryptocurrencies with a basic income goal that lack mainstream peer-to-peer and institutional adoption will never become UBI. Its best chance at mainstream adoption and fulfilling its mission would be to partner with local governments and try to implement itself as a UBI solution. If local governments accept the partnership, then they could work together on fixing the issues it currently faces that prevent it from reaching the status of a viable UBI.</span></p><span data-dcnode-id="914" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="912"><img alt="Circles for Universal Basic Income?" data-dcnode-id="913" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh5.googleusercontent.com/3yZ75f3fwZNtbIC8Jg3H6uj04_oS_gzFlHF1bXM4_FLSi4beMl6h87sppr_-BcvrmOOgna8_0HFEYTk__o6FJY7JM8Swh3-fA0q1p_KW_ASWB2gsnppwNuKtU6PJFAR139A6OnQS&amp;raw"></figure><span data-dcnode-id="911" instrument_node="">
</span><h2 data-dcnode-id="909" id="s5g343rrswk"><span data-dcnode-id="910" instrument_node="">Potential Flaws with Circles</span></h2><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="907" instrument_node="">The safety of Circles, as Circles conceives of safety, is dependent on peer-to-peer trust. The verification process requires users to get verified by other users, preferably by people they know in the physical world. It also prefers users to transact with people they know and trust in the physical world. This is troublesome because Circles relies on its users to be responsible. As displayed by people </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/mSdBr9U2qO4%3Ft%3D461" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="906" instrument_node="">posting</span></a><span data-dcnode-id="904" instrument_node=""> their verification links to social media, users are not as responsible as Circles advises. This could create a safety hazard if people trust the Circles platform. It only </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joincircles.net/faq%3Fopen%3D26" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="903" instrument_node="">collects</span></a><span data-dcnode-id="901" instrument_node=""> username and email, which don’t map to a real identity. Using me as an example, anyone can make a Micah username and create a </span><span data-dcnode-id="900" instrument_node="">micah@whatevermail.com</span><span data-dcnode-id="899" instrument_node=""> email (or any email), get verifications from fellow Twitter like a lot of early users did, and pretend to be me. Users who know me and trust the Circles platform could think the impersonator is me and transact with this potentially malicious user (without contacting me to double-check).</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Because of the trust-safety mechanism, it’s arguably safer to transact with any other normal cryptocurrency. If you have a Bitcoin wallet, you know your wallet doesn’t have a profile attached to it. So when you transact with a friend, you’re getting their public address via text or in-person (QR code). And if you’re smart, you asked them to double-check to make sure they sent you the right one before continuing with the transaction. Regardless, you’re interacting with people and not their alleged profiles when utilizing other protocols. Circles didn’t add anything new to transacting with people online other than making it slightly more difficult and possibly less safe if you trust its platform.</span></p><span data-dcnode-id="894" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="888"><img alt="Cash" data-dcnode-id="893" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh4.googleusercontent.com/shyp3c-sFYt8Hzpzp_QqWzF0aATlqEH7d3TPfeHgoImFU9xtLaaDiOtak6eh-9z0o5F3v14DLGYLS4wca-MmMYphrwdOWsa40XvGLeTomuLv6aH_SlS7jVwVyOSUQeJHSsjavGXe&amp;raw"><figcaption data-dcnode-id="889"><span data-dcnode-id="892" instrument_node="">Credit: Jason Leung on </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unsplash.com/photos/SAYzxuS1O3M" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="891" instrument_node="">Unsplash</span></a></figcaption></figure><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Circles isn’t designed to be scalable despite its goal of creating a “single global monetary system.” In the best-case scenario, if Circles had Bitcoin-like adoption and actually distributed basic income, it would still be relatively useless to people in a lot of circumstances. UBI is supposed to cover basic needs. Rent is a basic need. Not knowing the same people as your landlord, your landlord would probably prohibit you from paying the rent with Circles, even though everyone’s token is supposed to have the same value. This concept of semi-fungibility for an unnecessary security mechanism is relatively weak and only hinders the adoption and use of Circles.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Circles’ dream is a little too big and it’s the wrong crypto protocol to implement it. It is trying to create a standard currency like the Euro or US Dollar. It wants its tokens to express the value of items the same way that fiat currencies do, unlike Bitcoin that requires both parties to know the fiat exchange rate. It’s a lofty dream, and highly unlikely. Adoption for stablecoins is already proving difficult, although it is progressing. A better chance at making a blockchain UBI would be if a stablecoin decided to regularly airdrop a livable amount of money to on-chain addresses. Ironically, USD Coin provider </span><em data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Circle</span></em><span data-dcnode-id="880" instrument_node=""> would probably have the best chance at making a meaningful UBI blockchain solution.</span></p><span data-dcnode-id="878" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="876"><img alt="Introducing Universal Basic Income" data-dcnode-id="877" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh4.googleusercontent.com/DcQ1zz-EzEke5EAd_K9rsjUG81BuFLC0ncvyceD4EVj-0Hvc06bo505IVsOYB0HE2BOlKSV32xZCkqfsRXcm_NuGTJsUZi2wVOG8Nr5MKC87UU__INTZtXWOZ3M8HEOYppo5G11H&amp;raw"></figure><span data-dcnode-id="875" instrument_node="">
</span><h2 data-dcnode-id="873" id="0milxrix9xg"><span data-dcnode-id="874" instrument_node="">Circles UBI Against Kleros UBI</span></h2><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">Kleros and Democracy Earth created the Universal Basic Income (UBI) token. It operates a bit differently from Circles UBI. Unlike Circles, the UBI token can be bought. It is valued at about </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.coingecko.com/en/coins/universal-basic-income" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">$0.21</span></a><span data-dcnode-id="868" instrument_node=""> (at the time of writing) and has had a consistent 24 trading volume of about $320K. Wallets that hold UBI tokens will simply accrue UBI at the rate of 1 UBI per hour, giving users that ability to earn a passive income that is not necessarily basic, but passive nonetheless. Kleros also gives users the option to participate in a liquidity mining program on Uniswap to further the passive income revenue stream from the UBI token. The UBI protocol from Kleros is a more standard blockchain solution than what was made by Circles.&nbsp;</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="865" instrument_node="">Both solutions are not true Universal Basic Income solutions; they are not basic and are somewhat conditional due to needing to get verified, although Kleros’ UBI token has more unconditional qualities thanks to its fungibility and multivariate verification process. Kleros calls its verification procedure </span><a data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.kleros.io/proof-of-humanity-an-explainer/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="864" instrument_node="">Proof of Humanity</span></a><span data-dcnode-id="862" instrument_node=""> (POH). POH performs identity verification by combining webs of trust, </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proofofhumanity.id/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="861" instrument_node="">reverse Turing tests</span></a><span data-dcnode-id="859" instrument_node="">, and dispute resolution to create a Sybil-proof (fake identity-proof) list of humans. Unlike Circles, Kleros created a system that verifies people’s identities outside of the user-base, creating a more robust security mechanism.</span></p><span data-dcnode-id="857" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="855"><img alt="" data-dcnode-id="856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh6.googleusercontent.com/BGQpGWPbSB1ePkVvHRgLJCx58N09ZtCey9bBqN4QfRe9tkbOXpG8WycGtaJ9AlFJl-fBtCgMaAi2FwEq2ZgOKpmX7ixPkYatHuDJFM0HZFbi95NNNrynAWwp2AOo3G-7zsAqHy9j&amp;raw"></figure><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="853" instrument_node="">The UBI token is a Decentralized Autonomous Organization (DAO) token that allows users to </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.kleros.io/introducing-ubi-universal-basic-income-for-humans/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="852" instrument_node="">participate</span></a><span data-dcnode-id="850" instrument_node=""> in the governance of the ecosystem. Through governance, people will be able to vote to allocate UBI from the treasury towards grants, strategic partnerships, governance initiatives, additional liquidity mining pools, and other programs. Kleros has implemented a quadratic voting mechanism that gives all votes the same weight regardless of UBI owned. Aside from the quadratic voting, Kleros made a fairly standard DAO token. Circles has a different approach to governance. In fact, it’s not governance in the sense of cryptocurrency that we typically understand. Circles </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handbook.joincircles.net/docs/communities/democratic-confederalism" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="849" instrument_node="">advises</span></a><span data-dcnode-id="847" instrument_node=""> that local groups make DAO’s defined as </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Democratic</span></em><span data-dcnode-id="844" instrument_node=""> Autonomous Organizations. These DAOs do not govern Circles at all, rather, they are expected to act more as lobbying organizations that help with </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//handbook.joincircles.net/docs/communities/credit" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="843" instrument_node="">adoption</span></a><span data-dcnode-id="841" instrument_node="">. While Kleros offers a more familiar blockchain protocol to attempt a UBI, Circles is a more politically-oriented, cooperative activist group that has a corresponding blockchain technology to promote as a solution.</span></p><span data-dcnode-id="839" instrument_node="">
</span><h2 data-dcnode-id="837" id="5b0sls8k7g9"><span data-dcnode-id="838" instrument_node="">Conclusion</span></h2><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="835" instrument_node="">Universal Basic Income is a virtuous idea. Given Circles’ and Kleros’/Democracy Earth’s proposed solutions to UBI, it appears we still do not have a viable solution. The flaws in the Circles protocol teach good lessons and should be iterated upon to improve UBI protocols. Better blockchains have been built since Bitcoin was released, and the best UBI blockchain solution is also yet to come. A UBI stablecoin solution may be the most attractive option. Many stablecoins exist on quick, secure, and efficient blockchains like </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stakingrewards.com/earn/solana/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="834" instrument_node="">Solana</span></a><span data-dcnode-id="832" instrument_node="">, </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stakingrewards.com/earn/algorand/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="831" instrument_node="">Algorand</span></a><span data-dcnode-id="829" instrument_node="">, </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stakingrewards.com/earn/stellar/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="828" instrument_node="">Stellar</span></a><span data-dcnode-id="826" instrument_node="">, and </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stakingrewards.com/earn/tron/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="825" instrument_node="">Tron</span></a><span data-dcnode-id="823" instrument_node="">. If governments or other authoritative institutions consider implementing UBI or a related cash transfer plan, they should explore a blockchain-based solution, preferably through stablecoins.</span></p><span data-dcnode-id="821" instrument_node="">
</span></div></section><section class="container article_about-authors__qyIn2 article_container__tc_fA" data-dcnode-id="802"><section class="article_outline__YlCQI" data-dcnode-id="818"></section><div class="container text-container small undefined article_text-container__8Ylks article_container__tc_fA" data-dcnode-id="803"><h2 class="article_headline__csC39" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">About The Author</span></h2><div class="styles_author-card__O9MMw" data-dcnode-id="804"><div class="styles_author-left__TXvI7" data-dcnode-id="814"><div class="styles_profile_image___fIBu" data-dcnode-id="815" style="background-image:url(https://cms.stakingrewards.com/wp-content/uploads/2021/08/b8473ca8-a41a-4728-aa79-6e89f3002ad5.jpg)"></div></div><div class="styles_author-right__FOn5z" data-dcnode-id="805"><div class="styles_author-description-container__2NVRI" data-dcnode-id="809"><span data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Micah Casella</span></span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node=""> is a digital asset investor with a background in traditional banking. Working on the inside, he has seen the benefit that a little digital disruption can have on the archaic finance industry. He sees blockchain and digital assets similarly modernizing other industries for the better.</span></p></div><div class="styles_author-social__Fkc7f" data-dcnode-id="806"><a aria-label="Link to https://twitter.com/CabronElBufon" class="link_link__eO8iL" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CabronElBufon" target="_blank"><span class="icon twitter" data-dcnode-id="808"></span></a></div></div></div></div></section><section class="article_article-footer__yLFtd" data-dcnode-id="780"><div class="container text-container small article_container__tc_fA article_text-container__8Ylks" data-dcnode-id="781"><span class="icon logo article_logo__6ntdG"
