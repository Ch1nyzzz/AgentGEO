e-id="802"><h3 class="mb-3" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Downloads</span></h3><div data-dcnode-id="803"><h5 class="download-label" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">PDF</span></h5><ul class="download-list mb-3" data-dcnode-id="804"><li data-dcnode-id="805"><svg aria-hidden="true" class="svg-inline--fa fa-file-pdf fa-w-12 icon" data-dcnode-id="808" data-icon="file-pdf" data-prefix="far" role="img" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M369.9 97.9L286 14C277 5 264.8-.1 252.1-.1H48C21.5 0 0 21.5 0 48v416c0 26.5 21.5 48 48 48h288c26.5 0 48-21.5 48-48V131.9c0-12.7-5.1-25-14.1-34zM332.1 128H256V51.9l76.1 76.1zM48 464V48h160v104c0 13.3 10.7 24 24 24h104v288H48zm250.2-143.7c-12.2-12-47-8.7-64.4-6.5-17.2-10.5-28.7-25-36.8-46.3 3.9-16.1 10.1-40.6 5.4-56-4.2-26.2-37.8-23.6-42.6-5.9-4.4 16.1-.4 38.5 7 67.1-10 23.9-24.9 56-35.4 74.4-20 10.3-47 26.2-51 46.2-3.3 15.8 26 55.2 76.1-31.2 22.4-7.4 46.8-16.5 68.4-20.1 18.9 10.2 41 17 55.8 17 25.5 0 28-28.2 17.5-38.7zm-198.1 77.8c5.1-13.7 24.5-29.5 30.4-35-19 30.3-30.4 35.7-30.4 35zm81.6-190.6c7.4 0 6.7 32.1 1.8 40.8-4.4-13.9-4.3-40.8-1.8-40.8zm-24.4 136.6c9.7-16.9 18-37 24.7-54.7 8.3 15.1 18.9 27.2 30.1 35.5-20.8 4.3-38.9 13.1-54.8 19.2zm131.6-5s-5 6-37.3-7.8c35.1-2.6 40.9 5.4 37.3 7.8z" data-dcnode-id="809" fill="currentColor"></path></svg><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thirdway.imgix.net/pdfs/five-problems-with-universal-basic-income.pdf" target="_blank" to="http://thirdway.imgix.net/pdfs/five-problems-with-universal-basic-income.pdf"><span data-dcnode-id="807" instrument_node="">Five Problems with Universal Basic Income</span></a></li></ul></div></div></div><div class="col-xs-12 col-lg-8 col-xs-print-12" data-dcnode-id="274"><div class="Highlight" data-dcnode-id="768"><div class="content" data-dcnode-id="769"><span data-dcnode-id="800" instrument_node="">
</span><h2 data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Takeaways</span></h2><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">The idea of a Universal Basic Income (UBI) is gaining more attention. With a UBI, the government would give every adult the same fixed, monthly payment regardless of work status, health, or wealth. There are serious reasons to be cautious about UBI:</span></p><span data-dcnode-id="794" instrument_node="">
</span><ul data-dcnode-id="774"><span data-dcnode-id="793" instrument_node="">
</span><li data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">It is offered as a solution to technological unemployment, but jobs aren’t disappearing; rather, work is changing. A quarter century after the digital revolution began, the economy now employs 37 million more people and offers a record-high 6 million job openings.</span></li><span data-dcnode-id="790" instrument_node="">
</span><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Viewed by some as an alternative to work, UBI would shrink the labor force. By definition, a smaller labor force would mean lower economic output and lower tax revenues to invest in the future.</span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">UBI is very expensive. A $12,000-per-year UBI would cost the government $2.4 trillion annually, or one-eighth of GDP. That’s nearly as large as the entire US safety net today.</span></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">Because UBI is </span><em data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">universal</span></em><span data-dcnode-id="780" instrument_node="">, it would divert assistance from the most needy. Even under a leading proposal that leaves most of the safety net intact, a single parent with three children could lose up to $19,000 in annual benefits on net.</span></li><span data-dcnode-id="778" instrument_node="">
</span><li data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">The idea has been scarcely tested. Only one of a handful of experiments with UBI would provide insights relevant to the US economy, but that study is still in its early stages.</span></li><span data-dcnode-id="775" instrument_node="">
</span></ul><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">While the motivation behind UBI is admirable, it is not the right solution to the country’s core economic problem: the concentration of opportunity.</span></p><span data-dcnode-id="770" instrument_node="">
</span></div></div><section class="Content" data-dcnode-id="549" id="3bf3b9a0-c3dd-11ec-8b6d-071af616d8e2"><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Don’t call it a comeback—it’s been here for years. Even though the idea of a Universal Basic Income (UBI) has been discussed more of late, the proposal dates back to economist Milton Friedman in the 1960s. Being universal, the idea calls for the government to give every adult a fixed payment, regardless of work status, health, wealth, or other criteria. Being basic, it is intended to provide foundational income for people’s most fundamental needs. As policymakers grapple with how to handle the economic disruption that is hallmark of the digital age, some are wondering if this 20th-century policy idea might be right for the decades ahead.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="764" instrument_node="">The motivation behind UBI is admirable. As noted in Third Way’s </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirdway.org/memo/a-new-cause-for-democrats-restoring-the-opportunity-to-earn-in-the-digital-age"><span data-dcnode-id="763" instrument_node="">recent memo</span></a><span data-dcnode-id="761" instrument_node="">, </span><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">A New Cause for Democrats: Restoring the Opportunity to Earn in the Digital Age</span></em><span data-dcnode-id="758" instrument_node="">, opportunity is becoming more concentrated across the United States. Workers see headlines touting low unemployment, but two-thirds of US counties saw a decline in businesses between 2005 and 2015. It’s far too difficult to get the skills needed to succeed in an economy that demands postsecondary credentials. And benefits and pay have been severely eroded for the poor and middle class.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Despite interest from some on both the left and the right, a careful examination of UBI proposals underscores the need to be cautious about its promises. This memo outlines the top UBI proposals and explains five causes for concern.&nbsp;</span></p><span data-dcnode-id="753" instrument_node="">
</span><h2 data-dcnode-id="751" id="ubi-two-ideologies-two-approaches"><span data-dcnode-id="752" instrument_node="">UBI: Two Ideologies, Two Approaches</span></h2><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">UBI has a foot on each side of the political spectrum. On the left, UBI is championed as a solution to deep poverty and an alternative to low-wage, undesirable labor for some workers. Proponents fear large-scale worker displacement due to technological change. They argue a basic income would enable more people to become entrepreneurs, pursue artistic endeavors, find more rewarding jobs for the long-term, or simply work less if they choose. On the right, UBI is defended as a replacement for an inefficient welfare state. These conservatives argue that cutting checks to everyone, instead of maintaining a bureaucratic web of means tested programs and benefits administration, would reduce government waste and leave people better off.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">This dynamic plays out in two leading proposals to implement a UBI in the United States:</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="743" instrument_node="">The first belongs to former Services Employees International Union (SEIU) President Andy Stern. Under his plan, released in 2016, every adult citizen between 18 and 64 years of age would receive $12,000 per year in cash from the government, and those over 65 would be guaranteed at least $12,000 in annual Social Security benefits. Stern suggests a variety of methods to finance his UBI, including a financial transaction tax, a non-regressive value-added tax, and a wealth tax, as well as reductions in military spending, farm subsidies, and tax expenditures. He expects UBI would replace many safety net programs and free up some additional funds. Stern also proposes changes to future Social Security contributions and a non-employer based health care system.</span><sup data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">1</span></sup></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="738" instrument_node="">On the other side of the political spectrum, Charles Murray of the American Enterprise Institute proposed a conservative version of UBI. He suggests a $13,000 annual grant distributed in monthly installments for everyone over 21. While $3,000 of this grant is mandated to go towards health care, the remaining $10,000 can be used as the individual sees fit. The plan is financed in two ways. First, Murray recommends a graduated surtax on income between $30,000 and $60,000. Second, he eliminates a whole host of social welfare and earned benefit programs, including Social Security, Medicare, Medicaid, food stamps, and housing subsidies, in addition to cutting transfer payments to businesses, like agricultural subsidies.</span><sup data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">2</span></sup><span data-dcnode-id="735" instrument_node="">&nbsp;Murray estimates his annual UBI would cost approximately $200 billion less than current spending on social welfare programs.</span><sup data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">3</span></sup></p><span data-dcnode-id="731" instrument_node="">
</span><h2 data-dcnode-id="729" id="causes-for-concern"><span data-dcnode-id="730" instrument_node="">Causes for Concern</span></h2><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">With either approach, UBI is based on assumptions about the future economy that run counter to many economic realities. As a result, it creates a series of problems for the modern US economy that need to be examined. Those problems fall into five categories:</span></p><span data-dcnode-id="725" instrument_node="">
</span><ul data-dcnode-id="708"><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Jobs aren’t disappearing; rather, the nature of work is changing.</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">A shrinking labor force would harm economic growth.</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">UBI is very expensive, requiring substantial tax increases or spending cuts.</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Many of the most disadvantaged would likely be left more vulnerable.</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The idea has been scarcely tested.</span></li><span data-dcnode-id="709" instrument_node="">
</span></ul><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Jobs are changing</span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">Many of the most ardent UBI supporters believe the policy is an answer to a world where work is vanishing. This is a popular view in Silicon Valley, where many predict widespread technological unemployment is just around the corner.</span><sup data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">4</span></sup><span data-dcnode-id="700" instrument_node="">&nbsp;But there is almost no evidence that work is ending. Instead, work is changing.</span></p><span data-dcnode-id="698" instrument_node="">
</span><ul data-dcnode-id="675"><span data-dcnode-id="697" instrument_node="">
</span><li data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">The US economy employs more people today than ever, with 37 million jobs added since the introduction of Microsoft Windows in 1993 and 190,000 new jobs created per month over the last year on average.</span><sup data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">5</span></sup><span data-dcnode-id="693" instrument_node="">
</span></li><span data-dcnode-id="691" instrument_node="">
</span><li data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">As Baby Boomers retire, the US working-age population will grow more slowly than the economy as a whole. For that reason, the US is just as likely to experience a shortage of labor to fill growing jobs as it is to have a labor market oversaturated with workers.</span><sup data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">6</span></sup><span data-dcnode-id="687" instrument_node="">
</span></li><span data-dcnode-id="685" instrument_node="">
</span><li data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Many professions are rising in demand today, including those in health care, advanced manufacturing, skilled construction, education, technology, hospitality, and business management.</span></li><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">At this very moment, there are 6 million job openings across the country, more than half of which are middle-class jobs or better.</span><sup data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">7</span></sup><span data-dcnode-id="678" instrument_node="">
</span></li><span data-dcnode-id="676" instrument_node="">
</span></ul><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">While we may see a net gain in jobs over the coming years, disruption will still be rampant. These jobs will be in different locations, require different skills, and offer different benefits. That’s why we need policies that help workers adjust to these new realities—not surrender. Reinventing postsecondary education to create more options outside of a four-year college degree, as well as redesigning worker pay and benefits, would do far more for the next generation of workers.</span></p><span data-dcnode-id="671" instrument_node="">
</span><h3 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Economic growth would suffer</span></h3><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="667" instrument_node="">With a foundational, albeit limited, income under UBI, some Americans may choose to work part-time instead of full-time. Others may leave the labor force for years when they would have otherwise worked. Eduardo Porter writes that, as almost one quarter of US households make less than $25,000 a year, a $10,000 check each for two parents could change their decisions on how to balance work, child care, and other obligations, resulting in less full-time participation in the labor force.</span><sup data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">8</span></sup></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">If people transition away from full-time work, the US economy would suffer. Macroeconomic theory holds that economic growth is dependent on three factors: increases in capital, advances in technology, and growth of the labor force. UBI has the potential to directly decrease the growth of the US economy, namely GDP growth, through reductions to labor force participation. With GDP shrinking, tax revenues would fall. This would in turn mean fewer resources to help the disadvantaged or to invest in the future, resulting in lower overall prosperity.</span></p><span data-dcnode-id="660" instrument_node="">
</span><h3 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">UBI is incredibly expensive</span></h3><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="656" instrument_node="">The numbers speak for themselves: UBI is either very expensive or very stingy. The progressive version of UBI is expensive to the point of impossibility, while the conservative version is penny-pinching and punitive. Looking first at the former, consider an annual grant of $12,000 for all American adults aged 18 to 64, like Stern proposes. Stern estimates his plan would cost between $1.75 trillion and $2.5 trillion. The high end of this range seems realistic. Almost two-thirds of the population, or 200 million people, would receive a monthly UBI check for $1,000, with a cost of approximately $2.4 trillion every year, or one-eighth of GDP.</span><sup data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">9</span></sup><span data-dcnode-id="653" instrument_node=""> Social Security beneficiaries currently receiving less than $1,000 a month would also get a supplement, adding an estimated $52 billion a year.</span><sup data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">10</span></sup><span data-dcnode-id="650" instrument_node=""> By comparison, our entire existing social safety net costs $2.6 trillion. That includes Social Security, Medicare, Medicaid, Unemployment Insurance, and veterans’ benefits.</span><sup data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">11</span></sup></p><div class="entry-image" data-dcnode-id="639"><div data-dcnode-id="640"><img data-dcnode-id="647" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.amazonaws.com/uploads.thirdway.org/products/universal-basic-income-the-case-and-the-questions/Domestic%2520Spending%2520Compared%2520with%2520UBI_w%253A%2520source.png&amp;raw"><div class="entry-image-share" data-dcnode-id="641"><div class="SocialMediaShareButton SocialMediaShareButton--twitter" data-dcnode-id="642" role="button" tabindex="0"><div class="SocialLink twitter" data-dcnode-id="643"><div class="brand-icon" data-dcnode-id="644"><svg aria-hidden="true" class="svg-inline--fa fa-twitter fa-w-16" color="white" data-dcnode-id="645" data-icon="twitter" data-prefix="fab" role="img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M459.37 151.716c.325 4.548.325 9.097.325 13.645 0 138.72-105.583 298.558-298.558 298.558-59.452 0-114.68-17.219-161.137-47.106 8.447.974 16.568 1.299 25.34 1.299 49.055 0 94.213-16.568 130.274-44.832-46.132-.975-84.792-31.188-98.112-72.772 6.498.974 12.995 1.624 19.818 1.624 9.421 0 18.843-1.3 27.614-3.573-48.081-9.747-84.143-51.98-84.143-102.985v-1.299c13.969 7.797 30.214 12.67 47.431 13.319-28.264-18.843-46.781-51.005-46.781-87.391 0-19.492 5.197-37.36 14.294-52.954 51.655 63.675 129.3 105.258 216.365 109.807-1.624-7.797-2.599-15.918-2.599-24.04 0-57.828 46.782-104.934 104.934-104.934 30.213 0 57.502 12.67 76.67 33.137 23.715-4.548 46.456-13.32 66.599-25.34-7.798 24.366-24.366 44.833-46.132 57.827 21.117-2.273 41.584-8.122 60.426-16.243-14.292 20.791-32.161 39.308-52.628 54.253z" data-dcnode-id="646" fill="currentColor"></path></svg></div></div></div></div></div></div><p></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="636" instrument_node="">Unless these critically important programs are eliminated, a UBI program would need to be paid for with higher taxes. It’s not clear whether it’s even possible to raise enough revenue for this initiative. The federal government took in approximately $3.3 trillion in 2017, so a taxes-only approach to funding Stern’s UBI would require an unheard-of 73% increase in federal revenue.</span><sup data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">12</span></sup><span data-dcnode-id="633" instrument_node=""> Even if defense spending was slashed by one-third, for example, a 52% tax increase would still be required.</span><sup data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">13</span></sup><span data-dcnode-id="630" instrument_node=""> Funneling all of a tax increase into UBI would also neglect our existing programs, like Social Security, which needs financial support to remain solvent past 2034.</span><sup data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">14</span></sup></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Poor families could be left more vulnerable</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">If significant tax hikes aren’t viable, then the question remains: what gets cut in order to fund UBI? Under this scenario, UBI becomes stingy and punitive, as a vast amount of important government programs would be on the chopping block.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="619" instrument_node="">Murray, the conservative UBI proponent, recommends that a $13,000 annual basic income replace all social assistance programs. Consider the value of the benefits people would lose: Medicaid, Medicare, Disability Insurance, the Children’s Health Insurance Program, Social Security, Supplemental Security Income, Unemployment Insurance, SNAP, Section 8 housing vouchers, Pell Grants, the Earned Income Tax Credit, Temporary Assistance to Needy Families. As Dylan Matthews writes, “$13,000 a year doesn’t mean much if you lose insurance that was paying $60,000 a year on chemotherapy.”</span><sup data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">15</span></sup></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">Even a UBI that retains much of the existing social safety net could hit the disadvantaged harder, depending on which tax credits and government assistance programs get cut. Stern listed the Supplemental Nutrition Assistance Program (SNAP), the Earned Income Tax Credit (EITC), and housing assistance as potential policies to end in favor of UBI. But consider one example. In Queens, New York, a single, low-income working parent with three children can receive up to $31,100 worth of benefits annually from SNAP, the EITC, and Section 8 housing vouchers alone, and for good reason.</span><sup data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">16</span></sup><span data-dcnode-id="611" instrument_node=""> Replacing those benefits with a $12,000 UBI for the parent would reduce the family’s income and benefits by $19,100.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="608" instrument_node="">A fundamental motivation for UBI is to eliminate poverty, but the tradeoffs necessary for funding would likely cause harm to vulnerable populations. This begs the question: If the main difference between UBI and our current safety net is that UBI gives relatively more to people who don’t need help, what would make UBI worthwhile? Some proponents have suggested UBI could be restricted to certain populations in need, but that would defy the universality at the idea’s core. At this point, what they are really proposing is an expansion of the existing safety net. That’s a worthwhile conversation to have, but it’s not about a </span><em data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">universal</span></em><span data-dcnode-id="605" instrument_node=""> basic income.</span></p><span data-dcnode-id="603" instrument_node="">
</span><h3 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The idea has been scarcely tested</span></h3><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">There are a handful of past and ongoing experiments with UBI. Unfortunately, the experiments have been flawed or are too small to effectively prove that UBI could live up to some of its proponents’ claims:</span></p><span data-dcnode-id="597" instrument_node="">
</span><ul data-dcnode-id="568"><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">Finland’s national social insurance institute, Kela, launched a UBI trial experiment in 2017, with 2,000 Finns aged 25 to 58 receiving approximately $645 per month. A year into its implementation, the Finnish government refused to continue its funding in April 2018, choosing instead to pursue alternative social welfare projects.</span><sup data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">17</span></sup><span data-dcnode-id="592" instrument_node="">
</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">The Alaska Permanent Fund provides an annual cash dividend to all Alaskan residents from oil reserve royalties. The grant’s amount, in recent years roughly $2,000 per person, is far too small to be a livable income and thus has minimal effects on the labor market and is a poor comparison to popular UBI proposals.</span><sup data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">18</span></sup><span data-dcnode-id="586" instrument_node="">
</span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="583" instrument_node="">An experiment in Kenya launched by Give Directly in late 2017 compares different UBI methods across 120 villages. According to </span><em data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Business Insider</span></em><span data-dcnode-id="580" instrument_node="">, residents of 40 villages receive $270 annually for 12 years, “effectively doubling most people’s income,” while 80 villages receive the same amount for 2 years.</span><sup data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">19</span></sup><span data-dcnode-id="577" instrument_node=""> While this experiment could produce more compelling evidence than prior trials, Kenya’s economy is at a very different stage of development compared to the US which limits the study’s relevance.</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">Silicon Valley startup accelerator Y Combinator in 2017 began a five-year experiment in giving 1,000 people $1,000 per month and 2,000 people $50 a month, aiming to assess changes to the labor force and quality of life.</span><sup data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">20</span></sup><span data-dcnode-id="571" instrument_node=""> This evaluation could yield important results given its similarities to leading proposals but is still early in the experiment.</span></li><span data-dcnode-id="569" instrument_node="">
</span></ul><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">It will be interesting to see what comes out of future studies and experiments. But policymakers should be wary of studies that simulate the upside of UBI (a monthly income) without simulating its downsides, namely sweeping benefit cuts or tax increases.</span></p><span data-dcnode-id="564" instrument_node="">
</span><h2 data-dcnode-id="562" id="conclusion"><span data-dcnode-id="563" instrument_node="">Conclusion</span></h2><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="560" instrument_node="">The motivation behind most universal basic income proposals is admirable: reduce widespread poverty and provide lifelong income security to all. But a UBI in reality would likely fall far short of eliminating poverty while imposing large economic costs and ignoring future opportunities for work. It also ignores that American life is rooted in a civic tradition of earning. Seventy-three percent of Americans believe working hard is “very important to getting ahead in life.”</span><sup data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">21</span></sup><span data-dcnode-id="557" instrument_node="">&nbsp;That’s the highest among advanced economies, with the United Kingdom second at 60% and Germany (49%), Japan (42%), South Korea (34%), and France (25%) far behind.</span><sup data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">22</span></sup></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="552" instrument_node="">Instead of pinning all hopes to UBI, policymakers should focus instead on designing ambitious policies that address the need that Americans have to earn a good life.</span><a data-dcnode-id="551" href="#_ednref1"></a></p></section><div class="IssuesRelated mt-5 mb-5" data-dcnode-id="538"><div class="TopicLabel" data-dcnode-id="546"><div class="name" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Topics</span></div></div><ul class="IssueTagList inline" data-dcnode-id="539"><li data-dcnode-id="540"><div class="IssueTag" data-dcnode-id="541"><span class="title" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Workforce &amp; Training</span></span><span class="Count" data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">106</span></span></div></li></ul></div><div class="mb-5" data-dcnode-id="296"><div class="ProductEndnotes mt-5" data-dcnode-id="297"><h4 class="" data-dcnode-id="534"><span data-dcnode-id="537" instrument_node="">Endnotes</span><svg aria-hidden="true" class="svg-inline--fa fa-caret-right fa-w-6 fa-lg icon-caret-right" data-dcnode-id="535" data-icon="caret-right" data-prefix="fas" role="img" viewBox="0 0 192 512" xmlns="http://www.w3.org/2000/svg"><path d="M0 384.662V127.338c0-17.818 21.543-26.741 34.142-14.142l128.662 128.662c7.81 7.81 7.81 20.474 0 28.284L34.142 398.804C21.543 411.404 0 402.48 0 384.662z" data-dcnode-id="536" fill="currentColor"></path></svg></h4><section class="Content" data-dcnode-id="298" id="3c0286b0-c3dd-11ec-8b6d-071af616d8e2"><ol data-dcnode-id="299"><li data-dcnode-id="528"><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">Stern, Andy. “A Twenty-First-Century Solution to a Twenty-First Century Problem.” </span><em data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Raising the Floor:</span></em><span data-dcnode-id="530" instrument_node=""> Public Affairs, 2016, pp. 201-215.</span></p></li><li data-dcnode-id="519"><p data-dcnode-id="520"><span data-dcnode-id="527" instrument_node="">Murray, Charles. </span><em data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">In Our Hands: A Plan to Replace the Welfare State</span></em><span data-dcnode-id="524" instrument_node="">: American Enterprise Institute for Public Policy Research, 2016, </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//play.google.com/store/books/details/Charles_Murray_In_Our_Hands%3Fid%3DGx9ADAAAQBAJ"><span data-dcnode-id="523" instrument_node="">https://play.google.com/store/books/details/Charles_Murray_In_Our_Hands?id=Gx9ADAAAQBAJ</span></a><span data-dcnode-id="521" instrument_node="">.</span></p></li><li data-dcnode-id="510"><p data-dcnode-id="511"><span data-dcnode-id="518" instrument_node="">Murray, Charles. “A guaranteed income for every American.” </span><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">American Enterprise Institute</span></em><span data-dcnode-id="515" instrument_node="">, 3 June 2016, </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aei.org/publication/a-guaranteed-income-for-every-american/"><span data-dcnode-id="514" instrument_node="">http://www.aei.org/publication/a-guaranteed-income-for-every-american/</span></a><span data-dcnode-id="512" instrument_node="">. Accessed 5 Apr. 2018.</span></p></li><li data-dcnode-id="501"><p data-dcnode-id="502"><span data-dcnode-id="509" instrument_node="">Sadowski, Jathan. “Why Silicon Valley is embracing universal basic income.” </span><em data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">The Guardian</span></em><span data-dcnode-id="506" instrument_node="">, 22 Jun. 2016, </span><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2016/jun/22/silicon-valley
