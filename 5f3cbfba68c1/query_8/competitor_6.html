</span><meta content="Universal Basic Income and Inclusive Capitalism: Consequences for Sustainability" data-dcnode-id="13422" name="title"><span data-dcnode-id="13421" instrument_node="">
</span><meta content="Over the past forty years, income growth for the middle and lower classes has stagnated, while the economy (and with it, economic inequality) has grown significantly. Early automation, the decline of labor unions, changes in corporate taxation, the financialization and globalization of the economy, deindustrialization in the U.S. and many OECD countries, and trade have contributed to these trends. However, the transformative roles of more recent automation and digital technologies/artificial intelligence (AI) are now considered by many as additional and potentially more potent forces undermining the ability of workers to maintain their foothold in the economy. These drivers of change are intensifying the extent to which advancing technology imbedded in increasingly productive real capital is driving productivity. To compound the problem, many solutions presented by industrialized nations to environmental problems rely on hyper-efficient technologies, which if fully implemented, could further advance the displacement of well-paid job opportunities for many. While there are numerous ways to address economic inequality, there is growing interest in using some form of universal basic income (UBI) to enhance income and provide economic stability. However, these approaches rarely consider the potential environmental impact from the likely increase in aggregate demand for goods and services or consider ways to focus this demand on more sustainable forms of consumption. Based on the premise that the problems of income distribution and environmental sustainability must be addressed in an integrated and holistic way, this paper considers how a range of approaches to financing a UBI system, and a complementary market solution based on an ownership-broadening approach to inclusive capitalism, might advance or undermine strategies to improve environmental sustainability." data-dcnode-id="13420" name="description"><span data-dcnode-id="13419" instrument_node </span><meta content="Universal Basic Income and Inclusive Capitalism: Consequences for Sustainability" data-dcnode-id="13290" property="og:title"><span data-dcnode-id="13289" instrument_node="">
</span><meta content="Over the past forty years, income growth for the middle and lower classes has stagnated, while the economy (and with it, economic inequality) has grown significantly. Early automation, the decline of labor unions, changes in corporate taxation, the financialization and globalization of the economy, deindustrialization in the U.S. and many OECD countries, and trade have contributed to these trends. However, the transformative roles of more recent automation and digital technologies/artificial intelligence (AI) are now considered by many as additional and potentially more potent forces undermining the ability of workers to maintain their foothold in the economy. These drivers of change are intensifying the extent to which advancing technology imbedded in increasingly productive real capital is driving productivity. To compound the problem, many solutions presented by industrialized nations to environmental problems rely on hyper-efficient technologies, which if fully implemented, could further advance the displacement of well-paid job opportunities for many. While there are numerous ways to address economic inequality, there is growing interest in using some form of universal basic income (UBI) to enhance income and provide economic stability. However, these approaches rarely consider the potential environmental impact from the likely increase in aggregate demand for goods and services or consider ways to focus this demand on more sustainable forms of consumption. Based on the premise that the problems of income distribution and environmental sustainability must be addressed in an integrated and holistic way, this paper considers how a range of approaches to financing a UBI system, and a complementary market solution based on an ownership-broadening approach to inclusive capitalism, might advance or undermine strategies to improve environmental sustainability." data-dcnode-id="13288" property="og:description"><span data-dcnode-id="13287" instrument_node="">

</span><p data-dcnode-id="12980"><span data-dcnode-id="12981" instrument_node="">
All articles published by MDPI are made immediately available worldwide under an open access license. No special
permission is required to reuse all or part of the article published by MDPI, including figures and tables. For
articles published under an open access Creative Common CC BY license, any part of the article may be reused without
permission provided that the original article is clearly cited.
</span></p><span data-dcnode-id="12979" instrument_node="">

</span><div aria-hidden="true" class="f-dropdown medium" data-dcnode-id="12969" data-dropdown-content="" id="drop-article-label-feature" tabindex="-1"><span data-dcnode-id="12976" instrument_node="">
</span><p data-dcnode-id="12974"><span data-dcnode-id="12975" instrument_node="">
Feature Papers represent the most advanced research with significant potential for high impact in the field. Feature
Papers are submitted upon individual invitation or recommendation by the scientific editors and undergo peer review
prior to publication.
</span></p><span data-dcnode-id="12973" instrument_node="">
</span><p data-dcnode-id="12971"><span data-dcnode-id="12972" instrument_node="">
The Feature Paper can be either an original research article, a substantial novel research study that often involves
several techniques or approaches, or a comprehensive review paper with concise and precise updates on the latest
progress in the field that systematically reviews the most exciting advances in scientific literature. This type of
paper provides an outlook on future directions of research or possible applications.
</span></p><span data-dcnode-id="12970" instrument_node="">
</span></div><span data-dcnode-id="12968" instrument_node="">
</span><div aria-hidden="true" class="f-dropdown medium" data-dcnode-id="12963" data-dropdown-content="" id="drop-article-label-choice" tabindex="-1"><span data-dcnode-id="12967" instrument_node="">
</span><p data-dcnode-id="12965"><span data-dcnode-id="12966" instrument_node="">

Editors select a small number of articles recently published in the journal that they believe will be particularly
interesting to authors, or important in this field. The aim is to provide a snapshot of some of the most exciting work
published in the various research areas of the journal.

</span><h2 data-dcnode-id="6823" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6824" instrument_node="">Abstract</span></h2><span data-dcnode-id="6822" instrument_node="">
</span></div><span data-dcnode-id="6820" instrument_node="">
</span><div class="art-abstract in-tab hypothesis_container" data-dcnode-id="6818"><span data-dcnode-id="6819" instrument_node="">
Over the past forty years, income growth for the middle and lower classes has stagnated, while the economy (and with it, economic inequality) has grown significantly. Early automation, the decline of labor unions, changes in corporate taxation, the financialization and globalization of the economy, deindustrialization in the U.S. and many OECD countries, and trade have contributed to these trends. However, the transformative roles of more recent automation and digital technologies/artificial intelligence (AI) are now considered by many as additional and potentially more potent forces undermining the ability of workers to maintain their foothold in the economy. These drivers of change are intensifying the extent to which advancing technology imbedded in increasingly productive real capital is driving productivity. To compound the problem, many solutions presented by industrialized nations to environmental problems rely on hyper-efficient technologies, which if fully implemented, could further advance the displacement of well-paid job opportunities for many. While there are numerous ways to address economic inequality, there is growing interest in using some form of universal basic income (UBI) to enhance income and provide economic stability. However, these approaches rarely consider the potential environmental impact from the likely increase in aggregate demand for goods and services or consider ways to focus this demand on more sustainable forms of consumption. Based on the premise that the problems of income distribution and environmental sustainability must be addressed in an integrated and holistic way, this paper considers how a range of approaches to financing a UBI system, and a complementary market solution based on an ownership-broadening approach to inclusive capitalism, might advance or undermine strategies to improve environmental sustainability.

</span><section data-dcnode-id="6349" id="sec1-sustainability-11-04481" type="intro"><h2 data-dcnode-id="6768" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6769" instrument_node=""> 1. Introduction</span></h2><section data-dcnode-id="6544" id="sec1dot1-sustainability-11-04481" type=""><h4 class="html-italic" data-dcnode-id="6766" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6767" instrument_node=""> 1.1. The Inequality Challenge</span></h4><div class="html-p" data-dcnode-id="6743"><span data-dcnode-id="6765" instrument_node="">Until the 1980s, growth in U.S. labor productivity, private employment, median family income, and real GDP per capita grew in tandem (</span><a class="html-fig html-figpopup" data-dcnode-id="6763" href="#fig_body_display_sustainability-11-04481-f001"><span data-dcnode-id="6764" instrument_node="">Figure 1</span></a><span data-dcnode-id="6762" instrument_node="">) [</span><a class="html-bibr" data-dcnode-id="6760" href="#B1-sustainability-11-04481" title=""><span data-dcnode-id="6761" instrument_node="">1</span></a><span data-dcnode-id="6759" instrument_node="">]. Since then, growth in private employment and median family income has lagged behind economic growth, and during the 2000s was largely stagnant. These trends reveal that compared to the rest of the population, the top 10 percent and, especially, the top 1 and 0.1 percent of the U.S. population measured by real annual earnings, have experienced by far the greatest financial gains (</span><a class="html-fig html-figpopup" data-dcnode-id="6757" href="#fig_body_display_sustainability-11-04481-f002"><span data-dcnode-id="6758" instrument_node="">Figure 2</span></a><span data-dcnode-id="6756" instrument_node="">). Since the 1970s, when compared with the 90th percentile, median family wealth in the U.S. has been flat, revealing that the U.S. middle class, and especially minority/disadvantaged populations, are no longer benefiting from gains in labor productivity and economic growth [</span><a class="html-bibr" data-dcnode-id="6754" href="#B2-sustainability-11-04481" title=""><span data-dcnode-id="6755" instrument_node="">2</span></a><span data-dcnode-id="6753" instrument_node="">]. Further, since 2000, wages as a percentage of GDP have fallen sharply (dropping below 60% for the first time around 2005), while the share of GDP going to corporate profits has been increasing [</span><a class="html-bibr" data-dcnode-id="6751" href="#B1-sustainability-11-04481" title=""><span data-dcnode-id="6752" instrument_node="">1</span></a><span data-dcnode-id="6750" instrument_node="">]. One outcome from these trends is that younger generations are finding it more difficult to accumulate wealth (</span><a class="html-fig html-figpopup" data-dcnode-id="6748" href="#fig_body_display_sustainability-11-04481-f003"><span data-dcnode-id="6749" instrument_node="">Figure 3</span></a><span data-dcnode-id="6747" instrument_node="">) [</span><a class="html-bibr" data-dcnode-id="6745" href="#B3-sustainability-11-04481" title=""><span data-dcnode-id="6746" instrument_node="">3</span></a><span data-dcnode-id="6744" instrument_node="">].</span></div><div class="html-fig-wrap" data-dcnode-id="6722" id="sustainability-11-04481-f001"><span data-dcnode-id="6742" instrument_node="">

</span></div><span data-dcnode-id="6681" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6666"><span data-dcnode-id="6679" instrument_node="">If these trends are considered alongside changes in the cost of living (</span><a class="html-fig html-figpopup" data-dcnode-id="6677" href="#fig_body_display_sustainability-11-04481-f004"><span data-dcnode-id="6678" instrument_node="">Figure 4</span></a><span data-dcnode-id="6676" instrument_node="">), it can be seen that growing healthcare and education expenses are most likely to impact the young and poor [</span><a class="html-bibr" data-dcnode-id="6674" href="#B5-sustainability-11-04481" title=""><span data-dcnode-id="6675" instrument_node="">5</span></a><span data-dcnode-id="6673" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6671" href="#B6-sustainability-11-04481" title=""><span data-dcnode-id="6672" instrument_node="">6</span></a><span data-dcnode-id="6670" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6668" href="#B7-sustainability-11-04481" title=""><span data-dcnode-id="6669" instrument_node="">7</span></a><span data-dcnode-id="6667" instrument_node="">]. In contrast, the reduction in the price of tradeable goods and services such as communication has likely somewhat softened the impact of stagnant wages for the majority of workers.</span></div><div class="html-fig-wrap" data-dcnode-id="6645" id="sustainability-11-04481-f004"><span data-dcnode-id="6665" instrument_node="">

</span></div><span data-dcnode-id="6646" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6616"><span data-dcnode-id="6644" instrument_node="">Given the above, a critical question is “why have workers (through wages) failed to maintain their share of GDP?” Earlier automation, the decline of labor unions, changes in corporate taxation, the financialization and globalization of the economy, deindustrialization in the U.S. and many OECD countries, and trade have surely played a role [</span><a class="html-bibr" data-dcnode-id="6642" href="#B8-sustainability-11-04481" title=""><span data-dcnode-id="6643" instrument_node="">8</span></a><span data-dcnode-id="6641" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6639" href="#B9-sustainability-11-04481" title=""><span data-dcnode-id="6640" instrument_node="">9</span></a><span data-dcnode-id="6638" instrument_node="">]. However, the transformative roles of more recent automation and digital technologies/artificial intelligence (AI) are now considered by many as the emerging forces undermining the ability of workers to maintain their foothold in the economy [</span><a class="html-bibr" data-dcnode-id="6636" href="#B8-sustainability-11-04481" title=""><span data-dcnode-id="6637" instrument_node="">8</span></a><span data-dcnode-id="6635" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6633" href="#B10-sustainability-11-04481" title=""><span data-dcnode-id="6634" instrument_node="">10</span></a><span data-dcnode-id="6632" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6630" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="6631" instrument_node="">11</span></a><span data-dcnode-id="6629" instrument_node="">]. Automation is likely to impact 1.2 billion jobs globally (representing </span><span data-dcnode-id="6627"><span data-dcnode-id="6628" instrument_node="">$</span></span><span data-dcnode-id="6626" instrument_node="">14.6 trillion in wages) and 60.6 million jobs in the United States (equivalent to </span><span data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node="">$</span></span><span data-dcnode-id="6623" instrument_node="">2.3 trillion in wages) [</span><a class="html-bibr" data-dcnode-id="6621" href="#B12-sustainability-11-04481" title=""><span data-dcnode-id="6622" instrument_node="">12</span></a><span data-dcnode-id="6620" instrument_node="">]. Jobs with highly predictable physical work are more likely to be automated with existing technological capabilities. Some of these jobs include, but are not limited to, food preparation and serving tasks in accommodation and food service businesses, aircraft assemblers, first-line supervisors in the resource extraction industry, and transportation and warehousing jobs [</span><a class="html-bibr" data-dcnode-id="6618" href="#B12-sustainability-11-04481" title=""><span data-dcnode-id="6619" instrument_node="">12</span></a><span data-dcnode-id="6617" instrument_node="">]. The disruption caused by AI and automation technologies is likely to only continue to increase as their capabilities improve and costs decline.</span></div><div class="html-p" data-dcnode-id="6584"><span data-dcnode-id="6615" instrument_node="">These drivers of change are intensifying the extent to which increasingly productive real capital is driving productivity and simultaneously hollowing out the middle class (</span><a class="html-fig html-figpopup" data-dcnode-id="6613" href="#fig_body_display_sustainability-11-04481-f005"><span data-dcnode-id="6614" instrument_node="">Figure 5</span></a><span data-dcnode-id="6612" instrument_node="">) [</span><a class="html-bibr" data-dcnode-id="6610" href="#B14-sustainability-11-04481" title=""><span data-dcnode-id="6611" instrument_node="">14</span></a><span data-dcnode-id="6609" instrument_node="">]. The polarization of the workforce is increasing the skills needed to engage in the high-skilled/high-earning jobs, making them unattainable for many. From 1980 to 2015, the number of workers in jobs that require average or above-average education, training, and experience increased by 68 percent, whereas employment in lower-skill jobs had a weaker growth of 31 percent [</span><a class="html-bibr" data-dcnode-id="6607" href="#B15-sustainability-11-04481" title=""><span data-dcnode-id="6608" instrument_node="">15</span></a><span data-dcnode-id="6606" instrument_node="">]. These lower-skill jobs do not provide the same income status that middle-income jobs used to provide and have a higher likelihood of becoming automated in the future [</span><a class="html-bibr" data-dcnode-id="6604" href="#B16-sustainability-11-04481" title=""><span data-dcnode-id="6605" instrument_node="">16</span></a><span data-dcnode-id="6603" instrument_node="">]. Female workers may also bear the brunt of technological displacement, worsening the gender gap [</span><a class="html-bibr" data-dcnode-id="6601" href="#B17-sustainability-11-04481" title=""><span data-dcnode-id="6602" instrument_node="">17</span></a><span data-dcnode-id="6600" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6598" href="#B18-sustainability-11-04481" title=""><span data-dcnode-id="6599" instrument_node="">18</span></a><span data-dcnode-id="6597" instrument_node="">]. As middle-income jobs hollow out, the majority of workers find themselves searching for employment in the service sector. In fact, over 90 percent of net employment growth in the U.S. from 2005 and 2015 appears to have occurred in the service sector (in independent freelance/contract work, temporary work, etc.), with conventional full-time jobs in decline [</span><a class="html-bibr" data-dcnode-id="6595" href="#B19-sustainability-11-04481" title=""><span data-dcnode-id="6596" instrument_node="">19</span></a><span data-dcnode-id="6594" instrument_node="">]. The polarization of the workforce is not just a U.S. phenomenon; it is also occurring in the majority of European countries [</span><a class="html-bibr" data-dcnode-id="6592" href="#B14-sustainability-11-04481" title=""><span data-dcnode-id="6593" instrument_node="">14</span></a><span data-dcnode-id="6591" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6589" href="#B16-sustainability-11-04481" title=""><span data-dcnode-id="6590" instrument_node="">16</span></a><span data-dcnode-id="6588" instrument_node="">]. In the OECD, over the past three decades an average of 1% of the population each decade has ceased to be middle income—defined as “households earning between 75% and 200% of the median national income” [</span><a class="html-bibr" data-dcnode-id="6586" href="#B16-sustainability-11-04481" title=""><span data-dcnode-id="6587" instrument_node="">16</span></a><span data-dcnode-id="6585" instrument_node="">] (p. 13)—with one third moving into the upper-income category and two thirds moving into the lower income category.</span></div><div class="html-fig-wrap" data-dcnode-id="6563" id="sustainability-11-04481-f005"><span data-dcnode-id="6583" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="6574"><span data-dcnode-id="6582" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="6576" href="#fig_body_display_sustainability-11-04481-f005"><span data-dcnode-id="6581" instrument_node="">
</span><img alt="Sustainability 11 04481 g005 550" data-dcnode-id="6580" data-large="/sustainability/sustainability-11-04481/article_deploy/html/images/sustainability-11-04481-g005.png" data-original="/sustainability/sustainability-11-04481/article_deploy/html/images/sustainability-11-04481-g005.png" onerror="/sustainability/sustainability-11-04481/article_deploy/html/images/sustainability-11-04481-g005.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mdpi.com/sustainability/sustainability-11-04481/article_deploy/html/images/sustainability-11-04481-g005-550.jpg&amp;raw"><span data-dcnode-id="6579" instrument_node="">
</span><a class="html-expand html-figpopup" data-dcnode-id="6578" href="#fig_body_display_sustainability-11-04481-f005"></a><span data-dcnode-id="6577" instrument_node="">
</span></div><span data-dcnode-id="6575" instrument_node="">
</span></div><span data-dcnode-id="6573" instrument_node="">

</span><b data-dcnode-id="6570"><span data-dcnode-id="6571" instrument_node="">Figure 5.</span></b><span data-dcnode-id="6569" instrument_node="">
Change in employment by major occupational category, 1979–2012. Note: This figure plots percentage point changes in employment (more precisely, the figure plots 100 times log changes in employment, which is close to equivalent to percentage points for small changes) by decade for the years 1979–2012 for ten major occupational groups encompassing all of U.S. nonagricultural employment. Agricultural occupations comprise no more than 2.2 percent of employment in this time interval, so this omission has a negligible effect. Source: Adapted from Reference [</span><a class="html-bibr" data-dcnode-id="6567" href="#B14-sustainability-11-04481" title=""><span data-dcnode-id="6568" instrument_node="">14</span></a><span data-dcnode-id="6566" instrument_node="">].

</span></div><span data-dcnode-id="6564" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6553"><span data-dcnode-id="6562" instrument_node="">The trends above paint a challenging picture that is increasingly apparent to growing numbers of people, but it is not new. In the mid-1960s, the Rev. Dr. Martin Luther King, Jr. identified the problem through his work on civil rights and the Poor People’s campaign. In his final book, “Where Do We Go From Here? Community or Chaos”, Dr. King, Jr. made the following statement:
</span><blockquote data-dcnode-id="6554"><div class="html-p" data-dcnode-id="6560"><span data-dcnode-id="6561" instrument_node="">“Automation is imperceptibly but inexorably producing dislocations, skimming off unskilled labor from the industrial force. The displaced are flowing into proliferating service occupations. These enterprises are traditionally unorganized and provide low wage scales with longer hours”.</span></div><div class="html-blockquote-attrib html-p" data-dcnode-id="6555"><span data-dcnode-id="6559" instrument_node="">[</span><a class="html-bibr" data-dcnode-id="6557" href="#B20-sustainability-11-04481" title=""><span data-dcnode-id="6558" instrument_node="">20</span></a><span data-dcnode-id="6556" instrument_node="">] (p. 149)</span></div></blockquote></div><div class="html-p" data-dcnode-id="6545"><span data-dcnode-id="6552" instrument_node="">Given the challenges presented above, two critical questions are (1) how to shape the economy so that it directly addresses current trends in income and wealth inequality and works for everyone [</span><a class="html-bibr" data-dcnode-id="6550" href="#B21-sustainability-11-04481" title=""><span data-dcnode-id="6551" instrument_node="">21</span></a><span data-dcnode-id="6549" instrument_node="">], and (2) how to accomplish this in a way that is environmentally sustainable [</span><a class="html-bibr" data-dcnode-id="6547" href="#B22-sustainability-11-04481" title=""><span data-dcnode-id="6548" instrument_node="">22</span></a><span data-dcnode-id="6546" instrument_node="">].</span></div></section><section data-dcnode-id="6431" id="sec1dot2-sustainability-11-04481" type=""><h4 class="html-italic" data-dcnode-id="6542" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6543" instrument_node=""> 1.2. The Environmental Challenge</span></h4><div class="html-p" data-dcnode-id="6537"><span data-dcnode-id="6541" instrument_node="">A corollary concern to inequality is the environmental challenge. There are four general areas of environmental concern that have emerged over the past fifty years [</span><a class="html-bibr" data-dcnode-id="6539" href="#B8-sustainability-11-04481" title=""><span data-dcnode-id="6540" instrument_node="">8</span></a><span data-dcnode-id="6538" instrument_node="">]: (1) ecosystem integrity and the loss of biodiversity; (2) resource depletion; (3) toxic pollution; and (4) climate change.</span></div><div class="html-p" data-dcnode-id="6520"><span data-dcnode-id="6536" instrument_node="">Concerns about the disruption of ecosystems, the loss of biological diversity, and the indirect effects these have on human health and well-being were initially raised in the early 1960s, when industrial processes and the use of pesticides were revealed to have led to environmental degradation and a loss of wildlife [</span><a class="html-bibr" data-dcnode-id="6534" href="#B23-sustainability-11-04481" title=""><span data-dcnode-id="6535" instrument_node="">23</span></a><span data-dcnode-id="6533" instrument_node="">]. Three decades later, public concern began to focus on endocrine disrupters that affect reproductive health in all species [</span><a class="html-bibr" data-dcnode-id="6531" href="#B24-sustainability-11-04481" title=""><span data-dcnode-id="6532" instrument_node="">24</span></a><span data-dcnode-id="6530" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6528" href="#B25-sustainability-11-04481" title=""><span data-dcnode-id="6529" instrument_node="">25</span></a><span data-dcnode-id="6527" instrument_node="">]. More recent concerns have been raised about the impacts of the loss of biodiversity on mental health, nutrition, and increased exposure to infectious diseases [</span><a class="html-bibr" data-dcnode-id="6525" href="#B26-sustainability-11-04481" title=""><span data-dcnode-id="6526" instrument_node="">26</span></a><span data-dcnode-id="6524" instrument_node="">]. While significant technological progress has been made in improving industrial and agricultural practices, the negative impacts of these sectors still present a problem [</span><a class="html-bibr" data-dcnode-id="6522" href="#B27-sustainability-11-04481" title=""><span data-dcnode-id="6523" instrument_node="">27</span></a><span data-dcnode-id="6521" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6506"><span data-dcnode-id="6519" instrument_node="">The second environmental concern relates to the world’s finite resources and energy supplies and asks whether there are sufficient resources to provide continuing economic growth—i.e., are there limits to growth [</span><a class="html-bibr" data-dcnode-id="6517" href="#B28-sustainability-11-04481" title=""><span data-dcnode-id="6518" instrument_node="">28</span></a><span data-dcnode-id="6516" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6514" href="#B29-sustainability-11-04481" title=""><span data-dcnode-id="6515" instrument_node="">29</span></a><span data-dcnode-id="6513" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6511" href="#B30-sustainability-11-04481" title=""><span data-dcnode-id="6512" instrument_node="">30</span></a><span data-dcnode-id="6510" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6508" href="#B31-sustainability-11-04481" title=""><span data-dcnode-id="6509" instrument_node="">31</span></a><span data-dcnode-id="6507" instrument_node="">]? A connected concern is what the environmental impact will be from using a significant proportion of the existing resources.</span></div><div class="html-p" data-dcnode-id="6468"><span data-dcnode-id="6505" instrument_node="">The third concern is toxic pollution that directly adversely affects human health and the health of other species [</span><a class="html-bibr" data-dcnode-id="6503" href="#B24-sustainability-11-04481" title=""><span data-dcnode-id="6504" instrument_node="">24</span></a><span data-dcnode-id="6502" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6500" href="#B27-sustainability-11-04481" title=""><span data-dcnode-id="6501" instrument_node="">27</span></a><span data-dcnode-id="6499" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6497" href="#B32-sustainability-11-04481" title=""><span data-dcnode-id="6498" instrument_node="">32</span></a><span data-dcnode-id="6496" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6494" href="#B33-sustainability-11-04481" title=""><span data-dcnode-id="6495" instrument_node="">33</span></a><span data-dcnode-id="6493" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6491" href="#B34-sustainability-11-04481" title=""><span data-dcnode-id="6492" instrument_node="">34</span></a><span data-dcnode-id="6490" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6488" href="#B35-sustainability-11-04481" title=""><span data-dcnode-id="6489" instrument_node="">35</span></a><span data-dcnode-id="6487" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6485" href="#B36-sustainability-11-04481" title=""><span data-dcnode-id="6486" instrument_node="">36</span></a><span data-dcnode-id="6484" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6482" href="#B37-sustainability-11-04481" title=""><span data-dcnode-id="6483" instrument_node="">37</span></a><span data-dcnode-id="6481" instrument_node="">]. As scientists began to understand how ecosystems, humans, and other organisms were affected by industrial and agricultural processes, the issue of how toxic chemicals interact with biological systems gained prominence. In the same way, the understanding of how communities of color in the U.S. suffer as a result of the disproportionate exposure to toxic pollutants that they themselves do not generate is gaining greater recognition [</span><a class="html-bibr" data-dcnode-id="6479" href="#B38-sustainability-11-04481" title=""><span data-dcnode-id="6480" instrument_node="">38</span></a><span data-dcnode-id="6478" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6476" href="#B39-sustainability-11-04481" title=""><span data-dcnode-id="6477" instrument_node="">39</span></a><span data-dcnode-id="6475" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6473" href="#B40-sustainability-11-04481" title=""><span data-dcnode-id="6474" instrument_node="">40</span></a><span data-dcnode-id="6472" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6470" href="#B41-sustainability-11-04481" title=""><span data-dcnode-id="6471" instrument_node="">41</span></a><span data-dcnode-id="6469" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6448"><span data-dcnode-id="6467" instrument_node="">The final, more recent, concern is that greenhouse gases from anthropocentric (human-driven) sources are leading to a disruption of the global climate [</span><a class="html-bibr" data-dcnode-id="6465" href="#B42-sustainability-11-04481" title=""><span data-dcnode-id="6466" instrument_node="">42</span></a><span data-dcnode-id="6464" instrument_node="">]. Scientists predict (with high confidence) that relative to 1850–1900, these gases will cause the globally averaged surface air temperature to increase by at least 1.5 °C by the end of the 21st century (2081–2100) [</span><a class="html-bibr" data-dcnode-id="6462" href="#B42-sustainability-11-04481" title=""><span data-dcnode-id="6463" instrument_node="">42</span></a><span data-dcnode-id="6461" instrument_node="">]. The 2015 Paris Climate Agreement (COP21) focuses on limiting a rise in global average temperature “to well below 2 °C above pre-industrial levels,” with an aspirational target of limiting the increase to 1.5 °C [</span><a class="html-bibr" data-dcnode-id="6459" href="#B43-sustainability-11-04481" title=""><span data-dcnode-id="6460" instrument_node="">43</span></a><span data-dcnode-id="6458" instrument_node="">] (p. 3). Achieving the target of 1.5 °C of warming above pre-industrial levels will be extremely difficult without massive and targeted investment in low-carbon technology, and even if the 1.5 °C target is achieved, low-lying regions and the poor/vulnerable will still be adversely impacted [</span><a class="html-bibr" data-dcnode-id="6456" href="#B44-sustainability-11-04481" title=""><span data-dcnode-id="6457" instrument_node="">44</span></a><span data-dcnode-id="6455" instrument_node="">]. At the other end of the continuum where predictions put the warming of the planet around 4 °C by the end of the century [</span><a class="html-bibr" data-dcnode-id="6453" href="#B45-sustainability-11-04481" title=""><span data-dcnode-id="6454" instrument_node="">45</span></a><span data-dcnode-id="6452" instrument_node="">], the costs of doing little or nothing (i.e., business as usual) are catastrophic [</span><a class="html-bibr" data-dcnode-id="6450" href="#B46-sustainability-11-04481" title=""><span data-dcnode-id="6451" instrument_node="">46</span></a><span data-dcnode-id="6449" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6446"><span data-dcnode-id="6447" instrument_node="">The first, third, and fourth environmental concerns are connected with the unintended effects of growing human production and consumption systems, while the second deals with increasing shortages of resources needed to fuel these systems.</span></div><div class="html-p" data-dcnode-id="6432"><span data-dcnode-id="6445" instrument_node="">Today, the 2015 Sustainable Development Goals (SDGs) provide a comprehensive statement on the tenets of sustainable development. The SDGs also continue to advance a technologically optimistic and growth-oriented approach to development that has its roots in the Brundtland formulation of sustainable development. For example, SDG 9 calls for “inclusive and sustainable industrialization” supported by “innovation,” and SDG 8 for “sustained, inclusive, and sustainable economic growth, full and productive employment, and decent work for all.” The challenge is that an innovation-fueled “green” growth agenda (SDG 9) is unlikely to realize the latter employment goals if technology continues to displace routine (physical and cognitive) tasks [</span><a class="html-bibr" data-dcnode-id="6443" href="#B10-sustainability-11-04481" title=""><span data-dcnode-id="6444" instrument_node="">10</span></a><span data-dcnode-id="6442" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6440" href="#B47-sustainability-11-04481" title=""><span data-dcnode-id="6441" instrument_node="">47</span></a><span data-dcnode-id="6439" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6437" href="#B48-sustainability-11-04481" title=""><span data-dcnode-id="6438" instrument_node="">48</span></a><span data-dcnode-id="6436" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6434" href="#B49-sustainability-11-04481" title=""><span data-dcnode-id="6435" instrument_node="">49</span></a><span data-dcnode-id="6433" instrument_node="">]. Thus, while environmental improvements may occur, the goal of addressing inequality via “full and productive employment” is unlikely to be achieved.</span></div></section><section data-dcnode-id="6412" id="sec1dot3-sustainability-11-04481" type=""><h4 class="html-italic" data-dcnode-id="6429" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6430" instrument_node=""> 1.3. Moving Beyond Green Growth</span></h4><div class="html-p" data-dcnode-id="6415"><span data-dcnode-id="6428" instrument_node="">While the notion of “green growth” [</span><a class="html-bibr" data-dcnode-id="6426" href="#B50-sustainability-11-04481" title=""><span data-dcnode-id="6427" instrument_node="">50</span></a><span data-dcnode-id="6425" instrument_node="">] is an important step beyond the current growth paradigm, going green is not enough to handle the income/wealth disparities that have been developing [</span><a class="html-bibr" data-dcnode-id="6423" href="#B48-sustainability-11-04481" title=""><span data-dcnode-id="6424" instrument_node="">48</span></a><span data-dcnode-id="6422" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6420" href="#B49-sustainability-11-04481" title=""><span data-dcnode-id="6421" instrument_node="">49</span></a><span data-dcnode-id="6419" instrument_node="">]. Further, there is no empirical evidence that green growth has, or will in the near future, decouple the economy from its environmental impacts [</span><a class="html-bibr" data-dcnode-id="6417" href="#B51-sustainability-11-04481" title=""><span data-dcnode-id="6418" instrument_node="">51</span></a><span data-dcnode-id="6416" instrument_node="">], highlighting the need for a fundamentally different approach to how we advance economic development and sustainability.</span></div><div class="html-p" data-dcnode-id="6413"><span data-dcnode-id="6414" instrument_node="">A more plausible outcome from innovation-fueled “green” growth might be that as production becomes more capital (i.e., technology) intensive, the ability to distribute wealth via wages will decline, revealing an urgent need for capital-based mechanisms for income/wealth distribution. Expressed in more general terms, as production becomes more capital intensive, there is an urgent need for income distribution to also become more capital intensive. This framing has important implications for the financing of a UBI designed to address income inequality. Further, as the comparative analysis in this paper reveals, while some UBI approaches do incorporate environmental concerns; many do not. Thus, selecting or developing a UBI approach that combines the earnings of capital ownership with a robust environmental protection regime, presents a unique opportunity to move beyond the green growth agenda.</span></div></section><section data-dcnode-id="6350" id="sec1dot4-sustainability-11-04481" type=""><h4 class="html-italic" data-dcnode-id="6410" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6411" instrument_node=""> 1.4. The EKC Hypothesis</span></h4><div class="html-p" data-dcnode-id="6399"><span data-dcnode-id="6409" instrument_node="">Given the core argument of this paper that any strategy to advance a UBI must be integrated with mechanisms to protect the environment, there may be some who might respond that the Environmental Kuznets Curve (EKC) hypothesis means the focus need only be on increasing income/wealth. The EKC hypothesis postulates that the relationship between a specific environmental pollutant (such as sulfur dioxide) and per capita income follows an inverted-U shape. This relationship implies that as a nation’s GDP per capita increases, environmental degradation will first increase up to a turning point that varies by pollutant [</span><a class="html-bibr" data-dcnode-id="6407" href="#B52-sustainability-11-04481" title=""><span data-dcnode-id="6408" instrument_node="">52</span></a><span data-dcnode-id="6406" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6404" href="#B53-sustainability-11-04481" title=""><span data-dcnode-id="6405" instrument_node="">53</span></a><span data-dcnode-id="6403" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6401" href="#B54-sustainability-11-04481" title=""><span data-dcnode-id="6402" instrument_node="">54</span></a><span data-dcnode-id="6400" instrument_node="">], after which it will begin to fall. The EKC hypothesis challenges the need to consider UBIs from an environmental perspective, because if the relationship holds, the increased income could enable people to demand and pay for environmental improvements.</span></div><div class="html-p" data-dcnode-id="6364"><span data-dcnode-id="6398" instrument_node="">However, the EKC hypothesis is a somewhat academic idea that on balance is not supported by the empirical evidence [</span><a class="html-bibr" data-dcnode-id="6396" href="#B55-sustainability-11-04481" title=""><span data-dcnode-id="6397" instrument_node="">55</span></a><span data-dcnode-id="6395" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6393" href="#B56-sustainability-11-04481" title=""><span data-dcnode-id="6394" instrument_node="">56</span></a><span data-dcnode-id="6392" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6390" href="#B57-sustainability-11-04481" title=""><span data-dcnode-id="6391" instrument_node="">57</span></a><span data-dcnode-id="6389" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6387" href="#B58-sustainability-11-04481" title=""><span data-dcnode-id="6388" instrument_node="">58</span></a><span data-dcnode-id="6386" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6384" href="#B59-sustainability-11-04481" title=""><span data-dcnode-id="6385" instrument_node="">59</span></a><span data-dcnode-id="6383" instrument_node="">]. While EKCs have been found in relation to local air pollutants, they do not hold for long-lived measures such as carbon dioxide (CO</span><sub data-dcnode-id="6381"><span data-dcnode-id="6382" instrument_node="">2</span></sub><span data-dcnode-id="6380" instrument_node="">), municipal waste, and persistent toxic chemicals, which increase monotonically with per capita income [</span><a class="html-bibr" data-dcnode-id="6378" href="#B60-sustainability-11-04481" title=""><span data-dcnode-id="6379" instrument_node="">60</span></a><span data-dcnode-id="6377" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6375" href="#B61-sustainability-11-04481" title=""><span data-dcnode-id="6376" instrument_node="">61</span></a><span data-dcnode-id="6374" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6372" href="#B62-sustainability-11-04481" title=""><span data-dcnode-id="6373" instrument_node="">62</span></a><span data-dcnode-id="6371" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6369" href="#B63-sustainability-11-04481" title=""><span data-dcnode-id="6370" instrument_node="">63</span></a><span data-dcnode-id="6368" instrument_node="">]. Studies focusing on the EKC hypothesis also do not consider the total impact of economic growth on the environment and whether this may (in some cases) be irreversible [</span><a class="html-bibr" data-dcnode-id="6366" href="#B61-sustainability-11-04481" title=""><span data-dcnode-id="6367" instrument_node="">61</span></a><span data-dcnode-id="6365" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6353"><span data-dcnode-id="6363" instrument_node="">If a UBI is implemented without any consideration of the environmental impacts caused by a surge in consumption from a sudden increase in aggregate demand, it is highly likely that environmental problems will worsen and that—without an innovative regulatory regime that protects critical ecological systems and promotes disruptive technological change [</span><a class="html-bibr" data-dcnode-id="6361" href="#B8-sustainability-11-04481" title=""><span data-dcnode-id="6362" instrument_node="">8</span></a><span data-dcnode-id="6360" instrument_node="">]—these may not decline over time. A similar concern was raised in the context of adopting a four-day workweek to allegedly reduce consumption [</span><a class="html-bibr" data-dcnode-id="6358" href="#B64-sustainability-11-04481" title=""><span data-dcnode-id="6359" instrument_node="">64</span></a><span data-dcnode-id="6357" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6355" href="#B65-sustainability-11-04481" title=""><span data-dcnode-id="6356" instrument_node="">65</span></a><span data-dcnode-id="6354" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">The following section reviews a broad range of approaches to financing a UBI and highlights how these approaches (1) frame the driving forces of growing income/wealth inequality and (2) consider the impact that the proposed UBI might have on the environment.</span></div></section></section><section data-dcnode-id="5967" id="sec2-sustainability-11-04481" type=""><h2 data-dcnode-id="6347" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="6348" instrument_node=""> 2. Strategies to Provide a Universal Basic Income (UBI)</span></h2><div class="html-p" data-dcnode-id="6330"><span data-dcnode-id="6346" instrument_node="">In response to growing trends in inequality across the world, the idea of a universal basic income (UBI) is increasingly gaining traction not only in academic circles, but also in policy arenas. Indeed, “[t]he idea of assured [guaranteed/basic] income is in the policy and political air” [</span><a class="html-bibr" data-dcnode-id="6344" href="#B9-sustainability-11-04481" title=""><span data-dcnode-id="6345" instrument_node="">9</span></a><span data-dcnode-id="6343" instrument_node="">] (p. 10). Those advocating for a UBI tend to do so on the grounds of social justice, individual liberty, and financial security [</span><a class="html-bibr" data-dcnode-id="6341" href="#B66-sustainability-11-04481" title=""><span data-dcnode-id="6342" instrument_node="">66</span></a><span data-dcnode-id="6340" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6338" href="#B67-sustainability-11-04481" title=""><span data-dcnode-id="6339" instrument_node="">67</span></a><span data-dcnode-id="6337" instrument_node="">]. Some advocates argue that policies that more broadly distribute or redistribute income will promote fuller employment and per-capita growth [</span><a class="html-bibr" data-dcnode-id="6335" href="#B68-sustainability-11-04481" title=""><span data-dcnode-id="6336" instrument_node="">68</span></a><span data-dcnode-id="6334" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6332" href="#B69-sustainability-11-04481" title=""><span data-dcnode-id="6333" instrument_node="">69</span></a><span data-dcnode-id="6331" instrument_node="">]. </span></div><div class="html-p" data-dcnode-id="6328"><span data-dcnode-id="6329" instrument_node="">Those opposing a UBI tend to raise questions about its affordability, the need to raise taxes in ways likely to suppress growth-enhancing investment and employment, and the possibility that a UBI would reduce people’s incentive to work. Indeed, labor work plays a role not only in financial stability, but also in psychological well-being and social integration; and a UBI could constitute, in some cases, a disincentive to find a job. This debate has been going for some time in EU countries, where there are typically systems in place covering shortfalls in earning capacity, with the state providing allowances for underprivileged households and/or unemployment compensations. A “solution” has consisted of making unemployment benefits temporary and dependent on the amount of days previously worked, so that beneficiaries have incentives to find a job. However, this arrangement is proving insufficient in cases (increasingly frequent) of the longtime unemployed who often find themselves unable to secure a job, lacking marketable skills, and without unemployment benefits.</span></div><div class="html-p" data-dcnode-id="6326"><span data-dcnode-id="6327" instrument_node="">Although the approaches may vary, there are only five ways to legitimately increase the funds available to people to cover their consumer needs and wants: (1) labor (wages); (2) capital (dividends, interest, and rent); (3) government redistribution of income and capital; (4) private charity; and (5) consumer debt. Because consumer debt without the future repayment ability is unsustainable, private charity has proven systemically inadequate, and capital acquisition based on mainstream market principles has produced an increasing concentration (rather than a broadening) of capital ownership, most approaches to enhancing income for poor and middle class people are based on increasing wages and/or government redistribution of income or capital.</span></div><div class="html-p" data-dcnode-id="6321"><span data-dcnode-id="6325" instrument_node="">As will be discussed below, there is an alternative approach to broadening capital ownership that is based on binary economics. This approach maintains that it is the increasing productiveness of capital enhanced by technological advance (not labor) that is doing an ever greater share of the work, creating more of the wealth, and is driving economic growth and inequality [</span><a class="html-bibr" data-dcnode-id="6323" href="#B70-sustainability-11-04481" title=""><span data-dcnode-id="6324" instrument_node="">70</span></a><span data-dcnode-id="6322" instrument_node="">]. When understood through this lens, the mechanism of how a UBI is financed matters.</span></div><div class="html-p" data-dcnode-id="6316"><span data-dcnode-id="6320" instrument_node="">As automation and AI do an increasing share of work relative to labor, financing a UBI in a way that directly links income to the work being done, and wealth created, by capital is critical. When framed this way, people could receive an income from their labor and from the work that the capital they may own does for them. Thus, the understanding of work and its distributive consequences needs to be viewed not only as the work done by labor, but also the work increasingly done by capital. A key question raised by this approach is how people can acquire a capital ownership stake without using labor earnings (which for growing numbers of people are already insufficient to support their needs without being supplemented by growing consumer debt). A second and equally important question is how the ownership-broadening capital acquisition can be structured to advance sustainable, rather than destructive, production and consumption. These questions are addressed below and in </span><a class="html-sec" data-dcnode-id="6318" href="#sec3-sustainability-11-04481"><span data-dcnode-id="6319" instrument_node="">Section 3</span></a><span data-dcnode-id="6317" instrument_node="">.</span></div><div class="html-p" data-dcnode-id="6311"><span data-dcnode-id="6315" instrument_node="">A UBI could be provided through either a redistributive or distributive approach, or some combination of the two (as proposed in </span><a class="html-sec" data-dcnode-id="6313" href="#sec3-sustainability-11-04481"><span data-dcnode-id="6314" instrument_node="">Section 3</span></a><span data-dcnode-id="6312" instrument_node="">). The redistributive approach would finance a UBI by redistributing wealth through taxes on earned income/accumulated wealth. The distributive approach, would finance a UBI by profitable, credit-worthy enhanced growth prospects that can rationally be expected to result from a broader distribution of capital acquisition and future capital income. This approach would cause a broader future distribution, rather than a current redistribution, of wealth and income.</span></div><div class="html-p" data-dcnode-id="6294"><span data-dcnode-id="6310" instrument_node="">Regardless of the rationale for providing a basic income, the idea is now attracting support from many quarters [</span><a class="html-bibr" data-dcnode-id="6308" href="#B71-sustainability-11-04481" title=""><span data-dcnode-id="6309" instrument_node="">71</span></a><span data-dcnode-id="6307" instrument_node="">]. This interest has prompted the launch of a number of basic income pilot projects around the world (</span><a class="html-boxed-text" data-dcnode-id="6305" href="#sustainability-11-04481-box001"><span data-dcnode-id="6306" instrument_node="">Box 1</span></a><span data-dcnode-id="6304" instrument_node="">). While these pilots seem structured to help deepen knowledge regarding the impact of different forms of a UBI on the recipients of the income, a number of proposals exist for implementing a basic income for all citizens/residents of a country/region. </span><a class="html-table html-tablepopup" data-dcnode-id="6302" href="#table_body_display_sustainability-11-04481-t001"><span data-dcnode-id="6303" instrument_node="">Table 1</span></a><span data-dcnode-id="6301" instrument_node=""> provides a summary of several economy-wide approaches to providing a UBI (or guaranteed employment) and highlights their financing mechanism, whether the approach has an employment requirement, the income received (if known) and by whom, and whether a connection exists between the approach and sustainable development. A more detailed description of each program is provided in </span><a class="html-table html-tablepopup" data-dcnode-id="6299" href="#table_body_display_sustainability-11-04481-t0A1"><span data-dcnode-id="6300" instrument_node="">Table A1</span></a><span data-dcnode-id="6298" instrument_node=""> in </span><a class="html-app" data-dcnode-id="6296" href="#app1-sustainability-11-04481"><span data-dcnode-id="6297" instrument_node="">Appendix A</span></a><span data-dcnode-id="6295" instrument_node="">.</span></div><div class="html-table-wrap" data-dcnode-id="6276" id="sustainability-11-04481-t001"><div class="html-table_wrap_discription" data-dcnode-id="6289"><span data-dcnode-id="6293" instrument_node="">
