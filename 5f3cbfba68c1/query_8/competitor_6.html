</span><div class="html-boxed-title" data-dcnode-id="6270"><div class="html-boxed-title html-p" data-dcnode-id="6271"><b data-dcnode-id="6273"><span data-dcnode-id="6274" instrument_node="">Box 1.</span></b><span data-dcnode-id="6272" instrument_node=""> Examples of basic income pilot projects.</span></div></div><span data-dcnode-id="6269" instrument_node="">
</span><div class="html-boxed-body" data-dcnode-id="6133" style=""><div class="html-p" data-dcnode-id="6262"><b data-dcnode-id="6267"><span data-dcnode-id="6268" instrument_node="">Finland</span></b><span data-dcnode-id="6266" instrument_node="">: Finland ran a pilot project from 1 January 2017, to 31 December 2018 [</span><a class="html-bibr" data-dcnode-id="6264" href="#B72-sustainability-11-04481" title=""><span data-dcnode-id="6265" instrument_node="">72</span></a><span data-dcnode-id="6263" instrument_node="">]. The pilot consisted of granting €560 as a tax-free monthly unconditional benefit to 2000 randomly selected unemployed people for two years. The amount was not reduced if they earned an income, and they were not obliged to search for jobs. </span></div><div class="html-p" data-dcnode-id="6252"><b data-dcnode-id="6260"><span data-dcnode-id="6261" instrument_node="">Kenya</span></b><span data-dcnode-id="6259" instrument_node="">: In Kenya, a charity called Give Directly launched in October 2016 a pilot UBI experiment, consisting of giving a number of villages different amounts of money (from </span><span data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">$</span></span><span data-dcnode-id="6256" instrument_node="">22.50 to several hundred dollars) during different periods of time (between two and 12 years) and observing the results [</span><a class="html-bibr" data-dcnode-id="6254" href="#B73-sustainability-11-04481" title=""><span data-dcnode-id="6255" instrument_node="">73</span></a><span data-dcnode-id="6253" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6242"><b data-dcnode-id="6250"><span data-dcnode-id="6251" instrument_node="">California</span></b><span data-dcnode-id="6249" instrument_node="">: In Oakland, California, Silicon Valley’s largest startup accelerator, Y Combinator, announced in 2017 it would be paying </span><span data-dcnode-id="6247"><span data-dcnode-id="6248" instrument_node="">$</span></span><span data-dcnode-id="6246" instrument_node="">1000 per month for three to five years to 1000 randomly selected people (from a sample population of 3000 people) across two states [</span><a class="html-bibr" data-dcnode-id="6244" href="#B74-sustainability-11-04481" title=""><span data-dcnode-id="6245" instrument_node="">74</span></a><span data-dcnode-id="6243" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6231"><span data-dcnode-id="6241" instrument_node="">In Stockton, California, the Stockton Economic Empowerment Demonstration (SEED) project has been disbursing </span><span data-dcnode-id="6239"><span data-dcnode-id="6240" instrument_node="">$</span></span><span data-dcnode-id="6238" instrument_node="">500 per month to 130 recipients. This pilot project started in February, 2019, and will run for 18 months. In order to be eligible, recipients had to be over 18 years old and reside in a neighborhood where the median income was equal or below </span><span data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">$</span></span><span data-dcnode-id="6235" instrument_node="">46,003. The payments are made to recipients regardless of their employment status [</span><a class="html-bibr" data-dcnode-id="6233" href="#B75-sustainability-11-04481" title=""><span data-dcnode-id="6234" instrument_node="">75</span></a><span data-dcnode-id="6232" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6215"><b data-dcnode-id="6229"><span data-dcnode-id="6230" instrument_node="">Canada</span></b><span data-dcnode-id="6228" instrument_node="">: In Ontario, Canada, the Ontario basic income pilot (which began in June 2017) was designed to provide up to CA </span><span data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">$</span></span><span data-dcnode-id="6225" instrument_node="">16,989 for a qualifying low-income single person and </span><span data-dcnode-id="6223"><span data-dcnode-id="6224" instrument_node="">$</span></span><span data-dcnode-id="6222" instrument_node="">24,027 for a couple (less 50 percent of any earned income) for up to three years [</span><a class="html-bibr" data-dcnode-id="6220" href="#B75-sustainability-11-04481" title=""><span data-dcnode-id="6221" instrument_node="">75</span></a><span data-dcnode-id="6219" instrument_node="">]. However, the pilot was cancelled by a new conservative government and the 4000 recipients received their final payments on 31 March 2019 [</span><a class="html-bibr" data-dcnode-id="6217" href="#B76-sustainability-11-04481" title=""><span data-dcnode-id="6218" instrument_node="">76</span></a><span data-dcnode-id="6216" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6208"><b data-dcnode-id="6213"><span data-dcnode-id="6214" instrument_node="">Germany</span></b><span data-dcnode-id="6212" instrument_node="">: In Germany, a new program will be launched in 2019 where 250 qualifying citizens will be “sanction free” for three years under the Hartz IV social security system, enabling them to retain their benefits (income) while trying to search for employment [</span><a class="html-bibr" data-dcnode-id="6210" href="#B77-sustainability-11-04481" title=""><span data-dcnode-id="6211" instrument_node="">77</span></a><span data-dcnode-id="6209" instrument_node="">]. </span></div><div class="html-p" data-dcnode-id="6201"><b data-dcnode-id="6206"><span data-dcnode-id="6207" instrument_node="">India</span></b><span data-dcnode-id="6205" instrument_node="">: In India, two basic income experiments in the state of Madhya Pradesh were undertaken in 2010, in which more than 6000 people received small monthly payments for 18 months. The state of Sikkim now plans to provide a universal basic income to more than 611,000 inhabitants, making it the largest pilot program in the world [</span><a class="html-bibr" data-dcnode-id="6203" href="#B78-sustainability-11-04481" title=""><span data-dcnode-id="6204" instrument_node="">78</span></a><span data-dcnode-id="6202" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6191"><b data-dcnode-id="6199"><span data-dcnode-id="6200" instrument_node="">Namibia</span></b><span data-dcnode-id="6198" instrument_node="">: In Otjivero–Omitara, Namibia, a pilot project ran from January 2008 to December 2009. It provided a monthly income of N</span><span data-dcnode-id="6196"><span data-dcnode-id="6197" instrument_node="">$</span></span><span data-dcnode-id="6195" instrument_node="">100 per person. The payments were made to residents who were under 60 years old regardless of their employment status [</span><a class="html-bibr" data-dcnode-id="6193" href="#B79-sustainability-11-04481" title=""><span data-dcnode-id="6194" instrument_node="">79</span></a><span data-dcnode-id="6192" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6181"><b data-dcnode-id="6189"><span data-dcnode-id="6190" instrument_node="">Mississippi</span></b><span data-dcnode-id="6188" instrument_node="">: In Jackson, Mississippi, The Magnolia Mother’s Trust will be giving 15 low-income families headed by Africa American females </span><span data-dcnode-id="6186"><span data-dcnode-id="6187" instrument_node="">$</span></span><span data-dcnode-id="6185" instrument_node="">1000 per month for one year as part of a pilot project, more than doubling the annual income of these households [</span><a class="html-bibr" data-dcnode-id="6183" href="#B80-sustainability-11-04481" title=""><span data-dcnode-id="6184" instrument_node="">80</span></a><span data-dcnode-id="6182" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6174"><b data-dcnode-id="6179"><span data-dcnode-id="6180" instrument_node="">Spain</span></b><span data-dcnode-id="6178" instrument_node="">: In Barcelona, the City and collaborating partners have been providing payments to 1000 households since October 2017. The pilot will be running until September 2019. The monthly payments can be up to €403 to cover basic needs and up to €260 to cover main dwelling expenditures [</span><a class="html-bibr" data-dcnode-id="6176" href="#B81-sustainability-11-04481" title=""><span data-dcnode-id="6177" instrument_node="">81</span></a><span data-dcnode-id="6175" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6161"><b data-dcnode-id="6172"><span data-dcnode-id="6173" instrument_node="">Uganda</span></b><span data-dcnode-id="6171" instrument_node="">: In Uganda, starting in 2017 the nonprofit Eight began providing unconditional weekly cash transfers (through mobile payments) to 56 adults (USD ~</span><span data-dcnode-id="6169"><span data-dcnode-id="6170" instrument_node="">$</span></span><span data-dcnode-id="6168" instrument_node="">16) and 88 children (USD ~</span><span data-dcnode-id="6166"><span data-dcnode-id="6167" instrument_node="">$</span></span><span data-dcnode-id="6165" instrument_node="">8) in a rural village [</span><a class="html-bibr" data-dcnode-id="6163" href="#B82-sustainability-11-04481" title=""><span data-dcnode-id="6164" instrument_node="">82</span></a><span data-dcnode-id="6162" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6151"><b data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">United Kingdom</span></b><span data-dcnode-id="6158" instrument_node="">: Provided that Labour is in control of the government, the political party has promised to run a pilot project that provides weekly payments of £100 to every citizen, and an additional £50 for every child in the household, regardless of income or wealth. The trials would be tested in Liverpool, Sheffield, and in some locations in the Midlands [</span><a class="html-bibr" data-dcnode-id="6156" href="#B83-sustainability-11-04481" title=""><span data-dcnode-id="6157" instrument_node="">83</span></a><span data-dcnode-id="6155" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6153" href="#B84-sustainability-11-04481" title=""><span data-dcnode-id="6154" instrument_node="">84</span></a><span data-dcnode-id="6152" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6135"><b data-dcnode-id="6149"><span data-dcnode-id="6150" instrument_node="">United States</span></b><span data-dcnode-id="6148" instrument_node="">: Since 1996, and with now nearly 13,000 members enrolled, the Eastern Cherokee Reservation has disbursed two annual payments from the profits generated by a casino. Recipients must finish high-school to start collecting payments at age 18. Otherwise, the disbursements are postponed until members turn 21. The average per capita payment is approximately </span><span data-dcnode-id="6146"><span data-dcnode-id="6147" instrument_node="">$</span></span><span data-dcnode-id="6145" instrument_node="">4000 per year [</span><a class="html-bibr" data-dcnode-id="6143" href="#B85-sustainability-11-04481" title=""><span data-dcnode-id="6144" instrument_node="">85</span></a><span data-dcnode-id="6142" instrument_node="">]. However, the largest disbursement took place in December 2018 with a payment of </span><span data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">$</span></span><span data-dcnode-id="6139" instrument_node="">7007 before taxes [</span><a class="html-bibr" data-dcnode-id="6137" href="#B86-sustainability-11-04481" title=""><span data-dcnode-id="6138" instrument_node="">86</span></a><span data-dcnode-id="6136" instrument_node="">].</span></div><span data-dcnode-id="6134" instrument_node="">
</span></div><span data-dcnode-id="6132" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="6126"><span data-dcnode-id="6130" instrument_node="">The proposals listed in </span><a class="html-table html-tablepopup" data-dcnode-id="6128" href="#table_body_display_sustainability-11-04481-t001"><span data-dcnode-id="6129" instrument_node="">Table 1</span></a><span data-dcnode-id="6127" instrument_node=""> provide a range of ways in which a version of more broadly distributed income via a UBI or a guaranteed job program could be used to address income needs and inequality, to different extents and in different ways.</span></div><div class="html-p" data-dcnode-id="6124"><span data-dcnode-id="6125" instrument_node="">The Negative Income Tax (NIT) proposal can be implemented in a variety of ways. It is based on the principle that people who work receive more income than those who do not, which, in theory, incentivizes work. While the NIT has a strong employment focus, it is not concerned with the potential technological displacement of work and has no explicit environmental considerations.</span></div><div class="html-p" data-dcnode-id="6119"><span data-dcnode-id="6123" instrument_node="">The Cost of Living Refund [</span><a class="html-bibr" data-dcnode-id="6121" href="#B88-sustainability-11-04481" title=""><span data-dcnode-id="6122" instrument_node="">88</span></a><span data-dcnode-id="6120" instrument_node="">] proposal is a form of NIT and focuses on modernizing the Earned Income Tax Credit (EITC). The proposal broadens the eligibility requirements to all workers over 18 and includes childless workers, caregivers, and low-income students. The proposal does not have any explicit environmental considerations.</span></div><div class="html-p" data-dcnode-id="6099"><span data-dcnode-id="6118" instrument_node="">The Federal Job Guarantee Program focuses on achieving full labor employment by providing a job to any individual willing to work at a specified wage. While there is a rich debate between the proponents of this type of “workfare” program [</span><a class="html-bibr" data-dcnode-id="6116" href="#B100-sustainability-11-04481" title=""><span data-dcnode-id="6117" instrument_node="">100</span></a><span data-dcnode-id="6115" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6113" href="#B101-sustainability-11-04481" title=""><span data-dcnode-id="6114" instrument_node="">101</span></a><span data-dcnode-id="6112" instrument_node="">] and the opponents who prefer a UBI [</span><a class="html-bibr" data-dcnode-id="6110" href="#B71-sustainability-11-04481" title=""><span data-dcnode-id="6111" instrument_node="">71</span></a><span data-dcnode-id="6109" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6107" href="#B102-sustainability-11-04481" title=""><span data-dcnode-id="6108" instrument_node="">102</span></a><span data-dcnode-id="6106" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="6104" href="#B103-sustainability-11-04481" title=""><span data-dcnode-id="6105" instrument_node="">103</span></a><span data-dcnode-id="6103" instrument_node="">], the focus here is on the scale of each program and its potential impact on inequality and the environment. When compared with a nation-wide UBI program, the targeted impact of the Jobs for All Act makes it considerably smaller (perhaps serving up to 10% of a developed economy’s labor force during a recession). This reduced scale would limit the environmental impact of the program, which does have an explicit focus on creating jobs with a minimal ecological impact. With regards to inequality, the program’s focus on creating employment opportunities in the areas of health, housing, education, and public infrastructure has the potential to reduce local inequalities but is unlikely to address the larger economy-wide polarization of the workforce and decline of meaningful middle-income jobs. The program also ignores unpaid reproductive and social roles and values people by their ability to earn a living through work [</span><a class="html-bibr" data-dcnode-id="6101" href="#B104-sustainability-11-04481" title=""><span data-dcnode-id="6102" instrument_node="">104</span></a><span data-dcnode-id="6100" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6088"><span data-dcnode-id="6098" instrument_node="">UK Labour’s Inclusive Ownership Fund (IOF) is based on the argument that the financialization of the economy and concentration of corporate/economic ownership has led to the exclusion of workers (financially and politically) from the economy. The proposed plan is intended to provide both workers and society with a direct stake and say in the economy by reshaping the understanding of the firm under a “more pluralistic and inclusive vision” [</span><a class="html-bibr" data-dcnode-id="6096" href="#B105-sustainability-11-04481" title=""><span data-dcnode-id="6097" instrument_node="">105</span></a><span data-dcnode-id="6095" instrument_node="">]. The Labour Party’s plan has no explicit concern for its potential impact on the environment from increased aggregate demand/consumption. Whereas Labour’s IOF proposal places workers first, the Citizen’s Wealth Fund at the center of Lansley and Reed’s [</span><a class="html-bibr" data-dcnode-id="6093" href="#B90-sustainability-11-04481" title=""><span data-dcnode-id="6094" instrument_node="">90</span></a><span data-dcnode-id="6092" instrument_node="">] Fuller Basic Income (FBI) program would provide all British citizens with a direct ownership stake in, and income from, the fund. However, like Labour’s plan, the FBI program has no explicit components that target environmentally-sound investments or consumer spending. The idea of an IOF has also gained traction across the Atlantic, where Bernie Sanders is backing the approach as a way for workers to obtain a greater ownership stake and voice in companies, but the details of his proposal have yet to be articulated [</span><a class="html-bibr" data-dcnode-id="6090" href="#B106-sustainability-11-04481" title=""><span data-dcnode-id="6091" instrument_node="">106</span></a><span data-dcnode-id="6089" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6074"><span data-dcnode-id="6087" instrument_node="">While Yang’s [</span><a class="html-bibr" data-dcnode-id="6085" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="6086" instrument_node="">11</span></a><span data-dcnode-id="6084" instrument_node="">] proposal is based on the need to financially support workers because of technological (capital) displacement, the UBI financing mechanism is not linked to capital ownership. Due to its proven record outside of the U.S., a 10% value added tax (VAT) is considered to be an efficient mechanism to avoid corporate tax aversion. Yang’s [</span><a class="html-bibr" data-dcnode-id="6082" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="6083" instrument_node="">11</span></a><span data-dcnode-id="6081" instrument_node="">] proposal has no explicit link between the growing aggregate demand it would likely generate and the environmental impacts of increased consumption. While Yang’s proposal built on Stern’s [</span><a class="html-bibr" data-dcnode-id="6079" href="#B91-sustainability-11-04481" title=""><span data-dcnode-id="6080" instrument_node="">91</span></a><span data-dcnode-id="6078" instrument_node="">] earlier work, Stern’s UBI proposal presents a broader range of options to fund the basic income, including the idea of developing a common wealth fund based on Peter Barnes’ [</span><a class="html-bibr" data-dcnode-id="6076" href="#B97-sustainability-11-04481" title=""><span data-dcnode-id="6077" instrument_node="">97</span></a><span data-dcnode-id="6075" instrument_node="">] UBI proposal (discussed below). If such a fund were to be established, it would link at least a portion of the UBI to an effort to protect ecosystems in the U.S.</span></div><div class="html-p" data-dcnode-id="6069"><span data-dcnode-id="6073" instrument_node="">The Assured Income [</span><a class="html-bibr" data-dcnode-id="6071" href="#B9-sustainability-11-04481" title=""><span data-dcnode-id="6072" instrument_node="">9</span></a><span data-dcnode-id="6070" instrument_node="">] approach also includes a VAT as a potential revenue stream, along with taxes on unearned income, a carbon dioxide tax, and transaction fees on the trading of securities and derivatives. The monthly payments would be managed by the Social Security Administration (SSA). If a well-designed carbon dioxide tax is implemented, it could incentivize low-carbon investments, directly addressing the fourth environmental concern discussed previously.</span></div><div class="html-p" data-dcnode-id="6061"><span data-dcnode-id="6068" instrument_node="">Hughes’s [</span><a class="html-bibr" data-dcnode-id="6066" href="#B92-sustainability-11-04481" title=""><span data-dcnode-id="6067" instrument_node="">92</span></a><span data-dcnode-id="6065" instrument_node="">] UBI proposal is financed using a tax on high-income earners that would be redistributed among adults earning less than </span><span data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">$</span></span><span data-dcnode-id="6062" instrument_node="">50,000 a year. The approach is based on the rationale that work (and its incentivization) is essential, but it does not consider the possible implications of technology-displaced employment or consider the environmental implications of increasing aggregate demand. Like the NIT, it is a redistribution approach to addressing income needs and inequality.</span></div><div class="html-p" data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">The Alaska Permanent Fund (APF), the American Solidarity Fund (ASF), and the Common Wealth Trust (CWT) proposals provide a useful array of options for financing national funds/trusts. These range from taxing non-renewable resources (APF), to voluntary contributions (combined with a range of other financing options) (ASF), to protecting critical ecosystems by levying fees on corporations for the sustainable use of renewable/non-renewable environmental resources (CWT). When viewed through an environmental lens, it is important to assess both the way the funds/trusts are (1) financed and (2) how the principal of the funds/trusts is invested/managed. In general, it is the profits from the managed investments that will finance a UBI via dividend payments.</span></div><div class="html-p" data-dcnode-id="6054"><span data-dcnode-id="6058" instrument_node="">With regards to the financing of the funds/trusts, the APF and CWT provide two different options that aim to address unsustainable economic activities and promote sustainability. The APF levies a 25% tax on mineral leasing rentals that provides a revenue stream for the fund, which is combined with income generated by the fund’s investments. The fund’s principal may not be spent without approval from Alaskan residents, but its reserve (the realized earnings from investments) can be spent. The financing approach aligns with Herman Daly’s proposal for “taxing the bads, rather than the goods,” and can be used to influence the rate of non-renewable resource extraction. However, there is no explicit consideration of the finite nature of mineral resources or how these could be managed for future generations. In contrast, the CWT proposal addresses these shortcomings. Barnes [</span><a class="html-bibr" data-dcnode-id="6056" href="#B97-sustainability-11-04481" title=""><span data-dcnode-id="6057" instrument_node="">97</span></a><span data-dcnode-id="6055" instrument_node="">] (p. 2) claims that organized common wealth “can help fix the two greatest flaws in contemporary capitalism—its relentless destruction of nature and its equally relentless widening of inequality—while preserving the benefits markets can provide.” By putting critical ecosystems and resources under the management of CWTs, the managers of the funds would be required to protect their assets for future generations and to share current income obtained from their sustainable use. Since no CWTs have been created, specific questions on how these funds would be established and managed have yet to be answered. In addition, since citizens would be free to spend their income as they choose, the CWT proposal would not impact environmental/social problems related to the production and delivery of goods/services from outside of U.S. borders.</span></div><div class="html-p" data-dcnode-id="6049"><span data-dcnode-id="6053" instrument_node="">It can be argued that similar goals (preserving the life-sustaining capacity of the planet and addressing the widening wealth gap) can be achieved by taxing the use of public commons (i.e., the APF approach). Barnes [</span><a class="html-bibr" data-dcnode-id="6051" href="#B97-sustainability-11-04481" title=""><span data-dcnode-id="6052" instrument_node="">97</span></a><span data-dcnode-id="6050" instrument_node="">] (p. 6), however, favors the creation of trust-administered property rights over redistributive taxation on the grounds that property rights tend to endure, whereas fiscal policies can fluctuate with the whims of politics.</span></div><div class="html-p" data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">With regards to investing the principal of the funds/trusts, the APF, ASF, and CWT present three approaches—(1) maximizing the return with no explicit concern for sustainable development (e.g., the APF); (2) maximizing the return, but without investing in firms engaged in human rights violations or environmental destruction (e.g., the ASF); and (3) maximizing the return, but with investments that focus on the sustainable use of resources for present and future generations (e.g., the CWT). The second approach is used by Norway to guide its sovereign wealth fund investments. The third approach has the potential to significantly advance the sustainable management of resources, but it is not clear how the principal of the CWT would be invested.</span></div><div class="html-p" data-dcnode-id="6036"><span data-dcnode-id="6046" instrument_node="">The final approach listed in </span><a class="html-table html-tablepopup" data-dcnode-id="6044" href="#table_body_display_sustainability-11-04481-t001"><span data-dcnode-id="6045" instrument_node="">Table 1</span></a><span data-dcnode-id="6043" instrument_node=""> is based on Robert Ashford’s approach to inclusive capitalism. This approach to addressing inequality and advancing sustainability has similarities with several of the other approaches, but it also has significant differences. (1) Whereas the other strategies are based on what might be called the range of mainstream economic theories of growth, efficiency, and fuller employment, the inclusive capitalism approach is based on binary economics, which presently is not widely reflected in mainstream economics. As explained more fully below, binary economics adds a more nuanced understanding of growth, efficiency, and fuller employment by focusing on the distribution of capital acquisition with the </span><span class="html-italic" data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">future</span></span><span data-dcnode-id="6040" instrument_node=""> earnings of capital. (2) Consequently, only the inclusive capitalism approach recognizes the principle of binary growth (discussed below). (3) All of the other approaches require either redistribution from (or dilution of) existing wealth (including claims acquisition) or the distribution of public wealth (as in the case of the APF); whereas the more broadly distributed capital income associated with binary growth does not require redistribution. (4) As a further consequence, these other solutions compete with one another for the resources needed to supplement existing labor and welfare claims. In contrast, because it is premised on </span><span class="html-italic" data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">additional</span></span><span data-dcnode-id="6037" instrument_node=""> wealth creation incentivized by the broader distribution of capital acquisition, the inclusive capitalism approach does not require redistribution of existing wealth or distribution of public wealth, and is therefore an add-on, not a competitive alternative, to the other approaches. Rather than subtracting from the growth in wealth available for the other approaches, it adds to it.</span></div><div class="html-p" data-dcnode-id="6031"><span data-dcnode-id="6035" instrument_node="">The principle of binary growth distinguishes binary economics as a distinct paradigm for understanding market economics. The principle provides a theoretical foundation for structuring a private-property system that will tend to broaden rather than concentrate capital ownership and thereby produce enhanced earning capacity for poor and middle class people, greater and more broadly shared prosperity, and enhanced levels of sustainable growth [</span><a class="html-bibr" data-dcnode-id="6033" href="#B107-sustainability-11-04481" title=""><span data-dcnode-id="6034" instrument_node="">107</span></a><span data-dcnode-id="6032" instrument_node="">] (p. 26).</span></div><div class="html-p" data-dcnode-id="6026"><span data-dcnode-id="6030" instrument_node="">To explain the fuller employment and per-capita growth potential of broadening capital acquisition with the earnings of capital, binary economists focus on the distinction between productivity and productiveness. Productivity is a ratio of all factors of production divided by one factor, usually labor; whereas, retroactively productiveness means “work done” and prospectively means “productive capacity” [</span><a class="html-bibr" data-dcnode-id="6028" href="#B98-sustainability-11-04481" title=""><span data-dcnode-id="6029" instrument_node="">98</span></a><span data-dcnode-id="6027" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">Although most people believe that the primary role of capital in contributing to per-capita economic growth is to increase labor productivity, there is another (binary) way to understand the primary role of capital: to do an increasing portion of the total work done. According to the widely shared perception, per-capita growth might be understood by considering the work of moving products (food, consumer goods, etc.) between points A to B. For illustration purposes, consider the ability of one person to move one unit of product between points A and B in a day, 100 units with the help of a horse, and 10,000 units with a truck. From a binary perspective, the horse and truck are doing more than enabling the person to do more work; they are doing more of the total work (the same can be said for any capital employed in production). Thus, per-capita growth can be understood as capital increasing labor productivity (mainstream view), or as capital doing an ever-increasing portion of the total work done (binary economics view). Through the lens of productiveness, binary economists believe that in a modern industrialized economy (1) capital, not labor, is doing most of the additional work and is thereby creating most of the additional wealth and (2) capital ownership (if broadly acquired) is capable of distributing much more income than can be achieved through wages alone.</span></div><div class="html-p" data-dcnode-id="6022"><span data-dcnode-id="6023" instrument_node="">Now consider what happens in the above example if an automated truck (with no driver) moves the product from point A to B. In this case, all of the physical work of moving the product is being done by capital. In this scenario, many (if not most) economists typically point to (1) the creation of new jobs (e.g., those in the automated vehicle management center, the jobs for software programmers needed to continually update/advance the automated-driving software, etc.), and (2) the additional jobs that may be created as a consequence of the economy-wide increase in productivity. However, this argument fails to address what is really happening at the task level. With driverless trucks, the physical work of moving a product from point A to B is being done entirely by capital. While such a transformation will certainly create some new jobs in the automated transportation and robotics industries, focusing on these new jobs (that have different task categories) ignores that the specific task of moving a product from point A to B is no longer linked to income from wages. Instead, the only way income can be distributed from this task without redistribution is via a capital ownership stake in the automated truck. Note also that the typical “new-jobs” and “more jobs” response fails to address the income distribution consequences that flow from the fact that labor’s contribution to total production has decreased and capital’s contribution has increased. Now consider what happens if this simple example is extrapolated to specific routine manual and cognitive tasks across the entire economy that have or could be displaced by capital. Consider also the fact that the number of jobs displaced from specific tasks (e.g., driving trucks, providing services at truck service stations, etc.) are rarely replaced by an equivalent number of new jobs (e.g., in the automated truck sector). There is also the critical question of whether a displaced worker can transition into any of the new jobs that may become available in an increasingly-polarized workforce.</span></div><div class="html-p" data-dcnode-id="6017"><span data-dcnode-id="6021" instrument_node="">The binary economics view of economic growth has profound implications regarding how people can most efficiently participate and share in economic growth. Conventional economists assume that the gains for most people must come via more jobs and higher wages, lower prices for goods and services, and welfare redistribution—all functions of labor productivity. Binary economists see far greater potential for most people via the broader distribution of capital acquisition with the future earnings of capital. They argue that if the effect of technological innovation is to both replace and vastly supplement the work of labor with increasingly productive capital, and thereby reduce the contribution of labor to production while increasing the contribution of capital, then the preservation and enhancement of individual earning capacity and optimization of growth in a market economy requires practical market mechanisms that enable all people to acquire a share of this growing capital productiveness [</span><a class="html-bibr" data-dcnode-id="6019" href="#B107-sustainability-11-04481" title=""><span data-dcnode-id="6020" instrument_node="">107</span></a><span data-dcnode-id="6018" instrument_node="">] (p. 34). Like well-capitalized people, everyone needs the competitive opportunity to acquire capital, not merely with the earnings of labor, but also increasingly with the earnings of capital. According to Robert Ashford, a widespread understanding of the principle of binary growth will enable market participants, by way of non-redistributive, voluntary transactions, to do exactly that.</span></div><div class="html-p" data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">If the basic premise of binary economics—that a broader distribution of capital acquisition provides the rational expectation of more broadly distributed capital income (and consumer demand) in future years and therefore greater market incentives for the fuller employment of labor and capital (and economic growth) in earlier years—is valid, it has implications that either do not follow from conventional economic analysis or may significantly vary from it. Several of these implications are that this premise provides:</span></div><div class="html-p" data-dcnode-id="5989"><ul class="html-order" data-dcnode-id="5990"><li data-dcnode-id="6012"><div class="html-p" data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">an additional approach to fuller employment and per-capita growth;</span></div></li><li data-dcnode-id="6009"><div class="html-p" data-dcnode-id="6010"><span data-dcnode-id="6011" instrument_node="">an additional approach to enhancing the earnings of poor and middle-class people in the age of automation/AI beyond minimum wage legislation, government jobs programs, and guaranteed minimum income (financed via redistribution mechanisms);</span></div></li><li data-dcnode-id="6006"><div class="html-p" data-dcnode-id="6007"><span data-dcnode-id="6008" instrument_node="">a means to reduce the need for welfare distribution;</span></div></li><li data-dcnode-id="6003"><div class="html-p" data-dcnode-id="6004"><span data-dcnode-id="6005" instrument_node="">an additional approach to environmental sustainability by (a) making greener technologies and regulations more affordable and politically achievable and (b) targeting ownership-broadening financing so as to promote the production of inherently sustainable goods and services;</span></div></li><li data-dcnode-id="6000"><div class="html-p" data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">an additional approach to development and foreign assistance;</span></div></li><li data-dcnode-id="5997"><div class="html-p" data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">an additional approach to globalization;</span></div></li><li data-dcnode-id="5994"><div class="html-p" data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">an additional approach to privatization; and</span></div></li><li data-dcnode-id="5991"><div class="html-p" data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">a means to reduce the need for economic immigration.</span></div></li></ul></div><div class="html-p" data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node="">The present market approach to capital acquisition (which limits capital acquisition primarily in proportion to the existing distribution of wealth) constitutes a major obstacle to sustainability for several reasons, including the following: (1) market prices and the regulatory system do not sufficiently internalize the negative externalities of unsustainable production and consumption nor the positive effects of sustainable ones, especially in the long run; (2) limiting capital acquisition of increasingly capital intensive production primarily to people in proportion to the existing distribution of wealth needlessly deprives most people the competitive opportunity to acquire capital earning capacity thereby making greener technologies less affordable; and (3) conversely, broadening capital acquisition with the earnings of capital renders greener technology more affordable and investment in them more profitable, while reducing the perceived conflict between sustainability and labor employment. Thus, broadening capital acquisition with the earnings of capital on the corporate level, and consequently on the individual shareholder level to increase both individual earning capacity and corporate investment in inherently sustainable goods and services, is thus a crucial endeavor of sustainable development.</span></div><div class="html-p" data-dcnode-id="5970"><span data-dcnode-id="5986" instrument_node="">Inherently sustainable goods and services can be defined as those which exploit renewable resources “on a profit-maximizing sustained yield basis” [</span><a class="html-bibr" data-dcnode-id="5984" href="#B108-sustainability-11-04481" title=""><span data-dcnode-id="5985" instrument_node="">108</span></a><span data-dcnode-id="5983" instrument_node="">] (p. 45). Further, the use of replenishable (i.e., non-living) forms of natural capital (e.g., groundwater and the ozone layer) should not exceed their rates of replenishment or recharge [</span><a class="html-bibr" data-dcnode-id="5981" href="#B109-sustainability-11-04481" title=""><span data-dcnode-id="5982" instrument_node="">109</span></a><span data-dcnode-id="5980" instrument_node="">]. The use of nonrenewable resources should be minimized and used in cradle-to-cradle (closed loop, circular economy) systems [</span><a class="html-bibr" data-dcnode-id="5978" href="#B110-sustainability-11-04481" title=""><span data-dcnode-id="5979" instrument_node="">110</span></a><span data-dcnode-id="5977" instrument_node="">]. Such fundamental principles could be incorporated into a government-backed set of criteria for inherently sustainable goods and services, which could provide important market signals in much the same way as the U.S. ENERGY STAR system. With bank loans secured by private capital credit insurers, ownership-broadening trusts (Binary Trusts) could invest (on behalf of designated beneficiaries) in common stock voluntarily issued by companies that are advancing inherently sustainable forms of development. The trust could go one step beyond Norway’s list of excluded companies [</span><a class="html-bibr" data-dcnode-id="5975" href="#B111-sustainability-11-04481" title=""><span data-dcnode-id="5976" instrument_node="">111</span></a><span data-dcnode-id="5974" instrument_node="">] by reviewing investments using lifecycle assessment and other accepted forms of sustainability analysis. In addition, the trust could finance the growth of employee-owned B Corporations that frequently outperform investor-controlled corporations from an environmental and social perspective [</span><a class="html-bibr" data-dcnode-id="5972" href="#B112-sustainability-11-04481" title=""><span data-dcnode-id="5973" instrument_node="">112</span></a><span data-dcnode-id="5971" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5968"><span data-dcnode-id="5969" instrument_node="">Point 4(b) above directly focuses on the growth that an inclusive capitalism approach would generate from the development of inherently sustainable goods and services. Financing a transition to sustainability in this way would result in citizens/residents having a direct ownership stake (and voting rights) in the future (sustainable) economy, which could also have a powerful educational and economic democracy value. We believe that directly linking investment, more broadly distributed ownership, and spending on the consumption of the inherently sustainable goods and services created provides an alternative development paradigm that can grow to replace unsustainable production and consumption systems.</span></div></section><section data-dcnode-id="5902" id="sec3-sustainability-11-04481" type=""><h2 data-dcnode-id="5965" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5966" instrument_node=""> 3. An Integrated and Environmentally Sustainable Approach to Providing a UBI</span></h2><div class="html-p" data-dcnode-id="5960"><span data-dcnode-id="5964" instrument_node="">As advanced in this paper, inclusive capitalism based on binary economics recognizes that knowledge (i.e., technology) reflected in the understanding, training, and skills of people enables them to work more productively. It also recognizes the far greater ability of technology embedded in capital to do an ever-greater share of the work. This recognition mirrors Yang’s [</span><a class="html-bibr" data-dcnode-id="5962" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="5963" instrument_node="">11</span></a><span data-dcnode-id="5961" instrument_node="">] thesis of the major driving forces of inequality and technology’s ability to claim in market transactions an ever-greater share of the value being created for those who own the capital. But in contrast to Yang, inclusive capitalism makes available to people (with little or no capital) the voluntary process of capital acquisition of, and thereby ownership in, the very technologies that are displacing workers the principle mechanism for addressing inequality. The IOF, APF, ASF, and the CWTs also have capital ownership as a core or supplemental part of their UBI, with or without explicit citizen/resident ownership of the capital/shares. In contrast to these funds/trusts, inclusive capitalism trusts (Binary Trusts) could invest in inherently sustainable goods and services in a way that would provide citizens/residents with ownership of, and a future income stream (dividend payment) from, these investments. By limiting the opportunity of ownership-broadening binary financing to sustainable production, this approach would create a structural change to investment that specifically encourages and promotes the development of more sustainable products and services. Put differently, the approach would begin to close the production, distribution, and consumption loop and generate future markets for inherently sustainable goods and services. The investment decision makers working for Binary Trusts would need to be able to integrate knowledge relating to corporate finance, green/sustainable engineering, environmental/ecosystem science, etc., and be highly competent with a broad array of environmental assessments techniques, such as life cycle analysis (LCA) and environmental/sustainability certification schemes.</span></div><div class="html-p" data-dcnode-id="5946"><span data-dcnode-id="5959" instrument_node="">The Binary Trusts would be private entities that would act independently from government. The institutions that can be used most effectively to competitively acquire capital with the earnings of capital in an ownership-broadening way are (1) the largest three thousand or so credit-worthy corporations (roughly comprising the Russell Index) working cooperatively with (2) professional Binary Trust fiduciaries (such as Fidelity, T. Rowe Price, TIAA-CREF, and Vanguard), (3) private lenders, and (4) private capital credit insurers. The capital acquisition approach would work as follows [</span><a class="html-bibr" data-dcnode-id="5957" href="#B113-sustainability-11-04481" title=""><span data-dcnode-id="5958" instrument_node="">113</span></a><span data-dcnode-id="5956" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5954" href="#B114-sustainability-11-04481" title=""><span data-dcnode-id="5955" instrument_node="">114</span></a><span data-dcnode-id="5953" instrument_node="">]. First, corporations that meet the government-backed inherently sustainable criteria would need to decide to finance their growth by selling common shares to a Binary Trust. This corporate decision would be based on an expectation that (1) the binary growth mechanism presents the best long-term growth potential for the corporation when compared with all other corporate finance options and (2) any financing received from the Binary Trust would provide a powerful market signal that the corporation is investing inclusively and sustainably. After a corporation makes this decision, the Binary Trust would then need to decide whether to purchase the shares (with bank loans secured by private capital credit insurers) and, in doing so, certify that the corporation’s planned growth (1) conforms with the established criteria for investing in inherently sustainable development and (2) is in the best interest of the Trust’s beneficiaries. Likewise, private lenders and capital credit insurers would need to be satisfied that the loans and insurance needed to finance the corporate capital acquisition are the best use of their available resources. This process of ownership-broadening binary financing is driven by market incentives with the winners being (1) the most competitive corporations seeking to advance sustainable production and consumption systems, (2) the Binary Trusts and their beneficiaries who will receive an income earned from these emerging systems, and (3) the lenders and capital credit insurers earning the best returns from their lending and insuring decisions, respectively. Thus, although the government would determine the sustainability standards needed to qualify for ownership-broadening financing, private decision-making subject to competitive market forces (not government) would determine the winners and losers in the financing and provision of goods and services and the resultant distribution of ownership and income. A more detailed description of ownership broadening financing based on binary economics can be found in [</span><a class="html-bibr" data-dcnode-id="5951" href="#B70-sustainability-11-04481" title=""><span data-dcnode-id="5952" instrument_node="">70</span></a><span data-dcnode-id="5950" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5948" href="#B114-sustainability-11-04481" title=""><span data-dcnode-id="5949" instrument_node="">114</span></a><span data-dcnode-id="5947" instrument_node="">].</span></div><div class="html-p" data-dcnode-id="5932"><span data-dcnode-id="5945" instrument_node="">A valuable feature of a binary economics approach to inclusive capitalism is that it does not exclude the use of other financing mechanisms to provide a basic income—as mentioned previously, it adds to wealth. In fact, during the launch of an inclusive capitalism UBI program, other mechanisms may be required to ensure the agreed upon basic income can be paid to citizens while the capital invested by a Binary Trust pays for itself out of its future earnings. </span><a class="html-fig html-figpopup" data-dcnode-id="5943" href="#fig_body_display_sustainability-11-04481-f006"><span data-dcnode-id="5944" instrument_node="">Figure 6</span></a><span data-dcnode-id="5942" instrument_node=""> provides a visualization of this mechanism. For the purposes of this example, let’s assume that the agreed upon basic income will be </span><span data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">$</span></span><span data-dcnode-id="5939" instrument_node="">1000 per month for every citizen over the age of 18—i.e., Yang’s [</span><a class="html-bibr" data-dcnode-id="5937" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="5938" instrument_node="">11</span></a><span data-dcnode-id="5936" instrument_node="">] proposed amount. During the Investment Phase, 100% of the basic income could be paid for via a 10% VAT combined with a consolidation of certain welfare programs. During this same period, the Binary Trust would begin the process of purchasing special full-dividend common shares from creditworthy corporations that are seeking capital to invest in inherently sustainable goods or services. These shares would be paid for with a bank loan to the Binary Trust, which is insured by a private capital credit insurer and a government reinsurer. Robert Ashford [</span><a class="html-bibr" data-dcnode-id="5934" href="#B99-sustainability-11-04481" title=""><span data-dcnode-id="5935" instrument_node="">99</span></a><span data-dcnode-id="5933" instrument_node="">] (p. 20) explains that “once the capital acquisition loan repayment obligations are met, the full net capital earnings (net of reserves for depreciation, research, and development) would be paid to [… citizens] to help enable them to meet their needs and wants and to provide the basis for increased investment and production.” For example, if the expected timeframe for capital to pay for its acquisition cost (i.e., repay its acquisition debt obligations) out of its future earnings is between five and seven years, then (depending on the loans terms) the Binary Trust might make no contribution to the UBI payment during the initial Investment Phase (i.e., the capital cost repayment period).</span></div><div class="html-fig-wrap" data-dcnode-id="5914" id="sustainability-11-04481-f006"><span data-dcnode-id="5931" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="5922"><span data-dcnode-id="5930" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="5924" href="#fig_body_display_sustainability-11-04481-f006"><span data-dcnode-id="5929" instrument_node="">

Providing a universal basic income (UBI) by integrating financing mechanisms. Note: This figure shows how, during the Investment Phase, the process of capital acquisition can be employed to (1) first acquire capital with capital credit repaid with its earnings and (2) progressively replace redistributed income used to initially fund the UBI during the Investment and Transition Phases.

</span></div><span data-dcnode-id="5915" instrument_node="">
</span></div><div class="html-p" data-dcnode-id="5909"><span data-dcnode-id="5913" instrument_node="">During the Investment Phase and into the future, each year the Binary Trust would make a certain number (N) of investments which, if successful (net of investment losses), would pay for themselves with the future earnings of capital, growing the share of the UBI that could be covered by this financing mechanism. The Transition Phase begins the moment the Binary Trust-based financing mechanism has satisfied its obligations to repay the acquisition costs of a particular investment and starts to pay citizens an income from their share of the newly acquired capital managed by the Binary Trust. As the scale of Binary Trust investments grow, the share of the UBI covered by this financing mechanism would also grow as indicated conceptually in </span><a class="html-fig html-figpopup" data-dcnode-id="5911" href="#fig_body_display_sustainability-11-04481-f006"><span data-dcnode-id="5912" instrument_node="">Figure 6</span></a><span data-dcnode-id="5910" instrument_node="">. During this same period, the taxes used to finance the UBI during the Investment Phase could be reduced or the funds collected and not allocated to the UBI could be used to support other government initiatives.</span></div><div class="html-p" data-dcnode-id="5907"><span data-dcnode-id="5908" instrument_node="">Finally, during the Capital Income Phase the majority or all of the UBI would be provided to citizens from the dividend payments they receive from capital, with the tax-based UBI financing mechanism making up for any shortfall.</span></div><div class="html-p" data-dcnode-id="5905"><span data-dcnode-id="5906" instrument_node="">Of course, depending on the loan terms of specific ownership-broadening financings, in any year in which the Binary Trust’s income exceeds that year’s annual acquisition debt repayment obligation, trust income could be distributed in that year to the beneficiaries. Thus, the Transition Phase could begin years before the acquisition loan is fully repaid.</span></div><div class="html-p" data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">The above example outlines an inclusive capitalism approach to providing a UBI that is (1) grounded on an economic theory that explains the powerful role of technology in the modern economy, (2) provides citizens with a direct capital ownership stake in, and income (via dividend payments) from, the future growth of the economy, and (3) incentivizes investment in inherently sustainable goods and services. If the income received from capital were then spent on the inherently sustainable goods and services, this would create a circular flow of money and provide more incentives for corporations to finance their growth using the Binary Trust, furthering efforts to incentivize sustainability investments. This integrated approach presents a promising mechanism to realize the massive and targeted investments needed to transition to low-carbon technology and address other critical environmental challenges.</span></div></section><section data-dcnode-id="5893" id="sec4-sustainability-11-04481" type="conclusions"><h2 data-dcnode-id="5900" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5901" instrument_node=""> 4. Conclusions</span></h2><div class="html-p" data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">This paper explores the major drivers to income/wealth inequality and presents modern technology/AI as an emerging force that is likely to continue intensifying the rate at which capital is driving productivity at the expense of labor. Given the growing concern at increasing levels of inequality in many nations, the idea of providing a universal basic income (UBI) is gaining traction. However, few approaches (1) are based on an economic theory that helps explain the growing inequality, (2) highlight the potential environmental problems that a UBI might create with regard to growing effective (aggregate) demand/consumerism, and (3) present a voluntary way to finance a transition towards sustainable production and consumption.</span></div><div class="html-p" data-dcnode-id="5896"><span data-dcnode-id="5897" instrument_node="">This paper reviews a broad range of proposals for providing a UBI and highlights how they rationalize the need for a basic income, how each proposal would work, and whether there is any attempt to connect the approach with strategies to advance sustainable development. Proposals that finance a UBI without considering the consumption-related environmental impacts from increasing effective demand or how the approach will enable a transition to sustainability present only a partial, non-integrated solution to the economic inequality and sustainability challenge. </span></div><div class="html-p" data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">To address this problem, the approach to inclusive capitalism advanced by Robert Ashford, premised on binary economics, is presented as a promising way to reduce economic inequality and advance sustainability. In contrast with the other proposals, an inclusive capitalism approach could be used to invest in inherently sustainable goods and services in a way that would provide citizens with ownership of, and a future income stream (dividend payment) from, these investments. This approach would begin to close the production, distribution, and consumption loop and generate future markets for inherently sustainable goods and services. Further, the flexibility of the approach means that it not only could be applied without significant disruption to existing and proposed mechanisms for addressing inequality, but also has the potential to profitably supplement, reduce, and replace reliance on these approaches as the extent of capital ownership and income received from this ownership grows. Because the income benefits of the inclusive capitalism approach would be distributed through the property system, the approach may be less vulnerable to the politics of changing administrations, which could easily reduce or halt any UBI program based on tax revenue.</span></div></section><span data-dcnode-id="5892" instrument_node="">

2019, Waterloo, Canada. The paper also draws on analysis in [</span><a class="html-bibr" data-dcnode-id="5874" href="#B8-sustainability-11-04481" title=""><span data-dcnode-id="5875" instrument_node="">8</span></a><span data-dcnode-id="5873" instrument_node="">]. Finally, we are grateful to the anonymous reviewers who helped advance the scope and content of the paper.</span></div></section><section class="html-notes" data-dcnode-id="5866"><h2 data-dcnode-id="5869" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5870" instrument_node="">Conflicts of Interest</span></h2><div class="html-p" data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">The authors declare no conflict of interest.</span></div></section><section data-dcnode-id="5507"><section data-dcnode-id="5508" id="app1-sustainability-11-04481" type=""><h2 data-dcnode-id="5864" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5865" instrument_node=""> Appendix A</span></h2><div class="html-table-wrap" data-dcnode-id="5846" id="sustainability-11-04481-t0A1"><div class="html-table_wrap_discription" data-dcnode-id="5859"><span data-dcnode-id="5863" instrument_node="">
