</span><table data-dcnode-id="5511"><thead data-dcnode-id="5826"><tr data-dcnode-id="5827"><th align="left" class="html-align-left" data-dcnode-id="5836" style="border-top:solid thin;border-bottom:solid thin" valign="middle"><span data-dcnode-id="5837" instrument_node="">Scheme/Program</span></th><th align="left" class="html-align-left" data-dcnode-id="5834" style="border-top:solid thin;border-bottom:solid thin" valign="middle"><span data-dcnode-id="5835" instrument_node="">Financing Mechanism</span></th><th align="left" class="html-align-left" data-dcnode-id="5832" style="border-top:solid thin;border-bottom:solid thin" valign="middle"><span data-dcnode-id="5833" instrument_node="">Income/Money Flow</span></th><th align="left" class="html-align-left" data-dcnode-id="5830" style="border-top:solid thin;border-bottom:solid thin" valign="middle"><span data-dcnode-id="5831" instrument_node="">Comments</span></th><th align="left" class="html-align-left" data-dcnode-id="5828" style="border-top:solid thin;border-bottom:solid thin" valign="middle"><span data-dcnode-id="5829" instrument_node="">Environmental Aspects</span></th></tr></thead><tbody data-dcnode-id="5513"><tr data-dcnode-id="5812"><td align="left" class="html-align-left" data-dcnode-id="5821" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5825" instrument_node="">A Negative Income Tax (NIT) (inspired by Milton Friedman [</span><a class="html-bibr" data-dcnode-id="5823" href="#B87-sustainability-11-04481" title=""><span data-dcnode-id="5824" instrument_node="">87</span></a><span data-dcnode-id="5822" instrument_node="">])</span></td><td align="left" class="html-align-left" data-dcnode-id="5819" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5820" instrument_node="">A Negative Income Tax (NIT) system would tax individuals earning an income above a specified income threshold and redistribute this income to individuals earning less than the threshold. The amount of taxes paid or received would depend on the tax rates and how far an individual’s income falls above or below the threshold, respectively.</span></td><td align="left" class="html-align-left" data-dcnode-id="5817" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5818" instrument_node="">An income would only be received by individuals whose income falls below a specified income threshold. The amounts received would vary by individual.</span></td><td align="left" class="html-align-left" data-dcnode-id="5815" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5816" instrument_node="">If implemented following Friedman’s approach, the NIT would be designed to replace all welfare and assistance programs, with the specified income threshold set at a level that would still encourage people to work.</span></td><td align="left" class="html-align-left" data-dcnode-id="5813" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5814" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5783"><td align="left" class="html-align-left" data-dcnode-id="5807" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5811" instrument_node="">Cost of Living Refund [</span><a class="html-bibr" data-dcnode-id="5809" href="#B88-sustainability-11-04481" title=""><span data-dcnode-id="5810" instrument_node="">88</span></a><span data-dcnode-id="5808" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5805" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5806" instrument_node="">Modernization of the Earned Income Tax Credit (EITC) (also known as the Working Families Tax Credit)</span></td><td align="left" class="html-align-left" data-dcnode-id="5791" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5804" instrument_node="">Single people earning less than </span><span data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">$</span></span><span data-dcnode-id="5801" instrument_node="">50,000 a year would receive </span><span data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">$</span></span><span data-dcnode-id="5798" instrument_node="">4000 per year. Married couples earning less than </span><span data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">$</span></span><span data-dcnode-id="5795" instrument_node="">90,000 a year would receive </span><span data-dcnode-id="5793"><span data-dcnode-id="5794" instrument_node="">$</span></span><span data-dcnode-id="5792" instrument_node="">8000 per year. The payments can also be received monthly.</span></td><td align="left" class="html-align-left" data-dcnode-id="5786" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5790" instrument_node="">Over the past several years, a broad range of legislation has been proposed to modernize the EITC [</span><a class="html-bibr" data-dcnode-id="5788" href="#B115-sustainability-11-04481" title=""><span data-dcnode-id="5789" instrument_node="">115</span></a><span data-dcnode-id="5787" instrument_node="">]. The Cost of Living Refund approach builds on these proposals and targets low-income and middle-class families by broadening eligibility to all workers aged 18+, including “childless” workers, and expanding the definition of work to include family caregivers and low-income students.</span></td><td align="left" class="html-align-left" data-dcnode-id="5784" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5785" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5772"><td align="left" class="html-align-left" data-dcnode-id="5781" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5782" instrument_node="">Federal Job Guarantee Program (H.R. 1000−Jobs for All Act−submitted to the 116th U.S. Congress)</span></td><td align="left" class="html-align-left" data-dcnode-id="5779" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5780" instrument_node="">A National Full Employment Trust Fund (NFETF) would be held in the U.S. Treasury and funds would be appropriated to the NFETF from three sources (Sec. 102(1–3)): (1) revenues generated from a financial transaction tax (FTT); (2) funds from the Federal Unemployment Trust Fund that would have been provided to an unemployed individual if they were not participating in the proposed guarantee job program; and (3) an amount equal to the FICA (Federal Insurance Contributions Act), Medicare, and personal income taxes paid by participants in the proposed guarantee job program on their program earnings. Loans can also be made to the NFETF from the Federal Reserve to make up for any shortfall in the program, but these would need to be repaid (with interest equivalent to the return on 10-year Treasury bonds) over ten years unless the Federal Reserve decides that canceling the loans would have no negative effects on the economy.</span></td><td align="left" class="html-align-left" data-dcnode-id="5777" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5778" instrument_node="">The Federal Job Guarantee Program would prioritize the award of Employment Opportunity Grants to projects that provide affordable housing, childcare, transportation, and job training in areas with the greatest economic need. Participants enrolled in a work program would receive compensation that is comparable to public sector employees undertaking similar work (or work of comparable worth) in the geographic region of the program participant (Sec. 305(1)(D)). Participants enrolled in a job-training program would be eligible for a cost-of-living stipend set by standards established by the Secretary of Labor (Sec. 305(2)(A)).</span></td><td align="left" class="html-align-left" data-dcnode-id="5775" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5776" instrument_node="">The Jobs for all Act is based on the premise of the ‘right to work,’ whereas the other strategies included in this analysis primarily focus on ways to provide income support in the context of growing inequality. Of course, such support could help realize the human right to food, housing, healthcare, etc.In the context of this paper, a critical question is how resistant the jobs created by such a program would be to technological displacement?</span></td><td align="left" class="html-align-left" data-dcnode-id="5773" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5774" instrument_node="">The Federal Job Guarantee Program would require that all funded projects be carried out “in a manner that is as ecologically sustainable as is reasonably possible” (Sec. 304(10)). While a necessary requirement to limit the environment impacts of the program, the scale of the number of jobs created is unlikely to have a significant impact on the environmental performance of the U.S. economy.</span></td></tr><tr data-dcnode-id="5758"><td align="left" class="html-align-left" data-dcnode-id="5767" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5771" instrument_node="">UK Labour−Inclusive Ownership Fund (IOF) [</span><a class="html-bibr" data-dcnode-id="5769" href="#B89-sustainability-11-04481" title=""><span data-dcnode-id="5770" instrument_node="">89</span></a><span data-dcnode-id="5768" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5765" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5766" instrument_node="">Companies with 250 or more employees would create an “inclusive ownership fund” (IOF) and transfer at least 1% of their ownership to this fund each year, up to a maximum of 10%. Smaller firms could set-up an IOF on a voluntary basis. The IOFs would be held and managed collectively, and shares would be non-tradeable. Fund representatives would have voting rights in a companies’ decision-making processes.</span></td><td align="left" class="html-align-left" data-dcnode-id="5763" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5764" instrument_node="">Workers in a firm with an IOF could receive up to £500 per month, after which any remaining dividends would be paid into a national fund to support public services and welfare programs.</span></td><td align="left" class="html-align-left" data-dcnode-id="5761" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5762" instrument_node="">The IOF scheme was proposed by the UK Labour Party in 2018. If implemented, the scheme could benefit 10.7 million people (40% of the private sector workforce).</span></td><td align="left" class="html-align-left" data-dcnode-id="5759" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5760" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5744"><td align="left" class="html-align-left" data-dcnode-id="5753" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5757" instrument_node="">Lansley and Reed’s [</span><a class="html-bibr" data-dcnode-id="5755" href="#B90-sustainability-11-04481" title=""><span data-dcnode-id="5756" instrument_node="">90</span></a><span data-dcnode-id="5754" instrument_node="">] Partial Basic Income (PBI) Proposal in the UK</span></td><td align="left" class="html-align-left" data-dcnode-id="5751" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5752" instrument_node="">The Partial Basic Income (PBI) program is estimated to cost about £300.2 billion per year, of which £118.2 billion would be covered by eliminating child benefit payments and state pensions and reducing means-tested benefits. The remaining £182 billion would come from eliminating personal allowance payments and increased national insurance and income tax rates.</span></td><td align="left" class="html-align-left" data-dcnode-id="5749" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5750" instrument_node="">Every British citizen would receive a weekly tax-free payment of £40 for those younger than 17 (£2080 annually), £60 for those aged 18–64 (£3120 annually), and £175 for people older than 65 (£9100 annually). Couples under 65 would receive £120 per week (£6240 annually), couples with one child would receive £160 (£8320 annually), and couples with two children would receive £200 (£10,400 annually).</span></td><td align="left" class="html-align-left" data-dcnode-id="5747" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5748" instrument_node="">The PBI program is designed to be revenue neutral, making it an implementable first step towards a Fuller Basic Income (FBI) program (see below). It is also designed to make the tax system more progressive.</span></td><td align="left" class="html-align-left" data-dcnode-id="5745" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5746" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5730"><td align="left" class="html-align-left" data-dcnode-id="5739" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5743" instrument_node="">Lansley and Reed’s [</span><a class="html-bibr" data-dcnode-id="5741" href="#B90-sustainability-11-04481" title=""><span data-dcnode-id="5742" instrument_node="">90</span></a><span data-dcnode-id="5740" instrument_node="">] Fuller Basic Income (FBI) Proposal in the UK</span></td><td align="left" class="html-align-left" data-dcnode-id="5737" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5738" instrument_node="">The Fuller Basic Income (FBI) program would build on the PBI (discussed above) and increase the weekly payments. The additional £26 billion a year needed to provide the higher weekly payments would come from a Citizen’s Wealth Fund created at the start of the PBI program, which would take some 20 years to reach maturity and start payments. The fund could be developed by transferring a range of existing commercial and public assets and profitable state-owned enterprises into the fund, one-off taxes on windfall profits, payments from corporations for the use of personal data, and increased taxation on wealth. In addition, large corporations could issue 0.5% of new shares annually that would pay directly into the fund, up to a maximum of 10% over 20 years (an approach that is similar to the IOF discussed above). It is estimated that the fund would need to reach £650 billion to provide the £26 billion needed for the higher basic income payments. The fund would be managed with a long-term investment horizon and kept in trust in perpetuity. All British citizens would have a direct ownership stake in the fund.</span></td><td align="left" class="html-align-left" data-dcnode-id="5735" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5736" instrument_node="">The FBI program would increase the PBI weekly payments. Every British citizen would receive a weekly tax-free payment of £50 for those younger than 17 (£2600 annually), £80 for those aged 18-64 (£4160 annually), and £180 for people older than 65 (£9360 annually). Couples under 65 would receive £160 per week (£8320 annually), couples with one child would receive £210 (£10,920 annually), and couple of two children would receive £260 (£13,520 annually).</span></td><td align="left" class="html-align-left" data-dcnode-id="5733" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5734" instrument_node="">The FBI program’s focus on capital ownership is intended to provide all British citizens with a stake in the future of the economy. The independence of the Citizen’s Wealth Fund from the state is considered as necessary to protect the fund from government interference and provide greater income security, independent of government, to future generations. Interestingly, the fund’s ownership of corporate shares is considered as one way for citizens to financially gain from job-displacing productivity growth from AI/automation (see the discussion below on binary economics).</span></td><td align="left" class="html-align-left" data-dcnode-id="5731" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5732" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5701"><td align="left" class="html-align-left" data-dcnode-id="5725" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5729" instrument_node="">Andy Stern’s [</span><a class="html-bibr" data-dcnode-id="5727" href="#B91-sustainability-11-04481" title=""><span data-dcnode-id="5728" instrument_node="">91</span></a><span data-dcnode-id="5726" instrument_node="">] Universal Basic Income (UBI) Proposal</span></td><td align="left" class="html-align-left" data-dcnode-id="5720" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5724" instrument_node="">The Universal Basic Income (UBI) would be funded using a broad range of options, including: (1) eliminating many of the existing 126 welfare programs; (2) eliminating/reducing the government’s tax expenditures (e.g., removing tax deductions); (3) implementing a 5%–10% value added tax (VAT) on goods and services; (4) implementing a financial transaction tax (FTT); (5) creating a “common wealth” fund based on Peter Barnes’ idea for a Common Wealth Trusts (see below); (6) establishing a 1.5 percent wealth (or net worth) tax on personal assets over </span><span data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">$</span></span><span data-dcnode-id="5721" instrument_node="">1 million; and (7) considering ways to reduce government expenditure related to military spending, farm subsidies, subsidies to oil and gas companies, etc.</span></td><td align="left" class="html-align-left" data-dcnode-id="5709" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5719" instrument_node="">Every U.S. Citizen between 18 and 64 would receive </span><span data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">$</span></span><span data-dcnode-id="5716" instrument_node="">1000 a month, regardless of income or employment status. All senior citizens who do not receive at least </span><span data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">$</span></span><span data-dcnode-id="5713" instrument_node="">1000 per month in Social Security payments would also receive </span><span data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">$</span></span><span data-dcnode-id="5710" instrument_node="">1000 per month.</span></td><td align="left" class="html-align-left" data-dcnode-id="5704" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5708" instrument_node="">Stern’s [</span><a class="html-bibr" data-dcnode-id="5706" href="#B91-sustainability-11-04481" title=""><span data-dcnode-id="5707" instrument_node="">91</span></a><span data-dcnode-id="5705" instrument_node="">] proposal is based on the premise that efficiency and labor productivity will continue to undermine/replace jobs, forcing people into more contingent forms of employment.</span></td><td align="left" class="html-align-left" data-dcnode-id="5702" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5703" instrument_node="">The proposal has the potential to consider the environmental impacts related to a UBI, but only if a common wealth fund is created based on the principles discussed by Common Wealth Trusts (CWTs)—see below. There is also the critical questions of the relative scale of the critical ecosystems that would be put into trust and the contribution of the common wealth fund to the UBI when compared to the other funding options—i.e., the greater the contribution, the greater the potential for consumer education and environmental protection.</span></td></tr><tr data-dcnode-id="5678"><td align="left" class="html-align-left" data-dcnode-id="5696" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5700" instrument_node="">Andrew Yang’s [</span><a class="html-bibr" data-dcnode-id="5698" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="5699" instrument_node="">11</span></a><span data-dcnode-id="5697" instrument_node="">] Universal Basic Income (UBI) Proposal</span></td><td align="left" class="html-align-left" data-dcnode-id="5694" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5695" instrument_node="">A 10% value added tax (VAT) on the production of goods or services a business produces. Certain welfare programs (unspecified) would be consolidated.</span></td><td align="left" class="html-align-left" data-dcnode-id="5689" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5693" instrument_node="">Every U.S. citizen over the age of 18 would receive </span><span data-dcnode-id="5691"><span data-dcnode-id="5692" instrument_node="">$</span></span><span data-dcnode-id="5690" instrument_node="">1000 a month, regardless of income or employment status. If Andrew Yang is elected as U.S. President in 2020, the scheme would start in January 2021.</span></td><td align="left" class="html-align-left" data-dcnode-id="5681" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5688" instrument_node="">Like Stern’s [</span><a class="html-bibr" data-dcnode-id="5686" href="#B91-sustainability-11-04481" title=""><span data-dcnode-id="5687" instrument_node="">91</span></a><span data-dcnode-id="5685" instrument_node="">] proposal, Yang’s [</span><a class="html-bibr" data-dcnode-id="5683" href="#B11-sustainability-11-04481" title=""><span data-dcnode-id="5684" instrument_node="">11</span></a><span data-dcnode-id="5682" instrument_node="">] plan is based firmly on the idea that automation and AI are displacing jobs and that a UBI is necessary given the continued impact of this displacement. Yang also argues that the UBI would result in job growth from the increased effective demand among consumers and the need for industry to increase production to meet this demand.</span></td><td align="left" class="html-align-left" data-dcnode-id="5679" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5680" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5640"><td align="left" class="html-align-left" data-dcnode-id="5673" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5677" instrument_node="">Assured Income [</span><a class="html-bibr" data-dcnode-id="5675" href="#B9-sustainability-11-04481" title=""><span data-dcnode-id="5676" instrument_node="">9</span></a><span data-dcnode-id="5674" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5671" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5672" instrument_node="">Revenue streams from a range of potential sources would be deposited in a trust fund managed by the Social Security Administration (SSA). These sources include a value added tax (VAT), taxes on unearned income, a carbon dioxide tax, and transaction fees on the trading of securities and derivates.</span></td><td align="left" class="html-align-left" data-dcnode-id="5651" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5670" instrument_node="">Children (0–17) would receive </span><span data-dcnode-id="5668"><span data-dcnode-id="5669" instrument_node="">$</span></span><span data-dcnode-id="5667" instrument_node="">100–</span><span data-dcnode-id="5665"><span data-dcnode-id="5666" instrument_node="">$</span></span><span data-dcnode-id="5664" instrument_node="">200 per month; working age adults (18–64) would receive </span><span data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">$</span></span><span data-dcnode-id="5661" instrument_node="">200–</span><span data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">$</span></span><span data-dcnode-id="5658" instrument_node="">400 per month; older individuals (64+) would receive </span><span data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">$</span></span><span data-dcnode-id="5655" instrument_node="">100–</span><span data-dcnode-id="5653"><span data-dcnode-id="5654" instrument_node="">$</span></span><span data-dcnode-id="5652" instrument_node="">200 per month</span></td><td align="left" class="html-align-left" data-dcnode-id="5643" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5650" instrument_node="">The proposed program would benefit 326 million people. At the lower-benefit level, the cost of the program would be </span><span data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">$</span></span><span data-dcnode-id="5647" instrument_node="">632.4 billion. At the higher-benefit level the cost would be </span><span data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">$</span></span><span data-dcnode-id="5644" instrument_node="">1.265 trillion. An interesting aspect of the proposal is that the SSA could be authorized to invest in securities other than Treasury bonds, enabling the trust to act like a pension fund or Sovereign Wealth Fund (SWF).</span></td><td align="left" class="html-align-left" data-dcnode-id="5641" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5642" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5614"><td align="left" class="html-align-left" data-dcnode-id="5635" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5639" instrument_node="">Chris Hughes’ [</span><a class="html-bibr" data-dcnode-id="5637" href="#B92-sustainability-11-04481" title=""><span data-dcnode-id="5638" instrument_node="">92</span></a><span data-dcnode-id="5636" instrument_node="">] Guaranteed Income for Working People</span></td><td align="left" class="html-align-left" data-dcnode-id="5630" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5634" instrument_node="">A tax on annual incomes of </span><span data-dcnode-id="5632"><span data-dcnode-id="5633" instrument_node="">$</span></span><span data-dcnode-id="5631" instrument_node="">250,000 or more would be used to underwrite the program.</span></td><td align="left" class="html-align-left" data-dcnode-id="5622" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5629" instrument_node="">A guaranteed income of </span><span data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">$</span></span><span data-dcnode-id="5626" instrument_node="">500 a month would be provided to every working adult who lives in a household with an annual income of less than </span><span data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">$</span></span><span data-dcnode-id="5623" instrument_node="">50,000.</span></td><td align="left" class="html-align-left" data-dcnode-id="5617" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5621" instrument_node="">It is estimated that 60 million adults would receive the guaranteed income at an annual cost of </span><span data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">$</span></span><span data-dcnode-id="5618" instrument_node="">290 billion. The program is designed to encourage work.</span></td><td align="left" class="html-align-left" data-dcnode-id="5615" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5616" instrument_node="">The program has no direct components that could improve the environmental performance of firms or shape consumer spending.</span></td></tr><tr data-dcnode-id="5591"><td align="left" class="html-align-left" data-dcnode-id="5606" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5613" instrument_node="">Iran’s Cash Transfer Program [</span><a class="html-bibr" data-dcnode-id="5611" href="#B93-sustainability-11-04481" title=""><span data-dcnode-id="5612" instrument_node="">93</span></a><span data-dcnode-id="5610" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5608" href="#B94-sustainability-11-04481" title=""><span data-dcnode-id="5609" instrument_node="">94</span></a><span data-dcnode-id="5607" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5604" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5605" instrument_node="">In 2010, Iran enacted a cash transfer program (via the Targeted Subsidy Reform law) to provide its citizens with a universal and unconditional income. The program is funded from revenues generated from removing price subsidies on fuel and food that accounted for around 80% of all subsidies. The program did not require new claims from the national budget, nor did it use oil export revenues.</span></td><td align="left" class="html-align-left" data-dcnode-id="5596" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5603" instrument_node="">In 2012, the program was providing monthly payments of 455,000 rials (worth USD </span><span data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">$</span></span><span data-dcnode-id="5600" instrument_node="">40 in 2012 and around </span><span data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">$</span></span><span data-dcnode-id="5597" instrument_node="">11 today) for approximately 70 million citizens (95 percent of Iran’s population). The transfers do not eliminate existing benefits. </span></td><td align="left" class="html-align-left" data-dcnode-id="5594" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5595" instrument_node="">In 2012, the program costs exceeded the available tax revenues by one third, forcing the government to print money that caused significant inflation (up to 40% in 2013), undermining the early gains made by the program. In 2016, the Iranian Parliament approved a bill to cut the cash payments to 24 million Iranians who already receive social welfare and who work in the public sector.</span></td><td align="left" class="html-align-left" data-dcnode-id="5592" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5593" instrument_node="">The removal of price subsidies on fuel can be viewed as a tax on the present consumption of oil. All countries (not only resource-rich ones) could use this scheme to ensure consumers pay the full market price for fuel.</span></td></tr><tr data-dcnode-id="5568"><td align="left" class="html-align-left" data-dcnode-id="5586" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5590" instrument_node="">The Alaska Permanent Fund (APF) [</span><a class="html-bibr" data-dcnode-id="5588" href="#B95-sustainability-11-04481" title=""><span data-dcnode-id="5589" instrument_node="">95</span></a><span data-dcnode-id="5587" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5581" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5585" instrument_node="">At least 25% of all mineral lease rentals, royalties, royalty sale proceeds, federal mineral revenue sharing payments, and bonuses received by the State are placed in the Alaska Permanent Fund (APF)—valued at </span><span data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">$</span></span><span data-dcnode-id="5582" instrument_node="">64.9 billion (2018). The fund’s principal should be used for income-producing investments and cannot be spent without a constitutional amendment approved by Alaskan voters.</span></td><td align="left" class="html-align-left" data-dcnode-id="5573" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5580" instrument_node="">Each year, the Permanent Fund Dividend program provides Alaska residents with an annual dividend payout that typically falls between </span><span data-dcnode-id="5578"><span data-dcnode-id="5579" instrument_node="">$</span></span><span data-dcnode-id="5577" instrument_node="">1000–</span><span data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">$</span></span><span data-dcnode-id="5574" instrument_node="">2000.</span></td><td align="left" class="html-align-left" data-dcnode-id="5571" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5572" instrument_node="">The residents of Alaska have consistently voted to protect the Alaska Permanent Fund against efforts to use the fund’s principal to cover government deficits/spending.</span></td><td align="left" class="html-align-left" data-dcnode-id="5569" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5570" instrument_node="">While the APF is invested globally across seven asset classes—(1) Public Equities, (2) Fixed-Income Plus, (3) Private Equity and Special Opportunities, (4) Real Estate, (5) Infrastructure, (6) Absolute Return Strategies, and (7) Allocation Strategies—there is no explicit strategy to target sustainable investment opportunities.</span></td></tr><tr data-dcnode-id="5551"><td align="left" class="html-align-left" data-dcnode-id="5563" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5567" instrument_node="">American Solidarity Fund (ASF) [</span><a class="html-bibr" data-dcnode-id="5565" href="#B96-sustainability-11-04481" title=""><span data-dcnode-id="5566" instrument_node="">96</span></a><span data-dcnode-id="5564" instrument_node="">]</span></td><td align="left" class="html-align-left" data-dcnode-id="5561" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5562" instrument_node="">The American Solidarity Fund (ASF) would be made up from a combination of voluntary contributions, ring-fencing existing state assets, levies (taxes and fees), leveraged purchases, and monetary seigniorage. The ASF would be managed by a public entity (a new state-owned enterprise—e.g., the America Solidarity Fund Corporation) to generate investment returns that would fund a universal basic dividend for U.S. citizens.</span></td><td align="left" class="html-align-left" data-dcnode-id="5559" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5560" instrument_node="">Every U.S. citizen over the age of 17 would be given one nontransferable share of ownership in the ASF, which would entitle them to receive a Universal Basic Dividend (UBD). The UBD would be equal to a five-year moving average of a percentage of the ASF’s market value. The amount received each year would depend on the size of the ASF and its five-year performance.</span></td><td align="left" class="html-align-left" data-dcnode-id="5557" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5558" instrument_node="">In contrast to the Alaska Permanent Fund, the ASF would provide citizens with a formal ownership share that cannot be sold and would return to the ASF upon death.</span></td><td align="left" class="html-align-left" data-dcnode-id="5552" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5556" instrument_node="">The allocation of the ASF’s assets would be determined by Congress or Treasury mandates. Companies could be excluded from the fund if they violate established guidelines—e.g., engage in human rights violations or environmental destruction. (The ASF could model their list of excluded companies following Norway’s sovereign wealth fund exclusion list [</span><a class="html-bibr" data-dcnode-id="5554" href="#B111-sustainability-11-04481" title=""><span data-dcnode-id="5555" instrument_node="">111</span></a><span data-dcnode-id="5553" instrument_node="">].)</span></td></tr><tr data-dcnode-id="5537"><td align="left" class="html-align-left" data-dcnode-id="5546" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5550" instrument_node="">Peter Barnes [</span><a class="html-bibr" data-dcnode-id="5548" href="#B97-sustainability-11-04481" title=""><span data-dcnode-id="5549" instrument_node="">97</span></a><span data-dcnode-id="5547" instrument_node="">] Common Wealth Trusts</span></td><td align="left" class="html-align-left" data-dcnode-id="5544" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5545" instrument_node="">Common Wealth Trusts (CWTs) would manage the rights to critical ecosystems for which asset preservation is the paramount mission. The CWTs would be organized as “legal shells” (not-for-profit corporations with state charters, self-governance, perpetual life, and legal personhood) and have fiduciary responsibility to future generations (the managers of these not-for-profit corporations would be required to protect their assets for future generations and to share current income—if any—equally). Corporations wishing to use (or pollute) a critical ecosystem would need to pay for this right. The actual design, structure, and management of the CWTs would require research, discussion, and experimentation. Thus, additional work is needed to fully develop the concept.</span></td><td align="left" class="html-align-left" data-dcnode-id="5542" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5543" instrument_node="">The CWTs would belong to all citizens who would receive dividend payments from the CWTs. The amount of these payments is not specified.</span></td><td align="left" class="html-align-left" data-dcnode-id="5540" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5541" instrument_node="">The CWTs would provide a counter-weight to profit-maximizing companies within a market economy; in this context, the state would need to ensure a proper balance between business and organized common wealth. The creation of trust-administered property rights to protect ecosystems is considered to be more effective than a redistributive taxation approach on the grounds that property rights tend to endure.</span></td><td align="left" class="html-align-left" data-dcnode-id="5538" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5539" instrument_node="">The CWTs would be legally accountable to future generations and would have the authority to limit the use of threatened ecosystems and charge for the use of public resources. Thus, rather than providing citizens with a corporate ownership stake, they would have an ownership stake in the natural/environmental common wealth.</span></td></tr><tr data-dcnode-id="5514"><td align="left" class="html-align-left" data-dcnode-id="5529" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5536" instrument_node="">Robert Ashford’s [</span><a class="html-bibr" data-dcnode-id="5534" href="#B98-sustainability-11-04481" title=""><span data-dcnode-id="5535" instrument_node="">98</span></a><span data-dcnode-id="5533" instrument_node="">,</span><a class="html-bibr" data-dcnode-id="5531" href="#B99-sustainability-11-04481" title=""><span data-dcnode-id="5532" instrument_node="">99</span></a><span data-dcnode-id="5530" instrument_node="">] Inclusive Capitalism (based on binary economics)</span></td><td align="left" class="html-align-left" data-dcnode-id="5527" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5528" instrument_node="">Inclusive capitalism is based on the principle of “binary growth.” According to this principle, a broader distribution of capital acquisition with the earnings of capital distributes capital income more broadly in future years (thereby producing more effective future consumer demand) and therefore more demand for investment in capital and labor in earlier years. Thus, if capital can competitively pay for its acquisition costs out of its future earnings primarily for existing owners, the same institutions and practices that work profitably for well-capitalized people and corporations can do so even more profitably if all people are included in the acquisition process (a process called ownership-broadening binary financing). The institutions that can be used most effectively to competitively acquire capital with the earnings of capital for poor and middle-class people are the largest three thousand or so credit-worthy corporations (roughly comprising the Russell Index) working cooperatively with professional investment trust (“Binary Trust”) fiduciaries (such as Fidelity, T. Rowe Price, TIAA-CREF, and Vanguard). If implemented at a national scale, a Binary Trust could borrow money from banks and other lenders and use it to acquire dividend-paying common shares issued to the trust fiduciaries by participating companies. The share acquisition loans would be collateralized by private and/or public capital credit insurance and would be repaid with the earnings of the capital acquired, after which the capital earnings would be broadly distributed to its beneficiaries (who could be citizens, employees, consumers, and/or welfare recipients).</span></td><td align="left" class="html-align-left" data-dcnode-id="5522" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5526" instrument_node="">The beneficial owners would be selected by the participating companies in conformity with legislated eligibility and nondiscrimination rules. No income would be distributed to the binary beneficiaries unless their capital has repaid all current acquisition debt obligations. Thereafter, beneficiaries would receive net income only after all expenses of production are paid and all necessary reserves for depreciation and research and development are set aside to maintain the capital in a competitive condition.Unlike income enhancement via a UBI, this inclusive capitalism approach does not guarantee or prescribe any absolute amount of income; the amount paid in dividends to beneficiaries according to this approach depends on the earning capacity of the capital acquired. However, this binary approach could be employed along with other approaches that do provide for an absolute payment and the dividends paid can be used to reduce, eliminate, or supplement reliance on such approaches (see </span><a class="html-sec" data-dcnode-id="5524" href="#sec3-sustainability-11-04481"><span data-dcnode-id="5525" instrument_node="">Section 3</span></a><span data-dcnode-id="5523" instrument_node=""> of this paper).</span></td><td align="left" class="html-align-left" data-dcnode-id="5520" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5521" instrument_node="">Enabling all people to increase their earning capacity by acquiring capital with the earnings of capital requires no redistribution of prior accumulated income/wealth and reduces no competitive claim on future wealth. Ownership-broadening binary financing offers the prospect of a competitive alternate distribution of the ownership of, and income from, rationally expected future growth. The approach is based on an analysis recognizing that a broader distribution of capital acquisition in future years provides greater incentive to employ labor and capital in earlier years.</span></td><td align="left" class="html-align-left" data-dcnode-id="5515" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="5519" instrument_node="">With bank loans secured by private capital credit insurers, ownership-broadening trusts could invest (on behalf of designated beneficiaries) in common stock voluntarily issued by companies that are advancing inherently sustainable forms of development. The trust could go beyond Norway’s list of excluded companies and review investments using lifecycle assessment and other accepted forms of sustainability analysis. In addition, the trust could finance the growth of employee-owned B Corporations that frequently outperform investor-controlled corporations from an environmental and social perspective [</span><a class="html-bibr" data-dcnode-id="5517" href="#B112-sustainability-11-04481" title=""><span data-dcnode-id="5518" instrument_node="">112</span></a><span data-dcnode-id="5516" instrument_node="">].</span></td></tr></tbody></table><span data-dcnode-id="5510" instrument_node="">

="center" class="html-align-center" data-dcnode-id="3998" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3999" instrument_node="">No</span></td><td align="center" class="html-align-center" data-dcnode-id="3990" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3997" instrument_node="">Annual dividend payments typically range between </span><span data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">$</span></span><span data-dcnode-id="3994" instrument_node="">1000–</span><span data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">$</span></span><span data-dcnode-id="3991" instrument_node="">2000.</span></td><td align="center" class="html-align-center" data-dcnode-id="3988" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3989" instrument_node="">Alaska residents</span></td><td align="center" class="html-align-center" data-dcnode-id="3986" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3987" instrument_node="">None</span></td></tr><tr data-dcnode-id="3969"><td align="center" class="html-align-center" data-dcnode-id="3980" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3984" instrument_node="">American Solidarity Fund (ASF) [</span><a class="html-bibr" data-dcnode-id="3982" href="#B96-sustainability-11-04481" title=""><span data-dcnode-id="3983" instrument_node="">96</span></a><span data-dcnode-id="3981" instrument_node="">]</span></td><td align="center" class="html-align-center" data-dcnode-id="3978" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3979" instrument_node="">The American Solidarity Fund (ASF)</span></td><td align="center" class="html-align-center" data-dcnode-id="3976" style="border-bottom:solid thin" valign="middle"><span data-dcnode-id="3977" instrument_node="">No</span></td><td align="center" class="html-align-center" data-dcnode-id="3974" style="border-bottom:solid thin" valign="middl
