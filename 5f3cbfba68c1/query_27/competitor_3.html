</span><div class="text" data-dcnode-id="1743"><span data-dcnode-id="1776" instrument_node="">
</span><div class="cmp-text text" data-dcnode-id="1745"><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">The coronavirus pandemic has already resulted in some major changes to our lives, from the introduction of mask wearing and social distancing to a reassessment of office culture.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1771" instrument_node="">And it’s also resulted in discussions around, and calls for, a universal basic income. In the UK, the government introduced a furlough scheme during the first pandemic; companies forced to close because of coronavirus restrictions could get the government to cover 80% of the pay for employees, instead of laying people off.</span><br data-dcnode-id="1770"><span data-dcnode-id="1769" instrument_node="">
</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1766" instrument_node="">Scottish Liberal Democrat politician Christine Jardine told </span><i data-dcnode-id="1763"><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edition.cnn.com/2020/11/23/economy/universal-basic-income-europe-pandemic/index.html" target="_blank"><span data-dcnode-id="1765" instrument_node="">CNN</span></a></i><span data-dcnode-id="1762" instrument_node=""> she was not a fan of Universal Basic Income, but the pandemic “has meant that we've seen the suggestion of a universal basic income in a completely different light”.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1759" instrument_node="">Some countries have trialled UBI already. </span><a data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weforum.org/agenda/2017/05/iran-introduced-a-basic-income-scheme-and-something-strange-happened/" target="_blank"><span data-dcnode-id="1758" instrument_node="">Iran ran a scheme in 2010</span></a><span data-dcnode-id="1756" instrument_node=""> giving citizens transfers of 29% of the median income each month. Poverty and inequality were reduced, and there was no sign of large amounts of people leaving the labour market. In fact, people used it to invest in their businesses, encouraging the growth of small enterprises. And in Canada, a </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/worklife/article/20200624-canadas-forgotten-universal-basic-income-experiment" target="_blank"><span data-dcnode-id="1755" instrument_node="">UBI trial in Manitoba</span></a><span data-dcnode-id="1753" instrument_node=""> in the 1970s showed a modest reduction in workers, along with fewer hospitalisations and mental health diagnoses.&nbsp;</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1750" instrument_node="">If you want to know more about universal basic income, here’s our guide to the pros and cons, and the authors and books you can turn to for guidance.&nbsp;</span><br data-dcnode-id="1749"><span data-dcnode-id="1748" instrument_node="">
</span></p><span data-dcnode-id="1746" instrument_node="">
</span></div><span data-dcnode-id="1744" instrument_node="">
</span></div><span data-dcnode-id="1742" instrument_node="">
</span><div class="text" data-dcnode-id="1694"><span data-dcnode-id="1741" instrument_node="">
</span><div class="cmp-text text" data-dcnode-id="1696"><span data-dcnode-id="1740" instrument_node="">
</span><h2 data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">What are the benefits of Universal Basic Income?</span></h2><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1734"><b data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Ending poverty</span></b></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1732" instrument_node="">Advocates for UBI say that it could help bring everyone’s income above the poverty line. </span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguin.co.uk/authors/1080066/annie-lowrey.html"><span data-dcnode-id="1731" instrument_node="">Annie Lowrey</span></a><span data-dcnode-id="1729" instrument_node="">, author of </span><i data-dcnode-id="1726"><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguin.co.uk/books/1113241/give-people-money/9780753545775.html"><span data-dcnode-id="1728" instrument_node="">Give People Money</span></a></i><span data-dcnode-id="1725" instrument_node="">, said in an interview with Vox: “We have just tons of experimental data from the US, from other countries, from Iran, from all around the world that shows that if you give people money, it reduces poverty. Just really straightforward.”&nbsp;</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1720"><b data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Discouraging low wages</span></b></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">UBI would give employees enough security to have bargaining power, say fans. Lowrey has said: “Why take a crummy job for 7.25 an hour when you have a guaranteed 1,000 dollars a month to fall back on?”</span></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1713"><b data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Redistributing wealth</span></b></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">The economic growth of high-income countries is making the rich richer, but having very little effect on the working classes. Economist&nbsp;</span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguin.co.uk/authors/123908/thomas-piketty.html"><span data-dcnode-id="1710" instrument_node="">Thomas Piketty</span></a><span data-dcnode-id="1708" instrument_node="">&nbsp;has spoken about the idea of an “inheritance for all”.&nbsp;</span></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1701"><span data-dcnode-id="1705" instrument_node="">Talking to the&nbsp;</span><a data-dcnode-id="1703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.lse.ac.uk/europpblog/2020/02/21/thomas-piketty-the-current-economic-system-is-not-working-when-it-comes-to-solving-inequality/" target="_blank"><span data-dcnode-id="1704" instrument_node="">London School of Economics</span></a><span data-dcnode-id="1702" instrument_node="">&nbsp;in 2020, he said: "If you look at today’s situation, the average wealth in France or Britain is about 200,000 euros per adult and the median wealth will be closer to 100,000 euros per adult, but the bottom 50% owns virtually nothing. Around 5% of total wealth is owned by the bottom 50%, which means that they have on average, one tenth of the average wealth – about 20,000 euros instead of 200,000 euros. They own very little and this is true within all age groups. It’s not that the young are poor and are about to become rich. Some of them are about to become rich, but on average, the concentration of wealth is just as large within each age group."</span></p><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">A universal basic income could help to balance this&nbsp; inequality.&nbsp;</span></p><span data-dcnode-id="1697" instrument_node="">
</span></div><span data-dcnode-id="1695" instrument_node="">
</span></div><span data-dcnode-id="1693" instrument_node="">

 -0.49,1.28 -0.2,.3 -0.50,.40 -0.90,.40 -0.3,0 -0.51,-0.08 -0.81,-0.18 -0.2,-0.1 -0.39,-0.29 -0.59,-0.59 l 0,-8.5 c .1,-0.4 .29,-0.7 .59,-1 .3,-0.3 .60,-0.40 .90,-0.40 z" data-dcnode-id="1347" id="ytp-id-12"></path></svg></div></div></a></div></div><noscript data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;Unable to execute JavaScript.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><span data-dcnode-id="1330" instrument_node="">

</span><div class="text" data-dcnode-id="1270"><span data-dcnode-id="1319" instrument_node="">

</span><p data-dcnode-id="1315"><b data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Fighting technological unemployment</span></b></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">With advanced technology taking over more and more blue and white collar jobs, proponents of UBI say it would act as a sort of security net for the millions of people who will be left jobless by the tech revolution.&nbsp;</span><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libertystreeteconomics.newyorkfed.org/2016/08/the-reluctance-of-firms-to-interview-the-long-term-unemployed.html" target="_blank"><span data-dcnode-id="1312" instrument_node="">Research for the&nbsp;Federal Reserve Bank of New York</span></a><span data-dcnode-id="1310" instrument_node="">&nbsp;showed that the longer you are unemployed, the longer it takes to find employment. If the jobless had a small source of income to help them back on their feet, they could find new jobs and start contributing to the economy sooner.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1305"><b data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Helping victims of domestic violence</span></b></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1303" instrument_node="">Those who suffer domestic abuse, mainly women, become trapped in violent situations because they don’t have the means to leave them, research by Women’s Aid shows. UBI would make leaving an abusive partner easier from a financial point of view, at least. Writing in&nbsp;</span><i data-dcnode-id="1300"><a data-dcnode-id="1301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/voices/domestic-violence-abuse-bill-theresa-may-financial-independence-a8260736.html" target="_blank"><span data-dcnode-id="1302" instrument_node="">The Independent</span></a></i><span data-dcnode-id="1299" instrument_node="">, Amelia Womack, deputy leader of The Green Party, which is in favour of UBI, said: "By giving everyone financial independence, UBI would ensure no woman is ever dependent on her partner to meet her basic needs. And for those in abusive relationships, one of the barriers against leaving would be removed.”</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1294"><b data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Supporting unpaid care workers</span></b></p><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Those with ill or differently abled relatives are often forced to quit their jobs to care for them full-time. UBI would allow care-workers to support themselves, encouraging care work within the home and relieving pressure on public services that provide care to the sick and elderly.</span></p><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1287"><b data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Eliminating the need for social security</span></b></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">There exist countless governmental organisations responsible for helping those in poverty, handing out unemployment benefits, food stamps, subsidised housing, etc. UBI would cut a country’s spending by eliminating these organisations.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1280"><b data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Think of it like Monopoly</span></b></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Most people intuitively think that jobs lead to financial wealth, but the reality is that having money actually leads to jobs. Without the privilege of wealth, it is more difficult to build a life that makes landing a job easier. In order to get a job, you need to have a house with a shower, a set of appropriate interview clothes and the funds to cover the cost of transport and food during the working day. If you want to contribute to the economy on an even greater scale and start your own business, you’ll need even more money. In the game Monopoly, everyone starts off with a little bit of money – without it, the game wouldn’t work and no one would be able to become rich or successful. UBI is like Monopoly – everyone starts off with a little bit of money, and uses it to fuel a thriving economy.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Successful implementation of UBI would mean improvements in food security, stress, mental health, physical health, housing, education, and employment.</span></p><span data-dcnode-id="1273" instrument_node="">
</span></div><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span><div class="text" data-dcnode-id="1219"><span data-dcnode-id="1268" instrument_node="">
</span><div class="cmp-text text" data-dcnode-id="1221"><span data-dcnode-id="1267" instrument_node="">
</span><h2 data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">What are the possible disadvantages of Universal Basic Income?</span></h2><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1261"><b data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Inequity</span></b></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1259" instrument_node="">Universal basic income would be just that: universal. That means that everyone, regardless of how poor, or rich, they were would get the same amount of money. </span><i data-dcnode-id="1256"><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newstatesman.com/politics/economy/2020/04/covid-19-universal-basic-income-benefits-welfare" target="_blank"><span data-dcnode-id="1258" instrument_node="">The New Statesman</span></a></i><span data-dcnode-id="1255" instrument_node="">’s Stephen Bush wrote in 2020 that he was more open to the case for UBI, but added: "Most of the time, when we talk about a universal benefit going to people “who don’t need it”, we’re talking about sufficiently small numbers that it doesn’t really matter either way...</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">"To give higher earners an extra £960 a month, however, would hand them serious financial firepower to entrench their advantages, whether in saving to buy property, paying for private education, or any number of other socio-economic advantages."</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1247"><b data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Cost</span></b></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">The cost of implementing UBI could be huge. In the United States it's estimated to be about $3.9 trillion per year, and in the </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/society/2019/mar/18/universal-basic-income-could-be-covered-reversing-welfare-spending-cuts-plan-uk" target="_blank"><span data-dcnode-id="1244" instrument_node="">UK some estimates have put the cost of reworking the tax and benefits system at £28 billion</span></a><span data-dcnode-id="1242" instrument_node="">. The idea is that UBI would take pressure off health services and make social security institutions redundant, but these are nevertheless enormous numbers for a government to budget for.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1237"><b data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Motivation to work</span></b></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">One concern is that UBI would incite millions of workers to stop working. If people aren’t working, there is less taxable income. However, people may choose to stop working for reasons that benefit society as a whole, such as getting a better education or caring for a relative in need.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1230"><b data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Philosophical counterarguments</span></b></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Is money a birthright? Capitalist countries are built on the ideological foundation that money is something we earn – UBI would completely change this. Some believe that community service should be a requirement for receiving UBI.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1223"><i data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Image by Ryan McEachern/Penguin</span></i></p><span data-dcnode-id="1222" instrument_node="">

</span><p data-dcnode-id="972"><b data-dcnode-id="988"><span data-dcnode-id="992" instrument_node="">Shortlisted for the 2018  </span><i data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Financial Times</span></i><span data-dcnode-id="989" instrument_node=""> and McKinsey Business Book of the Year Award!</span></b><br data-dcnode-id="987"><b data-dcnode-id="980"><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">Surely just giving people money couldn't work.  </span><i data-dcnode-id="982"><span data-dcnode-id="984" instrument_node="">Or could it?</span><br data-dcnode-id="983"></i><br data-dcnode-id="981"></b><span data-dcnode-id="979" instrument_node="">Imagine if every month the government deposited £1000 in your bank account, with no strings attached and nothing expected in return.  It sounds crazy, but Universal Basic Income (UBI) has become one of the most influential policy ideas of our time, backed by thinkers on both the left and the right.  The founder of Facebook, Obama's chief economist, governments from Canada to Finland are all seriously debating some form of UBI.</span><br data-dcnode-id="978"><br data-dcnode-id="977"><span data-dcnode-id="976" instrument_node="">In this sparkling and provocative book, economics writer Annie Lowrey looks at the global UBI movement. She travels to Kenya to see how UBI is lifting the poorest people on earth out of destitution, and India to see how inefficient government programs are failing the poor.  She visits South Korea to interrogate UBI’s intellectual pedigree, and Silicon Valley to meet the tech titans financing UBI pilots in the face of advanced artificial intelligence and little need for human labour. She also examines at the challenges the movement faces: contradictory aims, uncomfortable costs, and most powerfully, the entrenched belief that no one should get something for nothing.</span><br data-dcnode-id="975"><br data-dcnode-id="974"><span data-dcnode-id="973" instrument_node="">The UBI movement is not just an economic policy -- it also calls into question our deepest intuitions about what we owe each other and what activities we should reward and value as a society.</span></p><span data-dcnode-id="971" instrument_node="">
</span></div><span data-dcnode-id="969" instrument_node="">
</span><input data-dcnode-id="968" id="hiddenBookPromoSynopsisFirst" name="hiddenBookPromoSynopsisFirst" type="hidden" value="<p><b>Shortlisted for the 2018  <i>Financial Times</i> and McKinsey Business Book of the Year Award!</b><br><b><br>Surely just giving people money couldn't work.  <i>Or could it?<br></i><br></b>Imagine if every month the government deposited £1000 in your bank account, with no strings attached and nothing expected in return.  It sounds crazy, but Universal Basic Income (UBI) has become one of the most influential policy ideas of our time, backed by thinkers on both the left and the right.  The founder of Facebook, Obama's chief economist, governments from Canada to Finland are all seriously debating some form of UBI.<br><br>In this sparkling and provocative book, economics writer Annie Lowrey looks at the global UBI movement. She travels to Kenya to see how UBI is lifting the poorest people on earth out of destitution, and India to see how inefficient government programs are failing the poor.  She visits South Korea to interrogate UBI’s intellectual pedigree, and Silicon Valley to meet the tech titans financing UBI pilots in the face of advanced artificial intelligence and little need for human labour. She also examines at the challenges the movement faces: contradictory aims, uncomfortable costs, and most powerfully, the entrenched belief that no one should get something for nothing.<br><br>The UBI movement is not just an economic policy -- it also calls into question our deepest intuitions about what we owe each other and what activities we should reward and value as a society.</p>"><span data-dcnode-id="967" instrument_node="">
