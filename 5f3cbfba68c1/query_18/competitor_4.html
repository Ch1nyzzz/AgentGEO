</span><meta content="With the in-depth development of informatization, the role of new ventures and small and micro enterprises in economic growth has become increasingly prominent. However, rare literature systematically studies the impact of informatization on entrepreneurship. Based on the data from the 2011 China Household Finance Survey and the Report of China Informationization Development Assessment (2013), this paper uses the probit model, the multiple-choice probit model, and the Heckman two-stage model to examine the influence of informationization on entrepreneurial choices and entrepreneurial performance. The research finds the following conclusions. Firstly, informationization not only significantly improves the probability of entrepreneurship, but also facilitates the realization of income and employment effects from entrepreneurship. Secondly, information infrastructure, government informationization, and resident informationization, as informationization dimensions, can significantly increase the probability of entrepreneurship, although enterprise informationization plays an opposite role. Finally, the influence of informationization on promoting entrepreneurship varies with entrepreneurial type and entrepreneurial industry." data-dcnode-id="3119" name="dc.description"><span data-dcnode-id="3118" instrument_node="">

</span><meta content="Study on the promotion effect of informationization on entrepreneurship: an empirical evidence from China - Journal of Global Entrepreneurship Research" data-dcnode-id="2911" property="og:title"><span data-dcnode-id="2910" instrument_node="">
</span><meta content="With the in-depth development of informatization, the role of new ventures and small and micro enterprises in economic growth has become increasingly prominent. However, rare literature systematically studies the impact of informatization on entrepreneurship. Based on the data from the 2011 China Household Finance Survey and the Report of China Informationization Development Assessment (2013), this paper uses the probit model, the multiple-choice probit model, and the Heckman two-stage model to examine the influence of informationization on entrepreneurial choices and entrepreneurial performance. The research finds the following conclusions. Firstly, informationization not only significantly improves the probability of entrepreneurship, but also facilitates the realization of income and employment effects from entrepreneurship. Secondly, information infrastructure, government informationization, and resident informationization, as informationization dimensions, can significantly increase the probability of entrepreneurship, although enterprise informationization plays an opposite role. Finally, the influence of informationization on promoting entrepreneurship varies with entrepreneurial type and entrepreneurial industry." data-dcnode-id="2909" property="og:description"><span data-dcnode-id="2908" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="934" data-track-component="article body"><span data-dcnode-id="2455" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2448" data-gtm-vis-first-on-screen-50443292_562="2166" data-gtm-vis-first-on-screen-50443292_563="2167" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2166" data-gtm-vis-recent-on-screen-50443292_563="2167" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2449" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2453" id="Abs1"><span data-dcnode-id="2454" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2450" id="Abs1-content"><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">With the in-depth development of informatization, the role of new ventures and small and micro enterprises in economic growth has become increasingly prominent. However, rare literature systematically studies the impact of informatization on entrepreneurship. Based on the data from the 2011 China Household Finance Survey and the Report of China Informationization Development Assessment (2013), this paper uses the probit model, the multiple-choice probit model, and the Heckman two-stage model to examine the influence of informationization on entrepreneurial choices and entrepreneurial performance. The research finds the following conclusions. Firstly, informationization not only significantly improves the probability of entrepreneurship, but also facilitates the realization of income and employment effects from entrepreneurship. Secondly, information infrastructure, government informationization, and resident informationization, as informationization dimensions, can significantly increase the probability of entrepreneurship, although enterprise informationization plays an opposite role. Finally, the influence of informationization on promoting entrepreneurship varies with entrepreneurial type and entrepreneurial industry.</span></p></div></div></section><span data-dcnode-id="2447" instrument_node="">
</span><section data-dcnode-id="2394" data-gtm-vis-first-on-screen-50443292_562="2167" data-gtm-vis-first-on-screen-50443292_563="2167" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2167" data-gtm-vis-recent-on-screen-50443292_563="2167" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2395" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2445" id="Sec1"><span data-dcnode-id="2446" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2396" id="Sec1-content"><p data-dcnode-id="2404"><span data-dcnode-id="2444" instrument_node="">Entrepreneurship is always regarded as an important economic growth driver, which plays its role through intermediate channels such as innovation, competition, diversity, knowledge spillover, and entrepreneurs (Audretsch &amp; Keilbach, </span><a aria-label="Reference 2004" data-dcnode-id="2442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d245517653e411" title="Audretsch, D., &amp; Keilbach, M. (2004). Entrepreneurship capital and economic growth performance. Regional Studies, 38(8), 949–959."><span data-dcnode-id="2443" instrument_node="">2004</span></a><span data-dcnode-id="2441" instrument_node="">; Carree &amp; Thurik, </span><a aria-label="Reference 2005" data-dcnode-id="2439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d245517653e414" title="Carree, M. A., &amp; Thurik, A. R. (2005). The impact of entrepreneurship on economic growth. In Handbook of Entrepreneurship Research (pp. 437–471)."><span data-dcnode-id="2440" instrument_node="">2005</span></a><span data-dcnode-id="2438" instrument_node="">; Holcombe, </span><a aria-label="Reference 1998" data-dcnode-id="2436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d245517653e417" title="Holcombe, R. G. (1998). Entrepreneurship and economic growth. Quarterly Journal of Austrian Economics, 1(2), 45–62."><span data-dcnode-id="2437" instrument_node="">1998</span></a><span data-dcnode-id="2435" instrument_node="">). This has been supported by evidence given in many empirical studies (Audretsch &amp; Keilbach, </span><a aria-label="Reference 2004" data-dcnode-id="2433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d245517653e420" title="Audretsch, D., &amp; Keilbach, M. (2004). Entrepreneurship capital and economic growth performance. Regional Studies, 38(8), 949–959."><span data-dcnode-id="2434" instrument_node="">2004</span></a><span data-dcnode-id="2432" instrument_node="">; Martin, Picazo, &amp; Navarro, </span><a aria-label="Reference 2010" data-dcnode-id="2430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d245517653e423" title="Martin, M. A. G., Picazo, M. T. M., &amp; Navarro, J. L. A. (2010). Entrepreneurship, income distribution and economic growth. International Entrepreneurship and Management Journal, 6(2), 131–141."><span data-dcnode-id="2431" instrument_node="">2010</span></a><span data-dcnode-id="2429" instrument_node="">; Mueller, </span><a aria-label="Reference 2006" data-dcnode-id="2427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d245517653e427" title="Mueller, P. (2006). Exploring the knowledge filter: How entrepreneurship and university- industry relationships drive economic growth. Research Policy, 35(10), 1499–1508."><span data-dcnode-id="2428" instrument_node="">2006</span></a><span data-dcnode-id="2426" instrument_node="">; Stam &amp; van Stel, </span><a aria-label="Reference 2009" data-dcnode-id="2424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d245517653e430" title="Stam, E., &amp; van Stel, A. (2009). Types of Entrepreneurship and Economic Growth. In UNU- MERT Working Papers."><span data-dcnode-id="2425" instrument_node="">2009</span></a><span data-dcnode-id="2423" instrument_node="">; Valliere &amp; Peterson, </span><a aria-label="Reference 2009" data-dcnode-id="2421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d245517653e433" title="Valliere, D., &amp; Peterson, R. (2009). Entrepreneurship and economic growth: Evidence from emerging and developed countries. Entrepreneurship &amp; Regional Development, 21(5–6), 459–480."><span data-dcnode-id="2422" instrument_node="">2009</span></a><span data-dcnode-id="2420" instrument_node="">; Wong, Ho, &amp; Autio, </span><a aria-label="Reference 2005" data-dcnode-id="2418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d245517653e436" title="Wong, P. K., Ho, Y. P., &amp; Autio, E. (2005). Entrepreneurship, innovation and economic growth: Evidence from GEM data. Small Business Economics, 24(3), 335–350."><span data-dcnode-id="2419" instrument_node="">2005</span></a><span data-dcnode-id="2417" instrument_node="">). Therefore, as China experiences economic slowdown and transformation, a move toward entrepreneurial economy is of practical significance to its economic growth. The Chinese government has put forward a national strategy of “mass entrepreneurship and innovation” along with a series of policies to promote innovation and entrepreneurship. However, judging from the realities about entrepreneurship, China still stays at a low entrepreneurial level. According to the survey of “Global Entrepreneurship Monitor”, the global entrepreneurship rate steadily increased from 8.9% in 2001 to 13.2% in 2015.</span><sup data-dcnode-id="2412"><a data-dcnode-id="2413" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Footnote </span></span><span data-dcnode-id="2414" instrument_node="">1</span></a></sup><span data-dcnode-id="2411" instrument_node=""> In the meantime, the entrepreneurship rate of China was fluctuating and low performing. In 2015, the entrepreneurship rate of China was 12.8%, which was 3.1% and 18.8% lower than the global level and the level of developing countries, respectively. Prieger, Bampoky, Blanco, and Liu (</span><a aria-label="Reference 2016" data-dcnode-id="2409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d245517653e445" title="Prieger, J. E., Bampoky, C., Blanco, L. R., &amp; Liu, A. (2016). Economic growth and the optimal level of entrepreneurship. World Development, 82, 95–109."><span data-dcnode-id="2410" instrument_node="">2016</span></a><span data-dcnode-id="2408" instrument_node="">) held that each economy has an optimal entrepreneurship rate at different stages of development and that any actual entrepreneurship rate that deviates from the optimal level will put a brake on economic growth. They measured the optimal entrepreneurship rates of countries with different income levels based on “Global Entrepreneurship Monitor.” The result showed that the optimal entrepreneurship rate for middle-income countries is 25.1% (Prieger et al., </span><a aria-label="Reference 2016" data-dcnode-id="2406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d245517653e449" title="Prieger, J. E., Bampoky, C., Blanco, L. R., &amp; Liu, A. (2016). Economic growth and the optimal level of entrepreneurship. World Development, 82, 95–109."><span data-dcnode-id="2407" instrument_node="">2016</span></a><span data-dcnode-id="2405" instrument_node="">). According to the classification of the World Bank, China is a country with average or above income. It can be inferred that the current entrepreneurship rate of China is far below its optimal level. There is no doubt that improving the entrepreneurial level of China is a realistic issue worth being studied deeply.</span></p><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">To this end, it is necessary to study the factors influencing entrepreneurship in order to develop targeted entrepreneurial promotion policies. In this information age, we need to explore the path to enhance entrepreneurship from the perspective of informationization. Informationization is a historical process in which information technology is fully exploited and information resources are developed and utilized to promote information exchange and knowledge sharing, increase the quality of economic growth, and boost economic and social development transformation. On the one hand, informationization, to a certain extent, weakens the scale advantage of large enterprises and allows more flexible small enterprises to grow and develop in the new economy (Prieger et al., </span><a aria-label="Reference 2016" data-dcnode-id="2401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d245517653e455" title="Prieger, J. E., Bampoky, C., Blanco, L. R., &amp; Liu, A. (2016). Economic growth and the optimal level of entrepreneurship. World Development, 82, 95–109."><span data-dcnode-id="2402" instrument_node="">2016</span></a><span data-dcnode-id="2400" instrument_node="">), which provides a favorable environment for entrepreneurship. From the perspective of transaction costs, informationization helps enterprises participate in market activities with lower transaction costs, saving them from attempt to reduce transaction costs through vertical integration, scaling up, hiring more employees, and building their own suppliers and distributors. They can be run at small size. In addition, from the perspective of agency cost, informationization reduces the costs of acquiring and analyzing information and the agency cost for enterprises. It also makes it easier for managers to supervise more employees, thereby reducing the number of middle management and clerks needed and thus the corporate size. All in all, informationization has an important effect on the behavior of market players in economic and social activities and the organizational form in the market, and significant entrepreneurial opportunities emerge. On the other hand, a number of new systems, new business types, new platforms, and new industries which are spawned by informationization provide institutional, technical, talent, capital, information, professional services, and other elements to support entrepreneurship, which lowers the threshold for entrepreneurship and creates a good business environment. Informationization not only creates abundant entrepreneurial opportunities, but also provides convenient entrepreneurial conditions. With the in-depth development of informationization, contributions of new ventures and small and micro enterprises to economic growth will become increasingly significant. Hence, it is particularly important to deepen the understanding of informationization and entrepreneurship.</span></p><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">This paper studies the influence of informationization on entrepreneurship based on information measurement indexes. The informationization level of China is measured from indexes of information infrastructure and the extent and benefits of information and communication technology applications. This paper also decomposes informationization into information infrastructure, government informationization, resident informationization, and enterprise informationization and examines their influence on entrepreneurship. It also goes further to discuss the heterogeneous effects of informationization on entrepreneurship and the relationship between informationization and entrepreneurial performance. This research not only enriches the understanding of informationization and entrepreneurship, but also has important implications for promoting the move toward entrepreneurial economy in China.</span></p></div></div></section><section data-dcnode-id="2313" data-gtm-vis-first-on-screen-50443292_562="2167" data-gtm-vis-first-on-screen-50443292_563="2167" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2167" data-gtm-vis-recent-on-screen-50443292_563="2167" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Literature review"><div class="c-article-section" data-dcnode-id="2314" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2392" id="Sec2"><span data-dcnode-id="2393" instrument_node="">Literature review</span></h2><div class="c-article-section__content" data-dcnode-id="2315" id="Sec2-content"><p data-dcnode-id="2372"><span data-dcnode-id="2391" instrument_node="">At present, numerous literatures have explored the impact of macroeconomic factors on entrepreneurship, such as economic development (Prieger et al., </span><a aria-label="Reference 2016" data-dcnode-id="2389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d245517653e469" title="Prieger, J. E., Bampoky, C., Blanco, L. R., &amp; Liu, A. (2016). Economic growth and the optimal level of entrepreneurship. World Development, 82, 95–109."><span data-dcnode-id="2390" instrument_node="">2016</span></a><span data-dcnode-id="2388" instrument_node="">), industry agglomeration (Brunello &amp; Langella, </span><a aria-label="Reference 2016" data-dcnode-id="2386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d245517653e472" title="Brunello, G., &amp; Langella, M. (2016). Local agglomeration, entrepreneurship and the 2008 recession: Evidence from Italian industrial districts. Regional Science and Urban Economics, 58, 104–114."><span data-dcnode-id="2387" instrument_node="">2016</span></a><span data-dcnode-id="2385" instrument_node="">), public finance (Darnihamedani, Block, Hessels, &amp; Simonyan, </span><a aria-label="Reference 2018" data-dcnode-id="2383" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d245517653e475" title="Darnihamedani, P., Block, J. H., Hessels, J., &amp; Simonyan, A. (2018). Taxes, start-up costs, and innovative entrepreneurship. Small Business Economics, 51(4), 355–369."><span data-dcnode-id="2384" instrument_node="">2018</span></a><span data-dcnode-id="2382" instrument_node="">; Islam, </span><a aria-label="Reference 2015" data-dcnode-id="2380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d245517653e478" title="Islam, A. (2015). Entrepreneurship and the allocation of government spending under imperfect markets. World Development, 70, 108–121."><span data-dcnode-id="2381" instrument_node="">2015</span></a><span data-dcnode-id="2379" instrument_node="">), and institutions (Bosma, Content, Sanders, &amp; Stam, </span><a aria-label="Reference 2018" data-dcnode-id="2377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d245517653e481" title="Bosma, N., Content, J., Sanders, M., &amp; Stam, E. (2018). Institutions, entrepreneurship, and economic growth in Europe. Small Business Economics, 51(2), 483–499."><span data-dcnode-id="2378" instrument_node="">2018</span></a><span data-dcnode-id="2376" instrument_node="">; Chowdhury, Audretsch, &amp; Belitski, </span><a aria-label="Reference 2019" data-dcnode-id="2374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d245517653e485" title="Chowdhury, F., Audretsch, D. B., &amp; Belitski, M. (2019). Institutions and entrepreneurship quality. Entrepreneurship Theory and Practice, 43(1), 51–81."><span data-dcnode-id="2375" instrument_node="">2019</span></a><span data-dcnode-id="2373" instrument_node="">). Particularly, in the age of informationization, scholars also notice the effect of informationization on entrepreneurship. They mainly study this topic in three aspects: information infrastructure, the utilization of information technology, and female entrepreneurship.</span></p><p data-dcnode-id="2355"><span data-dcnode-id="2371" instrument_node="">Firstly, the influence of information infrastructure on entrepreneurship has attracted the attention of many scholars. Based on the data about German counties from 2000 to 2005, the research of Audretsch, Heger, and Veith (</span><a aria-label="Reference 2015" data-dcnode-id="2369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d245517653e491" title="Audretsch, D. B., Heger, D., &amp; Veith, T. (2015). Infrastructure and entrepreneurship. Small Business Economics, 44(2), 219–230."><span data-dcnode-id="2370" instrument_node="">2015</span></a><span data-dcnode-id="2368" instrument_node="">) indicates that strengthening broadband infrastructure can help increase entrepreneurship rate. Cumming and Johan (</span><a aria-label="Reference 2010" data-dcnode-id="2366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d245517653e494" title="Cumming, D., &amp; Johan, S. (2010). The differential impact of the internet on spurring regional entrepreneurship. Entrepreneurship Theory and Practice, 34(5), 857–883."><span data-dcnode-id="2367" instrument_node="">2010</span></a><span data-dcnode-id="2365" instrument_node="">) analyze the data from Canada and find that rural communities with broadband internet have more entrepreneurial activities than those without. Gillett, Lehr, Osorio, and Sirbu (</span><a aria-label="Reference 2006" data-dcnode-id="2363" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d245517653e497" title="Gillett, S. E., Lehr, W. H., Osorio, C. A., &amp; Sirbu, M. A. (2006). Measuring broadbandʼs economic impact. In Massachusetts Institute of Technology Engineering Systems Division Working Papers Series."><span data-dcnode-id="2364" instrument_node="">2006</span></a><span data-dcnode-id="2362" instrument_node="">) draw the same conclusion as Cumming and Johan (</span><a aria-label="Reference 2010" data-dcnode-id="2360" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d245517653e500" title="Cumming, D., &amp; Johan, S. (2010). The differential impact of the internet on spurring regional entrepreneurship. Entrepreneurship Theory and Practice, 34(5), 857–883."><span data-dcnode-id="2361" instrument_node="">2010</span></a><span data-dcnode-id="2359" instrument_node="">) from the data about the USA. Recently, the research of Prieger, Lu, and Zhang (</span><a aria-label="Reference 2017" data-dcnode-id="2357" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d245517653e503" title="Prieger, J. E., Lu, H., &amp; Zhang, H. (2017). The importance of transportation, broadband, and intellectual infrastructure for entrepreneurship. In Pepperdine University, School of Public Policy Working Papers."><span data-dcnode-id="2358" instrument_node="">2017</span></a><span data-dcnode-id="2356" instrument_node="">) also supports that broadband infrastructure facilitates entrepreneurship and there are complementarities between broadband, transportation, and intellectual infrastructure in promoting entrepreneurship. In general, scholars believe that broadband infrastructure is an important factor in promoting entrepreneurship. However, broadband infrastructure is only an important aspect of information infrastructure. Existing literature does not comprehensively measure information infrastructure. The studies mentioned above to be further expanded and improved to fully understand the impact of information infrastructure on entrepreneurship.</span></p><p data-dcnode-id="2335"><span data-dcnode-id="2354" instrument_node="">Secondly, existing research also studies the relationship between the utilization of information technology and entrepreneurship. Hanoteau and Rosa (</span><a aria-label="Reference 2019" data-dcnode-id="2352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d245517653e509" title="Hanoteau, J., &amp; Rosa, J. (2019). Information technologies and entrepreneurship. Managerial and Decision Economics, 40(2), 200–212."><span data-dcnode-id="2353" instrument_node="">2019</span></a><span data-dcnode-id="2351" instrument_node="">) explain the difference in entrepreneurial levels between countries from the perspective of information technology application. Further international empirical research also shows that information technology usage is an important factor that promotes entrepreneurship. Based on the data from China, Barnett, Hu, and Wang (</span><a aria-label="Reference 2019" data-dcnode-id="2349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d245517653e512" title="Barnett, W. A., Hu, M., &amp; Wang, X. (2019). Does the utilization of information communication technology promote entrepreneurship: Evidence from rural China. Technological Forecasting and Social Change, 141, 12–21."><span data-dcnode-id="2350" instrument_node="">2019</span></a><span data-dcnode-id="2348" instrument_node="">) and Zhang and Li (</span><a aria-label="Reference 2018" data-dcnode-id="2346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d245517653e515" title="Zhang, F., &amp; Li, D. (2018). Regional ICT access and entrepreneurship: Evidence from China. Information &amp; Management, 55(2), 188–198."><span data-dcnode-id="2347" instrument_node="">2018</span></a><span data-dcnode-id="2345" instrument_node="">) argue that cell phone ownership and Internet use have positive impacts on entrepreneurship and the information technology usage can promote entrepreneurial performance. The studies of Asongu and Nwachukwu (</span><a aria-label="Reference 2018" data-dcnode-id="2343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d245517653e518" title="Asongu, S. A., &amp; Nwachukwu, J. C. (2018). Openness, ICT and entrepreneurship in sub-Saharan Africa. Information Technology &amp; People, 31(1), 278–303."><span data-dcnode-id="2344" instrument_node="">2018</span></a><span data-dcnode-id="2342" instrument_node="">) and Asongu, Nwachukwu, and Orim (</span><a aria-label="Reference 2018" data-dcnode-id="2340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d245517653e521" title="Asongu, S., Nwachukwu, J. C., &amp; Orim, S. I. (2018). Mobile phones, institutional quality and entrepreneurship in sub-Saharan Africa. Technological Forecasting and Social Change, 131, 183–203."><span data-dcnode-id="2341" instrument_node="">2018</span></a><span data-dcnode-id="2339" instrument_node="">) indicate that information technology usage improves openness and institutional quality to promote entrepreneurship in sub-Saharan Africa. In addition, the use of information technology has created new forms of entrepreneurship, for instance, digital entrepreneurship (Nambisan, </span><a aria-label="Reference 2016" data-dcnode-id="2337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d245517653e525" title="Nambisan, S. (2016). Digital entrepreneurship: Toward a digital technology perspective of entrepreneurship. Entrepreneurship Theory and Practice, 41(6), 1029–1055."><span data-dcnode-id="2338" instrument_node="">2016</span></a><span data-dcnode-id="2336" instrument_node="">). However, these studies ignore the application of information technology by different entities such as government, residents, and firms. Information technology applications of different entities may have different impacts on entrepreneurship.</span></p><p data-dcnode-id="2318"><span data-dcnode-id="2334" instrument_node="">Finally, other scholars focus on the influence of informationization on female entrepreneurship. McQuaid (</span><a aria-label="Reference 2002" data-dcnode-id="2332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d245517653e531" title="McQuaid, R. W. (2002). Entrepreneurship and ICT industries: Support from regional and local policies. Regional Studies, 36(8), 909–919."><span data-dcnode-id="2333" instrument_node="">2002</span></a><span data-dcnode-id="2331" instrument_node="">) stresses that female entrepreneurship rate is low in the past due to institutional, capital, information, and time restrictions, but more and more new companies have been founded by women recently, which leads us to think about the role of informationization in this change. Informationization provides a channel for women to show their personality and talents and offer them entrepreneurship opportunities (Mathew, </span><a aria-label="Reference 2010" data-dcnode-id="2329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d245517653e534" title="Mathew, V. (2010). Women entrepreneurship in Middle East: Understanding barriers and use of ICT for entrepreneurship development. International Entrepreneurship and Management Journal, 6(2), 163–181."><span data-dcnode-id="2330" instrument_node="">2010</span></a><span data-dcnode-id="2328" instrument_node="">; Prljić, Vučeković, &amp; Vujačić, </span><a aria-label="Reference 2015" data-dcnode-id="2326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d245517653e537" title="Prljić, S., Vučeković, M., &amp; Vujačić, S. (2015). The importance of information and communication technologies in the development of women entrepreneurship. Journal of Women’s Entrepreneurship and Education, (3–4), 65–76."><span data-dcnode-id="2327" instrument_node="">2015</span></a><span data-dcnode-id="2325" instrument_node="">). Martin and Wright (</span><a aria-label="Reference 2005" data-dcnode-id="2323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d245517653e540" title="Martin, L. M., &amp; Wright, T. L. (2005). No gender in cyberspace? Empowering entrepreneurship and innovation in female-run ICT small firms. International Journal of Entrepreneurial Behavior &amp; Research, 11(2), 162–178."><span data-dcnode-id="2324" instrument_node="">2005</span></a><span data-dcnode-id="2322" instrument_node="">) summarize three reasons why informationization is important for female entrepreneurship: Firstly, informationization carves out new areas that are more welcoming to women; secondly, in the context of information technology, women need less funds to start a business; and thirdly, informationization makes work more flexible, and women are able to strike a balance between family and career. Motilewa, Onakoya, and Oke (</span><a aria-label="Reference 2015" data-dcnode-id="2320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d245517653e543" title="Motilewa, D. B., Onakoya, O. A., &amp; Oke, A. O. (2015). ICT and gender specific challenges faced by female entrepreneurs in Nigeria. International Journal of Business and Social Science, 6(3), 97–105."><span data-dcnode-id="2321" instrument_node="">2015</span></a><span data-dcnode-id="2319" instrument_node="">) based on Nigeria’s case study show that information technology does have a positive influence in tackling the challenges faced by female entrepreneurs.</span></p><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">For both researches on information infrastructure, information technology usage, and entrepreneurship and those focusing on informationization and female entrepreneurship that exist in literature, scholars simply explore the influence of one aspect of informationization on entrepreneurship without examining the whole picture. Therefore, this paper will systematically study the impact of informationization on entrepreneurship.</span></p></div></div></section><section data-dcnode-id="2156" data-title="Method"><div class="c-article-section" data-dcnode-id="2157" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2311" id="Sec3"><span data-dcnode-id="2312" instrument_node="">Method</span></h2><div class="c-article-section__content" data-dcnode-id="2158" id="Sec3-content"><h3 class="c-article__sub-heading" data-dcnode-id="2309" id="Sec4"><span data-dcnode-id="2310" instrument_node="">Data</span></h3><p data-dcnode-id="2298"><span data-dcnode-id="2308" instrument_node="">Family plays an active role in enterprise formation and development in China (Pistrui, Huang, Oksoy, Jing, &amp; Welsch, </span><a aria-label="Reference 2010" data-dcnode-id="2306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d245517653e562" title="Pistrui, D., Huang, W., Oksoy, D., Jing, Z., &amp; Welsch, H. (2010). Entrepreneurship in China: Characteristics, attributes, and family forces shaping the emerging private sector. Family Business Review, 14(2), 141–152."><span data-dcnode-id="2307" instrument_node="">2010</span></a><span data-dcnode-id="2305" instrument_node="">). Many businesses are family owned. Therefore, we explore the impact of informationization on entrepreneurship from the perspective of family entrepreneurship. The measure of family entrepreneurship and family characteristic variable is based on the “2011 China Household Finance Survey” conducted by Southwestern University of Finance and Economics. The main reason of choosing this data is that it contains a wealth of family entrepreneurial information, such as entrepreneurial choice, type, and income. It would provide a good sample for the research of this paper. In addition, the “2011 China Household Finance Survey” is used in some empirical literature (Chai, Chen, Huang, &amp; Ye, </span><a aria-label="Reference 2018" data-dcnode-id="2303" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d245517653e565" title="Chai, S., Chen, Y., Huang, B., &amp; Ye, D. (2018). Social networks and informal financial inclusion in China. Asia Pacific Journal of Management, 35(1), 1–35."><span data-dcnode-id="2304" instrument_node="">2018</span></a><span data-dcnode-id="2302" instrument_node="">; Zhang, Xu, Zhou, Zhang, &amp; Xie, </span><a aria-label="Reference 2014" data-dcnode-id="2300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d245517653e568" title="Zhang, C., Xu, Q., Zhou, X., Zhang, X., &amp; Xie, Y. (2014). Are poverty rates underestimated in China? New evidence from four recent surveys. China Economic Review, 31(9), 410–425."><span data-dcnode-id="2301" instrument_node="">2014</span></a><span data-dcnode-id="2299" instrument_node="">), indicating the research data is credible. The data covers 25 provinces and 8438 sample households. The survey mainly includes household demographics, assets and liabilities, insurance and security, spending, and income. Specifically, the “2011 China Household Finance Survey” surveys family entrepreneurial information in 2010.</span></p><p data-dcnode-id="2293"><span data-dcnode-id="2297" instrument_node="">Further, we need to measure the regional informationization level in order to discuss the research issue of this paper. The “2011 China Household Finance Survey” investigated the status of family entrepreneurship in a province. Therefore, we measure the regional informationization level from the provincial level. The data of provincial informationization is from the </span><i data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Report of China Informationization Development Assessment</span></i><span data-dcnode-id="2294" instrument_node=""> (2013). The report is released by the China Center for Information Industry Development, and it measures provincial informationization level in 2010, mainly from the aspects of information infrastructure and the extent and benefits of information and communication technology applications. This report draws on the indexes and experience of the international community informationization assessment while fully allowing for the national conditions of China. Thus, it could truly reflect the informationization level of the country.</span></p><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">In addition, the measure of provincial-level control variables is from China Statistics Yearbook in 2011. The 2011 China Statistics Yearbook actually reports the economic data in 2010.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2289" id="Sec5"><span data-dcnode-id="2290" instrument_node="">Model</span></h3><p data-dcnode-id="2281"><span data-dcnode-id="2288" instrument_node="">To find the relationship between informationization and entrepreneurship, the paper matches informationization at the provincial level with the household entrepreneurial data of each province. In this way, the problem studied in our paper becomes the influence of regional informationization level on family entrepreneurship in this region. In the study of Islam (</span><a aria-label="Reference 2015" data-dcnode-id="2286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d245517653e588" title="Islam, A. (2015). Entrepreneurship and the allocation of government spending under imperfect markets. World Development, 70, 108–121."><span data-dcnode-id="2287" instrument_node="">2015</span></a><span data-dcnode-id="2285" instrument_node="">), he adopted a probit model to discuss the relationship between regional government spending and individual entrepreneurial choice. Since Islam (</span><a aria-label="Reference 2015" data-dcnode-id="2283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d245517653e591" title="Islam, A. (2015). Entrepreneurship and the allocation of government spending under imperfect markets. World Development, 70, 108–121."><span data-dcnode-id="2284" instrument_node="">2015</span></a><span data-dcnode-id="2282" instrument_node="">) also studied the influence of regional factors on micro-individual entrepreneurship, this paper refers to his research to construct the econometric model shown below:</span></p><div class="c-article-equation" data-dcnode-id="2272" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2275"><span class="mathjax-tex" data-dcnode-id="2276"><span class="MathJax_Preview" data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node=""> \mathrm{Probit}\left({\mathrm{entrep}}_{fp}=1\right)=F\left(\alpha +\beta {\mathrm{informationization}}_p+\gamma {F}_{fp}+\phi {P}_p\right) </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2273"><span data-dcnode-id="2274" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="2234"><span data-dcnode-id="2271" instrument_node="">where </span><i data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">entrep</span></i><sub data-dcnode-id="2266"><i data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">fp</span></i></sub><span data-dcnode-id="2265" instrument_node=""> represents the entrepreneurial choice of family </span><i data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">f</span></i><span data-dcnode-id="2262" instrument_node=""> in province </span><i data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">p</span></i><span data-dcnode-id="2259" instrument_node=""> and </span><i data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">informationization</span></i><sub data-dcnode-id="2254"><i data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">p</span></i></sub><span data-dcnode-id="2253" instrument_node=""> represents the informationization level of province </span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">p</span></i><span data-dcnode-id="2250" instrument_node="">. To attenuate the endogenous effect from missing important explanatory variables, the model incorporates two control variables: the characteristic variable at family level (</span><i data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">F</span></i><sub data-dcnode-id="2245"><i data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">fp</span></i></sub><span data-dcnode-id="2244" instrument_node="">) and the characteristic variable at regional level (</span><i data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">P</span></i><sub data-dcnode-id="2239"><i data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">p</span></i></sub><span data-dcnode-id="2238" instrument_node="">). </span><i data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">β</span></i><span data-dcnode-id="2235" instrument_node=""> is the core estimation coefficient of interest in this paper and is expected to be significantly positive.</span></p><p data-dcnode-id="2226"><span data-dcnode-id="2233" instrument_node="">The dependent variable is a dummy variable. If the ordinary least squares method is used to estimate Eq.&nbsp;(</span><a data-dcnode-id="2231" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2232" instrument_node="">1</span></a><span data-dcnode-id="2230" instrument_node="">), the result would be biased and deviating. Thus, the probit model is used instead. We can also use logit model to estimate Eq.&nbsp;(</span><a data-dcnode-id="2228" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2229" instrument_node="">1</span></a><span data-dcnode-id="2227" instrument_node="">), but there is no significant difference between the probit model and logit model. Therefore, this paper mainly adopts the probit model to study the effect of informationization on entrepreneurship and uses logit model for robustness test.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2224" id="Sec6"><span data-dcnode-id="2225" instrument_node="">Variables</span></h3><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">entrep is a dummy variable measuring whether a family is engaged in entrepreneurial activities. The “China Household Finance Survey” asks whether a family is engaged in industrial and commercial production and operation in 2010. For this question, a positive answer indicates that the family is entrepreneurial and entrep is assigned the value of 1; a negative answer indicates that the family is not entrepreneurial and entrep is 0.</span></p><p data-dcnode-id="2217"><span data-dcnode-id="2221" instrument_node="">informationization is the natural logarithm of the informationization development index, which is used to measure the informationization level of each province. The informationization development index of each province comes from the </span><i data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Report of China Informationization Development Assessment</span></i><span data-dcnode-id="2218" instrument_node=""> (2013). The higher the informationization development index of a province is, the higher the informationization level it has.</span></p><p data-dcnode-id="2201"><i data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">F</span></i><span data-dcnode-id="2214" instrument_node=""> is a family characteristic variable that affects family entrepreneurship. Referring to existing research (Aldrich &amp; Cliff, </span><a aria-label="Reference 2003" data-dcnode-id="2212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d245517653e747" title="Aldrich, H. E., &amp; Cliff, J. E. (2003). The pervasive effects of family on entrepreneurship: Toward a family embeddedness perspective. Journal of Business Venturing, 18(5), 573–596."><span data-dcnode-id="2213" instrument_node="">2003</span></a><span data-dcnode-id="2211" instrument_node="">; Paulson &amp; Townsend, </span><a aria-label="Reference 2004" data-dcnode-id="2209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d245517653e750" title="Paulson, A. L., &amp; Townsend, R. (2004). Entrepreneurship and financial constraints in Thailand. Journal of Corporate Finance, 10(2), 229–262."><span data-dcnode-id="2210" instrument_node="">2004</span></a><span data-dcnode-id="2208" instrument_node="">; Yueh, </span><a aria-label="Reference 2009" data-dcnode-id="2206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d245517653e753" title="Yueh, L. (2009). China’s entrepreneurship. World Development, 37(4), 778–786."><span data-dcnode-id="2207" instrument_node="">2009</span></a><span data-dcnode-id="2205" instrument_node="">), we add political network (PN), social network (SN), number of members (NM), risk aversion (RA), and house ownership (HO) to </span><i data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">F</span></i><span data-dcnode-id="2202" instrument_node="">. Political network is a dummy variable. If a family has at least one member as civil servant, the political network variable is valued 1; if none of the family members are civil servants, the value of this variable is zero. Compared with families that have none of their members as civil servants, those with members as civil servants have a more sophisticated political network. The social network is the natural logarithm of the amount of donation from a family to the Wenchuan earthquake-stricken area in 2008. There are two reasons for choosing the amount of donation as a measure of family’s social network: For one thing, the amount of donation, to a certain extent, reflects the social status of the family, as the more it donates, the higher social status it enjoys and families with high social status usually have more extensive interpersonal networks. For the other, the Wenchuan earthquake is an exogenous shock, and this measure could be regarded as exogenous. The number of members is the number of family members. Risk aversion is divided into five levels. The higher the level, the more inclined for the family to avoid risks. House ownership is a dummy variable. If a family owns a house, this variable is valued 1; otherwise, it is valued zero.</span></p><p data-dcnode-id="2187"><span data-dcnode-id="2200" instrument_node="">According to existing research (Acs, Desai, &amp; Hessels, </span><a aria-label="Reference 2008" data-dcnode-id="2198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d245517653e762" title="Acs, Z. J., Desai, S., &amp; Hessels, J. (2008). Entrepreneurship, economic development and institutions. Small Business Economics, 31(3), 219–234."><span data-dcnode-id="2199" instrument_node="">2008</span></a><span data-dcnode-id="2197" instrument_node="">; Ghani, Kerr, &amp; O’connell, </span><a aria-label="Reference 2014" data-dcnode-id="2195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d245517653e765" title="Ghani, E., Kerr, W. R., &amp; O’connell, S. (2014). Spatial determinants of entrepreneurship in India. Regional Studies, 48(6), 1071–1089."><span data-dcnode-id="2196" instrument_node="">2014</span></a><span data-dcnode-id="2194" instrument_node="">; Islam, </span><a aria-label="Reference 2015" data-dcnode-id="2192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d245517653e768" title="Islam, A. (2015). Entrepreneurship and the allocation of government spending under imperfect markets. World Development, 70, 108–121."><span data-dcnode-id="2193" instrument_node="">2015</span></a><span data-dcnode-id="2191" instrument_node="">; Wennekers, Wennekers, Thurik, &amp; Reynolds, </span><a aria-label="Reference 2005" data-dcnode-id="2189" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d245517653e771" title="Wennekers, S., Wennekers, A. V., Thurik, R., &amp; Reynolds, P. (2005). Nascent entrepreneurship and the level of economic development. Social Science Electronic Publishing, 24(3), 293–309."><span data-dcnode-id="2190" instrument_node="">2005</span></a><span data-dcnode-id="2188" instrument_node="">), we add unemployment rate (UR), population density (PD), educational level (EL), economic development level (EDL), minimum wage standard (MWS), and proportion of fiscal revenue to GDP (FR). The unemployment rate is the urban registered unemployment rate. The population density is the natural logarithm of the ratio of the total population to the land area at the end of the year. The educational level is the natural logarithm of the number of graduates with a college degree or above per 100,000 people. The economic development level is measured by the per capita GDP and is the natural logarithm from empirical research. The minimum wage standard is the natural logarithm of the minimum wage based on the lowest standard. The proportion of fiscal revenue is the proportion of fiscal revenue to regional GDP.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2185" id="Sec7"><span data-dcnode-id="2186" instrument_node="">Descriptive analysis</span></h3><p data-dcnode-id="2174"><span data-dcnode-id="2184" instrument_node="">The Table&nbsp;</span><a data-dcnode-id="2182" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2183" instrument_node="">1</span></a><span data-dcnode-id="2181" instrument_node=""> shows summary statistics of all variables based on variable measurement. The mean value of entrep is 0.1333, which indicates that 13.33% of families choose to start a business in China. Prieger et al. (</span><a aria-label="Reference 2016" data-dcnode-id="2179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d245517653e785" title="Prieger, J. E., Bampoky, C., Blanco, L. R., &amp; Liu, A. (2016). Economic growth and the optimal level of entrepreneurship. World Development, 82, 95–109."><span data-dcnode-id="2180" instrument_node="">2016</span></a><span data-dcnode-id="2178" instrument_node="">) argues that the optimal entrepreneurship rate for middle-income countries is 25.1%. Therefore, China’s entrepreneurship rate still has a lot of room for improvement. Another variable we are concerned with is the provincial informationization level. In our research sample, the highest level of informationization is Shanghai, and the natural logarithm of the informationization development index is 4.5078; the lowest level of informationization is Gansu, and the natural logarithm of the informationization development index is 3.5885. The maximum value is 1.26 times the minimum value. The data shows that there is obvious inter-provincial difference in the level of informationization (Additional file </span><a data-dcnode-id="2176" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2177" instrument_node="">1</span></a><span data-dcnode-id="2175" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2159" data-test="inline-table" id="table-1"><figure data-dcnode-id="2160"><figcaption class="c-article-table__figcaption" data-dcnode-id="2171"><b data-dcnode-id="2172" data-test="table-caption" id="Tab1"><span data-dcnode-id="2173" instrument_node="">Table 1 Summary statistics of all variables</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2161"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2162" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/s40497-019-0171-5/tables/1" rel="nofollow"><span data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2163" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2164" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2165" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2168" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2167" fill-rule="evenodd"></path><span data-dcnode-id="2166" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="1829" data-title="Results and discussion"><div class="c-article-section" data-dcnode-id="1830" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2154" id="Sec8"><span data-dcnode-id="2155" instrument_node="">Results and discussion</span></h2><div class="c-article-section__content" data-dcnode-id="1831" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="2152" id="Sec9"><span data-dcnode-id="2153" instrument_node="">Basic regression results</span></h3><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">The dependent variable (entrep) is a dummy variable, and thus, this study uses the probit model to study the influence of informationization on entrepreneurship. In the probit model, the estimated coefficient could only reflect in what direction the explanatory variable influenced the dependent variable and could not reflect the magnitude of such influence. Therefore, the average marginal effect of the explanatory variable is calculated to reflect the influence of the explanatory variable on the dependent variable. In addition, this study adopts cross-section data which is usually vulnerable to heteroscedasticity. For this reason, robust standard error is used in the model estimation to reduce the impact of heteroscedasticity on the estimation result.</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2149" instrument_node="">Column 1 of Table&nbsp;</span><a data-dcnode-id="2147" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2148" instrument_node="">2</span></a><span data-dcnode-id="2146" instrument_node=""> reports the benchmark regression results of the influence of informationization on entrepreneurship. The estimated coefficient of informationization is positive at the significance level of 1%, indicating that the higher the level of informatization, the higher the tendency of family entrepreneurship in the province. In terms of the magnitude of influence, when the informationization level increases by 1%, the probability of the family choosing to start a business increases by 22.21 percentage points. This indicates that the role of informationization in promoting entrepreneurship is not only statistically significant, but also economically significant. The basic regression results show informationization plays a significant role in promoting entrepreneurship, mainly because it can provide abundant opportunities and convenient conditions for entrepreneurship. According to the </span><i data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Report of China Informationization Development Assessment</span></i><span data-dcnode-id="2143" instrument_node=""> released by the China Center for Information Industry Development in 2015, 11 provinces have informationization development indexes higher than the national average, while the case is opposite for 20 provinces. In addition, this paper also calculates the entrepreneurship rate of each province according to the “China Household Finance Survey”. The calculation results show that 8 provinces have entrepreneurship rates higher than the national average and the case is opposite for 17 provinces. This indicates that the informationization level and the entrepreneurship rate remain low in most parts of China. Under this context, it is of practical significance to the promotion of “mass entrepreneurship” and economic development if the government further strengthens informationization construction.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2127" data-test="inline-table" id="table-2"><figure data-dcnode-id="2128"><figcaption class="c-article-table__figcaption" data-dcnode-id="2139"><b data-dcnode-id="2140" data-test="table-caption" id="Tab2"><span data-dcnode-id="2141" instrument_node="">Table 2 Regression results of the influence of informationization on entrepreneurship</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2129"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2130" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/s40497-019-0171-5/tables/2" rel="nofollow"><span data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2131" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2132" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2133" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2136" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2135" fill-rule="evenodd"></path><span data-dcnode-id="2134" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2113"><span data-dcnode-id="2126" instrument_node="">Next, we briefly explain the influence of control variables on entrepreneurship based on benchmark regression results. The estimated coefficient of the political network is negative at the significance level of 1%, which indicates that families with political networks are 9.95 percentage points less likely to start a business than families without political networks. Necessity-push entrepreneurship is the main type of family entrepreneurship in China. With well-off conditions, families of civil servants are naturally less motivated to start a business. The social network has a positive estimated coefficient and passes the 1% significance test, indicating that an extensive social network plays a significant role in promoting entrepreneurship. This finding is consistent with the conclusions of Renzulli, Aldrich, and Moody (</span><a aria-label="Reference 2000" data-dcnode-id="2124" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d245517653e1907" title="Renzulli, L. A., Aldrich, H., &amp; Moody, J. (2000). Family matters: Gender, networks, and entrepreneurial outcomes. Social Forces, 79(2), 523–546."><span data-dcnode-id="2125" instrument_node="">2000</span></a><span data-dcnode-id="2123" instrument_node="">) and Yueh (</span><a aria-label="Reference 2009" data-dcnode-id="2121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d245517653e1910" title="Yueh, L. (2009). China’s entrepreneurship. World Development, 37(4), 778–786."><span data-dcnode-id="2122" instrument_node="">2009</span></a><span data-dcnode-id="2120" instrument_node="">). Entrepreneurship requires a range of resources such as information, capital, technology, and labor. People can get entrepreneurial resources they need through their social networks. Hence, residents with more extensive social networks are more likely to venture into entrepreneurial activities. The estimated coefficient of the number of members is positive at the significance level of 1%. Families with more members are more likely to start a business. This is mainly because more family members mean wider social networks. The estimated coefficient of risk aversion is significantly negative, indicating that the higher the risk aversion, the lower the probability that families would choose to start a business. Empirical studies by Cramer, Hartog, Jonker, and Praag (</span><a aria-label="Reference 2002" data-dcnode-id="2118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d245517653e1913" title="Cramer, J. S., Hartog, J., Jonker, N., &amp; Praag, C. M. V. (2002). Low risk aversion encourages the choice for entrepreneurship: An empirical test of a truism. Journal of Economic Behavior &amp; Organization, 48(1), 29–36."><span data-dcnode-id="2119" instrument_node="">2002</span></a><span data-dcnode-id="2117" instrument_node="">) and Hvide and Panos (</span><a aria-label="Reference 2014" data-dcnode-id="2115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d245517653e1916" title="Hvide, H. K., &amp; Panos, G. A. (2014). Risk tolerance and entrepreneurship. Journal of Financial Economics, 111(1), 200–223."><span data-dcnode-id="2116" instrument_node="">2014</span></a><span data-dcnode-id="2114" instrument_node="">) also support this conclusion. The estimated coefficient of house ownership is negative, but it does not pass the significance test, which means that house ownership is not significantly related to the probability of starting a business.</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2112" instrument_node="">In terms of regional characteristic variables, the estimated coefficient of unemployment rate is significantly positive. In areas with high unemployment rates, starting a business is a more likely choice for families, mainly because unemployment might force people to engage in entrepreneurial activities for their livelihood. The estimated coefficient of population density does not pass the significance test. Ghani et al. (</span><a aria-label="Reference 2014" data-dcnode-id="2110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d245517653e1922" title="Ghani, E., Kerr, W. R., &amp; O’connell, S. (2014). Spatial determinants of entrepreneurship in India. Regional Studies, 48(6), 1071–1089."><span data-dcnode-id="2111" instrument_node="">2014</span></a><span data-dcnode-id="2109" instrument_node="">) believe that areas with high population densities have more concentrated knowledge, resources, talents, and creativity, which could, in turn, stimulate people’s enthusiasm for entrepreneurship. However, excessive concentration of population may generate congestion costs and thus increase the cost of entrepreneurship. Therefore, on the whole, population density does not have a significant impact on entrepreneurship. The estimated coefficient of educational level is significantly negative, indicating that families in areas with high educational attainment are less likely to start a business. An important reason is that people with higher educational degrees have more external choices and are more likely to get satisfactory jobs, and they are less motivated to engage in high-risk entrepreneurial activities (Van der Sluis, Van Praag, &amp; Vijverberg, </span><a aria-label="Reference 2008" data-dcnode-id="2107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d245517653e1925" title="Van der Sluis, J., Van Praag, M., &amp; Vijverberg, W. (2008). Education and entrepreneurship selection and performance: A review of the empirical literature. Journal of Economic Surveys, 22(5), 795–841."><span data-dcnode-id="2108" instrument_node="">2008</span></a><span data-dcnode-id="2106" instrument_node="">). The economic development level of a region does not have a significant impact on the choice of family entrepreneurship. The estimated coefficient of minimum wage standard is negative at the significance level of 10%, indicating that this variable could inhibit entrepreneurship. Areas with high minimum wage standards also entail high opportunity cost and labor cost of entrepreneurial activities, so families are less likely to start a business. The estimated coefficient of fiscal revenue proportion is negative at the significant level of 1%, and families in areas with high fiscal revenue proportion tend not to venture into entrepreneurship. The conclusion is consistent with the finding of Djankov, Ganser, McLiesh, Ramalho, and Shleifer (</span><a aria-label="Reference 2010" data-dcnode-id="2104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d245517653e1928" title="Djankov, S., Ganser, T., McLiesh, C., Ramalho, R., &amp; Shleifer, A. (2010). The effect of corporate taxes on investment and entrepreneurship. American Economic Journal: Macroeconomics, 2(3), 31–64."><span data-dcnode-id="2105" instrument_node="">2010</span></a><span data-dcnode-id="2103" instrument_node="">). A high proportion of fiscal revenue suggests a heavy tax burden on enterprises, which increases the cost of entrepreneurship and thus undermines the motivation to start a business. Therefore, it is important to reduce the burden on enterprises when the Chinese government tries to encourage residents into entrepreneurship.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2100" id="Sec10"><span data-dcnode-id="2101" instrument_node="">Robustness test</span></h3><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Benchmark regression results have proved the significant effect of informationization on entrepreneurship, yet this conclusion may still be affected by other factors, such as endogeneity, index metrics, econometric model, and research sample. In order to illustrate the robustness of the research conclusion, this paper also conducts a series of robustness tests.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2096" id="Sec11"><span data-dcnode-id="2097" instrument_node="">Regression on instrumental variable</span></h3><p data-dcnode-id="2091"><span data-dcnode-id="2095" instrument_node="">Endogeneity may lead to biased and inconsistent estimates. As far as this study is concerned, the endogeneity mainly comes from missing important explanatory variables and the possible bidirectional causality between informationization and entrepreneurship. To solve the endogenous problem, we have to find an appropriate instrumental variable. With reference to the research of Kolko (</span><a aria-label="Reference 2012" data-dcnode-id="2093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d245517653e1947" title="Kolko, J. (2012). Broadband and local growth. Journal of Urban Economics, 71(1), 100–113."><span data-dcnode-id="2094" instrument_node="">2012</span></a><span data-dcnode-id="2092" instrument_node="">), this paper uses altitude as an instrumental variable of informationization. The geographical environment of a region can affect the cost of local informationization construction. Altitude is an important geographical factor that affects informationization construction. Areas with higher altitudes need higher costs of informationization construction and have lower informationization levels. In addition, as an exogenous geographical factor, altitude is not affected by family entrepreneurship. Arguably, altitude is an effective instrumental variable of informationization. With regard to the measurement of altitude for each province, this paper considers the average altitude of major cities in each province to approximate the altitude of each province.</span></p><p data-dcnode-id="2083"><span data-dcnode-id="2090" instrument_node="">Based on the selected instrumental variable for informationization, this paper reestimates Eq.&nbsp;(</span><a data-dcnode-id="2088" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="2089" instrument_node="">1</span></a><span data-dcnode-id="2087" instrument_node="">) using the IV probit model. The estimation results are shown in column 2 of Table&nbsp;</span><a data-dcnode-id="2085" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2086" instrument_node="">2</span></a><span data-dcnode-id="2084" instrument_node="">. The estimated coefficient of informationization is positive and passes the 1% significance test. In addition, the Wald exogenous test passes the 5% significance test, which indicates that the test rejects the null hypothesis that the informationization variable is exogenous, suggesting that the regression using the IV probit model is effective in this paper. The regression results show that the research conclusion that informationization promotes entrepreneurship after considering the endogenous problem is robust.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2081" id="Sec12"><span data-dcnode-id="2082" instrument_node="">Remeasurement of informationization variable</span></h3><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">The informationization evaluation results vary with evaluation indexes and methods. Therefore, in order to prove that the research conclusion does not vary with informationization measurement methods, this paper uses the informationization development indexes constructed by the National Bureau of Statistics to reevaluate the influence of informationization on entrepreneurship.</span></p><p data-dcnode-id="2074"><span data-dcnode-id="2078" instrument_node="">The informationization development indexes constructed by the National Bureau of Statistics are used to comprehensively measure the informationization levels of various provinces in China from the aspects of informationization infrastructure construction, information industry and technology, informationization consumption level, environmental constraints, and development effects. The National Bureau of Statistics and the China Center for Information Industry Development offer different informationization measurement indexes and methods. Since we need to further study the influence of informationization infrastructure, government informationization, resident informationization, and enterprise informationization on entrepreneurship, the index system provided by the China Center for Information Industry Development better suits our research requirement. Thus, this paper adopts the informationization development indexes provided by the China Center for Information Industry Development for empirical research and those from the National Bureau of Statistics for robustness test. The data of the latter is derived from the </span><i data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">2012 Annual Report of China Informationization Development Index Statistical Monitoring</span></i><span data-dcnode-id="2075" instrument_node="">. In addition, the correlation between the two groups of informationization development indexes provided by the two institutions is calculated in this paper. The calculation results show that the correlation is as high as 0.93 and passes the 1% significance test, which means that both of the index systems could consistently reflect the informationization level of each province.</span></p><p data-dcnode-id="2069"><span data-dcnode-id="2073" instrument_node="">Column 3 of Table&nbsp;</span><a data-dcnode-id="2071" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2072" instrument_node="">2</span></a><span data-dcnode-id="2070" instrument_node=""> reports the regression results of the informationization indexes remeasured. The regression results show that the estimated coefficient of informationization is positive at the significance level of 1%, which indicates that the conclusion that informationization greatly promotes entrepreneurship is still well grounded even if the evaluation indexes and methods are changed.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2067" id="Sec13"><span data-dcnode-id="2068" instrument_node="">Logit model</span></h3><p data-dcnode-id="2062"><span data-dcnode-id="2066" instrument_node="">Although there is no essential difference between the estimation results based on the probit model and the logit model, we would also adopt the logit model to estimate the impact of informationization on entrepreneurship in order to show that the conclusion of the paper is not changed due to the change of the measurement model. Column 4 of Table&nbsp;</span><a data-dcnode-id="2064" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2065" instrument_node="">2</span></a><span data-dcnode-id="2063" instrument_node=""> illustrates the regression results based on the logit model. The estimated coefficient of informationization is significantly positive. As we saw in columns 1 and 4, the estimated coefficients of informationization based on the probit model and the logit model are very similar. Therefore, we believe that the research conclusion that regional informationization has a promotion effect on entrepreneurship would not change whether using the probit model or the logit mo
