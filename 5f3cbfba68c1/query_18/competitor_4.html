del.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2060" id="Sec14"><span data-dcnode-id="2061" instrument_node="">Research sample replacement</span></h3><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">There are two main surveys to investigate the entrepreneurship of Chinese families, namely China Household Finance Survey and China Family Panel Studies. In comparison, China Household Finance Survey includes more entrepreneurial information, such as entrepreneurial industries, entrepreneurial types, and number of employees employed. This information is conductive to study the heterogeneous influences of informationization on entrepreneurship and influence of informationization on entrepreneurial performance. Therefore, this paper eventually chooses the China Household Finance Survey to analyze the effect of informationization on entrepreneurship. However, China Household Finance Survey only supplies cross-section data in 2010, which may lead to inaccurate estimation results due to the missing time factor. Fortunately, China Family Panel Studies provide family entrepreneurship information for 2011, 2013, and 2015. Hence, we use this dataset for robustness test.</span></p><p data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node="">Due to the replacement of research sample, we need to redefine some control variables in family level, but the definition of control variables in the provincial level has not changed. The social network is the natural logarithm of the amount of family donations per year. Risk aversion is the dummy variable. If a family purchases a financial product, this variable is valued 0; otherwise, it is valued 1. Column 5 of Table&nbsp;</span><a data-dcnode-id="2055" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2056" instrument_node="">2</span></a><span data-dcnode-id="2054" instrument_node=""> shows the regression results based on China Family Panel Studies. China Family Panel Studies do not provide any information regarding the political network of family. Therefore, column 5 does not include the political network variable. The estimated coefficient of informationization is significantly positive, which indicates that the research conclusion is still true when we expand the study sample and consider the time factor.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2051" id="Sec15"><span data-dcnode-id="2052" instrument_node="">Influences of different dimensions of informationization on entrepreneurship</span></h3><p data-dcnode-id="2046"><span data-dcnode-id="2050" instrument_node="">Informationization is strongly penetrable, and it can be applied deeply into all aspects of economy and society. It is mainly divided into informationization applications in the government, residents, and enterprises. Informationization applications are realized on the basis of information infrastructure. Therefore, informationization can be roughly decomposed into information infrastructure, government informationization, resident informationization, and enterprise informationization. These different dimensions have different influences on entrepreneurship, and this is the topic of further interest in this paper. In order to study this issue, this paper measures the information infrastructure construction level, government informationization degree, resident informationization degree, and enterprise informationization degree of each province from the network readiness index, the government application index, the resident application index, and the enterprise application index given in the </span><i data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Report of China Informationization Development Assessment</span></i><span data-dcnode-id="2047" instrument_node=""> (2013). In the empirical research, the four indexes above takes on the form of natural logarithm.</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2045" instrument_node="">Table&nbsp;</span><a data-dcnode-id="2043" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2044" instrument_node="">3</span></a><span data-dcnode-id="2042" instrument_node=""> reports the regression results of the influences of different informationization dimensions on entrepreneurship. Column 1 shows the influence of information infrastructure on entrepreneurship. Its estimated coefficient is positive at the significance level of 1%, indicating that the more developed the information infrastructure in a region, the more likely the families there would choose to start a business. Specifically, every 1% increase in the information infrastructure level in a region would lead to an increase in the probability of family entrepreneurship by 13.8 percentage points. Information infrastructure not only spurs significant entrepreneurial opportunities, but also enhances connectivity and interaction between people, facilitates exchange and sharing of knowledge and ideas, and thus promotes entrepreneurship (Audretsch et al., </span><a aria-label="Reference 2015" data-dcnode-id="2040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d245517653e2022" title="Audretsch, D. B., Heger, D., &amp; Veith, T. (2015). Infrastructure and entrepreneurship. Small Business Economics, 44(2), 219–230."><span data-dcnode-id="2041" instrument_node="">2015</span></a><span data-dcnode-id="2039" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2023" data-test="inline-table" id="table-3"><figure data-dcnode-id="2024"><figcaption class="c-article-table__figcaption" data-dcnode-id="2035"><b data-dcnode-id="2036" data-test="table-caption" id="Tab3"><span data-dcnode-id="2037" instrument_node="">Table 3 Regression results of different dimensions of informationization on entrepreneurship</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2025"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="2026" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/s40497-019-0171-5/tables/3" rel="nofollow"><span data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2027" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2028" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2029" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2032" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2031" fill-rule="evenodd"></path><span data-dcnode-id="2030" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">Column 2 shows the regression results of government informationization and family entrepreneurial choice. The estimated coefficient of government informationization is positive and passes the 1% significance test. Every 1% increase in government informationization would lead to an increase in the probability of family entrepreneurship by 3.71 percentage points. Das and Das (</span><a aria-label="Reference 2015" data-dcnode-id="2020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d245517653e2535" title="Das, A., &amp; Das, S. S. (2015). Online government services and setting up business: Evidence from panel data. Journal of Applied Measurement, 9(3), 200–210."><span data-dcnode-id="2021" instrument_node="">2015</span></a><span data-dcnode-id="2019" instrument_node="">) also agree that government informationization can promote market entry for enterprises. Government informationization promotes entrepreneurship mainly from three aspects. Firstly, it helps promote inter-departmental cooperation, breaks information islands, and realizes information transfer and resources scheduling between departments, thus helping to optimize administrative approval processes and improve administrative approval efficiency, which can better motivate residents to start a business. Secondly, government information disclosure made possible by government informationization can effectively restrain the government’s control of the market economy, make the exercise of power more transparent, reduce the cost of rent-seeking, and create transparent business environment for entrepreneurship. Thirdly, government informationization can promote innovative supply of public services and integration of service resources, result in an integrated online public service system, provide a full range of entrepreneurial services, and reduce the cost of entrepreneurship.</span></p><p data-dcnode-id="2013"><span data-dcnode-id="2017" instrument_node="">Column 3 explores the influence of resident informationization on entrepreneurship. The estimated coefficient of resident informationization is positive, but it is less statistically significant than the estimated coefficients of informationization infrastructure and government informationization, and it only passes the 10% significance test. Every 1% increase in resident informationization would result in an increase in the probability of family entrepreneurship by 6.46 percentage points. Resident informationization has a positive influence on entrepreneurship for at least three reasons. Firstly, it helps residents access the global network; in other words, residents can expand the market scope and seek opportunities for entrepreneurship (McQuaid, </span><a aria-label="Reference 2002" data-dcnode-id="2015" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d245517653e2541" title="McQuaid, R. W. (2002). Entrepreneurship and ICT industries: Support from regional and local policies. Regional Studies, 36(8), 909–919."><span data-dcnode-id="2016" instrument_node="">2002</span></a><span data-dcnode-id="2014" instrument_node="">). Secondly, entrepreneurial activities usually involve collecting and processing a large amount of information. Resident informationization is conducive to this task and thus encourages residents to engage in entrepreneurial activities. Thirdly, the high requirements for capital, system, and information in traditional industries make them prohibitive to entrepreneurs, while the development of e-commerce and the improvement in resident informationization help residents to engage in entrepreneurial activities in the field of e-commerce with less capital and more flexible time.</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Column 4 shows the regression results of the influence of enterprise informationization on entrepreneurship. Its estimated coefficient is negative at the significance level of 1%. Every 1% increase in enterprise informationization would lead to a decrease in the probability of family entrepreneurship by 9.89 percentage points. Arguably, different from the influences of informationization infrastructure, government informationization, and resident informationization on entrepreneurship, enterprise informationization exerts a negative influence. Higher enterprise informationization in a region means that local enterprises are more competitive in the market, which undoubtedly increases the threshold for market access. To compete with incumbent enterprises, interested entrants need to invest more in information. This increases the cost of entrepreneurship for residents and discourages some otherwise entrepreneurial residents from the market. There is a dilemma here: improving the informationization of enterprises can enhance their competitiveness, while it hinders entrepreneurship. In this case, the government should build an informationization service platform for new ventures in order to reduce the informationization investment needed by resident entrepreneurs in the startup stage.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2009" id="Sec16"><span data-dcnode-id="2010" instrument_node="">Heterogeneous influences of informationization on entrepreneurship</span></h3><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">In the previous part of this study, entrepreneurial activities are considered homogeneous. In fact, this is not the case. In general, entrepreneurship can be broadly divided into corporate entrepreneurship and self-employed entrepreneurship. Compared with the latter, corporate entrepreneurship has to overcome higher thresholds of capital, technology, and management and delivers greater economic and social benefits. The influences of the same factor vary with different types of entrepreneurship. In addition, different industries have different informationization levels, which, in turn, have different influences on business ventures in different industries. Based on the analysis above, this section focuses on the heterogeneous influences of informationization on different types of entrepreneurship and different entrepreneurial industries.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2005" id="Sec17"><span data-dcnode-id="2006" instrument_node="">Heterogeneity of entrepreneurial types</span></h3><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">In order to explore the influence of informationization on different types of entrepreneurship, the dependent variable (entrep) needs to be redefined. If a family is not engaged in entrepreneurial activities, entrep is assigned with a value of 0. If the business is started in the form of enterprise, entrep is valued 1. If the business is on self-employed basis, entrep is valued 2. The “China Household Finance Survey” divides family entrepreneurship into joint stock company, limited liability company, partnership, sole proprietorship, self-employed individual/privately, or individually owned business. In this paper, joint stock company, limited liability company, partnership, and sole proprietorship are classified as corporate entrepreneurship. According to statistics, of 1125 entrepreneurial families, 13.78% chose corporate entrepreneurship and 86.22% chose self-employed entrepreneurship. Individually owned business is the main type of entrepreneurship for Chinese residents, which is also evidenced for the prevailing necessity-push entrepreneurship among Chinese residents.</span></p><p data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">Since the dependent variable here is a multiple-choice variable, this paper borrows the multiple-choice probit model to study the influence of informationization on different types of entrepreneurship. In the multiple-choice probit model, the baseline group is families that are not entrepreneurial, and all the estimated coefficients are compared with the results of the baseline group. Columns 1 and 2 of Table&nbsp;</span><a data-dcnode-id="2000" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="2001" instrument_node="">4</span></a><span data-dcnode-id="1999" instrument_node=""> reports the estimates. Column 1 shows the regression results of informationization and corporate entrepreneurship. The estimated coefficient of informationization is positive, but it does not pass the significance test. Every 1% increase in the informationization level of the region would result in an increase in the probability of family corporate entrepreneurship by 4.02 percentage points. Column 2 shows the regression results of informationization and self-employed entrepreneurship. The estimated coefficient of informationization is positive and passes the 1% significance test. Every 1% increase in the informationization level would result in an increase in the probability of family self-employed entrepreneurship by 17.43 percentage points. In contrast, informationization plays a bigger role in promoting self-employed entrepreneurship. The main reason is that informationization provides flexible and convenient conditions for entrepreneurship, which is in line with flexible self-employment entrepreneurship. Thus, informationization promotes self-employment entrepreneurship better.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1983" data-test="inline-table" id="table-4"><figure data-dcnode-id="1984"><figcaption class="c-article-table__figcaption" data-dcnode-id="1995"><b data-dcnode-id="1996" data-test="table-caption" id="Tab4"><span data-dcnode-id="1997" instrument_node="">Table 4 Regression results of the heterogeneous influences of informationization on entrepreneurship</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1985"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="1986" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/s40497-019-0171-5/tables/4" rel="nofollow"><span data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1987" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1988" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1989" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1992" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1991" fill-rule="evenodd"></path><span data-dcnode-id="1990" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1981" id="Sec18"><span data-dcnode-id="1982" instrument_node="">Heterogeneity of entrepreneurial industries</span></h3><p data-dcnode-id="1973"><span data-dcnode-id="1980" instrument_node="">In order to study the industry heterogeneity in the influence of informationization on entrepreneurship, this paper divides industry into secondary industries, domestic services, and productive services,</span><sup data-dcnode-id="1975"><a data-dcnode-id="1976" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Footnote </span></span><span data-dcnode-id="1977" instrument_node="">2</span></a></sup><span data-dcnode-id="1974" instrument_node=""> and the dependent variable (entrep) is redefined. If a family is not engaged in entrepreneurial activities, entrep is assigned with a value of 0. If it is engaged in a secondary industry, entrep is valued 1. If it is engaged in a domestic service, entrep is valued 2. If it is engaged in a productive service, entrep is valued 3. According to statistics, 18.68% of entrepreneurial families start businesses in secondary industries, 71.61% in domestic services, and 9.71% in productive services. Most Chinese residents choose to start a business in domestic services, mainly because of these industries pose low barriers to entrepreneurship and provide flexible entrepreneurial forms.</span></p><p data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">As with the study on the heterogeneity of entrepreneurship types, the multiple-choice probit model is used to study the influence of informationization on entrepreneurship in different industries. Column 3–5 of Table&nbsp;</span><a data-dcnode-id="1970" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="1971" instrument_node="">4</span></a><span data-dcnode-id="1969" instrument_node=""> reports the estimates. Column 3 explores the influence of informationization on family entrepreneurship in secondary industries. The estimated coefficient of informationization is positive and passes the 1% significance test. Every 1% increase in the informationization level of a region would result in an increase in the probability of families choosing to start businesses in secondary industries by 11.66 percentage points. Column 4 reports the regression results of informationization and entrepreneurship in domestic service industries. The estimated coefficient of informationization is positive, but it does not pass the significance test. Every 1% increase in the informationization level would result in the probability of families choosing to start businesses in domestic service industries by 7.76 percentage points. Column 5 lists the regression results of the influence of informationization on family entrepreneurship in productive service industries. The estimated coefficient of informationization is positive, but it does not pass the significance test. Every 1% increase in the informationization level of a region would result in an increase in the probability of families choosing to start businesses in productive service industries by 2.35 percentage points. The estimation results in column 3–5 shows that informationization plays a greater and more significant role in promoting family entrepreneurship in secondary industries. Secondary industries are more informationalized, and the improved informationization level of a region can significantly increase the informationization level of secondary industries and thus promote the level of entrepreneurship in secondary industries. However, productive service industries are similarly informationalized. Why does informationization not significantly promote the entrepreneurial level in these industries? An important reason can be attributed to the strict regulations in productive service industries that disqualify a large number of entrepreneurial residents from venturing into these industries. Even if informationization creates opportunities and conditions for entrepreneurship, most residents are still not able to start their businesses in these industries. Therefore, informationization does not play a significant role in improving the entrepreneurial level in productive service industries. The government should lift unnecessary regulations in these industries to fully exploit the role of informationization in promoting entrepreneurship and fuel the development of productive service industries.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1966" id="Sec19"><span data-dcnode-id="1967" instrument_node="">Influence of informationization on entrepreneurial performance</span></h3><p data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">From the perspective of the life cycle of entrepreneurship, entrepreneurship includes not only the establishment of a new organization, i.e., entrepreneurial choice, but also the development of the new organization, i.e., entrepreneurial performance. The previous part of research focuses on the influence of informationization on entrepreneurial choice and finds that informationization can significantly increase the probability of residents to start a business. What is the influence of informationization on entrepreneurial performance? This is the main research issue in this section. Entrepreneurship not only addresses the income of entrepreneurs, but also solves the social employment. Therefore, entrepreneurship has two basic effects: income effect and employment effect. Income and employment are important indicators to measure entrepreneurial performance. The foothold of this section is to study whether informationization can help realize the income effect and the employment effect of entrepreneurship.</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1963" instrument_node="">This section focuses on the income and employment effects of entrepreneurial families. However, if this study covers only entrepreneurial families and excludes families not engaged in entrepreneurial ventures, it would produce self-selected samples rather than random samples (Heckman, </span><a aria-label="Reference 1979" data-dcnode-id="1961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d245517653e3103" title="Heckman, J. J. (1979). Sample selection bias as a specification error. Econometrica, 47(1), 153–161."><span data-dcnode-id="1962" instrument_node="">1979</span></a><span data-dcnode-id="1960" instrument_node="">). If the self-selected samples are estimated by ordinary least squares, the results might be biased and inconsistent (Heckman, </span><a aria-label="Reference 1979" data-dcnode-id="1958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d245517653e3106" title="Heckman, J. J. (1979). Sample selection bias as a specification error. Econometrica, 47(1), 153–161."><span data-dcnode-id="1959" instrument_node="">1979</span></a><span data-dcnode-id="1957" instrument_node="">). To overcome the sample selection bias, the Heckman two-stage model is used to study the influence of informationization on entrepreneurial performance. In the study of Magri (</span><a aria-label="Reference 2011" data-dcnode-id="1955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d245517653e3109" title="Magri, S. (2011). Household wealth and entrepreneurship: Is there a link? In Bank of Italy Temi di Discussione Working Paper."><span data-dcnode-id="1956" instrument_node="">2011</span></a><span data-dcnode-id="1954" instrument_node="">), he also used the Heckman two-stage model to analyze the effect of initial net wealth of household on the size of entrepreneurship. Therefore, it is suitable for studying the relationship between informationization and entrepreneurial performance using the Heckman two-stage model. The Heckman two-stage model is described briefly as follows.</span></p><p data-dcnode-id="1939"><span data-dcnode-id="1952" instrument_node="">The Heckman model for the first stage is the entrepreneurial choice model shown in Eq.&nbsp;(</span><a data-dcnode-id="1950" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="1951" instrument_node="">1</span></a><span data-dcnode-id="1949" instrument_node="">). The Heckman two-stage model requires that the first-stage model should include at least one exclusive explanatory variable. This explanatory variable influences the entrepreneurial choice of a family but not the entrepreneurial performance in the second-stage model. Thus, in this section, the average age of family members and its square are added to the family characteristic variable (</span><i data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">F</span></i><span data-dcnode-id="1946" instrument_node="">) in Eq.&nbsp;(</span><a data-dcnode-id="1944" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="1945" instrument_node="">1</span></a><span data-dcnode-id="1943" instrument_node="">). The average age of family members has a direct impact on family entrepreneurial choice, and there is a non-linear relationship between age and entrepreneurial choice. In addition, when regressing entrepreneurial performance based on the average age of family members and its square in Eq.&nbsp;(</span><a data-dcnode-id="1941" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="1942" instrument_node="">2</span></a><span data-dcnode-id="1940" instrument_node="">), we find that the average age of family members and its square have no significant effect on entrepreneurial performance. It could be concluded that the average age of family members and its square are suitable exclusive explanatory variables.</span></p><p data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">The Heckman model for the second stage is a linear equation that studies the influence of informationization on entrepreneurial performance, as shown in Eq. (</span><a data-dcnode-id="1936" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="1937" instrument_node="">2</span></a><span data-dcnode-id="1935" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1925" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="1928"><span class="mathjax-tex" data-dcnode-id="1929"><span class="MathJax_Preview" data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node=""> {\mathrm{performance}}_{fp}=\alpha +\beta {\mathrm{information}}_p+\gamma {F}_{fp}+\phi {P}_p+{\varphi \lambda}_{fp}+{\mu}_{fp} </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="1874"><span data-dcnode-id="1924" instrument_node="">where performance</span><sub data-dcnode-id="1921"><i data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">fp</span></i></sub><span data-dcnode-id="1920" instrument_node=""> represents the entrepreneurial performance of family </span><i data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">f</span></i><span data-dcnode-id="1917" instrument_node=""> in province </span><i data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">p</span></i><span data-dcnode-id="1914" instrument_node="">. We measure entrepreneurial performance by entrepreneurial income and the number of employees in the new business and take their natural logarithms in empirical research. Since both of the measures are zero for some families, no natural logarithms could be taken. In this case, the entrepreneurial incomes and the number of employees plus 1 is the solution, and then, natural logarithms are taken, for all families. </span><i data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">F</span></i><sub data-dcnode-id="1909"><i data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">fp</span></i></sub><span data-dcnode-id="1908" instrument_node="">, </span><i data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">P</span></i><sub data-dcnode-id="1903"><i data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">p</span></i></sub><span data-dcnode-id="1902" instrument_node="">, and </span><i data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">μ</span></i><sub data-dcnode-id="1897"><i data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">fp</span></i></sub><span data-dcnode-id="1896" instrument_node=""> represent family characteristic variable, regional characteristic variable, and random error term, respectively. Once again, </span><i data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">F</span></i><span data-dcnode-id="1893" instrument_node=""> in Eq.&nbsp;(</span><a data-dcnode-id="1891" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ2"><span data-dcnode-id="1892" instrument_node="">2</span></a><span data-dcnode-id="1890" instrument_node="">) excludes the average age of family members and its square, which are instead included in Eq.&nbsp;(</span><a data-dcnode-id="1888" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ1"><span data-dcnode-id="1889" instrument_node="">1</span></a><span data-dcnode-id="1887" instrument_node="">). </span><i data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">λ</span></i><sub data-dcnode-id="1882"><i data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">fp</span></i></sub><span data-dcnode-id="1881" instrument_node=""> represents the inverse Mills ratio to overcome the selection bias of the studied samples. We first get the inverse Mills ratio from regression in the first stage, and then add this inverse Mills ratio to the entrepreneurial performance model in the second stage. If the inverse Mills ratio is significantly non-zero, a sample selection bias is strongly suggested and the use of the Heckman two-stage model turns out to be valid; if it is significantly zero, it means that the Heckman two-stage model is unnecessary. The inverse Mills ratio is calculated as shown in Eq.&nbsp;(</span><a data-dcnode-id="1879" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ3"><span data-dcnode-id="1880" instrument_node="">3</span></a><span data-dcnode-id="1878" instrument_node="">) (Heckman, </span><a aria-label="Reference 1979" data-dcnode-id="1876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d245517653e3269" title="Heckman, J. J. (1979). Sample selection bias as a specification error. Econometrica, 47(1), 153–161."><span data-dcnode-id="1877" instrument_node="">1979</span></a><span data-dcnode-id="1875" instrument_node="">):</span></p><div class="c-article-equation" data-dcnode-id="1865" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="1868"><span class="mathjax-tex" data-dcnode-id="1869"><span class="MathJax_Preview" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node=""> {\lambda}_{fp}=\frac{f\left(\alpha +\beta {\mathrm{information}}_p+\gamma {F}_{fp}+\phi {P}_p\right)}{F\;\left(\alpha +B{\mathrm{information}}_p+\gamma {F}_{fp}+\phi {P}_p\right)} </span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="1857"><span data-dcnode-id="1864" instrument_node="">where </span><i data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">f</span></i><span data-dcnode-id="1861" instrument_node="">(·) and </span><i data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">F</span></i><span data-dcnode-id="1858" instrument_node="">(·) represents the probability density function and the probability distribution function of standard normal distribution, respectively.</span></p><p data-dcnode-id="1852"><span data-dcnode-id="1856" instrument_node="">Table&nbsp;</span><a data-dcnode-id="1854" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1855" instrument_node="">5</span></a><span data-dcnode-id="1853" instrument_node=""> shows the influence of informationization on entrepreneurial performance. Columns 1 and 2 report the influence of informationization on entrepreneurial income based on the Heckman two-stage model. Column 1 is the entrepreneurial choice model for the first stage, and column 2 is the entrepreneurial income model for the second stage. In column 1, the estimated coefficient of informationization is significantly positive, which indicates that informationization has a significant effect on entrepreneurial promotion. In column 2, the estimated coefficient of informationization is positive at the significance level of 5%. Every 1% increase in the informationization level of a region would result in an increase in the entrepreneurial income of a family by 3.86%. The inverse Mills ratio does not pass the significance test, which means that it is unnecessary to apply the Heckman two-stage model in studying the influence of informationization on entrepreneurial income, which is thus remeasured by using the ordinary least squares method. The regression results are shown in column 3. In column 3, the estimated coefficient of informationization is positive at the significance level of 5%. Every 1% increase in the informationization level of a region would result in an increase in the entrepreneurial income of a family by 4.03%. Clearly, both the results from the Heckman two-stage model and the ordinary least squares method prove that informationization could help realize the income effect of entrepreneurship.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1837" data-test="inline-table" id="table-5"><figure data-dcnode-id="1838"><figcaption class="c-article-table__figcaption" data-dcnode-id="1849"><b data-dcnode-id="1850" data-test="table-caption" id="Tab5"><span data-dcnode-id="1851" instrument_node="">Table 5 Regression results of the influence of informationization on entrepreneurial performance</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1839"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="1840" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/s40497-019-0171-5/tables/5" rel="nofollow"><span data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1841" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1842" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1843" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1846" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1845" fill-rule="evenodd"></path><span data-dcnode-id="1844" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1832"><span data-dcnode-id="1836" instrument_node="">Columns 4 and 5 of Table&nbsp;</span><a data-dcnode-id="1834" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="1835" instrument_node="">5</span></a><span data-dcnode-id="1833" instrument_node=""> report the regression results of informationization and entrepreneurial employment effect based on the Heckman two-stage model. Column 4 is the entrepreneurial choice model for the first stage, and column 5 is the entrepreneurial employment effect model for the second stage. As shown in column 5, the estimated coefficient of informationization is positive at the 10% significance level, indicating that entrepreneurial families employ more labor forces in regions with higher informatization levels. In addition, the estimated coefficient of inverse Mills ratio passes the 5% significance test, indicating that it is significantly not zero and thus it is valid to apply the Heckman two-stage model in studying the informationization and entrepreneurial employment effect. In order to compare with the estimation results from the Heckman two-stage model, column (6) reports the estimation results of informationization and entrepreneurial employment effect based on the ordinary least squares method. The estimation results show that informationization could significantly increase the number of people employed by entrepreneurial families, and the conclusion is consistent with the finding obtained from the Heckman two-stage model.</span></p></div></div></section><section data-dcnode-id="1803" data-title="Conclusion and policy implications"><div class="c-article-section" data-dcnode-id="1804" id="Sec20-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1827" id="Sec20"><span data-dcnode-id="1828" instrument_node="">Conclusion and policy implications</span></h2><div class="c-article-section__content" data-dcnode-id="1805" id="Sec20-content"><h3 class="c-article__sub-heading" data-dcnode-id="1825" id="Sec21"><span data-dcnode-id="1826" instrument_node="">Conclusion</span></h3><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">In spite of the arrival of information age, there is little literature that systematically explores the influence of informatization on entrepreneurship. This paper systematically studies this subject based on “2011 China Household Finance Survey” conducted by Southwestern University of Finance and Economics and the </span><i data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Report of China Informationization Development Assessment</span></i><span data-dcnode-id="1821" instrument_node=""> (2013) released by the China Center for Information Industry Development. The conclusion is that informationization plays a significant role in promoting entrepreneurship. This research conclusion is still robust after considering the endogenous problem, informationization index metrics, econometric model, and research sample. This paper then decomposes informationization into information infrastructure, government informationization, resident informationization, and enterprise informationization and studies their influences on entrepreneurship. It finds that information infrastructure, government informationization, and resident informationization could promote resident entrepreneurship, yet enterprise informationization inhibited it. This paper also goes further to discuss the heterogeneous influences of informationization on entrepreneurship. Compared with corporate entrepreneurship, self-employed entrepreneurship is influenced by informationization better and more significantly. Compared with entrepreneurship in domestic service and productive service industries, informationization promotes resident entrepreneurship more significantly in secondary industries. Finally, the research on informationization and entrepreneurial performance points out that informationization could help achieve the income and employment effects of entrepreneurship.</span></p><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">There are some shortcomings in the research of this paper. Since China Household Finance Survey can provide abundant information about family entrepreneurship, the paper adopts this dataset for our study. However, China Household Finance Survey offers cross-section data that may lead to inaccurate estimation results due to missing time factor. Although we have used the China Family Panel Studies in 2011, 2013, and 2015 for robustness test, we are unable to adopt the database for research to consider the time factor due to the lack of information in other parts of the study. Therefore, we need to use panel data to reassess the influence of informationization on entrepreneurship in future research.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1816" id="Sec22"><span data-dcnode-id="1817" instrument_node="">Policy implications</span></h3><p data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Some policy implications can be drawn from the research conclusion herein.</span></p><p data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Firstly, the government should strengthen its own informationization construction, reform and upgrade various information management systems in accordance with unified norms and standards, establish an information sharing exchange platform to promote wide sharing and effective application of information among government departments, and reduce the degree of control and improve service levels to encourage mass entrepreneurship.</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Secondly, since informationization has a significant role in promoting entrepreneurship in secondary industries, government departments should strengthen the planning and arrangement of industrial Internet infrastructure construction, and build an industrial Internet with low latency, high reliability, and wide coverage. They should also speed up the deployment and construction of fiber optic networks, mobile communication networks, and wireless local area networks in areas with manufacturing clusters to achieve information network broadband upgrade.</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Thirdly, the reform of administrative management system needs to coordinate with informationization to fully exploit the role of informationization in promoting entrepreneurship in productive service industries. Government departments should relax or cancel unnecessary market access administrative approval regulation over producer service industries, encourage and guide private capital to enter industries and fields that are not prohibited explicitly by laws and regulations, and try to create a market environment of fair competition and equal access.</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Fourthly, enterprise informationization construction improves the market competitiveness of incumbent enterprises on the one hand and raises the threshold of entrepreneurship on the other hand. To resolve this dilemma, the government should establish and improve informationization service platforms for enterprises to help new ventures improve their informationization level.</span></p></div></div></section><span data-dcnode-id="1802" instrument_node="">
</span><section data-dcnode-id="1793" data-title="Availability of data and materials"><div class="c-article-section" data-dcnode-id="1794" id="availability-of-data-and-materials-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1800" id="availability-of-data-and-materials"><span data-dcnode-id="1801" instrument_node="">Availability of data and materials</span></h2><div class="c-article-section__content" data-dcnode-id="1795" id="availability-of-data-and-materials-content"><span data-dcnode-id="1799" instrument_node="">

</span></div></div></section><section data-dcnode-id="1779" data-title="Notes"><div class="c-article-section" data-dcnode-id="1780" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1791" id="notes"><span data-dcnode-id="1792" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1781" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1782"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1787" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1788"><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">According to “Global Entrepreneurship Monitor,” entrepreneurship rate is defined as the proportion of early entrepreneurs or new business owners in the 18–64 age group.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1783" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1784"><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Secondary industries include mining, manufacturing, electricity, gas, water production and supply, and construction. Domestic services include wholesale and retail, accommodation and catering, real estate, water conservancy, environmental and public facilities management, residential services, education, health, social security and social welfare, culture, sports and entertainment, public administration, and social organizations. Productive services include transportation, warehousing and postal services, information transmission, computer services and software, finance, leasing and business services, scientific research, technical services, and geological surveys.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1182" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="
