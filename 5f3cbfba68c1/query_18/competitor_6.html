span data-dcnode-id="4971" instrument_node="">2014</span></a><span data-dcnode-id="4969" instrument_node="">; Layte </span><a aria-label="Reference 2012" data-dcnode-id="4967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d251043621e909" title="Layte, R. (2012). The association between income inequality and mental health: testing status anxiety, social capital, and neo-materialist explanations. European Sociological Review, 28, 498–511."><span data-dcnode-id="4968" instrument_node="">2012</span></a><span data-dcnode-id="4966" instrument_node="">; Delhey and Dragolov </span><a aria-label="Reference 2014" data-dcnode-id="4964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d251043621e912" title="Delhey, J., &amp; Dragolov, G. (2014). Why inequality make Europeans less happy: The role of distrust, status anxiety, and perceived conflict. European Sociological Review, 30, 151–165."><span data-dcnode-id="4965" instrument_node="">2014</span></a><span data-dcnode-id="4963" instrument_node="">). This might be the reason that the research does not clearly state whether inequality increases or decreases life satisfaction (Verme </span><a aria-label="Reference 2011" data-dcnode-id="4961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d251043621e916" title="Verme, P. (2011). Life satisfaction and income inequality. Review of Income and Wealth, 57, 111–127."><span data-dcnode-id="4962" instrument_node="">2011</span></a><span data-dcnode-id="4960" instrument_node="">).</span></p><p data-dcnode-id="4942"><span data-dcnode-id="4958" instrument_node="">Regarding the type of inequality that affects satisfaction, the significant question is whether inequality is important due to its effects on crime, social gaps etc. or whether it is important in itself (Thurow </span><a aria-label="Reference 1971" data-dcnode-id="4956" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d251043621e922" title="Thurow, L. C. (1971). The income distribution as a pure public good. The Quarterly Journal of Economics, 85, 327–336."><span data-dcnode-id="4957" instrument_node="">1971</span></a><span data-dcnode-id="4955" instrument_node="">). In the latter case, inequality would decrease life satisfaction (Knies </span><a aria-label="Reference 2012" data-dcnode-id="4953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d251043621e925" title="Knies, G. (2012). Income comparisons among neighbours and satisfaction in East and West Germany. Social Indicators Research, 106, 471–489."><span data-dcnode-id="4954" instrument_node="">2012</span></a><span data-dcnode-id="4952" instrument_node="">; Ferrer-i-Carbonell and Ramos </span><a aria-label="Reference 2014" data-dcnode-id="4950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d251043621e928" title="Ferrer-i-Carbonell, A., &amp; Ramos, X. (2014). Inequality and happiness. Journal of Economic Surveys, 28, 1016–1027."><span data-dcnode-id="4951" instrument_node="">2014</span></a><span data-dcnode-id="4949" instrument_node="">). The results of cross-sectional studies over time indicate that populations with more equally distributed incomes are more satisfied (Oishi et al. </span><a aria-label="Reference 2011" data-dcnode-id="4947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d251043621e931" title="Oishi, S., Kesebir, S., &amp; Diener, E. D. (2011). Income inequality and happiness. Psychological Science, 22(9), 1095–1100. doi:
                    10.1177/0956797611417262
                    
                  ."><span data-dcnode-id="4948" instrument_node="">2011</span></a><span data-dcnode-id="4946" instrument_node="">; Van Deurzen et al. </span><a aria-label="Reference 2015" data-dcnode-id="4944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d251043621e934" title="Van Deurzen, I., Van Ingen, E., &amp; Van Oorschot, W. J. H. (2015). Income inequality and depression: The role of social comparisons and coping resources. European Sociological Review, 31, 477–489."><span data-dcnode-id="4945" instrument_node="">2015</span></a><span data-dcnode-id="4943" instrument_node="">). Such studies, however, have certain limitations and cannot, for example, track the same individual’s life satisfaction.</span></p><p data-dcnode-id="4916"><span data-dcnode-id="4941" instrument_node="">The major claim in theories of distributive justice is that there is a long-run level of inequality, which is referred to as “normal” (Homans </span><a aria-label="Reference 1974" data-dcnode-id="4939" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d251043621e940" title="Homans, G. C. (1974). Social behaviour: Its elementary forms. New York: Harcourt Brace."><span data-dcnode-id="4940" instrument_node="">1974</span></a><span data-dcnode-id="4938" instrument_node="">; Lerner </span><a aria-label="Reference 1982" data-dcnode-id="4936" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d251043621e943" title="Lerner, M. J. (1982). The belief in a just world: A fundamental delusion. New York: Plenum Press."><span data-dcnode-id="4937" instrument_node="">1982</span></a><span data-dcnode-id="4935" instrument_node="">; Jost et al. </span><a aria-label="Reference 2004" data-dcnode-id="4933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d251043621e946" title="Jost, J. T., Banaji, M. R., &amp; Nosek, B. A. (2004). A decade of system justification theory: Accumulated evidence of conscious and unconscious bolstering of the status quo. Political Psychology, 25, 881–919."><span data-dcnode-id="4934" instrument_node="">2004</span></a><span data-dcnode-id="4932" instrument_node="">). Empirical studies regarding distributive justice theories are unclear regarding the ways in which inequality affects life satisfaction (Alesina et al. </span><a aria-label="Reference 2004" data-dcnode-id="4930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d251043621e949" title="Alesina, A., DiTella, R., &amp; MacCulloch, R. (2004). Happiness and inequality: Are Europeans and Americans different? Journal of Public Economics, 88, 2009–2042."><span data-dcnode-id="4931" instrument_node="">2004</span></a><span data-dcnode-id="4929" instrument_node="">; Wilkinson and Pickett </span><a aria-label="Reference 2009" data-dcnode-id="4927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d251043621e952" title="Wilkinson, R. G., &amp; Pickett, K. E. (2009). Income inequality and social dysfunction. Annual Review of Sociology, 35, 493–511."><span data-dcnode-id="4928" instrument_node="">2009</span></a><span data-dcnode-id="4926" instrument_node="">, </span><a aria-label="Reference 2010" data-dcnode-id="4924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d251043621e956" title="Wilkinson, R. G., &amp; Pickett, K. (2010). The spirit level: Why greater equality makes societies stronger. New York: Bloomsbury Press."><span data-dcnode-id="4925" instrument_node="">2010</span></a><span data-dcnode-id="4923" instrument_node="">; Schwarze and Härpfer </span><a aria-label="Reference 2007" data-dcnode-id="4921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d251043621e959" title="Schwarze, J., &amp; Härpfer, M. (2007). Are people inequality averse, and do they prefer redistribution by the State? Evidence from German longitudinal data on life satisfaction. Journal of Socio-Economics, 36(2), 233–249."><span data-dcnode-id="4922" instrument_node="">2007</span></a><span data-dcnode-id="4920" instrument_node="">; Ferrer-i-Carbonell and Ramos </span><a aria-label="Reference 2014" data-dcnode-id="4918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d251043621e962" title="Ferrer-i-Carbonell, A., &amp; Ramos, X. (2014). Inequality and happiness. Journal of Economic Surveys, 28, 1016–1027."><span data-dcnode-id="4919" instrument_node="">2014</span></a><span data-dcnode-id="4917" instrument_node="">).</span></p><p data-dcnode-id="4908"><span data-dcnode-id="4915" instrument_node="">In his recent study, Schröder (</span><a aria-label="Reference 2016" data-dcnode-id="4913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d251043621e968" title="Schröder, M. (2016). How income inequality influences life satisfaction: Hybrid effects evidence from the German SOEP. European Sociological Review, 32(2), 307–320. doi:
                    10.1093/esr/jcv136
                    
                  ."><span data-dcnode-id="4914" instrument_node="">2016</span></a><span data-dcnode-id="4912" instrument_node="">) compares differences in happiness among Germans during times of high and low levels of income inequality. The results show that short-term increases in inequality decrease life satisfaction, but long-run levels of inequality do not. This study suggests that “people get used to long-run inequality, so that short-run increases in inequality, rather than long-run levels of inequality, make people unsatisfied with life. This may explain why populations of countries with persistently high inequality are as satisfied with life as populations of more equal countries, even though the same individual is less satisfied with life in those years in which inequality is above-average” (Schröder </span><a aria-label="Reference 2016" data-dcnode-id="4910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d251043621e971" title="Schröder, M. (2016). How income inequality influences life satisfaction: Hybrid effects evidence from the German SOEP. European Sociological Review, 32(2), 307–320. doi:
                    10.1093/esr/jcv136
                    
                  ."><span data-dcnode-id="4911" instrument_node="">2016</span></a><span data-dcnode-id="4909" instrument_node="">, p. 1).</span></p></div></div></section><section data-dcnode-id="4870" data-title="Extension of the Epstein and Spiegel Approach"><div class="c-article-section" data-dcnode-id="4871" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4903" id="Sec8"><span data-dcnode-id="4904" instrument_node="">Extension of the Epstein and Spiegel Approach</span></h2><div class="c-article-section__content" data-dcnode-id="4872" id="Sec8-content"><p data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">The approach introduced and examined above regarding the relationship among fairness, income inequality, and satisfaction or happiness is a little more complex. During the last four decades, many researchers have theoretically discussed and empirically investigated the issue of whether inequality may affect happiness.</span></p><p data-dcnode-id="4893"><span data-dcnode-id="4900" instrument_node="">The basic presumption in most of their research&nbsp;is that on average a higher degree of inequality leads to decreased happiness in the population due to the sense of an unfair distribution of the pie, in private as well as national terms (e.g. recent papers of Xiaogang and Jun </span><a aria-label="Reference 2013" data-dcnode-id="4898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d251043621e986" title="Xiaogang, W., &amp; Jun, L. (2013). Economic growth, income inequality and subjective well-being: Evidence from China. Population Studies Center Research Report (pp. 13–796)."><span data-dcnode-id="4899" instrument_node="">2013</span></a><span data-dcnode-id="4897" instrument_node="">; Oishi et al. </span><a aria-label="Reference 2011" data-dcnode-id="4895" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d251043621e989" title="Oishi, S., Kesebir, S., &amp; Diener, E. D. (2011). Income inequality and happiness. Psychological Science, 22(9), 1095–1100. doi:
                    10.1177/0956797611417262
                    
                  ."><span data-dcnode-id="4896" instrument_node="">2011</span></a><span data-dcnode-id="4894" instrument_node="">). However, these findings that have been revealed for decades suggest ambiguous results, such that a necessary and significant negative correlation between happiness and inequality is not found. Moreover, the findings also show that with full equality in income, happiness is at a low level due to the subjective feeling that full equality is unfair. This leads us to the conclusion that the real and more reliable relationship between these two variables of happiness and inequality should be modified.</span></p><p data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">Our basic theorem states that at a certain degree of inequality measured by the Gini coefficient, the values of Gini should define neither a positive nor a negative effect of inequality on happiness. This is due to the fact that human beings are aware of the varying contributions of individuals that should be rewarded with differing incomes, salaries, or profits sharing. However, the ambiguous effect at some intermediate ranges of the Gini coefficient does not hold for extreme Gini values, whether for those that are too small, representing “too great a degree of equality,” or for those that are too large, representing a low degree of equality. In these ranges, approaching further extreme values of the Gini coefficients leads to a significant decrease in the measurement of happiness for society as a whole.</span></p><p data-dcnode-id="4886"><span data-dcnode-id="4890" instrument_node="">Our empirical findings using values of GDP</span><sub data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">ppp</span></sub><span data-dcnode-id="4887" instrument_node="">, Gini, Democracy, and Corruption of Countries, validate our basic theoretical presumption, at least for large values of Gini. Moreover, at the turning point of Gini&nbsp;=&nbsp;0.5, instead of an ambiguous effect of Gini on happiness, a negative and robust relationship is found.</span></p><p data-dcnode-id="4881"><span data-dcnode-id="4885" instrument_node="">These empirical results bring to mind an earlier theoretical paper of Epstein and Spiegel (</span><a aria-label="Reference 2001" data-dcnode-id="4883" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d251043621e1004" title="Epstein, G., &amp; Spiegel, U. (2001). Natural inequality, production and economic growth. Labour Economics, 8, 463–473."><span data-dcnode-id="4884" instrument_node="">2001</span></a><span data-dcnode-id="4882" instrument_node="">), (hereinafter referred to as “E.S.”). In that paper they argue that certain extreme levels of Gini coefficient values, in which the levels of inequality approach Gini levels of 0.1, 0.2 and below, represent degrees of inequality that are too low. This generates a sense of unfair equality. On the other hand, another extreme occurs if the Gini approaches high values of 0.6, 0.7 and above, towards 1. This generates the opposite sense of unfairness regarding a high level of inequality. While in the micro context, E.S. discuss inequality in income among workers within a private company and its effect on the growth and productivity of the firm, our paper extends their idea towards the macro effect of inequality on happiness within a society. Let us emphasize this point more precisely.</span></p><p data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">The economic environment researched in the E.S. article is an environment of microeconomic analysis. The question that arises is whether and to what extent the level of inequality among groups of workers in the microeconomic context is desirable, acceptable, and represents fair reward for contribution. Factors such as effort, knowledge, expertise, etc. appear to justify unequal reward. Individuals are aware that such abilities and other characteristics are not identical. Therefore their contributions to the production and size of the national pie are different. While in every society individuals expect rewards that appropriately match their contributions, the distribution of income or reward that is either too small or too large may possibly reveal unfair and unjustified differences. Thus at extreme Gini values the effect on satisfaction or happiness is negative. The hypothesis raised in the E.S. article is that when the inequality between rewards and contributions is justified, it leads in the microeconomic context to higher productivity and efficiency among all the economic agents, workers as well as managers, due to their greater sense of commitment and loyalty to the firm.</span></p><p data-dcnode-id="4877"><span data-dcnode-id="4878" instrument_node="">In our present article we intend to implement these principles of E.S. in the macroeconomic perspective of the national context. The questions are: (1) whether the microeconomic perspective with respect to an individual firm also exists in the national perspective of inequality within the entire population including several income groups; (2) whether and in which direction the satisfaction or national happiness reacts accordingly, not only to the level of the real national product per capita, but also to the level and influence of national inequality in distribution of incomes among all population groups. In our case, an interesting fact also becomes apparent in the macroeconomic analysis. It shows that although according to the literature review presented above, inequality unambiguously creates either a positive or negative effect on satisfaction, our present research indicates two contradictory effects. In extreme situations of substantial equality or inequality and in approaching even more extreme positions, the level of happiness decreases. However, this is not the case at moderate levels of inequality, in which the association between inequality and satisfaction is actually ambiguous.</span></p><p data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">This paper emphasizes several additional new considerations. The significant difference between E.S. and our current work is that within the workplace environment the diversification among rewards is more likely to influence the productivity and efforts of workers. In an intimate and more often geographically isolated location, workers are more aware and informed not only of the discernible efforts, professional contributions, seniority, and experience of their colleagues, but also of their rewards. These rewards are expressed in terms of salary, profits, and other kinds of compensation.</span></p><p data-dcnode-id="4873"><span data-dcnode-id="4874" instrument_node="">The question arises whether these kinds of effects are evident in the macro environment, in which people are geographically very distant from each other. In urban and in rural neighbourhoods they are more anonymous and do not know very much about the skills and rewards of either their neighbours or other residents in their country. Individuals are aware, however, of diversified standards of living indicated by the size of a house, the quality of a car, education provided for children, health services, etc. Individuals who are not economists may generally not be familiar with the Gini coefficient or how it is measured, but they may evaluate how they live in comparison to other residents in the country. The information regarding standard of living that individuals may obtain from radio or television networks, newspapers or other written media, etc., has a great deal of influence on their morale and happiness. Our hypothesis is that the extremely high levels of either equality or inequality are associated negatively with happiness. While in E.S. the model discusses only a theoretical and conceptual relationship, in this paper we also incorporate an empirical discussion and results that prove our hypothesis and confirm our current theoretical framework of different effects of extreme and intermediate levels of inequality.</span></p></div></div></section><section data-dcnode-id="4787" data-title="Theoretical Model"><div class="c-article-section" data-dcnode-id="4788" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4868" id="Sec9"><span data-dcnode-id="4869" instrument_node="">Theoretical Model</span></h2><div class="c-article-section__content" data-dcnode-id="4789" id="Sec9-content"><p data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">The basic model of the classical economists was introduced during the twentieth century as a fundamental statement accepted by most economists: Each private consumer has a utility that is a function of a consumed bundle. Higher income levels allows for larger, more diversified, and richer bundles, so that consumers gain a higher utility or satisfaction. As mentioned in the Introduction, only during the 1970’s were some reservations introduced, stating that happiness or well-being is not necessarily affected by more since more is better, but that it depends on various other factors that lead to more happiness.</span></p><p data-dcnode-id="4855"><span data-dcnode-id="4865" instrument_node="">The basic new concept differentiates between more satisfaction and the degree of happiness. This can be interpreted from defining different standards of living due to GDP</span><sub data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">ppp</span></sub><span data-dcnode-id="4862" instrument_node=""> per capita and finding that it provides only a partial explanation for happiness. Several additional elements may influence and contribute to the consumer’s sense of happiness. Included among them are social support, healthy life expectancy, freedom to make life choices, generosity, and perceptions of corruption. These elements do not include inequality. See the World Happiness Report (WHR) </span><a aria-label="Reference 2016" data-dcnode-id="4860" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d251043621e1032" title="World Happiness Report (WHR). (2016). Update: 
                    http://worldhappiness.report/wp-content/uploads/sites/2/2016/03/HR-V1Ch2_web.pdf
                    
                   (p. 20)."><span data-dcnode-id="4861" instrument_node="">2016</span></a><span data-dcnode-id="4859" instrument_node="">, p. 20, Ranking of Happiness 2013–2015 (Part 1). Moreover, by taking the regression of Happiness as a function solely of GDP</span><sub data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">ppp</span></sub><span data-dcnode-id="4856" instrument_node=""> per capita for all countries, the results are not as robust as those found by adding other factors such as inequality.</span></p><p data-dcnode-id="4850"><span data-dcnode-id="4854" instrument_node="">Thus the present study also looks for additional factors that contribute to happiness. Absolute income does not necessarily affect the well-being of the private consumer positively, and very often well-being is affected by one’s income relative to the surrounding community (e.g., relative income level as described by Duesenberry </span><a aria-label="Reference 1949" data-dcnode-id="4852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d251043621e1040" title="Duesenberry, J. S. (1949). Income saving and the theory of consumer behavior. Cambridge, MA: Harvard University Press."><span data-dcnode-id="4853" instrument_node="">1949</span></a><span data-dcnode-id="4851" instrument_node="">). Therefore, the present study includes another factor, the variance of incomes in a given society, as measured by the Gini coefficient of societies.</span></p><p data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">The basic prediction is defined as:</span></p><p data-dcnode-id="4843"><span data-dcnode-id="4847" instrument_node="">Happiness&nbsp;=&nbsp;f (GDP</span><sub data-dcnode-id="4845"><span data-dcnode-id="4846" instrument_node="">ppp</span></sub><span data-dcnode-id="4844" instrument_node=""> per capita, Gini, Corruption Perceptions Index, Democracy Index).</span></p><p data-dcnode-id="4838"><span data-dcnode-id="4842" instrument_node="">The dependent variable, happiness, is indeed affected positively by GDP</span><sub data-dcnode-id="4840"><span data-dcnode-id="4841" instrument_node="">ppp</span></sub><span data-dcnode-id="4839" instrument_node=""> per capita, and by Gini. However several other factors should also be considered.</span></p><p data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">The signs of each independent variable are as follows:</span></p><p data-dcnode-id="4822"><span data-dcnode-id="4835" instrument_node="">Up to a certain level of GDP</span><sub data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">ppp</span></sub><span data-dcnode-id="4832" instrument_node=""> per capita, any increase allows for a higher level of happiness. As GDP</span><sub data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">ppp</span></sub><span data-dcnode-id="4829" instrument_node=""> per capita is higher, the basic necessities of food, clothing, and shelter can be attained, and thus the individual’s sense of well-being increases. Other factors such as better education, higher quality of health, more efficient public transportation, etc., continue the positive effect of a higher standard of living and happiness. This positive upward trajectory of GDP</span><sub data-dcnode-id="4827"><span data-dcnode-id="4828" instrument_node="">ppp</span></sub><span data-dcnode-id="4826" instrument_node=""> per capita may become less significant at very high levels of GDP</span><sub data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">ppp</span></sub><span data-dcnode-id="4823" instrument_node=""> per capita.</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4821" instrument_node="">With respect to the Gini coefficient, the effect on Happiness is more complicated, since it depends on different ranges of the Gini values. It is clear that Gini coefficient levels represent different income distributions. At very low values of Gini, the distribution of rewards among all individuals is also very close and too close to equal. This most likely does not reflect a good match between the real contributions of individuals and their appropriate rewards. The same is true when Gini values are too high and closer to one. Then the rewards of wealthy individuals are also too high in comparison to their contributions, and in some sense “unfair” relative to their real efforts. The intermediate ranges of Gini are acceptable to the public and therefore one may expect a positive or no effect of Gini on happiness. In general, the sign of the Gini coefficient on Happiness may be ambiguous. This is illustrated in Fig.&nbsp;</span><a data-dcnode-id="4819" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4820" instrument_node="">1</span></a><span data-dcnode-id="4818" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4793" data-test="figure" data-title="Fig.&nbsp;1" id="figure-1"><figure data-dcnode-id="4794"><figcaption data-dcnode-id="4814"><b class="c-article-section__figure-caption" data-dcnode-id="4815" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="4816" instrument_node="">Fig.&nbsp;1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4805"><div class="c-article-section__figure-item" data-dcnode-id="4809"><a class="c-article-section__figure-link" data-dcnode-id="4810" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-017-9911-9/figures/1" rel="nofollow"><picture data-dcnode-id="4811"><source data-dcnode-id="4813" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10902-017-9911-9/MediaObjects/10902_2017_9911_Fig1_HTML.gif?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="4812" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10902-017-9911-9/MediaObjects/10902_2017_9911_Fig1_HTML.gif&amp;raw"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4806" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">Happiness as a function of Gini index</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4795"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="4796" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-017-9911-9/figures/1" rel="nofollow"><span data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4797" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4798" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4799" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4802" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4801" fill-rule="evenodd"></path><span data-dcnode-id="4800" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4792" instrument_node="">
</span><p data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">A simple linear regression can take all countries with certain values of Gini, but then the curve slope has only one value. The question to consider is whether all three ranges and the approximate borders between them can be defined. As shown in the next empirical statistical section, Range 1 is unachievable since the actual lowest Gini levels of countries are not less than 0.25. This range of Gini values does not exist in the data sets found for the countries. Thus Range 1 does not actually exist. However, the other two ranges of intermediate and high levels of Gini can be estimated and support the present hypothesis. At very high levels of the Gini coefficient, Happiness is indeed affected negatively by Gini, while the effect is ambiguous in an intermediate range.</span></p></div></div></section><section data-dcnode-id="4490" data-title="An Empirical Analysis: Data Sources and Methods"><div class="c-article-section" data-dcnode-id="4491" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4785" id="Sec10"><span data-dcnode-id="4786" instrument_node="">An Empirical Analysis: Data Sources and Methods</span></h2><div class="c-article-section__content" data-dcnode-id="4492" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="4783" id="Sec11"><span data-dcnode-id="4784" instrument_node="">Data</span></h3><p data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">This section seeks to investigate the basic question raised earlier regarding the influences of standard of living and inequality growth on the happiness of a population in various countries.</span></p><p data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">For this purpose, the following database has been collected from these sources:</span></p><span data-dcnode-id="4778" instrument_node="">
</span><ol class="u-list-style-none" data-dcnode-id="4595"><span data-dcnode-id="4777" instrument_node="">
</span><li data-dcnode-id="4719"><span data-dcnode-id="4776" instrument_node="">

</span><p data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">The degree of happiness for each country relates to the years 2012–2014.</span></p><span data-dcnode-id="4667" instrument_node="">
</span><p data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">The source for the dependent variable of the degree of happiness is:</span></p><ul class="u-list-style-bullet" data-dcnode-id="4648"><span data-dcnode-id="4664" instrument_node="">
</span><li data-dcnode-id="4650"><span data-dcnode-id="4663" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4662" instrument_node="">World Happiness Report (WHR) </span><a aria-label="Reference 2015" data-dcnode-id="4660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d251043621e1242" title="World Happiness Report (WHR). (2015). 
                    http://worldhappiness.report/wp-content/uploads/sites/2/2015/04/WHR15.pdf
                    
                  ."><span data-dcnode-id="4661" instrument_node="">2015</span></a><span data-dcnode-id="4659" instrument_node="">.</span></p><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">In considering the increase of happiness, a very important aspect is the measurement of the happiness of individuals, both within and across societies.</span></p><span data-dcnode-id="4654" instrument_node="">
</span><p data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">The World Happiness Report is published by the United Nations Sustainable Development Solutions Network. It provides an overall picture of world happiness in the first decade of the twenty-first century, by using measures of subjective well-being that best reflect how people rate the quality of their lives.</span></p><span data-dcnode-id="4651" instrument_node="">
</span></li><span data-dcnode-id="4649" instrument_node="">
</span></ul><span data-dcnode-id="4647" instrument_node="">
</span></li><span data-dcnode-id="4645" instrument_node="">
</span><li data-dcnode-id="4623"><span data-dcnode-id="4644" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">4.</span></span><span data-dcnode-id="4641" instrument_node="">
</span><p data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">The Corruption Perceptions Index (CPI) relates to the year 2013.</span></p><span data-dcnode-id="4638" instrument_node="">
</span><p data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">The source for the dependent variable of the CPI is:</span></p><ul class="u-list-style-bullet" data-dcnode-id="4625"><span data-dcnode-id="4635" instrument_node="">
</span><li data-dcnode-id="4627"><span data-dcnode-id="4634" instrument_node="">
</span><p data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">Transparency International the global coalition against corruption.</span></p><span data-dcnode-id="4631" instrument_node="">
</span><p data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">The CPI ranks countries and territories based on the extent to which their public sector is perceived as corrupt. A country or territory’s score indicates the perceived level of public sector corruption on a scale of 0–100, where 0 indicates that a country is perceived as “highly corrup” and 100 indicates that it is perceived as “very clea”. A country’s rank indicates its position relative to the other countries and territories included in the index.</span></p><span data-dcnode-id="4628" instrument_node="">
</span></li><span data-dcnode-id="4626" instrument_node="">
</span></ul><span data-dcnode-id="4624" instrument_node="">
</span></li><span data-dcnode-id="4622" instrument_node="">
</span><li data-dcnode-id="4597"><span data-dcnode-id="4621" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4619"><span data-dcnode-id="4620" instrument_node="">5.</span></span><span data-dcnode-id="4618" instrument_node="">
</span><p data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Democracy Index for the year 2013.</span></p><span data-dcnode-id="4615" instrument_node="">
</span><p data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">The source for the dependent variable of the Democracy Index of 2013 is:</span></p><ul class="u-list-style-bullet" data-dcnode-id="4599"><span data-dcnode-id="4612" instrument_node="">
</span><li data-dcnode-id="4601"><span data-dcnode-id="4611" instrument_node="">
</span><p data-dcnode-id="4606"><span data-dcnode-id="4610" instrument_node="">The Economist Intelligence Unit’s Democracy Index </span><a aria-label="Reference 2015" data-dcnode-id="4608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d251043621e1297" title="The Economist Intelligence Unit’s Democracy Index 2015. 
                    http://www.yabiladi.com/img/content/EIU-Democracy-Index-2015.pdf
                    
                  ."><span data-dcnode-id="4609" instrument_node="">2015</span></a><span data-dcnode-id="4607" instrument_node="">.</span></p><span data-dcnode-id="4605" instrument_node="">
</span><p data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">The Economist Intelligence Unit’s Democracy Index describes the state of democracy worldwide for 165 independent states and two territories. It includes almost the entire population and the majority of the states in the world, excluding micro-states. The Democracy Index examines five categories: electoral process and pluralism, civil liberties, the functioning of government, political participation, and political culture. Based on their scores on a range of indicators within these categories, each country is categorized as one of four types of regimes: full democracies, flawed democracies, hybrid regimes, and authoritarian regimes.</span></p><span data-dcnode-id="4602" instrument_node="">
</span></li><span data-dcnode-id="4600" instrument_node="">
</span></ul><span data-dcnode-id="4598" instrument_node="">
</span></li><span data-dcnode-id="4596" instrument_node="">
</span></ol><span data-dcnode-id="4594" instrument_node="">
</span><p data-dcnode-id="4586"><span data-dcnode-id="4593" instrument_node="">We collected variables for the available values of 162 countries. However, for 23 countries some values were missing. Therefore, the present statistical work is based only on 139 countries for which all values were available. Those countries can be divided into 41 developed countries and 98 developing countries. Based on this data set a statistical package SPSS 22 was used to analyze the relationship between the independent (explanatory) variables, GDP</span><sub data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">ppp</span></sub><span data-dcnode-id="4590" instrument_node=""> per capita (referred to herein as GDP</span><sub data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">ppp</span></sub><span data-dcnode-id="4587" instrument_node="">), CPI, Democracy and Gini index (Gini), Corruption Perceptions Index, Democracy Index and the dependent variable, Happiness, H.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4584" id="Sec12"><span data-dcnode-id="4585" instrument_node="">Analytical Model</span></h3><p data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">In order to test the research hypotheses the following econometric models are estimated:</span></p><div class="c-article-equation" data-dcnode-id="4573" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="4576"><span class="mathjax-tex" data-dcnode-id="4577"><span class="MathJax_Preview" data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">H = C + \beta_{1} \cdot GDP_{PPP}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="4550"><span data-dcnode-id="4572" instrument_node="">where the dependent variable, H, represents Happiness, and the explanatory independent variable is </span><i data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">GDP</span></i><span data-dcnode-id="4569" instrument_node="">
</span><sub data-dcnode-id="4564"><span data-dcnode-id="4568" instrument_node="">
</span><i data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">PPP</span></i><span data-dcnode-id="4565" instrument_node="">
</span></sub><span data-dcnode-id="4563" instrument_node="">. In this case a positive relationship is expected between Happiness and GDP</span><sub data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">ppp</span></sub><span data-dcnode-id="4560" instrument_node="">. Another possibility is to examine the relationships between Happiness as a dependent variable and </span><i data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">GDP</span></i><span data-dcnode-id="4557" instrument_node="">
</span><sub data-dcnode-id="4552"><span data-dcnode-id="4556" instrument_node="">
</span><i data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">PPP</span></i><span data-dcnode-id="4553" instrument_node="">
</span></sub><span data-dcnode-id="4551" instrument_node="">, and the Gini coefficient as two independent variables.</span></p><div class="c-article-equation" data-dcnode-id="4541" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="4544"><span class="mathjax-tex" data-dcnode-id="4545"><span class="MathJax_Preview" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">H = C + \beta_{1} \cdot GDP_{PPP} + \beta_{2} \cdot Gini</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">
                    (2)
                </span></div></div><span data-dcnode-id="4540" instrument_node="">
</span><p data-dcnode-id="4529"><span data-dcnode-id="4539" instrument_node="">Initially all 139 countries are treated as one block of countries. In this case a positive relation is expected between Happiness and </span><i data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">GDP</span></i><span data-dcnode-id="4536" instrument_node="">
</span><sub data-dcnode-id="4531"><span data-dcnode-id="4535" instrument_node="">
</span><i data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">PPP</span></i><span data-dcnode-id="4532" instrument_node="">
</span></sub><span data-dcnode-id="4530" instrument_node="">, while the effect of Gini is negative. A further extension is described below:</span></p><div class="c-article-equation" data-dcnode-id="4520" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="4523"><span class="mathjax-tex" data-dcnode-id="4524"><span class="MathJax_Preview" data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">H = C + \beta_{1} \cdot GDP_{PPP} + \beta_{2} \cdot Gini + \beta_{3} \cdot CPI + \beta_{4} \cdot Democracy</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="4509"><span data-dcnode-id="4519" instrument_node="">where the dependent variable, H, represents Happiness, and the explanatory independent variables are </span><i data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">GDP</span></i><span data-dcnode-id="4516" instrument_node="">
</span><sub data-dcnode-id="4511"><span data-dcnode-id="4515" instrument_node="">
</span><i data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">PPP</span></i><span data-dcnode-id="4512" instrument_node="">
</span></sub><span data-dcnode-id="4510" instrument_node="">, the CPI, Democracy and the Gini coefficient.</span></p><p data-dcnode-id="4504"><span data-dcnode-id="4508" instrument_node="">Initially all 139 countries are treated as one block of countries. The regression is between the four independent variables, GDP</span><sub data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">ppp</span></sub><span data-dcnode-id="4505" instrument_node=""> per capita, the CPI, Democracy and Gini, and the dependent variable, Happiness.</span></p><p data-dcnode-id="4493"><span data-dcnode-id="4503" instrument_node="">A significant improvement is expected in the production of Happiness with respect to the four independent variables. A positive relation of Happiness is expected with </span><i data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">GDP</span></i><span data-dcnode-id="4500" instrument_node="">
</span><sub data-dcnode-id="4495"><span data-dcnode-id="4499" instrument_node="">
</span><i data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">PPP</span></i><span data-dcnode-id="4496" instrument_node="">
</span></sub><span data-dcnode-id="4494" instrument_node=""> and with Democracy, while a negative relation is anticipated with respect to the CPI and Gini.</span></p></div></div></section><section data-dcnode-id="3914" data-title="Results"><div class="c-article-section" data-dcnode-id="3915" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4488" id="Sec13"><span data-dcnode-id="4489" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3916" id="Sec13-content"><h3 class="c-article__sub-heading" data-dcnode-id="4486" id="Sec14"><span data-dcnode-id="4487" instrument_node="">Descriptive Statistics</span></h3><p data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">This section provides descriptive statistics of the sample variables.</span></p><p data-dcnode-id="4476"><span data-dcnode-id="4483" instrument_node="">Table&nbsp;</span><a data-dcnode-id="4481" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="4482" instrument_node="">1</span></a><span data-dcnode-id="4480" instrument_node=""> summarizes the data set distribution in terms of Mean, Standard Deviation, and Size (</span><i data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">n</span></i><span data-dcnode-id="4477" instrument_node="">) of all the variables.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4461" data-test="inline-table" id="table-1"><figure data-dcnode-id="4462"><figcaption class="c-article-table__figcaption" data-dcnode-id="4473"><b data-dcnode-id="4474" data-test="table-caption" id="Tab1"><span data-dcnode-id="4475" instrument_node="">Table&nbsp;1 Statistical data</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4463"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="4464" data-test="table-li </span><p data-dcnode-id="4419"><span data-dcnode-id="4435" instrument_node="">Table&nbsp;</span><a data-dcnode-id="4433" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="4434" instrument_node="">2</span></a><span data-dcnode-id="4432" instrument_node=""> indicates a significant difference between developed and developing countries regarding the influence of GDP</span><sub data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">ppp</span></sub><span data-dcnode-id="4429" instrument_node=""> and Happiness. According to the independent </span><i data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">t</span></i><span data-dcnode-id="4426" instrument_node=""> test, the average level of Happiness per dollar GDP</span><sub data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">ppp</span></sub><span data-dcnode-id="4423" instrument_node=""> in developed countries is lower than in developing countries, t(137)&nbsp;=&nbsp;6.41 </span><i data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">p</span></i><span data-dcnode-id="4420" instrument_node="">&nbsp;&lt;&nbsp;0.001.</span></p><p data-dcnode-id="4408"><span data-dcnode-id="4418" instrument_node="">Moreover, in the developed countries, one finds higher homogeneity of Happiness per GDP than in the developing countries, </span><i data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">F</span></i><span data-dcnode-id="4415" instrument_node="">(41,96), </span><i data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">p</span></i><span data-dcnode-id="4412" instrument_node="">&nbsp;&lt;&nbsp;0.0001, despite the fact that for both groups of countries a positive relationship exists between total Happiness and GDP</span><sub data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">ppp</span></sub><span data-dcnode-id="4409" instrument_node="">.</span></p><p data-dcnode-id="4403"><span data-dcnode-id="4407" instrument_node="">The Z test, that examines the correlation between the dependent and the independent variables, indicates a larger and more powerful connection in the developed countries in comparison to the developing countries, Z&nbsp;=&nbsp;3.33, </span><i data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">p</span></i><span data-dcnode-id="4404" instrument_node="">&nbsp;&lt;&nbsp;0.001.</span></p><p data-dcnode-id="4398"><span data-dcnode-id="4402" instrument_node="">The study also investigates the contribution of the Gini index to Happiness in addition to the GDP</span><sub data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">ppp</span></sub><span data-dcnode-id="4399" instrument_node=""> variable. For this purpose the sample of 139 countries is divided into categorical groups.</span></p><p data-dcnode-id="4378"><span data-dcnode-id="4397" instrument_node="">Table&nbsp;</span><a data-dcnode-id="4395" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4396" instrument_node="">3</span></a><span data-dcnode-id="4394" instrument_node=""> shows the degree of Happiness in countries, depending on the Gini index and the GDP</span><sub data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">ppp</span></sub><span data-dcnode-id="4391" instrument_node=""> per capita, which were converted into categorical variables. The Gini index is divided into two groups. Group 1 represents the countries in which the value of the Gini index is in the intermediate range of </span><span class="mathjax-tex" data-dcnode-id="4386"><span class="MathJax_Preview" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">0.25 \le {\text{Gini}} \le 0.48</span></span></span><span data-dcnode-id="4385" instrument_node="">. Group 2 represents the countries in which the Gini index is higher than 0.48. The region of low Gini in which </span><span class="mathjax-tex" data-dcnode-id="4380"><span class="MathJax_Preview" data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">{\text{Gini}} \le 0.25</span></span></span><span data-dcnode-id="4379" instrument_node=""> does not exist in these data sets.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4360" data-test="inline-table" id="table-3"><figure data-dcnode-id="4361"><figcaption class="c-article-table__figcaption" data-dcnode-id="4372"><b data-dcnode-id="4373" data-test="table-caption" id="Tab3"><span data-dcnode-id="4377" instrument_node="">Table&nbsp;3 Groups averages and standard deviation of GDP</span><sub data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">ppp</span></sub><span data-dcnode-id="4374" instrument_node=""> and Gini index</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4362"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="4363" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-017-9911-9/tables/3" rel="nofollow"><span data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4364" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4365" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4366" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4369" instrument_node="">

</span><p data-dcnode-id="4333"><span data-dcnode-id="4358" instrument_node="">The GDP</span><sub data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">ppp</span></sub><span data-dcnode-id="4355" instrument_node=""> per capita index was converted into categorical variables from Group 1 to Group 3. Group 1 represents the countries in which the GDP</span><sub data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">ppp</span></sub><span data-dcnode-id="4352" instrument_node=""> per capita is low, below $6000. Group 2 represents the countries in which the GDP</span><sub data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">ppp</span></sub><span data-dcnode-id="4349" instrument_node=""> per capita is intermediate, $6000 </span><span class="mathjax-tex" data-dcnode-id="4344"><span class="MathJax_Preview" data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">\le</span></span></span><span data-dcnode-id="4343" instrument_node=""> GDP</span><sub data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">ppp</span></sub><span data-dcnode-id="4340" instrument_node=""> </span><span class="mathjax-tex" data-dcnode-id="4335"><span class="MathJax_Preview" data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">\le</span></span></span><span data-dcnode-id="4334" instrument_node=""> $20,000.</span></p><p data-dcnode-id="4328"><span data-dcnode-id="4332" instrument_node="">Group 3 represents the countries in which the GDP</span><sub data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">ppp</span></sub><span data-dcnode-id="4329" instrument_node=""> per capita is high, above $20,000.</span></p><p data-dcnode-id="4326"><span data-dcnode-id="4327" instrument_node="">By using the data set for the Gini variable, the following values are found.</span></p><p data-dcnode-id="4309"><span data-dcnode-id="4325" instrument_node="">
</span><i data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">F</span></i><span data-dcnode-id="4322" instrument_node=""> (1,132)&nbsp;=&nbsp;7.03, </span><i data-dcnode-id="4320"><span data-dcnode-id="4321" instrument_node="">p</span></i><span data-dcnode-id="4319" instrument_node="">&nbsp;&lt;&nbsp;0.05 and η Squared&nbsp;=&nbsp;0.05. For the GDP</span><sub data-dcnode-id="4317"><span data-dcnode-id="4318" instrument_node="">ppp</span></sub><span data-dcnode-id="4316" instrument_node=""> per capita variable the values are </span><i data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">F</span></i><span data-dcnode-id="4313" instrument_node=""> (2,132)&nbsp;=&nbsp;36.69, </span><i data-dcnode-id="4311"><span data-dcnode-id="4312" instrument_node="">p</span></i><span data-dcnode-id="4310" instrument_node="">&nbsp;&lt;&nbsp;0.01 and η Squared&nbsp;=&nbsp;0.36.</span></p><p data-dcnode-id="4301"><span data-dcnode-id="4308" instrument_node="">The main conclusion from the above is that by increasing the Gini coefficient the positive effect of GDP</span><sub data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">ppp</span></sub><span data-dcnode-id="4305" instrument_node=""> per capita on Happiness increases. The contribution of GDP</span><sub data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">ppp</span></sub><span data-dcnode-id="4302" instrument_node=""> per capita on the explained variance is more than 36% while the contribution of Gini itself added a very limited value of only 5%.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4299" id="Sec15"><span data-dcnode-id="4300" instrument_node="">Regression Estimate</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4297" id="Sec16"><span data-dcnode-id="4298" instrument_node="">The Entire Sample</span></h4><p data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">This section provides an analysis of a hierarchical regression between Happiness as a dependent variable and the independent variables.</span></p><p data-dcnode-id="4287"><span data-dcnode-id="4294" instrument_node="">First a hierarchical regression between Happiness and the two explanatory variables of Gini and GDP</span><sub data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">ppp</span></sub><span data-dcnode-id="4291" instrument_node=""> per capita is examined (see Table&nbsp;</span><a data-dcnode-id="4289" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4290" instrument_node="">4</span></a><span data-dcnode-id="4288" instrument_node=""> below). Then the two independent variables, CPI and Democracy index, are also added.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4272" data-test="inline-table" id="table-4"><figure data-dcnode-id="4273"><figcaption class="c-article-table__figcaption" data-dcnode-id="4284"><b data-dcnode-id="4285" data-test="table-caption" id="Tab4"><span data-dcnode-id="4286" instrument_node="">Table&nbsp;4 Regression results for all the countries</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4274"><a aria-label="Full size table 4" class="c-article__pill-button" data-dcnode-id="4275" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-017-9911-9/tables/4" rel="nofollow"><span data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4276" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4277" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4278" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4281" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4280" fill-rule="evenodd"></path><span data-dcnode-id="4279" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4271" instrument_node="">
</span><p data-dcnode-id="4263"><span data-dcnode-id="4270" instrument_node="">In the regression between H and the variables, GDP</span><sub data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">ppp</span></sub><span data-dcnode-id="4267" instrument_node=""> per capita and Gini, a positive relationship is revealed with both of them. In the first stage of the regression, 49% of the explained variance is related to GDP</span><sub data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">ppp</span></sub><span data-dcnode-id="4264" instrument_node=""> per capita, while in the second stage of the regression the Gini coefficient adds an additional explanation of only 1%.</span></p><p data-dcnode-id="4255"><span data-dcnode-id="4262" instrument_node="">The Gini coefficient does not contribute significantly to the Happiness level when the only two independent variables are GDP</span><sub data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">ppp</span></sub><span data-dcnode-id="4259" instrument_node=""> and Gini. Moreover, the positive sign of the Gini index coefficient indicates that more Happiness is generated by a higher degree of inequality. This seems doubtful. Therefore, another two new explanatory independent variables, CPI measure and Democracy index, are added to the two-stage hierarchic regression. The results are presented in Table&nbsp;</span><a data-dcnode-id="4257" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="4258" instrument_node="">5</span></a><span data-dcnode-id="4256" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4240" data-test="inline-table" id="table-5"><figure data-dcnode-id="4241"><figcaption class="c-article-table__figcaption" data-dcnode-id="4252"><b data-dcnode-id="4253" data-test="table-caption" id="Tab5"><span data-dcnode-id="4254" instrument_node="">Table&nbsp;5 Regression results for all the countries</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4242"><a aria-label="Full size table 5" class="c-article__pill-button" data-dcnode-id="4243" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10902-017-9911-9/tables/5" rel="nofollow"><span data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4244" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4245" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4246" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4249" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4248" fill-rule="evenodd"></path><span data-dcnode-id="4247" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="4239" instrument_node="">
</span><p data-dcnode-id="4225"><span data-dcnode-id="4238" instrument_node="">In the regression between H and the variables GDP</span><sub data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">ppp</span></sub><span data-dcnode-id="4235" instrument_node=""> per capita, CPI, Democracy and Gini, a positive relationship is revealed with the variables GDP</span><sub data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">ppp</span></sub><span data-dcnode-id="4232" instrument_node=""> per capita and Democracy. In the first stage of the regression, 59.3% of the explained variance is related to them, while in the second stage of the regression an additional explanation of only 0.6% is added by Gini. By implementing the two independent variables, the </span><span class="mathjax-tex" data-dcnode-id="4227"><span class="MathJax_Preview" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">R^{2}</span></span></span><span data-dcnode-id="4226" instrument_node=""> value significantly increases from 0.5 to 0.599.</span></p><p data-dcnode-id="4217"><span data-dcnode-id="4224" instrument_node="">However, in both Tables&nbsp;</span><a data-dcnode-id="4222" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4223" instrument_node="">4</span></a><span data-dcnode-id="4221" instrument_node=""> and </span><a data-dcnode-id="4219" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab5"><span data-dcnode-id="4220" instrument_node="">5</span></a><span data-dcnode-id="4218" instrument_node=""> we find that the Gini coefficient still has a very small effect (or even no impact at all) on the Happiness of countries. These results require further investigation: Perhaps the data regarding the Gini coefficient factor should be used differently. The use of a simple linear regression of Gini as an independent variable possibly leads to the ambiguous effect of Gini on Happiness. In the study, the distribution of the Gini values of countries was therefore divided into three distinct groups. Actually only the two groups of the high and intermediate Gini index are relevant since the low Gini value of Gini &lt;0.25 does not exist in the sample.</span></p><p data-dcnode-id="4209"><span data-dcnode-id="4216" instrument_node="">We suggest that the reason for the poor results of the regression could be the fact that the sign related to the Gini effect on H is indeed ambiguous and might change in different ranges. At certain high values Gini influences H negatively, especially at extreme values of Gini that are either too small or too large. At some intermediate ranges of Gini values, its effect on H is expected to be either positive or ambiguous. The region of low Gini (where </span><span class="mathjax-tex" data-dcnode-id="4211"><span class="MathJax_Preview" data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">{\text{Gini}} \le 0.25</span></span></span><span data-dcnode-id="4210" instrument_node="">) does not exist in the data set.</span></p><p data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">However, one might expect according to the present approach that if these values really did exist, then by lowering Gini, Happiness would also be reduced. The effect of lowering the Gini coefficient might lead to a reduction of Happiness since it reflects sharing of rewards that is too equal. This possibility reflects a lack of matching between contributions and rewards that individuals would expect.</span></p><p data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Examination of the data demonstrates that the relationship between the Gini index and Happiness is not straight and positive linear. The Gini index value of 0.48 is the turning point at which a negative correlation between Gini and Happiness later occurs. It is impossible to know the pattern of connections between the Gini index and Happiness, since Gini indices are extremely low (Gini values&nbsp;&lt;&nbsp;0.25). No country with low Gini is found in the database.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="4203" id="Sec17"><span data-dcnode-id="4204" instrument_node="">High and Intermediate Gini Index</span></h4><p data-dcnode-id="4201"><span data-dcnode-id="4202" instrument_node="">A different technique is used to find a better and more reliable relationship between Happiness and the independent variables.</span></p><p data-dcnode-id="4199"><span data-dcnode-id="4200" instrument_node="">All 139 countries were categorized into three cells:</span></p><ol class="u-list-style-none" data-dcnode-id="4161"><span data-dcnode-id="4198" instrument_node="">
</span><li data-dcnode-id="4187"><span data-dcnode-id="4197" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">a.</span></span><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4189"><span data-dcnode-id="4193" instrument_node="">68 countries have intermediate Gini (less than 0.48) and low and intermediate GDP</span><sub data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">ppp</span></sub><span data-dcnode-id="4190" instrument_node=""> per capita (less than $20,000).</span></p><span data-dcnode-id="4188" instrument_node="">
</span></li><span data-dcnode-id="4186" instrument_node="">
</span><li data-dcnode-id="4175"><span data-dcnode-id="4185" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">b.</span></span><span data-dcnode-id="4182" instrument_node="">
</span><p data-dcnode-id="4177"><span data-dcnode-id="4181" instrument_node="">46 countries contain intermediate Gini and high GDP</span><sub data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">ppp</span></sub><span data-dcnode-id="4178" instrument_node=""> per capita.</span></p><span data-dcnode-id="4176" instrument_node="">

</span><p data-dcnode-id="4143"><span data-dcnode-id="4159" instrument_node="">Equations&nbsp;(</span><a data-dcnode-id="4157" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="4158" instrument_node="">4</span></a><span data-dcnode-id="4156" instrument_node="">)–(</span><a data-dcnode-id="4154" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ6"><span data-dcnode-id="4155" instrument_node="">6</span></a><span data-dcnode-id="4153" instrument_node="">) below show the three regression equations: group (a) with intermediate Gini and low GDP</span><sub data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">ppp</span></sub><span data-dcnode-id="4150" instrument_node=""> per capita, group (b) with intermediate Gini and high GDP</span><sub data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">ppp</span></sub><span data-dcnode-id="4147" instrument_node=""> per capita, and group (c) with high Gini and low GDP</span><sub data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">ppp</span></sub><span data-dcnode-id="4144" instrument_node=""> per capita.</span></p><div class="c-article-equation" data-dcnode-id="4134" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="4137"><span class="mathjax-tex" data-dcnode-id="4138"><span class="MathJax_Preview" data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">H_{1} = C + \beta_{1} \cdot GDP_{PPP \, Low} + \beta_{2} \cdot Gini_{Intermediate}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">

                    (6)
                </span></div></div><p data-dcnode-id="4097"><span data-dcnode-id="4113" instrument_node="">Three separate hierarchical linear regressions were conducted: the first for countries with intermediate Gini and intermediate GDP</span><sub data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">ppp</span></sub><span data-dcnode-id="4110" instrument_node=""> per capita values; the second for countries with intermediate Gini and high GDP</span><sub data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">ppp</span></sub><span data-dcnode-id="4107" instrument_node=""> per capita values; and the third for countries with high Gini and low GDP</span><sub data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">ppp</span></sub><span data-dcnode-id="4104" instrument_node=""> per capita values. In the first step of each of the regressions, only GDP</span><sub data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">ppp</span></sub><span data-dcnode-id="4101" instrument_node=""> per capita, CPI and Democracy variables were included as explanatory variables, while in the second step the Gini index was added to the other variables. Table&nbsp;</span><a data-dcnode-id="4099" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab6"><span data-dcnode-id="4100" instrument_node="">6</span></a><span data-dcnode-id="4098" instrument_node=""> shows the improved results:</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4082" data-test="inline-table" id="table-6"><figure data-dcnode-id="4083"><figcaption class="c-article-table__figcaption" data-dcnode-id="4094"><b data-dcnode-id="4095" data-test="table-caption" id="Tab6"><span data-dcnode-id="4096" instrument_node="">Table&nbsp;6 Regression results for the three groups</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4084"><a aria-label="Full size table 6" class="c-article__pill-butto </span><p data-dcnode-id="3955"><span data-dcnode-id="3956" instrument_node="">Using only the three variables and ignoring Gini explains 49.8% of the variance in Happiness. In contrast to the previous two groups of countries, in this group the Gini index adds another 13.8% of the explained variance.</span></p><span data-dcnode-id="3954" instrument_node="">

</span><p data-dcnode-id="3946"><span data-dcnode-id="3947" instrument_node="">The Gini index is found to be negatively related to Happiness. In these countries, the higher the degree of inequality, the lower the degree of Happiness among their populations. Individuals are not tolerant of inequality at extremely high values of Gini.</span></p><span data-dcnode-id="3945" instrument_node="">

</span><p data-dcnode-id="3931"><span data-dcnode-id="3938" instrument_node="">A significant positive correlation is found for GDP</span><sub data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">ppp</span></sub><span data-dcnode-id="3935" instrument_node=""> per capita. As the GDP</span><sub data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">ppp</span></sub><span data-dcnode-id="3932" instrument_node=""> per capita is higher, so is the degree of Happiness.</span></p><span data-dcnode-id="3930" instrument_node="">
