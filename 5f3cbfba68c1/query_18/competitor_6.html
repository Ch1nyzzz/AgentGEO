</span><meta content="The standard of living reflected by one’s income and consumption is the primary explanation for the utility or satisfaction of the private consumer. However, empirical evidence very often demonstrates that the level of happiness is not necessarily higher for wealthy people in comparison to the poor. This holds within specific populations of a country, and in macro terms by comparison between the happiness of populations with low and high GDPppp per capita. Different research studies have used other economic and social explanatory variables for determining consumer happiness within countries. The present paper adds the new factor of income inequality that affects happiness. It is empirically proved that at extreme values of inequality measured by the Gini index, the effect of happiness is negative regardless of GDPppp per capita. However, at the intermediate ranges of the Gini index the effect of changes in the index on happiness is ambiguous. These results are found regardless of the actual values of GDPppp per capita." data-dcnode-id="6226" name="dc.description"><span data-dcnode-id="6225" instrument_node="">

</span><meta content="The Effects of Income Levels and Income Inequalities on Happiness - Journal of Happiness Studies" data-dcnode-id="5858" property="og:title"><span data-dcnode-id="5857" instrument_node="">
</span><meta content="The standard of living reflected by one’s income and consumption is the primary explanation for the utility or satisfaction of the private consumer. However, empirical evidence very often demonstrates that the level of happiness is not necessarily higher for wealthy people in comparison to the poor. This holds within specific populations of a country, and in macro terms by comparison between the happiness of populations with low and high GDPppp per capita. Different research studies have used other economic and social explanatory variables for determining consumer happiness within countries. The present paper adds the new factor of income inequality that affects happiness. It is empirically proved that at extreme values of inequality measured by the Gini index, the effect of happiness is negative regardless of GDPppp per capita. However, at the intermediate ranges of the Gini index the effect of changes in the index on happiness is ambiguous. These results are found regardless of the actual values of GDPppp per capita." data-dcnode-id="5856" property="og:description"><span data-dcnode-id="5855" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="5372" data-gtm-vis-first-on-screen-50443292_562="505" data-gtm-vis-first-on-screen-50443292_563="506" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="505" data-gtm-vis-recent-on-screen-50443292_563="506" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5373" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5386" id="Abs1"><span data-dcnode-id="5387" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5374" id="Abs1-content"><p data-dcnode-id="5375"><span data-dcnode-id="5385" instrument_node="">The standard of living reflected by one’s income and consumption is the primary explanation for the utility or satisfaction of the private consumer. However, empirical evidence very often demonstrates that the level of happiness is not necessarily higher for wealthy people in comparison to the poor. This holds within specific populations of a country, and in macro terms by comparison between the happiness of populations with low and high GDP</span><sub data-dcnode-id="5383"><span data-dcnode-id="5384" instrument_node="">ppp</span></sub><span data-dcnode-id="5382" instrument_node=""> per capita. Different research studies have used other economic and social explanatory variables for determining consumer happiness within countries. The present paper adds the new factor of income inequality that affects happiness. It is empirically proved that at extreme values of inequality measured by the Gini index, the effect of happiness is negative regardless of GDP</span><sub data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">ppp</span></sub><span data-dcnode-id="5379" instrument_node=""> per capita. However, at the intermediate ranges of the Gini index the effect of changes in the index on happiness is ambiguous. These results are found regardless of the actual values of GDP</span><sub data-dcnode-id="5377"><span data-dcnode-id="5378" instrument_node="">ppp</span></sub><span data-dcnode-id="5376" instrument_node=""> per capita.</span></p></div></div></section><span data-dcnode-id="5371" instrument_node="">
</span><section data-dcnode-id="5333" data-gtm-vis-first-on-screen-50443292_562="506" data-gtm-vis-first-on-screen-50443292_563="506" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="506" data-gtm-vis-recent-on-screen-50443292_563="506" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="5334" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5369" id="Sec1"><span data-dcnode-id="5370" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="5335" id="Sec1-content"><p data-dcnode-id="5364"><span data-dcnode-id="5368" instrument_node="">In recent decades the study of happiness has been linked to economics. Although Easterlin (</span><a aria-label="Reference 1974" data-dcnode-id="5366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d251043621e457" title="Easterlin, R. A. (1974). Does economic growth improve the human lot? In A. D. Paul &amp; W. R. Melvin (Eds.), Nations and households in economic growth: Essays in honour of Moses Abramovitz. New York: Academic Press Inc."><span data-dcnode-id="5367" instrument_node="">1974</span></a><span data-dcnode-id="5365" instrument_node="">) was a pioneer in the field, not until 1990 did economists begin to contribute large-scale empirical analyses of the determinants of happiness in different countries and time periods. These studies defined various socioeconomic variables that influence the degree of one’s happiness such as personal income, inequality of income distribution, levels of healthcare and education, democracy, corruption, etc.</span></p><p data-dcnode-id="5338"><span data-dcnode-id="5363" instrument_node="">Since the beginning of the twentieth century, economists have developed a new understanding that utility should be considered and measured in terms of happiness. Research in the economics of happiness has established a systematic relationship between objective economic factors and reported well-being data. Economists have implemented subjective well-being data to investigate the following subjects: the income hypothesis (Easterlin </span><a aria-label="Reference 1974" data-dcnode-id="5361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d251043621e463" title="Easterlin, R. A. (1974). Does economic growth improve the human lot? In A. D. Paul &amp; W. R. Melvin (Eds.), Nations and households in economic growth: Essays in honour of Moses Abramovitz. New York: Academic Press Inc."><span data-dcnode-id="5362" instrument_node="">1974</span></a><span data-dcnode-id="5360" instrument_node="">, </span><a aria-label="Reference 1995" data-dcnode-id="5358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d251043621e466" title="Easterlin, R. A. (1995). Will raising the incomes of all increase the happiness of all? Journal of Economic Behavior &amp; Organization, 27, 35–47."><span data-dcnode-id="5359" instrument_node="">1995</span></a><span data-dcnode-id="5357" instrument_node="">, </span><a aria-label="Reference 2001" data-dcnode-id="5355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d251043621e469" title="Easterlin, R. A. (2001). Income and happiness: towards a unified theory. The Economics Journal, 3, 465–484."><span data-dcnode-id="5356" instrument_node="">2001</span></a><span data-dcnode-id="5354" instrument_node="">; Di Tella et al. </span><a aria-label="Reference 2003" data-dcnode-id="5352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d251043621e472" title="Di Tella, R., MacCulloch, R. J., &amp; Oswald, A. J. (2003). The macroeconomic of happiness. Review of Economics and Statistics, 85, 809–827."><span data-dcnode-id="5353" instrument_node="">2003</span></a><span data-dcnode-id="5351" instrument_node="">); the nonfinancial impacts of unemployment (Clark and Oswald </span><a aria-label="Reference 1994" data-dcnode-id="5349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d251043621e475" title="Clark, A. E., &amp; Oswald, A. J. (1994). Unhappiness and unemployment. Economic Journal, 104, 648–659."><span data-dcnode-id="5350" instrument_node="">1994</span></a><span data-dcnode-id="5348" instrument_node="">; Winkelmann and Winkelmann </span><a aria-label="Reference 1998" data-dcnode-id="5346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d251043621e479" title="Winkelmann, L., &amp; Winkelmann, R. (1998). Why are the unemployed so unhappy? Economica, 65(257), 1–15."><span data-dcnode-id="5347" instrument_node="">1998</span></a><span data-dcnode-id="5345" instrument_node="">); the relationship between happiness and economic growth (Kenny </span><a aria-label="Reference 1999" data-dcnode-id="5343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d251043621e482" title="Kenny, C. (1999). Does growth cause happiness, or does happiness cause growth? Kyklos, 52(1), 3–25."><span data-dcnode-id="5344" instrument_node="">1999</span></a><span data-dcnode-id="5342" instrument_node="">); and the impacts of a political institution (Frey and Stutzer </span><a aria-label="Reference 2000" data-dcnode-id="5340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d251043621e485" title="Frey, B. S., &amp; Stutzer, A. (2000). Happiness, economy, and institution. Economic Journal, 110(466), 918–938."><span data-dcnode-id="5341" instrument_node="">2000</span></a><span data-dcnode-id="5339" instrument_node="">). Happiness research adds considerable new insights to well-known theoretical propositions.</span></p><p data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">This paper examines the impacts of income, corruption, and democracy on self-reported well-being. However, our most important modification in this paper is in dealing with different aspects of inequality as a factor of happiness.</span></p></div></div></section><section data-dcnode-id="4905" data-gtm-vis-first-on-screen-50443292_562="506" data-gtm-vis-first-on-screen-50443292_563="506" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="506" data-gtm-vis-recent-on-screen-50443292_563="506" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Literature Review"><div class="c-article-section" data-dcnode-id="4906" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5331" id="Sec2"><span data-dcnode-id="5332" instrument_node="">Literature Review</span></h2><div class="c-article-section__content" data-dcnode-id="4907" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="5329" id="Sec3"><span data-dcnode-id="5330" instrument_node="">The Effects of Income</span></h3><p data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">The following section begins with the literature review concerning the main variables that may affect happiness. It concludes with the literature that deals with the ambiguous effect of inequality on happiness.</span></p><p data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">Economists commonly accept that higher income leads to greater happiness. Empirical studies in many countries and in different cultures have consistently supported such an approach and demonstrated a positive correlation between higher income and greater happiness.</span></p><p data-dcnode-id="5302"><span data-dcnode-id="5324" instrument_node="">In his study, Easterlin (</span><a aria-label="Reference 1974" data-dcnode-id="5322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d251043621e509" title="Easterlin, R. A. (1974). Does economic growth improve the human lot? In A. D. Paul &amp; W. R. Melvin (Eds.), Nations and households in economic growth: Essays in honour of Moses Abramovitz. New York: Academic Press Inc."><span data-dcnode-id="5323" instrument_node="">1974</span></a><span data-dcnode-id="5321" instrument_node="">) finds that happiness is associated positively with higher incomes. Subsequent research appears consistent with Easterlin’s findings regarding the stagnant long-term relationship between happiness and real GDP in the United States (Easterlin </span><a aria-label="Reference 1995" data-dcnode-id="5319" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d251043621e512" title="Easterlin, R. A. (1995). Will raising the incomes of all increase the happiness of all? Journal of Economic Behavior &amp; Organization, 27, 35–47."><span data-dcnode-id="5320" instrument_node="">1995</span></a><span data-dcnode-id="5318" instrument_node="">; Di Tella et al. </span><a aria-label="Reference 2003" data-dcnode-id="5316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d251043621e515" title="Di Tella, R., MacCulloch, R. J., &amp; Oswald, A. J. (2003). The macroeconomic of happiness. Review of Economics and Statistics, 85, 809–827."><span data-dcnode-id="5317" instrument_node="">2003</span></a><span data-dcnode-id="5315" instrument_node="">). According to the standard approach, increasing incomes should lead to increased utility but this simply does not necessarily occur. It can be explained with the introduction of income aspirations into utility. Income aspirations reflect the concerns of individuals for relative income and their adaptations to prior income levels (Easterlin </span><a aria-label="Reference 2001" data-dcnode-id="5313" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d251043621e518" title="Easterlin, R. A. (2001). Income and happiness: towards a unified theory. The Economics Journal, 3, 465–484."><span data-dcnode-id="5314" instrument_node="">2001</span></a><span data-dcnode-id="5312" instrument_node="">). Increasing the incomes of all individuals does not increase their happiness. This is due to the fact that material norms, which are the basis for self-assessment of well-being, increase in the same proportion as actual societal income. Thus, simultaneously increasing income for all individuals may lead to unchanged satisfaction for everyone. Easterlin’s empirical contribution is also supported by research studies that show for various populations and time periods that there is a strong correlation between favorable self-comparison of one’s income with other income levels, and higher reported well-being, while absolute income remains constant (see Van de Stadt et al. </span><a aria-label="Reference 1985" data-dcnode-id="5310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d251043621e521" title="Van de Stadt, H., Kapteyn, A., &amp; Van de Geer, S. (1985). The relativity of utility: Evidence from panel data. Review of Economics and Statistics, 67, 179–187."><span data-dcnode-id="5311" instrument_node="">1985</span></a><span data-dcnode-id="5309" instrument_node="">; Tomes </span><a aria-label="Reference 1986" data-dcnode-id="5307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d251043621e525" title="Tomes, N. (1986). Income distribution, happiness and satisfaction: A direct test of the interdependent preferences model. Journal of Economic Psychology, 7, 425–446."><span data-dcnode-id="5308" instrument_node="">1986</span></a><span data-dcnode-id="5306" instrument_node="">; Clark and Oswald </span><a aria-label="Reference 1998" data-dcnode-id="5304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d251043621e528" title="Clark, A. E., &amp; Oswald, A. J. (1998). Comparison-concave utility and following behaviour in social and economic settings. Journal of Public Economics, 70(1), 133–155."><span data-dcnode-id="5305" instrument_node="">1998</span></a><span data-dcnode-id="5303" instrument_node="">, among others).</span></p><p data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">A general increase in income raises the societal average over time, so that the anticipated increase in happiness is offset by a decrease resulting from the higher average income. As a result, there is no net growth in the sense of well-being among individuals.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5298" id="Sec4"><span data-dcnode-id="5299" instrument_node="">The Effects of Democracy</span></h3><p data-dcnode-id="5287"><span data-dcnode-id="5297" instrument_node="">Does democracy result in greater economic prosperity and growth and as a result in satisfaction and happiness? It is unclear whether democracy in itself actually leads to increased economic growth as compared with other forms of government. Some arguments concerning the impact of democracy on economic growth include the fear of populist demands (Huntington </span><a aria-label="Reference 1968" data-dcnode-id="5295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d251043621e542" title="Huntington, S. P. (1968). Political order in changing societies. New Haven and London: Yale University Press."><span data-dcnode-id="5296" instrument_node="">1968</span></a><span data-dcnode-id="5294" instrument_node="">), excessive redistribution which may become detrimental for growth (Persson and Tabellini </span><a aria-label="Reference 1994" data-dcnode-id="5292" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d251043621e545" title="Persson, T., &amp; Tabellini, G. (1994). Is inequality harmful for growth? American Economic Review, 84(3), 600–621."><span data-dcnode-id="5293" instrument_node="">1994</span></a><span data-dcnode-id="5291" instrument_node="">), and agency problems between people and politicians (Buchanan and Gordon </span><a aria-label="Reference 1962" data-dcnode-id="5289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d251043621e548" title="Buchanan, J. M., &amp; Gordon, T. (1962). The calculus of consent: Logical foundations of constitutional democracy. Indianapolis: Liberty Fund."><span data-dcnode-id="5290" instrument_node="">1962</span></a><span data-dcnode-id="5288" instrument_node="">).</span></p><p data-dcnode-id="5276"><span data-dcnode-id="5286" instrument_node="">In contrast, other assertions have been made with respect to the positive effect of democracy on economic growth. For example, based upon redistribution arguments, tax revenues subsidize education (Saint-Paul and Verdier </span><a aria-label="Reference 1993" data-dcnode-id="5284" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251043621e554" title="Saint-Paul, G. T., &amp; Verdier, A. (1993). Education, democracy and growth. Journal of Development Economics, 42, 399–407."><span data-dcnode-id="5285" instrument_node="">1993</span></a><span data-dcnode-id="5283" instrument_node="">; Bourguignon and Verdier </span><a aria-label="Reference 2000" data-dcnode-id="5281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d251043621e557" title="Bourguignon, F., &amp; Verdier, T. (2000). Globalization and endogenous educational responses: The main economic transmission channels. DELTA Working Papers 2000-24, DELTA (Ecole normale supérieure)."><span data-dcnode-id="5282" instrument_node="">2000</span></a><span data-dcnode-id="5280" instrument_node="">) and improve capital market imperfections (Galor and Zeira </span><a aria-label="Reference 1993" data-dcnode-id="5278" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d251043621e560" title="Galor, O., &amp; Zeira, J. (1993). Income distribution and macroeconomics. The Review of Economic Studies, 60, 35–52."><span data-dcnode-id="5279" instrument_node="">1993</span></a><span data-dcnode-id="5277" instrument_node="">).</span></p><p data-dcnode-id="5262"><span data-dcnode-id="5275" instrument_node="">In addition, democracy can increase efficiency and reduce transaction costs, commitment constraints, and information asymmetries of political organization (Olson </span><a aria-label="Reference 1993" data-dcnode-id="5273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d251043621e566" title="Olson, M. (1993). Dictatorship, democracy, and development. The American Political Science Review, 87, 567–576."><span data-dcnode-id="5274" instrument_node="">1993</span></a><span data-dcnode-id="5272" instrument_node="">; Sen </span><a aria-label="Reference 1999" data-dcnode-id="5270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d251043621e569" title="Sen, A. (1999). Development as freedom. Oxford: Oxford University Press."><span data-dcnode-id="5271" instrument_node="">1999</span></a><span data-dcnode-id="5269" instrument_node="">). Democracy can also increase economic growth with its positive impact on political stability and democratic institutions (Alesina and Perotti </span><a aria-label="Reference 1996" data-dcnode-id="5267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d251043621e572" title="Alesina, A., &amp; Perotti, R. (1996). Income distribution, political instability, and investment. European Economic Review, 40(6), 1203–1228."><span data-dcnode-id="5268" instrument_node="">1996</span></a><span data-dcnode-id="5266" instrument_node="">; Acemoglu et al. </span><a aria-label="Reference 2005" data-dcnode-id="5264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d251043621e575" title="Acemoglu, D., Johnson, S., Robinson, J. A., &amp; Yared, P. (2005). From education to democracy? The American Economic Review, 95(2), 44–49."><span data-dcnode-id="5265" instrument_node="">2005</span></a><span data-dcnode-id="5263" instrument_node="">).</span></p><p data-dcnode-id="5236"><span data-dcnode-id="5261" instrument_node="">Based on cross-country analysis, empirical studies have indicated negligible effects of democracy on economic growth (Helliwell </span><a aria-label="Reference 1994" data-dcnode-id="5259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d251043621e581" title="Helliwell, J. F. (1994). Empirical linkages between democracy and economic growth. NBER Working Paper No. 4066."><span data-dcnode-id="5260" instrument_node="">1994</span></a><span data-dcnode-id="5258" instrument_node="">; Barro </span><a aria-label="Reference 1996" data-dcnode-id="5256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d251043621e584" title="Barro, R. J. (1996). Determinants of economic growth: A cross-country empirical study. NBER Working Paper No. 5698."><span data-dcnode-id="5257" instrument_node="">1996</span></a><span data-dcnode-id="5255" instrument_node="">; Tavares and Wacziarg </span><a aria-label="Reference 2001" data-dcnode-id="5253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d251043621e587" title="Tavares, J., &amp; Wacziarg, R. (2001). How democracy affects growth. European Economic Review, 45, 1341–1378."><span data-dcnode-id="5254" instrument_node="">2001</span></a><span data-dcnode-id="5252" instrument_node="">). However, more recent panel data based research has demonstrated more significant effects (Rodrik and Romain </span><a aria-label="Reference 2005" data-dcnode-id="5250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d251043621e590" title="Rodrik, D., &amp; Romain, W. (2005). Do democratic transitions produce bad economic outcomes? American Economic Review, 95, 50–55."><span data-dcnode-id="5251" instrument_node="">2005</span></a><span data-dcnode-id="5249" instrument_node="">; Papaioannou and Gregorios </span><a aria-label="Reference 2008" data-dcnode-id="5247" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d251043621e593" title="Papaioannou, E., &amp; Siourounis, G. (2008). Democratisation and growth. The Economic Journal, 118, 1520–1551."><span data-dcnode-id="5248" instrument_node="">2008</span></a><span data-dcnode-id="5246" instrument_node="">; Persson and Tabellini </span><a aria-label="Reference 2009" data-dcnode-id="5244" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d251043621e597" title="Persson, T., &amp; Tabellini, G. (2009). Democratic capital: The nexus of political and economic change. American Economic Journal: Macroeconomics, 1, 88–126."><span data-dcnode-id="5245" instrument_node="">2009</span></a><span data-dcnode-id="5243" instrument_node="">). Acemoglu et al. (</span><a aria-label="Reference 2014" data-dcnode-id="5241" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d251043621e600" title="Acemoglu, D., Naidu, S., Restrepo, P., &amp; Robinson, J. A. (2014). Democracy does cause growth. NBER Working Paper No. 20004."><span data-dcnode-id="5242" instrument_node="">2014</span></a><span data-dcnode-id="5240" instrument_node="">) show that democracy has a strong positive effect on GDP. Pozuelo et al. (</span><a aria-label="Reference 2016" data-dcnode-id="5238" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d251043621e603" title="Pozuelo, R.J., Slipowitz, A., &amp; Vuletin, G. (2016). Democracy does not cause growth: The importance of endogeneity arguments. IDB Working Paper Series, 694. The Brookings Institution Columbia University Inter-American Development Bank."><span data-dcnode-id="5239" instrument_node="">2016</span></a><span data-dcnode-id="5237" instrument_node="">) challenge recent findings that democracy has substantial impacts on economic growth and distinguish among different factors that may encourage or discourage the positive relationship between democracy and growth.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5234" id="Sec5"><span data-dcnode-id="5235" instrument_node="">The Effect of Corruption on Happiness</span></h3><p data-dcnode-id="5220"><span data-dcnode-id="5233" instrument_node="">Corruption involves unlawful behavior of public officials who misuse their power for the purpose of personal gain (Sandholtz and Koetzele </span><a aria-label="Reference 2000" data-dcnode-id="5231" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d251043621e614" title="Sandholtz, W., &amp; Koetzele, W. (2000). Accounting for corruption: Economic structure, democracy, and trade. International Studies Quarterly, 44(1), 31–50."><span data-dcnode-id="5232" instrument_node="">2000</span></a><span data-dcnode-id="5230" instrument_node="">). A common indicator of government performance is the level of corruption (see Anderson and Tverdova </span><a aria-label="Reference 2003" data-dcnode-id="5228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d251043621e617" title="Anderson, C. J., &amp; Tverdova, Y. V. (2003). Corruption, political allegiances, and attitudes toward government in contemporary democracies. American Journal of Political Science, 47(1), 91–109."><span data-dcnode-id="5229" instrument_node="">2003</span></a><span data-dcnode-id="5227" instrument_node="">; Gerring et al. </span><a aria-label="Reference 2005" data-dcnode-id="5225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d251043621e620" title="Gerring, J., Thacker, S. C., &amp; Moreno, C. (2005). Centripetal democratic governance: A theory and global inquiry. American Political Science Review, 99(4), 567–581."><span data-dcnode-id="5226" instrument_node="">2005</span></a><span data-dcnode-id="5224" instrument_node="">; Warren </span><a aria-label="Reference 2004" data-dcnode-id="5222" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d251043621e623" title="Warren, M. (2004). What does corruption mean in a democracy? American Journal of Political Science, 48(2), 328–343."><span data-dcnode-id="5223" instrument_node="">2004</span></a><span data-dcnode-id="5221" instrument_node="">). Government performance may also affect individual well-being.</span></p><p data-dcnode-id="5203"><span data-dcnode-id="5219" instrument_node="">Personal experience with corruption is likely to have a negative effect on an individual’s well-being. People are unhappy when they are exposed to corruption (Chrikov and Ryan </span><a aria-label="Reference 2001" data-dcnode-id="5217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d251043621e629" title="Chrikov, V. I., &amp; Ryan, R. M. (2001). Control versus autonomy support in Russia and the U.S.: Effects on well-being and academic motivation. Journal of Cross-Cultural Psychology, 32, 618–632."><span data-dcnode-id="5218" instrument_node="">2001</span></a><span data-dcnode-id="5216" instrument_node="">; Ryan and Deci </span><a aria-label="Reference 2001" data-dcnode-id="5214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d251043621e632" title="Ryan, R. M., &amp; Deci, E. L. (2001). On happiness and human potentials: A review of research on Hedonic and Eudemonic well-being. Annual Reviews of Psychology, 52, 141–166."><span data-dcnode-id="5215" instrument_node="">2001</span></a><span data-dcnode-id="5213" instrument_node="">). Corruption can also reduce subjective well-being due to increased crime and inequality (Montinola and Jackman </span><a aria-label="Reference 2002" data-dcnode-id="5211" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d251043621e635" title="Montinola, G. R., &amp; Jackman, R. W. (2002). Sources of corruption: A cross country study. British Journal of Political Science, 32, 147–170."><span data-dcnode-id="5212" instrument_node="">2002</span></a><span data-dcnode-id="5210" instrument_node="">; Rose-Ackerman </span><a aria-label="Reference 1999" data-dcnode-id="5208" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d251043621e638" title="Rose-Ackerman, S. (1999). Corruption and government: Causes, consequences, and reform. New York: Cambridge University Press."><span data-dcnode-id="5209" instrument_node="">1999</span></a><span data-dcnode-id="5207" instrument_node="">). Economic and social cost may further decrease the ability of individuals to exercise competencies, pursue personal interests, and maintain relationships to satisfy their psychological needs (Ryan and Deci </span><a aria-label="Reference 2001" data-dcnode-id="5205" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d251043621e641" title="Ryan, R. M., &amp; Deci, E. L. (2001). On happiness and human potentials: A review of research on Hedonic and Eudemonic well-being. Annual Reviews of Psychology, 52, 141–166."><span data-dcnode-id="5206" instrument_node="">2001</span></a><span data-dcnode-id="5204" instrument_node="">, p. 153).</span></p><p data-dcnode-id="5192"><span data-dcnode-id="5202" instrument_node="">Corruption can have a negative impact on subjective well-being by weakening democratic political processes. Corruption substantially harms accountability, equality, and openness of democracies. It decreases the power of citizens to impact government decision-making through democratic participation (Dahl </span><a aria-label="Reference 1971" data-dcnode-id="5200" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d251043621e647" title="Dahl, R. (1971). Polyarchy. New Haven, CT: Yale University Press."><span data-dcnode-id="5201" instrument_node="">1971</span></a><span data-dcnode-id="5199" instrument_node="">; Warren </span><a aria-label="Reference 2004" data-dcnode-id="5197" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d251043621e650" title="Warren, M. (2004). What does corruption mean in a democracy? American Journal of Political Science, 48(2), 328–343."><span data-dcnode-id="5198" instrument_node="">2004</span></a><span data-dcnode-id="5196" instrument_node="">). When government decision-making is influenced by special interests instead of those of the people, it is likely to bring about feelings of exclusion and alienation (Warren </span><a aria-label="Reference 2004" data-dcnode-id="5194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d251043621e653" title="Warren, M. (2004). What does corruption mean in a democracy? American Journal of Political Science, 48(2), 328–343."><span data-dcnode-id="5195" instrument_node="">2004</span></a><span data-dcnode-id="5193" instrument_node="">).</span></p><p data-dcnode-id="5172"><span data-dcnode-id="5191" instrument_node="">What are the effects of changes in the extent of corruption, and how are they evaluated? Empirical research (e.g. Lambsdorff </span><a aria-label="Reference 1999" data-dcnode-id="5189" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d251043621e659" title="Lambsdorff, J. G. (1999) Corruption in empirical research. Transparency International Working Paper. 
                    http://www.transparency.org/documents/work-papers
                    
                  ."><span data-dcnode-id="5190" instrument_node="">1999</span></a><span data-dcnode-id="5188" instrument_node="">) has found that corruption affects various economic indicators, including among them government expenditures, total investment, capital flows and foreign direct investment, international trade, foreign aid and GDP per capita. Per capita GDP can be viewed as a measure including several economic effects of corruption. It likely reflects the welfare costs of corruption only in a rough and incomplete manner. The article of Welsch (</span><a aria-label="Reference 2008" data-dcnode-id="5186" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d251043621e662" title="Welsch, H. (2008). The welfare costs of corruption. Applied Economics, 40(14), 1839–1849. doi:
                    10.1080/00036840600905225
                    
                  ."><span data-dcnode-id="5187" instrument_node="">2008</span></a><span data-dcnode-id="5185" instrument_node="">) offers another approach to investigating the welfare effects of corruption. Following a growing literature in economics (Frey and Stutzer </span><a aria-label="Reference 2002" data-dcnode-id="5183" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d251043621e665" title="Frey, B. S., &amp; Stutzer, A. (2002). What can economists learn from happiness research? Journal of Economic Literature, 40, 402–435."><span data-dcnode-id="5184" instrument_node="">2002</span></a><span data-dcnode-id="5182" instrument_node="">), it uses self-rated subjective well-being (“happiness,” life satisfaction) elicited in surveys as an empirical approximation to general welfare and examines various ways in which welfare is affected by corruption. Since subjective well-being (SWB) prevailing in a country is linked to average income (Di Tella et al. </span><a aria-label="Reference 2003" data-dcnode-id="5180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d251043621e668" title="Di Tella, R., MacCulloch, R. J., &amp; Oswald, A. J. (2003). The macroeconomic of happiness. Review of Economics and Statistics, 85, 809–827."><span data-dcnode-id="5181" instrument_node="">2003</span></a><span data-dcnode-id="5179" instrument_node="">; Hagerty and Veenhoven </span><a aria-label="Reference 2003" data-dcnode-id="5177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d251043621e671" title="Hagerty, M. R., &amp; Veenhoven, R. (2003). Wealth and happiness revisited: Growing national income does go with greater happiness. Social Indicators Research, 64, 1–27."><span data-dcnode-id="5178" instrument_node="">2003</span></a><span data-dcnode-id="5176" instrument_node="">), one way in which corruption affects SWB involves the effect of corruption on per capita GDP. As noted by Lambsdorff (</span><a aria-label="Reference 2003" data-dcnode-id="5174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d251043621e675" title="Lambsdorff, J. G. (2003). How corruption affects productivity. Kyklos, 56, 457–474."><span data-dcnode-id="5175" instrument_node="">2003</span></a><span data-dcnode-id="5173" instrument_node="">), corruption includes many kinds of behavior.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5170" id="Sec6"><span data-dcnode-id="5171" instrument_node="">An Ambiguous Relationship Between Inequality or Equality of Income in a Country and its Economic Growth</span></h3><p data-dcnode-id="5162"><span data-dcnode-id="5169" instrument_node="">In recent decades there has been great interest in the effect of income inequality on economic performance. However, the research has not yet formed a general position regarding the sign of the income inequality—economic growth relationship. There is a disparity in the results, both in empirical and theoretical studies. The investigation of a connection between income inequality and economic growth began with Kuznets (</span><a aria-label="Reference 1955" data-dcnode-id="5167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251043621e686" title="Kuznets, S. (1955). Economic growth and income inequality. American Economic Review, 45, 1–28."><span data-dcnode-id="5168" instrument_node="">1955</span></a><span data-dcnode-id="5166" instrument_node="">). He proposes that per capita incomes and inequality have an inverted U-shaped relationship. Following Kuznets (</span><a aria-label="Reference 1955" data-dcnode-id="5164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251043621e689" title="Kuznets, S. (1955). Economic growth and income inequality. American Economic Review, 45, 1–28."><span data-dcnode-id="5165" instrument_node="">1955</span></a><span data-dcnode-id="5163" instrument_node="">) various approaches regarding the relationship between income inequality and economic growth were developed. Some indicate a negative relationship, while others show a positive relationship, a sign-changing nonlinear relationship without any correlation, or inconclusive evidence of a correlation.</span></p><p data-dcnode-id="5136"><span data-dcnode-id="5161" instrument_node="">Many studies find a negative relationship between income inequality and growth (Alesina and Rodrik </span><a aria-label="Reference 1994" data-dcnode-id="5159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d251043621e695" title="Alesina, A., &amp; Rodrik, D. (1994). Distributive politics and economic growth. Quarterly Journal of Economics, 109(2), 465–490. doi:
                    10.2307/2118470
                    
                  ."><span data-dcnode-id="5160" instrument_node="">1994</span></a><span data-dcnode-id="5158" instrument_node="">; Clarke </span><a aria-label="Reference 1995" data-dcnode-id="5156" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d251043621e698" title="Clarke, G. R. (1995). More evidence on income distribution and growth. Journal of Development Economics, 47(2), 403–427. doi:
                    10.1016/0304-3878(94)00069-O
                    
                  ."><span data-dcnode-id="5157" instrument_node="">1995</span></a><span data-dcnode-id="5155" instrument_node="">; Persson and Tabellini </span><a aria-label="Reference 1994" data-dcnode-id="5153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d251043621e701" title="Persson, T., &amp; Tabellini, G. (1994). Is inequality harmful for growth? American Economic Review, 84(3), 600–621."><span data-dcnode-id="5154" instrument_node="">1994</span></a><span data-dcnode-id="5152" instrument_node="">; De la Croix and Doepke </span><a aria-label="Reference 2003" data-dcnode-id="5150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d251043621e704" title="De la Croix, D., &amp; Doepke, M. (2003). Inequality and growth: Why differential fertility matters. American Economic Review, 93(4), 1091–1113. doi:
                    10.2139/ssrn.279521
                    
                  ."><span data-dcnode-id="5151" instrument_node="">2003</span></a><span data-dcnode-id="5149" instrument_node="">; Josten </span><a aria-label="Reference 2004" data-dcnode-id="5147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d251043621e707" title="Josten, S. D. (2004). Social capital, inequality, and economic growth. Journal of Institutional and Theoretical Economics (Zeitschrift Fur Die Gesamte Staatswissenschaft), 160(4), 663–680. doi:
                    10.1628/0932456042776087
                    
                  ."><span data-dcnode-id="5148" instrument_node="">2004</span></a><span data-dcnode-id="5146" instrument_node="">; Castelló-Climent </span><a aria-label="Reference 2004" data-dcnode-id="5144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d251043621e711" title="Castelló-Climent, A. (2004). A reassessment of the relationship between inequality and growth: What human capital inequality data say?. Valencia: Instituto Valenciano de Investigaciones Economicas, S.A. (Ivie)."><span data-dcnode-id="5145" instrument_node="">2004</span></a><span data-dcnode-id="5143" instrument_node="">). Knowles (</span><a aria-label="Reference 2005" data-dcnode-id="5141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d251043621e714" title="Knowles, S. (2005). Inequality and economic growth: The empirical relationship reconsidered in the light of comparable data. Journal of Development Studies, 41(1), 135–159. doi:
                    10.1080/0022038042000276590
                    
                  ."><span data-dcnode-id="5142" instrument_node="">2005</span></a><span data-dcnode-id="5140" instrument_node="">) shows a significant negative correlation between inequality and economic growth within various developing countries. Pede et al. (</span><a aria-label="Reference 2009" data-dcnode-id="5138" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d251043621e717" title="Pede, V. O., Florax, R. J. G. M., &amp; Partridge, M. D. (2009). Employment growth and income inequality: Accounting for spatial and sectoral differences. In 2009 annual meeting, 26–28 July 2009, Milwaukee, Wisconsin. Agricultural and Applied Economics Association."><span data-dcnode-id="5139" instrument_node="">2009</span></a><span data-dcnode-id="5137" instrument_node="">) examine the connection between employment growth and family income inequality.</span></p><p data-dcnode-id="5122"><span data-dcnode-id="5135" instrument_node="">Additional research suggests a positive relationship between income inequality and growth (Partridge </span><a aria-label="Reference 1997" data-dcnode-id="5133" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d251043621e723" title="Partridge, M. D. (1997). Is inequality harmful for growth? Comment. American Economic Review, 87(5), 1019–1032."><span data-dcnode-id="5134" instrument_node="">1997</span></a><span data-dcnode-id="5132" instrument_node="">; Forbes </span><a aria-label="Reference 2000" data-dcnode-id="5130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d251043621e726" title="Forbes, K. J. (2000). A reassessment of the relationship between inequality and growth. American Economic Review, 90(4), 869–887. doi:
                    10.1257/aer.90.4.869
                    
                  ."><span data-dcnode-id="5131" instrument_node="">2000</span></a><span data-dcnode-id="5129" instrument_node="">; Li and Zou </span><a aria-label="Reference 1998" data-dcnode-id="5127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d251043621e729" title="Li, H., &amp; Zou, H. F. (1998). Income inequality is not harmful for growth: Theory and evidence. Review of Development Economics, 2(3), 318–334. doi:
                    10.1111/1467-9361.00045
                    
                  ."><span data-dcnode-id="5128" instrument_node="">1998</span></a><span data-dcnode-id="5126" instrument_node="">). Nahum (</span><a aria-label="Reference 2005" data-dcnode-id="5124" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d251043621e732" title="Nahum, R. A. (2005). Income inequality and growth: A panel study of Swedish counties 1960–2000. Institute for Future Studies, 5. 
                    http://www.iffs.se/media/1112/20051201134748fil2bHPWzoboxFPAiu48eY3.pdf
                    
                  ."><span data-dcnode-id="5125" instrument_node="">2005</span></a><span data-dcnode-id="5123" instrument_node="">) also finds evidence of a positive impact of initial income inequality on annual income.</span></p><p data-dcnode-id="5117"><span data-dcnode-id="5121" instrument_node="">Davis (</span><a aria-label="Reference 2007" data-dcnode-id="5119" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d251043621e738" title="Davis, L. S. (2007). Explaining the evidence on inequality and growth: Informality and redistribution. B. E Journal of Macroeconomics. doi:
                    10.2202/1935-1690.1498
                    
                  ."><span data-dcnode-id="5120" instrument_node="">2007</span></a><span data-dcnode-id="5118" instrument_node="">) offers a way to consistently interpret and explain both a negative and a positive relationship. Using a simple model, he finds a negative relationship in the cross-country data, while the opposite is found within countries over time.</span></p><p data-dcnode-id="5091"><span data-dcnode-id="5116" instrument_node="">Other studies show sign-changing nonlinear relationships (Barro </span><a aria-label="Reference 2000" data-dcnode-id="5114" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d251043621e745" title="Barro, R. J. (2000). Inequality and growth in a panel of countries. Journal of Economic Growth, 5(1), 5–32. doi:
                    10.1023/A:1009850119329
                    
                  ."><span data-dcnode-id="5115" instrument_node="">2000</span></a><span data-dcnode-id="5113" instrument_node="">; Banerjee and Duflo </span><a aria-label="Reference 2003" data-dcnode-id="5111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d251043621e748" title="Banerjee, A. V., &amp; Duflo, E. (2003). Inequality and growth: What can the data say? Journal of Economic Growth, 8(3), 267–299. doi:
                    10.2139/ssrn.232731
                    
                  ."><span data-dcnode-id="5112" instrument_node="">2003</span></a><span data-dcnode-id="5110" instrument_node="">; Pagano </span><a aria-label="Reference 2004" data-dcnode-id="5108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d251043621e751" title="Pagano, P. (2004). An empirical investigation of the relationship between inequality and growth, Bank of Italy. Economic Research Department"><span data-dcnode-id="5109" instrument_node="">2004</span></a><span data-dcnode-id="5107" instrument_node="">; Voitchovsky </span><a aria-label="Reference 2005" data-dcnode-id="5105" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d251043621e754" title="Voitchovsky, S. (2005). Does the profile of income inequality matter for economic growth? Journal of Economic Growth, 10(3), 273–296. doi:
                    10.1007/s10887-005-3535-3
                    
                  ."><span data-dcnode-id="5106" instrument_node="">2005</span></a><span data-dcnode-id="5104" instrument_node="">). Bengoa and Sanchez-Robles (</span><a aria-label="Reference 2005" data-dcnode-id="5102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d251043621e757" title="Bengoa, M., &amp; Sanchez-Robles, B. (2005). Does equality reduce growth? Some empirical evidence. Applied Economics Letters, 12(8), 479–483. doi:
                    10.1080/13504850500120177
                    
                  ."><span data-dcnode-id="5103" instrument_node="">2005</span></a><span data-dcnode-id="5101" instrument_node="">) provide some empirical evidence of the relationship between equality and growth. Two different kinds of countries are studied using panel data. They include medium and high-income countries. In the medium-income countries, the relationship between equality that is measured by the Gini index and growth seems to have an inverted U-shape. In the high-income countries, it is clearly negative so that increased equality is detrimental for growth. Barro (</span><a aria-label="Reference 2008" data-dcnode-id="5099" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d251043621e761" title="Barro, R. J. (2008). Inequality and growth revisited. Asian Development Bank Working Papers (p. 11)."><span data-dcnode-id="5100" instrument_node="">2008</span></a><span data-dcnode-id="5098" instrument_node="">) extends the work of Barro (</span><a aria-label="Reference 2000" data-dcnode-id="5096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d251043621e764" title="Barro, R. J. (2000). Inequality and growth in a panel of countries. Journal of Economic Growth, 5(1), 5–32. doi:
                    10.1023/A:1009850119329
                    
                  ."><span data-dcnode-id="5097" instrument_node="">2000</span></a><span data-dcnode-id="5095" instrument_node="">). He finds a direct positive effect of international openness on income inequality. The effect of inequality on growth decreases as per capita GDP increases and may be positive for the richest countries. Castelló-Climent (</span><a aria-label="Reference 2010" data-dcnode-id="5093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d251043621e767" title="Castelló-Climent, A. (2010). Inequality and growth in advanced economies: an empirical investigation. Journal of Economic Inequality, 8(3), 293–321. doi:
                    10.1007/s10888-010-9133-4
                    
                  ."><span data-dcnode-id="5094" instrument_node="">2010</span></a><span data-dcnode-id="5092" instrument_node="">) examines the effect of income and human capital inequality on economic growth in different regions. In the entire sample and in the low and middle-income economies, the effect of income and human capital inequality on economic growth is negative while in the higher-income countries the effect either disappears or becomes positive.</span></p><p data-dcnode-id="5074"><span data-dcnode-id="5090" instrument_node="">Other research finds no correlation or inconclusive evidence of a correlation (Dollar and Kray </span><a aria-label="Reference 2000" data-dcnode-id="5088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d251043621e773" title="Dollar D., &amp; Kray A. (2000). Growth is good for the poor. The World Bank Development Research Group."><span data-dcnode-id="5089" instrument_node="">2000</span></a><span data-dcnode-id="5087" instrument_node="">; Deininger and Squire </span><a aria-label="Reference 1996" data-dcnode-id="5085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d251043621e776" title="Deininger, K., &amp; Squire, L. (1996). A new data set measuring income inequality. World Bank Economic Review, 10(3), 565–591."><span data-dcnode-id="5086" instrument_node="">1996</span></a><span data-dcnode-id="5084" instrument_node="">; Ghura et al. </span><a aria-label="Reference 2002" data-dcnode-id="5082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d251043621e779" title="Ghura, D., Leite, C. A., &amp; Tsangarides, C. (2002). Is growth enough? Macroeconomic policy and poverty reduction. IMF Working Paper No. 118."><span data-dcnode-id="5083" instrument_node="">2002</span></a><span data-dcnode-id="5081" instrument_node="">; Lee and Roemer </span><a aria-label="Reference 1998" data-dcnode-id="5079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d251043621e782" title="Lee, W., &amp; Roemer, J. E. (1998). Income distribution, redistributive politics, and economic growth. Journal of Economic Growth, 3(3), 217–240. doi:
                    10.1023/A:1009762720862
                    
                  ."><span data-dcnode-id="5080" instrument_node="">1998</span></a><span data-dcnode-id="5078" instrument_node="">). Panizza (</span><a aria-label="Reference 2002" data-dcnode-id="5076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d251043621e785" title="Panizza, U. (2002). Income inequality and economic growth: Evidence from American data. Journal of Economic Growth, 7(1), 25–41. doi:
                    10.1023/A:1013414509803
                    
                  ."><span data-dcnode-id="5077" instrument_node="">2002</span></a><span data-dcnode-id="5075" instrument_node="">) uses a cross-state panel for the United States to investigate the relationship between inequality and growth. He does not find a positive relationship between the two but does find some evidence of a negative relationship. He also demonstrates that small differences in the method of measuring inequality can bring about substantial differences in the estimated relationship between inequality and growth.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5072" id="Sec7"><span data-dcnode-id="5073" instrument_node="">An Ambiguous Relationship Between Inequality of Income in a Country and the Degree of Happiness or Satisfaction Among its Population</span></h3><p data-dcnode-id="5034"><span data-dcnode-id="5071" instrument_node="">The empirical research concerning the connection between income inequality and happiness or subjective well-being focuses on cross-city comparisons (Hagerty </span><a aria-label="Reference 2000" data-dcnode-id="5069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d251043621e797" title="Hagerty, M. R. (2000). Social comparisons of income in one’s community: Evidence from national surveys of income and happiness. Journal of Personality and Social Psychology, 78, 764–771."><span data-dcnode-id="5070" instrument_node="">2000</span></a><span data-dcnode-id="5068" instrument_node="">), cross-state comparisons (Alesina et al. </span><a aria-label="Reference 2004" data-dcnode-id="5066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d251043621e800" title="Alesina, A., DiTella, R., &amp; MacCulloch, R. (2004). Happiness and inequality: Are Europeans and Americans different? Journal of Public Economics, 88, 2009–2042."><span data-dcnode-id="5067" instrument_node="">2004</span></a><span data-dcnode-id="5065" instrument_node="">), or cross-national comparisons (Berg and Veenhoven </span><a aria-label="Reference 2010" data-dcnode-id="5063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d251043621e803" title="Berg, M., &amp; Veenhoven, R. (2010). Income inequality and happiness in 119 nations. In B. Greve (Ed.), Social policy and happiness in Europe (pp. 174–194). Cheltenham, England: Edgar Elgar."><span data-dcnode-id="5064" instrument_node="">2010</span></a><span data-dcnode-id="5062" instrument_node="">; Helliwell and Huang </span><a aria-label="Reference 2008" data-dcnode-id="5060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d251043621e806" title="Helliwell, J. F., &amp; Huang, H. (2008). How’s your government? International evidence linking good government and well-being. British Journal of Political Science, 38, 595–619."><span data-dcnode-id="5061" instrument_node="">2008</span></a><span data-dcnode-id="5059" instrument_node="">). The studies are inconclusive. Some research finds a negative relation between income inequality and happiness, so that a high level of inequality decreases happiness (Alesina et al. </span><a aria-label="Reference 2004" data-dcnode-id="5057" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d251043621e809" title="Alesina, A., DiTella, R., &amp; MacCulloch, R. (2004). Happiness and inequality: Are Europeans and Americans different? Journal of Public Economics, 88, 2009–2042."><span data-dcnode-id="5058" instrument_node="">2004</span></a><span data-dcnode-id="5056" instrument_node="">; Fahey and Smyth </span><a aria-label="Reference 2004" data-dcnode-id="5054" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d251043621e813" title="Fahey, T., &amp; Smyth, E. (2004). Do subjective indicators measure welfare? Evidence from 33 European societies. European Societies, 6(1), 5–27."><span data-dcnode-id="5055" instrument_node="">2004</span></a><span data-dcnode-id="5053" instrument_node="">; Oshio and Miki </span><a aria-label="Reference 2010" data-dcnode-id="5051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d251043621e816" title="Oshio, T., &amp; Miki, K. (2010). Income inequality, perceived happiness, and self-rated health: Evidence from nationwide surveys in Japan. Social Science and Medicine, 70, 1358–1366."><span data-dcnode-id="5052" instrument_node="">2010</span></a><span data-dcnode-id="5050" instrument_node="">; Schwarze and Härpfer </span><a aria-label="Reference 2007" data-dcnode-id="5048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d251043621e819" title="Schwarze, J., &amp; Härpfer, M. (2007). Are people inequality averse, and do they prefer redistribution by the State? Evidence from German longitudinal data on life satisfaction. Journal of Socio-Economics, 36(2), 233–249."><span data-dcnode-id="5049" instrument_node="">2007</span></a><span data-dcnode-id="5047" instrument_node="">; Verme </span><a aria-label="Reference 2011" data-dcnode-id="5045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d251043621e822" title="Verme, P. (2011). Life satisfaction and income inequality. Review of Income and Wealth, 57, 111–127."><span data-dcnode-id="5046" instrument_node="">2011</span></a><span data-dcnode-id="5044" instrument_node="">; Xiaogang and Jun </span><a aria-label="Reference 2013" data-dcnode-id="5042" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d251043621e825" title="Xiaogang, W., &amp; Jun, L. (2013). Economic growth, income inequality and subjective well-being: Evidence from China. Population Studies Center Research Report (pp. 13–796)."><span data-dcnode-id="5043" instrument_node="">2013</span></a><span data-dcnode-id="5041" instrument_node="">). Oishi et al. (</span><a aria-label="Reference 2011" data-dcnode-id="5039" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d251043621e828" title="Oishi, S., Kesebir, S., &amp; Diener, E. D. (2011). Income inequality and happiness. Psychological Science, 22(9), 1095–1100. doi:
                    10.1177/0956797611417262
                    
                  ."><span data-dcnode-id="5040" instrument_node="">2011</span></a><span data-dcnode-id="5038" instrument_node="">) find a negative association between income inequality and happiness among lower-income respondents. They explain this inverse relation by perceived unfairness and mistrust. Oishi et al. (</span><a aria-label="Reference 2011" data-dcnode-id="5036" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d251043621e832" title="Oishi, S., Kesebir, S., &amp; Diener, E. D. (2011). Income inequality and happiness. Psychological Science, 22(9), 1095–1100. doi:
                    10.1177/0956797611417262
                    
                  ."><span data-dcnode-id="5037" instrument_node="">2011</span></a><span data-dcnode-id="5035" instrument_node="">) use time serial data sets in the United States, showing that on average Americans are happier during the years in which the level of national income inequality is lower than during the years in which it is higher. It is explained by the association between fairness and equality.</span></p><p data-dcnode-id="5011"><span data-dcnode-id="5033" instrument_node="">However, additional empirical findings show an insignificant or even a positive relationship between income inequality and happiness (Berg and Veenhoven </span><a aria-label="Reference 2010" data-dcnode-id="5031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d251043621e838" title="Berg, M., &amp; Veenhoven, R. (2010). Income inequality and happiness in 119 nations. In B. Greve (Ed.), Social policy and happiness in Europe (pp. 174–194). Cheltenham, England: Edgar Elgar."><span data-dcnode-id="5032" instrument_node="">2010</span></a><span data-dcnode-id="5030" instrument_node="">; Senik </span><a aria-label="Reference 2004" data-dcnode-id="5028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d251043621e841" title="Senik, C. (2004). When information dominates comparison: Learning from Russian subjective panel data. Journal of Public Economics, 88, 2099–2123."><span data-dcnode-id="5029" instrument_node="">2004</span></a><span data-dcnode-id="5027" instrument_node="">; Graham and Felton </span><a aria-label="Reference 2006" data-dcnode-id="5025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d251043621e844" title="Graham, C., &amp; Felton, A. (2006). Inequality and happiness: insights from Latin America. The Journal of Economic Inequality, 4, 107–122."><span data-dcnode-id="5026" instrument_node="">2006</span></a><span data-dcnode-id="5024" instrument_node="">; Ohtake and Tomioka </span><a aria-label="Reference 2004" data-dcnode-id="5022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d251043621e847" title="Ohtake, F., &amp; Tomioka, J. (2004). Happiness and income inequality in Japan. A paper presented at International Forum for Macroeconomic Issues. ESRI Collaboration Project."><span data-dcnode-id="5023" instrument_node="">2004</span></a><span data-dcnode-id="5021" instrument_node="">; Clark </span><a aria-label="Reference 2003" data-dcnode-id="5019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d251043621e850" title="Clark, A. E. (2003). Inequality aversion and income mobility: A direct test. Delta Working Papers (p. 11)."><span data-dcnode-id="5020" instrument_node="">2003</span></a><span data-dcnode-id="5018" instrument_node="">). Knight and Ramani (</span><a aria-label="Reference 2010" data-dcnode-id="5016" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d251043621e854" title="Knight, J., &amp; Ramani, G. (2010). The rural-urban divide in China: Income but not happiness? Journal of Development Studies, 46, 506–534."><span data-dcnode-id="5017" instrument_node="">2010</span></a><span data-dcnode-id="5015" instrument_node="">) demonstrate that rural residents in China tend to be happier in counties with higher Gini coefficients than in counties with lower Gini coefficients. Jiang et al. (</span><a aria-label="Reference 2012" data-dcnode-id="5013" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d251043621e857" title="Jiang, S., Lu, M., &amp; Sato, H. (2012). Identity, inequality, and happiness: Evidence from urban China. World Development, 40(6), 1190–1200."><span data-dcnode-id="5014" instrument_node="">2012</span></a><span data-dcnode-id="5012" instrument_node="">) find that in urban China inequality, which is measured by city-level Gini coefficients, positively correlates with happiness.</span></p><p data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">The Economist, a popular non-academic publication, published an article entitled, “I dream of Gini” on October 12, 2011. The article states that “…the happiness gap (between the least and the most satisfied) seems to have a weak relationship with income inequality, as measured by Gini coefficient. That is odd. Since many people automatically assume that inequality leads to misery.”</span></p><p data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">The economic psychology literature includes two main contradictory theories regarding the relationship between inequality and life satisfaction.</span></p><p data-dcnode-id="4990"><span data-dcnode-id="5006" instrument_node="">According to their tunnel theory, Hirschman and Rothschild (</span><a aria-label="Reference 1973" data-dcnode-id="5004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d251043621e870" title="Hirschman, A. O., &amp; Rothschild, M. (1973). The changing tolerance for income inequality in the course of economic development: with a mathematical appendix. The Quarterly Journal of Economics, 87, 544–566."><span data-dcnode-id="5005" instrument_node="">1973</span></a><span data-dcnode-id="5003" instrument_node="">) argue that in developing countries inequality increases life satisfaction. Some empirical studies support this theory in developed countries as well (Clark et al. </span><a aria-label="Reference 2009" data-dcnode-id="5001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d251043621e873" title="Clark, A. E., Kristensen, N., &amp; Westergård-Nielsen, N. (2009). Job satisfaction and co-worker wages: Status or signal? The Economic Journal, 119, 430–447."><span data-dcnode-id="5002" instrument_node="">2009</span></a><span data-dcnode-id="5000" instrument_node="">). However, new empirical findings concerning developed countries (FitzRoy et al. </span><a aria-label="Reference 2014" data-dcnode-id="4998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d251043621e876" title="FitzRoy, F., et al. (2014). Testing the tunnel effect: Comparison, age and happiness in UK and German panels. IZA Journal of European Labor Studies, 3, 24."><span data-dcnode-id="4999" instrument_node="">2014</span></a><span data-dcnode-id="4997" instrument_node="">) show a slightly different trend among young people as compared to adults. (Inequality increases life satisfaction among young people and decreases it among adults.) In contrast to the tunnel theory, theories of relative deprivation argue that inequality decreases life satisfaction (Stouffer et al. </span><a aria-label="Reference 1949" data-dcnode-id="4995" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d251043621e879" title="Stouffer, S. A., et al. (1949). The American soldier: Adjustment during army life. Princeton, NJ: Princeton University Press."><span data-dcnode-id="4996" instrument_node="">1949</span></a><span data-dcnode-id="4994" instrument_node="">; Runciman </span><a aria-label="Reference 1966" data-dcnode-id="4992" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d251043621e882" title="Runciman, W. G. (1966). Relative deprivation and social justice: A study of attitudes to social inequality in twentieth century. England. Berkeley, CA: University of California Press."><span data-dcnode-id="4993" instrument_node="">1966</span></a><span data-dcnode-id="4991" instrument_node="">).</span></p><p data-dcnode-id="4979"><span data-dcnode-id="4989" instrument_node="">Apart from the lack of clarity regarding the relationship between inequality and life satisfaction, the type of inequality and its impact on life satisfaction are also unclear. Studies of relative deprivation theory claim that relative deprivation increases with the Gini coefficient of inequality (Yitzhaki </span><a aria-label="Reference 1979" data-dcnode-id="4987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d251043621e888" title="Yitzhaki, S. (1979). Relative deprivation and the Gini coefficient. The Quarterly Journal of Economics, 93, 321–324."><span data-dcnode-id="4988" instrument_node="">1979</span></a><span data-dcnode-id="4986" instrument_node="">; Solnick and Hemenway </span><a aria-label="Reference 1998" data-dcnode-id="4984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d251043621e891" title="Solnick, S. J., &amp; Hemenway, D. (1998). Is more always better? A survey on positional concerns. Journal of Economic Behavior &amp; Organization, 37, 373–383."><span data-dcnode-id="4985" instrument_node="">1998</span></a><span data-dcnode-id="4983" instrument_node="">), although given the relative deprivation theory it is reasonable to assume that life satisfaction will increase with increasing inequality among individuals who are not poor (Dittmann and Goebel </span><a aria-label="Reference 2010" data-dcnode-id="4981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d251043621e894" title="Dittmann, J., &amp; Goebel, J. (2010). Your house, your car, your education: The socioeconomic situation of the neighbourhoods and its impact on life satisfaction in Germany. Social Indicators Research, 96, 497–513."><span data-dcnode-id="4982" instrument_node="">2010</span></a><span data-dcnode-id="4980" instrument_node="">).</span></p><p data-dcnode-id="4959"><span data-dcnode-id="4978" instrument_node="">Nevertheless, experimental evidence shows that inequality is experienced both by the wealthy and the poor (Fehr and Schmidt </span><a aria-label="Reference 1999" data-dcnode-id="4976" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d251043621e900" title="Fehr, E., &amp; Schmidt, K. M. (1999). A theory of fairness, competition, and cooperation. The Quarterly Journal of Economic, 114, 817–868."><span data-dcnode-id="4977" instrument_node="">1999</span></a><span data-dcnode-id="4975" instrument_node="">: Graham and Felton </span><a aria-label="Reference 2006" data-dcnode-id="4973" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d251043621e903" title="Graham, C., &amp; Felton, A. (2006). Inequality and happiness: insights from Latin America. The Journal of Economic Inequality, 4, 107–122."><span data-dcnode-id="4974" instrument_node="">2006</span></a><span data-dcnode-id="4972" instrument_node="">; Ferrer-i-Carbonell and Ramos </span><a aria-label="Reference 2014" data-dcnode-id="4970" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d251043621e906" title="Ferrer-i-Carbonell, A., &amp; Ramos, X. (2014). Inequality and happiness. Journal of Economic Surveys, 28, 1016–1027."><
