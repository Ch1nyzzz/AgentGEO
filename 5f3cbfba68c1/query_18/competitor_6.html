</span></div></div></section><section data-dcnode-id="3792" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="3793" id="Sec21-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3912" id="Sec21"><span data-dcnode-id="3913" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="3794" id="Sec21-content"><p data-dcnode-id="3898"><span data-dcnode-id="3911" instrument_node="">Most classical economists recognize that individual happiness is influenced by a higher standard of living that is based on income and other factors of human well-being, including among them medical conditions, health services, education, etc. However, many macroeconomists question whether the same conclusions can be reached regarding the happiness of nations. As the average GDP</span><sub data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">ppp</span></sub><span data-dcnode-id="3908" instrument_node=""> per capita rises in real terms within a population, does the degree of happiness also increase? Moreover, even if individuals are happier in developed countries with higher GDP</span><sub data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">ppp</span></sub><span data-dcnode-id="3905" instrument_node=""> per capita, how much happier are they than individuals in developing countries? Researchers have also investigated which other factors may positively impact happiness when it is clear, after all, that the primary contribution to happiness is the average GDP</span><sub data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">ppp</span></sub><span data-dcnode-id="3902" instrument_node=""> per capita. While the research uses GDP</span><sub data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">ppp</span></sub><span data-dcnode-id="3899" instrument_node=""> national averages, it should also use another factor indicating its distribution in relation to the average. Does this distribution indicate a small or a large deviation from the average? Simply stated, how does the Gini coefficient affect the happiness of the entire population within each country?</span></p><p data-dcnode-id="3893"><span data-dcnode-id="3897" instrument_node="">This is the focus of the current paper that accepts the fundamental classical statement that GDP</span><sub data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">ppp</span></sub><span data-dcnode-id="3894" instrument_node=""> per capita is the most important and relevant factor positively affecting happiness. Nevertheless, the additional factor of inequality that is measured by the Gini coefficient should also be considered. The basic a priori hypothesis is that inequality at too high a level may reduce happiness since the majority of people are envious of others when comparing their relative incomes to those of the few very wealthy individuals in a population. However, the same argument may be applied to the other extreme case in which a deviation of incomes is too small when the Gini coefficient is low. This can also indicate insufficient matching between reward and contribution within the population. Thus the degree of happiness may again be low.</span></p><p data-dcnode-id="3888"><span data-dcnode-id="3892" instrument_node="">Clearly, inequality as an explanatory factor of happiness may generally lead to ambiguous results. This is probably a reason that the Gini coefficient has not been considered in earlier studies. The present research considers it as long as the Gini values are not divided into different ranges. Upon distinguishing between intermediate and high ranges of Gini, more significant effects of inequality on happiness are identified for the countries. Furthermore, in different ranges the effects change signs and sizes, thereby leading to the basic conclusions presented by Epstein and Spiegel (</span><a aria-label="Reference 2001" data-dcnode-id="3890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d251043621e5129" title="Epstein, G., &amp; Spiegel, U. (2001). Natural inequality, production and economic growth. Labour Economics, 8, 463–473."><span data-dcnode-id="3891" instrument_node="">2001</span></a><span data-dcnode-id="3889" instrument_node="">) in the micro context of a negative relationship between inequality and productivity in a firm. These negative relationships are applied in this paper to the macro context of the inequality of a nation’s income and the degree of happiness. The primary important conclusions are presented below:</span></p><ol class="u-list-style-none" data-dcnode-id="3808"><span data-dcnode-id="3887" instrument_node="">
</span><li data-dcnode-id="3876"><span data-dcnode-id="3886" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">a.</span></span><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3878"><span data-dcnode-id="3882" instrument_node="">The measure of GDP</span><sub data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">ppp</span></sub><span data-dcnode-id="3879" instrument_node=""> per capita is the most important factor positively and significantly affecting the degree of happiness within any population.</span></p><span data-dcnode-id="3877" instrument_node="">
</span></li><span data-dcnode-id="3875" instrument_node="">
</span><li data-dcnode-id="3861"><span data-dcnode-id="3874" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">b.</span></span><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3863"><span data-dcnode-id="3870" instrument_node="">The positive effect of the factor of GDP</span><sub data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">ppp</span></sub><span data-dcnode-id="3867" instrument_node=""> per capita is stronger in developing countries, in which the levels of GDP</span><sub data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">ppp</span></sub><span data-dcnode-id="3864" instrument_node=""> per capita are lower than the intermediate or high values found in developed countries. These results are found by using regressions for groups of countries in the sample rather than for individual countries.</span></p><span data-dcnode-id="3862" instrument_node="">
</span></li><span data-dcnode-id="3860" instrument_node="">
</span><li data-dcnode-id="3849"><span data-dcnode-id="3859" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">c.</span></span><span data-dcnode-id="3856" instrument_node="">
</span><p data-dcnode-id="3851"><span data-dcnode-id="3855" instrument_node="">Without the separation between Gini coefficient groups, the Gini coefficient does not show any significant effect on happiness and the greatest influence is derived from GDP</span><sub data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">ppp</span></sub><span data-dcnode-id="3852" instrument_node=""> per capita.</span></p><span data-dcnode-id="3850" instrument_node="">
</span></li><span data-dcnode-id="3848" instrument_node="">
</span><li data-dcnode-id="3837"><span data-dcnode-id="3847" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">d.</span></span><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3839"><span data-dcnode-id="3843" instrument_node="">When a distinction is made between two different Gini coefficient groups, the very important conclusion is that a higher degree of inequality negatively affects the degree of happiness regardless of the GDP</span><sub data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">ppp</span></sub><span data-dcnode-id="3840" instrument_node=""> per capita of the countries.</span></p><span data-dcnode-id="3838" instrument_node="">
</span></li><span data-dcnode-id="3836" instrument_node="">
</span><li data-dcnode-id="3822"><span data-dcnode-id="3835" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">e.</span></span><span data-dcnode-id="3832" instrument_node="">
</span><p data-dcnode-id="3824"><span data-dcnode-id="3831" instrument_node="">When the Gini coefficient is high, its effect on happiness is definitely negative regardless of the GDP</span><sub data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">ppp</span></sub><span data-dcnode-id="3828" instrument_node=""> per capita values. However, the negative effect of low Gini coefficient values on happiness holds only in developed countries with high values of GDP</span><sub data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">ppp</span></sub><span data-dcnode-id="3825" instrument_node=""> per capita.</span></p><span data-dcnode-id="3823" instrument_node="">
</span></li><span data-dcnode-id="3821" instrument_node="">
</span><li data-dcnode-id="3810"><span data-dcnode-id="3820" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="3818"><span data-dcnode-id="3819" instrument_node="">f.</span></span><span data-dcnode-id="3817" instrument_node="">
</span><p data-dcnode-id="3812"><span data-dcnode-id="3816" instrument_node="">In general, taking only the factor of GDP</span><sub data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">ppp</span></sub><span data-dcnode-id="3813" instrument_node=""> per capita as the explanatory variable for happiness allows for less robust results than when additional factors are used, including the issue of inequality as described in the present study.</span></p><span data-dcnode-id="3811" instrument_node="">
</span></li><span data-dcnode-id="3809" instrument_node="">
</span></ol><p data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">
An appropriate extension to the present study is identifying additional explanatory variables for the very important question of what enables more satisfaction and happiness among citizens worldwide, especially when dealing with large populations rather than private individuals.</span></p><p data-dcnode-id="3795"><span data-dcnode-id="3805" instrument_node="">By adding another two explanatory variables of democracy and the Corruption Perceptions Index to the original variables of GDP</span><sub data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">ppp</span></sub><span data-dcnode-id="3802" instrument_node=""> and Gini, the effect on happiness become more significant. Only when the Gini ranges are divided into two levels of 0.25&nbsp;&lt;&nbsp;Gini&nbsp;&lt;&nbsp;0.48 and Gini&nbsp;&gt;&nbsp;0.48 does the additional variable contribute to happiness. For high GDP</span><sub data-dcnode-id="3800"><span data-dcnode-id="3801" instrument_node="">ppp</span></sub><span data-dcnode-id="3799" instrument_node=""> and intermediate Gini index democracy affects happiness significantly, while no connection to CPI is revealed. However, when Gini is larger than 0.48 and GDP</span><sub data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">ppp</span></sub><span data-dcnode-id="3796" instrument_node=""> is low as in several underdeveloped countries, one finds that Gini which is too high and CPI both have a significant negative effect on happiness, while democracy has no effect.</span></p></div></div></section><span data-dcnode-id="3791" instrument_node="">
