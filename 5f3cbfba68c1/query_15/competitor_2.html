</span><div class="entry post-40941 post type-post status-publish format-standard hentry category-columnists category-columns category-commentary category-general-commentary category-public-administration-columns category-public-leadership" data-dcnode-id="273" id="post-40941"><span data-dcnode-id="420" instrument_node="">
</span><h1 class="entry_title" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">
							Socialism vs. the Welfare State						</span></h1><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">The views expressed are those of the author and do not necessarily reflect the views of ASPA as an organization.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="408"><strong data-dcnode-id="409"><span data-dcnode-id="412" instrument_node="">By John Pearson</span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node="">
July 16, 2018</span></strong></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">The difference between socialism and the welfare state is really like the proverbial difference between lighting and the lighting bug. There are </span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">enormous </span></em><span data-dcnode-id="403" instrument_node="">differences between these two ways of organizing the economy and public administration.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">By socialism, I am referring to the traditional socialism exemplified by the former Soviet Union, in which the government owned and operated most organizations within the economy. There was a high degree of centralized planning. There was only a very small private sector.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">In today’s world, traditional socialism is practiced only in a very few countries. The overall trend for decades has been for governments of all types to privatize socialist enterprises and rely more on market forces.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">The Central Intelligence Agency’s World Factbook analyzes the economy of every country on the planet. Only a few continue with heavy government ownership of enterprises and central direction of the economy. North Korea is described as, “One of the world’s most centrally directed and least open economies.” Algeria’s economy “remains dominated by the state, a legacy of the country’s socialist post-independence development model.” The Cuban government “continues to balance the need for loosening its socialist economic system against a desire for firm political control.” In Venezuela, the MADURO government “has given authority for the production and distribution of basic goods to the military and to local socialist party member committees.”</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">More typical is Laos, which has followed the liberalization model: “The government of Laos, one of the few remaining one-party communist states, began decentralizing control and encouraging private enterprise in 1986.”</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="388" instrument_node="">People can assign any meaning to words they want to. They can call the “welfare state” </span><img alt="" class="alignright size-full wp-image-40942" data-dcnode-id="387" height="97" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//patimes.org/wp-content/uploads/2018/07/socialist.jpg&amp;raw" width="127"><span data-dcnode-id="386" instrument_node="">socialism. But there is a drastic difference in practice between socialism in the historic sense and the modern welfare state as practiced in the U.S. and other well-off countries.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">The U.S. has a few socialist institutions that have been around for decades or even centuries – e.g., the Post Office, Amtrak, VA hospitals, and the Tennessee Valley Authority (TVA). These organizations fill niches in areas where Congress felt direct government production of services was necessary. TVA is an example of a socialist type organization that fully duplicates the services of private utility companies. It’s really an aberration in the U.S. economy. At the local level, public schools and bus transit systems are examples of socialist-type organizations that have been long been part of the U.S. system. There has been no recent increase in such organizations.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Despite the growth of progressive income taxes, dozens of welfare state income redistribution programs and over 185,000 pages of regulations (as of the end of 2017), the U.S. continues to be overwhelmingly a capitalist, market-based economy. The U.S. is nearly as far from socialism as you can get.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Look at the list of Fortune 500 companies. They are all privately owned. (Fannie Mae and Freddie Mac are “government sponsored.” During the recent recession, the government did invest temporarily in a very few companies such as General Motors and American International Group (AIG), but the government has since divested its interest in such companies.) The CIA puts it this way: “In the US, private individuals and business firms make most of the decisions, and the federal and state governments buy needed goods and services predominantly in the private marketplace.”</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">France, by comparison, is also a strongly capitalist country, but there is a stronger welfare state than in the U.S. and greater government involvement in some sectors. Here’s how CIA describes France:</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">“The government has partially or fully privatized many large companies, including Air France, France Telecom, Renault, and Thales. However, the government maintains a strong presence in some sectors, particularly power, public transport, and defense industries. France’s leaders remain committed to a capitalism in which they maintain social equity by means of laws, tax policies, and social spending that mitigate economic inequality.”</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">CIA describes Denmark as a “thoroughly modern market economy.” “Danes enjoy a high standard of living, and the Danish economy is characterized by extensive government welfare measures and an equitable distribution of income.”</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">In the 2008 election, President Obama’s opponents hurled the socialist charge against him with no basis in fact.</span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">After eight years in office, the U.S. was no more or less socialist than when he took over. Obama believed in income redistribution through welfare state programs and the tax system. Obamacare was a major social welfare program enacted during his presidency. It added to dozens of welfare-type programs that were </span><em data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">already</span></em><span data-dcnode-id="359" instrument_node=""> on the books when he took office.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Why U.S. politicians like Bernie Sanders and Alexandria Ocasio-Cortez refer to themselves as socialists is puzzling because clearly, they are not referring to socialism in the traditional sense. They are social democrats who want an expansion of the welfare state and greater government regulation of business.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">It’s not accurate to claim the U.S. is drifting toward socialism if we mean the traditional understanding of socialism. There has been a long-term trend toward more regulations, income taxes that are more progressive, and more welfare state programs although the current administration has been pushing against these trends to the best of its ability.</span></p><span data-dcnode-id="351" instrument_node="">
</span><hr data-dcnode-id="350"><span data-dcnode-id="349" instrument_node="">
