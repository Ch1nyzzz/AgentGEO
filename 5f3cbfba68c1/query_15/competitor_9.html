</span><table class="data-table comparison" data-dcnode-id="3405"><colgroup data-dcnode-id="3432"><col data-dcnode-id="3435" style="width:10%"><col data-dcnode-id="3434" style="width:45%"><col data-dcnode-id="3433" style="width:45%"></colgroup><thead data-dcnode-id="3424"><tr data-dcnode-id="3425"><th data-dcnode-id="3430"></th><th data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">Finland</span></th><th data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">Sweden</span></th></tr></thead><tbody data-dcnode-id="3407"><tr data-dcnode-id="3409" style="vertical-align:top"><td data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Background</span></td><td data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Finland was a province and then a grand duchy under Sweden from the 12th to the 19th centuries, and an autonomous grand duchy of Russia after 1809. It gained complete independence in 1917. During World War II, Finland successfully defended its independence through cooperation with Germany and resisted subsequent invasions by the Soviet Union - albeit with some loss of territory. In the subsequent half century, Finland transformed from a farm/forest economy to a diversified modern industrial economy; per capita income is among the highest in Western Europe. A member of the EU since 1995, Finland was the only Nordic state to join the euro single currency at its initiation in January 1999. In the 21st century, the key features of Finland's modern welfare state are high quality education, promotion of equality, and a national social welfare system - currently challenged by an aging population and the fluctuations of an export-driven economy.</span></td><td data-dcnode-id="3410"><p data-dcnode-id="3417"></p><p data-dcnode-id="3415"><span data-dcnode-id="3416" instrument_node="">A military power during the 17th century, Sweden has not participated in any war for two centuries. An armed neutrality was preserved in both World Wars. Since then, Sweden has pursued a successful economic formula consisting of a capitalist system intermixed with substantial welfare elements. Sweden joined the EU in 1995, but the public rejected the introduction of the euro in a 2003 referendum. The share of Sweden's population born abroad increased from 11.3% in 2000 to 19.1% in 2018.</span></p><span data-dcnode-id="3414" instrument_node=""> </span><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">&nbsp;</span></p><p data-dcnode-id="3411"></p></td></tr></tbody></table><span data-dcnode-id="3404" instrument_node="">

st Finland]</span></td><td data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">21 counties (lan, singular and plural); Blekinge, Dalarna, Gavleborg, Gotland, Halland, Jamtland, Jonkoping, Kalmar, Kronoberg, Norrbotten, Orebro, Ostergotland, Skane, Sodermanland, Stockholm, Uppsala, Varmland, Vasterbotten, Vasternorrland, Vastmanland, Vastra Gotaland</span></td></tr><tr data-dcnode-id="2251" style="vertical-align:top"><td data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Independence</span></td><td data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">6 December 1917 (from Russia)</span></td><td data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">6 June 1523 (Gustav VASA elected king of Sweden, marking the abolishment of the Kalmar Union between Denmark, Norway, and Sweden)</span></td></tr><tr data-dcnode-id="2243" style="vertical-align:top"><td data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">National holiday</span></td><td data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Independence Day, 6 December (1917)</span></td><td data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">National Day, 6 June (1983); note - from 1916 to 1982 this date was celebrated as Swedish Flag Day</span></td></tr><tr data-dcnode-id="2221" style="vertical-align:top"><td data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Constitution</span></td><td data-dcnode-id="2231"><strong data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">history: </span></strong><span data-dcnode-id="2237" instrument_node="">previous 1906, 1919; latest drafted 17 June 1997, approved by Parliament 11 June 1999, entered into force 1 March 2000</span><br data-dcnode-id="2236"><br data-dcnode-id="2235"><strong data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">amendments: </span></strong><span data-dcnode-id="2232" instrument_node="">proposed by Parliament; passage normally requires simple majority vote in two readings in the first parliamentary session and at least two-thirds majority vote in a single reading by the newly elected Parliament; proposals declared "urgent" by five-sixths of Parliament members can be passed by at least two-thirds majority vote in the first parliamentary session only; amended several times, last in 2018</span></td><td data-dcnode-id="2222"><strong data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">history: </span></strong><span data-dcnode-id="2228" instrument_node="">Sweden has four fundamental laws which together make up the Constitution: The Instrument of Government (several previous; latest 1974); The Act of Succession (enacted 1810; changed in 1937 and 1980); The Freedom of the Press Act (many previous; latest in 1949); The Fundamental Law on Freedom of Expression (adopted 1991)</span><br data-dcnode-id="2227"><br data-dcnode-id="2226"><strong data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">amendments: </span></strong><span data-dcnode-id="2223" instrument_node="">proposed by Parliament; passage requires simple majority vote in two consecutive parliamentary terms with an intervening general election; passage also requires approval by simple majority vote in a referendum if Parliament approves a motion for a referendum by one third of its members; The Instrument of Government - amended several times, last in 2018; The Act of Succession - changed in 1937, 1980; The Freedom of the Press Act - amended several times, last in 2019; The Fundamental Law on Freedom of Expression - amended several times, last in 2018</span></td></tr><tr data-dcnode-id="2213" style="vertical-align:top"><td data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">Legal system</span></td><td data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">civil law system based on the Swedish model</span></td><td data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">civil law system influenced by Roman-Germanic law and customary law</span></td></tr><tr data-dcnode-id="2205" style="vertical-align:top"><td data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Suffrage</span></td><td data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">18 years of age; universal</span></td><td data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">18 years of age; universal</span></td></tr><tr data-dcnode-id="2158" style="vertical-align:top"><td data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Executive branch</span></td><td data-dcnode-id="2178"><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">chief of state: </span></strong><span data-dcnode-id="2199" instrument_node="">President Sauli NIINISTO (since 1 March 2012)</span><br data-dcnode-id="2198"><br data-dcnode-id="2197"><strong data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">head of government: </span></strong><span data-dcnode-id="2194" instrument_node="">Prime Minister Sanna MARIN (since 10 December 2019)</span><br data-dcnode-id="2193"><br data-dcnode-id="2192"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">cabinet: </span></strong><span data-dcnode-id="2189" instrument_node="">Council of State or Valtioneuvosto appointed by the president, responsible to Parliament&nbsp;</span><br data-dcnode-id="2188"><br data-dcnode-id="2187"><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">elections/appointments: </span></strong><span data-dcnode-id="2184" instrument_node="">president directly elected by absolute majority popular vote in 2 rounds if needed for a 6-year term (eligible for a second term); election last held on 28 January 2018 (next to be held in January 2024); prime minister appointed by Parliament</span><br data-dcnode-id="2183"><br data-dcnode-id="2182"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">election results: </span></strong><span data-dcnode-id="2179" instrument_node="">Sauli NIINISTO reelected president; percent of vote Sauli NIINISTO (independent) 62.7%, Pekka HAAVISTO (Vihr) 12.4%, Laura HUHTASAARI (PS) 6.9%, Paavo VAYRYNEN (independent) 6.2%, Matti VANHANEN (Kesk) 4.1%, other 7.7%</span></td><td data-dcnode-id="2159"><strong data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">chief of state: </span></strong><span data-dcnode-id="2175" instrument_node="">King CARL XVI GUSTAF (since 15 September 1973); Heir Apparent Princess VICTORIA Ingrid Alice Desiree (daughter of the monarch, born 14 July 1977)</span><br data-dcnode-id="2174"><br data-dcnode-id="2173"><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">head of government: </span></strong><span data-dcnode-id="2170" instrument_node="">Prime Minister Stefan LOFVEN (since 3 October 2014); Deputy Prime Minister Isabella LOVIN (since 25 May 2016); note - Prime Minister Stefan LOFVEN was ousted in a no-confidence vote on 25 September 2018 and headed a caretaker government until the next government was formed; LOFVEN was reelected as Prime Minister and took office on 21 January 2019&nbsp;</span><br data-dcnode-id="2169"><br data-dcnode-id="2168"><strong data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">cabinet: </span></strong><span data-dcnode-id="2165" instrument_node="">Cabinet appointed by the prime minister</span><br data-dcnode-id="2164"><br data-dcnode-id="2163"><strong data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">elections/appointments: </span></strong><span data-dcnode-id="2160" instrument_node="">the monarchy is hereditary; following legislative elections, the leader of the majority party or majority coalition usually becomes the prime minister</span></td></tr><tr data-dcnode-id="2126" style="vertical-align:top"><td data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Legislative branch</span></td><td data-dcnode-id="2141"><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">description: </span></strong><span data-dcnode-id="2152" instrument_node="">unicameral Parliament or Eduskunta (200 seats; 199 members directly elected in single- and multi-seat constituencies by proportional representation vote and 1 member in the province of Aland directly elected by simple majority vote; members serve 4-year terms) (e.g. 2019)</span><br data-dcnode-id="2151"><br data-dcnode-id="2150"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">elections: </span></strong><span data-dcnode-id="2147" instrument_node="">last held on 14 April 2019 (next to be held on April 2023) (e.g. 2019)</span><br data-dcnode-id="2146"><br data-dcnode-id="2145"><strong data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">election results: </span></strong><span data-dcnode-id="2142" instrument_node="">percent of vote by party/coalition - SDP 17.7%, Finn Party 17.5%, Kok 17.0%. Centre Party&nbsp; 13.8%, Green League 11.5%, Left Alliance 8.2%; seats by party/coalition -SDP 40, Finn Party 39, Kok 38, Centre Party 31, Green League 20, Left Alliance 16; composition men 107, women 93, percent of women 46.5% (e.g. 2019)</span></td><td data-dcnode-id="2127"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">description: </span></strong><span data-dcnode-id="2138" instrument_node="">unicameral Parliament or Riksdag (349 seats; 310 members directly elected in multi-seat constituencies by closed, party-list proportional representation vote and 39 members in "at-large" seats directly elected by proportional representation vote; members serve 4-year terms)</span><br data-dcnode-id="2137"><br data-dcnode-id="2136"><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">elections: </span></strong><span data-dcnode-id="2133" instrument_node="">last held on 9 September 2018 (next to be held in 2022)</span><br data-dcnode-id="2132"><br data-dcnode-id="2131"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">election results: </span></strong><span data-dcnode-id="2128" instrument_node="">percent of vote by party - SAP 28.3%, M 19.8%, SD 17.5%, C 8.6%, V 8%, KD 6.3%, L 5.5%, MP 4.4%, other 1.6%; seats by party - SAP 100, M 70, SD 62, C 31, V 28, KD 22, L 20, MP 16; composition - men 188, women 161, percent of women 46.1%</span></td></tr><tr data-dcnode-id="2094" style="vertical-align:top"><td data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Judicial branch</span></td><td data-dcnode-id="2109"><strong data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">highest courts: </span></strong><span data-dcnode-id="2120" instrument_node="">Supreme Court or Korkein Oikeus (consists of the court president and 18 judges); Supreme Administrative Court (consists of 21 judges, including the court president and organized into 3 chambers); note - Finland has a dual judicial system - courts with civil and criminal jurisdiction and administrative courts with jurisdiction for litigation between individuals and administrative organs of the state and communities</span><br data-dcnode-id="2119"><br data-dcnode-id="2118"><strong data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">judge selection and term of office: </span></strong><span data-dcnode-id="2115" instrument_node="">Supreme Court and Supreme Administrative Court judges appointed by the president of the republic; judges serve until mandatory retirement at age 68</span><br data-dcnode-id="2114"><br data-dcnode-id="2113"><strong data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">subordinate courts: </span></strong><span data-dcnode-id="2110" instrument_node="">6 Courts of Appeal; 8 regional administrative courts; 27 district courts; special courts for issues relating to markets, labor, insurance, impeachment, land, tenancy, and water rights</span></td><td data-dcnode-id="2095"><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">highest courts: </span></strong><span data-dcnode-id="2106" instrument_node="">Supreme Court of Sweden (consists of 16 justices, including the court chairman); Supreme Administrative Court (consists of 18 justices, including the court president)</span><br data-dcnode-id="2105"><br data-dcnode-id="2104"><strong data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">judge selection and term of office: </span></strong><span data-dcnode-id="2101" instrument_node="">Supreme Court and Supreme Administrative Court justices nominated by the Judges Proposal Board, a 9-member nominating body consisting of high-level judges, prosecutors, and members of Parliament; justices appointed by the Government; following a probationary period, justices' appointments are permanent</span><br data-dcnode-id="2100"><br data-dcnode-id="2099"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">subordinate courts: </span></strong><span data-dcnode-id="2096" instrument_node="">first instance, appellate, general, and administrative courts; specialized courts that handle cases such as land and environment, immigration, labor, markets, and patents</span></td></tr><tr data-dcnode-id="2056" style="vertical-align:top"><td data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Political parties and leaders</span></td><td data-dcnode-id="2073"><span data-dcnode-id="2090" instrument_node="">Aland Coalition (a coalition of several political parties on the Aland Islands)</span><br data-dcnode-id="2089"><span data-dcnode-id="2088" instrument_node="">Center Party or Kesk [Annika SAARIKKO]</span><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">Christian Democrats or KD [Sari ESSAYAH]</span><br data-dcnode-id="2085"><span data-dcnode-id="2084" instrument_node="">Finns Party or </span><table class="data-table comparison" data-dcnode-id="1059"><colgroup data-dcnode-id="1790"><col data-dcnode-id="1793" style="width:10%"><col data-dcnode-id="1792" style="width:45%"><col data-dcnode-id="1791" style="width:45%"></colgroup><thead data-dcnode-id="1782"><tr data-dcnode-id="1783"><th data-dcnode-id="1788"></th><th data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Finland</span></th><th data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Sweden</span></th></tr></thead><tbody data-dcnode-id="1061"><tr data-dcnode-id="1740" style="vertical-align:top"><td data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Economy - overview</span></td><td data-dcnode-id="1764"><p data-dcnode-id="1777"></p><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Finland has a highly industrialized, largely free-market economy with per capita GDP almost as high as that of Austria and the Netherlands and slightly above that of Germany and Belgium. Trade is important, with exports accounting for over one-third of GDP in recent years. The government is open to, and actively takes steps to attract, foreign direct investment.</span></p><p data-dcnode-id="1774"></p><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Finland is historically competitive in manufacturing, particularly in the wood, metals, engineering, telecommunications, and electronics industries. Finland excels in export of technology as well as promotion of startups in the information and communications technology, gaming, cleantech, and biotechnology sectors. Except for timber and several minerals, Finland depends on imports of raw materials, energy, and some components for manufactured goods. Because of the cold climate, agricultural development is limited to maintaining self-sufficiency in basic products. Forestry, an important export industry, provides a secondary occupation for the rural population.</span></p><p data-dcnode-id="1771"></p><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Finland had been one of the best performing economies within the EU before 2009 and its banks and financial markets avoided the worst of global financial crisis. However, the world slowdown hit exports and domestic demand hard in that year, causing Finland's economy to contract from 2012 to 2014. The recession affected general government finances and the debt ratio. The economy returned to growth in 2016, posting a 1.9% GDP increase before growing an estimated 3.3% in 2017, supported by a strong increase in investment, private consumption, and net exports. Finnish economists expect GDP to grow a rate of 2-3% in the next few years.</span></p><p data-dcnode-id="1768"></p><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Finland's main challenges will be reducing high labor costs and boosting demand for its exports. In June 2016, the government enacted a Competitiveness Pact aimed at reducing labor costs, increasing hours worked, and introducing more flexibility into the wage bargaining system. As a result, wage growth was nearly flat in 2017. The Government was also seeking to reform the health care system and social services. In the long term, Finland must address a rapidly aging population and decreasing productivity in traditional industries that threaten competitiveness, fiscal sustainability, and economic growth.</span></p><p data-dcnode-id="1765"></p></td><td data-dcnode-id="1741"><p data-dcnode-id="1763"></p><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Sweden's small, open, and competitive economy has been thriving and Sweden has achieved an enviable standard of living with its combination of free-market capitalism and extensive welfare benefits. Sweden remains outside the euro zone largely out of concern that joining the European Economic and Monetary Union would diminish the country's sovereignty over its welfare system.</span></p><span data-dcnode-id="1760" instrument_node=""> </span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1757" instrument_node=""> </span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Timber, hydropower, and iron ore constitute the resource base of a manufacturing economy that relies heavily on foreign trade. Exports, including engines and other machines, motor vehicles, and telecommunications equipment, account for more than 44% of GDP. Sweden enjoys a current account surplus of about 5% of GDP, which is one of the highest margins in Europe.</span></p><span data-dcnode-id="1754" instrument_node=""> </span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1751" instrument_node=""> </span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">GDP grew an estimated 3.3% in 2016 and 2017 driven largely by investment in the construction sector. Swedish economists expect economic growth to ease slightly in the coming years as this investment subsides. Global economic growth boosted exports of Swedish manufactures further, helping drive domestic economic growth in 2017. The Central Bank is keeping an eye on deflationary pressures and bank observers expect it to maintain an expansionary monetary policy in 2018. Swedish prices and wages have grown only slightly over the past few years, helping to support the country's competitiveness.</span></p><span data-dcnode-id="1748" instrument_node=""> </span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1745" instrument_node=""> </span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">In the short and medium term, Sweden's economic challenges include providing affordable housing and successfully integrating migrants into the labor market.</span></p><p data-dcnode-id="1742">< ia, Sweden, Germany, and Russia; satellite earth stations - access to Intelsat transmission service via a Swedish satellite earth station, 1 Inmarsat (Atlantic and Indian Ocean regions); note - Finland shares the Inmarsat earth station with the other Nordic countries (Denmark, Iceland, Norway, and Sweden) (2019)</span><br data-dcnode-id="722"><br data-dcnode-id="721"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">note:</span></strong><span data-dcnode-id="718" instrument_node=""> the COVID-19 pandemic continues to have a significant impact on production and supply chains globally; since 2020, some aspects of the telecom sector have experienced downturn, particularly in mobile device production; many network operators delayed upgrades to infrastructure; progress towards 5G implementation was postponed or slowed in some countries; consumer spending on telecom services and devices was affected by large-scale job losses and the consequent restriction on disposable incomes; the crucial nature of telecom services as a tool for work and school from home became evident, and received some support from governments</span><p data-dcnode-id="717"></p></td><td data-dcnode-id="693"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">general assessment: </span></strong><p data-dcnode-id="713"></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Sweden's telecom market includes mature mobile and broadband sectors stimulated by investment of the main operators in new technologies; one of the best developed LTE infrastructures in the region; ranked among leading countries for fixed-line, mobile-cellular, Internet, and broadband penetration; best developed LTE infrastructure in the region; government promotes national broadband strategy to increase connectivity (2021)</span></p><span data-dcnode-id="710" instrument_node=""> (2020)</span><br data-dcnode-id="709"><br data-dcnode-id="708"><strong data-dcnode-id="706"> eceived some support from governments</span><p data-dcnode-id="694"></p></td></tr><tr data-dcnode-id="670" style="vertical-align:top"><td data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Broadband - fixed subscriptions</span></td><td data-dcnode-id="680"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">total: </span></strong><span data-dcnode-id="686" instrument_node="">1.797 million</span><br data-dcnode-id="685"><br data-dcnode-id="684"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">subscriptions per 100 inhabitants: </span></strong><span data-dcnode-id="681" instrument_node="">32.34 (2019 est.)</span></td><td data-dcnode-id="671"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">total: </span></strong><span data-dcnode-id="677" instrument_node="">4,038,725</span><br data-dcnode-id="676"><br data-dcnode-id="675"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">subscriptions per 100 inhabitants: </span></strong><span data-dcnode-id="672" instrument_node="">39.95 (2019 est.)</span></td></tr><tr data-dcnode-id="662" style="vertical-align:top"><td data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Broadcast media</span></td><td data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">a mix of 3 publicly operated TV stations and numerous privately owned TV stations; several free and special-interest pay-TV channels; cable and satellite multi-channel subscription services are available; all TV signals are broadcast digitally; Internet television, such as Netflix and others, is available; public broadcasting maintains a network of 13 national and 25 regional radio stations; a large number of private radio broadcasters and access to Internet radio</span></td><td data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">publicly owned TV broadcaster operates 2 terrestrial networks plus regional stations; multiple priv -15 months (Navy), 8-12 months (Air Force); after completing initial service, soldiers have a reserve commitment until age 47; compulsory military service, abolished in 2010, was reinstated in January 2018; conscription is selective, includes both female and male (age 18), and requires 9-12 months of service (2019)</span></td></tr><tr data-dcnode-id="291" style="vertical-align:top"><td data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Military expenditures - percent of GDP</span></td><td data-dcnode-id="306"><span data-dcnode-id="319" instrument_node="">2.2% of GDP (2021 est.)</span><br data-dcnode-id="318"><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">1.4% of GDP (2020 est.)</span><br data-dcnode-id="315"><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">1.5% of GDP (2019)</span><br data-dcnode-id="312"><br data-dcnode-id="311"><span data-dcnode-id="310" instrument_node="">1.4% of GDP (2018)</span><br data-dcnode-id="309"><br data-dcnode-id="308"><span data-dcnode-id="307" instrument_node="">1.4% of GDP (2017)</span></td><td data-dcnode-id="292"><span data-dcnode-id="305" instrument_node="">1.1% of GDP (2020 est.)</span><br data-dcnode-id="304"><br data-dcnode-id="303"><span data-dcnode-id="302" instrument_node="">1.1% of GDP (2019)</span><br data-dcnode-id="301"><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">1% of GDP (2018)</span><br data-dcnode-id="298"><br data-dcnode-id="297"><span data-dcnode-id="296" instrument_node="">1% of GDP (2017)</span><br data-dcnode-id="295"><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node="">1.1% of GDP (2016)</span></td></tr><tr data-dcnode-id="283" style="vertical-align:top"><td data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Military and security service personnel strengths</span></td><td data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">information varies; approximately 23,000 total active
