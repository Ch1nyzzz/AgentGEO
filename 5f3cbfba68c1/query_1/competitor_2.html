</span><span class="navbar-toggler-icon" data-dcnode-id="3792"></span></button></nav><main data-dcnode-id="82" id="main"><div class="pb-sm-7 pb-md-5 pb-lg-6 pb-xl-7" data-dcnode-id="3765" id="visualizing-intro"><div class="row pb-2 pt-md-6 pb-md-3 pb-lg-7 pt-lg-12 pb-xl-8 pt-xl-12 mx-0 px-2" data-dcnode-id="3784" id="visualizing-intro__hero"><div class="col-12 col-md-10 offset-md-1 col-xl-7 offset-xl-2" data-dcnode-id="3785"><h2 class="mb-sm-2 mb-xl-3 whitetext" data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">Visualizing UBI Research</span></h2><h5 class="mb-sm-5 mb-xl-6 whitetext slatetext" data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">Explore our new tool which compiles extensive research and shows the connections between UBI and a variety of social issues.</span></h5></div></div><div class="row pt-5 pt-md-6 pt-lg-6 pt-xl-8" data-dcnode-id="3766"><div class="col-count-2 col-12 col-md-10 col-xl-8 offset-md-1 offset-xl-2 medgraytext" data-dcnode-id="3776" id="visualizing-intro__columns"><p data-dcnode-id="3779"><span data-dcnode-id="3783" instrument_node="">The UBI Research Visualization bolsters basic income research by presenting existing knowledge in an accessible platform organized across multiple themes and subthemes. As noted in the </span><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/tcPJ2KUb35g"><span data-dcnode-id="3782" instrument_node="">video launch</span></a><span data-dcnode-id="3780" instrument_node="">, the visualization presents comprehensive summaries of articles, research papers, and books produced on UBI to date; enables viewers to see the diversity of approaches that have been taken on testing UBI and related policies; and allows users to get a good sense of the key tenets of the debate.</span></p><p data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">The user-friendly platform aspires to provide a wide variety of stakeholders (researchers and students, experimenters, policymakers and philanthropic organizations, among others) with just-in-time access to UBI research. It is the result of two years of research led by the Faculty Director and Program Manager and carried out by a large team of Lab fellows since 2018. Central to the extensive summaries presented below is the commitment to bridging the gap between facts and values. The summaries present existing empirical facts and data around UBI and the broad value-based questions and arguments that surround UBI along critical themes like gender, race and health.</span></p></div><div class="col-12 d-flex my-5 my-xl-6" data-dcnode-id="3767" id="visualizing-intro__button"><div class="scroll-button mx-auto" data-dcnode-id="3768" data-target="#viz-section"><button class="d-flex flex-column justify-content-center align-items-center btn btn-primary" data-dcnode-id="3769"><span data-dcnode-id="3775" instrument_node="">Explore the visualization</span><br data-dcnode-id="3774"><svg data-dcnode-id="3770" height="12" viewBox="0 0 17 12" width="17" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="3771" fill="none" fill-rule="evenodd" id="Page-1" stroke="none" stroke-width="1"><g data-dcnode-id="3772" fill="#fff" fill-rule="nonzero" id="HP-V6-Copy" transform="translate(-413.000000, -3160.000000)"><path d="M429.76846 3165.42665 424.709548 3160.23745C424.400891 3159.92085 423.900312 3159.92085 423.591655 3160.23745 423.282935 3160.55413 423.282935 3161.06747 423.591655 3161.38414L427.301165 3165.18918H413.790455C413.353934 3165.18918 413 3165.55223 413 3166 413 3166.44769 413.353934 3166.8108 413.790455 3166.8108H427.301165L423.591781 3170.61585C423.283061 3170.93252 423.283061 3171.44586 423.591781 3171.76253 423.746078 3171.92074 423.948434 3172 424.150728 3172 424.353021 3172 424.555314 3171.92074 424.709674 3171.76253L429.76846 3166.57333C430.07718 3166.25666 430.07718 3165.74332 429.76 </span><span class="theme-orb" data-dcnode-id="3729"></span><span class="text" data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">Gender</span></span><svg class="expand-icon icon" data-dcnode-id="3724" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3726" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="3725" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="3722" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3723" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-gender" class="collapse" data-dcnode-id="3283" data-id="gender" data-parent="#accordionExample" id="collapse-gender"><div class="card-body" data-dcnode-id="3284"><p data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="3705" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="3714"><a aria-controls="pills-the-household" aria-selected="true" class="nav-link active" data-dcnode-id="3715" data-id="the-household" data-toggle="pill" href="#pills-the-household" id="pills-the-household-tab" role="tab"><span data-dcnode-id="3717" instrument_node="">The Household</span><div class="underbar" data-dcnode-id="3716"></div></a></li><li class="nav-item" data-dcnode-id="3710"><a aria-controls="pills-care-work" aria-selected="false" class="nav-link" data-dcnode-id="3711" data-id="care-work" data-toggle="pill" href="#pills-care-work" id="pills-care-work-tab" role="tab"><span data-dcnode-id="3713" instrument_node="">Care Work</span><div class="underbar" data-dcnode-id="3712"></div></a></li><li class="nav-item" data-dcnode-id="3706"><a aria-controls="pills-women-in-the-labor-market" aria-selected="false" class="nav-link" data-dcnode-id="3707" data-id="women-in-the-labor-market" data-toggle="pill" href="#pills-women-in-the-labor-market" id="pills-women-in-the-labor-market-tab" role="tab"><span data-dcnode-id="3709" instrument_node="">Women in the labor market</span><div class="underbar" data-dcnode-id="3708"></div></a></li></ul><div class="tab-content" data-dcnode-id="3285" id="pills-tabContent"><div aria-labelledby="pills-the-household-tab" class="tab-pane fade show active" data-dcnode-id="3552" id="pills-the-household" role="tabpanel"><p data-dcnode-id="3702"><em data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">This section discusses how UBI might affect economically dependent spouses.</span></em></p><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">At any given point in time, a significant proportion of women are economically reliant on their male spouse. Among opposite-sex married couples in the United States, only 6.8 percent reported that only the wife was employed while 18.5 percent reported that only the husband was employed (Bureau of Labor Statistics, 2020). These “dependent” spouses rely on a partner as their sole source of income, but even when both partners work, women still face substantial intra-household inequalities in earnings: husbands earn more than wives in approximately three-quarters of all American marriages (Heggeness &amp; Murray-Close, 2018).</span></p><p data-dcnode-id="3698"><span data-dcnode-id="3699" instrument_node="">This economic dependency within the household, scholars and activists argue, is a major source of gender inequality (Baxter &amp; Kane, 1995; Orloff, 2013). Economic dependency, for example, can create problematic power dynamics within the household, as the spouse who earns the most may also have more control over the household finances and decisions. It can also limit the dependent spouse’s exit options, which is particularly concerning in cases of domestic abuse (Conner, 2014). Structurally, the gendered nature of economic dependency may also affect societal attitudes. As some scholars have argued, men and women have fewer egalitarian attitudes in contexts where there is more economic dependency: it contributes to the sense that house- and care-work is “women’s work” (Baxter &amp; Kane, 1995).</span></p><p data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">By providing a baseline individual income, a generous UBI program could empower spouses who are economically dependent. Since most existing welfare benefits are assessed at the household level, financially dependent spouses are often left out. By contrast, a UBI would apply to each spouse, thus potentially leveling intra-household power dynamics and limiting the ways in which current economic and legal systems (e.g., citizenship restrictions and employment discrimination) reinforce one another to trap women in dependent relationships (Pateman, 2004). The security provided by UBI could be critical for facilitating exit options for spouses in undesirable or abusive relationships (Elgarte, 2008; Orloff, 2013; Robeyns, 2001; Zelleke, 2008).</span></p><p data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">UBI’s impact on household gender equity has not yet been studied in high-income countries, but existing empirical evidence in developing countries has been positive. In a 2008–2009 Namibia experiment, for example, basic income transfers seemed to reduce the dependency of young women on men for their survival. Women participants reported more control over their own sexuality, freeing them to some extent from the pressure to engage in transactional sex; but, the study did not discuss these results in greater depth (Haarmann et al., 2009).</span></p><p data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">The 2011-2013 Kenya Give Directly experiment, which provided cash transfers to both male and female heads of household, showed that basic income transfers given to female heads of households improved women’s status as measured by the female empowerment index (Haushofer &amp; Shapiro, 2016). The study also indicated that gendered differences were seen in the psychological well-being index, suggesting that women’s well-being was highly correlated with female empowerment (Haushofer &amp; Shapiro, 2016).</span></p><p data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">Perhaps the most revealing study to date on UBI’s gender impact was a 2011–2012 randomized control trial in Madhya Pradesh, India. The experiment set out to see whether an individual basic income payment, particularly when combined with membership in a women’s union (the Self-Employed Women’s Association or SEWA), enabled women to develop a greater sense of empowerment and a broader identity (SEWA Bharat, 2014). In the general pilot, 20 villages participated: eight received a monthly basic income transfer and 12 did not (control group). Of the eight receiving the transfers, SEWA had a presence in four of the villages; and, of the control group, SEWA was engaged in six villages. In the tribal pilot, SEWA was present in both villages, though only one received individual cash transfer (SEWA Bharat, 2014). SEWA’s engagement with women under the age of 14 in these villages included opening bank accounts, granting access to employment, or facilitating an income generation program (SEWA Bharat, 2014). For those receiving cash, women also received the basic income grants of their children, which was intended to give mothers greater autonomy over the family’s spending decisions (SEWA Bharat, 2014).</span></p><p data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">The results were overwhelmingly positive: 85 percent of surveyed participants believed that basic income improved the position of women in the household and gave women more power over how income was spent (Davala et al., 2015). Additionally, more than 1,600 women were given access to financial services, up from 365 women before the pilot, through the opening of individual or SEWA cooperative bank accounts, which in turn established an independent legal identity for them and led to a greater sense of empowerment (SEWA Bharat, 2014). Finally, more than half of the women receiving basic income in SEWA villages also reported that their household income (cash transfer or other) was more equitably distributed among members of the household, compared to 39 percent in the control group, resulting in improvements in girls nutrition and increases in girls enrollment in secondary education (SEWA Bharat, 2014).</span></p><p data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">These three experiments offer a glimpse into how an individual UBI might impact gender dynamics in the household, but additional research is needed, especially in higher-income countries. Given that household compositions and gender roles are changing at rapid rates, it would be especially beneficial for the new wave of experiments and pilots in the Global North to take gender equity effects explicitly into account.</span></p><br data-dcnode-id="3685"><p data-dcnode-id="3682"><b data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3663"><li class="related-link" data-dcnode-id="3679" data-target="care-work"><a data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Care Work</span></a></li><li class="related-link" data-dcnode-id="3676" data-target="women-in-the-labor-market"><a data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Women in the Labor Market</span></a></li><li class="related-link" data-dcnode-id="3673" data-target="job-precariousness"><a data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Job Precariousness</span></a></li><li class="related-link" data-dcnode-id="3670" data-target="work-beyond-jobs"><a data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Work beyond Jobs</span></a></li><li class="related-link" data-dcnode-id="3667" data-target="economic-inequality"><a data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Economic inequality</span></a></li><li class="related-link" data-dcnode-id="3664" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Racialized welfare stereotypes</span></a></li></ul><br data-dcnode-id="3662"><div class="citations" data-dcnode-id="3553"><p data-dcnode-id="3659"><b data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">Read more</span></b></p><p data-dcnode-id="3649"><span data-dcnode-id="3658" instrument_node="">Baxter, J., &amp; Kane, E. W. (1995). Dependence and Independence: A Cross-National Analysis of Gender Inequality and Gender Attitudes. </span><em data-dcnode-id="3656"><span data-dcnode-id="3657" instrument_node="">Gender &amp; Society</span></em><span data-dcnode-id="3655" instrument_node="">, </span><em data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">9</span></em><span data-dcnode-id="3652" instrument_node="">(2), 193–215. </span><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/089124395009002004"><span data-dcnode-id="3651" instrument_node="">https://doi.org/10.1177/089124395009002004</span></a></p><p data-dcnode-id="3642"><span data-dcnode-id="3648" instrument_node="">Bureau of Labor Statistics. (2020). </span><em data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Employment Characteristics of Families—2019</span></em><span data-dcnode-id="3645" instrument_node=""> (USDL-20-0670). United States Department of Labor. </span><a data-dcnode-id="3643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/news.release/pdf/famee.pdf"><span data-dcnode-id="3644" instrument_node="">https://www.bls.gov/news.release/pdf/famee.pdf</span></a></p><p data-dcnode-id="3634"><span data-dcnode-id="3641" instrument_node="">Conner, D. H. (2014). Financial Freedom: Women, Money, and Domestic Abuse. </span><em data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">William &amp; Mary Journal of Women and the Law</span></em><span data-dcnode-id="3638" instrument_node="">, </span><em data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">20</span></em><span data-dcnode-id="3635" instrument_node="">(2), 339–397.</span></p><p data-dcnode-id="3629"><span data-dcnode-id="3633" instrument_node="">Davala, S., Renana Jhabvala, Guy Standing, &amp; Soumya Kapoor Mehta. (2015). </span><em data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">Basic income: A transformative policy for India</span></em><span data-dcnode-id="3630" instrument_node="">. Bloomsbury Academic.</span></p><p data-dcnode-id="3619"><span data-dcnode-id="3628" instrument_node="">Elgarte, J. M. (2008). Basic Income and the Gendered Division of Labour. </span><em data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3625" instrument_node="">, </span><em data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">3</span></em><span data-dcnode-id="3622" instrument_node="">(3), 1–7. </span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1136"><span data-dcnode-id="3621" instrument_node="">https://doi.org/10.2202/1932-0183.1136</span></a></p><p data-dcnode-id="3614"><span data-dcnode-id="3618" instrument_node="">Haarmann, C., Haarmann, D., Jauch, H., Shindondola-Mote, H., Nattrass, N., van Niekerk, I., &amp; Samson, M. (2009). </span><em data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">Making the difference! The BIG in Namibia</span></em><span data-dcnode-id="3615" instrument_node="">. Friedrich Ebert Foundation.</span></p><p data-dcnode-id="3604"><span data-dcnode-id="3613" instrument_node="">Haushofer, J., &amp; Shapiro, J. (2016). The Short-term Impact of Unconditional Cash Transfers to the Poor: Experimental Evidence from Kenya. </span><em data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">The Quarterly Journal of Economics</span></em><span data-dcnode-id="3610" instrument_node="">, </span><em data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">131</span></em><span data-dcnode-id="3607" instrument_node="">(4), 1973–2042. </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/qje/qjw025"><span data-dcnode-id="3606" instrument_node="">https://doi.org/10.1093/qje/qjw025</span></a></p><p data-dcnode-id="3597"><span data-dcnode-id="3603" instrument_node="">Heggeness, M., &amp; Murray-Close, M. (2018). </span><em data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Manning up and womaning down: How husbands and wives report their earnings when she earns more</span></em><span data-dcnode-id="3600" instrument_node=""> (No. 2018–20). Social, Economic, and Housing Statistics Division, United States Census Bureau. </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/content/dam/Census/library/working-papers/2018/demo/SEHSD-WP2018-20.pdf"><span data-dcnode-id="3599" instrument_node="">https://www.census.gov/content/dam/Census/library/working-papers/2018/demo/SEHSD-WP2018-20.pdf</span></a></p><p data-dcnode-id="3592"><span data-dcnode-id="3596" instrument_node="">Orloff, A. (2013). Why Basic Income does not Promote Gender Equality. In K. Widerquist, J. Noguera, Y. Vanderborght, &amp; J. De Wispelaere (Eds.), </span><em data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">Basic Income: An Anthology of Contemporary Research</span></em><span data-dcnode-id="3593" instrument_node=""> (First Edition, pp. 149–160). Blackwell Publishing.</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3591" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="3588" instrument_node="">, </span><em data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">32</span></em><span data-dcnode-id="3585" instrument_node="">(1), 89–105. </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="3584" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="3572"><span data-dcnode-id="3581" instrument_node="">Robeyns, I. (2001). Will a Basic Income Do Justice to Women? </span><em data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Analyse &amp; Kritik</span></em><span data-dcnode-id="3578" instrument_node="">, </span><em data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">23</span></em><span data-dcnode-id="3575" instrument_node="">(1), 88–105. </span><a data-dcnode-id="3573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/auk-2001-0108"><span data-dcnode-id="3574" instrument_node="">https://doi.org/10.1515/auk-2001-0108</span></a></p><p data-dcnode-id="3565"><span data-dcnode-id="3571" instrument_node="">SEWA Bharat. (2014). </span><em data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">A Little More, How Much It Is: Piloting Basic Income Transfers in Madhya Pradesh, India</span></em><span data-dcnode-id="3568" instrument_node=""> (p. 512) [Report on Unconditional Cash Transfer Pilot Project]. SEWA and UNICEF. </span><a data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sewabharat.org/wp-content/uploads/2015/07/Report-on-Unconditional-Cash-Transfer-Pilot-Project-in-Madhya-Pradesh.pdf"><span data-dcnode-id="3567" instrument_node="">http://sewabharat.org/wp-content/uploads/2015/07/Report-on-Unconditional-Cash-Transfer-Pilot-Project-in-Madhya-Pradesh.pdf</span></a></p><p data-dcnode-id="3555"><span data-dcnode-id="3564" instrument_node="">Zelleke, A. (2008). Institutionalizing the Universal Caretaker Through a Basic Income? </span><em data-dcnode-id="3562"><span data-dcnode-id="3563" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3561" instrument_node="">, </span><em data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">3</span></em><span data-dcnode-id="3558" instrument_node="">(3), 1–9. </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1133"><span data-dcnode-id="3557" instrument_node="">https://doi.org/10.2202/1932-0183.1133</span></a></p><br data-dcnode-id="3554"></div></div><div aria-labelledby="pills-care-work-tab" class="tab-pane fade" data-dcnode-id="3396" id="pills-care-work" role="tabpanel"><p data-dcnode-id="3549"><em data-dcnode-id="3550"><span data-dcnode-id="3551" instrument_node="">This section discusses whether UBI might alleviate or reinforce the gendered distribution of care work.</span></em></p><p data-dcnode-id="3547"><span data-dcnode-id="3548" instrument_node="">Care work is important: it shapes the next generation and ensures the dignity of those who are ill or disabled. And yet care work is often undervalued by society, which manifests as a gendered phenomenon both in and outside of the home. Within the formal employment market, women are over-represented in caring professions. As a result, these professions are seen as relatively low prestige and individuals who perform care work are often underpaid. According to the Bureau of Labor Statistics, health aides or caregivers in the United States make $20,000–$30,000 a year, well below the median yearly income of $60,000 (Bureau of Labor Statistics, 2019).</span></p><p data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Inside the home, women assume the majority of unpaid care responsibilities, which is often to the detriment of their own employment prospects. In the United States in 2017, 27 percent of women stayed home to care for children compared to 7 percent of men (Livingston, 2018). Moreover, middle-aged women were more likely than their male counterparts to leave a job to care for an elderly family member, which can result in increased isolation, stress, and the risk of poverty in old age due to lost income and benefits (Wakabayashi &amp; Donato, 2006). The gendered division of care work both in and outside the home thus conspires to limit women’s social and professional flourishing and leaves them economically worse off than men.</span></p><p data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">There are three ways in which a UBI might promote a better recognition of informal care work. First, if set sufficiently high, a UBI would ensure that those who take time off work to look after a child or aging parent do not face as high a financial risk. Having to perform care work is often cited as a factor in female impoverishment, which means that a UBI could especially impact the rates of women living in poverty. Second, by granting individuals more financial flexibility, a UBI could help those who find meaning in care work to opt out of poor quality or poorly remunerated jobs to support their own family members (McKay, 2007; Pateman, 2004). Finally, a UBI would remove some of the disadvantage that current welfare systems place on unwaged caregivers; for instance, caregivers often lack eligibility for a number of benefit programs, such as the Earned Income Tax Credit, because they require formal enrollment in the labor market. Taken together, a UBI program could thus give individuals more freedom to engage in necessary or desired care work (Zelleke, 2008) and it could help promote a better recognition of caregiving as a valuable and productive activity (Weeks, 2011).</span></p><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">A UBI program would also impact caregivers in the formal market. Although waged caregivers as a whole are underpaid, they still earn too much for benefit eligibility (i.e. for programs such as SNAP and TANF). As a result, many professional caregivers struggle to make ends meet: 20 percent of home care workers live in poverty, compared to 7 percent of all workers (Campbell, 2018). A UBI program could thus increase economic security for waged caregivers (Robeyns, 2001) but it could also improve the status of the profession as a whole. If the UBI were high enough to provide genuine exit options, it would give care-workers more bargaining power, which could result in improved wages and work conditions. If waged care-work were to increase in status, it would also likely become more appealing to groups who have traditionally avoided it, notably men and white people. Despite making up only a quarter of the total labor force, people of color, especially women of color, are overrepresented in care work: in 2015, 59 percent of home care-workers for the elderly and disabled were people of color, as were roughly 40 percent of home-based child care workers (Campbell, 2018; Whitebook et al., 2018).</span></p><p data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">It is less clear what would happen to the division of labor within households under a UBI program. Given existing social norms, some have worried that UBI could have the effect of encouraging women to withdraw from the labor market in order to dedicate themselves to care work within the home (Gheaus, 2008; Orloff, 2013). UBI would then risk further entrenching gender norms around care. An alternative welfare scheme that challenges how both paid and unpaid work are structured could plausibly have a better chance of reducing women’s responsibility for childcare and housework (Orloff, 2013). But UBI could also affect the opposite outcome in the home: by providing funds that can be used for childcare, more women might return to work post-birth. While this would result in more women in the formal labor force overall, it could also risk entrenching the current racialized and gendered norms of waged care-work.</span></p><p data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">Evidence from Canada’s Mincome experiment in the 1970s suggests that guaranteed income caused female spouses to finance longer maternity leaves, to reduce their work hours, and to take longer breaks from employment later in their careers (Forget, 2011). There are difficulties in interpreting these results, however. Gender norms have changed significantly since the 1970s, making it difficult to extrapolate from these results to the present. Moreover, the results do not discuss how breaks in employment might be used for purposes other than childrearing, such as caring for elderly. As such, more research, especially on UBI’s long-term effects on labor demand (Widerquist, 2018) is needed to predict how men and women would engage in care work.</span></p><br data-dcnode-id="3536"><p data-dcnode-id="3533"><b data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3517"><li class="related-link" data-dcnode-id="3530" data-target="the-household"><a data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">The household</span></a></li><li class="related-link" data-dcnode-id="3527" data-target="women-in-the-labor-market"><a data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Women in the labor market</span></a></li><li class="related-link" data-dcnode-id="3524" data-target="collective-bargaining"><a data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Bargaining power</span></a></li><li class="related-link" data-dcnode-id="3521" data-target="work-beyond-jobs"><a data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Work beyond jobs</span></a></li><li class="related-link" data-dcnode-id="3518" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Racialized welfare stereotypes</span></a></li></ul><br data-dcnode-id="3516"><p data-dcnode-id="3513"><b data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">Read more</span></b></p><p data-dcnode-id="3506"><span data-dcnode-id="3512" instrument_node="">Bureau of Labor Statistics. (2019). </span><em data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Occupational Outlook Handbook: Home Health Aides and Personal Care Aides</span></em><span data-dcnode-id="3509" instrument_node="">. U.S. Department of Labor. </span><a data-dcnode-id="3507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/ooh/healthcare/home-health-aides-and-personal-care-aides.htm"><span data-dcnode-id="3508" instrument_node="">https://www.bls.gov/ooh/healthcare/home-health-aides-and-personal-care-aides.htm</span></a></p><p data-dcnode-id="3499"><span data-dcnode-id="3505" instrument_node="">Campbell, S. (2018). </span><em data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">U.S. Home Care Workers: Key Facts (2018)</span></em><span data-dcnode-id="3502" instrument_node="">. PHI. </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phinational.org/resource/u-s-home-care-workers-key-facts-2018/"><span data-dcnode-id="3501" instrument_node="">https://phinational.org/resource/u-s-home-care-workers-key-facts-2018/</span></a></p><p data-dcnode-id="3489"><span data-dcnode-id="3498" instrument_node="">Forget, E. L. (2011). The Town with No Poverty: The Health Effects of a Canadian Guaranteed Annual Income Field Experiment. </span><em data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">Canadian Public Policy</span></em><span data-dcnode-id="3495" instrument_node="">, </span><em data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">37</span></em><span data-dcnode-id="3492" instrument_node="">(3), 283–305. </span><a data-dcnode-id="3490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3138/cpp.37.3.283"><span data-dcnode-id="3491" instrument_node="">https://doi.org/10.3138/cpp.37.3.283</span></a></p><p data-dcnode-id="3479"><span data-dcnode-id="3488" instrument_node="">Gheaus, A. (2008). Basic Income, Gender Justice and the Costs of Gender-Symmetrical Lifestyles. </span><em data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3485" instrument_node="">, </span><em data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">3</span></em><span data-dcnode-id="3482" instrument_node="">(3). </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1134"><span data-dcnode-id="3481" instrument_node="">https://doi.org/10.2202/1932-0183.1134</span></a></p><p data-dcnode-id="3472"><span data-dcnode-id="3478" instrument_node="">Livingston, G. (2018). </span><em data-dcnode-id="3476"><span data-dcnode-id="3477" instrument_node="">The Changing Profile of Unmarried Parents</span></em><span data-dcnode-id="3475" instrument_node=""> (Social and Demographic Trends). Pew Research Center. </span><a data-dcnode-id="3473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewsocialtrends.org/2018/04/25/the-changing-profile-of-unmarried-parents/"><span data-dcnode-id="3474" instrument_node="">https://www.pewsocialtrends.org/2018/04/25/the-changing-profile-of-unmarried-parents/</span></a></p><p data-dcnode-id="3462"><span data-dcnode-id="3471" instrument_node="">McKay, A. (2007). Why a citizens’ basic income? A question of gender equality or gender bias. </span><em data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Work, Employment and Society</span></em><span data-dcnode-id="3468" instrument_node="">, </span><em data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">21</span></em><span data-dcnode-id="3465" instrument_node="">(2), 337–348. </span><a data-dcnode-id="3463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0950017007076643"><span data-dcnode-id="3464" instrument_node="">https://doi.org/10.1177/0950017007076643</span></a></p><p data-dcnode-id="3457"><span data-dcnode-id="3461" instrument_node="">Orloff, A. (2013). Why Basic Income does not Promote Gender Equality. In K. Widerquist, J. Noguera, Y. Vanderborght, &amp; J. De Wispelaere (Eds.), </span><em data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Basic Income: An Anthology of Contemporary Research</span></em><span data-dcnode-id="3458" instrument_node=""> (First Edition, pp. 149–160). Blackwell Publishing.</span></p><p data-dcnode-id="3447"><span data-dcnode-id="3456" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="3453" instrument_node="">, </span><em data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">32</span></em><span data-dcnode-id="3450" instrument_node="">(1), 89–105. </span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="3449" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="3437"><span data-dcnode-id="3446" instrument_node="">Robeyns, I. (2001). Will a Basic Income Do Justice to Women? </span><em data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Analyse &amp; Kritik</span></em><span data-dcnode-id="3443" instrument_node="">, </span><em data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">23</span></em><span data-dcnode-id="3440" instrument_node="">(1), 88–105. </span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/auk-2001-0108"><span data-dcnode-id="3439" instrument_node="">https://doi.org/10.1515/auk-2001-0108</span></a></p><p data-dcnode-id="3427"><span data-dcnode-id="3436" instrument_node="">Wakabayashi, C., &amp; Donato, K. M. (2006). Does Caregiving Increase Poverty among Women in Later Life? Evidence from the Health and Retirement Survey. </span><em data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">Journal of Health and Social Behavior</span></em><span data-dcnode-id="3433" instrument_node="">, </span><em data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">47</span></em><span data-dcnode-id="3430" instrument_node="">(3), 258–274. </span><a data-dcnode-id="3428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/002214650604700305"><span data-dcnode-id="3429" instrument_node="">https://doi.org/10.1177/002214650604700305</span></a></p><p data-dcnode-id="3422"><span data-dcnode-id="3426" instrument_node="">Weeks, K. (2011). </span><em data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">The problem with work: Feminism, Marxism, antiwork politics, and postwork imaginaries</span></em><span data-dcnode-id="3423" instrument_node="">. Duke University Press.</span></p><p data-dcnode-id="3415"><span data-dcnode-id="3421" instrument_node="">Whitebook, M., McLean, C., Austin, L. J. E., &amp; Edwards, B. (2018). </span><em data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">The Early Childhood Workforce Index 2018</span></em><span data-dcnode-id="3418" instrument_node="">. Center for the Study of Childcare Employment. </span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cscce.berkeley.edu/early-childhood-workforce-2018-index/"><span data-dcnode-id="3417" instrument_node="">https://cscce.berkeley.edu/early-childhood-workforce-2018-index/</span></a></p><p data-dcnode-id="3408"><span data-dcnode-id="3414" instrument_node="">Widerquist, K. (2018). </span><em data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">A Critical Analysis of Basic Income Experiments for Researchers, Policymakers, and Citizens</span></em><span data-dcnode-id="3411" instrument_node="">. </span><a data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//works.bepress.com/widerquist/86/"><span data-dcnode-id="3410" instrument_node="">http://works.bepress.com/widerquist/86/</span></a></p><p data-dcnode-id="3398"><span data-dcnode-id="3407" instrument_node="">Zelleke, A. (2008). Institutionalizing the Universal Caretaker Through a Basic Income? </span><em data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3404" instrument_node="">, </span><em data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">3</span></em><span data-dcnode-id="3401" instrument_node="">(3), 1–9. </span><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1133"><span data-dcnode-id="3400" instrument_node="">https://doi.org/10.2202/1932-0183.1133</span></a></p><br data-dcnode-id="3397"></div><div aria-labelledby="pills-women-in-the-labor-market-tab" class="tab-pane fade" data-dcnode-id="3286" id="pills-women-in-the-labor-market" role="tabpanel"><p data-dcnode-id="3393"><em data-dcnode-id="3394"><span data-dcnode-id="3395" instrument_node="">This section considers whether UBI could improve women’s position in the labor market.</span></em></p><p data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Current labor market practices assume that workers follow a “male life pattern”—that is, workers are autonomous individuals who have others (either relatives or employees) perform any necessary care work. The formal labor market thus often fails to accommodate the specific needs of women and caregivers, leading to the gender pay gap and the feminization of part-time work. The gender pay gap in the United States was 15 percent in 2018. Based on this finding, it would take an extra 39 days (or roughly 8 weeks) of work for women to earn as much as men (Graff et al., 2019).</span></p><p data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">There are different explanations for why women are paid less than men, but the most dominant argument is that women face a “pregnancy penalty”: women often assume the majority of childrearing responsibilities and are then penalized for a presumed lack of commitment to the workplace (Shinall, 2018). Other arguments to explain the pay gap include that women don’t negotiate their salaries as much or as successfully as men do (Shinall, 2018); that women tend to choose lower-paying jobs (Barbulescu &amp; Bidwell, 2013); and that employers are biased: whether consciously or unconsciously, they believe that men should earn more (Williams et al., 2010).
Of these four explanations, a UBI might have positive impacts on the first three. First, it could mitigate the “pregnancy penalty” by making childcare affordable for more parents, thus reducing some of the burden of care work and allowing women to dedicate more time to their careers (McKay, 2007; Pateman, 2004; Zelleke, 2008). A UBI could also give women increased bargaining power by widening their exit options (McKay, 2007). And, by helping women afford more education, training, or care when necessary, a UBI could grant women the freedom to make riskier career choices, changing the proportion of women who ‘pick’ (willingly or not) low-paying jobs.</span></p><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">If the gender pay gap stems primarily from bias, however, a UBI is unlikely to help solve the problem since it is unlikely to radically impact sexist biases. If the bias against women, however, stems from some combination of the pregnancy penalty, lower bargaining effectiveness, and feminized career choices, then a UBI could help mitigate it and, in the long run, contribute to a world in which women face less gender discrimination.</span></p><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">In addition to the wage-gap, women in the formal labor market have to deal with the gendered impact of part-time work. Between 1968 and 2016, the percentage of women working part-time changed very little, fluctuating between 25 and 30 percent, which is nearly two to three times that of men (7 to 13 percent during the same time period) (Bureau of Labor Statistics, 2017). While part-time work may allow for greater flexibility, it has disproportionately negative impacts on income stability, health and retirement benefits, consistent working hours, and societal acknowledgement. Part-time workers, for example, have only one-third the access to health insurance coverage as do full-timers—22 percent compared with 73 percent (Golden, 2016).</span></p><p data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">In feminist thought, there is some disagreement regarding the feminized nature of part-time work. On the one hand, part-time work can be seen as hindering women’s empowerment since it leaves women more socially and economically vulnerable and may even be the result of discrimination against women in the full-time labor force (i.e., full time positions that have no flexibility regarding childcare). Moreover, the preponderance of women doing part-time work may reify existing stereotypes: if part time workers are assumed to take on the majority of care work within the household, then the feminization of part-time work further associates care work with women’s work, which can hurt women’s employment prospects. In this context, a UBI could do more harm than good by incentivizing those socially designated as caregivers to stay home and perform the unpaid work of taking care of children and older adults (Bergmann, 2008; Orloff, 2013), thus increasing the gender disparity in the labor force.</span></p><p data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">On the other hand, care work is socially valuable and meaningful, and part-time work may enable caregivers to achieve the ‘work–life’ balance that best fits their needs or interests. This approach does not associate women’s empowerment with an increase in the number of women who work full-time. It avoids the androcentric assumption that a full-time job is necessarily the ideal model. On this view, we should instead be encouraging more men to work part-time. As gender roles continue to evolve, a UBI could do just that; by providing economic security for all with no work requirements, it could incentivize more men to move from full-time into part-time work.</span></p><p data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Whether UBI would radically impact women in the labor force largely depends on how success is defined. If the goal is to increase the number of women in full-time employment, then other policies might be better suited. For example, a job guarantee could offer female workers income as well as a variety of valuable work benefits, such as health care, a social network, and increased self-esteem (Orloff, 2013). A provision or subsidization of childcare could also more efficiently encourage women’s labor market participation than UBI (Bergmann, 2008). If the goal, however, is to increase women’s economic security and career options (broadly understood to include the option of part-time work), then a UBI could be well-suited to the task.</span></p><p data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">There is a small body of empirical research on the effects of UBI on women’s labor force participation in low- and middle-income contexts. Existing empirical evidence on this subject is limited mostly to the Madhya Pradesh experiment, which concluded that basic income contributed to an increase and diversification of female participation in formal economic activities, especially jobs that involved hard manual labor. Nonetheless, women were paid less than men for the same jobs (Davala et al., 2015). The SEWA study (SEWA Bharat, 2014) also notes that, when given a cash transfer, women in the tribal villages shifted to paid, casual manual labor because it gave them more control over their time and production. Notably, the percentage of women who worked primarily in farming rose to 66 percent from 39 percent. This increase was largely attributed to women being able to buy farming materials, seed, and livestock with the cash transfer. The experiment also caused more people, especially women, to take on additional jobs (own-account activity) through giving them more control over their time and production, thus significantly increasing the total number of hours worked by recipients (Davala et al., 2015). These effects were found to extend even four years beyond the study with women’s labor participation increased by 16 percent and no change among male participants (SEWA Bharat, 2014). The authors of the study didn’t conclude whether this increase was advantageous or not (Davala et al., 2015), highlighting the need for more experiments and pilot programs to test these contrasting hypotheses on UBI’s effects on women in the labor force. Results are more mixed when programs that meet some and not all characteristics of a UBI are included in the analysis. An umbrella review of different types of cash transfers that share features with UBI found reductions in labor market participation for women with care responsibilities and married women with children (Hasdell, 2020). In higher-income contexts, the income and substitution effects of a UBI are more complex. Income and substitution effects – or the extent to which people ‘spend’ part of their unearned income on increased leisure or make ‘trade-offs’ between more work and lost benefits – are quite small in both the 1970’s negative income tax experiments and for the Alaska Permanent Fund, however are more significant for women than men (Hoynes &amp; Rothstein, 2019; Marinescu, 2018). In contrast to the small reductions in work hours in universal and unconditional programs, there are some increases in labor market participation for households that receive in-work credits, such as the Earned Income Tax Credit (EITC) (Hoynes &amp; Rothstein, 2019).</span></p><br data-dcnode-id="3376"><p data-dcnode-id="3373"><b data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3357"><li class="related-link" data-dcnode-id="3370" data-target="care-work"><a data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="3367" data-target="work-beyond-jobs"><a data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">Work beyond jobs</span></a></li><li class="related-link" data-dcnode-id="3364" data-target="economic-inequality"><a data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">Economic inequality</span></a></li><li class="related-link" data-dcnode-id="3361" data-target="labor-market"><a data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">Impact on labor market</span></a></li><li class="related-link" data-dcnode-id="3358" data-target="collective-bargaining"><a data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Bargaining power</span></a></li></ul><br data-dcnode-id="3356"><p data-dcnode-id="3353"><b data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Read more</span></b></p><p data-dcnode-id="3343"><span data-dcnode-id="3352" instrument_node="">Barbulescu, R., &amp; Bidwell, M. (2013). Do Women Choose Different Jobs from Men? Mechanisms of Application Segregation in the Market for Managerial Workers. </span><em data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Organization Science</span></em><span data-dcnode-id="3349" instrument_node="">, </span><em data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">24</span></em><span data-dcnode-id="3346" instrument_node="">(3), 737–756. </span><a data-dcnode-id="3344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1287/orsc.1120.0757"><span data-dcnode-id="3345" instrument_node="">https://doi.org/10.1287/orsc.1120.0757</span></a></p><p data-dcnode-id="3333"><span data-dcnode-id="3342" instrument_node="">Bergmann, B. R. (2008). Basic Income Grants or the Welfare State: Which Better Promotes Gender Equality? </span><em data-dcnode-id="3340"><span data-dcnode-id="3341" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3339" instrument_node="">, </span><em data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">3</span></em><span data-dcnode-id="3336" instrument_node="">(3). </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1128"><span data-dcnode-id="3335" instrument_node="">https://doi.org/10.2202/1932-0183.1128</span></a></p><p data-dcnode-id="3326"><span data-dcnode-id="3332" instrument_node="">Bureau of Labor Statistics. (2017). </span><em data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Percentage of Employed Women Working Full Time Little Changed over Past 5 Decades</span></em><span data-dcnode-id="3329" instrument_node=""> (The Economics Daily). U.S. Department of Labor. </span><a data-dcnode-id="3327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bls.gov/opub/ted/2017/percentage-of-employed-women-working-full-time-little-changed-over-past-5-decades.htm"><span data-dcnode-id="3328" instrument_node="">https://www.bls.gov/opub/ted/2017/percentage-of-employed-women-working-full-time-little-changed-over-past-5-decades.htm</span></a></p><p data-dcnode-id="3321"><span data-dcnode-id="3325" instrument_node="">Davala, S., Renana Jhabvala, Guy Standing, &amp; Soumya Kapoor Mehta. (2015). </span><em data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Basic Income: A Transformative Policy for India</span></em><span data-dcnode-id="3322" instrument_node="">. Bloomsbury Academic.</span></p><p data-dcnode-id="3316"><span data-dcnode-id="3320" instrument_node="">Golden, L. (2016). </span><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">Still Falling Short on Hours and Pay: Part-time Work Becoming New Normal</span></em><span data-dcnode-id="3317" instrument_node="">. Economic Policy Institute. epi.org/114028</span></p><p data-dcnode-id="3309"><span data-dcnode-id="3315" instrument_node="">Graff, N., Brown, A., &amp; Patten, E. (2019, March 22). </span><em data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">The narrowing, but persistent, gender gap in pay</span></em><span data-dcnode-id="3312" instrument_node="">. Pew Research FactTank: News in the Numbers. </span><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pewrsr.ch/2uVqhbs"><span data-dcnode-id="3311" instrument_node="">https://pewrsr.ch/2uVqhbs</span></a></p><p data-dcnode-id="3302"><span data-dcnode-id="3308" instrument_node="">Hasdell, R. (2020). </span><em data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">What we know about Universal Basic Income: A cross-synthesis of reviews</span></em><span data-dcnode-id="3305" instrument_node=""> (p. 27). Basic Income Lab. </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/uploads/Umbrella%2520Review%2520BI_final.pdf"><span data-dcnode-id="3304" instrument_node="">https://basicincome.stanford.edu/uploads/Umbrella%20Review%20BI_final.pdf</span></a></p><p data-dcnode-id="3295"><span data-dcnode-id="3301" instrument_node="">Hoynes, H., &amp; Rothstein, J. (2019). </span><em data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Universal Basic Income in the US and Advanced Countries</span></em><span data-dcnode-id="3298" instrument_node=""> (No. w25538). National Bureau of Economic Research. </span><a data-dcnode-id="3296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3386/w25538"><span data-dcnode-id="3297" instrument_node="">https://doi.org/10.3386/w25538</span></a></p><p data-dcnode-id="3288"><span data-dcnode-id="3294" instrument_node="">Marinescu, I. (2018). </span><em data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">No strings attached: The behavioral effects of U.S. unconditional cash transfer programs</span></em><span data-dcnode-id="3291" instrument_node=""> (Working Paper No. 24337). National Bureau of Economic Research. </span><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w24312.pdf"><span data-dcnode-id="3290" instrument_node="">https://www.nber.org/papers/w24312.pdf</span></a></p><br data-dcnode-id="3287"></div></div></div></div></div><div class="card" data-dcnode-id="2804"><div class="card-header" data-dcnode-id="3271" id="heading-democracy"><button aria-controls="collapse-democracy" aria-expanded="false" class="btn btn-link collapsed" data-dcnode-id="3272" data-target="#collapse-democracy" data-toggle="collapse" type="button"><span data-dcnode-id="3281" instrument_node="">
</span><span class="theme-orb" data-dcnode-id="3280"></span><span class="text" data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">Democracy</span></span><svg class="expand-icon icon" data-dcnode-id="3275" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3277" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="3276" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="3273" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="3274" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-democracy" class="collapse" data-dcnode-id="2805" data-id="democracy" data-parent="#accordionExample" id="collapse-democracy"><div class="card-body" data-dcnode-id="2806"><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="3252" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="3265"><a aria-controls="pills-civic-participation" aria-selected="true" class="nav-link active" data-dcnode-id="3266" data-id="civic-participation" data-toggle="pill" href="#pills-civic-participation" id="pills-civic-participation-tab" role="tab"><span data-dcnode-id="3268" instrument_node="">Civic Participation</span><div class="underbar" data-dcnode-id="3267"></div></a></li><li class="nav-item" data-dcnode-id="3261"><a aria-controls="pills-democratization" aria-selected="false" class="nav-link" data-dcnode-id="3262" data-id="democratization" data-toggle="pill" href="#pills-democratization" id="pills-democratization-tab" role="tab"><span data-dcnode-id="3264" instrument_node="">Democratization</span><div class="underbar" data-dcnode-id="3263"></div></a></li><li class="nav-item" data-dcnode-id="3257"><a aria-controls="pills-democratic-justifications-for-ubi" aria-selected="false" class="nav-link" data-dcnode-id="3258" data-id="democratic-justifications-for-ubi" data-toggle="pill" href="#pills-democratic-justifications-for-ubi" id="pills-democratic-justifications-for-ubi-tab" role="tab"><span data-dcnode-id="3260" instrument_node="">Democratic Justifications for UBI</span><div class="underbar" data-dcnode-id="3259"></div></a></li><li class="nav-item" data-dcnode-id="3253"><a aria-controls="pills-good-governance" aria-selected="false" class="nav-link" data-dcnode-id="3254" data-id="good-governance" data-toggle="pill" href="#pills-good-governance" id="pills-good-governance-tab" role="tab"><span data-dcnode-id="3256" instrument_node="">Good Governance</span><div class="underbar" data-dcnode-id="3255"></div></a></li></ul><div class="tab-content" data-dcnode-id="2807" id="pills-tabContent"><div aria-labelledby="pills-civic-participation-tab" class="tab-pane fade show active" data-dcnode-id="3154" id="pills-civic-participation" role="tabpanel"><p data-dcnode-id="3249"><em data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">This section discusses how UBI may impact citizens' political participation, especially voter turnout.</span></em></p><p data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Civic participation is the process of citizen engagement in the political life of a community. There are many forms of participation, including voting, volunteering, and campaigning, among others. The following summary first looks at the potential implications of UBI on citizens’ participation as a whole. It then narrows its focus to low-income citizens, who have historically evidenced low participation rates. Although UBI holds promise for increasing civic participation, the empirical evidence is scarce and uncertain.</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Some democratic theorists hold civic participation to be key to a successfully functioning democracy (Skocpol &amp; Fiorina, 2004). They worry about decreased civic participation in the form of declining voting rates and the shrinking presence of civic groups, such as volunteer organizations or unions. One potential cause of decreased participation may be increased time constraints on employed citizens. Indeed, there is some evidence that the amount of time college-educated Americans spend at work has been increasing (The Economist, 2014). Another potential explanation for the decline in civic associations in the United States is the increased labor force participation of upper and middle class women, whose unpaid labor in earlier generations may have been essential to the robustness of American civic life (Putnam, 2001).</span></p><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">If UBI impacts labor force participation, for instance by enabling a reduction of hours of formal labor, it may free up citizens’ time to engage in civic participation. There is some evidence that a UBI would enable individuals to exchange time spent at work for other activities they consider to be more valuable, such as education or child-rearing. Whether a UBI would increase civic participation among middle- and high-income citizens has yet to be empirically investigated.</span></p><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Democratic theorists are primarily worried about the participation of low-income citizens, whose levels have never been high to begin with. There is a strong literature demonstrating a correlation between political participation and level of income (Ojeda, 2018). In particular, the likelihood that one will vote is strongly correlated with socio-economic status and voter turnout increases with income level (Akee et al., 2018; Scholzman et al., 2018). The impact of income on participation is curvilinear, meaning that the effect of income on turnout is largest at the lower end of the income distribution (Ojeda, 2018; Rosenstone &amp; Hansen, 2009). In the political science literature, four causal mechanisms for this phenomenon have been articulated. First, low-income families may lack the skills and resources necessary for participation (Scholzman et al., 2018) second, mobilization efforts by campaigns and other organizations tend to ignore low-income communities (Rosenstone &amp; Hansen, 2009) third, policy agendas do not emphasize issues relevant to the them (Piven &amp; Cloward, 1988) and fourth, restrictions such as voter ID laws or felony disenfranchisement may disproportionately impact low-income citizens (Hershey, 2009).</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">A UBI could address some of these causal mechanisms, resulting in increased participation. If low-income citizens do not participate because of economic barriers, such as the inability to take time off from work or to find childcare on election day, then a significant UBI would help increase opportunities for electoral participation. It is also worth noting that a UBI could be a policy issue of direct significance to low-income citizens, which may in turn help create a class of voters that are more easily mobilized, similar to how the passing of social security legislation led to the emergence of elderly citizens as a political class (Campbell, 2011). There is also some evidence that the children of those who exit poverty are more likely to vote (Akee et al., 2018)which suggests a robust UBI could have long reaching effects on political participation.</span></p><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">But while UBI would remove some economic barriers, it would likely not remove barriers of language, political knowledge, or even interest. UBI, then, may be of limited impact as a solution to low and unequal civic participation. Moreover, versions of the UBI proposal that include cuts to other important services such as public education may actually negatively impact participation rather than boost it. UBI would of course also be unlikely to impact institutional barriers to participation, such as laws intended to restrict enfranchisement.</span></p><br data-dcnode-id="3236"><p data-dcnode-id="3233"><b data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3223"><li class="related-link" data-dcnode-id="3230" data-target="good-governance"><a data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Good Governance</span></a></li><li class="related-link" data-dcnode-id="3227" data-target="democratic-justifications-for-ubi"><a data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Democratic justifications for UBI</span></a></li><li class="related-link" data-dcnode-id="3224" data-target="economic-inequality"><a data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Economic Inequality</span></a></li></ul><br data-dcnode-id="3222"><div class="citations" data-dcnode-id="3155"><p data-dcnode-id="3219"><b data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Read more</span></b></p><p data-dcnode-id="3212"><span data-dcnode-id="3218" instrument_node="">Akee, R., Copeland, W., Costello, E. J., Holbein, J., &amp; Simeonova, E. (2018). </span><em data-dcnode-id="3216"><span data-dcnode-id="3217" instrument_node="">Family Income and the Intergenerational Transmission of Voting Behavior: Evidence from an Income Intervention</span></em><span data-dcnode-id="3215" instrument_node=""> (No. w24770; p. w24770). National Bureau of Economic Research. </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3386/w24770"><span data-dcnode-id="3214" instrument_node="">https://doi.org/10.3386/w24770</span></a></p><p data-dcnode-id="3207"><span data-dcnode-id="3211" instrument_node="">Campbell, A. L. (2011). </span><em data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">How Policies Make Citizens: Senior Political Activism and the American Welfare State</span></em><span data-dcnode-id="3208" instrument_node="">. Princeton University Press.</span></p><p data-dcnode-id="3199"><span data-dcnode-id="3206" instrument_node="">Hershey, M. R. (2009). What We Know about Voter-ID Laws, Registration, and Turnout. </span><em data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">PS: Political Science and Politics</span></em><span data-dcnode-id="3203" instrument_node="">, </span><em data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">42</span></em><span data-dcnode-id="3200" instrument_node="">(1), 87–91. JSTOR.</span></p><p data-dcnode-id="3189"><span data-dcnode-id="3198" instrument_node="">Ojeda, C. (2018). The Two Income-Participation Gaps. </span><em data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">American Journal of Political Science</span></em><span data-dcnode-id="3195" instrument_node="">, </span><em data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">62</span></em><span data-dcnode-id="3192" instrument_node="">(4), 813–829. </span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/ajps.12375"><span data-dcnode-id="3191" instrument_node="">https://doi.org/10.1111/ajps.12375</span></a></p><p data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node="">Piven, F. F., &amp; Cloward, R. A. (1988). </span><em data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">Why Americans don’t vote</span></em><span data-dcnode-id="3185" instrument_node=""> (1st ed). Pantheon Books.</span></p><p data-dcnode-id="3179"><span data-dcnode-id="3183" instrument_node="">Putnam, R. D. (2001). </span><em data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">Bowling alone: The collapse and revival of American community</span></em><span data-dcnode-id="3180" instrument_node=""> (1. touchstone ed). Simon &amp; Schuster.</span></p><p data-dcnode-id="3174"><span data-dcnode-id="3178" instrument_node="">Rosenstone, S. J., &amp; Hansen, J. M. (2009). </span><em data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Mobilization, Participation, and Democracy in America</span></em><span data-dcnode-id="3175" instrument_node="">. Longman.</span></p><p data-dcnode-id="3169"><span data-dcnode-id="3173" instrument_node="">Scholzman, K. L., Brady, H., &amp; Verba, S. (2018). </span><em data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">Unequal and Unrepresented: Political inequality and the people’s voice in the new gilded age.</span></em><span data-dcnode-id="3170" instrument_node=""> Princeton University Press.</span></p><p data-dcnode-id="3164"><span data-dcnode-id="3168" instrument_node="">Skocpol, T., &amp; Fiorina, M. P. (2004). </span><em data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Civic engagement in American democracy</span></em><span data-dcnode-id="3165" instrument_node="">. Brookings Institution Press ; Russell Sage Foundation.</span></p><p data-dcnode-id="3157"><span data-dcnode-id="3163" instrument_node="">The Economist. (2014, April 22). Nice work if you can get out. </span><em data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">The Economist</span></em><span data-dcnode-id="3160" instrument_node="">. </span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/finance-and-economics/2014/04/22/nice-work-if-you-can-get-out"><span data-dcnode-id="3159" instrument_node="">https://www.economist.com/finance-and-economics/2014/04/22/nice-work-if-you-can-get-out</span></a></p><br data-dcnode-id="3156"></div></div><div aria-labelledby="pills-democratization-tab" class="tab-pane fade" data-dcnode-id="3062" id="pills-democratization" role="tabpanel"><p data-dcnode-id="3151"><em data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">This section discusses how UBI might result in the democratization of spheres of life outside of political institutions, such as the workplace or the household.</span></em></p><p data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">Democratization is the process of making something—a regime, a culture, or a decision-making process—more “democratic,” that is, more reflective of the values of freedom and equality. One way of democratizing is by increasing access to democratic institutions, such as voting. But one can also democratize by increasing people’s ability to take advantage of the institutions to which they already have access; for instance, by making people more knowledgeable about the kinds of policies they vote for.</span></p><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">When democratic theorists consider the potential for UBI, they are especially interested in this type of democratization (Goodhart, 2008; Pateman, 2004). Democratic theorists often worry about the impact of economic dependency on democracy. Most obviously, individuals who are dependent in the private sphere may be more likely to be coerced in the public sphere. An authoritarian employer or husband could control how one votes or how much they donate. However, there are also subtler ways in which dependency could impact how one practices citizenship. For example, if one spends too much time working or at the service of their superiors, they might be prevented from engaging in the type of thinking and education necessary to productively participate in public life. Dependency might also impact one’s character, making one more “slavish” and less willing to think for themselves. Even Friedrich von Hayek, a defender of capitalism, wrote in the mid-twentieth century that workers—those who depend on capitalists for their subsistence—were “in many respects … alien and inimical to much that constitutes the driving force of a free society” (Hayek, 2010).</span></p><p data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Insofar as UBI alleviates economic dependency, it could contribute to reducing this problem. If one is economically independent, the thinking goes, one is more likely to be politically independent as well. The empirical evidence for this claim is more than uncertain though. Although theorists have posited that economic dependency has a negative impact on one’s democratic character, the effect of increased economic security through a program like UBI has not been measured. There are also many other, perhaps more significant, causes of “bad” democratic character, such as media misinformation or ideological segregation. In addition, employer pressure on political participation is already illegal and may not be widespread.</span></p><p data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">There is some limited evidence that UBI may result in individuals engaging in activities that could make them more independent citizens. For instance, there is some evidence of young adults receiving a basic income replacing workforce participation with education (McDonald &amp; Stephenson, 1979). If increased education—or the other activities that are substituted for work—turn individuals into better citizens, then UBI could have a positive impact on democratization in at least this indirect way.</span></p><p data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node="">Economic dependency is primarily worrisome because it may put some at the mercy of malicious actors, such as bad bosses or domineering family members, but democratic theorists have other considerations as well when it comes to increasing people’s ability to participate in democratic institutions. Even if there is no individual bad behavior, for example, the overarching way an institution is structured can impact the types of habits individuals build. Authoritarian institutions might cause individuals to develop submissive characters (Pateman, 2004). If the family and the workplace are inegalitarian, the argument goes, people will develop traits that make them unable to participate effectively in their democracies.</span></p><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Proponents of UBI argue that so long as the transfer is large enough, the policy would have a democratizing effect (Pateman, 2004). By enabling people to choose whether to work and who to work for, and by increasing their exit options, a basic income may prevent individuals from entering undemocratic or inegalitarian contracts. When individual actors have more economic security, undemocratic institutions could be reimagined and redesigned from the inside to become more democratic: workplaces and households could become more egalitarian, and workers and family members might be more likely to practice the virtues required for autonomous decision making.</span></p><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">These positive outcomes are largely speculative though. There is little evidence as to whether economic independence would in fact lead to workers choosing workplaces wherein they can practice democratic virtues, or whether the threat of exit would force employers to reform their internal governance structures. However, there are some promising indicators. The basic income experiments in Madhya Pradesh, India resulted in anecdotal evidence regarding an increase in collective work, describing nascent workers’ collectives. In addition, there was a significant switch among individuals from wage-labor to ‘own-account’ work (that is, work done for one’s own profit) (SEWA Bharat, 2014). If becoming “one’s own boss” inculcates or develops democratic virtues, then such a switch would not only be empowering for the individuals, but also beneficial for the polity. As for making families more egalitarian, there is some evidence that cash transfers do improve the standing of women within households, making them more economically independent and/or giving them greater power in household decision-making (SEWA Bharat, 2014). This may result in more “democratized” homes (Pateman, 2004).</span></p><p data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">But there may be reasons to question whether UBI can democratize in the ways its proponents propose. Opponents of UBI argue that it may provide economic independence but would not result in democratizing reforms of the workplace (Gourevitch, 2016). In particular, they argue that basic income only reduces power asymmetries in the workplace for individuals who have an instrumental reason to work; that is, for individuals who work because they depend on its income. But individuals have many other reasons for working; for instance, they may depend on a position for meaning or social connectedness. These workers may remain locked into authoritarian workplaces because the mere “freedom to exit” does not necessarily yield alternative satisfactory opportunities. More generally, democratic reforms do not necessarily logically follow from the right to exit. Since UBI treats workers as separate market participants, it may reduce workers’ ability to organize collectively, decreasing both their access to that particular democratic avenue, hindering their ability to reform organizations. More research is thus required to understand better the relationship between UBI and the democratization of the workplace.</span></p><br data-dcnode-id="3134"><p data-dcnode-id="3131"><b data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3115"><li class="related-link" data-dcnode-id="3128" data-target="democratic-justifications-for-ubi"><a data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">Democratic justifications for UBI</span></a></li><li class="related-link" data-dcnode-id="3125" data-target="the-household"><a data-dcnode-id="3126"><span data-dcnode-id="3127" instrument_node="">The household</span></a></li><li class="related-link" data-dcnode-id="3122" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="3119" data-target="collective-bargaining"><a data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">Bargaining power</span></a></li><li class="related-link" data-dcnode-id="3116" data-target="work-beyond-jobs"><a data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Work beyond Jobs</span></a></li></ul><br data-dcnode-id="3114"><p data-dcnode-id="3111"><b data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Read more</span></b></p><p data-dcnode-id="3106"><span data-dcnode-id="3110" instrument_node="">Goodhart, M. (2008). A Democratic Defense of Universal Basic Income. In </span><em data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Illusion of Consent: Engaging with Carole Pateman</span></em><span data-dcnode-id="3107" instrument_node=""> (pp. 139–162). Penn State University Press.</span></p><p data-dcnode-id="3096"><span data-dcnode-id="3105" instrument_node="">Gourevitch, A. (2016). The Limits of a Basic Income: Means and Ends of Workplace Democracy. </span><em data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="3102" instrument_node="">, </span><em data-dcnode-id="3100"><span data-dcnode-id="3101" instrument_node="">11</span></em><span data-dcnode-id="3099" instrument_node="">(1), 17–28. </span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/bis-2016-0008"><span data-dcnode-id="3098" instrument_node="">https://doi.org/10.1515/bis-2016-0008</span></a></p><p data-dcn
