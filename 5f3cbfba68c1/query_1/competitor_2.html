ousehold Spending to the Alaska Permanent Fund Dividend Using CE Data</span></em><span data-dcnode-id="2104" instrument_node=""> (SSRN Scholarly Paper ID 2634005). Social Science Research Network. </span><a data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papers.ssrn.com/abstract%3D2634005"><span data-dcnode-id="2103" instrument_node="">https://papers.ssrn.com/abstract=2634005</span></a></p><p data-dcnode-id="2097"><span data-dcnode-id="2100" instrument_node="">Kueng, L. (2018). Excess Sensitivity of High-Income Consumers* | The Quarterly Journal of Economics | Oxford Academic. *Quarterly Journal of Economics*, *133*(4). </span><a data-dcnode-id="2098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/qje/article/133/4/1693/5036538"><span data-dcnode-id="2099" instrument_node="">https://academic.oup.com/qje/article/133/4/1693/5036538</span></a></p><p data-dcnode-id="2087"><span data-dcnode-id="2096" instrument_node="">McDonald, J. F., &amp; Stephenson, S. P. (1979). The Effect of Income Maintenance on the School-Enrollment and Labor-Supply Decisions of Teenagers. </span><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">The Journal of Human Resources</span></em><span data-dcnode-id="2093" instrument_node="">, </span><em data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">14</span></em><span data-dcnode-id="2090" instrument_node="">(4), 488. </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2307/145319"><span data-dcnode-id="2089" instrument_node="">https://doi.org/10.2307/145319</span></a></p><p data-dcnode-id="2077"><span data-dcnode-id="2086" instrument_node="">Prescott, D., Swidinsky, R., &amp; Wilton, D. A. (1986). Labour Supply Estimates for Low-Income Female Heads of Household Using Mincome Data. </span><em data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">The Canadian Journal of Economics</span></em><span data-dcnode-id="2083" instrument_node="">, </span><em data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">19</span></em><span data-dcnode-id="2080" instrument_node="">(1), 134. </span><a data-dcnode-id="2078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2307/135175"><span data-dcnode-id="2079" instrument_node="">https://doi.org/10.2307/135175</span></a></p><p data-dcnode-id="2072"><span data-dcnode-id="2076" instrument_node="">Samson, M., Lee, U., Ndlebe, A., MacQuene, K., &amp; van Niekerk, I. (2004). </span><em data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Final Report: The Social and Economic Impact of South Africa’s Social Security System</span></em><span data-dcnode-id="2073" instrument_node=""> (p. 290).</span></p><p data-dcnode-id="2062"><span data-dcnode-id="2071" instrument_node="">Widerquist, K. (2005). A failure to communicate: What (if anything) can we learn from the negative income tax experiments? </span><em data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">The Journal of Socio-Economics</span></em><span data-dcnode-id="2068" instrument_node="">, </span><em data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">34</span></em><span data-dcnode-id="2065" instrument_node="">(1), 49–81. </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.socec.2004.09.050"><span data-dcnode-id="2064" instrument_node="">https://doi.org/10.1016/j.socec.2004.09.050</span></a></p><p data-dcnode-id="2055"><span data-dcnode-id="2061" instrument_node="">Widerquist, K. (2018). </span><em data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">A Critical Analysis of Basic Income Experiments for Researchers, Policymakers, and Citizens</span></em><span data-dcnode-id="2058" instrument_node="">. Springer International Publishing. </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/978-3-030-03849-6"><span data-dcnode-id="2057" instrument_node="">https://doi.org/10.1007/978-3-030-03849-6</span></a></p><br data-dcnode-id="2054"></div><div aria-labelledby="pills-savings-tab" class="tab-pane fade" data-dcnode-id="1786" id="pills-savings" role="tabpanel"><p data-dcnode-id="2050"><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">This section discusses UBI’s potential effects on savings and investment.</span></em></p><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">For many people, one of the most important objectives of UBI is to reduce poverty. The hope is that UBI would not only help people meet their daily needs, but also provide the basis for a more secure life by facilitating investments in asset accumulation and human capital development, both of which provide pathways out of poverty.</span></p><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Other welfare or cash assistance policies place limits on what assets an individual can hold in order to receive support, or they reduce the level of assistance an individual receives if he or she has income from wages or earnings. But UBI is an income floor, or ‘base,’ which means it may then allow for savings and investment of additional income into productive assets. Savings create a pathway out of poverty because it helps relax credit constraints that limit people’s ability to make bigger purchases—such as farming equipment or housing improvements—that contribute to long-term income (Banerjee et al., 2019). Savings also act as a safety net for people to participate in productive activities such as education and take up riskier enterprises such as entrepreneurship (Banerjee et al., 2019; Hoynes &amp; Rothstein, 2019).</span></p><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">While evidence of the impact of UBI on savings is scarce for high-income countries, evidence in low- and middle-income settings robustly supports the notion that UBI encourages savings. Evidence from Kenya’s GiveDirectly unconditional cash experiment, for example, led to significant increases in savings in the short run (Haushofer &amp; Shapiro, 2016), as did unconditional cash transfer programs in Zambia (Handa et al., 2018; Natali et al., 2016). Conditional cash transfer programs (Angelucci et al., 2012; Covarrubias et al., 2012) have arrived at similar conclusions. Moreover, there is some evidence that the savings effect may persist for several years. In the Kenyan experiment, recipients still held 40 percent more assets and financial savings than non-recipients three years after the transfer (Haushofer &amp; Shapiro, 2018). The more long-term durability is less clear, with one study indicating that the effect on savings diminished over nine years (Blattman et al., 2018).</span></p><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">How much of the extra income from UBI do people invest? Most studies of cash transfer programs in developing countries suggest people invest a large proportion of the overall amount. In the GiveDirectly experiment, differences in assets were largely driven by investments in productive assets such as livestock and durables (Haushofer &amp; Shapiro, 2016). In Malawi, unconditional cash transfers to low-income households led to significantly increased investment in agricultural assets (Covarrubias et al., 2012). In Mexico, recipients of the Oportunidades conditional cash transfers were found to invest 26 percent of their extra income, increasing agricultural income by 10 percent per person after 18 months (Gertler et al., 2012). A conditional cash transfer program in Nicaragua, however, was found to have no significant impact on either agricultural or non-agricultural investment (Malucci, 2010).</span></p><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">The types of assets that people invest in are also influenced by economics opportunities where they live. In poorer areas, people tend to invest their income from cash transfers in basic durable goods, such as metal roofs (Haushofer &amp; Shapiro, 2016), while individuals in agricultural economies are more likely to invest in agricultural assets such as livestock and crop implements (Covarrubias et al., 2012; Gertler et al., 2012). Across contexts, people invest a significant proportion of their extra income in human capital, such as health and education. Robust evidence from Latin America and Sub-Saharan Africa shows that cash transfers boosted school enrolment, especially for girls, and healthcare spending, especially on children (Barrientos &amp; DeJong, 2006; Davis et al., 2012; Fiszbein et al., 2019). In Canada, male adolescents in Manitoba deferred entering the workforce in order to continue school attendance (Forget, 2011).</span></p><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Several other factors related to the design features of the transfer and the contextual conditions where it is delivered are also relevant for UBI’s effect on savings and investment. The frequency of payment, for example, was found to affect savings in Kenya (Haushofer &amp; Shapiro, 2018), with more/less frequent payments associated with greater spending on durable goods. While research from high-income contexts is scarce, there is some evidence to suggest differences in patterns of savings and investment. The most evidence for UBI’s impact on savings is from lower-income contexts where individuals face more severe credit constraints, while less is known about contexts where credit is more readily accessible. Evidence from a conditional cash transfer program in Mexico shows that urban recipients who enjoyed more access to credit than their rural counterparts used the cash transfers to pay off debts, and that savings was a smaller proportion of their income (Angelucci et al., 2012). In the case of the Alaska Permanent Dividend Fund (PDF), a universal transfer, the way that transfers are used may be related to a recipient’s income. For example, researchers theorized that an increase in economic inequality was due to differences in how the disbursement was used, with high-income households directing the transfer to investments, increasing the wealth gap (Kozminski &amp; Baek, 2017).</span></p><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">What are alternatives to UBI in alleviating income inequality? We know that ownership of income-generating assets is an important source of income inequality (Birdsall &amp; Londodo, 1997). So, one alternative to UBI is “basic capital”—a relatively large, unconditional, one-time, lump-sum grant, given to every adult in a community (Alstott &amp; Ackerman, 1999; White, 2011). Basic capital has one important advantage over UBI: it allows recipients to invest a larger proportion of their grants upfront, thus offering more opportunity than UBI for low-income individuals to own income-generating assets. Basic capital, however, has limitations of its own and the proposed amount is generally smaller than the total amount of UBI over the long run.</span></p><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Overall, while more evidence from advanced economies is needed, the evidence on UBI’s positive effects on savings and investment is promising. More research is also needed on how program factors (such as frequency of payment) affect savings and investment, and on which groups (based on factors such as income, gender, or family composition) see the largest effects.</span></p><br data-dcnode-id="2033"><p data-dcnode-id="2030"><b data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2017"><li class="related-link" data-dcnode-id="2027" </span><span class="theme-orb" data-dcnode-id="1780"></span><span class="text" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Race</span></span><svg class="expand-icon icon" data-dcnode-id="1775" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1777" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="1776" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="1773" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1774" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-race" class="collapse" data-dcnode-id="1327" data-id="race" data-parent="#accordionExample" id="collapse-race"><div class="card-body" data-dcnode-id="1328"><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="1756" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="1765"><a aria-controls="pills-racialized-welfare-stereotypes" aria-selected="true" class="nav-link active" data-dcnode-id="1766" data-id="racialized-welfare-stereotypes" data-toggle="pill" href="#pills-racialized-welfare-stereotypes" id="pills-racialized-welfare-stereotypes-tab" role="tab"><span data-dcnode-id="1768" instrument_node="">Racialized Welfare Stereotypes</span><div class="underbar" data-dcnode-id="1767"></div></a></li><li class="nav-item" data-dcnode-id="1761"><a aria-controls="pills-racial-economic-inequality" aria-selected="false" class="nav-link" data-dcnode-id="1762" data-id="racial-economic-inequality" data-toggle="pill" href="#pills-racial-economic-inequality" id="pills-racial-economic-inequality-tab" role="tab"><span data-dcnode-id="1764" instrument_node="">Racial Economic Inequality</span><div class="underbar" data-dcnode-id="1763"></div></a></li><li class="nav-item" data-dcnode-id="1757"><a aria-controls="pills-guaranteed-income-in-african-american-history" aria-selected="false" class="nav-link" data-dcnode-id="1758" data-id="guaranteed-income-in-african-american-history" data-toggle="pill" href="#pills-guaranteed-income-in-african-american-history" id="pills-guaranteed-income-in-african-american-history-tab" role="tab"><span data-dcnode-id="1760" instrument_node="">Guaranteed Income in African American History</span><div class="underbar" data-dcnode-id="1759"></div></a></li></ul><div class="tab-content" data-dcnode-id="1329" id="pills-tabContent"><div aria-labelledby="pills-racialized-welfare-stereotypes-tab" class="tab-pane fade show active" data-dcnode-id="1592" id="pills-racialized-welfare-stereotypes" role="tabpanel"><p data-dcnode-id="1753"><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">This section considers how UBI could help displace racialized welfare stereotypes in the United States.</span></em></p><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">During the twentieth century, welfare and antipoverty policies were repeatedly tainted by negative racialized stereotypes, which contributed to policies prone to exacerbating social and racial inequities rather than alleviating them (Bhattacharya, 2019). In the 1930s, under the New Deal, welfare in the United States, also known as the Aid to Dependent Children, was created to offer financial assistance to women whose husbands couldn’t work, were absent or dead. The architects designed the policies assuming that most beneficiaries would be white widows. When poor Black women applied, they were systematically discriminated: their claims were rejected or additional conditions were imposed on them to qualify (Nadasen, 2005).</span></p><p data-dcnode-id="1746"><span data-dcnode-id="1750" instrument_node="">Beginning in the 1950s and 1960s, with poverty on the rise, civil rights movements began demanding radical changes to the welfare system in the form of a guaranteed income. But, at the same time, organized groups started developing rhetoric that connected blackness with welfare abuse. In 1965, Daniel Patrick Moynihan’s </span><em data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">The Negro Family: The Case for National Action</span></em><span data-dcnode-id="1747" instrument_node=""> listed a series of ills, including welfare dependency, that he argued directly contributed to poverty in Black America (Moynihan, 1965). In 1976, Ronald Reagan, while campaigning in the presidential primaries, introduced the case of a woman in Chicago who was fraudulently taking advantage of public welfare. The woman had 80 different names, 30 addresses, 12 social security cards, and drove a pink Cadillac around to cash her various welfare checks. While Reagan never mentioned that she was Black, he didn’t have to—the narrative fit the perception that many white, working-class Americans had at the time (Cammett, 2014; Primuth, 2016). The story helped craft the myth of the “Welfare Queen,” which demonizes Black women as lazy, promiscuous, negligent mothers who free-ride on public assistance and have no self-discipline or work ethic (Covert, 2019; Masters et al., 2014). Reagan and other politicians would go on to use the trope of the welfare queen, as well as other racialized stereotypes, to decrease overall support for public assistance and to enforce policies that systematically excluded African American citizens (Black &amp; Sprague, 2017; Neubeck &amp; Cazenave, 2001; Primuth, 2016).</span></p><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Today, despite the fact that most welfare recipients are white or Latinx, racialized stereotypes are still pervasive, undermining access to welfare and perpetuating racial disparities in the United States (Black &amp; Sprague, 2017). The ratios of Temporary Assistance for Needy Families (TANF) grants to the number of families with children in poverty are the lowest in the states with the largest share of Black Americans: almost 40 percent of the nation’s Black population lives in states with ratios (known as TPRs) of 10 or less, compared to only 28 percent of the white population. Therefore, nationally, Black families are less likely than white families to have access to TANF assistance when they fall into crisis (Floyd et al., 2018). By failing to ensure that the Black community has access to basic necessities, inadequate government welfare policies perpetuate racial and gender injustices. The disinvestment in welfare policies as a result of anti-blackness further harms other communities living in poverty since it contributes to undermining support for public assistance more generally.</span></p><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">A UBI could potentially mitigate some of the consequences of racialized welfare stereotypes. A UBI, unlike other welfare reforms, normalizes social assistance because it is administered universally to each citizen, regardless of individual financial status, thus making it more difficult to fuel the myth that recipients are disproportionately Black and female (Bidadanure, 2019; Shelby, 2017; Warren, 2016). If every citizen receives universal benefits from the government, it may become more difficult to vilify certain groups as scroungers, and it may disrupt the way welfare is coded in the United States. The historical processes that have associated welfare with free riding have undermined support for assistance and made it harder for recipients to preserve dignity and respect. Turning all residents of a national community into a recipient could potentially alleviate some of the stigma connected with receiving public assistance.</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Anti-blackness, however, is a far more pervasive problem than the resulting consequence of racialized welfare stigmatization. It is entirely reasonable to expect the deeply rooted phenomenon would find other ways to manifest itself and continue to undermine economic and social equality. Various efforts to induce a larger cultural shift away from structural racism and racist representations is also key to witnessing positive change.</span></p><p data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">More indirectly, but very importantly, UBI could help challenge the current racial and gendered narratives about the importance of other types of work, including caregiving (such as caring for an older adult, disabled person or child) which is currently largely performed by women of color (Nadasen, 2005). A sufficiently high UBI would make dedicating time to care-work within one’s own family or community more financially viable and, in turn, destigmatize it and help it regain the centrality it deserves (Robeyns, 2001; Zelleke, 2008). As previously noted, it would be naïve to expect these narrative changes to happen without a concerted effort to also challenge cultural and discursive tenets more directly. But, by potentially removing some barriers to access associated with the conditions currently placed on public welfare benefits (e.g. employment status, marital status, drug testing, among others, used to specifically exclude particular groups) and by facilitating the choice of caring for one’s own family without living in abject poverty, UBI could nonetheless have a positive impact on racial justice.</span></p><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">It is, of course, impossible for a single policy to reverse decades of intentionally manufactured negative public perception around welfare itself. For all the potential a UBI policy has in countering racial tropes, it also has its limitations. Net-beneficiaries of UBI might still be resented by those who are net contributors, and so patterns of stigmatization and demonization could survive the change. Changing attitudes, narratives and perceptions would require other systemic changes alongside a UBI to guarantee success on this front (Roberts, 1996). Nonetheless, programs like the Magnolia Mothers Trust in Jackson, Mississippi, that tackle head on taboos around Black motherhood and cash are leading the way in helping shift narrative around deservingness, solidarity and equity (Black &amp; Sprague, 2017).</span></p><br data-dcnode-id="1735"><p data-dcnode-id="1732"><b data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1716"><li class="related-link" data-dcnode-id="1729" data-target="racial-economic-inequality"><a data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Racial economic inequality</span></a></li><li class="related-link" data-dcnode-id="1726" data-target="guaranteed-income-in-african-american-history"><a data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Guaranteed income in African American history</span></a></li><li class="related-link" data-dcnode-id="1723" data-target="economic-inequality"><a data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Economic inequality</span></a></li><li class="related-link" data-dcnode-id="1720" data-target="care-work"><a data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="1717" data-target="collective-bargaining"><a data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Bargaining power</span></a></li></ul><br data-dcnode-id="1715"><div class="citations" data-dcnode-id="1593"><p data-dcnode-id="1712"><b data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Read more</span></b></p><p data-dcnode-id="1707"><span data-dcnode-id="1711" instrument_node="">Bhattacharya, J. (2019). </span><em data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Exploring Basic Income through a Race and Gender Justice Lens</span></em><span data-dcnode-id="1708" instrument_node="">. Roosevelt Institute.</span></p><p data-dcnode-id="1697"><span data-dcnode-id="1706" instrument_node="">Bidadanure, J. U. (2019). The Political Theory of Universal Basic Income. </span><em data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Annual Review of Political Science</span></em><span data-dcnode-id="1703" instrument_node="">, </span><em data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">22</span></em><span data-dcnode-id="1700" instrument_node="">(1), 481–501. </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1146/annurev-polisci-050317-070954"><span data-dcnode-id="1699" instrument_node="">https://doi.org/10.1146/annurev-polisci-050317-070954</span></a></p><p data-dcnode-id="1690"><span data-dcnode-id="1696" instrument_node="">Black, R., &amp; Sprague, A. (2017). </span><em data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Becoming Visible. Race, Economic Security, and Political Voice in Jackson, Mississippi</span></em><span data-dcnode-id="1693" instrument_node="">. New America, Springboard to Opportunities. </span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacksonfreepress.com/documents/2017/nov/29/becoming-visible-report-new-america-springboard-op/"><span data-dcnode-id="1692" instrument_node="">https://www.jacksonfreepress.com/documents/2017/nov/29/becoming-visible-report-new-america-springboard-op/</span></a></p><p data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node="">Cammett, A. (2014). Deadbeat Dads &amp; Welfare Queens: How Metaphor Shapes Poverty Law. </span><em data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Boston College Journal of Law and Social Justice</span></em><span data-dcnode-id="1686" instrument_node="">, </span><em data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">34</span></em><span data-dcnode-id="1683" instrument_node="">(2), 233–265.</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1681" instrument_node="">Covert, B. (2019). The Myth of the Welfare Queen. </span><em data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">The New Republic</span></em><span data-dcnode-id="1678" instrument_node="">. </span><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newrepublic.com/article/154404/myth-welfare-queen"><span data-dcnode-id="1677" instrument_node="">https://newrepublic.com/article/154404/myth-welfare-queen</span></a></p><p data-dcnode-id="1668"><span data-dcnode-id="1674" instrument_node="">Floyd, I., Burnside, A., &amp; Schott, L. (2018). </span><em data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">TANF Reaching Few Poor Families</span></em><span data-dcnode-id="1671" instrument_node="">. Center on Budget and Policy Priorities. </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/research/family-income-support/tanf-reaching-few-poor-families"><span data-dcnode-id="1670" instrument_node="">https://www.cbpp.org/research/family-income-support/tanf-reaching-few-poor-families</span></a></p><p data-dcnode-id="1658"><span data-dcnode-id="1667" instrument_node="">Masters, N. T., Lindhorst, T. P., &amp; Meyers, M. K. (2014). Jezebel at the Welfare Office: How Racialized Stereotypes of Poor Women’s Reproductive Decisions and Relationships Shape Policy Implementation. </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Journal of Poverty</span></em><span data-dcnode-id="1664" instrument_node="">, </span><em data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">18</span></em><span data-dcnode-id="1661" instrument_node="">(2), 109–129. </span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10875549.2013.833159"><span data-dcnode-id="1660" instrument_node="">https://doi.org/10.1080/10875549.2013.833159</span></a></p><p data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">Moynihan, D. P. (1965). </span><em data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">The Moynihan report: The negro family–the case for national action</span></em><span data-dcnode-id="1654" instrument_node="">. Cosimo Reports.</span></p><p data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">Nadasen, P. (2005). </span><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Welfare warriors: The welfare rights movement in the United States</span></em><span data-dcnode-id="1649" instrument_node="">. Routledge.</span></p><p data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">Neubeck, K. J., &amp; Cazenave, N. A. (2001). </span><em data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Welfare racism: Playing the race card against America’s poor</span></em><span data-dcnode-id="1644" instrument_node="">. Routledge.</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1642" instrument_node="">Primuth, R. (2016). Ronald Reagan’s Use of Race in the 1976 and 1980 Presidential Elections. </span><em data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Georgia Historical Quarterly</span></em><span data-dcnode-id="1639" instrument_node="">, </span><em data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">100</span></em><span data-dcnode-id="1636" instrument_node="">(1), 36–66.</span></p><p data-dcnode-id="1627"><span data-dcnode-id="1634" instrument_node="">Roberts, D. (1996). Welfare and the Problem of Black Citizenship. </span><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">The Yale Law Journal</span></em><span data-dcnode-id="1631" instrument_node="">, </span><em data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">105</span></em><span data-dcnode-id="1628" instrument_node="">, 1563–1602.</span></p><p data-dcnode-id="1617"><span data-dcnode-id="1626" instrument_node="">Robeyns, I. (2001). Will a Basic Income Do Justice to Women? </span><em data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Analyse &amp; Kritik</span></em><span data-dcnode-id="1623" instrument_node="">, </span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">23</span></em><span data-dcnode-id="1620" instrument_node="">(1), 88–105. </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/auk-2001-0108"><span data-dcnode-id="1619" instrument_node="">https://doi.org/10.1515/auk-2001-0108</span></a></p><p data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">Shelby, T. (2017). A Blow to Ghettoization. </span><em data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Boston Review</span></em><span data-dcnode-id="1613" instrument_node="">, 41–46.</span></p><p data-dcnode-id="1605"><span data-dcnode-id="1611" instrument_node="">Warren, D. (2016). Universal Basic Income and Black Communities in the United States. </span><em data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Working Paper</span></em><span data-dcnode-id="1608" instrument_node="">. </span><a data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view"><span data-dcnode-id="1607" instrument_node="">https://drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view</span></a></p><p data-dcnode-id="1595"><span data-dcnode-id="1604" instrument_node="">Zelleke, A. (2008). Institutionalizing the Universal Caretaker Through a Basic Income? </span><em data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="1601" instrument_node="">, </span><em data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">3</span></em><span data-dcnode-id="1598" instrument_node="">(3), 1–9. </span><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1133"><span data-dcnode-id="1597" instrument_node="">https://doi.org/10.2202/1932-0183.1133</span></a></p><br data-dcnode-id="1594"></div></div><div aria-labelledby="pills-racial-economic-inequality-tab" class="tab-pane fade" data-dcnode-id="1471" id="pills-racial-economic-inequality" role="tabpanel"><p data-dcnode-id="1589"><em data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">This section discusses how UBI could possibly reduce some racial economic inequalities in the United States.</span></em></p><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Since the founding of the United States, unequal policies have restricted financial opportunities for many and perpetuated the intergenerational transmission of poverty and racial economic inequality. Federal policies, like the G.I. Bill and the process of “redlining,” helped mostly white Americans obtain college degrees and purchase homes, the bedrock of wealth-creation, while systematically excluding African-Americans (Bhattacharya, 2019; Traub et al., 2017). Black households, instead, had to endure school segregation, limited access to financial institutions and racialized mass incarceration practices. Additionally, they were forced into predatory mortgage agreements, confined to impoverished neighborhoods, and excluded from other essential goods and governmental services (Alexander &amp; West, 2020; Bertocchi &amp; Dimico, 2011; Coates, 2014).</span></p><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">These processes combined with lower wages and income have contributed to large economic inequalities and a glaring wealth gap. Today, in the U.S., the median white family has a net wealth of $171,000, whereas the median Black family has a net wealth of roughly $17,000 (Oliver &amp; Shapiro, 2019). Neither obtaining a college degree nor working full time closes the divide (Traub et al., 2017). The gap is not explained by fiscal irresponsibility either: white households in fact tend to consume more than Black households of the same income (Traub et al., 2017).</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">This wealth gap is concerning for the injustices it reveals, but also for its consequences. Wealth creates opportunities for individuals and households to invest in education and entrepreneurial ventures, maintain savings, transition between jobs, and handle unforeseen expenses. It also affords choice and self-empowerment, and it gives access to power. The lack of wealth and economic opportunities, conversely, minimizes the chance of upward mobility and economic stability (Hanks et al., 2018). Black households, therefore, are more likely to be ill-equipped for future investments—such as college tuition or a down payment—as well as unanticipated financial shocks such as a medical emergency or layoff. Without transformative policy interventions, it would take at least 200 years to end the Black-white wealth gap in the United States (Hanks et al., 2018).</span></p><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">A single policy cannot counteract economic inequalities grounded in centuries-long oppression, but a UBI could at least ensure that households meet their basic needs and possibly reduce their debt. First, a universal basic income would most benefit those at the bottom of the income distribution, because it would represent a larger proportional boost in a household’s overall income. This includes those who are formally incarcerated who have historically been left out of welfare programs or forced to meet onerous conditions (Bhattacharya, 2019; Warren, 2016). Second, a basic income funded through redistribution could potentially help mitigate some of the effects of discrimination in labor markets, which disproportionately disadvantages Black Americans. Racial prejudice in the employment process—hiring, promoting, compensating—means many Americans of color make only a fraction of what white Americans make: at median income, Black Americans earned 65 percent as much as white Americans in 2016 (Kochhar &amp; Cilluffo, 2018). As a result, those racialized as Black often find themselves disproportionately vulnerable to economic insecurity. Black Americans are about twice as likely to be behind on bill payments as white Americans. Recent evidence from the Magnolia Mother’s Trust experiment in Jackson, Mississippi, showed that within a year, a cash transfer of $1,000 a month allowed 80 percent of participants to pay their bills without additional support, an increase from 37 percent at the start of the experiment (Springboard To Opportunities, 2020).</span></p><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">The implementation of a generous basic income ensures that all Americans, regardless of employment status, can cover basic necessities, especially during periods of precarious employment and income irregularities. But a UBI may also increase the ability of Black households to save, which could then be used to invest in educational or entrepreneurial pursuits. It could enable wealth-building opportunities often impossible on income from labor alone. A progressively funded UBI could then directly address the disparities of income and wealth between Black and white Americans (Warren, 2016). Moreover, since white Americans typically earn more than Black Americans, a larger proportion of their UBI would be taxed back. This is another reason why Black Americans may disproportionately benefit from a UBI even if it is a universal policy (of course, this is only true of UBI programs that are funded at least in part by progressive income taxes). This would essentially amount to a form of reparation that corrects for some of the previous wealth hoarding among white Americans as the result of racially-discriminatory governmental policies (Warren, 2016).</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Even more straightforwardly relevant to racial economic injustice, a UBI “Plus” has been proposed as a potential policy to directly address the racial economic disparities brought on by structural racism in the United States (Warren, 2017). The modified version of this idea, Universal PLUS Basic Income (U+BI), parallels most basic income proposals—an unconditional cash transfer provided to everyone on a regular basis. However, U+BI also includes a pro-rated additional amount for Black Americans for a specific time period, potentially funded through a divestment from carceral institutions. This portion of U+BI would function as reparations: it would serve to acknowledge the systemic disadvantages African Americans faced under Jim Crow and slavery and to restitute a group that is worse off as a result (Warren, 2017). U+BI would likely face popular opposition given its explicit emphasis on racial equity and reparations. The additional payment to Black Americans could provoke racial resentment and further perpetuate the existing stigmatization of Black Americans as welfare recipients. This may be a barrier to political feasibility. But, clearly, the U+BI proposal does more directly and frontally address the racial wealth gap than a redistributive UBI program.</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">While there is great potential for UBI, a basic income policy alone cannot close the racial wealth gap. Critics of UBI have argued that other policies—such as baby bonds, student debt forgiveness, and a federal jobs guarantee, or a mix of those proposals—would better address racial economic inequities (Ackerman &amp; Alstott, 2004; Oliver &amp; Shapiro, 2019). Since UBI focuses largely on stabilizing income (Oliver &amp; Shapiro, 2019), the extent to which it could decrease wealth disparities has yet to be tested and would depend on the specific way the policy is funded, as well as on whether it replaces or supplements other safety net programs. Closing the racial income and wealth gap, in a timely fashion, would also require eliminating workplace discrimination and mass-incarceration as well as implementing reparations.</span></p><br data-dcnode-id="1574"><p data-dcnode-id="1571"><b data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1561"><li class="related-link" data-dcnode-id="1568" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="1565" data-target="economic-inequality"><a data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Economic inequality</span></a></li><li class="related-link" data-dcnode-id="1562" data-target="guaranteed-income-in-african-american-history"><a data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Guaranteed income in African American history</span></a></li></ul><br data-dcnode-id="1560"><p data-dcnode-id="1557"><b data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Read more</span></b></p><p data-dcnode-id="1547"><span data-dcnode-id="1556" instrument_node="">Ackerman, B., &amp; Alstott, A. (2004). Why Stakeholding? </span><em data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="1553" instrument_node="">, </span><em data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">32</span></em><span data-dcnode-id="1550" instrument_node="">(1), 41–60. </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261096"><span data-dcnode-id="1549" instrument_node="">https://doi.org/10.1177/0032329203261096</span></a></p><p data-dcnode-id="1542"><span data-dcnode-id="1546" instrument_node="">Alexander, M., &amp; West, C. (2020). </span><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">The new Jim Crow: Mass incarceration in the age of colorblindness</span></em><span data-dcnode-id="1543" instrument_node="">.</span></p><p data-dcnode-id="1535"><span data-dcnode-id="1541" instrument_node="">Bertocchi, G., &amp; Dimico, A. (2011). </span><em data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">The Evolution of the Racial Gap in Education and the Legacy of Slavery</span></em><span data-dcnode-id="1538" instrument_node=""> (No. 6192; Discussion Paper Series). Forschungsinstitut zur Zukunft der Arbeit Institute for the Study of Labor. </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ftp.iza.org/dp6192.pdf"><span data-dcnode-id="1537" instrument_node="">http://ftp.iza.org/dp6192.pdf</span></a></p><p data-dcnode-id="1530"><span data-dcnode-id="1534" instrument_node="">Bhattacharya, J. (2019). </span><em data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Exploring Basic Income through a Race and Gender Justice Lens</span></em><span data-dcnode-id="1531" instrument_node="">. Roosevelt Institute.</span></p><p data-dcnode-id="1523"><span data-dcnode-id="1529" instrument_node="">Coates, T.-N. (2014). The Case for Reparations. </span><em data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">The Atlantic</span></em><span data-dcnode-id="1526" instrument_node="">. </span><a data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/magazine/archive/2014/06/the-case-for-reparations/361631/"><span data-dcnode-id="1525" instrument_node="">https://www.theatlantic.com/magazine/archive/2014/06/the-case-for-reparations/361631/</span></a></p><p data-dcnode-id="1516"><span data-dcnode-id="1522" instrument_node="">Hanks, A., Solomon, D., &amp; Weller, C. (2018). </span><em data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Systematic Inequality: How America’s Structural Racism Helped Create the Black-White Wealth Gap</span></em><span data-dcnode-id="1519" instrument_node=""> (Race and Ethnicity). Center for American Progress. </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanprogress.org/issues/race/reports/2018/02/21/447051/systematic-inequality/"><span data-dcnode-id="1518" instrument_node="">https://www.americanprogress.org/issues/race/reports/2018/02/21/447051/systematic-inequality/</span></a></p><p data-dcnode-id="1509"><span data-dcnode-id="1515" instrument_node="">Kochhar, R., &amp; Cilluffo, A. (2018, July 12). Racial and ethnic income inequality in America: 5 key findings. </span><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Pew Research Center: FactTank News in the Numbers</span></em><span data-dcnode-id="1512" instrument_node="">. </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2018/07/12/key-findings-on-the-rise-in-income-inequality-within-americas-racial-and-ethnic-groups/"><span data-dcnode-id="1511" instrument_node="">https://www.pewresearch.org/fact-tank/2018/07/12/key-findings-on-the-rise-in-income-inequality-within-americas-racial-and-ethnic-groups/</span></a></p><p data-dcnode-id="1499"><span data-dcnode-id="1508" instrument_node="">Oliver, M. L., &amp; Shapiro, T. M. (2019). Disrupting the Racial Wealth Gap. </span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Contexts</span></em><span data-dcnode-id="1505" instrument_node="">, </span><em data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">18</span></em><span data-dcnode-id="1502" instrument_node="">(1), 16–21. </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/1536504219830672"><span data-dcnode-id="1501" instrument_node="">https://doi.org/10.1177/1536504219830672</span></a></p><p data-dcnode-id="1492"><span data-dcnode-id="1498" instrument_node="">Springboard To Opportunities. (2020). </span><em data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Magnolia Mother’s Trust, Initial Pilot Report</span></em><span data-dcnode-id="1495" instrument_node=""> (p. 1). Springboard To Opportunities. </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//springboardto.org/index.php/page/the-magnolia-mothers-trust"><span data-dcnode-id="1494" instrument_node="">http://springboardto.org/index.php/page/the-magnolia-mothers-trust</span></a></p><p data-dcnode-id="1485"><span data-dcnode-id="1491" instrument_node="">Traub, A., Sullivan, L., Meschede, T., &amp; Shapiro, T. (2017). </span><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">The Asset Value of Whiteness: Understanding the Racial Wealth Gap</span></em><span data-dcnode-id="1488" instrument_node="">. Demos. </span><a data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.demos.org/research/asset-value-whiteness-understanding-racial-wealth-gap"><span data-dcnode-id="1487" instrument_node="">https://www.demos.org/research/asset-value-whiteness-understanding-racial-wealth-gap</span></a></p><p data-dcnode-id="1478"><span data-dcnode-id="1484" instrument_node="">Warren, D. (2016). Universal Basic Income and Black Communities in the United States. </span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Working Paper</span></em><span data-dcnode-id="1481" instrument_node="">. </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view"><span data-dcnode-id="1480" instrument_node="">https://drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view</span></a></p><p data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node="">Warren, D. (2017). Reparations and Basic Income. </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Boston Review</span></em><span data-dcnode-id="1474" instrument_node="">, 56–60.</span></p><br data-dcnode-id="1472"></div><div aria-labelledby="pills-guaranteed-income-in-african-american-history-tab" class="tab-pane fade" data-dcnode-id="1330" id="pills-guaranteed-income-in-african-american-history" role="tabpanel"><p data-dcnode-id="1468"><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">This section discusses the history of guaranteed income in African American History and how it has evolved today as one of many proposals to actualize economic justice for the Black community in the United States.</span></em></p><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">The proposal for a guaranteed income in the U.S. was popular in the 1960s, and again very recently, as a potential policy instrument to respond to growing economic racial inequalities across the country. In the history of UBI, many are familiar with Martin Luther King Jr.’s support for the policy, but few realize the diversity and extent of the support for a guaranteed income in African American History.</span></p><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">During the 1960s, the pervasiveness of economic inequality and insecurity in the Black community, coupled with a movement to overhaul an inadequate and exclusionary welfare system, led to the call for a guaranteed annual income (GAI) (Steensland, 2018). In 1966, the National Welfare Rights Organization (NWRO)—a conglomerate of single Black mothers on welfare, civil rights organizations, and antipoverty groups—was created with the aim of changing the approach to ending poverty (Demby, 2019). Under the anti-poverty programs of the Great Society of the 1960s and 1970s, the elderly, the disabled, and the widowed were deemed worthy of governmental financial assistance, while single mothers and the unemployed poor were blamed for their own poverty. African Americans were often deemed unworthy of assistance and routinely restricted from accessing benefits even when they were eligible (Cammett, 2014; Nadasen, 2005). In order to transform the welfare system, many of the Black women leading the NWRO—including Beulah Sanders, Jennette Washington, and Johnnie Tillmon—pushed for a guaranteed income: an income-support that was unconditional, provided generous levels of benefits, and would be granted to all those in need, including unemployed fathers, the working poor, childless couples, and single individuals (Kornbluh, 2007; Steensland, 2018). By acknowledging unremunerated domestic work and also enabling women to achieve economic independence from their partners, the NWRO’s mission and advocacy for a GAI was aimed at reducing the negative impacts of racially discriminatory welfare practices (Nadasen, 2005).</span></p><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Between 1966 and 1967, the Poor People’s Campaign, a movement fighting for economic justice for disenfranchised and marginalized Black communities, also advocated for a guaranteed income to replace some of the existing policies aimed at addressing poverty. Under the leadership of Martin Luther King, Jr., and the Southern Christian Leadership Conference, the Poor People’s Campaign was fueled by the notion that every citizen had a right to a decent standard of life (King, 1967). In 1967, King argued that society needed to create an unconditional guaranteed income program or guaranteed employment to ensure that potential would not be wasted (King, 1967). King argued for an adequately high income—one that reflected the median income and increased over time to reflect economic inflation in order to avoid perpetuating poverty and social and racial inequities (King, 1967). The Black Panther Party also advocated for a guaranteed income, stating in their ambitious Ten-Point Manifesto that the government was required to provide every citizen with employment or a guaranteed income (The Black Panther Party, 1966). The Black Panthers believed that either one of the policies would increase the freedom of Blacks to determine their own destiny.</span></p><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">In the midst of these calls for change and a rise in popularity for a GAI policy, there was also a paradigm shift within the Department of Health, Education and Welfare’s Office of Economic Opportunity (OEO). Social workers started promoting a family allowance while economists touted a more ‘innovative’ and ‘efficient’ approach of delivering welfare: a negative income tax (NIT) (Steensland, 2018). In 1967, Governor Nelson A. Rockefeller of New York brought together 100 of the nation’s leaders in industry, labor, news media, philanthropic foundations and government to help plan new approaches to public welfare in the United States. Known as the Arden House Conference, this group selected twelve men, primarily representing U.S. private sector corporations, to form an ad hoc steering committee that would author the findings and recommendations from the conference. An income maintenance program in the form of an NIT was subsequently recommended to the U.S. Government’s Committee for Economic Development (Income Maintenance Programs, 1968).</span></p><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">This recommendation and the others from the Arden House Conference ultimately divided support for guaranteed income as a basic right, and in the end, none of the proposals got very far (Steensland, 2018). Already struggling African Americans had no choice but to rely on existing means-tested social programs which continued to link work and welfare including the Aid to Families with Dependent Children (AFDC), Food Stamps, and Medicaid (Stoesz, 1993). The costs of these programs skyrocketed as a strained economy saw an exponential increase of participating families (AFDC more than doubled between 1966 and 1971, from just under five million to more than ten million), and African Americans and poor minority communities were further scapegoated for society’s ills (Stoesz, 1993).</span></p><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">In 1981, the Reagan administration took office with a plan to dramatically cut welfare (Stoesz, 1993). Reagan manufactured the myth of the welfare queen, which was used to demonize Black women as lazy, promiscuous, negligent mothers who free-ride on public assistance and have no self-discipline and work ethic (Covert, 2019; Masters et al., 2014). His administration’s changes to welfare caused many families to become ineligible or to see their benefits slashed because they had found work or were receiving other benefits. In 1983 alone, 408,000 families were cut from the AFDC and 299,000 saw their benefits reduced (Stoesz, 1993). The scale back of welfare during the 1980s and early 1990s was compounded by the lack of tying benefits to inflation, causing the amount of the benefit to be inadequate and ultimately resulting in an even greater widening of the income and asset gap between African Americans and whites (Stoesz, 1993).</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">In 1996, the Clinton Administration enacted the Temporary Assistance for Needy Families (TANF) block grant through the Personal Responsibility and Work Opportunity Reconciliation Act, replacing the AFDC. TANF set out new goals for welfare recipients, which could not have been further from King’s proposal for a guaranteed income. Among those included: ending the dependence of needy parents on government benefits by promoting job preparation, work, and marriage; preventing and reducing the incidence of out of wedlock pregnancies and establishing annual numerical goals for preventing and reducing the incidence of these pregnancies; and, encouraging the formation and maintenance of two-parent families (Center on Budget and Policy Priorities, 2020). Today, TANF benefits leave families living in poverty well below the poverty line and stigmatized, hindering many from seeking such benefits (Center on Budget and Policy Priorities, 2020).</span></p><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Recognizing the ongoing social and economic injustices and economic insecurity in Black communities and acknowledging the long history of struggle for a guaranteed income before them, the Movement for Black Lives advocated in 2016 for a guaranteed minimum livable income for all Black Americans as a form of reparations for the continued “divestment from, discrimination towards and exploitation of our communities” (The Movement for Black Lives, 2016). The manifesto goes on to state that the guaranteed livable income would not only meet basic human needs while providing a floor of economic security, but would also serve as a tool for racial emancipation, freedom, and the eradication of poverty in a non-stigmatizing fashion (The Movement for Black Lives, 2016). If a UBI were to be funded progressively, it is also hoped that people of color, because they find themselves disproportionally represented in low-income communities, would benefit most from the policy. In his discussion of UBI, Dorian Warren expressed the hope that the universality of the program would also make it more difficult to exclude formerly incarcerated people who could immensely benefit from income support as they leave prison and suffer labor market discrimination (Warren, 2016).</span></p><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">Parallel to this call for a guaranteed income has been a policy proposal to even more directly address the racial economic disparities brought on by structural racism in the United States: UBI “Plus” (Warren, 2017). The modified version of this idea, Universal PLUS Basic Income (U+BI), parallels most basic income proposals—an unconditional cash transfer provided to everyone on a regular basis—but it also includes a pro-rated additional amount for Black Americans over a specified time period. This portion of U+BI would be more directly reparatory: it would acknowledge and serve as restitution for Jim Crow and slavery (Warren, 2017).</span></p><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">As renewed calls for basic income and guaranteed income come about, it is important to understand this long legacy of support for the policy, its primary motivations, and its connections with curtailing racial oppression through discrimination and stigmatization. Awareness of this rich history of successes and failures can also help pre-empt future injustices. Current basic income experiments, including the Stockton Economic Empowerment Project and Magnolia Mother’s Trust, both draw on this history, placing race at the center. They help inform the ways in which society can better design a policy that leads to greater racial equity and ultimately undermines the negative racial stereotypes engrained in welfare policies (Bhattacharya, 2019).</span></p><br data-dcnode-id="1447"><p data-dcnode-id="1444"><b data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1431"><li class="related-link" data-dcnode-id="1441" data-target="care-work"><a data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Care Work</span></a></li><li class="related-link" data-dcnode-id="1438" data-target="the-household"><a data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">The household</span></a></li><li class="related-link" data-dcnode-id="1435" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="1432" data-target="racial-economic-inequality"><a data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Racial economic inequality</span></a></li></ul><br data-dcnode-id="1430"><p data-dcnode-id="1427"><b data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Read more</span></b></p><p data-dcnode-id="1422"><span data-dcnode-id="1426" instrument_node="">Bhattacharya, J. (2019). </span><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Exploring Basic Income through a Race and Gender Justice Lens</span></em><span data-dcnode-id="1423" instrument_node="">. Roosevelt Institute.</span></p><p data-dcnode-id="1414"><span data-dcnode-id="1421" instrument_node="">Cammett, A. (2014). Deadbeat Dads &amp; Welfare Queens: How Metaphor Shapes Poverty Law. </span><em data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Boston College Journal of Law and Social Justice</span></em><span data-dcnode-id="1418" instrument_node="">, </span><em data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">34</span></em><span data-dcnode-id="1415" instrument_node="">(2), 233–265.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1413" instrument_node="">Center on Budget and Policy Priorities. (2020). </span><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Policy Basics: Temporary Assistance for Needy Families</span></em><span data-dcnode-id="1410" instrument_node=""> (p. 7). Center on Budget and Policy Priorities. </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/research/family-income-support/temporary-assistance-for-needy-families"><span data-dcnode-id="1409" instrument_node="">https://www.cbpp.org/research/family-income-support/temporary-assistance-for-needy-families</span></a></p><p data-dcnode-id="1400"><span data-dcnode-id="1406" instrument_node="">Covert, B. (2019). The Myth of the Welfare Queen. </span><em data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">The New Republic</span></em><span data-dcnode-id="1403" instrument_node="">. </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newrepublic.com/article/154404/myth-welfare-queen"><span data-dcnode-id="1402" instrument_node="">https://newrepublic.com/article/154404/myth-welfare-queen</span></a></p><p data-dcnode-id="1393"><span data-dcnode-id="1399" instrument_node="">Demby, G. (2019, June 9). The Mothers Who Fought To Radically Reimagine Welfare [National Public Radio]. </span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Code Switch: Race and Identity, Remixed</span></em><span data-dcnode-id="1396" instrument_node="">. </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/sections/codeswitch/2019/06/09/730684320/the-mothers-who-fought-to-radically-reimagine-welfare"><span data-dcnode-id="1395" instrument_node="">https://www.npr.org/sections/codeswitch/2019/06/09/730684320/the-mothers-who-fought-to-radically-reimagine-welfare</span></a></p><p data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">King, M. L. (1967). </span><em data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">Where do we go from here: Chaos or community?</span></em><span data-dcnode-id="1389" instrument_node=""> (1st ed.). Harper &amp; Row.</span></p><p data-dcnode-id="1383"><span data-dcnode-id="1387" instrument_node="">Kornbluh, F. A. (2007). </span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">The battle for welfare rights: Politics and poverty in modern America</span></em><span data-dcnode-id="1384" instrument_node="">. Univ. of Pennsylvania Press.</span></p><p data-dcnode-id="1373"><span data-dcnode-id="1382" instrument_node="">Masters, N. T., Lindhorst, T. P., &amp; Meyers, M. K. (2014). Jezebel at the Welfare Office: How Racialized Stereotypes of Poor Women’s Reproductive Decisions and Relationships Shape Policy Implementation. </span><em data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Journal of Poverty</span></em><span data-dcnode-id="1379" instrument_node="">, </span><em data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">18</span></em><span data-dcnode-id="1376" instrument_node="">(2), 109–129. </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10875549.2013.833159"><span data-dcnode-id="1375" instrument_node="">https://doi.org/10.1080/10875549.2013.833159</span></a></p><p data-dcnode-id="1368"><span data-dcnode-id="1372" instrument_node="">Nadasen, P. (2005). </span><em data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Welfare warriors: The welfare rights movement in the United States</span></em><span data-dcnode-id="1369" instrument_node="">. Routledge.</span></p><p data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">Steensland, B. (2018). </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">The failed welfare revolution: America’s struggle over guaranteed income policy</span></em><span data-dcnode-id="1364" instrument_node="">. Princeton University Press.</span></p><p data-dcnode-id="1355"><span data-dcnode-id="1362" instrument_node="">Stoesz, D. (1993). Poor Policy: The Legacy of the Kerner Commission for Social Welfare. </span><em data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">North Carolina Law Review</span></em><span data-dcnode-id="1359" instrument_node="">, </span><em data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">71</span></em><span data-dcnode-id="1356" instrument_node="">(5), 1675–1691.</span></p><p data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">The Black Panther Party. (1966). </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The Ten-Point Program</span></em><span data-dcnode-id="1351" instrument_node="">. The Black Panther Party.</span></p><p data-dcnode-id="1344"><em data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The Movement for Black Lives</span></em><span data-dcnode-id="1347" instrument_node="">. (2016). The Movement for Black Lives. </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//m4bl.org/policy-platforms/reparations/"><span data-dcnode-id="1346" instrument_node="">https://m4bl.org/policy-platforms/reparations/</span></a></p><p data-dcnode-id="1337"><span data-dcnode-id="1343" instrument_node="">Warren, D. (2016). Universal Basic Income and Black Communities in the United States. </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Working Paper</span></em><span data-dcnode-id="1340" instrument_node="">. </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view"><span data-dcnode-id="1339" instrument_node="">https://drive.google.com/file/d/0BzQSUaxtfgvIWmRMVEhCdS1nR1hYV2RpelB4TkJVbUtSZXo4/view</span></a></p><p data-dcnode-id="1332"><span data-dcnode-id="1336" instrument_node="">Warren, D. (2017). Reparations and Basic Income. </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Boston Review</span></em><span data-dcnode-id="1333" instrument_node="">, 56–60.</span></p><br data-dcnode-id="1331"></div></div></div></div></div><div class="card" data-dcnode-id="818"><div class="card-header" data-dcnode-id="1315" id="heading-work"><button aria-controls="collapse-work" aria-expanded="false" class="btn btn-link collapsed" data-dcnode-id="1316" data-target="#collapse-work" data-toggle="collapse" type="button"><span data-dcnode-id="1325" instrument_node="">
</span><span class="theme-orb" data-dcnode-id="1324"></span><span class="text" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Work</span></span><svg class="expand-icon icon" data-dcnode-id="1319" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1321" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="1320" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="1317" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="1318" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-work" class="collapse" data-dcnode-id="819" data-id="work" data-parent="#accordionExample" id="collapse-work"><div class="card-body" data-dcnode-id="820"><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="1296" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="1309"><a aria-controls="pills-job-precariousness" aria-selected="true" class="nav-link active" data-dcnode-id="1310" data-id="job-precariousness" data-toggle="pill" href="#pills-job-precariousness" id="pills-job-precariousness-tab" role="tab"><span data-dcnode-id="1312" instrument_node="">Job Precariousness</span><div class="underbar" data-dcnode-id="1311"></div></a></li><li class="nav-item" data-dcnode-id="1305"><a aria-controls="pills-collective-bargaining" aria-selected="false" class="nav-link" data-dcnode-id="1306" data-id="collective-bargaining" data-toggle="pill" href="#pills-collective-bargaining" id="pills-collective-bargaining-tab" role="tab"><span data-dcnode-id="1308" instrument_node="">Bargaining Power</span><div class="underbar" data-dcnode-id="1307"></div></a></li><li class="nav-item" data-dcnode-id="1301"><a aria-controls="pills-work-beyond-jobs" aria-selected="false" class="nav-link" data-dcnode-id="1302" data-id="work-beyond-jobs" data-toggle="pill" href="#pills-work-beyond-jobs" id="pills-work-beyond-jobs-tab" role="tab"><span data-dcnode-id="1304" instrument_node="">Work beyond Jobs</span><div class="underbar" data-dcnode-id="1303"></div></a></li><li class="nav-item" data-dcnode-id="1297"><a aria-controls="pills-unemployment" aria-selected="false" class="nav-link" data-dcnode-id="1298" data-id="unemployment" data-toggle="pill" href="#pills-unemployment" id="pills-unemployment-tab" role="tab"><span data-dcnode-id="1300" instrument_node="">Unemployment</span><div class="underbar" data-dcnode-id="1299"></div></a></li></ul><div class="tab-content" data-dcnode-id="821" id="pills-tabContent"><div aria-labelledby="pills-job-precariousness-tab" class="tab-pane fade show active" data-dcnode-id="1199" id="pills-job-precariousness" role="tabpanel"><p data-dcnode-id="1293"><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">This section discusses the increasingly precarious nature of work and how UBI might address the issue.</span></em></p><p data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Individuals in precarious jobs lack traditional forms of labor security, such as salaried employment and income security (Standing, 2016). In today’s economy, an increasing number of individuals are self-employed, work part-time, or rely on flexible but temporary and insecure jobs in the “gig economy” as their main source of income. The number of workers who engage in alternative forms of work—such as freelancing, temporary help agency, and on-call jobs—rose from 10.7 percent in 2005 to 15.8 percent in 2015 (Katz &amp; Krueger, 2018). In the United States in 2018, 3 out of 10 adults were engaged in a gig-economy related job or activity; 15 percent were engaged in a service activity (e.g., child care, elder care, driving/ride-sharing, paid online tasks) and 17 percent engaged in a goods activity (e.g., selling online, flea market, consignment store) (Board of Governors of the Federal Reserve System, 2020). On average, these ‘alternative workers’ work fewer hours and have lower earnings compared to individuals employed in traditional forms of labor (Katz &amp; Krueger, 2018). Some workers choose these jobs voluntarily —they provide a critical source of flexibility in households with or without care responsibility— and some can be well compensated. In many cases, however, individuals who engage in such alternative forms of work have little choice and would choose a ‘traditional’ and secure job if it were available to them.</span></p><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">The precarious nature of some of these jobs represents a significant mental burden and can increase levels of anxiety and anger (Standing, 2016). Many of these alternative jobs, for instance, do not provide basic health and retirement benefits. Thus, individuals who rely on gig economy jobs as their primary source of income are extremely financially vulnerable if they get sick or hurt (Stern, 2016) and have a higher risk of experiencing anxiety and depression (Srnicek &amp; Williams, 2015). Some predict that the phenomenon of job precariousness and insecurity will continue to expand in the future. Specifically, current trends in automation, technological advancement, and the growing sophistication of artificial intelligence could plausibly have a negative effect on the overall quality of jobs available, leading to a decrease in the number of traditional full-time and secure jobs and an increase in the number of precarious and insecure jobs (Ford, 2015; Hughes, 2018).</span></p><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">The introduction of a basic income, in itself, cannot fix the structural problems of today’s labor market, and it is unlikely to have a direct effect on the loss of more secure jobs. But basic income programs could possibly help reduce some of the problems that are associated with these alternative forms of labor. If set sufficiently high, UBI would reduce workers’ dependence on precarious jobs for economic security. In the United States, the poverty line is $12,000 for a single individual and $16,000 for a couple. A UBI of $1,000 a month, then, could go a long way in boosting financial security (a couple would jointly receive $24,000 a year, placing them significantly above the poverty line for couples). This is especially true for workers in alternative jobs, with median weekly earnings of only $500 (Katz &amp; Krueger, 2018).</span></p><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">By empowering workers and increasing workers’ independence, it could also help transform unemployment from a state of insecurity to a state of voluntary flexibility, allowing individuals to choose when and how much to work without imposing on them the financial insecurity that is associated with the gig economy. It could thus increase the number of individuals who voluntarily engage in alternative forms of work and take advantage of the flexibility it can afford. By reducing financial insecurity and instability, UBI has the further potential to reduce the negative mental health outcomes that are associated with the precariousness of the current labor market (Srnicek &amp; Williams, 2015).</span></p><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Empirical data on how basic income could help reduce workers’ dependence on precarious jobs come primarily from the Madhya Pradesh experiment in India (2011-2012). At the time of the experiment, most individuals worked as casual wage farm laborers (noted as a form of bonded labor for a landlord within the naukar system), while some did their own-account farming and others migrated outside the village to do other labor (Davala et al., 2015). The introduction of basic income was associated with a notable shift away from casual waged labor to own-account work, including own-account farming and small-scale business. In villages receiving basic income, the proportion of individuals reporting own-account farming as their main occupation rose from 40 percent to 62 percent during the tribal village pilot. The share of participants reporting that they were a wage laborer fell from 55 percent to 27 percent. In contrast, the level of self-employment in non-recipient villages actually decreased during this time, from 42 percent to 36 percent, and the percentage of wage laborers increased from 50 to 51 percent.</span></p><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">This shift among recipients of basic income suggests a greater sense of autonomy and independence as well as the flexibility to create more sustainable livelihoods. The move away from wage laborer to own-account farming and small businesses was largely among women, who used the basic income to purchase equipment, livestock, and productive assets (e.g., pumps, pipes, tractors, machine tools, carts and sewing machines) (Davala et al., 2015). Although these findings are notable, it is important to understand that this experiment took place in a context where women were already organized into women’s associations, and so these results may not translate to contexts where such organizational support is lacking. Additional research is needed in the United States and other parts of the world to determine if UBI would cause individuals to leave precarious work and for what other activities, as well as to identify under which conditions the cash injection could boost workers’ bargaining power.</span></p><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">While basic income may reduce the financial insecurity that is often associated with precarious and non-traditional forms of labor, it is limited in its ability to deal with the root causes of job precariousness. UBI does
