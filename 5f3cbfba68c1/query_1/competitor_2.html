ode-id="3091"><span data-dcnode-id="3095" instrument_node="">Hayek, F. A. von. (2010). </span><em data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">The Constitution of Liberty</span></em><span data-dcnode-id="3092" instrument_node="">. Routledge.</span></p><p data-dcnode-id="3081"><span data-dcnode-id="3090" instrument_node="">McDonald, J. F., &amp; Stephenson, S. P. (1979). The Effect of Income Maintenance on the School-Enrollment and Labor-Supply Decisions of Teenagers. </span><em data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">The Journal of Human Resources</span></em><span data-dcnode-id="3087" instrument_node="">, </span><em data-dcnode-id="3085"><span data-dcnode-id="3086" instrument_node="">14</span></em><span data-dcnode-id="3084" instrument_node="">(4), 488. </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2307/145319"><span data-dcnode-id="3083" instrument_node="">https://doi.org/10.2307/145319</span></a></p><p data-dcnode-id="3071"><span data-dcnode-id="3080" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="3077" instrument_node="">, </span><em data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">32</span></em><span data-dcnode-id="3074" instrument_node="">(1), 89–105. </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="3073" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="3064"><span data-dcnode-id="3070" instrument_node="">SEWA Bharat. (2014). </span><em data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">A Little More, How Much It Is: Piloting Basic Income Transfers in Madhya Pradesh, India</span></em><span data-dcnode-id="3067" instrument_node=""> (p. 512) [Report on Unconditional Cash Transfer Pilot Project]. SEWA and UNICEF. </span><a data-dcnode-id="3065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sewabharat.org/wp-content/uploads/2015/07/Report-on-Unconditional-Cash-Transfer-Pilot-Project-in-Madhya-Pradesh.pdf"><span data-dcnode-id="3066" instrument_node="">http://sewabharat.org/wp-content/uploads/2015/07/Report-on-Unconditional-Cash-Transfer-Pilot-Project-in-Madhya-Pradesh.pdf</span></a></p><br data-dcnode-id="3063"></div><div aria-labelledby="pills-democratic-justifications-for-ubi-tab" class="tab-pane fade" data-dcnode-id="2993" id="pills-democratic-justifications-for-ubi" role="tabpanel"><p data-dcnode-id="3059"><em data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">This section explains how democratic theorists have sought to justify UBI.</span></em></p><p data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">One argument proponents of UBI make is that subsistence, like political participation, is a fundamental democratic right. Scholars make two cases for such a view. The first regards UBI’s instrumental value. It seeks to demonstrate that rights are interconnected, which means that rights concerning political participation (e.g., enfranchisement, freedom of speech, freedom of assembly) cannot be maintained without the equal protection of rights related to economic independence. Therefore, UBI is necessary to support other democratic rights. The second argument concerns UBI’s intrinsic value. This argument makes an analogy between subsistence and suffrage, claiming that both are fundamental rights due to democratic citizens. In this paradigm, arguing against universal basic income is like arguing against universal suffrage, that is, it is intrinsically anti-democratic.</span></p><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">UBI is seen as instrumentally valuable to a variety of democratic rights from both an individual perspective and a collective perspective. The most common argument from the individual perspective is that rights are intertwined: the violation of any given right also damages other rights. For instance, one cannot practice freedom of religion without freedom of assembly (Shue, 1996). Proponents of this claim argue that the violation of what they consider one’s economic rights results in the violation of other political rights. Free speech, for example, is undermined if your economic dependency means you cannot express political disagreement with your boss. UBI as an economic right thus likely protects one’s political rights, at least insofar as it is robust enough to grant real exit options (Goodhart, 2008).</span></p><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Less commonly argued is that UBI has an instrumental role to play in the collective provision of rights. Some fundamental democratic rights rely on what are known as “participatory resources” (Scholzman et al., 2018). Voting, for instance, requires a colossal infrastructure for which no single person is responsible. Elections require voting booths, voting software, polling locations, registration and registration assistance, and other logistical resources, such as roads and traffic management on routes to and from polling locations. Some countries even make election days mandated holidays. In this framework, UBI is valuable not just for how it removes economic barriers to participation, but also for how it actively and collectively contributes to the provision of resources necessary to participate: time, money, and motivation.</span></p><p data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Some theorists see UBI as valuable not merely because it promotes political rights, but because they believe it to be a political right in and of itself (Pateman, 2004)—similar to voting. While there are many instrumental arguments for why voting is valuable—better policy outcomes or holding elected officials accountable—many democratic theorists argue that voting is also intrinsically valuable. Voting, this argument goes, is a symbolic act of political equality; even if people don’t participate evenly, the mere fact of universal access demonstrates that a democracy is rule by all the people, for all the people (Chapman, 2019). The intrinsic arguments for universal basic income are similar. Even if UBI is not shown to increase people’s electoral participation or use of other rights, some scholars argue that it is a right in and of itself because of its symbolic demonstration of equal public standing—the idea that all individuals in a polity are valued the same and considered equal participants in public life (Pateman, 2004).</span></p><br data-dcnode-id="3050"><p data-dcnode-id="3047"><b data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="3034"><li class="related-link" data-dcnode-id="3044" data-target="civic-participation"><a data-dcnode-id="3045"><span data-dcnode-id="3046" instrument_node="">Civic participation</span></a></li><li class="related-link" data-dcnode-id="3041" data-target="good-governance"><a data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Good governance</span></a></li><li class="related-link" data-dcnode-id="3038" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="3035" data-target="work-beyond-jobs"><a data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Work beyond Jobs</span></a></li></ul><br data-dcnode-id="3033"><p data-dcnode-id="3030"><b data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">Read more</span></b></p><p data-dcnode-id="3020"><span data-dcnode-id="3029" instrument_node="">Chapman, E. B. (2019). The Distinctive Value of Elections and the Case for Compulsory Voting. </span><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">American Journal of Political Science</span></em><span data-dcnode-id="3026" instrument_node="">, </span><em data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">63</span></em><span data-dcnode-id="3023" instrument_node="">(1), 101–112. </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/ajps.12393"><span data-dcnode-id="3022" instrument_node="">https://doi.org/10.1111/ajps.12393</span></a></p><p data-dcnode-id="3015"><span data-dcnode-id="3019" instrument_node="">Goodhart, M. (2008). A Democratic Defense of Universal Basic Income. In </span><em data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">Illusion of Consent: Engaging with Carole Pateman</span></em><span data-dcnode-id="3016" instrument_node=""> (pp. 139–162). Penn State University Press.</span></p><p data-dcnode-id="3005"><span data-dcnode-id="3014" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="3012"><span data-dcnode-id="3013" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="3011" instrument_node="">, </span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">32</span></em><span data-dcnode-id="3008" instrument_node="">(1), 89–105. </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="3007" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="3000"><span data-dcnode-id="3004" instrument_node="">Scholzman, K. L., Brady, H., &amp; Verba, S. (2018). </span><em data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Unequal and Unrepresented: Political inequality and the people’s voice in the new gilded age.</span></em><span data-dcnode-id="3001" instrument_node=""> Princeton University Press.</span></p><p data-dcnode-id="2995"><span data-dcnode-id="2999" instrument_node="">Shue, H. (1996). </span><em data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">Basic Rights: Subsistence, Affluence, and U.S. Foreign Policy</span></em><span data-dcnode-id="2996" instrument_node=""> (2. ed). Princeton Univ. Press.</span></p><br data-dcnode-id="2994"></div><div aria-labelledby="pills-good-governance-tab" class="tab-pane fade" data-dcnode-id="2808" id="pills-good-governance" role="tabpanel"><p data-dcnode-id="2990"><em data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">This section explores how UBI might improve governance in democracies, in particular by examining how UBI may impact democratic accountability and legitimacy.</span></em></p><p data-dcnode-id="2988"><span data-dcnode-id="2989" instrument_node="">As a regime type, democracy is often valued for certain intrinsic characteristics, such as how it manifests citizen equality. But there are also instrumental reasons for valuing democracy, including the fact that it may result in better governance. Democracies may be both more legitimate and more accountable than other forms of government, resulting in policies that are better for citizens. If democracies fail to be accountable or legitimate—that is, to embody these values of good governance—it may contribute to democratic dissatisfaction and the desire for alternative regime types. Globally, dissatisfaction with how democracy is working is on the rise; across 27 countries polled, a median of 51 percent of people were dissatisfied with the current functioning of democracy in their countries (Richard Wike et al., 2019). People who considered their governments to be unaccountable (corrupt or unable to improve standards of living) or illegitimate (untrustworthy or unwilling to respect basic rights) were more likely to be dissatisfied.</span></p><p data-dcnode-id="2986"><span data-dcnode-id="2987" instrument_node="">If we value democracy because of its association with good governance, we may ask what impact UBI would have on the ability of democracies to govern well. Evidence from cash transfers offers insights on accountability and legitimacy—the two values thought necessary for good governance.</span></p><p data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">How might UBI impact the ability of citizens to hold their governments accountable? Insofar as a UBI is likely to increase voter turnout or citizen participation, it could very well increase government accountability. However, it is not enough that citizens merely participate; in order to ensure good governance, how they participate matters as well. “Unhealthy” political engagement, when citizens select and sanction leaders on the basis of their provision of private goods, can damage the state’s ability to govern (Khemani, 2015). Unhealthy civic participation, for example, can be seen in special interests’ groups who mobilize to extract benefits from policies at the expense of public interest. Civic participationis “healthy” when citizens select and sanction leaders on their ability to provide public goods. An exampleof healthy participation might include sanctioning leaders for corruption by voting them out of office.</span></p><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">UBI, which is both a public and a private good, complicates the boundary between healthy and unhealthy civic engagement. On the one hand, reduced economic dependency may empower citizens to monitor their government and to elect responsive leadership. Yet evidence from conditional cash transfers has shown there are also cases in which the policy could reduce the independence of voters, making them more likely to vote for the incumbent (Baez et al., 2012). Vote-buying—the process of offering gifts or money in exchange for votes—is robustly correlated with lower quality of public services across countries (World Bank, 2016). If politicians use the direct benefit of UBI to ‘buy’ votes (for example, by promising increased payments), it may hinder the ability of citizens to remove those leaders in the case of other infractions. It is possible, however, that such an effect could be mitigated by UBI’s universality; the fact that even higher-income citizens would receive the benefit might prevent the emergence of a “Curley effect”—a phenomenon whereby politicians increase the size of their political base, ensuring reelection, via policies that provide distortionary benefits (Glaeser &amp; Shleifer, 2002).</span></p><p data-dcnode-id="2980"><span data-dcnode-id="2981" instrument_node="">A related fear regarding UBI and accountability is that voter interest in UBI might outweigh other important concerns regarding the public good. Some have argued, for instance, that the annual dividend from Alaska’s Permanent Fund has “warped” local politics, because residents vote to protect their individual payments to the detriment of public services such as schools and universities (Sundlee, 2019). This is important since, when policies provide targeted benefits, as a cash transfer does, there may often be fewer resources available for other types of services, such as public health or education (Khemani, 2019). Evidence is mixed, however, as recent polls demonstrate that voters would be willing to consider capping their Permanent Fund dividend payments or directing additional earnings from the Permanent Fund towards public services and programs (Stalzer, 2015). More research is required to understand the relationship between UBI and voter interest in the provision of public goods.</span></p><p data-dcnode-id="2978"><span data-dcnode-id="2979" instrument_node="">A large part of the perception of a government as legitimate relies on citizen perception that the government is accountable. So, insofar as UBI were to increase democratic accountability, it would also increase democratic legitimacy.But another axis of democratic legitimacy is social cohesion, which is known in some scholarly work as social capital or social connectedness.</span></p><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Social cohesion has been found in empirical studies to impact the health of democracies, as it is often associated with improved institutional performance, economic prosperity, increased mobilization and participation, and general sense of citizen efficacy (Campbell, 2013; Putnam et al., 1994; Rosenstone &amp; Hansen, 2009). Economic inequality, such as highly unequal incomes, and social inequality, such as the existence of unequal rewards and opportunities for various social positions, have been found in empirical research to negatively impact social cohesion (Khambule &amp; Siswana, 2017; Vergolini, 2011; Wilkinson, 1997). Insofar as UBI may be able to reduce economic and social inequalities, it could possibly contributeto increase social cohesion.</span></p><p data-dcnode-id="2974"><span data-dcnode-id="2975" instrument_node="">Another way in which UBI might increase social cohesion is by changing how people use their time. If people have more time for activities in which they engage with others, such as getting an education or participating in volunteer work, they may have wider social networks and thus create more social cohesion. But a UBI could also have a negative impact on social cohesion. Recipients of a UBI may decide to spend more time at home or in networks that they already have, which could possibly decrease social cohesion. So, because there is no empirical research on what types of activities people might be expected to participate in should they receive a UBI, it is difficult to estimate the impact it could have on social cohesion. Moreover, it has been argued that workplaces play a critical integrative role within democracies; economic necessity forces people of diverse backgrounds and ethnicities to work together, and this daily interaction causes them to build personal ties across social divisions and practice the skills of compromise and consensus (Estlund, 2003). If a UBI means that people are no longer required to work with those with whom they would not otherwise choose to associate, it could, in the long run, decrease social cohesion and thus negatively impact social cohesion and democratic legitimacy. UBI’s potential impact on social cohesion is therefore highly variable, and there is a dearth of evidence to support any oneconclusion. More research is needed.</span></p><p data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node="">UBI might also impact the trust that citizens have in the state, which is yet another axis of democratic legitimacy. A basic income that is truly universal creates a service that is accessed by every citizen, from the least to most well off. Consistent citizen engagement with government services may serve to increase the legitimacy of the state as a whole, especially if those services are considered particularly important or competent. The Bolsa Familia program in Brazil demonstrated that transfer recipients showed increased trust in core state institutions, local government, and incumbent actors (Layton et al., 2017). A randomized control trial in Tanzania showed that conditional cash transfers significantly increased trust inelected leaders with a concomitant rise in the perception of government responsiveness to citizen concerns and perceived honesty of leaders (Evans et al., 2018). However, in this trial, the cash transfers were in part implemented via in-person monitoring by elected officials and were conditional on accessing other services, such as healthcare. It is possible that some of the impact on legitimacy is a result of these direct citizen-to-government interactions; if this is the case, an online UBI might actually decrease social trust as citizens engage less often with various government bureaucracies.</span></p><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">It may not be necessary for there to be personal contact between citizens and government officials for there to be increased legitimacy, however; digitized or online services that are sufficiently competent might have the same effect. Indeed, an online UBI might even improve perceptions of government legitimacy more, as it removes some possibilities for corruption and micro-domination in service-provision. First, such a UBI “shortens the chain” between government and citizens; removing hands through which the money must pass can result in more transparency and less corruption(World Bank, 2003). Second, it may make service-provision more equitable. “Street level” bureaucrats, those at the forefront of service provision, can be perceived by recipients as making arbitrary decisions about who canaccess benefits, for what reasons, and when. Removing this element of discretion in personal interaction may actually improve citizen-government interactions, and the net impact of UBI might be an increase in democratic trust. Preliminary results from the Finnish basic income experiment support such a conclusion, as researchers there found that basic income recipients had a small but significant increase in trust in politicians and the legal system relative to the control group (Kangas et al., 2019). The leveling of economic inequality may also contribute to such an effect; because citizens in a democracy are serviced by other citizens, micro-domination weakens social trust and the overarching legitimacy of the political community. If micro-domination is more likely to impact low-income citizens, then reduced inequality may make other forms of service provision—from schooling to healthcare—seem fairer, and the state itself more legitimate.</span></p><br data-dcnode-id="2969"><p data-dcnode-id="2966"><b data-dcnode-id="2967"><span data-dcnode-id="2968" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2956"><li class="related-link" data-dcnode-id="2963" data-target="civic-participation"><a data-dcnode-id="2964"><span data-dcnode-id="2965" instrument_node="">Civic participation</span></a></li><li class="related-link" data-dcnode-id="2960" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="2957" data-target="work-beyond-jobs"><a data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">Work beyond Jobs</span></a></li></ul><br data-dcnode-id="2955"><p data-dcnode-id="2952"><b data-dcnode-id="2953"><span data-dcnode-id="2954" instrument_node="">Read more</span></b></p><p data-dcnode-id="2945"><span data-dcnode-id="2951" instrument_node="">Baez, J. E., Camacho, A., Conover, E., &amp; Zárate, R. A. (2012). </span><em data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Conditional Cash Transfers, Political Participation, and Voting Behavior</span></em><span data-dcnode-id="2948" instrument_node="">. The World Bank. </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1596/1813-9450-6215"><span data-dcnode-id="2947" instrument_node="">https://doi.org/10.1596/1813-9450-6215</span></a></p><p data-dcnode-id="2935"><span data-dcnode-id="2944" instrument_node="">Campbell, D. E. (2013). Social Networks and Political Participation. </span><em data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">Annual Review of Political Science</span></em><span data-dcnode-id="2941" instrument_node="">, </span><em data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">16</span></em><span data-dcnode-id="2938" instrument_node="">(1), 33–48. </span><a data-dcnode-id="2936" href=
