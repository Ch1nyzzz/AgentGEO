not replace the need for workplace regulations that prevent the labor market from becoming too precarious in the first place. In addition, there are scenarios in which a standalone UBI could even worsen the problem if it played the role of a wage subsidy and was used by employers as an excuse to replace the need for adequate workers’ compensation and health, retirement and other benefits. This suggests that a broader policy package, including perhaps minimum wage regulations, needs to be designed in order to ensure that UBI can play a truly positive role in undermining both job insecurity and economic insecurity.</span></p><br data-dcnode-id="1278"><p data-dcnode-id="1275"><b data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1253"><li class="related-link" data-dcnode-id="1272" data-target="collective-bargaining"><a data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Bargaining power</span></a></li><li class="related-link" data-dcnode-id="1269" data-target="work-beyond-jobs"><a data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Work beyond jobs</span></a></li><li class="related-link" data-dcnode-id="1266" data-target="mental-health"><a data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Mental health</span></a></li><li class="related-link" data-dcnode-id="1263" data-target="automation-and-future-of-work"><a data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Automation and the future of work</span></a></li><li class="related-link" data-dcnode-id="1260" data-target="labor-market"><a data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Impact on Labor Supply</span></a></li><li class="related-link" data-dcnode-id="1257" data-target="care-work"><a data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="1254" data-target="the-household"><a data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The household</span></a></li></ul><br data-dcnode-id="1252"><div class="citations" data-dcnode-id="1200"><p data-dcnode-id="1249"><b data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Read more</span></b></p><p data-dcnode-id="1242"><span data-dcnode-id="1248" instrument_node="">Board of Governors of the Federal Reserve System. (2020). </span><em data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Report on the Economic Well-Being of U.S. Households in 2019, Featuring Supplemental Data from April 2020</span></em><span data-dcnode-id="1245" instrument_node="">. Board of Governors of the Federal Reserve System. </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalreserve.gov/publications.htm"><span data-dcnode-id="1244" instrument_node="">https://www.federalreserve.gov/publications.htm</span></a></p><p data-dcnode-id="1237"><span data-dcnode-id="1241" instrument_node="">Davala, S., Renana Jhabvala, Guy Standing, &amp; Soumya Kapoor Mehta. (2015). </span><em data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Basic Income: A Transformative Policy for India</span></em><span data-dcnode-id="1238" instrument_node="">. Bloomsbury Academic.</span></p><p data-dcnode-id="1232"><span data-dcnode-id="1236" instrument_node="">Ford, M. (2015). </span><em data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Rise of the Robots: Technology and the Threat of a Jobless Future</span></em><span data-dcnode-id="1233" instrument_node=""> (1st ed.). Basic Books.</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">Hughes, C. (2018). </span><em data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">Fair Shot: Rethinking Inequality and How We Earn</span></em><span data-dcnode-id="1228" instrument_node=""> (1st ed.). St. Martin’s Press.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1226" instrument_node="">Katz, L. F., &amp; Krueger, A. B. (2018). The Rise and Nature of Alternative Work Arrangements in the United States, 1995–2015. </span><em data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">ILR Review</span></em><span data-dcnode-id="1223" instrument_node="">, </span><em data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">72</span></em><span data-dcnode-id="1220" instrument_node="">(2), 382–416. </span><a data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0019793918820008"><span data-dcnode-id="1219" instrument_node="">https://doi.org/10.1177/0019793918820008</span></a></p><p data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">Srnicek, N., &amp; Williams, A. (2015). </span><em data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Inventing the Future: Postcapitalism and a World Without Work</span></em><span data-dcnode-id="1213" instrument_node="">. Verso Books.</span></p><p data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">Standing, G. (2016). </span><em data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">The Precariat: The New Dangerous Class</span></em><span data-dcnode-id="1208" instrument_node=""> (Reprint edition). Bloomsbury Academic.</span></p><p data-dcnode-id="1202"><span data-dcnode-id="1206" instrument_node="">Stern, A. (2016). </span><em data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Raising the Floor: How a Universal Basic Income Can Renew Our Economy and Rebuild the American Dream</span></em><span data-dcnode-id="1203" instrument_node=""> (1st ed.). Public Affairs.</span></p><br data-dcnode-id="1201"></div></div><div aria-labelledby="pills-collective-bargaining-tab" class="tab-pane fade" data-dcnode-id="1062" id="pills-collective-bargaining" role="tabpanel"><p data-dcnode-id="1196"><em data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">This section discusses how UBI might affect bargaining power.</span></em></p><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">With the decline in the power of workers’ unions — the decrease in the number of workers who are unionized as well as the increase in legal limitations imposed on unions — the current structure of the economy and job market is characterized by an asymmetry of power between workers and employers. The rise of alternative jobs and the gig economy contribute to a growing asymmetry of power, since the decentralized nature of these jobs and the limited contractual obligations of employers in these jobs add additional challenges to collective action. Workers now often find themselves working in low-paying, temporary, or contingent jobs where it is difficult to negotiate the terms of their employment. They also often cannot advance from their current position or find better employment since, under conditions of job insecurity and precariousness, a job search might be very costly. Current safety-net programs also do not provide adequate solutions to this issue of power asymmetry and the lack of workers’ bargaining power. Lacking a strong “exit option,” workers are increasingly dependent on their employers, unable to negotiate better working conditions let alone reject such low-paying or “bad” jobs altogether.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">UBI might help challenge the existing power dynamic by better empowering individual workers than existing safety nets. Many observers have pointed to the important correlation between the decline in organized labor and workers’ bargaining power, on the one hand, and the decrease in compensation and increase in job precariousness and insecurity, on the other hand (Rogers, 2017; Stern, 2016). By providing a stable source of income that is independent of work, UBI might offer an alternative route to empower workers: through an increased ability to exit unsatisfactory work contract, it could help workers gain more bargaining power and could help weaken the current asymmetry in power between workers and employers. This is because a sufficiently high UBI could increase individuals’ freedom to enter or exit employment, allowing them the flexibility to manage changing circumstances (obtaining additional education; taking care of dependent children, parents or spouses; or taking advantage of new business opportunities), and increase their capacity to choose, define, and shape the work they want to do (Pateman, 2004; Zelleke, 2014).</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">By increasing workers’ option set, UBI could thus empower individuals to say “no” to bad, lower-paying, degrading, and hazardous jobs (Reich, 2016; Wright, 2006). But, conversely, it could also increase their ability to say “yes” to more intrinsically rewarding work opportunities, even if those are part-time or on a self-employed basis (Srnicek &amp; Williams, 2015; Stern, 2016; Van Parijs &amp; Vanderborght, 2017). Even if UBI would not provide all individuals with the freedom to say “no” to any job for any length of time, empirical data suggest that it could allow individuals to take longer periods of time between jobs and to spend more time looking for new jobs, thus increasing their ability to say “no” to bad jobs (Hum &amp; Simpson, 1993; Marinescu, 2018).</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">In Madhya Pradesh, India (2011–2012), the experiment caused a notable shift away from casual waged labor (often cited as bonded labor) to own-account work. To some degree, this had an “emancipatory effect” on low-income households because it allowed them to do more on their own farms or in small-scale informal production, thus strengthening their bargaining position in the market for wage labor (Davala et al., 2015). At the same time, preliminary findings of the Finish basic income pilot (2017–2018) indicated that there was a slightly greater number of individuals earning income from self-employment among those receiving a basic income (2,000 individuals) than those in the treatment (175,000 individuals) group (43.75 percent and 42.85 percent, respectively) (Kangas et al., 2019). Additional research is needed, though, to understand whether the increase in self-employment among basic income recipients was because they felt empowered to do more rewarding work. Overall, more research is needed to answer the difficult question of whether, how and in which context UBI could help increase a worker’s bargaining power.</span></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Despite giving workers basic exit options, however, skeptics have suggested that UBI is not a realistic avenue to workers’ emancipation from the authoritarian power of their bosses. UBI does not directly lessen an employer’s legal prerogatives, nor does it give workers additional power within their firm’s structure (Gourevitch, 2016). Additionally, while UBI might increase individual bargaining power, it does not necessarily help empower the working class collectively. This is significant, because without an organized working class, it is hard to envision a world in which the business class would agree to a UBI large enough to allow for deep transformations of the labor market in workers’ favor (Gourevitch &amp; Stanczyk, 2018). So those analysts make the case, not that UBI would not help reduce the problem if it were introduced, but that it is unlikely to be politically feasible in a context of disorganized labor. They further express concern that a focus on UBI policy could deprioritize strategies and policies that help organize labor (Gourevitch &amp; Stanczyk, 2018).</span></p><br data-dcnode-id="1185"><p data-dcnode-id="1182"><b data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1163"><li class="related-link" data-dcnode-id="1179" data-target="job-precariousness"><a data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Job precariousness</span></a></li><li class="related-link" data-dcnode-id="1176" data-target="work-beyond-jobs"><a data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Work beyond jobs</span></a></li><li class="related-link" data-dcnode-id="1173" data-target="automation-and-future-of-work"><a data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Automation and the future of work</span></a></li><li class="related-link" data-dcnode-id="1170" data-target="labor-market"><a data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Impact on labor supply</span></a></li><li class="related-link" data-dcnode-id="1167" data-target="care-work"><a data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="1164" data-target="racial-economic-inequality"><a data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Racial economic inequality</span></a></li></ul><br data-dcnode-id="1162"><p data-dcnode-id="1159"><b data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Read more</span></b></p><p data-dcnode-id="1154"><span data-dcnode-id="1158" instrument_node="">Davala, S., Renana Jhabvala, Guy Standing, &amp; Soumya Kapoor Mehta. (2015). </span><em data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Basic Income: A Transformative Policy for India</span></em><span data-dcnode-id="1155" instrument_node="">. Bloomsbury Academic.</span></p><p data-dcnode-id="1144"><span data-dcnode-id="1153" instrument_node="">Gourevitch, A. (2016). The Limits of a Basic Income: Means and Ends of Workplace Democracy. </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="1150" instrument_node="">, </span><em data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">11</span></em><span data-dcnode-id="1147" instrument_node="">(1), 17–28. </span><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/bis-2016-0008"><span data-dcnode-id="1146" instrument_node="">https://doi.org/10.1515/bis-2016-0008</span></a></p><p data-dcnode-id="1136"><span data-dcnode-id="1143" instrument_node="">Gourevitch, A., &amp; Stanczyk, L. (2018). The Basic Income Illusion. </span><em data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Catalyst</span></em><span data-dcnode-id="1140" instrument_node="">, </span><em data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">1</span></em><span data-dcnode-id="1137" instrument_node="">(4), 22.</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1135" instrument_node="">Hum, D., &amp; Simpson, W. (1993). Economic Response to a Guaranteed Annual Income: Experience from Canada and the United States. </span><em data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Journal of Labor Economics</span></em><span data-dcnode-id="1132" instrument_node="">, </span><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">11</span></em><span data-dcnode-id="1129" instrument_node="">(1, Part 2), S263–S296. </span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1086/298335"><span data-dcnode-id="1128" instrument_node="">https://doi.org/10.1086/298335</span></a></p><p data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">Kangas, O., Jauhiainen, S., Simanainen, M., &amp; Ylikännö, M. (2019). </span><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The basic income experiment 2017–2018 in Finland Preliminary results</span></em><span data-dcnode-id="1122" instrument_node="">. 34.</span></p><p data-dcnode-id="1114"><span data-dcnode-id="1120" instrument_node="">Marinescu, I. (2018). </span><em data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">No strings attached: The behavioral effects of U.S. unconditional cash transfer programs</span></em><span data-dcnode-id="1117" instrument_node=""> (Working Paper No. 24337). National Bureau of Economic Research. </span><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w24312.pdf"><span data-dcnode-id="1116" instrument_node="">https://www.nber.org/papers/w24312.pdf</span></a></p><p data-dcnode-id="1104"><span data-dcnode-id="1113" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="1110" instrument_node="">, </span><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">32</span></em><span data-dcnode-id="1107" instrument_node="">(1), 89–105. </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="1106" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="1099"><span data-dcnode-id="1103" instrument_node="">Reich, R. B. (2016). </span><em data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Saving Capitalism: For the Many, Not the Few</span></em><span data-dcnode-id="1100" instrument_node=""> (1st ed.). Vintage Books, a Division of Penguin Random House LLC.</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">Rogers, B. (2017, May 3). Basic Income in a Just Society. </span><em data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Boston Review</span></em><span data-dcnode-id="1095" instrument_node="">, 11–29.</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">Srnicek, N., &amp; Williams, A. (2015). </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Inventing the Future: Postcapitalism and a World Without Work</span></em><span data-dcnode-id="1090" instrument_node="">. Verso Books.</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">Stern, A. (2016). </span><em data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Raising the Floor: How a Universal Basic Income Can Renew Our Economy and Rebuild the American Dream</span></em><span data-dcnode-id="1085" instrument_node=""> (1st ed.). PublicAffairs.</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">Van Parijs, P., &amp; Vanderborght, Y. (2017). </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Basic Income: A Radical Proposal for a Free Society and a Sane Economy</span></em><span data-dcnode-id="1080" instrument_node=""> (1st ed.). Harvard University Press.</span></p><p data-dcnode-id="1071"><span data-dcnode-id="1078" instrument_node="">Wright, E. O. (2006). Two redistributive proposals—Universal basic income and stakeholder grants. </span><em data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Focus</span></em><span data-dcnode-id="1075" instrument_node="">, </span><em data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">24</span></em><span data-dcnode-id="1072" instrument_node="">(2), 5–7.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1070" instrument_node="">Zelleke, A. (2014, January 27). </span><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">The Liberal Case for a Basic Income</span></em><span data-dcnode-id="1067" instrument_node="">. Basic Income Earth Network. </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2014/01/opinion-the-liberal-case-for-a-basic-income/"><span data-dcnode-id="1066" instrument_node="">https://basicincome.org/news/2014/01/opinion-the-liberal-case-for-a-basic-income/</span></a></p><br data-dcnode-id="1063"></div><div aria-labelledby="pills-work-beyond-jobs-tab" class="tab-pane fade" data-dcnode-id="943" id="pills-work-beyond-jobs" role="tabpanel"><p data-dcnode-id="1059"><em data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">This section discusses how UBI might enable individuals to choose activities beyond formal jobs and wage labor.</span></em></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Our societies tend to treat waged labor as the principal form of valued activity, which often leads us to view activities beyond jobs as unproductive or unworthy. Despite being essential and meaningful, other forms of work such as caregiving and community work are often undervalued and underpaid; individuals who engage in such activities are more likely to face financial insecurity and lack financial independence. The prioritization of formal labor also comes at the expense of volunteer and community work. Given the prevalence of formal labor in our day-to-day lives, most individuals simply do not have the time to engage in such activities. The current structure of the labor market and the social norms attached to it tend to generate a very limited conception of what is considered “valuable” or “productive” human activity.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">UBI has the potential to indirectly contribute to a broadening of what counts as productive work. Contrary to most existing income support programs, UBI would provide each individual with a basic income regardless of employment, and so it would increase financial security among unwaged caregivers and reduce their current financial dependence on working spouses (Robeyns, 2001; Standing, 2012). Furthermore, if set sufficiently high to cover basic needs, UBI would empower individuals to make their own choices, such as spending more time taking care of a sick child or aging parent. Such a high UBI could also alter a rigid gendered division into full-time caregivers and full-time employees by allowing a greater number of individuals to engage in both activities part-time (Fraser, 1997). UBI could transform the labor market by allowing people to shift from seeing jobs as a mere means of acquiring money to seeing them as a way to express personal engagement, interest, and commitment (Reich, 2016). UBI could potentially allow individuals to choose the lifestyle they want for themselves and their families, and to engage in a wider range of activities such as art, volunteering, community gardens and eco-villages, participating in after school classes, and joining community or neighborhood associations and other cultural projects (Fraser, 1997). Importantly, this is only plausible with a UBI set sufficiently high to cover basic needs.</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Empirical evidence from the U.S. and Canada’s negative income tax experiments in the 1970s indicate a reduction in work hours, though not a complete withdrawal from the labor market, specifically among women (single or married). In the Seattle-Denver Income Maintenance Experiment (SIME/DIME), two-parent households receiving the negative income tax saw a reduction in wives’ workload between zero and 27 percent and single-mothers between 15 and 30 percent (Widerquist, 2005). Similar effects were found in Canada’s Mincome experiment, where there was an 11.3 percentage point reduction in labor market participation (Calnitsky &amp; Latner, 2017). However, in the case of Mincome, qualitative evidence showed that many of these young single women cited care work, disability and illness, uneven employment opportunities, or educational investment as reasons for the reduction (Calnitsky &amp; Latner, 2017). This evidence may point to UBI’s potential to increase forms of informal labor at the expense of traditional, formal labor. It is less clear what the impact would be on the gendered division of care work.</span></p><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Some argue, however, that if the UBI is set too low, it might risk leaving informal laborers in relative poverty compared to those in the formal market. Even a sufficiently high UBI would not equalize the earnings of these two groups, nor would it necessarily offer a fair compensation for those who are engaged in informal activities such as caregiving and community work. Moreover, since social norms are a major element in explaining what kind of activities we find meaningful, it is not clear that UBI would be sufficient to encourage people to engage in informal labor.</span></p><br data-dcnode-id="1050"><p data-dcnode-id="1047"><b data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="1034"><li class="related-link" data-dcnode-id="1044" data-target="the-household"><a data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The household</span></a></li><li class="related-link" data-dcnode-id="1041" data-target="care-work"><a data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="1038" data-target="automation-and-future-of-work"><a data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Automation and the future of work</span></a></li><li class="related-link" data-dcnode-id="1035" data-target="labor-market"><a data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Impact on labor supply</span></a></li></ul><br data-dcnode-id="1033"><p data-dcnode-id="1030"><b data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Read more</span></b></p><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Barnes, P. (2014). </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">With Liberty and Dividends for All: How to Save Our Middle Class When Jobs Don’t Pay Enough</span></em><span data-dcnode-id="1026" instrument_node=""> (First Edition). Berrett-Koehler Publishers.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1024" instrument_node="">Calnitsky, D., &amp; Latner, J. P. (2017). Basic Income in a Small Town: Understanding the Elusive Effects on Work. </span><em data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Social Problems</span></em><span data-dcnode-id="1021" instrument_node="">, </span><em data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">64</span></em><span data-dcnode-id="1018" instrument_node="">(3), 456–456. </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/socpro/spx024"><span data-dcnode-id="1017" instrument_node="">https://doi.org/10.1093/socpro/spx024</span></a></p><p data-dcnode-id="1010"><span data-dcnode-id="1014" instrument_node="">Fraser, N. (1997). </span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Justice interruptus: Critical reflections on the “postsocialist” condition</span></em><span data-dcnode-id="1011" instrument_node="">. Routledge.</span></p><p data-dcnode-id="1000"><span data-dcnode-id="1009" instrument_node="">Pateman, C. (2004). Democratizing Citizenship: Some Advantages of a Basic Income. </span><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Politics &amp; Society</span></em><span data-dcnode-id="1006" instrument_node="">, </span><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">32</span></em><span data-dcnode-id="1003" instrument_node="">(1), 89–105. </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/0032329203261100"><span data-dcnode-id="1002" instrument_node="">https://doi.org/10.1177/0032329203261100</span></a></p><p data-dcnode-id="995"><span data-dcnode-id="999" instrument_node="">Reich, R. B. (2016). </span><em data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Saving Capitalism: For the Many, Not the Few</span></em><span data-dcnode-id="996" instrument_node=""> (1st ed.). Vintage Books, a Division of Penguin Random House LLC.</span></p><p data-dcnode-id="985"><span data-dcnode-id="994" instrument_node="">Robeyns, I. (2001). Will a Basic Income Do Justice to Women? </span><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Analyse &amp; Kritik</span></em><span data-dcnode-id="991" instrument_node="">, </span><em data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">23</span></em><span data-dcnode-id="988" instrument_node="">(1), 88–105. </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/auk-2001-0108"><span data-dcnode-id="987" instrument_node="">https://doi.org/10.1515/auk-2001-0108</span></a></p><p data-dcnode-id="975"><span data-dcnode-id="984" instrument_node="">Standing, G. (2012). Why a Basic Income Is Necessary for a Right to Work. </span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="981" instrument_node="">, </span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">7</span></em><span data-dcnode-id="978" instrument_node="">(2), 19–40. </span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/bis-2013-0007"><span data-dcnode-id="977" instrument_node="">https://doi.org/10.1515/bis-2013-0007</span></a></p><p data-dcnode-id="970"><span data-dcnode-id="974" instrument_node="">Stern, A. (2016). </span><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Raising the Floor: How a Universal Basic Income Can Renew Our Economy and Rebuild the American Dream</span></em><span data-dcnode-id="971" instrument_node=""> (1st ed.). PublicAffairs.</span></p><p data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">Van Parijs, P., &amp; Vanderborght, Y. (2017). </span><em data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Basic Income: A Radical Proposal for a Free Society and a Sane Economy</span></em><span data-dcnode-id="966" instrument_node=""> (1st ed.). Harvard University Press.</span></p><p data-dcnode-id="955"><span data-dcnode-id="964" instrument_node="">Widerquist, K. (2005). A failure to communicate: What (if anything) can we learn from the negative income tax experiments? </span><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The Journal of Socio-Economics</span></em><span data-dcnode-id="961" instrument_node="">, </span><em data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">34</span></em><span data-dcnode-id="958" instrument_node="">(1), 49–81. </span><a data-dcnode-id="956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.socec.2004.09.050"><span data-dcnode-id="957" instrument_node="">https://doi.org/10.1016/j.socec.2004.09.050</span></a></p><p data-dcnode-id="945"><span data-dcnode-id="954" instrument_node="">Zelleke, A. (2008). Institutionalizing the Universal Caretaker Through a Basic Income? </span><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="951" instrument_node="">, </span><em data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">3</span></em><span data-dcnode-id="948" instrument_node="">(3), 1–9. </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2202/1932-0183.1133"><span data-dcnode-id="947" instrument_node="">https://doi.org/10.2202/1932-0183.1133</span></a></p><br data-dcnode-id="944"></div><div aria-labelledby="pills-unemployment-tab" class="tab-pane fade" data-dcnode-id="822" id="pills-unemployment" role="tabpanel"><p data-dcnode-id="940"><em data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">This section is about how UBI might help tackle unemployment traps and mitigate other issues relating to unemployment.</span></em></p><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Unemployment is a major social concern for policymakers and activists alike. It is associated with lower economic growth rates, a loss in human capital, higher levels of social unrest, and various individual and social effects, such as depression and other adverse physical and mental health outcomes (Renahy et al., 2018). The economic impact of the 2020 coronavirus pandemic alone caused the percentage of persons jobless 15 to 26 weeks to increase from 11.1 percent in March 2020 to 39.4 percent in July 2020 (Bureau of Labor Statistics, 2020). While UBI, in itself, is not expected to reduce unemployment rates, it may reduce the poverty and economic insecurity that typically enfolds (Lewis, 2012).</span></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Two pervasive problems tend to stump policymakers: the unemployment trap and low take-up rates of unemployment benefits. The unemployment trap occurs when unemployed individuals face low or negative incentives to return to the labor market due to a potential loss of benefits and overall decrease in net income (Clark &amp; Kavanagh, 1996). This problem has been pervasive in particular in some European countries with reasonably generous out of work benefits designed in such a way that an unemployed individual is assured to lose all their benefits when they accept employment. That threat makes unemployed individuals are more likely to remain unemployed for longer. UBI is expected to help mitigate this problem. Since it does not involve means-testing and is independent of one’s level of work, individuals can attempt to return to the labor force without fear of losing existing benefits. The basic income experiment in Finland between 2017–2018 essentially tried to capture this potential impact of conditional unemployment benefits vs. a basic income. Additional research and empirical data from the final report (expected in 2020) will hopefully shed some light onto UBI’s ability to reduce unemployment traps.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">UBI might also be an effective solution to the problems associated with low take-up rates of unemployment benefits. Stigma, institutional barriers, and lack of information all contribute to the fact that many individuals who are eligible for benefits do not claim or receive them (Currie, 2004). This phenomenon has led many to question the effectiveness and desirability of targeted and means-tested programs. The universal and unconditional nature of UBI can be expected to increase take-up rates, since it would reduce the stigma associated with existing benefits and reduce institutional barriers and lack of information (Van Parijs &amp; Vanderborght, 2017). Thus, it might reduce the poverty and financial insecurity that are associated with unemployment.</span></p><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Other policies, such as a Job Guarantee, might prove more effective in dealing with the problem of unemployment than UBI. Advocates of a Job Guarantee argue that it would provide the benefits of a UBI at a significantly lower cost and with less destabilizing macroeconomic effects, and that it would also increase overall happiness by providing every individual with access to decent and stable jobs (Harvey, 2012; Tcherneva, 2012). The ability to offer a Guaranteed Job, though, might be undermined by technological developments. Computers and robots might significantly reduce the need for human labor over the next 20–30 years, thus causing a significant increase in unemployment (Walker, 2016). And unlike previous technological disruptions, there are reasons to believe that the current wave of automation will not result in a full recovery of the labor market (Ford, 2015). In a world with fewer available jobs, a Job Guarantee might prove overmatched. In this case, while UBI might not solve the problem of unemployment, it might nonetheless offer to stabilize income across communities (Sandbu, 2017).</span></p><br data-dcnode-id="931"><p data-dcnode-id="928"><b data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="909"><li class="related-link" data-dcnode-id="925" data-target="racial-economic-inequality"><a data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Racial economic inequality</span></a></li><li class="related-link" data-dcnode-id="922" data-target="job-precariousness"><a data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Job precariousness</span></a></li><li class="related-link" data-dcnode-id="919" data-target="collective-bargaining"><a data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Bargaining power</span></a></li><li class="related-link" data-dcnode-id="916" data-target="automation-and-future-of-work"><a data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Automation and the future of work</span></a></li><li class="related-link" data-dcnode-id="913" data-target="consumption"><a data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Consumption</span></a></li><li class="related-link" data-dcnode-id="910" data-target="labor-market"><a data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Impact on labor supply</span></a></li></ul><br data-dcnode-id="908"><p data-dcnode-id="905"><b data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Read more</span></b></p><p data-dcnode-id="898"><span p><p data-dcnode-id="844"><span data-dcnode-id="850" instrument_node="">Sandbu, M. (2017, April 6). Money can buy you work. </span><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Financial Times</span></em><span data-dcnode-id="847" instrument_node="">. </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/041c0efa-1ab0-11e7-a266-12672483791a"><span data-dcnode-id="846" instrument_node="">https://www.ft.com/content/041c0efa-1ab0-11e7-a266-12672483791a</span></a></p><p data-dcnode-id="834"><span data-dcnode-id="843" instrument_node="">Tcherneva, P. R. (2012). The Job Guarantee: Delivering the Benefits That Basic Income Only Promises – A Response to Guy Standing. </span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="840" instrument_node="">, </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">7</span></em><span data-dcnode-id="837" instrument_node="">(2). </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/bis-2013-0010"><span data-dcnode-id="836" instrument_node="">https://doi.org/10.1515/bis-2013-0010</span></a></p><p data-dcnode-id="829"><span data-dcnode-id="833" instrument_node="">Van Parijs, P., &amp; Vanderborght, Y. (2017). </span><em data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Basic Income: A Radical Proposal for a Free Society and a Sane Economy</span></em><span data-dcnode-id="830" instrument_node=""> (1st ed.). Harvard University Press.</span></p><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">Walker, M. (2016). </span><em data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Free Money for All: A Basic Income Guarantee Solution for the Twenty-First Century</span></em><span data-dcnode-id="825" instrument_node="">. Springer.</span></p><br data-dcnode-id="823"></div></div></div></div></div><div class="card" data-dcnode-id="705"><div class="card-header" data-dcnode-id="807" id="heading-automation"><button aria-controls="collapse-automation" aria-expanded="false" class="btn btn-link collapsed" data-dcnode-id="808" data-target="#collapse-automation" data-toggle="collapse" type="button"><span data-dcnode-id="817" instrument_node="">
</span><span class="theme-orb" data-dcnode-id="816"></span><span class="text" data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Automation</span></span><svg class="expand-icon icon" data-dcnode-id="811" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="813" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="812" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="809" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="810" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-automation" class="collapse" data-dcnode-id="706" data-id="automation" data-parent="#accordionExample" id="collapse-automation"><div class="card-body" data-dcnode-id="707"><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="800" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="801"><a aria-controls="pills-automation-and-future-of-work" aria-selected="true" class="nav-link active" data-dcnode-id="802" data-id="automation-and-future-of-work" data-toggle="pill" href="#pills-automation-and-future-of-work" id="pills-automation-and-future-of-work-tab" role="tab"><span data-dcnode-id="804" instrument_node="">Automation and the Future of Work</span><div class="underbar" data-dcnode-id="803"></div></a></li></ul><div class="tab-content" data-dcnode-id="708" id="pills-tabContent"><div aria-labelledby="pills-automation-and-future-of-work-tab" class="tab-pane fade show active" data-dcnode-id="709" id="pills-automation-and-future-of-work" role="tabpanel"><p data-dcnode-id="797"><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">This section discusses the potential threats posed by automation to the future of work and how UBI might address some of these challenges.</span></em></p><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">In recent years, there have been growing concerns about the potential societal effects of automation and artificial intelligence (AI)—especially the threat of unprecedented job displacement and large-scale unemployment. A recent poll, for example, suggests that most adults (73 percent) think that “an increased use of AI will eliminate more jobs than it creates,” a worry that is especially high among younger respondents (78 percent for individuals between the ages of 18 to 35) and among workers holding blue-collar jobs (82 percent) (Gallup andNortheastern University, 2018).If we value democracy because of its association with good governance, we may ask what impact UBI would have on the ability of democracies to govern well. Evidence from cash transfers offers insights on accountability and legitimacy—the two values thought necessary for good governance.</span></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">UBI appears to be an attractive solution to this threat. In fact, automation is the most frequently cited topic connected to the discussion of UBI, and in the same Northeastern and Gallup poll, 48 percent of respondents support a basic income for individuals who lose their jobs as a result of automation. Among supporters of UBI, 80 percent agree with the idea of taxing businesses to fund it. More specifically, they agree with the statement that companies who benefit from the adoption of AI should pay for a UBI for those displaced by this economic shift (Gallup andNortheastern University, 2018).</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">At the same time, there is wide disagreement about the seriousness of the threat posed by current developments in automation and artificial intelligence. Among the many potential future scenarios, three can be considered: (1) large-scale and long-term unemployment; (2) short-term unemployment and long-term recovery of the labor market; (3) large changes to the labor market in unpredictable and unprecedented ways. Depending on the scenario we privilege, a universal basic income may appear unequally pertinent, with different advantages and limitations.</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">According to the first scenario, current trends in automation and developments in artificial intelligence are likely to result in massive job loss and in large-scale and long-term unemployment. Some estimate that anywhere between 47 and 80 percent of current jobs could be automated in the next two decades (McKinsey Global Institute, 2017; Slaughter et al., 2017; Srnicek &amp; Williams, 2015). If this estimate is plausible, there is indeed very serious grounds to fear unprecedented job loss and workers’ displacement (Ford, 2015; Stern, 2016). UBI might then appear to be an efficient—and even necessary—policy to provide a safety net for workers who would lose their jobs, either while they attempt to find a new one and retrain, or as a permanent replacement for their salary in case there are no new jobs available. If funded through some of the wealth produced by automation, UBI would further enable communities to harness some of the profits of automation to keep a stable and generous income floor across society under conditions of large technological unemployment (Sandbu, 2017; Walker, 2016). UBI could further enable individuals to engage in productive activities beyond paid labor (including caregiving and volunteering, but also starting a business project of one’s own) which would be especially valuable in an economy where formal jobs become scarce. Importantly though, UBI would not provide a solution for technological unemployment itself. It would rather allow political communities to mitigate some of its negative effects. Since employment is an important part of human life and can deliver goods beyond money, such as the ability to make a social contribution, feel part of a community, achieve excellence and social recognition (Gheaus &amp; Herzog, 2016; Hughes, 2018), it is implausible to think that UBI can fully compensate individuals for the loss of a job.</span></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">According to the second scenario, while automation and AI are likely to contribute to some level of short-term unemployment, the economy will eventually adapt, and the labor market will recover. There is historical evidence in support of this scenario. While every major technological change throughout history resulted in job loss and workers’ displacement, the long-term demand for labor remained constant or even increased over time (Ford, 2015; Stern, 2016). In this case, we should anticipate large disruptions in the short-term, and overall stabilization in the long-term. If the current wave of technological changes indeed resulted only in short-term job loss, it might still take time for the economy to adapt to these changes, and many individuals and communities will find themselves on the losing end of those changes (since 2000, automation has already contributed to the elimination of millions of manufacturing jobs in the United States). In this case, UBI may prove a critical means to smooth the transition (McKinsey Global Institute, 2017; Walker, 2016). Workers and communities who stand to lose need to have access to a more generous, robust and less bureaucratic safety net than currently available. A UBI would ensure that those communities aren’t left behind entirely. Moreover, a UBI for all could lead to a reduction of working hours among those who still have a job, which could then free up positions for those out of work, thus facilitating job-sharing. It is important to note, however, that a fully universal basic income may not be needed in this second scenario. A targeted basic income specifically for those who lose their jobs could be a suitable solution, as long as it is delivered efficiently, and that access is maximized.</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Finally, according to the third scenario, automation and AI will result in large changes in the labor market that would cause unprecedented transformation. For example, even if automation does not cause massive unemployment, it might lead to an increase in the number of individuals who rely on the “gig economy” as their main source of income. In the least optimistic versions of this scenario, more and more individuals would have to rely on temporary, precarious, and insecure jobs in order to piece together their income and benefits (Slaughter et al., 2017). The range of jobs and activities that will be potentially impacted by automation and AI is quite wide. Some estimates suggest that about 60 percent of all occupations include at least 30 percent of activities that are likely to be automated (McKinsey Global Institute, 2017). The universal and unconditional nature of UBI allows for a better preparation for such wide and uncertain effects and could enhance existing safety net programs to accommodate individuals who are affected by these changes, whether unemployed or not (Bidadanure, 2019). UBI offers a more adequate answer to the large-scale precariousness and insecurity that are associated with these changes, many of which we are already seen today (Srnicek &amp; Williams, 2015; Standing, 2012).</span></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">UBI thus seems pertinent in a range of likely scenarios related to the future of work. But UBI is no panacea either and it cannot fix alone all that is lost when workers lose their jobs. Some also argue that the current debate around the threats of automation may not be a necessary part of the case for UBI. Today, the United States is already seeing a significant trend of economic dislocation and wealth concentration, which may be sufficient to justify UBI as a redistributive measure even without the hypothetical threat to future jobs (Hughes, 2018). Furthermore, the current focus on the threats of automation may distract policymakers from the various other reasons we already have to support UBI, such as the need for efficient and respectful poverty alleviation and for more adequate compensation of caregivers (Ruben, 2017).</span></p><br data-dcnode-id="782"><p data-dcnode-id="779"><b data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="766"><li class="related-link" data-dcnode-id="776" data-target="job-precariousness"><a data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Job precariousness</span></a></li><li class="related-link" data-dcnode-id="773" data-target="unemployment"><a data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Unemployment</span></a></li><li class="related-link" data-dcnode-id="770" data-target="work-beyond-jobs"><a data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Work beyond Jobs</span></a></li><li class="related-link" data-dcnode-id="767" data-target="economic-inequality"><a data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Economic Inequality</span></a></li></ul><br data-dcnode-id="765"><div class="citations" data-dcnode-id="710"><p data-dcnode-id="762"><b data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Read more</span></b></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Bidadanure, Juliana. 2020. “The Political Theory of Universal Basic Income,” Annual Review of Economics. Vol 22 (March 2019): 481-501.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Ford, Martin. 2015. Rise of the Robots: Technology and the Threat of a Jobless Future. New York: Basic Books</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Gheaus, Anca and Lisa Herzog. 2016. “The Goods of Work (Other Than Money!),” Journal of Social Philosophy. Vol 47, no. 1 (Spring 2016): 70-89.</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Harvey, Philip. 2013. More for Less: The Job Guarantee Strategy,” Basic Income Studies 7(2): 3-18.</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Hughes, Chris. 2018. Fair Shot: Rethinking Inequality and How We Earn. New York: St. Martin’s Books.</span></p><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">McKinsey Global Institute. 2017. “A Future that Works: Automation, Employment, and Productivity”</span></p><p data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">Metz, Cade. 2015. “Why WhatsApp Only Needs 50 Engineers for its 900M users.” Wired Magazine09/15/15. </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.com/2015/09/whatsapp-serves-900-million-users-50-engineers"><span data-dcnode-id="748" instrument_node="">https://www.wired.com/2015/09/whatsapp-serves-900-million-users-50-engineers</span></a></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Northeastern University &amp; Gallup. 2018. “Optimism and Anxiety: Views on the Impact of Artificial Intelligence and Higher Education Response”</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Reich, Robert B. 2016. Saving Capitalism: For the Many, Not the Few. New York: Vintage Books.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Rogers, Brishen. 2018. “Basic Income in a Just Society”, Boston Review (online), 1/31/2018.</span></p><p data-dcnode-id="736"><span data-dcnode-id="739" instrument_node="">Ruben, Adam. 2017. “What Does the Debate on Automation Mean for Basic Income.” Economic Security Project, 3/24/2017. </span><a data-dcnode-id="737" href="https://c </span><span class="theme-orb" data-dcnode-id="703"></span><span class="text" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Health</span></span><svg class="expand-icon icon" data-dcnode-id="698" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="700" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="699" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="696" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="697" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-health" class="collapse" data-dcnode-id="137" data-id="health" data-parent="#accordionExample" id="collapse-health"><div class="card-body" data-dcnode-id="138"><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="679" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="688"><a aria-controls="pills-mental-health" aria-selected="true" class="nav-link active" data-dcnode-id="689" data-id="mental-health" data-toggle="pill" href="#pills-mental-health" id="pills-mental-health-tab" role="tab"><span data-dcnode-id="691" instrument_node="">Mental Health</span><div class="underbar" data-dcnode-id="690"></div></a></li><li class="nav-item" data-dcnode-id="684"><a aria-controls="pills-access-to-health-services" aria-selected="false" class="nav-link" data-dcnode-id="685" data-id="access-to-health-services" data-toggle="pill" href="#pills-access-to-health-services" id="pills-access-to-health-services-tab" role="tab"><span data-dcnode-id="687" instrument_node="">Access to Health Services</span><div class="underbar" data-dcnode-id="686"></div></a></li><li class="nav-item" data-dcnode-id="680"><a aria-controls="pills-physical-health" aria-selected="false" class="nav-link" data-dcnode-id="681" data-id="physical-health" data-toggle="pill" href="#pills-physical-health" id="pills-physical-health-tab" role="tab"><span data-dcnode-id="683" instrument_node="">Physical Health</span><div class="underbar" data-dcnode-id="682"></div></a></li></ul><div class="tab-content" data-dcnode-id="139" id="pills-tabContent"><div aria-labelledby="pills-mental-health-tab" class="tab-pane fade show active" data-dcnode-id="432" id="pills-mental-health" role="tabpanel"><p data-dcnode-id="676"><em data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">This section discusses the possible effects UBI could have on some of social determinants that contribute to mental health outcomes.</span></em></p><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Mental health disorders have become increasingly common in the United States. In 2017, nearly one in five adults aged 18 or older (or 18.9 percent of all adults) were living with a mental illness. Of those individuals, 4.5 percent had a serious mental illness with greater prevalence among women and young adults under 25 (National Institute of Mental Health, 2019). Mental health problems and disorders are complex outcomes, shaped by biological and psychological factors and by the social, economic, and physical environments in which people live (Lund, 2018). Communities facing stark social inequalities, financial strain, limited education, unemployment, and adverse neighborhood characteristics are associated with an increased risk of developing a variety of mental disorders, including depression, anxiety, post-traumatic stress disorder or substance use disorder (Allen et al., 2014; Silva et al., 2016).</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Mental health disorders have wide-ranging social, economic and health consequences for individuals and families as well as local and larger communities. The social and economic costs of mental illness, both direct (medication, clinic visits, or hospitalization) and indirect (reduced labor supply, public income support payments, reduced educational attainment, or costs associated with homelessness and incarceration) (Insel, 2008) are shared widely and have lasting and profound effects. On a macro level, serious mental disorders cost the United States an estimated $200 billion in lost earnings per year (Insel, 2008); and, in 2013, the United States spent $71 billion to treat depressive disorders—the most costly among mental health and substance abuse disorders (Dieleman et al., 2016) . In 2017, the City of San Francisco was spending an estimated $370 million a year providing behavioral health services to more than 30,000 individuals (Tipping Point Community and University of California, San Francisco, 2019).</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Addressing, managing, and reducing mental health disorders would necessarily require a multi-pronged approach. It would be a mistake to think that a cash program alone could resolve such a profound issue. But UBI can, nonetheless, help improve mental health and reduce the risk of mental health disorders by improving an individual’s financial security and mobility.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">First, a generous UBI program could reduce economic insecurity, thereby decreasing stress (Ruckert et al., 2018). Economic insecurity is increasingly cited as one of the key socioeconomic determinants of mental health (Allen et al., 2014; Kopasker et al., 2018; Lund, 2018). The basic income experiment in Finland (2017–2018), albeit brief, showed signs of stress reduction among participants relative to non-participants: 54.8 percent of participants reported little to no stress relative to 45.6 percent of non-basic income recipients (Kangas et al., 2019).</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Results from negative income tax experiments, dividends, and unconditional cash transfers (UCTs) also highlight the positive effects of increased economic security on self-esteem, stress, anxiety and worry. The Mincome experiment in Manitoba, Canada, in the late 1970s showed an 8.5 percent decline in hospitalization rates largely due to a decline in mental health issues related to alcohol consumption (Forget, 2011, 2013). More recent qualitative data from the prematurely cancelled Ontario Basic Income Pilot indicated reductions in posttraumatic stress and chronic health problems (Forget, 2019).</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Other regularly dispersed unconditional cash transfer programs have also improved mental health. A longitudinal study on the Eastern Band of Cherokee Indians examined the psychiatric outcomes following the opening of a casino and bi-yearly income payments; it found that those families who were poor before the casino and came out of poverty after it opened had a notable reduction in children’s psychiatric disorders (symptoms of conduct and oppositional defiant disorders) (Costello et al., 2003).</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Research from low- and middle-income countries also points to the positive impact of unconditional cash on mental health. In the pilot implemented by the NGO Give Directly in Western Kenya between 2011 and 2012, the cash transfer contributed to increases in happiness and life satisfaction as well as a reduction in stress. In the same pilot, large single lump-sum transfers (rather than regular monthly transfers) led to a reduction in levels of cortisol, the stress hormone. Women also experienced a greater “reduction in worries and increase in self-esteem” relative to men, when receiving the transfer (Haushofer et al., 2016). Finally, a UCT Program for Orphans and Vulnerable Children in Kenya showed a reduction in depressive symptoms by 24 percent among young persons living in households that received cash transfers, relative to those who did not (Kilburn et al., 2016).</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Moreover, unlike conditional cash transfer programs or traditional welfare programs, the unconditional feature of a UBI policy could also have important effects on individuals’ mental health. When recipients know that they will receive the cash without having to meet any conditions—and that they are able to choose what they want to do with it—UBI may reduce anxiety and stress (Mah, 2017). For instance, the recipients of the Canadian unconditional income grant for senior citizens (Old Age Supplement, or OAS) self-reported better mental health outcomes than the recipients of conditional Canadian assistance programs (McIntyre et al., 2016). Data indicated that the stringent eligibility criteria of some of the current income assistance programs in Canada often left individuals dependent on these programs feeling stressed, marginalized, disempowered and hopeless. In contrast, low-income seniors who received the OAS faced less administrative restrictions (McIntyre et al., 2016).</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">A cash transfer experiment in Malawi also found that schoolgirls who received an unconditional cash transfer were approximately 14 percentage points less likely to be suffering from psychological distress relative to the control group. Schoolgirls receiving the cash transfer conditional on regular school attendance, however, only had a 6-percentage point decline in psychological distress (Baird et al., 2013). The data suggests that the higher level of psychological distress among girls with the school attendance conditionality may be attributed to the burden of meeting the conditions (Baird et al., 2013).</span></p><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">UBI may also indirectly impact wellbeing by reducing workers’ dependence on insecure or low-wage jobs. Precariousness represents a significant mental burden and can increase levels of anger, anomie, anxiety, and alienation (Standing, 2016) . Over the last few decades in the United States, the rise of the gig economy, the outsourcing of jobs, and the decline in real wage earnings have been shown to contribute to outcomes associated with negative mental wellness, including an increase in alcoholic liver disease, drug poisoning, and suicide among less educated (high school or less) white Americans (Case &amp; Deaton, 2020) . In the United Kingdom, males facing work-related insecurity (or the threat of workplace insecurity) often had the highest rate of mental health related illnesses (Kopasker et al., 2018). A UBI would only have a limited impact in reducing the occupational insecurities associated with outsourcing or the gig economy, but if it were to help transform precocity and unemployment from a state of insecurity to a state of voluntary flexibility, then it could plausibly also improve mental health (Srnicek et al., 2015).</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Where one lives is also a critical social determinant of mental health. Those who live in adverse neighborhoods with higher levels of violence and crime, stark social inequalities, and fewer employment and educational opportunities have less community connectedness and greater social isolation, contributing to an increase in mental health issues (Silva et al., 2016). A UBI could possibly give people increased access to housing in neighborhoods with higher quality community services and community participation. Results from the U.S.-run Gary Maintenance Income Experiment between 1971 and 1974 showed that those receiving the income transfer tended to move to neighborhoods with better housing and health providers, thereby reducing the risks to mental health outlined above (Ruckert et al., 2018). That said, it is difficult to infer that the data from the income experiments would necessarily contribute to that type of mobility under a UBI, given that all households would be receiving the same income. Additional research designs are needed to determine the effects of universal programs on communities as a whole.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Finally, the payment frequency of a UBI may impact mental health outcomes. While the pathways are complex, research has shown that when some individuals with mental health disorders are already highly indebted, they have a propensity for manic, nihilistic, social value, comfort, impulsive, and addictive spending (Holkar et al., 2016). If a UBI payment were to be more regular and predictable (as opposed to irregular large cash payments or a single lump sum) it may contribute to a reduction in poor outcomes and financial stress, and therefore improved mental health. Evidence from a cousin of basic income (Chicago Earned Income Tax Credit periodic payment pilot) has shown that regular, predictable payments contributed to a reduction of financial stress and an increase in overall wellbeing (Kramer et al., 2019) . Additional research is needed, though, to fully understand how, if at all, the frequency of a UBI would impact mental wellbeing and what wrap-around services, if any, would need to accompany the transfer.</span></p><br data-dcnode-id="651"><p data-dcnode-id="648"><b data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="635"><li class="related-link" data-dcnode-id="645" data-target="physical-health"><a data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Physical health</span></a></li><li class="related-link" data-dcnode-id="642" data-target="access-to-health-services"><a data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Access to health services</span></a></li><li class="related-link" data-dcnode-id="639" data-target="consumption"><a data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Consumption</span></a></li><li class="related-link" data-dcnode-id="636" data-target="work-beyond-jobs"><a data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Work beyond jobs</span></a></li></ul><br data-dcnode-id="634"><div class="citations" data-dcnode-id="433"><p data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Read more</span></b></p><p data-dcnode-id="624"><span data-dcnode-id="630" instrument_node="">Allen, J., Marmot, M., World Health Organization, &amp; Fundação Calouste Gulbenkian. (2014). </span><em data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Social determinants of mental health</span></em><span data-dcnode-id="627" instrument_node="">. </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//apps.who.int/iris/bitstream/10665/112828/1/9789241506809_eng.pdf%3Fua%3D1"><span data-dcnode-id="626" instrument_node="">http://apps.who.int/iris/bitstream/10665/112828/1/9789241506809_eng.pdf?ua=1</span></a></p><p data-dcnode-id="614"><span data-dcnode-id="623" instrument_node="">Baird, S., Hoop, J. de, &amp; Özler, B. (2013). Income Shocks and Adolescent Mental Health. </span><em data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Journal of Human Resources</span></em><span data-dcnode-id="620" instrument_node="">, </span><em data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">48</span></em><span data-dcnode-id="617" instrument_node="">(2), 370–403. </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3368/jhr.48.2.370"><span data-dcnode-id="616" instrument_node="">https://doi.org/10.3368/jhr.48.2.370</span></a></p><p data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">Case, A., &amp; De
