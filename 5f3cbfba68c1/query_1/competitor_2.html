" instrument_node="">https://doi.org/10.1093/pubmed/fdx006</span></a></p><p data-dcnode-id="452"><span data-dcnode-id="459" instrument_node="">Silva, M., Loureiro, A., &amp; Cardoso, G. (2016). Social determinants of mental health: A review of the evidence. </span><em data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">The European Journal of Psychiatry</span></em><span data-dcnode-id="456" instrument_node="">, </span><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">30</span></em><span data-dcnode-id="453" instrument_node="">(4), 259–292.</span></p><p data-dcnode-id="447"><span data-dcnode-id="451" instrument_node="">Srnicek, N., &amp; Williams, A. (2015). </span><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Inventing the Future: Postcapitalism and a World Without Work</span></em><span data-dcnode-id="448" instrument_node="">. Verso Books.</span></p><p data-dcnode-id="442"><span data-dcnode-id="446" instrument_node="">Standing, G. (2016). </span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">The Precariat: The New Dangerous Class</span></em><span data-dcnode-id="443" instrument_node=""> (Reprint edition). Bloomsbury Academic.</span></p><p data-dcnode-id="435"><span data-dcnode-id="441" instrument_node="">Tipping Point Community, &amp; University of California, San Francisco. (2019). </span><em data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Behavioral Health and Homelessness in San Francisco: Needs and Opportunities</span></em><span data-dcnode-id="438" instrument_node="">. </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chi.tippingpoint.org/wp-content/uploads/2019/09/JSI_SF-BH-and-Homelessness_2019.pdf"><span data-dcnode-id="437" instrument_node="">http://chi.tippingpoint.org/wp-content/uploads/2019/09/JSI_SF-BH-and-Homelessness_2019.pdf</span></a></p><br data-dcnode-id="434"></div></div><div aria-labelledby="pills-access-to-health-services-tab" class="tab-pane fade" data-dcnode-id="283" id="pills-access-to-health-services" role="tabpanel"><p data-dcnode-id="429"><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">This section discusses how UBI could potentially increase access to health care services, therefore contributing to healthier communities.</span></em></p><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Access to health care services is central to promoting and maintaining one’s health, preventing and managing illness and disease, reducing unnecessary disability and premature death, and achieving health equity (Office of Disease Prevention and Health Promotion, n.d.). Research has shown that access to care (inclusive of dental care) varies by race and ethnicity, income, age, gender, geographic or residential location, and sexual orientation (Agency for Healthcare Research and Quality, 2018; Chattopadhyay, 2008). Barriers in access to health services—including high cost of care, inadequate or no insurance coverage, lack of availability of services, or lack of culturally competent care—often contribute to variation across these different groups.</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Many of the social determinants of health intersect with these barriers (Bhatt et al., 2018). In 2015, 23.4 percent of adults (18–64 years) living in poverty or just above the poverty line in the United States cited cost as the top reason for not obtaining needed medical care at least once during the last 12 months (Martinez &amp; Ward, 2016) . Those living in poverty face economic insecurity and therefore have limited capacity to pay out-of-pocket health care costs (Lauren Frohlich et al., 2015). Moreover, despite the Affordable Care Act of 2010 that mandated medical insurance for all in the United States, in 2017, over 10 percent of adults had no medical insurance. In that same year, 61.6 percent had prescriptive drug insurance, and only 54.5 percent had dental insurance (Office of Disease Prevention and Health Promotion, n.d.). Access to health care services is also complicated by where one lives and the availability of services. In rural parts of the United States, where poverty is the greatest, there are 40 physicians per 100,000 persons compared to nearly 54 physicians per 100,000 in urban areas (Hostetter et al., 2017).</span></p><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Acknowledging the complexity of health care insurance markets and the variation in quality health care services available, an increase in an individual’s income could plausibly have an impact on access to health care services. While more research is needed to understand whether and how UBI could boost access to healthcare, especially in the United States, UBI could improve access to preventative health care services thus reducing the incidence of disease and more expensive health care services (Ruckert et al., 2018).</span></p><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">India and Namibia’s basic income experiments both contributed to increased access to health care services. In the Madhya Pradesh experiment, the basic income led to an increase in private health care use (from 50 percent to 65 percent) because of geographic proximity to the village and because the quality of the care was perceived to be better. These rates of use were sustained well after the experiment (Davala et al., 2017). In Namibia, prior to the experiment, poverty prevented many in Otijivero-Omitara from seeking services. During the experiment, though, expenditures at the local health clinic increased by an average of five times each month than what was normally spent without the additional income (Haarmann et al., 2009). Finally, even in countries where universal healthcare is publicly funded, a basic income would give individuals an opportunity to access more specialized care beyond the health services and medications available to them under universal healthcare.</span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">A UBI could also possibly guarantee more equitable access to drugs in countries where no public or private drug insurance plans are available (Ruckert et al., 2018). In the United States, given the exponential rise in cost of lifesaving drugs, access to appropriate medication is increasingly difficult to afford (Kesselheim et al., 2016). As such, a universal income could reduce some of the barriers to accessing necessary medicines and make access to medicine more equitable (Ruckert et al., 2018). In the Namibia basic income experiment, there was an increase in antiretroviral (ARV) treatment among patients with HIV (from 3 to 36 individuals). While this increase is notable, it is important to acknowledge that during the experiment, the government was also implementing an ARV rollout. As a result, it is difficult to attribute this increase in use of lifesaving drugs to the basic income intervention itself. Additional research and data are needed to determine what sort of impact a basic income could have on access to medicine.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Finally, a UBI may increase one’s access to dental health services and therefore reduce the risk factors associated with oral diseases and other chronic diseases (Chen et al., 2018). While many developed countries provide universal healthcare, universal coverage of dental health care schemes is rare; Austria, Mexico, Poland, Spain, Turkey, Denmark, Finland, Greece, Italy, and the United Kingdom, for example, do not offer universal dental health care. Moreover, it is often the case that countries who do cover dental services often neglect critical services (Biggs, 2012) . Many of the risk factors associated with chronic diseases are also applicable for oral diseases, such as diet and hygiene, smoking, alcohol, risky behaviors causing injuries, and stress (Sheiham, 2005). A UBI could reduce the aforementioned risk factors through improving an individual’s income security, thus allowing them to have more time and resources to access both mitigative and responsive oral health care services (Chen et al., 2018).</span></p><br data-dcnode-id="416"><p data-dcnode-id="413"><b data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="403"><li class="related-link" data-dcnode-id="410" data-target="mental-health"><a data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Mental health</span></a></li><li class="related-link" data-dcnode-id="407" data-target="physical-health"><a data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Physical Health</span></a></li><li class="related-link" data-dcnode-id="404" data-target="consumption"><a data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Consumption</span></a></li></ul><br data-dcnode-id="402"><p data-dcnode-id="399"><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Read more</span></b></p><p data-dcnode-id="392"><span data-dcnode-id="398" instrument_node="">Agency for Healthcare Research and Quality. (2018). </span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Access and Disparities in Access to Health Care</span></em><span data-dcnode-id="395" instrument_node="">. Department of Health and Human Services. </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahrq.gov/research/findings/nhqrdr/nhqdr15/access.html"><span data-dcnode-id="394" instrument_node="">https://www.ahrq.gov/research/findings/nhqrdr/nhqdr15/access.html</span></a></p><p data-dcnode-id="382"><span data-dcnode-id="391" instrument_node="">Bhatt, J., &amp; Bathija, P. (2018). Ensuring Access to Quality Health Care in Vulnerable Communities: </span><e ata-dcnode-id="321" instrument_node="">https://aspe.hhs.gov/basic-report/financial-condition-and-health-care-burdens-people-deep-poverty</span></a></p><p data-dcnode-id="312"><span data-dcnode-id="318" instrument_node="">Martinez, M., &amp; Ward, B. (2016). </span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Health Care Access and Utilization Among Adults Aged 18–64, by Poverty Level: United States, 2013–2015</span></em><span data-dcnode-id="315" instrument_node=""> (p. 8) [262]. National Center for Health Statistics. </span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/nchs/data/databriefs/db262.pdf"><span data-dcnode-id="314" instrument_node="">https://www.cdc.gov/nchs/data/databriefs/db262.pdf</span></a></p><p data-dcnode-id="305"><span data-dcnode-id="311" instrument_node="">Office of Disease Prevention and Health Promotion. (n.d.). </span><em data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Access to Health Services</span></em><span data-dcnode-id="308" instrument_node="">. Healthypeople.Gov. Retrieved November 3, 2019, from </span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthypeople.gov/2020/topics-objectives/topic/Access-to-Health-Services"><span data-dcnode-id="307" instrument_node="">https://www.healthypeople.gov/2020/topics-objectives/topic/Access-to-Health-Services</span></a></p><p data-dcnode-id="295"><span data-dcnode-id="304" instrument_node="">Ruckert, A., Huynh, C., &amp; Labonté, R. (2018). Reducing health inequities: Is universal basic income the way forward? </span><em data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Journal of Public Health</span></em><span data-dcnode-id="301" instrument_node="">, </span><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">40</span></em><span data-dcnode-id="298" instrument_node="">(1), 3–7. </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/pubmed/fdx006"><span data-dcnode-id="297" instrument_node="">https://doi.org/10.1093/pubmed/fdx006</span></a></p><p data-dcnode-id="285"><span data-dcnode-id="294" instrument_node="">Sheiham, A. (2005). Oral health, general health and quality of life. </span><em data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Bulletin of the World Health Organization</span></em><span data-dcnode-id="291" instrument_node="">, </span><em data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">83</span></em><span data-dcnode-id="288" instrument_node="">(9), 644. </span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org//S0042-96862005000900004"><span data-dcnode-id="287" instrument_node="">https://doi.org//S0042-96862005000900004</span></a></p><br data-dcnode-id="284"></div><div aria-labelledby="pills-physical-health-tab" class="tab-pane fade" data-dcnode-id="140" id="pills-physical-health" role="tabpanel"><p data-dcnode-id="280"><em data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">This section discusses ways in which UBI might lead to an improvement in physical health through addressing the socioeconomic determinants of health.</span></em></p><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Adults in the United States living in poverty are more than five times as likely to report fair or poor health as adults with a median income (Braveman &amp; Egerter, 2013; Office of the Assistant Secretary for Planning and Evaluation, 2019). Low-income adults in the United States have higher rates of heart disease, diabetes, stroke, coronary heart disease, chronic arthritis and other chronic diseases compared to wealthier individuals in the United States (Schiller et al., 2012). This burden is shared by children living in poverty who experience higher rates of asthma, heart conditions, hearing problems, digestive disorders, and elevated blood levels. Children living in poverty are also more exposed to risk factors for medical conditions such as childhood obesity than children in higher income households (Woolf et al., 2015).</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Strong evidence suggests that an absolute increase in an individual’s income floor would directly improve health outcomes (Benzeval et al., 2014; Braveman et al., 2010, 2011; Woolf et al., 2015). There remains much debate, however, about the specific causal pathways that link income and health. The pathways are complex both between income groups and across the life cycle; they intersect with where an individual lives (geographical location), the access they have to services, and the cultural context of an individual’s life (school, work, community). The pathways are also bi-directional and inter-generational (Benzeval et al., 2014). While complex, individuals with greater income tend to be able to afford health care services and health insurance, engage in healthier lifestyles, live in more advantageous communities, and have income for coping from ill health (Benzeval et al., 2014; Woolf et al., 2015).</span></p><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Recognizing the complexities of the casual pathways that link income and health, a UBI could still serve as a key component to addressing some of the challenges in population health. A UBI could possibly minimize the health risks associated with higher rates of chronic disease and illness among adults and children by addressing the underlying socioeconomic and environmental circumstances (Mah, 2017). These health risks include increased tobacco use, raised blood pressure, physical inactivity, unhealthy diet, and harmful use of alcohol (Public Health Agency Canada, 2015). Economic insecurity, among other socioeconomic circumstances, has been shown to contribute to chronic stress, and therefore to impact these risks and result in worse health outcomes (Forget, 2018).</span></p><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">UBI could minimize these risks because it serves as a form of income security or insurance, whether or not an individual works (Forget, 2011). For those receiving the basic income in the Finland basic income experiment (2017–2018), for example, self-perceived levels of stress were lower than for those not participating. Because 54.8 percent of participants considered their health to be very good or good relative to 46.2 percent of nonparticipants, it is possible that lower stress contributed to a better perception of one’s overall health and wellbeing (Kangas et al., 2019). Moreover, empirical data from the Canadian MINCOME (1975–1978) showed an 8.5 percent decline in hospitalizations related to accidents and injuries (Forget, 2011) - including those injuries that are highly correlated with income insecurity induced stress, such as, car accidents, children suffering from accidents while parents are out harvesting, and alcohol induced injuries.</span></p><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">One’s health is also determined by social factors such as where one lives and the civic and economic vitality of one’s community. But, increasingly, income inequality is making it difficult for individuals to afford to live in healthier, more advantageous communities (Forget, 2018). Those who live in less advantageous communities often experience higher levels of chronic stress and face challenges with a number of community-level health-related factors (access to healthy food, affordable housing, transportation, school systems, jobs and health care, environmental pollution, among others) (Benzeval et al., 2014; Woolf et al., 2015).</span></p><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">If a UBI was funded progressively, it could reduce some of the health inequities among individuals living in low income communities by allowing for increased access to quality services and housing (Ruckert et al., 2018). Results from the U.S.-run New Jersey Income Maintenance Experiment (1968–1972), the Gary Maintenance Income Experiment (1971–1974), and the Denver and Seattle Maintenance Income Experiments (1971–1982) showed that those receiving the income transfer tended to have higher mobility rates than households in the control groups (positive effects on private rental expenses) (Kaluzny, 1979). In the Gary experiment, poor housing conditions and dissatisfaction with current dwelling conditions were positively related to mobility (Kaluzny, 1979).</span></p><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">While there is a relationship between income and health outcomes, additional research is needed to understand how a basic income dispersed universally would play out on health disparities across different income levels and in different country contexts with varying healthcare systems.</span></p><br data-dcnode-id="265"><p data-dcnode-id="262"><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="252"><li class="related-link" data-dcnode-id="259" data-target="mental-health"><a data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Mental health</span></a></li><li class="related-link" data-dcnode-id="256" data-target="access-to-health-care-services"><a data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Access to health care services</span></a></li><li class="related-link" data-dcnode-id="253" data-target="consumption"><a data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Consumption</span></a></li></ul><br data-dcnode-id="251"><p data-dcnode-id="248"><b data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Read more</span></b></p><p data-dcnode-id="241"><span data-dcnode-id="247" instrument_node="">Benzeval, M., Lorenc, T., Petticrew, M., Campbell, M., Egan, M., Bond, L., &amp; Petticrew, M. (2014). </span><em data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">How Does Money Influence Health?</span></em><span data-dcnode-id="244" instrument_node=""> (p. 70). Joseph Rowntree Foundation. </span><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jrf.org.uk/sites/default/files/jrf/migrated/files/income-health-poverty-full.pdf"><span data-dcnode-id="243" instrument_node="">https://www.jrf.org.uk/sites/default/files/jrf/migrated/files/income-health-poverty-full.pdf</span></a></p><p data-dcnode-id="231"><span data-dcnode-id="240" instrument_node="">Braveman, P. A., Cubbin, C., Egerter, S., Williams, D. R., &amp; Pamuk, E. (2010). Socioeconomic Disparities in Health in the United States: What the Patterns Tell Us. </span><em data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">American Journal of Public Health</span></em><span data-dcnode-id="237" instrument_node="">, </span><em data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">100</span></em><span data-dcnode-id="234" instrument_node="">(S1), S186–S196. </span><a data-dcnode-id="232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2105/AJPH.2009.166082"><span data-dcnode-id="233" instrument_node="">https://doi.org/10.2105/AJPH.2009.166082</span></a></p><p data-dcnode-id="224"><span data-dcnode-id="230" instrument_node="">Braveman, P. A., &amp; Egerter, S. (2013). </span><em data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Overcoming Obstacles to Health in 2013 and Beyond</span></em><span data-dcnode-id="227" instrument_node=""> [RWJF Commission to Build A Healthier America]. Robert Wood Johnson Foundation. </span><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uab.edu/midsou
