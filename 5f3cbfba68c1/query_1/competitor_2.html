ta-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1596/0-8213-5468-X"><span data-dcnode-id="2819" instrument_node="">https://doi.org/10.1596/0-8213-5468-X</span></a></p><p data-dcnode-id="2810"><span data-dcnode-id="2816" instrument_node="">World Bank. (2016). </span><em data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">Making Politics Work for Development: Harnessing Transparency and Citizen Engagement</span></em><span data-dcnode-id="2813" instrument_node="">. The World Bank. </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1596/978-1-4648-0771-8"><span data-dcnode-id="2812" instrument_node="">https://doi.org/10.1596/978-1-4648-0771-8</span></a></p><br data-dcnode-id="2809"></div></div></div></div></div><div class="card" data-dcnode-id="1782"><div class="card-header" data-dcnode-id="2793" id="heading-economic-effects"><button aria-controls="collapse-economic-effects" aria-expanded="false" class="btn btn-link collapsed" data-dcnode-id="2794" data-target="#collapse-economic-effects" data-toggle="collapse" type="button"><span data-dcnode-id="2803" instrument_node="">
</span><span class="theme-orb" data-dcnode-id="2802"></span><span class="text" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Economic Effects</span></span><svg class="expand-icon icon" data-dcnode-id="2797" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2799" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line><line data-dcnode-id="2798" stroke="#84868b" x1="17.5" x2="17.5" y1="36" y2="218557e-13"></line></svg><svg class="collapse-icon icon" data-dcnode-id="2795" fill="none" height="36" viewBox="0 0 36 36" width="36" xmlns="http://www.w3.org/2000/svg"><line data-dcnode-id="2796" stroke="#84868b" x2="36" y1="17.5" y2="17.5"></line></svg></button></div><div aria-labelledby="heading-economic-effects" class="collapse" data-dcnode-id="1783" data-id="economic-effects" data-parent="#accordionExample" id="collapse-economic-effects"><div class="card-body" data-dcnode-id="1784"><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">SUB-THEMES</span></p><ul class="nav nav-pills mb-3" data-dcnode-id="2766" id="pills-tab" role="tablist"><li class="nav-item" data-dcnode-id="2787"><a aria-controls="pills-economic-inequality" aria-selected="true" class="nav-link active" data-dcnode-id="2788" data-id="economic-inequality" data-toggle="pill" href="#pills-economic-inequality" id="pills-economic-inequality-tab" role="tab"><span data-dcnode-id="2790" instrument_node="">Economic Inequality</span><div class="underbar" data-dcnode-id="2789"></div></a></li><li class="nav-item" data-dcnode-id="2783"><a aria-controls="pills-inflation" aria-selected="false" class="nav-link" data-dcnode-id="2784" data-id="inflation" data-toggle="pill" href="#pills-inflation" id="pills-inflation-tab" role="tab"><span data-dcnode-id="2786" instrument_node="">Inflation</span><div class="underbar" data-dcnode-id="2785"></div></a></li><li class="nav-item" data-dcnode-id="2779"><a aria-controls="pills-consumption" aria-selected="false" class="nav-link" data-dcnode-id="2780" data-id="consumption" data-toggle="pill" href="#pills-consumption" id="pills-consumption-tab" role="tab"><span data-dcnode-id="2782" instrument_node="">Consumption</span><div class="underbar" data-dcnode-id="2781"></div></a></li><li class="nav-item" data-dcnode-id="2775"><a aria-controls="pills-migration" aria-selected="false" class="nav-link" data-dcnode-id="2776" data-id="migration" data-toggle="pill" href="#pills-migration" id="pills-migration-tab" role="tab"><span data-dcnode-id="2778" instrument_node="">Migration</span><div class="underbar" data-dcnode-id="2777"></div></a></li><li class="nav-item" data-dcnode-id="2771"><a aria-controls="pills-labor-market" aria-selected="false" class="nav-link" data-dcnode-id="2772" data-id="labor-market" data-toggle="pill" href="#pills-labor-market" id="pills-labor-market-tab" role="tab"><span data-dcnode-id="2774" instrument_node="">Impact on Labor Supply</span><div class="underbar" data-dcnode-id="2773"></div></a></li><li class="nav-item" data-dcnode-id="2767"><a aria-controls="pills-savings" aria-selected="false" class="nav-link" data-dcnode-id="2768" data-id="savings" data-toggle="pill" href="#pills-savings" id="pills-savings-tab" role="tab"><span data-dcnode-id="2770" instrument_node="">Savings &amp; investment</span><div class="underbar" data-dcnode-id="2769"></div></a></li></ul><div class="tab-content" data-dcnode-id="1785" id="pills-tabContent"><div aria-labelledby="pills-economic-inequality-tab" class="tab-pane fade show active" data-dcnode-id="2595" id="pills-economic-inequality" role="tabpanel"><p data-dcnode-id="2763"><em data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">This section explores UBI’s possible impact on reducing income and wealth inequalities.</span></em></p><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Income inequality is the unequal distribution of income in a society, fueled by social and economic forces that unevenly distribute economic opportunities. Income inequality is problematic for several reasons. Evidence shows that high levels of income inequality lead to crime (Kelly, 2000), bad health (Pickett &amp; Wilkinson, 2015), and low population-wide happiness (Layard, 2003). Political theorists who advocate for republican freedom—that is, freedom from domination by others—worry that severe income inequality may allow some individuals to dominate others (Pettit, 1997). Similarly, political theorists who advocate for democratic equality—that is, equality in social status among individuals—worry that severe income inequality may reduce the social status of those who have less compared to those who have a more (Anderson, 1999). Lastly, some believe that income inequality is undesirable in itself and unjust (Phillips, 2004).</span></p><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">A UBI could reduce income inequality in at least four ways. First, the payment will represent a larger share of an individual’s total income for poorer households than for those who are higher on the income distribution, thus reducing relative inequities (Atkinson, 2013; Goldsmith, 2001; Humphreys et al., 2007). Second, a UBI could reduce income inequality if its funding mechanism had a gap-reducing effect—for example, if the UBI was funded through a progressive tax, such as wealth taxes (Henry, 2014) and “data taxes” (The Guardian, 2017). Third, a UBI provides income security that may allow individuals to pursue education or to change their employment, thus growing long-term income. Finally, a UBI could reduce income inequality by allowing low-income individuals to invest in crucial property and financial assets that grow in value over time. In recent decades, increases in income inequality has driven wealth inequality, although these gaps are largely driven by wealth concentration among the very highest earners (Saez and Zucman, 2016).</span></p><p data-dcnode-id="2748"><span data-dcnode-id="2758" instrument_node="">The gap reducing effect has been examined in conditional cash transfers programs in low- and middle-income countries. In Brazil, 4.7 percent of the 21 percent fall in the Brazilian Gini index between 1995 and 2004 was attributed to the </span><em data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Bolsa Familia</span></em><span data-dcnode-id="2755" instrument_node=""> Program, despite cash transfers representing only 0.5 percent of the average household income (F. V. Soares &amp; Soares, 2006). Similarly, in Mexico, the </span><em data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Oportunidades</span></em><span data-dcnode-id="2752" instrument_node=""> cash transfer program was responsible for 21 percent of the 5 percent fall in the Gini index between 1996 and 2004 (Soares et al., 2018). The researchers did not speculate why the cash transfers had such a strong gap-reducing effect, but one study found that the </span><em data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Oportunidades</span></em><span data-dcnode-id="2749" instrument_node=""> cash transfers allowed poor Mexicans to invest in productive assets, which increased their agricultural income by 10 percent after 18 months (Gertler et al., 2012). This increase may explain a large part of the dramatic reduction in the Mexican Gini index over the eight-year period between 1996 and 2004.</span></p><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Evidence from high-income countries is scarce but tells a different story than what has been observed in low- and middle-income countries. For example, Alaska’s Permanent Fund Dividend (PFD) increased, rather than decreased, economic inequality both in the short run and in the long run (Kozminski &amp; Baek, 2017). The researchers attribute this finding to differences in spending patterns across income gradients, with low-income households spending more of the dividend fund on household consumption, while high-income households might be able to direct the payment to investments. However, other research on the Alaska PDF demonstrated that higher-income households are likely to spend a larger proportion of their extra income on consumption than lower-income households (Kueng, 2018).</span></p><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">More research is needed to help answer some questions. First, the relationship between UBI and other economic effects, such as wealth accumulation and access to credit, is not yet understood. The gap-reducing effect may be lessened if UBI enables those on the higher end of the income distribution to invest their payment in ways that generate more returns. Second, so far, UBI pilots have been in areas with high rates of poverty (Davala et al. 2017). To predict impacts on income inequality, more studies need to be done in economies with significant numbers of both low- and high-income individuals.</span></p><br data-dcnode-id="2743"><p data-dcnode-id="2740"><b data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2724"><li class="related-link" data-dcnode-id="2737" data-target="racial-economic-inequality"><a data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Racial economic inequality</span></a></li><li class="related-link" data-dcnode-id="2734" data-target="racialized-welfare-stereotypes"><a data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Racialized welfare stereotypes</span></a></li><li class="related-link" data-dcnode-id="2731" data-target="consumption"><a data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Consumption</span></a></li><li class="related-link" data-dcnode-id="2728" data-target="savings"><a data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Savings and investment</span></a></li><li class="related-link" data-dcnode-id="2725" data-target="labor-market"><a data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Labor supply effects</span></a></li></ul><br data-dcnode-id="2723"><div class="citations" data-dcnode-id="2596"><p data-dcnode-id="2720"><b data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Read more</span></b></p><p data-dcnode-id="2710"><span data-dcnode-id="2719" instrument_node="">Anderson, E. (1999). What Is the Point of Equality? </span><em data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">Ethics</span></em><span data-dcnode-id="2716" instrument_node="">, </span><em data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">109</span></em><span data-dcnode-id="2713" instrument_node="">(2). </span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/248422963_What_Is_the_Point_of_Equality"><span data-dcnode-id="2712" instrument_node="">https://www.researchgate.net/publication/248422963_What_Is_the_Point_of_Equality</span></a></p><p data-dcnode-id="2703"><span data-dcnode-id="2709" instrument_node="">Atkinson, A. B. (2013). Reducing income inequality in Europe | SpringerLink. </span><em data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">IZA Journal of European Labor Studies</span></em><span data-dcnode-id="2706" instrument_node="">. </span><a data-dcnode-id="2704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1186/2193-9012-2-12"><span data-dcnode-id="2705" instrument_node="">https://link.springer.com/article/10.1186/2193-9012-2-12</span></a></p><p data-dcnode-id="2696"><span data-dcnode-id="2702" instrument_node="">Davala, S., Jhabvala, R., Standing, G., &amp; Badgaiyan, N. (2017). </span><em data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Piloting Basic Income A Legacy Study Final Report</span></em><span data-dcnode-id="2699" instrument_node=""> (p. 52). SEWA Bharat and INBI. </span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sewabharat.org/wp-content/uploads/2019/02/Legacy-Study-Final-Report-a.pdf"><span data-dcnode-id="2698" instrument_node="">http://sewabharat.org/wp-content/uploads/2019/02/Legacy-Study-Final-Report-a.pdf</span></a></p><p data-dcnode-id="2688"><span data-dcnode-id="2695" instrument_node="">Gertler, P., Martinez, S., &amp; Rubio-Codina, M. (2012). Investing Cash Transfers to Raise Long-Term Living Standards. </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">American Economic Journal: Applied Economics</span></em><span data-dcnode-id="2692" instrument_node="">, </span><em data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">4</span></em><span data-dcnode-id="2689" instrument_node="">(1), 164–192.</span></p><p data-dcnode-id="2681"><span data-dcnode-id="2687" instrument_node="">Goldsmith, O. S. (2001). </span><em data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">The Alaska Permanent Fund Dividend: A Case Study in Implementation of a Basic Income Guarantee</span></em><span data-dcnode-id="2684" instrument_node="">. </span><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholarworks.alaska.edu/handle/11122/4170"><span data-dcnode-id="2683" instrument_node="">https://scholarworks.alaska.edu/handle/11122/4170</span></a></p><p data-dcnode-id="2674"><span data-dcnode-id="2680" instrument_node="">Henry, M. (2014). </span><em data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">How to Fund a Universal Basic Income | Library</span></em><span data-dcnode-id="2677" instrument_node="">. The Centre for Welfare Reform. </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.centreforwelfarereform.org/library/how-to-fund-a-universal-basic-income.html"><span data-dcnode-id="2676" instrument_node="">https://www.centreforwelfarereform.org/library/how-to-fund-a-universal-basic-income.html</span></a></p><p data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">Humphreys, M., Sachs, J. D., &amp; Stiglitz, J. (2007). </span><em data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Escaping the Resource Curse</span></em><span data-dcnode-id="2670" instrument_node="">. Columbia University Press. New York, NY.</span></p><p data-dcnode-id="2659"><span data-dcnode-id="2668" instrument_node="">Kelly, M. (2000). Inequality and Crime. </span><em data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">Review of Economics and Statistics</span></em><span data-dcnode-id="2665" instrument_node="">, </span><em data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">82</span></em><span data-dcnode-id="2662" instrument_node="">(4). </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/2646649%3Fseq%3D1%23metadata_info_tab_contents"><span data-dcnode-id="2661" instrument_node="">https://www.jstor.org/stable/2646649?seq=1#metadata_info_tab_contents</span></a></p><p data-dcnode-id="2649"><span data-dcnode-id="2658" instrument_node="">Kozminski, K., &amp; Baek, J. (2017). Can an oil-rich economy reduce its income inequality? Empirical evidence from Alaska’s Permanent Fund Dividend. </span><em data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">Energy Economics</span></em><span data-dcnode-id="2655" instrument_node="">, </span><em data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">65</span></em><span data-dcnode-id="2652" instrument_node="">, 98–104. </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.eneco.2017.04.021"><span data-dcnode-id="2651" instrument_node="">https://doi.org/10.1016/j.eneco.2017.04.021</span></a></p><p data-dcnode-id="2645"><span data-dcnode-id="2648" instrument_node="">Kueng, L. (2018). Excess Sensitivity of High-Income Consumers* | The Quarterly Journal of Economics | Oxford Academic. *Quarterly Journal of Economics*, *133*(4). </span><a data-dcnode-id="2646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/qje/article/133/4/1693/5036538"><span data-dcnode-id="2647" instrument_node="">https://academic.oup.com/qje/article/133/4/1693/5036538</span></a></p><p data-dcnode-id="2641"><span data-dcnode-id="2644" instrument_node="">Layard, R. (2003). </span><em data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Happiness: Has Social Science a Clue?</span></em></p><p data-dcnode-id="2634"><span data-dcnode-id="2640" instrument_node="">Pettit, P. (1997). </span><em data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Republicanism: A Theory of Freedom and Government</span></em><span data-dcnode-id="2637" instrument_node="">. </span><a data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//philpapers.org/rec/PETRAT"><span data-dcnode-id="2636" instrument_node="">https://philpapers.org/rec/PETRAT</span></a></p><p data-dcnode-id="2624"><span data-dcnode-id="2633" instrument_node="">Phillips, A. (2004). Defending Equality of Outcome. </span><em data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Journal of Political Philosophy</span></em><span data-dcnode-id="2630" instrument_node="">, </span><em data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">12</span></em><span data-dcnode-id="2627" instrument_node="">(1). </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/epdf/10.1111/j.1467-9760.2004.00188.x"><span data-dcnode-id="2626" instrument_node="">https://onlinelibrary.wiley.com/doi/epdf/10.1111/j.1467-9760.2004.00188.x</span></a></p><p data-dcnode-id="2617"><span data-dcnode-id="2623" instrument_node="">Pickett, K. E., &amp; Wilkinson, R. G. (2015). Income inequality and health: A causal review. </span><em data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">Social Science &amp; Medicine</span></em><span data-dcnode-id="2620" instrument_node="">. </span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25577953"><span data-dcnode-id="2619" instrument_node="">https://www.ncbi.nlm.nih.gov/pubmed/25577953</span></a></p><p data-dcnode-id="2612"><span data-dcnode-id="2616" instrument_node="">Soares, F. V., &amp; Soares, S. (2006). Cash Transfer Programmes in Brazil: Impacts on Inequality and Poverty. </span><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Working Paper, International Poverty Centre, Brasilia</span></em><span data-dcnode-id="2613" instrument_node="">, 35.</span></p><p data-dcnode-id="2605"><span data-dcnode-id="2611" instrument_node="">Soares, S., Guerreiro Osório, R., Veras Soares, F., Medeiros, M., &amp; Zepeda, E. (2018). Conditional cash transfers in Brazil, Chile and Mexico: Impacts upon inequality. </span><em data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">Estudios Económicos de El Colegio de México</span></em><span data-dcnode-id="2608" instrument_node="">, 207–224. </span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.24201/ee.v0i0.387"><span data-dcnode-id="2607" instrument_node="">https://doi.org/10.24201/ee.v0i0.387</span></a></p><p data-dcnode-id="2598"><span data-dcnode-id="2604" instrument_node="">The Guardian. (2017, September 15). </span><em data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">The Guardian view on universal basic income: Tax data giants to pay for it</span></em><span data-dcnode-id="2601" instrument_node="">. </span><a data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2017/sep/15/the-guardian-view-on-universal-basic-income-tax-data-giants-to-pay-for-it"><span data-dcnode-id="2600" instrument_node="">https://www.theguardian.com/commentisfree/2017/sep/15/the-guardian-view-on-universal-basic-income-tax-data-giants-to-pay-for-it</span></a></p><br data-dcnode-id="2597"></div></div><div aria-labelledby="pills-inflation-tab" class="tab-pane fade" data-dcnode-id="2491" id="pills-inflation" role="tabpanel"><p data-dcnode-id="2592"><em data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">This section discusses the effects UBI could have on inflation.</span></em></p><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Inflation is a sustained general increase in the prices of goods and services. It should be distinguished from an increase in the prices of some specific goods—such as oil—as well as a temporary rise in prices, such as hand sanitzer during a pandemic. Inflation comes in different degrees of severity: it may be low/moderate or high/hyper. High and hyperinflation can disrupt the economy, with destructive consequences. It can also lead to hoarding, shortages of goods, closures of businesses, and social unrest. Low/moderate inflation can have similar negative effects to a lesser degree, but it can also have some positive effects, such as stimulating lending and investment as a substitute for holding cash (Mundell, 1963; Tobin, 1965), and allowing wages to fall in real terms, hence lowering unemployment (Tobin, 1995).</span></p><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">A small number of critics argue that a UBI policy would lead to high/hyperinflation that could reduce the ‘real value’ of UBI payments (Tcherneva, 2012; Tcherneva &amp; Wray, 2005). In this view, a large-scale, tax-and-spend financed UBI program would be unsustainable because a UBI might decrease labor supply (because people could opt out of the workforce), undermine production, and thus contract the aggregate incomes required to finance the program (Tcherneve, 2012). The alternative would be to finance a UBI using government issued currency, however this may devalue currencies and reduce the ‘real’ value of the cash transfer (Tcherneva, 2012). Inflationary pressures would make the transfer self-defeating by introducing a vicious cycle where high inflation reduces the purchasing power of the cash transfers, hence pressuring policymakers to increase the transfer amount to ensure it would be high enough for subsistence, pushing inflation even higher (Tcherneva &amp; Wray, 2005). These concerns rely on the assumption that individuals receiving transfers will naturally de-value money’s purchasing power, leading to inflation.</span></p><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">The economic consensus is that general inflation is caused by growth in money supply outpacing economic growth, and that high general inflation is caused by excessive growth in the supply of money (Mankiw, 2002). But most economists do not share the hypothetical concern that a UBI would cause high and general inflation, because there is no reason to assume that a UBI could not be financed by taxes and dividends—which would use money already in circulation, rather than newly printed money. Insofar as inflation does not involve an expansion in money supply, then, a UBI should not lead to high or hyperinflation.</span></p><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">There may be more reason to worry about a UBI causing low to moderate inflation and increasing the prices of certain goods, but there remains quite a bit of uncertainty about the degree of this effect. First, a UBI could potentially lead to an increase in the price of some goods by increasing purchasing power and, thus, the demand for those goods. That is, by increasing an individual’s real income, a UBI could make people demand more of some types of goods—for example, housing. If the supply for specific goods is unable to respond to an increase in demand, then suppliers with greater market power may continue to raise the price for those specific goods as the demand increases. For example, a UBI may provide more income for housing, but difficulties in rapidly increasing supply due to a number of factors (e.g., zoning restrictions, labor supply, construction costs) may actually strain demand and cause prices to increase, decreasing the value of the additional income. How quickly markets are able to respond to an increase in demand depends on how integrated the markets for goods in the UBI-provided area are with markets in the wider economy (Gentilini et al., 2019).</span></p><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">So far, empirical evidence specifically on UBI’s potential impact on either low/moderate or hyperinflation is limited. Existing evidence from one-time, unconditional cash transfers has shown that there has been minimal impact on inflation, however this may be because the type of transfer did not create the sustained pressure necessary to change people’s spending habits, which could happen if there was a steady stream of income. In a large-scale experiment in Kenya, researchers found that a one-time cash grant of US$1,000 to villagers—which amounted to over 15 percent of local GDP—had a minimal effect on the prices of goods in general (Egger et al., 2019). Evidence from other one-time cash transfers suggests the same conclusion. In Kuwait, a one-time cash grant of US$3,600 was paid to every citizen in 2011 to celebrate the country’s fiftieth anniversary; it had no impact on inflation (“Arab Economies: Throwing Money at the Street,” 2011). Similarly, in Australia, one-off cash bonuses to 80 percent of working-age adults in 2008 and 2009—averaging around AUD$1,600, or 4–5 percent of average income—were found to have no impact on inflation (Gentilini et al., 2019).</span></p><p data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Evidence for UBI’s impact on prices of specific goods is similarly scarce, and it is challenging to extrapolate cross-contextually. In Mexico, cash transfers delivered as part of Nutrition Support Program (Programa de Apoyo Alimentario or PAL) increased food prices in the villages by a small but statistically significant amount, while an in-kind provision of a basic basket of food (of equivalent value) decreased food prices by 4 percent on average (Cunha &amp; Giorgi, n.d.). In other words, while there was increased demand for certain goods, the increase in the supply from the in-kind transfers was larger than the effect of the increased cash from transfers to the community. As mentioned above, though, some supply chains are more elastic than others and therefore it is difficult to infer that the impacts from these rural studies would be applicable for major urban centers.</span></p><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Overall, there is a discrepancy between the popular concern about UBI’s impact on inflation and the extent and strength of the evidence to support this claim. Despite extensive studies on many aspects of the Alaskan Permanent Fund Dividend program, for instance, little attention has been paid to its impact on inflation. Part of the reason for the discrepancy is that few economists think that the worry is valid. But a more limited version of the worry—not that UBI would generate high or hyperinflation, but that UBI might lead either to low/moderate inflation, or to an increase in the prices of some important goods, such as housing and medicines—is worth investigating more thoroughly through modeling or simulations. Existing studies have focused on the impact of cash transfers on food prices in low-income economies. More evidence on other types of goods, especially from advanced economies, is needed. Additional research is also needed on how particular financing mechanisms will impact inflation differently. One paid through a progressive income tax-financed program is going to potentially have different effects than one paid for through a value-added tax (VAT).</span></p><br data-dcnode-id="2577"><p data-dcnode-id="2574"><b data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2564"><li class="related-link" data-dcnode-id="2571" data-target="labor-market"><a data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Impact on labor supply</span></a></li><li class="related-link" data-dcnode-id="2568" data-target="consumption"><a data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">Consumption</span></a></li><li class="related-link" data-dcnode-id="2565" data-target="savings"><a data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Savings and investment</span></a></li></ul><br data-dcnode-id="2563"><p data-dcnode-id="2560"><b data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">Read more</span></b></p><p data-dcnode-id="2553"><span data-dcnode-id="2559" instrument_node="">Arab Economies: Throwing Money at the Street. (2011, March 10). </span><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">The Economist</span></em><span data-dcnode-id="2556" instrument_node="">. </span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/briefing/2011/03/10/throwing-money-at-the-street"><span data-dcnode-id="2555" instrument_node="">https://www.economist.com/briefing/2011/03/10/throwing-money-at-the-street</span></a></p><p data-dcnode-id="2548"><span data-dcnode-id="2552" instrument_node="">Cunha, J. M., &amp; Giorgi, G. D. (n.d.). </span><em data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">The Price Effects of Cash Versus In-Kind Transfers</span></em><span data-dcnode-id="2549" instrument_node="">. 60.</span></p><p data-dcnode-id="2541"><span data-dcnode-id="2547" instrument_node="">Egger, D., Haushofer, J., Miguel, E., Niehaus, P., &amp; Walker, M. (2019). </span><em data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">General Equilibrium Effects of Cash Transfers: Experimental Evidence from Kenya</span></em><span data-dcnode-id="2544" instrument_node=""> (No. w26600; p. w26600). National Bureau of Economic Research. </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3386/w26600"><span data-dcnode-id="2543" instrument_node="">https://doi.org/10.3386/w26600</span></a></p><p data-dcnode-id="2534"><span data-dcnode-id="2540" instrument_node="">Gentilini, U., Grosh, M., Rigolini, J., &amp; Yemtsov, R. (Eds.). (2019). </span><em data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">Exploring Universal Basic Income: A Guide to Navigating Concepts, Evidence, and Practices</span></em><span data-dcnode-id="2537" instrument_node="">. The World Bank. </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1596/978-1-4648-1458-7"><span data-dcnode-id="2536" instrument_node="">https://doi.org/10.1596/978-1-4648-1458-7</span></a></p><p data-dcnode-id="2529"><span data-dcnode-id="2533" instrument_node="">Mankiw, G. (2002). </span><em data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Macroeconomics</span></em><span data-dcnode-id="2530" instrument_node=""> (5th ed.). Worth.</span></p><p data-dcnode-id="2525"><span data-dcnode-id="2528" instrument_node="">Mundell, R. (1963). Inflation and Interest Rates. </span><em data-dcnode-id="2526"><span data-dcnode-id="2527" instrument_node="">Journal of Political Economy, 71(3), 280-283.</span></em></p><p data-dcnode-id="2515"><span data-dcnode-id="2524" instrument_node="">Tcherneva, P. R. (2012). The Job Guarantee: Delivering the Benefits That Basic Income Only Promises – A Response to Guy Standing. </span><em data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="2521" instrument_node="">, </span><em data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">7</span></em><span data-dcnode-id="2518" instrument_node="">(2). </span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1515/bis-2013-0010"><span data-dcnode-id="2517" instrument_node="">https://doi.org/10.1515/bis-2013-0010</span></a></p><p data-dcnode-id="2508"><span data-dcnode-id="2514" instrument_node="">Tcherneva, P. R., &amp; Wray, L. R. (2005). Can Basic Income and Job Guarantees Deliver on Their Promises? </span><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">SSRN Electronic Journal</span></em><span data-dcnode-id="2511" instrument_node="">. </span><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.2139/ssrn.1009629"><span data-dcnode-id="2510" instrument_node="">https://doi.org/10.2139/ssrn.1009629</span></a></p><p data-dcnode-id="2500"><span data-dcnode-id="2507" instrument_node="">Tobin, J. (1965). Money and Economic Growth. </span><em data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Econometrica</span></em><span data-dcnode-id="2504" instrument_node="">, </span><em data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">33</span></em><span data-dcnode-id="2501" instrument_node="">.</span></p><p data-dcnode-id="2493"><span data-dcnode-id="2499" instrument_node="">Tobin, J. (1995). Inflation and Unemployment. In S. Estrin &amp; A. Marin (Eds.), </span><em data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Essential Readings in Economics</span></em><span data-dcnode-id="2496" instrument_node=""> (pp. 232–254). Macmillan Education UK. </span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/978-1-349-24002-9_12"><span data-dcnode-id="2495" instrument_node="">https://doi.org/10.1007/978-1-349-24002-9_12</span></a></p><br data-dcnode-id="2492"></div><div aria-labelledby="pills-consumption-tab" class="tab-pane fade" data-dcnode-id="2395" id="pills-consumption" role="tabpanel"><p data-dcnode-id="2488"><em data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">This section discusses UBI’s potential effects on consumption.</span></em></p><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">How might a UBI policy affect an individual or household’s consumption behavior? On the one hand, there is the question of whether a UBI would increase or decrease consumption expenditure. This question is of interest because consumption expenditure is often used as a proxy for well-being and is thought to boost economic growth, which has multiplier effects. UBI’s potential impact on consumption can also be viewed through the lens of what kinds of goods are purchased or consumed. Will the cash be used to purchase luxuries or necessities? Assets or non-durable goods? “Temptation goods”—such as alcohol, tobacco, or even drugs—or everyday household goods? The latter set of questions has been central to policymakers’ decisions on whether to favor cash over in-kind goods.</span></p><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Most findings from developing economies show significant positive impact on consumption expenditures in the short-term. A study on GiveDirectly’s UBI program in Kenya finds that monthly cash transfers were spent mostly on food (Haushofer &amp; Shapiro, 2016). This is consistent with evidence from targeted, unconditional cash transfer programs. A review of evidence in four African countries finds that relatively large, regular and predictable unconditional cash transfers significantly increased the quantity and quality of food consumed (Tiwari et al., 2016). Evidence suggests that these impacts may last beyond the short term. A follow-up study on the GiveDirectly program three years after the first transfer found that recipients still consumed 25 percent more compared to those who didn’t receive the transfers (Haushofer &amp; Shapiro, 2018). Similarly, a study of two unconditional cash transfer programs in Zambia showed a strong long-term positive impact on consumption and food security, with households spending on average 67 percent more than the value of the transfers received (Handa et al., 2018).</span></p><p data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">It is less clear that UBI leads to consumption changes in high-income countries. This is not surprising, as fewer credit constraints likely smooth consumption in high-income contexts as compared to low- and middle-income settings where credit is less available. A review of evidence from the negative income tax experiments in the United States in the 1970s found that the programs had no or small effects on consumption (Hanushek, 1987). In the case of housing, the guaranteed income merely altered the timing of already planned purchases (Hanushek, 1987). This could be, in part, a result of people expecting these programs to be temporary, or it could be that more access to credit allows them to more easily smooth their consumption over time. Limited impacts on consumption are also observed in the regularly distributed Alaska Permanent Dividend program (Hsieh, 2003), although findings are inconsistent (Kueng, 2015).</span></p><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Regarding what individuals consume, evidence suggests that the size and regularity of the transfer matters. In the GiveDirectly experiment in Kenya, monthly transfers were spent mostly on food, while lump-sum transfers were spent more on durables, such as metal roofs (Haushofer &amp; Shapiro, 2016). In unconditional cash transfer programs across four African countries, regular and predictable cash transfers increased food consumption, while lump sum and irregular transfers did not, at least in the short run (Tiwari et al., 2016). Households that received irregular cash transfers, such as those in a program in Ghana, were found to spend differently from households that received regular transfers (Food and Agricultural Organization, 2016). Evidence from high-income economies is scarce on the question of what individuals consume or how they spend their cash, but preliminary results from a small-scale guaranteed income demonstration in Stockton, California, suggests that, of the $500 per month UBI, about 40 percent went toward food, 25 percent toward merchandise, and 12 percent toward utilities (Holder, 2019).</span></p><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">As to whether UBI will increase consumption of “temptation goods,” such as alcohol and tobacco, studies give a nearly unanimous answer: no. Evidence from Namibia (Haarmann et al., 2009) and India (Davala et al., 2017) show no effect of cash transfers on alcohol sale. A comprehensive review of 19 studies—covering evidence from both conditional and unconditional cash transfer programs in Latin America, Africa and Asia—finds that, almost without exception, cash transfers had either no significant impact or a significant negative impact on consumption of temptation goods, and that where spending increased the magnitude was small (Evans &amp; Popova, 2014).</span></p><p data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">In general, evidence suggests that cash transfer programs tend to increase consumption expenditure significantly in developing economies, both in the short run and the long run. Evidence from UBI programs is consistent with this more general result. The effects of cash transfers in advanced economies are more ambivalent. More research is needed, especially from advanced economies, as to the kinds of goods that people would spend their UBI on, and what factors might determine their spending. The concern that UBI might increase consumption of temptation goods, however, has been shown to be untrue.</span></p><br data-dcnode-id="2475"><p data-dcnode-id="2472"><b data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2462"><li class="related-link" data-dcnode-id="2469" data-target="savings"><a data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Savings and investment</span></a></li><li class="related-link" data-dcnode-id="2466" data-target="inflation"><a data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Inflation</span></a></li><li class="related-link" data-dcnode-id="2463" data-target="access-to-health-services"><a data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">Access to Health Services</span></a></li></ul><br data-dcnode-id="2461"><p data-dcnode-id="2458"><b data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Read more</span></b></p><p data-dcnode-id="2453"><span data-dcnode-id="2457" instrument_node="">Davala, S., Jhabvala, R., Standing, G., Badgaiyan, N., &amp; Bharat, S. (2017). </span><em data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Piloting Basic Income A Legacy Study Final Report</span></em><span data-dcnode-id="2454" instrument_node=""> (p. 52). SEWA Bharat and INBI.</span></p><p data-dcnode-id="2448"><span data-dcnode-id="2452" instrument_node="">Evans, D. K., &amp; Popova, A. (2014). </span><em data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Cash Transfers and Temptation Goods: A Review of Global Evidence</span></em><span data-dcnode-id="2449" instrument_node="">. 36.</span></p><p data-dcnode-id="2443"><span data-dcnode-id="2447" instrument_node="">Food and Agricultural Organization. (2016). </span><em data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">Cash transfers: Their economic and productive impacts: Evidence from Programmes in Sub-Saharan Africa</span></em><span data-dcnode-id="2444" instrument_node="">. 4.</span></p><p data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">Haarmann, C., Haarmann, D., Jauch, H., Shindondola-Mote, H., Nattrass, N., van Niekerk, I., &amp; Samson, M. (2009). </span><em data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node="">Making the difference! The BIG in Namibia</span></em><span data-dcnode-id="2439" instrument_node="">. Friedrich Ebert Foundation.</span></p><p data-dcnode-id="2428"><span data-dcnode-id="2437" instrument_node="">Handa, S., Natali, L., Seidenfeld, D., Tembo, G., &amp; Davis, B. (2018). Can unconditional cash transfers raise long-term living standards? Evidence from Zambia. </span><em data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Journal of Development Economics</span></em><span data-dcnode-id="2434" instrument_node="">, </span><em data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">133</span></em><span data-dcnode-id="2431" instrument_node="">, 42–65. </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jdeveco.2018.01.008"><span data-dcnode-id="2430" instrument_node="">https://doi.org/10.1016/j.jdeveco.2018.01.008</span></a></p><p data-dcnode-id="2423"><span data-dcnode-id="2427" instrument_node="">Hanushek, E. A. (1987). Non-Labor-Supply Responses to the Income Maintenance Experiments. In </span><em data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Lessons from the Income Maintenance Experiments</span></em><span data-dcnode-id="2424" instrument_node="">. Federal Reserve Bank of Boston and the Brookings Institution.</span></p><p data-dcnode-id="2419"><span data-dcnode-id="2422" instrument_node="">Haushofer, J., &amp; Shapiro, J. (2016). The Short-term Impact of Unconditional Cash Transfers to the Poor: ExperimentalEvidence from Kenya*. *The Quarterly Journal of Economics*, *131*(4), 1973–2042. </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1093/qje/qjw025"><span data-dcnode-id="2421" instrument_node="">https://doi.org/10.1093/qje/qjw025</span></a></p><p data-dcnode-id="2414"><span data-dcnode-id="2418" instrument_node="">Haushofer, J., &amp; Shapiro, J. (2018). The Long-Term Impact of Unconditional Cash Tranfers: Experimental Evidence from Kenya. </span><em data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Working Paper</span></em><span data-dcnode-id="2415" instrument_node="">, 64.</span></p><p data-dcnode-id="2407"><span data-dcnode-id="2413" instrument_node="">Holder, S. (2019, October 3). </span><em data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">In Stockton, Early Clues Emerge About Impact of Guaranteed Income</span></em><span data-dcnode-id="2410" instrument_node="">. CityLab. </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.citylab.com/equity/2019/10/stockton-universal-basic-income-pilot-economic-empowerment/599152/"><span data-dcnode-id="2409" instrument_node="">https://www.citylab.com/equity/2019/10/stockton-universal-basic-income-pilot-economic-empowerment/599152/</span></a></p><p data-dcnode-id="2397"><span data-dcnode-id="2406" instrument_node="">Tiwari, S., Daidone, S., Ruvalcaba, M. A., Prifti, E., Handa, S., Davis, B., Niang, O., Pellerano, L., Quarles van Ufford, P., &amp; Seidenfeld, D. (2016). Impact of cash transfer programs on food security and nutrition in sub-Saharan Africa: A cross-country analysis. </span><em data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Global Food Security</span></em><span data-dcnode-id="2403" instrument_node="">, </span><em data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">11</span></em><span data-dcnode-id="2400" instrument_node="">, 72–83. </span><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.gfs.2016.07.009"><span data-dcnode-id="2399" instrument_node="">https://doi.org/10.1016/j.gfs.2016.07.009</span></a></p><br data-dcnode-id="2396"></div><div aria-labelledby="pills-migration-tab" class="tab-pane fade" data-dcnode-id="2221" id="pills-migration" role="tabpanel"><p data-dcnode-id="2392"><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">This section discusses UBI’s potential effects on migration.</span></em></p><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">We use the term ‘migration’ to describe movement of persons within their own country or across international borders. It can be temporary or permanent moves, and it can happen for a variety of reasons. When it comes to UBI, researchers question how the policy might “push” or “pull” individuals into or out of a region, especially since migration is generally on the rise. In 2019, more than 270 million individuals were international migrants, accounting for 3.5 percent of the world’s population, up from 2.3 percent in 1970 (International Organization for Migration, 2018). Internal migration within countries is also increasing, largely driven by industrialization and urbanization (Skeldon, 2018).</span></p><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Some researchers have raised concerns that UBI could have a “pull effect,” pulling in migrants from other areas. The theory is that people will be attracted to regions or countries where benefits are more generous, and so they would be pulled into UBI zones. But empirical evidence from high-income countries on internal migration between regions with more or less generous benefits systems indicates that this fear is likely misplaced. Changes or differences in benefit structures generally result in only limited (Kaestner et al., 2003; Levine &amp; Zimmerman, 1999; Schwartz &amp; Sommers, 2014) or small effects on migration (McKinnish, 2005). For example, there was no evidence of migration effects following expansions to Medicaid in Arizona, Maine, Massachusetts and New York in the United States (Schwartz &amp; Sommers, 2014). Larger effects have been observed in cities very near the border of states where benefits are expanded—as was the case with Health Care Reform in Massachusetts—however there are no significant effects beyond 15 kms from the border (Alm &amp; Enami, 2017).</span></p><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">A UBI could also have a push effect, either by relaxing liquidity constraints—meaning individuals have the cash needed to make a potentially costly move—or by giving people the flexibility to move to areas with higher rates of unemployment and limited labour demand. In the first scenario, it is likely this push effect would be seen more among low-income populations and into areas with high upfront migration costs (e.g., major metropolitan areas) (Cai, 2020). In a study of Alaska’s Permanent Fund Dividend, for example, large cash transfers induced migration from rural to urban areas by providing funds to support the migration project (Kurland, 2017). While the size of the effect was small in the short-term, the long-term effects of such programs could be larger, and the full range of social and economic consequences remain unclear. Once a number of people have moved out to a city, it becomes easier for new migrants to follow due to network effects (Kurland, 2017). This may have adverse effects on some services within rural areas. In the case of Alaska, for instance, out-migration of women and children from very small Northern Native villages led first to school closure and then the eventual disappearance of the village (Martin, 2009).</span></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">A UBI, however, may also allow people to remain where they are despite poor economic prospects, or, in the second potential push effect, allow them to move to regions with lower rates of employment. A study of unconditional cash transfer programs in four African countries, for instance, showed that cash transfer helped farmers diversify their sources of income, making them less prone to environmental risks and mitigating their need to migrate out (Deshingkar et al., 2015). In Ethiopia and Malawi, farmers have used cash transfers to stay in their communities and endure worsening conditions (Deshingkar et al., 2015).</span></p><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">There is far less evidence on how UBI may impact international migration. An individual’s decision to migrate depends on many factors, such as job prospects, language, social networks, cultural compatibility, and historical and institutional links. Welfare spending does not have a large effect on where someone choses to live and is generally outweighed by other factors (Boso &amp; Vancea, 2012). Having access to a UBI in one’s own country could decrease the need to migrate to another country. A study of Mexico’s conditional cash transfer program, Progresa, for example, found that cash transfers there reduced migration to the United States (Stecklov et al., 2005). Other studies, by contrast, report net push effects. One found that cash transfers actually increased migration from Mexico to the United States by providing funds to facilitate a move (Angelucci, 2015). A study in China found that an income-guarantee program had only a small effect on out-migration, because the amount was too small to fund out-migration.</span></p><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">The benefits from migration to host countries are multifold. Migrants fill important niches in industries, contribute to labor market flexibility, generally contribute more to taxes than the state benefits they receive, and contribute to flows of knowledge and innovation (OECD, 2014). But, given growing nationalist sentiments globally, some researchers worry that more generous benefit systems—like a UBI—could stoke anti-immigration sentiments due to concerns about heavier use of the welfare state. A recent Pew research survey, for example, found that in Hungary, Greece, South Africa, Israel and Russia, an overwhelming majority view immigrants as a “burden on our country” (Pew Research Center, 2019). A UBI tied to citizenship could ultimately make it harder for migrants to become naturalized citizens. A UBI tied to residency could make it harder for migrants to be allowed in the host country in the first place.</span></p><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Much is still unknown about the impact of a UBI policy on migration. Evidence is highly variable across country contexts, suggesting that UBI may interact with other factors to produce different effects in different places. The size of both the pull and the push effects may also depend on the residency requirements that people must satisfy in order to receive UBI, the numbers and categories of immigrants granted entry to a country, and the generosity of the welfare or income guarantee. More research is needed on the demographic profile of individuals who are more or less likely to migrate in or out as a result of UBI, and on factors such as seasonality and distance on migration patterns.</span></p><br data-dcnode-id="2377"><p data-dcnode-id="2374"><b data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2364"><li class="related-link" data-dcnode-id="2371" data-target="labor-market"><a data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Impact on labor supply</span></a></li><li class="related-link" data-dcnode-id="2368" data-target="savings"><a data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">Savings and investment</span></a></li><li class="related-link" data-dcnode-id="2365" data-target="economic-inequality"><a data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">Economic inequality</span></a></li></ul><br data-dcnode-id="2363"><p data-dcnode-id="2360"><b data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Read more</span></b></p><p data-dcnode-id="2352"><span data-dcnode-id="2359" instrument_node="">Alm, J., &amp; Enami, A. (2017). Do government subsidies to low-income individuals affect interstate migration? Evidence from the Massachusetts Health Care Reform. </span><em data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">Regional Science and Urban Economics</span></em><span data-dcnode-id="2356" instrument_node="">, </span><em data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">66</span></em><span data-dcnode-id="2353" instrument_node="">(C), 119–131.</span></p><p data-dcnode-id="2342"><span data-dcnode-id="2351" instrument_node="">Angelucci, M. (2015). Migration and Financial Constraints: Evidence from Mexico. </span><em data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Review of Economics and Statistics</span></em><span data-dcnode-id="2348" instrument_node="">, </span><em data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">97</span></em><span data-dcnode-id="2345" instrument_node="">(1), 224–228. </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1162/REST_a_00487"><span data-dcnode-id="2344" instrument_node="">https://doi.org/10.1162/REST_a_00487</span></a></p><p data-dcnode-id="2332"><span data-dcnode-id="2341" instrument_node="">Boso, À., &amp; Vancea, M. (2012). Basic Income for Immigrants? The Pull Eff dcnode-id="2289" instrument_node="">Levine, P. B., &amp; Zimmerman, D. J. (1999). An empirical analysis of the welfare magnet debate using the NLSY. </span><em data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Journal of Population Economics</span></em><span data-dcnode-id="2286" instrument_node="">, </span><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">12</span></em><span data-dcnode-id="2283" instrument_node="">(3), 391–409. </span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s001480050105"><span data-dcnode-id="2282" instrument_node="">https://doi.org/10.1007/s001480050105</span></a></p><p data-dcnode-id="2270"><span data-dcnode-id="2279" instrument_node="">Martin, S. (2009). The effects of female out-migration on Alaska villages. </span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Polar Geography</span></em><span data-dcnode-id="2276" instrument_node="">, </span><em data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">32</span></em><span data-dcnode-id="2273" instrument_node="">(1–2), 61–67. </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1080/10889370903000455"><span data-dcnode-id="2272" instrument_node="">https://doi.org/10.1080/10889370903000455</span></a></p><p data-dcnode-id="2260"><span data-dcnode-id="2269" instrument_node="">McKinnish, T. (2005). Importing the Poor: Welfare Magnetism and Cross-Border Welfare Migration. </span><em data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">The Journal of Human Resources</span></em><span data-dcnode-id="2266" instrument_node="">, </span><em data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">15</span></em><span data-dcnode-id="2263" instrument_node="">(1), 57–76. </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3368/jhr.XL.1.57"><span data-dcnode-id="2262" instrument_node="">https://doi.org/10.3368/jhr.XL.1.57</span></a></p><p data-dcnode-id="2255"><span data-dcnode-id="2259" instrument_node="">OECD. (2014, May). Is Migration Good for the Economy? </span><em data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">The Migration Debate</span></em><span data-dcnode-id="2256" instrument_node="">.</span></p><p data-dcnode-id="2248"><span data-dcnode-id="2254" instrument_node="">Pew Research Center. (2019, March). </span><em data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Global Opinions of Immigrants</span></em><span data-dcnode-id="2251" instrument_node="">. </span><a data-dcnode-id="2249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/global/2019/03/14/around-the-world-more-say-immigrants-are-a-strength-than-a-burden/"><span data-dcnode-id="2250" instrument_node="">https://www.pewresearch.org/global/2019/03/14/around-the-world-more-say-immigrants-are-a-strength-than-a-burden/</span></a></p><p data-dcnode-id="2238"><span data-dcnode-id="2247" instrument_node="">Schwartz, A. L., &amp; Sommers, B. D. (2014). Moving For Medicaid? Recent Eligibility Expansions Did Not Induce Migration From Other States. </span><em data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Health Affairs</span></em><span data-dcnode-id="2244" instrument_node="">, </span><em data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">33</span></em><span data-dcnode-id="2241" instrument_node="">(1), 88–94. </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1377/hlthaff.2013.0910"><span data-dcnode-id="2240" instrument_node="">https://doi.org/10.1377/hlthaff.2013.0910</span></a></p><p data-dcnode-id="2233"><span data-dcnode-id="2237" instrument_node="">Skeldon, R. (2018). </span><em data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">International Migration, Internal Migration, Mobility and Urbanization: Towards more Integrated Approaches</span></em><span data-dcnode-id="2234" instrument_node=""> (No. 53; Migration Research Series). International Organization for Migration.</span></p><p data-dcnode-id="2223"><span data-dcnode-id="2232" instrument_node="">Stecklov, G., Winters, P., Stampini, M., &amp; Davis, B. (2005). Do Conditional Cash Transfers Influence Migration? A Study Using Experimental Data From the Mexican PROGRESA Program. </span><em data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">Demography</span></em><span data-dcnode-id="2229" instrument_node="">, </span><em data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">42</span></em><span data-dcnode-id="2226" instrument_node="">(4), 769–790. </span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1353/dem.2005.0037"><span data-dcnode-id="2225" instrument_node="">https://doi.org/10.1353/dem.2005.0037</span></a></p><br data-dcnode-id="2222"></div><div aria-labelledby="pills-labor-market-tab" class="tab-pane fade" data-dcnode-id="2053" id="pills-labor-market" role="tabpanel"><p data-dcnode-id="2218"><em data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">This section discusses UBI’s potential impact on labor supply and individual’s use of time.</span></em></p><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">A common worry about universal basic income is that it could reduce people’s incentive to work, thus causing a number of domino effects in the economy. The disincentive effect, for instance, could reduce productivity and the number of goods produced and increase the number of individuals who only rely on assistance to survive. The disincentive effect could also lead to inflation as businesses would need to pay higher wages to retain workers, and the higher wages would push production costs up, translating into increased costs for consumers. The evidence from existing UBI related schemes, however, negates many of these concerns and, overall, indicates that UBI-related programs have marginal effects on labor market participation.</span></p><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Much of the concern about work incentives comes from four negative income tax programs in the United States and the “Mincome” program in Canada in the 1970s. These experiments had mixed results, with some economists pointing to negligible effects on labor supply (Hum &amp; Simpson, 1993) and others pointing to large negative effects, namely from the Seattle-Denver experiment (Anderson &amp; Block, 1993). The polarized literature divides roughly along ideological lines and is perhaps partly a result of the explicit political goals of the 1970s experiments (Widerquist, 2005). Later reviews of the literature point out that early studies tended to emphasize different parts of the results, and that the actual effects were likely complex (Widerquist, 2018).</span></p><p data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">What is clear from the North American experiments, however, is that a basic income guarantee could have different effects on different groups’ decisions to work. In cases where UBI led to a reduction in work, evidence often showed that individuals redirected the time they gained to other valued activities. For example, data from the Mincome program (Forget, 2011) found that female heads of household with young children dropped out of work at the highest rate to take longer maternity leaves. In both Gary, Illinois, (McDonald &amp; Stephenson, 1979) and Manitoba, Canada, (Forget, 2018; Prescott et al., 1986) younger men reduced work hours to remain in school longer.</span></p><p data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Evidence from more recent experiments confirms findings of minimal labour market effects in both low-income and high-income economies. Evidence from Alaska’s Permanent Fund Dividend and from the recent UBI experiment in Finland, for example, shows no significant effect on labor supply, employment level or working hours (Guettabi, 2019; Kela &amp; the Ministry of Social Affairs and Health, 2019). In the case of the Alaska PFD, one explanation is that any disincentive effects from cash transfers might be offset by increased spending, which leads to increased demand for workers (Jones &amp; Marinescu, 2018). There are some disputes, however, as to the extent that the Alaska PDF increases consumption (Hsieh, 2003; Kueng, 2015, 2018).</span></p><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">In low-income contexts, results from both UBI and other cash transfer programs consistently show no negative impact on labor supply. In some cases, there has even been positive impacts from investments in small businesses or from economic spill-overs to the local economy. A report from a basic income pilot in Namibia, for example, found a significant increase in income-generating activities among recipients of the cash transfers (Haarmann et al., 2009). In Kenya, adult labor supply was found to increase, and child labor found to decrease in response to the Cash Transfer Program for Orphans and Vulnerable Children (Asfew, 2013). Similar boosts in workforce participation and employment were reported for South Africa’s three targeted unconditional cash transfer programs (Samson et al., 2004).</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">The studies reviewed here provide insight into possible labor effects, however there have been significant changes to the labour market since many of the experiments were carried out. These changes make it difficult to predict whether similar outcomes would be observed in contemporary experiments. More research is needed to disentangle the complex relationship between labor supply and demand, and more data is needed on the differential impacts between demographic groups. More evidence is also needed on how factors in the local economy where a UBI is introduced impacts outcomes like labor market participation.</span></p><br data-dcnode-id="2205"><p data-dcnode-id="2202"><b data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Related topics</span></b></p><ul data-dcnode-id="2186"><li class="related-link" data-dcnode-id="2199" data-target="economic-inequality"><a data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">Economic inequality</span></a></li><li class="related-link" data-dcnode-id="2196" data-target="work-beyond-jobs"><a data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Work beyond jobs</span></a></li><li class="related-link" data-dcnode-id="2193" data-target="collective-bargaining"><a data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Bargaining Power</span></a></li><li class="related-link" data-dcnode-id="2190" data-target="care-work"><a data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Care work</span></a></li><li class="related-link" data-dcnode-id="2187" data-target="women-in-the-labor-market"><a data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Women in the labor market</span></a></li></ul><br data-dcnode-id="2185"><p data-dcnode-id="2182"><b data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Read more</span></b></p><p data-dcnode-id="2174"><span data-dcnode-id="2181" instrument_node="">Anderson, G. M., &amp; Block, W. (1993). Comment on Hum and Simpson. </span><em data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Journal of Labor Economics</span></em><span data-dcnode-id="2178" instrument_node="">, </span><em data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">11</span></em><span data-dcnode-id="2175" instrument_node="">(1, Pa
