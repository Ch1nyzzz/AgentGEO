</span><div class="article-body-text" data-dcnode-id="2574"><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Libertarians have a standard set of fundamental criticisms of the welfare state.</span></p><span data-dcnode-id="2707" instrument_node="">
</span><ol data-dcnode-id="2693"><span data-dcnode-id="2706" instrument_node="">
</span><li data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Forced charity is unjust.&nbsp;Individuals have a moral right to decide if and when they want to help others.</span></li><span data-dcnode-id="2703" instrument_node="">
</span><li data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Forced charity is unnecessary. In a free market, voluntary donations are enough to provide for the truly poor.</span></li><span data-dcnode-id="2700" instrument_node="">
</span><li data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Forced charity gives recipients bad incentives. If the government takes care of you, you're less likely to take care of yourself by work and saving.</span></li><span data-dcnode-id="2697" instrument_node="">
</span><li data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">The cost of forced charity is high and growing rapidly, leading to a future of exorbitant taxes or financial crisis.</span></li><span data-dcnode-id="2694" instrument_node="">
</span></ol><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2636"><span class="rte-quote" data-dcnode-id="2637"><span data-dcnode-id="2691" instrument_node="">If you were running a private charity, you would never "help everyone," because it's such a frivolous use of resources.</span></span></p><ul class="social-links share-quotes" data-dcnode-id="2638"><span data-dcnode-id="2690" instrument_node="">
</span><div class="event-addthis" data-dcnode-id="2640"><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2682"><span data-dcnode-id="2688" instrument_node="">
</span><a addthis:href="https://fee.org/articles/ubi-is-even-worse-than-welfare/" addthis:quote="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." addthis:title="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." class="fb-button" data-dcnode-id="2684" title="facebook"><span data-dcnode-id="2687" instrument_node="">

</span><li data-dcnode-id="2674"><span data-dcnode-id="2680" instrument_node="">
</span><a addthis:href="https://fee.org/articles/ubi-is-even-worse-than-welfare/" addthis:quote="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." addthis:title="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." class="addthis_button_twitter at300b" data-dcnode-id="2676" href="#" title="twitter"><span data-dcnode-id="2679" instrument_node="">

</span><a addthis:href="https://fee.org/articles/ubi-is-even-worse-than-welfare/" addthis:quote="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." addthis:title="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." class="addthis_button_linkedin at300b" data-dcnode-id="2660" href="#" target="_blank" title="linkedin"><span data-dcnode-id="2663" instrument_node="">

</span><a addthis:href="https://fee.org/articles/ubi-is-even-worse-than-welfare/" addthis:quote="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." addthis:title="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." class="addthis_button_reddit at300b" data-dcnode-id="2652" href="#" target="_blank" title="reddit"><span data-dcnode-id="2655" instrument_node="">
</span><i aria-hidden="true" class="fa fa-reddit-alien" data-dcnode-id="2654"></i><span data-dcnode-id="2653" instrument_node="">
</span></a><span data-dcnode-id="2651" instrument_node="">
</span></li><span data-dcnode-id="2649" instrument_node="">
</span><li data-dcnode-id="2642"><span data-dcnode-id="2648" instrument_node="">
</span><a addthis:href="https://fee.org/articles/ubi-is-even-worse-than-welfare/" addthis:quote="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." addthis:title="If you were running a private charity, you would never &quot;help everyone,&quot; because it's such a frivolous use of resources." class="addthis_button_more at300b" data-dcnode-id="2644" href="#" target="_blank" title="more"><span data-dcnode-id="2647" instrument_node="">
</span><i aria-hidden="true" class="fa fa-plus-square-o" data-dcnode-id="2646"></i><span data-dcnode-id="2645" instrument_node="">
</span></a><span data-dcnode-id="2643" instrument_node="">
</span></li><span data-dcnode-id="2641" instrument_node="">
</span></div><span data-dcnode-id="2639" instrument_node="">
</span></ul><p></p><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Taken together, I think these criticisms justify the radical libertarian view that the welfare state should be abolished. But this is an extremely unpopular view, so it's natural for libertarians to consider more moderate reforms like the Universal Basic Income. And when you're considering moderate reforms, the right question to ask isn't: "Is it ideal?" but "Is it better than the status quo?"</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">My claim: The Universal Basic Income is indeed worse than the status quo. In fact, all the fundamental criticisms of the welfare state apply with even greater force.</span></p><div data-dcnode-id="2625" style="clear:both;"><div data-dcnode-id="2629" id="om-fqmeg7lcejd7fy5oro5r-holder"></div><span data-dcnode-id="2628" instrument_node="">
</span><div data-dcnode-id="2627" id="om-lxkcubhhqwmdm0lkjkbp-holder"></div><span data-dcnode-id="2626" instrument_node="">
</span></div><span data-dcnode-id="2624" instrument_node="">
</span><ol data-dcnode-id="2595"><span data-dcnode-id="2623" instrument_node="">
</span><li data-dcnode-id="2615"><span data-dcnode-id="2622" instrument_node="">Some forced charity is more unjust than other forced charity. Forcing people to help others who&nbsp;can't</span><em data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2619" instrument_node="">help themselves - like kids from poor families or the severely disabled - is at least defensible. Forcing people to help&nbsp;everyone</span><em data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2616" instrument_node="">is not. And for all its faults, at least the status quo makes&nbsp;some&nbsp;effort to target people who can't help themselves. The whole idea of the Universal Basic Income, in contrast, is of course, to give money to everyone whether they need it or not. Of course, the UBI formula normally reduces the net payment as income rises; but if a perfectly able-bodied person chooses never to work, the UBI gravy train never stops.</span></li><span data-dcnode-id="2614" instrument_node="">
</span><li data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node="">The UBI is an extremely wasteful form of forced charity. Helping the small minority of people who can't help themselves doesn't cost much. Giving an unconditional grant to every citizen wastes an enormous amount of money. If you were running a private charity, it would never even occur to you to "help everyone," because it's such a frivolous use of scarce charitable resources. Instead, you'd target spending to do the most good. And unlike the UBI, the status quo makes&nbsp;some</span><em data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2610" instrument_node="">effort to so target its resources.</span></li><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2600"><span data-dcnode-id="2607" instrument_node="">Overall, the UBI&nbsp;probably</span><em data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2604" instrument_node="">gives even worse incentives than the status quo. Defenders of the UBI correctly point out that it might improve incentives for people who are&nbsp;already</span><em data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2601" instrument_node="">on welfare. Under the status quo, earning another $1 of legal income can easily reduce your welfare by a $1, implying a marginal tax rate of 100%. But under the status quo, vast populations are ineligible for most programs. Such as? You guys! If you're an able-bodied adult, aged 18-64, who doesn't have custody of any minor children, the current system doesn't give you much. Switching to a UBI would expand the familiar perverse effects of the welfare state to the entire population - including you. And if taxes rise to pay for the UBI, the population-wide disincentives are even worse.</span></li><span data-dcnode-id="2599" instrument_node="">
</span><li data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">A politically acceptable UBI would be insanely expensive. Libertarian economist and UBI advocate Ed Dolan has a detailed, fiscally viable plan to provide a UBI of $4452 per person per year. But every non-libertarian I've queried thinks it should be at least $10,000 per person per year. Even with a one-third flat tax, that implies that a family of four would have to make $120,000 a year before it paid $1 of taxes. This is pie in the sky.</span></li><span data-dcnode-id="2596" instrument_node="">
</span></ol><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">But doesn't the UBI give people their freedom? In some socialist sense, sure. But libertarianism isn't about the freedom to be coercively supported by strangers. It's about the freedom to be left alone by strangers.</span></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">If abolition of the welfare state is extremely unlikely and the UBI is worse than the status quo, does this mean libertarians should accept the welfare state as it is? Not at all. There's a straightforward moderate path to a freer world: AUSTERITY. Cut benefits. Restrict eligibility. Remind the world of the great Forgotten Man: the taxpayer. We probably can't convince the majority to end the welfare state. But "Welfare should be limited to genuinely poor people who can't help themselves" has broad appeal - and unlike the UBI, it's a clear step in the libertarian direction.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2582" style="text-align: right;"><em data-dcnode-id="2583"><span data-dcnode-id="2587" instrument_node="">Reprinted from </span><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//econlog.econlib.org/archives/2017/02/why_libertarian_2.html"><span data-dcnode-id="2586" instrument_node="">Library of Economics and Liberty</span></a><span data-dcnode-id="2584" instrument_node="">.</span></em></p><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2579" style="text-align: left;"><span data-dcnode-id="2580" instrument_node="">Complete video of ISFLC's UBI debate:</span></p><span data-dcnode-id="2578" instrument_node="">

ir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/media/25585/ubi.jpg%3Fcenter%3D0.6508728179551122%252C0.52666666666666662%26mode%3Dcrop%26height%3D200%26widthratio%3D2.0171673819742489270386266094%26rnd%3D131577516250000000&amp;raw"></picture></a></div></div></div></div><div class="related-article-info col-sm-8" data-dcnode-id="2259"><h2 data-dcnode-id="2271"><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/what-hayek-gets-wrong-about-a-universal-basic-income/%3Fitm_source%3Dparsely-api"><span data-dcnode-id="2273" instrument_node="">What Hayek Gets Wrong about a Universal Basic Income</span></a></h2><div class="meta" data-dcnode-id="2260"><div class="author-info float-none" data-dcnode-id="2266"><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/brittany-hunter"><span data-dcnode-id="2270" instrument_node="">Brittany Hunter</span></a><span data-dcnode-id="2268" instrument_node=""> - </span><span data-dcnode-id="2267" instrument_node="">11/7/2017</span></div><div class="share-comment float-none addthis_toolbox" data-dcnode-id="2261"><a class="addthis_button_more first at300b" data-addthis-title="What Hayek Gets Wrong about a Universal Basic Income" data-addthis-url="https://fee.org/articles/what-hayek-gets-wrong-about-a-universal-basic-income/?itm_source=parsely-api" data-dcnode-id="2264" href="#" target="_blank" title="More"><img alt="" data-dcnode-id="2265" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/images/ico-share.png&amp;raw" title="Share"></a><a class="disqus_thread" data-dcnode-id="2263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/what-hayek-gets-wrong-about-a-universal-basic-income/%3Fitm_source%3Dparsely-api%23disqus_thread"></a><div class="atclear" data-dcnode-id="2262"></div></div></div></div></div></div></div></div></section></section><span data-dcnode-id="2252" instrument_node="">

</span><section data-article-id="148494" data-dcnode-id="282" id="infinite-scroll"><div class="article-container" data-dcnode-id="286"><div data-dcnode-id="1616" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="1618"><div class="container" data-dcnode-id="1619"><div class="row" data-dcnode-id="1620"><div class="offset-lg-2 col-lg-8" data-dcnode-id="1621"><div class="single-article" data-dcnode-id="1622"><div class="article-about" data-dcnode-id="2244"><a class="article-link" data-dcnode-id="2247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/the-biggest-reason-netflix-shares-are-tanking/"><h1 class="article-republish-title" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node=""> The Biggest Reason Netflix Shares Are Tanking</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Saturday, April 23, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="1628" responsive-videos="true"><div class="article-body-text" data-dcnode-id="1679"><p data-dcnode-id="2239"><span data-dcnode-id="2243" instrument_node="">When asked about the best way to fight monopolies in his documentary series </span><a data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0852785/" rel="nofollow"><span data-dcnode-id="2242" instrument_node="">Free to Choose</span></a><span data-dcnode-id="2240" instrument_node="">, Milton Friedman had a firm answer: “the free market.” Some of his guests had other positions and argued that government intervention was necessary, but Friedman didn’t buy it.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">The Netflix case has proved Friedman right, once again.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2234" instrument_node="">On Wednesday, Netflix shares plunged </span><a data-anchor="?consumer=googlenews" data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/entertainment-arts/business/story/2022-04-20/lat-et-ct-netflix-stock-plunges%3Fconsumer%3Dgooglenews"><span data-dcnode-id="2233" instrument_node="">an impressive 36 percent</span></a><span data-dcnode-id="2231" instrument_node="">. Conventional press releases blamed the loss of subscribers as the main cause for the crumbling value of the entertainment company. Others blamed Netflix's ideological story lines, which in recent times have been advocating mainly leftist causes. These factors are undoubtedly part of the reason why its shares in the market crumbled, but the main reason was far more straightforward: competition.</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2228" instrument_node="">No one can doubt that Netflix’s founders were forerunners. They discovered or created the subscription-based entertainment service, and they, far from selling or renting movies, as Blockbuster did, reinvented the industry. In 2016 an article was published in </span><em data-dcnode-id="2225"><a data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/hollywood-fears-the-netflix-monopoly-2016-9" rel="nofollow"><span data-dcnode-id="2227" instrument_node="">Business Insider</span></a></em><span data-dcnode-id="2224" instrument_node=""> that claimed Hollywood was terrified that Netflix would become a huge monopoly that would displace them. However, as usually happens in any society where there is capital, opportunity, and space for free competition, soon other companies began to copy Netflix's business model and provide better service: cheaper prices, shared subscriptions with advertising, other productions, among other perks, which gradually began to bring down Netflix's solitary reign.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Netflix knows it, too. They argue that the emergence of competitors (Disney, HBO, Amazon, among others) is one of the causes of the loss of customers. Of course, there’s also prices, ideology, and programming—there are a number of factors that have caused thousands of people to leave Netflix—but the main thing is that people have the ability to freely choose their entertainment service provider.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node="">Now Netflix will have to adjust its rates, plans, and programming in an attempt to regain lost customers, and will surely backtrack on its intentions to increase subscription prices; in fact, it has been rumored that the company may be considering the possibility of implementing </span><em data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">cheaper </span></em><span data-dcnode-id="2215" instrument_node="">subscriptions with the inclusion of advertising.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Regardless of which company ends up being the one that consolidates as the most powerful in the entertainment market, we should all be grateful to have a healthy competition that allows us all to have better and cheaper services, because surely without such competition Netflix could unilaterally set the prices they see fit and include the programming that their directors establish without thinking about the consumer. Most likely this setback will make them rethink the editorial line of programming they have adopted in recent times.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Americans should be grateful to have in the country different large companies competing among themselves for customers. That is the essence of capitalism and the free market, and it is the reason why the United States has been such a successful nation. In Venezuela, the country where I was born and spent 27 years of my life, due to the shortage of products because of the enormous state intervention in the economy, I was forced on many occasions to buy soaps, deodorants, food, and other products of very poor quality and at high prices, because we could only buy what the government bureaucrats offered.</span></p><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Similarly, I spent years of my life having electricity and water cuts that sometimes lasted 48 hours, because the government was the entity that managed the basic service companies, with the supposed intention of making it more accessible to the entire population. As it turns out—thanks to this intervention—no one in the whole country could enjoy smooth electricity service, a problem that remains to this day.</span></p><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">So as we watch Netflix shares fall, let’s be thankful and celebrate the market process, including the large companies and consolidation it creates. Because I assure you that if these big companies commit any irregularity or fail to comply with consumer demands, the market will put them in their place in a timely manner, something that the government will never be able to do.</span></p><span data-dcnode-id="2201" instrument_node="">

><div class="offset-lg-2 col-lg-8" data-dcnode-id="963"><div class="single-article" data-dcnode-id="964"><div class="article-about" data-dcnode-id="1610"><a class="article-link" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/articles/3-ways-markets-are-protecting-our-environment-this-earth-day/"><h1 class="article-republish-title" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">3 Ways Markets Are Protecting Our Environment</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Friday, April 22, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="970" responsive-videos="true"><div class="article-body-text" data-dcnode-id="1025"><p data-dcnode-id="1602"><span data-dcnode-id="1609" instrument_node="">This Earth Day, pessimism is looming over the conservation community: War in Ukraine seems to have stymied ambitious climate solutions; rising fuel prices have brought into sharp focus our current and future dependence </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/can-we-really-divest-from-fossil-fuels-without-hurting-the-economy/" rel="nofollow"><span data-dcnode-id="1608" instrument_node="">on fossil fuels</span></a><span data-dcnode-id="1606" instrument_node="">; and here in the West, we’re preparing for another </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/weather/2022/04/11/drought-plains-fire-us/" rel="nofollow"><span data-dcnode-id="1605" instrument_node="">drought-stricken summer</span></a><span data-dcnode-id="1603" instrument_node="">. These challenges surely won’t be easily solved. In the wider conservation landscape, however, there is still cause for some environmental optimism and it comes from an unlikely source: markets.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Innovative entrepreneurs are harnessing the power of markets and property rights to enhance conservation in a variety of ways. They aren’t always flashy or headline-grabbing, but these three examples are making a real impact that provides some much-needed hope this Earth Day.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><h2 data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">1. Conserving Water</span></h2><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Drought is routine in the West, and with growing populations, creative ways to allocate scarce water are more important than ever.</span></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1588"><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tu.org/conservation/conservation-areas/water-management/water-transactions/" rel="nofollow"><span data-dcnode-id="1591" instrument_node="">Trout Unlimited</span></a><span data-dcnode-id="1589" instrument_node=""> is one innovator harnessing water markets for conservation. TU works with farmers and ranchers across the West to temporarily divert some of their water from its agricultural use, leaving it instream at critical times of the year to support fish populations. In exchange, TU financially compensates the water rights holders, a win-win for farmers and fish.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Where instream flow is legally considered a beneficial use, water rights holders can enter into a voluntary agreement with conservation groups to leave some of their water instream without risk of forfeiting their water rights. Harnessing markets in this way allows for this precious resource to be put to its highest-valued use and gives conservationists a price mechanism by which to realize water’s conservation value.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><h2 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">2. Sustaining Wildlife Habitat</span></h2><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">With a surge in popularity in recent years, western states like Montana face increasing pressure from population growth and urban development. This growth threatens the habitat integrity of the region’s large, private working lands that provide essential winter range for a variety of wildlife including elk, a keystone species of the region’s ecosystem. Private partners are pursuing innovative agreements to conserve these landscapes and habitats.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1571"><span data-dcnode-id="1577" instrument_node="">In the Paradise Valley of Montana, the Property and Environment Research Center and the Greater Yellowstone Coalition have partnered with a ranching family to conserve 500 acres of their ranch for elk winter range. This</span><a data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.perc.org/elk-occupancy-agreements/" rel="nofollow"><span data-dcnode-id="1576" instrument_node=""> </span></a><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.perc.org/elk-occupancy-agreements/" rel="nofollow"><span data-dcnode-id="1574" instrument_node="">elk occupancy agreement</span></a><span data-dcnode-id="1572" instrument_node=""> is entirely voluntary, privately funded, and doesn’t require government oversight.</span></p><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">In many cases, a landowner is willing to manage land for conservation but is unwilling to enter into a government-managed conservation easement, which requires conservation in perpetuity. The elk occupancy agreement or shorter-term habitat lease offers a less onerous, private alternative for many landowners. More flexible tools like this mean more opportunities to conserve habitat.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><h2 data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">3. Improving Forest Health</span></h2><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Wildfires out West have grown larger and hotter due to a build-up of fuels like dead trees and overgrown vegetation after a century of the federal government striving to put out all forest fires quickly. This, unfortunately, has become the new normal, with western communities bracing themselves each season for more devastating fires.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The Forest Service has flagged 63 million acres at extreme risk of wildfire and in need of active forest restoration. At the current pace and scale, it would take the agency decades to address the ever-growing backlog of restoration projects. Thankfully, innovators have found a way to tap the private sector to help get some of this desperately needed restoration done.</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1557" instrument_node="">Blue Forest is a conservation group that, in partnership with World Resources Institute, has pioneered the</span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueforest.org/forest-resilience-bond" rel="nofollow"><span data-dcnode-id="1556" instrument_node=""> </span></a><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.blueforest.org/forest-resilience-bond" rel="nofollow"><span data-dcnode-id="1554" instrument_node="">Forest Resilience Bond</span></a><span data-dcnode-id="1552" instrument_node="">. With this innovative financial tool, private investors, such as an insurance company or impact-investment firm, fund the bond, and stakeholders who benefit from forest restoration, like a state or utility company, agree to pay the investors back plus a reasonable rate of return as restoration benefits are achieved.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">The first Forest Resilience Bond was piloted in the Tahoe National Forest, where the Forest Service estimates that this tool will shorten the project time to 4 years rather than a decade or more. This creative model provides the financial assistance needed to increase the pace and scale of critical forest restoration projects, a benefit to forest health and western communities.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Certainly, many environmental challenges remain that require our attention and creative thinking. Thankfully, market tools like property rights, price signals, and incentives are working to conserve our natural world through flexible, cooperative agreements. This type of market approach helps bridge the divide among various stakeholders and offers sustainable solutions. So despite what you might hear to the contrary, this Earth Day, thanks to markets, we have plenty to be optimistic about.</span></p><span data-dcnode-id="1544" instrument_node="">

Ways Markets Are Protecting Our Environment" data-addthis-url="/articles/3-ways-markets-are-protecting-our-environment-this-earth-day/" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/nyRu0qxj81o" target="_blank" title="More"><img alt="" data-dcnode-id="986" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/images/ico-share.png&amp;raw" title="Share"><span data-dcnode-id="985" instrument_node="">0</span></a><a class="disqus_thread" data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/articles/3-ways-markets-are-protecting-our-environment-this-earth-day/%23disqus_thread"><img data-dcnode-id="983" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/images/ico-comment.svg&amp;raw"><span data-dcnode-id="982" instrument_node=""> 0</span></a><div class="atclear" data-dcnode-id="980"></div></span></div></div></div><div class="article-comments" data-dcnode-id="971"><button class="show-comments button" data-dcnode-id="974" disqus-url="https://fee.org/articles/3-ways-markets-are-protecting-our-environment-this-earth-day/"><span data-dcnode-id="975" instrument_node="">Open Comments</span></button><div class="disqus_thread" data-dcnode-id="973" id="disqus_thread"></div><div class="count-comments" data-dcnode-id="972" data-disqus-url="https://fee.org/articles/3-ways-markets-are-protecting-our-environment-this-earth-day/" style="display: none;"></div></div></div><div class="continue-reading align-center" data-dcnode-id="965"><div data-dcnode-id="966" id="continue-reading-id"><a class="cursor-pointer" data-dcnode-id="967" id="continue-reading-button"><span data-dcnode-id="969" instrument_node="">Continue Reading</span><span class="fa fa-angle-down" data-dcnode-id="968"></span></a></div></div></div></div></div></div></section><hr class="hr" data-dcnode-id="959"></div><div data-dcnode-id="287" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="289"><div class="container" data-dcnode-id="290"><div class="row" data-dcnode-id="291"><div class="offset-lg-2 col-lg-8" data-dcnode-id="292"><div class="single-article" data-dcnode-id="293"><div class="article-about" data-dcnode-id="952"><a class="article-link" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/articles/how-a-california-tattoo-artist-beat-public-health-officials-who-tried-to-deny-her-a-permit/"><h1 class="article-republish-title" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">How a California Tattoo Artist Beat Public Health Officials Who Tried to Deny Her a Permit </span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Friday, April 22, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="299" responsive-videos="true"><div class="article-body-text" data-dcnode-id="350"><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">California tattoo artist Delia Fields is finally free to do what she loves. That’s the good news. However, her story highlights the uneven—some would say arbitrary—constitutional protections enjoyed by some entrepreneurs but not others.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="948" instrument_node="">The last few years haven’t been easy for Delia. She lost everything she owned in </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_Fire_%282018%29" rel="nofollow"><span data-dcnode-id="947" instrument_node="">the Camp Fire of 2018</span></a><span data-dcnode-id="945" instrument_node=""> except for her dog, her truck, and the clothes on her back. Delia then bounced between a Walmart parking lot, friends’ couches, and a motel before moving to Redding, California to start over.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">After arriving in Redding, Delia found work in a restaurant and started rebuilding her life. Surviving a life-changing disaster was bad enough on its own, but even working full-time, she was barely making ends meet as a server.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">As she contemplated her future, Delia thought back to college, where she studied cultural anthropology and was captivated to learn that over millennia, cultures throughout the world have practiced body art to record events and express themselves. It was then that she realized she wanted to become a tattoo artist.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Even though she was still working full-time at the restaurant, she found a local body artist willing to train her as a piercing apprentice, teaching her the ins and outs of body art. After apprenticing for over a year and a half, Delia had mastered proper techniques and safe practices, and had learned how to run a business. With her new skills in hand, Delia began thinking about her next move.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Again, however, fate had other plans. With the arrival of COVID-19, the shop she trained in was forced to close. As a result, Delia set her sights on opening her own studio once the pandemic improved.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">In April 2021, </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//velvetorangebodycraft.com/" rel="nofollow"><span data-dcnode-id="929" instrument_node="">Velvet Orange</span></a><span data-dcnode-id="927" instrument_node=""> was born. Combining her talents with her friend and former boss Shar, Delia found an ideal location in downtown Redding and applied for the required health and safety permits for a new body art studio.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Even though the county’s health inspection of the studio found it to be flawless, the county denied Delia a permit to tattoo. Because the city had recently enacted a prohibition on tattooing in the downtown area, the inspector informed Delia that the county could only issue a permit for body piercing.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">The news was upsetting and confusing—an existing tattoo studio already operated in the center of downtown Redding. Bewilderingly, Delia’s studio was located a mere block within the downtown no-tattoo zone. Worse still, she could see another tattoo studio from the corner of her street just beyond the prohibited zone.</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="918" instrument_node="">Delia refused to let this news stop her. With the help of Pacific Legal Foundation, in September of 2021 Delia sent the City of Redding and Shasta County </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificlegal.org/redding-must-allow-tattoo-studios-downtown/" rel="nofollow"><span data-dcnode-id="917" instrument_node="">letters pointing out</span></a><span data-dcnode-id="915" instrument_node=""> the First Amendment problem with arbitrarily banning tattoo businesses in downtown Redding.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Indeed, the United States Court of Appeals for the Ninth Circuit held in 2010 that tattooing, as well as the business of tattooing, is a purely expressive activity fully protected by the First Amendment to the US Constitution, and that a total ban on tattooing is not a reasonable restriction on speech.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">The city and county quickly relented. Upon being reminded of the First Amendment’s protections for tattooing and the business of tattooing, Redding notified Delia that it would update its downtown zoning plan to remove the restriction on tattoo businesses, with the amendments finally being enacted in February 2022. With the city’s assurances, Shasta County proceeded to issue an updated permit authorizing Velvet Orange to provide tattoo services as well as body piercing. Delia’s perseverance and determination paid off.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">But she would enjoy only a shadow of those constitutional protections if she wanted to open most any other type of business.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="903" instrument_node="">The reason Delia was able to fight back so successfully is simply that courts recognize greater constitutional protections for speech than for the right to earn a living. If a business is expressive—like tattooing—then it enjoys robust constitutional protection with a heavy burden on the government to justify restrictions on the business’s operations. But if the business is non-expressive—like </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificlegal.org/case/massage-therapy-billings-illegal-searches/" rel="nofollow"><span data-dcnode-id="902" instrument_node="">a massage therapy studio</span></a><span data-dcnode-id="900" instrument_node=""> or a </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificlegal.org/case/nc-food-truck/" rel="nofollow"><span data-dcnode-id="899" instrument_node="">food truck</span></a><span data-dcnode-id="897" instrument_node="">—then it has almost no protections against arbitrary restrictions. For example, Redding’s provisions that now allow tattoo businesses downtown still prohibit massage businesses.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="894" instrument_node="">There is no principled justification for treating some constitutional rights as second-class. An entrepreneur’s right to earn a living is implicated just as much whether she’s in the business of tattooing, preparing food, or providing massage therapy. Indeed, in </span><em data-dcnode-id="891"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/supremecourt/text/129/114" rel="nofollow"><span data-dcnode-id="893" instrument_node="">Dent v. State of West Virginia</span></a></em><span data-dcnode-id="890" instrument_node="">, the Supreme Court stated that it is “undoubtedly the right of every citizen of the United States to follow any lawful calling, business, or profession he may choose.”</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Unfortunately, nearly a century ago the Supreme Court also held that regulations on opening and running small businesses are generally subject to “rational basis review,” which most courts have said requires only a hypothetical connection between a regulation and a legitimate government concern like the health, safety, and welfare of the public.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Even if the hypothetical justifications are proven wrong, it doesn’t matter; they just had to be plausible when the government passed the law. In practice, courts typically rubberstamp government restrictions on non-expressive entrepreneurship.</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">As a result, most entrepreneurs have little protection against the whims and preferences of state and local lawmakers—and in many instances even need their </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pacificlegal.org/competitors-veto-roadblock-to-new-businesses/" rel="nofollow"><span data-dcnode-id="880" instrument_node="">competitors’ permission</span></a><span data-dcnode-id="878" instrument_node=""> to open their doors.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node="">All entrepreneurs deserve the full promise of the Constitutional protections that let Delia have a chance at success. Entrepreneurs like Delia aren’t asking for special favors; to paraphrase abolitionist and suffragette </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womenshistory.org/education-resources/biographies/sarah-moore-grimke" rel="nofollow"><span data-dcnode-id="874" instrument_node="">Sarah Grimké</span></a><span data-dcnode-id="872" instrument_node="">, all they ask is that their government take their feet from off their necks and permit them to stand upright.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="351" style="text-align: center;"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="352" frameborder="0" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/ZF-SoE6zyqs&amp;raw" title="YouTube video player" width="560"><html data-cast-api-enabled="true" data-dcnode-id="354" dir="ltr" lang="en"><head data-dcnode-id="844"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="864" name="viewport"/><link data-dcnode-id="859" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="7qoV5RLGI6mZknj/FOvgKQ" rel="stylesheet"/><title data-dcnode-id="846">YouTube</title><link data-dcnode-id="845" href="https://www.youtube.com/watch?v=ZF-SoE6zyqs" rel="canonical"/></meta></head><body class="date-20220421 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="355" dir="ltr"><div data-dcnode-id="362" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="363" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="842" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="843" playsinline="" style="width: 560px; height: 315px; left: 0px; top: -315px;" tabindex="-1" webkit-playsinline=""></video></div><div class="ytp-gradient-top" data-dcnode-id="841" data-layer="1"></div><div class="ytp-chrome-top ytp-show-cards-title" data-dcnode-id="766" data-layer="1"><div class="ytp-title-channel ytp-flyout-fix-experiment" data-dcnode-id="831"><div class="ytp-title-beacon" data-dcnode-id="840"></div><a aria-label
