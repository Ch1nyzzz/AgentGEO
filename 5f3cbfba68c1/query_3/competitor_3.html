mig-nr-2017.pantheonsite.io\/?p=389542"},"modified":"2021-05-25T16:56:42","modified_gmt":"2021-05-25T20:56:42","slug":"universal-basic-income-ubi-terrible-idea","status":"publish","type":"post","link":"https:\/\/www.nationalreview.com\/2016\/06\/universal-basic-income-ubi-terrible-idea\/","title":{"rendered":"Why a Universal Basic Income Is a Terrible Idea"},"content":{"rendered":"<p><span class=\"drop\">I<\/span>f you have not heard any proposals for a \u201cuniversal basic income\u201d (UBI), you will soon. Under a UBI, the federal government would send each American (including children, in some plans) a monthly check of, say, $800 or $1,000 to cover basic needs. A couple would receive $20,000 per year, regardless of other income earned; a family with children would get more. The bloated welfare state? Streamlined! Poverty? Solved! And all of it supposedly paid for by eliminating safety-net programs that would no longer be necessary.<\/p>\n<AdUnit name=\"incontent-1-mobile\" baseUnitName=\"incontent-1\" unitType=\"mobile\"><\/AdUnit>\n<AdUnit name=\"incontent-1-desktop\" baseUnitName=\"incontent-large\" unitType=\"desktop\"><\/AdUnit><TopStories desktop=\"true\" variant=\"default\"><\/TopStories>\n<p>Columnists are intrigued, \u201cdata journalists\u201d excited, \u201cexplainers\u201d cloyingly enthused. Technologists, certain that their breakthroughs in artificial intelligence and robotics will leave everyone else unemployed, see a UBI as critical to their utopian future; some are even funding a pilot program. But others think the time for a UBI has already arrived. Finland and Canada are experimenting with UBIs, and Switzerland has just held a national referendum on creating one (it was rejected by more than three to one). Andy Stern \u2014 the former head of SEIU, America\u2019s largest private-sector labor union \u2014 has just published a book arguing for a UBI here. Charles Murray, a prominent scholar on the right, has also made the case for a UBI. Former labor secretary Robert Reich, plugging Stern\u2019s effort, says, \u201cAmerica has no choice.\u201d<\/p>\n<p>Actually, we do have a choice \u2014 one that goes far beyond safety-net details to reach the very heart of state and society. A UBI would pose severe practical challenges, which will be discussed later in this article. But even if it could work, it should be rejected on principle. A UBI would redefine the relationship between individuals, families, communities, and the state by giving government the role of provider. It would make work optional and render self-reliance moot. An underclass dependent on government handouts would no longer be one of society\u2019s greatest challenges but instead would be recast as one of its proudest achievements.<\/p>\n<AdUnit name=\"incontent-2-desktop\" baseUnitName=\"incontent-small\" unitType=\"desktop\"><\/AdUnit><MoreInTag desktop=\"true\" variant=\"default\"><\/MoreInTag>\n<p>Universal basic income is a logical successor to the worst public policies and social movements of the past 50 years. These have taken hold not just through massive government spending but through fundamental cultural changes that have absolved people of responsibility for themselves and one another, supported destructive conduct while discouraging work, and thereby eroded the foundational institutions of family and community that give shape to society.<\/p>\n<AdUnit name=\"incontent-2-mobile\" baseUnitName=\"incontent-2\" unitType=\"mobile\"><\/AdUnit><TopStories mobile=\"true\" variant=\"default\"><\/TopStories>\n<p>In <em>The Dream and the Nightmare<\/em> (1993), his masterly account of the social currents that produced the entrenched poverty of the underclass, Myron Magnet wrote: \u201cWhen it behooved mainstream culture to assert traditional mainstream values with conviction, the Haves refused to assert to the poor and the black the most fundamental of those values: the worth of the respectable working life, however humble.\u201d Why would we want to repeat that mistake with a UBI?<\/p>\n<p align=\"center\">\n<p><span class=\"drop\">C<\/span>learly defined responsibilities, from educating children to caring for the elderly to fighting in wars, are fundamental to a society\u2019s character. They establish the terms of relationships, the scope and role of civil society, and the expectations against which people judge one another. And few are as important or pervasive as the responsibility of providing \u2014 for oneself, for one\u2019s family, and for future generations.<\/p>\n<p>Over the past century, America has shifted some of that responsibility from family and community to government. The elderly and disabled now receive regular cash payments and health coverage. For a time, single mothers received cash support as well, though welfare reform significantly curtailed that assistance. Most low-income households can receive a variety of in-kind benefits, such as food stamps, housing vouchers, and Medicaid.<\/p>\n<blockquote class=\"pullquote\"><p>Over the past century, America has shifted some of that responsibility from family and community to government.<\/p><\/blockquote>\n<p>The government\u2019s assumption of such obligations has helped to mitigate severe hardship, but it has also changed economic incentives and cultural norms in ways that promote dependence over self-reliance and replace accountability with entitlement. Debate continues over whether this shift has gone too far or not far enough. But through it all, even if diluted, a crucial principle has survived: If you are able to work, you should work. The safety net ensures that no one starves, freezes, or dies on the hospital steps, but it does not typically offer a full substitute for employment.<\/p>\n<p>Even when the economic value of safety-net benefits might approximate the earned income of a low-wage job, those benefits arrive with constraints on how they can be spent, and with the weakened but still potent stigma of welfare. Yet more important than the stigma is the inverse praise: Those who work to provide for themselves and their families know they are playing a critical and worthwhile role, which imbues the work with meaning no matter how unfulfilling the particular task may be. As the term \u201cbreadwinner\u201d suggests, the abstractions of a market economy do not obscure the way essentials are <em>earned<\/em>.<\/p>\n<AdUnit name=\"incontent-3-desktop\" baseUnitName=\"incontent-large\" unitType=\"desktop\"><\/AdUnit><MoreFromAuthor desktop variant=\"default\"><\/MoreFromAuthor>\n<p>A UBI would undermine all this: Work by definition would become optional, and consumption would become an entitlement disconnected from production. Stripped of its essential role as the way to earn a living, work would instead be an activity one engaged in by choice, for enjoyment, or to afford nicer things.<\/p>\n<p>For many proponents of the scheme, this is the point. Releasing people from any responsibility to support themselves or their families represents the zenith of a hyper-individualistic culture. The goal is to maximize freedom and satisfaction by minimizing obligation and constraint. As the slogan of the moment proclaims: \u201cYou do you.\u201d<\/p>\n<p>This should give pause to anyone who believes that the good life entails more, or that a free society requires its members, as Yuval Levin writes in his new book <em>The Fractured Republic<\/em>, to \u201ccommit ourselves to more than our own will and whim. It requires a commitment precisely to the formative social and cultural institutions that we have seen pulled apart from above and below in our age of fracture.\u201d<\/p>\n<AdUnit name=\"incontent-3-mobile\" baseUnitName=\"incontent-3\" unitType=\"mobile\"><\/AdUnit><MoreInTag mobile=\"true\" variant=\"default\"><\/MoreInTag>\n<AdUnit name=\"incontent-4-desktop\" baseUnitName=\"incontent-small\" unitType=\"desktop\"><\/AdUnit>\n<AdUnit name=\"incontent-4-mobile\" baseUnitName=\"incontent-4\" unitType=\"mobile\"><\/AdUnit>\n<p>Even if a UBI represents just one more slip in our culture\u2019s long downward slide, that is no argument in its favor. Only after halting the slide and regaining its footing can the culture hope to reclaim lost ground.<\/p>\n<AdUnit name=\"incontent-5-desktop\" baseUnitName=\"incontent-large\" unitType=\"desktop\"><\/AdUnit>\n<p>But UBI proponents themselves recognize the radical nature of the shift they suggest. Writing at the leftist website <em>Jacobin<\/em>, Shannon Ikebe observed that \u201ca UBI has been embraced in particular by the post-productivist left, which carries a strong feminist and ecological bent and rejects the traditional left\u2019s valorization of labor and the working class.\u201d Ikebe quoted other scholars describing universal basic income as a \u201ccapitalist road to communism\u201d and a \u201cpostwork political project.\u201d<\/p>\n<p>In the <em>New York Times<\/em>, columnist Farhad Manjoo explained:<\/p>\n<blockquote>\n<p>One key factor in the push for U.B.I., I think, is the idea that it could help reorder social expectations. At the moment we are all defined by work; Western society generally, but especially American society, keeps social score according to what people do and how much they make for it. The dreamiest proponents of U.B.I. see that changing as work goes away.<\/p>\n<\/blockquote>\n<AdUnit name=\"incontent-6-desktop\" baseUnitName=\"incontent-small\" unitType=\"desktop\"><\/AdUnit>\n<p>Manjoo\u2019s comment illustrates how support for a UBI fits neatly alongside the widely held belief that technological advances will make work \u201cgo away.\u201d But when prior technological revolutions made a large share of farm and then factory labor obsolete, people continued to find new and productive vocations. More than four in five employees now work in the service sector.<\/p>\n<p>The present technological revolution shows no signs of following a different course. The U.S. labor market has kept pace with population growth, adding 80 million net jobs since computers started coming on the scene in the 1960s and more than 25 million since the Internet became mainstream in the 1990s. Approximately 60 percent of the working-age population remains employed \u2014 slightly above the post-war average.<\/p>\n<AdUnit name=\"incontent-5-mobile\" baseUnitName=\"incontent-1\" unitType=\"mobile\"><\/AdUnit><MoreFromAuthor mobile variant=\"default\"><\/MoreFromAuthor>\n<p>Certainly, as has happened before, technological change poses both great opportunity and great challenges for the labor market. But work itself remains both necessary and valuable. Undermining it because it might hypothetically someday end would be a senseless act of preemptive self-sabotage.<\/p>\n<AdUnit name=\"incontent-7-desktop\" baseUnitName=\"incontent-large\" unitType=\"desktop\"><\/AdUnit>\n<p align=\"center\">\n<p><span class=\"drop\">W<\/span>hat about poverty? Proponents say a UBI would end it, because each American would receive a check lifting him above the poverty line. But poverty is not only, or even primarily, a matter of material well-being. If it were, the $20,000 in safety-net spending per person below the poverty line, the presence of air conditioning and cable television and cell phones in the majority of such households, even the obesity epidemic ravaging low-income communities would all be signs that the war on poverty is nearly won. But we care about social as well as material conditions, and we care about upward mobility. By these measures, a UBI makes things worse.<\/p>\n<p>The greatest crisis facing less educated and lower-income Americans is social, not economic. As Charles Murray\u2019s <em>Coming Apart<\/em> (2012) documents in harrowing detail, measures of social health that once looked roughly equal across economic classes now show gaping disparities, from family formation to employment to civic engagement to basic levels of trust. In 1960, Murray reports, more than 95 percent of white children were living with both biological parents when the mother turned 40, regardless of class. By the 2000s, the upper-class figure was 90 percent but the lower-class figure had declined to barely 30 percent, a level \u201cso low that it calls into question the viability of white working-class communities as a place for socializing the next generation.\u201d The story for other races is similar.<\/p>\n<AdUnit name=\"incontent-8-desktop\" baseUnitName=\"incontent-small\" unitType=\"desktop\"><\/AdUnit>\n<blockquote class=\"pullquote\"><p>The greatest crisis facing less educated and lower-income Americans is social, not economic.<\/p><\/blockquote>\n<p>Appreciating the status of work in these communities is critical to understanding their decline. Work gives not only meaning but also structure and stability to life. It provides both socialization and a source of social capital. It helps establish for the next generation virtues such as responsibility, perseverance, and industriousness. Yet of the lower-class&nbsp; households Murray studied, the share with a full-time worker declined from 81 percent in 1960 to 53 percent in 2010.<\/p>\n<p>Facing that trend, society cannot afford to withdraw its remaining expectation that able-bodied people try to make ends meet and its remaining respect for those who do. Yes, a UBI might flood these communities with additional resources. But a similar flood has already occurred over the past 40 years, with safety-net spending increasing eightfold. The result has been ever greater social erosion.<\/p>\n<AdUnit name=\"incontent-9-desktop\" baseUnitName=\"incontent-large\" unitType=\"desktop\"><\/AdUnit>\n<AdUnit name=\"incontent-6-mobile\" baseUnitName=\"incontent-2\" unitType=\"mobile\"><\/AdUnit>\n<p>Many UBI advocates deny that a UBI would produce any great discouragement to work, but their claims are undermined by a vocal subset who embrace this result. Good riddance, they say, to lousy jobs taken only out of need. \u201cI think it\u2019s a bad use of a human to spend 20 years of their life driving a truck back and forth across the United States,\u201d Albert Wenger, a venture capitalist, told the <em>New York Times<\/em>. \u201cThat\u2019s not what we aspire to do as humans \u2014 it\u2019s a bad use of a human brain.\u201d<\/p>\n<p>This attitude recalls the investment banker quoted by Myron Magnet who lamented \u201cthe man and his wife slogging away in menial jobs that are dead-end jobs, with three kids, trying to deal with an environment that is very depressing, . . . living dead-end lives.\u201d Why, asks Magnet, does this family, working to support itself and raise upstanding citizens who will start families of their own, represent \u201ca dead end rather than a human accomplishment worthy of honor and admiration\u201d?<\/p>\n<p>This dead-end message is especially toxic for upward mobility because it tells prospective low-wage workers that, in Magnet\u2019s words, \u201cthe first step they once could have taken toward achieving [respect] \u2014 putting a foot firmly on the bottom rung of the job ladder \u2014 has had respectability withdrawn from it.\u201d Young people with limited skills and education are already too disconnected from the labor force. A UBI that reduces the perceived importance of work while putting cash in their pockets can only reduce the likelihood of their making the daily trek to low-wage jobs. And a subculture composed of their peers would presumably become less rather than more supportive of the choice to seek work. For unemployed workers of any age, the UBI\u2019s guaranteed paycheck would only reduce the pressure to find work or relocate in search of opportunity.<\/p>\n<AdUnit name=\"incontent-10-desktop\" baseUnitName=\"incontent-small\" unitType=\"desktop\"><\/AdUnit>\n<p>Yet for those at the bottom of the economic ladder, there is simply no substitute for stepping onto the first rung. A UBI might provide the same income as such a job, but it can offer none of the experience, skills, or socialization. A nation in which people sitting beside the ladder live more comfortably but are less likely to climb it may be one with a lower government-reported poverty rate, but it is not more effectively combating poverty.<\/p>\n<AdUnit name=\"incontent-7-mobile\" baseUnitName=\"incontent-3\" unitType=\"mobile\"><\/AdUnit>\n<p>The best argument for a UBI is that, while it may reduce the upside of a job, it also reduces the downside because a recipient does not lose the UBI when he starts to work. This contrasts with a conventional safety net, in which benefits are phased out as a recipient\u2019s earnings increase. On average, in the United States, the phase-out reduces benefits by around 30 cents for every dollar earned. But over some income ranges and for some recipients, a dollar of wages can cost the earner nearly a full dollar of benefits. Some programs, such as disability insurance, can also force recipients into a binary choice: Either work or receive the benefit. So, other things being equal, someone who could keep his UBI would be more likely to seek work than someone who would lose some or all of his safety-net benefits as a result.<\/p>\n<p>Does the UBI\u2019s positive feature of eliminating benefit phase-out exceed its negative feature of making work unnecessary? Unfortunately, a policy whose greatest effects are cultural lends itself poorly to pilot studies, because there is no way to take into account such society-scale shifts: A test group will do artificially well if it experiences the upside of receiving cash without the downside of the transformed cultural norms and social institutions. Better \u2014 and deeply discouraging \u2014 evidence comes from the effects wrought by the aggressive welfare-state expansions of the recent past.<\/p>\n<p>But the question is academic, because the UBI\u2019s purported advantage is not real. Maintaining a pure, guaranteed UBI with no phase-out for increasing income would require a budget dramatically larger than what is now spent on the safety net. To see why a UBI fails in this way, we must now consider its implementation.<\/p>\n<AdUnit name=\"incontent-8-mobile\" baseUnitName=\"incontent-4\" unitType=\"mobile\"><\/AdUnit>\n<p align=\"center\">\n<p><span class=\"drop\">T<\/span>hree key variables characterize a UBI: its size, its rate of phase-out, and its source of funding. Proponents like to describe a UBI in which each person receives a benefit adequate to live on, the benefit phases out very gradually at very high income levels (or else not at all), and the total cost is covered by replacement of existing safety-net programs. But this violates what Professor Kevin Milligan, of the University of British Columbia, has called the \u201cbasic-income impossible trinity.\u201d Of those three objectives, a policymaker can choose only two.<\/p>\n<p>UBI advocates observe that the existing safety net in the United States or any other developed nation spends on each person roughly what a livable basic income would cost. But it does this for only a small subset of the population, for whom benefits phase out quickly as their incomes rise. A UBI limited to the budget of the existing safety net could therefore offer either a small benefit to everyone or a large benefit that phases out quickly, but not both, and a UBI that offers a large benefit to everyone would require a massive budget increase.<\/p>\n<blockquote class=\"pullquote\"><p>A UBI limited to the budget of the existing safety net could therefore offer either a small benefit to everyone or a large benefit that phases out quickly, but not both.<\/p><\/blockquote>\n<p>Any proposal claiming to overcome the impossible-trinity problem invariably contains a flaw. Take, for instance, Charles Murray\u2019s proposal for a $13,000-per-year UBI paid to all adults over the age of 21, with a partial phase-out (to a minimum of $6,500) beginning when annual earnings exceed $30,000. Murray would fund the program by eliminating not only the entire safety net of anti-poverty programs but also Medicare, Medicaid, Social Security, agriculture subsidies, and \u201ccorporate welfare.\u201d<\/p>\n<p>The first flaw is his inclusion of Medicare and Social Security. Medicare already spends more than $11,000 per recipient; Social Security spends $16,000. So Murray\u2019s UBI covers only half of what the elderly\u2019s \u201cearned\u201d entitlements paid. Anyone left to rely on the UBI would be unable to afford both Medicare-quality insurance and other essentials.<\/p>\n<AdUnit name=\"incontent-9-mobile\" baseUnitName=\"incontent-1\" unitType=\"mobile\"><\/AdUnit>\n<p>Note also that Murray has excluded children. A single mother with two children, receiving a total of $13,000 per year, would be only two-thirds of the way to the 2016 federal poverty guideline of $20,160. And Murray\u2019s plan, having eliminated Medicaid, would explicitly require her to spend at least $3,000 on health insurance. So her disposable \u201cincome\u201d of $10,000 would reach less than halfway to the poverty line.<\/p>\n<p>Murray\u2019s plan, designed to attract conservative and libertarian support, underscores exactly why liberals are so wary of proposals that supplant the existing safety net. His effort is caught in a Catch-22: If the benefit is small enough to be funded by eliminating the existing safety net, it is too small to permit the existing safety net\u2019s elimination. Yet a UBI that was designed to coexist alongside a safety net would be so expensive and complex that it would quickly lose appeal for the Right. Murray rather undermines his pitch when he says: \u201cIf the guaranteed income is an add-on to the existing system\u201d (as his design ensures it would have to be), \u201cit will be as destructive as its critics fear.\u201d<\/p>\n<p>The same impossible-trinity problem means that avoiding a phase-out cannot be considered among a UBI\u2019s advantages over the existing safety net, because a livable UBI that does not phase out cannot be funded from the existing safety net. A UBI could perform better than the existing safety net only by costing dramatically more, but of course the safety net could also do a better job if given that extra money. For example, it could circumvent the phase-out challenge by simply offering food stamps and Medicaid eligibility for all. That would cost the same as a no-phase-out UBI while avoiding the unconditional cash handouts that most badly damage the respect accorded to work.<\/p>\n<p>The point is not that the safety net should look like a UBI, but rather that a UBI is not good anti-poverty policy. If employment works, then \u2014 for any given spending level \u2014 safety-net reforms that respect, promote, and even subsidize employment will yield better results than a UBI seeking to supplant it.<\/p>\n","protected":false},"excerpt":{"rendered":"<p>In spite of their current vogue, Universal Basic Income proposals are bad policy.<\/p>\n","protected":false},"author":1,"featured_media":389543,"comment_status":"open","ping_status":"closed","sticky":false,"template":"","format":"standard","meta":{"hide-more-from-author":false,"disable-player":false,"disable-wfb-100-badge":false,"disable-wfb-100-archive-widget":false,"disable-wfb-100-legacy-widget":false,"hide_top_stories":false,"headline_variations":[],"coral_asset_id":"5f82e39e-46d5-436a-a5b9-206b16d8a459","_cr_original_post":"","_cr_replace_post_id":"","_cr_replacing_post_id":"","_links_to":"","_links_to_type":0,"original-print-title":"","hide-nrplus":"","social":{"tweet":"In spite of their current vogue, Universal Basic Income proposals are bad policy."},"footnotes":""},"categories":[5911],"tags":[3921],"section":[615],"coauthors":[3424],"class_list":["post-389542","post","type-post","status-publish","format-standard","has-post-thumbnail","hentry","category-economy-business","tag-welfare","section-article"],"share_buttons":{"facebook":{"title":"Share 04\/microlooting-the-lefts-latest-language-deception\/","title":"\u2018Microlooting\u2019: The Left\u2019s Latest Language Deception","author":"Christian Schneider","section":"articles","premium":true,"capital_matters":false},{"image_url":"https:\/\/i0.wp.com\/www.nationalreview.com\/wp-content\/uploads\/2026\/05\/energy.jpg?fit=789%2C460&ssl=1","url":"https:\/\/www.nationalreview.com\/2026\/05\/the-u-s-energy-triumph\/","title":"The U.S. Energy Triumph","author":"Rich Lowry","section":"articles","premium":true,"capital_matters":false}]},"headers":{"Surrogate-Key":"rest-post-collection rest-post-1954016 rest-post-1954823 rest-post-1955409 rest-post-1955519 rest-post-1955500 rest-post-1955408 rest-post-1954512 rest-post-1953988 rest-post-1953541 rest-blog-post-collection rest-post-1955377 rest-post-389252 rest-post-1954037 rest-post-1954474 rest-post-1954449 rest-post-1955521 rest-post-1822583 rest-post-1835719 rest-post-1797664 rest-post-389542","Cache-Control":"max-age=1800"}},"\/wp\/v2\/posts?cap-author=oren-cass&per_page=3":{"body":[{"id":1453489,"date":"2023-03-01T06:30:44","date_gmt":"2023-03-01T11:30:44","guid":{"rendered":"https:\/\/www.nationalreview.com\/?p=1453489"},"modified":"2023-03-01T11:40:14","modified_gmt":"2023-03-01T16:40:14","slug":"the-corporation-needs-a-new-story","status":"publish","type":"post","link":"https:\/\/www.nationalreview.com\/2023\/03\/the-corporation-needs-a-new-story\/","title":{"rendered":"The Corporation Needs a New Story"},"content":{"rendered":"<p><span class=\"drop\">T<\/span><span class=\"small_caps\">he<\/span> most popular explanations for the unraveling relationship between conservatives and big business are political. Global corporations no longer recognize themselves as American or care about advancing the national interest. Executives oppose Donald Trump and donate to Democrats, while Republicans find their ranks filled increasingly by the working class. Capital has gone \u201cwoke,\u201d advancing socially progressive causes at all costs.<\/p>\n<p>All that likely plays a role. But beneath the political, and driving it, is a justified, if poorly articulated, panic among conservatives about a serious tear in the fabric of capitalism. Corporations no longer have owners.<\/p>\n<p>Conservative respect for corporate decision-making assumes the existence of shareholders whose interests and incentives are decipherable, whose rights to control their property deserve deference, and whose pursuit of their self-interest is expected to produce results also in the public interest. In his <a href=\"https:\/\/www.nytimes.com\/1970\/09\/13\/archives\/a-friedman-doctrine-the-social-responsibility-of-business-is-to.html\" target=\"_blank\" rel=\"noopener\">canonical 1970 essay<\/a>, \u201cThe Social Responsibility Of Business Is to Increase Its Profits,\u201d Milton Friedman explained: \u201cIn a free-enterprise, private-property system, a corporate executive is an employee of the owners of the business. He has direct responsibility to his employers. That responsibility is to conduct the business in accordance with their desires, which generally will be to make as much money as possible.\u201d<\/p>\n<p>When Friedman wrote in 1970, 75 percent of <a href=\"https:\/\/www.taxpolicycenter.org\/taxvox\/who-owns-us-stock-foreigners-and-rich-americans\" target=\"_blank\" rel=\"noopener\">U.S. corporate stock<\/a> was held in the taxable accounts of American investors. Today, only 25 percent is still held the old-fashioned way; foreign ownership has risen from 5 percent to 40 percent, often by sovereign wealth funds, and the balance sits in a wide variety of pension systems, retirement accounts, and nonprofit endowments. Those accounts tend not to hold actual shares in actual firms. Their assets are often passive investments in <a href=\"https:\/\/www.ft.com\/content\/27b5e047-5080-4ebb-b02a-0bf4a3b9bc08\" target=\"_blank\" rel=\"noopener\">mutual funds and ETFs<\/a> or, for the largest investors, stakes in hedge funds that themselves hold equities, even if just for a few milliseconds. For many small investors, 401(k) retirement accounts offer only passive options.<\/p>\n<p>Who owns Apple, and who hired\u00a0Tim\u00a0Cook\u00a0as CEO? Vanguard is the company\u2019s\u00a0<a href=\"https:\/\/finance.yahoo.com\/quote\/AAPL\/holders\/\" target=\"_blank\" rel=\"noopener\">largest<\/a> institutional \u201cholder,\u201d but that is not an owner. The investors on whose behalf Vanguard holds shares may be owners, but they often don\u2019t know it and they certainly don\u2019t act like it. Say Vanguard holds shares for a teacher pension fund. Is that fund an owner, or are the teachers, or are the taxpayers, who must meet their commitments to teachers regardless of the fund\u2019s value?<\/p>\n<p>In short, Apple does not have owners, as Friedman meant the term. Or, put more broadly and precisely, the &#8220;ownership&#8221; of public companies today does not mean what ownership in a company typically once meant. The financial plumbing ensures that Apple\u2019s dividends eventually reach accounts in proportion to the shares held in those accounts, but that represents little of the return from owning Apple stock. Conversely, few who own Apple stock have ever conveyed their desires to their \u201cagent,\u201d Cook. Apple stock lives on a secondary market where traders pass it around in circles, creating paper gains dumped quickly into shares of other companies.<\/p>\n<p>So when Apple chooses to lobby Texas on transgender issues, or to help China suppress protests, on whose behalf is it acting? The executives debating these questions don\u2019t know or care what the legal owners think. They are focused on their own politics, their reputations within the firm, and the likely response by prominent figures in media and the culture. Without owners, corporations cease to be an arena for private action and become just another front in political and cultural battles, on ground tailor-made for progressive victories.<\/p>\n<p>Under these conditions, conservatives have neither a political nor a philosophical reason to respect and defend corporate prerogatives. The problem with the ESG fad is only partly that the ESG goals are bad for business and bad for America. It is mostly that the exercise is not corporate governance at all, but rather public policy-making by other means, lacking any democratic legitimacy.<\/p>\n<p>Capitalism needs owners. We must find a new story to tell about what corporations are, who controls them, and for whose benefit they are run.<\/p>\n<p>A good place to start might be more formally separating the concepts of operational control and financial benefit. This already occurs with many financial instruments: A bond, for instance, entitles its holder to cash flows from a firm, but not to any ongoing say in how the firm operates (other than in certain extreme cases). Some firms issue multiple classes of shares, allowing founders to remain in charge even as they sell off equity to raise cash. No laws of nature require that the investors holding claims to future profits also be the same people setting corporate policy or selecting the CEO.<\/p>\n<p>If policy-makers move beyond that conceit, a range of reforms becomes possible. In one direction, certain classes of shareholders could be disqualified from exercising control. Passive asset managers, state pension funds, foreigners &#8212; all could make investments and earn returns without being given a say in how a corporation acts. Lest one think this incompatible with capitalism\u2019s unique capacity to generate innovation, consider that OpenAI (creator of the &#8220;ChatGPT&#8221; artificial-intelligence bot) is controlled by a nonprofit board.<\/p>\n<p>Others not holding a traditional financial stake could be given a seat at the table. Founders could retain a role in perpetuity. Models of \u201cco-determination\u201d popular in some European countries grant workers a substantial role in governance, not because they own shares, but because they have at least as great a stake in the firm\u2019s success. The community in which a firm operates might likewise deserve consideration.<\/p>\n<p>Broadly speaking, the founders and owners of closely held, private corporations continue to behave in the way a well-functioning system of capitalism expects and needs them to. But for widely held, public corporations, the set of actors legally entitled to exercise control bears little resemblance to the set that anyone would choose to put in charge for the sake of either economic growth or the common good. Fortunately, policy-makers do have a choice.<\/p>\n","protected":false},"excerpt":{"rendered":"<p>Corporations don&#8217;t have owners in the same way they used to.<\/p>\n","protected":false},"author":158,"featured_media":1454019,"comment_status":"open","ping_status":"closed","sticky":false,"template":"","format":"standard","meta":{"hide-more-from-author":false,"disable-player":false,"disable-wfb-100-badge":false,"disable-wfb-100-archive-widget":false,"disable-wfb-100-legacy-widget":false,"hide_top_stories":false,"headline_variations":[],"coral_asset_id":"7f9f22b1-b8ce-40c3-a467-d55a6d38b194","_cr_original_post":"","_cr_replace_post_id":"","_cr_replacing_post_id":"","_links_to":"","_links_to_type":0,"original-print-title":"","hide-nrplus":"1","social":{"tweet":"","share-chart":false},"footnotes":""},"categories":[7655,7523,5911],"tags":[3949,7666,7661,7693,7683,7660,7109,7658,5376],"section":[615],"coauthors":[3424],"class_list":["post-1453489","post","type-post","status-publish","format-standard","has-post-thumbnail","hentry","category-business","category-capital-matters","category-economy-business","tag-apple","tag-corporate-law","tag-esg","tag-investing","tag-investment","tag-milton-friedman","tag-nrplus-member-articles","tag-socially-responsible-investing","tag-stock-market","section-article"],"share_buttons":{"facebook":{"title":"Share on Facebook","h and driving it, is a justified, if poorly articulated, panic among conservatives about a serious tear in the fabric of capitalism. Corporations no longer have owners.<\/p>\n<p>Conservative respect for corporate decision-making assumes <a href=\"https:\/\/www.nytimes.com\/1970\/09\/13\/archives\/a-friedman-doctrine-the-social-responsibility-of-business-is-to.html\" target=\"_blank\" rel=\"noopener\"><\/a> ...<\/p>\n","right_rail_widget":{"widget_type":"","slideshow_widget_title":"","slideshow_widget_post":null,"slideshow_widget_post_title":"","slideshow_widget_categories_exclude":[6068]},"amp_enabled":true,"_links":{"self":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1453489","targetHints":{"allow":["GET"]}}],"collection":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts"}],"about":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/types\/post"}],"author":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/users\/158"}],"replies":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/comments?post=1453489"}],"version-history":[{"count":5,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1453489\/revisions"}],"predecessor-version":[{"id":1454263,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1453489\/revisions\/1454263"}],"wp:featuredmedia":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/media\/1454019"}],"wp:attachment":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/media?parent=1453489"}],"wp:term":[{"taxonomy":"category","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/categories?post=1453489"},{"taxonomy":"post_tag","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/tags?post=1453489"},{"taxonomy":"section","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/section?post=1453489"},{"taxonomy":"author","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/coauthors?post=1453489"}],"curies":[{"name":"wp","href":"https:\/\/api.w.org\/{rel}","templated":true}]}},{"id":1107626,"date":"2022-03-16T15:37:08","date_gmt":"2022-03-16T19:37:08","guid":{"rendered":"https:\/\/www.nationalreview.com\/?p=1107626"},"modified":"2022-03-16T15:37:08","modified_gmt":"2022-03-16T19:37:08","slug":"the-conservative-confusion-on-globalization","status":"publish","type":"post","link":"https:\/\/www.nationalreview.com\/2022\/03\/the-conservative-confusion-on-globalization\/","title":{"rendered":"The Conservative Confusion on Globalization"},"content":{"rendered":"<p><span class=\"drop\">G<\/span><span class=\"small_caps\">radually<\/span>, conservatives are recognizing the enormity of their error in embracing a strategy of\u00a0<a href=\"https:\/\/www.nationalreview.com\/tag\/trade\/\" target=\"_blank\" rel=\"noopener\">free trade<\/a> and globalization after the Cold War\u2019s end. The theory held that trade would help to spread liberal democracy around the world, creating an ever-larger free market to fuel rising prosperity. \u201cNo nation on Earth has discovered a way to import the world\u2019s goods and\u00a0services\u00a0while stopping foreign ideas at the border,\u201d\u00a0<a href=\"https:\/\/www.presidency.ucsb.edu\/documents\/remarks-the-yale-university-commencement-ceremony-new-haven-connecticut\" target=\"_blank\" rel=\"noopener\">exuded<\/a>\u00a0President George H. W. Bush at a Yale University commencement ceremony in 1991. \u201cWhat some call globalization is in fact the triumph of human liberty across national borders,\u201d\u00a0<a href=\"https:\/\/georgewbush-whitehouse.archives.gov\/news\/releases\/2001\/07\/text\/20010721.html\" target=\"_blank\" rel=\"noopener\">said<\/a>\u00a0his son a decade later.<\/p>\n<p>In practice, though, globalization has meant subverting America\u2019s relatively free market for the sake of integration with other markets abroad. A \u201cfree-trade agreement\u201d is not the removal of government interference but rather the intensively lobbied creation of endless new legal requirements. \u201cNormal trade relations\u201d with China means that what is \u201cnormal\u201d in China becomes \u201cnormal\u201d for American businesses as well: investments dictated by the economic distortions and political pressure of an authoritarian, communist regime. But the only way to keep the distortions of foreign markets out of the domestic one is to write even more rules.<\/p>\n<p>Writing earlier this week in\u00a0<span class=\"small_caps\">National Review<\/span>,\u00a0<a href=\"https:\/\/www.nationalreview.com\/2022\/03\/oren-casss-bounded-market-already-exists\/\" target=\"_blank\" rel=\"noopener\">Dominic Pino found himself caught<\/a>\u00a0between this particular rock and hard place. On one hand, he acknowledges that \u201cborders are meaningful and important, and arch-globalists who want to erase them are misguided.\u201d On the other hand, he worries that \u201cthe moment you give the government power to set a boundary in the market is the same moment that interest groups you hadn\u2019t even heard of before will be lining up to tell you where to draw it.\u201d What to do?<\/p>\n<p>Pino has no idea. In his defense, neither do most people who have spent recent decades reciting the conservative priesthood\u2019s various incantations, only to discover them irrelevant to the real world and its problems. Pino has the compulsory reference to the number of chapters and pages in a particular government regulation and the head-scratching example of different regulatory treatment for two similar products. He demonstrates mastery of the public-choice lament that \u201celected politicians chasing votes and campaign donations are going to listen to\u201d interest groups in formulating public policy. He concludes with the suggestion to \u201cmak[e] the government a little less powerful.\u201d<\/p>\n<p>But what would that mean in practice? Who would decide how to reform government policy, besides the elected politicians chasing votes and campaign donations? And how would we preserve the character of our free market without legal mechanisms to counteract the subsidies and barriers introduced by other nations? Globalization sounds simple enough on a bumper sticker; making it work is another matter altogether.<\/p>\n<p>Conservatives struggle to answer questions like these because the economic orthodoxy that passes for \u201cconservative\u201d in America misunderstands its own authorities. Adam Smith and David Ricardo proved that expanding trade is always a good idea, the story goes, and so policy-makers need only to follow that commandment. This is not true. As I explain in\u00a0<a href=\"https:\/\/americancompass.org\/essays\/searching-for-capitalism-in-the-wreckage-of-globalization\/\" target=\"_blank\" rel=\"noopener\">the essay<\/a>\u00a0to which Pino was responding, Smith and Ricardo wrote about one very specific kind of trade \u2014 the direct exchange of goods for goods \u2014 and assumed this would occur in a world where capital remained within national boundaries. Their insights do not apply to the modern global economy that developed over the subsequent 200 years, and blindly applying them has led to much\u00a0<a href=\"https:\/\/americancompass.org\/uniparty-game\/\" target=\"_blank\" rel=\"noopener\">confusion<\/a>\u00a0and a good bit of\u00a0<a href=\"https:\/\/americancompass.org\/wheres-the-growth\/\" target=\"_blank\" rel=\"noopener\">disaster<\/a>.<\/p>\n<p>Rather than brandish bromides, conservatives have an opportunity to apply their principles to the problems that globalization has presented. We recognize the necessity of sovereign nation-states and the folly of one-world utopianism. We doubt that bureaucrats can craft a sufficiently nuanced set of rules to manage the integration of markets with disparate legal regimes and economic conditions. We are prepared to make trade-offs, rather than search in vain for the nonexistent solution that achieves every goal.<\/p>\n<p>Those principles should lead us to choose our own free market over free international trade. We should impose the boundaries necessary to preserve a well-functioning capitalist system that maintains its own unique character and its balance in interactions with the rest of the world. In accomplishing this, we should choose the\u00a0<em>type<\/em>\u00a0of boundary that is least vulnerable to government dysfunction: clear, simple, universally applicable rules that set the parameters within which free-market competition can flourish \u2014 for instance, a\u00a0<a href=\"https:\/\/www.economist.com\/by-invitation\/2021\/10\/05\/robert-lighthizer-on-the-need-for-tariffs-to-reduce-americas-trade-deficit\" target=\"_blank\" rel=\"noopener\">global tariff<\/a>, a\u00a0<a href=\"https:\/\/prosperousamerica.org\/why_the_market_access_charge_is_necessary_to_fix_trade_imbalances\/\" target=\"_blank\" rel=\"noopener\">market-access charge<\/a>, or tradeable\u00a0<a href=\"https:\/\/www.berkshirehathaway.com\/letters\/growing.pdf\" target=\"_blank\" rel=\"noopener\">import credits<\/a>.<\/p>\n<p>In debating the merits of these versus other approaches, we must remember that they will all have to run through the same democratically elected politicians and their self-interested constituencies. So we can hardly reject an approach on that basis. The question is not\u00a0<em>will<\/em>\u00a0we manage our economy\u2019s interaction with the global market, but\u00a0<em>how<\/em>. No invisible hand is coming to wave our problems away.<\/p>\n","protected":false},"excerpt":{"rendered":"<p>The question is not <i>will<\/i> we manage our economy\u2019s interaction with the global market, but <i>how<\/i>.<\/p>\n","protected":false},"author":100,"featured_media":1057812,"comment_status":"open","ping_status":"closed","sticky":false,"template":"","format":"standard","meta":{"hide-mor t_tag","meta":{"blog-section":false,"section-blog-ads":[]}},"subtitle":"The question is not <i>will<\/i> we manage our economy\u2019s interaction with the global market, but <i>how<\/i>.","is_capital_matters":true,"is_wfb_100":false,"is_magazine_article":false,"is_premium_content":true,"table_of_contents":null,"truncated_content":"<p><span class=\"drop\">G<\/span><span class=\"small_caps\">radually<\/span>, conservatives are recognizing the enormity of their error in embracing a strategy of\u00a0<a href=\"https:\/\/www.nationalreview.com\/tag\/trade\/\" target=\"_blank\" rel=\"noopener\">free trade<\/a> and globalization after the Cold War\u2019s end. The theory held that trade would help to spread liberal democracy around the world, creating an ever-larger free market to fuel rising prosperity. \u201cNo nation on Earth has discovered a way to import the world\u2019s goods and\u00a0services\u00a0while stopping foreign ideas at the border,\u201d\u00a0<a href=\"https:\/\/www.presidency.ucsb.edu\/documents\/remarks-the-yale-university-commencement-ceremony-new-haven-connecticut\" target=\"_blank\" rel=\"noopener\">exuded<\/a>\u00a0President George H. W. Bush at a Yale University commencement ceremony in 1991. \u201cWhat some call globalization is in fact the triumph of human liberty across national borders,\u201d\u00a0<a href=\"https:\/\/georgewbush-whitehouse.archives.gov\/news\/releases\/2001\/07\/text\/20010721.html\" target=\"_blank\" rel=\"noopener\">said<\/a>\u00a0his son a decade later.<\/p>\n<p>In practice, though, globalization has <span class=\"small_caps\"><\/span> ...<\/p>\n","right_rail_widget":{"widget_type":"","slideshow_widget_title":"","slideshow_widget_post":null,"slideshow_widget_post_title":"","slideshow_widget_categories_exclude":[6068]},"amp_enabled":true,"_links":{"self":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1107626","targetHints":{"allow":["GET"]}}],"collection":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts"}],"about":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/types\/post"}],"author":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/users\/100"}],"replies":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/comments?post=1107626"}],"version-history":[{"count":5,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1107626\/revisions"}],"predecessor-version":[{"id":1107660,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/posts\/1107626\/revisions\/1107660"}],"wp:featuredmedia":[{"embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/media\/1057812"}],"wp:attachment":[{"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/media?parent=1107626"}],"wp:term":[{"taxonomy":"category","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/categories?post=1107626"},{"taxonomy":"post_tag","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/tags?post=1107626"},{"taxonomy":"section","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/section?post=1107626"},{"taxonomy":"author","embeddable":true,"href":"https:\/\/www.nationalreview.com\/wp-json\/wp\/v2\/coauthors?post=1107626"}],"curies":[{"name":"wp","href":"https:\/\/api.w.org\/{rel}","templated":true}]}},{"id":923981,"date":"2021-04-15T12:50:20","date_gmt":"2021-04-15T16:50:20","guid":{"rendered":"https:\/\/www.nationalreview.com\/?p=923981"},"modified":"2021-04-15T14:55:38","modified_gmt":"2021-04-15T18:55:38","slug":"americas-microchip-slip","status":"publish","type":"post","link":"https:\/\/www.nationalreview.com\/magazine\/2021\/05\/03\/americas-microchip-slip\/","title":{"rendered":"America\u2019s Microchip Slip"},"content":{"rendered":"<p><span style=\"font-weight: 400;\"><span class=\"drop\">E<\/span><span class=\"small_caps\">ngineers<\/span> at American innovation hubs such as Bell Labs, IBM, Texas Instruments, and Fairchild Semiconductor led the development of the transistor and the integrated circuit in the middle of the last century. Robert Noyce, credited with first deploying such a circuit on a silicon chip, went on to co-found Intel with Gordon Moore, whose famous \u201cMoore\u2019s Law\u201d predicted the doubling of transistors on a chip every two years. The United States dominated the market for semiconductors, particularly at the high end, with Intel controlling 90 percent of the market for PC microprocessors in 1997. \u201cIntel sets release dates for new chips,\u201d wrote <\/span><i><span style=\"font-weight: 400;\">Time<\/span><\/i><span style=\"font-weight: 400;\"> magazine that year, \u201cdictating the pace of the computer industry with the confident aplomb of fashion designers raising or lowering hemlines.\u201d<\/span><\/p>\n<p><span style=\"font-weight: 400;\">While semiconductors have become ever more important to modern civilization, providing the brains for not only computers but also phones, cars, and missiles, Intel no longer sets the standard. That distinction belongs to the Taiwan Semiconductor Manufacturing Company (TSMC), which manufactures chips with transistors just five nanometers (nm) wide. Intel remains mired two generations behind, at 10nm, and won\u2019t achieve 7nm until 2023 at the earliest &#8212; by which time TSMC will likely be at 3nm. Globally, the U.S. share of semiconductor manufacturing has fallen by two-thirds since 1990, to 13 percent, and is still falling.\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">The decline of America\u2019s semiconductor industry is in many ways the story of the nation\u2019s major economic missteps in recent decades, as economists misunderstood the dynamics of globalization, policy-makers ignored the importance of technological leadership, and business leaders chose shareholder payouts over investment. Michael Boskin, chairman of George H. W. Bush\u2019s Council of Economic Advisers, famously quipped, \u201cPotato chips, computer chips, what\u2019s the difference?\u201d Quite a lot, it turns out.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">Fortunately, the industry also illustrates the potential for, and pathway toward, redemption. It faced and overcame a similar challenge in the 1980s, thanks to assertive Reagan-administration trade policy, robust private-sector investment, and an innovative public\u2013private partnership. Last year, a good bit of Trump-administration arm-twisting led TSMC to announce a $12 billion investment in a new Arizona foundry. The National Defense Authorization Act for 2020 established a public-policy framework to provide the industry with support.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">This year, Intel has rejected pressure from an activist hedge fund to consider the abandonment of manufacturing altogether and instead committed $20 billion to strengthening its position. Amid renewed Chinese rumblings in the Taiwan Strait and a global chip shortage, the bipartisan National Security Commission on Artificial Intelligence called in March for a major public investment in \u201crebuilding domestic chip manufacturing\u201d and \u201ca strategy to stay at least two generations ahead of China.\u201d The topic is ripe for bipartisan cooperation, and success could lay the groundwork for other efforts to ensure that America regains its role as global leader in industry and innovation.<\/span><\/p>\n<p><span style=\"font-weight: 400;\"><span class=\"drop\">T<\/span><span class=\"small_caps\">he<\/span> semiconductor industry includes \u201cfabless\u201d companies, which design chips, creating blueprints for the vast arrays of transistors whose embedded logic makes the digital world work; \u201cfoundries,\u201d which operate the massive fabrication plants etching those blueprints into silicon; and integrated device manufacturers, which do both. Under the logic of comparative advantage, often cited by economists to explain how all countries can benefit from international trade by specializing where they are relatively better suited, one might expect America to be a global leader in both highly sophisticated parts of the supply chain. Yes, it might make sense for lower-cost Chinese labor to make T-shirts for Americans, but presumably it would be Americans using state-of-the-art technology to put microscopic transistors on chips for the Chinese. Thus the \u201ctrade\u201d in \u201cinternational trade.\u201d<\/span><\/p>\n<p><span style=\"font-weight: 400;\">This is not how things have worked out. Beginning in the 1990s, South Korea, Taiwan, and China embarked on aggressive programs to create their own comparative advantage and win global leadership in the manufacturing process, offering generous subsidies for foundries to set up shop. Today, an advanced foundry costs 30 to 60 percent more to build in the United States than in Taiwan, Korea, or China, but not because of cheaper labor or better technology. In each case, the vast majority of that difference is explained by government support. China, pursuing its stated policy of becoming a global leader in all segments of the industry, provides land grants, cash grants, tax credits, below-market loans, and direct equity investments &#8212; with larger subsidies available to firms that agree to share their technology with local partners.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">American firms have clamored to accept the offer. Domestic U.S. manufacturing capacity grew only half as fast as global capacity from 1990 to 2010, causing market share to fall from 37 percent to 13 percent. What began as losses in less sophisticated segments of the market ultimately became failures at the leading edge, as Asian firms gained experience and expertise. Intel competitor Advanced Micro Devices (AMD) abandoned its foundries in 2008 and now relies on TSMC for all its advanced chips. Though Apple used Intel chips in its laptops, it turned to TSMC and Samsung for the iPhone. As Intel struggled to move from 14nm to 10nm chips in the late 2010s, TSMC passed it and then lapped it again, marking the first time in five decades that Intel was beaten to market. In 2017, Samsung passed Intel to become the world\u2019s largest chipmaker. TSMC\u2019s stock price has increased fivefold in the past five years, and its market capitalization now doubles Intel\u2019s.\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">Although Intel has excelled in shareholder payouts, TSMC passed it for the first time in capital expenditures in 2015 and has outspent it since. Its technological prowess slipping, Intel continued to step up its share buybacks and dividends each year, returning more than $70 billion to shareholders over the past five years &#8212; twice TSMC\u2019s level. In 2018, following the abrupt resignation of CEO Brian Krzanich, Intel turned to its CFO to fill the top spot and expanded its buybacks further.<\/span><\/p>\n<p><span style=\"font-weight: 400;\"><span class=\"drop\">T<\/span><span class=\"small_caps\">hanks<\/span> to their leadership in design, American firms still account for nearly half of the chip industry\u2019s sales. But this is an industry in which manufacturing matters. Whereas the sneaker industry has only 4 percent of its value-add tied to manufacturing, in semiconductors the figure is 45 percent. With little manufacturing, the American share of the industry\u2019s total value-add has fallen below 25 percent, while China\u2019s share now exceeds 30 percent.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">Beyond missed opportunity, the loss of manufacturing leadership is likely over time to erase design leadership, too. The engineering challenges in chip production are closely intertwined with the design process, and where the former goes, the latter will follow. Andy Grove, the longtime Intel CEO who succeeded Noyce and Moore, warned of this progression in 2010:\u00a0<\/span><\/p>\n<blockquote><p><span style=\"font-weight: 400;\">Each company, ruggedly individualistic, does its best to expand efficiently and improve its own profitability. However, our pursuit of our individual businesses, which often involves transferring manufacturing and a great deal of engineering out of the country, has hindered our ability to bring innovations to scale at home. Without scaling, we don\u2019t just lose jobs \u2013 we lose our hold on new technologies. Losing the ability to scale will ultimately damage our capacity to innovate.\u00a0<\/span><\/p><\/blockquote>\n<p><span style=\"font-weight: 400;\">Using the battery industry as an illustration, Grove observed: \u201cThe U.S. lost its lead in batteries 30 years ago when it stopped making consumer electronics devices. Whoever made batteries then gained the exposure and relationships needed to learn to supply batteries for the more demanding laptop PC market, and after that, for the even more demanding automobile market. . . . I doubt [U.S. firms] will ever catch up.\u201d He was correct. China has seven of the ten largest makers of electric-vehicle batteries, which account for 80 percent of the market; the U.S. has none.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">A similar trend appears to be under way in semiconductors, whose creators tend to develop in clusters. Silicon Valley got its name for a reason. Fairchild Semiconductor alumni in California created both Intel and AMD, whose alumni later created Nvidia. As semiconductor manufacturing has shifted to East Asia, the center of gravity for innovation has gone with it. From 1998 to 2000, American firms received 86 percent of the industry\u2019s venture-capital investment. From 2018 to 2020, that figure was 32 percent, compared with 37 percent for China.\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">The domestic industry\u2019s failures are not only economically costly but also downright dangerous in national-security terms. \u201cSemiconductors are the new oil,\u201d as a <\/span><i><span style=\"font-weight: 400;\">Fortune<\/span><\/i><span style=\"font-weight: 400;\"> headline put it in March, and America has once again allowed itself to become dependent on a vulnerable foreign source. U.S. military capabilities in areas such as cybersecurity, AI, autonomous systems, advanced imaging, and secure communications rely on the most advanced semiconductor technologies. The Pentagon works closely with civilian firms to design chips that are then manufactured abroad because of inadequate domestic capacity. For instance, the F-35 uses chips from American designer Xilinx that are made by TSMC in Taiwan.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">In 2018, Congress created the National Security Commission on Artificial Intelligence \u201cto consider the methods and means necessary to advance the development of artificial intelligence, machine learning, and associated technologies to comprehensively address the national security and defense needs of the United States.\u201d The commission\u2019s final report, issued in March, put the matter succinctly: \u201cAfter decades leading the microelectronics industry, the United States is now almost entirely reliant on foreign sources for production of the cutting-edge semiconductors that power all the AI algorithms critical for defense systems and everything else. Put simply: the U.S. supply chain for advanced chips is at risk without concerted government action.\u201d<\/span><\/p>\n<p><span style=\"font-weight: 400;\">Opponents of government action argue that the semiconductor industry\u2019s prospects are rosier. Jessica Anderson, the executive director of Heritage Action, told the <\/span><i><span style=\"font-weight: 400;\">Wall Street Journal<\/span><\/i><span style=\"font-weight: 400;\"> in March that Congress should not give federal support to a \u201cprofitable\u201d industry. In a recent report published by the Cato Institute, Scott Lincicome cited statistics on the industry\u2019s total size (large), the number of people it employs (many), the amount it spends on research and development (a lot), and the share of U.S. companies\u2019 production that still occurs domestically (less than half). He acknowledged that U.S. capabilities could no longer be considered leading-edge but minimized the extent of Intel\u2019s failures by assuring readers that it remains \u201cfinancially healthy\u201d and \u201cis looking at free cash flow of $17.5 billion\u201d this year.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">In emphasizing large numbers and plentiful cash, Lincicome avoids grappling with the downward trends and loss of leadership that should be the focus for policy-makers. For instance, he provided a reassuring quote from the industry\u2019s annual report: \u201cThe semiconductor manufacturing base in the United States remains on solid footing.\u201d But that\u2019s extracted from a more troubling sentence, which notes that, \u201cwhile the semiconductor manufacturing base in the United States remains on solid footing, capacity growth around the world has outpaced that in the United States, which in turn has steadily eroded the share of global manufacturing capacity at home.\u201d The report continues, \u201cIn 2019, all six of the new semiconductor fabs that opened globally were outside the United States, with four being built in China, which is putting significant government dollars behind these new facilities.\u201d<\/span><\/p>\n<p><span style=\"font-weight: 400;\"><span class=\"drop\">A<\/span><span class=\"small_caps\">merican<\/span> firms have made clear that they will gladly abandon their own manufacturing capabilities for the heavily subsidized and now technologically superior capacity available abroad. If regaining leadership in production is a national priority, then public policy will have to play a role in advancing it. This might take two forms: first, intervention to level a playing field distorted by foreign efforts to claim leadership, and second, collaboration to jump-start innovation and overcome technical challenges.\u00a0\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">The situation in many ways mirrors that of the late 1980s, when a U.S. semiconductor industry reeling from intense Japanese competition saw its share of global sales plunge from more than 55 percent to less than 40 percent. The Reagan administration, having pursued an agreement with Japan to halt dumping into the American market, then imposed stiff, punitive tariffs on Japanese firms when the practice continued. The federal government also partnered with top U.S. firms on the creation of Sematech, a consortium that pursued research-and-development projects whose output could be shared industry-wide. The private sector and the government each footed half of the annual $200 million budget, and firms provided top talent for six- to 30-month stints. Robert Noyce, long since retired from his role as Intel\u2019s first CEO, was drafted to head the effort.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">\u201cWith a few vocal exceptions,\u201d according to the National Academy of Sciences, \u201cSematech is widely credited within the U.S. industry with some role in stimulating a resurgence among U.S. semiconductor producers in the 1990s.\u201d New generations of chip miniaturization were achieved more quickly and at lower cost. Perhaps the ultimate endorsement came in the mid 1990s, when federal funding ended but firms saw sufficient value in the effort to step up their own contributions and continue work. American market share stopped falling and then climbed back to near its early-1980s high.<\/span><\/p>\n<p><span style=\"font-weight: 400;\">The challenge this time around is greater. America has fallen further behind, and foreign governments are supporting their producers more aggressively. \u201cAn important factor in whether Samsung moves forward\u201d with a $17 billion U.S. foundry, as reported in the <\/span><i><span style=\"font-weight: 400;\">Wall Street Journal<\/span><\/i><span style=\"font-weight: 400;\">, \u201cwill be the availability of U.S. federal government incentives to offset those offered by foreign countries.\u201d Taiwan and South Korea hold the edge in sophistication, but on the horizon sits China, already No. 1 in both total industry value-add and venture-capital investment, and champing at the bit to claim technological leadership.\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">While many consider a world of free markets and small government ideal, globalization has left American policy-makers to face the rather different attitudes of other countries, and thus to face a choice: use public policy to support domestic manufacturing, or lose it for good. They look poised to choose the former. Last year, the Senate voted 96\u20134 to incorporate an aggressive investment framework into the National Defense Authorization Act, including production incentives, research-and-development funding, and creation of the National Semiconductor Technology Center, which could play the role of a next-generation Sematech. The Biden administration\u2019s $2 trillion infrastructure package includes $50 billion of funding for such initiatives, a proposal that hopefully will garner bipartisan support as well.\u00a0<\/span><\/p>\n<p><span style=\"font-weight: 400;\">Perhaps the greatest cause for optimism is something that didn\u2019t happen. In December, activist hedge-fund manager Dan Loeb disclosed that he had taken a $1 billion stake in Intel and asked the company to consider divesting its manufacturing business &#8212; something CFO-turned-CEO Bob Swann had indicated he was considering. The move would have freed Intel\u2019s design business to use Asian foundries, perhaps boosting its short-term prospects and generating a tidy profit for Loeb. But it would have devastated America\u2019s last chance for semiconductor-manufacturing leadership. Instead, Intel replaced Swann in February with a celebrated engineer, Pat Gelsinger, who announced plans in March for a $20 billion investment to build Intel\u2019s foundry business into a direct TSMC competitor that manufactures for fabless companies as well as executing Intel\u2019s own designs. The next week, TSMC announced plans for $100 billion in new investment of its own. Game on.<\/span><\/p>\n<p><i><span style=\"font-weight: 400;\">&#8211;Mr. Cass is the executive director of American Compass, where Mr. Oyeniran is an analyst.<\/span><\/i><\/p>\n","protected":false},"excerpt":{"rendered":"<p>How to retake the lead in the great semiconductor race. <\/p>\n","protected":false},"author":124,"featured_media":923994,"comment_status":"open","ping_status":"closed","sticky":false,"template":"","format":"standard","meta":{"hide-more-from-author":false,"disable-player":false,"disable-wfb-100-badge":false,"disable-wfb-100-archive-widget":false,"disable-wfb-100-legacy-widget":false,"hide_top_stories":false,"headline_variations":[],"coral_asset_id":"e12f7785-9302-4d44-be01-86cc33ba0a18","_cr_original_post":"","_cr_replace_post_id":"","_cr_replacing_post_id":"","_links_to":"","_links_to_type":0,"original-print-title":"America\u2019s Chip Slip","hide-nrplus":"","social":{"tweet":"","share-chart":false},"footnotes":""},"categories":[5308,5876],"tags":[2442,7693,2637],"section":[615],"coauthors":[3424,8236],"class_list":["post-923981","post","type-post","status-publish","format-standard","has-post-thumbnail","hentry","category-magazine","category-science-tech","tag-china","tag-investing","tag-technology","section-article"],"share_buttons":{"facebook":{"title":"Share on Facebook","href":"https:\/\/www.facebook.com\/sharer\/sharer.php?u=https%3A%2F%2Fwww.nationalreview.com%2Fmagazine%2F2021%2F05%2F03%2Famericas-microchip-slip%2F"},"twitter":{"title":"Share on Twitter","href":"https:\/\/twitter.com\/intent\/tweet?url=https%3A%2F%2Fwww.nationalreview.com%2Fmagazine
