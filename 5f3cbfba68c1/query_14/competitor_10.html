</span><h2 data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">How Does Your Personality Type Affect Your Income?</span></h2><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">You’ve just finished giving a presentation at work, and an outspoken coworker challenges your ideas. Do you: </span></p><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1977" style="margin-left:20px; margin-bottom:0px;"><span data-dcnode-id="1978" instrument_node=""> a) Engage in a friendly debate about the merits of each argument, or</span></p><span data-dcnode-id="1976" instrument_node="">
</span><p data-dcnode-id="1974" style="margin-left:20px; margin-top:0px;"><span data-dcnode-id="1975" instrument_node=""> b) Avoid a conflict by agreeing or changing the subject?</span></p><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">The way you approach this type of situation may influence how much money you earn.</span></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1969" instrument_node="">Today’s infographic comes to us from </span><a data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.truity.com/infographic/how-does-your-personality-type-impact-your-income"><span data-dcnode-id="1968" instrument_node="">Truity</span></a><span data-dcnode-id="1966" instrument_node="">, and it outlines the potential relationship between personality type and income.</span></p><span data-dcnode-id="1964" instrument_node="">
</span><h2 data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Through the Myers-Briggs Lens</span></h2><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">The Myers-Briggs personality test serves as a robust framework for analyzing the connection between personality and income, in a way that is easily understood and familiar to many people. </span></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">The theory outlines four personality dimensions that are described using opposing traits.</span></p><span data-dcnode-id="1955" instrument_node="">
</span><ul data-dcnode-id="1933"><span data-dcnode-id="1954" instrument_node="">
</span><li data-dcnode-id="1950"><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Extraversion vs. Introversion:</span></strong><span data-dcnode-id="1951" instrument_node=""> Extroverts gain energy by interacting with others, while introverts draw energy from spending time alone.</span></li><span data-dcnode-id="1949" instrument_node="">
</span><li data-dcnode-id="1945"><strong data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Sensing vs. Intuition:</span></strong><span data-dcnode-id="1946" instrument_node=""> Sensors prefer concrete and factual information, while intuitive types use their imagination or wider patterns to interpret information.</span></li><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1940"><strong data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Thinking vs. Feeling:</span></strong><span data-dcnode-id="1941" instrument_node=""> Thinkers make rational decisions based on logic, while feelers make empathetic decisions considering the needs of others.</span></li><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1935"><strong data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Judging vs. Perceiving:</span></strong><span data-dcnode-id="1936" instrument_node=""> Judging types organize their life in a structured manner, while perceiving types are more flexible and spontaneous. </span></li><span data-dcnode-id="1934" instrument_node="">
</span></ul><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">For example, someone who aligns with extraversion, sensing, thinking, and judging would be described as an ESTJ type. </span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">The researchers surveyed over 72,000 people to measure these four personality preferences, as well as 23 unique facets of personality, income levels, and career-related data.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><h2 data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Traits With the Highest Earning Potential</span></h2><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1922" instrument_node="">Based on the above four dimensions, extroverts, sensors, thinkers, and judgers tend to be the most financially </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/six-ultra-successful-types-entrepreneurs/"><span data-dcnode-id="1921" instrument_node="">successful</span></a><span data-dcnode-id="1919" instrument_node="">. Diving into specific personality characteristics, certain traits are more closely correlated with higher income.</span><br data-dcnode-id="1918"><span data-dcnode-id="1917" instrument_node="">
</span></p><span data-dcnode-id="1915" instrument_node="">
</span><span data-dcnode-id="1914" instrument_node="">
</span><span data-dcnode-id="1913" instrument_node="">
</span><span data-dcnode-id="1906" instrument_node="">
</span><span data-dcnode-id="1904" instrument_node="">
</span><span data-dcnode-id="1902" instrument_node="">
</span><span data-dcnode-id="1901" instrument_node="">
</span><span data-dcnode-id="1900" instrument_node="">
</span><span data-dcnode-id="1893" instrument_node="">
</span><span data-dcnode-id="1891" instrument_node="">
</span><span data-dcnode-id="1890" instrument_node="">
</span><span data-dcnode-id="1883" instrument_node="">
</span><span data-dcnode-id="1881" instrument_node="">
</span><span data-dcnode-id="1880" instrument_node="">
</span><span data-dcnode-id="1873" instrument_node="">
</span><span data-dcnode-id="1871" instrument_node="">
</span><span data-dcnode-id="1870" instrument_node="">
</span><span data-dcnode-id="1863" instrument_node="">
</span><span data-dcnode-id="1861" instrument_node="">
</span><span data-dcnode-id="1859" instrument_node="">
</span><table class="tablepress tablepress-id-687" data-dcnode-id="1858" id="tablepress-687"><thead data-dcnode-id="1903"><tr class="row-1 odd" data-dcnode-id="1905"><th class="column-1" data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Personality Type</span></th><th class="column-2" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Average Income Advantage (Annual)</span></th><th class="column-3" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Trait(s) Most Correlated With Income Advantage</span></th></tr></thead><tbody class="row-hover" data-dcnode-id="1860"><tr class="row-2 even" data-dcnode-id="1892"><td class="column-1" data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Extroverts</span></td><td class="column-2" data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">$9,347</span></td><td class="column-3" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Expressive, Energetic, Prominent</span></td></tr><tr class="row-3 odd" data-dcnode-id="1882"><td class="column-1" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Sensors</span></td><td class="column-2" data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">$1,910</span></td><td class="column-3" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Conceptual</span></td></tr><tr class="row-4 even" data-dcnode-id="1872"><td class="column-1" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Thinkers</span></td><td class="column-2" data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">$8,411</span></td><td class="column-3" data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">Challenging, Objective, Rational</span></td></tr><tr class="row-5 odd" data-dcnode-id="1862"><td class="column-1" data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Judgers</span></td><td class="column-2" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">$6,903</span></td><td class="column-3" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Ambitious</span></td></tr></tbody></table><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1855"></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1853" instrument_node="">For instance, </span><strong data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">extroverts</span></strong><span data-dcnode-id="1850" instrument_node=""> are much more likely to have higher incomes if they are quick to share thoughts, have high energy, and like being in the public eye. </span><strong data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Thinkers</span></strong><span data-dcnode-id="1847" instrument_node=""> also score high on income potential, especially if they enjoy debates, make rational decisions, and moderate their emotions.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><h2 data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">The Top Earners</span></h2><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Which personality types earn the highest incomes of all? Extroverted thinking types dominate the ranks again.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><p data-dcnode-id="1836" style="margin-bottom:0px"><img alt="Myers-briggs personality highest earners" data-dcnode-id="1838" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/wp-content/uploads/2019/11/personality-income-high-earners.jpg&amp;raw"></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1831" style="text-align: right; font-size: 14px"><span data-dcnode-id="1834" instrument_node="">Source: </span><a data-dcnode-id="1832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.truity.com/sites/default/files/fillpdf/personalityandincomereport2019.pdf"><span data-dcnode-id="1833" instrument_node="">Truity</span></a></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">The one exception is INTJs, with 10% earning an annual salary of $150K or more in their peak earning years.</span></p><span data-dcnode-id="1827" instrument_node="">
</span><h2 data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Personality and the Gender Pay Gap</span></h2><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">With all these factors in mind, the researchers analyzed whether personality differences would affect the gender pay gap. </span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">When the average salaries were separated for men and women, the results were clear: men of almost all personality types earn more than the average income for the sample overall, while all but two personality types of women earned less than the average.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816" style="margin-bottom:0px"><img alt="Myers briggs personality gender pay gap" data-dcnode-id="1817" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/wp-content/uploads/2019/11/personality-income-gender-pay-gap.jpg&amp;raw"></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1811" style="text-align: right; font-size: 14px"><span data-dcnode-id="1814" instrument_node="">Source: </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.truity.com/sites/default/files/fillpdf/personalityandincomereport2019.pdf"><span data-dcnode-id="1813" instrument_node="">Truity</span></a></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1809" instrument_node="">In fact, women with high-earning personality types still earn less than men who do not possess those traits. For example, extroverted women earn about </span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">$55,000</span></strong><span data-dcnode-id="1806" instrument_node=""> annually, while introverted men earn an average of over </span><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">$64,000</span></strong><span data-dcnode-id="1803" instrument_node="">.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><h2 data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Maximizing Your Potential</span></h2><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Are the introverted personalities of the world doomed to lower salaries? Not necessarily—while personality does play a role, many other factors contribute to income levels:</span></p><span data-dcnode-id="1795" instrument_node="">
</span><ul data-dcnode-id="1778"><span data-dcnode-id="1794" instrument_node="">
</span><li data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Level of education</span></li><span data-dcnode-id="1791" instrument_node="">
</span><li data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Years of experience</span></li><span data-dcnode-id="1788" instrument_node="">
</span><li data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Local job market</span></li><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Type of industry</span></li><span data-dcnode-id="1782" instrument_node="">
</span><li data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">The particular career</span></li><span data-dcnode-id="1779" instrument_node="">
</span></ul><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Not only that, anyone can work on the two specific personality traits most aligned with higher incomes: set ambitious goals, and face conflict head-on to ensure your voice is heard.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><div class="swp-hidden-panel-wrap" data-dcnode-id="1732" style="display: none; visibility: collapse; opacity: 0"><div class="swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_custom_color swp_other_custom_color swp_individual_full_color scale-100 scale-full_width" data-dcnode-id="1733" data-float="none" data-float-color="#ffffff" data-float-mobile="none" data-min-width="1100" data-post-id="41290" data-transition="slide"><div class="nc_tweetContainer swp_share_button swp_twitter" data-dcnode-id="1766" data-network="twitter"><a class="nc_tweet swp_share_link" data-dcnode-id="1767" data-link="https://twitter.com/intent/tweet?text=How+Does+Your+Personality+Type+Affect+Your+Income%3F&amp;url=https%3A%2F%2Fwww.visualcapitalist.com%2Fmyers-briggs-personality-income%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DHow%2BDoes%2BYour%2BPersonality%2BType%2BAffect%2BYour%2BIncome%253F%26url%3Dhttps%253A%252F%252Fwww.visualcapitalist.com%252Fmyers-briggs-personality-income%252F" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="1768"><span class="iconFiller" data-dcnode-id="1769"><span class="spaceManWilly" data-dcnode-id="1770"><i class="sw swp_twitter_icon" data-dcnode-id="1773"></i><span class="swp_share" data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Tweet</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_facebook" data-dcnode-id="1758" data-network="facebook"><a class="nc_tweet swp_share_link" data-dcnode-id="1759" data-link="https://www.facebook.com/share.php?u=https%3A%2F%2Fwww.visualcapitalist.com%2Fmyers-briggs-personality-income%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fwww.visualcapitalist.com%252Fmyers-briggs-personality-income%252F" rel="nofollow noreferrer noopener" target=" </span><h2 data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">What Does it Take to be Wealthy in America? </span></h2><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">The goalposts of wealth are always shifting due to inflation and other factors. </span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">For example, someone with a net worth of $1 million several decades ago would have been considered very wealthy. According to recent survey results, however, $1 million is only enough to feel “financially comfortable” today. </span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">In this infographic, we’ve visualized several money milestones to give you a better idea of what it really takes to be wealthy in America.</span></p><span data-dcnode-id="1251" instrument_node="">

/tr><tr class="row-4 even" data-dcnode-id="1181"><td class="column-1" data-dcnode-id="1189"><span data-dcnode-id="1193" instrument_node="">What it takes to be in </span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">New York’s</span></strong><span data-dcnode-id="1190" instrument_node=""> top 1%</span></td><td class="column-2" data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Windfall</span></td><td class="column-3" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">2020</span></td><td class="column-4" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">$4.2M</span></td></tr><tr class="row-5 odd" data-dcnode-id="1166"><td class="column-1" data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">What it takes to be </span><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">wealthy</span></strong><span data-dcnode-id="1175" instrument_node=""> in America</span></td><td class="column-2" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Charles Schwab survey</span></td><td class="column-3" data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">2022</span></td><td class="column-4" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">$2.2M</span></td></tr><tr class="row-6 even" data-dcnode-id="1151"><td class="column-1" data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">What it takes to be in </span><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">the UK’s</span></strong><span data-dcnode-id="1160" instrument_node=""> top 1%</span></td><td class="column-2" data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Knight Frank</span></td><td class="column-3" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">2021</span></td><td class="column-4" data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">$1.8M</span></td></tr><tr class="row-7 odd" data-dcnode-id="1136"><td class="column-1" data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">What it takes to be </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">financially comfortable</span></strong><span data-dcnode-id="1145" instrument_node=""> in America</span></td><td class="column-2" data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Charles Schwab survey</span></td><td class="column-3" data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">2022</span></td><td class="column-4" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">$774,000</span></td></tr><tr class="row-8 even" data-dcnode-id="1121"><td class="column-1" data-dcnode-id="1129"><span data-dcnode-id="1133" instrument_node="">What it takes to be in </span><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Mississippi’s</span></strong><span data-dcnode-id="1130" instrument_node=""> top 1%</span></td><td class="column-2" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Windfall</span></td><td class="column-3" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">2020</span></td><td class="column-4" data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">$766,000</span></td></tr><tr class="row-9 odd" data-dcnode-id="1106"><td class="column-1" data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">The </span><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">average American’s</span></strong><span data-dcnode-id="1115" instrument_node=""> net worth (median)</span></td><td class="column-2" data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Federal Reserve</span></td><td class="column-3" data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">2019</span></td><td class="column-4" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">$122,000</span></td></tr></tbody></table><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1098" instrument_node="">According to Charles Schwab’s </span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.schwab.com/web/retail/public/about-schwab/schwab_modern_wealth_survey_2022_findings.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1097" instrument_node="">Modern Wealth Survey</span></a><span data-dcnode-id="1095" instrument_node="">, a net worth of $774,000 is needed to feel “financially comfortable”, while $2.2 million is needed to be considered “wealthy”. </span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Both of these milestones are far greater than the average (median) American’s wealth, which according to the Federal Reserve, was $122,000 in 2019. </span></p><span data-dcnode-id="1090" instrument_node="">
</span><h2 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Joining the One Percent</span></h2><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1086" instrument_node="">Research by Knight Frank determined that in order to be a member of America’s one percent, one would need a net worth of $4.4 million. This is very high compared to other developed countries such as </span><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Japan</span></strong><span data-dcnode-id="1083" instrument_node=""> ($1.5 million), the </span><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">UK</span></strong><span data-dcnode-id="1080" instrument_node=""> ($1.8 million), and </span><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Australia</span></strong><span data-dcnode-id="1077" instrument_node=""> ($2.8 million). </span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">The difference is partly due to America’s large population of ultra high net worth individuals, which includes the country’s 724 billionaires. See below for a list of the top five countries by number of billionaires. </span></p><span data-dcnode-id="1072" instrument_node="">

e-id="1028"><img alt="🇩🇪" class="emoji" data-dcnode-id="1030" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f1e9-1f1ea.svg&amp;raw"><span data-dcnode-id="1029" instrument_node=""> Germany</span></td><td class="column-2" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">136</span></td></tr><tr class="row-6 even" data-dcnode-id="1015"><td class="column-1" data-dcnode-id="1019"><img alt="🇷🇺" class="emoji" data-dcnode-id="1021" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f1f7-1f1fa.svg&amp;raw"><span data-dcnode-id="1020" instrument_node=""> Russia</span></td><td class="column-2" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">117</span></td></tr></tbody></table><span data-dcnode-id="1010" instrument_node="">

</span><p data-dcnode-id="1005" style="margin-top:0px; font-size:15px;"><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Source: World Population Review (As of 2021)</span></em></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Focusing again on the U.S., we can also see large discrepancies at the individual state level. Entry into California’s one percent requires a net worth of $6.8 million, which is 62% higher than the national average. </span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="1000" instrument_node="">California is famously home to many of the </span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/richest-people-in-the-world-2022/" rel="noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">world’s richest people</span></a><span data-dcnode-id="997" instrument_node="">, including Google co-founder </span><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Larry Page</span></strong><span data-dcnode-id="994" instrument_node="">, and Facebook founder </span><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Mark Zuckerberg</span></strong><span data-dcnode-id="991" instrument_node="">. </span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Being a one percenter in Mississippi, on the other hand, requires $766,000. That’s 83% lower than the national average, and just a tad lower than the amount needed to be “financially comfortable” by the average American. This is partially due to Mississippi’s poverty rate of 19.6%, which according to the U.S. Census Bureau, is the highest in the country. </span></p><span data-dcnode-id="986" instrument_node="">

</span><h2 class="mvp-post-title left" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Mapped: Personal Finance Education Requirements, by State</span></h2><span data-dcnode-id="912" instrument_node="">
</span><span class="mvp-post-excerpt left" data-dcnode-id="908"><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Only 22.7% of U.S. students are required to take a personal finance course. Which states have the highest levels of personal finance education?</span></p><span data-dcnode-id="909" instrument_node="">

</span><h2 data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">The Percentage of Students Receiving Personal Finance Education</span></h2><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">When you graduated from high school, did you know how to create a budget? Did you have an understanding of what stocks and bonds were? Did you know how to do your own taxes?</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="846" instrument_node="">For many Americans, the answer to these questions is probably a “no”. Only </span><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">22.7%</span></strong><span data-dcnode-id="843" instrument_node=""> of U.S. high school students are guaranteed to receive a personal finance education. While this is up from </span><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">16.4%</span></strong><span data-dcnode-id="840" instrument_node=""> in 2018, this still represents a small fraction of students.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">This graphic uses data from </span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ngpf.org/state-of-fin-ed-report-2021-2022/" rel="noopener" target="_blank"><span data-dcnode-id="836" instrument_node="">Next Gen Personal Finance</span></a><span data-dcnode-id="834" instrument_node=""> (NGPF) to show the percentage of high school students required to take a personal finance course by state.</span></p><span data-dcnode-id="832" instrument_node="">
</span><h2 data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">A Closer Look at State-level Personal Finance Education </span></h2><span data-dcnode-id="829" instrument_node="">

ass="row-6 even" data-dcnode-id="722"><td class="column-1" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Alabama</span></td><td class="column-2" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">99.6%</span></td></tr><tr class="row-7 odd" data-dcnode-id="715"><td class="column-1" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Utah</span></td><td class="column-2" data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">99.6%</span></td></tr><tr class="row-8 even" data-dcnode-id="708"><td class="column-1" data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Iowa</span></td><td class="column-2" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">91.3%</span></td></tr><tr class="row-9 odd" data-dcnode-id="701"><td class="column-1" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">North Carolina</span></td><td class="column-2" data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">89.2%</span></td></tr><tr class="row-10 even" data-dcnode-id="694"><td class="column-1" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Oklahoma</span></td><td class="column-2" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">47.1%</span></td></tr><tr class="row-11 odd" data-dcnode-id="687"><td class="column-1" data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">New Jersey</span></td><td class="column-2" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">43.0%</span></td></tr></tbody></table><div aria-live="polite" class="dataTables_info" data-dcnode-id="682" id="tablepress-2318_info" role="status"><span data-dcnode-id="683" instrument_node="">Showing 1 to 10 of 51 entries</span></div><div class="dataTables_paginate paging_simple" data-dcnode-id="677" id="tablepress-2318_paginate"><a aria-controls="tablepress-2318" class="paginate_button previous disabled" data-dcnode-id="680" data-dt-idx="0" id="tablepress-2318_previous" tabindex="-1"><span data-dcnode-id="681" instrument_node="">Previous</span></a><a aria-controls="tablepress-2318" class="paginate_button next" data-dcnode-id="678" data-dt-idx="1" id="tablepress-2318_next" tabindex="0"><span data-dcnode-id="679" instrument_node="">Next</span></a></div></div><span data-dcnode-id="675" instrument_node="">
</span><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Eight states currently have state-wide requirements for a personal finance course: Alabama, Mississippi, Missouri, Iowa, North Carolina, Tennessee, Utah, and Virginia. Naturally, the level of personal finance education is highest in these states.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">Five states have begun the process of implementing a requirement, with Florida being the most populous state yet to guarantee personal finance education for high schoolers. The state previously required schools to offer a personal finance course as an elective, but only </span><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">5%</span></strong><span data-dcnode-id="666" instrument_node=""> of students took the course.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">Outside of the guarantee states, only </span><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">9.3%</span></strong><span data-dcnode-id="660" instrument_node=""> of students are required to take a personal finance course. That number drops to 5% for schools that have a high percentage of Black or Brown students, while students eligible for a free or reduced lunch program (i.e. lower income students) also hover at the 5% number.</span></p><span data-dcnode-id="658" instrument_node="">
</span><h2 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Why is Personal Financial Education Important?</span></h2><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">The majority of Americans believe parents are responsible for teaching their children about personal finance. However, nearly a third of parents say they </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2022/04/06/americans-think-parents-should-teach-kids-about-money-yet-many-dont.html" rel="noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">never talk to their children</span></a><span data-dcnode-id="651" instrument_node=""> about finances. Personal finance education at school is one way to help fill that gap.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">People who have received a financial education tend to have a higher level of financial literacy. In turn, this can lead to people being less likely to face financial difficulties.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><img alt="Chart showing that people with low financial literacy are more likely to face financial difficulties, such as being unable to cover an unexpected $2,000 expense, compared to people with high financial literacy" data-dcnode-id="645" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/wp-content/uploads/2022/05/Financial-Well-Being-According-to-Financial-Literacy-Levels.jpg&amp;raw"></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="642" instrument_node="">People with low levels of financial literacy were </span><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">five times</span></strong><span data-dcnode-id="639" instrument_node=""> more likely to be unable to cover one month of living expenses, when compared to people with high financial literacy. Separate research has found that implementing a state mandate for personal finance education led to </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2022/04/01/why-financial-literacy-is-so-important.html" rel="noopener" target="_blank"><span data-dcnode-id="638" instrument_node="">improved credit scores and reduced delinquency rates</span></a><span data-dcnode-id="636" instrument_node="">.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">Not only that, financial education can play a key role in building wealth. One survey found that only </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ramseysolutions.com/retirement/the-national-study-of-millionaires-research" rel="noopener" target="_blank"><span data-dcnode-id="632" instrument_node="">one-third of millionaires</span></a><span data-dcnode-id="630" instrument_node=""> averaged a six-figure income over the course of their career. Instead of relying on high salaries, the success of most millionaires came from employing basic personal finance principles: investing early and consistently, avoiding credit card debt, and spending carefully using tools like budgets and coupons.</span></p><span data-dcnode-id="628" instrument_node="">
</span><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Expanding Access to Financial Education</span></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="624" instrument_node="">Once the in-progress state requirements have been fully implemented, </span><strong data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">more than a third</span></strong><span data-dcnode-id="621" instrument_node=""> of U.S. high school students will have guaranteed access to a personal finance course. Momentum is expanding beyond guarantee states, too. There are 48 personal finance bills pending in 18 states according to NGPF’s </span><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/document/d/1tWjd8LCMl0AJT2AmE3leIDqQ-x46z5luvQ09wImV2eQ/edit" rel="noopener" target="_blank"><span data-dcnode-id="620" instrument_node="">financial education bill tracker</span></a><span data-dcnode-id="618" instrument_node="">. </span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">Importantly, </span><strong data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">88%</span></strong><span data-dcnode-id="612" instrument_node=""> of surveyed adults support personal finance education mandates—and most wish they had also been required to take a personal finance course themselves. </span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">When we ask the next generation of graduates if they understand how to build a budget, it’s more likely that they will confidently say “yes”.</span></p><span data-dcnode-id="607" instrument_node="">
