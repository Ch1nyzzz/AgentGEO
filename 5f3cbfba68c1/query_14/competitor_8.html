                                    von Braun, 1994).
                            </span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">
                                Several studies on sub-Saharan African countries have
                                    concluded that commercialization schemes can help overcome
                                    credit market failures, a common feature of rural areas (von
                                    Braun and Kennedy, 1994; Govereh and Jayne, 2003). In addition,
                                    the introduction of cash crops to a region may stimulate private
                                    investment in distribution, retail, market infrastructure and
                                    human capital, which ultimately also beneﬁts food-crop
                                    production and other farm activities. Where farmers have timely
                                    access to credit and inputs, and to extension services and
                                    equipment, they are able not only to boost their incomes, but
                                    also to intensify food production on their lands. Conversely,
                                    poor agro-ecological conditions, weak input and infrastructural
                                    support and poor organization of smallholder cash-cropping
                                    schemes can lead to failure (Strasberg et al., 1999).
                            </span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">
                                In terms of the employment effects, net job creation is more
                                    likely to occur if biofuel feedstock production does not
                                    displace other agricultural activities or if the displaced
                                    activities are less labour-intensive. The outcome will vary,
                                    depending on a country’s endowments in land and labour, on the
                                    crop used as feedstock and on the crops that were grown
                                    previously. Even within a single country and for one individual
                                    crop, labour intensity can vary substantially; in Brazil, for
                                    example, sugar-cane production uses three times as much labour
                                    in the northeast as it does in the centre-south (Kojima and
                                    Johnson, 2005)
                            </span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">
                                Research by von Braun and Kennedy (1994) found that the
                                    employment effects of commercial crops for poor households were
                                    generally signiﬁcant. In Brazil, the biofuel sector accounted
                                    for about 1 million jobs in 2001 (Moreira, 2006). These jobs
                                    were in rural areas and mostly for unskilled labour. The
                                    indirect creation of employment in manufacturing and other
                                    sectors was estimated at about another 300 000 jobs.
                            </span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1463" instrument_node="">
</span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Promoting smallholder participation in
                                    biofuel crop
                                production</span></em><span data-dcnode-id="1460" instrument_node="">
</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1457" instrument_node="">
                                Involving smallholder farmers in </span><a class="link-glossary2" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1456" instrument_node="">biofuel</span></a><span data-dcnode-id="1454" instrument_node="">
</span><a class="link-glossary2" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1453" instrument_node="">feedstock</span></a><span data-dcnode-id="1451" instrument_node=""> production is
                                    important both for reasons of equity and for employment. Are
                                    biofuel crops more likely to be produced on plantations or by
                                    small farmers? Hayami (2002) points out that smallholders have
                                    certain advantages over plantations in that they can avoid
                                    problems related to supervision and monitoring and can be more
                                    ﬂexible. Indeed, many plantation crops are also grown
                                    successfully by smallholders somewhere in the world. In
                                    Thailand, for example, where smallholders are generally
                                    prominent in terms of numbers and production, they compare
                                    favourably, in efﬁciency terms, with large- and medium- sized
                                    sugar farms in Australia, France and the United States of
                                    America (Larson and Borrell, 2001). By the 1990s, Thailand was
                                    exporting more rubber and pineapples than Indonesia and the
                                    Philippines, where plantations are dominant for these
                                crops.
                            </span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1448" instrument_node="">
                                However, when processing and marketing become more complex and
                                    centralized, plantations represent a solution to the need for
                                    vertical integration of production with other processes – as is
                                    the case for palm oil, tea, bananas and sisal. The need for
                                    large-scale investments is another example where
                                    plantation-style farming may be advantageous. If investors have
                                    to build supporting infrastructure such as irrigation, roads and
                                    docking, the scale of the operation necessary to offset the
                                    costs will be even larger. In unpopulated or sparsely populated
                                    areas, </span><a class="link-glossary2" data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1447" instrument_node="">biofuel</span></a><span data-dcnode-id="1445" instrument_node=""> crop
                                    production is therefore more likely to develop on the scale of
                                    plantations. This is one key reason why sugar cane in the
                                    Philippines is produced by smallholders in old settled areas of
                                    Luzon while plantations dominate in areas of Negros that were
                                    settled more recently (Hayami, Quisumbing and Adriano,
                                1990).
                            </span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">
                                Smallholder productivity and proﬁtability are often held back
                                    by poorly working commodity markets, lack of access to ﬁnancial
                                    markets, poorly performing producer organizations and signiﬁcant
                                    input market failures, especially for seed and fertilizer in
                                    sub-Saharan Africa. Government policy can promote smallholder
                                    farming. Key areas for policy intervention are:
                            </span></p><span data-dcnode-id="1440" instrument_node="">
</span><ul class="indent" data-dcnode-id="1423"><span data-dcnode-id="1439" instrument_node="">
</span><li data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">investment in public goods such as infrastructure,
                                        irrigation, extension and research; </span></li><span data-dcnode-id="1436" instrument_node="">
</span><li data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">the sponsoring of innovative approaches to rural
                                        ﬁnance; </span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">the creation of market information systems; </span></li><span data-dcnode-id="1430" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">improvements in output and input markets in rural
                                        areas so that small farms are not at a disadvantage relative
                                        to larger farms; </span></li><span data-dcnode-id="1427" instrument_node="">
</span><li data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">the enforcement of contracts. </span></li><span data-dcnode-id="1424" instrument_node="">
</span></ul><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">
                                Producer organizations that foster collective action can also
                                    help reduce transaction costs and achieve market power to the
                                    beneﬁt of smallholder competitiveness (World Bank, 2007). The
                                    experience of the Green Revolution shows how responsive
                                    small-farmer productivity and output supply can be to public
                                    investment in research, irrigation and input supply. 
                            </span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">
                                At least in the early years, when
                                    </span><a class="link-glossary2" data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1417" instrument_node="">biofuel</span></a><span data-dcnode-id="1415" instrument_node=""> crop production is
                                    gaining momentum, investors ready to inject the necessary
                                    capital are likely to look for some security of supply. One way
                                    to achieve this is by establishing a plantation of the crop on
                                    which production is based. However, smallholder participation in
                                    the form of contract farming (also referred to as “outgrower
                                    schemes”) is perhaps the most obvious approach to building the
                                    necessary market while safeguarding staple-food production and
                                    ensuring pro- poor growth. Contract farming implies the
                                    availability of credit, timely supply of inputs, knowledge
                                    transfer, provision of extension services and access to a ready
                                    market. From the contractors’ perspective, this type of
                                    arrangement can improve acceptability to stakeholders and
                                    overcome land constraints. 
                            </span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">
                                In many countries, contract farming is encouraged by
                                    governments as a means for enabling rural farming households and
                                    communities to share in the beneﬁts of commercial agriculture
                                    while maintaining some independence (FAO, 2001). Contract/
                                    outgrower schemes are more likely to succeed if they are based
                                    on proven technology and an enabling policy and legal
                                    environment. Default by contract farmers can be a major problem
                                    in the operation of such schemes. A weak legal system, weak
                                    insurance services and the associated high transaction costs
                                    lead to considerable risk for companies (Coulter et al.,
                                1999).
                            </span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1409" instrument_node="">
                                Innovative solutions to support smallholder farmers producing
                                    </span><a class="link-glossary2" data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1408" instrument_node="">biofuel</span></a><span data-dcnode-id="1406" instrument_node=""> crops continue to
                                    emerge (FAO, 2008g). In Brazil, the government created the
                                    Social Fuel Stamp programme to encourage
                                    </span><a class="link-glossary2" data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1405" instrument_node="">biodiesel</span></a><span data-dcnode-id="1403" instrument_node=""> producers to
                                    purchase </span><a class="link-glossary2" data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1402" instrument_node="">feedstocks</span></a><span data-dcnode-id="1400" instrument_node=""> from
                                    small family farms in poorer regions of the country. Companies
                                    that join the scheme beneﬁt from partial or total federal tax
                                    exemption. By the end of 2007, some 400 000 small farmers had
                                    joined the programme, selling mainly palm oil, soybeans and/or
                                    castor beans to reﬁning companies.
                            </span></p></div></div></blockquote><span data-dcnode-id="1395" instrument_node="">
</span><p class="source" data-dcnode-id="1379"><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1394" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1392" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1391" instrument_node="">FAO</span></a><span data-dcnode-id="1389" instrument_node="">,</span><a class="link-external" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1387" style="text-decoration:underline;"><span data-dcnode-id="1388" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1384"><span data-dcnode-id="1386" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1382" instrument_node="">,</span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">Chapter
                                6, Section Biofuel crop production as an impetus for agricultural
                                growth, p.79-82</span></p><span data-dcnode-id="1378" instrument_node="">
</span><div data-dcnode-id="1377" style="clear:both;"></div></div><div class="roundbottomcorner" data-dcnode-id="1375"></div><a data-dcnode-id="1374" id="3p0" name="3p0"></a><a data-dcnode-id="1373" id="3p0" name="3p0"></a><div class="tabs" data-dcnode-id="1353"><ul data-dcnode-id="1354"><li data-dcnode-id="1368"><a class="long" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/index.htm%235"><span data-dcnode-id="1372" instrument_node="">Level 1: </span><strong data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Summary</span></strong></a></li><li data-dcnode-id="1363"><a class="long" data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/l-2/5-food-security-poverty.htm%233"><span data-dcnode-id="1367" instrument_node="">Level 2: 
							</span><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Details</span></strong></a></li><li data-dcnode-id="1358"><a class="currentlong" data-dcnode-id="1359" href="#3p0"><span data-dcnode-id="1362" instrument_node="">Level 3: </span><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Source</span></strong></a></li><li data-dcnode-id="1355"><a class="gap" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">&nbsp;</span></a></li></ul></div><div class="boxstudy" data-dcnode-id="1232" lang="en" xml:lang="en"><h2 data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">5.3 How could biofuel production affect income distribution and women’s status?</span></h2><span data-dcnode-id="1350" instrument_node="">
</span><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1345"><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">The source document for this Digest states:</span></em></p><blockquote class="l3box" data-dcnode-id="1323"><div class="l3outer" data-dcnode-id="1324"><div class="l3inner" data-dcnode-id="1325"><span data-dcnode-id="1344" instrument_node="">
</span><ul class="indent" data-dcnode-id="1327"><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1342" instrument_node="">Development of </span><a class="link-glossary2" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1341" instrument_node="">biofuel</span></a><span data-dcnode-id="1339" instrument_node="">
</span><a class="link-glossary2" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1338" instrument_node="">feedstock</span></a><span data-dcnode-id="1336" instrument_node=""> production
                                        may present equity- and gender-related risks concerning
                                        issues such as labour conditions on plantations, access to
                                        land, constraints faced by smallholders and the
                                        disadvantaged position of women. Generally, these risks
                                        derive from existing institutional and political realities
                                        in the countries and call for attention irrespective of
                                        developments related to
                                        </span><a class="link-glossary2" data-dcnode-id="1334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1335" instrument_node="">biofuels</span></a><span data-dcnode-id="1333" instrument_node="">. </span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Governments need to establish clear criteria for
                                        determining “productive use” requirements and legal
                                        deﬁnitions for what constitutes “idle” land. Effective
                                        application of land-tenure policies that aim to protect
                                        vulnerable communities is no less important.</span></li><span data-dcnode-id="1328" instrument_node="">
</span></ul><span data-dcnode-id="1326" instrument_node="">
</span></div></div></blockquote><p class="source" data-dcnode-id="1307"><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1322" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1320" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1319" instrument_node="">FAO</span></a><span data-dcnode-id="1317" instrument_node="">,</span><a class="link-external" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1315" style="text-decoration:underline;"><span data-dcnode-id="1316" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1312"><span data-dcnode-id="1314" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1310" instrument_node="">,</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">Chapter
                                6, Section Key messages, p.86</span></p><blockquote class="l3box" data-dcnode-id="1252"><div class="l3outer" data-dcnode-id="1253"><div class="l3inner" data-dcnode-id="1254"><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1305" instrument_node="">
</span><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Biofuel crop development: equity and gender concerns</span></strong><span data-dcnode-id="1302" instrument_node="">
</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1299" instrument_node="">
                                Important risks associated with the development of
                                    </span><a class="link-glossary2" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1298" instrument_node="">biofuels</span></a><span data-dcnode-id="1296" instrument_node=""> relate to
                                    worsening income distribution and a deterioration of women’s
                                    status. The distributional impact of developing
                                    </span><a class="link-glossary2" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1295" instrument_node="">biofuel</span></a><span data-dcnode-id="1293" instrument_node=""> crops will depend
                                    on initial conditions and on government policies. The consensus
                                    with regard to the impact of cash crops on inequality appears to
                                    lean towards greater inequality (Maxwell and Fernando, 1989).
                                    However, evidence from the Green Revolution suggests that
                                    adoption was much less uneven than was ﬁrst supposed. Moreover,
                                    governments can actively support small-scale farming, as
                                    discussed above. The impact on inequality will depend on the
                                    crop and technology employed, with a scale-neutral technology
                                    favouring equal distribution of beneﬁts. Other important factors
                                    are: the distribution of land with secure ownership or tenancy
                                    rights; the degree of access by farmers to input and output
                                    markets and to credit; and a level playing ﬁeld in terms of
                                    policies.
                            </span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1290" instrument_node="">
                                Expansion of </span><a class="link-glossary2" data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1289" instrument_node="">biofuel</span></a><span data-dcnode-id="1287" instrument_node="">
                                    production will, in many cases, lead to greater competition for
                                    land. For smallholder farmers, women farmers and/or
                                    pastoralists, who may have weak land-tenure rights, this could
                                    lead to displacement. A strong policy and legal structure is
                                    required to safeguard against the undermining of livelihoods of
                                    households and communities (see also
                                    </span><a class="" data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/biofuel-tanzania.htm"><span data-dcnode-id="1285" style="text-decoration:underline;"><span data-dcnode-id="1286" instrument_node="">Box 14</span></span></a><span data-dcnode-id="1283" instrument_node="">). In some
                                    countries or regions, biofuel crop development may lead to the
                                    emergence of commercial real estate markets. At the same time,
                                    land rental values are likely to rise and poor farmers may not
                                    be in a position to secure land through buying or renting.
                                    Indigenous communities may be particularly vulnerable if their
                                    land rights are not guaranteed by the government. 
                            </span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">
                                Bouis and Haddad (1994) found that the introduction of sugar
                                    cane in the southern Bukidnon province of the Philippines led to
                                    a worsening of the land-tenure situation, with many households
                                    losing their access to land. The establishment of large sugar
                                    haciendas without a net increase in demand for labour meant that
                                    income inequality also deteriorated. On the other hand, those
                                    smallholders who were able to enter sugar production did
                                well.
                            </span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1277" instrument_node="">
                                FAO (2008h) suggests that female farmers may be at a distinct
                                    disadvantage vis-à-vis male farmers in terms of beneﬁting from
                                    </span><a class="link-glossary2" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1276" instrument_node="">biofuel</span></a><span data-dcnode-id="1274" instrument_node=""> crop development.
                                    To start with, there are often signiﬁcant gender disparities
                                    with regard to access to land, water, credit and other inputs.
                                    Although women are often responsible for carrying out much of
                                    the agricultural work, in particular in sub-Saharan Africa, they
                                    typically own little of the land (UNICEF, 2007). In Cameroon,
                                    women provide three-quarters of agricultural labour but own less
                                    than 10 percent of the land; in Brazil, they own 11 percent of
                                    the land while in Peru they own slightly more than 13 percent.
                                    Unequal rights to land create an uneven playing ﬁeld for men and
                                    women, making it more difﬁcult for women and female-headed
                                    households to beneﬁt from biofuel crop production (FAO,
                                2008h).
                            </span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1271" instrument_node="">
                                The emphasis on exploiting marginal lands for
                                    </span><a class="link-glossary2" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1270" instrument_node="">biofuel</span></a><span data-dcnode-id="1268" instrument_node=""> crop production may
                                    also work against female farmers. For example, in India, these
                                    marginal lands, or so-called “wastelands”, are frequently
                                    classiﬁed as common property resources and are often of crucial
                                    importance to the poor. Evidence from India shows that gathering
                                    and use of common property resources are largely women’s and
                                    children’s work – a division of labour that is also often found
                                    in West Africa (Beck and Nesmith, 2000). However, women are
                                    rarely involved in the management of these resources.
                            </span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">
                                In a study by von Braun and Kennedy (1994), it was found that
                                    in “none of the case studies they analysed did women play a
                                    signiﬁcant role as decision-makers and operators of the more
                                    commercialized crop, even when typical ‘women’s crops’ were
                                    promoted”. Dey (1981), in her review of rice development
                                    projects in the Gambia, also highlighted the importance of
                                    incorporating information about women’s role in agriculture when
                                    designing commercialization schemes so as to generate a better
                                    outcome in terms of equity, nutritional outcomes and even
                                    overall performance.
                            </span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1262" instrument_node="">
                                As has emerged from the discussion above, the development of
                                    </span><a class="link-glossary2" data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1261" instrument_node="">biofuel</span></a><span data-dcnode-id="1259" instrument_node=""> production may
                                    bring to the forefront a series of equity- and gender-related
                                    issues, such as labour conditions on plantations, constraints
                                    faced by smallholders and the disadvantaged position of female
                                    farmers. These are critical and fundamental issues that largely
                                    derive from existing institutional and political realities in
                                    many countries and that must be addressed in parallel with the
                                    prospects for biofuel development in a speciﬁc context. In this
                                    regard, development of
                                    </span><a class="link-glossary2" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1258" instrument_node="">biofuel</span></a><span data-dcnode-id="1256" instrument_node=""> production could
                                    and should be used constructively to focus attention on the
                                    issues.
                            </span></p></div></div></blockquote><span data-dcnode-id="1251" instrument_node="">
</span><p class="source" data-dcnode-id="1235"><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1250" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1248" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1247" instrument_node="">FAO</span></a><span data-dcnode-id="1245" instrument_node="">,</span><a class="link-external" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1243" style="text-decoration:underline;"><span data-dcnode-id="1244" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1240"><span data-dcnode-id="1242" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1238" instrument_node="">,</span><br data-dcnode-id="1237"><span data-dcnode-id="1236" instrument_node="">Chapter
                                6, Section Biofuel crop development: equity and gender concerns,
